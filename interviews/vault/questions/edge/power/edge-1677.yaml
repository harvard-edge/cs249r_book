title: 'Architecting Thermal Resilient Video Analytics'
scenario: 'You are designing an on-premise video analytics appliance for a non-climate-controlled factory floor using a chassis with two Qualcomm Cloud AI 100 accelerators. The ambient temperature frequently reaches 45°C, causing the cards to hit their 75W TDP limits faster and thermally throttle their sustained performance from 400 TOPS INT8 down to 250 TOPS.'
question: 'How would you schedule 30 HD camera streams across two Cloud AI 100 cards to meet latency SLAs under 45°C thermal throttling?'
details:
  realistic_solution: 'A robust L6+ design involves a dynamic, thermal-aware orchestrator that monitors die temperatures and gracefully degrades accuracy or framerate. The system should implement a model cascade: routing frames to a smaller, cooler fallback INT8 model when thermal headroom drops, ensuring latency SLAs are strictly met. Furthermore, by optimizing memory access patterns and maximizing batching within the 32 GB LPDDR4x, the system reduces the power spent on memory I/O, shifting the 75W power budget back to the compute cores to sustain higher overall TOPS.'
  common_mistake: |
    **The Pitfall:** Designing static load balancers or ignoring memory bandwidth heat generation.
    **The Rationale:** Candidates assume performance remains constant or fail to realize that high memory bandwidth utilization significantly contributes to the overall thermal envelope.
    **The Consequence:** The system hits thermal limits under load, causing massive latency spikes as queues back up, violating the SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total theoretical compute = 2 * 400 TOPS = 800 TOPS at 150W.
    - Throttled compute at 45°C = 2 * 250 TOPS = 500 TOPS.
    - Processing 30 streams at 30 FPS = 900 frames/sec.

    **Calculations:**
    - Allowed compute per frame = 500 TOPS / 900 = ~555 GOPs/frame.
    - Primary model required: 700 GOPs -> Requires 630 TOPS (exceeds 500 TOPS budget).
    - Fallback model: 400 GOPs.

    **Conclusion & Interpretation:**
    - **Result: 400 GOPs Fallback (Thermal-Bound)**. Switching to a smaller 400 GOPs model or dropping to 20 FPS stays under the thermal limit while preserving the SLA.
