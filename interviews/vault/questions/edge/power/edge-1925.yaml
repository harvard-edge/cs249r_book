title: Google Coral Edge TPU Thermal Throttling in Edge Deployments
scenario: 'You are deploying a real-time object detection model on a Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only) in an outdoor, unventilated enclosure. During initial testing, the model achieves the expected 4 TOPS INT8 performance for short bursts. However, after 5-10 minutes of continuous inference, the inference latency significantly increases, and the effective throughput drops by 50%. The ambient temperature in the enclosure can reach 40°C.'
question: 'What is the most likely cause of the Coral Edge TPU throughput dropping 50% after 5-10 minutes at 40°C, and how would you mitigate it?'
details:
  realistic_solution: 'Implement active cooling (e.g., a small fan with a temperature sensor and a control loop) or passive cooling (e.g., larger heatsink, thermal pads to a metallic enclosure) specifically designed for the Coral''s 2W TDP. Optimize the model for lower utilization or introduce inference batching/scheduling to allow for cooling periods. Monitor device temperature and dynamically adjust model complexity or inference frequency. Consider robust enclosure design with ventilation or reflective surfaces to reduce solar gain. For the Coral, leveraging its low power consumption is key; a small heatsink and adequate airflow within the enclosure would be a primary step.'
  common_mistake: |
    **The Pitfall:** Ignoring the impact of sustained workload on thermal dissipation.
    **The Rationale:** Candidates underestimate ambient temperature effects or design cooling solutions without considering the device's specific power envelope and thermal limits, often assuming burst performance equals sustained performance.
    **The Consequence:** The deployed system suffers from severe thermal throttling in production, leading to missed real-time deadlines and degraded system reliability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Enclosure ambient temperature: 40°C.
    - Thermal resistance (unventilated, no heatsink): ~20-30 °C/W.
    - Coral power consumption: 2W.

    **Calculations:**
    - Internal temperature rise: 2W * 20-30 °C/W = 40-60°C.
    - Junction temperature: 40°C + (40-60°C) = 80-100°C.

    **Conclusion & Interpretation:**
    - **Result: Junction temperature reaches 80-100°C, triggering severe thermal throttling (Power-Bound)**.
