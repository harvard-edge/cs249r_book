title: 'Diagnosing Thermal Throttling on NVIDIA Jetson Orin'
scenario: You are deploying a continuous object detection pipeline on an NVIDIA Jetson Orin for an outdoor autonomous robot. The hardware operates with a 60W TDP. During midday field tests, the inference latency suddenly spikes from 15ms to 45ms after about 10 minutes of operation, despite the workload remaining completely static. The system logs show a change in the active DVFS P-state.
question: What is the root cause of this sudden performance drop, and how do you diagnose it?
details:
  realistic_solution: |
    The root cause is thermal throttling; the system cannot dissipate the heat generated by running near its 60W TDP in a warm environment, causing the DVFS controller to step down the P-state (lowering voltage and frequency) to prevent hardware damage. To diagnose this, one should use tools like `tegrastats` to monitor the SoC temperature, active power draw, and current operating frequencies.
  common_mistake: |
    **The Pitfall:** Jumping to software-level bugs like memory leaks or inefficient memory access.
    **The Rationale:** Software engineers are biased toward software solutions and often forget the physical thermal constraints of edge devices.
    **The Consequence:** Wasting time debugging code while ignoring the hardware's built-in dynamic voltage and frequency scaling (DVFS) thermal protection mechanisms.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Power: 60W TDP.
    - Passive Cooling Limit: ~45W continuous dissipation.
    - Throttling Threshold: 95°C.

    **Calculations:**
    - Thermal Buffer Accumulation: 60W - 45W = 15W of heat accumulating over 10 minutes.
    - Frequency Scaling Impact: Reducing power to <= 45W requires dropping frequency, proportional to latency increase.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound (DVFS Throttling)**. The sustained 60W load exceeds the 45W cooling capacity. Hitting 95°C triggers DVFS downclocking, increasing inference latency from 15ms to 45ms.
