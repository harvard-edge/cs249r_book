title: 'Energy-Aware Edge Selection: Jetson AGX Orin vs. Orin NX'
scenario: You are selecting hardware for a low-latency image classification service at the edge. The candidates are NVIDIA Jetson AGX Orin 64GB (up to 275 TOPS INT8, configurable up to about 60W) and NVIDIA Jetson Orin NX 16GB (up to 100 TOPS INT8, configurable up to about 25W). Both must achieve at least 1000 INT8 inferences/second for a model with an approximately 10GB resident footprint.
question: Which platform is more energy-suitable for 1000 INT8 inferences/s with a 10 GB model, and how do compute, memory, and TDP trade off?
details:
  realistic_solution: |
    First check feasibility before comparing energy. A 10 GB INT8 model can fit on both Jetson modules, but Orin NX has much less headroom for activations, batching, and runtime buffers. At 1000 inferences/s, a design that streams all weights per inference would require about 10 TB/s of memory bandwidth and is infeasible on either LPDDR platform. If the model has high weight reuse and needs well under 100 TOPS sustained, Orin NX is more energy-suitable because its power ceiling is lower. If the workload approaches 100 TOPS sustained, needs larger batches, or requires more memory headroom, AGX Orin is the safer choice despite higher power. The decision should be based on measured effective TOPS, DRAM traffic per inference, and watts at 1000 inferences/s.
  common_mistake: |
    **The Pitfall:** Overemphasizing peak compute (TOPS) while ignoring memory energy.
    **The Rationale:** Candidates focus entirely on the arithmetic processing power and neglect the fact that retrieving data from DRAM often consumes orders of magnitude more energy than the computation itself.
    **The Consequence:** They incorrectly select the platform with higher TOPS, resulting in a system that exhausts its thermal/power budget purely on memory data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 model footprint: 10 GB.
    - Target throughput: 1000 inferences/s.
    - Jetson AGX Orin 64GB: up to 275 TOPS INT8, about 60W high-power configuration.
    - Jetson Orin NX 16GB: up to 100 TOPS INT8, about 25W high-power configuration.
    - Example model compute: 100 GOPS/inference.

    **Calculations:**
    - Capacity check: 10 GB fits in 64 GB and 16 GB, though Orin NX has less room for activations, batching, and runtime buffers.
    - Compute demand at 100 GOPS/inference = 1000 * 100 GOPS = 100 TOPS sustained.
    - Compute headroom: AGX Orin uses 100/275 = 36% of peak; Orin NX uses 100/100 = 100% of peak.
    - Power lower bound from configured power at target throughput: AGX Orin = 60W / 1000 = 60 mJ/inference; Orin NX = 25W / 1000 = 25 mJ/inference.
    - If each inference streamed the full 10 GB model, memory bandwidth demand = 10 GB * 1000/s = 10 TB/s, which would make both platforms infeasible.

    **Conclusion & Interpretation:**
    - **Result: Orin NX is more energy-suitable only if the real workload stays below its sustained compute and memory limits.** AGX Orin provides more compute and memory headroom; neither module can support 1000 inferences/s if the 10 GB model must be reread from DRAM every inference.
