title: 'Energy-Aware Platform Selection for Edge AI: Qualcomm Cloud AI 100 vs. Edge AI Accelerator X'
scenario: 'You are tasked with selecting an optimal hardware platform for deploying a low-latency, real-time image classification service at the edge. You have two primary candidates: (1) Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP) and (2) Edge AI Accelerator X (16 GB LPDDR5, 200 TOPS INT8, 50W TDP). Both platforms need to achieve a minimum inference throughput of 1000 inferences/second for an INT8 quantized model. The model requires approximately 10GB of memory.'
question: Which platform is more energy-suitable for 1000 INT8 inferences/s with a 10 GB model, and how do compute, memory, and TDP trade off?
details:
  realistic_solution: First check feasibility before comparing memory energy. A 10 GB INT8 model fits on both platforms, but at 1000 inferences/s a design that streams all weights per inference would require about 10 TB/s of memory bandwidth and is infeasible on either LPDDR platform. If the model is reused from memory with high cache/locality and the per-inference compute is modest enough to fit within 200 TOPS, Accelerator X has lower TDP and likely lower LPDDR5 energy per bit. If the service needs more than 200 TOPS sustained or depends on larger batches, Cloud AI 100 has more compute and memory headroom but higher 75W TDP. The correct selection depends on measured effective TOPS, bandwidth traffic per inference, and watts at 1000 inferences/s, not LPDDR generation alone.
  common_mistake: |
    **The Pitfall:** Overemphasizing peak compute (TOPS) while ignoring memory energy.
    **The Rationale:** Candidates focus entirely on the arithmetic processing power and neglect the fact that retrieving data from DRAM often consumes orders of magnitude more energy than the computation itself.
    **The Consequence:** They incorrectly select the platform with higher TOPS, resulting in a system that exhausts its thermal/power budget purely on memory data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 model footprint: 10 GB.
    - Target throughput: 1000 inferences/s.
    - Cloud AI 100: 400 TOPS, 75W, 32 GB LPDDR4x.
    - Accelerator X: 200 TOPS, 50W, 16 GB LPDDR5.
    - Example model compute: 100 GOPS/inference.

    **Calculations:**
    - Capacity check: 10 GB fits in 32 GB and 16 GB, though Accelerator X has less room for activations and batching.
    - Compute demand at 100 GOPS/inference = 1000 * 100 GOPS = 100 TOPS sustained.
    - Compute headroom: Cloud AI 100 uses 100/400 = 25% of peak; Accelerator X uses 100/200 = 50% of peak.
    - Power lower bound from TDP at target throughput: Cloud AI 100 = 75W / 1000 = 75 mJ/inference; Accelerator X = 50W / 1000 = 50 mJ/inference.
    - If each inference streamed the full 10 GB model, memory bandwidth demand = 10 GB * 1000/s = 10 TB/s, which would make both platforms infeasible.

    **Conclusion & Interpretation:**
    - **Result: Accelerator X Is More Energy-Suitable Only If 100 TOPS And Memory Reuse Are Realistic**. Cloud AI 100 provides more headroom; neither platform can support 1000 inferences/s if the 10 GB model must be reread from DRAM every inference.
