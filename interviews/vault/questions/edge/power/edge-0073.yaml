title: The Power-Over-Ethernet Budget
scenario: >-
  You're deploying AI-powered security cameras in a warehouse. Each camera connects via a single Ethernet cable using PoE. The camera needs an image sensor + ISP, network PHY + SoC housekeeping, IR illuminators for night vision, and an AI accelerator for person detection.
question: How much power budget remains for the AI accelerator under standard PoE, and which edge chips actually fit?
details:
  realistic_solution: 'Calculate the usable power at the device by accounting for cable loss and DC-DC conversion efficiency. Then subtract fixed component loads. Only extremely low-power chips like the Hailo-8L or Google Coral fit the standard PoE budget. Upgrading to PoE+ Type 2 is required to support higher-power chips like the Jetson Orin Nano.'
  common_mistake: |
    **The Pitfall:** Using the Power Sourcing Equipment (PSE) rating instead of the Powered Device (PD) limit.
    **The Rationale:** Engineers read "15.4W PoE" on the spec sheet and simply subtract component wattage from 15.4W.
    **The Consequence:** They ignore the physics of cable resistance and DC-DC conversion loss, causing the device to repeatedly brown-out and reboot under load in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard PoE (802.3af Type 1): 15.4W at PSE, 12.95W at PD due to cable loss.
    - DC-DC conversion efficiency: 90% (10% loss).
    - Fixed loads: Sensor/ISP (2.5W), PHY/SoC (1.5W), IR (3.0W) = 7.0W total.

    **Calculations:**
    - Usable PD Input: 12.95W.
    - Post-conversion power: 12.95W * 0.90 = 11.655W usable.
    - AI budget: 11.655W - 7.0W = 4.655W.

    **Conclusion & Interpretation:**
    - **Result: 4.65W (Power-Bound).** Only low-power accelerators like Google Coral (2W) or Hailo-8L (2.5W) fit; a Jetson Orin Nano (7W+) requires a PoE+ Type 2 upgrade.
