title: The GPU Power Gating Latency
scenario: Your battery-powered drone runs a Jetson Orin Nano for obstacle avoidance. During straight-line flight, the GPU is idle. Your power engineer enables GPU power gating to save battery. On the next test flight, the drone clips a tree branch during a sudden turn. Investigation reveals the obstacle detection model took 180ms to produce its first detection after the turn began, instead of the expected 25ms.
question: Why did GPU power gating increase the initial detection latency to 180ms?
details:
  realistic_solution: 'GPU power gating removes power from the GPU''s transistors to eliminate leakage current. When needed, the GPU must go through a power-on sequence: rail ramp-up, clock stabilization, context restoration, and possible CUDA/TensorRT runtime or model warmup. The measured 180ms first-detection latency is therefore a combined hardware wake plus software warmup effect. Clock gating can reduce the hardware wake component by keeping the GPU powered, but the runtime should also keep contexts, engines, and buffers resident if the drone needs a 25ms first response.'
  common_mistake: |
    **The Pitfall:** Assuming the model is just slow to warm up and ignoring the hardware power state.
    **The Rationale:** Software engineers often don't realize that power gating physically removes voltage from transistors, requiring a full hardware initialization sequence.
    **The Consequence:** Trading critical safety latency for modest battery savings. Clock gating and keeping the inference runtime warm should be used when the safety case depends on a bounded first-detection latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Drone speed: 15 m/s.
    - Power savings: Power gating saves 1.5W; clock gating saves ~0.9W.

    **Calculations:**
    - Added first-detection latency = 180ms observed - 25ms expected = 155ms.
    - This 155ms includes both hardware wake time and software/runtime warmup; the scenario does not provide enough data to assign the full gap to power gating alone.
    - Distance traveled blind: 15 m/s * 0.155s = 2.3 meters.

    **Conclusion & Interpretation:**
    - **Result: 2.3 meters (Latency-Bound).** The extra 155ms leaves the drone blind for about 2.3 meters. Power gating can be part of the cause, but the fix must bound the full wake path, including GPU power state, context restoration, and TensorRT/model warmup.
