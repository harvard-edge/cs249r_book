title: The GPU Power Gating Latency
scenario: >-
  Your battery-powered drone runs a Jetson Orin Nano for obstacle avoidance. During straight-line flight, the GPU is idle. Your power engineer enables GPU power gating to save battery. On the next test flight, the drone clips a tree branch during a sudden turn. Investigation reveals the obstacle detection model took 180ms to produce its first detection after the turn began, instead of the expected 25ms.
question: Why did GPU power gating increase the initial detection latency to 180ms?
details:
  realistic_solution: 'GPU power gating removes power from the GPU''s transistors to eliminate leakage current. When needed, the GPU must go through a full power-on sequence: rail ramp-up, clock stabilization, context restoration, and TensorRT cold-start penalty. The fix is to use clock gating instead, which keeps the GPU powered but stops the clock, dropping wake latency to ~2ms.'
  common_mistake: |
    **The Pitfall:** Assuming the model is just slow to warm up and ignoring the hardware power state.
    **The Rationale:** Software engineers often don't realize that power gating physically removes voltage from transistors, requiring a full hardware initialization sequence.
    **The Consequence:** Trading critical safety latency for negligible battery savings. Clock gating should be used instead to maintain a 2ms wake latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Drone speed: 15 m/s.
    - Power savings: Power gating saves 1.5W; clock gating saves ~0.9W.

    **Calculations:**
    - Wake latency penalty: Ramp-up (10ms) + Clock (5ms) + Context (20ms) + Cold start (100ms) = 135ms.
    - Time blind: 180ms - 25ms = 155ms.
    - Distance traveled blind: 15 m/s * 0.155s = 2.3 meters.

    **Conclusion & Interpretation:**
    - **Result: 2.3 meters (Latency-Bound).** A trivial 0.6W difference in battery savings caused 2.3 meters of blind flight, triggering the catastrophic crash.
