title: The Power Efficiency Litmus Test
scenario: 'You are on an autonomous vehicle team evaluating a new accelerator for a perception model that must run within a strict 30W thermal design power (TDP) budget.'
question: When comparing chips, what does the TOPS/W (Trillion Operations Per Second Per Watt) metric fundamentally allow you to identify?
details:
  realistic_solution: TOPS/W is the primary metric for power efficiency. It quantifies how many trillion operations the accelerator can perform for every watt of power it consumes. It's the most critical metric for any battery-powered or thermally-constrained platform.
  common_mistake: |
    **The Pitfall:** Confusing TOPS/W with absolute raw TOPS.
    **The Rationale:** Engineers often fixate on peak theoretical throughput (TOPS) without considering thermal constraints.
    **The Consequence:** In a thermally-constrained edge device, selecting a chip with higher absolute TOPS but lower efficiency may result in worse sustained performance because it cannot run at peak power without melting.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30W power limit.
    - Jetson AGX Orin achieves 275 TOPS at 60W.
    - Hailo-8 achieves 26 TOPS at 2.5W.

    **Calculations:**
    - Orin efficiency = 275 / 60 $\approx$ 4.6 TOPS/W.
    - Hailo-8 efficiency = 26 / 2.5 = 10.4 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: TOPS/W dictates sustained performance (Thermal-Bound)**. A Thermal-Bound system must select the more efficient chip to maximize under-budget throughput.
  options:
  - 'The maximum theoretical compute throughput of the chip.'
  - 'The chip''s performance on memory-bound vs. compute-bound tasks.'
  - 'The computational performance delivered per unit of power consumed.'
  - 'The dollar cost per trillion operations.'
