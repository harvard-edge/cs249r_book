title: Carbon Footprint for Continuous Edge Inference Deployment
scenario: A smart city deploys 5,000 edge modules for continuous pedestrian detection at intersections. Each module draws 25W average. The city's electricity grid has an intensity of 450 gCO2/kWh. For a cloud comparison, assume the alternative runs on 75 H100s at 700W each with a 1.2 PUE and 15 kW of network overhead.
question: What is the annual carbon footprint of the 5,000-node edge fleet versus H100 cloud inference, and where is the carbon break-even?
details:
  realistic_solution: Evaluate operational emissions from the stated power assumptions. The edge fleet draws 125 kW continuously, or 1.095M kWh/year, which is 492.8 tCO2/year on a 450 gCO2/kWh grid. The cloud alternative draws 78 kW including GPU PUE and network overhead, or 683,280 kWh/year. If the cloud used the same 450 gCO2/kWh grid, it would emit 307.5 tCO2/year. Holding edge emissions fixed, cloud carbon parity occurs at about 721 gCO2/kWh.
  common_mistake: |
    **The Pitfall:** Ignoring network transmission carbon for cloud deployment.
    **The Rationale:** Analysts directly compare edge device power to cloud server power, forgetting that streaming thousands of video feeds requires substantial network infrastructure energy.
    **The Consequence:** Highly biased sustainability calculations that artificially favor cloud deployments over edge native designs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5,000 edge units at 25 W. Edge grid: 450 gCO2/kWh.
    - Cloud requires 75 H100s (700 W each), PUE=1.2, plus 15 kW network overhead.

    **Calculations:**
    - Edge power: 5,000 * 0.025 kW = 125 kW.
    - Edge energy: 125 kW * 8760 h = 1,095,000 kWh/year.
    - Edge carbon: 1,095,000 kWh * 0.450 kgCO2/kWh = 492.8 tCO2/year.
    - Cloud power: (75 * 0.700 kW * 1.2) + 15 kW = 78 kW.
    - Cloud energy: 78 kW * 8760 h = 683,280 kWh/year.
    - Cloud carbon at 450 gCO2/kWh: 683,280 * 0.450 = 307.5 tCO2/year.
    - Cloud break-even grid intensity: 492,750 kgCO2 / 683,280 kWh = 0.721 kgCO2/kWh = 721 gCO2/kWh.

    **Conclusion & Interpretation:**
    - **Result: 492.8 tCO2 Edge vs 307.5 tCO2 Cloud on the Same Grid.** With the stated cloud footprint, cloud remains lower-carbon until its grid exceeds about 721 gCO2/kWh.
