title: Jetson Orin Carbon Footprint for Continuous Edge Inference Deployment
scenario: A smart city deploys 5,000 edge modules for continuous pedestrian detection at intersections. Each module draws 25W average. The city's electricity grid has an intensity of 450 gCO2/kWh.
question: What is the annual carbon footprint of the 5,000-node edge fleet versus H100 cloud inference, and where is the carbon break-even?
details:
  realistic_solution: Evaluate the lifecycle emissions. Calculate the continuous energy draw of the edge fleet vs the intermittent high-power draw of cloud GPUs. Incorporate the massive network transmission carbon overhead required to stream continuous video to the cloud. Depending on grid intensity, the edge's localized low-power inference often drastically outperforms the cloud's network plus GPU footprint.
  common_mistake: |
    **The Pitfall:** Ignoring network transmission carbon for cloud deployment.
    **The Rationale:** Analysts directly compare edge device power to cloud server power, forgetting that streaming thousands of video feeds requires substantial network infrastructure energy.
    **The Consequence:** Highly biased sustainability calculations that artificially favor cloud deployments over edge native designs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5,000 edge units at 25 W. Grid: 450 gCO2/kWh.
       - Cloud requires 75 H100s (700 W * 1.2 PUE = 63 kW) + Network (15 kW) = 78 kW.
    2. **Calculations:**
       - Edge Energy: 5,000 * 0.025 kW * 8760 h = 1,095,000 kWh.
       - Edge Carbon: 1,095,000 * 0.450 = 492.7 tCO2/year.
       - Cloud Energy: 78 kW * 8760 h = 683,280 kWh.
       - Break-even Grid Intensity: 492,750 / 683,280 = 721 gCO2/kWh.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Carbon Parity.** The cloud alternative only achieves carbon parity if powered by a green grid under 721 gCO2/kWh, primarily due to the 15 kW constant network overhead.
