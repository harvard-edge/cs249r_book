title: 'Explain Thermal Throttling on Google Coral Edge TPU'
scenario: 'You are deploying a continuous object detection model on a Google Coral Edge TPU USB Accelerator. The spec sheet states it consumes 2W and provides 4 TOPS at INT8 precision. During a continuous 24-hour inference test in a small, passively cooled enclosure at room temperature (25°C), you observe that the inference latency doubles after the first 15 minutes of operation.'
question: 'Why does Coral Edge TPU inference latency double after 15 minutes of continuous 4 TOPS operation in a passively cooled enclosure?'
details:
  realistic_solution: 'The performance degradation is caused by thermal throttling (DVFS). The Google Coral Edge TPU operates within a strict thermal envelope. In a passively cooled, small enclosure, heat cannot dissipate fast enough. To prevent damage, the ASIC automatically reduces its operating frequency, halving its processing speed and doubling latency.'
  common_mistake: |
    **The Pitfall:** Blaming host CPU overhead, USB bus saturation, or software memory leaks.
    **The Rationale:** Candidates overlook the hardware's thermal behavior and the fact that 2W power consumption must be dissipated as heat.
    **The Consequence:** Wasting time debugging software when the root cause is inadequate thermal management.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial state: 4 TOPS @ 2W.
    - Throttled state: Inference time doubles, TOPS halve to 2 TOPS.
    - Power (P) is proportional to $f \times V^2$.

    **Calculations:**
    - Assuming $V_{throttled} = 0.9 \times V_{init}$.
    - $P_{throttled} \approx (0.5 \times f_{init}) \times (0.9 \times V_{init})^2 = 0.405 \times 2W$.

    **Conclusion & Interpretation:**
    - **Result: ~0.81W (Thermal/Power-Bound)**. Thermal limits trigger dynamic voltage and frequency scaling (DVFS), significantly dropping power and throughput.
