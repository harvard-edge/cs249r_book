title: Sustained Inference Throttling Across Edge Ambient Temperatures
scenario: 'Your team is deploying a new AI inference application on edge devices that demands sustained high performance. You are tasked with evaluating two potential hardware platforms: the Qualcomm Cloud AI 100 and a competing Edge AI Accelerator X. The application is critical and needs to maintain consistent throughput for long durations in environments where ambient temperatures can fluctuate from 0°C to 45°C.'
question: How would you compare the Cloud AI 100 and Accelerator X for throttling-free sustained inference from 0°C to 45°C?
details:
  realistic_solution: |
    Treat Accelerator X as a hypothetical lower-power competitor and compare the two platforms by deriving cooling requirements at the worst-case 45°C ambient, then validating sustained throughput in a thermal chamber at 0°C, room temperature, and 45°C. Cloud AI 100 may deliver higher peak throughput, but its case-to-ambient thermal resistance requirement is much harder to meet, so throttling risk rises as ambient temperature approaches 45°C unless the enclosure supports strong active cooling. Accelerator X has lower assumed peak throughput but lower power; if it meets the throughput target at all tested temperatures, it is more likely to remain throttling-free with a simpler thermal solution. The decision should be based on sustained measured FPS and clock stability across the full 0°C to 45°C sweep, not advertised TOPS at 25°C.
  common_mistake: |
    **The Pitfall:** Focusing solely on peak (burst) TOPS specifications without calculating thermal resistance.
    **The Rationale:** Candidates ignore the physics of heat dissipation, assuming advertised performance can be sustained indefinitely in 45°C environments.
    **The Consequence:** Deploying an accelerator that drastically thermal throttles under load, causing massive, unpredictable latency spikes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100 power dissipation (P): 75W.
    - Accelerator X is hypothetical with assumed power dissipation (P): 50W.
    - Max ambient temp (T_ambient): 45°C.
    - Max junction temp (T_junction_max): 95°C.
    - Junction-to-case resistance (R_th_jc): 0.5 °C/W.

    **Calculations:**
    - Target Equation: T_junction_max = P * (R_th_jc + R_th_ca) + T_ambient
    - Cloud AI 100: 95 = 75 * (0.5 + R_th_ca) + 45, so R_th_ca = 0.167 °C/W.
    - Accelerator X: 95 = 50 * (0.5 + R_th_ca) + 45, so R_th_ca = 0.5 °C/W.
    - At 25°C ambient, headroom is 70°C instead of 50°C; at 0°C ambient, headroom is 95°C, so both platforms should throttle less if airflow and workload are unchanged.
    - The full test sweep should confirm stable clocks/FPS at 0°C, nominal operation near room temperature, and no throttling at the worst-case 45°C point.

    **Conclusion & Interpretation:**
    - **Result: Accelerator X has easier thermal headroom under the stated hypothetical 50W assumption.** Cloud AI 100 needs a much lower case-to-ambient resistance, so it is more likely to throttle near 45°C unless the system can provide aggressive active cooling and still meet the power budget.
