title: The Edge Efficiency Metric
scenario: For an edge AI accelerator, power efficiency is a critical metric.
question: 'What is the approximate TOPS-per-Watt efficiency of a Hailo-8 accelerator at its nominal power envelope?'
details:
  realistic_solution: 'The Hailo-8 is rated for 26 TOPS (INT8) at a typical power consumption of 2.5W. Its efficiency is therefore approximately 10.4 TOPS/W. This is a measure of how many Tera-Operations it can perform for each Watt of power consumed.'
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS and ignoring the power cost to achieve it.
    **The Rationale:** Engineers equate raw performance with edge suitability, misremembering order of magnitudes between architectures.
    **The Consequence:** Selecting wildly inefficient hardware that blows the system's thermal budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 peak performance: 26 TOPS
    - Nominal power consumption: 2.5W

    **Calculations:**
    - Efficiency = Peak Performance / Power
    - Efficiency = 26 TOPS / 2.5W = 10.4 TOPS/W

    **Conclusion & Interpretation:**
    - **Result: 10.4 TOPS/W (Power-Bound)**. Efficiency metric allows hardware comparison.
  options:
  - '~1 TOPS/W'
  - '~4.5 TOPS/W'
  - '~10 TOPS/W'
  - '~26 TOPS/W'
  correct_index: 2
