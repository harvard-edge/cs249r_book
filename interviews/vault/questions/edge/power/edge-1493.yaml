title: Thermal Management for a 75W Edge Accelerator
scenario: You are designing an on-premise edge video analytics appliance utilizing a 75W TDP, 400 TOPS INT8 accelerator. The system must process high-resolution video continuously in an unconditioned warehouse environment where ambient temperatures reach 45°C.
question: How would you balance active cooling, DVFS, and workload shedding to sustain throughput at 45°C on the 75W accelerator?
details:
  realistic_solution: Use a closed-loop thermal policy rather than a single maximum-fan or hard-throttle setting. Start with a fan curve that maintains thermal headroom at 45°C ambient while respecting dust, acoustic, and maintenance constraints. Add predictive DVFS so the accelerator steps down before it reaches a critical temperature, and pair that with workload shedding or admission control so stream count tracks the sustained TOPS budget. At a 50W sustained cap, the scheduler should plan for roughly 133 streams at 2 TOPS each and shed lower-priority work before latency collapses.
  common_mistake: |
    **The Pitfall:** Relying solely on maximum active cooling or aggressive thermal throttling.
    **The Rationale:** Candidates ignore the acoustic/dust constraints of warehouse environments and the SLA impacts of massive down-clocking.
    **The Consequence:** The system either fails due to fan burnout or repeatedly violates real-time throughput deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator: 75W TDP, 400 TOPS INT8.
    - Thermal cap in 45°C ambient: 50W.
    - Cost per stream: 2 TOPS.

    **Calculations:**
    - Peak efficiency = 400 TOPS / 75W = 5.33 TOPS/W.
    - Sustained performance = 50W * 5.33 TOPS/W = 266.5 TOPS.
    - Max sustained streams = 266.5 TOPS / 2 TOPS/stream = 133 streams.

    **Conclusion & Interpretation:**
    - **Result: 133 max sustained streams (Thermal-Bound)**. Predictive thermal capping is required to avoid critical down-clocking.
