title: The Solar Panel Degradation Power Crunch
scenario: Your remote monitoring network has 800 solar-powered stations running a Coral Dev Board. The system was designed for 24/7 operation with 4 hours of daily sunlight. After 3 years, 15% of stations in the sunniest locations are experiencing daily brownouts. The batteries test fine.
question: What is failing, and how do you redesign the power budget for a 10-year deployment?
details:
  realistic_solution: The failure is caused by Light-Induced Degradation (LID) and Potential-Induced Degradation (PID) of the solar panels, which accelerates significantly in high-UV, high-temperature environments. Standard degradation is modeled at 0.5%/year, but extreme environments easily hit 2.5%/year. Over 3 years, a 7.5% drop in generation capacity pushes the daily energy yield below the continuous system draw. To guarantee a 10-year lifespan, the system must be over-provisioned assuming a worst-case 25% end-of-life degradation margin.
  common_mistake: |
    **The Pitfall:** Incorrectly blaming battery cycle degradation and ignoring solar panel LID/PID in harsh environments.
    **The Rationale:** Engineers default to lithium battery lifecycle limits, ignoring the fact that properly managed LiFePO4 chemistry easily survives 3 years (>1000 cycles) with minimal capacity loss.
    **The Consequence:** The company wastes massive capital executing a fleet-wide battery recall, but the brownouts persist because the degraded solar arrays still cannot generate enough daily watt-hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - Consumption: ~57 Wh/day.
    - Baseline panel: 20W. Sun: 4 hours. Efficiency: 85%.
    - Harsh environment degradation: 2.5% per year.

    **Calculations:**
    - Year 0 Generation = 20W * 4h * 0.85 = 68.0 Wh/day (Passes 57 Wh requirement).
    - Year 3 Generation (7.5% degraded) = 68.0 Wh * 0.925 = 62.9 Wh/day (Dangerously close).
    - Year 10 Target Generation (25% degraded) = 68.0 Wh * 0.75 = 51.0 Wh/day (Fails).
    - Redesign for Year 10 with 28W panel = 28W * 4h * 0.85 * 0.75 = 71.4 Wh/day.

    **Conclusion & Interpretation:**
    - **Result: 28W Panels (Energy-Generation-Bound)**. The system requires over-provisioning to accommodate high-UV panel degradation over the 10-year lifecycle.
