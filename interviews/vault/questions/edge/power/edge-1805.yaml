title: Energy-Aware Inference Architecture on Jetson Orin
scenario: An inference pipeline for a multi-camera perception system is being designed for the NVIDIA Jetson Orin (60W TDP, 275 TOPS INT8, 64 GB LPDDR5). The goal is to minimize total energy per operation by balancing memory access costs against dense compute.
question: How should the data flow and operator selection be designed to stay within the 60W power budget while maximizing compute utilization?
details:
  realistic_solution: |
    The correct approach involves a compute-bound design that aggressively fuses operators to keep intermediate activations in on-chip SRAM, minimizing LPDDR5 traffic. The specification should mandate INT8 quantization to efficiently utilize the 275 TOPS on the Jetson AGX Orin 64GB (60W TDP) and offload standard convolutions to the DLA to save GPU power. Furthermore, the design should explicitly tile feature maps and select operators that maximize the compute-to-memory-access ratio, exploiting the fact that compute is cheap but data movement is the dominant energy drain.
  common_mistake: |
    **The Pitfall:** Focusing solely on maximizing TOPS utilization without considering memory access energy.
    **The Rationale:** Developers assume that keeping the GPU busy equates to maximum efficiency.
    **The Consequence:** Generating massive LPDDR5 memory traffic that consumes tens of watts, rapidly breaching the 60W TDP and causing thermal throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Energy: INT8 MAC costs ~0.1 pJ. 275 TOPS = 137.5 TMACs/s -> 13.75W for full compute.
    - Memory Energy: LPDDR5 access costs ~100 pJ/byte (1000x more than compute).

    **Calculations:**
    - Naive Data Movement: Unfused 10MB layer * 300 inf/sec = 600 mJ/s (0.6W) just for moving one layer's data.
    - Total Data Movement: Across 50 layers, unfused memory traffic easily exceeds 30W.

    **Conclusion & Interpretation:**
    - **Result: >30W memory traffic (Memory-Bound)**. Aggressive operator fusion to keep activations in SRAM is mandatory.
