title: Energy-Aware Model Design for Real-Time Inference on Google Coral Edge TPU
scenario: Your team is tasked with deploying a real-time object detection neural network on a fleet of Google Coral Edge TPUs. The application requires processing video frames at 30 FPS.
question: How would you design a Coral Edge TPU model for 30 FPS with minimal energy per inference, considering memory access is far costlier than INT8 MACs?
details:
  realistic_solution: 'The optimal solution involves a multi-pronged approach: 1. **Memory-Aware Architecture**: Prioritize neural network layers and operations that minimize data movement, particularly off-chip. This includes using depthwise separable convolutions, group convolutions, and efficient layer fusion techniques to keep data on-chip as much as possible. 2. **Aggressive Quantization-Aware Training (QAT)**: Ensure the model is robustly quantized to INT8, as this is the native and most energy-efficient data type for the Coral Edge TPU. 3. **Operator Selection**: Favor operators that map efficiently to the Coral''s INT8 MAC units. 4. **Micro-architectural Profiling**: Utilize profiling tools to understand the actual energy consumption of different model components and identify memory bottlenecks on the target hardware, guiding iterative design improvements. 5. **Data Layout Optimization**: Experiment with channel-last or other memory-friendly data layouts to improve cache utilization.'
  common_mistake: |
    **The Pitfall:** Optimizing primarily for FLOPs/MACs count.
    **The Rationale:** Developers assume that minimizing compute operations directly correlates with minimizing power consumption.
    **The Consequence:** They design architectures with excessive off-chip data movement, which are compute-efficient in theory but power-hungry in practice, violating the 2W TDP limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 2W limit, 30 FPS.
    - INT8 MAC Energy: ~0.2 pJ.
    - Off-chip DRAM Energy: ~100 pJ.

    **Calculations:**
    - Energy Budget per frame = 2W / 30 FPS = 67 mJ.
    - Energy Ratio: 1 DRAM access = 500 INT8 MAC ops.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth Power Thresholding (Power-Bound)**. Memory architecture dictates thermal failure; maximizing contiguous operations keeps energy limits beneath the 67 mJ envelope.
