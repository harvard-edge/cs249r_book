title: Drone Power-Precision Tradeoff
scenario: A battery-powered drone runs obstacle avoidance at 30 FPS. The FP16 base model requires 10 GFLOPs/frame. The SoC has an FP16 GPU (2 TFLOPS peak, drawing 4W) and an INT8 NPU (8 TOPS peak, drawing 1W). Quantizing the model to INT8 increases the required compute to 12 GOPS due to quantization-aware scaling layers, and drops accuracy by 1%. The product manager suggests using the GPU to avoid the 20% compute penalty and accuracy drop.
question: Which accelerator should run obstacle avoidance to maximize flight time, given the 12 GOPS INT8 NPU model and 1% accuracy drop?
details:
  realistic_solution: Energy consumed per inference drives battery drain, not total operations. Despite the quantized model requiring 12 GOPS (vs 10 GFLOPs), the NPU operates at a staggering 8000 GOPS/W compared to the GPU's 500 GFLOPS/W. The NPU requires only 1.5mJ per frame versus 20mJ on the GPU. Leveraging the NPU increases battery lifespan exponentially, justifying the marginal 1% accuracy regression for edge deployment.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 20% increase in raw operations.
    **The Rationale:** Candidates assume that because the INT8 model requires more operations, it will inherently draw more total energy.
    **The Consequence:** They mistakenly choose the GPU, which completely drains the drone's battery far faster due to its lower power efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 GPU: 2 TFLOPS at 4W. Base model: 10 GFLOPs/frame.
    - INT8 NPU: 8 TOPS at 1W. Quantized model: 12 GOPS/frame.
    - Target rate: 30 FPS.

    **Calculations:**
    - GPU Efficiency: 2000 GFLOPS / 4W = 500 GFLOPS/W.
    - GPU Frame Energy: 10 GFLOPs / 500 GFLOPS/W = 20 mJ.
    - NPU Efficiency: 8000 GOPS / 1W = 8000 GOPS/W.
    - NPU Frame Energy: 12 GOPS / 8000 GOPS/W = 1.5 mJ.

    **Conclusion & Interpretation:**
    - **Result: 13x energy savings per frame (1.5 mJ vs 20 mJ) (Power Efficiency Bound)**. The NPU's massive architectural efficiency entirely overrides the 20% algorithmic penalty from quantization scaling layers.
