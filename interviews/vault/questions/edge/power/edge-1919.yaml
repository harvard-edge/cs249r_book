title: Quantifying Sustained Performance Degradation due to Thermal Throttling on Qualcomm Cloud AI 100
scenario: Your data center is deploying Qualcomm Cloud AI 100 accelerators. During continuous inference workloads in a high ambient temperature environment, you observe significant thermal throttling. This throttling restricts the average power consumption of a single card to 60W over a sustained 1-minute period, even though the card has a 75W TDP. Assume a linear relationship between power consumption and INT8 TOPS.
question: With power throttled from 75W to 60W, what sustained INT8 TOPS, percentage reduction, and general TOPS_effective formula do you get?
details:
  realistic_solution: 'Calculate the effective sustained TOPS assuming linear degradation. Use manufacturer power-performance curves in a real setting, as the relationship is rarely perfectly linear. Evaluate cooling strategies (e.g., enhanced airflow) or adjust workload scheduling to prevent prolonged thermal throttling.'
  common_mistake: |
    **The Pitfall:** Overlooking the difference between peak (burst) and sustained performance metrics.
    **The Rationale:** Candidates rely strictly on data sheet specifications without accounting for thermal equilibrium in continuous deployments.
    **The Consequence:** Systems fail to meet SLA throughputs under heavy load due to unmodeled thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Power (P_peak): 75W.
       - Peak Compute (TOPS_peak): 400 INT8 TOPS.
       - Sustained Power (P_sustained): 60W.
       - Linear power-to-performance scaling.
    2. **Calculations:**
       - General Formula: TOPS_effective = (P_sustained / P_peak) * TOPS_peak.
       - Effective Sustained TOPS = (60W / 75W) * 400 = 0.8 * 400 = 320 INT8 TOPS.
       - Percentage Reduction = ((400 - 320) / 400) * 100% = 20%.
    3. **Conclusion & Interpretation:**
       - **Result: 20% Compute Loss (320 TOPS)**. Thermal throttling directly shears 80 TOPS off the peak capacity, making sustained thermal management critical for data center ML ops.
