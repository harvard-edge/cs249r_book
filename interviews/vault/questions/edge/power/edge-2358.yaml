title: Jetson AGX Orin Duty-Cycle Energy Calculation
scenario: A Jetson AGX Orin deployed on a battery operates in a 15W active mode for 100ms to process a camera frame, then enters a 5W idle state for 900ms.
question: 'Apply duty-cycling formulas to calculate the total energy consumed in Joules over exactly 1 hour.'
visual:
  kind: svg
  path: edge-2358.svg
  alt: A step wave oscillating between 15W for brief periods and 5W for long periods.
  caption: Active vs Idle Power over Time.
details:
  realistic_solution: 'First, calculate the average power. The system is active 10% of the time and idle 90% of the time. P_avg = (15W * 0.1) + (5W * 0.9) = 1.5 + 4.5 = 6 Watts. Total energy is Power times time. Over 1 hour (3600 seconds), Energy = 6W * 3600s = 21,600 Joules.'
  common_mistake: |
    **The Pitfall:** Multiplying the 15W active power by the full hour.
    **The Rationale:** Candidates ignore the 90% idle period and assume peak power draw continuously over the time window.
    **The Consequence:** The calculated battery requirement is 2.5x larger than necessary, leading to significantly oversized and overpriced battery packs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active: 15W for 100ms.
    - Idle: 5W for 900ms.
    - Total cycle time: 1000ms (1 second).
    - Duration: 1 hour (3600 seconds).

    **Calculations:**
    - Duty Cycle = 100ms / 1000ms = 10% (0.1).
    - Average Power = (15W * 0.1) + (5W * 0.9) = 1.5W + 4.5W = 6W.
    - Total Energy = 6W * 3600s = 21,600 Joules.

    **Conclusion & Interpretation:**
    - **Result: 21,600 Joules (Power-Bound)**. Calculating battery size based on peak power instead of duty-cycle causes massive over-provisioning.
