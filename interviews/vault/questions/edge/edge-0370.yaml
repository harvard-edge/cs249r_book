title: The Autonomous Driving Bottleneck (edge-0370)
scenario: Your team is profiling a new LiDAR perception model on a Jetson AGX Orin. A single inference pass on your model requires 20 Trillion Operations and involves moving 40 GB of data (weights, activations, inputs).
question: Based on this, would you classify the model as compute-bound or memory-bound?
details:
  realistic_solution: 'The model is memory-bound. Calculate the device Ridge Point (compute/memory ratio) and the model Arithmetic Intensity (AI). Since the AI is less than the hardware Ridge Point, performance is limited by data fetching time, not compute speed.'
  common_mistake: |
    **The Pitfall:** Confusing a high absolute workload (e.g., 20 TOPS) with being compute-bound.
    **The Rationale:** Engineers assume massive operation counts naturally saturate compute cores.
    **The Consequence:** Optimization efforts incorrectly target operator fusion rather than essential weight quantization or memory caching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin: 275 TOPS compute, 204.8 GB/s memory bandwidth.
       - Model Workload: 20 TeraOps compute, 40 GB data.
    2. **Calculations:**
       - Device Ridge Point: 275,000 GigaOps / 204.8 GB/s = 1342.7 Ops/Byte.
       - Model Arithmetic Intensity (AI): 20,000 GigaOps / 40 GB = 500 Ops/Byte.
       - Comparison: AI (500) < Ridge Point (1343).
    3. **Conclusion & Interpretation:**
       - **Result: The model is severely limited by data movement. (Memory-Bandwidth-Bound)**
  options:
  - Compute-bound, because 20 TOPS is a significant workload that will saturate the compute units.
  - Memory-bound, because its Arithmetic Intensity (500 Ops/Byte) is lower than the Orin's Ridge Point (~1343 Ops/Byte).
  - Compute-bound, because its Arithmetic Intensity of 500 Ops/Byte is much higher than 1.
  - Memory-bound, because its Arithmetic Intensity is 0.5 Ops/Byte, which is very low.
