title: 'Edge TCO Evaluation: 3 Edge Hardware Options for Retail Analytics'
scenario: 'Evaluate 3 edge hardware options for a 500-store retail analytics deployment (1 unit/store,
  24/7, 30 FPS object detection): (A) Jetson Orin ($499, 60W), (B) Hailo-8+Pi5 ($280, 7.5W), (C) Intel
  NCS2+Pi4 ($175, 4W). 3-year TCO at $0.10/kWh. Which minimizes TCO and achieves 30 FPS YOLOv8s (INT8:
  9.3 GOPS)?'
details:
  realistic_solution: 'B power: 7.5W × 26,280hr × $0.10/1000 = $19.71. C power: 4W × 26,280hr × $0.10/1000
    = $10.51. Always divide W×hr×$/kWh by 1000.'
  common_mistake: Not checking if lower-cost options (NCS2) can actually achieve the required 30 FPS throughput
    for YOLOv8s, which may rule out certain hardware regardless of cost.
  napkin_math: 'Option B power: 7.5W × 26,280hr (3yr) × $0.10/kWh / 1000 = 7.5 × 26280 × 0.10 / 1000 =
    19,710 / 1000 = $19.71 (not $197.1). Option C power: 4W × 26,280hr × $0.10/kWh / 1000 = 4 × 26280
    × 0.10 / 1000 = 10,512 / 1000 = $10.51 (not $105.1). Both options missing /1000 conversion.'
