title: Multi-Model Data Streaming Bottleneck on Hailo-8
scenario: You are deploying a compound AI system consisting of an object detection model followed immediately by a pose estimation model onto a Hailo-8 accelerator. The accelerator delivers 26 TOPS of INT8 compute at 2.5W, and individual benchmarking shows each model takes exactly 2ms to execute. However, when running the end-to-end pipeline, latency spikes to over 18ms per frame. The Hailo-8 is a dataflow accelerator that lacks local DRAM, meaning all inputs and outputs must stream from host memory over PCIe.
question: "What is the root cause of the Hailo-8 pipeline jumping from two 2 ms models to over 18 ms end-to-end latency?"
details:
  realistic_solution: The root cause is PCIe bandwidth saturation caused by intermediate tensor round-tripping. Because the Hailo-8 lacks local DRAM, running two independent models requires streaming the first model's output back to host memory, and then streaming it back to the accelerator for the second model. The solution is to compile both models into a single context (model fusion) using the Hailo compiler, allowing activations to flow directly through the on-chip SRAM dataflow fabric without ever hitting the host.
  common_mistake: |
    **The Pitfall:** Focusing on compute utilization or host CPU bottlenecks.
    **The Rationale:** Candidates ignore the architectural constraint of missing local DRAM on dataflow accelerators.
    **The Consequence:** Missing the massive I/O penalty of intermediate tensor round-tripping and failing to fuse the models.
  napkin_math: |
    *   **Intermediate Tensor:** Assume 1280x720 with 32 channels in INT8 ≈ 29.5 MB.
    *   **PCIe Transfer:** On a PCIe Gen3 x4 (~4 GB/s), reading 29.5 MB takes ~7.4 ms. Writing back takes another ~7.4 ms.
    *   **I/O Overhead:** Total transfer overhead = 14.8 ms.
    *   **Total Latency:** 4 ms compute (2ms + 2ms) + 14.8 ms I/O = **18.8 ms**.
    *   **Result:** This matches the observed latency spike, proving PCIe saturation is the bottleneck.
