title: 'The USB Bandwidth Saturation'
scenario: 'You build an edge AI system using a Raspberry Pi 4. You attach three 1080p USB 3.0 webcams to run parallel inference. A single webcam runs at 30 FPS perfectly. When you plug in all three, the framerates randomly drop to 12 FPS, and the video feeds occasionally tear or corrupt. The CPU usage is only 40%.'
question: 'What physical limitation are you hitting when connecting three 1080p USB 3.0 webcams to a Raspberry Pi 4?'
details:
  realistic_solution: 'You saturated the Raspberry Pi 4''s internal PCIe x1 lane that connects the USB 3.0 host controller to the SoC. Each 1080p YUYV camera at 30 FPS requires ~124 MB/s of bandwidth. Three cameras need 373 MB/s, but all three USB 3.0 ports share a single PCIe Gen 2 x1 lane (~400 MB/s after protocol overhead). With three cameras, the bus is at ~93% capacity, causing frame drops and tearing when any burst exceeds the limit. The fix: use MJPEG compression on the cameras (reduces bandwidth 10x), or use a USB hub with a separate host controller on a different bus, or switch to a platform with more PCIe lanes.'
  common_mistake: |
    **The Pitfall:** Blaming the USB 3.0 ports themselves as being "too slow".
    **The Rationale:** A single USB 3.0 port provides 5 Gbps, which is plenty of bandwidth in theory, so candidates get confused when the system fails at a fraction of that limit.
    **The Consequence:** Replacing cameras or optimizing inference code, completely missing the fact that the bottleneck is the internal board routing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uncompressed 1080p YUYV frame: 1920 * 1080 * 2 bytes = 4.14 MB.
    - One camera at 30 FPS.
    - Three cameras.
    - Internal Bottleneck: The Pi 4 routes all USB 3.0 ports through a single internal PCIe Gen 2.0 x1 lane (~400 MB/s limit).

    **Calculations:**
    - One camera at 30 FPS: 4.14 MB * 30 = 124.4 MB/s.
    - Three cameras: 124.4 MB/s * 3 = 373.2 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 373.2 MB/s (I/O-Bound)**. At 373.2 MB/s, plus USB protocol overhead, the internal PCIe lane is severely saturated, causing dropped frames.
