title: Degradation Ladder for Autonomous Edge Perception
scenario: You are designing the perception system for an autonomous delivery robot running on an NVIDIA
  Jetson Orin (32 GB LPDDR5, 60W TDP). The robot typically runs a heavy multi-camera 3D object detector
  on the Ampere GPU, but extreme desert heat frequently causes thermal throttling, forcing the OS to cap
  power at 15W. Design a specification for a graceful degradation ladder that ensures the robot remains
  fail-operational, detailing how you would manage model fallbacks and utilize the DLA accelerator during
  these severe power constraints.
question: "How would you specify a fail-operational degradation ladder for Jetson Orin when thermal throttling caps power at 15W?"
details:
  realistic_solution: 'The specification should define a multi-tier ladder. Tier 1 (60W): Full 3D detection
    on the Ampere GPU. Tier 2 (Thermal Throttling to 15W): Shed quality-of-service tasks like long-range
    path planning, swap the heavy 3D detector for a lightweight 2D INT8 object detector, and pin this
    fallback model exclusively to the DLA. This keeps essential obstacle avoidance running at a lower
    power draw, allowing the robot to safely navigate to shade or a designated pull-over zone.'
  common_mistake: Candidates often propose a binary fail-safe approach (just stopping the robot) rather
    than a fail-operational degradation ladder. They also frequently overlook the heterogeneous compute
    architecture, failing to explicitly move workloads off the power-hungry GPU and onto the more efficient
    DLA when the power budget drops.
  napkin_math: The Jetson Orin provides 275 TOPS INT8 at its 60W TDP. Assuming the primary model uses
    100 TOPS on the GPU, throttling to 15W severely bottlenecks the GPU. A lightweight INT8 fallback model
    (e.g., YOLOv8-Nano) requires only ~2 TOPS. By shifting this 2 TOPS workload entirely to the DLA, you
    easily fit within the constrained 15W thermal budget while preserving the 32 GB LPDDR5 memory bandwidth
    for critical real-time OS and sensor I/O tasks.
