title: The Remote Debugging Nightmare
scenario: One of your 15,000 edge AI devices — a Hailo-8 module on an RPi CM4 deployed on an offshore oil platform — is producing erratic inference results. Detections flicker on and off every few seconds. The device is 200 miles offshore, accessible only by helicopter ($15,000 per trip). You have a 256 Kbps satellite link with 800ms round-trip latency.
question: How do you diagnose and fix the erratic inference issue remotely over a high-latency, low-bandwidth connection?
details:
  realistic_solution: 'Remote debugging on constrained links requires **asynchronous, batch-mode diagnostics** — not interactive sessions.'
  common_mistake: |
    **The Pitfall:** Attempting to SSH in and run diagnostic tools interactively.
    **The Rationale:** Engineers are used to fast, low-latency corporate networks where interactive debugging is standard.
    **The Consequence:** At 800ms RTT and 256 Kbps, interactive SSH is unusable, and streaming tools like `htop` will saturate the link and fail.
  napkin_math: |
    1. Helicopter debugging trip cost: $15,000 + 1 day engineer time ($2,000) = $17,000.
    2. Remote diagnostic cost: 94s of satellite bandwidth ($0.50) + 2 hours engineer time ($300) = $300.50.
    3. Savings per incident: $17,000 - $300.50 = $16,699.50.
    4. Annual savings (150 incidents): 150 * $16,700 = **~$2.5M/year**.
