title: The Remote Debugging Nightmare
scenario: One of your 15,000 edge AI devices — deployed on an offshore oil platform — is producing erratic inference results. Detections flicker on and off every few seconds. The device is 200 miles offshore, accessible only by helicopter ($15,000 per trip). You have a 256 Kbps satellite link with 800ms round-trip latency.
question: How do you diagnose and fix the erratic inference issue remotely over a high-latency, low-bandwidth connection?
details:
  realistic_solution: Extremely high-RTT environments dictate completely asynchronous observability architectures. Interactive TTY sessions will timeout or thrash. Deploy automated, batch-mode diagnostic profiling agents that capture dense trace payloads locally, highly compress them, and transmit them via delay-tolerant network protocols to a centralized cloud instance for post-hoc analysis.
  common_mistake: |
    **The Pitfall:** Attempting to SSH in and run diagnostic tools interactively.
    **The Rationale:** Engineers are used to fast, low-latency corporate networks where interactive debugging is standard.
    **The Consequence:** At 800ms RTT and 256 Kbps, interactive SSH is unusable, and streaming tools like `htop` will saturate the link and fail.
  napkin_math: |
    **Assumptions & Constraints:**
       - Satellite link: 800ms RTT, 256 Kbps
       - Diagnostic event duration: 94s
       - Cost of on-site visit: $17,000
    **Calculations:**
       - Bandwidth consumption limit: Interactive SSH fails at 800ms RTT and requires higher continuous bandwidth.
       - Remote resolution cost: ~$300
       - Savings per intervention: $17,000 - $300 = $16,700
    **Conclusion & Interpretation:**
       - **Result: Latency-Bound UX.** High-RTT satellite links prevent interactive sessions, demanding asynchronous logging and automated edge profiling over continuous streams.
