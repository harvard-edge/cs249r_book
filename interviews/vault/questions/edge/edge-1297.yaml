title: Diagnosing Cost Overruns in Edge LLM Deployment
scenario: A 10-billion parameter transformer model (INT8 quantized) is deployed on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 136 GB/s, 400 TOPS INT8, 75W) for batch-size-1 autoregressive inference. An initial estimate predicted 50 tokens/second because the model only needs 20 GOPS per token. However, staging tops out at 13.6 tokens/second.
question: Why did the compute-only estimate fail, and what is the actual hardware bottleneck limiting performance to 13.6 tokens/second?
details:
  realistic_solution: The candidate must identify that the LPDDR4x memory subsystem
    is the root cause of the severe under-utilization. For batch-size-1 autoregressive
    inference, the entire model must be loaded from memory to generate a single token.
    Cost and capacity estimations for edge accelerators running large models must
    be calculated using a roofline model bounded by memory bandwidth, not just peak
    TOPS.
  common_mistake: |
    **The Pitfall:** Assuming hardware cost estimation is solely compute-bound.
    **The Rationale:** Candidates look at the massive 400 TOPS specification and ignore memory bandwidth entirely.
    **The Consequence:** Drastically overestimating batch-size-1 autoregressive decoding performance, leading to massive under-provisioning of hardware and budget overruns.
  napkin_math: |
    1. **Model Size (INT8)**: 10B parameters * 1 byte = 10 GB.
    2. **Memory Bandwidth Limit**: 136 GB/s (LPDDR4x).
    3. **Memory-bound Throughput**: 136 GB/s / 10 GB/token = **13.6 tokens/sec**.
    4. **Compute required**: 2 * 10B = 20 GOPS/token.
    5. **Actual compute throughput**: 13.6 tokens/sec * 20 GOPS = 272 GOPS (0.272 TOPS).
    6. **Compute utilization**: 0.272 TOPS / 400 TOPS = **0.068%**. The system is entirely memory-bound.
