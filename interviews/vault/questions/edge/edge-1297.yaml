title: Diagnosing Cost Overruns in Edge LLM Deployment
scenario: A 10-billion parameter transformer model (INT8 quantized) is deployed on an edge accelerator for batch-size-1 autoregressive inference. An initial estimate predicted 50 tokens/second because the model only needs 20 GOPS per token. However, staging tops out at 13.6 tokens/second.
question: Why did the compute-only estimate fail, and what is the actual hardware bottleneck limiting performance to 13.6 tokens/second?
details:
  realistic_solution: The candidate must identify that the memory subsystem is the root cause of the severe under-utilization. For batch-size-1 autoregressive inference, the entire model must be loaded from memory to generate a single token. Cost and capacity estimations for edge accelerators running large models must be calculated using a roofline model bounded by memory bandwidth, not just peak TOPS.
  common_mistake: |
    **The Pitfall:** Assuming hardware cost estimation is solely compute-bound.
    **The Rationale:** Candidates look at the massive TOPS specification and ignore memory bandwidth entirely.
    **The Consequence:** Drastically overestimating batch-size-1 autoregressive decoding performance, leading to massive under-provisioning of hardware and budget overruns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 10B parameters, INT8 (1 byte/param).
       - Memory Bandwidth: 136 GB/s.
       - Compute capability: 400 TOPS.
       - Compute required: 20 GOPS/token.
    2. **Calculations:**
       - Model Size: 10B * 1 byte = 10 GB.
       - Memory-bound Throughput: 136 GB/s / 10 GB/token = 13.6 tokens/sec.
       - Compute utilized: 13.6 tokens/sec * 20 GOPS = 272 GOPS (0.272 TOPS).
       - Compute utilization: 0.272 TOPS / 400 TOPS = 0.068%.
    3. **Conclusion & Interpretation:**
       - **Result: 13.6 tokens/sec at 0.068% compute utilization.** The system is heavily bottlenecked by memory. **System Bottleneck: Memory-Bound (Bandwidth)**.
