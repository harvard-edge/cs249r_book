title: Hailo-8 Multi-Model Packing
scenario: A smart city intersection processes 4 1080p cameras. The current ResNet-50 model uses 4 TOPS per camera stream.
question: Calculate the utilization of a single Hailo-8 chip and determine how many additional 1 TOPS pedestrian detection models can fit within the remaining compute budget.
details:
  realistic_solution: The Hailo-8 provides 26 TOPS of compute. Four streams at 4 TOPS consume 16 TOPS, resulting in roughly 61% utilization. There are 10 TOPS remaining. Therefore, 10 additional 1 TOPS pedestrian models can theoretically be deployed without exceeding the accelerator's capacity.
  common_mistake: |
    **The Pitfall:** Failing to multiply the base model cost by the number of camera streams.
    **The Rationale:** Candidates often subtract the cost of a single model instead of accounting for the full multi-stream workload.
    **The Consequence:** The remaining compute budget is overestimated, leading to deployment failures when the NPU is saturated.
  napkin_math: |
    - Hailo-8 total capacity: 26 TOPS.
    - Current usage: 4 cameras * 4 TOPS = 16 TOPS.
    - Remaining capacity: 26 - 16 = 10 TOPS.
    - Additional 1 TOPS models: 10 / 1 = **10 models**.
