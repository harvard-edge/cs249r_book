title: Hailo-8 Multi-Model Packing
scenario: A smart city intersection processes 4 1080p cameras. The current ResNet-50 model uses 4 TOPS per camera stream.
question: Calculate the utilization of a single Hailo-8 chip and determine how many additional 1 TOPS pedestrian detection models can fit within the remaining compute budget.
details:
  realistic_solution: 'Calculate the total baseline TOPS consumed by multiplying the per-stream cost by the camera count. Subtract this from the hardware''s maximum capacity to yield the remaining headroom for secondary models.'
  common_mistake: |
    **The Pitfall:** Failing to multiply the base model cost by the number of concurrent sensor streams.
    **The Rationale:** Candidates subtract the cost of a single model instead of accounting for the multi-stream workload duplication.
    **The Consequence:** Overestimating remaining compute, causing immediate deployment failure and latency spikes when the NPU is saturated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware capacity: 26 TOPS.
       - Stream count: 4 cameras.
       - Base model cost: 4 TOPS per stream.
       - Secondary model cost: 1 TOPS each.
    2. **Calculations:**
       - Total baseline usage = 4 cameras * 4 TOPS/camera = 16 TOPS.
       - Hardware Utilization = 16 TOPS / 26 TOPS = 61.5%.
       - Remaining budget = 26 TOPS - 16 TOPS = 10 TOPS.
       - Additional models = 10 TOPS / 1 TOPS/model = 10 models.
    3. **Conclusion & Interpretation:**
       - **Result: 10 Models Fit**. The system can safely pack 10 additional pedestrian models, maximizing the NPU investment before requiring a second chip.
