title: The AV Training Bottleneck
scenario: You are an ML Systems Engineer at an autonomous vehicle company, optimizing the in-car training loop for a 500M parameter perception model. The prototype compute unit has two identical accelerators on a single board, connected by a 50 GB/s interconnect. Each accelerator is rated for 50 TFLOPS (FP16). When using a standard data parallel strategy, you only achieve a 1.2x speedup over a single accelerator, far from the ideal 2x. A profiler identifies the gradient `AllReduce` step as a 20ms bottleneck in every training step.
question: Why is data parallelism only giving 1.2x speedup, and what parallelism strategy should replace it?
details:
  realistic_solution: Data parallelism fundamentally requires synchronizing gradients across all nodes. The 20ms `AllReduce` transfer time creates a severe serial bottleneck governed by Amdahl's Law. Migrating to Pipeline Parallelism partitions the model layers across chips, replacing the massive `AllReduce` with vastly smaller intermediate activation transfers, radically reducing the communication-to-compute ratio.
  common_mistake: |
    **The Pitfall:** Blaming unrelated components like the data input pipeline or assuming the hardware is flawed.
    **The Rationale:** Engineers often default to data parallelism without analyzing the communication-to-compute ratio, or they attempt to brute-force the problem with larger batches.
    **The Consequence:** They fail to fix the underlying ratio of serial communication to parallel compute governed by Amdahl's Law, leaving the scaling bottleneck unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 500M (FP16)
       - Interconnect Bandwidth: 50 GB/s
       - Local Compute Latency: 30 ms
    2. **Calculations:**
       - Gradient size: 500,000,000 * 2 bytes = 1 GB
       - Synchronization transfer time: 1 GB / 50 GB/s = 0.02 s = 20 ms
       - Total step time: 30 ms (compute) + 20 ms (sync) = 50 ms
       - Sync overhead: 20 ms / 50 ms = 40%
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound Bottleneck.** The 20 ms AllReduce step serializes the pipeline; pipeline parallelism is required to minimize this transfer overhead.
  options:
  - The data input pipeline is starving the accelerators. Increase the number of CPU data loader workers.
  - The interconnect is insufficient for data parallelism. The hardware is flawed and a faster version (>200 GB/s) is needed.
  - The `AllReduce` communication is a serial bottleneck. Switch to Pipeline Parallelism to reduce cross-accelerator data transfer.
  - The batch size is too small, leading to low arithmetic intensity. Double the batch size to better saturate the hardware.
  correct_index: 2
