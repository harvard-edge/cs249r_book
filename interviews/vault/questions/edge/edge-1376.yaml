title: 4-Bit Weight Packing for Coral Edge TPU Bandwidth
scenario: You are deploying a model to a Google Coral Edge TPU, which features a strict INT8-only compute pipeline providing 4 TOPS at 2W over a USB/PCIe interface. To overcome a severe memory bottleneck on the host bus, you apply extreme quantization by compressing weights to 4-bit and packing two weights into each INT8 register to halve memory transfers.
question: If your device interface has an effective memory bandwidth of 8 GB/s and the model contains 32 million parameters, what is the maximum memory-bound inference rate after packing 32M 4-bit weights over an 8 GB/s interface?
details:
  realistic_solution: 'The correct approach calculates the total data transferred per inference after the 4-bit compression. By packing two 4-bit weights into one 8-bit byte (which the Coral can then unpack for its INT8 pipeline), each parameter consumes 0.5 bytes of memory bandwidth. Dividing the total memory bandwidth by the per-inference memory footprint yields the maximum throughput.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert bits to bytes, or assuming the TPU natively executes 4-bit math.
    **The Rationale:** Candidates miscalculate the memory footprint and miss that packing is a bandwidth optimization requiring INT8 unpacking on-chip.
    **The Consequence:** Incorrect throughput estimations and fundamentally misunderstanding the system's memory bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32M parameters packed into 4-bit (0.5 bytes/param)
    - Effective bandwidth: 8 GB/s

    **Calculations:**
    - Memory per inference = 32M * 0.5 bytes = 16 MB
    - Bandwidth = 8,000 MB/s
    - Max throughput = 8,000 MB/s / 16 MB = 500 inferences/sec

    **Conclusion & Interpretation:**
    - **Result: 500 inferences/sec (Bandwidth-Bound)**. 4-bit packing doubles memory-bound inference rate.
