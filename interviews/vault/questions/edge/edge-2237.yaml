title: 'LoRA Inference on Jetson Orin: Adapter Fusion Strategy'
scenario: You are deploying a fine-tuned LLM with a LoRA adapter on Jetson Orin.
question: Should you merge the LoRA adapter before deployment or apply it dynamically during inference on Jetson Orin?
details:
  realistic_solution: 'Merge for edge deployment: dynamic LoRA requires two matmuls (xA and (xA)B) per adapted layer per token. On Orin with 275 TOPS, these extra matmuls cost ~0.5ms per layer for a 7B model. With 32 layers: 16ms overhead per decode step on top of ~80ms base decode = 20% overhead. Merging eliminates this entirely. Only keep dynamic adapters if: (1) multiple adapters needed simultaneously, (2) adapter switching is needed within a session.'
  common_mistake: |
    **The Pitfall:** Always merging adapters for zero inference overhead.
    **The Rationale:** Candidates fail to mathematically quantify the actual overhead of dynamic adapters on edge hardware, assuming the compute penalty is massive.
    **The Consequence:** Losing the flexibility of dynamic multi-LoRA switching for a negligible performance gain, though merging does correctly save memory bandwidth.
  napkin_math: |
    1. Jetson Orin GPU compute = 275 TOPS INT8.
    2. LoRA rank-16 adapter extra compute per layer = 2 * (seq_len * d_model * rank) MACs.
    3. For seq_len=1, d_model=4096, rank=16: 2 * 4096 * 16 = 131K MACs.
    4. For 32 layers: 32 * 131K = 4.2M MACs.
    5. Compute latency overhead = 4.2M / 275 TOPS = 15ns (negligible).
    6. Memory bandwidth overhead: 32 layers * 2 matrices * 4096 * 16 * 2 Bytes = 8.4 MB of extra weight reads.
    7. Merging is not strictly necessary for compute latency, but it **saves 8.4 MB of LPDDR5 memory bandwidth reads** per decode step.
