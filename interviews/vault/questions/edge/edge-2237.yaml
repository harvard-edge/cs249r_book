title: 'LoRA Inference on Jetson Orin: Adapter Fusion Strategy'
scenario: You are deploying a fine-tuned LLM with a LoRA adapter on Jetson Orin.
question: Should you merge the LoRA adapter before deployment or apply it dynamically during inference on Jetson Orin?
details:
  realistic_solution: Merge for edge deployment. Dynamic LoRA requires two matmuls per adapted layer per token. On edge devices, these extra matmuls introduce latency and memory bandwidth overhead. Merging eliminates this entirely. Only keep dynamic adapters if multiple adapters are needed simultaneously or adapter switching is needed within a session.
  common_mistake: |
    **The Pitfall:** Always merging adapters for zero inference overhead.
    **The Rationale:** Candidates fail to mathematically quantify the actual overhead of dynamic adapters on edge hardware, assuming the compute penalty is massive.
    **The Consequence:** Losing the flexibility of dynamic multi-LoRA switching for a negligible compute gain, though merging does correctly save memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin GPU compute = 275 TOPS INT8.
       - LoRA rank-16 adapter (seq_len=1, d_model=4096).
       - 32 layers.
    2. **Calculations:**
       - Extra compute per layer = 2 * (1 * 4096 * 16) = 131K MACs.
       - Total extra compute (32 layers) = 32 * 131K = 4.2M MACs.
       - Compute latency overhead = 4.2M / 275 TOPS = 15 ns (negligible).
       - Memory bandwidth overhead = 32 layers * 2 matrices * 4096 * 16 * 2 Bytes = 8.4 MB of extra weight reads.
    3. **Conclusion & Interpretation:**
       - **Merging is not strictly necessary for compute latency, but it saves 8.4 MB of memory bandwidth reads per decode step. Result: Memory-Bandwidth Bound.**
