title: Activation Spilling Latency on Dataflow Accelerators
scenario: You are deploying a high-resolution vision model to a Hailo-8 edge AI processor (26 TOPS INT8,
  2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, any intermediate activations
  that exceed the on-chip SRAM must be streamed to and from the host memory. The model contains a bottleneck
  layer that produces a 256x256x64 INT8 activation tensor which cannot fit on-chip and must be spilled
  over a host interface with a 4 GB/s effective bandwidth. Calculate the exact latency penalty added to
  a single inference pass by spilling and reloading this specific activation tensor.
details:
  realistic_solution: The correct approach is to calculate the size of the INT8 activation tensor in megabytes
    based on its dimensions. Because the accelerator lacks local DRAM, it must write the tensor to host
    memory and subsequently read it back for the next layer. The candidate must calculate the time taken
    for both the write and read operations using the host interface bandwidth to find the total latency
    penalty.
  common_mistake: Candidates often calculate only the memory footprint of the activation tensor but fail
    to quantify the dual read/write latency cost over the host bus. They might also mistakenly assume
    the accelerator has local DDR memory like a typical GPU, ignoring the platform's streaming architecture.
  napkin_math: '1. Tensor size: 256 spatial width * 256 spatial height * 64 channels = 4,194,304 elements.

    2. At INT8 precision (1 byte per element), the total activation size is exactly 4 MB.

    3. Write latency to stream out to host: 4 MB / 4000 MB/s = 1.0 ms.

    4. Read latency to stream back from host: 4 MB / 4000 MB/s = 1.0 ms.

    5. Total added latency penalty per inference pass = 1.0 ms + 1.0 ms = 2.0 ms.'
