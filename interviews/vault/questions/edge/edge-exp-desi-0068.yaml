title: Zero-DRAM Accelerator Host Memory Scheduling
scenario: You are designing a multi-camera traffic monitoring system using a host SoC with 4GB of shared
  DRAM and a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS INT8 at 2.5W but has no local
  DRAM, relying entirely on continuous streaming of inputs, intermediate activations, and outputs to and
  from the host memory. The system processes four concurrent 1080p video streams through a cascaded pipeline
  (detection followed by dynamically cropped classifications). Because the accelerator relies strictly
  on host memory streaming, the host OS frequently experiences memory pressure, severe fragmentation from
  dynamic crops, and OOM kills during bursty traffic scenes. Design a host-level memory management and
  scheduling architecture that prevents OOM events and fragmentation while maximizing the Hailo-8's utilization.
details:
  realistic_solution: The optimal design implements a pre-allocated contiguous memory pool (e.g., using
    Linux CMA or hugepages) on the host to completely bypass the OS virtual memory manager and eliminate
    fragmentation. Since Hailo-8 streams dataflow continuously, dynamic crops must be padded to fixed
    sizes or packed into uniform tensor shapes before streaming. The host scheduler must enforce strict
    backpressure by tracking available blocks in the memory pool; if the pool is exhausted by intermediate
    activations, the system drops incoming frames rather than triggering an OS-level OOM.
  common_mistake: Candidates often propose adding OS-level swap space, relying on garbage collection,
    or attempting to cache weights locally on the accelerator, ignoring that the Hailo-8 has zero local
    DRAM. They frequently overlook the severe memory fragmentation caused by dynamically sized crop buffers
    streaming back and forth from the host.
  napkin_math: Host RAM = 4GB. OS/System reserve = 1.5GB. Available contiguous memory pool for Hailo-8
    streaming = 2.5GB. A 1080p INT8 frame (1920x1080x3) = 6.2MB. 4 concurrent streams using a triple-buffer
    ring = 12 frames = 74.4MB. If the detection model requires streaming 40MB of intermediate activations/outputs
    back to the host per frame, 4 streams = 160MB. Fixed-size crop buffer pool = 2.5GB - 0.23GB (base)
    = 2.27GB. At 10MB per cropped tensor, the system can hold exactly 227 crops in host memory before
    the scheduler must drop frames to enforce OOM safety.
