title: Data Pruning for Edge TPU Object Detection
scenario: You are tasked with specifying a data selection and pruning strategy for an object detection model to be deployed on a Google Coral Edge TPU. The target hardware provides 4 TOPS at INT8 precision, consumes 2W of power, and requires all operations to be fully quantized to INT8 to avoid costly fallbacks.
question: How would you select a 500k-image coreset from 5 million images to maximize accuracy after INT8 deployment on Coral Edge TPU?
details:
  realistic_solution: The strategy requires a quantization-aware data selection curriculum. First, train a small proxy model and apply post-training quantization to INT8. Use this quantized proxy to score the 5 million images, prioritizing data points where the INT8 proxy exhibits high uncertainty or divergence from an FP32 teacher, ensuring the 500k coreset teaches features robust to the Edge TPU's limited operator support.
  common_mistake: |
    **The Pitfall:** Using generic active learning scores derived from an FP32 model.
    **The Rationale:** Candidates forget the target hardware constraints, assuming FP32 uncertainty perfectly mirrors INT8 uncertainty.
    **The Consequence:** The selected coreset over-indexes on subtle features that are subsequently obliterated during INT8 quantization, severely capping deployed accuracy.
  napkin_math: |
    1. **Compute Cost:** A standard CNN processing a 300x300 image requires ~2 GOPS.
    2. **Hardware Limits:** Google Coral Edge TPU delivers 4 TOPS (4,000 GOPS).
    3. **Latency:** Inference takes 2 / 4000 = 0.5 milliseconds per frame (2,000 FPS theoretically).
    4. **Power Envelope:** Energy per inference is 2W * 0.5ms = **1mJ**.
    5. **Impact:** Selecting data that forces a CPU fallback (breaking full INT8 quantization) would multiply latency by 10x+ and shatter the 2W power budget.
