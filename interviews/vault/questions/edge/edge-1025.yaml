title: Mastering Power-Aware Pipeline Scheduling on Jetson Orin
scenario: 'A Jetson Orin (60W TDP) compound AI pipeline runs: vision encoder (15W,
  20ms), embedding model (10W, 8ms), LLM decoder (55W, 200ms per query). When all
  three run simultaneously, the system draws 80W and triggers thermal throttling,
  reducing LLM throughput by 40%. A battery-powered deployment requires average power
  under 35W over any 10-second window. Design a power-aware scheduling strategy.'
question: How would you schedule the three Jetson Orin pipeline stages to keep average
  power under 35W over any 10-second window?
details:
  realistic_solution: 'Pipeline the stages with explicit power budgeting: assign each
    stage to a non-overlapping time slot within the query budget. Vision encoder (15W,
    20ms) -> embedding (10W, 8ms) -> LLM (55W, 200ms) = 228ms serial, peak power = max(15,10,55)=55W.
    Idle power between queries is ~5W. At 35W average: 350J budget over 10s. Active
    pipeline: 15*0.020 + 10*0.008 + 55*0.200 = 11.38J per query. Let N be queries per 10s:
    N*11.38J + (10 - N*0.228)*5W = 350J -> 10.24*N = 300 -> N = 29.3 queries. Queue
    queries and execute at max 2.9 queries/s.'
  common_mistake: 'Running all pipeline stages at maximum performance simultaneously,
    assuming the OS will handle power limits via DVFS. Jetson Orin''s DVFS responds
    to thermals with hundreds of milliseconds of lag, meaning the pipeline thrashes:
    run fast, overheat, throttle, recover, repeat.'
  napkin_math: 'Energy per query: 15W*20ms + 10W*8ms + 55W*200ms = 11.38J. 35W average
    * 10s = 350J budget per 10s window. If idle power is 5W, base idle energy over 10s
    is 50J, leaving 300J for active compute. Net energy cost per query = Active Energy
    - (Active Time * Idle Power) = 11.38J - (0.228s * 5W) = 11.38 - 1.14 = 10.24J.
    Max queries = 300J / 10.24J = 29.29 queries per 10s window. Achievable at ~2.9 qps.'
