title: Mastering Power-Aware Pipeline Scheduling on Jetson Orin
scenario: 'A Jetson Orin compound AI pipeline runs: vision encoder (15W, 20ms), embedding model (10W, 8ms), LLM decoder (55W, 200ms per query). When all three run simultaneously, the system draws 80W and triggers thermal throttling. A battery-powered deployment requires average power under 35W over any 10-second window.'
question: How would you schedule the three Jetson Orin pipeline stages to keep average power under 35W over any 10-second window?
details:
  realistic_solution: 'Pipeline the stages with explicit power budgeting: assign each stage to a non-overlapping time slot within the query budget. Vision encoder (15W, 20ms) -> embedding (10W, 8ms) -> LLM (55W, 200ms) = 228ms serial, peak power = max(15,10,55)=55W. Idle power between queries is ~5W. At 35W average: 350J budget over 10s. Active pipeline: 15*0.020 + 10*0.008 + 55*0.200 = 11.38J per query. Let N be queries per 10s: N*11.38J + (10 - N*0.228)*5W = 350J -> 10.24*N = 300 -> N = 29.3 queries. Queue queries and execute at max 2.9 queries/s.'
  common_mistake: |
    **The Pitfall:** Running all pipeline stages simultaneously and relying on the OS for power limiting.
    **The Rationale:** Candidates assume Dynamic Voltage and Frequency Scaling (DVFS) will gracefully cap power without scheduling intervention.
    **The Consequence:** The Jetson's DVFS has lag; the pipeline thrashes (run fast, overheat, throttle, recover, repeat), destroying predictable throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vision encoder: 15W, 20ms
       - Embedding model: 10W, 8ms
       - LLM decoder: 55W, 200ms per query
       - Target Budget: 35W average over 10-second window
       - Idle Power: ~5W
    2. **Calculations:**
       - Active Energy per Query: (15W * 0.020s) + (10W * 0.008s) + (55W * 0.200s) = 11.38 Joules
       - Active Time: 0.020s + 0.008s + 0.200s = 0.228s
       - 10-Second Energy Budget: 35W * 10s = 350 Joules
       - Base Idle Energy (10s): 5W * 10s = 50 Joules
       - Available Active Budget: 350 Joules - 50 Joules = 300 Joules
       - Net Energy Cost per Query: 11.38 Joules - (0.228s * 5W) = 10.24 Joules
       - Max Queries per 10s: 300 Joules / 10.24 Joules = 29.3 queries
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** Queue queries and execute at a maximum of 2.9 QPS to stay under the 35W average limit without triggering thermal throttling.
