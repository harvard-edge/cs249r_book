title: 'Edge TCO Fluency: ROI Calculation for Edge vs Cloud'
scenario: Estimate from memory: an edge AI camera system (Hailo-8+Pi5, $280 total, 7.5W, $0.10/kWh) replacing a human reviewer earning $40K/year in a quality control line that inspects 1 item/second.
question: What is the corrected 3-year TCO for one Hailo-8+Pi5 system after including power and 5% annual maintenance?
details:
  realistic_solution: TCO = hardware $280 + power $19.71 + maintenance $42 = $341.71 after correcting the power calculation.
  common_mistake: |
    **The Pitfall:** Calculating ROI based only on hardware vs labor cost.
    **The Rationale:** Candidates forget ongoing OpEx like power and maintenance, and ignore that humans work 40-hour weeks while machines operate 24/7.
    **The Consequence:** They produce wildly inaccurate financial projections that get rejected by business stakeholders.
  napkin_math: |
    1. **Hardware Cost**: $280.
    2. **Power Cost (3 yrs)**: 7.5W * 24 hours * 365 days * 3 years = 197,100 Wh = 197.1 kWh. At $0.10/kWh = **$19.71**.
    3. **Maintenance (3 yrs)**: 5% of $280 = $14/year * 3 years = **$42**.
    4. **Total TCO**: $280 + $19.71 + $42 = **$341.71**.
