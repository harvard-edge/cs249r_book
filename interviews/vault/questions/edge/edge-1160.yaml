title: 'Edge TCO Fluency: ROI Calculation for Edge vs Cloud'
scenario: 'Estimate from memory: an edge AI camera system ($280 total, 7.5W, $0.10/kWh) replacing a human reviewer earning $40K/year in a quality control line that inspects 1 item/second.'
question: What is the corrected 3-year TCO for one edge system after including power and 5% annual maintenance?
details:
  realistic_solution: TCO = hardware $280 + power $19.71 + maintenance $42 = $341.71 after correcting the power calculation.
  common_mistake: |
    **The Pitfall:** Calculating ROI based only on hardware vs labor cost.
    **The Rationale:** Candidates forget ongoing OpEx like power and maintenance, and ignore that humans work 40-hour weeks while machines operate 24/7.
    **The Consequence:** They produce wildly inaccurate financial projections that get rejected by business stakeholders.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Cost: $280
       - Power Usage: 7.5W
       - Power Rate: $0.10/kWh
       - Timeframe: 3 years (24/7 operation)
       - Maintenance: 5% of hardware cost annually
    2. **Calculations:**
       - Power Consumption (3 yrs): 7.5W * 24 hours * 365 days * 3 years = 197.1 kWh
       - Total Power Cost: 197.1 kWh * $0.10/kWh = $19.71
       - Total Maintenance Cost (3 yrs): ($280 * 0.05) * 3 years = $14 * 3 = $42.00
       - Total TCO: $280.00 + $19.71 + $42.00 = $341.71
    3. **Conclusion & Interpretation:**
       - **Result: TCO Optimized.** A rigorous total cost of ownership analysis proves the edge deployment ($341.71) is vastly cheaper than human labor over a 3-year lifecycle.
