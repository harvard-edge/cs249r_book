title: The INT8 Memory Diet
scenario: Your team is deploying a large perception model for an autonomous vehicle onto a new piece of
  hardware, a specialized ECU with a powerful accelerator but limited local memory. The model's weights
  currently consume 16 GB of storage in FP16 format. To reduce the memory footprint, you plan to quantize
  the weights to INT8. Explain the expected memory footprint of the model's weights after quantization.
question: "What will the weights' memory footprint be after quantizing the 16 GB FP16 model to INT8?"
details:
  realistic_solution: The memory footprint will be halved. FP16 (half-precision floating-point) uses 16
    bits, or 2 bytes, to represent each parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte. By converting
    each parameter from a 2-byte representation to a 1-byte representation, the total memory required
    for the weights is reduced by exactly 50%.
  common_mistake: A common mistake is to assume quantization provides a magical, complex compression ratio.
    Another is to mistakenly use the size of FP32 (4 bytes) as the baseline for the calculation instead
    of FP16 (2 bytes), leading to an incorrect 4x reduction.
  napkin_math: Initial Memory (FP16) = 16 GB | Bytes per parameter (FP16) = 2 | Bytes per parameter (INT8)
    = 1
  options:
