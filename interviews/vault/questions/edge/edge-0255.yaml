title: The INT8 Memory Diet
scenario: A perception model's weights consume 16 GB of storage in FP16 format. To reduce the memory footprint on a specialized ECU, the team plans to quantize the weights to INT8.
question: What will the total memory footprint of the model's weights be after quantizing from FP16 to INT8?
details:
  realistic_solution: The memory footprint will be halved. FP16 (half-precision floating-point) uses 16
    bits, or 2 bytes, to represent each parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte. By converting
    each parameter from a 2-byte representation to a 1-byte representation, the total memory required
    for the weights is reduced by exactly 50%.
  common_mistake: |
    **The Pitfall:** Assuming an incorrect baseline or complex compression ratio.
    **The Rationale:** Engineers mistakenly use FP32 (4 bytes) as the baseline instead of FP16, leading to an incorrect 4x reduction assumption.
    **The Consequence:** Overestimating the memory savings and potentially deploying a model that still exceeds hardware limits.
  napkin_math: |
    1. **Initial Memory**: 16 GB in FP16.
    2. **Bytes per FP16 parameter**: 2 bytes.
    3. **Bytes per INT8 parameter**: 1 byte.
    4. **Reduction factor**: 1 / 2 = 50%.
    5. **Final Memory**: 16 GB * 50% = **8 GB**.
  options:
  - 4 GB
  - 16 GB
  - 8 GB
  - 12 GB
  correct_index: 2
