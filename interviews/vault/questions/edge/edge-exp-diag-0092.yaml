title: INT8 Quantization Impact on Equalized Odds
scenario: You are deploying a pedestrian detection model to a Google Coral Edge TPU (4 TOPS INT8, 2W)
  for a smart city intersection. In your FP32 pre-deployment evaluation, the model achieves equalized
  odds across all demographic subgroups. However, upon deploying the compiled model to the Coral Edge
  TPU, you receive reports that the system's recall drops by 25% specifically for pedestrians with darker
  clothing and skin tones in low-light conditions, violating demographic parity. What hardware-mandated
  transformation caused this localized degradation, and how do you diagnose it?
details:
  realistic_solution: The root cause is the mandatory INT8 quantization required to run operators on the
    Coral Edge TPU. The limited 8-bit dynamic range disproportionately squashes the subtle, low-contrast
    activations required to identify the minority subgroup in poor lighting. To diagnose, compare the
    per-channel activation distributions between the FP32 and INT8 models using a calibration set heavily
    weighted with the affected subgroup, then implement Quantization-Aware Training (QAT) to preserve
    these specific feature boundaries.
  common_mistake: Candidates typically assume the issue stems from biased training data or suggest collecting
    more diverse data and retraining. They fail to recognize that the FP32 model was already proven fair,
    missing the critical hardware constraint that the deployment target forced a destructive precision
    reduction.
  napkin_math: The Coral Edge TPU requires mapping FP32 values to 256 discrete INT8 bins. If a critical
    convolutional layer has an overall activation range of [-6.0, 6.0], the INT8 step size is 12.0 / 255
    ≈ 0.047. If distinguishing the affected subgroup relies on subtle activation differences of ~0.02
    (due to low contrast), this critical signal is completely lost because 0.02 is less than the 0.047
    resolution limit, mapping both background and subject to the exact same INT8 bin while majority subgroups
    with high-contrast signals (>0.1) remain unaffected.
