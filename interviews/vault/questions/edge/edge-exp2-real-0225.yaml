title: Edge TPU Storage Format and I/O Throughput Sizing
scenario: You are deploying an object detection model to an industrial inspection camera accelerated by
  a Google Coral Edge TPU via a USB 3.0 interface. The system needs to buffer hard negative examples locally
  on an eMMC drive for daily batch uploads. You must evaluate and select an appropriate storage format
  and quantify the I/O throughput to ensure the Edge TPU's 4 TOPS INT8 processing capability is utilized
  efficiently without exceeding the overall 2W power budget.
question: "What storage format should the Coral pipeline use for hard negatives on eMMC, and how would you size I/O to keep the Edge TPU fed?"
details:
  realistic_solution: The optimal approach is to store pre-processed, INT8 quantized image tensors in
    a simple row-based format like uncompressed TFRecord or a raw flat buffer. Because the Edge TPU requires
    INT8 inputs and has limited operator support, storing the data exactly as it will be consumed avoids
    costly on-device format conversion and decompression, reserving the 2W power budget for actual model
    execution rather than data wrangling.
  common_mistake: Candidates often suggest complex columnar formats like Parquet or heavily compressed
    formats (like JPEG or PNG) to save storage space, failing to realize the weak host CPU will consume
    too much power and time decompressing and decoding them before inference. They also frequently forget
    to align the storage format with the TPU's strict INT8 quantization requirement.
  napkin_math: Assume input tensors are 300x300x3 INT8 (270 KB per frame). To fully saturate the 4 TOPS
    Edge TPU with a 1 GOP/frame model, the theoretical maximum frame rate is 4000 FPS. This would require
    4000 * 270 KB = 1.08 GB/s of I/O bandwidth. However, a USB 3.0 interface caps at ~400 MB/s effective
    throughput. This limits the realistic maximum to ~1480 FPS (400 MB/s / 270 KB). Storing pre-quantized,
    uncompressed INT8 tensors minimizes host CPU overhead, ensuring we can actually hit this 400 MB/s
    USB bottleneck rather than being CPU-bound during decompression.
