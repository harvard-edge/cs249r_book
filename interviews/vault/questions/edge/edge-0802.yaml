title: The Adversarial Patch Attack
scenario: Your autonomous vehicle's camera-based detection system correctly identifies stop signs 99.9% of the time. A security researcher demonstrates that a carefully designed sticker (an adversarial patch) placed on a stop sign causes your model to classify it as a speed limit sign with 95% confidence. Your model is state-of-the-art.
question: How do you defend against this adversarial patch attack?
details:
  realistic_solution: 'Defense in depth — no single layer is sufficient. A single adversarial patch defeats a single model with 95% confidence. Adding a second independent model does NOT reduce this to 5% — if both models have the same vulnerability, joint success is 0.95 x 0.95 = 90.25%. The key is architectural diversity: a CNN and a ViT fail on different adversarial patterns, reducing joint success to ~20-40%. Layer additional defenses: (1) HD map prior rejects ''speed limit sign'' classifications at known stop sign locations, (2) temporal majority voting over 30 frames exploits the fact that physical patches only work at specific viewing angles, and (3) LiDAR/radar cross-modal verification provides a non-visual check. The combination makes successful attacks practically infeasible.'
  common_mistake: |
    **The Pitfall:** Retraining the model with adversarial examples or adding input preprocessing.
    **The Rationale:** Candidates treat this as a pure deep learning problem rather than a systems engineering vulnerability.
    **The Consequence:** The defense is easily circumvented by new patches, leaving the vehicle completely vulnerable.
  napkin_math: |
    * Single model success rate: 95%
    * Dual identical architecture success: 0.95 * 0.95 = 90.25% (insufficient)
    * Dual diverse architecture (CNN + ViT): ~20-40% success
    * Map prior (99% accurate): rejects ~99% of false classes (0.40 * 0.01 = 0.4%)
    * Temporal filter (30 frames): limits success to specific angles (<3.5%)
    * **Combined defense in depth reduces attack success to <<0.1%, making it economically infeasible.**
