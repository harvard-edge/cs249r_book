title: The Adversarial Patch Attack
scenario: Your autonomous vehicle's camera-based detection system correctly identifies stop signs 99.9%
  of the time. A security researcher demonstrates that a carefully designed sticker (an adversarial patch)
  placed on a stop sign causes your model to classify it as a speed limit sign with 95% confidence. Your
  model is state-of-the-art. How do you defend against this?
question: "How do you defend against this?"
details:
  realistic_solution: 'Defense in depth — no single layer is sufficient. A single adversarial patch defeats
    a single model with 95% confidence. Adding a second independent model does NOT reduce this to 5% —
    if both models have the same vulnerability, joint success is 0.95 x 0.95 = 0.90%. The key is architectural
    diversity: a CNN and a ViT fail on different adversarial patterns, reducing joint success to ~20-40%.
    Layer additional defenses: (1) HD map prior rejects ''speed limit sign'' classifications at known
    stop sign locations, (2) temporal majority voting over 30 frames exploits the fact that physical patches
    only work at specific viewing angles, and (3) LiDAR/radar cross-modal verification provides a non-visual
    check. The combination makes successful attacks practically infeasible.'
  common_mistake: '"Retrain the model with adversarial examples" or "Add input preprocessing to detect
    patches." Adversarial training helps but is an arms race — new patches can always be designed. Input
    preprocessing is easily circumvented.'
  napkin_math: '**Single model:** Adversarial patch success rate = 95%. Miss rate (correct detection)
    = 5%. | **Dual independent models (defense):** If the two models are truly independent with identical
    95% attack success, the probability BOTH are fooled = 0.95 x 0.95 = **90.25%.** This is NOT sufficient
    defense. However, if models use different architectures (e.g., CNN + ViT) with uncorrelated failure
    modes, empirically the joint attack success drops to ~20-40% because adversarial patches are architecture-specific.
    | **Map prior + model ensemble:** Attacker must fool the model AND be at a location where the map
    database expects a speed limit sign (not a stop sign). If map coverage is 99% accurate: attack success
    = 0.90 x 0.01 = **0.9%.** | **Temporal filter (majority vote over 30 frames):** Patch must cause misclassification
    in >15 of 30 frames. Physical patches work only at specific angles/distances. If per-frame success
    = 35% (due to angle variation): P(>15 of 30) = Σ(binomial) ≈ **3.5%.** | **Combined (ensemble + map
    + temporal):** << 0.1%. Defense in depth makes the attack economically infeasible.'
