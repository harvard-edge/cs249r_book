title: Hailo-8 Stream Profiling and Latency Bottleneck Analysis
scenario: You are designing a high-throughput video analytics pipeline using a host CPU connected to a Hailo-8 accelerator via PCIe. The Hailo-8 is a dataflow accelerator capable of 26 TOPS at INT8 precision, but profiling shows the end-to-end latency is significantly higher than expected and accelerator utilization is poor. Given that the Hailo-8 has no local DRAM and relies on streaming data directly from host memory.
question: What comprehensive profiling architecture would you specify to determine whether Hailo-8 latency comes from preprocessing, PCIe bandwidth, or dataflow stalls?
details:
  realistic_solution: "The specification must include host-side system profiling (e.g., using perf or eBPF) to measure CPU pre-processing latency and PCIe bus monitoring to track the actual streaming throughput. The candidate should also specify using Hailo's native profiling tools (nsys profiling equivalent for Hailo) to analyze the compiled dataflow graph, ensuring that the accelerator is not stalling due to data starvation caused by host memory bandwidth limits."
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the accelerator's compute capacity and pruning the model.
    **The Rationale:** Candidates overlook Hailo-8's lack of local DRAM and fail to profile the host-to-device PCIe streaming rate.
    **The Consequence:** Degrading model accuracy via quantization/pruning while the actual latency issue (host memory bandwidth) remains unfixed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1080p RGB frame (6.22 MB)
       - Target: 60 FPS
       - Hailo-8 Peak: 26 TOPS
    2. **Calculations:**
       - Required host streaming rate = 6.22 MB * 60 = 373.2 MB/s
       - If host memory saturated, streaming drops to 150 MB/s
       - NPU stall time = (373.2 - 150) / 373.2 = 59.8%
    3. **Conclusion & Interpretation:**
       **Result: NPU stalls 59.8% of the time (Bandwidth-Bound)**
