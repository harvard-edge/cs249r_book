title: Dataflow Accelerator CNN Architecture Evaluation
scenario: You are evaluating two CNN architectures for real-time video analytics on a Hailo-8 dataflow accelerator. Architecture A uses depthwise separable convolutions to minimize FLOPs. Architecture B uses standard grouped convolutions, resulting in 40% more theoretical FLOPs but different memory access patterns.
question: Since the Hailo-8 has no local DRAM and relies on streaming from host memory, which architecture do you choose and how do you evaluate their actual on-device performance?
details:
  realistic_solution: Architecture B is superior for this specific target. The Hailo-8 is a dataflow accelerator that must stream weights and activations from host memory. Depthwise convolutions are heavily memory-bound due to low data reuse. By switching to grouped or standard convolutions, the arithmetic intensity increases, allowing the 26 TOPS compute engine to achieve much higher utilization, ultimately resulting in lower latency despite the higher FLOP count.
  common_mistake: |
    **The Pitfall:** Equating lower theoretical FLOPs strictly with lower latency.
    **The Rationale:** Candidates ignore arithmetic intensity and the host-memory bandwidth bottleneck of streaming accelerators.
    **The Consequence:** Deploying memory-bound depthwise models that cripple performance on dataflow hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Hailo-8 (dataflow architecture, streams from host memory).
       - PCIe Host Bandwidth: 4 GB/s.
       - Depthwise Convolution AI: ~9 Ops/Byte.
       - Grouped Convolution AI: ~500 Ops/Byte.
    2. **Calculations:**
       - Depthwise streaming compute limit: 4 GB/s * 9 Ops/Byte = 36 GOPS.
       - Grouped streaming compute limit: 4 GB/s * 500 Ops/Byte = 2000 GOPS (2 TOPS).
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth Wall**. Grouped convolutions execute roughly 55x faster (2000 GOPS vs 36 GOPS) than depthwise layers because their higher arithmetic intensity overcomes the strict host-memory streaming bottleneck.
