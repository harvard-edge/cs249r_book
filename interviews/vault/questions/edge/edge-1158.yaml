title: 'Edge TCO Fluency: Quick TCO Estimation for Edge Deployment'
scenario: 'Without a calculator, estimate from memory the 3-year TCO for: (1) 100 Jetson Orin units at 60W, $499 each, $0.10/kWh, (2) 100 Coral Edge TPU systems at 2W, $25 each, $0.10/kWh, (3) At what daily inference volume does option 2 beat cloud at $0.001/inference? Show the annual power cost formula and break-even derivation.'
question: What are the 3-year TCOs for the Jetson Orin and Coral Edge TPU fleets, and at what volume does Coral beat the cloud?
details:
  realistic_solution: '(1) Jetson Orin: 100 * $499 = $49.9K CapEx. Power: 100 * 60W * 26,280h * $0.10 / 1000 = $15.7K. Total = $65.6K. (2) Coral: 100 * $25 = $2.5K CapEx. Power: 100 * 2W * 26,280h * $0.10 / 1000 = $525. Total = $3,025. (3) Break-even vs Cloud: Coral 3-year TCO per unit is $30.25. Cloud is $0.001/inf. Break-even volume = $30.25 / $0.001 = 30,250 inferences per unit over 3 years, or about 28 inferences per day.'
  common_mistake: 'Using annual power = watts * hours * rate without dividing watts by 1000 to convert to kWh, or ignoring the power cost entirely for edge accelerators.'
  napkin_math: 'Jetson TCO: $49.9K + 100 * 60W * 26280h * $0.1 / 1000 = $49.9K + $15.76K = $65.66K. Coral TCO: $2.5K + 100 * 2W * 26280 * $0.1 / 1000 = $2.5K + $0.52K = $3.02K. Break-even for 1 Coral unit: Cost = $30.25. Cloud = $0.001 * Vol. Vol = 30,250 over 3 years. Daily = 30250 / 1095 days = 27.6 inferences/day.'
