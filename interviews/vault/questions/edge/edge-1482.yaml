title: Hailo-8 Multi-Model Pipeline Design and Host Memory Offloading
scenario: 'You are designing an edge AI system using a host processor connected via PCIe to a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Your system needs to run a cascade of three models: an object detector, a pose estimator, and an action recognition model. Since the Hailo-8 is a dataflow accelerator without local DRAM, all intermediate activations must be streamed back to the host memory between models.'
question: Would you fuse the detector, pose, and action models for Hailo-8 or deploy separate ONNX graphs, and why?
details:
  realistic_solution: A successful design minimizes PCIe round-trips by aggressively fusing the three models into a single continuous dataflow graph during the ONNX-to-Hailo compiler stage. If complete fusion isn't possible due to operator coverage gaps, the candidate must strategically place the split points at layers with the smallest activation volumes (bottlenecks). Furthermore, they should evaluate delegating unsupported operations (like complex custom NMS) to the host CPU while keeping the heavy INT8 matrix multiplications entirely on the Hailo-8.
  common_mistake: Candidates often treat the Hailo-8 like a traditional GPU with its own HBM/DRAM, failing to account for the host memory streaming requirement. They might design a pipeline with massive intermediate feature maps (like high-res feature pyramids) moving back and forth across the PCIe bus, causing severe memory bandwidth bottlenecks that stall the accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor: 1x256x64x64 INT8 (1 MB).
    - Framerate: 30 FPS.

    **Calculations:**
    - Streaming back and forth: 2 * 1 MB * 30 FPS = 60 MB/s per link.
    - Scaling to 8 cameras and multiple high-res maps quickly saturates Gen3 PCIe.

    **Conclusion & Interpretation:**
    - **Result: 60 MB/s per link (Memory-Bandwidth Bound)**. Fusing models minimizes PCIe round-trips and host memory contention on dataflow architectures.
