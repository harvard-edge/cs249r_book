title: Hailo-8 Multi-Model Pipeline Design and Host Memory Offloading
scenario: 'You are designing an edge AI system using a host processor connected via
  PCIe to a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Your system needs to run a cascade
  of three models: an object detector, a pose estimator, and an action recognition
  model. Since the Hailo-8 is a dataflow accelerator without local DRAM, all intermediate
  activations must be streamed back to the host memory between models. Evaluate the
  architectural tradeoffs of model fusion versus separate ONNX models, considering
  host-accelerator PCIe bandwidth limitations and the specific constraints of the
  Hailo-8 architecture.'
question: Would you fuse the detector, pose, and action models for Hailo-8 or deploy
  separate ONNX graphs, and why?
details:
  realistic_solution: A successful design minimizes PCIe round-trips by aggressively
    fusing the three models into a single continuous dataflow graph during the ONNX-to-Hailo
    compiler stage. If complete fusion isn't possible due to operator coverage gaps,
    the candidate must strategically place the split points at layers with the smallest
    activation volumes (bottlenecks). Furthermore, they should evaluate delegating
    unsupported operations (like complex custom NMS) to the host CPU while keeping
    the heavy INT8 matrix multiplications entirely on the Hailo-8.
  common_mistake: Candidates often treat the Hailo-8 like a traditional GPU with its
    own HBM/DRAM, failing to account for the host memory streaming requirement. They
    might design a pipeline with massive intermediate feature maps (like high-res
    feature pyramids) moving back and forth across the PCIe bus, causing severe memory
    bandwidth bottlenecks that stall the accelerator.
  napkin_math: Assume the intermediate activation between Model A and Model B is a
    1x256x64x64 INT8 tensor. Size = 256 * 64 * 64 bytes = 1 MB. At 30 FPS, streaming
    this back to the host and then back to the Hailo-8 requires 2 * 1 MB * 30 = 60
    MB/s of PCIe bandwidth just for one intermediate link. While within Gen3 limits,
    doing this for multiple high-res feature maps simultaneously across 4-8 cameras
    quickly saturates bus bandwidth and host memory controllers, proving the need
    for model fusion on dataflow architectures.
