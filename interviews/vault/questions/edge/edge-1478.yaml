title: Multi-TPU Routing for High-Frequency Industrial Inspection
scenario: You are designing the inference architecture for an industrial gateway receiving 8 concurrent 60 FPS video streams. The system is equipped with an array of 4 Google Coral Edge TPUs via a PCIe switch running an INT8-quantized defect detection model.
question: How would you route 8 concurrent 60 FPS streams across four Coral Edge TPUs while minimizing latency and PCIe contention?
details:
  realistic_solution: 'Implement a device-aware, stateful routing strategy. Pin specific camera streams to specific TPUs to maintain cache locality and avoid context switching. Use a least-outstanding-requests queue per TPU rather than round-robin, ensuring the load balancer dispatches batches optimized for INT8 SRAM limits.'
  common_mistake: |
    **The Pitfall:** Using standard cloud load balancing techniques like simple round-robin.
    **The Rationale:** Candidates ignore the stateful nature of Edge TPUs and the severe penalty of PCIe host-to-device transfers.
    **The Consequence:** Constant model reloading and cache thrashing on the 8MB SRAM, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 8 streams * 60 FPS = 480 FPS total.
    - Hardware: 4 TPUs.
    - Model speed: 10ms per inference (max 100 FPS per TPU).

    **Calculations:**
    - Total capacity: 4 TPUs * 100 FPS/TPU = 400 FPS.
    - Required capacity: 480 FPS.
    - Deficit: 480 - 400 = 80 FPS.

    **Conclusion & Interpretation:**
    - **Result: 80 FPS Deficit (Compute-Bound)**. The system will bottleneck. It requires either dynamically downsampling streams to 50 FPS or adding a 5th TPU.
