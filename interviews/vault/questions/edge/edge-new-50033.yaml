title: TFLite vs ONNX Runtime Micro for Resource-Constrained Edge Devices
scenario: You need to run a MobileNetV3-small model on a Jetson Orin Nano (8GB, 40 TOPS, 15W). Both TFLite
  GPU delegate and ONNX Runtime with CUDA EP are available. TFLite uses OpenCL, ONNX RT uses CUDA. Which
  runtime yields better throughput per watt?
question: "Which runtime yields better throughput per watt?"
details:
  realistic_solution: 'For MobileNetV3 (which is dominated by depthwise separable convolutions), TFLite
    GPU delegate often wins on edge devices because: (1) It fuses more aggressively for depthwise conv
    patterns. (2) OpenCL kernels are lightweight with lower launch overhead than CUDA for small ops. (3)
    TFLite''s memory planning is optimized for low-memory devices. Benchmarks typically show TFLite GPU:
    ~2.5ms, ONNX RT CUDA EP: ~3.1ms on Orin Nano. However, for transformer models, ONNX RT CUDA EP is
    30-40% faster due to better matmul dispatch. Choose based on your model architecture.'
  common_mistake: Assuming CUDA is always faster than OpenCL on NVIDIA hardware. While CUDA has lower-level
    access, TFLite's GPU delegate with OpenCL has been heavily optimized for mobile/edge inference and
    can be competitive for standard CNN architectures.
  napkin_math: 'Orin Nano: 40 TOPS at 15W. MobileNetV3-small: ~56M MACs = 112M OPs. At 40 TOPS: 0.003ms
    compute floor. Actual ~2.5ms means 0.1% compute utilization — the model is entirely memory-bound at
    this scale. Throughput/watt: 400 inferences/sec / 15W = 26.7 inf/J.'
