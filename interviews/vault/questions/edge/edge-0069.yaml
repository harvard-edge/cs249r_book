title: 'The Duty Cycling Power Budget'
scenario: 'Your edge device has a 30W steady-state thermal budget, but your perception model requires 45W to run at full speed (30 FPS). You can''t upgrade the cooling.'
question: 'How do you run a 45W workload on a 30W thermal budget?'
details:
  realistic_solution: 'Duty cycling. Run inference at full power (45W) for a burst period, then idle (5W) to let the thermal mass absorb and dissipate the heat. The average power must stay at or below 30W. The math: if you run for $t_{on}$ seconds at 45W and idle for $t_{off}$ seconds at 5W, the average power is $(45 \times t_{on} + 5 \times t_{off}) / (t_{on} + t_{off}) \leq 30$. Solving: $t_{on}/t_{off} \leq 25/15 = 5/3$. So for every 5 seconds of inference, you idle for 3 seconds. Effective duty cycle: 62.5%. If the full model runs at 30 FPS, your effective rate is 30 x 0.625 = 18.75 FPS average.'
  common_mistake: |
    **The Pitfall:** Reducing the model size until it naturally fits within 30W.
    **The Rationale:** Candidates assume continuous execution is required, failing to utilize the physical thermal mass of the system.
    **The Consequence:** Sacrificing model accuracy unnecessarily instead of using duty-cycling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target average power $\le$ 30W.
    - Workload: 45W on, 5W off.
    - Model throughput: 30 FPS.

    **Calculations:**
    - Balance equation: (45 $\times$ 5s + 5 $\times$ 3s) / 8s = 240 / 8 = 30W.
    - Effective duty cycle: 5/8 (62.5%).
    - Effective FPS: 30 FPS $\times$ (5/8).

    **Conclusion & Interpretation:**
    - **Result: 18.75 FPS average (Thermal-Bound)**. Thermal budget directly constrains sustained throughput via duty-cycling bursts.
