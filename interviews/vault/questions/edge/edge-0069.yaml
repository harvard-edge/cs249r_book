title: The Duty Cycling Power Budget
scenario: Your edge device has a 30W steady-state thermal budget, but your perception model requires 45W
  to run at full speed (30 FPS). You can't upgrade the cooling. How do you run a 45W workload on a 30W
  thermal budget?
question: "How do you run a 45W workload on a 30W thermal budget?"
details:
  realistic_solution: 'Duty cycling. Run inference at full power (45W) for a burst period, then idle (5W)
    to let the thermal mass absorb and dissipate the heat. The average power must stay at or below 30W.
    The math: if you run for $t_{on}$ seconds at 45W and idle for $t_{off}$ seconds at 5W, the average
    power is $(45 \times t_{on} + 5 \times t_{off}) / (t_{on} + t_{off}) \leq 30$. Solving: $t_{on}/t_{off}
    \leq 25/15 = 5/3$. So for every 5 seconds of inference, you idle for 3 seconds. Effective duty cycle:
    62.5%. If the full model runs at 30 FPS, your effective rate is 30 × 0.625 = **18.75 FPS average**.
    The trade-off is explicit: thermal budget directly constrains sustained throughput. During the off
    period, the system can use the last detection result or run a lightweight tracker to interpolate.'
  common_mistake: '"Reduce the model size until it fits in 30W." This sacrifices accuracy. There''s a
    way to keep the full model.'
  napkin_math: '45W on, 5W off. Target: ≤30W average. $t_{on} = 5s$, $t_{off} = 3s$. Average = (45×5 +
    5×3) / 8 = 240/8 = **30W** ✓. Effective FPS = 30 × (5/8) = 18.75 FPS. With 2s on / 1.5s off: (45×2
    + 5×1.5) / 3.5 = 97.5/3.5 = **27.9W** ✓. Effective FPS = 30 × (2/3.5) = 17.1 FPS.'
