title: 'The Corrupted Sensor Stream'
scenario: 'Your team''s autonomous driving perception model works perfectly on your validation dataset but is underperforming in a new production vehicle fleet. The training data was collected from a vehicle using a 4-lane MIPI CSI-2 camera interface, capturing raw, uncompressed video. The new production vehicle, as a cost-saving measure, uses a 2-lane MIPI CSI-2 interface for the same camera.'
question: 'How can switching from a 4-lane to 2-lane MIPI CSI-2 interface hurt accuracy, and how do their data rates compare if 4 lanes provide 2.5 GB/s?'
details:
  realistic_solution: 'The core issue is a bandwidth bottleneck in the sensor interconnect, which creates training-serving skew. The 4-lane MIPI interface has double the bandwidth of the 2-lane one. If the camera''s raw data rate exceeds the 2-lane interface''s capacity, the system is forced to either drop frames or apply lossy compression (like MJPEG) before the data even reaches the main processor. The model, trained on pristine, uncompressed images, now receives a stream with compression artifacts or missing temporal information, leading to a significant drop in accuracy for tasks like object detection or semantic segmentation.'
  common_mistake: |
    **The Pitfall:** Focusing only on the compute capabilities of the edge device while ignoring the sensor data pipeline.
    **The Rationale:** Engineers often assume the camera feed quality will perfectly match the uncompressed training data.
    **The Consequence:** Bandwidth limitations force lossy compression or frame drops, creating severe training-serving skew.
  napkin_math: |
    - 4-lane MIPI CSI-2 bandwidth: **~2.5 GB/s**.
    - 2-lane MIPI CSI-2 bandwidth: 2.5 GB/s / 2 = **1.25 GB/s**.
    - Impact: If raw video exceeds 1.25 GB/s, the system must drop frames or compress, degrading quality.
  options:
  - 'The 2-lane interface has half the bandwidth (1.25 GB/s), but this only increases latency and doesn''t change the image data itself.'
  - 'The camera''s data rate is only 2.5 GB/s, so it won''t be a problem for either interface.'
  - 'The 2-lane interface has half the bandwidth (1.25 GB/s), which may force the system to apply lossy compression or drop frames, causing a training-serving skew.'
  - 'The MIPI interface bandwidth is irrelevant; the bottleneck would be the Jetson AGX Orin''s memory bandwidth (204.8 GB/s), which is much higher.'
  correct_index: 2
