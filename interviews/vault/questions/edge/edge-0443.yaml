title: The Autonomous Vehicle Interconnect Trap
scenario: You are diagnosing a latency problem in a vehicle's central compute unit, which uses two powerful GPUs on the same board. GPU-A runs LiDAR perception and GPU-B runs camera perception; their outputs are fused by transferring a 512 MB feature map. The end-to-end latency must be under 33ms.
question: Why can two same-board GPUs still show multi-millisecond transfer stalls, and what interconnect should the platform use?
details:
  realistic_solution: 'The GPUs are communicating over the motherboard''s standard PCIe bus. A `cudaMemcpyPeerAsync` via a PCIe switch incurs significant protocol latency and requires root complex arbitration. The platform must use a direct GPU-to-GPU interconnect like NVLink, bypassing the CPU and PCIe fabric.'
  common_mistake: |
    **The Pitfall:** Modeling data transfer cost simply as `size / bandwidth`.
    **The Rationale:** Engineers forget the fixed latency overhead of the PCIe bus protocol and CPU DMA orchestration.
    **The Consequence:** Underestimating the impact of protocol latency, which dominates real-time loops for medium-sized tensors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 512 MB
       - NVLink: ~1 µs latency, 900 GB/s bandwidth
       - PCIe: ~100 µs protocol overhead, 32 GB/s bandwidth
    2. **Calculations:**
       - NVLink transfer time: (512 MB / 900 GB/s) + 1 µs ~ 0.57 ms
       - PCIe transfer time: (512 MB / 32 GB/s) + 100 µs ~ 16.1 ms
    3. **Conclusion & Interpretation:**
       - **Result: 28x Slower on PCIe.** The 16.1ms PCIe transfer consumes half the real-time budget, whereas NVLink completes in 0.57ms.
  options:
  - The InfiniBand network card connecting the two GPUs is faulty.
  - The CPU is bottlenecked scheduling the DMA transfer; upgrade the CPU.
  - The GPUs are communicating over the general-purpose PCIe bus, which adds significant protocol overhead. Use NVLink.
  - Quantize the model from FP16 to INT8 to cut transfer size.
  correct_index: 2
