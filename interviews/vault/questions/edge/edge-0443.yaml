title: The Autonomous Vehicle Interconnect Trap
scenario: You are a Staff ML Systems Engineer at an autonomous vehicle startup. Your team is diagnosing a latency problem in the new flagship vehicle's central compute unit, which uses two powerful GPUs on the same board. GPU-A runs LiDAR perception and GPU-B runs camera perception; their outputs are fused for path planning by transferring a 512 MB feature map. The end-to-end latency from sensor-to-actuator must be under the 33ms hard real-time budget.
question: Why can two same-board GPUs still show multi-millisecond transfer stalls, and what interconnect should the platform use?
details:
  realistic_solution: The most likely cause is that the GPUs are communicating over the motherboard's PCIe bus. While they are on the same physical board, they are electrically connected as separate devices through a PCIe switch. A `cudaMemcpyPeerAsync` call between them still invokes a DMA transfer that must be arbitrated by the PCIe root complex, incurring significant protocol latency. This path (GPU-A -> PCIe switch -> Root Complex -> PCIe switch -> GPU-B) is orders of magnitude slower than a direct, dedicated interconnect. A proper AV compute platform would use a technology like NVLink, which acts as a direct memory bridge between GPUs, bypassing the CPU and PCIe fabric entirely and reducing transfer latency by over 10x.
  common_mistake: |
    **The Pitfall:** Modeling data transfer cost simply as `size / bandwidth`.
    **The Rationale:** Engineers forget to account for the fixed latency overhead of the bus protocol and CPU orchestration.
    **The Consequence:** They underestimate the impact of protocol latency, which can dominate real-time loops for medium-sized tensors.
  napkin_math: |
    * NVLink latency: ~1 µs; NVLink bandwidth: 900 GB/s
    * PCIe latency: ~5–10 µs per transaction + DMA setup ~50 µs; PCIe bandwidth: 32 GB/s
    * NVLink 512 MB transfer: 512 MB / 900 GB/s + 1 µs ≈ 0.57 ms
    * PCIe 512 MB transfer: 512 MB / 32 GB/s + ~100 µs overhead ≈ 16.1 ms
    * **The ~28x latency difference (~16.1 ms vs 0.57 ms) causes the multi-millisecond stalls on PCIe.**
  options:
  - The InfiniBand network card connecting the two GPUs is faulty, causing high latency packet re-transmissions.
  - The CPU is bottlenecked scheduling the DMA transfer; upgrading to a CPU with more cores would solve the issue.
  - The GPUs are communicating over the general-purpose PCIe bus, which adds significant protocol overhead. The platform needs a direct GPU-to-GPU interconnect like NVLink.
  - The 512MB tensor is too large. The model should be quantized from FP16 to INT8 to cut the data transfer size by 50%.
  correct_index: 2
