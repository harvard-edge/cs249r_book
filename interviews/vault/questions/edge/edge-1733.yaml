title: Optimizing 4K Image Pipelines for Cloud AI 100
scenario: 'You are architecting the data pipeline for an on-premise manufacturing defect detection system using multiple AI accelerators. The system ingests uncompressed 4K video feeds (3840x2160, RGB) from factory floor cameras at a combined rate of 120 FPS.'
question: 'How would you partition decoding, resizing, and normalization between the host and accelerator to keep 4K 120 FPS inference from starving?'
details:
  realistic_solution: 'Move resizing and normalization to the host CPU or a dedicated ISP before sending data over PCIe. Implement asynchronous DMA transfers and double-buffering. Sending raw 4K frames directly over PCIe overwhelms memory bandwidth, so downsampling must happen upstream.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the accelerator's peak compute TOPS.
    **The Rationale:** Candidates assume the accelerator's peak TOPS is the only relevant metric for total pipeline throughput.
    **The Consequence:** They design a pipeline that starves the accelerator due to massive memory bandwidth bottlenecks from handling uncompressed 4K frames in LPDDR4x memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Uncompressed 4K frame size: 3840 * 2160 * 3 bytes = ~24.88 MB.
       - Ingest rate: 120 FPS.
       - Accelerator single-chip target: 30 FPS.
    2. **Calculations:**
       - Raw ingest at 120 FPS: 120 * 24.88 MB/s = ~2.98 GB/s.
       - Host-to-device bandwidth needed for 30 FPS: 30 * 24.88 = 746 MB/s.
       - Theoretical compute limit (assume 200 GOPS/frame on 400 TOPS chip): 2000 FPS.
       - Feeding 2000 uncompressed 4K frames/sec demands 49.76 GB/s memory bandwidth (exceeds bus limits).
    3. **Conclusion & Interpretation:**
       - **The pipeline must resize inputs prior to inference to prevent memory bandwidth from bottlenecking the system.** (Result: Memory-Bandwidth Bound)
