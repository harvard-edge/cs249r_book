title: Optimizing 4K Image Pipelines for Cloud AI 100
scenario: 'You are architecting the data pipeline for an on-premise manufacturing defect detection system using a server equipped with multiple Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). The system ingests uncompressed 4K video feeds (3840x2160, RGB) from factory floor cameras at a combined rate of 120 FPS.'
question: 'How would you partition decoding, resizing, and normalization between the host and Cloud AI 100 to keep 4K 120 FPS inference from starving?'
details:
  realistic_solution: 'An L5 engineer will evaluate the data transfer costs and propose moving resizing and normalization to the host or a dedicated ISP before sending data over PCIe to the accelerator. To keep the AI 100 utilized, the pipeline must implement asynchronous DMA transfers and double-buffering in the 32 GB LPDDR4x memory. They will justify their design by balancing host CPU load, PCIe bandwidth, and the accelerator''s memory bandwidth, ensuring the INT8 compute units remain saturated.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the 400 TOPS compute capacity.
    **The Rationale:** Candidates assume the accelerator's peak TOPS is the only relevant metric for throughput.
    **The Consequence:** They design a pipeline that starves the accelerator due to massive memory bandwidth bottlenecks from handling uncompressed 4K frames in LPDDR4x memory.
  napkin_math: |
    * Uncompressed 4K frame size = 3840 × 2160 × 3 bytes = 24.88 MB.
    * Raw ingest at 120 FPS = 120 × 24.88 MB/s = 2.98 GB/s.
    * AI 100 single-chip target = 30 FPS. Required host-to-device bandwidth = 30 × 24.88 MB/s = 746 MB/s.
    * A 100-frame ping-pong buffer = 2.48 GB, which easily fits in the 32 GB LPDDR4x.
    * Assuming a model requires 200 GOPS per frame, theoretical compute limit = 400,000 / 200 = 2000 FPS.
    * Feeding 2000 uncompressed 4K frames/sec would demand 2000 × 24.88 MB = 49.76 GB/s of memory bandwidth.
    * **Conclusion: The pipeline must resize inputs (e.g., to 640x640) prior to inference to prevent memory bandwidth from bottlenecking the system.**
