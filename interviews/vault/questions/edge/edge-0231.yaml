title: 'The INT8 Energy Dividend: Extreme Quantization'
scenario: An automotive engineering team is optimizing a perception model on a new
  ADAS platform. To meet the thermal budget, they are converting key layers from FP32
  to INT8. For a compute-bound operation, what is the approximate energy saving per
  operation when switching from FP32 to INT8?
question: For a compute-bound operation, what is the approximate energy saving per
  operation when switching from FP32 to INT8?
details:
  realistic_solution: The energy saving is approximately 18x. The energy consumed
    by a digital CMOS operation is proportional to the capacitance being switched,
    which scales with the number of transistors and logic complexity. An 8-bit integer
    multiplier has far fewer transistors and simpler logic than a 32-bit floating-point
    unit, leading to this dramatic reduction in energy per operation.
  common_mistake: Engineers often mistakenly assume the energy savings are linear
    with the bit-width reduction (i.e., 32/8 = 4x). They forget that the energy cost
    of a multiplier scales non-linearly with the bit-width and complexity. Others
    confuse the INT8 savings with the much smaller FP16 savings (~3.4x).
  napkin_math: Based on silicon physics invariants, an FP32 multiply-accumulate (MAC)
    consumes ~18x more energy than an INT8 MAC. If an FP32 operation costs 18 picojoules
    (pJ), the equivalent INT8 operation costs just 1 pJ. For a compute-bound layer
    doing 100 GOPS, FP32 takes 1.8 Watts (100e9 * 18e-12), while INT8 takes 0.1 Watts
    (100e9 * 1e-12), saving 1.7W of thermal load per 100 GOPS.
  options:
  - ~4×
  - ~3.4×
  - ~18×
  - ~2×
  correct_index: 2
