title: 'The INT8 Energy Dividend: Extreme Quantization'
scenario: An automotive engineering team is optimizing a perception model on a new ADAS platform. To meet the thermal budget, they are converting key layers from FP32 to INT8.
question: For a compute-bound operation, what is the approximate energy saving per operation when switching from FP32 to INT8?
details:
  realistic_solution: The energy saving is approximately 18x. The energy consumed by a digital CMOS operation is proportional to the capacitance being switched, which scales with the number of transistors and logic complexity. An 8-bit integer multiplier has far fewer transistors and simpler logic than a 32-bit floating-point unit, leading to this dramatic reduction in energy per operation.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are linearly proportional to bit-width reduction (i.e., 32/8 = 4x).
    **The Rationale:** Engineers linearly scale the bit-width without understanding the underlying silicon physics of transistor switching.
    **The Consequence:** They drastically underestimate the energy dividend of extreme quantization, often confusing INT8 savings with FP16 savings (~3.4x).
  napkin_math: |
    * FP32 MAC energy ≈ 18 pJ.
    * INT8 MAC energy ≈ 1 pJ.
    * For a compute-bound layer doing 100 GOPS:
      * FP32 power = $100 \times 10^9 \times 18 \times 10^{-12}$ = 1.8 Watts.
      * INT8 power = $100 \times 10^9 \times 1 \times 10^{-12}$ = 0.1 Watts.
    * **Switching from FP32 to INT8 yields an ~18x reduction in energy per operation.**
  options:
  - ~4×
  - ~3.4×
  - ~18×
  - ~2×
  correct_index: 2
