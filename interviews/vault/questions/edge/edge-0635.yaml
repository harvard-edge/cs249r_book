title: The Autonomous Fleet Compute Upgrade
scenario: You are the Principal ML Systems Engineer for an autonomous trucking company.
  Your current fleet uses a perception system built on the Jetson AGX Orin, which
  comfortably meets its 33ms end-to-end latency budget. Your modeling team has just
  developed a new, much safer, BEV-Transformer model that reduces accident risk by
  5%. However, when you benchmark this new model, it badly misses the 33ms deadline.
  `tegrastats` shows the Orin's GPU is pegged at 100%, but the model's arithmetic
  intensity is known to be significantly lower than the previous-generation CNNs.
question: Why is the BEV-Transformer missing the 33ms deadline on Orin, and what should
  you optimize first?
details:
  realistic_solution: The correct approach is to recognize this is a roofline problem
    where the new model is memory-bandwidth bound. The BEV-Transformer's lower arithmetic
    intensity means it cannot take advantage of the Orin's massive compute power;
    it's limited by the speed of HBM.
  common_mistake: Focusing solely on peak TOPS. An engineer might incorrectly choose
    the next-gen 550 TOPS GPU, assuming that more peak FLOPS directly translates to
    more performance. This ignores the fact that if a workload is memory-bound, the
    extra compute cores will just sit idle, starved for data. They are not considering
    the performance-per-watt implications.
  napkin_math: 'Orin specs: 275 INT8 TOPS, 204.8 GB/s. Ridge point = 275T / 204.8GB/s
    = 1342 Ops/Byte. With AI = 100 Ops/Byte, the new model is memory-bound. Effective
    compute throughput is capped at AI * Bandwidth = 100 Ops/Byte * 204.8 GB/s = 20.48
    TOPS. To process a 1 T-op frame takes 1T / 20.48T = 48.8ms, blowing past the 33ms
    budget. To hit 33ms, we need to increase AI or reduce total operations to 0.67
    T-ops.'
