title: Calculate Maximum Batch Size for LLM on Qualcomm Cloud AI 100
scenario: You are deploying an INT8 quantized large language model on an on-premise
  inference accelerator, specifically the Qualcomm Cloud AI 100 with a 75W power envelope.
  The accelerator provides 400 TOPS of compute and is equipped with 32 GB of LPDDR4x
  memory. The model weights require 20 GB of memory, and you must allocate 2 GB for
  the operating system and base runtime. Calculate the maximum batch size you can
  support if the memory required per sequence in the KV cache is precisely 1.5 GB.
question: What maximum batch size fits in 32 GB when weights use 20 GB, runtime uses
  2 GB, and KV cache uses 1.5 GB per sequence?
details:
  realistic_solution: The correct approach is to first determine the total memory
    available exclusively for the KV cache by subtracting the memory used by the model
    weights and the OS/runtime from the total physical memory of the accelerator.
    Then, divide this available memory capacity by the memory required per sequence
    to find the maximum concurrent batch size. This ensures the application runs stably
    within the hardware constraints of the 32 GB device.
  common_mistake: Candidates often forget to account for the operating system and
    runtime overhead when calculating available memory for the application. They may
    also incorrectly assume that the entire 32 GB of LPDDR4x memory is available strictly
    for the model's weights and KV cache, leading to out-of-memory crashes.
  napkin_math: 1. Total available memory = 32 GB (LPDDR4x). 2. Memory used by weights
    and OS = 20 GB (weights) + 2 GB (OS) = 22 GB. 3. Remaining memory for KV cache
    = 32 GB - 22 GB = 10 GB. 4. Maximum theoretical batch size = 10 GB / 1.5 GB per
    sequence = 6.66. 5. Since batch size must be a whole integer, the maximum supported
    batch size is 6.
