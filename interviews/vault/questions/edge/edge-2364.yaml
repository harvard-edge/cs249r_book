title: Hailo-8 Camera Fan-in Link
scenario: 4x Hailo-8 IP cameras individually extract 4 MB INT8 feature maps per frame
  at 30 fps. They all transmit over gigabit ethernet (125 MB/s) to a central switch.
question: Calculate the total bandwidth required and determine if the 1 Gbps link
  is saturated.
visual:
  kind: svg
  path: edge-2364.svg
  alt: Four cameras feeding into a single saturated network switch.
  caption: 4:1 Fan-in network topology causing congestion.
details:
  realistic_solution: Each camera produces 4 MB * 30 fps = 120 MB/s. Four cameras
    produce 4 * 120 = 480 MB/s total. The 1 Gbps switch handles 125 MB/s. 480 MB/s
    > 125 MB/s, so the network link is massively saturated.
  common_mistake: Calculating bandwidth as 4 * 30 = 120 Mbps, forgetting to multiply
    by the 4 MB feature map size.
  napkin_math: 4 * 4 * 30 = 480 MB/s > 125 MB/s. Saturated.
