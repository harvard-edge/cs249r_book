title: Hailo-8 Camera Fan-in Link
scenario: 4x Hailo-8 cameras stream 4 MB INT8 feature maps per frame at 30 fps through
  a single 1 GbE top-of-rack switch into an x86 aggregator (Xeon-D, PCIe Gen3 x4 NIC
  at 4 GB/s peak). The figure suggests the switch is the obvious fan-in point, but
  the architect also needs to size headroom for adding a 5th and 6th camera and verify
  whether the host-memory ingestion path (1.2 GB/s sustained before pinned-buffer
  memcpy starts evicting model weights from the L3) becomes the next bottleneck.
question: Compute the aggregate ingress bandwidth for the 4-camera baseline and for
  a planned 6-camera expansion. For each, identify which stage saturates first - the
  1 GbE switch, the PCIe Gen3 x4 NIC, or the host-memory ingestion path - and explain
  the order in which constraints will bind as cameras are added.
visual:
  kind: svg
  path: edge-2364.svg
  alt: Four cameras feeding into a single saturated network switch.
  caption: 4:1 Fan-in network topology causing congestion.
details:
  realistic_solution: 'Aggregate at 4 cameras = 4 * 4 MB * 30 fps = 480 MB/s; at 6
    cameras = 720 MB/s. The 1 GbE switch caps at ~125 MB/s, so it is already saturated
    3.8x over at the 4-camera baseline - this is the first constraint and matches
    the figure''s fan-in congestion. Assume the switch is upgraded to 10 GbE (~1.18
    GB/s usable). At 4 cameras (480 MB/s) the link clears with headroom, the PCIe
    Gen3 x4 NIC (~3.5 GB/s effective) is unstressed, but the host-memory ingestion
    path (1.2 GB/s before cache eviction) sits at 40%. At 6 cameras (720 MB/s) the
    10 GbE link still passes (~60% utilised), the NIC is fine, but the host-memory
    path is now at 60% and approaching the cache- pollution knee where pinned-buffer
    memcpy starts evicting active model weights from the L3, doubling inference cache-miss
    latency. Constraint ordering: 1 GbE switch (binds today), then host-memory ingestion
    (binds at ~10 cameras post-upgrade), then PCIe NIC (never binds at this scale).'
  common_mistake: Reporting only the obvious switch saturation and missing that after
    a network upgrade the host-memory ingestion path becomes the next binding stage
    long before raw NIC or PCIe bandwidth runs out.
  napkin_math: 4 cams = 480 MB/s; 6 cams = 720 MB/s. 1 GbE = 125 MB/s (saturated 3.8x).
    10 GbE = 1180 MB/s OK. Host ingest 1200 MB/s - knee at ~10 cameras.
