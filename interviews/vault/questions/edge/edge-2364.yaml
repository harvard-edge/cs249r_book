title: Hailo-8 Camera Fan-in Link
scenario: 4x Hailo-8 cameras stream 4 MB INT8 feature maps per frame at 30 fps through a single 1 GbE top-of-rack switch into an x86 aggregator.
question: Compute the aggregate ingress bandwidth for 4 and 6 cameras, identify which stage saturates first, and explain the order of binding constraints.
visual:
  kind: svg
  path: edge-2364.svg
  alt: Four cameras feeding into a single saturated network switch.
  caption: 4:1 Fan-in network topology causing congestion.
details:
  realistic_solution: 'Aggregate at 4 cameras = 4 * 4 MB * 30 fps = 480 MB/s; at 6 cameras = 720 MB/s. The 1 GbE switch caps at ~125 MB/s, so it is already saturated 3.8x over at the 4-camera baseline - this is the first constraint and matches the figure''s fan-in congestion. Assume the switch is upgraded to 10 GbE (~1.18 GB/s usable). At 4 cameras (480 MB/s) the link clears with headroom, the PCIe Gen3 x4 NIC (~3.5 GB/s effective) is unstressed, but the host-memory ingestion path (1.2 GB/s before cache eviction) sits at 40%. At 6 cameras (720 MB/s) the 10 GbE link still passes (~60% utilised), the NIC is fine, but the host-memory path is now at 60% and approaching the cache- pollution knee where pinned-buffer memcpy starts evicting active model weights from the L3, doubling inference cache-miss latency. Constraint ordering: 1 GbE switch (binds today), then host-memory ingestion (binds at ~10 cameras post-upgrade), then PCIe NIC (never binds at this scale).'
  common_mistake: |
    **The Pitfall:** Reporting only the obvious switch saturation.
    **The Rationale:** Candidates solve for the immediate bottleneck but fail to project the system's performance curve after a network upgrade.
    **The Consequence:** The system will hit an unexpected host-memory cache-pollution bottleneck shortly after the network upgrade, degrading inference latency.
  napkin_math: |
    1. Aggregate bandwidth at 4 cameras = 4 * 4 MB * 30 fps = 480 MB/s.
    2. Aggregate bandwidth at 6 cameras = 6 * 4 MB * 30 fps = 720 MB/s.
    3. 1 GbE switch capacity ≈ 125 MB/s (saturated 3.8x at 4 cameras).
    4. 10 GbE switch capacity ≈ 1180 MB/s (handles 6 cameras with headroom).
    5. Host ingestion knee ≈ 1200 MB/s (saturates at ~10 cameras).
    6. Order of constraints: **1 GbE switch**, then **host-memory ingestion**, then **PCIe NIC**.
