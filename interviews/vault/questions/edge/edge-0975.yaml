title: Edge Swarm Feature Map Aggregation over 5G
scenario: A fleet of 10 Jetson AGX Orin drones capture 1080p 30fps video, processing
  frames into 1x256x512 INT8 feature maps locally. They must stream these feature
  maps continuously to a centralized A100 server for anomaly detection over a shared
  100 Mbps wireless uplink.
question: Design an architecture to prevent uplink saturation, and calculate the exact
  compression ratio or frame-rate reduction required to sustain real-time processing.
visual:
  kind: svg
  path: edge-0975.svg
  alt: A fanout diagram showing multiple drones funneling data into a single constrained
    wireless network node, which then connects to an aggregation server.
  caption: Swarm Uplink Architecture
details:
  realistic_solution: Each drone generates 30 fps * (1 * 256 * 512) bytes = 3.93 MB/s
    (~31.4 Mbps). The ten drones combined produce 314 Mbps, vastly exceeding the 100
    Mbps shared uplink. To resolve this, an engineer should propose spatial pooling,
    temporal subsampling (e.g., transmitting at ~9 fps), or applying further quantization.
    At 314 Mbps total, a compression ratio of at least 3.14x is required to fit under
    the 100 Mbps bandwidth cap.
  common_mistake: Focusing purely on the Orin's local compute capacity or LPDDR5 bandwidth
    while completely missing the shared network uplink bottleneck.
  napkin_math: 10 drones * 30 fps * 131,072 bytes * 8 bits/byte = 314.5 Mbps > 100
    Mbps. Requires 3.14x reduction.
