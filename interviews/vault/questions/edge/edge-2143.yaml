title: 'Knowledge Distillation for Compressing ViT to MobileNet on Hailo-8'
scenario: 'A ViT-B/16 teacher model (86M params, 17 GFLOPS, 81% top-1 on ImageNet) is used to distill a MobileNetV3-small student (2.5M params, 0.06 GFLOPS) for Hailo-8 deployment (26 TOPS INT8, 2.5W). The student baseline accuracy is 67%.'
question: 'With feature-based distillation from ViT-B/16 to MobileNetV3-small on Hailo-8, what top-1 accuracy is realistically achievable?'
details:
  realistic_solution: 'Baseline student: 67% top-1. Logit-only distillation (soft targets, temperature T=4): typically adds 1.5-2.5% over hard-label training → ~69%. Feature-based distillation (matching intermediate representations): additional 1-2% → ~71%. Task-specific training (shorter sequences, data augmentation tuned for smaller model): another 0.5-1%. Realistic achievable: 70-72% top-1. MobileNetV3-small requires ~0.06 GOPS per image. At 26 TOPS, theoretical latency is 0.06 * 10^9 / 26 * 10^12 = 2.3μs per image → >400K FPS. For a 30 FPS target, the compute budget per frame is 26 TOPS / 30 = 866 GOPS. With 0.06 GOPS, the model fits effortlessly. Focus: accuracy, not throughput.'
  common_mistake: |
    **The Pitfall:** Expecting distillation to fully close the accuracy gap between a large teacher and a tiny student.
    **The Rationale:** Candidates overestimate the power of distillation without accounting for the fundamental parameter capacity gap.
    **The Consequence:** Unrealistic accuracy targets are promised to stakeholders that cannot be met by the small edge model.
  napkin_math: |
    - Teacher top-1: 81%.
    - Student baseline: 67%.
    - KD gains: +2% (logit) + 1.5% (feature) + 1% (tuning) = ~4.5%.
    - Estimated student top-1: 67% + 4.5% = **~71.5%**.
    - Remaining irreducible capacity gap: 81% - 71.5% = **9.5%**.
    - Compute utilization: 0.06 GOPS / 26000 GOPS = **0.00023%** at 1 FPS. Compute is not the bottleneck.
