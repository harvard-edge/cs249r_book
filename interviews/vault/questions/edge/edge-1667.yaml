title: Hardware-Aware NAS for Edge TPU Object Detection
scenario: You are tasked with designing a novel object detection architecture for a swarm of smart city cameras powered by the Google Coral Edge TPU via USB. The system must process video at a minimum of 30 FPS while strictly adhering to the Edge TPU's constraints, specifically its 4 TOPS INT8 throughput and 2W power envelope. Furthermore, your architecture search space must be heavily constrained by the Edge TPU's limited operator support.
question: How would you design a hardware-aware NAS framework to discover the optimal network topology for this specific accelerator?
details:
  realistic_solution: 'The correct approach involves building a latency predictor specifically profiled on the Google Coral Edge TPU, factoring in INT8 quantization overhead and compiler operator mapping. The search space should be restricted to a supernet consisting only of operations fully supported by the Edge TPU compiler. The NAS objective function must jointly optimize for task accuracy, INT8 quantization robustness, and actual measured on-device latency.'
  common_mistake: Proposing standard NAS algorithms without incorporating the Edge TPU compiler's specific operator restrictions into the search space, and optimizing for theoretical FLOPs instead of actual on-device latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Google Coral Edge TPU: 4 TOPS INT8, 2W
    - Minimum 30 FPS requirement
    - Realistic utilization rate = 40%

    **Calculations:**
    - Max latency per frame = 1 / 30 = 33.33 ms
    - Theoretical max GOPS/frame = (4 * 10^12) * 0.03333 = 133.3 GOPS
    - Constrained GOPS/frame = 133.3 * 0.40 = 53.3 GOPS
    - Power efficiency = 30 FPS / 2W = 15 FPS/Watt

    **Conclusion & Interpretation:**
    - **Result: 53.3 GOPS (Compute-Bound)**. The NAS search space must be strictly bounded by real-world utilization limits and supported INT8 operations, not theoretical peaks.
