title: The Hard Real-Time Factory Defect Detector
scenario: 'You are the Principal Engineer designing a visual inspection system for a high-speed bottling line. The system must detect microscopic cracks in glass bottles using a 4K resolution camera (3840x2160) and trigger a robotic arm, all within a hard real-time budget of 10ms. A state-of-the-art Vision Transformer has shown unparalleled accuracy for this kind of fine-grained defect detection in offline tests. Your available hardware is a Hailo-8 accelerator, known for its extreme TOPS/W efficiency (26 TOPS at 2.5W).'
question: "How would you architect the 4K crack detector to use the ViT within 10ms, and why is a naive ViT impossible?"
details:
  realistic_solution: 'A naive ViT on a 4K image is mathematically impossible within the time budget. The quadratic complexity of self-attention on a large sequence of patches creates an insurmountable computational and memory burden. The only viable solution is a cascaded or hierarchical architecture.'
  common_mistake: |
    **The Pitfall:** Simply downsampling the 4K image to a smaller size like 224x224 to reduce compute.
    **The Rationale:** This is the standard procedure for getting CNNs to run quickly on edge devices.
    **The Consequence:** Downsampling destroys the high-frequency details required to see the microscopic cracks, making the entire inspection system useless.
  napkin_math: |
    * 4K Image = 3840 × 2160 = 8.3M pixels.
    * ViT 16×16 patches -> 240 × 135 = 32,400 tokens.
    * Attention matrix size: 32,400² × 2 bytes = 2.1 GB per attention head (exceeds Hailo-8 memory).
    * Compute: Self-attention ≈ 2 × N² × d = 2 × 32,400² × 768 = 1.61 TFLOPs per layer.
    * At 26 TOPS, 1.61 TFLOPs / 26 TOPS = 62 ms per frame (misses 10ms budget massively).
    * **A naive ViT is mathematically impossible. A cascade architecture (CNN crops ROIs, ViT runs on small patches) is strictly required.**
