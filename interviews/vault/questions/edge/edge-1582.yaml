title: Edge Data Buffering and Parquet Compression
scenario: An autonomous drone utilizes an NVIDIA Jetson Orin (Ampere GPU + DLA, 275
  TOPS INT8, 60W TDP) to run perception models. The system must log tabular feature
  embeddings and object metadata for offline active learning. Uncompressed structured
  telemetry is generated at 150 MB/s. To optimize disk I/O and keep overall power
  draw within the 60W TDP, the pipeline buffers exactly 1 minute of data in the Orin's
  32 GB LPDDR5 memory. It then converts the buffer to a columnar Parquet format with
  Zstd compression (achieving a 5:1 compression ratio) and flushes it to the edge
  SSD as a single row group. Calculate the peak memory consumed by the uncompressed
  buffer, the disk size of a single flushed row group, and the total storage capacity
  required for a 2-hour continuous mission.
question: For 150 MB/s telemetry buffered for 1 minute, what are the uncompressed
  buffer size, compressed Parquet row group size, and 2-hour storage need?
details:
  realistic_solution: 'The correct approach uses an in-memory columnar buffer (like
    Apache Arrow) to accumulate the 1-minute chunks before serialization. Because
    the uncompressed data requires 9 GB, it comfortably fits within the 32 GB LPDDR5,
    leaving ample room for the OS and the INT8 models running on the Ampere GPU and
    DLA. Flushing to Parquet with Zstd is ideal here: the columnar format heavily
    deduplicates repetitive sensor metadata, reducing wear on the edge SSD and minimizing
    power-intensive I/O operations.'
  common_mistake: Candidates often miscalculate unit conversions (seconds to minutes
    to hours), or incorrectly apply the 5:1 compression ratio to the in-memory buffer
    rather than just the disk write. They may also fail to verify if the uncompressed
    buffer actually fits within the available 32 GB LPDDR5 alongside the model weights.
  napkin_math: Uncompressed Buffer Size = 150 MB/s * 60 seconds = 9,000 MB (9 GB).
    Compressed Row Group Size = 9 GB / 5 (compression ratio) = 1.8 GB. Total Mission
    Duration = 2 hours * 60 minutes/hour = 120 minutes. Total SSD Storage Required
    = 1.8 GB/minute * 120 minutes = 216 GB.
