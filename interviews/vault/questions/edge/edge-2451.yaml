title: Wildlife Camera Duty Cycling on Jetson AGX Orin
scenario: A wildlife camera using a Jetson AGX Orin in 15W mode activates for 2 seconds to run an object detection model whenever motion is detected. Idle power is 2W.
question: Calculate the average power consumption if the system detects motion 30 times per hour.
details:
  realistic_solution: Active time per hour is 30 triggers multiplied by 2 seconds, which equals 60 seconds of active 15W state. The remaining 3540 seconds are spent in the 2W idle state. The average power is the total energy divided by the 3600 seconds in an hour, yielding 2.22W.
  common_mistake: |
    **The Pitfall:** Ignoring idle power consumption.
    **The Rationale:** Candidates often only average the active power over the total time and forget to include the baseline 2W idle draw during inactive periods.
    **The Consequence:** Severe underestimation of the total energy required, leading to inadequate battery or solar panel sizing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active Power: 15W mode.
       - Idle Power: 2W.
       - Activation Time: 2 seconds per trigger.
       - Trigger Frequency: 30 times per hour.
    2. **Calculations:**
       - Total Active Time per hour = 30 triggers * 2 s/trigger = 60 s.
       - Total Idle Time per hour = 3600 s - 60 s = 3540 s.
       - Energy consumed in active state = 60 s * 15 W = 900 Joules.
       - Energy consumed in idle state = 3540 s * 2 W = 7080 Joules.
       - Total Energy per hour = 900 J + 7080 J = 7980 Joules.
       - Average Power = 7980 Joules / 3600 s = 2.216 W.
    3. **Conclusion & Interpretation:**
       - **Result: 2.22W (Idle-Dominated Average Power)**
