title: Wildlife Camera Duty Cycling on Jetson AGX Orin
scenario: A wildlife camera using a Jetson AGX Orin in 15W mode activates for 2 seconds
  to run an object detection model whenever motion is detected. Idle power is 2W.
question: Calculate the average power consumption if the system detects motion 30
  times per hour.
details:
  realistic_solution: Active time per hour is 30 triggers multiplied by 2 seconds,
    which equals 60 seconds of active 15W state. The remaining 3540 seconds are spent
    in the 2W idle state. The average power is the total energy divided by the 3600
    seconds in an hour, yielding 2.21W.
  common_mistake: Ignoring idle power consumption and only averaging the active power
    over the total time.
  napkin_math: (60 * 15W + 3540 * 2W) / 3600s = 2.21W
