title: 'Edge Transformer Cost Evaluation: Distilled vs Full Transformer on Hailo-8'
scenario: Compare DistilBERT (66M params, INT8, 6 layers) vs BERT-base (110M params, INT8, 12 layers) on Hailo-8 (26 TOPS INT8, 2.5W, 6GB/s host-link) for product review sentiment at batch=1, seq=64.
question: Which should run on Hailo-8 for batch=1 sentiment, DistilBERT or BERT-base, and what throughput and cost tradeoffs result?
details:
  realistic_solution: 'Assuming fixed seq=64 compiled to Hailo-8. DistilBERT INT8: 66MB. BW: 66MB/6GB/s=11ms. FLOPs: ~2*66M*64=8.45G FLOPs. Compute: 8.45G/26T=0.325ms. BW-bound. 11ms. BERT-base INT8: 110MB. BW: 110/6000=18.3ms. FLOPs: ~2*110M*64=14.1G FLOPs. Compute: 14.1G/26T=0.54ms. BW-bound. 18.3ms. Throughput: DistilBERT: 1000/11=91/s. BERT: 1000/18.3=54.6/s. DistilBERT: 67% faster, 97% accuracy. Power: 2.5W. Energy: DistilBERT=2.5W*0.011s=27.5mJ. BERT=2.5W*0.0183s=45.75mJ. Cost 1M inferences: DistilBERT=2.5W*1M*0.011s/3.6e6*0.10=$0.00076. BERT=$0.00127. DistilBERT wins on cost, accuracy acceptable.'
  common_mistake: |
    **The Pitfall:** Ignoring compilation constraints for dynamic attention patterns.
    **The Rationale:** Candidates fail to recognize that dataflow accelerators like Hailo-8 require fixed-shape models compiled ahead of time.
    **The Consequence:** Proposing architectures that cannot actually be compiled or deployed on the target hardware.
  napkin_math: |
    - **DistilBERT Limits:** 66MB weights. BW time = 66MB / 6000 MB/s = 11ms. Compute = 0.325ms. **Throughput = 91 inf/s**.
    - **DistilBERT Energy/Cost:** Energy = 2.5W * 0.011s = 27.5mJ. Cost per 1M = 1M * 0.0275J / 3.6e6 J/kWh * $0.10 = **$0.000764**.
    - **BERT Limits:** 110MB weights. BW time = 110MB / 6000 MB/s = 18.3ms. Compute = 0.54ms. **Throughput = 54.6 inf/s**.
    - **BERT Energy/Cost:** Energy = 45.75mJ. Cost per 1M = **$0.00127**.
