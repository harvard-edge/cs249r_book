title: 'Edge Transformer Cost Evaluation: Distilled vs Full Transformer on Hailo-8'
scenario: Compare DistilBERT vs BERT-base on Hailo-8 for product review sentiment at batch=1, seq=64.
question: Which should run on Hailo-8 for batch=1 sentiment, DistilBERT or BERT-base, and what throughput and cost tradeoffs result?
details:
  realistic_solution: 'DistilBERT runs significantly faster and cheaper. On dataflow edge accelerators like Hailo-8, the fixed sequence length requires compiling a static attention pattern. DistilBERT reduces PCIe host-link weight swapping times, directly driving up inference throughput per watt.'
  common_mistake: |
    **The Pitfall:** Ignoring compilation constraints for dynamic attention patterns.
    **The Rationale:** Candidates fail to recognize that dataflow accelerators like Hailo-8 require fixed-shape models compiled ahead of time.
    **The Consequence:** Proposing architectures that cannot actually be compiled or deployed on the target hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8: 6GB/s host-link, 2.5W
    - Weights: DistilBERT (66MB), BERT (110MB)

    **Calculations:**
    - DistilBERT BW time = 66MB / 6000 MB/s = 11ms. Compute = 0.325ms. Throughput = 91 inf/s
    - DistilBERT Energy = 2.5W * 0.011s = 27.5mJ. Cost per 1M = $0.000764
    - BERT BW time = 110MB / 6000 MB/s = 18.3ms. Throughput = 54.6 inf/s
    - BERT Cost per 1M = $0.00127

    **Conclusion & Interpretation:**
    - **Result: DistilBERT Wins.** Substantially lower cost and 67% faster throughput by minimizing I/O swaps.
