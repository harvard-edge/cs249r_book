title: 'The Edge Roofline Trap'
scenario: 'You are deploying a classic convolutional neural network, which is known to be memory-bound.'
question: 'Based on their hardware specs, which device, a Jetson AGX Orin or a Hailo-8, is more likely to be bottlenecked by memory bandwidth rather than its compute units?'
details:
  realistic_solution: 'The Jetson AGX Orin is more likely to be memory-bottlenecked for a typical memory-bound model. This can be quantified by its ''Ridge Point,'' which is the Arithmetic Intensity needed to become compute-bound. The Jetson''s high Ridge Point means a model needs to perform many FLOPs for every byte of data it reads to use its compute units effectively. The Hailo-8, with its extremely high-bandwidth on-chip SRAM, has a much lower Ridge Point, meaning it is ''easier'' for a model to be compute-bound.'
  common_mistake: |
    **The Pitfall:** Only looking at peak TOPS and ignoring the memory system bandwidth.
    **The Rationale:** Candidates fail to apply the Roofline Model, assuming massive compute power automatically translates to fast execution.
    **The Consequence:** Memory-bound models deployed on high-TOPS accelerators achieve only a fraction of peak performance.
  napkin_math: |
    - Orin Ridge Point: 275 TOPS / 204.8 GB/s = **1342 OPS/Byte**.
    - A model must perform 1342 operations per byte to fully utilize compute.
    - Classic CNN Arithmetic Intensity: **~500 OPS/Byte**.
    - Performance: 500 OPS/Byte * 204.8 GB/s = **102.4 TOPS**.
    - Utilization: 102.4 / 275 = **37%** of Orin's peak compute.
  options:
  - 'The Hailo-8, because its compute (26 TOPS) is lower, making it the bottleneck.'
  - 'The Jetson AGX Orin, because its memory bandwidth is much lower relative to its peak compute power.'
  - 'Neither, as both use modern memory systems that eliminate bottlenecks.'
  - 'The device with more RAM, as it will try to process more data at once.'
  correct_index: 1
