title: The Autonomous Driving Roofline Puzzle
scenario: You are an ML systems engineer on an autonomous driving team, tasked with deploying a new LiDAR segmentation model to a fleet of test vehicles equipped with Jetson AGX Orin modules. The module is in a thermally-constrained enclosure, limiting its sustained power budget to 40W.
question: At the 40W power limit, is the LiDAR segmentation model compute-bound or memory-bandwidth-bound on Orin?
details:
  realistic_solution: 'Calculate the model''s Arithmetic Intensity (AI) and compare it to the Jetson AGX Orin''s roofline ridge point. The ridge point is the AI needed to saturate the compute units.'
  common_mistake: |
    **The Pitfall:** Fixating on advertised peak TOPS and ignoring arithmetic intensity.
    **The Rationale:** Engineers assume any performance shortfall is due to thermal throttling or inefficient software, failing to check if the model's arithmetic intensity allows the chip to be fed fast enough.
    **The Consequence:** Wasting time profiling kernels for compute bounds when the workload is fundamentally starved by memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40W power limit: sustains ~184 TOPS (at ~4.6 TOPS/W).
       - Memory bandwidth: 204.8 GB/s.
       - Workload profile: 180 GOps compute, 300 MB data movement.
    2. **Calculations:**
       - Ridge Point = 184,000 GOps / 204.8 GB/s = 898 Ops/Byte.
       - Model AI = 180 GOps / 300 MB = 600 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Since the model's Arithmetic Intensity (600 Ops/Byte) is below the ridge point (898 Ops/Byte), it is operating in the memory-bound region, capping achievable efficiency.
  options:
  - The model is compute-bound. Its arithmetic intensity of 898 Ops/Byte is very high, meaning the 184 TOPS of work is too much.
  - The model is primarily limited by thermal throttling. The 40W power budget only allows for ~184 TOPS, completely restricting execution.
  - The model is memory-bound. Its arithmetic intensity of 600 Ops/Byte is below the Jetson's power-constrained ridge point of ~898 Ops/Byte, so performance is dictated by memory bandwidth.
  - The bottleneck is inefficient kernel execution. The model AI of 600 Ops/Byte implies 100% compute utilization.
  correct_index: 2
