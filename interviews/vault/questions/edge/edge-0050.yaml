title: The Time-of-Flight Sensor Crosstalk
scenario: Your warehouse uses 50 Rockchip RK3588 devices, each paired with a ToF (Time-of-Flight) depth sensor for pallet dimensioning. Devices are spaced 3 meters apart along a conveyor. When two adjacent devices run simultaneously, both report depth measurements that oscillate wildly — errors of ±15 cm on objects that should measure ±1 cm. When you disable alternating devices (run every other one), accuracy returns to normal.
question: What is causing the ToF sensor measurements to wildly oscillate when adjacent devices run simultaneously?
details:
  realistic_solution: 'ToF sensors work by emitting modulated infrared light and measuring the phase shift of the reflected signal. When two adjacent ToF sensors operate simultaneously, **multipath interference** occurs: Sensor A''s emitted IR light bounces off the pallet and reaches Sensor B''s receiver. Sensor B can''t distinguish its own reflected signal from Sensor A''s — the mixed signals produce incorrect phase measurements and erroneous depth values.'
  common_mistake: |
    **The Pitfall:** Assuming the ToF sensors are defective and replacing them with higher-quality units.
    **The Rationale:** When faced with wildly oscillating sensor readings, hardware failure is often the first suspected culprit, ignoring multi-device interference patterns.
    **The Consequence:** Wasted budget on replacement parts and failure to resolve the underlying crosstalk issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - ToF sensor IR power: 850nm, ~1W peak. Separation: 3m.
    - Target distance: 1m.
    - Receiver sensitivity: ~0.1 mW/m².
    - Required SIR for accurate phase measurement: >20 dB.

    **Calculations:**
    - Crosstalk power at 3m = 1W / (4π * 3²) = ~8.8 mW/m².
    - Own signal return power (1m scatter, r² falloff) = 1W / (4π * 2²) = ~20 mW/m².
    - SIR = 20 mW/m² / 8.8 mW/m² = 2.3 (~3.6 dB).

    **Conclusion & Interpretation:**
    - Result: 3.6 dB SIR is too low, causing severe interference. TDM eliminates this issue.
