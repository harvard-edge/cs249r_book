title: The Time-of-Flight Sensor Crosstalk
scenario: Your warehouse uses 50 Rockchip RK3588 devices, each paired with a ToF (Time-of-Flight) depth
  sensor for pallet dimensioning. Devices are spaced 3 meters apart along a conveyor. When two adjacent
  devices run simultaneously, both report depth measurements that oscillate wildly — errors of ±15 cm
  on objects that should measure ±1 cm. When you disable alternating devices (run every other one), accuracy
  returns to normal. What's happening?
details:
  realistic_solution: 'ToF sensors work by emitting modulated infrared light and measuring the phase shift
    of the reflected signal. When two adjacent ToF sensors operate simultaneously, **multipath interference**
    occurs: Sensor A''s emitted IR light bounces off the pallet and reaches Sensor B''s receiver. Sensor
    B can''t distinguish its own reflected signal from Sensor A''s — the mixed signals produce incorrect
    phase measurements and erroneous depth values.'
  common_mistake: '"The ToF sensors are defective — replace them with higher-quality units." The sensors
    work perfectly in isolation. The problem is inter-device interference.'
  napkin_math: 'ToF sensor IR power: 850nm, ~1W peak. Inverse square law: at 3m, crosstalk power = 1W
    / (4π × 3²) = 8.8 mW/m². Sensor receiver sensitivity: ~0.1 mW/m². Signal-to-interference ratio without
    mitigation: own signal at 1m return = 1W/(4π×2²) = 20 mW/m². Interference: 8.8 mW/m². SIR = 20/8.8
    = 2.3 (3.6 dB) — far too low for accurate phase measurement (need >20 dB). With TDM: interference
    = 0. SIR = ∞. Accuracy restored to ±1 cm spec. Throughput cost: 30 FPS → 10 FPS, but 10 FPS × 2.4s
    pallet transit = 24 measurements per pallet — more than sufficient for dimensional averaging.'
