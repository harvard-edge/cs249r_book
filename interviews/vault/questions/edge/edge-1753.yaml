title: Sizing Object Detection for Hailo-8 Dataflow Limits
scenario: You are deploying a multi-camera object detection system for a smart intersection using a single Hailo-8 accelerator. The system processes four 1080p video feeds at 30fps and is constrained to a 2.5W power budget. You are evaluating a 25M parameter CNN (approximately 50 GOps per frame). Given the Hailo-8 is a dataflow accelerator with 26 TOPS INT8 and no local DRAM (relying entirely on streaming from host memory).
question: Can one Hailo-8 run the 25M-parameter, 50 GOps model for four 1080p 30 FPS feeds, and what is the primary bottleneck?
details:
  realistic_solution: The correct approach involves calculating both the compute utilization and the host-to-device memory bandwidth required for streaming. Since the Hailo-8 relies on compiling the entire network pipeline onto its internal SRAM, a 25M parameter model will likely exceed on-chip capacity, forcing weight swapping over PCIe. To resolve this, the candidate should propose using a significantly smaller architecture (e.g., 5M parameters) or heavy structural pruning to ensure the model fits entirely on-chip, thereby avoiding PCIe thrashing.
  common_mistake: |
    **The Pitfall:** Only comparing required GOps against the 26 TOPS peak without checking memory limits.
    **The Rationale:** Candidates fail to account for the Hailo-8's lack of local DRAM and the severe PCIe bandwidth penalty of swapping a 25M parameter model constantly.
    **The Consequence:** Deploying a model that thrashes the PCIe bus, resulting in massive latency spikes despite theoretically sufficient compute.
  napkin_math: |
    - **Compute check:** 50 GOps * 30 FPS * 4 cameras = 6,000 GOps = 6 TOPS (well within 26 TOPS).
    - **Memory check:** 25M parameters in INT8 = 25MB of weights.
    - **Bandwidth check:** If weights must be swapped from host memory per frame, PCIe bandwidth is 25MB * 120 FPS = 3.0 GB/s.
    - **Conclusion:** PCIe Gen3 x4 provides ~3.9 GB/s. Streaming 3.0 GB/s of weights plus 120 high-res video frames will **saturate the bus**, proving the model is bottlenecked by I/O memory bandwidth despite available TOPS.
