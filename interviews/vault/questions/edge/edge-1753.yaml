title: Sizing Object Detection for Hailo-8 Dataflow Limits
scenario: You are deploying a multi-camera object detection system for a smart intersection using a single Hailo-8 accelerator. The system processes four 1080p video feeds at 30fps. You are evaluating a 25M parameter CNN.
question: Can one Hailo-8 run the 25M-parameter, 50 GOps model for four 1080p 30 FPS feeds, and what is the primary bottleneck?
details:
  realistic_solution: 'It cannot. The Hailo-8 lacks local DRAM. A 25M parameter model overflows the on-chip SRAM, triggering repeated host memory PCIe fetches. While compute TOPS are sufficient, the I/O bus stalls.'
  common_mistake: |
    **The Pitfall:** Only comparing required GOps against the 26 TOPS peak without checking memory limits.
    **The Rationale:** Candidates fail to account for the Hailo-8's lack of local DRAM and the severe PCIe bandwidth penalty of swapping a 25M parameter model constantly.
    **The Consequence:** Deploying a model that thrashes the PCIe bus, resulting in massive latency spikes despite theoretically sufficient compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 weights: 25MB
    - Frame Rate: 120 FPS total (4 feeds * 30 FPS)
    - PCIe Gen3 x4 limit: ~3.9 GB/s

    **Calculations:**
    - Required Bandwidth: 25MB * 120 FPS = 3.0 GB/s for weights alone

    **Conclusion & Interpretation:**
    - **Result: PCIe I/O Bottleneck.** 3.0 GB/s overhead combined with video data will saturate the bus.
