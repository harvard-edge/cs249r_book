title: Federated Learning Architecture on Hailo-8 Dataflow Accelerators
scenario: You are architecting a cross-device federated learning system for automotive in-cabin monitoring.
  The edge nodes utilize Hailo-8 dataflow accelerators (26 TOPS INT8, 2.5W), which lack local DRAM and
  must stream all weights and activations directly from host memory. Evaluate the architectural tradeoffs
  of different on-device learning strategies considering the host-accelerator communication bottleneck
  and the non-IID nature of driver data.
question: "How would you design on-device federated learning with Hailo-8 nodes given host streaming bottlenecks and non-IID driver data?"
details:
  realistic_solution: The optimal design keeps the Hailo-8 strictly for forward-pass feature extraction
    using its dataflow architecture, streaming only compressed feature vectors back to the host CPU. A
    lightweight, low-parameter adapter or classifier is then updated locally on the host CPU rather than
    the accelerator. This mitigates the memory-streaming bottleneck and drastically reduces the communication
    payload sent to the central FL server.
  common_mistake: Candidates often propose standard federated averaging with full model backpropagation
    executing on the edge accelerator. They fail to realize that without local DRAM on the Hailo-8, streaming
    intermediate activations and gradients back and forth from host memory will severely bottleneck the
    system, completely neutralizing the 26 TOPS INT8 compute advantage.
  napkin_math: For a standard vision model, full backpropagation requires streaming roughly 100MB of activations
    per frame. At 30 FPS, this demands 3 GB/s of host-to-accelerator bandwidth, easily saturating edge
    bus links and exceeding the 2.5W power budget due to I/O overhead. By running only inference on the
    26 TOPS Hailo-8 to extract a 2KB feature vector, bus traffic drops to 60 KB/s, and updating a 100K
    parameter adapter on the CPU means only 400KB (FP32) is transmitted during FL communication rounds.
