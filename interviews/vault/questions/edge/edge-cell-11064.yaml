title: 'Fault Tolerance: Fluency — Checkpoint Size for Edge Online Learning'
scenario: Your Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) runs a YOLOv8-medium model (26M params) with
  LoRA fine-tuning (rank 8). The device writes a checkpoint every 30 minutes to NVMe. Estimate checkpoint
  size, write time, and storage consumed over 30 days.
details:
  realistic_solution: 'Checkpoint must include: frozen base model (int8) + LoRA weights (fp32) + optimizer
    state for LoRA + training metadata. Base model is large but can be restored from factory image — only
    LoRA delta needs to be checkpointed for online learning state.'
  common_mistake: Forgetting to include base model weights (even if frozen) in checkpoint for recovery
    purposes; not accounting for AdamW optimizer state for LoRA weights only.
  napkin_math: 'Base model (int8): 26M × 1B = 26MB. LoRA rank-8: 2 matrices per attention layer × 12 layers
    × 8 × (head_dim + d_model) ≈ 2 × 12 × 8 × (64+512) = 110,592 params ≈ 110K params × 4B fp32 = 441KB.
    Optimizer (AdamW): 2 × 441KB = 882KB. Checkpoint: LoRA only = 441KB + 882KB + 10KB metadata = 1.33MB.
    With base model: 26MB + 1.33MB = 27.33MB. Smart checkpoint (LoRA only): 1.33MB every 30 minutes. Write
    time: 1.33MB / 4 GB/s NVMe = 0.33ms — negligible. 30 days × 48 checkpoints/day × 1.33MB = 1.92GB storage
    over 30 days. Full base + LoRA every 24h: 14 × 27.33MB = 383MB. Total: 2.3GB — trivial on Orin''s
    storage.'
