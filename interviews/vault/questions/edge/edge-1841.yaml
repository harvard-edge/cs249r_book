validation_issues:
- Napkin Math makes an unsupported assumption of '500-1000 operations per pixel' for object detection, which lacks a clear basis and can significantly alter the total GOps calculation.
- Napkin Math uses 'GigaOPS/sec' which is non-standard; typically GOps is a count, and the rate is TOPS or GOps/second.
