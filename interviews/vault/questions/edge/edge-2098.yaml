title: 'Edge ML with Hailo-8: Data Efficiency for Continuous Adaptation'
scenario: You are tasked with designing the data pipeline for a fleet of smart industrial inspection cameras equipped with Hailo-8 AI processors. The model needs to continuously adapt and improve due to environmental factors. However, data collection from the edge is costly, bandwidth-limited, and memory is constrained.
question: How would you select and process data for continuous learning on Hailo-8 without exceeding the power budget or risking model collapse?
details:
  realistic_solution: A realistic solution would involve a hybrid approach leveraging coreset selection and curriculum learning. On the Hailo-8, an initial lightweight filter (e.g., based on entropy or uncertainty using the existing model's predictions, leveraging the 26 TOPS INT8 efficiently) identifies potentially informative samples. These samples are then prioritized for a more rigorous coreset selection algorithm, perhaps running periodically on a small buffer, to ensure diversity and informativeness while managing memory. A curriculum learning approach could then guide the order in which these selected samples are used for retraining. Synthetic data generation could augment rare defect cases identified from edge data. Crucially, the Information-Compute Ratio (ICR) framework would be applied to evaluate the trade-offs between acquiring/processing new data points and the computational resources (2.5W budget) needed to extract value from them, ensuring that the entire pipeline stays within the strict power envelope and provides a positive return on energy investment.
  common_mistake: |
    **The Pitfall:** Indiscriminately collecting all data or relying solely on simple confidence-based filtering.
    **The Rationale:** Candidates often transfer cloud-based big data mindsets to the edge, ignoring bandwidth and power costs.
    **The Consequence:** Rapid battery depletion, saturated networks, and model collapse due to catastrophic forgetting of rare defects.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data Ingestion: 30 FPS * 1MB/frame = 30MB/s.
       - Power Budget: 2.5W total; Inference uses 2.0W.
       - Upload Bandwidth: 1 Mbps.
    2. **Calculations:**
       - Power available for selection: 2.5W - 2.0W = 0.5W.
       - Coreset Storage Requirement: 10,000 samples * 100KB = 1GB (manageable on edge eMMC).
       - Bandwidth Cost: 1GB at 1 Mbps upload = (1GB * 8192 Mbits/GB) / 1 Mbps ≈ 8192 seconds (~2.2 hours).
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Constrained Operations**. Uploading a 1GB weekly coreset takes ~2.2 hours and fits perfectly within the strict 0.5W residual power budget for data selection.
