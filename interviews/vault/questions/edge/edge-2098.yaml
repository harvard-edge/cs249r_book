title: 'Edge ML with Hailo-8: Data Efficiency for Continuous Adaptation'
scenario: You are tasked with designing the data pipeline for a fleet of smart industrial
  inspection cameras. Each camera is equipped with a Hailo-8 AI processor (offering
  26 TOPS INT8 performance at 2.5W power consumption), which locally executes a defect
  detection model. Due to manufacturing variations and environmental factors, the
  model needs to continuously adapt and improve. However, data collection from the
  edge is costly, bandwidth-limited, and memory on the device is constrained. Design
  a data efficiency and selection strategy for ongoing model improvement, considering
  the Hailo-8's capabilities and the risks of model collapse, while adhering to a
  strict power budget for all on-device data operations. Focus on how you would select
  and process data for efficient continuous learning without overwhelming the edge
  device or causing performance degradation over time.
question: How would you select and process data for continuous learning on Hailo-8
  without exceeding the power budget or risking model collapse?
details:
  realistic_solution: A realistic solution would involve a hybrid approach leveraging
    coreset selection and curriculum learning. On the Hailo-8, an initial lightweight
    filter (e.g., based on entropy or uncertainty using the existing model's predictions,
    leveraging the 26 TOPS INT8 efficiently) identifies potentially informative samples.
    These samples are then prioritized for a more rigorous coreset selection algorithm,
    perhaps running periodically on a small buffer, to ensure diversity and informativeness
    while managing memory. A curriculum learning approach could then guide the order
    in which these selected samples are used for retraining. Synthetic data generation
    could augment rare defect cases identified from edge data. Crucially, the Information-Compute
    Ratio (ICR) framework would be applied to evaluate the trade-offs between acquiring/processing
    new data points and the computational resources (2.5W budget) needed to extract
    value from them, ensuring that the entire pipeline stays within the strict power
    envelope and provides a positive return on energy investment.
  common_mistake: A common mistake is to either indiscriminately collect all data
    (ignoring bandwidth/storage/power costs) or to rely solely on simple confidence-based
    filtering for data selection, which can quickly lead to model collapse due to
    catastrophic forgetting or drifting towards a narrow data distribution.
  napkin_math: '1. **Data Ingestion Rate:** If a camera captures 30 FPS, and each
    raw frame is 1MB, that''s 30MB/s. A 2.5W power budget severely limits how much
    of this can be processed on-device for selection. If the Hailo-8 consumes 2.5W
    for inference, how much power is available for other data-related operations (e.g.,
    pre-processing, data selection algorithm execution)?

    2. **Coreset Storage:** If we aim to maintain a coreset of 10,000 samples for
    weekly updates, and each selected sample (post-pre-processing/compression) is
    100KB, that''s 1GB. Does the edge device have this storage capacity? If not, what
    is the maximum feasible coreset size?

    3. **Bandwidth Cost:** If 10,000 selected samples (100KB each) need to be uploaded
    to the cloud, that''s 1GB. At 1 Mbps effective upload speed, this would take (1
    GB * 8 bits/byte) / (1 Mbps) = 8,000 seconds = ~2.2 hours. This upload time must
    fit within the update cycle and power budget.

    4. **ICR Calculation:** Consider the energy (Joules) cost of processing a single
    frame to determine its ''informativeness'' vs. the information gain (e.g., reduction
    in model uncertainty or error rate). Design decisions need to minimize Joules
    per useful bit of information for continuous improvement.'
