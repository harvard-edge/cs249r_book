title: The Unified Automotive Perception Stack Design
scenario: You are the new Principal ML Systems Engineer at 'NüVuro', an EV startup aiming to build a unified perception stack for its 2028 model year, moving beyond the current generation's collection of disparate, hand-tuned CNNs. The entire system, processing feeds from 8 surround-view cameras, must run on a single automotive-grade SoC with hard real-time constraints.
question: What architecture would you choose for the unified 8-camera perception stack under real-time SoC constraints: CNN, ViT, or a hybrid?
details:
  realistic_solution: A Principal-level solution avoids dogmatic choices and proposes a pragmatic, hybrid, and data-driven approach. Heavy CNN encoders reduce spatial dimensions before projecting limited patches to a lightweight Transformer backend, retaining performance while strictly controlling memory bus traffic.
  common_mistake: |
    **The Pitfall:** Dogmatically choosing "pure ViT" because it's state-of-the-art, or "pure CNN" out of edge conservatism.
    **The Rationale:** Engineers follow AI hype trains without calculating the staggering edge memory bandwidth required by pure self-attention.
    **The Consequence:** Designing an architecture that instantly blows past the real-time latency budget due to immense matrix operations.
  napkin_math: |
    - **ViT Sequence Scaling:** A naive ViT processing a 2MP image with 16x16 patches yields sequence length N = 7812.
    - **Attention Matrix Cost:** Self-attention O(N^2) yields an attention matrix of 7812^2 = 61M elements (61 MB).
    - **Bandwidth Latency:** Reading 61 MB per head at Orin's 204.8 GB/s bandwidth takes 0.3ms.
    - **Final Result:** **With 12 heads and 12 layers, just loading attention matrices takes 0.3ms * 144 = 43ms, instantly violating a 33ms budget.**
