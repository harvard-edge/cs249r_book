title: Hailo-8 Activation Spilling Bandwidth Calculation
scenario: You are deploying a high-resolution vision model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W).
  Because the Hailo-8 is a dataflow accelerator with no local DRAM, any intermediate activation that exceeds
  the on-chip SRAM capacity must be temporarily spilled to the host memory over PCIe. If a bottleneck
  layer produces an activation map of dimensions [Batch=1, Height=512, Width=512, Channels=64] that must
  be offloaded and then read back for the next stage, calculate the exact host memory bandwidth (in MB/s)
  required to sustain this specific spill-and-restore operation at 30 frames per second.
question: "For a 512x512x64 INT8 activation spilled and restored at 30 FPS on Hailo-8, what sustained host memory bandwidth is required?"
details:
  realistic_solution: The candidate should calculate the total byte size of the activation map using the
    INT8 data type. They must then multiply this size by two to account for the full round trip (spilling
    to host memory and restoring back to the accelerator) since there is no local DRAM buffer. Finally,
    they multiply by the target frame rate to find the total sustained bandwidth.
  common_mistake: Candidates often forget that a spill-and-restore operation requires both a write to
    and a read from the host memory, thus missing the 2x multiplier for the round trip. They may also
    incorrectly assume FP32 (4 bytes per element) instead of recognizing the Hailo-8's explicit INT8 (1
    byte per element) spec.
  napkin_math: '1. Calculate single activation size: 512 * 512 * 64 = 16,777,216 elements.

    2. Apply INT8 precision (1 byte per element): 16,777,216 bytes = 16 MB per map.

    3. Account for the round-trip (spill + restore): 16 MB * 2 = 32 MB per frame.

    4. Calculate required bandwidth at 30 FPS: 32 MB/frame * 30 FPS = 960 MB/s.'
