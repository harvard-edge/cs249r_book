title: Hailo-8 Graph Compilation and Power Efficiency Calculation
scenario: You are deploying a vision model to a Hailo-8 dataflow accelerator (26 TOPS
  INT8, 2.5W, no local DRAM). The initial compiled graph requires 20 GOPS per frame
  and achieves 50% MAC utilization. By implementing operator fusion and constant folding
  during ahead-of-time compilation, you reduce the operations to 13 GOPS per frame
  and improve MAC utilization to 80%. Since the device streams data directly from
  host memory, assume power draw remains constant at the rated 2.5W. Calculate the
  absolute improvement in power efficiency (in FPS/Watt) achieved by the optimized
  graph.
question: What is the absolute FPS/Watt improvement from reducing the graph to 13
  GOPS/frame and raising MAC utilization to 80%?
details:
  realistic_solution: The correct approach is to calculate the effective compute throughput
    for both scenarios by multiplying the theoretical peak (26 TOPS or 26,000 GOPS)
    by the respective utilization factors. Next, divide this effective throughput
    by the GOPS required per frame to find the max frames per second (FPS). Finally,
    divide the FPS by the power consumption (2.5W) to find the FPS/Watt and subtract
    the unoptimized value from the optimized value.
  common_mistake: Candidates often forget to apply the utilization factor to the theoretical
    peak TOPS before calculating FPS, or they mistakenly apply the operations reduction
    but forget that utilization also independently scales the effective compute available.
    Some might also try to factor in memory bandwidth bottlenecks unnecessarily when
    the prompt bounds the problem purely by compute utilization and fixed power.
  napkin_math: 'Unoptimized effective compute: 26,000 GOPS * 0.50 = 13,000 GOPS. Unoptimized
    FPS: 13,000 GOPS / 20 GOPS/frame = 650 FPS. Unoptimized efficiency: 650 FPS /
    2.5W = 260 FPS/Watt. Optimized effective compute: 26,000 GOPS * 0.80 = 20,800
    GOPS. Optimized FPS: 20,800 GOPS / 13 GOPS/frame = 1600 FPS. Optimized efficiency:
    1600 FPS / 2.5W = 640 FPS/Watt. Absolute improvement: 640 FPS/Watt - 260 FPS/Watt
    = 380 FPS/Watt.'
