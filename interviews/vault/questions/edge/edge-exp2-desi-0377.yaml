title: Designing a Hybrid Quantization Strategy for Jetson Orin
scenario: Your team is deploying a multi-modal perception pipeline (e.g., a 7B parameter transformer with
  a CNN backbone) on an NVIDIA Jetson Orin platform constrained to a 60W TDP and 32 GB LPDDR5 shared memory.
  To hit a strict 30 FPS target, you must leverage the 275 TOPS INT8 capability across both the Ampere
  GPU and the DLA accelerators. Architect an end-to-end quantization strategy that decides when to use
  PTQ versus QAT, per-tensor versus per-channel calibration, and how to map specific quantized subgraphs
  to the GPU or DLA while maintaining precision.
details:
  realistic_solution: 'A strong candidate evaluates the tradeoffs and proposes a heterogeneous strategy:
    applying INT8 PTQ with per-tensor quantization for the standard CNN backbone mapped to the highly
    efficient DLA. For the sensitive transformer layers, they recommend QAT with per-channel quantization
    targeting the Ampere GPU. They will architect a pipeline that explicitly minimizes data movement across
    the 32 GB shared memory pool, balancing the 60W thermal budget between the GPU and DLA.'
  common_mistake: Candidates often propose uniform INT8 PTQ across the entire pipeline without considering
    hardware heterogeneity. They frequently overlook that the DLA has stricter operator support and quantization
    constraints than the Ampere GPU, which can lead to accuracy collapse or costly memory transfers back
    to the GPU.
  napkin_math: For a 7B parameter model, FP16 weights consume 14 GB of the 32 GB LPDDR5. INT8 quantization
    reduces this to 7 GB. To achieve 30 FPS, the maximum latency per frame is 33ms. With an estimated
    Jetson Orin memory bandwidth of 200 GB/s, streaming 7 GB of weights takes 35ms (28 FPS max), missing
    the target. Even though the compute (275 TOPS INT8) is sufficient, the system is memory-bound. This
    evaluation proves the design must incorporate INT4 weight quantization (reducing read time to 17.5ms)
    or aggressive layer fusion to meet the latency SLA.
