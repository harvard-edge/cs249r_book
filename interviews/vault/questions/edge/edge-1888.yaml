title: 'Optimizing Object Detection on Jetson Orin: Dynamic Batching for Throughput and Latency'
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson Orin to process a 4K video stream at 30 FPS. The primary objective is to maximize detection throughput while maintaining an end-to-end inference latency under 50ms per frame. The initial deployment uses a fixed static batch size of 1. However, profiling reveals that the GPU is underutilized, and increasing the batch size improves throughput but significantly exceeds the latency target for some frames.
question: Which batching strategy and scheduling policy would you use for 4K30 object detection to maximize throughput while keeping latency under 50 ms?
details:
  realistic_solution: 'Implement a dynamic batching strategy with an adaptive scheduling policy. This involves:

    1.  **Real-time Monitoring:** Continuously monitor system metrics such as GPU utilization, inference latency, input queue depth, and power consumption.

    2.  **Adaptive Batch Size Adjustment:** Dynamically adjust the batch size based on these metrics. For instance, if the input queue grows and latency is comfortably below the 50ms threshold, gradually increase batch size. If latency approaches or exceeds the threshold, immediately reduce batch size. Incorporate hysteresis to prevent rapid oscillations.

    3.  **Asynchronous Operations:** Employ asynchronous data transfer (e.g., using CUDA streams or DeepStream''s `batch-size` property with `batch-copy` mode) to overlap data movement from host to device (and vice-versa) with computation, leveraging the Orin''s ability for concurrent execution.

    4.  **Continuous Batching Principles:** Integrate principles of continuous batching to minimize idle time. Rather than waiting for a full batch to accumulate, process partially filled batches or schedule new inferences as soon as resources are available, especially crucial for maintaining low latency for a constant 30 FPS stream.

    5.  **Power Awareness:** Factor the 60W power budget into the scheduling policy. Aggressive batching might push power consumption, leading to throttling. The adaptive system should also consider power limits and potentially scale back batch sizes to stay within the power envelope.'
  common_mistake: |
    **The Pitfall:** Assuming static large batching always maximizes throughput safely, or that a batch size of 1 is the only way to achieve low latency.
    **The Rationale:** Candidates fail to balance finite CUDA cores and queueing theory, ignoring that large batches introduce tail latency via increased processing time.
    **The Consequence:** Either severe underutilization of the edge GPU (with batch size 1) or missed 50ms latency SLAs for frames trapped at the end of a large batch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Target throughput: 30 FPS (frame arrival every ~33.3ms).
       * Target latency: < 50ms.
       * Inference time batch=1: 40ms.
       * Inference time batch=2: 60ms.
    2. **Calculations:**
       * Static Batch=1 Throughput: 1 frame / 40ms = 25 FPS (misses 30 FPS target, meets latency).
       * Static Batch=2 Throughput: 2 frames / 60ms = 33.3 FPS (meets 30 FPS, second frame latency = 60ms, misses target).
    3. **Conclusion & Interpretation:**
       **Result: Pipelining-Bound**. Static batching cannot satisfy both constraints. A dynamic batching approach that leverages asynchronous memory copies is required to hide the I/O transfer time within the compute window.
