title: Calculate Sustained TOPS Under Edge Thermal Throttling
scenario: You are deploying an inference service on a Qualcomm Cloud AI 100 accelerator in a ruggedized
  on-premise edge appliance. The card is rated for a 75W TDP and delivers a peak of 400 TOPS in INT8.
  However, due to the passive cooling constraints of the edge appliance at an elevated ambient temperature,
  the system can only safely dissipate 60W of heat from the card before continuous thermal throttling
  engages. Assuming a linear relationship between power draw and compute throughput when throttled, calculate
  the maximum sustained INT8 TOPS the system can deliver.
question: "With passive cooling limited to 60W, what maximum sustained INT8 TOPS can the Cloud AI 100 deliver under linear throttling?"
details:
  realistic_solution: The correct approach is to recognize that the accelerator will throttle its clock
    speeds and power consumption to match the enclosure's 60W heat dissipation limit to maintain a safe
    operating temperature. By determining the compute efficiency (TOPS/Watt) and applying it to the sustained
    thermal limit, you can estimate the actual continuous throughput. Provisioning the workload for this
    sustained throughput ensures stable latency without triggering erratic thermal cycling.
  common_mistake: Candidates often assume the card will run at peak 400 TOPS until it overheats and then
    shuts down, ignoring the mechanics of continuous thermal throttling. They may also fail to calculate
    the proportional performance degradation based on the enclosure's actual heat dissipation limit.
  napkin_math: '1. Calculate peak compute efficiency: 400 TOPS / 75W = 5.333 TOPS/W.

    2. Identify the sustained thermal dissipation limit: 60W.

    3. Calculate maximum sustained throughput: 60W * (400 TOPS / 75W) = 320 TOPS INT8.'
