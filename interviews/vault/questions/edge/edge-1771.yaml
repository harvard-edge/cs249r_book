title: Identifying Power Side-Channel Attacks on Edge Accelerators
scenario: You are deploying a sensitive proprietary model on a Qualcomm Cloud AI 100
  on-premise inference accelerator. Since the hardware is located on-premise, physical
  security is a concern. The interviewer asks you to recall the definition of a 'power
  side-channel attack' and identify what specific physical property of the accelerator
  an attacker would monitor to steal model weights.
question: What is a power side-channel attack, and what physical property of the Cloud
  AI 100 would an attacker monitor?
details:
  realistic_solution: A power side-channel attack is a physical security threat where
    an adversary measures the power consumption of the hardware during execution to
    infer internal state, model weights, or cryptographic keys. For the Qualcomm Cloud
    AI 100, an attacker would physically monitor the fluctuations in the 75W power
    supply to correlate power spikes with specific INT8 operations.
  common_mistake: Candidates often confuse side-channel attacks with adversarial input
    perturbations (like FGSM) or assume that side-channel attacks only apply to low-power
    IoT microcontrollers rather than high-performance 75W PCIe accelerators.
  napkin_math: The Qualcomm Cloud AI 100 delivers 400 TOPS at a maximum TDP of 75W,
    yielding an efficiency of 400 / 75 = 5.33 TOPS/Watt. In a 1 millisecond inference
    window, the accelerator consumes up to 75W * 0.001s = 0.075 Joules while performing
    400 GOPS (400,000,000,000 INT8 operations). To successfully extract weights, an
    attacker must use a high-frequency oscilloscope to resolve micro-fluctuations
    within this 0.075 Joule energy envelope.
