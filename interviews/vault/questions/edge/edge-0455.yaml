title: The Over-Budget Fleet Update
scenario: You are an ML systems engineer at an automotive company planning to use Federated Learning to update a lane-keeping model across a fleet of 1,000,000 cars. The training process requires 4 communication rounds per month, with 5% of the fleet participating in each round. Each participating car downloads a 25 MB model and uploads a 5 MB weight update. The finance department has allocated a strict cellular data budget of $30,000 per month, and the enterprise cellular plan costs $8 per GB.
question: Does the proposed federated learning schedule fit the $30,000/month cellular budget, and what is its monthly data cost?
details:
  realistic_solution: 'The proposal should be rejected because its projected cost of $48,000 per month significantly exceeds the $30,000 budget. The total cost is a product of the data transferred per vehicle per round, the number of vehicles sampled per round, the number of rounds, and the cost per gigabyte. While FL offers privacy benefits, its communication costs can be substantial at scale and must be carefully modeled.'
  common_mistake: |
    **The Pitfall:** Forgetting multiplicative factors like bi-directional transfer (download + upload) or the number of rounds.
    **The Rationale:** Engineers often calculate the cost for a single vehicle or a single round, underestimating total scale.
    **The Consequence:** The project massively overruns its cellular budget, causing financial or operational failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 1,000,000 cars, 5% participation (50,000 cars/round)
       - Data per car: 25 MB download + 5 MB upload = 30 MB (0.03 GB)
       - Rounds/month: 4
       - Budget: $30,000/month at $8/GB
    2. **Calculations:**
       - Data per round: 50,000 cars * 0.03 GB = 1,500 GB
       - Total data per month: 1,500 GB * 4 = 6,000 GB
       - Total cost: 6,000 GB * $8/GB = $48,000
    3. **Conclusion & Interpretation:**
       - **Result: Exceeds Budget by $18,000.** Cost is $48,000/month.
  options:
  - $8,000. The plan only requires 1,000 GB of upload data, which is well within budget.
  - $1,200. The data transfer per communication round is only 150 GB.
  - $48,000. The plan requires 6,000 GB of data transfer per month at $8/GB, exceeding the $30,000 budget.
  - $9,600. The plan requires 1,200 GB of data transfer per month.
  correct_index: 2
