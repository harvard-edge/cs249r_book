title: Edge Canary Store Sizing
scenario: A retail chain wants to canary a new edge vision model in 5% of 2,400 stores.
  Each store processes 18,000 frames/day and the new model adds 3 ms/frame on a local
  gateway. Size the daily extra compute time across the canary and explain what rollout
  metric matters most.
question: How much extra compute does the 5% edge canary add, and which rollout metric
  matters most per store?
details:
  realistic_solution: The canary covers 120 stores. Each store adds 18,000 x 3 ms
    = 54 seconds of gateway compute per day. Across the canary that is 6,480 seconds,
    or 1.8 gateway-hours/day. The rollout metric should focus on deadline misses and
    queue buildup per store, not aggregate compute alone.
  common_mistake: Looking only at fleet-wide compute and missing that one overloaded
    store can fail its real-time SLA.
  napkin_math: Stores = 0.05 x 2,400 = 120. Per store = 18,000 x 0.003 s = 54 s/day.
    Total = 120 x 54 = 6,480 s = 1.8 h/day.
