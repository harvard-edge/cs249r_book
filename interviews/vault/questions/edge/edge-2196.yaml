title: Edge Canary Store Sizing
scenario: A retail chain wants to canary a new edge vision model in 5% of 2,400 stores. Each store processes 18,000 frames/day and the new model adds 3 ms/frame on a local gateway.
question: How much extra compute does the 5% edge canary add, and which rollout metric matters most per store?
details:
  realistic_solution: The canary covers 120 stores. Each store adds 18,000 x 3 ms = 54 seconds of gateway compute per day. Across the canary that is 6,480 seconds, or 1.8 gateway-hours/day. The rollout metric should focus on deadline misses and queue buildup per store, not aggregate compute alone.
  common_mistake: |
    **The Pitfall:** Analyzing only fleet-wide compute impacts and ignoring local queue dynamics.
    **The Rationale:** Candidates treat edge gateways like cloud auto-scaling groups, missing that a single overloaded store cannot borrow compute from another.
    **The Consequence:** The canary succeeds globally but causes severe real-time deadline misses in individual high-traffic stores.
  napkin_math: |
    - Canary scale: 0.05 * 2,400 stores = 120 stores.
    - Added compute per frame: 3 ms (0.003 s).
    - Frames per store per day: 18,000.
    - Daily compute per store: 18,000 * 0.003 = 54 seconds.
    - Total canary compute: 120 * 54 = 6,480 seconds = **1.8 hours/day**.
