title: Optimizing INT8 Compute Utilization on Qualcomm AI 100
scenario: Your team is porting a heavy INT8 vision workload from a datacenter GPU
  to an on-premise Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x,
  75W). Initial profiling shows that while the model fits entirely within the 32 GB
  LPDDR4x memory, compute utilization is stuck at barely 5% of the theoretical 400
  TOPS peak. You are tasked with analyzing the execution model to identify the memory
  access bottleneck and quantifying the performance gain from restructuring the compute
  blocks and memory coalescing strategy.
question: How would you quantify the memory bottleneck behind 5% Cloud AI 100 utilization
  and improve it with fusion, coalescing, and batching?
details:
  realistic_solution: The correct approach is to calculate the required arithmetic
    intensity and restructure the workload to maximize on-chip SRAM reuse. Because
    the LPDDR4x memory bandwidth is relatively constrained compared to the massive
    400 TOPS compute capacity, the solution involves deep operator fusion, memory
    coalescing, and increasing batch sizes to ensure that every byte fetched from
    the 32 GB LPDDR4x memory is reused across as many INT8 MAC operations as possible.
  common_mistake: Candidates often assume the 400 TOPS INT8 peak can be easily reached
    by just enabling INT8 quantization, without analyzing the massive arithmetic intensity
    required. They might suggest simply adding more compute threads or increasing
    model parallelism, ignoring the fact that the LPDDR4x memory bandwidth is severely
    starving the compute units if data reuse isn't heavily optimized.
  napkin_math: Assume the 32 GB LPDDR4x memory subsystem provides roughly 136 GB/s
    of bandwidth. Peak compute is 400 TOPS (400,000 GOPS). Required Arithmetic Intensity
    to be compute-bound = 400,000 GOPS / 136 GB/s = ~2,941 OPS/byte. At 5% utilization,
    the system achieves 20 TOPS, implying a current intensity of 20,000 / 136 = ~147
    OPS/byte. By applying aggressive kernel fusion and increasing the batch size to
    improve weight and activation reuse by 10x, the intensity rises to 1,470 OPS/byte.
    The new achievable throughput is 1,470 OPS/byte * 136 GB/s = ~200 TOPS (50% utilization,
    a 10x speedup), fully bounded by the 75W power profile.
