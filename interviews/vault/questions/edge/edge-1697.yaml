title: Optimizing INT8 Compute Utilization on Qualcomm AI 100
scenario: Your team is porting a heavy INT8 vision workload from a datacenter GPU to an on-premise Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W). Initial profiling shows that while the model fits entirely within the 32 GB LPDDR4x memory, compute utilization is stuck at barely 5% of the theoretical 400 TOPS peak.
question: How would you quantify the memory bottleneck behind 5% Cloud AI 100 utilization and improve it with fusion, coalescing, and batching?
details:
  realistic_solution: The correct approach is to calculate the required arithmetic intensity and restructure the workload to maximize on-chip SRAM reuse. Because the LPDDR4x memory bandwidth is relatively constrained compared to the massive 400 TOPS compute capacity, the solution involves deep operator fusion, memory coalescing, and increasing batch sizes to ensure that every byte fetched from the 32 GB LPDDR4x memory is reused across as many INT8 MAC operations as possible.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization automatically guarantees peak TOPS utilization without analyzing arithmetic intensity.
    **The Rationale:** Candidates over-index on raw compute numbers and ignore memory bandwidth starvation.
    **The Consequence:** Failing to realize that the LPDDR4x bandwidth severely restricts throughput if memory isn't aggressively reused.
  napkin_math: |
    - **Required Intensity:** Peak compute = 400,000 GOPS. Bandwidth = 136 GB/s. Required Arithmetic Intensity = 400,000 / 136 = **~2,941 OPS/byte**.
    - **Current State:** At 5% utilization (20 TOPS), intensity is 20,000 / 136 = ~147 OPS/byte.
    - **Optimization:** Increasing batch size and fusing kernels improves data reuse by 10x, yielding 1,470 OPS/byte.
    - **New Throughput:** 1,470 OPS/byte $\times$ 136 GB/s = **~200 TOPS** (50% utilization, a 10x speedup).
