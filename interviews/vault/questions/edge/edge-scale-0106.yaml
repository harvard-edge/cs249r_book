title: Edge Accelerator Selection Spec
scenario: You must choose an accelerator for an edge gateway that runs object detection, re-identification, and occasional local fine-tuning. Vendors provide TOPS numbers but little else. Specify the benchmark and hardware data needed before choosing.
question: What information is required before selecting an edge accelerator from vendor TOPS numbers?
details:
  realistic_solution: Require sustained throughput on the actual models, memory capacity, memory bandwidth, supported operators, quantization formats, batch-1 latency, power at sustained load, thermal throttling behavior, compiler maturity, and fallback cost for unsupported ops. TOPS alone is not a selection criterion.
  common_mistake: Treating TOPS as comparable across vendors without checking operator coverage, memory, and sustained power.
  napkin_math: A 40 TOPS accelerator that falls back 20% of operators to CPU can lose to a 20 TOPS accelerator with full delegation.
