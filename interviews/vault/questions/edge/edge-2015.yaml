title: Diagnosing Suboptimal ONNX Runtime Performance on Jetson Orin
scenario: You deploy a large-scale semantic segmentation model to an edge platform after converting it to ONNX. The model runs, but the inference throughput is only 8 FPS, significantly below the expected 25 FPS for the target application. Observation shows the GPU utilization is sporadic, while CPU utilization frequently spikes during inference batches.
question: How would you diagnose why the system only reaches 8 FPS with low GPU and high CPU usage, and what fixes would you try?
details:
  realistic_solution: Utilize `nsys profiling` to trace the execution timeline and identify specific TensorRT unsupported operators that trigger an execution fallback to the host CPU. Refactor the model architecture by substituting those layers with TensorRT-native equivalents, or author custom CUDA/TensorRT plugins to maintain 100% of the execution graph on the GPU accelerator.
  common_mistake: |
    **The Pitfall:** Assuming ONNX conversion guarantees unified accelerator execution.
    **The Rationale:** Developers trust the ONNX abstraction layer, failing to realize that edge execution providers silently break graphs when encountering esoteric ops.
    **The Consequence:** Massive latency inflation as gigabytes of intermediate tensors ping-pong across the PCIe bus between the GPU and the CPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target throughput: 25 FPS (40 ms/frame)
       - Current throughput: 8 FPS (125 ms/frame)
       - Typical INT8 inference requirement: ~100 GOPS
       - GPU capability: 275 TOPS
    2. **Calculations:**
       - Missing latency delta = 125 ms - 40 ms = 85 ms per frame
       - Ideal theoretical GPU execution = 100e9 Ops / 275e12 Ops/s = ~0.36 ms
       - The 85 ms bloat perfectly matches the latency profile of CPU emulation and bus transfer overhead.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound. Silent CPU fallbacks cripple pipeline throughput far below the 40ms deadline.**
