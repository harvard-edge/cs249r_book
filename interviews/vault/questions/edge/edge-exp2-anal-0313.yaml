title: SRAM Spilling in Fused Operators on Cloud AI 100
scenario: You are analyzing a compiled INT8 model on a Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x
  at 136 GB/s, 75W). A compiler pass fuses a Convolution and a large GeLU activation. Before fusion, the
  operations executed sequentially with a combined latency of 120 microseconds. After fusion, kernel launch
  overhead is reduced by 5 microseconds, but the fused operator exceeds the local SRAM capacity, forcing
  an additional 4 MB of intermediate data to be spilled to and read from the LPDDR4x memory. Explain why
  the compiler's fusion pass degrades overall performance in this specific scenario.
question: "Why does fusing the convolution and GeLU make latency worse, and what latency penalty does the 4MB SRAM spill add?"
details:
  realistic_solution: While fusion saves kernel launch overhead, the excessively large fused operator
    exhausts the on-chip SRAM, triggering register spilling to main memory. The time required to write
    and read the spilled intermediate activations to the LPDDR4x memory far exceeds the time saved from
    eliminating the kernel launch, resulting in a net latency regression. The compiler should be tuned
    to restrict fusion based on peak SRAM capacity.
  common_mistake: Candidates often assume operator fusion is universally beneficial because it reduces
    kernel launch overhead and typically improves data locality. They fail to calculate the actual memory
    bandwidth penalty incurred when a fused operator's working set exceeds the accelerator's on-chip SRAM
    capacity.
  napkin_math: SRAM Spill Penalty = (4 MB write + 4 MB read) / 136 GB/s. 8 MB / 136,000 MB/s = 0.0000588
    seconds, or 58.8 microseconds. Net latency change = -5 us (launch overhead saved) + 58.8 us (spill
    penalty) = +53.8 microseconds. The fused operator takes 120 + 53.8 = 173.8 microseconds, making it
    slower than the unfused version.
