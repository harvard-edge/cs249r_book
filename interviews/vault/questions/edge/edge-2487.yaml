title: Hailo-8 M/D/1 Queuing
scenario: An automated optical inspection system on a Hailo-8 receives images via a Poisson process at 20 frames per second. Processing one frame takes a deterministic 40ms.
question: Compute the expected queue length assuming an M/D/1 queueing model for the inference requests.
details:
  realistic_solution: 'In an M/D/1 queue (Poisson arrivals, deterministic service), calculate the service rate and utilization factor. The expected queue length is derived from the constant service time formula, which yields a much shorter queue than standard M/M/1 approximations.'
  common_mistake: |
    **The Pitfall:** Using the M/M/1 formula ρ² / (1-ρ).
    **The Rationale:** Candidates blindly apply the most common queuing formula, ignoring that edge inference latency is often highly deterministic.
    **The Consequence:** Over-provisioning buffer memory or unnecessarily rejecting requests based on overestimated queue lengths.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ): 20 frames/sec
    - Deterministic service time: 40ms = 0.040s
    - Service rate (μ): 1 / 0.040 = 25 frames/sec

    **Calculations:**
    - Utilization (ρ): λ / μ = 20 / 25 = 0.8
    - M/D/1 Queue length (L_q): ρ² / (2 * (1 - ρ))
    - L_q = 0.8² / (2 * 0.2) = 0.64 / 0.4 = 1.6 frames

    **Conclusion & Interpretation:**
    - **Result: 1.6 Frames (Queue-Bound)**. The deterministic nature of inference halves the expected queue length compared to an M/M/1 model (which would predict 3.2 frames).
