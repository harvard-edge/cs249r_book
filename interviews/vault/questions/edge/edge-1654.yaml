title: Hybrid On-Device FL using Hailo-8 Dataflow Accelerator
scenario: You are designing a cross-device federated learning system for smart city cameras to continuously update a pedestrian detection model based on non-IID local data. The edge nodes are equipped with a low-power host CPU and a Hailo-8 accelerator (dataflow architecture with no local DRAM, streaming directly from host memory). Since the Hailo-8 is an INT8 inference-only dataflow engine, you must synthesize a novel architecture that leverages it to accelerate the local FL training rounds without stalling the host CPU or exceeding strict edge power budgets.
question: How would you use the INT8 inference-only Hailo-8 to accelerate local federated training without stalling the host CPU?
details:
  realistic_solution: The optimal architecture freezes the model backbone and uses the Hailo-8 purely as a highly efficient feature extractor (forward pass only). The host CPU streams input image batches to the Hailo-8 and receives low-dimensional INT8 embedding vectors back into host memory. The host CPU then performs a lightweight FP32 backward pass only on the final classification or bounding box regression heads to compute local gradients. This hybrid approach keeps the heavy lifting on the accelerator while minimizing host CPU workload and PCIe bandwidth utilization.
  common_mistake: |
    **The Pitfall:** Assuming standard full-network backpropagation can run on the Hailo-8.
    **The Rationale:** Candidates often fail to recognize that the Hailo-8 is strictly an INT8 dataflow inference accelerator without local DRAM.
    **The Consequence:** Proposing backprop on the accelerator or streaming all intermediate activations to the CPU severely bottlenecks the PCIe bus and overwhelms the low-power host CPU.
  napkin_math: |
    1. Batch of 32 images (224x224x3, ~150KB each): host streams 4.8MB to Hailo-8.
    2. Transfer over PCIe Gen3 x4 (~3.9 GB/s): ~1.2ms.
    3. Forward pass (1-GOP backbone on 26 TOPS): ~1.2ms.
    4. Hailo-8 streams back 32 INT8 1024-dim vectors (32KB total): <0.1ms.
    5. CPU computes gradients for a small dense head (~10K MACs): <1ms.
    6. Total time per batch: ~3ms.
    7. Local FL epoch of 1,000 batches completes in **~3 seconds**.
