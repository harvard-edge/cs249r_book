title: Hybrid On-Device FL using Hailo-8 Dataflow Accelerator
scenario: You are designing a cross-device federated learning system for smart city cameras to continuously update a pedestrian detection model. The edge nodes are equipped with a low-power host CPU and an INT8 inference-only dataflow accelerator. Since the accelerator has no local DRAM and streams directly from host memory, you must synthesize an architecture that leverages it without stalling the host CPU.
question: How would you use the INT8 inference-only accelerator to run local federated training without stalling the host CPU?
details:
  realistic_solution: 'Employ a Split-Learning architecture: freeze the backbone and leverage the INT8 accelerator strictly as a highly efficient feature extractor. The CPU streams image batches and receives low-dimensional INT8 embeddings in return. The low-power host CPU then executes a lightweight FP32 backward pass exclusively on the final dense classification head, ensuring the PCIe bus and CPU remain un-bottlenecked.'
  common_mistake: |
    **The Pitfall:** Assuming standard full-network backpropagation can run on the accelerator.
    **The Rationale:** Candidates often fail to recognize that the accelerator is strictly an INT8 dataflow inference engine without local DRAM.
    **The Consequence:** Proposing backprop on the accelerator or streaming all intermediate activations to the CPU severely bottlenecks the PCIe bus and overwhelms the low-power host CPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size: 32 images (150 KB each)
       - PCIe Gen3 x4 Bandwidth: ~3.9 GB/s
       - Forward pass latency: ~1.2 ms
       - Output embedding: 1024-dim INT8 per image
    2. **Calculations:**
       - Host to device transfer: 32 * 150 KB = 4.8 MB
       - Transfer latency: 4.8 MB / 3.9 GB/s ≈ 1.2 ms
       - Device to host transfer: 32 * 1024 bytes = 32 KB (< 0.1 ms)
       - CPU dense head backward pass: ~1 ms
       - Total batch latency: 1.2 ms + 1.2 ms + 0.1 ms + 1.0 ms = 3.5 ms
    3. **Conclusion & Interpretation:**
       - **Result: PCIe-Bound Pipeline.** A hybrid architecture offloads the heavy backbone to INT8, limiting the CPU load to a lightweight ~1 ms FP32 update per batch.
