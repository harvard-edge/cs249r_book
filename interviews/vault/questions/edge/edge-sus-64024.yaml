title: Jetson Orin Carbon Footprint for Continuous Edge Inference Deployment
scenario: A smart city deploys 5,000 Jetson Orin NX modules for continuous pedestrian detection at intersections.
  Each module draws 25W average (of the 60W max TDP) running a YOLO-based detection model. The city's
  electricity grid has an intensity of 450 gCO2/kWh. Calculate the annual operational carbon footprint
  for the fleet, compare it against deploying the same workload on a centralized H100 cloud server, and
  advise on the carbon break-even point between edge and cloud deployments.
question: "What is the annual carbon footprint of the 5,000-node edge fleet versus H100 cloud inference, and where is the carbon break-even?"
details:
  realistic_solution: 'Edge fleet: 5,000 × 25W = 125 kW continuous. Annual: 125 kW × 8,760h = 1,095,000
    kWh. Carbon: 1,095,000 × 0.450 = 492,750 kgCO2 = 493 tCO2/year. Cloud alternative: 5,000 cameras ×
    ~30fps × 1 inference. H100 throughput for YOLO-v8n at batch 1 ≈ 2,000 fps. Need ceil(5,000 × 30 /
    2,000) = 75 H100 GPUs. Power: 75 × 700W × 1.2 PUE = 63 kW. Plus network: 5,000 streams × 2 Mbps (compressed)
    = 10 Gbps, network infra power ≈ 15 kW. Total cloud: 78 kW. Annual: 78 × 8,760 = 683,280 kWh. If cloud
    at 120 gCO2/kWh (green grid): 82 tCO2. Edge 493 tCO2 vs cloud 82 tCO2—cloud is 6× lower carbon IF
    on green grid. On same grid (450g): cloud = 683,280 × 0.45 = 307 tCO2 vs edge 493 tCO2—cloud still
    38% lower.'
  common_mistake: Ignoring network transmission carbon for cloud deployment. Sending 5,000 camera streams
    to the cloud requires substantial network infrastructure power. Also, cloud GPU utilization for this
    workload is typically low (bursty, low-batch inference), increasing energy-per-inference compared
    to edge.
  napkin_math: 'Edge: 5,000 × 0.025 kW × 8,760h × 0.450 kg/kWh = 492,750 kgCO2. Cloud GPU: ceil(5,000×30fps
    / 2,000fps/GPU) = 75 H100s. Cloud power: 75×700W×1.2 = 63,000W + 15,000W network = 78 kW. Cloud annual
    energy: 78×8,760 = 683,280 kWh. Cloud on green grid (120g): 82,000 kgCO2. Cloud on same grid (450g):
    307,476 kgCO2. Edge/Cloud ratio (same grid): 493/307 = 1.61× (edge emits 61% more). Break-even grid
    intensity for cloud: solve 5,000×0.025×8,760×0.45 = 78×8,760×CI → CI = 492,750/683,280 = 0.721 kgCO2/kWh
    = 721 gCO2/kWh. If cloud grid > 721g, edge is greener.'
