title: Smart Camera Carbon Payback Period
scenario: 'A smart city operates 10,000 traffic cameras sending 1080p video to a cloud server. The continuous
  network transmission draws 6W per camera. A proposal suggests upgrading to edge AI modules (embodied
  carbon: 20 kg CO2e each) that draw 2W to process video locally and only transmit 1KB/s of metadata.
  The local grid carbon intensity is 400 gCO2/kWh. Evaluate the carbon payback period of this edge upgrade.'
question: "What is the carbon payback period for adding the 20 kg CO2e edge AI modules to the 10,000 traffic cameras?"
details:
  realistic_solution: Perform a lifecycle carbon assessment. Calculate the operational energy saved by
    eliminating the continuous video stream, convert it to carbon emissions using the grid's specific
    carbon intensity, and divide the embodied carbon of the new hardware by the annual operational carbon
    savings. The edge deployment is highly sustainable and justified if the carbon payback period is significantly
    shorter than the hardware's expected 3-5 year lifespan.
  common_mistake: Only calculating operational energy savings and ignoring the embodied carbon cost of
    manufacturing the new edge hardware.
  napkin_math: Power saved = 6W - 2W = 4W per camera. Annual energy saved = 4W * 24h * 365d = 35,040 Wh
    = 35.04 kWh. Annual carbon saved = 35.04 kWh * 0.4 kgCO2/kWh = 14.016 kg CO2e/year. Payback period
    = Embodied Carbon / Annual Savings = 20 kg / 14.016 kg/yr = 1.42 years.
