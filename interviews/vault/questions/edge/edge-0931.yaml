title: Smart Camera Carbon Payback Period
scenario: 'A smart city operates 10,000 traffic cameras sending 1080p video to a cloud server. The continuous network transmission draws 6W per camera. A proposal suggests upgrading to edge AI modules (embodied carbon: 20 kg CO2e each) that draw 2W to process video locally and only transmit 1KB/s of metadata. The local grid carbon intensity is 400 gCO2/kWh.'
question: What is the carbon payback period for adding the 20 kg CO2e edge AI modules to the 10,000 traffic cameras?
details:
  realistic_solution: Perform a lifecycle carbon assessment. Calculate the operational energy saved by eliminating the continuous video stream, convert it to carbon emissions using the grid's specific carbon intensity, and divide the embodied carbon of the new hardware by the annual operational carbon savings.
  common_mistake: |
    **The Pitfall:** Ignoring embodied carbon.
    **The Rationale:** Candidates only calculate operational energy savings, missing the massive manufacturing carbon cost of deploying 10,000 new edge modules.
    **The Consequence:** Failing to perform a true lifecycle carbon assessment, incorrectly evaluating sustainability initiatives.
  napkin_math: |
    - **Power saved per camera:** 6W - 2W = 4W.
    - **Annual energy saved per camera:** 4W * 24h * 365d = 35,040 Wh = 35.04 kWh.
    - **Annual carbon saved per camera:** 35.04 kWh * 0.4 kgCO2/kWh = 14.016 kg CO2e/year.
    - **Payback period:** 20 kg (Embodied Carbon) / 14.016 kg/yr = 1.427 years.
    - **Final result:** **1.43 years.**
