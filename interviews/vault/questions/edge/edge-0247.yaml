title: The Hard Real-Time Deadline
scenario: You're designing the main perception pipeline for an autonomous vehicle's braking system. The system has a non-negotiable, safety-critical deadline to react to an obstacle. Based on automotive standards, the 'camera-glass-to-brake-signal' latency must be under 33 milliseconds.
question: Which of the following metrics is the most important to define as your primary optimization target?
details:
  realistic_solution: The correct metric is the P99 or P100 latency for a single frame. In safety-critical systems like autonomous driving, the average case is irrelevant; the system must meet its deadline *every single time*. A single missed deadline can be catastrophic. Optimizing for throughput using techniques like batching can actively hurt this metric.
  common_mistake: |
    **The Pitfall:** Conflating throughput (like Frames Per Second) with latency.
    **The Rationale:** Engineers often optimize for high FPS by batching, which introduces queueing delays that make the latency for any single frame much higher.
    **The Consequence:** Building a system with high overall throughput that still fatally misses hard real-time deadlines for individual critical events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard real-time deadline for autonomous braking.
    - Latency budget < 33ms per single frame.

    **Calculations:**
    - Single frame P99/P100 latency must strictly be < 33ms.

    **Conclusion & Interpretation:**
    - **Result: Worst-case latency is the only safety-guaranteed metric.** Throughput optimization can degrade essential worst-case performance.
  options:
  - Maximizing batch throughput (Frames Per Second)
  - Minimizing average latency (P50)
  - Minimizing worst-case latency (P99/P100)
  - Maximizing power efficiency (TOPS/Watt)
