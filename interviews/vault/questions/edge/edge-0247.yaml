title: The Hard Real-Time Deadline
scenario: You're designing the main perception pipeline for an autonomous vehicle's braking system. The
  system has a non-negotiable, safety-critical deadline to react to an obstacle. Based on automotive standards,
  the 'camera-glass-to-brake-signal' latency must be under 33 milliseconds. Which of the following metrics
  is the most important to define as your primary optimization target?
details:
  realistic_solution: The correct metric is the P99 or P100 latency for a single frame. In safety-critical
    systems like autonomous driving, the average case is irrelevant; the system must meet its deadline
    *every single time*. A single missed deadline can be catastrophic. Optimizing for throughput using
    techniques like batching can actively hurt this metric.
  common_mistake: Engineers often conflate throughput (like Frames Per Second) with latency. A system
    can achieve high FPS by processing frames in large batches, but this introduces a queueing delay that
    makes the latency for any single frame much higher. For a hard real-time system, the P100 latency
    (the absolute worst-case time for one frame) is what matters, not the average or the overall throughput.
  napkin_math: The physics of the problem dictate the target. A 33ms deadline is a standard derived from
    human reaction times and braking distances.
  options:
  - Maximizing batch throughput (Frames Per Second)
  - Minimizing average latency (P50)
  - Minimizing worst-case latency (P99/P100)
  - Maximizing power efficiency (TOPS/Watt)
