title: Edge ID Persistence
scenario: A retail server with dual Jetson AGX Orins performs customer tracking. Power
  blips occasionally cause sudden reboots.
question: Evaluate a strategy to maintain continuous tracking IDs across reboots without
  writing high-frequency video data to the SD card.
details:
  realistic_solution: Writing raw frames to the SD card causes rapid flash wear out.
    Instead, extract abstract metadata (bounding boxes and lightweight Re-ID embeddings)
    and stream them to an external message broker or a robust NVMe. On reboot, the
    Orin pulls the last known embeddings to re-identify individuals.
  common_mistake: Recommending writing full intermediate tensor states or raw video
    to the SD card, which burns out the storage within weeks.
  napkin_math: 50 people * 256 floats * 4 bytes = 50 KB metadata per frame vs 24 MB
    raw frame.
