title: Asynchronous I/O to Prevent Edge Stalls
scenario: An edge gateway aggregates INT8 inferences from a sensor array and uploads
  a batched payload over a high-latency LTE connection.
question: Identify the standard programming pattern required to prevent the main inference
  loop from stalling during the LTE transmission.
details:
  realistic_solution: The system should use Asynchronous I/O or a multi-threaded producer-consumer
    pattern. The inference thread places the batched results into a thread-safe queue.
    A separate, dedicated network thread dequeues the payload and handles the blocking
    LTE transmission, allowing the inference loop to continue processing incoming
    sensor data immediately.
  common_mistake: Using a busy-wait polling loop, which wastes CPU cycles that could
    be used for inference.
  napkin_math: 1 queue = 2 threads
