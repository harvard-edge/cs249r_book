title: Edge TPU Pipeline Profiling and Bottleneck Resolution
scenario: You are deploying a cascaded object detection pipeline on a Google Coral
  Edge TPU connected via USB 3.0. Profiling traces reveal that although the Edge TPU
  handles INT8 operations efficiently, the end-to-end latency is 150ms per frame,
  failing your 33ms target. Flame graphs indicate severe I/O bottlenecking caused
  by a single unsupported activation function in the middle of the network, which
  forces execution to fall back to the host CPU. Synthesize a novel architectural
  strategy to eliminate this bottleneck and redesign the pipeline to achieve real-time
  latency within the hardware constraints.
question: How would you eliminate the Coral Edge TPU CPU fallback and redesign the
  pipeline to meet the 33ms frame target?
details:
  realistic_solution: The optimal solution requires replacing the unsupported activation
    function with an Edge TPU-compatible equivalent (e.g., replacing Swish with ReLU6)
    and retraining the model to ensure 100% of the graph compiles into a single Edge
    TPU execution block. Additionally, the pipeline should be redesigned to crop or
    downsample the input on the host before transferring it over USB, drastically
    reducing the initial payload size and overlapping I/O with TPU execution.
  common_mistake: Candidates often focus solely on model pruning or further quantization,
    ignoring the massive PCIe/USB bandwidth penalty of host CPU fallbacks. They fail
    to analyze the trace tools correctly to see that data transfer dominates the execution
    time rather than the actual INT8 compute.
  napkin_math: 'The Google Coral Edge TPU provides 4 TOPS for INT8 operations within
    a 2W power envelope. An INT8 model requiring 10 GOPS takes theoretically 10e9
    / 4e12 = 2.5ms to compute. A USB 3.0 connection yields ~300 MB/s practical bandwidth.
    Transferring a raw 1080p frame (1920x1080x3 bytes = 6.2 MB) takes 6.2 / 300 =
    20.7ms. If an unsupported op forces a 2 MB intermediate tensor fallback, it adds
    4 MB (round trip) / 300 MB/s = 13.3ms of I/O latency. Total time: 20.7ms + 2.5ms
    + 13.3ms = 36.5ms (misses 33ms target). By eliminating the fallback (saves 13.3ms)
    and downsampling inputs to 640x640 (1.2 MB -> 4ms transfer), the new latency is
    4ms + 2.5ms = 6.5ms, comfortably achieving the target.'
