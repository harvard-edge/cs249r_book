title: Wake-on-VAD Duty Cycling Battery Life
scenario: A battery-powered smart doorbell using a Cortex-M4 runs a small Voice Activity
  Detection (VAD) model continuously, drawing 5mW active and 100uW in deep sleep.
  The VAD runs for 10ms per 100ms window, sleeping otherwise. A full wake-up of the
  main SoC for positive VAD costs an extra 100mW for 5 seconds (occurs 10 times per
  day).
question: Calculate the average daily energy consumption in milli-Watt-hours (mWh)
  and expected battery life on a 3000 mWh cell, diagnosing whether it meets a 1-year
  target.
visual:
  kind: svg
  path: edge-0980.svg
  alt: A sleep/wake timeline showing power consumption spikes to 5mW every 100ms with
    a baseline of 0.1mW.
  caption: VAD duty cycle power profile.
details:
  realistic_solution: The VAD is active 10% of the time, so average baseline power
    is 0.1 * 5mW + 0.9 * 0.1mW = 0.59mW. The daily baseline energy is 0.59mW * 24h
    = 14.16 mWh. The SoC wakes up 10 times/day for 5s, adding 100mW * (50s / 3600s)
    = 1.39 mWh. Total daily energy is 14.16 + 1.39 = 15.55 mWh. Battery life is 3000
    / 15.55 ≈ 193 days, missing the 365-day target.
  common_mistake: Forgetting to convert the SoC wake time to hours before adding to
    mWh, or ignoring the 0.1mW sleep state power.
  napkin_math: 0.1*5 + 0.9*0.1 = 0.59mW; 0.59*24 + 100*(50/3600) = 15.55mWh; 3000/15.55
    = 193 days
