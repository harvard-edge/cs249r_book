title: 'Edge TCO Evaluation: Coral TPU vs Cloud Inference for Low-Volume Deployments'
scenario: Compare Coral Edge TPU ($25, 4 TOPS, 2W) + Raspberry Pi 4 ($35, 5W) = $60 system vs AWS Lambda cloud inference at $0.0001/inference for a beehive monitor running MobileNetV2 at 1 inference/minute, 24/7.
question: For the beehive monitor at 1 inference per minute, what is the 3-year TCO for edge versus Lambda, and what is the daily break-even volume?
details:
  realistic_solution: 'Edge system: HW=$60. Power: 7W * 8760 * 3 * $0.10/kWh = $18.4. Total 3yr: $78.4. Cloud: 1 inf/min * 60 * 24 * 365 * 3 * $0.0001 = 1,576,800 * $0.0001 = $157.68. Cloud is 2x more expensive than edge! Edge wins at 1 inf/minute. Break-even: Edge cost = Cloud cost. $78.4 = N_inf_3yr * $0.0001. N = 784,000 inferences over 3yr = 717/day. Below 717/day: cloud cheaper. Above: edge cheaper. At 1/min = 1440/day: edge wins.'
  common_mistake: |
    **The Pitfall:** Assuming edge is always cheaper because there is no per-inference cloud cost.
    **The Rationale:** Candidates ignore the fixed capital expenditure (hardware) and constant operational expenditure (power) of edge devices in low-volume scenarios.
    **The Consequence:** Organizations deploy fleets of edge devices for very low-frequency tasks, resulting in a significantly higher Total Cost of Ownership than a simple cloud function.
  napkin_math: |
    1. Calculate Edge TCO (3 years):
       - Hardware: $60.
       - Power: 7W * 8760 hours/yr * 3 years * $0.10/kWh = $18.40.
       - Total Edge Cost: $78.40.
    2. Calculate Cloud TCO (3 years at 1 inf/min):
       - Volume: 1 inf/min * 60 min * 24 hr * 365 days * 3 yrs = 1,576,800 inferences.
       - Cost: 1,576,800 * $0.0001 = $157.68.
    3. Calculate Break-even Volume (Edge Cost = Cloud Cost):
       - $78.40 = N_inf_3yr * $0.0001
       - N_inf_3yr = 784,000 inferences over 3 years.
       - Daily break-even = 784,000 / (3 * 365) = 716 inferences/day (approx. 0.5 inf/min).
    **At 1 inference/minute, edge ($78.40) is cheaper than cloud ($157.68). The break-even point is 716 inferences per day.**
