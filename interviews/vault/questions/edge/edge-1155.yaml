title: 'Edge TCO Evaluation: Coral TPU vs Cloud Inference for Low-Volume Deployments'
scenario: Compare Coral Edge TPU ($25, 4 TOPS, 2W) + Raspberry Pi 4 ($35, 5W) = $60
  system vs AWS Lambda cloud inference at $0.0001/inference for a beehive monitor
  running MobileNetV2 at 1 inference/minute, 24/7. Calculate 3-year TCO per unit and
  break-even volume per day.
question: For the beehive monitor at 1 inference per minute, what is the 3-year TCO
  for edge versus Lambda and the daily break-even volume?
details:
  realistic_solution: 'Edge system: HW=$60. Power: 7W * 8760 * 3 * $0.10/kWh = $18.4.
    Total 3yr: $78.4. Cloud: 1 inf/min * 60 * 24 * 365 * 3 * $0.0001 = 1,576,800 *
    $0.0001 = $157.68. Cloud is 2x more expensive than edge! Edge wins at 1 inf/minute.
    Break-even: Edge cost = Cloud cost. $78.4 = N_inf_3yr * $0.0001. N = 784,000 inferences
    over 3yr = 717/day. Below 717/day: cloud cheaper. Above: edge cheaper. At 1/min
    = 1440/day: edge wins.'
  common_mistake: Assuming edge always wins due to zero per-inference cloud cost,
    without accounting for low-volume scenarios where the fixed hardware + power cost
    of edge exceeds cloud variable cost.
  napkin_math: 'Edge: $60 HW + $18.4 power 3yr = $78.4. Cloud: 1440 inf/day * 1096
    days * $0.0001 = $157.82. Edge cheaper by $79.4 or 50%. Break-even: $78.4 = N
    * 3 * 365 * $0.0001 → N = $78.4/(0.0001*1095) = 715.5 inf/day. At 715 inf/day
    = 0.5/min: break-even. Below 0.5 inf/min (30 sec between inferences): use cloud.
    Above 0.5 inf/min: edge. Most IoT sensors run at 1-10 inferences/sec → edge wins
    easily. Beehive at 1/min barely qualifies for edge.'
