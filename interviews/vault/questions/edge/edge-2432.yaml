title: Supercapacitor Graceful Shutdown
scenario: An industrial robot with a Hailo-8 loses AC power and relies on a supercapacitor
  for 5 seconds of backup runtime.
question: Explain the critical software role of the graceful shutdown checkpoint during
  this 5-second window, naming the specific subsystems (filesystem flush, in-flight
  inference state, file handles) and the canonical order in which the shutdown sequence
  must execute them.
details:
  realistic_solution: The 5-second window provides just enough energy to execute a
    graceful shutdown sequence. The software must flush in-flight telemetry, write
    local inference state to non-volatile flash, and safely close file handles. This
    ensures the filesystem does not corrupt and the robot resumes cleanly upon power
    restoration.
  common_mistake: Suggesting the 5 seconds should be used to finish the inference
    task and alert a central server, ignoring local state corruption risks.
  napkin_math: 5 seconds to flush <10MB of critical state.
