title: Edge TPU Compute Capacity and PSI Drift Calculation
scenario: You are deploying a defect detection model on an edge TPU (4 TOPS INT8, 2W power budget) processing 50 frames per second. The main classification model consumes 3.5 TOPS of compute. To monitor data drift locally, you deploy a secondary autoencoder to compute reconstruction errors, which requires 8 GOPS per frame and must be quantized to INT8 due to limited operator support. You track the Population Stability Index (PSI) of the predicted defect rate. If the expected defect rate is 10% and the actual observed rate is 20%, calculate the remaining compute capacity and the PSI contribution for the defect bin (assume ln(2) ≈ 0.69).
question: What compute capacity remains after adding the 8 GOPS/frame autoencoder at 50 FPS, and what is the defect-bin PSI contribution?
details:
  realistic_solution: 'Calculate the total throughput requirements of the drift detection model in TOPS to ensure it fits within the hardware constraints. Then apply the standard PSI formula to quantify the distribution shift for the specific defect bin.'
  common_mistake: |
    **The Pitfall:** Failing to convert GOPS to TOPS, or swapping the Expected and Actual values in the PSI formula.
    **The Rationale:** Unit conversion errors or misremembering statistical formulations for drift metrics.
    **The Consequence:** Incorrectly determining that the hardware lacks capacity, or miscalculating drift severity leading to missed alerts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total compute limit: 4.0 TOPS (INT8).
       - Main model: 3.5 TOPS.
       - Drift model: 8 GOPS/frame at 50 FPS.
       - Expected rate = 0.1, Actual rate = 0.2.
    2. **Calculations:**
       - Drift model compute: 8 GOPS/frame * 50 FPS = 400 GOPS = 0.4 TOPS.
       - Total utilized compute: 3.5 TOPS + 0.4 TOPS = 3.9 TOPS.
       - Remaining capacity: 4.0 TOPS - 3.9 TOPS = 0.1 TOPS.
       - PSI formula: (Actual - Expected) * ln(Actual / Expected).
       - PSI defect bin: (0.2 - 0.1) * ln(0.2 / 0.1) = 0.1 * ln(2) = 0.1 * 0.69 = 0.069.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Drift Detection**. The secondary drift model fits tightly within the remaining compute envelope, leaving just 0.1 TOPS margin.
