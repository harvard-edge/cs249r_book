title: Hailo-8 Dataflow Scheduling for High-Resolution Detection
scenario: You are deploying a custom YOLOv8-based object detector on a Hailo-8 accelerator. The model has multiple high-resolution feature maps that exceed the on-chip memory capacity of the accelerator. The Hailo-8 must stream activations and weights directly from the host memory.
question: How would you schedule and fuse the YOLOv8 layers on Hailo-8 to maintain 30 FPS without making PCIe bandwidth the bottleneck?
details:
  realistic_solution: The correct approach involves aggressive depth-first scheduling and layer fusion to maximize on-chip data retention. By partitioning the network into sub-graphs that fit entirely within the Hailo-8's distributed SRAM, we can stream input patches from the host, process them through multiple fused layers, and stream out only the final, heavily reduced activation maps. This transforms a bandwidth-bound problem into a compute-bound one.
  common_mistake: |
    **The Pitfall:** Proposing standard layer-by-layer execution without fusing.
    **The Rationale:** Candidates treat stream-based edge NPUs like standard GPUs equipped with massive local DRAM.
    **The Consequence:** Writing intermediate feature maps back to the host over PCIe completely saturates bandwidth, dropping frame rates to unplayable levels.
  napkin_math: |
    - 1080p input: 1920x1080x3 ≈ 6.2MB.
    - Initial input stream at 30 FPS: 186 MB/s.
    - Unfused intermediate feature map (e.g., 120x120x256): ~3.7MB per layer.
    - Roundtrip PCIe traffic for 10 layers: 3.7MB * 2 (read/write) * 10 * 30 FPS ≈ **2.2 GB/s**.
    - PCIe Gen3 x2 limit: 1.9 GB/s.
    - Fused graph PCIe traffic: Only the 186 MB/s input stream, easily maintaining **30 FPS**.
