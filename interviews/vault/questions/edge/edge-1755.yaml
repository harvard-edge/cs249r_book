title: Hailo-8 Dataflow Scheduling for High-Resolution Detection
scenario: You are deploying a custom YOLOv8-based object detector on a streaming NPU. The model has multiple high-resolution feature maps that exceed the on-chip memory capacity of the accelerator. The NPU must stream activations and weights directly from the host memory.
question: How would you schedule and fuse the YOLOv8 layers to maintain 30 FPS without making PCIe bandwidth the bottleneck?
details:
  realistic_solution: "Employ aggressive depth-first subgraph fusion to retain intermediate high-resolution tensors entirely on-chip. Un-fused execution mandates spilling massive spatial feature maps over the constrained PCIe Gen3 bus, instantaneously choking throughput to sub-10 FPS. Tiling the graph limits I/O exclusively to the 1080p input ingestion and low-dimensional output bounding boxes, successfully re-aligning the pipeline to a compute-bound paradigm."
  common_mistake: |
    **The Pitfall:** Proposing standard layer-by-layer execution without fusing.
    **The Rationale:** Candidates treat stream-based edge NPUs like standard GPUs equipped with massive local DRAM.
    **The Consequence:** Writing intermediate feature maps back to the host over PCIe completely saturates bandwidth, dropping frame rates to unplayable levels.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 1080p RGB (1920x1080x3) ≈ 6.2MB.
       - FPS target: 30 FPS.
       - PCIe Gen3 x2 limit: 1.9 GB/s.
    2. **Calculations:**
       - Input stream = 6.2MB * 30 FPS = 186 MB/s.
       - Unfused intermediate map = ~3.7MB/layer.
       - Unfused PCIe traffic (10 layers) = 3.7MB * 2 (R/W) * 10 * 30 FPS ≈ 2.2 GB/s.
    3. **Conclusion & Interpretation:**
       - **Fused graph requires 186 MB/s; unfused requires 2.2 GB/s.** Fusing transforms the model from hopelessly bandwidth-bound to strictly compute-bound.
