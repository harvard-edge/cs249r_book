title: 'The 30 FPS Frame Deadline: Real-Time Deadlines'
scenario: An autonomous delivery robot uses a vision model to detect obstacles. To operate safely, the system has a hard real-time requirement to process camera frames at a minimum of 30 Frames Per Second (FPS).
question: What is the maximum frame budget in milliseconds for the entire vision pipeline to meet a 30 FPS requirement?
details:
  realistic_solution: To meet a 30 FPS target, each frame must be processed from capture to final output in under the time allocated for a single frame. Since there are 1000 milliseconds in a second, the budget is calculated by dividing the total time by the number of frames. This gives a hard deadline of 33.3 milliseconds per frame.
  common_mistake: |
    **The Pitfall:** Calculating 1 / 30 = 0.033 and reporting that as the answer, or answering ~16.7ms.
    **The Rationale:** Candidates forget the unit conversion from seconds to milliseconds, or confuse the 30 FPS target with a 60 FPS UI target.
    **The Consequence:** Establishing a latency budget that is either mathematically nonsensical or unnecessarily tight, leading to over-optimization.
  napkin_math: |
    1. 1 second = 1000 milliseconds.
    2. Frame Budget = Total Time / Target FPS.
    3. Frame Budget = 1000 ms / 30 frames.
    4. Budget = **33.33 milliseconds**.
  options:
  - 16.7 ms
  - 30 ms
  - 33.3 ms
  - 0.033 ms
  correct_index: 2
