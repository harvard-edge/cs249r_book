title: 'The 30 FPS Frame Deadline: Real-Time Deadlines'
scenario: An autonomous delivery robot uses a vision model to detect obstacles. To operate safely, the
  system has a hard real-time requirement to process camera frames at a minimum of 30 Frames Per Second
  (FPS). Explain what the maximum permissible latency, or 'frame budget,' is in milliseconds for the entire
  vision pipeline to meet this requirement.
details:
  realistic_solution: To meet a 30 FPS target, each frame must be processed from capture to final output
    in under the time allocated for a single frame. Since there are 1000 milliseconds in a second, the
    budget is calculated by dividing the total time by the number of frames. This gives a hard deadline
    of 33.3 milliseconds per frame.
  common_mistake: A common error is to forget the units conversion from seconds to milliseconds, calculating
    `1 / 30 = 0.033` and reporting that as the answer. Another mistake is to confuse the 30 FPS target
    with the 60 FPS target common in user interfaces, leading to an answer of ~16.7ms.
  napkin_math: 1 second = 1000 milliseconds. Frame Budget = 1000 ms / 30 frames. 1000 / 30 = 33.33 milliseconds.
    To maintain 30 FPS, the maximum permissible latency for the entire processing pipeline from camera
    capture to final output must be strictly under 33.3 ms per frame.
  options:
  - 16.7 ms
  - 30 ms
  - 33.3 ms
  - 0.033 ms
  correct_index: 2
