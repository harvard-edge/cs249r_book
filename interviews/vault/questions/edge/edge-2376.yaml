title: DETR Attention Tiling Edge
scenario: A Transformer-based object detector (DETR) processes 4K video on a Jetson
  AGX Orin. The self-attention feature maps are massive.
question: Analyze the LPDDR5 memory traffic for the self-attention maps and create
  a tiling strategy to prevent spilling out of the Orin's L2 cache.
details:
  realistic_solution: 'Attention complexity is O(N^2). For 4096 tokens, the NxN attention
    matrix requires 32MB in FP16, which heavily spills out of the Orin''s ~6MB L2
    cache to LPDDR5, causing a massive bandwidth bottleneck. The solution is to implement
    FlashAttention or block-wise chunking: computing the softmax denominator locally
    in SRAM tile-by-tile (e.g., blocks of 256x256) without ever materializing the
    full 32MB matrix.'
  common_mistake: Using a standard PyTorch `matmul` -> `softmax` -> `matmul` pipeline,
    which materializes the full O(N^2) tensor in slow main memory.
  napkin_math: 4096 * 4096 * 2 bytes (FP16) = 33.5 MB, which exceeds the 6MB L2 cache.
