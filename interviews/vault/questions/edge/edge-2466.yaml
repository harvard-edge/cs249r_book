title: Cold Boot Power Penalties on Edge Devices
scenario: A solar-powered Hailo-8 smart traffic camera is designed to wake up every
  10 seconds, capture an image, run inference, and sleep. Its 10Wh battery is depleting
  in days instead of months.
question: Evaluate the power traces showing a 2-second high-power phase before every
  inference to diagnose the flaw in the duty-cycling logic.
details:
  realistic_solution: The 2-second high-power phase is the Linux OS and Hailo PCIe
    driver cold-booting from a full power down. To fix this, the system must utilize
    a low-power suspend-to-RAM state instead of fully powering off, which brings the
    wake time down to milliseconds.
  common_mistake: Assuming sleep power optimization is solved by fully shutting off
    the device, ignoring massive OS boot energy.
  napkin_math: 2s * 5W = 10J wasted per wake
