title: Cold Boot Power Penalties on Edge Devices
scenario: A solar-powered Hailo-8 smart traffic camera wakes up every 10 seconds, captures an image, runs inference, and sleeps. Its 10Wh battery is depleting in days instead of months. Power traces show a 2-second high-power phase before every inference.
question: Evaluate the power traces showing a 2-second high-power phase before every inference to diagnose the flaw in the duty-cycling logic.
details:
  realistic_solution: The 2-second high-power phase is the Linux OS and Hailo PCIe driver cold-booting from a full power down. To fix this, the system must utilize a low-power suspend-to-RAM state instead of fully powering off, which brings the wake time down to milliseconds.
  common_mistake: |
    **The Pitfall:** Attempting to optimize power by fully shutting off the device.
    **The Rationale:** Candidates assume 'off' is always the most energy-efficient state, ignoring massive OS boot energy penalties.
    **The Consequence:** The frequent cold boot sequence drains the battery drastically faster than a suspend-to-RAM state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Boot delay: 2 seconds.
       - Boot power draw: 5W.
    2. **Calculations:**
       - Wasted energy per wake: 2s * 5W = 10 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 10 Joules are wasted purely on booting the OS and drivers per cycle.**
       - **Power-Bound**
