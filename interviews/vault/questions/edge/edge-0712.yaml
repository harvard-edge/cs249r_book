title: The OTA Storage Tax
scenario: You're designing the firmware for a fleet of smart environmental sensors. Each device has a microcontroller with 1MB of total Flash memory. To ensure you can deploy updates reliably, the system must use an A/B partitioning scheme for Over-the-Air (OTA) updates. The bootloader is allocated 32KB of flash, and the real-time operating system (RTOS) requires another 64KB.
question: What storage layout should you use, and what is the maximum application binary size with 1MB flash, 32KB bootloader, and 64KB RTOS?
details:
  realistic_solution: Evaluate immutable partition constraints required by secure fail-over processes. An A/B update paradigm mandates absolute mirroring of the application layer footprint after deducting persistent overhead blocks.
  common_mistake: |
    **The Pitfall:** Ignoring the dual-partition requirement for A/B OTA.
    **The Rationale:** Candidates often calculate the available space after subtracting system overhead, but forget that an A/B scheme effectively halves the remaining space.
    **The Consequence:** Building an application binary that is too large to download during a live OTA update, permanently bricking or stranding the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash Memory: 1 MB = 1024 KB.
    - Bootloader Footprint: 32 KB.
    - RTOS Footprint: 64 KB.
    - Partition Scheme: A/B OTA updates (requires dual identical application slots).

    **Calculations:**
    - Deduct fixed overheads = 1024 KB (Total) - 32 KB (Bootloader) - 64 KB (RTOS) = 928 KB.
    - Divide remaining space for A/B partitions = 928 KB / 2 partitions = 464 KB per slot.

    **Conclusion & Interpretation:**
    - **Result: 464 KB (Storage-Bound)**. The maximum safe application binary size is exactly half of the non-system flash memory.
  options:
  - 928 KB
  - 512 KB
  - 464 KB
  - 416 KB
  correct_index: 2
