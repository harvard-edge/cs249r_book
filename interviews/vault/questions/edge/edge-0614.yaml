title: 'The Autonomous Vision System Fork: ViT vs. Specialized CNN'
scenario: 'You are the lead ML Systems Architect at a new EV company designing the Level 3 autonomous
  driving stack. For the in-cabin Driver Monitoring System (DMS), the hardware team has presented you
  with a new, custom automotive SoC with specs similar to a Jetson AGX Orin, but with a strict 15W thermal
  design power (TDP) for the ML accelerator. The system must process a 640x640 driver-facing camera stream
  and detect signs of distraction or drowsiness within a 33ms hard real-time budget. The model development
  team has two prototypes: a highly accurate Vision Transformer (ViT) and a less accurate but computationally
  cheaper MobileNet-style CNN that heavily uses depthwise separable convolutions.'
question: "Which DMS model should you choose for the 15W SoC, ViT or MobileNet-style CNN, and how would you make it meet the 33ms budget?"
details:
  realistic_solution: The correct approach is to quantitatively disqualify the ViT for this specific task
    and then formulate a plan to improve the CNN. The quadratic complexity of self-attention in the ViT
    with respect to the number of input patches makes it computationally infeasible for a high-resolution,
    real-time edge application. A 640x640 input image results in a sequence length that requires trillions
    of operations, far exceeding the SoC's budget. The CNN's linear scaling is the only viable path.
  common_mistake: Engineers often assume that if a model is more accurate (the ViT), it's just a matter
    of optimization to make it fit. They underestimate the fundamental scaling differences between architectures.
    They might suggest naive optimizations like 'prune the ViT' without addressing the quadratic complexity
    that makes it non-viable for this combination of high resolution and low latency.
  napkin_math: Assume Orin-class SoC scaled down to 15W. Full Orin is 275 TOPS at ~60W (4.5 TOPS/W). At
    15W, budget is 15 * 4.5 = 67.5 TOPS. Assuming 50% utilization, we get 33.7 effective TOPS. A 30 FPS
    target allows 33.3ms. Max operations per frame = 33.7 TOPS * 0.0333s = 1.12 Tera-operations. A standard
    1.5 GOP MobileNetV3 fits easily, taking just 1.5G / 33.7T = 0.04ms of compute time.
