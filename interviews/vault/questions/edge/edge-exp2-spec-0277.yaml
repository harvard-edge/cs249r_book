title: Multi-Process Inference Optimization on Google Coral Edge TPU
scenario: We are deploying a multi-camera computer vision system on an embedded host using a Google Coral
  Edge TPU (USB form factor, 4 TOPS INT8, 2W power budget). Four separate camera processing pipelines
  (running as isolated OS processes) need to run the same MobileNetV2 INT8 model for object detection.
  Due to the host's severely limited RAM, we cannot load duplicate copies of the model into memory. Design
  a specification for loading and serving this model across the four processes while minimizing cold start
  times and memory overhead.
details:
  realistic_solution: The system should use memory-mapped files (mmap) to load the Edge TPU flatbuffer
    model. By mapping the .tflite file into the shared virtual memory space, the OS pages the weights
    into physical RAM only once, allowing all four processes to share the exact same read-only memory
    pages. This completely eliminates the memory duplication, avoids blocking IO during cold starts by
    leveraging lazy loading, and ensures the Edge TPU runtime can efficiently access the weights without
    redundant host-side copies.
  common_mistake: Candidates often suggest standard multi-threading or loading the model weights into
    each process independently, failing to address the strict memory limitations of the host system. They
    might also forget that the Edge TPU compiler generates a specific flatbuffer format that needs to
    be loaded efficiently.
  napkin_math: 'MobileNetV2 INT8 model size: ~4MB. Independent loading memory footprint: 4 processes *
    4MB = 16MB RAM. Memory-mapped loading footprint: 1 * 4MB shared page + minimal process overhead =
    ~4.5MB RAM. Memory savings: 16MB - 4.5MB = 11.5MB per model, which is critical for edge devices with
    heavily constrained memory.'
