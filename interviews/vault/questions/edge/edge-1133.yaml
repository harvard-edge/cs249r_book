title: 'Edge Systolic Array Evaluation: Output Stationary for Attention on Edge'
scenario: You must configure the dataflow strategy for running a self-attention layer (seq=64, hidden=256, heads=4) on a Jetson Orin DLA (INT8) for a keyword spotting transformer.
question: For QK^T with seq=64 and head_dim=64, is output-stationary or weight-stationary dataflow better, and what are the memory access counts?
details:
  realistic_solution: 'QK^T: Q=(64,64), K=(64,64) per head (head_dim=64). Output=(64,64) per head. WS: K is ''weights'' (64*64=4096 values, 4KB). Q rows stream through. Each K column element reused for all 64 Q rows. K reads: 4096 (once). Q reads: 64*64=4096 (entire Q, multiple times? no: each Q row used 64 times for all K columns). Total: K=4096, Q=4096*64=262K? No: Q[i] * K^T → for each Q row (64 elements), dot with all 64 K rows (64 elements each) = 64 reads of Q rows, each K row read 64 times. WS: K=4096 once, Q=64*64=4096 reads. Output: 64*64=4096 writes. OS: output element (i,j) requires Q[i] (64 elems) + K[j] (64 elems). Read Q[i] 64 times (for j=0..63), K[j] 64 times. Better: row-stationary.'
  common_mistake: |
    **The Pitfall:** Treating attention matrices (QK^T) as standard MLPs and ignoring their quadratic memory footprint.
    **The Rationale:** Engineers assume default dataflows (like Output-Stationary) are universally optimal without computing the distinct read/write ratios for sequence-to-sequence operations.
    **The Consequence:** Extreme memory bandwidth saturation on the DLA, turning a compute-bound operation into a severe memory bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * QK^T per head: Q=(64,64) = 4096 bytes, K=(64,64) = 4096 bytes.
       * Output=(64,64) = 4096 bytes.
    2. **Calculations:**
       * WS (K stationary): K loaded once = 4096 reads. Q loaded once per row: 64 rows * 64 elements = 4096 reads. Total reads: 8192. Output writes = 4096.
       * OS (Output stationary): Each output requires reading a Q row (64) + K column (64) = 128 reads. For 4096 outputs: 4096 * 128 = 524,288 reads.
    3. **Conclusion & Interpretation:**
       **Result: 8,192 vs 524,288 reads**. Weight-Stationary requires ~64x fewer reads for QK^T, making it the undeniable choice for memory efficiency.
