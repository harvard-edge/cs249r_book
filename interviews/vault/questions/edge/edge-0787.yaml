title: The Privacy-Preserving Drift Correction
scenario: Your edge AI system monitors patients in a hospital for fall detection. After 6 months, you
  detect model drift — accuracy has dropped 8%. The obvious fix is to collect recent data from the devices
  and retrain. But HIPAA regulations forbid uploading patient images to your cloud training servers. How
  do you fix the model without ever seeing the raw data?
details:
  realistic_solution: 'Three HIPAA-compliant approaches: (1) Federated learning — 50 devices train locally,
    upload compressed gradients (50 MB/round with top-k sparsification), 10 rounds at 500 MB total. DP
    noise (epsilon=8) costs ~2% accuracy. (2) Embedding transfer — upload 512-d embeddings of hard samples
    (2 MB/device, 100 MB total), no raw images leave devices. (3) Synthetic data generation from embeddings
    (~1 GB, 2 hours GPU). Start with FL for the strongest legal position.'
  common_mistake: '"Anonymize the images before uploading." De-identification of medical images is legally
    complex, often insufficient (faces can be reconstructed from body shape), and doesn''t address the
    fundamental privacy constraint.'
  napkin_math: 'Federated learning: 50 edge devices × 100 local training steps × 10 MB gradient update
    = 500 MB total upload per round. With gradient compression (top-k sparsification): 50 MB per round.
    10 rounds to convergence: 500 MB total. DP noise (ε=8, δ=10⁻⁵): accuracy cost ~2%. Embedding upload:
    512 floats × 4 bytes × 1000 hard samples = 2 MB per device. Total for 50 devices: 100 MB. Synthetic
    data generation: 10,000 images × 100 KB = 1 GB training set, generated in ~2 hours on a cloud GPU.'
