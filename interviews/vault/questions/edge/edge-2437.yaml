title: Calculate Queued Frames on Video Edge Servers
scenario: An edge Jetson AGX Orin takes exactly 15ms to run object detection on a
  single frame. Frames from multiple IP cameras arrive randomly at a combined Poisson
  rate of 50 FPS.
question: Apply the M/M/1 queueing equation to calculate the average number of frames
  buffered in memory waiting for processing.
details:
  realistic_solution: The combined arrival rate lambda is 50 frames/s. The service
    rate mu is 1 / 0.015 = 66.67 frames/s. System utilization rho = 50 / 66.67 = 0.75.
    The average number of items waiting in the queue (Lq) is rho^2 / (1 - rho) = 0.75^2
    / 0.25 = 0.5625 / 0.25 = 2.25 frames. The system buffers roughly 2-3 frames on
    average.
  common_mistake: Confusing the total frames in the system (L = 3) with the frames
    waiting in the queue (Lq = 2.25), or treating arrival as deterministic.
  napkin_math: Lq = (0.75^2) / (1 - 0.75) = 0.5625 / 0.25 = 2.25 frames.
