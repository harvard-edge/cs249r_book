title: Edge TPU Latency Decomposition for Real-time Object Detection
scenario: 'You are designing a real-time object detection system for an autonomous drone. The system utilizes
  a Google Coral Edge TPU, which offers 4 TOPS (INT8) computational power, consumes 2W, and exclusively
  supports INT8 operations. The end-to-end latency budget, from capturing a video frame to issuing a control
  command, is 50ms. This pipeline involves several stages: raw video preprocessing on a companion low-power
  CPU, data transfer to the Edge TPU, inference on the Edge TPU (TTFT and TPOT are effectively integrated
  into this single inference phase for object detection), data transfer back from the Edge TPU, and final
  post-processing on the CPU to generate control commands. Your task is to propose a latency decomposition
  strategy, allocating portions of the 50ms budget to each of these stages (preprocessing, data transfer
  to TPU, inference on TPU, data transfer from TPU, post-processing). Justify your allocations based on
  the Edge TPU''s specifications and the real-time constraints, and describe how you would measure each
  component''s contribution to the total latency.'
question: "How would you allocate and measure the Coral Edge TPU drone pipeline's 50 ms latency budget across preprocessing, transfers, inference, and control?"
details:
  realistic_solution: 'A realistic approach involves an iterative process: 1. Initial rough budget allocation
    based on empirical data or conservative estimates. 2. Thorough profiling of each stage (CPU-bound
    preprocessing, data transfers, and Edge TPU inference). 3. Optimizing data paths (e.g., minimizing
    transfers, using zero-copy buffers where possible). 4. Streamlining preprocessing and post-processing
    code, potentially offloading to specialized hardware if available, or highly optimizing CPU usage
    (e.g., SIMD instructions). 5. Ensuring the model is aggressively optimized for INT8 quantization and
    the specific Edge TPU architecture. The key is to recognize that non-inference stages often dominate
    the latency on such devices.'
  common_mistake: Candidates often over-allocate budget to the Edge TPU's inference time due to its high
    TOPS, neglecting the significant overheads of data movement (e.g., USB 3.0 bottleneck) and potentially
    complex preprocessing/post-processing on a constrained host CPU. Another common mistake is failing
    to account for the practical limitations of INT8-only inference, which may require specific model
    architectures or quantization strategies that add complexity.
  napkin_math: 'Given the Edge TPU''s 4 TOPS (INT8) capacity, a typical lightweight object detection model
    (e.g., MobileNetV2-SSD) might require roughly 2-3 billion INT8 operations per frame. At 4 TOPS, inference
    time would theoretically be `(2.5e9 ops) / (4e12 ops/sec) = 0.625 ms`. This calculation quickly reveals
    that the raw inference time on the chip is extremely low. Therefore, for a 50ms end-to-end budget,
    the vast majority of the latency must come from preprocessing (e.g., frame decoding, resizing, normalization),
    data transfer (e.g., over USB 3.0, which has practical limits of ~400-500 MB/s), and post-processing
    (e.g., Non-Maximum Suppression, drawing bounding boxes). A rough allocation might be: Preprocessing:
    15ms, Data Transfer to TPU: 10ms, Inference on TPU: 5ms, Data Transfer from TPU: 5ms, Post-processing:
    15ms, with remaining budget for jitter/OS overhead.'
