title: Paged KV Cache Allocation for Edge LLM
scenario: Serving a 7B parameter LLM on a Jetson AGX Orin (up to 204.8 GB/s LPDDR5).
  Memory fragmentation severely limits concurrent chat sessions.
question: Design a paged memory manager that computes the maximum number of concurrent
  sequences given 4GB of dedicated KV cache RAM and 16-token page blocks.
visual:
  kind: svg
  path: edge-2295.svg
  alt: Bar chart comparing continuous memory allocation vs fragmented page blocks
    layout.
  caption: Paged Allocation Blocks
details:
  realistic_solution: For a 7B model (assume 32 layers, 32 KV heads, 128 head dim,
    FP16), a single token takes 2 * 32 * 32 * 128 * 2 bytes = 512KB. A 16-token page
    is 8MB. With 4GB total RAM, we have 4096MB / 8MB = 512 pages. Concurrency depends
    on sequence length; if max length is 1024 tokens (64 pages), maximum concurrent
    sequences is 512 / 64 = 8.
  common_mistake: Calculating token size incorrectly by forgetting the factor of 2
    for key and value pairs.
  napkin_math: 4096 / (16 * 0.5) = 512 pages
