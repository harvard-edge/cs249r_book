title: The Federated Fleet TCO Dilemma
scenario: 'You are the lead ML Systems Engineer for an automotive company''s voice assistant. You need
  to improve its accuracy for a rare dialect spoken by a segment of your users. You have two pilot options:'
details:
  realistic_solution: The correct approach is to calculate the total data transmitted over all rounds
    of the federated learning pilot and multiply by the cost per GB. This demonstrates that for this scale,
    FL is cheaper in terms of direct data costs, in addition to its significant privacy advantages of
    not exfiltrating raw user audio. The centralized approach's cost is a direct payment to users, which
    serves as the economic benchmark for comparison.
  common_mistake: The most common mistake is to calculate the cost of transmitting the raw user voice
    data (which would be orders of magnitude larger) in the federated learning scenario, rather than just
    the much smaller model updates. Another frequent error is to calculate the cost for a single FL round,
    forgetting that it's an iterative process and the costs accumulate with each round.
  napkin_math: 1. **Data per FL Round:** 10,000 vehicles × 50 MB/update = 500,000 MB = 500 GB.
  options:
  - $2,500. The federated approach is significantly cheaper as the cost is dominated by a single model
    broadcast.
  - $25,000. The federated approach is more expensive because transmitting raw voice data from 10,000
    cars is costly.
  - $12,500. The federated approach is cheaper as the total cost of transmitting iterative model updates
    is less than the cost of acquiring centralized data.
  - The costs are comparable, so the choice depends on implementation complexity rather than TCO.
  correct_index: 2
