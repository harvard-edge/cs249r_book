title: The Federated Fleet TCO Dilemma
scenario: You are the lead ML Systems Engineer for an automotive company's voice assistant. You need to improve its accuracy for a rare dialect spoken by a segment of your users. You have two pilot options (centralized vs federated) and need to compare their data transfer costs.
question: Which pilot is cheaper on direct data cost, centralized user collection or Federated Learning, and how should you calculate it?
details:
  realistic_solution: The correct approach is to calculate the total data transmitted over all rounds of the federated learning pilot and multiply by the cost per GB. This demonstrates that for this scale, FL is cheaper in terms of direct data costs, in addition to its significant privacy advantages of not exfiltrating raw user audio. The centralized approach's cost is a direct payment to users, which serves as the economic benchmark for comparison.
  common_mistake: |
    **The Pitfall:** Calculating the cost of transmitting raw user voice data instead of model updates.
    **The Rationale:** Candidates forget that FL transmits much smaller model updates, or they mistakenly calculate the cost for only a single FL round instead of the iterative process.
    **The Consequence:** Incorrectly estimating the TCO by orders of magnitude and making flawed architectural decisions regarding data collection strategies.
  napkin_math: |
    - **Data per FL Round:** 10,000 vehicles × 50 MB/update = 500,000 MB = 500 GB.
    - **Cost per FL Round:** 500 GB × $25/GB = **$12,500**.
    - **Conclusion:** The federated approach is cheaper as the total cost of transmitting iterative model updates is significantly less than the massive cost of acquiring centralized raw data.
  options:
  - $2,500. The federated approach is significantly cheaper as the cost is dominated by a single model broadcast.
  - $25,000. The federated approach is more expensive because transmitting raw voice data from 10,000 cars is costly.
  - $12,500. The federated approach is cheaper as the total cost of transmitting iterative model updates is less than the cost of acquiring centralized data.
  - The costs are comparable, so the choice depends on implementation complexity rather than TCO.
