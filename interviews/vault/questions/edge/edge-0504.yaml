title: The Federated Fleet TCO Dilemma
scenario: An automotive company evaluates centralized vs federated learning to improve voice assistant accuracy for a rare dialect across 10,000 vehicles.
question: Which pilot is cheaper on direct data cost, centralized user collection or Federated Learning, and how should you calculate it?
details:
  realistic_solution: Federated Learning (FL) is significantly cheaper regarding direct data costs. The calculation requires summing the total data transmitted over all iterative FL rounds (device-to-cloud model updates) and multiplying by the cost per GB. Despite occurring over multiple rounds, the total payload of compressed weight updates is dwarfed by the massive size of raw audio files required for centralized training, proving FL as both privacy-preserving and economically superior.
  common_mistake: |
    **The Pitfall:** Calculating the cost of transmitting raw user voice data.
    **The Rationale:** Forgetting that FL transmits small, aggregated model updates and incorrectly calculating costs based on a single round rather than iterative convergence.
    **The Consequence:** Overestimating TCO by orders of magnitude and potentially abandoning privacy-preserving architectures due to flawed financial modeling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 10,000 vehicles. Cost: $25/GB.
       - FL Update: 50 MB per round.
    2. **Calculations:**
       - Total Data per FL Round: 10,000 vehicles * 50 MB = 500,000 MB = 500 GB.
       - Cost per FL Round: 500 GB * $25/GB = $12,500.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Cost Bound. The $12,500 FL transmission cost per round is drastically cheaper than exfiltrating raw audio.**
  options:
  - $2,500. The federated approach is significantly cheaper as the cost is dominated by a single model broadcast.
  - $25,000. The federated approach is more expensive because transmitting raw voice data from 10,000 cars is costly.
  - $12,500. The federated approach is cheaper as the total cost of transmitting iterative model updates is less than the cost of acquiring centralized data.
  - The costs are comparable, so the choice depends on implementation complexity rather than TCO.
