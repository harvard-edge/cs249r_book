title: Cross-Silo FL Model Aggregation on Qualcomm AI 100
scenario: You are designing a cross-silo federated learning system for a consortium
  of 50 regional hospitals. Each hospital operates an on-premise edge server equipped
  with a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W).
  The model is a 3B parameter LLM fine-tuned locally on sensitive patient records
  using LoRA. You need to size the local training workload to ensure it fits within
  the accelerator's memory constraints and evaluate the communication bandwidth required
  for daily synchronization.
question: How would you size LoRA fine-tuning for the 3B model on each 32 GB AI 100
  and minimize daily synchronization bandwidth across 50 hospitals?
details:
  realistic_solution: At L5, a candidate should recognize that while the accelerator
    supports 400 TOPS INT8 for inference, training requires higher precision (FP16/BF16)
    and additional memory for states. Using LoRA significantly reduces trainable parameters,
    making local updates feasible within the 32GB limit. For aggregation, transmitting
    only the LoRA adapters minimizes bandwidth, allowing the system to operate efficiently
    within the 75W power envelope per site.
  common_mistake: Candidates often assume full model fine-tuning is feasible or fail
    to account for the memory footprint of optimizer states and gradients during local
    training. They might also underestimate the communication overhead of sending
    dense weight updates across 50 nodes without compression.
  napkin_math: 'Base model (3B) @ FP16 = 6 GB. LoRA (r=16) parameters = ~10M. LoRA
    training state (weights + Adam optimizer) = 10M * (2B weight + 4B momentum + 4B
    variance) = ~100 MB. Total memory per hospital: 6 GB (base) + 100 MB (training
    state) + ~4 GB (activations for BS=4) = ~10.1 GB, comfortably fitting within the
    32 GB LPDDR4x capacity. Daily communication per hospital: 10M parameters @ FP16
    = 20 MB upload/download per round.'
