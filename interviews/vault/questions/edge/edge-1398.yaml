title: Cross-Silo FL Model Aggregation on Qualcomm AI 100
scenario: >-
  You are designing a cross-silo federated learning system for 50 regional hospitals. Each operates an on-premise edge server with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model is a 3B parameter LLM fine-tuned locally on sensitive patient records using LoRA.
question: How would you size LoRA fine-tuning for the 3B model on a 32 GB AI 100 and minimize daily synchronization bandwidth across 50 hospitals?
details:
  realistic_solution: 'While the accelerator supports INT8 inference, training requires higher precision (FP16/BF16) and memory for optimizer states. LoRA significantly reduces trainable parameters, making local updates fit within the 32GB limit. For aggregation, transmitting only the highly compressed LoRA adapters minimizes bandwidth across the 50 nodes.'
  common_mistake: |
    **The Pitfall:** Ignoring the memory footprint of training states and full model transmission.
    **The Rationale:** Candidates confuse the memory profile of inference with the expanded requirements of backpropagation.
    **The Consequence:** They assume full fine-tuning fits, leading to guaranteed OOMs on the 32GB device, or they prescribe sending dense 3B model updates, instantly crushing hospital network bandwidth.
  napkin_math: |
    1. **Model:** Base (3B) @ FP16 = `6 GB`.
    2. **LoRA Params:** ~10M. Training state (weights + Adam optimizer) = `10M * (2B weight + 4B mom + 4B var) ≈ 100 MB`.
    3. **Local Memory:** `6 GB (base) + 100 MB (state) + ~4 GB (activations for BS=4) ≈ 10.1 GB`. Comfortably under the 32 GB limit.
    4. **Result:** Transmitting only the 10M LoRA parameters @ FP16 requires just **20 MB upload/download per hospital** per round, trivially solving the bandwidth constraint.
