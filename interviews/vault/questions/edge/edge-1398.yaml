title: Cross-Silo FL Model Aggregation on Qualcomm AI 100
scenario: >-
  You are designing a cross-silo federated learning system for 50 regional hospitals. Each operates an on-premise edge server with a Qualcomm Cloud AI 100 accelerator. The model is a 3B parameter LLM fine-tuned locally on sensitive patient records using LoRA.
question: How would you size LoRA fine-tuning for the 3B model on a 32 GB AI 100 and minimize daily synchronization bandwidth across 50 hospitals?
details:
  realistic_solution: 'While the accelerator supports INT8 inference, training requires higher precision (FP16/BF16) and memory for optimizer states. LoRA significantly reduces trainable parameters, making local updates fit within the 32GB limit. For aggregation, transmitting only the highly compressed LoRA adapters minimizes bandwidth across the 50 nodes.'
  common_mistake: |
    **The Pitfall:** Ignoring the memory footprint of training states and full model transmission.
    **The Rationale:** Candidates confuse the memory profile of inference with the expanded requirements of backpropagation.
    **The Consequence:** They prescribe full fine-tuning, guaranteeing OOMs on the 32GB device, or they prescribe sending dense 3B model updates, instantly crushing hospital network bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 32 GB LPDDR4x local limit.
       - Model: 3B parameters at FP16 (6 GB).
       - LoRA state: 10M parameters + Adam optimizer (weight, momentum, variance).
    2. **Calculations:**
       - LoRA state size: 10M * (2B weight + 4B mom + 4B var) ≈ 100 MB.
       - Local memory used: 6 GB (base) + 100 MB (state) + 4 GB (activations) ≈ 10.1 GB.
       - Synced weights size: 10M parameters at FP16 = 20 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Adequate Capacity).** Local fine-tuning perfectly fits the 32GB RAM limit, and syncing only 20 MB of LoRA adapters per hospital drastically reduces upload bandwidth requirements.
