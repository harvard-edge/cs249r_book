title: Cloud AI 100 I/O Bottleneck Evaluation
scenario: 'Your team is deploying a real-time high-res video analytics pipeline on
  the Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x, 75W). Profiling tools indicate
  the end-to-end latency is 40ms per frame, missing the 20ms SLA, but the INT8 compute
  utilization is hovering around 15%. You must evaluate two proposals: (A) Prune the
  model by 50% to reduce total FLOPs, or (B) Refactor the ingestion pipeline to use
  zero-copy DMA transfers directly into the AI 100''s LPDDR4x memory. Which design
  better addresses the latency bottleneck and why?'
question: Which design better addresses the latency bottleneck and why?
details:
  realistic_solution: Proposal B is the correct choice. A 15% compute utilization
    on a 400 TOPS accelerator means the compute units are stalled waiting for data.
    Reducing model FLOPs (Proposal A) will only lower utilization further without
    improving end-to-end latency. The bottleneck is I/O. Using zero-copy DMA to directly
    stream frames into the 32 GB LPDDR4x memory eliminates host-side memory copies,
    bypassing the CPU overhead and alleviating PCIe bottlenecking, which directly
    addresses the 40ms latency.
  common_mistake: Candidates often choose model pruning (Proposal A) because they
    instinctively associate high latency with heavy models. They fail to correlate
    the low 15% compute utilization with an I/O or memory bandwidth starvation issue,
    meaning the 400 TOPS engine is waiting for data.
  napkin_math: 'Compute time: The AI 100 offers 400 TOPS. A typical vision model might
    require 50 GOPS. At 400 TOPS, compute time is 50 GOPS / 400,000 GOPS = 0.125ms
    per frame. Even at 15% utilization (effectively 60 TOPS), compute takes 50 / 60,000
    = 0.83ms. The remaining ~39ms of the 40ms latency is I/O and overhead. A 4K frame
    is 3840x2160x3 = ~25MB. Copying 25MB through host memory multiple times before
    hitting the PCIe bus (e.g., PCIe Gen4 x8 at 15.7 GB/s) adds significant latency
    (25MB / 15.7GB/s = ~1.6ms per optimal transfer, but unoptimized host copies can
    easily inflate this by 10-20x due to CPU bottlenecks and context switches). Zero-copy
    DMA directly to the 32 GB LPDDR4x eliminates these unnecessary delays.'
