title: Cloud AI 100 I/O Bottleneck Evaluation
scenario: 'Your team is deploying a real-time high-res video analytics pipeline on an edge accelerator. Profiling tools indicate the end-to-end latency is 40ms per frame, missing the 20ms SLA, but the INT8 compute utilization is hovering around 15%. You must evaluate two proposals: (A) Prune the model by 50% to reduce total FLOPs, or (B) Refactor the ingestion pipeline to use zero-copy DMA transfers directly into the accelerator''s memory.'
question: Which design better addresses the latency bottleneck and why?
details:
  realistic_solution: Proposal B is correct. A 15% compute utilization on a high-throughput accelerator means the compute units are starved waiting for data. Reducing model FLOPs (Proposal A) will only lower utilization further without improving end-to-end latency. The bottleneck is strictly I/O. Using zero-copy DMA via PCIe Gen4 to directly stream frames into device memory eliminates host-side memory copies, bypassing CPU overhead and alleviating the PCIe bottleneck, directly addressing the 40ms latency.
  common_mistake: |
    **The Pitfall:** Choosing model pruning (Proposal A) because of an instinctive association between high latency and "heavy" models.
    **The Rationale:** Candidates fail to correlate the low 15% compute utilization with an I/O starvation issue. They assume fewer FLOPs run faster, but the compute units are already idle.
    **The Consequence:** The model loses accuracy from pruning, while latency remains completely unchanged because the host-side I/O bottleneck was never addressed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 50 GOPS model.
       - Accelerator compute: 400 TOPS (400,000 GOPS).
       - PCIe Gen4 x8 bandwidth: ~15.7 GB/s.
       - 4K frame size: 3840x2160x3 = ~25 MB.
    2. **Calculations:**
       - Compute time: 50 / 400,000 = 0.125ms per frame.
       - At 15% utilization, compute window takes 50 / (400,000 * 0.15) = 0.83ms. The remaining ~39ms of latency is I/O overhead.
       - Optimal PCIe transfer time: 25 MB / 15,700 MB/s = ~1.6ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Unoptimized host-side copies inflate the theoretical 1.6ms transfer massively. Zero-copy DMA directly to memory eliminates this overhead.
