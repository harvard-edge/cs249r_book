title: N-Gram Draft for Zero-Overhead Edge Speculation
scenario: On Jetson Orin running a 3B INT8 model, you cannot afford a neural draft model's memory footprint. You must implement a prompt-lookup (n-gram) draft strategy for a 4096-token prompt.
question: How would you implement K=8 prompt-lookup drafting for a 4096-token prompt on Orin, and what acceptance rates and memory cost should you expect?
details:
  realistic_solution: 'Build a trigram hash table of the 4096-token prompt (key: 3 tokens, value: position index). At decode time, use the last 3 generated tokens to query the hash table in O(1) time. If found, propose the subsequent K=8 tokens as a speculative draft. Verify them in a single batched forward pass through the main model. For highly repetitive structural data (JSON, code), n-gram matching achieves high acceptance rates with practically zero memory footprint compared to maintaining a secondary neural draft model.'
  common_mistake: |
    **The Pitfall:** Dismissing n-gram lookup as too simplistic for modern LLMs.
    **The Rationale:** Assuming speculation requires continuous neural probability generation, ignoring the highly repetitive nature of structural prompts.
    **The Consequence:** Suffering high latency on edge devices by either foregoing speculative decoding entirely or thrashing memory with a secondary neural draft model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Prompt: 4096 tokens. Hash table entry: 12 bytes.
       - Decode Time: 29ms/token. Alpha (acceptance): 0.55 (Code).
    2. **Calculations:**
       - Memory Cost: 4096 * 12 bytes = ~48 KB.
       - Expected Draft Length (E): (1 - 0.55^9) / (1 - 0.55) = ~2.21 tokens per step.
       - Effective Latency: 29 ms / 2.21 = 13.1 ms/token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound. The 48KB hash table delivers a 2.21x speedup by bypassing sequential memory loads.**
