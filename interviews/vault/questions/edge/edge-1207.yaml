title: N-Gram Draft for Zero-Overhead Edge Speculation
scenario: On Jetson Orin running a 3B INT8 model, you cannot afford a neural draft
  model's memory or compute. Implement a prompt-lookup (n-gram) draft strategy that
  proposes K=8 tokens by finding n-gram matches within the existing prompt. The prompt
  is 4096 tokens. Calculate the expected acceptance rate and memory cost.
question: How would you implement K=8 prompt-lookup drafting for a 4096-token prompt
  on Orin, and what acceptance rates and memory cost should you expect?
details:
  realistic_solution: 'Algorithm: at decode position t, take the last 3 generated
    tokens (trigram). Scan the prompt for matching trigrams. If found at position
    j, propose tokens [j+3, j+4, ..., j+10] as draft (K=8). Implementation: build
    a trigram hash table of the prompt: 4096 entries, key = hash(token[i], token[i+1],
    token[i+2]), value = position i. Hash table size: 4096 x 12 bytes = 48KB (trivial
    on Orin). Lookup: O(1) per decode step. Acceptance rate depends on prompt repetitiveness:
    structured data (JSON, CSV): alpha ~ 0.65. Code with patterns: alpha ~ 0.55. Natural
    language: alpha ~ 0.25 (too variable). For Orin at 3B INT8: target decode = 3B
    / 102 GB/s = 29ms/token. N-gram draft: 0ms compute. Verify K+1=9 tokens: 29ms
    (same weight read). At alpha=0.55, K=8: E[tok] = (1-0.55^9)/0.45 = 2.16. Effective:
    29ms/2.16 = 13.4ms/tok. 2.16x speedup with zero memory cost. On structured data:
    alpha=0.65, E=2.74, effective 10.6ms = 2.74x.'
  common_mistake: Thinking n-gram lookup is too simple to work. For prompts containing
    repeated patterns (code, structured data, templates), n-gram matching can achieve
    alpha=0.5-0.7 with zero neural compute cost.
  napkin_math: 'Hash table: 48KB. Lookup: O(1). Draft cost: 0ms. Verify: 29ms. Code
    alpha=0.55: E=2.16, 2.16x. Structured data alpha=0.65: E=2.74, 2.74x. Natural
    language alpha=0.25: E=1.30, 1.30x — barely worth it.'
