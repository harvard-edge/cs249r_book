title: Edge AI Dataset Curation for Rare Events on Coral TPU
scenario: You are designing a smart surveillance system for remote environmental monitoring, deploying
  real-time object detection models on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, INT8 only).
  The system faces intermittent network connectivity. Initial deployment reveals poor performance on rare
  object classes (e.g., specific endangered species or unique environmental anomalies). Design an end-to-end
  strategy for continuous dataset curation and model improvement. Focus on how to intelligently select
  data for annotation from the edge, manage annotation workflows efficiently given sparse connectivity,
  ensure inter-annotator agreement, and leverage techniques like active learning to mitigate dataset bias
  and optimize the use of human labeling resources, all while adhering to the Coral TPU's computational
  and power constraints.
question: "How would you curate, label, and use edge-selected data to improve rare-class detection on a Coral Edge TPU with intermittent connectivity?"
details:
  realistic_solution: Implement on-device filtering using a lightweight, always-on model or rule-based
    system to pre-select potentially interesting frames (e.g., low confidence predictions, frames with
    unusual motion, or detections of specific patterns) for batched upload during available connectivity
    windows. Design an active learning loop where the Coral TPU locally identifies samples close to the
    decision boundary or from underperforming classes, prioritizing these for annotation. Employ federated
    learning principles for privacy and efficiency. For inter-annotator agreement, use consensus-based
    labeling for critical rare events and establish clear guidelines. Data augmentation on the edge or
    server-side can also help with rare classes. Ensure the model on Coral is continually optimized for
    INT8 inference, potentially requiring quantization-aware training.
  common_mistake: Over-collecting raw data without intelligent pre-filtering on the edge, leading to excessive
    power consumption for data transfer and storage, and overwhelming the annotation team with irrelevant
    samples. Another common mistake is designing an active learning loop that assumes constant, high-bandwidth
    connectivity, which is unrealistic for edge deployments.
  napkin_math: Assuming the Coral TPU captures video at 30 FPS and compresses it to 1 Mbps. Without on-device
    filtering, uploading 24 hours of raw data would be 1 Mbps * 3600 seconds/hour * 24 hours = 86.4 Gigabits
    (~10.8 GB) per day. With intelligent on-device filtering that reduces data upload by 95% (only 5%
    of frames are interesting), the daily upload shrinks to 10.8 GB * 0.05 = 0.54 GB. This reduction significantly
    lowers bandwidth costs, storage needs, and the energy consumed for data transmission, which is critical
    for a device with a 2W power budget.
