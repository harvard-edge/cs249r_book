title: USB I/O Bottleneck Analysis on Google Coral Edge TPU
scenario: You are deploying an INT8 quantized image classification model on a Google Coral Edge TPU connected
  via a USB 3.0 interface. The accelerator provides 4 TOPS of compute at a 2W power envelope, while your
  model requires exactly 2 GOPs per inference. You need to profile the system to determine why the observed
  latency is significantly higher than the accelerator's theoretical limits. Calculate the compute latency
  versus the I/O transfer time for a 3MB input tensor.
details:
  realistic_solution: A thorough bottleneck analysis requires profiling both the compute time on the device
    and the host-to-device I/O transfer time. Using profiling tools or trace viewers, you would isolate
    the time spent sending the input tensor over the USB bus from the actual Edge TPU execution time.
    In edge deployments, transferring uncompressed high-resolution inputs to a discrete accelerator often
    becomes the primary bottleneck. The solution is typically to downsample inputs on the host CPU or
    use a PCIe form factor instead of USB if higher throughput is required.
  common_mistake: Candidates frequently focus solely on the 4 TOPS compute specification and calculate
    an unrealistically low inference latency. They often ignore the fact that the USB form factor introduces
    significant data transfer overhead that can dominate the end-to-end time.
  napkin_math: 'Compute capability: 4 TOPS = 4,000 GOPs. Model requirement: 2 GOPs. Theoretical compute
    latency: 2 GOPs / 4,000 GOPs/sec = 0.0005 seconds (0.5 ms). Assume an effective USB 3.0 bandwidth
    of 400 MB/s. Transfer time for a 3MB input tensor: 3 MB / 400 MB/s = 0.0075 seconds (7.5 ms). The
    total latency per frame is at least 8.0 ms (7.5 ms I/O + 0.5 ms compute), proving the system is severely
    I/O bound due to the USB connection.'
