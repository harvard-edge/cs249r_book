title: Diagnosing Latency Spikes in Dynamic Batching on Edge Accelerators
scenario: You have deployed an INT8 computer vision model on an on-premise Qualcomm Cloud AI 100 (32 GB
  LPDDR4x, 400 TOPS, 75W) to process variable edge camera streams. Initially, a static batching policy
  (BS=4) yields a steady 15ms latency. To handle traffic spikes, you enable dynamic batching with a max
  batch size of 16 and a timeout of 10ms. However, during periods of moderate traffic (e.g., 600 requests/sec),
  you observe latency spiking to over 30ms and effective throughput dropping to 300 req/sec, despite the
  hardware's 400 TOPS capacity.
details:
  realistic_solution: The root cause is execution graph padding due to uncompiled batch sizes. The Qualcomm
    Cloud AI 100 relies on ahead-of-time compiled graphs for specific tensor shapes to fully utilize its
    400 TOPS INT8 engines. When dynamic batching accumulates an irregular number of requests before the
    timeout, the runtime pads the batch to the next compiled shape (e.g., max BS=16). This wastes LPDDR4x
    memory bandwidth and compute cycles on dummy data, dropping effective throughput.
  common_mistake: Candidates often assume the 10ms timeout is simply too long or incorrectly guess that
    the 75W power limit is triggering thermal throttling. They might suggest tuning the timeout value
    without understanding how underlying hardware compilers handle dynamic tensor shapes.
  napkin_math: At 600 req/sec, inter-arrival time is ~1.66ms. Within the 10ms timeout window, exactly
    6 requests accumulate. The runtime pads BS=6 to the compiled BS=16. If a full BS=16 takes 20ms to
    compute, total latency per request becomes 10ms (timeout wait) + 20ms (compute) = 30ms. The effective
    throughput is 6 valid requests per 20ms compute cycle = 300 req/sec. Conversely, static BS=4 might
    take 5ms to compute, yielding a potential 800 req/sec (4 / 0.005s) with no padding waste.
