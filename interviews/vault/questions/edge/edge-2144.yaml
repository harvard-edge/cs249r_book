title: Thermal Design for Fanless Jetson Orin in IP67 Enclosure
scenario: A Jetson Orin NX (15W TGP in MAXN mode) must operate in an IP67-sealed enclosure for outdoor robotics at 40°C ambient. The aluminum enclosure has a thermal resistance of 8°C/W from chip to case, 3°C/W from case to ambient.
question: At 40°C ambient with 11°C/W total thermal resistance, what TGP can the sealed Orin NX sustain and will 15W throttle?
details:
  realistic_solution: Calculate total thermal resistance and max allowable temperature delta to determine the sustainable power threshold. A 15W workload dramatically overshoots the maximum 95°C junction temperature constraint.
  common_mistake: |
    **The Pitfall:** Using only partial thermal resistance.
    **The Rationale:** Candidates often use only the chip-to-ambient or case-to-ambient resistance, forgetting that the total thermal resistance is the sum of junction-to-case and case-to-ambient in series.
    **The Consequence:** Overestimating the system's cooling capability and deploying hardware that will severely thermal throttle or fail.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ambient Temperature (T_a): 40°C.
       - Max Junction Temperature (T_j_max): 95°C.
       - Thermal Resistance (Junction-to-Case, θ_jc): 8°C/W.
       - Thermal Resistance (Case-to-Ambient, θ_ca): 3°C/W.
    2. **Calculations:**
       - Total Thermal Resistance (θ_total) = θ_jc + θ_ca = 8°C/W + 3°C/W = 11°C/W.
       - Maximum Allowable Temperature Delta (ΔT) = T_j_max - T_a = 95°C - 40°C = 55°C.
       - Max Sustainable Power (P_max) = ΔT / θ_total = 55°C / 11°C/W = 5W.
       - Projected Junction Temp at 15W = T_a + (15W * 11°C/W) = 40°C + 165°C = 205°C.
    3. **Conclusion & Interpretation:**
       - **Result: 5W Sustainable (Thermal-Bound)** - At 15W, the system will aggressively thermal throttle as it vastly exceeds the 95°C limit.
