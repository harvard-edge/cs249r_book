title: The Asynchronous Orchestra
scenario: You're integrating a 30 FPS camera, a 10 Hz LiDAR, and a 100 Hz IMU for an autonomous navigation
  system on an edge platform. How do you synchronize these disparate sensor inputs for real-time ML perception
  without introducing excessive latency or data staleness, especially when ML inference itself takes time?
question: "How do you synchronize these disparate sensor inputs for real-time ML perception without introducing excessive latency or data staleness, especially when ML inference itself takes time?"
details:
  realistic_solution: "Achieving robust sensor synchronization is paramount for accurate perception and\
    \ state estimation.\n  1.  Hardware Synchronization:\n      *   PTP/NTP: Use Precision Time Protocol\
    \ (PTP) or Network Time Protocol (NTP) if sensors are networked, though PTP offers higher precision\
    \ (nanoseconds).\n      *   PPS (Pulse Per Second): Many high-end sensors support a PPS input, allowing\
    \ a central clock source to trigger simultaneous data capture.\n      *   Global Shutter: For cameras,\
    \ a global shutter avoids motion blur and ensures all pixels are exposed at the exact same instant,\
    \ critical for precise timestamping.\n  2.  Software Timestamping:\n      *   Kernel Timestamps: Capture\
    \ timestamps as close to the hardware as possible (e.g., kernel driver level) to minimize OS jitter.\n\
    \      *   Monotonic Clocks: Use monotonic clocks (`CLOCK_MONOTONIC`) to avoid time jumps from NTP\
    \ updates or daylight saving changes.\n  3.  Data Association & Buffering:\n      *   Message Filters/Synchronizers:\
    \ Implement a mechanism (e.g., ROS message filters, custom buffer managers) that collects sensor messages\
    \ and outputs a synchronized \"bundle\" only when a complete set of sufficiently time-aligned data\
    \ is available.\n      *   Time Policy: Define a policy for what constitutes \"synchronized.\" This\
    \ often involves a time window (e.g., +/- 5ms) within which timestamps must fall.\n      *   Interpolation:\
    \ For sensors with very different rates (e.g., 100Hz IMU vs 10Hz LiDAR), interpolate the higher-frequency\
    \ data to match the lower-frequency sensor's timestamp. This can introduce slight inaccuracies but\
    \ reduces latency from waiting.\n  4.  Managing Latency & Staleness:\n      *   Bounded Buffers: Use\
    \ bounded queues for each sensor stream to prevent memory exhaustion and manage data age. Oldest data\
    \ is dropped if not consumed.\n      *   ML Inference Time: Account for the ML inference latency.\
    \ The perception pipeline should use data that is *fresh enough* at the start of inference, not just\
    \ at sensor capture. The output timestamp should ideally reflect the time of the input data.\n   \
    \   *   Prediction/Extrapolation: For very high-rate control loops, sometimes the system must predict\
    \ sensor states forward in time to compensate for pipeline latency."
  common_mistake: '"Just use the latest data from each sensor." This leads to unsynchronized data and
    inconsistent world states, critical for state estimation and accurate perception.'
  napkin_math: If a camera frame is captured at T=0ms, and a LiDAR scan is available at T=100ms, using
    them together without synchronization means the LiDAR data is 100ms "newer." If the vehicle moves
    at 10m/s, this is a 1-meter position mismatch. For a 30 FPS camera (33.3ms period), if your synchronization
    window is +/- 5ms, you might need to wait up to 10ms for a LiDAR scan, adding latency.
