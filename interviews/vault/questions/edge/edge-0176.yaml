title: 'The Federated vs. Centralized Upload Tax: Federated Learning'
scenario: You are leading an A/B test comparing two training strategies for a fleet of 10,000 edge devices that monitor industrial equipment using a 10 million parameter model. Your goal is to select the most cost-effective strategy in terms of data upload volume.
question: For 10,000 devices, how do the daily upload volumes compare for centralized raw data versus federated updates, and which is cheaper?
details:
  realistic_solution: The core trade-off is between privacy/communication cost (Federated) and computational simplicity (Centralized). Strategy A requires uploading a massive 5 TB of raw data daily (10,000 devices * 500 MB/device). Strategy B, while requiring on-device compute, dramatically reduces the data upload requirement.
  common_mistake: |
    **The Pitfall:** Confusing the precision used for the gradient calculation or calculating the volume for a single device.
    **The Rationale:** Candidates miscalculate total footprint by using 2 bytes (FP16) instead of 4 bytes (FP32), or forget to multiply by the fleet size.
    **The Consequence:** Drastically underestimating or overestimating the required network infrastructure costs.
  napkin_math: |
    1. Assumptions & Constraints:
       - Fleet size: 10,000 devices
       - Raw data per device: 500 MB
       - Model size: 10M parameters (FP32)
    2. Calculations:
       - Centralized upload volume = 10,000 * 500 MB = 5,000,000 MB = 5 TB
       - Federated update size = 10,000,000 params * 4 Bytes = 40 MB
       - Federated upload volume = 10,000 * 40 MB = 400,000 MB = 400 GB
    3. Conclusion & Interpretation:
       - **Result: Bandwidth-Bound. Strategy B (Federated) cuts upload volume from 5 TB to 400 GB, drastically reducing data transmission costs.**
  options:
  - "200 GB (Assuming FP16/2-byte precision instead of FP32)"
  - "40 MB (Calculating for a single device, not the whole fleet)"
  - "400 GB"
  - "5 TB (Reporting the volume for the centralized strategy)"
