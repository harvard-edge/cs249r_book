title: Edge Upload Rate
scenario: An edge camera uploads 200 anomaly clips per day. Each clip is 1.5 MB. Calculate
  average daily upload volume.
question: How much data does an edge camera upload per day with 200 clips at 1.5 MB
  each?
details:
  realistic_solution: The camera uploads 200 x 1.5 MB = 300 MB/day. Average bandwidth
    is low, but bursts and deadlines may still matter.
  common_mistake: Confusing average daily volume with burst bandwidth requirement.
  napkin_math: 200 x 1.5 = 300 MB/day.
