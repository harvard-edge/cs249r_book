title: Edge Upload Rate
scenario: An edge camera uploads 200 anomaly clips per day. Each clip is 1.5 MB.
question: How much data does an edge camera upload per day with 200 clips at 1.5 MB each?
details:
  realistic_solution: The camera uploads 200 x 1.5 MB = 300 MB/day. Average bandwidth is low, but bursts and deadlines may still matter.
  common_mistake: |
    **The Pitfall:** Confusing average daily volume with burst bandwidth requirements.
    **The Rationale:** Candidates mix up total payload size over 24 hours with the instantaneous throughput needed during the actual upload window.
    **The Consequence:** Over-provisioning network hardware based on peak bandwidth assumptions when average volume is the primary constraint.
  napkin_math: |
    - **Total Data:** 200 clips $\times$ 1.5 MB/clip = **300 MB/day**.
