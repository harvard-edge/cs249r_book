title: Edge Upload Rate
scenario: An edge camera uploads 200 anomaly clips per day. Each clip is 1.5 MB.
question: How much data does an edge camera upload per day with 200 clips at 1.5 MB each?
details:
  realistic_solution: Compute the total daily ingress payload. While the aggregate volume dictates storage and data billing costs, the systems engineer must also dimension the instantaneous throughput required to ensure clips meet real-time operational delivery SLAs without bottlenecking the connection.
  common_mistake: |
    **The Pitfall:** Conflating cumulative daily payload volume with peak bandwidth capacity requirements.
    **The Rationale:** Candidates calculate the total byte size and mistakenly assume an evenly distributed trickle upload across 24 hours, ignoring sudden event bursts.
    **The Consequence:** Massively under-provisioning instantaneous network bandwidth, causing critical anomaly video alerts to timeout during sudden localized events.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Events: 200 clips/day
       - File size: 1.5 MB/clip
    2. **Calculations:**
       - Aggregate Data = 200 clips * 1.5 MB/clip = 300 MB
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Total. The daily operational cost revolves around 300 MB/day per device.**
