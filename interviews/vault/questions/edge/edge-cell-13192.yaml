title: 'Edge Transformer Cost Mastery: Full Edge LLM Deployment Analysis'
scenario: 'Design a complete edge LLM deployment for a factory floor assistant using Jetson Orin (32GB
  LPDDR5, 275 TOPS INT8, 60W). Model: Phi-3-Mini-4K (3.8B params, INT4). Requirements: <2s for 200 token
  response, 10 simultaneous users, 24/7 operation. Calculate: memory footprint, decode throughput, concurrent
  user capacity, and annual operating cost. Specify if Jetson Orin can handle this or if more hardware
  is needed.'
details:
  realistic_solution: 'Phi-3-Mini-4K INT4: 3.8B*0.5bytes=1.9GB weights. KV cache per user, seq=4K: per
    token per layer = 2 (K+V) * 2048 (head_dim*heads) * 2 bytes = 8192 bytes = 8KB per token. 32 layers:
    256KB per token. 4K context: 4096*256KB=1GB per user. 10 users: 10GB KV. Total: 1.9+10=11.9GB << 32GB.
    Fits! Decode throughput: 1.9GB/102.4GB/s=18.6ms per decode step. At batch=10: load weights once, 10
    tokens per step. Throughput: 10/18.6ms=537 tok/s. 200 tokens: 200/537=372ms per user response. Under
    2s ✓. 10 concurrent users: total time per user = 372ms (parallelized). Annual power: 60W*8760*$0.10/1000=$52.6/yr.
    Single Jetson Orin handles 10 users.'
  common_mistake: 'Not accounting for KV cache memory for 10 concurrent users (each with 4K context: 3.8B
    model, 32 layers, KV per token = 32*2*2048*2bytes per position) which can exceed available memory
    even when model weights fit.'
  napkin_math: 'Phi-3 INT4: 1.9GB. KV 10 users at 4K: 10*4096*32*2*64*2bytes=10*4096*32*256B=10*4096*8192B=10*32MB=320MB.
    Wait: KV per token = 32 layers * 2 heads_direction * num_heads * head_dim * 2bytes. Phi-3 num_heads=32,
    head_dim=96. KV per token: 32*2*32*96*2=393,216 bytes=384KB. 4K tokens: 4K*384KB=1.5GB per user. 10
    users: 15GB. Total: 1.9+15=16.9GB < 32GB ✓. Decode batch=10 (one step per all users): weights loaded
    once=18.6ms. Per step=18.6ms for 10 tokens (1 per user). User response: 200 tokens/10 tok/step=20
    steps*18.6ms=372ms < 2s ✓. Annual: $52.6. Recommendation: single Jetson Orin sufficient for 10 users.'
