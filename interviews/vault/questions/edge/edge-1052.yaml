title: 'Fault Tolerance: Realize Fault Detection Latency for Real-Time Edge Inference'
scenario: Realize the fault detection system for a Jetson Orin (32GB LPDDR5, 275 TOPS
  INT8, 60W) running real-time conveyor belt inspection at 60 fps. Detection faults
  must be identified within 500ms (30 frames). Specify the detection mechanism, monitoring
  overhead, and alerting pipeline.
question: How would you implement fault detection on the 60 fps Jetson Orin conveyor
  system to catch inference failures within 500ms, with overhead and alerting?
details:
  realistic_solution: 'In-process watchdog: monitor inference latency per frame. Rolling
    window: last 30 frames (500ms at 60fps). If P95 latency > 2× baseline or > 3 consecutive
    frames fail → trigger alert. No external polling needed.'
  common_mistake: Relying on external monitoring with 30-second polling intervals
    — too slow. Not implementing in-process watchdog.
  napkin_math: '60 fps inference. Baseline latency per frame: 16.7ms. Detection window:
    30 frames = 500ms. Rolling buffer: 30 × 8B (timestamp + latency) = 240 bytes in
    SRAM — trivial. Percentile computation: sort 30 values = 30 log 30 = 148 ops per
    30 frames = 5 ops/frame overhead. At 275 TOPS: 5 ops in 0.000018 nanoseconds — completely
    negligible. Alert path: in-process flag → watchdog thread (running at 1 kHz) →
    TCP alert to orchestrator in < 1ms. Total detection latency: 30 frames + watchdog
    period = 500ms + 1ms = 501ms ≈ meets 500ms target. Edge case: fault on frame 1
    detected at frame 31 → 517ms. Tighten: use 25-frame window with lower threshold
    for faster detection.'
