title: 'Fault Tolerance: Realize Fault Detection Latency for Real-Time Edge Inference'
scenario: A Jetson Orin running real-time conveyor belt inspection at 60 fps requires fault detection. Detection faults must be identified within 500ms (30 frames).
question: How would you implement fault detection on the 60 fps Jetson Orin to catch inference failures within 500ms with alerting?
details:
  realistic_solution: 'In-process watchdog: monitor inference latency per frame. Rolling window: last 30 frames (500ms at 60fps). If P95 latency > 2× baseline or > 3 consecutive frames fail → trigger alert. No external polling needed.'
  common_mistake: |
    **The Pitfall:** Relying on external monitoring with long polling intervals or failing to implement an in-process watchdog.
    **The Rationale:** Standard cloud infrastructure monitoring uses 10-30s metrics polling, which candidates blindly apply to edge systems.
    **The Consequence:** Missing the 500ms real-time detection deadline by orders of magnitude.
  napkin_math: |
    - **Detection Window:** 60 fps inference means 30 frames = 500ms. Baseline latency is 16.7ms.
    - **Memory Overhead:** Rolling buffer of 30 $\times$ 8B (timestamp + latency) = 240 bytes in SRAM.
    - **Compute Overhead:** Sorting 30 values = 30 log 30 = 148 ops per 30 frames = 5 ops/frame. At 275 TOPS, this is **negligible**.
    - **Total Detection Latency:** 30 frames + watchdog period (1ms) = 501ms.
    - **Worst Case:** Fault on frame 1 detected at frame 31 is 517ms. Use a **25-frame window** to guarantee sub-500ms detection.
