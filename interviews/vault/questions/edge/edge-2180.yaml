title: Incomplete Edge Memory Pressure Diagnosis
scenario: An edge gateway with 8 GB RAM runs a 2 GB detector and begins OOM-killing
  processes during peak traffic. The team reports average RAM usage of 5 GB but omits
  peak batch size, camera buffers, allocator fragmentation, OS cache, and whether
  multiple models co-run.
question: What missing memory details are needed to diagnose OOMs on an 8 GB edge
  gateway whose average usage is 5 GB?
details:
  realistic_solution: Average RAM is insufficient. You need peak usage, camera buffer
    sizes, batch/concurrency, allocator fragmentation, OS page cache, co-running models,
    and whether memory must be contiguous for accelerators. The known average headroom
    is 3 GB, but transient buffers or fragmentation can still trigger OOM.
  common_mistake: Using average RAM usage as proof that memory pressure cannot be
    the failure mode.
  napkin_math: Average headroom = 8 - 5 = 3 GB. Four 500 MB camera buffers plus a
    1.5 GB temporary tensor would consume that entire headroom.
