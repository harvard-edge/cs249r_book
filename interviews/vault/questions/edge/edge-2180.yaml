title: Incomplete Edge Memory Pressure Diagnosis
scenario: An edge gateway with 8 GB RAM runs a 2 GB detector and begins OOM-killing processes during peak traffic. The team reports average RAM usage of 5 GB but omits peak batch size, camera buffers, allocator fragmentation, OS cache, and whether multiple models co-run.
question: What missing memory details are needed to diagnose OOMs on an 8 GB edge gateway whose average usage is 5 GB?
details:
  realistic_solution: "Average RAM metrics mask the transient allocations that trigger OOM on constrained edge nodes. Diagnostics must account for concurrent camera frame buffering, temporary intermediate tensors during inference, memory pool fragmentation, and the rigid contiguous memory demands of hardware accelerators. While the 3 GB average headroom appears safe, concurrent peak conditions inevitably exceed the 8 GB physical limit."
  common_mistake: |
    **The Pitfall:** Using average RAM usage as proof that memory pressure cannot be the failure mode.
    **The Rationale:** Candidates overlook transient memory spikes, allocator fragmentation, and non-model buffers.
    **The Consequence:** OOM crashes remain undiagnosed and the team incorrectly blames external components or OS bugs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total system RAM: 8 GB.
       - Average usage: 5 GB.
       - Model size: 2 GB.
    2. **Calculations:**
       - Average headroom: 8 GB - 5 GB = 3 GB.
       - Camera buffers: 4 cameras * 500 MB = 2.0 GB.
       - Temporary inference tensor: 1.5 GB.
       - Peak usage: 5 + 2.0 + 1.5 = 8.5 GB.
    3. **Conclusion & Interpretation:**
       - **Result: OOM Crash.** Average metrics conceal the 8.5 GB transient peak that triggers the kernel OOM killer.
