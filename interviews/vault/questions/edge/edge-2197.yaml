title: Edge Canary Rollout Spec
scenario: An edge fleet serves factories with varying safety risks. Some sites can tolerate a 5-minute fallback to manual inspection, while others must remain fully automated.
question: What rollout policy fields are required for a safety-sensitive edge defect-detection canary?
details:
  realistic_solution: The policy must include site risk tier, canary fraction by tier, fallback mode, manual override path, latency/error thresholds, rollback trigger, local cache of the old model, and offline behavior if connectivity drops. High-risk sites should canary later.
  common_mistake: |
    **The Pitfall:** Using a uniform percentage rollout across all sites.
    **The Rationale:** Candidates apply standard web canary strategies (e.g., "roll out to 5% of traffic") without stratifying by physical safety risk.
    **The Consequence:** A random 5% canary rollout accidentally hits high-risk, fully-automated sites, causing physical damage when the untested model fails.
  napkin_math: |
    * **Fleet Composition:** If 20% of the factories are high-risk.
    * **Naive Canary:** A flat 5% global canary rollout will statically include 1% of the high-risk sites.
    * **Conclusion:** A statistically sound canary must be **stratified by risk tier**, ensuring high-risk sites only receive updates after low-risk sites validate the model.
