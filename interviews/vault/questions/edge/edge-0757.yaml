title: The Canary Deployment Gone Wrong
scenario: 'You roll out a new detection model to 1% of your edge camera fleet (100 devices) as a canary. After 24 hours, accuracy metrics look identical to the old model. You proceed to 100% rollout. Within a week, customer complaints spike — the model misses vehicles in parking garages. Your canary didn''t catch this.'
question: "What went wrong with your canary strategy?"
details:
  realistic_solution: 'Your canary devices were not representative of the fleet''s deployment diversity. The 100 canary devices were likely selected randomly or from a single geographic region. If they were all outdoor intersection cameras (well-lit, standard angles), the canary would never encounter parking garage conditions (low light, tight angles, reflective surfaces, unusual vehicle orientations). The new model may have been trained on a dataset that underrepresented indoor/garage scenes, or the quantization calibration was biased toward outdoor distributions. Fixes: (1) **Stratified canary selection** — ensure the canary includes devices from every deployment category (outdoor, indoor, garage, highway, loading dock). (2) **Synthetic stress testing** — before any canary, run the model against a curated test suite that covers known hard cases (low light, rain, snow, unusual angles). (3) **Per-segment metrics** — don''t just track aggregate accuracy. Track accuracy per scene type, per lighting condition, per object class. A 0.1% aggregate drop can hide a 30% drop in a critical segment.'
  common_mistake: |
    **The Pitfall:** Believing the canary sample size was too small to be statistically significant.
    **The Rationale:** Candidates focus on the sheer number of devices (100) instead of the composition and environmental diversity of those devices.
    **The Consequence:** Approving rollouts based on biased canary data, leading to catastrophic failures in unrepresented edge environments.
  napkin_math: |
    * Fleet: 10,000 devices.
    * Deployment categories: outdoor-intersection (40%), outdoor-highway (20%), indoor-garage (15%), loading-dock (10%), other (15%).
    * Random canary of 100: expected garage devices = 15.
    * If canary is from one region with no garages: **0 garage devices tested**.
    * Stratified canary: 15 garage + 40 intersection + 20 highway + 10 dock + 15 other = **100 devices covering all segments**.
