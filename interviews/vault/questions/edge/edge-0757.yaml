title: 'The Canary Deployment Gone Wrong'
scenario: 'You roll out a new detection model to 1% of your edge camera fleet as a canary. After 24 hours, accuracy metrics look identical to the old model. You proceed to 100% rollout. Within a week, customer complaints spike \u2014 the model misses vehicles in parking garages. Your canary didn''t catch this.'
question: 'What went wrong with your canary strategy?'
details:
  realistic_solution: 'Your canary devices were not representative of the fleet''s deployment diversity. The canary devices were likely selected randomly or from a single geographic region. If they were all outdoor intersection cameras (well-lit, standard angles), the canary would never encounter parking garage conditions (low light, tight angles). Fixes: (1) Stratified canary selection \u2014 ensure the canary includes devices from every deployment category. (2) Synthetic stress testing \u2014 run the model against a curated test suite covering known hard cases.'
  common_mistake: |
    **The Pitfall:** Believing the canary sample size was too small to be statistically significant.
    **The Rationale:** Candidates focus on the sheer number of devices instead of the composition and environmental diversity of those devices.
    **The Consequence:** Approving rollouts based on biased canary data, leading to catastrophic failures in unrepresented edge environments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 devices.
    - Categories: outdoor (40%), highway (20%), garage (15%), dock (10%), other (15%).

    **Calculations:**
    - Random canary of 100: expected garage devices = 15.
    - If canary is from one region with no garages: 0 garage devices tested.
    - Stratified canary: 15 garage + 40 outdoor + 20 highway + 10 dock + 15 other = 100 devices.

    **Conclusion & Interpretation:**
    - **Result: Canary Bias (Data-Bound)**. Your canary devices were not representative of the fleet's deployment diversity.
