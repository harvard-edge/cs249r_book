title: The In-Car Assistant Latency Crisis
scenario: You are the lead ML Systems Engineer for a new luxury EV. The product team wants a conversational
  AI assistant that feels 'instantaneous' and can handle complex user queries by running a 7B parameter
  LLM on-device. Your target hardware is the Jetson AGX Orin (275 INT8 TOPS, 204.8 GB/s memory BW). Your
  initial prototype, using the 7B model quantized to INT8, has a time-to-first-token (TTFT) over 500ms,
  which feels sluggish. The hard constraint from the UX team is a P99 TTFT of < 150ms. Formulate a system
  architecture to meet this latency budget. What are your first three architectural decisions, and how
  do they combine to solve the problem?
question: "What are your first three architectural decisions, and how do they combine to solve the problem?"
details:
  realistic_solution: The correct approach is to design a multi-model system using speculative decoding.
    This avoids compromising the quality of the large model while massively accelerating inference.
  common_mistake: Focusing only on optimizing the 7B model in isolation. Many will suggest aggressive
    pruning or quantization, but these yield diminishing returns and can severely degrade quality. Others
    might suggest a smaller model, failing to meet the 'complex queries' product requirement. The core
    mistake is failing to think about the system as a cooperative ensemble of models.
  napkin_math: 'A 7B parameter LLM in INT8 requires 7GB for weights. To generate 1 token, all 7GB must
    be read. Orin''s memory bandwidth is 204.8 GB/s. Absolute minimum memory-bound latency per token:
    7GB / 204.8 GB/s = 34.1ms. For a 50-token response, time is 50 * 34.1ms = 1.7 seconds. Compute is
    trivial: 7B params * 2 ops = 14 GOPs. At 275 TOPS, compute takes 14G / 275T = 0.05ms. Bottleneck is
    strictly memory.'
