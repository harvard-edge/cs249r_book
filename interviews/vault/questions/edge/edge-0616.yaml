title: The In-Car Assistant Latency Crisis
scenario: 'You are the lead ML Systems Engineer for a new luxury EV. The product team wants a conversational AI assistant that feels ''instantaneous'' and can handle complex user queries by running a 7B parameter LLM on-device. Your target hardware is the Jetson AGX Orin (275 INT8 TOPS, 204.8 GB/s memory BW). Your initial prototype, using the 7B model quantized to INT8, has a time-to-first-token (TTFT) over 500ms, which feels sluggish. The hard constraint from the UX team is a P99 TTFT of < 150ms.'
question: What are your first three architectural decisions to meet the latency budget, and how do they combine to solve the problem?
details:
  realistic_solution: 'The correct approach is to design a multi-model system using speculative decoding. This avoids compromising the quality of the large model while massively accelerating inference.'
  common_mistake: |
    **The Pitfall:** Focusing only on optimizing the 7B model in isolation via aggressive pruning or further quantization.
    **The Rationale:** Failing to recognize that auto-regressive generation is severely memory-bandwidth bound, not compute-bound.
    **The Consequence:** Diminishing returns that severely degrade quality while failing to meet the tight TTFT latency constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Requirement: A 7B parameter LLM in INT8 requires 7GB for weights.
    - Hardware: Jetson AGX Orin (275 INT8 TOPS, 204.8 GB/s memory BW).

    **Calculations:**
    - Memory-Bound Latency: To generate 1 token, 7GB must be read. 7GB / 204.8 GB/s = 34.1ms per token.
    - Total Time: For a 50-token response, time is 50 * 34.1ms = 1.7 seconds.
    - Compute Time: 7B params * 2 ops = 14 GOPs. 14G / 275T = 0.05ms (trivial).

    **Conclusion & Interpretation:**
    - **Result: 34.1ms/token (Memory-Bandwidth Bound)**. The bottleneck is strictly memory, requiring speculative decoding.
