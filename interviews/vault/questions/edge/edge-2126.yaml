title: Federated Learning Gradient Aggregation on Jetson Orin
scenario: 10 edge devices run federated learning on medical imaging data. Each device holds a local model (100M params, 400MB FP32). The edge uplink is 10Mbps.
question: Design a gradient synchronization strategy to complete one federated round in under 5 minutes.
details:
  realistic_solution: 'Transmitting full FP32 gradients would take far too long over 10Mbps uplinks. To fit within the 5-minute constraint, employ aggressive gradient sparsification (e.g., Top-K at 1%) combined with INT8 quantization for the gradients. Error feedback must accumulate locally on each device to prevent performance degradation from dropped gradients.'
  common_mistake: |
    **The Pitfall:** Transmitting full FP32 dense gradients over the WAN link without compression.
    **The Rationale:** Using standard datacenter synchronous training protocols in an edge environment with severe uplink constraints.
    **The Consequence:** Federated rounds time out, completely stalling the training process and generating massive cellular or network costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Uplink: 10 Mbps = 1.25 MB/s.
       - Model size: 100M parameters (400 MB FP32).
       - Constraint: 1 round < 5 minutes (300s).
    2. **Calculations:**
       - Dense FP32 upload time: 400 MB / 1.25 MB/s = 320s per device (> 5 mins).
       - Compressed Payload (1% Top-K + INT8): 100M * 0.01 * 1 Byte = 1 MB.
       - Compressed Upload Time: 1 MB / 1.25 MB/s = 0.8 seconds.
       - Total Round Trip (Parallel uploads): 0.8s (up) + 2s (server compute) + 0.8s (down) = 3.6 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Synchronization**. Sparsification and quantization reduce the upload time from impossible (>320s) to trivial (3.6s).
