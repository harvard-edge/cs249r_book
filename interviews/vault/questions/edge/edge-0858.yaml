title: Evaluating Sparse Gradient Updates on Edge
scenario: You are designing a federated learning system for a mobile keyboard application training a 10M
  parameter NLP model (40MB in FP32). Clients are often on constrained networks with 1 Mbps uplink capabilities.
  Sending the full dense gradient update per round takes too long and causes high drop-out rates due to
  latency and battery drain. You are evaluating a Top-k sparse gradient update strategy (transmitting
  only the largest magnitude gradients) versus standard dense updates to alleviate the uplink bottleneck.
details:
  realistic_solution: Implement a 1% Top-k sparsity strategy coupled with local error feedback (accumulating
    the unsent gradients locally). This dramatically reduces the per-round uplink payload while mitigating
    the convergence penalty. Naive 32-bit index transmission doubles the sparse payload size, so indices
    should be compressed (e.g., using run-length encoding) to maximize bandwidth efficiency.
  common_mistake: Assuming that extreme sparsity (e.g., 0.1%) strictly reduces total training time without
    accounting for the increased number of global communication rounds required for convergence, or forgetting
    the payload overhead of transmitting the sparse indices.
  napkin_math: 'Full update: 10M params * 4B = 40MB. At 1 Mbps (125 KB/s), upload takes 320s. With 1%
    Top-k sparsity: Values take 100k * 4B = 400KB. Naive 32-bit indices take 100k * 4B = 400KB. Total
    payload = 800KB. Transfer time drops to 6.4s per round (50x speedup), preventing client timeouts while
    maintaining model accuracy via error feedback.'
