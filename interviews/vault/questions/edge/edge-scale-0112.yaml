title: Edge Compute Sizing Spec
scenario: You are asked to size compute for an edge analytics rollout across 500 sites. The product team gives model FLOPs but not frame rates, duty cycles, batching, or deadline. Specify what must be collected before estimating hardware count.
question: What inputs are required before estimating edge hardware count from model FLOPs across 500 sites?
details:
  realistic_solution: You need per-site event rate, FPS, duty cycle, deadline, model operations per inference, sustained accelerator efficiency, preprocessing cost, batching constraints, and redundancy requirements. FLOPs per model is only one term in the demand equation.
  common_mistake: Buying hardware from model FLOPs alone and discovering that event rate or deadline dominates.
  napkin_math: Compute demand per site is operations_per_inference x inferences_per_second / sustained_efficiency. Fleet demand multiplies that by 500 plus redundancy headroom.
