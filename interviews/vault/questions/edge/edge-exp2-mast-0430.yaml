title: Dual-Bank OTA Architecture for Coral Edge TPU Ensembles
scenario: You are designing an OTA update system for a smart city traffic monitoring fleet consisting
  of 5,000 devices. Each device utilizes a Google Coral Edge TPU via USB (4 TOPS INT8, 2W) attached to
  a low-power host SoC with only 1GB of total system RAM and 4GB of eMMC storage. The system runs an ensemble
  of three models (Object Detection, License Plate Recognition, and Anomaly Detection) that are strictly
  quantized to INT8 for the Edge TPU. Design a zero-downtime A/B partition OTA scheme that updates both
  the host application and all three Edge TPU models simultaneously while guaranteeing a safe rollback
  path if a new model version causes a system panic or accuracy degradation.
question: "How would you design a zero-downtime A/B OTA scheme for 5,000 Coral devices that atomically updates the app and all three models?"
details:
  realistic_solution: A robust solution requires a combined OTA payload where the host application and
    Edge TPU models are versioned and deployed together as a single atomic artifact. Given the 4GB eMMC
    limit, the A/B scheme should utilize a squashfs or similar compressed read-only root filesystem for
    the OS/app, leaving a shared mutable partition for logs and dynamic configuration. The models must
    be compiled specifically for the Edge TPU (fully mapped to INT8) before transmission to save space
    and compute on the edge device. The rollback mechanism must monitor a hardware watchdog and an application-level
    health check (e.g., successful inference execution on all three models) during a designated validation
    window post-reboot before permanently committing to the new partition.
  common_mistake: Candidates often design an OTA system that treats the host OS and the Edge TPU models
    as separate update streams, failing to account for version coupling. They also frequently overlook
    the severe storage constraints (4GB eMMC) when implementing A/B partitions, resulting in a design
    that requires more flash memory than is physically available when storing two copies of the OS, the
    host application, and the uncompressed model binaries.
  napkin_math: 'Storage constraint analysis: Total eMMC = 4GB (4000MB). Partitioning: Boot/Recovery =
    100MB, Data (logs/configs) = 500MB, leaving 3400MB for A/B rootfs. Thus, each rootfs partition (A
    and B) can be a maximum of 1700MB. Model sizing (INT8): Object Detection (MobileNet SSD) ~ 5MB, LPR
    ~ 3MB, Anomaly Detection ~ 10MB. Total model size = 18MB per partition. Host OS (minimal Linux) +
    app ~ 300MB compressed. Total payload per partition ~ 318MB, well within the 1700MB limit. Power constraint:
    OTA process + simultaneous inference must not exceed system limits; downloading an update while running
    the 2W Coral Edge TPU requires careful thermal and power budgeting, possibly throttling inferences
    during flash writes.'
