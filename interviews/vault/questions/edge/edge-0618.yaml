title: The 4D Radar Fusion Bottleneck
scenario: You are the lead ML Systems Architect for a self-driving car company. Your current perception
  system runs on a Jetson AGX Orin (60W configuration) and fuses data from cameras and a 3D LiDAR sensor,
  consuming ~50W and meeting the 33ms end-to-end latency budget. The product team now wants to incorporate
  a new 4D Radar sensor. This sensor provides a dense point cloud with Doppler velocity, which is critical
  for tracking fast-moving objects. The new radar processing model (a sparse point cloud network) requires
  an additional 8 TOPS to run. A junior engineer integrates the model onto the Orin GPU. The system's
  power consumption jumps to 58W (within budget), but end-to-end latency increases to 55ms, causing missed
  frames for the control loop. Profiling shows the new radar model's arithmetic intensity is only 200
  Ops/Byte. Propose a next-generation heterogeneous hardware architecture that meets the 33ms latency
  and 60W power constraints. Justify your component choices using roofline analysis and TOPS/W calculations.
  Which workloads would you place on which compute units and why?
question: "What heterogeneous compute architecture would meet the 33ms/60W constraints, and which workloads would you place on each unit?"
details:
  realistic_solution: The correct architectural decision is to move to a heterogeneous compute platform.
    The new 4D Radar model is severely memory-bound on the Orin GPU, which is a general-purpose processor
    not optimized for this type of sparse workload. Its low arithmetic intensity means its performance
    is limited by memory bandwidth, not the GPU's peak TOPS. By adding a specialized accelerator, we can
    process the radar data more efficiently.
  common_mistake: The most common mistake is to propose a bigger, more powerful monolithic GPU. This approach
    ignores the strict automotive power and thermal constraints (a 700W H100 is not an option in a car)
    and fails to recognize that the new workload is memory-bound, not compute-bound. Simply adding more
    TFLOPS won't solve a memory bandwidth problem efficiently.
  napkin_math: 'Radar: 8 TOPS needed, AI=200 Ops/Byte. Orin: 275 TOPS, 204.8 GB/s. Ridge=275T/204.8G=1342
    Ops/B. Radar AI(200)<<ridge→severely memory-bound. BW-limited perf: 204.8×200=41 TOPS effective but
    shared with camera+LiDAR. Fix: dedicated DSP with local SRAM (4MB scratchpad, 500 GB/s internal BW)
    for radar.'
