title: Evaluating Request Routing on Qualcomm Cloud AI 100
scenario: You are designing the request routing layer for an on-premise inference cluster consisting of
  8 Qualcomm Cloud AI 100 accelerators (each providing 400 TOPS INT8 at 75W, with 32 GB LPDDR4x memory)
  serving a combination of real-time latency-sensitive NLP tasks and batch computer vision processing.
  You must choose between a consistent hashing strategy based on model ID versus a dynamic queue-depth
  weighted round-robin approach. Given the memory capacity of the accelerators and the distinct performance
  profiles of the workloads, evaluate these two alternatives and present the better design choice.
details:
  realistic_solution: Consistent hashing based on model ID is the better approach for this on-premise
    accelerator environment. By pinning specific models to specific Qualcomm Cloud AI 100 cards, you ensure
    that the 32 GB memory is effectively utilized without thrashing, allowing the accelerator to maintain
    high throughput (approaching the theoretical 400 TOPS) for the resident models. If a single accelerator
    becomes a hotspot, the consistent hashing ring can be updated with virtual nodes to distribute the
    load among the 8 cards while preserving model locality.
  common_mistake: Candidates often default to a simple queue-depth based weighted round-robin to maximize
    the 400 TOPS utilization, ignoring the high cost of model context switching. They fail to account
    for the fact that continuously loading and unloading large models into the 32 GB LPDDR4x memory will
    cause severe memory bandwidth bottlenecks and spike tail latency for real-time requests.
  napkin_math: An NLP model takes 4 GB. The Qualcomm Cloud AI 100 has 32 GB LPDDR4x memory, allowing up
    to 8 such models resident per card. With dynamic routing, if a card switches models, loading a 4 GB
    model over PCIe to memory takes ~100ms, which destroys real-time latency budgets (often <50ms). Consistent
    hashing avoids this 100ms context-switch penalty entirely by guaranteeing the model is already in
    the 32 GB memory, keeping the 75W power profile stable rather than spiking during constant memory
    transfers.
