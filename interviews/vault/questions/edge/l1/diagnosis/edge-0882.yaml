schema_version: 1
id: edge-0882
title: Speculative Decoding Acceptance Drop
topic: speculative-decoding
status: published
provenance: imported
scenario: An edge laptop runs a 7B model (FP16) and a 115M draft model for speculative decoding (K=4).
  For general chat, throughput is 25 tokens/sec. However, when users ask the model to generate structured
  JSON configurations, throughput mysteriously drops to 4 tokens/sec, which is significantly worse than
  the 15 tokens/sec baseline without speculative decoding.
details:
  realistic_solution: The root cause is a catastrophic drop in the draft model's token acceptance rate
    for out-of-domain or highly structured text. Speculative decoding only yields a speedup if the time
    saved by accepted drafted tokens outweighs the overhead of running the draft model and the verification
    step. Generating strict JSON requires precise syntax (brackets, quotes, specific keys) that the 115M
    draft model likely fails to predict accurately. Consequently, the target model rejects almost all
    drafted tokens. The system ends up paying the latency cost of 4 draft forward passes plus a heavy
    verification pass, only to generate 1 valid token per step. The fix is to monitor the moving average
    of the acceptance rate and dynamically disable speculative decoding (fallback to standard auto-regressive)
    when the rate drops below the break-even threshold.
  common_mistake: Assuming the JSON output is hitting max-token limits or that the target model lacks
    JSON training data.
  napkin_math: Standard AR step = 66ms (15 tok/s). Draft model step = 5ms. Verification = 66ms. Total
    speculative step (K=4) = (4 * 5ms) + 66ms = 86ms. If 2.15 tokens accepted on average (general chat),
    yield is 2.15 tokens / 86ms = 25 tok/s (matching scenario). If 0 drafted tokens accepted (JSON), yield
    is 1 token / 86ms = 11.6 tok/s. Wait, if memory bandwidth is saturated during verification, verification
    might take 230ms. 250ms total / 1 token = 4 tok/s.
