id: edge-0875
title: Constant Folding Binary Bloat
topic: vram-budgeting
status: published
provenance: imported
scenario: Deploying a model to an MCU with 2MB Flash and 512KB SRAM. Base weights are 1.2MB. You enable
  a constant folding compiler pass to precompute a static 'Embedding -> Dense' block. The resulting compiled
  binary jumps to 3.8MB, failing the Flash allocation.
details:
  realistic_solution: Constant folding evaluates the subgraph during compilation and materializes the
    output tensor directly into the graph as a static constant. The intermediate expanded tensor from
    the Dense layer is significantly larger than the original compressed embedding weights and input indices
    combined, replacing a small weight matrix with a massive precomputed activation matrix.
  common_mistake: Assuming constant folding always reduces model size by eliminating runtime operations
    and intermediate variables.
  napkin_math: 'Cortex-M4 limits: 2MB Flash. Base weights = 1.2MB. Embedding (1000x64) = 64KB. Input =
    256 indices. Folded dense output = 256 * 512 * 4 bytes = 524KB. With folding, we store the 524KB constant
    instead of computing it. Total Flash = 1.2MB + 524KB = 1.72MB. Add one more folded block, and we hit
    2.24MB, exceeding Flash.'
