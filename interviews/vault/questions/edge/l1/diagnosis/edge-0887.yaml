schema_version: 1
id: edge-0887
title: Asymmetric Offload PCIe Bottleneck
topic: transformer-systems-cost
status: published
provenance: imported
scenario: On an AI PC, you map the compute-heavy Prefill phase to the discrete NPU (45 TOPS) and the memory-bound
  Decode phase to the CPU (100 GB/s RAM). End-to-end latency for a 2048-token prompt and 128-token generation
  is 4.5 seconds. Running purely on the CPU takes only 2.0 seconds.
details:
  realistic_solution: The root cause is the massive communication overhead of migrating the KV cache between
    discrete memory spaces. When prefill runs on the NPU, it generates the KV cache for the 2048-token
    prompt in the NPU's local memory. To perform decoding on the CPU, this KV cache must either be copied
    to system RAM in bulk, or accessed by the CPU over the PCIe bus during every single decode step. If
    the software stack doesn't explicitly migrate the KV cache, the CPU reads the 1GB tensor over the
    PCIe bus 128 times (once per generated token). This turns a high-bandwidth local memory read into
    a high-latency, low-bandwidth cross-device read, completely destroying any compute time saved during
    prefill. The solution is to either keep both phases on the same device, or perform a single, explicit
    bulk DMA transfer of the KV cache from NPU to CPU RAM immediately after prefill.
  common_mistake: Assuming the NPU is simply too slow at prefill compared to the CPU's vector extensions.
  napkin_math: 'KV cache size for 2048 tokens = 2048 * 32 layers * 32 heads * 128 dim * 2 bytes * 2 (K+V)
    = ~1 GB. PCIe Gen4 x4 effective bandwidth = ~8 GB/s. Reading 1GB over PCIe takes 125ms. If accessed
    token-by-token during decode: 128 tokens * 125ms = 16 seconds! Even with aggressive caching, reading
    it once takes 125ms, plus synchronization overhead per layer. If CPU decode is local, 1GB at 100GB/s
    = 10ms per token -> 1.28s total decode.'
