schema_version: 1
id: edge-0872
title: SRAM Spills in Aggressive Fusion
topic: vram-budgeting
status: published
provenance: imported
scenario: You deploy MobileNetV2 on an edge NPU with 2MB of SRAM. A new compiler pass aggressively fuses
  Depthwise Conv + 1x1 Conv to reduce DRAM trips. Unexpectedly, latency increases from 5ms to 18ms, and
  DRAM bandwidth usage triples compared to the unfused version.
details:
  realistic_solution: The aggressive fusion creates a monolithic kernel that requires materializing the
    large intermediate activation tensor (between the Depthwise and 1x1 Convs) entirely in SRAM. Because
    this intermediate tensor exceeds the 2MB SRAM limit, the memory planner is forced to spill the tensor
    to DRAM per tile. The unfused version executed sequentially, allowing smaller memory footprints that
    fit entirely within SRAM without spilling.
  common_mistake: Believing operator fusion always strictly reduces memory bandwidth by keeping intermediate
    activations in registers.
  napkin_math: 'Intermediate tensor at early layer: 112x112 spatial x 144 channels x 2 bytes (FP16) =
    3,612,672 bytes (~3.44 MB). Since 3.44 MB > 2 MB SRAM, the compiler spills. Spill/Fill adds (3.44MB
    * 2) / 10GB/s DRAM bandwidth = ~0.68ms per tile. Across 10 tiles, this adds ~6.8ms + high overhead,
    crippling performance.'
