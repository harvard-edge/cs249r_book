schema_version: 1
id: edge-0871
title: NPU Fallback via Dynamic Shapes
topic: latency-decomposition
status: published
provenance: imported
scenario: A vision model is deployed on an edge NPU (4 TOPS). Inference latency is consistently 12ms for
  224x224 inputs. When the camera switches to a 256x256 resolution stream, latency suddenly spikes to
  180ms per frame. Profiling shows 100% CPU usage during these spikes.
details:
  realistic_solution: The root cause is a graph capture and framework dispatch failure. The model was
    compiled using an Ahead-of-Time (AOT) graph capture mode that assumed static shapes (224x224). When
    the dynamic shape (256x256) arrives, the framework dispatcher fails to match the compiled NPU engine's
    signature. It catches the shape mismatch and triggers a fallback to unoptimized, eager execution on
    the edge CPU, abandoning the NPU entirely.
  common_mistake: Assuming the NPU compute scales linearly with pixels (256^2 / 224^2 * 12ms = ~15.6ms)
    and blaming memory bandwidth for the rest.
  napkin_math: 'NPU expected latency: (256*256) / (224*224) * 12ms = 15.6ms. Actual CPU fallback latency:
    ~150ms for eager execution + 18ms for recompilation/dispatch overhead + 12ms for initial NPU setup/failure
    = 180ms.'
