schema_version: 1
id: edge-0870
title: OOM from Implicit Runtime Layout Transposes
topic: vram-budgeting
status: published
provenance: imported
scenario: An edge gateway (4GB unified RAM) runs a 200MB FP16 Transformer model via an edge inference
  runtime. Theoretical peak activation memory for a 1024-token sequence is 120MB. Yet, inference crashes
  with an OOM error when processing 1024 tokens. Profiling reveals peak memory usage spikes to 3.5GB during
  the self-attention layers.
details:
  realistic_solution: The failure stems from the interaction between dynamic tensor shapes, the runtime's
    memory arena, and implicit layout conversions. The model was exported from PyTorch in NCHW layout,
    but the edge runtime's optimized matrix multiplication kernels (e.g., using specific DSP intrinsics
    or Tensor Cores) strictly require NHWC or blocked layouts. Because the model uses dynamic sequence
    lengths, the runtime compiler cannot perform a static end-to-end layout optimization pass. Instead,
    it dynamically injects explicit `Transpose` nodes before and after *every* MatMul in the attention
    blocks. The framework's memory planner must allocate separate buffers for the input, the transposed
    input, the output, and the transposed output simultaneously. With dynamic shapes, the memory arena
    cannot safely reuse memory across these layers and defaults to worst-case eager allocations, leading
    to massive OOM due to quadratic attention tensors being copied multiple times. The fix is to run an
    offline graph optimization pass to convert the entire model to NHWC before deployment, and provide
    a fixed-bucket shape profile so the runtime can statically plan and reuse memory arenas.
  common_mistake: Assuming a memory leak in the application code or blaming the OS for fragmentation,
    leading to host-level memory tuning or reducing batch size to 1.
  napkin_math: 'Attention matrix at 1024 tokens, 12 heads: 1024 * 1024 * 12 * 2 bytes (FP16) = ~25MB.
    Implicit transposes create 4 overlapping copies per tensor (NCHW->NHWC, NHWC->NCHW) = 100MB per attention
    block. Across 24 layers, dynamic memory planner fails to reuse buffers: 100MB * 24 layers = 2.4GB.
    Adding Q, K, V tensors + memory fragmentation pushes peak memory to ~3.5GB. Static planning + NHWC
    conversion bounds peak memory to ~120MB.'
