schema_version: 1
id: edge-0876
title: Dynamic Control Flow Graph Breakages
topic: latency-decomposition
status: published
provenance: imported
scenario: An object detection model on an edge GPU is exported via JIT tracing. It averages 15ms/frame.
  When viewing complex scenes with >50 detected objects, latency spikes to 85ms, causing frame drops in
  the autonomous tracking system.
details:
  realistic_solution: Non-Maximum Suppression (NMS) outputs a dynamic number of bounding boxes. The graph
    capture mode (tracing) unrolled the loop and forced a static shape (e.g., max 50 boxes). When the
    dynamic control flow exceeds 50 boxes, a 'graph break' occurs. The framework dispatcher invalidates
    the optimized GPU engine and falls back to executing eager framework code on the CPU, incurring massive
    host-device transfer and unoptimized compute overhead.
  common_mistake: Assuming the GPU's compute capacity is simply overwhelmed by the mathematical load of
    processing 50+ bounding boxes.
  napkin_math: 'Normal GPU inference: 15ms. Graph break overhead: 10ms (CPU-GPU memory copy for 50+ boxes)
    + 60ms (CPU eager execution of remainder of graph) = 70ms penalty. Total: 15ms + 70ms = 85ms.'
last_modified: '2026-04-01'
