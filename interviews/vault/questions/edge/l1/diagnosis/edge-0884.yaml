schema_version: 1
id: edge-0884
title: KV Cache Quantization Cast Overhead
topic: transformer-systems-cost
status: published
provenance: imported
scenario: To fit a 3B model onto a mobile NPU (8GB RAM, 50GB/s bandwidth), you quantize the KV cache from
  FP16 to INT8. Memory usage successfully drops from 3GB to 1.5GB. However, token generation latency regresses
  drastically, jumping from 30ms/token to 65ms/token.
details:
  realistic_solution: The root cause is the lack of native mixed-precision support for Attention on the
    NPU, leading to massive dequantization overhead. While reading INT8 data saves memory bandwidth, the
    NPU's attention hardware (specifically when applying Rotary Positional Embeddings or calculating softmax)
    likely requires FP16 inputs. Therefore, at every single layer, for every single token generated, the
    NPU must read the INT8 KV cache, cast/dequantize it to FP16, perform the attention mechanism, and
    potentially cast the new token back. This continuous casting turns a memory-bound operation into a
    compute-bound (or instruction-bound) bottleneck. The solution is either to fuse the dequantization
    step directly into the attention kernel (if custom kernels are supported) or to keep the KV cache
    in FP16 and rely on grouped-query attention (GQA) to reduce memory footprint instead of quantization.
  common_mistake: Assuming the INT8 memory is simply slower to read than FP16 memory due to alignment
    issues.
  napkin_math: 'For 2000 tokens, 32 layers, 3B model (hidden size 3072): KV cache size is 2000 * 3072
    * 2 (K,V) * 32 = 393 MB in INT8. Reading 393 MB at 50 GB/s takes ~8ms. However, dequantizing 393 million
    INT8 values to FP16 takes ~4 operations per value = ~1.5 Giga-ops per token. If the NPU scalar ALU
    handles 50 GOPS, this adds 1.5 / 50 = 30ms of pure compute overhead per token. Total latency: 30ms
    (base) - 8ms (bandwidth savings) + 30ms (cast) = ~52-65ms.'
