schema_version: 1
id: edge-0910
title: Wearable SRAM Weight Pinning
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are designing an always-on keyword spotting system for a smartwatch with a strict 5mW active
  power budget. The microcontroller has 512KB of SRAM and 4MB of eXecute-In-Place (XIP) Flash memory.
  Your float32 audio model is 1.2MB. Initial testing shows the system drawing 15mW during inference, draining
  the battery in hours.
details:
  realistic_solution: The excessive power drain is caused by fetching weights from high-latency, high-power
    Flash memory for every inference. To meet the 5mW requirements, you must architect the system to fit
    entirely within the 512KB SRAM. Apply INT8 Post-Training Quantization (PTQ) or Quantization-Aware
    Training (QAT) to compress the 1.2MB model down to ~300KB. Pin these quantized weights permanently
    in SRAM. Design a ring buffer in the remaining 200KB SRAM for audio feature extraction and intermediate
    activations, ensuring absolute zero Flash memory accesses during the steady-state inference loop.
  common_mistake: Attempting to use DMA to page weights from Flash to SRAM on demand, which still incurs
    the massive Flash power penalty.
  napkin_math: 'Reading from Flash costs ~20 pJ/bit, while SRAM costs ~2 pJ/bit. A 1.2MB model = 9.6M
    bits. Flash read per inference: 9.6M * 20pJ = 192 uJ. At 50 inferences/sec, memory fetches alone consume
    9.6mW > 5mW total budget.'
