schema_version: 1
id: edge-0112
title: The Case of the Missing Gigabytes
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: An engineer is deploying a computer vision model to a Jetson AGX Orin with 32 GB of LPDDR5 RAM.
  The model's weights and activations for a single inference are calculated to be 24 GB. The engineer
  is surprised when the application crashes with an out-of-memory (OOM) error. Besides the model itself,
  what other major consumer of DRAM on an edge device could account for the multi-gigabyte discrepancy?
details:
  realistic_solution: The OS (Linux for Tegra) reserves a baseline of 2-4 GB. Critically, the Linux kernel
    will pre-allocate a large Contiguous Memory Allocator (CMA) region at boot time to service real-time
    DMA requests from peripherals. For a high-resolution, high-framerate camera connected via MIPI CSI-2,
    this CMA buffer can be configured to be several gigabytes (e.g., 4-8 GB) to ensure frames are never
    dropped, even if the processing pipeline momentarily stalls. This reserved memory is not available
    to user-space applications, leading to the OOM error.
  common_mistake: Engineers from a cloud or desktop background often underestimate how much memory is
    reserved by the system for hardware-specific operations on an SoC. They might account for 1-2 GB for
    the OS, but forget that high-bandwidth peripherals like cameras require large, pre-allocated contiguous
    memory (CMA) buffers for DMA transfers to guarantee real-time performance.
  napkin_math: 'Total System RAM: 32 GB. Model Memory: 24 GB. Remaining Before System: 8 GB. A typical
    Linux OS on the device might use ~2 GB. A pre-allocated DMA buffer (CMA) for a 4K camera stream could
    easily be set to 6 GB to provide a deep buffer for real-time acquisition. Calculation: 32 GB (Total)
    - 24 GB (Model) - 2 GB (OS) - 6 GB (CMA) = 0 GB free memory, triggering the OOM.'
