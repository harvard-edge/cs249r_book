id: edge-0731
title: The OTA Update Tax
topic: tco-cost-modeling
status: published
provenance: imported
scenario: An automotive company spends $2M on R&D for a new driver-assist model. They plan to deploy it
  to a fleet of 100,000 vehicles. The model is 200MB and will be updated over-the-air (OTA) quarterly
  over a 5-year vehicle lifespan. The cellular data cost is $5/GB. For the entire fleet over its lifetime,
  identify the relationship between the one-time R&D cost and the total recurring data transmission cost.
details:
  realistic_solution: The costs are surprisingly similar, demonstrating a critical TCO principle in large-scale
    edge deployments. The one-time R&D is a sunk cost of $2M. The lifetime data cost for the entire fleet
    also accumulates to $2M, meaning the operational cost of simply *delivering* the updates is as significant
    as the cost of creating the model in the first place. At scale, logistics often rival innovation in
    cost.
  common_mistake: Engineers often focus heavily on the upfront non-recurring engineering (NRE) cost of
    model R&D, assuming it's the dominant expense. They underestimate how small, recurring operational
    expenses (OpEx), like data transmission for OTA updates, can accumulate to a massive scale across
    a large fleet's lifetime, potentially matching or exceeding the initial development investment.
  napkin_math: '200MB model × 4 updates/yr × 5 years = 4,000MB = 4GB per vehicle. 100,000 vehicles × 4GB
    = 400,000GB = 400TB total. Cost: 400,000GB × $5/GB = $2,000,000. R&D cost: $2M. Data cost: $2M. Ratio
    = 1:1. Delivery cost equals development cost. Delta updates (e.g., 20MB diff) would cut data cost
    by 10× to $200K.'
