id: edge-0342
title: The Hidden Cost of On-Device Training
topic: safety-certification
status: published
provenance: imported
scenario: 'An automotive company is deploying a new perception model to a fleet of 1 million vehicles.
  They are considering two training strategies: (A) a centralized approach, uploading sensor data to the
  cloud, and (B) a federated learning approach, training on the vehicles and only uploading model gradients.
  From a Total Cost of Ownership (TCO) perspective, what is the most significant *new* operational cost
  introduced by choosing the federated learning approach at this scale?'
details:
  realistic_solution: The aggregate energy consumption for on-device training. While each car's training
    cycle uses a small amount of energy (drawing from the battery, which costs money to charge), multiplying
    this by a million vehicles creates a substantial, ongoing operational expense that can easily outweigh
    the savings from reduced data uploads. This becomes a primary driver of the Total Cost of Ownership.
  common_mistake: Engineers often focus on the savings in cloud data transfer and storage, underestimating
    the massive aggregate cost of resource consumption (power, compute cycles) across a million-device
    fleet. They see the per-device cost as negligible, but it becomes a dominant operational factor at
    scale.
  napkin_math: Let's assume the in-vehicle computer uses an extra 30W for one hour of federated training
    per day.
