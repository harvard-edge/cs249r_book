id: edge-exp2-reca-0448
title: Google Coral Edge TPU Supported Data Type
topic: monitoring-observability
status: published
provenance: imported
scenario: Your team is building a production health dashboard for a fleet of smart cameras accelerated
  by Google Coral Edge TPUs. Each Coral TPU provides 4 TOPS of compute within a strict 2W power budget
  in a USB/PCIe form factor. To reduce deployment failures and improve MTBF, your alerting system must
  proactively flag models that are compiled with unsupported operators. What specific data type must all
  model weights and activations be quantized to for successful execution on the Edge TPU?
details:
  realistic_solution: The correct answer is INT8. The telemetry pipeline should scan model metadata to
    ensure pure 8-bit integer quantization before deployment, triggering an alert if any floating-point
    operators are detected.
  common_mistake: Candidates often assume edge devices universally support mixed precision like FP16 or
    BF16, which is common on modern edge GPUs but not on the Coral Edge TPU.
  napkin_math: 'Accelerator efficiency: 4 TOPS / 2W = 2 TOPS/W. For a fleet of 500 cameras, the total
    edge accelerator power draw is 500 * 2W = 1000W (1 kW), yielding a theoretical maximum fleet throughput
    of 2000 TOPS at INT8 precision.'
