title: The Privacy-Preserving Driver Cam
topic: federated-learning
status: published
provenance: imported
scenario: You're on the driver monitoring team for a new electric vehicle. The system uses a camera to
  detect driver drowsiness. To improve the model, you need to train on data from thousands of drivers.
  One proposal is to upload all video clips to the cloud. An alternative is to use Federated Learning.
  From a system design perspective, what is the primary reason a company would choose Federated Learning
  over centralized data collection in this scenario?
details:
  realistic_solution: The primary reason is to protect user privacy and reduce liability. Sending raw,
    sensitive video data from inside a person's car to a central server is a massive privacy risk. Federated
    Learning avoids this by keeping the data on the device and only transmitting anonymized, aggregated
    model updates. This design is privacy-preserving by default.
  common_mistake: Engineers often mistake secondary benefits for the primary driver. They might incorrectly
    assume Federated Learning's main purpose is to reduce overall compute cost (it often increases it
    due to on-device work and coordination) or to improve model accuracy (it's typically a trade-off).
    The core motivation is missed.
  napkin_math: 'The core issue is the volume of sensitive data. Let''s quantify it:'
