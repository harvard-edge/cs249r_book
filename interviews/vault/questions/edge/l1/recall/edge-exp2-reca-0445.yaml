schema_version: 1
id: edge-exp2-reca-0445
title: Google Coral Edge TPU Precision Requirement
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is building a smart camera using a Google Coral Edge TPU. The device operates on a
  strict 2W power budget and you need to optimize the model to run efficiently on the accelerator. You
  are discussing the deployment pipeline and the necessary model conversion steps.
details:
  realistic_solution: The candidate must state that the Google Coral Edge TPU strictly requires models
    to be fully quantized to INT8 precision to utilize the accelerator. If operations are not quantized
    to INT8, they will fall back to the host CPU, causing severe latency spikes and defeating the purpose
    of the 4 TOPS accelerator.
  common_mistake: Candidates often assume that the Edge TPU natively supports FP32 or FP16 models, or
    that it has dynamic precision switching. They might suggest simply converting a PyTorch model to TFLite
    without applying any quantization techniques.
  napkin_math: Edge TPU Compute = 4 TOPS INT8 @ 2W. If a 10M parameter model runs in FP32 on a host CPU
    at 100ms per inference, compiling it to full INT8 on the Edge TPU might yield an estimated speedup
    roughly proportional to the TOPS difference and memory bandwidth utilization. Assuming a target of
    10ms per frame for a 100fps requirement, the model must be 100% INT8; even a single unsupported FP
    operation falling back to a slow host CPU could add 20-30ms, missing the latency target completely.
