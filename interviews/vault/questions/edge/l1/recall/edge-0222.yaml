id: edge-0222
title: The Energy Cost of Precision (edge-0222)
topic: extreme-quantization
status: draft
provenance: imported
scenario: An autonomous vehicle's perception system runs on an edge device with a strict 30W thermal budget.
  To meet performance targets, you're deciding which numerical format to use for the primary convolutional
  layers. State the approximate energy consumption difference between a single 32-bit floating-point (FP32)
  multiply-accumulate (MAC) operation and an 8-bit integer (INT8) MAC.
details:
  realistic_solution: A single FP32 MAC operation consumes roughly 18 times more energy than an INT8 MAC.
    This is a fundamental physical invariant listed in the 'Numbers Every ML Systems Engineer Should Know'.
    The energy consumed by a digital operation is proportional to the number of transistors switching.
    FP32 requires larger, more complex circuits for both the multiplier and the adder compared to the
    much simpler INT8 integer logic, leading to this dramatic difference in energy draw.
  common_mistake: Engineers often mistakenly assume that the energy savings are linearly proportional
    to the reduction in bit-width (e.g., 32 bits / 8 bits = 4x). They forget that floating-point operations
    require significantly more complex circuitry for the exponent and mantissa compared to simpler integer
    ALUs, making the energy cost highly non-linear.
  napkin_math: Let the energy for one INT8 MAC be E_{INT8}. The energy for one FP32 MAC is E_{FP32} \approx
    18 \times E_{INT8}. If your perception model performs 20 Trillion INT8 operations per second (20 TOPS),
    the compute portion draws a certain power P. If you were forced to run the same model in FP32, the
    power draw would become 18 \times P. This factor of 18 is often the difference between staying within
    a 30W power budget and exceeding a 700W datacenter GPU's power draw, making INT8 essential for the
    edge.
