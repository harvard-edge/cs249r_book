schema_version: 1
id: edge-exp2-reca-0239
title: Recall KL Divergence for Edge Drift
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are deploying a quality inspection model on an NVIDIA Jetson Orin located on a factory floor.
  The device operates under a strict 60W TDP limit, utilizing its Ampere GPU and DLA accelerator for high-throughput
  inference. To monitor for data drift without adding significant overhead, you need to calculate a statistical
  distance between the incoming image brightness distribution and the training distribution. What is the
  mathematical definition of Kullback-Leibler (KL) divergence, and is it a symmetric metric?
details:
  realistic_solution: KL divergence is a measure of how one probability distribution differs from a reference
    distribution, defined as the sum of P(x) * log(P(x)/Q(x)) over all events x. It is fundamentally asymmetric.
    On edge devices, computing KL divergence on low-dimensional summary statistics like 1D histograms
    ensures drift monitoring consumes negligible compute.
  common_mistake: Candidates often incorrectly state that KL divergence is a true distance metric and
    assume it is symmetric (i.e., KL(P||Q) = KL(Q||P)). They may also fail to recall the specific formula
    or confuse it with Population Stability Index (PSI).
  napkin_math: Computing KL divergence on a 256-bin brightness histogram for an incoming video stream
    at 60 FPS requires minimal resources. 60 FPS * 256 bins * 4 bytes (FP32) = 61.4 KB/s of memory bandwidth.
    This is an imperceptible fraction of the NVIDIA Jetson Orin's 32 GB LPDDR5 memory bandwidth (204 GB/s),
    ensuring the 275 TOPS INT8 compute capacity and 60W TDP budget are entirely preserved for the primary
    Ampere GPU inference workload.
