id: edge-0375
title: The Efficiency Litmus Test
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: You are evaluating different accelerators like the Jetson AGX Orin and Hailo-8 for an autonomous
  vehicle's perception stack. The primary constraint is the vehicle's 30W power budget for this component.
  What is the single most important efficiency metric you should use to compare how much compute performance
  each chip delivers for a given amount of power?
details:
  realistic_solution: 'The key metric is **TOPS/W** (Trillion Operations Per Second per Watt). This metric
    directly measures computational efficiency, answering the question: ''For every watt of power I spend,
    how much compute do I get?'' In a power-constrained environment like a car, this is the most critical
    factor for choosing hardware.'
  common_mistake: Engineers often fixate on the headline number of peak TOPS (Trillion Operations Per
    Second) without considering the power required to achieve it. A chip might have high TOPS but be unusable
    in a car if it consumes 300W. Conversely, focusing only on low power is useless if the performance
    isn't sufficient for the real-time task. TOPS/W is the normalization factor.
  napkin_math: A Hailo-8 accelerator provides 26 TOPS at a typical power consumption of 2.5W, yielding
    an efficiency of **10.4 TOPS/W**. A more powerful chip like the Jetson AGX Orin running at its 60W
    maximum delivers 275 TOPS, for an efficiency of **~4.6 TOPS/W**. The TOPS/W metric allows you to make
    a direct, apples-to-apples comparison of which chip is more efficient for your power budget, even
    though their absolute performance and power are very different.
