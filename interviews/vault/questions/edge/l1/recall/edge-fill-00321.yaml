id: edge-fill-00321
title: Hailo-8 Memory Optimization for Real-time Inference
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are deploying a large language model (LLM) for real-time inference on a Hailo-8 (26 TOPS
  INT8, 2.5W dataflow accelerator) edge device. The model requires activations that exceed the available
  on-chip memory. During deployment, you observe frequent out-of-memory (OOM) errors and significant latency
  spikes due to data transfers. Describe how you would approach optimizing memory usage and handling memory
  pressure on this constrained hardware, specifically addressing the interaction between the Hailo-8's
  architecture and the host system's memory management, considering its INT8 capabilities.
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Analyze the model''s
    memory profile to identify peak activation memory usage. 2) Implement techniques like activation checkpointing
    or layer-wise inference where intermediate activations are offloaded to host memory and fetched on
    demand, carefully balancing this with Hailo-8''s dataflow efficiency. 3) Explore gradient accumulation
    strategies (even for inference, if model weights need to be updated or certain complex graph operations
    require iterative passes) if memory fragmentation becomes an issue for tensor allocation. 4) Leverage
    OS-level eviction policies (if applicable on the embedded OS) to prioritize critical data or use memory
    mapping techniques for efficient buffer management, ensuring that data streamed to the Hailo-8 accelerator
    is contiguous and ready. 5) For real-time OOM prevention, implement dynamic batch sizing or intelligent
    fallback mechanisms that swap to a smaller model version if memory limits are approached.'
  common_mistake: A common mistake is to only focus on model quantization (which Hailo-8 excels at with
    INT8) without considering the dynamic memory footprint of activations, intermediate tensors, and OS-level
    overheads, leading to unexpected OOMs or performance degradation despite sufficient TOPS.
  napkin_math: If a typical transformer layer has an activation tensor of 1GB (fp16), and we are limited
    to, say, 128MB on-chip memory on the Hailo-8 for activations (hypothetical, as Hailo-8 has unified
    memory, but illustrative for partitioning). How many such layers can realistically reside on-chip
    concurrently? If the model has 24 layers, and each requires 1GB of activation memory, and Hailo-8
    processes INT8, effectively halving the memory footprint to ~0.5GB per activation (due to INT8), what's
    the effective memory bandwidth needed to stream these activations from main memory to the Hailo-8
    accelerator at a target latency of 10ms per inference pass? Consider a DRAM bandwidth of 10GB/s.
