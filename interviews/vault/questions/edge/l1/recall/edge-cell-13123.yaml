schema_version: 1
id: edge-cell-13123
title: 'Edge TCO Mastery: Hardware Replacement vs Cloud Migration Decision'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A company''s 3-year-old fleet of 300 Jetson TX2 units ($299, 15 TOPS INT8, 15W) needs to run
  a newer model that requires 50 TOPS. Options: (A) Replace with Jetson Orin ($499, 275 TOPS, 60W), (B)
  Augment with Hailo-8 per unit (+$200, +26 TOPS, 2.5W = 41 TOPS — still insufficient), (C) Move to cloud
  H100 ($2.50/hr, 1979 TOPS). TCO analysis over next 4 years. Current inference rate: 2 inferences/second,
  8hr/day.'
details:
  realistic_solution: 'Power: 300 × 60W × 35,040hr × $0.10/1000 = $63,072 (not $631,200).'
  common_mistake: Not accounting for the residual value of existing TX2 hardware (can still run simpler
    preprocessing tasks) and the cost of migration in Options B and C (engineering time, API redesign).
  napkin_math: 'Fleet power: 300 devices × 60W × 35,040hr (4yr) × $0.10/kWh / 1000 = 300 × 60 × 35040
    × 0.10 / 1000 = 63,072,000 / 1000 = $63,072 (not $631,200 which omits /1000).'
