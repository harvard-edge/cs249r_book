schema_version: 1
id: edge-exp2-mast-0143
title: On-Premise Guardrail Architecture for High-Throughput Edge Inference
topic: responsible-ai
status: published
provenance: imported
scenario: Your enterprise customer requires deploying a 14B parameter LLM for sensitive document summarization
  entirely on-premise using a cluster of Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8,
  75W). Due to strict compliance requirements, the system must include real-time PII redaction and toxicity
  filtering guardrails that operate alongside the main model without violating a strict 150ms end-to-end
  latency SLA. Design a novel system architecture that co-locates the main LLM and guardrail models on
  the accelerator while maximizing throughput and ensuring organizational accountability.
details:
  realistic_solution: Design a pipeline where the 14B main model is quantized to INT4/INT8 to fit within
    a single 32GB card, leaving room for smaller, specialized INT8 guardrail models (e.g., a 1B parameter
    PII detector and a 500M toxicity classifier). Pipeline the execution so guardrails run asynchronously
    on partial output chunks rather than waiting for full sequence generation. Establish an organizational
    framework where guardrail triggers are asynchronously logged to a secure local audit database for
    continuous impact assessment and compliance reporting.
  common_mistake: Candidates often suggest API-based cloud guardrails which violates the on-premise requirement,
    or they propose sequentially running large guardrail models, which blows past the strict latency budget.
    Another mistake is failing to account for the memory bandwidth and capacity constraints of the 32GB
    LPDDR4x memory when running multiple concurrent models.
  napkin_math: A 14B parameter model in INT4 requires ~7-8 GB of memory, and its KV cache for a 2048 context
    at batch size 8 requires ~2 GB. Small guardrails (1.5B total params in INT8) take ~1.5 GB. Total memory
    footprint is ~11.5 GB, well within the 32 GB LPDDR4x limit. With 400 TOPS INT8 compute, a forward
    pass of a 1.5B guardrail takes less than 5ms. If the main model generates at 40 tokens/sec (25ms per
    token), running guardrails concurrently every 4 tokens (100ms chunk) takes under 10ms of compute,
    easily staying within the 150ms strict latency SLA while maintaining on-premise compliance.
