id: edge-0314
title: The Edge Roofline Bottleneck
topic: roofline-analysis
status: draft
provenance: imported
scenario: An autonomous vehicle team deploys a new vision model on a Jetson AGX Orin. The model performs
  50 Giga-operations (G-ops) and accesses 250 Megabytes (MB) of data from memory for each frame. What
  fundamental hardware limit is this workload most likely hitting?
details:
  realistic_solution: The model is memory-bound. To determine the bottleneck, we look at the model's arithmetic
    intensity (AI) — the ratio of compute to memory access. The Jetson AGX Orin has a memory bandwidth
    of about 205 GB/s and a peak compute of 275 TOPS (INT8). Its 'ridge point'—the AI needed to balance
    compute and memory—is roughly 1,342 Ops/Byte. This model's AI is far below that, meaning the memory
    system cannot supply data fast enough to keep the compute units busy.
  common_mistake: Engineers often fixate on the peak TOPS number advertised for a chip (e.g., 275 TOPS
    for the Orin) and assume their workload is always compute-bound. They forget that if the model doesn't
    perform enough computation for every byte it fetches from memory, the system will spend most of its
    time waiting for data, no matter how fast the processor is. Performance is dictated by the bottleneck.
  napkin_math: Arithmetic Intensity (AI) = Compute / Memory = 50 G-ops / 250 MB = 50e9 / 250e6 = 200 Ops/Byte.
    Jetson AGX Orin Ridge Point = 275 TOPS / 204.8 GB/s = 275e12 / 204.8e9 = 1342.7 Ops/Byte. Since the
    model's AI (200) is far less than the hardware's Ridge Point (1342), the compute units are starving
    for data. The workload is strictly memory-bandwidth bound.
