id: edge-0228
title: 'The Edge Efficiency Metric: GPU Compute Architecture'
topic: gpu-compute-architecture
status: draft
provenance: imported
scenario: You are mentoring a new engineer on your autonomous vehicle perception team. They are comparing
  several edge accelerators, including the NVIDIA Jetson AGX Orin. They ask, 'I see the spec sheet lists
  peak compute in TOPS and power consumption in Watts. What is the fundamental metric we should use to
  identify the *compute efficiency* of the chip, especially for our power-constrained vehicle platform?'
details:
  realistic_solution: The most important metric for compute efficiency is TOPS/W (Trillion Operations
    Per Second, Per Watt). This value tells you how much computational work the chip can do for every
    watt of power it consumes. A higher TOPS/W ratio indicates a more efficient architecture, which is
    critical for edge devices where power and thermal budgets are strictly limited.
  common_mistake: Engineers, especially those coming from a cloud background, often fixate on the headline
    peak TOPS number. They mistakenly assume that more compute is always better, without considering the
    power required to deliver it. In a thermally constrained edge environment like a car, this is a critical
    error that can lead to overheating and performance throttling. A chip with lower peak TOPS but much
    higher efficiency (TOPS/W) is often the superior choice.
  napkin_math: For the Jetson AGX Orin, peak compute is 275 TOPS (INT8) and maximum power is roughly 60W.
    Compute efficiency = Peak Compute / Power = 275 TOPS / 60W = 4.58 TOPS/Watt. If an algorithm requires
    100 TOPS sustained to run at target FPS, the theoretical power draw from compute alone is 100 TOPS
    / 4.58 TOPS/Watt = 21.8 Watts, helping to estimate if the thermal budget allows it.
