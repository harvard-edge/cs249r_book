id: edge-exp2-reca-0248
title: Qualcomm Cloud AI 100 Compute and Memory Recall
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We are building an on-premise inference server and need to select the right model serving infrastructure.
  Our target platform is the Qualcomm Cloud AI 100 accelerator to handle multiple concurrent INT8 models.
  What is the maximum INT8 compute throughput and total memory capacity of this specific accelerator?
details:
  realistic_solution: The candidate should successfully recall that the Qualcomm Cloud AI 100 provides
    400 TOPS of INT8 compute and has 32 GB of LPDDR4x memory. This knowledge is fundamental for determining
    maximum batch sizes and the number of concurrently loaded models.
  common_mistake: Candidates often confuse the Qualcomm Cloud AI 100 with other edge devices or datacenter
    GPUs, misstating the memory as 16GB or 80GB, or guessing the TOPS based on older architectures.
  napkin_math: Given 400 TOPS INT8 and a 75W TDP, the peak power efficiency is 400 / 75 = 5.33 TOPS/W.
    With 32 GB of memory, the compute-to-memory capacity ratio is 400 / 32 = 12.5 TOPS per GB.
