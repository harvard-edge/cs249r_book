id: edge-0203
title: The Duty Cycle Power Gap
topic: power-budgeting
status: published
provenance: imported
scenario: You're designing a battery-powered acoustic sensor for a fleet of autonomous warehouse robots.
  The sensor's goal is to detect the sound of a failing bearing, but it must operate for months on a single
  coin-cell battery. To achieve this, you'll rely heavily on duty cycling. State the approximate power
  consumption ratio between a microcontroller's 'active' state (e.g., running an FFT) and its 'deep sleep'
  state.
details:
  realistic_solution: The ratio is typically on the order of 1,000×. A TinyML-class microcontroller like
    a Cortex-M4 might consume tens of milliwatts (e.g., 10 mW) when active, but its consumption can drop
    to mere micro-watts (e.g., 10 µW) in a deep sleep state where only a real-time clock and a pin interrupt
    are active.
  common_mistake: Engineers accustomed to servers or mobile phones often underestimate this ratio, guessing
    it's around 10-100×. They fail to appreciate that microcontrollers are designed to power-gate nearly
    the entire chip, achieving power draws in the micro-watt range, which is fundamentally different from
    a mobile SoC's 'idle' state.
