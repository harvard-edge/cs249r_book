id: edge-0129
title: The Unified Memory Contention
topic: memory-pressure-management
status: published
provenance: imported
scenario: You deploy a computer vision model that requires 8 GB of memory for weights and activations
  on a Jetson AGX Orin, which has 32 GB of total LPDDR5 DRAM. During operation, the device must also run
  a separate, high-priority process that streams and records 4K video. You notice that your model's inference
  latency becomes unstable and sometimes the entire system lags. Identify the fundamental hardware constraint
  causing this issue.
details:
  realistic_solution: The Jetson AGX Orin, like most edge SoCs, uses a unified memory architecture. The
    32 GB of LPDDR5 DRAM is a single pool of memory shared by the CPU (running the OS, video stream process)
    and the integrated GPU (running the model). There is no separate, dedicated GPU memory. The instability
    arises because the model's memory accesses are competing for the same DRAM bandwidth with the CPU
    and the high-throughput video stream, causing contention on the memory bus.
  common_mistake: Engineers accustomed to cloud GPUs (like the H100) often assume the edge GPU has its
    own dedicated, high-bandwidth memory (like HBM). They diagnose the problem as a lack of 'VRAM', when
    the real issue is the shared nature of the entire memory system.
  napkin_math: A 4K video stream (3840x2160) using a common YUV420 format (1.5 bytes/pixel) at 30 fps
    requires `3840 * 2160 * 1.5 * 30 ≈ 373 MB/s` of sustained memory bandwidth. While the Jetson AGX Orin
    has a peak bandwidth of 204.8 GB/s, this video stream creates constant pressure on the same resource
    your model needs for loading weights and activations, leading to latency spikes.
