id: edge-cell-13121
title: 'Edge TCO Mastery: Multi-Tier Edge-Cloud-Hybrid Cost Optimization'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design the optimal edge-cloud-hybrid architecture for a hospital network: 50 sites, each with
  10 medical imaging AI requests/hour (simple triage) and 2 complex diagnosis requests/hour. Simple model:
  Hailo-8 can handle. Complex: requires H100 on cloud. Minimize total 5-year TCO while meeting P99 < 500ms
  for simple and P99 < 10s for complex. Calculate routing costs.'
details:
  realistic_solution: 'Power: 50 × 7.5W × 43,800hr × $0.10/1000 = $1,642.5 (not $16,425).'
  common_mistake: Running all requests on cloud to avoid edge hardware management, ignoring that 80% of
    volume is simple requests that are 100x cheaper on edge, or running all requests on edge without sufficient
    compute for complex cases.
  napkin_math: 'Fleet power: 50 devices × 7.5W × 43,800hr × $0.10/kWh / 1000 = 50 × 7.5 × 43800 × 0.10
    / 1000 = 1,642,500 / 1000 = $1,642.50 ≈ $1,642.5 (not $16,425 which omits /1000).'
