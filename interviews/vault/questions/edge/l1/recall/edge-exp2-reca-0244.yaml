id: edge-exp2-reca-0244
title: Jetson Orin DLA Offloading for Distilled Models
topic: knowledge-distillation
status: published
provenance: imported
scenario: Your team is deploying a real-time vision pipeline on an NVIDIA Jetson Orin edge device. To
  meet strict latency requirements under a 60W TDP, you have used knowledge distillation to train a compact
  INT8 student model from a massive teacher network. You now need to allocate the student model to the
  most power-efficient compute block on the Jetson Orin, leaving the Ampere GPU free for other tasks.
  What is the specific name of the dedicated fixed-function hardware accelerator on the Jetson Orin designed
  for this type of inference?
details:
  realistic_solution: The correct answer is the Deep Learning Accelerator (DLA). The Jetson Orin features
    dedicated DLA cores alongside the main Ampere GPU. These cores are highly optimized for fixed-function
    INT8 inference tasks like those performed by a heavily distilled student model, offering significantly
    better performance-per-watt and freeing up the GPU for complex parallel processing.
  common_mistake: Candidates often assume the Ampere GPU is the only compute engine available for neural
    networks on the device. They frequently confuse the Jetson Orin's system-on-chip architecture with
    generic discrete desktop GPUs and fail to recall the existence of the dedicated secondary accelerator.
  napkin_math: The NVIDIA Jetson Orin delivers 275 TOPS INT8 at a 60W TDP, yielding roughly 4.58 TOPS/Watt.
    If the distilled INT8 student model requires 55 GOPS (0.055 TOPS) per inference pass, the device's
    theoretical maximum compute throughput is 5,000 FPS (275 TOPS / 0.055 TOPS). A 10MB student model
    will easily fit within the 32 GB LPDDR5 memory, leaving ample space for application logic.
