id: edge-fill-00768
title: Hardware-aware NAS for Real-time Object Detection on NVIDIA Jetson Orin
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are leading a project to deploy a real-time object detection model on an NVIDIA Jetson Orin
  device, which boasts 32 GB LPDDR5 memory, 275 TOPS (INT8) compute capability, and operates within a
  60W power envelope. The primary challenge is to achieve ultra-low latency inference (targeting <30ms
  per frame) while maintaining high accuracy. Initial neural architecture search (NAS) results yielded
  models that are too large or too slow for the Jetson Orin's specific hardware profile. Your task is
  to design and implement a hardware-aware NAS strategy that explicitly constrains the search space by
  the Jetson Orin's SRAM/LPDDR5 capacity, actual INT8 FLOPs, and measured inference latency, potentially
  drawing inspiration from MCUNet-style approaches for efficient edge deployment.
details:
  realistic_solution: 'A realistic solution involves developing a hardware-aware NAS pipeline that deeply
    integrates the Jetson Orin''s characteristics. This includes:

    1.  **Device-Specific Latency Predictor:** Building a lightweight, accurate latency prediction model
    trained on benchmark inference times of various neural network operators and blocks executed directly
    on the Jetson Orin, accounting for memory access patterns and parallelism.

    2.  **Memory Constraint Integration:** Incorporating LPDDR5 memory usage as a hard constraint or a
    strong regularization term in the search objective, modeling not just weights but also intermediate
    activations to prevent out-of-memory errors or excessive memory transfers.

    3.  **INT8 Utilization Optimization:** Guiding the search towards architectures that maximize the
    utilization of the 275 TOPS INT8 units, potentially through quantization-aware training integrated
    into NAS or by prioritizing INT8-friendly operations.

    4.  **Power-Aware Objectives:** Introducing power consumption (approximated by active compute cycles
    and memory accesses) as another optimization objective or constraint, aiming to stay within the 60W
    budget.

    5.  **MCUNet-style Search Space:** Designing a flexible search space that allows for fine-grained
    operator choices and micro-architecture adjustments.'
  common_mistake: A common mistake is to rely solely on proxy metrics (like theoretical FLOPs or parameter
    count) for hardware efficiency during NAS without directly integrating device-specific constraints.
    This often leads to architectures that are suboptimal in practice, exceeding memory limits (e.g.,
    requiring swaps from 32GB LPDDR5 to slower storage or exhausting it completely), exhibiting higher
    actual latency than predicted due to inefficient memory access patterns or poor utilization of the
    275 INT8 TOPS, or drawing power beyond the 60W budget, necessitating extensive post-search optimization
    or a complete re-run.
  napkin_math: If the model needs to sustain 30 FPS, the maximum allowable inference time per frame is
    approximately 33.3 ms. Considering the 275 TOPS (INT8) capability, this is equivalent to roughly 9.16
    Tera INT8 operations per frame budget (275 TOPS / 30 FPS = 9.16 Tera OPS/frame). If a candidate architecture
    requires 10^10 INT8 operations per inference, how many frames per second could it theoretically achieve?
    275 * 10^12 OPS/s / 10^10 OPS/inference = 27,500 FPS at peak (compute is not the bottleneck for such
    a small model). Also, if the model requires 16GB of LPDDR5 for weights and activations, and the Jetson
    Orin's LPDDR5 bandwidth is, for example, 68 GB/s, how many times can this 16GB be accessed within
    the 33.3ms budget, and what are the implications for latency if data does not entirely reside in on-chip
    caches?
