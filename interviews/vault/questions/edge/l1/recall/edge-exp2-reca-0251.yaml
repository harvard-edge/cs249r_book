id: edge-exp2-reca-0251
title: Hailo-8 Dataflow Memory Constraints for Operator Scheduling
topic: operator-scheduling
status: published
provenance: imported
scenario: You are tasked with compiling a computer vision model for edge deployment on a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W). Unlike traditional edge GPUs, the compiler must schedule operators to stream data
  directly through the chip's fabric. What specific hardware memory characteristic of the Hailo-8 dictates
  this spatial operator scheduling approach rather than traditional layer-by-layer execution?
details:
  realistic_solution: The candidate must recall that the Hailo-8 has no local DRAM and operates as a pure
    dataflow accelerator. Operator scheduling must focus on layer fusion and mapping operators spatially
    onto the chip's distributed SRAM so that activations flow directly from one layer to the next, with
    any unavoidable spills streaming directly to host memory.
  common_mistake: Candidates often assume the accelerator has attached local DRAM (like LPDDR4) to buffer
    large intermediate activation tensors between sequentially scheduled layers. They might suggest memory
    reuse scheduling techniques optimized for DRAM rather than a spatial dataflow.
  napkin_math: 'Compute efficiency: 26 TOPS / 2.5W = 10.4 TOPS/W. By eliminating local DRAM accesses (which
    typically cost ~20-50 pJ/bit), the dataflow scheduling ensures that intermediate activations remain
    in SRAM (~1-5 pJ/bit), preserving the strict 2.5W power budget while streaming inputs from the host.'
