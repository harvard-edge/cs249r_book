id: edge-exp2-mast-0110
title: Dataflow Adversarial Defense on Hailo-8 Edge Cameras
topic: adversarial-robustness
status: published
provenance: imported
scenario: Design an adversarial defense architecture for a smart city traffic camera utilizing a Hailo-8
  dataflow accelerator. The system streams 1080p video directly from host memory, as the Hailo-8 has no
  local DRAM, operating strictly within a 2.5W power envelope while providing 26 TOPS of INT8 compute.
  Your system is being targeted by physical adversarial patches on vehicles. You must synthesize a novel
  defense that maintains 30 FPS without causing host memory bottlenecks.
details:
  realistic_solution: Integrate an INT8-optimized spatial smoothing or feature-squeezing mechanism directly
    into the early layers of the primary detection model. Utilizing simple depthwise convolutions or randomized
    average pooling disrupts high-frequency adversarial noise natively within the Hailo-8's pipeline.
    This in-network defense processes data inline as it streams from the host, avoiding memory roundtrips,
    and operates well within the 2.5W thermal limit while preserving the 30 FPS requirement.
  common_mistake: Candidates typically propose heavy input purification networks (e.g., GANs) or multiple
    inference passes. On a Hailo-8 with no local DRAM, this creates severe host memory bandwidth bottlenecks
    by requiring intermediate frames to be sent back and forth, and often relies on unsupported operations
    that break the continuous dataflow pipeline.
  napkin_math: A 1080p stream (1920x1080x3) at 30 FPS requires 186 MB/s host-to-device bandwidth. A typical
    edge detector takes ~16 GOPS/frame, or 0.48 TOPS at 30 FPS. An inline 3x3 depthwise feature-squeezing
    layer adds (1920 * 1080 * 3 * 9 * 2) = ~112 MOPS/frame, or ~3.3 GOPS at 30 FPS. Total compute is ~0.483
    TOPS, vastly below the 26 TOPS limit. Crucially, doing this inline saves an extra 186 MB/s host write/read
    cycle compared to an external purifier, perfectly aligning with the zero local DRAM constraint.
