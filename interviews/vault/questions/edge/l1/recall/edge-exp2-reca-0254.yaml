id: edge-exp2-reca-0254
title: Hailo-8 Hardware Specs for Model Cards
topic: responsible-ai
status: published
provenance: imported
scenario: We are deploying a safety-critical monitoring model on a Hailo-8 accelerator, requiring strict
  adherence to our responsible AI governance framework. As part of generating the edge deployment model
  card, you must document the hardware's exact compute constraints and precision format validated during
  impact assessments. What is the peak compute throughput, required precision, and power consumption of
  the Hailo-8?
details:
  realistic_solution: The correct answer is that the Hailo-8 achieves 26 TOPS specifically using INT8
    precision at a power consumption of 2.5W. The candidate should also note that as a dataflow accelerator
    with no local DRAM, it streams directly from host memory, dictating how safety models must be integrated.
  common_mistake: Candidates often assume the device supports FP16 or FP32 to preserve fairness metrics,
    or they assume the presence of local DRAM to store separate guardrail models. They may also fail to
    recall the specific 2.5W power envelope.
  napkin_math: 'Peak Performance = 26 TOPS. Power Consumption = 2.5W. Power Efficiency = 26 TOPS / 2.5W
    = 10.4 TOPS/W. Theoretical minimum latency for a 52 GOPS fairness-checking model: 52 GOPS / 26 TOPS
    = 2 milliseconds.'
