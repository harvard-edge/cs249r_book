schema_version: 1
id: edge-exp-reca-0015
title: Edge TPU Precision Requirements for Efficient CNNs
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are tasked with porting an EfficientNet-Lite model to run on a Google Coral Edge TPU for
  a battery-powered security camera. The Edge TPU provides 4 TOPS of compute within a tight 2W power budget,
  making it ideal for this USB-connected edge device. However, to leverage the TPU hardware, the model
  must be compiled specifically for it. What specific numerical precision format is strictly required
  by the Google Coral Edge TPU for hardware acceleration?
details:
  realistic_solution: The correct answer is 8-bit integer (INT8) quantization. The Google Coral Edge TPU's
    systolic array is designed exclusively for INT8 arithmetic, meaning weights and activations must be
    fully quantized to INT8 prior to compilation for the operations to execute on the accelerator.
  common_mistake: Candidates often state that FP16 is supported, conflating the Edge TPU with other edge
    accelerators like NVIDIA Jetson. They might also assume that partially quantized models will run efficiently
    without realizing that unquantized layers fall back to the host CPU.
  napkin_math: Assuming an INT8 MobileNetV2 requires 0.6 GOPS per inference, the Edge TPU (4 TOPS = 4000
    GOPS) can theoretically process 4000 / 0.6 = 6666 inferences/second at 2W. This yields a power efficiency
    of 6666 / 2 = 3333 inferences per Joule. If an unsupported precision is used and it falls back to
    a 2W host CPU achieving only 20 GOPS, throughput drops to 33 inferences/second, drastically reducing
    efficiency to 16.5 inferences per Joule.
