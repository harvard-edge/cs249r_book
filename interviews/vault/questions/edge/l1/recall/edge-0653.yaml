title: The Autonomous Stack Consolidation
topic: kernel-fusion
status: published
provenance: imported
scenario: You are the new technical lead for the perception team at a leading autonomous vehicle company.
  The current system is a complex web of 15+ specialized CNNs (for object detection, lane segmentation,
  sign recognition, etc.) running on a Jetson AGX Orin. This system is stable and meets its 33ms end-to-end
  latency budget, with the perception stack consuming 25ms of that budget. The research team has developed
  a new unified Transformer-based model that significantly improves accuracy but takes 200ms per inference.
  Formulate a systematic plan to optimize this new model to meet the <25ms latency budget on the same
  hardware.
details:
  realistic_solution: A successful plan requires a systematic approach, starting with the biggest sources
    of waste and moving to more sophisticated techniques. The correct order is crucial because the effectiveness
    of later stages depends on the success of earlier ones.
  common_mistake: Engineers often suggest unrealistic solutions like 'upgrade the hardware' (which is
    forbidden) or only focus on one area, like aggressive quantization, without a holistic plan. Another
    common mistake is mis-ordering the plan, for example, trying to apply speculative decoding before
    fixing the core attention bottleneck, which yields minimal gains. They might also incorrectly calculate
    the impact of an optimization, confusing compute-bound vs. memory-bound effects.
  napkin_math: '15 CNNs process independently. Assume each uses 2 GOPs and reads 10MB of weights. Total
    compute: 30 GOPs. Sequential execution memory load: 15 * 10MB = 150MB. Read time: 150MB / 204.8 GB/s
    = 0.73ms. Compute time: 30G / 275T = 0.1ms. Kernel launch overhead dominates: 15 models * 50 layers
    * 0.05ms = 37.5ms. Fusing them into one shared-backbone architecture eliminates launches, reaching
    the <25ms target.'
