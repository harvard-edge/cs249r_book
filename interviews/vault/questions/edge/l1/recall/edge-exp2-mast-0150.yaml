schema_version: 1
id: edge-exp2-mast-0150
title: Hailo-8 Streaming KV-Cache Architecture for Long-Context Transformers
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is deploying a 1B parameter vision-language transformer on a robotic platform using
  a Hailo-8 accelerator. The model requires processing video sequences up to 4K tokens, but the Hailo-8
  relies entirely on host memory streaming since it lacks local DRAM. Design a dataflow architecture to
  mitigate the O(n²) attention complexity and the massive host-to-accelerator bandwidth bottleneck caused
  by streaming the KV-cache every token generation step while operating within the 2.5W power budget.
details:
  realistic_solution: The optimal solution involves designing a fused, pipelined dataflow graph that streams
    compressed or quantized KV-caches (e.g., INT4) from the host, combined with a local temporal sliding
    window or token-dropping mechanism (like StreamingLLM) to strictly bound the cache size. The attention
    mechanism must be re-cast to map efficiently onto the 26 TOPS INT8 MAC array without stalling on host
    memory reads.
  common_mistake: Candidates often propose standard flash attention or sparse attention without realizing
    these still require large memory footprints, or they ignore the host-streaming bandwidth bottleneck
    completely. They might try to tile the KV-cache assuming local SRAM can hold enough context, failing
    to account for the continuous streaming requirement of the Hailo-8's architecture.
  napkin_math: For a 1B parameter model, generating 1 token requires ~2 GOPs. At 26 TOPS INT8, compute
    time per token is ~0.08ms. The bottleneck is streaming the KV-cache. A 4K token KV-cache (d_model=1024,
    16 layers, INT8) is 4096 * 1024 * 16 * 2 * 1 byte = 134 MB. Streaming 134 MB from host memory over
    PCIe Gen3x4 (~3.9 GB/s) takes 134 / 3900 = 34.3 ms per token. The system would run at ~29 tokens/sec,
    utilizing less than 0.3% of the compute capacity. By bounding the context window to 512 tokens and
    using INT4 KV-quantization, the transfer drops to 8.4 MB (2.1 ms transfer), improving throughput to
    ~450 tokens/sec while maintaining the 2.5W envelope.
