id: edge-0263
title: The INT8 Energy Dividend (edge-0263)
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You are optimizing a perception model for an autonomous vehicle's edge accelerator, which has
  a very strict thermal design power (TDP). To reduce power consumption, you're considering quantizing
  a convolutional layer from FP16 to INT8. Approximately how much more energy does a single FP16 multiply-accumulate
  (MAC) operation consume compared to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes roughly 5× more energy than an INT8 operation. While
    the bit-width is only double, floating-point arithmetic units are significantly more complex and energy-intensive
    than the simple integer units used for INT8. The provided physics constants show FP32-to-FP16 is a
    ~3.4× energy jump and FP32-to-INT8 is a ~18× jump. The ratio between them gives the FP16-to-INT8 energy
    gap.
  common_mistake: Engineers often conflate memory savings with energy savings. They see that FP16 (16
    bits) uses twice the memory of INT8 (8 bits) and incorrectly assume the energy savings are also 2×.
    Another common error is misremembering the ratio relative to FP32, not FP16.
  napkin_math: 'Physics of computation: An FP32 MAC costs ~18 pJ. An FP16 MAC costs ~5.3 pJ (~3.4x less
    than FP32). An INT8 MAC costs ~1.0 pJ (~5x less than FP16). Ratio: 5.3 pJ (FP16) / 1.0 pJ (INT8) =
    5.3x. Therefore, switching from FP16 to INT8 computation reduces MAC energy consumption by over 5x,
    which is critical for staying within the strict 30W thermal budget of edge accelerators.'
