id: edge-cell-11021
title: 'Dataset Curation: Mastery — Federated Learning Data Strategy for Industrial Edge Fleet'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You are designing a federated learning data strategy for 50,000 Jetson Orin (32GB LPDDR5, 275
  TOPS, 60W) devices deployed in manufacturing. Each device sees site-specific defect patterns (non-IID
  data). The global model must achieve 95% defect detection precision. Design the data strategy: local
  curation, aggregation protocol, and non-IID handling. Quantify everything.'
details:
  realistic_solution: '1) Measure heterogeneity: compute Earth Mover''s Distance between sites. 2) Local
    curation: blur/dup filter, keep uncertain samples. 3) Aggregation: FedProx (proximal term μ=0.01)
    or per-cluster FedAvg. 4) Personalization: fine-tune global model locally on 100 site-specific examples.
    5) Privacy: DP-SGD with ε=2.0 per round.'
  common_mistake: Applying FedAvg naively on non-IID data — global model performs poorly on any individual
    site's distribution. Not measuring degree of data heterogeneity.
  napkin_math: '50K devices × 50 labeled samples/device = 2.5M total samples. FedProx round: 10% participation
    = 5,000 devices/round. Each trains local model for 5 epochs on 50 samples = 250 gradient steps. Gradient
    upload: 7M param model × 4 bytes × compressed 10× = 2.8MB/device. 5,000 × 2.8MB = 14GB/round. At 1Gbps
    aggregation server: 14 seconds/round. 100 rounds = 1,400 seconds ≈ 23 minutes to convergence. Local
    personalization: 100 examples × 5 epochs × 7M params × 6 FLOPs = 21B FLOPs. At 275 TOPS = 0.076 seconds.
    Total system update cycle: 23 minutes.'
