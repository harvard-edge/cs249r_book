schema_version: 1
id: edge-exp2-mast-0128
title: Cross-Architecture Distillation for Google Coral Edge TPU
topic: knowledge-distillation
status: published
provenance: imported
scenario: You must deploy a large Vision Transformer (ViT) for real-time defect detection on a Google
  Coral Edge TPU. The Edge TPU provides 4 TOPS at INT8 precision within a 2W power envelope, but lacks
  native support for several ViT operations, causing CPU fallback and high latency. Design a cross-architecture
  knowledge distillation pipeline to transfer the ViT's performance to an Edge TPU-optimized CNN student,
  ensuring the final model runs entirely on the TPU in INT8 precision.
details:
  realistic_solution: Design an efficient CNN student (e.g., MobileNetV2-based) utilizing only Edge TPU-supported
    operators like depthwise separable convolutions and ReLU. Use the float32 ViT as a teacher for both
    logit matching and intermediate feature distillation, mapping the ViT patches to CNN spatial features
    via projection layers. Crucially, the student must be trained using Quantization-Aware Training (QAT)
    concurrently with distillation to ensure the learned representations are robust to the INT8 deployment
    requirement.
  common_mistake: Candidates often propose standard logit-matching distillation without considering the
    target hardware constraints, resulting in a student model that still contains unsupported operations.
    They also frequently apply post-training quantization (PTQ) after distillation, which leads to severe
    accuracy degradation compared to integrating Quantization-Aware Training (QAT) during the distillation
    process.
  napkin_math: The system requires 50 FPS (20ms per frame). The Edge TPU delivers 4 TOPS (4 * 10^12 operations/sec).
    In 20ms, the theoretical maximum is 80 GOPS. The ViT teacher uses 250 GOPS, well over the limit and
    uncompilable for the TPU. We design a CNN student requiring 1.5 GOPS. At 50 FPS, this uses 75 GOPS/sec,
    which is less than 2% of the 4 TOPS capacity. This ensures minimal thermal throttling, keeping the
    device well within its 2W power limit while leaving headroom for I/O operations.
