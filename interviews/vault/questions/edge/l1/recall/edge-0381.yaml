schema_version: 1
id: edge-0381
title: The Data Cost of Privacy
topic: federated-learning
status: published
provenance: imported
scenario: An automotive company is developing a driver-attention model using a fleet of 10,000 test vehicles.
  For a traditional centralized training approach, their plan requires uploading 1 GB of camera data per
  vehicle, per day. What is the total daily data upload volume that the cloud ingest system must be designed
  to handle?
details:
  realistic_solution: The correct answer is approximately 10 Terabytes (TB) per day. This is a foundational
    calculation for scoping the data infrastructure, networking costs, and overall Total Cost of Ownership
    (TCO) of a large-scale ML project. Provisioning for 100 GB or 1 TB would lead to immediate system
    failure and budget overruns.
  common_mistake: Engineers often underestimate the sheer data scale generated by a large fleet of edge
    devices. A common mistake is to be off by one or two orders of magnitude (e.g., calculating in GB
    instead of TB) or to mentally anchor on the data volume of a single device instead of the fleet's
    aggregate. Another is to confuse the much smaller data volume of a federated approach (i.e., just
    model weights) with the centralized approach's raw data volume.
  napkin_math: Total Data = (Number of Vehicles) × (Data per Vehicle)
