title: The INT8 Energy Dividend (edge-0355)
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: Your team is optimizing a perception model for an autonomous vehicle's main compute unit. To
  reduce power consumption and thermal load, you're considering quantizing a key convolutional layer from
  full-precision FP32 to INT8. From a pure hardware physics perspective, identify the approximate energy
  reduction for a single multiply-accumulate (MAC) operation when you switch from FP32 to INT8.
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    Therefore, switching from FP32 to INT8 for compute provides an ~18x energy saving for the MAC operations
    themselves. This is a fundamental physical invariant based on the energy required to switch transistors
    for complex floating-point arithmetic versus simpler integer math.
  common_mistake: Engineers often conflate memory savings with energy savings. Since FP32 (4 bytes) is
    4x larger than INT8 (1 byte), they incorrectly assume the energy savings from computation are also
    around 4x. This misses the fact that computational energy is dictated by the complexity of the underlying
    digital logic (complex floating-point units vs. much simpler integer ALUs), where the energy difference
    is far greater.
