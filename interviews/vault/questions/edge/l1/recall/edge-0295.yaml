id: edge-0295
title: The Deceptive Pointwise Convolution
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing a perception model on a Jetson AGX Orin for an autonomous robot. You observe
  in the profiler that a 1x1 convolution layer is achieving only a tiny fraction of the GPU's peak 275
  TOPS, even though it requires billions of floating-point operations. What is the fundamental hardware
  reason for this poor performance?
details:
  realistic_solution: The layer is memory-bound. A 1x1 convolution has very low arithmetic intensity;
    it performs very few calculations for each byte it reads from memory. On an edge device like the Jetson
    AGX Orin, the memory bandwidth (204.8 GB/s) is the limiting factor for such layers. The compute cores
    spend most of their time idle, waiting for data to arrive from DRAM, preventing the GPU from reaching
    its peak TOPS.
  common_mistake: Engineers often mistakenly believe that any operation with a high FLOP count should
    be compute-bound. They focus on the theoretical peak performance (TOPS) of the hardware but forget
    about the physics of data movement. They fail to consider that the operation's arithmetic intensity—the
    ratio of computations to data movement—is the critical factor determining the bottleneck.
  napkin_math: The performance of a GPU kernel is determined by the Roofline model. The key is Arithmetic
    Intensity (AI) = Ops / Byte. The Jetson AGX Orin has a ridge point of ~1,342 Ops/Byte. A 1x1 convolution
    has a very low AI, often less than 10. Since its AI (<< 10) is far to the left of the ridge point
    (1,342), it lies on the slanted part of the roofline, meaning its performance is dictated entirely
    by memory bandwidth, not compute power.
