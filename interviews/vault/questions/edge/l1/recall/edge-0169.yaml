id: edge-0169
title: The Real-Time Batching Tax
topic: real-time-deadlines
status: published
provenance: imported
scenario: An edge device is processing a video stream from a factory assembly line, with a hard real-time
  deadline of 33ms per frame to detect defects. To improve overall processing capacity, your team suggests
  batching incoming frames. What is the fundamental trade-off you must immediately identify for a real-time
  system like this?
details:
  realistic_solution: The primary trade-off is between throughput and latency. While batching increases
    the system's overall throughput (more frames processed per second), it unavoidably increases the latency
    for each individual frame. The first frame in a batch is delayed by the time it takes to collect the
    rest of the frames for that batch. This 'queuing delay' can easily cause the system to miss its real-time
    deadline.
  common_mistake: Engineers, especially those from a cloud background, often see batching as a 'free'
    way to boost throughput. They forget that in a real-time, continuous stream, creating a batch forces
    the first frame to wait for the last frame, directly adding to its end-to-end latency and potentially
    violating the deadline. Throughput is a system-level metric, but latency is a per-item metric.
  napkin_math: Assume inference takes 20ms for one frame. The deadline is 33ms. If we wait for a second
    frame to form a batch of 2, the first frame is delayed by 33ms (at 30fps). Inference then takes another
    ~35-40ms. Total latency for frame 1 is ~70ms. This vastly exceeds the 33ms deadline. Trade-off is
    throughput vs latency.
