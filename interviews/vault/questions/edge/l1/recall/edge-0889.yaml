schema_version: 1
id: edge-0889
title: Disconnected Drift Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You have 10,000 portable ultrasound devices operating in rural clinics. They run an edge CNN
  for anomaly detection. Due to HIPAA and severe bandwidth limits (20 Kbps uplink), you cannot send the
  5MB DICOM images to the cloud. You must design a system to detect data drift (e.g., sensor degradation
  or new population demographics) within 7 days of occurrence.
details:
  realistic_solution: Push drift detection compute to the edge by calculating distribution metrics locally.
    Instead of raw data, the edge device computes lightweight statistical signatures of the input data
    and model outputs. Extract the mean and variance of intermediate CNN embeddings, and the entropy of
    the final softmax layer. The device aggregates these metrics over a sliding window (e.g., 24 hours)
    and calculates the Wasserstein distance against a locally stored baseline distribution from the training
    set. It then transmits only a 1KB telemetry payload containing these summary statistics and drift
    scores to the cloud. This trades off centralized raw-data visibility for strict privacy compliance
    and ultra-low bandwidth utilization.
  common_mistake: Attempting to sample and send a small percentage of full images to the cloud for central
    drift analysis.
  napkin_math: 'Sending 10 raw images/day: 10 * 5MB = 50MB/device/day. 50MB * 10,000 = 500 GB/day (fails
    HIPAA and saturates 20Kbps link taking 5.5 hours/device). Edge telemetry: 1KB/day/device * 10,000
    = 10MB/day fleet-wide. Transmitting 1KB over 20 Kbps takes 0.4 seconds.'
