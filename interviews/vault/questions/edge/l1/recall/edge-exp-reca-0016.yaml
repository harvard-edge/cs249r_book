schema_version: 1
id: edge-exp-reca-0016
title: Hailo-8 Local Memory Specification
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a multi-model RAG pipeline on an edge gateway equipped with a Hailo-8 dataflow
  accelerator, which delivers 26 TOPS INT8 at 2.5W. The pipeline requires passing intermediate embeddings
  between a lightweight embedding model and a small generative model. When designing the memory buffer
  for these intermediate states, how much local DRAM does the Hailo-8 provide for you to store these chained
  inference outputs directly on the accelerator?
details:
  realistic_solution: The candidate should correctly state that the Hailo-8 has absolutely no local DRAM.
    It is a pure dataflow accelerator that relies on its internal architecture and streams all necessary
    data, including intermediate states between chained inference calls, directly from the host system's
    memory.
  common_mistake: Candidates often assume the accelerator has dedicated onboard memory (like 4GB or 8GB
    of LPDDR4) similar to an edge GPU, and plan to allocate intermediate RAG buffers directly on the device.
  napkin_math: Available Local DRAM = 0 GB. Therefore, 100% of intermediate data must traverse the host
    connection. If passing a 512KB context state between two models, it requires transferring 512KB out
    to the host and 512KB back in. Over an edge PCIe connection operating at 2 GB/s, this 1MB round-trip
    adds roughly 1MB / 2000MB/s = 0.5 milliseconds of latency to the end-to-end pipeline.
