id: edge-exp2-mast-0125
title: Heterogeneous Pipeline Design for Jetson Orin
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: You are architecting the compute pipeline for an autonomous robotics platform utilizing the
  NVIDIA Jetson Orin. The system requires processing multiple sensor modalities under a strict 60W TDP.
  You must design a custom execution model that optimally partitions a massive transformer-based perception
  model across the Ampere GPU and the DLA to maximize the 275 TOPS INT8 capacity. Furthermore, detail
  how your thread block configuration and memory access patterns will mitigate bottlenecks on the shared
  32 GB LPDDR5 memory.
details:
  realistic_solution: The optimal architecture statically schedules standard INT8 dense operations (like
    standard convolutions or MLPs) onto the DLA to maximize power efficiency within the 60W budget. The
    Ampere GPU's Tensor Cores are reserved for irregular or dynamic operations like fused multi-head attention.
    To prevent memory bottlenecks, the implementation must use zero-copy memory (pinned memory) to avoid
    redundant copies, and warp-level primitives with asynchronous copy (cp.async) to load data from the
    32 GB LPDDR5 directly into shared memory, maximizing memory coalescing and Tensor Core occupancy.
  common_mistake: Candidates frequently treat the system as a standard discrete GPU setup, scheduling
    all matrix operations onto the Ampere SMs and entirely neglecting the DLA, which wastes power and
    compute capacity. They also often fail to account for the shared unified memory architecture, designing
    kernels that cause severe memory contention between the CPU, GPU, and DLA.
  napkin_math: The Jetson Orin's 256-bit LPDDR5 at 6400 MT/s yields a peak memory bandwidth of 204.8 GB/s
    (32 bytes * 6.4 GT/s). To fully utilize the 275 INT8 TOPS, the required arithmetic intensity is (275e12
    OPs) / (204.8e9 Bytes/s) = ~1342 OPs/Byte. Standard attention mechanisms often have an arithmetic
    intensity below 400 OPs/Byte, making them severely memory-bound. To bypass the 204.8 GB/s bandwidth
    wall, intermediate tensors (like the NxN attention matrix) must be strictly materialized in the Ampere
    SM's shared memory rather than written back to LPDDR5.
