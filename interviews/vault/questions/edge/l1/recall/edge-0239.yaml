id: edge-0239
title: The Fusion Dividend
topic: kernel-fusion
status: published
provenance: imported
scenario: You're optimizing a CNN-based perception model for an autonomous vehicle's embedded Jetson AGX
  Orin. The profiler shows that you're heavily memory-bandwidth bound, with significant time spent on
  DRAM access between sequential layers like `Conv2d`, `BatchNorm`, and `ReLU`. What is the primary purpose
  of applying operator fusion in this context?
details:
  realistic_solution: The primary purpose of operator fusion is to reduce memory bandwidth consumption
    and latency. It combines multiple sequential operations (e.g., Conv -> BatchNorm -> ReLU) into a single
    kernel. This avoids writing intermediate results to and from the much slower main memory (LPDDR5 on
    the Jetson), keeping the data in fast on-chip registers or L1 cache between the fused operations.
  common_mistake: Confusing operator fusion with other optimization techniques like pruning (which reduces
    model size) or quantization (which changes precision). Engineers often forget that fusion's main benefit
    isn't reducing the amount of computation, but rather reducing the *cost of moving data* between computations.
  napkin_math: On an edge device like the Jetson, an access to LPDDR5 DRAM costs ~100 ns, while an on-chip
    L1 cache access is ~1 ns. A non-fused `Conv -> ReLU` sequence must write the intermediate activation
    map to DRAM and then read it back, incurring a latency penalty of at least ~200 ns per data element.
    A fused kernel eliminates this roundtrip entirely. For a modestly sized tensor, this saves millions
    of slow memory accesses and can significantly reduce the overall frame latency, which is critical
    for real-time applications like autonomous driving.
