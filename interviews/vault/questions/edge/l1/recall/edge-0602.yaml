schema_version: 1
id: edge-0602
title: The Watchdog Priority Inversion
topic: latency-decomposition
status: published
provenance: imported
scenario: Your edge robot has a hardware watchdog timer. A high-priority real-time thread must ping the
  watchdog every 100ms. You add a low-priority thread to run a background ML log-compression task. The
  system runs perfectly for hours, then the robot suddenly hard-resets because the watchdog wasn't pinged.
  You check the logs; the high-priority thread was blocked. How did a low-priority background ML task
  kill the real-time thread?
details:
  realistic_solution: 'This is classic priority inversion. The low-priority ML thread acquires a shared
    resource (e.g., a mutex protecting a log buffer). A medium-priority thread (network handler, sensor
    driver) preempts the low-priority thread — but the low-priority thread still holds the lock. The high-priority
    watchdog thread tries to acquire the same lock, blocks, and cannot ping the watchdog. The medium-priority
    thread runs for 200ms (processing a backlog), keeping the low-priority thread from releasing the lock.
    The high-priority thread misses its 100ms deadline by 105ms. The fix: enable priority inheritance
    on the mutex so the low-priority thread temporarily inherits the watchdog''s priority while holding
    the lock.'
  common_mistake: '"The ML task used 100% of the CPU." In a preemptive RTOS, a low-priority task cannot
    steal CPU from a high-priority task, even at 100% load.'
  napkin_math: 'High-priority deadline: 100ms. Low-priority lock duration: 5ms. Medium-priority interruption:
    200ms. Without Priority Inheritance, the 100ms deadline is violated by 105ms.'
