id: edge-cell-11067
title: 'Fault Tolerance: Mastery — Fault Tolerant Edge Fleet for Autonomous Industrial Vision'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are designing a safety-critical vision system across 1,000 Jetson Orin (32GB LPDDR5, 275
  TOPS, 60W) devices in an automotive stamping plant. The system must operate at 99.95% uptime. Devices
  run online learning (adapting to new part geometries). Design the complete fault tolerance architecture:
  checkpointing, OTA updates, failure detection, recovery, and fleet management.'
details:
  realistic_solution: 'Layered FT: (1) Base model: A/B partitions, OTA canary deployment. (2) Online LoRA
    state: local checkpoint every 10 minutes, upload to cloud every 24h. (3) Failure detection: watchdog
    timer, inference latency monitor, anomaly score drift. (4) Recovery: hardware failure → spare device
    pre-loaded with last cloud LoRA state. (5) Fleet management: centralized dashboard, per-device health
    scores.'
  common_mistake: Treating online learning state and base model as one monolithic checkpoint; not designing
    recovery paths for different failure types (hardware vs model degradation vs software crash).
  napkin_math: '1,000 devices. MTBF_Orin = 50K hours. Expected hardware failures/year: 1000 × 8760/50000
    = 175 failures/year = 14.6/month. With 30 hot spares (3%): mean replacement time = 4 hours (logistics).
    Downtime: 175 × 4h = 700 device-hours/year = 700/8,760,000 total device-hours = 0.008% per device
    = 99.992% uptime. Online LoRA checkpoints: 1K devices × 2MB/checkpoint × 6/hour = 12,000 MB/hr (12
    GB/hr) → negligible NVMe. Cloud upload: 1K × 2MB every 24h = 2GB/day. At $0.09/GB = $0.18/day = $65/year.
    OTA canary: 10 devices (1%) for 24h before fleet rollout. Full rollout: 200MB × 990 devices = 198GB
    = CDN cost $1.98/update. Monthly updates: $23.76/year. Total reliability infrastructure cost: spares
    $60K + cloud storage/transfer $89/year. Far less than plant downtime cost ($50K/hour downtime).'
