schema_version: 1
id: edge-0636
title: The Autonomous Perception Power Wall
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are the new Tech Lead for the perception team at a leading autonomous vehicle company. Your
  current system, built on a Jetson AGX Orin, uses a large, monolithic CNN to fuse data from eight 6-megapixel
  cameras. This model consumes 55W of the SoC's 60W thermal design power (TDP), leaving no room for growth.
  The product team wants to add three major new features, including cyclist hand-signal detection and
  construction zone awareness. Your team estimates this requires a 40% increase in model FLOPs to hit
  the required accuracy targets for these long-tail events. A hardware change is not possible for two
  years due to supply chain commitments. Propose a novel software and model architecture for the next-generation
  perception stack that meets the product requirements without violating the hard 60W power constraint.
  What are your first three architectural decisions, and how do you justify them with quantitative reasoning?
details:
  realistic_solution: The correct L6+ approach is to abandon the monolithic paradigm and propose a **conditional
    compute architecture**, likely a **Mixture of Experts (MoE)**. The core insight is that not all driving
    scenes are equally complex; you don't need to run your most powerful, power-hungry model on an empty
    highway.
  common_mistake: 'An L5-level answer is to propose incremental optimizations: ''We''ll switch to a more
    efficient MobileNetV3 backbone, apply aggressive INT8 quantization, and use depthwise separable convolutions.''
    While these are good practices, they offer linear, not step-function, improvements. A 10-20% efficiency
    gain is plausible, but a 40% capability increase within the *same* power budget is not. This approach
    fails to address the core problem: the monolithic ''always-on'' compute model has hit a wall.'
  napkin_math: 8 cameras at 6MP = 48MP per frame. At 3 bytes/pixel (RGB), that's 144MB per frame. Over
    Orin's 204.8 GB/s memory bus, just transferring the raw input takes 144MB / 204.8GB/s = 0.7ms. A standard
    CNN taking 100 GOPs/img yields 8 * 100G = 800 GOPs. At 275 TOPS, compute is 800G / 275T = 2.9ms. Total
    base time is 3.6ms, leaving plenty of 33ms budget, meaning 55W power draw can be reduced via underclocking.
