title: The INT8 Energy Dividend (edge-0363)
topic: extreme-quantization
status: draft
provenance: imported
scenario: You are optimizing a perception model for an autonomous vehicle's camera system, which is running
  on a power-constrained NVIDIA Jetson AGX Orin. A key strategy is quantizing the model from 32-bit floating-point
  (FP32) to 8-bit integer (INT8) to reduce power consumption. Based on the fundamental physics of computation,
  what is the approximate energy-saving ratio for a single compute operation when switching from FP32
  to INT8?
details:
  realistic_solution: An INT8 compute operation is approximately **18 times** more energy-efficient than
    an FP32 operation. This is a physical property of the silicon. The energy consumed by a multiplier
    circuit is proportional to the switching activity, which scales with the complexity of the operation.
    Reducing the bit width by a factor of 4 (from 32 to 8) drastically reduces the underlying hardware
    complexity, leading to this super-linear energy saving.
  common_mistake: Assuming energy savings are linear with bit width (e.g., 32 bits / 8 bits = 4×). The
    actual savings are much higher because the energy of a digital multiplier, a core component of an
    AI accelerator, scales non-linearly (closer to quadratically) with the number of bits.
  napkin_math: This is a direct recall of a physical invariant. The energy ratio is a fundamental constant
    of digital logic design.
