schema_version: 1
id: edge-exp2-reca-0247
title: Jetson Orin Peak INT8 Performance Recall
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are preparing to deploy a computer vision model on an NVIDIA Jetson Orin for an autonomous
  delivery robot. The system is heavily constrained by its 60W TDP power budget, requiring you to maximize
  throughput using lower-precision INT8 inference. To set expectations for the inference latency of your
  quantized model, what is the theoretical peak INT8 compute performance of the NVIDIA Jetson Orin, and
  what hardware components contribute to this?
details:
  realistic_solution: The correct answer is 275 TOPS for INT8 operations. The candidate should correctly
    recall this specification and ideally note that this peak performance is achieved by co-utilizing
    the Ampere GPU architecture and the onboard Deep Learning Accelerator (DLA) while operating within
    the 60W TDP limit.
  common_mistake: Candidates often confuse the TOPS rating with older Jetson modules like the Xavier or
    Nano, or cite FP16 performance numbers instead. They also frequently forget that the peak INT8 rating
    combines the compute capabilities of both the Ampere GPU and the DLA accelerator, rather than being
    driven by the GPU alone.
  napkin_math: While primarily a recall question, we can contextualize the 275 TOPS specification computationally.
    275 TOPS = 275 trillion operations per second. If the Orin operates at its maximum 60W TDP under full
    load, the power efficiency is 275 TOPS / 60W = 4.58 TOPS/Watt. Furthermore, to fully saturate 275
    TOPS using the 32 GB LPDDR5 memory subsystem (which has roughly 204 GB/s bandwidth), the arithmetic
    intensity must be extremely high. Assuming 1 byte per INT8 parameter, the application requires at
    least (275 * 10^12 ops/sec) / (204 * 10^9 bytes/sec) ≈ 1348 operations per byte loaded from main memory
    to avoid being bottlenecked by memory bandwidth.
