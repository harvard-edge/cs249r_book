id: edge-cell-13122
title: 'Edge TCO Mastery: Full Lifecycle Cost Model for Industrial Edge AI'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Build a comprehensive 5-year TCO model for an industrial predictive maintenance system: 200
  Jetson Orin units ($499, 60W) deployed in a steel mill. Include: hardware amortization, power, connectivity
  (industrial Ethernet, $2K/site setup + $500/yr), model retraining ($50K/year), maintenance contracts
  (5%), and opportunity cost of downtime prevention ($500K/year value). Calculate ROI and payback period.'
details:
  realistic_solution: 'Power: 200 × 60W × 43,800hr × $0.10/1000 = $52,560 (not $526,800).'
  common_mistake: Building a cost-only model without including the value delivered (downtime prevention),
    making it impossible to calculate ROI. TCO must be paired with ROI analysis for business cases.
  napkin_math: 'Fleet power: 200 devices × 60W × 43,800hr × $0.10/kWh / 1000 = 200 × 60 × 43800 × 0.10
    / 1000 = 52,560,000 / 1000 = $52,560 (not $526,800 which omits /1000).'
