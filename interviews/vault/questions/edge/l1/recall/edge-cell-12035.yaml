id: edge-cell-12035
title: 'MLOps Lifecycle: End-to-End MLOps for Autonomous Vehicle Edge Fleet'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Design the MLOps lifecycle for an autonomous vehicle fleet with 10,000 Jetson Orin (60W, 275
  TOPS) units running a perception stack (5 models, 200MB combined TensorRT). Requirements: daily model
  updates from cloud training, shadow mode validation before promotion, per-vehicle rollback, and fleet-wide
  monitoring. Quantify update bandwidth, storage per vehicle, and monitoring data volume.'
details:
  realistic_solution: 'Delta updates: 5 models × 40MB delta (20% change per daily update) = 200MB/vehicle.
    But staged: 1% → 1% → 10% → 100% over 4 days. Day 1: 100 vehicles × 200MB = 20GB transfer. Monitor:
    if no failures in 24hr, expand. Storage per vehicle: current model 200MB + previous (rollback) 200MB
    = 400MB on 32GB device (1.25%). Fleet monitoring: each vehicle emits 100KB/hr metrics → 10K vehicles
    × 100KB/hr × 24hr = 24GB/day metrics. Centralize in time-series DB (InfluxDB).'
  common_mistake: Designing a monolithic update system that pushes all 5 models simultaneously, creating
    a 200MB × 10K = 2TB daily transfer, when delta updates and staged rollouts reduce this dramatically.
  napkin_math: 'Full update: 200MB × 10K = 2TB at $0.09/GB = $180/day. Staged (1%/day for 4 days): day
    1 100×200MB=20GB=$1.80, day 2 100×200MB=$1.80, day 3 1000×200MB=$18, day 4 8800×200MB=$158. Total:
    $179.60 (same cost but 96% lower risk day 1). Shadow mode per vehicle: store 1hr shadow detections:
    1hr×100 frames/s×1KB/frame=360MB. Too large. Sample 1%: 3.6MB/vehicle. 10K×3.6MB=36GB/day shadow data.'
