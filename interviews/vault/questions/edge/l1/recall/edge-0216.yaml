id: edge-0216
title: The Cost of Privacy
topic: federated-learning
status: published
provenance: imported
scenario: 'An automotive company is training a perception model for a new driver-assist feature. They
  are considering two approaches: centralized training, where they upload all raw video from the cars
  to the cloud, versus federated learning, where they train on the car and only upload model updates.
  From a pure TCO (Total Cost of Ownership) perspective on an edge fleet, what is the primary economic
  reason a company might choose Federated Learning?'
details:
  realistic_solution: The primary economic driver is the massive reduction in data transmission costs.
    Raw video data is orders of magnitude larger than the model gradients or weights that are sent to
    the central server in a federated learning setup. By avoiding the need to upload a constant stream
    of high-bandwidth video from every vehicle in the fleet, the company saves enormous amounts on cellular
    data plans and cloud ingress fees.
  common_mistake: Engineers often focus on the cloud compute costs for aggregation or the on-device compute
    cost. While these are factors, they are dwarfed by the operational expense of transmitting petabytes
    of raw video data over cellular networks from a large fleet of vehicles. The cost difference between
    uploading video and uploading small model updates is the dominant economic factor.
  napkin_math: 'Let''s model a fleet of 10,000 vehicles. Centralized training requires uploading 1 TB
    of raw video per car: 10,000 * 1 TB = 10 Petabytes of data. Federated learning only uploads model
    updates (e.g., 100 MB per car): 10,000 * 100 MB = 1 Terabyte total. FL reduces transmission volume
    by a factor of 10,000x.'
