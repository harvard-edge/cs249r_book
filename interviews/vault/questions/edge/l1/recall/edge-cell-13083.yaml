schema_version: 1
id: edge-cell-13083
title: 'Edge Systolic Array Mastery: Optimal Dataflow Selection for Edge Deployment'
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'You are deploying a custom vision transformer (ViT-Tiny: 5M params, 1.3 GOPS, patch_size=16,
  seq=196+1, hidden=192, heads=3) for plant disease detection on Jetson Orin (275 TOPS INT8, 60W, DLA
  11 TOPS). Determine: (1) whether to use GPU or DLA, (2) optimal dataflow for attention vs FFN, (3) end-to-end
  latency at 30 FPS, (4) energy per frame.'
details:
  realistic_solution: 'DLA supports: Conv, FC, pooling, normalization. Does NOT support attention (gather/scatter,
    softmax with dynamic scaling). GPU handles attention. Strategy: run patch embedding (conv) on DLA,
    attention on GPU, FFN on DLA if FC-shaped. ViT-Tiny attention: Q,K,V proj = 3*(2*197*192*192)=43.4M
    FLOPs. QK^T: 2*3*197^2*64=14.9M. Softmax+V: 14.9M. GPU time: 87.2M/275T=0.317μs (trivial). FFN: 2*197*192*192*4=2*197*768*192=116M
    FLOPs. AI=116M/(2*197*192+197*768+197*192)=116M/600KB=193. Memory bound on GPU (ridge 2686). DLA for
    patch embed: 3*3 conv, 3ch→192ch, 224×224: FLOPs = 2*192*14*14*(16^2*3)=2*192*196*768=115M. Fits DLA.'
  common_mistake: Running ViT on DLA without checking if the self-attention operation (irregular data
    access pattern) is supported by the DLA's fixed dataflow engine, which typically only supports CNNs
    and simple FC layers.
  napkin_math: 'Patch embed (DLA): 2*192*196*768/(16^2 patches) = 115M FLOPs. Weights: 192*16^2*3=147KB.
    BW: input(3*224^2=150KB)+weights+output(192*14^2=37.6KB)=335KB. AI=115M/335KB=343 > DLA ridge 55 →
    compute bound on DLA. Time=115M/11T=0.010ms. GPU attention+FFN: 87.2M+116M=203M FLOPs. BW: 5MB activations.
    Time=5MB/3350GB/s=1.5μs. Compute: 203M/1979T=0.10μs. BW bound. Time=1.5μs. 12 ViT blocks: 12*(0.010ms
    DLA + 0.0015ms GPU)=0.138ms total. At 30 FPS: budget=33ms. 0.138ms << 33ms. Energy: DLA=2W*0.12ms=0.24μJ,
    GPU=60W*0.018ms=1.08μJ total per forward=1.32μJ. FPS limited by camera, not compute.'
