title: 'The Energy Cost of Precision: Extreme Quantization'
topic: extreme-quantization
status: published
provenance: imported
scenario: In automotive systems, managing the power budget is critical to prevent overheating and ensure
  reliability. When optimizing a perception model, a common technique is to move from 32-bit floating-point
  (FP32) arithmetic to 8-bit integer (INT8) arithmetic. Based on the fundamental physics of computation,
  identify the approximate energy savings for a compute operation when switching from FP32 to INT8.
details:
  realistic_solution: An FP32 operation consumes approximately 18× more energy than an INT8 operation.
    This is a fundamental physical invariant driven by the silicon design. FP32 ALUs (Arithmetic Logic
    Units) must handle a sign, exponent, and mantissa, requiring significantly more transistor switching
    and thus more energy than a simple 8-bit integer ALU.
  common_mistake: Engineers often conflate memory savings with energy savings. While moving from FP32
    to INT8 reduces the memory footprint by 4×, the energy savings from computation are much more significant.
    This is because the energy cost is driven by the complexity of the underlying digital logic circuits
    (adders, multipliers), not just the bit width. Floating-point units are vastly more complex than simple
    integer units.
  napkin_math: This is a direct recall from the 'Invariants' table, not a calculation. The energy cost
    of a compute operation is proportional to the number of transistors switching. An FP32 multiply is
    a complex operation involving large multipliers and adders for the mantissa and logic for the exponent.
    An INT8 multiply is a much smaller, simpler circuit. This difference in circuit complexity leads to
    a measured ~18x difference in energy consumption per operation.
