id: edge-exp2-mast-0138
title: Hardware-Aware NAS for Edge TPU Object Detection
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are tasked with designing a novel object detection architecture for a swarm of smart city
  cameras powered by the Google Coral Edge TPU via USB. The system must process video at a minimum of
  30 FPS while strictly adhering to the Edge TPU's constraints, specifically its 4 TOPS INT8 throughput
  and 2W power envelope. Furthermore, your architecture search space must be heavily constrained by the
  Edge TPU's limited operator support, requiring all operations to be seamlessly quantizable to INT8 without
  significant accuracy degradation. How would you design a hardware-aware NAS framework to discover the
  optimal network topology for this specific accelerator?
details:
  realistic_solution: The correct approach involves building a latency predictor specifically profiled
    on the Google Coral Edge TPU, factoring in INT8 quantization overhead and compiler operator mapping.
    The search space should be restricted to a supernet consisting only of operations fully supported
    by the Edge TPU compiler, such as depthwise separable convolutions with ReLU/ReLU6. The NAS objective
    function must jointly optimize for task accuracy, INT8 quantization robustness, and actual measured
    on-device latency.
  common_mistake: Candidates often propose standard NAS algorithms without incorporating the Edge TPU
    compiler's specific operator restrictions into the search space. They may optimize for theoretical
    FLOPs instead of actual on-device latency, ignoring the fact that non-supported operators will fallback
    to the host CPU and destroy throughput.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS (4 * 10^12 operations per second) in INT8. To
    maintain 30 FPS, the maximum latency per frame is 1 / 30 = 33.3 ms. Theoretically, at full utilization,
    the accelerator can perform (4 * 10^12) * 0.0333 = 133 giga-operations (GOPS) per frame. Assuming
    a realistic utilization rate of 40% due to memory bottlenecks and USB interface overhead, the discovered
    architecture must be constrained to a maximum of 133 * 0.40 = 53.2 GOPS per frame. At 2W, the efficiency
    is 4 TOPS / 2W = 2 TOPS/W.
