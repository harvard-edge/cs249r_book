title: 'The Depthwise Separable Dividend: Attention Scaling & Variants'
topic: attention-scaling
status: draft
provenance: imported
scenario: You're optimizing a driver-monitoring CNN for a new automotive compute module. To meet the 30
  FPS target, you need to reduce the computational cost of your early convolutional layers. Your peer
  suggests replacing the standard 3x3 convolutions with 3x3 depthwise separable convolutions. State the
  approximate computational reduction you'd expect from this change.
details:
  realistic_solution: A depthwise separable convolution reduces computation by a factor of approximately
    K*K, where K is the kernel size. For a 3x3 kernel, this results in nearly a 9x reduction in FLOPs
    compared to a standard convolution.
  common_mistake: Engineers often underestimate the savings, thinking it's a minor optimization like 2-3x.
    They may also forget that the savings scale with the square of the kernel size, not linearly. Another
    common error is thinking the savings are primarily from the pointwise step, when the bulk of the reduction
    comes from decoupling the spatial (depthwise) and cross-channel (pointwise) operations.
  napkin_math: The cost of a standard convolution is proportional to `Cin * Cout * K * K`. The cost of
    a depthwise separable convolution is `(Cin * K * K) + (Cin * Cout)`. The ratio of standard to separable
    is `(Cin * Cout * K * K) / (Cin * K *K + Cin * Cout)`. Simplifying by dividing by `Cin` gives `(Cout
    * K * K) / (K*K + Cout)`. As the number of output channels `Cout` gets large (which is common), this
    ratio approaches `(Cout * K * K) / Cout`, which simplifies to `K*K`.
