id: edge-exp2-reca-0257
title: NVIDIA DLA Primary Compute Architecture on Jetson Orin
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are optimizing a vision model for deployment on an NVIDIA Jetson Orin. The target device
  is configured with a 60W TDP and provides up to 275 TOPS of INT8 compute capability. To maximize power
  efficiency and throughput, you are profiling operations to offload from the Ampere GPU to the dedicated
  Deep Learning Accelerator (DLA). What specific type of hardware architecture does the DLA use at its
  core to compute dense matrix multiplications?
details:
  realistic_solution: The correct answer is that the NVIDIA DLA uses a systolic array architecture. A
    systolic array allows data to flow through a grid of processing elements, where partial sums or weights
    are kept stationary to minimize expensive memory reads. This specialized dataflow is exactly what
    allows the Jetson Orin to achieve such high INT8 efficiency under a 60W power budget compared to running
    the same workloads purely on the GPU.
  common_mistake: Candidates often assume the DLA is simply a smaller version of the Ampere GPU and uses
    standard Streaming Multiprocessors (SMs) with SIMD execution. Another common mistake is failing to
    distinguish between the memory bandwidth limits of the 32 GB LPDDR5 and the internal dataflow mechanisms
    of the accelerator itself.
  napkin_math: 'We can evaluate the platform''s overall efficiency by looking at its peak specifications:
    Peak Performance = 275 TOPS (INT8), Maximum Power = 60W TDP. Theoretical Efficiency = 275 TOPS / 60
    W = ~4.58 TOPS/Watt. This high TOPS/W ratio is achieved precisely because components like the DLA
    utilize systolic arrays to maximize MAC operations per clock cycle while minimizing energy-expensive
    fetches from the 32 GB LPDDR5 memory.'
