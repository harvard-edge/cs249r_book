id: edge-0720
title: The OTA Flash Budget
topic: model-format-conversion
status: published
provenance: imported
scenario: You're an engineer on an automotive team responsible for deploying a new perception model to
  a fleet of vehicles. The target ECU has 2MB of total flash storage. When planning the over-the-air (OTA)
  update, which of the following is the most fundamental constraint to identify first?
details:
  realistic_solution: The most fundamental constraint is the available flash storage in the inactive partition.
    To ensure the vehicle can recover from a failed update, a portion of the flash (often half) is reserved
    to hold the complete new firmware image while the current one is running. If the new image is larger
    than this reserved space, the update is physically impossible regardless of network speed or permitted
    downtime.
  common_mistake: Engineers accustomed to cloud or mobile environments often focus on network bandwidth
    or installation time. They forget that for robust embedded systems, especially in automotive, A/B
    partitioning for fail-safe updates is standard. This effectively halves the flash space available
    for a new firmware image, making storage the primary bottleneck before any other consideration.
  napkin_math: 'Total Flash: 2MB. For robust A/B updates, the flash is divided into two 1MB partitions.
    Partition A runs the current model, while the new model is downloaded to Partition B. This means the
    *entire* new firmware package (model, application code, dependencies) must fit into that 1MB slot.
    If the RTOS and bootloader take up 100KB within that partition, the hard limit for your update image
    is ~900KB, which is less than half the total storage.'
