schema_version: 1
id: edge-fill-01603
title: Edge AI Data Storage Optimization on Qualcomm Cloud AI 100
topic: storage-format-selection
status: published
provenance: imported
scenario: You are tasked with designing the data pipeline for a critical real-time ML inference application
  deployed on a fleet of Qualcomm Cloud AI 100 accelerators. Each accelerator features 32 GB LPDDR4x memory
  and delivers 400 TOPS INT8 performance. The application generates and consumes a high volume of sensor
  data (e.g., video frames, radar sweeps, telemetry) that needs to be temporarily stored locally for up
  to 72 hours for fault tolerance, re-processing, and local model fine-tuning before being aggregated.
  Given the constrained memory and compute resources, evaluate the trade-offs between different storage
  formats (e.g., Parquet, TFRecord, raw binary) and compression algorithms (e.g., Zstandard, Snappy, LZ4)
  for this edge device. Your design must minimize I/O overhead, optimize memory utilization during data
  loading and processing, and ensure high throughput for both data ingestion and inference.
details:
  realistic_solution: A robust solution would involve a multi-faceted approach. For historical data archiving
    or occasional re-processing, a columnar format like Parquet, often compressed with Zstandard or Snappy,
    is beneficial due to its efficient query capabilities (predicate pushdown) and high compression ratios,
    allowing more data to fit into the 32 GB LPDDR4x. However, for immediate inference data, a custom
    binary format or TFRecord (for TensorFlow-based models) structured for rapid sequential reads and
    batched processing might be more appropriate. Leveraging features like protobuf for serialization
    within TFRecord can offer schema evolution and efficiency. Crucially, implement a strategy for selective
    feature loading, only decompressing and materializing the exact data fields required for the current
    inference step. Utilize efficient data structures that minimize memory copies. Consider memory-mapped
    files for frequently accessed datasets to reduce parsing overhead and system calls. Integrate hardware-accelerated
    decompression if available, or carefully benchmark software codecs against the device's general-purpose
    CPU cores.
  common_mistake: A common mistake is choosing a generic data format (e.g., JSON, CSV) or a sub-optimal
    compression algorithm without fully considering the specific hardware constraints and access patterns
    of an edge device. Forgetting that decompression consumes valuable CPU/DSP cycles, or loading entire
    records into memory when only specific features are needed, can lead to thrashing the 32 GB LPDDR4x
    memory and becoming compute-bound on decompression rather than inference. Neglecting the performance
    characteristics of LPDDR4x (e.g., burst access, cache lines) for data loading is another pitfall.
  napkin_math: Assume an uncompressed data rate of 100 MB/s. With 32 GB LPDDR4x, storing 72 hours (259,200
    seconds) of raw data would require 25.92 TB (100 MB/s * 259,200 s), which is impossible. If we achieve
    a 10x compression ratio, we'd need 2.59 TB. To fit within the device's storage (e.g., 256GB NAND flash,
    typical for edge), we'd need a compression ratio of at least 100x (25.92 TB / 256 GB). If average
    inference batch takes 10ms and processes 1MB of data, the effective data throughput for inference
    is 100MB/s. If decompression of the 1MB batch takes 5ms, that's 50% of the inference time, severely
    limiting throughput. We must aim for decompression to be a small fraction (e.g., <10%) of the inference
    time, or utilize parallel processing units for decompression.
