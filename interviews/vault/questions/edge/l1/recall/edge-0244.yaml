title: The INT8 Energy Dividend (edge-0244)
topic: extreme-quantization
status: published
provenance: imported
scenario: You're trying to reduce the power draw of a perception model on an autonomous vehicle's main
  compute unit. Your colleague suggests quantizing the model's weights and activations from 32-bit floating
  point (FP32) to 8-bit integer (INT8). From a pure hardware physics perspective, what is the approximate
  energy saving for a single compute operation when using INT8 versus FP32?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    This is a fundamental physical invariant driven by the energy required to switch transistors. Reducing
    the bit width from 32 to 8 dramatically lowers the switching activity, leading to substantial power
    savings, which is critical for thermally-constrained edge systems.
  common_mistake: Engineers often conflate memory savings with energy savings. They correctly recall that
    INT8 uses 4x less memory than FP32 (8 bits vs 32 bits) and incorrectly assume the energy savings are
    also 4x. The physical relationship between bit width and switching energy is non-linear.
  napkin_math: This is a direct recall from the hardware invariants. If a single FP32 operation costs
    18 picojoules, the equivalent INT8 operation costs only ~1 picojoule. On a device executing trillions
    of operations per second (TOPS), this 18x factor is the dominant source of energy savings from quantization.
