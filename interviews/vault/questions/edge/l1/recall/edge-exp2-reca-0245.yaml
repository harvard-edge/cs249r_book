schema_version: 1
id: edge-exp2-reca-0245
title: Identifying Jetson Orin Accelerator Routing
topic: load-balancing
status: published
provenance: imported
scenario: You are setting up local inference traffic management on an NVIDIA Jetson Orin to handle multiple
  camera streams. The device features an Ampere GPU and a DLA accelerator, offering a combined 275 TOPS
  INT8 performance within a 60W TDP. What specific NVIDIA software configuration feature allows you to
  explicitly route incoming inference requests to either the GPU or the DLA for load balancing?
details:
  realistic_solution: The correct factual answer is using Instance Groups in Triton Inference Server or
    DeviceType/DLACore settings in TensorRT. By defining instance groups, developers can natively implement
    weighted round-robin routing between the Jetson Orin's Ampere GPU and DLA. This allows the inference
    server to distribute requests directly to the appropriate hardware queue.
  common_mistake: Candidates often suggest using external network load balancers like HAProxy or NGINX
    for intra-device routing. They fail to recall that device-level inference servers provide native configuration
    options to target specific hardware engines without external proxies.
  napkin_math: To maximize the 275 TOPS INT8 performance under the 60W TDP, traffic must be balanced based
    on the compute ratio of the accelerators. If the Ampere GPU provides roughly 170 TOPS and the DLA
    provides 105 TOPS, the optimal weighted round-robin routing ratio is 170:105 (approximately 1.62:1).
    For an incoming load of 524 requests per second, the internal load balancer would route 324 requests
    to the GPU and 200 requests to the DLA.
