id: edge-exp2-reca-0249
title: Hailo-8 Local Memory Architecture Recall
topic: model-size-estimation
status: published
provenance: imported
scenario: Your team is evaluating a Hailo-8 accelerator (26 TOPS INT8, 2.5W) for deploying a series of
  edge vision models. Before estimating the model size constraints for the device itself, you need to
  establish the hardware baseline. What is the capacity of the onboard local DRAM on a Hailo-8 chip available
  for storing model weights and activations?
details:
  realistic_solution: The correct answer is that the Hailo-8 has zero (no) local DRAM. It uses a unique
    dataflow architecture where distributed on-chip SRAM holds intermediate compute states, and model
    weights are continuously streamed from the host system's memory over the host interface.
  common_mistake: Candidates often assume edge AI accelerators operate like mobile GPUs or TPUs with dedicated
    onboard memory (e.g., 4GB or 8GB of LPDDR4). They might guess a standard memory size instead of knowing
    the specific dataflow architecture of the chip.
  napkin_math: 'Hailo-8 Onboard DRAM = 0 GB. Host Memory Footprint = Model Parameters * 1 byte (INT8).
    For a 25 million parameter model: 25,000,000 * 1 byte = 25 MB. The entire 25 MB must reside in host
    memory because Hailo-8 local DRAM capacity is exactly 0 MB.'
