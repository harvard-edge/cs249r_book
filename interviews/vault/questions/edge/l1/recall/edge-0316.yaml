id: edge-0316
title: The Energy Cost of Precision (edge-0316)
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: Your team is optimizing a perception model for an autonomous vehicle's edge accelerator. To
  fit within a tight 30W power budget, you're considering quantizing key layers from FP16 to INT8. For
  a single arithmetic operation, roughly how much more energy does an FP16 multiply-accumulate (MAC) consume
  compared to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes approximately 5.3 times more energy than an INT8 operation.
    This is derived from the fundamental hardware constants. We know that an FP32 operation costs ~3.4x
    the energy of an FP16 operation, and ~18x the energy of an INT8 operation. By setting the FP32 energy
    as a common reference, we can find the ratio between FP16 and INT8.
  common_mistake: Engineers often assume energy savings are linearly proportional to the reduction in
    bit-width, leading them to incorrectly estimate a 2x saving (16 bits / 8 bits). This ignores the non-linear
    physics of transistor switching energy for different numeric formats. The energy cost of a multiplier,
    for example, scales quadratically with the number of bits, not linearly.
  napkin_math: 1. **Recall FP32 vs. FP16 Energy:** `Energy(FP32) ≈ 3.4 × Energy(FP16)`
