schema_version: 1
id: edge-exp2-mast-0114
title: Multi-Model Dataflow Compute and PCIe Bandwidth Estimation
topic: compute-cost-estimation
status: published
provenance: imported
scenario: 'You are designing the perception compute architecture for an autonomous drone using a single
  Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W, no local DRAM). The drone must run three concurrent
  8-bit quantized vision pipelines on a single 1080p camera stream: an object detector (40 GOPS), a depth
  estimator (15 GOPS), and a semantic segmenter (10 GOPS), all operating at 30 FPS. Because the Hailo-8
  lacks local DRAM and streams directly from host memory over a PCIe connection, you must design a unified
  dataflow pipeline that prevents host memory bottlenecks, and accurately estimate the required host bandwidth
  and overall compute utilization.'
details:
  realistic_solution: An L6+ engineer will recognize that in a pure dataflow architecture streaming from
    host memory, PCIe I/O is the limiting factor. The required solution is to co-compile the three models
    into a single unified spatial graph. By doing this, the Hailo-8 maps the combined weights to its distributed
    on-chip SRAM, meaning only the initial raw image enters the chip and only the final small output tensors
    leave it, entirely eliminating intermediate host memory streaming.
  common_mistake: Candidates typically sum the GOPS and simply verify it fits within the 26 TOPS limit,
    treating the system like a traditional GPU. They completely ignore the architectural constraint of
    'no local DRAM', failing to realize that executing three isolated models sequentially will force the
    Hailo-8 to stream massive intermediate feature maps and context swaps back and forth over the host
    PCIe bus, instantly bottlenecking the system.
  napkin_math: 'Compute per frame: 40 + 15 + 10 = 65 GOPS. Total compute at 30 FPS: 65 GOPS * 30 = 1,950
    GOPS (1.95 TOPS). Compute Utilization: 1.95 TOPS / 26 TOPS = 7.5% utilization. Fused Memory Bandwidth:
    1080p input (1920x1080x3 bytes) = 6.22 MB. Assuming combined outputs are ~1.78 MB. Total I/O per frame
    = 8.0 MB. Required Host PCIe Bandwidth: 8.0 MB/frame * 30 FPS = 240 MB/s. Power: With 7.5% utilization
    on a 2.5W TDP chip, power scales well under 1W, meaning energy cost is highly efficient at roughly
    <33 mJ per frame.'
