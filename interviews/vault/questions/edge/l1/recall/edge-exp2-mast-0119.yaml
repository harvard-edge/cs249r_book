schema_version: 1
id: edge-exp2-mast-0119
title: Bypassing PCIe Bottlenecks on Edge TPU
topic: dma-data-movement
status: published
provenance: imported
scenario: You are designing an anomaly detection system using a PCIe-based Google Coral Edge TPU (4 TOPS
  INT8, 2W, PCIe Gen2 x1). The system ingests 4 HD camera streams (1080p @ 30 FPS). The legacy pipeline
  crops 100 suspect regions (224x224 RGB) per frame on the host CPU, allocates them in standard memory,
  and queues them to the TPU individually. The TPU compute is severely underutilized, and the system drops
  frames due to host-device data transfer overhead. Design a novel end-to-end memory and data movement
  architecture to achieve real-time throughput without exceeding the Coral's hardware limits.
details:
  realistic_solution: The optimal architecture eliminates ROI cropping and small DMA transfers entirely
    by redesigning the model as a Fully Convolutional Network (FCN) taking full 1080p frames. Furthermore,
    the pipeline should configure the camera ISP to directly DMA grayscale INT8 frames into host pinned
    memory. A single contiguous DMA transfer per frame drastically reduces PCIe overhead and payload size,
    bypassing the IO bottleneck while leveraging the TPU's spatial processing efficiency.
  common_mistake: Candidates often focus solely on optimizing host CPU multi-threading or allocating pinned
    memory (e.g., mmap) for the 12,000 individual ROIs. While zero-copy host buffers reduce CPU load,
    they fail to address the fundamental PCIe Gen2 x1 bandwidth limit and high DMA setup overhead, meaning
    the thousands of small transfers will still saturate the bus long before utilizing the TPU's compute.
  napkin_math: '1) Legacy ROI approach: 100 ROIs * 4 cams * 30 FPS = 12,000 inferences/s. 224x224x3 INT8
    = 150 KB/ROI. 12,000 * 150 KB = 1.8 GB/s, drastically exceeding the Coral''s PCIe Gen2 x1 limit (~400
    MB/s practical). 2) FCN Grayscale approach: 4 cams * 30 FPS = 120 frames/s. 1920x1080x1 INT8 = 2.07
    MB/frame. 120 * 2.07 MB = 248.4 MB/s, safely within the 400 MB/s limit. 3) Compute Check: A standard
    INT8 FCN at 1080p requires ~15 GOPS. 120 frames/s * 15 GOPS = 1.8 TOPS, utilizing 45% of the Coral''s
    4 TOPS capacity and staying comfortably within the 2W power budget.'
