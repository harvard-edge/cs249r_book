id: edge-0333
title: The INT8 Energy Dividend (edge-0333)
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You're optimizing a LiDAR segmentation model for an autonomous vehicle's edge ECU. To meet the
  thermal budget, you're considering quantizing parts of the network from 16-bit floating-point (FP16)
  to 8-bit integer (INT8). For a single arithmetic operation, what is the approximate reduction in energy
  consumption when switching from FP16 to INT8?
details:
  realistic_solution: An INT8 operation consumes roughly 5-6 times less energy than an FP16 operation.
    The energy cost of a computation is related to the number of transistors switching, which does not
    scale linearly with bit width. According to the standard invariant numbers, an FP32 operation is ~3.4×
    more costly than FP16, and ~18× more costly than INT8. This implies an FP16 operation is about 18
    / 3.4 ≈ 5.3 times more energy-intensive than an INT8 operation.
  common_mistake: Engineers often assume the energy saving is linear with the reduction in bit-width (i.e.,
    halving the bits halves the energy, giving a 2× saving). Others might recall the more dramatic FP32-to-INT8
    ratio (~18x) and misapply it. The actual saving is substantial but not linear, as it relates to the
    physics of the underlying multiplier and adder circuits.
  napkin_math: Energy(FP16) / Energy(INT8) ≈ (Energy(FP32) / 3.4) / (Energy(FP32) / 18) = 18 / 3.4 ≈ 5.3×.
    Therefore, you get an approximate 5x energy saving per operation.
