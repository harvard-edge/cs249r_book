id: edge-0137
title: The Thermal Handcuffs
topic: energy-per-operation
status: published
provenance: imported
scenario: You are selecting an edge accelerator for a drone with a strict 15W thermal budget. Your vendor
  provides a datasheet stating the chip's efficiency is 4.6 TOPS/W. What is the *maximum sustained performance*
  you can realistically expect from this chip under that thermal constraint?
details:
  realistic_solution: The TOPS/W metric directly tells you the operational performance you get for a given
    power input. Under a 15W thermal budget, the chip's compute performance is limited by that budget.
    Therefore, the maximum sustained performance is the efficiency multiplied by the power budget.
  common_mistake: Engineers often confuse a chip's headline peak performance (which is often thermally
    unconstrained) with its *sustained* performance, which is dictated by the system's power and thermal
    limits. Another mistake is to misuse the TOPS/W metric, not realizing it's a simple multiplier.
  napkin_math: 'Sustained TOPS = Efficiency (TOPS/W) * Thermal Budget (W). Given an efficiency of 4.6
    TOPS/W and a strict thermal budget of 15W, the maximum sustained performance is: 4.6 * 15 = 69 TOPS.
    Operating above this compute throughput would exceed the 15W heat dissipation limit.'
