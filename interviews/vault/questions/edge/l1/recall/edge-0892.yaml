id: edge-0892
title: Zero-Connectivity Autonomous Rollback
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You deploy a new obstacle avoidance model to deep-sea Autonomous Underwater Vehicles (AUVs).
  Missions last 4 hours. The only communication is an acoustic modem at 100 bps. If the new model hallucinates
  obstacles, the AUV halts and aborts the mission. Remote debugging or rollback during the mission is
  impossible due to the bandwidth. How do you design the reliability layer?
details:
  realistic_solution: Design an autonomous on-device watchdog and dual-bank model storage. The edge device
    stores both Model V1 (known-good) and Model V2 (new) in flash memory. A deterministic supervisory
    control loop monitors the ML system's outputs. If the watchdog detects anomalous ML behavior—defined
    by domain-specific heuristics, such as >5 erratic stops within 10 minutes or consecutive bounding
    box outputs with extremely low confidence—it triggers a local incident response. The system automatically
    shifts the model pointer back to V1 and restarts the inference service. This trades storage space
    (holding two models) for absolute fault tolerance in disconnected environments.
  common_mistake: Attempting to push a rollback command or binary patch via the acoustic modem when failures
    are detected.
  napkin_math: 'Acoustic modem bandwidth: 100 bits per second = 12.5 Bytes/sec. Model size = 50MB. Time
    to transmit rollback model = 50,000,000 / 12.5 = 4,000,000 seconds (~46 days). Remote rollback is
    mathematically impossible during a 4-hour mission. Dual storage requires 100MB flash, costing pennies
    but saving a $500,000 AUV.'
