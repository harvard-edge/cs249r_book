title: 'Edge Queueing Theory Mastery: End-to-End Edge Inference System Design'
topic: queueing-theory
status: published
provenance: imported
scenario: 'Design a complete edge inference system for a hospital corridor safety monitor: 8 cameras,
  30 FPS, detect falls and unusual events with P99 < 200ms, 24/7 uptime, 100W power budget. Hardware options:
  Jetson Orin (275 TOPS INT8, 60W), Hailo-8 (26 TOPS INT8, 2.5W). Model: YOLO-pose 3B GOPS INT8. Use queueing
  theory to size, justify, and verify the design.'
details:
  realistic_solution: 2 cameras at 30 FPS each = 60 FPS total arrival rate per chip. ρ = 60/8667 = 0.00692
    — very low utilization.
  common_mistake: Not verifying that the design meets ALL three constraints simultaneously (latency, uptime,
    power) and not quantifying the tradeoffs of adding redundancy for uptime.
  napkin_math: '2 cameras × 30 FPS = 60 frames/s per chip. Service rate μ = inference_rate. ρ = 60/μ.
    For stable queue: ρ < 1 requires μ > 60 FPS. At μ=8667 FPS: ρ = 60/8667 = 0.00692. Queue is very lightly
    loaded.'
