id: edge-0268
title: Identifying Arithmetic Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: You are designing a perception system for an autonomous vehicle using a Jetson AGX Orin. When
  analyzing your CNN's performance with a roofline plot, you need to characterize the workload itself.
  What is the standard term for the ratio of compute operations to bytes of data moved from memory, which
  is the primary determinant of whether a workload is compute-bound or memory-bound?
details:
  realistic_solution: The correct term is **Arithmetic Intensity**. It is the ratio of total operations
    (e.g., INT8 OPs or FP16 FLOPs) to total bytes moved from memory. A high Arithmetic Intensity means
    the model performs many calculations for each byte it fetches, making it likely to be limited by the
    processor's peak compute (compute-bound). A low Arithmetic Intensity means the model is constantly
    fetching data and will be limited by memory bandwidth (memory-bound).
  common_mistake: Engineers often confuse Arithmetic Intensity (an intrinsic property of the workload)
    with related but distinct metrics. They might incorrectly choose TOPS/W, which measures power efficiency,
    or throughput, which is a system's output rate. The key is to recognize that Arithmetic Intensity
    is about the work itself, not its power cost or final speed.
  napkin_math: Arithmetic Intensity (AI) = Total Operations / Total Bytes Transferred. For example, if
    a layer requires 50 Giga-Ops of compute and reads/writes 100 MB of data, AI = 50e9 / 100e6 = 500 Ops/Byte.
    The Jetson AGX Orin has a ridge point of 275 TOPS / 204.8 GB/s = 1342 Ops/Byte. Since 500 < 1342,
    this workload's AI is too low to saturate the compute units; it is memory-bound.
