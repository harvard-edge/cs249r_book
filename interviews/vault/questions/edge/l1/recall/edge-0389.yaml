title: The Federated Fleet Cost Equation
topic: federated-learning
status: published
provenance: imported
scenario: 'An automotive company is updating the perception models on a fleet of 10,000 vehicles. They
  are considering two strategies: (1) uploading all raw camera data to the cloud for central retraining,
  or (2) using Federated Learning to train on-device and only upload model gradients. From a Total Cost
  of Ownership (TCO) perspective, what is the single biggest economic advantage of the Federated Learning
  approach in this scenario?'
details:
  realistic_solution: The primary economic advantage is the massive reduction in data transmission costs.
    Raw sensor data from a single car can be gigabytes per hour, while a model update (gradient) is typically
    megabytes. When multiplied across a 10,000-vehicle fleet, the cost of uploading raw data over cellular
    networks becomes prohibitively expensive, whereas uploading small gradients is orders of magnitude
    cheaper.
  common_mistake: Engineers often underestimate the massive, recurring cost of data transmission over
    cellular networks for a large fleet. They might focus on on-device compute cost or cloud storage,
    but for a large-scale edge deployment, the cost of data in motion (egress) from thousands of devices
    almost always dominates the entire TCO calculation.
  napkin_math: 'Centralized: 10,000 vehicles * 100 GB/day = 1,000,000 GB (1 Petabyte) of cellular egress
    daily. At $0.05/GB, this costs $50,000/day ($18M/year). Federated Learning: 10,000 vehicles * 100
    MB/day = 1,000 GB (1 TB) of egress daily. Cost = $50/day ($18k/year). Federated learning achieves
    a 1000x reduction in bandwidth, saving tens of millions in cellular data costs annually.'
