id: edge-0183
title: The Quantization Energy Dividend
topic: extreme-quantization
status: published
provenance: imported
scenario: An automotive engineer is optimizing a neural network for a forward-facing camera on a new EV.
  The model must run continuously without impacting the vehicle's range. To reduce power consumption,
  they are considering quantizing the model from 32-bit floating point (FP32) to 8-bit integer (INT8).
  What is the approximate energy saving for a single compute operation when switching from FP32 to INT8?
details:
  realistic_solution: The energy required for a computation is a function of the number of transistors
    switching, and multiplication complexity scales more than linearly with bit width. An FP32 operation
    involves significantly more complex circuitry (for exponent and mantissa) than a simple INT8 multiplication.
    The established ratio for the energy cost of an FP32 operation versus an INT8 operation is approximately
    18-to-1.
  common_mistake: Engineers often assume energy savings are linear with the reduction in bit-width (e.g.,
    32 bits / 8 bits = 4× savings). This ignores the physics of digital logic, where the energy cost of
    multiplication scales quadratically with bit width, leading to a much larger-than-expected dividend.
  napkin_math: Based on the physical invariants, the ratio of energy consumption between FP32 and INT8
    compute is **~18×**. If an FP32 operation costs 18 units of energy, an INT8 operation costs only 1
    unit.
