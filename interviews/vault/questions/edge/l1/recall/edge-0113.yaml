id: edge-0113
title: The INT8 Energy Dividend
topic: extreme-quantization
status: draft
provenance: imported
scenario: You're optimizing a computer vision model for a battery-powered drone. To maximize flight time,
  you're quantizing the model's weights and activations from 32-bit floating point (FP32) to 8-bit integer
  (INT8). From a pure hardware physics perspective, what is the approximate energy savings per operation
  you should expect by performing a computation in INT8 versus FP32?
details:
  realistic_solution: The energy saving is approximately 18.5x. The energy consumed by a digital operation
    is directly proportional to the number of transistors switching. An 8-bit integer multiplication involves
    significantly fewer switching events than a 32-bit floating-point multiplication, which has a more
    complex circuit to handle a mantissa and an exponent. This physical difference is the source of the
    dramatic energy reduction.
  common_mistake: Engineers often underestimate the savings, guessing a small factor like 2-4x. This typically
    happens by confusing the energy savings of INT8 with the much smaller savings of FP16, or by failing
    to appreciate how bit width directly impacts the physical energy cost of a computation at the circuit
    level.
  napkin_math: If a single FP32 MAC (Multiply-Accumulate) operation costs ~3.7 picojoules (pJ) of energy,
    the equivalent INT8 MAC would only cost ~0.2 pJ.
