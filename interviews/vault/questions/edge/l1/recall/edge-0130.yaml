schema_version: 1
id: edge-0130
title: The CPU-Free Camera Ingest
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're building a real-time perception system for a drone with a 33ms end-to-end latency budget
  per frame. A camera streams high-resolution images that must be processed by the GPU. To meet the tight
  deadline, the CPU must remain available for flight control calculations while the camera frame is being
  transferred into memory. State the critical hardware feature that enables the camera to write an image
  into system DRAM for the GPU to read, all without involving the CPU in the data copying process.
details:
  realistic_solution: The mechanism is Direct Memory Access (DMA). A DMA controller allows the camera's
    hardware interface (e.g., its Image Signal Processor) to gain control of the memory bus and write
    frame data directly into a pre-allocated buffer in system DRAM. Once the data is there, the GPU can
    also use its own DMA engine to read it. The CPU is only needed to set up the DMA transfer initially
    and then receives an interrupt upon completion, leaving it free to perform other critical tasks during
    the multi-megabyte data transfer.
  common_mistake: A common misconception is that the CPU must always act as a data mover, executing a
    `memcpy` to shuttle data from peripheral buffers to the main memory accessible by the GPU. This would
    consume thousands of CPU cycles, violating the premise of keeping the CPU free for other tasks.
  napkin_math: A 12 MP camera frame (e.g., 4000x3000) with 12-bit RAW data (1.5 bytes/pixel) is `4000
    * 3000 * 1.5 ≈ 18 MB`. A CPU `memcpy` on an edge device might achieve 5 GB/s. The copy would take
    `18 MB / 5 GB/s ≈ 3.6 ms`. This would consume over 10% of the 33ms frame budget in a CPU-blocking
    operation. DMA performs this transfer with zero CPU usage during the copy.
