title: The Federated Fleet's Data Bill
topic: federated-learning
status: published
provenance: imported
scenario: You are the systems architect for a fleet of 100,000 autonomous delivery robots. The primary
  operational cost at scale is the cellular data transmission for sending data back to the cloud. To continuously
  improve your perception models, you must gather data from the fleet. Which of the following daily data
  collection strategies results in the highest data cost?
details:
  realistic_solution: Uploading 500MB of raw camera images per robot daily results in the highest cost.
    At fleet scale, the total data volume (50 TB/day) dominates all other options, directly translating
    to the highest operational expenditure for cellular data. This massive cost is a primary economic
    driver for adopting communication-efficient techniques like Federated Learning, which reduces the
    data footprint by 50x in this scenario.
  common_mistake: Engineers often underestimate the sheer volume of raw sensor data compared to the distilled
    information in model gradients or logs. They might incorrectly assume that 'model stuff' (gradients)
    is always the heaviest data load, forgetting that a continuous stream of high-resolution images represents
    orders of magnitude more data over time.
