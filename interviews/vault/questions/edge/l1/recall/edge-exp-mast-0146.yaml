schema_version: 1
id: edge-exp-mast-0146
title: On-Device Coreset Selection for Edge Continual Learning
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are designing an on-premise continual learning pipeline for an autonomous visual inspection
  system powered by a single Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system processes
  60 frames per second of high-resolution video and must identify rare edge-case defects. Due to uplink
  bandwidth and privacy constraints, only a tiny fraction of frames can be sent to a central server for
  labeling and fine-tuning. Design an active data selection and coreset generation architecture running
  concurrently on the AI 100 to maximize the Information-Compute Ratio (ICR) of the transmitted data.
details:
  realistic_solution: Implement a dual-process architecture where the main defect detection model (quantized
    to INT8) runs continuously, while a lightweight embedding head extracts feature vectors for each frame.
    Maintain a dynamic, memory-bounded coreset buffer on the device. Use a streaming diversity-aware sampling
    algorithm (e.g., core-set via k-center greedy) operating on these embeddings to select highly informative,
    temporally distinct frames, ensuring maximal data diversity for the central curriculum learning pipeline.
  common_mistake: Candidates often suggest simply saving all frames with low confidence scores, which
    ignores the highly correlated nature of sequential video frames and leads to transmitting redundant
    data. They also frequently fail to account for the memory overhead of running complex acquisition
    functions alongside the primary inference workload within the strict 32GB limit.
  napkin_math: 'Input: 60 FPS, yielding 60 * 3600 * 24 ≈ 5.18M frames per day. A typical INT8 vision model
    requires ~10 GOPS per frame, so 60 FPS consumes 600 GOPS, leaving >399 TOPS available on the 400 TOPS
    INT8 engine. The primary bottleneck is the 32 GB LPDDR4x memory. If we allocate 4 GB for model weights
    and OS, 28 GB remains. If a raw image crop is 2MB, the maximum buffer holds 14,000 frames. To prune
    5.18M daily frames to 14,000 (a 99.7% reduction), we can store lightweight 512-dim INT8 embeddings
    for every daily frame (5.18M * 512 bytes ≈ 2.65 GB), easily fitting in RAM. This allows the idle TOPS
    to run continuous clustering on the 2.65 GB embedding pool within the 75W envelope to dynamically
    update the optimal 14,000-frame coreset.'
