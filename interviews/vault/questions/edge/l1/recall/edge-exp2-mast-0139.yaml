id: edge-exp2-mast-0139
title: Optimal LLM Operator Scheduling on Qualcomm Cloud AI 100
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a 15-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 accelerator
  for high-throughput on-premise inference. The platform provides 32 GB of LPDDR4x memory and delivers
  an impressive 400 TOPS of INT8 compute within a strict 75W power envelope. You must design a novel operator
  scheduling architecture and layer fusion strategy that intelligently overlaps memory-bound attention
  mechanisms with compute-bound dense layers to avoid stalling on the LPDDR4x bandwidth.
details:
  realistic_solution: Design a dynamically interleaved execution schedule that employs aggressive horizontal
    fusion for QKV projections and temporal pipelining across multiple request streams. The schedule pins
    the 15 GB of INT8 weights in memory and maximizes weight reuse by batching. By explicitly scheduling
    compute-heavy matrix multiplications concurrently with memory-bound KV-cache fetches and softmax reductions
    from different requests, the system can mask the memory latency and keep the INT8 compute engines
    saturated.
  common_mistake: Candidates often default to standard sequential execution or propose basic vertical
    layer fusion without accounting for the arithmetic intensity required by the hardware. They fail to
    design a schedule that actively overlaps memory-bound operations with compute-bound operations, leading
    to severe underutilization of the 400 TOPS capability due to LPDDR4x bandwidth starvation.
  napkin_math: A 15B parameter model in INT8 consumes 15 GB of the 32 GB LPDDR4x, leaving 17 GB for activations
    and KV-cache. LPDDR4x typically provides around 68 GB/s of memory bandwidth. To saturate 400 TOPS
    (200 Tera-MACs/second), the scheduled arithmetic intensity must be (200,000 G-MACs/s) / (68 GB/s)
    ≈ 2941 MACs per byte transferred. If a single token's KV-cache requires 256 KB, the 17 GB remaining
    memory supports a maximum of ~66,400 tokens in flight. To hit the required arithmetic intensity of
    ~2941 during the decode phase, the operator schedule must orchestrate a dynamic batch size approaching
    3000 concurrent requests to fully amortize the weight loading costs over the 68 GB/s bus.
