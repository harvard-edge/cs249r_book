schema_version: 1
id: edge-fill-01110
title: Edge Inference Load Balancing with Coral Edge TPUs
topic: load-balancing
status: published
provenance: imported
scenario: Your team is deploying a real-time smart city surveillance system that uses thousands of networked
  camera units. Each unit is equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W power consumption,
  INT8 only inference) for on-device object detection. Video streams are broken into individual frames,
  which are then routed for inference. Design a robust and efficient request routing and load balancing
  strategy for distributing these inference tasks across the fleet of Coral Edge TPUs, considering variable
  network conditions, potential device failures, and the specific hardware constraints (4 TOPS INT8 performance,
  2W power envelope, INT8 only model compatibility).
details:
  realistic_solution: A realistic solution would involve a multi-layered approach. At a high level, consistent
    hashing can be used to route requests to logical groups of nearby Edge TPUs, minimizing network latency.
    Within each group, a weighted round-robin or least-outstanding-requests policy, informed by real-time
    telemetry from each Coral TPU (e.g., current inference queue depth, power draw, temperature, and device
    health), would distribute frames. This telemetry allows dynamic adjustment of weights. An admission
    controller or back-pressure mechanism per device could prevent overload. For INT8, ensure all models
    are pre-quantized offline, and a versioning system manages model updates to avoid compatibility issues.
  common_mistake: A common mistake is to implement a simple round-robin or least-connections load balancing
    without considering the heterogeneous nature of network latency to edge devices, the varying inference
    times for different frames/models, or the power/thermal constraints of the Coral TPUs which can lead
    to throttling and unpredictable latency. Another pitfall is neglecting the INT8-only requirement,
    potentially causing issues with model deployment or requiring costly on-the-fly quantization.
  napkin_math: Consider a target QPS of 10,000 inference requests per second across the system. If each
    Coral Edge TPU can process a MobileNet-SSD v2 inference in, say, 20ms (50 FPS, implying roughly 80
    GOPS for a typical detection model, which fits within 4 TOPS INT8 assuming efficiency), you'd need
    approximately 10,000 / 50 = 200 Coral Edge TPUs operating at peak. However, this doesn't account for
    network overhead, retransmissions, or varying model complexities. Each TPU consumes 2W, so 200 TPUs
    would draw 400W. If models are larger or more complex, or network conditions are poor, the effective
    FPS per TPU drops, increasing the required number of devices significantly. For example, if effective
    FPS drops to 20 FPS, you'd need 10,000 / 20 = 500 TPUs.
