id: edge-0166
title: 'The Energy Cost of Precision: Quantization Fundamentals'
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You are optimizing a model for a battery-powered drone. To reduce power consumption, you are
  considering quantizing a key convolution layer from FP16 to INT8. Recall the approximate energy savings
  *for the arithmetic operations alone* when switching from one FP16 MAC (fused multiply-add) to one INT8
  MAC.
details:
  realistic_solution: An FP16 arithmetic operation consumes approximately 5x more energy than an INT8
    operation. This is a fundamental physical relationship based on the energy required to switch transistors
    for floating-point versus integer calculations at these bit widths. On a device where every milliwatt
    matters for flight time, this 5x reduction in compute energy is a critical optimization.
  common_mistake: Engineers often confuse the memory savings (2x) with the energy savings. While reducing
    bit width from 16 to 8 halves the data size, the energy reduction for the computation itself is non-linear
    and much greater. Another common mistake is recalling the FP32-to-INT8 energy ratio (~18x) instead
    of the more common FP16-to-INT8 path on modern edge accelerators.
  napkin_math: 'The energy savings are derived from the physics-based invariants. An FP32 operation costs
    ~18x the energy of an INT8 op. An FP32 operation costs ~3.4x the energy of an FP16 op. Therefore,
    the relative cost of FP16 to INT8 is the ratio of these two numbers: `18 / 3.4 ≈ 5.3x`. For a quick,
    memorable estimate, a 5x energy saving for compute is a reliable rule of thumb.'
