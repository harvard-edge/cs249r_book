id: edge-0141
title: Defining the Tensor Arena
topic: tensor-arena-planning
status: published
provenance: imported
scenario: When deploying a model to a microcontroller with only a few hundred kilobytes of SRAM, the TensorFlow
  Lite Micro runtime requires you to pre-allocate a 'Tensor Arena'. What is the primary purpose of this
  memory region?
details:
  realistic_solution: The Tensor Arena is a single, large, statically pre-allocated block of memory in
    SRAM. The TFLite Micro interpreter uses this arena for all temporary tensors created during inference,
    including the model's inputs, outputs, and intermediate activation layers. This avoids the overhead,
    non-determinism, and potential for memory fragmentation associated with dynamic memory allocation,
    which is critical for reliability on a microcontroller.
  common_mistake: 'Many engineers incorrectly assume the Tensor Arena holds the model''s weights (which
    are usually kept in read-only flash memory) or that it''s a dynamic memory pool. Its core purpose
    is the exact opposite: to *prevent* dynamic memory allocation (`malloc`) in a resource-constrained,
    real-time environment.'
  napkin_math: On a device with 256KB of SRAM, the OS and runtime might consume 150KB. This leaves only
    106KB for the model. If you load the 50KB of weights into SRAM, you only have 56KB left for the Tensor
    Arena. If the largest simultaneous activation footprint is 60KB (e.g., the output of layer N and input
    to layer N+1), inference will fail. This forces strict memory accounting.
