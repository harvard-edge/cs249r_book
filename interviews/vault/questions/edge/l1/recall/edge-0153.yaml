id: edge-0153
title: The Kernel Launch Tax
topic: kernel-fusion
status: published
provenance: imported
scenario: An engineer is optimizing a vision model for a 33ms real-time deadline on an edge device. They
  use a compiler to fuse a `Conv2D` layer, a `BatchNorm` layer, and a `ReLU` activation into a single
  GPU kernel. What is the primary overhead that this operator fusion reduces?
details:
  realistic_solution: The primary overhead reduced is kernel launch latency and intermediate memory I/O.
    Each time the CPU asks the GPU to run a kernel, there's a fixed overhead cost (typically several microseconds).
    Furthermore, the output of each separate operation (e.g., `Conv2D`) must be written to main memory
    (LPDDR5) and then read back by the next kernel (`BatchNorm`). A fused kernel is launched only once,
    and the intermediate data can often stay within the GPU's much faster on-chip SRAM/caches, avoiding
    the slow round-trip to main memory.
  common_mistake: Engineers often mistakenly believe that fusion reduces the total number of computations
    (FLOPs). The number of arithmetic operations is identical. The performance gain comes from eliminating
    the overhead associated with launching separate, sequential operations and the memory traffic between
    them.
  napkin_math: A kernel launch on an edge GPU can take ~5 µs. Accessing the Jetson AGX Orin's LPDDR5 memory
    takes ~100 ns. Therefore, the overhead of launching just one kernel is equivalent in latency to 5000
    ns / 100 ns = 50 separate memory accesses. By fusing three kernels into one, you save two launches.
    This saves 10 µs of pure overhead, which is the latency equivalent of avoiding 100 slow trips to main
    memory.
