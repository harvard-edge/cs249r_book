schema_version: 1
id: edge-exp-reca-0022
title: Edge TPU Precision Requirements for Bias Evaluation
topic: fairness-evaluation
status: published
provenance: imported
scenario: We are deploying a demographic-aware access control model on a Google Coral Edge TPU, which
  operates within a 2W power budget. To validate intersectional fairness and demographic parity before
  deployment, we must evaluate the exact model representation that will run on the device. What is the
  mandatory numerical precision required for the Google Coral Edge TPU's limited operator support, and
  what is its theoretical peak performance per watt?
details:
  realistic_solution: The candidate must recall that the Google Coral Edge TPU strictly requires models
    to be quantized to INT8 precision due to its limited operator support. This is critical for fairness
    evaluation because mapping continuous floating-point weights to INT8 can shift decision boundaries,
    potentially worsening demographic parity for underrepresented subgroups.
  common_mistake: Candidates often incorrectly recall the precision as FP16 or FP32, assuming edge devices
    support native floating-point operations. They may also miss that fairness evaluation metrics like
    equalized odds must be calculated post-quantization.
  napkin_math: Peak performance = 4 TOPS. Power consumption = 2W. Efficiency = 4 TOPS / 2W = 2 TOPS/Watt.
    This calculation demonstrates the hardware's efficiency, which is strictly dependent on the INT8 quantization
    requirement.
