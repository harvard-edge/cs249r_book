schema_version: 1
id: edge-0035
title: The Preemption Priority Inversion
topic: latency-decomposition
status: published
provenance: imported
scenario: Your edge robot runs on a Real-Time Operating System (RTOS). You have a High-Priority ML Thread
  (inference), a Medium-Priority UI Thread (screen updates), and a Low-Priority I/O Thread (writing logs
  to SD card). The ML Thread occasionally stalls for hundreds of milliseconds. You discover the ML Thread
  is waiting for a Mutex held by the Low-Priority I/O Thread. Why didn't the High-Priority ML Thread just
  preempt the Low-Priority thread?
details:
  realistic_solution: You have caused a classic **Priority Inversion**. High priority deadline = 10ms.
    Low priority Mutex hold time = 1ms. Medium priority execution = 500ms. Without Priority Inheritance,
    your 10ms deadline is blown out by 500ms of unrelated UI rendering.
  common_mistake: '"The RTOS scheduler is broken." The scheduler is doing exactly what it is designed
    to do; the architectural design of the locks is flawed.'
  napkin_math: High priority deadline = 10ms. Low priority Mutex hold time = 1ms. Medium priority execution
    = 500ms. Without Priority Inheritance, your 10ms deadline is blown out by 500ms of unrelated UI rendering.
