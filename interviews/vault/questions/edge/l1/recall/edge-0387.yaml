title: The Quantization Energy Tax
topic: extreme-quantization
status: published
provenance: imported
scenario: You're profiling a perception model on a power-constrained automotive ECU. To reduce energy
  consumption, you're considering quantizing a key convolution layer from 32-bit floating-point (FP32)
  to 8-bit integer (INT8) arithmetic. From a hardware physics perspective, state the approximate energy
  cost of a single FP32 MAC (Multiply-Accumulate) operation compared to a single INT8 MAC.
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    The energy consumed by a digital circuit is proportional to the switching activity of its transistors.
    Floating-point arithmetic is far more complex than integer arithmetic, requiring significantly more
    logic and therefore more energy per operation. This ~18x factor is a fundamental physical invariant
    based on circuit design.
  common_mistake: Engineers often underestimate the energy savings, assuming it's a small, linear factor
    like 2-4x. They anchor on the data type size reduction (4 bytes for FP32 vs 1 byte for INT8) and assume
    a similar energy reduction. This ignores the vast difference in silicon complexity between a floating-point
    unit (with exponent/mantissa logic) and a much simpler integer ALU.
  napkin_math: This is a direct recall of a fundamental hardware constant. From the reference table 'The
    Invariants', the established ratio for `FP32 vs INT8 energy` is **~18×**. An FP32 operation is ~18x
    more expensive in terms of energy than an INT8 operation.
