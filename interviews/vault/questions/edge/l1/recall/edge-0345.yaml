id: edge-0345
title: The Transformer's Quadratic Curse on Edge
topic: attention-scaling
status: published
provenance: imported
scenario: Your autonomous vehicle team is choosing a perception model to run on an edge device like a
  Jetson AGX Orin. You are comparing a classic CNN (like MobileNet) against a modern Vision Transformer
  (ViT). For a fixed input image size, which operation is the primary compute bottleneck in the ViT, and
  how does its computational cost scale as you increase the number of input image patches (i.e., increase
  image resolution)?
details:
  realistic_solution: The primary compute bottleneck in a Vision Transformer is the self-attention mechanism.
    Its computational complexity scales quadratically with the number of patches, which is proportional
    to the input image's area. This is because every patch must attend to every other patch, leading to
    a complexity of O(N^2), where N is the number of patches.
  common_mistake: Engineers often mistakenly believe that if a CNN and a ViT have a similar parameter
    count, their inference latency will be comparable. They forget that the architectural operations themselves
    have different computational complexity. They apply the linear scaling of convolutions to the self-attention
    mechanism, underestimating its cost at higher resolutions.
  napkin_math: 'If a 128x128 image is broken into N patches, a 256x256 image (4x the area) will be broken
    into 4N patches. A CNN''s FLOPs might scale roughly linearly (4x), but the ViT''s self-attention FLOPs
    will scale quadratically: (4N)^2 / N^2 = 16x. This quadratic scaling makes high-resolution ViTs very
    expensive for real-time edge applications.'
