id: edge-0115
title: The 30 FPS Deadline
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You are designing the perception system for an autonomous vehicle. The system must process camera
  frames at a rate of 30 frames per second (FPS) to meet its real-time safety requirements. What is the
  maximum permissible, or 'worst-case execution time', for the entire ML pipeline to process a single
  frame?
details:
  realistic_solution: The maximum permissible latency is approximately 33.3 milliseconds. This is the
    time budget for the entire end-to-end pipeline, from sensor data acquisition to the final output tensor.
    If the pipeline takes longer than this on any single frame, the system misses its deadline, which
    is unacceptable in a safety-critical application.
  common_mistake: Engineers often confuse the frame rate number (30) with the latency budget (30ms). Another
    common mistake is to think about average-case latency, while for hard real-time systems like this,
    the absolute worst-case execution time (WCET) must stay under the deadline to prevent catastrophic
    failure.
  napkin_math: 'The calculation is a direct conversion from frames per second to milliseconds per frame:'
