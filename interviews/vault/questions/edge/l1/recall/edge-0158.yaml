id: edge-0158
title: The Communication Tax of Federated Learning
topic: federated-learning
status: published
provenance: imported
scenario: You are planning the infrastructure for a federated learning system that will deploy to one
  million edge devices. Each device will periodically send a 20 MB model update to your central servers
  for aggregation. From an operational cost perspective, what factor do you need to identify as the primary
  driver of your budget?
details:
  realistic_solution: The primary operational cost driver is the network bandwidth required to upload
    the 20 MB model updates from one million devices. At this scale, the total data transfer is massive
    and directly translates to high cloud provider bills for data ingress and transfer.
  common_mistake: Engineers often focus on the compute cost of the central server that aggregates the
    models. While this requires compute, the process is usually a simple, fast operation (like averaging
    weights). The true cost comes from the sheer volume of data being ingested from the fleet, which dwarfs
    the aggregation compute cost.
  napkin_math: Total data per update cycle = 1,000,000 devices × 20 MB/device = 20,000,000 MB = 20 TB.
    At a conservative cloud data ingress price of ~0.02/GB, a single learning cycle costs 20 TB × 1024
    GB/TB × 0.02/GB = ~$409. This cost is incurred for every single training round, making it the dominant
    recurring operational expenditure.
