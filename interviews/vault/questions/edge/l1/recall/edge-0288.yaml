id: edge-0288
title: The FP16 vs. INT8 Energy Tax
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are optimizing a perception model on an automotive-grade edge device. To reduce power consumption,
  you quantize the model's compute-bound layers from FP16 to INT8 precision. Roughly how much more energy
  does a single FP16 MAC (Multiply-Accumulate) operation consume compared to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes roughly 5 times more energy than an INT8 operation. The
    physical constants show that FP32 math uses ~3.4x the energy of FP16, and ~18x the energy of INT8.
    The relative factor is the ratio of these two numbers, which is approximately 5.3x.
  common_mistake: Engineers often conflate memory savings with energy savings. They know INT8 uses half
    the memory of FP16 (1 byte vs. 2 bytes) and incorrectly assume the energy savings are also 2×. This
    forgets that operational energy scales with the complexity of the underlying digital logic (e.g.,
    multiplier size), not just the data storage size.
  napkin_math: This is a ratio derived from the 'Invariants' table.
