id: edge-fill-00738
title: 'Coral Edge TPU Feasibility for MobileNetV3-Small: Memory and Performance Estimation'
topic: model-size-estimation
status: published
provenance: imported
scenario: Your team is developing an embedded vision system for real-time anomaly detection on a manufacturing
  line. The target hardware for deployment is the Google Coral Edge TPU, known for its low power consumption
  (2W) and dedicated INT8 inference at 4 TOPS. You have an existing PyTorch model, initially trained in
  FP32, which is a variant of MobileNetV3-Small designed for image classification, with approximately
  2.5 million parameters. The system requires an inference latency of no more than 33ms (equivalent to
  ~30 FPS) per image. Before investing significant engineering effort into quantization and deployment,
  you need to perform a feasibility study. Estimate the model's memory footprint (weights and activations)
  after INT8 quantization, and determine if the Coral Edge TPU can meet the 30 FPS performance requirement.
  What factors would you consider, and how would you approach this initial sizing and feasibility check?
details:
  realistic_solution: '1.  **Parameter & Weight Memory Estimation**: Calculate the memory required for
    INT8 weights (e.g., `param_count * 1 byte/param`).

    2.  **Activation Memory Estimation**: This is more complex. You''d typically run a dummy inference
    with a representative input size on a quantized model (or a simulated quantized model) and profile
    peak memory usage for activations. Alternatively, analytical estimation based on layer output shapes.

    3.  **TOPS Requirement Calculation**: Determine the total number of INT8 operations (e.g., MACs) the
    model performs for a single inference. Then multiply by the required FPS. For example, if a MobileNetV3-Small
    performs ~200-300 MINT8 operations, then `250M ops * 30 FPS = 7.5 TOPS`.

    4.  **Feasibility Check**: Compare calculated memory footprint against Coral''s available memory (e.g.,
    512MB RAM for system, part available for model) and required TOPS against Coral''s 4 TOPS peak.

    5.  **Tools**: Use tools like `pytorch_model_summary`, `onnx_optimizer` to get layer-wise operations
    and memory. TensorFlow Lite Converter can provide detailed insights into quantized model size and
    operations.'
  common_mistake: Overlooking the impact of activation memory or intermediate feature maps on the total
    memory footprint, especially when only considering only model weights. Another common mistake is directly
    comparing FP32 FLOPs to INT8 TOPS without considering the efficiency differences for different operations
    on the accelerator, or assuming ideal 1:1 conversion for quantization.
  napkin_math: "Assume a MobileNetV3-Small variant with 2.5 million parameters and roughly 220 MINT8 operations\
    \ per inference.\n1.  **Weight Memory (INT8)**: 2.5 million parameters * 1 byte/parameter = 2.5 MB.\n\
    2.  **Activation Memory (INT8)**: For a typical 224x224 input, peak activation memory can be ~10-15\
    \ MB. Let's assume 12 MB.\n    *   Total Estimated Memory: 2.5 MB (weights) + 12 MB (activations)\
    \ = 14.5 MB. This is well within typical embedded system RAM (e.g., 512MB).\n3.  **Required Operations\
    \ for 30 FPS**: 220 million INT8 operations/frame * 30 frames/second = 6.6 * 10^9 ops/second = 6.6\
    \ TOPS.\n4.  **Coral Capability**: The Google Coral Edge TPU provides 4 TOPS (INT8).\n5.  **Conclusion\
    \ from Napkin Math**: The model's memory footprint (14.5 MB) is likely acceptable. However, the required\
    \ computational power (6.6 TOPS) significantly exceeds the Coral's peak capability (4 TOPS), indicating\
    \ that the 30 FPS target cannot be met with this model without substantial architectural changes or\
    \ a different hardware choice. The 2W power budget is generally achievable by the Coral if the model\
    \ fits."
