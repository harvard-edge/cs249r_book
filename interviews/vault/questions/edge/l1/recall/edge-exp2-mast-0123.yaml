schema_version: 1
id: edge-exp2-mast-0123
title: On-Device Intersectional Fairness Auditing at the Edge
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are deploying a vision-based driver monitoring system on an NVIDIA Jetson Orin. The model
  must meet strict demographic parity and equalized odds constraints across 16 intersectional subgroups
  (age, gender, skin tone, eyewear) before alerting. Because raw face data cannot leave the device due
  to privacy laws, you must design a continuous, on-device fairness evaluation mechanism that audits the
  production model's error rates across these subgroups without exceeding the 60W TDP or disrupting the
  main inference pipeline.
details:
  realistic_solution: A robust solution involves deploying a heavily quantized (INT8) auxiliary attribute
    classifier specifically compiled for the Deep Learning Accelerator (DLA), completely isolating it
    from the main Ampere GPU workload. This lightweight model periodically samples frames (e.g., 1 FPS
    instead of 30 FPS) to estimate subgroup distributions and error rates. The aggregated, anonymized
    confusion matrices per subgroup are then periodically synced to the cloud to monitor equalized odds
    drift.
  common_mistake: Candidates often propose sending raw data to the cloud for batch fairness auditing,
    violating the privacy constraint. Alternatively, they might suggest running heavy attribute classifiers
    for every frame on the Orin's Ampere GPU, which steals critical compute from the primary driver monitoring
    task and blows past the 60W thermal envelope.
  napkin_math: Assuming the main model uses 200 TOPS on the GPU. The Jetson Orin has 275 TOPS total INT8
    compute. We allocate a small INT8 MobileNetV3 for attribute classification to the DLA, requiring ~0.5
    TOPS per frame. Running at 1 FPS, it uses <0.1 TOPS, easily fitting in the remaining 75 TOPS budget.
    With 32 GB LPDDR5 memory, storing running confusion matrices for 16 subgroups requires trivial memory
    (16 * 4 INT32 values = 256 bytes), leaving ample RAM for the primary pipeline.
