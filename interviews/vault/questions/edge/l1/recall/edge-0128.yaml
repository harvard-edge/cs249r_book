id: edge-0128
title: The Edge Roofline Trap
topic: accelerator-comparison
status: published
provenance: imported
scenario: You are deploying a classic convolutional neural network, which is known to be memory-bound.
  Based on their hardware specs, which device, a Jetson AGX Orin or a Hailo-8, is more likely to be bottlenecked
  by memory bandwidth rather than its compute units?
details:
  realistic_solution: The Jetson AGX Orin is more likely to be memory-bottlenecked for a typical memory-bound
    model. This can be quantified by its 'Ridge Point,' which is the Arithmetic Intensity needed to become
    compute-bound. The Jetson's high Ridge Point means a model needs to perform many FLOPs for every byte
    of data it reads to use its compute units effectively. The Hailo-8, with its extremely high-bandwidth
    on-chip SRAM, has a much lower Ridge Point, meaning it is 'easier' for a model to be compute-bound.
  common_mistake: A common mistake is to only look at peak TOPS and ignore the memory system. A device
    can have immense computational power, but if its memory can't supply data fast enough, that power
    is useless. This is the core concept of the Roofline Model.
  napkin_math: Orin Ridge Point = Peak Compute / Memory Bandwidth = 275 TOPS / 204.8 GB/s = 1342 OPS/Byte.
    A model must do 1342 operations per byte loaded to keep Orin's compute fully utilized. If a classic
    CNN has an Arithmetic Intensity of 500 OPS/Byte, it is memory-bound on Orin. Performance = AI * Bandwidth
    = 500 OPS/Byte * 204.8 GB/s = 102.4 TOPS, which is only 37% of Orin's 275 TOPS peak compute.
