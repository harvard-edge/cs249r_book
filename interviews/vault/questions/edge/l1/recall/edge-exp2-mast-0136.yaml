id: edge-exp2-mast-0136
title: LLM Inference Sizing for Cloud AI 100
topic: model-size-estimation
status: published
provenance: imported
scenario: You are designing an on-premise document summarization appliance using a single Qualcomm Cloud
  AI 100 accelerator. The hardware features 32 GB of LPDDR4x memory, 400 TOPS of INT8 compute, and a strict
  75W TDP. The product requirements dictate serving a 14B parameter LLM with a maximum context length
  of 2048 tokens and supporting 16 concurrent user requests. Design the serving architecture, detailing
  the specific quantization strategies, comprehensive memory footprint estimates, and bottlenecks to guarantee
  feasibility on this exact hardware.
details:
  realistic_solution: A viable architecture requires aggressive co-design of quantization and memory management.
    The weights must be quantized to 4-bit (e.g., AWQ/GPTQ) to drastically reduce static footprint. To
    leverage the AI 100's INT8 compute engine (400 TOPS), activations are quantized to INT8 dynamically.
    Furthermore, the KV cache must be quantized to INT8 to prevent OOM with 16 concurrent users at full
    context length.
  common_mistake: Candidates often only calculate the parameter memory footprint (e.g., assuming FP16
    takes 28GB and barely fits) while completely neglecting the dynamic memory required for the KV cache
    and intermediate activations for 16 concurrent requests, which leads to immediate out-of-memory (OOM)
    failures in production.
  napkin_math: "1. Model Weights: 14B params at 4-bit = 14B * 0.5 bytes = 7 GB. Remaining memory: 25 GB.\
    \ \n2. KV Cache sizing (FP16 baseline): Assume 40 layers, hidden size 5120. Per token = 2 (K,V) *\
    \ 40 * 5120 * 2 bytes = ~819 KB/token. \n3. Total Context: 16 requests * 2048 tokens = 32,768 tokens.\
    \ \n4. FP16 KV Cache Total: 32,768 * 819 KB = ~26.8 GB. (7GB weights + 26.8GB KV = 33.8 GB -> OOM\
    \ on 32GB). \n5. Architecture Fix: Apply INT8 KV cache quantization. New KV size = ~13.4 GB. \n6.\
    \ Final Memory: 7 GB (Weights) + 13.4 GB (KV) = 20.4 GB, leaving ~11.6 GB safely for execution buffers\
    \ and OS overhead on the 32 GB Cloud AI 100."
