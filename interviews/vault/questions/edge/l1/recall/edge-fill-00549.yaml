id: edge-fill-00549
title: Hailo-8 Edge Power Budgeting for Perception
topic: power-budgeting
status: published
provenance: imported
scenario: A self-driving car manufacturer is integrating a new perception stack onto an edge AI accelerator.
  They've selected the Hailo-8, which offers 26 TOPS (INT8) with a typical power consumption of 2.5W.
  The system budget for the entire perception module (including Hailo-8, memory, and associated control
  logic) is 5W. The perception model requires 10 TOPS for its INT8 inference operations at a target frame
  rate of 30 FPS. Describe how you would approach optimizing the power consumption of the Hailo-8 to fit
  within the 5W budget, considering its stated specs and the overall system constraints.
details:
  realistic_solution: 'A realistic solution would involve a multi-faceted approach:

    1.  **Deep Power Profiling:** Accurately measure the Hailo-8''s power consumption under actual inference
    loads and idle states using hardware power monitors. This provides a baseline and identifies power
    hogs.

    2.  **DVFS and P-state Tuning:** Leverage the Hailo-8''s Dynamic Voltage and Frequency Scaling (DVFS)
    capabilities and P-states to find the lowest possible voltage/frequency combination that still meets
    the 30 FPS performance target. This directly impacts dynamic power (P = αCV²f).

    3.  **Workload Optimization:** Ensure the inference model''s operations on the Hailo-8 are as efficient
    as possible. This includes optimizing data flow, batching strategies, and minimizing idle cycles during
    and between inferences.

    4.  **CMOS Power Equation Analysis:** Consider all components of the CMOS power equation (dynamic,
    short-circuit, and static power). While dynamic power (related to switching activity, capacitance,
    voltage, and frequency) is dominant, static leakage power becomes significant in low-power scenarios
    and might require temperature management.

    5.  **Energy-per-Inference (EPI) Optimization:** Focus on reducing the energy consumed per single
    inference. This can involve exploring model architecture changes, further quantization if feasible
    without accuracy loss, or more efficient mapping to Hailo-8''s architecture.

    6.  **System-level Power Management:** Coordinate power states with other components in the perception
    module (CPU, memory, I/O) to ensure the entire 5W budget is respected, possibly implementing power
    gating for unused components.

    7.  **Software Power Caps:** Utilize any available software power capping mechanisms on the Hailo-8
    or host system to enforce the desired power limit, albeit potentially at the cost of peak performance.'
  common_mistake: Focusing solely on peak power consumption or relying only on a single TDP figure without
    considering dynamic power management techniques like DVFS P-states or the actual energy per inference
    profile across various workloads and frequencies. Neglecting static power draw or the impact of memory
    and I/O on the total power budget.
  napkin_math: "Given Hailo-8 at 26 TOPS (INT8) for 2.5W, and the model requiring 10 TOPS for 30 FPS.\n\
    - **Naive Proportional Power (compute only):** If power scaled linearly with TOPS, 10 TOPS / 26 TOPS\
    \ * 2.5W ≈ 0.96W. However, this is an oversimplification as it ignores static power and non-linear\
    \ efficiency.\n- **Target Energy Per Inference (EPI):** If we allocate, say, 2W for the Hailo-8 out\
    \ of the 5W system budget, and we need 30 inferences per second:\n  EPI = Total Power / Inferences\
    \ per second = 2W / 30 inf/s ≈ 0.067 Joules/inference. This metric helps track efficiency improvements.\
    \ A lower EPI means less power for the same amount of work. Comparing this to the nominal EPI at 2.5W:\
    \ 2.5W / (26 TOPS / average ops per inference * 1 sec) (assuming peak TOPS can be sustained for 1\
    \ sec for 1 inference - a simplification) or more practically: if 2.5W provides X inferences/sec,\
    \ then EPI = 2.5W/X inf/s. The goal is to achieve 30 inf/s at or below 0.067 J/inf."
