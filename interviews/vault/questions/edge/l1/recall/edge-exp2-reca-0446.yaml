id: edge-exp2-reca-0446
title: Qualcomm Cloud AI 100 Physical Memory Capacity Recall
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are tasked with porting an established inference pipeline to an on-premise server powered
  by the Qualcomm Cloud AI 100, which delivers 400 TOPS INT8 within a strict 75W power envelope. The team
  is concerned about potential out-of-memory (OOM) exceptions and memory fragmentation during peak operations.
  To begin planning the memory pressure management strategy, you must first establish the exact physical
  memory constraints of the hardware. What is the total memory capacity and specific memory technology
  used on the Qualcomm Cloud AI 100?
details:
  realistic_solution: The candidate must clearly state that the Qualcomm Cloud AI 100 features exactly
    32 GB of LPDDR4x memory. Knowing this exact specification is foundational for establishing hard boundaries
    on batch sizes and sequence lengths to avoid memory fragmentation. Memory pressure management strategies
    on this hardware must be fundamentally tailored to the capacity limitations of LPDDR4x rather than
    relying on massive data center memory pools.
  common_mistake: Candidates typically default to describing the high-bandwidth memory (HBM2/HBM3) found
    on larger data center GPUs. They fail to recognize that edge inference accelerators utilize distinct
    memory architectures to remain within their thermal and power limits.
  napkin_math: Total Device Memory = 32.0 GB LPDDR4x. Assuming 2.0 GB is reserved for OS and accelerator
    driver overhead, the remaining usable memory is 30.0 GB. To prevent OOM errors and manage memory fragmentation
    during sustained 400 TOPS INT8 inference workloads, allocating a 10% safety buffer (3.0 GB) means
    the absolute maximum combined footprint for model weights and dynamic activations is strictly capped
    at 27.0 GB.
