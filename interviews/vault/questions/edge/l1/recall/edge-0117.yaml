id: edge-0117
title: Pruning for Parallelism
topic: graph-compilation
status: published
provenance: imported
scenario: You are tasked with optimizing a convolutional neural network on a NVIDIA Jetson AGX Orin, which
  has hardware-accelerated Tensor Cores. Your goal is to use pruning to reduce the model's latency. To
  achieve a real-world speedup with the TensorRT runtime, which fundamental type of pruning should you
  recall as the most effective starting point?
details:
  realistic_solution: Structured pruning is the correct approach. This method removes entire channels,
    filters, or other coarse-grained structures from the model. By doing so, it preserves the dense, regular,
    and contiguous blocks of data that are essential for high-throughput computation on parallel hardware
    like GPU Tensor Cores. TensorRT can recognize these dense structures and fuse them into highly optimized,
    high-arithmetic-intensity kernels, leading to significant latency reduction. Unstructured pruning,
    in contrast, creates sparse matrices that lead to scattered memory access and prevent the use of these
    efficient kernels.
  common_mistake: Engineers often assume that any reduction in parameters or FLOPs will directly translate
    to a proportional decrease in latency. They focus on unstructured pruning because it can remove more
    weights for a given accuracy drop, but they forget that modern parallel processors like GPUs are not
    designed for sparse, irregular computation. The random memory access patterns of unstructured sparsity
    break the very assumptions that make GPUs fast.
  napkin_math: The key is understanding the hardware's Roofline model. The Jetson AGX Orin has a Ridge
    Point of ~1,342 Ops/Byte. To achieve peak performance, your code must execute over 1,300 operations
    for every single byte of data it reads from memory.
