id: edge-0347
title: The INT8 Energy Dividend (edge-0347)
topic: extreme-quantization
status: draft
provenance: imported
scenario: You are optimizing a perception model for an autonomous vehicle's front-facing camera. To reduce
  the thermal footprint on the edge device, you are considering quantizing the model's weights and activations
  from 32-bit floating point (FP32) to 8-bit integer (INT8). For the arithmetic operations themselves,
  what is the approximate reduction in energy consumption you should expect to see?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    Therefore, you should expect an ~18× reduction in energy consumption *for the compute portion* of
    the workload. This is a fundamental ratio rooted in the physics of silicon design and is a key driver
    for quantization on power-constrained edge devices.
  common_mistake: The most common mistake is assuming that the energy savings are linear with the reduction
    in bit width (e.g., 32 bits / 8 bits = 4× savings). This ignores the fundamental circuit-level complexity.
    Floating-point units (FPUs) are vastly more complex and power-hungry than integer ALUs due to the
    need to handle exponents, mantissas, normalization, and special values. Another common error is confusing
    the INT8 savings ratio with the FP16 ratio (~3.4x).
  napkin_math: Silicon invariants show an FP32 multiply-accumulate (MAC) uses ~18x the energy of an INT8
    MAC. Additionally, fetching an FP32 value (4 bytes) from LPDDR memory takes 4x the energy of fetching
    an INT8 value (1 byte). On an edge device like Orin, quantizing to INT8 cuts compute energy by ~94%
    and memory transfer energy by 75%, drastically reducing the model's thermal footprint.
