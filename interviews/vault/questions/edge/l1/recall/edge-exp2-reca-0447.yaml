id: edge-exp2-reca-0447
title: Qualcomm Cloud AI 100 Toolchain and Specs Recall
topic: model-format-conversion
status: published
provenance: imported
scenario: Your team is evaluating the Qualcomm Cloud AI 100 for on-premise inference to replace an aging
  GPU cluster. The accelerator provides 32 GB LPDDR4x memory, 400 TOPS of INT8 compute, and operates within
  a 75W power envelope. What is the name of the primary software SDK and compiler toolchain provided by
  Qualcomm used to convert and optimize standard ONNX models for this specific hardware?
details:
  realistic_solution: The correct answer is the Qualcomm Cloud AI SDK (or Qualcomm AI Engine Direct /
    QNN). The candidate should recall that compiling for the AI 100 requires this bespoke compiler to
    successfully map standard ONNX operators to the underlying Hexagon tensor processors and manage the
    32 GB memory hierarchy.
  common_mistake: Candidates often name generic conversion tools like TensorRT or OpenVINO, which are
    specific to NVIDIA and Intel respectively. They may also confuse the server-class Cloud AI toolchain
    with the Snapdragon Neural Processing Engine (SNPE) which is primarily used for mobile edge devices.
  napkin_math: Compute efficiency = 400 TOPS / 75W = 5.33 TOPS/W. Maximum model size in INT8 without swapping
    = 32 GB (approx. 32 billion parameters). If an ONNX conversion utilizes the full 400 TOPS, a 1-teraflop
    inference operation would theoretically take 1 TOPS / 400 TOPS = 2.5 milliseconds of compute time.
