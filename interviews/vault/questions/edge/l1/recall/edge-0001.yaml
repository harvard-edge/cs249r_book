schema_version: 1
id: edge-0001
title: The Camera Data Deluge
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are designing the initial data ingestion pipeline for an autonomous delivery robot. The
  primary sensor is a single 1080p monochrome camera running at 30 frames per second. Before any processing
  or compression, you need to move the raw pixel data from the sensor to the SoC's memory. What is the
  approximate bandwidth you must provision for this single camera stream?
details:
  realistic_solution: The correct answer is ~60 MB/s. This is a fundamental calculation for any vision-based
    edge system. The ML pipeline needs to handle the full, uncompressed firehose of data coming directly
    from the sensor's image plane.
  common_mistake: Engineers often confuse the raw sensor bandwidth with the much lower bandwidth of a
    compressed video stream (like H.264). The ML pipeline, however, must process the uncompressed frames
    first. Another common error is to be off by an order of magnitude, either underestimating in the KB/s
    range (like an IMU) or overestimating in the GB/s range (like a high-speed memory bus).
  napkin_math: The calculation is a simple multiplication of the frame's dimensions, pixel depth, and
    frame rate.
