title: The Energy Cost of Data Movement
topic: federated-learning
status: published
provenance: imported
scenario: 'A colleague argues that using Federated Learning on a fleet of autonomous vehicles will be
  too energy-intensive due to the on-device computation. To ground the discussion in physics, recall the
  fundamental energy trade-off: approximately how much more energy is consumed by a single off-chip DRAM
  access compared to a single FP16 computation?'
details:
  realistic_solution: A DRAM access consumes approximately **580 times** more energy than an FP16 compute
    operation. This massive difference is a core invariant in system design. It highlights why minimizing
    data movement is critical for energy efficiency. In the case of Federated Learning, the energy saved
    by *not* uploading terabytes of raw sensor data over a cellular network far outweighs the energy spent
    on local computation of gradients.
  common_mistake: Engineers often focus on the energy cost of the compute (FLOPs) and dramatically underestimate
    the energy cost of moving data. On-chip compute is incredibly efficient, while moving data—even from
    local DRAM—requires driving long, capacitive wires and is orders of magnitude more expensive. This
    is the physical principle that makes architectures favoring data locality (like Federated Learning)
    energy-efficient.
  napkin_math: A single off-chip DRAM access consumes approximately 580 times more energy than an FP16
    compute operation. If an FP16 MAC takes ~1 pJ, fetching the operands from DRAM takes >500 pJ. Federated
    learning avoids transmitting gigabytes of raw data, replacing communication costs with much cheaper
    local compute.
