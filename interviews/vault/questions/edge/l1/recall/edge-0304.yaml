id: edge-0304
title: The Vision Transformer's Quadratic Burden
topic: attention-scaling
status: published
provenance: imported
scenario: You're designing a real-time object detection system for an autonomous vehicle's edge computer,
  like a Jetson AGX Orin. You're comparing a small Vision Transformer (ViT) against a classic CNN like
  MobileNet. For a fixed input image size, what is the fundamental scaling reason that the ViT's self-attention
  layers are often computationally prohibitive on such devices?
details:
  realistic_solution: The computational complexity of standard self-attention is quadratic, O(N²), with
    respect to the number of input patches (N). For a CNN, the complexity of a convolutional layer is
    linear, O(H * W), with respect to the number of input pixels. As image resolution increases to get
    better long-range perception, the ViT's compute cost explodes quadratically, quickly overwhelming
    the fixed TOPS budget of an edge device like the Jetson AGX Orin.
  common_mistake: Focusing only on parameter count or memory, rather than the computational complexity
    (FLOPs). A small ViT can have fewer parameters than a large CNN, but its compute scales much more
    poorly with image resolution, which is a critical factor in automotive perception systems.
  napkin_math: 'CNN compute scales linearly with pixels: O(H*W). 448x448 is 4x pixels, so 4x compute.
    ViT self-attention scales quadratically with patches: O(N^2). 224x224 w/ 16x16 patches = 196 patches.
    N^2 = 38,416. 448x448 = 784 patches. N^2 = 614,656. ViT attention compute increases by 614,656 / 38,416
    = 16x! The CNN grows by 4x, while the ViT attention mechanism explodes by 16x, breaking the latency
    budget.'
