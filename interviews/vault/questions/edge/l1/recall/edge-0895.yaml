id: edge-0895
title: Bandwidth-Aware Edge Debugging
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You oversee 5,000 enterprise security cameras. After deploying Model V3, incident reports indicate
  a 10x spike in false positives for 'intruder detection'. You need raw images to debug the issue, but
  1080p frames are 2MB, and the upload bandwidth per site is capped at 500 KB/s. Saturating this link
  disrupts standard security feeds.
details:
  realistic_solution: Implement a local ring buffer combined with metadata-driven triggered uploads. The
    edge device continuously saves the last N frames to a local disk ring buffer. When an inference occurs,
    the device uploads only a lightweight metadata JSON (1KB) containing the bounding boxes, confidence
    scores, and activation entropies. The cloud MLOps platform analyzes these metadata streams. If a specific
    prediction is deemed highly suspicious (e.g., a massive drop in confidence compared to historical
    data, or a request from a debugging engineer), the cloud sends a targeted fetch command to the edge.
    The edge then retrieves the specific 2MB frame from the ring buffer and uploads it during off-peak
    hours or via a rate-limited background thread.
  common_mistake: Streaming all frames that triggered an 'intruder' detection directly to the cloud, congesting
    the network.
  napkin_math: '10 false positives/hr * 2MB = 20MB/hr. If 100 cameras at a site trigger simultaneously
    (e.g., a lighting change), that''s 200MB. At 500 KB/s, uploading takes 400 seconds, killing the network.
    Metadata approach: 100 cameras * 1KB = 100KB. Takes 0.2 seconds to upload. Engineers selectively pull
    only 5 representative frames (10MB) over 20 seconds, preserving 99% of bandwidth.'
