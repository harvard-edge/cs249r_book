schema_version: 1
id: edge-exp2-mast-0127
title: Heterogeneous Graph Compilation on Jetson Orin
topic: graph-compilation
status: published
provenance: imported
scenario: You are designing an ahead-of-time compiler for a multi-modal autonomous driving pipeline deployed
  on an NVIDIA Jetson Orin. The pipeline consists of four high-resolution vision backbones and a custom
  Transformer-based sensor fusion module. Given the strict 60W TDP constraint and the need to process
  120 total frames per second, you must formulate a graph partitioning and operator lowering strategy
  that optimally utilizes both the Ampere GPU and the DLA accelerators to achieve the 275 TOPS INT8 peak
  performance.
details:
  realistic_solution: Formulate a custom pass manager to partition the graph based on hardware affinity.
    The heavy convolutional vision backbones are fused, quantized to INT8, and lowered specifically to
    the DLA. The memory-bound Transformer attention layers are isolated, compiled in FP16, and scheduled
    on the Ampere GPU, with explicit asynchronous memory copies inserted to hide latency.
  common_mistake: Candidates often default to compiling the entire graph for the GPU using standard INT8
    builders, ignoring the DLA completely. Alternatively, they forcefully lower unsupported operations
    to the DLA, resulting in implicit CPU fallbacks that destroy latency and throughput.
  napkin_math: The system processes 4 streams at 30 FPS = 120 FPS. If the vision backbone requires 0.5
    TOPS per frame, total backbone compute is 0.5 * 120 = 60 TOPS. The Orin provides 275 TOPS INT8 peak.
    Offloading backbones to the DLAs utilizes ~52% of DLA capacity (assuming DLAs provide ~114 TOPS).
    Leaving the remaining ~161 TOPS on the Ampere GPU for the Transformer. With 32 GB LPDDR5 at ~204 GB/s
    bandwidth, transferring 50 MB of activations from DLA to GPU per frame costs 50 MB * 120 FPS = 6 GB/s,
    safely consuming ~3% of bandwidth.
