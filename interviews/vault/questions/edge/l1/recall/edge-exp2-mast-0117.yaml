schema_version: 1
id: edge-exp2-mast-0117
title: Quantization-Aware Active Learning Pipeline for Edge TPU
topic: dataset-curation
status: published
provenance: imported
scenario: You are architecting an active learning data pipeline for a fleet of industrial defect-detection
  cameras equipped with Google Coral Edge TPUs via a USB/PCIe form factor. The system must operate within
  a 2W power envelope, meaning the model must be fully quantized to INT8 and use limited supported operators
  to leverage the 4 TOPS accelerator. Your current dataset yields a model with high FP32 accuracy, but
  strictly quantizing it for the Edge TPU causes catastrophic failure on specific rare defect types due
  to activation outliers. Design a dataset curation and annotation strategy that mitigates quantization-induced
  accuracy drops for edge deployments, and calculate the system requirements for mining these edge cases.
details:
  realistic_solution: Architect a quantization-aware curation loop where the Edge TPU runs the INT8 model
    and flags frames with high prediction entropy in the quantized domain. Send these flagged frames to
    the cloud to be processed by an FP32 shadow model; large divergence between INT8 and FP32 predictions
    triggers an annotation request. The labeled dataset should be curated to include balanced examples
    that specifically minimize activation clipping during calibration, enabling robust Quantization-Aware
    Training (QAT).
  common_mistake: Candidates frequently propose standard active learning using FP32 model uncertainty,
    ignoring that the deployment target is a Coral Edge TPU restricted to INT8. They overlook that the
    data distribution itself, particularly outliers in long-tail classes, dictates the quantization scale
    factors, and failing to curate data to balance activation ranges will result in persistent INT8 degradation
    regardless of dataset size.
  napkin_math: The Google Coral Edge TPU performs 4 TOPS (4,000 GOPS) at 2W. Suppose our defect detection
    INT8 model requires 2 GOPS per inference. The theoretical max throughput is 4,000 / 2 = 2,000 FPS.
    At a camera frame rate of 60 FPS, the TPU is at 3% utilization (60/2000), drawing well under the 2W
    limit. If our active learning divergence trigger flags 0.5% of frames for cloud upload, that is 60
    * 0.005 = 0.3 frames/sec. With 200KB per JPEG, the uplink requirement is only 60 KB/s per node, proving
    that continuous, quantization-targeted data curation is bandwidth-feasible.
