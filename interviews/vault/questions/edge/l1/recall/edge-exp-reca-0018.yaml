id: edge-exp-reca-0018
title: Hailo-8 Local DRAM Memory Architecture
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are evaluating the Information-Compute Ratio (ICR) framework for an edge deployment pipeline
  on the Hailo-8 dataflow accelerator. The device provides 26 TOPS INT8 compute under a strict 2.5W power
  envelope. To optimize data selection and avoid the data wall problem during real-time processing, you
  must design a pipeline that feeds data efficiently to the hardware. What is the specific capacity of
  local DRAM on the Hailo-8?
details:
  realistic_solution: The candidate should recall that the Hailo-8 has exactly zero local DRAM. As a dataflow
    accelerator, it relies entirely on streaming data directly from the host system's memory. This means
    data pipelines must be designed for continuous, steady streaming rather than relying on on-device
    memory buffers.
  common_mistake: Candidates often assume that all edge AI accelerators include at least a small amount
    of dedicated local LPDDR memory to buffer inputs. They mistakenly plan for burst-loading data batches
    into the accelerator's local memory.
  napkin_math: 'Compute: 26 TOPS INT8. Power: 2.5W. Local DRAM: 0 GB. If processing an optimized, pruned
    INT8 input tensor of 2MB at 30 FPS, the pipeline requires a continuous host memory streaming bandwidth
    of 2MB * 30 = 60 MB/s, as there is no local DRAM to stage the data.'
