schema_version: 1
id: edge-0134
title: Worst-Case vs. Average-Case
topic: real-time-deadlines
status: published
provenance: imported
scenario: A new traffic light control system uses a model on a Jetson AGX Orin to detect emergency vehicles.
  The system has a hard real-time requirement to react within 33ms (a 30 FPS SLA). Profiling shows your
  model's *average* inference time is 28ms, but its P99 (worst-case) latency is 45ms. Does this system
  satisfy the real-time requirement?
details:
  realistic_solution: No, the system does not meet the requirement. For a hard real-time system, the worst-case
    latency must be less than or equal to the deadline. Here, the P99 latency of 45ms is greater than
    the 33ms budget, meaning the system will fail to react in time in at least 1% of cases, which is unacceptable.
  common_mistake: Focusing on average-case latency. In safety-critical or hard real-time systems, the
    *worst-case* execution time (WCET) is the only metric that matters for guaranteeing performance. An
    average time that meets the budget is irrelevant if the system can unpredictably miss its deadline.
  napkin_math: $\text{Worst-Case Latency} (45 \text{ ms}) > \text{Frame Deadline} (33 \text{ ms}) \rightarrow
    \text{Requirement NOT Met}$
