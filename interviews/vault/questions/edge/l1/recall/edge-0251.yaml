id: edge-0251
title: The Edge Roofline Riddle
topic: roofline-analysis
status: published
provenance: imported
scenario: Your autonomous vehicle team is trying to optimize a new perception model on a Jetson AGX Orin.
  Before diving into kernel-level optimizations, you first need to identify the primary performance bottleneck.
  For a typical CNN, is the workload likely to be compute-bound or memory-bound on this hardware?
details:
  realistic_solution: The workload is overwhelmingly likely to be **memory-bound**. The Jetson AGX Orin
    has an extremely high Ridge Point (~1,342 Ops/Byte), meaning it offers a massive amount of compute
    for every byte of data it can fetch from memory. Most standard CNN architectures have a much lower
    arithmetic intensity (typically 10-100 Ops/Byte). Because the model's arithmetic intensity is far
    below the hardware's ridge point, the system spends most of its time waiting for data from DRAM, not
    performing calculations. The GPU cores are starved.
  common_mistake: Engineers often get distracted by the high peak TOPS of edge GPUs and assume their workload
    must be compute-bound. They forget that performance is a function of both compute AND memory bandwidth.
    The high TOPS/W figure can also be misleading; while it indicates efficiency, it doesn't describe
    the bottleneck. A system can be power-efficient while still being stalled on memory.
  napkin_math: 'Ridge Point = Peak Compute / Peak Memory Bandwidth. For Orin: Peak Compute = 275 TOPS
    (INT8) = 275e12 Ops/sec. Peak Bandwidth = 204.8 GB/s = 204.8e9 Bytes/sec. Ridge Point = 275e12 / 204.8e9
    = 1342.7 Ops/Byte. A typical CNN might have an Arithmetic Intensity of 200-500 Ops/Byte. Since 500
    < 1342, the CNN is well to the left of the ridge point, making it severely memory-bound.'
