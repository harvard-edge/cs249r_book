title: The 8K Sensor Upgrade Dilemma
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are the lead ML Systems Architect for a self-driving car company. Your team is upgrading
  the main forward-facing camera from a 4K sensor to a new 8K sensor to improve long-range object detection.
  The perception stack runs on a Jetson AGX Orin, and you have a hard real-time deadline of 33ms per frame
  (30 FPS).
details:
  realistic_solution: The correct architectural decision is to choose **FastFusion-CNN** for the initial
    launch, as the system is severely memory-bandwidth bound, not compute-bound. The Jetson AGX Orin's
    memory bandwidth is the hard physical constraint that makes DenseViT non-viable at 8K/30FPS.
  common_mistake: Believing the modeling team's argument. Engineers often fixate on peak theoretical TOPS
    and see underutilization as a software problem. They might propose complex software optimizations
    (e.g., CUDA graph tuning, kernel fusion) without realizing they are fighting a fundamental hardware
    limit. They fail to see the system holistically and identify the true bottleneck, which is the memory
    subsystem, not the compute units.
  napkin_math: 'Roofline: Achieved Ops = min(Peak TOPS, AI * Mem BW). 8K image is 33.1MP. FP16 input =
    66.3MB. Orin Peak: 275 TOPS INT8, BW: 204.8 GB/s. Ridge point = 1342 Ops/Byte. A standard 3x3 conv
    has AI ~30. Since 30 << 1342, it''s memory bound. Achieved throughput is 30 Ops/Byte * 204.8 GB/s
    = 6.14 TOPS. Processing an 8K image needing 500 GOPs takes 500G / 6.14T = 81ms. Too slow for 30FPS
    without heavy patching.'
