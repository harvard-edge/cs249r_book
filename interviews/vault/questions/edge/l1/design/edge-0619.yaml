id: edge-0619
title: The Autonomous Perception Deadlock
topic: roofline-analysis
status: published
provenance: imported
scenario: You are the Principal Engineer for perception systems at a leading autonomous vehicle company.
  Your team is designing the next-generation compute module, which has a strict, non-negotiable thermal
  design power (TDP) of 30W to ensure passive cooling.
details:
  realistic_solution: The correct L6+ approach is to formulate a hardware-aware evaluation framework.
    The goal is not just to pick the model with fewer FLOPs, but the one that yields the highest *effective*
    performance-per-watt on the target hardware.
  common_mistake: Focusing solely on peak TOPS of the hardware or total FLOPs of the model. A junior engineer
    might argue 'The CNN needs fewer FLOPs, so it's more efficient' or 'The hardware has 275 TOPS, so
    either model is fine'. This completely ignores the memory wall and hardware utilization. The critical
    insight is that a model's ability to *use* the available TOPS is constrained by its arithmetic intensity
    relative to the hardware's ridge point. An unused transistor provides no performance but still contributes
    to the power budget via static leakage.
  napkin_math: 'Target TDP is 30W. Max Orin performance at 30W is roughly half: ~137 INT8 TOPS and ~100
    GB/s bandwidth. Running a 5 TOPS object detector takes 5T / 137T = 36ms compute time. Fetching a 50MB
    INT8 model takes 50MB / 100GB/s = 0.5ms. Total is 36.5ms. To hit 30FPS (33.3ms), we must prune the
    model by 15% to 4.25 TOPS. 4.25T / 137T = 31ms. Adding 0.5ms memory overhead gives 31.5ms, fitting
    the budget.'
