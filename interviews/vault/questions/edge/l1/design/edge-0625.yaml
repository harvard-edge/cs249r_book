id: edge-0625
title: The 360° Vision System Latency Collapse
topic: kernel-fusion
status: published
provenance: imported
scenario: You are the lead architect for an autonomous trucking company. Your current perception system
  uses eight 1080p cameras feeding into a central Jetson AGX Orin, which has a 60W thermal design power
  (TDP) limit. The current architecture runs eight separate, lightweight classification models, one per
  camera, and then attempts a late fusion of their outputs. This design has a 150ms end-to-end latency,
  catastrophically missing the 33ms hard real-time deadline for object detection. The system already consumes
  55W, leaving no room for a new LiDAR processing pipeline that engineering insists is necessary. Propose
  a new system architecture from scratch that can meet the latency and power budget while also accommodating
  the future LiDAR stream. Justify your first three architectural decisions with quantitative reasoning.
details:
  realistic_solution: The 'N-model' approach is fundamentally flawed. The solution is to move to a single,
    unified architecture that performs early fusion, is optimized via distillation, and is deployed with
    hardware-aware compilation.
  common_mistake: 'Suggesting incremental, insufficient fixes like ''prune the existing models more''
    or ''try a slightly smaller backbone.'' These fail to address the core architectural flaw: the lack
    of early, cross-sensor fusion and the massive overhead of running eight separate models. Another common
    mistake is to suggest more powerful hardware, ignoring the strict power, thermal, and cost constraints
    of an automotive platform.'
  napkin_math: 'Let''s quantify the waste of the old system and the gains of the new one. The Orin''s
    memory bandwidth is 204.8 GB/s. A lightweight model (e.g., 50MB) must be loaded 8 times. Memory traffic
    = 8 models * 50MB = 400MB per frame. Time to load weights = 400MB / 204.8 GB/s ≈ 2ms. More importantly,
    each of the 8 inferences is a separate kernel launch sequence, adding microseconds of CPU overhead
    each time, and preventing the GPU from being saturated with a single, large, efficient computation.
    For the new system, let''s say our distilled BEV model is 200MB. We load it once: 200MB / 204.8 GB/s
    ≈ 1ms. The key is that the entire compute workload is now one large graph. The arithmetic intensity
    skyrockets. An AGX Orin at 45W can sustain ~200 INT8 TOPS. The previous 8 small models likely had
    low arithmetic intensity, making them memory-bound and achieving maybe 30% of peak TOPS (60 TOPS).
    The new unified model is a large, dense computation, much more likely to be compute-bound and hit
    70-80% of peak (140-160 TOPS). This >2x increase in effective compute utilization is what allows us
    to meet the 33ms deadline, even with a more complex model.'
