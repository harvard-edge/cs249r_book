schema_version: 1
id: edge-0877
title: AR Glasses Power Bottleneck
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing the ML architecture for next-gen AR glasses. A 1.2B parameter Vision Transformer
  (ViT) runs continuous object tracking at 30fps. The hardware has a strict <1W power budget for ML and
  1.5GB total ML RAM. Standard INT4 Post-Training Quantization (PTQ) fits the memory budget but accuracy
  collapses from 94% to 71% specifically in low-light environments.
details:
  realistic_solution: "The accuracy drop in low-light is caused by massive activation outliers (attention\
    \ spikes) that get clipped by static INT4 quantization. To meet both the 1W power budget and 1.5GB\
    \ RAM constraint, you must design a Mixed-Precision Quantization-Aware Training (QAT) pipeline. \n\
    \nArchitecturally, keep the first patch-embedding layer and the final classification head in INT8\
    \ (where precision matters most), and quantize the middle transformer blocks to INT4. Crucially, apply\
    \ a SmoothQuant-style offline mathematical transformation during QAT: migrate the quantization difficulty\
    \ from the activations to the weights by scaling down activation outliers and scaling up the corresponding\
    \ weight channels. Because this scaling is mathematically equivalent and fused offline, the runtime\
    \ executes purely as static INT4/INT8 MACs, requiring zero runtime scaling overhead and strictly adhering\
    \ to the power budget."
  common_mistake: Using dynamic quantization for activations to handle low-light variance, which destroys
    the strict 1W power budget due to runtime min/max calculation overhead.
  napkin_math: '1.2B params in FP16 = 2.4GB (OOM for 1.5GB budget). INT4 weights = 600MB. Mixed precision:
    5% of layers in INT8 adds ~30MB, totaling 630MB (well within 1.5GB). Power: FP16 MAC = ~1.5pJ. INT4
    MAC = ~0.5pJ. At 30fps with ~50G MACs/frame = 1.5T MACs/sec. INT4 power = 1.5T * 0.5pJ = 0.75W (<1W
    budget). Dynamic quantization would add ~0.4W of ALU overhead, violating the budget.'
