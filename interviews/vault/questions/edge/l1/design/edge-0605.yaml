id: edge-0605
title: Power-Adaptive Inference System
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your edge AI device is deployed on a cell tower with unreliable power. It has a 100 Wh battery
  backup and a solar panel that provides 0–30W depending on weather and time of day. The device runs a
  5G small cell (15W fixed) and an AI-based RF anomaly detector. The AI workload can run three model variants:
  a large model (ResNet-50, 8W, 95% accuracy), a medium model (MobileNetV2, 3W, 91% accuracy), and a tiny
  model (MCUNet, 0.5W on a co-processor, 84% accuracy). Design a power-adaptive inference system that
  maximizes detection accuracy while guaranteeing 48 hours of battery backup for the 5G radio.'
details:
  realistic_solution: Design a multi-level power-aware scheduler that treats the battery as a shared resource
    with strict priority for the 5G radio.
  common_mistake: '"Always run the large model when solar power is available, switch to tiny when on battery."
    This binary approach doesn''t account for the continuous spectrum of solar power availability or the
    need to maintain battery reserve for the 5G radio (the primary function).'
  napkin_math: 'Model accuracy vs power: large = 95% at 8W (11.9% accuracy/W). Medium = 91% at 3W (30.3%
    accuracy/W). Tiny = 84% at 0.5W (168% accuracy/W). The tiny model is 14× more accuracy-per-watt efficient
    than the large model. Weighted average accuracy over a typical day (8h surplus, 4h balanced, 4h mild
    deficit, 8h severe deficit): (8×95 + 4×91 + 4×84 + 8×0) / 24 = (760 + 364 + 336 + 0) / 24 = **60.8%
    time-weighted accuracy**. If you run tiny model 24/7 instead: 84% constant = 84% time-weighted. The
    "smart" power adaptation actually delivers lower average accuracy than just running the tiny model
    always, because the severe-deficit periods (AI off) drag down the average. Lesson: for power-constrained
    systems, a consistent low-power model often beats an intermittent high-power one.'
