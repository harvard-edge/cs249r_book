id: edge-0634
title: The Autonomous Freeway Thermal Throttling Crisis
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are the Lead ML Systems Architect for a self-driving truck company. The Gen-1 prototype
  meets its 30 FPS perception deadline using a down-clocked datacenter GPU, but it consumes 200W and requires
  a liquid cooling system. For the Gen-2 production vehicle, the system must fit in a passive, air-cooled
  enclosure with a strict Thermal Design Power (TDP) budget of 60W.
details:
  realistic_solution: The correct approach is to analyze the workloads against the hardware capabilities,
    not just look at peak datasheet numbers. The architect must recognize this is a system co-design problem.
  common_mistake: Picking Chip B because it has higher peak TOPS on the datasheet. This is a classic trap
    of ignoring the memory system and the workload's characteristics. An engineer making this mistake
    fails to analyze the system's Arithmetic Intensity, assumes advertised TOPS are always achievable,
    and doesn't understand that for a memory-bound model, excess compute is uselessly idle, generating
    zero effective TOPS/W.
  napkin_math: 'Datacenter GPU (e.g., A100 downclocked) has 2000 GB/s BW and 312 TFLOPS. Ridge point:
    312T / 2000GB/s = 156 Ops/Byte. Jetson Orin has 204.8 GB/s and 275 INT8 TOPS. Orin Ridge point: 275T
    / 204.8GB/s = 1342 Ops/Byte. If the Gen-1 model has an AI of 300, it''s compute-bound on the GPU (300
    > 156), but heavily memory-bound on Orin (300 < 1342). On Orin, throughput crashes to 300 * 204.8
    = 61 TOPS.'
