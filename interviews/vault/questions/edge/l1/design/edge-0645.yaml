id: edge-0645
title: The Foggy Road Catastrophe
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'You are the tech lead for the perception team at a major automotive company. Your team''s new
  ViT-based pedestrian detector, running in FP32, achieves 99.5% accuracy on your validation set. To meet
  the production hardware budget, the model must be quantized. After a standard post-training static quantization
  (PTQ) to INT8, the overall accuracy drops slightly to 98%, which seems acceptable. However, during fleet
  validation, you discover a catastrophic failure: the INT8 model''s accuracy on pedestrians in foggy
  conditions has plummeted to 35%.'
details:
  realistic_solution: The core issue is almost certainly catastrophic activation clipping. The low-contrast
    features in foggy images likely push activation values in certain layers outside the narrow dynamic
    range captured during calibration on 'clean' data. The Softmax and GELU activations in ViTs are particularly
    prone to producing extreme outliers that get saturated in INT8, destroying the model's ability to
    discern fine-grained features.
  common_mistake: A junior engineer might immediately suggest 'Just use Quantization-Aware Training (QAT)'.
    This is a valid tool, but it's a brute-force solution, not a diagnosis. It doesn't explain *why* PTQ
    failed, is computationally expensive, and may not even converge if the underlying issue is extreme.
    Another common mistake is to blame the calibration dataset without a specific hypothesis, leading
    to a vague 'let's just collect more fog data' plan, which wastes valuable time.
  napkin_math: "The core constraint is the 33ms (30 FPS) latency budget on the Jetson AGX Orin. Let's\
    \ assume our ViT requires 5 Trillion Operations per inference.\n\n1. **FP32 inference time:**\n  \
    \ - Orin FP32 peak: ~5.3 TFLOPS (GPU)\n   - Time = 5 TOps / 5.3 TFLOPS ≈ 943ms → **way over budget**\
    \ (need INT8)\n\n2. **INT8 inference time:**\n   - Orin INT8 peak: ~275 TOPS\n   - Time = 5 TOps /\
    \ 275 TOPS ≈ 18ms → **within 33ms budget** ✓\n\n3. **The quantization dilemma:**\n   - FP32 dynamic\
    \ range: ±3.4 × 10³⁸ with ~7 decimal digits precision\n   - INT8 dynamic range: [−128, 127] — only\
    \ 256 discrete levels\n   - If calibration data is all clear-weather, the scale factor s = (max_activation\
    \ − min_activation) / 255 is tuned for \"normal\" activations\n   - Fog activations with low contrast\
    \ may cluster in a tiny sub-range, getting quantized to just 2–3 INT8 levels → information destroyed\n\
    \n4. **Fix cost (QAT):**\n   - QAT requires ~10–20% of original training compute\n   - If original\
    \ training was 1000 GPU-hours, QAT ≈ 100–200 GPU-hours\n   - But the real fix is mixed-precision:\
    \ keep fog-sensitive layers (Softmax, final attention) in FP16 while keeping bulk compute in INT8\n\
    \   - FP16 layers add ~5ms overhead → total ≈ 23ms, still within 33ms budget"
