id: edge-0706
title: The Functional Safety Redundancy Cost
topic: safety-certification
status: published
provenance: imported
scenario: 'Your autonomous vehicle perception system must meet ISO 26262 ASIL-D. The safety architecture
  requires a redundant perception path: if the primary neural network fails or produces an implausible
  result, a secondary path must independently detect obstacles within 50ms. Your primary path runs on
  the Orin''s GPU (YOLOv8m, 25ms). The naive approach is to duplicate everything — second GPU, second
  model, second sensor set. The CFO says the $1,200 BOM increase per vehicle is unacceptable across a
  50,000-unit fleet. Design a redundant perception architecture that meets ASIL-D without doubling the
  hardware cost.'
details:
  realistic_solution: 'Design an **asymmetric redundancy** architecture where the secondary path is deliberately
    simpler, cheaper, and uses different hardware:'
  common_mistake: '"Use the same GPU to run the backup model after the primary model finishes." This violates
    the fundamental principle of redundancy — a common-cause failure (GPU hardware fault, driver crash,
    power rail failure) takes out both paths simultaneously. ISO 26262 requires *independence* between
    redundant elements, which means separate failure domains.'
  napkin_math: 'Primary path: Orin GPU, 25ms, 200W system, mAP 0.72. Secondary path: R5F + radar, 10ms,
    5W, detection-only (no classification). Redundancy overhead: power = 5W/200W = 2.5% (vs 100% for full
    duplication). Cost = $160/$2,000 base BOM = 8% (vs 60% for full duplication). Synchronization latency:
    the arbitrator compares outputs every frame (33ms). Worst case: primary fails at t=0, arbitrator detects
    at t=33ms, secondary result available at t=10ms (already computed in parallel). Failover latency:
    **33ms** (one frame). Within the 50ms requirement.'
