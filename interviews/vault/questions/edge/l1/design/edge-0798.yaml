id: edge-0798
title: The Remote Fleet Update Dilemma
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are responsible for deploying and maintaining ML models on a fleet of thousands of safety-critical
  edge devices (e.g., industrial robots, medical devices) operating in remote locations with intermittent
  connectivity. These devices must operate for years without human intervention. How do you design a robust,
  secure, and fault-tolerant over-the-air (OTA) update system for ML models and associated runtime software,
  ensuring functional safety, preventing device bricking, and enabling safe rollbacks, even if connectivity
  drops mid-update?
details:
  realistic_solution: "A multi-stage, atomic, and verified OTA update system:\n  1.  **Atomic Updates\
    \ (A/B Partitioning):** The device firmware and model storage should be partitioned into at least\
    \ two slots (A and B). The device boots from the active slot (e.g., A). Updates are downloaded and\
    \ installed into the inactive slot (B). If the update fails or is corrupted, the device can simply\
    \ revert to booting from slot A. After a successful update, the bootloader is configured to boot from\
    \ B.\n  2.  **Secure Boot & Authenticated Updates:** All update packages (firmware, ML models, configuration)\
    \ must be cryptographically signed by a trusted authority. The bootloader and update agent verify\
    \ these signatures before installation. This prevents malicious tampering or unauthorized updates.\n\
    \  3.  **Delta Updates:** To minimize bandwidth usage and download time, especially with intermittent\
    \ connectivity, use delta updates (binary diffs) that only transmit the changes between the current\
    \ and new version.\n  4.  **Staged Rollouts (Canary/A/B Testing):** Deploy updates incrementally.\
    \ Start with a small \"canary\" group of non-critical devices. Monitor their health and performance\
    \ metrics extensively. If successful, gradually expand the rollout to larger groups. This limits the\
    \ blast radius of a faulty update.\n  5.  **Health Monitoring & Rollback Triggers:**\n      *   **Pre-activation\
    \ Checks:** Before activating a new model, run a suite of self-tests (e.g., inference on golden datasets,\
    \ hardware health checks) to verify its integrity and basic functionality.\n      *   **Post-activation\
    \ Monitoring:** Continuously monitor key performance indicators (KPIs) like inference latency, accuracy\
    \ on live data (if possible), resource utilization, and device stability.\n      *   **Automatic Rollback:**\
    \ If any KPI deviates significantly or a critical system error occurs after activation, the system\
    \ must automatically trigger a rollback to the previous known-good version (by switching the active\
    \ boot slot).\n  6.  **Fail-Safe Mechanisms:** Implement watchdog timers at various levels (hardware,\
    \ OS, application) to detect hangs and trigger reboots or rollbacks. Ensure the device always has\
    \ a recovery mode (e.g., minimal safe boot, ability to download emergency firmware).\n  7.  **Robust\
    \ Communication Protocol:** Use a protocol designed for unreliable networks (e.g., MQTT with QoS levels,\
    \ retransmission logic, chunking) for downloading updates.\n  8.  **Model Versioning & Compatibility:**\
    \ Clearly version all models and ensure runtime compatibility. The update system should verify that\
    \ the new model is compatible with the existing runtime or update the runtime simultaneously."
  common_mistake: '"Just push the new model and hope for the best." This ignores critical issues like
    partial updates, network failures, corrupt files, and the need for safety validation before activation.'
  napkin_math: A 100MB model update over a 100kbps intermittent connection takes ~8000 seconds (2.2 hours)
    without retransmissions. Delta updates could reduce this to 10MB, taking ~800 seconds (13 minutes).
    For a fleet of 10,000 devices, a full rollout with 1% canary, 10% early adopter, 89% general release,
    each stage taking 1 week of monitoring, means a full deployment takes 3 weeks. A faulty update detected
    on the canary group saves 99% of the fleet from potential bricking.
