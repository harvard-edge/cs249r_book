schema_version: 1
id: edge-0909
title: Multi-Camera NPU PCIe Bottleneck
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are architecting a retail edge server processing 16 concurrent 1080p video streams at 30fps.
  The system uses a host CPU connected to an edge NPU via PCIe Gen3 x4 (theoretical 3.9 GB/s). Inference
  latency spikes to 200ms when all streams are active, despite the NPU reporting only 40% compute utilization.
  Memory profiling shows 99% PCIe bus saturation.
details:
  realistic_solution: The system is bottlenecked by the PCIe memory hierarchy. You must redesign the architecture
    to use 'Zero-Copy' and edge-native decoding. Instead of the host CPU decoding video and sending uncompressed
    RGB frames over PCIe, pass the compressed H.264/H.265 streams directly to the NPU's hardware video
    decoder (if available) or a unified memory space. Furthermore, fuse preprocessing (resize, normalize)
    directly into the early layers of the NPU graph so the massive uncompressed data remains entirely
    in the NPU's high-bandwidth local SRAM/LPDDR, avoiding costly round-trips to the host CPU's main memory.
  common_mistake: Upgrading to a faster NPU or reducing the batch size to lower latency, ignoring the
    I/O bottleneck.
  napkin_math: 16 streams * 1920*1080 pixels * 3 channels * 30fps = ~2.98 GB/s of raw RGB data. PCIe Gen3
    x4 real-world bandwidth is ~3.2 GB/s. Transmitting uncompressed frames consumes 93% of the bus, causing
    severe queueing delays.
