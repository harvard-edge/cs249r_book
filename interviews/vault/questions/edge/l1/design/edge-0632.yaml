id: edge-0632
title: The Autonomous Vehicle Power-Performance Paradox
topic: roofline-analysis
status: published
provenance: imported
scenario: You are the Lead ML Systems Architect at a new EV company designing a Level 3 autonomous driving
  system. Your team is finalizing the central compute module, which has a strict, passively-cooled thermal
  design power (TDP) of 30W.
details:
  realistic_solution: The correct approach is to advocate for a modified version of **Proposal B (Heterogeneous)**,
    or a hybrid. The core insight is that a single, monolithic GPU is deeply inefficient for a mixed workload
    under a strict power budget.
  common_mistake: Engineers often fixate on the peak TOPS of the most powerful chip (the Orin), assuming
    more is always better. They might select Proposal A and argue that the high peak TOPS provides 'future-proofing'
    or can 'brute-force' the problem. This ignores the reality that a significant portion of the workload
    is memory-bound and cannot utilize the peak compute, leading to catastrophic power inefficiency. They
    fail to treat power and arithmetic intensity as primary design constraints.
  napkin_math: 'Monolithic GPU at 30W: Orin NX draws ~25W, leaves ~5W for CPU/sensors. Idle power ~8W
    even when not inferring. Heterogeneous: DLA core ~5W for perception (24/7), GPU ~15W burst for planning.
    Idle: DLA 5W + CPU 3W = 8W vs GPU 25W always-on. Utilization: GPU idle 70% of time wastes 0.7*25W=17.5W.
    Heterogeneous saves ~60% energy over duty cycle.'
