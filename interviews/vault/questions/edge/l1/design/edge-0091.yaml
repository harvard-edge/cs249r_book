schema_version: 1
id: edge-0091
title: The EMC Compliance Failure
topic: power-budgeting
status: published
provenance: imported
scenario: Your edge AI product (Hailo-8 on a custom carrier board with Rockchip RK3588) passes all functional
  tests but fails FCC Part 15 Class A EMC testing — radiated emissions exceed the limit by 8 dB at 480
  MHz and 960 MHz. These are the 1st and 2nd harmonics of the USB 3.0 clock (480 MHz). You cannot ship
  the product until it passes. Redesigning the PCB will take 4 months and cost $200K. The product launch
  is in 6 weeks. How do you diagnose and fix the EMC failure without a full board respin?
details:
  realistic_solution: 'EMC failures at USB 3.0 harmonics are one of the most common certification blockers
    for edge AI products. The 480 MHz emissions come from the high-speed differential signals on the USB
    3.0 traces between the RK3588 and the Hailo-8''s M.2 connector. The root cause is typically a combination
    of: (1) **impedance discontinuities** at the M.2 connector where the trace geometry changes, (2) **common-mode
    conversion** from differential-to-common-mode imbalance in the USB traces, and (3) **inadequate return
    path** — the ground plane has a gap or via transition near the USB traces.'
  common_mistake: '"Add a shielding can over the entire board." A shield can helps, but 8 dB over the
    limit is a significant margin — a simple shield typically provides 3–5 dB of attenuation. You need
    a targeted fix.'
  napkin_math: 'FCC Class A limit at 480 MHz: ~43 dBμV/m at 10m. Your measurement: 51 dBμV/m (8 dB over).
    Common-mode choke attenuation: 18 dB → new measurement: 33 dBμV/m (10 dB under limit — passes with
    margin). Choke BOM cost: $0.80 × 5,000 units = $4,000. Rework cost for existing prototypes: $15/unit
    × 100 pre-production units = $1,500. Total fix cost: $5,500. Avoided cost: $200K board respin + 4-month
    delay × $500K/month revenue = $2.2M. The $0.80 component saves $2.2M and 4 months. This is why EMC-aware
    layout review should happen at schematic stage, not after fabrication.'
