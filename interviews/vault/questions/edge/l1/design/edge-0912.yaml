schema_version: 1
id: edge-0912
title: AR Glasses Memory Fragmentation
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: An AR headset runs continuous hand-tracking and SLAM. After 45 minutes of operation, the system
  crashes with a `std::bad_alloc` OOM error. Diagnostics show 1.2GB of physical RAM is still technically
  'free' out of the 4GB total, but tensor allocation latency has spiked from 1us to 3ms right before the
  crash.
details:
  realistic_solution: The system is suffering from catastrophic memory fragmentation caused by standard
    `malloc`/`free` handling variable-sized tensor allocations over long periods. The architecture must
    be redesigned to use a static Memory Pool or Arena Allocator. Perform an offline analysis of the model's
    computational graph to determine the maximum liveness footprint (the peak memory required at any point
    in the graph). Pre-allocate a single, contiguous block of memory (e.g., 50MB) at startup. Reuse offsets
    within this arena for intermediate activations, guaranteeing zero fragmentation and O(1) allocation
    time.
  common_mistake: Writing a background garbage collection thread to defragment memory, which would ruin
    real-time 60fps latency guarantees.
  napkin_math: At 60fps, dynamic sequence lengths generate ~150 variable-sized allocations per frame.
    150 * 60 * 60 * 45 = ~24.3 million allocations over 45 mins. A 15% fragmentation waste on 2.5GB used
    = 375MB scattered in tiny holes, failing contiguous 5MB tensor requests.
