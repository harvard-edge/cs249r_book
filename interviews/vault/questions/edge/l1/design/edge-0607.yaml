id: edge-0607
title: The Hard Real-Time Factory Defect Detector
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are the Principal Engineer designing a visual inspection system for a high-speed bottling
  line. The system must detect microscopic cracks in glass bottles using a 4K resolution camera (3840x2160)
  and trigger a robotic arm, all within a hard real-time budget of 10ms. A state-of-the-art Vision Transformer
  has shown unparalleled accuracy for this kind of fine-grained defect detection in offline tests. Your
  available hardware is a Hailo-8 accelerator, known for its extreme TOPS/W efficiency (26 TOPS at 2.5W).
  Propose a system architecture that meets the 10ms deadline using the ViT. You must prove, with quantitative
  analysis, why a naive implementation is impossible and why your design is feasible.
details:
  realistic_solution: A naive ViT on a 4K image is mathematically impossible within the time budget. The
    quadratic complexity of self-attention on a large sequence of patches creates an insurmountable computational
    and memory burden. The only viable solution is a cascaded or hierarchical architecture.
  common_mistake: Simply downsampling the 4K image to a smaller size like 224x224. This would make the
    ViT computationally feasible, but it would also destroy the high-frequency details required to see
    the microscopic cracks, making the entire system useless. Another common mistake is to only calculate
    FLOPs without considering the memory implications of the attention matrix.
  napkin_math: '4K=3840×2160=8.3M pixels. ViT 16×16 patches → 240×135=32,400 tokens. Attention matrix:
    32400²×2bytes=2.1GB per head — exceeds Hailo-8 memory. Compute: self-attention ~2×N²×d=2×32400²×768=1.61T
    FLOPs. Hailo-8: 26 TOPS → 1610/26=62s per frame vs 10ms budget. Need cascade: CNN crops ROIs first,
    ViT runs on small patches only.'
