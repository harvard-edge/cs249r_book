id: edge-0609
title: The Multi-Sensor Contention Collapse
topic: graph-compilation
status: published
provenance: imported
scenario: You are designing the perception system for an autonomous delivery robot using a Jetson AGX
  Orin. The system must fuse data from three 4K cameras and one LiDAR sensor in real-time (33ms cycle).
  To accelerate the vision models, the team used 2:4 structured pruning, achieving a 2x speedup in standalone
  benchmarks. However, during integration testing, the end-to-end pipeline latency is now *worse* than
  with the original dense models. The system is suffering from massive, unpredictable frame drops. What
  is the most likely physical bottleneck causing this counter-intuitive result, and how would you redesign
  the system software architecture to resolve it?
details:
  realistic_solution: The physical bottleneck is the shared DRAM memory bandwidth. While structured pruning
    reduces the computational load (FLOPs), it transforms the memory access patterns from mostly contiguous
    to sparse and irregular. In a standalone benchmark, this is fine. But in a multi-sensor system, you
    now have multiple models plus the LiDAR processing pipeline all making simultaneous, chaotic requests
    to the single 204.8 GB/s memory controller on the Orin. This leads to severe memory bandwidth contention,
    causing all processes to stall waiting for data. The dense model, though computationally slower, had
    more predictable, sequential memory access patterns that were easier for the DRAM controller to schedule
    efficiently, resulting in better *system-wide* throughput.
  common_mistake: Focusing only on compute (FLOPs). The candidate might suggest further pruning or quantization,
    but this misses the root cause. Another common error is to blame the OS scheduler or suggest simple
    process priority tweaks, which are insufficient for this level of hardware contention.
  napkin_math: 'Orin DRAM BW: 204.8 GB/s shared. 3× 4K cameras: 3840×2160×3bytes×30fps = 747MB/s per cam
    × 3 = 2.2 GB/s input. Vision models (pruned, sparse access): ~50 GB/s each × 3 = 150 GB/s. LiDAR processing:
    ~30 GB/s. Total demand: 182 GB/s ≈ 89% of 204.8 GB/s. Sparse access patterns cause DRAM row-buffer
    misses → effective BW drops 30-40%. Actual usable: ~130 GB/s < 182 GB/s demand → contention stalls.'
