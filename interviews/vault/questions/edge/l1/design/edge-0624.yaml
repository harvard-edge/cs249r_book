title: The Unified Automotive Perception Stack Design
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are the new Principal ML Systems Engineer at 'NüVuro', an EV startup aiming to build a unified
  perception stack for its 2028 model year, moving beyond the current generation's collection of disparate,
  hand-tuned CNNs. The entire system, processing feeds from 8 surround-view cameras, must run on a single
  automotive-grade SoC with hard real-time constraints.
details:
  realistic_solution: A Principal-level solution avoids dogmatic choices and proposes a pragmatic, hybrid,
    and data-driven approach.
  common_mistake: 'Engineers often fall into one of two traps: 1) ''ViT is the future, so we must use
    it everywhere,'' completely ignoring the astronomical, budget-breaking compute cost on edge hardware.
    2) ''CNNs are the only thing that works on edge,'' which is an overly conservative stance that cedes
    future performance advantages to competitors and ignores modern hybrid and sparse architectures.'
  napkin_math: A naive ViT processes images in patches. For a 2MP image with 16x16 patches, sequence length
    N is 7812. Self-attention complexity is O(N^2). Attention score matrix is 7812^2 = 61M elements. Reading
    this 61MB matrix per head at Orin's 204.8 GB/s bandwidth takes 61MB / 204.8GB/s = 0.3ms. With 12 heads
    and 12 layers, just loading attention matrices takes 0.3ms * 144 = 43ms. Misses 33ms budget instantly.
