schema_version: 1
id: edge-sus-60039
title: Energy-optimal gradient computation schedule for battery-powered edge device
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are designing an on-device learning system for a wildlife camera running on a 20Wh battery
  with Jetson Orin (60W TDP). The camera must run 24/7 with learning, using <10% battery per day on learning
  (2Wh budget). Each learning step takes 50ms (training forward + backward). How many learning steps can
  you afford per hour?
details:
  realistic_solution: 'Measure actual power: use tegrastats to profile Orin power during training. Typical:
    ~45W during backward, ~20W during inference, ~5W idle. Budget: 2Wh = 7200 joules. Each step: 50ms
    × 45W = 2.25 joules. Steps per day: 7200J / 2.25J = 3200 steps. Steps per hour: 3200/24 = 133 steps/hour.
    Schedule: one learning step every 27 seconds. Remaining 23.9 seconds at idle: 23.9s × 5W = 119.5J
    × 24h/3600 = negligible.'
  common_mistake: 'Assuming Orin always runs at 60W during training. Power consumption scales with workload:
    inference-only is ~15W, full training (forward + backward) peaks at ~50W. Not accounting for idle/sleep
    power between steps.'
  napkin_math: 'Budget check: 133 steps/hour × 24 hours = 3192 steps × 2.25J = 7182 joules ≈ 2Wh. ✓ Camera
    total battery: 20Wh. Non-learning budget: 18Wh for sensing + comms + CPU. Orin idle at 5W × 24h =
    432Wh — wait, Orin alone exceeds battery at any power state. Requires duty-cycling Orin completely.
    Power management: Orin runs for 1.35s (60 steps × 50ms) per 27s cycle = 5% duty cycle, average power
    = 45W × 0.05 = 2.25W → 2.25W × 24h = 54Wh. Exceeds budget — must reduce to 10 steps/hour.'
