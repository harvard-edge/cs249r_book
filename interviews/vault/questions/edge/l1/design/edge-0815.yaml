id: edge-0815
title: The Fleet OTA Bandwidth Budget
topic: collective-communication
status: published
provenance: imported
scenario: 'Your company operates 10,000 edge AI cameras on cellular LTE connections (average 5 Mbps downlink
  per device, $0.02/MB data cost). A critical model update is 80 MB. Calculate the total fleet update
  cost and time. Then design a delta-update strategy: the diff between model versions is 12 MB. What are
  the savings? What happens if 3% of devices have corrupted base models and need full updates?'
details:
  realistic_solution: 'Full update: 10,000 × 80 MB = 800,000 MB = 800 GB. Cost: 800,000 × $0.02 = $16,000.
    Time per device: 80 MB / (5 Mbps / 8) = 80 / 0.625 = 128 seconds. Delta update: 10,000 × 12 MB = 120,000
    MB. Cost: 120,000 × $0.02 = $2,400. Time per device: 12 / 0.625 = 19.2 seconds. Savings: $13,600 (85%).
    With 3% corruption: 300 devices need full (300 × 80 = 24,000 MB), 9,700 get delta (9,700 × 12 = 116,400
    MB). Total: 140,400 MB. Cost: $2,808. Still 82.4% savings vs. full fleet update.'
  common_mistake: Only calculating the happy path. In production, a fraction of devices always need full
    updates due to corruption, version skew, or failed prior updates. Ignoring this tail makes the budget
    estimate dangerously low.
  napkin_math: 'Full: 10,000 × 80 MB = 800 GB, $16,000. Delta: 10,000 × 12 MB = 120 GB, $2,400. Savings:
    85%. With 3% fallback: 300 × 80 + 9,700 × 12 = 24,000 + 116,400 = 140,400 MB = $2,808. Net savings:
    82.4%. Time: full=128s/device, delta=19.2s/device.'
