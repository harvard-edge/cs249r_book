id: edge-0810
title: Edge-Cloud Federated Learning System
topic: 3d-parallelism
status: published
provenance: imported
scenario: Your fleet of 500 hospital bedside monitors runs a patient fall detection model. After 6 months,
  accuracy has dropped from 94% to 87% due to distribution shift (new patient demographics, seasonal clothing
  changes). HIPAA prohibits uploading patient video to the cloud. Design a federated learning system that
  retrains the model across the fleet without any raw data leaving the devices. Specify the communication
  protocol, privacy guarantees, convergence timeline, and the compute/bandwidth budget per device.
details:
  realistic_solution: Design a privacy-preserving federated learning system with differential privacy,
    communication efficiency, and convergence guarantees.
  common_mistake: '"Run standard FedAvg — each device trains locally and uploads gradients." Vanilla FedAvg
    on edge devices has three critical problems: (1) gradient uploads can leak patient information via
    gradient inversion attacks, (2) edge devices have limited compute for local training, and (3) non-IID
    data across hospitals causes divergence.'
  napkin_math: 'Privacy budget: ε=8 per round, 20 rounds with privacy amplification via subsampling (50/500
    = 10% participation): effective ε ≈ 8 × √(20 × 0.1) = 11.3 (using advanced composition). Accuracy
    cost of DP noise: ~2% mAP reduction. Net accuracy after federated retraining: 87% + 5% (retraining
    gain) − 2% (DP cost) = **90%**. Not back to 94%, but significantly improved without violating HIPAA.
    Compute cost per device: 8 min × 15W GPU = 7.2 kJ per round × 20 rounds = 144 kJ = 0.04 kWh = $0.005.
    Fleet compute cost: 500 × $0.005 = $2.50 per retraining cycle. Cloud aggregation: negligible (averaging
    50 sparse vectors).'
