id: edge-0615
title: The Mixture-of-Experts Power Trap
topic: mixture-of-experts
status: draft
provenance: imported
scenario: You are the Staff ML Systems Engineer for a fleet of autonomous delivery robots. Each robot
  uses a large, monolithic CNN for multi-task perception (pedestrians, traffic lights, etc.) running on
  a Jetson AGX Orin at a 30W power setting. The model meets its 33ms latency budget but consumes most
  of the power, limiting robot range. A research team proposes replacing it with a sparse Mixture-of-Experts
  (MoE) model. The MoE model has a shared backbone and specialized 'expert' networks for each task. A
  lightweight router network activates only 1-2 experts per frame. The total parameter count of the MoE
  model is 3x larger than the current CNN, but the team claims it will be faster and more power-efficient
  since only a fraction of the weights are used per inference.
details:
  realistic_solution: The validation plan must be centered on the Roofline model and the system's memory
    hierarchy, not just theoretical FLOPs. The core risk of the MoE model is that its sparse, dynamic
    access pattern destroys arithmetic intensity, making it memory-bound.
  common_mistake: The common mistake is to only look at FLOPs. The MoE model has fewer active parameters,
    so it *must* be faster, right? This ignores the physics of memory. Engineers fall into this trap by
    forgetting that moving data costs time and energy. On a constrained edge device, the cost of fetching
    randomly-accessed expert weights from slow DRAM can easily erase any computational savings.
  napkin_math: At 30W, Orin yields ~137 TOPS, ~102 GB/s BW. Pruning a 10 GOPs model by 50% saves 5G /
    137T = 0.036ms compute. Unstructured pruning cuts weights from 50MB to 25MB, saving 25MB / 102 GB/s
    = 0.24ms read time. But sparse gathering destroys contiguous reads, dropping BW efficiency to 10%,
    making the 25MB read take 25MB / 10.2 GB/s = 2.45ms. The memory penalty outweighs the tiny compute
    savings.
