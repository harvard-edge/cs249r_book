schema_version: 1
id: edge-0878
title: Smart Home KV Cache Crisis
topic: extreme-quantization
status: published
provenance: imported
scenario: A smart home hub runs a local 7B LLM. The system has 8GB unified RAM. The OS requires 2GB, and
  4-bit AWQ weights consume 3.5GB, leaving 2.5GB for the KV cache. Product requirements mandate supporting
  3 concurrent family members maintaining distinct conversation histories up to 4,000 tokens each. Standard
  FP16 KV cache causes hard OOM crashes.
details:
  realistic_solution: 'The system requires an asymmetrical, group-wise KV cache quantization architecture.
    LLM attention mechanisms heavily rely on ''Attention Sinks'' (the first few tokens of a sequence)
    which absorb massive activation values, alongside a few high-magnitude outlier channels. Linearly
    quantizing these to INT4 causes catastrophic precision loss.


    The architectural solution is to implement an eviction/quantization router: keep the first 4 tokens
    (sink tokens) and a sliding window of the 128 most recent tokens in FP16. The historical tokens are
    asynchronously compressed into INT4 using group-wise quantization along the channel dimension (e.g.,
    group size 64). This requires writing a custom NPU/GPU kernel to dequantize historical INT4 KV blocks
    on the fly during the attention computation, blending them with the FP16 sink/recent tokens.'
  common_mistake: Quantizing the entire KV cache to INT4 linearly across all tokens, which destroys attention
    mechanisms due to massive outliers in initial 'sink' tokens.
  napkin_math: "7B model (32 layers, 4096 hidden dim). 1 token KV in FP16 = 2 (K,V) * 32 layers * 4096\
    \ dim * 2 bytes = 524KB. 4,000 tokens = 2.1GB per user. For 3 users = 6.3GB (OOM, exceeds 2.5GB budget).\
    \ \nWith INT4 KV cache: 524KB / 4 = ~131KB/token. 4,000 tokens = 524MB per user. For 3 users = 1.57GB.\
    \ Adding the small FP16 window (132 tokens * 524KB * 3 = 207MB), total KV memory = 1.78GB. This safely\
    \ fits within the 2.5GB budget."
