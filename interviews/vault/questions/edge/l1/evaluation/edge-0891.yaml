schema_version: 1
id: edge-0891
title: Thermal Throttling Runtime Adaptation
topic: real-time-deadlines
status: published
provenance: imported
scenario: Agricultural drones process crop images at 30 FPS (33.3ms budget). The NPU runs at 800MHz with
  20ms inference latency. At 45°C ambient temperatures, the SoC reaches 85°C and thermally throttles the
  NPU to 300MHz. Inference latency spikes, causing frame buffer overflows, lost frames, and erratic navigation.
  You must ensure continuous system reliability.
details:
  realistic_solution: Implement thermal-aware dynamic model switching. The MLOps runtime must monitor
    SoC temperature and NPU frequency as primary observability metrics. When the telemetry indicates throttling
    (e.g., NPU drops to 300MHz), the system intercepts the event and dynamically hot-swaps the primary
    FP16 model for a pre-loaded, heavily quantized (INT8) or structurally pruned "fallback" model. This
    trades off inference accuracy (e.g., 2-3% mAP drop) for latency guarantees, maintaining the critical
    33ms frame budget. Once the temperature drops below a hysteresis threshold (e.g., 75°C), the system
    restores the high-accuracy model.
  common_mistake: Adding a larger memory buffer to queue frames during thermal throttling.
  napkin_math: Standard model latency at 800MHz = 20ms. Throttled to 300MHz (2.66x slower) = 20 * 2.66
    = 53.3ms. Frame budget = 33.3ms. Deficit = 20ms per frame. Fallback INT8 model latency at 800MHz =
    10ms. Throttled to 300MHz = 10 * 2.66 = 26.6ms. 26.6ms < 33.3ms budget, ensuring no frames are dropped.
