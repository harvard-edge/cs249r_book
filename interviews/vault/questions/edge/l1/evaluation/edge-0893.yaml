schema_version: 1
id: edge-0893
title: Heterogeneous Edge Model Registry
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your consumer hardware startup has 1 million active devices across 3 generations. Gen 1 uses
  a Coral EdgeTPU (INT8), Gen 2 uses Jetson Nano (FP16), Gen 3 uses Snapdragon Hexagon (INT8/FP16). You
  train a single PyTorch model. You must design a CI/CD pipeline and registry to update all devices over
  unmetered WiFi without exhausting device storage.
details:
  realistic_solution: 'Implement a target-aware Model Registry with hardware-specific compilation in the
    CI/CD pipeline. The pipeline takes the PyTorch artifact, exports to ONNX, and branches into three
    compilation paths: EdgeTPU Compiler (INT8), TensorRT (FP16), and Qualcomm SNPE (INT8). The registry
    tags each resulting artifact with `model_version`, `target_hw`, and `precision`. During the OTA check-in,
    the edge device sends its hardware manifest (e.g., `hw: coral_edgetpu`). The registry dynamically
    resolves this to the exact thin binary required. This trades pipeline complexity (maintaining N compilation
    toolchains) for edge storage efficiency and reduced network transfer times.'
  common_mistake: Packaging all compiled targets into a single "fat binary" container so the edge device
    can select the right one at runtime.
  napkin_math: 'Fat binary size: 15MB (Coral) + 30MB (Jetson) + 20MB (Hexagon) = 65MB. Thin binary = 15-30MB.
    If Gen 1 devices have 32MB of free flash storage remaining, downloading a 65MB fat binary results
    in 100% deployment failure (OOM storage). Target-specific resolution ensures the 15MB file fits comfortably.'
