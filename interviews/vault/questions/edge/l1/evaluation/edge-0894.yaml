id: edge-0894
title: Skewed Edge A/B Testing
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are deploying a new RL-based energy-saving model to 100,000 smart HVAC controllers. You
  want to run an A/B test to measure energy savings. However, household energy usage varies wildly based
  on climate (e.g., Arizona vs. Alaska) and insulation. A standard randomized 50/50 split yields massive
  variance, hiding the model's actual impact.
details:
  realistic_solution: Use Switchback (Crossover) Testing or Stratified Sampling based on edge-computed
    embeddings. In a switchback design, each individual edge device alternates between Model A (Control)
    and Model B (Treatment) in randomized blocks (e.g., daily or weekly). The device acts as its own control,
    completely isolating the environmental variance (climate, house size) from the model performance.
    Alternatively, edge devices can locally compute a 'climate/usage embedding' and send it to the cloud,
    allowing the MLOps platform to pair similar homes into matched A/B cohorts. This trades off temporal
    correlation risks (e.g., weather changing day-to-day) for a massive reduction in cross-sectional variance.
  common_mistake: Running the test longer or randomly assigning more users to smooth out the variance.
  napkin_math: 'Between-home variance (σ) is $50/month. Model impact (δ) is expected to be $5/month. For
    a two-sample test with 80% power (z_β=0.84) and α=0.05 (z_α/2=1.96): N per group = 2 × (1.96+0.84)²
    × 50² / 5² = 2 × 7.84 × 100 = 1,568 homes per group (~3,200 total). Within-home variance (day-to-day)
    is only $5/month. Switchback testing reduces the required N: 2 × 7.84 × 5² / 5² = 2 × 7.84 ≈ 16 per
    group — roughly 100× fewer devices needed, or equivalently, dramatically higher statistical power
    with the same sample size.'
