id: edge-0888
title: Fleet OTA Update Strategy
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You manage 50,000 smart dashcams connected via 3G cellular (average 1 Mbps downlink). A new
  150MB object detection model needs deployment. A previous faulty update caused a 1% device bootloop
  rate, requiring $150 manual truck rolls per device. You must design a safe update mechanism that minimizes
  cellular costs and mitigates catastrophic failure risk.
details:
  realistic_solution: 'Implement a phased canary rollout with binary delta updates and an A/B partition
    fallback mechanism. First, the model registry generates a binary patch (delta) between V1 and V2,
    reducing payload size significantly. Second, deploy to a 1% canary fleet, monitoring for bootloops
    or inference crashes for 24 hours. The edge device uses an A/B partition scheme: it downloads the
    delta, applies it to the inactive B partition, and sets a watchdog timer. If the model fails to load
    or crashes within 5 minutes, the device automatically reboots into the known-good A partition, averting
    a truck roll. This trades off immediate fleet-wide deployment for high reliability and low bandwidth
    costs.'
  common_mistake: Pushing the full 150MB model to all devices simultaneously using a standard cloud-based
    pub/sub trigger.
  napkin_math: 'Full update cost: 150MB * 50,000 = 7.5TB data. At $0.10/GB = $750. Delta update (typical
    10% size) = 15MB * 50,000 = 750GB ($75). Bootloop cost without fallback: 1% of 50,000 = 500 devices
    * $150 truck roll = $75,000. Fallback mechanism saves $75,000 per bad deployment.'
