schema_version: 1
id: edge-0890
title: Shadow Mode on Tight Edge Memory
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a new vision model to a fleet of Jetson Nanos (2GB RAM). The host OS and camera
  buffer consume 0.5GB. The current production model requires 1.2GB of RAM. You want to run the new 1.2GB
  model in shadow mode to compare inference results on live data, but running both simultaneously causes
  an Out-Of-Memory (OOM) crash.
details:
  realistic_solution: Implement time-multiplexed shadow testing or a fleet-wide fractional deployment.
    Since simultaneous execution exceeds physical memory, the system must trade temporal resolution for
    safe testing. The edge inference engine is reconfigured to load Model A, process frames for 5 seconds,
    flush it, load Model B, and process frames for 5 seconds. Alternatively, if dropping frames is unacceptable,
    abandon single-device shadow mode and use fleet-level A/B testing, where 50% of devices run Model
    A and 50% run Model B, comparing aggregate metrics in the cloud. Time-multiplexing trades latency/throughput
    for exact input parity; A/B testing trades exact input parity for continuous throughput.
  common_mistake: Using a swapfile on the SD card to fit both models into memory, severely degrading system
    performance.
  napkin_math: 'Memory required: 0.5GB (OS) + 1.2GB (Model A) + 1.2GB (Model B) = 2.9GB. Physical RAM
    = 2.0GB. Deficit = 0.9GB. Swap latency on SD card (reads at ~20MB/s) for 0.9GB would stall inference
    for 45 seconds per swap, missing the 30fps (33ms) requirement entirely. Multiplexing (swapping models
    in RAM from eMMC at 200MB/s) takes ~6 seconds of downtime per swap.'
