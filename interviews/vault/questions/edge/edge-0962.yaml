title: 'Edge New 0026'
scenario: 'An outdoor Orin reaches 85°C. To prevent hardware damage, thermal throttling drops compute from 275 TOPS to 100 TOPS. The multi-modal pipeline needs 120 TOPS at 30 FPS.'
question: 'When Orin throttles to 100 TOPS but the pipeline needs 120 TOPS at 30 FPS, how should it gracefully degrade?'
details:
  realistic_solution: 'Under strict thermal throttling, the hardware simply cannot support 120 TOPS. The system must invoke graceful degradation. The tradeoff choices are: drop the frame rate by 20% (to 25 FPS) or disable non-critical models (like audio processing) to keep vision at 30 FPS. For autonomous navigation, maintaining the spatial vision loop at 30 FPS and sacrificing audio/telemetry accuracy ensures collision avoidance is uncompromised.'
  common_mistake: 'Allowing the OS to natively stall the CUDA kernels unpredictably rather than deterministically dropping frames or sub-models.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Required compute: 120 TOPS at 30 FPS.
    - Throttled limit: 100 TOPS.
    - Aux models (audio/telemetry): 0.6 TOPS/frame.

    **Calculations:**
    - Compute per full frame: 120 TOPS / 30 FPS = 4 TOPS/frame.
    - Max FPS for full model: 100 TOPS / 4 TOPS/frame = 25 FPS.
    - Compute for vision only: 4 TOPS/frame - 0.6 TOPS/frame = 3.4 TOPS/frame.
    - TOPS for vision at 30 FPS: 3.4 TOPS/frame * 30 FPS = 102 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Drop aux models to maintain 30 FPS (Compute-Bound)**. Prioritizing critical spatial vision ensures collision avoidance.
