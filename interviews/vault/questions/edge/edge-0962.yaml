title: Edge New 0026
scenario: An outdoor Orin reaches 85°C. To prevent hardware damage, thermal throttling drops compute from
  275 TOPS to 100 TOPS. The multi-modal pipeline needs 120 TOPS at 30 FPS. Analyze the graceful degradation
  tradeoff.
details:
  realistic_solution: 'Under strict thermal throttling, the hardware simply cannot support 120 TOPS. The
    system must invoke graceful degradation. The tradeoff choices are: drop the frame rate by 20% (to
    25 FPS) or disable non-critical models (like audio processing) to keep vision at 30 FPS. For autonomous
    navigation, maintaining the spatial vision loop at 30 FPS and sacrificing audio/telemetry accuracy
    ensures collision avoidance is uncompromised.'
  common_mistake: Allowing the OS to natively stall the CUDA kernels unpredictably rather than deterministically
    dropping frames or sub-models.
  napkin_math: 'Required: 120 TOPS / 30 FPS = 4 TOPS/frame. Throttled limit: 100 TOPS. Max FPS for full
    model: 100 / 4 = 25 FPS. Alternatively, drop 0.6 TOPS/frame of aux models: 3.4 TOPS/frame * 30 FPS
    = 102 TOPS (close to limit).'
