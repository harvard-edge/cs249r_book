title: Optimizing Dataset Curation for Hailo-8 Edge Deployment
scenario: Your team is developing an industrial defect detection system deployed on a fleet of edge devices. The current model exhibits a persistently high false positive rate for a critical defect. You must optimize the dataset curation workflow to rapidly address this issue.
question: How would you diagnose the bottleneck in the current data pipeline and quantify the potential improvement of your proposed solution, leveraging the NPU's capabilities?
details:
  realistic_solution: Implement an active learning strategy leveraging the on-device NPU for continuous data filtering. Stream only high-uncertainty samples back for human annotation, heavily utilizing INT8 throughput for efficient edge-side triage.
  common_mistake: |
    **The Pitfall:** Collecting and manually labeling more data randomly without strategic prioritization.
    **The Rationale:** Candidates overlook edge-compute capabilities for on-device active learning and data curation.
    **The Consequence:** Slow iteration cycles, exorbitant annotation costs, and minimal performance gain on targeted edge cases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50,000 new images/day collected.
       - Current random sampling: 20% (10,000 images). 30 sec/image annotation.
       - Inference takes ~5ms/image. Active learning flags 5% (2,500 images).
    2. **Calculations:**
       - Current annotation: 10,000 images * 30 sec = 83.3 hours/day.
       - Active learning inference: 50,000 * 5ms = 250 seconds/day.
       - Active learning annotation: 2,500 images * 30 sec = 20.8 hours/day.
    3. **Conclusion & Interpretation:**
       - **Result: 80% reduction in annotation cost. Human-Annotation-Bound.**
