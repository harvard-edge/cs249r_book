title: 'Edge Queueing Theory Design: Burst Traffic Handling with Jetson Buffer'
scenario: Design a burst buffer for a Jetson Orin (32GB LPDDR5, 275 TOPS INT8) security camera system that handles periodic bursts: normal traffic 10 events/s, burst traffic 80 events/s for 5-second windows every 5 minutes. Inference time is 20ms each.
question: How large should the burst buffer be, what overflow policy should it use, and what maximum queue latency occurs during the 80 events/s bursts?
details:
  realistic_solution: 'Jetson Orin capacity: μ=1/0.02=50 events/s. During burst: λ=80 > μ=50, so ρ=1.6 > 1 → queue grows. Queue growth rate during burst: (λ-μ)=30 events/s for 5 seconds = 150 events queued. Buffer needed: 150 events. After burst: λ=10, drain rate = μ-λ = 40 events/s. Drain time: 150/40 = 3.75 seconds. Max queue latency at end of burst: 150 events / μ = 150/50 = 3 seconds additional. Peak latency: 3s + 20ms service = 3.02s. Overflow policy: drop events > 150 queued (about 0.1% of 5-minute traffic).'
  common_mistake: |
    **The Pitfall:** Sizing the buffer purely for steady-state traffic or failing to calculate the post-burst drain time.
    **The Rationale:** Candidates look at average throughput rather than modeling the queue growth dynamics during the burst window.
    **The Consequence:** The system silently drops critical security events during the 5-second burst because the buffer size is drastically underestimated.
  napkin_math: |
    1. Calculate Orin processing capacity (μ): 1 / 0.02s = 50 events/s.
    2. Calculate burst accumulation rate: Burst (λ=80) - Capacity (μ=50) = 30 events/s added to queue.
    3. Calculate buffer size required: 30 events/s * 5 seconds = 150 events. (At ~1MB/frame, 150MB easily fits in 32GB RAM).
    4. Calculate max queue latency at end of burst: 150 events / 50 events/s = 3 seconds wait time.
    5. Calculate post-burst drain time: Normal (λ=10). Drain rate = 50 - 10 = 40 events/s. Drain time = 150 / 40 = 3.75 seconds.
    **The buffer must hold 150 events. Maximum queue latency reaches 3.02s (3s wait + 20ms processing), and the system recovers 3.75 seconds after the burst ends.**
