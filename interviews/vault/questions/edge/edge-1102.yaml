title: 'Edge Queueing Theory Design: Burst Traffic Handling with Jetson Buffer'
scenario: 'Design a burst buffer for a Jetson Orin security camera system that handles periodic bursts: normal traffic 10 events/s, burst traffic 80 events/s for 5-second windows every 5 minutes. Inference time is 20ms each.'
question: How large should the burst buffer be, what overflow policy should it use, and what maximum queue latency occurs during the 80 events/s bursts?
details:
  realistic_solution: Model the system using deterministic queuing theory. The Orin's service rate (μ) is 50 events/s. During the burst (λ = 80 events/s), the arrival rate exceeds the service rate, causing linear queue growth. The buffer must be sized to absorb the exact delta between arrival and service rates over the 5-second window. The overflow policy should drop subsequent events (tail drop) to preserve system stability, and max latency is observed at the exact end of the burst window.
  common_mistake: |
    **The Pitfall:** Sizing the buffer based on the average arrival rate across the 5-minute window rather than calculating peak accumulation.
    **The Rationale:** Engineers apply steady-state averages instead of calculating the dynamic integral of the burst window (Accumulation = (Arrival - Service) * Time).
    **The Consequence:** The queue silently overflows during every 5-second burst, resulting in critical security events being permanently dropped.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference time: 20ms = 50 events/s service rate (μ).
       - Burst arrival rate (λ): 80 events/s.
       - Burst duration: 5 seconds.
    2. **Calculations:**
       - Queue accumulation rate = λ - μ = 80 - 50 = 30 events/s.
       - Required Buffer Size = 30 events/s * 5 seconds = 150 events.
       - Max queue latency (at t=5s) = 150 events in queue / 50 events/s service rate = 3.0 seconds.
       - Post-burst drain rate = μ - normal_λ = 50 - 10 = 40 events/s.
       - Drain time = 150 events / 40 events/s = 3.75 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 150-event buffer, 3.0s max wait time. The system is temporarily Queue-Bound during the burst but remains mathematically stable and recovers in 3.75s.**
