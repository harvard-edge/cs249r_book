title: Architecting Multi-Model Memory-Mapped Inference on Cloud AI 100
scenario: You are designing an on-premise video analytics appliance powered by a single
  Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system
  must run 5 different computer vision models concurrently across 20 video streams.
  Total model weights exceed the 32GB memory capacity if loaded redundantly by separate
  processes. Architect a memory-mapped inference system to minimize cold start times
  when switching models and maximize shared memory usage across the inference processes.
question: How would you design memory-mapped model sharing for 5 CV models across
  20 streams on a 32 GB Cloud AI 100 appliance?
details:
  realistic_solution: Design a centralized model manager that memory-maps (mmap) the
    model weights into host RAM as read-only shared memory. The individual inference
    processes attach to this shared memory segment. For the accelerator, use the platform's
    API to register these shared memory regions for direct DMA transfers, ensuring
    weights are loaded into the Cloud AI 100's memory on-demand without duplicating
    them in host RAM.
  common_mistake: Candidates often propose copying weights into each process's memory
    space, which immediately OOMs the 32GB limit. Another mistake is ignoring the
    DMA overhead when memory-mapping directly from host storage to the accelerator
    without pinning memory or using zero-copy APIs.
  napkin_math: If each of the 5 models is 4GB (INT8), total unique weight size is
    20GB. If 20 concurrent processes loaded them naively, the footprint would be 20
    * 4GB = 80GB, far exceeding the 32GB LPDDR4x capacity. Using shared mmap, total
    memory used for weights is exactly 20GB. This leaves 12GB of the 32GB capacity
    available for intermediate activations and IO buffers, fitting safely within the
    hardware constraints.
