title: Architecting Multi-Model Memory-Mapped Inference on Cloud AI 100
scenario: You are designing an on-premise video analytics appliance powered by a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x). The system must run 5 different computer vision models concurrently across 20 video streams. Total model weights exceed the 32GB memory capacity if loaded redundantly by separate processes.
question: How would you design memory-mapped model sharing for 5 CV models across 20 streams on a 32 GB Cloud AI 100 appliance?
details:
  realistic_solution: Design a centralized model manager that memory-maps (mmap) the model weights into host RAM as read-only shared memory. The individual inference processes attach to this shared memory segment. For the accelerator, use the platform's API to register these shared memory regions for direct DMA transfers, ensuring weights are loaded into the Cloud AI 100's memory on-demand without duplicating them in host RAM.
  common_mistake: |
    **The Pitfall:** Copying weights into each process's memory space or ignoring DMA overhead.
    **The Rationale:** Candidates often rely on standard OS process isolation where each process loads its own copy of the model.
    **The Consequence:** Loading redundant models quickly causes an Out-Of-Memory (OOM) error, or failing to use zero-copy APIs causes massive CPU/memory bandwidth bottlenecks.
  napkin_math: |
    1. Unique models: 5 models * 4GB (INT8) = 20GB total unique weights.
    2. Naive redundant loading (20 processes): 20 * 4GB = 80GB (OOM, exceeds 32GB).
    3. Shared mmap approach: Memory used for weights is exactly 20GB.
    4. Remaining memory: 32GB - 20GB = **12GB** available for activations and IO buffers.
