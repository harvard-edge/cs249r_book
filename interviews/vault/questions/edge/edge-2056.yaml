title: Coral Edge TPU Adversarial Defense Performance Bottleneck
scenario: Your team manages a real-time surveillance system running an INT8 object detection model on a Google Coral Edge TPU (4 TOPS, 2W). The system requires an end-to-end latency of ≤50ms per frame. To counter an adversarial vulnerability, a randomized denoising autoencoder defense layer was added. Because it was designed using floating-point operations, it introduced an additional 12ms latency, pushing the total latency to 52ms.
question: What is causing the 12 ms defense bottleneck on the Coral Edge TPU, and how would you optimize it to meet the 50 ms latency budget?
details:
  realistic_solution: Perform Quantization-Aware Training (QAT) to map the FP32 autoencoder to INT8. Compile the integrated graph to entirely eliminate host CPU offloading and PCIe context switching latency.
  common_mistake: |
    **The Pitfall:** Ignoring the TPU's precision constraints.
    **The Rationale:** Developers often implement defenses using familiar FP32 libraries, forgetting that dedicated edge accelerators like Coral require strictly INT8 quantized graphs for hardware execution.
    **The Consequence:** Forcing expensive host CPU execution and context-switching that destroys the real-time latency budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency Budget: ≤50 ms.
       - Baseline TPU Execution: 40 ms.
       - Defense CPU Execution (FP32): 12 ms.
       - Current Total Latency = 40 + 12 = 52 ms (Breaks budget).
    2. **Calculations:**
       - Conservative speedup mapping FP32 CPU to INT8 TPU = 6x.
       - Optimized Defense Latency (INT8 TPU) = 12 ms / 6 = 2 ms.
       - New Total Latency = 40 ms (Baseline) + 2 ms (Defense) = 42 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 42ms Total Latency (Compute-Bound)** - Quantization and fusing graphs eliminates CPU context-switching, easily meeting the 50ms budget.
