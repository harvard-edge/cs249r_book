title: Tensor Core Availability on Edge GPUs
scenario: The Jetson Orin has an Ampere-architecture GPU with 2048 CUDA cores and 64 Tensor Cores. A MobileNetV2 model uses depthwise separable convolutions, which decompose into many small matrix multiplications (3×3×1 per channel).
question: For a 3×3 depthwise conv with 320 channels over 7×7 positions, how many FLOPs is it, and why does this operation fail to utilize Tensor Cores?
details:
  realistic_solution: DW conv FLOPs = channels × kernel_size × spatial × 2 FLOPs/MAC = 320 × 9 × 49 × 2 = 282K FLOPs. Tensor Cores require minimum tile sizes (16×16×16 on Ampere) and specific data layouts. Depthwise convolutions produce tiny per-channel matmuls that are too small to fill a single Tensor Core tile, causing the workload to fall back to the slower CUDA cores.
  common_mistake: |
    **The Pitfall:** Assuming all convolutions benefit equally from Tensor Cores.
    **The Rationale:** Candidates count the total operations and incorrectly assume that the GPU scheduler will automatically pack them into the Tensor Cores, ignoring the physical hardware tile size requirements.
    **The Consequence:** They drastically overestimate the achievable inference throughput for networks heavily reliant on depthwise convolutions.
  napkin_math: |
    - **Depthwise separable conv dimensions:** 3×3 DW conv on 320 input channels, 49 spatial positions (7×7).
    - **MACs:** 320 × 9 × 49 = 141,120 MACs.
    - **FLOPs:** 141,120 MACs × 2 FLOPs/MAC = 282,240 FLOPs.
    - **Conclusion:** **~282K FLOPs** (not 141K, which incorrectly counts MACs as FLOPs). This matrix is fundamentally too small to utilize the 16x16x16 Tensor Core tile.
