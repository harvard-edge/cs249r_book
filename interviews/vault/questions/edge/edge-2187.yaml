title: Tensor Core Availability on Edge GPUs
scenario: The Jetson Orin has Ampere-architecture GPU with 2048 CUDA cores and 64
  Tensor Cores. A MobileNetV2 model uses depthwise separable convolutions, which decompose
  into many small matrix multiplications (3×3×1 per channel). Explain why these small
  matmuls fail to utilize Tensor Cores and what the throughput implications are.
question: For a 3×3 depthwise conv with 320 channels over 7×7 positions, how many
  FLOPs is it, and why is 141K wrong?
details:
  realistic_solution: DW conv FLOPs = channels × kernel_size × spatial × 2 FLOPs/MAC
    = 320 × 9 × 49 × 2 = 282K FLOPs (not 141K which only counts MACs not FLOPs).
  common_mistake: Assuming all convolutions benefit equally from Tensor Cores. Tensor
    Cores require minimum tile sizes (16×16×16 on Ampere) and specific data layouts.
    Depthwise convolutions produce tiny per-channel matmuls that are too small to
    fill a single Tensor Core tile.
  napkin_math: 'Depthwise separable conv FLOPs: 3×3 DW conv on 320 input channels,
    49 spatial positions (7×7): FLOPs = 320 × 9 × 49 × 2 FLOPs/MAC = 320 × 9 × 49
    × 2 = 282,240 FLOPs ≈ 282K FLOPs (not 141K which uses 1 FLOP/MAC instead of 2
    FLOPs/MAC for multiply-accumulate).'
