math_issues:
- 320 channels × 9 MACs × 49 spatial = 141,120 MACs, which is ~282K FLOPs, not 141K
  FLOPs. The compute time division incorrectly treats MACs as FLOPs when dividing
  by the 5.3 TFLOPS throughput.
