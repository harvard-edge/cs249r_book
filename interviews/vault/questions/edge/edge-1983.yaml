title: Optimizing CNN Inference on Hailo-8 for Edge Deployment
scenario: You are deploying a new computer vision model (a large CNN) to an edge device powered by a dataflow accelerator. The accelerator provides up to 26 TOPS for INT8 operations with a typical power consumption of 2.5W. Your model needs to process 30 frames per second with minimal latency, and the device has strict power constraints.
question: How would you schedule CNN operators to hit 30 FPS while optimizing memory reuse, parallelism, and layer fusion?
details:
  realistic_solution: Leverage the proprietary dataflow compiler to enact aggressive graph fusion. Identify sequences of operators (e.g., Conv-BN-ReLU) that can be fused into a single 'super-layer' to eliminate intermediate memory writes. Orchestrate parallel execution of independent computational graphs concurrently on different processing elements to keep execution strictly on-chip.
  common_mistake: |
    **The Pitfall:** Focusing only on INT8 quantization while ignoring graph topology.
    **The Rationale:** Candidates incorrectly treat edge deployment merely as a precision downgrade, ignoring the dataflow architecture's unique spatial constraints.
    **The Consequence:** Naive operator scheduling leads to immense data movement and frequent external memory accesses, blowing the 2.5W power budget and missing 30 FPS entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 26 TOPS INT8 capacity.
       - Target throughput: 30 FPS.
       - Compute requirement: 100 Giga-Operations (GOPS) per frame.
    2. **Calculations:**
       - Throughput Demand: 100 GOPS * 30 FPS = 3000 GOPS/sec = 3 TOPS.
       - Hardware Utilization: 3 TOPS / 26 TOPS capacity = ~11.5% utilization.
       - Memory Danger: If each GOPS involved 0.5 bytes of memory access, 3 TOPS implies 1.5 TB/s of bandwidth.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Compute is trivially met at 11.5% utilization, but raw bandwidth hits an impossible 1.5 TB/s. Aggressive layer fusion is absolutely mandatory to keep data routing on-chip.
