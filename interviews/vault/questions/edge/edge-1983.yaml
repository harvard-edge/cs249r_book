title: Optimizing CNN Inference on Hailo-8 for Edge Deployment
scenario: You are deploying a new computer vision model (a large CNN) to an edge device powered by the Hailo-8 AI accelerator. The Hailo-8 provides up to 26 TOPS (Tera-Operations Per Second) for INT8 operations with a typical power consumption of 2.5W. Your model needs to process 30 frames per second with minimal latency, and the device has strict power constraints.
question: How would you schedule CNN operators on Hailo-8 to hit 30 FPS while optimizing memory reuse, parallelism, and layer fusion?
details:
  realistic_solution: 'The solution involves leveraging Hailo-8''s proprietary dataflow compiler. This entails: 1. **Graph Analysis for Fusion:** Identify sequences of operators (e.g., Conv-BN-ReLU) that can be fused into a single ''super-layer'' to reduce intermediate memory writes. 2. **Memory Reuse Scheduling:** Analyze data dependencies to schedule operations such that outputs are immediately consumed, crucial given the absence of external DDR. 3. **Parallel Execution Orchestration:** Schedule independent computational graphs concurrently on different processing elements. 4. **Profiling and Iteration:** Refine operator scheduling iteratively to meet targets.'
  common_mistake: |
    **The Pitfall:** Focusing only on INT8 quantization while ignoring graph topology.
    **The Rationale:** Candidates incorrectly treat edge deployment merely as a precision downgrade, ignoring the Hailo-8's unique spatial dataflow constraints.
    **The Consequence:** Naive operator scheduling leads to immense data movement and frequent external memory accesses, blowing the 2.5W power budget and missing 30 FPS entirely.
  napkin_math: |
    1. **Compute Requirement:** Assume a CNN needs 100 Giga-Operations (GOPS) per frame.
    2. **Throughput Demand:** 100 GOPS * 30 FPS = 3000 GOPS/sec = 3 TOPS.
    3. **Utilization:** 3 TOPS / 26 TOPS capacity = **~11.5% utilization**, easily fitting the compute budget.
    4. **Bandwidth Danger:** If each GOPS involved 0.5 bytes of memory access, 3 TOPS implies 1.5 TB/s of bandwidth, impossible for edge devices. This demands layer fusion to keep data on-chip.
