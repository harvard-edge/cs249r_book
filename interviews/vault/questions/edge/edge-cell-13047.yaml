title: 'Edge Queueing Theory Mastery: Queueing Analysis for Robot Fleet Coordinator'
scenario: 'Design the inference queueing architecture for a warehouse robot fleet: 20 robots each sending
  10 perception requests/s (λ=200 req/s). Requests are 30% heavy (3D scene reconstruction, 200ms service
  on Jetson Orin 60W) and 70% light (obstacle check, 5ms). Total P99 SLO: 500ms. Design a priority queue
  system with M/G/1 analysis, and verify power fits in 200W budget.'
question: "How many Jetson Orins are needed for the mixed heavy/light workload, can priority queues meet the 500 ms P99 SLO, and does power fit 200W?"
details:
  realistic_solution: 'Heavy: λ_h=60/s, service 0.2s. Light: λ_l=140/s, service 0.005s. Total load ρ =
    60*0.2 + 140*0.005 = 12+0.7 = 12.7 Erlangs from ONE server — system is hugely overloaded on single
    Jetson. Need multiple Jetson Orins. At c servers: ρ_total = 12.7/c < 1 → c≥13. Use 16 Jetsons for
    headroom. ρ=12.7/16=0.794. With priority (light preempts heavy): light sees ρ_l=140*0.005/16=0.044,
    Wq_l≈5.6ms, P99_light≈50ms. Heavy: Wq_h≈200ms, P99_heavy≈1.2s — exceeds SLO. Need 20 Jetsons: ρ_h=0.6,
    Wq_h≈45ms, P99_heavy=1.1s still over. Solution: asynchronous processing for heavy tasks (stream results
    when ready, SLO=2s).'
  common_mistake: Using M/M/1 for a mixed-class workload instead of M/G/1 with P-K formula, and not recognizing
    that the two classes need separate analysis under priority scheduling.
  napkin_math: 'Per Jetson: μ_h=5/s, μ_l=200/s. Fleet at 20 Jetsons: μ_h_total=100/s, μ_l_total=4000/s.
    Load: ρ_h=60/100=0.6, ρ_l=140/4000=0.035. M/G/1 per class with priority: light Wq≈ρ_l/(μ_l_total*(1-ρ_l))=0.035/(4000*0.965)=9μs,
    P99_light=0.023ms. Heavy Wq=ρ_h/(μ_h_total*(1-ρ_h-ρ_l)) = 0.6/(100*(1-0.635))=0.6/36.5=16.4ms, W_h=200+16.4=216ms,
    P99=1s. Power: 20*60=1200W >> 200W budget. Need Hailo-8 for light requests (0.005s * 26000TOPS >>
    sufficient). 20 Hailo-8 at 2.5W=50W for light. 4 Jetsons for heavy=240W. Over budget. Trade: 2 Jetsons
    (120W)+20 Hailo(50W)=170W < 200W. Re-check: 2 Jetsons for heavy: μ_h=10/s, ρ=6.0 — still overloaded.
    Need asynchronous heavy tasks with best-effort SLO.'
