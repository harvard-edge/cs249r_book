title: 'The Edge Transformer Parameter Tax'
scenario: 'You are designing a real-time object detection model for a new edge device, like a smart doorbell, with a very limited memory budget. Your team is debating the first layer of the network which processes 64x64 patches of the input image.'
question: 'Which first-layer design is more memory-efficient for the 64x64 patch model: self-attention or a depthwise separable convolution?'
details:
  realistic_solution: 'The depthwise separable convolution is significantly more memory-efficient. The parameter cost of a transformer self-attention layer scales quadratically with the embedding dimension, while the depthwise separable convolution scales linearly.'
  common_mistake: |
    **The Pitfall:** Confusing computational complexity (FLOPs) with parameter cost (memory).
    **The Rationale:** Engineers often think Transformers are cheaper because attention is just matrix multiplication, forgetting that weight matrices dictate memory cost.
    **The Consequence:** Designing models that severely exceed the SRAM memory budget of the edge device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding (C) = 128. Kernel (K) = 3.
    - Patch size: 64x64. FP16 format (2 bytes/param).

    **Calculations:**
    - ViT Attention params: 4 * 128 * 128 = 65,536. Memory = 131 KB.
    - Depthwise Conv params: (128 * 3 * 3) + (128 * 128) = 17,536. Memory = 35 KB.
    - Memory Ratio: 131 KB / 35 KB = 3.74.

    **Conclusion & Interpretation:**
    - **Result: ~3.7x less memory (Memory-Capacity-Bound)**. Depthwise convolutions efficiently avoid the O(C^2) self-attention parameter tax.
  options:
    - 'The Transformer is cheaper; its parameter cost is 128*128 which is less than the 3*3*128*128 of a standard CNN.'
    - 'The CNN is cheaper; it has ~17.5k parameters while the Transformer has ~65.5k, a ~3.7x difference.'
    - 'They are roughly equal; the Transformer 4*128*128 cost is similar to a standard convolution 3*3*128*128 cost.'
    - 'The Transformer is cheaper; the attention calculation softmax(Q*K^T) has no parameters, making it more efficient.'
  correct_index: 1
