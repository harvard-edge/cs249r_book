title: The Edge Transformer Parameter Tax
scenario: You're designing a real-time object detection model for a new edge device, like a smart doorbell, with a very limited memory budget. Your team is debating the first layer of the network which processes 64x64 patches of the input image.
question: Which first-layer design is more memory-efficient for the 64x64 patch model: self-attention or a depthwise separable convolution?
details:
  realistic_solution: The depthwise separable convolution is significantly more memory-efficient. The parameter cost of a transformer's self-attention layer scales quadratically with the embedding dimension, while the depthwise separable convolution scales linearly.
  common_mistake: |
    **The Pitfall:** Confusing computational complexity (FLOPs) with parameter cost (memory).
    **The Rationale:** Engineers often think Transformers are cheaper because attention is just matrix multiplication, forgetting that weight matrices dictate memory cost.
    **The Consequence:** Designing models that severely exceed the SRAM memory budget of the edge device.
  napkin_math: |
    - Embedding dimension (C) = 128. Kernel size (K) = 3.
    - Transformer Self-Attention (Wq, Wk, Wv, Wo): 4 * C * C = 4 * 128 * 128 = 65,536 parameters.
    - Transformer Memory (FP16): 65,536 * 2 bytes = 131 KB.
    - Depthwise Separable Conv: Depthwise (C * K * K) + Pointwise (C * C) = (128 * 3 * 3) + (128 * 128) = 1,152 + 16,384 = 17,536 parameters.
    - Conv Memory (FP16): 17,536 * 2 bytes = 35 KB.
    - **Conclusion: Depthwise Separable Conv uses ~3.7x less memory than Transformer Attention.**
  options:
  - The Transformer is cheaper; its parameter cost is `128*128` which is less than the `3*3*128*128` of a standard CNN.
  - The CNN is cheaper; it has ~17.5k parameters while the Transformer has ~65.5k, a ~3.7x difference.
  - They are roughly equal; the Transformer's `4*128*128` cost is similar to a standard convolution's `3*3*128*128` cost.
  - The Transformer is cheaper; the attention calculation `softmax(Q*K^T)` has no parameters, making it more efficient.
  correct_index: 1
