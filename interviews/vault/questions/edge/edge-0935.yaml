title: Mobile Speculative Decoding Energy Efficiency
scenario: A smartphone runs a 3B parameter LLM locally. Standard autoregressive generation draws 4W and produces 10 tokens/sec. Speculative decoding uses a 100M draft model (draws 1W) and verifies using the 3B model (draws 4W). A verification step takes 100ms, evaluates 4 draft tokens in parallel, and has an average acceptance rate of 2.5 tokens per step.
question: What is the Joules-per-token cost of standard generation versus speculative decoding on the smartphone LLM?
details:
  realistic_solution: Calculate the energy consumed per token for standard generation. For speculative decoding, calculate the total energy per step (drafting + parallel verification) and divide by the expected number of accepted tokens per step. Speculative decoding not only reduces latency but can significantly improve energy efficiency on battery-constrained devices, provided the acceptance rate is high enough to offset the draft model's overhead and the higher peak power draw.
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding inherently uses more energy because it runs two models concurrently and hits a higher peak power limit.
    **The Rationale:** Engineers often equate higher peak power (5W total) directly with higher energy consumption, ignoring the massive reduction in execution time.
    **The Consequence:** Rejecting a valid optimization technique that actually cuts the overall battery drain in half.
  napkin_math: |
    - **Standard Generation:** 10 tokens/s = 100ms/token.
    - **Standard Energy:** 4W * 0.1s = **0.4 J/token**.
    - **Speculative Drafting:** Drafting 4 tokens takes 100ms. Energy = 1W * 0.1s = 0.1 J.
    - **Speculative Verification:** Verifying takes 100ms. Energy = 4W * 0.1s = 0.4 J.
    - **Total Speculative Step Energy:** 0.1 J + 0.4 J = 0.5 J.
    - **Speculative Energy per Token:** 0.5 J / 2.5 accepted tokens = **0.2 J/token**.
    - **Conclusion:** Speculative decoding cuts energy consumption by **50%**.
