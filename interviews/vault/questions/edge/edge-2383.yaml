title: Energy Costs of Accelerator Initialization Versus Inference
scenario: A remote wildlife camera operates on solar power. A passive infrared sensor wakes a host MCU, which then powers on an edge accelerator to process an image.
question: Evaluate the total energy cost per positive detection if the accelerator requires 500ms to boot and load weights over PCIe before it can perform a 20ms inference.
details:
  realistic_solution: The boot time vastly dominates the energy profile. Boot energy is calculated using the active power state over 500ms, dwarfing the 20ms inference energy. The strategy is highly inefficient; a better approach holds the accelerator in a low-power standby state if the wake interval is short.
  common_mistake: |
    **The Pitfall:** Calculating only the active inference energy.
    **The Rationale:** Candidates often focus solely on the theoretical inference efficiency of the accelerator (e.g., 20ms at 2.5W) and completely ignore the hardware initialization and weight-loading costs.
    **The Consequence:** The solar battery drains significantly faster than predicted, leading to system failure in remote deployments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Accelerator boot time = 500ms.
       * Inference time = 20ms.
       * Active power draw = 2.5W.
    2. **Calculations:**
       * Boot energy = 2.5W * 0.5s = 1.25 Joules.
       * Inference energy = 2.5W * 0.02s = 0.05 Joules.
       * Total energy per detection = 1.25J + 0.05J = 1.30 Joules.
    3. **Conclusion & Interpretation:**
       * **Boot energy (1.25J) constitutes 96% of the total energy cost per detection, proving cold-booting is fundamentally unviable. Result: Power Initialization-Bound.**
