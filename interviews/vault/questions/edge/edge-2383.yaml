title: Energy Costs of Accelerator Initialization Versus Inference
scenario: A remote wildlife camera operates on solar power. A passive infrared sensor
  wakes a host MCU, which then powers on a Hailo-8 to process an image.
question: Evaluate the total energy cost per positive detection if the Hailo-8 requires
  500ms to boot and load weights over PCIe before it can perform a 20ms inference.
details:
  realistic_solution: The boot time vastly dominates the energy profile. Boot energy
    is calculated using the active power state over 500ms, dwarfing the 20ms inference
    energy. The strategy is highly inefficient; a better approach holds the Hailo-8
    in a low-power standby state if the wake interval is short.
  common_mistake: Calculating only the active inference energy and completely ignoring
    the massive accelerator hardware initialization and weight-loading cost.
  napkin_math: Boot energy = 2.5W * 0.5s = 1.25 Joules. Inference energy = 2.5W *
    0.02s = 0.05 Joules. Boot is 96% of the cost.
