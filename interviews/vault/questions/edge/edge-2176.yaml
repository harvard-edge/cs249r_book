title: Incomplete Edge Video Pipeline Spec
scenario: An edge gateway must process 12 camera streams for defect detection. Each stream is 1080p at 30 FPS, but the team has not specified compression format, decode hardware, frame sampling rate, model input size, storage retention, or whether missed frames are allowed.
question: What information is missing before sizing the edge video pipeline, and what raw frame-rate bound can you compute?
details:
  realistic_solution: You can compute the incoming frame rate as 12 x 30 = 360 frames/s, but not the bandwidth or compute budget without compression, resolution after preprocessing, sampling policy, decode path, and drop tolerance. The first design step is to define whether every frame must be processed or whether sampling/event triggers are acceptable.
  common_mistake: |
    **The Pitfall:** Sizing the model server and hardware based on the camera count alone.
    **The Rationale:** Engineers often default to assuming every raw frame must be processed sequentially without considering the massive decode overhead or the application's actual sampling needs.
    **The Consequence:** The team significantly overprovisions (and overspends on) inference hardware, while ironically underprovisioning the video decoding hardware, leading to a system that bottlenecks before inference even begins.
  napkin_math: |
    1. **Raw Frame Rate:** 12 cameras * 30 FPS = 360 FPS total.
    2. **Inference Demand:** If every frame is processed and inference takes 5 ms/frame, total compute time per second is 360 * 0.005s = 1.8 seconds.
    3. **Result:** The system requires at least **1.8 core-equivalents** just for inference, completely ignoring the (likely larger) decode and preprocessing overhead.
