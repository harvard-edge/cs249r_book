title: Incomplete Edge Video Pipeline Spec
scenario: An edge gateway must process 12 camera streams for defect detection. You
  know each stream is 1080p at 30 FPS, but the team has not specified compression
  format, decode hardware, frame sampling rate, model input size, storage retention,
  or whether missed frames are allowed.
question: What information is missing before sizing the edge video pipeline, and what
  raw frame-rate bound can you compute?
details:
  realistic_solution: You can compute the incoming frame rate as 12 x 30 = 360 frames/s,
    but not the bandwidth or compute budget without compression, resolution after
    preprocessing, sampling policy, decode path, and drop tolerance. The first design
    step is to define whether every frame must be processed or whether sampling/event
    triggers are acceptable.
  common_mistake: Sizing the model server from camera count alone and ignoring decode,
    sampling, and frame-drop policy.
  napkin_math: Raw frame rate = 360 FPS. If every frame is processed and each inference
    takes 5 ms, inference demand is 1.8 core-equivalent seconds per second before
    decode and preprocessing.
