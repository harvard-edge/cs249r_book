title: Incomplete Edge Video Pipeline Spec
scenario: An edge gateway must process 12 camera streams for defect detection. Each stream is 1080p at 30 FPS, but the team has not specified compression format, decode hardware, frame sampling rate, model input size, storage retention, or whether missed frames are allowed.
question: What information is missing before sizing the edge video pipeline, and what raw frame-rate bound can you compute?
details:
  realistic_solution: You can compute the incoming frame rate as 360 frames/s, but not bandwidth or compute budget without compression, resolution after preprocessing, sampling policy, decode path, and drop tolerance. The first design step is defining whether every frame must be processed or whether sampling is acceptable.
  common_mistake: |
    **The Pitfall:** Sizing the model server and hardware based on the camera count alone.
    **The Rationale:** Engineers often default to assuming every raw frame must be processed sequentially without considering decode overhead or sampling needs.
    **The Consequence:** Overprovisioning inference hardware while underprovisioning video decoding hardware, causing a bottleneck before inference begins.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 12 cameras at 30 FPS.
       - Inference takes 5 ms/frame.
    2. **Calculations:**
       - Raw Frame Rate: 12 * 30 = 360 FPS.
       - Inference Demand: 360 FPS * 0.005s = 1.8 seconds of compute per real-time second.
    3. **Conclusion & Interpretation:**
       - **Result: Minimum 1.8 core-equivalents required for inference alone, ignoring decode overhead. (Compute-Bound)**
