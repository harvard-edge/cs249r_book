title: Optimizing Hailo-8 OTA Updates
scenario: We deploy an edge camera system using a Hailo-8 accelerator (26 TOPS INT8,
  2.5W). Because the Hailo-8 has no local DRAM and streams data directly from host
  memory, the host's memory bus is heavily utilized during inference. During an OTA
  model update over a 5 Mbps cellular link, downloading and writing the full 50MB
  model binary to the inactive A/B flash partition saturates the shared host memory
  bus, causing severe inference frame drops.
question: How would you prevent a 50MB OTA update over 5 Mbps from starving Hailo-8
  inference on the shared host memory bus?
details:
  realistic_solution: The correct approach is to implement binary delta updates (e.g.,
    bsdiff) to drastically reduce the OTA payload size, combined with rate-limiting
    the flash programming. By writing to flash in small chunks, the system avoids
    starving the Hailo-8 of the host memory bandwidth it requires.
  common_mistake: Candidates often suggest stopping inference during the update or
    adding more RAM to the host, ignoring strict uptime and hardware cost constraints.
    They fail to analyze the architectural interaction between the Hailo-8's host-memory
    streaming dependency and the flash DMA contention.
  napkin_math: 'Original OTA transfer: 50MB payload over a 5 Mbps link = (50MB * 8
    bits/byte) / 5 Mbps = 80 seconds of network and bus contention. A delta update
    for a minor INT8 weight tuning reduces the payload by 90% to 5MB. New transfer
    time: (5MB * 8 bits/byte) / 5 Mbps = 8 seconds. Rate-limiting flash writes to
    500 KB/s extends the write time to 10 seconds but strictly bounds memory bus utilization,
    guaranteeing the Hailo-8 maintains the streaming bandwidth needed for continuous
    26 TOPS processing.'
