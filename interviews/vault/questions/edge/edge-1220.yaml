title: 'Encoder vs Decoder Utilization on Jetson Orin'
scenario: 'You are deploying a 2-billion parameter natural language application on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The team compares an encoder-only model (parallel processing) and an autoregressive decoder-only model, both quantized to INT8 to occupy 2GB of memory. During testing, the encoder achieves near-peak utilization of the 275 TOPS Ampere GPU during sequence processing. However, during the token generation phase of the decoder model, compute utilization drops drastically, resulting in high latency.'
question: 'What is the decoder generation arithmetic intensity on the Jetson Orin, and why does it bottleneck while the encoder does not?'
details:
  realistic_solution: 'The performance drop occurs because autoregressive decoding processes one token at a time, requiring the entire 2GB model weights to be loaded from the LPDDR5 memory for every single generated token. This results in an extremely low arithmetic intensity, severely bottlenecking the system on memory bandwidth rather than compute. The Ampere GPU''s massive 275 TOPS compute capacity is left starved for data.'
  common_mistake: 'Candidates often assume that because both models have 2 billion parameters and run on the same 275 TOPS INT8 accelerator, they will have similar latency profiles. They fail to distinguish between the compute-bound nature of parallel matrix multiplications in an encoder and the memory-bandwidth-bound nature of autoregressive generation in a decoder.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 2 billion parameters quantized to INT8 (1 byte per parameter) = 2 GB of weights.
    - Accelerator: Jetson Orin (32 GB LPDDR5, 275 TOPS INT8).
    - LPDDR5 bandwidth: ~200 GB/s.

    **Calculations:**
    - Compute needed per generated token: 2B parameters * 2 operations (MAC) = 4 GOPS.
    - Arithmetic Intensity: 4 GOPS / 2 GB loaded = 2 OPS/byte.
    - Theoretical compute time: 4 GOPS / 275,000 GOPS = ~0.0145 ms per token.
    - Memory load time: 2 GB / 200 GB/s = 10 ms per token.

    **Conclusion & Interpretation:**
    - **Result: 10 ms memory load vs 0.0145 ms compute (Memory-Bandwidth Bound)**. The generation phase is memory-bound by a factor of ~690x, starving the massive 275 TOPS Ampere GPU.
