title: Evaluating Unified Memory Asynchronous Transfers on SoC
scenario: An AGX Orin processes radar data using custom CUDA kernels while receiving gigabit ethernet packets. The network thread copies data to pinned host memory, then asynchronously copies it to device memory.
question: Evaluate why the memory copies might still serialize with computation despite using asynchronous CUDA APIs.
details:
  realistic_solution: Since Orin has a unified memory architecture, pinned host memory and device memory physically reside in the same LPDDR5 RAM. An explicit `cudaMemcpyAsync` consumes memory bandwidth and may sync on default streams, effectively serializing the GPU execution rather than operating like a discrete PCIe transfer.
  common_mistake: |
    **The Pitfall:** Treating the Orin SoC like a discrete GPU.
    **The Rationale:** Candidates assume there is a separate PCIe bus and dedicated VRAM, leading them to believe that asynchronous DMA transfers happen completely independently of the unified memory controller.
    **The Consequence:** Developers write redundant `cudaMemcpyAsync` calls that actually degrade performance by unnecessarily moving data within the same physical memory, rather than using zero-copy pointers.
  napkin_math: |
    *   1 Gbps = 125 MB/s.
    *   Orin LPDDR5 bandwidth is 204.8 GB/s.
    *   125 MB/s is well within 204.8 GB/s bandwidth.
    *   **The serialization is not due to bandwidth limits, but because unified memory relies on the same physical RAM, making explicit memory copies consume memory controller cycles or sync on default streams.**
