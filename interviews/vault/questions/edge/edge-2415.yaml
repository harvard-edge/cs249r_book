title: Evaluating Unified Memory Asynchronous Transfers on SoC
scenario: An AGX Orin processes radar data using custom CUDA kernels while receiving
  gigabit ethernet packets. The network thread copies data to pinned host memory,
  then asynchronously copies it to device memory.
question: Evaluate why the memory copies might still serialize with computation despite
  using asynchronous CUDA APIs.
details:
  realistic_solution: Since Orin has a unified memory architecture, pinned host memory
    and device memory physically reside in the same LPDDR5 RAM. An explicit `cudaMemcpyAsync`
    consumes memory bandwidth and may sync on default streams, effectively serializing
    the GPU execution rather than operating like a discrete PCIe transfer.
  common_mistake: Treating the Orin SoC like a discrete GPU with a separate PCIe bus
    and dedicated VRAM.
  napkin_math: 1 Gbps = 125 MB/s, well within 204.8 GB/s LPDDR5 bandwidth
