title: The Perception Deadline
scenario: You are designing the perception stack for an autonomous vehicle. The camera sensors feed frames to your system, which runs a multi-task model for object detection and lane segmentation.
question: To ensure the vehicle can react safely to its environment, what is the maximum permissible end-to-end latency for processing a single frame, often referred to as the 'frame budget'?
details:
  realistic_solution: The standard for most automotive perception systems is to operate at 30 frames per second (FPS). This sets a hard real-time deadline of approximately 33 milliseconds per frame. Any processing pipeline—sensor input, preprocessing, inference, and postprocessing—that takes longer than 33ms will start dropping frames, leading to a stale and dangerous representation of the world.
  common_mistake: |
    **The Pitfall:** Confusing edge real-time deadlines with cloud latency targets.
    **The Rationale:** Candidates from web backgrounds assume a 100ms P99 budget is acceptable.
    **The Consequence:** Exceeding the frame budget causes the vehicle's world model to fall out of sync with reality, which can be catastrophic.
  napkin_math: |
    - 1 second / 30 FPS = 0.0333 seconds = **33 ms**.
  options:
  - 100 ms
  - 16 ms
  - 33 ms
  - 1 ms
  correct_index: 2
