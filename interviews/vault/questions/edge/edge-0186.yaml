title: The Perception Deadline
scenario: You are designing the perception stack for an autonomous vehicle. The camera sensors feed frames
  to your system, which runs a multi-task model for object detection and lane segmentation. To ensure
  the vehicle can react safely to its environment, what is the maximum permissible end-to-end latency
  for processing a single frame, often referred to as the 'frame budget'?
question: "To ensure the vehicle can react safely to its environment, what is the maximum permissible end-to-end latency for processing a single frame, often referred to as the 'frame budget'?"
details:
  realistic_solution: The standard for most automotive perception systems is to operate at 30 frames per
    second (FPS). This sets a hard real-time deadline of approximately 33 milliseconds per frame. Any
    processing pipeline—sensor input, preprocessing, inference, and postprocessing—that takes longer than
    33ms will start dropping frames, leading to a stale and dangerous representation of the world.
  common_mistake: Engineers often confuse the hard real-time deadlines of edge systems with the softer
    latency targets of cloud services. A cloud system might have a 100ms P99 budget, but in a self-driving
    car, exceeding the frame budget means the vehicle's world model is out of sync with reality, which
    can be catastrophic. Another mistake is assuming the budget is much smaller, like for UI jank (16ms),
    which is unnecessarily strict for this application.
  napkin_math: The calculation is a direct conversion from the required frames per second (FPS) to a millisecond
    budget. This number is a fundamental constraint in the Edge domain.
  options:
  - 100 ms
  - 16 ms
  - 33 ms
  - 1 ms
  correct_index: 2
