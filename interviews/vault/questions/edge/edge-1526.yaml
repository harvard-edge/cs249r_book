title: Optimizing RAG Pipeline Latency on Jetson Orin
scenario: Your team is deploying a local Retrieval-Augmented Generation (RAG) assistant for a robotics application on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The pipeline consists of an embedding model, a vector search step, and a 7B parameter LLM for generation. You are evaluating two deployment strategies to meet a strict 500ms end-to-end latency budget: Option A runs both the embedding model and the LLM concurrently on the Ampere GPU. Option B pins the embedding model to the Deep Learning Accelerator (DLA) and reserves the GPU exclusively for the LLM.
question: Which architecture do you choose, and how do you allocate resources to ensure predictable latency?
details:
  realistic_solution: Option B is the superior choice. By pinning the embedding model to the DLA, you physically isolate the compute workloads, eliminating GPU context switching. While the DLA might execute the embedding model slightly slower than the GPU would in isolation, it frees up the GPU's Ampere cores entirely for the memory-bandwidth-bound 7B LLM. This provides deterministic execution times for both stages of the pipeline, allowing you to confidently meet the 500ms deadline while staying within the 60W TDP.
  common_mistake: |
    **The Pitfall:** Running both models concurrently on the GPU to maximize theoretical throughput.
    **The Rationale:** Candidates assume that the Ampere GPU will process both models faster than offloading to the slower DLA.
    **The Consequence:** They fail to account for GPU context switching overhead and memory bandwidth contention, leading to unpredictable latency spikes that violate the hard 500ms budget.
  napkin_math: |
    1. **Budget**: 500ms total latency.
    2. **Embedding & Search Overhead**: Embedding on DLA takes ~50ms, vector search on CPU takes ~10ms. Remaining budget for LLM = 440ms.
    3. **LLM Requirements**: A 7B parameter INT4 model requires 3.5GB memory.
    4. **Memory Bandwidth**: Reading 3.5GB of model weights at the Jetson's 204 GB/s bandwidth takes ~17ms per token generation.
    5. **Tokens Generated**: 440ms / 17ms/token = **~25 tokens** generated within budget.
    6. **Conclusion**: Sharing the 204 GB/s bandwidth with the embedding model on the GPU (Option A) would cause memory contention and violate the strict 500ms timing. Option B isolates memory usage.
