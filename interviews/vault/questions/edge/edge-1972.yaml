title: Optimizing a Vision Model on Qualcomm Cloud AI 100 with Kernel Fusion
scenario: You are tasked with deploying a real-time vision model for object detection on the Qualcomm Cloud AI 100. The model pipeline includes several sequential memory-bound operations (e.g., element-wise additions, ReLU activations, normalization layers) followed by a 2D convolution. Profiling reveals significant overhead from frequent kernel launches and memory transfers between these intermediate operations.
question: How would you fuse the memory-bound ops before the 2D convolution on Cloud AI 100 to reduce LPDDR4x traffic, kernel launches, latency, and power?
details:
  realistic_solution: 'The solution would involve: 1) Identifying the sequence of memory-bound element-wise operations that can be fused. 2) Designing a single fused kernel that computes these operations in-place, passing intermediate results through registers or fast on-chip memory (SRAM/cache) rather than writing to and reading from LPDDR4x. 3) Leveraging the Qualcomm Cloud AI 100''s INT8 capabilities for fused operations where possible. 4) Quantifying the reduction in memory bandwidth utilization and kernel launch overhead, leading to lower latency and power consumption within the 75W TDP.'
  common_mistake: |
    **The Pitfall:** Only considering generic CUDA kernel fusion techniques.
    **The Rationale:** Candidates fail to fully leverage the specific architectural features and fast on-chip memory hierarchy of the NPU, or ignore the strict 75W TDP limits.
    **The Consequence:** Developing fused kernels that still write intermediate values to DRAM, nullifying the energy and latency benefits of operator fusion.
  napkin_math: |
    * Unfused: 3 memory-bound ops require 3 kernel launches and 3 round-trips to DRAM.
    * Kernel launch overhead: 3 launches * 50µs = 150µs.
    * DRAM access latency: 3 accesses * 200µs = 600µs.
    * Unfused total overhead: 150µs + 600µs = 750µs.
    * Fused: All 3 ops execute in 1 kernel, using registers/SRAM for intermediate steps, with only 1 final write to DRAM.
    * Fused overhead: 1 launch (50µs) + 1 DRAM access (200µs) = 250µs.
    * Total latency saved by fusion: 750µs - 250µs = **500µs** saved per frame.
