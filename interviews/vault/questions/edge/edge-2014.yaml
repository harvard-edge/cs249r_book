title: Optimizing ONNX Model Deployment on Qualcomm Cloud AI 100 with Operator Coverage Gaps
scenario: 'You are deploying a new computer vision model, trained in PyTorch, to a Qualcomm Cloud AI 100 accelerator. During the ONNX conversion and subsequent attempt to run it with a vendor-provided runtime, you encounter issues related to unsupported operators, leading to performance degradation and fallback to the host CPU.'
question: How would you identify, diagnose, and resolve ONNX operator gaps and delegate work to maximize throughput on the Qualcomm Cloud AI 100?
details:
  realistic_solution: '1. **Pre-conversion Analysis:** Analyze the PyTorch model for custom operators against Qualcomm docs. 2. **ONNX Conversion:** Replace unsupported ops with supported ONNX equivalents. 3. **Runtime Profiling:** Deploy and profile to identify which ops trigger CPU fallback. 4. **Subgraph Partitioning:** Delegate subgraphs to CPU only if data transfer overhead is minimal. 5. **Custom Operator (Plugin):** Develop a custom Hexagon kernel as a last resort. 6. **Quantization Review:** Verify INT8 precision is compatible.'
  common_mistake: |
    **The Pitfall:** Blindly delegating unsupported subgraphs to the host CPU.
    **The Rationale:** Candidates rely on automatic framework fallbacks without considering memory bus physics.
    **The Consequence:** The massive data transfer overhead back and forth to the CPU completely negates the AI 100's 400 TOPS performance.
  napkin_math: |
    1. **Assumptions & Constraints:** Target is 125 FPS (8ms). CPU fallback latency per unsupported op is 4ms.
    2. **Calculations:** Current Total Latency = 8ms + 4ms = 12ms (83.3 FPS). Custom Plugin optimization reduces CPU latency by 75% -> 4ms * 0.25 = 1ms.
    3. **Conclusion & Interpretation:** **Custom plugins are required to bypass framework fallbacks and hit performance targets. Result: Host-Fallback-Bound.**
