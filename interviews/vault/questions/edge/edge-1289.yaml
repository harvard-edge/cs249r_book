title: Diagnosing Latency Spikes on Edge TPUs
scenario: Your team deployed a fleet of INT8-quantized object detection models to remote traffic cameras equipped with Google Coral Edge TPUs via USB. Telemetry dashboards show that during the afternoon, inference latency intermittently spikes from 10ms to over 100ms, and overall throughput drops significantly. The host CPU load remains under 20%, and memory usage is stable.
question: What is the most likely cause of this degradation on the Google Coral Edge TPU, and how would you diagnose it?
details:
  realistic_solution: The root cause is thermal throttling. The Google Coral Edge TPU draws up to 2W under sustained load, generating significant heat. During warm afternoons, rising ambient temperatures cause the passively cooled USB accelerator to hit its thermal limit, triggering the driver to aggressively downclock the device to prevent hardware damage. Diagnosis requires exposing the TPU's onboard temperature sensor metrics to the observability stack.
  common_mistake: |
    **The Pitfall:** Assuming software-level issues like garbage collection pauses or memory leaks.
    **The Rationale:** Candidates trained in cloud environments ignore the physical and environmental constraints of edge hardware, particularly heat dissipation in passive devices.
    **The Consequence:** Wasting engineering cycles analyzing heap dumps or network traffic while the hardware is physically cooking itself and protecting its silicon via downclocking.
  napkin_math: |
    * Normal operation: 4 TOPS at ~2W.
    * Normal inference: 10ms -> Model requires 0.04 tera-operations per inference (4 TOPS * 0.010s).
    * Thermal event: Rising ambient afternoon temperatures max out the passive USB heatsink.
    * Driver reaction: Downclocks the TPU by up to 10x to shed heat.
    * Throttled compute: 4 TOPS / 10 = **0.4 TOPS**.
    * New inference latency: 0.04 tera-operations / 0.4 TOPS = **0.1 seconds (100ms)**.
    * The hardware thermal throttle perfectly accounts for the latency spike.
