title: The OTA Update Tax
scenario: An automotive company spends $2M on R&D for a new driver-assist model. They plan to deploy it to a fleet of 100,000 vehicles. The model is 200MB and will be updated over-the-air (OTA) quarterly over a 5-year vehicle lifespan. The cellular data cost is $5/GB.
question: How does the $2M one-time R&D cost compare to lifetime OTA data costs for 100,000 vehicles over 5 years?
details:
  realistic_solution: |
    The costs are surprisingly similar, demonstrating a critical TCO principle in large-scale edge deployments. The one-time R&D is a sunk cost of $2M. The lifetime data cost for the entire fleet also accumulates to $2M, meaning the operational cost of simply *delivering* the updates is as significant as the cost of creating the model in the first place. At scale, logistics often rival innovation in cost.
  common_mistake: |
    **The Pitfall:** Assuming R&D costs massively dwarf delivery costs.
    **The Rationale:** Engineers focus heavily on the upfront non-recurring engineering (NRE) investment and ignore recurring OpEx at scale.
    **The Consequence:** Blowing past operational budgets due to unoptimized delivery pipelines (failing to implement delta updates or compression).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 100,000 vehicles.
       - OTA Cycle: 200 MB/update, 4 updates/yr, 5 years.
       - Cost: $5/GB. R&D Sunk Cost: $2M.
    2. **Calculations:**
       - Data per Vehicle: 200 MB * 4 * 5 = 4,000 MB (4 GB).
       - Total Fleet Data: 100,000 * 4 GB = 400,000 GB.
       - Lifetime OTA Cost: 400,000 GB * $5 = $2,000,000.
    3. **Conclusion & Interpretation:**
       - **Result: Delivery OpEx ($2M) equals R&D NRE ($2M). Bottleneck: Network OpEx-Bound.**
  options:
  - "The R&D cost is $2M, while the data cost is only $400,000 (Trap: calculated 1 year of updates)."
  - "The data cost is $10M, dwarfing the R&D cost (Trap: forgot to convert MB to GB)."
  - "The R&D cost ($2M) and the total data cost ($2M) are exactly equal."
  - "The costs are negligible because 200MB is small."
  correct_index: 2
