title: Power Budget for Multi-Model Edge Pipeline
scenario: You're building a smart retail camera that runs three models simultaneously: person detection (YOLOv8n, runs on GPU), pose estimation (MoveNet, runs on DLA), and face blur for privacy (a small U-Net, runs on GPU). The system is powered by PoE+ delivering 25.5W at the device. The camera sensor + ISP draws 3W, the network stack draws 1.5W, and the SoC housekeeping draws 2W.
question: "At 25.5W PoE+, what ML power budget remains, and can all three models run concurrently on the Jetson Orin Nano?"
details:
  realistic_solution: 'Build a full power tree from PoE+ input. Deduct DC-DC conversion losses and fixed loads to find the ML budget. Even if the models fit electrically, a thermal check is required. If the thermal dissipation causes the junction temperature to exceed the 105C shutdown limit, the total power must be reduced (e.g., by moving a model to a lower-power accelerator or duty-cycling).'
  common_mistake: |
    **The Pitfall:** Comparing the sum of the model power draws directly against the 15W TDP spec of the Orin.
    **The Rationale:** Candidates mistake "TDP" (Thermal Design Power) for actual maximum power draw, and they entirely ignore DC-DC conversion losses from the 48V PoE rail.
    **The Consequence:** The device pulls more current than the PoE switch can provide and gracefully reboots, or it simply overheats and melts down in the field.
  napkin_math: |
    1. PoE+ budget: 25.5W. After 17% conversion loss = 21.1W usable.
    2. Fixed loads: 3W (sensor) + 1.5W (network) + 2W (housekeeping) = 6.5W.
    3. Remaining ML budget = 14.6W. Estimated ML draw = YOLO (4W) + MoveNet (2.5W) + U-Net (5W) = 11.5W. (Fits electrically).
    4. Thermal check: Total power 18W * 4°C/W + 40°C ambient = 112°C (Exceeds 105°C limit).
    5. **Must reduce total power to ~16.25W to survive thermals. ML budget drops to 9.75W. Fix: move face blur to DLA or duty-cycle pose estimation.**
