title: 'Edge TPU Storage: Optimizing Data Formats for Real-time Inference Buffering'
scenario: A remote wildlife monitoring system utilizes a camera and a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, INT8-only inference) for real-time object detection and classification. Due to highly intermittent satellite connectivity, the system must buffer up to 12 hours of processed inference results locally on a small, low-power NVMe drive before successful uplink. Each inference produces approximately 10KB of structured metadata (bounding boxes, class IDs, confidences, timestamps) and a 50KB cropped image region (PNG/JPEG) per frame. The Edge TPU processes data at 5 frames per second.
question: How would you store and compress 12 hours of Coral inference results at 5 FPS for energy-efficient, reliable local buffering?
details:
  realistic_solution: Leverage TFRecord with appropriate compression. TFRecord is designed for efficient serialization of structured data and binary blobs. For compression, GZIP or ZLIB should be favored. While CPU-intensive, these offer superior compression ratios compared to Snappy or LZ4, which is crucial for maximizing the 12-hour buffer capacity. The Coral's general-purpose CPU has sufficient headroom for background compression without impacting the inference pipeline's 2W power budget excessively. Structuring TFRecords into manageable files optimizes sequential I/O.
  common_mistake: |
    **The Pitfall:** Defaulting to JSON/CSV or columnar formats like Parquet.
    **The Rationale:** Candidates choose familiar cloud analytics formats without considering edge I/O profiles.
    **The Consequence:** JSON/CSV cause massive file sizes and parsing overhead, blowing the 2W power budget, while Parquet adds unnecessary schema overhead for sequential write-heavy edge patterns.
  napkin_math: |
    1. **Raw Data Rate:** 5 frames/sec * (10KB metadata + 50KB image) = 300KB/second.
    2. **Uncompressed Buffer:** 300KB/sec * 3600 sec/hour * 12 hours = **~12.96 GB**.
    3. **Compression Benefit:** With GZIP/ZLIB (average 3x compression ratio), the 12-hour buffer drops to **~4.32 GB**, making local storage feasible.
    4. **CPU Load:** Modern ARM cores decompress at 50-100MB/s. Our compressed data rate (~100KB/s) is negligible, keeping the system under the 2W thermal envelope.
