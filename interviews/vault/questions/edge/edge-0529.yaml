title: The UVC Camera MJPEG CPU Tax
scenario: You attach a USB webcam to a Raspberry Pi to run a vision model. To save USB bandwidth, you
  configure the camera via V4L2 to output compressed MJPEG video at 1080p 30FPS instead of raw YUYV. The
  USB bandwidth drops significantly, which is good. But your ML inference time increases by 40%, and the
  Pi runs incredibly hot. Why did saving USB bandwidth destroy your CPU?
details:
  realistic_solution: 'Saving USB bandwidth shifted the bottleneck to CPU-based MJPEG decoding. Raw YUYV
    requires a trivial colorspace conversion (~2ms CPU), while MJPEG requires full JPEG decompression
    — Huffman decoding, inverse DCT, and color conversion — taking ~15ms per frame on the Pi''s ARM CPU.
    At 30 FPS, that''s 450ms/second of CPU time just for decoding, leaving less for inference. The fix:
    either use raw YUYV if USB bandwidth permits (1 camera), use hardware-accelerated video decode (V4L2
    M2M on Pi, or Jetson''s NVDEC), or switch to H.264 which the Pi''s VideoCore can decode in hardware
    at near-zero CPU cost.'
  common_mistake: '"The ML model can''t read MJPEG." The ML model isn''t reading MJPEG; OpenCV is reading
    it first.'
  napkin_math: Raw YUYV at 1080p takes 1920*1080*2 = 4.14 MB/frame. USB 2.0 (40 MB/s limit) is saturated
    at 10 FPS. MJPEG compresses this to ~400 KB/frame, easily fitting USB 2.0 at 30 FPS. However, software
    JPEG decoding on a low-power CPU takes ~15ms per frame. If the ML model latency is 30ms, total latency
    becomes 45ms. The 50% CPU overhead reduces maximum FPS from 33 (model only) to 22 (model+decode).
