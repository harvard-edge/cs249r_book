title: The UVC Camera MJPEG CPU Tax
scenario: You attach a USB webcam to a Raspberry Pi to run a vision model. To save USB bandwidth, you configure the camera via V4L2 to output compressed MJPEG video at 1080p 30FPS instead of raw YUYV. The USB bandwidth drops significantly, which is good. But your ML inference time increases by 40%, and the Pi runs incredibly hot.
question: Why did saving USB bandwidth destroy your CPU performance and slow down inference?
details:
  realistic_solution: Transitioning to MJPEG effectively shifts the bottleneck from the USB interface to CPU-based video decompression. To resolve this, offload decompression via hardware-accelerated V4L2 M2M pipelines or switch to an H.264 stream relying on the VideoCore engine.
  common_mistake: |
    **The Pitfall:** Believing the ML model processes MJPEG directly.
    **The Rationale:** Engineers assume the compressed format simply passes through to the model, ignoring the heavy software decompression overhead incurred by OpenCV/GStreamer before the inference step.
    **The Consequence:** Exchanging a benign USB bottleneck for a catastrophic CPU bottleneck that starves the inference engine.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Framerate: 30 FPS.
    - Resolution: 1080p (1920x1080).
    - MJPEG Software Decode Time (ARM CPU): ~15 ms per frame.

    **Calculations:**
    - CPU Time per second spent decoding = 30 FPS * 15 ms/frame = 450 ms.
    - CPU Utilization purely for decode = 450 ms / 1000 ms = 45%.

    **Conclusion & Interpretation:**
    - **Result: 45% Base Overhead (CPU-Bound Software Decode)**. The CPU is heavily taxed by MJPEG decoding.
