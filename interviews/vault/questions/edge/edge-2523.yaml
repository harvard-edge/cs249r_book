title: Multimodal KV Ring Buffer
scenario: An Apple A17 Pro processes 30fps video (vision tokens) and voice (text tokens) concurrently. Vision tokens generate 10x more KV data but become irrelevant after 5 seconds.
question: Create a KV cache memory strategy that prevents Unified Memory OOM without causing CPU garbage collection stalls.
details:
  realistic_solution: 'Design an asymmetric KV cache: allocate a fixed 5-second circular Ring Buffer for the vision modality and a persistent PagedAttention buffer for text. The ring buffer automatically overwrites 5-second-old frames in place. This entirely eliminates the CPU sync bubble required to trace and evict massive vision tensors.'
  common_mistake: |
    **The Pitfall:** Using a unified LRU cache for all tokens.
    **The Rationale:** Candidates default to standard caching algorithms rather than domain-specific hardware strategies.
    **The Consequence:** The CPU constantly runs expensive eviction heuristics on massive vision tensors, causing dropped frames.
  napkin_math: |
    - Video FPS: 30.
    - Relevant Time Window: 5 seconds.
    - Vision Ring Buffer Size: 30 fps * 5s = 150 frames.
    **A 150-frame fixed ring buffer prevents OOM and completely eliminates allocation sync time.**
