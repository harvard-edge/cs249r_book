title: Multimodal KV Ring Buffer
scenario: An Apple A17 Pro processes 30fps video (vision tokens) and voice (text tokens)
  concurrently. Vision tokens generate 10x more KV data but become irrelevant after
  5 seconds.
question: Create a KV cache memory strategy that prevents Unified Memory OOM without
  causing CPU garbage collection stalls.
details:
  realistic_solution: 'Design an asymmetric KV cache: allocate a fixed 5-second circular
    Ring Buffer for the vision modality and a persistent PagedAttention buffer for
    text. The ring buffer automatically overwrites 5-second-old frames in place. This
    entirely eliminates the CPU sync bubble required to trace and evict massive vision
    tensors.'
  common_mistake: Using a unified LRU cache for all tokens, which forces the CPU to
    constantly run expensive eviction heuristics on vision tensors, causing frames
    to drop.
  napkin_math: Vision Ring size = 30 fps * 5s * Vision_KV_Size = 150 frames fixed
    capacity. Zero allocation sync time.
