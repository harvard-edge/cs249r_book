title: Edge Sensor Data Ingestion Pipeline Architecture on Jetson Orin
scenario: You are designing the data ingestion pipeline for an autonomous mobile robot running on an NVIDIA
  Jetson Orin. The system must capture high-resolution stereo camera feeds and LIDAR point clouds continuously
  to local NVMe storage before offloading to the cloud at base stations. Given the Orin's 32 GB LPDDR5
  and 60W TDP budget, you need to architect a storage format and compression strategy that minimizes write
  amplification and CPU overhead while keeping up with the 1.5 GB/s raw sensor ingress rate, ensuring
  the Ampere GPU and DLA accelerators are not starved of memory bandwidth for inference.
details:
  realistic_solution: The optimal design uses a lightweight, sequential row-based format like TFRecord
    or a custom binary log for initial ingestion, paired with a fast, low-CPU compression algorithm like
    LZ4 or Snappy. This minimizes memory buffering and CPU utilization, preserving the LPDDR5 bandwidth
    for the Ampere GPU and DLA. The heavy lifting of converting to columnar formats like Parquet for long-term
    analytics should be deferred to the cloud after the raw data is offloaded at the base station.
  common_mistake: Candidates often propose heavy columnar formats like Parquet with high-ratio compression
    (e.g., GZIP or ZSTD at high levels) to save disk space. They fail to realize that on edge devices,
    the CPU cost of compression and the memory overhead of buffering large row groups for columnar conversion
    will exceed the TDP budget and thrash the shared 32 GB LPDDR5, starving the GPU/DLA of memory bandwidth
    needed for real-time inference.
  napkin_math: 'Raw ingress: 1.5 GB/s. With LZ4 compression (typical 2:1 ratio for sensor data, very high
    throughput >2 GB/s per core), write speed drops to ~750 MB/s. Buffering 1 second of data requires
    1.5 GB of RAM. Parquet needs much larger row groups (e.g., 128MB+ compressed) to be efficient, meaning
    buffering potentially 5-10 seconds of raw data (7.5-15 GB), consuming 25-50% of the entire 32 GB LPDDR5,
    leaving insufficient bandwidth and capacity for the 275 TOPS INT8 inference workloads.'
