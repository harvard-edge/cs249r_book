title: Host Memory Allocation and DMA Overhead for Hailo-8
scenario: You are deploying a high-throughput vision pipeline on a low-power edge
  gateway using a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 dataflow
  architecture features no local DRAM, it relies entirely on streaming from host memory.
  Your model requires 12MB for weights and 8MB for intermediate activations per frame.
  To keep the 26 TOPS pipeline fully saturated, the host maintains a ring buffer of
  5 concurrent frames. Due to host OS memory fragmentation, contiguous allocation
  is impossible, forcing the use of scatter-gather DMA with 4KB pages. If the OS requires
  a 16-byte tracking descriptor for every page in the DMA list, calculate the total
  host memory footprint (buffers + metadata) consumed by this setup.
question: What total host memory footprint is used by the 5-frame Hailo-8 ring buffer
  plus 4KB scatter-gather DMA metadata?
details:
  realistic_solution: To avoid OOM errors and ensure stable 2.5W operation, you must
    calculate the total memory for the entire ring buffer, not just a single frame.
    Since the Hailo-8 has no local DRAM, all data lives on the host. When memory is
    fragmented, scatter-gather DMA ensures the accelerator can still operate, but
    the OS must allocate additional memory for the page descriptors, which adds to
    the total system memory pressure.
  common_mistake: Candidates often focus solely on the raw model size and the 26 TOPS
    compute capacity, forgetting the impact of the multi-frame ring buffer required
    for streaming architectures. They also frequently overlook the OS-level memory
    pressure and metadata overhead introduced by scatter-gather DMA in fragmented
    memory environments.
  napkin_math: '1 frame = 12MB weights + 8MB activations = 20MB.

    Ring buffer of 5 frames = 5 * 20MB = 100MB total buffer size.

    Convert to KB: 100MB = 100 * 1024 = 102,400 KB.

    Calculate 4KB pages: 102,400 KB / 4 KB per page = 25,600 pages.

    Calculate scatter-gather metadata: 25,600 pages * 16 bytes/page = 409,600 bytes.

    Convert metadata to KB: 409,600 bytes / 1024 = 400 KB.

    Total host memory footprint = 100 MB + 400 KB = 100.4 MB.'
