title: The Thermal Throttle
scenario: 'You are designing the compute module for an autonomous delivery drone, which has a strict thermal
  design power (TDP) limit of 10W. You are evaluating two AI accelerators:


  - **Chip A:** 80 TOPS peak, 40W TDP

  - **Chip B:** 25 TOPS peak, 8W TDP


  Which chip will deliver higher sustained performance within the drone''s thermal envelope?'
question: "Which chip will deliver higher sustained performance within the drone's thermal envelope?"
details:
  realistic_solution: The correct approach is to calculate the efficiency (TOPS/W) of each chip and then
    determine the maximum sustained performance each can deliver within the 10W power budget.
  common_mistake: Engineers often fixate on the advertised peak TOPS number, which is a marketing metric,
    without considering the power required to achieve it. On power-constrained edge devices, TOPS/W (efficiency)
    is almost always more important than raw peak TOPS because the thermal envelope, not the silicon's
    theoretical maximum, becomes the limiting factor.
  napkin_math: '*   **Chip A Efficiency:** `80 TOPS / 40W = 2 TOPS/W`.

    *   **Chip A at 10W TDP:** 2 TOPS/W × 10W = **20 TOPS sustained**.


    *   **Chip B Efficiency:** `25 TOPS / 8W = 3.125 TOPS/W`.

    *   **Chip B at 10W TDP:** Chip B already runs within 10W envelope at full power → **25 TOPS sustained**
    (no throttling needed).


    **Comparison:**

    | Metric | Chip A | Chip B |

    |--------|--------|--------|

    | Peak TOPS | 80 | 25 |

    | TDP | 40W | 8W |

    | TOPS/W | 2.0 | 3.125 |

    | Sustained TOPS at 10W | 20 | 25 |


    **Chip B wins** despite having 3.2x fewer peak TOPS. Within the 10W thermal envelope, Chip B delivers
    **25% more sustained throughput** because its higher efficiency (TOPS/W) allows it to run at full
    speed without thermal throttling.'
  options:
  - Chip A, providing 80 TOPS.
  - Chip B, providing 100 TOPS.
  - Chip A, providing 20 TOPS.
  - Chip B, providing 25 TOPS.
  correct_index: 3
