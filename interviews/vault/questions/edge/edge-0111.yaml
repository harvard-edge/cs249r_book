title: The Thermal Throttle
scenario: You are designing the compute module for an autonomous delivery drone, which has a strict thermal design power (TDP) limit of 10W. You are evaluating two AI accelerators:
  - Chip A: 80 TOPS peak, 40W TDP
  - Chip B: 25 TOPS peak, 8W TDP
question: Which chip will deliver higher sustained performance within the drone's 10W thermal envelope?
details:
  realistic_solution: The correct approach is to calculate the efficiency (TOPS/W) of each chip and then determine the maximum sustained performance each can deliver within the 10W power budget.
  common_mistake: |
    **The Pitfall:** Fixating on advertised peak TOPS rather than power efficiency.
    **The Rationale:** Engineers often evaluate edge accelerators using peak TOPS without considering the power required to achieve it, ignoring that the thermal envelope becomes the limiting factor.
    **The Consequence:** Selecting a theoretically faster chip that thermal throttles heavily, resulting in worse real-world performance than a highly efficient, lower-peak chip.
  napkin_math: |
    * **Chip A Efficiency:** 80 TOPS / 40W = 2 TOPS/W
    * **Chip A Sustained at 10W:** 2 TOPS/W * 10W = 20 TOPS
    * **Chip B Efficiency:** 25 TOPS / 8W = 3.125 TOPS/W
    * **Chip B Sustained at 10W:** 25 TOPS (runs at full power within 10W)
    * **Conclusion:** **Chip B** delivers 25% more sustained throughput (25 TOPS vs 20 TOPS).
  options:
  - Chip A, providing 80 TOPS.
  - Chip B, providing 100 TOPS.
  - Chip A, providing 20 TOPS.
  - Chip B, providing 25 TOPS.
  correct_index: 3
