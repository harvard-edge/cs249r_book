title: Analyzing Federated Averaging Bottlenecks on Jetson Orin
scenario: You are deploying a cross-silo federated learning system across several edge nodes powered by
  NVIDIA Jetson Orin devices. Each node trains a local 8GB model using its Ampere GPU and sends updates
  to a central server every 10 epochs. You observe that while local training is extremely fast utilizing
  the 275 TOPS INT8 compute, the system's overall convergence time is severely bottlenecked, and power
  consumption frequently spikes near the 60W TDP limit during the synchronization phase. Given the Jetson
  Orin's 32 GB LPDDR5 memory and typical edge network constraints, analyze why this specific bottleneck
  occurs and how the hardware characteristics contribute to it.
details:
  realistic_solution: The bottleneck happens because the Jetson Orin's high compute capability (275 TOPS)
    finishes local epochs rapidly, making the communication overhead of transmitting an 8GB model the
    dominant factor. To resolve this, the system should increase the number of local epochs before synchronization
    or implement gradient compression (e.g., quantization to INT8), trading abundant local compute to
    reduce the massive communication payload.
  common_mistake: Candidates often assume the bottleneck is the GPU compute or thermal throttling during
    training. They fail to analyze the cost of aggregating and transmitting an 8GB model update over typical
    edge networks compared to the Orin's massive local compute capacity, overlooking the communication-to-compute
    ratio imbalance.
  napkin_math: 'Local compute time: 10 epochs take ~20s utilizing the 275 TOPS compute. Communication
    time: Transmitting an 8GB (8192MB) model update over a standard 1 Gbps (125 MB/s) edge connection
    takes 8192 / 125 = 65.5 seconds. Communication overhead (65.5s) is >3x the local compute time (20s).
    Maxing out the network interface and 32 GB LPDDR5 memory bandwidth for 65 seconds during transmission
    causes the power draw to spike near the 60W TDP limit.'
