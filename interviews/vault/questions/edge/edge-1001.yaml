title: Implementing Streaming Activation Processing for Video on Jetson Orin
scenario: 'You are implementing a real-time action recognition pipeline on an edge device using a 3D ConvNet (SlowFast-R50) that takes 32-frame clips as input. You have only 6 GB available for action recognition activations, but processing the full 32-frame clip at once requires 14 GB of activation memory.'
question: How can you stream a 32-frame SlowFast-R50 model so activations fit within 6GB without accuracy loss?
details:
  realistic_solution: 'Decompose 3D convolutions into (2+1)D: apply 2D spatial conv to each frame independently (1 frame at a time in memory), then apply 1D temporal conv over the resulting feature vectors. Spatial activation peak: 1 frame × H × W × C = 1 × 224 × 224 × 64 × 4 B = 12.8 MB per layer. Temporal buffer: 32 frames × reduced spatial feature × C = 32 × 28 × 28 × 256 × 4 B = 25.6 MB. Total for (2+1)D path: ~40 MB per layer depth, compared to 14 GB for full 3D. This approach is used in SlowFast decomposed variants and reduces activation memory by ~350× with <1% accuracy loss on Kinetics-400.'
  common_mistake: |
    **The Pitfall:** Processing the full temporal dimension in a single forward pass.
    **The Rationale:** Candidates assume that 3D convolutions inherently require all frames to be processed simultaneously.
    **The Consequence:** Unnecessary memory spikes that lead to Out-Of-Memory (OOM) errors on edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget = 6 GB.
    - 32-frame input.
    - Sample layer shape is 32x56x56x256.

    **Calculations:**
    - Full 3D activation = $32 \times 56 \times 56 \times 256 \times 4$ bytes $\approx$ 102.7 MB per layer.
    - (2+1)D Spatial = $1 \times 224 \times 224 \times 64 \times 4$ bytes $\approx$ 12.8 MB.
    - (2+1)D Temporal buffer = $32 \times 28 \times 28 \times 256 \times 4$ bytes $\approx$ 25.6 MB.
    - Total (2+1)D peak = 12.8 + 25.6 = 38.4 MB.

    **Conclusion & Interpretation:**
    - **Result: Streaming (2+1)D decomposition drops peak layer memory to 38.4 MB (Memory-Capacity Bound)**. Avoids Memory-Capacity Bound OOMs.
