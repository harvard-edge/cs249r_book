title: Adversarial Input Purification on Qualcomm Cloud AI 100
scenario: >-
  You are deploying a computer vision system for physical defect detection in an automated factory using a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W envelope). You discover vulnerabilities to physical adversarial attacks and propose adding an input purification neural network (e.g., a denoising autoencoder) ahead of the primary detector.
question: Is an INT8 input purification network feasible on the Cloud AI 100, and what compute and memory overhead would it add?
details:
  realistic_solution: 'Deploy a lightweight, INT8-quantized convolutional purifier fused with the primary vision model. The AI 100 excels at INT8 workloads (400 TOPS), making the compute overhead negligible. Fusing the graphs keeps intermediate activations on-chip (SRAM), avoiding LPDDR4x memory bottlenecks and maintaining high throughput well under the 75W power limit.'
  common_mistake: |
    **The Pitfall:** Relying on FP32/FP16 adversarial training or un-fused graphs.
    **The Rationale:** Candidates import standard PyTorch adversarial defense techniques directly to the edge.
    **The Consequence:** They ignore the accelerator's explicit INT8 optimization. Additionally, failing to fuse the graphs causes intermediate activations to be written to and read from slow off-chip DRAM, creating a massive memory bandwidth stall.
  napkin_math: |
    1. **Memory Capacity:** 10M parameter Purifier adds `~10 MB` at INT8. Combined footprint uses `< 1%` of 32 GB LPDDR4x.
    2. **Compute:** Purifier requires 20 GOPS per frame. Time at 400 TOPS (400,000 GOPS) is `20 / 400,000 = 0.05 ms`.
    3. **Unfused Penalty:** Writing a 1080p frame (6.2 MB) to DRAM (assume 68 GB/s) adds `(6.2 MB * 2) / 68,000 MB/s ≈ 0.18 ms` memory latency.
    4. **Result:** Graph fusion eliminates this off-chip transfer, keeping defense overhead **strictly compute-bound (< 0.1 ms)**, making the defense highly feasible.
