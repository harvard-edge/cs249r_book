title: TensorRT Graph Fragmentation on Jetson Orin
scenario: An ONNX model is converted into an INT8 TensorRT engine for a Jetson Orin (Ampere GPU + DLA accelerator, 32 GB LPDDR5). Three custom operations are unsupported by the DLA, causing TensorRT to fragment the graph and delegate these nodes to the GPU, degrading effective throughput.
question: Why do three DLA-unsupported ONNX operators disproportionately hurt Jetson Orin latency, and what is the new effective throughput?
details:
  realistic_solution: When TensorRT falls back to the GPU for unsupported ONNX operators, it must insert synchronization barriers and transfer intermediate activation tensors between the DLA and GPU via the shared 32 GB LPDDR5 memory. This ping-ponging breaks deep hardware pipelining.
  common_mistake: |
    **The Pitfall:** Assuming delegating a few unsupported operators only adds the compute latency of those specific operations.
    **The Rationale:** Ignoring the massive synchronization and memory transfer overhead required when alternating between the DLA and GPU.
    **The Consequence:** Unexplained and severe latency degradation during deployment.
  napkin_math: |
    - Model requires 275 GOPs. On 275 TOPS INT8, ideal compute is 1.0ms (1000 FPS).
    - 3 unsupported operators fragment the graph, requiring 3 DLA-GPU context switches.
    - Synchronization and memory transfer overhead: 3 * 0.5ms = 1.5ms per frame.
    - Total time per frame: 1.0ms (compute) + 1.5ms (transfer) = 2.5ms.
    - New framerate = 1000ms / 2.5ms = 400 FPS.
    - Effective throughput = 400 FPS * 275 GOPs = 110 TOPS.
    **60% of the Orin's 275 TOPS capacity is wasted on synchronization overhead.**
