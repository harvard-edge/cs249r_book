title: TensorRT Graph Fragmentation on Jetson Orin
scenario: We are deploying a real-time object detection model to an NVIDIA Jetson
  Orin (Ampere GPU + DLA accelerator, 32 GB LPDDR5, 60W TDP). To maximize throughput,
  we convert our ONNX model into an INT8 TensorRT engine, aiming to utilize the theoretical
  peak of 275 TOPS INT8. However, profiling reveals the effective throughput is severely
  degraded, and the DLA is frequently idle. Inspection shows that three custom operations
  in the ONNX graph are unsupported by the DLA, causing TensorRT to fragment the graph
  and delegate these nodes to the GPU. Analyze why this operator coverage gap causes
  disproportionate latency degradation, and calculate the new effective throughput.
question: Why do three DLA-unsupported ONNX operators disproportionately hurt Jetson
  Orin latency, and what is the new effective throughput?
details:
  realistic_solution: The disproportionate latency degradation is driven by graph
    fragmentation. When TensorRT falls back to the GPU for unsupported ONNX operators,
    it must insert synchronization barriers and transfer intermediate activation tensors
    between the DLA and GPU via the shared 32 GB LPDDR5 memory. This ping-ponging
    breaks the deep hardware pipelining. The solution is to either replace the custom
    operations with standard DLA-supported equivalents prior to ONNX export, or modify
    the TensorRT delegation strategy to keep larger contiguous sub-graphs on the GPU.
  common_mistake: Candidates often assume that delegating a few unsupported operators
    to the GPU only adds the compute latency of those specific operations, ignoring
    the massive synchronization and memory transfer overhead required when alternating
    between the DLA and GPU.
  napkin_math: Assume the model requires 275 Giga-operations (GOPs) per frame. Ideally,
    on a 275 TOPS INT8 system, compute takes exactly 1ms per frame (1000 FPS). The
    3 unsupported operators fragment the graph, requiring 3 DLA-GPU context switches.
    If each synchronization and LPDDR5 memory transfer takes 0.5ms, the transfer overhead
    is 3 * 0.5ms = 1.5ms per frame. The total time per frame becomes 1.0ms (compute)
    + 1.5ms (transfer) = 2.5ms. The new framerate is 1000ms / 2.5ms = 400 FPS. The
    effective throughput is 400 FPS * 275 GOPs = 110 TOPS, meaning 60% of the Orin's
    275 TOPS capacity is wasted on synchronization overhead.
