title: The Autonomous Vehicle Interconnect Dilemma
scenario: You are an ML Systems Engineer designing a sensor fusion system for an autonomous car. The system uses two Jetson AGX Orin SoCs connected inside a single chassis. SoC A produces a 128 MB intermediate feature map which must be transferred to SoC B for planning within a 33ms end-to-end latency budget.
question: Should you transfer the 128 MB feature map between the two Orin SoCs over PCIe or 100 Gbps Ethernet with RDMA, and why?
details:
  realistic_solution: The correct choice is PCIe. While the raw bandwidth calculation shows both are technically fast enough (~4ms for PCIe vs. ~10ms for Ethernet), this misses the fundamental difference between a memory bus and a network. PCIe provides direct, low-latency memory access between the SoCs with minimal CPU intervention via DMA. This is crucial for a predictable, hard real-time system. Ethernet with RDMA, while fast, is architecturally a networking solution. It introduces unnecessary protocol overhead, higher power consumption from the external NIC and cabling, and more complex software management compared to the tightly integrated PCIe bus. For two chips in the same box, you treat them as a single logical system, which is what PCIe enables.
  common_mistake: |
    **The Pitfall:** Choosing Ethernet over PCIe based on generic datacenter networking principles.
    **The Rationale:** Engineers often fixate on peak bandwidth numbers and misapply solutions like RoCE to tightly-coupled embedded systems.
    **The Consequence:** Introducing unnecessary protocol overhead, higher power consumption, and latency jitter into a hard real-time system.
  napkin_math: |
    * **PCIe Gen4 x16 Transfer Time**: 128 MB / 32 GB/s = 4 ms.
    * **PCIe Latency Overhead**: ~50 µs.
    * **Total PCIe Latency**: 4 ms + 0.05 ms = **~4.05 ms**.
    * **100 Gbps Ethernet Transfer Time**: 128 MB / 12.5 GB/s = 10.24 ms.
    * **Ethernet Network RTT Overhead**: ~100 µs.
    * **Total Ethernet Latency**: 10.24 ms + 0.1 ms = **~10.34 ms**.
    * **Conclusion**: PCIe is 2.5x lower latency and provides deterministic real-time performance.
  options:
  - Choose 100 Gbps Ethernet because RDMA provides a 'zero-copy' transfer that is more efficient than the standard PCIe driver stack, making it faster in practice.
  - Choose 100 Gbps Ethernet because it's the standard for low-latency GPU communication (like InfiniBand/RoCE) in high-performance clusters and is optimized for this type of workload.
  - Choose PCIe. Its raw bandwidth is higher and, more importantly, its architecture as a direct memory bus results in lower CPU overhead, lower power, and less latency jitter, which is critical for a hard real-time system.
  - Neither is sufficient. The true bottleneck is the MIPI camera interface on SoC A, which cannot supply data fast enough to generate a feature map every 33ms. The interconnect choice is therefore irrelevant.
  correct_index: 2
