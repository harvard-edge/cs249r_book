title: Drone Navigation RTO
scenario: An autonomous drone records map state updates to an Orin's flash memory
  to survive power glitches.
question: Identify the Recovery Time Objective (RTO) constraint if the system must
  resume control within 2 seconds of a transient glitch.
visual:
  kind: svg
  path: edge-2350.svg
  alt: Timeline showing a power glitch followed by a 2-second recovery window before
    flight resumes.
  caption: Drone recovery time objective timeline.
details:
  realistic_solution: The RTO is explicitly 2 seconds. The drone's operating system,
    flight controller stack, and the neural network state must complete the entire
    boot and flash-to-RAM checkpoint restore process strictly within this 2-second
    window to avoid a crash.
  common_mistake: Calculating checkpoint sizes instead of correctly identifying the
    time-based RTO definition from the prompt.
  napkin_math: 2s hardware reset to flight = 2s RTO
