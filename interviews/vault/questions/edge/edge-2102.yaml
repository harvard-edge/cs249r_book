title: Optimizing Data for Edge AI on Hailo-8
scenario: 'Your team is deploying a real-time object detection model on the Hailo-8 edge AI accelerator, which boasts 26 TOPS (INT8) and a typical power consumption of 2.5W. The initial model performs well in the lab, but struggles with generalization and inference latency in diverse real-world scenarios due to a large, uncurated training dataset. You suspect "the data wall problem" is hindering performance and slowing down development cycles.'
question: 'How would you approach identifying and mitigating this issue, specifically leveraging data efficiency and selection techniques given the Hailo-8''s constraints?'
details:
  realistic_solution: 'Implement coreset selection or active learning to strategically prune the dataset to its most informative samples. For instance, use a technique like uncertainty sampling (e.g., entropy-based or margin-based) to identify data points where the current model is least confident. Alternatively, employ a diversity-based coreset selection method to ensure the reduced dataset still represents the overall data distribution effectively. This reduced, high-value dataset can then be used for retraining, significantly reducing training time and potentially improving generalization with fewer samples, thus optimizing the utilization of the Hailo-8''s compute capacity and minimizing energy overhead.'
  common_mistake: |
    **The Pitfall:** Continuously collecting more data without a strategic selection process.
    **The Rationale:** Assuming "more data is always better" is a common heuristic from cloud AI scaling laws.
    **The Consequence:** This leads to increased labeling costs, longer training times, and introduces redundant information that fails to improve generalization on resource-constrained edge devices.
  napkin_math: |
    * Assume the original dataset requires 100 epochs to train, at 20 minutes per epoch (2,000 minutes total).
    * Coreset selection reduces the dataset size by 50% while maintaining performance.
    * Training time per epoch drops to 10 minutes.
    * Total training time becomes 100 epochs * 10 min/epoch = 1,000 minutes (16.67 hours).
    * **Coreset selection saves 1,000 minutes per training run, drastically reducing development cycles.**
