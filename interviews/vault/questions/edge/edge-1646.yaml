title: On-Premise Coreset Selection Pipeline
scenario: An on-premise continuous learning system for a manufacturing plant uses a single Qualcomm Cloud AI 100 inference accelerator (400 TOPS INT8, 32GB RAM, 75W). It processes a 1,000 FPS video stream to detect defects. Network constraints permit sending only 10 frames per second to the cloud for retraining.
question: How would you design a concurrent coreset selection pipeline that prunes 1,000 FPS video to 10 FPS for cloud retraining without breaking real-time SLAs?
details:
  realistic_solution: Design a bifurcated INT8 architecture where the primary model shares its feature extraction backbone with a lightweight multi-head entropy estimator. High-entropy frames are temporarily retained in a constrained ring buffer within the local memory and flushed to the cloud, while redundant nominal data is immediately discarded.
  common_mistake: |
    **The Pitfall:** Proposing computationally expensive uncertainty techniques or buffering massive amounts of raw video.
    **The Rationale:** Candidates often rely on standard cloud-based active learning methods (like deep ensembles) without considering the edge accelerator's strict compute and memory limits.
    **The Consequence:** The system crashes due to OOM errors or fails to meet the real-time inference SLAs because the active learning overhead saturates the compute.
  napkin_math: |
    1. **Assumptions & Constraints:** Budget is 400 TOPS and 32GB RAM. 1080p uncompressed frames are $\approx$ 6 MB. Processing requires 100 GOPS/frame at 1,000 FPS.
    2. **Calculations:** Compute = 100 GOPS * 1,000 = 100 TOPS (25% utilization). Buffer for 5 seconds = 1,000 * 5 * 6 MB = 30 GB.
    3. **Conclusion & Interpretation:** **A 30 GB buffer creates a Memory-Capacity Bound crash. The ring buffer must be compressed or reduced to <2.5 seconds (15 GB).**
