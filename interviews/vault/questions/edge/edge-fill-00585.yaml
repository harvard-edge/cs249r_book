title: 'Hailo-8 Edge Deployment: Sustained Performance under Thermal Constraints'
scenario: You are deploying a fleet of edge AI devices, each powered by a Hailo-8 (26 TOPS INT8, 2.5W
  dataflow accelerator), for real-time video analytics in a challenging industrial environment where ambient
  temperatures can reach 50°C. Initial lab benchmarks show the Hailo-8 achieving its advertised 26 TOPS
  INT8 for short bursts. However, in sustained operation at high ambient temperatures, you observe significant
  and unpredictable drops in inference throughput, sometimes falling below 10 TOPS. Your task is to diagnose
  the root cause of this performance degradation and propose a quantifiable solution to ensure sustained
  high performance.
question: "How would you diagnose and quantify a thermal solution for Hailo-8 throughput drops below 10 TOPS in 50°C industrial operation?"
details:
  realistic_solution: Diagnose thermal throttling as the primary bottleneck. Propose a cooling strategy,
    such as passive heat sinks with larger surface area, active micro-fans, or liquid cooling (depending
    on practical constraints like space, cost, and power budget). Quantify the expected performance improvement
    by estimating the new sustained operating temperature and corresponding thermal throttling threshold,
    or by calculating the required heat dissipation (TDP) for a target TOPS, and how the chosen cooling
    solution achieves this.
  common_mistake: Failing to account for thermal throttling under sustained load and high ambient temperatures,
    or proposing generic software optimizations without addressing the fundamental hardware thermal limits.
  napkin_math: Given Hailo-8's 2.5W power consumption, in a 50°C ambient environment, calculate the required
    thermal resistance (R_th) of a cooling solution to maintain the die temperature below a critical threshold
    (e.g., 85°C). R_th = (T_junction - T_ambient) / Power_dissipation. For example, (85°C - 50°C) / 2.5W
    = 14°C/W. Evaluate if common cooling solutions (e.g., a simple heat sink with 20°C/W) meet this, and
    how a lower R_th solution (e.g., 10°C/W) would impact peak sustained performance and operating temperature,
    potentially allowing the Hailo-8 to run closer to its 26 TOPS spec.
