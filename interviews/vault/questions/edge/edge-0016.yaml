title: The AV Perception Pipeline Stall
scenario: Your perception system uses a single Jetson AGX Orin to process feeds from 6 identical 1080p cameras. The object detection model takes exactly 25ms to run on a single camera frame. Your end-to-end latency budget for processing all 6 camera frames is a hard real-time deadline of 100ms. However, you observe the total processing time is consistently around 150ms. `tegrastats` shows the GPU is active, but its utilization is saw-toothed, not pegged at 100%.
question: "Given this data, how would you diagnose and solve this pipeline stall?"
details:
  realistic_solution: The most likely cause is a serial execution bottleneck. The system is processing
    the 6 camera frames one after another, leading to a total time that is the sum of the individual parts.
    The solution is to implement pipeline parallelism. Since the processing for each camera is independent,
    you should use a mechanism like NVIDIA CUDA Streams to launch all 6 frame-processing tasks concurrently.
    This allows the GPU's streaming multiprocessors (SMs) to execute the tasks in parallel, bringing the
    total latency down to roughly the time of a single frame's processing plus a small overhead for launch
    and synchronization.
  common_mistake: |
    **The Pitfall:** Blaming the model's performance or hardware throughput (TOPS) instead of the execution schedule.
    **The Rationale:** Candidates assume high latency is inherently a compute issue, failing to recognize that serial queuing of independent tasks artificially inflates time.
    **The Consequence:** Wasting time on quantization or hardware upgrades while the system continues to process frames serially, violating the 100ms deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 6 independent 1080p camera frames.
       - Compute per frame: 25ms.
       - Target Latency: 100ms.
    2. **Calculations:**
       - Serial Execution Time: 6 frames * 25ms/frame = 150ms.
       - Parallel Execution Time (ideal): ~25ms + small launch/sync overhead.
       - Target Gap: 150ms > 100ms (Violation).
    3. **Conclusion & Interpretation:**
       - **Result: 150ms observed latency indicates serial execution (Pipeline-Bound).** CUDA streams are required to overlap compute.
  options:
  - The model is too slow. It must be quantized from FP16 to INT8 to reduce its runtime below 16ms per
    frame.
  - The Jetson AGX Orin is memory bandwidth-bound. The 6 video streams are saturating the 204.8 GB/s LPDDR5
    bus.
  - The system is executing the 6 camera streams serially. The tasks should be parallelized using CUDA
    streams to run concurrently.
  - The Jetson AGX Orin lacks sufficient compute. 275 TOPS isn't enough for 6 cameras and must be upgraded.
  correct_index: 2
