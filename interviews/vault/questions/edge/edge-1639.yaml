title: Shadow Deployment Arbitration on Jetson Orin
scenario: You are designing a progressive rollout system for a fleet of autonomous
  industrial robots powered by NVIDIA Jetson Orin modules. You need to deploy a new,
  larger object detection model (from 2GB to 4GB INT8) via a shadow deployment to
  validate its performance in the field. The robot currently runs the existing primary
  model utilizing 200 TOPS INT8, consuming 20 GB of the available 32 GB LPDDR5 memory,
  and operating at 45W of the 60W TDP. Design an on-device shadow deployment architecture
  that safely runs both models concurrently without violating thermal, compute, or
  memory constraints during the evaluation period.
question: How would you run the 4 GB shadow model alongside the 200 TOPS, 20 GB, 45W
  primary model without exceeding Orin limits?
details:
  realistic_solution: A robust architecture involves dynamic resource arbitration,
    targeted hardware delegation, and frame sub-sampling for the shadow model. The
    primary model retains strict priority on the Ampere GPU to guarantee real-time
    safety. The shadow model is executed at a significantly reduced frame rate (e.g.,
    1/6th rate) and potentially offloaded to the DLA accelerator to constrain compute
    and power overhead. An on-device telemetry daemon must continuously monitor power
    draw, dynamically throttling or pausing the shadow inference if the total system
    power approaches the 60W TDP limit.
  common_mistake: Candidates often focus only on memory capacity, assuming that since
    4GB + 2GB < 32GB, the shadow deployment is trivial. They frequently neglect the
    compute (TOPS) limits and the stringent thermal/power constraints (60W TDP), failing
    to recognize that running both models simultaneously at full frame rate will likely
    exceed the 275 TOPS limit or trigger thermal throttling.
  napkin_math: 'Available resources: 32 GB RAM, 275 TOPS, 60W TDP. Current usage:
    20 GB RAM, 200 TOPS, 45W. Remaining headroom for shadow model: 12 GB RAM (32 -
    20), 75 TOPS (275 - 200), and 15W (60 - 45). The new 4GB INT8 model fits easily
    within the 12 GB RAM headroom. However, if the new model requires 250 TOPS at
    the standard 30 FPS, it exceeds the 75 TOPS limit. By sub-sampling the shadow
    model to 5 FPS (1/6th of 30 FPS), the compute requirement drops to approximately
    41.6 TOPS (250 / 6), fitting within the 75 TOPS budget. Power consumption scales
    roughly linearly with compute utilization; adding ~42 TOPS will consume approximately
    8-10W, keeping total system power around 53-55W, safely under the 60W TDP.'
