title: Shadow Deployment Arbitration on Jetson Orin
scenario: You are designing a progressive rollout system for a fleet of autonomous industrial robots. You need to deploy a new, larger object detection model via a shadow deployment to validate its performance in the field. The robot currently runs the existing primary model utilizing 200 TOPS INT8, consuming 20 GB of memory, and operating at 45W of the 60W TDP.
question: How would you design an on-device shadow deployment architecture that safely runs both models concurrently without violating constraints?
details:
  realistic_solution: Implement a dynamic resource arbitrator utilizing frame sub-sampling and hardware delegation. The primary model retains absolute priority on the main GPU to guarantee real-time safety SLA. The shadow model must be executed at a fraction of the frame rate (e.g., 5 FPS) and offloaded to idle secondary ASIC blocks (like the DLA). A watchdog daemon must actively monitor system TDP, preemptively pausing the shadow pipeline if thermal limits approach 60W.
  common_mistake: |
    **The Pitfall:** Verifying only memory capacity while ignoring dynamic compute and thermal ceilings.
    **The Rationale:** Candidates see that 20 GB + 4 GB < 32 GB RAM, concluding the system can easily support concurrent execution without evaluating the processor load.
    **The Consequence:** The SoC immediately exceeds its 275 TOPS threshold or hits the 60W thermal tripwire, causing catastrophic system-wide throttling that compromises the primary safety model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System Limits: 32 GB RAM, 275 TOPS, 60W TDP
       - Primary Model Load: 20 GB RAM, 200 TOPS, 45W
       - Shadow Model requirement: 4 GB RAM, 250 TOPS at full 30 FPS
    2. **Calculations:**
       - Headroom: 12 GB RAM, 75 TOPS, 15W
       - Shadow Model at 30 FPS demands 250 TOPS (Exceeds 75 TOPS headroom)
       - Sub-sample Shadow to 5 FPS (1/6th rate): 250 TOPS / 6 = ~41.6 TOPS
       - Shadow Power Delta: ~42 TOPS corresponds to ~8W overhead (45W + 8W = 53W)
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound & Power-Bound. Sub-sampling to 5 FPS is mathematically required to prevent the shadow model from crashing the safety constraints.**
