title: 'Dataset Curation: Realize Training Data Pipeline for Edge Model Refresh'
scenario: Realize the end-to-end data pipeline for monthly model refresh across 1,000 Jetson Orin (32GB
  LPDDR5, 275 TOPS) devices. Each device collects 1,000 curated images/month. You need to aggregate, deduplicate,
  label, and use the data for centralized fine-tuning on 8 H100s.
details:
  realistic_solution: 'Week 1: collect + upload (1M images). Week 2: dedup + quality filter → 600K unique.
    Active learning selects 50K for labeling. Week 3: labeling (50K × $0.50 = $25K). Week 4: fine-tune
    on 8 H100s + deploy.'
  common_mistake: 'Not accounting for the full pipeline latency: collection → upload → dedup → labeling
    → training → deployment. Missing that dedup across devices requires a global index.'
  napkin_math: '1,000 devices × 1,000 images × 310KB = 310GB monthly upload. At 100Mbps per device LTE:
    310KB × 1,000 / (100Mbps/8) = 24.8 seconds upload per device per month — fine. Dedup: 1M images, perceptual
    hash: 1M × 0.5ms = 500 seconds CPU. Quality filter: blur + entropy in 1,000 seconds. Labeling: 50K
    × $0.50 = $25,000. Fine-tuning: 600K images × 5 epochs on 8 H100s (batch=512, 85ms/step): 600K × 5
    / 512 = 5,859 steps × 0.085s = 498 seconds ≈ 8.3 minutes. Total pipeline: 7 days including labeling
    turnaround.'
