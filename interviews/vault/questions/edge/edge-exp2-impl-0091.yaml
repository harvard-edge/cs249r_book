title: Coral Edge TPU Activation Memory Sizing
scenario: You are deploying a vision model to a Google Coral Edge TPU (USB form factor) operating at a
  2W power envelope. To fully utilize the 4 TOPS hardware capabilities, the model is fully quantized to
  INT8 due to limited operator support. The TPU features exactly 8MB of on-chip SRAM, and exceeding this
  limit forces OS-level eviction and severe latency penalties across the USB bus. If your INT8 model weights
  consume 4.8MB and the driver reserves 0.2MB, calculate the maximum allowable batch size if a single
  frame's peak intermediate activation footprint is exactly 750KB.
question: "What is the maximum safe batch size given 8 MB SRAM, 4.8 MB weights, 0.2 MB driver reserve, and 750 KB activations per frame?"
details:
  realistic_solution: To avoid catastrophic USB swapping latency and OOM conditions, the entire execution
    state must fit within the 8MB SRAM. The correct approach is to calculate the remaining available SRAM
    by subtracting the static requirements (weights and driver overhead) from the total memory. We then
    divide this remaining capacity by the per-frame activation memory and take the floor of the result
    to find the maximum safe batch size.
  common_mistake: Candidates often forget to apply the INT8 quantization factor to the intermediate activations,
    incorrectly calculating them as FP32 or FP16. They also frequently miss the floor operation, assuming
    partial frames can be processed without triggering memory fragmentation or OOM errors on the edge
    device.
  napkin_math: Total SRAM = 8.0MB = 8192KB. Static memory = 4.8MB (weights) + 0.2MB (driver) = 5.0MB =
    5120KB. Available activation memory = 8192KB - 5120KB = 3072KB. Maximum batch size = floor(3072KB
    / 750KB per frame) = floor(4.096) = 4 frames.
