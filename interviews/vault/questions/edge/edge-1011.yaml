title: 'Fluency: explain MobileNet width multiplier for resource-constrained edge deployment'
scenario: A hardware engineer on your team is deploying a custom product detector on a Hailo-8 (26 TOPS, 2.5W). They ask what a 'width multiplier of 0.5' means for MobileNetV3 and how to choose the right value given the Hailo-8's compute budget.
question: What does a 0.5 MobileNetV3 width multiplier mean, how does it affect FLOPs and accuracy, and which value should Hailo-8 use?
details:
  realistic_solution: 'Width multiplier α: all channel counts in MobileNetV3 are scaled by α. FLOPs scale as α² (both Cin and Cout scale). At α=0.5: FLOPs = 0.22G × 0.25 = 0.055 GFLOPs, accuracy ~67.5% top-1. At α=0.75: 0.22G × 0.5625 = 0.124 GFLOPs, ~73.3% top-1. Hailo-8 at 2.5W: designed for ~10 TOPS sustained for vision CNN. 0.055 GFLOPs at 30 FPS = 0.055G × 30 = 1.65 GOPS — far below 26 TOPS. Power won''t be the constraint; use accuracy to guide α choice. α=0.75 recommended for best accuracy within safe thermal margin.'
  common_mistake: |
    **The Pitfall:** Treating width multiplier as a linear scaler on FLOPs.
    **The Rationale:** Candidates assume halving the width halves the compute, forgetting that both input and output channels are scaled, making the reduction quadratic.
    **The Consequence:** Over-compressing the model and sacrificing accuracy unnecessarily when the hardware has ample headroom.
  napkin_math: |
    1. **FLOPs Scaling:** FLOPs scale quadratically (α²). For MobileNetV3-Large baseline 0.22 GFLOPs.
    2. **Compute at α=0.5:** 0.22G * (0.5)² = 0.055 GFLOPs.
    3. **Compute at α=0.75:** 0.22G * (0.75)² = 0.124 GFLOPs.
    4. **Hailo-8 Load (α=0.75 @ 30 FPS):** 0.124G * 30 = 3.72 GOPS.
    5. **Headroom Check:** 3.72 GOPS is vastly below the 26 TOPS (26,000 GOPS) limit.
    **Result: α=0.75 or even 1.0 easily fits the power budget; use higher multipliers to maximize accuracy.**
