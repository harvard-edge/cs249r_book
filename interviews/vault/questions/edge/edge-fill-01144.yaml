title: Edge MLOps Performance Regression on Jetson Orin
scenario: 'You are responsible for the MLOps pipeline managing real-time object detection models deployed
  on a fleet of NVIDIA Jetson Orin devices (32 GB LPDDR5, 275 TOPS INT8, 60W). A new version of your YOLOv8s
  model was recently pushed to production via your automated CI/CD pipeline, which includes model registry
  integration and basic functional tests. However, post-deployment monitoring indicates a severe performance
  regression: the average FPS has dropped from 45 FPS to 20 FPS in complex scenes, leading to critical
  missed detections on the edge. This regression was not flagged during CI/CD. Diagnose the most likely
  bottleneck(s) on the Jetson Orin and propose a quantifiable solution to restore and ideally exceed the
  previous performance, outlining how your MLOps practices would be improved to prevent future regressions.'
details:
  realistic_solution: '1. **Diagnosis:** Utilize profiling tools like NVIDIA Nsight Systems or `nvprof`
    on a representative Jetson Orin to identify the exact bottleneck (e.g., GPU underutilization, CPU-bound
    pre-processing, memory bandwidth contention, or suboptimal TensorRT engine compilation/fallback).
    Investigate if the new model version causes unexpected memory allocation patterns or if new layers
    are not optimized for INT8. Check model registry metadata for any changes in model format or required
    runtime libraries.

    2. **Optimization:** If pre-processing is CPU-bound, offload it to the iGPU or optimize CPU-side code
    (e.g., with OpenCV-CUDA). If GPU inference is the bottleneck, ensure the model is fully optimized
    with TensorRT, specifically targeting INT8 precision where possible (requires calibration). If the
    model registry allows, ensure you''re deploying a pre-quantized or pre-TensorRT-compiled model artifact
    for the Jetson. Evaluate if dynamic batching can improve throughput without significantly increasing
    latency.

    3. **MLOps Improvement:** Enhance the CI/CD pipeline to include an automated performance benchmarking
    stage that runs on an actual Jetson Orin (or a dedicated hardware-in-the-loop setup) against a diverse
    dataset, measuring FPS, latency, and resource utilization. Store these performance metrics in the
    model registry alongside other metadata (e.g., model lineage, framework versions, TensorRT version).
    Implement performance gates in the CI/CD to prevent deployments of models that don''t meet strict
    FPS/latency criteria. Explore canary deployments or A/B testing on a subset of edge devices with real-time
    performance monitoring to catch regressions early.'
  common_mistake: Candidates might overlook edge-specific hardware constraints, fail to consider integrating
    performance profiling/benchmarking into CI/CD for specific target hardware, or focus solely on model
    architecture changes without considering deployment optimizations like TensorRT or quantization. Another
    common mistake is neglecting pre- or post-processing bottlenecks that often shift from CPU to GPU
    or vice-versa depending on deployment strategy.
  napkin_math: 'Current frame processing time = 1s / 20 FPS = 50 ms/frame.

    Previous frame processing time = 1s / 45 FPS ≈ 22.2 ms/frame.

    The performance regression introduced an overhead of approximately 50 ms - 22.2 ms = 27.8 ms/frame.


    To restore previous performance (45 FPS), we need to save at least 27.8 ms/frame. To exceed it (e.g.,
    50 FPS), we need to reach a processing time of 1s / 50 FPS = 20 ms/frame, meaning a total saving of
    30 ms/frame.


    Example quantification of a fix:

    - If profiling reveals an unoptimized CPU-bound pre-processing step now takes 20 ms (up from 5 ms),
    optimizing it back to 5 ms saves 15 ms/frame.

    - If GPU inference, previously 17.2 ms (22.2 - 5), now takes 30 ms (50 - 20), this 13 ms regression
    might be due to suboptimal FP16 execution or a fallback. Converting key layers to INT8 could reduce
    this 30 ms inference time by 2-3x, bringing it down to 10-15 ms.


    Total estimated saving: 15 ms (pre-processing) + 15 ms (INT8 inference optimization) = 30 ms/frame.

    New estimated frame time: 50 ms (current) - 30 ms (saved) = 20 ms/frame, which translates to 50 FPS,
    exceeding the original target.'
