title: Optimizing Object Detection on Hailo-8 with Operator Gaps
scenario: 'Your team is tasked with deploying a cutting-edge object detection model on the Hailo-8 accelerator (26 TOPS INT8, 2.5W dataflow accelerator) for a real-time edge application. The model was developed using a standard deep learning framework (e.g., PyTorch) and needs to be converted to an optimized format suitable for Hailo-8''s runtime. After an initial attempt to convert the model to an intermediate format like ONNX, you discover significant operator coverage gaps when trying to compile it for the Hailo-8. This results in parts of the model being offloaded to the host CPU, drastically increasing latency and power consumption beyond the 2.5W budget.'
question: How would you identify and resolve Hailo-8 operator gaps, delegate unsupported ops, and weigh the delegation trade-offs?
details:
  realistic_solution: '1. **Early Prototyping & Profiling:** Before full-scale development, run a representative model through the Hailo-8 SDK''s compilation and profiling tools to identify unsupported operators and potential bottlenecks. Leverage SDK logs to pinpoint offloaded layers. 2. **Model Refactoring:** Replace unsupported operators with Hailo-8-native equivalents or composite operations. Re-architect portions of the model if necessary to improve compatibility and leverage the dataflow architecture. 3. **Custom Operator Development:** For critical, unavoidable unsupported operators, develop custom Hailo-8 kernels using the provided SDK. 4. **Intelligent Delegation Strategy:** Implement a fine-grained delegation strategy where only performance-critical, supported layers run on Hailo-8. For offloaded layers, optimize the host CPU code and consider asynchronous execution to minimize pipeline stalls. Prioritize offloading simpler, less computationally intensive layers. Balance accuracy vs. performance if architectural changes are required.'
  common_mistake: |
    **The Pitfall:** Assuming generic ONNX conversion guarantees full compatibility on specialized edge NPUs.
    **The Rationale:** Candidates trust the intermediate representation without profiling against the specific hardware compiler's operator support list.
    **The Consequence:** Late discovery of unsupported operations that fall back to a slow host CPU, destroying power efficiency and latency budgets.
  napkin_math: |
    * A model requires 10 GOPS total.
    * 90% (9 GOPS) runs on Hailo-8 in 50ms.
    * 10% (1 GOPS) offloads to CPU at 1/20th the speed.
    * CPU time = (1 GOPS / 9 GOPS) * 50ms * 20 = **~111ms**.
    * Total inference time = 50ms + 111ms = **161ms**, drastically exceeding the original 50ms expectation.
