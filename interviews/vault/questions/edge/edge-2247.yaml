title: Idle Power Governance for Always-On Edge Inference
scenario: A fleet of 500 industrial edge inference boxes (Jetson Orin NX 16GB, TDP
  25W) run a defect detection model in a factory with 8-hour production shifts. Power
  monitoring reveals the devices consume 22W even during the 16 hours/day when the
  production line is idle. A technician proposes turning off the devices during idle
  periods. The operations team objects that boot time (45 seconds) will delay defect
  detection at shift start. Quantify the carbon and cost impact of the current idle
  waste and evaluate the technician's proposal.
question: How much carbon and cost does the 22W idle draw waste each year, and should
  the 500 Jetson devices be shut down while idle?
details:
  realistic_solution: 'Idle waste quantification: 500 devices × 22W × 16hr/day × 365
    days = 64,240,000 Wh/year = 64,240 kWh/year. At 30 gCO2e/kWh: 1,927 kgCO2e/year.
    At $0.10/kWh: $6,424/year. Technician''s proposal: full shutdown saves 22W idle
    → 0W. Boot cost: 45 sec × 500 devices × 25W peak = 625 Wh per shift start (twice
    daily) = 1,250 Wh/day = 456 kWh/year. Net savings: 64,240 - 456 = 63,784 kWh/year
    (99% of idle waste). The 45-second delay is operationally manageable: pre-boot
    5 minutes before shift start. Better option: Jetson power mode 5 (15W idle with
    5-second wake) saves 7W × 16hr × 365 × 500 = 20,440 kWh/year (32% of idle waste)
    with zero operational disruption.'
  common_mistake: Calculating idle waste as (full TDP) × (idle time) instead of (idle
    power above sleep baseline) × (idle time). The 22W idle includes necessary functions
    (OS, network keepalive, health monitoring). The true waste is the difference between
    22W idle and the minimum achievable via power management.
  napkin_math: 'Full idle: 500 × 22W × 16h × 365 = 64,240 kWh/yr. CO2: 64,240 × 0.030
    = 1,927 kg/yr. Cost: $6,424/yr. Sleep mode (15W): 500 × 15W × 16h × 365 = 43,800
    kWh/yr saved vs full-on. Wait — saved vs 22W baseline: (22-15)×16×365×500 = 20,440
    kWh/yr = $2,044/yr savings. Hard shutdown: net 63,784 kWh/yr = $6,378/yr savings.
    ROI of both: immediate (zero capital cost, configuration change only). Payback:
    instantaneous. Carbon reduction: hard shutdown = 1,914 kgCO2e/yr ≈ 4 transatlantic
    flights.'
