title: The Autonomous Vehicle Fusion Bottleneck
scenario: You are a Staff ML Systems Engineer designing an autonomous vehicle's perception compute unit.
  The system uses two GPUs to process sensor data, with a hard real-time deadline of 33ms per frame. For
  the final 3D object detection fusion step, GPU1 must send a 512MB feature map to GPU2. You observe that
  the end-to-end latency is missing the 33ms target. Your diagnosis reveals the two GPUs are communicating
  over the motherboard's PCIe Gen5 bus, which provides a realistic, non-ideal peer-to-peer bandwidth of
  32 GB/s. Your colleague suggests this communication is the bottleneck and that a direct GPU-to-GPU interconnect
  is needed.
question: "Is the 512 MB GPU-to-GPU feature-map transfer over 32 GB/s PCIe Gen5 the bottleneck, and would NVLink fix it?"
details:
  realistic_solution: The core problem is the choice of interconnect for the high-bandwidth, latency-sensitive
    GPU-to-GPU communication. The calculation shows that the transfer over PCIe is the primary bottleneck.
  common_mistake: Engineers often assume any modern bus like PCIe Gen5 is 'fast enough' and don't perform
    the quantitative analysis. They might incorrectly blame the CPU for data starvation or the algorithm
    itself, without realizing that even a seemingly fast bus can become a bottleneck when large, frequent
    transfers are required under a tight real-time budget.
  napkin_math: 'Given a real-time budget of 33ms (equivalent to 30 FPS): NVLink (900 GB/s): 512 MB / 900
    GB/s = 0.57 ms — easily within budget, leaves 32.4ms for compute. PCIe Gen4 x16 (32 GB/s): 512 MB
    / 32 GB/s = 16 ms — consumes 48% of the 33ms budget on transfer alone. The 16ms PCIe transfer is the
    bottleneck: combined with GPU compute time on both sides, the pipeline will miss the 33ms deadline.'
  options:
  - The CPU is bottlenecked; it doesn't have enough PCIe lanes to feed both GPUs, causing the stall.
  - The problem is the network; InfiniBand is needed to get sensor data to the compute unit faster.
  - The 16ms PCIe transfer time consumes nearly 50% of the 33ms real-time budget, making it the bottleneck.
    A faster interconnect is required.
  - The issue is software; the data transfer should be optimized by using RDMA to bypass the CPU.
  correct_index: 2
