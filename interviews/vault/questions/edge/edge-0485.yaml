title: 'The Autonomous Vehicle Fusion Bottleneck'
scenario: 'You are a Staff ML Systems Engineer designing an autonomous vehicle''s perception compute unit. The system uses two GPUs to process sensor data, with a hard real-time deadline of 33ms per frame. For the final 3D object detection fusion step, GPU1 must send a 512MB feature map to GPU2. You observe that the end-to-end latency is missing the 33ms target. Your diagnosis reveals the two GPUs are communicating over the motherboard''s PCIe Gen5 bus, which provides a realistic, non-ideal peer-to-peer bandwidth of 32 GB/s.'
question: 'Is the 512 MB GPU-to-GPU feature-map transfer over 32 GB/s PCIe Gen5 the bottleneck, and would NVLink fix it?'
details:
  realistic_solution: 'The core problem is the choice of interconnect for the high-bandwidth, latency-sensitive GPU-to-GPU communication. The calculation shows that the transfer over PCIe is the primary bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming modern PCIe Gen5 is "fast enough" without quantifying the transfer latency.
    **The Rationale:** Engineers often blame the CPU or algorithms before checking the exact bandwidth of the interconnect.
    **The Consequence:** Real-time pipelines consistently miss deadlines because the data transfer consumes too much of the time budget.
  napkin_math: |
    - Real-time budget: 33 ms.
    - Feature map size: 512 MB.
    - PCIe Gen5 transfer time: 512 MB / 32 GB/s = 512 MB / 32000 MB/s = 0.016 s = **16 ms**.
    - Transfer consumes **48%** of the 33 ms budget.
    - NVLink transfer time: 512 MB / 900 GB/s = **0.57 ms**.
  options:
  - 'The CPU is bottlenecked; it doesn''t have enough PCIe lanes to feed both GPUs, causing the stall.'
  - 'The problem is the network; InfiniBand is needed to get sensor data to the compute unit faster.'
  - 'The 16ms PCIe transfer time consumes nearly 50% of the 33ms real-time budget, making it the bottleneck. A faster interconnect is required.'
  - 'The issue is software; the data transfer should be optimized by using RDMA to bypass the CPU.'
  correct_index: 2
