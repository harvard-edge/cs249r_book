title: Hailo-8 INT8 Quantization Strategy for Dataflow Streaming
scenario: You are leading the deployment of a vision transformer onto a Hailo-8 accelerator (26 TOPS INT8,
  2.5W). Because the Hailo-8 is a dataflow architecture with no local DRAM, all weights and activations
  must stream continuously from the host memory. Evaluate the system-level impact of choosing per-channel
  versus per-tensor INT8 quantization on the overall inference throughput and power efficiency of this
  streaming architecture.
question: "Should the Hailo-8 ViT use per-channel or per-tensor INT8 quantization, and how does that affect streaming throughput and power?"
details:
  realistic_solution: The optimal strategy prioritizes per-tensor quantization to minimize host-to-device
    memory traffic, keeping the dataflow pipeline saturated. An L5 engineer will realize that the lack
    of local DRAM means metadata overhead directly impacts latency. If per-tensor accuracy is insufficient,
    they will evaluate PTQ calibration strategies (like KL divergence) before resorting to QAT with mixed-precision,
    strategically isolating per-channel quantization to only the most sensitive layers.
  common_mistake: Candidates often assume compute is the bottleneck and blindly recommend per-channel
    quantization for better accuracy. They fail to account for the fact that streaming thousands of unique
    FP32 scales and zero-points from host memory for every layer will bottleneck the host bus and starve
    the 26 TOPS dataflow engine.
  napkin_math: 'For a 1M parameter layer (1MB INT8 weights) with 2048 output channels: Per-tensor adds
    8 bytes (1 scale, 1 ZP). Per-channel adds 2048 * 8B = 16KB of metadata. Over a 100-layer network,
    per-channel adds 1.6MB of metadata to stream per frame. At 30 FPS, that''s 48MB/s of pure metadata
    overhead competing for the host bus, actively reducing the utilization of the 2.5W, 26 TOPS compute
    engine by forcing it to stall while waiting for streaming quantization parameters.'
