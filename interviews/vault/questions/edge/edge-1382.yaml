title: Weighted Round-Robin for Asymmetric Edge Accelerators
scenario: You manage an on-premise edge appliance equipped with 4 Qualcomm Cloud AI 100 accelerators (each capable of 400 TOPS INT8 at 75W, with 32 GB LPDDR4x memory). Due to a chassis airflow constraint, two of the cards are thermally throttled and can only sustain 200 TOPS, while the other two operate at the full 400 TOPS. You are deploying a smart city traffic model that requires 0.5 TOPS per INT8 inference.
question: What weighted round-robin integer weights should the four AI 100 cards use, and what is the maximum theoretical throughput?
details:
  realistic_solution: The load balancer should use a weighted round-robin strategy where the weights are directly proportional to the available TOPS on each accelerator. We normalize the capacities to find the smallest integer weights, assigning 1 to the throttled cards and 2 to the unthrottled cards. The total throughput is the sum of all available capacities divided by the cost per inference.
  common_mistake: |
    **The Pitfall:** Assigning equal weights to all identical hardware.
    **The Rationale:** Candidates assume homogenous hardware performs identically, ignoring thermal and airflow constraints typical in edge environments.
    **The Consequence:** Overloading the thermally throttled cards, leading to dropped frames and severe latency spikes.
  napkin_math: |
    - **Available Compute:** Two throttled cards (200 TOPS each) and two unthrottled cards (400 TOPS each).
    - **Optimal Weights:** The ratio 200:400 simplifies to weights of **(1, 1, 2, 2)**.
    - **Total Compute:** (2 $\times$ 200) + (2 $\times$ 400) = 1200 TOPS.
    - **Max Throughput:** 1200 TOPS / 0.5 TOPS per inference = **2400 inferences/second**.
