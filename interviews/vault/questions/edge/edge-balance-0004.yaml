title: Edge Quantization Calibration Plan
scenario: An edge detector works in a lab but fails in rain and night scenes after INT8 quantization. Design a calibration and validation plan.
question: How would you design calibration for an INT8 edge detector that fails in rain and night scenes?
details:
  realistic_solution: The calibration set must include rain, night, glare, sensor noise, and representative camera hardware. Validation should report per-condition accuracy and activation clipping statistics. If night activations exceed calibration ranges, use better calibration data or quantization-aware training.
  common_mistake: Calibrating only on clean daytime lab data and assuming INT8 behavior transfers to field conditions.
  napkin_math: If night activation maxima are 2x lab maxima, lab-derived scales can clip real field activations.
