title: Define Fail-Operational vs Fail-Safe on Cloud AI 100
scenario: You are designing the reliability architecture for a critical video analytics pipeline running
  on a Qualcomm Cloud AI 100 on-premise inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). When
  the system experiences thermal throttling or sudden power constraints, it must activate a degradation
  ladder. Define the exact difference between 'fail-safe' and 'fail-operational' states in the context
  of this edge deployment.
details:
  realistic_solution: The correct recall definition is that 'fail-safe' stops the system without causing
    external harm (e.g., shutting down the pipeline and triggering an alert to save the 75W power budget),
    while 'fail-operational' continues core functions at a degraded level (e.g., QoS shedding or switching
    to a smaller INT8 fallback model). For an on-premise security accelerator, fail-operational is the
    required state to maintain continuous monitoring.
  common_mistake: Candidates often confuse the two terms, assuming 'fail-safe' means the system keeps
    running safely at a lower capacity. They fail to recall that fail-safe implies a harmless but complete
    shutdown of the service, whereas fail-operational means the system actively continues to process data
    at a reduced Quality-of-Service.
  napkin_math: 'Baseline load: 15 camera streams requiring 20 TOPS each = 300 TOPS (comfortably within
    the 400 TOPS INT8 capacity of the Cloud AI 100). If power supply issues force a drop from 75W to 40W,
    available compute scales down proportionally to roughly ~213 TOPS. A fail-operational degradation
    ladder switches to a 10 TOPS fallback model (15 streams * 10 TOPS = 150 TOPS) to stay under the degraded
    compute threshold while keeping 32 GB LPDDR4x memory footprint stable.'
