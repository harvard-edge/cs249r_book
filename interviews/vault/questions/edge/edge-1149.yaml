title: 'Edge TCO Design: Optimize Jetson Orin Deployment for 3-Year ROI'
scenario: Design a cost-optimal edge inference system for a retail chain deploying at 200 stores, each needing 30 FPS object detection for theft prevention. Hardware options include Jetson Orin ($499, 60W), Hailo-8+Pi5 ($280, 7.5W), or Cloud inference ($0.05/image).
question: What is the correct annual power cost for one 60W Jetson Orin running 24/7 at $0.10/kWh?
details:
  realistic_solution: 'Annual power cost = Watts * hours * $/kWh / 1000. For the Orin, 60 * 8760 * 0.10 / 1000 = $52.56/yr. When scaling TCO across 200 stores over 3 years, these power disparities and cloud break-even points dictate the hardware choice.'
  common_mistake: Comparing options only on upfront cost without calculating the break-even month when cloud becomes more expensive than the upfront hardware investment and power OPEX.
  napkin_math: |
    **Assumptions & Constraints:**
    - 60W Jetson Orin running 24/7
    - Power cost: $0.10/kWh

    **Calculations:**
    - Annual hours = 8760 hours
    - Total Energy = 60W * 8760h = 525,600 Wh = 525.6 kWh
    - Annual cost = 525.6 kWh * $0.10/kWh = $52.56

    **Conclusion & Interpretation:**
    - **Result: $52.56/yr (Power-Bound)**. Accurate TCO modeling must properly convert watts to kilowatts to determine long-term OPEX.
