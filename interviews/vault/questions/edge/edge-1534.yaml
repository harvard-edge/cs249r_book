title: INT8 Calibration Bias on Dataflow Edge Accelerators
scenario: You are deploying a pedestrian detection model on a Hailo-8. Because the Hailo-8 is a dataflow accelerator with no local DRAM, the model must be fully quantized to INT8 so that weights and activations can stream efficiently from host memory. You need to evaluate the system to guarantee equalized odds across intersectional demographic subgroups. Option A uses a random 1,000-frame sample from the raw operational data for INT8 Post-Training Quantization (PTQ) calibration before running the full fairness evaluation. Option B curates a strictly balanced 1,000-frame PTQ calibration set across all subgroups before evaluation.
question: Which design is better for evaluating and maintaining fairness, and why?
details:
  realistic_solution: Option B is correct. The Hailo-8 only executes INT8 arithmetic, relying on static quantization ranges determined during PTQ. If calibrated on an imbalanced dataset, the resulting INT8 ranges will optimize for the majority group. A balanced calibration set ensures the INT8 scale factors accommodate the unique activation distributions of all intersectional groups, preserving equalized odds without requiring costly dynamic quantization on the host CPU.
  common_mistake: |
    **The Pitfall:** Choosing Option A, assuming random sampling minimizes overall KL-divergence and global quantization error.
    **The Rationale:** Candidates rely on standard model compression best practices without considering that static INT8 clipping thresholds calibrated on an imbalanced dataset will disproportionately clip minority subgroup activations.
    **The Consequence:** Deploying an inherently biased INT8 model that systematically fails on minority demographics despite the FP32 baseline passing equalized odds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Majority group activation range: [-4, 4].
    - Minority group activation range: [-8, 8].
    - INT8 representation: 256 discrete bins.

    **Calculations:**
    - Option A (Imbalanced): Calibrates scale to majority [-4, 4]. Scale = 8/255 = 0.031. Minority values > 4 are hard-clipped.
    - Option B (Balanced): Calibrates scale to [-8, 8]. Scale = 16/255 = 0.062.

    **Conclusion & Interpretation:**
    - **Result: Precision vs Clipping Tradeoff (Accuracy-Bound)**. Option B trades a tiny increase in quantization noise (0.031) for the majority group to entirely eliminate destructive hard-clipping for the minority group, preserving demographic parity.
