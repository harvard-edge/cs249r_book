title: Evaluating INT8 Quantization Bias on Hailo-8
scenario: 'You are deploying a smart-city pedestrian detection model on a Hailo-8 dataflow accelerator
  (26 TOPS INT8, 2.5W, no local DRAM). To meet the performance targets, the model is quantized to INT8.
  Your team proposes two fairness evaluation strategies: Pipeline A evaluates equalized odds on the FP32
  model and only checks overall accuracy on the INT8 model. Pipeline B streams a demographically balanced
  50,000-image dataset from host memory directly through the Hailo-8 to evaluate equalized odds on the
  physical hardware. Evaluate these alternatives and choose the best approach.'
details:
  realistic_solution: Pipeline B is mandatory. Because the Hailo-8 executes INT8 dataflow without local
    DRAM, activation bounds are rigidly fixed during compilation. If the calibration data lacks subgroup
    representation, INT8 quantization disproportionately degrades performance for those minority groups.
    Streaming the dataset from host memory through the Hailo-8 ensures we measure actual on-device equalized
    odds, capturing hardware-specific quantization artifacts.
  common_mistake: Candidates often assume that if the FP32 model is fair and the overall INT8 accuracy
    drop is minimal, the INT8 model remains fair. They fail to realize that INT8 calibration sets are
    often biased, causing the quantization process to clip activation ranges critical for minority subgroups.
  napkin_math: For a 50,000 image dataset with 640x640 RGB inputs (~1.2MB per tensor = 60GB total in host
    memory), evaluate Hailo-8 throughput. Given 26 TOPS INT8 and a 16 GOPS model, theoretical max throughput
    is 26,000 / 16 = 1,625 FPS. Streaming from host memory requires 1,625 FPS * 1.2 MB = 1.95 GB/s PCIe
    bandwidth. The full hardware-in-the-loop evaluation takes only 50,000 / 1,625 = 30.7 seconds, proving
    Pipeline B is computationally trivial and highly efficient at 2.5W.
