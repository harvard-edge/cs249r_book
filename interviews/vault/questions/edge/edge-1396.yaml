title: On-Device Coreset Selection for Edge Continual Learning
scenario: You are designing an on-premise continual learning pipeline for an autonomous visual inspection system powered by a single Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system processes 60 frames per second of high-resolution video and must identify rare edge-case defects. Due to uplink bandwidth and privacy constraints, only a tiny fraction of frames can be sent to a central server for labeling and fine-tuning.
question: How would you design the AI 100 active data selection and coreset pipeline to maximize ICR while sending only a tiny fraction of 60 FPS video for labeling?
details:
  realistic_solution: Implement a dual-process architecture where the main defect detection model (quantized to INT8) runs continuously, while a lightweight embedding head extracts feature vectors for each frame. Maintain a dynamic, memory-bounded coreset buffer on the device. Use a streaming diversity-aware sampling algorithm (e.g., core-set via k-center greedy) operating on these embeddings to select highly informative, temporally distinct frames, ensuring maximal data diversity for the central curriculum learning pipeline.
  common_mistake: |
    **The Pitfall:** Saving all low-confidence frames indiscriminately.
    **The Rationale:** Candidates ignore the highly correlated nature of sequential video frames and fail to account for the memory overhead of complex acquisition functions.
    **The Consequence:** Transmitting redundant data, saturating the uplink, and quickly exhausting the 32GB RAM limit.
  napkin_math: |
    1. **Frame Input:** 60 FPS * 3600 * 24 ≈ 5.18M frames/day.
    2. **Memory Footprint:** 5.18M * 2MB/frame ≈ 10.3 TB/day (impossible).
    3. **Embedding Strategy:** 5.18M * 512 bytes = ~2.65 GB (fits easily in RAM).
    4. **Buffer Limit:** With 28 GB free RAM, store ~14,000 raw 2MB frames.
    **Result: Clustering 2.65 GB of embeddings allows selecting exactly 14,000 maximally diverse frames, achieving a 99.7% reduction.**
