title: On-Device Coreset Selection for Edge Continual Learning
scenario: You are designing an on-premise continual learning pipeline for an autonomous visual inspection system powered by a single Qualcomm Cloud AI 100. The system processes 60 frames per second of high-resolution video and must identify rare edge-case defects. Due to uplink bandwidth and privacy constraints, only a tiny fraction of frames can be sent to a central server for labeling and fine-tuning.
question: How would you design the AI 100 active data selection and coreset pipeline to maximize ICR while sending only a tiny fraction of 60 FPS video for labeling?
details:
  realistic_solution: Utilize a decoupled extraction strategy. Run continuous INT8 dense inference while parallelizing a lightweight embedding head. Map streaming vector distances using k-center greedy logic across localized RAM buffers to identify truly novel edge-case divergences without retaining bloated uncompressed frame pools.
  common_mistake: |
    **The Pitfall:** Saving all low-confidence frames indiscriminately.
    **The Rationale:** Candidates ignore the highly correlated nature of sequential video frames and fail to account for the memory overhead of complex acquisition functions.
    **The Consequence:** Transmitting redundant data, saturating the uplink, and quickly exhausting the 32GB RAM limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input Feed: 60 FPS video.
       - Raw Frame Size: ~2 MB.
       - Device RAM Limit: 32 GB (assume ~28 GB usable for buffering).
       - Embedding Extraction Head: Yields 512 bytes per frame.
    2. **Calculations:**
       - Daily Frame Intake = 60 FPS * 3600 s * 24 h = 5,184,000 frames/day.
       - Raw Storage for 1 day = 5,184,000 * 2 MB ≈ 10.3 TB (Exceeds hardware limit).
       - Embedding Storage for 1 day = 5,184,000 * 512 Bytes ≈ 2.65 GB (Easily fits).
       - Maximum Raw Frames in RAM Buffer = 28 GB / 2 MB = 14,000 frames.
       - Data Reduction Ratio = 14,000 frames / 5,184,000 frames ≈ 0.0027 (99.7% reduction).
    3. **Conclusion & Interpretation:**
       - **Result: 2.65 GB Embeddings (Memory-Capacity-Bound)** - Running active selection algorithms on dense embeddings rather than raw video allows for maximum data diversity within the edge constraints.
