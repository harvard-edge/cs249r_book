title: Operator Fusion Bottlenecks on Cloud AI 100
scenario: You are deploying a quantized vision transformer on a Qualcomm Cloud AI 100 accelerator for
  on-premise inference. During profiling, you observe that despite the theoretical peak of 400 TOPS for
  INT8 at 75W, the system is only achieving 60 TOPS. The compilation graph shows multiple unfused pointwise
  operations (activations, element-wise adds) following dense matrix multiplications. How do you analyze
  this compiler bottleneck and quantify the impact of operator lowering and fusion?
question: "How do you analyze this compiler bottleneck and quantify the impact of operator lowering and fusion?"
details:
  realistic_solution: The compilation pipeline is failing to fuse pointwise operations, leading to memory-bandwidth
    starvation. The solution is to write custom lowering rules or use the platform's native compiler passes
    to fuse MatMul + Add + Activation into a single kernel. This keeps intermediate activations in the
    accelerator's local SRAM, maximizing utilization of the INT8 compute cores and drastically reducing
    power-hungry reads/writes to off-chip memory.
  common_mistake: Candidates often assume the bottleneck is strictly compute-bound or suggest generic
    quantization without analyzing the graph compiler's lowering phase. They fail to recognize that unfused
    pointwise operations cause excessive trips to the 32 GB LPDDR4x memory, stalling the compute engines.
  napkin_math: 'Consider an intermediate tensor of 16MB (INT8). Unfused: MatMul writes 16MB; Add reads
    16MB, writes 16MB; Activation reads 16MB, writes 16MB. Total LPDDR4x traffic = 80MB per block. Fused:
    MatMul, Add, and Activation are computed in SRAM; only the final 16MB result is written to the 32
    GB LPDDR4x memory. This reduces memory I/O by 80% (64MB saved per block). If a model has 24 such blocks,
    we save ~1.5GB of memory traffic per inference, alleviating the memory bandwidth bottleneck and allowing
    the hardware to push closer to its 400 TOPS INT8 limit within its 75W power budget.'
