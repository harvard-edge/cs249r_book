title: 'Model Format Conversion: Specify ONNX Conversion Pipeline with Validation for Edge'
scenario: 'Specify a production-grade ONNX conversion pipeline for deploying PyTorch models to Hailo-8
  edge devices. The pipeline must: validate numerical equivalence (< 0.1% MAE), handle unsupported ops,
  report conversion failures with actionable messages, and run in CI/CD in under 10 minutes. Define each
  stage with concrete pass/fail criteria.'
details:
  realistic_solution: 'Stage 1 (2min): ONNX export with torch.onnx.export, opset 17, static shapes. onnx.checker.check_model
    — fail if any violation. Stage 2 (1min): onnxruntime inference on 100 validation inputs, compute MAE
    vs. PyTorch. Fail if MAE > 0.001. Stage 3 (3min): Hailo DFC compilation with INT8 calibration (50
    images). Stage 4 (2min): Run HEF on Hailo-8 simulator, compare vs. ONNX output on 50 inputs. Fail
    if accuracy drop > 1%. Stage 5 (2min): Report engine size, estimated throughput. Total: 10min ✓.'
  common_mistake: Testing only on a single input shape and small validation set; production models often
    fail on edge cases (padding=SAME, dynamic shapes, unusual stride patterns) that appear only with diverse
    inputs.
  napkin_math: 'ONNX validation: 100 inputs × 30M param model forward pass on CPU: 100 × 15 GFLOPs / 10
    TFLOPS CPU = 100 × 1.5ms = 150ms. Fast. Hailo DFC compile: ~3 min for 30M model (dominated by quantization
    search). HEF simulation: 50 inputs on CPU simulator: ~5 min? Actually Hailo simulator runs at ~10fps
    → 50 frames = 5s. Total pipeline: 2+1+3+0.1+2 = 8.1min < 10min ✓.'
