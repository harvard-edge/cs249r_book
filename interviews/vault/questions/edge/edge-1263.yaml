title: Architecting Sequence Models for Hailo-8 Dataflow
scenario: Your team is deploying a real-time sequence prediction model on an edge sensor powered by a Hailo-8 dataflow accelerator. The Hailo-8 provides an impressive 26 TOPS of INT8 compute at just 2.5W, but it possesses no local DRAM, meaning all model weights and KV caches must stream from the host processor's memory over PCIe.
question: Which sequence model architecture—encoder-only, decoder-only, or hybrid—best fits a host-streamed Hailo-8, and why?
details:
  realistic_solution: The optimal design leverages an extremely heavy encoder coupled with either a non-autoregressive head or a very lightweight decoder. An encoder-only or heavy-encoder system processes the entire input sequence in a single pass, meaning the model weights are streamed from the host exactly once. This maximizes the dataflow accelerator's utilization and minimizes the severe latency penalty of streaming parameters over the host bus.
  common_mistake: |
    **The Pitfall:** Proposing a standard decoder-only architecture like a small LLM.
    **The Rationale:** Candidates focus entirely on the 26 TOPS compute metric and fail to recognize that autoregressive decoding on a chip with no local DRAM requires streaming the entire model's weights from the host for every single generated token.
    **The Consequence:** The dataflow accelerator is completely bottlenecked by PCIe transfers, resulting in severe latency and abysmal throughput.
  napkin_math: |
    - Model size: 100M parameters in INT8 = 100MB.
    - PCIe streaming time: 100MB / 33.3 GB/s = 3ms.
    - Compute time: 20 GOPS / 26 TOPS = ~0.76ms (Compute is hidden behind memory transfers).
    - Decoder-only (50 tokens): Streams the 100MB model 50 times. 50 * 3ms = 150ms total latency.
    - Asymmetric Hybrid (90M encoder, 10M decoder): Streams encoder once (2.7ms) and decoder 50 times (50 * 0.3ms = 15ms).
    **Conclusion: The hybrid model reduces total latency from 150ms to 17.7ms.**
