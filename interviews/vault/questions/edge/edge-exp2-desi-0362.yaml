title: Hailo-8 Host Bandwidth Degradation Strategy
scenario: You are designing an autonomous retail checkout system using a single host processor paired
  with a Hailo-8 accelerator (26 TOPS INT8, 2.5W, streaming weights and activations directly from host
  memory due to a lack of local DRAM). The system normally processes 4 concurrent 1080p camera streams.
  During thermal throttling or heavy background host tasks, the PCIe/host memory bandwidth available to
  the Hailo-8 drops by 50%, risking pipeline stalls. Design a fail-operational graceful degradation ladder
  that maintains checkout accuracy without crashing the dataflow pipeline.
details:
  realistic_solution: The optimal strategy leverages the Hailo-8's dataflow architecture by shedding activation
    load instead of changing weights. The degradation ladder should first reduce input resolution (e.g.,
    from 1080p to 720p) or dynamically drop the frame rate (e.g., 30 FPS to 15 FPS) while keeping the
    same model weights pinned in the host streaming pipeline. If degradation worsens, the system should
    prioritize a single overhead camera and drop peripheral streams to maintain core functionality.
  common_mistake: 'Candidates often suggest dynamically loading a smaller, simpler model when resources
    degrade. They fail to evaluate the Hailo-8''s architecture: lacking local DRAM, swapping models requires
    streaming new weights over the already-congested host memory interface, which exacerbates the bottleneck
    and causes severe latency spikes.'
  napkin_math: 'Normal activation bandwidth: 4 streams * 30 FPS * 1920 * 1080 * 3 bytes = ~746 MB/s. With
    a 50% bandwidth drop, the limit is ~373 MB/s. Swapping to a new 50MB model would consume 100% of this
    constrained bandwidth for over 130ms, pausing all inference. Instead, reducing resolution to 720p
    (1280 * 720 * 3 bytes = 2.76 MB/frame) yields 4 * 30 * 2.76 = ~331 MB/s, safely keeping the dataflow
    pipeline running within the 373 MB/s budget.'
