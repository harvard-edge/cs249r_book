title: Real-time Multi-Model Object Analysis on Google Coral Edge TPU
scenario: A security firm requires a real-time, on-device system to detect suspicious objects and classify them. This compound AI system must operate on a Google Coral Edge TPU, which provides 4 TOPS (Tera Operations Per Second) for INT8 computations and has a power budget of 2W. The system involves an initial object detection model (Model A) followed by a more detailed classification model (Model B) for identified objects.
question: How would you architect the Coral Edge TPU compound detector-classifier pipeline to stay under 100 ms per frame and 2W?
details:
  realistic_solution: |
    The solution involves careful selection or quantization of both Model A and Model B to INT8 format. Model A performs initial detection, and regions of interest are fed into Model B. Orchestration manages sequential execution and batching. Optimizations include model pruning, knowledge distillation, and strategic pipeline scheduling. Utilizing custom TensorFlow Lite delegates for Coral Edge TPU is essential for maximizing hardware utilization.
  common_mistake: |
    **The Pitfall:** Ignoring the strict INT8-only constraint and failing to optimize inter-model data transfers.
    **The Rationale:** Designing a cloud-style pipeline where FP16/FP32 operations and heavy data movement are permissible.
    **The Consequence:** Creating a pipeline that either crashes on the TPU or suffers massive latency spikes due to CPU fallback and memory stalls.
  napkin_math: |
    - **Target latency:** 100 ms/frame.
    - **Coral Edge TPU compute:** 4 TOPS (4000 GOPs).
    - **Model A (Detection):** ~5 GOPs.
    - **Model B (Classification):** ~2 GOPs per object.
    - **10 Objects Detected:** 5 GOPs + (2 GOPs * 10) = 25 GOPs total.
    - **Theoretical Compute Time:** 25 GOPs / 4000 GOPs/sec = 6.25 ms.
    - **Conclusion:** 6.25 ms easily fits the 100 ms budget, proving that **memory bandwidth and CPU orchestration** are the real bottlenecks, not INT8 compute.
