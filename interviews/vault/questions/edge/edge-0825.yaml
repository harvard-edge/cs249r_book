title: Memory Overhead of EWC on Edge
scenario: You are deploying a continuous learning acoustic anomaly detector on an edge gateway with exactly 8MB of available SRAM. The base model is a CNN with 500,000 parameters (FP32). To incrementally learn new machine sound profiles on-device without catastrophic forgetting, you implement Elastic Weight Consolidation (EWC) using SGD with momentum.
question: What is the total parameter-state memory footprint with EWC and SGD momentum, does it fit in 8 MB SRAM, and how can you make it fit?
details:
  realistic_solution: The standard footprint is 10MB, which exceeds the 8MB budget. To fit within the budget, quantize the static EWC buffers (anchor weights and Fisher diagonal) from FP32 to FP16. This reduces their combined size from 4MB to 2MB, bringing the total parameter memory footprint to exactly 8MB.
  common_mistake: |
    **The Pitfall:** Failing to account for the Fisher Information Matrix diagonal and anchor weights required by EWC.
    **The Rationale:** Candidates calculate the footprint of standard SGD but forget that continual learning algorithms like EWC require massive static buffers to prevent catastrophic forgetting.
    **The Consequence:** The deployment process crashes immediately due to an SRAM Out of Memory error.
  napkin_math: |
    - 1 parameter in FP32 = 4 bytes. 500K params = 2 MB.
    - Standard Training State: Current Weights (2 MB) + Gradients (2 MB) + SGD Momentum (2 MB) = 6 MB.
    - EWC State (FP32): Anchor Weights (2 MB) + Fisher Diagonal (2 MB) = 4 MB.
    - Total FP32 Memory = 10 MB (Exceeds 8 MB budget).
    - FP16 EWC Optimization: Anchor (1 MB) + Fisher (1 MB) = 2 MB.
    **Conclusion: Quantizing the EWC buffers to FP16 reduces the total footprint to exactly 8 MB, fitting the SRAM budget.**
