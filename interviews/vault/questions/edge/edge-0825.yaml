title: Memory Overhead of EWC on Edge
scenario: You are deploying a continuous learning acoustic anomaly detector on an edge gateway with exactly
  8MB of available SRAM. The base model is a CNN with 500,000 parameters (FP32). To incrementally learn
  new machine sound profiles on-device without catastrophic forgetting, you implement Elastic Weight Consolidation
  (EWC) using SGD with momentum. Calculate the total parameter-state memory footprint during fine-tuning
  (accounting for current weights, gradients, optimizer state, and required EWC buffers). Does it fit
  in the 8MB budget, and if not, how can you make it fit?
details:
  realistic_solution: The standard footprint is 10MB, which exceeds the 8MB budget. To fit within the
    budget, quantize the static EWC buffers (anchor weights and Fisher diagonal) from FP32 to FP16. This
    reduces their combined size from 4MB to 2MB, bringing the total parameter memory footprint to exactly
    8MB.
  common_mistake: Failing to account for the Fisher Information Matrix diagonal and the anchor weights
    required by EWC, which significantly increases the memory footprint during training.
  napkin_math: '1 param (FP32) = 4 bytes. 500K params = 2MB.

    States needed: Current Weights (2MB), Gradients (2MB), SGD Momentum (2MB).

    EWC additional state: Anchor Weights (2MB) + Fisher Diagonal (2MB).

    Total FP32 Memory = 5 * 2MB = 10MB (> 8MB budget).

    FP16 EWC Optimization: Anchor (1MB) + Fisher (1MB) = 2MB.

    New Total = 6MB (training state) + 2MB (FP16 EWC state) = 8MB (fits perfectly).'
