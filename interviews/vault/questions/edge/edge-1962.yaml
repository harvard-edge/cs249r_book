title: Optimizing LLM Deployment on Hailo-8 via Pruning and Sparsity
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on the Hailo-8 edge AI accelerator. The original model is too large and slow for the latency and power budget. You decide to employ pruning techniques to reduce model size and accelerate inference.
question: "How would you choose structured or unstructured sparsity patterns for an INT8 LLM on Hailo-8, and evaluate accuracy, latency, throughput, and power?"
details:
  realistic_solution: Start with coarse-grained (structured) pruning, such as channel or filter pruning, which naturally leads to hardware-friendly sparse tensors that can be more efficiently processed by dataflow accelerators like the Hailo-8. Supplement this with specific hardware-aware sparsity patterns (e.g., N:M sparsity) that exploit the accelerator's parallel processing units. Iteratively prune, retrain, and re-quantize to INT8, using Hailo-8's profiling tools to measure actual latency.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning aggressively without considering the Hailo-8's dataflow architecture.
    **The Rationale:** Candidates focus solely on theoretical FLOP reduction, ignoring that unstructured pruning leads to non-contiguous memory access patterns that dataflow hardware cannot accelerate.
    **The Consequence:** The pruned model has 80% fewer FLOPs but runs slower than the dense model due to memory access thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute required: 500 GOPS per inference.
       - Hailo-8 limit: 26 TOPS (26,000 GOPS) INT8, 2.5W budget.
       - Inference target: <10ms.
    2. **Calculations:**
       - Theoretical dense latency = 500 GOPS / 26,000 GOPS = 19.2 ms.
       - Target latency = 10 ms (requires ~2x speedup).
       - Power budget: 2.5W * 0.01s = 25 mJ per inference.
       - 50% structured pruning reduces FLOPs to 250 GOPS, yielding ~9.6 ms latency (meeting target).
    3. **Conclusion & Interpretation:**
       - **Result: ~9.6 ms latency with structured pruning** (Compute-Bound, fits 2.5W budget).
