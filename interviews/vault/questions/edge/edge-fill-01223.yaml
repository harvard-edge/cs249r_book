title: Progressive Rollout Strategy for Edge ML on Qualcomm Cloud AI 100
scenario: You are responsible for deploying a critical, newly optimized machine learning model for a real-time
  edge inference application. The target hardware is a fleet of Qualcomm Cloud AI 100 devices, each featuring
  32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope. Your goal is to introduce
  this new model into production using a progressive rollout strategy, ensuring minimal disruption and
  the ability to thoroughly evaluate its performance in the field against the existing model. Outline
  a suitable strategy, detailing how you would leverage blue-green, canary, or shadow deployment techniques,
  traffic splitting, and a robust rollback plan, specifically considering the unique constraints and capabilities
  of these high-performance edge devices.
question: "How would you roll out the new model progressively on Qualcomm Cloud AI 100 devices with traffic splitting, monitoring, and rollback?"
details:
  realistic_solution: A realistic solution would involve a canary deployment approach. Start by deploying
    the new model to a small, isolated subset (e.g., 5-10%) of the Qualcomm Cloud AI 100 devices. Implement
    comprehensive monitoring for key metrics such as inference latency, model accuracy (if possible with
    ground truth or proxy metrics), LPDDR4x memory utilization, INT8 TOPS utilization, and actual power
    consumption on both the canary and baseline groups. Use traffic splitting to route a small portion
    of real-world inference requests to the new model. Crucially, establish automated thresholds for these
    metrics that, if breached, would trigger an immediate and automated rollback to the previous stable
    model version on the affected devices. If the canary phase is successful over a defined period, gradually
    expand the rollout to larger segments of the fleet (e.g., 25%, 50%, 100%), maintaining continuous
    monitoring and rollback capabilities at each stage.
  common_mistake: A common mistake in this scenario is to deploy the new model to a large percentage of
    edge devices simultaneously without adequate real-world validation, or to lack a clearly defined,
    automated rollback mechanism. This can lead to widespread service degradation, excessive power consumption,
    or performance issues that are difficult and slow to remediate across a distributed edge fleet.
  napkin_math: 'If you have 50,000 Qualcomm Cloud AI 100 devices and decide to start with a 5% canary
    rollout, how many devices will initially run the new model? (Answer: 2,500 devices). If the new model
    unexpectedly causes a 10W increase in power consumption per device, what is the additional power draw
    for the canary group? (Answer: 25 kW).'
