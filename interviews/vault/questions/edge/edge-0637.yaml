title: The Headlight Flare Catastrophe
scenario: "You are the ML Systems Architect for a leading autonomous vehicle company. Your team has just developed a new HDR-capable (High Dynamic Range) pedestrian detection model. To meet the 33ms real-time deadline on the vehicle's Jetson AGX Orin compute module, the model was quantized from FP16 to INT8 using Post-Training Quantization (PTQ). The quantized model passed all extensive simulation tests, which used a standard daytime driving dataset for calibration. However, during a fleet-wide field test, a critical failure occurs: at night, when an oncoming car's headlights create a sudden, bright flare, the system fails to detect a pedestrian stepping off the curb. Analysis of the captured sensor data reveals that during the flare event, the activation values in the first three convolutional layers of the model saturate, clamping to the INT8 maximum value of 127."
question: How would you resolve the HDR INT8 saturation failure and prevent data-dependent quantization failures from recurring?
details:
  realistic_solution: A Staff-level engineer must go beyond a simple fix and propose a systemic defense-in-depth strategy.
  common_mistake: |
    **The Pitfall:** Blaming the quantization tool or suggesting a rollback to FP16.
    **The Rationale:** Junior engineers may assume it's a software bug or that INT8 is fundamentally broken, missing that rolling back to FP16 violates the hard real-time latency budget. Others suggest only retraining with more night-time data without addressing the architectural flaw.
    **The Consequence:** Failing to fix the root cause, leading to either missed latency deadlines (FP16 fallback) or continued vulnerability to out-of-distribution saturation events.
  napkin_math: |
    * FP16 dynamic range: ~6e-5 to 65504.
    * INT8 dynamic range: [-128, 127].
    * Calibration scaling factor `S` = 127 / A_max.
    * Daytime max activation (A_fp16_day) = 2.0.
    * Scaling factor `S` = 127 / 2.0 = **63.5**.
    * Nighttime HDR flare max activation (A_fp16_night) = 5.0.
    * Quantized night value = 5.0 * 63.5 = 317.5.
    * Clamping limits this to **127**, destroying the HDR gradient information.
