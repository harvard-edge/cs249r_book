title: The Headlight Flare Catastrophe
scenario: 'You are the ML Systems Architect for a leading autonomous vehicle company. Your team has just
  developed a new HDR-capable (High Dynamic Range) pedestrian detection model. To meet the 33ms real-time
  deadline on the vehicle''s Jetson AGX Orin compute module, the model was quantized from FP16 to INT8
  using Post-Training Quantization (PTQ). The quantized model passed all extensive simulation tests, which
  used a standard daytime driving dataset for calibration. However, during a fleet-wide field test, a
  critical failure occurs: at night, when an oncoming car''s headlights create a sudden, bright flare,
  the system fails to detect a pedestrian stepping off the curb. Analysis of the captured sensor data
  reveals that during the flare event, the activation values in the first three convolutional layers of
  the model saturate, clamping to the INT8 maximum value of 127. Propose a robust, multi-layered architectural
  strategy to resolve this immediate crisis and prevent this entire class of ''data-dependent quantization
  failures'' from recurring.'
details:
  realistic_solution: A Staff-level engineer must go beyond a simple fix and propose a systemic defense-in-depth
    strategy.
  common_mistake: The most common junior-level response is to blame the quantization tool (e.g., 'TensorRT
    must have a bug') or to suggest simply reverting to the FP16 model, which would miss the hard real-time
    latency budget and is not a viable long-term solution. Another mistake is to suggest only retraining
    with more night-time data, without addressing the fundamental architectural flaw in the quantization
    process itself.
  napkin_math: Let's quantify why the saturation happened. An FP16 tensor has a massive dynamic range
    (from ~6e-5 to 65504). INT8's range is a fixed [-128, 127]. PTQ calibration finds a scaling factor
    `S` to map the typical FP16 activation range to the INT8 range. Assume the daytime calibration data
    has a typical max activation value of `A_fp16_day = 2.0` in the first layer. The calibrator sets `S
    = 127 / 2.0 = 63.5`.
