title: Implementing Offline-First RAG with Incremental Index Updates on Jetson Orin
scenario: A field service tool on Jetson Orin (32GB LPDDR5, 60W) needs RAG over a 10,000-document corpus that receives 50 new documents per day from cloud sync. The FAISS flat index rebuild takes 45 seconds for the full corpus. Network connectivity is intermittent — the device must operate offline for up to 8 hours.
question: How would you update the 10,000-document FAISS index incrementally so new documents are searchable within 30 seconds and offline operation continues?
details:
  realistic_solution: 'Maintain two indexes: a large static HNSW index (10K docs, rebuilt nightly) and a small flat L2 index for the rolling 24-hour delta (max 50 docs). At query time, search both and merge results by score. Delta index operations: embedding 50 new docs at 200 vecs/s on Orin = 0.25s, adding to flat index = negligible. Merge query: search HNSW (8ms) + search flat-50 (0.5ms) + merge top-K = 8.5ms total. Nightly full rebuild runs during low-usage window (midnight, 45s is acceptable). During 8-hour offline period: serve from static index + accumulated delta.'
  common_mistake: |
    **The Pitfall:** Rebuilding the full FAISS index every time new documents arrive.
    **The Rationale:** It is the standard approach for small static datasets and conceptually simple.
    **The Consequence:** Causes 45-second index rebuild windows during which retrieval is unavailable, making the system appear offline even when connectivity resumes.
  napkin_math: |
    *   **Full FAISS rebuild:** 45s (unacceptable for 30s requirement).
    *   **Delta index (50 docs):** embed 50 * (1/200s) = 0.25s.
    *   **Flat search on 50 vectors:** 0.5ms.
    *   **HNSW search on 10K:** 8ms.
    *   **Combined query:** 8.5ms (vs 8ms baseline — 6% overhead).
    *   **Daily delta accumulation:** 50 docs * 1.5KB embeddings = 75KB/day (negligible).
    *   **Offline mode degrades gracefully:** after 8h * 50 docs/day = up to 16.7 missed docs.
    *   **Final Result:** System meets requirements with **8.5ms combined query time**.
