title: The High-Speed Camera's DMA Budget
scenario: An industrial inspection system uses a high-speed camera connected to an edge device over a
  4-lane MIPI CSI-2 bus. It captures 4K images (3840x2160) with 3 color channels (RGB), using 8 bits per
  channel (1 byte). The system must process frames at 60 FPS. Interpret the MIPI CSI-2 bandwidth spec
  and calculate the time it takes to transfer a single frame via DMA. Does this transfer time fit within
  the per-frame latency budget?
details:
  realistic_solution: '1.  **Calculate Frame Size:** A 4K image is 3840 pixels wide by 2160 pixels high.
    With 3 channels at 8 bits (1 byte) each, the size is `3840 * 2160 * 3 * 1 byte = 24,883,200 bytes`,
    or ~24.9 MB.

    2.  **Find Transfer Bandwidth:** From the hardware specs, a 4-lane MIPI CSI-2 bus has a bandwidth
    of ~2.5 GB/s.

    3.  **Calculate Transfer Time:** `Time = Size / Bandwidth = 24.9 MB / 2.5 GB/s = 0.0249 GB / 2.5 GB/s
    ≈ 0.00996 seconds`, or ~10 ms.

    4.  **Compare to Budget:** The per-frame budget for 60 FPS is `1000 ms / 60 = 16.67 ms`. Since 10
    ms is less than 16.67 ms, the DMA transfer fits comfortably within the latency budget.'
  common_mistake: A common mistake is confusing bandwidth units (GB/s vs Gbps), leading to an 8x error.
    Another is using the wrong bus's bandwidth from the spec sheet (e.g., using the much faster DRAM bandwidth
    for a slower camera interconnect), leading to a wildly optimistic and incorrect calculation.
  napkin_math: 'Frame size: 3840 * 2160 * 3 bytes (RGB) = 24,883,200 bytes (~24.9 MB). At 60 FPS: 24.9
    MB * 60 = 1,494 MB/s (1.49 GB/s). A standard 4-lane MIPI CSI-2 link provides ~2.5 GB/s of bandwidth.
    Since 1.49 GB/s < 2.5 GB/s, the bus can easily support this uncompressed 4K 60FPS stream without data
    loss or dropping frames.'
  options:
  - No, the transfer takes ~80 ms, which exceeds the 16.7 ms budget.
  - Yes, the transfer takes ~10 ms, which is well within the 16.7 ms budget.
  - No, the transfer time is only ~0.12 ms because it uses the Jetson's 204.8 GB/s DRAM bandwidth, but
    the processing will be the bottleneck.
  - Yes, the transfer is nearly instantaneous because DMA operations don't consume bus bandwidth.
  correct_index: 1
