title: Optimizing Privacy Guardrails on Edge TPU
scenario: A privacy guardrail model on a Coral Edge TPU (4 TOPS INT8, 2W) experienced a latency spike to 80ms after a fairness-aware custom activation was added.
question: What is causing the Coral privacy model's 80ms latency spike, and how would you refactor it to be fully TPU-compatible?
details:
  realistic_solution: The Edge TPU compiler lacks support for the custom activation function, forcing a graph partition. The TPU executes the first half, copies intermediate tensors over the slow USB/PCIe bus to the host CPU for the custom activation, and then copies data back. Refactor the model to replace the custom activation with an INT8-supported equivalent (e.g., ReLU6) and use Quantization-Aware Training (QAT) to recover fairness metrics, eliminating host-memory round-trips.
  common_mistake: |
    **The Pitfall:** Abandoning the 2W constraint by switching to heavier hardware.
    **The Rationale:** Believing the 80ms latency is due to a lack of raw compute power rather than intermediate I/O synchronization overhead.
    **The Consequence:** Breaking the thermal and power budget of the embedded device instead of fixing the compiler fallback.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device: Coral Edge TPU (4 TOPS). Power: 2W.
       - Model: ~600 Mega-operations. Partitioned latency: 80ms.
    2. **Calculations:**
       - Theoretical TPU Compute: 600,000,000 / 4,000,000,000,000 = 0.15 ms.
       - I/O Overhead (PCIe/USB): ~8 ms base.
       - Host fallback penalty: 80ms - 8.15ms = ~71.85 ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound. CPU fallback causes a 71.85ms penalty. Recompiling fully to INT8 reduces total latency to ~8ms.**
