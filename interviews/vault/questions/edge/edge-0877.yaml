title: AR Glasses Power Bottleneck
scenario: You are designing the ML architecture for next-gen AR glasses. A 1.2B parameter Vision Transformer (ViT) runs continuous object tracking at 30fps. The hardware has a strict <1W power budget for ML and 1.5GB total ML RAM. Standard INT4 Post-Training Quantization (PTQ) fits the memory budget but accuracy collapses from 94% to 71% specifically in low-light environments.
question: How would you quantize the 1.2B ViT to fit 1.5GB and under 1W while avoiding the low-light INT4 PTQ accuracy collapse?
details:
  realistic_solution: "The accuracy drop in low-light is caused by massive activation outliers (attention\
    \ spikes) that get clipped by static INT4 quantization. To meet both the 1W power budget and 1.5GB\
    \ RAM constraint, you must design a Mixed-Precision Quantization-Aware Training (QAT) pipeline. \n\
    \nArchitecturally, keep the first patch-embedding layer and the final classification head in INT8\
    \ (where precision matters most), and quantize the middle transformer blocks to INT4. Crucially, apply\
    \ a SmoothQuant-style offline mathematical transformation during QAT: migrate the quantization difficulty\
    \ from the activations to the weights by scaling down activation outliers and scaling up the corresponding\
    \ weight channels. Because this scaling is mathematically equivalent and fused offline, the runtime\
    \ executes purely as static INT4/INT8 MACs, requiring zero runtime scaling overhead and strictly adhering\
    \ to the power budget."
  common_mistake: |
    **The Pitfall:** Using dynamic quantization for activations to handle low-light variance.
    **The Rationale:** Candidates try to solve the accuracy drop by applying runtime min/max scaling calculations without profiling the power cost.
    **The Consequence:** The runtime scaling overhead destroys the strict 1W power budget, draining the AR glasses' battery unacceptably fast.
  napkin_math: |
    1. 1.2B params in FP16 = 2.4GB (OOM for 1.5GB budget).
    2. INT4 weights = 600MB. Mixed precision: 5% of layers in INT8 adds ~30MB. Total = 630MB (fits in 1.5GB).
    3. Compute required: ~50G MACs/frame at 30fps = 1.5T MACs/sec.
    4. FP16 MAC power = ~1.5pJ. INT4 MAC power = ~0.5pJ.
    5. INT4 power draw = 1.5T * 0.5pJ = **0.75W** (fits <1W budget).
    6. Dynamic quantization would add ~0.4W of ALU overhead, violating the 1W budget.
