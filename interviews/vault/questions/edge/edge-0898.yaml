title: Harsh Environment Signal Degradation
scenario: An onboard ML system in an electric mining haul truck uses 100GbE PAM4 copper DAC cables to
  connect a sensor-fusion node to an inference accelerator. Throughput remains at 80Gbps, but interconnect
  latency randomly spikes from 500ns to 50us whenever the truck's main electric drive motors accelerate.
  OS reports 0 dropped packets.
details:
  realistic_solution: Diagnose PHY-level Forward Error Correction (FEC) intervention due to Electromagnetic
    Interference (EMI). 100GbE over PAM4 requires FEC (like RS-FEC) to maintain link integrity. When the
    electric motors draw massive current, they generate high EMI, degrading signal integrity on the copper
    DACs and causing a high Bit Error Rate (BER). The MAC layer recovers the data using FEC, which prevents
    OS-visible packet loss but adds significant processing latency (correcting symbols takes time). The
    solution is to replace copper DACs with Active Optical Cables (AOCs) which are immune to EMI.
  common_mistake: Investigating OS thread scheduling, NUMA effects, or thermal throttling during acceleration.
  napkin_math: Normal 100GbE PHY latency ~ 100-200ns. RS-FEC adds ~250ns base latency, but heavy symbol
    correction introduces pipeline stalls at the hardware level, pushing latency to 50us. At 100Gbps (12.5GB/s),
    a 50us stall delays 625KB of buffered data per spike.
