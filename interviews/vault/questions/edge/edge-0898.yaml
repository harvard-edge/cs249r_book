title: Harsh Environment Signal Degradation
scenario: An onboard ML system in an electric mining haul truck uses 100GbE PAM4 copper DAC cables to connect a sensor-fusion node to an inference accelerator. Throughput remains at 80Gbps, but interconnect latency randomly spikes from 500ns to 50us whenever the truck's main electric drive motors accelerate. OS reports 0 dropped packets.
question: Why does 100GbE latency spike from 500ns to 50us during motor acceleration with zero OS packet drops?
details:
  realistic_solution: Diagnose PHY-level Forward Error Correction (FEC) intervention due to Electromagnetic Interference (EMI). The motors generate high EMI, degrading signal integrity and causing a high Bit Error Rate (BER). The MAC layer recovers data using FEC, preventing OS-visible packet loss but adding significant processing latency. Replace copper DACs with Active Optical Cables (AOCs).
  common_mistake: |
    **The Pitfall:** Investigating OS thread scheduling, NUMA effects, or thermal throttling.
    **The Rationale:** Software engineers default to OS/compute explanations and ignore PHY-layer Electromagnetic Interference (EMI) in harsh industrial environments.
    **The Consequence:** Wasting weeks debugging driver code while the actual fix requires simply swapping cables.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal 100GbE PHY latency ≈ 100-200ns.
       - Base RS-FEC adds ≈ 250ns latency.
       - Heavy symbol correction due to EMI introduces hardware stalls.
    2. **Calculations:**
       - Stalls push latency to 50us.
       - 100Gbps = 12.5 GB/s.
       - Buffered data per spike = 12.5 GB/s * 50us = 625 KB.
    3. **Conclusion & Interpretation:**
       - **EMI causes FEC hardware stalls, pushing latency to 50us without OS packet drops. Result: Network-Latency Bound.**
