title: The Orin Utilization Puzzle
scenario: You're optimizing a new object detection model for a drone equipped with a Jetson AGX Orin.
  Profiling shows a single inference performs 50 Giga-operations (INT8) and requires reading a total of
  100 MB of data (weights and activations) from its LPDDR5 memory. Based on the Orin's specs, explain
  whether this model's performance is limited by compute or memory bandwidth.
question: "Is this 50 GOps, 100 MB model on the Jetson AGX Orin limited by compute or memory bandwidth?"
details:
  realistic_solution: The model is memory-bound. To determine this, we calculate the model's Arithmetic
    Intensity (AI) and compare it to the hardware's Ridge Point. If the model's AI is lower than the Ridge
    Point, it's memory-bound; if it's higher, it's compute-bound.
  common_mistake: Engineers often focus only on the peak TOPS of a processor and assume their model will
    achieve it. They forget that data movement (memory bandwidth) is often the real bottleneck, especially
    for models with a low ratio of computation to memory access (low arithmetic intensity). Simply having
    a high TOPS number doesn't guarantee high performance.
  napkin_math: '1. **Hardware Ridge Point:** Orin peak INT8 = 275 TOPS, memory BW = 204.8 GB/s. Ridge
    Point = 275e12 / 204.8e9 = 1,343 Ops/Byte.

    2. **Model Arithmetic Intensity:** 50 GOps / 100 MB = 50e9 / 100e6 = 500 Ops/Byte.

    3. **Comparison:** Model AI (500) < Ridge Point (1,343) → the model is **memory-bound**. Performance
    is limited by memory bandwidth, not compute.'
  options:
  - The model is memory-bound because its Arithmetic Intensity (~500 Ops/Byte) is less than the Orin's
    Ridge Point (~1342 Ops/Byte).
  - The model is compute-bound because the Jetson Orin has a very high peak compute of 275 TOPS.
  - The model is compute-bound because its Arithmetic Intensity is high (50 Giga-ops is a large number).
  - The model is memory-bound because its power consumption (TOPS/W) would be too high otherwise.
  correct_index: 0
