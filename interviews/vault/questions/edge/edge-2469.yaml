title: Constructing Edge Duty-Cycling Power Budgets
scenario: A Jetson AGX Orin draws 15W in 10-TOPS mode and 2W in sleep mode. An external sensor triggers exactly 10 times an hour.
question: Construct a duty-cycling strategy that meets a daily budget of 75Wh while processing each trigger with a 5-second inference window.
details:
  realistic_solution: 'Keep the Orin in sleep mode, waking only on interrupts. Active time is 50 seconds/hour. Daily active energy: 15W * (50/3600) * 24 = 5Wh. Daily sleep energy: 2W * (3550/3600) * 24 = 47.3Wh. Total is 52.3Wh, successfully meeting the 75Wh budget.'
  common_mistake: |
    **The Pitfall:** Failing to calculate the sleep mode power draw over the vast majority of the day.
    **The Rationale:** Candidates focus solely on the active compute power draw because it is the highest wattage.
    **The Consequence:** Underestimating the total daily energy budget, as the low-wattage sleep mode operates for so long that it dominates the total Wh.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target daily energy budget: 75 Wh.
       - Jetson AGX Orin Active Power: 15W.
       - Jetson AGX Orin Sleep Power: 2W.
       - Triggers: 10 per hour, 5 seconds per trigger.
    2. **Calculations:**
       - Active time per hour = 10 * 5 = 50 seconds.
       - Daily active energy = 15W * (50/3600) hours * 24 = 5 Wh.
       - Sleep time per hour = 3600 - 50 = 3550 seconds.
       - Daily sleep energy = 2W * (3550/3600) hours * 24 = 47.33 Wh.
       - Total daily energy = 5 Wh + 47.33 Wh = 52.33 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: 52.33 Wh.** The total energy consumption fits well within the 75 Wh budget, driven primarily by the **Power-Bound** sleep mode.
