title: Constructing Edge Duty-Cycling Power Budgets
scenario: A Jetson AGX Orin draws 15W in 10-TOPS mode and 2W in sleep mode. An external
  sensor triggers exactly 10 times an hour.
question: Construct a duty-cycling strategy that meets a daily budget of 75Wh while
  processing each trigger with a 5-second inference window.
details:
  realistic_solution: 'Keep the Orin in sleep mode, waking only on interrupts. Active
    time is 50 seconds/hour. Daily active energy: 15W * (50/3600) * 24 = 5Wh. Daily
    sleep energy: 2W * (3550/3600) * 24 = 47.3Wh. Total is 52.3Wh, successfully meeting
    the 75Wh budget.'
  common_mistake: Failing to calculate the sleep mode power draw over the vast majority
    of the day, which actually dominates the energy budget.
  napkin_math: 5Wh + 47.3Wh = 52.3Wh < 75Wh
