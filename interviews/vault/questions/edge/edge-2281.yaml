title: Edge KV Cache Capacity Sizing
scenario: An Orin edge device runs a 7B parameter LLM in FP16. The weights permanently pin 14GB of the 32GB total shared RAM. An additional 2GB is reserved for the OS, leaving the remainder purely for KV cache.
question: Assuming a flat 1 MB of KV cache is required per context token, calculate the maximum number of concurrent 1024-token requests the device can sustain.
visual:
  kind: svg
  path: edge-2281.svg
  alt: A stacked bar chart showing the breakdown of the 32GB RAM into Weights, OS, and KV Cache.
  caption: Edge Memory Allocation
details:
  realistic_solution: Total memory is 32 GB. Pinned memory is 14 GB (weights) + 2 GB (OS) = 16 GB. Remaining memory for the KV cache is 32 - 16 = 16 GB (16,384 MB). Each request needs 1024 tokens * 1 MB/token = 1024 MB. The device can sustain 16,384 MB / 1024 MB = 16 concurrent requests.
  common_mistake: |
    **The Pitfall:** Forgetting system reservations or incorrect unit conversions.
    **The Rationale:** Candidates map the entire unallocated space strictly to the cache without accounting for the OS overhead.
    **The Consequence:** The model serving infrastructure is misconfigured, causing the OS to aggressively swap or trigger OOM kills.
  napkin_math: |
    1. **Total Memory:** 32 GB.
    2. **Pinned Memory:** 14 GB (weights) + 2 GB (OS) = 16 GB.
    3. **Available for KV Cache:** `32 GB - 16 GB = 16 GB` (16,384 MB).
    4. **Memory per Request:** 1024 tokens * 1 MB/token = 1024 MB/request.
    5. **Max Concurrent Requests:** `16,384 MB / 1024 MB = 16 requests`.
    **The device can sustain a maximum of 16 concurrent requests.**
