title: NPU Underutilization in Depthwise Convolutions
scenario: You deploy a MobileNetV2-based object detector on a custom NPU with a 16x16 systolic array (peak 512 MACs/cycle). Standard 1x1 convolutions achieve 85% array utilization, but 3x3 depthwise convolutions drop to roughly 6% utilization.
question: Why do MobileNetV2 depthwise convolutions use only about 6% of the 16x16 systolic array, and how would you redesign around it?
details:
  realistic_solution: 'The 6.25% utilization is a textbook spatial mapping failure. Systolic arrays (like the 16x16 grid) are highly optimized for dense matrix multiplications with heavy channel reuse. Depthwise convolutions compute channels entirely independently, activating only a single vector lane while idling the remaining 240 ALUs. Mitigation requires grouping convolutions or completely re-engineering the compiler''s dataflow scheduler.'
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is the bottleneck and attempting to quantize the depthwise weights.
    **The Rationale:** Candidates fail to understand the spatial mapping constraints of a 2D systolic array during channel-independent operations.
    **The Consequence:** The compute array remains starved, and quantization degrades accuracy without fixing the latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 16x16 systolic array (256 MAC units).
    - Depthwise operation: Channel-independent execution.

    **Calculations:**
    - Standard 1x1 conv maps cleanly to the 2D grid.
    - Depthwise maps to 1 channel at a time, activating 1x16 MACs.
    - Utilization = 16 / 256 = 6.25%.

    **Conclusion & Interpretation:**
    - **Result: 6.25% Utilization (Compute-Bound)**. 2D systolic arrays drastically penalize spatial-only, channel-independent operations.
