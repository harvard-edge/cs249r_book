title: NPU Underutilization in Depthwise Convolutions
scenario: You deploy a MobileNetV2-based object detector on a custom NPU with a 16x16 systolic array (peak 512 MACs/cycle). Standard 1x1 convolutions achieve 85% array utilization, but 3x3 depthwise convolutions drop to roughly 6% utilization.
question: Why do MobileNetV2 depthwise convolutions use only about 6% of the 16x16 systolic array, and how would you redesign around it?
details:
  realistic_solution: 'The root cause is a mismatch between the model''s arithmetic intensity and the systolic array''s spatial architecture. Depthwise convolutions process each input channel independently, meaning there is zero data reuse across channels. Only 1 out of 16 rows/columns is active, wasting the rest of the array. You must modify the model to use grouped convolutions (e.g., group size 16) or rewrite the compiler''s dataflow to map spatial dimensions to the grid instead of channels.'
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is the bottleneck and attempting to quantize the depthwise weights.
    **The Rationale:** Candidates fail to understand the spatial mapping constraints of a 2D systolic array during channel-independent operations.
    **The Consequence:** The compute array remains starved, and quantization degrades accuracy without fixing the latency.
  napkin_math: |
    - Systolic array capacity: 16x16 = 256 MAC units.
    - Standard 1x1 conv mapping (Input x Output channels): Fills the 16x16 grid (100% utilization).
    - Depthwise conv mapping: Processes 1 channel at a time.
    - Active MACs per cycle (channel mapped): 1x16 out of 256.
    - Utilization rate: 16 / 256 = **6.25%**.
