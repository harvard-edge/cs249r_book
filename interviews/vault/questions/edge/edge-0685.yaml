title: The Zero-Copy Nightmare
scenario: Your team is designing a next-generation edge AI SoC that integrates a CPU, a dedicated NPU, and a low-power GPU. The goal is to minimize inference latency and power by implementing a 'zero-copy' data pipeline between these heterogeneous compute units.
question: What architectural requirements, challenges, and pitfalls determine whether true zero-copy tensor sharing works on this SoC?
details:
  realistic_solution: 'True zero-copy architecture mandates unified virtual memory maps and strict cache coherency protocols across the CPU, NPU, and GPU. Without hardware-level cache invalidation synchronization, attempting ''zero-copy'' yields massive, silent tensor corruption as stale data lingers in L2 caches. Implementing a clean DMA pipeline eliminates the 5ms payload duplication, which is critical for ultra-low latency L4 systems.'
  common_mistake: |
    **The Pitfall:** Assuming "zero-copy" simply means avoiding `memcpy` calls in user-space code.
    **The Rationale:** Candidates overlook the hardware requirements of memory coherency, virtual memory mapping, and cache invalidation.
    **The Consequence:** The system experiences silent data corruption or performance drops because cache lines are not synchronized across accelerators.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: 50 MB.
    - LPDDR5 Bandwidth: 50 GB/s.

    **Calculations:**
    - Base `memcpy` latency = 50 MB / 50 GB/s = 1 ms.
    - Transfer pipeline (5 copies) = 5 * 1 ms = 5 ms.

    **Conclusion & Interpretation:**
    - **Result: 5ms latency savings (Memory-Bound)**. True zero-copy requires shared virtual memory to avoid 5ms of pure overhead.
