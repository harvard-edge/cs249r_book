title: The Zero-Copy Nightmare
scenario: Your team is designing a next-generation edge AI SoC that integrates a high-performance
  CPU, a dedicated NPU, and a low-power GPU. The goal is to minimize inference latency
  and power by implementing a 'zero-copy' data pipeline between these heterogeneous
  compute units. Describe the underlying architectural requirements, the significant
  challenges, and potential pitfalls in achieving true zero-copy for ML tensor data
  on such an SoC.
question: What architectural requirements, challenges, and pitfalls determine whether
  true zero-copy tensor sharing works on this SoC?
details:
  realistic_solution: True zero-copy means avoiding *any* data duplication in memory.
    For an SoC with heterogeneous compute units (CPU, NPU, GPU), this is a significant
    architectural and software challenge.
  common_mistake: Assuming "zero-copy" simply means avoiding `memcpy` calls in user-space,
    without considering the complex hardware and software implications of memory coherency,
    virtual memory mapping, and data synchronization across different accelerators.
  napkin_math: '*   **Tensor Size:** A typical intermediate tensor might be 50 MB.
    | *   **LPDDR5 Bandwidth:** 50 GB/s. | *   **`memcpy` time:** 50 MB / 50 GB/s
    = 1 ms. | *   **Zero-Copy Overhead:** True zero-copy might incur negligible overhead
    (e.g., a few microseconds for memory mapping updates or cache line invalidation
    *if needed* on a partially coherent system). | *   **Latency Savings:** For a
    pipeline with 5 such transfers, eliminating 5 ms of copy time is significant for
    a 10-20 ms end-to-end latency target. | *   **Power Savings:** Avoiding data movement
    reduces DRAM accesses, which are a major power consumer.'
