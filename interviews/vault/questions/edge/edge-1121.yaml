title: 'Edge Queueing Theory Realization: End-to-End Latency Budget for Edge Pipeline'
scenario: Concretely size and verify the end-to-end latency for a Jetson Orin running a 5-stage autonomous vehicle pipeline: camera capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing (2ms). Model each stage as G/D/1, compute total P99, and determine which stage should be optimized first.
question: What is the end-to-end P99 latency of the 5-stage Jetson Orin pipeline at 30 FPS, and which stage should be optimized first?
details:
  realistic_solution: 'Per-stage analysis (G/D/1, assuming c_a^2=1 at 30 FPS input): Camera: W=1.02ms. ISP: W=3.15ms. Preproc: W=5.44ms. Inference: \mu=66.7/s, \rho=0.45, Wq=0.45/(2*66.7*0.55)=6.14ms, W=21.14ms. Postproc: W=2.06ms. Total mean = 32.81ms. Variance dominated by inference Wq. P99 is significantly higher than mean. Inference is clear bottleneck (\rho=0.45 is highest). Optimize inference first.'
  common_mistake: |
    **The Pitfall:** Adding all stage P99s directly to calculate the end-to-end P99.
    **The Rationale:** Candidates often fail to recognize that individual stage queueing delays are independent variables.
    **The Consequence:** They produce an overly pessimistic total P99 estimate, leading to unnecessary over-optimization or hardware upgrades.
  napkin_math: |
    1. **Arrival Rate**: \lambda = 30 FPS.
    2. **Inference Stage Bottleneck**: Service rate \mu = 1000/15 = 66.7/s. Utilization \rho = 30 / 66.7 = 0.45.
    3. **G/D/1 Queueing Delay (Inference)**: Wq = 0.45 / (2 * 66.7 * (1 - 0.45)) = 0.45 / 73.4 = 6.13ms. Total W = 15 + 6.13 = 21.13ms.
    4. **Total Mean Latency**: 1.02 + 3.15 + 5.44 + 21.13 + 2.06 = **32.80ms**.
    5. **P99 Estimation**: Variance is dominated by the inference Wq. P99 is approx 32.8 + 4.6*\sigma > 40ms, which misses the 33ms SLO.
    6. **Optimization Target**: If inference is optimized to 10ms (\mu=100/s, \rho=0.3, Wq=2.14ms, W=12.14ms), the new total mean W is **~23.8ms** (< 33ms SLO).
