title: 'Edge Queueing Theory Realization: End-to-End Latency Budget for Edge Pipeline'
scenario: 'Concretely size and verify the end-to-end latency for a Jetson Orin (32GB
  LPDDR5, 275 TOPS INT8, 60W) running a 5-stage autonomous vehicle pipeline: camera
  capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing
  (2ms). λ=30 FPS. Model each stage as G/D/1, compute total P99, and determine which
  stage should be optimized first.'
question: What is the end-to-end P99 latency of the 5-stage Jetson Orin pipeline at
  30 FPS, and which stage should be optimized first?
details:
  realistic_solution: 'Per-stage analysis (G/D/1 at 30 FPS input): Camera: μ=1000/s,
    ρ=0.03, Wq≈0, W=1ms. ISP: μ=333/s, ρ=0.09, Wq≈0, W=3ms. Preproc: μ=200/s, ρ=0.15,
    Wq=0.15²/(2*200*0.85)=0.132ms, W=5.13ms. Inference: μ=66.7/s, ρ=0.45, Wq=0.45²/(2*66.7*0.55)=2.75ms,
    W=17.75ms. Postproc: μ=500/s, ρ=0.06, Wq≈0, W=2ms. Total mean = 1+3+5.13+17.75+2
    = 28.88ms. Variance dominated by inference Wq. P99 ≈ 28.88 + 4.6*σ. Inference
    is clear bottleneck (ρ=0.45 is highest). Optimize inference first.'
  common_mistake: Adding all stage P99s directly (overly pessimistic) instead of adding
    means and computing P99 from total variance using the independence of stage queuing
    delays.
  napkin_math: 'Inference stage: ρ=0.45, G/D/1 Wq=0.45²/(2*66.7*0.55)=0.2025/73.4=2.76ms,
    W=17.76ms. Total mean W = 1+3+5.13+17.76+2 = 28.89ms. Sum of Wq variances: inference
    dominates at σ²_inf≈(2.76)²=7.6ms². Total σ≈2.76ms (inference dominates). P99
    ≈ 28.89 + 4.6*2.76 = 41.6ms < 33ms SLO? No — 41.6ms > 33ms. Must optimize inference.
    If inference drops to 10ms: μ=100/s, ρ=0.3, Wq=0.3²/(2*100*0.7)=0.643ms, W=10.64ms.
    New total = 23.77ms < 33ms SLO ✓.'
