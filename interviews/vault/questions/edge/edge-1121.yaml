title: 'Edge Queueing Theory Realization: End-to-End Latency Budget for Edge Pipeline'
scenario: 'Concretely size and verify the end-to-end latency for a Jetson Orin (32GB
  LPDDR5, 275 TOPS INT8, 60W) running a 5-stage autonomous vehicle pipeline: camera
  capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing
  (2ms). \lambda=30 FPS. Model each stage as G/D/1, compute total P99, and determine which
  stage should be optimized first.'
question: What is the end-to-end P99 latency of the 5-stage Jetson Orin pipeline at
  30 FPS, and which stage should be optimized first?
details:
  realistic_solution: 'Per-stage analysis (G/D/1, assuming c_a^2=1 at 30 FPS input): Camera: \mu=1000/s,
    \rho=0.03, Wq\approx0.02ms, W=1.02ms. ISP: \mu=333/s, \rho=0.09, Wq\approx0.15ms, W=3.15ms. Preproc: \mu=200/s, \rho=0.15,
    Wq=0.15/(2*200*0.85)=0.44ms, W=5.44ms. Inference: \mu=66.7/s, \rho=0.45, Wq=0.45/(2*66.7*0.55)=6.14ms,
    W=21.14ms. Postproc: \mu=500/s, \rho=0.06, Wq\approx0.06ms, W=2.06ms. Total mean = 1.02+3.15+5.44+21.14+2.06
    = 32.81ms. Variance dominated by inference Wq. P99 is significantly higher than mean. Inference
    is clear bottleneck (\rho=0.45 is highest). Optimize inference first.'
  common_mistake: Adding all stage P99s directly (overly pessimistic) instead of adding
    means and computing P99 from total variance using the independence of stage queuing
    delays.
  napkin_math: 'Inference stage: \rho=0.45, G/D/1 Wq=0.45/(2*66.7*0.55)=0.45/73.4=6.13ms,
    W=21.13ms. Total mean W = 1.02+3.15+5.44+21.13+2.06 = 32.80ms. Sum of Wq variances: inference
    dominates. P99 \approx 32.8 + 4.6*\sigma > 40ms > 33ms SLO. Must optimize inference.
    If inference drops to 10ms: \mu=100/s, \rho=0.3, Wq=0.3/(2*100*0.7)=2.14ms, W=12.14ms.
    New total mean W \approx 23.8ms < 33ms SLO \checkmark.'
