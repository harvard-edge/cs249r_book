title: Dynamic Batching Inefficiencies in TensorRT
scenario: A Jetson AGX Orin serves a TensorRT engine strictly compiled for a maximum
  batch size of 8.
question: Explain why dynamically sending a batch size of 3 might result in sub-optimal
  latency compared to an engine compiled specifically for batch 3.
details:
  realistic_solution: During ahead-of-time compilation, TensorRT auto-tunes and selects
    hardware kernels optimized for the specific max dimensions provided. An engine
    compiled for batch 8 relies on kernels tuned for larger thread blocks. When given
    a batch of 3, the engine either pads the execution or utilizes the less efficient
    large-batch kernels, underutilizing CUDA cores and causing higher latency than
    a tailored batch-3 kernel.
  common_mistake: Assuming dynamic batch engines automatically recompile hardware
    kernels at runtime based on incoming payload sizes.
  napkin_math: 8 - 3 = 5 padded
