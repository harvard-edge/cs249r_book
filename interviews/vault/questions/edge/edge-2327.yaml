title: Power vs Energy in Edge Duty Cycling
scenario: You are evaluating power profiles for a battery-powered drone utilizing
  a Jetson AGX Orin.
question: Explain why stepping the Orin down from 60W to 15W mode might not actually
  decrease the total battery energy consumed per inference.
details:
  realistic_solution: The 15W mode reduces instantaneous power (Watts) by dropping
    clock speeds, which proportionally increases the Time required per inference.
    Since Energy (Joules) = Power x Time, processing slowly at 15W may consume equal
    or more total Joules than computing rapidly at 60W and immediately racing to deep
    sleep.
  common_mistake: Confusing instantaneous power draw (Watts) with the total energy
    spent (Joules) for a discrete computational task.
  napkin_math: 60W * 0.05s = 3J vs 15W * 0.25s = 3.75J.
