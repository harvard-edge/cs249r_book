title: 'The Night-Vision Quantization Catastrophe'
scenario: 'Your team is developing a pedestrian detection model for an autonomous vehicle, deploying to a Jetson AGX Orin. To meet the 30 FPS deadline, you''ve quantized the model from FP16 to INT8 using Post-Training Quantization (PTQ). Your calibration dataset consists of 100,000 diverse, high-quality images from daytime driving. Offline evaluation is fantastic: INT8 mAP is within 0.5% of the FP16 baseline, and you''ve hit 35 FPS.'
question: 'Why is this daytime-only PTQ calibration and validation insufficient, and what catastrophic failure mode should you expect under night-time glare?'
details:
  realistic_solution: 'The playbook is insufficient because the root cause is not just a data distribution shift; it''s a catastrophic failure due to **activation clipping and dynamic range mismatch**. The INT8 data type can only represent 256 discrete values (from -128 to 127). The calibration process, using only daytime images, found a scaling factor that maps the typical FP16 activation range of daytime scenes into this narrow INT8 range.'
  common_mistake: |
    **The Pitfall:** Retreating to FP16 because INT8 is deemed "too inaccurate."
    **The Rationale:** Engineers observe the severe failure and mistakenly blame the data type's inherent precision rather than the calibration mapping.
    **The Consequence:** The model misses its 30 FPS performance target on the Orin because the optimized INT8 pipeline is abandoned.
  napkin_math: |
    - INT8 range: [-128, 127].
    - Daytime max activation: 5.0.
    - Scale: 5.0 / 127 = 0.039.
    - Night-time glare activation: 25.0.
    - Quantized value: 25.0 / 0.039 = 641 -> clips to **127**.
    - Dequantized output: 127 * 0.039 = 5.0.
    - Information loss: 25.0 - 5.0 = **20.0** (80% error, breaking detection).
