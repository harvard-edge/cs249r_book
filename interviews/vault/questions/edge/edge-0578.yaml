title: The Night-Vision Quantization Catastrophe
scenario: Your team is developing a pedestrian detection model for an autonomous vehicle. To meet the 30 FPS deadline, you've quantized the model from FP16 to INT8 using Post-Training Quantization (PTQ). Your calibration dataset consists of 100,000 diverse, high-quality images from daytime driving.
question: Why is this daytime-only PTQ calibration and validation insufficient, and what catastrophic failure mode should you expect under night-time glare?
details:
  realistic_solution: The playbook is insufficient because the root cause is catastrophic failure due to activation clipping and dynamic range mismatch. The INT8 data type maps the typical FP16 activation range of daytime scenes into a narrow INT8 range, causing extreme outliers to clip. Utilize nsys profiling to verify dynamic ranges and apply mixed-precision quantization.
  common_mistake: |
    **The Pitfall:** Retreating to FP16 because INT8 is deemed "too inaccurate."
    **The Rationale:** Engineers observe the severe failure and mistakenly blame the data type's inherent precision rather than the calibration mapping.
    **The Consequence:** The model misses its 30 FPS performance target because the optimized INT8 pipeline is abandoned.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 range: [-128, 127].
       - Daytime max activation: 5.0.
       - Night-time glare activation: 25.0.
    2. **Calculations:**
       - Scale: 5.0 / 127 = 0.039.
       - Quantized value: 25.0 / 0.039 = 641 -> clips to 127.
       - Dequantized output: 127 * 0.039 = 5.0.
       - Information loss: 25.0 - 5.0 = 20.0.
    3. **Conclusion & Interpretation:**
       - **Result: 80% error (20.0 information loss) breaks detection entirely under glare.**
