title: The Night-Vision Quantization Catastrophe
scenario: 'Your team is developing a pedestrian detection model for an autonomous vehicle, deploying to
  a Jetson AGX Orin. To meet the 30 FPS deadline, you''ve quantized the model from FP16 to INT8 using
  Post-Training Quantization (PTQ). Your calibration dataset consists of 100,000 diverse, high-quality
  images from daytime driving. Offline evaluation is fantastic: INT8 mAP is within 0.5% of the FP16 baseline,
  and you''ve hit 35 FPS.'
question: "Why is this daytime-only PTQ calibration and validation insufficient, and what catastrophic failure mode should you expect under night-time glare?"
details:
  realistic_solution: The playbook is insufficient because the root cause is not just a data distribution
    shift; it's a catastrophic failure due to **activation clipping and dynamic range mismatch**. The
    INT8 data type can only represent 256 discrete values (from -128 to 127). The calibration process,
    using only daytime images, found a scaling factor that maps the typical FP16 activation range of daytime
    scenes into this narrow INT8 range.
  common_mistake: The most common answer is simply, 'The calibration dataset wasn't representative.' While
    true, this is an L3-level observation. It identifies *what* is wrong but not the deep *why*. A senior
    engineer must explain the physical mechanism of the failure. Another common mistake is to blame the
    INT8 datatype itself as 'too inaccurate,' suggesting a retreat to FP16, which would miss the performance
    target and ignore the possibility of a more nuanced solution.
  napkin_math: INT8 range is [-128, 127]. If daytime max activation is 5.0, scale = 5.0 / 127 = 0.039.
    A reflective sign at night creates an activation of 25.0. 25.0 / 0.039 = 641, which clips to 127.
    Dequantized output = 127 * 0.039 = 5.0. Information loss = 25.0 - 5.0 = 20.0 (80% error), breaking
    detection.
