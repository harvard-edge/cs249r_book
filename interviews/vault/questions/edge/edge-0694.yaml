title: The Disappearing Pedestrian
scenario: Your team deployed a highly accurate pedestrian detection model (trained in FP32) to an autonomous
  vehicle's edge perception unit, which uses an integer-only accelerator (INT8). Initial tests in controlled
  environments showed minimal accuracy drop. However, during field trials, the model frequently misses
  pedestrians in specific, challenging conditions like low light, heavy rain, or when objects are far
  away. What are the common pitfalls of deploying FP32 models to INT8 hardware, especially concerning
  robustness, and how would you diagnose and mitigate these issues?
details:
  realistic_solution: "The problem likely stems from the reduced numerical precision and dynamic range\
    \ of INT8.\n  1.  **Dynamic Range Mismatch:** INT8 has a fixed range (e.g., -128 to 127). Activations\
    \ or weights with extreme outliers in FP32 might get clipped or severely compressed during quantization,\
    \ losing critical information. This is common in low-light (noisy, high dynamic range) or far-away\
    \ objects (small signal-to-noise ratio).\n  2.  **Calibration Data Mismatch:** Post-training quantization\
    \ (PTQ) relies on a representative calibration dataset to determine the quantization scales and zero-points.\
    \ If the calibration data doesn't adequately cover the \"challenging conditions\" (low light, far\
    \ objects) encountered in the field, the quantization parameters will be suboptimal, leading to poor\
    \ performance in those scenarios.\n  3.  **Layer Sensitivity:** Not all layers are equally robust\
    \ to quantization. Layers like `Softmax`, `Sigmoid`, or attention mechanisms, which rely on precise\
    \ small differences, can be highly sensitive. Quantizing these layers incorrectly can drastically\
    \ reduce accuracy.\n  4.  **Accumulation Precision:** Intermediate calculations (e.g., dot products\
    \ in convolutions) might require higher precision than INT8 to avoid accumulation error, especially\
    \ in deep networks. Ensure the hardware supports INT32 accumulation or higher.\n  5.  **Mitigation\
    \ Strategies:**\n      *   **Quantization-Aware Training (QAT):** Retrain the model with simulated\
    \ quantization noise. This allows the model to learn to be robust to quantization effects.\n     \
    \ *   **Expanded Calibration Data:** Ensure the PTQ calibration dataset includes diverse, challenging\
    \ scenarios that mirror real-world edge cases.\n      *   **Per-Channel Quantization:** Instead of\
    \ one scale/zero-point per tensor, use per-channel quantization for weights, allowing more fine-grained\
    \ scaling.\n      *   **Mixed Precision:** Identify sensitive layers and keep them in higher precision\
    \ (e.g., FP16, if supported by hardware), while quantizing the rest to INT8.\n      *   **Range Analysis\
    \ & Outlier Handling:** Analyze activation distributions. If outliers are present, consider techniques\
    \ like \"clipping\" or \"folding\" batch normalization layers to make distributions more quantization-friendly."
  common_mistake: '"Quantization is just a simple conversion; the model should behave the same." This
    overlooks the fundamental differences in numerical precision and dynamic range handling between FP32
    and INT8, which can manifest as significant robustness issues, especially in edge cases.'
  napkin_math: An INT8 value has $2^8 = 256$ possible states. For a range of -10 to +10, the step size
    is $20/255 \approx 0.078$. Any value within this step size will be mapped to the same quantized integer.
    If a critical feature difference is smaller than this step, it gets lost.
