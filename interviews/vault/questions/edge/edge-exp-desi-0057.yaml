title: Architecting Zero-Copy DMA for Multi-Camera Edge TPU
scenario: You are designing a real-time defect detection system for a manufacturing line using a host
  processor connected to a Google Coral Edge TPU via a USB 3.0 interface. The system ingests four high-resolution
  camera streams, preprocesses them on the host, and sends INT8 quantized tensors to the 4 TOPS Coral
  accelerator for inference. Given the strict 2W power budget and USB bandwidth constraints, design the
  data movement architecture between the host memory and the Edge TPU to minimize latency, avoid CPU bottlenecks,
  and maximize accelerator utilization.
details:
  realistic_solution: The optimal design uses a pinned (page-locked) memory pool on the host to enable
    direct DMA transfers over the USB bus without intermediate CPU buffering. The architecture should
    implement a multi-buffered pipeline (e.g., ring buffering) where frame N is being transferred via
    asynchronous DMA, frame N-1 is executing on the Edge TPU, and frame N-2 results are being read back.
    Preprocessing steps (like resizing and INT8 quantization) should directly write their output tensors
    into this pinned memory pool to achieve a zero-copy host-to-device transfer pipeline.
  common_mistake: Candidates often propose standard blocking memory copies (e.g., standard memcpy to USB
    bulk transfers) without considering the CPU overhead or USB protocol overhead. They also frequently
    miss the need to pin host memory for DMA or fail to pipeline the data transfers with inference execution,
    leading to idle TPU cycles.
  napkin_math: Assuming a target input tensor of 300x300x3 INT8 (270 KB per frame). For 4 cameras running
    at 30 fps, the required host-to-device data rate is 4 * 30 * 270 KB = 32.4 MB/s. A practical USB 3.0
    link provides ~400 MB/s, meaning the payload transfer takes ~8% of the bus bandwidth. Transferring
    one 270 KB frame takes ~0.67ms (270KB / 400MB/s). Since the 4 TOPS Edge TPU can execute a typical
    MobileNet INT8 model in ~2ms, the 0.67ms transfer must be completely hidden behind the 2ms compute
    via asynchronous DMA to prevent the TPU from starving.
