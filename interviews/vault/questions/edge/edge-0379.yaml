title: The Energy Cost of Precision (edge-0379)
scenario: You're working on a perception model for an autonomous driving platform and need to reduce the
  power consumption of your neural network running on the vehicle's edge accelerator. You propose converting
  some of the FP32 operations to INT8. For a single arithmetic operation, roughly how much more energy-efficient
  is INT8 compared to FP32?
question: "For a single arithmetic operation, roughly how much more energy-efficient is INT8 compared to FP32?"
details:
  realistic_solution: A single INT8 operation is approximately 18 times more energy-efficient than an
    FP32 operation. This is a fundamental physical relationship based on the energy cost of transistor
    switching for integer versus floating-point units. Choosing INT8 is a critical optimization for power-constrained
    edge devices like those in a car.
  common_mistake: Engineers often mistakenly assume the energy savings are linear with the reduction in
    bit width (e.g., 32 bits / 8 bits = 4x). This ignores the significantly more complex and power-hungry
    circuitry required for floating-point arithmetic (mantissa/exponent handling) compared to simple integer
    math.
  napkin_math: From the 'Invariants' table, the energy ratio of FP32 vs. INT8 is ~18x. If an FP32 operation
    costs 18 joules, an INT8 operation costs just 1 joule. This is a core physical constant in ML systems
    design that every edge engineer must know.
  options:
  - ~4× more efficient
  - ~2× more efficient
  - ~18× more efficient
  - ~64× more efficient
  correct_index: 2
