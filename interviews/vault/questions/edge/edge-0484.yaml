title: 'The Drone''s Dilemma: Transformer vs. CNN Latency'
scenario: 'You are an ML Systems Engineer for a drone company. The primary perception model runs on a
  Jetson AGX Orin (15W profile) and has a hard real-time deadline of 33ms (30 FPS). Your team has profiled
  two candidate models on 224x224 images: 1) `MobileNet-L` (CNN), which achieves 25ms latency. 2) `VisionTransformer-S`
  (ViT with 16x16 patches), which achieves higher accuracy but has 50ms latency. Your manager suggests
  that since ViT processes patches, you can just halve the patch size to 8x8 to ''speed up the ViT and
  meet the deadline.'' Is the manager correct?'
details:
  realistic_solution: The manager's suggestion is incorrect because it ignores the quadratic computational
    complexity of the self-attention mechanism, which is the core of a Transformer. Halving the patch
    size quadruples the number of patches (the sequence length, N). Since attention complexity is O(N^2),
    the latency of the attention layers will increase by a factor of approximately 16x. The correct approach
    is to explain this scaling trap to the manager with quantitative data and recommend sticking with
    the `MobileNet-L` which already meets the critical 33ms deadline. For future work, suggest exploring
    knowledge distillation (teaching the fast `MobileNet-L` with the slow `VisionTransformer-S`) or using
    Neural Architecture Search (NAS) to find a more efficient hybrid architecture.
  common_mistake: Engineers often underestimate the computational cost of attention, especially its quadratic
    scaling with sequence length. A common mistake is to assume that if a model is 'too slow', you can
    simply make the input 'smaller' (like patches) to speed it up. This intuition, which might work for
    linearly scaling CNNs, is dangerously wrong for Transformers, where decreasing patch size dramatically
    increases the sequence length, leading to a massive blowup in compute.
  napkin_math: 'Initial patch size 16x16: N = (224/16)^2 = 196 patches. Halving patch size to 8x8: N =
    (224/8)^2 = 784 patches (a 4x increase in sequence length). Self-attention compute scales as O(N^2).
    4^2 = 16x increase in attention MACs. If attention originally took 25ms of the 50ms latency, the new
    attention takes 25ms * 16 = 400ms!'
  options:
  - The manager is wrong. The quadratic scaling of attention with the increased sequence length will cause
    a catastrophic increase in latency. The team should use the MobileNet-L.
  - The manager is right. Smaller patches can be processed in parallel, and the Jetson Orin's high TOPS
    count can handle the increased workload within the deadline.
  - The ViT has too many parameters. The latency issue can be solved by pruning 50% of the weights, which
    will cut the 50ms latency in half to 25ms.
  - The issue is memory bandwidth, not compute. Using smaller patches will increase cache hits and could
    potentially reduce latency.
  correct_index: 0
