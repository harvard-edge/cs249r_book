title: 'The Drone''s Dilemma: Transformer vs. CNN Latency'
scenario: 'You are an ML Systems Engineer for a drone company. The primary perception model runs on a Jetson AGX Orin (15W profile) and has a hard real-time deadline of 33ms (30 FPS). Your team has profiled two candidate models on 224x224 images: 1) `MobileNet-L` (CNN), which achieves 25ms latency. 2) `VisionTransformer-S` (ViT with 16x16 patches), which achieves higher accuracy but has 50ms latency.'
question: 'Is the manager correct to suggest halving the patch size to 8x8 to speed up the ViT?'
details:
  realistic_solution: 'The manager''s suggestion is incorrect because it ignores the quadratic computational complexity of the self-attention mechanism, which is the core of a Transformer. Halving the patch size quadruples the number of patches (the sequence length, N). Since attention complexity is O(N^2), the latency of the attention layers will increase by a factor of approximately 16x. The correct approach is to explain this scaling trap to the manager with quantitative data and recommend sticking with the `MobileNet-L` which already meets the critical 33ms deadline. For future work, suggest exploring knowledge distillation (teaching the fast `MobileNet-L` with the slow `VisionTransformer-S`) or using Neural Architecture Search (NAS) to find a more efficient hybrid architecture.'
  common_mistake: |
    **The Pitfall:** Assuming halving the patch size in a Vision Transformer will linearly speed up inference.
    **The Rationale:** Engineers incorrectly apply CNN intuition (where smaller inputs can be faster) to Transformers without considering attention scaling.
    **The Consequence:** Latency dramatically increases due to the quadratic complexity of self-attention relative to sequence length.
  napkin_math: |
    - Initial patch size 16x16: N = (224/16)^2 = 196 patches.
    - Halved patch size 8x8: N = (224/8)^2 = 784 patches (4x increase).
    - Self-attention complexity: O(N^2).
    - Compute increase: 4^2 = **16x increase** in attention MACs.
    - If attention took 25ms, new attention takes 25ms * 16 = **400ms**.
  options:
  - 'The manager is wrong. The quadratic scaling of attention with the increased sequence length will cause a catastrophic increase in latency. The team should use the MobileNet-L.'
  - 'The manager is right. Smaller patches can be processed in parallel, and the Jetson Orin''s high TOPS count can handle the increased workload within the deadline.'
  - 'The ViT has too many parameters. The latency issue can be solved by pruning 50% of the weights, which will cut the 50ms latency in half to 25ms.'
  - 'The issue is memory bandwidth, not compute. Using smaller patches will increase cache hits and could potentially reduce latency.'
