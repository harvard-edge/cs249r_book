title: Differential Privacy for Federated Edge Learning
scenario: You're deploying federated learning across 1,000 Jetson Orin edge devices
  (32 GB LPDDR5, 60W each) for a visual inspection model. Each device has 500 private
  images. The central server aggregates gradients with DP noise. What clipping norm
  and noise multiplier do you choose to achieve (ε=5, δ=1e-5) over 100 aggregation
  rounds, given that each round samples 100 devices?
question: What clipping norm and noise multiplier do you choose to achieve (ε=5, δ=1e-5)
  over 100 aggregation rounds, given that each round samples 100 devices?
details:
  realistic_solution: 'Federated DP works at the device level: each device computes
    a model update (gradient sum over local data), clips it to norm C, and the server
    adds Gaussian noise calibrated to C. With subsampling: each round samples q =
    100/1000 = 0.1 of devices. Using the moments accountant (RDP): for 100 rounds
    with subsampling rate 0.1, to achieve ε=5, δ=1e-5, the required noise multiplier
    is σ ≈ 1.1 (noise scale = σ × C). Clipping norm C: too small clips informative
    updates, too large dilutes the noise''s privacy effect. Empirically, C should
    be set at the median of unclipped update norms. For a ResNet-18 (11M params):
    typical update norms are 10-50. Set C = 20. Noise per coordinate: σ × C / num_sampled_devices
    = 1.1 × 20 / 100 = 0.22 per parameter. This is manageable for a model with 11M
    parameters — the noise averages out over dimensions.'
  common_mistake: Applying DP-SGD noise at the gradient level on each device. In federated
    learning, the privacy unit is the device (or user), not the individual sample.
    You clip and noise the model update from each device, not individual gradients.
  napkin_math: 'Noise multiplier σ = 1.1, clip norm C = 20. Noise per round: N(0,
    (σ×C)²/n²) per param = N(0, (22/100)²) = N(0, 0.048). Signal (average update):
    ~0.5 per param (depends on LR). SNR: 0.5/√0.048 = 2.28 — adequate for convergence.
    Total rounds: 100. RDP at α=10: per-round ε = 2α×q²×σ⁻² = 20×0.01×0.826 = 0.165.
    Total RDP: 16.5. Convert: ε = 16.5 - ln(1e-5)/9 = 16.5 - 1.28 = 15.2. Hmm, too
    high. Reduce: σ=2.0 → per-round 0.05, total 5.0, convert ε ≈ 5.0. Use σ=2.0.'
