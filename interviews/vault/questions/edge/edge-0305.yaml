title: The Power Efficiency Litmus Test
scenario: You're on the autonomous vehicle team evaluating a new accelerator for a perception model that
  must run within a strict 30W thermal design power (TDP) budget. When comparing chips, what does the
  **TOPS/W** (Trillion Operations Per Second Per Watt) metric fundamentally allow you to identify?
question: "When comparing chips, what does the **TOPS/W** (Trillion Operations Per Second Per Watt) metric fundamentally allow you to identify?"
details:
  realistic_solution: TOPS/W is the primary metric for **power efficiency**. It quantifies how many trillion
    operations the accelerator can perform for every watt of power it consumes. It's the most critical
    metric for any battery-powered or thermally-constrained platform (like a car, phone, or robot) because
    it determines the *sustainable performance* you can achieve within your power budget.
  common_mistake: Confusing TOPS/W with raw TOPS. Engineers often fixate on peak theoretical throughput
    (TOPS), but in a power- or thermally-constrained edge device, you can rarely run the chip at its maximum
    power draw. A chip with lower absolute TOPS but higher efficiency (TOPS/W) often delivers better *sustained*
    performance in a real-world, constrained environment.
  napkin_math: A powerful chip like the Jetson AGX Orin provides 275 TOPS, but consumes up to 60W to do
    so (~4.6 TOPS/W). A specialized, efficient accelerator like the Hailo-8 provides 26 TOPS while consuming
    only 2.5W (~10.4 TOPS/W). For a 30W vehicle budget, the Orin can't run at peak, but the Hailo-8 can
    deliver its full performance easily. The TOPS/W metric immediately identifies which chip is better
    suited for the constrained environment.
  options:
  - The maximum theoretical compute throughput of the chip.
  - The chip's performance on memory-bound vs. compute-bound tasks.
  - The computational performance delivered per unit of power consumed.
  - The dollar cost per trillion operations.
  correct_index: 2
