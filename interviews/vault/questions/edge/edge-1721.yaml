title: Optimizing ViT Activation Memory Bandwidth on Jetson Orin
scenario: You are deploying a 4-camera surround-view Vision Transformer (ViT) on an
  NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, Ampere GPU + DLA). Despite profiling
  showing we are far below the 275 TOPS compute limit, the pipeline is stalling at
  15 FPS instead of the target 30 FPS. Profiling reveals that reading and writing
  large intermediate feature maps to the 32 GB LPDDR5 is creating a severe bottleneck.
  How do you diagnose the exact memory hierarchy constraint and quantify the impact
  of operator fusion to hit the framerate target within the 60W TDP?
question: How do you diagnose the exact memory hierarchy constraint and quantify the
  impact of operator fusion to hit the framerate target within the 60W TDP?
details:
  realistic_solution: The correct approach is to analyze the memory traffic of memory-bound
    operations like LayerNorm and Softmax. By implementing operator fusion (e.g.,
    FlashAttention or fusing LayerNorm with the preceding linear layer), intermediate
    activations are retained in the Ampere GPU's SRAM instead of taking a round-trip
    to the LPDDR5. This directly reduces memory bandwidth utilization, alleviating
    the stall.
  common_mistake: Candidates often suggest lowering precision further to INT4 or trying
    to offload more layers to the DLA accelerator, missing that the bottleneck is
    memory bandwidth from intermediate activations, not compute capacity. They may
    also fail to calculate the actual bandwidth cost of unfused operators.
  napkin_math: 'Assume an intermediate activation tensor of 2MB per camera. For 4
    cameras, that''s 8MB. An unfused attention block writes and reads this 4 times
    (QKV, Softmax, Out, Proj): 8MB * 4 writes + 8MB * 4 reads = 64MB DRAM traffic
    per block. For 12 blocks at 30 FPS, this requires 64MB * 12 * 30 = ~23 GB/s just
    for one sub-layer, rapidly saturating the shared LPDDR5 bandwidth when combined
    with OS and sensor streams. Fusing the attention mechanism keeps the 8MB working
    set entirely in SRAM, eliminating intermediate DRAM trips. This reduces traffic
    to 1 read/1 write (16MB per block), saving 48MB per block, or ~17.2 GB/s of LPDDR5
    bandwidth, allowing the pipeline to reach 30 FPS.'
