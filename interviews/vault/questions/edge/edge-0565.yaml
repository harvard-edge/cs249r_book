title: The Clock Drift Time-Series Poison
scenario: Your Ambarella CV5-based predictive maintenance system on an oil pipeline samples vibration data at 4 kHz and runs a 1D-CNN anomaly detection model every 500ms. The system works perfectly for the first 3 weeks, then suddenly generates a massive spike in false alarms every few hours. The vibration sensor is fine (verified with an oscilloscope).
question: What is causing the sudden spike in false alarms after 3 weeks of perfect operation?
details:
  realistic_solution: The issue is a classic buffer overflow caused by clock drift. The CV5 and the sensor ADC have independent crystals (e.g., ±30 ppm and ±50 ppm). The ADC generates 4000.32 samples per second, while the CV5 reads exactly 4000. Because of the 80 ppm difference, 0.32 samples per second are left in the driver's ring buffer. It takes 3 weeks for this slow accumulation to overflow a typical large DMA buffer. When the buffer finally wraps, the CV5 reads a 500ms window that contains a hard discontinuity (where the write pointer lapped the read pointer). The 1D-CNN interprets this sharp jump as a high-frequency mechanical shock, triggering a false alarm.
  common_mistake: |
    **The Pitfall:** Assuming the model is experiencing concept drift or continuous frequency shift.
    **The Rationale:** Candidates often jump to machine learning causes for degraded performance over time instead of hardware/system-level synchronization issues.
    **The Consequence:** Leads to wasted effort retraining the model or investigating the data distribution when the root cause is a simple buffer overflow from asynchronous clock drift.
  napkin_math: |
    1. Clock drift is 80 ppm relative.
    2. CPU reads exactly 4000 samples/s, but the sensor ADC generates 4000.32 samples/s.
    3. Buffer accumulates 0.32 extra samples/s.
    4. In 3 weeks (1.81M seconds), the driver's ring buffer accumulates ~580,000 extra samples.
    5. If the internal ring buffer is 500,000 samples, it overflows in week 3.
    6. When the write pointer laps the read pointer, the data contains discontinuous jumps, triggering **false physical anomalies** in the 1D-CNN.
