title: Hailo-8 Multi-Tenant SLA
scenario: Designing a multi-tenant inference server for a retail store appliance containing a single accelerator, handling both inventory scanning and customer counting.
question: Create a model multiplexing architecture that guarantees a strict 30 FPS SLA for the customer counting model while utilizing idle cycles for the batch inventory model.
details:
  realistic_solution: Maintain both subgraphs simultaneously in VRAM. Construct an asymmetric host-side scheduler leveraging priority queues. The real-time stream asserts a stringent timer interrupt (firing perfectly at 33.3ms limits). Background tasks are queued at low priority, immediately yielding to the real-time execution engine upon interrupt generation to aggressively protect the latency SLA.
  common_mistake: |
    **The Pitfall:** Attempting to batch frames from both models together into a single queue.
    **The Rationale:** Standard cloud inference servers often maximize throughput by blindly batching all incoming requests.
    **The Consequence:** This causes head-of-line blocking, ruining the latency of the real-time stream and violating the strict 30 FPS SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Customer model SLA: 30 FPS
       - Host scheduler preempts inventory model
    2. **Calculations:**
       - Real-time deadline: 1000 ms / 30 FPS = 33.3 ms
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound SLA.** Preempting the batch process ensures the 33.3 ms deadline is never violated by head-of-line blocking.
