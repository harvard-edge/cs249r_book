title: Hailo-8 Multi-Tenant SLA
scenario: Designing a multi-tenant inference server for a retail store appliance containing a single Hailo-8, handling both inventory scanning and customer counting.
question: Create a model multiplexing architecture that guarantees a strict 30 FPS SLA for the customer counting model while utilizing idle cycles for the batch inventory model.
details:
  realistic_solution: Load both networks into the Hailo-8 device memory. Implement a host-side scheduler where the 30 FPS customer model has a hard preemption priority timer (firing every 33.3ms). The inventory model processes offline batch data via a low-priority queue that is only submitted to the accelerator when the customer stream has an empty buffer.
  common_mistake: |
    **The Pitfall:** Attempting to batch frames from both models together into a single queue.
    **The Rationale:** Standard cloud inference servers often maximize throughput by blindly batching all incoming requests.
    **The Consequence:** This causes head-of-line blocking, ruining the latency of the real-time stream and violating the strict 30 FPS SLA.
  napkin_math: |
    1. Customer counting SLA requirement: 30 FPS.
    2. Latency budget per frame: 1000ms / 30 = **33.3ms**.
