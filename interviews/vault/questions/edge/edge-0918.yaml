title: LLM KV Cache Bandwidth Ceiling
scenario: You are deploying a 2B parameter LLM (INT4, 1GB weights) on an edge device with a 50 TOPS NPU
  and 25 GB/s memory bandwidth. During the prefill phase (prompt length 1024), you achieve 200 tokens/s.
  During decoding, token generation drops abruptly to 22 tokens/s. The KV cache size averages 128MB during
  decoding. Diagnose the bottleneck and propose an optimization strategy.
question: "Why does decoding drop to 22 tokens/s, and what optimization would improve edge LLM decode throughput?"
details:
  realistic_solution: The decoding phase of an LLM is heavily memory-bound because it operates with an
    effective batch size of 1. For every single generated token, the entire 1GB of model weights must
    be streamed from DRAM, plus the KV cache. The theoretical maximum decoding speed is dictated entirely
    by memory bandwidth, not compute TOPS. The roofline ceiling is strictly enforced by the 25 GB/s bus.
    To optimize decoding on the edge, you must reduce memory traffic. Techniques include Grouped-Query
    Attention (GQA) to shrink the KV cache, or Speculative Decoding, which evaluates multiple tokens per
    weight load, artificially increasing the batch size and Arithmetic Intensity.
  common_mistake: Assuming the NPU compute units are overheating or underutilized due to software bugs,
    and trying to optimize the matrix multiplication kernels.
  napkin_math: 'Decoding 1 token requires loading 1GB (weights) + 0.128GB (KV cache) = 1.128GB.

    Max memory-bound throughput = 25 GB/s / 1.128 GB/token = 22.16 tokens/s.

    Compute required per token: ~4 GOPS. Compute ceiling = 50 TOPS / 4 GOPS = 12,500 tokens/s.

    The system is operating exactly at its theoretical memory bandwidth limit (22 tokens/s).'
