title: LLM KV Cache Bandwidth Ceiling
scenario: You are deploying a 2B parameter LLM (INT4, 1GB weights) on an edge device with a 50 TOPS NPU and 25 GB/s memory bandwidth. During the prefill phase (prompt length 1024), you achieve 200 tokens/s. During decoding, token generation drops abruptly to 22 tokens/s. The KV cache size averages 128MB during decoding.
question: 'Why does decoding drop to 22 tokens/s, and what optimization would improve edge LLM decode throughput?'
details:
  realistic_solution: 'The decoding phase of an LLM operates with an effective batch size of 1. For every single generated token, the entire 1GB of model weights must be streamed from DRAM, plus the KV cache. The theoretical maximum decoding speed is dictated entirely by memory bandwidth, not compute TOPS. To optimize decoding on the edge, you must reduce memory traffic using Grouped-Query Attention (GQA) to shrink the KV cache, or Speculative Decoding to evaluate multiple tokens per weight load.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU compute units are underutilized due to software bugs or overheating.
    **The Rationale:** Candidates try to optimize matrix multiplication kernels, missing the fundamental difference in arithmetic intensity between prefill (compute-bound) and decode (memory-bound).
    **The Consequence:** Time is wasted on compute optimizations that yield zero improvement since the system is strictly starved for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1 GB weights (INT4).
    - KV Cache: 128 MB (0.128 GB).
    - Memory Bandwidth: 25 GB/s. NPU Compute: 50 TOPS.

    **Calculations:**
    - Memory load per token = 1 GB (weights) + 0.128 GB (KV) = 1.128 GB.
    - Max memory-bound throughput = 25 GB/s / 1.128 GB/token = 22.16 tokens/s.
    - Compute required per token = ~4 GOPS. Compute ceiling = 50 TOPS / 4 GOPS = 12,500 tokens/s.

    **Conclusion & Interpretation:**
    - **Result: 22.16 tokens/s (Memory-Bandwidth Bound)**. LLM decoding is bottlenecked by streaming weights from DRAM, not compute capacity.
