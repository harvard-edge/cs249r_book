title: 'Edge Queueing Theory Optimization: Hailo-8 Throughput via Request Coalescing'
scenario: 'A Hailo-8 (26 TOPS INT8, 2.5W) processes security camera frames at λ=25 req/s with ρ=0.9 (near
  capacity). P99=450ms (SLO: 200ms). You cannot add hardware. Propose request coalescing (merge 2 adjacent
  frames into a batch) to reduce effective λ while preserving detection accuracy via temporal averaging.
  Quantify the P99 improvement.'
details:
  realistic_solution: 'Coalescing pairs: new λ_coalesced = 25/2 = 12.5 requests/s (each processes 2 frames).
    Service time with batch=2: on Hailo-8, batching is efficient, service = 1.5x single (not 2x due to
    dataflow). Current single: service = ρ/μ = 0.9/(μ) and μ = λ/ρ = 25/0.9 = 27.8/s, service = 36ms.
    Batched service ≈ 36*1.5 = 54ms. New μ_batch = 1/0.054 = 18.5/s. New ρ = 12.5/18.5 = 0.676. M/D/1
    Wq = 0.676²/(2*18.5*0.324) = 0.457/11.99 = 38.1ms. W = 38.1+54 = 92ms. P99 ≈ 4.6*92 = 423ms. Improvement:
    450→423ms modest. Issue: the ρ=0.9 implied service was not 36ms in baseline if M/D/1 — need to recheck
    baseline.'
  common_mistake: Assuming coalescing reduces throughput by 2x — it actually reduces arrival rate to μ
    by half while service time increases sublinearly (not 2x) due to batch efficiency, improving net utilization.
  napkin_math: 'Baseline: ρ=0.9, P99=450ms → W=97.8ms (M/D/1 P99=4.6*W). M/D/1: W=(1+ρ²/(2(1-ρ)))/μ=97.8ms,
    Wq=ρ²/(2μ(1-ρ))=87.8ms → ρ²/(0.2μ)=87.8ms → 0.81/(0.2μ)=0.0878 → μ=46.1/s, service=21.7ms. Coalesced:
    λ=12.5/s, service=21.7*1.5=32.5ms, μ_new=30.8/s, ρ_new=0.406. Wq=0.165/(2*30.8*0.594)=4.5ms, W=37ms.
    P99=170ms. Improvement: 450→170ms = 2.6x. Meets 200ms SLO!'
