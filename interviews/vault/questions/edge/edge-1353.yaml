title: Estimating ResNet-50 Inference Speed on Coral Edge TPU
scenario: A vision model requiring approximately 8 billion multiply-accumulate operations (MACs) per image is being deployed to a smart camera powered by a Google Coral Edge TPU. The Edge TPU operates at 4 TOPS (INT8) and consumes 2W.
question: What is the Coral Edge TPU's maximum theoretical FPS for an 8 GMAC/image model, and what precision constraint must the team understand?
details:
  realistic_solution: First, clarify that the model must be fully quantized to INT8 using Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT) because the Edge TPU lacks floating-point support. Since 1 MAC = 2 OPs, an 8 GMAC model requires 16 GOPs. Dividing theoretical peak throughput by GOPs gives the max FPS.
  common_mistake: |
    **The Pitfall:** Confusing MACs with OPs and forgetting hardware quantization constraints.
    **The Rationale:** Candidates often treat 1 MAC as 1 Operation instead of 2, and overlook that the Coral Edge TPU strictly requires INT8 models.
    **The Consequence:** Overestimating the maximum FPS by a factor of 2 and failing to deploy the model because it wasn't quantized to INT8.
  napkin_math: |
    * **Operations per Frame:** 8 GMACs * 2 OPs/MAC = 16 GOPs.
    * **Theoretical Throughput:** 4 TOPS = 4,000 GOPs/sec.
    * **Max FPS:** 4,000 GOPs/sec / 16 GOPs/frame = **250 FPS**.
    * **Power Efficiency:** 250 FPS / 2W = **125 frames per second per Watt**.
