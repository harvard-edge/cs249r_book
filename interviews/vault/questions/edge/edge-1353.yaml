title: Estimating ResNet-50 Inference Speed on Coral Edge TPU
scenario: You are deploying a vision model to a smart camera powered by a Google Coral
  Edge TPU. The model requires approximately 8 billion multiply-accumulate operations
  (MACs) per image. The Edge TPU operates at 4 TOPS (INT8) and consumes 2W. You need
  to estimate the maximum theoretical frame rate for this model and explain the precision
  constraint to the product team.
question: What is the Coral Edge TPU's maximum theoretical FPS for an 8 GMAC/image
  model, and what precision constraint must the team understand?
details:
  realistic_solution: First, clarify that the model must be fully quantized to INT8
    using Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT) because
    the Edge TPU lacks floating-point support. Then, convert MACs to Operations to
    find the theoretical limits. Since 1 MAC = 2 OPs, an 8 GMAC model requires 16
    GOPs. Dividing the theoretical peak throughput (4 TOPS) by the operations per
    frame gives the theoretical maximum FPS.
  common_mistake: Candidates often confuse MACs with OPs. A MAC operation consists
    of a multiplication and an addition, which counts as 2 operations. They also frequently
    forget that the Coral Edge TPU strictly requires INT8 quantization and does not
    support FP16 or BF16 out of the box.
  napkin_math: Operations per frame = 8 * 10^9 MACs * 2 OPs/MAC = 16 * 10^9 OPs (16
    GOPs). Theoretical throughput = 4 * 10^12 OPs/sec (4 TOPS). Max FPS = (4 * 10^12)
    / (16 * 10^9) = 4000 / 16 = 250 FPS. Power efficiency = 250 FPS / 2W = 125 frames
    per second per Watt.
