title: 'Fairness Evaluation on Edge AI: Qualcomm Cloud AI 100'
scenario: A financial institution deploys a credit scoring model on the Qualcomm Cloud AI 100 for real-time loan approval decisions at the edge. Initial post-deployment audits reveal significant disparities in approval rates across different demographic subgroups, suggesting potential algorithmic bias. The model was trained on a large dataset and optimized for INT8 inference on the accelerator.
question: How would you analyze the root causes of demographic approval disparities on the INT8 credit scoring deployment?
details:
  realistic_solution: To analyze this behavior, you would first define relevant protected attributes and fairness metrics (e.g., demographic parity, equalized odds, or intersectional fairness). Then, you would collect real-world inference logs from the Qualcomm Cloud AI 100, ensuring data privacy, and segment them by demographic subgroups. You'd analyze these segments for disparities in decision outcomes and model confidence. Investigate if the INT8 quantization process introduced or amplified bias by comparing the fairness metrics of the full-precision model with the quantized model. Additionally, explore if the edge deployment's data input pipeline or sensor data preprocessing introduces systemic differences that affect subgroups. Propose mitigation strategies such as re-calibrating decision thresholds per subgroup, re-training with fairness-aware regularization, or using post-processing techniques like re-ranking, keeping the Qualcomm Cloud AI 100's memory and computational constraints in mind for any on-device adjustments.
  common_mistake: |
    **The Pitfall:** Focusing solely on aggregate accuracy or assuming INT8 quantization maintains fairness.
    **The Rationale:** Candidates overlook that optimizing for edge inference (quantization) can introduce or amplify subgroup biases, and that overall accuracy hides disparities.
    **The Consequence:** Fails to identify the root cause of the bias and allows discriminatory decisions to persist in the production edge deployment.
  napkin_math: |
    1. Total approvals = 1000 * 0.70 = 700.
    2. Protected subgroup applications = 1000 * 0.10 = 100.
    3. Protected subgroup approvals = 100 * 0.50 = 50.
    4. Majority group applications = 1000 * 0.90 = 900.
    5. Majority group approvals = 700 - 50 = 650.
    6. Majority group approval rate = 650 / 900 = 0.7222.
    7. Demographic Parity Difference = |0.50 - 0.7222| = **0.2222 (22.22%)**.
