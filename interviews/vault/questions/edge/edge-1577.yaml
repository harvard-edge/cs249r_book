title: Google Coral Edge TPU INT8 Throughput
scenario: You are deploying a vision model to a Google Coral Edge TPU via USB to run real-time inference on an edge device. The Google Coral Edge TPU delivers 4 TOPS of INT8 compute capability while consuming 2W of power. The model, fully quantized to INT8, requires 300 million MACs per inference frame.
question: What theoretical max FPS and FPS/W do you get on the 4 TOPS, 2W Coral Edge TPU for a 300M-MAC INT8 frame?
details:
  realistic_solution: Convert MACs to OPs (1 MAC = 2 OPs) to match the hardware's TOPS rating. After converting 300M MACs to 600M OPs, calculate max theoretical FPS by dividing the 4 TOPS by operations per frame. Divide FPS by the 2W power to yield power efficiency.
  common_mistake: |
    **The Pitfall:** Failing to distinguish between TOPS and MACs (assuming 1 MAC = 1 OP).
    **The Rationale:** Candidates often gloss over the fact that a Multiply-Accumulate represents two arithmetic operations.
    **The Consequence:** A direct 2× error in throughput and latency calculations, resulting in severely flawed system provisioning.
  napkin_math: |
    - **Edge TPU Compute:** 4 TOPS = 4 × 10^12 Operations/sec.
    - **Model Compute:** 300M MACs = 300 × 10^6 MACs/frame.
    - **Convert MACs to OPs:** 300 × 10^6 MACs × 2 OPs/MAC = 600 × 10^6 OPs/frame.
    - **Theoretical Max FPS:** (4 × 10^12 OPs/sec) / (600 × 10^6 OPs/frame) = 6,666.6 FPS.
    - **Final Result:** **The system achieves a theoretical peak of 6,666.6 FPS, yielding a power efficiency of 3,333.3 FPS/Watt.**
