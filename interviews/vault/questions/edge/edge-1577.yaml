title: Google Coral Edge TPU INT8 Throughput
scenario: You are deploying a vision model to a Google Coral Edge TPU via USB to run
  real-time inference on an edge device. The Google Coral Edge TPU delivers 4 TOPS
  of INT8 compute capability while consuming 2W of power. The model, after being fully
  quantized to INT8 to be supported by the Edge TPU, requires 300 million MACs per
  inference frame. Calculate the theoretical maximum frames per second (FPS) achievable
  and the power efficiency in FPS/Watt.
question: What theoretical max FPS and FPS/W do you get on the 4 TOPS, 2W Coral Edge
  TPU for a 300M-MAC INT8 frame?
details:
  realistic_solution: A solid systems engineer immediately converts MACs to OPs (1
    MAC = 2 OPs) to match the hardware's TOPS rating. After converting the 300M MACs
    to 600M OPs, they calculate the maximum theoretical frames per second by dividing
    the 4 TOPS by the operations per frame. Finally, they divide the FPS by the 2W
    power consumption to yield the power efficiency metric.
  common_mistake: Candidates often fail to distinguish between TOPS and MACs, assuming
    1 MAC = 1 OP, which leads to a 2x error in throughput calculations. Additionally,
    they may forget to convert between Tera (10^12) and Mega (10^6) correctly when
    doing the mental arithmetic.
  napkin_math: '1. Edge TPU Compute: 4 TOPS = 4 * 10^12 Operations/sec. 2. Model Compute:
    300M MACs = 300 * 10^6 MACs/frame. 3. Convert MACs to OPs: 300 * 10^6 MACs * 2
    OPs/MAC = 600 * 10^6 OPs/frame. 4. Theoretical Max FPS: (4 * 10^12 OPs/sec) /
    (600 * 10^6 OPs/frame) = 4,000,000 / 600 = 6666.6 FPS. 5. Power Efficiency: 6666.6
    FPS / 2W = 3333.3 FPS/Watt.'
