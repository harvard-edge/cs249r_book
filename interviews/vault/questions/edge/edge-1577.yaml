title: Google Coral Edge TPU INT8 Throughput
scenario: A vision model is deployed on a 4 TOPS (INT8), 2W Google Coral Edge TPU. The model requires 300 million MACs per frame.
question: What theoretical max FPS and FPS/W do you get on the 4 TOPS, 2W Coral Edge TPU for a 300M-MAC INT8 frame?
details:
  realistic_solution: Convert MACs to OPs (1 MAC = 2 OPs) to match the hardware's TOPS rating. Calculate max theoretical FPS by dividing the 4 TOPS by operations per frame, then divide by power for efficiency.
  common_mistake: |
    **The Pitfall:** Failing to distinguish between TOPS and MACs (assuming 1 MAC = 1 OP).
    **The Rationale:** Candidates often gloss over the fact that a Multiply-Accumulate represents two distinct arithmetic operations.
    **The Consequence:** A direct 2x error in throughput and latency calculations, resulting in severely flawed system provisioning.
  napkin_math: |
    1. **Assumptions & Constraints:** Coral Edge TPU = 4 TOPS, 2W. Model = 300M MACs/frame. 1 MAC = 2 Operations.
    2. **Calculations:** Compute = 300M * 2 = 600M OPs/frame = 0.6 GOPs/frame. Peak FPS = 4000 GOPs / 0.6 GOPs = 6,666.6 FPS. Efficiency = 6666.6 / 2W = 3,333.3 FPS/W.
    3. **Conclusion & Interpretation:** **Result: 6,666.6 Peak FPS.** Failing to convert MACs to OPs halves theoretical throughput estimates. **System Status: Compute-Bound.**
