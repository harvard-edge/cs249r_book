title: The Solar Panel Degradation Power Crunch
scenario: Your remote environmental monitoring network has 800 solar-powered stations, each running a Coral Dev Board Mini (Edge TPU, 3W inference, 0.5W idle) with a 20W solar panel and a 50 Wh LiFePO4 battery. The system was designed for 24/7 operation with 4 hours of daily sunlight (winter minimum). After 3 years, 120 stations (15%) in the sunniest locations are experiencing daily brownouts — shutting down for 2–4 hours before dawn. The batteries test fine.
question: What is failing, and how do you redesign the power budget for a 10-year deployment?
details:
  realistic_solution: 'The solar panels are degrading faster than the spec sheet claims — but only in the sunniest locations. Standard polycrystalline panels degrade at ~0.5%/year under normal conditions, but panels in high-UV, high-temperature environments (desert, tropical) experience light-induced degradation (LID) and potential-induced degradation (PID) at 2–3%/year. After 3 years at 2.5%/year: the 20W panel now produces 20 × (1 - 0.075) = 18.5W peak.'
  common_mistake: |
    **The Pitfall:** Assuming the batteries are degrading and replacing them.
    **The Rationale:** Candidates default to blaming batteries, ignoring the fact that LiFePO4 batteries retain >80% capacity after 2,000 cycles (well beyond the 1,095 cycles of 3 years).
    **The Consequence:** The team wastes massive amounts of capital replacing perfectly good batteries, and the brownouts persist because the root cause—light-induced panel degradation—was ignored.
  napkin_math: |
    1. Calculate baseline daily consumption: Assumed ~57 Wh/day based on continuous operation metrics.
    2. Calculate Year 0 generation: 20W panel * 4 hours * 0.85 efficiency = 68 Wh/day.
    3. Calculate Year 3 generation (high degradation at 2.5%/yr = 7.5% total): 68 Wh * 0.925 = 62.9 Wh/day.
    4. Calculate Year 5 generation (12.5% total degradation): 68 Wh * 0.875 = 59.5 Wh/day (dangerously close to 57 Wh).
    5. Calculate Year 7 generation (17.5% total degradation): 68 Wh * 0.825 = 56.1 Wh/day (system fails).
    6. Redesign for Year 10 (25% degradation) with 28W panel: 28W * 0.75 * 4 hours * 0.85 = 71.4 Wh/day.
    **A 28W panel ensures 71.4 Wh/day even after 10 years of 25% degradation, providing a 25% margin over the 57 Wh consumption.**
