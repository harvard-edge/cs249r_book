title: Hardware-Aware NAS for Jetson Orin DLA
scenario: 'Your team is using Hardware-Aware NAS to design a multi-camera perception model for an autonomous delivery robot powered by an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP, 275 TOPS INT8). The NAS objective is to maximize mAP while strictly ensuring the model runs entirely on the Deep Learning Accelerator (DLA) to leave the Ampere GPU free for planning workloads.'
question: 'How would you constrain the NAS search space and cost model so the Orin DLA-only perception model is compatible and meets latency targets?'
details:
  realistic_solution: 'The correct approach involves constraining the NAS search space exclusively to operators natively supported by the Orin DLA. Furthermore, instead of theoretical FLOPs, the cost model must incorporate a hardware-calibrated latency lookup table (LUT) or an analytical latency predictor trained on actual DLA measurements to accurately evaluate the latency-accuracy tradeoff.'
  common_mistake: |
    **The Pitfall:** Using raw FLOPs or parameter counts as proxy metrics for latency in the NAS cost model.
    **The Rationale:** Candidates default to standard NAS techniques, assuming theoretical FLOPs map perfectly to hardware execution.
    **The Consequence:** The NAS selects operators unsupported by the DLA, causing CPU/GPU fallbacks that destroy latency and violate the GPU-free requirement.
  napkin_math: |
    * Target: 30 FPS for 4 concurrent cameras.
    * Latency budget = 33ms / 4 = 8.25ms per camera.
    * Total Jetson Orin TOPS = 275 TOPS. DLA portion ≈ 25% (68.75 TOPS).
    * Realistic DLA efficiency (40%) = 27.5 effective TOPS.
    * Max ops per inference = (27.5 × 10^12) × 0.00825 seconds = 226.8 GOPs.
    * **Conclusion: Constrain the NAS search space to DLA-native ops only, with a hard cost-model cap of ~225 GOPs.**
