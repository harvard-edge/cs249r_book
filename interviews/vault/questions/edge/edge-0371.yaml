title: The INT8 Energy Dividend (edge-0371)
scenario: You're an engineer on an autonomous vehicle team, working to optimize a perception model for
  a new, power-constrained ECU. To meet the thermal budget, you're considering quantizing the model's
  convolutions from 32-bit floating point (FP32) to 8-bit integer (INT8). Identify the approximate energy
  reduction for a single arithmetic operation when switching from FP32 to INT8.
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    This is a fundamental physical constant related to the complexity of the digital circuits required
    for floating-point vs. integer arithmetic. Switching to INT8 is a primary technique for meeting strict
    power budgets on edge devices.
  common_mistake: The most common mistake is confusing the *memory* reduction with the *energy* reduction.
    Memory size is reduced by 4× (32 bits to 8 bits), but the energy savings are far more significant.
    This is because the underlying digital logic for an integer multiply-accumulate (MAC) unit is much
    simpler and smaller than for a floating-point unit, leading to substantially lower switching energy.
  napkin_math: From the 'Invariants' table, the `FP32 vs INT8 energy` ratio is stated as `~18×`. This
    means for every 1 Joule spent on an INT8 operation, you would have spent 18 Joules on the equivalent
    FP32 operation. The percentage saving is `(18 - 1) / 18 ≈ 94%`.
  options:
  - ~4×
  - ~2×
  - ~18×
  - ~100×
  correct_index: 2
