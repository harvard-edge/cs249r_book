title: The INT8 Energy Dividend (edge-0371)
scenario: You're an engineer on an autonomous vehicle team, working to optimize a perception model for a new, power-constrained ECU. To meet the thermal budget, you're considering quantizing the model's convolutions from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: "What approximate per-operation energy reduction should you expect when quantizing convolutions from FP32 to INT8?"
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation. This is a fundamental physical constant related to the complexity of the digital circuits required for floating-point vs. integer arithmetic. Switching to INT8 is a primary technique for meeting strict power budgets on edge devices.
  common_mistake: |
    **The Pitfall:** Confusing the memory storage reduction with the active compute energy reduction.
    **The Rationale:** Because 8 bits is one-fourth of 32 bits, candidates assume the power draw drops by exactly 4x.
    **The Consequence:** The system's true thermal and energy envelope improvements are drastically underestimated.
  napkin_math: |
    1. The fundamental digital logic for an integer MAC unit is significantly smaller than a floating-point unit.
    2. The FP32 vs INT8 energy ratio is ~18x.
    3. **This means switching to INT8 yields a ~94% reduction in switching energy per operation.**
  options:
  - ~4x
  - ~2x
  - ~18x
  - ~100x
  correct_index: 2
