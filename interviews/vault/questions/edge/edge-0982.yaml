title: Edge Intermittent Power Checkpointing
scenario: A swarm of solar-powered wildlife cameras using Jetson AGX Orin (15W mode)
  train a federated learning model. Power drops out randomly, averaging 5 times per
  hour, causing node failure. Checkpointing a 500MB model state over a 10MB/s flash
  storage takes 50 seconds.
question: Evaluate the trade-off between checkpointing frequency and training progress
  loss to determine the optimal checkpoint interval that maximizes useful compute
  time.
visual:
  kind: svg
  path: edge-0982.svg
  alt: A graph showing checkpoint overhead decreasing and failure recompute time increasing
    as the checkpoint interval grows, with a minimum cost at 268 seconds.
  caption: Optimal checkpoint interval trade-off.
details:
  realistic_solution: The time to write a checkpoint is C = 50s. Checkpointing every
    T seconds wastes a C/T fraction of time. A failure occurs with rate λ = 5/3600
    = 1/720 Hz, losing an average of T/2 seconds of work per failure. The total wasted
    time fraction is C/T + λ*T/2. Setting the derivative to zero yields T = sqrt(2C/λ).
    Here, T = sqrt(2 * 50 * 720) = sqrt(72000) ≈ 268 seconds. So checkpointing roughly
    every 4.5 minutes minimizes wasted time.
  common_mistake: Evaluating solely based on MTBF without factoring in the high I/O
    time overhead, leading to overly aggressive checkpointing that starves the training
    loop.
  napkin_math: T = sqrt(2 * 50 * 720) = sqrt(72000) = 268s
