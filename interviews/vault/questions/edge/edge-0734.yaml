title: 'The OTA Downtime Tax'
scenario: You are an engineer on an autonomous vehicle team responsible for deploying model updates. Your fleet uses compute modules with UFS 4.0 flash storage. A critical OTA update is pending, which includes a 4 GB perception model and a 32 GB high-definition map file for the RAG system. During the final installation phase, the vehicle must be non-operational as these files are written to the primary flash partition.
question: What is the minimum downtime to write the 4 GB model and 32 GB map to UFS 4.0 flash during installation?
details:
  realistic_solution: |
    The correct approach is to first sum the total data payload, then divide by a realistic write speed. The total size is 4 GB (model) + 32 GB (map data) = 36 GB. A reasonable engineering assumption for high-performance flash is that write speed is about 50% of read speed. Therefore, we estimate the write speed to be ~2.1 GB/s. The total downtime is the total size divided by this estimated write speed.
  common_mistake: |
    **The Pitfall:** Using the advertised "read" speed for a "write" operation.
    **The Rationale:** Candidates often treat storage bandwidth as symmetrical.
    **The Consequence:** Underestimating the required downtime by 50%, which can cause critical timeout failures in real-world deployment scripts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Update Size: 4 GB (model) + 32 GB (map data) = 36 GB.
    - Read Speed (UFS 4.0): ~4.2 GB/s.
    - Write Speed Estimation: ~50% of Read Speed = ~2.1 GB/s.

    **Calculations:**
    - Total Downtime: 36 GB / 2.1 GB/s = ~17.1 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~17.1 seconds (I/O-Bound Downtime)**. The write operation requires approximately 17.1 seconds of downtime, calculating against the estimated write speed instead of the read speed.
  options:
  - ~8.6 seconds
  - ~17.1 seconds
  - ~1.9 seconds
  - ~7.6 seconds
  correct_index: 1
