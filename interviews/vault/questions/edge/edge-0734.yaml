title: The OTA Downtime Tax
scenario: You are an engineer on an autonomous vehicle team responsible for deploying model updates. Your
  fleet uses compute modules with UFS 4.0 flash storage. A critical OTA update is pending, which includes
  a 4 GB perception model and a 32 GB high-definition map file for the RAG system. During the final installation
  phase, the vehicle must be non-operational as these files are written to the primary flash partition.
  Calculate the approximate *minimum* downtime required for the vehicle to complete this file write operation.
details:
  realistic_solution: The correct approach is to first sum the total data payload, then divide by a realistic
    write speed. The total size is 4 GB (model) + 32 GB (map data) = 36 GB. The `NUMBERS.md` table lists
    UFS 4.0 'Read' speed at ~4.2 GB/s. A reasonable engineering assumption for high-performance flash
    is that write speed is about 50% of read speed. Therefore, we estimate the write speed to be ~2.1
    GB/s. The total downtime is the total size divided by this estimated write speed.
  common_mistake: Using the advertised 'read' speed for a 'write' operation. Flash storage, including
    UFS 4.0, has asymmetric performance; write speeds are almost always significantly lower than read
    speeds. A candidate might also forget to sum all components of the update payload, calculating the
    time for only the model or the map data.
  napkin_math: '1. **Total Update Size**: 4 GB (model) + 32 GB (map data) = 36 GB'
  options:
  - ~8.6 seconds
  - ~17.1 seconds
  - ~1.9 seconds
  - ~7.6 seconds
  correct_index: 1
