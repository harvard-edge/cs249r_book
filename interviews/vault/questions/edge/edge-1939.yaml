title: 'Hailo-8 Deployment: Model Memory Footprint & Throughput'
scenario: You are deploying a 15 million parameter INT8 object detection CNN on a Hailo-8 AI processor. The model requires 20 GOPS for a single inference.
question: How much INT8 parameter memory does the 15M-parameter model need, what is its theoretical Hailo-8 throughput at 20 GOPS, and what do these imply?
details:
  realistic_solution: "1. Parameter Memory Calculation: 15,000,000 parameters * 1 byte/parameter = 15,000,000 bytes. 15,000,000 bytes / (1024 * 1024) bytes/MB ≈ 14.3 MB. 2. Theoretical Throughput Calculation: Hailo-8 provides 26 TOPS (INT8) = 26,000 GOPS. Model requires 20 GOPS per inference. Theoretical Max Throughput = 26,000 GOPS / 20 GOPS/inference = 1300 inferences/second. 3. Implications: The model fits well within typical RAM, but actual throughput will be much lower due to memory bandwidth limits and dataflow inefficiencies."
  common_mistake: |
    **The Pitfall:** Only considering model parameter size for memory and theoretical peak TOPS for throughput.
    **The Rationale:** Candidates overlook peak activation memory, host OS overhead, and bandwidth limitations inherent in dataflow architectures.
    **The Consequence:** The deployed model either crashes with Out-Of-Memory (OOM) errors or drastically misses real-world throughput targets.
  napkin_math: |
    - Model Parameter Memory: 15,000,000 * 1 byte = 15,000,000 bytes.
    - Memory in MB: 15,000,000 / (1024^2) = **14.3 MB**.
    - Hailo-8 peak compute: 26 TOPS = 26,000 GOPS.
    - Theoretical max throughput: 26,000 GOPS / 20 GOPS/inference = **1300 inferences/second**.
