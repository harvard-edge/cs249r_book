title: 'Hailo-8 Deployment: Model Memory Footprint & Throughput'
scenario: You are deploying a 15 million parameter INT8 object detection CNN on an AI processor. The model requires 20 GOPS for a single inference.
question: How much INT8 parameter memory does the 15M-parameter model need, what is its theoretical Hailo-8 throughput at 20 GOPS, and what do these imply?
details:
  realistic_solution: 'The model footprint fits comfortably into host memory, but actual inference throughput will be heavily bottlenecked by PCIe transfer latency and LPDDR memory bandwidth, completely neutralizing the 1300 FPS theoretical compute ceiling.'
  common_mistake: |
    **The Pitfall:** Only considering model parameter size for memory and theoretical peak TOPS for throughput.
    **The Rationale:** Candidates overlook peak activation memory, host OS overhead, and bandwidth limitations inherent in dataflow architectures.
    **The Consequence:** The deployed model either crashes with Out-Of-Memory (OOM) errors or drastically misses real-world throughput targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 15M parameters (INT8).
    - Compute required: 20 GOPS/inference.
    - Hardware: Hailo-8 (26 TOPS = 26,000 GOPS).

    **Calculations:**
    - Parameter Memory = 15,000,000 * 1 byte = 15 MB (or 14.3 MiB).
    - Theoretical Max Throughput = 26,000 GOPS / 20 GOPS/inference = 1300 inferences/second.

    **Conclusion & Interpretation:**
    - **Result: 14.3 MiB parameter footprint and 1300 FPS theoretical throughput (Memory-Bound)**. Reality will be memory-bandwidth bound.
