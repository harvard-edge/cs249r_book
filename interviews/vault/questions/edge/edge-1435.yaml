title: Hailo-8 CI/CD Pipeline Bandwidth Bottleneck
scenario: You are investigating a performance anomaly for a model deployed on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The hardware-in-the-loop pipeline reports that while the accelerator's compute utilization is under 2%, the system is capped at 50 frames per second. The model processes 4MB uncompressed input frames per inference.
question: Why does the Hailo-8 stay under 2% compute utilization yet cap at 50 FPS on 4MB input frames?
details:
  realistic_solution: The MLOps pipeline accurately reflects a deeply memory-bound system where the Hailo-8 dataflow accelerator is starving for data. Because there is no local DRAM to cache inputs or intermediate tensors, every single inference requires streaming 4MB across the host interface. The bottleneck is the host memory or PCIe bandwidth, not the accelerator's compute. To resolve this, preprocessing steps like resizing should run on the host CPU to reduce the payload size before streaming to the Hailo-8.
  common_mistake: |
    **The Pitfall:** Assuming poor INT8 quantization or inefficient model compilation is to blame.
    **The Rationale:** Fixating on the 26 TOPS compute spec and ignoring the explicit "no local DRAM" hardware constraint.
    **The Consequence:** Wasting engineering cycles optimizing math kernels instead of addressing the massive host-to-device streaming I/O bottleneck.
  napkin_math: |
    * **Compute Capacity**: 26 TOPS = 26,000 GOPS.
    * **Theoretical FPS limit**: Assuming an 8 GOPS model, 26,000 / 8 = 3,250 FPS.
    * **Observed Compute Utilization**: 50 FPS × 8 GOPS = 400 GOPS (400 / 26,000 = ~1.5%).
    * **Memory Bandwidth Required**: 50 FPS × 4 MB/frame = 200 MB/s.
    * **Conclusion**: The host connection (e.g., PCIe Gen2 x1 or USB 3.0) is maxing out at **~200 MB/s**, entirely starving the compute units.
