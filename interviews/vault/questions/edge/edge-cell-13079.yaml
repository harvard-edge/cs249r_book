title: 'Edge Systolic Array Fluency: Roofline Model Mental Math for Jetson'
scenario: 'Quickly estimate from memory whether these Jetson Orin (275 TOPS INT8, 102.4GB/s LPDDR5) operations
  are memory or compute bound, and give the limiting throughput: (1) MatMul (512, 512) x (512, 512) INT8,
  batch=1, (2) EfficientNet-B7 (37G FLOPs, 66M params INT8) at batch=8, (3) Dot product of two 1M-element
  INT8 vectors.'
question: "For the three Jetson Orin operations, are they memory or compute bound and what limiting throughput or latency do you estimate?"
details:
  realistic_solution: 'Jetson Orin ridge: 275T/102.4G = 2686 FLOPs/byte. (1) GEMM 512^3: AI = 512^3*2
    / (3*512^2*1) = 2*512/3 = 341 FLOPs/byte. AI=341 < 2686 → memory bound. Time = 3*512^2*1 / 102.4G
    = 786K/102.4G = 7.7μs. Throughput = 1/7.7μs = 130K mat/s. (2) EfficientNet-B7 batch=8: FLOPs=37G*8=296G.
    Bytes=weights(66MB)+activations(~50MB)=116MB. AI=296G/116M=2551. Close to ridge but slightly memory
    bound. Time = 116MB/102.4GB/s = 1.13ms for 8 images = 141μs/img. (3) Dot product 1M INT8: FLOPs=2M.
    Bytes=2*1M=2MB. AI=2M/2M=1 FLOPs/byte. Heavily memory bound. Time=2MB/102.4GB/s=19.5μs.'
  common_mistake: Not memorizing that for GEMM the arithmetic intensity scales as N/3 for square NxN matrices,
    enabling instant classification without full calculation.
  napkin_math: '(1) AI=341, memory bound, time=7.7μs. (2) AI=2551, memory bound, time=1.13ms/8 images=141μs/img.
    (3) AI=1.0, memory bound, time=19.5μs. Rule: GEMM NxN ridge crossover at N = 3*ridge/2 = 3*2686/2
    = 4029. So (1) with N=512 << 4029 is memory bound. (2) Effectively at ridge. (3) Always memory bound.
    Memorize: anything element-wise is memory bound. MatMul < NxN~4000 is memory bound on Jetson. Hailo-8:
    ridge = 26T/6G = 4333. Memory bound crossover N = 3*4333/2 = 6500.'
