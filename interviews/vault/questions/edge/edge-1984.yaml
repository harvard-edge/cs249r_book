title: Optimizing Conv Layer Memory on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing the inference pipeline for a large vision model on a Qualcomm Cloud AI 100. The model contains a critical sequence of two 3x3 INT8 convolutional layers: Conv_A (output 1024x1024x32) followed by Conv_B (output 1024x1024x64). All activations are INT8 (1 byte). Your goal is to minimize peak intermediate memory.
question: What peak intermediate memory is required under sequential execution versus ideal layer fusion for the two convolutions?
details:
  realistic_solution: Sequential Execution writes the full tensors to memory. Conv_A output is 32 MB, Conv_B is 64 MB. The peak memory is the larger of these two. Ideal Layer Fusion streams Conv_A's output directly to Conv_B, meaning the full 32 MB tensor is never materialized. For the simplified streaming model, we consider the largest single output row buffer. Conv_A's output row is 32 KB. Conv_B's output row is 64 KB.
  common_mistake: |
    **The Pitfall:** Still accounting for full tensor materialization during fusion.
    **The Rationale:** Candidates don't understand that streaming intermediate outputs row-by-row prevents the 32 MB tensor from ever being materialized in memory.
    **The Consequence:** Completely underestimating the massive memory reduction achieved by layer fusion, leading to poor pipeline scheduling decisions.
  napkin_math: |
    - **Conv_A output tensor size:** 1024 * 1024 * 32 * 1 byte = 32 MB.
    - **Conv_B output tensor size:** 1024 * 1024 * 64 * 1 byte = 64 MB.
    - **Sequential Peak Memory:** max(32 MB, 64 MB) = 64 MB.
    - **Ideal Layer Fusion (Row buffer):** Conv_A row = 1024 * 32 bytes = 32 KB. Conv_B row = 1024 * 64 bytes = 64 KB.
    - **Fusion Peak Memory:** max(32 KB, 64 KB) = 64 KB.
    - **Final result:** **Sequential takes 64 MB; Ideal Fusion takes 64 KB.**
