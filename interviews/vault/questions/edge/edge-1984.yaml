title: Optimizing Conv Layer Memory on Qualcomm Cloud AI 100
scenario: 'You are optimizing the inference pipeline for a vision model. The model contains a critical sequence of two 3x3 INT8 convolutional layers: Conv_A (output 1024x1024x32) followed by Conv_B (output 1024x1024x64). All activations are INT8 (1 byte). Your goal is to minimize peak intermediate memory.'
question: What peak intermediate memory is required under sequential execution versus ideal layer fusion for the two convolutions?
details:
  realistic_solution: 'Sequential Execution writes full intermediate tensors to memory. Conv_A output is 32 MB, Conv_B is 64 MB, resulting in a 64 MB peak. Ideal Layer Fusion streams Conv_A''s output directly to Conv_B row-by-row, ensuring the 32 MB tensor is never fully materialized. In a streaming model, peak memory is defined by the largest row buffer: Conv_A is 32 KB, Conv_B is 64 KB.'
  common_mistake: |
    **The Pitfall:** Still accounting for full tensor materialization during fusion.
    **The Rationale:** Candidates don't understand that streaming intermediate outputs row-by-row prevents the 32 MB tensor from ever being materialized in memory.
    **The Consequence:** Completely underestimating the massive memory reduction achieved by layer fusion, leading to poor pipeline scheduling decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer A output: 1024x1024x32 (INT8, 1 byte)
       - Layer B output: 1024x1024x64 (INT8, 1 byte)
       - Sequential execution: Full tensor materialization
       - Layer Fusion: Row-wise streaming
    2. **Calculations:**
       - Layer A full tensor: 1024 * 1024 * 32 * 1 byte = 32 MB
       - Layer B full tensor: 1024 * 1024 * 64 * 1 byte = 64 MB
       - Sequential Peak Memory: max(32 MB, 64 MB) = 64 MB
       - Layer A row buffer: 1024 * 32 * 1 byte = 32 KB
       - Layer B row buffer: 1024 * 64 * 1 byte = 64 KB
       - Fusion Peak Memory: max(32 KB, 64 KB) = 64 KB
    3. **Conclusion & Interpretation:**
       - **Result: Memory Optimization.** Layer fusion reduces peak intermediate memory from 64 MB to 64 KB.
