title: 'Edge TCO Analyze: Hailo-8 vs Jetson Orin Cost Per Inference Lifecycle'
scenario: You are analyzing the cost-per-inference over a 3-year deployment for a Hailo-8 (26 TOPS, 2.5W, $200 unit cost, $80 host CPU) versus a Jetson Orin (275 TOPS, 60W, $499 unit cost) running a factory quality inspection model at 50 inferences/second, 24/7.
question: Which platform provides a cheaper per-inference cost when including hardware amortization and power consumption over 3 years?
details:
  realistic_solution: 'Hailo-8 (+ RPi 5 host at $80): total HW=$280. Power: (2.5+5W)=7.5W. Inferences: 50/s * 3yr * 8760*3600 = 50 * 94,608,000 = 4.73B inferences. Hardware cost/inf: $280/4.73B = $0.0000000592. Power cost: 7.5W * 8760hr * 3 * $0.10 = $19.71. Power/inf: $19.71/4.73B = $0.0000000042/inf. Total/inf: $0.0000000634 (63.4 nano-$/inf). Jetson Orin: HW=$499. Power: 60W * 8760*3 = $157.68. Total: $657. Inferences: 4.73B. Cost/inf: $657/4.73B = $138.9 nano-$/inf. Hailo-8 system: 2.19x cheaper per inference.'
  common_mistake: |
    **The Pitfall:** Comparing only raw hardware unit costs.
    **The Rationale:** Candidates forget to include the power consumption over a continuous 24/7, 3-year lifecycle, and often forget that PCIe accelerators like Hailo-8 require a host CPU.
    **The Consequence:** Significantly miscalculating total cost of ownership (TCO) at scale, leading to sub-optimal hardware procurement.
  napkin_math: |
    *   Total inferences: 50 inf/sec * 3 years * 8760 hr/yr * 3600 sec/hr = 4.73 billion inferences.
    *   **Hailo-8 System:** Hardware = $280 ($200 Hailo + $80 RPi host). Power = 7.5W (2.5+5W). Energy cost = 7.5W * 8760hr * 3yr / 1000 * $0.10/kWh = $19.71. Total = $299.71.
    *   Hailo Cost/inf = $299.71 / 4.73e9 = 63.4 nano-dollars/inference.
    *   **Jetson Orin System:** Hardware = $499. Power = 60W. Energy cost = 60W * 8760hr * 3yr / 1000 * $0.10/kWh = $157.68. Total = $656.68.
    *   Orin Cost/inf = $656.68 / 4.73e9 = 138.8 nano-dollars/inference.
    *   **The Hailo-8 system is 2.19x cheaper per inference.**
