title: The Wake-Word ROI Dilemma
scenario: 'You are the ML Systems Engineer for a fleet of 100,000 vehicles. The current
  in-car wake-word model suffers from a high false-accept rate, and the legal team
  has forbidden uploading raw user audio to the cloud for retraining due to privacy
  risks. Your team proposes using Federated Learning (FL). The plan is:'
question: For the 100,000-car wake-word fleet, what is the first-year TCO of the FL
  plan versus the traditional retraining plan?
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership
    (TCO) for the first year for each plan. The FL plan has a capital expense (CapEx)
    and an operating expense (OpEx), while the traditional plan is all CapEx.
  common_mistake: The most common mistake is a unit conversion error, typically confusing
    Kilobytes (KB) and Gigabytes (GB) and arriving at an astronomical data cost. Another
    error is focusing only on the recurring data transfer costs (OpEx) while ignoring
    the significant one-time infrastructure setup cost (CapEx), or vice-versa.
  napkin_math: '1. Participants: 100,000 * 0.10 = 10,000 cars'
  options:
  - The traditional method is cheaper. The FL data transfer costs would exceed $10
    million annually.
  - The costs are roughly comparable, so the traditional method is better as it guarantees
    data quality.
  - The FL approach is cheaper, with a first-year TCO of $50,520.
  - The FL approach is the cheapest option as it only costs $520 for the entire year.
  correct_index: 2
