title: The Wake-Word ROI Dilemma
scenario: You are the ML Systems Engineer for a fleet of 100,000 vehicles. The plan is to use 10% of the fleet (10,000 cars) sending 0.5 MB model updates weekly, with a $50,000 upfront infrastructure cost and $2/GB data transfer cost.
question: For the 100,000-car wake-word fleet, what is the first-year TCO of the FL plan versus the traditional retraining plan?
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for the first year for each plan. The FL plan has a capital expense (CapEx) and an operating expense (OpEx).
  common_mistake: |
    **The Pitfall:** Conflating MB/GB conversions or ignoring CapEx/OpEx entirely.
    **The Rationale:** Candidates rush the math or focus solely on either infrastructure or recurring costs.
    **The Consequence:** Completely inaccurate budgeting for the Federated Learning initiative.
  napkin_math: |
    **Assumptions & Constraints:**
       - FL Participants: 10,000 vehicles (10% of fleet).
       - Update size: 0.5 MB per vehicle, weekly.
       - Fixed CapEx: $50,000.
       - Data Transfer Cost (OpEx): $2.00 per GB.
    **Calculations:**
       - Data per weekly round: 10,000 * 0.5 MB = 5,000 MB (5 GB).
       - Annual data (52 weeks): 5 GB * 52 = 260 GB.
       - Annual OpEx: 260 GB * $2.00/GB = $520.
       - First-Year TCO: $50,000 CapEx + $520 OpEx = $50,520.
    **Conclusion & Interpretation:**
       - **Result: TCO of $50,520**. The first-year TCO combines the high upfront infrastructure CapEx with the highly optimized $520 bandwidth OpEx.
  options:
  - The traditional method is cheaper. The FL data transfer costs would exceed $10 million annually.
  - The costs are roughly comparable, so the traditional method is better as it guarantees data quality.
  - The FL approach is cheaper, with a first-year TCO of $50,520.
  - The FL approach is the cheapest option as it only costs $520 for the entire year.
  correct_index: 2
