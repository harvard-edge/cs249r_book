validation_issues:
- The Napkin Math for 'Plan B (Federated Learning) OpEx' only lists individual components
  but does not show the total monthly or annual cost for data transfer.
- 'The problem statement mentions ''10,000 cars * 0.5 MB/update'' as the data transferred,
  but later in the ''Napkin Math'' section it states ''1. Participants: 100,000 *
  0.10 = 10,000 cars'', then ''2. Data per update: 0.5 MB''. This creates ambiguity
  as to whether 0.5 MB is the *model update size* per participant or total per round.'
