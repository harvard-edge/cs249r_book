title: Architecting Edge TPU INT8 Knowledge Distillation
scenario: 'You are tasked with deploying a state-of-the-art vision model onto a smart security camera equipped with a Google Coral Edge TPU. You have a massive float32 teacher model in the cloud.'
question: 'How would you distill the FP32 teacher into an Edge TPU student that runs entirely in INT8 without CPU fallback?'
details:
  realistic_solution: 'The best approach integrates Quantization-Aware Training (QAT) directly into the distillation process. The student model should be constructed using strictly Edge TPU-compatible operators (e.g., MobileNet-style blocks with ReLU). During training, the float32 teacher generates soft labels, while the student model simulates INT8 quantization in its forward pass to learn quantization-robust weights.'
  common_mistake: |
    **The Pitfall:** Applying post-training quantization (PTQ) after a standard FP32 distillation.
    **The Rationale:** Candidates fail to realize that standard FP32 distillation creates weight distributions that are highly susceptible to severe PTQ degradation.
    **The Consequence:** The model suffers catastrophic accuracy loss, and if incompatible operators were chosen, it falls back to the CPU, ruining latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Target is 4 TOPS (4e12 ops/sec).
    - Target is 30 FPS.
    - Realistic MAC utilization is ~30% due to bandwidth.
    - Power limit is 2W.

    **Calculations:**
    - 30 FPS requires a max budget of 4e12 / 30 = 133.3 GOPs per frame.
    - Attainable compute per frame = 133.3 * 0.30 = ~40 GOPs.

    **Conclusion & Interpretation:**
    - **Result: ~40 GOPs (Compute-Bound)**. The distilled student model must require no more than ~40 GOPs per inference to reliably hit 30 FPS.
