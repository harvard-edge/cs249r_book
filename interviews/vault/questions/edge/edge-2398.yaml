title: INT8 Requantization Fallback
scenario: A Hailo-8 edge accelerator runs an INT8 pipeline. Adding a simple residual connection suddenly causes performance drops and execution fallback to the host CPU.
question: What quantization-related alignment issue causes a residual connection addition to fail or perform poorly on an integer-only accelerator?
details:
  realistic_solution: The two INT8 tensors being added likely have different quantization scales and zero-points. An integer-only accelerator cannot natively add them without a requantization step to align their scales, which may trigger a compiler fallback to the CPU.
  common_mistake: |
    **The Pitfall:** Believing that INT8 addition is always a simple bitwise operation.
    **The Rationale:** Candidates ignore the fact that quantized tensors carry distinct scales and zero-points that must be mathematically aligned before raw integer addition can occur.
    **The Consequence:** The addition fails at compile time, or triggers a massive performance penalty as the NPU falls back to the host CPU for requantization.
  napkin_math: |
    - Dequantized addition: r_3 = r_1 + r_2.
    - Substituted with quantized values: S_3(q_3 - Z_3) = S_1(q_1 - Z_1) + S_2(q_2 - Z_2).
    - Solving for q_3 requires multiplying by (S_1/S_3) and (S_2/S_3).
    **Conclusion: Because S_1 and S_2 are different, the accelerator cannot simply add q_1 + q_2; it must perform a complex requantization step.**
