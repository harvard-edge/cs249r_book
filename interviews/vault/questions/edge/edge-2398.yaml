title: INT8 Requantization Fallback
scenario: A Hailo-8 edge accelerator runs an INT8 pipeline. Adding a simple residual
  connection suddenly causes performance drops and execution fallback to the host
  CPU.
question: What quantization-related alignment issue causes a residual connection addition
  to fail or perform poorly on an integer-only accelerator?
details:
  realistic_solution: The two INT8 tensors being added likely have different quantization
    scales and zero-points. An integer-only accelerator cannot natively add them without
    a requantization step to align their scales, which may trigger a compiler fallback
    to the CPU.
  common_mistake: Believing that INT8 addition is always a simple bitwise operation
    regardless of the quantization parameters and zero-points.
  napkin_math: S_1(q_1 - Z_1) + S_2(q_2 - Z_2)
