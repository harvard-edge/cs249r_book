title: SRAM Tiling Strategy for High-Resolution Vision
scenario: You are designing a custom convolution pipeline for a Hailo-8 accelerator utilizing its 8MB on-chip SRAM.
question: "Propose a tiling strategy to compute an INT8 1024x1024x32 feature map convolution with 3x3 kernels without spilling intermediate activations to off-chip DRAM."
details:
  realistic_solution: Calculate the SRAM needed per tile. An INT8 feature map of Hx1024x32 requires H*32KB. We need space for input, weights, output buffers, and halo/padding overlap for the 3x3 kernel. By slicing the 1024x1024 image into horizontal strips (e.g., H=64), a single strip takes ~2MB. This easily fits into the 8MB SRAM, allowing the pipeline to stream strips from the sensor directly into SRAM.
  common_mistake: |
    **The Pitfall:** Failing to account for the halo (overlapping rows) required when tiling convolutions.
    **The Rationale:** Candidates calculate purely based on output tile volume without considering the receptive field requirements (ghost zones) of the 3x3 kernel at tile boundaries.
    **The Consequence:** The SRAM overflows, causing silent pipeline stalls or forcing slow off-chip DRAM spills.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Feature map: 1024x1024x32 (INT8 = 1 byte/element).
       - SRAM: 8 MB.
       - Tile strategy: Horizontal strips (H=64).
    2. **Calculations:**
       - Input strip size: 64 * 1024 * 32 bytes = 2,097,152 bytes = 2 MB.
       - Halo overlap for 3x3 kernel: 2 extra rows = 2 * 1024 * 32 = 64 KB.
       - Total strip requirement = ~2.06 MB.
    3. **Conclusion & Interpretation:**
       - **Result: ~2.06 MB per strip** (SRAM Capacity-Bound, perfectly fits 8 MB).
