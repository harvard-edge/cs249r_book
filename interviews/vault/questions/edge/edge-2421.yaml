title: SRAM Tiling Strategy for High-Resolution Vision
scenario: You are designing a custom convolution pipeline for a Hailo-8 accelerator
  (26 TOPS, 2.5W) utilizing its 8MB on-chip SRAM.
question: Propose a tiling strategy to compute an INT8 1024x1024x32 feature map convolution
  with 3x3 kernels without spilling intermediate activations to off-chip DRAM.
details:
  realistic_solution: Calculate the SRAM needed per tile. An INT8 feature map of Hx1024x32
    requires H*32KB. We need space for input, weights, output buffers, and halo/padding
    overlap for the 3x3 kernel. By slicing the 1024x1024 image into horizontal strips
    (e.g., H=64), a single strip takes ~2MB. This easily fits into the 8MB SRAM, allowing
    the pipeline to stream strips from the sensor directly into SRAM.
  common_mistake: Failing to account for the halo (overlapping rows) required when
    tiling convolutions.
  napkin_math: 64 * 1024 * 32 = 2MB
