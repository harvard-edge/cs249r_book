title: Architecting Sequence Models for Hailo-8 Dataflow
scenario: Your team is deploying a real-time sequence prediction model on an edge sensor powered by a
  Hailo-8 dataflow accelerator. The Hailo-8 provides an impressive 26 TOPS of INT8 compute at just 2.5W,
  but it possesses no local DRAM, meaning all model weights and KV caches must stream from the host processor's
  memory over PCIe. You need to design the system architecture and evaluate the tradeoffs between using
  an encoder-only, decoder-only, or hybrid encoder-decoder approach to maximize throughput under these
  strict memory movement constraints.
question: "Which sequence model architecture—encoder-only, decoder-only, or hybrid—best fits a host-streamed Hailo-8, and why?"
details:
  realistic_solution: The optimal design leverages an extremely heavy encoder coupled with either a non-autoregressive
    head or a very lightweight decoder. An encoder-only or heavy-encoder system processes the entire input
    sequence in a single pass, meaning the model weights are streamed from the host exactly once. This
    maximizes the dataflow accelerator's utilization and minimizes the severe latency penalty of streaming
    parameters over the host bus.
  common_mistake: Candidates typically focus entirely on the 26 TOPS compute metric and propose a standard
    decoder-only architecture like a small LLM. They fail to recognize that autoregressive decoding on
    a chip with no local DRAM requires streaming the entire model's weights from the host for every single
    generated token, completely bottlenecking the dataflow accelerator.
  napkin_math: Assume a 100M parameter model (100MB in INT8) and a host memory bandwidth of 33.3 GB/s
    (100MB takes 3ms to stream). Compute for 100 tokens is ~20 GOPS; at 26 TOPS, compute takes <1ms. The
    system is entirely memory-bound. A decoder-only model generating 50 tokens must stream the 100MB model
    50 times (50 * 3ms = 150ms). An asymmetric encoder-decoder (90M encoder, 10M decoder) streams the
    encoder once (2.7ms) and the decoder 50 times (50 * 0.3ms = 15ms), reducing total latency from 150ms
    to ~17.7ms.
