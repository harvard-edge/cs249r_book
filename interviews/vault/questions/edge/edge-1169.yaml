title: 'Edge TCO Optimization: Optimize Connectivity Costs Dominating TCO'
scenario: An edge fleet of 1000 Jetson Orin units has connectivity costs dominating TCO at $15/unit/month (4G with full camera stream). Inference cost is only $3/unit/month.
question: How would you cut the 1000-unit fleet's 4G connectivity cost by at least 90%, and what are the 5-year savings and payback?
details:
  realistic_solution: 'Current: $15 connectivity + $3 compute = $18/unit/month. Optimization: run inference on Jetson, transmit only detection results and alert thumbnails. Assuming 100 events/day: 10KB/day vs current camera stream (500MB/day). New connectivity: $0.50/unit/month (LoRa/NB-IoT). Savings: $14.5K/month = $870K/5yr. Development cost: $100K (3 months, 2 engineers). Net 5yr: $770K. Payback: 7 months.'
  common_mistake: |
    **The Pitfall:** Proposing data reduction without accounting for the development cost of shifting logic to the edge.
    **The Rationale:** Candidates ignore the engineering capital required to redesign the embedded application.
    **The Consequence:** ROI estimates are overly optimistic, leading to budget overruns.
  napkin_math: |
    - Current 5yr TCO: ($15 + $3) * 1000 * 60 months = $1.08M.
    - Optimized connectivity: $0.50/unit/month.
    - Optimized 5yr TCO: ($0.50 + $3) * 1000 * 60 = $210K.
    - Gross savings: $1.08M - $210K = $870K.
    - Development cost: $100K.
    - Net savings: $870K - $100K = **$770K**.
    - Payback period: $100K / ($870K / 60) = **6.9 months**.
