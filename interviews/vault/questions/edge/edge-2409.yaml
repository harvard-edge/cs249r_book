title: Industrial Camera LPDDR5 DMA Tax
scenario: An industrial inspection system uses an AGX Orin (204.8 GB/s bandwidth).
  The camera generates uncompressed grayscale images via DMA at 10 Gbps. The GPU also
  reads model weights at 30 GB/s and KV-cache-style activation buffers at 15 GB/s
  on the same shared LPDDR5 bus, all simultaneously with the camera DMA writes.
question: Analyze concurrent bus contention by computing aggregate LPDDR5 utilization
  from camera DMA writes + model weight reads + activation reads. Determine whether
  any of the three streams will be bandwidth-starved by the others.
details:
  realistic_solution: 'Camera DMA: 10 Gbps / 8 = 1.25 GB/s. Model weights: 30 GB/s.
    Activations: 15 GB/s. Total = 46.25 GB/s. Effective LPDDR5 sustained at ~65% of
    theoretical = 133 GB/s. Aggregate utilization = 46.25 / 133 = 35%. Camera DMA
    is only 0.61% of theoretical peak but 1.25 / 133 = 0.94% of effective - well below
    contention. The dominant load is model weights at 23% of effective BW. None of
    the streams are starved at this load profile, but adding a second GPU inference
    pipeline would push aggregate to ~70 GB/s and start to shift the binding constraint.'
  common_mistake: Computing only the camera DMA share without checking aggregate bus
    utilization including the GPU-side weight and activation reads.
  napkin_math: 1.25 + 30 + 15 = 46.25 GB/s aggregate; effective BW ~133 GB/s; util
    = 35%; camera DMA contributes <1% of effective.
