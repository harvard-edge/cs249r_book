title: Industrial Camera LPDDR5 DMA Tax
scenario: An industrial inspection system uses an AGX Orin (204.8 GB/s bandwidth).
  The camera generates uncompressed grayscale images via DMA at 10 Gigabits per second.
question: Analyze the impact of DMA ingestion and calculate the percentage of total
  LPDDR5 memory bandwidth consumed purely by writes from the camera stream.
details:
  realistic_solution: 'Convert the network rate to bytes: 10 Gigabits per second /
    8 = 1.25 Gigabytes per second. DMA writes this to RAM once. The consumed bandwidth
    fraction is 1.25 GB/s / 204.8 GB/s = ~0.61%.'
  common_mistake: Failing to convert Gigabits to Gigabytes, yielding an 8x inflated
    bandwidth usage (4.8%).
  napkin_math: (10 / 8) / 204.8 = 1.25 / 204.8 = 0.0061
