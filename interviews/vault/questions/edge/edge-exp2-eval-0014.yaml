title: Evaluating Cost and Latency Trade-offs on Google Coral Edge TPU
scenario: 'You are designing an object detection pipeline for a fleet of autonomous warehouse robots.
  You are evaluating two deployment options: sending images to a cloud GPU server over 5G or processing
  locally on a Google Coral Edge TPU attached via USB. The Coral Edge TPU provides 4 TOPS at INT8 precision
  and consumes 2W of power, but requires quantizing your FP32 model due to limited operator support. The
  robots operate 24/7 and process 10 frames per second. Compare the system-level tradeoffs between these
  two alternatives in terms of compute cost, power consumption, and latency to determine which is the
  better choice.'
question: "Should the robots use cloud GPU inference over 5G or local Coral Edge TPU inference for 10 FPS 24/7 object detection, and why?"
details:
  realistic_solution: The better choice is the local Coral Edge TPU deployment, provided the model can
    be successfully quantized to INT8 with acceptable accuracy. While cloud GPUs offer higher throughput
    and ease of FP32 deployment, the continuous 5G data transmission for 10 FPS creates unacceptable latency
    variability and recurring bandwidth costs. The Edge TPU's 2W power consumption easily fits within
    a robot's power budget, and its 4 TOPS INT8 compute is more than sufficient for real-time object detection
    at 10 FPS, making it highly cost-effective and reliable.
  common_mistake: Candidates often focus solely on the theoretical TOPS without considering the quantization
    overhead or the limited operator support on the Edge TPU, leading to unexpected performance drops.
    They may also ignore the power budget constraint of the robot itself, heavily favoring cloud deployment
    without calculating the continuous cost of 5G data transmission.
  napkin_math: 'Coral Edge TPU Compute: 4 TOPS (4,000 GOPS). Object detection model (e.g., MobileNet SSD
    INT8): ~2 GOPS/frame. Required compute for 10 FPS = 20 GOPS (0.5% of total capacity). Power Cost:
    2W * 24 hours = 48 Wh/day. Cloud Alternative Data Cost: 10 FPS * 100 KB/frame * 86,400 seconds/day
    = 86.4 GB/day per robot, which is prohibitively expensive and power-intensive for continuous 5G transmission
    compared to local 2W compute.'
