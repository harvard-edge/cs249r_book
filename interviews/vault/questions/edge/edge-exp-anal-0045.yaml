title: Edge TPU Thermal Throttling Analysis
scenario: You are deploying a continuous object detection model on a Google Coral Edge TPU (USB accelerator)
  inside a fanless outdoor enclosure. The Coral is rated for 4 TOPS INT8 peak performance at 2W power
  draw. The USB enclosure has an effective thermal resistance of 30°C/W. In an ambient temperature of
  40°C, the system initially processes 30 frames per second flawlessly. However, after several minutes,
  the frame rate permanently drops to 15 FPS. The Coral's firmware initiates thermal throttling at a junction
  temperature of 90°C. Explain why this performance degradation occurs and calculate the maximum sustained
  power dissipation before throttling kicks in.
question: "Why does the Coral USB accelerator drop from 30 FPS to 15 FPS, and what sustained power avoids throttling at 40°C ambient?"
details:
  realistic_solution: The performance drop is a deliberate safety mechanism. The 2W power consumption
    generates heat that cannot dissipate fast enough through the passive USB casing in a hot 40°C ambient
    environment. Because the junction temperature exceeds the 90°C limit at 2W, the Edge TPU driver automatically
    reduces the clock speed and power draw, which lowers the available TOPS and halves the frame rate.
    This illustrates the critical tradeoff between burst performance (30 FPS) and sustained thermal performance
    (15 FPS) in passively cooled edge devices.
  common_mistake: Candidates often assume that the 4 TOPS at 2W spec represents a sustained, continuous
    operational state regardless of environment. They may fail to calculate the actual junction temperature
    using the provided thermal resistance and ambient temperature, incorrectly attributing the FPS drop
    to software inefficiencies or memory leaks.
  napkin_math: 'Temperature increase at full load: 2W * 30°C/W = 60°C. Junction temperature at full load:
    40°C (ambient) + 60°C = 100°C. Since 100°C > 90°C throttling threshold, the device must throttle.
    Maximum allowable temperature delta: 90°C - 40°C = 50°C. Maximum sustained power without throttling:
    50°C / 30°C/W = 1.66W. Because the workload requires 2W for 30 FPS, it cannot run continuously in
    this enclosure.'
