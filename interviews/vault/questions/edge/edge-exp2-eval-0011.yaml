title: Batching on Google Coral Edge TPU
scenario: 'We are deploying an INT8 object detection model on a Google Coral Edge TPU (4 TOPS, 2W, PCIe
  form factor) for a factory inspection line with 4 cameras running at 30 FPS. You must choose between
  two strategies to minimize 99th percentile latency: Alternative A uses Static Batching with a fixed
  size of 4. Alternative B uses Dynamic Batching with a max size of 4 and a 5ms timeout. The model takes
  8ms to process a batch of 4 on the TPU, and 7ms for a batch of 1 due to PCIe transfer overheads and
  limited operator support. Evaluate these alternatives and determine the better approach.'
details:
  realistic_solution: Alternative A (Static Batching) is superior. Since the Edge TPU requires statically
    sized tensors for compiled INT8 execution due to limited operator support, dynamic batching forces
    padding to size 4 regardless. The 1ms difference between batch 1 and 4 inference times highlights
    that PCIe transfer and invocation overheads dominate the 4 TOPS compute. Waiting for exactly 4 frames
    maximizes utilization while easily meeting the latency budget within the 2W power envelope.
  common_mistake: Candidates often recommend dynamic batching to minimize wait times for early-arriving
    frames. They fail to realize that the Coral Edge TPU compiler requires fixed input tensor shapes,
    meaning dynamic batch sizes would necessitate host-side padding to a fixed size anyway, wasting CPU
    cycles and PCIe bandwidth.
  napkin_math: 'Required throughput: 4 cameras * 30 FPS = 120 FPS (1 frame arriving every 8.3ms on average).
    Static Batch 4 capacity: 1000ms / 8ms * 4 = 500 FPS (handles 120 FPS easily). Latency for Static:
    ~33.3ms to gather 4 frames + 8ms execution = 41.3ms. Dynamic Batch capacity if processing batch 1
    due to 5ms timeouts: 1000ms / 7ms * 1 = 142 FPS. This barely meets the 120 FPS requirement, wastes
    PCIe bandwidth, and host-side zero-padding adds unquantified latency overhead.'
