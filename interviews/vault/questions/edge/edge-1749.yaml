title: Mixed-Precision Perception on Jetson Orin
scenario: You are tasked with deploying a 5-billion parameter multimodal perception model on an NVIDIA Jetson Orin for an autonomous robot. The system must process 4 high-resolution camera streams at 30 frames per second while strictly adhering to the 60W TDP constraint.
question: How would you design a mixed-precision Jetson Orin deployment for the 5B multimodal model to meet 4-camera 30 FPS under 60W?
details:
  realistic_solution: The optimal approach involves profiling the model to isolate precision-sensitive layers, retaining them in FP16 on the Ampere GPU, while aggressively quantizing compute-bound layers (e.g., dense MLPs, CNN feature extractors) to INT8. The standard CNN blocks should be compiled via TensorRT and offloaded to the DLA to maximize power efficiency. Post-training quantization (PTQ) with a diverse calibration dataset should be used initially, with a fallback to Quantization-Aware Training (QAT) if the bounding-box or classification metrics drop unacceptably.
  common_mistake: |
    **The Pitfall:** Uniform conversion of the entire model to INT8 and ignoring the DLA.
    **The Rationale:** Candidates optimize blindly for speed without profiling precision-sensitive attention layers or acknowledging fixed-function accelerators.
    **The Consequence:** Severe accuracy degradation and thermal throttling from over-reliance on the Ampere GPU.
  napkin_math: |
    - FP16 Weight Footprint: 5B params * 2 bytes = 10 GB.
    - INT8 Weight Footprint (80% quantized): (4B * 1 byte) + (1B * 2 bytes) = 6 GB.
    - Throughput Requirement: 4 cameras * 30 FPS = 120 inferences/sec.
    - Assume INT8 Compute Requirement: 2 INT8 TOPS per inference.
    - Total Compute: 120 * 2 = 240 INT8 TOPS.
    - Required Efficiency: 240 TOPS / 60W = 4 TOPS/Watt.
    **Operating at 240 TOPS under 60W requires 4 TOPS/Watt, making DLA offloading mandatory.**
