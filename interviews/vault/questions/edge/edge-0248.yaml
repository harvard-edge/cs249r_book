title: 'The Real-Time Batching Trap: Real-Time Deadlines'
scenario: You are working on the perception system for an autonomous vehicle, which
  runs on a Jetson AGX Orin. The system processes images from a 30 FPS camera, meaning
  you have a hard real-time deadline of 33ms to process each frame. Your current model
  takes 20ms for a single inference (batch size = 1). To improve overall throughput,
  your team suggests using a static batch size of 2. With this change, processing
  the batch of two frames takes a total of 35ms. Explain the effect of this change
  on meeting the per-frame deadline.
question: What happens to per-frame latency if static batch size 2 takes 35ms on a
  30 FPS stream with a 33ms deadline?
details:
  realistic_solution: The system will now miss its 33ms deadline. With static batching,
    the results for all items in the batch are only available after the *entire batch*
    has been processed. Therefore, the latency experienced by the first frame is now
    wait time (33.3ms) + processing time (35ms) = 68.3ms. Even though the amortized
    throughput has increased, the system violates its fundamental real-time constraint.
  common_mistake: Engineers often fall for the 'Amortization Fallacy'. They calculate
    the average processing time per frame (e.g., 35ms / 2 frames = 17.5ms/frame) and
    conclude that since 17.5ms is less than the 33ms deadline, the system is faster.
    This ignores that for hard real-time systems, the absolute latency for the first
    result is what matters, not the amortized average.
  napkin_math: '1. Calculate the per-frame deadline: `1000 ms / 30 FPS = 33.3 ms`.
    2. With static batch size 2, the first frame waits 33.3ms for the second frame
    to arrive. 3. Processing takes 35ms. 4. Total latency for the first frame: 33.3ms
    + 35ms = 68.3ms. This massively misses the 33.3ms deadline.'
  options:
  - The system meets the deadline, because the amortized time per frame is now 17.5ms.
  - The system misses the deadline, because the latency for the first frame is now
    ~68.3ms.
  - The change is an improvement because the overall throughput increases from 50
    FPS to ~57 FPS.
  - It's impossible to tell without knowing the queuing strategy (e.g., M/D/1).
  correct_index: 1
