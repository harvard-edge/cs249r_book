title: 'The Real-Time Batching Trap: Real-Time Deadlines'
scenario: You are working on the perception system for an autonomous vehicle, which runs on a Jetson AGX Orin. The system processes images from a 30 FPS camera, giving a hard real-time deadline of 33ms per frame. Your current model takes 20ms for a single inference (batch size = 1). To improve overall throughput, your team implements a static batch size of 2, which takes 35ms total to process.
question: What happens to per-frame latency if static batch size 2 takes 35ms on a 30 FPS stream with a 33ms deadline?
details:
  realistic_solution: 'The system will now miss its 33ms deadline. With static batching, the results for all items are only available after the entire batch is processed. The latency for the first frame is wait time (33.3ms) + processing time (35ms) = 68.3ms. The system violates its hard real-time constraint.'
  common_mistake: |
    **The Pitfall:** Falling for the "Amortization Fallacy."
    **The Rationale:** Engineers divide batch processing time by frame count (35ms / 2 = 17.5ms/frame) and conclude it easily beats the 33ms deadline.
    **The Consequence:** They ignore that hard real-time systems are gated by absolute end-to-end latency for the *first* frame, causing the perception system to fatally miss control loop deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera Interval: 30 FPS = 33.3 ms per frame
       - Compute Profile: 35 ms total to process Batch=2
       - Constraint: 33 ms strict control-loop deadline
    2. **Calculations:**
       - Batch Synchronization Delay: Frame 1 awaits Frame 2 = 33.3 ms wait
       - Compute Execution: 35 ms logic step
       - Total P99 Pipeline Latency: 33.3 ms + 35 ms = 68.3 ms
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** Despite achieving functionally higher hardware execution utilization, applying batch amortization introduces an insurmountable 68.3 ms structural tail latency, failing automotive safety bounds.
  options:
  - The system meets the deadline, because the amortized time per frame is now 17.5ms.
  - The system misses the deadline, because the latency for the first frame is now ~68.3ms.
  - The change is an improvement because the overall throughput increases from 50 FPS to ~57 FPS.
  - It's impossible to tell without knowing the queuing strategy (e.g., M/D/1).
  correct_index: 1
