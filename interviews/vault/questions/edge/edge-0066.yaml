title: The Thermal Zone Juggle
scenario: 'Your industrial edge box (Jetson AGX Orin, 60W TDP, fan-cooled in a 50°C factory) runs three
  concurrent AI pipelines: defect detection on GPU (25W), predictive maintenance on DLA (8W), and anomaly
  detection on CPU (12W). Total: 45W — well under the 60W TDP. After 20 minutes, the defect detection
  model''s latency doubles. The other two pipelines are unaffected. GPU utilization hasn''t changed. What
  is happening?'
question: "What is happening?"
details:
  realistic_solution: 'Modern SoCs have multiple independent **thermal zones** with separate temperature
    sensors and throttling policies. The Orin has distinct zones for: GPU, CPU, DLA, and DRAM controller.
    The GPU die area is physically adjacent to the CPU cluster. Even though total chip power (45W) is
    under TDP (60W), the GPU''s *local* thermal density matters. The GPU dissipates 25W in ~50 mm² of
    die area = 0.5 W/mm². The CPU adds 12W in an adjacent ~30 mm² = 0.4 W/mm². The combined thermal density
    in that region of the die creates a **hotspot** that exceeds the GPU thermal zone''s throttle threshold
    (typically 95°C junction), even though the DLA zone (on the other side of the die) is cool. In a 50°C
    ambient factory with fan cooling, the thermal resistance from GPU junction to ambient might be 0.8°C/W.
    GPU junction temp = 50°C + (25W × 0.8) = 70°C from GPU alone, but add CPU thermal coupling: +12W ×
    0.3 (cross-coupling factor) = 73.6°C. Over 20 minutes, the heatsink''s thermal mass saturates and
    junction temp climbs to ~97°C → GPU throttles. The fix: (1) move anomaly detection from CPU to DLA
    (physically distant from GPU), reducing the hotspot, (2) implement a **thermal-aware scheduler** that
    monitors per-zone temperatures and migrates workloads before throttling occurs, (3) apply thermal
    paste with lower thermal resistance or add a vapor chamber heatsink.'
  common_mistake: '"Total power is 45W, under the 60W TDP, so thermal shouldn''t be an issue." TDP is
    a whole-chip metric, but thermal throttling happens at the **thermal zone** level, not the chip level.'
  napkin_math: 'GPU thermal zone: 25W GPU. Thermal resistance junction-to-ambient: 0.8°C/W. Self-heating:
    25W × 0.8°C/W = 20°C. CPU cross-coupling: 12W × 0.3°C/W = 3.6°C. Junction temp: 50°C (ambient) + 20°C
    + 3.6°C = 73.6°C (steady-state with ideal heatsink). But heatsink thermal capacitance means it takes
    ~15 min to reach steady state. During transient: junction overshoots to ~97°C before the fan ramps
    up. After workload migration (CPU anomaly detection → DLA): CPU power = 0W in that region, DLA is
    far away. Junction temp: 50 + 20 = 70°C — below throttle threshold. Defect detection latency returns
    to baseline.'
