title: KV Cache Scaling on Qualcomm Cloud AI 100
scenario: You are deploying a 7B parameter LLM for on-premise inference using a Qualcomm Cloud AI 100
  accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model weights are fully quantized to INT8. During
  load testing, the system handles a batch size of 8 with a 4096-token context window flawlessly, but
  consistently throws an Out of Memory (OOM) error when the batch size is increased to 14. The model architecture
  features 32 layers, 32 attention heads, and a head dimension of 128, utilizing FP16 precision for the
  KV cache. Analyze the memory breakdown and explain exactly why this specific configuration exceeds the
  hardware's capacity.
details:
  realistic_solution: The correct approach is to calculate the precise memory footprint of the weights
    and the dynamic KV cache. While the INT8 weights consume a relatively small and static portion of
    memory, the KV cache grows linearly with batch size. By calculating the per-token KV cache size and
    multiplying it by the context length and batch size, it becomes clear that the KV cache alone consumes
    roughly 28 GB at a batch size of 14. Combined with the weights, the total footprint easily exceeds
    the strict 32 GB limit of the accelerator.
  common_mistake: Candidates often focus only on the static weight memory (7GB) and assume the remaining
    25GB is more than enough for inference overhead. They frequently fail to account for how aggressively
    the KV cache scales with both batch size and sequence length, ignoring its dominant role in memory
    consumption during batched generation.
  napkin_math: '1. Weights Memory: 7 billion parameters * 1 byte (INT8) = 7 GB.

    2. KV Cache per token: 2 (Key & Value) * 32 layers * 32 heads * 128 dimensions * 2 bytes (FP16) =
    524,288 bytes (0.5 MB).

    3. KV Cache per sequence: 4096 tokens * 0.5 MB/token = 2,048 MB (2 GB).

    4. Total KV Cache for Batch Size 14: 14 sequences * 2 GB/sequence = 28 GB.

    5. Total Memory Required: 7 GB (Weights) + 28 GB (KV Cache) = 35 GB.

    6. Conclusion: 35 GB > 32 GB capacity of the Qualcomm Cloud AI 100, triggering the OOM error.'
