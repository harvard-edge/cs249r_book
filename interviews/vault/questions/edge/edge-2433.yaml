title: TensorRT INT8 Speedup Bound
scenario: A Jetson AGX Orin accelerates an NLP application via TensorRT. The engineer
  is comparing execution speed between FP16 and INT8.
question: Calculate the theoretical maximum speedup of a purely compute-bound matrix
  multiplication moving from FP16 to INT8.
details:
  realistic_solution: On Nvidia Ampere and Orin architectures, INT8 tensor core throughput
    is exactly double the rate of FP16 tensor core throughput. Therefore, for an algorithm
    completely bounded by compute math rather than memory bandwidth, the maximum theoretical
    speedup is a 2x multiplier in TOPS.
  common_mistake: Claiming a 4x speedup by falsely assuming compute scales proportionally
    with memory size reduction.
  napkin_math: 275 TOPS (INT8) / 137.5 TFLOPS (FP16) = 2x
