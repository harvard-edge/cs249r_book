title: TensorRT INT8 Speedup Bound
scenario: An edge accelerator accelerates an NLP application via TensorRT. The engineer is comparing execution speed between FP16 and INT8.
question: Calculate the theoretical maximum speedup of a purely compute-bound matrix multiplication moving from FP16 to INT8.
details:
  realistic_solution: 'On modern architectures, INT8 tensor core throughput is exactly double the rate of FP16 tensor core throughput. Therefore, for an algorithm completely bounded by compute math rather than memory bandwidth, the maximum theoretical speedup is exactly a 2.0x multiplier in TOPS.'
  common_mistake: |
    **The Pitfall:** Claiming a 4x speedup by assuming compute scales proportionally with precision bit-width reduction from FP32 down to INT8.
    **The Rationale:** Confusing memory savings (which are 4x from FP32 or 2x from FP16) with compute unit physical layout limits.
    **The Consequence:** Promising management unrealistic performance gains, leading to missed throughput targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline compute: 137.5 TFLOPS (FP16).
       - Quantized compute: 275 TOPS (INT8).
       - Purely compute-bound workload.
    2. **Calculations:**
       - Maximum Speedup = 275 TOPS / 137.5 TFLOPS = 2.0x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Speedup**. The theoretical ceiling for pure INT8 math acceleration is exactly 2x over FP16.
