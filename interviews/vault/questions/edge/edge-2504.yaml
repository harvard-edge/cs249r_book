title: 10GbE Pipeline Microbatch Sizing
scenario: A 4-node Jetson AGX Orin cluster over a 10GbE network runs a 4-stage pipeline.
  The network introduces a 1ms serialization and synchronization delay per transfer.
question: Evaluate the minimal microbatch size m needed to keep the pipeline bubble
  overhead strictly below 15%.
details:
  realistic_solution: The GPipe bubble fraction is (p-1)/(m+p-1). For p=4 stages,
    we need 3 / (m+3) < 0.15. Solving this yields m+3 > 20, meaning m must be at least
    18. The 10GbE sync delay acts as an additive constant to stage execution, heavily
    penalizing pipelines with too few microbatches.
  common_mistake: Evaluating the microbatch size purely on compute bounds while ignoring
    that network serialization stalls exacerbate the bubble overhead if m is small.
  napkin_math: 3 / (m+3) = 0.15 => m+3 = 20 => m = 17. Minimum integer m > 17 is 18.
