title: 10GbE Pipeline Microbatch Sizing
scenario: A 4-node Jetson AGX Orin cluster over a 10GbE network runs a 4-stage pipeline. The network introduces a 1ms serialization and synchronization delay per transfer.
question: Evaluate the minimal microbatch size m needed to keep the pipeline bubble overhead strictly below 15%.
details:
  realistic_solution: The GPipe bubble fraction is (p-1)/(m+p-1). For p=4 stages, we need 3 / (m+3) < 0.15. Solving this yields m+3 > 20, meaning m must be at least 18. The 10GbE sync delay acts as an additive constant to stage execution, heavily penalizing pipelines with too few microbatches.
  common_mistake: |
    **The Pitfall:** Evaluating microbatch size purely on compute bounds.
    **The Rationale:** Candidates ignore that network serialization stalls exacerbate the bubble overhead.
    **The Consequence:** Choosing an $m$ that is too small, heavily penalizing the pipeline with latency overhead.
  napkin_math: |
    1. **Assumptions & Constraints:** GPipe pipeline with $p=4$ stages. Target bubble overhead strictly < 15%.
    2. **Calculations:** GPipe bubble fraction = $(p-1)/(m+p-1)$. For $p=4$, we need $3 / (m+3) < 0.15$. Solving yields $m+3 > 20$, which means $m > 17$.
    3. **Conclusion & Interpretation:** **Minimum microbatch size $m = 18$. Network-Bound synchronization overhead mandates large $m$.**
