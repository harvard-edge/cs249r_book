title: 'Designing a Memory-Constrained Training Loop for On-Device Fine-Tuning on Jetson Orin'
scenario: 'A robotics team wants to run on-device continual learning on a Jetson Orin (32 GB LPDDR5, 275 TOPS). They are fine-tuning a 3B parameter vision-language model (ViLT variant) with LoRA adapters using only fp16 mixed precision. The base model (frozen) uses 6 GB; LoRA adapters add 120 MB of trainable parameters.'
question: 'How would you design the LoRA fine-tuning loop on Orin to fit the 3B VLM within 16GB total memory while achieving at least 5 training steps per minute?'
details:
  realistic_solution: 'Apply gradient checkpointing to all frozen base model layers. Only the LoRA adapter layers require stored activations for the weight gradient. This reduces stored activations from 3B-model-full-forward to only the LoRA insertion points.'
  common_mistake: 'Freezing the base model but still storing full activation gradients through all layers during the LoRA backward pass, which rapidly exceeds the 16 GB budget.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 16 GB total. Base model: 6 GB.
    - LoRA weights + optimizer (AdamW fp32): 120 MB * 4 = 480 MB.

    **Calculations:**
    - Activation memory with full checkpointing of frozen prefix: ~150 MB (storing only LoRA inputs and checkpoint boundaries).
    - OS + runtime overhead: ~2 GB.
    - Total memory footprint: 6 GB + 0.48 GB + 0.15 GB + 2 GB = 8.63 GB.
    - Throughput: Orin at 275 TOPS; LoRA backward pass is ~2x TOPS demand of frozen inference. At batch=1, S=512, step time is ~50 ms.

    **Conclusion & Interpretation:**
    - **Result: 8.63 GB Footprint (Memory-Bound)**. Selective checkpointing fits the fine-tuning loop safely in 16 GB and easily exceeds the 5 steps/min target.
