title: CI/CD Validation Latency and Energy on Cloud AI 100
scenario: In your automated CI/CD pipeline, every new quantized model version must be profiled on target
  hardware before promotion to the production registry to ensure training-serving consistency. You are
  targeting an on-premise inference server equipped with a Qualcomm Cloud AI 100 accelerator (400 TOPS
  INT8, 75W TDP). The pipeline runs a golden validation set of 1,000,000 samples to verify performance
  regressions. If your INT8 model requires 500 GOPS per sample, calculate the theoretical minimum time
  this automated CI/CD validation step will take and the total energy consumed by the accelerator.
question: "What are the theoretical minimum validation time and accelerator energy for 1,000,000 samples at 500 GOPS each on a 400 TOPS, 75W AI 100?"
details:
  realistic_solution: The candidate should first convert the platform's compute capacity to the same unit
    as the model requirements to find the theoretical maximum throughput. By dividing the total samples
    by the accelerator's throughput, they find the time required. Finally, multiplying the time by the
    accelerator's TDP gives the total energy consumption for the CI/CD profiling job.
  common_mistake: Candidates often confuse GOPS and TOPS, missing the factor of 1000, or they calculate
    the time correctly but forget to multiply by the 75W TDP to find the total energy consumption in Joules.
    They may also fail to realize the importance of executing this on actual target hardware during the
    CI/CD process.
  napkin_math: "1. Compute capacity: 400 TOPS = 400,000 GOPS. \n2. Max Throughput: 400,000 GOPS / 500\
    \ GOPS/sample = 800 samples/second. \n3. Validation Time: 1,000,000 samples / 800 samples/second =\
    \ 1,250 seconds (approx 20.8 minutes). \n4. Energy Consumption: 1,250 seconds * 75W = 93,750 Joules."
