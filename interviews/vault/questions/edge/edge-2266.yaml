title: Jetson Orin Zero-Copy Camera Pipeline
scenario: A Jetson AGX Orin (204.8 GB/s unified LPDDR5 bandwidth) runs a multi-camera
  tracking system. Four 4K streams (3840x2160, RGB, 30 FPS) are captured by the ISP,
  passed to the CPU for formatting, and then passed to the GPU (TensorRT) for inference.
question: Design a memory pipeline that avoids a bus bottleneck, calculating the LPDDR5
  bandwidth consumed if a naive CPU-to-GPU data copy is used vs a zero-copy pointer
  pass.
visual:
  kind: svg
  path: edge-2266.svg
  alt: Bar chart comparing 12 GB/s memory bandwidth usage in a naive pipeline vs 6
    GB/s with zero-copy.
  caption: Memory Bandwidth Savings (Zero-Copy)
details:
  realistic_solution: 'One 4K stream is 3840 * 2160 * 3 bytes * 30 FPS ≈ 746 MB/s.
    Four streams generate ~3.0 GB/s. A naive pipeline copies data: ISP->RAM (write
    3GB), CPU read (3GB), CPU write (3GB), GPU read (3GB) = 12 GB/s total LPDDR5 bandwidth.
    Using the Orin''s unified memory with a zero-copy pointer strategy bypasses the
    CPU copy entirely. ISP writes to pinned memory (3 GB/s), and GPU reads directly
    from it (3 GB/s), dropping memory bus pressure to just 6 GB/s, saving 6 GB/s of
    bandwidth.'
  common_mistake: Treating the Jetson like a discrete PCIe system and calculating
    PCIe bus transfers instead of utilizing the SoC unified shared memory architecture.
  napkin_math: 'Naive: 3.0 * 4 operations = 12 GB/s. Zero-copy: 3.0 * 2 operations
    (ISP write, GPU read) = 6 GB/s.'
