title: Jetson Orin Zero-Copy Camera Pipeline
scenario: A Jetson AGX Orin runs a multi-camera tracking system. Four 4K streams (3840x2160, RGB, 30 FPS) are captured by the ISP, passed to the CPU for formatting, and then passed to the GPU (TensorRT) for inference.
question: Design a memory pipeline that avoids a bus bottleneck, calculating the LPDDR5 bandwidth consumed if a naive CPU-to-GPU data copy is used vs a zero-copy pointer pass.
visual:
  kind: svg
  path: edge-2266.svg
  alt: Bar chart comparing 12 GB/s memory bandwidth usage in a naive pipeline vs 6 GB/s with zero-copy.
  caption: Memory Bandwidth Savings (Zero-Copy)
details:
  realistic_solution: 'Use the Orin''s unified memory architecture with a zero-copy pointer strategy. Instead of redundant CPU copies, configure the ISP to write directly to pinned shared memory. The GPU then reads directly from these buffers via NVMM (NVIDIA Memory Management) pointers, bypassing CPU space entirely and halving memory bus pressure.'
  common_mistake: |
    **The Pitfall:** Treating the SoC like a discrete PCIe system.
    **The Rationale:** Candidates apply desktop GPU architecture logic, assuming data must explicitly cross a bus from CPU RAM to GPU VRAM.
    **The Consequence:** Implementation of redundant `cudaMemcpy` operations that exhaust memory bandwidth and throttle the entire perception pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 streams at 3840x2160, 3 bytes (RGB), 30 FPS.
    2. **Calculations:**
       - Single stream bandwidth: 3840 * 2160 * 3 * 30 = ~746 MB/s.
       - Four streams generated: 746 MB/s * 4 = 2.98 GB/s (~3.0 GB/s).
       - Naive Pipeline (ISP->RAM, CPU read, CPU write, GPU read): 3.0 * 4 = 12 GB/s.
       - Zero-Copy Pipeline (ISP write, GPU read): 3.0 * 2 = 6 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 50% Bandwidth Reduction**. Leveraging zero-copy saves 6 GB/s of continuous memory bandwidth, preventing saturation of the LPDDR5 fabric.
