title: Exporting a model with custom autograd to TensorRT for Jetson Orin deployment
scenario: You have trained a 50M parameter object detection model on H100 with a custom
  non-maximum suppression (NMS) operation implemented as a torch.autograd.Function.
  You need to deploy it to Jetson AGX Orin (275 TOPS, 64GB, 60W). TensorRT export via
  torch.onnx.export fails because the custom autograd function has no ONNX equivalent.
question: How do you resolve the ONNX export failure for the custom autograd NMS,
  and what is the theoretical compute-bound latency for this 4 GFLOP model on Orin's 275 TOPS engine?
details:
  realistic_solution: 'To resolve the export failure, you must define a custom ONNX
    symbolic function using ` @staticmethod def symbolic(g, ...)` within your 
    `torch.autograd.Function`. The exporter only traces the forward pass, so mapping the custom
    NMS to standard ONNX operators in the symbolic method allows the graph to compile.
    For the compute-bound latency: a 4 GFLOP model on a 275 TOPS engine takes 
    4G / 275T = 0.0145 ms (not 14.5 ms, which incorrectly assumes GOPS instead of TOPS).'
  common_mistake: 'Trying to export the custom autograd function directly to ONNX without
    a symbolic function. Since `torch.autograd.Function.backward()` is not needed at inference
    time, engineers often forget they need to define the ONNX symbolic (forward-only) 
    registration. Another mistake is mixing up TOPS (Tera) and GOPS (Giga) when calculating latency.'
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 4 GFLOPs. Inference time: 4G /
    275T = 4×10^9 / 275×10^12 = 1.455×10^-5 s = 0.0145ms (not 14.5ms — that would
    imply a 275 GOPS engine, 1000× slower than Jetson Orin).'
