title: Zero-Copy Multi-Camera Pipeline
scenario: 'You are designing the vision data pipeline for an autonomous delivery robot utilizing an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). The system must continuously ingest 8 concurrent 4K camera streams at 30 FPS, preprocess the frames, and route the data to both the Ampere GPU and DLA for parallel inference.'
question: How would you build a zero-copy ISP-to-GPU/DLA pipeline for 8 concurrent 4K30 streams on Jetson Orin without starving inference?
details:
  realistic_solution: 'The optimal architecture leverages zero-copy memory and dedicated hardware blocks. Frames should be captured via the ISP directly into NVIDIA Memory Management (NVMM) buffers. Preprocessing (like resizing and format conversion) is offloaded to the Video Image Compositor (VIC) or Programmable Vision Accelerator (PVA). The resulting memory pointers are then passed directly to TensorRT running on the Ampere GPU and DLA, completely bypassing the CPU and minimizing memory transactions.'
  common_mistake: |
    **The Pitfall:** Proposing a standard CPU-based OpenCV ingest pipeline.
    **The Rationale:** Candidates rely on standard server-side paradigms (read via CPU, preprocess, copy to GPU) instead of unified memory zero-copy paradigms.
    **The Consequence:** Unnecessary memory copies consume excessive LPDDR5 bandwidth, starving the 275 TOPS accelerators and blowing past the 60W power budget.
  napkin_math: |
    *   **Raw Ingest:** 3840 x 2160 pixels x 3 bytes x 30 FPS = ~746 MB/s per camera.
    *   **Total Data Rate:** 8 cameras x 746 MB/s = ~6.0 GB/s.
    *   **CPU Pipeline Cost:** A naive CPU pipeline generates 4x memory traffic (read to RAM, read to CPU, write back to RAM, read to GPU) = 24.0 GB/s.
    *   **Result:** **A zero-copy NVMM pipeline reduces pixel traffic to just 1x write and 1x read, saving ~12 GB/s of continuous memory bandwidth.**
