title: Zero-Copy Multi-Camera Pipeline
scenario: You are designing the vision data pipeline for an autonomous delivery robot
  utilizing an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU
  + DLA accelerator). The system must continuously ingest 8 concurrent 4K camera streams
  at 30 FPS, preprocess the frames, and route the data to both the Ampere GPU and
  DLA for parallel inference. Synthesize a hardware-accelerated data pipeline architecture
  from the Image Signal Processor (ISP) to the ML accelerators that prevents data
  starvation while adhering to strict memory bandwidth and power constraints.
question: How would you build a zero-copy ISP-to-GPU/DLA pipeline for 8 concurrent
  4K30 streams on Jetson Orin without starving inference?
details:
  realistic_solution: The optimal architecture leverages zero-copy memory and dedicated
    hardware blocks. Frames should be captured via the ISP directly into NVIDIA Memory
    Management (NVMM) buffers. Preprocessing (like resizing and format conversion)
    is offloaded to the Video Image Compositor (VIC) or Programmable Vision Accelerator
    (PVA). The resulting memory pointers are then passed directly to TensorRT running
    on the Ampere GPU and DLA, completely bypassing the CPU and minimizing memory
    transactions.
  common_mistake: Candidates often propose a standard server-side pipeline where frames
    are read into CPU RAM via OpenCV, preprocessed on the CPU, and then explicitly
    copied to the GPU. On a unified memory architecture like the Orin, this introduces
    redundant memory copies that consume excessive LPDDR5 bandwidth, spike CPU utilization,
    and ultimately starve the 275 TOPS accelerators while draining the 60W power budget.
  napkin_math: Raw ingest per camera is 3840 x 2160 pixels x 3 bytes x 30 FPS = ~746
    MB/s, totaling ~6.0 GB/s for 8 cameras. A naive CPU-based pipeline (write to RAM,
    read to CPU, write preprocessed back to RAM, read to GPU/DLA) generates at least
    4x memory traffic, or 24.0 GB/s just for pixels. While the Orin's 32 GB LPDDR5
    has high bandwidth, keeping the 275 TOPS accelerators fed requires massive memory
    throughput for weights and activations. A zero-copy NVMM pipeline reduces pixel
    memory traffic to just 1x write (ISP) and 1x read (GPU/DLA), saving ~12 GB/s of
    continuous memory bandwidth and reducing power consumption within the 60W TDP.
