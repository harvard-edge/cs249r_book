title: Zero-Copy Multi-Camera Pipeline
scenario: You are designing the vision data pipeline for an autonomous delivery robot utilizing an NVIDIA Jetson Orin. The system must continuously ingest 8 concurrent 4K camera streams at 30 FPS, preprocess the frames, and route the data to both the Ampere GPU and DLA for parallel inference.
question: How would you build a zero-copy ISP-to-GPU/DLA pipeline for 8 concurrent 4K30 streams on Jetson Orin without starving inference?
details:
  realistic_solution: 'The optimal architecture leverages zero-copy memory and dedicated hardware blocks. Frames should be captured via the ISP directly into NVIDIA Memory Management (NVMM) buffers. Preprocessing (like resizing and format conversion) is offloaded to the Video Image Compositor (VIC) or Programmable Vision Accelerator (PVA). The resulting memory pointers are then passed directly to TensorRT running on the Ampere GPU and DLA, completely bypassing the CPU and minimizing memory transactions.'
  common_mistake: |
    **The Pitfall:** Proposing a standard CPU-based OpenCV ingest pipeline.
    **The Rationale:** Candidates rely on standard server-side paradigms (read via CPU, preprocess, copy to GPU) instead of unified memory zero-copy paradigms.
    **The Consequence:** Unnecessary memory copies consume excessive bandwidth, starving the accelerators and blowing past the power budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 3840 x 2160 pixels.
       - Frame Rate: 30 FPS.
       - Cameras: 8 concurrent streams.
       - Pixel format: RGB (3 bytes/pixel).
    2. **Calculations:**
       - Raw Ingest per camera: 3840 * 2160 * 3 bytes * 30 = ~746.5 MB/s.
       - Total Data Rate: 8 * 746.5 MB/s = ~5.97 GB/s.
       - CPU Pipeline Cost: 4x memory traffic (read to RAM, read to CPU, write back to RAM, read to GPU) = 4 * 5.97 GB/s = ~23.88 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** A zero-copy NVMM pipeline reduces pixel traffic to just 1x write and 1x read, saving ~12 GB/s of continuous memory bandwidth compared to a naive CPU pipeline, avoiding LPDDR5 saturation.
