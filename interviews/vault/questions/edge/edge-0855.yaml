title: Shadow Evaluation Latency Budget
scenario: A smart factory edge gateway processes vibration sensor data at 100 Hz (10ms arrival interval). A frozen baseline anomaly detection model takes 6ms to infer on the local NPU, and shared data preprocessing takes 2ms per sample. You deploy a newly adapted model (also 6ms inference) in shadow mode.
question: What is the maximum shadow-model evaluation frequency (1 out of every N samples) without dropping 100Hz sensor packets?
details:
  realistic_solution: 'The shared preprocessing and baseline model consume 8ms per sample, leaving 2ms of idle compute budget per 10ms interval. The shadow model requires an additional 6ms. To prevent queue explosion, amortize the 6ms cost over N samples.'
  common_mistake: |
    **The Pitfall:** Ignoring shared preprocessing or failing to calculate the amortized idle budget.
    **The Rationale:** Candidates assume both models must execute entirely within a single 10ms window, concluding it is impossible.
    **The Consequence:** Missing the opportunity to safely deploy shadow evaluation by amortizing execution over multiple frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival interval: 10ms (100 Hz)
       - Preprocessing: 2ms
       - Baseline model: 6ms
       - Shadow model: 6ms
    2. **Calculations:**
       - Base compute per sample: 2ms + 6ms = 8ms
       - Idle budget per sample: 10ms - 8ms = 2ms
       - Required samples N to amortize shadow: 6ms / 2ms = 3
    3. **Conclusion & Interpretation:**
       - **Result: 1 out of 3 Samples.** The shadow model can execute safely at a max frequency of 33Hz without dropping baseline packets.
