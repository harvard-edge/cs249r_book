title: Shadow Evaluation Latency Budget
scenario: A smart factory edge gateway processes vibration sensor data at 100 Hz (10ms arrival interval). A frozen baseline anomaly detection model takes 6ms to infer on the local NPU, and shared data preprocessing takes 2ms per sample. You deploy a newly adapted model (also 6ms inference) in shadow mode to evaluate performance degradation on live data.
question: What is the maximum shadow-model evaluation frequency (1 out of every N samples) without dropping 100Hz sensor packets?
details:
  realistic_solution: The shared preprocessing (2ms) and baseline model (6ms) consume 8ms per sample, leaving 2ms of idle compute budget per 10ms interval. The shadow model requires an additional 6ms. To prevent the queue from growing indefinitely, the total compute time over N samples must be less than or equal to N * 10ms. Therefore, N * 8ms + 6ms <= N * 10ms, which simplifies to 6ms <= 2ms * N, so N >= 3. The shadow model can be evaluated at most on 1 out of every 3 samples.
  common_mistake: |
    **The Pitfall:** Incorrectly calculating the shadow model frequency by ignoring shared preprocessing or idle budget.
    **The Rationale:** Candidates often forget preprocessing is shared, or assume both models must run entirely within a single 10ms window.
    **The Consequence:** They wrongly conclude the shadow model cannot be run at all, missing the opportunity to amortize cost.
  napkin_math: |
    * Arrival interval: 10ms
    * Base compute per sample: 2ms (preprocessing) + 6ms (baseline) = 8ms
    * Idle budget per sample: 10ms - 8ms = 2ms
    * Shadow model compute cost: 6ms
    * Required samples N to amortize: 6ms / 2ms = 3
    * **Max evaluation frequency: 1 out of every 3 samples.**
