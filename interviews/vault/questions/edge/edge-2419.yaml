title: Analyzing Inter-Process Communication Overheads in Video Pipelines
scenario: A high-speed camera sends uncompressed 4K video over PCIe to a Jetson AGX Orin. The software stack uses a Python `multiprocessing` queue to pass frames from the capture process to PyTorch.
question: How does the Python `multiprocessing` queue impact memory bandwidth and latency for this 4K video pipeline?
details:
  realistic_solution: The Python `multiprocessing` queue uses IPC serialization (Pickle) and memory copying. For a 4K frame (~24 MB), this entails massive CPU overhead and memory bandwidth saturation just to duplicate data. It should be replaced with shared memory or zero-copy GPU tensor passing.
  common_mistake: |
    **The Pitfall:** Blaming the Python GIL for the pipeline bottleneck.
    **The Rationale:** Candidates often assume the GIL limits multiprocessing throughput, ignoring the mechanics of how data actually moves between processes.
    **The Consequence:** Time is wasted trying to optimize Python code execution rather than fixing the underlying IPC memory copy overhead.
  napkin_math: |
    1. 4K frame size = 3840 * 2160 * 3 bytes ≈ 24 MB.
    2. Multiprocessing serialization/deserialization requires at least 2 memory copies per frame.
    3. **24 MB * 2 copies * 60 FPS = 2.88 GB/s wasted on IPC memory bandwidth alone.**
