title: Analyzing Inter-Process Communication Overheads in Video Pipelines
scenario: A high-speed camera sends uncompressed 4K video over PCIe to a Jetson AGX
  Orin. The software stack uses a Python `multiprocessing` queue to pass frames from
  the capture process to PyTorch.
question: Analyze the impact of the Python `multiprocessing` queue on memory bandwidth
  and latency for this 4K video pipeline.
details:
  realistic_solution: The Python `multiprocessing` queue uses IPC serialization (Pickle)
    and memory copying. For a 4K frame (~24 MB), this entails massive CPU overhead
    and memory bandwidth saturation just to duplicate data. It should be replaced
    with shared memory or zero-copy GPU tensor passing.
  common_mistake: Assuming Python's GIL is the issue rather than the IPC memory copy
    overhead.
  napkin_math: 24 MB * 2 copies * 60 FPS = 2.88 GB/s wasted on IPC
