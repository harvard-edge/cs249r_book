title: 'Edge Queueing Theory Fluency: Little''s Law Mental Math for Edge Systems'
scenario: 'Quickly estimate from memory: (1) a Jetson Orin serving 60 FPS object detection
  with 5 frames in queue — what is P99 latency if service time is 10ms? (2) Hailo-8
  at 90% utilization serving 100 inf/s — what is the queue length and mean wait? (3)
  For a pipeline that must complete in 33ms (30 FPS), what is the maximum allowed
  mean service time at ρ=0.7?'
question: What are the P99 latency, Hailo-8 queue length and mean wait, and maximum
  service time for the three quick edge queueing estimates?
details:
  realistic_solution: '(1) L=5 frames in queue (not system). W_queue = L/λ = 5/60
    = 83ms. P99 ≈ 83+10+tail ≈ 150ms (much over 33ms SLO — drop to batch=1 or add
    GPU pipeline stage). (2) Hailo-8, ρ=0.9, λ=100: μ=111 inf/s. M/D/1: Lq = ρ²/(2(1-ρ))
    = 0.81/0.2 = 4.05 requests in queue. Wq = 4.05/100 = 40.5ms. (3) W = Wq + service
    = 33ms. M/D/1: Wq = ρ²/(2μ(1-ρ)). At ρ=0.7: Wq = 0.49/(2μ*0.3) = 0.817/μ. Service
    = 1/μ. Total: 0.817/μ + 1/μ = 1.817/μ = 33ms → μ = 55/s → max service = 18ms.'
  common_mistake: Using M/M/1 P99 formula for deterministic edge inference workloads
    (which are closer to M/D/1) and thus overestimating queue wait by 2x.
  napkin_math: '(1) Wq=83ms, W=93ms, P99≈200ms. (2) Lq=4.05, Wq=40.5ms. (3) μ=1.817/0.033=55/s,
    service=18ms. Rule of thumb: at ρ=0.7, M/D/1 total latency ≈ 1.82x service time.
    At ρ=0.9: 5.4x service time. At ρ=0.5: 1.25x service time. Memorize these multipliers
    for edge system sizing.'
