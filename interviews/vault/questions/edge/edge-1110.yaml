title: 'Edge Queueing Theory Fluency: Little''s Law Mental Math for Edge Systems'
scenario: You need to perform quick queueing theory estimations for three edge systems. (1) A Jetson Orin serving 60 FPS object detection with 5 frames in queue and a 10ms service time. (2) A Hailo-8 at 90% utilization serving 100 inferences/s. (3) A pipeline that must complete in 33ms (30 FPS) with a utilization of ρ=0.7.
question: What are the P99 latency, Hailo-8 queue length and mean wait, and maximum service time for the three quick edge queueing estimates?
details:
  realistic_solution: '(1) L=5 frames in queue (not system). W_queue = L/λ = 5/60 = 83ms. P99 ≈ 83+10+tail ≈ 150ms (much over 33ms SLO — drop to batch=1 or add GPU pipeline stage). (2) Hailo-8, ρ=0.9, λ=100: μ=111 inf/s. M/D/1: Lq = ρ²/(2(1-ρ)) = 0.81/0.2 = 4.05 requests in queue. Wq = 4.05/100 = 40.5ms. (3) W = Wq + service = 33ms. M/D/1: Wq = ρ²/(2μ(1-ρ)). At ρ=0.7: Wq = 0.49/(2μ*0.3) = 0.817/μ. Service = 1/μ. Total: 0.817/μ + 1/μ = 1.817/μ = 33ms → μ = 55/s → max service = 18ms.'
  common_mistake: |
    **The Pitfall:** Using M/M/1 P99 formulas for deterministic edge inference workloads.
    **The Rationale:** Candidates often recall the M/M/1 formulas from standard distributed systems interviews, forgetting that edge inference service times are highly deterministic (M/D/1).
    **The Consequence:** Overestimating the queue wait time by 2x, leading to unnecessary hardware over-provisioning or incorrectly rejecting valid deployment architectures.
  napkin_math: |
    *   **(1) Jetson Orin:** L=5 frames in queue. W_queue = L/λ = 5/60 = 83ms. P99 ≈ 83 + 10 + tail ≈ 100-150ms.
    *   **(2) Hailo-8:** M/D/1 queue. ρ=0.9, λ=100. L_q = ρ² / (2*(1-ρ)) = 0.81 / 0.2 = 4.05 requests in queue. W_q = L_q / λ = 4.05 / 100 = 40.5ms.
    *   **(3) Pipeline:** M/D/1 total latency W = W_q + service = 33ms. W_q = ρ² / (2*μ*(1-ρ)). At ρ=0.7, W_q = 0.49 / (2*μ*0.3) = 0.817/μ. Service = 1/μ. Total = 1.817/μ = 33ms.
    *   **μ = 55/s, which means max service time = 18ms.**
