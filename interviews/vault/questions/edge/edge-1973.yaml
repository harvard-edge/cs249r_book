title: 'Optimizing Edge Inference on Jetson Orin: Kernel Fusion for Memory-Bound Operations'
scenario: 'You are tasked with deploying a real-time vision model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous drone application. The model''s post-processing pipeline consists of several sequential, memory-bound operations, including element-wise additions, ReLU activations, and a custom normalization layer. Currently, each of these operations is implemented as a separate CUDA kernel. You''ve observed that the overall inference latency for this pipeline is higher than acceptable, primarily due to frequent global memory accesses for intermediate results and the overhead associated with launching multiple small kernels. Design a strategy to significantly reduce the inference latency. Compare and contrast two approaches: 1) Continuing with separate CUDA kernels for each operation, and 2) Fusing these sequential memory-bound operations into a single, custom CUDA kernel.'
question: Would you keep the Jetson Orin post-processing ops as separate CUDA kernels or fuse them into one custom kernel, and what latency benefit would you expect?
details:
  realistic_solution: The most effective solution involves implementing a custom CUDA kernel that fuses the sequential memory-bound operations. This 'super-kernel' would take the initial input, perform all necessary element-wise additions, ReLU activations, and the custom normalization layer within a single kernel launch. Intermediate results would be kept in registers or shared memory, drastically reducing global memory traffic and eliminating the overhead of multiple kernel launches. This approach leverages the Jetson Orin's on-chip memory resources efficiently.
  common_mistake: |
    **The Pitfall:** Optimizing individual kernel execution times without considering the cumulative overhead of kernel launches and memory transfers.
    **The Rationale:** Candidates assume that standard CUDA optimization techniques (like maximizing occupancy per kernel) are sufficient.
    **The Consequence:** They ignore the massive latency penalty of redundant global memory reads and writes between small, sequential operations, keeping the pipeline memory-bound.
  napkin_math: |
    * Assume 5 sequential operations. Kernel launch overhead = 5 µs. Global memory access = 1 µs.
    * **Without Fusion (5 kernels):**
      * Launch overhead: 5 × 5 µs = 25 µs.
      * Memory latency (4 intermediate tensors, write+read): 4 × 2 × 1 µs = 8 µs.
      * Total = 33 µs.
    * **With Fusion (1 kernel):**
      * Launch overhead: 1 × 5 µs = 5 µs.
      * Memory latency: 0 µs (kept in registers).
      * Total = 5 µs.
    * **Fusing the operators saves 28 µs per inference, significantly reducing latency.**
