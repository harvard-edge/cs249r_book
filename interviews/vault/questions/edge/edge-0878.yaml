title: 'Smart Home KV Cache Crisis'
scenario: 'A smart home hub runs a local 7B LLM. The system has 8GB unified RAM. The OS requires 2GB, and 4-bit AWQ weights consume 3.5GB, leaving 2.5GB for the KV cache. Product requirements mandate supporting 3 concurrent family members maintaining distinct conversation histories up to 4,000 tokens each. Standard FP16 KV cache causes hard OOM crashes.'
question: 'How would you design the KV cache so three 4000-token conversations fit in the 2.5GB RAM budget without breaking attention quality?'
details:
  realistic_solution: 'The system requires an asymmetrical, group-wise KV cache quantization architecture. LLM attention mechanisms heavily rely on ''Attention Sinks'' (the first few tokens) which absorb massive activation values. The architectural solution is to implement an eviction/quantization router: keep the first 4 tokens and a sliding window of the 128 most recent tokens in FP16. The historical tokens are asynchronously compressed into INT4 using group-wise quantization.'
  common_mistake: |
    **The Pitfall:** Quantizing the entire KV cache to INT4 linearly across all tokens.
    **The Rationale:** Candidates fail to understand how LLM attention works.
    **The Consequence:** Destroying attention mechanisms due to massive outliers in initial 'sink' tokens.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 2.5GB for KV cache.
    - FP16 KV size: 524KB/token.
    - Users: 3 concurrent (4,000 tokens each).

    **Calculations:**
    - FP16 Total: 3 $\times$ 4,000 $\times$ 524KB = 6.3GB (OOM).
    - INT4 KV size: 131KB/token. 4,000 tokens = 524MB/user = 1.57GB for 3 users.
    - FP16 Window: 132 tokens $\times$ 524KB $\times$ 3 users = 207MB.

    **Conclusion & Interpretation:**
    - **Result: 1.78GB (Memory-Bound)**. An asymmetrical INT4 + FP16 sliding window easily fits within the 2.5GB unified RAM budget.
  options:
  - 'The system should use standard INT8 quantization across all tokens.'
  - 'The system requires an asymmetrical, group-wise KV cache quantization architecture.'
  - 'The system should offload the KV cache to the hub''s NVMe SSD storage.'
  - 'Quantizing the entire KV cache to INT4 linearly across all tokens.'
