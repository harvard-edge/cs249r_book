title: Model Weight Format for Edge Deployment
scenario: You're deploying a quantized INT8 model (200 MB) to 10,000 Jetson Orin edge
  devices. Each device downloads model updates over a 50 Mbps cellular link. The current
  format is ONNX (Protocol Buffers). Calculate the download time and propose a format
  that reduces update bandwidth by 80%.
question: How long does a 200 MB ONNX update take over 50 Mbps, and what update format
  would cut bandwidth by at least 80%?
details:
  realistic_solution: 'The key insight: model updates typically change <20% of weights
    (fine-tuning, calibration updates). Instead of sending the full 200 MB, send a
    delta: XOR or diff between the old and new model. Delta encoding: unchanged weights
    produce zeros, which compress extremely well. Steps: (1) compute binary diff between
    old and new model files (bsdiff or similar); (2) compress the diff with Zstd.
    Typical delta size: 200 MB × 20% changed × 0.5 (compression) = 20 MB — a 90% reduction.
    For the format itself, FlatBuffers (used by TFLite) supports mmap and zero-copy
    loading, avoiding the Protobuf deserialization penalty on edge devices. Combine:
    store models in FlatBuffer format, transmit updates as compressed deltas, apply
    delta on-device.'
  common_mistake: Compressing the entire model with gzip before transfer. INT8 weights
    have moderate entropy — gzip achieves ~1.5× compression (200 MB → 133 MB), far
    short of the 80% bandwidth reduction target.
  napkin_math: 'Full ONNX: 200 MB / (50 Mbps / 8) = 200 / 6.25 = 32 seconds per device.
    With gzip: 133 MB / 6.25 = 21 seconds (34% savings, not enough). Delta + Zstd:
    20 MB / 6.25 = 3.2 seconds (90% savings, exceeds 80% target). Fleet bandwidth:
    10K devices × 200 MB = 2 TB total transfer (full) vs 200 GB (delta). At $0.09/GB
    cellular data: $180 vs $18 per update cycle. Monthly savings with weekly updates:
    $648/month.'
