title: Hailo-8 Host Memory Bandwidth Calculation
scenario: We are evaluating a Hailo-8 dataflow accelerator for an edge smart camera. It has no local DRAM and must stream all data from host memory.
question: What host memory bandwidth is needed to keep Hailo-8 at 26 TOPS for a 4 GOPs/frame model streaming 15 MB per frame?
details:
  realistic_solution: 'To find the required bandwidth, first determine the maximum frames per second (FPS) the accelerator can process if fully utilized by dividing the total operations per second by the operations required per frame. Then, multiply the resulting FPS by the data required per frame.'
  common_mistake: |
    **The Pitfall:** Assuming weights can be cached locally on the accelerator.
    **The Rationale:** Candidates default to standard GPU/TPU architectures where weights are loaded once into VRAM.
    **The Consequence:** They drastically underestimate the streaming bandwidth, ignoring that the Hailo-8 explicitly lacks local DRAM and must stream the full 15 MB for every single frame.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute: 26 TOPS (26,000 GOPS)
       - Model: 4 GOPS/frame, 15 MB/frame
       - Memory: No local DRAM, all host-streamed
    2. **Calculations:**
       - Max Accelerator FPS: 26,000 GOPS / 4 GOPS/frame = 6,500 FPS
       - Required Host Bandwidth: 6,500 FPS * 15 MB/frame = 97,500 MB/s = 97.5 GB/s
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** To saturate the 26 TOPS accelerator, the host must physically stream 97.5 GB/s of data, aggressively bottlenecking real-world throughput on standard PCIe interfaces.
