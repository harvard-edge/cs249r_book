title: KV Cache Scaling on Qualcomm Cloud AI 100
scenario: You are deploying a 7B parameter LLM for on-premise inference using a Qualcomm Cloud AI 100 accelerator. The model weights are fully quantized to INT8. During load testing, the system handles a batch size of 8 with a 4096-token context window flawlessly, but consistently throws an Out of Memory (OOM) error when the batch size is increased to 14. The model architecture features 32 layers, 32 attention heads, and a head dimension of 128, utilizing FP16 precision for the KV cache.
question: Why does the 7B INT8 LLM OOM at batch size 14 with a 4096-token context on a 32 GB Cloud AI 100?
details:
  realistic_solution: The correct approach is to calculate the precise memory footprint of the weights and the dynamic KV cache. While the INT8 weights consume a relatively small and static portion of memory, the KV cache grows linearly with batch size. By calculating the per-token KV cache size and multiplying it by the context length and batch size, it becomes clear that the KV cache alone consumes roughly 28 GB at a batch size of 14. Combined with the weights, the total footprint easily exceeds the strict 32 GB limit of the accelerator.
  common_mistake: |
    **The Pitfall:** Focusing only on the static weight memory (7GB) and assuming the remaining 25GB is sufficient for inference overhead.
    **The Rationale:** Candidates fail to account for how aggressively the KV cache scales with both batch size and sequence length during batched generation.
    **The Consequence:** Deploying configurations that inevitably crash with Out of Memory (OOM) errors in production under load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator memory: 32 GB.
    - 7B INT8 weights.
    - KV Cache parameters: 32 layers, 32 heads, 128 dimensions, FP16 (2 bytes).
    - Context: 4096 tokens, Batch Size: 14.

    **Calculations:**
    - Weights memory = 7 GB.
    - KV Cache per token = 2 (K+V) * 32 * 32 * 128 * 2 bytes = 524,288 bytes (0.5 MB).
    - KV Cache per sequence = 4096 * 0.5 MB = 2 GB.
    - Total KV Cache for Batch Size 14 = 14 * 2 GB = 28 GB.
    - Total Memory = 7 GB + 28 GB = 35 GB.

    **Conclusion & Interpretation:**
    - **Result: 35 GB > 32 GB limit, resulting in an OOM error (Memory-Bound).** The KV cache footprint scales linearly and overtakes static weight memory.
