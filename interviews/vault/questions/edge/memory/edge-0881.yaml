title: Paged Attention Fragmentation Stalls
scenario: You deploy a 4-bit quantized 7B LLM on a device with 8GB of unified memory. PagedAttention is enabled to handle concurrent requests from smart home sensors. Page size is set to 512 tokens. Under moderate load (8 concurrent sensors sending short 50-token queries), the system hits OOM, swaps to eMMC, and generation stalls for over 5 seconds.
question: Why does PagedAttention OOM on 8 short 50-token queries with 512-token pages, and what page size would you choose?
details:
  realistic_solution: Execute a memory allocation analysis to identify severe internal fragmentation within the PagedAttention memory manager. When static block sizes drastically exceed average sequence lengths, KV-cache allocations are wasted. Choose a smaller page size based on the observed query-length distribution, such as 16 or 32 tokens for mostly 50-token sensor requests, while validating allocator metadata and throughput overheads. This attacks the OOM without further degrading the model through re-quantization.
  common_mistake: |
    **The Pitfall:** Assuming 8GB of memory is fundamentally insufficient and attempting aggressive re-quantization.
    **The Rationale:** Candidates see an OOM error and immediately jump to shrinking the model weights, ignoring the dynamic memory overhead of the KV cache allocator.
    **The Consequence:** Unnecessary model quality degradation and wasted engineering effort, while the underlying memory fragmentation bug remains active.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM: 8GB (OS+Model leaves ~3GB for KV-cache)
    - Per-token KV size: ~524 KB decimal (~512 KiB).
    - Page size: 512 tokens
    - Workload: 8 concurrent requests of 50 tokens each

    **Calculations:**
    - With 512-token pages, each 50-token request allocates one full page.
    - Allocated KV capacity per request = 512 * 524 KB = 268,288 KB ≈ 268 MB.
    - Allocated KV capacity for 8 requests = 8 * 268 MB ≈ 2.15 GB.
    - Actual KV bytes used = 8 * 50 * 524 KB = 209,600 KB ≈ 210 MB.
    - Internal fragmentation = 2.15 GB allocated capacity - 0.21 GB used ≈ 1.94 GB wasted.
    - With 32-token pages, each request allocates 2 pages = 64 tokens, so capacity is 8 * 64 * 524 KB ≈ 268 MB, with about 58 MB wasted.

    **Conclusion & Interpretation:**
    - **Result: 1.94 GB wasted with 512-token pages (Memory-Capacity Bound)**. The OOM is driven by allocated KV capacity, not actual used KV bytes. For mostly 50-token sensor prompts, choose 32-token pages because the computed allocation drops from ~2.15 GB to ~268 MB while keeping page count modest.
