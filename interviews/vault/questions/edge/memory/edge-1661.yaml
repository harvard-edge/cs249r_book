title: 'Zero-Copy Host Streaming Architecture for Hailo-8 Memory'
scenario: 'You are designing a multi-camera edge gateway utilizing a Hailo-8 M.2 module for real-time perception. Because the Hailo-8 has no local DRAM and relies entirely on streaming data from host memory over PCIe, your system processes four simultaneous 1080p video streams decoded by the host CPU. Despite showing 400MB of free RAM in steady-state, the 2GB host system experiences sporadic OS-level OOM kills after several days of uptime.'
question: 'How would you redesign host memory management to stop sporadic OOM kills while preserving zero-copy Hailo-8 streaming?'
details:
  realistic_solution: 'Architect a unified, pre-allocated ring buffer pool of physically contiguous DMA-coherent memory during system boot. Video decoders write directly into this pre-allocated pool, and the Hailo-8 driver reads from it via zero-copy PCIe DMA. By never allocating or freeing memory during steady-state operation, physical memory fragmentation is permanently eliminated, and host memory pressure is strictly capped.'
  common_mistake: |
    **The Pitfall:** Adding swap space, tweaking Linux OOM killer scores, or using standard OS memory allocators (malloc/new) for each frame.
    **The Rationale:** Candidates fail to recognize that the Hailo-8's lack of local DRAM places immense pressure on physically contiguous host memory for DMA transfers.
    **The Consequence:** Leads to severe memory fragmentation over time rather than an absolute memory leak, ultimately causing system instability and OOM kills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Four 1080p streams: 1920x1080x3 bytes = 6.22MB per raw RGB frame.
    - Depth of 4 input buffers per stream.
    - Output tensors: 2MB per frame.
    - Streaming model weights: ~50MB.

    **Calculations:**
    - Input pool: 4 streams * 4 buffers * 6.22MB = ~100MB.
    - Output pool: 4 streams * 4 buffers * 2MB = 32MB.
    - Total contiguous memory to reserve at boot: 100MB + 32MB + 50MB = 182MB.

    **Conclusion & Interpretation:**
    - **Result: 182MB Contiguous Pool (Memory-Bound)**. Reserving this strict 182MB pool upfront prevents CMA allocation failures and OOM kills over indefinite uptimes.
