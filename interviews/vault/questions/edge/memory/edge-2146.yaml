title: Model Compression Ratio Evaluation for Bandwidth-Limited Edge Deployment
scenario: A retrained 50MB INT8 model must be OTA-deployed monthly to an industrial IoT device over a 10 Mbps 4G LTE connection.
question: Over 10 Mbps LTE, how do full 50MB OTA updates, weight deltas, and LoRA-style incremental updates compare for the deployment?
details:
  realistic_solution: Full updates (50MB) require 40s download windows. Delta compression (7% changed weights, ~1.5x encoding overhead) reduces payloads to ~5.25MB (4.2s), but requires storing the previous model for binary patching. LoRA updates (rank-16 adapters) are most efficient, requiring only ~0.5MB (<0.5s download) with a 200ms on-device merge overhead.
  common_mistake: |
    **The Pitfall:** Broadcasting full model weight updates every cycle.
    **The Rationale:** Failing to recognize that fine-tuned deployments share >90% of weights with their predecessors.
    **The Consequence:** Unnecessary cellular data costs and prolonged update windows risking network interruption.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network: 10 Mbps LTE (1.25 MB/s).
    - Full Model: 50MB. Delta: 7% changes with 1.5x overhead. LoRA: ~0.5MB.

    **Calculations:**
    - Full OTA: 50MB / 1.25 MB/s = 40s.
    - Delta OTA: (50MB * 0.07 * 1.5) = 5.25MB / 1.25 MB/s = 4.2s.
    - LoRA OTA: 0.5MB / 1.25 MB/s = 0.4s.

    **Conclusion & Interpretation:**
    - **Result: 0.4s vs 40s (Network-Bound)**. LoRA reduces OTA payloads by 100x vs full models.
