title: Evaluating Host-Device DMA Strategies for High-Resolution Video Inference
scenario: 'You are deploying a multi-stream 4K video analytics pipeline on an on-premise server equipped with an edge accelerator. You must choose between two data movement architectures: Strategy A utilizes asynchronous DMA transfers to move batches of preprocessed frames into the device memory before inference begins. Strategy B utilizes zero-copy pinned memory, where the accelerator accesses the frames directly from host RAM over the PCIe bus as needed during execution.'
question: Evaluate these alternatives and determine which architecture point maximizes overall system throughput.
details:
  realistic_solution: 'Strategy A is significantly better. The massive compute engine will stall waiting for data fetches over the PCIe link under zero-copy. By using Strategy A, the host uses asynchronous DMA to pipeline transfers into local device memory. The accelerator then reads from local memory (with high bandwidth) during inference, hiding the PCIe transfer time and maximizing compute utilization.'
  common_mistake: |
    **The Pitfall:** Reflexively choosing Strategy B (zero-copy) believing that eliminating a data copy automatically improves system throughput.
    **The Rationale:** Misapplying CPU/Host heuristics without calculating the physical bandwidth limits of PCIe vs local HBM.
    **The Consequence:** The compute units starve for data, capping throughput and neutralizing the value of a high-TOPS accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K RGB Frame: 3840 x 2160 x 3 bytes = 24.8 MB.
    - PCIe Gen4 x8 Link: ~16 GB/s effective.
    - Accelerator inference capability: < 1 ms per frame.

    **Calculations:**
    - Zero-copy transfer time: 24.8 MB / 16,000 MB/s = 1.55 ms.
    - Max Zero-copy FPS: 1000 / 1.55 ms = 645 FPS.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Data Movement**. Zero-copy stalls the fast compute engine, locking throughput to 1.55ms (645 FPS), while DMA streaming unlocks full utilization.
