title: 'Model Size Estimation: Analyze Jetson Orin ResNet-50 INT8 Batch-1 Overhead'
scenario: A team quantizes a 25.6M parameter, 4.1 GFLOP ResNet-50 from FP32 to INT8 for Jetson Orin and expects a 2x speedup, but observes only 1.3x.
question: Why does INT8 quantization of ResNet-50 on Jetson Orin yield only 1.3x speedup instead of 2x, using compute and bandwidth bottleneck analysis?
details:
  realistic_solution: 'The model is operating in a regime dominated by framework overhead, memory movement, and kernel launch times, not raw compute throughput. At batch size 1, theoretical compute time is tiny: about 0.103ms for FP32 at 40 TFLOP/s and 0.015ms for INT8 at 275 TOPS. The observed latencies, 4ms FP32 and about 3.1ms INT8, therefore imply roughly 3-4ms of fixed and memory-related overhead. Because most of the latency is not arithmetic, reducing arithmetic precision only improves 4ms to ~3.1ms, or about 1.3x, instead of 2x.'
  common_mistake: |
    **The Pitfall:** Assuming speedup is directly proportional to data type size reduction.
    **The Rationale:** Focusing solely on theoretical TOPS or memory bandwidth improvements while ignoring Amdahl's Law and fixed system overheads.
    **The Consequence:** Over-promising performance gains to stakeholders and failing to hit latency targets in production for batch-1 edge workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-50: 4.1 GFLOPs.
    - Orin: 40 TFLOPS (FP32), 275 TOPS (INT8).
    - Measured Batch=1 latency: FP32 = 4.0ms, INT8 = 3.1ms.

    **Calculations:**
    - Theoretical FP32 compute: 4.1 GFLOPs / 40,000 GFLOPs/s = 0.0001025s = 0.1025ms.
    - Theoretical INT8 compute: 4.1 GOPs / 275,000 GOPS/s = 0.0000149s = 0.0149ms.
    - FP32 non-compute overhead: 4.0ms - 0.1025ms = 3.90ms.
    - INT8 observed non-compute overhead: 3.1ms - 0.0149ms = 3.09ms.
    - Observed speedup: 4.0ms / 3.1ms = 1.29x, approximately 1.3x.

    **Conclusion & Interpretation:**
    - **Result: 1.3x speedup (Overhead-Bound)**. At batch 1, the 0.015ms INT8 arithmetic time is dwarfed by roughly 3.1ms of launch, framework, and memory overhead, so quantization cannot deliver a 2x latency reduction.
