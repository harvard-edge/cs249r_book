title: 'Model Size Estimation: Analyze Why INT8 Doesn''t Always Halve Edge Inference Time'
scenario: A team quantizes a 25.6M parameter, 4.1 GFLOP ResNet-50 from FP32 to INT8 for Jetson Orin and expects a 2x speedup, but observes only 1.3x.
question: Why does INT8 quantization of ResNet-50 on Jetson Orin yield only 1.3x speedup instead of 2x, using compute and bandwidth bottleneck analysis?
details:
  realistic_solution: The model is operating in a regime dominated by framework overhead and kernel launch times, not raw compute or memory bandwidth. At batch size 1, the theoretical compute time for INT8 is negligible (0.015ms), but fixed framework overhead (e.g., memory allocation, CUDA kernel launches) adds ~3ms. Because the fixed overhead dwarfs the compute time in both FP32 and INT8, the relative speedup is marginal. INT8's true benefits only materialize at larger batch sizes where the compute time exceeds the framework overhead.
  common_mistake: |
    **The Pitfall:** Assuming speedup is directly proportional to data type size reduction.
    **The Rationale:** Focusing solely on theoretical TOPS or memory bandwidth improvements while ignoring Amdahl's Law and fixed system overheads.
    **The Consequence:** Over-promising performance gains to stakeholders and failing to hit latency targets in production for batch-1 edge workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-50: 4.1 GFLOPs.
    - Orin: 40 TFLOPS (FP32), 275 TOPS (INT8).
    - Measured Batch=1 latency: FP32 = 4ms, INT8 = 3ms.

    **Calculations:**
    - Theoretical FP32 Compute: 4.1 GFLOPs / 40 TFLOPS = 0.10 ms.
    - Theoretical INT8 Compute: 4.1 GOPs / 275 TOPS = 0.015 ms.
    - Overhead: FP32 measured (4ms) - compute (0.1ms) = ~3.9 ms.
    - Expected INT8 latency: 3.9ms + 0.015ms = ~3.9ms (Measured ~3ms due to minor memory ops savings).

    **Conclusion & Interpretation:**
    - **Result: 1.3x speedup (Overhead-Bound)**. At batch 1, 3.9ms fixed kernel overhead dominates the 0.015ms INT8 compute time, limiting speedup to 1.3x.
