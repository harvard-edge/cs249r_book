title: LPDDR5 vs On-Chip SRAM Trade-offs on Jetson Orin for Real-Time Inference
scenario: Jetson Orin NX has 32GB LPDDR5 at 68 GB/s and ~4MB L2 cache on the Ampere GPU. A real-time object detection model (YOLOv8-m, 25M params, 79 GFLOPs/image) needs to process 30fps at 1280x1280.
question: For YOLOv8-m at 30fps on Orin NX, what memory access pattern matters and what is the binding constraint?
details:
  realistic_solution: |
    Analyze early vs late layers. The important memory access pattern is early-layer activation spill and reuse: high-resolution feature maps overflow the ~4MB L2 cache and round-trip through LPDDR5. Estimate that spill traffic and compare it with 68 GB/s, then separately compare the 30 FPS compute requirement with Orin NX throughput. The spill traffic is well below the bandwidth ceiling, while 79 GFLOPs/frame at 30 FPS requires 2.37 TFLOPS, so the binding constraint is compute throughput if the model is otherwise optimized.
  common_mistake: |
    **The Pitfall:** Only calculating peak bandwidth without isolating early layer activation spills.
    **The Rationale:** Candidates assume parameters dictate bandwidth, ignoring that early-layer high-res feature maps heavily overflow small L2 caches.
    **The Consequence:** Misidentifying the bottleneck as memory bandwidth when it's actually compute in the dense later layers.
  napkin_math: |
    **Assumptions & Constraints:**
       - Compute required: 79 GFLOPs/frame * 30 FPS = 2.37 TFLOPS.
       - Early layer max activations: 1280*1280*32 = 52 MB.
       - Bandwidth ceiling: 68 GB/s.
    **Calculations:**
       - Weight bandwidth = 25 MB * 30 FPS = 0.75 GB/s.
       - Early activation map = 1280 * 1280 * 32 INT8 values ≈ 52 MB.
       - One spill plus reload = 2 * 52 MB = 104 MB/frame.
       - Worst-case activation spill bandwidth = 104 MB * 30 FPS = 3.12 GB/s.
       - Total dynamic bandwidth = 0.75 + 3.12 = 3.87 GB/s, about 6% of 68 GB/s.
       - Compute demand = 79 GFLOPs/frame * 30 FPS = 2.37 TFLOPS.
    **Conclusion & Interpretation:**
       - **Result: early activation spills matter, but compute is binding.** LPDDR5 bandwidth is not saturated by the estimated spill traffic; the harder requirement is sustaining about 2.37 TFLOPS for 30 FPS.
