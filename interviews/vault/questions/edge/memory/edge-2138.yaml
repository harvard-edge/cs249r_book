title: LPDDR5 vs On-Chip SRAM Trade-offs on Jetson Orin for Real-Time Inference
scenario: Jetson Orin NX has 32GB LPDDR5 at 68 GB/s and ~4MB L2 cache on the Ampere GPU. A real-time object detection model (YOLOv8-m, 25M params, 79 FLOPs/image) needs to process 30fps at 1280x1280.
question: For YOLOv8-m at 30fps on Orin NX, what memory access pattern matters and what is the binding constraint?
details:
  realistic_solution: 'Analyze early vs late layers. High-resolution input passes through early stride-1 layers generating huge activation volumes that cannot fit in the 4MB L2 cache, forcing LPDDR5 spills. Calculate if this activation spill exceeds the 68 GB/s bandwidth. Conclude that despite spills, the system easily absorbs the bandwidth, remaining solidly compute-bound in the later layers.'
  common_mistake: |
    **The Pitfall:** Only calculating peak bandwidth without isolating early layer activation spills.
    **The Rationale:** Candidates assume parameters dictate bandwidth, ignoring that early-layer high-res feature maps heavily overflow small L2 caches.
    **The Consequence:** Misidentifying the bottleneck as memory bandwidth when it's actually compute in the dense later layers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute required: 79 GFLOPs/frame * 30 FPS = 2.37 TFLOPS.
       - Early layer max activations: 1280*1280*32 = 52 MB.
       - Bandwidth ceiling: 68 GB/s.
    2. **Calculations:**
       - Weight bandwidth = 25 MB * 30 FPS = 0.75 GB/s.
       - Worst-case activation spill bandwidth = 52 MB * 30 FPS = 1.56 GB/s.
       - Total dynamic bandwidth = 0.75 + 1.56 = 2.31 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. The 2.31 GB/s requirement is a tiny fraction of the 68 GB/s LPDDR5 limit, confirming the model comfortably hits 30fps without memory starvation.
