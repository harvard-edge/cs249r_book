title: The Data Bottleneck
scenario: You've highly optimized and quantized a neural network to fit entirely within the 4MB on-chip SRAM of an edge microcontroller with a powerful DSP. However, despite the model fitting perfectly and the DSP running at a high clock frequency, its inference latency is still much higher than your theoretical calculations based purely on FLOPs.
question: What is a likely bottleneck, and how would you diagnose it?
details:
  realistic_solution: 'The likely bottleneck is internal memory bandwidth between the DSP and the SRAM. Even if data resides in fast on-chip memory, the rate at which the DSP can access that data might be insufficient for the computational throughput it can achieve. Convolutional layers involve frequent reads of weights and activations; if the internal memory interface cannot feed the DSP ALUs fast enough, the DSP stalls waiting for data.'
  common_mistake: |
    **The Pitfall:** Assuming that if a model fits entirely within SRAM, it must inherently be compute-bound.
    **The Rationale:** Failing to distinguish between memory capacity (size) and memory bandwidth (internal transfer rate).
    **The Consequence:** Wasting time profiling the DSP ALUs or attempting to further compress the model's footprint instead of addressing the internal bus data-movement bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - DSP compute: 2 GMAC/s (e.g., 500MHz, 4 MAC units).
    - Precision: INT8 weights/activations (2 bytes read, 1 byte INT32 write per MAC = 5 bytes total traffic).
    - SRAM bus: 200MHz, 64-bit (8 bytes) width.

    **Calculations:**
    - Required Bandwidth: 2 GMAC/s * 5 bytes/MAC = 10 GB/s.
    - Available SRAM Bandwidth: 200 MHz * 8 bytes = 1.6 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. The internal SRAM bandwidth (1.6 GB/s) is vastly outpaced by the DSP's requirement (10 GB/s), severely stalling the compute units despite the model fitting perfectly on-chip.
