title: The Multi-Model Memory Sharing
scenario: 'Your autonomous vehicle runs four models concurrently: detection (80 MB weights), tracking (30 MB), depth estimation (200 MB), and path planning (50 MB). The total is 360 MB of weights plus ~400 MB of activation buffers. Your edge device has 32 GB DRAM, but after the OS and sensor pipelines, only 4 GB is available for ML workloads.'
question: How do you build a concrete memory budget for the 760 MB ML working set and preserve room for future models?
details:
  realistic_solution: |
    The 760 MB working set fits inside the 4 GB ML budget, so the right answer is disciplined budgeting rather than architecture rewrites. Reserve the 360 MB of weights, provision the measured 400 MB activation peak, and add explicit headroom for runtime workspace, allocator fragmentation, and future model growth. Use a shared memory pool for inference buffers and enforce per-model memory limits so one model cannot silently consume the reserve. If profiling later shows that activation peaks overlap more than expected, then reduce concurrency or lower the rate of the less time-critical model, but the stated numbers do not require backbone sharing or paging tricks.
  common_mistake: |
    **The Pitfall:** Treating the 760 MB estimate as the whole memory plan.
    **The Rationale:** The workload fits in 4 GB, but production systems still need explicit reserves for runtime workspace, allocator fragmentation, telemetry, and future model growth.
    **The Consequence:** The first deployment appears healthy, then later model updates or rare activation peaks consume the unplanned margin and cause OOM failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available ML RAM: 4 GB.
    - Static weights: 360 MB.
    - Measured concurrent activation buffers: 400 MB.
    - Reserve target: at least 50% of budget for future growth and runtime variation.

    **Calculations:**
    - Current measured working set: 360 MB + 400 MB = 760 MB.
    - Add runtime/workspace reserve: ~500 MB.
    - Planned current budget: 760 MB + 500 MB = 1.26 GB.
    - Remaining margin: 4.0 GB - 1.26 GB = 2.74 GB.

    **Conclusion & Interpretation:**
    - **Result: ~1.26 GB planned current budget with ~2.74 GB margin.** The workload fits; the engineering task is enforcing a measured memory budget with pooling, limits, and regression tests.
