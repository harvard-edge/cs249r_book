title: On-Device LoRA Rank Selection Trade-offs
scenario: You are deploying a 7B parameter base LLM on an NVIDIA Jetson AGX Orin for on-device personalized text generation. The base model weights are quantized to INT8, occupying ~7GB. Full parameter fine-tuning is impossible due to memory limits, as Adam optimizer states and activations would exceed 50GB. You propose using Low-Rank Adapters (LoRA) on the attention projections ($W_q$ and $W_v$) for on-device learning.
question: For the 7B INT8 LLM on a 32GB Orin, would you choose LoRA rank r=8 or r=64 for W_q and W_v, and why?
details:
  realistic_solution: Choose r=8 for edge personalization. r=8 adds ~4.2M trainable parameters across 32 layers; counting FP16 adapter weights, FP16 gradients, FP32 master weights, and two FP32 Adam moment buffers is about 67 MB of training state. r=64 is 8x larger, about 33.5M trainable parameters and 537 MB of comparable training state. Both fit within the 32GB Orin memory budget alongside the 7GB INT8 base, so the decision is not that r=64 is memory-prohibitive. r=8 is the better edge tradeoff because it reduces backward-pass memory traffic, energy, and latency, and is less likely to overfit sparse local data.
  common_mistake: |
    **The Pitfall:** Treating LoRA rank selection as only a capacity question.
    **The Rationale:** Candidates forget that Adam's two FP32 moment buffers add 8 bytes per trainable parameter, before counting adapter weights, gradients, master weights, activation memory, and bandwidth effects.
    **The Consequence:** Selecting a rank that consumes excessive memory bandwidth during the backward pass and overfits.
  napkin_math: |
    **Assumptions & Constraints:**
       - Base model hidden size d=4096, 32 layers.
       - LoRA applied to W_q and W_v (2 modules per layer).
       - Adam moment buffers only: 8 bytes/parameter (two FP32 moments).
       - Comparable trainable-state estimate: 16 bytes/parameter (FP16 weight + FP16 grad + FP32 master weight + two FP32 moments), excluding activations.
    **Calculations:**
       - r=8 Params per layer = 2 modules * (4096 * 8 + 8 * 4096) = 131,072.
       - r=8 Total params (32 layers) = 131,072 * 32 = 4.19M.
       - r=8 Adam moments = 4.19M * 8 bytes ≈ 33.5 MB; comparable trainable state ≈ 67 MB.
       - r=64 Total params ≈ 33.5M -> Adam moments ≈ 268 MB; comparable trainable state ≈ 537 MB.
    **Conclusion & Interpretation:**
       - **Result: both ranks fit in 32GB, but r=8 is the better edge choice.** The 8x smaller adapter materially reduces backward-pass memory traffic and energy on Orin and is less likely to overfit local personalization data.
