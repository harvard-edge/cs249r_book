title: The Silent eMMC Death
scenario: A fleet of edge cameras logs bounding boxes to local 16 GB eMMCs at 30 FPS. After 14 months, devices fail with read-only filesystems.
question: How does continuous ML inference result logging create a write amplification pattern that kills eMMC faster than generic logging?
details:
  realistic_solution: The eMMC died from Write Amplification caused by high-frequency synchronous output. Writing 30 small JSON payloads per second forces the eMMC controller to perform a read-modify-write cycle on a full NAND page (4 KB) for every 100-byte payload. Fix involves RAM buffering and page-aligned flushing.
  common_mistake: |
    **The Pitfall:** Assuming that because log files are small in bytes, they won't wear out the flash.
    **The Rationale:** Engineers conflate logical application write sizes with the physical page-write constraints of NAND memory hardware.
    **The Consequence:** Devices exhaust their P/E cycles 10x-40x faster than expected, causing catastrophic hardware failures in months.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS, 100 bytes/JSON.
    - NAND page = 4 KB.
    - 16 GB eMMC with 3,000 P/E cycles.
    - Wear leveling pool = 4 GB.

    **Calculations:**
    - Logical write = 30 * 100 B = 3 KB/s.
    - Physical write = 30 * 4 KB = 120 KB/s (WAF = 40).
    - Daily writes = 120 KB/s * 86,400s = 10.3 GB/day.
    - OS metadata boosts to 30 GB/day.
    - Lifespan = (4 GB * 3,000) / 30 GB/day = 400 days.

    **Conclusion & Interpretation:**
    - **Result: ~13.3 months lifespan (IOPS-Endurance-Bound)**. Continuous tiny synchronous writes physically destroy the NAND medium.
