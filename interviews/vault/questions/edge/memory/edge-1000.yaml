title: 'Fluency: Identifying When Gradient Checkpointing Helps vs. Hurts on Constrained Edge Hardware'
scenario: 'A firmware engineer is debugging why enabling gradient checkpointing on a Jetson Orin training job for a 100M parameter ResNet increased training time by 80% instead of the expected 33%. They want to understand under what conditions gradient checkpointing overhead deviates significantly from the theoretical one-extra-forward-pass model.'
question: 'Why might gradient checkpointing on Orin increase ResNet training time by 80% instead of the expected 33%?'
details:
  realistic_solution: 'A common misdiagnosis is to blame memory bandwidth for weight reloading. The actual 80% overhead on a Jetson Orin stems from CPU-bound framework inefficiencies. The PyTorch gradient checkpointing wrapper introduces significant host-device synchronization and kernel launch overhead. Because the Orin has lower single-thread CPU performance compared to desktop CPUs, this framework overhead dominates the step time.'
  common_mistake: 'Assuming the overhead is simply due to memory bandwidth for reloading weights. While the Orin has lower memory bandwidth (68 GB/s), calculating the actual byte transfers shows this only accounts for ~2% overhead. The real mistake is ignoring host-side CPU overhead.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin effective memory bandwidth: 68 GB/s.
    - ResNet model: 100M params, 50 layers. (200 MB in FP16).
    - Forward pass: 50 ms. Backward: 100 ms.

    **Calculations:**
    - Weights per layer: 200 MB / 50 = 4 MB/layer.
    - Layer recompute weight reload: 4 MB / 68 GB/s = 0.059 ms/layer.
    - 50 layers recomputed: 50 * 0.059 = 2.95 ms.
    - Expected overhead from bandwidth: 2.95 ms / 150 ms = ~2%.

    **Conclusion & Interpretation:**
    - **Result: 2% memory overhead (CPU-Bound)**. The 80% regression implies a PyTorch host-device synchronization bottleneck on the weaker mobile CPU.
