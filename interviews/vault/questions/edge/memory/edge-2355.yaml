title: Orin Memory Hierarchy Bandwidth Comparison
scenario: An edge device is deploying an LLM, heavily relying on its unified LPDDR5 memory subsystem to fetch weights.
question: State the theoretical maximum memory bandwidth of the AGX Orin's LPDDR5 and compare its order of magnitude to standard L1 cache bandwidth.
visual:
  kind: svg
  path: edge-2355.svg
  alt: Bar chart comparing L1 Cache, L2 Cache, and LPDDR5 bandwidths.
  caption: AGX Orin typical memory tier bandwidth comparison.
details:
  realistic_solution: The Jetson AGX Orin provides approximately 204.8 GB/s of bandwidth from its LPDDR5 memory. In contrast, on-chip L1 cache bandwidths typically reach multi-TB/s. This strict bandwidth hierarchy dictates that data must be heavily reused from SRAM/L1 to avoid being bottlenecked by the LPDDR5.
  common_mistake: |
    **The Pitfall:** Confusing LPDDR5 unified memory bandwidth with HBM bandwidths.
    **The Rationale:** Candidates map datacenter GPU specs (like H100's TB/s) directly to edge SoC unified memory.
    **The Consequence:** Designing inference pipelines that dramatically overestimate memory bandwidth, leading to severe compute starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin LPDDR5 bandwidth vs Standard L1 cache.
    2. **Calculations:**
       - LPDDR5 Bandwidth: ~204.8 GB/s.
       - L1 Cache Bandwidth: Typically multi-TB/s (e.g., >2,000 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: L1 is ~10x Faster.** The strict bandwidth hierarchy requires heavy data reuse from L1/SRAM to avoid the 200 GB/s LPDDR5 bottleneck.
