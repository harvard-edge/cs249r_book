title: Layer Fusion for Hailo-8 SRAM Savings
scenario: A smart factory camera uses a Hailo-8 accelerator. An industrial defect detection model runs out of on-chip memory and thrashes to external DRAM, spiking power consumption.
question: How would you apply layer fusion to reduce the peak memory footprint of the activation maps during inference?
details:
  realistic_solution: |
    Apply vertical layer fusion (e.g., fusing depthwise convolutions with point-wise layers) to keep intermediate activation maps entirely within the Hailo-8's on-chip SRAM. This bypasses writing high-resolution tensors to external DRAM, slashing memory bandwidth requirements and significantly reducing the thermal envelope.
  common_mistake: |
    **The Pitfall:** Trying to fix DRAM thrashing by pruning weights instead of targeting the massive activation footprint.
    **The Rationale:** Pruning is the most common model compression technique taught, so engineers reach for it first without profiling memory bottlenecks.
    **The Consequence:** Pruning weights does little to reduce intermediate activation map sizes, leaving the DRAM thrashing and power spikes unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 operates with constrained on-chip SRAM.
    - External DRAM access costs >100x more energy than SRAM.
    - A fused producer-consumer layer pair can keep the intermediate activation tensor on chip.

    **Calculations:**
    - Unfused path for one intermediate tensor: write activation to DRAM, then read it back for the next layer = 2 external DRAM transfers.
    - Fused path: pass the same intermediate through SRAM/local buffers, avoiding those 2 external transfers.
    - Avoided transfer energy is approximately 2 * activation_size * DRAM_cost; replacement local-buffer energy is roughly 2 * activation_size * SRAM_cost.
    - Since DRAM_cost / SRAM_cost > 100, the avoided external-transfer energy is >100x more expensive than the local-buffer access it replaces.

    **Conclusion & Interpretation:**
    - **Result: >100x lower energy for the avoided activation transfers (Memory-Bound).** The exact system savings depend on tensor size and fusion coverage, but the direction is clear: keep intermediate activations in SRAM to remove the DRAM thrash.
