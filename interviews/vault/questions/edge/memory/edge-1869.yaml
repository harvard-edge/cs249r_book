title: Optimizing Memory-Mapped Large Model Inference on Qualcomm Cloud AI 100
scenario: Your team is deploying a 70 billion parameter INT8 quantized model for real-time inference on a Qualcomm Cloud AI 100 accelerator. The model's weights significantly exceed the available physical memory.
question: How would you design mmap-based inference for a 70B INT8 model that exceeds Cloud AI 100's 32 GB, while minimizing cold start and sharing weights?
details:
  realistic_solution: 'The optimal architecture leverages a tiered approach: 1) Segment the model: Identify critical/hot layers that ideally reside in memory. 2) Proactive Paging/Prefetching: Use `mmap` with `MADV_WILLNEED` on hot segments during application startup to pre-fault pages and minimize cold start latency. 3) Demand Paging for Cold Segments. 4) Shared Memory: Utilize `MAP_SHARED` when `mmap`ing the weight file to allow multiple inference processes to share the same physical memory pages. 5) Implement a custom weight cache/eviction policy for segments not suitable for standard `mmap`.'
  common_mistake: |
    **The Pitfall:** Naively using `mmap` for the entire model without pre-faulting.
    **The Rationale:** Candidates assume the OS will perfectly handle demand paging for a model larger than physical RAM.
    **The Consequence:** This leads to excessive page faults and thrashing during inference, causing unacceptable cold start latency and missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 70 billion parameters in INT8.
    - Device Memory: 32 GB.
    - NVMe read speed: ~5 GB/s.

    **Calculations:**
    - Weight footprint = 70 GB.
    - Memory Deficit = 70 GB - 32 GB = 38 GB.
    - Initial load time for 32 GB = 32 GB / 5 GB/s = 6.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: 6.4s (I/O Latency Bound).** Without proactive pre-faulting (e.g., `MADV_WILLNEED`), the 6.4s latency is catastrophic for real-time inference.
