title: 'The Brownout Weight Corruption: Memory Hierarchy Design'
scenario: Your Intel Movidius-based industrial inspection system is deployed in a rural factory with unstable power. After a brief brownout (voltage sag to 85V AC for 200ms), the system continues running but starts classifying every part as 'defective' — a 100% false positive rate. A full power cycle fixes it. The model file on eMMC is intact (checksum matches).
question: What happened to the model in RAM?
details:
  realistic_solution: The model file on eMMC is intact, but the copy loaded into volatile DRAM was likely corrupted during the brownout. Edge inference devices load weights into RAM at boot; if the power rails sag far enough, DRAM can experience retention or refresh errors while the system keeps running. A small number of flipped weight bits or corrupted activation buffers can push the classifier into a systematic failure mode such as labeling every part defective. A full power cycle fixes it because the clean model is reloaded from nonvolatile storage into RAM.
  common_mistake: |
    **The Pitfall:** Assuming the brownout corrupted the model file on disk.
    **The Rationale:** The on-disk model checksum is fine, indicating the file is intact. The corruption is actually in volatile memory due to voltage droop.
    **The Consequence:** Wasting time trying to fix or re-flash non-volatile storage while ignoring the actual power supply and DRAM vulnerability.
  napkin_math: |
    **Assumptions & Constraints:**
    - The eMMC checksum matches, so persistent storage is not the failed copy.
    - The model weights are loaded from eMMC into volatile DRAM for inference.
    - A 200ms brownout can leave the processor running while DRAM reliability is temporarily compromised.

    **Calculations:**
    - Because the file checksum is clean after the event, corruption before or inside eMMC is unlikely.
    - Because a full reboot restores correct behavior without reflashing, the failure state must be in volatile state: DRAM-resident weights, activation buffers, or runtime metadata.
    - Neural networks can be highly sensitive to bit errors in scale factors, biases, final-layer weights, or tensor metadata, so even a small amount of RAM corruption can cause a large classification shift.

    **Conclusion & Interpretation:**
    - **Result: volatile RAM corruption, not disk corruption.** The brownout likely damaged the in-memory model state while the nonvolatile model file remained intact.
