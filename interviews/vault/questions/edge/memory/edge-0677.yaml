title: 'The Brownout Weight Corruption: Memory Hierarchy Design'
scenario: Your Intel Movidius-based industrial inspection system is deployed in a rural factory with unstable power. After a brief brownout (voltage sag to 85V AC for 200ms), the system continues running but starts classifying every part as 'defective' — a 100% false positive rate. A full power cycle fixes it. The model file on eMMC is intact (checksum matches).
question: What happened to the model in RAM?
details:
  realistic_solution: The Movidius VPU loads model weights from eMMC into LPDDR4 DRAM at boot. During the 200ms brownout, the AC input drops to 85V. The power supply unit (PSU) has bulk capacitors that maintain the 5V rail for ~100ms, but the voltage droops to 4.6V before the AC recovers. The 1.1V LPDDR4 supply (derived from the 5V rail via a buck converter) droops to ~1.0V. LPDDR4 requires a minimum of 1.06V for reliable operation (JEDEC spec). At 1.0V, DRAM cells with the weakest retention (those storing '1' with the least charge) flip to '0'. This corrupts a small fraction of bits — perhaps 0.001% of the 50 MB model weights, or ~500 bytes.
  common_mistake: '"The brownout corrupted the model file on disk." But the checksum is fine — the on-disk model is intact. The corruption is in volatile memory.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Voltage drop: LPDDR4 voltage droops from 1.1V to 1.0V (below 1.06V JEDEC minimum).
    - Bit flip rate at 1.0V: ~0.001% of cells.
    - Model size: 50 MB (400M bits).

    **Calculations:**
    - Corrupted bits = 400,000,000 * 0.00001 = 4,000 bits.
    - Weight CRC32 check time = 0.25ms per 1 MB block.
    - Full model verification time = 50 * 0.25ms = 12.5ms.

    **Conclusion & Interpretation:**
    - **Result: 4,000 bits corrupted (Hardware-Bound)**. The brownout corrupted the in-memory weights, causing the failure despite the on-disk model remaining intact.
