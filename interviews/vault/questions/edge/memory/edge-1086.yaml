title: 'Model Size Estimation: Compare Memory Footprint: Full Model vs. Quantized on Jetson Orin'
scenario: 'Evaluate the LPDDR5 memory footprint on Jetson Orin for a YOLOv8-l model (43.7M params) in
  three precisions: FP32, FP16, and INT8 TensorRT. Include weights, input tensor (640x640x3 at FP32),
  and output tensor (84x8400).'
question: How much memory does YOLOv8-l use on Jetson Orin in FP32, FP16, and INT8 TensorRT, and how many
  concurrent instances fit?
details:
  realistic_solution: 'Weights: FP32: 43.7M×4B=174.8MB. FP16: 87.4MB. INT8: 43.7MB. TensorRT: ×1.3. Input:
    640×640×3×4B=4.9MB (kept FP32 for camera pipeline). Output: 84×8400×4B=2.8MB. Activation peak (FP32):
    ~200MB. Total FP32: 174.8+200+4.9+2.8=382.5MB. FP16: 87.4+100+4.9+2.8=195.1MB. INT8 TRT: 56.8+50+4.9+2.8=114.5MB.
    All fit in 32GB. Max concurrent instances: 32000MB/114.5MB = 279 INT8 instances (but compute bottleneck
    applies first).'
  common_mistake: '**The Pitfall:** Reporting only weight memory without output/input tensor sizes.

    **The Rationale:** Candidates focus purely on parameter counts and forget that activations and dense
    detection heads consume significant memory.

    **The Consequence:** Underestimating the true runtime memory footprint, leading to OOM issues when
    scaling concurrent streams.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - YOLOv8-l params: 43.7M\n   - Input tensor: 640x640x3\
    \ (FP32)\n   - Output tensor: 84x8400 (FP32)\n   - Memory bandwidth: 204 GB/s, 32GB total\n2. **Calculations:**\n\
    \   - Weights (FP32) = 43.7M * 4 Bytes = 174.8 MB\n   - Weights (INT8 TRT) = 43.7 MB * 1.3 overhead\
    \ = 56.8 MB\n   - Input (FP32) = 640 * 640 * 3 * 4 Bytes = 4.9 MB\n   - Output (FP32) = 84 * 8400\
    \ * 4 Bytes = 2.8 MB\n   - Total INT8 TRT = 56.8 MB + 50 MB (activations) + 7.7 MB (I/O) = 114.5 MB\n\
    \   - Memory limit instances = 32000 MB / 114.5 MB = 279 instances\n   - Compute limit instances (30fps)\
    \ = 275 TOPS / (165 GFLOPs * 30) = 55 instances\n3. **Conclusion & Interpretation:**\n   - **Result:\
    \ Compute-Bound. The system is compute-bottlenecked at 55 instances (6.3GB), well under the 32GB memory\
    \ limit.**\n"
