title: 'Model Size Estimation: Compare YOLOv8-l FP32 FP16 and INT8 TensorRT Memory on Jetson Orin'
scenario: 'Evaluate the LPDDR5 memory footprint on Jetson Orin for a YOLOv8-l model (43.7M params) in three precisions: FP32, FP16, and INT8 TensorRT. Include weights, input tensor (640x640x3 at FP32), and output tensor (84x8400).'
question: How much memory does YOLOv8-l use on Jetson Orin in FP32, FP16, and INT8 TensorRT, and how many concurrent instances fit?
details:
  realistic_solution: 'Weights: FP32: 43.7M×4B=174.8MB. FP16: 87.4MB. INT8: 43.7MB, or 56.8MB after a 1.3x TensorRT engine overhead. Input: 640×640×3×4B=4.9MB (kept FP32 for camera pipeline). Output: 84×8400×4B=2.8MB. Activation peaks are estimates: ~200MB FP32, ~100MB FP16, and ~50MB INT8. Total FP32: 174.8+200+4.9+2.8=382.5MB. FP16: 87.4+100+4.9+2.8=195.1MB. INT8 TRT: 56.8+50+4.9+2.8=114.5MB. All fit in 32GB. Memory-only max concurrent INT8 instances: 32000MB/114.5MB = 279; real deployment capacity may be lower if compute, bandwidth, or stream I/O becomes tighter.'
  common_mistake: |
    **The Pitfall:** Reporting only weight memory without output/input tensor sizes.
    **The Rationale:** Candidates focus purely on parameter counts and forget that activations and dense detection heads consume significant memory.
    **The Consequence:** Underestimating the true runtime memory footprint, leading to OOM issues when scaling concurrent streams.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - YOLOv8-l params: 43.7M
       - Input tensor: 640x640x3 (FP32)
       - Output tensor: 84x8400 (FP32)
       - Available memory for this estimate: 32GB total = 32000MB
    2. **Calculations:**
       - Weights (FP32) = 43.7M * 4 Bytes = 174.8 MB
       - Weights (INT8 TRT) = 43.7 MB * 1.3 overhead = 56.8 MB
       - Input (FP32) = 640 * 640 * 3 * 4 Bytes = 4.9 MB
       - Output (FP32) = 84 * 8400 * 4 Bytes = 2.8 MB
       - Total INT8 TRT = 56.8 MB + 50 MB (activations) + 7.7 MB (I/O) = 114.5 MB
       - Memory limit instances = 32000 MB / 114.5 MB = 279 instances
    3. **Conclusion & Interpretation:**
       - **Result: Memory-only INT8 capacity is 279 instances.** This answers the memory-fit question; compute and I/O limits should be evaluated separately before using that as a production concurrency target.
