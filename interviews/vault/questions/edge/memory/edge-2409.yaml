title: Industrial Camera LPDDR5 DMA Tax
scenario: An industrial inspection system uses an AGX Orin (204.8 GB/s bandwidth). The camera generates uncompressed grayscale images via DMA at 10 Gbps. The GPU also reads model weights at 30 GB/s and KV-cache-style activation buffers at 15 GB/s on the same shared LPDDR5 bus, all simultaneously with the camera DMA writes.
question: Analyze concurrent bus contention by computing aggregate LPDDR5 utilization from camera DMA writes + model weight reads + activation reads. Determine whether any of the three streams will be bandwidth-starved by the others.
details:
  realistic_solution: 'Camera DMA: 10 Gbps / 8 = 1.25 GB/s. Model weights: 30 GB/s. Activations: 15 GB/s. Total = 46.25 GB/s. Effective LPDDR5 sustained at ~65% of theoretical = 133 GB/s. Aggregate utilization = 46.25 / 133 = 35%. Camera DMA is only 0.61% of theoretical peak but 1.25 / 133 = 0.94% of effective - well below contention. The dominant load is model weights at 23% of effective BW. None of the streams are starved at this load profile, but adding a second GPU inference pipeline would push aggregate to ~70 GB/s and start to shift the binding constraint.'
  common_mistake: |
    **The Pitfall:** Computing only the camera DMA share and ignoring GPU memory traffic.
    **The Rationale:** Candidates fail to realize LPDDR5 is a shared unified memory bus, and heavy concurrent AI workloads can starve high-speed DMA interfaces.
    **The Consequence:** Intermittent frame drops in production when inference spikes saturate the bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin bandwidth: 204.8 GB/s theoretical (~133 GB/s effective)
    - Camera DMA: 10 Gbps
    - Weight reads: 30 GB/s; Activations: 15 GB/s

    **Calculations:**
    - Camera DMA bytes = 10 Gbps / 8 = 1.25 GB/s
    - Aggregate Load = 1.25 + 30 + 15 = 46.25 GB/s
    - LPDDR5 Utilization = 46.25 GB/s / 133 GB/s = 34.7%

    **Conclusion & Interpretation:**
    - **Result: 34.7% Bus Utilization (Bandwidth-Bound)**. Aggregate utilization is well below contention limits, none are starved.
