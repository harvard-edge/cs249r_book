title: Edge TPU Multi-Model Memory Hierarchy Design
scenario: 'You are architecting an edge inference pipeline for a retail security system using a Google Coral Edge TPU (USB 3.0 interface). The application requires running a cascade of models: a lightweight motion detector, a person detector, and a complex facial recognition model. Given the Edge TPU''s limited on-chip SRAM (~8MB) and the host device''s 2GB LPDDR4 memory, design the memory hierarchy and deployment strategy.'
question: Which models would you keep resident in Coral Edge TPU SRAM, and when would you swap over USB for the motion/person/face cascade?
details:
  realistic_solution: The optimal architecture pins the high-frequency motion and person detectors permanently in the 8MB Edge TPU SRAM to ensure zero-latency inference and low power. The larger facial recognition model, quantized to INT8, is stored in host LPDDR4 and paged in over USB only when a person is detected. This design prioritizes the SRAM for high-frequency tasks while utilizing host memory for lower-frequency, larger models.
  common_mistake: |
    **The Pitfall:** Assuming model weights can be seamlessly streamed from the host DRAM to the Edge TPU per frame.
    **The Rationale:** Candidates treat USB 3.0 like a high-bandwidth PCIe bus.
    **The Consequence:** The USB interface severely bottlenecks the compute engine, dropping frame rates to unusable levels for high-frequency models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - USB 3.0 effective bandwidth: ~500 MB/s.
       - Facial recognition model (INT8): 20 MB.
       - Compute capacity: 100 GOPS task at 4 TOPS.
    2. **Calculations:**
       - Transfer time over USB = 20 MB / 500 MB/s = 40 ms.
       - Compute time = 100e9 operations / 4e12 operations/s = 25 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 40 ms transfer > 25 ms compute.** The transfer time exceeds the compute time, heavily **I/O-Bandwidth-Bound**, mandating SRAM residency for high-framerate models.
