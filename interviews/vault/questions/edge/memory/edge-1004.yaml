title: Reducing TensorRT ResNet-50 Residual Activation Memory with INT8 Strict Types
scenario: A TensorRT-optimized ResNet-50 on Jetson Orin uses 1.8 GB peak activation memory at batch size 32. An unfused PyTorch baseline uses 4.2 GB. Your team wants to further reduce TensorRT activation memory to under 1 GB to allow concurrent pipeline stages.
question: How can you reduce TensorRT ResNet-50 residual-path activation memory below 1 GB at batch 32, and what batch-size adjustment is needed if INT8 strict typing alone is not enough?
details:
  realistic_solution: |
    Use INT8 precision where TensorRT can keep residual tensors INT8 end-to-end, enable strict precision constraints, and verify the engine plan has no FP16 reformat or fallback tensors on the residual path. This reduces the batch-32 total from 1.8 GB to about 1.4 GB, so INT8 residuals alone do not meet the <1 GB target. Assuming peak activation memory scales approximately linearly with batch after the precision change, the maximum safe batch is 22 because 1.4 GB * 22/32 = 0.9625 GB.
  common_mistake: |
    **The Pitfall:** Assuming TensorRT automatically minimizes all memory footprints and keeps every residual tensor in INT8.
    **The Rationale:** Candidates believe TensorRT's default optimization finds all precision and fusion opportunities without checking the engine plan for residual-path fallback or reformat tensors.
    **The Consequence:** They may overstate the memory reduction from strict typing and miss that batch size must still be reduced to satisfy the <1 GB target.
  napkin_math: |
    **Assumptions & Constraints:**
    - At batch 32, non-residual activations use 1000 MB and residual-path tensors use 800 MB in the current TensorRT engine.
    - INT8 residual tensors are assumed to be supported end-to-end after validating the engine plan; otherwise the fallback tensors must be counted separately.
    - Target is <1 GB.
    - Peak activation memory scales approximately linearly with batch size near this operating point.

    **Calculations:**
    - INT8 residuals = 400 MB.
    - New total at batch 32 = 1000 MB + 400 MB = 1400 MB.
    - Required batch size for <1000 MB: 32 * 1000 MB / 1400 MB = 22.86.
    - Use integer batch 22: 1400 MB * (22/32) = 962.5 MB.
    - Batch 23 would be 1400 MB * (23/32) = 1006.25 MB, which misses a strict <1 GB target.

    **Conclusion & Interpretation:**
    - **Result: batch 22 maximum (Memory-Capacity-Bound)**. INT8 residuals lower batch-32 memory only to 1.4 GB; the additional batch reduction to 22 is what brings peak activation memory below 1 GB.
