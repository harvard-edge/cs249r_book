title: Edge TPU Model Swapping and Memory Pressure
scenario: 'You are deploying a multi-model video analytics pipeline on a gateway device utilizing a USB Edge accelerator. The host device has severely constrained RAM, and the accelerator requires swapping distinct INT8 quantized models in and out of its local SRAM to process sequential pipeline stages. You must evaluate two memory management strategies to handle the tensor I/O: (A) preemptively allocating fixed, pinned host memory pools for each model''s input/output tensors, or (B) using a single, dynamically allocated memory pool that relies on OS-level eviction and page caching to clear inactive tensors.'
question: Which memory management strategy better prevents OOM crashes and memory fragmentation for the accelerator tensor I/O?
details:
  realistic_solution: Alternative A (pre-allocated fixed memory pools) is the superior architectural choice for this constrained environment. By pinning host memory and maintaining strict, contiguous boundaries for the INT8 I/O tensors of each model, you completely bypass OS-level memory fragmentation and prevent unexpected OOM kills under peak inference load. This predictable memory footprint ensures the accelerator isn't starved waiting for the host OS to reclaim and compact fragmented memory pages.
  common_mistake: |
    **The Pitfall:** Choosing the dynamic pool (B) to maximize "free RAM".
    **The Rationale:** Candidates assume the OS page cache will efficiently handle memory eviction, failing to account for the severe memory fragmentation and unpredictable latency spikes during OS reclamation.
    **The Consequence:** The system will experience unpredictable OOM kills and latency spikes when the OS struggles to find contiguous physical memory pages for USB/PCIe DMA transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 3 sequential INT8 models.
       * Each requires 5MB for parameters and 3MB for I/O tensors (8MB total per model).
       * Execution at 30 FPS.
    2. **Calculations:**
       * Approach A (Fixed Pools): Reserves 3 * 8MB = 24MB of pinned host memory permanently with zero fragmentation overhead.
       * Approach B (Dynamic Pool): Dynamic allocation of 8MB chunks at 30 FPS generates 240MB/sec of transient buffer allocations.
       * If OS memory reclamation lags by just 2 seconds, host memory pressure surges by 480MB.
    3. **Conclusion & Interpretation:**
       * **Dynamic allocation generates 480MB of transient fragmented memory pressure, causing highly probable OOM kills on devices with <1GB RAM. Result: Memory Capacity-Bound.**
