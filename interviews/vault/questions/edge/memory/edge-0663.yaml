title: The Swap File Latency Cliff
scenario: You deploy a 4GB model to a Jetson Nano that has exactly 4GB of physical RAM. You enable a 4GB Linux Swap File on the SD card to prevent OOM crashes. The model loads successfully. However, when the inference runs, the latency is completely erratic—sometimes it takes 50ms, sometimes it takes 4,000ms. The CPU and GPU are barely being utilized during the 4,000ms spikes.
question: Why does the Jetson Nano with a 4GB swap file experience erratic 4,000ms latency spikes during inference?
details:
  realistic_solution: 'The erratic latency is caused by Linux swap thrashing. The 4GB model plus the OS, CUDA runtime, and kernel buffers exceed 4GB of physical RAM. Linux silently evicts pages to the SD card swap file. During inference, when a layer''s weights have been swapped out, the GPU stalls while the CPU fetches the page from the sluggish SD card.'
  common_mistake: |
    **The Pitfall:** Blaming slow model load times on the SD card.
    **The Rationale:** Candidates hear "SD card" and assume the model is just slow to initialize into RAM.
    **The Consequence:** They fail to diagnose that the model is already loaded, and the problem is actively thrashing memory *during* the inference forward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Memory Bandwidth: ~25 GB/s
       - SD Card Swap Bandwidth: ~0.025 GB/s (25 MB/s)
    2. **Calculations:**
       - Bandwidth Degradation: 25 GB/s / 0.025 GB/s = 1,000x penalty
       - Swapped Latency: 4ms standard read * 1,000x = 4,000ms
    3. **Conclusion & Interpretation:**
       - **Result: Storage I/O-Bound.** Silently evicting layer weights to SD card swap introduces a catastrophic 1,000x latency multiplier, perfectly explaining the erratic 4,000ms inference stalls.
