title: 'The eMMC Wear-Out Time Bomb'
scenario: 'Your fleet of 5,000 industrial inspection cameras runs 24/7. Each device writes inference metadata (bounding boxes, confidence scores, timestamps) to its 32 GB eMMC at a rate of 50 KB per inference, 10 inferences per second. The eMMC is rated for 3,000 P/E cycles with 128 KB erase blocks. Six months after deployment, devices start failing in clusters — 200 devices die in week 26, another 300 in week 27.'
question: 'What happened to cause clustered device failures at 6 months, and how do you prevent the next wave?'
details:
  realistic_solution: 'The devices are dying from eMMC write amplification, and the cluster pattern reveals that all devices were deployed in the same week with identical firmware.'
  common_mistake: |
    **The Pitfall:** Concluding the eMMC batch is defective and contacting the supplier for replacements.
    **The Rationale:** Candidates misinterpret a time-correlated cluster failure as a manufacturing defect (which typically follows a bathtub curve) rather than normal wear-out.
    **The Consequence:** Replacing the hardware without fixing the software, leading to the exact same failure mode repeating 6-9 months later across the entire fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Logical write rate: 50 KB/inference * 10 Hz = 500 KB/s = 43.2 GB/day.
    - eMMC erase block size is 128 KB.
    - Write Amplification Factor (WAF) ≈ 8.
    - Consumer eMMC lifetime: 32 GB * 3,000 P/E cycles = 96 TB.

    **Calculations:**
    - Physical write rate = 43.2 GB/day * 8 = 345.6 GB/day.
    - Expected failure time: 96 TB / 345.6 GB/day = 278 days (~9 months).

    **Conclusion & Interpretation:**
    - **Result: 278 days Lifetime (I/O-Bound)**. Write amplification severely degrades flash storage, causing cluster failures that require a RAM disk buffer to mitigate.
