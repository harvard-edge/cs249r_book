title: Estimate Host RAM, SRAM Fit, and PCIe Model-Switch Time for Sequential Edge Inference
scenario: You are sizing the minimum host system memory for running 3 models sequentially on an edge accelerator. Models include pedestrian detection (8MB), vehicle classification (12MB), and traffic sign recognition (6MB). The host CPU handles I/O, and the accelerator has 32MB on-chip SRAM.
question: How much host RAM is needed, do the three models fit in SRAM, and what is the model-switching time via 5GB/s PCIe?
details:
  realistic_solution: Staging the three sequential models requires about 572MB of host CPU RAM for OS/driver overhead, model weights, and buffers. The largest single model is 12MB, so all three models fit in the accelerator's 32MB SRAM one at a time. Switching the active 12MB model over 5GB/s PCIe takes about 2.4ms.
  common_mistake: |
    **The Pitfall:** Assuming the on-chip SRAM can hold all three models simultaneously.
    **The Rationale:** Candidates treat SRAM like a hard drive, forgetting it only holds the current model's weights/activations for the active inference.
    **The Consequence:** The system crashes due to insufficient host RAM to stage the models for rapid PCIe swapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - Host OS/Drivers: ~512MB.
    - Models: 8MB, 12MB, 6MB.
    - Buffer/Post-processing: ~34MB.
    - Hardware: 32MB SRAM, PCIe 5GB/s.
    - Use decimal MB/GB for the PCIe transfer estimate.

    **Calculations:**
    - Model staging RAM = 8 + 12 + 6 = 26MB.
    - Total host RAM required = 512MB OS/driver + 26MB models + 34MB buffers = 572MB (fits in 1GB).
    - Max model (12MB) < 32MB SRAM.
    - PCIe switch time = 12MB / 5GB/s = 12MB / 5000MB/s = 0.0024s = 2.4ms.

    **Conclusion & Interpretation:**
    - **Result: about 572MB minimum host RAM, 12MB fits in 32MB SRAM, and 2.4ms switch time.** A 1GB host is a safe rounded provisioning choice, but it is not the minimum implied by the prompt.
