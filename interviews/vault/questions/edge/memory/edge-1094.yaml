title: 'Model Size Estimation: Realize Minimum Hardware Spec for Multi-Model Hailo Deployment'
scenario: You are sizing the minimum host system memory for running 3 models sequentially on an edge accelerator. Models include pedestrian detection (8MB), vehicle classification (12MB), and traffic sign recognition (6MB). The host CPU handles I/O, and the accelerator has 32MB on-chip SRAM.
question: How much host RAM is needed, do the three models fit in SRAM, and what is the model-switching time via 5GB/s PCIe?
details:
  realistic_solution: 'Staging sequential models mandates a minimum of 1GB of host CPU RAM. Edge accelerators utilize on-chip SRAM exclusively for the active computational graph (32MB), acting as an execution buffer rather than persistent storage. Multi-model execution requires caching all weights in the host OS LPDDR, streaming them rapidly over PCIe (2.4ms per switch) just-in-time for inference.'
  common_mistake: |
    **The Pitfall:** Assuming the on-chip SRAM can hold all three models simultaneously.
    **The Rationale:** Candidates treat SRAM like a hard drive, forgetting it only holds the current model's weights/activations for the active inference.
    **The Consequence:** The system crashes due to insufficient host RAM to stage the models for rapid PCIe swapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - Host OS/Drivers: ~512MB.
    - Models: 8MB, 12MB, 6MB.
    - Buffer/Post-processing: ~34MB.
    - Hardware: 32MB SRAM, PCIe 5GB/s.

    **Calculations:**
    - Total RAM required = 512 + 26 + 34 = 572MB (Fits in 1GB).
    - Max model (12MB) < 32MB SRAM.
    - PCIe switch time = 12MB / 5 GB/s = 2.4ms.

    **Conclusion & Interpretation:**
    - **Result: 1GB Host RAM and 2.4ms switch time (Memory-Bound)**. Models swap into SRAM sequentially; host RAM must stage all weights.
