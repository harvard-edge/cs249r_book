title: Hailo-8 DMA PCIe Streaming Bottleneck
scenario: We are deploying an object detection model on a Hailo-8 edge accelerator. The Hailo-8 utilizes a pure dataflow architecture with no local external DRAM, meaning it must stream all input data directly from host memory via DMA over a PCIe Gen3 x1 link (approx 1 GB/s effective bandwidth). The model requires 20 GOPS per inference and takes an uncompressed 4MB input tensor. During benchmarking, the system hard-caps at exactly 5 TOPS of compute throughput.
question: Why does this architecture experience this specific performance wall?
details:
  realistic_solution: The accelerator is completely starved for data by the PCIe interface. Because it must fetch the 4MB input tensor directly from host memory for every single frame, the system's framerate is strictly bounded by the 1 GB/s PCIe Gen3 x1 link. The compute units finish their tasks faster than the DMA engine can supply new data, leaving 21 TOPS of compute capacity idle.
  common_mistake: |
    **The Pitfall:** Assuming the 5 TOPS limit is due to the 2.5W thermal envelope causing power throttling.
    **The Rationale:** Candidates fail to recognize that without local DRAM, the compute engine is entirely at the mercy of the host-to-device DMA streaming bandwidth.
    **The Consequence:** They waste engineering hours attempting to optimize INT8 quantization mapping while the hardware is starved by the 1 GB/s PCIe link.
  napkin_math: |
    1. Assumptions & Constraints:
       - Hailo-8 interface: PCIe Gen3 x1 (1 GB/s effective)
       - Inference data movement: 4 MB/frame
       - Model compute requirement: 20 GOPS/frame
    2. Calculations:
       - DMA framerate limit = 1000 MB/s / 4 MB/frame = 250 FPS
       - Maximum system compute throughput = 250 FPS * 20 GOPS/frame = 5,000 GOPS
       - 5,000 GOPS = 5 TOPS
    3. Conclusion & Interpretation:
       - **Result: Bandwidth-Bound. The system is entirely starved by the PCIe interface, bottlenecking compute at exactly 5 TOPS.**
