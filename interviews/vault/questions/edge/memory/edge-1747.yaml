title: Hailo-8 Multi-Process Memory-Mapped Inference
scenario: You are deploying a cascaded object detection pipeline on an edge gateway equipped with a Hailo-8 accelerator. Three separate containerized processes need to run concurrent inferences using the same 120MB INT8 backbone model.
question: How would you share the 120 MB Hailo-8 backbone across three containers while staying under a 200 MB host memory budget?
details:
  realistic_solution: The optimal solution is to memory-map (mmap) the shared backbone weights from the host OS into the virtual address space of all three containers. The Hailo driver streams DMA transfers from this single physical memory region directly to the dataflow engine.
  common_mistake: |
    **The Pitfall:** Suggesting independent loading of the model in each container.
    **The Rationale:** Candidates misunderstand the Hailo-8 dataflow architecture, incorrectly assuming it caches weights locally like a traditional discrete GPU.
    **The Consequence:** Independent loads consume 360MB of host memory, completely blowing past the strict 200MB budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Host memory budget: 200MB
    - Model size: 120MB (INT8)
    - Containers: 3

    **Calculations:**
    - Independent loading upper bound: 3 * 120MB = 360MB plus process overhead, which exceeds the 200MB budget if each container owns a private copy.
    - Shared mmap loading: one 120MB physical weight copy in the page cache plus small per-process page-table and container overhead.

    **Conclusion & Interpretation:**
    - **Result: 120MB shared weight footprint plus overhead (Memory-Bound)**. Using mmap avoids roughly 240MB of duplicate weight storage and leaves about 80MB for page tables, driver buffers, and container overhead under the 200MB budget.
