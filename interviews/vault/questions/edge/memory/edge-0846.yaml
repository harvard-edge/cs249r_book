title: SRAM Budget for Microcontroller Fine-Tuning
scenario: An edge microcontroller with 256KB of SRAM runs on-device learning to personalize
  a keyword spotting model. The frozen INT8 base model has 100,000 parameters. A new
  FP32 fully-connected layer (1,000 parameters) is fine-tuned using the Adam optimizer
  (batch size 1). The forward pass requires a 50KB activation workspace.
question: How much SRAM is required for the INT8 base, FP32 layer, gradients, Adam
  state, and workspace, and does it fit in the 256KB budget?
details:
  realistic_solution: Calculate the individual memory components for weights, gradients,
    and optimizer states. Adam requires storing two historical state variables per
    parameter, which triples the memory footprint of the trainable weights compared
    to plain SGD.
  common_mistake: '**The Pitfall:** Forgetting the memory footprint of the Adam optimizer''s
    historical state variables.

    **The Rationale:** Candidates often calculate memory for weights and gradients
    but forget that Adam requires tracking two moment variables (momentum and variance)
    for every trainable parameter.

    **The Consequence:** The microcontroller crashes with an Out-of-Memory error during
    the first backward pass because the optimizer state overflowed the SRAM.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Base weights (frozen INT8): 100,000 parameters.

    - Trainable weights (FP32): 1,000 parameters.

    - Adam optimizer state: 2 moment variables (FP32) per trainable parameter.

    - Activation workspace: 50 KB.

    - Budget: 256 KB SRAM.


    **Calculations:**

    - Base Weights Size: 100,000 * 1 byte = 100 KB.

    - Trainable Weights Size: 1,000 * 4 bytes = 4 KB.

    - Gradients Size: 1,000 * 4 bytes = 4 KB.

    - Adam State Size: 2 * 1,000 * 4 bytes = 8 KB.

    - Total Memory Required: 100 KB + 4 KB + 4 KB + 8 KB + 50 KB = 166 KB.


    **Conclusion & Interpretation:**

    - **Result: 166 KB total memory required (Memory-Feasible).** Fits comfortably
    within 256 KB budget.

    '
