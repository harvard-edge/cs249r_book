title: LoRA Memory Footprint Calculation
scenario: You are fine-tuning a 7B parameter Transformer model on a 64GB unified memory edge device for 3 distinct user-specific tasks. Full fine-tuning using the Adam optimizer immediately throws an Out-Of-Memory error. You switch to LoRA, adapting only the query and value projection matrices with rank r=8. Assume the base model is in FP16, the transformer has 32 layers with hidden size d=4096, and Adam optimizer states are kept in FP32.
question: How much memory is needed for the FP16 7B base, LoRA adapters, and FP32 Adam states for all 3 tasks when adapting W_q and W_v with r=8?
details:
  realistic_solution: Load one frozen FP16 base model and keep separate LoRA trainable state for each of the 3 tasks. For each task, W_q and W_v LoRA add 2 * (4096 * 8 + 8 * 4096) parameters per layer, or 4.19M parameters across 32 layers. Counting FP16 adapter weights, FP16 gradients, FP32 master weights, and two FP32 Adam moment buffers gives 16 bytes per trainable parameter, so all 3 tasks require about 201 MB beyond the 14 GB base. The total is about 14.2 GB, well inside the 64GB limit before activations and framework overhead.
  common_mistake: |
    **The Pitfall:** Failing to account for FP32 Adam optimizer states or miscalculating LoRA parameters.
    **The Rationale:** Candidates forget that Adam requires 8 bytes per parameter (moments) + 4 bytes master + 2 bytes grad + 2 bytes weight = 16 bytes per trainable parameter, or they incorrectly compute LoRA dims as `d_model * d_model`.
    **The Consequence:** Underestimating the fine-tuning memory footprint and triggering OOMs even when using PEFT methods.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model (FP16): 7B params
    - Architecture: 32 layers, hidden size d=4096
    - LoRA target modules: W_q and W_v, rank r=8
    - Trainable state: 16 bytes/parameter (FP16 weight + FP16 grad + FP32 master weight + two FP32 Adam moments)

    **Calculations:**
    - Base: 7e9 * 2 bytes = 14 GB
    - LoRA params per layer: 2 modules * (4096 * 8 + 8 * 4096) = 131,072
    - LoRA params per task: 131,072 * 32 layers = 4,194,304
    - Trainable state per task: 4,194,304 * 16 bytes = 67.1 MB
    - Total for 3 tasks: 14 GB + (3 * 67.1 MB) = 14.20 GB

    **Conclusion & Interpretation:**
    - **Result: 14.2 GB before activations/framework overhead.** The base model dominates memory, and the 3 LoRA task states add only about 201 MB, so the setup fits within the 64GB unified memory boundary.
