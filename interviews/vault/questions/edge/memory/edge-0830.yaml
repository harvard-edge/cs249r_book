title: Latent vs. Raw Experience Replay Trade-offs
scenario: You are designing an on-device personalization pipeline for a smartwatch health monitor (Cortex-M4, 256KB SRAM, 4MB Flash). To mitigate catastrophic forgetting of baseline physiological patterns during continuous local learning, you must implement an experience replay buffer using a strict 1MB Flash allocation.
question: Should the 1MB Flash replay buffer store 2KB raw sensor windows or 256-byte latent embeddings, and what are the quantitative trade-offs?
details:
  realistic_solution: 'Adopt Latent Experience Replay by freezing the lower convolutional layers of the network and storing 256-byte intermediate embeddings. This maximizes buffer diversity, eliminates the need to recompute lower-layer activations during interleaved updates, and significantly reduces Flash write amplification.'
  common_mistake: Defaulting to raw data replay, which severely restricts buffer capacity on limited Flash and increases compute energy, or choosing latent replay without realizing the lower layers acting as the feature extractor must remain permanently frozen.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer size = 1 MB (1,000,000 bytes)
    - Raw sample = 2,000 bytes
    - Latent sample = 256 bytes

    **Calculations:**
    - Raw Capacity = 1,000,000 / 2,000 = 500 samples
    - Latent Capacity = 1,000,000 / 256 = 3,906 samples
    - Diversity Multiplier = 3,906 / 500 = 7.8x

    **Conclusion & Interpretation:**
    - **Result: 7.8x Diversity (Memory-Capacity-Bound)**. Latent replay significantly increases buffer capacity while eliminating ~60% of the forward-pass compute energy for replayed samples.
