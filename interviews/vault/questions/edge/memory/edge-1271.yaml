title: Architecting Multi-Tenant Memory-Mapped Inference for Edge
scenario: You are designing an on-premise defect detection system using a Qualcomm Cloud AI 100 accelerator. The service must multiplex between a dozen specialized visual inspection models without incurring cold-start latency when switching assembly lines.
question: How would you memory-map and share a dozen model weights to allow processes to switch lines without cold starts within 32 GB?
details:
  realistic_solution: Implement a centralized model-server process that memory-maps all model weights using `MAP_SHARED` and pins active layers into RAM with `mlock`. Worker processes attach to this shared memory region, avoiding redundant weight copies. Strictly use INT8 quantized weights to minimize memory bandwidth utilization.
  common_mistake: |
    **The Pitfall:** Proposing naive dynamic weight loading or standard disk-backed OS paging.
    **The Rationale:** Candidates assume standard virtual memory paging is sufficient for dynamic loading.
    **The Consequence:** This introduces severe latency spikes and unpredictable cold starts, and fails to leverage shared memory across processes, quickly exhausting RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 32 GB.
    - 12 models at 6 GB (FP16) each.

    **Calculations:**
    - FP16 footprint = 12 * 6 GB = 72 GB (exceeds 32 GB limit).
    - INT8 footprint = 12 * 3 GB = 36 GB (still exceeds 32 GB, must page).
    - Pinning active models (e.g., 8 lines): 8 * 3 GB = 24 GB pinned.
    - Leaves 8 GB for OS and activations.

    **Conclusion & Interpretation:**
    - **Result: Zero cold-starts (Memory-Bound Mitigation)**. Memory mapping with INT8 quantization eliminates cold-starts and redundant weight copies.
