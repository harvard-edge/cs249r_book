title: Jetson Orin OOM During Batch Fine-Tuning
scenario: A robotics team is deploying a continuous learning pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP, Ampere GPU + DLA accelerator). The model parameters consume 14 GB, the optimizer states consume 8 GB, and OS overhead is 2 GB. When using gradient accumulation with a micro-batch size of 1 for 16 steps, training runs smoothly. However, when they switch to a standard batch size of 16 to leverage the 275 TOPS INT8 compute, the system triggers the Linux OOM killer during the first forward pass. Assume each sample's activations require 750 MB.
question: Why does batch size 16 trigger OOM on the 32 GB Jetson Orin while 16-step gradient accumulation with micro-batch 1 fits?
details:
  realistic_solution: In standard training with batch size 16, the forward pass must retain activations for all 16 samples until their backward pass runs. With 16-step gradient accumulation, only the current micro-batch's activations are live at peak while gradients are accumulated across optimizer steps. The fixed footprint is 24 GB, so micro-batch 1 peaks at 24.75 GB and fits, while batch 16 adds 12 GB of activations and peaks at 36 GB. That exceeds the 32 GB LPDDR5 capacity and triggers the Linux OOM killer.
  common_mistake: |
    **The Pitfall:** Only accounting for weights, optimizer states, and gradients in the memory budget.
    **The Rationale:** Candidates completely miss the massive memory spike caused by saving intermediate activations during the forward pass for use in backpropagation.
    **The Consequence:** The training script is deployed but immediately crashes the Orin device due to Linux OOM killer invocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin Total Memory = 32 GB.
    - Fixed Memory = 14 GB (Weights) + 8 GB (Optimizer) + 2 GB (OS) = 24 GB.
    - Activation size per sample = 0.75 GB.

    **Calculations:**
    - Available memory = 32 GB - 24 GB = 8 GB.
    - Scenario 1 (Micro-batch 1): Peak memory = 24 GB + 0.75 GB (Activations) = 24.75 GB (Fits).
    - Scenario 2 (Batch 16): Peak memory = 24 GB + (0.75 GB * 16) = 36 GB (OOM).

    **Conclusion & Interpretation:**
    - **Result: 36 GB peak for batch 16 versus 24.75 GB for micro-batch 1 (Memory-Capacity-Bound)**. Gradient accumulation fits because it keeps only one micro-batch's activations live at a time, while full batch training retains activations for all 16 samples.
