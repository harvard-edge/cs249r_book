title: Unified Memory Multimodal Perceptor
scenario: You are tasked with deploying a continuous robotics perception pipeline on an NVIDIA Jetson Orin. The pipeline requires running a 13B parameter reasoning LLM alongside a 2B parameter vision encoder, maintaining a temporal history of 4000 tokens.
question: How would you partition Jetson Orin's 32 GB unified memory for a 13B LLM, 2B vision encoder, and 4000-token history without OOMs?
details:
  realistic_solution: Partition unified memory explicitly instead of relying on best-effort allocation. Reserve memory first for the OS, ROS, drivers, TensorRT/runtime workspaces, and camera buffers, then pin the 13B LLM weights in 4-bit form and the 2B vision encoder in INT8 form. Keep the vision encoder on GPU unless it has been converted to DLA-supported layers; otherwise treat DLA offload as an optimization, not a requirement. Preallocate a bounded PagedAttention KV arena for the 4000-token history, cap concurrent sequences, and leave several GB uncommitted for fragmentation, temporary activations, and allocator overhead.
  common_mistake: |
    **The Pitfall:** Overlooking unified architecture mechanics or massively underestimating KV overhead.
    **The Rationale:** Candidates treat the Jetson's memory like discrete PC CPU/GPU setups, proposing redundant copying, or they fail to realize how large a 4k KV cache gets for a 13B model.
    **The Consequence:** The architecture wastes precious memory copying data back and forth, eventually causing the system to crash due to peak activation spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Unified Memory: 32.0 GB.
    - OS/ROS Reservation: 6.0 GB.
    - Runtime/workspace/fragmentation reserve: 5.0 GB.
    - Peak activations and camera buffers: 3.0 GB.
    - 13B LLM @ 4-bit (0.5 byte/param).
    - 2B Vision @ 8-bit (1 byte/param).
    - KV Cache: 4000 tokens, 40 layers, 40 heads, 128 dim, FP16.

    **Calculations:**
    - Model Weights: 6.5 GB (LLM) + 2.0 GB (Vision) = 8.5 GB.
    - KV Cache per token: 2 (K,V) * 2 bytes * 40 layers * 40 heads * 128 dim = 819,200 bytes = 0.8 MB.
    - Total KV Cache: 819,200 bytes/token * 4000 = 3,276,800,000 bytes = 3.28 GB decimal = 3.05 GiB.
    - Total committed: 6.0 (OS) + 8.5 (Weights) + 3.28 (KV) + 3.0 (Acts) + 5.0 (runtime reserve) = 25.78 GB.
    - Margin: 32.0 GB - 25.78 GB = 6.22 GB.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Bound.** The explicit partition leaves about 6.2 GB of headroom; OOM risk is controlled by fixed KV/workspace caps rather than guaranteed away.
