title: The SRAM Tensor Arena
scenario: 'You''re optimizing a small radar classification model for an automotive-grade microcontroller which has 512KB of SRAM. The ML framework requires you to define a ''Tensor Arena''.'
question: What is the primary purpose of the Tensor Arena memory region?
details:
  realistic_solution: 'The Tensor Arena is a single, large, statically-allocated block of memory (in this case, a portion of the 512KB SRAM) that is pre-reserved to hold all input, output, and intermediate activation tensors during inference. This strategy completely avoids dynamic memory allocation (e.g., `malloc`), which is non-deterministic, slow, and can lead to memory fragmentation—all of which are unacceptable in a hard real-time system like automotive radar processing.'
  common_mistake: |
    **The Pitfall:** Confusing the Tensor Arena with weight storage or a generic heap.
    **The Rationale:** Engineers used to large systems assume it operates like VRAM or standard dynamic memory (`malloc`).
    **The Consequence:** Failing to understand its role in preventing non-deterministic, fragmented memory allocation in a hard real-time system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 512KB.
    - Model Activations: Peak of 150KB.

    **Calculations:**
    - Arena Allocation: 150 / 512 \approx 29%.

    **Conclusion & Interpretation:**
    - **Result: 29% (Memory-Feasible)**. The remaining 362KB is left for the RTOS and network stacks, ensuring the model's peak memory is guaranteed without dynamic allocation.
  options:
  - 'To permanently store the model''s weights in fast memory.'
  - 'To serve as a dedicated buffer for Direct Memory Access (DMA) transfers from peripherals.'
  - 'To provide a statically-allocated region for tensor activations, avoiding dynamic memory calls.'
  - 'To act as a software-managed cache for data stored in slower, external DRAM.'
