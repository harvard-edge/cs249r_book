title: The Transformer Patch Limit
scenario: You decide to replace a standard CNN with a Vision Transformer (ViT) for
  a drone's obstacle avoidance system. The ViT has the exact same number of parameters
  as the CNN. However, when you increase the input camera resolution from 224x224
  to 448x448 to see smaller wires, the CNN runs slightly slower, but the ViT completely
  crashes with an Out-of-Memory (OOM) error.
question: Why does the ViT completely crash with an OOM error while the CNN merely
  slows down?
details:
  realistic_solution: You hit the quadratic memory wall of self-attention. A CNN's
    activation memory grows linearly with the number of input pixels. A Vision Transformer
    splits the image into patches (tokens) and computes self-attention across all
    of them. The memory required to store the self-attention matrix scales quadratically
    (O(N^2)) with the number of patches. By doubling the resolution, you quadrupled
    the number of patches, which increased the attention memory requirement by 16x,
    instantly blowing out the edge device's RAM.
  common_mistake: '**The Pitfall:** Assuming linear memory scaling for parameters.

    **The Rationale:** Candidates incorrectly assume that because both models have
    the same number of parameters, their memory footprint will scale identically when
    the input size changes.

    **The Consequence:** Attempting to run high-resolution inputs on Transformers
    at the edge leads to catastrophic out-of-memory crashes.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Resolution doubles from 224x224 to 448x448.

    - Patch size is 16x16.

    - Self-attention memory scales O(N^2).


    **Calculations:**

    - At 224x224: (224/16)^2 = 196 patches. Matrix size ~ 196^2 = 38,416.

    - At 448x448: (448/16)^2 = 784 patches. Matrix size ~ 784^2 = 614,656.

    - Ratio = 614,656 / 38,416 = 16x.


    **Conclusion & Interpretation:**

    - **Result: 16x memory footprint (Memory-Capacity-Bound)**. Doubling the resolution
    causes a 16x explosion in intermediate activation memory purely from attention.

    '
