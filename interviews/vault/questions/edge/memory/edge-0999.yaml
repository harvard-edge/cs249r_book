title: 'Fluency: Explaining Activation Memory vs. Weight Memory Trade-off for Edge Practitioners'
scenario: 'A hardware engineer new to ML asks why a MobileNetV3 model with only 5 MB of weights consumes over 200 MB of memory during inference on a Jetson Orin. They expect memory usage to equal model size.'
question: 'Why can a MobileNetV3 with only 5MB of weights consume over 200MB during inference on Jetson Orin?'
details:
  realistic_solution: 'Weights are stored once and are fixed: 5 MB for MobileNetV3. Activations are the feature maps that flow through the network during the forward pass: at input 224x224x3 the first conv produces 112x112x16 = 790 KB; the next stage 56x56x24 = 300 KB. These exist simultaneously with adjacent layers during computation. With TensorRT''s memory reuse, peak is bounded by the two largest concurrent tensors. At batch 8, each tensor multiplies by 8. The engineering constraint: activation memory scales as O(B * H * W * C) while weight memory is O(C_in * C_out * k^2) — independent of batch and spatial dimensions.'
  common_mistake: |
    **The Pitfall:** Explaining activations simply as 'temporary memory' without explaining how they mathematically scale.
    **The Rationale:** Candidates fail to quantify that activation tensor size scales quadratically with spatial resolution and linearly with batch size, both of which are independent of the parameter count.
    **The Consequence:** The engineer fails to grasp the root cause, leading to incorrect optimization attempts (like model pruning) when input resolution or batch size is the true culprit.
  napkin_math: |
    **Assumptions & Constraints:**
    - First expansion layer: input 112x112x16, output 112x112x96.
    - Both tensors must exist simultaneously during computation.
    - Batch size = 8.
    - Precision: FP32 (4 bytes).

    **Calculations:**
    - Size: (112x112x16 + 112x112x96) * 4 bytes = 5,619,712 bytes = ~5.6 MB.
    - At batch=8: 5.6 MB * 8 = 44.8 MB just for this layer pair.

    **Conclusion & Interpretation:**
    - **Result: ~200 MB Peak (Memory-Bound)**. With optimal memory reuse, the peak forward pass consumes ~200 MB at batch=8, dwarfing the 5 MB weight footprint.
