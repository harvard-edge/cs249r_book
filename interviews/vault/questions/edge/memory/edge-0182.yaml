title: The Real-Time Sensor Fusion Dilemma
scenario: You are designing an ECU for sensor fusion in a self-driving car. The system has 1 MB of fast on-chip SRAM and 32 MB of slower LPDDR5 DRAM. Your fusion model's weights are 2 MB. For safety, inference latency must be minimized.
question: Where should the 2 MB INT8 weights be stored given 1 MB SRAM, and what hardware should move camera data without CPU bottlenecks?
details:
  realistic_solution: The model weights must be pinned in the LPDDR5 DRAM since they exceed the SRAM capacity. To prevent the primary CPU from becoming an I/O bottleneck, a dedicated DMA (Direct Memory Access) controller must be configured to continuously stream the camera peripheral buffer into DRAM asynchronously, freeing the CPU to purely orchestrate compute dispatch.
  common_mistake: |
    **The Pitfall:** Relying on the host CPU to perform memory copy operations for sensor ingestion.
    **The Rationale:** Candidates default to standard software paradigms (`memcpy`) without considering the rigid cycle budgets of real-time embedded systems.
    **The Consequence:** The CPU is entirely consumed by I/O thrashing, starving the inference engine and violating safety-critical latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM limit: 1 MB
    - Model weights: 2 MB
    - DRAM available: 32 MB

    **Calculations:**
    - Weight Footprint (2 MB) > SRAM Capacity (1 MB)
    - Weights must reside in DRAM

    **Conclusion & Interpretation:**
    - **Result: DRAM (Memory-Capacity Bound)**. The DMA controller is strictly required to orchestrate movement into SRAM without locking the CPU.
  options:
    - 'Store weights in DRAM and have the CPU perform a `memcpy` to move camera data.'
    - 'Store weights in DRAM; use a DMA controller to move data from camera to DRAM and from DRAM to SRAM for processing.'
    - 'The model won''t fit because the 2 MB of weights are larger than the 1 MB of SRAM.'
    - 'Store weights in DRAM and have the compute engine access them directly from DRAM for every calculation.'
  correct_index: 1
