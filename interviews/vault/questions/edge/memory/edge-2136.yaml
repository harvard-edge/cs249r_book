title: Sliding Window Attention for Long Context on Jetson AGX Orin
scenario: Mistral-7B is deployed on a Jetson AGX Orin (32GB LPDDR5, 204 GB/s) using sliding window attention (SWA) with window_size=4096. The sequence length is 16K tokens, serving a batch of 2 sequences. The model has 32 layers, 8 KV heads, and a head_dim of 128.
question: For a batch of two 16K-token sequences, how do full attention and 4096-token SWA compare in KV memory and decode bandwidth?
details:
  realistic_solution: |
    Full attention KV cache for batch size 2: 2×2×8×16384×128×2B×32 = 4.29GB. SWA KV cache keeps only 4096 active tokens per sequence: 2×2×8×4096×128×2B×32 = 1.07GB, a 4× reduction in KV memory. Per-token decode bandwidth follows the same ratio. At 204 GB/s, full attention decode is about 21.0ms/token; SWA decode is about 5.3ms/token. Trade-off: tokens beyond the window have no direct attention to earlier context.
  common_mistake: |
    **The Pitfall:** Assuming SWA saves compute proportionally to the context reduction.
    **The Rationale:** It's common to conflate the O(N^2) compute savings of attention during prefill with the memory-bound nature of autoregressive decode.
    **The Consequence:** Overestimating the compute speedup while failing to accurately quantify the primary benefits: KV cache memory reduction and decode bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length: 16K tokens.
    - Batch size: 2 concurrent sequences.
    - SWA window size: 4096 tokens.
    - 32 layers, 8 KV heads, head_dim 128.
    - Memory Bandwidth: 204 GB/s.

    **Calculations:**
    - Full KV Memory: 2 batch * 2 KV * 8 * 16384 * 128 * 2 bytes * 32 = 4.29 GB.
    - SWA KV Memory: 2 batch * 2 KV * 8 * 4096 * 128 * 2 bytes * 32 = 1.07 GB.
    - Full Decode Latency: 4.29 GB / 204 GB/s = 21.0 ms/token.
    - SWA Decode Latency: 1.07 GB / 204 GB/s = 5.3 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 4x faster decode and 4x KV memory reduction (Memory-Bound).** SWA drastically cuts memory overhead and decode latency for long-context generation.
