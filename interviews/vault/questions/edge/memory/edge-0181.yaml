title: The ADAS VRAM Budget
scenario: You're an engineer on an autonomous vehicle team, tasked with deploying a new perception model onto a Jetson AGX Orin. The model has 44 million parameters and you plan to run it using FP16 precision. The framework profiler tells you that the peak memory consumed by activation tensors for a single frame is 14 MB.
question: How much VRAM do the 44M FP16 parameters require, and what total is needed after adding 14 MB of activations?
details:
  realistic_solution: The total VRAM required for inference is the sum of the memory needed for the model's parameters and the peak memory used by its activation tensors. First, calculate the parameter memory by multiplying the parameter count by the size of the data type (2 bytes for FP16). Then, add the given peak activation memory to find the true total.
  common_mistake: |
    **The Pitfall:** Only accounting for parameter memory and forgetting intermediate activation tensors.
    **The Rationale:** Model sizes are usually quoted by parameter count, leading developers to overlook the substantial memory required during forward passes, especially with large input resolutions.
    **The Consequence:** Underestimating the memory footprint and causing out-of-memory errors during runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 44,000,000 (FP16, 2 bytes/parameter).
    - Peak activation memory: 14 MB.

    **Calculations:**
    - Parameter Memory = 44,000,000 * 2 bytes = 88,000,000 bytes = 88 MB.
    - Total VRAM = 88 MB (parameters) + 14 MB (activations).

    **Conclusion & Interpretation:**
    - **Result: Total VRAM footprint is 102 MB.** VRAM budgeting requires both weight and activation buffers.
  options:
  - '~88 MB. The activation memory is temporary and doesn''t count towards the total.'
  - '~704 MB. You need to use the training memory rule of thumb (16 bytes/param).'
  - '~102 MB. The total is the sum of parameter and peak activation memory.'
  - '~58 MB. It''s 44MB for weights (INT8) plus 14MB for activations.'
  correct_index: 2
