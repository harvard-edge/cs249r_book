title: Edge TPU Activation Memory Spilling and Partitioning
scenario: You are deploying a fully INT8-quantized CNN for high-resolution vision tasks on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). During testing, you observe that inference latency is hundreds of milliseconds per frame, completely missing real-time targets, and host CPU memory usage spikes during execution. The Edge TPU compiler logs indicate the model was successfully quantized to INT8 but partitioned into multiple subgraphs.
question: Why does the INT8 Coral Edge TPU model get partitioned into subgraphs with hundreds of milliseconds of latency?
details:
  realistic_solution: 'The root cause is an activation memory overflow causing graph partitioning. High-resolution inputs produce massive intermediate feature maps. When a layer''s output activations exceed the Coral Edge TPU''s limited on-chip SRAM (~8MB), the compiler partitions the model. The Edge TPU evaluates the first partition and must offload the massive INT8 intermediate activation tensor over the USB bus to the host CPU before continuing. This host-device I/O completely dominates latency.'
  common_mistake: Assuming the 4 TOPS compute capacity is intrinsically too weak for high-resolution inputs, missing the fact that intermediate activations have exceeded on-chip memory and forced a massive host-device data transfer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Google Coral Edge TPU (4 TOPS, ~8MB SRAM)
    - USB 2.0 interface (~35 MB/s effective)
    - 1024x1024x16 INT8 intermediate feature map

    **Calculations:**
    - Activation size = 1024 * 1024 * 16 * 1 byte = 16.7 MB
    - USB transfer time = 16.7 MB / 35 MB/s = 477 ms
    - Compute time = (2 * 10^9) / (4 * 10^12) = 0.5 ms

    **Conclusion & Interpretation:**
    - **Result: ~477 ms latency (I/O-Bandwidth-Bound)**. Intermediate activations exceed SRAM, causing catastrophic host-device I/O bottlenecks over USB that are 1000x slower than actual compute.
