title: Memory Hierarchy Tradeoffs for LLM Deployment on an Edge Accelerator
scenario: You are tasked with deploying a large language model (LLM) quantized to INT8 on an edge inference accelerator. The device offers 400 TOPS INT8 peak compute, 32 GB LPDDR4x memory, about 34 GB/s memory bandwidth, and a strict 75W power budget. The LLM's parameter count is substantial, exceeding the capacity of typical on-chip caches and fast memories.
question: How do LPDDR4x capacity, bandwidth, latency, and the 75W power limit constrain real INT8 throughput for this large LLM?
details:
  realistic_solution: Start with a workload-specific memory model, not peak TOPS divided by bandwidth. A large autoregressive LLM may need to stream many gigabytes of weights per generated token, while KV-cache and activations consume part of the 32 GB capacity and add latency-sensitive reads. With only about 34 GB/s of LPDDR4x bandwidth, a model that touches even 8 GB of weights per token has an ideal transfer floor of roughly 235 ms before compute, kernel overhead, and power throttling. Fusion, tiling, smaller batches, shorter context windows, and weight/KV-cache quantization help, but the real throughput is constrained by capacity, bandwidth, latency, and the 75W sustained power envelope rather than by the 400 TOPS peak alone.
  common_mistake: |
    **The Pitfall:** Overemphasizing peak compute (TOPS) while ignoring memory bandwidth.
    **The Rationale:** Candidates often assume memory access is infinitely fast or ignore the power cost of memory transfers, focusing purely on theoretical INT8 throughput.
    **The Consequence:** An incomplete analysis that misses the real-world operational intensity requirements needed to prevent memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute capacity: 400 TOPS INT8 peak.
    - LPDDR4x bandwidth: 34 GB/s peak.
    - Example INT8 LLM working set touched per generated token: 8 GB of weights plus KV-cache reads/writes.
    - Capacity: 32 GB total for weights, KV-cache, activations, runtime buffers, and OS/driver reservations.

    **Calculations:**
    - Weight-streaming floor = 8 GB / 34 GB/s = 0.235 s = 235 ms per token before KV-cache and kernel overhead.
    - A 32 GB memory limit cannot hold a 32B-parameter INT8 model plus KV-cache and buffers; practical capacity must be lower than the headline memory size.
    - The 75W envelope limits sustained memory and compute clocks, so measured bandwidth and TOPS may be below peak during continuous generation.

    **Conclusion & Interpretation:**
    - **Result: workload memory-bound unless data reuse is high and the model comfortably fits.** Capacity limits model/context size, bandwidth sets a per-token latency floor, latency hurts small-batch generation, and the 75W limit caps sustained throughput.
