title: The Edge GPU Memory Bandwidth
scenario: 'Your team developed a YOLOv8-L model that runs at 60 FPS on a desktop RTX 4090 (1 TB/s GDDR6X bandwidth, 1321 TOPS INT8). You need to deploy the same model on a Jetson Orin NX (102.4 GB/s LPDDR5, 100 TOPS INT8). Your colleague calculates: ''The Orin has 100/1321 = 7.6% of the 4090''s compute, so we''ll get 60 × 0.076 = 4.5 FPS.'' But the actual result is 8 FPS.'
question: Why is the colleague's estimate wrong in both directions — too pessimistic about compute, too optimistic about the real bottleneck?
details:
  realistic_solution: The colleague's estimate is wrong because peak TOPS is the wrong scaling signal for this deployment. On the RTX 4090, the roofline ridge point is 1321 TOPS / 1000 GB/s = ~1321 ops/byte, so a ~600 ops/byte YOLO workload can still be compute-limited there. On the Orin NX, the ridge point is 100 TOPS / 102.4 GB/s = ~977 ops/byte, so the same workload is closer to the memory-bandwidth limit and can use only about 600 ops/byte × 102.4 GB/s = 61 TOPS before memory traffic dominates. Scaling the 4090 result by peak TOPS predicts 4.5 FPS, but scaling by the Orin's attainable 61 TOPS versus its 100 TOPS peak gives a less pessimistic compute ceiling. The observed 8 FPS is plausible because the Orin run is partly memory-bound and benefits from TensorRT layer fusion and lower memory traffic; the lesson is to compare ridge points and effective bandwidth, not just peak TOPS.
  common_mistake: |
    **The Pitfall:** "Performance scales linearly with TOPS."
    **The Rationale:** This assumes the workload is compute-bound on both platforms, which is almost never true for the same model on different hardware.
    **The Consequence:** Engineers completely misestimate expected FPS on new hardware because they do not realize the model is bottlenecked by memory bandwidth, not compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - RTX 4090: 1 TB/s BW, 1321 TOPS.
    - Orin NX: 102.4 GB/s BW, 100 TOPS.
    - Approximate YOLOv8-L arithmetic intensity: 600 ops/byte.

    **Calculations:**
    - Peak TOPS ratio: 1321 / 100 = 13.2x, so naive FPS = 60 / 13.2 = 4.5 FPS.
    - 4090 ridge point: 1321 TOPS / 1000 GB/s = 1321 ops/byte; AI=600 is below the ridge, so peak compute can still matter.
    - Orin ridge point: 100 TOPS / 102.4 GB/s = 977 ops/byte; AI=600 is below peak-compute balance but attainable compute is capped by memory traffic at 600 * 102.4 GB/s = 61.4 TOPS.
    - Orin effective TOPS fraction: 61.4 / 100 = 0.61, so a purely TOPS-based 4.5 FPS estimate can be too pessimistic if the deployed engine reduces traffic and uses the available bandwidth well.

    **Conclusion & Interpretation:**
    - **Result: 8 FPS is plausible but not derivable from peak TOPS alone.** The Orin run is constrained by attainable bandwidth and layer memory traffic, while the 4090 baseline is not evidence that both devices are memory-bound.
  options:
    - The latency is dominated by data preprocessing on the CPU; moving to GPU-accelerated preprocessing will resolve the bottleneck.
    - Performance scales linearly with TOPS. This assumes the workload is compute-bound on both platforms and ignores memory traffic and layer fusion.
    - "The colleague's estimate is wrong because peak TOPS alone misses the roofline: the Orin run is limited by attainable memory bandwidth and effective layer traffic, while the 4090 baseline does not prove both devices have the same bottleneck."
    - INT8 quantization reduces model size by 8x compared to FP32, so inference speed should also improve by exactly 8x.
  correct_index: 2
