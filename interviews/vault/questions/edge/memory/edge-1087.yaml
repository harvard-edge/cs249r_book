title: 'Model Size Estimation: Compare MobileNetV3-Large and EfficientNet-B3 INT8 Edge Memory'
scenario: You are evaluating MobileNetV3-Large (5.4M params, 219M MACs) and EfficientNet-B3 (12M params, 1.8B MACs) for deployment on an edge device at batch size 8.
question: How do MobileNetV3-Large and EfficientNet-B3 compare in INT8 TensorRT memory, latency, and accuracy per MB?
details:
  realistic_solution: MobileNetV3-Large INT8 under TensorRT requires ~28.2MB at batch 8 and has about 438M operations per inference from 219M MACs. EfficientNet-B3 INT8 requires ~56.8MB and has about 3.6B operations from 1.8B MACs. On a 20 TOPS effective INT8 edge budget, the ideal compute-only latencies are ~0.022ms and ~0.18ms respectively, so EfficientNet-B3 is roughly 8.2x heavier before memory effects. EfficientNet-B3 has higher absolute accuracy, but MobileNetV3-Large provides higher accuracy per MB (2.67 vs. 1.45 acc%/MB) and much lower latency, making it the better memory- and latency-constrained topology.
  common_mistake: |
    **The Pitfall:** Using MACs as the sole proxy for inference latency.
    **The Rationale:** Candidates ignore that EfficientNet's compound scaling creates more memory-bandwidth-intensive patterns compared to MobileNet's depthwise separable convolutions.
    **The Consequence:** Inaccurately estimating performance by failing to account for the memory wall.
  napkin_math: |
    **Assumptions & Constraints:**
       - MobileNetV3-Large INT8 TRT: 7 MB weights, 20 MB activations/workspace, 0.15 MB input per item
       - EfficientNet-B3 INT8 TRT: 15.6 MB weights, 40 MB activations/workspace, 0.15 MB input per item
       - Batch size: 8
       - Effective edge INT8 throughput for latency comparison: 20 TOPS.
    **Calculations:**
       - MobileNetV3-Large Memory: 7 + 20 + (8 * 0.15) = 28.2 MB
       - EfficientNet-B3 Memory: 15.6 + 40 + (8 * 0.15) = 56.8 MB
       - MobileNetV3-Large ideal latency: 219M MACs * 2 ops/MAC / 20 TOPS = 0.0219 ms
       - EfficientNet-B3 ideal latency: 1.8B MACs * 2 ops/MAC / 20 TOPS = 0.18 ms
       - MobileNetV3-Large Efficiency: 75.2% / 28.2 MB = 2.67 acc%/MB
       - EfficientNet-B3 Efficiency: 82.1% / 56.8 MB = 1.45 acc%/MB
    **Conclusion & Interpretation:**
       - **Result: Memory- and Latency-Bound Tradeoff.** EfficientNet-B3 delivers higher absolute accuracy, but MobileNetV3-Large yields 1.8x more accuracy per MB and about 8.2x lower ideal compute latency.
