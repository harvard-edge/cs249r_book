title: 'Diagnosing SRAM Thrashing in Edge Accelerators'
scenario: 'You are deploying an INT8 object detection model on an edge AI accelerator equipped with exactly 2.0MB of on-chip SRAM and external LPDDR4 DRAM. The model consists of 1.8MB of weights and requires 800KB for peak intermediate activations. During performance profiling, you observe that inference latency is 3x slower than the theoretical compute-bound roofline limit, and the system power consumption is significantly higher than expected.'
question: 'How do you diagnose the root cause of this memory anomaly and its associated power spike?'
details:
  realistic_solution: 'The root cause is SRAM capacity overflow. The combined footprint of weights (1.8MB) and peak activations (0.8MB) is 2.6MB, exceeding the 2.0MB SRAM limit. This forces continuous eviction and fetching of tensors from external DRAM. Diagnosis involves profiling DRAM bandwidth utilization or SRAM miss rates. The solution is to apply operator fusion to reduce the peak activation size or use depth-first inference scheduling to keep the active working set under 2.0MB.'
  common_mistake: |
    **The Pitfall:** Assuming weights can be permanently pinned in fast memory just because they fit alone.
    **The Rationale:** Candidates verify the 1.8MB weights are smaller than the 2.0MB SRAM, completely forgetting to add the memory footprint of the intermediate activations required during inference.
    **The Consequence:** The combined footprint overflows SRAM, causing continuous cache misses, DRAM thrashing, and massive power spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-chip SRAM Capacity: 2.0MB.
    - Weights: 1.8MB.
    - Peak activations: 0.8MB.
    - DRAM energy cost (~100 pJ/bit) vs SRAM (~1 pJ/bit) is 100x higher.

    **Calculations:**
    - Total footprint required: 1.8MB (weights) + 0.8MB (activations) = 2.6MB.
    - Deficit: 2.6MB - 2.0MB = 0.6MB of overflow forces continuous LPDDR4 DRAM spillage.
    - Transferring 1.8MB of weights per frame: 1.8MB * 8 bits/byte * 100 pJ/bit = ~1.44mJ per frame.

    **Conclusion & Interpretation:**
    - **Result: 2.6MB Footprint (Memory-Bound)**. SRAM capacity is exceeded, causing continuous cache misses, DRAM thrashing, and massive power spikes.
  options:
  - 'The power budget should be managed at the application level by adding sleep intervals between inferences.'
  - 'Running inference at lower clock speeds increases total energy consumption because the task takes longer.'
  - 'SRAM capacity is exceeded by the combined 2.6MB footprint of weights and activations, forcing continuous eviction to external DRAM.'
  - 'The external LPDDR4 DRAM is malfunctioning and sending corrupted weights to the SRAM, causing cache misses.'
