title: Qualcomm Cloud AI 100 Physical Memory Capacity Recall
scenario: 'You are tasked with porting an established inference pipeline to an on-premise server powered by the Qualcomm Cloud AI 100, which delivers 400 TOPS INT8 within a strict 75W power envelope. The team is concerned about potential out-of-memory (OOM) exceptions and memory fragmentation during peak operations.'
question: What is the total memory capacity and specific memory technology used on the Qualcomm Cloud AI 100?
details:
  realistic_solution: 'The candidate must clearly state that the Qualcomm Cloud AI 100 features exactly 32 GB of LPDDR4x memory. Knowing this exact specification is foundational for establishing hard boundaries on batch sizes and sequence lengths to avoid memory fragmentation. Memory pressure management strategies on this hardware must be fundamentally tailored to the capacity limitations of LPDDR4x rather than relying on massive data center memory pools.'
  common_mistake: |
    **The Pitfall:** Describing high-bandwidth memory (HBM2/HBM3) typical of large data center GPUs.
    **The Rationale:** Candidates project cloud GPU specs onto specialized edge inference accelerators.
    **The Consequence:** Designing memory pressure strategies that drastically exceed the hardware's thermal and power-constrained LPDDR4x capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Device Memory: 32.0 GB LPDDR4x.
    - Overhead: Assume 2.0 GB is reserved for OS and driver overhead, leaving 30.0 GB usable.
    - Safety Buffer: A 10% safety buffer is 3.0 GB.

    **Calculations:**
    - Maximum Combined Footprint: 30.0 GB - 3.0 GB = 27.0 GB.

    **Conclusion & Interpretation:**
    - **Result: 27.0 GB (Memory-Bound)**. The absolute maximum combined footprint for weights and activations is strictly capped at 27.0 GB.
