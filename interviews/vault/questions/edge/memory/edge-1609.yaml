title: DMA Overhead vs Compute on Cloud AI 100
scenario: A Cloud AI 100 accelerator (400 TOPS) processes 16 uncompressed 4K frames via DMA over a 12 GB/s PCIe link. The model requires 200 GOPS/frame.
question: Assuming no pipelining between transfer and compute, what are the DMA transfer time, compute time, and their ratio for the 16 uncompressed 4K frames?
details:
  realistic_solution: To find the bottleneck, quantify DMA transfer time versus compute time. Calculate total payload size for the batch and divide by PCIe bandwidth. Comparing reveals data movement strictly dominates, prompting a need for host-side compression or pipelining.
  common_mistake: |
    **The Pitfall:** Failing to realize that 400 TOPS processes data magnitudes faster than PCIe can deliver it.
    **The Rationale:** Engineers often forget to account for the byte size of uncompressed RGB frames or mix up GB/s with Gbps.
    **The Consequence:** Designing a pipeline where an expensive edge accelerator sits idle 80% of the time waiting for memory transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16x 4K RGB frames.
    - PCIe bandwidth = 12 GB/s.
    - Compute = 200 GOPS/frame.
    - Peak AI 100 = 400 TOPS.

    **Calculations:**
    - Payload = 3840 * 2160 * 3 * 16 = 398.08 MB.
    - DMA Time = 398.08 MB / 12,000 MB/s = 33.17 ms.
    - Compute = (16 * 200 GOPS) / 400 TOPS = 3.2 TOPS / 400 TOPS = 8 ms.

    **Conclusion & Interpretation:**
    - **Result: 4.15:1 Data-to-Compute Ratio (PCIe-Bandwidth-Bound)**. The massive 400 TOPS accelerator sits idle 80% of the time waiting for PCIe transfers.
