title: Debugging OOM in Edge Device Finetuning
scenario: You are fine-tuning a 7B parameter LLM on a high-end edge device with 16GB of unified memory using LoRA (rank 8) and an AdamW optimizer (8-bit states). Despite the low-rank adaptation drastically reducing optimizer state memory, the training process crashes with an Out-Of-Memory (OOM) error halfway through the first epoch when processing a batch size of 1 with sequence length 4096.
question: 'What is causing the OOM during 4096-token LoRA fine-tuning on 16GB memory, and what software mitigation would you use?'
details:
  realistic_solution: 'Diagnose that activation memory for the 4096 sequence length is causing the OOM. Implement Gradient Checkpointing to recompute activations during the backward pass, trading a ~30% increase in computation time for a massive reduction in peak memory, fitting the process within the 16GB budget.'
  common_mistake: |
    **The Pitfall:** Assuming parameter weights or optimizer states are the bottleneck for OOM.
    **The Rationale:** Candidates focus on static memory allocation, ignoring the immense dynamic footprint of storing forward activations for the backward pass.
    **The Consequence:** Complete failure to fine-tune on edge hardware due to persistent out-of-memory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B INT4 = 3.5GB; LoRA + Adam = 1GB
    - L=4096, hidden=4096, 32 layers, b=1, FP16
    - Total RAM: 16GB

    **Calculations:**
    - Transformer activation rule of thumb: ~34 bytes/token/dim/layer
    - Activation Memory = 34 * 4096 * 4096 * 32 = ~18.2 GB
    - Total Memory = 3.5 + 1.0 + 18.2 = 22.7 GB

    **Conclusion & Interpretation:**
    - **Result: 22.7 GB > 16 GB (Memory-Bound)**. Activation memory causes OOM, needing Gradient Checkpointing.
