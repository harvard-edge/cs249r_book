title: Applying Zero-Copy Unified Memory Architectures
scenario: An LLM runs on an edge SoC with 32GB of RAM shared between the ARM CPU and integrated GPU.
question: Why is Zero-Copy advantageous for feeding camera input directly to the GPU in a Unified Memory Architecture?
details:
  realistic_solution: |
    In a Unified Memory Architecture (UMA), the CPU and integrated GPU share the same physical LPDDR memory pool. A zero-copy camera buffer lets the CPU-side capture path and GPU-side preprocessing reference the same physical frame storage, avoiding an extra host-to-device staging copy. The GPU still reads the frame through the shared memory system and may pay cache, coherency, and access-latency costs, but the design removes redundant memory-to-memory copies before LLM or vision preprocessing.
  common_mistake: |
    **The Pitfall:** Assuming unified memory automatically skips all memory copies.
    **The Rationale:** Believing that because CPU and GPU share the same physical RAM chip, the driver handles zero-copy routing automatically for all tensors.
    **The Consequence:** Writing sub-optimal code that still incurs heavy memory-to-memory staging overhead, completely negating the unified memory advantage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Unified Memory Architecture (UMA) on Edge SoC.
    - Frame Size: 4K RGB = 3840 * 2160 * 3 bytes = 24,883,200 bytes ≈ 23.7 MiB.

    **Calculations:**
    - Staged UMA path: camera/CPU writes the frame, then a separate copy writes another GPU-visible buffer, then the GPU reads that buffer.
    - Zero-copy path: camera/CPU writes the shared buffer once, and the GPU reads the same physical buffer.
    - Avoided copy traffic: about one extra frame-sized memory-to-memory copy, roughly 23.7 MiB per 4K RGB frame.

    **Conclusion & Interpretation:**
    - **Result: One frame copy avoided, not zero memory traffic (Memory Bus-Bound).** Zero-copy saves bandwidth by removing staging copies, while the GPU still consumes shared-memory bandwidth to read the frame.
