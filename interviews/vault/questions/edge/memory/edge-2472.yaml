title: Applying Zero-Copy Unified Memory Architectures
scenario: An LLM runs on an edge SoC with 32GB of RAM shared between the ARM CPU and integrated GPU.
question: Why is Zero-Copy advantageous for feeding camera input directly to the GPU in a Unified Memory Architecture?
details:
  realistic_solution: |
    In a Unified Memory Architecture (UMA), the CPU and GPU are physically wired to the same LPDDR memory controller. By utilizing Zero-Copy memory allocation (e.g., `cudaHostAlloc`), the CPU driver pins the camera buffer directly in the shared physical RAM. The GPU can then dereference this pointer instantly without invoking a DMA engine to copy the payload across a PCIe bus, fully conserving memory bandwidth for the heavy autoregressive LLM decoding phase.
  common_mistake: |
    **The Pitfall:** Assuming unified memory automatically skips all memory copies.
    **The Rationale:** Believing that because CPU and GPU share the same physical RAM chip, the driver handles zero-copy routing automatically for all tensors.
    **The Consequence:** Writing sub-optimal code that still incurs heavy memory-to-memory staging overhead, completely negating the unified memory advantage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Unified Memory Architecture (UMA) on Edge SoC.
    - Frame Size: 4K RGB (24 MB).

    **Calculations:**
    - Standard DMA: 1 CPU write (24 MB) + 1 PCIe Bus read/write (24 MB) + 1 GPU read (24 MB) = 3 trips.
    - Zero-Copy: 1 CPU write (24 MB) + 1 GPU read via shared pointer (24 MB) = 0 Bus Copies.
    - Bandwidth Saved: 100% of the host-to-device transport payload.

    **Conclusion & Interpretation:**
    - **Result: 0 MB/s bus transfer overhead (Memory Bus-Bound)**. Eliminated via Zero-Copy.
