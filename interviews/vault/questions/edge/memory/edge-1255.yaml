title: On-Device Fine-Tuning Checkpoint Architecture for Jetson Orin
scenario: Your team is designing a continuous learning system for an autonomous drone using an NVIDIA Jetson Orin module. The system must fine-tune a large Vision Transformer locally to adapt to new environments. The Orin is constrained by its 32 GB LPDDR5 unified memory and a strict 60W TDP.
question: How would you architect a gradient checkpointing strategy to fine-tune the ViT within the 32 GB memory and 60W TDP constraints?
details:
  realistic_solution: Adopt selective gradient checkpointing. Naively caching all activations triggers OOM (36 GB > 32 GB). Instead, store checkpoints at block boundaries such as every 4th transformer layer and discard intermediate MLP and attention states. During the backward pass, recompute the missing layers inside each segment. To stay within the 60W TDP, use a fixed low-power mode, cap training batch/concurrency, and choose the checkpoint interval from measured thermal headroom rather than minimizing memory at any compute cost.
  common_mistake: |
    **The Pitfall:** Proposing simplistic checkpoint-every-layer strategies.
    **The Rationale:** Candidates focus only on minimizing memory footprint without considering the power cost of recomputation.
    **The Consequence:** The device throttles or exceeds the 60W TDP. They also forget the 32 GB memory is shared with the OS, CPU, and DLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 24 transformer layers, 1.5 GB activations per layer.
    - Memory limit: 32 GB shared LPDDR5.
    - Checkpoint interval: Every 4th layer.

    **Calculations:**
    - Full activation memory: 24 layers * 1.5 GB = 36 GB (OOM).
        - Checkpointed memory (6 stored layer boundaries): 6 * 1.5 GB = 9.0 GB.
        - During backward, the 3 non-checkpointed layers inside each 4-layer segment are recomputed one segment at a time; their transient workspace is implementation-dependent rather than another stored 4.5 GB cache.
        - Peak saved-activation memory is therefore about 9.0 GB plus a bounded transient workspace, not 36 GB.
        - Recompute work is up to 18 layer-forwards per backward pass (3 recomputed layers * 6 segments), so power must be controlled with clocks, batch size, or duty cycle.

    **Conclusion & Interpretation:**
        - **Result: about 9.0 GB saved activations plus transient workspace (Memory Capacity Bound)**. Selective checkpointing can fit the fine-tuning workload into memory, but the recomputation overhead must be bounded by the 60W thermal and power envelope.
