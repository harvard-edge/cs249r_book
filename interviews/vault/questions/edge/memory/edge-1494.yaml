title: Architecting Unified Memory for Concurrent Edge Models
scenario: You are leading the design of an autonomous robotics payload deployed on an NVIDIA Jetson Orin (32 GB LPDDR5 shared memory, Ampere GPU + DLA accelerator, 60W TDP). The system must concurrently run a 14B parameter LLM for reasoning and a high-resolution vision transformer (ViT) for real-time perception.
question: How would you budget the Jetson Orin's 32 GB shared memory so the 14B LLM and ViT never OOM during concurrent inference?
details:
  realistic_solution: The optimal design explicitly partitions the unified memory, reserving 4-6 GB for the OS, camera buffers, and runtime overhead. The 14B LLM should be quantized to INT4 if accuracy allows, with its KV-cache capped from the model's layer count, hidden size, precision, and maximum context length. The ViT should have a separate peak-activation budget, and the runtime should use memory pools for transient buffers while preventing preprocessing, fragmentation, and concurrent model peaks from consuming the KV-cache reserve.
  common_mistake: |
    **The Pitfall:** Candidates often treat the 32 GB LPDDR5 as dedicated GPU VRAM, forgetting it is unified memory that must also accommodate the OS, CPU processes, and camera buffers. They also frequently overlook the unbounded growth of the KV-cache during long contexts and fail to design a strict capping mechanism.
    **The Rationale:** Unified memory pressure comes from several owners at once: LLM weights, KV-cache, ViT activations, preprocessing buffers, driver allocations, and fragmentation. The KV-cache grows linearly with context length, so a design that fits at startup can still OOM later.
    **The Consequence:** Long requests or concurrent vision bursts can evict buffers, trigger allocation failures, or force severe paging-like stalls, causing missed deadlines even though the nominal model weights fit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Unified Memory: 32 GB.
    - OS/System Buffer Reserve: 6 GB.
    - 14B LLM INT4 weights plus scales/metadata: ~8 GB.
    - LLM shape for KV estimate: 40 layers, hidden size 5120, FP16 key and value cache.
    - ViT-Large budget: 0.6 GB weights + 1.4 GB peak activations.
    - Runtime, camera, and fragmentation reserve: 3 GB.

    **Calculations:**
    - Available after OS reserve: 32 GB - 6 GB = 26 GB.
    - Fixed AI/runtime footprint: 8 GB LLM weights + 2 GB ViT + 3 GB reserve = 13 GB.
    - Remaining for LLM KV-cache: 26 GB - 13 GB = 13 GB.
    - KV-cache per token: 2 * 40 layers * 5120 values * 2 bytes = 819,200 bytes = ~0.78 MiB/token.
    - KV-cache for 12,000 tokens: 12,000 * 0.78 MiB = ~9.2 GiB.
    - Safety margin: 13 GB - ~9.2 GiB = roughly 3-4 GB, depending on GB/GiB accounting.

    **Conclusion & Interpretation:**
    - **Result: 12k-token cap is plausible but not unlimited.** The budget leaves only a few GB of safety margin, so the system must enforce KV-cache limits and reserve memory for ViT peaks, preprocessing, and allocator fragmentation.
