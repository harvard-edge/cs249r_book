title: Safe A/B Testing on Storage-Constrained Edge
scenario: 500,000 autonomous vacuums run on an MCU with 16MB of total flash storage. The OS takes 8MB. The current navigation model (V1) is 6MB. The new model (V2) is 5.5MB.
question: How would you A/B test V2 across 500,000 vacuums when V1 and V2 cannot both fit in 16MB flash?
details:
  realistic_solution: |
    Since V1 and V2 cannot both fit in flash, run the A/B test by assigning devices to mutually exclusive cohorts in the cloud registry or feature-flag service. Each device installs exactly one navigation model image: control devices keep V1 and treatment devices receive V2. Safety comes from a preplanned OTA rollback path that can atomically replace the model partition, plus a minimal OS-resident safe-navigation mode for docking or stopping if the active model fails. The rollback plan must not depend on both full models being resident at once.
  common_mistake: |
    **The Pitfall:** Attempting a shadow deployment or instant fallback on a storage-bound device.
    **The Rationale:** Candidates are used to cloud environments where storing a backup model locally is trivial and safe.
    **The Consequence:** Attempting to force both models onto flash can fail the update or leave too little headroom for safe rollback, causing field devices to enter recovery mode or require a corrective OTA campaign.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard Limit: 16MB flash
       - Components: 8MB OS, 6MB V1 Model, 5.5MB V2 Model
       - Fallback Network: 10 Mbps
    2. **Calculations:**
       - Dual-Model: 8MB + 6MB + 5.5MB = 19.5 MB (>16MB Limit)
       - Single-Partition: 8MB + max(6MB, 5.5MB) = 14 MB (Leaves 2MB headroom)
       - OTA replacement download for rollback: 6MB / 1.25 MB/s = ~4.8 seconds at 10 Mbps, before protocol overhead and install verification.
    3. **Conclusion & Interpretation:**
       - **Result: Storage Capacity-Bound.** A dual-model shadow test does not fit. Use registry-level disjoint cohorts with one model installed per device, and rely on an atomic OTA replacement plus OS-resident safe mode for rollback rather than local V1/V2 coexistence.
