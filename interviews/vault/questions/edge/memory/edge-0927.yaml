title: Safe A/B Testing on Storage-Constrained Edge
scenario: 500,000 autonomous vacuums run on an MCU with 16MB of total flash storage. The OS takes 8MB. The current navigation model (V1) is 6MB. The new model (V2) is 5.5MB.
question: How would you A/B test V2 across 500,000 vacuums when V1 and V2 cannot both fit in 16MB flash?
details:
  realistic_solution: 'Since both models exceed available flash when combined, you must partition the fleet into mutually exclusive A and B groups at the cloud registry. To ensure safe deployment without a local fallback model, utilize a hardware watchdog timer and an algorithmic minimal fallback in the OS. If V2 faults, the watchdog resets the device, the OS boots into safe mode, navigates to the dock, and triggers an OTA fetch to download V1.'
  common_mistake: |
    **The Pitfall:** Attempting a shadow deployment or instant fallback on a storage-bound device.
    **The Rationale:** Candidates are used to cloud environments where storing a backup model locally is trivial and safe.
    **The Consequence:** Attempting to force both models onto the flash memory causes an immediate Out-Of-Memory error, irreversibly bricking the edge device in the field.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard Limit: 16MB flash
       - Components: 8MB OS, 6MB V1 Model, 5.5MB V2 Model
       - Fallback Network: 10 Mbps
    2. **Calculations:**
       - Dual-Model: 8MB + 6MB + 5.5MB = 19.5 MB (>16MB Limit)
       - Single-Partition: 8MB + max(6MB, 5.5MB) = 14 MB (Leaves 2MB headroom)
       - Fallback Download: 6MB / 1.25 MB/s = ~4.8 seconds
    3. **Conclusion & Interpretation:**
       - **Result: Storage Capacity-Bound.** A dual-model shadow test guarantees device failure. Partitioning the fleet and relying on an algorithmic OS watchdog to OTA fetch the 6MB V1 in ~4.8s is the only safe procedure.
