title: DRAM Bandwidth for 30 FPS Inference
scenario: Your edge device has LPDDR4x memory with 25.6 GB/s bandwidth, shared between the CPU, GPU, ISP, and display controller. You need to run a segmentation model (DeepLabv3-MobileNetV2, 2.7 GFLOPs, 2.1M params INT8) at 30 FPS on the GPU. The ISP consumes 4 GB/s for 1080p camera processing, and the display controller uses 2 GB/s. Estimate whether you have enough DRAM bandwidth for 30 FPS inference.
question: Do you have enough DRAM bandwidth to run DeepLabv3-MobileNetV2 at 30 FPS alongside the ISP and display?
details:
  realistic_solution: |
    The average DRAM bandwidth is sufficient: 2.1M INT8 parameters are about 2.1 MB of weights, so weight streaming at 30 FPS is only 0.063 GB/s. Adding the ISP and display gives about 6.063 GB/s average demand, well below 25.6 GB/s. The remaining engineering risk is burst contention and activation traffic during GPU inference, so scheduling and profiling still matter, but the steady-state bandwidth estimate is not over budget.
  common_mistake: |
    **The Pitfall:** Only calculating weight read bandwidth and ignoring activation traffic.
    **The Rationale:** Candidates assume model weights dominate memory I/O, forgetting that segmentation models maintain massive spatial feature maps.
    **The Consequence:** The estimate can miss burst contention and activation traffic, leading to latency spikes even when the average bandwidth looks safe.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR4x bandwidth: 25.6 GB/s
    - GPU target: 30 FPS
    - ISP average: 4 GB/s (bursts 8 GB/s for 2ms)
    - Display controller: 2 GB/s
    - GPU model requirements: 2.7 GFLOPs, 2.1M INT8 params = about 2.1 MB weights

    **Calculations:**
    - Weight bandwidth = 2.1 MB * 30 FPS = 63 MB/s
    - Total average system bandwidth = 0.063 + 4.0 + 2.0 = 6.063 GB/s (well within 25.6 GB/s)
    - Instantaneous burst demand = 0.063 (GPU) + 8.0 (ISP) + 2.0 (Display) = 10.063 GB/s

    **Conclusion & Interpretation:**
    - **Result: Average bandwidth is sufficient.** Even with the stated ISP burst, the listed steady demands remain below 25.6 GB/s, though real activation traffic and burst scheduling should be profiled.
  options:
    - Yes, the stated average demand is about 6.063 GB/s, well below 25.6 GB/s; still profile activation traffic and ISP bursts for latency spikes.
    - Yes, model weights are 2.1 MB, so at 30 FPS it only uses 63 MB/s, which is <1% of 25.6 GB/s.
    - No, the ISP continuous read of 4 GB/s plus the GPU's 13.3 GB/s burst will exceed 25.6 GB/s.
    - No, deep segmentation models require at least 32 GB/s of bandwidth due to self-attention activation mapping.
