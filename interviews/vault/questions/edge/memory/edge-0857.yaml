title: Diagnosing OOMs in Sparse Federated Learning
scenario: A high-end wearable edge prototype with a tight RAM budget runs a 50M parameter local model. Top-k sparse gradient updates (k=1%) reduced the BLE transfer payload from a 200MB dense FP32 gradient to a 4MB sparse update, but enabling error feedback caused a 400% spike in Out-Of-Memory (OOM) crashes during local training.
question: Why did reducing the network payload cause the edge devices to run out of memory?
details:
  realistic_solution: The OOM crash originates from confusing network payload savings with local memory savings. Error Feedback (EF) keeps the un-transmitted residual gradients so sparse SGD remains convergent. Even though only the top 1% values and indices are sent over BLE, the device must allocate a persistent dense FP32 residual tensor with one entry per model parameter. For a 50M parameter model that is an additional 200MB local allocation on top of weights, activations, gradients, and runtime buffers.
  common_mistake: |
    **The Pitfall:** Blaming the transient memory overhead of the argsort algorithm.
    **The Rationale:** Focusing on the active computation step while ignoring the persistent state required by advanced sparse optimization algorithms.
    **The Consequence:** Misdiagnosing the OOM root cause and rewriting sorting functions while the device continues to crash from the 200MB tensor allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M parameters.
    - Dense payload (FP32): 50M * 4 bytes = 200 MB.
    - Sparse index format: one 32-bit index per transmitted value.
    - Top-1% Payload: 0.5M * 4 bytes (values) + 0.5M * 4 bytes (indices) = 4 MB.

    **Calculations:**
    - Network transfer drops from 200MB dense to 4MB sparse.
    - Error Feedback residual state remains dense: 50M parameters * 4 bytes = +200 MB persistent local RAM.

    **Conclusion & Interpretation:**
    - **Result: +200 MB persistent local allocation (Memory-Capacity Bound).** The 196MB network-payload reduction does not reduce local training memory; EF adds a dense residual tensor that can push the wearable over its peak RAM budget.
