title: Coral Edge TPU Activation Memory Sizing
scenario: You are deploying a vision model to a Google Coral Edge TPU (USB form factor) operating at a 2W power envelope. To fully utilize the 4 TOPS hardware capabilities, the model is fully quantized to INT8 due to limited operator support. The TPU features exactly 8MB of on-chip SRAM, and exceeding this limit forces OS-level eviction and severe latency penalties across the USB bus.
question: What is the maximum safe batch size given 8 MB SRAM, 4.8 MB weights, 0.2 MB driver reserve, and 750 KB activations per frame?
details:
  realistic_solution: To avoid catastrophic USB swapping latency and OOM conditions, the entire execution state must fit within the 8MB SRAM. The correct approach is to calculate the remaining available SRAM by subtracting the static requirements (weights and driver overhead) from the total memory. We then divide this remaining capacity by the per-frame activation memory and take the floor of the result to find the maximum safe batch size.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the INT8 quantization factor to the intermediate activations.
    **The Rationale:** Candidates calculate activations as FP32 or FP16 out of habit and fail to floor the final batch size.
    **The Consequence:** They configure a batch size of 5 or 6, causing immediate SRAM overflow and catastrophic USB swapping latency.
  napkin_math: |
    1. Assumptions & Constraints:
       - Total SRAM: 8.0 MB (8192 KB)
       - Static weights: 4.8 MB
       - Driver overhead: 0.2 MB
       - Per-frame activation memory: 750 KB
    2. Calculations:
       - Static memory total = 4.8 MB + 0.2 MB = 5.0 MB (5120 KB)
       - Available activation memory = 8192 KB - 5120 KB = 3072 KB
       - Maximum batch size = floor(3072 KB / 750 KB) = floor(4.096) = 4 frames
    3. Conclusion & Interpretation:
       - **Result: Memory-Bound. The maximum safe batch size is exactly 4 frames to avoid USB swapping.**
