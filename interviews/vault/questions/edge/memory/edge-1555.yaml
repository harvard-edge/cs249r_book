title: Dual-Model Memory Management on Edge TPU
scenario: 'You are deploying a sequential vision pipeline on a Google Coral Edge TPU. The pipeline consists of a 6MB detection model and a 4MB classification model, all quantized to INT8. The Coral has 8MB of on-chip SRAM. Option A: keep the 6MB detector resident, then swap in the 4MB classifier over USB 3.0 for each frame. Option B: co-compile both models, forcing 2MB of intermediate INT8 activations to spill to host memory 10 times per frame over USB.'
question: With 8 MB Coral SRAM, should you swap the 4 MB model over USB or spill 2 MB activations, and which has lower latency?
details:
  realistic_solution: Option A is the superior choice. While swapping a model over USB incurs a latency penalty, it is a single, contiguous bulk transfer. Option B requires spilling and fetching intermediate INT8 activations multiple times during the forward pass. USB 3.0 has high protocol overhead for frequent, small, synchronous transfers. The optimal engineering decision is to swap the smaller model entirely per batch or per frame rather than thrashing the host-to-device bus with activation data. Confirm USB transaction overheads via nsys profiling.
  common_mistake: |
    **The Pitfall:** Assuming full model swapping is always a catastrophic anti-pattern.
    **The Rationale:** Candidates fail to evaluate the USB bus protocol overhead for frequent small synchronous transfers versus a single bulk transfer.
    **The Consequence:** They choose Option B, incurring massively higher transaction overhead and worsening latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Effective USB 3.0 transfer bandwidth: ~400 MB/s.
    - SRAM capacity: 8MB, so the 6MB detector and 4MB classifier cannot both remain resident.
    - Compare only the extra host-device transfer latency introduced by each memory strategy.
    - The 6MB detector is already resident for Option A; only the classifier swap is counted as per-frame traffic.
    - Each activation spill requires a write to host and a later fetch back to the accelerator.

    **Calculations:**
    - Option A (Model Swap): transfer the 4MB classifier once per frame, so 4MB / 400 MB/s = 10ms.
    - Option B (Activation Spill): 2MB spilled * 10 points * 2 directions = 40MB per frame.
    - Option B transfer floor = 40MB / 400 MB/s = 100ms before repeated USB transaction overhead.
    - Option B also pays repeated synchronous transfer overhead, while Option A is one bulk transfer.

    **Conclusion & Interpretation:**
    - **Result: Option A has lower transfer latency (I/O-Bound).** Swapping the 4MB classifier once costs about 10ms, versus at least 100ms for round-trip activation spills.
