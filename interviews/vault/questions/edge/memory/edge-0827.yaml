title: 'On-Device Continual Learning: EWC vs Replay Buffers'
scenario: 'You are architecting an on-device personalization system for a 50M parameter (FP32) voice assistant on an ARM Cortex-A55 (2GB RAM). The model must continuously learn new vocabulary daily without forgetting base intents. Strict privacy rules limit raw audio storage to a 10MB replay buffer.'
question: 'Would you use EWC or the 10MB replay buffer for this 50M-parameter assistant, and what is the on-device training memory cost?'
details:
  realistic_solution: 'EWC avoids privacy issues of replay buffers but incurs a substantial memory cost. During training, EWC requires storing the current weights, the optimal previous weights, and the Fisher diagonal. For a 50M parameter FP32 model, this totals 600MB, which fits within the 2GB RAM. Meanwhile, the 10MB replay buffer only holds ~5.2 minutes of 16kHz audio, which is insufficient to prevent catastrophic forgetting. Therefore, EWC is the necessary architectural choice despite the memory overhead.'
  common_mistake: 'Assuming EWC is a ''free'' regularization technique and failing to account for the 3x parameter memory footprint required to store the Fisher Information Matrix diagonal and previous optimal weights.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 50M FP32 parameters.
    - Memory available: 2GB RAM.
    - Replay buffer limit: 10MB.
    - Audio format: 16,000 samples/sec * 2 bytes/sample = 32KB/s.

    **Calculations:**
    - Model size in memory: 50M * 4 bytes = 200MB.
    - EWC Memory requirement: Current Weights (200MB) + Previous Weights W* (200MB) + Fisher Diagonal F (200MB) = 600MB.
    - Replay Buffer capacity: 10MB / 32KB/s = 312.5 seconds (5.2 minutes) of audio.

    **Conclusion & Interpretation:**
    - **Result: 600MB memory cost for EWC (Memory-Bound)**. EWC fits comfortably in the 2GB RAM, whereas the 5.2-minute replay buffer is insufficient to prevent catastrophic forgetting.
