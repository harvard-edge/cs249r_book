title: CPU Cluster Cache Contention on Edge SoC
scenario: You're deploying a complex multi-stage ML pipeline on a high-end edge SoC with multiple CPU clusters and integrated NPUs. You observe that scaling the number of CPU threads for pre-processing beyond a certain point actually decreases overall throughput, even though there are available cores.
question: What advanced memory architecture concept might explain this throughput decrease, and how would you mitigate it?
details:
  realistic_solution: The likely issue is shared cache and DRAM bandwidth contention across CPU clusters, not server-style NUMA. Pre-processing threads spread across clusters can bounce cache lines, overfill the shared last-level cache, and saturate the memory controller feeding both CPUs and NPUs. Mitigate it by pinning related threads to the same CPU cluster, partitioning frame buffers so workers do not false-share cache lines, using bounded queues, and profiling LLC miss rate and DRAM bandwidth while tuning thread count.
  common_mistake: |
    **The Pitfall:** Assuming throughput degradation is purely a software synchronization or thread contention issue.
    **The Rationale:** Candidates overlook shared cache pressure, memory-controller saturation, and cross-cluster cache-line bouncing on edge SoCs.
    **The Consequence:** Wasting time debugging software locks while the true bottleneck remains unresolved data movement and memory bandwidth contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local L2/L3-friendly access: 100 cycles effective cost.
    - Cache-miss/contended DRAM access: 250 cycles effective cost.

    **Calculations:**
    - If excessive thread spreading pushes half of accesses to contended DRAM: (0.5 * 100) + (0.5 * 250) = 175 cycles average.
    - Effective memory-access cost rises 175 / 100 = 1.75x before accounting for NPU traffic sharing the same DRAM.

    **Conclusion & Interpretation:**
    - **Result: ~1.75x memory-access penalty.** Past the scaling point, more CPU threads can reduce throughput because cache locality and DRAM bandwidth dominate.
