title: Little's Law Memory Sizing for Hailo-8 Inference Buffer
scenario: A host MCU paired with a Hailo-8 accelerator (26 TOPS INT8, 2.5W) receives sensor events at λ=50 events/s. Mean processing time W=15ms. Each event buffer requires 4KB, and the host has 256KB SRAM for queues and firmware.
question: Using Little's Law, how much buffer memory is needed for 50 events/s with 15ms processing and 4KB events, and is 256KB SRAM enough?
details:
  realistic_solution: L = λ·W = 50 × 0.015 = 0.75 events in system on average. For safety margin (p99 ≈ 3× mean for M/M/1), size for L_max ≈ 2-3 events. Memory = 3 × 4KB = 12KB. A host MCU with 256KB SRAM has ample room for the event queue plus firmware and DMA descriptors; the Hailo-8 model storage is not what this SRAM buffer calculation sizes.
  common_mistake: |
    **The Pitfall:** Sizing the buffer purely for peak burst without using steady-state queueing theory.
    **The Rationale:** Candidates fail to apply Little's Law to calculate the average number of items waiting in the system.
    **The Consequence:** The system allocates too much or too little memory, leading to either wasted SRAM or dropped events during normal operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ) = 50 events/s.
    - Processing time (W) = 0.015s.

    **Calculations:**
    - Little's Law (L = λ * W): L = 50 * 0.015 = 0.75 mean events in system.
    - Safety margin (p99 ≈ 3x mean): Size for L_max ≈ 2-3 events.
    - Buffer memory = 3 events * 4KB = 12KB.

    **Conclusion & Interpretation:**
    - **Result: 12KB host queue buffer (SRAM-Bound)**. The 256KB host SRAM is more than sufficient for this event buffer, leaving substantial space for firmware, descriptors, and burst margin.
