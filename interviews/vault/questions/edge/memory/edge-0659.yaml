title: Memory for Multi-Camera Tracking
scenario: 'Your edge device processes 4 camera streams simultaneously for a warehouse tracking system. Each camera delivers 1080p (1920x1080) at 30 FPS in NV12 format. The pipeline for each stream: decode -> resize to 640x640 -> run YOLOv8n -> track (DeepSORT with ReID embeddings).'
question: What is the total memory footprint for the 4-camera pipeline, and is 16 GB sufficient?
details:
  realistic_solution: Build a complete memory budget with shared and per-stream terms separated. Per-stream unique buffers are about 57.4 MB, so four streams use about 229.6 MB. Add shared YOLOv8n/ReID weights of about 6.3 MB, CUDA plus TensorRT context/workspace of about 500 MB, and OS overhead of about 1 GB. The total is about 1.74 GB, or roughly 11% of a 16 GB system, so capacity is sufficient.
  common_mistake: |
    **The Pitfall:** Simply multiplying the raw frame size by the number of cameras.
    **The Rationale:** Candidates fail to account for the pipeline buffers, shared model weights, OS overhead, and framework context memory.
    **The Consequence:** Inaccurately estimating memory usage, completely missing the dominant memory consumers like the OS and CUDA context allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin NX (16 GB LPDDR5).
    - Camera streams: 4x 1080p NV12.
    - OS Overhead: ~1 GB; CUDA/TRT context: ~500 MB.

    **Calculations:**
    - Per-stream buffers: double-buffered NV12 decode (~6.2 MB) + resized tensor (~1.2 MB) + activations/work buffers (~50 MB) = ~57.4 MB.
    - Four stream-local buffers: 4 * 57.4 MB = 229.6 MB.
    - Shared model weights: ~6.3 MB, added once rather than once per stream.
    - Pipeline subtotal: 229.6 MB + 6.3 MB = 235.9 MB.
    - Total footprint: 235.9 MB + 500 MB (CUDA/TRT context and engine workspace) + 1000 MB (OS) = 1735.9 MB, or ~1.74 GB.
    - Capacity use: 1.74 GB / 16 GB = 10.9%.

    **Conclusion & Interpretation:**
    - **Result: ~1.74 GB capacity use, about 11% of 16 GB.** Memory capacity is sufficient; performance risk would come from bandwidth or latency contention, not from exhausting RAM.
