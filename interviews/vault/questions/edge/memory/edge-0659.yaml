title: Memory for Multi-Camera Tracking
scenario: >-
  Your edge device processes 4 camera streams simultaneously for a warehouse tracking system. Each camera delivers 1080p (1920x1080) at 30 FPS in NV12 format. The pipeline for each stream: decode -> resize to 640x640 -> run YOLOv8n -> track (DeepSORT with ReID embeddings).
question: What is the total memory footprint for the 4-camera pipeline, and is 16 GB sufficient?
details:
  realistic_solution: Build a complete memory budget. Per-stream unique buffers sum to ~57.5 MB. Four streams plus shared weights take 236.3 MB. Add CUDA context (~300 MB), TensorRT engine cache (~200 MB), OS overhead (~1 GB). Grand total is ~1.7 GB, perfectly safe for a 16 GB system.
  common_mistake: |
    **The Pitfall:** Simply multiplying the raw frame size by the number of cameras.
    **The Rationale:** Candidates fail to account for the pipeline buffers, shared model weights, OS overhead, and framework context memory.
    **The Consequence:** Inaccurately estimating memory usage, completely missing the dominant memory consumers like the OS and CUDA context allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin NX (16 GB LPDDR5).
    - Camera streams: 4x 1080p NV12.
    - OS Overhead: ~1 GB; CUDA/TRT context: ~500 MB.

    **Calculations:**
    - Per-stream buffers: NV12 (6.2 MB) + Resize (1.2 MB) + Activations (~50 MB) = ~57.5 MB.
    - Total for 4 streams: 4 * 57.5 MB + 6.3 MB (Shared weights) = 236.3 MB.
    - Total footprint: 236.3 MB + 500 MB (Context) + 1000 MB (OS) = ~1.7 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.7 GB (Memory-Bound).** The 1.7 GB total footprint utilizes only ~11% of the 16 GB capacity, making the multi-camera pipeline extremely safe for production.
