title: 'Zero-Copy Model Switching via Mmap'
scenario: 'You are deploying a dynamic 15-model computer vision pipeline onto an edge server with a 32 GB LPDDR4x accelerator. Each specialized model is 4 GB (INT8), totaling 60 GB, which cannot fit simultaneously in the accelerator or host RAM.'
question: 'How would you serve 15 unpredictable 4 GB models across 8 parallel workers without OOMs or long cold starts?'
details:
  realistic_solution: 'Use `mmap` with `MAP_SHARED` on the host to map all 60 GB of model weights into a single shared virtual address space, preventing memory duplication across the 8 workers. Leverage PCIe host-mapped memory capabilities to fetch only actively executing layers directly from the host page cache just-in-time.'
  common_mistake: |
    **The Pitfall:** Proposing a naive LRU caching strategy where models are fully copied on demand.
    **The Rationale:** Candidates use standard caching logic, failing to account for process-level memory duplication.
    **The Consequence:** 8 workers loading a single 4GB model independently will instantly exhaust the accelerator's memory (32GB) and trigger severe cold-start blocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total model size: 15 * 4 GB = 60 GB.
    - PCIe Gen4 bandwidth: 16 GB/s.

    **Calculations:**
    - Naive load via PCIe Gen4: 4 GB / 16 GB/s = 250 ms cold-start blocking.
    - mmap strategy: Host memory maps all 60GB as `MAP_SHARED` to prevent process duplication.
    - Streaming layers: Fetch only active 50 MB layers. 50 MB / 16 GB/s = ~3 ms blocking.

    **Conclusion & Interpretation:**
    - **Result: ~3 ms (Memory-Bound)**. Active pages for concurrent models easily fit in the 32GB RAM, avoiding 250ms cold-start blocking completely.
