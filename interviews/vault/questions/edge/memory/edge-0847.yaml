title: Diagnosing OOM in Microcontroller On-Device Fine-Tuning
scenario: A team is deploying on-device learning for a smart earbud powered by a Cortex-M4 microcontroller with 256KB of SRAM. They are fine-tuning the final dense layers (15,000 parameters) of an INT8 keyword spotting model using the Adam optimizer in FP32. The base model and data take only 120KB. Despite this, the device hard-faults with an Out-of-Memory (OOM) error during the first backward pass.
question: What is the root cause of the memory exhaustion, and how should the training pipeline be re-architected to fit safely within the SRAM constraints?
details:
  realistic_solution: |
    Adam's two FP32 moment buffers are a major contributor, but the root cause is the full training-time peak memory: FP32 weights, gradients, optimizer state, activations, stack, and framework overhead must coexist in only 256KB. Re-architect the pipeline for a tiny on-device training loop: avoid Adam, use batch size 1 SGD or signSGD, freeze more layers or reduce the trainable head size, keep activations minimal with checkpointing/recomputation where practical, and verify peak SRAM on the target runtime. With the current 15,000-parameter head, SGD alone still leaves only about 16KB headroom, so it is not a safe design without additional reductions.
  common_mistake: |
    **The Pitfall:** Assuming the training memory footprint is roughly equivalent to inference memory.
    **The Rationale:** Candidates fail to account for FP32 parameter casting and the massive momentum state overhead of the Adam optimizer.
    **The Consequence:** The microcontroller suffers an immediate hard fault (OOM) upon starting the first backward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Capacity: 256KB.
    - Static footprint: 120KB.
    - Dense layers: 15,000 parameters (FP32).

    **Calculations:**
    - FP32 Weights: 15,000 * 4B = 60KB.
    - FP32 Gradients: 60KB.
    - Adam Optimizer State (2 moments): 120KB.
    - Total Adam Footprint = 120 + 60 + 60 + 120 = 360KB.
    - SGD Footprint (no moments) = 120 + 60 + 60 = 240KB.
    - Remaining SRAM with SGD: 256KB - 240KB = 16KB for activations, stack, allocator overhead, and runtime buffers.

    **Conclusion & Interpretation:**
    - **Result: Adam OOMs, and SGD alone is still unsafe (Memory-Bound).** Optimizer moments explain much of the crash, but a deployable MCU training pipeline must also shrink activation and runtime overhead by freezing more parameters, using a smaller training head, and measuring total peak SRAM.
