title: The eMMC Cold Start
scenario: Your edge device loads a 200 MB model from eMMC flash into DRAM at boot. The eMMC spec says 300 MB/s sequential read, so you expect a 0.67-second load time. In practice, the first inference takes over 3 seconds.
question: "Why does the first inference take 2.3 seconds longer than the theoretical eMMC transfer time?"
details:
  realistic_solution: 'The 300 MB/s spec is for large sequential reads. Model loading involves: (1) the model file is fragmented on a well-used eMMC and filesystem overhead adds ~500ms, (2) TensorRT engine deserialization — parsing the serialized engine, allocating CUDA memory, and building the execution context takes ~1.5s for a 200 MB engine, (3) CUDA context initialization on first use adds ~300ms. Total overhead: ~2.3s.'
  common_mistake: |
    **The Pitfall:** Blaming the storage hardware by claiming "the eMMC is slower than spec."
    **The Rationale:** Candidates assume that because I/O is notoriously slow, hardware spec inflation is the sole culprit.
    **The Consequence:** Time is wasted sourcing faster, more expensive eMMC components when the actual bottleneck is runtime software execution overhead (JIT compilation, deserialization, context init).
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 200 MB.
    - eMMC sequential read spec: 300 MB/s.

    **Calculations:**
    - Sequential read: 200MB / 300MB/s = 0.67s.
    - Flash fragmentation and filesystem overhead: ~0.5s.
    - CUDA context initialization (first use): ~0.3s.
    - TensorRT deserialization (JIT compiling un-cached layers, PCIe allocations): ~1.5s.
    - Total missing time: 0.5s + 0.3s + 1.5s = 2.3s execution overhead.

    **Conclusion & Interpretation:**
    - **Result: 2.3s overhead (Latency-Bound)**. The bottleneck is runtime software execution overhead, not just hardware I/O limits.
