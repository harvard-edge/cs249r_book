title: 15B INT8 LLM OOM on a 32 GB Edge Accelerator
scenario: You are deploying a 15-billion parameter large language model (LLM) for real-time inference on an accelerator with 32 GB memory. Despite quantizing the model weights to INT8, you encounter persistent out-of-memory (OOM) errors during inference. The model's architecture involves deep transformer layers, leading to substantial intermediate activation tensors.
question: Why can a 15B INT8 LLM still OOM on a 32 GB device, and what memory-pressure strategies and OS effects would you consider?
details:
  realistic_solution: A 15B INT8 model can fit its weights in roughly 15 GB, but inference still needs KV cache, temporary activations, runtime workspaces, and allocator headroom. KV cache grows with layers, context length, batch size, number of KV heads, head dimension, and dtype, so long contexts or batched decoding can exhaust the remaining memory even after weight quantization. Reduce batch size and maximum context length, use paged or block-managed KV cache, cap concurrent requests, and profile activation/workspace peaks. Also check OS and runtime effects such as cgroup limits, pinned host buffers, allocator fragmentation, memory pools, and any paging or swapping on the host side.
  common_mistake: |
    **The Pitfall:** Focusing solely on weight quantization and ignoring dynamic memory footprint.
    **The Rationale:** Candidates often assume that if the weights fit in memory, the model will run successfully.
    **The Consequence:** They fail to account for activations, KV cache, and memory fragmentation, leading to inevitable OOM errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model weights: 15B parameters at INT8, about 15 GB before metadata/alignment.
       - Device memory budget: 32 GB.
       - Example KV cache: 40 layers, batch 2, context 4096, 40 KV heads, head dimension 128, FP16 cache.
    **Calculations:**
       - Remaining memory after weights is about 32 GB - 15 GB = 17 GB, before runtime reserve and fragmentation.
       - KV cache bytes = layers * batch * tokens * heads * head_dim * 2 tensors (K,V) * 2 bytes.
       - Example KV cache = 40 * 2 * 4096 * 40 * 128 * 2 * 2 bytes = about 6.7 GB.
       - Activations, temporary buffers, runtime workspaces, and fragmentation can consume several more GB, reducing the usable headroom below the nominal 17 GB.
    **Conclusion & Interpretation:**
       - **Result: memory pressure is dynamic, not just weights.** KV cache is often the largest growth term, but activations, workspaces, fragmentation, and OS/runtime limits can also push a seemingly fitting INT8 model into OOM.
