title: Edge TPU Memory Optimization for OOM Prevention
scenario: A client is deploying an object detection model on a Google Coral Edge TPU for a real-time application. Sporadic Out-Of-Memory (OOM) errors occur during peak load when processing complex scenes with high intermediate tensor activations. The pipeline struggles to maintain 30 FPS.
question: How would you diagnose and fix sporadic Coral Edge TPU OOMs from peak activations or fragmentation while maintaining 30 FPS?
details:
  realistic_solution: Use TensorFlow Lite / Edge TPU delegate profiling, Edge TPU compiler output, and model inspection to find operators or tensors that exceed on-chip SRAM or force CPU fallback. Reduce peak intermediate tensors through graph restructuring, operator fusion, smaller input shapes, tiling where supported, and full INT8 quantization compatible with the Edge TPU compiler. Treat allocator tuning as secondary on this device; the dominant constraint is usually compiled graph partitioning and SRAM pressure, not general-purpose GPU-style fragmentation.
  common_mistake: |
    **The Pitfall:** Focusing solely on model parameter size reduction.
    **The Rationale:** Candidates rely on quantization but ignore runtime activation memory and intermediate tensor fluctuations.
    **The Consequence:** Unmitigated peak memory spikes cause persistent OOMs and pipeline stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 precision (1 byte/element).
    - Coral Edge TPU memory limit (~8MB SRAM).

    **Calculations:**
    - Activation tensor: 1 * 64 * 64 * 128 * 1 byte = 524,288 bytes = 0.5 MiB.
    - Eliminating or fusing one such tensor saves 0.5 MiB of peak intermediate storage.
    - On an ~8 MB SRAM-class budget, 0.5 MiB is about 6.25% of the budget, so several simultaneous tensors, weights, and runtime buffers still matter.

    **Conclusion & Interpretation:**
    - **Result: 0.5 MiB is a meaningful but partial saving.** Fusion or graph changes can remove a peak tensor and help avoid SRAM pressure, but 30 FPS also depends on the full compiled model, CPU fallbacks, buffering, and runtime overhead.
