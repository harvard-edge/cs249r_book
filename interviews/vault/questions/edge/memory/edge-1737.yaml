title: 'Zero-Copy Pipeline Design on Unified Edge Architectures'
scenario: 'Your team is deploying a real-time multi-camera perception stack on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere GPU + DLA, 60W TDP). The current pipeline ingests frames from four 4K cameras, preprocesses them on the CPU, runs detection on the DLA, and performs tracking on the Ampere GPU. Engineers are observing memory bandwidth bottlenecks and high latency due to explicit data transfers between the processing units.'
question: 'How would you redesign the four-4K-camera Jetson Orin pipeline to use zero-copy buffers and eliminate CPU, GPU, and DLA transfer overhead?'
details:
  realistic_solution: 'The optimal solution leverages zero-copy memory (e.g., cudaHostAllocMapped) or hardware-specific buffer sharing APIs like NvSciBuf. By allocating pinned, mapped memory, the camera ISP can write frames directly into a shared buffer. The DLA and Ampere GPU can then access this same physical memory via their respective memory management units without any explicit data movement, completely eliminating intermediate CPU-to-device memory copies.'
  common_mistake: |
    **The Pitfall:** Proposing PCIe-style DMA transfers or explicit cudaMemcpy operations.
    **The Rationale:** Candidates treat the Jetson Orin like a discrete desktop GPU, failing to realize it features a unified memory architecture where the CPU, GPU, and DLA share the exact same physical LPDDR5 RAM.
    **The Consequence:** The pipeline consumes massive amounts of redundant memory bandwidth, starving the compute engines and drastically increasing latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras at 4K resolution (3840x2160), 30 FPS.
    - Format: RGB (3 bytes/pixel).
    - Jetson Orin Unified Memory Architecture.

    **Calculations:**
    - Raw ingest per second: 4 * 3840 * 2160 * 3 bytes * 30 = ~2.98 GB/s.
    - With explicit copies (ISP -> CPU -> GPU -> DLA): Data is read/written multiple times, consuming ~17.8 GB/s.
    - With zero-copy memory (cudaHostAllocMapped): ISP writes once (3 GB/s), DLA/GPU read directly in-place.

    **Conclusion & Interpretation:**
    - **Result: ~12 GB/s Saved (Memory Bandwidth-Bound)**. A zero-copy architecture saves roughly 12 GB/s of redundant memory bandwidth, leaving ample headroom for the compute workloads.
