title: Optimizing Memory-Mapped Model Loading on Jetson Orin
scenario: You are deploying a large language model (LLM) on an edge device with 32 GB LPDDR5 memory. The model's weights alone are 20 GB, and minimizing cold start latency is critical. You decide to use memory-mapped files for loading the weights to reduce initial load times and enable potential weight sharing across multiple inference instances.
question: How would you mmap the 20 GB LLM weights to minimize cold start while preserving enough 32 GB LPDDR5 for inference?
details:
  realistic_solution: A realistic solution involves careful use of `madvise` with `MADV_WILLNEED` to proactively fault in necessary pages during application startup or in a background thread. Page alignment of the model file on disk and understanding the OS page size are crucial. Consider segmenting the model weights logically and memory-mapping/pre-faulting segments as they are needed, rather than the entire 20GB at once, if the entire model is not immediately used.
  common_mistake: |
    **The Pitfall:** Memory-mapping the entire 20 GB file without a pre-faulting strategy.
    **The Rationale:** Candidates ignore the OS page size and storage speed bottleneck, assuming mmap is an instant memory load.
    **The Consequence:** Excessive page faults during inference lead to severe thrashing and degraded cold start performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights: 20 GB.
    - RAM available for OS and activations: 12 GB.
    - Storage read speed (e.g., 500 MB/s NVMe).
    
    **Calculations:**
    - Mapping a 20 GB model into 32 GB RAM leaves 12 GB for OS and activations.
    - Assuming 4 KB OS page size: 20 GB = 5,242,880 pages.
    - Storage read speed (e.g., 500 MB/s NVMe): Pre-faulting 20 GB takes 20,480 MB / 500 MB/s = 40.96 seconds.
    - If only 10% (2 GB) is immediately active: Takes 2,048 MB / 500 MB/s = 4.096 seconds to pre-fault.
    
    **Conclusion & Interpretation:**
    - **Result: 4.1s to 41s (Disk I/O-Bound)**. Cold start latency is directly bound by disk I/O; explicit pre-faulting mitigates unpredictable inference pauses.
