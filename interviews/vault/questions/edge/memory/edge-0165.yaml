title: The TinyML Tensor Arena Calculation
scenario: You are optimizing a keyword-spotting model for a Cortex-M4 microcontroller. To minimize memory, you must calculate the required size for the TensorFlow Lite for Microcontrollers 'tensor arena'. At the most memory-intensive point, the interpreter must hold a 25KB input tensor to a convolutional layer and that layer's resulting 40KB output tensor concurrently.
question: What is the minimum required size for the tensor arena to execute this specific operation?
details:
  realistic_solution: The tensor arena is a single contiguous memory block that must be large enough for the point of maximum concurrent memory usage. For a single layer's execution, this peak is typically the sum of its input tensor(s) and output tensor(s). Therefore, the minimum required arena size for this operation is the sum of the input and output tensor sizes.
  common_mistake: |
    **The Pitfall:** Assuming the tensor arena only needs to be as large as the single largest tensor (40 KB).
    **The Rationale:** Engineers overlook the interpreter's requirement to hold both input and output tensors in memory simultaneously during the execution of a layer.
    **The Consequence:** Under-provisioning the memory block, leading to an immediate Out-Of-Memory (OOM) crash during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Tensor Size = 25 KB.
    - Output Tensor Size = 40 KB.
    - Execution requires concurrent existence of both tensors.

    **Calculations:**
    - Minimum Arena Size = Input Tensor Size + Output Tensor Size
    - Minimum Arena Size = 25 KB + 40 KB = 65 KB.

    **Conclusion & Interpretation:**
    - **Result: 65 KB (Memory-Capacity Bound)**. The arena must accommodate 65 KB to prevent OOM during this specific convolution operation.
  options:
  - 40 KB
  - 95 KB
  - 65 KB
  - 256 KB
