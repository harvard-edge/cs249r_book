title: Shared Weight Mapping for Multi-Model Edge Inference
scenario: You are designing an on-premise video analytics appliance powered by a single accelerator. The system must run 5 different computer vision models concurrently across 20 video streams. Total model weights exceed the 32GB memory capacity if loaded redundantly by separate processes.
question: How would you design memory-mapped model sharing for 5 CV models across 20 streams on a 32 GB appliance?
details:
  realistic_solution: Utilize memory-mapped I/O (mmap) with MAP_SHARED across host applications so each model's read-only weights are backed by a single shared host mapping instead of being duplicated per process. Keep accelerator input/output buffers separate and use the accelerator driver's supported pinned-memory or copy API, because mmap alone does not guarantee zero-copy DMA or automatic multiplexing on the device. With 5 models at 4 GB each, the shared weight footprint is about 20 GB, leaving about 12 GB for activations, tensor arenas, queues, and runtime buffers on a 32 GB appliance.
  common_mistake: |
    **The Pitfall:** Copying weights into each process's memory space or ignoring DMA overhead.
    **The Rationale:** Candidates often rely on standard OS process isolation where each process loads its own copy of the model.
    **The Consequence:** Loading redundant models quickly causes an Out-Of-Memory (OOM) error, or failing to use zero-copy APIs causes massive CPU/memory bandwidth bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
       - Unique CV models: 5
       - Concurrent streams: 20
       - INT8 Weights per model: 4 GB
       - Host RAM Limit: 32 GB
    **Calculations:**
       - Unique footprint: 5 * 4 GB = 20 GB
       - Naive per-stream workers: 5 models * 4 streams/model * 4 GB = 80 GB (OOM)
       - Mmap shared footprint: 20 GB
       - RAM available for activations, queues, and runtime buffers: 32 GB - 20 GB = 12 GB
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound Concurrency.** Shared read-only mappings prevent redundant 80 GB weight residency, but DMA behavior still depends on explicit accelerator-supported buffer management.
