title: 'Model Size Estimation: Master Full Memory Audit for Edge LLM Deployment on Jetson Orin'
scenario: A 1B-parameter LLM (INT8 quantized) is deployed on Jetson Orin (32GB LPDDR5, 204 GB/s, 60W) for on-device chat inference. The architecture has 32 layers, 32 KV heads, and a head_dim of 64.
question: What is the INT8 KV-cache memory per token for the 1B LLM with 32 layers, 32 KV heads, and head_dim 64?
details:
  realistic_solution: 'KV cache per token = 2 × num_layers × num_kv_heads × head_dim × bytes. For INT8 (1B/element): 2 × 32 × 32 × 64 × 1B = 128KB per token.'
  common_mistake: |
    **The Pitfall:** Assuming the full 32GB RAM is available for the ML model.
    **The Rationale:** Forgetting that Jetson Orin runs a full Linux OS (JetPack/Ubuntu) consuming 2-4GB, plus a 200-500MB CUDA context overhead.
    **The Consequence:** Out-of-memory crashes when calculating max context length based on raw hardware specs.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV cache element precision: INT8 (1 byte/element).
    - Architecture: 32 layers, 32 KV heads, head_dim of 64.

    **Calculations:**
    - Formula: 2 (K+V) * num_layers * num_kv_heads * head_dim * bytes_per_element.
    - Calculation: 2 * 32 * 32 * 64 * 1 byte = 131,072 bytes.

    **Conclusion & Interpretation:**
    - **Result: 128 KB (Memory-Bound)**. Each token requires 128 KB of memory for its KV cache, heavily influencing the maximum sequence length.
