title: Real-time 4K Video Object Detection Data Movement Strategy
scenario: Designing an embedded ML pipeline for real-time 4K30 object detection with CPU pre/post-processing and INT8 GPU inference.
question: What data movement strategy would you use on Jetson Orin to process 4K30 with CPU pre/postprocessing and INT8 GPU inference within 60W?
details:
  realistic_solution: Keep frames and intermediate tensors resident on the GPU whenever possible, especially after decode or preprocessing stages that can run through CUDA/VPI/NvBufSurface-backed buffers. For CPU-owned inputs or outputs that must cross the boundary, use pinned or registered host memory and issue H2D/D2H copies asynchronously on CUDA streams. Double-buffer the pipeline so CPU preprocessing, DMA, inference, and postprocessing overlap. Use Unified Memory or mapped zero-copy only for small control data or access patterns where avoiding a copy is worth slower uncached GPU reads; it should not be the default path for full 4K inference tensors.
  common_mistake: |
    **The Pitfall:** Relying on standard synchronous CPU-GPU memory copies (`cudaMemcpy`) and unpinned memory.
    **The Rationale:** Developers accustomed to discrete GPUs default to standard APIs, overlooking avoidable host-device round trips, cache effects, and the need to overlap copies with compute on edge devices.
    **The Consequence:** Significant pipeline stalls and increased latency as computation and data transfers fail to overlap.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K RGB frames at 30 FPS.
    - LPDDR5 limit = ~204 GB/s.

    **Calculations:**
    - Input = 3840 * 2160 * 3 = 24.8 MB/frame.
    - Input rate = 24.8 MB * 30 = 744 MB/s, or about 0.74 GB/s.
    - Output = ~30 MB/s.
    - Total = ~774 MB/s, far below the LPDDR5 peak, so raw bandwidth is not the limiting resource.
    - If pageable staging adds even 5 ms per frame, it consumes 15% of the 33.3 ms frame budget and can block overlap.

    **Conclusion & Interpretation:**
    - **Result: bandwidth is feasible; latency overlap is the risk.** Use GPU-resident buffers, pinned memory for unavoidable CPU boundaries, CUDA streams, and double buffering to keep the 4K30 pipeline inside the latency and 60W envelope.
