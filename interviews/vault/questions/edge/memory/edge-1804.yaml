title: Hailo-8 Multi-Stream Zero-Copy DMA Pipeline Design
scenario: You are designing a smart intersection traffic monitoring system using an edge host connected to a Hailo-8 dataflow accelerator. The system ingests 4 independent 1080p (1920x1080) RGB video streams at 30 FPS. Since the Hailo-8 has no local DRAM and relies entirely on streaming data directly from host memory (operating at 2.5W), CPU overhead from data movement is a critical bottleneck.
question: How would you build the host-to-Hailo-8 memory pipeline for four 1080p30 streams to avoid frame drops and minimize CPU copies?
details:
  realistic_solution: The optimal specification uses a zero-copy data pipeline based on dma_buf for buffer sharing between the camera interface (V4L2) and the Hailo-8 PCIe driver. Buffers should come from DMA-capable, page-locked or driver-managed allocations suitable for both devices; they do not need to be described as one contiguous host block. The camera writes directly into shared buffers via DMA, and the Hailo-8 reads those buffers via PCIe DMA, bypassing CPU payload copies. A multi-buffer ring queue overlaps capture, inference, and post-processing, avoiding roughly 2.2 GB/s of aggregate memcpy traffic in a naive copied pipeline.
  common_mistake: |
    **The Pitfall:** Standard user-space memory allocations.
    **The Rationale:** Candidates often propose standard `malloc` or `cv::Mat` followed by a blocking PCIe transfer, familiar from standard desktop programming.
    **The Consequence:** This incurs costly CPU page faults and user-to-kernel space copies, starving the dataflow architecture and thrashing the host CPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras, 1080p (1920x1080) RGB at 30 FPS.
    - Sizes use decimal MB/GB for link and throughput budgeting.
    - A 3-deep ring per stream is an architectural buffering choice to overlap capture, inference, and post-processing.
    - Zero-copy DMA pipeline bypasses CPU payload copying.
    - Naive pipeline involves CPU memcpy stages plus a device DMA transfer; only the memcpy stages are CPU copy traffic.

    **Calculations:**
    - Frame size = 1920 * 1080 * 3 bytes = 6,220,800 bytes = 6.22 MB (5.93 MiB).
    - Data rate = 4 * 6.22 MB/frame * 30 FPS = 746.5 MB/s.
    - Ring buffer size for this 3-deep design = 4 streams * 3 frames * 6.22 MB = 74.6 MB.
    - Naive CPU memcpy traffic with two host copies = 2 * 746.5 MB/s = 1.49 GB/s.
    - The device DMA stream is another 746.5 MB/s on the host-device path, for about 2.24 GB/s of total payload movement if copies and DMA are counted together.

    **Conclusion & Interpretation:**
    - **Result: Zero-Copy Enabled**. This 3-deep design uses 12 DMA-capable page-locked or driver-managed shared buffers totaling about 74.6 MB; dma_buf sharing avoids roughly 1.5 GB/s of CPU memcpy traffic while preserving the required DMA stream without requiring one exact contiguous host allocation.
