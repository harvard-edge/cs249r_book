title: Edge LLM Memory Optimization for Real-time Inference
scenario: You are deploying a small INT8 language model for real-time inference on an edge AI accelerator with limited on-chip SRAM and shared host DRAM. The model's KV cache and temporary activations exceed on-chip memory at long context lengths. During deployment, you observe frequent OOM errors and latency spikes from spilling tensors across the memory hierarchy.
question: How would you optimize memory and handle OOMs for an INT8 edge LLM when activations exceed on-chip memory?
details:
  realistic_solution: Keep the working set within accelerator-local memory by capping context length and batch size, using a paged or ring-buffered KV cache, and scheduling layers so large temporary activations are freed as soon as possible. Quantize weights, KV cache, and eligible activations where accuracy allows, but avoid designs that stream large per-token tensors from host DRAM every layer. If spills are unavoidable, use pinned DMA buffers and overlap transfers with compute, then treat the spill rate as a hard latency budget item. Do not rely on OS swap space for real-time inference.
  common_mistake: |
    **The Pitfall:** Focusing purely on model weight quantization while ignoring dynamic activation footprints.
    **The Rationale:** Candidates treat generative models like static CNNs, forgetting that the KV cache and intermediate activations grow dynamically and exceed fixed SRAM.
    **The Consequence:** Catastrophic latency spikes as the dataflow engine thrashes the host memory bus during generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target token latency: 10 ms.
    - Sustainable host DRAM spill bandwidth available to the accelerator: 10 GB/s.
    - Example spill per generated token after INT8 compression: 128 MB of temporary activation or KV movement.

    **Calculations:**
    - Transfer time for a 128 MB spill at 10 GB/s = 0.128 GB / 10 GB/s = 12.8 ms.
    - This single spill already exceeds the 10 ms token budget before compute, scheduler overhead, or other tensor movement.
    - Reducing the spill to 32 MB would take 0.032 GB / 10 GB/s = 3.2 ms, leaving budget for compute.

    **Conclusion & Interpretation:**
    - **Result: memory spills dominate latency.** The practical fix is to shrink and bound the dynamic working set, especially KV cache and temporary activations, so host-DRAM traffic stays within the token latency budget.
