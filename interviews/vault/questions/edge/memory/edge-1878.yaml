title: Memory-Efficient LLM Fine-tuning on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for a fine-tuning workload on an NVIDIA Jetson Orin. During initial testing, you encounter Out-of-Memory (OOM) errors. The model uses FP16 weights, and its static memory footprint is estimated at 20 GB. Each input sample requires approximately 0.5 GB of activation memory during the forward pass and another 0.5 GB of backward-pass workspace. You also estimate 2 GB of memory overhead for the operating system.
question: How would you avoid OOM during Jetson Orin fine-tuning, what is the max micro-batch size, and how does gradient accumulation set effective batch?
details:
  realistic_solution: The primary strategy is to choose the largest micro-batch that fits the dynamic memory budget, then use gradient accumulation to reach the desired logical batch size. With 32 GB total, 20 GB static model memory, and 2 GB OS overhead, 10 GB remains for per-sample activation and backward workspace. At 1.0 GB per sample, the maximum micro-batch is 10 samples. If you accumulate gradients for N steps, the effective batch size is 10 * N. Complementary options include activation checkpointing, smaller sequence lengths, dynamic batch sizing, and selective CPU offload for less performance-critical tensors.
  common_mistake: |
    **The Pitfall:** Underestimating the combined memory footprint of activations and optimizer states.
    **The Rationale:** Candidates focus solely on the model parameter size and overlook the massive dynamic memory required during backpropagation.
    **The Consequence:** OOM errors crash the fine-tuning workload on resource-constrained edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 32 GB
    - Static model footprint: 20 GB
    - OS memory overhead: 2 GB
    - Dynamic memory per sample: 0.5 GB (activations) + 0.5 GB (gradients) = 1.0 GB

    **Calculations:**
    - Fixed memory overhead = 20 GB + 2 GB = 22 GB
    - Available memory for dynamic tensors = 32 GB - 22 GB = 10 GB
    - Maximum micro-batch size = 10 GB / 1.0 GB/sample = 10 samples
    - Effective Batch Size = 10 * N_accumulation_steps

    **Conclusion & Interpretation:**
    - **Result: 10 samples (Memory-Bound)**. The maximum micro-batch size is 10 samples, requiring gradient accumulation to achieve larger effective batch sizes.
