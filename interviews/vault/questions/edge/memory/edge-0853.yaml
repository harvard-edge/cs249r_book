title: Debugging Edge Shadow Mode OOM Crashes
scenario: A smart home company implements on-device continuous learning to personalize a wake-word detection model. It is deployed in 'shadow mode' to run concurrently with the frozen baseline model. The edge device features an ARM Cortex-M7 with 1.5MB of available SRAM. The baseline model requires 800KB of RAM for its weights and intermediate activations, while the shared audio ring buffer uses 200KB. Shortly after enabling shadow evaluation, the devices begin hard crashing due to memory faults.
question: Why do the wake-word devices hard crash after enabling shadow-mode evaluation alongside the baseline under a 1.5MB SRAM limit?
details:
  realistic_solution: The system experiences an Out-Of-Memory (OOM) crash because executing two independent model instances simultaneously exceeds the strict 1.5MB SRAM limit. The architecture must be updated to temporally multiplex the shadow evaluations or share the frozen feature extraction backbone between both classification heads to reduce the memory footprint.
  common_mistake: |
    **The Pitfall:** Assuming crashes are due to numerical instability or power throttling.
    **The Rationale:** Candidates overlook basic memory footprint arithmetic and assume the adaptation process or intensive computations caused the crash.
    **The Consequence:** Wasting time debugging the learning rate or power modes when the system simply lacks the physical SRAM to load both models simultaneously.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available SRAM: 1.5 MB (1,500 KB).
    - Baseline model memory: 800 KB.
    - Shadow model memory: 800 KB.
    - Shared audio buffer: 200 KB.

    **Calculations:**
    - Total Required Memory = 800 KB + 800 KB + 200 KB = 1,800 KB.
    - Deficit = 1,800 KB - 1,500 KB = +300 KB.

    **Conclusion & Interpretation:**
    - **Result: 300 KB Deficit (Memory-Bound)**. Loading both models strictly requires 300KB more SRAM than physically available, resulting in an immediate OOM crash.
