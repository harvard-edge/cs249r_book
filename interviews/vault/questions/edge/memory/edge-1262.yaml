title: Architecting Zero-Copy DMA for Multi-Camera Edge TPU
scenario: You are designing a real-time defect detection system for a manufacturing line using a host processor connected to a Google Coral Edge TPU via a USB 3.0 interface. The system ingests four high-resolution camera streams, preprocesses them on the host, and sends INT8 quantized tensors to the 4 TOPS Coral accelerator for inference.
question: How would you move preprocessed INT8 tensors from host memory to the USB Coral Edge TPU with minimal latency and CPU overhead?
details:
  realistic_solution: The optimal design uses a pinned (page-locked) memory pool on the host to enable direct DMA transfers over the USB bus without intermediate CPU buffering. The architecture should implement a multi-buffered pipeline (e.g., ring buffering) where frame N is being transferred via asynchronous DMA, frame N-1 is executing on the Edge TPU, and frame N-2 results are being read back. Preprocessing steps (like resizing and INT8 quantization) should directly write their output tensors into this pinned memory pool to achieve a zero-copy host-to-device transfer pipeline.
  common_mistake: |
    **The Pitfall:** Utilizing standard blocking memory copies (`memcpy`) directly to USB bulk endpoints.
    **The Rationale:** Candidates default to standard file I/O or naive buffer allocation without considering pageability and CPU involvement.
    **The Consequence:** The CPU is blocked copying memory to temporary kernel buffers, and inference execution is not pipelined with transfers, leading to severe TPU starvation and high latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target input tensor: 300x300x3 INT8 = 270 KB per frame.
    - Cameras: 4 running at 30 fps.
    - USB 3.0 link practical bandwidth: ~400 MB/s.
    - TPU execution time: ~2ms.

    **Calculations:**
    - Required data rate: 4 * 30 * 270 KB = 32.4 MB/s.
    - Payload transfer takes ~8% of bus bandwidth.
    - Transferring one 270 KB frame takes ~0.67ms (270KB / 400MB/s).

    **Conclusion & Interpretation:**
    - **Result: 0.67ms (I/O-Bound)**. Since the 4 TOPS TPU executes the model in ~2ms, the 0.67ms transfer must be hidden behind compute via asynchronous DMA to prevent starvation.
