title: 'Model Size Estimation: Diagnose GPU Memory OOM on Jetson Orin for Batch Inference'
scenario: A Jetson Orin deployment OOMs when increasing batch size from 4 to 8 for a YOLOv8-l model. At batch=4 the model uses 3.2GB. Although the device has 32GB LPDDR5, profiling shows OS, camera/ISP buffers, CUDA context, and two other resident models leave only a 6GB contiguous TensorRT allocation budget for this YOLOv8-l engine.
question: What is causing the OOM when moving from batch 4 to 8, and what maximum batch size should fit on the Jetson Orin?
details:
  realistic_solution: The OOM is caused by using total LPDDR5 as the budget instead of the profiled contiguous TensorRT allocation budget. Batch 4 uses 3.2GB, so the observed slope is about 0.8GB per batch item. Batch 8 would require 6.4GB, which exceeds the 6GB contiguous budget left after OS, camera/ISP buffers, CUDA context, and other resident models. The largest batch that fits is floor(6GB / 0.8GB) = 7, before adding any extra safety margin. If production needs allocator headroom, cap at batch 6.
  common_mistake: |
    **The Pitfall:** Assuming memory scales perfectly linearly with batch size without considering fragmentation or other system consumers.
    **The Rationale:** Candidates assume that because batch 4 takes 3.2GB, batch 8 should only take 6.4GB and easily fit in the ~26GB available VRAM.
    **The Consequence:** Failing to diagnose memory fragmentation or OS/ISP memory consumers, leaving the OOM unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - HW: 32GB Orin LPDDR5.
    - Profiled contiguous TensorRT allocation budget for this engine: 6GB after OS, camera/ISP, CUDA, and two other resident models.
    - Baseline: Batch 4 = 3.2GB

    **Calculations:**
    - Per-item activation = 3.2GB / 4 = 0.8GB
    - Expected Batch 8 = 6.4GB
    - Batch 8 exceeds contiguous budget: 6.4GB > 6GB, so OOM is expected.
    - Maximum fitting batch = floor(6GB / 0.8GB per item) = 7.

    **Conclusion & Interpretation:**
    - **Result: Max batch size 7, or 6 with safety headroom.** The failure is not explained by total 32GB capacity; it is caused by the smaller contiguous runtime budget left for this TensorRT engine.
