title: 'Orin Shared LPDDR5 Deficit'
scenario: 'A Jetson AGX Orin uses a 204.8 GB/s LPDDR5 shared memory pool. A dense 3D CNN needs 150 GB/s for tensor operations while the GPU rendering engine simultaneously requests 80 GB/s for graphics.'
question: 'Design a memory QoS (Quality of Service) scheme to resolve the contention and calculate the resulting memory bandwidth deficit.'
visual:
  kind: svg
  path: edge-2271.svg
  alt: 'Stacked bar chart showing 230 GB/s request vs 204.8 GB/s limit.'
  caption: 'Memory Bandwidth Contention.'
details:
  realistic_solution: 'Total requested bandwidth is 230 GB/s, exceeding the 204.8 GB/s physical limit. A QoS design might prioritize the CNN at 150 GB/s to maintain real-time safety constraints, leaving 54.8 GB/s for the GPU. The rendering engine faces a 25.2 GB/s deficit, likely causing dropped frames.'
  common_mistake: |
    **The Pitfall:** Assuming the theoretical 204.8 GB/s can perfectly accommodate independent workloads without contention overhead.
    **The Rationale:** Engineers often fail to realize that unified memory architectures share the same physical bus for both neural compute and graphics rendering.
    **The Consequence:** The system experiences severe, unpredictable frame drops in safety-critical perception tasks when graphics demand spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5 physical limit: 204.8 GB/s.
    - CNN bandwidth request: 150 GB/s.
    - GPU graphics request: 80 GB/s.

    **Calculations:**
    - Total Requested Bandwidth: 150 GB/s + 80 GB/s = 230 GB/s.
    - Deficit: 230 GB/s - 204.8 GB/s = 25.2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 25.2 GB/s deficit (Memory-Bandwidth Bound)**. Unified memory architectures share the same bus; unmanaged contention causes severe, unpredictable frame drops.
