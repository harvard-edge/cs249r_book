title: 'Model Size Estimation: Estimate LPDDR5 Memory for a YOLOv8-n INT8 TensorRT Pipeline'
scenario: You need to size a YOLOv8-n model for a real-time object detection pipeline at 30fps with batch size 1.
question: How much LPDDR5 memory does a YOLOv8-n model (3.2M params, INT8 TensorRT) need for this pipeline?
details:
  realistic_solution: 'Weights: 3.2M × 1 byte = 3.2MB. TensorRT engine overhead: ×1.3 = 4.2MB. FP32 input tensor: 640×640×3×4B = 4.9MB. YOLOv8-n output tensor: 84×8400 FP32 values = 84×8400×4B = 2.8MB. Peak activations/workspace estimate: ~20MB. Camera pipeline triple buffering for 640×640 RGB frames adds 3×4.9MB = 14.7MB. Total pipeline memory: 4.2 + 4.9 + 20 + 2.8 + 14.7 = 46.6MB, so budget about 50MB of LPDDR5. This is small relative to 32GB, but the answer is ~50MB, not 32MB or 32GB.'
  common_mistake: |
    **The Pitfall:** Only calculating weight memory and ignoring activations and buffers.
    **The Rationale:** Candidates default to parameter count alone, forgetting that peak activations often dwarf weights in vision models.
    **The Consequence:** Severe underestimation of memory requirements, leading to OOM errors in production.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: YOLOv8-n (3.2M params, INT8 TensorRT).
       - Input: 640x640x3 FP32.
       - Pipeline: 30 FPS, batch size 1, triple buffered camera.
    **Calculations:**
       - INT8 Weights: 3.2MB * 1 byte = 3.2MB.
       - TensorRT overhead (x1.3): ~4.2MB.
       - Input tensor (640x640x3, FP32): 640 * 640 * 3 * 4B = 4.9MB.
       - Peak Activations (typically 5-10x weights): ~20MB.
       - Output tensor (84x8400 FP32): 84 * 8400 * 4B = 2.8MB.
       - Camera buffers (triple buffered 640x640 RGB FP32): 3 * 4.9MB = 14.7MB.
       - Total Memory: 4.2 + 4.9 + 20 + 2.8 + 14.7 = 46.6MB.
    **Conclusion & Interpretation:**
       - **Result: Budget ~50MB LPDDR5.** The entire model and batch-1 pipeline easily fits in a 32GB device, but the consistent memory estimate is about 46.6MB before allocator alignment and extra runtime buffers.
