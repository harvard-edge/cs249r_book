title: 'Host Buffer Sizing for Dataflow Edge Streaming'
scenario: 'You are deploying an object detection pipeline on a dataflow accelerator. The model requires 0.26 Tera-operations per inference. The host must continuously stream uncompressed 6 MB frames from a ring buffer. To handle OS-level thread preemptions, the host must buffer enough frames to sustain the accelerator through a 50 millisecond stall.'
question: 'How much pinned host memory is needed to buffer enough 6 MB frames for a 50 ms stall with 4 MB contiguous pages?'
details:
  realistic_solution: 'Determine the accelerator processing rate to know how many frames it consumes during the stall. Calculate buffer depth and round the memory allocation for each frame up to the nearest 4MB page boundary to ensure contiguous DMA transfers.'
  common_mistake: |
    **The Pitfall:** Calculating the raw size of the buffer and ignoring OS-level memory fragmentation.
    **The Rationale:** Candidates forget to round up allocations to match system page sizes required for DMA pinning.
    **The Consequence:** DMA transfer failures due to fragmented memory, causing pipeline stalls and dropped frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator: 26 TOPS.
    - Model: 0.26 TOPS/frame.
    - Frame size: 6 MB.
    - Stall duration: 50 ms.
    - OS page size: 4 MB.

    **Calculations:**
    - Processing rate: 26 / 0.26 = 100 FPS.
    - Frames consumed: 100 FPS * 0.05s = 5 frames.
    - Page-aligned size: ceil(6 MB / 4 MB) * 4 MB = 8 MB/frame.
    - Total memory: 5 frames * 8 MB = 40 MB.

    **Conclusion & Interpretation:**
    - **Result: 40 MB of pinned host memory (Memory-Allocation-Bound)**. Buffer calculations must account for OS page constraints to ensure stable streaming.
