title: Hailo-8 SRAM Budgeting for Automotive Vision Inference
scenario: An automotive company is deploying an INT8 multi-camera perception model on a Hailo-8 edge AI accelerator. The compiled graph is encountering out-of-memory errors and latency spikes because intermediate feature maps and runtime buffers do not fit the expected SRAM budget.
question: How would you budget weights, feature maps, and runtime buffers on Hailo-8 to stop OOMs and latency spikes?
details:
  realistic_solution: Budget the deployment around the Hailo compiler's partition report, on-chip SRAM use, and host memory movement rather than static parameter count alone. Keep weights and activations in supported INT8 form, fuse adjacent operators, tile or downsample feature maps that create large intermediates, and avoid graph cuts that force tensors through host memory. The release candidate should be selected from compiled profiles that show peak buffer usage, DMA traffic, and p99 latency under the target camera resolution and batch size.
  common_mistake: |
    **The Pitfall:** Sizing the deployment strictly from static model weights.
    **The Rationale:** Candidates miss that peak feature maps, compiler workspaces, alignment padding, and graph cuts can dominate the live memory budget.
    **The Consequence:** The model appears small enough on paper but OOMs or stalls when the compiled graph spills intermediates through host memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights: 15M INT8 parameters.
    - Peak feature map before tiling: 160 x 90 x 256 channels at INT8.
    - Two live feature maps plus one similarly sized compiler workspace are needed at the bottleneck.

    **Calculations:**
    - Weight Memory = 15,000,000 * 1 byte = 15 MB.
    - One peak feature map = 160 * 90 * 256 * 1 byte = 3,686,400 bytes = 3.5 MiB.
    - Two live feature maps plus one workspace = 3 * 3.5 MiB = 10.5 MiB.
    - Budget before compiler padding and DMA buffers = 15 MB + ~10.5 MiB = about 26 MB.

    **Conclusion & Interpretation:**
    - **Result: about 26 MB plus compiler/runtime overhead.** The raw weight footprint is not enough; Hailo-8 feasibility depends on compiled peak buffers, fusion, tiling, and avoiding host-memory spills.
