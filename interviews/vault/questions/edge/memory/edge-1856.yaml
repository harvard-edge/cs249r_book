title: Hailo-8 SRAM and Memory Budgeting for Edge LLM Inference
scenario: An automotive company is deploying an on-device conversational AI agent on a Hailo-8 edge AI accelerator (26 TOPS INT8, 2.5W). The initial deployment is encountering frequent out-of-memory errors and unexpected latency spikes.
question: How would you budget and optimize weights, activations, and KV-cache on Hailo-8 to stop OOMs and meet sub-100 ms conversational inference?
details:
  realistic_solution: Budget the deployment around the Hailo-8 compiler's supported partitions, on-chip SRAM use, and host/system memory movement rather than GPU-style VRAM kernels. Keep weights in supported INT8 form, cap the maximum sequence length, and choose a smaller architecture or attention variant if the KV-cache and temporary buffers exceed the available memory budget. Use operator fusion and SRAM-aware partitioning to reduce intermediate tensors, and profile compiler-reported peak buffers instead of assuming FlashAttention-style GPU kernels or training checkpointing will be available.
  common_mistake: |
    **The Pitfall:** Sizing the system architecture strictly based on static model parameter counts (weights).
    **The Rationale:** Candidates forget that Transformer architectures autoregressively build an unbounded KV-cache and generate massive intermediate activation tensors during the prefill phase.
    **The Consequence:** The system fits in memory during offline testing but immediately crashes with hard OOM faults in production as the conversation context window expands.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 15M INT8 parameters.
    - Sequence: 256 tokens, Batch size 1, 4 layers, 4 heads, head dim 64.
    - Datatype: FP16 for KV-Cache (2 bytes per value).

    **Calculations:**
    - Weight Memory = 15,000,000 * 1 byte = 15 MB.
    - Raw KV-cache = 4 (layers) * 4 (heads) * 256 (tokens) * 64 (dim) * 2 (K&V) * 2 bytes = 1,048,576 bytes = 1 MiB (~1.05 MB).
    - Deployed KV budget with double-buffering/alignment can be about 2 MB.
    - Peak activations and temporary buffers (estimate) = ~10 MB before compiler alignment overhead.
    - Total budget before extra runtime overhead = 15 MB + 2 MB + 10 MB = 27 MB.

    **Conclusion & Interpretation:**
    - **Result: about 27 MB plus compiler/runtime overhead.** The raw tensors are small, but Hailo-8 deployment still requires sequence limits, supported quantization, fusion, and SRAM-aware partitioning to avoid OOMs and latency spikes.
