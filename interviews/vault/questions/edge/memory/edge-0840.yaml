title: 'Diagnosing On-Device LoRA Memory Bottlenecks'
scenario: 'You are implementing on-device fine-tuning for a 3B parameter conversational model on a mobile device with a strict 6GB shared memory limit. You apply 4-bit quantization to the base weights (reducing them to 1.5GB) and inject LoRA adapters (r=8) into the attention layers across all 32 layers, adding only 12MB of trainable parameters. Using an SGD optimizer, you expect the training footprint to be under 2GB. However, when the first training step begins with a sequence length of 1024 and batch size 1, the app instantly crashes with an Out-of-Memory (OOM) error.'
question: 'Why does LoRA fine-tuning the 3B model OOM by hitting the 6GB limit, and how would you eliminate the hidden memory bloat?'
details:
  realistic_solution: 'Diagnose that the root cause is activation memory. Even with frozen base weights, backpropagating gradients to the LoRA adapters requires storing the intermediate forward activations for every layer where an adapter is present. To resolve this, implement Gradient Checkpointing (activation recomputation) to trade compute for memory, or restrict LoRA adapters to only the final few layers so early-layer activations can be immediately discarded during the forward pass.'
  common_mistake: |
    **The Pitfall:** Equating Parameter-Efficient Fine-Tuning (PEFT) with Memory-Efficient Fine-Tuning.
    **The Rationale:** Candidates incorrectly guess that the OOM is caused by optimizer states or un-frozen base model gradients, assuming frozen base weights consume zero additional memory during training.
    **The Consequence:** They completely miss the massive memory footprint of the forward activations required for backpropagation, leading to immediate application crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fixed footprint: 1.5GB (4-bit Base) + 12MB (LoRA params) + 12MB (Gradients) + 12MB (SGD State) = ~1.54GB.
    - Activation memory rule: ~34 bytes per token per hidden dimension per layer.
    - 6GB device limit, OS overhead ~1.5GB.

    **Calculations:**
    - Total activation memory: 34 bytes * 1024 (seq_len) * 3072 (hidden_dim) * 32 (layers) = ~3.42GB.
    - Total peak model memory: 1.54GB + 3.42GB = 4.96GB.
    - System memory required: 4.96GB + ~1.5GB = ~6.46GB.

    **Conclusion & Interpretation:**
    - **Result: 6.46GB (Memory-Capacity Bound)**. 6.46GB strictly exceeds the 6GB device limit, causing the OOM crash.
  options:
  - 'Assuming that Parameter-Efficient Fine-Tuning (PEFT) inherently guarantees Memory-Efficient Fine-Tuning.'
  - 'Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.'
  - 'Diagnose that the root cause is activation memory. Even with frozen base weights, backpropagating gradients to the LoRA adapters requires storing the intermediate forward activations for every layer where an adapter is present.'
  - 'The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.'
