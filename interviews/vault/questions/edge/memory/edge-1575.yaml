title: 'Memory-Mapped Concurrent Edge Inference'
scenario: We are deploying a 7B parameter model quantized to INT8 on an on-premise Qualcomm Cloud AI 100 accelerator, operating within its 75W power limit and utilizing its 400 TOPS INT8 compute. The platform has 32 GB of LPDDR4x memory. To mitigate cold starts, we need to run 4 concurrent inference processes.
question: For 4 processes on 32 GB Cloud AI 100, how much memory per process remains for KV cache and activations with independent vs mmap-shared INT8 weights?
details:
  realistic_solution: |
    The correct approach is to recognize that INT8 requires 1 byte per parameter, meaning the 7B model takes 7 GB of memory. By using mmap to load the weights as read-only shared memory, all 4 processes share a single 7 GB footprint. The remaining memory is then evenly distributed among the processes for their individual KV caches and activations.
  common_mistake: |
    **The Pitfall:** Forgetting that independent processes duplicate weight memory in RAM.
    **The Rationale:** Standard multi-processing without explicit shared memory mappings copies the entire process space.
    **The Consequence:** Drastically reducing the available space for the KV cache, causing premature OOM errors or severe context length limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total memory: 32 GB.
    - Weight size: 7B params * 1 byte (INT8) = 7 GB.
    - Number of processes: 4.

    **Calculations:**
    - Independent loading: 4 processes * 7 GB = 28 GB weights. Remaining = 4 GB. Per process = 1 GB.
    - Mmap shared loading: 7 GB total weights shared. Remaining = 25 GB.
    - Available per process: 25 GB / 4 = 6.25 GB.

    **Conclusion & Interpretation:**
    - **Result: 6.25 GB (Memory Optimization)**. Using mmap allows all 4 processes to share a single 7 GB footprint, leaving 6.25 GB per process for KV cache and activations.
