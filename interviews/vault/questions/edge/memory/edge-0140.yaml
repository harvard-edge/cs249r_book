title: The Edge SRAM Speed Advantage
scenario: An edge accelerator integrates a large on-chip SRAM for computation.
question: Roughly how much faster is accessing this on-chip SRAM compared to accessing the main system LPDDR5 DRAM?
details:
  realistic_solution: 'On-chip SRAM access is physically close to the compute units, making its latency comparable to an L1/L2 cache, around ~4 ns. LPDDR5 DRAM is on a separate chip, and access is much slower, around ~100 ns.'
  common_mistake: |
    **The Pitfall:** Applying cloud-scale latency ratios or underestimating the gap.
    **The Rationale:** Engineers either assume edge memory is uniform, or apply HBM vs L1 ratios (~300x) instead of typical SoC DRAM vs SRAM ratios.
    **The Consequence:** Poor memory hierarchy design, leading to dataflow architectures that thrash the LPDDR5 bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-chip SRAM latency: ~4 ns
    - Off-chip LPDDR5 DRAM latency: ~100 ns

    **Calculations:**
    - Speedup ratio = 100 ns / 4 ns = 25

    **Conclusion & Interpretation:**
    - **Result: ~25x Faster (Latency-Bound)**. Data locality in SRAM is critical because fetching from DRAM incurs a 25x latency penalty.
  options:
  - ~2x faster.
  - ~300x faster.
  - ~25x faster.
  - They are about the same speed.
  correct_index: 2
