title: Evaluating Activation Memory Impact of Batch Size Scaling on Jetson Orin Inference
scenario: You are optimizing throughput for a YOLOv8-L object detection pipeline on an edge device with
  32 GB memory. At batch size 1, inference takes 18 ms and uses 1.2 GB memory. At batch size 8, inference
  takes 28 ms and uses 6.8 GB. At batch size 16, inference OOMs.
question: Is YOLOv8-L memory scaling from batch 1 to 8 linear, and what likely causes the OOM at batch
  16?
details:
  realistic_solution: 'From B=1->B=8: memory grows from 1.2 to 6.8 GB. Using a linear model M(B) = M_fixed
    + M_per_sample * B, we find M_fixed = 0.4 GB and M_per_sample = 0.8 GB. Extrapolating to B=16: 0.4
    GB + 0.8 GB * 16 = 13.2 GB. Plus OS + CUDA context (~3 GB on Orin), the total is ~16.2 GB, which does
    not exceed the 32 GB RAM. The OOM at B=16 suggests TensorRT is using a larger-than-expected workspace
    or feature pyramid memory grows superlinearly.'
  common_mistake: '**The Pitfall:** Assuming activation memory scales perfectly linearly with batch size.

    **The Rationale:** Candidates linearly extrapolate from batch=1 to batch=16 without accounting for
    fixed overheads or workspace buffers.

    **The Consequence:** Misdiagnosing the OOM as an activation issue rather than a TensorRT workspace
    or memory leak problem.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Linear model: M(B) = M_fixed + M_per_sample * B.

    - B=1: M = 1.2 GB. B=8: M = 6.8 GB.

    - OOM occurs at 32 GB.


    **Calculations:**

    - M_fixed + M_per = 1.2.

    - M_fixed + 8 * M_per = 6.8.

    - Solve: M_per = 0.8 GB/sample, M_fixed = 0.4 GB.

    - Predicted M(16) = 0.4 + 0.8 * 16 = 13.2 GB.


    **Conclusion & Interpretation:**

    - **Result: 13.2 GB (Memory-Bound)**. OOM at 32 GB is unexpected, indicating superlinear workspace
    growth.'
