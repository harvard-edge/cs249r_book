title: Debugging EWC Memory Overheads on MCU
scenario: You are deploying a wake-word model on a Cortex-M4 microcontroller with 256KB SRAM. The model has 25K FP32 parameters (100KB footprint). To add a new wake word via on-device learning without forgetting the original, the team enables Elastic Weight Consolidation (EWC). However, the on-device fine-tuning process immediately crashes with an Out-Of-Memory (OOM) error, even though standard fine-tuning fits tightly within the 256KB SRAM.
question: Why does enabling EWC make fine-tuning the 25K-parameter wake-word model OOM on 256 KB SRAM, and how would you fix it?
details:
  realistic_solution: 'EWC requires storing the previous task''s optimal weights and the diagonal of the Fisher Information Matrix to compute the regularization penalty. For a 25K parameter model, this adds a rigid memory overhead. To fix the OOM, use an Online EWC variant that maintains a single decaying running average of the Fisher matrix.'
  common_mistake: Assuming EWC only modifies the loss function mathematically, without realizing it requires persisting auxiliary matrices in the device's working memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - 25K FP32 parameters (100 KB weights)
    - Total SRAM = 256 KB

    **Calculations:**
    - Standard FT footprint = 100 KB weights + 100 KB grads + 40 KB activations = 240 KB
    - EWC adds Old Weights (100 KB) + Fisher Diagonal (100 KB) = 200 KB
    - Total EWC footprint = 240 KB + 200 KB = 440 KB

    **Conclusion & Interpretation:**
    - **Result: 440 KB (Memory-Capacity-Bound)**. The auxiliary matrices required for EWC exceed the rigid SRAM limit, mandating an online running-average approach.
