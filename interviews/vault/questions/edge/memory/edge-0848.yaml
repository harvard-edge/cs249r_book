title: Evaluating On-Device Adaptation Strategies for Mobile Keyboards
scenario: You are designing the on-device learning strategy for a smart keyboard on a mobile device (background processes are strictly limited to 256MB RAM and 10 minutes of execution per night). The goal is to adapt a 100M parameter language model to the user's specific vocabulary without sending data to the cloud.
question: For the 100M-parameter keyboard model under a 256MB, 10-minute nightly budget, should you use full fine-tuning, LoRA, or a local n-gram cache?
details:
  realistic_solution: Choose the local n-gram/dynamic cache for this vocabulary-adaptation task. Full fine-tuning is far beyond the 256MB background limit once gradients and Adam state are included. LoRA can be useful for deeper semantic adaptation, but under the stated prompt it still requires keeping the base model, activations, gradients, and optimizer state live during a short nightly training window. A local cache directly solves new-word and phrase personalization without backpropagation, avoids sending user text to the cloud, and can be bounded to tens of MB.
  common_mistake: |
    **The Pitfall:** Proposing full fine-tuning or LoRA without calculating optimizer state or activation memory.
    **The Rationale:** Candidates often focus purely on the parameter count, ignoring the strict background OS RAM limits.
    **The Consequence:** The background process immediately breaches the 256MB OS limit and is aggressively killed by the operating system, failing to update the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M parameter base model.
    - Background memory cap: 256MB.
    - Goal: user-specific vocabulary adaptation.
    - Local n-gram cache budget: cap entries to <=50MB.

    **Calculations:**
    - Full fine-tuning lower bound with FP16 weights: weights 100M * 2B = 200MB.
    - Add FP16 gradients: +200MB, already 400MB before Adam moments, activations, and runtime overhead.
    - Adam moments alone: 100M * 2 * 4B = 800MB.
    - Local cache: fixed-size entries and counts can be bounded to <50MB and requires no backward pass.

    **Conclusion & Interpretation:**
    - **Result: choose the local n-gram cache.** It is the only option that directly matches vocabulary personalization while staying comfortably under the 256MB and 10-minute nightly limits. Full fine-tuning OOMs, and LoRA should be reserved for a separately specified semantic-adaptation requirement with explicit quantization and training-memory assumptions.
