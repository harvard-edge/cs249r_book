title: Calculate Maximum Batch Size for LLM on Qualcomm Cloud AI 100
scenario: You are deploying an INT8 quantized large language model on an on-premise inference accelerator, specifically the Qualcomm Cloud AI 100. The model weights require 20 GB of memory, and you must allocate 2 GB for the operating system and base runtime.
question: What maximum batch size fits in 32 GB when weights use 20 GB, runtime uses 2 GB, and KV cache uses 1.5 GB per sequence?
details:
  realistic_solution: 'The correct approach is to first determine the total memory available exclusively for the KV cache by subtracting the memory used by the model weights and the OS/runtime from the total physical memory of the accelerator. Then, divide this available memory capacity by the memory required per sequence to find the maximum concurrent batch size. This ensures the application runs stably within the hardware constraints of the 32 GB device.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for OS and runtime overhead.
    **The Rationale:** Candidates calculate purely based on raw physical memory and the model weights.
    **The Consequence:** The deployment is misconfigured with an impossible batch size, leading directly to catastrophic out-of-memory runtime crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Memory: 32 GB.
    - Model Weights: 20 GB.
    - OS/Runtime Reservation: 2 GB.
    - KV Cache per sequence: 1.5 GB.

    **Calculations:**
    - Memory Reservations: 20 GB + 2 GB = 22 GB.
    - Memory for KV Cache: 32 GB - 22 GB = 10 GB.
    - Theoretical Batch Size: 10 GB / 1.5 GB per sequence = 6.66.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Bound.** The maximum supported integer batch size is 6.
