title: Calculate Mmap Cold Start Latency on Jetson Orin
scenario: You are deploying a 15 billion parameter vision-language model quantized to INT8 on an NVIDIA Jetson Orin. To support multiple concurrent worker processes without duplicating RAM usage, you load the 15 GB weight file using memory mapping (`mmap`). The underlying NVMe storage has a sustained sequential read throughput of 2.5 GB/s.
question: What is the absolute minimum cold-start time to page the 15 GB INT8 model from 2.5 GB/s NVMe into Jetson memory?
details:
  realistic_solution: Since the weights are not in RAM at cold start, the theoretical minimum time to fault them into memory is strictly bounded by the NVMe sequential read speed. To mitigate this latency, engineers use flags like `MAP_POPULATE` or sequentially read the memory region during application startup.
  common_mistake: |
    **The Pitfall:** Confusing Jetson's LPDDR5 memory bandwidth with NVMe storage bandwidth.
    **The Rationale:** Candidates focus on the fast memory bus and assume `mmap` instantly places the file in RAM.
    **The Consequence:** They drastically underestimate cold-start latency, failing to realize `mmap` lazily loads pages via page faults bound by disk I/O.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size = 15 billion parameters (INT8).
    - NVMe read throughput = 2.5 GB/s.

    **Calculations:**
    - Weights footprint = 15 GB.
    - Minimum cold start latency = 15 GB / 2.5 GB/s = 6.0 seconds.

    **Conclusion & Interpretation:**
    - **Result: 6.0 seconds (IO-Bandwidth Bound)**. The IO bottleneck creates a strict 6.0-second delay before full-speed inference begins.
