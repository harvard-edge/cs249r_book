title: 'On-Device LoRA with Heterogeneous Checkpointing'
scenario: 'You are designing an on-device continual learning pipeline for a robotic perception agent running on an NVIDIA Jetson Orin. The system must fine-tune an 8-billion parameter vision-transformer (quantized to INT8) via LoRA using streaming batches of 4 high-resolution images. A naive training setup requires 45 GB of activation memory for the backward pass, which severely exceeds the Jetson Orin''s 32 GB LPDDR5 shared memory.'
question: 'How would you architect LoRA fine-tuning on Orin to fit the 8B INT8 transformer, 45 GB naive activations, 32 GB RAM, and 60W TDP?'
details:
  realistic_solution: 'The optimal architecture partitions the model across the Orin''s heterogeneous compute. The first 50% of layers are frozen, require no backward pass, and are mapped to the DLA for highly efficient INT8 forward passes with zero activation retention. For the latter 50% mapped to the Ampere GPU, selective gradient checkpointing is applied at transformer block boundaries. This trades a slight increase in compute for a massive reduction in peak activation memory, fully utilizing the 275 TOPS capacity without violating the 60W thermal budget.'
  common_mistake: |
    **The Pitfall:** Suggesting aggressive activation offloading to NVMe storage or uniform gradient checkpointing.
    **The Rationale:** Candidates ignore the PCIe bandwidth bottleneck and latency impact on a 60W edge device, or they recompute purely on the GPU, wasting DLA accelerators.
    **The Consequence:** The proposed solution still causes thermal throttling or unacceptably slow training times due to massive I/O overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total LPDDR5 Memory: 32 GB.
    - System/OS allocation: ~4 GB.
    - INT8 Model Weights (8B params): 8 GB.
    - LoRA FP16 weights/optimizer state: ~1 GB.
    - Naive activation memory for B=4: 45 GB.

    **Calculations:**
    - Available memory for activations: 32 - (4 + 8 + 1) = 19 GB.
    - DLA offload: Freezing the first 50% of layers removes their activation storage requirements entirely, reducing needed memory to 22.5 GB.
    - Gradient checkpointing: Applying it to the remaining GPU layers (e.g., every 4th layer) reduces the remaining activation memory by 4x: 22.5 GB / 4 = 5.625 GB.
    - Peak memory footprint: 4 (OS) + 8 (Weights) + 1 (LoRA) + 5.625 (Activations) = 18.625 GB.

    **Conclusion & Interpretation:**
    - **Result: 18.625 GB Peak Footprint (Memory-Capacity Mitigated)**. Fits comfortably within the 32 GB limit without violating the thermal budget.
