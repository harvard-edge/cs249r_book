title: 'On-Device LoRA Gradient Checkpointing Tradeoffs'
scenario: 'We are implementing on-premise LoRA fine-tuning for a 7B parameter LLM on a single Qualcomm Cloud AI 100 inference accelerator to personalize a customer service bot. The accelerator features 32 GB of LPDDR4x memory, 400 TOPS INT8 compute, and a strict 75W power envelope. During the forward pass with a sequence length of 4096 and a batch size of 2, the system runs out of memory before the backward pass can begin.'
question: 'How would you diagnose this bottleneck and quantify the compute-memory tradeoff of applying gradient checkpointing to fit the workload within the hardware constraints?'
details:
  realistic_solution: 'A strong candidate will identify that storing all intermediate activations for the entire network exceeds the remaining memory capacity of the accelerator. The correct approach is to implement gradient checkpointing (activation recomputation) at specific layer boundaries, leveraging the ample 400 TOPS compute to handle the extra forward pass while drastically reducing peak memory.'
  common_mistake: 'Immediately suggesting reducing batch size or sequence length without analytically quantifying the activation memory footprint, severely degrading training quality.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 32 GB LPDDR4x memory, 400 TOPS INT8.
    - Model: 7B INT8 model weights (7 GB), 32 layers.
    - Workload: FP16 activations, batch=2, seq_len=4096, hidden=4096.

    **Calculations:**
    - Base memory remaining: 32 GB - 7 GB = 25 GB.
    - FP16 activation memory per layer: ~34 bytes/token * 2 * 4096 * 4096 ≈ 1.14 GB per layer.
    - Total memory without checkpointing: 7 GB weights + (32 * 1.14 GB) = 43.5 GB (OOM).
    - With checkpointing every 6 layers (√32): Peak activation memory = (36.5 GB / 6) + (1.14 GB * 6) ≈ 12.9 GB.
    - Total peak memory with checkpointing: 7 GB + 12.9 GB = 19.9 GB.

    **Conclusion & Interpretation:**
    - **Result: 19.9 GB (Compute-Bound Tradeoff)**. Gradient checkpointing sacrifices compute to effectively fit the training workload within the 32 GB limit.
