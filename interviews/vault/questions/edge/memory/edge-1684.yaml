title: On-Device LoRA Gradient Checkpointing Tradeoffs
scenario: We are implementing on-premise LoRA fine-tuning for a 7B parameter LLM on a 32 GB edge training accelerator with FP16 tensor cores and a strict 75W power envelope. During the forward pass with a sequence length of 4096 and a batch size of 2, the system runs out of memory before the backward pass can begin.
question: How would you quantify activation checkpointing so this LoRA fine-tuning job fits in 32 GB?
details:
  realistic_solution: |
    A strong candidate first separates static memory from training-time memory: quantized base weights, LoRA adapters, optimizer state for only the adapters, gradients, activations, and runtime workspace. The bottleneck is saved FP16 activations across 32 transformer layers at batch 2 and sequence length 4096, not the LoRA weights. Apply activation checkpointing at transformer block boundaries so only checkpoints and the current recompute window are live; this trades roughly one extra forward recomputation per checkpointed segment for a large reduction in peak activation memory. If the accelerator lacks backward support, the correct diagnosis is to move training to a training-capable device rather than pretending inference-only INT8 engines can run LoRA backpropagation.
  common_mistake: |
    **The Pitfall:** Immediately suggesting reducing batch size or sequence length without analytically quantifying the activation memory footprint.
    **The Rationale:** Candidates often default to generic hyperparameter tuning without understanding the specific activation memory bottleneck caused by the long sequence length.
    **The Consequence:** This leads to severely degrading training quality or context length capabilities, failing to leverage available compute to trade for memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 32 GB memory on a training-capable edge accelerator.
    - Model: 7B base weights stored in 8-bit form (7 GB), 32 layers.
    - Workload: FP16 activations, batch=2, seq_len=4096, hidden=4096.
    - Approximate saved activation factor: 6 FP16 hidden-sized tensors per layer.
    - LoRA adapters, gradients, optimizer state, and runtime workspace reserve: 6 GB.

    **Calculations:**
    - One FP16 hidden tensor = batch * seq * hidden * 2 bytes = 2 * 4096 * 4096 * 2 = 67.1 MB.
    - Saved activations per layer = 6 * 67.1 MB = 402.7 MB.
    - Without checkpointing: 32 * 402.7 MB = 12.9 GB activations.
    - Total without checkpointing: 7 GB weights + 6 GB reserve + 12.9 GB activations = 25.9 GB before attention temporaries, leaving too little headroom.
    - Checkpoint every 4 layers: retain 8 block-boundary tensors = 8 * 67.1 MB = 0.54 GB, plus recompute window 4 * 402.7 MB = 1.61 GB, for about 2.15 GB peak saved activations.
    - Total with checkpointing: 7 GB + 6 GB + 2.15 GB = 15.15 GB before attention temporaries, leaving about 16.85 GB for temporary attention/workspace.
    - Recompute cost: checkpointed backward reruns most forward blocks once, adding roughly 25-35% step time depending on kernel overlap.

    **Conclusion & Interpretation:**
    - **Result: about 15.2 GB persistent peak before attention temporaries (Compute-Memory Tradeoff)**. Checkpointing makes the job plausible on 32 GB by spending roughly 25-35% more compute to save about 10.7 GB of activation memory.
