title: 'Host Memory Allocation and DMA Overhead for Hailo-8'
scenario: 'A high-throughput vision pipeline is deployed on a low-power edge gateway using a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 relies entirely on streaming from host memory. The model requires 12MB for weights and 8MB for intermediate activations per frame. The host maintains a ring buffer of 5 concurrent frames. Due to host OS memory fragmentation, contiguous allocation is impossible, forcing the use of scatter-gather DMA with 4KB pages.'
question: 'What total host memory footprint is used by the 5-frame Hailo-8 ring buffer plus 4KB scatter-gather DMA metadata if the OS requires a 16-byte tracking descriptor for every page?'
details:
  realistic_solution: |
    To avoid OOM errors and ensure stable 2.5W operation, you must calculate the total memory for the entire ring buffer, not just a single frame. Since the Hailo-8 has no local DRAM, all data lives on the host. When memory is fragmented, scatter-gather DMA ensures the accelerator can still operate, but the OS must allocate additional memory for the page descriptors, which adds to the total system memory pressure.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw model size and forgetting the multi-frame buffer and OS-level DMA overhead.
    **The Rationale:** ML engineers often ignore systems programming realities like memory fragmentation and scatter-gather lists.
    **The Consequence:** Unaccounted memory pressure leading to Out-Of-Memory (OOM) kills on heavily constrained edge gateways.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single Frame Buffer: 12 MB weights + 8 MB activations = 20 MB.
    - Ring Buffer Size: 5 frames.
    - Page Size: 4 KB. Descriptor: 16 bytes/page.

    **Calculations:**
    - Total Ring Buffer: 5 * 20 MB = 100 MB (102,400 KB).
    - Pages Required: 102,400 KB / 4 KB = 25,600 pages.
    - Scatter-Gather Metadata: 25,600 pages * 16 bytes = 409,600 bytes (~400 KB).
    - Total Host Footprint: 100 MB + 400 KB = 100.4 MB.

    **Conclusion & Interpretation:**
    - **Result: 100.4 MB Total Footprint (Memory-Bound).** Fragmented memory necessitates scatter-gather DMA, adding tracking overhead to the total memory pressure.
