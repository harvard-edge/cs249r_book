title: Optimizing Large Language Model Deployment on NVIDIA Jetson Orin with Activation Memory Constraints
scenario: You are tasked with deploying a large transformer-based language model (LLM) on an NVIDIA Jetson Orin platform (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for real-time inference. The model has 10 billion parameters, and each parameter is stored as an FP16 value. During inference, the forward pass generates intermediate activations that, if stored fully, significantly exceed the available 32 GB LPDDR5 memory. Your goal is to achieve the highest possible inference throughput while staying within the 60W power budget and respecting the memory limit.
question: What quantization and runtime-memory strategy lets the 10B LLM run on Jetson Orin within 32 GB LPDDR5 and 60W?
details:
  realistic_solution: |
    Quantize the parameters, not just activations: a 10B FP16 model uses about 20 GB before runtime buffers, so INT8 or lower-weight quantization is usually required to leave enough memory for KV-cache, temporary tensors, TensorRT workspaces, and OS/driver reservations. Keep batch size small, cap sequence length, consider KV-cache quantization or attention variants that reduce cache growth, and use TensorRT graph fusion/in-place buffers to reduce temporary activation peaks. Training-style activation checkpointing is not the primary inference fix; only use recomputation for a specific custom pipeline if profiling shows the extra compute and power still fit within the 60W budget.
  common_mistake: |
    **The Pitfall:** Applying training-time gradient checkpointing strategies without adapting them for inference.
    **The Rationale:** Candidates ignore the dynamic nature of inference activation memory and assume static model parameter size is the only constraint.
    **The Consequence:** They overlook the computational overhead introduced by recomputation, leading to unacceptable latency or power consumption that blows past the 60W budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameter memory in FP16: 10B parameters * 2 bytes = 20 GB.
    - Parameter memory in INT8: 10B parameters * 1 byte = 10 GB.
    - Total memory: 32 GB LPDDR5 before OS, driver, and workspace reservations.
    - Example KV-cache: 40 layers, 40 heads, head dim 128, 2048-token context, FP16 K and V.

    **Calculations:**
    - Remaining memory with FP16 weights = 32 GB - 20 GB = 12 GB, too tight for KV-cache, temporary buffers, runtime, and OS overhead.
    - Remaining memory with INT8 weights = 32 GB - 10 GB = 22 GB before runtime reservations.
    - KV-cache size = 40 * 40 * 2048 * 128 * 2 (K&V) * 2 bytes = 1,677,721,600 bytes = ~1.56 GiB.
    - A 4 GB TensorRT/workspace budget plus ~1.56 GiB KV-cache leaves roughly 16 GB for activations, runtime, and safety margin after INT8 weights.

    **Conclusion & Interpretation:**
    - **Result: parameter quantization plus KV-cache and workspace control is the viable inference strategy.** INT8 weights create enough headroom to manage runtime memory; recomputation is optional and must be justified by measured latency and 60W power behavior.
