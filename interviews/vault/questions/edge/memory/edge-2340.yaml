title: SRAM Tiering for Generation
scenario: An Edge TPU design has 16MB of SRAM and ample LPDDR5. A transformer model has 50MB of weights.
question: Design a memory tiering strategy that maximizes the utilization of the SRAM during the generation phase?
visual:
  kind: svg
  path: edge-2340.svg
  alt: Bar chart showing huge 2TB/s SRAM bandwidth vs small 100GB/s DRAM bandwidth
  caption: Bandwidth Hierarchy Capabilities
details:
  realistic_solution: |
    Treat the 16MB SRAM as a scratchpad for the current generation tile, not as a persistent cache for the transformer's full KV working set or weight set. Use layer tiling and double buffering: while one SRAM buffer feeds compute for the current weight tile and activation slice, prefetch the next tile from LPDDR5 into the other buffer, then evict it after use. Keep only the current token's small activation slice, attention tile, lookup data, and scheduler metadata in SRAM when they fit; stream KV pages and 50MB of weights from LPDDR5 in bounded tiles. Across tokens the weights are reused logically but cannot all remain resident in SRAM, so utilization comes from predictable prefetch/compute overlap and avoiding avoidable intermediate spills, not broad KV or parameter persistence.
  common_mistake: |
    **The Pitfall:** Over-batching queries to improve throughput.
    **The Rationale:** Candidates attempt to batch queries to improve throughput without realizing batching massively expands the KV cache footprint.
    **The Consequence:** The KV cache quickly exceeds the 16MB SRAM, spilling into slow LPDDR5 and destroying generation performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Capacity: 16MB, Bandwidth: 2TB/s.
    - LPDDR5 Capacity: Ample, Bandwidth: 100GB/s.
    - Model Weights: 50MB.

    **Calculations:**
    - SRAM cannot hold all 50MB of weights at once, so full-model pinning is impossible.
    - Reserve SRAM for the current activation slice, attention tile, metadata, and one or two weight tiles; stream larger KV pages and weights from LPDDR5 as needed.
    - Use double buffering so one tile is consumed while the next tile is prefetched, then evict tiles immediately after the layer consumes them.
    - Do not compute "50MB - 16MB = 34MB per token" as a residual cache. SRAM capacity defines the working tile size, not a permanent split of the model.

    **Conclusion & Interpretation:**
    - **Result: Tiled SRAM Working Set (Memory-Bound).** SRAM should be spent on the current compute tile and double-buffered prefetch state. The design improves utilization through streaming and overlap while LPDDR5 still supplies the larger KV and weight streams; it does not imply that substantial KV cache or model parameters can stay resident in 16MB.
