title: Optimizing Large Language Model Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on an NVIDIA Jetson Orin. The model requires 40 GB of parameters when loaded in full precision (FP16), but can be quantized to INT8, reducing its size to 20 GB. The inference latency requirement targets less than 100ms per token.
question: How would you manage the 20 GB INT8 model and activations on Jetson Orin to meet sub-100 ms per-token latency within 32 GB LPDDR5 and 60W?
details:
  realistic_solution: |
    A realistic solution must treat fitting the 20 GB INT8 weights as only the first constraint. The headline remaining 12 GB shrinks after OS, drivers, TensorRT engine buffers, CUDA workspace, temporary activations, and KV-cache, so cap context length and batch size, consider KV-cache quantization or grouped-query attention, and avoid paging or storage offload in the token path. Use TensorRT graph fusion, calibrated INT8 kernels, contiguous weight layouts, and power-aware scheduling, but verify per-token latency with profiling because dense autoregressive decoding may read most resident weights each token. If the measured bandwidth floor plus compute and runtime overhead exceeds 100 ms/token, the practical fix is a smaller model, lower context, stronger quantization, or model partitioning that keeps token-critical data resident.
  common_mistake: |
    **The Pitfall:** Assuming that if the model fits in memory after quantization, it will automatically run fast.
    **The Rationale:** Candidates overlook the substantial impact of LPDDR5 bandwidth limitations and access latency.
    **The Consequence:** Non-optimal data movement patterns cause severe stalls, resulting in unacceptable inference latency and higher power consumption.
  napkin_math: |
    **Assumptions & Constraints:**
       - INT8 model size: 20 GB.
       - Orin LPDDR5 bandwidth: ~200 GB/s peak.
       - Target latency: <100 ms per token.
       - Available memory: 32 GB total.
       - Example KV-cache: 32 layers, 32 heads, head dim 128, 2048-token context, FP16 K and V.
    **Calculations:**
       - Ideal lower bound to read all weights once per token = 20 GB / 200 GB/s = 0.100 s = 100 ms before compute and runtime overhead.
       - KV-cache size = 32 * 32 * 2048 * 128 * 2 (K&V) * 2 bytes = 1,073,741,824 bytes = 1 GiB.
       - Remaining headline memory after weights and this KV-cache = 32 GB - 20 GB - ~1 GB = ~11 GB before accounting for activations, workspaces, runtime, and OS reservations.
    **Conclusion & Interpretation:**
       - **Result: fitting in 32 GB is necessary but not sufficient.** A full weight read already reaches the 100 ms/token target at peak bandwidth, so the deployment needs smaller working sets, KV-cache controls, fused kernels, and profiling to prove the target.
