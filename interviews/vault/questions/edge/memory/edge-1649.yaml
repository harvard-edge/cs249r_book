title: Bypassing PCIe Bottlenecks on Edge TPU
scenario: You are designing an anomaly detection system using a PCIe-based Google Coral Edge TPU (4 TOPS INT8, 2W, PCIe Gen2 x1). The system ingests 4 HD camera streams (1080p @ 30 FPS). The legacy pipeline crops 100 suspect regions (224x224 RGB) per frame on the host CPU, allocates them in standard memory, and queues them to the TPU individually. The TPU compute is severely underutilized, and the system drops frames due to host-device data transfer overhead.
question: What memory and data-movement architecture would make 4 HD 30 FPS camera streams real-time on a PCIe Coral Edge TPU?
details:
  realistic_solution: |
    Redesign the detector as a fully convolutional model that consumes one fixed preprocessed INT8 tensor per camera frame instead of 100 separately queued RGB ROIs. Use a small pool of page-locked host input buffers per camera, have the camera/ISP or CPU preprocessing stage write grayscale or downsampled tensors into those pinned buffers, and submit one contiguous TPU transfer per frame through a bounded per-camera ring. This removes thousands of small PCIe transactions per second, keeps the TPU fed with predictable DMA, and gives the host a clear drop policy when a camera ring is full.
  common_mistake: |
    **The Pitfall:** Attempting to optimize the CPU multi-threading or memory pinning for the 12,000 individual ROIs.
    **The Rationale:** Candidates focus on improving the speed of the existing software loop rather than identifying the hardware limit.
    **The Consequence:** While zero-copy host buffers help CPU load, thousands of small transfers completely saturate the PCIe Gen2 x1 setup overhead, starving the TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral PCIe Gen2 x1 practical limit: ~400 MB/s.
    - Coral Compute: 4 TOPS.
    - Target: 4 cams * 30 FPS.

    **Calculations:**
    - Legacy ROI approach: 100 ROIs * 4 cams * 30 FPS = 12,000 inferences/s.
    - 224x224x3 INT8 = 150,528 bytes = ~147 KiB (~150 KB) per ROI. 12,000 * 150,528 bytes = ~1.81 GB/s raw ROI payload, before per-transfer DMA overhead.
    - Legacy transfer count = 12,000 small host-to-TPU submissions/s, so PCIe and driver overhead dominate even before counting duplicated pixels across overlapping ROIs.
    - Chosen FCN input path: 4 cams * 30 FPS = 120 preprocessed tensors/s.
    - If the chosen tensor is grayscale 1080p, 1920x1080x1 INT8 = 2,073,600 bytes = ~2.07 MB/frame. 120 * 2.07 MB = ~248.8 MB/s raw payload, before PCIe/DMA overhead.
    - If the model uses a smaller downsampled tensor, payload falls further; the key design rule is one contiguous tensor transfer per frame, not 100 ROI transfers.
    - FCN transfer count = 120 large contiguous submissions/s, a 100x reduction in transaction count versus the ROI path.

    **Conclusion & Interpretation:**
    - **Result: ~249 MB/s raw payload and 120 large transfers/s (I/O-Bound).** The FCN design is plausible only with contiguous pinned buffers, bounded rings, and measured DMA overhead; it is far more defensible than 12,000 small ROI transfers/s that already exceed the bus on payload alone.
