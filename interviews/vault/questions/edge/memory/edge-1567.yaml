title: Edge TPU USB Bandwidth Bottleneck
scenario: You are deploying an INT8 quantized image classification model on a Google Coral Edge TPU USB Accelerator. The model takes a standard 224x224x3 RGB image input. Your deployment environment forces you to connect the Coral device to a legacy host via a USB 2.0 port, which provides a maximum effective transfer rate of 35 MB/s. Inference takes 2.5 ms.
question: What is the host-to-device transfer time for one 224x224x3 INT8 image over USB 2.0, and is the system compute-bound or I/O-bound?
details:
  realistic_solution: 'Calculate the exact payload size in bytes, divide by the effective interface bandwidth to find the transfer time, and compare this to the 2.5 ms compute time. Because the transfer time is significantly longer than the inference time, the system is strictly I/O-bound.'
  common_mistake: |
    **The Pitfall:** Calculating input size using 32-bit floats.
    **The Rationale:** Candidates are accustomed to FP32 training pipelines and default to 4 bytes per pixel value.
    **The Consequence:** They overestimate the payload size by 4x, fundamentally misunderstanding INT8 quantized pipelines and failing to compare the correct transfer time against the 2.5 ms compute time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 224x224x3 INT8 (1 byte per channel)
       - USB 2.0 Bandwidth: 35 MB/s (35,000 KB/s)
       - Inference Compute Time: 2.5 ms
    2. **Calculations:**
       - Input Payload Size: 224 * 224 * 3 * 1 byte = 150,528 bytes (~150.5 KB)
       - Network Transfer Time: 150.5 KB / 35,000 KB/s ≈ 0.0043 seconds = 4.3 ms
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** Transferring the frame payload takes 4.3 ms, far exceeding the 2.5 ms compute time. The edge accelerator is forced to sit idle waiting on the legacy USB interconnect.
