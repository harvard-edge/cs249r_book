title: 'Mastery: Proving the Memory-Compute Optimality of Gradient Checkpointing Under Edge Constraints'
scenario: You are asked to formally justify the checkpoint interval selection for on-device fine-tuning of a 100M parameter ResNet on an edge SoC. The model has N=50 layers, each with activation memory M_L = 50 MB and compute time T_L = 2 ms (forward). The memory budget for activations is B = 500 MB.
question: What checkpoint interval k minimizes training step time for the 50-layer ResNet under a 500MB activation budget, and why is it optimal?
details:
  realistic_solution: 'M_peak(k) = k × M_L (activations in one checkpoint window). Constraint: k ≤ B / M_L = 500 / 50 = 10. T_recompute(k): number of checkpoint boundaries = ceil(N/k). Each boundary triggers one forward pass through k layers = k × T_L. Total recompute = ceil(N/k) × k × T_L = N × T_L (independent of k!). Therefore T_total(k) = T_fwd + T_bwd + N × T_L = constant for all k. Since T_total is constant in k, any k satisfying the memory constraint is equally optimal in time. Choose k = floor(B/M_L) = 10 to maximize memory headroom and minimize checkpoint boundary overhead (fewer synchronization points, better for the DMA engine). QED: k=10 is optimal (or any k ≤ 10 is equally time-optimal; k=10 maximizes headroom).'
  common_mistake: |
    **The Pitfall:** Assuming a smaller checkpoint interval (e.g. k=5) saves time.
    **The Rationale:** Candidates fail to formally model the time cost of recomputation as a function of k, incorrectly assuming that saving memory also linearly saves compute time.
    **The Consequence:** Choosing an unnecessarily small k, which introduces excessive synchronization overhead to the DMA engine without actually reducing total step time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * M_L = 50 MB. T_L = 2 ms. B = 500 MB. N = 50 layers.
       * Constraint: k <= B / M_L = 10.
    2. **Calculations:**
       * Recomputation time T_recompute(k) = ceil(N/k) * k * T_L = N * T_L = 50 * 2ms = 100ms.
       * Total step time T_total(k) = T_fwd + T_bwd + 100ms.
    3. **Conclusion & Interpretation:**
       * **Since recompute time is mathematically independent of k, selecting the maximum k=10 minimizes synchronization boundaries without violating the memory limit. Result: Compute-Optimal.**
