title: Zero-Copy Video Pipeline Architecture for Google Coral Edge TPU
scenario: You are designing an edge-based smart security camera system. The system captures 1080p video at 60 FPS and runs object detection on a Google Coral Edge TPU connected via USB 3.0. The Edge TPU requires INT8 quantized models. Your team noticed that the CPU utilization is at 100% and inference framerate is dropping to 15 FPS, even though the Coral Edge TPU is only utilized at 30%.
question: How would you redesign the 1080p60 Coral USB data pipeline to fix 100% CPU use while the Edge TPU sits at 30% utilization?
details:
  realistic_solution: |
    The optimal design reduces host-side copies rather than claiming true device zero-copy into the USB Edge TPU. Use V4L2 mmap or dma-buf for camera ingest so the ISP writes into reusable host buffers, perform resize/color conversion in place or through the ISP/GPU, and pass compact INT8 input tensors to the Coral runtime. The USB Edge TPU is still host-mediated, so the frame must traverse the USB stack, but eliminating extra kernel/user copies and full-frame repacking removes the CPU bottleneck.
  common_mistake: |
    **The Pitfall:** Suggesting model architecture optimization or further quantization.
    **The Rationale:** Candidates assume the TPU compute is the bottleneck, ignoring the 30% utilization metric.
    **The Consequence:** Completely missing the host-side memory copy bottleneck, leading to useless ML optimizations while the CPU remains overloaded.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw Video: 1080p at 60 FPS (1920 * 1080 * 3 bytes * 60).
    - USB 3.0 Limit: ~400 MB/s.
    - Naive Pipeline: repeated full-frame host copies before USB submission.

    **Calculations:**
    - Raw Video Bandwidth: 1920 * 1080 * 3 * 60 = 373 MB/s.
    - 373 MB/s is already near the practical USB 3.0 ceiling before protocol overhead.
    - Three full-frame CPU copies would create about 3 * 373 MB/s = 1.12 GB/s of host memory-copy work, but the USB payload is still only the submitted tensor stream.
    - Reducing host copies from three to one saves about 2 * 373 MB/s = 746 MB/s of CPU memory traffic.

    **Conclusion & Interpretation:**
    - **Result: CPU-Bound from host copies, not Edge TPU compute.** mmap/dma-buf camera ingest and in-place preprocessing reduce CPU memory traffic, while the USB Edge TPU still requires host-mediated transfer and remains close to the USB 3.0 throughput limit.
