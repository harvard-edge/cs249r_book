title: Activation Spilling Latency on Dataflow Accelerators
scenario: You are deploying a high-resolution vision model to a Hailo-8 edge AI processor (26 TOPS INT8, 2.5W) in a host-attached configuration. For this deployment, assume an intermediate activation that exceeds on-chip SRAM must be written to host memory and later read back over an effective 4 GB/s host interface. The bottleneck layer produces a 256x256x64 INT8 activation tensor that cannot fit on-chip.
question: What latency penalty does spilling and reloading the 256x256x64 INT8 activation add over a 4 GB/s host interface?
details:
  realistic_solution: The correct approach is to calculate the approximate size of the INT8 activation tensor and charge both the spill write and reload read over the effective host interface. The tensor has 4,194,304 bytes, which is about 4.19 MB decimal or 4.0 MiB. With a 4 GB/s decimal effective link, each transfer is about 1.05 ms, so the round trip is approximately 2.1 ms.
  common_mistake: |
    **The Pitfall:** Calculating only the memory footprint of the activation tensor.
    **The Rationale:** Candidates incorrectly assume the accelerator has local DDR memory like a GPU.
    **The Consequence:** They fail to quantify the dual read/write latency cost over the host bus for streaming dataflow architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor Size is 256 * 256 * 64 channels.
    - Data format is INT8 (1 byte per element).
    - Host interface bandwidth is 4.0 GB/s, treated as 4000 MB/s decimal effective bandwidth.

    **Calculations:**
    - INT8 Footprint is 4,194,304 elements * 1 byte = 4,194,304 bytes = 4.19 MB decimal (~4.0 MiB).
    - Write Latency is 4.19 MB / 4000 MB/s = 1.05 ms.
    - Read Latency is 4.19 MB / 4000 MB/s = 1.05 ms.
    - Total Penalty is 1.05 ms + 1.05 ms = 2.10 ms per inference pass.

    **Conclusion & Interpretation:**
    - **Result: about 2.1 ms (Memory-Bandwidth-Bound)**. Spilling and reloading the activation adds approximately a 2.1 ms latency penalty per pass under the stated host-attached assumption.
