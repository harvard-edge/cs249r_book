title: Activation Spilling Latency on Dataflow Accelerators
scenario: You are deploying a high-resolution vision model to a Hailo-8 edge AI processor (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, any intermediate activations that exceed the on-chip SRAM must be streamed to and from the host memory. The model contains a bottleneck layer that produces a 256x256x64 INT8 activation tensor which cannot fit on-chip and must be spilled over a host interface with a 4 GB/s effective bandwidth.
question: What latency penalty does spilling and reloading the 256x256x64 INT8 activation add over a 4 GB/s host interface?
details:
  realistic_solution: 'The correct approach is to calculate the size of the INT8 activation tensor in megabytes based on its dimensions. Because the accelerator lacks local DRAM, it must write the tensor to host memory and subsequently read it back for the next layer. The candidate must calculate the time taken for both the write and read operations using the host interface bandwidth to find the total latency penalty.'
  common_mistake: |
    **The Pitfall:** Calculating only the memory footprint of the activation tensor.
    **The Rationale:** Candidates incorrectly assume the accelerator has local DDR memory like a GPU.
    **The Consequence:** They fail to quantify the dual read/write latency cost over the host bus for streaming dataflow architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor Size is 256 * 256 * 64 channels.
    - Data format is INT8 (1 byte per element).
    - Host interface bandwidth is 4000 MB/s.

    **Calculations:**
    - INT8 Footprint is 4,194,304 elements * 1 byte = ~4.0 MB.
    - Write Latency is 4 MB / 4000 MB/s = 1.0 ms.
    - Read Latency is 4 MB / 4000 MB/s = 1.0 ms.
    - Total Penalty is 1.0 ms + 1.0 ms = 2.0 ms per inference pass.

    **Conclusion & Interpretation:**
    - **Result: 2.0 ms (Memory-Bandwidth-Bound)**. Spilling and reloading the activation adds a 2.0 ms latency penalty per pass.
