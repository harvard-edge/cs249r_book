title: Sizing Paged Memory for Multi-Tenant LLM Inference
scenario: You are deploying an LLM-based intelligent routing service on an on-premise Qualcomm Cloud AI 100 inference accelerator. The hardware features 32 GB of LPDDR4x memory and delivers 400 TOPS at INT8 precision within a 75W power envelope. Given a 13B parameter model quantized to INT8, you need to design a continuous batching system that handles highly variable sequence lengths without suffering from memory fragmentation or OS-level OOM evictions.
question: How would you design continuous batching for a 13B INT8 model on 32 GB Cloud AI 100 to avoid KV-cache fragmentation and OOMs?
details:
  realistic_solution: The optimal approach is to implement a paged memory manager (like PagedAttention) that pre-allocates the available KV-cache pool into fixed-size block tables (e.g., 16 tokens per block). The scheduler should reserve runtime headroom, track per-request block usage, and enforce admission control before the accelerator's 32GB limit is reached. Under pressure, it should preempt low-priority requests; host-RAM KV swapping is only an optional software strategy if the Cloud AI 100 runtime and latency target support it.
  common_mistake: |
    **The Pitfall:** Suggesting static memory allocation based on the maximum possible sequence length, or relying on standard dynamic allocation (e.g., malloc).
    **The Rationale:** Candidates fail to realize that standard dynamic allocation leads to external memory fragmentation, while static allocation is too rigid to accommodate usage spikes.
    **The Consequence:** This drastically limits concurrent batch size or leads to unpredictable OS-level OOM kills during production usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory: 32 GB total. 13B INT8 weights = 13 GB. OS overhead = ~2 GB.
    - Available for KV Cache: 17 GB.
    - Token spec: 40 layers, 40 heads, 128 head dim.

    **Calculations:**
    - KV Cache per token = 2 (K, V) * 40 * 40 * 128 * 1 byte = 409,600 bytes.
    - Raw token capacity = 17,000,000,000 bytes / 409,600 bytes = about 41,500 KV tokens.
    - With 16-token blocks, per-request allocations round up to block boundaries and active sequences continue growing during decode.
    - At 2,048 tokens/request, 41,500 tokens is a theoretical upper bound of about 20 requests before block rounding, runtime buffers, priority reserves, and sequence-length variance.

    **Conclusion & Interpretation:**
    - **Result: about 41,500 raw KV tokens, not a guaranteed 20-request SLA (Memory-Bound)**. Paged blocks reduce external fragmentation, while admission control should reserve headroom below the raw token ceiling.
