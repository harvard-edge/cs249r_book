title: Specifying Activation Memory Constraints for a Multi-Model Inference Pipeline on Jetson Orin
scenario: 'You are writing the memory allocation specification for a multi-model autonomous driving perception pipeline on Jetson Orin (32 GB LPDDR5 shared). The pipeline runs concurrently: (A) YOLOv8-L for object detection, (B) SegFormer-B2 for lane segmentation, (C) BEVFusion for 3D object detection from camera+LiDAR fusion.'
question: What peak activation memory bounds should you specify so YOLOv8-L, SegFormer-B2, and BEVFusion fit concurrently in 32GB?
details:
  realistic_solution: 'Specification methodology: (1) profile each model independently with `torch.cuda.max_memory_allocated()` at target batch/resolution, (2) add 15% fragmentation buffer, (3) sum all peaks. YOLOv8-L at 640x640, B=1: peak activation ~1.5 GB. SegFormer-B2 at 512x512, B=1: ~0.8 GB. BEVFusion at 6-camera 900x1600, B=1: ~4.2 GB. OS + CUDA runtime: 3 GB. Total spec: (1.5 + 0.8 + 4.2) * 1.15 + 3 = 10.5 GB. Remaining 21.5 GB available for KV cache, data buffers, and headroom.'
  common_mistake: |
    **The Pitfall:** Specifying average activation memory per model rather than peak activation memory.
    **The Rationale:** Candidates assume workloads smooth out over time, failing to prepare for worst-case simultaneous layer execution.
    **The Consequence:** Guaranteed Out-Of-Memory (OOM) errors when the concurrent models coincidentally align their peak memory layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32GB RAM; OS+CUDA: 3GB; Buffer: 15%
    - YOLOv8-L peak: ~1.4GB
    - SegFormer-B2 peak: ~0.7GB
    - BEVFusion peak: ~3.6GB

    **Calculations:**
    - Raw sum = 1.4 + 0.7 + 3.6 = 5.7 GB
    - Buffered total = 5.7 * 1.15 + 3 = 9.555 GB (~9.6 GB)

    **Conclusion & Interpretation:**
    - **Result: 9.6 GB Peak Total (Memory-Bound)**. Specifications must use peak memory, not average.
