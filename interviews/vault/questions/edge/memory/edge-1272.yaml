title: Zero-DRAM Accelerator Host Memory Scheduling
scenario: You are designing a multi-camera traffic monitoring system using a host SoC with 4GB of shared DRAM and a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS INT8 at 2.5W but has no local DRAM, relying entirely on continuous streaming of inputs, intermediate activations, and outputs to and from the host memory. The system processes four concurrent 1080p video streams through a cascaded pipeline. Because the accelerator relies strictly on host memory streaming, the host OS frequently experiences memory pressure, severe fragmentation from dynamic crops, and OOM kills during bursty traffic scenes.
question: How would you manage host memory for the Hailo-8 cascaded 4-stream pipeline to avoid fragmentation, memory pressure, and OOM kills?
details:
  realistic_solution: The optimal design implements a pre-allocated contiguous memory pool (e.g., using Linux CMA or hugepages) on the host to completely bypass the OS virtual memory manager and eliminate fragmentation. Since Hailo-8 streams dataflow continuously, dynamic crops must be padded to fixed sizes or packed into uniform tensor shapes before streaming. The host scheduler must enforce strict backpressure by tracking available blocks in the memory pool; if the pool is exhausted by intermediate activations, the system drops incoming frames rather than triggering an OS-level OOM.
  common_mistake: |
    **The Pitfall:** Proposing OS-level swap space or garbage collection.
    **The Rationale:** Candidates ignore that the Hailo-8 has zero local DRAM and rely on cloud-native memory paradigms.
    **The Consequence:** Severe memory fragmentation causes OOM kills, crashing the pipeline during bursty traffic scenes.
  napkin_math: |
    1. Assumptions & Constraints:
       - Host RAM: 4 GB
       - OS/System reserve: 1.5 GB
       - 1080p INT8 frame (1920x1080x3): 6.2 MB
       - Concurrent streams: 4
    2. Calculations:
       - Available contiguous memory pool = 4.0 GB - 1.5 GB = 2.5 GB
       - Triple-buffer ring (4 streams * 3 buffers) = 12 frames = 74.4 MB
       - Intermediate activations (4 streams * 40 MB) = 160 MB
       - Fixed-size crop buffer pool = 2.5 GB - (0.074 GB + 0.16 GB) = 2.266 GB
       - Max crop tensors (10 MB each) = 2.266 GB / 10 MB = 226 crops
    3. Conclusion & Interpretation:
       - **Result: Memory-Bound. The system can hold exactly 226 crops in host memory before the scheduler must drop frames to prevent OOM.**
