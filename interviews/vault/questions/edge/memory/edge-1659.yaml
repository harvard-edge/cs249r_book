title: Dataflow Streaming on Host-Dependent Accelerators
scenario: You are architecting an edge NVR (Network Video Recorder) system using a Hailo-8 accelerator connected via PCIe Gen3 x4. The Hailo-8 has no local DRAM and relies entirely on streaming from the host CPU's memory. You need to deploy a 45MB object detection model to process 4 concurrent 1080p video streams at 30 fps.
question: How would you design the Hailo-8 memory hierarchy and streaming strategy for 4 1080p30 streams without stalling PCIe?
details:
  realistic_solution: |
    The correct architecture exploits the Hailo-8's spatial dataflow paradigm by pinning the entire 45MB model's weights into the distributed on-chip SRAM. The host DRAM is used strictly as a ring buffer for incoming frames and final bounding box outputs. By streaming the 4 video feeds sequentially into the dataflow pipeline, intermediate activations remain entirely on-chip, decoupling the compute throughput from host memory latency.
  common_mistake: |
    **The Pitfall:** Treating the dataflow accelerator like a traditional GPU and proposing layer-by-layer execution.
    **The Rationale:** Assuming intermediate activations must be constantly spilled and reloaded from host DRAM due to the lack of on-board device DRAM.
    **The Consequence:** Constant thrashing over the PCIe bus, completely starving the 26 TOPS compute engine and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Streams: 4x 1080p at 30 fps.
    - PCIe Gen3 x4: ~3.2 GB/s practical bandwidth.
    - Model: 45MB weights.
    - Compiled dataflow keeps weights and intermediates resident or streams weights once per scheduled graph, not once per frame.

    **Calculations:**
    - Input payload: 4 * (1920 * 1080 * 3 bytes) * 30 fps = 746,496,000 bytes/s = ~746 MB/s for all four streams.
    - Resident-weight strategy: load the 45 MB compiled graph once at startup or on model change, then stream frames and compact outputs during steady state.
    - Bad design check: reloading 45 MB weights for every frame would be 45 MB * 120 fps = 5.4 GB/s, exceeding the ~3.2 GB/s PCIe budget before frame input is counted.
    - Steady-state frame traffic with resident weights is ~746 MB/s plus metadata, which fits within ~3.2 GB/s with headroom for protocol overhead.

    **Conclusion & Interpretation:**
    - **Result: Keep Weights Resident and Stream Frames (PCIe-Safe)**. PCIe becomes infeasible only if weights or large intermediates are reloaded per frame; the design must separate one-time model traffic from steady-state input traffic.
