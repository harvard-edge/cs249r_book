title: Dataflow Streaming on Host-Dependent Accelerators
scenario: You are architecting an edge NVR (Network Video Recorder) system using a Hailo-8 accelerator connected via PCIe Gen3 x4. The Hailo-8 has no local DRAM and relies entirely on streaming from the host CPU's memory. You need to deploy a 45MB object detection model to process 4 concurrent 1080p video streams at 30 fps.
question: How would you design the Hailo-8 memory hierarchy and streaming strategy for 4 1080p30 streams without stalling PCIe?
details:
  realistic_solution: |
    The correct architecture exploits the Hailo-8's spatial dataflow paradigm without assuming the entire 45MB model is resident on chip. Keep host DRAM as the backing store for frame rings, compiled graph segments, and outputs, while the compiler schedules weights and activations as tiles through limited on-chip buffers. Stream the 4 video feeds through a stable dataflow schedule so each layer's working set is prefetched and consumed without reloading the full model per frame.
  common_mistake: |
    **The Pitfall:** Treating the dataflow accelerator like a traditional GPU and proposing layer-by-layer execution.
    **The Rationale:** Assuming intermediate activations must be constantly spilled and reloaded from host DRAM due to the lack of on-board device DRAM.
    **The Consequence:** Constant thrashing over the PCIe bus, completely starving the 26 TOPS compute engine and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Streams: 4x 1080p at 30 fps.
    - PCIe Gen3 x4: ~3.2 GB/s practical bandwidth.
    - Model: 45MB weights.
    - Compiled dataflow tiles weights and intermediates through on-chip buffers; the full 45MB model is not assumed to fit on chip.

    **Calculations:**
    - Input payload: 4 * (1920 * 1080 * 3 bytes) * 30 fps = 746,496,000 bytes/s = ~746 MB/s for all four streams.
    - Tiled dataflow strategy: keep the compiled schedule stable, then stream weight/activation tiles, frames, and compact outputs during steady state.
    - Bad design check: reloading 45 MB weights for every frame would be 45 MB * 120 fps = 5.4 GB/s, exceeding the ~3.2 GB/s PCIe budget before frame input is counted.
    - Steady-state frame traffic is ~746 MB/s plus scheduled tile traffic and metadata, which remains PCIe-safe only if the compiler avoids full-model reloads per frame.

    **Conclusion & Interpretation:**
    - **Result: Compiler-Tiled Streaming (PCIe-Safe)**. PCIe becomes infeasible if weights or large intermediates are reloaded naively per frame; the design depends on compiler-managed tiling through on-chip buffers and steady streaming from host memory.
