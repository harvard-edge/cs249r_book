title: Evaluating Hailo-8 vs. Jetson Orin Activation Memory Architecture for Embedded CV
scenario: Your team is selecting hardware for a smart camera CV pipeline running EfficientDet-D2 (8.1M parameters). Two options are Hailo-8 (26 TOPS, 2.5W, on-chip SRAM only — no external DRAM for activations) and Jetson Orin (275 TOPS, 60W, 32 GB LPDDR5).
question: Which platform, Hailo-8 or Jetson Orin, better handles EfficientDet-D2 activation memory at 512x512, and what constraints matter?
details:
  realistic_solution: 'EfficientDet-D2 peak activation: the BiFPN feature network at resolution P3 (64x64) with 112 channels: 64x64x112x1 B (int8) = 450 KB per tensor. Hailo''s SRAM can hold multiple such tensors. However, the backbone (EfficientNet-B2) at early layers has spatial resolution 256x256x32 = 2 MB per tensor — exceeding Hailo''s per-layer SRAM if the full activation must be resident. Hailo''s compiler handles this via tiling: spatially tiles the input and streams through the chip, keeping only one tile in SRAM at a time. This is transparent to the user but adds 5-10% latency overhead. For EfficientDet-D2, Hailo-8 achieves ~30 fps at 512x512 at 2.5W vs Jetson Orin at ~120 fps at 60W. Choose Hailo-8 for power-constrained deployments, Orin for throughput-critical.'
  common_mistake: |
    **The Pitfall:** Evaluating accelerators purely on TOPS rating.
    **The Rationale:** Candidates ignore fixed on-chip SRAM size and the requirement that activation tensors fit within it.
    **The Consequence:** They miss that large activations force the Hailo compiler to split layers, reducing effective throughput and introducing latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Early Layer Size (EfficientNet-B2) is 256x256x32x1 bytes (INT8).
    - Hailo-8 total SRAM is ~6 MB.
    - Double buffering is required.

    **Calculations:**
    - Full tensor size is 256 * 256 * 32 = ~2.1 MB.
    - Double buffered size is 2.1 MB * 2 = 4.2 MB.
    - Hailo Tiling mitigates this by splitting into 4 tiles of 128x128 = 0.53 MB each.
    - Hailo-8 Efficiency is 26 TOPS / 2.5W = 10.4 TOPS/W.
    - Jetson Orin Efficiency is 275 TOPS / 60W = 4.6 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: 10.4 TOPS/W (Memory-Bound)**. Hailo-8 is 2.3x more power-efficient but requires spatial tiling to fit activations in SRAM.
