title: Pipeline Overlap on NPU and CPU
scenario: A real-time video processing pipeline runs on a Snapdragon 8 Gen 3. Pre-processing
  takes 5ms on CPU, NPU inference takes 15ms, and post-processing takes 8ms on CPU.
  The camera captures at 60 FPS.
question: Create a double-buffering specification orchestrating CPU and NPU tasks
  to overlap computation, proving the pipeline can sustain 60 FPS.
details:
  realistic_solution: At 60 FPS, the frame budget is 16.6ms. Sequential execution
    takes 5 + 15 + 8 = 28ms, failing the deadline. By pipelining, the system creates
    three stages. While the NPU processes Frame N (15ms), the CPU concurrently handles
    post-processing for Frame N-1 (8ms) and pre-processing for Frame N+1 (5ms). The
    total CPU time per cycle is 13ms. The bottleneck stage is the NPU at 15ms, which
    is strictly less than the 16.6ms budget. Throughput is 1/15ms = 66.6 FPS.
  common_mistake: Designing a synchronous loop where CPU and NPU wait for each other
    per frame, resulting in 28ms total latency and dropping the frame rate to ~35
    FPS.
  napkin_math: Max pipeline stage = max(5+8, 15) = 15ms. 15ms < 16.6ms budget for
    60 FPS.
