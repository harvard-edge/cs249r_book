title: The Speculative Braking Rationale Failure
scenario: As the Staff Engineer for a new active safety feature, you've been asked to design a system
  that uses a 1B-parameter LLM to generate a human-readable rationale *before* an Automated Emergency
  Braking (AEB) event occurs. The rationale (e.g., 'pedestrian detected, high speed, braking now') is
  for logging and future analysis. The entire AEB decision loop has a hard real-time budget of 33ms. The
  team has already quantized the 1B model to INT8 and deployed it to a Hailo-8-like accelerator (26 TOPS,
  on-chip SRAM). However, initial tests show that generating even the first few tokens takes over 100ms.
  The sequential, auto-regressive nature of the LLM is the bottleneck. The VP of Engineering wants a concrete,
  three-point plan to get the rationale generation latency under 15ms. What is your proposal?
question: "What three-point plan gets the 1B-parameter rationale generator under 15ms despite autoregressive decoding?"
details:
  realistic_solution: The core problem is the memory wall of auto-regressive decoding. We hit a latency
    floor determined by loading the model weights for every single token. The plan must break this sequential
    dependency.
  common_mistake: 'The most common L5 answer is ''use a much smaller model.'' This ignores the product
    requirement for a certain level of reasoning quality that the 1B model provides. Another incorrect
    path is ''batch the sensor inputs,'' which makes no sense for a single, real-time braking event. A
    purely software-based engineer might miss the hardware-specific nature of the bottleneck: that it''s
    not about FLOPs, but about the memory wall hit on every single token generation.'
  napkin_math: Let's analyze the bottleneck. A 1B parameter model (INT8) has 1 GB of weights. A Hailo-8
    has extremely fast on-chip SRAM, but let's assume a more typical edge system-level memory bandwidth
    of ~2.5 GB/s to access the full model if it doesn't fit entirely on-chip. Time to load weights = 1
    GB / 2.5 GB/s = 400ms. This is the absolute wall, proving the model *must* live in on-chip memory.
    Even with it on-chip, let's say internal BW is 100GB/s. Loading 1GB for every token is 10ms. This
    is the real bottleneck. Now, let's model speculative decoding with k=5. The draft model (100M params,
    100MB) runs in ~1ms. The verifier (1B params) runs once to check 5 tokens, taking its ~10ms. Total
    time for 5 tokens ≈ 11ms. Average time per token ≈ 2.2ms. This is a ~5x speedup that breaks the memory
    wall. Fusing the attention kernel might save another 20-30% off the 10ms verification time, bringing
    it to 7ms. Total time for 5 tokens is now ~8ms. This is well within the 15ms budget and provides the
    required rationale.
  options:
  - The inference framework is adding unnecessary overhead; switching to a different runtime (e.g., from
    TensorRT to ONNX Runtime) will fix the issue.
  - The most common L5 answer is 'use a much smaller model.' This ignores the product requirement for
    a certain level of reasoning quality that the 1B model provides. Another incorrect path is 'batch
    the sensor inputs,' which makes no sense for a single, real-time braking event.
  - The core problem is the memory wall of auto-regressive decoding. We hit a latency floor determined
    by loading the model weights for every single token. The plan must break this sequential dependency.
  - The model weights are being duplicated in memory during inference; using model sharding across CPU
    and GPU will halve the footprint.
  correct_index: 2
