title: Optimizing Real-time Edge ML Data Pipelines with Coral TPU
scenario: You are designing a real-time anomaly detection system for industrial machinery. The system uses a pre-trained TensorFlow Lite object detection model deployed on a Google Coral Edge TPU. The TPU has a performance of 4 TOPS (Trillions Operations Per Second) for INT8 operations, consumes 2W, and exclusively supports INT8 inference. The input data is a continuous stream of high-resolution sensor readings (e.g., vibration data, thermal imaging) that needs to be pre-processed and fed to the model at a rate of 30 frames per second. The pre-processing involves normalization and resizing, which takes 5ms per frame on the host CPU. The object detection model requires approximately 100 Giga-operations (GOPs) per inference.
question: Where are the throughput bottlenecks in the Coral Edge TPU pipeline for 30 FPS, given 5 ms CPU preprocessing, 100 GOP inference, and INT8-only support?
details:
  realistic_solution: Ensure the model is properly quantized to INT8. Optimize pre-processing by offloading to dedicated hardware (if available), using highly optimized libraries, or batching frames efficiently without introducing excessive latency. Profile the entire pipeline (CPU, memory, TPU) to pinpoint the exact bottleneck.
  common_mistake: |
    **The Pitfall:** Evaluating only the TPU's theoretical capability without accounting for host CPU serial logic.
    **The Rationale:** Candidates see 4 TOPS and assume 30 FPS is trivial.
    **The Consequence:** They miss that pre-processing blocks the pipeline and limits the actual realized throughput, or they deploy an unquantized FP32 model which the TPU will reject.
  napkin_math: |
    1. TPU theoretical max: 4 TOPS = 4 * 10¹² INT8 ops/second.
    2. Model requires 100 GOPs = 100 * 10⁹ ops.
    3. Max theoretical TPU inferences = (4 * 10¹²) / (100 * 10⁹) = 40 FPS.
    4. Pre-processing overhead: 5ms/frame on host CPU. Time for 30 frames = 150ms.
    5. **This leaves 0.85s for TPU inference and transfer per second. The bottleneck will shift between the CPU pre-processing and data transfer bandwidth depending on the actual quantized GOPs.**
