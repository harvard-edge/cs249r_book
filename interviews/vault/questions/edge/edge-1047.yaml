title: 'Fault Tolerance: Implement OTA Model Update with Rollback for Jetson Fleet'
scenario: You need to implement an OTA model update system for 500 Jetson Orin devices. Models are 200MB (int8). A bad update bricked 10% of devices in the previous deployment.
question: How would you design the OTA model update protocol with automatic rollback so a bad 200MB update affects less than 1% of the 500-device fleet?
details:
  realistic_solution: 'Implement a rigorous Canary deployment strategy coupled with localized A/B partition validation. Stage 1: Push the 200MB update to a 1% canary ring (5 devices). Stage 2: On the device, download the payload into partition B without interrupting execution in partition A. Stage 3: Soft-reboot the inference service to target B. Execute a deterministic health-check sequence (e.g., 100 inferences verifying latency < X ms and output entropy > Y). Stage 4: If the health check fails, instantly fallback to partition A. If the canary ring survives 24 hours with < 2% error rate, auto-promote the rollout to larger rings.'
  common_mistake: |
    **The Pitfall:** Pushing monolithic updates directly to active partitions across the entire fleet simultaneously.
    **The Rationale:** Candidates apply standard web-service deployment intuition without accounting for the high cost of edge failure, where a bricked device requires physical intervention.
    **The Consequence:** A corrupted INT8 tensor or syntax error in the preprocessing script brings down the entire operational fleet, violating strict reliability SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 500 devices.
       - Hard limit: <1% blast radius.
       - Model size: 200MB.
    2. **Calculations:**
       - Target blast radius = 1% of 500 = 5 devices.
       - Device storage requirement for A/B rollout = 200MB (Active A) + 200MB (Staged B) = 400MB total.
       - LTE download time per device (at 100 Mbps) = 200 MB / 12.5 MB/s = 16 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Max blast radius is 5 devices. The system is Reliability-Bound, requiring localized A/B testing and a 5-device canary ring to guarantee fleet integrity.**
