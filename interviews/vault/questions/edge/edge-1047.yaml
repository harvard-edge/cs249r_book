title: 'Fault Tolerance: Implement OTA Model Update with Rollback for Jetson Fleet'
scenario: You need to implement an OTA (over-the-air) model update system for 500 Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) devices. Models are 200MB (int8). A bad update bricked 10% of devices in the previous deployment.
question: How would you design the OTA model update protocol with automatic rollback so a bad 200MB update affects less than 1% of the 500-device fleet?
details:
  realistic_solution: 'Canary deployment: push to 1% (5 devices) first. Monitor for 24 hours. If < 2% error rate, expand to 10% → 50% → 100%. Device-side: A/B partitions, new model to B, activate B, validate 100 inferences, commit or rollback to A.'
  common_mistake: |
    **The Pitfall:** Pushing the update to all devices simultaneously or missing an automated validation step.
    **The Rationale:** Candidates assume standard cloud deployment practices work on edge without considering the cost of manual recovery or the lack of instant rollback if the device loses connectivity.
    **The Consequence:** A bad update bricks a large portion of the fleet, requiring expensive physical maintenance or causing prolonged system downtime.
  napkin_math: |
    1. Calculate target blast radius: 1% of 500 devices = 5 devices.
    2. Calculate model download time: 200MB / (LTE 100Mbps / 8 bytes) = 16 seconds per device.
    3. Calculate device storage requirement: 2 partitions * 200MB = 400MB total for A/B model partitions.
    4. Design Canary strategy: Push to 5 devices (1%) first. Monitor for 24 hours.
    **If the 1% canary group triggers a rollback due to latency (>3x baseline) or accuracy proxy drop, the maximum blast radius is exactly 5 devices.**
