title: INT8 Activation Quantization Range Calibration for Object Detection on Jetson Orin
scenario: Deploying YOLO v8-m (25M params) on Jetson Orin with TensorRT INT8. The model is calibrated on 500 nighttime images (calibration set) but deployed in both day and night conditions. Daytime deployment shows 3.8% mAP drop vs nighttime calibration shows only 0.5% mAP drop.
question: "Why does YOLOv8-m lose 3.8% mAP in daytime after nighttime-only INT8 calibration, and how would you fix it?"
details:
  realistic_solution: 'Nighttime calibration: activation distributions have low mean intensities, narrow range. INT8 scales set for dark inputs. Daytime inputs: brighter, higher activations, wider range → clipping at INT8 max → significant accuracy loss. Diagnosis confirmed: 3.8% day loss >> 0.5% night loss. Fix: mixed calibration dataset with 50% day + 50% night images (500 total = 250 each). Recalibrate TensorRT engine. Expected improvement: day mAP drop reduces to ~1-1.5%. Alternative: use per-channel activation quantization with entropy calibration — wider dynamic range coverage. Check: histogram of intermediate activations for day vs night images — look for clipping >5% of values.'
  common_mistake: |
    **The Pitfall:** Collecting a calibration dataset that matches only one specific deployment condition.
    **The Rationale:** Overlooking that INT8 calibration dictates the dynamic range bounds for the model permanently.
    **The Consequence:** Severe activation clipping when exposed to out-of-distribution inputs, crushing accuracy.
  napkin_math: |
    *   **Night Range:** e.g., [0, 50].
    *   **Day Range:** e.g., [0, 200].
    *   **Night Calibration:** INT8 scale = 50/127. Day values > 50 are clipped.
    *   **Clipping Impact:** Range [0, 200] calibrated to [0, 50] clips 150/200 = 75% of the day dynamic range, leading to 3.8% mAP loss.
    *   **Mixed Calibration:** scale = 200/127. Both day/night covered, eliminating severe clipping.
    *   **Result:** Day mAP loss improves significantly to **~1%**.
