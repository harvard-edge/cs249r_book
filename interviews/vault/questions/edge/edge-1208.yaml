title: Edge TPU Operator Fallback Penalty
scenario: A team deploys a 20 GOPS INT8-quantized vision model on a Google Coral Edge TPU (4 TOPS INT8, 2W budget) connected via USB 3.0 (250 MB/s effective bandwidth). They expect a compute latency of 5ms. However, profiling shows that due to limited operator support, an unsupported activation forces a 5 MB intermediate tensor to be sent to the host CPU and back.
question: Why does the Coral Edge TPU inference take 45ms instead of 5ms, and what is the exact USB I/O penalty for the 5MB tensor?
details:
  realistic_solution: Because the Edge TPU relies on rigid, custom ASICs optimized strictly for efficiency over programmability, unsupported operators force model partitioning. The system must pause acceleration, serialize the 5 MB tensor over the USB bus to the CPU, compute the unsupported layer, and transfer it back. This I/O transfer completely negates the 4 TOPS compute advantage.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator is thermally throttling or blaming the host CPU's compute speed for the slowdown.
    **The Rationale:** Failing to mathematically evaluate the massive host-device data transfer bottleneck caused by model partitioning over USB.
    **The Consequence:** Deep confusion over hardware performance and an inability to fix the model graph to avoid catastrophic I/O penalties.
  napkin_math: |
    * **Theoretical Compute**: 20 GOPS / 4,000 GOPS (4 TOPS) = 0.005 seconds (5 ms).
    * **Transfer to CPU**: 5 MB / 250 MB/s = 0.02 seconds (20 ms).
    * **Transfer back to TPU**: 5 MB / 250 MB/s = 0.02 seconds (20 ms).
    * **Total Penalty**: 20 ms + 20 ms = 40 ms.
    * **Conclusion**: Total Latency = 5 ms compute + 40 ms transfer = **45 ms**.
