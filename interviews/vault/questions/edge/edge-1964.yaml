title: Optimizing Edge Inference with Knowledge Distillation on Hailo-8
scenario: Your team is deploying an object detection model (YOLOv5s) to the Hailo-8 AI accelerator. The current full-size teacher model achieves 90% mAP but requires 50ms inference time, consuming close to its peak 2.5W power budget. The goal is to deploy a student model that maintains at least 88% mAP, achieves <10ms latency, and significantly reduces average power consumption.
question: How would you distill a 90% mAP YOLOv5s teacher into a Hailo-8 student that achieves at least 88% mAP, <10ms latency, and lower power?
details:
  realistic_solution: 'A realistic solution would involve selecting a compact student model architecture (e.g., MobileNetV3, EfficientNet-Lite) known to be efficient on edge hardware. The strategy would involve multi-stage knowledge distillation:

    1.  **Teacher Model Preparation:** Ensure the teacher model is fully trained and performing well.

    2.  **Logit Distillation:** Train the student model using the soft targets (logits) from the teacher, often with a temperature scaling parameter to smooth the teacher''s output distribution. This helps the student learn the nuances of the teacher''s decision boundaries.

    3.  **Feature Distillation:** Introduce an auxiliary loss that forces intermediate layers of the student model to mimic the feature maps of corresponding layers in the teacher model. This is particularly effective for models with complex feature hierarchies like object detectors.

    4.  **Hardware-Aware Training:** Incorporate Hailo-8 specific optimizations. This includes training the student model with quantization-aware training (QAT) to directly target INT8 inference on the Hailo-8. The loss function would include both distillation terms and the original task loss.

    5.  **Optimization for Hailo-8:** Ensure the student model architecture is compatible with the Hailo-8''s dataflow architecture for maximum efficiency. Use Hailo''s compiler/SDK to profile and optimize the student model''s deployment, focusing on kernel fusion and memory access patterns.

    6.  **Evaluation:** Rigorously evaluate the student model on a representative dataset, measuring mAP, actual inference latency on the Hailo-8, and power consumption (e.g., using Hailo''s power monitoring tools or external meters) to ensure it meets the 88% mAP, <10ms latency, and reduced power targets.'
  common_mistake: |
    **The Pitfall:** Only quantizing the teacher model or ignoring the Hailo-8 dataflow architecture.
    **The Rationale:** Candidates overlook Knowledge Distillation and fail to optimize the student architecture for INT8 efficiency.
    **The Consequence:** Sub-optimal accuracy drops and failure to meet the 10ms latency and 1W average power targets.
  napkin_math: |
    - Target Latency: < 10ms.
    - Max INT8 Operations (10ms): 26 TOPS * 0.010s = 260 GOPS.
    - Current Power: 50ms at 2.5W = 0.125 Joules per inference.
    - Target Power: If reduced to 10ms and average power capped to 1W, energy = 1W * 0.010s = 0.01 Joules per inference.
    - Model Size Reduction: Aiming for <5M parameters and <5 GFLOPs to hit the 5x latency and energy reduction targets.
    **Targeting <5 GFLOPs cuts inference time to <10ms and drops energy consumption by over 90%.**
