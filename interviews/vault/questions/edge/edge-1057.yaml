title: 'Kernel Fusion: Evaluate ONNX Runtime vs TensorRT Fusion on Jetson Orin'
scenario: You are evaluating ONNX Runtime (with CUDA EP) vs TensorRT for deploying
  a ResNet-50 on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). Both support kernel
  fusion, but TensorRT has more aggressive fusion. Measure and compare inference latency,
  throughput, and power efficiency.
question: How do ONNX Runtime with CUDA EP and TensorRT compare for ResNet-50 on Jetson
  Orin in latency, throughput, and power efficiency?
details:
  realistic_solution: 'TensorRT performs more aggressive layer fusion, including Conv+BN+ReLU,
    reshape elimination, and plugin-based custom fusions. ONNX Runtime with CUDA EP
    does basic fusion but less aggressively. Typical gap: 20-40% for CNNs on Jetson.'
  common_mistake: Assuming TensorRT always wins without quantifying the fusion difference;
    not measuring power efficiency (throughput/watt).
  napkin_math: 'ResNet-50: 4.1B FLOPs, 25M params, input 224×224×3. Theoretical: 4.1B
    INT8 OPS / 275 TOPS = 0.015ms — always going to be bandwidth limited. Model size
    INT8: 25M × 1B = 25MB. Memory bandwidth needed: 25MB weights + 50MB activations
    = 75MB per inference. At 68 GB/s: 75MB / 68 GB/s = 1.1ms per inference. TensorRT
    INT8: measured ~2ms (vs 1.1ms theoretical — ~55% efficiency). ONNX Runtime CUDA:
    measured ~2.8ms (40% efficiency). Throughput: TRT 500 FPS, ORT 357 FPS. TRT wins
    by 40%. Power: both run at ~15W active. TRT efficiency: 500/15 = 33.3 FPS/W. ORT:
    357/15 = 23.8 FPS/W. TRT: 40% better power efficiency. Fusion differences: TRT
    fuses 18 Conv+BN+ReLU blocks into 18 fused ops vs ORT fusing ~12. The 6 extra
    fused blocks save ~6 × 1MB intermediate writes/reads = 12MB × 2 = 24MB. 24MB /
    68 GB/s = 0.35ms → explains 2.8ms - 2ms = 0.8ms TRT advantage (other factors:
    TRT also has better tiling/scheduling).'
