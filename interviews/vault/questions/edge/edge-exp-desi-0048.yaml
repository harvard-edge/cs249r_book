title: Shadow Deployment on Jetson Orin
scenario: We are deploying an upgraded perception model to a fleet of autonomous vehicles equipped with
  NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The current model uses
  12 GB of RAM and 80 TOPS. The proposed new model uses 16 GB of RAM and 150 TOPS. Design a shadow deployment
  system to evaluate the new model's predictions against the existing model in the real world, ensuring
  that the primary safety-critical inference path is not degraded by thermal throttling or out-of-memory
  errors.
question: "How would you shadow-deploy the 150 TOPS model on Jetson Orin without causing thermal throttling or OOMs in the 80 TOPS safety path?"
details:
  realistic_solution: The optimal design prioritizes the primary model on the Ampere GPU and schedules
    the shadow model on the DLA accelerator, or processes a heavily sampled subset of frames (e.g., 10%)
    for the shadow model. By duty-cycling the shadow inference and aggressively monitoring thermal metrics,
    the system avoids hitting the 60W TDP limit. Output comparisons and telemetry should be aggregated
    locally and uploaded off-peak to conserve bandwidth.
  common_mistake: Candidates often suggest running both models concurrently on every frame without considering
    the strict 60W TDP limit, which leads to thermal throttling and latency spikes in the primary model.
    They also frequently overlook using the DLA accelerator to isolate the shadow workload from the primary
    Ampere GPU workload.
  napkin_math: 'Peak resource check: Current model (12 GB, 80 TOPS) + New model (16 GB, 150 TOPS) = 28
    GB RAM and 230 TOPS. Total memory (28 GB) fits within the 32 GB LPDDR5 limit (87.5% utilization).
    Total compute (230 TOPS) fits within the 275 TOPS limit (83.6% utilization). However, sustaining 83.6%
    utilization will exceed the 60W TDP. If the shadow model only processes 1 in 10 frames, its average
    compute drops to 15 TOPS, keeping total system compute around 95 TOPS (34% utilization), safely avoiding
    thermal throttling.'
