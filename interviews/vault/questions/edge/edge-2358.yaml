title: Jetson AGX Orin Duty-Cycle Energy Calculation
scenario: A Jetson AGX Orin deployed on a battery operates in a 15W active mode for
  100ms to process a camera frame, then enters a 5W idle state for 900ms.
question: Apply duty-cycling formulas to calculate the total energy consumed in Joules
  over exactly 1 hour.
visual:
  kind: svg
  path: edge-2358.svg
  alt: A step wave oscillating between 15W for brief periods and 5W for long periods.
  caption: Active vs Idle Power over Time.
details:
  realistic_solution: First, calculate the average power. The system is active 10%
    of the time and idle 90% of the time. P_avg = (15W * 0.1) + (5W * 0.9) = 1.5 +
    4.5 = 6 Watts. Total energy is Power times time. Over 1 hour (3600 seconds), Energy
    = 6W * 3600s = 21,600 Joules.
  common_mistake: Multiplying the 15W active power by the full hour, ignoring the
    90% idle period.
  napkin_math: E = 6W * 3600s = 21600 J
