title: The Thermal Throttling Deadline Miss
scenario: Your autonomous delivery robot has a strict 33ms deadline for object detection
  to brake in time. At 25°C ambient, inference takes 25ms. You test the robot outdoors
  in 40°C heat. The inference time slowly creeps up to 45ms over 10 minutes, and the
  robot crashes into a wall. The CPU utilization is only 60%. Why did the latency
  double?
question: Why did the latency double?
details:
  realistic_solution: 'The latency doubled because of DVFS thermal throttling. At
    40C ambient, the SoC''s junction temperature exceeded its thermal limit, causing
    the governor to reduce the CPU clock from 1.5 GHz to ~800 MHz to prevent damage.
    Since inference time is inversely proportional to clock speed, the 25ms inference
    becomes (1500/800) x 25 = 46.8ms — exceeding the 33ms safety deadline. The CPU
    utilization reads 60% because utilization is measured as ''cycles busy / cycles
    available,'' and at a lower clock, fewer cycles are available. The fix: add a
    heatsink, implement thermal-aware task scheduling, or use a lighter model that
    meets the deadline even at throttled clocks.'
  common_mistake: '"The OS background tasks are stealing CPU cycles." Background tasks
    would cause random spikes, not a steady, permanent 20ms increase.'
  napkin_math: '1.5 GHz clock = 25ms execution. If the thermal limit forces the clock
    to 800 MHz: `(1500 / 800) * 25ms = 46.8ms`. You lose 20ms of reaction time, resulting
    in a physical crash.'
