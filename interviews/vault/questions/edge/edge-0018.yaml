title: The Thermal Throttling Deadline Miss
scenario: Your autonomous delivery robot has a strict 33ms deadline for object detection to brake in time. At 25°C ambient, inference takes 25ms. You test the robot outdoors in 40°C heat. The inference time slowly creeps up to 45ms over 10 minutes, and the robot crashes into a wall. The CPU utilization is only 60%.
question: Why did the latency double?
details:
  realistic_solution: 'The latency doubled because of DVFS thermal throttling. At 40°C ambient, the SoC''s junction temperature exceeded its limit, causing the governor to reduce the CPU clock from 1.5 GHz to ~800 MHz. Since inference time is inversely proportional to clock speed, latency exceeded the 33ms deadline. CPU utilization reads 60% because it is measured as ''cycles busy / cycles available,'' and throttling reduces available cycles.'
  common_mistake: |
    **The Pitfall:** Blaming background OS tasks or software anomalies for the CPU cycles.
    **The Rationale:** Engineers assume 60% CPU utilization means the hardware has "room to spare" and the slowdown must be a software race condition.
    **The Consequence:** Endless debugging of software threads while ignoring the hardware's physical thermal limits, failing to solve the crash.
  napkin_math: |
    - **Baseline Clock & Latency:** 1.5 GHz clock = 25 ms execution time.
    - **Throttled Clock:** Thermal limit forces the clock to drop to 800 MHz.
    - **Latency Calculation:** (1.5 GHz / 0.8 GHz) * 25 ms = 46.8 ms.
    - **Final Result:** **The reaction time drops by ~20 ms, pushing latency to 46.8 ms, which completely blows past the 33 ms hard deadline and physically crashes the robot.**
