title: The Thermal Throttling Deadline Miss
scenario: An autonomous robot has a 33ms detection deadline. At 25°C ambient, inference is 25ms. At 40°C outdoors, latency creeps to 45ms and it crashes, despite 60% CPU utilization.
question: Why did the latency double?
details:
  realistic_solution: The latency doubled because of DVFS thermal throttling. At 40°C ambient, the SoC's junction temperature exceeded its limit, causing the governor to reduce the clock. CPU utilization reads 60% because it is measured as 'cycles busy / cycles available,' and throttling reduces available cycles.
  common_mistake: |
    **The Pitfall:** Blaming background OS tasks or software anomalies for the CPU cycles.
    **The Rationale:** Engineers assume 60% CPU utilization means the hardware has "room to spare" and the slowdown must be a software race condition.
    **The Consequence:** Endless debugging of software threads while ignoring the hardware's physical thermal limits, failing to solve the crash.
  napkin_math: |
    1. **Assumptions & Constraints:** 33ms budget. 1.5 GHz clock = 25ms execution. Throttles to 800 MHz at 40°C ambient.
    2. **Calculations:** Throttled Execution Time = 25ms * (1.5 GHz / 0.8 GHz) = 46.8 ms.
    3. **Conclusion & Interpretation:** **Result: 46.8 ms latency.** Physical thermal limits triggered DVFS throttling, destroying the hard real-time safety guarantee despite "low" OS CPU utilization. **System Status: Thermally-Bound.**
