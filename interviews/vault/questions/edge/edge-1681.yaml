title: CI/CD Pipeline for Fleet-Wide Coral Edge TPU Deployment
scenario: You are designing the MLOps lifecycle for a fleet of 10,000 smart cameras. Models must be frequently updated to detect new defect types in a manufacturing environment. The pipeline must guarantee that deployed models strictly fit within the accelerator's limited operator support and power envelope without manual intervention.
question: How would you design a CI/CD pipeline for 10,000 edge cameras to quantize, verify operator mapping, and safely roll out models?
details:
  realistic_solution: Architect a Hardware-In-The-Loop (HITL) physical staging gate within the CI/CD pipeline. Following automated Post-Training Quantization (PTQ), the pipeline executes the hardware-specific Edge Compiler to validate 100% INT8 operator translation. Crucially, the artifact is then flashed to an automated physical test-bench array to empirically profile true junction temperatures and power-draw spikes before approving the Canary rollout to the fleet.
  common_mistake: |
    **The Pitfall:** Constructing pure-software, cloud-native CI pipelines devoid of hardware validation.
    **The Rationale:** Candidates pattern-match generic Kubernetes deployments where x86 hardware is homogeneous and operator fallbacks merely trigger minor CPU usage spikes.
    **The Consequence:** An undetected graph partition silently slips into production, causing 10,000 edge cameras to fall back to software processing, instantly destroying SLAs and melting thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Compute requirement: 50 GOPS/frame
    - Peak Hardware Compute: 4 TOPS (4000 GOPS)
    - Target SLA: 30 FPS

    **Calculations:**
    - Native Execution Max FPS = 4,000 / 50 = 80 FPS (Passes 30 FPS SLA)
    - Latency penalty if an unmapped operator hits CPU fallback: ~50 ms
    - Bottlenecked FPS = 1000 / 50 ms = 20 FPS

    **Conclusion & Interpretation:**
    - **Result: 20 FPS (Compute-Bound)**. The silent CPU fallback crashes performance to 20 FPS, violating the 30 FPS deadline.
