title: Orin Bandwidth Allocation Conflict
scenario: A Jetson AGX Orin (204.8 GB/s memory bandwidth) concurrently serves a large
  vision transformer (loads 150GB/s at current batch size) and a high-frequency LiDAR
  planning model (loads 80GB/s at peak rate).
question: Analyze the impact on end-to-end tail latency for both models when they
  are triggered simultaneously without bandwidth isolation.
details:
  realistic_solution: The combined memory bandwidth demand is 230 GB/s, which exceeds
    the Orin's 204.8 GB/s LPDDR5 maximum. This causes memory controller queue saturation
    and thrashing. Since the vision model hogs the majority of the requests, the smaller
    high-frequency LiDAR model will experience severe memory stall cycles. Its execution
    time will elongate unpredictably, violently degrading its tail latency despite
    its small compute footprint.
  common_mistake: Assuming compute capacity (TOPS) is the only limiting factor and
    missing that memory bandwidth oversubscription causes nonlinear latency spikes.
  napkin_math: 150 + 80 = 230 GB/s > 204.8 GB/s.
