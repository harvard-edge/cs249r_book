title: Analyze INT4 memory savings enabling larger batch sizes on edge
scenario: A local server runs a 7B parameter LLM on a 16GB edge GPU. In FP16, the weights take 14GB. The candidate wants to increase the batch size from 1 to 16, requiring 4GB of KV cache in FP16.
question: How does quantizing only the model weights to INT4 resolve the out-of-memory error for a batch size of 16?
details:
  realistic_solution: In FP16, 14GB weights + 4GB KV cache = 18GB, which exceeds the 16GB VRAM. Quantizing weights to INT4 (0.5 bytes/param) reduces them to 3.5GB. The new total is 3.5GB (weights) + 4GB (KV cache) = 7.5GB, fitting comfortably within the 16GB limit and resolving the OOM error.
  common_mistake: |
    **The Pitfall:** Miscalculating 7B INT4 weights as 7GB instead of 3.5GB, or assuming quantization automatically shrinks the KV cache.
    **The Rationale:** Candidates confuse bytes with bits when performing rapid calculations (4 bits = 0.5 bytes).
    **The Consequence:** Incorrectly concluding that INT4 quantization alone cannot accommodate the required 4GB KV cache, leading to unnecessary and complex architectural workarounds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge GPU memory: 16 GB limit.
    - Model: 7B parameters.
    - Target Batch Size: 16 (requires 4 GB KV cache).
    - Weight Precision: FP16 (2 bytes/param) vs INT4 (0.5 bytes/param).

    **Calculations:**
    - FP16 Weights: 7B * 2 bytes = 14 GB.
    - FP16 Total Memory: 14 GB (weights) + 4 GB (KV cache) = 18 GB (OOM).
    - INT4 Weights: 7B * 0.5 bytes = 3.5 GB.
    - INT4 Total Memory: 3.5 GB (weights) + 4 GB (KV cache) = 7.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 7.5 GB < 16 GB (Memory-Capacity Bound Mitigated)**. Quantizing weights to INT4 safely accommodates the 4 GB KV cache requirement, unlocking batch size 16 without OOM errors.
