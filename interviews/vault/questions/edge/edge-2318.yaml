title: Analyze INT4 memory savings enabling larger batch sizes on edge
scenario: A local server runs a 7B parameter LLM on a 16GB edge GPU. In FP16, the
  weights take 14GB. The candidate wants to increase the batch size from 1 to 16,
  requiring 4GB of KV cache in FP16.
question: Analyze how quantizing only the model weights to INT4 resolves the out-of-memory
  error for a batch size of 16.
details:
  realistic_solution: In FP16, 14GB weights + 4GB KV cache = 18GB, which exceeds the
    16GB VRAM. Quantizing weights to INT4 (0.5 bytes/param) reduces them to 3.5GB.
    The new total is 3.5GB (weights) + 4GB (KV cache) = 7.5GB, fitting comfortably
    within the 16GB limit and resolving the OOM error.
  common_mistake: Assuming quantization reduces the KV cache size automatically, or
    miscalculating 7B INT4 weights as 7GB instead of 3.5GB.
  napkin_math: 14GB/4 + 4GB = 7.5GB total < 16GB limit
