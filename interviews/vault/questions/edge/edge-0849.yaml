title: Diagnosing Thermal Degradation in On-Device FL Scheduling
scenario: A mobile team deployed on-device federated learning (FL) for a 15M parameter smart keyboard model on a fleet of Snapdragon 8 Gen 2 phones. The scheduler triggers training jobs using Android's JobScheduler when `isDeviceIdle() == true` and `batteryLevel > 30%`. After a week, the team sees a massive spike in 1-star reviews citing 'phone feels like lava' and 'battery died in 3 hours.' Telemetry shows training jobs complete successfully, but background battery drain is extremely high, and subsequent foreground app launches suffer 40% increased p99 latency.
question: Why did the FL training jobs cause overheating, battery drain, and 40% worse p99 app launch latency despite only running when idle?
details:
  realistic_solution: 'Update the scheduler to require a strict composite state: `isCharging == true`, `isDeviceIdle == true` (for at least 30 minutes), and `thermalHeadroom > 0.8`. Implement an aggressive abort signal if the SoC temperature rises excessively or user interaction is detected.'
  common_mistake: |
    **The Pitfall:** Assuming "idle" simply means screen-off and ignoring thermal and charging state constraints.
    **The Rationale:** Developers often rely on basic OS APIs without understanding the physical implications of sustained heavy compute on a passively cooled device.
    **The Consequence:** Training runs on battery power alone, draining it rapidly and causing the device chassis to overheat, which ruins the user experience and damages battery health.
  napkin_math: |
    *   **Power draw:** A mobile SoC running backpropagation draws ~10W.
    *   **Battery capacity:** A 4000mAh (at 3.7V) battery holds ~14.8Wh.
    *   **Energy consumed:** A 20-minute training burst consumes (10W * 0.33h) = 3.3Wh.
    *   **Battery drain:** 3.3Wh / 14.8Wh = **>22% battery drain** in 20 minutes.
    *   **Thermal impact:** Continuously dissipating 10W pushes chassis temps past 40-45°C, triggering severe thermal throttling when the user picks up the phone.
