title: Diagnosing Thermal Degradation in On-Device FL Scheduling
scenario: A mobile team deployed on-device federated learning (FL) for a 15M parameter smart keyboard
  model on a fleet of Snapdragon 8 Gen 2 phones. The scheduler triggers training jobs using Android's
  JobScheduler when `isDeviceIdle() == true` and `batteryLevel > 30%`. After a week, the team sees a massive
  spike in 1-star reviews citing 'phone feels like lava' and 'battery died in 3 hours.' Telemetry shows
  training jobs complete successfully, but background battery drain is extremely high, and subsequent
  foreground app launches suffer 40% increased p99 latency. Analyze the root cause of the degradation.
details:
  realistic_solution: 'Update the scheduler to require a strict composite state: `isCharging == true`,
    `isDeviceIdle == true` (for at least 30 minutes), and `thermalHeadroom > 0.8`. Implement an aggressive
    abort signal if the SoC temperature rises excessively or user interaction is detected.'
  common_mistake: Assuming 'idle' simply means screen-off and ignoring the strict necessity of requiring
    the device to be actively charging and thermally stable before initiating heavy compute.
  napkin_math: A mobile SoC running heavy matrix multiplications for backpropagation can draw ~10W. A
    4000mAh (at 3.7V) battery holds ~14.8Wh. A 20-minute training burst consumes (10W * 0.33h) = 3.3Wh,
    draining >22% of the total battery capacity. Without active cooling, continuously dissipating 10W
    pushes the chassis temperature past 40-45C, triggering OS-level thermal throttling and severe latency
    spikes right as the user picks up the phone.
