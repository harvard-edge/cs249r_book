title: Diagnosing Thermal Degradation in On-Device FL Scheduling
scenario: A mobile team deployed on-device federated learning (FL) for a smart keyboard model on a fleet of Snapdragon 8 Gen 2 phones. The scheduler triggers training jobs using Android's JobScheduler when `isDeviceIdle() == true` and `batteryLevel > 30%`. After a week, telemetry shows training jobs complete successfully, but background battery drain is extremely high, and subsequent foreground app launches suffer 40% increased p99 latency.
question: Why did the FL training jobs cause overheating, battery drain, and 40% worse p99 app launch latency despite only running when idle?
details:
  realistic_solution: The scheduler missed critical composite state checks. It must require `isCharging == true`, `isDeviceIdle == true`, and `thermalHeadroom > 0.8`. Running backpropagation solely on battery power generates massive sustained thermal loads, causing chassis overheating and triggering severe thermal throttling that degrades foreground app performance long after the job ends.
  common_mistake: |
    **The Pitfall:** Assuming "idle" simply means screen-off and ignoring thermal and charging state constraints.
    **The Rationale:** Developers often rely on basic OS APIs without understanding the physical implications of sustained heavy compute on a passively cooled device.
    **The Consequence:** The device drains battery rapidly and overheats, ruining the user experience, damaging battery health, and severely throttling performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile SoC backpropagation power draw: ~10 W.
       - Battery capacity: 4000 mAh at 3.7 V (~14.8 Wh).
       - 20-minute FL training burst.
    2. **Calculations:**
       - Energy Consumed: 10 W * (20 / 60) h = 3.33 Wh.
       - Battery Drain: 3.33 Wh / 14.8 Wh = ~22.5%.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound Degradation.** A 20-minute run consumes over 22% battery and dissipates 10 W continuously, triggering aggressive thermal throttling that cripples p99 latency.
