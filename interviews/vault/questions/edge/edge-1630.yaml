title: Compute-Bound Latency on Cloud AI 100
scenario: Your team is profiling a vision transformer deployed on an on-premise Qualcomm Cloud AI 100 accelerator (400 TOPS INT8 peak, 32 GB LPDDR4x, 75W). The trace tools indicate that a massive projection layer requires 200 Giga-Operations (GOPs) to execute. The hardware achieves exactly 50% utilization of its theoretical peak INT8 compute capacity during this layer due to scheduling overhead.
question: What is the expected execution latency in milliseconds for the 200 GOPs projection layer at 50% of 400 TOPS INT8 peak?
details:
  realistic_solution: The correct approach involves converting TOPS to GOPs/sec, applying the realistic utilization rate obtained from the profiler, and then dividing the required operations by the effective compute rate. This provides a realistic estimate for the latency of a compute-bound layer.
  common_mistake: Candidates often forget to apply the utilization factor, dividing directly by the 400 TOPS peak, or they mishandle the unit conversion between TOPS (Tera-Operations per second), GOPs, and milliseconds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute = 400 TOPS = 400,000 GOPs/sec.
    - Effective utilization = 50%.
    - Required operations = 200 GOPs.
    
    **Calculations:**
    - Effective compute = 400,000 * 0.50 = 200,000 GOPs/sec.
    - Latency = Operations / Effective Compute = 200 GOPs / 200,000 GOPs/sec = 0.001 seconds.
    - Convert to ms: 0.001 s * 1000 = 1.0 ms.
    
    **Conclusion & Interpretation:**
    - **Result: 1.0 ms (Compute-Bound)**. The latency is entirely dependent on the effective INT8 compute rate of the accelerator.
