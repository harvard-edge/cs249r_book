title: Sparsity Support on Google Coral Edge TPU
scenario: Your team is deploying an object detection model to a Google Coral Edge TPU, which features 4 TOPS INT8 compute at 2W in a USB/PCIe form factor. To improve framerate, a junior engineer proposes applying 75% unstructured weight pruning before quantizing the model to INT8.
question: Does 75% unstructured weight pruning reduce inference latency on the Edge TPU, and what pruning approach would actually help?
details:
  realistic_solution: The Google Coral Edge TPU relies on a dense systolic array optimized strictly for dense INT8 tensor operations and lacks hardware support for unstructured sparsity. To achieve actual latency reductions, you must use structured pruning (e.g., removing entire channels or filters), as it physically shrinks the dense tensor dimensions that are compiled and dispatched to the TPU.
  common_mistake: |
    **The Pitfall:** Assuming all modern AI accelerators skip zero-weight multiply-accumulate (MAC) operations.
    **The Rationale:** Candidates over-generalize cloud GPU sparse matrix support to low-power edge accelerators.
    **The Consequence:** They implement complex unstructured pruning that yields zero proportional latency improvement while severely penalizing model accuracy.
  napkin_math: |
    1. **Hardware Constraints:** Edge TPU throughput = 4 TOPS (4e12 Ops/sec). It executes dense matrices only.
    2. **Dense Convolution Baseline:** For a layer requiring 10M MACs (20M Ops), latency = `20e6 / 4e12 = 5 microseconds`.
    3. **75% Unstructured Sparsity:** The systolic array still executes the full dense matrix. Latency remains **5 microseconds**.
    4. **75% Structured Sparsity:** Tensor dimensions shrink, reducing computed MACs to 2.5M (5M Ops). Latency = `5e6 / 4e12 = 1.25 microseconds`.
    **Unstructured pruning does not reduce latency, whereas structured pruning achieves proportional speedups.**
