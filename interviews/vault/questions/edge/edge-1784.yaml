title: Sparsity Support on Google Coral Edge TPU
scenario: Your team is deploying an object detection model to an edge NPU. To improve framerate, a junior engineer proposes applying 75% unstructured weight pruning before quantizing the model to INT8.
question: Does 75% unstructured weight pruning reduce inference latency on the Edge TPU, and what pruning approach would actually help?
details:
  realistic_solution: Edge hardware relies on a dense systolic array optimized strictly for dense INT8 tensor operations and lacks hardware support for unstructured sparsity. To achieve actual latency reductions, you must use structured pruning (e.g., removing entire channels or filters), as it physically shrinks the dense tensor dimensions that are compiled and dispatched to the TPU.
  common_mistake: |
    **The Pitfall:** Assuming all modern AI accelerators skip zero-weight multiply-accumulate (MAC) operations.
    **The Rationale:** Candidates over-generalize cloud GPU sparse matrix support to low-power edge accelerators.
    **The Consequence:** They implement complex unstructured pruning that yields zero proportional latency improvement while severely penalizing model accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware executes dense matrices only.
       - Dense Convolution Baseline: 10M MACs (20M OPs).
       - Accelerator capability: 4 TOPS (4e12 OPs/sec).
    2. **Calculations:**
       - Unpruned Latency = 20e6 / 4e12 = 5 microseconds.
       - 75% Unstructured Sparsity: Hardware still executes the full dense matrix. Latency = 5 microseconds.
       - 75% Structured Sparsity: Tensor dims shrink, MACs reduce to 2.5M (5M OPs). Latency = 5e6 / 4e12 = 1.25 microseconds.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. Unstructured pruning yields 0% latency reduction. Structured pruning correctly compresses the dense tensor, achieving a proportional 4x speedup.
