title: Edge TPU Systolic Dataflow for Depthwise Convolutions
scenario: You are designing a real-time tracking system for a drone using a Google Coral Edge TPU (4 TOPS
  INT8, 2W power limit, USB/PCIe interface). The model uses novel lightweight convolution blocks that
  map poorly to standard dense systolic arrays, causing low MAC utilization. Design a custom dataflow
  and tiling architecture that maximizes the Edge TPU's systolic array efficiency, ensuring all operations
  map to supported INT8 operators to prevent catastrophic latency hits from host CPU fallbacks.
question: "How would you redesign dataflow, tiling, and operators so the drone tracker fully uses the Coral Edge TPU without CPU fallbacks?"
details:
  realistic_solution: A strong candidate will synthesize a hardware-aware mapping strategy, such as reformulating
    the network to prioritize pointwise (1x1) convolutions that perfectly utilize the systolic array,
    while restructuring the dataflow to minimize SRAM reads. They must enforce strict INT8 quantization
    to guarantee 100% on-chip execution, and design a tiling schema that completely hides the USB/PCIe
    transfer latency.
  common_mistake: Candidates often assume standard weight-stationary dataflows will be efficient for lightweight
    or depthwise convolutions, ignoring the severe underutilization of the systolic array. They also frequently
    overlook the bandwidth bottleneck of the USB/PCIe interface when off-chip memory access is required
    due to poor tiling.
  napkin_math: The Coral Edge TPU delivers 4 TOPS at 2W (2 TOPS/W). If a model requires 100 GOPS/frame,
    theoretical max throughput is 4,000 GOPS / 100 GOPS = 40 FPS. However, if poor dataflow reduces systolic
    array utilization to 20%, effective TOPS drops to 0.8, yielding only 8 FPS. By optimizing tiling to
    keep the SRAM fed and maximizing MAC utilization to 80%, effective compute becomes 3.2 TOPS, achieving
    32 FPS while staying strictly within the 2W power envelope.
