title: Edge Guardrail Memory and Latency Sizing
scenario: You are deploying an autonomous robot powered by an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8). To adhere to Responsible AI governance, all generated action plans pass through a local safety classifier before execution. The primary model and OS consume 28 GB of memory.
question: What is the maximum INT8 safety model parameter count in the remaining memory, and its theoretical latency for a 100-token sequence at 20% TOPS?
details:
  realistic_solution: The correct approach determines available memory by subtracting the active footprint from the total 32 GB, mapping the remainder to INT8 parameters. The candidate then computes the total operations for the forward pass and divides it by the effective TOPS (after applying the 20% utilization penalty) to find the added guardrail latency.
  common_mistake: |
    **The Pitfall:** Forgetting to account for KV cache/activation memory or miscalculating MACs.
    **The Rationale:** Candidates assume all remaining RAM goes to weights and often forget that a single Multiply-Accumulate (MAC) equals 2 Operations.
    **The Consequence:** Sizing a model that immediately OOMs upon receiving an input sequence, or underestimating latency by 50%.
  napkin_math: |
    1. Available Memory = 32 GB - 28 GB = 4 GB.
    2. Max Parameters (Weights only) = 4 GB / 1 Byte per INT8 param = 4 Billion parameters.
    3. Compute Required for 100 tokens = 4B params * 2 OPs/param * 100 tokens = 800 Giga-OPs (0.8 TOPS).
    4. Effective Compute = 275 TOPS * 0.20 utilization = 55 TOPS.
    5. Latency = 0.8 TOPS / 55 TOPS/sec = 0.0145 seconds = **14.5 ms**.
