title: Edge Guardrail Memory and Latency Sizing
scenario: You are deploying an autonomous robot powered by an NVIDIA Jetson Orin. To adhere to Responsible AI governance, all generated action plans pass through a local safety classifier before execution. The primary model and OS consume 28 GB of memory.
question: What is the maximum INT8 safety model parameter count in the remaining memory, and its theoretical latency for a 100-token sequence at 20% TOPS?
details:
  realistic_solution: Deduct the active memory footprint from total RAM to size the INT8 parameter capacity. Calculate total MACs for the forward pass, convert to operations, and divide by effective TOPS (discounted by utilization penalty) to ascertain the guardrail inference latency.
  common_mistake: |
    **The Pitfall:** Forgetting to account for KV cache/activation memory or miscalculating MACs.
    **The Rationale:** Candidates assume all remaining RAM goes to weights and forget that a single Multiply-Accumulate (MAC) equals 2 Operations.
    **The Consequence:** Sizing a model that immediately OOMs upon receiving an input sequence, or underestimating latency by 50%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 GB total memory; 28 GB active footprint.
       - 275 TOPS INT8 peak compute; 20% utilization.
       - 100 tokens; 1 MAC = 2 OPs.
    2. **Calculations:**
       - Available Memory = 32 GB - 28 GB = 4 GB.
       - Max Parameters = 4 GB / 1 Byte = 4 Billion parameters.
       - Compute Required = 4B params * 2 OPs/param * 100 tokens = 800 GOPs (0.8 TOPS).
       - Effective Compute = 275 TOPS * 0.20 = 55 TOPS.
       - Latency = 0.8 TOPS / 55 TOPS/sec = 14.5 ms.
    3. **Conclusion & Interpretation:**
       - **The max model size is 4B parameters with a 14.5 ms latency. Result: Compute-Bound.**
