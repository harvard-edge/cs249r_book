title: Hailo-8 Host Bandwidth Degradation Strategy
scenario: You are designing an autonomous retail checkout system using a single host processor paired with a dataflow accelerator (streaming weights and activations directly from host memory due to a lack of local DRAM). The system normally processes 4 concurrent 1080p camera streams. During thermal throttling or heavy background host tasks, the PCIe/host memory bandwidth available to the accelerator drops by 50%, risking pipeline stalls.
question: Design a fail-operational graceful degradation ladder that maintains checkout accuracy without crashing the dataflow pipeline.
details:
  realistic_solution: 'Leverage the dataflow architecture by shedding activation load instead of changing weights. The degradation ladder should first reduce input resolution (e.g., from 1080p to 720p) or dynamically drop the frame rate while keeping the exact same model weights pinned in the host streaming pipeline. If degradation worsens, prioritize a single overhead camera and drop peripheral streams.'
  common_mistake: |
    **The Pitfall:** Suggesting dynamically loading a smaller, simpler model when resources degrade.
    **The Rationale:** Treating the dataflow accelerator like a standard GPU with unlimited local VRAM.
    **The Consequence:** Swapping models requires streaming new weights over the already-congested host interface, exacerbating the exact bottleneck and causing severe multi-second latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Streams: 4 at 1080p, 30 FPS.
       - Normal Host Bandwidth Used: 746 MB/s.
       - Degraded Bandwidth Limit: 373 MB/s (50% drop).
    2. **Calculations:**
       - 1080p stream bandwidth: 1920 * 1080 * 3 bytes * 30 FPS = ~186 MB/s/camera.
       - 720p stream bandwidth: 1280 * 720 * 3 bytes * 30 FPS = ~82 MB/s/camera.
       - Load at 720p: 4 cameras * 82 MB/s = 328 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Degradation**. Reducing resolution to 720p scales the bandwidth down to 328 MB/s, safely sliding under the constrained 373 MB/s budget without triggering a destructive model swap.
