title: 'Model Format Conversion: End-to-End ONNX to Hailo-8 Conversion Pipeline Mastery'
scenario: You are converting a custom PyTorch detection model (30M params, mixed depthwise and standard convolutions) to run on Hailo-8 (26 TOPS INT8, 2.5W).
question: How would you convert the custom PyTorch detector to Hailo-8 HEF, handle unsupported layers, quantify INT8 accuracy loss, and size the HEF file?
details:
  realistic_solution: 'ONNX export: fix dynamic shapes (set batch=1, H=640, W=640). Validate with onnx.checker. Unsupported on Hailo: custom GELU activation → replace with RELU6 or SiLU. INT8 PTQ: calibrate on 1000 representative images. Accuracy drop: typically 0.5-2% mAP for detection models. HEF file size: 30M params × 1 byte (INT8) = 30MB. Hailo compiler compresses: ~20MB HEF. Performance: 30M params × 1 byte / 2.5W chip → fits in Hailo-8L? Hailo-8 supports up to 200MB models. Inference at 26 TOPS: model Ops for 640x640 input ≈ 15 GOPS. 15G/26T = 0.58ms/frame = 1724 fps.'
  common_mistake: |
    **The Pitfall:** Failing to fix dynamic shapes before ONNX export.
    **The Rationale:** PyTorch handles dynamic shapes natively, but dataflow hardware compilers require static allocation.
    **The Consequence:** The Hailo compiler immediately crashes when encountering non-static control flow or unbounded inputs.
  napkin_math: |
    1. **Model Size:** 30M INT8 parameters = 30 MB weights.
    2. **Compute Requirements:** A 30M parameter detector running at 640x640 resolution typically requires ~15 GOPS.
    3. **Theoretical Throughput:** Hailo-8 operates at 26 TOPS. 15 GOPS / 26 TOPS = 0.577 ms/frame.
    4. **Theoretical FPS:** 1000 ms / 0.577 ms = **1733 FPS**.
    5. **Real-world Bottleneck:** Real throughput will be bounded by memory bandwidth to stream the 30 MB weights, not raw compute.
