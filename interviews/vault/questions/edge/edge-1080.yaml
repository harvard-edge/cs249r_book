title: 'Model Format Conversion: End-to-End ONNX to Hailo-8 Conversion Pipeline Mastery'
scenario: You are converting a custom PyTorch detection model (30M params) to run on a dataflow accelerator (26 TOPS INT8, 2.5W).
question: How would you convert the custom PyTorch detector, handle unsupported layers, quantify INT8 accuracy loss, and size the compiled file?
details:
  realistic_solution: 'ONNX export: fix dynamic shapes to static (set batch=1, H=640, W=640) for dataflow compilation. Unsupported activations like GELU must be replaced with RELU6 or SiLU. INT8 PTQ: calibrate on 1000 representative images. The compiled HEF file will be ~20-30MB. The 30M parameter model fits well within the 200MB supported limit.'
  common_mistake: |
    **The Pitfall:** Failing to fix dynamic shapes before ONNX export.
    **The Rationale:** PyTorch handles dynamic shapes natively, but dataflow hardware compilers require strict static allocation.
    **The Consequence:** The hardware compiler immediately crashes when encountering non-static control flow or unbounded inputs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 30M INT8 parameters, 15 GOPS compute per frame.
       - Hardware: 26 TOPS throughput.
    2. **Calculations:**
       - Model Size: 30M INT8 params = 30 MB.
       - Theoretical Compute Limit: 15 GOPS / 26 TOPS = 0.577 ms/frame.
       - Theoretical FPS: 1000 ms / 0.577 ms = 1733 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Real throughput will be heavily bounded by memory bandwidth to stream the 30 MB weights, not the massive raw compute headroom.
