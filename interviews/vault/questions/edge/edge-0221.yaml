title: 'Sizing an SRAM Tensor Arena for DMA'
scenario: >
  You are programming a Hailo-8 accelerator for a sensor fusion task. The accelerator has a fast on-chip SRAM that is used as a tensor arena to hold inputs and outputs, with data moved in from main memory via DMA. Your model has three sequential INT8 layers. The intermediate tensor sizes are: Input Tensor A = 32 KB. Layer 1 Output Tensor B = 64 KB. Layer 2 Output Tensor C = 48 KB. Layer 3 Output Tensor D = 16 KB.
question: What is the minimum required size for the tensor arena to run this model without running out of memory?
details:
  realistic_solution: |
    The challenge is managing a scarce, fast memory resource. The tensor arena's size determines the peak memory footprint the model can have at any single point during inference. We need to find the point of maximum memory pressure by analyzing the memory required at each layer's execution step. The minimum arena size must be large enough to accommodate the largest of these peaks.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors (160 KB) or only looking at the largest single tensor (64 KB).
    **The Rationale:** Misunderstanding how intermediate activations are freed and re-used in sequential layers.
    **The Consequence:** Either over-allocating precious SRAM or drastically under-allocating, causing out-of-memory errors and pipeline stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Tensor A: 32 KB.
    - Layer 1 Output Tensor B: 64 KB.
    - Layer 2 Output Tensor C: 48 KB.
    - Layer 3 Output Tensor D: 16 KB.

    **Calculations:**
    - Layer 1 Active Memory: 32 KB (In A) + 64 KB (Out B) = 96 KB.
    - Layer 2 Active Memory: 64 KB (In B) + 48 KB (Out C) = 112 KB.
    - Layer 3 Active Memory: 48 KB (In C) + 16 KB (Out D) = 64 KB.
    - Peak Concurrent Memory: Max(96, 112, 64) = 112 KB.

    **Conclusion & Interpretation:**
    - **Result: 112 KB (Memory-Bound SRAM)**. The minimum required size for the tensor arena is 112 KB to accommodate the peak memory pressure during Layer 2 execution.
  options:
  - 64 KB (Largest single tensor)
  - 112 KB (Peak concurrent memory)
  - 160 KB (Sum of all tensors)
  - 96 KB (Peak at first layer only)
  correct_index: 1
