title: Sizing an SRAM Tensor Arena for DMA
scenario: 'You are programming a Hailo-8 accelerator for a sensor fusion task. The accelerator has a fast
  on-chip SRAM that is used as a ''tensor arena'' to hold inputs and outputs, with data moved in from
  main memory via DMA. Your model has three sequential INT8 layers. The intermediate tensor sizes are:
  Input Tensor A = 32 KB. Layer 1 Output Tensor B = 64 KB. Layer 2 Output Tensor C = 48 KB. Layer 3 Output
  Tensor D = 16 KB. What is the minimum required size for the tensor arena to run this model without running
  out of memory?'
question: "What is the minimum required size for the tensor arena to run this model without running out of memory?"
details:
  realistic_solution: The challenge is managing a scarce, fast memory resource. The tensor arena's size
    determines the peak memory footprint the model can have at any single point during inference. We need
    to find the point of maximum memory pressure by analyzing the memory required at each layer's execution
    step. The minimum arena size must be large enough to accommodate the largest of these peaks. Data
    is moved in and out of this arena from slower LPDDR memory using DMA, so minimizing the arena size
    while avoiding stalls is key to performance.
  common_mistake: Engineers often miscalculate the peak memory requirement. A common error is to sum the
    sizes of all tensors, which grossly overestimates the need. Another is to only consider the single
    largest tensor, which underestimates because the input to a layer and the output being computed must
    coexist in memory.
  napkin_math: 'For sequential layers, the SRAM arena must hold input and output tensors simultaneously.
    Layer 1: 32KB + 64KB = 96KB. Layer 2: 64KB + 48KB = 112KB. Layer 3: 48KB + 16KB = 64KB. Peak memory
    is the max of these active sums: Max(96, 112, 64) = 112 KB. The accelerator needs 112 KB of fast SRAM
    to run this model without spilling intermediate activations back to main memory via DMA.'
  options:
  - 64 KB (Largest single tensor)
  - 112 KB (Peak concurrent memory)
  - 160 KB (Sum of all tensors)
  - 96 KB (Peak at first layer only)
  correct_index: 1
