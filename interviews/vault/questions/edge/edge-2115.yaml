title: 'Diagnosing Bias in Edge AI Anomaly Detection on Qualcomm Cloud AI 100'
scenario: 'Your team has deployed a critical anomaly detection model for industrial safety on a fleet of edge devices. Recently, you''ve received reports from a new factory site that the model is consistently generating false positives for a specific type of machinery, which was not observed in initial testing.'
question: 'How would you investigate the false positives at the new factory using data drift analysis, model cards, and impact assessments?'
details:
  realistic_solution: 'Collect statistical properties of the inference data from the new factory and identify shifts in sensor readings. Investigate specific machinery configurations and ambient conditions. Check the model card for documented limitations. Run inferences on a test device via nsys profiling to confirm the issue and analyze intermediate activations, specifically looking for INT8 quantization effects or numerical instabilities.'
  common_mistake: |
    **The Pitfall:** Jumping straight to model retraining or hyperparameter tuning.
    **The Rationale:** Engineers default to ML-centric solutions without investigating the environmental context or hardware quantization effects.
    **The Consequence:** The root cause remains unsolved despite retraining efforts because INT8 binning constraints are ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training range: [0, 100].
    - INT8 bins: 256.
    - Shifted critical range: [80, 82].

    **Calculations:**
    - Resolution: 100 / 255 = ~0.39 per bin.
    - Available bins for critical range: 2.0 / 0.39 = ~5 bins.

    **Conclusion & Interpretation:**
    - **Result: ~5 bins (Precision-Bound)**. Severe quantization noise and false positives occur due to insufficient precision in the shifted range.
