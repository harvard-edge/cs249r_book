title: The Silent eMMC Death
scenario: Your fleet of 1,000 edge AI cameras runs a quality inspection model at 30 FPS. The system logs
  the bounding boxes and confidence scores of every detection to the local 16 GB eMMC. After 14 months,
  devices start failing with read-only filesystems. How does continuous ML inference result logging create
  a write amplification pattern that kills eMMC faster than generic logging, and what is the ML-specific
  write rate math?
question: "How does continuous ML inference result logging create a write amplification pattern that kills eMMC faster than generic logging, and what is the ML-specific write rate math?"
details:
  realistic_solution: 'The eMMC died from Write Amplification caused by the ML model''s high-frequency
    output. An ML model running at 30 FPS generates 30 small JSON payloads per second. If the application
    writes these inference results to disk synchronously (e.g., using `fsync` or default Python logging
    without buffering), it forces the eMMC controller to perform a read-modify-write cycle on a full NAND
    page (typically 4 KB or 16 KB) for every 100-byte JSON payload. This means the *effective* write rate
    to the flash cells is 40–160× higher than the logical data size. The ML workload''s continuous, high-frequency
    output acts like a sandblaster on the flash cells, exhausting their Program/Erase (P/E) cycles in
    months instead of years. The fix: buffer ML inference results in RAM (or a `tmpfs` partition) and
    write them to eMMC in large, page-aligned chunks (e.g., once per minute), or disable synchronous writes.'
  common_mistake: '"eMMC wears out eventually, just replace the boards." Or "The log files are small,
    it shouldn''t wear out the flash this fast." This ignores the physics of NAND flash write amplification
    caused by high-frequency, small-payload ML outputs.'
  napkin_math: 'ML output: 30 FPS × 100 bytes/JSON = 3 KB/s logical write rate. But with synchronous writes
    and a 4 KB flash page size, the controller writes 4 KB 30 times a second = 120 KB/s physical write
    rate. Write Amplification Factor (WAF) = 40. Daily physical writes: 120 KB/s × 86,400s = 10.3 GB/day.
    16 GB eMMC with 3,000 P/E cycles = ~48 TB total lifetime writes. 48,000 GB / 10.3 GB/day = 4,660 days
    (~12 years). Wait, why did it fail in 14 months (420 days)? Because the OS (systemd journal, swap)
    is also writing. If the ML logs trigger filesystem metadata updates (ext4 journal) for every write,
    the WAF can easily hit 100+, pushing physical writes to 30+ GB/day. 48,000 / 30 = 1,600 days. Add
    in static data (OS + model takes 12 GB, leaving only 4 GB for wear leveling), and the endurance drops
    by 4×: 1,600 / 4 = 400 days ≈ **13.3 months**. The math perfectly predicts the fleet death.'
  options:
  - eMMC wears out eventually, just replace the boards.. Or "The log files are small, it shouldn't wear
    out the flash this fast." This ignores the physics of NAND flash write amplification caused by high-frequency,
    small-payload ML outputs.
  - The eMMC died from Write Amplification caused by the ML model's high-frequency output. An ML model
    running at 30 FPS generates 30 small JSON payloads per second.
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting
    the model.
  - The issue stems from OS-level scheduling interference; pinning the inference thread to a dedicated
    core will eliminate the performance variance.
  correct_index: 1
