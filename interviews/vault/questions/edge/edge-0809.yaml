title: The Silent eMMC Death
scenario: Your fleet of 1,000 edge AI cameras runs a quality inspection model at 30 FPS. The system logs the bounding boxes and confidence scores of every detection to the local 16 GB eMMC. After 14 months, devices start failing with read-only filesystems.
question: How does continuous ML inference result logging create a write amplification pattern that kills eMMC faster than generic logging, and what is the ML-specific write rate math?
details:
  realistic_solution: The eMMC died from Write Amplification caused by high-frequency output. If the application writes 30 small JSON payloads per second synchronously, it forces the eMMC controller to perform a read-modify-write cycle on a full NAND page (4 KB) for every 100-byte JSON payload. The fix is to buffer results in RAM and flush in page-aligned chunks.
  common_mistake: |
    **The Pitfall:** Assuming that because log files are small in bytes, they won't wear out the flash.
    **The Rationale:** Engineers conflate logical application write sizes with the physical page-write constraints of NAND memory hardware.
    **The Consequence:** Devices exhaust their P/E cycles 10×-40× faster than expected, causing catastrophic, fleet-wide hardware failures in months.
  napkin_math: |
    - **Logical Write Rate:** 30 FPS × 100 bytes/JSON = 3 KB/s.
    - **Physical Write Rate:** With synchronous writes, a 4 KB flash page is written 30 times a second = 120 KB/s. Write Amplification Factor (WAF) = 40.
    - **Daily Writes:** 120 KB/s × 86,400s = 10.3 GB/day. If OS metadata logging triggers (WAF 100+), it jumps to 30+ GB/day.
    - **Lifespan:** 16 GB eMMC with 3,000 P/E cycles = ~48 TB total lifetime writes. 48 TB / 30 GB/day = 1,600 days. Reserving 12 GB for OS drops wear leveling to 4 GB.
    - **Final Result:** **Effective lifespan is 1,600 / 4 = 400 days (≈ 13.3 months), perfectly predicting the hardware failure.**
