title: 'Model Format Conversion: Realize TensorRT Engine Storage for Dual-Model Hailo Deployment'
scenario: 'Size the HEF (Hailo Executable Format) storage and SRAM requirements for a dual-model Hailo-8
  deployment: (1) vehicle detection (YOLOv5-s, 7.2M params INT8) and (2) license plate recognition (LPRNet,
  1.7M params INT8). The Hailo-8 has 32MB on-chip SRAM. Determine if both models fit simultaneously and
  estimate model switching time.'
question: "How much HEF storage and SRAM are required, do both Hailo-8 models fit simultaneously, and what switching overhead remains?"
details:
  realistic_solution: 'YOLOv5-s HEF: 7.2MB × 1.15 = 8.3MB. LPRNet HEF: 1.7MB × 1.15 = 1.96MB. Total: 10.26MB
    < 32MB SRAM ✓. Both fit simultaneously on Hailo-8. Model switching: not needed since both fit. Hailo-8
    can be partitioned to run both concurrently (split compute budget). Vehicle detection throughput:
    YOLOv5-s 7.2M params, FLOPs at 640×640: ~16 GFLOPs / 26 TOPS = 0.62ms/frame = 1613fps. LPR (smaller
    input 94×24): ~1.8 GFLOPs / 26 TOPS = 0.069ms/frame. Can run both models in pipeline without switching
    overhead.'
  common_mistake: Assuming HEF size equals INT8 weight count; Hailo's compiler may split models into sub-graphs
    and the HEF includes control flow metadata, typically 1.1-1.2× weight size.
  napkin_math: 'YOLOv5-s: 7.2M INT8 × 1.15 = 8.28MB. LPRNet: 1.7M × 1.15 = 1.96MB. Sum: 10.24MB < 32MB
    SRAM ✓. Concurrent: Hailo partitions 26 TOPS between models. If 80/20 split: 20.8 TOPS for YOLO, 5.2
    TOPS for LPR. YOLO: 16G/20.8T=0.77ms → 1299fps. LPR: 1.8G/5.2T=0.35ms → 2857fps. Both exceed 30fps
    target by >> 40×.'
