title: Mixed-Precision Perception on Jetson Orin
scenario: You are tasked with deploying a 5-billion parameter multimodal perception model on an NVIDIA
  Jetson Orin for an autonomous robot. The system must process 4 high-resolution camera streams at 30
  frames per second while strictly adhering to the 60W TDP constraint. The current FP16 implementation
  exceeds the power budget and falls short of the latency targets. You must design a mixed-precision architecture
  that evaluates the tradeoffs between maintaining accuracy and fully utilizing the platform's hardware
  accelerators.
question: "How would you design a mixed-precision Jetson Orin deployment for the 5B multimodal model to meet 4-camera 30 FPS under 60W?"
details:
  realistic_solution: The optimal approach involves profiling the model to isolate precision-sensitive
    layers, retaining them in FP16 on the Ampere GPU, while aggressively quantizing compute-bound layers
    (e.g., dense MLPs, CNN feature extractors) to INT8. The standard CNN blocks should be compiled via
    TensorRT and offloaded to the DLA to maximize power efficiency. Post-training quantization (PTQ) with
    a diverse calibration dataset should be used initially, with a fallback to Quantization-Aware Training
    (QAT) if the bounding-box or classification metrics drop unacceptably.
  common_mistake: Candidates often propose a naive, uniform conversion of the entire model to INT8, overlooking
    the severe accuracy degradation in precision-sensitive layers like attention scores or regression
    heads. They also frequently ignore the DLA, treating the Ampere GPU as the sole compute unit and thereby
    underutilizing the Orin's heterogeneous architecture.
  napkin_math: 'An FP16 model with 5B parameters consumes 10 GB of the 32 GB LPDDR5 memory. Quantizing
    80% of the model to INT8 reduces the weight footprint to roughly 6 GB, freeing up memory bandwidth
    for high-res video buffering. Compute requirements: 4 cameras at 30 FPS = 120 inferences/sec. If each
    inference takes 2 TOPS, the total requirement is 240 TOPS. This utilizes 87% of the Jetson Orin''s
    275 TOPS INT8 capacity. Operating at 240 TOPS within a 60W TDP demands an efficiency of 4 TOPS/Watt,
    making DLA offloading critical for thermal stability.'
