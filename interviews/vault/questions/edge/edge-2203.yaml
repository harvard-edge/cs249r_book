title: Edge Adversarial Defense Spec
scenario: 'A warehouse robot must resist sticker-based adversarial attacks on its object detector without breaking a 30 FPS perception loop. Specify requirements for a deployable defense.'
question: What requirements should an adversarial defense meet for a 30 FPS edge robot perception loop?
details:
  realistic_solution: 'The defense must define threat model, added latency budget, false-positive tolerance, fallback behavior, hardware resource use, update mechanism, and test scenes. For 30 FPS, the whole loop has 33 ms, so the defense must either fit in spare latency or run only on triggers.'
  common_mistake: |
    **The Pitfall:** Specifying model robustness in accuracy terms only.
    **The Rationale:** Candidates focus solely on the theoretical mathematical defense.
    **The Consequence:** Ignoring latency, fallback, and field update constraints yields a defense that crashes the real-time perception pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:** 30 FPS target. Perception currently uses 27 ms.
    2. **Calculations:** Total budget per frame = 1000 / 30 = 33.3 ms. Spare latency = 33.3 ms - 27 ms = 6.3 ms.
    3. **Conclusion & Interpretation:** **The defense must execute in under 6.3 ms to maintain 30 FPS. Result: Compute-Bound.**
