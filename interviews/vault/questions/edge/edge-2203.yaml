title: Edge Adversarial Defense Spec
scenario: A warehouse robot must resist sticker-based adversarial attacks on its object
  detector without breaking a 30 FPS perception loop. Specify requirements for a deployable
  defense.
question: What requirements should an adversarial defense meet for a 30 FPS edge robot
  perception loop?
details:
  realistic_solution: The defense must define threat model, added latency budget,
    false-positive tolerance, fallback behavior, hardware resource use, update mechanism,
    and test scenes. For 30 FPS, the whole loop has 33 ms, so the defense must either
    fit in spare latency or run only on triggers.
  common_mistake: Specifying model robustness in accuracy terms only and ignoring
    latency, fallback, and field update constraints.
  napkin_math: 30 FPS gives 1/30 s = 33 ms per frame. If perception already uses 27
    ms, the defense has at most 6 ms inline.
