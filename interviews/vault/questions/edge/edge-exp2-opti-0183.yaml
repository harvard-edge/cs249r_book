title: Optimizing High-Res Camera Ingestion on Jetson Orin
scenario: Your autonomous robotics team is deploying a real-time perception pipeline on an NVIDIA Jetson
  Orin. The system ingests streams from six 4K cameras to feed an object detection model running on the
  Ampere GPU and DLA accelerator. However, the system is dropping frames during ingestion and running
  dangerously close to the 60W TDP limit, preventing the pipeline from utilizing the platform's full 275
  TOPS INT8 compute capacity. Analyze the ingestion pipeline to identify the bottleneck and quantify how
  you would optimize it.
question: "What ingestion bottleneck is dropping six 4K camera streams on Jetson Orin, and how would zero-copy NVMM buffers reduce it?"
details:
  realistic_solution: The bottleneck is the redundant memory copying between kernel, CPU space, and GPU
    space. The solution is to utilize NVIDIA's hardware-accelerated multimedia APIs and zero-copy NVMM
    (NVIDIA Memory Management) buffers. This allows the camera streams to be written directly into the
    32 GB LPDDR5 memory where both the CPU and the Ampere GPU/DLA can access the data without any additional
    copying.
  common_mistake: Candidates often assume the CPU must decode and copy every frame into standard user-space
    memory before passing it to the GPU. They fail to leverage the unified memory architecture of the
    Jetson platform, resulting in severe memory bandwidth bottlenecks and unnecessary power consumption.
  napkin_math: Six 4K cameras at 30 FPS (RGB) generate 6 * 8.3MP * 3 bytes * 30 FPS = 4.5 GB/s of raw
    data. A naive CPU ingestion pipeline copies this data at least 3 times (driver -> user space -> device),
    consuming 13.5 GB/s of the 32 GB LPDDR5 memory bandwidth and spiking CPU power usage towards the 60W
    TDP limit. Implementing zero-copy NVMM buffers drops the bandwidth requirement back to 4.5 GB/s, saving
    power and leaving ample bandwidth to feed the 275 TOPS INT8 accelerators.
