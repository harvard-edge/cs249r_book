title: 'Specification: define CNN model requirements for Hailo-8 production deployment'
scenario: You are writing the model specification for a Hailo-8-based embedded vision product (26 TOPS,
  2.5W). The product must classify 20 product categories at 30 FPS using a MobileNet-family backbone.
  Write a complete model specification including compute budget, accuracy requirements, Hailo-8 architectural
  constraints, and test criteria.
details:
  realistic_solution: 'Model spec: (1) Architecture family: MobileNetV3 or EfficientNet-Lite; (2) FLOPs
    budget: ≤0.5 GFLOPs (leaves 94% headroom on Hailo-8 at 30 FPS for other system tasks); (3) Accuracy:
    ≥92% top-1 on proprietary 20-class dataset; (4) Input: 224×224 RGB; (5) Hailo constraints: all channel
    counts divisible by 4, activations: ReLU6 only, no SE blocks (not natively supported in DFC v3.x);
    (6) Quantization: INT8 with <2% accuracy drop vs FP32; (7) Latency: <2ms per inference at batch=1;
    (8) Test: 500-image validation set, 30-day stability test at 40°C.'
  common_mistake: 'Specifying FLOPs budget without Hailo-8-specific constraints: channel counts must be
    multiples of 4, no custom activation functions beyond ReLU/ReLU6/Sigmoid, layer types must be in the
    Hailo-supported op set (no deformable convs, no dynamic shapes).'
  napkin_math: 'Hailo-8 at 30 FPS, budget 0.5 GFLOPs: 0.5G × 30 = 15 GOPS. Utilization: 15/26,000 = 0.058%
    TOPS. Peak thermal: Hailo-8 scales with utilization; at 0.058%: ~0.6W active (0.5W idle + 0.1W inference).
    Total SoC power: ~1.5W system-wide. Well under 2.5W TDP. Memory: 0.5 GFLOPs model with MobileNet density
    (~2 FLOP/param): ~250K params × 1B INT8 = 250KB per layer output + 24MB SRAM. Comfortably fits. Model
    size target: <5MB INT8 (5M params × 1B).'
