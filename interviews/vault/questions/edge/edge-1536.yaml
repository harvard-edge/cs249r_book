title: Evaluating Fail-Operational Fallbacks on Edge TPU
scenario: 'You are designing an object detection pipeline for an autonomous drone using a Google Coral Edge TPU attached via USB. The primary model is a high-accuracy INT8 quantized SSD, operating near the 4 TOPS limit at 15 FPS. When the drone encounters thermal throttling, the system must gracefully degrade. You must evaluate two strategies: Option A switches to a smaller INT8 model on the same Edge TPU; Option B sheds the Edge TPU load completely by running a tiny FP32 model on the host CPU.'
question: Which strategy provides better fail-operational reliability during thermal throttling?
details:
  realistic_solution: Option A is the correct design. The Google Coral Edge TPU is incredibly power-efficient (2 TOPS per Watt). By switching to a smaller INT8 model on the Edge TPU, the compute requirement drops, which proportionally reduces power consumption and heat generation while maintaining deterministic low latency. This ensures the host CPU remains free for critical flight controls.
  common_mistake: |
    **The Pitfall:** Choosing Option B to completely turn off the Edge TPU in a misguided attempt to reduce overall heat.
    **The Rationale:** It seems logical to shut down the "extra" accelerator hardware when the system is too hot.
    **The Consequence:** The host CPU is incredibly power-inefficient for AI. Running a tiny FP32 model draws far more power than the Edge TPU, worsening the thermal crisis and starving critical flight control tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge TPU efficiency: 2 TOPS/W.
       - Primary Model: ~3.9 TOPS at 15 FPS.
       - Option A (TPU Fallback): 0.5 TOPS.
       - Option B (CPU Fallback): Embedded CPU runs FP32.
    2. **Calculations:**
       - Primary Power: 3.9 TOPS / 2 TOPS/W = 1.95W.
       - Option A Power: 0.5 TOPS / 2 TOPS/W = 0.25W.
       - Option B Power: Typical embedded CPU FP32 inference draws 5-10W.
    3. **Conclusion & Interpretation:**
       - **Result: Option A reduces power to 0.25W, alleviating thermal stress while saving the CPU for flight. (Power-Bound)**
