title: Evaluating Fail-Operational Fallbacks on Edge TPU
scenario: You are designing an object detection pipeline for an autonomous drone using a Google Coral Edge TPU (4 TOPS INT8, 2W power budget) attached via USB. The primary model is a high-accuracy INT8 quantized SSD, operating near the 4 TOPS limit at 15 FPS. When the drone encounters thermal throttling in hot environments, the system must gracefully degrade. You must evaluate two fallback strategies: Option A switches to a smaller INT8 model running on the same Edge TPU; Option B sheds the Edge TPU load completely by running a tiny FP32 model on the host CPU.
question: Which strategy provides better fail-operational reliability during thermal throttling?
details:
  realistic_solution: Option A is the correct design. The Google Coral Edge TPU is incredibly power-efficient (2 TOPS per Watt). By switching to a smaller INT8 model on the Edge TPU, the compute requirement drops, which proportionally reduces power consumption and heat generation while maintaining deterministic low latency. This fail-operational approach ensures the host CPU remains free for critical drone flight controls.
  common_mistake: |
    **The Pitfall:** Choosing Option B to completely turn off the Edge TPU in a misguided attempt to reduce overall heat.
    **The Rationale:** It seems logical to shut down the "extra" accelerator hardware when the system is too hot.
    **The Consequence:** The host CPU is incredibly power-inefficient for AI workloads. Running even a tiny FP32 model will draw far more power than the Edge TPU, worsening the thermal crisis and potentially starving critical drone flight control tasks.
  napkin_math: |
    1. **Primary Model:** ~3.9 TOPS at 15 FPS draws ~1.95W on the TPU (assuming 2 TOPS/W efficiency).
    2. **Option A (TPU Fallback):** A smaller INT8 model needs only 0.5 TOPS, drawing just ~0.25W on the TPU.
    3. **Option B (CPU Fallback):** Running FP32 inference on an embedded host CPU typically draws 5-10W.
    4. **Result:** Option A reduces total power draw to **~0.25W**, instantly alleviating thermal stress while preserving CPU resources for flight stability.
