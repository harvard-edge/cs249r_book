title: Evaluating Fail-Operational Fallbacks on Edge TPU
scenario: 'You are designing an object detection pipeline for an autonomous drone
  using a Google Coral Edge TPU (4 TOPS INT8, 2W power budget) attached via USB. The
  primary model is a high-accuracy INT8 quantized SSD, operating near the 4 TOPS limit
  at 15 FPS. When the drone encounters thermal throttling in hot environments, the
  system must gracefully degrade. You must evaluate two fallback strategies: Option
  A switches to a smaller, lower-resolution INT8 model running on the same Edge TPU;
  Option B sheds the Edge TPU load completely by running a tiny FP32 model on the
  host CPU. Which strategy provides better fail-operational reliability?'
question: Which strategy provides better fail-operational reliability?
details:
  realistic_solution: Option A is the correct design. The Google Coral Edge TPU is
    incredibly power-efficient (2 TOPS per Watt). By switching to a smaller INT8 model
    on the Edge TPU, the compute requirement drops, which proportionally reduces power
    consumption and heat generation while maintaining deterministic low latency. This
    fail-operational approach ensures the host CPU remains free for critical drone
    flight controls.
  common_mistake: Candidates often choose Option B, assuming that turning off the
    Edge TPU is the best way to handle thermal events. They fail to realize that running
    even a tiny FP32 model on the host CPU typically consumes more power than the
    highly efficient Edge TPU, worsening the thermal crisis.
  napkin_math: Primary INT8 model at 15 FPS uses ~3.9 TOPS (near the 4 TOPS limit),
    drawing ~1.95W (assuming 2 TOPS/W efficiency). Fallback INT8 model (Option A)
    needs only 0.5 TOPS at 15 FPS, drawing ~0.25W on the Edge TPU, immediately alleviating
    thermal stress. Option B running on a typical embedded host CPU might draw 5-10W
    for FP32 inference, violating the strict power and thermal budget of the edge
    device.
