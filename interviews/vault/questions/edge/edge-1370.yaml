title: Compute-Bound Data Pipeline Throughput
scenario: You are deploying a high-throughput video analytics pipeline on a Qualcomm Cloud AI 100 on-premise inference accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W). The deployed computer vision model requires 0.5 TOPS of INT8 compute per inference. Uncompressed 1080p video frames (1920x1080 pixels, 3 channels, 1 byte per channel) are being streamed directly to the accelerator for processing.
question: What data pipeline throughput in GB/s is needed to keep the 400 TOPS Cloud AI 100 fully utilized on 0.5 TOPS/frame 1080p inputs?
details:
  realistic_solution: To find the required data pipeline throughput, first determine the maximum frame rate the accelerator can support by dividing its total compute capacity by the compute required per frame. Then, calculate the size of a single uncompressed frame and multiply it by the theoretical maximum frame rate to get the data loading requirement.
  common_mistake: |
    **The Pitfall:** Miscalculating raw frame sizes.
    **The Rationale:** Candidates forget to multiply the pixel count by the 3 color channels, or they use 32 GB capacity as a bandwidth limit.
    **The Consequence:** They under-provision the data pipeline by a factor of 3, leading to severe GPU starvation.
  napkin_math: |
    - **Max FPS:** 400 TOPS / 0.5 TOPS/frame = **800 FPS**.
    - **Frame Size:** 1920 * 1080 * 3 channels * 1 byte = 6,220,800 bytes = **~6.22 MB**.
    - **Required Throughput:** 800 FPS * 6.22 MB/frame = 4,976.6 MB/s = **~4.98 GB/s**.
