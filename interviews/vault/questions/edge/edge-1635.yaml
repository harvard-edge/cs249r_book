title: Calculate Sustained FPS Under Enclosure Thermal Limits
scenario: >-
  You are deploying a real-time tracking model on an NVIDIA Jetson Orin mounted in an unventilated, passively cooled outdoor enclosure. At its peak 60W TDP, the GPU provides 275 TOPS INT8. Your model requires exactly 2 TOPS per inference. The enclosure's thermal resistance only allows it to safely dissipate 30W of heat continuously before the SoC thermally throttles and clocks down unpredictably. Assume power consumption scales linearly with INT8 throughput.
question: What maximum sustained FPS can the Jetson Orin run indefinitely when limited to 30W and each inference costs 2 TOPS?
details:
  realistic_solution: 'The system''s power profile must be clamped in software to match the 30W continuous thermal dissipation limit of the enclosure. This ensures deterministic, sustained performance over time rather than rapid cycling between burst speeds and heavily throttled states.'
  common_mistake: |
    **The Pitfall:** Designing purely around peak burst performance.
    **The Rationale:** Candidates see the 275 TOPS spec and build their throughput expectations based on theoretical maximums.
    **The Consequence:** They ignore the physical 30W dissipation limit of the passive enclosure, leading to an architecture that quickly hits a thermal wall and suffers severe, unpredictable throttling in production.
  napkin_math: |
    1. **Peak Specs:** 275 TOPS at 60W TDP.
    2. **Sustained Limit:** 30W continuous dissipation.
    3. **Power Ratio:** `30W / 60W = 0.5`.
    4. **Sustained Performance:** `275 TOPS * 0.5 = 137.5 TOPS`.
    5. **Cost per frame:** 2 TOPS.
    6. **Result:** Max Sustained FPS = `137.5 TOPS / 2 TOPS = 68.75 FPS`.
