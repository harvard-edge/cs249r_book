title: Weighted Round-Robin for Asymmetric Edge Accelerators
scenario: You manage an on-premise edge appliance equipped with 4 Qualcomm Cloud AI 100 accelerators (each
  capable of 400 TOPS INT8 at 75W, with 32 GB LPDDR4x memory). Due to a chassis airflow constraint, two
  of the cards are thermally throttled and can only sustain 200 TOPS, while the other two operate at the
  full 400 TOPS. You are deploying a smart city traffic model that requires 0.5 TOPS per INT8 inference.
  Calculate the optimal integer weights for a weighted round-robin load balancer to distribute traffic
  proportionally to compute capacity, and determine the maximum theoretical system throughput in inferences
  per second.
details:
  realistic_solution: The load balancer should use a weighted round-robin strategy where the weights are
    directly proportional to the available TOPS on each accelerator. We normalize the capacities to find
    the smallest integer weights, assigning 1 to the throttled cards and 2 to the unthrottled cards. The
    total throughput is the sum of all available capacities divided by the cost per inference.
  common_mistake: Candidates often assign equal weights assuming all identical hardware performs identically,
    ignoring thermal constraints typical in edge environments. They may also miscalculate total throughput
    by simply multiplying a single card's capacity by 4.
  napkin_math: '1. Available Compute: Two throttled cards at 200 TOPS each, two unthrottled cards at 400
    TOPS each. 2. Optimal Weights: The ratio of 200:400 simplifies to weights of (1, 1, 2, 2). 3. Total
    System Compute: (2 * 200) + (2 * 400) = 1200 TOPS. 4. Max Throughput: 1200 TOPS / 0.5 TOPS per inference
    = 2400 inferences per second.'
