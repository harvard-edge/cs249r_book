title: Edge TPU Inference Throughput and Energy Calculation
scenario: Your team is deploying a pedestrian detection model on a Google Coral Edge TPU. The accelerator
  provides 4 TOPS (Tera Operations Per Second) at INT8 precision and operates at a power envelope of 2W.
  The fully INT8-quantized model requires 2 GOPS (Giga Operations) per inference pass. Assuming 100% compute
  utilization and no memory bottlenecks, calculate the theoretical maximum frames per second (FPS) and
  the energy cost per inference in millijoules (mJ).
details:
  realistic_solution: To find the maximum throughput, divide the total available operations per second
    (4 TOPS = 4000 GOPS) by the operations required per frame. To find the energy cost per inference,
    divide the total power consumption (2 Joules per second) by the maximum throughput (FPS) to get Joules
    per frame, then convert to millijoules.
  common_mistake: Candidates often confuse TOPS with GOPS, missing the factor of 1000, or forget to convert
    the power (Watts, or Joules per second) into energy per frame. Some may also mistakenly try to factor
    in FP32 operations, ignoring that the Coral Edge TPU only accelerates INT8.
  napkin_math: '1. Convert TOPS to GOPS: 4 TOPS = 4000 GOPS.

    2. Calculate max FPS: 4000 GOPS / 2 GOPS/frame = 2000 FPS.

    3. Calculate energy per frame: Power is 2W (2 Joules/second). Energy = 2 J/s / 2000 FPS = 0.001 Joules/frame.

    4. Convert to mJ: 0.001 Joules = 1 mJ per inference.'
