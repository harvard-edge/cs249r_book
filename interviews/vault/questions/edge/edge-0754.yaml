title: The Boot Time Budget
scenario: 'Your edge AI security camera (Jetson Orin Nano, 8 GB RAM, 128 GB NVMe) must begin producing
  detections within 3 seconds of power-on. Currently, boot takes 22 seconds: 2s UEFI, 8s Linux kernel
  + systemd, 4s loading Python + PyTorch, 8s loading the YOLOv8-L model and building the TensorRT engine.
  How do you cut boot-to-first-detection from 22 seconds to under 3 seconds?'
question: "How do you cut boot-to-first-detection from 22 seconds to under 3 seconds?"
details:
  realistic_solution: 'Attack each phase independently: (1) **UEFI → custom bootloader (0.5s):** Replace
    UEFI with a minimal U-Boot configuration that skips hardware enumeration for unused peripherals. (2)
    **Linux kernel (2s → 0.8s):** Build a custom kernel with only required drivers compiled in (no modules),
    use `initramfs` with the root filesystem embedded, disable `systemd` and use a direct `init` script.
    (3) **Python + PyTorch (4s → 0s):** Eliminate Python entirely. Use the TensorRT C++ runtime directly
    — no Python interpreter overhead. (4) **Model loading (8s → 0.5s):** The 8-second TensorRT engine
    build happens because TensorRT compiles the ONNX model into GPU-specific kernels at load time. The
    fix: **pre-compile the TensorRT engine** offline and serialize it to disk. Loading a pre-built engine
    is a `mmap` + pointer assignment: ~500ms for a 50 MB engine file from NVMe (NVMe sequential read:
    3 GB/s → 50 MB / 3 GB/s = 17ms for I/O, rest is GPU memory allocation). Total: 0.5 + 0.8 + 0 + 0.5
    = **1.8 seconds** boot-to-detection.'
  common_mistake: '"Use a faster SSD" or "Optimize the Linux boot." Storage speed helps marginally, but
    the 8-second TensorRT engine build is the real killer — and it''s not a storage problem.'
  napkin_math: 'Original: 2 + 8 + 4 + 8 = 22s. Optimized: 0.5 (bootloader) + 0.8 (kernel) + 0.5 (engine
    load) = 1.8s. The TensorRT engine build (ONNX → engine) is the single biggest win: 8s → 0.5s by pre-compilation.
    Storage for pre-built engine: ~50 MB (YOLOv8-L FP16). NVMe read: 50 MB / 3 GB/s = 17ms I/O + ~480ms
    GPU memory allocation. Python elimination saves 4s and ~200 MB of RAM. The 128 GB NVMe has plenty
    of room for multiple pre-built engines (different precision, different models for the degradation
    ladder).'
