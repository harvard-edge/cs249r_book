title: The Perception Pipeline's Precision Problem
scenario: Your team's autonomous driving platform uses a Jetson AGX Orin. The main perception model, currently running in FP16 precision, is failing to meet its 33ms real-time processing deadline. Profiling shows the bottleneck is memory bandwidth, specifically when writing a large intermediate activation tensor back to DRAM. A proposal is made to quantize the model to INT8.
question: What first-order effect will INT8 quantization have on the DRAM write bandwidth for the FP16 activation bottleneck?
details:
  realistic_solution: Switching from FP16 (2 bytes per value) to INT8 (1 byte per value) halves the size of the activation tensor. Since the operation is memory-bound, the time it takes to write this tensor to DRAM is directly proportional to its size. Therefore, this change will cut the memory bandwidth requirement for this specific operation by 50%. This reduction in memory traffic is a critical step in getting the pipeline to meet its 33ms latency budget. However, this is not a simple toggle; it requires a careful calibration process using a representative dataset to map the FP16 values to the INT8 range [-128, 127] to minimize accuracy loss.
  common_mistake: |
    **The Pitfall:** Focusing only on the compute speedup of INT8.
    **The Rationale:** Engineers often assume quantization is primarily for accelerating MAC operations.
    **The Consequence:** They underestimate the impact of memory bottlenecks and fail to carefully calibrate INT8 quantization for activations, risking catastrophic clipping/overflow.
  napkin_math: |
    1. **Activation Size**: 640 * 640 * 64 = 26,214,400 elements.
    2. **FP16 Memory Footprint**: 26,214,400 * 2 bytes = 52,428,800 bytes (**~52.43 MB**).
    3. **INT8 Memory Footprint**: 26,214,400 * 1 byte = 26,214,400 bytes (**~26.21 MB**).
    4. **FP16 Write Time**: 52.43 MB / 204.8 GB/s = **0.256 ms**.
    5. **INT8 Write Time**: 26.21 MB / 204.8 GB/s = **0.128 ms**.
    6. **Conclusion**: Quantizing exactly halves the payload, directly doubling the speed of this memory-bound layer.
  options:
  - It has no significant impact on memory bandwidth, only on compute.
  - It reduces the memory bandwidth requirement by 4x.
  - It halves the memory bandwidth requirement for the operation.
  - It doubles the available hardware memory bandwidth of the Jetson device.
