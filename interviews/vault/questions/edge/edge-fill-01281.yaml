title: Edge AI Drift Detection on Hailo-8
scenario: You are deploying a critical real-time object detection model on a Hailo-8 dataflow accelerator,
  which provides 26 TOPS (INT8) at 2.5W. The model is detecting defects in manufacturing quality on a
  production line. Due to expected environmental changes (e.g., lighting variations, subtle material changes
  over time), the input data distribution is expected to slowly shift. Describe a strategy to detect data
  drift on the Hailo-8 device itself, minimizing impact on inference performance and power consumption,
  to trigger model retraining or alert operators. Focus on practical considerations for an edge device
  with these specific constraints.
details:
  realistic_solution: "Implement a lightweight, online drift detection mechanism directly on the Hailo-8.\
    \ This typically involves: \n1.  **Feature Embedding Extraction:** Utilize the output of an intermediate\
    \ layer (feature embeddings) from the object detection model, which is inherently lower-dimensional\
    \ than the raw input images. \n2.  **Reference Distribution:** Establish a baseline reference distribution\
    \ of these feature embeddings from known good data during initial calibration or deployment. \n3.\
    \  **Statistical Test:** Periodically (e.g., every 'N' inferences) compute a simple, low-overhead\
    \ statistical distance metric. Examples suitable for edge include binned histogram comparisons (e.g.,\
    \ Earth Mover's Distance on histograms), L1 distance, or a quantized version of Population Stability\
    \ Index (PSI) or Kullback-Leibler (KL) divergence applied to the feature embeddings. \n4.  **Thresholding\
    \ & Alerting:** Set an adaptive threshold for the chosen drift metric. If the current distribution\
    \ significantly deviates from the reference, trigger a local alert (e.g., change an LED status, send\
    \ a small, concise alert message via MQTT), indicating potential drift and the need for investigation\
    \ or model update. \n5.  **Resource Management:** Carefully select the frequency of checks ('N' inferences)\
    \ and the complexity of the statistical method to ensure the drift detection process consumes minimal\
    \ computational resources (e.g., less than 1% of the 26 TOPS) and stays well within the 2.5W power\
    \ budget, preventing interference with the primary inference task."
  common_mistake: Attempting to log and transmit all raw inference data to a centralized cloud service
    for batch drift analysis. This approach often leads to excessive bandwidth usage, increased latency
    in detection, and violates power/privacy constraints inherent to edge deployments. Another common
    mistake is using computationally expensive, high-dimensional statistical tests directly on the device
    without proper feature reduction or adaptive sampling.
  napkin_math: Given the Hailo-8 performs inferences at an average rate of 100 FPS (frames per second)
    and you decide to perform a lightweight drift detection check using the output of an intermediate
    layer every 500 processed frames, how many seconds elapse between each drift detection check?
