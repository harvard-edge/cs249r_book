title: Evaluating Edge Accelerators vs Traditional GPUs
scenario: You are deploying a 10M parameter INT8 object detection model (MobileNetV2-SSD derivative) processing 1080p video at 30 FPS. The hardware team proposes replacing an embedded GPU (with traditional SIMT/warp-based execution and local DRAM) with a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS INT8 compute within a 2.5W envelope, but crucially, it has no local DRAM and relies entirely on streaming activations from host memory. Compare the architectural tradeoffs between these two execution models.
question: Which architecture minimizes system-level latency and power for this pipeline, and how does the Hailo-8's lack of local DRAM alter your model optimization strategy?
details:
  realistic_solution: The Hailo-8's dataflow architecture is vastly superior for power-constrained streaming pipelines because it eliminates the von Neumann bottleneck inherent in GPUs. Instead of optimizing for warp occupancy and memory coalescing to hide DRAM latency layer-by-layer, the optimization strategy must shift to spatial graph compilation. The goal is to ensure the entire model's computational graph fits within the Hailo-8's on-chip memory resources so that input pixels stream in via PCIe/host-memory and output bounding boxes stream out, without intermediate off-chip memory spills.
  common_mistake: |
    **The Pitfall:** Assuming the lack of local DRAM is a severe bottleneck and applying GPU memory paradigms to the Hailo-8.
    **The Rationale:** Candidates are accustomed to GPU optimization techniques like memory coalescing and Tensor Core occupancy to hide DRAM latency.
    **The Consequence:** They fail to shift their strategy to spatial graph compilation, missing the opportunity to keep intermediate activations entirely in distributed on-chip SRAM.
  napkin_math: |
    * Uncompressed 1080p frame = 1920 × 1080 × 3 bytes ≈ 6.2 MB.
    * Input streaming at 30 FPS = 6.2 MB × 30 ≈ 186 MB/s (easily handled by PCIe).
    * GPU local DRAM bandwidth for 50 layers = 50 layers × 6.2 MB × 2 (read+write) × 30 FPS ≈ 18.6 GB/s.
    * **The Hailo-8 eliminates the 18.6 GB/s of off-chip memory movement by keeping intermediate activations on-chip, enabling 26 TOPS within a 2.5W budget.**
