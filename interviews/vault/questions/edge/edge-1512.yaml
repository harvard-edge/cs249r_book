title: Feature Map Drift Detection Power Throttling
scenario: You deploy an INT8 quantized object detector on an NVIDIA Jetson Orin (32
  GB LPDDR5, 275 TOPS INT8, 60W TDP) using the Ampere GPU and DLA. Inference runs
  smoothly at 30 FPS using only 20W. To monitor training-serving skew, a pipeline
  is added to compute KL divergence on FP32 intermediate feature maps at 30 FPS. Shortly
  after deployment, the system begins dropping frames and telemetry shows power consumption
  continuously hitting the 60W TDP limit, despite the INT8 inference requiring only
  a fraction of the 275 TOPS compute. What is the root cause?
question: What is the root cause?
details:
  realistic_solution: The root cause is the power bottleneck created by continuously
    writing full-precision (FP32) intermediate feature maps from the DLA to main memory
    for drift detection. While the Ampere GPU and DLA easily handle the INT8 inference,
    breaking the pipeline to extract FP32 tensors at 30 FPS forces continuous large
    transfers to the 32 GB LPDDR5. This aggressive memory traffic and subsequent CPU
    processing drives the power consumption from 20W to the 60W TDP limit, causing
    thermal throttling. The fix is to sample frames periodically or compute drift
    only on the final low-dimensional outputs.
  common_mistake: Candidates often assume the mathematical computation of KL divergence
    is too complex or that the INT8 model degraded. They frequently suggest re-quantizing
    the model or switching to a simpler metric like PSI, missing the massive hardware
    overhead of extracting intermediate activations from the accelerator.
  napkin_math: Assume an intermediate feature map is 256x256x128. In FP32 (4 bytes),
    one tensor is 256 * 256 * 128 * 4 = 33,554,432 bytes (~33.55 MB). If processing
    8 camera streams at 30 FPS, this generates 33.55 MB * 8 * 30 = ~8.05 GB/s of continuous
    memory traffic. Writing this from the DLA/GPU to the 32 GB LPDDR5 and reading
    it into the CPU for KL divergence calculations breaks the efficient INT8 execution
    pipeline, consuming the remaining 40W of the 60W TDP budget and causing the system
    to throttle before ever reaching the 275 TOPS limit.
