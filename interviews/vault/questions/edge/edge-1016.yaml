title: 'Realization: deploy MobileNetV3 on Hailo-8 with model partitioning for multi-task inference'
scenario: 'You need to run MobileNetV3-Large shared backbone with two task heads (classification + detection) on Hailo-8 (26 TOPS, 2.5W). The backbone is 0.18 GFLOPs, classification head 0.04 GFLOPs, detection head 0.12 GFLOPs.'
question: 'How would you compile the two-head MobileNetV3 model on Hailo-8 so the 0.18 GFLOP backbone runs only once?'
details:
  realistic_solution: 'Hailo DFC multi-context compilation: (1) define backbone as shared_context in the HN (Hailo Network) specification; (2) attach both task heads as separate output contexts; (3) DFC schedules backbone computation once and branches features to both heads. Implementation: export full multi-task model to ONNX with two output nodes; DFC automatically identifies shared prefix. Verify with profiler: backbone should appear once in execution trace. Total FLOPs: 0.18 + 0.04 + 0.12 = 0.34 GFLOPs (not 0.34+0.18 = 0.52). At 30 FPS: 0.34G × 30 = 10.2 GOPS, well within 26 TOPS.'
  common_mistake: |
    **The Pitfall:** Compiling two separate HEF files and running backbone inference twice (once per task).
    **The Rationale:** Engineers often treat multi-task models as completely independent networks when deploying to hardware accelerators.
    **The Consequence:** This completely doubles the compute and latency for the shared prefix, wasting throughput.
  napkin_math: |
    * Total FLOPs with shared backbone: 0.18 (backbone) + 0.04 (cls) + 0.12 (det) = 0.34 GFLOPs.
    * At 30 FPS: 0.34 GFLOPs × 30 = 10.2 GOPS (fits easily in 26 TOPS).
    * Total FLOPs without sharing: (0.18 + 0.04) + (0.18 + 0.12) = 0.52 GFLOPs.
    * At 30 FPS: 0.52 GFLOPs × 30 = 15.6 GOPS.
    * **Multi-context compilation reduces total compute by over 30%.**
