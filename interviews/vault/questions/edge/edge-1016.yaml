title: 'Realization: deploy MobileNetV3 on Hailo-8 with model partitioning for multi-task inference'
scenario: 'You need to run MobileNetV3-Large shared backbone with two task heads (classification + detection) on Hailo-8. The backbone is 0.18 GFLOPs, classification head 0.04 GFLOPs, detection head 0.12 GFLOPs.'
question: 'How would you compile the two-head MobileNetV3 model on Hailo-8 so the 0.18 GFLOP backbone runs only once?'
details:
  realistic_solution: 'Hailo DFC multi-context compilation: (1) define backbone as shared_context in the HN (Hailo Network) specification; (2) attach both task heads as separate output contexts; (3) DFC schedules backbone computation once and branches features to both heads. Implementation: export full multi-task model to ONNX with two output nodes; DFC automatically identifies shared prefix. Use nsys profiling to verify: backbone should appear once in execution trace.'
  common_mistake: |
    **The Pitfall:** Compiling two separate HEF files and running backbone inference twice (once per task).
    **The Rationale:** Engineers often treat multi-task models as completely independent networks when deploying to hardware accelerators.
    **The Consequence:** This completely doubles the compute and latency for the shared prefix, wasting throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target frame rate: 30 FPS.
       - Backbone compute: 0.18 GFLOPs.
       - Classification compute: 0.04 GFLOPs.
       - Detection compute: 0.12 GFLOPs.
    2. **Calculations:**
       - Total FLOPs (Shared): 0.18 + 0.04 + 0.12 = 0.34 GFLOPs.
       - Shared Compute at 30 FPS: 0.34 GFLOPs * 30 = 10.2 GOPS.
       - Total FLOPs (Unshared): (0.18 + 0.04) + (0.18 + 0.12) = 0.52 GFLOPs.
       - Unshared Compute at 30 FPS: 0.52 GFLOPs * 30 = 15.6 GOPS.
    3. **Conclusion & Interpretation:**
       - **Result: 34% Compute Reduction**. Multi-context compilation deduplicates the shared prefix compute, easily fitting within the 26 TOPS budget.
