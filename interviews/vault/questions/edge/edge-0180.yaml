title: The SRAM Tensor Arena
scenario: You're optimizing a small radar classification model for an automotive-grade microcontroller
  which has 512KB of SRAM. The ML framework requires you to define a 'Tensor Arena'. What is the primary
  purpose of this memory region?
question: "What is the primary purpose of this memory region?"
details:
  realistic_solution: The Tensor Arena is a single, large, statically-allocated block of memory (in this
    case, a portion of the 512KB SRAM) that is pre-reserved to hold all input, output, and intermediate
    activation tensors during inference. This strategy completely avoids dynamic memory allocation (e.g.,
    `malloc`), which is non-deterministic, slow, and can lead to memory fragmentation—all of which are
    unacceptable in a hard real-time system like automotive radar processing.
  common_mistake: Engineers unfamiliar with microcontroller constraints often confuse the Tensor Arena
    with concepts from larger systems. They might think it's for storing the model weights (like VRAM),
    that it's a generic memory heap, or that it's a DMA buffer. The key is understanding it's a defense
    against the dangers of dynamic memory allocation in a real-time, memory-constrained environment.
  napkin_math: Given 512KB of total SRAM, a model requiring a peak of 150KB for activations would consume
    `150 / 512 ≈ 29%` of the device's entire fast memory in its Tensor Arena. The remaining 362KB must
    be sufficient for the RTOS, network stacks, and other critical functions. Pre-allocating the arena
    ensures the model's peak memory is guaranteed, preventing a catastrophic `out-of-memory` failure during
    vehicle operation.
  options:
  - To permanently store the model's weights in fast memory.
  - To serve as a dedicated buffer for Direct Memory Access (DMA) transfers from peripherals.
  - To provide a statically-allocated region for tensor activations, avoiding dynamic memory calls.
  - To act as a software-managed cache for data stored in slower, external DRAM.
  correct_index: 2
