title: Analyzing Hailo-8 Host Memory Streaming Bottlenecks
scenario: You are deploying an object detection model on a Hailo-8 dataflow accelerator connected via PCIe to an edge host system. The Hailo-8 is extremely efficient, providing 26 TOPS INT8 at just 2.5W, but it has no local DRAM and streams data directly from host memory. During profiling, you notice the end-to-end pipeline is capped at 60 FPS for uncompressed 1080p video, yet the Hailo-8 compute utilization sits at only 15%.
question: Why is the Hailo-8 starving at 15% utilization with the 1080p pipeline capped at 60 FPS, and where is the bottleneck?
details:
  realistic_solution: The bottleneck is host memory bandwidth contention. Because the Hailo-8 streams continuously from host RAM, the host memory must support camera ingestion, CPU preprocessing (resizing, normalization), and the DMA transfers to the Hailo-8 simultaneously. The solution is to optimize the host-side data pipeline by implementing zero-copy memory sharing (e.g., dma_buf) between the camera ISP, host CPU/GPU, and the Hailo-8 PCIe driver to eliminate redundant host memory reads and writes.
  common_mistake: |
    **The Pitfall:** Blaming the PCIe bus bandwidth or the accelerator batch size.
    **The Rationale:** Candidates miss the architectural detail that because Hailo-8 lacks local DRAM, the host memory subsystem must handle the full burden of continuous streaming.
    **The Consequence:** Upgrading the PCIe interface or trying to optimize the model, failing to resolve the 1.5 GB/s host RAM bandwidth saturation caused by redundant CPU copies.
  napkin_math: |
    *   1080p RGB frame size: 1920 * 1080 * 3 bytes = 6.22 MB.
    *   Streaming bandwidth at 60 FPS: 6.22 MB * 60 = ~373 MB/s.
    *   Naive pipeline traffic: Camera writes (373 MB/s) + CPU reads (373 MB/s) + CPU writes (373 MB/s) + DMA reads (373 MB/s).
    *   **Total host memory traffic = 1.5 GB/s, which saturates the low-power edge host RAM bandwidth, starving the Hailo-8 accelerator.**
