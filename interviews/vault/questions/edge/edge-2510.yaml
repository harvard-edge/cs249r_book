title: ESP-NOW Tree AllReduce
scenario: A cluster of 3 ESP32s synchronizes a 10 KB state vector via a tree topology
  (1 root, 2 leaves) using the ESP-NOW protocol (1 Mbps).
question: Analyze the synchronization latency, assuming sequential hops due to the
  shared wireless medium.
details:
  realistic_solution: In a wireless tree, Reduce requires leaves to send to the root
    sequentially (2 hops). Broadcast requires the root to multicast down (1 hop).
    Total transmissions = 3. Payload is 10 KB = 80 Kb. Time = 3 * (80 Kb / 1000 Kbps)
    = 240ms. The MAC layer enforces this strict serialization.
  common_mistake: Assuming leaf nodes can transmit to the root concurrently, ignoring
    multi-transmitter MAC layer collisions.
  napkin_math: 3 sequential tx * (10 KB * 8 bits/B / 1000 Kbps) = 3 * 80ms = 240 ms.
