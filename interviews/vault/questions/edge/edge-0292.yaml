title: The Federated Fleet Economics
scenario: 'You''re an ML systems engineer on an autonomous driving team. The fleet has 10,000 vehicles,
  each generating about 100 GB of sensor data per day that could be used for training a new perception
  model. Your team is debating between two training strategies: (1) uploading all raw data to the cloud
  for centralized training, or (2) using Federated Learning (FL) to train models on the vehicles and only
  upload the much smaller model updates. From a systems perspective, what is the single most significant
  advantage of using Federated Learning in this scenario?'
details:
  realistic_solution: 'The correct answer is that Federated Learning drastically reduces network data
    transfer requirements. Instead of uploading petabytes of raw, sensitive user data daily, the system
    only transmits small, anonymized model weight updates (typically megabytes). This provides two primary
    benefits: (1) massive reduction in cellular data costs, and (2) significant improvement in user privacy
    and data security by keeping raw sensor data on the device.'
  common_mistake: Engineers often underestimate the sheer scale and cost of data transmission from a large
    fleet of edge devices. They might mistakenly believe FL's primary benefit is in improving model accuracy
    or reducing local inference latency, rather than recognizing its massive impact on network bandwidth,
    data costs, and user privacy.
  napkin_math: Each car generates 100 GB of data. To upload this over a typical 10 Mbps cellular connection
    would take over 22 hours (100 GB * 8000 Mb/GB / 10 Mbps ≈ 80,000 seconds). This makes centralized
    data collection physically infeasible from a network-availability standpoint, before even considering
    the massive data costs. In contrast, uploading a 100 MB model update would take less than 2 minutes.
    The primary advantage is avoiding this data transfer bottleneck and its associated cost and privacy
    liability.
  options:
  - It improves model accuracy faster than centralized training.
  - It lowers on-vehicle inference latency for the end-user.
  - It dramatically reduces network data transfer costs and privacy risks.
  - It reduces the total computational (FLOPs) cost of training.
  correct_index: 2
