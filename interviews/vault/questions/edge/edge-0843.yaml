title: Mitigating Client Drift in Federated Recommendation
scenario: You are designing a Federated Learning system to train an on-device recommendation model (15MB parameters) across 50 million smartphones. You sample 5,000 devices per round over cellular networks (averaging 2MB/s upload bandwidth). The local data is heavily Non-IID. Using standard FedAvg with 5 local epochs, you observe that the global model's loss oscillates wildly and fails to converge after 1,000 communication rounds.
question: How would you stabilize FedAvg training for the 15MB recommender under extreme non-IID client drift without worsening cellular dropout?
details:
  realistic_solution: 'Introduce a proximal regularization term (FedProx) to dynamically bound the local updates from the global model. Given the bandwidth constraints, FedProx is preferable as it requires zero additional communication overhead, unlike control variates (SCAFFOLD) which double the payload size.'
  common_mistake: |
    **The Pitfall:** Increasing local training epochs or learning rate to help devices learn their local distributions.
    **The Rationale:** Candidates apply centralized training intuition to federated settings, ignoring that excessive local steps exacerbate client drift on non-IID data.
    **The Consequence:** The local models overfit to disjoint parameter spaces, destroying the global model upon aggregation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 15MB
    - Upload bandwidth: 2MB/s
    - Standard payload upload time: 7.5s

    **Calculations:**
    - FedAvg upload: 15MB / 2MB/s = 7.5s
    - SCAFFOLD (doubles payload for control variates): 30MB / 2MB/s = 15s (increases timeout risk)
    - FedProx (adds local penalty, no extra payload): 15MB / 2MB/s = 7.5s

    **Conclusion & Interpretation:**
    - **Result: FedProx is Optimal (Bandwidth-Bound)**. FedProx stabilizes convergence without increasing the 7.5s upload time, avoiding cellular dropout spikes caused by SCAFFOLD's 15s payload.
