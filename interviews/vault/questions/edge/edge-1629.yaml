title: Heterogeneous Parallel Branch Scheduling
scenario: 'You are optimizing the execution schedule of a multi-branch perception model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). The model has two independent branches that follow a common stem: Branch A (standard convolutions, 1980 GOPs workload) mapped to the DLA, and Branch B (custom operations, 880 GOPs workload) mapped to the Ampere GPU. Assume the Orin''s 275 TOPS are physically partitioned as 110 TOPS for the DLA and 165 TOPS for the GPU.'
question: What are the theoretical compute latencies if Branch A and Branch B run sequentially versus concurrently on the DLA and GPU?
details:
  realistic_solution: 'The correct approach requires explicitly calculating the latency for each heterogeneous accelerator independently based on its specific INT8 compute capacity. When scheduling parallel branches across the two accelerators, the total parallel latency is strictly determined by the maximum execution time among the branches (the bottleneck), whereas a sequential schedule requires summing their latencies.'
  common_mistake: |
    **The Pitfall:** Incorrectly summing workloads across heterogeneous compute units or adding concurrent latencies.
    **The Rationale:** Candidates often treat the SoC as a monolithic 275 TOPS block, ignoring that the DLA and GPU are physically distinct and process concurrently.
    **The Consequence:** Drastically overestimating latency and underutilizing the parallel hardware architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin partition: DLA = 110 TOPS, GPU = 165 TOPS.
       - Branch A (DLA workload) = 1980 GOPs (1.98 TOPS).
       - Branch B (GPU workload) = 880 GOPs (0.88 TOPS).
    2. **Calculations:**
       - Branch A latency = 1.98 TOPS / 110 TOPS = 0.018s = 18 ms.
       - Branch B latency = 0.88 TOPS / 165 TOPS = 0.00533s = 5.33 ms.
       - Sequential Time = 18 ms + 5.33 ms = 23.33 ms.
       - Parallel Time = max(18 ms, 5.33 ms) = 18 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 18ms Latency**. By utilizing the heterogeneous hardware concurrently, the overall latency is dictated strictly by the DLA bottleneck branch (18ms), saving 5.33ms over sequential execution.
