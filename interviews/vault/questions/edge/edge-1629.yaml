title: Heterogeneous Parallel Branch Scheduling
scenario: 'You are optimizing the execution schedule of a multi-branch perception
  model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU
  + DLA accelerator). The model has two independent branches that follow a common
  stem: Branch A (standard convolutions, 1980 GOPs workload) mapped to the DLA, and
  Branch B (custom operations, 880 GOPs workload) mapped to the Ampere GPU. Assuming
  the Orin''s 275 TOPS are physically partitioned as 165 TOPS for the DLA and 110
  TOPS for the GPU, calculate the theoretical compute latency in milliseconds if the
  scheduler runs these branches sequentially versus concurrently in parallel.'
question: What are the theoretical compute latencies if Branch A and Branch B run
  sequentially versus concurrently on the DLA and GPU?
details:
  realistic_solution: The correct approach requires explicitly calculating the latency
    for each heterogeneous accelerator independently based on its specific INT8 compute
    capacity. On the Jetson Orin, the Ampere GPU provides approximately 165 TOPS and
    the DLA approximately 110 TOPS. When scheduling parallel branches across the two
    accelerators, the total parallel latency is strictly determined by the maximum
    execution time among the branches (the bottleneck), whereas a sequential schedule
    requires summing their latencies.
  common_mistake: Candidates often incorrectly sum the workloads or the TOPS capacities
    without isolating the heterogeneous compute units (GPU vs DLA), or they miscalculate
    the parallel execution time by adding the latencies instead of taking the maximum
    of the concurrent branches.
  napkin_math: 'Branch A (DLA) workload: 1980 GOPs = 1.98 TOPs. Branch A latency =
    1.98 TOPs / 110 TOPS (DLA) = 0.018 seconds (18 ms). Branch B (GPU) workload: 880
    GOPs = 0.88 TOPs. Branch B latency = 0.88 TOPs / 165 TOPS (GPU) = 0.00533 seconds
    (5.33 ms). Sequential execution latency = 18 ms + 5.33 ms = 23.33 ms. Parallel
    execution latency = max(18 ms, 5.33 ms) = 18 ms.'
