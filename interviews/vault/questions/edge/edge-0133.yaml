title: 'The 30 FPS Deadline: Real-Time Deadlines'
scenario: You are designing an obstacle detection system for an autonomous warehouse robot that must process
  video at a minimum of 30 frames per second (FPS) to ensure safe navigation. To meet this hard real-time
  requirement, what is the maximum latency budget for the entire ML inference pipeline for a single frame?
details:
  realistic_solution: A rate of 30 frames per second means that 30 frames must be processed within one
    second. The total time in a second is 1000 milliseconds. Therefore, the budget for each frame is 1000
    milliseconds divided by 30 frames, which is 33.3 milliseconds.
  common_mistake: Engineers often confuse the frame rate directly with the millisecond budget, assuming
    30 FPS means a 30ms budget. Another common mistake is to calculate the budget for 60 FPS (16.6ms)
    out of habit from UI development, which is a much stricter target.
  napkin_math: $\frac{1000 \text{ ms}}{1 \text{ second}} \times \frac{1 \text{ second}}{30 \text{ frames}}
    = 33.3 \text{ ms/frame}$
  options:
  - 16.6 ms
  - 30 ms
  - 33.3 ms
  - 100 ms
  correct_index: 2
