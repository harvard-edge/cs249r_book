title: Coral Edge TPU Frame Budget Analysis
scenario: We are deploying an object detection pipeline on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB
  form factor) to process a 60 FPS video stream. The model has been properly quantized to INT8 as required
  by the limited operator support. While the TPU executes the model internally in just 8ms, the system
  frequently misses the strict 16.6ms frame budget, causing jank and dropped frames. Given these hardware
  characteristics, explain why the system fails to meet the real-time deadline.
question: "Why does the Coral Edge TPU pipeline miss the 16.6ms frame budget even though the TPU runs the model in 8ms?"
details:
  realistic_solution: The system fails because real-time deadlines depend on the total pipeline latency,
    not just the accelerator's compute time. Before the Coral Edge TPU can utilize its 4 TOPS of compute,
    the host CPU must preprocess the frame and transfer the INT8 quantized tensor over the USB connection.
    If the combined time of host preprocessing, USB data transfer to and from the device, and the 8ms
    TPU execution exceeds 16.6ms, the deadline is missed and jank occurs.
  common_mistake: Candidates often assume that as long as the accelerator's pure compute time (8ms) is
    less than the frame budget (16.6ms), the real-time deadline is met. They fail to account for the end-to-end
    pipeline latency, specifically the overhead of the USB interface and host CPU preprocessing.
  napkin_math: Frame budget for 60 FPS = 1000ms / 60 = 16.6ms. Edge TPU execution time = 8.0ms. Remaining
    budget = 16.6ms - 8.0ms = 8.6ms. If the input is a 300x300 RGB image quantized to INT8, the payload
    is 300 * 300 * 3 bytes = 270 KB. On a standard USB 2.0 connection (~35 MB/s practical throughput),
    the transfer time is (270 KB / 35,000 KB/s) * 1000 = ~7.7ms. Total latency = CPU Preprocessing (e.g.,
    5ms) + USB Transfer (7.7ms) + Inference (8ms) = 20.7ms, which is > 16.6ms, causing the missed deadlines.
