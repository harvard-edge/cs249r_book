title: The Power State Machine
scenario: You're designing the power management firmware for a smart doorbell with an Ambarella CV25S SoC (quad Cortex-A53 + CVflow NPU, 2.5W active, 15 mW standby). The doorbell must feature always-on motion detection, wake to full AI in <200ms when a person is detected, run face recognition for 5 seconds, then return to low power. Your colleague implements two states: ON and OFF. After deployment, users complain about 1.5-second wake delays and the battery dying in 3 days instead of the target 60 days.
question: How would you design the power state machine to meet the <200ms wake target and 60-day battery life?
details:
  realistic_solution: The correct design uses a 4-state power machine. S0 (Deep Sleep, 5 mW): CPU and NPU off, PIR sensor active. S1 (Sensor Wake, 50 mW): One core runs a lightweight motion classifier to filter 95% of false triggers. S2 (Full AI, 2.5W): All cores + NPU active for face recognition. S3 (Network, 1.5W): Transmit alert. S1 prevents the expensive S2 wake for false triggers.
  common_mistake: |
    **The Pitfall:** Using a binary ON/OFF power model and just trying to wake up faster.
    **The Rationale:** Candidates fail to realize that booting the entire SoC for every false trigger drains the battery, while deep sleep makes booting too slow.
    **The Consequence:** A choice between an always-on system that kills the battery in hours, or a deep sleep system that fails the 200ms wake latency requirement.
  napkin_math: |
    - **Assumptions:** 100 PIR triggers/day (wind, cars), 5 actual person events. 20 Wh battery.
    - **Two-state (ON/OFF) power:** Wake all 100 triggers to full AI: 100 * 5s * 2.5W = 1,250 Ws = 0.35 Wh + standby = ~0.7 Wh/day. Battery life: 20 Wh / 0.7 = 28 days.
    - **Four-state (S0 to S3):**
      - S0 (Deep Sleep): 5 mW * 23.9 hrs = 0.12 Wh.
      - S1 (Screening): 100 triggers * 2s * 50 mW = 10 Ws = 0.003 Wh.
      - S2 (Full AI): 5 events * 5s * 2.5W = 62.5 Ws = 0.017 Wh.
      - S3 (Network): 5 events * 3s * 1.5W = 22.5 Ws = 0.006 Wh.
    - **Total 4-state power:** 0.146 Wh/day.
    - **Final result:** **Battery life = 20 Wh / 0.146 Wh/day = 137 days**, easily exceeding the 60-day target.
