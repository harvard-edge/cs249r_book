title: Diagnosing Latency Spikes on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing a real-time anomaly detection model deployed on a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, you observe intermittent latency spikes, even though average compute utilization appears to be within limits.
question: Which profiling tools and traces would you use on the Qualcomm Cloud AI 100 to determine whether the latency spikes are compute, memory, or I/O bound?
details:
  realistic_solution: A realistic approach involves using a multi-faceted profiling strategy. Utilize Qualcomm's SNPE SDK profiling tools to get on-device kernel-level timings and memory usage. Supplement this with system-level tools like 'perf' or 'ftrace' on the host CPU to monitor system calls, context switches, and CPU utilization impacting data feeding the AI 100. Analyze the generated flame graphs and trace timelines to correlate latency spikes with specific compute kernels, memory operations on the 32 GB LPDDR4x, or data transfer phases. Specifically, investigate memory bandwidth utilization to confirm if the 75W TDP is being effectively utilized for computation or if it's being limited by memory access patterns.
  common_mistake: A common mistake is to focus exclusively on compute utilization (e.g., FLOPS/TOPS) and overlook data transfer (I/O) or memory access patterns. On accelerators like the Qualcomm Cloud AI 100 with high compute density and potentially complex data pipelines, I/O bound operations (e.g., host-to-device transfers over PCIe, or data movement within the LPDDR4x memory) can frequently be the root cause of latency variability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100: 400 TOPS (INT8), LPDDR4x bandwidth ~64 GB/s.
    - Example model: 10 TOPS, 1GB data movement per inference.

    **Calculations:**
    - Max theoretical compute throughput: 400 / 10 = 40 inf/sec.
    - Data transfer time: 1GB / 64 GB/s = ~15ms.
    - Kernel execution: 5ms (if 10 TOPS fully utilized).

    **Conclusion & Interpretation:**
    - **Result: ~15ms transfer (Memory-Bandwidth Bound)**. If transfer time vastly exceeds kernel execution, the pipeline is I/O or memory bound, requiring data access optimization.
