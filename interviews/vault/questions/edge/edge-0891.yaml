title: Thermal Throttling Runtime Adaptation
scenario: Agricultural drones process crop images at 30 FPS (33.3ms budget). The NPU runs at 800MHz with 20ms inference latency. At 45°C ambient temperatures, the SoC reaches 85°C and thermally throttles the NPU to 300MHz. Inference latency spikes, causing frame buffer overflows, lost frames, and erratic navigation.
question: How would you keep 30 FPS crop-image inference reliable when 45°C ambient thermally throttles the NPU from 800MHz to 300MHz?
details:
  realistic_solution: Implement thermal-aware dynamic model switching. The MLOps runtime must monitor SoC temperature and NPU frequency as primary observability metrics. When the telemetry indicates throttling (e.g., NPU drops to 300MHz), the system intercepts the event and dynamically hot-swaps the primary FP16 model for a pre-loaded, heavily quantized (INT8) or structurally pruned fallback model, trading a small accuracy drop for latency guarantees.
  common_mistake: |
    **The Pitfall:** Adding a larger memory buffer to queue frames during thermal throttling.
    **The Rationale:** Engineers apply generic web-backend buffering techniques to handle transient load spikes.
    **The Consequence:** In a continuous real-time drone control loop, buffering stale frames permanently delays navigation decisions, leading to crashes rather than graceful degradation.
  napkin_math: |
    - **Baseline:** Standard model latency at 800MHz = 20ms.
    - **Throttled State:** 800MHz to 300MHz is a 2.66× slowdown. 20ms * 2.66 = 53.3ms (exceeds 33.3ms budget).
    - **Fallback Model:** INT8 model latency at 800MHz = 10ms.
    - **Final Result:** **Throttled fallback latency is 10ms * 2.66 = 26.6ms. 26.6ms < 33.3ms budget, ensuring zero frames are dropped.**
