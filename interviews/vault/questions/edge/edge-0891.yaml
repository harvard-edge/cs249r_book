title: Thermal Throttling Runtime Adaptation
scenario: Agricultural drones process crop images at 30 FPS. At 45°C ambient, the SoC thermally throttles the NPU. Inference latency spikes, causing frame buffer overflows and erratic navigation.
question: How would you keep 30 FPS inference reliable when 45°C ambient thermally throttles the NPU from 800MHz to 300MHz?
details:
  realistic_solution: Implement thermal-aware dynamic model switching. Hot-swap the primary FP16 model for a pre-loaded, heavily quantized INT8 or structurally pruned fallback model, trading a small accuracy drop for latency guarantees.
  common_mistake: |
    **The Pitfall:** Adding a larger memory buffer to queue frames during thermal throttling.
    **The Rationale:** Engineers apply generic web-backend buffering techniques to handle transient load spikes.
    **The Consequence:** In a continuous real-time drone control loop, buffering stale frames permanently delays navigation decisions, leading to crashes.
  napkin_math: |
    1. **Assumptions & Constraints:** 33.3ms budget. Baseline 800MHz = 20ms latency. Throttled = 300MHz. Fallback INT8 latency at 800MHz = 10ms.
    2. **Calculations:** Slowdown = 800 / 300 = 2.66x. Throttled standard latency = 20ms * 2.66 = 53.3ms. Throttled fallback latency = 10ms * 2.66 = 26.6ms.
    3. **Conclusion & Interpretation:** **Result: 26.6ms fallback latency.** The standard model exceeds the budget, while the INT8 fallback ensures zero frames are dropped. **System Status: Thermally-Bound.**
