title: Calculate Cooling Requirements for Cloud AI 100 Deployment
scenario: You are deploying an on-premise edge inference cluster utilizing Qualcomm Cloud AI 100 accelerators.
  Each accelerator consumes 75W of power while running at its peak 400 TOPS INT8 performance. If you are
  deploying a dense server chassis containing 8 of these accelerators, calculate the total thermal dissipation
  requirement in British Thermal Units per hour (BTU/hr) for the accelerator payload alone to ensure sustained
  performance without thermal throttling.
question: "What BTU/hr cooling load is required for the 8-card Cloud AI 100 accelerator payload at 75W per card?"
details:
  realistic_solution: The correct approach is to first calculate the total power consumption of all the
    accelerators in the chassis in Watts. Then, apply the standard conversion factor that 1 Watt of power
    dissipation roughly equals 3.412 BTU/hr of heat load. This gives the baseline cooling requirement
    that the HVAC or server chassis fans must handle to prevent the cards from throttling under continuous
    maximum load.
  common_mistake: Candidates often forget the conversion factor between Watts and BTU/hr, or they calculate
    the power for a single card instead of the full dense chassis payload. Some might mistakenly try to
    factor in the 32 GB LPDDR4x memory power separately, not realizing it's typically included in the
    card's Total Board Power (TBP) of 75W.
  napkin_math: 'Total Power (Watts) = 8 accelerators * 75W/accelerator = 600 Watts. Conversion: 1 Watt
    ≈ 3.412 BTU/hr. Total Heat Load (BTU/hr) = 600 W * 3.412 BTU/hr/W ≈ 2047 BTU/hr. Therefore, the cooling
    system must handle at least ~2050 BTU/hr just for the accelerator payload.'
