title: The Transformer's Quadratic Curse on Edge
scenario: 'Your autonomous vehicle team is choosing a perception model to run on an edge device like a Jetson AGX Orin. You are comparing a classic CNN (like MobileNet) against a modern Vision Transformer (ViT).'
question: "For a fixed input image size, which operation is the primary compute bottleneck in the ViT, and how does its computational cost scale as you increase the number of input image patches?"
details:
  realistic_solution: 'The primary compute bottleneck in a Vision Transformer is the self-attention mechanism. Its computational complexity scales quadratically with the number of patches, which is proportional to the input image''s area. This is because every patch must attend to every other patch, leading to a complexity of O(N^2), where N is the number of patches.'
  common_mistake: |
    **The Pitfall:** Assuming that if a CNN and a ViT have a similar parameter count, their inference latency will scale similarly with resolution.
    **The Rationale:** Engineers often map the linear scaling properties of convolutions directly onto the transformer architecture.
    **The Consequence:** They underestimate the massive compute cost of self-attention at higher resolutions, leading to severe latency bottlenecks on edge devices.
  napkin_math: |
    * A 128x128 image is broken into N patches.
    * A 256x256 image (4x the area) is broken into 4N patches.
    * A CNN's FLOPs scale linearly with area (4x).
    * A ViT's self-attention FLOPs scale quadratically with patch count: (4N)^2 / N^2 = 16x.
    * **The quadratic scaling (16x compute for 4x resolution) makes high-resolution ViTs very expensive for real-time edge applications.**
  options:
  - The MLP Head, which scales linearly with the embedding dimension.
  - Convolutional stem, which scales linearly with the number of pixels.
  - Self-attention, which scales quadratically (O(N^2)) with the number of patches.
  - Layer normalization, which scales linearly with the number of patches.
