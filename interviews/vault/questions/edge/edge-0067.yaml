title: The Silent Slowdown
scenario: 'Your new edge AI camera, powered by an NVIDIA Jetson Orin Nano, achieves an impressive 50 FPS for YOLOv5s during initial tests. However, after 30 seconds of continuous operation, the framerate drops sharply to a consistent 15 FPS and stays there.'
question: 'What is the most likely cause of this ''silent slowdown,'' and how would you design the system to guarantee sustained performance?'
details:
  realistic_solution: 'The most likely cause is thermal throttling. Edge devices often operate within strict thermal envelopes. ML accelerators consume significant power, generating heat. When the device''s temperature exceeds a predefined threshold, the system (OS, firmware, or hardware itself) reduces the clock frequency (Dynamic Voltage and Frequency Scaling - DVFS) or even disables cores to prevent overheating and permanent damage. This reduces power consumption and heat generation, but also performance.'
  common_mistake: |
    **The Pitfall:** Blaming the slowdown on a software bug or memory leak.
    **The Rationale:** Candidates see a performance degradation over time and default to software profiling rather than hardware physics.
    **The Consequence:** They waste weeks chasing memory leaks when the root cause is fundamentally thermal hardware limits.
  napkin_math: |
    * Peak power consumption = 10W; TDP = 5W.
    * The device can only sustain half its peak performance without throttling.
    * Model consumes 8W for 30 seconds, exceeding the 5W TDP.
    * **Conclusion: The system throttles frequency (DVFS) to 4W to prevent chip damage, causing the framerate drop.**
