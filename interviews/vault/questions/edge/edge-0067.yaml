title: The Silent Slowdown
scenario: Your team has deployed a new edge device with an ML accelerator. Initial benchmarks show it
  can run your object detection model at 30 FPS. However, after about 30-60 seconds of continuous operation,
  the frame rate consistently drops to 15 FPS and stays there. What is the most likely cause of this 'silent
  slowdown,' and how would you design the system to guarantee sustained performance?
details:
  realistic_solution: The most likely cause is thermal throttling. Edge devices often operate within strict
    thermal envelopes. ML accelerators consume significant power, generating heat. When the device's temperature
    exceeds a predefined threshold, the system (OS, firmware, or hardware itself) reduces the clock frequency
    (Dynamic Voltage and Frequency Scaling - DVFS) or even disables cores to prevent overheating and permanent
    damage. This reduces power consumption and heat generation, but also performance.
  common_mistake: '"It''s a software bug or memory leak." While possible, the consistent and predictable
    nature of the slowdown strongly points to a hardware-level mechanism.'
  napkin_math: If an accelerator has a peak power consumption of 10W and a TDP of 5W, it can only sustain
    half its peak performance without throttling. A typical edge SoC might have a die temperature limit
    of 85-105°C. If a model consumes 8W for 30 seconds before throttling to 4W, its average power over
    a minute might be closer to the TDP.
