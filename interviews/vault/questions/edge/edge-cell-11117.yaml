title: 'Kernel Fusion: Realize Fusion Impact for EfficientDet on Jetson Orin'
scenario: Realize the kernel fusion impact for EfficientDet-D0 (3.9M params, 2.5B FLOPs) running at INT8
  on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). The model has 236 nodes in the ONNX graph. After TensorRT
  conversion with fusion, the graph reduces to 42 nodes. Quantify the kernel launch overhead savings and
  expected latency improvement.
details:
  realistic_solution: 'Two sources of improvement: (1) Reduced kernel launch overhead: 236 → 42 launches.
    (2) Memory bandwidth savings from fusing adjacent memory-bound ops. Quantify both.'
  common_mistake: Attributing all latency improvement to reduced kernel launches; not distinguishing between
    kernel launch overhead and memory bandwidth savings from fusion.
  napkin_math: 'Kernel launch overhead on Jetson Orin GPU: ~5µs per CUDA kernel (including CPU→GPU dispatch,
    synchronization). 236 kernels × 5µs = 1.18ms launch overhead. After TRT fusion: 42 × 5µs = 0.21ms.
    Savings: 0.97ms. Memory bandwidth savings: 236 - 42 = 194 ops were fused. Each eliminated intermediate
    tensor: avg EfficientDet activation size at fusion boundary ≈ 56×56×64 × 1B = 200KB. 194 eliminations
    × 200KB = 38.8MB saved. 38.8MB / 68 GB/s = 0.57ms. Total savings: 0.97 + 0.57 = 1.54ms. EfficientDet-D0
    baseline latency: 2.5B INT8 / 275 TOPS = 9.1ms compute + 1.54ms overhead = 10.64ms before fusion.
    After: 9.1ms + 0.21ms = 9.31ms. Speedup: 10.64/9.31 = 1.14× = 14% improvement. At 60W: 1000/10.64
    = 94 FPS before, 1000/9.31 = 107 FPS after. Power efficiency: 107/60 = 1.78 FPS/W.'
