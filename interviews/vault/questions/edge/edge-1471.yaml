title: Architecting On-Device Fairness Evaluation for Edge Vision
scenario: You are deploying a pedestrian anomaly detection model on an NVIDIA Jetson
  Orin at public transit hubs. The system must operate within a 60W TDP limit, leveraging
  the 275 TOPS INT8 Ampere GPU + DLA accelerator for high throughput. You need to
  architect a continuous, on-device fairness evaluation pipeline to monitor demographic
  parity and equalized odds across intersectional subgroups without violating privacy
  (no video leaves the device) or exceeding the 32 GB LPDDR5 memory shared with the
  primary pipeline.
question: How would you run continuous on-device fairness evaluation on Jetson Orin
  without sending video off-device or exceeding 32 GB and 60W?
details:
  realistic_solution: Design a deferred, sampling-based evaluation queue. The primary
    pipeline runs continuously, while a background process samples anomalous and non-anomalous
    crops at a low frequency. These crops are processed by lightweight, quantized
    INT8 attribute classifiers on the DLA. Aggregated fairness metrics (e.g., false
    positive rates per subgroup) are accumulated locally and only the aggregated,
    anonymized telemetry is sent to the cloud for monitoring.
  common_mistake: Candidates often propose streaming raw video to the cloud for fairness
    evaluation, violating strict privacy constraints. Another mistake is running heavy
    attribute classifiers on every frame, which starves the primary pipeline of TOPS
    and exceeds the TDP limit.
  napkin_math: The primary INT8 pipeline consumes 12GB of the 32 GB LPDDR5, leaving
    20GB. Three auxiliary INT8 attribute classifiers require ~1GB each (3GB total).
    Memory remaining for the evaluation queue is 17GB. A 256x256 RGB crop is ~200KB.
    17GB can buffer ~85,000 crops. If sampling 1 crop per second, running the attribute
    classifiers requires < 1 TOPS, safely within the 275 TOPS INT8 budget and easily
    sustaining the 60W TDP envelope.
