title: Architecting On-Device Fairness Evaluation for Edge Vision
scenario: You are deploying a pedestrian anomaly detection model on an NVIDIA Jetson Orin at public transit hubs. You need to architect a continuous, on-device fairness evaluation pipeline to monitor demographic parity and equalized odds across intersectional subgroups without violating privacy (no video leaves the device) or exceeding the memory and power shared with the primary pipeline.
question: How would you run continuous on-device fairness evaluation without sending video off-device or exceeding 32 GB and 60W constraints?
details:
  realistic_solution: Design a deferred, sampling-based evaluation queue. The primary pipeline runs continuously, while a background process samples anomalous and non-anomalous crops at a low frequency. These crops are processed by lightweight, quantized INT8 attribute classifiers on the DLA. Aggregated fairness metrics (e.g., false positive rates per subgroup) are accumulated locally and only the aggregated, anonymized telemetry is sent to the cloud for monitoring.
  common_mistake: |
    **The Pitfall:** Running heavy attribute classifiers on every single frame.
    **The Rationale:** Candidates aim for mathematically perfect evaluation coverage, ignoring the physical hardware limitations of the shared edge accelerator.
    **The Consequence:** Starving the primary anomaly detection pipeline of TOPS and rapidly exceeding the 60W TDP limit, causing thermal throttling and system failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Total LPDDR5: 32 GB.
       * Primary pipeline memory: 12 GB.
       * Three INT8 attribute classifiers: ~1 GB each (3 GB total).
       * 256x256 RGB crop size: ~200 KB.
    2. **Calculations:**
       * Remaining memory for queue: 32 GB - 12 GB - 3 GB = 17 GB.
       * Max buffered crops: 17 GB / 200 KB = ~85,000 crops.
       * Compute required at 1 sample/sec: < 1 TOPS.
    3. **Conclusion & Interpretation:**
       **Result: Hardware-Bound Constraints Met**. A sampling-based queue fits safely within the 17 GB memory headroom and uses negligible TOPS, easily maintaining the 60W envelope while preserving privacy.
