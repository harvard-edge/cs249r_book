title: CUDA Stream Scheduling
scenario: An A100 80GB SXM edge node runs batched inference. Data loading over PCIe 4.0 takes 10ms per batch. Compute takes 15ms per batch.
question: Specify the scheduling timeline using CUDA streams to achieve maximum throughput, and calculate the time to process 10 batches.
details:
  realistic_solution: 'Overlap PCIe data loading and GPU compute via asynchronous CUDA streams. Stream A handles PCIe DMA, Stream B executes the kernel. The compute hides the transfer latency on all but the very first batch.'
  common_mistake: |
    **The Pitfall:** Adding load and compute times linearly (10ms + 15ms = 25ms per batch).
    **The Rationale:** Candidates ignore the ability to overlap communication and computation using multiple asynchronous CUDA streams.
    **The Consequence:** Artificially inflating latency estimates and failing to fully utilize the accelerator's pipeline capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batches: 10
    - Transfer: 10ms per batch
    - Compute: 15ms per batch

    **Calculations:**
    - Formula: T_total = T_load_1 + (N * max(T_load, T_compute))
    - T_total = 10ms + (10 * 15ms) = 160ms

    **Conclusion & Interpretation:**
    - **Result: 160ms Total.** Computation fully overlaps and hides subsequent DMA loads.
