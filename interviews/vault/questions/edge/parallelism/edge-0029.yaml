title: The Python GIL Multithreading Trap
scenario: 'You run an object detection model on a Raspberry Pi. The camera capture takes 30ms. The ML model takes 40ms. In a sequential Python script, total time is 70ms (~14 FPS). To speed this up, you put the camera capture and the ML model into two separate Python `threading.Thread` objects. You expect them to run in parallel on the Pi''s 4-core CPU, achieving 40ms total time (25 FPS). But the framerate remains exactly 14 FPS.'
question: 'Why did Python multithreading fail to improve the framerate on the 4-core Raspberry Pi?'
details:
  realistic_solution: 'Python''s Global Interpreter Lock (GIL) prevents true parallel execution. The GIL ensures only one thread executes Python bytecode at a time, even on a 4-core CPU. Your camera thread and ML thread take turns holding the GIL, executing sequentially: 30ms + 40ms = 70ms, identical to no threading at all. The fix: use `multiprocessing` instead of `threading` — each process gets its own Python interpreter and GIL, enabling true parallelism.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware instead of the software interpreter.
    **The Rationale:** Candidates incorrectly assume the Raspberry Pi CPU is just too weak to handle thread context switching.
    **The Consequence:** The real software limitation (the GIL) goes unfixed, and the pipeline remains serialized.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4-core CPU.
    - Camera takes 30ms, ML takes 40ms.
    - Target is 25 FPS (40ms).

    **Calculations:**
    - Sequential = 30 + 40 = 70ms (14.2 FPS).
    - Threading (GIL) = 30 + 40 + context overhead = 71ms.
    - Multiprocessing = max(30, 40) = 40ms.

    **Conclusion & Interpretation:**
    - **Result: 40ms (Concurrency-Bound)**. True parallelism requires multiprocessing to hit 25 FPS (1000/40).
