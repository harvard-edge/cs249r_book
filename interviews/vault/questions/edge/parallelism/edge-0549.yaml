title: The Edge Training Scaling Collapse
scenario: 'You are the lead ML Systems Engineer for an autonomous vehicle company. Your team is fine-tuning a large, 2-billion-parameter sensor fusion model directly inside the vehicle''s trunk compute unit. This unit contains four Jetson AGX Orin modules connected via a PCIe Gen 4 switch.'
question: 'Why does data-parallel fine-tuning of the 2B-parameter model fail to scale across four Orins connected by PCIe Gen4?'
details:
  realistic_solution: 'The root cause is the communication bottleneck created by the `AllReduce` step in data parallelism operating over a relatively slow PCIe interconnect. While the compute is parallelized, the gradients from all models must be synchronized at every step. This collective communication saturates the bus.'
  common_mistake: |
    **The Pitfall:** Applying datacenter intuition to edge interconnects.
    **The Rationale:** Engineers assume the interconnect is 'fast enough' and that data parallelism always scales. They might suggest increasing the global batch size (worsening the bottleneck) or blame the CPU.
    **The Consequence:** The team wastes time debugging compute bottlenecks while the `AllReduce` step over PCIe completely starves the GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 2B params = 4GB (FP16).
    - Interconnect: PCIe Gen4 x8 switch = 16 GB/s per link.

    **Calculations:**
    - AllReduce data transfer: 2 * 4GB = 8GB per node per step.
    - Transfer time: 8GB / 16 GB/s = 500ms.
    - Compute pass (estimated): 200ms on a 275 TOPS Orin.

    **Conclusion & Interpretation:**
    - **Result: Communication dominates compute (500ms > 200ms). Nodes spend >71% of their time idle, waiting on the PCIe bus (I/O-Bandwidth-Bound)**.
