title: Edge Tensor Parallelism Approval Spec
scenario: Tensor parallelism is proposed across two edge accelerators in a drone's 33ms real-time perception loop.
question: What must be measured before approving tensor parallelism across two edge accelerators in a real-time perception loop?
details:
  realistic_solution: Measure per-layer collective payloads, link bandwidth and latency, synchronization count, and jitter. Tensor parallelism is acceptable only if communication jitter stays within the control-loop budget.
  common_mistake: |
    **The Pitfall:** Using datacenter tensor-parallel defaults without checking edge interconnect jitter.
    **The Rationale:** Engineers assume standard datacenter parallelization techniques seamlessly map to constrained edge interconnects.
    **The Consequence:** Overlooking high latency variance that breaches hard real-time drone deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Perception loop budget = 33 ms.
    - Collective average = 0.5 ms.

    **Calculations:**
    - Total network overhead = Layers * Collective_Avg.
    - P99 jitter can multiply this by 5-10x.

    **Conclusion & Interpretation:**
    - **Result: P99 jitter breaches 33ms (Interconnect-Latency-Bound)**. Unpredictable edge interconnect variance breaks deterministic deadlines.
