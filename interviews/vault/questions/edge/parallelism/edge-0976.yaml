title: 'Asymmetric Split-Computing Pipeline'
scenario: 'A biosignal model is split between a Cortex-M4 wearable and a Snapdragon 8 Gen 3 smartphone. The M4 takes 20ms to process its feature-extraction stage and 10ms to transmit the intermediate INT8 tensor via Bluetooth. The Snapdragon Hexagon NPU then takes 2ms to run the final classification.'
question: 'What is the end-to-end latency of a single inference and the maximum sustained pipeline throughput in inferences per second?'
visual:
  kind: svg
  path: edge-0976.svg
  alt: 'A Gantt chart illustrating the staggered execution of M4 compute, Bluetooth transfer, and NPU compute across multiple pipeline cycles.'
  caption: 'Split-Computing Pipelined Execution'
details:
  realistic_solution: 'The latency for a single request is the sum of the sequential stages: 20ms (M4) + 10ms (BT) + 2ms (NPU) = 32ms. In a pipelined execution model assuming asynchronous DMA transfers, the system throughput is dictated by the slowest stage. Since the M4 compute takes 20ms, it can only accept a new input every 20ms. Therefore, the bottleneck is 20ms, yielding a maximum throughput of 50 inferences per second.'
  common_mistake: |
    **The Pitfall:** Using the total pipeline latency (32ms) to calculate throughput.
    **The Rationale:** Candidates fail to understand that in a pipelined execution model, maximum throughput is governed exclusively by the slowest sequential stage, not the total end-to-end latency.
    **The Consequence:** The system throughput is miscalculated as ~31 FPS instead of the true 50 FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline execution model across M4, Bluetooth, and NPU.
    - Sequential stage times: M4 (20ms), BT (10ms), NPU (2ms).

    **Calculations:**
    - Latency (Single Request) = 20ms (M4) + 10ms (BT) + 2ms (NPU) = 32ms.
    - Throughput Bottleneck = max(20ms, 10ms, 2ms) = 20ms.
    - Max Throughput = 1000ms / 20ms = 50 inferences/sec.

    **Conclusion & Interpretation:**
    - **Result: 50 FPS (Compute-Bound)**. Latency is 32ms, and max throughput is governed by the slowest pipeline stage, yielding 50 inferences per second.
