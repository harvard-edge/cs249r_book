title: Edge Pipeline Stage Balance
scenario: A two-stage edge pipeline has stage A taking 18 ms and stage B taking 11 ms. A frame arrives every 33 ms.
question: Can a two-stage edge pipeline with 18 ms and 11 ms stages keep up with 33 ms frames, and what is the steady-state throughput?
details:
  realistic_solution: 'The steady-state pipeline initiation interval is dictated by the slower stage, 18 ms, which easily keeps up with the 33 ms frame arrival period. Even a completely serial execution would be 18 + 11 = 29 ms, also under 33 ms. Stage A is the persistent bottleneck determining max throughput.'
  common_mistake: |
    **The Pitfall:** Adding stage times to calculate steady-state interval.
    **The Rationale:** Candidates confuse total single-item latency (29 ms) with the pipelined initiation interval (18 ms).
    **The Consequence:** They incorrectly estimate the max throughput of the pipeline to be bounded by 29ms rather than 18ms.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stage A time: 18 ms.
    - Stage B time: 11 ms.
    - Frame arrival period: 33 ms.

    **Calculations:**
    - Steady-State Interval: max(18, 11) = 18 ms.
    - Slack to Deadline: 33 ms - 18 ms = 15 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Stage A).** The pipeline keeps up easily, with throughput bounded exclusively by the slower 18 ms stage A.
