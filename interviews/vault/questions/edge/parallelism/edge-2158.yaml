title: Edge Model Split Requirements
scenario: A robot perception model exceeds one accelerator SRAM, so the team proposes splitting layers across two edge accelerators.
question: What measurements are required before choosing a layer split point across two edge accelerators?
details:
  realistic_solution: Measure activation size at candidate boundaries, per-stage compute time, link bandwidth/latency, SRAM footprint per stage, synchronization overhead, and deadline headroom. The best split minimizes cross-link activation traffic while balancing compute and memory.
  common_mistake: |
    **The Pitfall:** Splitting the model at the middle layer count (e.g., layer 25 out of 50).
    **The Rationale:** Candidates naively balance the depth of the model without profiling the actual computational intensity or the activation sizes at each boundary.
    **The Consequence:** Creating a severe inter-accelerator communication bottleneck and leaving one accelerator heavily underutilized while the other is compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Two potential splits: Split A (20ms/10ms compute, small activation), Split B (15ms/15ms compute, large activation).
    - Objective: Minimize pipeline latency.

    **Calculations:**
    - Split A Latency: max(20ms, 10ms) + small transfer = 20ms + transfer.
    - Split B Latency: max(15ms, 15ms) + large transfer = 15ms + transfer.

    **Conclusion & Interpretation:**
    - **Result: Communication vs Compute Bound (Bandwidth-Bound)**. A 15ms/15ms split with a massive activation transfer might exceed 20ms total pipeline latency, making the unbalanced 20ms/10ms split faster.
