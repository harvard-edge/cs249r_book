title: Edge Tensor Split Communication Budget
scenario: Two edge accelerators split a matrix layer tensor-parallel. Each frame requires two 8 MB activation reductions over a 40 GB/s board link.
question: How much communication time do two 8 MB tensor-parallel reductions add over a 40 GB/s edge board link, and how does it compare to a 33 ms deadline?
details:
  realistic_solution: 'The payload is 16 MB per frame. At 40 GB/s, the transfer lower bound is 16 MB / 40,000 MB/s = 0.4 ms. While small relative to a 33 ms deadline, NCCL/RCCL AllReduce synchronization overheads and repeated layers still matter.'
  common_mistake: Rejecting tensor parallelism solely because it communicates, without sizing the activation payload.
  napkin_math: |
    **Assumptions & Constraints:**
    - Two edge accelerators
    - 40 GB/s board link bandwidth
    - 8 MB per reduction, 2 reductions per frame

    **Calculations:**
    - Total payload = 2 reductions * 8 MB = 16 MB
    - Transfer time = 16 MB / 40,000 MB/s = 0.0004 s = 0.4 ms

    **Conclusion & Interpretation:**
    - **Result: 0.4 ms (Bandwidth-Bound)**. The communication overhead is minimal compared to the 33 ms deadline, but synchronization overheads must be managed.
