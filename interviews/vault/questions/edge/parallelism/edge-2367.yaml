title: Hailo-8 Dual Model Pipeline
scenario: >-
  A single AI accelerator multi-contexts two sequential models (face detection and face recognition) on the same compute fabric. A standard two-stage overlapping pipeline across independent stages yields 66.6 FPS. However, this hardware requires the firmware to reload layer weights from SRAM bank A to bank B at every transition.
question: Using the overlapping pipeline as a baseline, what are the actual latency and steady-state throughput of the single-fabric multi-context execution?
visual:
  kind: svg
  path: edge-2367.svg
  alt: Bubble Gantt chart showing stage 1 (10ms) overlapping with stage 2 (15ms).
  caption: Pipelined model execution on Edge TPU.
details:
  realistic_solution: 'On a single Hailo-8 with multi-context, the two models cannot truly pipeline—they share the same fabric and run sequentially. Per-frame time includes both execution times plus two context switches. The throughput is drastically lower than the textbook assumption of independent hardware stages.'
  common_mistake: |
    **The Pitfall:** Treating multi-context execution as true spatial pipelining.
    **The Rationale:** Candidates see two models executing in sequence and mistakenly apply standard independent-hardware pipelining math (throughput = 1 / longest_stage).
    **The Consequence:** They wildly overestimate FPS because they ignore the context-switch overhead and hardware contention that forces serial execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Detect phase: 10 ms; Recognize phase: 15 ms.
    - Transition overhead (SRAM bank swap): 1.2 ms per context switch.
    - Single-fabric: Cannot spatially pipeline, must run sequentially.

    **Calculations:**
    - Per-frame latency: 10 ms + 1.2 ms + 15 ms = 26.2 ms.
    - Loop time for full steady-state frame (including returning to Detect): 10 ms + 1.2 ms + 15 ms + 1.2 ms = 27.4 ms.
    - Throughput: 1000 ms / 27.4 ms = 36.5 FPS.

    **Conclusion & Interpretation:**
    - **Result: 36.5 FPS (Compute-Bound).** Throughput collapses from the theoretical 66.6 FPS to 36.5 FPS because the single-fabric constraint forces serialized execution and context-switching overhead.
