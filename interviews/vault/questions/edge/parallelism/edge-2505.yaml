title: 'Dual-Core RP2040 FIFO Stall'
scenario: 'A keyword spotter is pipelined on an RP2040. Core 0 extracts features (12ms) and Core 1 runs a CNN (15ms), synchronizing via a hardware FIFO.'
question: 'Evaluate the cumulative stall time for Core 0 when processing 4 continuous audio windows.'
details:
  realistic_solution: 'The pipeline is imbalanced. Core 0 finishes 3ms early every cycle but blocks if Core 1 is still reading the previous frame. Over 4 frames, Core 0 executes normally for the first frame, but for the subsequent 3 frames, it accumulates a 3ms stall per frame waiting for Core 1. Total stall time is 9ms.'
  common_mistake: 'Assuming a hardware FIFO prevents all stalls; FIFOs only absorb transient jitter, not a systemic mathematical imbalance between pipeline stages.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Core 0: 12ms (feature extraction). Core 1: 15ms (CNN).
    - Frames processed: 4. Synchronization via FIFO.

    **Calculations:**
    - Stall per frame: 15ms - 12ms = 3ms.
    - Frames stalled: 4 total - 1 initial = 3 frames.
    - Total stall time: 3ms * 3 frames = 9ms.

    **Conclusion & Interpretation:**
    - **Result: 9ms Stall Time (Compute-Bound)**. The structural imbalance between pipelined cores cannot be fixed by purely buffering.
