title: Edge 4-Stage Synchronous Pipeline
scenario: A 4-stage vision pipeline maps cleanly to hardware blocks on an edge device Sensor -> ISP -> NPU -> Display. Each isolated stage takes exactly 16ms to process its chunk of data.
question: Identify the theoretical latency of a single frame and the steady-state pipeline throughput in FPS.
visual:
  kind: svg
  path: edge-2282.svg
  alt: A four-stage diagonal Gantt chart showing consecutive 16ms blocks overlapping in a standard pipeline execution pattern.
  caption: Synchronous Edge Pipeline
details:
  realistic_solution: Compute single-frame latency traversing all logic blocks natively, then calculate steady-state parallel throughput matching the critical path bottleneck.
  common_mistake: |
    **The Pitfall:** Conflating pipeline latency with inverse throughput.
    **The Rationale:** Candidates often state the throughput is 1000 / 64ms = 15.6 FPS, fundamentally ignoring that pipeline stages operate concurrently on consecutive frames.
    **The Consequence:** Drastically underestimating the system's framerate capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline Depth: 4 sequential stages.
    - Stage Latency: 16 ms for each independent hardware block.
    - Execution Model: Synchronous, fully pipelined (overlapped).

    **Calculations:**
    - End-to-End Latency (Time for one frame to exit pipeline) = 4 stages * 16 ms/stage = 64 ms.
    - Throughput Bottleneck (Slowest stage time) = max(16ms, 16ms, 16ms, 16ms) = 16 ms.
    - Steady State Framerate = 1000 ms / 16 ms = 62.5 FPS.

    **Conclusion & Interpretation:**
    - **Result: 64ms Latency, 62.5 FPS Throughput (Pipeline-Bound)**. The system throughput matches the slowest 16ms stage.
