title: The Autonomous Drone's Latency Crisis
scenario: You are the lead ML Systems Engineer for a new autonomous delivery drone. The perception system uses two co-packaged accelerator chips on a single board, connected by a high-speed 50 GB/s custom interconnect. The new perception model is a 400MB Vision Transformer that exceeds the 256MB on-chip SRAM of a single accelerator. The drone has a hard real-time deadline of 33ms per frame to detect and avoid obstacles.
question: Should you use tensor or pipeline parallelism for the 400MB ViT across the two 256MB accelerators, and why?
details:
  realistic_solution: Pipeline parallelism is the superior strategy in this edge context. The 400MB model cannot fit in one 256MB SRAM, so it must be split, but the split should minimize synchronization. Tensor parallelism shards each layer and requires frequent cross-chip reductions of intermediate tensors; pipeline parallelism assigns contiguous layer blocks to each accelerator and communicates only the boundary activations, making it more likely to fit the 33ms latency budget.
  common_mistake: |
    **The Pitfall:** Assuming tensor parallelism is the default solution for all large models.
    **The Rationale:** Engineers accustomed to datacenter environments (NVLink at 900 GB/s) apply the same distributed training intuition to edge devices with 50 GB/s interconnects.
    **The Consequence:** The frequent All-Reduce operations required by tensor parallelism incur massive latency penalties, failing the 33ms real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 400 MB Vision Transformer.
       - Hardware: 2 co-packaged chips, 256 MB SRAM each.
       - Interconnect: 50 GB/s.
       - Real-time deadline: 33 ms per frame.
    2. **Calculations:**
       - Minimum model split: 400 MB / 2 = 200 MB per chip, which fits within each 256 MB SRAM budget before activations and runtime buffers.
       - Pipeline communication example: one 20 MB boundary activation per frame = 20 MB / 50 GB/s = 0.4 ms.
       - Tensor-parallel communication example: if 12 layers each require one 20 MB all-reduce-style exchange, communication is 12 * 0.4 ms = 4.8 ms before synchronization overhead.
       - Communication budget comparison: 0.4 ms is ~1.2% of a 33 ms frame; 4.8 ms is ~14.5% of the frame and repeats at layer boundaries.
    3. **Conclusion & Interpretation:**
       - **Result: Pipeline Parallelism Preferred.** Both strategies can split the 400 MB model across two chips, but pipeline parallelism minimizes inter-chip synchronization. Tensor parallelism is riskier under a 33 ms deadline because frequent all-reduce traffic burns a much larger fraction of the latency budget.
