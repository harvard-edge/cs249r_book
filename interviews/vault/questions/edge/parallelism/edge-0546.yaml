title: The Autonomous Drone's Latency Crisis
scenario: You are the lead ML Systems Engineer for a new autonomous delivery drone. The perception system uses two co-packaged accelerator chips on a single board, connected by a high-speed 50 GB/s custom interconnect. The new perception model is a 400MB Vision Transformer that exceeds the 256MB on-chip SRAM of a single accelerator. The drone has a hard real-time deadline of 33ms per frame to detect and avoid obstacles.
question: Should you use tensor or pipeline parallelism for the 400MB ViT across the two 256MB accelerators, and why?
details:
  realistic_solution: Pipeline parallelism is the superior strategy in this edge context. The core issue is the communication overhead relative to the latency budget.
  common_mistake: |
    **The Pitfall:** Assuming tensor parallelism is the default solution for all large models.
    **The Rationale:** Engineers accustomed to datacenter environments (NVLink at 900 GB/s) apply the same distributed training intuition to edge devices with 50 GB/s interconnects.
    **The Consequence:** The frequent All-Reduce operations required by tensor parallelism incur massive latency penalties, failing the 33ms real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 400 MB Vision Transformer.
       - Hardware: 2 co-packaged chips, 256 MB SRAM each.
       - Interconnect: 50 GB/s.
       - Real-time deadline: 33 ms per frame.
    2. **Calculations:**
       - Pipeline split transfer (e.g., 20 MB activation tensor) = 20 MB / 50 GB/s = 0.4 ms.
       - Inference compute per chip = 12.5 ms (half of a nominal 25 ms total compute).
       - Interconnect overhead = 0.4 ms / 12.5 ms = 3.2%.
    3. **Conclusion & Interpretation:**
       - **Result: 0.4 ms transfer time.** Pipeline parallelism adds minimal overhead, perfectly addressing the **Interconnect-Bound** constraints of the edge architecture.
