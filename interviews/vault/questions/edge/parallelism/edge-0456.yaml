title: 'The Autonomous Perception Latency Puzzle'
scenario: 'You''re an ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new LiDAR perception model. The model consists of 8 identical transformer blocks. On a single edge accelerator, it has an end-to-end latency of 40ms, which misses your hard real-time deadline of 33ms (for 30 FPS).'
question: 'Which parallelism strategy should you use across the two accelerators to get under 33ms, tensor or pipeline parallelism?'
details:
  realistic_solution: 'Tensor parallelism is correct because it reduces single-inference latency, while pipeline parallelism does not. With 2 accelerators and tensor parallelism: split each of the 8 blocks across both devices, halving per-block compute time from 5ms to 2.5ms. Total latency = 8 × (2.5ms compute/block + 0.5ms sync) = 24ms — under the 33ms deadline. Pipeline parallelism: 4 blocks per device, first token latency = 4 × 5ms (stage 1) + 4 × 5ms (stage 2) = 40ms minimum — the same as the original 40ms due to the pipeline bubble. For single-inference latency, tensor parallelism wins.'
  common_mistake: |
    **The Pitfall:** Assuming pipeline parallelism reduces single-inference latency.
    **The Rationale:** Engineers forget to account for the 'pipeline bubble' — the time the last stage is idle waiting for the first frame to propagate through the initial stages.
    **The Consequence:** Single-frame latency remains identical or worsens, leading to missed real-time deadlines in latency-critical tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single device latency: 8 blocks * 5ms = 40ms.
    - 33ms deadline.

    **Calculations:**
    - Pipeline parallelism: 20ms per stage, but end-to-end latency remains 40ms minimum.
    - Tensor parallelism: Splits compute to 2.5ms per block.
    - New latency: 8 blocks * (2.5ms compute + 0.5ms sync) = 24ms.

    **Conclusion & Interpretation:**
    - **Result: 24ms (Compute-Scheduling Bound)**. Tensor parallelism successfully brings latency under the 33ms target.
  options:
  - 'Pipeline parallelism is better, with a latency of 20.5ms.'
  - 'Tensor parallelism is better, with an effective latency of 24ms.'
  - 'Pipeline parallelism is the only option, but it fails with a latency of 40.5ms.'
  - 'Neither strategy works; tensor parallelism is too slow at 34ms because of communication overhead.'
