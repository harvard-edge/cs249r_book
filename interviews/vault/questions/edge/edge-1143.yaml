title: 'Edge Systolic Array Realization: Batch Size Effect on Edge Throughput'
scenario: You need to compute throughput and energy for EfficientDet-Lite2 (2.9 GOPS INT8, 5.1M params) at batch sizes 1, 4, 16 on Jetson Orin DLA (11 TOPS INT8, 200GB/s, 5W) to show the crossover from memory-bound to compute-bound as batch increases.
question: For EfficientDet-Lite2 on Orin DLA at batch sizes 1, 4, and 16, what FPS, latency, energy, and bound regime do you get?
details:
  realistic_solution: 'DLA ridge: 11T/200G = 55 FLOPs/byte. Weight: 5.1MB. Activation per image: ~8MB (estimate). Batch=1: FLOPs=2.9G. BW=5.1+8=13.1MB. AI=2.9G/13.1MB=221 FLOPs/byte > 55 ridge → compute bound. Time=2.9G/11T=0.264ms. FPS=3788. Batch=4: FLOPs=11.6G. BW=5.1+4*8=37.1MB. AI=11.6G/37.1MB=313. Compute bound. Time=11.6G/11T=1.055ms. FPS=4*1000/1.055=3791 similar (compute bound plateau). Batch=16: FLOPs=46.4G. BW=5.1+128=133.1MB. AI=46.4G/133.1MB=348. Still compute bound. Time=4.22ms. FPS=3791. Throughput nearly flat: already compute-bound at batch=1.'
  common_mistake: |
    **The Pitfall:** Assuming throughput scales linearly with batch size without bound.
    **The Rationale:** Ignoring the hardware's specific ridge point where the system transitions from memory-bound to compute-bound.
    **The Consequence:** Overestimating large-batch throughput and failing to understand edge hardware limits.
  napkin_math: |
    - DLA Ridge Point = 11 TOPS / 200 GB/s = 55 FLOPs/byte.
    - Batch 1: AI = 2.9G / 13.1MB = 221. (221 > 55, so it is compute-bound). FPS = 1000 / 0.264ms = 3788.
    - Batch 4: AI = 11.6G / 37.1MB = 313. (Compute-bound). FPS = 4000 / 1.055ms = 3791.
    - Batch 16: AI = 46.4G / 133.1MB = 348. (Compute-bound). FPS = 16000 / 4.22ms = 3791.
    - **Result: All batches are compute-bound because model activation BW < weight BW and DLA ridge is low.**
    - Energy (Batch 1) = 5W * 0.264ms = 1.32 mJ/inference.
