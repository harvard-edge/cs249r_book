title: Top-K Gradient Sparsity for Constrained Edge Uploads
scenario: 'You are deploying a 10 million parameter (FP32) next-word prediction model for Federated Learning
  on mobile devices. The upload window for each client per round is strict: 10 seconds over a connection
  that guarantees 960 kbps (120 KB/s) of available background bandwidth. To meet this upload deadline,
  you decide to implement sparse gradient updates (transmitting only the largest gradients). Assuming
  each transmitted non-zero parameter requires 4 bytes for the gradient value and an additional 2 bytes
  for the positional offset index (run-length encoding), calculate the minimum target sparsity (the percentage
  of gradients that must be zeroed out) required.'
details:
  realistic_solution: Achieve a minimum of 98% sparsity, transmitting only the top 2% of gradients by
    magnitude, which perfectly fits the 1.2 MB upload budget when including the 2-byte index overhead.
  common_mistake: Calculating only the size of the FP32 floats and failing to account for the structural
    overhead (the 2-byte positional indices) required to reconstruct the sparse tensor on the server.
  napkin_math: 'Available bandwidth = 120 KB/s * 10s = 1,200 KB (1,200,000 bytes) per round.

    Cost per transmitted parameter = 4 bytes (FP32) + 2 bytes (index) = 6 bytes.

    Max non-zero parameters = 1,200,000 bytes / 6 bytes = 200,000 parameters.

    Transmission ratio = 200,000 / 10,000,000 total parameters = 2%.

    Required sparsity = 100% - 2% = 98%.'
