title: Top-K Gradient Sparsity for Constrained Edge Uploads
scenario: 'You are deploying a 10 million parameter (FP32) next-word prediction model for Federated Learning on mobile devices. The upload window for each client per round is strict: 10 seconds over a connection that guarantees 960 kbps (120 KB/s) of available background bandwidth. You decide to implement Top-K Sparsification for the gradient updates.'
question: What minimum gradient sparsity is required for the 10M-parameter FP32 update to fit the 10-second, 960 kbps upload window?
details:
  realistic_solution: Achieve a minimum of 98% sparsity, transmitting only the top 2% of gradients by magnitude, which perfectly fits the 1.2 MB upload budget when including the 2-byte index overhead.
  common_mistake: |
    **The Pitfall:** Forgetting the structural overhead of sparse tensors.
    **The Rationale:** Candidates calculate the size of the FP32 floats but fail to account for the positional indices required to reconstruct the sparse tensor on the server.
    **The Consequence:** The sparse payload exceeds the strict 1.2 MB upload budget, causing transmission failures and dropping clients from the federated round.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10M parameter FP32 model.
       - Bandwidth: 120 KB/s for 10 seconds = 1.2 MB total budget.
       - Sparse representation: 4 bytes (value) + 2 bytes (index) = 6 bytes per parameter.
    2. **Calculations:**
       - Max transmittable parameters: 1,200,000 bytes / 6 bytes = 200,000 parameters.
       - Transmission ratio: 200,000 / 10,000,000 = 2%.
       - Required sparsity: 100% - 2% = 98%.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The system must enforce **98% sparsity** to meet the hard bandwidth limit.
