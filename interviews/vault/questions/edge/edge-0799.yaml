title: The Supply Chain Attack
scenario: 'Your edge device runs a detection model. Your security team asks: ''How do we know the model
  running on the device hasn''t been backdoored with a trojan trigger pattern?'' How could an attacker
  inject a backdoored model through the supply chain, and how do model-specific integrity checks (like
  inference on a golden test input) differ from generic binary attestation?'
details:
  realistic_solution: The security team is worried about an **ML supply chain attack**. An attacker could
    compromise the CI/CD pipeline, the model registry, or the quantization script to replace the legitimate
    model with a backdoored version. A trojaned model behaves perfectly on normal data but misclassifies
    when a specific trigger (e.g., a yellow square in the corner) is present.
  common_mistake: '"We check the model file hash at deployment time." This verifies the file was delivered
    correctly, but doesn''t verify what actually runs, nor does it catch a backdoor injected *before*
    the hash was generated.'
  napkin_math: 'Generic attestation: SHA-256 hash of a 50 MB model takes ~15ms on an ARM CPU. It proves
    the file hasn''t changed since signing, but proves nothing about the math. Functional attestation:
    1 forward pass of YOLOv8 on the NPU takes ~30ms. You compare the 8400×6 output tensor (200 KB) against
    the reference tensor using a simple MSE threshold. It adds 30ms to the boot time but mathematically
    proves the neural network is executing the exact function it was trained to execute, defeating both
    file tampering and runtime hooking.'
