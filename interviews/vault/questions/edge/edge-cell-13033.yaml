title: 'Edge Queueing Theory Design: Burst Traffic Handling with Jetson Buffer'
scenario: 'Design a burst buffer for a Jetson Orin (32GB LPDDR5, 275 TOPS INT8) security camera system
  that handles periodic bursts: normal traffic 10 events/s, burst traffic 80 events/s for 5-second windows
  every 5 minutes. Inference time: 20ms each. Size the buffer, specify overflow policy, and calculate
  maximum queue latency during burst.'
details:
  realistic_solution: 'Jetson Orin capacity: μ=1/0.02=50 events/s. During burst: λ=80 > μ=50, so ρ=1.6
    > 1 → queue grows. Queue growth rate during burst: (λ-μ)=30 events/s for 5 seconds = 150 events queued.
    Buffer needed: 150 events. After burst: λ=10, drain rate = μ-λ = 40 events/s. Drain time: 150/40 =
    3.75 seconds. Max queue latency at end of burst: 150 events / μ = 150/50 = 3 seconds additional. Peak
    latency: 3s + 20ms service = 3.02s. Overflow policy: drop events > 150 queued (about 0.1% of 5-minute
    traffic).'
  common_mistake: Sizing the buffer for steady-state without accounting for burst duration, and not calculating
    queue drain time after burst ends.
  napkin_math: 'Burst excess: (80-50) * 5s = 150 events queued. Buffer size: 150 events * (frame_size
    ~1MB) = 150MB — trivial on 32GB LPDDR5. Max queue wait at burst peak: 150/50 = 3s. Drain time post-burst:
    150/(50-10) = 3.75s. Total elevated-latency window: 5s burst + 3.75s drain = 8.75s. Over 5-minute
    interval: 8.75/300 = 2.9% of time with high latency. Normal operation (10 req/s, ρ=0.2): W=20ms/(1-0.2)=25ms.
    Power during burst: 60W sustained vs 30W idle.'
