title: Federated Averaging Bottleneck on Jetson Orin
scenario: You are deploying a cross-silo federated averaging system across 10 NVIDIA Jetson Orin nodes
  (32 GB LPDDR5, 60W TDP, Ampere GPU + DLA) to train a 50M parameter traffic model. You observe that although
  local training batches compute very quickly, the nodes sit idle for most of the training cycle, and
  federated synchronization rounds frequently timeout over the 100 Mbps wireless uplink. Explain why the
  nodes are idling and why timeouts occur despite the massive compute capacity of the Jetson Orin.
question: "Why do Jetson Orin nodes idle and federated synchronization rounds timeout over the 100 Mbps uplink despite fast local training?"
details:
  realistic_solution: The issue stems from a severe compute-to-communication imbalance in the edge deployment.
    The NVIDIA Jetson Orin rapidly processes local training data using its Ampere GPU and 32GB RAM, bursting
    up to its 60W TDP limit. However, transmitting the model gradients over the wireless edge network
    creates a huge bottleneck. The nodes finish computing quickly and then idle while waiting to upload
    weights, causing the federated averaging timeouts.
  common_mistake: Candidates might focus on the edge device compute capability, arguing that the 275 TOPS
    INT8 is insufficient for training. They often fail to recognize that the high local compute capacity
    combined with limited network bandwidth creates a massive compute-to-communication imbalance, mistaking
    an I/O bottleneck for a processing limitation.
  napkin_math: A 50M parameter model uses FP32 for training gradients, totaling 50M * 4 bytes = 200 MB
    per round. The edge network uplink is 100 Mbps, which equals 12.5 MB/s. Uploading the gradients takes
    200 MB / 12.5 MB/s = 16 seconds per node. Because the Jetson Orin's local computation takes only a
    fraction of a second, communication takes orders of magnitude longer than compute, explaining the
    massive idle periods and timeouts.
