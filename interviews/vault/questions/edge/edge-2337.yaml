title: Edge Orin Memory Bandwidth Limit
scenario: Jetson AGX Orin serving an 8B model (FP16 weights) to 4 concurrent users. Each user generates 1000 tokens with a 500-token prompt. Total KV size is 3GB.
question: What is the peak memory bandwidth required to load the KV-cache for a single decoding step at 20 tokens/sec?
visual:
  kind: svg
  path: edge-2337.svg
  alt: Horizontal bar showing 60 GB/s utilization against a 204.8 GB/s limit
  caption: Memory Bandwidth Utilization
details:
  realistic_solution: At generation phase, the entire KV cache (3GB) must be read per step. At 20 steps/sec, bandwidth required is 3GB * 20 = 60 GB/s. This is safely within the Orin's 204.8 GB/s limit.
  common_mistake: |
    **The Pitfall:** Confusing the model weight size with the KV cache size when computing memory bandwidth.
    **The Rationale:** Candidates often assume that during generation, the memory bandwidth is completely dominated by reading the model weights.
    **The Consequence:** They fail to account for the massive bandwidth cost of continuously streaming the dynamically growing KV cache at every single decoding step.
  napkin_math: |
    1. The entire KV cache must be read from memory to compute attention for every newly generated token.
    2. Total KV size is 3GB.
    3. Target generation speed is 20 tokens/sec (20 Hz).
    4. **3 GB * 20 Hz = 60 GB/s bandwidth strictly for the KV cache.**
