title: Edge Orin Memory Bandwidth Limit
scenario: Jetson AGX Orin serving an 8B model (FP16 weights) to 4 concurrent users.
  Each user generates 1000 tokens with a 500-token prompt. Total KV size is 3GB.
question: Analyze the peak memory bandwidth required to load the KV-cache for a single
  decoding step at 20 tokens/sec.
visual:
  kind: svg
  path: edge-2337.svg
  alt: Horizontal bar showing 60 GB/s utilization against a 204.8 GB/s limit
  caption: Memory Bandwidth Utilization
details:
  realistic_solution: At generation phase, the entire KV cache (3GB) must be read
    per step. At 20 steps/sec, bandwidth required is 3GB * 20 = 60 GB/s. This is safely
    within the Orin's 204.8 GB/s limit.
  common_mistake: Confusing KV cache size with the model weight size when computing
    the generation phase memory bandwidth.
  napkin_math: 3GB * 20 Hz = 60 GB/s bandwidth.
