title: The Activation Memory Budget
scenario: Your autonomous driving team is profiling a new perception model on a Jetson AGX Orin. A critical
  layer produces an intermediate feature map with dimensions 32x32x1024 (Height x Width x Channels). To
  optimize the pipeline, you need to determine if this tensor can fit into a fast on-chip SRAM block or
  if it must be stored in the much slower LPDDR5 DRAM.
question: "What is the FP16 memory footprint of the 32x32x1024 feature map?"
details:
  realistic_solution: The correct calculation multiplies the total number of elements in the tensor by
    the number of bytes per element. For FP16, each element requires 2 bytes. This calculation is critical
    for edge systems design, as the difference between fitting in a few megabytes of on-chip SRAM versus
    spilling to DRAM can be a 10x or greater performance penalty, violating real-time deadlines.
  common_mistake: Engineers often forget to account for the data type's size, calculating only the number
    of elements (H × W × C) and arriving at half the actual memory footprint. Another common error is
    confusing bits with bytes, leading to an 8x overestimation (e.g., multiplying by 16 for FP16 instead
    of 2).
  napkin_math: Elements = 32 (H) * 32 (W) * 1024 (C) = 1,048,576 elements. Data format is FP16, which
    requires 2 bytes per element. Total Size = 1,048,576 * 2 bytes = 2,097,152 bytes = 2.0 MB. A typical
    edge accelerator might have 4-8 MB of on-chip SRAM. Since 2.0 MB < 4 MB, this activation tensor can
    comfortably fit entirely in on-chip SRAM, avoiding expensive ~204.8 GB/s off-chip DRAM reads.
  options:
  - 1 MiB
  - 16 MiB
  - 2 MiB
  - 64 KiB
  correct_index: 2
