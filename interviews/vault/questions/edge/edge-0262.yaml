title: The Activation Memory Budget
scenario: 'Your autonomous driving team is profiling a new perception model on a Jetson AGX Orin. A critical layer produces an intermediate feature map with dimensions 32x32x1024 (Height x Width x Channels). To optimize the pipeline, you need to determine if this tensor can fit into a fast on-chip SRAM block or if it must be stored in the much slower LPDDR5 DRAM.'
question: 'What is the FP16 memory footprint of the 32x32x1024 feature map?'
details:
  realistic_solution: 'The correct calculation multiplies the total number of elements in the tensor by the number of bytes per element. For FP16, each element requires 2 bytes. This calculation is critical for edge systems design, as the difference between fitting in on-chip SRAM versus spilling to DRAM can be a 10x performance penalty.'
  common_mistake: |
    **The Pitfall:** Calculating only the number of elements (H x W x C) and failing to multiply by the byte size of the data type.
    **The Rationale:** Engineers focus purely on tensor dimensionality and often confuse bits with bytes or forget the precision factor entirely.
    **The Consequence:** The memory footprint is underestimated by 2x to 8x, leading to out-of-memory crashes or catastrophic DRAM thrashing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor dimensions: 32 (H) x 32 (W) x 1024 (C).
    - Data format: FP16 (2 bytes per element).

    **Calculations:**
    - Elements = 32 * 32 * 1024 = 1,048,576.
    - Total Size = 1,048,576 * 2 bytes = 2,097,152 bytes = 2.0 MiB.

    **Conclusion & Interpretation:**
    - **Result: 2.0 MiB footprint (Memory-Capacity-Bound)**. Fits comfortably in typical 4-8 MiB on-chip SRAM blocks.
  options:
    - '1 MiB'
    - '16 MiB'
    - '2 MiB'
    - '64 KiB'
  correct_index: 2
