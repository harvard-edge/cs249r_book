title: Watchdog Threshold for Deterministic Execution
scenario: You are designing the functional safety architecture for an autonomous industrial system using the Qualcomm Cloud AI 100 as the on-premise inference accelerator. The critical perception model requires 1,200 Giga-Operations (GOPs) per inference. To ensure deterministic execution for certification, the safety manual dictates an assumed worst-case compute utilization of exactly 10% of peak TOPS to account for worst-case memory stalls on the LPDDR4x under mixed workloads.
question: What watchdog threshold should be set if the 1,200 GOPs model uses only 10% of Cloud AI 100 peak (400 TOPS) and the timer must be 20% above WCET?
details:
  realistic_solution: A reliable safety-critical system must plan for worst-case execution time (WCET), not average or peak performance. By applying the guaranteed deterministic utilization factor to the peak compute, we find the realistic worst-case inference time. We then apply the required safety margin to this WCET to set a watchdog timer that catches true system hangs without triggering during normal heavy-load variance.
  common_mistake: |
    **The Pitfall:** Calculating execution time using the peak 400 TOPS.
    **The Rationale:** Candidates ignore the safety manual's deterministic utilization constraint required for certification.
    **The Consequence:** Setting a dangerously low watchdog timer (e.g., 3.6 ms) that causes constant spurious system resets.
  napkin_math: |
    1. Assumptions & Constraints:
       - Peak compute: 400 TOPS
       - Worst-case compute utilization: 10%
       - Model compute requirement: 1,200 GOPs (1.2 TOPS)
       - Safety margin: 20% above WCET
    2. Calculations:
       - Effective deterministic compute = 400 TOPS * 0.10 = 40 TOPS
       - Worst-Case Execution Time (WCET) = 1.2 TOPS / 40 TOPS = 0.03 seconds (30 ms)
       - Safety margin applied = 30 ms * 1.20 = 36 ms
    3. Conclusion & Interpretation:
       - **Result: Compute-Bound WCET. The precise watchdog timer threshold must be set to 36 ms.**
