title: 'Edge Deployment Tradeoffs: Encoder-Decoder Architectures on Jetson Orin'
scenario: 'You are tasked with deploying a natural language processing (NLP) model for real-time text analysis on an edge platform. The core requirement is to perform both text classification and short-form text summarization.'
question: 'Which NLP architecture would you choose on the edge for both classification and summarization, and how would you meet memory, latency, and power limits?'
details:
  realistic_solution: 'A hybrid approach is required. Use an optimized, INT8 post-training quantized encoder-only model (distilled BERT) for classification, and a heavily compressed decoder-only model for summarization. Aggressive INT8 quantization is mandatory to minimize LPDDR5 memory bandwidth saturation, which dictates true latency far more than peak compute.'
  common_mistake: |
    **The Pitfall:** Selecting a large, general-purpose transformer model without significant quantization.
    **The Rationale:** Candidates assume edge devices with large RAM can comfortably run massive models without hardware-specific optimization.
    **The Consequence:** This leads to massive memory bandwidth saturation, severe inference latency, and thermal throttling from exceeding the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge platform: 275 TOPS INT8 compute, 60W limit, 64GB LPDDR5.
    - Target: 30 FPS.

    **Calculations:**
    - FP32 12-layer model weights: ~1.2GB.
    - INT8 Quantization: Reduces 1.2GB by 4x to ~300MB, massively decreasing bandwidth pressure.
    - Compute utilization: A 100 GOPs model on 275 TOPS INT8 uses (100 / 275,000) = ~0.036% per frame.
    - At 30 FPS, compute utilization is ~1.1%.

    **Conclusion & Interpretation:**
    - **Result: 1.1% Utilization (Memory-Bandwidth Bound)**. The bottleneck is not compute TOPS, but LPDDR5 memory bandwidth; aggressive INT8 quantization is strictly required.
