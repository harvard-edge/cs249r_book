title: 'Edge Deployment Tradeoffs: Encoder-Decoder Architectures on Jetson Orin'
scenario: 'You are tasked with deploying a natural language processing (NLP) model for real-time text analysis on an NVIDIA Jetson Orin platform (64 GB LPDDR5, 275 TOPS INT8, 60W limit). The core requirement is to perform both text classification and short-form text summarization.'
question: 'Which NLP architecture would you choose on Jetson Orin for both text classification and short summarization, and how would you meet memory, latency, and power limits?'
details:
  realistic_solution: 'A realistic solution would involve a hybrid approach or careful selection. For text classification, a highly optimized and quantized encoder-only model (e.g., a distilled BERT-small or MobileBERT) leveraging the INT8 capabilities would be efficient. For short summarization, a small, highly compressed decoder-only model or a compact encoder-decoder architecture (e.g., a tiny T5 or BART variant) with knowledge distillation and quantization could be used. Alternatively, two separate, highly specialized models (one encoder-only for classification, one decoder-only for generation) could run sequentially or in parallel if resource scheduling allows, each optimized for its specific task and the Orin''s hardware. Crucially, leveraging INT8 quantization aggressively for both model weights and activations is key to maximizing the Orin''s 275 TOPS INT8 performance and minimizing memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Selecting a large, general-purpose transformer model (e.g., full T5 or GPT-3 equivalent) without significant quantization.
    **The Rationale:** Candidates assume edge devices with 64GB RAM can comfortably run massive models without hardware-specific optimization.
    **The Consequence:** This leads to excessive memory bandwidth saturation, severe inference latency, and thermal throttling from exceeding the 60W power budget.
  napkin_math: |
    * FP32 12-layer model: ~1.2GB weights.
    * INT8 Quantization: Reduces 1.2GB by 4x to ~300MB, massively decreasing LPDDR5 bandwidth pressure.
    * Compute utilization: A 100 GOPs model on 275 TOPS INT8 uses (100 / 275,000) = ~0.036% utilization per frame.
    * At 30 FPS, compute utilization is ~1.1%.
    * **Conclusion: The bottleneck is not compute TOPS, but LPDDR5 memory bandwidth; aggressive INT8 quantization is strictly required.**
