title: Hailo-8 Thermal Throttling Analysis
scenario: A new edge AI device is specified at 26 TOPS (INT8) with a typical power consumption of 2.5W. During initial testing at 35°C ambient, it drops to 15 TOPS after a few minutes. At 20°C ambient, it maintains near peak performance.
question: Why is the device dropping to 15 TOPS at 35°C, and how would you prevent it from throttling?
details:
  realistic_solution: Implement a robust active cooling solution (e.g., small fan, heat pipe, or more efficient heatsink design) tailored to the device's form factor and expected operating environment. Optimise the AI workload for power efficiency, potentially by adjusting model quantization or batch sizes. Implement dynamic frequency and voltage scaling (DVFS) strategies in the device firmware to manage power consumption and temperature proactively, allowing for graceful performance degradation rather than abrupt throttling. Characterize the system's thermal envelope thoroughly under various ambient conditions to define realistic sustained and burst performance profiles.
  common_mistake: |
    **The Pitfall:** Attributing performance degradation to software inefficiencies or dataset size.
    **The Rationale:** Software engineers assume that advertised "Peak TOPS" are guaranteed under all environmental conditions, ignoring thermal physics.
    **The Consequence:** The device reaches its Tj_max threshold and aggressively scales down frequency (DVFS) to prevent physical silicon damage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power: 2.5W. Max junction temp (Tj_max): 105°C. Ambient (Ta): 35°C. Example Rth_ja: 30°C/W.
    2. **Calculations:**
       - Temp rise (ΔT) = 2.5W * 30°C/W = 75°C.
       - Junction Temp (Tj) = 35°C (Ta) + 75°C = 110°C.
       - 110°C > 105°C Tj_max.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Throttling.** The inadequate heatsink design forces the junction temperature past safe limits at 35°C ambient, triggering hardware throttling.
