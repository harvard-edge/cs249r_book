title: Latency Reduction via GPU Unified Memory Data Pipelines
scenario: An autonomous robot captures LiDAR point clouds. The CPU aligns the point cloud to an image grid and passes the unified tensor to the Jetson AGX Orin GPU for 3D detection.
question: Analyze how replacing the CPU alignment step with a custom CUDA kernel impacts the overall pipeline latency.
details:
  realistic_solution: CPU alignment requires moving raw sensor data through the CPU cache hierarchy, performing sequential spatial transformations, and writing the unified tensor back to main memory. A CUDA kernel processes the raw data in unified memory with massive parallelism. This eliminates the costly intermediate CPU memory bottleneck, leveraging the Orin's 204 GB/s memory bandwidth to drastically reduce end-to-end latency.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the GPU compute parallelism.
    **The Rationale:** Candidates often assume that the main benefit of a custom CUDA kernel is parallelizing the alignment logic, ignoring the memory hierarchy.
    **The Consequence:** They miss the massive reduction in memory transfer overhead, which is the actual primary bottleneck in unified memory edge devices.
  napkin_math: |
    1. **CPU Memory Bandwidth:** The CPU might process data at ~20-30 GB/s.
    2. **GPU Memory Bandwidth:** The Ampere GPU on the Orin can access unified memory at up to 204 GB/s.
    3. **Impact:** Moving the alignment to a custom CUDA kernel completely eliminates the CPU bottleneck, leveraging the massive memory bandwidth difference for a drastic latency reduction.
    **Shifting logic to the GPU unblocks the 20-30 GB/s CPU limitation, enabling reads at up to 204 GB/s.**
