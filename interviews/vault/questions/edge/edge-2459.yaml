title: Latency Reduction via GPU Unified Memory Data Pipelines
scenario: An autonomous robot captures LiDAR point clouds. The CPU aligns the point cloud to an image grid and passes the unified tensor to the edge GPU for 3D detection.
question: Analyze how replacing the CPU alignment step with a custom CUDA kernel impacts the overall pipeline latency.
details:
  realistic_solution: CPU alignment requires moving raw sensor data through the CPU cache hierarchy, performing sequential spatial transformations, and writing the unified tensor back to main memory. A custom CUDA kernel processes the raw data in unified memory with massive parallelism. This eliminates the costly intermediate CPU memory bottleneck, leveraging the high GPU memory bandwidth to drastically reduce end-to-end latency.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the GPU compute parallelism.
    **The Rationale:** Candidates often assume that the main benefit of a custom CUDA kernel is parallelizing the alignment logic, ignoring the memory hierarchy.
    **The Consequence:** They miss the massive reduction in memory transfer overhead, which is the actual primary bottleneck in unified memory edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU memory bandwidth limit: ~20-30 GB/s.
    - GPU unified memory bandwidth (Ampere): ~204 GB/s.

    **Calculations:**
    - CPU bottleneck caps processing at 30 GB/s max.
    - GPU kernel unlocks access at up to 204 GB/s.
    - Speedup multiplier ~ 204 / 30 = ~6.8x purely from memory access.

    **Conclusion & Interpretation:**
    - **Result: ~6.8x Speedup (Memory Bandwidth-Bound)**. Shifting logic to the GPU unblocks the 20-30 GB/s CPU memory bottleneck, enabling memory reads at up to 204 GB/s and drastically reducing pipeline latency.
