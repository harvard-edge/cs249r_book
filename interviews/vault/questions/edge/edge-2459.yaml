title: Latency Reduction via GPU Unified Memory Data Pipelines
scenario: An autonomous robot captures LiDAR point clouds. The CPU aligns the point
  cloud to an image grid and passes the unified tensor to the Jetson AGX Orin GPU
  for 3D detection.
question: Analyze how replacing the CPU alignment step with a custom CUDA kernel impacts
  the overall pipeline latency.
details:
  realistic_solution: CPU alignment requires copying raw sensor data to CPU cache,
    performing spatial transformations, and transferring a massive unified tensor
    back to GPU memory. A CUDA kernel processes the raw data in unified memory with
    massive parallelism, bypassing the CPU entirely. This eliminates the costly intermediate
    memory movement across the bus, drastically reducing end-to-end latency.
  common_mistake: Focusing exclusively on the GPU compute parallelism while ignoring
    the massive reduction in memory transfer overhead.
  napkin_math: Moving a 50MB tensor from CPU to GPU takes ~1ms; a unified CUDA approach
    avoids this penalty entirely.
