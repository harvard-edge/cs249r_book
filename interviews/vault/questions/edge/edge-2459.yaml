title: Latency Reduction via GPU Unified Memory Data Pipelines
scenario: An autonomous robot captures LiDAR point clouds. The CPU aligns the point
  cloud to an image grid and passes the unified tensor to the Jetson AGX Orin GPU
  for 3D detection.
question: Analyze how replacing the CPU alignment step with a custom CUDA kernel impacts
  the overall pipeline latency.
details:
  realistic_solution: CPU alignment requires moving raw sensor data through the CPU cache hierarchy,
    performing sequential spatial transformations, and writing the unified tensor back to main memory.
    A CUDA kernel processes the raw data in unified memory with massive parallelism. This eliminates
    the costly intermediate CPU memory bottleneck, leveraging the Orin's 204 GB/s memory bandwidth
    to drastically reduce end-to-end latency.
  common_mistake: Focusing exclusively on the GPU compute parallelism while ignoring
    the massive reduction in memory transfer overhead.
  napkin_math: While Orin uses unified memory (avoiding PCIe transfers), CPU processing limits
    bandwidth. The CPU might process data at 20-30 GB/s, while the Ampere GPU can access it at
    up to 204 GB/s. Moving the alignment to a custom CUDA kernel eliminates the CPU bottleneck.
