title: Zero-Copy Video Pipeline for Coral Edge TPU
scenario: You are designing a real-time defect detection system processing high-resolution video streams. The inference engine runs on a Google Coral Edge TPU connected via a USB/PCIe interface to a host SoC. The model is quantized to INT8 to utilize the 4 TOPS capability of the Coral within its strict 2W power budget. However, initial profiling shows the system is missing the 30 FPS target (33ms latency limit) due to severe host-device data movement overhead, despite Edge TPU compute taking only 8ms. You must synthesize a novel memory architecture from first principles to optimize DMA transfers and pinned memory allocation between the camera, host SoC, and Edge TPU.
question: How would you design a zero-copy pinned-memory DMA pipeline from camera to Coral to meet the 33 ms 30 FPS deadline?
details:
  realistic_solution: The correct architecture bypasses the CPU data path by establishing a zero-copy pipeline using pinned, contiguous memory (like Linux dma-buf). The camera's hardware ISP downscales and converts the frame directly into this pinned buffer. The host CPU only handles control plane signaling, instantly initiating an asynchronous DMA transfer of the pre-processed INT8 tensor over the USB/PCIe interface directly to the Coral Edge TPU's memory.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 4 TOPS INT8 compute limits and suggesting further model pruning.
    **The Rationale:** Completely ignoring the I/O bottleneck and CPU data path overhead in favor of pure ML ops.
    **The Consequence:** Designing a system that easily computes the model in 8ms but takes 25ms just to copy the data, fatally missing the 33ms target.
  napkin_math: |
    - Raw 1080p RGB frame: 1920x1080x3 = 6.22 MB.
    - Standard transfer (~400 MB/s): 15.5ms + 10ms OS copy overhead = 25.5ms.
    - Total baseline latency: 25.5ms + 8ms compute = 33.5ms (misses 33ms target).
    - Using ISP downscale to 512x512x3 INT8: 786 KB.
    - Zero-copy DMA transfer of 786 KB: ~2ms.
    - **Result: ISP (3ms) + DMA (2ms) + TPU (8ms) = 13ms per frame.**
