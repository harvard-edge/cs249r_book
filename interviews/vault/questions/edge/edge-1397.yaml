title: Zero-Copy Video Pipeline for Coral Edge TPU
scenario: You are designing a real-time defect detection system processing high-resolution
  video streams. The inference engine runs on a Google Coral Edge TPU connected via
  a USB/PCIe interface to a host SoC. The model is quantized to INT8 to utilize the
  4 TOPS capability of the Coral within its strict 2W power budget. However, initial
  profiling shows the system is missing the 30 FPS target (33ms latency limit) due
  to severe host-device data movement overhead, despite Edge TPU compute taking only
  8ms. Synthesize a novel memory architecture from first principles to optimize DMA
  transfers and pinned memory allocation between the camera, host SoC, and Edge TPU.
question: How would you design a zero-copy pinned-memory DMA pipeline from camera
  to Coral to meet the 33 ms 30 FPS deadline?
details:
  realistic_solution: The correct architecture bypasses the CPU data path by establishing
    a zero-copy pipeline using pinned, contiguous memory (like Linux dma-buf). The
    camera's hardware ISP downscales and converts the frame directly into this pinned
    buffer. The host CPU only handles control plane signaling, instantly initiating
    an asynchronous DMA transfer of the pre-processed INT8 tensor over the USB/PCIe
    interface directly to the Coral Edge TPU's memory.
  common_mistake: Candidates often focus solely on the 4 TOPS INT8 compute limits
    and suggest further model pruning, completely ignoring the I/O bottleneck. A common
    flawed design involves copying data from the camera driver to user-space, performing
    color space conversion on the CPU, and initiating blocking USB/PCIe transfers,
    which incurs massive CPU overhead and memory latency.
  napkin_math: 'A raw 1080p RGB frame is 1920x1080x3 = 6.22 MB. Transferring full
    frames over a typical USB/PCIe interface (e.g., ~400 MB/s practical bandwidth)
    takes ~15.5ms, plus ~10ms of OS buffer copy overhead, consuming 25.5ms before
    the 8ms inference even starts (total 33.5ms, missing the 33ms budget). By using
    the ISP to downscale to a 512x512x3 INT8 input (786 KB) directly into pinned memory,
    the payload drops by 87%. The zero-copy DMA transfer of 786 KB takes ~2ms. Total
    latency: ISP processing (3ms) + DMA transfer (2ms) + 4 TOPS Edge TPU execution
    (8ms) = 13ms per frame, well within the 30 FPS requirement.'
