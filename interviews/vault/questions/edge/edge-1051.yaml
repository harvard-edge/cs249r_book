title: 'Fault Tolerance: Realize Checkpoint Storage Architecture for 200-Device Jetson Fleet'
scenario: 'You must realize the checkpoint storage architecture for a fleet of 200 Jetson Orin devices, each running online learning with LoRA adaptation. Requirements: 30-day checkpoint history, cloud backup within 1 hour of creation, and recovery within 5 minutes. You must specify storage at every tier.'
question: What storage tiers would you specify for 30-day LoRA checkpoint history, 1-hour cloud backup, and 5-minute recovery across 200 Orin devices?
details:
  realistic_solution: 'Edge checkpoint storage is dominated by NVMe endurance and cloud sync costs. LoRA state at 2MB per checkpoint is small relative to NVMe endurance limits.'
  common_mistake: |
    **The Pitfall:** Not sizing local NVMe correctly for retention or not accounting for cloud egress costs.
    **The Rationale:** Treating edge storage and cloud sync as "infinite" resources without running the capacity and cost calculations.
    **The Consequence:** Unplanned storage exhaustion or a massive, unexpected monthly cloud egress bill.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 200 devices. 4 checkpoints/hour at 2MB per checkpoint.
    2. **Calculations:**
       - Edge storage: 200 * 2MB * 4/hr = 1.6GB/hr fleet-wide NVMe writes.
       - Cloud sync: 200 * 2MB * 96/day = 38.4 GB/day.
       - Cloud egress at $0.09/GB = $3.45/day ($1261/year).
    3. **Conclusion & Interpretation:**
       - **Result: Cost is dominated by cloud egress at $1261/year.**
