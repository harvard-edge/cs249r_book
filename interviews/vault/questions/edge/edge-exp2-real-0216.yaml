title: Optimizing ViT Operator Fallback on Cloud AI 100
scenario: Your team is deploying a Vision Transformer for high-throughput factory inspection on a Qualcomm
  Cloud AI 100 accelerator. Converting the PyTorch model to ONNX and compiling it results in CPU fallback
  for custom attention operators, severely impacting throughput. Given the platform's 32 GB LPDDR4x memory
  and 400 TOPS INT8 capacity within a 75W envelope, you must evaluate the conversion strategy. Evaluate
  the tradeoffs of rewriting the model architecture to use supported operators versus writing custom AI
  100 kernels for the unsupported operations.
details:
  realistic_solution: A strong candidate will evaluate the performance cost of host-accelerator memory
    transfers against the engineering effort of custom kernel development. The optimal solution is typically
    to rewrite the PyTorch model to replace custom operators with mathematically equivalent standard operations
    supported natively by the AI 100 compiler. This avoids costly context switches, keeping the execution
    pipeline saturated on the device. This approach ensures the application can fully utilize the 400
    TOPS INT8 capacity without being bottlenecked by host CPU performance or PCIe transfer latency.
  common_mistake: Candidates often suggest immediately writing custom kernels for the unsupported operators
    without profiling the cost of CPU fallback or data transfers. They frequently ignore that moving data
    between the host CPU and the AI 100's memory for unsupported layers can completely bottleneck the
    accelerator's compute capability.
  napkin_math: Assume the model requires 250 GOPS per frame. The Qualcomm Cloud AI 100 provides 400 TOPS
    (400,000 GOPS) INT8, yielding a theoretical maximum compute-bound throughput of 400,000 / 250 = 1600
    FPS. If an unsupported operator forces a CPU fallback that requires transferring a 16MB intermediate
    tensor across PCIe Gen4 x8 (approx 16 GB/s) to the host and back, the transfer time alone is 32MB
    / 16 GB/s = 2.0 ms per frame. This transfer adds a hard latency floor that limits throughput to a
    maximum of 500 FPS (1 / 0.002s), completely wasting the remaining accelerator capacity.
