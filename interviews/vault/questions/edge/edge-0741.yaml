title: 'The OTA Bandwidth Trap: OTA & Firmware Updates'
scenario: You're an engineer on the autonomous vehicle (AV) team responsible for fleet updates. A new perception model, packaged as an 8 Gigabyte (GB) container, needs to be deployed via an Over-the-Air (OTA) update. The vehicles in the fleet have a stable cellular connection with a real-world sustained download speed of 100 Megabits per second (Mbps).
question: Roughly how long will one vehicle take to download the 8 GB OTA container over a sustained 100 Mbps connection?
details:
  realistic_solution: 'The correct approach is to make the units consistent before dividing. The file size must be converted from Gigabytes to Gigabits or Megabits.'
  common_mistake: |
    **The Pitfall:** Confusing bits with bytes in network throughput.
    **The Rationale:** Network speeds are virtually always advertised in bits per second, while file sizes are measured in bytes.
    **The Consequence:** Forgetting to multiply the file size in bytes by 8 results in a calculated update window that is 8 times too optimistic, breaking fleet availability models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Container size = 8 Gigabytes (GB).
       - Network download speed = 100 Megabits per second (Mbps).
    2. **Calculations:**
       - Container size in bits = 8 GB * 8 bits/Byte = 64 Gigabits (Gb).
       - Network speed in Gigabits = 100 Mbps = 0.1 Gbps.
       - Download time = 64 Gb / 0.1 Gbps = 640 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 640 Seconds**. Forgetting the 8x conversion factor from bytes to bits causes massive operational miscalculations for OTA deployments.
  options:
  - ~80 seconds (~1.3 minutes)
  - ~11 minutes (~640 seconds)
  - ~1 minute
  - ~1 hour
  correct_index: 1
