title: 'The OTA Bandwidth Trap: OTA & Firmware Updates'
scenario: You're an engineer on the autonomous vehicle (AV) team responsible for fleet updates. A new
  perception model, packaged as an 8 Gigabyte (GB) container, needs to be deployed via an Over-the-Air
  (OTA) update. The vehicles in the fleet have a stable cellular connection with a real-world sustained
  download speed of 100 Megabits per second (Mbps). Explain roughly how long it will take for a single
  vehicle to download this update.
question: "Roughly how long will one vehicle take to download the 8 GB OTA container over a sustained 100 Mbps connection?"
details:
  realistic_solution: The correct approach is to make the units consistent before dividing. The file size
    must be converted from Gigabytes to Megabits.
  common_mistake: The most common mistake is confusing Megabits (Mb) with MegaBytes (MB). Network speeds
    are almost always advertised in bits per second, while file sizes are measured in bytes. Forgetting
    to multiply the file size in bytes by 8 to convert it to bits will result in an answer that is 8 times
    too small.
  napkin_math: '1. **Convert file size to bits:** The container is 8 GigaBytes (GB). 8 GB x 8 bits/Byte
    = 64 Gigabits (Gb). | 2. **Convert bandwidth to matching units:** 100 Megabits/sec = 0.1 Gigabits/sec.
    | 3. **Calculate download time:** Time = Data / Bandwidth = 64 Gb / 0.1 Gb/s = **640 seconds ≈ 10.7
    minutes.** | 4. **Sanity check:** At 100 Mbps, you download 12.5 MB/s. For 8 GB: 8,000 MB / 12.5 MB/s
    = 640 seconds. Confirmed. | 5. **Fleet consideration:** All vehicles download simultaneously, but
    each uses its own cellular connection. The bottleneck is per-vehicle bandwidth, not aggregate. However,
    if using a CDN, peak demand of 100K vehicles x 100 Mbps = 10 Tbps of CDN egress.'
  options:
  - ~80 seconds (~1.3 minutes)
  - ~11 minutes (~640 seconds)
  - ~1 minute
  - ~1 hour
  correct_index: 1
