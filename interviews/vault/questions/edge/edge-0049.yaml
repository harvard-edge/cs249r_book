title: The GPS Time Sync Sensor Fusion Failure
scenario: Your autonomous agricultural robot fuses camera detections with RTK-GPS positions to map weed locations. After a firmware update, the weed map shows detections offset by 1.5 meters from their true positions — always in the direction of travel. The camera model is accurate (verified on static images), and the GPS has 2 cm RTK accuracy.
question: What's causing the systematic offset?
details:
  realistic_solution: 'The firmware update changed the GPS message parsing library, which introduced a timestamp synchronization error between the camera and GPS streams. The camera captures a frame at time T, but the GPS position used for fusion is from time T−150ms (stale by one GPS update cycle). During that 150ms, the robot traveling at 6 m/s (21.6 km/h) moves: 6 * 0.15 = 0.9m. But the observed offset is 1.5m — the discrepancy reveals a second issue: the TDA4VM''s vision processing pipeline adds 100ms of latency (ISP -> resize -> inference -> NMS), and the fusion node uses the detection timestamp (post-processing) rather than the capture timestamp (pre-processing). Total temporal offset: 150ms (GPS staleness) + 100ms (pipeline latency) = 250ms. At 6 m/s: 6 * 0.25 = 1.5m — matching the observed error.'
  common_mistake: |
    **The Pitfall:** Assuming a spatial calibration error.
    **The Rationale:** Candidates often jump to camera-to-GPS extrinsic calibration being wrong when seeing offsets.
    **The Consequence:** They miss that a calibration error produces a fixed offset regardless of travel direction, whereas an offset always in the direction of travel points to a temporal synchronization problem.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPS Update Rate: 10 Hz (100ms between updates).
       - Firmware bug introduces 150ms staleness.
       - Camera Pipeline Latency: 100ms.
       - Speed: 6 m/s (21.6 km/h).
    2. **Calculations:**
       - Total Temporal Offset = 150ms + 100ms = 250ms (0.25s).
       - Offset Calculation = 6 m/s * 0.25s = 1.5m error.
    3. **Conclusion & Interpretation:**
       - **Result: 1.5m error**. The temporal synchronization problem manifests as a spatial offset in the direction of travel.
