title: The GPS Time Sync Sensor Fusion Failure
scenario: Your autonomous agricultural robot (TI TDA4VM, 8 TOPS, 20W) fuses camera detections with RTK-GPS
  positions to map weed locations. After a firmware update, the weed map shows detections offset by 1.5
  meters from their true positions — always in the direction of travel. The camera model is accurate (verified
  on static images), and the GPS has 2 cm RTK accuracy. What's causing the systematic offset?
details:
  realistic_solution: 'The firmware update changed the GPS message parsing library, which introduced a
    timestamp synchronization error between the camera and GPS streams. The camera captures a frame at
    time T, but the GPS position used for fusion is from time T−150ms (stale by one GPS update cycle).
    During that 150ms, the robot traveling at 10 km/h moves: 10,000 m / 3600 s × 0.15s = 0.42m. But the
    observed offset is 1.5m — the discrepancy reveals a second issue: the TDA4VM''s vision processing
    pipeline adds 100ms of latency (ISP → resize → inference → NMS), and the fusion node uses the detection
    timestamp (post-processing) rather than the capture timestamp (pre-processing). Total temporal offset:
    150ms (GPS staleness) + 100ms (pipeline latency) = 250ms. At 10 km/h: 0.69m. At the robot''s actual
    field speed of 22 km/h: 22,000/3600 × 0.25 = 1.53m — matching the observed error.'
  common_mistake: '"The camera-to-GPS extrinsic calibration is wrong." A calibration error would produce
    a fixed offset regardless of travel direction. This offset is always in the direction of travel, which
    points to a temporal problem, not a spatial one.'
  napkin_math: 'GPS update rate: 10 Hz (100ms between updates). Camera capture-to-detection latency: 100ms.
    Worst-case temporal misalignment without sync: 100ms + 100ms = 200ms. At 22 km/h: 22,000/3600 × 0.2
    = 1.22m error. With hardware timestamping + GPS interpolation: residual sync error <5ms. At 22 km/h:
    0.03m — within the GPS RTK accuracy of 0.02m. Herbicide savings from accurate weed mapping: 30% reduction
    in chemical use. At 50/acre for 1,000 acres: 15,000/season saved by fixing a timestamp bug.'
