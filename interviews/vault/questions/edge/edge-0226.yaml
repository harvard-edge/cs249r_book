title: The Edge vs. Cloud Power Divide
scenario: For a feature in a new vehicle, we're deciding between processing driver footage on an in-car Edge device or sending it to the cloud.
question: From a pure hardware power perspective, roughly how much more power does a single high-end Cloud GPU consume compared to a typical automotive-grade Edge GPU?
details:
  realistic_solution: The ratio is approximately 20-25x. A high-end datacenter GPU like the NVIDIA H100 has a Thermal Design Power (TDP) of 700W, whereas a typical automotive Edge GPU like the NVIDIA Jetson AGX Orin operates in a 15-60W envelope. Using 30W as a typical automotive budget, the cloud GPU consumes over 23 times more power. This fundamental difference drives decisions around Total Cost of Ownership (TCO), thermal management in the vehicle, and privacy by favoring on-device processing.
  common_mistake: |
    **The Pitfall:** Underestimating the power gap to be only 2-5x.
    **The Rationale:** Engineers often compare to consumer desktop GPUs rather than datacenter accelerators.
    **The Consequence:** Fundamentally flawed Total Cost of Ownership (TCO) and thermal management planning.
  napkin_math: |
    - Cloud GPU Power (H100 TDP): ~700W.
    - Edge GPU Power (Jetson Orin): ~30W.
    - Ratio: 700W / 30W = 23.3x.
    **A cloud GPU consumes over 20x more power.**
  options:
  - About 3-5x more power
  - About 100x more power
  - Over 20x more power
  - They consume roughly the same amount of power
  correct_index: 2
