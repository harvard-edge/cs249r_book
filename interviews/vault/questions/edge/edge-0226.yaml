title: The Edge vs. Cloud Power Divide
scenario: For a feature in a new vehicle, we're deciding between processing driver footage on an in-car
  Edge device or sending it to the cloud. From a pure hardware power perspective, roughly how much more
  power does a single high-end Cloud GPU consume compared to a typical automotive-grade Edge GPU?
details:
  realistic_solution: The ratio is approximately 20-25x. A high-end datacenter GPU like the NVIDIA H100
    has a Thermal Design Power (TDP) of 700W, whereas a typical automotive Edge GPU like the NVIDIA Jetson
    AGX Orin operates in a 15-60W envelope. Using 30W as a typical automotive budget, the cloud GPU consumes
    over 23 times more power. This fundamental difference drives decisions around Total Cost of Ownership
    (TCO), thermal management in the vehicle, and privacy by favoring on-device processing.
  common_mistake: Engineers often underestimate this gap, thinking it's only 2-5x, similar to the difference
    between consumer desktop GPUs. They fail to appreciate the vast architectural and thermal differences
    between a 700W liquid-cooled datacenter GPU and a power-budgeted, fan-cooled embedded system.
  napkin_math: Cloud GPU Power (H100 TDP) = 700 W
  options:
  - About 3-5× more power
  - About 100× more power
  - Over 20× more power
  - They consume roughly the same amount of power
  correct_index: 2
