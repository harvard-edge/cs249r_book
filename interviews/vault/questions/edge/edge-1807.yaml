title: Inference Compute Specification for Cloud AI 100
scenario: 'You are tasked with specifying the compute execution strategy for a high-throughput computer vision pipeline deploying on an on-premise Qualcomm Cloud AI 100. The system must process multiple camera streams efficiently. The hardware features 400 TOPS INT8 peak compute, 32 GB of LPDDR4x memory, and a strict 75W TDP limit.'
question: 'How do you balance batch size and operational intensity to maximize the INT8 compute utilization without hitting the LPDDR4x memory bandwidth wall?'
details:
  realistic_solution: 'The specification must dictate a batched execution model to increase operational intensity (compute operations per byte accessed). By analyzing the compute-to-memory ratio, the candidate should specify a batch size large enough to ensure model weights, once loaded into the local SRAM from the 32 GB LPDDR4x, are reused across multiple inputs. Using INT8 maximizes both the 400 TOPS compute units and effectively halves the memory bandwidth pressure compared to FP16.'
  common_mistake: |
    **The Pitfall:** Specifying a batch size of 1 to minimize latency without analyzing operational intensity.
    **The Rationale:** Cloud inference engineers default to batch size 1 to achieve the lowest possible P99 latency.
    **The Consequence:** LPDDR4x memory bandwidth bottlenecks the execution because weights must be loaded from memory for every single input, starving the 400 TOPS compute units.
  napkin_math: |
    * Assume LPDDR4x bandwidth of ~136 GB/s and a 400 TOPS INT8 peak capacity.
    * For a model requiring 10 GOPs per frame and having 2 GB of INT8 weights.
    * At batch size 1, reading 2 GB of weights takes 14.7ms (136 GB/s), capping throughput at 68 FPS (680 GOPs/s, or 0.17% compute utilization).
    * To reach 50% compute utilization (200 TOPS, or 20,000 FPS), the 2 GB weight read must be amortized.
    * **The specification must require a batch size of at least 20,000 / 68 ≈ 294 to prevent memory starvation.**
