title: Data Pruning Impact on Edge Fine-Tuning
scenario: You are fine-tuning an object detection model directly on an NVIDIA Jetson
  Orin edge device (32 GB LPDDR5, 275 TOPS INT8) to adapt to local factory conditions.
  The full local dataset consists of 100,000 images, but continuous training with
  the full dataset exceeds the thermal envelope of the 60W TDP device, causing severe
  throttling. You apply data pruning to select a 10% coreset of the most informative
  samples. If a single training step (forward + backward pass) over a batch of 32
  images takes 50ms utilizing the Ampere GPU and DLA accelerator, calculate the total
  compute time saved per epoch by using the 10% coreset instead of the full dataset.
question: How much training compute time per epoch is saved by using a 10% coreset
  instead of 100,000 images at batch size 32 and 50 ms/step?
details:
  realistic_solution: The correct approach is to calculate the number of batches for
    the skipped data (90% of the dataset) and multiply by the per-batch latency to
    find the total time saved per epoch.
  common_mistake: Candidates often calculate the time for the full dataset and the
    coreset but forget to subtract them to find the time saved, or they mishandle
    the batch size division and arrive at the wrong number of steps.
  napkin_math: 'Full dataset: 100,000 images. Coreset (10%): 10,000 images. Skipped
    images: 90,000. Batches saved per epoch: 90,000 / 32 = 2812.5 batches. Time saved
    per epoch: 2812.5 batches * 50 ms/batch = 140,625 ms = 140.625 seconds.'
