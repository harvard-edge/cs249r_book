title: Data Pruning Impact on Edge Fine-Tuning
scenario: You are fine-tuning an object detection model directly on an NVIDIA Jetson Orin edge device to adapt to local factory conditions. The full local dataset consists of 100,000 images, but continuous training with the full dataset exceeds the thermal envelope of the 60W TDP device, causing severe throttling. You apply data pruning to select a 10% coreset of the most informative samples. A single training step (forward + backward pass) over a batch of 32 images takes 50ms utilizing the Ampere GPU and DLA accelerator.
question: How much training compute time per epoch is saved by using a 10% coreset instead of the full 100,000-image dataset?
details:
  realistic_solution: Identify the 90% of structurally redundant data (90,000 images) skipped per epoch. Divide by the batch size (32) to compute the number of training steps bypassed (2,812.5). Multiplying by the 50ms iteration latency yields roughly 141 seconds of high-power Ampere GPU compute saved per epoch, allowing the Orin to cool down and maintain its 60W continuous thermal envelope.
  common_mistake: |
    **The Pitfall:** Failing to subtract the coreset time from the full dataset time, or mishandling batch size division.
    **The Rationale:** Candidates rush the calculation and either calculate the new total time instead of the *saved* time, or multiply by the image count instead of the batch count.
    **The Consequence:** The projected time savings are wildly inaccurate, leading to poor thermal management planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full dataset: 100,000 images.
    - Coreset: 10% (10,000 images).
    - Batch size: 32 images.
    - Step latency: 50 ms.

    **Calculations:**
    - Skipped images: 100,000 - 10,000 = 90,000.
    - Batches saved: 90,000 / 32 = 2812.5.
    - Compute time saved: 2812.5 batches * 50 ms = 140,625 ms = 140.625 seconds.

    **Conclusion & Interpretation:**
    - **Result: 140.6 seconds saved per epoch (Thermal/Compute Bound)**. Dramatically reducing the training workload via coreset selection averts thermal throttling while maintaining gradient quality.
