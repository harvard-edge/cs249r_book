title: Hardware-aware NAS for Coral Edge TPU Deployment
scenario: Your team is tasked with deploying a real-time image classification model on a Google Coral Edge TPU. The target application requires a latency of less than 30ms per inference and a power consumption budget of under 2W. Traditional NAS approaches yield models that are too large or too slow.
question: How would you design a hardware-aware NAS strategy for Coral Edge TPU that enforces <30ms latency, <2W power, SRAM, FLOP, and INT8 constraints?
details:
  realistic_solution: Implement a differentiable NAS approach or a reinforcement learning-based NAS with a specialized search space that includes operations and block types known to be efficient on the Edge TPU (e.g., depthwise separable convolutions, inverted residuals). The reward function should be a multi-objective optimization considering accuracy, actual measured latency on the Coral Edge TPU (or a high-fidelity emulator), and estimated memory footprint. Hardware-aware latency predictors and memory estimators can be integrated into the search loop to quickly prune infeasible architectures. Post-search, a final quantization-aware training step would ensure INT8 compatibility.
  common_mistake: |
    **The Pitfall:** Ignoring actual on-device performance and power consumption during the NAS process.
    **The Rationale:** Candidates often rely purely on theoretical FLOP counts as a proxy for latency, forgetting that hardware-specific constraints (like unsupported operations) trigger costly CPU fallbacks.
    **The Consequence:** The NAS produces architectures that are theoretically optimal but practically infeasible, exceeding latency/power budgets or failing to compile for the target hardware.
  napkin_math: |
    1. Identify target constraints: 4 TOPS (4 * 10^12 Ops/sec) INT8, 30ms (0.03s) target latency.
    2. Calculate max operations per inference: 4 * 10^12 * 0.03 = 1.2 * 10^11 operations (120 GOPS).
    3. Evaluate typical classification model: MobileNetV2 requires ~300-600 MFLOPs (~600-1200 MOPS for INT8).
    4. Compare requirement to capacity: 1.2 GOPS (required) << 120 GOPS (budget).
    **While compute budget (120 GOPS) is vast, latency on the Coral will be dominated by memory access patterns and supported operations, dictating the NAS search space.**
