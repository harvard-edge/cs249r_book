title: Hardware-aware NAS for Coral Edge TPU Deployment
scenario: Your team is tasked with deploying a real-time image classification model on a Google Coral Edge TPU. The target application requires a latency of less than 30ms per inference and a power consumption budget of under 2W.
question: How would you design a hardware-aware NAS strategy for Coral Edge TPU that enforces <30ms latency, <2W power, and INT8 constraints?
details:
  realistic_solution: Design a hardware-in-the-loop (HWIL) Neural Architecture Search (NAS) or construct a high-fidelity surrogate latency predictor. The search space must be rigidly constrained to operations natively supported by the Coral Edge TPU compiler (e.g., standard Conv2D, Depthwise Separable, ReLU) to prevent devastating CPU fallbacks. Integrate Quantization-Aware Training (QAT) directly into the supernet evaluation to ensure INT8 accuracy proxy metrics are valid. The reward function must heavily penalize graph partitioning, optimizing for continuous fused subgraphs that minimize host-TPU memory transfers.
  common_mistake: |
    **The Pitfall:** Utilizing pure FLOP count as a proxy for latency during the NAS optimization loop.
    **The Rationale:** Candidates assume lower FLOPs linearly correlate to lower latency, ignoring the harsh reality of unsupported operations causing CPU fallbacks.
    **The Consequence:** The NAS outputs a mathematically efficient but practically useless architecture that heavily relies on unsupported operators, causing massive latency spikes (>>30ms) due to host-TPU data movement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Coral Edge TPU (4 TOPS INT8). Target Latency: < 30ms.
       - Compute Budget: 4 * 10^12 * 0.03 = 120 GigaOps per inference.
       - Model Requirement (e.g., MobileNetV2): ~600-1200 MegaOps (INT8).
    2. **Calculations:**
       - Model Compute (1.2 GOPS) / Hardware Limit (120 GOPS) = 1% compute utilization.
       - PCIe/USB Data Transfer overhead for CPU fallback: easily > 10ms per unsupported layer.
    3. **Conclusion & Interpretation:**
       - **Result: Compute budget is virtually infinite (120 GOPS). The system is entirely Architecture-Bound by supported operators and data movement, invalidating FLOP-based NAS.**
