title: The Fleet Health Dashboard
scenario: You're the ML platform architect for a fleet of 50,000 edge devices across 200 cities. Each device has intermittent cellular connectivity, capable of uploading at most 1 MB per day.
question: What metrics do you collect, how do you aggregate them, and what are your alerting thresholds?
details:
  realistic_solution: Build hierarchical edge-cloud monitoring. On-device: aggregate hourly stats into ~300 bytes (mean confidence, detection counts, histogram). Alert hierarchy: device-level anomaly detection locally, city-level aggregation in regional collectors, global dashboard for fleet trends. Never stream raw inference — 30 FPS x 50K devices = 1.5 million frames/second.
  common_mistake: |
    **The Pitfall:** Attempting to stream raw inference results or telemetry traces to the cloud.
    **The Rationale:** Architects default to cloud-native monitoring patterns without calculating the bandwidth impact of a massive physical fleet.
    **The Consequence:** Overwhelming the cellular connection, resulting in thousands of dollars in overage fees and dropped critical alerts.
  napkin_math: |
    1. **Cloud Ingestion:** 50,000 devices x 1 MB/day = 50 GB/day total.
    2. **Storage Costs:** 50 GB x 365 days x 3 years = 54.75 TB. At $0.023/GB/month (S3) = ~$1,260/month.
    3. **Cellular Costs:** 1 MB/day x 30 days x $0.01/MB x 50,000 = $15,000/month.
    4. **Total Cost:** $16,260/month for 50,000 devices = **$0.33/device/month**.
