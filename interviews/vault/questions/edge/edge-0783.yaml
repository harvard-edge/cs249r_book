title: The Fleet Health Dashboard
scenario: You're the ML platform architect for a fleet of 50,000 edge devices across 200 cities. Each device has intermittent cellular connectivity, capable of uploading at most 1 MB per day.
question: What metrics do you collect, how do you aggregate them, and what are your alerting thresholds?
details:
  realistic_solution: 'Build hierarchical edge-cloud monitoring. On-device: aggregate hourly stats into a heavily compressed payload (~300 bytes of mean confidence, detection counts, and histograms). Alert hierarchy: device-level anomaly detection locally, city-level aggregation in regional collectors, global dashboard for fleet trends. Never stream raw inference payloads to the cloud.'
  common_mistake: |
    **The Pitfall:** Attempting to stream raw inference results or telemetry traces to the cloud.
    **The Rationale:** Architects default to cloud-native monitoring patterns without calculating the bandwidth impact of a massive physical fleet.
    **The Consequence:** Overwhelming the cellular connection, resulting in thousands of dollars in overage fees and dropped critical alerts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 50,000 devices.
       - Upload limit: 1 MB/day per device.
    2. **Calculations:**
       - Cloud Ingestion: 50,000 devices * 1 MB/day = 50 GB/day total.
       - Storage Costs: 50 GB/day * 365 days * 3 years = 54.75 TB. At $0.023/GB/month ≈ $1,260/month.
       - Cellular Costs: 1 MB/day * 30 days * $0.01/MB * 50,000 = $15,000/month.
       - Total Cost: $16,260/month.
    3. **Conclusion & Interpretation:**
       - **Result: Financially Viable**. By aggressively aggregating and compressing telemetry locally, the total cloud ingestion and cellular costs are kept to a highly efficient $0.33/device/month.
