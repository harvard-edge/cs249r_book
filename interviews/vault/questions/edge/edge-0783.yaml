title: The Fleet Health Dashboard
scenario: You're the ML platform architect for a fleet of 50,000 edge devices across 200 cities. Design
  the monitoring system. What metrics do you collect, how do you aggregate them, and what are your alerting
  thresholds? Assume each device has intermittent cellular connectivity (uploads at most 1 MB/day).
question: "What metrics do you collect, how do you aggregate them, and what are your alerting thresholds?"
details:
  realistic_solution: 'Build hierarchical edge-cloud monitoring. On-device: aggregate hourly stats into
    ~300 bytes (mean confidence, detection counts, histogram). Daily upload: 1 MB/device = 50 GB/day total.
    Storage at $1,260/month (S3). Cellular cost dominates at $15K/month ($0.33/device/month total). Alert
    hierarchy: device-level anomaly detection locally, city-level aggregation in regional collectors,
    global dashboard for fleet trends. Never stream raw inference — 30 FPS x 50K devices = 1.'
  common_mistake: '"Stream all inference results to the cloud for analysis." At 30 FPS × 50,000 devices,
    that''s 1.5 million frames/second — impossible over cellular.'
  napkin_math: '50,000 devices × 1 MB/day = 50 GB/day cloud ingestion. Storage: 50 GB × 365 days × 3 years
    = 54.75 TB. At $0.023/GB/month (S3): $1,260/month. Cellular cost: 1 MB/day × 30 days × $0.01/MB ×
    50,000 = $15,000/month. Total monitoring cost: ~$16,260/month for 50,000 devices = **$0.33/device/month**.'
