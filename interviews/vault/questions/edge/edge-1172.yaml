title: 'Edge TCO Realization: Scale-Up vs Scale-Out for Edge Fleet'
scenario: 'A manufacturing plant needs 500 TOPS INT8 inference capacity. Option A: 2 Jetson Orin (275 TOPS each = 550 TOPS, $499 each, 60W each). Option B: 20 Hailo-8 (26 TOPS each = 520 TOPS, $200 each, 2.5W each) with 4 Raspberry Pi 5 hosts.'
question: How would you size the Jetson Orin and Hailo-8 options for 500 TOPS INT8, compute 3-year TCO, and compare failure modes?
details:
  realistic_solution: |
    Option A (2 Jetsons): Higher hardware cost efficiency but represents a massive single-point-of-failure (SPOF). Option B (20 Hailos + 4 Pi5s): Higher upfront hardware cost, but significantly more resilient. 1 Hailo failure is only a 5% capacity loss with hot swap capabilities. Option B is chosen when SLA uptime penalties exceed the CapEx savings.
  common_mistake: |
    **The Pitfall:** Comparing only hardware acquisition costs.
    **The Rationale:** Procurement often focuses on capital expenditure (CapEx) without modeling operational risk.
    **The Consequence:** Choosing Option A because it is 3.5x cheaper upfront, completely ignoring the massive single-point-of-failure risk and downtime penalties.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Timeframe: 3 years (26,280 hours).
       - Power cost: $0.10/kWh.
       - Option A (2 Jetsons): $998 HW, 120W.
       - Option B (20 Hailos + 4 Pis): $4,320 HW, 70W.
       - Maintenance: 3% of HW cost per year * 3 years.
    2. **Calculations:**
       - Option A Power: 120W * 26,280h * $0.10/kWh / 1000 = $315.36.
       - Option A Maintenance: 0.09 * $998 = $89.82.
       - Option A Total TCO: $998 + $315.36 + $89.82 = $1,403.18.
       - Option B Power: 70W * 26,280h * $0.10/kWh / 1000 = $183.96.
       - Option B Maintenance: 0.09 * $4,320 = $388.80.
       - Option B Total TCO: $4,320 + $183.96 + $388.80 = $4,892.76.
    3. **Conclusion & Interpretation:**
       - **Result: SLA-Bound (Risk Mitigation)**. Option B is more expensive upfront (~$4.9k vs ~$1.4k) but prevents SLA violations, making it superior when factoring in high downtime penalties.
