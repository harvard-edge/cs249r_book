title: The TOPS vs. TOPS/W Tradeoff
scenario: You're on the autonomous vehicle hardware team, evaluating accelerators for your next-gen perception
  stack. The system has a strict 15W thermal design power (TDP) budget. When comparing chips, what does
  the 'TOPS/W' (tera-operations per second per watt) metric fundamentally represent?
details:
  realistic_solution: TOPS/W represents the *computational efficiency* of the accelerator. It tells you
    how many trillion operations the chip can perform for each watt of power it consumes. In a power-constrained
    environment like a car, this is often more important than the peak, unconstrained TOPS figure, as
    it determines the maximum *sustained* performance you can achieve within your thermal envelope.
  common_mistake: Engineers often fixate on the headline peak TOPS number, assuming it's the most important
    performance metric. However, at the edge, power and thermal dissipation are the primary constraints.
    A chip with a high peak TOPS but poor efficiency will quickly throttle under a fixed thermal budget,
    delivering a fraction of its advertised performance. TOPS/W is the direct measure of how much sustained
    compute can be achieved within that budget.
  napkin_math: 'Let''s use the NVIDIA Jetson AGX Orin as an example. It''s rated for 275 TOPS at a configurable
    TDP up to 60W. Its efficiency is roughly 275 TOPS / 60 W ≈ 4.6 TOPS/W. If your automotive system can
    only dissipate 15W, the maximum sustained performance you can expect is not 275 TOPS, but rather:'
  options:
  - 'Peak performance: the maximum theoretical compute power of the chip.'
  - 'Computational efficiency: the number of operations delivered per watt of power.'
  - 'Memory bandwidth: how quickly the chip can access its memory.'
  - 'Economic cost: the price of the chip per unit of performance.'
  correct_index: 1
