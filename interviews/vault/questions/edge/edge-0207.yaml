title: The TOPS vs. TOPS/W Tradeoff
scenario: You're on the autonomous vehicle hardware team, evaluating accelerators for your next-gen perception stack. The system has a strict 15W thermal design power (TDP) budget.
question: When comparing chips, what does the 'TOPS/W' (tera-operations per second per watt) metric fundamentally represent?
details:
  realistic_solution: TOPS/W represents the computational efficiency of the accelerator. It tells you how many trillion operations the chip can perform for each watt of power it consumes. In a power-constrained environment, this determines the maximum sustained performance you can achieve within your thermal envelope.
  common_mistake: |
    **The Pitfall:** Fixating on peak TOPS.
    **The Rationale:** Engineers often assume the headline peak TOPS number is the most important metric, forgetting that power and thermal dissipation are the primary limiters at the edge.
    **The Consequence:** Selecting a chip with high peak TOPS but poor efficiency, leading to aggressive thermal throttling under a fixed thermal budget.
  napkin_math: |
    1. **Jetson AGX Orin Efficiency:** 275 TOPS / 60 W ≈ 4.58 TOPS/W.
    2. **Max Sustained Output:** For a 15W budget, Max TOPS = 15W * 4.58 TOPS/W = 68.7 TOPS.
    **Result: The system will deliver at most ~69 TOPS, a fraction of its 275 TOPS peak.**
  options:
  - 'Peak performance: the maximum theoretical compute power of the chip.'
  - 'Computational efficiency: the number of operations delivered per watt of power.'
  - 'Memory bandwidth: how quickly the chip can access its memory.'
  - 'Economic cost: the price of the chip per unit of performance.'
  correct_index: 1
