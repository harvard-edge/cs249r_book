title: 'Multi-Camera Ingestion on Jetson Edge'
scenario: 'A traffic intersection monitoring system on a Jetson AGX Orin must ingest and process 4 simultaneous 4K camera streams at 30 FPS.'
question: 'How should the data pipeline from camera ingestion to NPU inference be designed to prevent main LPDDR5 memory bandwidth starvation and frame dropping?'
details:
  realistic_solution: 'Raw 4K/30fps across 4 cameras generates ~3 GB/s of data. If the CPU decodes and converts color spaces in software, read/write overheads will choke the memory bus and starve the 275 TOPS NPU. The candidate must specify routing the RTSP streams directly to the dedicated NVDEC hardware decoder and using zero-copy memory (mapped directly to GPU memory space) for the color conversion and scaling before handing off to TensorRT.'
  common_mistake: |
    **The Pitfall:** Using CPU-based libraries like OpenCV (`cv2.VideoCapture`) for decoding.
    **The Rationale:** Candidates default to standard Python computer vision scripts without considering hardware offloading.
    **The Consequence:** Causing triple-buffering memory copies across the system bus, starving the 275 TOPS NPU and drastically dropping frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera streams: 4 simultaneous 4K (3840 $\times$ 2160) feeds.
    - Frame rate: 30 FPS.
    - Color depth: 3 bytes/pixel.

    **Calculations:**
    - Raw data rate: 4 $\times$ 3840 $\times$ 2160 $\times$ 3 $\times$ 30.

    **Conclusion & Interpretation:**
    - **Result: ~2.98 GB/s (Memory Bandwidth-Bound)**. Without hardware offloading and zero-copy memory, this raw bandwidth will starve the NPU.
