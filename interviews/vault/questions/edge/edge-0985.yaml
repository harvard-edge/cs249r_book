title: Multi-Camera Ingestion on Jetson Edge
scenario: A traffic intersection monitoring system on a Jetson AGX Orin must ingest
  and process 4 simultaneous 4K camera streams at 30 FPS.
question: Design the data pipeline from camera ingestion to NPU inference to prevent
  main LPDDR5 memory bandwidth starvation and frame dropping.
details:
  realistic_solution: Raw 4K/30fps across 4 cameras generates ~3 GB/s of data. If
    the CPU decodes and converts color spaces in software, read/write overheads will
    choke the memory bus and starve the 275 TOPS NPU. The candidate must specify routing
    the RTSP streams directly to the dedicated NVDEC hardware decoder and using zero-copy
    memory (mapped directly to GPU memory space) for the color conversion and scaling
    before handing off to TensorRT.
  common_mistake: Recommending CPU-based OpenCV decoding (`cv2.VideoCapture`), which
    causes triple-buffering memory copies across the ~204.8 GB/s system bus.
  napkin_math: 4 streams * 3840 * 2160 * 3 bytes * 30 fps = ~2.98 GB/s raw bandwidth
    per pipeline stage.
