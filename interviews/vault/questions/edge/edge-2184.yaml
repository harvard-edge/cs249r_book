title: Deterministic Latency with TensorRT on Orin
scenario: Your PyTorch model on Jetson Orin has P50 = 15ms but P99 = 45ms due to dynamic shapes and Python overhead. You convert to TensorRT with fixed input shapes.
question: What P99 latency should you expect after converting the 15 ms P50, 45 ms P99 PyTorch model to fixed-shape TensorRT, and why?
details:
  realistic_solution: 'PyTorch sources of variance: Python GIL contention (~5ms), dynamic memory allocation for variable shapes (~8ms spikes), CUDA kernel launch overhead with many small kernels (~3ms variance), and operator fusion opportunities missed (~4ms). TensorRT eliminates all four: (1) No Python in the inference path — pure C++ runtime. (2) Pre-allocated workspace — no cudaMalloc during inference. (3) Kernel fusion reduces launches from ~200 to ~30. (4) Layer fusion (Conv+BN+ReLU into single kernel). Expected TensorRT: P50 = 8ms (kernel fusion saves 7ms), P99 = 10ms (variance sources eliminated). P99/P50 ratio drops from 3.0 to 1.25. On Orin at 275 TOPS INT8: throughput doubles.'
  common_mistake: |
    **The Pitfall:** Expecting TensorRT to only improve average latency.
    **The Rationale:** Candidates focus on layer fusion but overlook the elimination of dynamic overheads like JIT and Python GIL.
    **The Consequence:** Underestimating the significant compression of the tail latency (P99) distribution.
  napkin_math: |
    * PyTorch baseline: P50=15ms, P99=45ms
    * Variance sources eliminated: Python (5ms) + malloc (8ms) + launch (3ms) + missed fusion (4ms) = 20ms
    * Theoretical P99 after elimination: 45ms - 20ms = 25ms
    * Fusion improves base latency: P50 drops to 8ms, P99 drops to 10ms
    * **P99/P50 ratio drops from 3.0 to 1.25, and throughput increases from 67 FPS to 125 FPS.**
