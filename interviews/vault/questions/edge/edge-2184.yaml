title: Deterministic Latency with TensorRT on Orin
scenario: Your PyTorch model on Jetson Orin has P50 = 15ms but P99 = 45ms due to dynamic shapes and Python overhead. You convert to TensorRT with fixed input shapes.
question: What P99 latency should you expect after converting the PyTorch model to fixed-shape TensorRT, and why?
details:
  realistic_solution: 'TensorRT eliminates variance sources: no Python GIL contention, pre-allocated workspaces avoid cudaMalloc, and aggressive operator fusion reduces kernel launch overheads. Expected TensorRT: P50 = 8ms, P99 = 10ms. The variance collapses significantly.'
  common_mistake: |
    **The Pitfall:** Expecting TensorRT to only improve average (P50) latency.
    **The Rationale:** Candidates focus purely on layer fusion (compute speedup) but overlook the elimination of dynamic runtime overheads (GIL, JIT, malloc).
    **The Consequence:** Underestimating the significant compression of the tail latency (P99) distribution, which is critical for real-time safety.
  napkin_math: |
    **Assumptions & Constraints:**
    - PyTorch baseline: P50=15ms, P99=45ms.
    - Variance sources: Python (5ms), malloc (8ms), launch (3ms), missed fusion (4ms). Total overhead = 20ms.

    **Calculations:**
    - Theoretical P99 after elimination: 45ms - 20ms = 25ms.
    - TensorRT fusion improves base compute: P50 drops to 8ms, P99 drops to ~10ms.
    - New P99/P50 ratio: 10 / 8 = 1.25 (vs previous 3.0).

    **Conclusion & Interpretation:**
    - **Result: P99 Drops to 10ms (Compute-Bound)**. The switch from dynamic PyTorch to static TensorRT drastically tightens the tail distribution.
