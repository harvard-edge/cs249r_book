title: The Residual Bottleneck
scenario: You're profiling a new vision model on a Jetson AGX Orin for an autonomous drone. You find a major bottleneck in a residual connection where two INT8 tensors, each with dimensions 512x512x256, are added together. Assume no data is cached.
question: What is the arithmetic intensity of adding two 512x512x256 INT8 tensors with no caching, and is the operation compute- or memory-bound?
details:
  realistic_solution: 'Calculate Arithmetic Intensity (AI) by taking total operations divided by total bytes moved (reads + writes). Since it falls massively below the hardware ridge point, the operation is hopelessly memory-bound.'
  common_mistake: |
    **The Pitfall:** Forgetting to calculate total bytes moved by excluding the output write operation.
    **The Rationale:** Engineers routinely count the two input reads but miss that the system must physically write the result back to DRAM.
    **The Consequence:** Incorrectly doubling the perceived AI, leading to bad roofline modeling and failed kernel optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor sizes: 512 x 512 x 256, INT8 (1 byte/element).
       - Operation: Element-wise addition.
       - Hardware: Jetson Orin (275 TOPS, 204.8 GB/s bandwidth).
    2. **Calculations:**
       - Total Elements = 512 * 512 * 256 = 67,108,864 elements.
       - Total Operations = 67.1M additions (1 op per output element).
       - Total Bytes Moved = 2 Reads + 1 Write = 3 * 67.1 MB = 201.3 MB.
       - Arithmetic Intensity = 67.1M ops / 201.3M bytes = 0.33 Ops/Byte.
       - Ridge Point = 275,000 GOPS / 204.8 GB/s = 1,343 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Severely Memory-Bound**. 0.33 is vastly lower than the 1,343 ridge point. Element-wise operations offer near-zero arithmetic intensity and inherently bottleneck on DRAM bandwidth.
  options:
  - ~1.0 Ops/Byte; it's memory-bound.
  - ~0.5 Ops/Byte; it's memory-bound.
  - ~0.33 Ops/Byte; it's compute-bound.
  - ~0.33 Ops/Byte; it's memory-bound.
  correct_index: 3
