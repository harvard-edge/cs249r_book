title: The Residual Bottleneck
scenario: You're profiling a new vision model on a Jetson AGX Orin for an autonomous drone. You find a
  major bottleneck in a residual connection where two INT8 tensors, each with dimensions `512x512x256`,
  are added together. To understand the performance limit, calculate the theoretical Arithmetic Intensity
  (AI) of this operation, assuming no data is cached. Based on your calculation, is this operation compute-bound
  or memory-bound?
question: "What is the arithmetic intensity of adding two 512x512x256 INT8 tensors with no caching, and is the operation compute- or memory-bound?"
details:
  realistic_solution: The operation is heavily memory-bound. Its Arithmetic Intensity is far below the
    hardware's ridge point, meaning performance is dictated by memory bandwidth, not the processor's compute
    capability. A low AI signifies that for every byte of data moved, very few calculations are performed.
    The performance of this layer is limited by the Jetson's 204.8 GB/s memory bandwidth.
  common_mistake: The most common mistake is miscalculating the 'Total Bytes Moved'. Engineers often forget
    to include all three data movements (reading two input tensors from DRAM, and writing one output tensor
    back to DRAM). Counting only the two input tensors yields an AI of 0.5 Ops/Byte, while counting only
    one tensor's worth of data gives an AI of 1.0 Ops/Byte. Both are arithmetically wrong and understate
    how severely memory-bound the operation is.
  napkin_math: "1. Total elements: 512 × 512 × 256 = 67,108,864 elements.\n2. Total operations: 67,108,864\
    \ additions (1 INT8 op per element).\n3. Total bytes moved: Read 2 input tensors + write 1 output\
    \ tensor = 3 × 67,108,864 × 1 byte (INT8) = 201,326,592 bytes ≈ 192 MB.\n4. Arithmetic Intensity:\
    \ 67.1×10^6 ops / 201.3×10^6 bytes = 0.33 Ops/Byte.\n5. Orin Ridge Point: 275 TOPS (INT8) / 204.8\
    \ GB/s = 1,343 Ops/Byte.\n   (Note: using the published dense INT8 spec of 275 TOPS. If using the\
    \ 200 TOPS dense figure from some datasheets: 200 / 204.8 = 976 Ops/Byte. Either way, 0.33 << ridge\
    \ point.)\n6. Conclusion: 0.33 << 1,343 → extremely memory-bound.\n   Achievable throughput = 204.8\
    \ GB/s × 0.33 = 67.6 GOPS (0.025% of peak 275 TOPS).\n   Time = 201.3 MB / 204.8 GB/s = 0.98 ms.\n\
    \   Element-wise ops have near-zero arithmetic intensity and are always bandwidth-limited."
  options:
  - ~1.0 Ops/Byte; it's memory-bound.
  - ~3.0 Ops/Byte; it's memory-bound.
  - ~0.33 Ops/Byte; it's compute-bound.
  - ~0.33 Ops/Byte; it's memory-bound.
  correct_index: 3
