title: Edge ESG Metrics and Energy Calculation
scenario: Your team must report the environmental impact of deploying a content moderation model at the edge. The INT8 moderation model requires exactly 20 Tera-Operations (TOP) per request. The compute engines operate at 50% utilization due to memory bottlenecks.
question: At 50% utilization on a 400 TOPS, 75W accelerator, what latency and energy per 20 TOP moderation request should you report?
details:
  realistic_solution: Determine the effective compute capacity by applying the utilization factor. Calculate latency by dividing required ops by effective compute rate, then compute energy using the TDP to establish ESG guardrails.
  common_mistake: |
    **The Pitfall:** Forgetting to factor in the 50% hardware utilization.
    **The Rationale:** Candidates overlook practical memory bottlenecks and use peak theoretical TOPS.
    **The Consequence:** Incorrectly calculating latency and energy, leading to severe ESG underreporting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator: 400 TOPS INT8, 75W.
       - Model: 20 TOP per request.
       - Utilization: 50%.
    2. **Calculations:**
       - Effective Compute = 400 TOPS * 0.50 = 200 TOPS.
       - Latency = 20 TOP / 200 TOPS = 0.1 seconds (100 ms).
       - Energy = 75W * 0.1s = 7.5 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 100 ms latency and 7.5 Joules per request. Compute-Bound.**
