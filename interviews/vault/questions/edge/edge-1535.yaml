title: Evaluating Compute Migration to Dataflow Accelerator
scenario: 'We are migrating a real-time object detection pipeline from an edge GPU to a dataflow accelerator to meet a strict 3W system power budget for a battery-powered camera. The accelerator lacks local DRAM, relying entirely on streaming data from host memory. You must evaluate two deployment alternatives: (A) partitioning the model to run large intermediate feature maps on the host CPU to reduce accelerator memory pressure, or (B) compiling the entire model onto the accelerator and streaming only the raw input and final output.'
question: Should you partition intermediate feature maps to the CPU or compile the entire model onto the accelerator under the 3W budget, and why?
details:
  realistic_solution: Option B is the superior approach for a dataflow architecture. Unlike a GPU's execution model that reads and writes intermediate tensors to global memory between kernel launches, a dataflow accelerator spatially maps the network onto its compute grid, passing activations directly between adjacent compute elements on-chip. Compiling the entire model minimizes host streaming overhead and keeps the chip operating efficiently within its 2.5W envelope.
  common_mistake: |
    **The Pitfall:** Selecting Option A to partition the model and manage intermediate activations on the host.
    **The Rationale:** Candidates apply a GPU-centric mental model, fearing the lack of local DRAM on the dataflow chip will cause a memory bottleneck.
    **The Consequence:** Unnecessary PCIe traffic is generated, thrashing host memory bandwidth and exceeding the 3W power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p RGB input: 1920 * 1080 * 3 bytes = 6.22 MB.
    - Target framerate: 30 FPS.
    - 3W system power budget.
    
    **Calculations:**
    - Option B Input streaming bandwidth = 6.22 MB * 30 = ~186 MB/s.
    - Option A Partitioning (512x64x64 INT8 tensor = 2.1 MB) adds: 2.1 MB * 2 ways * 30 FPS = 126 MB/s unnecessary PCIe traffic.
    
    **Conclusion & Interpretation:**
    - **Result: 186 MB/s (PCIe-Bound)**. Option B strictly limits host bandwidth to 186 MB/s, safely meeting the 3W budget by avoiding PCIe thrashing.
