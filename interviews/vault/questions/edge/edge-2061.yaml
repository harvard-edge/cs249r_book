title: Diagnosing Latency Spikes and Timeouts on Qualcomm Cloud AI 100 for Edge ML
scenario: A crucial real-time object detection model, performing INT8 inference, is deployed on a Qualcomm Cloud AI 100 accelerator, which provides 400 TOPS INT8 performance with 32 GB LPDDR4x memory, all within a 75W power envelope. Over the last hour, the production health dashboard has shown a 15% increase in average inference latency and a 2% increase in request timeouts for this service. No new code has been deployed, and other services on the same host are stable. You have access to standard telemetry, logs, and system metrics for the device and the application.
question: How would you approach diagnosing the root cause of this degradation and what specific metrics would you prioritize for investigation?
details:
  realistic_solution: '1. **Start with Dashboards & Alerts:** Review recent alerts and historical dashboard data to pinpoint when the degradation started and if it correlates with any external events (e.g., increased traffic, background processes).

    2. **Isolate Scope:** Confirm if the issue is global or localized to specific Qualcomm Cloud AI 100 devices or model instances.

    3. **System-level Metrics (Qualcomm AI 100 specific):** Investigate device utilization (TOPS utilization, memory bandwidth usage, PCIe bandwidth if applicable), temperature, power consumption (confirming it stays within 75W envelope and isn''t throttling), and any device-specific error counters or diagnostic logs provided by the Qualcomm SDK. Pay close attention to LPDDR4x memory bandwidth consumption, as it can be a bottleneck for large models.

    4. **Application-level Metrics:** Examine inference request queue depth, individual model execution times (P50, P95, P99 latency), garbage collection pauses (if applicable), and any custom telemetry related to data preprocessing or post-processing stages.

    5. **Identify Stragglers:** Look for individual requests taking unusually long, which might not significantly impact the average but drive P99 latency and timeouts. This could point to specific data patterns, device states, or resource contention.

    6. **Log Analysis:** Correlate application logs with system events. Look for errors, warnings, or unusual patterns (e.g., repeated retries, failed memory allocations) on the affected devices.

    7. **Dependency Check:** Although other services are stable, verify the health and performance of upstream data sources or downstream consumers.'
  common_mistake: |
    **The Pitfall:** Immediately assuming a model issue or a software bug.
    **The Rationale:** Candidates jump to application-level code without first ruling out hardware resource contention, driver issues, or data pipeline problems. They also look at aggregated metrics without drilling down into percentiles (e.g., P99 latency).
    **The Consequence:** Wasting time debugging stable code while missing physical layer issues like thermal throttling, PCIe contention, or long-tail stragglers.
  napkin_math: |
    * Expected vs. Observed Throughput: If the model requires 1 TOP/inference, expected QPS = 400 TOPS / 1 TOP = 400 FPS. If observed is 300 FPS, there is a 25% gap to investigate.
    * Memory Bandwidth Utilization: Reading 50MB per inference at 400 FPS requires 20 GB/s. This is within LPDDR4x limits (~34 GB/s), so memory bandwidth alone is unlikely the root cause unless there is contention.
    * Error Rate Analysis: A 2% timeout on 400 QPS = **8 failed requests per second**. This points towards systemic queue depth limits or hardware throttling rather than isolated anomalies.
