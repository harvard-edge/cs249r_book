title: The Multi-Model Scheduling Problem
scenario: Your autonomous vehicle's edge device runs 5 models simultaneously: YOLOv8m (18ms on GPU), LaneNet (6ms on DLA0), MiDaS-small (12ms on GPU), EfficientNet-B0 (4ms on DLA1), and MediaPipe Face (8ms on GPU). All must complete within 33ms (30 FPS). The GPU models alone sum to 38ms sequentially, which is over budget.
question: How do you schedule these across the Orin's GPU, 2 DLAs, and CPU to meet the deadline?
details:
  realistic_solution: Use the Orin's heterogeneous compute to create a **dependency-aware schedule** that maximizes parallelism across different hardware units. Offload LaneNet to DLA0 (6ms) and EfficientNet to DLA1 (4ms). Run the remaining three models (YOLOv8m, MiDaS, Face) concurrently on the GPU using CUDA streams. While sequential GPU time is 38ms, concurrent execution overlaps some compute and memory access, taking ~28.5ms. Since the DLAs run in parallel with the GPU, the overall pipeline latency is bottlenecked by the GPU at 28.5ms. This comfortably fits the 33ms budget (30 FPS) while saving ~15W of power.
  common_mistake: |
    **The Pitfall:** Running all GPU models in parallel using CUDA streams.
    **The Rationale:** Candidates assume parallel streams perfectly scale without contention.
    **The Consequence:** Models compete for the same SMs, yielding only ~25% overlap, resulting in ~28.5ms latency which leaves zero margin for error.
  napkin_math: |
    - Sequential GPU: 18 + 12 + 8 + 6 + 4 = 48ms.
    - Concurrent GPU (YOLO, MiDaS, Face) time: $38 * 0.75 \approx 28.5ms$.
    - Parallel DLAs: LaneNet (6ms) on DLA0, EfficientNet (4ms) on DLA1.
    - Total pipeline time bottlenecked by GPU: **28.5ms** (fits under 33ms).
    - Power savings: Offloading to DLAs saves **~15W**.
