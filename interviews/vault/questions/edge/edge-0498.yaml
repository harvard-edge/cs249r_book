title: The Drone's Dropped Frames
scenario: You are an ML Systems Engineer at an autonomous drone company. Your perception model, a Vision
  Transformer (ViT), is causing the flight controller to miss its 33ms (30 FPS) frame processing deadline
  on a Jetson AGX Orin. `nvsmi` shows the GPU is at 100% utilization, but the effective TOPS are far below
  the device's peak 275 TOPS. A teammate suggests replacing the ViT with a MobileNetV3, which uses depthwise
  separable convolutions, claiming it will be faster. Using the concept of Arithmetic Intensity, diagnose
  the performance bottleneck and determine the most likely reason the switch is justified.
details:
  realistic_solution: The diagnosis is a memory bandwidth bottleneck. The Vision Transformer's self-attention
    mechanism has low Arithmetic Intensity (AI) because it performs many non-local memory accesses for
    its all-to-all patch comparisons. The Jetson AGX Orin has a high Ridge Point (~1,342 Ops/Byte), meaning
    it requires high-AI workloads to achieve peak performance. Since the ViT's AI is below the Orin's
    Ridge Point, it is memory-bound. A MobileNetV3, using depthwise separable convolutions, has much higher
    data reuse and therefore higher AI. This makes it compute-bound on the Orin, allowing it to better
    saturate the powerful compute cores and achieve performance closer to its peak TOPS rating, thus meeting
    the real-time deadline.
  common_mistake: Confusing 100% GPU utilization with 100% computational throughput. A GPU can be fully
    'utilized' while being stalled, waiting for data from memory. This is a classic sign of a memory-bandwidth-bound
    workload. Another common mistake is assuming Transformers are just 'slow' without a hardware-specific
    reason.
  napkin_math: 1. **Find the Hardware Constraint:** From the playbook, the Jetson AGX Orin's Ridge Point
    is ~1,342 Ops/Byte. A workload's Arithmetic Intensity (AI) must be greater than this to be compute-bound.
  options:
  - The ViT is memory-bandwidth-bound due to the low arithmetic intensity of attention; the CNN's higher
    arithmetic intensity makes it compute-bound and a better fit for the Orin's architecture.
  - The GPU is at 100%, so the system is thermally throttling. A new model won't help until we add a bigger
    heatsink.
  - The ViT model is too large and is causing slow data swapping from NVMe storage, which is the bottleneck.
  - The model has too many layers. Reducing the depth of the ViT is the only way to meet the latency target,
    as model family doesn't matter.
