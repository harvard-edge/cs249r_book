title: Edge Real-Time Anomaly Detection with Qualcomm Cloud AI 100
scenario: 'Your team is deploying a real-time anomaly detection system for smart city traffic management. Each critical intersection is equipped with a Qualcomm Cloud AI 100 device (32 GB LPDDR4x, 400 TOPS INT8, 75W). This device receives raw video and LIDAR sensor streams from 8 cameras and 4 LIDAR units, each generating an average of 100 MB/s of data.'
question: What challenges and design choices matter for real-time processing of 1.2 GB/s camera and LIDAR streams on a Qualcomm Cloud AI 100 edge device?
details:
  realistic_solution: 'Implement a highly optimized, asynchronous data ingestion pipeline utilizing hardware-accelerated codecs (if available on the Qualcomm Cloud AI 100) and Direct Memory Access (DMA) to minimize CPU overhead. Leverage the 400 TOPS (INT8) by ensuring all ML models are quantized and optimized for the device''s NPU. Design a multi-stage processing architecture: initial lightweight models or filters for high-frequency data, followed by more complex models for anomaly scoring on pre-filtered, aggregated features. Employ adaptive sampling or dynamic model switching based on real-time sensor load and priority. Utilize efficient data structures and memory pooling with the 32 GB LPDDR4x, potentially using circular buffers for temporary storage and prioritizing feature extraction over raw data storage at the edge. Integrate robust monitoring and logging for operational stability, including thermal sensors to manage the 75W power envelope.'
  common_mistake: |
    **The Pitfall:** Underestimating I/O bottlenecks and thermal management challenges.
    **The Rationale:** Candidates often focus purely on the ML model's compute requirements, neglecting the massive memory bandwidth needed to move 1.2 GB/s of raw data and the physical realities of running a 75W chip outdoors.
    **The Consequence:** Designing a system that either throttles continuously due to heat or drops frames because the memory bus is saturated before data reaches the NPU.
  napkin_math: |
    * Total ingress data rate: (8 cameras * 100 MB/s) + (4 LIDAR * 100 MB/s) = 1200 MB/s = **9.6 Gbps**.
    * Total frames/sec: (8 + 4) * 30 = 360 frames/sec.
    * Total pixels/points per second (assuming 2MP avg): 360 * 2 * 10^6 = 720 * 10^6.
    * Total INT8 operations needed: 720 * 10^6 * 500 ops/pixel = 360 * 10^9 ops = **360 GOPS**.
    * The hardware offers 400 TOPS (400,000 GOPS), meaning compute is abundant, but buffering 1 second of raw data takes 1.2 GB, heavily stressing memory bandwidth.
