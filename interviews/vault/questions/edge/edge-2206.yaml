title: Edge Active Learning Upload Budget
scenario: An edge defect detector captures 200,000 frames/day. Uploading every frame
  is impossible, so an uncertainty sampler keeps 0.5% for labeling. Each compressed
  frame is 300 KB. Size daily upload volume and decide if a 2 GB/day link budget is
  enough.
question: Does uploading 0.5% of 200,000 edge frames/day at 300 KB each fit a 2 GB/day
  link budget?
details:
  realistic_solution: The sampler keeps 1,000 frames/day. At 300 KB each, upload volume
    is 300 MB/day, which fits within 2 GB/day. This leaves headroom for metadata and
    retries, assuming uncertainty sampling is representative enough for model improvement.
  common_mistake: Using the raw frame volume instead of the selected sample volume,
    or forgetting to budget metadata and retries.
  napkin_math: Selected frames = 200,000 x 0.005 = 1,000. Upload = 1,000 x 300 KB
    = 300 MB/day.
