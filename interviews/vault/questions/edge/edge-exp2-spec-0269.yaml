title: Hailo-8 Multi-Stream Zero-Copy DMA Pipeline Design
scenario: You are designing a smart intersection traffic monitoring system using an edge host connected
  to a Hailo-8 dataflow accelerator. The system ingests 4 independent 1080p (1920x1080) RGB video streams
  at 30 FPS. Since the Hailo-8 has no local DRAM and relies entirely on streaming data directly from host
  memory (operating at 2.5W), CPU overhead from data movement is a critical bottleneck. Specify a complete
  host-to-device memory allocation and data movement pipeline that avoids frame dropping while keeping
  host CPU utilization minimal, enabling the Hailo-8 to utilize its 26 TOPS INT8 capacity without stalling.
question: "How would you build the host-to-Hailo-8 memory pipeline for four 1080p30 streams to avoid frame drops and minimize CPU copies?"
details:
  realistic_solution: The optimal specification uses a zero-copy data pipeline based on dma_buf for buffer
    sharing between the camera interface (V4L2) and the Hailo-8 PCIe driver. Memory must be allocated
    as contiguous, pinned (page-locked) memory in kernel space. The camera writes directly into these
    pinned buffers via its own DMA, and the Hailo-8 reads from the exact same physical memory addresses
    via PCIe DMA, completely bypassing the CPU. A multi-buffer ring queue is specified to overlap capture,
    inference, and post-processing.
  common_mistake: Candidates often propose a standard user-space allocation (like malloc or cv::Mat) followed
    by a blocking PCIe transfer, failing to realize this incurs costly CPU page faults and user-to-kernel
    space copies. They miss that without a zero-copy pipeline, the host CPU will waste cycles moving data
    between the camera driver buffer and the Hailo-8 inference buffer, starving the dataflow architecture.
  napkin_math: 4 cameras * 1920 * 1080 pixels * 3 bytes (RGB) * 30 FPS = ~746 MB/s of raw ingest data.
    A naive copy-based pipeline would move this data at least 3 times (Camera->RAM, RAM->User, User->Hailo),
    consuming ~2.2 GB/s of memory bandwidth and thrashing the CPU. With a zero-copy DMA pipeline, the
    CPU copies 0 payload bytes. To keep the 26 TOPS accelerator fed continuously without host DRAM bottlenecks,
    a 3-deep ring buffer per stream (Capture, Infer, Consume) requires 4 streams * 6.22 MB/frame * 3 buffers
    = ~74.6 MB of continuously pinned host memory.
