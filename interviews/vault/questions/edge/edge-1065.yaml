title: 'Latency Decomposition: Compare Jetson Orin vs. Hailo-8 for Object Detection Latency'
scenario: You are evaluating two edge platforms for a real-time object detection pipeline running YOLOv8-small (11M params, INT8). The pipeline includes: image capture (1ms), pre-processing (resize + normalize), inference, NMS post-processing, and output encoding. Platform A has 275 TOPS INT8. Platform B has 26 TOPS INT8.
question: What is the realistic Platform A inference time for a 6.5 GFLOP INT8 YOLOv8-small model, and why is an estimate of 59ms mathematically wrong?
details:
  realistic_solution: 'A 6.5 GFLOP model on Jetson Orin''s 275 TOPS runs in ~0.059ms at realistic 40% utilization. Claiming 59ms implies unit confusion during the calculation (e.g., dividing 6.5 GOPS by 110 TOPS to get 0.059, and mistakenly assuming the result is in seconds rather than milliseconds). 0.059 seconds is 59ms. 59ms actual latency would imply the hardware is operating at only 110 GOPS (0.11 TOPS) — roughly 1000× too slow.'
  common_mistake: |
    **The Pitfall:** Suffering from unit confusion by dividing GOPS by TOPS and treating the result as milliseconds instead of seconds.
    **The Rationale:** Moving too quickly through the math and failing to sanity-check the order of magnitude.
    **The Consequence:** Recommending against highly capable hardware due to an artificial 1000x miscalculation in expected latency.
  napkin_math: |
    * **Peak Compute**: 275 TOPS INT8 = 275,000 GOPS.
    * **Model Requirement**: 6.5 GOPS.
    * **Peak Inference Time**: 6.5 / 275,000 = 0.0000236 seconds = 0.0236 ms.
    * **Realistic Utilization (40%)**: 6.5 / (275,000 × 0.40) = 6.5 / 110,000 = 0.000059 seconds = 0.059 ms.
    * **Conclusion**: 59ms implies 1000x underutilization. The actual inference time is **0.059 ms**.
