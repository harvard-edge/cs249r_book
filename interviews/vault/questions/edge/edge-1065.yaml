title: 'Latency Decomposition: Compare Jetson Orin vs. Hailo-8 for Object Detection
  Latency'
scenario: 'You are evaluating two edge platforms for a real-time object detection
  pipeline running YOLOv8-small (11M params, INT8). The pipeline includes: image capture
  (1ms), pre-processing (resize + normalize), inference, NMS post-processing, and
  output encoding. Compare Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) vs. Hailo-8
  (26 TOPS INT8, 2.5W) for end-to-end latency at 30fps requirement (33ms budget).'
question: What is the realistic Jetson Orin inference time for a 6.5 GFLOP INT8 YOLOv8-small
  model, and why is 59ms wrong?
details:
  realistic_solution: 6.5 GFLOP model on Jetson Orin's 275 TOPS runs in ~0.06ms at
    realistic utilization. 59ms would imply the hardware performs at 0.275 GOPS —
    6 orders of magnitude too slow.
  common_mistake: Comparing only inference TOPS without accounting for pre/post-processing
    overhead, which runs on CPU and dominates on Hailo-8 since it has no general-purpose
    CPU.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model requiring 6.5 GFLOPs: 6.5G / 275T
    = 6.5×10^9 / 110×10^12 (at ~40% util) → at peak: 6.5G/275T = 0.0000236s = 0.0236ms.
    With typical 40% utilization and INT8 efficiency: 6.5G / (275T × 0.4) = 0.059ms
    (not 59ms — that would require 0.275 GOPS not TOPS).'
