title: 'Latency Decomposition: Compare Jetson Orin vs. Hailo-8 for Object Detection
  Latency'
scenario: 'You are evaluating two edge platforms for a real-time object detection
  pipeline running YOLOv8-small (11M params, INT8). The pipeline includes: image capture
  (1ms), pre-processing (resize + normalize), inference, NMS post-processing, and
  output encoding. Compare Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) vs. Hailo-8
  (26 TOPS INT8, 2.5W) for end-to-end latency at 30fps requirement (33ms budget).'
question: What is the realistic Jetson Orin inference time for a 6.5 GFLOP INT8 YOLOv8-small
  model, and why is 59ms wrong?
details:
  realistic_solution: 'A 6.5 GFLOP model on Jetson Orin''s 275 TOPS runs in ~0.059ms at realistic 40% utilization. Claiming 59ms implies unit confusion during the calculation (e.g., dividing 6.5 GOPS by 110 TOPS to get 0.059, and mistakenly assuming the result is in seconds rather than milliseconds). 0.059 seconds is 59ms. 59ms actual latency would imply the hardware is operating at only 110 GOPS (0.11 TOPS) \u2014 roughly 1000\u00d7 too slow.'
  common_mistake: 'Comparing only inference TOPS without accounting for pre/post-processing overhead, which runs on CPU and dominates on Hailo-8 since it has no general-purpose CPU. Another mistake is unit confusion: mistakenly assuming that dividing GOPS by TOPS directly yields seconds instead of milliseconds, leading to a 1000x error.'
  napkin_math: 'Jetson Orin: 275 TOPS INT8 = 275,000 GOPS. Model requiring 6.5 GOPS: 6.5 / 275,000 = 0.0000236s = 0.0236ms at peak. With typical 40% utilization: 6.5 / (275,000 \u00d7 0.4) = 6.5 / 110,000 = 0.000059 seconds = 0.059ms. A 59ms latency would mean 6.5 / 0.059s = 110 GOPS, which is a 1000\u00d7 underutilization.'
