title: Distillation Arithmetic Intensity on Hailo-8
scenario: Your team is deploying an object detector on a Hailo-8 accelerator (26 TOPS INT8, 2.5W), a dataflow architecture with no local DRAM that streams data from host memory over a 4 GB/s PCIe link. You used knowledge distillation to train a compact student model that requires only 1 GOPS per inference with an arithmetic intensity of 10 OPS/byte. Your baseline is a pruned teacher model requiring 5 GOPS per inference with an arithmetic intensity of 100 OPS/byte.
question: Why is the 1 GOP distilled student slower than the 5 GOP pruned teacher on a DRAM-less Hailo-8 with a 4 GB/s PCIe link?
details:
  realistic_solution: On a dataflow accelerator like the Hailo-8, which relies on streaming from host memory, performance is strictly bottlenecked by the PCIe bandwidth if the model has low arithmetic intensity. The distilled student model starves the compute units because it cannot fetch weights and activations fast enough. The computationally heavier pruned model better utilizes the 26 TOPS compute capacity because its higher arithmetic intensity requires less data streaming per operation, avoiding the memory wall.
  common_mistake: |
    **The Pitfall:** Assuming that reducing total operations always reduces latency.
    **The Rationale:** Candidates often assume that reducing total operations (GOPS) through distillation automatically reduces latency, failing to consider arithmetic intensity and memory bandwidth bottlenecks.
    **The Consequence:** Deploying a "smaller" model that starves the compute units because it cannot fetch weights and activations fast enough, leading to worse performance.
  napkin_math: |
    * **Distilled Student Memory Bound:** 1 GOPS / 10 OPS/byte = 0.1 GB/frame
    * **Distilled Max FPS:** 4 GB/s / 0.1 GB/frame = 40 FPS
    * **Pruned Teacher Memory Bound:** 5 GOPS / 100 OPS/byte = 0.05 GB/frame
    * **Pruned Max FPS:** 4 GB/s / 0.05 GB/frame = 80 FPS
    * **Conclusion:** Both models are memory-bound, but the **pruned teacher is 2x faster** (80 FPS vs 40 FPS) due to its higher arithmetic intensity.
