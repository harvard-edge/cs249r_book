title: Orin DMA and Inference Pipelining
scenario: An autonomous tractor processes uncompressed 4K camera frames sent over PCIe. Frame transfer takes 10ms, and INT8 GPU inference takes 12ms.
question: Design an overlapping execution schedule using CUDA streams and DMA engines to maximize total system frames-per-second.
details:
  realistic_solution: Architect a dual-stage execution pipeline leveraging explicit CUDA streams and asynchronous memory copies mapped to pinned (page-locked) host memory. By explicitly separating the H2D (Host-to-Device) copy into a dedicated stream, the hardware DMA engine handles the 10ms transfer of Frame N+1 completely in parallel with the GPU executing the 12ms inference on Frame N, masking the communication latency.
  common_mistake: |
    **The Pitfall:** Executing memory transfers and inference synchronously, or failing to use pinned memory.
    **The Rationale:** Candidates write standard synchronous code (e.g., `cudaMemcpy`) without configuring the OS to lock memory pages, preventing the DMA hardware from operating asynchronously.
    **The Consequence:** The pipeline operates sequentially, adding the transfer and compute times together, slashing overall throughput by nearly 50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Transfer Time (H2D): 10 ms
    - Inference Time: 12 ms

    **Calculations:**
    - Synchronous execution time = 10 ms + 12 ms = 22 ms per frame
    - Synchronous FPS = 1000 / 22 = 45.4 FPS
    - Pipelined execution time = max(10 ms, 12 ms) = 12 ms per frame
    - Pipelined FPS = 1000 / 12 = 83.3 FPS

    **Conclusion & Interpretation:**
    - **Result: 83.3 FPS (Compute-Bound)**. Utilizing asynchronous DMA increases throughput from 45 FPS to 83 FPS.
