title: Orin DMA and Inference Pipelining
scenario: An autonomous tractor uses a Jetson AGX Orin to process uncompressed 4K
  camera frames sent over PCIe. Frame transfer takes 10ms, and INT8 GPU inference
  takes 12ms.
question: Design an overlapping execution schedule using CUDA streams and DMA engines
  to maximize total system frames-per-second.
details:
  realistic_solution: The solution requires allocating pinned memory on the host and
    using asynchronous DMA transfers mapped to one CUDA stream, while inference runs
    on another. In steady state, while the GPU executes inference on Frame N (taking
    12ms), the DMA engine simultaneously copies Frame N+1 (taking 10ms). The pipeline
    bottleneck becomes the maximum of the two stages (12ms), resulting in a throughput
    of 1/0.012 = 83.3 FPS, fully hiding the communication cost.
  common_mistake: Adding the times together sequentially (22ms, ~45 FPS) or failing
    to specify pinned host memory which is required for async DMA.
  napkin_math: 1000ms / max(10ms, 12ms) = 83.3 FPS.
