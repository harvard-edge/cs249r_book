title: Analyze Prefill vs Decode Cost Split on Jetson Orin
scenario: A Jetson Orin NX (100 TOPS, 64 GB/s memory bandwidth, 8GB LPDDR5) runs a 7B parameter language
  model in INT4 (3.5GB model size). A typical request has 512 prompt tokens (prefill) and generates 128
  output tokens (decode). Analyze the time split between prefill and decode phases, and explain why they
  have different compute characteristics.
details:
  realistic_solution: 'Prefill (512 tokens in parallel): FLOPs = 2 × 7B × 512 = 7,168 GFLOP. At 100 TOPS
    effective (INT4): time = 7.168T / 100T = 71.7ms. Memory: streaming 3.5GB weights once: 3.5GB / 64GB/s
    = 54.7ms. Prefill is compute-bound (71.7ms > 54.7ms). Decode (1 token at a time, 128 iterations):
    per token FLOPs = 2 × 7B = 14 GFLOP. Memory: load 3.5GB weights each step: 3.5GB / 64GB/s = 54.7ms
    per token. Decode is memory-bound. Total decode: 128 × 54.7ms = 7,002ms = 7.0s. Total: prefill 71.7ms
    + decode 7,002ms = 7,074ms. Decode dominates 99%.'
  common_mistake: Treating prefill and decode as having the same per-token cost; prefill processes all
    512 tokens in parallel (compute-bound) while decode generates one token at a time (memory-bandwidth-bound).
  napkin_math: 'Prefill: 2×7B×512 FLOPs / 100 TOPS = 71.7ms (compute) vs 3.5GB/64GBs = 54.7ms (memory)
    → compute-bound. Decode/token: 14G/100T=0.14ms (compute) vs 3.5GB/64GBs=54.7ms (memory) → memory-bound
    by 391×. Total decode: 128×54.7ms=7.0s >> prefill 72ms.'
