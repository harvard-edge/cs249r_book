title: Optimizing Data for Edge AI on Hailo-8
scenario: Your team is deploying a real-time object detection model on the Hailo-8 edge AI accelerator,
  which boasts 26 TOPS (INT8) and a typical power consumption of 2.5W. The initial model performs well
  in the lab, but struggles with generalization and inference latency in diverse real-world scenarios
  due to a large, uncurated training dataset. You suspect 'the data wall problem' is hindering performance
  and slowing down development cycles. How would you approach identifying and mitigating this issue, specifically
  leveraging data efficiency and selection techniques given the Hailo-8's constraints?
question: "How would you approach identifying and mitigating this issue, specifically leveraging data efficiency and selection techniques given the Hailo-8's constraints?"
details:
  realistic_solution: Implement coreset selection or active learning to strategically prune the dataset
    to its most informative samples. For instance, use a technique like uncertainty sampling (e.g., entropy-based
    or margin-based) to identify data points where the current model is least confident. Alternatively,
    employ a diversity-based coreset selection method to ensure the reduced dataset still represents the
    overall data distribution effectively. This reduced, high-value dataset can then be used for retraining,
    significantly reducing training time and potentially improving generalization with fewer samples,
    thus optimizing the utilization of the Hailo-8's compute capacity and minimizing energy overhead.
  common_mistake: A common mistake is to continuously collect more data without a strategic selection
    process, assuming 'more data is always better'. This often leads to increased labeling costs, longer
    training times, and potentially introducing noise or redundant information that does not improve model
    generalization, especially on resource-constrained edge devices like the Hailo-8 where every operation
    counts.
  napkin_math: Consider a scenario where the original dataset requires 100 epochs to train, with each
    epoch taking 20 minutes on your training hardware. If coreset selection reduces the dataset size by
    50% while maintaining or improving performance, training time could be significantly cut. Assuming
    a linear reduction, this would save approximately 10 minutes per epoch (20 min * 0.50), leading to
    a total saving of 100 epochs * 10 min/epoch = 1000 minutes (16.67 hours) of training time. This directly
    impacts the development cycle and reduces computational costs. Furthermore, if a smaller, more efficient
    model can be trained, it will lead to higher FPS on the Hailo-8, potentially increasing effective
    TOPS utilization beyond the nominal 26 TOPS due to optimized data flow and reduced memory bandwidth
    usage, while still adhering to the 2.5W power budget.
