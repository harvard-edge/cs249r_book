title: The Multi-Sensor Contention Collapse
scenario: You are designing the perception system for an autonomous delivery robot using a Jetson AGX Orin. The system must fuse data from three 4K cameras and one LiDAR sensor in real-time (33ms cycle). To accelerate the vision models, the team used 2:4 structured pruning, achieving a 2x speedup in standalone benchmarks. However, during integration testing, the end-to-end pipeline latency is now worse than with the original dense models. The system is suffering from massive, unpredictable frame drops.
question: What is the most likely physical bottleneck causing this counter-intuitive result, and how would you redesign the system software architecture to resolve it?
details:
  realistic_solution: The physical bottleneck is the shared DRAM memory bandwidth. While structured pruning reduces the computational load (FLOPs), it transforms the memory access patterns from mostly contiguous to sparse and irregular. In a standalone benchmark, this is fine. But in a multi-sensor system, you now have multiple models plus the LiDAR processing pipeline all making simultaneous, chaotic requests to the single 204.8 GB/s memory controller on the Orin. This leads to severe memory bandwidth contention, causing all processes to stall waiting for data. The dense model, though computationally slower, had more predictable, sequential memory access patterns that were easier for the DRAM controller to schedule efficiently, resulting in better *system-wide* throughput.
  common_mistake: |
    **The Pitfall:** Focusing only on compute (FLOPs) and ignoring memory access patterns.
    **The Rationale:** Candidates see slow inference and assume the CPU or GPU compute is bottlenecked.
    **The Consequence:** They suggest further pruning or quantization, which exacerbates the irregular memory access patterns causing the contention.
  napkin_math: |
    - **Orin DRAM Bandwidth:** 204.8 GB/s shared.
    - **Camera Input:** 3 cameras × (3840×2160×3 bytes×30fps) = **2.2 GB/s**.
    - **Vision Models (Sparse):** ~50 GB/s each × 3 = **150 GB/s**.
    - **LiDAR Processing:** **~30 GB/s**.
    - **Total Demand:** 182 GB/s (89% of theoretical 204.8 GB/s).
    - **Sparse Overhead:** Sparse access causes DRAM row-buffer misses, dropping effective bandwidth by 30-40%.
    - **Conclusion:** Usable bandwidth (~130 GB/s) is far less than demand (182 GB/s), leading to severe contention stalls.
