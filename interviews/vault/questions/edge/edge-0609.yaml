title: The Multi-Sensor Contention Collapse
scenario: You are designing the perception system for an autonomous delivery robot using a Jetson AGX Orin. The system fuses data from three 4K cameras and one LiDAR in real-time. To accelerate models, the team used 2:4 structured pruning, achieving a 2x speedup standalone. However, during integration, end-to-end latency is worse than dense models, dropping massive frames.
question: What is the most likely physical bottleneck causing this counter-intuitive result, and how would you redesign the system software architecture to resolve it?
details:
  realistic_solution: The system is choking on unified DRAM memory bandwidth contention. Pruning collapses computational FLOPs but fractures contiguous data access into highly irregular sparse patterns. When all three models and the LiDAR pipeline attempt concurrent scattered accesses across the single memory controller, it violently degrades caching efficiency. Switch to temporal model staggering or lock memory channels using advanced OS partitioning.
  common_mistake: |
    **The Pitfall:** Narrowly indexing strictly on analytical FLOP counts while ignoring holistic SoC memory topology.
    **The Rationale:** Candidates mechanically apply sparsity benchmarks harvested from isolated, single-model tests directly to multi-stream architectures.
    **The Consequence:** Sparse operations shatter memory controller row-buffer predictions, violently starving the entire pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: Jetson AGX Orin, Peak DRAM Bandwidth = 204.8 GB/s.
       - Streams: Camera ingress (2.2 GB/s), Sparse models (150 GB/s), LiDAR pipeline (30 GB/s).
       - Sparse Row-Buffer penalty reduces effective throughput by ~30%.
    2. **Calculations:**
       - Total Request Bandwidth = 2.2 + 150 + 30 = ~182.2 GB/s.
       - Effective Peak Bandwidth = 204.8 GB/s * 0.70 = ~143.3 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Devastating I/O Contention**. Requested sparse bandwidth (182.2) explicitly breaches effective hardware capacity (143.3), destroying system cadence.
