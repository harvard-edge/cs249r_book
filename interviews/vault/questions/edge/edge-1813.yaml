title: Design Memory Management for Multi-Model Pipeline on Jetson Orin
scenario: We are deploying a real-time autonomous robotics perception system on an
  NVIDIA Jetson Orin edge device. The system requires running an object detection
  model on the Ampere GPU and a semantic segmentation model on the DLA accelerator
  concurrently. Given the shared 64 GB LPDDR5 unified memory and a strict 60W TDP
  budget, design a memory management specification that handles peak memory pressure
  during concurrent inference, prevents OS-level OOM killer eviction of critical processes,
  and minimizes memory fragmentation over extended operational periods.
question: How would you design memory management for concurrent GPU and DLA inference
  on Jetson Orin without OOMs or fragmentation?
details:
  realistic_solution: A robust specification involves pre-allocating static memory
    pools (tensor arenas) for the maximum expected tensor sizes during system initialization
    to eliminate runtime fragmentation and allocation overhead. The design should
    utilize zero-copy memory access between the CPU and Ampere GPU/DLA to avoid redundant
    buffer duplication. Additionally, it must implement an application-level memory
    watchdog that gracefully degrades pipeline resolution or drops frames before hitting
    the system's critical OS-level OOM thresholds.
  common_mistake: Candidates often treat the 64 GB LPDDR5 as abundant and fail to
    account for unified memory architecture where CPU, GPU, and DLA share the same
    pool. They frequently overlook memory fragmentation caused by dynamic tensor allocations
    during variable-sized inputs and do not implement aggressive memory pooling or
    pre-allocation strategies.
  napkin_math: 'Total unified memory: 64 GB LPDDR5 (Jetson AGX Orin 64GB, 60W TDP).
    Reserved for OS and device drivers: ~4 GB. Available for pipeline: 60 GB. Ampere
    GPU Object Detector weights (FP16): 6 GB. DLA Segmentation weights (INT8): 2 GB.
    Pre-allocated static I/O buffers for DLA: 100 MB. Pre-allocated tensor arena for
    GPU inference (batch size 4): 4 * 25 MB = 100 MB. Video decode ring buffer (5
    seconds @ 30fps, 4K RGB): 150 * 3840 * 2160 * 3 bytes = ~3.7 GB. Total static
    footprint = 6 + 2 + 0.1 + 0.1 + 3.7 = ~11.9 GB. With ~48 GB headroom remaining,
    raw capacity is fine, but the specification must enforce zero dynamic allocations
    in the 60W TDP hot path to prevent fragmentation from exhausting the contiguous
    blocks needed by the unified memory controller.'
