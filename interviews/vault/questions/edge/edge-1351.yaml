title: Multi-Process mmap on Qualcomm Cloud AI 100
scenario: 'You are deploying three concurrent inference processes of an 8-billion parameter LLM quantized to INT8 on an on-premise Qualcomm Cloud AI 100 accelerator. The card features 32 GB of LPDDR4x memory and operates at 75W. To fit within the memory constraints while supporting independent process requests, you leverage memory-mapped (mmap) weight loading so the base model weights are shared in memory across all three processes.'
question: For three INT8 8B LLM processes on 32 GB Cloud AI 100, what are the weight footprints with mmap versus independent loading and remaining memory?
details:
  realistic_solution: 'Using memory mapping (mmap) for the model weights allows the OS page cache to load the 8B INT8 weights into the physical LPDDR4x memory exactly once, and all three processes will map these same physical pages to their virtual address spaces. This avoids redundant memory allocation, ensuring the 32 GB capacity is preserved for dynamic memory needs like KV caches and activations.'
  common_mistake: |
    **The Pitfall:** Multiplying the model size by the number of processes to calculate memory usage.
    **The Rationale:** Candidates familiar with standard memory allocation assume each process requires its own distinct copy of the weights in physical RAM.
    **The Consequence:** Incorrectly concluding the system will run out of memory, or unnecessarily limiting the number of concurrent processes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 billion parameters in INT8 = 8 GB.
    - 3 concurrent inference processes.
    - Cloud AI 100 memory: 32 GB.

    **Calculations:**
    - Independent loading weights memory = 3 * 8 GB = 24 GB.
    - Shared mmap weights memory = 1 * 8 GB = 8 GB.
    - Memory savings = 24 GB - 8 GB = 16 GB.
    - Remaining memory for KV cache/activations = 32 GB - 8 GB = 24 GB.

    **Conclusion & Interpretation:**
    - **Result: 24 GB Remaining (Memory Capacity Sizing).** Memory mapping avoids redundant allocation, preserving the 32 GB capacity for dynamic memory needs.
