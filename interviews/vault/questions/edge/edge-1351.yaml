title: Multi-Process mmap on Qualcomm Cloud AI 100
scenario: You are deploying three concurrent inference processes of an 8-billion parameter
  LLM quantized to INT8 on an on-premise Qualcomm Cloud AI 100 accelerator. The card
  features 32 GB of LPDDR4x memory and operates at 75W. To fit within the memory constraints
  while supporting independent process requests, you leverage memory-mapped (mmap)
  weight loading so the base model weights are shared in memory across all three processes.
  Calculate the total weight memory footprint using mmap versus standard independent
  loading, and determine the remaining memory available for KV caches and activations.
question: For three INT8 8B LLM processes on 32 GB Cloud AI 100, what are the weight
  footprints with mmap versus independent loading and remaining memory?
details:
  realistic_solution: Using memory mapping (mmap) for the model weights allows the
    OS page cache to load the 8B INT8 weights into the physical LPDDR4x memory exactly
    once, and all three processes will map these same physical pages to their virtual
    address spaces. This avoids redundant memory allocation, ensuring the 32 GB capacity
    is preserved for dynamic memory needs like KV caches and activations.
  common_mistake: Candidates often calculate the memory requirement by multiplying
    the model size by the number of processes, failing to realize that mmap allows
    the OS to share read-only pages across multiple processes. They might also mistakenly
    use FP16 sizes instead of calculating based on the INT8 quantization specified.
  napkin_math: '1 parameter in INT8 = 1 byte. 8 billion parameters = 8 GB for weights.
    Standard independent loading for 3 processes: 3 * 8 GB = 24 GB of weights. With
    mmap shared weights: 1 * 8 GB = 8 GB total for weights. Memory savings: 24 GB
    - 8 GB = 16 GB. Total memory on Qualcomm Cloud AI 100 = 32 GB. Remaining memory
    for KV cache/activations = 32 GB - 8 GB = 24 GB (or 8 GB per process).'
