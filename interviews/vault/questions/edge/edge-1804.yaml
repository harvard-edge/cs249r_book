title: Hailo-8 Multi-Stream Zero-Copy DMA Pipeline Design
scenario: You are designing a smart intersection traffic monitoring system using an edge host connected to a Hailo-8 dataflow accelerator. The system ingests 4 independent 1080p (1920x1080) RGB video streams at 30 FPS. Since the Hailo-8 has no local DRAM and relies entirely on streaming data directly from host memory (operating at 2.5W), CPU overhead from data movement is a critical bottleneck.
question: How would you build the host-to-Hailo-8 memory pipeline for four 1080p30 streams to avoid frame drops and minimize CPU copies?
details:
  realistic_solution: The optimal specification uses a zero-copy data pipeline based on dma_buf for buffer sharing between the camera interface (V4L2) and the Hailo-8 PCIe driver. Memory must be allocated as contiguous, pinned (page-locked) memory in kernel space. The camera writes directly into these pinned buffers via its own DMA, and the Hailo-8 reads from the exact same physical memory addresses via PCIe DMA, completely bypassing the CPU. A multi-buffer ring queue is specified to overlap capture, inference, and post-processing.
  common_mistake: |
    **The Pitfall:** Standard user-space memory allocations.
    **The Rationale:** Candidates often propose standard `malloc` or `cv::Mat` followed by a blocking PCIe transfer, familiar from standard desktop programming.
    **The Consequence:** This incurs costly CPU page faults and user-to-kernel space copies, starving the dataflow architecture and thrashing the host CPU.
  napkin_math: |
    1. **Data Rate**: 4 cameras * 1920 * 1080 pixels * 3 bytes (RGB) * 30 FPS = ~746 MB/s.
    2. **Copy Penalty**: A naive pipeline moves this 3 times, demanding ~2.2 GB/s bandwidth and high CPU load.
    3. **Zero-Copy Gain**: CPU copies 0 payload bytes.
    4. **Result**: A 3-deep ring buffer per stream needs 4 * 6.22 MB/frame * 3 = **~74.6 MB of pinned host memory** to keep the accelerator fed continuously.
