title: Resource-Constrained Drift Detection on Jetson Orin
scenario: You are deploying an autonomous navigation model on an NVIDIA Jetson Orin edge device. The system
  must operate continuously within a strict 60W TDP while processing high-resolution camera feeds. To
  ensure reliability, you need to implement real-time data drift detection (using metrics like KL divergence
  or PSI) to flag when the input distribution diverges from training data without interrupting the main
  inference workload on the Ampere GPU or DLA.
question: "How would you implement real-time data drift detection on Jetson Orin without disrupting the main GPU or DLA inference within 60W?"
details:
  realistic_solution: The optimal approach is to calculate drift metrics on low-dimensional, task-specific
    intermediate features or metadata (e.g., lighting histograms) and sample the data rather than evaluating
    every frame. This computation should be offloaded to the CPU cores or run entirely on the DLA if the
    primary model is strictly GPU-bound, utilizing an INT8 quantized proxy model to efficiently estimate
    distribution shifts while staying within the 32 GB memory and 60W constraints.
  common_mistake: Candidates often propose running continuous statistical tests on high-dimensional raw
    image data or full model embeddings on the main GPU. This starves the primary inference task of compute
    resources and pushes the system well beyond its thermal and power limits.
  napkin_math: 'Assume the main navigation model uses 200 TOPS and 40W, leaving 75 TOPS and 20W headroom
    on the Jetson Orin. If processing a 1080p frame for drift via an INT8 secondary CNN takes 0.5 TOPS
    per frame, sampling at 10 FPS consumes 5 TOPS, leaving a wide safety margin. Storing a 1-hour rolling
    window of 256-dimensional float32 embeddings at 10 FPS requires: 10 * 3600 * 256 * 4 bytes = 36.8
    MB. This easily fits into the 32 GB LPDDR5, allowing for efficient background KL divergence calculations
    without memory bottlenecking.'
