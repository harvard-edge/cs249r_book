title: The Dropped Frame Dilemma
scenario: You are building a real-time perception system for an autonomous forklift. It uses a high-resolution
  camera (30 FPS), a LiDAR (10 Hz), and an IMU (100 Hz). All sensor data needs to be fused before being
  fed into a neural network for obstacle detection. Occasionally, under heavy load (e.g., complex scenes),
  you observe dropped camera frames or out-of-sync sensor data, leading to detection failures. How would
  you design a robust, real-time sensor data pipeline that handles variable ML inference times and prevents
  data loss or desynchronization?
details:
  realistic_solution: "A robust sensor pipeline requires careful buffer management, synchronization, and\
    \ flow control.\n  1.  **Timestamping & Synchronization:** All sensor data must be accurately timestamped\
    \ at the source (as close to the hardware as possible) using a synchronized clock (e.g., NTP, PTP,\
    \ or hardware sync). Fusion should be based on timestamps, not arrival order.\n  2.  **Ring Buffers/Circular\
    \ Queues:** Instead of simple FIFOs, use fixed-size ring buffers for each sensor stream. When a buffer\
    \ is full, the oldest data is overwritten (implicit drop, but controlled). This prevents unbounded\
    \ memory growth and provides predictable latency for accessing recent data.\n  3.  **Flow Control\
    \ & Backpressure:** The ML inference module should signal its readiness for new data. If the ML module\
    \ is slow, upstream sensor processing (e.g., image pre-processing) might be throttled or instructed\
    \ to drop frames intelligently (e.g., drop a lower-resolution frame, or skip N frames) rather than\
    \ blindly queueing.\n  4.  **Dedicated Threads/Processes:** Isolate sensor acquisition, pre-processing,\
    \ ML inference, and post-processing into separate, prioritized threads or processes. Use inter-process\
    \ communication (IPC) mechanisms (e.g., shared memory, message queues) that are efficient and respect\
    \ real-time constraints.\n  5.  **Adaptive Inference:** If the ML model is the bottleneck, consider\
    \ switching to a lighter model variant, reducing input resolution, or adjusting detection frequency\
    \ dynamically based on system load and available processing time.\n  6.  **Hardware-Accelerated Pre-processing:**\
    \ Offload tasks like debayering, resizing, and color space conversion to dedicated hardware (ISP,\
    \ VPU) to reduce CPU load and latency."
  common_mistake: '"Just use large buffers everywhere." While large buffers can absorb transient spikes,
    they introduce latency and can still overflow under sustained load, or lead to stale data if not managed
    properly.'
  napkin_math: The camera produces data at 30 FPS (1 frame every 33.3ms). If the neural network takes
    50ms to process a frame, the max inference throughput is 1000 / 50 = 20 FPS. You are acquiring 10
    more frames per second than you can process. A 1080p RGB frame is 6.2 MB. Your queue grows by 62 MB/s.
    After 1 minute, the buffer consumes 3.7 GB of RAM, causing severe latency and safety hazards for the
    forklift.
