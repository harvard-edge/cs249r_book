title: The Dropped Frame Dilemma
scenario: You are building a real-time perception system for an autonomous forklift. It uses a high-resolution camera (30 FPS), a LiDAR (10 Hz), and an IMU (100 Hz). All sensor data needs to be fused before being fed into a neural network for obstacle detection. Occasionally, under heavy load (e.g., complex scenes), you observe dropped camera frames or out-of-sync sensor data, leading to detection failures.
question: How would you design a robust, real-time sensor data pipeline that handles variable ML inference times and prevents data loss or desynchronization?
details:
  realistic_solution: "A robust sensor pipeline requires careful buffer management, synchronization, and flow control.\n1. **Timestamping & Synchronization:** All sensor data must be accurately timestamped at the source. Fusion should be based on timestamps, not arrival order.\n2. **Ring Buffers/Circular Queues:** Instead of simple FIFOs, use fixed-size ring buffers for each sensor stream. When full, oldest data is overwritten. This provides predictable latency.\n3. **Flow Control & Backpressure:** The ML inference module should signal its readiness for new data. If slow, upstream processing drops frames intelligently (e.g., skip N frames).\n4. **Dedicated Threads:** Isolate acquisition, inference, and post-processing."
  common_mistake: |
    **The Pitfall:** Using unboundly large FIFO buffers everywhere.
    **The Rationale:** Engineers assume that absorbing transient spikes is safely accomplished by queueing data.
    **The Consequence:** Unbounded memory growth leading to out-of-memory crashes, and feeding dangerously "stale" frames to the perception model.
  napkin_math: |
    1. **Input Rate:** Camera produces data at 30 FPS (33.3ms/frame).
    2. **Processing Rate:** Neural network takes 50ms (20 FPS capacity).
    3. **Queue Growth:** Acquiring 10 frames/sec more than can be processed.
    4. **Memory Leak:** A 1080p RGB frame is 6.2 MB. The queue grows by 62 MB/s.
    5. **Failure Point:** After 1 minute, the buffer consumes **~3.7 GB** of RAM, causing severe latency and safety hazards for the forklift.
