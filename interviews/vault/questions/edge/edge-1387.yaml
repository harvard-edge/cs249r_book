title: Edge TPU Operator Fallback Latency
scenario: 'You are preparing a custom CNN for deployment on a Google Coral Edge TPU (4 TOPS INT8, 2W). The model requires 2 billion MACs per inference. After converting the model to TFLite and applying full INT8 quantization, the compiler reports an operator coverage gap: 90% of the operations (by MAC count) will execute on the Edge TPU, while the remaining 10% are unsupported and will delegate back to the host CPU.'
question: 'What is the theoretical minimum latency when 90% of a 2B-MAC model runs on the 4 TOPS Edge TPU and 10% on a 0.1 TOPS CPU sequentially?'
details:
  realistic_solution: 'Because the unsupported operators trigger a fallback, the execution is sequential between the TPU and CPU. You must calculate the latency for the TPU portion and the CPU portion separately and sum them. First, convert the MACs to total Operations. Then, allocate the operations based on the compiler''s 90/10 split, and divide each by the respective processor''s peak throughput to find the bottlenecked latency.'
  common_mistake: |
    **The Pitfall:** Calculating throughput instead of latency, or forgetting that 1 MAC = 2 Operations.
    **The Rationale:** Candidates are used to working with MACs directly and forget the conversion factor when dividing by TOPS (Trillion Operations Per Second).
    **The Consequence:** The resulting latency calculation is off by exactly a factor of 2.
  napkin_math: |
    * Total OPs = 2 billion MACs * 2 = 4 billion OPs (0.004 TOPs).
    * TPU OPs = 0.90 * 0.004 TOPs = 0.0036 TOPs.
    * CPU OPs = 0.10 * 0.004 TOPs = 0.0004 TOPs.
    * TPU Latency = 0.0036 TOPs / 4 TOPS = 0.0009 seconds = 0.9 ms.
    * CPU Latency = 0.0004 TOPs / 0.1 TOPS = 0.0040 seconds = 4.0 ms.
    * **Total Latency = 0.9 ms + 4.0 ms = 4.9 ms (the 10% CPU fallback accounts for over 80% of total latency).**
