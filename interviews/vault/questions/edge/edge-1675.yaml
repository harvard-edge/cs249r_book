title: Multi-modal Sensor Data Ingestion Architecture on Jetson Orin
scenario: You are designing the local telemetry and sensor recording system for an autonomous drone powered by a single NVIDIA Jetson Orin. The system must continuously log structured metadata, bounding box predictions from the DLA, and high-frequency LiDAR point clouds (100Hz) directly to an onboard NVMe drive for post-mission training. Given the Orin's 32 GB LPDDR5 memory is heavily utilized by the main perception stack (consuming 24 GB) and the system operates under a strict 60W TDP.
question: How would you design a novel hybrid storage format and tiering strategy to serialize and persist this heterogeneous data without stalling the inference pipeline or exceeding 60W?
details:
  realistic_solution: "A robust L6+ architecture uses a dual-path storage strategy. Structured perception metadata and bounding boxes are serialized using a lightweight row-based format like FlatBuffers or Cap'n Proto (zero-copy overhead) and batched into memory-mapped files. High-volume LiDAR data bypasses the CPU via zero-copy DMA directly to an NVMe-backed circular buffer, optionally utilizing the Ampere GPU's hardware NVENC/NVDEC or custom CUDA kernels for lightweight delta encoding before persistence. This isolates the CPU, respects the power envelope, and keeps memory overhead well below the remaining 8 GB."
  common_mistake: |
    **The Pitfall:** Proposing CPU-heavy compression (like GZIP or Snappy) for high-bandwidth LiDAR.
    **The Rationale:** Candidates default to standard cloud data engineering practices without accounting for edge TDP and CPU overhead limits.
    **The Consequence:** Thermal throttling of the main perception pipeline because the CPU steals power from the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available RAM: 8 GB (32 GB - 24 GB)
       - LiDAR rate: 100Hz * 65k points * 16B = ~104 MB/s
       - Metadata: 30Hz * 100 objects * 256B = ~750 KB/s
    2. **Calculations:**
       - 1-hour uncompressed payload = (104 MB/s + 0.75 MB/s) * 3600s = 377 GB
       - CPU compression (Zstd) consumes >15W, blowing the 60W TDP budget
       - GPU delta-encoding reduces payload by 50% at <5W
    3. **Conclusion & Interpretation:**
       **Result: 188 GB saved at <5W overhead (Power-Bound)**
