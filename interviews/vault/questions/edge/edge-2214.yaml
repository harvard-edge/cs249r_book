title: Edge Encoder Decoder Latency Split
scenario: An edge translation model has a 35 ms encoder pass and a decoder that costs 12 ms/token.
question: Can an edge encoder-decoder model deliver 5 tokens within 120 ms if encoding costs 35 ms and decoding costs 12 ms/token?
details:
  realistic_solution: The total time to generate 5 tokens is 35 ms + (5 * 12 ms) = 95 ms. This comfortably meets the 120 ms deadline with 25 ms of headroom. For auto-regressive generation, the limiting factor for extended outputs is strictly decoding latency, as it scales linearly with token count after paying the fixed O(1) encoder cost.
  common_mistake: |
    **The Pitfall:** Averaging encoder and decoder costs.
    **The Rationale:** Candidates fail to understand that the encoder is a fixed latency cost while the decoder scales linearly with the number of generated tokens.
    **The Consequence:** Incorrectly sizing sequence limits or underestimating latency for long outputs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Encoder latency (fixed): 35 ms
       - Decoder latency (per-token): 12 ms/token
       - Target tokens: 5
       - Deadline: 120 ms
    2. **Calculations:**
       - Total decode latency: 5 tokens * 12 ms/token = 60 ms
       - Total pipeline latency: 35 ms + 60 ms = 95 ms
       - Headroom: 120 ms - 95 ms = 25 ms
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The model generates 5 tokens in 95 ms, meeting the 120 ms deadline with 25 ms to spare.
