title: Edge Encoder Decoder Latency Split
scenario: An edge translation model has a 35 ms encoder pass and a decoder that costs
  12 ms/token. The application needs the first 5 output tokens within 120 ms. Size
  whether the model meets the deadline and identify the limiting phase.
question: Can an edge encoder-decoder model deliver 5 tokens within 120 ms if encoding
  costs 35 ms and decoding costs 12 ms/token?
details:
  realistic_solution: Total time for 5 tokens is 35 + 5 x 12 = 95 ms, so it meets
    the 120 ms deadline with 25 ms headroom. The limiting phase for longer outputs
    is decoding, because it grows linearly with output tokens after the fixed encoder
    cost.
  common_mistake: Averaging encoder and decoder costs and missing that decode grows
    with generated tokens.
  napkin_math: Time = 35 + 5 x 12 = 95 ms. Headroom = 120 - 95 = 25 ms.
