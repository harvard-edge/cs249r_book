title: Edge Encoder Decoder Latency Split
scenario: An edge translation model has a 35 ms encoder pass and a decoder that costs 12 ms/token.
question: Can an edge encoder-decoder model deliver 5 tokens within 120 ms if encoding costs 35 ms and decoding costs 12 ms/token?
details:
  realistic_solution: Total time for 5 tokens is 35 + 5 * 12 = 95 ms, so it meets the 120 ms deadline with 25 ms headroom. The limiting phase for longer outputs is decoding, because it grows linearly with output tokens after the fixed encoder cost.
  common_mistake: |
    **The Pitfall:** Averaging encoder and decoder costs.
    **The Rationale:** Candidates fail to understand that the encoder is a fixed latency cost while the decoder scales linearly with the number of generated tokens.
    **The Consequence:** Incorrectly sizing sequence limits or underestimating latency for long outputs.
  napkin_math: |
    - **Encoder cost:** 35 ms.
    - **Decoder cost for 5 tokens:** 5 * 12 ms = 60 ms.
    - **Total time:** 35 ms + 60 ms = 95 ms.
    - **Headroom:** 120 ms - 95 ms = 25 ms.
    - **Final result:** **The model meets the 120 ms deadline with 25 ms of headroom.**
