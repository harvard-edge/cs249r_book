schema_version: 1
id: edge-0146
title: The Depthwise Separable Dividend
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: An edge vision model is processing a `112x112x32` (HWC) feature map. You need to apply a convolution
  with a `3x3` kernel that produces a `112x112x64` output feature map. Compare the computational cost
  of a standard `3x3` convolution to a `3x3` depthwise separable convolution for this task. Calculate
  the approximate reduction factor in total FLOPs.
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, dense convolutional layer
    with two smaller ones: a depthwise convolution that filters each input channel independently, and
    a pointwise (1x1) convolution that linearly combines the outputs of the depthwise pass. This factorization
    dramatically reduces computation.'
  common_mistake: 'Engineers often miscalculate the reduction in one of two ways: 1) They only consider
    the depthwise pass, leading them to believe the reduction is ~K^2 (e.g., 9x for a 3x3 kernel). 2)
    They forget the cost of the subsequent pointwise pass, which is often the dominant term. The true
    reduction is limited by the sum of both stages.'
  napkin_math: 'Standard Conv FLOPs = 2 * (112*112) * 64 * 32 * 9 = 462,422,016. Depthwise Separable FLOPs
    = Depthwise + Pointwise. Depthwise: 2 * (112*112) * 32 * 9 = 7,225,344. Pointwise: 2 * (112*112) *
    64 * 32 * 1 = 51,380,224. Total = 58,605,568 FLOPs. The depthwise separable conv reduces compute by
    ~7.9x.'
