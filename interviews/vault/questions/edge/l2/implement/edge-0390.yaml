id: edge-0390
title: The Federated Fleet Economy
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re a systems engineer at an automotive company with a fleet of 10,000 connected vehicles.
  You need to update a driver drowsiness detection model. Your team is debating two approaches:'
details:
  realistic_solution: The primary trade-off is between the massive data upload costs of the centralized
    approach versus the implementation complexity and on-device compute requirements of federated learning.
    While the centralized approach is conceptually simpler from a training perspective, its data transmission
    costs become prohibitive at scale.
  common_mistake: Engineers often focus only on the privacy benefits of federated learning and neglect
    the economic drivers. A common calculation error is to calculate the cost for a single vehicle instead
    of the entire fleet, underestimating the total cost by orders of magnitude. Another mistake is using
    the federated model update size (10 MB) in the centralized cost calculation.
  napkin_math: 'Centralized data per month: 10,000 cars * 1 GB/day * 30 days = 300,000 GB. At $0.10/GB,
    cost is $30,000/month. Federated Learning transfers weights (e.g., 10 MB model): 10,000 cars * 10
    MB * 30 days = 3,000 GB. At $0.10/GB, cost is only $300/month. FL saves $29,700/month in bandwidth,
    justifying the on-device compute cost.'
