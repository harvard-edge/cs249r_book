title: The Fleet's Cellular Bill
topic: federated-learning
status: draft
provenance: imported
scenario: 'You''re an engineer on an autonomous vehicle team, tasked with evaluating the data transmission
  costs for a new driver drowsiness detection feature. The fleet consists of 100,000 vehicles. Your team
  is comparing two approaches:'
details:
  realistic_solution: The correct way to solve this is to first calculate the total amount of data generated
    by the entire fleet per day, then convert that to Gigabytes, and finally multiply by the cost per
    GB.
  common_mistake: 'Engineers often make two primary errors here:'
  napkin_math: 'Centralized: 100,000 vehicles * 500 MB/veh = 50,000,000 MB/day = 50,000 GB/day. At an
    assumed $0.05/GB, Cost = 50,000 * 0.05 = $2,500/day. Federated: Only send a 10 MB model update per
    vehicle. 100,000 * 10 MB = 1,000,000 MB/day = 1,000 GB/day. Cost = 1,000 * 0.05 = $50/day. Federated
    Learning cuts daily data volume by 50x, saving $894,250 annually on cellular data backhaul.'
