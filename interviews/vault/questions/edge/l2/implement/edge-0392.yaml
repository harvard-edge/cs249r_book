id: edge-0392
title: The Edge Memory Budget
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are on an autonomous vehicle team deploying a 500 million parameter perception model to
  an edge device. The model is currently in FP16 format, and you need to reduce its memory footprint.
  Your team decides to quantize only the model's weights to INT8. Calculate the memory savings for the
  weights in gigabytes (GB).
details:
  realistic_solution: The solution requires knowing the byte representation for each data type. FP16 (half-precision
    float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte. The memory savings is the
    difference between the total memory required for the weights in each format.
  common_mistake: A common mistake is to confuse the baseline precision, treating FP16 as if it were 4
    bytes (like FP32), which doubles the calculated savings. Another error is to report the initial or
    final size of the model instead of the *difference* in size. Finally, a classic error is to confuse
    bits and bytes, incorrectly using the bit-width (16 vs 8) as a multiplier to get a result that is
    8x too large.
  napkin_math: 'Model parameters: 500 million. In FP16 format (2 bytes per parameter), total weight memory
    = 500,000,000 * 2 = 1,000,000,000 bytes = 1 GB. In INT8 format (1 byte per parameter), total weight
    memory = 500,000,000 * 1 = 500,000,000 bytes = 500 MB. Memory savings = 1,000 MB - 500 MB = 500 MB
    reduction in VRAM footprint.'
