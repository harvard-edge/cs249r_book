id: edge-0124
title: 'The Thermal Throttling Trap: Power Budgeting'
topic: power-budgeting
status: published
provenance: imported
scenario: You're deploying a perception model to a Jetson AGX Orin, which the datasheet advertises as
  having 275 TOPS (INT8) of peak performance. However, the autonomous robot chassis it's being installed
  in can only continuously dissipate 30W of heat. Explain the realistic, sustained inference performance
  you should actually base your system design on.
details:
  realistic_solution: The Jetson AGX Orin, like most complex SoCs, uses DVFS with pre-defined power profiles
    (P-states) to manage the trade-off between performance and power consumption. When constrained to
    a 30W thermal envelope, the system will not run at half performance. Instead, it will engage a specific,
    more efficient 30W power mode. For the AGX Orin, this mode delivers approximately 170 TOPS. This is
    because the underlying voltages and frequencies are optimized for that power level, resulting in a
    higher TOPS/Watt efficiency than at peak power.
  common_mistake: Assuming performance scales linearly with power. Engineers often take the peak performance
    (275 TOPS) and its associated power draw (e.g., 60W) to calculate a single TOPS/Watt efficiency number.
    They then incorrectly multiply this by the new, lower power budget (30W), failing to account for the
    non-linear reality of Dynamic Voltage and Frequency Scaling (DVFS), where efficiency changes at different
    power points.
  napkin_math: 1. **Find Peak Efficiency:** The Jetson AGX Orin achieves its peak 275 TOPS in MAXN mode,
    which consumes around 60W. Peak Efficiency ≈ 275 TOPS / 60W ≈ 4.6 TOPS/Watt.
