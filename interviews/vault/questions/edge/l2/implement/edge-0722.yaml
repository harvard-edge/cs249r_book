id: edge-0722
title: The OTA Update Budget
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're an engineer for an automotive company deploying a critical OTA (Over-the-Air) update.
  The update includes a new perception model with 50 million parameters, which will be deployed in a container.
  The model requires FP16 precision. Explain how to calculate the storage size of the model weights, and
  then calculate the total download size if the container's base layer adds another 150 MB.
details:
  realistic_solution: The correct approach is to calculate the model size based on its parameter count
    and precision, then add the size of the container base. Each parameter in FP16 precision requires
    2 bytes of storage. Therefore, a 50 million parameter model needs 100 MB for its weights. Adding the
    150 MB container base results in a total update size of 250 MB.
  common_mistake: Engineers often confuse the required bytes per parameter for different precisions. A
    common error is assuming 1 byte for FP16 (confusing it with INT8) or 4 bytes (confusing it with FP32).
    Another typical mistake is to focus only on the model weights and forget the significant overhead
    from the container base image, leading to a severe underestimation of the total required bandwidth
    and device storage.
  napkin_math: '1. **Parameters**: 50,000,000 | 2. **Bytes per Parameter (FP16)**: 2 bytes | 3. **Model
    Weights Size**: 50,000,000 params × 2 bytes/param = 100,000,000 bytes | 4. **Convert to MB**: 100,000,000
    bytes / (1024 * 1024 bytes/MB) ≈ 95.4 MB. For napkin math, we use 1,000,000 bytes/MB, so 100 MB. |
    5. **Container Base Size**: 150 MB | 6. **Total Update Size**: 100 MB (model) + 150 MB (container)
    = 250 MB'
