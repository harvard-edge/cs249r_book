id: edge-0368
title: The Perception Model Memory Diet
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are the ML systems engineer for an autonomous vehicle's perception team. Your primary object
  detection model has 50 million parameters and currently runs in FP16 precision on the car's Jetson AGX
  Orin edge device. To free up memory for a new sensor fusion model, you propose quantizing the existing
  model to INT8. Explain the primary trade-off of this change and calculate the memory required to store
  the model's weights in both FP16 and INT8.
details:
  realistic_solution: The primary trade-off is a significant reduction in memory footprint and potentially
    faster inference, in exchange for a possible degradation in model accuracy. The smaller dynamic range
    of INT8 can lead to clipping or overflow of activation and weight values if a careful calibration
    process is not performed.
  common_mistake: The most common mistake is misremembering the byte size of the data types. Engineers
    often confuse FP16 with FP32 (4 bytes), leading to a 2x overestimation for the baseline. Another frequent
    error is applying the 4x memory reduction seen when moving from FP32 to INT8, rather than the correct
    2x reduction when moving from FP16 to INT8.
  napkin_math: 'FP16 Memory Footprint: 50,000,000 parameters * 2 bytes/parameter = 100,000,000 bytes =
    100 MB'
