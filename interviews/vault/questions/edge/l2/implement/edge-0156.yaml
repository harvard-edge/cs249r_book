schema_version: 1
id: edge-0156
title: The Watchdog Timer and the Checkpoint Tax
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are designing the fault-tolerance system for a vision-based autonomous robot. A hardware
  watchdog timer is configured to reboot the system if the main control loop doesn't 'pet' it within a
  50ms deadline. The loop consists of 5ms for image preprocessing and 2ms for motor control commands.
  To ensure rapid recovery after a reboot, the system periodically saves a state checkpoint to its NVMe
  SSD, an operation which takes 1ms. Explain how this checkpoint operation impacts the system's real-time
  performance, and calculate the maximum allowed inference latency for a control loop that includes a
  checkpoint.
details:
  realistic_solution: The watchdog timer imposes a hard real-time budget on the entire control loop. Every
    operation within the loop consumes a portion of this budget. A checkpoint, even if infrequent, creates
    a 'worst-case' execution path that is longer than a typical path. To guarantee system stability, we
    must design for this worst case. The total time spent on fixed overhead (preprocessing, postprocessing)
    and the checkpoint operation must be subtracted from the watchdog's deadline to find the remaining
    time budget for the variable-length operation, which is the model inference.
  common_mistake: Engineers often focus solely on the average-case inference latency and forget to budget
    for worst-case execution paths. They might ignore the I/O cost of checkpointing, assuming it's negligible,
    or forget to subtract it from the *total* time budget provided by the watchdog timer. This can lead
    to unexpected, cascading watchdog timeouts under real-world conditions.
  napkin_math: "1. **Total Budget:** The watchdog timer provides a 50ms total time budget.\n2. **Fixed\
    \ overhead (every loop iteration):**\n   - Image preprocessing: 5ms.\n   - Motor control commands:\
    \ 2ms.\n   - Total fixed: **7ms**.\n3. **Checkpoint overhead (worst-case path):**\n   - NVMe SSD write:\
    \ 1ms.\n   - Total worst-case fixed: 7 + 1 = **8ms**.\n4. **Maximum allowed inference latency:**\n\
    \   - Without checkpoint: 50 - 7 = **43ms** available.\n   - With checkpoint (worst case): 50 - 8\
    \ = **42ms** available.\n5. **Design budget:** You must design for the worst case to guarantee no\
    \ watchdog timeout. Therefore, the maximum inference latency = **42ms**.\n6. **Safety margin:** In\
    \ hard real-time systems, you typically reserve a 10-20% safety margin for OS jitter, cache misses,\
    \ and interrupt handling:\n   - With 15% margin: 42 × 0.85 = **35.7ms** practical inference budget.\n\
    7. **Checkpoint frequency trade-off:**\n   - If you checkpoint every loop (50 Hz): 1ms overhead per\
    \ loop = 2% of budget. Recovery time after reboot: minimal (latest state is <20ms old).\n   - If you\
    \ checkpoint every 10th loop (5 Hz): amortized overhead = 0.1ms/loop. But recovery loses up to 200ms\
    \ of state.\n   - If you checkpoint every 100th loop (0.5 Hz): negligible overhead, but recovery loses\
    \ up to 2 seconds — the robot may have moved significantly.\n   **Recommended: checkpoint every loop.**\
    \ The 1ms cost is small, and for safety-critical robotics, fast recovery is paramount."
