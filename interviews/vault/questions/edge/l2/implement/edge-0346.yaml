id: edge-0346
title: 'The Edge Roofline: Calculating the Ridge Point'
topic: roofline-analysis
status: published
provenance: imported
scenario: You are an ML systems engineer on an autonomous driving team. Your team lead asks you to characterize
  the new NVIDIA Jetson AGX Orin accelerator you've just received. They want to know its 'ridge point'
  for INT8 operations to quickly classify if future perception models will be compute-bound or memory-bound.
  Given the device's peak performance of 275 TOPS (INT8) and memory bandwidth of 204.8 GB/s, what is its
  approximate ridge point?
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (Ops/Byte) a workload must have
    to be limited by the processor's computation speed rather than its memory bandwidth. It separates
    compute-bound workloads from memory-bound ones on a roofline plot. To calculate it, you must use consistent
    units for compute and bandwidth. The Jetson AGX Orin provides 275 * 10^12 Ops/sec and 204.8 * 10^9
    Bytes/sec. Dividing peak compute by memory bandwidth gives the correct operational intensity.
  common_mistake: 'The most common mistake is a simple units mismatch: dividing Tera-ops per second (10^12)
    by Giga-bytes per second (10^9) without normalization. This results in an answer that is off by a
    factor of 1,000. Another frequent error is confusing the ridge point (an operational intensity metric,
    Ops/Byte) with power efficiency (a performance-per-watt metric, TOPS/W).'
  napkin_math: 'Ridge Point = Peak INT8 Compute / Peak Memory Bandwidth. For the Jetson AGX Orin: Peak
    Compute = 275 TOPS = 275 * 10^12 Ops/sec. Peak Bandwidth = 204.8 GB/s = 204.8 * 10^9 Bytes/sec. Ridge
    Point = 275e12 / 204.8e9 = 1342.77 Ops/Byte. Any layer with an Arithmetic Intensity below ~1343 Ops/Byte
    will be bottlenecked by the 204.8 GB/s memory bandwidth, not the 275 TOPS compute.'
