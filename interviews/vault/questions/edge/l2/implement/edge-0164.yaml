schema_version: 1
id: edge-0164
title: The Edge LLM's Memory Budget
topic: vram-budgeting
status: published
provenance: imported
scenario: You're deploying a 2B parameter transformer model onto a Jetson AGX Orin for a real-time conversational
  agent. The model uses 24 layers, 32 attention heads, and a head dimension of 64. If the device needs
  to support a context window of 4096 tokens in FP16 precision, how much of the Jetson's VRAM will be
  consumed *solely* by the KV-cache?
details:
  realistic_solution: The KV-cache stores a Key and a Value vector for each token, for each head, in each
    layer. The total size is calculated by multiplying these dimensions by the size of the data type.
    For this scenario, it's `2 (K/V) * 24 layers * 4096 tokens * 32 heads * 64 head_dim * 2 bytes (FP16)`,
    which comes out to approximately 805 MB.
  common_mistake: Forgetting that the KV-cache stores *both* a Key and a Value tensor for every token
    in the context, leading to a 2x underestimate. Another common mistake is confusing the VRAM required
    for model weights (e.g., `2B params * 2 bytes/param = 4 GB`) with the VRAM for the KV-cache, which
    scales dynamically with sequence length.
  napkin_math: '1. Memory per token per layer: 2 (K, V) * 32 heads * 64 dim * 2 bytes = 8,192 bytes. 2.
    Total KV Cache = Memory per token * total tokens * layers. 8,192 bytes * 4096 tokens * 24 layers =
    805,306,368 bytes. The KV cache will consume approximately 805 MB of the Jetson''s unified memory.'
