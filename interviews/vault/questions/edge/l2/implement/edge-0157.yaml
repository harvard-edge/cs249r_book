id: edge-0157
title: The Dusty Lens Problem
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''ve deployed a vision model on a Jetson AGX Orin for quality control on a factory floor,
  with a hard real-time deadline of 33ms per frame. The model was trained on pristine, high-contrast images.
  In production, you discover that dust accumulating on the camera lens degrades image contrast, causing
  training-serving skew and dropping accuracy. To fix this, you propose adding a contrast normalization
  pre-processing step. Before implementing the algorithm, your manager asks for a back-of-the-envelope
  estimate: to make this change, how much of our latency budget will be consumed simply by reading one
  full 1920x1080, 8-bit grayscale image frame from system DRAM into the processor''s registers for this
  new step?'
details:
  realistic_solution: The correct answer is that the data transfer time is negligible, around 10 microseconds.
    The Jetson AGX Orin has an LPDDR5 memory bandwidth of 204.8 GB/s. A single 1080p grayscale frame is
    just over 2 MB. The time to read this data is the total data size divided by the memory bandwidth.
    This calculation shows that the memory read consumes a tiny fraction (<0.1%) of the 33ms (33,000 µs)
    frame budget. The real performance cost to investigate is the *compute* cost of the normalization
    algorithm itself, not the data movement to get it there.
  common_mistake: Engineers often overestimate the latency of memory reads on modern edge devices, confusing
    it with much slower I/O like disk access or network calls. They might guess it takes milliseconds,
    failing to appreciate the sheer speed of on-platform memory bandwidth. Another common mistake is using
    the wrong bandwidth number, such as the camera sensor interface bandwidth (MIPI) instead of the system's
    main memory bandwidth (LPDDR5).
  napkin_math: '1. Calculate Image Size: An 8-bit 1920x1080 image is 1920 * 1080 * 1 = 2,073,600 Bytes
    (~2.07 MB). 2. Transfer Time = Size / Bandwidth. Orin Bandwidth = 204.8 GB/s. Time = 2.07 MB / 204,800
    MB/s ≈ 0.00001 seconds (10.1 microseconds). Data transfer is completely negligible against the 33ms
    deadline.'
