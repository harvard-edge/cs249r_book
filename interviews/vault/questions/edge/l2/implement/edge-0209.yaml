id: edge-0209
title: The Edge VRAM Budget
topic: vram-budgeting
status: draft
provenance: imported
scenario: You're a systems engineer on an automotive team deploying a 1.2 billion parameter vision transformer
  to a Jetson AGX Orin. For the initial benchmark, the model will run in FP16 precision. Ignoring activations,
  the OS, and other applications, explain how much VRAM is required just to store the model's weights.
details:
  realistic_solution: The VRAM required is determined by the number of parameters and the size of each
    parameter. In FP16 precision, each parameter requires 2 bytes of storage. Therefore, a 1.2 billion
    parameter model will consume 2.4 GB of VRAM. This is a crucial first step in capacity planning for
    any edge device.
  common_mistake: Engineers often confuse the memory requirements for different numerical precisions or
    apply rules of thumb from training to an inference scenario. A common error is using the multiplier
    for INT8 (1 byte/param) or FP32 (4 bytes/param) instead of the correct FP16 (2 bytes/param). An even
    larger error is using the ~16 byte/param rule for Adam-based training.
  napkin_math: 1.  **Parameters:** 1.2 billion ($1.2 \times 10^9$)
