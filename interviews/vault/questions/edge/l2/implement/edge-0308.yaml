schema_version: 1
id: edge-0308
title: The Edge Memory Diet
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You're optimizing a perception model for an autonomous vehicle's main computer, which uses a
  system-on-chip similar to a Jetson AGX Orin. The model has 45 million parameters and its weights are
  currently stored in FP16 format. To reduce memory pressure and improve cache performance, you are considering
  quantizing the weights to INT8. Explain and calculate the reduction in memory (in Megabytes) required
  to store the model's weights.
details:
  realistic_solution: Quantizing the model's 45 million parameters from FP16 to INT8 will halve the memory
    required for the weights. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. This
    results in a memory reduction of 45 MB, which is a critical saving on memory-constrained edge devices.
  common_mistake: A common mistake is to miscalculate the bytes per parameter for different precisions.
    Engineers often forget that FP16 (half-precision float) requires 2 bytes per value, while FP32 requires
    4 bytes. This leads to an underestimation of the initial memory footprint and thus an incorrect calculation
    of the savings. Another error is confusing the savings on weights with the total runtime memory, which
    also includes activations and is more complex to calculate.
  napkin_math: 'Initial FP16 memory: 45,000,000 parameters × 2 bytes/parameter = 90,000,000 bytes = 90
    MB'
