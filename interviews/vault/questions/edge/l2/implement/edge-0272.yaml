id: edge-0272
title: 'The INT8 Memory Payoff: Quantization Fundamentals'
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team is optimizing a YOLO-family object detection model for a new ADAS (Advanced Driver-Assistance
  Systems) feature. The model runs on a Jetson AGX Orin. The initial model has 11 million parameters and
  is stored in FP16 precision. To improve performance and reduce memory pressure, you are tasked with
  quantizing it to INT8. Explain the difference in the model's storage footprint after quantization and
  calculate the final size in megabytes.
details:
  realistic_solution: Quantizing from FP16 to INT8 halves the memory required for model weights. FP16
    uses 16 bits (2 bytes) per parameter, while INT8 uses 8 bits (1 byte) per parameter. For an 11M parameter
    model, the storage footprint is reduced from 22 MB to 11 MB, a 50% savings.
  common_mistake: A common mistake is to confuse the reduction factor, either calculating a 4x reduction
    (as if from FP32) instead of a 2x reduction, or making a unit error between bits and bytes, leading
    to an answer that is off by a factor of 8.
  napkin_math: '1. **Baseline Memory (FP16):** 11M params x 2 bytes = 22 MB.

    2. **Bytes per parameter (FP16):** 2 bytes.

    3. **Bytes per parameter (INT8):** 1 byte.

    4. **Reduction Factor:** 2 / 1 = 2x.

    5. **New Memory Footprint:** 22 MB / 2 = **11 MB**.

    6. **Savings:** 22 MB - 11 MB = 11 MB (50% reduction).'
