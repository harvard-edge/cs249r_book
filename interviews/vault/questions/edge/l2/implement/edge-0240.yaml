schema_version: 1
id: edge-0240
title: The Fusion Overhead Tax
topic: kernel-fusion
status: published
provenance: imported
scenario: You are optimizing a perception model on a Jetson AGX Orin, which has a memory bandwidth of
  204.8 GB/s. Your profiler shows that a sequence of three common operations—a 3x3 depthwise convolution,
  followed by batch normalization, and a ReLU activation—is memory-bound. The input and output for this
  sequence is a 1 MB feature map.
details:
  realistic_solution: The primary benefit of operator fusion is minimizing data movement between the GPU's
    compute cores and its main memory (DRAM). Each time a separate kernel is launched, it must read data
    from DRAM and write its result back. By fusing operations, we keep the intermediate data in fast on-chip
    SRAM/registers, only reading the initial input and writing the final output once.
  common_mistake: Engineers often underestimate memory traffic. The most common error is to only count
    data reads (3 ops x 1MB = 3MB) and ignore that each unfused op must also write its result back to
    DRAM, leading to the incorrect reduction of 2MB (3MB reads unfused - 1MB read fused). Another error
    is to assume the fused kernel has no final write, leading to an exaggerated 5MB reduction (6MB unfused
    - 1MB read fused). A purely conceptual error is to believe fusion reduces FLOPs rather than memory
    I/O.
  napkin_math: '1. Unfused Traffic: Each of the 3 operations reads and writes the 1 MB feature map to
    DRAM. (1 MB read + 1 MB write) * 3 = 6 MB total memory traffic. 2. Fused Traffic: By combining them
    into one kernel, data stays in fast SRAM. 1 MB read + 1 MB write = 2 MB total. Fusion reduces memory
    traffic by 3x.'
