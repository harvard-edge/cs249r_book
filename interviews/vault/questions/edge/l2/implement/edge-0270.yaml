id: edge-0270
title: 'The Edge VRAM Budget: VRAM Budgeting'
topic: vram-budgeting
status: published
provenance: imported
scenario: You're an engineer on the autonomous driving team, tasked with deploying a new LiDAR perception
  model to your vehicle's Jetson AGX Orin compute module. The model has 30 million parameters and, when
  profiled, shows a peak activation memory usage of 150 MB. To avoid runtime failures, you need to calculate
  the model's total memory footprint during inference. Assuming the model runs in FP16 precision, what
  is the minimum VRAM required for the model's weights and activations combined?
details:
  realistic_solution: The correct approach is to sum the memory required for both the static model weights
    and the dynamic peak activations.
  common_mistake: The most common mistake is to only calculate the memory required for the model's weights,
    completely forgetting that intermediate activations also consume a significant amount of VRAM. This
    leads to a drastic underestimation of the true memory footprint and causes out-of-memory (OOM) errors
    during deployment.
  napkin_math: '1. **Parameters:** 30 million (30 x 10^6).

    2. **Precision:** FP16 = 2 bytes per parameter.

    3. **Weight memory:** 30 x 10^6 x 2 = 60 x 10^6 bytes = 60 MB.

    4. **Peak activation memory:** 150 MB (given from profiling).

    5. **Total VRAM required:** 60 MB (weights) + 150 MB (activations) = 210 MB minimum.'
