id: edge-0223
title: 'The Activation Memory Diet: Quantization Fundamentals'
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're optimizing a perception model for an autonomous vehicle's edge computer. A key convolutional
  layer produces a feature map with dimensions 80x80x256 (Height x Width x Channels). To reduce memory
  bandwidth, a major bottleneck, you are tasked with comparing the standard FP16 representation to a quantized
  INT8 representation for this activation tensor. Explain the memory footprint for this single activation
  map in both FP16 and INT8, and calculate the resulting memory reduction.
details:
  realistic_solution: 'FP16: 80 x 80 x 256 x 2 bytes = 3.13 MB. INT8: 80 x 80 x 256 x 1 byte = 1.56 MB
    (plus negligible 2 KB scale/zero-point metadata per channel). This is exactly a 2x reduction. On an
    Orin''s 204.8 GB/s LPDDR5 bus, reading this tensor takes 15.3 us in FP16 vs 7.6 us in INT8. For memory-bound
    layers, this translates directly to ~2x latency improvement. Across 20 similar layers, total activation
    memory drops from 62.6 MB to 31.3 MB — potentially the difference between fitting in fast on-chip
    SRAM versus spilling to slow DRAM.'
  common_mistake: The most common error is confusing bit-width with byte-size, for instance using 4 bytes
    for FP16 (confusing it with FP32) or incorrectly calculating the reduction factor. This leads to over
    or underestimating the potential memory savings and hardware impact.
  napkin_math: 'Elements = 80 × 80 × 256 = 1,638,400 elements.


    **FP16 (16-bit, 2 bytes per element):**

    - Memory = 1,638,400 × 2 = 3,276,800 bytes = **3.13 MB**.


    **INT8 (8-bit, 1 byte per element):**

    - Memory = 1,638,400 × 1 = 1,638,400 bytes = **1.56 MB**.

    - Note: INT8 also requires scale/zero-point metadata per channel (256 channels × 8 bytes = 2 KB —
    negligible).


    **Memory reduction:**

    - Absolute savings: 3.13 - 1.56 = **1.56 MB** freed per activation map.

    - Reduction factor: 3.13 / 1.56 = **2.0x** (exactly 50% reduction).


    **Bandwidth impact:**

    - At 204.8 GB/s LPDDR5 bandwidth (Orin): reading this tensor takes 3.13 MB / 204.8 GB/s = 15.3 µs
    (FP16) vs 1.56 MB / 204.8 GB/s = 7.6 µs (INT8).

    - For a memory-bound layer, this translates directly to a ~2x latency improvement.


    **Full model impact:** If the model has 20 such layers with similar activation sizes, total activation
    memory drops from ~62.6 MB to ~31.3 MB. On a device with 32 MB SRAM, this is the difference between
    fitting in fast memory vs spilling to slow DRAM.'
