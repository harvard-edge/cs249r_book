schema_version: 1
id: edge-0196
title: The Radar's SRAM Ingestion Time
topic: vram-budgeting
status: published
provenance: imported
scenario: An autonomous vehicle's radar sensor streams data to a Hailo-8 edge accelerator over a MIPI
  bus with a specified bandwidth of 2.5 GB/s. For each processing cycle, a 256 KB data frame must be transferred
  from the sensor buffer into the accelerator's on-chip SRAM using DMA. Interpret the bus specification
  and calculate the minimum time required for this data transfer.
details:
  realistic_solution: 'This is a direct application of the bandwidth formula: Time = Size / Rate. The
    key is to align the units correctly. The data size is in Kilobytes (KB), while the bandwidth is in
    Gigabytes per second (GB/s). A Direct Memory Access (DMA) controller handles this transfer efficiently
    without involving the CPU, moving the data block directly from the sensor''s peripheral buffer to
    the accelerator''s SRAM.'
  common_mistake: The most common errors are unit mismatches. Engineers might mix up Gigabytes/sec and
    Megabytes/sec (an off-by-1000 error), or confuse bits with bytes (an off-by-8 error). Another frequent
    mistake is to quote a bus's base latency (~1 µs for PCIe) instead of calculating the transfer time
    based on bandwidth, which is what matters for moving a large block of data.
  napkin_math: '1. Formula: Transfer Time = Data Size / Bandwidth. 2. Convert Data Size: 256 KB = 0.256
    MB. 3. Convert Bandwidth: 2.5 GB/s = 2500 MB/s. 4. Calculate: Time = 0.256 MB / 2500 MB/s = 0.0001024
    seconds, or ~102 microseconds. The DMA completes this transfer in roughly 100 µs without taxing the
    CPU.'
