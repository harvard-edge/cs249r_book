title: The Perception Model's Memory Diet (edge-0334)
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're optimizing a CNN-based perception model for an autonomous vehicle's main perception unit,
  which is based on a Jetson AGX Orin. The model has 30 million parameters and its weights are currently
  stored in FP16 precision. Your team is hitting the device's DRAM capacity limit during model loading.
  To create more headroom, you propose quantizing the model's weights to INT8. Compare the model's weight-memory
  footprint before and after quantization, and calculate the total memory reduction.
details:
  realistic_solution: The solution is a direct comparison of the memory footprint for the weights in each
    precision. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. For a 30 million
    parameter model, the calculation is straightforward. This 2x reduction in weight memory is a critical
    and common optimization on memory-constrained edge devices like those found in automotive systems.
  common_mistake: Engineers often calculate savings relative to an incorrect baseline. A common error
    is assuming the original model is FP32 (4 bytes/param), which would imply a 4x size reduction to INT8.
    However, modern edge inference frequently uses FP16 (2 bytes/param) as the standard baseline, so the
    actual reduction is only 2x. This mistake leads to overestimating the memory savings by a factor of
    2.
  napkin_math: '1. **FP16 weight memory:** 30M params x 2 bytes = 60 MB.

    2. **INT8 weight memory:** 30M params x 1 byte = 30 MB.

    3. **Memory saved:** 60 MB - 30 MB = 30 MB (50% reduction, 2x savings).'
