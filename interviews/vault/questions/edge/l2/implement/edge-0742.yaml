schema_version: 1
id: edge-0742
title: The OTA Update Bottleneck
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are an engineer for a fleet of autonomous delivery robots. A critical safety update for
  the perception model needs to be rolled out. The full model package is 120 MB. The robots' cellular
  modem provides a sustained download speed equivalent to a standard 4-wire SPI bus. Calculate the minimum
  time it will take for a single robot to download this update over the air (OTA).
details:
  realistic_solution: The correct approach is to align the units. First, convert the model package size
    from MegaBytes (MB) to Megabits (Mb). Then, divide the total number of bits by the network bandwidth
    in bits per second.
  common_mistake: The most common mistake is failing to convert between MegaBytes (MB) and Megabits (Mb).
    Since network bandwidth is measured in bits per second, the model size in bytes must be converted
    to bits (by multiplying by 8) before the division. Forgetting this step leads to an answer that is
    8x too fast.
  napkin_math: 'Model: 120MB = 120 × 8 = 960 Mb. SPI-equivalent modem: 10 Mbps. Download time: 960Mb /
    10Mbps = 96 seconds = 1.6 minutes minimum. With protocol overhead (~20%): 96s × 1.2 = 115s ≈ 2 minutes.
    For fleet of 1000 robots sequentially: impractical. Need CDN + parallel downloads. At 1 Mbps (realistic
    cellular): 960s = 16 minutes per robot.'
