schema_version: 1
id: edge-gen-flue-0138
title: TFLite INT8 Conversion on Cortex-M4
topic: model-format-conversion
status: published
provenance: imported
scenario: We are converting a PyTorch anomaly detection CNN into TensorFlow Lite for Microcontrollers
  to deploy on a Cortex-M4. The M4 has 256 KB of SRAM and no FPU, making INT8 conversion mandatory. The
  original FP32 model weights consume exactly 600,000 bytes. Assuming the TFLite Micro runtime engine
  requires 32,000 bytes of static overhead, calculate the memory footprint of the INT8 converted weights
  and the exact number of bytes remaining in SRAM for the tensor arena (activations).
details:
  realistic_solution: The correct approach requires understanding the data type mappings during model
    format conversion. FP32 uses 4 bytes per parameter, meaning the model has 150,000 parameters. An INT8
    conversion maps each parameter to 1 byte. We then calculate total device SRAM in bytes and subtract
    the converted weights and runtime overhead to find the available tensor arena space.
  common_mistake: Candidates often forget the exact byte sizes of data types, failing to divide the FP32
    size by 4 to get the parameter count. Another frequent error is using a base-10 conversion (1 KB =
    1000 bytes) instead of base-2 (1 KB = 1024 bytes) for the device's SRAM.
  napkin_math: '1. Parameter Count: 600,000 bytes / 4 bytes per FP32 param = 150,000 parameters.

    2. INT8 Weights Size: 150,000 parameters * 1 byte per INT8 param = 150,000 bytes.

    3. Total Device SRAM: 256 KB * 1024 bytes/KB = 262,144 bytes.

    4. Remaining SRAM (Tensor Arena): 262,144 bytes - 150,000 bytes (weights) - 32,000 bytes (runtime)
    = 80,144 bytes available for activations.'
