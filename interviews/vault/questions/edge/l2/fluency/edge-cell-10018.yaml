id: edge-cell-10018
title: 'Fluency: Identifying When Gradient Checkpointing Helps vs. Hurts on Constrained Edge Hardware'
topic: activation-memory
status: published
provenance: imported
scenario: A firmware engineer is debugging why enabling gradient checkpointing on a Jetson Orin training
  job for a 100M parameter ResNet increased training time by 80% instead of the expected 33%. They want
  to understand under what conditions gradient checkpointing overhead deviates significantly from the
  theoretical one-extra-forward-pass model.
details:
  realistic_solution: 'On Jetson Orin, re-executing the forward pass during backward fetches all layer
    weights from LPDDR5 again. For a ResNet with 100M parameters = 200 MB (fp16), the weight reload during
    backward re-computation costs: 200 MB / 68 GB/s ≈ 3 ms per recompute pass. The actual forward+backward
    is ~50 ms/step. With layer-level checkpointing: 50 additional weight reloads at 3 ms each per backward
    = 150 ms additional. Total: 50 ms (forward) + 50 ms (backward) + 150 ms (recompute) = 250 ms, a 150%
    overhead. The 33% theoretical overhead assumes compute-bound recomputation; on Orin, it is memory-bandwidth-bound.'
  common_mistake: Assuming the theoretical 33% overhead (one extra forward pass added to backward) holds
    uniformly regardless of hardware. On memory-bandwidth-constrained hardware like Jetson Orin (LPDDR5
    at ~68 GB/s effective throughput vs H100 HBM3 at 3.35 TB/s), the ratio of compute throughput to memory
    bandwidth is much lower, meaning recomputation has a higher relative overhead because the memory fetches
    for reloading weights during recomputation dominate.
  napkin_math: 'Orin effective BW: 68 GB/s. ResNet weights per layer: 200 MB / 50 layers = 4 MB/layer.
    Layer recompute weight reload: 4 MB / 68 GB/s = 0.059 ms/layer. 50 layers recomputed = 2.9 ms additional.
    Forward pass time: ~50 ms. Backward: ~100 ms. Overhead: 2.9 ms / 150 ms = 2% — much less than reported
    80%. Discrepancy suggests profiling issue: check for excessive host-device synchronization added by
    PyTorch checkpoint wrapper on Orin.'
