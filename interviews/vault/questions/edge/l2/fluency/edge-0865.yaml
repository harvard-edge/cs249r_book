id: edge-0865
title: Depthwise Separable Convolution FLOP Savings
topic: transformer-systems-cost
status: published
provenance: imported
scenario: MobileNet replaces standard 3×3 convolutions with depthwise separable convolutions. For an input
  with 256 channels and 256 output channels at spatial resolution 56×56, estimate the FLOP reduction factor.
details:
  realistic_solution: 'Standard conv: $3 \times 3 \times 256 \times 256 \times 56 \times 56 \approx 1.85$B
    FLOPs. Depthwise ($3 \times 3 \times 256 \times 56 \times 56$) + pointwise ($1 \times 1 \times 256
    \times 256 \times 56 \times 56$): $\approx$ 7.2M + 206M = 213M FLOPs. Reduction factor: $\sim 8-9\times$.'
  common_mistake: Thinking depthwise separable only saves memory, not compute. In fact, the FLOP savings
    are substantial — roughly the kernel width squared.
  napkin_math: 'Reduction ≈ $1/C_{out} + 1/k^2 \approx 1/9$ for $k=3$ with large channel counts. | ~8-9×
    fewer FLOPs. On an edge CPU at 1 GFLOP/s: 1.85s → 0.21s per layer.'
