id: edge-0724
title: The Overnight OTA Update
topic: ota-firmware-updates
status: published
provenance: imported
scenario: A new 8 GB perception model is ready for fleet-wide rollout to your company's autonomous vehicles.
  The only reliable window for updates is an 8-hour overnight period when cars are parked and connected
  to a 4G LTE network. You can assume a sustained, best-case download speed of 10 Mbps for each vehicle.
  Explain the minimum time required to download this update. Is the 8-hour window sufficient?
details:
  realistic_solution: The correct approach is to standardize the units to bits. First, convert the model
    size from Gigabytes (GB) to Gigabits (Gb). Then, calculate the download time based on the available
    network bandwidth.
  common_mistake: The most common mistake is confusing bits (b) and bytes (B). Network speeds are measured
    in megabits per second (Mbps), while file sizes are measured in gigabytes (GB). This leads to an 8×
    error in calculation. Engineers either forget to multiply the file size by 8 to convert from bytes
    to bits, or they incorrectly assume 10 Mbps is 10 MB/s, leading to a result that is 8x too fast.
  napkin_math: "1. **Convert model size to bits:** 8 GB × 8 bits/byte = 64 Gbits.\n2. **Convert network\
    \ speed to consistent units:** 10 Mbps = 10 Megabits per second.\n3. **Calculate download time:**\n\
    \   - 64 Gbits = 64,000 Mbits\n   - 64,000 Mbits ÷ 10 Mbps = 6,400 seconds\n   - 6,400 seconds ÷ 3,600\
    \ seconds/hour ≈ **1.78 hours**\n4. **Is the 8-hour window sufficient?** Yes — at a sustained 10 Mbps,\
    \ the download completes in under 2 hours, well within the 8-hour window.\n5. **Caveat:** This assumes\
    \ sustained best-case throughput. Real-world 4G LTE can drop to 2–5 Mbps in poor signal areas, potentially\
    \ stretching the download to 3.5–9 hours. A robust OTA system should implement resumable downloads\
    \ and checkpointing to handle interrupted transfers."
