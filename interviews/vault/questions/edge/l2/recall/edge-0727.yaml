id: edge-0727
title: 'The OTA Update Budget: OTA & Firmware Updates'
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You are an ML Systems Engineer on an autonomous vehicle team. Your current perception model
  is 2.5 GB. You have a new, more accurate FP16 model that is 3.5 GB. The fleet connects via a standard
  LTE cellular connection, which provides a realistic average download speed of 25 Mbps (megabits per
  second). To manage data costs and ensure a good user experience, a full model update must complete in
  under 20 minutes while the vehicle is parked and charging. Explain if you can safely deploy the new
  3.5 GB model. Calculate the best-case download time.
details:
  realistic_solution: No, the update is too slow to fit safely within the 20-minute budget. The download
    alone would take approximately 18.7 minutes in ideal conditions, leaving almost no margin for network
    variability, download interruptions, or the time needed for on-device installation and verification.
    A production system requires a significant safety buffer (e.g., aiming for the process to take <50%
    of the allotted time). The correct engineering decision would be to reject this model for OTA deployment
    and work with the modeling team to quantize it or develop a delta patching strategy.
  common_mistake: The most common mistake is confusing bits and bytes. Network speeds are measured in
    megabits per second (Mbps), while file sizes on disk are measured in gigabytes (GB). Engineers often
    forget to multiply the file size in bytes by 8 to convert it to bits, leading to an 8x underestimate
    of the required download time and a failed deployment plan.
  napkin_math: 'Model size: 3.5GB = 3,500MB = 28,000Mb. Average LTE speed: 25 Mbps. Download time = 28,000Mb
    / 25 Mbps = 1,120 seconds = 18.6 minutes. If the fleet is 10,000 cars, total data = 35TB. At $0.10/GB
    for cellular data, each OTA costs $0.35/car, total $3,500. Time is 18.6m per car, safely running in
    background.'
