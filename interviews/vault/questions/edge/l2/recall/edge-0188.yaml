title: The Continuous Batching Throughput Advantage
topic: batching-strategies
status: published
provenance: imported
scenario: You are designing an offline data processing pipeline for an autonomous vehicle fleet. The goal
  is to maximize TPOT (Throughput of Processing) on a cluster of Jetson AGX Orin devices. Inference requests
  arrive with variable timing. Compare the expected TPOT of a system using static batching (with a fixed
  batch size of 8 and a 10ms timeout) versus a system using continuous batching. Explain which approach
  is better and why.
details:
  realistic_solution: Continuous batching will yield significantly higher TPOT. With static batching,
    the GPU is often idle, either waiting for 8 requests to arrive or waiting for the 10ms timeout to
    be reached with a smaller batch. This wait time is pure waste. Continuous batching (or dynamic batching)
    eliminates this waste. It maintains a queue of requests and processes a batch as soon as the GPU has
    capacity, immediately swapping in new requests as old ones finish. This keeps the GPU close to 100%
    utilization, maximizing the number of inferences completed over time.
  common_mistake: Assuming that waiting to form a larger, static batch is always more efficient. This
    ignores the significant GPU idle time that accumulates while the system waits for the batch to fill
    or for the timeout to expire, which kills overall throughput.
  napkin_math: Assume inference on a batch of 8 takes 80ms. With static batching and a 10ms timeout, incomplete
    batches cause idle GPU time or underutilized capacity. Continuous batching injects new requests immediately
    as others finish, eliminating the up to 10ms wait time per batch, substantially increasing overall
    TPOT.
