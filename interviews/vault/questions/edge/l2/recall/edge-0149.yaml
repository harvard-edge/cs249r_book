id: edge-0149
title: The Real-Time Deadline Trap
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing the perception system for an autonomous forklift in a warehouse. The safety
  protocol requires the obstacle detection model to process each camera frame within a 33ms deadline to
  ensure a 30 FPS response rate. On your edge accelerator, the model takes 20ms for inference on a single
  frame. To improve the accelerator's efficiency, you consider batching two frames together. Explain whether
  this is a feasible strategy.
details:
  realistic_solution: This is not a feasible strategy. While batching can improve throughput, it increases
    the latency for each individual frame in the batch. The total time to process a batch of two would
    be at least 40ms, which violates the hard real-time deadline of 33ms. For the system to be safe, the
    result for the first frame must be available before the 33ms window closes, but with batching, it
    won't be ready until the entire batch is processed.
  common_mistake: Engineers often focus on optimizing for throughput (frames per second) by increasing
    batch size, forgetting that in a real-time system, latency is the primary constraint. They might calculate
    the amortized/average time per frame, which is misleading, instead of the total wall-clock time to
    process the entire batch.
  napkin_math: 1. System deadline is 33ms per frame. 2. A batch size of 2 would take at least 2 * 20ms
    = 40ms for inference alone, assuming perfect linear scaling. 3. Waiting for 40ms exceeds the 33ms
    hard real-time deadline for the first frame, rendering batching impossible for this specific safety
    latency constraint.
