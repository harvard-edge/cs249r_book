id: edge-0131
title: The Edge Robot's Memory Tax
topic: safety-certification
status: published
provenance: imported
scenario: You're deploying a new object detection model to an autonomous delivery robot equipped with
  a Jetson AGX Orin with 32 GB of LPDDR5 DRAM. The robot's OS and safety-critical navigation stack reserve
  6 GB of DRAM at all times. The new model has 5 billion parameters and will run in FP16. Its peak activation
  memory is 4 GB. Explain if the model will fit in the remaining DRAM.
details:
  realistic_solution: 'First, calculate the available memory for the application. Then, calculate the
    model''s total memory requirement (weights + activations). Finally, compare the two to see if it fits.

    1.  **Available DRAM:** 32 GB (Total) - 6 GB (OS/System) = 26 GB.

    2.  **Model Memory:** (5 Billion params × 2 bytes/param for FP16) + 4 GB (Activations) = 10 GB (Weights)
    + 4 GB (Activations) = 14 GB.

    3.  **Conclusion:** The model requires 14 GB, and there is 26 GB of available DRAM. Yes, it will fit
    with a comfortable margin.'
  common_mistake: Engineers often forget that the advertised DRAM of a device is not fully available to
    their application. They calculate the model's memory footprint and compare it against the total system
    DRAM, ignoring the significant 'tax' imposed by the OS, drivers, and other system processes, leading
    to out-of-memory errors at runtime.
  napkin_math: '# Calculate available memory | Total DRAM: 32 GB | System Reserved: 6 GB | Available DRAM
    = 32 GB - 6 GB = 26 GB'
