title: 'The INT8 Memory Diet: Quantization Fundamentals'
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You're an engineer on an autonomous vehicle team, tasked with deploying a new perception model
  with 200 million parameters onto the car's compute unit. The model weights are currently stored in FP16
  format. To reduce the memory footprint and improve cache efficiency, you plan to quantize the model
  to INT8. Calculate the final memory footprint (size on disk) of the INT8 model.
details:
  realistic_solution: The solution requires knowing the byte size for each numerical precision. FP16 (half-precision
    floating-point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte,
    per parameter. Therefore, quantizing from FP16 to INT8 halves the model's memory footprint.
  common_mistake: The most common mistake is confusing bits and bytes, or misremembering the size of each
    data type. Engineers might divide the parameter count by 8 (assuming 1 bit per parameter instead of
    1 byte), or they might forget that FP16 is 2 bytes and calculate the savings from an incorrect baseline
    like FP32 (4 bytes).
  napkin_math: '1. **Parameters**: 200,000,000'
