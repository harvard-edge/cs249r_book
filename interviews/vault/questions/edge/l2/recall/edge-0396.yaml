schema_version: 1
id: edge-0396
title: The Depthwise Separable FLOPs Reduction
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: Your team is optimizing a perception model for an autonomous vehicle's main ECU. A profiler
  shows that a specific 3x3 standard convolutional layer is a major bottleneck. The layer processes a
  56x56 feature map with 64 input channels and produces 128 output channels. You propose replacing it
  with a 3x3 depthwise separable convolution. Calculate the approximate reduction in FLOPs.
details:
  realistic_solution: 'A standard convolution performs spatial and channel-wise operations in one step.
    A depthwise separable convolution decouples this into two steps:

    1.  **Depthwise Convolution:** A single 3x3 filter is applied to each of the 64 input channels independently.

    2.  **Pointwise Convolution:** A 1x1 convolution is used to combine the outputs of the depthwise step
    into the 128 desired output channels.'
  common_mistake: Engineers often calculate the reduction in parameters and assume the FLOPs reduction
    is the same. While related, they can differ. A more common mistake is to only calculate the cost of
    the initial 3x3 depthwise part and forget to add the cost of the subsequent 1x1 pointwise convolution,
    leading to a massive overestimation of the computational savings.
  napkin_math: 'Input: 56x56x64, Output: 56x56x128, Kernel: 3x3.

    1. **Standard Conv FLOPs:** 2 × H × W × C_in × C_out × K² = 2 × 56 × 56 × 64 × 128 × 9 = 462,422,016
    ≈ **462 MFLOPs**.

    2. **Depthwise Conv FLOPs:** 2 × H × W × C_in × K² = 2 × 56 × 56 × 64 × 9 = 3,612,672 ≈ **3.6 MFLOPs**.

    3. **Pointwise Conv FLOPs:** 2 × H × W × C_in × C_out = 2 × 56 × 56 × 64 × 128 = 51,380,224 ≈ **51.4
    MFLOPs**.

    4. **Total Separable FLOPs:** 3.6M + 51.4M ≈ **55 MFLOPs**.

    5. **Reduction factor:** 462M / 55M ≈ **8.4× fewer FLOPs**.'
