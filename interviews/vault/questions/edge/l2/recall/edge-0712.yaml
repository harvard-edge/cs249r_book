schema_version: 1
id: edge-0712
title: The OTA Storage Tax
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're designing the firmware for a fleet of smart environmental sensors. Each device has a
  microcontroller with 1MB of total Flash memory. To ensure you can deploy updates reliably, the system
  must use an A/B partitioning scheme for Over-the-Air (OTA) updates. The bootloader is allocated 32KB
  of flash, and the real-time operating system (RTOS) requires another 64KB. Explain the storage layout
  and calculate the maximum possible size for your application binary (which includes the model weights
  and inference code).
details:
  realistic_solution: The correct approach is to first account for the fixed storage costs that are outside
    the updatable application partitions. The bootloader and RTOS are essential and static. After subtracting
    their footprint from the total flash, the remaining space is what's available for the A/B partitions.
    Because one partition must be active while the other is receiving the update, this available space
    must be divided by two.
  common_mistake: The most common mistake is to calculate the available space after subtracting system
    overhead, but forgetting that an A/B scheme requires *two* identical application slots, effectively
    halving the remaining space. Another error is to only divide the total flash by two, ignoring the
    fixed space consumed by the bootloader and RTOS.
  napkin_math: '1. Total Flash: 1024 KB | 2. Subtract Bootloader: 1024 KB - 32 KB = 992 KB | 3. Subtract
    RTOS: 992 KB - 64 KB = 928 KB | 4. Divide by 2 for A/B partitions: 928 KB / 2 = 464 KB'
