id: edge-0182
title: The Real-Time Sensor Fusion Dilemma
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're designing an ECU for sensor fusion in a self-driving car. The system has 1 MB of fast
  on-chip SRAM and 32 MB of slower LPDDR5 DRAM. Your fusion model's weights are 2 MB (INT8 quantized).
  For safety, inference latency must be minimized. Explain where you must store the model weights and
  what specific hardware mechanism is essential for efficiently moving data from the camera peripheral
  into memory for processing without bottlenecking the CPU.
details:
  realistic_solution: The 2 MB of model weights are too large for the 1 MB SRAM, so they *must* be stored
    in the LPDDR5 DRAM. The essential hardware mechanism is a **DMA (Direct Memory Access) controller**.
    The DMA is configured to transfer the incoming camera frame directly from the camera peripheral's
    buffer into a designated region of DRAM. This happens in the background, without any CPU intervention.
    Once the data is in DRAM, the CPU can orchestrate the inference, using the DMA again to transfer small,
    necessary chunks of the weights and input data from DRAM into the fast SRAM just in time for the compute
    engine to use them. This hierarchical memory management is key to minimizing latency.
  common_mistake: A common misconception is that the CPU must be involved in all data movement. In this
    scenario, having the CPU manually copy the incoming high-bandwidth camera stream into memory would
    consume critical cycles, introduce latency, and create a system bottleneck, preventing the CPU from
    performing other tasks like scheduling or executing the model's control logic.
  napkin_math: 1. **Weight Storage:** Model weights (2 MB) > On-chip SRAM (1 MB) → Weights must reside
    in LPDDR5 DRAM.
