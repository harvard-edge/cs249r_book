title: The Real-Time Perception Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is designing the perception system for an autonomous vehicle. The main camera provides
  frames at a hard real-time deadline of 30 frames per second (FPS) to detect pedestrians. To avoid missing
  a frame and ensure safety, your inference pipeline must complete processing before the next frame arrives.
  Explain the maximum latency your perception model can have.
details:
  realistic_solution: The system runs at 30 FPS, meaning a new frame is generated every 1/30th of a second.
    To meet the real-time deadline, all processing for a given frame must finish within this window. The
    maximum allowed latency is therefore 1000 milliseconds divided by 30 frames, which is approximately
    33.3 milliseconds. Any latency beyond this risks missing the deadline for the next frame, a critical
    failure in a safety-critical system.
  common_mistake: Engineers often confuse throughput (FPS) with latency (ms) or miscalculate the conversion.
    A common error is to simply state '30' without the correct units or to forget the `1000ms/sec` conversion
    factor, leading to an answer that is off by orders of magnitude.
  napkin_math: Total time per second = 1000 ms
