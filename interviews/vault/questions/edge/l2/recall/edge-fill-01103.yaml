schema_version: 1
id: edge-fill-01103
title: Load Balancing for Dynamic Qualcomm Cloud AI 100 Inference Workloads
topic: load-balancing
status: published
provenance: imported
scenario: A critical ML inference service is being deployed on a cluster of Qualcomm Cloud AI 100 accelerators,
  each providing 32 GB LPDDR4x memory and 400 TOPS INT8 performance. The service experiences frequent
  scaling events (adding or removing accelerators). The engineering team needs a request routing strategy
  that minimizes the impact of these events on ongoing inference tasks. Identify the most suitable load
  balancing algorithm for this scenario and explain its core mechanism for reducing data re-partitioning
  and cache invalidation across the Qualcomm Cloud AI 100 devices.
details:
  realistic_solution: Consistent hashing is the most suitable load balancing algorithm. Its core mechanism
    involves mapping both the accelerators and the request keys onto a conceptual ring. When an accelerator
    is added or removed, only a small, localized portion of the hash space is affected, meaning only a
    fraction of the request mappings change. This significantly reduces the number of Qualcomm Cloud AI
    100 accelerators that need to re-cache large ML models (which can occupy a substantial portion of
    the 32 GB LPDDR4x memory), thereby minimizing data re-partitioning, preserving cached states, and
    maintaining stable high-throughput inference performance during scaling events.
  common_mistake: A common pitfall is implementing simpler load balancing techniques like modulo hashing
    or basic round-robin without considering the stateful nature of ML inference and the significant cost
    of reloading models (which can be several GBs into 32 GB LPDDR4x memory) on Qualcomm Cloud AI 100
    accelerators. This oversight leads to substantial performance degradation and high latency spikes
    during dynamic scaling or node failures, as most or all cached models might need to be reloaded across
    the cluster.
  napkin_math: 'Consider a cluster of 10 Qualcomm Cloud AI 100 accelerators, each with a 16 GB model loaded
    into its 32 GB LPDDR4x memory. If a new accelerator is added:


    1. With a naive modulo hashing, approximately 90% of the existing 16 GB model caches would need to
    be invalidated and reloaded. Calculate the total data (in GB) reloaded.

    2. With consistent hashing, only about 10% of the existing 16 GB model caches would need to be invalidated
    and reloaded. Calculate the total data (in GB) reloaded.


    What is the difference in data reloaded between the two approaches?'
