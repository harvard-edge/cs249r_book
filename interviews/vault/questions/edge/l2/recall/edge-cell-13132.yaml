id: edge-cell-13132
title: 'Edge TCO Recall: CapEx vs OpEx Tradeoff for Edge AI'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Define CapEx and OpEx in the context of edge AI deployments. State when each is preferred, and
  apply this to choosing between purchasing 100 Jetson Orin units ($499 each = $49.9K CapEx) vs renting
  equivalent cloud GPU instances ($0.50/hr/unit-equivalent = $0.50*8760*100=$438K OpEx/year). Which is
  preferred for a cash-constrained startup?
details:
  realistic_solution: 'Power: 100 × 60W × 8760hr × $0.10/1000 = $5,256/yr (not $52,600).'
  common_mistake: Equating CapEx preference with financial strength — actually, startups often prefer
    OpEx (cloud) because it preserves cash, despite higher long-term cost, while established companies
    with predictable workloads prefer CapEx.
  napkin_math: 'Annual fleet power: 100 devices × 60W × 8760hr × $0.10/kWh / 1000 = 100 × 60 × 8760 ×
    0.10 / 1000 = 5,256,000 / 1000 = $5,256/yr (not $52,600 which omits /1000).'
