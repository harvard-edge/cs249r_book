title: The DMA Offload Dividend
topic: vram-budgeting
status: published
provenance: imported
scenario: You're optimizing an inference pipeline on a Jetson AGX Orin. A preprocessing step produces
  a 300 KB tensor that needs to be moved from general LPDDR5 DRAM to a specific memory region for the
  GPU. You can use a CPU-driven `memcpy` or set up a DMA transfer. Assume a realistic `memcpy` can achieve
  10 GB/s, while the DMA controller can achieve 100 GB/s for this path. Compare the time it would take
  for each method to transfer the tensor.
details:
  realistic_solution: The correct way to solve this is to apply the bandwidth formula (Time = Size / Bandwidth)
    to each case using the *realistic* bandwidth numbers provided. The DMA controller, being specialized
    hardware, can move the data much more efficiently than the general-purpose CPU, resulting in a significantly
    lower transfer time and freeing up the CPU for other tasks.
  common_mistake: Engineers often assume a CPU `memcpy` can achieve the device's theoretical peak memory
    bandwidth (e.g., ~200 GB/s for a Jetson Orin). In practice, CPU overhead, cache effects, and bus contention
    mean `memcpy` is significantly slower than a dedicated DMA engine, which is designed for exactly this
    kind of memory-to-memory transfer without CPU intervention.
  napkin_math: 1.  **Data Size:** 300 KB = 300 * 10^3 bytes
