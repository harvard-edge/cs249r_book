schema_version: 1
id: edge-0154
title: The Fusion Overhead Fallacy
topic: kernel-fusion
status: published
provenance: imported
scenario: 'You are optimizing a small CNN on a Jetson AGX Orin for a real-time object detection pipeline.
  A profiler reveals a critical sequence of three operations: a 3x3 depth-wise convolution, a ReLU activation,
  and a batch normalization layer. Each operation is dispatched as a separate CUDA kernel. The execution
  times are 15µs for the convolution, 2µs for the ReLU, and 3µs for the batch norm. You know from the
  device specs that the kernel launch overhead is approximately 5µs per kernel. If you fuse these three
  operations into a single kernel, what is the approximate latency speedup for this specific sequence?'
details:
  realistic_solution: The speedup comes from reducing the number of kernel launches from three to one,
    thereby eliminating two instances of launch overhead. The core computation time remains the same.
  common_mistake: Engineers often miscalculate the impact of fusion. A primary mistake is to assume fusion
    reduces the core computational time of the operations themselves, rather than just eliminating the
    overhead of launching separate kernels. Another error is to calculate the raw time saved instead of
    the percentage speedup, or to only account for the elimination of one kernel launch instead of all
    but the first.
  napkin_math: 'Total execution time = 15µs (Conv) + 2µs (ReLU) + 3µs (BN) = 20µs core compute.


    **Before fusion (3 separate kernels):**

    - Kernel launch overhead: 3 × 5µs = 15µs.

    - Core compute: 20µs.

    - Total: 20 + 15 = **35µs**.


    **After fusion (1 fused kernel):**

    - Kernel launch overhead: 1 × 5µs = 5µs.

    - Core compute: 20µs (unchanged — the arithmetic is the same).

    - Total: 20 + 5 = **25µs**.


    **Speedup: 35 / 25 = 1.40x** (40% faster).


    **Time saved:** 35 - 25 = **10µs** (two eliminated kernel launches × 5µs each).


    **Additional hidden benefit:** Fusion also eliminates two intermediate memory round-trips. Without
    fusion, the Conv output is written to DRAM, then read back for ReLU, written again, then read for
    BN. With fusion, intermediate results stay in registers/shared memory. If each DRAM round-trip adds
    ~2µs for this tensor size, the real savings are:

    - Unfused: 35µs + 2 × 2µs (memory round-trips) = **39µs**.

    - Fused: 25µs + 0µs = **25µs**.

    - True speedup: 39/25 = **1.56x**.


    This is why operator fusion is one of the most impactful optimizations for edge inference — the overhead
    from kernel launches and memory traffic can exceed the actual computation time for small operators.'
