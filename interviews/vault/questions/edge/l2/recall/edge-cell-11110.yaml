id: edge-cell-11110
title: 'Kernel Fusion: Recall — Why is Kernel Fusion Critical for Jetson Orin?'
topic: kernel-fusion
status: published
provenance: imported
scenario: On Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W), why does kernel fusion matter more than on
  H100 (3.35 TB/s HBM3), and what is the memory bandwidth of Jetson Orin LPDDR5?
details:
  realistic_solution: 'Jetson Orin LPDDR5: 68 GB/s bandwidth. Ridge point: 275 TOPS (INT8) / 68 GB/s =
    4.04 OPS/byte = 4 INT8 operations per byte. Any operation with arithmetic intensity < 4 is memory-bound.
    This is a much lower bar than H100''s ridge point (295 FLOPS/byte), meaning far more operations are
    memory-bound on Jetson → fusion helps more.'
  common_mistake: Assuming H100 needs fusion more because it has larger models; not knowing Jetson LPDDR5
    bandwidth and not comparing bandwidth-to-compute ratios.
  napkin_math: 'Jetson Orin bandwidth: 68 GB/s. Compute: 275 TOPS INT8. Ridge point: 275,000 / 68 = 4,044
    INT8 OPS/byte. H100: 989,000 / 3,350 = 295 FLOPs/byte (BF16). Any elementwise op (1 OP/byte) is 4×
    below Jetson''s ridge vs 295× below H100''s. Scale: operations with AI between 4 and 295 are compute-bound
    on H100 but memory-bound on Jetson. Example: matrix multiply batch=1, hidden=512: AI = 2×512 FLOPs/byte
    = 1,024 FLOPs/B → compute-bound on H100 (1024 > 295) but compute-bound on Jetson too (1024 > 4). But
    batch=1, hidden=64: AI = 128 OPS/B → compute-bound on H100, compute-bound on Jetson (128 > 4). Key:
    elementwise fusion on Jetson saves 68 GB/s × saved_bytes bandwidth, which is precious vs H100''s 3.35
    TB/s.'
