id: edge-0266
title: The Unstable Perception Queue
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing the perception system for an autonomous vehicle. The forward-facing camera
  feeds frames to your object detection model at a constant rate of 30 frames per second (FPS). The system
  has a hard real-time deadline, meaning every frame must be processed to avoid catastrophic failure.
  Your model, running on an edge device like a Jetson AGX Orin, takes exactly 40ms to process a single
  frame. Assuming the system starts with an empty queue, calculate how many frames are waiting in the
  processing queue after exactly one second of operation.
details:
  realistic_solution: The system is unstable because the time to process a frame (40ms) is longer than
    the time between frame arrivals (1000ms / 30 FPS ≈ 33.3ms). The queue will grow continuously.
  common_mistake: Engineers often confuse throughput with latency. They might think that because the model
    is 'fast' (40ms), it's fine. They fail to compare the processing time (service rate) directly against
    the frame arrival interval (arrival rate). If Processing Time > Arrival Interval, the queue is unstable
    and will grow infinitely, violating any real-time guarantee.
  napkin_math: '1. **Arrival rate:** 30 FPS → 1 frame every 33.3ms.

    2. **Service rate:** 1 frame per 40ms → max throughput = 25 FPS.

    3. **Stability check:** Arrival rate (30) > Service rate (25) → queue is unstable and grows unboundedly.

    4. **Frames processed in 1 second:** floor(1000ms / 40ms) = 25 frames.

    5. **Frames arrived in 1 second:** 30 frames.

    6. **Frames waiting in queue after 1 second:** 30 - 25 = 5 frames (and growing by 5 every second).'
