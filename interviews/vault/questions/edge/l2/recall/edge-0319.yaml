id: edge-0319
title: The Real-Time Batching Trap (edge-0319)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: Your team is building the perception system for an autonomous vehicle. The system uses a camera
  running at 30 FPS, meaning you have a hard real-time deadline of 33ms to process each frame. Your object
  detection model takes exactly 20ms to process a single frame (batch size 1) on the Jetson AGX Orin hardware.
details:
  realistic_solution: This change will cause the system to fail its real-time deadline. The first frame
    arrives at t=0 but must be held in a buffer, waiting for the second frame. Since the camera is 30
    FPS, the second frame arrives at t=33ms. Only then can the batch of two be sent for processing. The
    batch processing itself takes 30ms. Therefore, the result for the first frame is only available at
    t = 33ms (wait time) + 30ms (process time) = 63ms. This latency of 63ms is nearly double the required
    33ms deadline, which would be a critical failure in an autonomous vehicle.
  common_mistake: Engineers often focus only on throughput (frames processed per second) and forget that
    static batching introduces a queuing delay. They might calculate that since a batch of 2 takes 30ms,
    the amortized per-frame time is 15ms (30ms / 2), which is faster than the 20ms single-frame time,
    and incorrectly conclude this is a 'win'. They forget that the first frame had to wait for the second
    one to arrive, which is a fatal flaw in a real-time system.
  napkin_math: 'Batch 1 Latency: Frame 1 arrives at t=0, finishes at t=20ms. Meets 33ms deadline. Batch
    2 Pipeline: Frame 1 arrives at t=0, must wait for Frame 2 at t=33.3ms. Batch inference takes, say,
    30ms. Frame 1 completes at 33.3 + 30 = 63.3ms. The latency for Frame 1 is now 63.3ms, completely blowing
    past the 33ms hard real-time deadline. You cannot batch across time in strict real-time control systems.'
