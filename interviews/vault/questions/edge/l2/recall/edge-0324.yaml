id: edge-0324
title: The Jetson Roofline Riddle
topic: roofline-analysis
status: published
provenance: imported
scenario: You're an engineer on an autonomous driving team, tasked with optimizing a new perception model
  on a NVIDIA Jetson AGX Orin. You profile a specific convolutional layer and find that to process a batch
  of images, it performs 5 trillion INT8 operations and reads 10 GB of data (activations + weights) from
  DRAM. Based on the Orin's hardware specs, explain whether this layer is compute-bound or memory-bound.
details:
  realistic_solution: The layer is **memory-bound**. To determine this, we must calculate the Arithmetic
    Intensity (AI) of the layer and compare it to the 'ridge point' of the hardware. The ridge point is
    the AI value where a system transitions from being memory-bound to compute-bound.
  common_mistake: A common mistake is to look at the large number of operations (5 TOPS) in isolation
    and assume the workload must be compute-bound. This ignores the critical relationship between compute
    and memory access. True optimization requires analyzing the ratio of operations to bytes (Arithmetic
    Intensity) to see what the true bottleneck is.
  napkin_math: Arithmetic Intensity (AI) = Total Ops / Total Bytes = 5e12 Ops / 10e9 Bytes = 500 Ops/Byte.
    Orin Ridge Point = 275 TOPS / 204.8 GB/s = 275e12 / 204.8e9 = 1342.7 Ops/Byte. Because the layer's
    AI (500) is significantly lower than the hardware's ridge point (1343), the GPU will spend most of
    its time waiting for data from DRAM. This layer is heavily memory-bound.
