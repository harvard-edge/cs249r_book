id: edge-0145
title: The Stereo Vision Memory Squeeze
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are an engineer on a smart camera team. Your current object detection model is 50 MB in
  FP16 precision. Your product manager wants to add a second camera for a stereo vision feature, which
  requires running a second, identical model in parallel. The edge device you're using has a hard 60 MB
  memory budget available for model weights in its high-speed SRAM. Your team proposes quantizing both
  models to INT8 to meet this constraint. Explain whether this strategy will work and why.
details:
  realistic_solution: Yes, this strategy will work. An FP16 model uses 2 bytes for every parameter, while
    an INT8 model uses only 1 byte. Quantizing the 50 MB FP16 model to INT8 will halve its size.
  common_mistake: A common mistake is to confuse the baseline precision. Engineers moving from a 32-bit
    world often default to thinking of quantization as a 4x memory saving (FP32 -> INT8). However, when
    the starting point is FP16, the saving is only 2x. Another error is forgetting the request is for
    *two* models, and only calculating the memory for one.
  napkin_math: '1. **Initial State:** | Single FP16 model size: 50 MB | Required memory for two FP16 models:
    2 * 50 MB = 100 MB | Memory budget: 60 MB | Conclusion: Fails, as 100 MB > 60 MB.'
