id: edge-0729
title: The OTA Bandwidth Trap
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You are an ML Systems Engineer for an automotive company managing a fleet of vehicles. You need
  to push a critical over-the-air (OTA) update to fix a flaw in the pedestrian detection model. The binary
  patch for the model is **12 MegaBytes (MB)**. The vehicle's cellular modem has a stable connection averaging
  **10 Megabits per second (Mbps)**.
details:
  realistic_solution: To solve this, you must first align the units. The data size is in MegaBytes (MB)
    and the bandwidth is in Megabits per second (Mbps). Since 1 Byte = 8 bits, you convert the patch size
    to bits and then divide by the bandwidth.
  common_mistake: The most common mistake is confusing MegaBytes (MB) and Megabits (Mb). Network speeds
    are almost always measured in bits per second, while file sizes are measured in bytes. Forgetting
    to multiply the file size in bytes by 8 to get its size in bits leads to underestimating the download
    time by a factor of 8.
  napkin_math: 'Patch size: 12MB = 96Mb. 3G/LTE fallback edge connection: 5 Mbps. Download time = 96Mb
    / 5 Mbps = 19.2 seconds. Applying bsdiff patch to a 3.5GB model takes ~5s on an Orin ARM CPU. Total
    downtime is 24.2 seconds. Cost for 100k fleet: 12MB * 100,000 = 1.2TB. At $0.05/GB, OTA transmission
    costs just $60.'
