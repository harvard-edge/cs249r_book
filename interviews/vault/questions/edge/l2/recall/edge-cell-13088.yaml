schema_version: 1
id: edge-cell-13088
title: 'Edge Systolic Array Recall: Systolic Array Operation Principle'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Explain the key principle of a systolic array and why it is more energy-efficient than a conventional
  processor for matrix multiply. Apply this to Hailo-8 (26 TOPS INT8, 2.5W) vs ARM Cortex-A78 (embedded
  in Jetson Orin, ~0.5 TOPS at 2W for INT8). State the TOPS/W difference and explain it architecturally.
details:
  realistic_solution: 'Systolic array principle: processing elements (PEs) arranged in a grid. Data flows
    rhythmically (systolically) from PE to PE. Each weight loaded once into a PE, reused for all input
    vectors passing through. No external memory access during computation. Energy: dominated by memory
    access in conventional CPU (DRAM: 200pJ/bit, register: 1pJ/bit, ALU: 0.1pJ/bit). Systolic minimizes
    DRAM reads. Hailo-8: 26 TOPS / 2.5W = 10.4 TOPS/W. ARM Cortex-A78: 0.5 TOPS / 2W = 0.25 TOPS/W. Ratio:
    10.4/0.25 = 41.6x better TOPS/W for systolic. Source: most energy in CPU goes to data movement, not
    arithmetic.'
  common_mistake: 'Describing a systolic array as simply ''many cores'' without explaining the data reuse
    principle: each PE receives data from neighbors (systolic pumping) eliminating redundant memory fetches
    that dominate energy in von Neumann architectures.'
  napkin_math: 'Hailo-8: 26 TOPS / 2.5W = 10.4 TOPS/W. ARM Cortex-A78: ~100 GOPS INT8 per core (not 0.5
    TOPS). More accurately: 8 cores * 200 GOPS = 1.6 TOPS at 5W ≈ 0.32 TOPS/W. Ratio: 10.4/0.32=32.5x.
    Energy per MAC: systolic ~0.5pJ (register access). CPU with DRAM: ~200pJ (DRAM load) per MAC parameter.
    400x difference in energy per weight access. Systolic eliminates 99.75% of weight memory energy through
    register-level reuse.'
