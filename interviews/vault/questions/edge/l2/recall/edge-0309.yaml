schema_version: 1
id: edge-0309
title: The Depthwise Separable Dividend (edge-0309)
topic: attention-scaling
status: draft
provenance: imported
scenario: You're optimizing a perception model for a self-driving car's camera system, targeting a Jetson
  AGX Orin. A profiler shows a standard 3x3 convolutional layer is a major bottleneck. The layer takes
  a `56x56x128` (H,W,C_in) feature map and produces a `56x56x256` (H,W,C_out) output. You propose replacing
  it with a 3x3 depthwise separable convolution. Explain the computational savings by calculating the
  approximate reduction factor in Multiply-Accumulate operations (MACs).
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, expensive operation with two
    cheaper ones: a 3x3 depthwise convolution (which applies a single filter per input channel) followed
    by a 1x1 pointwise convolution (which combines the outputs). To find the true reduction factor, you
    must sum the MACs of both steps and divide the MACs of the original standard convolution by this sum.


    For input 56x56x128 → output 56x56x256 with 3x3 kernel:

    - Standard Conv MACs: 56 x 56 x 128 x 256 x 9 = 925 MMACs.

    - Depthwise MACs: 56 x 56 x 128 x 9 = 3.61 MMACs.

    - Pointwise MACs: 56 x 56 x 128 x 256 = 103 MMACs.

    - Total separable: 3.61M + 103M = 106.6 MMACs.

    - Reduction factor: 925 / 106.6 ≈ **8.7x** fewer MACs.'
  common_mistake: Engineers often miscalculate the reduction factor by oversimplifying the two-step process.
    A common error is to only consider the cost of the depthwise step and compare it to the standard convolution,
    leading to an exaggerated saving of ~256x. Another error is to ignore the depthwise step's cost entirely,
    assuming the pointwise step dominates, which yields an answer of exactly 9x (the kernel size squared).
  napkin_math: 'Input: 56×56×128, Output: 56×56×256, Kernel: 3×3.

    1. **Standard Conv MACs:** 56 × 56 × 128 × 256 × 9 = 924,844,032 ≈ 925 MMACs.

    2. **Depthwise Conv MACs:** 56 × 56 × 128 × 9 = 3,612,672 ≈ 3.6 MMACs.

    3. **Pointwise Conv MACs:** 56 × 56 × 128 × 256 = 102,760,448 ≈ 103 MMACs.

    4. **Total Separable:** 3.6 + 103 = 106.6 MMACs.

    5. **Reduction:** 925 / 106.6 = 8.7×.

    Formula: 1/(1/C_out + 1/K²) = 1/(1/256 + 1/9) = 8.7×.'
