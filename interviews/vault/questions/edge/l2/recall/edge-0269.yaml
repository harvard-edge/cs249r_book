schema_version: 1
id: edge-0269
title: The Orin's Ridge Point
topic: roofline-analysis
status: published
provenance: imported
scenario: Your autonomous vehicle team is profiling a new perception model on a Jetson AGX Orin. You observe
  that a specific layer performs 200 billion INT8 operations (200 GOPS) and reads 250 MB of data (weights
  and activations) from DRAM for a single inference. The Orin has 275 TOPS of peak INT8 compute and 204.8
  GB/s of memory bandwidth. Is this specific layer compute-bound or memory-bound on the AGX Orin? Explain
  your reasoning.
details:
  realistic_solution: The layer is memory-bound. To determine this, we must compare the model's Arithmetic
    Intensity (AI) to the hardware's Ridge Point. The Ridge Point is the minimum AI a model needs to have
    to be compute-bound.
  common_mistake: Engineers often guess based on qualitative feelings about the hardware, saying 'the
    Orin has a lot of compute, so it must be memory-bound' without doing the math. Another common error
    is incorrectly calculating the Arithmetic Intensity or the hardware's Ridge Point, leading to the
    wrong conclusion. Forgetting to normalize units (e.g., TOPS vs GOPS, GB/s vs MB) is a frequent source
    of bugs in this calculation.
  napkin_math: "Ridge Point = Peak Compute / Memory Bandwidth\n\n1. **Calculate the Orin's Ridge Point:**\n\
    \   Ridge Point = 275 TOPS / 204.8 GB/s = **1,342 OPS/Byte**.\n\n2. **Calculate the workload's Arithmetic\
    \ Intensity:**\n   AI = Operations / Bytes loaded = 200 GOPS / 250 MB = 200,000 MOPS / 250 MB = **800\
    \ OPS/Byte**.\n\n3. **Compare AI to Ridge Point:**\n   Workload AI (800) < Ridge Point (1,342).\n\
    \   Since the workload's AI is **below** the ridge point, the layer is **memory-bound**.\n\n4. **Actual\
    \ achievable throughput (memory-bound):**\n   Throughput = Memory BW × AI = 204.8 GB/s × 800 OPS/Byte\
    \ = **163.8 TOPS**.\n   This is only 163.8 / 275 = **59.6%** of the Orin's peak compute capability.\n\
    \n5. **Inference time for this layer:**\n   - Compute-limited time: 200 GOPS / 275 TOPS = 0.73 ms.\n\
    \   - Memory-limited time: 250 MB / 204.8 GB/s = 1.22 ms.\n   - Actual time = max(0.73, 1.22) = **1.22\
    \ ms** (memory-bound).\n\n6. **How to make it compute-bound:** Increase AI above 1,342 by either:\n\
    \   - Increasing batch size (more operations per weight read).\n   - Using operator fusion to reduce\
    \ memory traffic.\n   - Applying weight compression to reduce bytes loaded."
