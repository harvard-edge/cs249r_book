id: edge-0318
title: The Depthwise Separable Efficiency Gain
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: You're optimizing a computer vision pipeline for an autonomous vehicle's ADAS, which runs on
  an edge accelerator like a NVIDIA Jetson. Your profiler identifies a standard 3x3 convolutional layer
  as a major performance bottleneck. The input tensor to this layer is 112x112x256 (HWC), and it produces
  an output with 512 channels, using a stride of 1 and 'same' padding.
details:
  realistic_solution: 'A depthwise separable convolution breaks a standard convolution into two much cheaper
    steps:

    1.  A **depthwise convolution** that applies a single 3x3 filter to each of the 256 input channels
    independently.

    2.  A **pointwise convolution** that uses a 1x1 filter to combine the 256 outputs from the depthwise
    step into the final 512 output channels.'
  common_mistake: A common mistake is to only consider the first (depthwise) stage of the separable convolution
    and forget the second (pointwise) stage. This leads to a wild overestimation of the efficiency gain,
    suggesting a ~512x improvement (equal to the number of output channels) instead of the more realistic
    ~9x.
  napkin_math: '1. Standard MACs per pixel location: `Input Channels × Output Channels × Kernel Height
    × Kernel Width`'
