schema_version: 1
id: edge-0739
title: The OTA Flash Budget Crunch
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're scoping the storage for an automotive ECU running a driver-assist feature. The ECU has
  a 512 MB flash memory chip. The bootloader and real-time operating system (RTOS) consume 48 MB. For
  safety, the system architecture requires a dedicated 150 MB partition for the OTA (Over-the-Air) update
  agent to download and stage new packages before installation. The current application, including its
  vision model, uses 200 MB. A pending update contains a new, larger vision model that is 120 MB. Explain
  if the new model update can be safely deployed. Calculate the remaining free space.
details:
  realistic_solution: No, the update cannot be safely deployed. We must account for all reserved space
    on the flash memory. The space available to the application is not the total flash size, but what
    remains after the OS and the critical OTA partition are reserved.
  common_mistake: The most common mistake is to ignore the reserved OTA partition. Engineers calculate
    the free space by only subtracting the OS and current application from the total (512 - 48 - 200 =
    264 MB) and incorrectly conclude there is plenty of room. They forget that for a safe OTA update,
    the system needs a dedicated space to download the package, which is unavailable to the application,
    effectively reducing the usable flash.
  napkin_math: 1. **Total Storage:** 512 MB | 2. **Reserved System Space:** 48 MB (OS + Bootloader) |
    3. **Reserved OTA Partition:** 150 MB | 4. **Current Application Size:** 200 MB | 5. **Total Committed
    Space:** 48 MB + 150 MB + 200 MB = 398 MB | 6. **Effective Free Space:** 512 MB (Total) - 398 MB (Committed)
    = 114 MB | 7. **New Model Size:** 120 MB | 8. **Conclusion:** The required 120 MB is greater than
    the available 114 MB. The update will fail.
