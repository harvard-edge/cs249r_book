id: edge-0181
title: The ADAS VRAM Budget
topic: vram-budgeting
status: published
provenance: imported
scenario: You're an engineer on an autonomous vehicle team, tasked with deploying a new perception model
  onto a Jetson AGX Orin. The model has 44 million parameters and you plan to run it using FP16 precision.
  The framework profiler tells you that the peak memory consumed by activation tensors for a single frame
  is 14 MB. Compare the VRAM required for just the model's parameters versus the total VRAM required including
  activations.
details:
  realistic_solution: The total VRAM required for inference is the sum of the memory needed for the model's
    parameters and the peak memory used by its activation tensors. First, calculate the parameter memory
    by multiplying the parameter count by the size of the data type (2 bytes for FP16). Then, add the
    given peak activation memory to find the true total.
  common_mistake: Engineers often only account for the parameter memory, completely forgetting that the
    intermediate activation tensors also consume significant VRAM. This leads to underestimating the memory
    footprint and can cause out-of-memory errors during runtime, especially with large input resolutions
    or batch sizes.
  napkin_math: 1. **Parameter Memory:** 44,000,000 parameters × 2 bytes/parameter (for FP16) = 88,000,000
    bytes = 88 MB.
