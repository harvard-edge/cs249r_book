id: edge-0235
title: 'The Perception Deadline: Real-Time Deadlines'
topic: real-time-deadlines
status: draft
provenance: imported
scenario: Your team is developing the perception system for an autonomous vehicle using a Jetson AGX Orin.
  The system processes frames from a 30 FPS camera, which imposes a hard real-time deadline of 33ms per
  frame. Your vision model takes exactly 15ms to process a single frame (its Time to First Token, or TTFT).
  To improve system throughput, you want to use static batching. Explain the maximum batch size you can
  use without violating the 33ms deadline for any given frame.
details:
  realistic_solution: To calculate the maximum batch size, we must account for the queuing delay. At 30
    FPS, a new frame arrives every 33.3ms. If we wait for a second frame to form a batch of 2, the first
    frame has already been waiting for 33.3ms before processing even begins. With a processing time of
    30ms for a batch of 2, the first frame's total latency would be 63.3ms, violating the 33ms deadline.
    Therefore, the maximum batch size is 1.
  common_mistake: The most common mistake is to only calculate the processing time (`N * 15ms <= 33ms`
    giving N=2) and completely forget the queuing delay. For a single 30 FPS camera, waiting for the next
    frame inherently adds 33.3ms of latency to the first frame, making static batching > 1 impossible
    under a strict 33ms deadline.
  napkin_math: '1. Identify Deadline: Camera is 30 FPS, so a new frame arrives every 33.3ms. The deadline
    is 33ms. 2. Calculate Latency: For a batch of 2, the first frame waits 33.3ms for the second frame
    to arrive. Processing takes 2 * 15ms = 30ms. Total latency for the first frame = 33.3ms + 30ms = 63.3ms.
    This violates the 33ms deadline.'
