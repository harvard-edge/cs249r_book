id: edge-0335
title: The Depthwise Separable Dividend (edge-0335)
topic: attention-scaling
status: draft
provenance: imported
scenario: Your team is optimizing a perception model for an autonomous vehicle's edge computer, which
  has a strict 33ms latency budget. A key bottleneck is a standard 2D convolutional layer with a 3x3 kernel,
  256 input channels, and 512 output channels. A junior engineer suggests replacing it with a depthwise
  separable convolution to save compute.
details:
  realistic_solution: 'The reduction in computation comes from factorizing the single, dense standard
    convolution into two smaller operations: a lightweight 3x3 depthwise convolution (one filter per input
    channel) and a more expensive 1x1 pointwise convolution (to mix channels and change dimension).'
  common_mistake: Engineers often dramatically overestimate the savings by only considering the depthwise
    part of the operation, which is incredibly cheap. They forget that the subsequent 1x1 pointwise convolution,
    which is required to change the channel dimension, accounts for the vast majority of the computation
    in the new block. The savings are significant, but not by a factor of hundreds.
  napkin_math: Standard Conv MACs per pixel = K^2 * C_in * C_out = 3^2 * 256 * 512 = 1,179,648. Depthwise
    Separable MACs per pixel = (K^2 * C_in) + (C_in * C_out) = (3^2 * 256) + (256 * 512) = 2,304 + 131,072
    = 133,376. Reduction factor = 1,179,648 / 133,376 = 8.84x. By separating the spatial filtering (depthwise)
    from the channel mixing (pointwise), you reduce the layer's compute burden by ~8.8x.
