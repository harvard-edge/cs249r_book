id: edge-0374
title: The Edge TCO Break-Even
topic: tco-cost-modeling
status: draft
provenance: imported
scenario: 'Your automotive team is launching a new driver drowsiness detection feature. You have two options:
  a cloud API costing $2/month per vehicle, or an edge NPU module costing a one-time $48 per vehicle.'
details:
  realistic_solution: The correct approach is to compare the recurring operational expenditure (OpEx)
    of the cloud solution to the one-time capital expenditure (CapEx) of the edge solution. The break-even
    point is the time it takes for the accumulated savings from the avoided OpEx to equal the initial
    CapEx.
  common_mistake: Engineers often focus only on the marginal cost of a single inference or API call, completely
    ignoring the amortized capital expenditure (CapEx) of the hardware. They might incorrectly assume
    the edge deployment is 'free' because a compute module is already in the car, failing to account for
    the specific BOM cost increase required to enable this new feature.
  napkin_math: "Cloud Cost (OpEx) = $2 / month per vehicle for cloud inference API\nEdge Hardware Cost\
    \ (CapEx) = $48 per vehicle (additional BOM cost for a dedicated edge NPU module)\n\n1. **Monthly\
    \ cloud cost per vehicle:** $2/month\n2. **Annual cloud cost per vehicle:** $2 × 12 = $24/year\n3.\
    \ **Break-even time:** $48 CapEx / $2 per month = **24 months** (exactly 2 years)\n4. **Over a 10-year\
    \ vehicle lifetime:**\n   - Cloud total: $2 × 12 × 10 = **$240 per vehicle**\n   - Edge total: **$48\
    \ per vehicle** (one-time cost, no recurring fees)\n   - Savings: $240 − $48 = **$192 per vehicle**\n\
    \n5. **At fleet scale (100,000 vehicles):**\n   - Cloud total: $24.0M over 10 years\n   - Edge total:\
    \ $4.8M one-time\n   - Fleet savings: **$19.2M**\n\nThe edge deployment breaks even at 24 months.\
    \ For any vehicle with a lifetime beyond 2 years, edge deployment is the clear winner on TCO. The\
    \ edge approach also eliminates the latency and connectivity dependency of cloud inference, which\
    \ is critical for safety features."
