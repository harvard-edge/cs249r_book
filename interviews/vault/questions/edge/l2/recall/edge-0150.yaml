id: edge-0150
title: The Continuous Batching Queue
topic: batching-strategies
status: published
provenance: imported
scenario: An edge device in a smart store uses continuous batching to process analytics from a video feed.
  The model's inference latency is 30ms for a single frame. The system is configured to form and dispatch
  a new batch every 40ms. A camera captures a frame (Frame A) at time `T=10ms`. Interpret the system's
  behavior and calculate the total time until the result for Frame A is ready, assuming it's the only
  frame in the queue.
details:
  realistic_solution: Frame A arrives at T=10ms and must wait in a queue for the next scheduled batch
    dispatch, which occurs at T=40ms. The queuing delay is 30ms (40ms - 10ms). At T=40ms, the batch containing
    Frame A begins processing. Since it's the only frame, inference takes 30ms. The result is ready at
    T=40ms + 30ms = 70ms. The total latency is 60ms from the frame's arrival time.
  common_mistake: Engineers often confuse the components of total latency. They might only consider the
    inference time itself, forgetting to add the queuing delay—the time a request spends waiting for the
    next batching window to open. The total latency experienced by the user (or downstream service) is
    the sum of time spent in the queue and time spent in processing.
  napkin_math: 1. **Identify Arrival Time:** Frame A is captured at `T_arrival = 10ms`.
