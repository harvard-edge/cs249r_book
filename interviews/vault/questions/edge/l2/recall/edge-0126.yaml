title: The Compromised Robot
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your company deploys a fleet of 1,000 delivery robots, each using a Jetson AGX Orin for its
  vision-based navigation system. A competitor gets physical access to one of the robots. Their goal is
  to tamper with the onboard model weights stored in flash memory, making the robot fail to recognize
  stop signs. As the ML systems engineer, what is the most fundamental and effective *first line of defense*
  you should explain to your team to prevent the robot from ever running this maliciously modified model?
details:
  realistic_solution: The correct first step is to enable Secure Boot on the Jetson AGX Orin. Secure Boot
    creates a hardware root of trust. It uses cryptographic signatures to ensure that every piece of software,
    from the bootloader to the operating system and finally to the ML model itself, is authentic and untampered.
    If an attacker modifies even a single bit of the model file on the flash storage, the signature verification
    will fail during the boot process, and the compromised code will be blocked from executing. This prevents
    the robot from ever running the dangerous, tampered model.
  common_mistake: Engineers often jump to software-only or network-level solutions (like firewalls or
    adversarial training) and forget that physical access bypasses those layers entirely. They may also
    suggest encrypting the model, but this is insufficient if the attacker can compromise the operating
    system to intercept the decryption key or dump the model from RAM after it's loaded.
  napkin_math: Let's calculate the immediate operational cost of a fleet-wide vulnerability that requires
    manual intervention because Secure Boot and a secure OTA (Over-The-Air) update mechanism were not
    implemented.
