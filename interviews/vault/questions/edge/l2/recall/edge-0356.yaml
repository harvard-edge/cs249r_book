title: The Depthwise Separable Dividend (edge-0356)
topic: attention-scaling
status: draft
provenance: imported
scenario: You are optimizing a CNN-based perception model for an autonomous vehicle's edge compute module.
  A key layer is a standard 3x3 convolution with 256 input channels and 512 output channels. To meet the
  latency budget on the Jetson AGX Orin, you are considering replacing this layer with a 3x3 depthwise
  separable convolution. Explain the architectural change and calculate the approximate parameter reduction
  factor for this single layer.
details:
  realistic_solution: 'A standard 3x3 convolution performs spatial and cross-channel convolution in one
    step. A depthwise separable convolution splits this into two steps:

    1.  **Depthwise Convolution:** A single 3x3 filter is applied to each of the 256 input channels independently.
    This handles the spatial dimension.

    2.  **Pointwise Convolution:** A 1x1 convolution then combines the outputs of the depthwise step to
    create the 512 output channels. This handles the cross-channel dimension.'
  common_mistake: Engineers often miscalculate the reduction factor by either completely ignoring the
    parameter cost of the 1x1 pointwise convolution, leading to a wildly optimistic estimate, or by incorrectly
    summing the components. Another common error is to simply guess a small constant factor like '2x'
    or '3x' without understanding the relationship between the kernel size and the number of channels.
  napkin_math: 1.  **Standard Convolution Parameters:**
