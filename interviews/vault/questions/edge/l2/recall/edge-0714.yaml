id: edge-0714
title: The Overnight Update Dilemma
topic: container-orchestration
status: draft
provenance: imported
scenario: You are an engineer managing a fleet of 10,000 autonomous delivery robots. A critical 500 MB
  firmware update must be rolled out. The robots are only available to download this update during a 2-hour
  window each night while charging. The cellular connection to each robot is unreliable, giving it only
  a 90% chance of successfully completing the download on any given night.
details:
  realistic_solution: This is a problem of modeling the exponential decay of the non-updated device population.
    If 90% of devices succeed each night, it means 10% of the remaining un-updated devices will fail and
    carry over to the next night. We need to find the number of nights, 't', until the un-updated population
    is less than or equal to 1% of the total fleet.
  common_mistake: The most common mistake is to focus on the best-case scenario for a single device. Engineers
    calculate the download time (which is short), see it fits in the 2-hour window, and incorrectly conclude
    the entire fleet will update in one night. This fails to model the probabilistic nature of network
    reliability at scale, which results in a 'long tail' of devices that repeatedly fail to update.
  napkin_math: 'Each night 90% of remaining unupdated devices succeed. After night t, unupdated = 10000
    * (0.1)^t. Need unupdated <= 100 (1%). 10000 * 0.1^t <= 100 => 0.1^t <= 0.01 => t >= 2. After 2 nights:
    10000*0.01 = 100 devices remain. Need t=3 for <1%: 10000*0.001=10. So 2 nights for exactly 1%, 3 nights
    for well under.'
