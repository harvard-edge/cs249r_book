id: edge-0187
title: The Real-Time Deadline Violation
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're working on the perception system for an autonomous vehicle, which has a hard real-time
  deadline of 33ms (30 FPS) to process each camera frame. Your model currently runs on a Jetson AGX Orin
  and takes 20ms for inference with a batch size of 1. To improve overall throughput, a teammate suggests
  doubling the batch size to 2. Assuming the inference time scales linearly with batch size, explain what
  happens to your system's ability to meet its deadline.
details:
  realistic_solution: Increasing the batch size to 2 will cause the system to miss its 33ms deadline.
    The inference time for the batch will become 40ms (20ms/frame × 2 frames). Even though the *average*
    time per frame might seem appealing, the system must wait for the entire batch to complete before
    the results for the first frame are available. This 40ms processing time violates the 33ms hard real-time
    requirement, meaning the vehicle's perception will consistently lag, which is unacceptable.
  common_mistake: Confusing throughput with latency. Engineers often focus on the average number of frames
    processed per second (throughput) and forget that for a real-time system, the processing time for
    a single, specific frame (latency) is the critical metric that cannot be violated.
