id: edge-0176
title: 'The Federated vs. Centralized Upload Tax: Federated Learning'
topic: federated-learning
status: draft
provenance: imported
scenario: You are leading an A/B test comparing two training strategies for a fleet of 10,000 edge devices
  that monitor industrial equipment. Your goal is to select the most cost-effective strategy in terms
  of data upload volume.
details:
  realistic_solution: The core trade-off is between privacy/communication cost (Federated) and computational
    simplicity (Centralized). Strategy A requires uploading a massive 5 TB of raw data daily (10,000 devices
    * 500 MB/device). Strategy B, while requiring on-device compute, dramatically reduces the data upload
    requirement.
  common_mistake: The most common mistake is to confuse the precision, using 2 bytes (FP16) instead of
    4 bytes (FP32) for the gradient calculation. Another error is calculating the upload volume for a
    single device (40 MB) rather than the entire fleet of 10,000 devices. Some candidates may also incorrectly
    compare it to the 5TB from the centralized approach.
  napkin_math: '1. Strategy A data: 10,000 devices * 500 MB = 5,000,000 MB (5 TB) per day. 2. Strategy
    B (Federated): Sends only model weight updates, usually a few MBs per device. Assuming 10 MB updates:
    10,000 * 10 MB = 100 GB. Strategy B cuts upload volume by 50x, drastically reducing data transmission
    costs.'
