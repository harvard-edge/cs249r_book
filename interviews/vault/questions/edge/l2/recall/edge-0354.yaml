title: The Edge Roofline Ridge Point (edge-0354)
topic: roofline-analysis
status: draft
provenance: imported
scenario: You are an ML systems engineer on an autonomous vehicle team using a Jetson AGX Orin, which
  is running in a mode that provides 275 TOPS of INT8 performance. To optimize your perception models,
  you first need to understand the performance characteristics of the hardware itself.
details:
  realistic_solution: The ridge point of a roofline model represents the hardware's own Arithmetic Intensity
    (AI). It's the point where the diagonal memory-bound performance line meets the flat compute-bound
    performance ceiling. It is calculated by dividing the peak compute throughput by the peak memory bandwidth.
    For the Jetson AGX Orin, this value tells us the minimum operational intensity a model needs to have
    to be limited by compute rather than memory bandwidth.
  common_mistake: A common mistake is to confuse a hardware's arithmetic intensity (Ops/Byte) with its
    power efficiency (TOPS/W), leading engineers to incorrectly use the device's power rating in the roofline
    calculation. Another frequent error is simple unit mismanagement, such as being off by a factor of
    1,000 by mixing up the exponents for Tera- (10^12) and Giga- (10^9).
  napkin_math: 1. **Identify Peak Compute:** Jetson AGX Orin (INT8) = 275 TOPS = 275 * 10^12 Ops/sec.
