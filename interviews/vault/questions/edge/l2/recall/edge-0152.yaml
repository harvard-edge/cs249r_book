id: edge-0152
title: The Passive Cooling Limit
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing an AI-powered quality inspection camera for a manufacturing line. The system
  uses a Hailo-8 accelerator, which consumes 2.5W during active inference. The entire camera is in a sealed,
  fanless aluminum enclosure that can only passively dissipate 1W of heat continuously at the maximum
  factory ambient temperature. To prevent the system from overheating, what is the maximum sustainable
  duty cycle (the percentage of time the accelerator can be active)?
details:
  realistic_solution: The system's average power consumption over time must not exceed its continuous
    heat dissipation capacity. Assuming the idle power consumption is negligible compared to the active
    power, the maximum sustainable duty cycle is the ratio of the thermal budget to the active power consumption.
    Any higher, and the device will continuously build up heat, eventually leading to thermal throttling
    or failure.
  common_mistake: The most common mistake is to ignore the thermal dissipation limit and assume the device
    can run at 100% duty cycle as long as the power supply allows. This overlooks the fact that in passively
    cooled edge systems, heat removal is almost always the primary bottleneck, not power delivery.
  napkin_math: 'Continuous Thermal Budget = 1W. Active power = 2.5W. Assuming idle power is ~0W, the maximum
    sustainable duty cycle is: Duty Cycle = Thermal Budget / Active Power = 1W / 2.5W = 0.40. The camera
    can only run active inference 40% of the time to avoid exceeding the passive heat dissipation limit.'
