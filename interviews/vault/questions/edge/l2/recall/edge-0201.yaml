id: edge-0201
title: The Sensor Fusion Deadline
topic: real-time-deadlines
status: published
provenance: imported
scenario: An autonomous vehicle's sensor fusion engine has a hard real-time deadline of 33 milliseconds
  to process a frame of LiDAR data. Your main perception model takes 28 milliseconds for a full inference
  pass. What is the maximum acceptable system latency—for data loading, pre-processing, and scheduling—before
  the system violates its deadline and risks a critical failure?
details:
  realistic_solution: The total time budget is the deadline. The time available for system overhead (e.g.,
    Time to First Token) is the deadline minus the model's execution time. Any system latency greater
    than this value will cause the system to miss its 30 FPS target, resulting in a safety-critical failure.
  common_mistake: Engineers often focus only on the model's inference time and forget to budget for the
    significant overhead of the full system pipeline (I/O, pre-processing, OS jitter). They might incorrectly
    state the remaining time *is* the inference time, or confuse the total budget with the available time.
  napkin_math: 'Hard Real-Time Deadline: 33 ms'
