id: edge-fill-01615
title: Data Pruning for Edge Deployment on Qualcomm Cloud AI 100
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are tasked with deploying a deep learning model onto a Qualcomm Cloud AI 100 accelerator,
  which features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope. The initial
  training dataset is substantial, causing concerns about deployment constraints, especially regarding
  memory footprint and model inference speed on the edge. Define 'data pruning' in the context of machine
  learning, and explain how it differs from 'coreset selection'. Describe a scenario where data pruning
  would be more beneficial than coreset selection for optimizing model deployment on this specific hardware,
  considering its limitations.
details:
  realistic_solution: For this scenario, data pruning involves removing redundant or less informative
    examples from the training data, often based on metrics like sample difficulty, uncertainty, or contribution
    to model error. Unlike coreset selection, which aims for a representative subset, pruning often focuses
    on identifying and discarding specific 'unhelpful' data. A realistic solution would be to use techniques
    like 'active learning' or 'error-based pruning' during model development. Specifically, after an initial
    training phase, identify data points that the model consistently misclassifies or for which it has
    low confidence, and either prioritize or prune these based on a defined strategy. Alternatively, prune
    data that is easily classified, to focus training on harder examples. This refined dataset would then
    be used for fine-tuning a smaller model suitable for the Qualcomm Cloud AI 100's 32 GB LPDDR4x memory,
    ensuring the 400 TOPS INT8 can be utilized efficiently for the critical samples.
  common_mistake: Confusing data pruning with coreset selection or general data augmentation techniques,
    leading to an incorrect application of the method. Another common mistake is pruning data without
    a clear understanding of its impact on specific model performance metrics relevant to the deployment
    environment.
  napkin_math: If a dataset of 100,000 images, each 1MB, occupies 100GB, and we target a 90% pruning rate
    to reduce the dataset to 10GB. The challenge is ensuring the pruned 10% of the data retains sufficient
    information to achieve target accuracy without exceeding the 32 GB LPDDR4x memory limit for the full
    model and data pipeline on the Qualcomm Cloud AI 100.
