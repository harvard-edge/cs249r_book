id: edge-0370
title: The Autonomous Driving Bottleneck (edge-0370)
topic: roofline-analysis
status: draft
provenance: imported
scenario: Your team is profiling a new LiDAR perception model on a Jetson AGX Orin, which provides 275
  TOPS (INT8) of compute and has 204.8 GB/s of memory bandwidth. A single inference pass on your model
  requires 20 Trillion Operations (20 TeraOps) and involves moving 40 GB of data (weights, activations,
  inputs). Based on this, would you classify the model as compute-bound or memory-bound? Explain your
  calculation.
details:
  realistic_solution: 'The model is **memory-bound**. To determine this, we first calculate the device''s
    Ridge Point, which is its compute/memory ratio. Then we calculate the model''s Arithmetic Intensity
    (AI) and compare the two.

    1. **Device Ridge Point:** 275 TOPS / 204.8 GB/s = (275 * 10^12 Ops/s) / (204.8 * 10^9 Bytes/s) ≈
    **1343 Ops/Byte**.

    2. **Model Arithmetic Intensity (AI):** 20 TeraOps / 40 GB = (20 * 10^12 Ops) / (40 * 10^9 Bytes)
    = **500 Ops/Byte**.

    Since the model''s AI (500) is less than the hardware''s Ridge Point (1343), the system''s performance
    is limited by the time it takes to fetch data from memory, not by the speed of the compute units.'
  common_mistake: Engineers often confuse a high absolute workload (e.g., many TOPS) with being compute-bound.
    The key is not the total work, but the *ratio* of work to data movement (Arithmetic Intensity). A
    model can perform trillions of operations and still be memory-bound if it has to fetch a disproportionate
    amount of data to do so.
  napkin_math: Orin Ridge Point = 275 TOPS / 204.8 GB/s = 275,000 GigaOps / 204.8 GB/s = 1342.7 Ops/Byte.
    Model Arithmetic Intensity (AI) = 20 TeraOps / 40 GB = 20,000 GigaOps / 40 GB = 500 Ops/Byte. Since
    Model AI (500) < Ridge Point (1343), the model is severely memory-bound. It will only achieve 500
    * 204.8 = 102.4 TOPS, well below the 275 TOPS peak.
