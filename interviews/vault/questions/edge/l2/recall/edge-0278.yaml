id: edge-0278
title: 'The Edge Roofline Ridge Point: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: You're an engineer on an autonomous vehicle team, tasked with characterizing the performance
  of a new perception model on a Jetson AGX Orin. Before profiling the model itself, you need to understand
  the hardware's theoretical limits. Given the Orin's peak INT8 performance of 275 TOPS and its memory
  bandwidth of 204.8 GB/s, what is the hardware's 'ridge point'? This value for arithmetic intensity (in
  Ops/Byte) tells you the minimum operational intensity a model needs to be compute-bound rather than
  memory-bound.
details:
  realistic_solution: The ridge point of a processor defines the boundary between being compute-bound
    and memory-bound. It's calculated by dividing the peak operational throughput (in Ops/second) by the
    peak memory bandwidth (in Bytes/second). For the Jetson AGX Orin, this is 275 TOPS divided by 204.8
    GB/s. A model with an arithmetic intensity lower than this will be bottlenecked by memory; a model
    with a higher intensity will be bottlenecked by compute.
  common_mistake: The most common mistake is a unit mismatch, typically failing to convert TOPS (10^12
    Ops/s) and GB/s (10^9 Bytes/s) to a common base, leading to an answer that's off by a factor of 1000.
    Another error is inverting the ratio, calculating Bytes/Op instead of Ops/Byte.
  napkin_math: Ridge Point = Peak Ops / Peak Mem Bandwidth. Orin Peak Compute = 275 TOPS = 275e12 Ops/sec.
    Orin Peak Mem Bandwidth = 204.8 GB/s = 204.8e9 Bytes/sec. Ridge Point = 275e12 / 204.8e9 = 1342.7
    Ops/Byte. Any model or layer with an Arithmetic Intensity below ~1343 Ops/Byte will hit the memory
    bandwidth wall before it can fully utilize the Orin's INT8 compute cores.
