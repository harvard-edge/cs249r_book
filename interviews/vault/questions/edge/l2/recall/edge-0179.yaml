id: edge-0179
title: The Perception Model's Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: Your autonomous driving team is deploying a new perception model on a Jetson AGX Orin. Profiling
  shows that one frame of inference requires loading 50 MB of data (weights, activations, inputs) and
  performs 50 Giga-Operations (GOPS). The AGX Orin has 204.8 GB/s of memory bandwidth and a peak compute
  performance of 275 TOPS (INT8).
details:
  realistic_solution: The model is memory-bound. Its performance is limited by memory bandwidth, not compute
    capability. To find this, we first calculate the hardware's ridge point and the model's arithmetic
    intensity.
  common_mistake: Engineers often misinterpret the roofline model. They either calculate the arithmetic
    intensity correctly but draw the wrong conclusion (confusing the two regimes), or they mistakenly
    calculate the hardware's ridge point and report it as the model's property. This leads to focusing
    optimization efforts on the wrong limiter (e.g., trying to add more compute parallelism when the real
    problem is data starvation).
  napkin_math: Hardware Ridge Point = 275 TOPS / 204.8 GB/s ≈ 1342 Ops/Byte
