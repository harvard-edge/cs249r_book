id: edge-0291
title: The Perception Pipeline's Processing Deficit
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing the perception pipeline for an autonomous shuttle. It uses a forward-facing
  camera that captures frames at 40 FPS. Your object detection model, running on the vehicle's edge computer,
  takes exactly 30ms to process a single frame. Assuming frames are processed sequentially in a simple
  queue, explain if this system can meet its real-time processing deadline. Calculate the processing 'deficit'
  or 'surplus' in milliseconds for each frame.
details:
  realistic_solution: The system cannot meet its real-time deadline and is unstable. The camera produces
    a new frame every 1000ms / 40 FPS = 25ms. However, the model takes 30ms to process a frame. This means
    that for every frame that arrives, the system falls behind by an additional 5ms. The input queue of
    frames waiting to be processed will grow continuously, leading to ever-increasing latency and eventually
    dropped frames, which is catastrophic for an autonomous vehicle.
  common_mistake: A common mistake is to only look at the absolute processing time (30ms) and see that
    it's less than a common deadline like 33ms, assuming it's 'fast enough'. This ignores the *arrival
    rate* of the data. The critical relationship is not just the absolute processing time, but its value
    relative to the time between incoming frames. If processing takes longer than the arrival interval,
    the input queue will grow infinitely, leading to system failure.
  napkin_math: 1. **Calculate Frame Arrival Interval:** `Time per frame = 1000 ms / 40 FPS = 25 ms/frame`
