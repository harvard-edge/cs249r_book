id: edge-0122
title: The Transformer's Quadratic Curse
topic: attention-scaling
status: published
provenance: imported
scenario: You're designing a real-time vision system for an autonomous drone with a 33ms latency budget.
  The current system uses a lightweight CNN on 320x320 images. To improve accuracy on small objects, the
  team is considering increasing the resolution to 640x640. Compare how the computational cost (FLOPs)
  scales for a typical CNN versus a Vision Transformer (ViT) when you quadruple the input pixel count.
details:
  realistic_solution: A CNN's cost scales roughly linearly with the number of pixels. Its convolutional
    kernels perform a fixed number of operations per pixel region. Quadrupling the pixel count (2x width,
    2x height) results in a ~4x increase in FLOPs.
  common_mistake: Assuming both architectures scale linearly with the number of input pixels. Engineers
    often forget that for a ViT, image resolution directly impacts the 'sequence length' (number of patches),
    and self-attention complexity is quadratic in sequence length. They mentally model the ViT as just
    another feature extractor, not a sequence processor.
  napkin_math: CNN inference compute (FLOPs) scales linearly with the number of input pixels. Increasing
    resolution from 320x320 (102,400 pixels) to 640x640 (409,600 pixels) is exactly a 4x increase in spatial
    area. Consequently, the forward pass will require 4x the FLOPs. If the current model takes 15ms per
    frame, the higher-resolution model will take ~60ms. This far exceeds the drone's 33ms real-time latency
    budget.
