title: Hailo-8 Hardware Security Features for Edge Adversarial Robustness
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are evaluating the Hailo-8 (26 TOPS INT8, 2.5W) for an AI-powered surveillance system deployed
  at a remote, potentially insecure edge location. Adversarial attacks and model extraction via side-channels
  are critical concerns. Specifically, what *built-in hardware security features* or *standard architectural
  components* are typically found in such high-performance, low-power edge AI accelerators like the Hailo-8
  to protect against physical attacks aiming to compromise the model's integrity or extract its parameters?
details:
  realistic_solution: Realistic solutions for edge AI accelerators include hardware roots of trust, secure
    boot, trusted execution environments (TEEs), secure key storage (e.g., fuses or PUFs), and cryptographic
    acceleration engines. These features ensure the authenticity of the loaded model and firmware, protect
    sensitive data (like model weights and intermediate activations) during inference, and make physical
    extraction significantly more difficult.
  common_mistake: A common mistake is assuming that software updates or network firewalls alone provide
    sufficient protection against physical side-channel or tampering attacks on an unprotected edge device.
    These are crucial for network-based attacks but offer little defense against direct physical access
    threats.
  napkin_math: 'Consider the cost of a successful attack: extracting a proprietary 26 TOPS INT8 model
    could be worth millions in R&D. The hardware overhead for a TEE and secure boot components might be
    an additional 5-10% of the chip area and minor increase in Bill of Materials (BOM) cost, but it secures
    the entire IP investment against common physical attacks.'
