schema_version: 1
id: edge-0306
title: The Edge Roofline Test
topic: roofline-analysis
status: published
provenance: imported
scenario: You're evaluating a new computer vision model for an autonomous delivery robot equipped with
  a Jetson AGX Orin. You've analyzed the model and found it has an arithmetic intensity of 2,000 Ops/Byte
  when running with INT8 precision. Based on the Orin's hardware specifications, explain whether this
  model's performance will be compute-bound or memory-bound.
details:
  realistic_solution: The model is **compute-bound**. The first step is to calculate the 'ridge point'
    of the Jetson AGX Orin, which is the ratio of its peak compute to its peak memory bandwidth. A model
    is compute-bound if its own arithmetic intensity is greater than this ridge point. For the Orin, the
    ridge point is approximately 1,342 Ops/Byte. Since the model's intensity (2,000 Ops/Byte) is greater
    than the hardware's ridge point, the system's performance is limited by its raw compute power (TOPS),
    not by the speed at which it can feed the processors with data.
  common_mistake: The most common mistake is to invert the logic. Engineers correctly calculate that the
    model's arithmetic intensity is higher than the hardware's ridge point, but then incorrectly conclude
    this makes it *memory-bound*. They reason that 'since the AI is high, it must need a lot of memory
    bandwidth,' failing to realize it means the demand for compute *relative* to memory is high, thus
    the bottleneck is compute.
  napkin_math: 1. **Find Hardware Specs:** From the playbook, the Jetson AGX Orin provides 275 TOPS (275e12
    Ops/s) and 204.8 GB/s (204.8e9 Bytes/s) of memory bandwidth.
