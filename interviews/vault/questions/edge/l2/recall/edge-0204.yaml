id: edge-0204
title: The Sensor Pipeline Skew
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your autonomous vehicle team is upgrading its primary camera sensor to a new 4K (3840x2160)
  HDR model that outputs 12-bit RAW frames at 30 FPS. The raw data stream is too high for your current
  logging SSD. A hardware engineer suggests enabling the camera's built-in, lossy MJPEG compression before
  the data is passed to your perception model and written to disk.
details:
  realistic_solution: The primary risk is **training-serving skew**. The perception model was trained
    on clean, uncompressed RAW images. Enabling lossy MJPEG compression introduces artifacts (e.g., blocking,
    color space changes) that are a form of data distribution shift. The model's real-world performance
    will be significantly lower than validation metrics suggest because the input data it receives in
    the car is fundamentally different from the data it was trained on.
  common_mistake: Engineers often focus only on the data bandwidth and storage problem, concluding that
    any compression is a valid solution. They fail to recognize that introducing a lossy processing step
    (MJPEG compression) in the production inference pipeline, which was not present in the offline training
    pipeline, creates a classic training-serving skew. The model's performance will degrade because it
    has never seen compression artifacts during training.
  napkin_math: 1.  **Calculate pixels per frame:**
