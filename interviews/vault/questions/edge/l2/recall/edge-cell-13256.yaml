id: edge-cell-13256
title: Recall Transformer Inference Latency on Hailo-8
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'An interviewer asks: for a 12-layer ViT-B/16 with 86M parameters running on Hailo-8 (26 TOPS
  peak, ~50% utilization for transformer workloads), what is the expected inference latency for a single
  224×224 image? The model requires approximately 17.6 GFLOP per inference. Show the calculation.'
details:
  realistic_solution: 'Effective TOPS: 26 × 0.50 = 13 TOPS = 13 × 10¹² FLOP/s. Inference FLOPs: 17.6 GFLOP
    = 17.6 × 10⁹ FLOP. Latency: 17.6 × 10⁹ / 13 × 10¹² = 1.35 ms ≈ 1.4 ms. This enables approximately
    700 FPS theoretical. Real-world: pipeline overhead, PCIe communication, preprocessing → ~200-300 FPS
    for a full pipeline. For batch=4: 4 × 17.6G = 70.4G / 13T = 5.4ms → 741 FPS throughput.'
  common_mistake: Using peak TOPS without applying the utilization discount; transformer attention's dynamic
    access patterns reduce Hailo-8 utilization to ~50% vs the peak rated for CNN workloads.
  napkin_math: 'Effective TOPS: 26×0.5=13T OPS/s. FLOPs: 17.6G. Latency: 17.6G/13T=1.35ms. FPS: 1/0.00135=741.
    With pipeline overhead (×3): ~250 FPS real-world for ViT-B/16 on Hailo-8.'
