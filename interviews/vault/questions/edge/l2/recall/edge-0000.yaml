id: edge-0000
title: The Decaying Sensor Dilemma
topic: monitoring-observability
status: published
provenance: imported
scenario: You've deployed a keyword-spotting model on 50,000 smart speakers. In the lab, it achieved 99.2%
  accuracy on a 10,000-hour clean audio dataset. After one year in the field, fleet-wide accuracy has
  dropped by 5 points. Root cause analysis reveals the microphone's noise floor has increased by 6 dB
  due to dust and aging.
details:
  realistic_solution: 'A 6 dB increase in the noise floor means the noise power has quadrupled relative
    to the signal power. The decibel scale is logarithmic: $\Delta P_{\text{ratio}} = 10^{(\Delta \text{dB}
    / 10)}$. For a +6 dB change in noise, the noise power ratio is $10^{(6/10)} = 10^{0.6} \approx 4$.'
  common_mistake: The most common mistake is assuming a linear relationship, thinking a 'small' 6 dB change
    only requires a small, linear increase in data (e.g., 10-20% more). This fails to account for the
    logarithmic nature of the decibel scale and its quadratic impact on sample complexity. Another error
    is confusing the 2x factor for amplitude with the 4x factor for power when dealing with a 6 dB change.
  napkin_math: 'Decibels follow a logarithmic scale: Delta_dB = 10 * log10(P_new/P_old). A +6 dB increase
    means 6 = 10 * log10(Ratio). Solving for the ratio gives 10^0.6 = 3.98. The ambient noise power has
    roughly quadrupled, devastating the signal-to-noise ratio and crushing the model''s accuracy.'
