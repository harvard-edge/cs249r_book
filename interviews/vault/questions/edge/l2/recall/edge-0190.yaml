schema_version: 1
id: edge-0190
title: The Corrupted Sensor Stream
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team's autonomous driving perception model works perfectly on your validation dataset but
  is underperforming in a new production vehicle fleet. The training data was collected from a vehicle
  using a 4-lane MIPI CSI-2 camera interface, capturing raw, uncompressed video. The new production vehicle,
  as a cost-saving measure, uses a 2-lane MIPI CSI-2 interface for the same camera. Explain why this hardware
  change could cause a drop in model performance. To be specific, calculate the maximum data rate for
  a 4-lane interface and compare it to a 2-lane interface. Assume a 4-lane MIPI CSI-2 interface has a
  bandwidth of ~2.5 GB/s.
details:
  realistic_solution: The core issue is a bandwidth bottleneck in the sensor interconnect, which creates
    training-serving skew. The 4-lane MIPI interface has double the bandwidth of the 2-lane one. If the
    camera's raw data rate exceeds the 2-lane interface's capacity, the system is forced to either drop
    frames or apply lossy compression (like MJPEG) before the data even reaches the main processor. The
    model, trained on pristine, uncompressed images, now receives a stream with compression artifacts
    or missing temporal information, leading to a significant drop in accuracy for tasks like object detection
    or semantic segmentation.
  common_mistake: Engineers often focus only on the compute (TOPS) of the edge device and ignore the data
    pipeline feeding it. They might assume that if the camera data arrives *at all*, it's the same quality
    as the training data, failing to account for on-the-fly compression or frame drops forced by interconnect
    bandwidth limitations. This creates a classic training-serving skew where the model sees lower-fidelity
    data in production than it was trained on.
  napkin_math: 1. **Find the spec:** Given in the scenario, a 4-lane MIPI CSI-2 interface has a bandwidth
    of ~2.5 GB/s. A 2-lane interface therefore has half the bandwidth, ~1.25 GB/s.
