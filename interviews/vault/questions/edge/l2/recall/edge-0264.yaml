id: edge-0264
title: The Perception Pipeline's Precision Problem
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team's autonomous driving platform uses a Jetson AGX Orin. The main perception model, currently
  running in FP16 precision, is failing to meet its 33ms real-time processing deadline. Profiling shows
  the bottleneck is memory bandwidth, specifically when writing a large intermediate activation tensor
  back to DRAM. A proposal is made to quantize the model to INT8. Explain the first-order impact this
  change would have on the memory bandwidth required for that specific operation.
details:
  realistic_solution: Switching from FP16 (2 bytes per value) to INT8 (1 byte per value) halves the size
    of the activation tensor. Since the operation is memory-bound, the time it takes to write this tensor
    to DRAM is directly proportional to its size. Therefore, this change will cut the memory bandwidth
    requirement for this specific operation by 50%. This reduction in memory traffic is a critical step
    in getting the pipeline to meet its 33ms latency budget. However, this is not a simple toggle; it
    requires a careful calibration process using a representative dataset to map the FP16 values to the
    INT8 range [-128, 127] to minimize accuracy loss.
  common_mistake: Engineers often focus only on the compute speedup of INT8 (if the model is compute-bound)
    and forget about memory. Many also fail to consider the risks. They might think quantization is a
    'free' 2x win, without accounting for the engineering effort of calibration or the potential for catastrophic
    accuracy drops if the calibration dataset doesn't capture the full range of real-world sensor values
    (e.g., extreme brightness, darkness, fog), leading to clipping/overflow.
  napkin_math: 'Activation dimensions: 640 * 640 * 64 = 26,214,400 elements. In FP16 (2 bytes/element):
    26.2M * 2 = 52.4 MB. In INT8 (1 byte/element): 26.2 MB. Writing to DRAM at 204.8 GB/s: FP16 write
    time = 52.4MB / 204.8GB/s = 0.25 ms. INT8 write time = 26.2MB / 204.8GB/s = 0.128 ms. Quantizing to
    INT8 exactly halves the memory payload, directly doubling the speed of this memory-bound layer.'
