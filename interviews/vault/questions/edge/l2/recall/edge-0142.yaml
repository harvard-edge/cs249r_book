id: edge-0142
title: The SRAM Tensor Arena Squeeze
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are deploying a simple CNN on a microcontroller with 256 KB of SRAM available for the model's
  tensor arena. The model has two convolutional layers. The input tensor is `[1, 128, 128, 3]`. The output
  of the first layer is `[1, 64, 64, 16]`. The output of the second layer is `[1, 32, 32, 32]`. All tensors
  use FP16 precision. To minimize memory, the runtime will reuse memory buffers. Explain what the peak
  memory usage of the tensor arena will be and determine if the model will fit.
details:
  realistic_solution: The correct approach is to calculate the memory required for the input and output
    of *each* operation, and the peak is the maximum of those sums. The runtime needs to hold the input
    to a layer and the output of that layer in memory at the same time. The peak is therefore the largest
    sum of `input_tensor_size + output_tensor_size` across all layers.
  common_mistake: 'Engineers often make one of two mistakes: 1) They sum the size of all activation tensors,
    assuming none are freed. 2) They only account for the single largest tensor, forgetting that during
    an operation, both the input and output tensor must exist in memory simultaneously.'
  napkin_math: '1. Tensor sizes in bytes (FP16 = 2 bytes): Input = 128*128*3*2 = 98,304B (~96KB). Out1
    = 64*64*16*2 = 131,072B (128KB). Out2 = 32*32*32*2 = 65,536B (64KB). 2. Peak memory is max(Input+Out1,
    Out1+Out2). Peak = 98,304 + 131,072 = 229,376 bytes (~224KB). This fits within the 256KB available.'
