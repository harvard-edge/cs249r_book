id: edge-0400
title: The Depthwise Separable Efficiency Gain (edge-0400)
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: You're designing a perception model for an autonomous vehicle's side camera, which runs on a
  power-constrained chip like a Jetson AGX Orin. You are considering two options for a key convolutional
  layer that takes a `224x224x64` input tensor and must produce a `224x224x128` output tensor.
details:
  realistic_solution: The depthwise separable convolution dramatically reduces the parameter count, which
    is critical for edge devices with limited memory and power.
  common_mistake: A common mistake is to only calculate the parameters for the 'depthwise' part of the
    depthwise separable convolution, forgetting the 'pointwise' (1x1) part that follows. This leads to
    a wildly overestimated parameter reduction (e.g., >100x). Another error is to confuse the calculation
    for parameters with the calculation for multiply-accumulate operations (MACs).
  napkin_math: 'Standard Conv 3x3 parameters: K^2 * C_in * C_out = 3 * 3 * 64 * 128 = 73,728. Depthwise
    Separable parameters: (K^2 * C_in) + (C_in * C_out) = (3 * 3 * 64) + (1 * 1 * 64 * 128) = 576 + 8,192
    = 8,768 parameters. Memory reduction = 73,728 / 8,768 = 8.4x fewer weights, saving crucial bandwidth
    on the power-constrained Orin.'
