id: edge-0252
title: The Edge Roofline Ridge Point
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is evaluating a Jetson AGX Orin for a real-time perception model in an autonomous
  vehicle. According to the spec sheet, the Orin delivers 275 TOPS of INT8 performance and has a memory
  bandwidth of 204.8 GB/s.
details:
  realistic_solution: The ridge point is the threshold of Arithmetic Intensity (AI) that separates memory-bound
    from compute-bound workloads. It's calculated by dividing peak compute by peak memory bandwidth. For
    the Jetson AGX Orin, this is approximately 1,343 Ops/Byte.
  common_mistake: The most common mistake is to ignore the units (Tera vs. Giga) and simply divide the
    numbers, leading to an answer that is off by a factor of 1000. Another error is to confuse the roofline's
    ridge point (Ops/Byte) with power efficiency (TOPS/W), which is a different metric.
  napkin_math: '1.  **Standardize Units:** | Peak Compute: 275 TOPS = 275 x 10^12 Operations/second |
    Memory Bandwidth: 204.8 GB/s = 204.8 x 10^9 Bytes/second | 2.  **Calculate Ridge Point:** | Ridge
    Point = (275 x 10^12 Ops/s) / (204.8 x 10^9 Bytes/s) | Ridge Point = 275,000 / 204.8 | **Ridge Point
    ≈ 1,343 Ops/Byte**'
