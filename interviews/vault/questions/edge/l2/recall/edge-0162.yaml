id: edge-0162
title: The Edge Ridge Point
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are leading a team evaluating the NVIDIA Jetson AGX Orin for a real-time object detection
  pipeline that must run at 30 FPS. A junior engineer is confused about why some models are 'memory-bound'
  while others are 'compute-bound'.
details:
  realistic_solution: The 'ridge point' is a key concept in the Roofline Model. It represents the minimum
    Arithmetic Intensity (AI), measured in Operations per Byte, that an application must have to be limited
    by the accelerator's peak compute rather than its memory bandwidth.
  common_mistake: The most common mistake is a simple unit mismatch, dividing TOPS directly by GB/s without
    accounting for the factor of 1000 difference between Tera- and Giga- prefixes. Another mistake is
    inverting the formula (Bandwidth / Compute). Finally, engineers often misinterpret the result, believing
    a lower Arithmetic Intensity is better.
  napkin_math: '1. **Identify Specs:** Jetson AGX Orin: 275 TOPS (INT8), 204.8 GB/s memory bandwidth.

    2. **Calculate Ridge Point:** Ridge Point = Peak Compute / Memory BW = 275e12 Ops/s / 204.8e9 B/s
    = 1,343 Ops/Byte.

    3. **Interpretation:** Any workload with Arithmetic Intensity < 1,343 Ops/Byte is memory-bound. Any
    workload with AI > 1,343 Ops/Byte is compute-bound. Most CNN inference layers have AI in the 100-1000
    range, meaning they are often memory-bound on the Orin.'
