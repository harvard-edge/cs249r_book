title: The OTA Bandwidth Budget
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You are an ML Systems Engineer for an autonomous vehicle company rolling out an updated perception
  model. The complete OTA update package, containerized for reliable deployment, is 400 MB. Your fleet
  of vehicles has a stable cellular connection that provides 80 Mbps (megabits per second) of download
  bandwidth. Explain how you would calculate the minimum time required for a single vehicle to download
  this update.
details:
  realistic_solution: The correct way to solve this is to first make the units consistent. We must convert
    the package size from Megabytes (MB) to Megabits (Mb) to match the bandwidth unit.
  common_mistake: The most common mistake is to confuse megabits (Mb) and megabytes (MB). Network speeds
    are almost always advertised in bits per second, while file sizes are measured in bytes. Forgetting
    to convert the file size from megabytes to megabits by multiplying by 8 will result in an answer that
    is 8x too fast.
  napkin_math: Package Size in Megabits = 400 MB * 8 bits/byte = 3200 Mb
