title: On-Premise Agent Orchestration Pipeline
scenario: You are architecting an on-premise factory automation agentic system deployed
  on a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W).
  The compound pipeline involves a lightweight router model, a dense retriever, and
  an 8-billion parameter LLM orchestrator. Given a peak load of 20 requests per second
  where each request requires a 1000-token prompt processing and 50 tokens of generation,
  design the deployment architecture to maximize throughput while staying within a
  1-second end-to-end latency budget. Calculate the theoretical bottlenecks and justify
  your multi-model serving strategy.
question: How would you serve the router, retriever, and 8B LLM on one Cloud AI 100
  to handle 20 RPS within 1 second, and what bottlenecks dominate?
details:
  realistic_solution: The optimal architecture involves statically co-locating the
    INT8 quantized 8B LLM, retriever, and router in the 32GB memory to eliminate swapping
    overhead. To handle the generative memory bandwidth bottleneck on LPDDR4x, the
    system must utilize continuous batching. Furthermore, chunked prefill must be
    implemented to prevent the heavy 1000-token compute phases from starving the latency-sensitive
    generation cycles.
  common_mistake: Candidates often focus solely on the 32GB memory capacity, noting
    that models easily fit, while entirely ignoring the massive compute required for
    long-context prefill and the severe memory bandwidth bottleneck during autoregressive
    generation. They may also naively propose sequential model loading rather than
    co-locating models simultaneously.
  napkin_math: 'Memory: 8B LLM in INT8 (~8GB) + Router/Retriever (~2GB) = 10GB, easily
    fitting the 32GB LPDDR4x limit. Compute: 1000 prefill tokens * 8B params * 2 =
    16 TeraOPs (TOPS). At 20 RPS, prefill demands 320 TOPS. Generation takes 50 tokens
    * 8B * 2 = 0.8 TOPS per request, or 16 TOPS total. Total compute = 336 TOPS, utilizing
    84% of the 400 TOPS INT8 capacity. Bandwidth: Generating 1000 tokens/sec (20 RPS
    * 50 tokens) unbatched requires 1000 * 8GB = 8000 GB/s bandwidth, massively exceeding
    LPDDR4x capabilities, proving batching is mandatory.'
