title: The Autonomous Drone's Reflex Gap
scenario: 'You are the tech lead for an agricultural AI startup. Your fleet of autonomous drones uses
  a large Vision-Language Model (VLM) to identify crop diseases from aerial footage. The current system
  runs on a Jetson AGX Orin with a strict 30W power budget, and it barely achieves the required 15 FPS.
  An urgent new business requirement has come in: the drones must also detect and issue an immediate alert
  for a highly invasive locust species, which requires running a second, lightweight detection model.
  Your constraints are to stay within the 30W power envelope and on the existing Orin hardware. Propose
  a system architecture that can run both the existing VLM and the new locust detector, while also increasing
  the primary VLM''s effective frame rate to 30 FPS and issuing any locust alerts within 100ms of detection.'
question: "How would you run the VLM and locust detector within 30W, double the VLM's effective rate to 30 FPS, and alert within 100ms?"
details:
  realistic_solution: A successful design requires a multi-pronged optimization strategy that treats the
    two models as a cooperative system, not two independent processes. The key is to realize the VLM is
    over-qualified for most frames and the locust model can act as a high-speed 'trigger'.
  common_mistake: Engineers often propose brute-force solutions like simply running the two models sequentially,
    which would halve the frame rate, violating the requirements. Another common mistake is focusing only
    on one type of optimization (e.g., only quantization) without a holistic system view that combines
    multiple techniques.
  napkin_math: 'VLM at 15fps on 30W Orin = 67ms/frame. For 30fps need 33ms. Locust model (lightweight
    YOLO-nano): ~2ms/frame, ~2W. Strategy: run locust detector on DLA at 30fps (2W), VLM every other frame
    on GPU (15fps actual). Interleave: frames alternate VLM/skip. Effective VLM rate perceived as 30fps
    via frame interpolation. Power: GPU 20W + DLA 2W + CPU 5W = 27W < 30W. Locust alert: DLA latency 2ms
    << 100ms.'
