title: Diagnosing End-to-End Latency in a Multi-Model Edge Pipeline on Hailo-8
scenario: 'Your team has deployed a compound AI system on an edge device for real-time video analytics. The system consists of two sequential neural networks: an object detection model (Model A) followed by a fine-grained classification model (Model B) that processes crops from Model A''s output. Initial tests show an end-to-end latency of 250ms, which is significantly higher than the target 100ms. The device''s CPU utilization is low, suggesting the bottleneck is not host-side processing.'
question: How would you diagnose the 250 ms latency in the Hailo-8 two-model video pipeline when CPU utilization is low?
details:
  realistic_solution: 'A systematic approach involves: 1) Profiling each stage individually to pinpoint the bottleneck. 2) Examining the data transfer mechanism between models – is it optimized or are large intermediate tensors being copied across device boundaries? 3) Verifying that models are correctly quantized for INT8 capabilities. 4) Exploring potential for concurrent execution if feasible. 5) Analyzing the runtime configuration for overhead.'
  common_mistake: |
    **The Pitfall:** Jumping to optimize individual models without considering the inter-model data transfer overhead.
    **The Rationale:** Candidates often focus purely on compute times and ignore inefficient resource allocation on the accelerator, or suboptimal batching strategies for sequential inference.
    **The Consequence:** Time is wasted attempting to shrink models while the 250ms latency remains stubbornly high due to memory and API overheads.
  napkin_math: |
    * Assume Model A and Model B each require ~100 GOPS.
    * With 26 TOPS (26,000 GOPS) capability, theoretical inference time per model is ~3.8ms.
    * Total compute time is under 10ms, leaving ~240ms of the 250ms latency unexplained.
    * A batch of 10 object crops (each 256x256x3 bytes) totals ~192KB per crop, or ~2MB.
    * Transferring this from the output buffer back to host memory and re-uploading for Model B incurs tens of milliseconds depending on bus speed.
    * **The 250ms end-to-end latency is entirely dominated by intermediate data transfer and memory conversion overheads.**
