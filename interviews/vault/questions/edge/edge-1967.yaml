title: 'Knowledge Distillation on Google Coral Edge TPU: Teacher-Student Model Evaluation'
scenario: Your team is tasked with deploying an image classification model to a fleet of Google Coral Edge TPUs for real-time inference. The original high-accuracy teacher model is a ResNet-50, which is too large and slow for the Edge TPU's constraints. You've successfully trained a smaller, MobileNetV2-based student model using knowledge distillation to achieve comparable accuracy while being significantly more efficient.
question: How would you evaluate the distilled MobileNetV2 on Coral Edge TPU against the ResNet-50 teacher, including accuracy, latency, power, memory, and INT8 effects?
details:
  realistic_solution: 'The evaluation should be multi-faceted, comparing both models (teacher on server-grade GPU vs. student on Coral TPU) across a spectrum of metrics. Measure end-to-end inference time on the Coral Edge TPU. Monitor the actual power draw to calculate inferences per watt. Compare the run-time memory usage of both models. Specifically analyze how the Coral''s INT8-only precision impacts the distilled student model. Quantify the trade-offs: e.g., ''X% reduction in accuracy for Y% reduction in latency and Z% better power efficiency, enabling deployment on 1000s of Edge TPUs instead of 10s of server GPUs.'''
  common_mistake: |
    **The Pitfall:** Focusing solely on the student model's top-1 accuracy on a standard validation set.
    **The Rationale:** Candidates often treat distillation evaluation as a pure machine learning task, ignoring edge hardware constraints.
    **The Consequence:** They overlook crucial operational metrics like inference latency per watt, memory footprint, and the severe impact of INT8 quantization on distillation accuracy.
  napkin_math: |
    1. **Teacher (ResNet-50) on Server GPU (200 TOPS, 100W)**:
       - Theoretical compute time: 200 GOPS / 200 TOPS = 1ms
       - Actual observed latency: 50ms
       - Power efficiency: (1 / 0.050s) / 100W = 0.2 inferences/sec/W
    2. **Student (MobileNetV2) on Coral Edge TPU (4 TOPS, 2W)**:
       - Theoretical compute time: 50 GOPS / 4 TOPS = 12.5ms
       - Actual observed latency: 30ms
       - Power efficiency: (1 / 0.030s) / 2W = 16.67 inferences/sec/W
    3. **Comparison**:
       - 16.67 / 0.2 = **~83x more power-efficient** for the student on Coral.
