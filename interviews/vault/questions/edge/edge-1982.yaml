title: Optimizing Operator Scheduling on NVIDIA Jetson Orin
scenario: A developer is deploying a large language model (LLM) for on-device inference on an NVIDIA Jetson Orin with 64 GB LPDDR5, 275 TOPS INT8, and a 60W power budget. The model's computational graph has several layers that can be fused and parallelized, and memory reuse is critical to stay within the device's constraints.
question: What operator scheduling strategies should the developer use on Jetson Orin for memory reuse, parallel execution, and layer fusion?
details:
  realistic_solution: 'A realistic solution involves using an aware compiler or framework (e.g., TVM, TensorRT) that performs graph-level optimizations. 1. Memory Reuse: Employing in-place operations, allocating temporary buffers efficiently across the graph to minimize peak footprint. 2. Parallel Operator Execution: Identifying independent sub-graphs that can run concurrently on available compute units (GPU cores, DLA). 3. Layer Fusion: Merging sequential operations into a single kernel to reduce memory bandwidth usage and kernel launch overheads.'
  common_mistake: |
    **The Pitfall:** Treating operators in isolation without considering the global computational graph structure.
    **The Rationale:** Developers often rely strictly on eager-mode execution execution without a compilation pass.
    **The Consequence:** Suboptimal memory allocation and missed fusion opportunities, bottlenecking throughput and increasing power consumption beyond the 60W budget.
  napkin_math: |
    1. **Compute Target:** Fused layer sequence involves 100 GOPS (INT8).
    2. **Theoretical Minimum:** (100 * 10^9 operations) / (275 * 10^12 operations/second) = **0.363 milliseconds**.
    3. **Reality Check:** Without fusion, kernel launch overhead and intermediate memory transfers can easily expand this to 5-10ms.
