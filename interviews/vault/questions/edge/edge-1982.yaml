title: Optimizing Operator Scheduling on NVIDIA Jetson Orin
scenario: A developer is deploying a large language model (LLM) for on-device inference on an NVIDIA Jetson Orin. The model's computational graph has several layers that can be fused and parallelized, and memory reuse is critical to stay within the device's constraints.
question: What operator scheduling strategies should the developer use on Jetson Orin for memory reuse, parallel execution, and layer fusion?
details:
  realistic_solution: Use an optimizing compiler like TensorRT or TVM for graph-level fusion. Enable in-place operations and shared intermediate buffers to minimize peak memory allocation. Schedule independent sub-graphs across the Ampere GPU and DLA concurrently. Fuse operators (e.g., QKV projections, Conv-BN-ReLU) to eliminate intermediate DRAM reads/writes and drastically reduce CUDA kernel launch overhead.
  common_mistake: |
    **The Pitfall:** Treating operators in isolation without considering the global computational graph structure.
    **The Rationale:** Developers often rely strictly on eager-mode execution execution without a compilation pass.
    **The Consequence:** Suboptimal memory allocation and missed fusion opportunities, bottlenecking throughput and increasing power consumption beyond the 60W budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fused layer sequence computational cost: 100 GOPS (INT8).
       - Jetson Orin INT8 throughput: 275 TOPS.
    2. **Calculations:**
       - Theoretical Minimum Latency: 100e9 ops / 275e12 ops/s = 0.363 ms.
       - Eager execution overhead (estimated): 5-10 ms per step due to kernel launches and DRAM roundtrips.
    3. **Conclusion & Interpretation:**
       - **Result: 0.363 ms theoretical compute time.** Without aggressive graph-level optimization like operator fusion, the workload is overwhelmingly memory-bound and kernel-launch bound.
