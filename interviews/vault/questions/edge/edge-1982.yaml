title: Optimizing Operator Scheduling on NVIDIA Jetson Orin
scenario: A developer is deploying a large language model (LLM) for on-device inference
  on an NVIDIA Jetson Orin with 32 GB LPDDR5, 275 TOPS INT8, and a 60W power budget.
  The model's computational graph has several layers that can be fused and parallelized,
  and memory reuse is critical to stay within the device's constraints. Describe key
  operator scheduling strategies the developer should employ to optimize execution
  order for maximum performance and efficiency, specifically considering memory reuse,
  parallel operator execution, and layer fusion.
question: What operator scheduling strategies should the developer use on Jetson Orin
  for memory reuse, parallel execution, and layer fusion?
details:
  realistic_solution: 'A realistic solution involves using an aware compiler or framework
    (e.g., TVM, TensorRT) that performs graph-level optimizations. The developer should
    focus on: 1. Memory Reuse: Employing in-place operations, allocating temporary
    buffers efficiently across the graph to minimize peak memory footprint, and using
    memory budgeting. 2. Parallel Operator Execution: Identifying independent sub-graphs
    or operations that can run concurrently on available compute units (e.g., GPU
    cores, DLA) and leveraging multi-stream execution. 3. Layer Fusion: Merging multiple
    sequential operations (e.g., element-wise additions, activations, convolutions)
    into a single kernel to reduce memory bandwidth usage, kernel launch overheads,
    and improve data locality. The developer should also be aware of the Jetson Orin''s
    specific hardware capabilities, such as DLA, for further acceleration.'
  common_mistake: A common mistake is treating operators in isolation without considering
    the global computational graph structure. This leads to suboptimal memory allocation,
    missed opportunities for operator fusion (e.g., convolution-batchnorm-ReLU fusion),
    and inefficient parallelization, ultimately bottlenecking throughput and increasing
    power consumption beyond the 60W budget.
  napkin_math: Given the Jetson Orin's 275 TOPS INT8, if a fused layer sequence (e.g.,
    Conv-BN-ReLU) involves 100 GMACs (Giga Multiply-Accumulates) for INT8 operations,
    and assuming ideal utilization, the theoretical minimum compute time would be
    approximately (100 * 10^9 operations) / (275 * 10^12 operations/second) ≈ 0.36
    milliseconds. This calculation highlights the raw compute potential, but the true
    benefit of fusion comes from reducing memory transfers and kernel launch overheads,
    which can easily dominate execution time for many small, unfused operations.
