title: Embodied Carbon Dominance in TinyML Edge Deployment
scenario: 'A smart building deploys 10,000 Raspberry Pi 5 nodes running a local occupancy
  detection model. Each Pi draws 5W average at the inference workload. The deployment
  region has 30 gCO2e/kWh grid intensity (solar+wind). Estimated embodied carbon:
  12 kgCO2e per Pi (manufacturing + shipping). Hardware lifecycle: 5 years. Calculate
  the embodied vs operational carbon split and determine whether reducing model complexity
  (from 5W to 2W average) would meaningfully reduce total carbon.'
question: What is the embodied-versus-operational carbon split, and does reducing
  the Pi workload from 5W to 2W meaningfully cut total carbon?
details:
  realistic_solution: 'Operational carbon: 10,000 nodes × 5W × 8,760 hr/yr × 5 years
    × 0.001 kWh/Wh × 30 gCO2e/kWh = 10,000 × 5 × 43,800 × 0.001 × 0.030 kg = 65,700
    kgCO2e over 5 years. Embodied: 10,000 × 12 kg = 120,000 kgCO2e. Total: 185,700
    kgCO2e. Split: 65% embodied, 35% operational. Reducing to 2W operational carbon:
    10,000 × 2 × 43,800 × 0.001 × 0.030 = 26,280 kg. Total: 120,000 + 26,280 = 146,280
    kg (21% reduction). Maximum possible operational reduction (to 0W): 120,000 +
    0 = 120,000 kg (35% reduction). Replacing 10K Pi 5s with 5K Pi 5s serving 2× the
    nodes each: embodied drops to 60,000 kg (35% total reduction) — more impactful
    than any model optimization.'
  common_mistake: Focusing on operational power reduction (5W → 2W) as the primary
    decarbonization lever for edge deployments on clean grids. On a 30 gCO2e/kWh grid,
    the operational carbon from 5W over 5 years is only 6.57 kgCO2e per device — less
    than the manufacturing embodied carbon of 12 kgCO2e. The build-vs-optimize tradeoff
    is reversed from cloud assumptions.
  napkin_math: 'Operational per node/year: 5W × 8760hr × 0.001 × 0.030 = 1.314 kgCO2e/year
    × 5yr = 6.57 kgCO2e. Embodied: 12 kgCO2e. Split: 12/(12+6.57) = 64.6% embodied.
    Power reduction to 2W: operational = 2.63 kgCO2e/node → total per node = 14.63
    vs 18.57 (21% reduction). Hardware reduction (fewer nodes via model consolidation):
    2 nodes → 1 node halves embodied (6 kg) and operational (3.3 kg) = 9.3 kg total
    per pair vs 37.1 kg. Consolidation wins 4× over model power optimization.'
