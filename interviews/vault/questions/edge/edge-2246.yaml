title: Embodied Carbon Dominance in TinyML Edge Deployment
scenario: A smart building deploys 10,000 Raspberry Pi 5 nodes running a local occupancy detection model. Each Pi draws 5W average at the inference workload. The deployment region has 30 gCO2e/kWh grid intensity. Estimated embodied carbon is 12 kgCO2e per Pi. The hardware lifecycle is 5 years.
question: What is the embodied-versus-operational carbon split, and does reducing the Pi workload from 5W to 2W meaningfully cut total carbon?
details:
  realistic_solution: 'Calculate both the operational and embodied carbon over the 5-year lifecycle. Conclude that manufacturing overhead dominates. While software optimization (2W) yields minor reductions, architecturally halving the hardware fleet (e.g., serving 2 nodes per Pi) drastically cuts the massive embodied footprint.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on operational power reduction as the primary decarbonization lever.
    **The Rationale:** Cloud-centric mental models assume operational power dominates, ignoring the intense manufacturing carbon of low-power edge devices.
    **The Consequence:** Teams over-optimize models for minor operational gains while ignoring the drastically larger footprint of device procurement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 nodes, 5-year life.
       - Embodied carbon: 12 kgCO2e/device.
       - Operational load: 5W (0.005 kW).
       - Grid intensity: 30 gCO2e/kWh (0.03 kgCO2e/kWh).
    2. **Calculations:**
       - Ops carbon/node/yr = 0.005 kW * 8760 h * 0.03 kg = 1.314 kg.
       - 5-year ops carbon = 1.314 * 5 = 6.57 kg.
       - Total carbon/node = 12 kg (embodied) + 6.57 kg (ops) = 18.57 kg.
       - Split = 12 / 18.57 = ~65% embodied.
       - 2W Optimization ops savings = (5W - 2W)/5W * 6.57 = 3.94 kg saved (21% total reduction).
    3. **Conclusion & Interpretation:**
       - **Result: Embodied-Dominant (~65%)**. Operational tuning yields marginal returns; true sustainability at the edge requires reducing the physical hardware count.
