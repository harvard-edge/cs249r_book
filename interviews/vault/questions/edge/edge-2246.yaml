title: Embodied Carbon Dominance in TinyML Edge Deployment
scenario: A smart building deploys 10,000 Raspberry Pi 5 nodes running a local occupancy detection model. Each Pi draws 5W average at the inference workload. The deployment region has 30 gCO2e/kWh grid intensity. Estimated embodied carbon is 12 kgCO2e per Pi. The hardware lifecycle is 5 years.
question: What is the embodied-versus-operational carbon split, and does reducing the Pi workload from 5W to 2W meaningfully cut total carbon?
details:
  realistic_solution: 'Operational carbon: 10,000 nodes × 5W × 8,760 hr/yr × 5 years × 0.001 kWh/Wh × 30 gCO2e/kWh = 65,700 kgCO2e over 5 years. Embodied: 10,000 × 12 kg = 120,000 kgCO2e. Total: 185,700 kgCO2e. Split: 65% embodied, 35% operational. Reducing to 2W operational carbon: 26,280 kg. Total: 120,000 + 26,280 = 146,280 kg (21% reduction). Replacing 10K Pi 5s with 5K Pi 5s serving 2× the nodes each: embodied drops to 60,000 kg (35% total reduction) — more impactful than any model optimization.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on operational power reduction as the primary decarbonization lever.
    **The Rationale:** Cloud-centric mental models assume operational power dominates, ignoring the immense edge device manufacturing costs relative to their low power draw.
    **The Consequence:** Teams over-optimize models for minor operational gains while ignoring the far larger footprint of device manufacturing.
  napkin_math: |
    - Operational carbon per node/year: 5W * 8760hr * 0.001 kW/W * 30 gCO2e/kWh = 1.314 kgCO2e/year.
    - Operational over 5 years: 1.314 * 5 = 6.57 kgCO2e.
    - Embodied carbon: 12 kgCO2e.
    - Total carbon: 12 + 6.57 = 18.57 kgCO2e.
    - Split: 12 / 18.57 = **~65% embodied**.
    - Optimization savings (2W): Drops operational to 2.63 kgCO2e/node, saving 3.94 kg per node (21% reduction).
    - Hardware reduction (halving nodes): Saves 6 kg embodied + 3.3 kg operational -> **9.3 kg total saved per node pair** (much more effective).
