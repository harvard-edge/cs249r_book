title: Real-time 4K Video Object Detection Data Movement Strategy
scenario: Designing an embedded ML pipeline for real-time 4K30 object detection with CPU pre/post-processing and INT8 GPU inference.
question: What data movement strategy would you use on Jetson Orin to process 4K30 with CPU pre/postprocessing and INT8 GPU inference within 60W?
details:
  realistic_solution: Allocate all host-side buffers as pinned memory. Utilize CUDA streams to perform asynchronous DMA transfers, allowing the CPU to pre-process one frame while the GPU performs inference on a previous frame. Use Unified Memory where zero-copy is viable.
  common_mistake: |
    **The Pitfall:** Relying on standard synchronous CPU-GPU memory copies (`cudaMemcpy`) and unpinned memory.
    **The Rationale:** Developers accustomed to discrete GPUs default to standard APIs, overlooking the unified memory architecture and severe penalty of page-swapping on edge devices.
    **The Consequence:** Significant pipeline stalls and increased latency as computation and data transfers fail to overlap.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K RGB frames at 30 FPS.
    - LPDDR5 limit = ~204 GB/s.

    **Calculations:**
    - Input = 3840 * 2160 * 3 = 24.8 MB/frame.
    - Input rate = 24.8 MB * 30 = 744 MB/s.
    - Output = ~30 MB/s.
    - Total = ~774 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 774 MB/s DMA required (Data-Movement-Bound (Alleviated))**. Using pinned, zero-copy memory completely hides explicit transfer latency, overlapping it with compute.
