title: Optimizing Data Storage for On-Device Inference on Qualcomm Cloud AI 100
scenario: You are designing the data ingestion and inference pipeline for a highly sensitive on-device
  ML application running on the Qualcomm Cloud AI 100. This device features 32 GB LPDDR4x memory, 400
  TOPS INT8 performance, and a 75W power budget. The application processes continuous streams of sensor
  data, performing real-time inference on a large, pre-trained model. Due to strict latency requirements
  and limited persistent storage on the edge device, you need to efficiently store and access intermediate
  inference results, model checkpoints, and potentially raw sensor data for re-processing. Evaluate and
  propose an optimal storage format strategy, considering trade-offs between storage efficiency (compression),
  access speed, and compatibility with the device's compute capabilities, especially for the LPDDR4x memory.
question: "What storage format strategy would you use for sensor data, intermediate results, and checkpoints on Cloud AI 100 to balance compression, speed, and LPDDR4x use?"
details:
  realistic_solution: A realistic solution would involve a hybrid approach, primarily leveraging binary,
    columnar storage formats like Parquet or highly optimized custom binary formats for intermediate and
    structured data. For sensor data that might be time-series or multi-dimensional, TFRecord (especially
    with `tf.io.FixedLenFeature` and `tf.io.FixedLenSequenceFeature`) could be highly efficient due to
    its direct compatibility with TensorFlow operations and ability to store heterogeneous data types.
    Compression should be carefully selected, favoring fast decompression algorithms (e.g., Snappy, LZ4)
    over maximum compression ratio (e.g., Zstd, Gzip) to balance I/O reduction with CPU/power overhead.
    The system should read data in small, columnar batches directly into the LPDDR4x memory, optimized
    for the INT8 operations, to avoid unnecessary data transformations and memory copies. This minimizes
    the data footprint in the 32GB LPDDR4x memory and maximizes the 400 TOPS INT8 throughput.
  common_mistake: A common mistake is to default to general-purpose storage formats (e.g., CSV, JSON)
    or overly complex serialized formats without considering the specific access patterns, memory constraints,
    and computational capabilities of an edge device like the Qualcomm Cloud AI 100. This often leads
    to unnecessary parsing overhead, inefficient memory utilization (e.g., loading entire files into the
    32GB LPDDR4x memory when only a subset is needed), and increased I/O that consumes precious power
    budget and impacts real-time performance.
  napkin_math: Given a continuous stream of sensor data, say 100 MB/s, and a requirement to store 1 hour
    of raw data, that's 360 GB. With a 32GB LPDDR4x memory, this data cannot reside in memory. If we use
    a simple row-based text format, parsing might take 100ms per 10MB batch. Switching to a columnar binary
    format with Snappy compression achieving a 5:1 ratio, the effective storage becomes 72 GB, and decompression
    might take 5ms per 10MB batch, drastically reducing memory footprint during access and improving latency.
    For inference results (e.g., 1000 features per record, 4 bytes/feature, 100 records/sec), a simple
    binary serialization of a NumPy array for each record might be efficient, taking 4KB/record. Over
    1 hour, this is 1.44 GB of inference results. Storing this in TFRecord with optimized feature definitions
    would allow direct consumption by the model without extensive parsing, conserving the 75W power budget
    by minimizing CPU cycles spent on data handling.
