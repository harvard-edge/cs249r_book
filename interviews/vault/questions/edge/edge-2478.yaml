title: Drone Pre-Processing Bottleneck
scenario: An autonomous drone with a Jetson AGX Orin captures 4 high-res camera streams. The ML inference utilizes only 40% of the Orin's INT8 TOPS, but GPU utilization reads 99% and frame rates are dropping.
question: Analyze the data pipeline bottlenecks between memory, CPU, and GPU to determine why the accelerator is starved.
details:
  realistic_solution: High GPU utilization with low TOPS means the GPU is waiting on memory transfers or PCIe bus locks. The images are likely being decoded on the CPU and copied to GPU memory inefficiently. The pipeline must be rewritten to hardware-decode directly to pinned memory or utilize the Orin's NVDEC.
  common_mistake: |
    **The Pitfall:** Attempting to optimize the ML model via pruning or quantization.
    **The Rationale:** Candidates see dropping frame rates and assume the ML model is too heavy, missing the clue that TOPS utilization is low while overall GPU utilization is high.
    **The Consequence:** Wasting time optimizing a model that is already waiting on memory transfers or PCIe bus locks caused by inefficient CPU decoding.
  napkin_math: |
    * **Data Size:** 4 streams * 4K resolution (3840x2160) * 30 FPS * 3 bytes/pixel ≈ **3 GB/s**
    * **Conclusion:** 3 GB/s creates severe memory copy bottlenecks if the CPU handles decoding and copying to the GPU. The pipeline must hardware-decode directly to pinned memory.
