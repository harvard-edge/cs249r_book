title: Drone Pre-Processing Bottleneck
scenario: An autonomous drone with a Jetson AGX Orin captures 4 high-res camera streams.
  The ML inference utilizes only 40% of the Orin's INT8 TOPS, but GPU utilization
  reads 99% and frame rates are dropping.
question: Analyze the data pipeline bottlenecks between memory, CPU, and GPU to determine
  why the accelerator is starved.
details:
  realistic_solution: High GPU utilization with low TOPS means the GPU is waiting
    on memory transfers or PCIe bus locks. The images are likely being decoded on
    the CPU and copied to GPU memory inefficiently. The pipeline must be rewritten
    to hardware-decode directly to pinned memory or utilize the Orin's NVDEC.
  common_mistake: Attempting to optimize the ML model via pruning or further quantization,
    which will not improve throughput since compute is not the bottleneck.
  napkin_math: 4 streams * 4K * 30FPS * 3 bytes = 3 GB/s, creating severe copy bottlenecks
    if the CPU handles it.
