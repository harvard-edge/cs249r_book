title: Hailo-8 Inference Latency Estimate
scenario: An edge video analytics pipeline requires executing a 100 GOPs INT8 object
  detection model on the Hailo-8 accelerator (26 TOPS capability).
question: Estimate the single-frame inference latency in milliseconds assuming the
  compiler achieves a hardware utilization efficiency of precisely 25%.
details:
  realistic_solution: 'The theoretical peak performance is 26 Tera-Operations Per
    Second (26,000 GOPs). At 25% efficiency, the effective throughput is 0.25 * 26,000
    = 6,500 GOPs per second. The time to compute one 100 GOPs frame is 100 / 6,500
    seconds. Converting to milliseconds: (100 / 6,500) * 1000 = 15.38 ms.'
  common_mistake: Dividing the GOPs by the peak TOPS without accounting for the compiler
    efficiency, yielding an overly optimistic 3.8ms.
  napkin_math: 100 / (26000 * 0.25) * 1000 = 15.38 ms.
