title: Hailo-8 Inference Latency Estimate
scenario: 'An edge video analytics pipeline requires executing a 100 GOPs INT8 object detection model on the Hailo-8 accelerator (26 TOPS capability).'
question: Estimate the single-frame inference latency in milliseconds assuming the compiler achieves a hardware utilization efficiency of precisely 25%.
details:
  realistic_solution: 'The theoretical peak performance is 26 Tera-Operations Per Second (26,000 GOPs). At 25% efficiency, the effective throughput is 0.25 * 26,000 = 6,500 GOPs per second. The time to compute one 100 GOPs frame is 100 / 6,500 seconds. Converting to milliseconds: (100 / 6,500) * 1000 = 15.38 ms.'
  common_mistake: |
    **The Pitfall:** Dividing GOPs by peak TOPS without accounting for compiler efficiency.
    **The Rationale:** Candidates assume marketing specs translate perfectly to real-world performance.
    **The Consequence:** Yielding an overly optimistic latency estimate (3.8 ms), which will fail in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical Peak: 26 TOPS = 26,000 GOPs.
    - Hardware Utilization Efficiency: 25%.

    **Calculations:**
    - Effective Throughput: 26,000 * 0.25 = 6,500 GOPs/second.
    - Latency: (100 GOPs / 6,500 GOPs/second) * 1000 = 15.38 ms.

    **Conclusion & Interpretation:**
    - **Result: 15.38 ms (Compute-Bound)**. The single-frame inference latency is estimated at 15.38 ms.
