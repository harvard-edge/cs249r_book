title: The Hard Real-Time Heartbeat
scenario: You are designing a safety-critical perception system for an industrial robot. The main processing
  loop, which runs inference on a camera stream, must complete every 33 milliseconds to meet its hard
  real-time deadline. To prevent the system from freezing due to a software fault, you use a hardware
  watchdog timer. What is a reasonable timeout to set for this watchdog?
question: "What is a reasonable timeout to set for this watchdog?"
details:
  realistic_solution: A reasonable timeout should be slightly longer than the deadline to provide a buffer
    for normal system jitter, but not so long that it compromises the real-time guarantee. A value of
    around 100ms is a good choice. It's roughly 3 times the deadline, ensuring the system resets only
    after several consecutive missed deadlines, indicating a true fault rather than a transient hiccup.
    This watchdog is the lowest and most critical rung on a 'degradation ladder'; its failure signals
    an unrecoverable software state, necessitating a hard reset to return to a known-good state.
  common_mistake: The most common mistakes are setting the timeout either too short or too long. A timeout
    shorter than the task deadline (e.g., 10ms) will cause constant, spurious resets during normal operation.
    A timeout that is orders of magnitude too long (e.g., 1 second) defeats the purpose of a *real-time*
    safeguard, as it allows the system to be non-responsive for a catastrophically long period before
    recovering.
  napkin_math: A hard real-time deadline of 33ms implies a processing rate of 30 frames per second (1000ms
    / 33ms ≈ 30 FPS). Setting a watchdog for 100ms means the system will be reset if it fails to process
    approximately 3 consecutive frames (100ms / 33ms ≈ 3). This is a fast failure detection. In contrast,
    a 1-second timeout would mean waiting for ~30 frames to be missed before a reset, which is far too
    slow for a safety-critical system.
  options:
  - 10 ms
  - 100 ms
  - 1 second
  - 40 ms, the round-trip-time for US cross-country fiber
  correct_index: 1
