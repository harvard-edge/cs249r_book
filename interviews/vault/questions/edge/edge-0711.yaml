title: The Hard Real-Time Heartbeat
scenario: 'You are designing a safety-critical perception system for an industrial robot. The main processing loop, which runs inference on a camera stream, must complete every 33 milliseconds to meet its hard real-time deadline. To prevent the system from freezing due to a software fault, you use a hardware watchdog timer.'
question: What is a reasonable timeout to set for this watchdog?
details:
  realistic_solution: 'A reasonable timeout should be slightly longer than the deadline to provide a buffer for normal system jitter, but not so long that it compromises the real-time guarantee. A value of around 100ms is a good choice. It''s roughly 3 times the deadline, ensuring the system resets only after several consecutive missed deadlines, indicating a true fault rather than a transient hiccup. This watchdog is the lowest and most critical rung on a ''degradation ladder''; its failure signals an unrecoverable software state, necessitating a hard reset to return to a known-good state.'
  common_mistake: |
    **The Pitfall:** Setting the timeout either too aggressively short or disastrously long.
    **The Rationale:** Candidates fail to balance transient system jitter against the need for rapid failure recovery.
    **The Consequence:** A 10ms timeout causes spurious resets during normal operation, while a 1-second timeout leaves the safety-critical system non-responsive during a catastrophic failure.
  napkin_math: |
    *   **Deadline:** 33ms per frame (equivalent to ~30 FPS).
    *   **Timeout Selection:** A 100ms watchdog allows for roughly 3 consecutive missed frames (100ms / 33ms = 3).
    *   **Result:** **100ms is the optimal balance between filtering jitter and ensuring fast failure detection.**
  options:
  - 10 ms
  - 100 ms
  - 1 second
  - 40 ms, the round-trip-time for US cross-country fiber
  correct_index: 1
