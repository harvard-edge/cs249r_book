title: Sensor Fusion Latency Budget
scenario: Your autonomous delivery robot fuses data from a stereo camera (30 FPS, 33ms frame interval), a 2D LiDAR (15 Hz, 67ms scan interval), and an IMU (200 Hz, 5ms). The perception pipeline must produce a fused obstacle map within 50ms of the most recent sensor reading. The camera object detector takes 20ms, the LiDAR scan matcher takes 8ms, and the fusion algorithm takes 5ms.
question: "Can you meet the 50ms deadline, and what's the maximum sensor-to-output latency?"
details:
  realistic_solution: 'Yes, you can meet the 50ms deadline, but the analysis must account for sensor asynchrony. The camera path (20ms detection + 5ms fusion = 25ms) is the critical path. The LiDAR path (8ms + 5ms = 13ms) is faster but the LiDAR only updates every 67ms, so the LiDAR data can be up to 67ms stale. The IMU at 200 Hz compensates: it provides motion estimates every 5ms to correct for LiDAR staleness, reducing effective staleness from 67ms to <5ms equivalent. Maximum sensor-to-output latency is 25ms (camera-bound), well within the 50ms budget with 25ms margin. The IMU is the glue that makes asynchronous fusion work.'
  common_mistake: |
    **The Pitfall:** Adding processing times sequentially without considering asynchronous sensors.
    **The Rationale:** Candidates assume all sensors deliver data simultaneously and processing starts immediately, incorrectly calculating 20ms + 8ms + 5ms = 33ms.
    **The Consequence:** The worst-case latency includes waiting for the slowest sensor, which is missed, leading to incorrect latency margins and potential failure in a real system.
  napkin_math: |
    - **Camera path:** 20ms + 5ms = 25ms.
    - **LiDAR path:** 8ms + 5ms = 13ms.
    - **Worst-case latency:** 25ms (camera-bound).
    - **Budget:** 50ms (Margin: 25ms).
    - **Max LiDAR staleness:** 67ms (one scan period).
    - **IMU compensation error:** 67mm position drift at 1 m/s over 67ms.
    - **IMU gyro drift:** ~0.1°/s × 0.067s = 0.007° — negligible.
    - **Conclusion:** Motion compensation reduces effective staleness to **<5ms equivalent**.
