title: Coreset Memory Bottleneck on Dataflow Edge
scenario: To maximize data efficiency under the Information-Compute Ratio (ICR) framework, your team used
  coreset selection to curate a highly informative dataset of 100,000 representative samples. You deployed
  a hybrid model where a CNN extracts features, followed by a nearest-neighbor classifier matching against
  the 100,000 INT8 coreset embeddings. The model compiled successfully for the Hailo-8 dataflow accelerator
  (26 TOPS INT8, 2.5W). However, in production, inference is heavily bottlenecked, the host memory bus
  is completely saturated, and the Hailo-8 is drawing only 0.8W instead of its rated 2.5W. What is the
  root cause of this underutilization?
question: "What is the root cause of this underutilization?"
details:
  realistic_solution: The Hailo-8 lacks local DRAM and relies on streaming data directly from the host
    into its dataflow architecture. The massive coreset cannot fit in the accelerator's on-chip SRAM,
    forcing it to be continuously streamed from host memory over PCIe for every single inference frame.
    This saturates the host bandwidth, starving the dataflow compute engines. The solution is to use knowledge
    distillation to compress the coreset-based classifier into a standard parametric layer (like a fully
    connected layer) so the weights can be spatially compiled and buffered entirely on-chip.
  common_mistake: Candidates often misdiagnose this as an INT8 quantization error, an unsupported operator
    in the nearest-neighbor layer, or poor driver configuration. They might suggest rewriting the metric
    learning function, missing the architectural reality of memory hierarchy and host-streaming bottlenecks
    on dataflow chips.
  napkin_math: 'Coreset footprint: 100,000 samples * 512 dimensions (1 byte/dim for INT8) = 51.2 MB. Because
    Hailo-8 has no local DRAM, this 51.2 MB must be streamed from host memory. At a target of 60 FPS,
    required bandwidth is 51.2 MB/frame * 60 FPS = 3.07 GB/s. This consumes nearly all practical bandwidth
    of a standard edge PCIe Gen3 x4 link (~3.9 GB/s theoretical max). The 26 TOPS INT8 compute engines
    are starved waiting for this data stream, explaining why the power draw drops from the rated 2.5W
    down to 0.8W.'
