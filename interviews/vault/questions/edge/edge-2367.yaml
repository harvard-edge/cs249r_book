title: Hailo-8 Dual Model Pipeline
scenario: A Hailo-8 chip runs face detection (10 ms) piped to face recognition (15
  ms) in a continuous stream.
question: What is the end-to-end latency for a single frame, and what is the maximum
  throughput (fps) of the pipeline?
visual:
  kind: svg
  path: edge-2367.svg
  alt: Bubble Gantt chart showing stage 1 (10ms) overlapping with stage 2 (15ms).
  caption: Pipelined model execution on Edge TPU.
details:
  realistic_solution: End-to-end latency for one frame passing through both stages
    is 10 ms + 15 ms = 25 ms. Because they are pipelined, the bottleneck is the slowest
    stage (15 ms). Throughput = 1000 ms / 15 ms = 66.6 fps.
  common_mistake: Using the total latency (25 ms) to compute the throughput (1000/25
    = 40 fps), failing to understand pipelined execution.
  napkin_math: 'Latency: 10+15=25ms. Throughput: 1000/15=66.6 fps'
