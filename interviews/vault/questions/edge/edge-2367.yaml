title: Hailo-8 Dual Model Pipeline
scenario: A Hailo-8 chip runs face detection (10 ms) piped to face recognition (15
  ms). The Hailo-8 runs both models in different "contexts" and switches between
  them on the same compute fabric, paying a 1.2 ms multi-context switch overhead
  per frame transition (firmware reloads layer weights from SRAM bank A to bank
  B).
question: Recall the formula for end-to-end latency and pipeline throughput when
  the same chip multi-contexts between two models, accounting for the 1.2 ms context-switch
  overhead per stage transition.
visual:
  kind: svg
  path: edge-2367.svg
  alt: Bubble Gantt chart showing stage 1 (10ms) overlapping with stage 2 (15ms).
  caption: Pipelined model execution on Edge TPU.
details:
  realistic_solution: 'On a single Hailo-8 with multi-context, the two models cannot
    truly pipeline - they share the same fabric. Per-frame: detect 10 + switch 1.2
    + recognize 15 + switch 1.2 (back to detect for next frame) = 27.4 ms total.
    End-to-end latency for one frame = 10 + 1.2 + 15 = 26.2 ms. Throughput = 1000
    / 27.4 = 36.5 FPS - much lower than the textbook 1000/15 = 66.6 FPS that assumes
    independent stages on separate hardware.'
  common_mistake: Treating multi-context single-chip pipelining as if the stages
    ran on separate chips, ignoring the context-switch overhead that turns parallelism
    into serial execution.
  napkin_math: 'Per-frame total: 10 + 1.2 + 15 + 1.2 = 27.4 ms; FPS = 1000/27.4 =
    36.5; latency = 26.2 ms.'
