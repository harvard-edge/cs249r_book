title: Hailo-8 Dual Model Pipeline
scenario: A Hailo-8 chip runs face detection (10 ms) feeding face recognition (15
  ms). The reference figure shows the textbook two-stage overlapping pipeline - detect
  on frame N+1 running concurrently with recognize on frame N - which would yield
  1000/max(10,15) = 66.6 FPS. The Hailo-8, however, multi-contexts both models on
  the same compute fabric, and the firmware reloads layer weights from SRAM bank A
  to bank B at every transition (1.2 ms).
question: Using the overlapping-pipeline figure as the naive baseline, recall what
  the correct end-to-end latency and steady-state throughput are once you recognise
  that single-fabric multi-context execution serialises the two stages. Quantify the
  gap between the figure's 66.6 FPS upper bound and the realised throughput.
visual:
  kind: svg
  path: edge-2367.svg
  alt: Bubble Gantt chart showing stage 1 (10ms) overlapping with stage 2 (15ms).
  caption: Pipelined model execution on Edge TPU.
details:
  realistic_solution: 'On a single Hailo-8 with multi-context, the two models cannot
    truly pipeline - they share the same fabric. Per-frame: detect 10 + switch 1.2
    + recognize 15 + switch 1.2 (back to detect for next frame) = 27.4 ms total. End-to-end
    latency for one frame = 10 + 1.2 + 15 = 26.2 ms. Throughput = 1000 / 27.4 = 36.5
    FPS - much lower than the textbook 1000/15 = 66.6 FPS that assumes independent
    stages on separate hardware.'
  common_mistake: Treating multi-context single-chip pipelining as if the stages ran
    on separate chips, ignoring the context-switch overhead that turns parallelism
    into serial execution.
  napkin_math: 'Per-frame total: 10 + 1.2 + 15 + 1.2 = 27.4 ms; FPS = 1000/27.4 =
    36.5; latency = 26.2 ms.'
