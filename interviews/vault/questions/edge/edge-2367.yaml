title: Hailo-8 Dual Model Pipeline
scenario: >-
  A Hailo-8 chip runs face detection (10 ms) feeding face recognition (15 ms). A standard two-stage overlapping pipeline (detect N+1 concurrently with recognize N) yields 1000/max(10,15) = 66.6 FPS. However, the Hailo-8 multi-contexts both models on the same compute fabric, requiring the firmware to reload layer weights from SRAM bank A to bank B at every transition (1.2 ms).
question: Using the overlapping-pipeline as a baseline, what are the correct end-to-end latency and steady-state throughput of the single-fabric multi-context execution?
visual:
  kind: svg
  path: edge-2367.svg
  alt: Bubble Gantt chart showing stage 1 (10ms) overlapping with stage 2 (15ms).
  caption: Pipelined model execution on Edge TPU.
details:
  realistic_solution: 'On a single Hailo-8 with multi-context, the two models cannot truly pipeline—they share the same fabric and run sequentially. Per-frame time includes both execution times plus two context switches. The throughput is drastically lower than the textbook assumption of independent hardware stages.'
  common_mistake: |
    **The Pitfall:** Treating multi-context execution as true spatial pipelining.
    **The Rationale:** Candidates see two models executing in sequence and mistakenly apply standard independent-hardware pipelining math (throughput = 1 / longest_stage).
    **The Consequence:** They wildly overestimate FPS because they ignore the context-switch overhead and hardware contention that forces serial execution.
  napkin_math: |
    1. **Per-frame serial time:** Detect (10ms) + Switch (1.2ms) + Recognize (15ms) + Switch back (1.2ms).
    2. **Total Loop Time:** `10 + 1.2 + 15 + 1.2 = 27.4 ms`.
    3. **Throughput:** `1000 ms / 27.4 ms = 36.5 FPS`.
    4. **Latency:** `10 + 1.2 + 15 = 26.2 ms` for one frame.
    5. **Result:** Throughput is **36.5 FPS**, far below the 66.6 FPS theoretical bound of true pipelining.
