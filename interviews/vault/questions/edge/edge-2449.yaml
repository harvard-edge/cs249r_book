title: Camera Batching Latency Evaluation
scenario: >-
  A Jetson AGX Orin processes 4 asynchronous 30 FPS camera feeds. Processing them individually (Batch=1) takes 15ms per frame. Waiting for all 4 to arrive and processing them as Batch=4 takes 30ms total.
question: Evaluate whether Batch=1 or Batch=4 minimizes the end-to-end tail latency for the worst-case camera frame.
details:
  realistic_solution: 'For Batch=1, each frame is processed immediately. Total latency is purely the 15ms compute. For Batch=4, if cameras are unsynchronized, the first frame might wait up to ~33ms for the final camera to deliver its frame, followed by a 30ms compute block. Evaluating these paths, Batch=1 provides dramatically lower tail latency despite lower absolute hardware throughput.'
  common_mistake: |
    **The Pitfall:** Falling for the "Amortization Fallacy" by assuming larger batches are always better.
    **The Rationale:** Candidates see that processing 4 frames in 30ms (7.5ms avg) is theoretically more efficient than processing 4 frames individually (4 * 15ms = 60ms).
    **The Consequence:** They ignore the severe queueing and synchronization delays introduced by gathering the batch, catastrophically increasing the tail latency for the first frame that arrived.
  napkin_math: |
    1. **Batch=1 Latency:** Processing is immediate. Tail latency = `15 ms`.
    2. **Batch=4 Wait Time:** At 30 FPS, frames arrive every `33.3 ms`. The first frame waits up to `33 ms` for the 4th frame to arrive.
    3. **Batch=4 Compute Time:** Processing the batch takes `30 ms`.
    4. **Batch=4 Total Latency:** `33 ms wait + 30 ms compute = 63 ms`.
    5. **Result:** Batch=1 (15 ms) provides a **4x faster tail latency** than Batch=4 (63 ms).
