title: Camera Batching Latency Evaluation
scenario: A Jetson AGX Orin processes 4 asynchronous 30 FPS camera feeds. Processing
  them individually (Batch=1) takes 15ms per frame. Waiting for all 4 to arrive and
  processing them as Batch=4 takes 30ms total.
question: Evaluate whether Batch=1 or Batch=4 minimizes the end-to-end tail latency
  for the worst-case camera frame.
details:
  realistic_solution: For Batch=1, each frame is processed immediately. Total latency
    is purely the 15ms compute. For Batch=4, if cameras are unsynchronized, the first
    frame might wait up to ~33ms for the final camera to deliver its frame, followed
    by a 30ms compute block. The worst-case tail latency for that first frame is 33ms
    + 30ms = 63ms. Evaluating these paths, Batch=1 provides dramatically lower tail
    latency (15ms) despite having lower absolute hardware throughput.
  common_mistake: Assuming Batch=4 is universally better because 30ms < (4 * 15ms),
    ignoring the severe synchronization and queueing delays introduced by gathering
    the batch.
  napkin_math: 33ms wait + 30ms compute = 63ms > 15ms.
