title: Edge Guardrail Memory and Latency Sizing
scenario: You are deploying an autonomous robot powered by an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS
  INT8, 60W TDP). To adhere to organizational Responsible AI governance, all generated action plans must
  pass through a local safety classifier before execution. The primary model and OS consume 28 GB of the
  LPDDR5 memory. Assuming the safety classifier uses INT8 quantization, calculate the maximum parameter
  count for the safety model to fit in the remaining memory, and calculate the theoretical latency to
  process a 100-token sequence assuming 20% utilization of the Orin's total INT8 TOPS.
details:
  realistic_solution: The correct approach determines available memory by subtracting the active footprint
    from the total 32 GB, mapping the remainder to INT8 parameters. The candidate then computes the total
    operations for the forward pass and divides it by the effective TOPS (after applying the 20% utilization
    penalty) to find the added guardrail latency.
  common_mistake: Candidates often forget to account for KV cache or activation memory, assuming all remaining
    RAM goes to weights. They also frequently miscalculate the compute requirements by forgetting that
    a single MAC equals 2 OPs.
  napkin_math: '1. Available Memory: 32 GB - 28 GB = 4 GB. 2. Max Parameters (Weights only): 4 GB / 1
    Byte per INT8 param = 4 Billion parameters. 3. Compute Required: 4B params * 2 OPs/param * 100 tokens
    = 800 Giga-OPs (0.8 TOPs). 4. Effective Compute: 275 TOPS * 0.20 utilization = 55 TOPS. 5. Latency:
    0.8 TOPs / 55 TOPs/sec = 0.0145 seconds (14.5 ms).'
