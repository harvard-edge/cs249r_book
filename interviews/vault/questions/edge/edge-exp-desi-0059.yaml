title: Architecting an Energy-Efficient Pipeline on Hailo-8
scenario: You are designing an always-on vision pipeline for a battery-powered drone using a Hailo-8 dataflow
  accelerator. The Hailo-8 delivers 26 TOPS at INT8 precision while consuming only 2.5W, but it lacks
  local DRAM and must stream weights and activations directly from the host processor's memory. Given
  the steep energy penalty of off-chip memory access compared to on-chip compute, evaluate the architectural
  tradeoffs and design a system-level pipeline that minimizes total energy per inference while maintaining
  target accuracy.
question: "How would you design the Hailo-8 vision pipeline to minimize total energy per inference despite costly host DRAM streaming?"
details:
  realistic_solution: The optimal design treats the Hailo-8 as a pure dataflow engine, selecting a model
    architecture where all layers, weights, and intermediate feature maps fit entirely within the accelerator's
    distributed on-chip SRAM to avoid off-chip spillage. The architecture should employ layer fusion,
    aggressively quantize to INT8, and ensure the host is only involved in streaming the initial input
    frame and receiving the final low-bandwidth outputs (e.g., bounding boxes).
  common_mistake: Candidates often focus solely on the 2.5W power figure of the Hailo-8 and ignore the
    system-level energy cost of streaming data from the host's DRAM. They might propose large, standard
    models that require constant swapping of intermediate activations over the PCIe/host interface, causing
    memory access energy to dominate the power budget.
  napkin_math: 'Hailo-8 peak efficiency: 26 TOPS / 2.5W = 10.4 TOPS/W. Typical INT8 MAC energy: ~0.2 pJ.
    Off-chip DRAM access (32-bit): ~640 pJ (3200x more expensive). If an unoptimized model spills 10MB
    of intermediate activations to host DRAM per inference, the memory transfer energy is (10 * 10^6 /
    4) * 640 pJ * 2 (read+write) = 3.2 mJ per inference. At 30 FPS, this off-chip traffic alone consumes
    ~0.1W, significantly degrading the system''s overall energy efficiency compared to keeping all activations
    on-chip.'
