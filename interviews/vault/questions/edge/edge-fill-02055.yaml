title: RDMA over PCIe for Jetson Orin Multi-Node Edge Cluster
scenario: Four Jetson Orin modules (32GB LPDDR5 each) are connected via 10GbE for a distributed edge inference
  system. The team wants to implement RDMA to reduce latency for model state sharing. Evaluate whether
  RDMA is appropriate for this scale and what alternative might achieve similar benefits.
question: "Is RDMA appropriate for four Jetson Orins on 10GbE, and what simpler alternative could achieve similar latency benefits?"
details:
  realistic_solution: 'RDMA over 10GbE (iWARP or RoCEv2): iWARP (software RDMA) available on Linux via
    RDMA subsystem, no special NIC needed. Latency: 10-20μs vs TCP 100-200μs. For 4-node cluster sharing
    model tensors (e.g., distributed KV cache for multi-node LLM), iWARP reduces latency 5-10×. However,
    setup complexity is high for 4 nodes. Alternative: shared memory over POSIX shm for same-host, or
    UNIX domain sockets. For 4 Jetson nodes: use io_uring for async TCP with zero-copy (sendfile/zerocopy
    flag) — achieves 30-50μs latency at 10GbE. RDMA setup overhead (driver, QP management) justified only
    if: >1000 messages/s with <50μs latency requirement. Recommendation: io_uring + TCP zero-copy unless
    latency <20μs is required.'
  common_mistake: Recommending full InfiniBand RDMA for a 4-node edge cluster without considering the
    setup complexity and cost overhead versus simpler solutions.
  napkin_math: '10GbE = 1.25GB/s. Model shard: 8GB (2 Jetons share 16GB model). Transfer time: 8GB/1.25GB/s=6.4s
    for full resync. RDMA saves latency not bandwidth. For control messages (1KB state sync): TCP=200μs,
    RDMA=15μs — 13× faster. At 100 syncs/sec: TCP adds 20ms/s overhead (2% of 1s sync cycle), RDMA adds
    1.5ms. For 4-node edge: TCP overhead is acceptable. RDMA only if sync rate >1000/s.'
