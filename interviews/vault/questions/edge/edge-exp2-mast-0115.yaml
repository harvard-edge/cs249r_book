title: On-Premise Coreset Selection Pipeline
scenario: You are deploying an on-premise continuous learning system for a secure manufacturing plant
  using a single Qualcomm Cloud AI 100 inference accelerator. The system processes a 1,000 FPS industrial
  video stream to detect defects, but network constraints permit sending only 10 frames per second to
  the cloud for model retraining. Synthesize a novel data selection architecture that runs concurrently
  on the accelerator to dynamically prune the data and isolate the most informative coreset without violating
  real-time inference SLAs.
details:
  realistic_solution: Design a bifurcated INT8 architecture where the primary model shares its feature
    extraction backbone with a lightweight multi-head entropy estimator. By evaluating the Information-Compute
    Ratio (ICR) locally, the system scores the informativeness of each frame in a single forward pass.
    High-entropy frames are temporarily retained in a constrained ring buffer within the local memory
    and flushed to the cloud, while 99% of redundant nominal data is immediately discarded.
  common_mistake: Candidates often propose computationally expensive uncertainty techniques like deep
    ensembles or Monte Carlo Dropout, which quickly saturate the accelerator's compute capacity. Another
    frequent trap is ignoring the memory constraints of buffering raw, high-resolution video streams in
    memory while asynchronous selection and network transmission occur.
  napkin_math: 'The shared INT8 backbone plus detection head requires 80 GOPS/frame; at 1,000 FPS, this
    consumes 80 TOPS. The uncertainty estimator adds 20 GOPS/frame (20 TOPS). Total compute is 100 TOPS,
    utilizing only 25% of the 400 TOPS INT8 capacity and comfortably keeping power consumption under the
    75W TDP constraint. However, buffering 5 seconds of uncompressed 1080p frames (approx. 6 MB/frame)
    requires: 1,000 FPS * 5s * 6 MB = 30 GB. This directly conflicts with the 32 GB LPDDR4x limit when
    accounting for the 2 GB model weights and OS overhead. The architecture must actively compress the
    buffer or reduce the ring-buffer window to 2.5 seconds (15 GB) to ensure stable on-premise execution.'
