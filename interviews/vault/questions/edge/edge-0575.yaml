title: The EfficientNet Power Trap
scenario: 'You are a Staff ML Systems Engineer on an autonomous vehicle team. Your perception module runs
  on a Jetson AGX Orin, which has a strict 30W thermal and power budget. Your current perception model,
  a standard CNN, is running within this budget. A modeling scientist proposes replacing a key component
  with a new, ''efficient'' architecture based on depthwise separable convolutions. The new model has
  3x fewer FLOPs. The scientist presents a slide showing that this should reduce latency and power consumption
  significantly. You integrate the new model, but in road tests, you discover two things: the end-to-end
  frame latency has increased by 25%, and the Orin is still drawing the maximum 30W. The scientist claims
  your systems integration is flawed. Evaluate the situation and justify to the modeling scientist what
  is happening. Why is a model with 3x fewer operations running slower and consuming the same amount of
  power?'
question: "Why is a model with 3x fewer operations running slower and consuming the same amount of power?"
details:
  realistic_solution: The root cause is a misunderstanding of system performance on real hardware, specifically
    the relationship between compute, memory bandwidth, and power. The original model, while having more
    FLOPs, was compute-bound. Its high number of operations per byte of data moved (high Arithmetic Intensity)
    meant it could effectively use the Orin's powerful compute cores, achieving a high TOPS-per-Watt.
    The new 'efficient' model has a much lower Arithmetic Intensity. It is memory-bound. The system's
    bottleneck is no longer the compute cores, but the speed at which it can feed them data from DRAM.
    Because the chip spends more of its time and energy budget moving data (an expensive operation) and
    less time performing calculations, its effective TOPS/W plummets. It's still drawing 30W, but that
    power budget is now being spent on inefficient memory access, yielding fewer operations per second
    and thus higher overall latency.
  common_mistake: The most common mistake is to blame software overhead, like Python wrappers or framework
    inefficiencies. Another is to assume some operations in the 'efficient' model are not supported by
    the edge GPU and are falling back to the CPU. While possible, these usually cause much larger performance
    drops and don't explain the power consumption paradox.
  napkin_math: Jetson AGX Orin at max 60W provides 275 TOPS and 204.8 GB/s bandwidth (Ridge Point = 1342
    OPS/Byte). If scaled to a 30W limit, compute halves to ~137 TOPS, but LPDDR5 bandwidth often remains
    near 204.8 GB/s. The new Ridge Point = 137,000 / 204.8 = 668 OPS/Byte. The lower power budget drops
    the threshold, making the device more memory-bound. A model with 800 OPS/Byte is compute-bound at
    30W.
