title: The EfficientNet Power Trap
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your perception module runs on an edge accelerator with a strict 30W thermal and power budget. Your current perception model is running within this budget. A modeling scientist proposes replacing a key component with a new 'efficient' architecture based on depthwise separable convolutions, reducing FLOPs by 3x. After integration, end-to-end frame latency increases by 25% and the system still draws the maximum 30W.
question: Why is a model with 3x fewer operations running slower and consuming the same amount of power?
details:
  realistic_solution: 'The root cause is a misunderstanding of system performance on real hardware, specifically the relationship between compute, memory bandwidth, and power. The original model, while having more FLOPs, was compute-bound and efficiently used the cores. The new model has a much lower Arithmetic Intensity and is memory-bound. The 30W budget is spent on inefficient memory access, yielding fewer operations per second.'
  common_mistake: |
    **The Pitfall:** Blaming software overhead or unsupported operations falling back to the CPU.
    **The Rationale:** Candidates often assume fewer FLOPs automatically translates to lower latency and power, failing to analyze memory bandwidth bottlenecks.
    **The Consequence:** Engineers misdiagnose the performance drop and waste time optimizing framework wrappers instead of addressing the fundamental memory bound.
  napkin_math: |
    - **Original State:** Compute-bound with high Arithmetic Intensity (e.g., >800 OPS/Byte).
    - **New State:** The efficient model has 3x fewer FLOPs, lowering Arithmetic Intensity, making it memory-bound.
    - **Power Bottleneck:** The 30W budget is now spent on inefficient memory access rather than compute.
    - **Result:** The system yields fewer operations per second due to memory stalls, resulting in **higher overall latency** despite fewer FLOPs.
