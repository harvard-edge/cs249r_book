title: The Thermal Paste Time Bomb
scenario: 'Your fleet of 500 Jetson Orin NX devices runs traffic monitoring at intersections. After 2
  years in the field, 15% of units show a gradual FPS decline — from 30 FPS to 18 FPS over 3 months. Replacing
  the software image doesn''t help. The devices are in sealed IP67 enclosures in Phoenix, Arizona (summer
  ambient: 45°C). A technician opens one unit and finds the heatsink is still firmly attached. What''s
  causing the degradation?'
question: "What's causing the degradation?"
details:
  realistic_solution: 'The thermal interface material (TIM) between the SoC die and the heatsink has degraded.
    Standard thermal paste (silicone-based grease) undergoes "pump-out" — repeated thermal cycling (day/night
    in Phoenix: 45°C → 15°C → 45°C) causes the paste to migrate away from the die center due to differential
    thermal expansion between the copper heatsink and the PCB. After ~700 thermal cycles (2 years of daily
    cycling), the paste coverage drops from 100% to ~40%, creating air gaps.'
  common_mistake: '"The GPU is wearing out" or "The fan is failing." The Orin NX doesn''t have a fan in
    this design, and silicon doesn''t degrade at these temperatures over 2 years.'
  napkin_math: 'Fresh TIM: 0.5°C/W → ΔT = 12.5°C at 25W. Degraded TIM (2 years): 2.0°C/W → ΔT = 50°C.
    Summer junction: 45 + 15 + 50 = 110°C (throttle threshold: 105°C). Throttled power: ~15W → ΔT = 30°C
    → junction = 45 + 15 + 30 = 90°C (stable at 18 FPS). Phase-change TIM after 2 years: 0.6°C/W → ΔT
    = 15°C → junction = 45 + 15 + 15 = 75°C (no throttling). Fleet repair cost: 75 units × 50 (technician
    visit) + 3 (TIM) = 3,975. Prevention cost: 500 × (3 - 0.50) = 1,250 at deployment time.'
