title: The Multi-Model Memory Sharing
scenario: 'Your autonomous vehicle runs four models concurrently: detection (80 MB weights), tracking (30 MB), depth estimation (200 MB), and path planning (50 MB). The total is 360 MB of weights plus ~400 MB of activation buffers. Your edge device has 32 GB DRAM, but after the OS and sensor pipelines, only 4 GB is available for ML workloads.'
question: How do you fit 760 MB of ML workload into 4 GB with room for growth?
details:
  realistic_solution: |
    The naive sum of 760 MB ignores the massive concurrent overlap of activation memory and TensorRT workspace buffers, which easily peak above 1.2 GB. To fit securely within the 4 GB envelope, implement a Shared Tensor Allocator (e.g., TensorRT's `IGpuAllocator`) to reuse activation memory arenas across sequential models. Employ Multi-Task Learning (MTL) by sharing a common ResNet backbone for detection and depth. Finally, utilize Temporal Multiplexing: execute depth estimation at 10 FPS instead of 30 FPS, actively page-locking its memory only when invoked, drastically lowering the concurrent memory high-water mark.
  common_mistake: |
    **The Pitfall:** Claiming that 760 MB easily fits into 4 GB without optimization.
    **The Rationale:** Looking only at static weight sizes and ignoring concurrent activation peaks and workspace fragmentation.
    **The Consequence:** The system experiences severe Out-Of-Memory (OOM) crashes during rare edge-cases when all models spike in activation size simultaneously.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available ML RAM: 4 GB.
       - Static Weights: 360 MB.
       - Unoptimized Activations + Workspace: 1000 MB (Concurrent Peak).
    2. **Calculations:**
       - Naive Peak Memory: 360 MB + 1000 MB = 1.36 GB.
       - Shared Allocator Savings: Overlapping sequential activations drops footprint to ~350 MB.
       - Backbone Sharing: Deduplicates 60 MB of weights.
       - Multiplexed Peak: ~800 MB total concurrent memory.
    3. **Conclusion & Interpretation:**
       - **Result: Peak memory drops to ~800 MB. Bottleneck: Memory Capacity-Bound (resolved via memory pooling and MTL).**
