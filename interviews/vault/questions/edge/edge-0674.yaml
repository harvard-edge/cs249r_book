title: The Multi-Model Memory Sharing
scenario: 'Your autonomous vehicle runs four models concurrently: detection (YOLOv8-L, 80 MB weights),
  tracking (DeepSORT, 30 MB), depth estimation (MiDaS, 200 MB), and path planning (custom, 50 MB). Total:
  360 MB of weights plus ~400 MB of activation buffers. Your Jetson AGX Orin has 32 GB DRAM, but after
  the OS and sensor pipelines, only 4 GB is available for ML. How do you fit 760 MB of ML workload into
  4 GB with room for growth?'
details:
  realistic_solution: 'The 760 MB is the *minimum* — it ignores peak activation memory during concurrent
    execution. When detection and depth estimation run simultaneously, their activation buffers peak at
    ~600 MB combined (not 400 MB, because peaks overlap). Plus TensorRT workspace memory (~200 MB per
    engine). Real peak: ~1.2 GB. The strategy: (1) **Shared tensor allocator** — use a single CUDA memory
    pool (like TensorRT''s `IGpuAllocator`) that reuses activation buffers between sequential stages.
    Detection''s output buffer becomes tracking''s input buffer without a copy. (2) **Temporal multiplexing**
    — depth estimation doesn''t need to run every frame. Run it at 10 FPS (every 3rd frame) and reuse
    its memory during off-frames for other models. (3) **Backbone sharing** — if detection and depth share
    a ResNet backbone, load the backbone weights once and run both heads on the shared features. This
    saves 60+ MB of duplicated weights. (4) **Memory-mapped weights** — mmap the planning model''s weights
    so they''re paged in only when the planning module runs (every 100ms), freeing physical RAM between
    invocations.'
  common_mistake: '"4 GB is way more than 760 MB — there''s no problem." This ignores peak memory, concurrent
    allocations, and fragmentation.'
  napkin_math: 'Naive: 360 MB weights + 600 MB peak activations + 400 MB TensorRT workspace = 1.36 GB.
    With shared allocator: activations drop to ~350 MB (sequential reuse). With backbone sharing: weights
    drop to ~280 MB. With temporal multiplexing: peak concurrent memory = ~800 MB. Headroom in 4 GB: 3.2
    GB free for sensor buffers and growth.'
