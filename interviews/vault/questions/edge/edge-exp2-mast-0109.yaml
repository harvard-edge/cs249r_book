title: On-Device LoRA with Heterogeneous Checkpointing
scenario: You are designing an on-device continual learning pipeline for a robotic perception agent running
  on an NVIDIA Jetson Orin. The system must fine-tune an 8-billion parameter vision-transformer (quantized
  to INT8) via LoRA using streaming batches of 4 high-resolution images. A naive training setup requires
  45 GB of activation memory for the backward pass, which severely exceeds the Jetson Orin's 32 GB LPDDR5
  shared memory. You must synthesize a novel architecture that balances activation memory, recomputation,
  and power constraints (60W TDP) by leveraging the Orin's specific Ampere GPU and DLA hardware.
details:
  realistic_solution: The optimal architecture partitions the model across the Orin's heterogeneous compute.
    The first 50% of layers are frozen, require no backward pass, and are mapped to the DLA for highly
    efficient INT8 forward passes with zero activation retention. For the latter 50% mapped to the Ampere
    GPU, selective gradient checkpointing is applied at transformer block boundaries. This trades a slight
    increase in compute for a massive reduction in peak activation memory, fully utilizing the 275 TOPS
    capacity without violating the 60W thermal budget.
  common_mistake: Candidates often suggest aggressively offloading activations to NVMe storage, ignoring
    the PCIe bandwidth bottleneck and latency impact on a 60W edge device. Alternatively, they apply uniform
    layer-by-layer gradient checkpointing without realizing that recomputing purely on the GPU wastes
    the available DLA accelerators and still causes thermal throttling.
  napkin_math: 'Total LPDDR5 Memory: 32 GB. System/OS allocation: ~4 GB. INT8 Model Weights (8B params):
    8 GB. LoRA FP16 weights/optimizer state: ~1 GB. Available memory for activations: 32 - (4 + 8 + 1)
    = 19 GB. Naive activation memory for B=4: 45 GB. Freezing the first 50% of layers (DLA offload) removes
    their activation storage requirements entirely, reducing needed memory to 22.5 GB. Applying gradient
    checkpointing to the remaining GPU layers (checkpointing every 4th layer) reduces the remaining activation
    memory by approximately a factor of 4: 22.5 GB / 4 = 5.625 GB. Peak memory footprint is now 4 (OS)
    + 8 (Weights) + 1 (LoRA) + 5.625 (Activations) = 18.625 GB. This fits comfortably within the 32 GB
    limit while preventing OOM crashes.'
