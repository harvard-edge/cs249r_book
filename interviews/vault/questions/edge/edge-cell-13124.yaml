title: 'Edge TCO Optimization: Power Management for Always-On Edge Systems'
scenario: 'A 500-unit Jetson Orin fleet ($499, 60W peak) operates at 3% GPU utilization on average (burst
  to 100% for 5 seconds every 3 minutes). Current: always on at 60W. Propose power management to reduce
  TCO. Calculate savings from dynamic DVFS reducing to 15W at idle, and quantify the 5-year NPV at 5%
  discount rate.'
question: "What is the correct 5-year always-on power cost for 500 Jetson Orin units at 60W and $0.10/kWh?"
details:
  realistic_solution: 'Power: 500 × 60W × 43,800hr × $0.10/1000 = $131,400 (not $1,314,000).'
  common_mistake: Assuming power management reduces power proportionally with utilization (3% utilization
    = 3% power) when in reality static power dominates at low utilization on embedded systems.
  napkin_math: 'Fleet power: 500 devices × 60W × 43,800hr × $0.10/kWh / 1000 = 500 × 60 × 43800 × 0.10
    / 1000 = 131,400,000 / 1000 = $131,400 (not $1,314,000 which omits /1000).'
