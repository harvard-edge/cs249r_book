title: Multi-Frame Batch Accumulation for Throughput on Jetson Orin vs Latency
scenario: 'A Jetson Orin NX processes security camera frames with YOLOv8-s. Single frame: 8ms. Batching 4 frames: 12ms total. Batching 8 frames: 18ms total. The system requires alerting within 200ms of an event.'
question: What batch size should YOLOv8-s use to maximize throughput while keeping event alerts under 200ms?
details:
  realistic_solution: 'At 30fps camera: frame arrives every 33ms. Latency analysis: batch=1: collect 0ms + infer 8ms = 8ms total latency, 125fps throughput. Batch=4: must wait for 4 frames = 3×33ms=99ms collection + 12ms inference = 111ms latency, 333fps throughput. Batch=8: wait for 8 frames = 7×33ms=231ms + 18ms = 249ms > 200ms SLA! Batch=4 latency 111ms < 200ms SLA: passes. Batch=4 gives 2.7× throughput improvement (333fps vs 125fps) while meeting 200ms SLA (111ms = 55.5% of budget). Batch=8 violates SLA. Optimal: batch=4 (333 effective fps, 111ms worst-case latency). Note: for offline/non-real-time analysis, batch=8 is fine.'
  common_mistake: |
    **The Pitfall:** Choosing the batch size with the best throughput (fps) exclusively.
    **The Rationale:** Candidates forget that batch processing introduces latency equal to the batch collection time.
    **The Consequence:** The system violates real-time SLAs while waiting for frames to assemble.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera at 30 FPS (33ms per frame).
    - Max latency SLA = 200ms.
    - Batch sizes = 1, 4, 8 with compute times 8ms, 12ms, 18ms.

    **Calculations:**
    - Batch=1: 0ms wait + 8ms compute = 8ms latency (125 FPS).
    - Batch=4: (3 * 33ms) wait + 12ms compute = 111ms latency (333 FPS).
    - Batch=8: (7 * 33ms) wait + 18ms compute = 249ms latency.

    **Conclusion & Interpretation:**
    - **Result: Batch=4 is optimal (Real-Time Constraint)**. Throughput increases to 333 FPS while keeping SLA usage to 55.5% (111ms / 200ms). Batch=8 violates the Real-Time Constraint.
