title: Diagnosing Intermittent Latency Spikes on Google Coral Edge TPU
scenario: You have deployed an INT8 quantized object detection model on a fleet of Google Coral Edge TPU devices connected via USB. The devices are rated for 4 TOPS at 2W and are processing video streams at 30 FPS in a factory environment. Your telemetry dashboards show that certain units intermittently experience 10x spikes in inference latency (from 15ms to 150ms) during the afternoon shifts, leading to dropped frames.
question: How do you diagnose the root cause of these performance anomalies?
details:
  realistic_solution: The root cause is likely thermal throttling caused by high ambient temperatures combined with continuous inference. The Coral Edge TPU is passively cooled in the USB form factor, and sustained high utilization near its 2W limit can cause it to hit its thermal limit, triggering frequency scaling to prevent hardware damage. I would diagnose this by exporting the device's thermal zones to our telemetry backend and correlating temperature spikes with the latency spikes on the dashboard.
  common_mistake: |
    **The Pitfall:** Ignoring physical and environmental constraints.
    **The Rationale:** Candidates often assume memory leaks, network jitter, or software bugs without considering that passively cooled edge devices throttle under high ambient temperatures (e.g., afternoon shifts).
    **The Consequence:** Deploying heavy distributed tracing tools that exceed device capabilities rather than simply checking hardware thermal telemetry.
  napkin_math: |
    * **Current Compute:** 15ms inference * 4 TOPS = 0.06 TOPS per frame
    * **Sustained Compute (30 FPS):** 0.06 TOPS * 30 = 1.8 TOPS (45% utilization)
    * **Thermal Reality:** Sustaining 45% utilization near the 2W limit generates significant heat.
    * **Throttling Impact:** When thermal throttling engages, clock speeds can drop by up to 90%.
    * **Latency Spike:** A 10x reduction in frequency directly scales the 15ms inference to **150ms**.
