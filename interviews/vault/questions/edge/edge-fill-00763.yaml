title: Hardware-aware NAS Constraints on Qualcomm Cloud AI 100
scenario: A team is tasked with developing a high-performance, power-efficient computer vision model for
  the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x, 400 TOPS INT8, and a 75W power envelope. They've
  decided to employ hardware-aware Neural Architecture Search (NAS) to find the optimal model. Explain
  how the specific hardware characteristics of the Qualcomm Cloud AI 100, particularly its memory (LPDDR4x),
  compute (INT8 TOPS), and power budget, would constrain the design of the NAS search space and the objective
  functions for effective optimization.
question: "How should the Cloud AI 100's LPDDR4x, 400 TOPS INT8, and 75W budget shape the NAS search space and objectives?"
details:
  realistic_solution: To effectively constrain the NAS search space, integrate hardware-specific proxies
    or predictors for latency, memory footprint, and power consumption directly into the search process.
    For example, introduce architectural blocks known to be efficient on INT8 accelerators, limit model
    depth/width to fit within 32 GB LPDDR4x, and penalize high FLOPs or MACs that exceed the 75W power
    budget. Techniques inspired by MCUNet, which focuses on efficient design for tiny devices, can be
    adapted for optimizing sub-graphs on specific accelerator blocks.
  common_mistake: A common mistake is designing a NAS search space that is too broad or ignores fundamental
    hardware limitations, leading to the discovery of architectures that are either too slow, too large,
    or too power-hungry for the target Qualcomm Cloud AI 100 platform.
  napkin_math: 'If an operation consumes 10 GOPS (INT8) and a specific layer executes 100 such operations,
    what percentage of the Qualcomm Cloud AI 100''s total 400 TOPS (INT8) capacity would this layer utilize,
    assuming only compute is the bottleneck? (Calculation: (10 GOPS/op * 100 ops) / (400 TOPS * 1000 GOPS/TOPS)
    = 1000 GOPS / 400,000 GOPS = 0.25% of total capacity)'
