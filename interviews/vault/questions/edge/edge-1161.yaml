title: 'Edge TCO Implement: Calculate Cost Per Inference for Edge Model'
scenario: Implement the complete cost-per-inference calculation for an edge device ($499, 60W active, 15W idle) deployed for 3 years at a supermarket checkout, running at 5 inferences/second during business hours (12hr/day, 365 days/year). Include hardware amortization, power ($0.10/kWh), and maintenance (3% hardware/year).
question: For the checkout device running 5 inferences/s for 12hr/day, what is the 3-year TCO and cost per inference?
details:
  realistic_solution: 'Calculate total active hours and idle hours over 3 years. Convert active and idle wattages to kWh to find total power cost. Sum the hardware cost, power cost, and maintenance cost to find the Total Cost of Ownership (TCO). Finally, calculate the total number of inferences over 3 years and divide TCO by total inferences.'
  common_mistake: |
    **The Pitfall:** Assuming the device runs at full 60W active power 24/7.
    **The Rationale:** Failing to separate active vs. idle power states, which are critical features of modern edge AI deployments.
    **The Consequence:** Vastly overestimating the power OPEX and unnecessarily rejecting viable edge hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device: $499.
       - Active: 12hr/day (60W). Idle: 12hr/day (15W).
       - Timespan: 3 years (365 days/year).
       - Power cost: $0.10/kWh.
       - Maintenance: 3% of hardware cost/year.
    2. **Calculations:**
       - Hours: 12 * 365 * 3 = 13,140 hours active; 13,140 hours idle.
       - Power: (13,140 * 60W) + (13,140 * 15W) = 788.4 kWh + 197.1 kWh = 985.5 kWh.
       - Power Cost: 985.5 kWh * $0.10 = $98.55.
       - Maintenance Cost: 0.03 * $499 * 3 = $44.91.
       - Total TCO: $499 + $98.55 + $44.91 = $642.46.
       - Total inferences: 5 inf/s * 12hr * 3600s * 365 * 3 = 236,520,000.
       - Cost/Inference: $642.46 / 236,520,000 = $2.72e-6.
    3. **Conclusion & Interpretation:**
       - **Result: TCO Optimization**. The cost per inference is 2.72 micro-dollars, validating the severe economic advantage of edge processing over cloud alternatives.
