title: Edge New 0022
scenario: An industrial PC uses a T4 connected via PCIe Gen4 x16 (32GB/s). The host sends a 16MB point
  cloud per frame. Analyze the tradeoff of keeping intermediate tensors in T4 GDDR6 (16GB max) vs offloading
  them back to the host DDR4 to save space.
question: "Should the T4 keep intermediate tensors in GDDR6 or offload them to host DDR4 over PCIe Gen4 to save VRAM?"
details:
  realistic_solution: Offloading intermediate activations to the host CPU frees up the limited 16GB T4
    GDDR6 for larger model weights or batch sizes. However, PCIe Gen4 bandwidth is roughly 10x slower
    than the T4's internal GDDR6 (320GB/s). Moving tensors back and forth across the bus for every layer
    will completely stall the Tensor Cores. Offloading should only be used for the final output or specific
    layer boundaries (like KV cache offload) to minimize bus traffic.
  common_mistake: Treating PCIe Gen4 as 'fast enough' to act as an extended L3 cache without calculating
    the devastating impact on microsecond-level Tensor Core stalls.
  napkin_math: 'Internal T4 read: 16MB / 320GB/s = 0.05ms. PCIe Gen4 read/write: 16MB / 32GB/s = 0.5ms.
    Offloading creates a 10x memory access penalty per transfer, devastating the real-time inference loop.'
