title: Edge New 0022
scenario: An industrial PC uses an inference accelerator connected via PCIe Gen4 x16 (32GB/s). The host sends a 16MB point cloud per frame.
question: Should the accelerator keep intermediate tensors in GDDR6 or offload them to host DDR4 over PCIe Gen4 to save VRAM?
details:
  realistic_solution: Offloading intermediate activations to the host CPU frees up the limited GDDR6 for larger model weights or batch sizes. However, PCIe Gen4 bandwidth is roughly 10x slower than internal GDDR6. Moving tensors back and forth across the bus for every layer will completely stall the Tensor Cores. Offloading should only be used for the final output or specific layer boundaries (like KV cache offload) to minimize bus traffic.
  common_mistake: |
    **The Pitfall:** Treating PCIe as 'fast enough' to act as an extended L3 cache.
    **The Rationale:** Candidates fail to calculate the devastating impact of PCIe transfer latency on microsecond-level Tensor Core operations.
    **The Consequence:** Moving tensors back and forth across the bus for every layer completely stalls the Tensor Cores, destroying the real-time inference loop.
  napkin_math: |
    * Internal GDDR6 read: 16MB / 320GB/s = **0.05ms.**
    * PCIe Gen4 read/write: 16MB / 32GB/s = **0.5ms.**
    * **Offloading creates a 10x memory access penalty per transfer, making it entirely unviable for intermediate activations.**
