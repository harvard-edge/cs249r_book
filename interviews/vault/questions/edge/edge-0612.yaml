title: The Jet-Lagged Copilot LLM
scenario: 'You are the Principal Engineer designing a ''Digital Copilot'' for a next-gen private jet.
  The system must run a 7B parameter LLM, completely offline, to answer pilot voice queries against the
  aircraft''s technical manuals (~4000 token context). The hardware is a power-constrained, air-gapped
  board equivalent to a Jetson AGX Orin (275 INT8 TOPS, 32 GB LPDDR5 RAM). The flight safety requirements
  are non-negotiable: Time-To-First-Token (TTFT) must be under 500ms, and sustained generation throughput
  must exceed 30 tokens/second. Your initial baseline using a standard 7B model is failing catastrophically:
  prefill with the 4k context causes an OOM error, and generation throughput is barely 15 tokens/sec.
  Design the full-stack model and software architecture to meet these life-or-death performance targets.'
question: "How would you redesign the 7B offline copilot to fit 32GB, keep TTFT under 500ms, and exceed 30 tokens/s on Orin-class hardware?"
details:
  realistic_solution: This is a classic edge LLM problem that requires tackling both memory capacity and
    memory bandwidth. The solution lies in a combination of state-of-the-art algorithms and aggressive
    optimization.
  common_mistake: Engineers unfamiliar with LLM internals will focus on the wrong bottleneck. They might
    suggest a smaller model (which could compromise accuracy) or focus only on quantization, failing to
    realize that the primary bottlenecks are memory capacity during prefill (from the attention matrix)
    and memory bandwidth during generation (from weight loading).
  napkin_math: '**1. Memory Bandwidth Bottleneck (Generation):** A 7B parameter model in INT8 requires
    7 GB of memory. To generate one token, all 7 GB of weights must be fetched from RAM. The Jetson AGX
    Orin''s LPDDR5 bandwidth is ~204.8 GB/s. Max theoretical throughput = 204.8 GB/s / 7 GB/token ≈ 29
    tokens/sec. Practically, achieving ~70% utilization yields ~20 tokens/sec. The 30 tok/s target is
    physically impossible for a 7B model on this hardware without algorithmic changes (e.g., speculative
    decoding or heavy pruning).

    **2. Memory Capacity Bottleneck (Prefill):** A 4000-token prompt requires a massive N² attention matrix
    calculation. Without fusing the kernel, materializing the attention matrix in memory causes an immediate
    OOM on memory-constrained edge devices. FlashAttention is required to keep intermediate states out
    of HBM.'
  options:
  - Using a larger model with more parameters will improve both accuracy and latency, because larger models
    have better computational efficiency.
  - Post-training quantization always produces equivalent results to quantization-aware training; the
    extra training is unnecessary overhead.
  - This is a classic edge LLM problem that requires tackling both memory capacity and memory bandwidth.
    The solution lies in a combination of state-of-the-art algorithms and aggressive optimization.
  - Engineers unfamiliar with LLM internals will focus on the wrong bottleneck.
  correct_index: 2
