title: The Jet-Lagged Copilot LLM
scenario: 'You are the Principal Engineer designing a ''Digital Copilot'' for a next-gen private jet. The system must run a 7B parameter LLM, completely offline, to answer pilot voice queries against the aircraft''s technical manuals (~4000 token context). The hardware is a power-constrained, air-gapped board equivalent to a Jetson AGX Orin (275 INT8 TOPS, 32 GB LPDDR5 RAM). The flight safety requirements are non-negotiable: Time-To-First-Token (TTFT) must be under 500ms, and sustained generation throughput must exceed 30 tokens/second. Your initial baseline using a standard 7B model is failing catastrophically: prefill with the 4k context causes an OOM error, and generation throughput is barely 15 tokens/sec.'
question: "How would you redesign the 7B offline copilot to fit 32GB, keep TTFT under 500ms, and exceed 30 tokens/s on Orin-class hardware?"
details:
  realistic_solution: 'This is a classic edge LLM problem that requires tackling both memory capacity and memory bandwidth. The solution lies in a combination of state-of-the-art algorithms and aggressive optimization.'
  common_mistake: |
    **The Pitfall:** Focusing on model size or standard quantization alone.
    **The Rationale:** Engineers unfamiliar with LLM internals assume a smaller model is the only fix, failing to realize the bottlenecks are memory capacity during prefill (attention matrix) and memory bandwidth during generation.
    **The Consequence:** Proposing solutions that either compromise flight-critical accuracy or still fail to meet the latency SLA.
  napkin_math: |
    * **Generation Bandwidth:** A 7B model in INT8 requires 7 GB.
    * Jetson AGX Orin LPDDR5 bandwidth is ~204.8 GB/s.
    * Max theoretical throughput = 204.8 GB/s / 7 GB/token ≈ 29 tokens/sec.
    * Practically (at 70% util) it is ~20 tokens/sec. The 30 tok/s target is impossible without speculative decoding or pruning.
    * **Prefill Capacity:** A 4000-token prompt requires an N² attention matrix.
    * Without fused kernels (FlashAttention), materializing this immediately causes an OOM error on 32GB RAM.
  options:
  - Using a larger model with more parameters will improve both accuracy and latency, because larger models have better computational efficiency.
  - Post-training quantization always produces equivalent results to quantization-aware training; the extra training is unnecessary overhead.
  - This is a classic edge LLM problem that requires tackling both memory capacity and memory bandwidth. The solution lies in a combination of state-of-the-art algorithms and aggressive optimization.
  - Engineers unfamiliar with LLM internals will focus on the wrong bottleneck.
  correct_index: 2
