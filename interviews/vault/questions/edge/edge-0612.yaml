title: 'The Jet-Lagged Copilot LLM'
scenario: 'You are designing a Digital Copilot for a private jet. The system must run a 7B parameter LLM completely offline to answer voice queries against manuals (~4000 token context). The hardware is power-constrained with 32 GB shared RAM. Time-To-First-Token (TTFT) must be under 500ms, and generation throughput must exceed 30 tokens/second. The standard 7B model baseline fails: prefill with 4k context causes an OOM error, and generation is barely 15 tokens/sec.'
question: 'How would you redesign the 7B offline copilot to fit 32GB, keep TTFT under 500ms, and exceed 30 tokens/s on edge hardware?'
details:
  realistic_solution: 'This is a classic edge LLM problem requiring state-of-the-art memory and bandwidth optimization. Prefill OOMs due to the massive unoptimized attention matrix, requiring FlashAttention-2. Generation is entirely memory-bandwidth bound, requiring aggressive weight quantization (INT4) and Speculative Decoding to bypass the token-by-token memory fetch limit.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model size or standard quantization.
    **The Rationale:** Engineers unfamiliar with LLM internals assume a smaller model is the only fix, failing to realize the discrete bottlenecks are memory capacity during prefill (attention matrix) and memory bandwidth during generation.
    **The Consequence:** Proposing solutions that compromise flight-critical accuracy or still fail to meet the latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model INT8 requires 7 GB.
    - Hardware bandwidth: ~204.8 GB/s.

    **Calculations:**
    - Generation Max Throughput = 204.8 GB/s / 7 GB/token \u2248 29 tokens/sec.
    - Practical throughput (70% util) = ~20 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound (Generation)**. Generation is entirely memory-bandwidth bound.
  options:
  - 'Using a larger model with more parameters will improve both accuracy and latency.'
  - 'Post-training quantization always produces equivalent results to QAT.'
  - 'FlashAttention-2 solves the prefill capacity limit, and INT4 with Speculative Decoding overcomes the memory bandwidth generation limit.'
  - 'Engineers unfamiliar with LLM internals focus on the wrong bottleneck.'
