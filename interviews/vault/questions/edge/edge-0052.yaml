title: The Phantom Sensor Attack
scenario: 'Your autonomous ground vehicle relies on GPS, IMU, and a wheel encoder for localization. Malicious actors have developed sophisticated GPS spoofing devices that can broadcast fake GPS signals, making your vehicle believe it''s in a different location.'
question: How would you design edge-only GPS spoofing detection and mitigation using GPS, IMU, and wheel-encoder fusion?
details:
  realistic_solution: 'A multi-layered approach leveraging sensor redundancy and consistency checks: 1. **Multi-Sensor Fusion:** Use a state estimator (EKF, UKF) to fuse GPS (absolute), IMU (relative), and wheel encoder (relative). 2. **Innovation Monitoring:** Compare estimator predictions to GPS measurement. A consistently large innovation indicates spoofing. 3. **Cross-Modal Checks:** Compare GPS velocity/acceleration with IMU/encoder counterparts. 4. **Signal Quality Analysis:** Monitor raw GPS signal characteristics. 5. **Graceful Fallback:** Stop trusting GPS and rely on dead reckoning while triggering safety protocols.'
  common_mistake: |
    **The Pitfall:** Relying solely on cryptographic GPS receivers.
    **The Rationale:** Candidates assume cryptography solves the problem at the source.
    **The Consequence:** This ignores that cryptographic solutions are not universally available and do not protect legacy hardware against all forms of spoofing.
  napkin_math: |
    1. **Assumptions & Constraints:** IMU drifts ~1m/min. GPS provides ~1-3m accuracy. Spoofing event jumps 50m in 1 second.
    2. **Calculations:** Expected movement (IMU + encoder) = 0.5m. GPS innovation = 50m - 0.5m = 49.5m.
    3. **Conclusion & Interpretation:** **The 49.5m innovation is vastly higher than typical 3m noise, allowing a 100Hz IMU to flag the anomaly within 10ms. Result: Logic-Bound.**
