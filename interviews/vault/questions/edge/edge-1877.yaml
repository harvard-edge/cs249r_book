title: Designing for Memory Pressure on Qualcomm Cloud AI 100
scenario: A large language model (LLM) is deployed for real-time inference on the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model consumes 28 GB of memory, leaving minimal headroom. During peak load, frequent out-of-memory (OOM) errors and performance degradation occur due to memory pressure.
question: How would you manage memory pressure for a 28 GB LLM on Cloud AI 100's 32 GB LPDDR4x to prevent OOMs under real-time peak load?
details:
  realistic_solution: Implement a multi-pronged approach. 1) Deeply analyze memory usage patterns during inference to identify peak allocations. 2) Explore advanced memory pooling techniques. 3) Dynamically adjust batch sizes. 4) Develop robust OOM handling mechanisms that gracefully degrade rather than crashing the system.
  common_mistake: |
    **The Pitfall:** Focusing solely on model quantization (e.g., INT8) without considering dynamic memory usage.
    **The Rationale:** Ignoring fragmentation issues or the impact of OS-level memory management and caching on the limited LPDDR4x memory.
    **The Consequence:** Recurring OOMs persist despite initial optimization efforts.
  napkin_math: |
    - Total memory: 32 GB LPDDR4x.
    - Model size: 28 GB.
    - Remaining memory for OS, runtime, activations, and buffers: 4 GB.
    - If an activation layer temporarily doubles its footprint for an operation (e.g., element-wise op requiring copy).
    **Even a 2 GB temporary buffer can trigger an OOM within the 4 GB limit.**
