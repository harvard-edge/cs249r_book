title: Designing for Memory Pressure on Qualcomm Cloud AI 100
scenario: A large language model is deployed for real-time inference on a Qualcomm Cloud AI 100. The model consumes 28 GB of memory, leaving minimal headroom. During peak load, frequent out-of-memory errors and performance degradation occur due to memory pressure.
question: How would you manage memory pressure for a 28 GB LLM on a 32 GB accelerator to prevent OOMs under real-time peak load?
details:
  realistic_solution: Implement a paged attention memory manager to eliminate external fragmentation. Deeply analyze memory usage patterns to identify peak allocations. Implement an application-level eviction policy to gracefully swap the lowest-priority request's KV cache back to host RAM before the accelerator's limit triggers a hard crash.
  common_mistake: |
    **The Pitfall:** Focusing solely on further model quantization (e.g., to INT4) without addressing KV cache fragmentation.
    **The Rationale:** Ignoring dynamic memory fragmentation and the impact of sequence length scaling on the limited remaining memory.
    **The Consequence:** Recurring OOMs persist during peak concurrency despite initial weight optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total memory: 32 GB.
       - Static Model size: 28 GB.
       - Remaining memory for OS, runtime, and KV cache: 4 GB.
    2. **Calculations:**
       - If an activation layer temporarily doubles its footprint for an operation requiring a copy, it consumes 2 GB.
       - Remaining headroom = 4 GB - 2 GB = 2 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Even a 2 GB temporary buffer or fragmented KV cache can trigger an OOM within the tight 4 GB limit.**
