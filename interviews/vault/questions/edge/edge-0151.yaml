title: The Edge Device Power Average
scenario: An edge device, like a Hailo-8 accelerator in a smart camera, has a duty cycle. It runs inference at 2.5W for 2 seconds, then enters a low-power idle state at 250mW for 8 seconds before repeating the cycle.
question: What is its average power consumption?
details:
  realistic_solution: The correct way to calculate average power is to find the total energy consumed over one full period and divide by the period's duration. The device consumes (2.5W * 2s) in the active phase and (0.25W * 8s) in the idle phase, for a total energy of 7 Joules over 10 seconds. This yields an average power of 0.7W or 700mW.
  common_mistake: |
    **The Pitfall:** Calculating the simple average of the power states.
    **The Rationale:** Engineers average the active and idle power (e.g., (2.5 + 0.25) / 2 = 1.375W) without accounting for the duration spent in each state.
    **The Consequence:** Battery life estimations are drastically incorrect because the device spends 4 times longer in the idle state.
  napkin_math: |
    1. Active Energy: 2.5W × 2s = 5 Joules.
    2. Idle Energy: 0.25W × 8s = 2 Joules.
    3. Total Energy over 10 seconds: 5 + 2 = 7 Joules.
    4. **Average Power: 7 Joules / 10 seconds = 0.7W (700 mW).**
  options:
  - 1.375 W
  - 500 mW
  - 700 mW
  - 2.5 W
  correct_index: 2
