title: The Edge Device Power Average
scenario: An edge device, like a Hailo-8 accelerator in a smart camera, has a duty cycle. It runs inference
  at 2.5W for 2 seconds, then enters a low-power idle state at 250mW for 8 seconds before repeating the
  cycle. What is its average power consumption?
details:
  realistic_solution: The correct way to calculate average power is to find the total energy consumed
    over one full period and divide by the period's duration. The device consumes (2.5W * 2s) in the active
    phase and (0.25W * 8s) in the idle phase, for a total energy of 7 Joules over 10 seconds. This yields
    an average power of 0.7W or 700mW.
  common_mistake: Engineers often calculate the simple average of the active and idle power states, e.g.,
    (2.5W + 0.25W) / 2 = 1.375W. This is incorrect because it fails to account for the *duration* spent
    in each state; the device spends 4 times longer in the idle state than the active state.
  napkin_math: Total Energy = (P_active × t_active) + (P_idle × t_idle)
  options:
  - 1.375 W
  - 500 mW
  - 700 mW
  - 2.5 W
  correct_index: 2
