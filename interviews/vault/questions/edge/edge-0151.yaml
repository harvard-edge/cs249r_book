title: The Edge Device Power Average
scenario: An edge device, like a Hailo-8 accelerator in a smart camera, has a duty cycle. It runs inference at 2.5W for 2 seconds, then enters a low-power idle state at 250mW for 8 seconds before repeating the cycle.
question: What is its average power consumption?
details:
  realistic_solution: Calculate the total energy expended over the complete temporal cycle by multiplying power by duration for each discrete state. The active phase requires 5 Joules, and the idle phase requires 2 Joules. Dividing the cumulative 7 Joules by the 10-second period yields an effective average consumption of 700 mW, heavily weighted by the idle duration.
  common_mistake: |
    **The Pitfall:** Calculating the simple average of the power states.
    **The Rationale:** Engineers average the active and idle power (e.g., (2.5 + 0.25) / 2 = 1.375W) without accounting for the duration spent in each state.
    **The Consequence:** Battery life estimations are drastically incorrect because the device spends 4 times longer in the idle state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active State: 2.5W for 2s.
       - Idle State: 0.25W for 8s.
       - Total Period: 10s.
    2. **Calculations:**
       - Active Energy: 2.5 W * 2 s = 5 Joules.
       - Idle Energy: 0.25 W * 8 s = 2 Joules.
       - Average Power: (5 J + 2 J) / 10 s = 0.7 W (700 mW).
    3. **Conclusion & Interpretation:**
       - **Result: 700 mW average power.** Averaging raw power levels ignores duty cycle weighting, destroying thermal and battery estimates.
  options:
  - 1.375 W
  - 500 mW
  - 700 mW
  - 2.5 W
  correct_index: 2
