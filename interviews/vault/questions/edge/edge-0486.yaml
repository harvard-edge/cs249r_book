title: The Federated Fleet Tax
scenario: You are an ML Systems Engineer at a major automotive company. Your team is running a pilot for
  a new personalized lane-keeping feature that uses Federated Learning (FL) to adapt to driver behavior.
  In the pilot, each of the 50,000 test vehicles performs a local training pass once per day and uploads
  a 20 MB compressed model update to a central server. Management is impressed with the pilot's performance
  and wants you to diagnose the economic feasibility of a full rollout to 1 million vehicles. They will
  only approve the project if the projected annual data transmission cost is below $10 million. Your company's
  bulk cellular data plan costs $2.50 per GB. What is your diagnosis?
question: "What is your diagnosis?"
details:
  realistic_solution: The correct approach is to calculate the total annual data volume for the full fleet
    and multiply it by the cost per GB. A full rollout to 1 million vehicles would generate 20,000,000
    MB (or ~19,531 GB) of data per day. Over a year, this amounts to over 7.1 million GB. At $2.50/GB,
    the total annual cost is approximately $17.8 million. This is significantly over the $10 million budget.
    The diagnosis is that the feature, as currently designed, is not economically feasible. The next engineering
    step would be to investigate cost-reduction strategies, such as more aggressive gradient compression,
    reducing update frequency, or implementing a Wi-Fi-only upload policy.
  common_mistake: Engineers often focus on the privacy benefits or the on-device compute costs of Federated
    Learning, underestimating the massive operational expenditure from data transmission at scale. They
    either miscalculate the total data volume or fail to scale the costs from a small pilot to a full
    production fleet, leading to a flawed economic projection.
  napkin_math: '1. **Data per vehicle per year:** Each vehicle uploads gradient updates once per day.
    Model size: 20 MB. Upload per day = 20 MB. Annual upload per vehicle = 20 MB × 365 = 7,300 MB = 7.1289
    GB/vehicle/year (using 1024 MB = 1 GB). 2. **Cost for pilot (50,000 vehicles):** 50,000 × 7.1289 GB = 356,445 GB/year. At $2.50/GB:
    356,445 × $2.50 = $891,112/year. 3. **Full fleet extrapolation (1,000,000 vehicles):** 1,000,000 ×
    7.1289 GB = 7,128,906 GB/year. At $2.50/GB: 7,128,906 × $2.50 = $17,822,265/year — exceeds the $10M budget
    by 78.2%.'
  options:
  - ~$891k per year. The cost for the 50,000-vehicle pilot is well under budget, so the rollout is approved.
  - The primary cost is the on-device power consumption from daily training, not data transfer. The feature
    is feasible if battery drain is acceptable.
  - ~$17.8M per year. The feature is not economically viable without significant cost optimization.
  - ~$48,828 per year. The feature is extremely cheap because federated learning minimizes data transfer
    compared to sending raw sensor logs.
  correct_index: 2
