title: The Federated Fleet Tax
scenario: A personalized lane-keeping feature uses Federated Learning across 50,000 test vehicles. Each vehicle performs a daily local training pass and uploads a 20 MB compressed model update over a cellular network costing $2.50 per GB. Management wants to diagnose the economic feasibility of a full rollout to 1 million vehicles, with an annual data transmission budget of $10 million.
question: What is the projected annual data transmission cost for 1 million vehicles, and is the full rollout economically feasible?
details:
  realistic_solution: The correct approach is to calculate the total annual data volume for the full fleet
    and multiply it by the cost per GB. A full rollout to 1 million vehicles would generate 20,000,000
    MB (or ~19,531 GB) of data per day. Over a year, this amounts to over 7.1 million GB. At $2.50/GB,
    the total annual cost is approximately $17.8 million. This is significantly over the $10 million budget.
    The diagnosis is that the feature, as currently designed, is not economically feasible. The next engineering
    step would be to investigate cost-reduction strategies, such as more aggressive gradient compression,
    reducing update frequency, or implementing a Wi-Fi-only upload policy.
  common_mistake: |
    **The Pitfall:** Underestimating operational expenditure from data transmission at scale.
    **The Rationale:** Engineers often focus on the privacy benefits or on-device compute costs of FL, ignoring the cellular data costs.
    **The Consequence:** Miscalculating total data volume or failing to scale costs from pilot to production, leading to a severely flawed economic projection and blown budgets.
  napkin_math: |
    1. **Data per vehicle per year**: 20 MB/day * 365 days = 7,300 MB.
    2. **Conversion to GB**: 7,300 MB / 1024 MB/GB ≈ 7.13 GB/vehicle/year.
    3. **Full fleet data**: 1,000,000 vehicles * 7.13 GB = 7,130,000 GB/year.
    4. **Total annual cost**: 7,130,000 GB * $2.50/GB ≈ **$17.8 million/year**.
    5. **Conclusion**: The cost **exceeds the $10M budget by 78%**, making the current design economically infeasible.
  options:
  - ~$891k per year. The cost for the 50,000-vehicle pilot is well under budget, so the rollout is approved.
  - The primary cost is the on-device power consumption from daily training, not data transfer. The feature
    is feasible if battery drain is acceptable.
  - ~$17.8M per year. The feature is not economically viable without significant cost optimization.
  - ~$48,828 per year. The feature is extremely cheap because federated learning minimizes data transfer
    compared to sending raw sensor logs.
  correct_index: 2
