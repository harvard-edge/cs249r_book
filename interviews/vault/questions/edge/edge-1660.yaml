title: Zero-Copy Model Switching via Mmap
scenario: 'You are deploying a dynamic 15-model computer vision pipeline onto an edge server with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x). Each specialized model is 4 GB (INT8), totaling 60 GB, which cannot fit simultaneously in the accelerator''s 32 GB memory or host RAM.'
question: 'How would you serve 15 unpredictable 4 GB models across 8 parallel workers on one Cloud AI 100 without OOMs or long cold starts?'
details:
  realistic_solution: 'The optimal architecture uses `mmap` with `MAP_SHARED` on the host to map all 60 GB of model weights into a single shared virtual address space, preventing memory duplication across the 8 worker processes. Rather than copying entire models, the system leverages the Qualcomm Cloud AI 100''s PCIe host-mapped memory capabilities to fetch only the actively executing layers directly from the host page cache. Tensors must be pre-aligned to page boundaries to ensure PCIe burst transfers efficiently page in the required INT8 weights just-in-time.'
  common_mistake: |
    **The Pitfall:** Proposing a naive LRU caching strategy where models are fully copied on demand.
    **The Rationale:** Candidates use standard caching logic, failing to account for process-level memory duplication.
    **The Consequence:** 8 workers loading a single 4GB model independently will instantly exhaust the accelerator's memory (32GB) and trigger severe cold-start blocking.
  napkin_math: |
    * Total model size: 15 × 4 GB = 60 GB.
    * Naive load via PCIe Gen4: 4 GB / 16 GB/s = 250 ms cold-start blocking.
    * mmap strategy: Host memory maps all 60GB as `MAP_SHARED` to prevent process duplication.
    * Streaming layers: Fetch only active layers. If first layer is 50 MB, critical path drops to 50 MB / 16 GB/s = ~3 ms.
    * **Conclusion: Active pages for 5 concurrent models (20 GB) easily fit in the 32GB RAM alongside 12GB of buffers.**
