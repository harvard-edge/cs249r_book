title: DMA Overhead vs Compute on Cloud AI 100
scenario: You are deploying a high-resolution vision pipeline on an on-premise edge server equipped with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The host system captures uncompressed 4K video frames (3840x2160 resolution, 3 bytes per pixel RGB) and uses DMA to transfer a batch of 16 frames to the accelerator over a PCIe link with an effective bandwidth of 12 GB/s. The INT8 model requires 200 GOPS per frame to process.
question: Assuming no pipelining between transfer and compute, what are the DMA transfer time, compute time, and their ratio for the 16 uncompressed 4K frames?
details:
  realistic_solution: To find the system bottleneck, quantify DMA transfer time versus compute time. Calculate total payload size for the batch and divide by PCIe bandwidth for transfer latency. Divide total compute requirement by accelerator peak TOPS for compute latency. Comparing reveals data movement strictly dominates, prompting a need for host-side compression or pipelining.
  common_mistake: |
    **The Pitfall:** Failing to realize that 400 TOPS processes data magnitudes faster than PCIe can deliver it.
    **The Rationale:** Engineers often forget to account for the byte size of uncompressed RGB frames or mix up GB/s with Gbps.
    **The Consequence:** Designing a pipeline where an expensive edge accelerator sits idle 80% of the time waiting for memory transfers.
  napkin_math: |
    - **Batch Payload:** 3840 * 2160 pixels * 3 bytes/pixel * 16 frames = 398.08 MB.
    - **DMA Transfer Time:** 398.08 MB / 12,000 MB/s (12 GB/s effective PCIe) = 33.17 ms.
    - **Compute Required:** 16 frames * 200 GOPS/frame = 3.2 TOPS.
    - **Compute Time:** 3.2 TOPS / 400 TOPS (Cloud AI 100 peak) = 8 ms.
    - **Final Result:** **Data movement (33.17 ms) to compute (8 ms) is a roughly 4.15:1 ratio, meaning the pipeline is entirely I/O bound.**
