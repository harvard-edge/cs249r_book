title: The ViT Memory Wall on the Edge
scenario: 'You''re designing a real-time object detection system for a smart camera using a Jetson AGX Orin. You need to hit a 33ms (30 FPS) deadline. You''re comparing two models with similar parameter counts and total FLOPs: a MobileNet-style CNN and a Vision Transformer (ViT).'
question: "For the ViT, what is the most likely primary performance bottleneck that could cause it to miss the 33ms deadline?"
details:
  realistic_solution: The primary bottleneck is memory bandwidth. While the CNN performs convolutions with a local receptive field (e.g., a 3x3 kernel), its memory accesses are predictable and cache-friendly. The ViT's self-attention mechanism is quadratic in the number of image patches (the sequence length). This requires fetching data for all patches to compute the attention score for any single patch, resulting in a massive number of non-local memory accesses that saturate the device's memory bus (e.g., the 204.8 GB/s LPDDR5 on an Orin).
  common_mistake: |
    **The Pitfall:** Using parameter count or FLOPs as the sole predictor of edge performance.
    **The Rationale:** Overlooking that the *pattern* of memory access (quadratic all-to-all vs local convolutions) dictates edge latency.
    **The Consequence:** Selecting an architecture that is severely memory-bound on the target hardware and fails real-time constraints.
  napkin_math: |
    *   **Patch Complexity:** A 224x224 image divided into 16x16 patches creates a sequence of N=196 patches.
    *   **Attention Cost:** The self-attention mechanism requires $N^2$ (196 * 196 = 38,416) all-to-all comparisons.
    *   **Memory Traffic:** This massive number of non-local memory accesses must travel over the memory bus.
    *   **Result:** The memory bus saturates, causing the compute units to stall and the model to miss the 33ms deadline.
  options:
  - The total number of FLOPs in the MLP blocks
  - The flash storage required for the model's parameters
  - Memory bandwidth saturation from the quadratic complexity of self-attention
  - The latency of the initial patch embedding (stem) layer
