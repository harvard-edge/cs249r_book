title: The ViT Memory Wall on the Edge
scenario: 'You''re designing a real-time object detection system for a smart camera using a Jetson AGX
  Orin. You need to hit a 33ms (30 FPS) deadline. You''re comparing two models with similar parameter
  counts and total FLOPs: a MobileNet-style CNN and a Vision Transformer (ViT). For the ViT, what is the
  most likely primary performance bottleneck that could cause it to miss the 33ms deadline?'
details:
  realistic_solution: The primary bottleneck is memory bandwidth. While the CNN performs convolutions
    with a local receptive field (e.g., a 3x3 kernel), its memory accesses are predictable and cache-friendly.
    The ViT's self-attention mechanism is quadratic in the number of image patches (the sequence length).
    This requires fetching data for all patches to compute the attention score for any single patch, resulting
    in a massive number of non-local memory accesses that saturate the device's memory bus (e.g., the
    204.8 GB/s LPDDR5 on an Orin).
  common_mistake: Engineers often fixate on total FLOPs or parameter count as the sole predictor of performance.
    On edge devices with limited memory bandwidth, the *pattern* of memory access is often more critical.
    A ViT's self-attention mechanism requires all-to-all comparisons between image patches, leading to
    a quadratic explosion in non-local memory accesses that can saturate the memory bus, even if the device's
    compute units (TOPS) are not fully utilized.
  napkin_math: Consider a 224x224 image divided into 16x16 patches, creating a sequence of N=196 patches.
  options:
  - The total number of FLOPs in the MLP blocks
  - The flash storage required for the model's parameters
  - Memory bandwidth saturation from the quadratic complexity of self-attention
  - The latency of the initial patch embedding (stem) layer
