title: Hailo-8 Host-Device DMA Bottleneck
scenario: You are deploying a custom INT8 vision model on a Hailo-8 edge accelerator (26 TOPS INT8, 2.5W).
  The Hailo-8 is a dataflow accelerator with no local DRAM, meaning all data must stream continuously
  from host memory via DMA over a PCIe link. Profiling reveals the inference pipeline is capped at 166
  FPS, despite the Hailo-8 compute utilization being very low. You notice the host CPU is heavily utilized
  during inference. Analyze why the dataflow architecture without local DRAM exacerbates this CPU bottleneck
  and explain the tradeoff in memory management causing it.
question: "What host memory-management issue causes high CPU use and caps the Hailo-8 pipeline at 166 FPS despite low accelerator utilization?"
details:
  realistic_solution: The bottleneck is caused by using pageable (swappable) memory on the host instead
    of pinned (page-locked) memory. Because the Hailo-8 lacks local DRAM, it relies entirely on its DMA
    engine to pull data directly from the host. If memory is pageable, the CPU must first copy the data
    to a temporary pinned buffer before the DMA transfer can occur. This CPU-bound memory copy for every
    frame's input/output overwhelms the host CPU, starving the Hailo-8 of data. The solution is to use
    zero-copy techniques by allocating pinned memory directly for the application buffers.
  common_mistake: Candidates often look only at the total PCIe bandwidth and conclude the bus is saturated,
    or they assume the 26 TOPS compute limit is somehow being hit. They frequently miss that without local
    DRAM on the accelerator, every single input and output must be actively managed by the host memory
    subsystem, making CPU-side memory allocation strategies critical.
  napkin_math: Assume the model requires 2 MB of input/output data per frame. At 26 TOPS INT8, the Hailo-8
    can theoretically compute this network at 500 FPS. The required continuous streaming bandwidth is
    500 FPS * 2 MB = 1.0 GB/s, which easily fits within a typical 4 GB/s PCIe Gen3 x4 bus. However, a
    CPU memory copy (memcpy) of 2 MB from pageable to pinned memory takes roughly 1.0 ms. If the host
    CPU has 5.0 ms of application logic per frame, the total CPU time per frame is 1.0 ms (copy) + 5.0
    ms (logic) = 6.0 ms. Max system throughput = 1 / 0.006s = 166 FPS. The 26 TOPS accelerator sits idle
    66% of the time waiting on the CPU memory hierarchy, despite drawing its minimal 2.5W.
