title: Multi-Sensor Calibration Pipeline
scenario: 'Your autonomous vehicle fleet of 200 trucks has 7 sensors each. 10 critically overlapping pairs require extrinsic calibration. After factory calibration, the trucks operate for months with vibration and minor impacts causing calibration drift.'
question: 'How would you automate fleet-wide sensor calibration to maintain sub-0.1° rotation and sub-2cm translation without taking vehicles offline?'
details:
  realistic_solution: 'Design a three-tier online calibration system: (1) Continuous monitoring — compute cross-sensor consistency metrics every 5 minutes using natural scene features. (2) Online correction — when drift is detected, run a lightweight optimization using accumulated feature correspondences to update extrinsic transforms. (3) Confidence gating — if uncertainty exceeds threshold, flag the vehicle for depot calibration.'
  common_mistake: |
    **The Pitfall:** Relying on scheduled, physical target-based calibration routines at depot stops.
    **The Rationale:** Target-based physical calibration is the standard, trusted way to achieve high precision in isolated automotive environments.
    **The Consequence:** Physical depots require massive infrastructure spend and incur continuous manual labor costs and fleet downtime, scaling poorly.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 vehicles, 52 depot visits/year, 0.5 hours/visit, $150/hour.
    - Online dev cost: 6 months * 2 engineers * $180K/year = $180,000.

    **Calculations:**
    - Physical Calibration Cost: 200 * 52 * 0.5 * 150 = $780,000/year.
    - ROI: ($780,000 - $180,000) / $180,000 = 3.33x (or ~4.3x gross return).

    **Conclusion & Interpretation:**
    - **Result: >3x ROI in year one (Cost-Bound)**. Software-based calibration completely eliminates expensive depot visits.
