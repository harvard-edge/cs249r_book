title: Multi-Sensor Calibration Pipeline
scenario: Your autonomous vehicle fleet of 200 trucks has 7 sensors each (3 cameras, 1 LiDAR, 2 radars, 1 IMU). Key overlapping sensor pairs (21 pairs total, 10 critically overlapping pairs) require extrinsic calibration (6-DOF transform). After factory calibration, the trucks operate for months with vibration, temperature cycling, and minor impacts causing calibration drift.
question: How would you automate fleet-wide sensor calibration to maintain sub-0.1° rotation and sub-2cm translation without taking vehicles offline?
details:
  realistic_solution: 'Design a three-tier online calibration system: (1) Continuous monitoring — compute cross-sensor consistency metrics (LiDAR-to-camera reprojection error, radar-to-camera azimuth correlation) every 5 minutes using natural scene features (lane markings, poles, vehicle edges). Flag when error exceeds 0.05 deg or 1cm. (2) Online correction — when drift is detected, run a lightweight optimization (50ms on ARM) using accumulated feature correspondences to update the extrinsic transforms. (3) Confidence gating — if online calibration uncertainty exceeds the accuracy threshold, flag the vehicle for depot calibration. This replaces 780K/year in manual depot calibration with 0 marginal cost software running on existing hardware.'
  common_mistake: |
    **The Pitfall:** Relying on scheduled, physical target-based calibration routines at depot stops.
    **The Rationale:** Target-based physical calibration is the standard, trusted way to achieve high precision in isolated automotive environments.
    **The Consequence:** Physical depots require massive infrastructure spend ($1.5M across 30 depots) and incur continuous manual labor costs and fleet downtime, scaling poorly as the fleet grows.
  napkin_math: |
    1. **Physical Calibration Cost:** 200 vehicles * 52 depot visits/year * 0.5 hours * $150/hour (technician + downtime) = $780,000/year.
    2. **Online Calibration Load:** Extracting features takes 200ms every 5 min on the existing ARM CPU, consuming 0.07% CPU utilization.
    3. **Software Dev Cost:** Developing the online system takes ~6 months * 2 engineers * $180K/year = $180,000.
    4. **Result:** Transitioning to online, software-based calibration completely eliminates physical depot visits, yielding a **4.3x ROI** in the first year alone.
