title: Multi-Sensor Calibration Pipeline
scenario: 'Your autonomous vehicle fleet of 200 trucks has 7 sensors each: 3 cameras (front, left, right),
  1 LiDAR, 2 radars (front, rear), and 1 IMU. Each sensor pair requires extrinsic calibration (6-DOF transform).
  After factory calibration, the trucks operate for months with vibration, temperature cycling, and minor
  impacts causing calibration drift. Design an automated calibration pipeline that maintains sub-0.1°
  rotation and sub-2cm translation accuracy across the fleet without taking vehicles offline.'
details:
  realistic_solution: 'Design a three-tier online calibration system: (1) Continuous monitoring — compute
    cross-sensor consistency metrics (LiDAR-to-camera reprojection error, radar-to-camera azimuth correlation)
    every 5 minutes using natural scene features (lane markings, poles, vehicle edges). Flag when error
    exceeds 0.05 deg or 1cm. (2) Online correction — when drift is detected, run a lightweight optimization
    (50ms on ARM) using accumulated feature correspondences to update the extrinsic transforms. (3) Confidence
    gating — if online calibration uncertainty exceeds the accuracy threshold, flag the vehicle for depot
    calibration. This replaces 780K/year in manual depot calibration with 0 marginal cost software running
    on existing hardware.'
  common_mistake: '"Run a target-based calibration routine at every depot stop." Target-based calibration
    requires specific calibration targets (checkerboards, reflective markers) and controlled environments.
    Depot stops are infrequent (weekly) and the calibration infrastructure costs 50K per depot. For 200
    trucks across 30 depots: 1.5M in calibration infrastructure.'
  napkin_math: 'Fleet calibration parameters: 200 vehicles × 10 pairs × 6-DOF = 12,000 parameters monitored.
    Bandwidth: 200 × 240 bytes × 24 reports/day = 1.15 MB/day. Compute: 200ms every 5 min on ARM CPU =
    0.07% CPU utilization. Cost of online calibration: 0 marginal (software running on existing hardware).
    Cost of depot-based calibration it replaces: 200 vehicles × 52 depot visits/year × 0.5 hours × 150/hour
    (technician + downtime) = 780K/year. Annual savings: 780K. Time to develop online calibration system:
    ~6 months × 2 engineers × 180K/year = 180K. ROI: 4.3× in year 1.'
