title: 'MLOps for INT8 Deployment on Coral Edge TPU'
scenario: 'A machine learning engineering team is preparing to deploy an image recognition model to a fleet of Google Coral Edge TPUs, each rated at 4 TOPS INT8 with 2W power consumption, strictly supporting INT8-only inference. During the MLOps pipeline''s CI/CD stage for edge devices, they are evaluating model compatibility.'
question: 'What Coral Edge TPU data type constraint must the model artifact satisfy, and what CI/CD practice ensures it before deployment?'
details:
  realistic_solution: 'The model artifact must be explicitly prepared in INT8 format, typically as a TensorFlow Lite model that has undergone INT8 post-training quantization. A robust MLOps best practice is to integrate an automated quantization and validation step directly into the CI/CD pipeline. This step should convert the trained FP32 model to INT8 TensorFlow Lite, run comprehensive inference tests on a representative dataset using the quantized model, and verify critical performance metrics (e.g., accuracy, latency) against predefined thresholds for INT8 inference. Both the original and quantized model versions should be meticulously tracked in a model registry for complete reproducibility, traceability, and seamless rollback capabilities.'
  common_mistake: |
    **The Pitfall:** Attempting to deploy models quantized to FP16 or FP32 without proper INT8 pre-conversion.
    **The Rationale:** Engineers might assume the edge device supports broader precision formats or can automatically downcast.
    **The Consequence:** Deployment failures, runtime errors, or models falling back to CPU execution with suboptimal performance.
  napkin_math: |
    - Coral Edge TPU performance: 4 TOPS INT8.
    - Power budget: 2W.
    - Single INT8 inference: 1 GOPS.
    - Theoretical max inferences: (4 * 10^12 ops/s) / (1 * 10^9 ops/inf) = **4000 inferences/second**.
