title: 'Model Partitioning for Collaborative Inference: Edge+Cloud Split on Jetson Orin'
scenario: A collaborative inference system splits a 50-layer ResNet-152 between Jetson Orin (first k layers)
  and a cloud A100 (remaining layers). The Jetson Orin has 5 Mbps uplink to the cloud. Each layer output
  doubles the channel count until bottleneck (layer 25, output 256×28×28×FP16 = 793KB). Determine the
  optimal split point to minimize total latency.
details:
  realistic_solution: 'Network transfer cost: activation_size / bandwidth. At 5 Mbps = 0.625 MB/s. Layer
    25 activation: 793KB / 0.625 MB/s = 1.27s upload. That''s 1.27 seconds just for network transfer —
    very slow. Layer 50 (final, after global avg pool): 2048×4B FP16 = 4KB. Upload: 4KB/0.625MB/s = 6.4ms.
    Option A: run all layers on Jetson Orin edge, send 4KB classification vector: 6.4ms network + 0ms
    cloud. Option B: split at layer 25: 793KB = 1270ms network alone. Option C: send raw image (640×480×3×1B
    = 921KB) to cloud: 921KB/0.625MB/s = 1474ms vs running locally. Optimal: run entire model on Jetson
    Orin, send only the 2048-dim feature vector (4KB) for final classification on cloud if needed. End-to-end
    latency: edge inference (~50ms) + 6.4ms upload = 56.4ms.'
  common_mistake: Always splitting at the bottleneck layer (layer 25) because it has the smallest activation
    map; but if early layers are faster on edge than cloud RTT, splitting earlier may be better.
  napkin_math: 'Bandwidth: 5 Mbps = 0.625 MB/s. Layer 25 output: 793KB → 1.27s upload. Layer 50 output:
    4KB → 6.4ms upload. Full image: 921KB → 1.47s. Clear winner: run all 50 layers on Jetson (50ms), send
    4KB result (6.4ms). Total: 56.4ms. Splitting at layer 25 is 23× slower due to network bottleneck.'
