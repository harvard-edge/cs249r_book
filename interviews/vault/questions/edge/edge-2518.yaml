title: NPU Preemption Context Switch
scenario: 'A Snapdragon 8 Gen 3 switches context from a vision app to a voice agent. The OS must swap a 500 MB KV cache from NPU SRAM to shared LPDDR5x (50 GB/s bandwidth).'
question: 'Calculate the total preemption latency bubble injected into the LLM pipeline.'
details:
  realistic_solution: 'A full context switch requires saving the current 500 MB state to memory, then loading the new 500 MB state. Swapping out takes 500 MB / 50 GB/s = 10ms. Swapping in takes another 10ms. The total synchronization bubble before generation can resume is 20ms.'
  common_mistake: |
    **The Pitfall:** Only calculating the memory read time (10ms).
    **The Rationale:** Candidates focus solely on the time it takes to load the new voice agent's state into SRAM.
    **The Consequence:** They completely forget the mandatory write-back of the evicted active vision context, underestimating the total latency bubble by 50%.
  napkin_math: |
    * Write out evicted context = 500 MB / 50,000 MB/s = 10ms.
    * Read in new context = 500 MB / 50,000 MB/s = 10ms.
    * **Conclusion: The total synchronization bubble before generation resumes is 20ms.**
