title: NPU Preemption Context Switch
scenario: 'A mobile SoC switches context from a vision app to a voice agent. The OS must swap a 500 MB KV cache from NPU SRAM to shared memory.'
question: 'Calculate the total preemption latency bubble injected into the LLM pipeline given a 50 GB/s bandwidth.'
details:
  realistic_solution: 'A full context switch requires saving the current 500 MB state to memory, then loading the new 500 MB state. Synchronous eviction and fetching strictly bounds the total synchronization bubble before auto-regressive generation resumes.'
  common_mistake: |
    **The Pitfall:** Only calculating the memory read time (10ms).
    **The Rationale:** Candidates focus solely on the time it takes to load the new voice agent's state into SRAM.
    **The Consequence:** They completely forget the mandatory write-back of the evicted active vision context, underestimating the total latency bubble by 50%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context size: 500 MB KV cache.
       - Memory bandwidth: 50 GB/s (50,000 MB/s).
    2. **Calculations:**
       - Write out evicted context: 500 MB / 50,000 MB/s = 10 ms.
       - Read in new context: 500 MB / 50,000 MB/s = 10 ms.
       - Total latency bubble = 10 ms + 10 ms = 20 ms.
    3. **Conclusion & Interpretation:**
       - **The total synchronization bubble before generation resumes is 20ms.** (Result: Memory-Bandwidth Bound)
