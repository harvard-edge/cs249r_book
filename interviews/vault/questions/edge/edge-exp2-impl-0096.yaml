title: Hailo-8 Host Memory Bandwidth Alerting
scenario: You are configuring a production health dashboard for a fleet of edge devices utilizing Hailo-8
  dataflow accelerators. Because the Hailo-8 has no local DRAM, it relies entirely on streaming from host
  memory over PCIe. Your application processes 60 frames per second of 1080p RGB video (1920x1080x3 bytes
  per frame), and the host system is configured to allocate a maximum of 500 MB/s of PCIe bandwidth to
  the accelerator. Calculate the continuous memory bandwidth required just to stream the input tensors,
  and determine the baseline utilization percentage to configure a high-watermark alert for bandwidth
  saturation.
question: "What continuous PCIe bandwidth is needed for 60 FPS 1080p RGB input streaming, and what baseline utilization is that of 500 MB/s?"
details:
  realistic_solution: A robust observability strategy for Hailo-8 must explicitly monitor host PCIe bandwidth
    and DMA transfer queues as leading indicators of system health. The alert should be configured slightly
    above the baseline streaming requirement to catch anomalous memory contention with other host processes
    before the 500 MB/s hard limit is hit, which would result in starved compute.
  common_mistake: Candidates often focus solely on the 26 TOPS INT8 compute capacity and forget that without
    local DRAM, the Hailo-8 is heavily dependent on host memory bandwidth. They frequently fail to account
    for the continuous PCIe streaming requirement when designing telemetry alerts, leading to silent frame
    drops.
  napkin_math: '1. Frame size: 1920 pixels * 1080 pixels * 3 channels (bytes) = 6,220,800 bytes (~6.22
    MB).

    2. Required streaming bandwidth: 6.22 MB/frame * 60 FPS = 373.2 MB/s.

    3. Baseline utilization: 373.2 MB/s / 500.0 MB/s (limit) = 74.6%.

    4. Alerting threshold: Set the high-watermark alert at around 80% to detect abnormal spikes or bus
    contention before hitting the 500 MB/s ceiling.'
