schema_version: 1
id: edge-fill-02006
title: Queuing Backpressure on Jetson Orin Edge Inference
topic: queueing-theory
status: published
provenance: imported
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) runs a video analytics pipeline processing 30fps
  camera frames. Each inference takes 40ms mean. At 30fps (33ms inter-arrival), the device shows growing
  queue depth and eventual frame drops. Use queuing theory to explain why and propose a solution.
details:
  realistic_solution: 'λ=30/s (33ms inter-arrival), μ=25/s (40ms service). ρ=λ/μ=1.2>1 → queue is unstable,
    grows without bound. Solutions: (1) reduce model to achieve <30ms inference, (2) drop every 4th frame
    (process 22fps), (3) use frame skipping with temporal interpolation, (4) batch 2 frames if latency
    allows. On Jetson Orin, INT8 quantization can halve inference from 40ms to 18ms.'
  common_mistake: Assuming 30fps input and 40ms service can be handled by buffering; not recognizing that
    λ>μ makes the queue unstable.
  napkin_math: 'ρ=30/25=1.2. Unstable queue grows at (30-25)=5 frames/sec. Buffer fills in seconds. Must
    achieve μ>30/s → inference <33ms. INT8 on 275 TOPS: feasible for models ≤50M ops.'
