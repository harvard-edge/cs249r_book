id: edge-0424
title: The Autonomous Driving Perception Stall
topic: roofline-analysis
status: draft
provenance: imported
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new
  LiDAR object detection model onto a fleet of cars using the Jetson AGX Orin platform. During a test
  run, the perception lead reports that the model is only achieving 50% of the Orin's advertised 275 TOPS
  (INT8) and the device is running hot, consuming 40W. You profile the model and find it executes 8 Trillion
  operations (8e12 Ops) and reads/writes 10 Gigabytes of data from DRAM per second. Using these metrics,
  diagnose the primary performance bottleneck.
details:
  realistic_solution: The workload is memory-bound. The key is to calculate the system's Roofline ridge
    point and compare it to the model's arithmetic intensity. The AGX Orin's memory bandwidth is the limiting
    factor here. The compute units are being starved for data, spending most of their cycles idle while
    waiting for weights and activations to be fetched from DRAM. This memory access itself consumes significant
    power, contributing to the heat, even though the compute cores are not fully utilized. The path to
    optimization is to reduce memory traffic via techniques like layer fusion, quantization, or re-ordering
    data access patterns, not to further optimize the math operations.
  common_mistake: Engineers often assume that high power consumption or heat automatically means a workload
    is compute-bound. They might also focus purely on the advertised peak TOPS of a device without considering
    the memory system's ability to feed the compute units, which is often the real limiter on edge devices.
  napkin_math: 'To find the bottleneck, calculate the Orin''s Ridge Point: Peak Compute (275 TOPS INT8)
    / Peak Bandwidth (204.8 GB/s) = 1342 OPS/Byte. If the LiDAR model''s Arithmetic Intensity is 500 OPS/Byte
    (below 1342), it is memory-bound. Max achievable compute = 500 OPS/Byte * 204.8 GB/s = 102.4 TOPS.
    Even though the Orin can do 275 TOPS, the model will stall waiting for LPDDR5 memory.'
