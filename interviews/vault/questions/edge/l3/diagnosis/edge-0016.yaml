schema_version: 1
id: edge-0016
title: The AV Perception Pipeline Stall
topic: data-parallelism
status: published
provenance: imported
scenario: You are an ML systems engineer on an autonomous vehicle team. Your perception system uses a
  single Jetson AGX Orin to process feeds from 6 identical 1080p cameras. The object detection model takes
  exactly 25ms to run on a single camera frame. Your end-to-end latency budget for processing all 6 camera
  frames is a hard real-time deadline of 100ms. However, you observe the total processing time is consistently
  around 150ms. `tegrastats` shows the GPU is active, but its utilization is saw-toothed, not pegged at
  100%. Given this data, how would you diagnose and solve this pipeline stall?
details:
  realistic_solution: The most likely cause is a serial execution bottleneck. The system is processing
    the 6 camera frames one after another, leading to a total time that is the sum of the individual parts.
    The solution is to implement pipeline parallelism. Since the processing for each camera is independent,
    you should use a mechanism like NVIDIA CUDA Streams to launch all 6 frame-processing tasks concurrently.
    This allows the GPU's streaming multiprocessors (SMs) to execute the tasks in parallel, bringing the
    total latency down to roughly the time of a single frame's processing plus a small overhead for launch
    and synchronization.
  common_mistake: Engineers often immediately blame the model's performance or the hardware's peak throughput
    (TOPS). They suggest optimizing the model (pruning/quantization) or upgrading the hardware, without
    first analyzing the execution *schedule*. They fail to see that the bottleneck is not the task duration,
    but the serial queuing of independent tasks.
  napkin_math: If the system processes the 6 camera feeds serially on a single thread, the end-to-end
    latency is 6 frames * 25 ms/frame = 150 ms. To meet a typical 30 FPS real-time budget, the total latency
    must be under 33.3 ms. 150 ms heavily violates this constraint. The frames must be batched or processed
    in parallel streams to overlap the 25 ms compute.
