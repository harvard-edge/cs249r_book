id: edge-0468
title: The Transformer's Traffic Jam
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer on the perception team for an autonomous vehicle. Your team
  is trying to upgrade the primary pedestrian detection model on a Jetson AGX Orin, which has a hard 33ms
  (30 FPS) deadline. You are comparing two models:'
details:
  realistic_solution: The `MicroViT` is severely memory-bandwidth bound. Vision Transformers, with their
    self-attention mechanism, induce non-local and irregular memory access patterns to construct the attention
    maps. This results in a low arithmetic intensity (few compute operations per byte of data moved).
    The Jetson Orin's GPU has a massive amount of compute (275 TOPS), but it can't be used if the memory
    system can't feed it data fast enough. The CNN, especially one with depthwise separable convolutions,
    has a very regular, localized memory access pattern, leading to higher arithmetic intensity and better
    utilization of the GPU's compute units. Even though the CNN performs more calculations, it spends
    less time waiting for data, resulting in higher FPS and better power efficiency.
  common_mistake: Engineers often focus exclusively on FLOPs or MACs as the primary measure of model complexity,
    assuming fewer FLOPs automatically means faster inference. This overlooks the 'memory wall' — the
    physical cost of moving data. On edge devices with high compute-to-memory-bandwidth ratios, performance
    is frequently dictated by memory access patterns, not raw arithmetic.
  napkin_math: 'We can diagnose this using a Roofline analysis. The key metric is Arithmetic Intensity
    (AI), the ratio of compute to memory access. Jetson AGX Orin Ridge Point: 275 TOPS INT8 / 204.8 GB/s
    = 1,343 Ops/Byte. CNN (depthwise-separable): e.g., 2 GOps, 8 MB → AI = 250 Ops/Byte. MicroViT (self-attention
    dominant): e.g., 2 GOps, 20 MB (irregular attention map access) → AI = 100 Ops/Byte. Both are memory-bound,
    but the ViT is 2.5× more memory-bound, explaining lower FPS despite similar FLOPs.'
