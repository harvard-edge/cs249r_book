id: edge-0520
title: 'The LiDAR Perception Bottleneck: Roofline Analysis'
topic: roofline-analysis
status: published
provenance: imported
scenario: You are an ML Systems Engineer at an autonomous vehicle company, diagnosing a new LiDAR perception
  model on a Jetson AGX Orin configured to a 30W power profile. Your profiler reports that a single inference
  requires **1.2 Trillion Operations** (TOps) and involves moving **4 Gigabytes** of data (weights, activations,
  etc.) between the GPU cores and DRAM.
details:
  realistic_solution: The model is fundamentally **memory-bound**. The key is to calculate the model's
    Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The Jetson AGX Orin's performance
    is limited by its memory bandwidth long before the model can supply enough data to max out the compute
    cores. The GPU is spending most of its time idle, waiting for data from DRAM. To improve FPS, the
    focus should be on reducing data movement via techniques like operator fusion, re-architecting layers
    to improve data locality, or more aggressive quantization, rather than trying to increase the compute
    clock speed.
  common_mistake: Engineers often see low GPU utilization and immediately assume the CPU is the bottleneck
    (starvation) or that the model is simply too small. They may also incorrectly blame thermal throttling
    from the power limit without first checking if the workload can even saturate the GPU's compute units
    from a data perspective. This leads them to focus on the wrong part of the system.
  napkin_math: Compute = 1.2 TOps. Data = 4 GB. Arithmetic Intensity (AI) = 1.2e12 / 4e9 = 300 Ops/Byte.
    Hardware Ridge Point at 30W (~150 TOPS peak) = 150e12 / 204.8e9 = 732 Ops/Byte. Since 300 < 732, the
    model is memory-bound. Minimum execution time = 4 GB / 204.8 GB/s = 19.5 ms. Effective compute = 1.2
    TOps / 19.5 ms = 61.5 TOPS.
