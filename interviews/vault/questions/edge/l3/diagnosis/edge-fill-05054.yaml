schema_version: 1
id: edge-fill-05054
title: Quantization Error Localization for Accuracy Drop on Coral Edge TPU
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A MobileNetV2 model quantized to INT8 for Coral Edge TPU (4 TOPS INT8, 2W) shows 89% top-1 accuracy
  (vs 91.5% FP32 baseline). The 2.5% accuracy drop is above the acceptable 1% threshold. Using per-layer
  sensitivity analysis, the team finds that layers 12-15 (inverted residual blocks at 14×14 spatial resolution)
  show the highest quantization error. Propose a fix.
details:
  realistic_solution: 'Sensitivity analysis shows layers 12-15 are problematic. Root cause options: (1)
    Activation distributions at 14×14 resolution have outliers from batch normalization folding. (2) Short
    residual path creates quantization error accumulation. (3) Depthwise conv layers have per-channel
    weight variance exceeding INT8 range. Fix strategy: re-quantize with per-channel weight quantization
    for layers 12-15 (vs per-tensor). Coral Edge TPU supports per-channel INT8 quantization for depthwise
    convs. Expected accuracy recovery: 1-1.5% → total loss ~1-1.5%. If insufficient: use bias correction
    or QAT (quantization-aware training) for just layers 12-15. QAT on 4 layers: ~2 hours fine-tuning
    vs full QAT (24 hours).'
  common_mistake: Re-quantizing the entire model with higher bit-width to fix a layer-specific problem;
    targeted mixed-precision quantization of sensitive layers is much more efficient.
  napkin_math: 'Accuracy gap: 2.5%. Per-channel quantization for 4 layers: adds 0 runtime overhead on
    Coral (hardware native). Expected recovery: 1-1.5%. Residual gap: 1-1.5% — within 1% threshold if
    recovery is ≥1.5%. Fall-back: QAT for layers 12-15 recovers additional 0.5-1%.'
