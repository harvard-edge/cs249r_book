schema_version: 1
id: edge-0867
title: The Low-Rank Decomposition Latency Paradox
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You decompose a $4096 \times 4096$ weight matrix in an edge-deployed transformer into two low-rank
  matrices of dimensions $4096 \times 256$ and $256 \times 4096$ (rank 256). This reduces parameters from
  16.8M to 2.1M — an 8x reduction. However, inference latency on a Jetson Orin (with Tensor Cores) only
  drops by 15%, not the expected 8x. Explain why the FLOP reduction does not translate to proportional
  latency reduction on this hardware.
details:
  realistic_solution: Three factors explain the gap. First, while the parameter reduction is 8× (16.8M
    → 2.1M), the FLOP reduction is also 8× for matrix-vector products. The original matrix-vector multiply
    costs $2 \times 4096^2 = 33.6$ MFLOPs. The two low-rank multiplies cost $2 \times 4096 \times 256
    + 2 \times 256 \times 4096 = 4.2$ MFLOPs — an 8× reduction. However, 8× fewer FLOPs does not yield
    8× speedup. Second, the two sequential matrix multiplies have lower arithmetic intensity than one
    large multiply. The original $4096 \times 4096$ matmul has high arithmetic intensity and saturates
    Tensor Cores; each low-rank multiply ($4096 \times 256$) is a tall-skinny or skinny-tall matrix that
    may not fill the Tensor Core tile efficiently, reducing hardware utilization from ~40% to ~10%. Third,
    you now have two kernel launches instead of one, adding overhead and preventing the GPU from amortizing
    the memory-bandwidth cost of reading activations — the activation vector is read from HBM twice instead
    of once.
  common_mistake: Equating parameter reduction with proportional speedup. 'We have 8x fewer parameters,
    so we should see ~8x speedup.' This confuses model size with compute time and ignores hardware execution
    realities.
  napkin_math: 'Original: $4096 \times 4096$ matmul = 33.6M FLOPs, one kernel launch, activations read
    once. Decomposed: $4096 \times 256$ + $256 \times 4096$ = 2.1M + 2.1M = 4.2M FLOPs, two kernel launches.
    FLOP ratio: 8× fewer FLOPs. Arithmetic intensity of $4096 \times 256$ matmul: much lower than $4096
    \times 4096$. On Orin with 275 TOPS INT8, utilization drops from ~40% on large matmuls to ~10% on
    skinny matmuls → effective throughput drops from ~110 TOPS to ~27.5 TOPS. Net real speedup: roughly
    $8 \times (27.5/110) = 2\times$, explaining the ~15-20% latency improvement (the matmul is only part
    of the layer''s total compute).'
