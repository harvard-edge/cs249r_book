schema_version: 1
id: edge-0432
title: The Stereo Vision PCIe Bottleneck
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer on an autonomous driving team. Your vehicle's stereo vision system,
  which uses two GPUs connected via PCIe to process left and right camera feeds for depth perception,
  is missing its 33ms end-to-end latency target. GPU profiles show high compute utilization but also a
  significant multi-millisecond stall labeled `P2P_Transfer`. The algorithm requires exchanging a 512x512x256
  FP16 feature map between the two GPUs every frame. Given the GPUs are on a PCIe Gen 4 bus, use your
  systems knowledge to diagnose the most likely bottleneck.
details:
  realistic_solution: The primary bottleneck is the PCIe bus being used for a latency-sensitive, high-bandwidth
    peer-to-peer (P2P) data transfer. The two GPUs must synchronize a large feature map, and the PCIe
    bus, despite its high theoretical bandwidth, introduces significant latency and overhead for P2P traffic
    compared to a dedicated interconnect. The calculation shows this single transfer consumes a massive
    portion of the frame's latency budget, leaving insufficient time for compute. The correct architectural
    solution is to either change the algorithm to drastically reduce the amount of data that needs to
    be exchanged (e.g., by communicating detections instead of full feature maps) or to select hardware
    with a unified memory architecture or a direct P2P interconnect.
  common_mistake: Blaming the compute (e.g., "the model is too big") or the CPU. While model optimization
    is always an option, the profiler is explicitly telling you that a data transfer (`P2P_Transfer`)
    is the major stall. Engineers often underestimate the latency cost of peer-to-peer traffic over a
    general-purpose bus like PCIe, which is not designed for the same low-latency, high-bandwidth communication
    as a dedicated interconnect like NVLink.
  napkin_math: 'Feature map size: 512 * 512 * 256 elements = 67.1 million elements. At FP16 (2 bytes/element),
    payload = 134.2 MB. PCIe Gen4 x16 bandwidth is ~32 GB/s. Theoretical minimum transfer time: 134.2
    MB / 32,000 MB/s = ~4.2 ms. Real-world PCIe overhead often doubles this to ~8-10 ms, eating nearly
    30% of the 33ms latency budget.'
