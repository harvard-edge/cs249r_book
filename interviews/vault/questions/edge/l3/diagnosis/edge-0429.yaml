title: The Perception Model's Performance Ceiling
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are an ML systems engineer on an autonomous driving team, responsible for deploying a new
  perception model onto a Jetson AGX Orin. The system has a strict thermal design power (TDP) limit of
  40W. The model must process a 30 FPS stream (33.3ms deadline per frame), but you are only achieving
  20 FPS (50ms per frame). Your profiler reports the following for a single inference:'
details:
  realistic_solution: The model is severely memory-bandwidth bound. The key is to calculate the model's
    Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The low AI means the GPU's
    compute cores spend most of their time idle, waiting for data to arrive from DRAM. This massive data
    movement is also energy-intensive, which is why the system is hitting its 40W power limit despite
    low compute utilization. The most effective optimizations will be those that reduce DRAM traffic,
    such as operator fusion (e.g., fusing Conv-BN-ReLU), quantization (e.g., from FP16 to INT8), or architectural
    changes that improve data reuse.
  common_mistake: Engineers often default to thinking the model is 'too big' or 'too slow' in terms of
    computation (FLOPs). They might suggest pruning layers or using a smaller backbone. While this reduces
    FLOPs, it often doesn't address the underlying ratio of compute to memory access, and can sometimes
    make the Arithmetic Intensity even worse, leading to negligible speedup.
  napkin_math: 'Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1342 Ops/Byte. If the model does 2 Trillion
    Ops and moves 4 GB of data, its Arithmetic Intensity (AI) = 2e12 / 4e9 = 500 Ops/Byte. Since 500 <
    1342, the model is memory-bandwidth bound. The compute cores are starving for data, wasting power
    on memory fetches instead of MACs.'
