schema_version: 1
id: edge-0012
title: The Jitter Bug
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your embedded ML system has a critical perception task that needs to run every 33ms. You observe
  that sometimes it completes in 30ms, and other times it takes 35ms. Why is this variation (jitter) problematic
  for a real-time control system, and how would you measure and mitigate it?
details:
  realistic_solution: "Jitter introduces non-determinism, which can destabilize control loops (e.g., a\
    \ robot arm overshooting due to delayed sensor feedback), cause data staleness in sensor fusion (e.g.,\
    \ IMU data arriving too late for camera frame alignment), or lead to missed deadlines for critical\
    \ actions.\n  **Measurement:** Use high-resolution timers (e.g., CPU cycle counters, hardware timers)\
    \ to timestamp task start and end times, then analyze the distribution of execution durations and\
    \ inter-arrival times. Tools like `ftrace` or dedicated RTOS trace analyzers can visualize this.\n\
    \  **Mitigation:**\n  1.  **RTOS:** Use a Real-Time Operating System (RTOS) with priority-based preemptive\
    \ scheduling to ensure high-priority tasks run predictably.\n  2.  **WCET Analysis:** Perform Worst-Case\
    \ Execution Time (WCET) analysis to understand the maximum possible duration of your task and design\
    \ the system with sufficient headroom.\n  3.  **Resource Contention:** Minimize contention for shared\
    \ resources (CPU, memory, peripherals) by using mutexes, semaphores, or dedicated resources.\n  4.\
    \  **Interrupt Latency:** Optimize interrupt service routines (ISRs) to be short and efficient to\
    \ reduce interrupt latency and preemption overhead.\n  5.  **Dedicated Cores:** On multi-core systems,\
    \ dedicate specific cores to real-time tasks and isolate them from non-real-time OS processes."
  common_mistake: '"It''s only a few milliseconds, so it''s probably fine." This overlooks the impact
    of non-deterministic behavior on tightly coupled control loops and sensor fusion.'
  napkin_math: If a control loop runs at 30Hz (33.3ms period) and has a deadline of 33ms, a jitter of
    +/- 5ms means the effective period can range from 28ms to 38ms. If the control system assumes a fixed
    33.3ms, this deviation can lead to instability. For a robot moving at 1 m/s, a 5ms delay means an
    uncompensated position error of 5mm.
