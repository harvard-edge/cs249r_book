id: edge-0423
title: The Federated Learning Power Tax
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML Systems Engineer at a smart security camera company. To improve privacy, your
  team is A/B testing a new, more accurate person detection model trained via Federated Learning (FL).
  Users in the FL test group are reporting noticeable battery degradation. Your task is to diagnose the
  energy impact.
details:
  realistic_solution: The correct approach is to calculate the incremental energy consumed per hour by
    an FL device compared to a control device. This difference, scaled across the entire fleet for a full
    year, gives the total additional cost.
  common_mistake: Engineers often make unit conversion errors between watt-seconds (Joules), watt-hours,
    and kilowatt-hours, leading to a cost estimate that is orders of magnitude wrong. Another common mistake
    is to only calculate the cost of either compute or networking, instead of the total active time. Finally,
    some may forget to subtract the idle power that would have been consumed anyway, slightly overestimating
    the cost.
  napkin_math: 'Standard model inference energy: 1W * 24h = 24 Wh/day. FL training adds active compute:
    5W for 2 hours/day = 10 Wh. Total FL energy = 24 + 10 = 34 Wh/day. The FL device consumes 10 Wh/day
    more (a ~41% increase). Over a year across 10,000 cameras, this is 10 Wh * 365 * 10,000 = 36.5 Megawatt-hours
    of extra energy consumed.'
