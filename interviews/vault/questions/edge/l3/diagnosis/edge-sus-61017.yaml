id: edge-sus-61017
title: NUMA-Aware Memory Allocation on Jetson Orin
topic: chiplet-architecture
status: published
provenance: imported
scenario: A vision model on Jetson Orin shows unexpected memory bandwidth bottlenecks despite the model
  fitting in LPDDR5. Explain how Orin's CPU-GPU unified memory architecture differs from MI300X and how
  NUMA effects manifest.
details:
  realistic_solution: Orin's unified memory means CPU cache coherency traffic, GPU texture sampling, and
    DLA compute all share a single LPDDR5 bus. Unlike MI300X which has dedicated HBM per XCD, Orin has
    no memory-side exclusivity. Pin DL workloads to specific memory channels (odd/even interleaving) and
    ensure CPU OS activities are scheduled away from inference-critical windows to prevent bandwidth contention.
  common_mistake: Treating Jetson Orin as a pure GPU with dedicated DRAM. Orin shares 64 GB LPDDR5 between
    12-core ARM CPU, Ampere GPU, and deep learning accelerators — all competing for the same ~204 GB/s
    bandwidth.
  napkin_math: 'Orin LPDDR5 BW: 204 GB/s total. GPU peak demand: ~120 GB/s for Ampere. DLA demand: ~30
    GB/s. CPU OS baseline: ~20 GB/s. Total: 170 GB/s out of 204 GB/s = 83% utilization baseline. Any additional
    CPU work during inference can push past 100% causing queuing delay.'
