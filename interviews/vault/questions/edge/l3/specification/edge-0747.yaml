schema_version: 1
id: edge-0747
title: The Bricked OTA Update
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your fleet of 200 NXP i.MX 8M Plus devices monitors crop health on farms across Iowa. You push
  a 45 MB model update over 4G/LTE. 30 devices (15%) lose connectivity mid-update and are now bricked
  with a partially written model file. Why are ML model updates significantly more dangerous than generic
  firmware updates in constrained environments, and how does the model's size dictate your partition architecture?
details:
  realistic_solution: ML models are inherently dangerous to update because of their size. A typical embedded
    firmware binary is 1–5 MB. A quantized mobile vision model is 40–100 MB. Over a spotty rural 4G connection,
    downloading 45 MB takes 10–20× longer than a firmware update, exposing a massively larger time window
    where a power loss or connection drop will cause a partial write. If you use a naive "download and
    overwrite" approach, a partial write corrupts the `.tflite` file, causing the inference engine to
    crash on load, taking down the main application loop.
  common_mistake: '"Re-send the update." The device''s inference pipeline is already broken — it may not
    be able to report status or accept commands if the update corrupted the application partition.'
  napkin_math: 'Model size: 45 MB. 4G bandwidth (rural Iowa): ~5 Mbps = 0.625 MB/s. Full download: 72
    seconds. Firmware size: 3 MB → 4.8 seconds. Probability of 4G dropout per second (rural): ~0.1%. P(dropout
    in 4.8s) = 1 - 0.999^4.8 ≈ 0.5%. P(dropout in 72s) = 1 - 0.999^72 ≈ 6.9%. The ML model is 14× more
    likely to fail during transfer simply due to its size. With a 200-device fleet, a 6.9% failure rate
    means 14 bricked devices per update. At $150 per truck roll to manually re-flash, each model update
    costs $2,100 in maintenance. A/B partitioning eliminates this cost entirely.'
