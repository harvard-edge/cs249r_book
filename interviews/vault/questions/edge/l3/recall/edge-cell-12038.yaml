id: edge-cell-12038
title: 'MLOps Lifecycle: Size Edge Model Registry Storage for 3 Versions Retention'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'An edge MLOps team maintains a model registry for 500 Hailo-8 devices (26 TOPS, 2.5W). Each
  model (INT8 detection engine) is 80MB. The registry keeps last 5 versions. Devices have 4GB eMMC storage.
  Size: cloud registry storage cost, per-device storage impact, and monthly bandwidth for weekly updates.'
details:
  realistic_solution: 'Cloud registry: 5 × 80MB = 400MB. $0.009/month. Per-device: 2 × 80MB (current +
    rollback) = 160MB on 4GB eMMC = 4%. Weekly update bandwidth: 500 × 80MB = 40GB/week × $0.09/GB = $3.60/week
    = $14.40/month. eMMC endurance: 80MB/week × 52 = 4.16GB/year writes. TBW limit for 4GB eMMC (MLC):
    ~100GB. Lifetime: 100/4.16 = 24 years. No concern.'
  common_mistake: 'Not accounting for eMMC write endurance: frequent OTA updates (weekly 80MB writes)
    degrade eMMC endurance on low-cost edge devices. At 3000 P/E cycles and 4GB eMMC: 80MB write/week
    × 52 weeks = 4.16GB/year. At 3000 cycles × 4GB = 12TB lifetime, this is fine.'
  napkin_math: 'Cloud: 5×80MB=400MB. $0.023×0.4=<$0.01/month. Per-device: 160MB/4GB=4%. Bandwidth: 500×80MB=40GB/week=160GB/month.
    $0.09×160=$14.40/month. eMMC writes: 80MB/week. MLC eMMC TBW: typically 100GB. 100GB/80MB per week
    = 1250 weeks = 24 years. ✓'
