id: edge-0463
title: 'The Edge Roofline Dilemma: CNN vs. ViT'
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're an ML systems engineer on a self-driving car team, and your perception module runs on
  a Jetson AGX Orin. Your current pedestrian detector is a highly-optimized, depthwise-separable CNN that
  meets the hard real-time 30 FPS (33ms) deadline. The product team wants to replace it with a new Vision
  Transformer (ViT) that shows 5% higher accuracy on rare, occluded pedestrian cases.
details:
  realistic_solution: The correct approach is to use the Roofline model to determine if each model is
    compute-bound or memory-bound.
  common_mistake: Engineers often fall into the 'FLOPs fallacy', assuming that if a model has '2x' the
    operations, it will simply be '2x' slower. This ignores the Roofline model and the critical role of
    arithmetic intensity. A model can have only 1.8x the FLOPs but be nearly 5x slower if its architecture
    crosses the hardware's 'Ridge Point' and becomes memory-bound. This is a common trap when migrating
    from convolution-heavy (high AI) to attention-heavy (low AI) architectures on edge devices.
  napkin_math: '1. **Find Hardware Ridge Point (the tipping point):** Jetson AGX Orin: 275 TOPS INT8 /
    204.8 GB/s = 1,343 Ops/Byte. 2. **CNN Arithmetic Intensity:** Depthwise-separable CNN, e.g., 1.5 GOps,
    5 MB memory access → AI = 1.5e9/5e6 = 300 Ops/Byte (memory-bound but manageable). 3. **ViT Arithmetic
    Intensity:** Self-attention with seq_len=196 patches, head_dim=64, 12 heads → QK^T matrix = 196^2×64×2
    ≈ 4.9 MOps but memory = 2×196×64×2 bytes = 50 KB → AI ≈ 98 Ops/Byte (severely memory-bound). The ViT''s
    self-attention has 3× lower AI than the CNN, explaining the deadline miss.'
