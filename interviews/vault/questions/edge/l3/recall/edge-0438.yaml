id: edge-0438
title: The Transformer-CNN Resolution Trap
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are an ML Systems Engineer on the perception team for an autonomous truck company. Your
  team has just upgraded the front-facing cameras from 1280x720 to 1920x1080 to improve long-range object
  detection. Your current model, a Vision Transformer (ViT), achieved 25ms latency on the old resolution,
  comfortably meeting the 33ms (30 FPS) hard real-time deadline on a Jetson AGX Orin. After recompiling
  for the new, higher resolution, you are shocked to see latency jump to over 125ms. You must solve this
  problem and get the pipeline back under the 33ms deadline. What is the most effective first step?
details:
  realistic_solution: The fundamental issue is the computational complexity of the Vision Transformer.
    The self-attention mechanism scales quadratically with the number of input patches, O(N²). Since the
    number of patches is proportional to the image resolution, a 2.25x increase in pixels results in a
    ~5x increase in compute and latency. The correct approach is to switch to an architecture whose cost
    scales more gracefully. A modern, efficient CNN using depthwise separable convolutions (like EfficientNet
    or MobileNet-family models) scales linearly with resolution, O(N). While this will still increase
    latency, it provides a computationally feasible starting point which can then be further optimized
    to meet the strict 33ms budget.
  common_mistake: Engineers accustomed to cloud-scale resources often underestimate how architectural
    choices interact with hardware physics on the edge. A common mistake is to assume the ViT architecture
    is portable and to try minor fixes like quantization or downsampling. Downsampling negates the entire
    purpose of the expensive camera upgrade, while simple quantization cannot close the massive performance
    gap created by the ViT's quadratic scaling.
  napkin_math: 1. **Calculate Resolution Increase:** The number of pixels increases from (1280 * 720)
    = 921,600 to (1920 * 1080) = 2,073,600. The scaling factor is 2,073,600 / 921,600 ≈ 2.25x.
