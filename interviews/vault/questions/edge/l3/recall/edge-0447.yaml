title: The Self-Driving Stall
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are a Senior ML Systems Engineer on an autonomous driving team, tasked with optimizing
  a perception model on a Jetson AGX Orin. The hard real-time deadline is 20ms (to hit 50 FPS). Profiling
  shows your model currently takes 24.4ms. The profiler gives you the following data for a single inference:'
details:
  realistic_solution: The model is **memory-bound**. Its performance is limited by the memory bandwidth
    of the Jetson Orin, not its peak compute capability. To solve this, the team must focus on reducing
    the amount of data moved from DRAM or increasing the amount of work done per byte. The most effective
    strategies would be operator fusion (to reduce reads/writes of intermediate tensors) or applying more
    aggressive quantization/compression (to reduce the size of weights and activations). Simply reducing
    the operation count without addressing the data movement will not fix the bottleneck.
  common_mistake: Incorrectly diagnosing the model as compute-bound because the profiler shows low TOPS.
    Engineers often assume low utilization means the model isn't demanding enough, when in reality the
    chip is starving, waiting for data from the much slower system memory.
  napkin_math: '1. **Find the device''s Ridge Point:** The Ridge Point separates memory-bound from compute-bound
    workloads. It is the ratio of peak compute to peak memory bandwidth. Jetson AGX Orin: 275 TOPS INT8
    / 204.8 GB/s = 1,343 Ops/Byte. 2. **Calculate model''s Arithmetic Intensity:** Given profiler data,
    compute AI = GOps / GB_accessed. If AI < 1,343, the model is memory-bound; otherwise compute-bound.
    3. **Interpret the roofline:** A memory-bound model''s throughput ceiling = AI × memory bandwidth,
    not peak compute.'
