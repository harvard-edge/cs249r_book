id: edge-fill-05078
title: Thermal Runaway Prevention for Sustained AI Workload on Hailo-8
topic: thermal-management
status: published
provenance: imported
scenario: 'A Hailo-8 module (26 TOPS, 2.5W TDP) is embedded in a smart camera running continuous vehicle
  detection at 30fps outdoors in an enclosure. Ambient temperature reaches 55°C in summer. Hailo-8 max
  junction temp: 105°C. The PCB heat spreader has θ_ja = 20°C/W. Calculate maximum sustainable power and
  if throttling is needed.'
details:
  realistic_solution: 'θ_ja = 20°C/W (junction to ambient through PCB). Max allowable ΔT = 105 - 55 =
    50°C. Max sustainable power: 50°C / 20°C/W = 2.5W. Hailo-8 TDP: exactly 2.5W. Margin: zero! At exactly
    2.5W load, junction reaches exactly 105°C at 55°C ambient. Any transient spike above 2.5W will exceed
    junction limit. Required action: (1) De-rate Hailo-8 to 2.0W (throttle to 20 TOPS). (2) Add heatsink
    to reduce θ_ja to 14°C/W: max power = 50/14 = 3.57W — sufficient headroom. (3) Duty cycle inference:
    2.5W×100% → 2W average by throttling to 24fps instead of 30fps. Recommended: small heatsink + duty
    cycling.'
  common_mistake: Assuming the TDP spec guarantees safe operation at any ambient temperature; TDP is specified
    at a reference ambient, and higher ambients reduce the thermal headroom.
  napkin_math: 'Max ΔT = 105-55 = 50°C. Max P = 50/20 = 2.5W = exactly TDP. Zero thermal margin! With
    5mm heatsink (θ_ja → 10°C/W): max P = 50/10 = 5W — 2× Hailo-8 TDP. Easy. Without heatsink: throttle
    to 2.0W (80% load) at 55°C ambient.'
