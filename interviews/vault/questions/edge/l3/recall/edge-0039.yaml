id: edge-0039
title: The Foggy Lens Confidence Collapse
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your Google Coral-based security camera runs a MobileNet-V2 person detector at 15 FPS. After
  a cold night, the lens fogs up at dawn. The model doesn't crash — it keeps running — but the false negative
  rate jumps from 2% to 65%. The operations team doesn't notice for 3 hours because the system reports
  'healthy.' How does lens fog cause this failure, and how do you detect it automatically?
details:
  realistic_solution: Fog creates a uniform low-contrast haze across the image. The model's convolutional
    filters rely on edge gradients to detect people — fog suppresses gradients below the activation thresholds
    of early layers. The model doesn't output garbage; it outputs high-confidence "no detection" because
    the foggy image genuinely looks like an empty scene to the network. The softmax outputs are well-calibrated
    — just wrong.
  common_mistake: '"Add a heater to the lens." This addresses the symptom but not the detection gap. The
    real failure is that the system ran blind for 3 hours without alerting anyone.'
  napkin_math: 'Laplacian variance: sharp image ~800, light fog ~200, heavy fog ~30. Detection threshold:
    variance < 100 triggers alert. Heater power: 1W × 2h = 2Wh/day. Humidity sensor: BME280, $2, I²C,
    1μA sleep current. False-blind window without monitoring: up to 8 hours (fog forms at dawn, clears
    by afternoon). With monitoring: alert within 5 minutes. Missed detections in 3-hour blind window:
    at 1 person/minute average traffic, ~180 missed events.'
