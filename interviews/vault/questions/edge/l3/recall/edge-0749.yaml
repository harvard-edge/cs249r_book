id: edge-0749
title: The Edge Data Collection Funnel
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You're building a data flywheel for an agricultural pest detection system. 2,000 Raspberry Pi
  4B devices (4 GB RAM, Coral USB TPU) photograph crops every 10 minutes. Each image is 3 MB. You need
  to collect training data from the fleet to improve the model, but the devices have 32 GB SD cards and
  4G connectivity with a 2 GB/month data plan. How do you decide which images to upload?
details:
  realistic_solution: 'Implement **on-device data triage** — a lightweight scoring function that selects
    the most valuable images for upload:'
  common_mistake: '"Upload all images — 3 MB × 144 images/day = 432 MB/day, which fits in 2 GB over 4-5
    days." This ignores that you need bandwidth for model updates, telemetry, and system management —
    you can''t dedicate 100% to data upload.'
  napkin_math: 'Daily captures: 144 images × 3 MB = 432 MB/day. Local storage: 32 GB SD - 8 GB OS - 1
    GB model = 23 GB free. Retention: 23 GB / 432 MB = 53 days (but 7-day window is sufficient). Upload
    budget: 17 images/day × 3 MB = 51 MB/day × 30 = 1.53 GB/month. Fleet-wide monthly upload: 500 images
    × 2,000 devices = 1M curated images/month — far more valuable than 1M random images for active learning.'
