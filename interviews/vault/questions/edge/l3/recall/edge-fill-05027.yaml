id: edge-fill-05027
title: Power Budget Allocation for Multi-Model Pipeline on Jetson Orin 60W
topic: power-budgeting
status: published
provenance: imported
scenario: 'A Jetson Orin NX operates in 60W MODE with the following pipeline: detection (GPU, 20W), tracking
  (CPU, 8W), segmentation (GPU, 25W), postprocessing (CPU, 4W). System overhead (DRAM, storage, networking)
  uses 10W. Calculate total power and determine if DLA-offloading detection can fit within a 45W TDP envelope.'
details:
  realistic_solution: 'Sequential pipeline: GPU handles detection and segmentation in sequence, not simultaneously.
    Peak GPU power: max(20W, 25W) = 25W. CPU tasks may overlap with GPU. Concurrent GPU+CPU scenario:
    GPU 25W + CPU 8W + system 10W = 43W < 45W. Adding DLA for detection: DLA ~5W vs GPU 20W for detection.
    New pipeline: DLA detection (5W) || GPU segmentation (25W). CPU tracking (8W) and postprocessing (4W)
    run concurrently. Peak: DLA 5W + GPU 25W + CPU 8W + CPU 4W + system 10W = 52W > 45W. Solution: reduce
    GPU segmentation to power-cap mode (18W): 5+18+8+4+10 = 45W exactly.'
  common_mistake: Summing peak power for all components simultaneously; in a sequential pipeline, GPU
    and CPU may not both be at peak simultaneously, but DRAM and system overhead are always present.
  napkin_math: 'Baseline: GPU detection 20W + GPU segmentation 25W + CPU tracking 8W + CPU postprocessing
    4W + system 10W = 67W > 45W TDP. With DLA: DLA detection 5W + GPU segmentation 25W + CPU tracking
    8W + CPU postprocessing 4W + system 10W = 52W > 45W. Power cap GPU segmentation to 18W: 5+18+8+4+10=45W
    exactly.'
