id: edge-fill-05017
title: LPDDR5 vs On-Chip SRAM Trade-offs on Jetson Orin for Real-Time Inference
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Jetson Orin NX has 32GB LPDDR5 at 68 GB/s and ~4MB L2 cache on the Ampere GPU. A real-time object
  detection model (YOLOv8-m, 25M params, 79 FLOPs/image) needs to process 30fps at 1280×1280. Analyze
  the memory access pattern and identify the binding constraint.
details:
  realistic_solution: 'Total compute: 79 GFLOP/image × 30fps = 2.37 TFLOPS. Jetson Orin INT8: 275 TOPS
    — compute is fine. Memory: model weights INT8 = 25MB, fits in 32GB easily. Per-frame bandwidth: input
    1280×1280×3×1B = 4.9MB. Early conv layers: stride-1, high activation volume → bandwidth intensive.
    L2 cache 4MB: fits ~1 intermediate feature map. Critical path: early layers generate 1280×1280×32
    = 52MB activations — must spill to LPDDR5. Bandwidth budget: 52MB × 30fps = 1.56 GB/s used. Peak:
    68 GB/s. Model weights loaded once per frame: 25MB × 30fps = 750 MB/s. Total: ~2.3 GB/s << 68 GB/s.
    Not bandwidth-bound — compute-bound for later layers.'
  common_mistake: Calculating peak bandwidth utilization without accounting for the memory access pattern
    across layers; early layers of YOLO are bandwidth-bound while later layers are compute-bound.
  napkin_math: 'Compute: 79 GFLOP × 30fps = 2.37 TFLOPS << 275 TOPS. Bandwidth: activations 52MB + weights
    25MB = 77MB/frame × 30fps = 2.3 GB/s << 68 GB/s. Both within budget — model fits comfortably on Jetson
    Orin NX.'
