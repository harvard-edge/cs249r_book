id: edge-0413
title: The Kernel Launch Storm
topic: kernel-fusion
status: published
provenance: imported
scenario: You are tasked with optimizing a CNN-based object detection model on a Jetson AGX Orin. The
  model is fully quantized to INT8. Your profiler reports that while the GPU is constantly active, end-to-end
  latency is poor, and overall TOPS utilization is less than 10% of the Orin's 275 TOPS peak. A deeper
  look reveals that the execution graph consists of hundreds of sequential, very short-duration kernel
  calls (e.g., Conv, Add, ReLU), each taking 20-50µs. What is the most effective first step to solve this
  performance bottleneck?
details:
  realistic_solution: The primary bottleneck is the combination of kernel launch overhead and memory bandwidth
    limitations from repeatedly reading/writing intermediate tensors to/from LPDDR5 DRAM for each separate
    operation. Even though each operation is fast, the cumulative overhead is massive. The most effective
    solution is to apply operator fusion. By fusing sequential operations like 'Conv -> Add -> ReLU' into
    a single, larger kernel, you launch one kernel instead of three, and the intermediate data stays hot
    in the GPU's much faster on-chip SRAM/registers, drastically reducing DRAM traffic and launch overhead.
  common_mistake: Engineers often see low TOPS utilization and immediately blame the model architecture
    or batch size, thinking the GPU isn't being 'fed' enough math. They fail to account for the overhead
    of launching a kernel and moving data from DRAM for each of those tiny operations, which can dominate
    the actual compute time.
  napkin_math: Let's analyze the overhead for one small intermediate tensor of 4MB (e.g., a 256x256x64
    INT8 tensor).
