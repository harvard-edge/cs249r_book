id: edge-fill-05002
title: Roofline Analysis for CNN Inference on Jetson Orin
topic: roofline-analysis
status: published
provenance: imported
scenario: You deploy ResNet-50 on Jetson Orin NX (275 TOPS INT8, LPDDR5 at 68 GB/s). The first conv layer
  has 3×224×224 input, 64 filters of 7×7. You measure 18 TOPS throughput. Plot this on the roofline and
  identify which axis is limiting.
details:
  realistic_solution: Conv1 FLOPs = 2*64*3*7*7*224*224 ≈ 236M FLOPs. Memory = (3*224*224 + 64*7*7*3 +
    64*224*224)*1 byte ≈ 150KB + 37KB + 3.2MB ≈ 3.4MB. AI = 236M FLOPs / (150KB input + 9KB weights +
    803KB output at 112×112 stride=2) = 236M/962KB ≈ 245 FLOPs/byte. Ridge = 275e12/68e9 ≈ 4044 FLOPs/byte.
    This layer is memory-bound; theoretical max = 68 GB/s × 245 FLOPs/byte ≈ 16.7 TOPS. Achieved 18 TOPS
    suggests input reuse is happening but weights are frequently reloaded.
  common_mistake: Using peak TOPS without accounting for memory bandwidth limits; early conv layers are
    notoriously memory-bandwidth-limited due to low channel counts.
  napkin_math: 'Ridge = 275 TOPS / 68 GB/s = 4044 FLOPs/byte. Conv1 AI ≈ 245 FLOPs/byte (output is 112×112
    at stride=2: 236M FLOPs / 963KB = 245 FLOPs/byte) — still 16× below ridge. Memory-bound ceiling =
    68 GB/s × 245 ≈ 16.7 TOPS. Measured 18 TOPS is close to this ceiling, confirming memory-bound operation.'
