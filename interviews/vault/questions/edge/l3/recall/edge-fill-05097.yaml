schema_version: 1
id: edge-fill-05097
title: Multi-Frame Batch Accumulation for Throughput on Jetson Orin vs Latency
topic: batching-strategies
status: published
provenance: imported
scenario: 'A Jetson Orin NX processes security camera frames with YOLOv8-s (11.2M params, 28.6 GFLOPs).
  Single frame: 8ms. Batching 4 frames: 12ms total (3ms/frame). Batching 8 frames: 18ms total (2.25ms/frame).
  The system requires alerting within 200ms of an event. Determine optimal batch size for throughput vs
  latency requirements.'
details:
  realistic_solution: 'At 30fps camera: frame arrives every 33ms. Latency analysis: batch=1: collect 0ms
    + infer 8ms = 8ms total latency, 125fps throughput. Batch=4: must wait for 4 frames = 3×33ms=99ms
    collection + 12ms inference = 111ms latency, 333fps throughput. Batch=8: wait for 8 frames = 7×33ms=231ms
    + 18ms = 249ms > 200ms SLA! Batch=4 latency 111ms < 200ms SLA: passes. Batch=4 gives 2.7× throughput
    improvement (333fps vs 125fps) while meeting 200ms SLA (111ms = 55.5% of budget). Batch=8 violates
    SLA. Optimal: batch=4 (333 effective fps, 111ms worst-case latency). Note: for offline/non-real-time
    analysis, batch=8 is fine.'
  common_mistake: Choosing the batch size with the best throughput (fps) without considering that batch
    processing introduces latency equal to the batch collection time plus inference time.
  napkin_math: 'Frame interval: 33ms. Batch=1: 0+8=8ms latency, 125fps. Batch=4: 3×33+12=111ms latency,
    333fps. Batch=8: 7×33+18=249ms > 200ms SLA. Batch=4 is optimal: meets SLA, 2.7× throughput gain, 55.5%
    of SLA budget used (111ms/200ms).'
