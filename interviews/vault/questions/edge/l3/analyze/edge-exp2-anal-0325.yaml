schema_version: 1
id: edge-exp2-anal-0325
title: Edge TPU Quantization and Bottleneck Analysis
topic: model-size-estimation
status: published
provenance: imported
scenario: 'You are deploying an 8 million parameter computer vision model on a Google Coral Edge TPU (Specs:
  4 TOPS INT8, 2W, USB form factor, strict INT8 operator support). When the model is in its original FP32
  format, the Edge TPU compiler rejects it, forcing execution on the host CPU. After quantizing the model
  to INT8, it compiles and runs on the TPU, but profiling reveals that the system is heavily bottlenecked
  by the USB connection rather than the 4 TOPS compute. Explain why the FP32 model was rejected by the
  hardware, and calculate the model''s memory footprint before and after quantization to explain why USB
  bandwidth dominates the latency.'
details:
  realistic_solution: The Coral Edge TPU's ALUs are physically designed exclusively for 8-bit integer
    arithmetic to achieve high efficiency (4 TOPS at only 2W); it has no silicon for floating-point math,
    meaning unsupported FP32 operators must fall back to the host CPU. Quantizing to INT8 reduces the
    parameter precision from 32 bits to 8 bits, cutting the memory footprint by exactly 4x. However, because
    the TPU is so fast, the time taken to stream input frames and retrieve outputs over the limited USB
    bandwidth vastly outweighs the actual INT8 execution time, resulting in an I/O-bound system.
  common_mistake: Candidates often assume that hardware accelerators can natively emulate FP32 or automatically
    downcast it at runtime. They also frequently overlook the data transfer costs of the USB form factor,
    focusing solely on the impressive 4 TOPS compute specification.
  napkin_math: 'FP32 Model Size: 8,000,000 parameters * 4 bytes/parameter = 32 MB. INT8 Model Size: 8,000,000
    parameters * 1 byte/parameter = 8 MB. Assuming a USB 2.0 connection (roughly 40 MB/s real-world),
    transferring the 8 MB model per frame takes 8 MB / 40 MB/s = 0.2 seconds (200 ms). In contrast, computing
    4 TOPS (4,000,000,000,000 ops/sec) for the INT8 model takes a fraction of a millisecond. The 200ms
    transfer completely eclipses the compute time, proving the system is severely I/O bound.'
