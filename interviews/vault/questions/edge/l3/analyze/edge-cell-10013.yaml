id: edge-cell-10013
title: Analyzing Activation Memory Footprint for MobileNetV3 on Jetson Orin
topic: activation-memory
status: published
provenance: imported
scenario: You are deploying MobileNetV3-Large for real-time image classification on a Jetson Orin (32
  GB LPDDR5 shared CPU/GPU memory, 275 TOPS). At inference time with batch size 1 and input resolution
  224×224, you need to analyze the peak activation memory during the forward pass to understand whether
  there is headroom for concurrent CV pipeline tasks using the same LPDDR5 pool.
details:
  realistic_solution: 'The peak activation tensor occurs at the first expansion layer: input 224×224×16,
    expanded to 224×224×16 (expansion factor 1, then filters increase). Worst case at a layer with 112×112
    spatial resolution and 96 channels: tensor = 112×112×96×4 B = 4.6 MB. With TensorRT, intermediate
    buffers are reused via memory planning, so peak is bounded by the two largest non-overlapping tensors
    ≈ 9 MB. Total inference footprint including activations + weights ≈ 20 MB, leaving the vast majority
    of 32 GB for other pipeline tasks.'
  common_mistake: Assuming activation memory scales linearly with model parameter count. MobileNetV3-Large
    has only 5.4M parameters (~10 MB in fp32), but peak activation memory during the forward pass can
    be several times larger due to large intermediate feature maps in early depthwise-separable convolutional
    layers.
  napkin_math: 'MobileNetV3 weights: 5.4M × 4 B = 21.6 MB (fp32), 10.8 MB (fp16). Peak activation (worst
    layer): 112×112×96×4 B = 4.6 MB. TensorRT workspace: typically 256 MB default. Total GPU memory for
    inference: ≈ 300 MB including TensorRT workspace. Remaining for concurrent tasks: 32 GB - 300 MB ≈
    31.7 GB.'
