schema_version: 1
id: edge-exp2-anal-0307
title: Energy Cost Analysis of Memory vs Compute on Jetson Orin
topic: energy-per-operation
status: published
provenance: imported
scenario: You are optimizing a transformer model for an NVIDIA Jetson Orin, which features an Ampere GPU
  + DLA accelerator capable of 275 TOPS INT8 at a 60W TDP. Profiling reveals that Layer A (a dense compute
  layer) achieves 80% utilization of the TOPS but consumes only 20W, while Layer B (a memory-bound attention
  layer) achieves only 10% TOPS utilization but spikes system power consumption to 45W. Layer B requires
  constant off-chip data movement from the 32 GB LPDDR5 memory. Given the Horowitz energy table principles,
  explain this energy behavior.
details:
  realistic_solution: The candidate should apply the principle that off-chip memory access (LPDDR5) is
    significantly more energy-expensive than ALUs performing INT8 compute. Layer A keeps data on-chip
    (SRAM/registers) and runs efficiently. Layer B starves the compute units while thrashing the memory
    bus. The massive energy spike in Layer B is driven by the PHY and controller overhead of constantly
    moving data on and off the 32 GB LPDDR5.
  common_mistake: Candidates often assume that high compute utilization (TOPS) directly correlates with
    the highest power draw, neglecting the fact that data movement typically costs orders of magnitude
    more energy than mathematical operations.
  napkin_math: 'Let''s apply typical energy values: 1 INT8 MAC costs ~0.1 pJ, while a 32-bit LPDDR5 memory
    access costs ~100 pJ (1000x more). If Layer B performs 1 billion INT8 ops but requires moving 1 GB
    of data from LPDDR5, the compute energy is 10^9 * 0.1 pJ = 0.1 mJ. The memory energy is (10^9 bytes
    / 4 bytes per access) * 100 pJ = 25 mJ. The energy cost of memory access is 250x the cost of compute,
    explaining the 45W power spike despite low TOPS utilization.'
