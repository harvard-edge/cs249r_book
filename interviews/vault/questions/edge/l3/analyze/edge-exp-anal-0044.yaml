schema_version: 1
id: edge-exp-anal-0044
title: Hailo-8 Data Streaming Bottleneck Analysis
topic: systolic-dataflow
status: published
provenance: imported
scenario: We deployed a vision model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). The device
  has no local DRAM and streams data directly from host memory via a 4 GB/s PCIe link. A specific convolutional
  layer requires 10 GOPS of compute, takes 2 MB of input activations, 1 MB of weights, and produces 2
  MB of output activations. When running this layer, we observe that the accelerator achieves only a fraction
  of its peak compute. Calculate the achieved TOPS for this layer and explain why the architecture is
  underutilized.
details:
  realistic_solution: The accelerator is entirely I/O bound because it lacks local DRAM and must stream
    all inputs and outputs over the host PCIe link. Even if the internal dataflow is perfectly optimized,
    the 4 GB/s connection cannot feed data fast enough to sustain the 26 TOPS engine given this layer's
    low arithmetic intensity, leading to severe compute starvation.
  common_mistake: Candidates often try to calculate internal SRAM bandwidth or analyze specific systolic
    array dataflows (like weight-stationary) instead of recognizing the external I/O bottleneck. They
    may also incorrectly add compute and I/O times together rather than assuming they overlap.
  napkin_math: Total I/O per inference = 2 MB (input) + 1 MB (weights) + 2 MB (output) = 5 MB. I/O time
    = 5 MB / 4000 MB/s = 1.25 ms. Minimum compute time at peak = 10 GOPS / 26,000 GOPS = 0.38 ms. Since
    I/O time (1.25 ms) is much greater than compute time (0.38 ms), the pipeline is bottlenecked by the
    PCIe stream. Achieved compute = 10 GOPS / 1.25 ms = 8 TOPS (~31% utilization of the 26 TOPS peak).
