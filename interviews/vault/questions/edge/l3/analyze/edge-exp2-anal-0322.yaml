schema_version: 1
id: edge-exp2-anal-0322
title: Hailo-8 CI/CD Pipeline Bandwidth Bottleneck
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are investigating a performance anomaly flagged by your ML CI/CD pipeline for a model deployed
  on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The hardware-in-the-loop pipeline reports
  that while the accelerator's compute utilization is under 2%, the system is capped at 50 frames per
  second. The model processes 4MB uncompressed input frames per inference. Given the Hailo-8's architecture
  that streams directly from host memory, analyze why the MLOps pipeline observes this behavior and explain
  the underlying hardware bottleneck.
details:
  realistic_solution: The MLOps pipeline accurately reflects a deeply memory-bound system where the Hailo-8
    dataflow accelerator is starving for data. Because there is no local DRAM to cache inputs or intermediate
    tensors, every single inference requires streaming 4MB across the host interface. The bottleneck is
    the host memory or PCIe bandwidth, not the accelerator's compute. To resolve this, preprocessing steps
    like resizing should run on the host CPU to reduce the payload size before streaming to the Hailo-8.
  common_mistake: Candidates often assume the model was compiled inefficiently or that INT8 quantization
    operations are causing stalls, focusing solely on the 26 TOPS compute spec. They frequently overlook
    the 'no local DRAM' constraint and fail to recognize that host-to-device streaming creates a severe
    I/O bandwidth bottleneck.
  napkin_math: 'Compute capacity: 26 TOPS (26,000 GOPs). Assuming a standard 8 GOPs edge model, theoretical
    compute limit = 26,000 / 8 = 3,250 FPS. At the observed 50 FPS, compute required = 50 * 8 = 400 GOPs
    (400 / 26,000 = ~1.5% compute utilization). Memory bandwidth required at 50 FPS = 50 FPS * 4 MB/frame
    = 200 MB/s. If the host connection (e.g., PCIe Gen2 x1 or USB 3.0) is capped at ~200-250 MB/s effective
    throughput, the accelerator will be permanently starved for data, capping performance exactly at 50
    FPS.'
