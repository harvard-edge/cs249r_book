id: edge-exp2-anal-0315
title: Distillation Arithmetic Intensity on Hailo-8
topic: knowledge-distillation
status: published
provenance: imported
scenario: Your team is deploying an object detector on a Hailo-8 accelerator (26 TOPS INT8, 2.5W), a dataflow
  architecture with no local DRAM that streams data from host memory over a 4 GB/s PCIe link. You used
  knowledge distillation to train a compact student model that requires only 1 GOPS per inference with
  an arithmetic intensity of 10 OPS/byte. Your baseline is a pruned teacher model requiring 5 GOPS per
  inference with an arithmetic intensity of 100 OPS/byte. Explain why the distilled student model, despite
  having 5x fewer operations, exhibits higher latency on this specific hardware.
details:
  realistic_solution: On a dataflow accelerator like the Hailo-8, which relies on streaming from host
    memory, performance is strictly bottlenecked by the PCIe bandwidth if the model has low arithmetic
    intensity. The distilled student model starves the compute units because it cannot fetch weights and
    activations fast enough. The computationally heavier pruned model better utilizes the 26 TOPS compute
    capacity because its higher arithmetic intensity requires less data streaming per operation, avoiding
    the memory wall.
  common_mistake: Candidates often assume that reducing total operations (GOPS) through distillation automatically
    reduces latency. They fail to consider the arithmetic intensity and the host-to-accelerator memory
    bandwidth bottleneck inherent to architectures without local DRAM.
  napkin_math: 'Distilled Student Memory Bound: 1 GOPS / 10 OPS/byte = 0.1 GB/frame. Max FPS = 4 GB/s
    / 0.1 GB/frame = 40 FPS. Pruned Teacher Memory Bound: 5 GOPS / 100 OPS/byte = 0.05 GB/frame. Max FPS
    = 4 GB/s / 0.05 GB/frame = 80 FPS. Both models are memory-bound (Compute bounds are 26,000 FPS and
    5,200 FPS respectively), but the distilled model is 2x slower due to lower arithmetic intensity.'
