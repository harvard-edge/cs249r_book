id: edge-exp2-anal-0326
title: Power Throttling Stragglers on Cloud AI 100
topic: monitoring-observability
status: published
provenance: imported
scenario: You are monitoring telemetry for an on-premise deployment using Qualcomm Cloud AI 100 accelerators
  (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). Your production dashboard shows that while average inference
  latency is stable, P99 tail latency periodically spikes by 25%. System logs show memory utilization
  is stable at 20 GB, and memory bandwidth is well below limits. However, the accelerator consistently
  hits its 75W power limit just before the latency spikes occur. Explain why these latency stragglers
  appear and calculate the expected latency impact if the hardware throttles compute performance by 20%
  to maintain the 75W power envelope.
details:
  realistic_solution: The latency spikes are caused by dynamic voltage and frequency scaling (DVFS) triggered
    when the accelerator hits its 75W TDP limit. Under sustained heavy load, the hardware throttles its
    clock speed to stay within power constraints, reducing effective compute throughput. Requests processed
    during this throttled period take longer to complete, directly resulting in P99 stragglers. Observability
    dashboards must alert on power throttling events, not just average utilization.
  common_mistake: Candidates typically attribute tail latency spikes to garbage collection, memory bandwidth
    saturation, or OS context switching without analyzing the provided power metrics. They often suggest
    profiling memory (LPDDR4x) instead of recognizing the correlation between the 75W TDP limit and thermal/power
    throttling.
  napkin_math: 'Ideal processing time for a 100-TOP INT8 workload at peak performance: 100 TOPs / 400
    TOPS = 0.25 seconds. When hitting the 75W TDP, if the system throttles performance by 20%, the effective
    compute becomes 400 TOPS * (1 - 0.20) = 320 TOPS INT8. The throttled processing time is now 100 TOPs
    / 320 TOPS = 0.3125 seconds. The latency increase is 0.3125s - 0.25s = 0.0625s, which exactly accounts
    for the observed 25% spike in latency (0.3125 / 0.25 = 1.25) during power-constrained periods.'
