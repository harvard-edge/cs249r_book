schema_version: 1
id: edge-exp2-anal-0298
title: Edge TPU Pipeline Throughput Degradation Analysis
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a two-stage compound AI vision pipeline on a Google Coral Edge TPU (4 TOPS
  INT8, 2W, USB form factor). Stage 1 is a 20 GOPs object detector, and Stage 2 is a 10 GOPs OCR model.
  When benchmarked purely on theoretical compute, they should execute in 5ms and 2.5ms respectively. However,
  in production, the end-to-end latency per frame jumps to ~40ms, and the host CPU utilization spikes
  to 90%. Given that the Edge TPU requires strict INT8 quantization and has limited operator support,
  explain why this system behavior occurs and calculate the true end-to-end latency.
details:
  realistic_solution: The degradation is caused by Edge TPU graph partitioning due to limited operator
    support in Stage 2. While the INT8 Stage 1 model is fully supported and executes entirely on the TPU,
    Stage 2 contains an unsupported operator. The Coral compiler splits Stage 2, forcing the system to
    transfer intermediate tensors from the Edge TPU back to the host CPU over the USB bus, execute the
    unsupported operations on the slower CPU, and incur massive context-switching penalties. This shatters
    the 4 TOPS hardware acceleration advantage.
  common_mistake: Candidates often assume latency in compound systems is strictly additive (5ms + 2.5ms
    = 7.5ms) and attribute the 40ms slowdown purely to generic I/O overhead or thermal throttling at 2W.
    They fail to identify graph partitioning caused by unsupported operators, which forces costly host-CPU
    fallbacks and USB bus transfers.
  napkin_math: 'Theoretical Stage 1 (TPU): 20 GOPs / 4,000 GOPs/sec (4 TOPS) = 5ms.

    Theoretical Stage 2 (TPU): 10 GOPs / 4,000 GOPs/sec = 2.5ms.

    Actual Stage 2 Execution: Partitioned into 8 GOPs on TPU, 2 GOPs on Host CPU (assume 100 GOPs/sec
    CPU compute).

    Actual Stage 2 TPU Compute: 8 GOPs / 4,000 GOPs/sec = 2ms.

    Actual Stage 2 CPU Compute: 2 GOPs / 100 GOPs/sec = 20ms.

    USB Transfer Overhead (TPU -> CPU -> TPU): ~13ms for transferring 5MB of intermediate tensors at real-world
    USB 3.0 speeds.

    Total Actual Latency = Stage 1 (5ms) + Stage 2 TPU (2ms) + Stage 2 CPU (20ms) + USB Overhead (13ms)
    = 40ms.'
