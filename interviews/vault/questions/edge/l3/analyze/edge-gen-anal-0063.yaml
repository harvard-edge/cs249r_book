schema_version: 1
id: edge-gen-anal-0063
title: Watchdog Timeout on Edge Safety Coprocessor
topic: safety-certification
status: published
provenance: imported
scenario: An edge safety system uses a Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for primary
  object detection, sending bounding boxes to an ASIL-D certified Cortex-M7 (480 MHz, 512 KB SRAM, FPU,
  ~300 MFLOPS) over a 10 MB/s SPI bus for validation. The Cortex-M7 runs a strict deterministic loop with
  a hardware watchdog timer set to 30 ms. Each detected object is encoded as a 16-byte payload. The system
  works perfectly in normal conditions. However, when the Orin outputs 25,000 objects during a highly
  cluttered scene, the Cortex-M7 repeatedly triggers a watchdog reset. Given these specifications, explain
  why the safety coprocessor fails in this specific condition.
details:
  realistic_solution: The failure is caused by the synchronous I/O transmission time over the SPI bus
    exceeding the watchdog timeout. A blocking SPI transfer of this payload takes 40 ms, which starves
    the main control loop from 'petting' the 30 ms watchdog. To fix this, the system must use DMA (Direct
    Memory Access) to handle the SPI transfer asynchronously in the background, allowing the CPU to service
    the watchdog and maintain deterministic execution.
  common_mistake: Candidates often incorrectly assume the 512 KB SRAM has overflowed, but the data payload
    actually fits in memory. Others might assume the Orin's compute is bottlenecked or the M7 lacks the
    MFLOPS to process the data, completely missing the I/O transmission delay.
  napkin_math: 'Payload size = 25,000 objects * 16 bytes/object = 400,000 bytes. Memory check: 400,000
    bytes < 524,288 bytes (512 KB SRAM), so it fits in memory. Transfer time = 400,000 bytes / 10,000,000
    bytes/s = 0.04 seconds = 40 ms. Transfer time (40 ms) > Watchdog timeout (30 ms), resulting in a system
    reset.'
