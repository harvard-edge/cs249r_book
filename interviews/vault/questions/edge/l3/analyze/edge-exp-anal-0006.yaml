schema_version: 1
id: edge-exp-anal-0006
title: Analyzing Memory-Bound INT8 Throughput on Jetson Orin
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are deploying a quantized vision transformer on an NVIDIA Jetson Orin edge device. The platform
  specifications include 32 GB LPDDR5 (providing 204.8 GB/s of memory bandwidth), an Ampere GPU + DLA
  accelerators delivering a theoretical peak of 275 TOPS in INT8, and a 60W TDP. The model has an overall
  arithmetic intensity of 400 OPs/byte. During deployment profiling, you observe that the system compute
  throughput flatlines at approximately 82 TOPS and cannot reach the 275 TOPS hardware limit, despite
  maximizing the 60W power profile. Analyze why this throughput ceiling occurs.
details:
  realistic_solution: The failure to reach 275 TOPS is caused by a memory bandwidth bottleneck, not a
    compute limitation. According to the Roofline model, a system's maximum achievable performance is
    constrained by either its peak compute capacity or the product of its memory bandwidth and the workload's
    arithmetic intensity. Because the LPDDR5 memory cannot deliver data fast enough to keep up with the
    ALUs, the compute units on both the GPU and DLA sit idle waiting for memory, creating a hard ceiling
    well below the theoretical peak.
  common_mistake: Candidates often incorrectly attribute the performance gap to thermal throttling due
    to the 60W TDP or inefficient concurrent scheduling between the Ampere GPU and the DLA. They fail
    to perform a basic roofline analysis to check if the data feeding the compute units is the actual
    bottleneck.
  napkin_math: '1. Hardware Constraints: Peak Compute = 275 TOPS, Memory Bandwidth = 204.8 GB/s.

    2. Workload Constraint: Arithmetic Intensity = 400 OPs/byte.

    3. Roofline Formula: Attainable Performance = min(Peak Compute, Memory Bandwidth * Arithmetic Intensity).

    4. Calculation: 204.8 GB/s * 400 OPs/byte = 81,920 GigaOPs/sec = 81.92 TOPS.

    5. Conclusion: Since 81.92 TOPS < 275 TOPS, the system is strictly memory-bound, explaining the observed
    ~82 TOPS limit.'
