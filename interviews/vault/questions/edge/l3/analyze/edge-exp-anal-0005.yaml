schema_version: 1
id: edge-exp-anal-0005
title: Latency Spikes in Cascaded Edge TPU Pipelines
topic: compound-ai-systems
status: published
provenance: imported
scenario: A smart home hub uses a two-stage compound AI pipeline on a Google Coral Edge TPU (4 TOPS INT8,
  2W USB form factor). Stage 1 is a lightweight object detector, and Stage 2 is a larger classification
  model routed to based on Stage 1's output. Both models are fully quantized to INT8 and theoretically
  require a combined 0.1 TOPS per inference, which is well within the 4 TOPS capability. However, when
  Stage 2 is triggered, the pipeline experiences a sudden 20ms latency spike before Stage 2 inference
  even begins. Explain why this bottleneck occurs despite the sufficient compute capacity.
details:
  realistic_solution: The Google Coral Edge TPU has limited on-chip SRAM (around 8MB). Because the compound
    pipeline contains two separate models whose combined size exceeds this on-chip memory, the Edge TPU
    cannot keep both models resident simultaneously. When the system routes to Stage 2, it must swap the
    INT8 weights for Stage 2 from the host CPU memory over the USB connection. This data transfer creates
    a severe I/O bottleneck that halts the pipeline, rendering the 4 TOPS compute capacity idle until
    the transfer completes.
  common_mistake: Candidates often assume the latency is due to the CPU converting float32 activations
    to INT8, ignoring that both models are fully quantized and supported. They might also blame thermal
    throttling or insufficient compute (TOPS), rather than identifying the hardware memory and bus bandwidth
    constraints of the USB form factor.
  napkin_math: Assume the Stage 2 model requires 8MB of INT8 weights. A standard USB 3.0 connection has
    an effective real-world bandwidth of roughly 400 MB/s. Weight transfer time = Data Size / Bandwidth
    = 8 MB / 400 MB/s = 0.02 seconds. This perfectly accounts for the observed 20ms latency overhead during
    the routing phase between the two chained models, completely independent of the 4 TOPS INT8 processing
    speed.
