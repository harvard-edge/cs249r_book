schema_version: 1
id: edge-r2-43024
title: FlatBuffers vs Protobuf for Edge Model Serving
topic: storage-format-selection
status: published
provenance: imported
scenario: Your Jetson Orin edge device (32 GB LPDDR5) loads a TFLite model (50 MB) that's serialized as
  a FlatBuffer. A colleague suggests switching to Protocol Buffers for better ecosystem compatibility.
  Why did TFLite choose FlatBuffers, and what performance property would you lose by switching to Protobuf?
details:
  realistic_solution: 'FlatBuffers supports zero-copy access — the serialized bytes ARE the in-memory
    representation. You mmap() the file and directly read fields via pointer arithmetic without any parsing
    or memory allocation. Protobuf requires full deserialization: allocating objects, copying strings,
    building vtables. For a 50 MB model: FlatBuffer load time = mmap() syscall (~0.1ms) + first-access
    page faults (lazy). Protobuf deserialization: parse 50 MB of wire format, allocate ~80 MB of runtime
    objects (Protobuf''s in-memory representation is larger due to object headers and pointers), copy
    all data. This takes 200-500ms and doubles memory usage temporarily. On edge devices with tight memory
    budgets, the zero-copy property is critical — you never need 2× the model size in memory.'
  common_mistake: Thinking the choice is about serialization speed or file size. Both formats produce
    similar-sized files and serialize at comparable speeds. The critical difference is deserialization
    — specifically, whether you need to deserialize at all.
  napkin_math: 'FlatBuffer load: mmap 50 MB = 0.1ms (pages loaded on demand). Peak memory: 50 MB (mapped,
    shared with page cache). Protobuf load: parse + allocate = 300ms for 50 MB. Peak memory: 50 MB (file)
    + 80 MB (deserialized objects) = 130 MB. On Jetson with 32 GB: not a problem for one model, but with
    10 concurrent models: FlatBuffer = 500 MB, Protobuf = 1.3 GB. Difference: 2.6× memory for zero benefit
    in serving accuracy.'
