schema_version: 1
id: edge-exp-anal-0023
title: Latency Bottleneck on Qualcomm AI 100
topic: latency-decomposition
status: published
provenance: imported
scenario: We are deploying a batched object detection model on an on-premise edge server equipped with
  a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). During testing, the end-to-end latency
  for processing a batch of 8 high-resolution images is measured at 150ms. However, hardware profiling
  reveals that the actual INT8 inference execution on the accelerator takes only 15ms. Analyze the system
  behavior and explain why the remaining 135ms occurs by decomposing the end-to-end latency pipeline.
details:
  realistic_solution: 'The candidate must decompose the 150ms end-to-end latency to explain the discrepancy.
    Because the Qualcomm Cloud AI 100 processes the INT8 workload very quickly (15ms) leveraging its 400
    TOPS, the bottleneck shifts to the host CPU and system I/O. The 1Gbps network transfer of 16MB of
    compressed images alone takes 128ms (16MB / 125MB/s), which by itself exceeds typical latency budgets.
    The remaining latency is consumed by CPU-bound image decoding, host-to-device memory copies over PCIe,
    and post-processing (NMS). Optimizations: use 10GbE or direct frame capture to eliminate network transfer,
    implement hardware JPEG decode, and overlap PCIe transfers with compute.'
  common_mistake: Candidates often assume the accelerator's 32 GB LPDDR4x memory bandwidth or 75W power
    limit is the bottleneck, ignoring host-side operations. They frequently fail to decompose latency
    into network I/O, image decoding, preprocessing, and PCIe data transfers, which dominate when the
    accelerator is extremely fast.
  napkin_math: 'Assume 8 compressed images (2MB each) transferred over a 1Gbps local network: 16MB / 125MB/s
    = 128ms network latency. CPU image decoding and resizing (preprocessing) for 8 images = ~80ms. Host-to-Device
    transfer over PCIe Gen4 x8 for 8 uncompressed 4K images (~200MB): 200MB / 16GB/s = ~12ms. Post-processing
    (NMS) = ~30ms. Non-accelerator latency dominates: network transfer alone (128ms) exceeds the total
    observed 150ms budget, confirming the network transfer is the true bottleneck.'
