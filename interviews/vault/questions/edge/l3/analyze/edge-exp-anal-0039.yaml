schema_version: 1
id: edge-exp-anal-0039
title: Asymmetric vs Symmetric Quantization Overhead
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A team deploys a vision model on the Qualcomm Cloud AI 100 on-premise inference accelerator
  (32 GB LPDDR4x, 400 TOPS INT8, 75W). They initially use symmetric INT8 quantization (zero-point = 0)
  and achieve high utilization of the 400 TOPS. However, due to poor accuracy, they switch to asymmetric
  INT8 quantization. The accuracy recovers, but the team observes a significant slowdown in the dense
  layers despite the model size remaining identical. Explain why this performance drop occurs in the context
  of zero-point arithmetic.
details:
  realistic_solution: 'Symmetric quantization requires computing only the core dot product (W * X). Asymmetric
    quantization introduces cross-terms: (W - Z_w)(X - Z_x) = W*X - W*Z_x - Z_w*X + Z_w*Z_x. While W*Z_x
    and Z_w*Z_x can be precomputed offline, Z_w*X requires summing the dynamic input activations at runtime.
    Unless the hardware has dedicated zero-point compensation logic, calculating this sum diverts arithmetic
    units away from the main matrix multiplication, reducing the effective TOPS.'
  common_mistake: Candidates often attribute the slowdown to memory bandwidth from loading zero-points
    from the 32 GB LPDDR4x, failing to realize that asymmetric quantization introduces mathematical cross-terms
    in the matrix multiplication that require additional runtime compute.
  napkin_math: 'For a vector dot product with N=1024 elements: Symmetric uses exactly 1024 INT8 MACs.
    Asymmetric requires the 1024 MACs plus 1024 runtime additions to sum the activations for the Z_w *
    sum(X) term. If the accelerator''s peak 400 TOPS are fully saturated by the primary MAC operations,
    injecting 1024 extra runtime additions per output element effectively doubles the arithmetic instructions,
    potentially dropping the effective throughput from 400 TOPS down to 200 TOPS for those layers.'
