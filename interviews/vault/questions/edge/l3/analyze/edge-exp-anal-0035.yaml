schema_version: 1
id: edge-exp-anal-0035
title: Edge TPU Subgraph Partitioning and USB I/O Overhead
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a quantized INT8 CNN on a Google Coral Edge TPU connected via USB. The accelerator
  delivers 4 TOPS at just 2W, but has limited operator support. Profiling reveals that inserting a single
  unsupported Swish activation between two supported Convolutions increases total latency by 12ms, even
  though the host CPU takes only 2ms to compute the Swish activation itself. Given a 2MB intermediate
  activation tensor and a practical USB bandwidth of 400 MB/s, explain why this scheduling behavior occurs
  and why the latency penalty is so disproportionate to the computation time.
details:
  realistic_solution: 'When the Coral compiler encounters an operator it cannot map to the Edge TPU (like
    an unsupported activation), it splits the scheduling into three subgraphs: Edge TPU -> Host CPU ->
    Edge TPU. The accelerator must pause execution and flush the 2MB activation tensor over the USB connection
    to the host CPU, wait for the CPU to compute the operation, and then wait for the CPU to send the
    2MB result back over USB to resume the remaining layers. Because the Edge TPU relies on INT8 quantization
    and high-speed on-chip SRAM to achieve 4 TOPS at 2W, bouncing execution to the CPU makes the sluggish
    USB I/O the primary bottleneck.'
  common_mistake: Candidates often assume the 12ms delay is solely because the CPU is slower at computing
    the activation function, or they attribute it to generic 'framework overhead'. They fail to identify
    the graph partitioning behavior that forces costly memory transfers back and forth across the slow
    USB bus.
  napkin_math: '1. Edge TPU to Host CPU transfer (USB): 2 MB / 400 MB/s = 0.005 seconds (5 ms).

    2. Host CPU execution time for Swish: 2 ms.

    3. Host CPU to Edge TPU transfer (USB): 2 MB / 400 MB/s = 0.005 seconds (5 ms).

    4. Total latency penalty due to scheduling split: 5 ms (Tx) + 2 ms (Compute) + 5 ms (Rx) = 12 ms.'
