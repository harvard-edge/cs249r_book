schema_version: 1
id: edge-exp2-anal-0316
title: Edge LLM Latency Breakdown on AI 100
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a 5-billion parameter INT8 autoregressive LLM on an on-premise Qualcomm Cloud
  AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). A local client sends a request with a 500-token
  prompt and expects a 100-token response. The network round-trip takes 30ms, and CPU tokenization/preprocessing
  takes 20ms. The accelerator executes the prefill phase (TTFT) at 200 effective TOPS, while the decode
  phase (TPOT) is strictly bottlenecked by the LPDDR4x memory bandwidth, operating at an effective 50
  GB/s. Calculate the total end-to-end latency decomposed into its constituent parts, and analyze why
  the accelerator's massive 400 TOPS compute capacity primarily benefits only one specific phase of this
  deployment.
details:
  realistic_solution: The correct approach decomposes the end-to-end latency formula into E2E = Network
    + Preprocessing + TTFT_compute + (Tokens * TPOT). The analysis should highlight that the 400 TOPS
    INT8 engines only accelerate the prefill phase, where 500 tokens are processed in parallel via compute-bound
    matrix-matrix multiplications. During decode (TPOT), the system must load the entire 5 GB model from
    memory for every single token. Because this is a matrix-vector operation, it becomes bottlenecked
    by the LPDDR4x memory bandwidth, rendering the 400 TOPS compute capacity largely idle during generation.
  common_mistake: Candidates often incorrectly calculate latency by dividing the total operations for
    the entire request by the 400 TOPS compute limit, failing to recognize that autoregressive generation
    is a memory-bound matrix-vector operation. They also frequently forget to add the network and CPU
    preprocessing times to the user-perceived Time To First Token (TTFT).
  napkin_math: '1. Fixed Overhead: Network (30ms) + Preprocessing (20ms) = 50ms.

    2. Prefill Operations (TTFT compute): 500 tokens * 5B parameters * 2 OPs/param = 5 TeraOPs.

    3. Prefill Time: 5 TeraOPs / 200 effective TOPS = 0.025 seconds (25ms). User-perceived TTFT = 50ms
    + 25ms = 75ms.

    4. Decode Bottleneck (TPOT): 5B INT8 parameters = 5 GB weights to load per token.

    5. Time per token: 5 GB / 50 GB/s bandwidth = 0.1 seconds (100ms per token).

    6. Total Decode Time: 100 tokens * 100ms = 10,000ms.

    7. End-to-End Latency: 50ms (overhead) + 25ms (prefill) + 10,000ms (decode) = 10,075ms.'
