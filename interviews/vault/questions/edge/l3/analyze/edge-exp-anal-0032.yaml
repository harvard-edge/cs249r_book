schema_version: 1
id: edge-exp-anal-0032
title: Edge TPU Inference Bottleneck Analysis
topic: model-size-estimation
status: published
provenance: imported
scenario: A 10-million parameter vision model is deployed on a Google Coral Edge TPU via a USB 2.0 interface.
  The model has been successfully fully quantized to INT8, and the Edge TPU specs indicate it can achieve
  4 TOPS at 2W. However, during real-world benchmarking, the system only achieves a small fraction of
  the expected inference throughput, and the Edge TPU compute utilization remains consistently low. Explain
  why this bottleneck occurs.
details:
  realistic_solution: The bottleneck is the I/O transfer rate over the USB interface, not the compute
    capacity. While the Edge TPU has high compute density (4 TOPS), the input data (activations) and potentially
    weights must be transferred from the host CPU. USB 2.0 has a theoretical maximum bandwidth of 480
    Mbps (60 MB/s), which is severely insufficient for keeping the fast TPU compute units fed with data,
    leading to low utilization and being I/O bound.
  common_mistake: Candidates often assume the compute capacity (4 TOPS) is the primary bottleneck, failing
    to account for memory bandwidth and I/O limitations. They might mistakenly try to further compress
    or prune the model instead of identifying the data transfer overhead between the host and accelerator.
  napkin_math: 'Model size (INT8): 10 million parameters * 1 byte/parameter = 10 MB. USB 2.0 theoretical
    bandwidth: 60 MB/s (practically ~35-40 MB/s due to protocol overhead). Time to transfer a 10 MB payload
    over USB: 10 MB / 40 MB/s = 0.25 seconds (limiting theoretical max to 4 FPS based purely on I/O transfer).
    Compute time for ~20 MACs per parameter (200 MMACs or 0.4 GOPS): 0.4 * 10^9 / 4 * 10^12 TOPS = 0.1
    milliseconds. The I/O latency (250 milliseconds) completely dominates the compute time (0.1 milliseconds).'
