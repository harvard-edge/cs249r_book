schema_version: 1
id: edge-exp-anal-0037
title: Hailo-8 Host-to-Device Streaming Latency Bottleneck
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: We are deploying a vision model on a Hailo-8 M.2 module connected via PCIe Gen3 x2 (approx 1.9
  GB/s bandwidth). The Hailo-8 is a dataflow accelerator providing 26 TOPS of INT8 compute at just 2.5W,
  but it possesses no local DRAM, relying entirely on streaming data from host memory. Profiling reveals
  that the inference latency is 6.5 ms per frame, but the accelerator compute utilization is only around
  10%. Given that the model requires 20 Giga-Operations (GOPs) per frame and transfers 12 MB of data (input,
  weights, and output) across the PCIe bus per inference, explain why the latency is what it is and where
  the bottleneck lies.
details:
  realistic_solution: The low utilization and high latency occur because the Hailo-8 compute engines are
    starving for data. Since there is no local DRAM, the dataflow architecture relies entirely on the
    host interface. The bottleneck is purely I/O latency. The time it takes to stream the 12 MB of data
    over the PCIe bus far exceeds the time it takes the 26 TOPS engine to process the 20 GOPs, meaning
    the accelerator spends most of its time idle waiting for memory transfers.
  common_mistake: Candidates often assume the bottleneck is compute-related or that the chip is thermal
    throttling at its 2.5W limit, suggesting further INT8 quantization or operator fusion. They frequently
    overlook the architectural constraint of having no local DRAM, which makes the system highly susceptible
    to I/O bandwidth limitations.
  napkin_math: 'Pure compute time: 20 GOPs / 26,000 GOPs/sec (26 TOPS) = 0.77 ms. PCIe I/O streaming time:
    12 MB / 1900 MB/s = 6.31 ms. Total theoretical latency is roughly max(Compute, I/O) in a perfectly
    pipelined streaming scenario, which is ~6.31 ms. The I/O time dominates, limiting accelerator utilization
    to roughly 0.77 / 6.31 = 12.2%.'
