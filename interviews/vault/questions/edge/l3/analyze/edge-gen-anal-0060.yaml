schema_version: 1
id: edge-gen-anal-0060
title: Thermal Throttling Frame Drops
topic: real-time-deadlines
status: published
provenance: imported
scenario: An autonomous drone runs an obstacle avoidance pipeline on a Jetson Orin (32 GB LPDDR5, 275
  TOPS INT8, 60W TDP) targeting a strict 30 FPS frame budget (33.3ms). During normal operation, the INT8
  model requires 5 Tera-Operations per frame and completes in 25ms (20ms compute, 5ms memory access).
  However, when operating in a hot environment, the system hits its 60W TDP limit and the OS dynamically
  halves the system clock speeds to prevent overheating. The pipeline latency suddenly spikes to 50ms,
  missing the real-time deadline. Given that the throttled compute capacity (137.5 TOPS) is still vastly
  greater than the 5 TOPS required, explain why the system misses its deadline.
details:
  realistic_solution: Latency is bounded by the sequential execution speed of the model's critical path
    and memory bandwidth, not total parallel throughput capacity. Halving the clock frequency to stay
    under the 60W TDP linearly doubles the time required for both sequential compute instructions and
    memory fetches. Even though the hardware has excess TOPS, the model's layers must execute serially
    at the reduced clock speed. This doubles the total execution time from 25ms to 50ms, exceeding the
    33.3ms deadline.
  common_mistake: Candidates typically assume that because the throttled compute capacity (137.5 TOPS)
    far exceeds the required workload (5 TOPS), latency should remain unaffected. They confuse maximum
    theoretical throughput with sequential execution speed, failing to realize that batch-1 edge inference
    cannot utilize the entire GPU simultaneously.
  napkin_math: Target budget = 1000 ms / 30 FPS = 33.33 ms. Normal latency = 20 ms (compute) + 5 ms (memory)
    = 25 ms. Throttling factor = 50% clock speed = 0.5 performance multiplier. Throttled compute time
    = 20 ms / 0.5 = 40 ms. Throttled memory time = 5 ms / 0.5 = 10 ms. Total latency = 40 ms + 10 ms =
    50 ms. 50 ms > 33.33 ms budget, resulting in dropped frames.
