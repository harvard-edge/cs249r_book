schema_version: 1
id: edge-exp2-anal-0327
title: NAS Memory-Bound Analysis on Hailo-8
topic: neural-architecture-search
status: published
provenance: imported
scenario: A hardware-aware NAS is optimizing a vision model for a Hailo-8 edge accelerator (26 TOPS INT8,
  2.5W). The Hailo-8 utilizes a dataflow architecture with no local DRAM, meaning all weights exceeding
  the on-chip SRAM capacity must be continuously streamed from host memory over a 4 GB/s PCIe connection.
  During the search process, the NAS consistently rejects architectures with low FLOP counts (e.g., 2
  GOPS, 20M INT8 parameters) in favor of architectures with double the compute requirements (e.g., 4 GOPS,
  4M INT8 parameters). Explain why the NAS prefers the computationally heavier models and how the platform's
  memory hierarchy dictates this tradeoff.
details:
  realistic_solution: Compute is abundant on the Hailo-8 (26 TOPS) relative to its host memory streaming
    bandwidth (assumed ~4 GB/s over PCIe). Because the accelerator lacks local DRAM, overall inference
    latency is heavily dominated by the time required to stream weights over the interface. The NAS algorithm
    naturally converges on models with high arithmetic intensity. The latency penalty for transferring
    larger parameter sets far exceeds the time required to execute additional arithmetic operations on
    the highly parallel dataflow engine.
  common_mistake: Candidates often assume that fewer FLOPs naturally result in lower latency, focusing
    purely on the 26 TOPS compute capacity. They fail to recognize the severe memory bandwidth constraints
    of streaming weights from host memory on an accelerator without local DRAM.
  napkin_math: 'Model A (20M INT8 params, 2 GOPS):

    - Compute limit: 2 GOPS / 26 TOPS = 0.077 ms

    - Memory streaming limit: 20 MB / 4 GB/s = 5.0 ms

    - Total bottleneck: ~5.0 ms


    Model B (4M INT8 params, 4 GOPS):

    - Compute limit: 4 GOPS / 26 TOPS = 0.154 ms

    - Memory streaming limit: 4 MB / 4 GB/s = 1.0 ms

    - Total bottleneck: ~1.0 ms


    Model B achieves 5x lower latency despite requiring 2x the arithmetic operations, completely justifying
    the NAS selection.'
