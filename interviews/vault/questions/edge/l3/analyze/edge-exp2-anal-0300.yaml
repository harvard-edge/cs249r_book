schema_version: 1
id: edge-exp2-anal-0300
title: Information-Compute Ratio on Coral TPU
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are deploying a continuous data pruning system on a Google Coral Edge TPU (4 TOPS INT8,
  2W power budget) to select high-value frames from a video stream for cloud training. At 30 FPS, the
  INT8-quantized scoring model accurately selects a diverse coreset, and the system operates efficiently.
  When the camera is upgraded to 120 FPS, the Coral TPU easily handles the throughput mathematically,
  but the system's Information-Compute Ratio (ICR) collapses, and the device consumes its maximum 2W power
  continuously without any proportional improvement in the downstream cloud model's accuracy. Explain
  why this system behavior occurs using the ICR framework.
details:
  realistic_solution: The performance collapse is due to the diminishing marginal information gain of
    high-frame-rate video. In the ICR framework (ICR = Information Gain / Compute Cost), adjacent frames
    at 120 FPS are highly correlated and provide near-zero novel features. However, the Edge TPU must
    still execute the same INT8 operations and draw its 2W power to run the scoring model on these redundant
    frames. The compute denominator increases by 4x, while the information numerator remains largely static,
    leading to a collapsed ICR and wasted power budget on pruning uninformative data.
  common_mistake: Candidates often focus solely on the 4 TOPS compute ceiling, incorrectly assuming that
    if the hardware can process the frames, it inherently captures more useful data. They fail to account
    for the temporal redundancy of the data and how it destroys the numerator of the Information-Compute
    Ratio.
  napkin_math: The Coral TPU provides 4 TOPS (4,000 GOPS). Assume the INT8 scoring model requires 2 GOPS
    per frame. At 30 FPS, compute is 60 GOPS (1.5% utilization). At 120 FPS, compute is 240 GOPS (6% utilization)
    — easily fitting the 4 TOPS limit. At 30 FPS, assuming 1 unit of information per frame, ICR = 1 /
    2 GOPS = 0.5. At 120 FPS, frames are just 8.3ms apart, yielding mostly redundant data (e.g., 0.1 units
    of new information). The new ICR = 0.1 / 2 GOPS = 0.05. The system spends 4x the energy (operating
    closer to its 2W max over the same time window) for a 90% reduction in per-frame efficiency.
