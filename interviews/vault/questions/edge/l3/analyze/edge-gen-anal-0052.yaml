schema_version: 1
id: edge-gen-anal-0052
title: Inference Latency Spikes During OTA
topic: ota-firmware-updates
status: published
provenance: imported
scenario: A predictive maintenance sensor uses a Cortex-M7 (480 MHz, 512 KB SRAM) and a single 4 MB external
  NOR flash chip. The flash uses an A/B partition scheme, storing active firmware in Partition A and inactive
  firmware in Partition B. The ML model weights (1.5 MB) are read directly from Partition A during the
  inference loop, which normally completes in 15ms. During an OTA update, the device writes the new image
  to Partition B in 4 KB sectors, where each sector erase/write cycle locks the flash for 40ms. Explain
  why, despite CPU utilization remaining below 20% and SRAM being perfectly sufficient for OTA network
  buffers, the inference latency sporadically spikes to exactly 55ms during the firmware flashing phase.
details:
  realistic_solution: The candidate should identify that standard external NOR flash cannot perform read
    operations while a write/erase operation is ongoing (unless it has expensive Read-While-Write support).
    Because the 1.5 MB model exceeds the 512 KB SRAM, weights must be fetched directly from flash during
    inference via Execute-in-Place (XIP). When the OTA task initiates a 40ms write to Partition B, any
    concurrent memory read from Partition A stalls the CPU bus until the flash operation completes, perfectly
    explaining the added latency.
  common_mistake: Candidates often incorrectly attribute the latency spike to CPU starvation, RTOS thread
    priority inversion, or network interrupt overhead, missing the physical hardware limitations of the
    shared storage medium.
  napkin_math: 'Worst-case Spiked Inference Time = Normal Inference Time + Maximum Flash Hardware Stall
    Time. Given Normal Inference = 15ms and Flash Sector Write Time = 40ms, the calculation is: 15ms +
    40ms = 55ms total latency.'
