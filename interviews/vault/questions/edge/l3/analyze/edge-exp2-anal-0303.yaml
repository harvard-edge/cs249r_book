schema_version: 1
id: edge-exp2-anal-0303
title: Data Selection Bias in High-Throughput Edge Inference
topic: dataset-curation
status: published
provenance: imported
scenario: A team deploys an object detection model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, streams
  from host memory) for a 60 FPS industrial inspection camera. To reduce annotation costs, the dataset
  curation strategy sampled 1 frame every 0.5 seconds (2 FPS), capturing mostly clear, sharp images. The
  deployed model requires 0.25 TOPS per inference. In production, the model's accuracy degrades significantly
  during high-speed operations, despite excellent validation metrics. Analyze why this data selection
  strategy caused the production failure given the Hailo-8's processing capabilities.
details:
  realistic_solution: The candidate should calculate that the Hailo-8 has enough compute to process the
    full 60 FPS stream in real-time. Because the curated dataset only contained sparse, sharp frames,
    it lacked representation of the motion-blurred frames present in the high-speed live stream. The hardware's
    ability to evaluate every single frame means it constantly encounters out-of-distribution blurry images,
    explaining the behavioral discrepancy.
  common_mistake: Candidates often blame the INT8 quantization on the Hailo-8 or host memory streaming
    latency for the accuracy drop. They miss that the hardware's high throughput exposes a critical dataset
    bias regarding motion blur.
  napkin_math: 'Hailo-8 compute capacity: 26 TOPS. Model compute requirement: 0.25 TOPS/frame. Maximum
    theoretical throughput = 26 TOPS / 0.25 TOPS/frame = 104 FPS. Since 104 FPS > 60 FPS, the accelerator
    processes 100% of the live camera frames. Dataset representation = 2 FPS annotated / 60 FPS live =
    3.33%. Therefore, 96.67% of the production data evaluated by the Hailo-8 contains motion characteristics
    not present in the curated dataset.'
