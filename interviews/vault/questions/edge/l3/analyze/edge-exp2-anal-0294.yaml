schema_version: 1
id: edge-exp2-anal-0294
title: KV Cache OOM Analysis on Cloud AI 100
topic: activation-memory
status: published
provenance: imported
scenario: You are deploying a 7B parameter LLM on a Qualcomm Cloud AI 100 inference accelerator (32 GB
  LPDDR4x, 400 TOPS INT8, 75W). The model weights are quantized to INT8 and consume exactly 7 GB of memory.
  However, when processing an autoregressive generation workload with a batch size of 64 and a sequence
  length of 2048 tokens, the system crashes with an Out of Memory (OOM) error. The model architecture
  uses 32 layers, 32 attention heads, and a head dimension of 128. Intermediate activations (the KV cache)
  are stored in FP16 format to preserve generation quality. Analyze why this memory failure occurs despite
  the INT8 weights fitting comfortably within the hardware limits.
details:
  realistic_solution: The candidate should identify that the OOM is caused by the FP16 KV cache, which
    scales multiplicatively with batch size, sequence length, and model dimensions. They should calculate
    the exact KV cache size and demonstrate that the total footprint (weights + activations) exceeds the
    32 GB LPDDR4x limit. To resolve this, they would need to lower the batch size (e.g., to 16) or implement
    KV cache quantization.
  common_mistake: Candidates often assume that inference requires minimal activation storage since gradients
    aren't kept, forgetting that autoregressive generation requires retaining the KV cache across the
    entire sequence. They might only account for the 7 GB weight footprint and fail to realize the linear
    memory scaling of the cache with batch size and sequence length.
  napkin_math: 'KV cache size per token: 2 (K and V) * 32 layers * 32 heads * 128 dimension * 2 bytes
    (FP16) = 524,288 bytes (0.5 MB). Total KV cache for the batch: 0.5 MB/token * 2048 tokens * 64 batch
    size = 65,536 MB (64 GB). Total memory required = 7 GB (weights) + 64 GB (KV cache) = 71 GB. This
    71 GB requirement drastically exceeds the 32 GB LPDDR4x memory available on the Qualcomm Cloud AI
    100.'
