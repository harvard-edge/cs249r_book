schema_version: 1
id: edge-exp2-anal-0308
title: Analyzing 3-bit GPTQ Latency Degradation on Jetson Orin
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 14-billion parameter LLM to an NVIDIA Jetson Orin module, leveraging its
  32 GB LPDDR5 memory, 60W TDP limit, Ampere GPU, and DLA accelerator. To maximize memory efficiency,
  you apply 3-bit GPTQ extreme quantization. While the model fits comfortably in memory, you observe that
  the inference latency is actually higher and power consumption spikes compared to using standard INT8
  quantization, despite the system boasting 275 TOPS for INT8. Explain why this performance degradation
  occurs despite the reduced memory footprint.
details:
  realistic_solution: The Jetson Orin's Ampere GPU and DLA natively accelerate INT8 (delivering up to
    275 TOPS) and FP16, but lack hardware support for 3-bit arithmetic. Consequently, the 3-bit GPTQ weights
    must be fetched from memory and dequantized to FP16 or INT8 using general CUDA cores before the Tensor
    Cores or DLA can execute the matrix multiplications. This continuous, on-the-fly dequantization creates
    a severe ALU bottleneck that negates the memory bandwidth savings, leading to higher latency and increased
    power draw.
  common_mistake: Candidates often assume that smaller bit-widths automatically guarantee faster inference
    by reducing memory bandwidth requirements. They frequently overlook the hardware's native precision
    support and the computational overhead required to unpack non-standard bit-widths on the fly.
  napkin_math: For a 14B parameter model, INT8 requires 14 GB of memory, whereas 3-bit requires (14 *
    3) / 8 = 5.25 GB, saving 8.75 GB of memory footprint. However, if unpacking a 3-bit value requires
    5 ALU/bitwise operations, that adds 70 Giga-operations (14B * 5) of non-accelerated overhead per forward
    pass. Because the 275 TOPS peak relies on native INT8 Tensor Core and DLA utilization, this unstructured
    unpacking bottleneck completely limits the effective throughput and causes the system to run inefficiently
    within its 60W TDP.
