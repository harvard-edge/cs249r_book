schema_version: 1
id: edge-exp2-anal-0305
title: Hailo-8 DMA PCIe Streaming Bottleneck
topic: dma-data-movement
status: published
provenance: imported
scenario: We are deploying an object detection model on a Hailo-8 edge accelerator (26 TOPS INT8, 2.5W).
  The Hailo-8 utilizes a pure dataflow architecture with no local external DRAM, meaning it must stream
  all input data directly from host memory via DMA over a PCIe Gen3 x1 link (approx 1 GB/s effective bandwidth).
  The model requires 20 GOPS per inference and takes an uncompressed 4MB input tensor. During benchmarking,
  the system hard-caps at exactly 5 TOPS of compute throughput. Why does this architecture experience
  this specific performance wall?
details:
  realistic_solution: The accelerator is completely starved for data by the PCIe interface. Because it
    must fetch the 4MB input tensor directly from host memory for every single frame, the system's framerate
    is strictly bounded by the 1 GB/s PCIe Gen3 x1 link. The compute units finish their tasks faster than
    the DMA engine can supply new data, leaving 21 TOPS of compute capacity idle.
  common_mistake: Candidates often assume the 5 TOPS limit is due to the 2.5W thermal envelope causing
    power throttling, or inefficient INT8 quantization mapping. They fail to recognize that without local
    DRAM, the compute engine is entirely at the mercy of the host-to-device DMA streaming bandwidth.
  napkin_math: '1. Available host-to-device DMA bandwidth: 1 GB/s (1000 MB/s).

    2. Data movement per inference: 4 MB.

    3. Maximum achievable framerate (DMA bound): 1000 MB/s / 4 MB/frame = 250 FPS.

    4. Model compute requirement: 20 GOPS/frame.

    5. Maximum system compute throughput: 250 FPS * 20 GOPS/frame = 5000 GOPS = 5 TOPS.'
