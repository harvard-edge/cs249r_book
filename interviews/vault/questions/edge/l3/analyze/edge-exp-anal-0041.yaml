schema_version: 1
id: edge-exp-anal-0041
title: Jetson Orin Roofline Bottleneck Analysis
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying a vision transformer on an NVIDIA Jetson Orin at the edge. The Orin has 32
  GB LPDDR5 providing 204 GB/s of memory bandwidth, an Ampere GPU + DLA delivering 275 TOPS INT8, and
  a 60W TDP. The model requires 100 Giga-Operations (GOPS) per inference and loads 0.5 GB of weights (INT8)
  per pass with batch size 1. You observe that the system is only achieving about 40.8 TOPS and power
  draw is well below the 60W limit. Using the roofline model, explain why the accelerator is underutilized.
details:
  realistic_solution: The system is heavily memory-bound. To understand why, we calculate the arithmetic
    intensity by comparing the operations per inference to the memory access required to load the weights.
    Because the arithmetic intensity is much lower than the ridge point of the Jetson Orin's roofline,
    the theoretical peak compute cannot be reached. The solution requires increasing arithmetic intensity,
    typically by increasing the batch size (which the 32 GB LPDDR5 can easily accommodate) or implementing
    weight-stationary caching strategies.
  common_mistake: Candidates often assume the model is compute-bound because transformers are computationally
    heavy, ignoring the low arithmetic intensity of a batch size 1 inference. They might incorrectly suggest
    optimizing the compute kernels or increasing the power limit, rather than identifying the memory bandwidth
    bottleneck.
  napkin_math: 1. Arithmetic Intensity = Compute / Memory Traffic = 100 GOPS / 0.5 GB = 200 OPS/byte.
    2. Machine Ridge Point = Peak Compute / Peak Memory Bandwidth = 275,000 GOPS (275 TOPS) / 204 GB/s
    = 1348 OPS/byte. 3. Since Arithmetic Intensity (200) < Ridge Point (1348), the workload is firmly
    in the memory-bound region. 4. Maximum Achievable Performance = Arithmetic Intensity * Memory Bandwidth
    = 200 OPS/byte * 204 GB/s = 40,800 GOPS = 40.8 TOPS. 5. This calculation directly predicts the observed
    40.8 TOPS, showing only ~15% utilization of the 275 TOPS INT8 peak compute.
