schema_version: 1
id: edge-exp-anal-0018
title: Analyze INT8 Underutilization on Cloud AI 100
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: You are deploying a custom vision model on a Qualcomm Cloud AI 100, an on-premise inference
  accelerator featuring 32 GB LPDDR4x memory, 400 TOPS of INT8 compute, and a 75W power envelope. During
  profiling of a specific kernel layer, you observe the accelerator only achieves 50 TOPS of actual INT8
  throughput despite the 400 TOPS peak. The profiler shows the LPDDR4x memory interface is saturated,
  delivering 100 GB/s. Explain why the accelerator exhibits this low compute utilization behavior.
details:
  realistic_solution: The system is heavily memory-bound due to the low arithmetic intensity of the kernel
    compared to the hardware's high machine balance. The 400 TOPS INT8 compute units can process data
    much faster than the LPDDR4x memory can supply it. Because the memory bandwidth is saturated at 100
    GB/s, the compute units idle while waiting for data, strictly limiting the maximum achievable operations
    per second to the rate at which data can be fetched.
  common_mistake: Candidates often assume the INT8 compute cores are stalling due to poor instruction
    scheduling or unoptimized matrix multiplication dimensions. They might incorrectly suggest switching
    to a different precision or rewriting the compute kernel rather than identifying that the compute
    units are simply starved for data.
  napkin_math: Hardware Machine Balance = 400 TOPS / 100 GB/s = 4000 OPs/byte. Observed throughput is
    50 TOPS at 100 GB/s, meaning the workload's actual arithmetic intensity is (50 * 10^12 OPs) / (100
    * 10^9 bytes/s) = 500 OPs/byte. Since the workload intensity (500 OPs/byte) is far less than the hardware
    balance (4000 OPs/byte), the workload is heavily memory-bound, capping compute utilization at exactly
    12.5% (500 / 4000, or 50 TOPS / 400 TOPS peak).
