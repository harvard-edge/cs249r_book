schema_version: 1
id: edge-exp-anal-0040
title: Hardware-Constrained Safety Guardrail Degradation
topic: responsible-ai
status: published
provenance: imported
scenario: An automated factory safety compliance system is deployed on a Google Coral Edge TPU (4 TOPS
  INT8, 2W). The pipeline runs a primary anomaly detector (50 GOPS per frame) and a secondary fairness-aware
  guardrail model (30 GOPS per frame) that verifies the anomaly detector isn't systematically biased against
  specific worker demographics. The camera streams at 60 frames per second (FPS) and both models are fully
  quantized to INT8 due to the limited operator support. Post-deployment audits reveal that during peak
  factory floor activity, the system silently stops logging guardrail verifications, leading to unaccounted
  bias in the safety reports. Explain why this system behavior occurs under these hardware constraints.
details:
  realistic_solution: The system behavior occurs because the combined compute requirement of the primary
    and guardrail models at 60 FPS exceeds the Coral Edge TPU's maximum theoretical capacity. To maintain
    the primary anomaly detector's real-time performance, the system drops the execution of the secondary
    guardrail model. This highlights a critical governance failure where performance was prioritized over
    fairness checks without a proper failsafe mechanism.
  common_mistake: Candidates often assume the bias is purely a result of INT8 quantization precision loss
    without analyzing the actual compute requirements. They might overlook that the guardrail model is
    systematically being starved of compute resources or dropped by the scheduler due to the strict 4
    TOPS limit.
  napkin_math: 'Primary model compute: 50 GOPS/frame * 60 FPS = 3,000 GOPS (3.0 TOPS). Guardrail model
    compute: 30 GOPS/frame * 60 FPS = 1,800 GOPS (1.8 TOPS). Total compute required: 3.0 TOPS + 1.8 TOPS
    = 4.8 TOPS. Since the Google Coral Edge TPU provides a maximum of 4 TOPS INT8, the workload exceeds
    the hardware capacity by 0.8 TOPS. Thus, the system physically cannot run both models at 60 FPS.'
