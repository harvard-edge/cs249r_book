schema_version: 1
id: edge-exp-anal-0002
title: Continuous Learning Activation Memory Tradeoff
topic: activation-memory
status: published
provenance: imported
scenario: 'Your team is deploying an on-premise continuous learning pipeline for a 7B parameter transformer
  on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). You are performing lightweight fine-tuning
  with a batch size of 16 and sequence length of 2048. The 8-bit quantized weights consume 7GB, but the
  system OOMs during the forward pass. Assume activation memory per layer follows the formula: Memory
  = BatchSize * SeqLen * HiddenDim * 12 bytes, with a hidden dimension of 4096 and 32 layers. Explain
  why the system runs out of memory and analyze the compute-memory tradeoff of applying gradient checkpointing
  to resolve it.'
details:
  realistic_solution: The OOM occurs because storing all intermediate layer activations for the backward
    pass exceeds the remaining memory. By applying gradient checkpointing (e.g., checkpointing every 4th
    layer), we only store a fraction of the layer boundaries in memory. During the backward pass, intermediate
    activations are recomputed on the fly. This avoids OOM on the 32GB device by utilizing the accelerator's
    400 TOPS INT8 compute capacity to reduce the activation memory footprint.
  common_mistake: Candidates often assume that since the weights only take 7GB, the 32GB LPDDR4x memory
    is more than enough, forgetting the massive memory footprint of forward-pass activations saved for
    backpropagation. They may also struggle to quantify how gradient checkpointing trades recomputation
    time for peak memory reduction.
  napkin_math: '1. Available memory for activations: 32 GB (Total) - 7 GB (Weights) = 25 GB. 2. Activation
    memory per layer: 16 (batch) * 2048 (seq) * 4096 (hidden) * 12 bytes = 1,610,612,736 bytes (~1.61
    GB). 3. Total activation memory without checkpointing: 1.61 GB * 32 layers = 51.5 GB. (OOM since 51.5
    GB > 25 GB). 4. With checkpointing every 4 layers, peak memory requires storing 8 boundaries + 4 active
    layers = 12 layers. 5. Checkpointed activation memory: 12 * 1.61 GB = 19.3 GB. Total memory: 7 GB
    + 19.3 GB = 26.3 GB, safely fitting within the 32 GB limit.'
