schema_version: 1
id: edge-exp-anal-0047
title: KV-Cache Budgeting on Cloud AI 100
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a 13-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 inference
  accelerator, utilizing its 400 TOPS INT8 compute capacity. The accelerator has a strict 32 GB LPDDR4x
  memory limit. The model architecture consists of 40 layers and a hidden dimension of 5120. During load
  testing with a batch size of 32 and a sequence length of 2048 tokens, the system encounters an Out-of-Memory
  (OOM) error. The INT8 weights only consume 13 GB. Assuming the KV-cache is also stored in INT8 format
  (1 byte per element) and ignoring other small overheads, analyze the memory footprint to explain exactly
  why this specific workload exceeds the available 32 GB memory.
details:
  realistic_solution: The OOM occurs because the KV-cache footprint for a batch size of 32 at a 2048 context
    length requires roughly 26.8 GB, which added to the 13 GB weight footprint vastly exceeds the device
    limits. To deploy successfully on the 32 GB LPDDR4x memory budget, the engineer must constrain the
    KV-cache by reducing the maximum batch size to 16, capping the sequence length, or migrating to a
    model architecture that uses Grouped-Query Attention (GQA) to drastically shrink the KV-cache size.
  common_mistake: Candidates often assume memory usage during inference is dominated almost entirely by
    the model weights, neglecting the severe linear scaling of the KV-cache with batch size and sequence
    length. They might also miscalculate the KV-cache memory footprint by forgetting to account for both
    Key and Value tensors across all layers.
  napkin_math: '1. Model Weights: 13 billion parameters * 1 byte (INT8) = 13 GB.

    2. KV-Cache per token: 2 (Key and Value) * 40 (layers) * 5120 (hidden dim) * 1 byte (INT8) = 409,600
    bytes.

    3. Total KV-Cache: 409,600 bytes * 2048 (sequence length) * 32 (batch size) = 26,843,545,600 bytes
    (~26.84 GB).

    4. Total Memory Required: 13 GB (weights) + 26.84 GB (KV-cache) = 39.84 GB.

    5. Deficit: 39.84 GB strictly exceeds the 32 GB LPDDR4x capacity of the Qualcomm Cloud AI 100 by ~7.84
    GB, causing the OOM error.'
