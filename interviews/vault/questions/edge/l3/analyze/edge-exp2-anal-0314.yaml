schema_version: 1
id: edge-exp2-anal-0314
title: Kernel Fusion on Heterogeneous SoCs
topic: kernel-fusion
status: published
provenance: imported
scenario: You are optimizing an INT8 vision pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS
  INT8 total, 60W TDP, Ampere GPU + DLA accelerator) with an assumed memory bandwidth of 200 GB/s. The
  original pipeline executes a heavy convolution on the DLA (achieving 100 effective TOPS) followed by
  a custom memory-bound activation on the Ampere GPU. An engineer fused these operators to eliminate 20
  MB of intermediate LPDDR5 read/write traffic. However, because the DLA lacks support for the custom
  fused operation, the new kernel falls back entirely to the Ampere GPU, where it only achieves 40 effective
  TOPS. If the convolution requires 100 giga-operations (GOPs), explain why this fusion degraded overall
  latency.
details:
  realistic_solution: The candidate must analyze the tradeoff between compute time and memory transfer
    time using the provided specifications. They should explain that the severe compute throughput penalty
    of moving the 100 GOP convolution from the DLA to the Ampere GPU far exceeds the latency saved from
    avoiding the 20 MB memory transfer.
  common_mistake: Candidates often rigidly assume that operator fusion always yields performance gains
    by reducing memory bandwidth and kernel launch overhead. They fail to analyze heterogeneous architectures
    where fusing an operator forces a compute-heavy task off a highly efficient, specialized accelerator
    (DLA) onto a more general-purpose one (GPU).
  napkin_math: 'Unfused latency: The convolution on the DLA takes 100 GOPs / 100 TOPS = 1.0 ms. The intermediate
    memory I/O for the activation takes 20 MB / 200 GB/s = 0.1 ms. Total unfused latency = 1.1 ms. Fused
    latency: The fused kernel on the GPU takes 100 GOPs / 40 TOPS = 2.5 ms. The 20 MB memory I/O is eliminated,
    but the total fused latency is 2.5 ms. Fusing the operators caused a 1.4 ms degradation (2.5 ms -
    1.1 ms).'
