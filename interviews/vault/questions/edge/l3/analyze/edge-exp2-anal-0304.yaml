schema_version: 1
id: edge-exp2-anal-0304
title: Drift Detection I/O Bottleneck on Dataflow Edge
topic: distribution-drift-detection
status: published
provenance: imported
scenario: An edge inspection system uses a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM, streams
  from host memory) running a 4 GOPS model. Input frames are 2MB each. To detect data drift via Population
  Stability Index (PSI) on the host CPU, the team modifies the graph to stream a 3MB intermediate INT8
  feature map back to the host for every single frame. The host-accelerator interface has a maximum sustainable
  bandwidth of 1 GB/s (1000 MB/s). Upon deployment, the inference pipeline, which previously ran smoothly
  at 400 FPS, severely degrades and stabilizes at a maximum of 200 FPS, despite the accelerator using
  only a tiny fraction of its compute capacity. Explain why this specific performance collapse occurs.
details:
  realistic_solution: The performance collapse happens because the Hailo-8 is a dataflow accelerator with
    no local DRAM; it must stream all inputs and outputs over the host interface. By extracting a large
    intermediate feature map for drift detection, the system shifts from being compute-bound to completely
    I/O-bound. The 26 TOPS compute capacity is irrelevant because the accelerator is starved for data,
    waiting on the 1 GB/s interface to transfer the massive 3MB intermediate tensors.
  common_mistake: Candidates often look for a compute bottleneck, assuming the PSI calculation on the
    host CPU is too slow, or they incorrectly assume the 26 TOPS INT8 capacity is somehow being saturated
    by the intermediate layer extraction.
  napkin_math: 'Compute required per frame: 4 GOPS. At 400 FPS, total compute is 1.6 TOPS (only 6.1% of
    the 26 TOPS capacity). Original I/O at 400 FPS: 400 * 2MB = 800 MB/s (fits in 1000 MB/s). New I/O
    per frame: 2MB (input) + 3MB (intermediate feature map) = 5MB per frame. Maximum possible frame rate
    based on I/O: 1000 MB/s / 5 MB/frame = 200 FPS. The system is strictly bottlenecked by the streaming
    interface.'
