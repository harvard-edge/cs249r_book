schema_version: 1
id: edge-r2-42009
title: Latency Jitter from DVFS on Edge Devices
topic: tail-latency
status: published
provenance: imported
scenario: Your Jetson Orin NLP pipeline shows 3× latency jitter between consecutive identical inferences.
  Profiling reveals the GPU clock oscillates between 612 MHz and 1.3 GHz due to Dynamic Voltage and Frequency
  Scaling (DVFS). How do you stabilize latency without exceeding the 60W power budget?
details:
  realistic_solution: 'Lock GPU frequency to a sustainable mid-point using nvpmodel and jetson_clocks.
    Profile power at each frequency step: 612 MHz = 18W GPU, 900 MHz = 32W GPU, 1.3 GHz = 52W GPU. At
    900 MHz, latency is 1.44× the minimum but perfectly stable, and leaves 28W for CPU + memory + DLA.
    Set: `sudo nvpmodel -m 2` (custom power mode), `sudo jetson_clocks --fan` (active cooling at fixed
    fan speed). Result: P50 and P99 converge to within 10% because DVFS is eliminated. Alternatively,
    use the MAXN mode with a 50W software power cap — the Orin will reduce clocks gracefully rather than
    oscillating.'
  common_mistake: Locking clocks to maximum frequency. On Orin at max clocks (1.3 GHz GPU + max CPU),
    power draw exceeds 60W, triggering hard throttling that causes even worse latency spikes.
  napkin_math: 'At 1.3 GHz: inference = 8ms, power = 52W (exceeds 60W with CPU). At 900 MHz: inference
    = 8 × (1300/900) = 11.5ms, power = 32W (safe). At 612 MHz: inference = 8 × (1300/612) = 17ms, power
    = 18W. Locked 900 MHz: P50 = 11.5ms, P99 = 12.5ms (jitter < 10%). DVFS oscillating: P50 = 10ms, P99
    = 25ms (jitter 150%).'
