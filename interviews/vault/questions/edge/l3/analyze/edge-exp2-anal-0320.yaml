schema_version: 1
id: edge-exp2-anal-0320
title: OOM During Gradient Accumulation
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are implementing on-device fine-tuning on an NVIDIA Jetson Orin (32 GB LPDDR5 unified memory,
  60W TDP, Ampere GPU + DLA accelerator). The system OS and drivers consume 6 GB. Your model weights occupy
  10 GB in FP16. A full-batch forward/backward pass requires 16 GB for activations. To reduce memory spikes,
  you implement gradient accumulation over 4 micro-batches, successfully reducing activation memory to
  4 GB per micro-batch. You use an SGD optimizer with momentum, storing states in FP16. Despite this optimization,
  the Linux OOM killer terminates the process right at the end of the final micro-batch's backward pass.
  Analyze why this happens.
details:
  realistic_solution: Gradient accumulation reduces the memory needed for intermediate activations, but
    it requires allocating a full-sized buffer for the accumulated gradients. Additionally, the SGD optimizer
    requires a persistent momentum buffer. At the end of the final backward pass, the unified memory must
    simultaneously hold the OS, weights, momentum, accumulated gradients, and the last micro-batch's activations,
    exceeding the hardware's physical limits.
  common_mistake: Candidates often assume gradient accumulation solves all memory pressure by reducing
    activation size, forgetting that accumulated gradients and persistent optimizer states (like momentum)
    scale with the model size, not the micro-batch size.
  napkin_math: 'Total unified memory: 32 GB LPDDR5. Memory allocations: OS/Background = 6 GB, Model Weights
    (FP16) = 10 GB, SGD Momentum State (FP16) = 10 GB, Accumulated Gradients (FP16) = 10 GB, Final micro-batch
    activations = 4 GB. Peak memory footprint = 6 + 10 + 10 + 10 + 4 = 40 GB. Since 40 GB > 32 GB capacity,
    the system faces an 8 GB deficit and the OOM killer is inevitably invoked.'
