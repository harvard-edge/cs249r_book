schema_version: 1
id: edge-exp-impl-0125
title: INT8 Compute Throughput on Cloud AI 100
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are tasked with deploying a computer vision pipeline on an on-premise Qualcomm Cloud AI
  100 accelerator. The model requires 800 billion operations (800 GOPS) per inference. Leveraging the
  hardware's 400 TOPS INT8 peak performance and 75W power envelope, compute the maximum theoretical inferences
  per second achievable. Assume the 32 GB LPDDR4x memory bandwidth is sufficient to keep the execution
  compute-bound.
details:
  realistic_solution: The correct approach simply divides the total INT8 operations per second available
    on the accelerator by the operations required for a single inference. Since we assume the workload
    is compute-bound and fits within the 32 GB memory, memory bandwidth does not bottleneck the throughput.
    Thus, the theoretical maximum inferences per second is directly derived from the peak INT8 TOPS.
  common_mistake: Candidates often fail to correctly align the scale of Tera-Operations (10^12) with Giga-Operations
    (10^9). They may also incorrectly factor in the 75W power envelope as a direct throughput limiter
    in a purely theoretical compute calculation.
  napkin_math: '1. Accelerator peak compute: 400 TOPS = 400,000 GOPS.

    2. Model compute requirement: 800 GOPS per inference.

    3. Maximum throughput: 400,000 GOPS / 800 GOPS/inference = 500 inferences per second.'
