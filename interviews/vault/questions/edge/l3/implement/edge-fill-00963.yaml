schema_version: 1
id: edge-fill-00963
title: Optimizing Conv Layer Memory on Qualcomm Cloud AI 100
topic: operator-scheduling
status: published
provenance: imported
scenario: 'You are tasked with optimizing the inference pipeline for a large vision model on a Qualcomm
  Cloud AI 100, which has 32 GB LPDDR4x memory and 400 TOPS INT8 performance. The model contains a critical
  sequence of two 3x3 INT8 convolutional layers: Conv_A (input 1024x1024x16, output 1024x1024x32) followed
  by Conv_B (input 1024x1024x32, output 1024x1024x64). All activations are INT8 (1 byte per element).
  Assume ideal conditions where input tensors for Conv_A and weights for both layers are already loaded
  and do not contribute to intermediate memory calculation during the sequential or fused execution of
  Conv_A and Conv_B. Your goal is to minimize peak intermediate memory.


  Calculate the peak intermediate memory required (in MB) for these two layers under two scheduling strategies:

  1.  **Sequential Execution**: Conv_A completes entirely, writes its output to memory, then Conv_B reads
  that output and writes its own output.

  2.  **Ideal Layer Fusion**: The output of Conv_A is streamed directly as input to Conv_B without fully
  materializing Conv_A''s intermediate output tensor. Assume a processing granularity such that only one
  output row (1024 pixels wide) of Conv_B''s output, and the corresponding necessary input data (from
  Conv_A''s output stream, which itself depends on Conv_A''s input stream) needs to be buffered at any
  given time. For simplicity, consider only the largest single intermediate row buffer needed for streaming
  fusion for Conv_A and Conv_B''s outputs, and neglect the input rows to Conv_A and kernel related buffers
  for this calculation.'
details:
  realistic_solution: '1.  **Sequential Execution**: The peak intermediate memory is the maximum size
    of any fully materialized intermediate tensor. Conv_A''s output is 1024*1024*32 bytes = 32 MB. Conv_B''s
    output is 1024*1024*64 bytes = 64 MB. The peak memory requirement for sequential execution is the
    larger of these two, which is **64 MB**.

    2.  **Ideal Layer Fusion**: With ideal fusion, Conv_A''s output is streamed directly to Conv_B, meaning
    the full 32 MB tensor is never materialized. For the simplified streaming model, we consider the largest
    single output row buffer. Conv_A''s output row (as an intermediate input to Conv_B''s stream) is 1024*32
    bytes = 32 KB. Conv_B''s output row is 1024*64 bytes = 64 KB. The peak intermediate memory for ideal
    layer fusion is the larger of these two row buffers, which is **64 KB**. This demonstrates a significant
    memory reduction compared to sequential execution.'
  common_mistake: Candidates often fail to correctly calculate the memory reduction achieved by ideal
    layer fusion, either by still accounting for full tensor materialization or by not understanding the
    concept of streaming intermediate outputs. Another common mistake is miscalculating byte sizes or
    unit conversions (bytes to MB/KB).
  napkin_math: '## Memory Calculation


    **Given:**

    - Activation size: 1 byte/INT8 element

    - Input/Output resolutions: 1024x1024


    **Conv_A:**

    - Output channels: 32

    - Output tensor size = 1024 * 1024 * 32 * 1 byte = 33,554,432 bytes = **32 MB**


    **Conv_B:**

    - Output channels: 64

    - Output tensor size = 1024 * 1024 * 64 * 1 byte = 67,108,864 bytes = **64 MB**


    ### 1. Sequential Execution Peak Intermediate Memory

    - When Conv_A completes, it stores 32 MB.

    - When Conv_B runs, it consumes Conv_A''s output and produces 64 MB output.

    - Peak intermediate memory = `max(size_of_ConvA_output_tensor, size_of_ConvB_output_tensor)`

    - Peak intermediate memory = `max(32 MB, 64 MB) = 64 MB`


    ### 2. Ideal Layer Fusion Peak Intermediate Memory

    - Full Conv_A output tensor is NOT materialized.

    - Consider the largest single output row buffer needed during streaming.

    - Conv_A output row size (acting as input stream to Conv_B) = 1024 * 32 * 1 byte = 32,768 bytes =
    **32 KB**

    - Conv_B output row size = 1024 * 64 * 1 byte = 65,536 bytes = **64 KB**

    - Peak intermediate memory (largest row buffer concurrently needed) = `max(32 KB, 64 KB) = 64 KB`'
