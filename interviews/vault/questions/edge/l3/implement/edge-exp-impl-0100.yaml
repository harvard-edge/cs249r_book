id: edge-exp-impl-0100
title: Shadow Deployment Sizing on Hailo-8
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are implementing a shadow deployment on an edge gateway equipped with a single Hailo-8 accelerator
  (26 TOPS INT8, 2.5W, no local DRAM, streams from host memory). The baseline model (Model A) guarantees
  30 FPS on a live video stream, utilizing exactly 14 TOPS. The new candidate model (Model B) is more
  complex and requires 0.6 TOPS per frame. Calculate the maximum frame rate at which Model B can shadow
  the live traffic without exceeding the Hailo-8's 26 TOPS compute limit, and estimate the total power
  consumption assuming linear power scaling.
details:
  realistic_solution: In edge shadow deployments, compute is strictly constrained, so the shadow model
    frequently processes a subsampled stream. We determine the remaining compute capacity on the Hailo-8
    after Model A's requirements are satisfied, then calculate the maximum sustainable frame rate for
    Model B. Power is estimated proportionally to overall TOPS utilization.
  common_mistake: Candidates often assume the shadow model must process every single frame (30 FPS) which
    would exceed hardware limits, or they fail to account for the baseline model's reserved TOPS before
    calculating the shadow model's throughput.
  napkin_math: '1. Remaining Compute: 26 TOPS (Total) - 14 TOPS (Model A) = 12 TOPS available for Model
    B.

    2. Model B Max FPS: 12 TOPS / 0.6 TOPS/frame = 20 FPS.

    3. Total Compute Utilized: 14 TOPS (A) + 12 TOPS (B) = 26 TOPS.

    4. Estimated Power: (26 TOPS used / 26 TOPS total) * 2.5W = 2.5 Watts.'
