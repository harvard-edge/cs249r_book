id: edge-exp2-impl-0427
title: Calculate Maximum Context Length on Jetson Orin
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying a 7-billion parameter transformer model on an NVIDIA Jetson Orin for real-time
  edge inference. The Orin is configured with its 60W TDP profile and features 32 GB of unified LPDDR5
  memory. The model weights are quantized to INT8 and occupy 7 GB, while the OS and other processes reserve
  4 GB. Given the model has 32 layers, 32 KV heads, and a head dimension of 128, calculate the maximum
  possible context length (in tokens) for a batch size of 1 assuming an FP16 KV cache.
details:
  realistic_solution: First, determine the available memory by subtracting the weights and OS reservations
    from the total 32 GB LPDDR5 memory. Then, calculate the memory required per token for the KV cache
    based on the model architecture and data type, and divide the available memory by this per-token cost.
  common_mistake: Candidates often miscalculate the KV cache size per token by forgetting to account for
    both Keys and Values (missing a factor of 2) or misinterpreting the bytes per parameter for FP16.
  napkin_math: 'Available Memory: 32 GiB (Total) - 7 GiB (INT8 weights) - 4 GiB (OS) = 21 GiB. KV cache
    per token: 2 (K & V) * 32 (layers) * 32 (heads) * 128 (head dim) * 2 bytes (FP16) = 524,288 bytes
    (0.5 MiB). Maximum context length: 21 GiB / 0.5 MiB per token = 22,548,578,304 bytes / 524,288 bytes
    = 43,008 tokens.'
