schema_version: 1
id: edge-exp2-impl-0090
title: Calculate Mmap Cold Start Latency on Jetson Orin
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You are deploying a 15 billion parameter vision-language model quantized to INT8 on an NVIDIA
  Jetson Orin to utilize its 275 TOPS compute capability. The device features 32 GB LPDDR5 memory and
  an Ampere GPU + DLA accelerator. To support multiple concurrent worker processes without duplicating
  RAM usage, you load the 15 GB weight file using memory mapping (`mmap`). Assuming the underlying NVMe
  storage has a sustained sequential read throughput of 2.5 GB/s, calculate the absolute minimum time
  required for the OS to page the entire model into the Jetson's memory during a cold start.
details:
  realistic_solution: The correct calculation isolates the storage bottleneck. Since the weights are not
    in RAM at cold start, the theoretical minimum time to fault them into the 32 GB LPDDR5 memory is strictly
    bounded by the NVMe sequential read speed. To mitigate this latency in production, engineers use flags
    like `MAP_POPULATE` or sequentially read the memory region during application startup to force page-ins
    before accepting live requests.
  common_mistake: Candidates often confuse the high bandwidth of the Jetson's LPDDR5 memory with the much
    slower NVMe storage bandwidth when calculating cold-start load times. They may also fail to realize
    that `mmap` lazily loads pages by default, meaning this 15 GB transfer happens via page faults upon
    first access unless explicitly pre-fetched.
  napkin_math: Model size = 15 billion parameters * 1 byte (INT8) = 15 GB. NVMe read throughput = 2.5
    GB/s. Minimum cold start latency = 15 GB / 2.5 GB/s = 6.0 seconds. The 32 GB LPDDR5 is large enough
    to hold the memory-mapped weights, but the 6-second IO bottleneck must be completed before the Ampere
    GPU and DLA can begin inference at full speed.
