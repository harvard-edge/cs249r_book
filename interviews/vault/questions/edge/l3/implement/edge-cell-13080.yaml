schema_version: 1
id: edge-cell-13080
title: 'Edge Systolic Array Implement: GOPS to FPS Conversion for Edge Models'
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'Calculate FPS achievable for YOLOv5s (7.2 GOPS INT8, 7.2M params) on: (1) Hailo-8 (26 TOPS
  INT8, 2.5W), (2) Jetson Orin (275 TOPS INT8, 60W), (3) Coral Edge TPU (4 TOPS INT8, 2W). For each, determine
  if compute or memory bound, and give the energy cost per frame in mJ.'
details:
  realistic_solution: 'YOLOv5s: 7.2 GOPS, 7.2MB INT8 weights. Activation BW ≈ 15MB per inference (estimate).
    Total BW ≈ 22MB. Hailo-8: compute=7.2G/26T=0.277ms, mem=22MB/6GB/s=3.67ms. BW bound. FPS=1000/3.67=273.
    Energy=2.5W*3.67ms=9.2mJ. Jetson Orin: compute=7.2G/275T=0.026ms, mem=22MB/102.4GB/s=0.215ms. BW bound.
    FPS=1000/0.215=4651. Energy=60W*0.215ms=12.9mJ. Coral: compute=7.2G/4T=1.8ms, mem=22MB/4GB/s=5.5ms.
    BW bound. FPS=1000/5.5=182. Energy=2W*5.5ms=11mJ.'
  common_mistake: Dividing TOPS by GOPS directly (FPS = TOPS*1000/GOPS) without checking memory bandwidth
    as the actual bottleneck, and reporting theoretical peak FPS instead of achievable FPS.
  napkin_math: 'BW per inference: 7.2MB weights + 15MB activations = 22MB. Hailo FPS: 1000ms/3.67ms=273.
    Jetson FPS: 1000/0.215=4651. Coral FPS: 1000/5.5=182. Energy/frame: Hailo=9.2mJ, Jetson=12.9mJ, Coral=11mJ.
    Energy ranking: Hailo (best), Coral, Jetson. Throughput: Jetson (best), Hailo, Coral. For battery
    deployment at P99<50ms: Hailo preferred. For datacenter edge: Jetson. Budget: Coral cheapest (~$25).
    Hailo per-frame FPS utilization: actual 273 vs theoretical 26T/7.2G=3611 FPS → 7.6% MFU. All chips
    dramatically underutilized due to memory bandwidth.'
