schema_version: 1
id: edge-fill-00102
title: Quantized Conv Layer Performance on Google Coral Edge TPU
topic: systolic-dataflow
status: published
provenance: imported
scenario: You're optimizing an INT8 quantized CNN for deployment on a Google Coral Edge TPU. The device
  offers 4 TOPS for INT8 operations with a 2W power budget. Consider a crucial convolutional layer with
  an input feature map of `32x32x128` (Height x Width x Input Channels), applying `256` filters of size
  `3x3`. Assuming a perfectly efficient weight-stationary systolic array execution, neglecting data movement
  overheads and only considering MAC operations, what is the theoretical minimum time (in milliseconds)
  needed to compute this layer on the Edge TPU?
details:
  realistic_solution: 'The solution involves first determining the output feature map dimensions. For
    a 32x32 input and 3x3 kernel, assuming stride 1 and no padding, the output is 30x30. Next, calculate
    the total MAC operations: (Output_Height * Output_Width * Output_Channels) * (Kernel_Height * Kernel_Width
    * Input_Channels). Then, divide the total MACs by the Edge TPU''s throughput (4 TOPS, which is 4 *
    10^12 MACs/second for INT8) to get the time in seconds, and finally convert to milliseconds. This
    highlights a theoretical performance upper bound.'
  common_mistake: Candidates often miscalculate the total number of Multiply-Accumulate (MAC) operations
    for the convolution layer or incorrectly convert TOPS (Tera Operations Per Second) to MACs per second.
    They might also forget to convert the final time to milliseconds or make assumptions about padding/stride
    if not explicitly stated, leading to incorrect output feature map dimensions.
  napkin_math: '1. Output Feature Map Size (assuming stride=1, padding=0): (32-3+1) x (32-3+1) = 30x30.

    2. Total MACs = (30 * 30 * 256) * (3 * 3 * 128) = 900 * 256 * 9 * 128 = 265,420,800 MACs.

    3. Edge TPU Throughput = 4 TOPS = 4 * 10^12 MACs/second.

    4. Time = Total MACs / Throughput = 265,420,800 / (4 * 10^12) seconds = 0.0000663552 seconds.

    5. Time in milliseconds = 0.0000663552 * 1000 ms = 0.0663552 ms.'
