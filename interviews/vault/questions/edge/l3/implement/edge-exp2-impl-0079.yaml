schema_version: 1
id: edge-exp2-impl-0079
title: Edge TPU Encoder-Decoder Throughput Calculation
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are deploying a lightweight sequence-to-sequence model on a Google Coral Edge TPU (4 TOPS
  INT8, 2W). The model's encoder requires 15 Giga-Operations (GOPS) to process a standard input prompt,
  while the autoregressive decoder requires 2 GOPS per generated token. Assuming all operators are supported
  and fully quantized to INT8, calculate the maximum achievable throughput (inferences per second) if
  every request generates exactly 20 output tokens at 100% compute utilization.
details:
  realistic_solution: The total compute required per inference is the sum of the one-time encoder processing
    and the iterative decoding for all output tokens. Once the total operations per inference is found,
    divide the total compute capacity of the Coral Edge TPU by this per-inference cost to find the maximum
    theoretical throughput in inferences per second.
  common_mistake: Candidates often forget that the decoder operates autoregressively and multiply the
    decoder cost incorrectly, or they fail to convert TOPS (Tera-Operations Per Second) to GOPS (Giga-Operations
    Per Second) properly. Some also mistakenly factor in the 2W power consumption into the latency calculation
    instead of treating it as an environmental constraint.
  napkin_math: '1. Calculate per-inference compute: Encoder = 15 GOPS. Decoder = 20 tokens * 2 GOPS/token
    = 40 GOPS. Total = 15 + 40 = 55 GOPS per inference. 2. Convert Coral Edge TPU compute capacity: 4
    TOPS = 4000 GOPS. 3. Calculate maximum throughput: 4000 GOPS / 55 GOPS/inference = 72.72 inferences
    per second.'
