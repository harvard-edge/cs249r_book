id: edge-exp-impl-0130
title: Hardware-Aware NAS Latency Bound on Qualcomm Cloud AI 100
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are designing a hardware-aware Neural Architecture Search (NAS) pipeline for a fleet of
  Qualcomm Cloud AI 100 accelerators deployed on-premise. The accelerator provides 400 TOPS (INT8) at
  a 75W TDP and has 32 GB of LPDDR4x memory. During the search phase, your NAS controller needs to rapidly
  estimate the latency of candidate architectures to prune the search space. Assuming an ideal compute-bound
  workload with 100% utilization and ignoring memory bandwidth bottlenecks for this specific estimation
  step, calculate the expected latency for a candidate model requiring 800 Giga-Operations (GOPs) in INT8.
details:
  realistic_solution: The candidate should identify that the peak throughput is 400 TOPS, which equals
    400,000 GOPs (Giga-Operations per second). By dividing the total operations required by the candidate
    model by the peak throughput, they can estimate the absolute minimum theoretical latency. This provides
    a fast, quantifiable lower bound for the NAS controller to immediately reject models that violate
    strict latency constraints.
  common_mistake: Candidates often miscalculate the unit conversions between Giga (10^9) and Tera (10^12),
    leading to order-of-magnitude errors in the latency estimate, or they fail to provide a concrete numerical
    answer.
  napkin_math: 'Compute required: 800 GOPs (800 * 10^9 operations). Peak throughput: 400 TOPS = 400,000
    GOPs (400 * 10^12 operations/second). Minimum Latency = Total Operations / Throughput = 800 / 400,000
    seconds = 0.002 seconds = 2 milliseconds.'
