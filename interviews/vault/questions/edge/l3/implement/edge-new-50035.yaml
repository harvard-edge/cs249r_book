schema_version: 1
id: edge-new-50035
title: Power-Aware Runtime Selection on Jetson Orin Power Profiles
topic: software-portability
status: published
provenance: imported
scenario: 'Jetson Orin AGX has multiple power profiles: MAXN (60W, all cores active), 50W, 30W, and 15W.
  Your inference service must adapt its model backend when the power profile changes (e.g., battery mode
  switches from 60W to 15W). Design the runtime adaptation strategy.'
details:
  realistic_solution: 'Pre-build TensorRT engines for each power profile since optimal layer fusion and
    workspace allocation differ at each performance point. At 60W: use the full model with FP16, batch=8,
    2 CUDA streams. At 30W: same model but batch=4, 1 CUDA stream (reduced memory bandwidth). At 15W:
    switch to a smaller model variant with INT8, batch=1, and enable DLA for suitable layers (DLA is more
    power-efficient than GPU at low power). Use nvpmodel change events to trigger engine swaps. Pre-warm
    each engine at boot to avoid cold-start latency.'
  common_mistake: Only scaling the model (e.g., switching from YOLOv8-large to YOLOv8-small) without also
    adjusting the runtime configuration. At 15W, GPU frequency drops from 1.3GHz to 624MHz — the same
    TensorRT engine's thread/stream configuration should also change.
  napkin_math: '60W profile: ~275 TOPS INT8 GPU + 118 TOPS DLA. 15W profile: ~45 TOPS INT8 GPU + 40 TOPS
    DLA. 6x compute reduction. If latency budget is 33ms (30fps): at 60W you can run YOLOv8-L (52 GFLOPS),
    at 15W only YOLOv8-N (4.3 GFLOPS).'
