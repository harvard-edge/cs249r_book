schema_version: 1
id: edge-exp-impl-0113
title: Energy Cost of INT8 MACs on Google Coral
topic: energy-per-operation
status: published
provenance: imported
scenario: You are deploying an object detection model to a Google Coral Edge TPU. The spec sheet states
  the accelerator consumes 2W of power while delivering peak throughput of 4 TOPS for INT8 operations.
  The model requires 10 billion INT8 MACs (Multiply-Accumulate operations) per inference. Calculate the
  energy consumed per single INT8 MAC operation in picojoules (pJ), and the total compute energy consumed
  per inference in millijoules (mJ), assuming the device operates at peak efficiency.
details:
  realistic_solution: The correct approach is to first determine the energy per single operation by dividing
    the total power by the operations per second. Then, multiply by 2 to find the energy per MAC. Finally,
    multiply the energy per MAC by the total number of MACs per inference to get the total energy.
  common_mistake: Candidates often forget that a single MAC consists of two operations (one multiply and
    one add), leading to an energy estimate that is off by a factor of 2. They may also struggle with
    unit conversions between Tera, pico, and milli.
  napkin_math: 1. Power = 2W = 2 Joules/second. 2. Throughput = 4 TOPS = 4 * 10^12 Operations/second.
    3. Energy per Operation = Power / Throughput = 2 / (4 * 10^12) J = 0.5 * 10^-12 J = 0.5 pJ. 4. Energy
    per MAC = 0.5 pJ/OP * 2 OPs/MAC = 1.0 pJ/MAC. 5. Energy per inference = 10 * 10^9 MACs * 1.0 pJ/MAC
    = 10 * 10^-3 J = 10 mJ.
