schema_version: 1
id: edge-exp-impl-0118
title: Compiler Graph Break Latency Overhead
topic: graph-compilation
status: published
provenance: imported
scenario: You are compiling a semantic segmentation model for the Hailo-8, a 2.5W dataflow accelerator
  that achieves 26 TOPS INT8 but has no local DRAM, meaning it must stream all data directly from host
  memory. During operator lowering, the framework compiler encounters an unsupported custom activation
  layer, forcing a graph break. The first compiled subgraph must write its intermediate 1024x1024x64 INT8
  feature map back to host memory, and the second subgraph must subsequently read it back. If the effective
  host bandwidth for streaming is 2.0 GB/s in each direction, what is the total latency overhead added
  purely by this failure to fuse operators?
details:
  realistic_solution: The correct approach recognizes that the dataflow architecture of the Hailo-8 requires
    intermediate tensors at partition boundaries to be entirely flushed to and fetched from host memory.
    The candidate must calculate the raw tensor size and divide by the streaming bandwidth for both the
    write and the read.
  common_mistake: Candidates often forget that a graph break on an accelerator without local DRAM requires
    a full round trip to host memory (both a write and a subsequent read). They might only calculate a
    single transfer or forget that INT8 values are 1 byte each.
  napkin_math: 'Tensor volume: 1024 * 1024 * 64 = 67,108,864 elements. Data size: 67,108,864 elements
    * 1 byte/element (INT8) = 64 MB. Write latency to host: 64 MB / 2000 MB/s = 32 ms. Read latency from
    host: 64 MB / 2000 MB/s = 32 ms. Total graph break latency penalty = 32 ms + 32 ms = 64 ms.'
