schema_version: 1
id: edge-fill-00201
title: Hailo-8 Memory Bandwidth for Convolution Layer
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: "Consider an INT8 convolutional neural network inference running on the Hailo-8 AI processor,\
  \ which is rated for 26 TOPS (INT8) and uses LPDDR4 memory. \nFor a specific 3x3 convolution layer operating\
  \ on 128 input channels, producing 256 output channels, with input feature maps of 32x32 pixels:\n\n\
  1.  Calculate the total number of INT8 MAC operations for this layer.\n2.  If this layer were to complete\
  \ all its operations in just 1 millisecond, what would be the *minimum sustained memory bandwidth* (in\
  \ GB/s) required for *fetching input activations* from LPDDR4 DRAM? Assume:\n    *   All weights for\
  \ the layer are pre-loaded and reside entirely in on-chip SRAM.\n    *   Each activation is an INT8\
  \ value.\n    *   Due to on-chip caching and dataflow, each input activation byte fetched from LPDDR4\
  \ is reused, on average, 4 times by the processing elements (i.e., a data reuse factor of 4 for input\
  \ activations).\n3.  Given the Hailo-8's typical LPDDR4 peak bandwidth is around 68 GB/s, would this\
  \ layer (under the 1ms execution time assumption) be compute-bound or memory-bound *for input activation\
  \ fetches*?"
details:
  realistic_solution: "1.  **Total INT8 MAC Operations:**\n    *   `Ops = (kernel_height * kernel_width\
    \ * input_channels) * output_channels * (output_feature_map_height * output_feature_map_width)`\n\
    \    *   Assuming the output feature map size is the same as input (e.g., due to 'SAME' padding):\
    \ `32x32`\n    *   `Ops = (3 * 3 * 128) * 256 * (32 * 32)`\n    *   `Ops = 1152 * 256 * 1024 = 301,989,888`\
    \ INT8 MAC operations.\n\n2.  **Minimum Sustained Memory Bandwidth for Input Activations (1ms execution):**\n\
    \    *   Total activation bytes required for the operations, considering reuse: `Total MAC Operations\
    \ / Activation Reuse Factor`\n    *   `Bytes to fetch from DRAM = 301,989,888 MACs / 4 (reuse factor)\
    \ = 75,497,472` bytes.\n    *   Execution time = 1 ms = 0.001 seconds.\n    *   Required Bandwidth\
    \ (BW) = `Bytes to fetch / Execution Time`\n    *   `BW = 75,497,472 bytes / 0.001 s = 75,497,472,000\
    \ bytes/s`\n    *   `BW ≈ 75.5 GB/s`.\n\n3.  **Compute-bound or Memory-bound:**\n    *   The calculated\
    \ required bandwidth for input activation fetches (75.5 GB/s) is greater than the Hailo-8's typical\
    \ LPDDR4 peak bandwidth (68 GB/s).\n    *   Therefore, *for input activation fetches under these assumptions*,\
    \ this layer would be **memory-bound**. The compute engine would likely be stalled, waiting for data\
    \ to be transferred from DRAM."
  common_mistake: Common mistakes include not properly accounting for the data reuse factor, miscalculating
    the total number of operations, or forgetting to convert units (e.g., bytes/ms to GB/s). Another oversight
    might be to not explicitly state the assumption that only input activations are fetched, ignoring
    output write bandwidth or intermediate results.
  napkin_math: '1.  `Total MACs ≈ (9 * 128 * 256 * 1024) ≈ 300 Million MACs`

    2.  `Bytes from DRAM for activations ≈ 300 M MACs / 4 (reuse) = 75 Million bytes`

    3.  `Execution Time = 1 ms = 0.001 s`

    4.  `BW_required ≈ 75 M bytes / 0.001 s = 75 * 10^9 bytes/s = 75 GB/s`

    5.  `75 GB/s (Required) > 68 GB/s (Hailo-8 LPDDR4)` -> **Memory-bound** for input activation fetches.'
