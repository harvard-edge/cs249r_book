id: edge-exp2-impl-0106
title: Calculate Sustained FPS Under Enclosure Thermal Limits
topic: thermal-management
status: published
provenance: imported
scenario: You are deploying a real-time tracking model on an NVIDIA Jetson Orin mounted in an unventilated,
  passively cooled outdoor enclosure. At its peak 60W TDP, the Ampere GPU and DLA accelerator provide
  275 TOPS INT8. Your model requires exactly 2 TOPS per inference. The enclosure's thermal resistance
  only allows it to safely dissipate 30W of heat continuously before the SoC thermally throttles and clocks
  down unpredictably. Assuming power consumption scales linearly with INT8 throughput, calculate the maximum
  sustained frames per second (FPS) you can process indefinitely without hitting the thermal limit.
details:
  realistic_solution: The system's power profile must be clamped in software to match the 30W continuous
    thermal dissipation limit of the enclosure. This ensures deterministic, sustained performance over
    time rather than rapid cycling between burst speeds and heavily throttled states.
  common_mistake: Candidates often design for the peak burst performance of 275 TOPS and assume the system
    can run continuously at that rate, ignoring the 30W physical dissipation limit of the enclosure which
    will quickly lead to severe thermal throttling.
  napkin_math: Peak Performance = 275 TOPS at 60W TDP. Sustained Power Limit = 30W. Power Ratio = 30W
    / 60W = 0.5. Sustained Performance = 275 TOPS * 0.5 = 137.5 TOPS. Cost per frame = 2 TOPS. Maximum
    Sustained FPS = 137.5 TOPS / 2 TOPS = 68.75 FPS.
