schema_version: 1
id: edge-fill-01278
title: Real-time Data Drift Detection on Google Coral Edge TPU
topic: distribution-drift-detection
status: published
provenance: imported
scenario: A smart factory deploys a real-time visual inspection system on Google Coral Edge TPUs (4 TOPS
  INT8, 2W, INT8 only). Each TPU runs a trained INT8 quantized classification model to identify defective
  components on an assembly line. The factory observes a recent increase in false negatives, suspecting
  data drift due to gradual changes in ambient lighting or camera sensor degradation. The engineering
  team needs a method to detect this data drift directly on the Edge TPU using statistical methods like
  Population Stability Index (PSI) or KL Divergence, without sending all raw data to the cloud for analysis.
details:
  realistic_solution: To detect data drift on the Coral Edge TPU, select a critical, low-dimensional model
    output (e.g., the confidence score of the predicted class or an activation from a specific internal
    layer). Discretize the range of this feature into a predefined number of bins. On the Edge TPU, maintain
    counts of inferences falling into each bin for both a 'current' window and a 'baseline' reference
    window. Compare these binned distributions using integer arithmetic. For example, calculate a simplified
    PSI proxy by comparing normalized bin counts (proportions) and leveraging a pre-computed, quantized
    lookup table for logarithmic terms, or a simpler metric like Total Variation Distance (sum of absolute
    differences of proportions) if log operations are completely prohibitive.
  common_mistake: Attempting to send all raw input data to a central server for drift detection, leading
    to high latency, bandwidth consumption, and defeating the purpose of edge processing. Another common
    mistake is trying to perform complex floating-point statistical calculations directly on the INT8-only
    Edge TPU, which is not designed for such operations.
  napkin_math: 'Given a model output discretized into ''k'' bins, let ''C_i'' be the count of current
    inferences in bin ''i'', and ''B_i'' be the count from a baseline. Total current inferences ''N_c
    = sum(C_i)'', total baseline ''N_b = sum(B_i)''.

    The Population Stability Index (PSI) is classically defined as: PSI = Sum_{i=1 to k} [((C_i / N_c)
    - (B_i / N_b)) * ln((C_i / N_c) / (B_i / N_b))].

    On an INT8-only Coral Edge TPU, direct floating-point ''ln'' calculations are infeasible. A pragmatic
    approach involves:

    1. Calculate scaled proportions: P_c_i = (C_i * 1000) / N_c and P_b_i = (B_i * 1000) / N_b using integer
    arithmetic (e.g., multiply by 1000 to retain precision before division).

    2. Compute ''Diff_i = P_c_i - P_b_i''.

    3. Instead of ''ln(Ratio_i)'', approximate the PSI component by using pre-computed integer lookup
    tables for ''f(x) = x * ln(x)'' for relevant scaled ratios, or use a simpler metric like Sum_{i=1
    to k} |Diff_i| to detect distributional shifts.'
