schema_version: 1
id: edge-exp-impl-0117
title: Calculate Fallback Model Size for Coral TPU
topic: graceful-degradation
status: published
provenance: imported
scenario: You are designing a fail-operational pedestrian detection system on a Google Coral Edge TPU
  (4 TOPS INT8, 2W). The primary model uses 80 GOps per frame at 30 FPS. During a severe thermal event,
  the system must trigger a graceful degradation ladder, capping the Coral's power limit to 1W and reducing
  its theoretical compute capacity to 2 TOPS. Assuming your INT8 models achieve exactly 50% hardware utilization
  of the theoretical peak compute, calculate the maximum allowable computational cost (in GOps per frame)
  for a fallback model to maintain a minimum degraded processing rate of 20 FPS.
details:
  realistic_solution: The correct approach calculates the actual effective operations per second available
    under the thermally degraded power state, and then divides that budget by the required degraded frame
    rate. The system must seamlessly switch to a simpler INT8-quantized fallback model that guarantees
    execution within this newly constrained compute envelope, shedding quality-of-service without failing
    completely.
  common_mistake: Candidates often forget to account for the realistic hardware utilization factor (50%)
    and calculate the per-frame budget based on the theoretical 2 TOPS peak. They may also confuse operations
    per second with operations per frame, or fail to account for the requirement that the Coral only supports
    INT8 operations.
  napkin_math: '1. Degraded theoretical compute = 2 TOPS = 2000 GOps/second.

    2. Effective available compute = 2000 GOps/second * 0.50 (utilization) = 1000 GOps/second.

    3. Target fail-operational frame rate = 20 FPS.

    4. Max fallback model cost = 1000 GOps/second / 20 FPS = 50 GOps per frame.'
