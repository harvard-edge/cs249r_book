schema_version: 1
id: edge-exp-impl-0007
title: Hailo-8 Host Memory Bandwidth for Data Logging
topic: storage-format-selection
status: published
provenance: imported
scenario: You are deploying a continuous monitoring vision system using a Hailo-8 accelerator (26 TOPS
  INT8, 2.5W). Because the Hailo-8 has no local DRAM, it streams dataflow graph weights and activations
  directly from host memory, consuming a steady 2.5 GB/s of the host's 4.0 GB/s total memory bandwidth.
  The system must simultaneously log raw 2 MB image frames to disk for active learning. Calculate the
  maximum logging FPS using an uncompressed row format, and compare it to a compressed TFRecord format
  that reduces frame size by 4x but adds a 200 MB/s memory bandwidth overhead for the compression task.
details:
  realistic_solution: The correct approach evaluates the remaining host memory bandwidth after the Hailo-8's
    dataflow streaming requirements are met. When evaluating the compressed TFRecord format, the memory
    bandwidth overhead of the compression algorithm must be subtracted from the available pool before
    calculating throughput. The optimal storage format maximizes logging rate while strictly respecting
    the shared memory constraints of the host system.
  common_mistake: Candidates often focus solely on storage space or CPU utilization, ignoring the critical
    memory bandwidth bottleneck. They frequently forget that the Hailo-8's lack of local DRAM means host
    memory bandwidth is tightly shared between the accelerator's streaming and the CPU's data compression
    tasks.
  napkin_math: 'Total Host Bandwidth: 4000 MB/s. Hailo-8 Streaming Bandwidth: 2500 MB/s. Remaining Bandwidth:
    1500 MB/s.

    Uncompressed Row Format (2 MB/frame): 1500 MB/s / 2 MB = 750 FPS.

    Compressed TFRecord Format (0.5 MB/frame): Remaining Bandwidth after 200 MB/s compression overhead
    = 1300 MB/s. Maximum FPS = 1300 MB/s / 0.5 MB = 2600 FPS.'
