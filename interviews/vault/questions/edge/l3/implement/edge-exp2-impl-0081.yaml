schema_version: 1
id: edge-exp2-impl-0081
title: Runtime Memory for 4-bit Weights on Edge TPU
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 10 million parameter vision model to a Google Coral Edge TPU, which operates
  under a strict 2W power budget and provides 4 TOPS of compute. To save storage space on the host device,
  the model weights were compressed using 4-bit quantization, occupying roughly 5 MB on disk. However,
  the Coral Edge TPU has limited operator support and strictly requires INT8 data formats for execution.
  Calculate the exact runtime memory footprint required for these weights once they are loaded into the
  Edge TPU for inference.
details:
  realistic_solution: The candidate must recognize that while 4-bit quantization is excellent for storage,
    the Edge TPU's systolic array strictly requires INT8 weights to achieve its 4 TOPS of performance.
    Therefore, the 4-bit weights must be unpacked to INT8 format before or during loading onto the device.
    Each parameter will consume exactly 1 byte (8 bits) of memory during inference. The solution requires
    calculating the memory based on the target INT8 execution precision rather than the 4-bit storage
    precision.
  common_mistake: Candidates often mistakenly assume the runtime memory footprint remains 5 MB, forgetting
    that the Edge TPU hardware cannot compute natively on 4-bit weights. Alternatively, they might assume
    the weights must be dequantized all the way back to FP32, resulting in a 40 MB footprint and ignoring
    the platform's native INT8 execution requirement.
  napkin_math: 'Total model parameters = 10,000,000. Execution precision required by Edge TPU = INT8.
    Memory per INT8 parameter = 1 byte (8 bits). Total runtime memory footprint = 10,000,000 parameters
    * 1 byte/parameter = 10,000,000 bytes. Converting to megabytes: 10,000,000 bytes / (1024 * 1024) =
    9.54 MB. The required memory footprint on the hardware is 9.54 MB.'
