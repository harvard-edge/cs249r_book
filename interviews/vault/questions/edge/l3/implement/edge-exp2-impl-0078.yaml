schema_version: 1
id: edge-exp2-impl-0078
title: DMA Overhead vs Compute on Cloud AI 100
topic: dma-data-movement
status: published
provenance: imported
scenario: You are deploying a high-resolution vision pipeline on an on-premise edge server equipped with
  a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The host system captures uncompressed
  4K video frames (3840x2160 resolution, 3 bytes per pixel RGB) and uses DMA to transfer a batch of 16
  frames to the accelerator over a PCIe link with an effective bandwidth of 12 GB/s. The INT8 model requires
  200 GOPS per frame to process. Assuming no pipelining between transfer and compute, calculate the host-to-device
  DMA transfer time, the ideal compute time, and the ratio of data movement time to compute time.
details:
  realistic_solution: To find the system bottleneck, we must quantify both the DMA transfer time and the
    compute time. By calculating the total payload size for the batch and dividing by the effective PCIe
    bandwidth, we get the transfer latency. Then, by dividing the total compute requirement by the accelerator's
    peak TOPS, we get the compute latency. Comparing the two reveals that data movement strictly dominates
    the end-to-end latency, which would prompt an edge engineer to implement host-side compression, lower-resolution
    inputs, or aggressive pipelining.
  common_mistake: Candidates often forget to account for the actual byte size of uncompressed 4K frames
    (calculating pixels but forgetting the 3 channels for RGB) or they mix up GB/s (gigabytes) with Gbps
    (gigabits). Another mistake is failing to realize that at 400 TOPS, the compute time for 200 GOPS
    per frame is extremely small, making the system entirely I/O bound.
  napkin_math: '1. Frame payload: 3840 * 2160 pixels * 3 bytes/pixel = 24,883,200 bytes (~24.88 MB).

    2. Batch payload: 16 frames * 24.88 MB = 398.08 MB.

    3. DMA Transfer time: 398.08 MB / 12,000 MB/s (12 GB/s effective PCIe bandwidth) = 0.03317 seconds
    (~33.17 ms).

    4. Total compute required: 16 frames * 200 GOPS/frame = 3200 GOPS = 3.2 TOPS.

    5. Compute time: 3.2 TOPS / 400 TOPS (Cloud AI 100 peak) = 0.008 seconds (8 ms).

    6. Ratio: Data movement (33.17 ms) to compute (8 ms) is roughly 4.15:1. The pipeline spends over 80%
    of its time moving data.'
