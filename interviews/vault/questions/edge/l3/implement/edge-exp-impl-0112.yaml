schema_version: 1
id: edge-exp-impl-0112
title: Encoder-Decoder Latency on Edge TPU
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: We are evaluating architectures for a sequence task on a Google Coral Edge TPU, which provides
  4 TOPS of INT8 compute at 2W. An INT8 quantized encoder-decoder model requires 10 Giga-Operations (GOPS)
  for the encoder pass and 2 GOPS per generated token in the decoder. Assuming 100% compute utilization
  and no memory bottlenecks, calculate the theoretical minimum inference latency in milliseconds for generating
  a 10-token output sequence.
details:
  realistic_solution: 'To find the theoretical minimum latency, we must first sum the total operations
    required for the entire sequence generation: one encoder pass plus ten decoder passes. We then convert
    the hardware''s processing rate to match units (GOPS) and divide total operations by this rate to
    find latency in seconds, finally converting to milliseconds.'
  common_mistake: Candidates often confuse Tera-Operations (TOPS) with Giga-Operations (GOPS) leading
    to incorrect order-of-magnitude calculations. They may also forget that decoder latency scales linearly
    with the number of generated tokens.
  napkin_math: 1. Encoder operations = 10 GOPS. 2. Decoder operations = 10 tokens * 2 GOPS/token = 20
    GOPS. 3. Total operations = 10 GOPS + 20 GOPS = 30 GOPS. 4. Hardware processing rate = 4 TOPS = 4,000
    GOPS. 5. Latency = Total Operations / Processing Rate = 30 GOPS / 4,000 GOPS/sec = 0.0075 seconds.
    6. Latency in milliseconds = 0.0075 * 1000 = 7.5 ms.
