schema_version: 1
id: edge-cell-12008
title: 'Latency Decomposition: Compute Prefill Latency for Edge LLM on Jetson Orin'
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a 1B-parameter language model (INT8 quantized) on Jetson Orin (32GB LPDDR5,
  275 TOPS INT8, 60W) for on-device text completion. Compute the prefill latency for a 128-token prompt
  and the decode latency per token. Assume 32 transformer layers, hidden dim 2048, and the model fits
  entirely in LPDDR5.
details:
  realistic_solution: '512 GFLOP (INT8) model on Jetson Orin at 275 TOPS: theoretical minimum 1.86ms,
    realistic ~3ms at 60% utilization.'
  common_mistake: Using peak 275 TOPS without applying a realistic utilization factor, and forgetting
    that LPDDR5 bandwidth (204 GB/s on Jetson Orin) limits decode throughput.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 512 GFLOPs (INT8). Inference time: 512G / 275T = 1.86ms.
    At 60% utilization: 512G / (275T × 0.6) = 3.1ms. Consistent with 512 GFLOPs throughout (not mixing
    GFLOPS and TOPS scales).'
