schema_version: 1
id: edge-exp2-impl-0094
title: CPU Fallback Bottleneck on Edge TPU
topic: model-format-conversion
status: published
provenance: imported
scenario: You are converting a CNN to a fully quantized INT8 TFLite model for deployment on a Google Coral
  Edge TPU (4 TOPS INT8, 2W). The model requires exactly 10 GOPS (Giga Operations) per inference. Due
  to limited operator support, a conversion gap causes 20% of the compute operations to fall back to the
  host CPU via delegation. If the host CPU has a maximum throughput of 100 GOPS for these operations,
  calculate the theoretical maximum frame rate (FPS) assuming sequential execution and negligible memory
  transfer overhead.
details:
  realistic_solution: The correct approach involves calculating the individual execution times for both
    the TPU and CPU partitions, then summing them to find the true bottleneck. In practice, an ML engineer
    would profile this and replace the unsupported operations in the source model with TPU-compatible
    equivalents to avoid the host CPU delegation entirely.
  common_mistake: Candidates often calculate the FPS using only the Edge TPU's 4 TOPS specification (resulting
    in 400 FPS) and completely ignore the severe bottleneck introduced by the operator fallback to the
    slower host CPU.
  napkin_math: '1. Convert Edge TPU throughput: 4 TOPS = 4000 GOPS. 2. Calculate TPU portion: 80% of 10
    GOPS = 8 GOPS. Time on TPU = 8 / 4000 = 0.002s (2ms). 3. Calculate CPU portion: 20% of 10 GOPS = 2
    GOPS. Time on CPU = 2 / 100 = 0.02s (20ms). 4. Total inference time = 2ms + 20ms = 22ms. 5. Maximum
    FPS = 1 / 0.022s ≈ 45.45 FPS.'
last_modified: '2026-04-01'
