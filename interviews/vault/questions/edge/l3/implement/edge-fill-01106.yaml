id: edge-fill-01106
title: Coral Edge TPU Fleet Sizing and Load Balancing for Real-time Inference
topic: load-balancing
status: published
provenance: imported
scenario: 'You are designing a distributed inference system using Google Coral Edge TPUs. Each TPU offers
  4 TOPS (INT8) and consumes 2W of power. Your deployed INT8 quantized model requires 0.5 TOPs of computation
  per inference. The system needs to sustain an average throughput of 800 inferences per second. To account
  for various factors like latency, network overhead, and burst capacity, you decide that each TPU should
  operate at no more than 70% of its theoretical maximum inference capacity.


  Calculate the following:

  1. The maximum number of inferences per second a single Coral Edge TPU can theoretically handle for
  this model.

  2. The minimum number of Coral Edge TPUs required in your fleet to meet the anticipated average request
  rate of 800 inferences/second, given the 70% utilization target.

  3. The total power consumption of the deployed fleet.'
details:
  realistic_solution: A robust solution involves calculating the effective inference capacity per TPU
    by factoring in a realistic utilization target (e.g., 70%). Then, determine the total number of TPUs
    needed based on the desired aggregate throughput. Implement a dynamic load balancing strategy (e.g.,
    weighted round-robin or consistent hashing) that incorporates real-time TPU health, current load,
    and the utilization ceiling. Continuously monitor fleet performance and adjust scaling or routing
    algorithms as needed to maintain optimal throughput and power efficiency while also considering the
    overall power budget.
  common_mistake: Overlooking practical utilization limits (e.g., software overhead, network latency,
    system-level inefficiencies) can lead to underprovisioning or performance degradation during peak
    loads. Another common error is solely relying on raw TOPS figures without considering actual model
    computational requirements or power constraints, leading to incorrect capacity planning.
  napkin_math: 'Given:

    - TPU performance: 4 TOPS (INT8)

    - TPU power consumption: 2W

    - Model requirement: 0.5 TOPs/inference

    - Target average throughput: 800 inferences/second

    - Target TPU utilization: 70% (0.7)


    Calculations:

    1.  **Theoretical Inferences/second per TPU**: (4 TOPS / 0.5 TOPs/inference) = 8 inferences/second

    2.  **Effective Inferences/second per TPU (at 70% utilization)**: 8 inferences/second * 0.70 = 5.6
    inferences/second

    3.  **Minimum TPUs required**: (800 inferences/second) / (5.6 inferences/second/TPU) ≈ 142.86. Round
    up to the nearest whole number to ensure capacity: 143 Coral Edge TPUs.

    4.  **Total Power Consumption of the fleet**: 143 TPUs * 2W/TPU = 286W.'
