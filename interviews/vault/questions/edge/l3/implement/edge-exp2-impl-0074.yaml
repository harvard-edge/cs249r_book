schema_version: 1
id: edge-exp2-impl-0074
title: Data Bottleneck on Qualcomm AI 100
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a high-throughput defect detection pipeline on an on-premise server utilizing
  a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8). The quantized INT8 vision model
  requires exactly 100 GOPS per forward pass. Uncompressed 1080p RGB image frames (6 MB each) are sequentially
  loaded from the host memory to the accelerator over a PCIe link with an effective sustained bandwidth
  of 12 GB/s. Calculate the theoretical maximum pipeline throughput in frames per second (FPS) and identify
  the specific bottleneck.
details:
  realistic_solution: The correct approach evaluates both the compute-bound throughput and the IO-bound
    throughput, selecting the limiting factor. Because data transfer limits throughput to half of the
    compute capacity, the realistic solution involves transferring compressed formats (like JPEG or H.264)
    and decoding on the accelerator, or aggressively downsampling the frames on the host before PCIe transfer.
  common_mistake: Candidates often immediately divide the 400 TOPS by the 100 GOPS requirement, arriving
    at 4000 FPS, without checking the data loading constraints. They fail to apply the data pipeline equation
    and ignore the IO bottleneck created by moving large uncompressed frames.
  napkin_math: 'Compute-bound limit: 400 TOPS (400,000 GOPS) / 100 GOPS per frame = 4,000 FPS. IO-bound
    limit: 12 GB/s (12,000 MB/s) / 6 MB per frame = 2,000 FPS. The system is data-transfer-bound at 2,000
    FPS, leaving 50% of the INT8 TOPS unutilized.'
