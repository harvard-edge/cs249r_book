schema_version: 1
id: edge-exp-impl-0127
title: Edge TPU Operator Fallback Latency
topic: model-format-conversion
status: published
provenance: imported
scenario: 'You are preparing a custom CNN for deployment on a Google Coral Edge TPU (4 TOPS INT8, 2W).
  The model requires 2 billion MACs per inference. After converting the model to TFLite and applying full
  INT8 quantization, the compiler reports an operator coverage gap: 90% of the operations (by MAC count)
  will execute on the Edge TPU, while the remaining 10% are unsupported and will delegate back to the
  host CPU. If the host CPU can process INT8 operations at 0.1 TOPS, calculate the theoretical minimum
  inference latency for the model, assuming strictly sequential execution and zero memory transfer overhead.'
details:
  realistic_solution: Because the unsupported operators trigger a fallback, the execution is sequential
    between the TPU and CPU. You must calculate the latency for the TPU portion and the CPU portion separately
    and sum them. First, convert the MACs to total Operations. Then, allocate the operations based on
    the compiler's 90/10 split, and divide each by the respective processor's peak throughput to find
    the bottlenecked latency.
  common_mistake: Candidates often calculate an 'average TOPS' based on the percentages, or they calculate
    throughput instead of latency for sequential execution. A very common error is forgetting that 1 MAC
    equals 2 Operations, which is essential when dividing by TOPS (Trillion Operations Per Second).
  napkin_math: 'Total OPs = 2 billion MACs * 2 = 4 billion OPs (0.004 TOPS).

    TPU OPs = 0.90 * 0.004 TOPS = 0.0036 TOPS.

    CPU OPs = 0.10 * 0.004 TOPS = 0.0004 TOPS.

    TPU Latency = 0.0036 TOPS / 4 TOPS = 0.0009 seconds = 0.9 ms.

    CPU Latency = 0.0004 TOPS / 0.1 TOPS = 0.0040 seconds = 4.0 ms.

    Total Latency = 0.9 ms + 4.0 ms = 4.9 ms (meaning the 10% CPU fallback accounts for over 80% of the
    total latency).'
