schema_version: 1
id: edge-exp2-impl-0105
title: Dataflow Latency and Energy on AI 100
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are mapping an INT8 linear layer (Batch*Seq=1024, In_Features=8192, Out_Features=8192) onto
  an on-premise Qualcomm Cloud AI 100 accelerator. The platform features 32 GB LPDDR4x memory, 400 TOPS
  INT8 peak compute, and operates at a 75W TDP. Using a weight-stationary dataflow with spatial tiling
  to optimize LPDDR4x accesses, your mapping achieves an 80% sustained utilization of the peak compute.
  Calculate the expected execution latency in milliseconds and the energy consumed in millijoules for
  this single layer.
details:
  realistic_solution: First, calculate the total INT8 operations for the matrix multiplication layer.
    Then, determine the effective compute throughput by applying the 80% utilization factor to the peak
    TOPS. Finally, divide the total operations by the effective throughput to find latency, and multiply
    by the 75W TDP to find the energy consumption.
  common_mistake: Candidates often forget to multiply MACs by 2 to get total operations, miscalculate
    the prefix scales (Giga vs. Tera), or fail to apply the 80% utilization factor to the peak TOPS before
    calculating latency.
  napkin_math: '1. Total MACs = 1024 * 8192 * 8192 = 68.719 billion MACs.

    2. Total INT8 Ops = 68.719B * 2 = 137.438 GOPs (Giga-Operations).

    3. Effective Compute = 400 TOPS * 0.80 = 320 TOPS = 320,000 GOPs.

    4. Latency = 137.438 GOPs / 320,000 GOPs = 0.0004295 seconds = 0.43 ms.

    5. Energy = 0.0004295 s * 75 W = 0.0322 Joules = 32.2 mJ.'
