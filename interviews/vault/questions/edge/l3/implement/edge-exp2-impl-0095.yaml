schema_version: 1
id: edge-exp2-impl-0095
title: Jetson Orin LLM Memory Footprint
topic: model-size-estimation
status: published
provenance: imported
scenario: We are porting a 15 billion parameter language model to an NVIDIA Jetson Orin platform for a
  robotics application. The Jetson Orin features 32 GB of LPDDR5 shared memory and an Ampere GPU capable
  of 275 TOPS INT8. We will use INT8 quantization for the model weights. The robotic control stack and
  OS permanently reserve 8 GB of memory. Calculate the exact memory required to load the model weights,
  and quantify the remaining memory available for the KV cache and dynamic activations.
details:
  realistic_solution: The candidate needs to correctly map 1 INT8 parameter to 1 byte, calculate the total
    weight size in gigabytes, and then subtract both the OS reserved memory and the weight memory from
    the total 32 GB hardware limit to find the remaining capacity.
  common_mistake: Candidates often miscalculate INT8 weight size by confusing bits and bytes. They also
    frequently forget that the 32 GB memory on the Orin is unified and shared with the CPU, failing to
    subtract the 8 GB reserved for the system stack before calculating remaining capacity.
  napkin_math: 1 parameter in INT8 = 1 byte. Weight footprint = 15 billion parameters * 1 byte = 15 GB.
    Total Orin memory = 32 GB LPDDR5. Available memory for model = 32 GB - 8 GB (OS/stack) = 24 GB. Remaining
    memory for KV cache and activations = 24 GB - 15 GB = 9 GB.
