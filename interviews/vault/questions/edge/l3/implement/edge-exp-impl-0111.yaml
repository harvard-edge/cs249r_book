schema_version: 1
id: edge-exp-impl-0111
title: DMA Transfer Latency Calculation for 4K Video Batches
topic: dma-data-movement
status: published
provenance: imported
scenario: You are deploying a high-throughput defect detection system on an on-premise edge server equipped
  with a 75W Qualcomm Cloud AI 100 accelerator. The host system receives uncompressed 4K RGB video frames
  (3840x2160 pixels, 3 channels) and batches 8 frames together before sending them to the accelerator's
  32 GB LPDDR4x memory. The payload moves over a PCIe Gen4 x8 link (assume 12 GB/s effective bandwidth)
  to be processed by the 400 TOPS INT8 compute engine. Given that you are using pinned host memory to
  enable direct zero-copy DMA transfers, calculate the exact data movement latency for a single batch.
details:
  realistic_solution: The candidate should calculate the payload size by multiplying the resolution by
    the number of channels and the batch size, then divide that total volume by the effective PCIe bandwidth.
    Because the scenario explicitly uses pinned memory, no intermediate host-to-host memory copy overhead
    needs to be factored into the time.
  common_mistake: Candidates often fail to correctly calculate the raw byte size of the 4K frames (missing
    the 3 color channels), or they use the theoretical raw PCIe bandwidth instead of the provided effective
    bandwidth. Some may incorrectly add CPU staging copy latency, ignoring that pinned memory allows direct
    DMA.
  napkin_math: 1 frame = 3840 * 2160 pixels * 3 bytes/pixel = 24,883,200 bytes (~24.88 MB). Batch of 8
    frames = 24,883,200 bytes * 8 = 199,065,600 bytes (~199.06 MB). Effective PCIe bandwidth = 12 GB/s
    = 12,000,000,000 bytes/s (or 12,288 MB/s if using binary prefixes, but decimal is standard for link
    speeds). DMA Transfer Latency = 199,065,600 bytes / 12,000,000,000 bytes/s = 0.01658 seconds, which
    is 16.58 milliseconds.
