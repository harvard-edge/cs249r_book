schema_version: 1
id: edge-exp-impl-0131
title: Compute Peak Memory for Sequential Operators
topic: operator-scheduling
status: published
provenance: imported
scenario: 'You are optimizing operator scheduling for an autonomous vehicle vision model running on an
  NVIDIA Jetson Orin with 32 GB LPDDR5 shared memory. The model has a linear sequence of three operators
  mapped to the Ampere GPU: OpA produces a 3GB activation tensor, OpB produces a 5GB tensor, and OpC produces
  a 2GB tensor. Assuming no skip connections and immediate deallocation of consumed tensors, calculate
  the absolute peak memory footprint required during this sequence. State your formula.'
details:
  realistic_solution: In a strictly sequential graph (A -> B -> C), an operator only needs its input and
    output tensors in memory simultaneously. Therefore, the peak memory is determined by the maximum sum
    of adjacent tensor sizes. This memory reuse strategy is critical for staying well within the Jetson
    Orin's 32 GB limit while leaving room for concurrent tasks on the DLA and OS.
  common_mistake: Candidates often just sum the total memory of all activations (3GB + 5GB + 2GB = 10GB)
    rather than considering the overlapping lifespans of tensors during sequential execution.
  napkin_math: 'Formula: Peak_Memory = Max(Size(T_i) + Size(T_{i+1})). Execution step 1 (OpB computing):
    Needs OpA_out (3GB) + OpB_out (5GB) = 8GB. Execution step 2 (OpC computing): Needs OpB_out (5GB) +
    OpC_out (2GB) = 7GB. Peak memory footprint = Max(8GB, 7GB) = 8GB.'
