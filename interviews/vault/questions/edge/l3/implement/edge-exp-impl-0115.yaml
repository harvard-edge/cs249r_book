schema_version: 1
id: edge-exp-impl-0115
title: Hailo-8 Fairness Evaluation Energy & Disparity
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are deploying a pedestrian detection model on a smart city camera powered by a Hailo-8 dataflow
  accelerator (26 TOPS INT8, 2.5W, no local DRAM). To evaluate Equal Opportunity across two demographic
  subgroups before deployment, you stream a validation dataset of 13,000 frames from host memory. The
  model requires 130 GOPS per inference. Subgroup A has 900 True Positives and 100 False Negatives, while
  Subgroup B has 700 True Positives and 300 False Negatives. Calculate the True Positive Rate (TPR) disparity
  between the groups, the theoretical FPS, and the total energy in Joules consumed during this validation
  run.
details:
  realistic_solution: To evaluate Equal Opportunity, we focus strictly on the True Positive Rate difference
    between subgroups. For the hardware performance, since the Hailo-8 streams directly from host memory
    without local DRAM, we assume it operates at its theoretical compute bound of 26 TOPS. We divide the
    peak TOPS by the per-frame GOPS to get the frame rate, use that to find the total processing time
    for the validation set, and multiply by the 2.5W TDP to find the energy used.
  common_mistake: Candidates often calculate overall accuracy instead of True Positive Rate for Equal
    Opportunity. On the hardware side, they frequently miscalculate the TOPS to GOPS conversion or forget
    to multiply the processing time by the power consumption to get Joules.
  napkin_math: '1. TPR Subgroup A = 900 / (900 + 100) = 0.90. TPR Subgroup B = 700 / (700 + 300) = 0.70.
    TPR Disparity = 0.90 - 0.70 = 0.20.

    2. Hailo-8 Throughput = 26 TOPS (26,000 GOPS) / 130 GOPS/frame = 200 FPS.

    3. Total Processing Time = 13,000 frames / 200 FPS = 65 seconds.

    4. Evaluation Energy Cost = 65 seconds * 2.5 Watts = 162.5 Joules.'
