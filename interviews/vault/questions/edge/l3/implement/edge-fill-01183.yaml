schema_version: 1
id: edge-fill-01183
title: Optimizing ONNX Model Deployment on Qualcomm Cloud AI 100 with Operator Coverage Gaps
topic: model-format-conversion
status: published
provenance: imported
scenario: You are deploying a new computer vision model, trained in PyTorch, to a Qualcomm Cloud AI 100
  accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model needs to be converted to ONNX for optimization
  and deployment. During the ONNX conversion and subsequent attempt to run it on the Qualcomm Cloud AI
  100 with a vendor-provided runtime, you encounter issues related to unsupported operators, leading to
  performance degradation and fallback to the host CPU. Describe your step-by-step approach to identify,
  diagnose, and resolve these operator coverage gaps and implement delegation strategies to maximize throughput
  and efficiency on the target hardware.
details:
  realistic_solution: '1. **Pre-conversion Analysis:** Thoroughly analyze the PyTorch model for complex
    or custom operators. Consult Qualcomm''s official documentation and SDKs for a list of natively supported
    ONNX operators and custom extensions on the Cloud AI 100.

    2. **ONNX Conversion Strategy:** During ONNX export from PyTorch, strategically replace unsupported
    operators with equivalent, supported ONNX operators where possible. Explore using vendor-provided
    custom ONNX operators or extensions if available.

    3. **Runtime Profiling and Operator Identification:** Deploy the ONNX model and leverage Qualcomm''s
    profiling tools or ONNX Runtime''s detailed logging to precisely identify which operators are unsupported,
    cause significant latency, or trigger CPU fallback. Analyze the execution graph and performance bottlenecks.

    4. **Subgraph Partitioning and Delegation:** For identified unsupported or slow operators, implement
    judicious graph partitioning. Delegate problematic subgraphs to the host CPU only if the data transfer
    overhead between the AI 100 and CPU is minimal and demonstrably less than the performance gain from
    partial offloading. Optimize data movement.

    5. **Custom Operator Implementation (Plugin):** For critical, frequently used, or severe performance-bottlenecking
    unsupported operators, develop and integrate custom kernels (plugins) optimized specifically for the
    Qualcomm Cloud AI 100''s architecture using their SDK. This should be a well-justified last resort
    due to implementation complexity.

    6. **Quantization and Precision Review:** Verify that INT8 quantization is correctly applied and fully
    compatible with the AI 100''s 400 TOPS INT8 capabilities. Ensure that any precision loss from quantization
    is within acceptable limits for the application.'
  common_mistake: Blindly converting models without upfront validation of operator support on the target
    hardware's specific runtime (e.g., Qualcomm's proprietary runtime for AI 100), leading to runtime
    errors or inefficient CPU fallback. Another common mistake is not considering data transfer costs
    when delegating subgraphs to the host CPU, which can negate performance gains.
  napkin_math: "A model running on the Qualcomm Cloud AI 100 has an ideal inference time of 8ms (achieving\
    \ 125 FPS). However, 15% of its operations, contributing an additional 4ms of latency per inference,\
    \ are unsupported and fall back to the host CPU. \n1. Calculate the current effective inference time\
    \ and FPS.\n2. If, through custom operator implementation on the AI 100, you can reduce the CPU fallback\
    \ latency for these operations by 75%, what would be the new inference time and effective FPS?"
