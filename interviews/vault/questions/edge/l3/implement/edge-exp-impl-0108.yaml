schema_version: 1
id: edge-exp-impl-0108
title: Compute-Bound Data Pipeline Throughput
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a high-throughput video analytics pipeline on a Qualcomm Cloud AI 100 on-premise
  inference accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W). The deployed computer vision model requires
  0.5 TOPS of INT8 compute per inference. Uncompressed 1080p video frames (1920x1080 pixels, 3 channels,
  1 byte per channel) are being streamed directly to the accelerator for processing. Calculate the exact
  data pipeline throughput required in GB/s to keep the Qualcomm Cloud AI 100 compute units 100% utilized,
  assuming no other bottlenecks.
details:
  realistic_solution: To find the required data pipeline throughput, first determine the maximum frame
    rate the accelerator can support by dividing its total compute capacity by the compute required per
    frame. Then, calculate the size of a single uncompressed frame and multiply it by the theoretical
    maximum frame rate to get the data loading requirement.
  common_mistake: Candidates often fail to calculate the exact size of the uncompressed 1080p frame in
    bytes before multiplying by the theoretical maximum frames per second, or they mistakenly use the
    32 GB memory capacity as a bandwidth limit.
  napkin_math: '1. Max FPS = 400 TOPS / 0.5 TOPS/frame = 800 FPS.

    2. Frame size = 1920 pixels * 1080 pixels * 3 channels * 1 byte = 6,220,800 bytes (~6.22 MB).

    3. Required Throughput = 800 FPS * 6,220,800 bytes/frame = 4,976,640,000 bytes/s = 4.976 GB/s.'
