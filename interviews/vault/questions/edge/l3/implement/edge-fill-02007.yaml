id: edge-fill-02007
title: Little's Law Memory Sizing for Hailo-8 Inference Buffer
topic: queueing-theory
status: published
provenance: imported
scenario: A Hailo-8 accelerator (26 TOPS INT8, 2.5W) processes sensor events at λ=50 events/s. Mean processing
  time W=15ms. Each event buffer requires 4KB. Using Little's Law, determine the minimum buffer memory
  needed and whether the system's 256KB SRAM is sufficient.
details:
  realistic_solution: L = λ·W = 50 × 0.015 = 0.75 events in system on average. For safety margin (p99
    ≈ 3× mean for M/M/1), size for L_max ≈ 8-10 events. Memory = 10 × 4KB = 40KB. The system's 256KB SRAM
    (assuming Hailo-8 host MCU) is more than sufficient. Reserve 80KB for model weights and 40KB for buffers.
  common_mistake: Sizing buffer for peak burst without using steady-state L from Little's Law; allocating
    too much or too little memory.
  napkin_math: L=50×0.015=0.75 mean. p99 queue depth ≈6 items. 6×4KB=24KB buffer minimum. With 2× safety
    = 48KB. 256KB SRAM → 208KB left for model and stack.
