id: edge-exp-impl-0128
title: LLaMA 7B INT8 Memory Footprint on Jetson Orin
topic: model-size-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a 7 billion parameter language model locally on an autonomous
  drone powered by an NVIDIA Jetson Orin. The system operates under a strict 60W TDP, featuring 32 GB
  of unified LPDDR5 memory and an Ampere GPU with a DLA accelerator. To leverage the 275 TOPS INT8 compute
  capability, you will run the model quantized to INT8 precision. Calculate the exact memory footprint
  required to load the model weights, and determine how much of the Orin's unified memory remains available
  for the OS, KV cache, and flight control stacks.
details:
  realistic_solution: The candidate should identify that INT8 precision requires exactly 1 byte per parameter.
    By multiplying the 7 billion parameter count by the 1-byte size, they obtain the static weight memory
    footprint. They must then subtract this value from the Orin's total 32 GB unified memory to find the
    remaining capacity, explicitly acknowledging that this remainder must accommodate the operating system,
    intermediate activations, and other running processes.
  common_mistake: Candidates often calculate using FP32 (4 bytes) or FP16 (2 bytes) even when INT8 quantization
    is explicitly specified. They also frequently forget that the 32 GB memory on the Jetson Orin is unified
    (shared between CPU, GPU, and OS), incorrectly assuming it is dedicated VRAM entirely available for
    model inference.
  napkin_math: 'Parameters: 7,000,000,000 (7B). Precision: INT8 = 1 byte per parameter. Model Weight Memory:
    7 * 10^9 * 1 byte = 7 GB. Jetson Orin Total Memory: 32 GB LPDDR5. Remaining Unified Memory: 32 GB
    - 7 GB = 25 GB available for OS and other system overhead.'
