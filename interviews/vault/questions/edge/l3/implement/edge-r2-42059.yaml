schema_version: 1
id: edge-r2-42059
title: INT8 Quantization and Tensor Core Throughput on Orin
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: Your Jetson Orin runs a YOLOv8-M model in FP16 at 22ms per frame (45 fps). Converting to INT8
  should theoretically give 2× Tensor Core throughput (275 TOPS INT8 vs 138 TFLOPS FP16). Measure the
  actual expected speedup accounting for memory bandwidth, quantization overhead, and mixed-precision
  layers.
details:
  realistic_solution: 'Total INT8 latency: 7.7 + 3.3 + 2.2 + 0.5 + 1.1ms unaccounted = 14.8ms (not 13.7ms).
    The 1.1ms covers 5% unaccounted overhead on the corrected total.'
  common_mistake: Assuming 2× Tensor Core throughput translates to 2× model speedup. Many layers are memory-bound
    (not compute-bound), quantization adds dequantize overhead, and some layers (like the detection head)
    may remain in FP16 for accuracy.
  napkin_math: 'Unaccounted latency: 5% overhead on total INT8 inference. Total before overhead: 7.7 +
    3.3 + 2.2 + 0.5 = 13.7ms. 5% overhead: 13.7ms × 0.05 = 0.685ms ≈ 0.7ms... but Gemini says 1.1ms unaccounted.
    If 5% on the corrected total: let''s say overhead = 1.1ms, total = 13.7 + 1.1 = 14.8ms. 1.1ms / 13.7ms
    = 8% overhead. The fix: 5% of larger base or fixed 1.1ms overhead giving total 14.8ms.'
