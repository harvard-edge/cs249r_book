schema_version: 1
id: edge-exp2-impl-0070
title: Hailo-8 MobileNetV2 Block Compute and Memory
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are deploying an inverted residual block from MobileNetV2 onto a Hailo-8 accelerator (26
  TOPS INT8, dataflow architecture, no local DRAM). The block takes an INT8 input tensor of 56x56x144,
  expands it by a factor of 6 using a 1x1 convolution, applies a 3x3 depthwise convolution (stride 1),
  and projects it back to 144 channels using a 1x1 convolution. Since the Hailo-8 streams data directly
  from host memory and keeps intermediate activations on-chip via its dataflow compiler, calculate the
  total INT8 operations for one forward pass and the minimum memory transfer (in bytes) required from/to
  the host.
details:
  realistic_solution: 'The correct approach involves calculating the operations for the three distinct
    layers: 1x1 expansion, 3x3 depthwise, and 1x1 projection, recognizing the expansion factor of 6 increases
    the internal channels to 864. For memory transfer, the candidate should identify that because of the
    dataflow architecture, only the initial input block and the final output block need to traverse the
    host-accelerator interconnect.'
  common_mistake: Candidates often incorrectly calculate the depthwise convolution operations by treating
    it as a standard convolution (multiplying by output channels). They also frequently assume that the
    large intermediate expanded activations (56x56x864) must be written back to host memory, ignoring
    the Hailo-8's continuous dataflow architecture.
  napkin_math: '1. Internal Channels: 144 * 6 = 864.

    2. Expansion 1x1 Ops: (56 * 56) spatial * 144 in * 864 out * 2 (MAC) = 780,337,152 INT8 ops.

    3. Depthwise 3x3 Ops: (56 * 56) spatial * 864 channels * (3 * 3) kernel * 2 (MAC) = 48,771,072 INT8
    ops.

    4. Projection 1x1 Ops: (56 * 56) spatial * 864 in * 144 out * 2 (MAC) = 780,337,152 INT8 ops.

    Total Compute: 780.3M + 48.7M + 780.3M = 1,609,445,376 operations (~1.61 GOPs).

    5. Memory Transfer: Input (56 * 56 * 144 = 451,584 bytes) + Output (56 * 56 * 144 = 451,584 bytes)
    = 903,168 bytes (~903 KB) per pass.'
