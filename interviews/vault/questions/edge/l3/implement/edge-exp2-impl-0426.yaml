schema_version: 1
id: edge-exp2-impl-0426
title: Host Round-Trip Latency in Edge TPU Operator Fusion
topic: kernel-fusion
status: published
provenance: imported
scenario: You are optimizing a vision pipeline for a Google Coral Edge TPU (USB form factor), which provides
  4 TOPS of INT8 compute at just 2W. Due to limited operator support, an unsupported intermediate activation
  forces a 4MB feature map to fall back to the host CPU, transferring over the USB connection (effective
  bandwidth of 400 MB/s). If you rewrite and fuse this activation with the surrounding layers into a single
  supported INT8 block that stays completely on the TPU, calculate the exact USB communication time saved
  per inference.
details:
  realistic_solution: The massive performance penalty in this scenario is the data transfer, not the compute.
    By quantizing properly to INT8 and fusing the operators to remain entirely on the Edge TPU, we completely
    avoid the host fallback. The latency saved is simply the time it takes to send the 4MB tensor from
    the TPU to the host CPU and back over the USB connection.
  common_mistake: Candidates often try to calculate the compute time saved using the 4 TOPS INT8 specification,
    entirely missing that the true bottleneck is the I/O transfer over the USB interface. They also frequently
    forget that a host fallback requires a full round-trip (writing to the host, then reading back to
    the TPU), underestimating the data transfer by half.
  napkin_math: 'Intermediate tensor size = 4MB. Unfused round-trip data transfer = 4MB (TPU to Host) +
    4MB (Host to TPU) = 8MB total transfer. Effective USB bandwidth = 400 MB/s. Transfer time saved =
    8MB / 400 MB/s = 0.02 seconds, or 20 milliseconds per inference. (Note: The 4 TOPS compute time for
    the fusion would be in the microseconds, making the 20ms USB transfer the dominant saved cost).'
