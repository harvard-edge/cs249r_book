schema_version: 1
id: edge-exp2-impl-0077
title: Calculate On-Device PSI for Edge Accelerator
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are deploying a defect detection model on an on-premise edge server powered by a Qualcomm
  Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To minimize outbound bandwidth, you must
  detect training-serving skew locally by computing the Population Stability Index (PSI) on a critical
  INT8 feature before sending alerts. The feature is quantized into 3 bins. The reference distribution
  from training is Reference = [0.5, 0.3, 0.2]. The serving distribution observed on the accelerator over
  the last hour is Serving = [0.4, 0.4, 0.2]. Calculate the exact PSI for this feature.
details:
  realistic_solution: The correct approach is to calculate the PSI bin by bin using the standard formula.
    Since the Qualcomm Cloud AI 100 natively outputs 400 TOPS of INT8, we can compute the histogram bin
    counts directly in INT8 on the accelerator, and only perform the floating-point logarithmic scaling
    during the low-frequency aggregation step on the host CPU. A PSI < 0.1 indicates no significant data
    drift.
  common_mistake: Candidates often mix up the reference and serving distributions in the ln(Serving/Reference)
    term, or forget that PSI is the sum of (Serving - Reference) * ln(Serving / Reference). They might
    also propose computationally heavy continuous KL-divergence instead of binning, which wastes the 400
    TOPS INT8 capacity of the Qualcomm Cloud AI 100 by forcing unnecessary floating-point operations.
  napkin_math: 'Bin 1: (0.4 - 0.5) * ln(0.4 / 0.5) = (-0.1) * ln(0.8) = (-0.1) * (-0.223) = 0.0223. Bin
    2: (0.4 - 0.3) * ln(0.4 / 0.3) = (0.1) * ln(1.333) = (0.1) * (0.287) = 0.0287. Bin 3: (0.2 - 0.2)
    * ln(0.2 / 0.2) = 0. Total PSI = 0.0223 + 0.0287 + 0 = 0.051. The calculated drift is 0.051.'
