schema_version: 1
id: edge-exp-impl-0137
title: Calculate thermal throttling impact on Orin throughput
topic: thermal-management
status: published
provenance: imported
scenario: You are deploying a continuous computer vision pipeline on an NVIDIA Jetson Orin (60W TDP, 275
  TOPS INT8) enclosed in a sealed outdoor housing without active cooling. At optimal temperatures and
  full 60W power, the model runs at 150 FPS utilizing both the Ampere GPU and DLA accelerator. During
  peak summer heat, the system triggers a thermal throttling profile that caps the maximum power draw
  to 25W to prevent hardware damage. Calculate the new expected maximum frame rate assuming compute throughput
  scales linearly with the available power envelope.
details:
  realistic_solution: The correct approach applies the ratio of the throttled power limit to the original
    maximum power limit to estimate the new performance. On devices like the Jetson Orin, power management
    firmware dynamically underclocks the SoC (GPU/DLA) to stay within the new 25W cap, resulting in an
    approximately linear drop in inference throughput for sustained workloads.
  common_mistake: Candidates often try to calculate compute utilization based on the 275 TOPS spec or
    memory bandwidth of the 32 GB LPDDR5, failing to recognize that under severe thermal throttling, the
    power envelope becomes the absolute bottleneck dictating clock speeds.
  napkin_math: Original Power = 60W. Throttled Power = 25W. Power Ratio = 25W / 60W = 0.416. Original
    Throughput = 150 FPS. Expected Throttled Throughput = 150 FPS * 0.416 = 62.5 FPS.
