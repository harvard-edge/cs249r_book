schema_version: 1
id: edge-cell-10019
title: Implementing Streaming Activation Processing for Video on Jetson Orin
topic: activation-memory
status: published
provenance: imported
scenario: You are implementing a real-time action recognition pipeline on Jetson Orin (32 GB LPDDR5, 275
  TOPS) using a 3D ConvNet (SlowFast-R50) that takes 32-frame clips as input. Processing the full 32-frame
  clip at once requires 14 GB of activation memory for the 3D conv layers. Since you also need to run
  a concurrent detection model using 8 GB, you have only 6 GB available for action recognition activations.
  Implement a temporal streaming approach that reduces peak activation memory without reducing accuracy.
details:
  realistic_solution: 'Decompose 3D convolutions into (2+1)D: apply 2D spatial conv to each frame independently
    (1 frame at a time in memory), then apply 1D temporal conv over the resulting feature vectors. Spatial
    activation peak: 1 frame × H × W × C = 1 × 224 × 224 × 64 × 4 B = 12.8 MB per layer. Temporal buffer:
    32 frames × reduced spatial feature × C = 32 × 28 × 28 × 256 × 4 B = 25.6 MB. Total for (2+1)D path:
    ~40 MB per layer depth, compared to 14 GB for full 3D. This approach is used in SlowFast decomposed
    variants and reduces activation memory by ~350× with <1% accuracy loss on Kinetics-400.'
  common_mistake: Processing the full temporal dimension in a single forward pass and assuming that 3D
    convolutions inherently require all frames simultaneously. While true 3D convolutions have temporal
    receptive fields, many can be decomposed into (2+1)D convolutions where spatial and temporal convolutions
    are applied separately, allowing frame-by-frame streaming with only a small temporal buffer.
  napkin_math: 'Full 3D activation (32 frames): 32 × 56 × 56 × 256 × 4 B per layer = 102.8 MB per layer.
    9 conv stages = ~925 MB total (not 14.4 GB). (2+1)D spatial phase: 1 × 224 × 224 × 64 × 4 B = 12.8
    MB per frame. Temporal phase buffer: 32 × 28 × 28 × 512 × 4 B = 50.3 MB. Total peak: ~100 MB << 6
    GB budget. Temporal conv latency: 32 × 1D conv = 32 × 0.1 ms = 3.2 ms additional, negligible.'
