schema_version: 1
id: edge-0845
title: Non-IID Variance Skew in FedAvg
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are operating a Federated Learning (FedAvg) system for smartwatch activity recognition.
  You have 1,000 devices selected per round. Group A (800 typical users) generates 50 samples/device.
  Group B (200 athlete users) generates 200 samples/device with highly variable, non-IID data distributions.
  In standard FedAvg, a client's update weight is proportional to its dataset size (w_k = n_k / n_total).
  If the local gradient variance for an athlete device is 10x higher than a typical user's device (σ_B^2
  = 10σ_A^2), calculate the ratio of the variance contribution of Group B to Group A in the final aggregated
  global gradient.
details:
  realistic_solution: The variance contribution ratio is 40x. Group B completely dominates the global
    update's variance because FedAvg squares the per-client weights during aggregation, heavily amplifying
    the impact of clients that have both larger local datasets and higher intrinsic variance.
  common_mistake: Candidates often assume that because both groups contribute 40,000 total samples, the
    variance ratio is simply 10x (the ratio of their individual variances), forgetting that weights are
    squared during variance aggregation.
  napkin_math: 'Total samples = (800 * 50) + (200 * 200) = 80,000

    w_A = 50 / 80,000 = 1 / 1,600

    w_B = 200 / 80,000 = 1 / 400

    Var_A = 800 * (1 / 1,600)^2 * σ_A^2 = (1 / 3,200) * σ_A^2

    Var_B = 200 * (1 / 400)^2 * (10 * σ_A^2) = (2,000 / 160,000) * σ_A^2 = (1 / 80) * σ_A^2

    Ratio (Var_B / Var_A) = (1 / 80) / (1 / 3,200) = 40x'
