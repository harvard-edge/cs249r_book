id: edge-fill-02013
title: Coral Edge TPU Throughput Bound via Little's Law
topic: queueing-theory
status: published
provenance: imported
scenario: A Coral Edge TPU (4 TOPS INT8, 2W) is deployed in a retail store counting people. An integrator
  claims it processes '30 inferences per second.' Using Little's Law and the known 28ms inference latency,
  verify this claim and explain what L (mean concurrency) would need to be for it to hold.
details:
  realistic_solution: 'Little''s Law: L = λ·W. If λ=30/s and W=28ms=0.028s, then L=30×0.028=0.84. Concurrency
    of 0.84 means the TPU processes one request at a time (no pipelining). This is consistent — Coral
    Edge TPU is a single-inference device. Claim is plausible if inference latency is 28ms for the specific
    model. But for larger models (>3MB), latency increases to 50-80ms → throughput drops to 12-20/s.'
  common_mistake: Accepting vendor throughput claims without checking against measured latency; not applying
    Little's Law as a sanity check.
  napkin_math: 'L=λ×W=30×0.028=0.84 ≈ 1 → single-threaded, consistent with Coral architecture. Verify:
    if model has 500M multiply-accumulates and Coral has 4 TOPS=4×10^12 MAC/s → 0.5×10^9/4×10^12=0.125ms
    minimum. 28ms includes PCIe transfer + host overhead.'
