id: edge-0513
title: The Autonomous Driving Perception Stall (edge-0513)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You are an ML systems engineer on an autonomous driving team, tasked with optimizing a new LiDAR
  segmentation model on a Jetson AGX Orin. The profiler shows the GPU is running at its maximum frequency,
  but its INT8 TOPS utilization is consistently low at ~75% of its peak, causing you to miss your 33ms
  per-frame deadline. A deeper analysis of a critical network layer reveals it performs 50 G-Ops (INT8)
  and requires accessing a total of 50 MB of data (inputs, weights, and outputs).
details:
  realistic_solution: The layer is memory-bound. To diagnose this quantitatively, one must calculate the
    layer's Arithmetic Intensity (AI) and compare it to the hardware's Ridge Point. The Ridge Point defines
    the boundary between memory-bound and compute-bound workloads. Since the layer's AI is lower than
    the hardware's Ridge Point, its performance is limited by the memory subsystem's ability to supply
    data, not by the raw processing power of the compute units. This explains why TOPS utilization is
    significantly below its peak.
  common_mistake: Engineers often guess the bottleneck based on symptoms alone. Seeing high GPU clock
    frequency, they might incorrectly assume the model is compute-bound and needs a more efficient architecture.
    They fail to do the simple but critical calculation of arithmetic intensity, which would reveal the
    compute units are actually starving for data.
  napkin_math: Orin Ridge Point = 275 TOPS / 204.8 GB/s = 1342 OPS/Byte. If the LiDAR segmentation model
    has low Arithmetic Intensity (e.g., loading large point cloud tensors but only doing 100 OPS/Byte),
    it is severely memory-bound. Max theoretical compute = 100 OPS/Byte * 204.8 GB/s = 20.48 TOPS. This
    is just 7.4% of the 275 TOPS peak, explaining why INT8 TOPS utilization remains consistently low.
