schema_version: 1
id: edge-new-50030
title: ONNX Runtime Mobile vs TensorRT on Jetson Orin for Edge Inference
topic: software-portability
status: published
provenance: imported
scenario: You deploy a YOLOv8-small model on Jetson Orin (275 TOPS INT8, 32GB unified memory, 60W TDP).
  You compare ONNX Runtime with the TensorRT EP against standalone TensorRT. ONNX RT adds 12% latency
  overhead. Is the portability worth it?
details:
  realistic_solution: 'The 12% overhead comes from: (1) ONNX RT''s graph partitioning overhead (~3%).
    (2) Memory copy between ORT''s internal buffers and TensorRT engine inputs/outputs (~5%). (3) Suboptimal
    TensorRT builder settings when invoked via EP vs direct API (~4%). Mitigation: use ORT''s TensorRT
    EP with trt_max_workspace_size tuned for Orin''s memory, enable trt_fp16_enable, and pre-build the
    TensorRT engine cache. This reduces overhead to 4-6%. The portability benefit: same ONNX model runs
    on Orin (TRT EP), x86 cloud (CUDA EP), and Qualcomm (QNN EP) without code changes.'
  common_mistake: Dismissing the 12% overhead as unacceptable without considering the engineering benefits.
    Standalone TensorRT requires re-engineering the deployment pipeline for every new model, while ONNX
    RT provides a unified inference API.
  napkin_math: 'YOLOv8-small: ~11.2M params, ~28.6 GFLOPS. Orin at 275 TOPS INT8: compute floor = 28.6G
    / 275T = 0.1ms. Realistic with memory access: ~4ms TensorRT, ~4.5ms ORT+TRT EP. Both well under 30fps
    real-time target (33ms budget).'
