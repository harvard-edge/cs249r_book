schema_version: 1
id: edge-exp2-flue-0422
title: Edge Telemetry Buffering on NVIDIA Jetson Orin
topic: monitoring-observability
status: published
provenance: imported
scenario: You are deploying an NVIDIA Jetson Orin for an autonomous robotics application, utilizing both
  the Ampere GPU and DLA accelerator to achieve near the peak 275 TOPS INT8 performance. To ensure reliability
  and monitor for stragglers, your observability agent captures system health metrics—including power
  draw against the 60W TDP and utilization of the 32 GB LPDDR5—at a rate of 10 Hz. Each telemetry snapshot
  is 2 KB in size. If the edge device loses its network connection, calculate the daily data accumulation
  and determine what percentage of the total 32 GB system memory would be consumed to buffer these logs
  in RAM for a 7-day outage.
details:
  realistic_solution: During a network partition, the observability agent should dynamically reduce its
    sampling rate (e.g., down to 1 Hz or 0.1 Hz) or aggregate metrics to conserve space. Additionally,
    logs should be flushed to persistent local flash storage rather than buffered in the 32 GB LPDDR5
    to prevent starving the critical AI workloads of RAM.
  common_mistake: Candidates often forget to multiply by the sampling frequency (10 Hz) or miscalculate
    the seconds in a day (86,400). Another common error is failing to recognize that consuming nearly
    40% of system memory for telemetry buffering will likely cause Out-Of-Memory (OOM) errors for the
    primary inference application.
  napkin_math: '1) Data per second: 10 snapshots/sec * 2 KB/snapshot = 20 KB/sec. 2) Data per day: 20
    KB/sec * 86,400 sec/day = 1,728,000 KB/day = 1.728 GB/day. 3) 7-day buffer size: 1.728 GB/day * 7
    days = 12.096 GB. 4) Memory consumption percentage: 12.096 GB / 32 GB = 37.8% of total system memory.'
