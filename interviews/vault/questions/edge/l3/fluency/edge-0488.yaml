title: The Utilization Paradox
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a Staff ML Engineer on an automotive perception team, tasked with selecting a model
  for a 30 FPS (33.3ms deadline) pedestrian detection system. The system runs on a Jetson AGX Orin, which
  provides 275 INT8 TOPS. The rest of the perception pipeline already consumes 20ms of the latency budget,
  leaving you 13.3ms for the model.
details:
  realistic_solution: The correct approach is to calculate the *effective* TOPS for each model based on
    its profiled hardware utilization. The ViT, despite having 3x the theoretical G-MACs, is the only
    viable option. Its architecture, built on dense matrix multiplies, is a much better fit for the Orin's
    Tensor Cores, leading to dramatically higher utilization and lower wall-clock latency. The CNN, bottlenecked
    by memory access patterns in its depthwise layers, fails to meet the real-time deadline.
  common_mistake: Blindly choosing the model with the lowest theoretical G-MACs. Engineers often assume
    that fewer operations automatically means lower latency. They forget that peak TOPS are an advertising
    number, not a guarantee. Real-world performance is dictated by how efficiently a model's architecture
    can use the hardware. A model with low arithmetic intensity (like many mobile-first CNNs) can become
    memory-bound, leaving the powerful compute units starved and idle.
  napkin_math: 'Latency budget: 33.3ms - 20ms = 13.3ms. Orin provides 275 INT8 TOPS. Max possible operations
    = 275e12 * 0.0133s = 3.65 TOPS. A ViT with dense matrix multiplies achieves >50% hardware utilization
    (~137 TOPS effective). If it requires 1.5 TOps, execution takes 1.5e12 / 137e12 = 11ms. 11ms < 13.3ms,
    making it viable.'
