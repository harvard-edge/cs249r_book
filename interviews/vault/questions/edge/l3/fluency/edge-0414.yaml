id: edge-0414
title: The Real-Time Radar Deadline
topic: kernel-fusion
status: published
provenance: imported
scenario: You are deploying a radar signal classifier on an edge device with a Hailo-8 accelerator, which
  has 26 TOPS (INT8) of performance but only a few dozen MB of on-chip SRAM. Your highly accurate teacher
  model has 90MB of INT8 weights and takes 180ms per inference, missing the 33ms hard real-time deadline
  required for the application. Your profiler shows the Hailo-8 is compute-bound for very short bursts,
  but there are long stalls in between. Given this data, what is the most direct way to meet the deadline?
details:
  realistic_solution: The root cause of the slow performance is memory thrashing. The 90MB model is far
    too large to fit into the Hailo-8's SRAM. The device must constantly swap layers or tiles of the model
    back and forth from the host CPU's main memory over a relatively slow bus (e.g., PCIe), and these
    data movement stalls dominate the latency. The accelerator's massive compute power is wasted while
    it waits for data. The most direct solution is to use knowledge distillation to train a much smaller
    'student' model (e.g., <16MB) that fits entirely in the Hailo-8's SRAM. This eliminates host-device
    swapping, allowing the inference to run in a single, compute-bound pass.
  common_mistake: A common mistake is to focus only on the accelerator's peak TOPS and the model's operation
    count (G-MACs). Engineers might incorrectly conclude the model has too many operations or the accelerator
    isn't fast enough. They fail to recognize that on specialized hardware like the Hailo-8, on-chip memory
    capacity is the most critical resource, and performance collapses when a model's state doesn't fit.
  napkin_math: 1.  **Teacher Model (90MB):** The model doesn't fit in the accelerator's SRAM. Let's assume
    the effective host-to-device bandwidth is 1 GB/s.
