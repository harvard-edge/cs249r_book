id: edge-exp2-flue-0472
title: Hailo-8 4-Bit Streaming Bandwidth
topic: extreme-quantization
status: published
provenance: imported
scenario: We are deploying a specialized 1.5 Billion parameter transformer model on a Hailo-8 accelerator.
  The Hailo-8 provides 26 TOPS INT8 compute at 2.5W but lacks local DRAM, meaning all weights must be
  streamed continuously from host memory. To minimize the host-to-accelerator PCIe bottleneck, we apply
  4-bit AWQ extreme quantization to the weights, which are unpacked to INT8 on the fly. Calculate the
  minimum sustained streaming bandwidth in GB/s required to achieve an inference speed of 20 tokens per
  second, assuming the entire model must be streamed once per token.
details:
  realistic_solution: The correct approach recognizes that 4-bit quantization reduces the memory footprint
    to 0.5 bytes per parameter. The candidate should calculate the compressed model size and then multiply
    by the target throughput (20 tokens/sec) to find the total required host-to-chip bandwidth.
  common_mistake: Candidates often assume the weights take 1 byte each because the Hailo-8 is an INT8
    accelerator, missing the 4-bit AWQ compression applied for transport. They may also fail to multiply
    the total model payload by the token generation rate, forgetting that streaming architectures require
    reloading weights for every autoregressive step.
  napkin_math: 'Total parameters = 1.5 Billion. At 4 bits (0.5 bytes) per parameter: 1.5B * 0.5 bytes
    = 0.75 GB per pass. For 20 tokens per second: 0.75 GB/token * 20 tokens/sec = 15 GB/s required streaming
    bandwidth.'
