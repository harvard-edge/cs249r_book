schema_version: 1
id: edge-exp-flue-0096
title: Edge Telemetry Storage Sizing on Jetson Orin
topic: storage-format-selection
status: published
provenance: imported
scenario: You are deploying a perception logging service on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere
  GPU + DLA) for an autonomous edge device. The system generates 2500 event logs per second, where each
  log contains INT8 tensor metadata averaging 4 KB in raw row-based format. You allocate exactly 3 GB
  of the 32 GB LPDDR5 memory to buffer these logs before batch flushing them to an NVMe drive. You need
  to calculate the memory buffer duration and the disk storage footprint if you switch to a columnar Parquet
  format that achieves a 4x compression ratio.
details:
  realistic_solution: Using a columnar format like Parquet with lightweight compression (e.g., Snappy
    or LZ4) is standard for edge logging. It significantly reduces NVMe write amplification and extends
    disk lifespan on the 60W TDP Jetson Orin, while the 3 GB LPDDR5 RAM buffer allows for efficient, large
    sequential writes.
  common_mistake: Candidates often fail to align the units (KB/MB/GB) correctly during mental math or
    mistakenly apply the compression ratio to the in-memory buffer, forgetting that data is typically
    buffered uncompressed before serialization.
  napkin_math: '1. Uncompressed data rate: 2500 events/sec * 4 KB/event = 10,000 KB/sec = 10 MB/sec. 2.
    Memory buffer duration (uncompressed): 3 GB (3000 MB) / 10 MB/sec = 300 seconds (5 minutes) of buffer
    time. 3. Compressed Parquet disk footprint per hour: (10 MB/sec / 4 compression ratio) = 2.5 MB/sec
    compressed. 2.5 MB/sec * 3600 sec = 9000 MB (9 GB) per hour.'
