id: edge-exp-flue-0077
title: Coreset Selection for INT8 Calibration
topic: data-efficiency-selection
status: published
provenance: imported
scenario: Your team is preparing a vision model for deployment on an on-premise Qualcomm Cloud AI 100
  accelerator. You must calibrate the model for INT8 execution to utilize its 400 TOPS throughput. The
  original dataset is 10 million images, so you decide to select a 0.5% coreset for calibration. Calculate
  the memory footprint of this coreset (assuming uncompressed 224x224 RGB 8-bit images) and determine
  if it fits within the 32 GB LPDDR4x memory.
details:
  realistic_solution: Compute the per-image uncompressed size in bytes, find the total number of images
    in the coreset, and multiply them. The resulting dataset size is approximately 7.5 GB, which comfortably
    fits into the 32 GB memory of the Qualcomm Cloud AI 100 while leaving room for the model.
  common_mistake: Candidates often miscalculate the raw uncompressed image size by omitting the channel
    dimension. They also frequently forget that the 32 GB LPDDR4x memory must accommodate the model weights
    and runtime activations in addition to the calibration data.
  napkin_math: '1. Single image size: 224 * 224 pixels * 3 channels * 1 byte/pixel = 150,528 bytes. 2.
    Coreset size: 10,000,000 images * 0.005 = 50,000 images. 3. Total memory: 50,000 * 150,528 bytes =
    7,526,400,000 bytes. 4. Convert to GB: 7,526,400,000 / 10^9 = 7.52 GB. Conclusion: 7.52 GB is well
    within the 32 GB LPDDR4x capacity.'
