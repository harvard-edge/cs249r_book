id: edge-fill-00105
title: Hailo-8 Dataflow and On-chip Memory Utilization
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are optimizing a real-time object detection pipeline for deployment on a Hailo-8 (26 TOPS
  INT8, 2.5W dataflow accelerator). A specific, latency-critical 1x1 convolutional layer, processing an
  intermediate feature map of 64x64 with 128 input channels and 128 output channels, is observed to be
  a bottleneck. Discuss how Hailo-8's structure-defined dataflow architecture, particularly its distributed
  on-chip SRAM and the concepts of weight-stationary vs. output-stationary dataflows, are key to minimizing
  the latency of this layer, rather than solely focusing on external memory bandwidth.
details:
  realistic_solution: A realistic solution involves deeply understanding the Hailo Dataflow Compiler's
    capabilities and the physical architecture. For the 1x1 convolutional layer, one must consider whether
    a weight-stationary dataflow (where weights are held in local memory and input activations stream
    through) or an output-stationary dataflow (where output activations are held, and inputs/weights stream
    through) is more optimal for Hailo-8's distributed compute and memory fabric. The goal is to maximize
    the utilization of on-chip SRAM and maintain continuous data streaming between processing elements,
    effectively creating an internal pipeline that avoids costly external memory fetches and minimizes
    internal data movement. Tiling strategies would then be designed to fit the layer's data and computations
    within these localized on-chip resources.
  common_mistake: A common mistake is to approach optimization for Hailo-8 with a mindset primarily focused
    on minimizing external DDR memory access, similar to how one might optimize for GPUs. This overlooks
    Hailo-8's fundamental design which heavily relies on a network of on-chip SRAM and a compiler-orchestrated,
    structure-defined dataflow that aims to keep data local to compute elements, often making external
    memory transfers less dominant for performance bottlenecks than internal data movement and processing
    pipeline efficiency.
  napkin_math: 'Given the Hailo-8''s peak performance of 26 TOPS (INT8) and typical power consumption
    of 2.5W, what is its peak TOPS/Watt efficiency? (Fluency: expect immediate recall or quick mental
    calculation)'
