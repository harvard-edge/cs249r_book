id: edge-0473
title: The Autonomous Truck's Fusion Bottleneck
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are the lead systems engineer for an autonomous trucking company. The vehicle''s compute
  platform consists of two separate SoCs in the same chassis: SoC 1 processes camera data, and SoC 2 handles
  LiDAR/RADAR and planning. To perform sensor fusion, SoC 1 must transfer a 512 MB feature map to SoC
  2 every frame. The total perception-to-plan latency budget is a hard-real-time 33ms. Your team measures
  the transfer alone and finds it''s the primary bottleneck. You must choose an interconnect to link the
  two SoCs. Solve for the theoretical transfer time for each option and diagnose which is the only feasible
  choice for this safety-critical workload.'
details:
  realistic_solution: The correct answer is to redesign the platform to use a single board where the two
    compute units can be connected via NVLink 4.0. The napkin math shows that both Ethernet and PCIe are
    too slow or leave insufficient latency budget for a hard real-time system. Ethernet is orders of magnitude
    too slow. PCIe is technically plausible but consumes a large fraction of the budget, which is risky.
    NVLink is the only option that makes the transfer time negligible, providing the necessary safety
    margin for the rest of the perception pipeline.
  common_mistake: Engineers often underestimate the sheer bandwidth required for modern sensor fusion.
    They might assume standard networking like 10Gbps Ethernet is 'fast' without doing the math, failing
    to realize it's orders of magnitude too slow. Another common mistake is choosing a technically workable
    but suboptimal solution like PCIe, which leaves little to no margin for other processing, jitter,
    or future load increases in a safety-critical loop.
  napkin_math: 'Feature Map = 512 MB. Transfer over 10Gbps Ethernet (1.25 GB/s): 512 / 1250 = 409 ms (far
    too slow). Transfer over PCIe Gen4 x8 (15.75 GB/s): 512 / 15,750 = 32.5 ms (eats entire 33ms budget).
    Transfer over NVLink 4.0 (say 600 GB/s): 512 / 600,000 = ~0.85 ms. Only NVLink leaves enough headroom
    for the actual sensor fusion compute.'
