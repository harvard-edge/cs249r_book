schema_version: 1
id: edge-0751
title: The Brick Avoidance Protocol
topic: ota-firmware-updates
status: published
provenance: imported
scenario: A critical OTA update for a new vision model fails on 10% of your 50,000 edge devices due to
  insufficient disk space. How do you prevent these devices from becoming unrecoverable and ensure they
  can eventually receive a working update?
details:
  realistic_solution: Implement an **atomic update mechanism** using A/B partitioning. The update process
    writes the new firmware/model to an inactive partition. Only after the download and verification are
    complete does the bootloader switch to the new partition. If the device fails to boot successfully
    from the new partition within a predefined timeout (monitored by a watchdog timer), it automatically
    reverts to the previously known good partition. Devices should be designed to report their status
    (e.g., "update failed, rolled back to previous version") via a basic telemetry channel, allowing the
    fleet management system to re-queue the update with a different version or strategy.
  common_mistake: '"Just retry the update." This can lead to a boot loop or bricking if the failure is
    systemic or leaves the device in an inconsistent state. Repeated retries can exacerbate the issue
    (e.g., filling logs).'
  napkin_math: For 50,000 devices, a 10% failure rate means 5,000 devices are affected. If each bricked
    device costs $200 in replacement or manual recovery, that's $1,000,000 in costs. An A/B partition
    scheme adds approximately 500MB to flash storage (for a 250MB image), costing pennies per device but
    saving millions in potential recovery.
