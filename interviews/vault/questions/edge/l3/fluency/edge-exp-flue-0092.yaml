schema_version: 1
id: edge-exp-flue-0092
title: Dual-Branch Network Scheduling on Qualcomm AI 100
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a dual-branch vision model on a Qualcomm Cloud AI 100 (400 TOPS INT8, 75W,
  32 GB LPDDR4x). The model has a shared 5MB input tensor that must remain in SRAM until both branches
  finish executing. Branch A requires 25MB of working memory during execution and produces a 5MB output.
  Branch B requires 10MB of working memory and produces a 15MB output. Both outputs must be kept in memory
  for a subsequent fusion layer. To avoid spilling to LPDDR4x and keep intermediate tensors within the
  accelerator's limited SRAM, you must determine the optimal sequential execution order. Calculate the
  peak SRAM footprint for both the (A then B) and (B then A) schedules.
details:
  realistic_solution: 'The correct approach is to trace the memory footprint at each execution step by
    tracking all live tensors: the shared input, the working memory of the currently executing branch,
    and the preserved outputs of previously completed branches. To minimize peak memory, the optimal schedule
    executes the branch with the larger working memory and smaller output tensor first, preventing large
    outputs from occupying SRAM during the execution of memory-intensive branches.'
  common_mistake: Candidates often assume that scheduling order only affects latency and ignore the asymmetric
    memory lifecycles of parallel branches. They frequently fail to account for the accumulated outputs
    that must be kept alive while the second branch executes, leading to incorrect peak memory estimates
    and unexpected out-of-memory errors on edge accelerators.
  napkin_math: "Schedule A then B: \n1) Executing A: 5MB (input) + 25MB (A_working) = 30MB peak. \n2)\
    \ Executing B: 5MB (input) + 5MB (A_output) + 10MB (B_working) = 20MB peak. \nOverall Peak = 30MB.\
    \ \n\nSchedule B then A: \n1) Executing B: 5MB (input) + 10MB (B_working) = 15MB peak. \n2) Executing\
    \ A: 5MB (input) + 15MB (B_output) + 25MB (A_working) = 45MB peak. \nOverall Peak = 45MB. \n\nConclusion:\
    \ Executing A then B is optimal and saves 15MB of peak SRAM footprint."
