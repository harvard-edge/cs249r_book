id: edge-exp-flue-0075
title: Compound Pipeline Throughput on Cloud AI 100
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a compound agentic pipeline on a single Qualcomm Cloud AI 100 on-premise inference
  accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The pipeline sequentially chains a router model and
  an expert LLM. The router requires 2 Tera-operations per request, and the expert LLM requires 18 Tera-operations
  per request. Both models are quantized to INT8 and easily fit within the 32 GB memory limit. Assuming
  the workload is fully compute-bound and achieves 100% utilization, calculate the maximum theoretical
  throughput in requests per second and the energy consumed per request.
details:
  realistic_solution: For a sequential compound AI system, the total compute cost per request is the sum
    of the individual model costs. Because both models fit in the 32 GB memory and are compute-bound,
    the total TOPS required per request dictates the overall system throughput. You divide the hardware's
    maximum TOPS by the operations per request to get throughput, and then divide the total power by the
    throughput to find the energy per request.
  common_mistake: Candidates often forget to sum the compute operations of all models in the chained pipeline
    before calculating system throughput. Another common error is incorrectly calculating energy by multiplying
    power by compute, rather than dividing the power limit (Watts) by the throughput.
  napkin_math: '1. Total compute per request = 2 Tera-ops (router) + 18 Tera-ops (expert) = 20 Tera-operations.

    2. Maximum theoretical throughput = 400 TOPS / 20 Tera-operations/request = 20 requests per second.

    3. Energy per request = 75 Watts (Joules/sec) / 20 requests/sec = 3.75 Joules per request.'
