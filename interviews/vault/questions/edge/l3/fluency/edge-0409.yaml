id: edge-0409
title: OTA Update Time for Edge Fleet
topic: ota-firmware-updates
status: published
provenance: imported
scenario: 'You manage a fleet of 500 edge AI cameras deployed across a city. Each device has a 4G LTE
  connection averaging 5 Mbps download and 32 GB eMMC storage with A/B partitioning. You need to push
  a model update: a new TensorRT engine file (45 MB) plus a firmware delta update (12 MB). Estimate the
  total fleet update time and identify the bottleneck.'
details:
  realistic_solution: 'The bottleneck is not the download or flash — it''s the staged rollout monitoring
    windows. Per-device: 91s download (57MB at 5 Mbps) + 3.8s flash + 17s verify/reboot + 3.3s health
    check = 115s. But fleet rollout uses staged waves: canary (25 devices, 2 min) + 1h monitoring + wave
    2 (125 devices, 2 min) + 2h monitoring + wave 3 (350 devices, 2 min) = 3h 6min total. The actual data
    transfer (115s per device, parallelized) is trivial. The dominant cost is the mandatory observation
    windows between waves to detect regressions before wider deployment. CDN cost is negligible at $2.42
    per fleet update.'
  common_mistake: '"57 MB at 5 Mbps = 91 seconds per device. 500 devices in parallel = 91 seconds total."
    This assumes unlimited CDN bandwidth and ignores that eMMC write speed, not network speed, is often
    the bottleneck for the flash step. It also ignores the verification, reboot, and health-check phases.'
  napkin_math: 'Download: 91s (network-bound). Flash: 3.8s. Verify + reboot: 17s. Health check: 3.3s.
    Per-device total: 115s. Staged rollout: canary (25 devices, 2 min) + 1h wait + wave 2 (125 devices,
    2 min) + 2h wait + wave 3 (350 devices, 2 min) = 3h 6min. CDN cost: 500 × 57 MB = 28.5 GB × 0.085/GB
    (AWS CloudFront) = 2.42 per fleet update. Rollback rate (industry average): 2–5% of devices. At 5%:
    25 devices rollback, adding 15s each = negligible. Real bottleneck: the 1–2 hour monitoring windows
    between waves, not the actual update time.'
