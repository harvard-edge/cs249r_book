id: edge-exp2-flue-0064
title: Edge TPU Systolic Array Throughput Calculation
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are deploying an object detection model to a Google Coral Edge TPU for a battery-powered
  drone. The Edge TPU is rated at 4 TOPS for INT8 operations and consumes 2W of power. Assuming your model
  has a single large convolutional layer that requires 10 billion operations (10 GOPS) per inference,
  calculate the theoretical maximum frame rate and the energy consumed per inference, assuming perfect
  utilization of the systolic array.
details:
  realistic_solution: First, establish the throughput by dividing the peak performance by the operations
    per inference. Since the Edge TPU provides 4 TOPS ($4 \times 10^{12}$ ops/sec) and the layer requires
    10 GOPS ($10 \times 10^9$ ops/inference), we can find the maximum inferences per second. Then, use
    the 2W power consumption to find the energy per inference by multiplying power by the time taken for
    one inference.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with MACs (Multiply-Accumulates),
    forgetting that one MAC is two operations, or they fail to properly convert between Tera ($10^{12}$)
    and Giga ($10^9$). They may also struggle to derive energy per inference from the given power and
    time.
  napkin_math: 'Performance = 4 TOPS = 4,000 GOPS.

    Operations per inference = 10 GOPS.

    Theoretical Max Frame Rate = 4,000 GOPS / 10 GOPS/inference = 400 inferences/second (FPS).

    Time per inference = 1 / 400 seconds = 2.5 milliseconds.

    Energy per inference = Power * Time = 2 Watts * 0.0025 seconds = 0.005 Joules (or 5 mJ).'
