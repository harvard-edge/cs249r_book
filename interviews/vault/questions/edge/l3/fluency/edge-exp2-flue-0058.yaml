id: edge-exp2-flue-0058
title: Parallel Operator Scheduling and Energy on AI 100
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a transformer-based model on a Qualcomm Cloud AI 100, an on-premise inference
  accelerator featuring 32 GB LPDDR4x, capable of 400 TOPS INT8 at a 75W TDP. You are optimizing the execution
  order to run multiple independent self-attention heads in parallel. The parallelized operators require
  a total of 80 Tera-Operations (INT8). Assuming your scheduling optimization achieves a high hardware
  utilization of 80%, calculate the execution time for this parallel block and the expected energy consumption.
details:
  realistic_solution: Efficient operator scheduling is crucial for edge and on-premise accelerators to
    keep the compute units fed and minimize execution time. By parallelizing the attention heads, the
    scheduler ensures high utilization of the accelerator's INT8 MAC units. To find the real-world latency,
    we divide the required operations by the effective throughput, then multiply by the TDP to find the
    energy cost per inference step.
  common_mistake: Candidates often calculate execution time using the theoretical peak compute (400 TOPS)
    without factoring in the realistic 80% utilization rate achieved by the scheduler. Additionally, they
    may confuse units when calculating energy, forgetting that Watts represent Joules per second.
  napkin_math: '1. Peak Compute = 400 TOPS INT8.

    2. Effective Compute (80% utilization) = 400 * 0.80 = 320 TOPS.

    3. Required Operations = 80 Tera-Operations.

    4. Execution Time = 80 TOPs / 320 TOPS = 0.25 seconds (250 milliseconds).

    5. Power = 75 Watts (Joules/sec).

    6. Energy Consumed = 75W * 0.25s = 18.75 Joules.'
