schema_version: 1
id: edge-0748
title: The Watchdog Timer
topic: monitoring-observability
status: published
provenance: imported
scenario: Your edge device runs inference in a loop. Occasionally, the TensorRT engine hangs — the CUDA
  kernel never returns. The device appears healthy (network up, OS responsive) but produces no detections.
  How do you detect and recover from this failure mode?
details:
  realistic_solution: Implement a **hardware watchdog timer** — a dedicated hardware peripheral (present
    on most embedded SoCs including Jetson) that must be "kicked" (written to) at regular intervals. If
    the kick doesn't arrive within the timeout period, the watchdog triggers a hard reset.
  common_mistake: '"Check if the process is running." The process *is* running — it''s blocked inside
    a CUDA call. Standard health checks (process alive, port open) won''t catch this.'
  napkin_math: 'Normal inference: 30ms. Software watchdog timeout: 150ms → detects hang in 150ms, restarts
    process in ~2s (TensorRT reload). Hardware watchdog timeout: 200ms → full reboot in ~30s. Without
    watchdog: device hangs indefinitely until manual intervention. With 10,000 devices and a 0.1% daily
    hang rate: 10 devices/day hang. Without watchdog: 10 devices need manual reboot (hours of downtime
    each). With watchdog: 10 devices auto-recover in <35s each.'
