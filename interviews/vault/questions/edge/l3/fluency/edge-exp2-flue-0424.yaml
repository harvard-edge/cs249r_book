schema_version: 1
id: edge-exp2-flue-0424
title: Transformer Attention Cost on Coral Edge TPU
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying a quantized vision transformer to a Google Coral Edge TPU for real-time object
  tracking. The device provides 4 TOPS at INT8 precision and operates within a strict 2W power envelope.
  For a self-attention layer processing a sequence length of 256 tokens with a hidden dimension of 512,
  calculate the total INT8 operations required for the QK^T matrix multiplication and the theoretical
  minimum latency on this specific hardware.
details:
  realistic_solution: 'The candidate should recall the specific formula for the QK^T matrix multiplication
    complexity: 2 * N^2 * d operations. By plugging in the sequence length and hidden dimension, they
    can calculate the total INT8 operations required. Finally, dividing this workload by the peak throughput
    of the Edge TPU (4 TOPS) yields the minimum theoretical execution time.'
  common_mistake: Candidates often forget that a single Multiply-Accumulate (MAC) counts as two operations
    when comparing against hardware TOPS. They may also struggle to recall the O(N^2 d) attention complexity
    formula or fail to realize the Edge TPU only accelerates INT8 operations.
  napkin_math: Given N = 256 and d = 512. The number of MACs for Q (N x d) times K^T (d x N) is N^2 *
    d. Total operations = 2 * MACs = 2 * N^2 * d. Total Ops = 2 * (256)^2 * 512 = 2 * 65,536 * 512 = 67,108,864
    INT8 operations (~67.1 Mega-ops). Hardware throughput = 4 TOPS = 4 * 10^12 Ops/sec. Minimum latency
    = 67.1 * 10^6 / (4 * 10^12) = 1.677 * 10^-5 seconds, or ~16.8 microseconds.
