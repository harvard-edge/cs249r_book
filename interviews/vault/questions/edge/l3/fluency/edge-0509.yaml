id: edge-0509
title: 'The Self-Driving Perception Stall: Real-Time Deadlines'
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You are an ADAS engineer deploying a new perception model on a fleet of NVIDIA Jetson AGX Orin
  compute units. The unit is thermally constrained to a **30W** power budget, which allows for a sustained
  **150 TOPS** of INT8 compute. The model must process the front camera stream with a latency of **33ms
  (30 FPS)** or less.
details:
  realistic_solution: The model is severely memory-bound, but not because of the hardware's peak limits.
    The true bottleneck is the low *effective* memory bandwidth being achieved by the model's memory access
    patterns.
  common_mistake: Engineers often calculate the theoretical performance for the compute-bound case (26.7ms)
    and the memory-bound case (14.6ms), see that both *should* meet the 33ms deadline, and then incorrectly
    blame external factors like 'power throttling' or 'inaccurate profiling' without digging deeper. The
    key is to use the observed latency to calculate the *effective* bandwidth and quantify just how severe
    the memory bottleneck truly is.
  napkin_math: At 30W, Orin delivers 150 TOPS. Memory bandwidth is 204.8 GB/s. Ridge point = 150e12 /
    204.8e9 = 732 Ops/Byte. If the model has an AI of 200 Ops/Byte (e.g., 200 GigaOps per 1 GB), it is
    memory bound. Time = 1 GB / 204.8 GB/s = 4.88ms. Effective TOPS = 200 GigaOps / 4.88ms = 41 TOPS,
    far below the 150 TOPS peak.
