id: edge-exp2-flue-0041
title: RAG Concurrency and Power on Cloud AI 100
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a local RAG pipeline on an on-premise server powered by a single Qualcomm
  Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The compound system routes requests between
  a local embedding model that takes 2 GB of INT8 memory and a generative LLM that requires 14 GB of INT8
  memory. If each active RAG session requires exactly 1.5 GB of KV cache and intermediate state, calculate
  the maximum number of concurrent sessions this accelerator can support and the power budget per session
  at maximum TDP.
details:
  realistic_solution: To determine maximum concurrency, first subtract the static memory footprint of
    all models in the multi-model pipeline from the total accelerator memory. Then, divide the remaining
    memory by the per-session dynamic memory requirement (KV cache) and take the floor. Finally, divide
    the total accelerator TDP by the maximum concurrent sessions to find the power per session.
  common_mistake: Candidates often forget to subtract the memory footprint of both models in the compound
    system, typically ignoring the embedding model's footprint. Some also forget to take the floor of
    the final division, assuming partial sessions are valid.
  napkin_math: Total Memory = 32 GB. Static Model Memory = 2 GB (embedding) + 14 GB (LLM) = 16 GB. Available
    Memory = 32 GB - 16 GB = 16 GB. Max concurrent sessions = floor(16 GB / 1.5 GB per session) = floor(10.66)
    = 10 sessions. Power budget per session = 75W / 10 sessions = 7.5W.
