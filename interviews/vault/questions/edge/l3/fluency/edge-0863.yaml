id: edge-0863
title: Staleness-Aware Reconciliation in Offline Drones
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A remote agricultural drone fleet uses federated learning to update a 10 million parameter vision
  model. The fleet syncs daily, but Drone Alpha goes offline for $\tau = 15$ rounds. Upon reconnection,
  it must merge its stale local adaptation with the new global state. The central server uses a staleness-aware
  reconciliation discount factor $s(\tau) = \frac{1}{1 + 0.2\tau}$. Given a standard uniform aggregation
  weight of $0.05$ (for 20 drones), calculate Drone Alpha's effective discounted weight and the total
  combined uplink/downlink payload required for full reconciliation, assuming all updates and models are
  transmitted using INT8 quantization (1 byte per parameter).
details:
  realistic_solution: Apply the staleness discount to scale down the contribution weight to 0.0125 to
    prevent divergence, and budget 20MB of total bandwidth for the complete bidirectional state sync.
  common_mistake: Applying the stale update with its full original weight (causing global model divergence)
    and only calculating the uplink payload without accounting for the required downlink of the new global
    state.
  napkin_math: '1. Staleness $\tau = 15$ rounds.

    2. Discount factor $s(15) = 1 / (1 + (0.2 \times 15)) = 1 / 4 = 0.25$.

    3. Effective weight = Base Weight $\times s(15) = 0.05 \times 0.25 = 0.0125$.

    4. Single payload size = 10,000,000 params $\times 1$ byte/param = 10MB.

    5. Total payload = 10MB uplink (stale local update) + 10MB downlink (latest global model) = 20MB.'
