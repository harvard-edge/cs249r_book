id: edge-fill-01514
title: 'Coral Edge TPU Disease Detection: Active Learning for Rare Disease Data Curation'
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing an agricultural drone equipped with a camera to detect early signs of
  a rare plant disease. The drone uses a custom object detection model running on a Google Coral Edge
  TPU, which provides 4 TOPS of INT8 performance and operates at 2W, strictly limited to INT8 inference.
  The current model struggles with the rare disease due to extreme class imbalance in your initial dataset.
  To significantly improve performance for this rare disease, you propose an active learning strategy
  for dataset curation. Describe how you would design this active learning loop, focusing on data selection
  criteria, annotation workflow, and how you'd manage potential dataset bias inherent in such a strategy.
  Additionally, given the Coral's constraints, how would you quantify the annotation effort required for
  a target improvement, and what metrics would you use to ensure efficient use of your limited annotation
  budget while targeting the Coral's INT8-only environment?
details:
  realistic_solution: Implement an active learning strategy combining uncertainty sampling (e.g., based
    on model entropy or confidence margin for the rare class) with diversity sampling (e.g., using k-means
    clustering or core-set selection on feature embeddings) to prioritize informative and representative
    rare disease examples. Establish a multi-stage annotation workflow with robust inter-annotator agreement
    checks, especially for ambiguous rare disease cases. Regularly monitor model performance on a diverse
    validation set, specifically tracking INT8 quantization compatibility and fine-tuning annotation guidelines
    based on model feedback and quantization results to mitigate bias.
  common_mistake: Candidates often propose simple random sampling or only uncertainty-based sampling without
    considering diversity, leading to redundant annotations. Another common mistake is neglecting the
    INT8 constraint during dataset design or assuming models will quantize efficiently without specific
    data curation strategies.
  napkin_math: Consider an initial dataset of 10,000 images, with only 100 examples of the rare disease.
    You aim to increase the rare disease positive samples by 5x (500 new examples) using active learning.
    If annotating an ambiguous image (which may or may not contain the rare disease) takes an average
    of 30 seconds and costs $0.50, and your active learning system identifies 1,000 ambiguous images per
    iteration from which you expect to extract 500 new positive examples, what is the total estimated
    annotation cost and time required to reach your target of 500 new positive examples, assuming 1 iteration
    is sufficient?
