schema_version: 1
id: edge-0855
title: Shadow Evaluation Latency Budget
topic: latency-decomposition
status: published
provenance: imported
scenario: A smart factory edge gateway processes vibration sensor data at 100 Hz (10ms arrival interval).
  A frozen baseline anomaly detection model takes 6ms to infer on the local NPU, and shared data preprocessing
  takes 2ms per sample. You deploy a newly adapted model (also 6ms inference) in shadow mode to evaluate
  performance degradation on live data. Since 2ms + 6ms + 6ms = 14ms exceeds the 10ms strict arrival deadline,
  calculate the maximum frequency (1 out of every N samples) you can evaluate the shadow model without
  dropping sensor packets, assuming an infinite FIFO queue.
details:
  realistic_solution: The shared preprocessing (2ms) and baseline model (6ms) consume 8ms per sample,
    leaving 2ms of idle compute budget per 10ms interval. The shadow model requires an additional 6ms.
    To prevent the queue from growing indefinitely, the total compute time over N samples must be less
    than or equal to N * 10ms. Therefore, N * 8ms + 6ms <= N * 10ms, which simplifies to 6ms <= 2ms *
    N, so N >= 3. The shadow model can be evaluated at most on 1 out of every 3 samples.
  common_mistake: Candidates often forget that preprocessing is shared and only needs to be computed once
    per sample, or they incorrectly assume both models must be run strictly within the 10ms window of
    a single sample, missing the opportunity to amortize the shadow model's compute time across multiple
    samples' idle times.
  napkin_math: 'Arrival Interval = 10ms.

    Base compute per sample = 2ms (preprocessing) + 6ms (baseline) = 8ms.

    Idle budget per sample = 10ms - 8ms = 2ms.

    Shadow model compute cost = 6ms.

    Required N = Shadow_cost / Idle_budget_per_sample = 6ms / 2ms = 3.

    Max evaluation frequency = 1 out of every 3 samples.'
