id: edge-cell-11063
title: 'Fault Tolerance: Fluency — MTBF Calculation for Jetson Orin Fleet'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You manage 1,000 Jetson Orin (32GB LPDDR5, 60W) devices deployed in outdoor industrial environments.
  Individual MTBF is 40,000 hours. Estimate fleet-level failure rate, expected failures per month, and
  required spare inventory to maintain 98% fleet availability.
details:
  realistic_solution: Fleet failure rate = 1000 / MTBF_single. Expected failures per month = fleet_rate
    × 720 hours. Spare inventory = expected failures per repair cycle × safety factor.
  common_mistake: Confusing MTBF of a single device with fleet MTBF; not calculating spare inventory based
    on failure rate and repair/replacement cycle time.
  napkin_math: 'Fleet failure rate: 1,000 / 40,000 hours = 0.025 failures/hour = 18 failures/month. Each
    failure: replace device, ship back for repair. Replacement cycle: 5 days (order + ship). During 5
    days, more failures: 0.025/hr × 120hr = 3 additional failures. Spare inventory: 18 + 3 = 21 spares.
    Add 2× safety factor = 42 spares. At $2K/Orin: $84K spare inventory. Fleet availability: if repair
    takes 5 days, unavailable devices = 18/month × 5 days / 30 days = 3 devices unavailable on average.
    3/1000 = 0.3% unavailable → 99.7% availability > 98% target. At $3/hr power × 1000 devices × 720hr/month
    = $2.16M/month operating cost.'
