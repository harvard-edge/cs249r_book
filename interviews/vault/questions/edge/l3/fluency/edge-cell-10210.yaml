schema_version: 1
id: edge-cell-10210
title: Explaining Agentic Tool-Use Constraints on Jetson Orin
topic: compound-ai-systems
status: published
provenance: imported
scenario: A developer asks why their agentic system — which works fine on a cloud server — runs into problems
  on Jetson Orin (32GB LPDDR5, 60W). The agent calls external tools (sensor APIs, local database queries)
  between LLM reasoning steps. The cloud version does 8 tool calls per task; on Orin the same agent takes
  47 seconds vs 4 seconds in the cloud. Explain the fundamental constraints that make multi-hop agentic
  execution expensive on edge hardware.
details:
  realistic_solution: 'The bottleneck is memory bandwidth for KV cache reads, not just FLOPS. After 4
    tool calls, context is 4096 tokens. Each reasoning step reads the full KV cache: 4096 * 2 * num_layers
    * head_dim * 2 bytes. For a 7B model (32 layers, 128 dim): 4096 * 2 * 32 * 128 * 2 = 67MB per step.
    At LPDDR5''s 68.3GB/s: 67MB/68.3GB/s = 1ms per KV read. But at only 12 tok/s decode: 8 hops * (context_prefill
    + 50 token generation) = 8 * (4s + 4s) = 64s. Must reduce hop count via tool result summarization.'
  common_mistake: Attributing the slowdown entirely to the LLM being slower and recommending a smaller
    model. While model size matters, the primary issue is that each tool call incurs a full prefill round-trip
    (reading the accumulated context + tool result), and the memory bandwidth of LPDDR5 (68.3GB/s) vs
    HBM3 (3.35TB/s) creates a 49x bandwidth gap for KV cache reads.
  napkin_math: 'Cloud H100 decode: ~100 tok/s. Jetson Orin: ~12 tok/s. Speedup ratio: 100/12 = 8.3x. Expected
    slowdown for same work: 4s * 8.3 = 33s. Actual: 47s suggests additional overhead. KV cache per hop:
    4096 tokens * 40KB/token = 160MB by hop 4. LPDDR5: 160MB / 68.3GB/s = 2.3ms per prefill scan — minimal.
    Real issue: 8 hops * 50 decode tokens each = 400 tokens / 12 tok/s = 33s decode alone + 8 * prefill
    overhead.'
