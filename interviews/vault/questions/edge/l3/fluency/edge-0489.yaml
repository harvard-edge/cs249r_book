title: 'The Sensor Fusion Bottleneck: Interconnect Topology'
topic: interconnect-topology
status: draft
provenance: imported
scenario: 'You are an ML Systems Engineer at an autonomous vehicle company designing the compute system
  for sensor fusion. The system must process data from multiple cameras and a LIDAR sensor under a hard
  real-time budget of 15ms. Your prototype, using two GPUs, is missing this budget. The key challenge
  is a required peer-to-peer (P2P) exchange of a 32MB feature map between the two GPUs during the fusion
  process. You are asked to diagnose the bottleneck by comparing two designs:'
details:
  realistic_solution: The primary bottleneck is the communication architecture in Design A. A P2P transfer
    over PCIe is fundamentally slower than a direct interconnect. While PCIe Gen5 has high theoretical
    bandwidth, it's a shared bus protocol that often involves the CPU root complex, adding significant
    latency. NVLink is a dedicated, point-to-point interconnect between GPUs, designed for exactly this
    kind of low-latency, high-bandwidth data exchange. The calculation shows the PCIe transfer takes a
    full millisecond, a huge portion of a 15ms real-time budget, whereas the NVLink transfer is trivial
    in comparison.
  common_mistake: Engineers often underestimate the latency impact of traversing a shared bus like PCIe
    for peer-to-peer communication, especially compared to a direct, cache-coherent interconnect like
    NVLink. They may incorrectly assume the bottleneck is memory bandwidth or compute, when it's actually
    the communication protocol and topology between processing units.
  napkin_math: We calculate the time for the 32MB P2P transfer in each design.
