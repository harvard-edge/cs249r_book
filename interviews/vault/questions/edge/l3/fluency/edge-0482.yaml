id: edge-0482
title: The Federated Fleet's Budget Blowout
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML Systems Engineer on the autonomous driving team at a major EV manufacturer. You're
  running an A/B test on 10,000 vehicles to evaluate a new lane-keeping model trained via Federated Learning.
  Your legacy model was 40 MB and was updated once per day. The new, more complex model is 50 MB and requires
  four communication rounds per day to converge effectively. The finance department reports that the daily
  cellular data costs for the A/B test group have unexpectedly quintupled. Given that cellular data costs
  $2.00 per GB, diagnose the primary driver of the 5x cost increase.
details:
  realistic_solution: The primary driver of the cost increase is the 4x jump in communication frequency,
    which creates a multiplicative effect with the model size. In Federated Averaging, each 'communication
    round' involves the device downloading the global model and uploading its updated local model. Therefore,
    the total data transfer is a function of both model size and communication frequency. The 4x increase
    in frequency, combined with a 1.25x increase in model size, results in a 5x total increase in data
    transferred per day, perfectly explaining the cost explosion.
  common_mistake: Engineers often focus exclusively on the static size of the model, assuming a 25% larger
    model should lead to a ~25% cost increase. They also frequently misunderstand the fundamentals of
    Federated Learning, incorrectly assuming that raw sensor data (which is huge) is being uploaded, rather
    than just the model weights.
  napkin_math: 'Let''s calculate the daily data cost per vehicle for both scenarios. Legacy (40 MB model,
    once/day, 1 round/day): Download 40 MB + Upload 40 MB = 80 MB/day. New (50 MB model, 4 rounds/day):
    Download 50 MB + Upload 50 MB = 100 MB/round × 4 = 400 MB/day. Per-vehicle cost increase: 400 / 80
    = 5× more data. For 10,000 vehicles: Legacy = 10,000 × 80 MB = 800 GB/day. New = 10,000 × 400 MB =
    4,000 GB/day. At $0.09/GB: Legacy = $72/day; New = $360/day = $131,400/year for the test fleet alone.'
