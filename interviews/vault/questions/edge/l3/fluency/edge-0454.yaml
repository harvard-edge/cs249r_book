id: edge-0454
title: The Autonomous Vehicle Scaling Trap
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer on an autonomous driving team, tasked with optimizing a new sensor
  fusion pipeline. The pipeline processes LiDAR point clouds on GPU 1 and fuses the result with camera
  data on GPU 2. Profiling reveals that the end-to-end latency is 50ms, missing the hard real-time deadline
  of 33ms. The compute on each GPU takes only 10ms, but the transfer of the 256MB intermediate 'bird's-eye-view'
  tensor from GPU 1 to GPU 2 is taking a staggering 30ms. You discover the two GPUs are in separate chassis
  connected by a 100 Gbps InfiniBand link. Your colleague argues this is fine because '100 Gbps is faster
  than our PCIe bus'. Based on the physics, diagnose the primary bottleneck.
details:
  realistic_solution: 'The primary bottleneck is the interconnect topology itself. Using InfiniBand, even
    with RDMA, introduces network-level latencies (microseconds for the round-trip, plus protocol overhead)
    that are orders of magnitude higher than an on-board interconnect. The solution is to change the system
    architecture: both GPUs must be co-located in a single compute chassis and connected directly via
    an NVLink bridge. This changes the communication from a slow inter-node network hop to a direct, ultra-fast
    intra-node memory transfer.'
  common_mistake: Engineers often suffer from 'bandwidth myopia', becoming impressed by large numbers
    like '100 Gbps' without considering the context. They incorrectly assume that a high-speed network
    fabric (InfiniBand), designed for inter-node communication, is a suitable replacement for a high-bandwidth,
    ultra-low-latency on-board bus (NVLink) for tightly-coupled, real-time GPU communication. They misdiagnose
    a topology problem as a simple bandwidth problem.
  napkin_math: 'The core task is to compare the theoretical transfer times for the 256MB tensor across
    different interconnects: InfiniBand HDR (200 Gbps = 25 GB/s): 256 MB / 25 GB/s = 10.24 ms. NVLink
    4.0 (900 GB/s): 256 MB / 900 GB/s = 0.28 ms. PCIe Gen4 x16 (32 GB/s): 256 MB / 32 GB/s = 8 ms. InfiniBand
    adds network protocol latency (~5–20 µs round-trip) on top of the raw transfer, pushing effective
    latency higher. NVLink is ~36x faster than InfiniBand for this payload.'
