id: edge-0479
title: The Autonomous Driving Perception Bottleneck
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer at an AV company, trying to optimize a new YOLO-like perception
  model on a Jetson AGX Orin. The Orin provides 275 TOPS (INT8) and has a memory bandwidth of 204.8 GB/s.
  Profiling reveals that a specific depthwise separable convolution layer is a major performance bottleneck,
  preventing the pipeline from meeting its 33ms deadline.
details:
  realistic_solution: The correct approach is to calculate the layer's Arithmetic Intensity (AI) and compare
    it to the hardware's capabilities. The AI determines how many operations are performed per byte of
    data moved from memory. This tells you whether the layer is limited by compute speed or memory speed.
  common_mistake: Engineers often instinctively blame the number of operations ('the model is too big')
    for performance issues. They focus on pruning or quantizing further, without first checking if the
    workload is actually compute-bound. If a layer is memory-bound, reducing operations may yield zero
    speedup.
  napkin_math: '**1. Given layer profile:** FLOPs = 500 MFLOPs (0.5 GFLOPs). Memory traffic (weights +
    activations) = 50 MB. | **2. Arithmetic Intensity (AI):** AI = FLOPs / Bytes = 500M / 50M = **10 Ops/Byte.**
    | **3. Orin ridge point:** Ridge = Peak Compute / Peak BW = 275 TOPS / 204.8 GB/s = **1,342 Ops/Byte.**
    | **4. Diagnosis:** AI (10) << Ridge (1,342), so this layer is deeply **memory-bandwidth bound.**
    The compute units are idle ~99% of the time waiting for data. | **5. Attainable performance:** BW-limited
    throughput = 204.8 GB/s x 10 Ops/Byte = 2.048 TOPS — only 0.7% of peak 275 TOPS. | **6. Layer latency:**
    500M Ops / 2.048T Ops/s = **0.24 ms.** | **7. Fix:** Fuse this depthwise conv with adjacent pointwise
    conv to keep activations in SRAM, increasing effective AI. Pruning or quantizing further will NOT
    help — the bottleneck is memory, not compute.'
