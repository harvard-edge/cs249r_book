id: edge-0837
title: Federated Gradient Uplink Calculation
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a federated learning system for a predictive keyboard using a 32-million parameter
  language model. The gradients are computed locally in FP32 on user smartphones. The average cellular
  uplink bandwidth available during training is 2 Mbps. To prevent excessive battery drain and user data
  consumption, product requirements state that the gradient upload phase must not exceed 40 seconds per
  round. Assuming a fixed 2 MB overhead per upload for protocol headers, error correction, and encryption,
  determine the maximum allowable quantization bit-width for the gradients to meet this latency target.
details:
  realistic_solution: 'First, calculate the maximum total payload size based on the time and bandwidth
    constraints: 40 seconds * 2 Mbps = 80 Megabits, which is 10 Megabytes (MB). Subtract the 2 MB fixed
    overhead to find the gradient payload budget, which is 8 MB. Convert this budget to bits: 8 MB * 8
    bits/byte = 64 Megabits. Divide the total bit budget by the number of parameters to find the bit-width:
    64 million bits / 32 million parameters = 2 bits per parameter. You must apply 2-bit gradient quantization
    to meet the constraints.'
  common_mistake: Failing to convert between megabits (Mb) and megabytes (MB) correctly for the network
    uplink, or neglecting to subtract the fixed protocol overhead before calculating the per-parameter
    bit-width.
  napkin_math: 'Max Payload = 40s * (2 Mbps / 8) = 10 MB

    Gradient Budget = 10 MB - 2 MB overhead = 8 MB

    Total Gradient Bits = 8 MB * 8 bits/byte = 64 Mbits

    Required Bit-Width = 64 Mbits / 32M params = 2 bits/param'
