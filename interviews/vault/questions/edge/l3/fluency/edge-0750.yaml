id: edge-0750
title: The Zero-Touch Provisioning Pipeline
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're deploying 1,000 Coral Dev Board Mini devices for a retail shelf-monitoring pilot. Your
  ops team says they will flash a generic firmware image to all devices at the factory, and the devices
  will download their ML models on first boot. Why is this generic provisioning approach insufficient
  for ML edge deployments, and how must provisioning include hardware-specific model compilation and calibration
  data specific to the target hardware SKU?
details:
  realistic_solution: Generic provisioning works for standard software, but ML models on edge accelerators
    are tightly coupled to the specific silicon they run on. A generic model file often cannot run efficiently
    (or at all) without a hardware-specific compilation step. For a Coral Edge TPU, the model must be
    compiled specifically for the Edge TPU architecture using the Edge TPU Compiler. If you deploy to
    a mixed fleet (e.g., some Coral boards, some Jetson Nanos), the provisioning system must identify
    the exact hardware SKU on first boot and deliver the correctly compiled binary (e.g., a TensorRT `.engine`
    for the Jetson, an `edgetpu.tflite` for the Coral).
  common_mistake: '"Just download the `.tflite` file on first boot." This ignores the hardware-specific
    compilation and calibration required by edge ML accelerators.'
  napkin_math: 'A generic FP32 model might run at 2 FPS on the Coral''s host CPU. A properly provisioned,
    Edge TPU-compiled INT8 model runs at 60 FPS on the accelerator. If the provisioning system just downloads
    the generic model, you lose 30× performance. If it downloads the wrong compiled model (e.g., compiled
    for a different Edge TPU compiler version), inference crashes entirely. The provisioning server must
    maintain a matrix: `Device ID -> Hardware SKU -> OS Version -> Model Architecture -> Quantization
    Profile -> Compiled Binary`.'
