schema_version: 1
id: edge-exp2-flue-0045
title: Active Learning Inference Time on Coral TPU
topic: dataset-curation
status: published
provenance: imported
scenario: You are curating a dataset using active learning for an object detection model deployed on a
  Google Coral Edge TPU. To select the most uncertain samples for manual labeling, you must run inference
  on an unlabeled pool of 2,000,000 images using your current INT8 model. The model requires 8 GOPS per
  image. Assuming you can achieve 50% of the Coral's theoretical 4 TOPS INT8 peak performance due to USB/PCIe
  I/O and memory overhead, calculate how long it will take a single Coral device to process the entire
  unlabeled dataset.
details:
  realistic_solution: The correct approach calculates the effective TOPS, determines the throughput in
    frames per second, and then divides the total dataset size by the throughput. Recognizing the difference
    between theoretical and effective hardware utilization is critical for realistic edge deployment and
    data curation planning.
  common_mistake: Candidates often use the theoretical 4 TOPS peak without accounting for the stated 50%
    utilization, or they confuse GOPS (10^9) with TOPS (10^12) causing a 1000x error in their throughput
    calculations.
  napkin_math: '1. Effective compute = 4 TOPS * 50% = 2 TOPS (2 * 10^12 ops/sec).

    2. Throughput = (2 * 10^12 ops/sec) / (8 * 10^9 ops/image) = 250 images/sec.

    3. Total time = 2,000,000 images / 250 images/sec = 8,000 seconds.

    4. 8,000 seconds = 133.3 minutes (or approximately 2.22 hours).'
