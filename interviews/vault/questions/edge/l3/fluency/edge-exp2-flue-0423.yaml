id: edge-exp2-flue-0423
title: Watchdog Threshold for Deterministic Execution
topic: safety-certification
status: published
provenance: imported
scenario: You are designing the functional safety architecture for an autonomous industrial system using
  the Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x, 75W) as the on-premise inference accelerator.
  The critical perception model requires 1,200 Giga-Operations (GOPs) per inference. To ensure deterministic
  execution for certification, the safety manual dictates an assumed worst-case compute utilization of
  exactly 10% of peak TOPS to account for worst-case memory stalls on the LPDDR4x under mixed workloads.
  Calculate the exact hardware watchdog timer threshold if the safety policy requires the timer to trigger
  at exactly 20% above the worst-case execution time (WCET).
details:
  realistic_solution: A reliable safety-critical system must plan for worst-case execution time (WCET),
    not average or peak performance. By applying the guaranteed deterministic utilization factor to the
    peak compute, we find the realistic worst-case inference time. We then apply the required safety margin
    to this WCET to set a watchdog timer that catches true system hangs without triggering during normal
    heavy-load variance.
  common_mistake: Candidates often calculate the execution time using the peak 400 TOPS without applying
    the deterministic utilization constraint, resulting in a dangerously low execution time estimate of
    3 ms. This leads to setting a watchdog timer of 3.6 ms, which would cause constant spurious system
    resets in a real deployment.
  napkin_math: '1. Calculate effective deterministic compute: 400 TOPS INT8 * 10% = 40 TOPS.

    2. Convert model operations to TOPs: 1,200 GOPs = 1.2 TOPs.

    3. Calculate Worst-Case Execution Time (WCET): 1.2 TOPs / 40 TOPS = 0.03 seconds (30 ms).

    4. Apply safety margin for watchdog threshold: 30 ms * 1.20 (20% margin) = 36 ms.'
