id: edge-0456
title: The Autonomous Perception Latency Puzzle
topic: 3d-parallelism
status: published
provenance: imported
scenario: You're an ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new LiDAR
  perception model. The model consists of 8 identical transformer blocks. On a single edge accelerator,
  it has an end-to-end latency of 40ms, which misses your hard real-time deadline of 33ms (for 30 FPS).
details:
  realistic_solution: 'Tensor parallelism is correct because it reduces single-inference latency, while
    pipeline parallelism does not. With 2 accelerators and tensor parallelism: split each of the 8 blocks
    across both devices, halving per-block compute time to 2.5ms. Total latency = 8 × (2.5ms compute/block
    + 0.5ms sync) = 24ms — under the 33ms deadline. Pipeline parallelism: 4 blocks per device, first token
    latency = 4 × 5ms (stage 1) + 4 × 5ms (stage 2) = 40ms minimum — the same as the original 40ms due
    to the pipeline bubble. For single-inference latency, tensor parallelism wins.'
  common_mistake: Engineers often incorrectly assume pipeline parallelism is always superior for latency-critical
    tasks. They forget to account for the 'pipeline bubble' — the time the last stage is idle waiting
    for the first frame to propagate through the initial stages. For a single inference, the total latency
    is the sum of all stage latencies plus communication, not just the latency of the slowest stage.
  napkin_math: 'Single device latency = 8 blocks * 5ms = 40ms. Pipeline parallelism gives 20ms per stage,
    but end-to-end latency remains 40ms (missing the 33ms target). Tensor parallelism splits compute:
    (5ms / 2) = 2.5ms per block. With 0.5ms sync overhead per block, new latency = 8 * (2.5ms + 0.5ms)
    = 24ms, successfully meeting the 33ms deadline.'
