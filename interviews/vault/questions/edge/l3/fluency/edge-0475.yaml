id: edge-0475
title: The Autonomous Driving FPS Mystery
topic: roofline-analysis
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your new LiDAR-based 3D object
  detection model runs on a Jetson AGX Orin (in its 60W power profile). The model must achieve a 20 FPS
  minimum to meet the real-time perception system's deadline. However, live profiling shows the pipeline
  only achieves 12 FPS, even though `nvprof` reports 95% GPU utilization. You've determined the model
  performs approximately 40 GFLOPs (FP16) and requires moving 16 GB of data (weights, activations, and
  large intermediate 3D voxel grids from DRAM) for each inference. Using the Jetson AGX Orin's hardware
  specs, diagnose the primary performance bottleneck.
details:
  realistic_solution: The model is memory-bandwidth bound. To determine this, we must compare the model's
    Arithmetic Intensity (AI) with the hardware's Roofline Ridge Point. The model's AI is low, meaning
    it performs relatively few calculations for each byte it fetches from memory. The Jetson Orin's architecture
    has powerful compute units, but they are being starved of data by the relatively slower main memory
    bandwidth. The 95% utilization is misleading; it's mostly stall cycles. To improve FPS, the team must
    increase the model's AI through techniques like operator fusion, using smaller precision formats (if
    possible), or redesigning the model to have better data reuse.
  common_mistake: Engineers often see 'high GPU utilization' and immediately conclude the model is compute-bound.
    They fail to recognize that utilization can also represent stall time, where the compute units are
    active but are waiting for data from a slower part of the system, like DRAM. They mistake 'busy' for
    'productive'.
  napkin_math: Jetson AGX Orin has 204.8 GB/s bandwidth and ~66 TFLOPS (FP16). At 20 FPS, frame time budget
    is 50ms. Ridge Point = 66,000 GFLOPS / 204.8 GB/s = 322 OPS/Byte. If the 3D LiDAR model processes
    2 GB of point cloud data per frame (AI = 20 OPS/Byte), it is memory-bound. Reading 2 GB takes 2 GB
    / 204.8 GB/s = 9.7 ms per frame, leaving ~40 ms for compute, comfortably meeting the 50ms deadline.
