id: edge-fill-01229
title: 'Hailo-8 Edge Deployment: Canary Release for Object Detection Model'
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: Your team is deploying an updated object detection model to a fleet of edge devices, each powered
  by a Hailo-8 AI processor (26 TOPS INT8, 2.5W). The current model processes 100 FPS with an average
  inference latency of 8ms. The new model offers a 10% improvement in accuracy but has slightly higher
  computational demands. You need to perform a canary release to 10% of the fleet, which consists of 1000
  devices, and monitor its performance before a full rollout. Describe the strategy, key metrics, and
  perform napkin math to estimate the impact on power consumption for the canary fleet.
details:
  realistic_solution: Implement a canary release strategy with a small, isolated subset of devices (10%
    of the fleet). Use traffic splitting at the device level or an upstream gateway to route 10% of the
    workload to the new model. Monitor key metrics like inference latency, throughput, model accuracy
    (if online evaluation is feasible), device temperature, and crucially, power draw, ensuring it remains
    within acceptable limits. Define clear rollback triggers (e.g., 5% increase in latency, 20% increase
    in power consumption, or specific error rates) and automate the rollback process. The solution would
    involve robust metric collection from the edge devices and a centralized monitoring system with alerting.
  common_mistake: Failing to establish clear rollback criteria or not having automated rollback mechanisms.
    Overlooking power consumption implications at scale, especially for edge devices, or not properly
    isolating canary traffic, leading to skewed metrics or impact on critical services.
  napkin_math: 'Hailo-8 consumes 2.5W per device. For a canary fleet of 10% of 1000 devices, that''s 100
    devices.

    Current total power for 100 devices: 100 devices * 2.5W/device = 250W.

    Given ''slightly higher computational demands'' for the new model, let''s assume it increases power
    consumption by 5% on average per device due to higher utilization of the Hailo-8.

    New model power per device: 2.5W * 1.05 = 2.625W.

    Total power for canary fleet (100 devices) with new model: 100 devices * 2.625W/device = 262.5W.

    Increased power consumption for the canary fleet: 262.5W - 250W = 12.5W.

    If this 5% increase holds, a full rollout to 1000 devices would mean an additional 125W (1000 * (2.625W
    - 2.5W)), which could be a significant factor for battery-powered or thermally constrained edge deployments.'
