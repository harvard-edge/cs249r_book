title: 'The Sensor Fusion Bottleneck: Real-Time Deadlines'
topic: real-time-deadlines
status: draft
provenance: imported
scenario: 'You are an ML Systems Engineer at an autonomous vehicle company, designing a sensor fusion
  system. The system uses two GPUs. GPU1 preprocesses data from a sensor suite (cameras, LiDAR) and streams
  a continuous 14 Gbps of tensor data to GPU2 for perception modeling. The hard real-time deadline requires
  this GPU-to-GPU transfer to complete with a P99 latency under 5ms. You are diagnosing two architecture
  proposals:'
details:
  realistic_solution: The correct approach is to calculate the maximum theoretical bandwidth for each
    interconnect and compare it against the system's requirement.
  common_mistake: Engineers often focus on latency-saving protocols like RDMA, forgetting that no protocol
    can overcome a fundamental bandwidth deficit. They might believe that commodity networking (Ethernet)
    is 'good enough' for high-bandwidth sensor streams, or conversely, that only the absolute fastest,
    most expensive interconnect (like NVLink) is ever acceptable, ignoring intermediate options like PCIe.
  napkin_math: The core of the problem is a bandwidth comparison.
