id: edge-0470
title: The Driver Monitoring TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer at an automotive company evaluating the cost of updating
  a driver drowsiness detection model deployed across a fleet of 100,000 vehicles. The product team wants
  to ship a major model update each quarter.
details:
  realistic_solution: The correct answer is that Federated Learning has a higher initial cost but is significantly
    cheaper over the 2-year lifetime. The analysis requires calculating the Total Cost of Ownership (TCO)
    for both strategies.
  common_mistake: Engineers often focus on only one part of the cost equation. They might see the large,
    one-time hardware CapEx for the Federated Learning option and reject it, failing to account for the
    massive, recurring operational expense (OpEx) of the cellular data transfer in the Centralized approach.
    Another common mistake is over-weighting the cloud compute cost, which is often trivial compared to
    data logistics costs.
  napkin_math: '**Strategy A: Centralized TCO (2 Years):** Model size: 100 MB. Quarterly updates: 4/year
    × 2 years = 8 updates. Data transfer: 100 MB × 100,000 vehicles × 8 = 80,000 GB. At $0.09/GB: $7,200
    transfer cost. Cloud training: $500/update × 8 = $4,000. Engineering: $150,000/year × 2 = $300,000.
    Total 2-year centralized TCO: ~$311,200. **Strategy B: Federated Learning TCO (2 Years):** FL infrastructure
    (one-time): $200,000. Gradient upload: 10 MB × 100,000 vehicles × 8 rounds = 8,000 GB × $0.09 = $720.
    Aggregation server: $1,000/month × 24 = $24,000. Engineering (specialized): $200,000/year × 2 = $400,000.
    Total 2-year FL TCO: ~$624,720. **Year 1:** Centralized ~$160K vs FL ~$424K. **Year 2:** Centralized
    ~$151K vs FL ~$201K. FL becomes cost-comparable in year 3+ only if engineering costs stabilize.'
