title: The Autonomous Vehicle DMA Bounce
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer at an autonomous vehicle company diagnosing a latency issue
  in the sensor fusion system. The architecture uses two GPUs on a single board connected via a PCIe Gen4
  x16 bus. GPU A runs perception and sends a 256 MB feature tensor to GPU B, which runs path planning.
  Your end-to-end latency budget from camera to planned path is a hard real-time 33ms. Using a profiler,
  you''ve recorded the following timings:'
details:
  realistic_solution: 'The most likely cause is a ''DMA bounce'' through host (CPU) memory. Without a
    direct peer-to-peer transfer path correctly configured (e.g., using NVIDIA''s GPUDirect), the driver
    defaults to a safe but slow path: the data is first copied from GPU A''s VRAM to the CPU''s main RAM,
    and then from RAM to GPU B''s VRAM. This involves two separate DMA operations, effectively traversing
    the PCIe bus twice and adding significant overhead from OS scheduling and memory management. The observed
    20ms latency strongly suggests this two-hop journey is occurring instead of a direct, single-hop peer-to-peer
    transfer.'
  common_mistake: Engineers often focus only on the peak theoretical bandwidth of an interconnect like
    PCIe and forget about the protocol-level overhead and the actual data path. They might calculate the
    theoretical transfer time (256MB / 32GB/s = 8ms), see it fits the budget, and incorrectly conclude
    the interconnect is not the problem. This fails to account for *how* the data is being transferred
    (e.g., direct peer-to-peer vs. a CPU-mediated bounce).
  napkin_math: 'PCIe Gen4 x16 bandwidth = 32 GB/s. A direct P2P transfer of 256 MB takes 256 MB / 32 GB/s
    = 8 ms. Without GPUDirect, data bounces: GPU A to CPU RAM (8 ms), then CPU RAM to GPU B (8 ms). Total
    PCIe transfer time = 8 ms + 8 ms = 16 ms, instantly doubling the communication latency.'
