id: edge-exp2-flue-0415
title: Estimating Maximum Throughput on Qualcomm Cloud AI 100
topic: accelerator-comparison
status: published
provenance: imported
scenario: Your team is evaluating the Qualcomm Cloud AI 100 as an on-premise inference accelerator for
  a high-throughput computer vision pipeline. The accelerator provides 400 TOPS of INT8 compute at a 75W
  TDP, with 32 GB of LPDDR4x memory. Assuming a standard ResNet-50 model requires roughly 8 GOPS per inference
  in INT8, calculate the theoretical maximum Frames Per Second (FPS) this accelerator could achieve if
  it were completely compute-bound. Then, estimate the energy efficiency in terms of inferences per watt.
details:
  realistic_solution: The candidate should correctly identify the provided compute capability (400 TOPS)
    and the model requirement (8 GOPS). By dividing the total available operations by the operations required
    per frame, they can find the theoretical max throughput. Finally, dividing the maximum throughput
    by the 75W TDP yields the power efficiency metric.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with TFLOPS or fail to correctly
    align the operation types. Additionally, they may forget to convert between Tera (10^12) and Giga
    (10^9), leading to calculations being off by three orders of magnitude.
  napkin_math: '1. Total Compute: 400 TOPS = 400,000 GOPS.

    2. Model Cost: 8 GOPS/frame.

    3. Theoretical Max Throughput: 400,000 GOPS / 8 GOPS/frame = 50,000 frames per second (FPS).

    4. Energy Efficiency: 50,000 FPS / 75W = 666.67 inferences per watt.'
