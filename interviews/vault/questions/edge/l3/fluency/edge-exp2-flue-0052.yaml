schema_version: 1
id: edge-exp2-flue-0052
title: Power-Constrained QoS Shedding on Hailo-8
topic: graceful-degradation
status: published
provenance: imported
scenario: You are running a perception pipeline on a Hailo-8 dataflow accelerator (26 INT8 TOPS, 2.5W,
  no local DRAM). The pipeline includes a primary object detector requiring 0.5 INT8 TOPS per frame and
  a secondary enhancement model requiring 0.2 TOPS per frame, both streaming from host memory. A thermal
  event forces the system to enact a quality-of-service (QoS) shedding strategy, capping the Hailo-8 power
  budget at 1.0W. Assuming linear power-to-compute scaling, calculate the degraded compute capacity and
  determine the maximum frame rate you can sustain if you fail-operational by shedding the secondary model
  and only running the primary detector.
details:
  realistic_solution: The correct approach is to calculate the compute efficiency (TOPS per Watt) of the
    Hailo-8, apply the degraded 1.0W power budget to find the new TOPS limit, and then divide this available
    compute by the primary model's per-frame requirement. Shedding the enhancement model entirely ensures
    the critical fail-operational path (the detector) gets all remaining resources.
  common_mistake: Candidates often forget to establish the TOPS/W efficiency ratio first, or they fail
    to account for the fact that dropping the secondary model completely is required before calculating
    the new maximum frame rate for the primary model.
  napkin_math: 1. Compute Efficiency = 26 TOPS / 2.5W = 10.4 TOPS/W. 2. Degraded capacity at 1.0W = 10.4
    TOPS/W * 1.0W = 10.4 TOPS. 3. Primary model alone needs 0.5 TOPS/frame. 4. Max sustainable FPS = 10.4
    TOPS / 0.5 TOPS/frame = 20.8 FPS. The system can gracefully degrade to 20 FPS.
