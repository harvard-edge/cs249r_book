schema_version: 1
id: edge-0687
title: The PTQ vs QAT Question
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your manager says 'just quantize the model to INT8 — it takes five minutes with TensorRT.' You
  push back and say you need two weeks for quantization-aware training. Justify the two weeks.
details:
  realistic_solution: 'Post-training quantization (PTQ) collects activation statistics from a small calibration
    dataset (~1000 images) and sets quantization ranges based on observed min/max values. It works well
    when: activation distributions are symmetric and well-behaved, the model is large (redundancy absorbs
    quantization noise), and the task is tolerant of small errors (classification). PTQ *fails* when:
    (1) the model has outlier channels — a few activations with 10× the magnitude of others force the
    quantization range to be wide, crushing precision for the majority, (2) the task is precision-sensitive
    — depth estimation, segmentation boundaries, or small-object detection where a 1% pixel shift matters,
    (3) the model is already small — a MobileNet has less redundancy to absorb quantization error than
    a ResNet-50. QAT inserts fake-quantization nodes during training, so the model''s gradients learn
    to compensate for quantization error. The two weeks cover: fine-tuning with quantization noise (~3
    days), hyperparameter search for learning rate and quantization scheme (~5 days), validation across
    the full test distribution including edge cases (~4 days).'
  common_mistake: '"QAT is always better than PTQ." This is too vague — you need to explain *when* PTQ
    fails and *why* QAT fixes it.'
  napkin_math: 'PTQ: 1000 calibration images × 5ms each = 5 seconds + TensorRT build = 5 minutes total.
    Accuracy: typically -0.5% to -3% for classification, -2% to -15% for detection on hard classes. QAT:
    50 epochs × 10,000 images × 20ms/image = ~2.8 hours training + validation = 2 weeks of engineering
    time. Accuracy: typically -0.1% to -0.5% — recovering most of the PTQ loss.'
