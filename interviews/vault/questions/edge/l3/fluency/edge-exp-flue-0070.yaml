id: edge-exp-flue-0070
title: Shadow Deployment Memory Constraints on Jetson Orin
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are deploying a new INT8 object detection model to a fleet of NVIDIA Jetson Orin devices
  for autonomous robotics. To safely evaluate the new model without impacting the main control loop, you
  decide to use a shadow deployment strategy where both the current V1 and the new V2 models run concurrently.
  The Jetson Orin has 32 GB of shared LPDDR5 memory, and the base operating system, ROS2 stack, and camera
  buffers consume a constant 14 GB. Given that V1 uses 6 GB of memory and V2 uses 7 GB, calculate the
  remaining memory margin during the shadow rollout.
details:
  realistic_solution: A proper shadow deployment on edge hardware must account for peak memory consumption
    when both models are loaded into the shared memory pool. The solution requires summing the memory
    footprints of the OS, V1, and V2, and subtracting this total from the physical limit. Since the Orin
    shares memory, this concurrent execution directly impacts overall system stability.
  common_mistake: Candidates often forget that edge devices like the Jetson Orin use shared system memory
    (LPDDR5) for both the CPU and GPU. They might mistakenly assume separate VRAM and RAM pools, or forget
    to account for the base system OS and middleware overhead when calculating the peak memory of running
    two models simultaneously.
  napkin_math: Total Available Memory = 32 GB. Base System Overhead = 14 GB. V1 Memory = 6 GB. V2 Memory
    = 7 GB. Total Consumed Memory during Shadow Deployment = 14 GB + 6 GB + 7 GB = 27 GB. Remaining Memory
    Buffer = 32 GB - 27 GB = 5 GB.
