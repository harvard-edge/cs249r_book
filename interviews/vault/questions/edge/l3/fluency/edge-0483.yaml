id: edge-0483
title: The LiDAR Perception Bottleneck
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You are an ML systems engineer on an autonomous driving team, tasked with deploying a new LiDAR
  segmentation model on a Jetson AGX Orin. The model is missing its 33ms real-time deadline, currently
  running at 45ms per frame. Profiling reveals that a single forward pass executes 5 Trillion INT8 operations
  and moves 10 GB of data (weights, activations, and intermediate features) to/from the device's LPDDR5
  memory. Using the Orin's specs from the playbook (Peak 275 TOPS INT8, 204.8 GB/s Memory Bandwidth),
  demonstrate how you would diagnose the primary performance bottleneck.
details:
  realistic_solution: The model is Memory-Bound. The performance is limited by the speed of data transfer
    from DRAM, not by the raw processing power of the compute units. We demonstrate this by calculating
    the model's Arithmetic Intensity (AI) and comparing it to the hardware's ridge point.
  common_mistake: 'Engineers often jump to conclusions based on symptoms. Seeing high GPU usage, they
    might assume the model is too complex and needs to be pruned (a compute-bound solution). Or they might
    see the model is slow and blame the data pipeline (CPU starvation). Both miss the core issue: the
    *ratio* of math to memory access is what determines the bottleneck, which can be diagnosed with a
    roofline analysis.'
  napkin_math: Jetson Orin Ridge Point = 275 TOPS / 204.8 GB/s = 1342.7 Ops/Byte. Model Arithmetic Intensity
    (AI) = 5 Trillion Ops / 10 GB Data = 5e12 / 10e9 = 500 Ops/Byte. Since 500 Ops/Byte < 1342.7 Ops/Byte,
    the model is strictly memory-bound. It will saturate the 204.8 GB/s bandwidth while the compute units
    sit idle >60% of the time.
