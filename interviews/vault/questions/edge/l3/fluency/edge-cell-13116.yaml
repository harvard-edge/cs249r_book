schema_version: 1
id: edge-cell-13116
title: 'Edge TCO Fluency: Rapid Cost-Per-Inference Estimation'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Estimate from memory the cost-per-inference for these systems over 3 years at 10 inferences/second,
  24/7: (1) Jetson Orin ($499, 60W), (2) Hailo-8+Pi5 ($280, 7.5W), (3) Coral+Pi4 ($60, 7W). State the
  formula and rank by cost-efficiency.'
details:
  realistic_solution: Power = 7.5W × 26,280hr × $0.10/1000 = $19.71.
  common_mistake: Forgetting to include the host processor power (Pi or similar) in the Hailo-8 and Coral
    TPU systems, which dominate the power budget for these edge accelerators.
  napkin_math: 'Power cost: 7.5W × 26,280hr × $0.10/kWh / 1000 = 7.5 × 26280 × 0.10 / 1000 = $19.71 (not
    $197.1 which omits /1000).'
last_modified: '2026-04-01'
