schema_version: 1
id: edge-exp2-flue-0420
title: Hailo-8 ONNX Conversion and Graph Break Bandwidth
topic: model-format-conversion
status: published
provenance: imported
scenario: You are converting a custom ONNX object detection model to run on a Hailo-8 accelerator (26
  TOPS INT8, 2.5W, no local DRAM, streams from host memory). The INT8-quantized model requires 13 Giga-Operations
  (GOPS) per inference. During conversion, the Hailo compiler reports an operator coverage gap for a custom
  activation layer, forcing a CPU delegation (graph break) in the middle of the network. This break requires
  streaming a 1MB intermediate INT8 tensor back to the host CPU, and reading the 1MB result back to the
  Hailo-8. Assuming 100% theoretical compute utilization of the Hailo-8, calculate the theoretical maximum
  FPS and the required host memory bandwidth consumed purely by this operator fallback.
details:
  realistic_solution: The correct approach calculates both the compute limit and the resulting bandwidth
    demand of the delegation. At full compute utilization, the accelerator can process 2000 frames per
    second. However, the 2MB round-trip data transfer per frame for the unsupported operator requires
    4 GB/s of host bandwidth. Recognizing this massive I/O overhead, an edge engineer would modify the
    ONNX graph to fuse or replace the custom activation with supported Hailo operators prior to compilation
    to avoid the CPU fallback entirely.
  common_mistake: Candidates often calculate the compute-bound FPS correctly but fail to quantify the
    I/O penalty of the operator fallback. They forget that because the Hailo-8 lacks local DRAM and relies
    on host memory streaming, a high compute throughput multiplies the graph-break bandwidth penalty,
    often leading to a silent PCIe bus bottleneck.
  napkin_math: '1. Compute capacity: 26 TOPS = 26,000 GOPS.

    2. Theoretical max FPS: 26,000 GOPS / 13 GOPS per frame = 2,000 FPS.

    3. Delegation data transfer per frame: 1MB (Hailo to Host) + 1MB (Host to Hailo) = 2MB per frame.

    4. Required host memory bandwidth for fallback: 2,000 FPS * 2 MB/frame = 4,000 MB/s (or 4.0 GB/s).'
