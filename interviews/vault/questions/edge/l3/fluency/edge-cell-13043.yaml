schema_version: 1
id: edge-cell-13043
title: 'Edge Queueing Theory Fluency: M/M/1 Metrics at Critical Utilization'
topic: queueing-theory
status: published
provenance: imported
scenario: Without derivation, state and compute M/M/1 metrics for a Hailo-8 (26 TOPS INT8, 2.5W) running
  vehicle detection (10 GOPS/frame) at 70%, 90%, and 99% utilization with λ=182 inf/s (at ρ=0.7). Show
  the Wq, W, and P99 at each operating point and explain the knee of the curve.
details:
  realistic_solution: 'Hailo-8: μ = 26000/10 = 2600 inf/s. At λ=182: ρ=0.07. For the exercise, fix μ and
    vary λ. At ρ=0.7: λ=1820, Wq=0.7/(2600*0.3)=0.9ms, W=1.28ms, P99=5.9ms. At ρ=0.9: λ=2340, Wq=0.9/(2600*0.1)=3.46ms,
    W=3.85ms, P99=17.7ms. At ρ=0.99: λ=2574, Wq=0.99/(2600*0.01)=38.1ms, W=38.5ms, P99=177ms. Knee of
    curve: between ρ=0.8 and ρ=0.9 where Wq grows 4-5x. Design target: ρ ≤ 0.7.'
  common_mistake: Not knowing that utilization above 80% is the 'danger zone' where M/M/1 latency grows
    hyperbolically, and systems should be provisioned to stay below 70-75%.
  napkin_math: 'μ=2600 inf/s. ρ=0.7: Wq=0.70/(2600*0.30)=0.898ms, W=1.28ms, P99=5.9ms. ρ=0.9: Wq=0.90/(2600*0.10)=3.46ms,
    W=3.85ms, P99=17.7ms. ρ=0.99: Wq=0.99/(2600*0.01)=38.1ms, W=38.5ms, P99=177ms. Ratios (Wq): ρ0.9/ρ0.7
    = 3.85x, ρ0.99/ρ0.9 = 11x. The 3.85x jump from 0.7→0.9 (adding 20pp utilization) vs only moving 2x
    more utilization shows hyperbolic growth.'
