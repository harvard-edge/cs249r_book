title: The Fleet-Learning Cost Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer on the autonomous driving team. Your goal is to improve a perception
  model''s recall for rare ''near-miss'' events (e.g., hard braking for debris). You have a fleet of 100,000
  vehicles. Two proposals are on the table:'
details:
  realistic_solution: 'The correct approach is to calculate the full TCO for each option, including all
    associated costs. The centralized approach has a hidden cost bomb: human data labeling at $5/clip
    for 600K clips/year is $3M — dwarfing the cheap cloud ingress. The FL approach eliminates labeling
    entirely by learning directly from on-device behavior, bringing the total to ~$76K/year. The per-GB
    cellular cost for FL ($10/GB) is 500x higher than cloud ingress ($0.02/GB), but the total data volume
    is so much smaller (2,600 GB vs 180,000 GB) that FL still wins by 39x.'
  common_mistake: 'Engineers often focus narrowly on the per-GB data cost, concluding that cheap cloud
    ingress ($0.02/GB) must be cheaper than expensive cellular reimbursement ($10/GB). This ignores the
    two dominant factors: the massive cost of human data labeling in the centralized approach and the
    huge data reduction (raw video vs. model weights) offered by FL.'
  napkin_math: '**Centralized:** 10K vehicles x 5 clips/mo x 12 months = 600K clips/yr. Each clip ~300
    MB raw video. Upload volume: 600K x 0.3 GB = 180,000 GB. Upload cost at $0.02/GB: 180,000 x $0.02
    = $3,600. Labeling: 600K clips x $5/clip = $3,000,000. **Centralized total: ~$3.0M/yr.** | **Federated:**
    1,000 vehicles/week x 52 weeks = 52,000 round-participations/yr. Model update size: 50 MB each. Data
    volume: 52,000 x 0.05 GB = 2,600 GB. Cellular at $10/GB: 2,600 x $10 = $26,000. FL servers: $50,000/yr.
    **FL total: ~$76,000/yr.** | **Verdict:** FL is ~39x cheaper. Labeling dominates centralized TCO at
    99.9%.'
