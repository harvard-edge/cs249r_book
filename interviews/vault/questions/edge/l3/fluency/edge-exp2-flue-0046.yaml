schema_version: 1
id: edge-exp2-flue-0046
title: Edge TPU Compute Capacity and PSI Drift Calculation
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are deploying a defect detection model on a Google Coral Edge TPU (USB/PCIe form factor,
  4 TOPS INT8, 2W power budget) processing 50 frames per second. The main classification model consumes
  3.5 TOPS of compute. To monitor data drift locally, you deploy a secondary autoencoder to compute reconstruction
  errors, which requires 8 GOPS per frame and must be quantized to INT8 due to limited operator support.
  You also track the Population Stability Index (PSI) of the predicted defect rate. If the expected training
  defect rate is 10% and the actual observed rate is 20%, calculate the remaining compute capacity and
  the PSI contribution for the defect bin (assume ln(2) ≈ 0.69).
details:
  realistic_solution: The correct approach involves calculating the throughput requirements of the drift
    detection model to ensure it fits within the hardware constraints alongside the main model. Because
    the Coral TPU only accelerates INT8 operations, both models must be fully quantized to maintain the
    2W power budget. The PSI formula is then applied to quantify the shift in the defect distribution.
  common_mistake: Candidates often fail to convert GOPS to TOPS, leading to incorrect capacity estimations.
    They may also incorrectly recall the PSI formula, typically swapping the Actual and Expected values
    or forgetting the logarithmic term entirely.
  napkin_math: '1. Drift model compute: 8 GOPS/frame * 50 FPS = 400 GOPS = 0.4 TOPS.

    2. Total compute: 3.5 TOPS (main model) + 0.4 TOPS (drift model) = 3.9 TOPS.

    3. Remaining capacity: 4.0 TOPS total - 3.9 TOPS used = 0.1 TOPS.

    4. PSI formula for a bin: (Actual - Expected) * ln(Actual / Expected).

    5. PSI_defect = (0.2 - 0.1) * ln(0.2 / 0.1) = 0.1 * ln(2).

    6. Using ln(2) ≈ 0.69, the PSI for the defect bin is 0.1 * 0.69 = 0.069.'
