id: edge-0434
title: The AV Perception Latency Puzzle
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new LiDAR
  perception model to a Jetson AGX Orin. The real-time requirement is 30 FPS (a 33ms deadline). Your model
  runs, but only achieves 20 FPS. Profiling shows the model performs 50 G-Ops (INT8) and moves 100 MB
  of data (weights, activations, inputs) per inference. `tegrastats` shows the Orin is only drawing 30W
  of power, well below its 60W configurable maximum. Using the GPU roofline model, diagnose the primary
  bottleneck preventing you from hitting the 30 FPS target.
details:
  realistic_solution: The core issue is that the model is memory-bound. Its Arithmetic Intensity (the
    ratio of compute to memory access) is too low to saturate the Orin's powerful compute units. The Tensor
    Cores finish their work quickly and then sit idle, waiting for data to arrive from memory. This is
    why the performance is low and the power draw isn't reaching its peak — the compute units aren't being
    fully utilized. To fix this, the engineer must either optimize the model to have higher arithmetic
    intensity (e.g., through operator fusion, different layers) or accept that this hardware is not a
    perfect match for this specific model architecture.
  common_mistake: Engineers often guess at bottlenecks without calculation. They might blame thermal throttling
    because the power isn't maxed out, or assume the model is simply 'too big' without analyzing *why*
    it's slow. The roofline model forces a quantitative diagnosis by comparing the model's needs to the
    hardware's capabilities.
  napkin_math: 1. **Calculate the model's Arithmetic Intensity (AI):** AI = FLOPs / bytes = 50 GOps /
    100 MB = 50e9 / 100e6 = 500 Ops/Byte. 2. **Find Jetson Orin Ridge Point:** 275 TOPS INT8 / 204.8 GB/s
    = 1,343 Ops/Byte. 3. **Diagnosis:** AI (500) < Ridge Point (1,343) → memory-bound. 4. **Max achievable
    throughput:** 204.8 GB/s × 500 Ops/Byte = 102.4 TOPS effective → 102.4/275 = 37% utilization. 5. **Latency
    at 50ms:** 50 GOps / 102.4 TOPS = 488 µs compute; model runs at 20 FPS = 50ms/frame; bottleneck is
    memory bandwidth, not compute.
