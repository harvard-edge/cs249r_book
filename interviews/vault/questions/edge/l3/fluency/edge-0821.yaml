id: edge-0821
title: Mitigating Byzantine Poisoning in Federated Learning
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are managing a federated learning system aggregating updates from 1,000 edge devices per
  round. Normal gradient updates have an average L2 norm of roughly 2.0. You detect a Byzantine attack
  where 5% of the devices (50 devices) are compromised, sending malicious updates with an L2 norm of 200.0.
  Assuming worst-case vector alignment, calculate the resulting global gradient norm under standard FedAvg.
  Then, to mitigate this, you implement L2 norm clipping on the server. Calculate the maximum clipping
  threshold C you must set so that the total combined magnitude of the clipped malicious updates is exactly
  10% of the total combined magnitude of the honest updates.
details:
  realistic_solution: Implement L2 norm clipping on all incoming device updates before they are averaged.
    By setting a clipping threshold C = 3.8, the 50 malicious updates are scaled down, restricting their
    total influence without affecting the honest updates.
  common_mistake: Assuming Byzantine Fault Tolerance requires complex multi-round consensus protocols
    like PBFT, overlooking computationally cheap robust aggregation techniques like L2 norm clipping or
    coordinate-wise medians.
  napkin_math: '1. Unmitigated FedAvg average norm (worst-case alignment): (950 * 2.0 + 50 * 200.0) /
    1000 = 11900 / 1000 = 11.9.

    2. Total norm of honest updates: 950 * 2.0 = 1900.

    3. Maximum allowable attacker total norm (10% limit): 1900 * 0.10 = 190.

    4. Required clipping threshold C (since 2.0 < C, honest updates are unclipped): 50 * C = 190 => C
    = 3.8.'
