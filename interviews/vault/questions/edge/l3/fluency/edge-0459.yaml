id: edge-0459
title: The Autonomous Vehicle Interconnect Dilemma
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're an ML Systems Engineer designing a sensor fusion system for an autonomous car. The system
  uses two Jetson AGX Orin SoCs connected inside a single chassis. SoC A produces a 128 MB intermediate
  feature map which must be transferred to SoC B for planning within a 33ms end-to-end latency budget.
details:
  realistic_solution: The correct choice is PCIe. While the raw bandwidth calculation shows both are technically
    fast enough (~4ms for PCIe vs. ~10ms for Ethernet), this misses the fundamental difference between
    a memory bus and a network. PCIe provides direct, low-latency memory access between the SoCs with
    minimal CPU intervention via DMA. This is crucial for a predictable, hard real-time system. Ethernet
    with RDMA, while fast, is architecturally a networking solution. It introduces unnecessary protocol
    overhead, higher power consumption from the external NIC and cabling, and more complex software management
    compared to the tightly integrated PCIe bus. For two chips in the same box, you treat them as a single
    logical system, which is what PCIe enables.
  common_mistake: Engineers often fixate on peak bandwidth numbers (GB/s) and ignore the architectural
    implications of the protocol. They might misapply datacenter networking principles (like RoCE for
    inter-node communication) to a tightly-coupled, embedded system where a memory bus (PCIe) is the more
    appropriate, lower-overhead, and power-efficient solution.
  napkin_math: 'The choice isn''t just about raw bandwidth, but the total overhead in a real-time system.
    PCIe Gen4 x16 bandwidth: 32 GB/s. Transfer time: 128 MB / 32 GB/s = 4 ms. PCIe latency overhead: ~50
    µs. Total: ~4.05 ms. 100 Gbps Ethernet with RDMA bandwidth: 100 Gbps / 8 = 12.5 GB/s. Transfer time:
    128 MB / 12.5 GB/s = 10.24 ms. Network RTT overhead: ~100 µs. Total: ~10.34 ms. PCIe is 2.5x lower
    latency and avoids NIC/driver overhead. Both fit within 33ms budget, but PCIe provides deterministic
    low-latency for a hard real-time system.'
