schema_version: 1
id: edge-exp2-flue-0054
title: Load Balancing Inference Across Multiple Coral TPUs
topic: load-balancing
status: published
provenance: imported
scenario: You are designing a local edge gateway equipped with 4 Google Coral Edge TPUs via PCIe to handle
  video stream inference. Each TPU operates at 2W and provides 4 TOPS for INT8 quantized models. Your
  system uses a round-robin load balancer to route 12,000 object detection requests per second. If one
  INT8 model inference requires 0.8 GOPS, calculate the compute load per TPU and verify if the cluster
  can sustain this traffic.
details:
  realistic_solution: Since the 4 Coral TPUs have identical hardware specifications, a simple round-robin
    load balancing strategy is sufficient to distribute traffic evenly. All models must be pre-quantized
    to INT8 due to the Edge TPU's limited operator support, and routing should keep models pinned to specific
    TPUs if multiple model types are served to avoid PCIe memory transfer bottlenecks.
  common_mistake: Candidates often forget to align units (GOPS vs TOPS) or fail to divide the total load
    by the number of accelerators. They may also neglect to mention that models must be INT8 quantized
    to run on the Coral Edge TPU at all.
  napkin_math: Total compute required = 12,000 requests/sec * 0.8 GOPS/request = 9,600 GOPS = 9.6 TOPS.
    Distributed evenly via round-robin across 4 TPUs = 9.6 TOPS / 4 TPUs = 2.4 TOPS per TPU. Since 2.4
    TOPS is less than the 4 TOPS maximum capacity of a single Google Coral Edge TPU, the load balancer
    will successfully sustain the traffic. The total accelerator power footprint is 4 TPUs * 2W = 8W.
