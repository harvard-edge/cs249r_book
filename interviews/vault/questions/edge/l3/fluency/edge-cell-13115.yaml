id: edge-cell-13115
title: 'Edge TCO Fluency: Quick TCO Estimation for Edge Deployment'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Without a calculator, estimate from memory the 3-year TCO for: (1) 100 Jetson Orin units at
  60W, $499 each, $0.10/kWh, (2) 100 Coral Edge TPU systems at 2W, $25 each, $0.10/kWh, (3) At what daily
  inference volume does option 2 beat cloud at $0.001/inference? Show the annual power cost formula and
  break-even derivation.'
details:
  realistic_solution: 'Fleet power: 100 × 60W × 8760hr × $0.10/1000 = $5,256/yr (not $52,560 — missing
    /1000 for W→kW).'
  common_mistake: Using annual power = watts * hours * rate without dividing watts by 1000 to convert
    to kWh, causing 1000x error in power cost calculations.
  napkin_math: 'Fleet power cost: 100 devices × 60W × 8760hr × $0.10/kWh / 1000 = 100 × 60 × 8760 × 0.10
    / 1000 = 5,256,000 / 1000 = $5,256/yr (not $52,560 which omits /1000).'
