id: edge-0455
title: The Over-Budget Fleet Update
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML systems engineer at an automotive company planning to use Federated Learning to
  update the lane-keeping model across a fleet of 1,000,000 cars. The finance department has allocated
  a strict cellular data budget of $30,000 per month.
details:
  realistic_solution: The proposal was correctly rejected because its projected cost of $48,000 per month
    significantly exceeds the $30,000 budget. The total cost is a product of the data transferred per
    vehicle per round, the number of vehicles sampled per round, the number of rounds, and the cost per
    gigabyte. The calculation demonstrates that while FL offers privacy benefits, its communication costs
    can be substantial at scale and must be carefully modeled.
  common_mistake: 'A common mistake is to forget one of the multiplicative factors: the number of vehicles
    per round, the total number of rounds, or the data transfer in both directions (download + upload).
    Many engineers calculate the cost for a single vehicle or a single round, underestimating the total
    cost by orders of magnitude. Another error is ignoring the model download cost, which is often larger
    than the upload.'
  napkin_math: '1. **Data per vehicle per round:** 25 MB (download) + 5 MB (upload) = 30 MB = 0.03 GB.
    | 2. **Vehicles sampled per round:** 1,000,000 x 5% = 50,000 (assume 5% participation). | 3. **Rounds
    per month:** 4. | 4. **Total data per month:** 50,000 x 0.03 GB x 4 = 6,000 GB. | 5. **Cost per GB
    (cellular):** $0.10. | 6. **Total monthly cost:** 6,000 x $0.10 = $600/month — well within budget.
    | But at $8/GB (enterprise cellular plan): 6,000 x $8 = **$48,000/month** — exceeds the $30,000 budget
    by 60%. | 7. **To meet budget at $8/GB:** Max data = $30,000 / $8 = 3,750 GB. Required reduction:
    cut participation to ~31,250 vehicles/round, or reduce model size, or compress updates to ~19 MB/vehicle.'
