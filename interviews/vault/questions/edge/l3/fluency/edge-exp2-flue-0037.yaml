schema_version: 1
id: edge-exp2-flue-0037
title: Shadow Deployment Resource Budgeting on Jetson Orin
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: A robotics company is executing a shadow deployment of a new transformer-based vision model
  (V2) alongside their existing CNN (V1) on an NVIDIA Jetson Orin. The camera feed is duplicated to both
  models simultaneously to compare predictions in real-time before a full rollout. The Jetson Orin has
  32 GB LPDDR5 memory and a 60W TDP. If V1 requires 6 GB RAM and draws 15W, while V2 requires 14 GB RAM
  and draws 30W, calculate the remaining system resources available for the OS and robotic control stack.
details:
  realistic_solution: When utilizing a shadow deployment on edge devices, the aggregate resource footprint
    must be calculated to prevent OOM kills or thermal throttling. If the remaining resources are too
    tight for the control stack, alternative strategies are required. The team could instead use a fleet-wide
    canary rollout (where some robots run only V2), or run the shadow model asynchronously on a fraction
    of the frames to keep average power draw lower.
  common_mistake: Candidates often assume edge rollouts work exactly like cloud rollouts, failing to recognize
    that a shadow deployment on edge requires running both models concurrently on strictly constrained
    hardware. They frequently forget that memory and power consumption are additive and bounded.
  napkin_math: 'Memory Capacity: 32 GB LPDDR5. Memory Consumed: 6 GB (V1) + 14 GB (V2) = 20 GB. Remaining
    Memory: 32 GB - 20 GB = 12 GB. Power Capacity: 60W TDP. Power Consumed: 15W (V1) + 30W (V2) = 45W.
    Remaining Power: 60W - 45W = 15W. The control stack and OS must fit within the remaining 12 GB of
    RAM and 15W.'
