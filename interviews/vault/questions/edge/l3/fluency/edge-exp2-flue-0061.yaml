id: edge-exp2-flue-0061
title: Edge ESG Metrics and Energy Calculation
topic: responsible-ai
status: published
provenance: imported
scenario: As part of a new organizational accountability framework for Responsible AI, your team must
  report the environmental impact (ESG metrics) of deploying a content moderation model at the edge. The
  system is deployed on a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The INT8
  moderation model requires exactly 20 Tera-Operations (TOP) per request. Assuming the compute engines
  operate at 50% utilization due to memory bottlenecks, calculate the latency per request and the total
  energy consumed per request (in Joules) at maximum TDP.
details:
  realistic_solution: The correct approach requires first finding the effective compute capacity by applying
    the utilization factor. Then, latency is found by dividing the required operations by the effective
    compute rate. Finally, energy is calculated by multiplying the accelerator's TDP by the latency, giving
    a clear metric for ESG guardrail reporting.
  common_mistake: Candidates often forget to factor in the 50% hardware utilization, leading them to incorrectly
    calculate a 50ms latency and 3.75 Joules of energy. They may also incorrectly mix units, confusing
    TOPS (rate) with TOP (absolute operations).
  napkin_math: '1. Effective Compute = 400 TOPS INT8 * 0.50 utilization = 200 TOPS.

    2. Latency = 20 TOP / 200 TOPS = 0.1 seconds (100 ms).

    3. Energy per request = Power (Joules/sec) * Latency (sec) = 75W * 0.1s = 7.5 Joules.'
