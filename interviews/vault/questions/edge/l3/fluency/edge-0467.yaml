id: edge-0467
title: The Autonomous Driving Roofline Puzzle
topic: roofline-analysis
status: published
provenance: imported
scenario: You are an ML systems engineer on an autonomous driving team, tasked with deploying a new LiDAR
  segmentation model to a fleet of test vehicles equipped with Jetson AGX Orin modules. The module is
  in a thermally-constrained enclosure, limiting its sustained power budget to 40W.
details:
  realistic_solution: The primary bottleneck is memory bandwidth. To determine this, we must calculate
    the model's Arithmetic Intensity (AI) and compare it to the Jetson AGX Orin's roofline ridge point.
    The ridge point is the AI needed to saturate the compute units.
  common_mistake: Engineers often fixate on the advertised peak TOPS of a device and assume any performance
    shortfall is due to thermal throttling or inefficient software. They might correctly calculate the
    power-limited peak (~184 TOPS at 40W) and wonder why they aren't hitting it, without first checking
    if the model's arithmetic intensity allows the chip to be fed fast enough to do the work.
  napkin_math: At 40W, suppose Orin sustains 200 TOPS and 204.8 GB/s bandwidth. Ridge Point = 200,000
    GOps / 204.8 GB/s = 976 Ops/Byte. A LiDAR segmentation model executing 180 GOps while moving 300 MB
    of data has an AI of 180e9 / 300e6 = 600 Ops/Byte. Since 600 < 976, it operates in the memory-bound
    region, capping achievable efficiency.
