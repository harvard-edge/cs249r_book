schema_version: 1
id: edge-exp-flue-0088
title: Load Balancing Requests Across Google Coral TPUs
topic: load-balancing
status: published
provenance: imported
scenario: An industrial edge gateway is equipped with 4 Google Coral Edge TPUs via PCIe. An application
  load balancer must distribute incoming image inspection requests. Each request requires an INT8 quantized
  model taking 50 GOPS to execute. If the system receives a sustained load of 200 requests per second,
  calculate the total compute required in TOPS, verify if a single 4 TOPS Coral TPU can handle the load,
  and describe a routing strategy to distribute traffic across the 4 TPUs to maintain an even thermal
  load (each chip draws 2W max).
details:
  realistic_solution: The load balancer should use a round-robin or least-outstanding-requests routing
    strategy at the application level to distribute the 200 requests/sec evenly across all 4 TPUs. This
    ensures no single TPU bottlenecks at its 4 TOPS limit and spreads the thermal dissipation evenly,
    keeping power draw per chip well below the 2W maximum.
  common_mistake: Candidates often miscalculate the conversion from GOPS to TOPS, or fail to account for
    the fact that load balancing at the edge must consider hardware-specific constraints like the Coral's
    4 TOPS limit and strict INT8 quantization requirement.
  napkin_math: 'Compute per request = 50 GOPS. Total compute required = 200 requests/sec * 50 GOPS = 10,000
    GOPS. 10,000 GOPS = 10 TOPS. Capacity of 1 Coral TPU = 4 TOPS. Since 10 TOPS > 4 TOPS, a single TPU
    cannot handle the load. Minimum TPUs needed = ceil(10 / 4) = 3 TPUs. Distributing evenly across 4
    TPUs: 200 requests / 4 = 50 requests/sec per TPU. Compute per TPU = 50 * 50 GOPS = 2,500 GOPS = 2.5
    TOPS. Utilization per TPU = 2.5 TOPS / 4.0 TOPS = 62.5%.'
