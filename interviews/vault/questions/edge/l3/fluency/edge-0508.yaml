title: The Wake-Word ROI Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the ML Systems Engineer for a fleet of 100,000 vehicles. The current in-car wake-word
  model suffers from a high false-accept rate, and the legal team has forbidden uploading raw user audio
  to the cloud for retraining due to privacy risks. Your team proposes using Federated Learning (FL).
  The plan is:'
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for the first
    year for each plan. The FL plan has a capital expense (CapEx) and an operating expense (OpEx), while
    the traditional plan is all CapEx.
  common_mistake: The most common mistake is a unit conversion error, typically confusing Kilobytes (KB)
    and Gigabytes (GB) and arriving at an astronomical data cost. Another error is focusing only on the
    recurring data transfer costs (OpEx) while ignoring the significant one-time infrastructure setup
    cost (CapEx), or vice-versa.
  napkin_math: '1. Participants: 100,000 * 0.10 = 10,000 cars'
