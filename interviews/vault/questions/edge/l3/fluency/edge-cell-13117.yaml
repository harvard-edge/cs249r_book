id: edge-cell-13117
title: 'Edge TCO Fluency: ROI Calculation for Edge vs Cloud'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Quickly estimate (from memory): an edge AI camera system (Hailo-8+Pi5, $280 total, 7.5W, $0.10/kWh)
  replacing a human reviewer earning $40K/year in a quality control line that inspects 1 item/second.
  What is the ROI over 3 years including 5% annual maintenance? What inference volume per day makes this
  economical?'
details:
  realistic_solution: TCO = hardware $280 + power $19.71 + maintenance $42 = $341.71 after correcting
    the power calculation.
  common_mistake: Calculating ROI only based on hardware cost vs labor cost without including the ongoing
    power and maintenance costs, and forgetting to account for the human's 40-hour workweek vs 24/7 machine
    operation.
  napkin_math: 'Total TCO: hardware $280 + power $19.71 + maintenance $42 = $341.71 (not $914 — $914 used
    $197.1 for power before the /1000 correction, giving $280 + $197.1 + $42 ≈ $519, not even $914; the
    error compounds with other uncorrected items).'
