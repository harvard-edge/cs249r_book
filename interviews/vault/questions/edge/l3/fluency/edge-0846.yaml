id: edge-0846
title: SRAM Budget for Microcontroller Fine-Tuning
topic: vram-budgeting
status: published
provenance: imported
scenario: You are implementing on-device learning to personalize a keyword spotting model on an edge microcontroller
  with 256KB of SRAM. The pre-trained base model consists of 100,000 INT8 parameters. To adapt the model
  to the user's voice, you freeze the base model and only fine-tune a new final fully-connected layer
  (1,000 parameters) using FP32 precision. The forward pass requires a 50KB activation workspace. Calculate
  the total SRAM required to hold the base model, the adaptation layer's trainable weights, gradients,
  and Adam optimizer state (batch size 1), and determine if the training process fits on the device.
details:
  realistic_solution: 'Calculate the individual memory components: 100KB for INT8 base weights, 4KB for
    FP32 trainable weights, 4KB for FP32 gradients, and 8KB for Adam states. Combined with the 50KB activation
    workspace, the total is 166KB, comfortably fitting within the 256KB limit.'
  common_mistake: Candidates often forget that the Adam optimizer requires storing two historical state
    variables (momentum and variance) per parameter, which triples the memory footprint of the trainable
    weights compared to plain SGD.
  napkin_math: 'Base weights: 100,000 * 1 byte = 100KB.

    Trainable weights: 1,000 * 4 bytes = 4KB.

    Gradients: 1,000 * 4 bytes = 4KB.

    Adam state (2 moments): 2 * 1,000 * 4 bytes = 8KB.

    Activation workspace = 50KB.

    Total SRAM = 100 + 4 + 4 + 8 + 50 = 166KB. (166KB < 256KB SRAM budget).'
