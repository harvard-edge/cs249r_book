schema_version: 1
id: edge-exp2-flue-0049
title: Hailo-8 INT8 Energy Per Operation
topic: energy-per-operation
status: published
provenance: imported
scenario: We are deploying a continuous vision pipeline on a battery-powered edge device using a Hailo-8
  dataflow accelerator. The Hailo-8 specifications state it delivers 26 TOPS for INT8 workloads while
  consuming 2.5W of power, and it relies entirely on streaming from host memory as it has no local DRAM.
  Before factoring in the host memory access costs, calculate the theoretical energy consumed per single
  INT8 operation on the accelerator itself.
details:
  realistic_solution: The candidate must recall that Energy per Operation is calculated by dividing total
    Power (Joules/second) by Performance (Operations/second). By applying the nominal specs, they can
    find the energy per compute operation, which is critical for establishing a baseline before adding
    the significant energy penalty of streaming weights/activations from host DRAM.
  common_mistake: Candidates often fail to convert Tera (10^12) and Watts (Joules/second) correctly, resulting
    in answers that are orders of magnitude off. They may also confuse operations with MACs (Multiply-Accumulate),
    forgetting that 1 MAC equals 2 operations.
  napkin_math: Power = 2.5 W = 2.5 Joules/sec. Performance = 26 TOPS = 26 * 10^12 Operations/sec. Energy/Op
    = Power / Performance = 2.5 / (26 * 10^12) = 0.0961 * 10^-12 Joules. This equals approximately 0.096
    picojoules (pJ) or 96 femtojoules (fJ) per INT8 operation.
