id: edge-exp2-flue-0044
title: Data Anomaly Detection Throughput on Cloud AI 100
topic: data-quality-validation
status: published
provenance: imported
scenario: You are deploying an anomaly detection model for an industrial sensor data pipeline onto a Qualcomm
  Cloud AI 100 on-premise inference accelerator. The model validates incoming sensor streams before they
  reach the main perception models. Given the AI 100's 400 TOPS INT8 performance and 75W TDP, calculate
  the maximum theoretical throughput of sensor readings per second your data quality gate can process
  if the anomaly detection model requires 2 million INT8 operations per validation.
details:
  realistic_solution: To find the maximum theoretical throughput, divide the total available operations
    per second by the operations required for a single validation pass. Since the model uses INT8, it
    directly maps to the 400 TOPS INT8 specification of the Qualcomm Cloud AI 100.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with other metrics or fail
    to convert units correctly (Tera vs Mega). They might also incorrectly factor in the 32 GB memory
    or 75W power when only the compute throughput is requested.
  napkin_math: Throughput = Total TOPS / Ops per validation = (400 * 10^12 operations/sec) / (2 * 10^6
    operations/validation) = 200 * 10^6 = 200,000,000 validations per second.
