schema_version: 1
id: edge-0436
title: The Sensor Fusion Bottleneck
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer at an autonomous vehicle startup using a ruggedized edge server
  with two GPUs for its perception stack. GPU A runs a LiDAR model, producing a 512 MB feature tensor.
  This tensor must be transferred to GPU B, which runs a camera fusion model. The entire pipeline has
  a hard real-time deadline of 33ms.
details:
  realistic_solution: The most likely bottleneck is the PCIe bus. For two GPUs to communicate over the
    high-speed NVLink interconnect (900 GB/s), they must be physically connected by an NVLink bridge or
    be part of an integrated baseboard (like an NVIDIA HGX system). In many off-the-shelf or custom edge
    servers, the GPUs are only connected to the motherboard's PCIe slots. In this 'peer-to-peer over PCIe'
    configuration, data must travel up from the source GPU to the CPU's PCIe root complex and back down
    to the target GPU. This path is limited by PCIe bandwidth, which is an order of magnitude slower than
    NVLink.
  common_mistake: Assuming that two GPUs in the same physical box automatically communicate over a high-speed
    interconnect like NVLink. Another common error is blaming an external network fabric like InfiniBand
    for communication that should be happening inside the server, or getting the scale of CPU driver overhead
    wrong by multiple orders of magnitude.
  napkin_math: 'Let''s calculate the theoretical time to transfer 512 MB over the different interconnects:
    NVLink (900 GB/s): 512 MB / 900 GB/s = 0.57 ms. PCIe Gen4 x16 (32 GB/s): 512 MB / 32 GB/s = 16 ms.
    The 16ms PCIe transfer consumes almost half the 33ms hard real-time budget for the interconnect step
    alone, leaving only 17ms for compute on both GPUs.'
