schema_version: 1
id: edge-0502
title: The Robot's Perception Power Budget
topic: neural-architecture-search
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer for an autonomous delivery robot startup. The robot uses a Jetson
  AGX Orin with a strict 15W power budget for the perception system, which must run at 30 FPS (33ms latency
  per frame). Your team must choose between two object detection models:


  - **Model A (Efficient-CNN)**: 50 GOPS, moves 20 MB of data per frame.

  - **Model B (Small-ViT)**: 20 GOPS, moves 1.5 GB of data per frame.'
details:
  realistic_solution: The CNN (Model A) is the only viable option. While the ViT's latency appears acceptable,
    its underlying memory-bound nature is fatal for the power budget. A key principle of efficient system
    design is maximizing the ratio of compute to memory access (Arithmetic Intensity). DRAM access is
    orders of magnitude more energy-intensive than on-chip compute. The ViT's need to move 1.5 GB of data
    for every single frame would create enormous memory bus traffic (1.5 GB * 30 FPS = 45 GB/s), causing
    the memory controller to run at high power and violate the 15W thermal design power (TDP). The CNN,
    being compute-bound, keeps most operations on-chip, making it far more power-efficient and thus the
    only choice for a thermally-constrained edge device.
  common_mistake: Engineers often calculate only the theoretical latency and conclude the faster model
    is better. For example, calculating that the ViT's latency is under the 33ms budget and selecting
    it for its higher accuracy. This ignores the critical second-order effect of power consumption, which
    is often the primary constraint in battery-powered edge systems.
  napkin_math: '1. **Hardware Constraints:** From the playbook, the Jetson AGX Orin has a memory bandwidth
    of 204.8 GB/s and a Ridge Point of ~1,342 Ops/Byte. The system has a 15W power budget.

    2. **Model A:** AI = 50e9 / 20e6 = 2500 Ops/Byte (Compute-bound). Power is manageable as data movement
    is minimal.

    3. **Model B:** AI = 20e9 / 1.5e9 ≈ 13 Ops/Byte (Severely Memory-bound). Memory latency = 1.5 GB /
    204.8 GB/s ≈ 7.3ms. However, sustaining 45 GB/s of DRAM bandwidth (1.5 GB * 30 FPS) will overwhelm
    the memory controller and easily exceed the 15W power budget.'
