id: edge-0442
title: The Vision Transformer Traffic Jam
topic: attention-scaling
status: published
provenance: imported
scenario: You are an ML Systems Engineer on a self-driving car team, tasked with selecting a perception
  model for a forward-facing camera. The system runs on a Jetson AGX Orin (275 INT8 TOPS, 204.8 GB/s memory
  bandwidth) and has a hard real-time deadline of 33ms (30 FPS).
details:
  realistic_solution: The ViT is severely memory-bandwidth bound. The core operation in self-attention
    is a large matrix multiplication (Q @ K^T) that has quadratic complexity with respect to the number
    of image patches. This operation has very low arithmetic intensity (AI), meaning the ratio of computations
    to memory accesses is poor. The GPU's powerful compute units spend most of their time idle, waiting
    for data to be shuttled back and forth from DRAM. The CNN, with its depthwise separable convolutions,
    has a much higher AI; its operations are compute-bound and can effectively utilize the Orin's TOPS.
  common_mistake: Blaming the raw FLOP count or parameter count of the ViT. While the ViT is larger, the
    true bottleneck isn't just 'more math' or 'bigger model'—it's the *kind* of math. Engineers often
    forget that data movement, not just computation, governs performance, especially on edge devices with
    limited memory bandwidth compared to their compute capabilities.
  napkin_math: Ridge Point = 275e12 / 204.8e9 = 1342.7 Ops/Byte. In a ViT, calculating attention (Q @
    K^T) for N patches has high memory traffic but relatively low MACs compared to CNN dense filters.
    If the layer performs 200 GOps but moves 0.5 GB of activations/weights, AI = 400 Ops/Byte. 400 < 1342,
    exposing the memory bandwidth wall.
