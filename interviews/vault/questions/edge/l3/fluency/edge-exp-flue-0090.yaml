schema_version: 1
id: edge-exp-flue-0090
title: Host Buffer Sizing for Dataflow Edge Streaming
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are deploying an object detection pipeline on a Hailo-8 accelerator (26 TOPS INT8, 2.5W).
  The model requires 0.26 Tera-operations per inference, running at the peak 26 TOPS capacity. Because
  the Hailo-8 is a dataflow architecture with no local DRAM, the host must continuously stream uncompressed
  6 MB frames from a ring buffer. To handle OS-level thread preemptions, the host must buffer enough frames
  to sustain the accelerator through a 50 millisecond stall. Calculate the allocated host memory required
  for this buffer, assuming the OS requires pinning memory in 4MB contiguous pages to prevent fragmentation
  and eviction.
details:
  realistic_solution: To find the memory pressure, we first determine the accelerator's processing rate
    to know how many frames it consumes during the stall. Since the Hailo-8 relies entirely on host memory,
    we must calculate the buffer depth and then round the memory allocation for each frame up to the nearest
    4MB page boundary to ensure contiguous DMA transfers.
  common_mistake: Candidates typically calculate the raw size of the buffer (5 frames * 6 MB = 30 MB)
    and ignore OS-level memory fragmentation. They also frequently forget to derive the frame rate from
    the TOPS specification, guessing a standard 30 or 60 FPS instead.
  napkin_math: '1. Processing rate: 26 TOPS / 0.26 TOPs per frame = 100 frames per second.

    2. Frames consumed during stall: 100 frames/sec * 0.05 seconds = 5 frames.

    3. Page-aligned frame size: ceil(6 MB / 4 MB) = 2 pages; 2 pages * 4 MB = 8 MB allocated per frame.

    4. Total memory allocated: 5 frames * 8 MB/frame = 40 MB of host memory pressure.'
