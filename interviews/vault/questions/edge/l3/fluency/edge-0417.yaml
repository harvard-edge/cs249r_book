id: edge-0417
title: The Federated TCO Fallacy
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the Staff ML Systems Engineer for a company deploying a new ''unfamiliar face'' detector
  to a fleet of 1 million edge cameras. You must choose between two strategies:

  - **Strategy A (Centralized):** Uses a cheap ($5) SoC. Each camera streams 10 MB of video daily to the
  cloud for analysis and retraining.

  - **Strategy B (Federated Learning):** Uses a more powerful ($8) SoC to perform on-device training,
  only sending 50 KB of model updates daily.'
details:
  realistic_solution: The Federated Learning approach has an overwhelmingly superior Total Cost of Ownership
    (TCO). The $3M extra hardware cost is paid back in just 30 days by the massive savings in data transmission
    costs. The centralized approach would cost ~$100,000 per day in data fees, totaling ~$36.5M annually.
    The federated approach's data costs are negligible in comparison (~$182,500/year). This demonstrates
    that for large fleets, optimizing for network traffic is often the most critical economic lever.
  common_mistake: Focusing solely on the initial Capital Expenditure (CapEx) is a classic TCO fallacy.
    At scale, Operational Expenditure (OpEx) like data transmission, power, and maintenance often dominates
    the total cost. A small per-unit cost increase can be easily justified if it enables massive OpEx
    savings across the fleet.
  napkin_math: '# 1. Calculate the one-time extra hardware cost (ΔCapEx): 1,000,000 × ($8 - $5) = $3,000,000.
    # 2. Calculate daily data usage: Centralized = 10 MB × 1M = 10,000 GB/day. Federated = 50 KB × 1M
    = 50 GB/day. # 3. Calculate annual data cost (OpEx) at $10/GB: Centralized = 10,000 × $10 × 365 =
    $36,500,000/year. Federated = 50 × $10 × 365 = $182,500/year. # 4. TCO Breakeven: $3M CapEx penalty
    is recouped in roughly 30 days of data savings.'
