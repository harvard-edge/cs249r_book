schema_version: 1
id: edge-0408
title: Power Budget for Multi-Model Edge Pipeline
topic: power-budgeting
status: published
provenance: imported
scenario: 'You''re building a smart retail camera that runs three models simultaneously: person detection
  (YOLOv8n, runs on GPU), pose estimation (MoveNet, runs on DLA), and face blur for privacy (a small U-Net,
  runs on GPU). The system is powered by PoE+ delivering 25.5W at the device. The camera sensor + ISP
  draws 3W, the network stack draws 1.5W, and the SoC housekeeping draws 2W. Estimate the power budget
  remaining for ML inference and determine if all three models can run concurrently on a Jetson Orin Nano.'
details:
  realistic_solution: 'Build a full power tree from PoE+ input. 25.5W PoE+ minus 17% conversion losses
    = 21.1W usable. Fixed loads: 3W (sensor) + 1.5W (network) + 2W (housekeeping) = 6.5W. ML budget: 14.6W.
    Estimated ML draw: YOLOv8n on GPU (4W) + MoveNet on DLA (2.5W) + U-Net on GPU (5W) = 11.5W. Electrical
    margin: 3.1W (21%). However, thermal check: 18W total x 4 C/W + 40C ambient = 112C — exceeds the 105C
    shutdown limit. Must reduce total power to ~16.25W, dropping the ML budget to 9.75W. Solution: move
    the U-Net to DLA (saves ~2W) or duty-cycle the pose estimation model.'
  common_mistake: '"The Orin Nano TDP is 15W, so just check if 15W < 25.5W − 6.5W = 19W. It fits." This
    ignores that TDP is the sustained thermal design power, not the actual power draw, which varies with
    utilization. More critically, it ignores the DC-DC conversion losses between the 48V PoE rail and
    the various voltage domains.'
  napkin_math: 'PoE+ budget: 25.5W → 21.1W usable (17% conversion loss). Fixed: 6.5W. ML budget: 14.6W.
    Actual ML draw: 11.5W. Electrical margin: 3.1W (21%). Thermal check: 18W × 4°C/W + 40°C ambient =
    112°C > 105°C limit. Must reduce to ~16.25W total → ML budget drops to 9.75W. Solution: run face blur
    on DLA instead of GPU (saves ~2W), or duty-cycle pose estimation (run every other frame, halving DLA
    power).'
