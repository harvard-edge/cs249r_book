schema_version: 1
id: edge-0841
title: LoRA Memory Footprint Calculation
topic: safety-certification
status: published
provenance: imported
scenario: You are fine-tuning a 7B parameter Transformer model (d_model=4096, 32 layers) on a 64GB unified
  memory edge device for 3 distinct user-specific tasks. Full fine-tuning using the Adam optimizer immediately
  throws an Out-Of-Memory (OOM) error. You switch to LoRA, adapting only the query (W_q) and value (W_v)
  projection matrices with rank r=8. Assuming the base model is in FP16 and Adam optimizer states are
  kept in FP32, calculate the total memory required to store the base model, the LoRA adapters, and the
  optimizer states for all 3 tasks concurrently during training.
details:
  realistic_solution: 'Load a single frozen FP16 base model which consumes ~14GB. For each task, calculate
    the LoRA parameters: 2 matrices (W_q, W_v) * 32 layers * 2 projection matrices (A and B) * (4096 *
    8) = 4,194,304 parameters. The trainable state per task requires ~67MB, easily fitting into the 64GB
    limit.'
  common_mistake: Failing to account for the FP32 Adam optimizer states, FP32 master weights, and gradients
    (16 bytes per trainable parameter in mixed precision) or miscalculating the LoRA parameter count as
    d_model * d_model instead of (d_model * r) + (r * d_model).
  napkin_math: 'Base model (FP16): 7 * 10^9 * 2 bytes = 14 GB.

    LoRA params per task: 2 (Q,V) * 32 (layers) * (4096*8 + 8*4096) = 4,194,304 params.

    Trainable memory per task: 4.2M params * 16 bytes (mixed precision: 2B weights + 2B grads + 4B master
    + 8B Adam state) = ~67 MB.

    Total memory for 3 tasks: 14 GB (base) + (3 * 67 MB) = ~14.2 GB.'
