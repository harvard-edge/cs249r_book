id: edge-0458
title: 'The Drone''s Dilemma: Compute vs. Bandwidth'
topic: attention-scaling
status: published
provenance: imported
scenario: 'You are the ML Systems Engineer for an autonomous drone company using an NVIDIA Jetson AGX
  Orin (205 GB/s memory bandwidth) for its perception system. You have a strict 33ms (30 FPS) latency
  budget for inference to ensure stable flight control. You are asked to evaluate two new INT8-quantized
  models:'
details:
  realistic_solution: The most likely cause is that the `EdgeViT` model is **memory-bandwidth bound**.
    Its performance isn't limited by the Jetson's compute power, but by the 205 GB/s speed limit for fetching
    data from DRAM.
  common_mistake: Engineers often fixate on FLOPs (or G-Ops) as the primary measure of performance. They
    might incorrectly assume the G-Op count for the Transformer is wrong, that the hardware isn't 'good
    at Transformers', or that the model is thermal throttling. While possible, these usually aren't the
    fundamental reason for this classic performance inversion.
  napkin_math: Orin Ridge Point = 275 TOPS / 205 GB/s = ~1341 Ops/Byte. If EdgeViT performs 3 TeraOps
    and moves 6 GB of memory per frame, its Arithmetic Intensity (AI) = 3e12 / 6e9 = 500 Ops/Byte. Since
    500 < 1341, EdgeViT is heavily memory-bound by the 205 GB/s limit. The MACs sit idle waiting for self-attention
    matrices to load from DRAM.
