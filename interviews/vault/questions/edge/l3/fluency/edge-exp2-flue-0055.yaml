schema_version: 1
id: edge-exp2-flue-0055
title: Memory-Mapped Concurrent Edge Inference
topic: memory-mapped-inference
status: published
provenance: imported
scenario: We are deploying a 7B parameter model quantized to INT8 on an on-premise Qualcomm Cloud AI 100
  accelerator, operating within its 75W power limit and utilizing its 400 TOPS INT8 compute. The platform
  has 32 GB of LPDDR4x memory. To maximize throughput, we need to run 4 concurrent inference processes.
  Calculate the per-process memory available for the KV cache and activations when loading model weights
  independently in each process versus using memory-mapped (mmap) shared weights.
details:
  realistic_solution: The correct approach is to recognize that INT8 requires 1 byte per parameter, meaning
    the 7B model takes 7 GB of memory. By using mmap to load the weights as read-only shared memory, all
    4 processes share a single 7 GB footprint. The remaining memory is then evenly distributed among the
    processes for their individual KV caches and activations.
  common_mistake: Candidates often forget that independent processes duplicate weight memory in RAM, drastically
    reducing the space available for the KV cache. They might also incorrectly calculate the INT8 weight
    size or fail to subtract the shared weight footprint from the total memory pool before dividing by
    the number of processes.
  napkin_math: '1. Total memory: 32 GB.

    2. Weight size: 7 billion params * 1 byte (INT8) = 7 GB.

    3. Independent loading: 4 processes * 7 GB = 28 GB for weights. Remaining memory = 32 GB - 28 GB =
    4 GB. Available per process = 4 GB / 4 = 1 GB.

    4. Mmap shared loading: 7 GB total for weights. Remaining memory = 32 GB - 7 GB = 25 GB. Available
    per process = 25 GB / 4 = 6.25 GB.

    5. Result: mmap increases per-process available memory from 1 GB to 6.25 GB.'
