id: edge-0448
title: The Driver Monitoring Latency Budget
topic: neural-architecture-search
status: published
provenance: imported
scenario: 'You''re an ML systems engineer on an automotive team designing a new driver monitoring system.
  The system runs on a chip similar to an NVIDIA Jetson AGX Orin, which is allocated a strict 15W power
  budget for this task. The end-to-end pipeline latency from frame capture to driver alert must be under
  the 33ms hard real-time deadline. The pipeline has a fixed 8ms overhead for data preprocessing and post-processing.
  You are evaluating two models:


  - **Efficient-CNN**: requires 1.5 TeraOps per frame.

  - **Small-ViT**: requires 2.0 TeraOps per frame.'
details:
  realistic_solution: The correct approach is to calculate the *sustained* TOPS based on the power budget,
    not the peak theoretical TOPS. The Jetson AGX Orin's documentation suggests an efficiency of around
    4.6 TOPS/W. This provides a realistic performance figure for the given 15W thermal design power (TDP).
    With the sustained TOPS, you can calculate the true inference time for each model and add the fixed
    pipeline overhead to see if the total latency meets the 33ms hard real-time deadline.
  common_mistake: Engineers often use the headline 'peak' TOPS number (e.g., 275 TOPS for an Orin) for
    their estimates, ignoring the severe constraints of a power budget. This leads to wildly optimistic
    latency calculations, predicting that models can run orders of magnitude faster than they do in a
    thermally constrained environment. Another common error is to forget to subtract fixed overheads (like
    pre/post-processing) from the total latency budget before evaluating the model's inference time.
  napkin_math: '1. Calculate Sustained TOPS: Using the formula `Sustained TOPS = Efficiency (TOPS/W) ×
    Power Budget`. At ~4.6 TOPS/W, 15W gives 69 Sustained TOPS.

    2. Inference Time: Efficient-CNN = 1.5 / 69 = 21.7ms. Small-ViT = 2.0 / 69 = 29.0ms.

    3. Total Latency: Efficient-CNN = 21.7 + 8 = 29.7ms (meets <33ms). Small-ViT = 29.0 + 8 = 37.0ms (fails).'
