id: edge-0472
title: The Autonomous Driving Frame Drop
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML Systems Engineer on an autonomous driving team. Your primary perception model,
  a ResNet-50-based object detector, is running on a Jetson AGX Orin and currently takes 45ms per frame,
  missing the hard real-time deadline of 33ms (30 FPS). Profiling reveals that 80% of the latency is spent
  in the standard 3x3 convolution layers of the CNN backbone. A teammate suggests solving this by replacing
  the backbone with a modern Vision Transformer (ViT) of roughly the same GFLOPs count. How do you solve
  this latency problem?
details:
  realistic_solution: The most effective solution is to replace the standard convolutions with depthwise
    separable convolutions, the core innovation of efficient architectures like MobileNet. This specifically
    targets the diagnosed bottleneck. While a Vision Transformer has a similar theoretical GFLOP count,
    its self-attention mechanism has poor data locality and requires global memory access. This leads
    to low arithmetic intensity, making it memory-bandwidth-bound on most edge accelerators and thus unlikely
    to meet the deadline. Depthwise separable convolutions, however, are extremely compute-efficient and
    designed for the constraints of edge hardware, offering a massive reduction in operations for a small
    accuracy trade-off.
  common_mistake: 'Engineers often fall into two traps: 1) Believing that two models with the same ''paper''
    GFLOPs will have the same real-world latency, ignoring hardware-specific bottlenecks like memory bandwidth
    and arithmetic intensity. 2) Reaching for heavyweight solutions like a full Neural Architecture Search
    (NAS) before trying well-understood, targeted architectural optimizations.'
  napkin_math: 'Total latency is 45ms. The convolutional layers account for 80% of that: 45ms * 0.80 =
    36ms. The rest of the network takes the remaining 9ms.'
