schema_version: 1
id: edge-exp-flue-0079
title: Active Learning Budget on Coral Edge TPU
topic: dataset-curation
status: published
provenance: imported
scenario: You are deploying a computer vision model on a Google Coral Edge TPU (4 TOPS INT8, 2W) for a
  smart retail checkout system. To address dataset shift without overwhelming human annotators, you implement
  an active learning strategy where the Coral TPU runs a lightweight uncertainty estimator to select edge-case
  frames for manual annotation. The camera captures video at 30 FPS, and the uncertainty model requires
  50 MOPS (Million Operations) per frame. If you select the top 0.5% of frames for human labeling at a
  cost of $0.05 per image, calculate the daily annotation budget per device and the fraction of the Coral's
  4 TOPS compute capacity consumed by the uncertainty estimation.
details:
  realistic_solution: A robust edge active learning pipeline must balance the data selection rate with
    available annotation budgets while staying well within the hardware's compute limits. By ensuring
    the uncertainty model is quantized to INT8, it executes efficiently on the Coral Edge TPU, consuming
    a negligible fraction of compute and leaving ample headroom for the main inference task, while keeping
    daily labeling costs predictable.
  common_mistake: Candidates often miscalculate the daily frame count by failing to correctly convert
    seconds to a full 24-hour period, or they mismatch unit scales (MOPS vs TOPS) when evaluating compute
    utilization against the 4 TOPS limit. They might also forget that the uncertainty model itself must
    be quantized to INT8 to run on the Edge TPU.
  napkin_math: '1. Daily Frames: 30 frames/sec * 60 sec/min * 60 min/hr * 24 hr/day = 2,592,000 frames/day.

    2. Selected Frames: 2,592,000 * 0.005 (0.5%) = 12,960 frames/day to annotate.

    3. Daily Budget: 12,960 frames * $0.05/frame = $648 per device/day.

    4. Compute Required: 30 FPS * 50 MOPS = 1,500 MOPS = 1.5 GOPS (Giga Operations Per Second).

    5. Compute Utilization: The Coral provides 4 TOPS = 4,000 GOPS. The fraction used is 1.5 / 4000 =
    0.000375, or 0.0375% of the TPU''s capacity.'
