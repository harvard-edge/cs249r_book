id: edge-cell-12048
title: 'Model Format Conversion: Compare ONNX vs. TensorRT for Jetson Orin Deployment'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'A ResNet-50 model trained in PyTorch (25.6M params, FP32) is being deployed on Jetson Orin
  (275 TOPS INT8, 204 GB/s LPDDR5). Two paths: (A) PyTorch → ONNX → TensorRT with INT8 calibration, vs.
  (B) PyTorch → TorchScript → direct inference. Compare inference latency, conversion complexity, and
  portability.'
details:
  realistic_solution: 'ResNet-50: 4.1 GFLOPS FP32. TorchScript FP32 on Jetson GPU: ~15ms. ONNX→TensorRT
    INT8: 4.1G / (275 TOPS × 0.4 util) = 4.1/110 = 0.037ms compute, realistic with fusion: ~2ms. 7.5×
    faster. Conversion complexity: TensorRT requires 500+ calibration images, 30-60min build time. TorchScript:
    5 min. Portability: ONNX is cross-platform; TensorRT engine is hardware-specific (must rebuild for
    each GPU).'
  common_mistake: Assuming TorchScript is faster than TensorRT on Jetson hardware; TensorRT performs layer
    fusion, kernel auto-tuning, and INT8 calibration unavailable in TorchScript.
  napkin_math: 'ResNet-50 FLOPs: 4.1 GFLOPs. TorchScript GPU FP32: 4.1G / (Orin GPU FP16 ~40TFLOPS) =
    0.1ms. But with INT8 TensorRT: 4.1G / 110 TOPS = 0.037ms theoretical, measured ~2ms (memory + kernel
    launch). TorchScript measured ~8ms (no INT8, no fusion). TensorRT 4× faster. Build time: TensorRT
    ~45min for ResNet-50.'
