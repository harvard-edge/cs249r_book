id: edge-0453
title: The Real-Time Driver Monitoring Dilemma
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are the Staff ML Systems Engineer for an automotive Tier 1 supplier. Your team is developing
  a driver monitoring system on a Jetson AGX Orin, which has a hard real-time deadline of 33ms per frame.
  The baseline MobileNetV2-based model correctly detects driver drowsiness in 25ms. The product team now
  wants to add 'cell phone use' detection to the same model. A naive approach of adding a second classification
  head and retraining increases model size by only 15%, but latency jumps to 40ms, missing the deadline.
  Profiling shows the model is heavily compute-bound. How do you solve this problem and ship both features
  while staying within the 33ms budget?
details:
  realistic_solution: The correct approach is to use a Mixture-of-Experts (MoE) architecture. The model
    is compute-bound, so the goal is to add functionality without increasing the number of floating-point
    operations (FLOPs) executed per inference. With an MoE approach, you can train two separate, efficient
    'expert' networks (one for drowsiness, one for cell phone use) that are roughly the same size as the
    original baseline model. A tiny, inexpensive gating network learns to route the input features to
    the correct expert for the current frame. Since only the gating network and one expert run per inference,
    the total computational load remains almost identical to the original baseline, keeping latency low.
    This allows the system to scale its capabilities without scaling its per-inference cost.
  common_mistake: Engineers often assume that adding a small number of parameters will lead to a proportionally
    small increase in latency. They fail to account for how different operations affect the arithmetic
    intensity and overall utilization of the hardware, especially on specialized accelerators. Another
    common mistake is to immediately suggest a completely new, 'hotter' architecture like a Transformer
    without considering its specific performance characteristics and scaling laws on the target edge device.
  napkin_math: '1. Analyze the Latency Jump: The original model runs in 25ms. The new model is 40ms. This
    is a (40-25)/25 = 60% latency increase for a mere 15% parameter increase. Since the model is compute-bound,
    this shows the new operations are either less efficient or are pushing the system past a performance
    cliff.'
