schema_version: 1
id: edge-cell-12093
title: 'Model Size Estimation: Compare MobileNet vs. EfficientNet Memory on Jetson Orin'
topic: model-size-estimation
status: published
provenance: imported
scenario: Compare MobileNetV3-Large (5.4M params, 219M MACs) vs. EfficientNet-B3 (12M params, 1.8B MACs)
  for deployment on Jetson Orin (32GB LPDDR5, 204 GB/s). Evaluate INT8 TensorRT memory footprint, inference
  latency, and accuracy-per-memory tradeoff at batch size 8.
details:
  realistic_solution: 'MobileNetV3-L INT8 TRT: 5.4MB×1.3=7MB weights, activations ~20MB, total ~27MB.
    EfficientNet-B3 INT8: 12MB×1.3=15.6MB, activations ~40MB, total ~55.6MB. Batch=8: MobileNet: 27+8×(input
    224×224×3×1B=0.15MB)=28.2MB. EfficientNet: 55.6+8×0.3=58MB. Inference: MobileNet 219M×8/(275T)=0.0064ms+3ms
    overhead=3ms. EfficientNet: 1.8G×8/(275T)=0.052ms+5ms=5ms. Accuracy: MobileNet-L ~75.2% top-1, EfficientNet-B3
    ~82.1%. Memory×accuracy tradeoff: EfficientNet better accuracy per MB.'
  common_mistake: Using MACs as the sole proxy for inference latency without considering that EfficientNet's
    compound scaling creates more memory-bandwidth-intensive patterns vs. MobileNet's depthwise separable
    convolutions.
  napkin_math: 'MobileNet INT8 TRT: 7MB+20MB=27MB. EfficientNet: 15.6MB+40MB=55.6MB. Ratio: 55.6/27=2.06×
    more memory. Accuracy gap: 82.1-75.2=6.9%. Memory efficiency: EfficientNet 82.1/55.6=1.48 acc%/MB.
    MobileNet: 75.2/27=2.78 acc%/MB. MobileNet more memory-efficient but lower absolute accuracy.'
