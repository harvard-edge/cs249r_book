title: The Fleet vs. Federated TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: You are the Staff ML Systems Engineer for an autonomous vehicle company evaluating two strategies
  for improving a perception model that detects rare 'occluded pedestrian' events. The finance department
  is questioning the projected cellular data costs for this new 'continuous learning' feature.
details:
  realistic_solution: The correct approach is to quantify the Total Cost of Ownership (TCO) for the data
    transmission of both strategies. By calculating the annual data egress, it becomes clear that the
    federated strategy is dramatically cheaper and carries significantly lower privacy risks by avoiding
    the transfer of raw environmental data.
  common_mistake: Engineers often underestimate the scale of data transmission costs when moving from
    a single device to a large fleet. A small per-device cost can explode into a massive operational expenditure
    annually. Another common mistake is focusing only on the potential model quality benefits of having
    raw data, while ignoring second-order effects like privacy risks or the TCO of data transfer.
  napkin_math: '**Strategy A: Centralized Video Upload**'
