schema_version: 1
id: edge-fill-05068
title: Model Quantization Selection for Coral Edge TPU with Accuracy Constraint
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Coral Edge TPU (4 TOPS INT8, 2W) deploys a person re-identification model (ResNet-50 backbone,
  97MB FP32). The model must run at >20fps with <5% rank-1 accuracy loss vs FP32 baseline (82% rank-1).
  Compare full INT8 quantization, INT8 with QAT, and INT8 with mixed precision (first/last layers at FP16).
details:
  realistic_solution: 'Coral Edge TPU: INT8 only. FP16 not supported on-chip — forces host CPU execution.
    Full INT8 (PTQ): 97MB → 24.25MB. Accuracy: typically 1-3% loss for ResNet-50 re-ID. If 2.5% loss:
    79.5% rank-1 — meets <5% threshold. PTQ inference: 24.25MB / (4 TOPS / model_FLOPs). ResNet-50: 4.1
    GFLOP. Throughput: 4 TOPS / 4.1G = 975 fps — far exceeds 20fps requirement. INT8 with QAT: same throughput,
    accuracy loss ~1% → 81% rank-1. Mixed precision FP16/INT8: first/last layers on CPU at ~5 TOPS → CPU
    bottleneck destroys throughput. Use INT8 with QAT: 81% accuracy (1% loss, within spec), 975 fps, 2W.'
  common_mistake: Recommending FP16 mixed precision for the Coral Edge TPU, which only supports INT8;
    any FP16 layers must fall back to host CPU, creating a bottleneck that defeats the purpose of the
    accelerator.
  napkin_math: 'ResNet-50: 4.1 GFLOP at INT8. Coral: 4 TOPS / 4.1G = 975 fps >> 20fps. Full INT8: 24.25MB
    model, 2.5% accuracy loss → 79.5%. QAT: 1% loss → 81%. Both meet <5% threshold. Mixed FP16: CPU runs
    only the first/last layers (e.g., ~5% of 4.1G FLOPs = ~200M FLOPs). At ~100 GFLOPS CPU: 100G/200M
    = 500fps for those layers. The bottleneck is TPU throughput for the remaining 95% of layers + CPU
    synchronization overhead, not the CPU compute ceiling for 100% of the model.'
