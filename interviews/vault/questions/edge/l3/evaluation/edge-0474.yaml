id: edge-0474
title: The TCO of Privacy on Wheels
topic: federated-learning
status: published
provenance: imported
scenario: You are the lead ML Systems Engineer at an automotive company. To improve a driver drowsiness
  model, you must choose a privacy-preserving strategy for a new fleet of 500,000 vehicles, analyzing
  the Total Cost of Ownership (TCO) over 3 years. The system must comply with strict privacy regulations,
  forcing a choice between a centralized approach with anonymization or a federated approach.
details:
  realistic_solution: The correct approach is to calculate the total 3-year cost for both options and
    compare them directly. The federated approach has a simple, one-time hardware cost. The centralized
    approach has a recurring monthly operational cost that must be multiplied over the 3-year (36-month)
    lifetime. The key insight is that while pure TCO favors centralized ($540K vs $1.1M over 3 years),
    a single regulatory breach fine ($20M+) makes FL the safer choice on a risk-adjusted basis.
  common_mistake: Engineers often miscalculate TCO by either focusing only on the obvious costs (like
    hardware) while ignoring massive operational costs (like data transmission), or by incorrectly calculating
    the scale of those operational costs over the system's lifetime. Another common mistake is to ignore
    the upfront CapEx of the federated option, viewing it as 'free' because there are no data costs.
  napkin_math: '**1. Centralized (Monthly data cost):** Each vehicle uploads 200 MB of anonymized video/telemetry
    per month. Fleet: 500,000 x 200 MB = 100 TB/month. Cellular at $0.10/GB: 100,000 GB x $0.10 = $10,000/month.
    Cloud storage + compute: $5,000/month. **Monthly OpEx: $15,000.** 3-year total: 36 x $15,000 = **$540,000.**
    | **2. Federated (One-time + recurring):** On-device compute module CapEx: 500,000 x $2 amortized
    = $1,000,000 (one-time). FL server infra: $3,000/month x 36 = $108,000. Model update data: negligible
    (~100 GB/month at $0.10/GB = $10/month). **3-year total: ~$1,108,000.** | **3. Verdict:** Centralized
    ($540K) is cheaper in pure TCO over 3 years. However, FL''s cost is front-loaded (CapEx), while centralized
    has ongoing regulatory risk. A single GDPR-scale breach fine ($20M+) makes FL the risk-adjusted winner.'
