id: edge-0460
title: 'The Fleet vs. The Cloud: Drowsiness Detection TCO'
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer at a major automaker designing a driver-drowsiness detection
  feature for a fleet of 500,000 vehicles. The finance department has flagged the projected cellular data
  costs. Your team is comparing two plans:'
details:
  realistic_solution: The Federated Learning approach (Plan B) is overwhelmingly more cost-effective.
    The key is to calculate the total data volume per year for the entire fleet for each plan. The centralized
    telemetry plan uploads a massive amount of video data frequently, which does not scale economically.
    The federated plan uploads only small model diffs, which is dramatically cheaper in aggregate. The
    privacy benefits of not uploading driver footage are also a major, uncosted advantage of Plan B.
  common_mistake: Engineers often underestimate the scale of data costs when moving from a single test
    vehicle to a production fleet of hundreds of thousands. They may correctly calculate the data per
    event but fail to multiply by the fleet size and time period, thus missing the exponential cost growth.
    Another common error is confusing megabits (Mbps) with megabytes (MB), leading to an 8x miscalculation
    of data volume and cost.
  napkin_math: '**Plan A (Centralized Telemetry):** Each vehicle uploads 500 MB of drowsiness event clips
    per month. Fleet: 500,000 vehicles x 500 MB = 250 TB/month. Cellular cost at $0.10/GB: 250,000 GB
    x $0.10 = $25,000/month. Annual: **$300,000/year.** Cloud compute for retraining: ~$5,000/month =
    $60,000/year. **Plan A total: ~$360,000/year.** | **Plan B (Federated Learning):** Model diff per
    vehicle per round: 5 MB. Participation rate: 1% (5,000 vehicles/round). Rounds per month: 4. Monthly
    data: 5,000 x 5 MB x 4 = 100 GB. Cellular at $0.10/GB: $10/month. FL server: $2,000/month = $24,000/year.
    **Plan B total: ~$24,120/year.** | **Verdict:** Plan A is ~15x more expensive. At higher cellular
    rates ($10/GB), Plan A would cost $30M/year — completely infeasible. FL wins overwhelmingly on cost
    and provides privacy as a bonus.'
