title: The Federated Fine-Tuning Payback Period
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer for a fleet of 10,000 autonomous delivery robots, each equipped
  with a Jetson AGX Orin. The fleet''s perception model is failing on a new, rare type of reflective traffic
  sign, causing mission failures. Your team proposes using Federated Learning (FL) to fine-tune the model
  directly on the robots in the affected region. Your manager asks you to diagnose the economic feasibility
  compared to the alternative: collecting, scrubbing, and manually labeling images in the cloud.'
details:
  realistic_solution: The correct approach is to calculate the operational cost (OpEx) for both options.
    The napkin math reveals that the cost of using the fleet's distributed, low-power compute for Federated
    Learning is trivial compared to the immense cost of specialized human labor for manual annotation.
    The on-device training leverages existing capital expenditure (the robots) as a low-cost data generation
    and model improvement engine, making it the clear economic winner.
  common_mistake: Engineers often focus only on the technical implementation of FL and ignore the economic
    trade-offs. A common mistake is to assume manual labeling is a quick and cheap fix, failing to calculate
    the massive human-hours required for a production-scale problem. Another is to overestimate the cost
    of on-device compute, assuming it's power-hungry and runs 24/7, when in reality it's a short, low-power
    burst distributed across many devices.
  napkin_math: 'Manual annotation: 10k robots * 10 images/day = 100k images. At $0.10/img = $10,000/day.
    FL (on-device): Jetson Orin takes ~30W * 1 hr = 0.03 kWh. 10k * 0.03 = 300 kWh. At $0.20/kWh = $60.
    Network: 50MB * 10k = 500GB at $0.01/GB = $5. Total FL OpEx = $65/day. FL is >150x cheaper than manual
    annotation.'
