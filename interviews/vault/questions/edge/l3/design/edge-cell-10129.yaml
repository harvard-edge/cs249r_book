id: edge-cell-10129
title: 'Fluency: compare Hailo-8 vs Jetson Orin for MobileNet inference efficiency'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You need to select an inference accelerator for a smart camera deployment running MobileNetV3-Large
  (0.22 GFLOPs) at 30 FPS. The candidates are Hailo-8 (26 TOPS, 2.5W) and Jetson Orin NX (70 TOPS, 15W).
  Explain the key architectural differences that affect MobileNet inference efficiency on each platform.
details:
  realistic_solution: Energy efficiency = 88 GFLOPS / 1000W = 0.088 GFLOPS/W (not 0.088 TOPS/W — TOPS
    is 1000× larger than GFLOPS).
  common_mistake: Comparing only peak TOPS without noting that Hailo-8 uses a dataflow architecture optimized
    for CNN inference where depthwise convolutions are first-class operations, while Jetson Orin uses
    a general Ampere GPU where depthwise ops are not tensor-core-accelerated.
  napkin_math: 'Energy efficiency: 88 GFLOPS / 1000W = 0.088 GFLOPS/W (not TOPS/W — these are GFLOPS,
    not TOPS). TOPS is 10^12 ops/s, GFLOPS is 10^9. 0.088 GFLOPS/W ≈ 0.000088 TOPS/W. The correct unit
    is GFLOPS/W (or equivalently 88 MFLOPS/W).'
