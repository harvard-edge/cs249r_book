title: Dual-Model Memory Management on Edge TPU
scenario: You are deploying a sequential vision pipeline on a Google Coral Edge TPU. The pipeline consists of a 6MB detection model and a 4MB classification model, all quantized to INT8. The Coral has 8MB of on-chip SRAM. Option A: Swap the models sequentially over the USB 3.0 bus for each frame. Option B: Co-compile both models, forcing 2MB of intermediate INT8 activations to spill to host memory over USB continuously during inference.
question: With 8 MB Coral SRAM, should you swap the 4 MB model over USB or spill 2 MB activations, and which has lower latency?
details:
  realistic_solution: Option A is the superior choice. While swapping a model over USB incurs a latency penalty, it is a single, contiguous bulk transfer. Option B requires spilling and fetching intermediate INT8 activations multiple times during the forward pass. USB 3.0 has high protocol overhead for frequent, small, synchronous transfers. The optimal engineering decision is to swap the smaller model entirely per batch or per frame rather than thrashing the host-to-device bus with activation data.
  common_mistake: |
    **The Pitfall:** Assuming full model swapping is always a catastrophic anti-pattern.
    **The Rationale:** Candidates fail to evaluate the USB bus protocol overhead for frequent small synchronous transfers versus a single bulk transfer.
    **The Consequence:** They choose Option B, incurring massively higher transaction overhead and worsening latency.
  napkin_math: |
    - Calculate USB 3.0 effective bandwidth: ~400 MB/s.
    - Option A (Model Swap) transfer time: 4MB / 400 MB/s = 10ms.
    - Option B (Activation Spill) transfer time: 10 layers * (2MB / 400 MB/s) = 50ms.
    - Execution time: 10 GOPS / 4 TOPS = 2.5ms.
    - Total latency: Option A is ~12.5ms, Option B is ~52.5ms. Option A is **>4x faster**.
