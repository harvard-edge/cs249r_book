title: The Edge GPU Memory Bandwidth
scenario: 'Your team developed a YOLOv8-L model that runs at 60 FPS on a desktop RTX 4090 (1 TB/s GDDR6X bandwidth, 1321 TOPS INT8). You need to deploy the same model on a Jetson Orin NX (102.4 GB/s LPDDR5, 100 TOPS INT8). Your colleague calculates: ''The Orin has 100/1321 = 7.6% of the 4090''s compute, so we''ll get 60 × 0.076 = 4.5 FPS.'' But the actual result is 8 FPS.'
question: "Why is the colleague's estimate wrong in both directions — too pessimistic about compute, too optimistic about the real bottleneck?"
details:
  realistic_solution: 'The colleague''s estimate is wrong because both platforms are memory-bound, not compute-bound. YOLOv8-L has high arithmetic intensity (~600 FLOPs/byte), but on both platforms it exceeds the ridge point, making it memory-bandwidth-bound during many layers. The correct scaling factor is the bandwidth ratio (1000/102.4 = 9.8x), not the TOPS ratio (1321/100 = 13.2x). Expected FPS: 60/9.8 = 6.1 FPS. The actual 8 FPS exceeds this because TensorRT on the Orin achieves superior layer fusion, reducing total memory traffic. The lesson: always determine your bottleneck (compute vs memory) before scaling performance estimates across hardware.'
  common_mistake: '"Performance scales linearly with TOPS." This assumes the workload is compute-bound on both platforms, which is almost never true for the same model on different hardware.'
  napkin_math: |
    **Assumptions & Constraints:**
    - RTX 4090: 1 TB/s BW, 1321 TOPS.
    - Orin NX: 102.4 GB/s BW, 100 TOPS.
    
    **Calculations:**
    - BW ratio: 9.8x. TOPS ratio: 13.2x.
    - YOLOv8-L at AI=600: 4090 attainable = 600 TOPS, Orin attainable = 61.4 TOPS.
    - Compute ratio = 9.8x (matches BW ratio, confirming memory-bound).
    - Expected FPS scaling: 60 / 9.8 = 6.1 FPS (compute-only).
    
    **Conclusion & Interpretation:**
    - **Result: 6.1 FPS (Memory-Bound)**. Actual 8 FPS suggests TensorRT on Orin achieves better layer fusion, but the initial estimate used peak TOPS instead of bandwidth ratio.
  options:
  - The latency is dominated by data preprocessing on the CPU; moving to GPU-accelerated preprocessing will resolve the bottleneck.
  - Performance scales linearly with TOPS.. This assumes the workload is compute-bound on both platforms, which is almost never true for the same model on different hardware.
  - The colleague's estimate is wrong because both platforms are memory-bound, not compute-bound. YOLOv8-L has high arithmetic intensity (~600 FLOPs/byte), but on both platforms it exceeds the ridge point, making it memory-bandwidth-bound during many layers.
  - INT8 quantization reduces model size by 8x compared to FP32, so inference speed should also improve by exactly 8x.
  correct_index: 2
