title: Recall MobileNet depthwise separable FLOP savings on Jetson Orin
scenario: You are onboarding an edge ML engineer to the Jetson Orin platform (275
  TOPS, 60W). They ask why MobileNet architectures are preferred over ResNets for
  edge vision tasks. Explain the key FLOP reduction from depthwise separable convolutions
  and how this translates to Jetson Orin throughput and power benefits.
question: Why are MobileNet architectures preferred over ResNets for edge vision on
  Jetson Orin, and how do depthwise separable convolutions help?
details:
  realistic_solution: 'Depthwise separable convs reduce FLOPs by ~8–9× versus standard
    convs at same channel count. On Jetson Orin Ampere GPU, tensor cores operate on
    FP16/INT8 dense matmul tiles; standard 3×3 conv after im2col maps to GEMM and
    uses tensor cores efficiently. Depthwise ops run on scalar/vector CUDA cores.
    Net result: ~4–5× actual speedup (not 8×) on Jetson Orin for MobileNet vs ResNet
    at same accuracy level. Power reduction ~2–3× from lower GPU utilization time.'
  common_mistake: Assuming that FLOP reduction directly translates to proportional
    power reduction on Jetson Orin; ignoring that the Orin's Ampere GPU has tensor
    cores that favor dense matmul (standard conv) and that depthwise ops may run on
    CUDA cores at lower efficiency.
  napkin_math: 'Jetson Orin: 275 TOPS (INT8). MobileNetV3-Large: 0.22 GFLOPs ≈ 0.22
    GOPS (INT8 equivalent). Throughput: 0.22G/275T per image → theoretical max: 1.25
    million img/sec (batch=1: ~0.8 μs). Practical batch=1 latency: ~4ms (kernel launch
    overhead dominates). ResNet-50: 4.1 GFLOPs → ~20ms at batch=1. MobileNetV3: 5×
    faster in practice. Power: Orin draws 60W at peak; MobileNet inference at 5% TOPS
    utilization → ~8W active inference power.'
