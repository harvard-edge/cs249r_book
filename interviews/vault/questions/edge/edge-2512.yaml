title: 5G NR TDD Asymmetry Overhead
scenario: 8 vehicles use 5G NR TDD (70% downlink, 30% uplink ratio on a 1 Gbps symmetric
  channel) to broadcast and reduce a 20 MB gradient payload.
question: Evaluate the total time for a Parameter Server broadcast-and-reduce cycle,
  factoring in the TDD asymmetry.
details:
  realistic_solution: 'Effective uplink is 300 Mbps (37.5 MB/s); downlink is 700 Mbps
    (87.5 MB/s). Assuming orthogonal frequency allocation, the 8-client Reduce phase
    bottlenecks on the aggregate uplink: 20 MB / 37.5 MB/s = 533ms. Broadcast phase
    uses downlink: 20 MB / 87.5 MB/s = 228ms. Total cycle time is 761ms.'
  common_mistake: Using the peak 1 Gbps bandwidth for both directions, missing the
    severe uplink bottleneck imposed by cellular TDD configurations.
  napkin_math: Uplink = 20 / 37.5 = 0.533s. Downlink = 20 / 87.5 = 0.228s. Total =
    0.761 seconds.
