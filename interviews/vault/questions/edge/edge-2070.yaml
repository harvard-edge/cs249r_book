title: Edge Data Quality and Anomaly Detection on Coral TPU
scenario: A fleet of IoT devices equipped with Google Coral Edge TPUs (4 TOPS INT8, 2W, INT8 only) are deployed to monitor industrial machinery. Each device streams high-frequency sensor data (e.g., vibration, temperature, pressure) and utilizes an on-device ML model for real-time fault detection. Before this sensor data is fed into the fault detection model, it is critical to implement a lightweight data quality and anomaly detection pipeline directly on the Coral Edge TPU.
question: How would you design a lightweight INT8 data quality and anomaly pipeline on Coral Edge TPUs without exceeding 2W or harming fault detection latency?
details:
  realistic_solution: |
    Implement highly optimized, integer-arithmetic-friendly rule-based checks for schema validation and basic outlier detection. For more sophisticated anomaly detection, consider extremely lightweight, pre-quantized (to INT8) models such as a small autoencoder or simple Isolation Forest variant. Ensure any model component is trained with INT8 quantization in mind to minimize accuracy loss, leaving ample capacity for the primary fault detection model.
  common_mistake: |
    **The Pitfall:** Proposing complex floating-point statistical methods or large deep learning models for anomaly detection.
    **The Rationale:** Using standard cloud ML anomaly detection techniques without adapting them.
    **The Consequence:** Completely blowing past the Coral TPU's INT8-only constraints, compute limit, and 2W power budget, stalling the primary fault detection model.
  napkin_math: |
    - **Rule-based Checks:** 200 Hz * 10 ops = 2,000 ops/sec (negligible).
    - **Small Autoencoder:** 50,000 params * 2 MACs = 100,000 MACs/inference.
    - **Throughput:** 200 Hz * 100,000 = 20 million MACs/sec = 40 M ops/sec.
    - **Impact:** 40 M ops/sec is 0.00004 TOPS, which easily fits inside the **4 TOPS** and **2W** budgets.
