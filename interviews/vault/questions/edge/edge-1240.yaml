title: Thermal Throttling on Qualcomm Cloud AI 100
scenario: You are monitoring an on-premise deployment running continuous inference on a 75W TDP edge accelerator. After 45 minutes of sustained peak load in an edge cabinet with restricted airflow, telemetry shows the P99 inference latency suddenly increasing by 40% while the input request rate remains constant.
question: Why does P99 latency rise by 40% after 45 minutes at 75W in the restricted-airflow edge cabinet?
details:
  realistic_solution: "The 40% P99 latency explosion is classic Dynamic Voltage and Frequency Scaling (DVFS) thermal throttling. Running a 75W payload continuously in a cabinet capable of dissipating only 55W forces extreme heat accumulation. Once junction temperature limits are breached, hardware protection circuits aggressively underclock the chip to ~286 TOPS, immediately destroying the real-time SLA."
  common_mistake: |
    **The Pitfall:** Suspecting software issues like memory leaks or garbage collection pauses.
    **The Rationale:** Candidates ignore the physical operating constraints of continuous high-TDP execution in poorly ventilated edge cabinets.
    **The Consequence:** Engineering time is wasted debugging code while the hardware physically cooks itself and down-clocks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 75W TDP (400 TOPS).
       - Environment: Restricted cooling (e.g., 55W dissipation capacity).
       - P99 latency spike: +40%.
    2. **Calculations:**
       - Excess heat = 75W - 55W = 20 Joules/sec.
       - Temperature rise = 20 J/s / 600 J/°C = 0.033 °C/s.
       - 45 min rise = 0.033 * 2700s = 90°C.
       - A 40% latency increase corresponds to 1.4x down-clock.
       - Throttled TOPS = 400 / 1.4 = 286 TOPS.
    3. **Conclusion & Interpretation:**
       - **Throttled to 286 TOPS.** Massive heat accumulation forces DVFS downclocking.
