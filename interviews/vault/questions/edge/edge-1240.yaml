title: Thermal Throttling on Qualcomm Cloud AI 100
scenario: You are monitoring an on-premise deployment running continuous inference on a Qualcomm Cloud AI 100 accelerator operating at its maximum 75W TDP. After 45 minutes of sustained peak load in an edge cabinet with restricted airflow, telemetry shows the P99 inference latency suddenly increasing by 40% while the input request rate remains constant.
question: Why does P99 latency rise by 40% after 45 minutes at 75W in the restricted-airflow edge cabinet?
details:
  realistic_solution: The system is experiencing thermal throttling. Operating continuously at 75W in restricted cooling causes the accumulated heat to exceed safe junction temperature thresholds. The device firmware automatically scales down the clock frequency to reduce power and prevent damage. A 40% latency spike corresponds to the chip throttling to approximately 286 TOPS.
  common_mistake: |
    **The Pitfall:** Suspecting software issues like memory leaks or garbage collection pauses.
    **The Rationale:** Candidates ignore the physical operating constraints of continuous high-TDP execution in poorly ventilated edge cabinets.
    **The Consequence:** Engineering time is wasted debugging code while the hardware physically cooks itself and down-clocks.
  napkin_math: |
    - Power draw vs Dissipation: 75W limit - 55W cooling = 20W (20 Joules/s) excess heat.
    - Temperature rise: 20 J/s / 600 J/°C = 0.033 °C/s.
    - Heat accumulation (45 mins): 0.033 * 2700s = 90°C rise.
    - Throttling response: 40% latency spike means clock speed reduced by 1.4x.
    - Throttled performance: 400 TOPS / 1.4 = **286 TOPS**.
