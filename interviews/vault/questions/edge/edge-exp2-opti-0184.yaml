title: Hailo-8 Spatial Tiling and Host Bandwidth
scenario: You are deploying a high-resolution feature extractor on a Hailo-8 dataflow accelerator for
  a smart camera. The Hailo-8 provides 26 TOPS of INT8 compute at just 2.5W, but it lacks local DRAM and
  streams all data directly from host memory over a constrained PCIe link. Initial profiling shows the
  accelerator is only achieving 4 TOPS, and you notice that intermediate 1080p feature maps are being
  written back to host memory between convolutional stages. How do you analyze the host memory bottleneck
  and quantify the impact of a depth-first dataflow tiling strategy?
details:
  realistic_solution: The performance drop is due to PCIe bandwidth saturation from spilling intermediate
    activations to host memory. The correct approach is to utilize the Hailo-8's compiler to map consecutive
    layers onto adjacent compute clusters, applying depth-first spatial tiling. A tile of the input image
    is processed through multiple layers continuously on-chip, keeping intermediate activations in local
    SRAM routing and only streaming the final output back to the host.
  common_mistake: Candidates often suggest standard temporal optimizations like switching from weight-stationary
    to output-stationary dataflows, missing that Hailo-8 is a spatial dataflow architecture. They also
    frequently try to solve the issue by caching in non-existent local DRAM instead of focusing on on-chip
    routing.
  napkin_math: An intermediate 1080p feature map (1920x1080x64) is ~132MB in INT8. Streaming this to host
    and back at 30 FPS requires 132MB * 2 * 30 FPS = ~7.9 GB/s, exceeding typical edge PCIe Gen3 x2 limits.
    By compiling for spatial depth-first tiling on the Hailo-8, we only stream the initial input (1920x1080x3
    at 30 FPS = ~186 MB/s), eliminating the 7.9 GB/s bottleneck and allowing the 26 TOPS engine to scale
    compute without starvation.
