title: 'Edge TCO Fluency: Rapid Cost-Per-Inference Estimation'
scenario: 'Three edge systems are evaluated over 3 years at 10 inferences/second, 24/7 at an electricity rate of $0.10/kWh: (1) Jetson Orin ($499, 60W), (2) Hailo-8+Pi5 ($280, 7.5W), (3) Coral+Pi4 ($60, 7W).'
question: What are the 3-year total cost and cost-per-inference for these systems, and how do they rank by cost-efficiency?
details:
  realistic_solution: 'Compute 3-year power cost as watts × 26,280 hours × $0.10/kWh / 1000, then add hardware CapEx. Jetson Orin: $499 + $157.68 = $656.68. Hailo-8+Pi5: $280 + $19.71 = $299.71. Coral+Pi4: $60 + $18.40 = $78.40.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the host processor power.
    **The Rationale:** Candidates often only calculate the power of the accelerator chip itself and forget the host SBC.
    **The Consequence:** This significantly underestimates the power budget for edge accelerators, which are typically dominated by the host system.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 years = 26,280 hours.
    - Energy rate = $0.10/kWh.
    - Jetson (60W, $499), Hailo+Pi (7.5W, $280), Coral+Pi (7W, $60).

    **Calculations:**
    - Jetson Power Cost = 60W * 26,280h / 1000 * $0.10 = $157.68. Total = $656.68.
    - Hailo Power Cost = 7.5W * 26,280h / 1000 * $0.10 = $19.71. Total = $299.71.
    - Coral Power Cost = 7W * 26,280h / 1000 * $0.10 = $18.40. Total = $78.40.

    **Conclusion & Interpretation:**
    - **Result: $78.40 TCO (OpEx-Bound Mitigation)**. By 3-year TCO, Coral ($78.40) beats Hailo ($299.71) and Orin ($656.68).
status: published