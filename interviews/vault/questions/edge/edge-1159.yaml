title: 'Edge TCO Fluency: Rapid Cost-Per-Inference Estimation'
scenario: 'Three edge systems are evaluated over 3 years at 10 inferences/second, 24/7 at an electricity rate of $0.10/kWh: (1) Jetson Orin ($499, 60W), (2) Hailo-8+Pi5 ($280, 7.5W), (3) Coral+Pi4 ($60, 7W).'
question: 'What are the 3-year total cost and cost-per-inference for these systems, and how do they rank by cost-efficiency?'
details:
  realistic_solution: 'Compute 3-year power cost as watts × 26,280 hours × $0.10/kWh / 1000, then add hardware CapEx. Jetson Orin: $499 + $157.68 = $656.68. Hailo-8+Pi5: $280 + $19.71 = $299.71. Coral+Pi4: $60 + $18.40 = $78.40. At 10 inferences/s for 3 years, each system serves about 946 million inferences, so Coral is cheapest, then Hailo, then Orin, assuming all meet the latency and accuracy requirement.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the host processor power.
    **The Rationale:** Candidates often only calculate the power of the accelerator chip itself (e.g., Coral TPU) and forget the host Pi.
    **The Consequence:** This significantly underestimates the power budget for edge accelerators, which are typically dominated by the host system.
  napkin_math: |
    * 3 years = 26,280 hours.
    * Total inferences = 10 inferences/s × 26,280 h × 3600 s/h = 946,080,000.
    * Jetson Orin Power: 60W × 26,280h × $0.10/1000 = $157.68.
    * Jetson Orin TCO: $499 + $157.68 = $656.68.
    * Hailo-8+Pi5 Power: 7.5W × 26,280h × $0.10/1000 = $19.71.
    * Hailo-8+Pi5 TCO: $280 + $19.71 = $299.71.
    * Coral+Pi4 Power: 7W × 26,280h × $0.10/1000 = $18.40.
    * Coral+Pi4 TCO: $60 + $18.40 = $78.40.
    * **Ranked by cost-efficiency: Coral ($78.40) > Hailo ($299.71) > Orin ($656.68).**
