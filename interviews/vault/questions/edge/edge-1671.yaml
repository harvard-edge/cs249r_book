title: Mixed-Precision LLM Architecture for Cloud AI 100
scenario: You are tasked with deploying a 35B parameter Mixture-of-Experts (MoE) LLM onto a single on-premise Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). Standard INT8 per-tensor quantization fails to fit the model in memory, while uniform INT4 causes unacceptable perplexity degradation.
question: What mixed-precision quantization architecture would fit a 35B MoE LLM into 32 GB while using the Cloud AI 100's INT8 engines?
details:
  realistic_solution: 'A robust architecture uses W4A8 quantization for the majority of the model, dynamically unpacking 4-bit weights into INT8 registers at runtime to feed the 400 TOPS INT8 compute units. To preserve accuracy, highly sensitive layers (first/last, MoE routers, outlier channels) are retained in INT8. This hybrid approach reduces weight footprint while maintaining arithmetic intensity.'
  common_mistake: Proposing standard INT8 quantization without calculating that weights alone exceed the 32GB limit, or overlooking the architectural overhead of dequantizing 4-bit weights to INT8 to leverage hardware ALUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 35B parameter model, 32 GB memory limit
    - W4A8 quantization for 95% of weights, INT8 for 5%

    **Calculations:**
    - INT8 Baseline = 35 GB (OOM)
    - Mixed W4A8 = (35B * 0.95 * 0.5 bytes) + (35B * 0.05 * 1 byte) = 16.6 GB + 1.75 GB = 18.35 GB
    - Remaining memory = 32 GB - 18.35 GB = 13.65 GB for KV cache

    **Conclusion & Interpretation:**
    - **Result: 18.35 GB Weights (Memory-Capacity-Bound)**. The W4A8 layout fits the model while dynamically dequantizing weights to strictly utilize the 400 TOPS INT8 ALUs.
