title: Evaluating Robust Aggregation in Corrupted Federated Networks
scenario: You are managing a global federated learning system. During a recent training round with 10,000 participating clients ($n=10^4$) sending updates for a 1M-parameter model ($d=10^6$), the global model's loss spikes dramatically. Telemetry indicates that 2% of the devices are sending heavily corrupted gradients due to memory faults on specific low-tier SOCs. The current aggregation uses standard FedAvg.
question: Which robust aggregator—Krum, coordinate-wise median, or trimmed mean—should replace FedAvg for 10,000 clients with 2% corrupted gradients?
details:
  realistic_solution: 'Implement a Trimmed Mean aggregation (e.g., trimming the top and bottom 5%). It provides robust defense against the 2% corrupted updates while scaling log-linearly with client count, avoiding the quadratic bottleneck of distance-based methods like Krum.'
  common_mistake: |
    **The Pitfall:** Selecting Krum for robust aggregation at large scale.
    **The Rationale:** Candidates know Krum is a mathematically sound robust aggregator, but ignore its computational complexity.
    **The Consequence:** Krum scales quadratically ($O(n^2)$) with the number of clients, making it computationally infeasible for a 10,000-client cohort on the aggregation server.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Clients ($n$): $10^4$
       - Parameters ($d$): $10^6$
    2. **Calculations:**
       - Krum Complexity: $O(n^2 d) \approx 10^8 \times 10^6 = 10^{14}$ operations
       - Trimmed Mean Complexity: $O(d \cdot n \log_2 n) \approx 10^6 \times (10^4 \times 13.3) \approx 1.33 \times 10^{11}$ operations
       - Speedup: $10^{14} / 1.33 \times 10^{11} \approx 750$x
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Trimmed mean provides robust defense while being ~750x mathematically faster than Krum, making it the only feasible aggregation choice for large-scale edge cohorts.
