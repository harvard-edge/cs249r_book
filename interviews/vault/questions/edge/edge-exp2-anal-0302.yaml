title: INT8 Clipping in Edge Quality Gates
scenario: A data quality gate is deployed on a Google Coral Edge TPU (4 TOPS, 2W) to filter corrupt camera
  frames before processing. The gate uses an INT8-quantized anomaly detection model. During peak sunlight,
  the camera's auto-exposure shifts the input pixel distribution ranges significantly higher. Engineers
  observe that the gate suddenly starts flagging 40% of perfectly valid bright frames as anomalous. Given
  that the Coral strictly requires INT8 precision with fixed scale and zero-point calibration, explain
  why this failure occurs.
question: "Why does the Coral INT8 anomaly gate flag 40% of valid bright frames as anomalous during peak sunlight?"
details:
  realistic_solution: The issue happens because the INT8 quantization parameters (scale and zero-point)
    were calibrated on standard lighting data. When sunlight shifts the input range, the fixed INT8 representation
    cannot encode the higher values, causing severe clipping at 255. This clipping destroys the input
    features, leading to massive reconstruction error in the anomaly detector, which flags the distorted
    tensor. The solution is to re-calibrate the fixed scale (S) to accommodate the broader dynamic range.
  common_mistake: Candidates often incorrectly assume the anomaly detection model simply needs retraining
    on brighter images, ignoring the hardware constraint. They fail to recognize that the Coral TPU's
    strict INT8 requirement means the underlying issue is fixed-point mathematical clipping, not just
    a shift in the model's learned distribution.
  napkin_math: 'Assume original calibration range was [0.0, 1.0]. INT8 Scale (S) = (1.0 - 0.0) / 255 =
    0.00392, Zero-point (Z) = 0. In sunlight, an input pixel value reaches 1.8. The Coral TPU applies
    the INT8 quantization formula: q = round(r / S) + Z = round(1.8 / 0.00392) = 459. Since INT8 is limited
    to [0, 255], the hardware clips this to 255. The effective processed value is 255 * 0.00392 = 1.0.
    This introduces a mathematical error of |1.8 - 1.0| = 0.8 per bright pixel, artificially triggering
    the data quality gate''s anomaly threshold.'
