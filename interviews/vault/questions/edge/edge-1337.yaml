title: Adversarial Defense Overhead on Hailo-8
scenario: 'You are deploying an intrusion detection model on a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W, no local DRAM). To defend against physical adversarial patches,
  you implement an input perturbation defense: the host CPU generates 3 randomly cropped
  and smoothed versions of each incoming 1080p RGB frame (1920x1080), which are then
  streamed to the Hailo-8 for ensemble voting. The base model requires 30 GOPS per
  inference, and the Hailo-8 achieves 20% effective utilization for this workload.
  The host CPU takes 4ms total to generate the 3 perturbed frames. Calculate the total
  end-to-end latency to process one captured frame and the host memory read bandwidth
  required during the accelerator''s execution.'
question: What are the total latency and host memory read bandwidth for one frame
  with 3 perturbed 1080p inputs on the Hailo-8?
details:
  realistic_solution: Since the Hailo-8 relies entirely on host memory streaming,
    the host must store and transmit all 3 perturbed frames. The solution requires
    calculating the effective accelerator throughput, using it to find the inference
    time for 3 passes, and adding the CPU preprocessing time for total latency. The
    bandwidth is the total frame data divided by the inference time window.
  common_mistake: Candidates often forget to multiply the inference compute by 3 for
    the ensemble or fail to apply the 20% utilization factor to the peak TOPS. Furthermore,
    they may overlook the architectural constraint that lacking local DRAM means the
    Hailo-8 must stream all 3 full perturbed frames directly from host memory, leading
    them to miscalculate or omit the bandwidth requirement.
  napkin_math: '1. Effective Throughput: 26 TOPS * 0.20 = 5.2 TOPS = 5200 GOPS.

    2. Total Compute Needed: 3 frames * 30 GOPS = 90 GOPS.

    3. Accelerator Latency: 90 GOPS / 5200 GOPS/s = 0.0173 s = 17.3 ms.

    4. Total End-to-End Latency: 4 ms (CPU) + 17.3 ms (Hailo-8) = 21.3 ms.

    5. Frame Data Size: 1920 * 1080 pixels * 3 bytes (RGB) = ~6.22 MB per frame.

    6. Total Data Streamed: 3 frames * 6.22 MB = 18.66 MB.

    7. Host Read Bandwidth: 18.66 MB / 0.0173 s = ~1078 MB/s (or ~1.08 GB/s).'
