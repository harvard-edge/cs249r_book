title: Thermal Throttling Degradation on Jetson Orin
scenario: An autonomous mobile robot powered by an NVIDIA Jetson Orin is operating in an industrial setting. Due to high ambient temperatures and sustained 60W TDP utilization, the SoC triggers thermal throttling, reducing the available Ampere GPU clock speed by 40%. The perception pipeline normally runs a heavy 3D LiDAR+Camera fusion model on the GPU and a lightweight pedestrian tracking model on the DLA accelerator.
question: What degradation ladder would you use after a 40% GPU clock throttle to keep the Jetson Orin perception pipeline at a safe 20 FPS?
details:
  realistic_solution: Implement a deterministic fallback strategy that sheds the LiDAR point-cloud processing (quality-of-service shedding) and switches to an INT8 2D camera-only object detection model on the GPU. This eliminates the heavy 3D fusion bottleneck. The system maintains the pedestrian tracking on the DLA. This fail-operational state sacrifices depth precision but guarantees the minimum 20 FPS required for emergency braking.
  common_mistake: |
    **The Pitfall:** Suggesting naive frame dropping or migrating the 3D fusion model to the DLA.
    **The Rationale:** Candidates prioritize code simplicity over fail-operational safety or ignore that the DLA lacks support for complex custom layers.
    **The Consequence:** Ruins the tracking model's temporal consistency or causes a hard crash when unsupported operations fail on the DLA.
  napkin_math: |
    1. Normal state: 3D fusion requires ~120 TOPS (INT8), Tracking requires 20 TOPS (INT8). Total 140 TOPS (draws near 60W TDP).
    2. Throttled state: GPU clock drops 40%, capping throughput and pushing latency per frame beyond the 50ms (20 FPS) deadline.
    3. Fallback state: Switch to a 2D Camera-only model requiring 35 TOPS (INT8).
    4. Total pipeline drops to 55 TOPS (35 GPU + 20 DLA).
    5. This **60% reduction in compute load** allows the Orin to process frames within 30ms even at throttled speeds, lowering power and allowing the SoC to cool.
