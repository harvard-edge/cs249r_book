title: Analyzing INT8 Quantization Disparities on Cloud AI 100
scenario: You are deploying a vision model for an on-premise access control system targeting the Qualcomm
  Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W). To maximize throughput, the system compiles
  the model using purely INT8 quantization. During deployment, the overall Equalized Odds metric remains
  stable, but the false rejection rate for a specific minority demographic spikes by 18% compared to the
  FP32 baseline. Explain why this hardware-specific optimization disproportionately impacts this subgroup,
  and calculate the performance tradeoff if the final classification layers (accounting for 20% of the
  compute) are kept in FP16 to mitigate this bias, assuming FP16 throughput is half of INT8.
question: "Why does pure INT8 on the Cloud AI 100 raise one subgroup's false rejection rate, and what throughput cost comes from keeping the final 20% in FP16?"
details:
  realistic_solution: The accuracy drop occurs because INT8 quantization maps the continuous activation
    ranges into just 256 discrete bins. Features critical for distinguishing minority subgroups often
    represent a smaller portion of the overall calibration dataset, leading their activations to fall
    into the long tails of the distribution. On the Cloud AI 100's fixed-point math units, these rare
    tail features are clipped or collapsed together during INT8 quantization, destroying the model's discriminative
    power for that specific subgroup. A mitigation strategy involves mixed-precision inference, keeping
    sensitive layers at higher precision at the cost of throughput.
  common_mistake: Candidates often assume the underlying training data is the sole cause of the bias,
    ignoring the hardware deployment constraints. They might suggest retraining the model with balanced
    data rather than analyzing how the reduced precision math of the accelerator fundamentally alters
    the decision boundaries for underrepresented features.
  napkin_math: 'Let the model require 200 GOPs per inference. Pure INT8 latency: 200 GOPs / 400 TOPS =
    0.5 ms (2,000 inferences/sec). If 20% (40 GOPs) is run in FP16 (at 200 TFLOPS) to preserve subgroup
    fairness, latency becomes: (160 GOPs / 400 TOPS) + (40 GOPs / 200 TFLOPS) = 0.4 ms + 0.2 ms = 0.6
    ms. Throughput drops to 1 / 0.0006 = 1,666 inferences/sec. Therefore, fixing the fairness degradation
    costs exactly 16.7% of the system''s total throughput.'
