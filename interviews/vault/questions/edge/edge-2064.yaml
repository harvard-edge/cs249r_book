title: Edge AI Observability for Autonomous Perception on Jetson Orin
scenario: You are leading the MLOps team responsible for deploying and maintaining a critical, real-time object detection model on a fleet of autonomous vehicles. Each vehicle is equipped with an NVIDIA Jetson Orin (64 GB LPDDR5, 275 TOPS INT8, 60W) which processes sensor data and runs the model at the edge. Given the mission-critical nature of autonomous driving, you need to ensure extreme reliability and immediate detection of issues.
question: How would you design monitoring and observability for Jetson Orin autonomous vehicles, covering telemetry, alerts, MTBF/MTTR, stragglers, and dashboards?
details:
  realistic_solution: "A robust solution involves a hybrid monitoring architecture.\
    \ On each NVIDIA Jetson Orin, deploy a lightweight, resource-optimized monitoring\
    \ agent capable of collecting and pre-processing critical metrics locally. This\
    \ agent should capture:\n\n1.  **Model Metrics**: Per-inference latency (min,\
    \ max, p99, p99.9), inference throughput, model output distribution shifts (e.g.,\
    \ object class probabilities, bounding box quality), and pre-processing pipeline\
    \ failures.\n2.  **Hardware Metrics**: Detailed CPU/GPU utilization, LPDDR5 memory\
    \ usage, SoC temperature, power consumption (ensuring operation within the 60W\
    \ envelope), and I/O wait times.\n3.  **System Metrics**: Disk usage, network\
    \ interface health, and critical process health (e.g., inference engine, data\
    \ acquisition). \n\nTelemetry data should be locally cached and transmitted to\
    \ a centralized cloud observability platform using efficient, batched protocols\
    \ (e.g., MQTT) to handle intermittent connectivity. Implement multi-tiered alerting:\
    \ immediate, local alerts for critical on-device failures (e.g., inference pipeline\
    \ crash, critical temperature thresholds) and cloud-based alerts for fleet-wide\
    \ anomalies or sustained performance degradations. Define specific MTBF targets\
    \ (e.g., 99.9% uptime per device) and MTTR objectives (e.g., 30 minutes for critical\
    \ issues), and ensure the monitoring system provides the data and tooling to measure\
    \ and improve these. Leverage advanced analytics in the cloud for straggler detection\
    \ across the fleet (identifying devices with unusually high latency, low throughput,\
    \ or higher error rates compared to their peers) and for long-term trend analysis.\
    \ Production health dashboards should offer both high-level fleet overviews and\
    \ granular drill-down capabilities for individual Jetson Orin devices, displaying\
    \ live inference performance, hardware vitals, and data quality indicators."
  common_mistake: |
    **The Pitfall:** Relying exclusively on standard cloud-centric monitoring agents (like raw Prometheus scraping) without localized edge buffering or hardware awareness.
    **The Rationale:** Teams port standard DevOps practices from cloud servers directly to the edge, assuming continuous, cheap bandwidth and abundant local RAM.
    **The Consequence:** Intermittent network drops cause massive telemetry data loss, and bulky monitoring agents consume excessive LPDDR5 memory and power, interfering with the critical 60W autonomous driving pipeline.
  napkin_math: |
    1. **Raw Telemetry Volume:** 100 metrics/sec * 200 bytes = 20 KB/sec per device.
    2. **Fleet Data:** 20 KB/sec * 86,400 sec = ~1.73 GB/day per device. For a fleet of 10,000 devices, this is 17.3 TB/day of network traffic.
    3. **Local Buffering:** To survive a 4-hour network dropout, a device must locally buffer 20 KB/sec * 14,400 seconds = 288 MB.
    4. **Result:** With standard 50% compression, the local monitoring agent requires a strictly capped **144 MB storage buffer** to guarantee observability without killing device memory.
