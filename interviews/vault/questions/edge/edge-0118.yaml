title: The 'Open-Case' Vulnerability
scenario: An attacker has physical access to one of your company's smart security cameras. They want to
  bypass your perception model by injecting a pre-recorded video loop directly into the image processing
  pipeline, making it seem like an area is always empty. Which physical interface on the device's circuit
  board represents the most direct and highest-bandwidth point of attack for this data injection?
details:
  realistic_solution: The MIPI CSI-2 (Camera Serial Interface 2) bus is the most vulnerable point. It
    is the standard high-speed interface connecting the image sensor to the System-on-Chip (SoC). This
    raw sensor data is typically unencrypted and unauthenticated, making it a prime target for a physical
    'man-in-the-middle' attack using a signal injector to feed the SoC a malicious video stream.
  common_mistake: Engineers often focus on network-level security (e.g., encrypting the video stream for
    cloud upload) and forget that on an edge device, the initial data capture pipeline is a major vulnerability.
    An attacker with physical access can probe the unencrypted, unauthenticated signals traveling between
    components on the PCB (Printed Circuit Board) before any software-level security is applied.
  napkin_math: An attacker needs to inject a data stream that matches the camera's output. Let's calculate
    the bandwidth for a typical 4MP security camera sensor (e.g., 2688x1520 pixels) running at 30 FPS
    in a 12-bit RAW format (1.5 bytes/pixel).
  options:
  - The I2C bus used for sensor configuration.
  - The encrypted LPDDR5 DRAM where the model is stored.
  - The MIPI CSI-2 camera interface.
  - The UART serial console used for debugging.
  correct_index: 2
