title: 'Kernel Fusion: Evaluate Depthwise Convolution Fusion Strategies on Jetson
  Orin'
scenario: 'For MobileNetV2 on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W), compare
  three fusion strategies: (A) no fusion, (B) DWConv+BN+ReLU6 fusion only, (C) full
  inverted residual block fusion (PW expand + DWConv + BN + ReLU6 + PW project). Evaluate
  memory bandwidth and latency for the inverted residual block with input 56×56×32,
  expansion 6.'
question: For the 56×56×32 MobileNetV2 inverted residual block, which fusion strategy
  is viable and what memory and latency savings should you expect?
details:
  realistic_solution: Strategy C (full block fusion) saves intermediate tensor writes
    but must buffer the input for the residual add. At 56×56×32 × 1B int8 = 100KB
    input, this fits in L2 cache — viable.
  common_mistake: Not accounting for the inverted residual's residual connection,
    which complicates full block fusion (must keep original input for addition).
  napkin_math: 'Inverted residual: input 56×56×32. PW expand (32→192): output 56×56×192
    = 601KB. DWConv 3×3: output 56×56×192 = 601KB. BN+ReLU6: same size. PW project
    (192→32): output 56×56×32 = 100KB. Residual add: output 100KB. (A) No fusion:
    write 601KB + 601KB + 601KB + 100KB + 100KB = 2,003KB to LPDDR5. Read each intermediate
    = same. Total: 4,006KB = 4MB per block. At 68 GB/s: 0.059ms. (B) DWConv+BN+ReLU6
    fusion: saves 2 intermediate writes of 601KB each = 1.2MB saved. Total: 4 - 1.2
    = 2.8MB. 0.041ms. (C) Full block fusion: keeps only input (100KB in L2) and final
    output. Reads: input (100KB) + weights (PW1: 32×192×1B=6KB, DW: 192×9×1B=1.7KB,
    PW2: 192×32×1B=6KB). Writes: output (100KB). Total: ~220KB. At 68 GB/s: 0.003ms.
    Speedup C vs A: 0.059/0.003 = 19.7×. Practical (cache misses): ~5-8× realistic.'
