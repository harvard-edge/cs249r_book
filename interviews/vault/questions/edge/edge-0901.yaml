title: ECMP Hash Polarization in Edge Storage
scenario: An edge storage rack uses 4 parallel 100GbE links between a Top-of-Rack (ToR) switch and a dense NVMe-oF storage array to provide 400Gbps aggregate bandwidth. However, when 4 edge inference servers pull 100Gbps video streams simultaneously, total throughput caps at 100Gbps. One specific 100GbE link shows 100% utilization while the other 3 show near 0%.
question: Why do four 100Gbps NVMe-oF pulls cap at 100Gbps with one link saturated and three links idle?
details:
  realistic_solution: 'The optimal architecture requires diagnosing Equal-Cost Multi-Path (ECMP) hash polarization/collision. ECMP distributes traffic across parallel links by hashing packet header fields. If the 4 inference servers connect to a single IP/Port on the storage array and use fixed source ports, the hashes for all 4 flows compute to the same output port modulo 4. The solution leverages varying the source ports (multiplexing flows), utilizing a deeper hashing algorithm, or implementing flowlet switching.'
  common_mistake: |
    **The Pitfall:** Assuming the storage array's NVMe controllers are internally bottlenecked.
    **The Rationale:** Candidates overlook networking fundamentals like hashing and flow distribution in parallel links.
    **The Consequence:** They might needlessly upgrade the storage array hardware instead of adjusting the switch's ECMP hashing algorithm.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 parallel 100GbE links.
       - ECMP routing with 4 flows targeting identical destination IPs/ports.
    2. **Calculations:**
       - Output port = hash(flow_i) % 4.
       - If hashes align identically, 4 flows route to 1 link.
       - Utilized bandwidth = 1 link * 100Gbps = 100Gbps.
    3. **Conclusion & Interpretation:**
       - **Result: Network Polarization.** **Maximum throughput caps at 100Gbps. The system operates at 25% efficiency.**
