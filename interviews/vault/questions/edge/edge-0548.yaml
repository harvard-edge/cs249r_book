title: The Autonomous Vehicle 'FSDP' Fallacy
scenario: You are leading the perception team for an autonomous vehicle. Your multi-sensor fusion model
  has grown too large to meet its 33ms latency budget on a single Jetson AGX Orin. A junior engineer,
  citing experience with training LLMs, implements a plan to shard the model across two Orin modules connected
  by a PCIe Gen4 x8 switch, mimicking the behavior of FSDP/ZeRO. They distribute the model's layers and
  insert `AllReduce` collectives to synchronize the 512MB of activations after each of the 4 sharded transformer
  blocks. The team expected a near-2x performance gain, but end-to-end latency doubled to over 80ms. Analyze
  the system to distinguish why this cloud-native parallelism strategy failed at the edge, and compare
  it to a viable architectural alternative.
details:
  realistic_solution: The fundamental issue is the communication-to-compute ratio. Cloud parallelism techniques
    like FSDP are designed for environments with ultra-high bandwidth interconnects like NVLink (900 GB/s),
    where communication overhead is a small fraction of compute time. At the edge, the PCIe Gen4 x8 bus
    (~16 GB/s) is the bottleneck. The time spent shuffling gigabytes of activation data across the PCIe
    bus for every forward pass overwhelms any computational gains from splitting the model. The observed
    80ms latency is dominated by communication.
  common_mistake: Engineers often misdiagnose the problem as a software bug (e.g., 'our AllReduce implementation
    is inefficient') or a model problem ('the model is memory-bound'). While possibly true, these ignore
    the fundamental physics. The core error is misapplying a datacenter architecture (massive bandwidth,
    tolerable latency) to the edge (constrained bandwidth, strict real-time latency), assuming parallelism
    patterns are universally applicable.
  napkin_math: Assume 128 MB activation tensor per layer, 4 split layers. Total transfer = 512 MB. PCIe
    Gen4 x8 bandwidth = 16 GB/s. Transfer time = 512 MB / 16 GB/s = 32 ms. With a 33ms budget, compute
    is left with 33ms - 32ms = 1ms. On Orin (275 TOPS), 1ms gives only 275 GigaOps. The interconnect completely
    starves compute.
