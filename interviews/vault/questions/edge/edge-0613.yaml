title: The Autonomous Trucking Perception Upgrade
scenario: You are the Tech Lead for the perception team at an autonomous trucking company. The fleet is
  being upgraded from 1.2MP cameras to 4MP cameras to improve long-range object detection. Your current
  perception model, a standard ResNet-based architecture, now misses its hard real-time 33ms frame deadline
  on the existing Jetson AGX Orin platform. The system's thermal design imposes a hard power limit of
  45W for the Orin SoC.
details:
  realistic_solution: The core problem is that increasing image resolution by ~3.3x (4MP/1.2MP) dramatically
    increases the size of the initial activation maps, pushing the early layers of the network deep into
    a memory-bound regime. The Jetson Orin has immense compute power (275 TOPS), but it can't be used
    if the processors are stalled waiting for data from DRAM. The solution must address the compute-to-memory
    ratio (Arithmetic Intensity).
  common_mistake: A common but incorrect approach is to propose immediately quantizing the model to INT8.
    While quantization helps, it doesn't solve the fundamental bottleneck. Another mistake is to demand
    a more powerful GPU, ignoring the fixed power and thermal constraints of the deployed system. A third
    mistake is focusing only on the model's GFLOPs, assuming that more compute automatically means better
    performance without considering the memory system.
  napkin_math: '4MP is 2048x2048. First ResNet layer (7x7 conv, 64 filters, stride 2) on FP16 input (4MB).
    Output is 1024x1024x64x2B = 128MB. Ops: 1024 * 1024 * 64 * 7 * 7 * 3 * 2 = 19.7 GOPs. Orin compute
    time: 19.7G / 137 TFLOPS (FP16) = 0.14ms. Memory bandwidth bottleneck: reading 4MB and writing 128MB
    takes 132MB / 204.8 GB/s = 0.64ms. The layer is highly memory-bound with an AI of 19.7G / 132MB =
    149.'
