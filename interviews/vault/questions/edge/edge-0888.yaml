title: Fleet OTA Update Strategy
scenario: You manage 50,000 smart dashcams connected via 3G cellular (average 1 Mbps downlink). A new 150MB object detection model needs deployment. A previous faulty update caused a 1% device bootloop rate, requiring $150 manual truck rolls per device.
question: "How would you roll out the 150MB dashcam model over 1 Mbps 3G while minimizing cellular cost and avoiding costly bootloops?"
details:
  realistic_solution: 'Implement a phased canary rollout with binary delta updates and an A/B partition fallback mechanism. First, the model registry generates a binary patch (delta) between V1 and V2, reducing payload size significantly. Second, deploy to a 1% canary fleet, monitoring for bootloops or inference crashes for 24 hours. The edge device uses an A/B partition scheme: it downloads the delta, applies it to the inactive B partition, and sets a watchdog timer. If the model fails to load or crashes within 5 minutes, the device automatically reboots into the known-good A partition, averting a truck roll. This trades off immediate fleet-wide deployment for high reliability and low bandwidth costs.'
  common_mistake: Pushing the full 150MB model to all devices simultaneously using a standard cloud-based pub/sub trigger.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full update size: 150MB. Delta size: 15MB.
    - 50,000 devices. Data cost: $0.10/GB.
    - Bootloop manual fix: $150 per device.
    
    **Calculations:**
    - Full update cost: 150MB * 50,000 = 7.5TB -> $750.
    - Delta update cost: 15MB * 50,000 = 750GB -> $75.
    - Bootloop cost without fallback (1%): 500 devices * $150 = $75,000.
    
    **Conclusion & Interpretation:**
    - **Result: $75,000 saved (Network-Bound)**. The fallback mechanism averts catastrophic truck rolls, and the delta payload minimizes cellular costs.
