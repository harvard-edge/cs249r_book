title: Real-time Edge TPU Monitoring Strategy
scenario: >-
  You are deploying a critical real-time object detection model onto a fleet of 1000 Google Coral Edge TPUs (each offering 4 TOPS INT8 performance with a 2W power envelope) distributed across a large industrial complex. The model processes video streams from cameras, and any detection latency or missed alerts can have severe consequences for operational safety and efficiency.
question: How would you design monitoring and observability for 1000 Coral Edge TPUs, including telemetry, alerts, MTBF/MTTR, stragglers, and dashboards?
details:
  realistic_solution: 'Implement a lightweight, asynchronous telemetry agent on each Edge TPU to collect essential metrics. Use edge-side aggregation and batching of metrics before periodically pushing them to a central monitoring system. Define multi-level alerts: local alerts for immediate, critical issues and central alerts for fleet-wide trends. Straggler detection can be achieved by comparing the P99 inference latency across the fleet.'
  common_mistake: |
    **The Pitfall:** Designing a monitoring system that is too resource-intensive for edge devices.
    **The Rationale:** Candidates often apply cloud-native observability patterns (like sidecar proxies or high-frequency polling) directly to resource-constrained edge devices.
    **The Consequence:** This leads to high power consumption, increased network bandwidth usage, and negative impacts on the primary model inference workload.
  napkin_math: |
    1. Each Edge TPU sends 1 KB of telemetry data every 30 seconds.
    2. Messages per minute per device: `60 / 30 = 2`.
    3. Total fleet data egress per day: `1000 devices * 1 KB * 2 msgs/min * 60 mins/hr * 24 hrs/day`.
    4. `1000 * 1 * 2 * 60 * 24 = 2,880,000` KB/day.
    5. **Result: ~2.88 GB/day** for the entire fleet telemetry.
