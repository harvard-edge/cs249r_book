title: Coral Edge TPU mmap Initialization Over USB
scenario: A team deploys an INT8 quantized model (24MB) to a Google Coral Edge TPU (USB form factor, 4
  TOPS INT8, 2W). To save host memory, 4 separate worker processes use memory-mapping (mmap) to load the
  same TFLite model file, expecting the host OS to share a single 24MB memory block and achieve instant
  zero-copy initialization. Instead, the team observes increased host memory allocation and a cold-start
  initialization latency of exactly 400ms for each process. Analyze why the host-level mmap strategy fails
  to provide zero-copy initialization here, and calculate the expected data transfer latency.
question: "Why does host mmap fail to give zero-copy Coral initialization, and why is each 24MB model cold start exactly 400ms?"
details:
  realistic_solution: While mmap successfully shares the model file in the host CPU's virtual memory,
    the Edge TPU runtime must still allocate DMA-capable memory and copy the INT8 weights to transfer
    them over the USB interface to the Coral device. Because each process initializes a unique Edge TPU
    delegate context, it forces an independent transmission of the 24MB model payload across the USB bus,
    neutralizing the cold-start benefits of host-side mmap.
  common_mistake: Candidates often assume that host-side OS memory mapping (mmap) automatically translates
    to zero-copy execution on peripheral accelerators. They fail to recognize that the Coral TPU is an
    external device on a bus, requiring its own context and explicit data transfers from host memory to
    the device during initialization.
  napkin_math: '1. Model size: 24 Megabytes (MB). 2. USB 2.0 theoretical bandwidth: 480 Megabits per second
    (Mbps). 3. Convert bandwidth to Bytes: 480 Mbps / 8 = 60 MB/s. 4. Calculate initialization transfer
    time: 24 MB / 60 MB/s = 0.4 seconds (400ms). The 400ms latency spike represents the physical bottleneck
    of transferring the quantized weights over the USB bus to the 4 TOPS Edge TPU.'
