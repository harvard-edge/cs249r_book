title: Energy-Efficient LLM Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W maximum power budget). The model's architecture involves both computationally intensive matrix multiplications and frequent, irregular accesses to large embedding tables and KV caches.
question: How would you profile and optimize Jetson Orin LLM inference energy when both INT8 matmuls and LPDDR5 embedding/KV-cache accesses affect latency?
details:
  realistic_solution: 'A robust approach involves: 1. **Profiling**: Utilizing Jetson-specific tools like `tegrastats`, NVIDIA Nsight Systems/Compute to accurately profile power consumption, GPU/DLA utilization, and memory bandwidth usage during inference. 2. **Horowitz Energy Table Mapping**: Relating observed power profiles to the typical energy costs of different operations (e.g., INT8 MAC vs. LPDDR5 read/write) to identify the primary energy sinks (compute-bound vs. memory-bound). 3. **Operator and Dataflow Optimization**: Prioritizing optimizations like operator fusion to reduce data movement, optimizing data layouts for cache efficiency, and considering advanced memory compression techniques if embedding tables are exceptionally large. 4. **Dynamic Power Management**: Experimenting with Jetson''s power modes, DVFS settings for CPU/GPU/DLA, and clock gating to find an optimal energy-latency trade-off point for the specific workload. 5. **Algorithmic Changes**: If profiling reveals fundamental bottlenecks, exploring model architecture modifications such as knowledge distillation or sparse attention mechanisms to reduce overall compute and memory requirements.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on theoretical FLOPs/TOPS performance optimization.
    **The Rationale:** Candidates fail to acknowledge that memory access (LPDDR5 reads) is significantly more energy-intensive than compute (INT8 MACs).
    **The Consequence:** Wasting optimization effort on compute operations while the system remains heavily bottlenecked and power-starved by memory bandwidth.
  napkin_math: |
    - **Compute cost:** A typical INT8 multiply-accumulate (MAC) consumes ~0.2 pJ.
    - **Memory cost:** Fetching a 32-bit word (4 bytes) from LPDDR5 DRAM costs ~200 pJ.
    - **Scenario:** If an operation requires 100 INT8 MACs and fetches 4 bytes from DRAM:
      - Compute energy: 100 * 0.2 pJ = 20 pJ.
      - Memory energy: 4 bytes * (200 pJ / 4 bytes) = 200 pJ.
    - **Result:** Memory access dominates energy consumption by an order of magnitude (**200 pJ vs 20 pJ**).
