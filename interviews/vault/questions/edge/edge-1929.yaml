title: Energy-Efficient LLM Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on an NVIDIA Jetson Orin. The model's architecture involves both computationally intensive matrix multiplications and frequent, irregular accesses to large embedding tables and KV caches.
question: How would you profile and optimize Jetson Orin LLM inference energy when both INT8 matmuls and LPDDR5 embedding/KV-cache accesses affect latency?
details:
  realistic_solution: Utilize Nsight Systems (nsys) profiling to map the Horowitz Energy Table values (INT8 MAC vs LPDDR5 fetch) to the execution trace. Prioritize operator fusion to reduce data movement, layout optimization for cache hits, and consider KV cache quantization to relieve LPDDR5 bandwidth pressure.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on theoretical FLOPs/TOPS performance optimization.
    **The Rationale:** Candidates fail to acknowledge that memory access (LPDDR5 reads) is significantly more energy-intensive than compute (INT8 MACs).
    **The Consequence:** Wasting optimization effort on compute operations while the system remains heavily bottlenecked and power-starved by memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 MAC Energy: ~0.2 pJ
       - LPDDR5 Fetch (4 bytes): ~200 pJ
    2. **Calculations:**
       - Compute: 100 INT8 MACs = 20 pJ
       - Memory: 4 bytes fetched = 200 pJ
    3. **Conclusion & Interpretation:**
       - **Result: Memory Access Dominates (200 pJ vs 20 pJ).** The system is fundamentally memory-bound for power.
