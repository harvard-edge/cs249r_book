title: Hailo-8 Transformer KV-Cache Streaming Architecture Specification
scenario: Design an edge deployment architecture for a 125M parameter transformer processing a context
  window of 2048 tokens using a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS at INT8 precision
  and consumes only 2.5W, but it lacks local DRAM, meaning all model weights and KV-cache tensors must
  stream continuously from host memory. Analyze the memory bandwidth constraints and specify a system
  design that handles the O(n²) attention complexity and growing KV-cache while maximizing the utilization
  of the 26 TOPS compute engine.
question: "How would you partition a 125M-parameter transformer on Hailo-8 given O(n²) attention and host-streamed KV-cache bandwidth limits?"
details:
  realistic_solution: 'A robust specification partitions the transformer architecture: the compute-dense
    Feed-Forward Network (FFN) layers are compiled to the Hailo-8''s dataflow pipeline, while the memory-bound
    O(n²) attention mechanism and KV-cache management remain on the host CPU. Alternatively, the design
    can specify a fixed-size sliding window attention to cap the KV-cache size, ensuring the streaming
    bandwidth from host memory never exceeds the interface throughput limits.'
  common_mistake: Candidates often design a monolithic execution graph that attempts to stream the entire
    KV-cache back and forth between the host and accelerator for every token generation step. They fail
    to analyze the interaction between the Hailo-8's lack of local DRAM and the linear growth of the KV-cache,
    leading to a severely bandwidth-bound system where the 26 TOPS accelerator sits idle.
  napkin_math: A 125M parameter model mapped to INT8 requires ~125MB for weights. For a context of 2048
    tokens, hidden size of 768, and 12 layers, the KV-cache is 2048 * 768 * 2 (K+V) * 12 * 1 byte (INT8)
    = ~37.7MB. Streaming the 125MB weights and 37.7MB cache for each auto-regressive token requires ~162MB/token.
    The dense compute per token is ~250 MOPs, which takes ~0.01ms on the 26 TOPS Hailo-8. Because compute
    is instantaneous compared to streaming 162MB over an edge interface, the system is memory-bandwidth
    bound, justifying the architectural split.
