title: Hailo-8 SSD RTO Bottleneck
scenario: A Hailo-8 smart-city node loses power and restarts. It must load a 500 MB model from an SSD reading at 250 MB/s to resume operations.
question: "Calculate the Recovery Time Objective (RTO) limit imposed by the SSD speed."
visual:
  kind: svg
  path: edge-2369.svg
  alt: Timeline showing 2 seconds of recovery time.
  caption: RTO bound by SSD read speed.
details:
  realistic_solution: The recovery time is strictly bound by the time it takes to read the model into memory. RTO limit = 500 MB / 250 MB/s = 2.0 seconds.
  common_mistake: |
    **The Pitfall:** Adding arbitrary boot overheads.
    **The Rationale:** Candidates overthink the prompt and include OS load times.
    **The Consequence:** Failing to calculate the strict lower bound imposed purely by the SSD I/O speed as requested.
  napkin_math: |
    *   **Model Size:** 500 MB.
    *   **Read Speed:** 250 MB/s.
    *   **RTO Limit:** 500 MB / 250 MB/s = **2.0 seconds**.
