title: On-Device Demographic Parity Energy Budget
scenario: You are deploying a privacy-preserving credit scoring model on an NVIDIA Jetson Orin. To comply with regulations, Demographic Parity evaluation runs entirely on-device using local data loaded into RAM. You have 200,000 historical records: Group A has 120,000 records with 30,000 approvals, and Group B has 80,000 records with 10,000 approvals.
question: Calculate the Demographic Parity difference and total energy consumed (in Watt-hours) if evaluating 1,000 records/sec at 60W TDP.
details:
  realistic_solution: First, compute the positive prediction rate for each group to find the Demographic Parity difference. Then, calculate the total evaluation runtime based on the throughput. Finally, multiply the runtime by the 60W TDP and convert seconds to hours to determine the total Watt-hours consumed, ensuring the edge device has sufficient power for the batch job.
  common_mistake: |
    **The Pitfall:** Confusing Demographic Parity with Equalized Odds or failing unit conversions.
    **The Rationale:** Candidates often condition on true labels (Equalized Odds) instead of raw approval rates, and forget to convert Watt-seconds (Joules) to Watt-hours.
    **The Consequence:** This leads to incorrect fairness metric calculations and severely underestimated energy budgets for edge evaluation.
  napkin_math: |
    1. Group A Approval Rate: 30,000 / 120,000 = 0.25 (25%).
    2. Group B Approval Rate: 10,000 / 80,000 = 0.125 (12.5%).
    3. Demographic Parity Difference: |25% - 12.5%| = 12.5%.
    4. Evaluation Time: 200,000 records / 1,000 records/sec = 200 seconds.
    5. **Energy Consumed: 60W TDP * (200 / 3600 hours) = 60 * 0.0555 = 3.33 Watt-hours.**
