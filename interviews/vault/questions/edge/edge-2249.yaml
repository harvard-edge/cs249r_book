title: Jetson Orin Thermal Throttling and Inference Latency Tail
scenario: A passively cooled Jetson Orin NX (15W mode) shows 28ms latency at 22°C ambient, degrading to 95ms at 38°C.
question: What causes the afternoon p99 latency spike, how does thermal throttling explain it, and how would you harden the deployment?
details:
  realistic_solution: 'Passive cooling is insufficient at 38°C ambient + solar heating. Throttling reduces CPU/GPU clocks by 25%. Combined with queueing effects at throttled throughput, p99 inflates 3-4x. Fix: add active cooling (5-10W fan) or reduce TDP to 10W mode.'
  common_mistake: |
    **The Pitfall:** Blaming software or model issues rather than thermal queueing effects.
    **The Rationale:** Cloud engineers are unaccustomed to systems without active cooling exhibiting strong temperature-dependent performance drops.
    **The Consequence:** Endless software refactoring that ignores the core physical throttling limit, leaving the system fundamentally unstable.
  napkin_math: |
    1. **Assumptions & Constraints:** TDP = 15W. Morning ambient = 22°C, Afternoon = 38°C + 12°C solar. Passive θja = 1.8°C/W.
    2. **Calculations:** Afternoon Junction = 50°C + (15W * 1.8°C/W) = 77°C (near throttle). Solar peak pushes to 82°C. Throttled clocks by 25% means Latency = 28ms / 0.75 = 37.3ms. Arrival = 25ms (40 FPS). ρ = 37.3 / 25 = 1.49.
    3. **Conclusion & Interpretation:** **Result: ρ = 1.49 (Unstable Queue).** The system enters thermal throttling, which explodes the queue length and p99 latency. **System Status: Thermally-Bound.**
