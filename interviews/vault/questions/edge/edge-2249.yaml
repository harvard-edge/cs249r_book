title: Jetson Orin Thermal Throttling and Inference Latency Tail on Embedded Systems
scenario: A Jetson Orin NX module deployed in an outdoor traffic monitoring system shows normal inference latency of 28ms (p50) in the morning but p99 latency degrades to 95ms by afternoon. The module is running in a passively cooled enclosure. Ambient temperature rises from 22°C in the morning to 38°C in the afternoon. The module TDP is 25W (operating in 15W NX mode).
question: What causes the afternoon p99 latency spike, how does thermal throttling explain it, and how would you harden the Jetson deployment?
details:
  realistic_solution: 'Passive cooling is insufficient at 38°C ambient + solar heating. Throttling reduces CPU/GPU clocks by 20-30%, increasing inference time from 28ms to 37ms. Combined with queueing effects at throttled throughput, p99 inflates 3-4×. Fix: add active cooling (5-10W fan), use thermally conductive enclosure material, or reduce TDP to 10W mode in summer.'
  common_mistake: |
    **The Pitfall:** Blaming software or model issues rather than thermal effects.
    **The Rationale:** Cloud engineers are unaccustomed to systems without active cooling exhibiting strong temperature-dependent performance drops.
    **The Consequence:** Endless software refactoring that ignores the core physical throttling limit, leaving the system fundamentally unstable.
  napkin_math: |
    - **Passive Cooling Baseline:** θja passive = 1.8°C/W. TDP = 15W. Morning junction = 22°C + (15W * 1.8°C/W) = 49°C.
    - **Afternoon Thermal Load:** 38°C ambient + 12°C solar gain = 50°C effective ambient. Junction = 50°C + 27°C = 77°C (near 80°C threshold). Solar peak = 55°C effective → 82°C (throttles).
    - **Throttling Impact:** GPU clock reduces by 25%. Inference latency = 28ms / 0.75 = 37.3ms.
    - **Queueing Effect:** Arrival interval is 25ms (40 FPS). With 37.3ms service time, ρ = 37.3/25 = 1.49 (queue becomes unstable). P99 inflates to 95ms.
    - **Final Result:** **Adding a 5W fan reduces θja to 0.8°C/W. Peak afternoon junction becomes 55°C + (15W * 0.8°C/W) = 67°C, safely preventing thermal throttling.**
