title: CI/CD Pipeline for Fleet-Wide Coral Edge TPU Deployment
scenario: You are designing the MLOps lifecycle for a fleet of 10,000 smart cameras powered by Google
  Coral Edge TPUs (4 TOPS INT8, 2W). Models must be frequently updated to detect new defect types in a
  manufacturing environment. You need to design a CI/CD pipeline that handles automated INT8 quantization,
  operator compatibility verification, and staged fleet rollouts while ensuring training-serving consistency.
  The pipeline must guarantee that deployed models strictly fit within the Coral's limited operator support
  and power envelope without manual intervention.
question: "How would you design CI/CD for 10,000 Coral cameras to quantize, verify operator mapping, and safely roll out Edge TPU models?"
details:
  realistic_solution: Implement a hardware-in-the-loop (HITL) automated testing stage in the CI/CD pipeline.
    After Post-Training Quantization (PTQ) to INT8, the CI pipeline must run the Edge TPU Compiler to
    verify 100% operation mapping to the TPU. The pipeline then deploys the compiled model to a physical
    staging rack of Coral devices to profile latency and measure power draw before approving the artifact
    for a canary rollout.
  common_mistake: Candidates often propose standard cloud-native CI/CD pipelines without accounting for
    the hardware-specific compilation step. They forget that unsupported operations will silently fall
    back to the host CPU, which breaks latency SLAs and exceeds the 2W power budget.
  napkin_math: An object detection model requires ~50 GOPS per frame. At 4 TOPS (4,000 GOPS) INT8 peak
    performance, the theoretical maximum framerate is 4,000 / 50 = 80 FPS. If the CI pipeline misses an
    unsupported operation that falls back to the host CPU (taking e.g. 50ms per frame), the bottleneck
    reduces performance to at most 1 / 0.05 = 20 FPS, failing a typical 30 FPS SLA, while pushing system
    power consumption well above the TPU's 2W envelope.
