title: Multi-Tenant Operator Scheduling on Qualcomm Cloud AI 100
scenario: You are tasked with designing the inference execution engine for a multi-tenant on-premise deployment
  utilizing the Qualcomm Cloud AI 100 accelerator. The system must schedule concurrent execution of multiple
  transformer-based models within the 75W power envelope while maximizing the 400 TOPS INT8 compute capacity.
  Given the 32 GB LPDDR4x memory constraint, architect a scheduling system that handles operator fusion,
  memory reuse across tenants, and execution order optimization to minimize memory thrashing and ensure
  high throughput.
details:
  realistic_solution: 'The optimal design involves a two-tiered scheduler: a static compiler pass for
    aggressive operator fusion and layer scheduling to maximize local SRAM reuse, paired with a dynamic
    runtime scheduler. The runtime scheduler should implement memory pooling for intermediate activations
    and prioritize execution order based on current memory availability, ensuring the combined working
    set of concurrent models fits within the 32 GB LPDDR4x while keeping the 400 TOPS compute units saturated.'
  common_mistake: Candidates often design a static scheduling approach that works for a single model but
    fails in a multi-tenant environment. They may overlook the need for dynamic memory pooling across
    concurrent models or fail to account for the memory bandwidth bottleneck of the LPDDR4x when operators
    are not properly fused.
  napkin_math: Assume 4 concurrent models, each requiring 5 GB for INT8 weights and 1 GB for KV cache/activations
    (24 GB total static memory). This leaves 8 GB of the 32 GB LPDDR4x for dynamic intermediate buffers.
    If an unfused attention block requires 3 GB of intermediate memory, only 2 models can execute that
    block simultaneously (6 GB < 8 GB). By designing a scheduler that enforces operator fusion to reduce
    the intermediate footprint to 1 GB per model, all 4 models can execute concurrently (4 GB < 8 GB),
    maximizing the 400 TOPS compute capacity.
