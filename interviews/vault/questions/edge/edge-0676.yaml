title: The Occupancy Grid Map Memory
scenario: 'Your autonomous mining truck uses a Jetson AGX Orin to build a real-time occupancy grid map. The map covers a 200m x 200m area at 10cm resolution, updated at 10 Hz from LiDAR. Each cell stores: occupancy probability (1 float = 4 bytes), height (1 float = 4 bytes), and terrain class (1 byte). A colleague says memory is trivial.'
question: What are the actual memory and bandwidth requirements for the 200m occupancy grid, and when does it become the bottleneck?
details:
  realistic_solution: 'Grid dimensions: 200m / 0.1m = 2000 cells per axis. Total cells: 2000 × 2000 = **4 million cells**. Per-cell storage: 4 + 4 + 1 = **9 bytes**. Single frame map: 4M × 9 = **36 MB**.'
  common_mistake: |
    **The Pitfall:** Dismissing 2D arrays as simple and cheap.
    **The Rationale:** Candidates fail to account for high resolutions, update rates, and temporal history overhead.
    **The Consequence:** Severe bandwidth bottlenecks and cache misses that stall the CPU.
  napkin_math: |
    **Assumptions & Constraints:**
       - Map Area: 200m x 200m.
       - Resolution: 10cm (0.1m) per cell.
       - Data per cell: Occupancy (4 bytes), Height (4 bytes), Class (1 byte) = 9 bytes.
    **Calculations:**
       - Grid dimensions: 200m / 0.1m = 2000 cells per axis.
       - Total cells: 2000 * 2000 = 4,000,000 cells.
       - Single frame map size: 4,000,000 cells * 9 bytes/cell = 36,000,000 bytes (~36 MB).
    **Conclusion & Interpretation:**
       - **Result: 36 MB Per Frame**. The high-resolution grid demands 36 MB per frame. At 10 Hz, this causes immense bandwidth bottlenecks and cache misses that stall the CPU.
  options:
  - "Switching to a lower precision format (e.g., INT4) will double the effective compute throughput and solve the utilization gap."
  - "Deploy the update to all devices simultaneously to minimize the total rollout duration and reduce the window of version inconsistency."
  - "A 2D grid is simple and cheap.. This ignores the update rate, temporal history, and bandwidth implications of a high-resolution, high-frequency map."
  - 'Grid dimensions: 200m / 0.1m = 2000 cells per axis. Total cells: 2000 × 2000 = 4 million cells. Per-cell storage: 4 + 4 + 1 = 9 bytes.'
