title: The Power Efficiency Fallacy
scenario: Your team is building a vision system for a battery-powered drone and needs to choose an accelerator. The primary constraint is maximizing inference throughput per watt.
question: Between a Jetson AGX Orin and a Hailo-8, which device is fundamentally more power-efficient in terms of TOPS/W?
details:
  realistic_solution: 'The Hailo-8 is significantly more power-efficient. By evaluating TOPS per Watt (TOPS/W) rather than raw throughput, the Hailo-8 avoids thermal throttling and battery drain for severely constrained edge deployments.'
  common_mistake: |
    **The Pitfall:** Fixating on the advertised peak TOPS without considering power.
    **The Rationale:** Engineers assume higher absolute TOPS (275 for Jetson) means better performance in all scenarios.
    **The Consequence:** They select a high-power device that drains the drone's battery, ignoring the crucial context of the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin has 275 TOPS and ~60W TDP.
    - Hailo-8 has 26 TOPS and 2.5W TDP.

    **Calculations:**
    - Jetson AGX Orin efficiency is 275 TOPS / 60W = ~4.6 TOPS/W.
    - Hailo-8 efficiency is 26 TOPS / 2.5W = 10.4 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: 10.4 TOPS/W (Power-Bound)**. Hailo-8 delivers over 2x the TOPS/W compared to the Jetson Orin.
  options:
  - The Jetson AGX Orin, because its 275 TOPS is over 10x higher than the Hailo-8's 26 TOPS.
  - The Hailo-8, because it delivers over 2x the TOPS/W compared to the Jetson.
  - They are roughly equivalent in efficiency; the choice depends on other factors.
  - It's impossible to tell without knowing the specific model architecture.
  correct_index: 1
