title: The Power Efficiency Fallacy
scenario: Your team is building a vision system for a battery-powered drone and needs to choose an accelerator.
  The primary constraint is maximizing inference throughput per watt. Between a Jetson AGX Orin and a
  Hailo-8, which device is fundamentally more power-efficient in terms of TOPS/W?
question: "Between a Jetson AGX Orin and a Hailo-8, which device is fundamentally more power-efficient in terms of TOPS/W?"
details:
  realistic_solution: The Hailo-8 is significantly more power-efficient. Power efficiency is measured
    in TOPS per Watt (TOPS/W). While the Jetson has much higher absolute performance, the Hailo-8 delivers
    more compute for every watt it consumes, making it the superior choice for severely power-constrained
    applications.
  common_mistake: Engineers often fixate on the advertised peak TOPS of a device (275 TOPS for Jetson
    vs. 26 TOPS for Hailo) and incorrectly assume the higher number implies better performance in all
    scenarios. This ignores the crucial context of the power budget, which is often the primary constraint
    at the edge.
  napkin_math: We calculate the TOPS/W for each device using the spec sheet values.
  options:
  - The Jetson AGX Orin, because its 275 TOPS is over 10x higher than the Hailo-8's 26 TOPS.
  - The Hailo-8, because it delivers over 2x the TOPS/W compared to the Jetson.
  - They are roughly equivalent in efficiency; the choice depends on other factors.
  - It's impossible to tell without knowing the specific model architecture.
  correct_index: 1
