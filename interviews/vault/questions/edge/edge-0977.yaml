title: Edge NPU Queueing Under Bursty Loads
scenario: A Hailo-8 smart camera processes motion-detection frames at a strict, deterministic service rate of 100 frames per second. During rush hour, motion events trigger frame captures at an average arrival rate of 90 frames per second following a Poisson distribution.
question: What is the utilization of the Hailo-8 NPU and the average queue length using M/D/1 queueing principles?
visual:
  kind: svg
  path: edge-0977.svg
  alt: A line plot showing the hockey-stick curve of queue length increasing exponentially as NPU utilization approaches 1.0.
  caption: M/D/1 Queue Length vs Utilization
details:
  realistic_solution: 'The arrival rate (λ) is 90 fps and the deterministic service rate (μ) is 100 fps. The NPU utilization (ρ) is λ/μ = 90/100 = 0.9, or 90%. Because the hardware accelerator service time is deterministic, we use the M/D/1 queue length formula: ρ² / (2*(1-ρ)). This results in 0.81 / 0.2 = 4.05 frames buffered in memory on average.'
  common_mistake: |
    **The Pitfall:** Applying the M/M/1 formula (ρ / (1-ρ)) instead of M/D/1.
    **The Rationale:** Candidates default to the most common queueing formula without realizing hardware accelerators have fixed, deterministic execution times.
    **The Consequence:** The candidate incorrectly overestimates the queue length to 9 frames, leading to massive over-provisioning of host memory buffers.
  napkin_math: |
    1. Utilization (ρ) = λ / μ = 90 / 100 = 0.9.
    2. M/D/1 Queue Length = (ρ²) / (2 * (1 - ρ)).
    3. **Queue Length = (0.9²) / (2 * 0.1) = 0.81 / 0.2 = 4.05 frames.**
