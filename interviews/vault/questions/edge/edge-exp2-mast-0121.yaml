title: Dataflow Optimization for Hailo-8 Stream Processing
scenario: You are designing an ultra-low-power, always-on smart camera system using a host SoC paired
  with a Hailo-8 accelerator (26 TOPS INT8, 2.5W peak). The Hailo-8 operates as a dataflow accelerator
  and relies entirely on streaming weights and activations from the host's memory, as it has no local
  DRAM. Your task is to design a novel multi-stage perception pipeline (object detection + tracking) that
  minimizes the total system energy per inference, justifying your operator choices and layer fusion strategies
  to strictly minimize host memory access.
question: "How would you design an object detection and tracking pipeline on Hailo-8 to minimize energy per inference by reducing host memory access?"
details:
  realistic_solution: The candidate should synthesize an architecture that maximizes on-chip SRAM data
    reuse and pipeline fusion, selecting standard convolutions over memory-bound operations where appropriate.
    They should propose a dataflow-friendly topology without complex routing branches to keep the entire
    pipeline mapped concurrently on the Hailo-8's fabric, treating the accelerator as a single streaming
    pipeline where data is read from host memory exactly once at the input and written once at the output.
  common_mistake: Candidates often focus solely on minimizing MAC operations (compute) without realizing
    that on a stream-based architecture like the Hailo-8, the energy bottleneck is heavily dominated by
    host memory bandwidth. They might propose memory-bound operators like large depthwise separable convolutions
    or extensive skip connections that fragment the dataflow and force frequent, high-energy memory round-trips.
  napkin_math: At 26 TOPS and 2.5W, compute energy is roughly 0.096 pJ/OP (2.5W / 26e12 OPs). Conversely,
    LPDDR4 memory access costs ~100 pJ/bit. A 10 GOPs compute workload requires only ~1 mJ (10e9 * 0.096
    pJ). However, spilling a 10MB intermediate feature map to host memory and reading it back costs 10MB
    * 8 bits/byte * 100 pJ/bit * 2 (read+write) = 16 mJ. Eliminating this single memory round-trip through
    dataflow fusion saves 16x more energy than optimizing the entire compute block.
