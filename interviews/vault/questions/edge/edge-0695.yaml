title: The Mixed-Precision Perception Stack
scenario: 'You are architecting the inference pipeline for an autonomous vehicle with a Jetson AGX Orin. The stack has three models: object detection, monocular depth estimation, and motion planning. The pipeline has a 33ms real-time deadline.'
question: What precision would you use for object detection, monocular depth, and motion planning on the Orin, and why?
details:
  realistic_solution: 'Assign precision based on error-tolerance profiles. Object detection (INT8): Classification tasks tolerate quantization noise well, and downstream trackers correct single-frame jitter. Monocular depth (FP16): Depth estimation is highly sensitive to precision in the regression head; INT8 quantization causes dangerous depth discontinuities. Motion planning (FP32): Trajectory computation is safety-critical where a minor bit flip or precision loss can directly cause a collision. Mixed precision ensures safety while meeting deadlines.'
  common_mistake: |
    **The Pitfall:** Running everything in INT8 for maximum speed, or running everything in FP32 for maximum safety.
    **The Rationale:** Treating the perception pipeline as a monolithic entity rather than analyzing the distinct error-tolerance of each sub-component.
    **The Consequence:** Either compromising safety-critical planning with quantization noise, or missing latency deadlines due to unnecessary precision in object detection.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin: 275 TOPS (INT8), 137.5 TFLOPS (FP16), 5.3 TFLOPS (FP32).
       - Detection (INT8): 28 GOPS. Depth (FP16): 40 GFLOPs. Planning (FP32): 2 GFLOPs.
       - Deadline: 33ms.
    2. **Calculations:**
       - Detection INT8: 28 GOPS / 275 TOPS = 0.10 ms.
       - Depth FP16: 40 GFLOPs / 137.5 TFLOPS = 0.29 ms.
       - Planning FP32: 2 GFLOPs / 5.3 TFLOPS = 0.38 ms.
       - Total compute time: 0.10 + 0.29 + 0.38 = 0.77 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. The mixed-precision strategy yields 0.77ms compute time, easily fitting the 33ms budget.**
