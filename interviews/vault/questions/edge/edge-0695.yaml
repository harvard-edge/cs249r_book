title: The Mixed-Precision Perception Stack
scenario: You are architecting the inference pipeline for an autonomous vehicle with a Jetson AGX Orin. The stack has three models: object detection, monocular depth estimation, and motion planning. Design the precision strategy for each model and justify your choices from first principles.
question: What precision would you use for object detection, monocular depth, and motion planning on the Orin, and why?
details:
  realistic_solution: |
    Assign precision based on error-tolerance. Object detection (INT8): classification tolerates noise; downstream tracking corrects single-frame errors. Monocular depth (FP16): depth estimation is sensitive to precision in the regression head; quantization causes depth discontinuities. Motion planning (FP32): safety-critical trajectory computation where a bit flip causes a collision.
  common_mistake: |
    **The Pitfall:** Running everything in INT8 for maximum speed, or running everything in FP32 for maximum safety.
    **The Rationale:** Both approaches ignore the distinct error-tolerance profiles of each sub-component in the perception pipeline.
    **The Consequence:** Either compromising safety-critical planning with quantization noise, or missing latency deadlines due to unnecessary precision in object detection.
  napkin_math: |
    - Detection INT8: 28 GOPS / 275 TOPS = 0.10ms.
    - Depth FP16: 40 GFLOPs / 137.5 TFLOPS = 0.29ms.
    - Planning FP32: 2 GFLOPs / 5.3 TFLOPS = 0.38ms.
    - Total compute time: 0.10ms + 0.29ms + 0.38ms = 0.77ms.
    - **Result: Compute time (0.77ms) and memory (291 MB) easily fit within the 33ms budget and 32GB RAM.**
