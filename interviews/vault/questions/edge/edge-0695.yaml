title: The Mixed-Precision Perception Stack
scenario: 'You''re architecting the inference pipeline for an autonomous vehicle with a Jetson AGX Orin.
  The stack has three models: object detection, monocular depth estimation, and motion planning. Design
  the precision strategy for each model and justify your choices from first principles.'
question: "What precision would you use for object detection, monocular depth, and motion planning on the Orin, and why?"
details:
  realistic_solution: 'Assign precision based on error-tolerance profiles. Object detection (INT8): classification
    and bounding boxes tolerate quantization noise; small accuracy loss is acceptable because downstream
    tracking corrects single-frame errors. Yields 8.7x reduction in compute and memory vs FP32. Monocular
    depth (FP16): depth estimation is sensitive to precision in the regression head; small quantization
    errors cause depth discontinuities that create phantom obstacles. FP16 preserves smooth depth gradients
    with 2x speedup over FP32. Motion planning (FP32): safety-critical trajectory computation where a
    single bit flip can cause a collision. No precision compromise. Total compute: 0.42ms — all three
    fit easily within 33ms even with memory stalls.'
  common_mistake: '"Run everything in INT8 for maximum speed" or "Run everything in FP32 for maximum safety."
    Both ignore the error-tolerance profile of each component.'
  napkin_math: 'Detection INT8: 28 GFLOPs / 275 TOPS = 0.10ms. Depth FP16: 40 GFLOPs / 137.5 TFLOPS FP16
    = 0.29ms. Planning FP32: 2 GFLOPs / 68.75 TFLOPS FP32 = 0.03ms. Total compute: 0.42ms. Memory: detection
    11 MB (INT8) + depth 80 MB (FP16) + planning 200 MB (FP32) = 291 MB. All fit comfortably in the Orin''s
    32/64 GB DRAM with the pipeline completing well within the 33ms budget even with memory stalls.'
  options:
  - Run everything in INT8 for maximum speed. or "Run everything in FP32 for maximum safety." Both ignore
    the error-tolerance profile of each component.
  - Moving to a memory-mapped file loading strategy will reduce peak memory to near-zero since only accessed
    weights are loaded.
  - The pipeline bottleneck is always the largest model; optimizing smaller models in the pipeline has
    negligible impact on end-to-end latency.
  - 'Assign precision based on error-tolerance profiles. Object detection (INT8): classification and bounding
    boxes tolerate quantization noise; small accuracy loss is acceptable because downstream tracking corrects
    single-frame errors. Yields 8.7x reduction in compute and memory vs FP32.'
