title: 'Edge TCO Implement: Hailo-8 vs Cloud Break-Even Analysis'
scenario: Calculate the exact daily inference volume break-even point between Hailo-8+Pi5 ($280 total,
  7.5W) at $0.10/kWh vs AWS Rekognition cloud inference at $0.001/image, over 3 years. Implement the break-even
  formula analytically and verify with a concrete numerical check.
question: "Using the corrected $19.71 power cost, how many images are needed for Hailo-8+Pi5 to break even at a $0.69 margin per image?"
details:
  realistic_solution: 'With corrected power cost $19.71: break-even ≈ $299.71 / margin_per_image. At $0.69/image:
    ~436 images to break even.'
  common_mistake: Setting up the break-even incorrectly by comparing cumulative cost at a fixed volume
    instead of solving for the volume where total costs are equal over the deployment period.
  napkin_math: 'Power: 7.5W × 26,280hr × $0.10/kWh / 1000 = $19.71 (corrected from $197). Break-even:
    fixed costs / (revenue_per_image - variable_cost_per_image). Fixed = $280 (hardware) + $19.71 (power)
    = $299.71. At $0.69 revenue per decision: 299.71 / 0.69 ≈ 434 images → break-even at ~436 images total
    (not requiring $197 power).'
