title: DP Noise Calibration for Sensor Fusion on Edge
scenario: A smart home hub aggregates temperature, occupancy, and audio features from 5 sensors before running a local anomaly detection model. A privacy engineer adds Laplace noise to each sensor reading independently before the fusion layer (local DP per feature). After deployment, the model's false negative rate jumps from 2% to 18%.
question: Why did per-feature LDP noise raise false negatives from 2% to 18%, and how would you fix the sensor fusion pipeline?
details:
  realistic_solution: 'Applying independent ε-LDP noise to 5 features composes to a 5ε privacy loss while destroying multivariate correlations. Fix: Shift to output-level Central DP. Add Laplace noise directly to the 1-dimensional output anomaly score. This achieves the target privacy budget with drastically lower noise magnitude.'
  common_mistake: |
    **The Pitfall:** Assuming adding noise to inputs (Local DP) is equivalent to adding noise to outputs (Central DP).
    **The Rationale:** Candidates fail to account for the "curse of dimensionality," where independent noise compounds across input features.
    **The Consequence:** High-magnitude independent noise destroys signal correlations, drastically increasing false negatives.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total privacy budget: ε=5
       - Input LDP (5 features): ε=1 per feature, sensitivity Δ=1
    2. **Calculations:**
       - Feature Laplace scale (b): 1/1 = 1.0. Variance per feature = 2.
       - Total LDP noise variance: 5 * 2 = 10.
       - Output Central DP (1-dim score): ε=5, sensitivity Δ=1.
       - Output Laplace scale (b): 1/5 = 0.2.
       - Total Central DP noise variance: 2 * (0.2)^2 = 0.08.
    3. **Conclusion & Interpretation:**
       - **Result: 125x Noise Reduction.** Output DP reduces total noise variance from 10 to 0.08, perfectly preserving the fusion model's signal.
