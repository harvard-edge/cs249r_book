title: DP Noise Calibration for Sensor Fusion on Edge
scenario: A smart home hub aggregates temperature, occupancy, and audio activity features
  from 5 sensors before running a local anomaly detection model. A privacy engineer
  adds Laplace noise to each sensor reading independently before the fusion layer
  (local DP per feature). After deployment, the model's false negative rate on anomalies
  jumps from 2% to 18%. Diagnose the failure and propose a fix.
question: Why did per-feature LDP noise raise false negatives from 2% to 18%, and
  how would you fix the sensor fusion pipeline?
details:
  realistic_solution: 'The mistake is applying feature-level Local DP (LDP) before fusion.
    When you add independent ε-LDP noise to 5 features, the composed privacy loss is
    ε_total = 5ε. Worse, the high-magnitude independent noise completely destroys the
    multivariate correlations that the anomaly detection model relies on. 
    Fix: Shift from input-level LDP to output-level Central DP. Instead of noising 5 
    inputs, add Laplace noise directly to the 1-dimensional output anomaly score. 
    Because the sensitivity is scoped to a single scalar (Δ=1), you achieve the target
    privacy budget with drastically lower noise magnitude, perfectly preserving the 
    fused signal.'
  common_mistake: 'Assuming that adding noise to inputs (Local DP) is equivalent to 
    adding noise to the output (Central DP). Local DP suffers from the "curse of 
    dimensionality" — noise scales with the number of input features (d=5), causing 
    catastrophic signal destruction for complex multivariate models.'
  napkin_math: 'To achieve a total privacy budget of ε=5 using input LDP across 5 features,
    each feature gets ε=1. Laplace scale b = Δf/ε = 1/1 = 1.0. Noise std per feature = √2 ≈ 1.41. 
    The noise variance on the 5-dim vector is 5 * (1.41)² = 10, completely drowning the signal.
    If we instead use output Central DP, we add noise to the 1-dimensional anomaly score
    (Δ=1) using the full budget ε=5. Laplace scale b = 1/5 = 0.2. The noise std on the final 
    score is √2 * 0.2 ≈ 0.28. Output DP reduces the noise standard deviation by 5× compared
    to input LDP, restoring the model''s accuracy.'
