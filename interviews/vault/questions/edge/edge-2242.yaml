title: DP Noise Calibration for Sensor Fusion on Edge
scenario: A smart home hub aggregates temperature, occupancy, and audio activity features from 5 sensors before running a local anomaly detection model. A privacy engineer adds Laplace noise to each sensor reading independently before the fusion layer (local DP per feature). After deployment, the model's false negative rate on anomalies jumps from 2% to 18%.
question: Why did per-feature LDP noise raise false negatives from 2% to 18%, and how would you fix the sensor fusion pipeline?
details:
  realistic_solution: 'The mistake is applying feature-level Local DP (LDP) before fusion. When you add independent ε-LDP noise to 5 features, the composed privacy loss is ε_total = 5ε. Worse, the high-magnitude independent noise completely destroys the multivariate correlations that the anomaly detection model relies on. Fix: Shift from input-level LDP to output-level Central DP. Instead of noising 5 inputs, add Laplace noise directly to the 1-dimensional output anomaly score. Because the sensitivity is scoped to a single scalar (Δ=1), you achieve the target privacy budget with drastically lower noise magnitude, perfectly preserving the fused signal.'
  common_mistake: |
    **The Pitfall:** Assuming adding noise to inputs (Local DP) is equivalent to adding noise to outputs (Central DP).
    **The Rationale:** Candidates do not account for the "curse of dimensionality," where independent noise scales with the number of input features.
    **The Consequence:** High-magnitude independent noise completely destroys the multivariate correlations, drastically increasing false negatives.
  napkin_math: |
    * Total privacy budget: ε=5
    * Input LDP across 5 features: ε=1 per feature, Δf=1.
    * Feature Laplace scale b: 1/1 = 1.0. Noise variance per feature = 2.
    * Total noise variance on 5-dim vector: 5 * 2 = 10.
    * Output Central DP on 1-dim anomaly score: Δf=1, full budget ε=5.
    * Output Laplace scale b: 1/5 = 0.2. Noise variance = 2 * (0.2)² = 0.08.
    * **Output DP reduces noise variance by 125x (10 vs 0.08), restoring the model's signal.**
