title: On-Device Fairness Audit Calculation for Hailo-8
scenario: You are deploying a smart intersection pedestrian model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W). To comply with city regulations, the system streams 260,000 stored daily frames from host memory to perform an on-device fairness audit. Group A has 2,000 positive detections out of 10,000 total samples. Group B has 75,000 positive detections out of 250,000 total samples. The INT8 model requires 50 GOPS per frame.
question: What are the exact Demographic Parity Difference and theoretical minimum audit processing time on the Hailo-8?
details:
  realistic_solution: First, calculate the selection rate for both groups to find the Demographic Parity Difference, which is the absolute difference between the rates. Then, to find the processing time, calculate the total GOPS required for the entire audit dataset and divide it by the accelerator's peak capacity (26 TOPS) converted to GOPS. Because the Hailo-8 has no local DRAM, you must assume host memory streaming can saturate the dataflow architecture.
  common_mistake: |
    **The Pitfall:** Confusing Demographic Parity with Equal Opportunity, and failing TOPS to GOPS conversion.
    **The Rationale:** Candidates often use true positive rates instead of raw selection rates, and forget that 1 TOPS = 1,000 GOPS.
    **The Consequence:** This results in incorrect fairness metrics and incorrect audit processing time estimates.
  napkin_math: |
    1. Selection Rate Group A = 2,000 / 10,000 = 0.20.
    2. Selection Rate Group B = 75,000 / 250,000 = 0.30.
    3. Demographic Parity Difference (DPD) = |0.20 - 0.30| = 0.10.
    4. Total compute = 260,000 frames × 50 GOPS/frame = 13,000,000 GOPS.
    5. Hailo-8 capacity = 26 TOPS = 26,000 GOPS.
    6. **Time = 13,000,000 GOPS / 26,000 GOPS/s = 500 seconds.**
