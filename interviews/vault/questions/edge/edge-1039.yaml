title: 'Dataset Curation: Realize Training Data Pipeline for Edge Model Refresh'
scenario: You are designing an end-to-end data pipeline for a monthly model refresh across 1,000 edge devices. Each device collects 1,000 curated images/month. The data must be aggregated, deduplicated, labeled, and used for centralized fine-tuning on 8 cloud GPUs.
question: How would you design the monthly model refresh pipeline from edge collection to cloud fine-tuning?
details:
  realistic_solution: 'Week 1: collect + upload (1M images). Week 2: dedup + quality filter → 600K unique. Active learning selects 50K for labeling. Week 3: labeling (50K × $0.50 = $25K). Week 4: fine-tune on 8 H100s + deploy.'
  common_mistake: |
    **The Pitfall:** Not accounting for full pipeline latency or global deduplication overhead.
    **The Rationale:** Candidates often assume data simply arrives ready to train and forget about network upload times, or they assume deduplication happens locally on each device.
    **The Consequence:** The pipeline estimate misses major delays like cross-device global index building and labeling turnaround times.
  napkin_math: |
    1. 1,000 devices × 1,000 images × 310KB = 310GB monthly upload.
    2. At 100Mbps per device LTE: 310KB × 1,000 / (100Mbps/8) = 24.8 seconds upload per device per month — fine.
    3. Dedup: 1M images, perceptual hash: 1M × 0.5ms = 500 seconds CPU. Quality filter: blur + entropy in 1,000 seconds.
    4. Labeling: 50K × $0.50 = $25,000.
    5. Fine-tuning: 600K images × 5 epochs on 8 H100s (batch=512, 85ms/step): 600K × 5 / 512 = 5,859 steps × 0.085s = 498 seconds ≈ 8.3 minutes.
    6. **Total pipeline duration: ~7 days including labeling turnaround.**
