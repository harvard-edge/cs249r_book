title: 'Edge Queueing Theory Evaluation: Static vs Dynamic Batching on Jetson Orin'
scenario: 'An edge Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) receives λ=40 inference requests/s with
  Poisson arrivals. Compare static batching (batch=8, wait up to 200ms to fill) vs dynamic batching (batch=1
  to 8, dispatch when batch full or 20ms timeout). Model: 10ms at batch=1, 14ms at batch=8. Analyze the
  latency-throughput tradeoff using M/G/1.'
details:
  realistic_solution: 'Static batching at λ=40/s: mean time to fill batch=8 = 8/40 = 200ms wait. Service
    = 14ms. Mean W = 100ms (uniform wait in [0,200ms]) + 14ms = 114ms. At λ=5: wait = 8/5 = 1600ms — catastrophic.
    Dynamic (20ms timeout): at λ=40, mean batch = min(λ*0.02, 8) = min(0.8, 8) = 0.8 ≈ 1. Service ≈ 10ms.
    Mean timeout wait = 10ms. W = 10+10 = 20ms. Much better at λ=40 with sparse arrivals. Dynamic wins
    for Jetson edge deployment.'
  common_mistake: Assuming static batching always wins on throughput without accounting for the batch
    wait time adding to mean latency, especially at low load where batches rarely fill.
  napkin_math: 'Static batch=8, λ=40: fill time = 8/40 = 0.2s = 200ms. Mean wait = 100ms. Service = 14ms.
    W = 114ms. P99 ≈ 200+14 = 214ms. Dynamic (20ms timeout), λ=40: mean inter-arrival = 25ms. Batch fills
    in min(20ms, fill_time). At λ=40: expected batch size = 40*0.02 = 0.8 items per 20ms window. Service
    = 10ms. W = 20ms timeout + 10ms service = 30ms. P99 ≈ 20+10+tail = 60ms. Dynamic is 3.5x better P99.
    At λ=400/s: static fills in 20ms, same as dynamic → similar W. Dynamic always as good or better.'
