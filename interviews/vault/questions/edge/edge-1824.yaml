title: Real-Time Sensor Ingestion Pipeline for Jetson Orin
scenario: A Jetson Orin processes four 4K camera feeds and LiDAR within a strict 30ms latency budget.
question: How would you design the camera and LiDAR ingestion pipeline on Jetson Orin to meet a 30ms latency budget?
details:
  realistic_solution: Bypass standard user-space copies using zero-copy memory (NVIDIA Argus to NVMM) so camera frames route directly to GPU/DLA memory. LiDAR UDP packets should process via a pinned CPU core using a lightweight ring buffer.
  common_mistake: |
    **The Pitfall:** Designing a cloud-style Kafka or gRPC pipeline on an embedded shared-memory architecture.
    **The Rationale:** Engineers port enterprise data ingestion tools directly to the edge, ignoring memory bus limitations.
    **The Consequence:** Unnecessary memory copying starves the GPU of bandwidth, blowing the 30ms real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4x 4K cameras at 30 FPS.
    - Memory bus = 204 GB/s.
    - Target budget = 30ms.

    **Calculations:**
    - Raw Ingestion = 4 * 3840 * 2160 * 3 bytes * 30 FPS = 2.98 GB/s.
    - Naive copy (Kernel -> User -> GPU) = 3 * 2.98 GB/s = ~9 GB/s.
    - Zero-copy = 1 * 2.98 GB/s = ~3 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~6 GB/s bandwidth saved (Memory-Bandwidth-Bound (Alleviated))**. Zero-copy buffers prevent CPU starvation and preserve memory bandwidth for the 275 TOPS GPU.
