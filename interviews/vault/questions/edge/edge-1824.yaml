title: Real-Time Sensor Ingestion Pipeline for Jetson Orin
scenario: You are designing a real-time autonomous navigation system deployed on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere GPU + DLA, 60W TDP). The system must ingest high-resolution camera feeds and LiDAR point clouds simultaneously while maintaining a strict 30ms latency budget.
question: How would you design the camera and LiDAR ingestion pipeline on Jetson Orin to meet a 30ms latency budget?
details:
  realistic_solution: The optimal design bypasses standard user-space copies using zero-copy memory (NVIDIA Argus to NVMM) so camera frames route directly to GPU/DLA memory. LiDAR UDP packets should be processed via a dedicated CPU thread pinned to a specific core using a lightweight ring buffer. Deep learning feature extraction should offload to the DLA, reserving the 275 TOPS GPU purely for the fused perception model.
  common_mistake: |
    **The Pitfall:** Designing a cloud-style Kafka or gRPC pipeline on an embedded shared-memory architecture.
    **The Rationale:** Engineers port enterprise data ingestion tools directly to the edge, ignoring memory bus limitations.
    **The Consequence:** Unnecessary memory copying starves the GPU of bandwidth, blowing the 30ms real-time deadline.
  napkin_math: |
    - **Raw Ingestion Rate:** 4× 4K cameras at 30 FPS = 4 * 3840 * 2160 * 3 bytes * 30 FPS = 2.98 GB/s.
    - **Naive Pipeline Cost:** Copying data 3 times (kernel to user to GPU) consumes ~9 GB/s of the ~204 GB/s theoretical bandwidth.
    - **Final Result:** **Zero-copy buffers reduce ingestion memory traffic from ~9 GB/s down to ~3 GB/s, preserving critical bandwidth required to feed the 275 TOPS GPU without stalling.**
