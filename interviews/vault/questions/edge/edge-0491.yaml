title: The Autonomous Driving Perception Stall (edge-0491)
scenario: You are an ML Systems Engineer on an autonomous driving team. You're tasked with deploying a
  new object detection model on a production vehicle's NVIDIA Jetson AGX Orin, which is configured for
  a 60W power profile. Profiling a single inference reveals the model executes 5 Trillion INT8 operations
  and requires reading/writing a total of 8 GB of data (parameters and activations). Despite the Orin's
  impressive peak performance, the model is failing to meet its 30 FPS target. Using roofline analysis,
  diagnose the primary performance bottleneck.
question: "Using roofline analysis, is the 5 trillion-op, 8 GB object detector on the 60W Orin compute-bound or memory-bound?"
details:
  realistic_solution: The model is memory-bound. To determine this, we calculate the model's Arithmetic
    Intensity (AI) and compare it to the hardware's ridge point. The Jetson AGX Orin has a peak INT8 performance
    of 275 TOPS and a memory bandwidth of 204.8 GB/s. Its ridge point is therefore ~1342 Ops/Byte (275e12
    / 204.8e9).
  common_mistake: Focusing solely on peak TOPS and ignoring memory bandwidth. Engineers often assume 'more
    TOPS is better' without realizing that if a model can't feed the compute units, those TOPS are useless.
    They misdiagnose the problem as needing a more powerful chip (more TOPS) when the real solution is
    model optimization to improve data locality or reduce memory movement (e.g., operator fusion, changing
    layer structure).
  napkin_math: 'Orin peak INT8 compute = 275 TOPS. Memory bandwidth = 204.8 GB/s. Hardware ridge point
    = 275e12 / 204.8e9 = 1342 Ops/Byte. Model executes 5000 GigaOps and moves 8 GB of data, yielding an
    Arithmetic Intensity (AI) of 625 Ops/Byte. Since 625 < 1342, the model is definitively memory-bound.
    Time = 8 GB / 204.8 GB/s = 39.06 ms.'
  options:
  - The model is compute-bound. The 275 TOPS of the Orin is not enough for the model's complexity.
  - The issue is thermal throttling. The model's 5 T-Ops per inference is too power-hungry for the 60W
    TDP, and the system is slowing down.
  - The model is memory-bound. Its arithmetic intensity (625 Ops/Byte) is below the Jetson's ridge point
    (~1342 Ops/Byte).
  - The model is compute-bound. Its arithmetic intensity of 625 Ops/Byte is very high, saturating the
    GPU's compute units.
  correct_index: 2
