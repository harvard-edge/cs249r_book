title: Quantization Bias in TPU Guardrails
scenario: 'Your team deployed a toxicity detection guardrail model on a Google Coral Edge TPU. The original FP32 model evaluated at 95% accuracy across all demographics. However, the deployed INT8 model exhibits a severe fairness regression: false positive rates for minority dialects spiked from 2% to 18%, while standard English remained at 2%.'
question: Why did deploying the toxicity guardrail on Coral cause a minority-dialect fairness failure, and what latency and energy costs come with CPU FP32?
details:
  realistic_solution: The mandatory INT8 post-training quantization on the Coral Edge TPU inherently compressed granular activation vectors, disproportionately degrading the subtle decision boundaries isolating underrepresented linguistic features. Reverting to the host CPU guarantees FP32 precision retrieval, but physically destroys the 2W/4 TOPS acceleration advantage, violating edge latency boundaries.
  common_mistake: |
    **The Pitfall:** Ignoring precision-collapse and attributing fairness regressions exclusively to raw data bias.
    **The Rationale:** Candidates reflexively prescribe "more data" without analyzing how hardware quantization mechanics alter vector representations.
    **The Consequence:** Teams squander months labeling data when the fundamental failure stems from the edge deployment compilation.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU (INT8): 4000 inf/sec (0.25 ms/inf), 2W peak.
    - CPU (FP32): 10 inf/sec (100 ms/inf), 5W peak.

    **Calculations:**
    - TPU Energy: 2W / 4000 = 0.5 mJ per inference.
    - CPU Energy: 5W / 10 = 500 mJ per inference.
    - Latency Delta: 100 ms / 0.25 ms = 400x slower.

    **Conclusion & Interpretation:**
    - **Result: 400x Latency, 1000x Energy (Fatal Tradeoff)**. Escaping INT8 bias on the CPU incurs a lethal 400x latency and 1000x energy tax, bricking the edge architecture.
