title: Quantization Bias in TPU Guardrails
scenario: 'Your team deployed a toxicity detection guardrail model on a Google Coral
  Edge TPU (4 TOPS INT8, 2W). The original FP32 model evaluated at 95% accuracy across
  all demographics. However, the deployed INT8 model exhibits a severe fairness regression:
  false positive rates for minority dialects spiked from 2% to 18%, while standard
  English remained at 2%. Explain why this specific hardware deployment caused this
  fairness failure and analyze the tradeoffs of moving the guardrail execution to
  the host CPU.'
question: Why did deploying the toxicity guardrail on Coral cause a minority-dialect
  fairness failure, and what latency and energy costs come with CPU FP32?
details:
  realistic_solution: The INT8 quantization required by the Coral Edge TPU causes
    a loss of precision that disproportionately degrades the decision boundaries for
    minority dialects, leading to the spike in false positives. The tradeoff for moving
    to the host CPU is recovering FP32 precision and fairness, but sacrificing the
    4 TOPS acceleration. This would drastically increase latency and power consumption
    beyond the 2W budget, likely making the real-time guardrail unfeasible for the
    edge device.
  common_mistake: Candidates often assume the training data was inherently biased
    and overlook the specific impact of hardware constraints. They might suggest simply
    retraining the model or adding more data, failing to analyze how the Coral TPU's
    strict requirement for INT8 quantization causes representation collapse for underrepresented
    subgroups.
  napkin_math: 'For a 1 GOP guardrail model: The Coral TPU (4 TOPS INT8) achieves
    4000 inferences/sec (0.25 ms latency) at a 2W power budget, consuming 0.5 mJ per
    inference (2W / 4000). If moved to a typical host CPU (e.g., 10 GFLOPS at 5W)
    to run the FP32 model and restore fairness, throughput drops to 10 inferences/sec
    (100 ms latency). Energy per inference jumps to 500 mJ (5W * 0.1s). Recovering
    fairness therefore incurs a 400x latency penalty and a 1000x energy increase.'
