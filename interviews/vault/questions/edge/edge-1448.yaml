title: Quantization Bias in TPU Guardrails
scenario: Your team deployed a toxicity detection guardrail model on a Google Coral Edge TPU (4 TOPS INT8, 2W). The original FP32 model evaluated at 95% accuracy across all demographics. However, the deployed INT8 model exhibits a severe fairness regression: false positive rates for minority dialects spiked from 2% to 18%, while standard English remained at 2%.
question: Why did deploying the toxicity guardrail on Coral cause a minority-dialect fairness failure, and what latency and energy costs come with CPU FP32?
details:
  realistic_solution: The INT8 quantization required by the Coral Edge TPU causes a loss of precision that disproportionately degrades the decision boundaries for minority dialects, leading to the spike in false positives. The tradeoff for moving to the host CPU is recovering FP32 precision and fairness, but sacrificing the 4 TOPS acceleration. This would drastically increase latency and power consumption beyond the 2W budget, likely making the real-time guardrail unfeasible for the edge device.
  common_mistake: |
    **The Pitfall:** Assuming the training data was inherently biased and overlooking hardware constraints.
    **The Rationale:** Candidates might suggest retraining or adding data, not realizing that INT8 quantization causes representation collapse for underrepresented subgroups.
    **The Consequence:** Time is wasted on data collection instead of addressing the precision loss caused by the Edge TPU.
  napkin_math: |
    - **TPU (INT8) Performance:** 4000 inferences/sec (0.25 ms latency) at 2W. Energy = 2W / 4000 = **0.5 mJ per inference**.
    - **CPU (FP32) Performance:** 10 inferences/sec (100 ms latency) at 5W. Energy = 5W * 0.1s = **500 mJ per inference**.
    - **Cost of Fairness:** Recovering fairness on CPU incurs a **400x latency penalty** and a **1000x energy increase**.
