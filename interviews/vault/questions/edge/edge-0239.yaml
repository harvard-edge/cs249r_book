title: The Fusion Dividend
scenario: 'You''re optimizing a CNN-based perception model for an autonomous vehicle''s embedded Jetson AGX Orin. The profiler shows that you''re heavily memory-bandwidth bound, with significant time spent on DRAM access between sequential layers like `Conv2d`, `BatchNorm`, and `ReLU`.'
question: "What is the primary purpose of applying operator fusion in this context?"
details:
  realistic_solution: 'The primary purpose of operator fusion is to reduce memory bandwidth consumption and latency. It combines multiple sequential operations (e.g., Conv -> BatchNorm -> ReLU) into a single kernel. This avoids writing intermediate results to and from the much slower main memory (LPDDR5 on the Jetson), keeping the data in fast on-chip registers or L1 cache between the fused operations.'
  common_mistake: |
    **The Pitfall:** Confusing operator fusion with pruning or quantization.
    **The Rationale:** Engineers often assume optimization always means reducing the amount of computation (FLOPs), forgetting that fusion's main benefit is reducing the *cost of moving data* between computations.
    **The Consequence:** Misdiagnosing bottlenecks and applying the wrong optimization techniques for memory-bound workloads.
  napkin_math: |
    * On an edge device like the Jetson, an access to LPDDR5 DRAM costs ~100 ns.
    * An on-chip L1 cache access is ~1 ns.
    * A non-fused `Conv -> ReLU` sequence must write the intermediate activation map to DRAM and then read it back, incurring a latency penalty of at least **~200 ns** per data element.
    * A fused kernel eliminates this roundtrip entirely, saving millions of slow memory accesses.
  options:
  - To decrease the model's parameter count and memory footprint on disk.
  - To combine sequential operations into a single kernel, reducing DRAM traffic and latency.
  - To increase the model's arithmetic complexity (FLOPs) to achieve higher accuracy.
  - To simplify the model's Python code by abstracting multiple layers into a single function call for readability.
  correct_index: 1
