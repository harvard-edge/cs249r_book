title: 'Fluency: explain MobileNet width multiplier for resource-constrained edge deployment'
scenario: A hardware engineer on your team is deploying a custom product detector on Hailo-8 (26 TOPS,
  2.5W). They ask what a 'width multiplier of 0.5' means for MobileNetV3 and how to choose the right value
  given the Hailo-8's compute budget. Explain width multiplier, its effect on FLOPs and accuracy, and
  how to select it for the 2.5W thermal envelope.
details:
  realistic_solution: 'Width multiplier α: all channel counts in MobileNetV3 are scaled by α. FLOPs scale
    as α² (both Cin and Cout scale). At α=0.5: FLOPs = 0.22G × 0.25 = 0.055 GFLOPs, accuracy ~67.5% top-1.
    At α=0.75: 0.22G × 0.5625 = 0.124 GFLOPs, ~73.3% top-1. Hailo-8 at 2.5W: designed for ~10 TOPS sustained
    for vision CNN. 0.055 GFLOPs at 30 FPS = 0.055G × 30 = 1.65 GOPS — far below 26 TOPS. Power won''t
    be the constraint; use accuracy to guide α choice. α=0.75 recommended for best accuracy within safe
    thermal margin.'
  common_mistake: Treating width multiplier as a linear scaler on FLOPs, not quadratic; choosing width
    multiplier purely based on TOPS utilization without checking that the Hailo-8 dataflow compiler can
    efficiently schedule the resulting channel counts (Hailo-8 prefers channel counts divisible by 4 or
    8 for efficient mapping).
  napkin_math: 'Hailo-8 thermal: 2.5W TDP. CNN inference power consumption for MobileNetV3: Hailo-8 reports
    ~0.3W for 30 FPS MobileNetV3-Large. At α=0.5: 0.25× compute → ~0.075W active inference. Headroom:
    2.5 - 0.075 = 2.425W available for other tasks (preprocessing, IO, system). Width multiplier selection
    rule: use α that fills ~20% of available TOPS at target FPS to leave headroom for burst. 20% of 26
    TOPS = 5.2 TOPS headroom. 0.22G × 30 FPS = 6.6 GOPS < 5.2 TOPS → even MobileNetV3-Large 1.0× fits
    comfortably.'
