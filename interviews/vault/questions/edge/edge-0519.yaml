title: The Fleet vs. Federated TCO Dilemma
scenario: You are the Staff ML Systems Engineer for an autonomous vehicle company evaluating two strategies for improving a perception model that detects rare 'occluded pedestrian' events. Strategy A relies on Centralized Video Uploads. Strategy B uses Federated Learning. The finance department is questioning the projected cellular data costs for this new continuous learning feature.
question: How do the annual data-transfer costs of centralized video upload and federated learning compare for a fleet of 10,000 vehicles?
details:
  realistic_solution: The correct approach is to quantify the Total Cost of Ownership (TCO) for the data transmission of both strategies. By calculating the annual data egress, it becomes clear that the federated strategy is dramatically cheaper and carries significantly lower privacy risks by avoiding the transfer of raw environmental data.
  common_mistake: |
    **The Pitfall:** Focusing only on model quality and ignoring scale multipliers for data costs.
    **The Rationale:** Engineers underestimate how quickly a small per-device cost explodes into a massive operational expenditure when scaled to 10,000 vehicles.
    **The Consequence:** Proposing a centralized data-ingestion pipeline that the business cannot afford to operate.
  napkin_math: |
    *   **Strategy A (Centralized Video Upload):**
    *   Upload volume: 10,000 vehicles × 0.75 GB/day × 365 days = 2,737,500 GB.
    *   Annual cost at $0.10/GB: **~$273,750/year**.
    *   **Strategy B (Federated Learning):**
    *   Gradient volume: 10,000 vehicles × 0.02 GB/day × 365 days = 73,000 GB.
    *   Annual cost at $0.10/GB: **$7,300/year**.
    *   **Result:** Federated Learning is roughly **40x cheaper** for data transmission.
  options:
  - Centralized Learning. The annual cost is only about $27,000, a reasonable price for the high-quality raw data needed for debugging.
  - Centralized Learning. The on-device compute required for Federated Learning would add significant thermal load and power consumption, outweighing any data cost savings.
  - Federated Learning. The annual data cost is ~$7,300 versus ~$274k for the centralized approach, making it ~40x cheaper while protecting user privacy.
  - Federated Learning is not viable. Uploading a 1 MB gradient file over a cellular network will introduce too much latency and miss the vehicle's real-time processing deadlines.
  correct_index: 2
