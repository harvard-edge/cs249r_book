title: 'The Federated Fleet TCO: Federated Learning'
scenario: You are evaluating two model update strategies for a fleet of 10,000 autonomous vehicles. Each vehicle generates approximately 1 GB of sensor data per day. The cellular data plan costs $2.00 per GB.
question: For 10,000 vehicles, what are the daily and annual cellular costs of uploading 1 GB raw data versus 10 MB FL updates at $2/GB?
details:
  realistic_solution: By executing a basic Total Cost of Ownership (TCO) calculation, we see that centralized raw data ingestion is economically unviable at fleet scale. Federated Learning (FL) flips the paradigm by pushing the compute to the edge (on-vehicle GPU/NPU) and only transmitting highly compressed, aggregated gradient updates (e.g., 10 MB) over the cellular network, slashing OpEx by orders of magnitude while preserving data privacy.
  common_mistake: |
    **The Pitfall:** Ignoring the scaling economics of cellular data transmission when architecting ML telemetry pipelines.
    **The Rationale:** ML engineers typically design pipelines in cloud-native environments where ingress bandwidth is cheap or free, failing to account for metered LTE/5G costs.
    **The Consequence:** The centralized architecture incurs a multi-million dollar annual OpEx bill that destroys the unit economics of the autonomous vehicle fleet.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 10,000 vehicles.
       - Centralized approach: 1 GB raw data / vehicle / day.
       - Federated approach: 10 MB (0.01 GB) gradient update / vehicle / day.
       - Cellular cost: $2.00 / GB.
    2. **Calculations:**
       - Centralized Daily Cost = 10,000 * 1 GB * $2.00 = $20,000 / day.
       - Centralized Annual Cost = $20,000 * 365 = $7,300,000.
       - Federated Daily Cost = 10,000 * 0.01 GB * $2.00 = $200 / day.
       - Federated Annual Cost = $200 * 365 = $73,000.
    3. **Conclusion & Interpretation:**
       - **Result: FL saves $7.22M per year. The centralized pipeline is economically Network-Cost-Bound, justifying the engineering overhead of Federated Learning.**
  options:
  - 'Centralized: $20,000/day, Federated: $20,000/day. The model update is likely the same size as the raw data.'
  - 'Centralized: $2/day, Federated: $0.02/day. The costs are negligible.'
  - 'Centralized: $20,000/day, Federated: ~$200/day. Federated is ~100x cheaper.'
  - 'Centralized: $200,000/day, Federated: $2,000/day. Both are too expensive.'
