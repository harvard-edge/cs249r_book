title: 'The Federated Fleet TCO: Federated Learning'
scenario: You are evaluating two model update strategies for a fleet of 10,000 autonomous vehicles. Each
  vehicle generates approximately 1 GB of sensor data per day for a driver drowsiness model. The cellular
  data plan costs $2.00 per GB.
details:
  realistic_solution: The core of the problem is a simple unit conversion and multiplication, but at a
    scale that makes the economic trade-off stark. The centralized approach is 100x more expensive in
    terms of data transfer costs, which is a massive difference in total cost of ownership (TCO) over
    the lifetime of the fleet.
  common_mistake: Engineers, especially those focused only on model performance, often underestimate or
    completely ignore the operational expenditure (OpEx) of data transmission. A common error is to calculate
    the cost for a single device but forget to scale it to the entire fleet, or to incorrectly assume
    the model update in the federated approach is negligibly small without quantifying it. This misses
    the primary economic driver for federated learning at scale.
  napkin_math: '**Strategy A — Centralized (upload raw data):**

    1. Total Data Volume: 10,000 vehicles × 1 GB/vehicle/day = 10,000 GB/day

    2. Daily Cost: 10,000 GB × $2.00/GB = **$20,000/day**

    3. Annual Cost: $20,000 × 365 = **$7,300,000/year**


    **Strategy B — Federated Learning (upload model gradients only):**

    Assume each vehicle uploads a 10 MB gradient update instead of 1 GB raw data.

    1. Total Data Volume: 10,000 vehicles × 0.01 GB/vehicle/day = 100 GB/day

    2. Daily Cost: 100 GB × $2.00/GB = **$200/day**

    3. Annual Cost: $200 × 365 = **$73,000/year**


    **Comparison:**

    - Centralized: $7.3M/year

    - Federated: $73K/year

    - Savings: **$7.23M/year** (a 100× reduction in data transmission costs)


    The federated approach reduces data transfer costs by two orders of magnitude while keeping sensitive
    sensor data on-device.'
  options:
  - 'Centralized: $20,000/day, Federated: $20,000/day. The model update is likely the same size as the
    raw data.'
  - 'Centralized: $2/day, Federated: $0.02/day. The costs are negligible.'
  - 'Centralized: $20,000/day, Federated: ~$200/day. Federated is ~100x cheaper.'
  - 'Centralized: $200,000/day, Federated: $2,000/day. Both are too expensive.'
  correct_index: 2
