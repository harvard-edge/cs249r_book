title: 'The Federated Fleet TCO: Federated Learning'
scenario: You are evaluating two model update strategies for a fleet of 10,000 autonomous vehicles. Each vehicle generates approximately 1 GB of sensor data per day for a driver drowsiness model. The cellular data plan costs $2.00 per GB.
question: For 10,000 vehicles, what are the daily and annual cellular costs of uploading 1 GB raw data versus 10 MB FL updates at $2/GB?
details:
  realistic_solution: The core of the problem is a simple unit conversion and multiplication, but at a scale that makes the economic trade-off stark. The centralized approach is 100x more expensive in terms of data transfer costs, which is a massive difference in total cost of ownership (TCO) over the lifetime of the fleet.
  common_mistake: |
    **The Pitfall:** Underestimating or ignoring the operational expenditure (OpEx) of data transmission at scale.
    **The Rationale:** Engineers focused solely on model performance often calculate the cost for a single device but forget to scale it to the entire fleet.
    **The Consequence:** The team chooses a centralized data collection strategy that becomes economically ruinous over the lifetime of the fleet, missing the primary financial driver for Federated Learning.
  napkin_math: |
    1. Calculate Strategy A (Centralized, upload 1 GB raw data):
       - Total Data Volume: 10,000 vehicles * 1 GB/day = 10,000 GB/day.
       - Daily Cost: 10,000 GB * $2.00/GB = $20,000/day.
       - Annual Cost: $20,000 * 365 = $7,300,000/year.
    2. Calculate Strategy B (Federated Learning, upload 10 MB gradient update):
       - Total Data Volume: 10,000 vehicles * 0.01 GB/day = 100 GB/day.
       - Daily Cost: 100 GB * $2.00/GB = $200/day.
       - Annual Cost: $200 * 365 = $73,000/year.
    **The federated approach saves $7.23M/year, representing a 100x reduction in data transmission costs.**
  options:
  - 'Centralized: $20,000/day, Federated: $20,000/day. The model update is likely the same size as the raw data.'
  - 'Centralized: $2/day, Federated: $0.02/day. The costs are negligible.'
  - 'Centralized: $20,000/day, Federated: ~$200/day. Federated is ~100x cheaper.'
  - 'Centralized: $200,000/day, Federated: $2,000/day. Both are too expensive.'
  correct_index: 2
