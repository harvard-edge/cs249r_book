title: The Gradual Rollout Guru
scenario: Your team has developed a new, improved version of an object detection model for your fleet
  of smart home security cameras. Before a full fleet rollout, you want to test its real-world performance
  on a small, controlled group of devices (e.g., 5% of your fleet) for a week. How would you design the
  system to enable this A/B testing, ensuring a smooth rollout and easy rollback if issues arise?
question: "How would you design the system to enable this A/B testing, ensuring a smooth rollout and easy rollback if issues arise?"
details:
  realistic_solution: "Implement a controlled, feature-flag-driven rollout strategy:\n  1.  **Model Versioning:**\
    \ Each model artifact (e.g., `model_v1.0`, `model_v1.1`) is uniquely versioned and stored in a central\
    \ model registry.\n  2.  **Device Grouping/Segmentation:**\n      *   **Random Assignment:** Assign\
    \ a persistent, random hash to each device (e.g., based on device ID). Use this hash to assign devices\
    \ to A or B groups (e.g., hash % 100 < 5 for B group).\n      *   **Targeted Assignment:** For specific\
    \ tests, assign devices based on criteria like geographical location, hardware type, or user opt-in.\n\
    \  3.  **Feature Flag Management System:**\n      *   **Centralized Control:** Use a cloud-based feature\
    \ flag service (or a custom solution) that allows dynamic configuration of which model version each\
    \ device group should run.\n      *   **Local Caching:** Devices periodically fetch and cache these\
    \ feature flags. If connectivity is lost, they use the last known configuration.\n  4.  **On-Device\
    \ Model Selection:**\n      *   Devices download and store both the A (baseline) and B (new) model\
    \ versions.\n      *   Based on the received feature flag, the device's inference engine loads and\
    \ uses the appropriate model version.\n      *   This allows for instant switching between versions\
    \ without re-downloading.\n  5.  **Telemetry & Monitoring:**\n      *   Collect device-level metrics\
    \ for both A and B groups (inference latency, accuracy, error rates, resource usage, user feedback).\n\
    \      *   Tag all telemetry data with the active model version (`model_v1.0` vs `model_v1.1`) for\
    \ easy comparison in cloud dashboards.\n      *   Monitor for significant deviations or regressions\
    \ in the B group.\n  6.  **Rollback:** If issues are detected in the B group, simply update the feature\
    \ flag in the cloud to point all devices (including the B group) back to `model_v1.0`. Devices will\
    \ switch to the baseline model upon next configuration sync."
  common_mistake: '"Just deploy the new model to 5% of devices randomly." This lacks control over distribution,
    monitoring, and easy rollback. It also doesn''t consider how to select the 5% intelligently.'
  napkin_math: 'Baseline p1 = 0.90, Target p2 = 0.91. Using standard A/B test formula for 80% power, 95%
    conf: N = 16 * p*(1-p) / (p1-p2)^2. p = 0.905. N = 16 * 0.905 * 0.095 / (0.01)^2 = 13,756 inferences.
    If a camera sees 50 events/day, it takes 13,756 / 50 = 275 days for one camera, or 5 days across 55
    test cameras.'
