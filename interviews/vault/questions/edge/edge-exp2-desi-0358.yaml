title: Sub-4-bit Weight Streaming Architecture for Hailo-8
scenario: Your team is deploying a heavy vision transformer to a Hailo-8 edge accelerator (26 TOPS INT8,
  2.5W) for real-time drone surveillance. The Hailo-8 utilizes a dataflow architecture with no local DRAM,
  meaning all weights and activations must stream continuously from the host system's memory. The model's
  footprint exceeds the host's strict memory and PCIe bandwidth limits if kept in standard INT8. You are
  tasked with designing a system architecture that leverages extreme quantization (sub-4-bit) for weight
  storage on the host, while still efficiently utilizing the Hailo-8's native INT8 compute engine.
details:
  realistic_solution: A robust design stores the model in a 4-bit or 3-bit compressed format on the host
    to meet capacity and bandwidth constraints. A dedicated host-side pipeline using SIMD/NEON instructions
    performs asynchronous, batched dequantization to INT8 into a ring buffer. The DMA controller then
    streams these INT8 weights directly to the Hailo-8. The candidate should evaluate tradeoffs between
    group-wise quantization accuracy recovery and the host-side decompression overhead, ensuring the 26
    TOPS dataflow engine is never starved for data.
  common_mistake: Candidates frequently design a system assuming the Hailo-8 can natively perform mixed-precision
    or 4-bit MAC operations, ignoring its strict INT8 dataflow engine. Alternatively, they propose advanced
    3-bit AWQ but fail to account for the severe CPU latency introduced when the host must dequantize
    weights back to INT8 on-the-fly before streaming them over PCIe.
  napkin_math: 'For an 80M parameter model: INT8 requires 80MB. If host-to-chip PCIe bandwidth is limited
    to 2 GB/s, streaming INT8 for a 30 FPS pipeline requires 80MB * 30 = 2.4 GB/s, which exceeds the limit
    and stalls the 26 TOPS compute. Using 4-bit quantization reduces the footprint to 40MB, dropping bandwidth
    to 1.2 GB/s. The host CPU must dequantize 40MB -> 80MB INT8 per frame at >2.4 GB/s throughput to keep
    the Hailo-8 fully fed within its 2.5W power envelope.'
