title: Applying Zero-Copy Unified Memory Architectures
scenario: An LLM runs on an edge SoC with 32GB of RAM shared between the ARM CPU and integrated GPU.
question: Apply the concept of unified memory to explain why Zero-Copy is advantageous for feeding camera input directly to the GPU.
details:
  realistic_solution: Unified memory means the CPU and GPU physically share the same LPDDR5 RAM. By allocating the camera buffer as Zero-Copy, the CPU writes pixels directly to a memory address the GPU can read, avoiding a redundant bus copy and saving memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming unified memory automatically skips all memory copies.
    **The Rationale:** Believing that because CPU and GPU share the same physical RAM chip, the driver handles zero-copy routing automatically for all tensors.
    **The Consequence:** Writing sub-optimal code that still incurs heavy memory-to-memory staging overhead, completely negating the unified memory advantage.
  napkin_math: |
    * **Standard Allocation**: 1 CPU alloc + 1 GPU alloc + 1 Bus Copy over PCIe/Memory Bus.
    * **Zero-Copy Allocation**: 1 Pinned alloc + 0 Bus Copies.
    * **Bandwidth Saved**: 100% of the host-to-device transfer payload.
