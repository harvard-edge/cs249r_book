title: Applying Zero-Copy Unified Memory Architectures
scenario: An LLM runs on a Jetson AGX Orin with 32GB of LPDDR5 shared between the
  ARM CPU and Ampere GPU.
question: Apply the concept of unified memory to explain why Zero-Copy is advantageous
  for feeding camera input directly to the GPU.
details:
  realistic_solution: Unified memory means the CPU and GPU physically share the same
    LPDDR5 RAM. By allocating the camera buffer as Zero-Copy, the CPU writes pixels
    directly to a memory address the GPU can read, avoiding a redundant bus copy and
    saving memory bandwidth.
  common_mistake: Assuming unified memory automatically skips copies; one must still
    explicitly use zero-copy pinning to avoid host-to-device staging.
  napkin_math: 1 alloc, 0 copies
