title: Optimizing Real-time Edge Inference on Qualcomm Cloud AI 100
scenario: A high-resolution object detection model must be deployed onto a fleet of edge devices powered by Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system requires an average inference latency under 50ms and must handle burst loads of up to 100 detections per second.
question: How would you design a model serving strategy on the Qualcomm Cloud AI 100 to meet the <50ms latency and 100 detections/sec throughput requirements while handling cold starts?
details:
  realistic_solution: 'The solution should focus on: 1) **Model Optimization:** Aggressively
    quantizing the model to INT8 precision using Qualcomm''s AI Engine Direct or similar
    tools to fully utilize the 400 TOPS INT8. 2) **Efficient Model Loading:** Implementing
    memory-mapped model loading and potentially pre-fetching/caching the model into
    LPDDR4x during idle periods or boot, to drastically reduce cold start time. 3)
    **Inference Server:** Developing a lightweight, custom inference runtime (e.g.,
    leveraging ONNX Runtime with Qualcomm''s SNPE/TFLite delegate) optimized for the
    AI 100, managing a pool of inference contexts. 4) **Request Handling:** Utilizing
    a producer-consumer queue pattern for incoming requests, potentially employing
    dynamic or fixed-size batching to maximize throughput without exceeding latency
    budgets. Implementing a robust thread/process pool to manage parallel inferences.
    5) **Resource Management:** Actively monitoring the 32 GB LPDDR4x memory and 75W
    power budget, applying intelligent throttling or dynamic workload adjustment based
    on real-time device telemetry. For intra-device ''autoscaling'', dynamic adjustment
    of batch size or active inference streams based on current load and latency targets
    is crucial.'
  common_mistake: |
    **The Pitfall:** Failing to leverage INT8 quantization or neglecting memory bandwidth.
    **The Rationale:** Candidates treat the edge device like a cloud server, ignoring the specific hardware constraints and quantization requirements.
    **The Consequence:** Failing to meet throughput targets or exceeding the 75W power envelope due to unoptimized execution.
  napkin_math: |
    1. **Power Efficiency**: 400 TOPS / 75W ≈ 5.3 TOPS/W.
    2. **Model Footprint**: FP32 YOLO (100-200MB) quantized to INT8 drops to 25-50MB, easily fitting into 32GB LPDDR4x.
    3. **Theoretical Inferences**: 100 GOPS per INT8 inference -> 400,000 GOPS / 100 = 4,000 inferences/sec theoretical maximum.
    4. **Concurrency requirement**: 50ms latency implies 20 inferences/sec per sequential stream.
    5. **Conclusion**: To hit 100 detections/sec, the system must run **5 parallel inference streams** (5 streams * 20 inf/sec = 100 inf/sec).
