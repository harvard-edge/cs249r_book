title: Optimizing Real-time Edge Inference
scenario: A high-resolution object detection model must be deployed onto a fleet of edge devices powered by accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system requires an average inference latency under 50ms and must handle burst loads of up to 100 detections per second.
question: How would you design a model serving strategy to meet the <50ms latency and 100 detections/sec throughput requirements while handling cold starts?
details:
  realistic_solution: 'The solution should focus on: 1) Model Optimization: Aggressively quantizing the model to INT8 precision. 2) Efficient Model Loading: Implementing memory-mapped model loading and potentially pre-fetching the model into LPDDR4x to drastically reduce cold start time. 3) Inference Server: Developing a lightweight inference runtime optimized for edge handling parallel streams.'
  common_mistake: |
    **The Pitfall:** Failing to leverage INT8 quantization or neglecting memory bandwidth.
    **The Rationale:** Candidates treat the edge device like a cloud server, ignoring the specific hardware constraints and quantization requirements.
    **The Consequence:** Failing to meet throughput targets or exceeding the 75W power envelope due to unoptimized execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target throughput: 100 FPS (detections/sec).
       - Max latency: 50 ms per request.
       - Model INT8 compute cost: 100 GOPS per inference.
       - Hardware limit: 400 TOPS INT8.
    2. **Calculations:**
       - Theoretical max throughput: 400,000 GOPS / 100 GOPS = 4,000 FPS.
       - Required concurrency per stream: 1 request / 50ms = 20 inferences/sec per sequential stream.
       - Required streams: 100 FPS target / 20 inferences/sec/stream = 5 parallel streams.
    3. **Conclusion & Interpretation:**
       - **Result: 5 parallel streams required.** The hardware easily handles the 100 FPS throughput (using only 2.5% of peak TOPS), but meeting the 50ms latency under burst load requires explicit parallel queue management. **System Bottleneck: Compute-Bound (Concurrency)**.
