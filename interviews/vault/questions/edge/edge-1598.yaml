title: Shadow Deployment Bandwidth on Hailo-8
scenario: You run a 30 FPS shadow deployment on a Hailo-8. Each model passes 6 MB inputs, 4 MB weights, and 2 MB outputs via the host PCIe bus.
question: At 30 FPS shadow mode on Hailo-8, what host memory bandwidth is needed for two models each moving 6 MB input, 4 MB weights, and 2 MB outputs?
details:
  realistic_solution: In a true shadow deployment, the production and candidate models run simultaneously. The host bus must continuously stream inputs, weights, and read back outputs for both models concurrently.
  common_mistake: |
    **The Pitfall:** Calculating bandwidth for a single model and forgetting to double it, or assuming weights reside on the accelerator.
    **The Rationale:** Engineers assume standard GPU architectures where weights are loaded into VRAM once, ignoring Hailo-8's DRAM-less dataflow design.
    **The Consequence:** Saturated PCIe buses that cripple the production model's real-time latency during the shadow test.
  napkin_math: |
    1. **Assumptions & Constraints:** Shadow deployment = 2 models running concurrently. Single model I/O = 6 MB + 4 MB + 2 MB = 12 MB/frame. Target = 30 FPS.
    2. **Calculations:** Total I/O per frame = 12 MB * 2 = 24 MB/frame. Total bandwidth = 24 MB/frame * 30 FPS = 720 MB/s.
    3. **Conclusion & Interpretation:** **Result: 720 MB/s host bandwidth required.** Doubling the model execution linearly doubles the interconnect strain. **System Status: PCIe-Bandwidth-Bound.**
