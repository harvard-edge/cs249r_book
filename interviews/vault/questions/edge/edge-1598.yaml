title: Shadow Deployment Bandwidth on Hailo-8
scenario: You are setting up a shadow deployment to evaluate a new INT8 vision model alongside your production model on an edge device equipped with a Hailo-8 accelerator (26 TOPS, 2.5W). Because the Hailo-8 dataflow accelerator has no local DRAM, it streams all data directly from host memory over PCIe. For a single inference pass, a model requires streaming a 6 MB input tensor, 4 MB of weights/intermediates, and writing back 2 MB of output tensors.
question: At 30 FPS shadow mode on Hailo-8, what host memory bandwidth is needed for two models each moving 6 MB input, 4 MB weights, and 2 MB outputs?
details:
  realistic_solution: In a true shadow deployment, the production and candidate models run simultaneously on the same live data. Given the Hailo-8's architecture, the host bus must continuously stream inputs and weights and read back outputs for both models concurrently. The required bandwidth is the sum of all I/O per frame, multiplied by the frame rate and the number of active models.
  common_mistake: |
    **The Pitfall:** Calculating bandwidth for a single model and forgetting to double it, or assuming weights reside on the accelerator.
    **The Rationale:** Engineers assume standard GPU architectures where weights are loaded into VRAM once, ignoring Hailo-8's DRAM-less dataflow design.
    **The Consequence:** Saturated PCIe buses that cripple the production model's real-time latency during the shadow test.
  napkin_math: |
    - **Per-model I/O per frame:** 6 MB (input) + 4 MB (weights) + 2 MB (output) = 12 MB/frame.
    - **Shadow Deployment Requirement:** 2 concurrently running models = 12 MB × 2 = 24 MB/frame total.
    - **Final Result:** **At 30 FPS, the total host memory bandwidth required is 24 MB/frame × 30 FPS = 720 MB/s.**
