title: Edge Telemetry Buffering on NVIDIA Jetson Orin
scenario: You are deploying an NVIDIA Jetson Orin for an autonomous robotics application. To monitor for stragglers, your observability agent captures system health metrics at a rate of 10 Hz. Each telemetry snapshot is 2 KB in size. The edge device loses its network connection for 7 days.
question: At 10 Hz with 2 KB snapshots, how much telemetry accumulates per day and what percent of 32 GB RAM would a 7-day buffer consume?
details:
  realistic_solution: During a network partition, the observability agent should dynamically reduce its sampling rate or aggregate metrics to conserve space. Logs should be flushed to persistent local flash storage rather than buffered in the 32 GB LPDDR5 to prevent starving the critical AI workloads of RAM.
  common_mistake: |
    **The Pitfall:** Buffering massive logs in system RAM during a network partition.
    **The Rationale:** Candidates miscalculate seconds in a day or forget the 10 Hz multiplier, massively underestimating the memory footprint.
    **The Consequence:** Consuming nearly 40% of system memory for logs, which starves critical AI workloads and causes Out-Of-Memory (OOM) failures.
  napkin_math: |
    - **Data per second:** 10 snapshots/sec * 2 KB/snapshot = 20 KB/sec.
    - **Data per day:** 20 KB/sec * 86,400 sec/day = 1,728,000 KB/day = 1.728 GB/day.
    - **7-day buffer size:** 1.728 GB/day * 7 days = 12.096 GB.
    - **Memory consumption:** 12.096 GB / 32 GB = 37.8%.
    - **Final result:** **Buffering telemetry in RAM would consume 37.8% of the total system memory.**
