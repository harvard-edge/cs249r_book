title: Edge Telemetry Buffering on NVIDIA Jetson Orin
scenario: You are deploying an autonomous robotics application. To monitor for stragglers, your observability agent captures system health metrics at a rate of 10 Hz. Each telemetry snapshot is 2 KB in size. The edge device loses its network connection for 7 days.
question: At 10 Hz with 2 KB snapshots, how much telemetry accumulates per day and what percent of 32 GB RAM would a 7-day buffer consume?
details:
  realistic_solution: During a prolonged network partition, the observability agent must dynamically downsample its rate or aggregate metrics to conserve storage. Storing raw logs entirely in system RAM risks starving critical AI workloads; telemetry must be flushed to persistent local flash storage using circular buffers to cap memory usage.
  common_mistake: |
    **The Pitfall:** Buffering massive logs in system RAM during a network partition.
    **The Rationale:** Candidates miscalculate seconds in a day or forget the 10 Hz multiplier, massively underestimating the memory footprint.
    **The Consequence:** Consuming nearly 40% of system memory for logs, which starves critical AI workloads and causes Out-Of-Memory (OOM) failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sampling rate: 10 Hz
       - Snapshot size: 2 KB
       - Partition duration: 7 days
       - Total System RAM: 32 GB
    2. **Calculations:**
       - Data rate: 10 * 2 KB = 20 KB/s
       - Daily data: 20 KB/s * 86,400 s/day = 1,728,000 KB/day ≈ 1.728 GB/day
       - 7-day buffer: 1.728 GB/day * 7 days = 12.096 GB
       - RAM consumption: 12.096 GB / 32 GB ≈ 37.8%
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Risk.** Buffering logs consumes 37.8% of RAM, creating a severe OOM risk for inference workloads.
