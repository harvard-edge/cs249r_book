title: 'Edge Deployment Tradeoffs: Encoder-Decoder Architectures on Jetson Orin'
scenario: You are tasked with deploying a natural language processing (NLP) model for real-time text analysis
  on an NVIDIA Jetson Orin platform. The device has 32 GB LPDDR5 memory, offers 275 TOPS INT8 performance,
  and operates within a 60W power envelope. The core requirement is to perform both text classification
  (understanding input text) and short-form text summarization (generating output text based on input).
  Given these constraints, you need to choose between an encoder-only, decoder-only, or full encoder-decoder
  architecture. Design the system, justifying your architectural choice and considering the impact on
  performance, memory footprint, latency, and power consumption on the Jetson Orin.
question: "Which NLP architecture would you choose on Jetson Orin for both text classification and short summarization, and how would you meet memory, latency, and power limits?"
details:
  realistic_solution: A realistic solution would involve a hybrid approach or careful selection. For text
    classification, a highly optimized and quantized encoder-only model (e.g., a distilled BERT-small
    or MobileBERT) leveraging the INT8 capabilities would be efficient. For short summarization, a small,
    highly compressed decoder-only model or a compact encoder-decoder architecture (e.g., a tiny T5 or
    BART variant) with knowledge distillation and quantization could be used. Alternatively, two separate,
    highly specialized models (one encoder-only for classification, one decoder-only for generation) could
    run sequentially or in parallel if resource scheduling allows, each optimized for its specific task
    and the Orin's hardware. Crucially, leveraging INT8 quantization aggressively for both model weights
    and activations is key to maximizing the Orin's 275 TOPS INT8 performance and minimizing memory bandwidth.
  common_mistake: A common mistake is selecting a large, general-purpose transformer model (e.g., a full
    T5 or GPT-3 equivalent) without significant quantization or architectural pruning, assuming it will
    simply 'fit' on the edge device. This often leads to excessive memory usage, high inference latency,
    and exceeding the power budget, especially for real-time applications, due to overlooking the specific
    constraints of the NVIDIA Jetson Orin's LPDDR5 memory, INT8 TOPS, and limited power.
  napkin_math: 'If a typical FP32 transformer layer uses ~100MB of weights, a 12-layer model (1.2GB) would
    already consume a significant portion of the 32GB LPDDR5, let alone activations. Quantizing to INT8
    reduces this by 4x, making a 1.2GB FP32 model roughly 300MB in INT8. Inference speed: A model requiring
    100 GOPS (Giga Operations Per Second) in FP32 would theoretically need 400 GOPS in INT8 due to 4x
    ops reduction. With 275 TOPS INT8 (275,000 GOPS), a 400 GOPS model would consume a tiny fraction of
    the Orin''s compute capacity (400/275,000 = ~0.15% utilization) per inference, assuming perfect parallelization.
    However, actual latency is dominated by memory bandwidth (LPDDR5) and software overhead. Power consumption
    for a high-utilization model could quickly push against the 60W limit, necessitating careful profiling
    and dynamic frequency scaling (DVFS).'
