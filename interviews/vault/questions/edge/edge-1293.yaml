title: Canary Rollout Latency Spike on Edge TPU
scenario: 'You are overseeing a canary deployment of a new INT8-quantized object detection model to a fleet of remote sensors equipped with Google Coral Edge TPUs (USB form factor). The existing ''Blue'' model processes 30 FPS smoothly. However, telemetry from the ''Green'' canary devices shows a severe symptom: frame rates have plummeted to 12 FPS, and the host devices are reporting critical thermal alerts before crashing. Both models have roughly the same parameter count and successfully passed the Edge TPU compiler.'
question: What is the root cause of this deployment failure?
details:
  realistic_solution: The root cause is an operator in the 'Green' model that is not supported by the Edge TPU's limited INT8 operator set. The compiler partitioned the graph, executing the supported layers on the TPU but delegating the unsupported operation to the host CPU. This fallback causes expensive memory transfers between the TPU and CPU. The host CPU is now running heavy inference computations, driving system power consumption far beyond the expected 2W envelope of the Coral, leading to thermal throttling and crashes.
  common_mistake: |
    **The Pitfall:** Assuming the issue is a pure memory leak or a drastically different architecture.
    **The Rationale:** Candidates often look for standard software bugs or parameter size issues, missing the specific architectural quirk of the Edge TPU compiler.
    **The Consequence:** Failure to identify silent CPU fallback, leaving the underlying performance and thermal bottleneck unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Blue model (Baseline): 30 FPS (33ms latency), 100% TPU execution.
       - Green model (Canary): 95% TPU execution, 5% Host CPU execution due to unsupported operator.
    2. **Calculations:**
       - Green TPU execution time: ~10ms.
       - Green Host CPU execution time (unsupported op): ~60ms.
       - USB data transfer overhead (CPU <-> TPU): ~13ms.
       - Total Green latency: 10ms + 60ms + 13ms = 83ms (~12 FPS).
       - Host CPU power impact: Increases by 4W-6W.
    3. **Conclusion & Interpretation:**
       - **Result: CPU Fallback & Thermal Throttling**. The unsupported operator forces heavy CPU computation and USB I/O, drawing an extra 4W-6W. This exceeds thermal limits and triggers a crash at 12 FPS.
