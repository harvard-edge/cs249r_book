title: Canary Rollout Latency Spike on Edge TPU
scenario: 'You are overseeing a canary deployment of a new INT8-quantized object detection
  model to a fleet of remote sensors equipped with Google Coral Edge TPUs (USB form
  factor). The existing ''Blue'' model processes 30 FPS smoothly well within the power
  budget. However, telemetry from the ''Green'' canary devices shows a severe symptom:
  frame rates have plummeted to 12 FPS, and the host devices are reporting critical
  thermal alerts before crashing. Both models have roughly the same parameter count
  and successfully passed the Edge TPU compiler. What is the root cause of this deployment
  failure?'
question: What is the root cause of this deployment failure?
details:
  realistic_solution: The root cause is an operator in the 'Green' model that is not
    supported by the Edge TPU's limited INT8 operator set. The compiler partitioned
    the graph, executing the supported layers on the TPU but delegating the unsupported
    operation to the host CPU. This fallback causes expensive memory transfers between
    the TPU and CPU. The host CPU is now running heavy inference computations, driving
    system power consumption far beyond the expected 2W envelope of the Coral, leading
    to thermal throttling and crashes.
  common_mistake: Candidates often assume the issue is a pure memory leak or that
    the new model has a drastically different architecture that fundamentally requires
    more than the 4 TOPS available. They miss the architectural quirk of the Edge
    TPU compiler where unsupported operations are silently partitioned and fall back
    to the host CPU.
  napkin_math: 'Blue model: 100% on Coral TPU (4 TOPS, ~2W), latency = 33ms (30 FPS).
    Green model: 95% on TPU, 5% on Host CPU. TPU execution time: ~10ms. Host CPU execution
    time for unsupported op: ~60ms. Data transfer (USB overhead): ~13ms. Total Green
    latency: 10 + 60 + 13 = 83ms (~12 FPS). The host CPU now draws an extra 4W-6W
    instead of being idle, exceeding the system''s strict thermal limits and triggering
    a reboot.'
