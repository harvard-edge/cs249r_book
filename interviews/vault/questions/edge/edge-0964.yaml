title: Edge New 0028
scenario: 'A T4 GPU serves an LLM with a 100ms per-token strict SLA. BS=1 takes 40ms. BS=2 takes 45ms. Each item added to the batch increases latency by 5ms.'
question: 'What maximum continuous batch size on the T4 maximizes LLM throughput without exceeding the 100ms per-token SLA?'
details:
  realistic_solution: 'Continuous (iteration-level) batching adds new requests to the active batch on the fly. To maximize throughput, push the batch size to the mathematical limit where the combined latency remains just under the 100ms SLA, absorbing the marginal penalty per sequence safely.'
  common_mistake: |
    **The Pitfall:** Assuming batching is completely "free" until hitting an OOM error.
    **The Rationale:** Candidates forget the marginal linear increase in memory access time per batch item.
    **The Consequence:** They maximize the batch size strictly based on VRAM, blowing past the strict 100ms latency SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Latency (BS=1): 40ms.
       - Marginal Latency: +5ms per sequence.
       - SLA Constraint: <= 100ms.
    2. **Calculations:**
       - Latency Function: Latency = 40ms + (N - 1) * 5ms.
       - SLA Equation: 40 + 5N - 5 <= 100
       - 35 + 5N <= 100
       - 5N <= 65 -> N = 13.
    3. **Conclusion & Interpretation:**
       - **Max batch size is 13, yielding a maximum throughput of 130 tokens/sec.** (Result: Latency-Bound)
