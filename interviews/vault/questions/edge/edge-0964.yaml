title: Edge New 0028
scenario: 'A T4 GPU serves an LLM with a 100ms per-token strict SLA. BS=1 takes 40ms. BS=2 takes 45ms. Each item added to the batch increases latency by 5ms.'
question: 'What maximum continuous batch size on the T4 maximizes LLM throughput without exceeding the 100ms per-token SLA?'
details:
  realistic_solution: 'Continuous (iteration-level) batching adds new requests to the active batch on the fly. To prevent any single sequence from breaching the 100ms SLA, the combined latency of the largest possible batch must remain under the threshold. The tradeoff heavily favors maximizing the batch up to the mathematical limit, multiplying throughput heavily while safely absorbing the minor 5ms penalty per sequence.'
  common_mistake: |
    **The Pitfall:** Assuming batching is completely "free" until hitting an OOM error.
    **The Rationale:** Candidates forget the marginal linear increase in memory access time per batch item.
    **The Consequence:** They maximize the batch size strictly based on VRAM, blowing past the 100ms strict latency SLA.
  napkin_math: |
    * Latency function: Latency = 40ms + (N - 1) × 5ms.
    * SLA constraint: Latency <= 100ms.
    * Equation: 40 + 5N - 5 <= 100
    * 35 + 5N <= 100
    * 5N <= 65
    * N = 13.
    * **Conclusion: Max batch size is 13, yielding a maximum throughput of 130 tokens/sec.**
