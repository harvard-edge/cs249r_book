title: 'Canary Rollout of INT8 Model on Coral Edge TPU'
scenario: 'You are deploying a new object detection model to a fleet of 5,000 smart cameras powered by Google Coral Edge TPUs. The new model offers better accuracy but requires full INT8 quantization, and some operators had to be rewritten to be supported by the Edge TPU compiler. You need to design a progressive canary rollout strategy that minimizes risk while verifying the new model''s latency (target < 50ms) and accuracy in the field.'
question: 'How do you structure the rollout, and what specific telemetry do you monitor to decide whether to advance or rollback the deployment?'
details:
  realistic_solution: 'Implement a device-level canary rollout (e.g., 1%, 5%, 25%, 100%) based on device cohorts. During the canary, actively monitor Edge TPU utilization and inference latency telemetry to ensure no operations are falling back to the host CPU due to quantization or operator compatibility issues. If latency exceeds the 50ms budget, automatically halt the rollout and initiate a rollback.'
  common_mistake: |
    **The Pitfall:** Suggesting cloud-centric A/B testing like traffic splitting per request or ignoring INT8 strictness.
    **The Rationale:** Candidates fail to adapt web-scale rollout strategies to edge devices running local inference and overlook operator fallback penalties.
    **The Consequence:** Leads to non-functional canary deployments and catastrophic latency spikes as unsupported operators quietly fall back to the host CPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency: < 50ms per frame.
    - Google Coral Edge TPU provides 4 TOPS.
    - New INT8 model requires 150 GOPS.
    - Host CPU provides 10 GOPS.

    **Calculations:**
    - Maximum operations per 50ms frame: 4 TOPS * 0.05s = 200 GOPS.
    - Ideal TPU time: 150 GOPS / 4 TOPS = 37.5ms.
    - If 1% of operations (1.5 GOPS) fall back to CPU: 1.5 GOPS / 10 GOPS = 150ms.
    - Total latency: 37.5ms + 150ms = 187.5ms.

    **Conclusion & Interpretation:**
    - **Result: 187.5ms Latency (Compute-Bound)**. A mere 1% CPU fallback drastically violates the 50ms budget, immediately triggering a rollback.
