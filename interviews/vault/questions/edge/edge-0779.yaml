title: The Canary in the Coal Mine
scenario: You need to deploy a new, potentially risky ML model update to a fleet of 100,000 critical edge
  devices (e.g., medical imaging devices). A full rollout could have severe consequences if the model
  introduces regressions. How do you implement a safe, phased rollout strategy with robust monitoring
  to catch issues early?
question: "How do you implement a safe, phased rollout strategy with robust monitoring to catch issues early?"
details:
  realistic_solution: "Implement a **canary deployment strategy** with granular control and differential\
    \ monitoring:\n  1.  **Define Canary Groups:** Select a very small, statistically representative subset\
    \ of devices (e.g., 0.1% to 1% of the fleet, or 100-1000 devices for a 100k fleet). Ensure this group\
    \ is diverse in terms of hardware, geographic location, and usage patterns to represent the full fleet.\n\
    \  2.  **Automated Rollout to Canary:** Deploy the new model version *only* to this canary group.\
    \ The deployment mechanism should be capable of precise targeting.\n  3.  **Dedicated Differential\
    \ Monitoring:** This is critical. Implement specific monitoring for the canary group, comparing their\
    \ key ML metrics (e.g., inference accuracy, precision, recall, confidence score distribution, latency,\
    \ error rates, resource utilization) against a baseline group running the old model. Look for *statistically\
    \ significant* deviations, not just absolute values. This allows detection of regressions specific\
    \ to the new model.\n  4.  **Automated Rollback Triggers:** Define clear, pre-set thresholds for key\
    \ metrics (e.g., a 2% drop in precision, a 5% increase in error rate, or sustained high latency).\
    \ If any trigger is met, automatically revert the canary group to the previous stable model version.\n\
    \  5.  **Phased Expansion:** If the canary period (e.g., 24-72 hours) is successful with no regressions,\
    \ gradually expand the rollout to larger percentages of the fleet (e.g., 5%, then 25%, then 100%),\
    \ with continued monitoring at each stage.\n  6.  **A/B Testing Framework:** This strategy can be\
    \ extended into an A/B testing framework, where different model versions are run concurrently on similar\
    \ device groups to compare performance and make data-driven deployment decisions."
  common_mistake: '"Deploy to 10% of devices and monitor overall fleet health." This doesn''t isolate
    the canary group''s performance or allow for quick, automated rollback, and fleet-wide metrics can
    mask issues in a small canary group.'
  napkin_math: For a fleet of 100,000 devices, a 0.1% canary group means 100 devices. If a critical bug
    impacts 1% of inferences, and each device performs 1000 inferences/day, the canary group will generate
    1000 errors/day (100 devices * 1000 inferences/day * 0.01 error rate). This is quickly detectable.
    Rolling back 100 devices is trivial compared to rolling back 100,000.
