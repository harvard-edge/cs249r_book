title: The Canary in the Coal Mine
scenario: You must deploy a new, potentially risky ML model update to a fleet of 100,000 critical edge medical imaging devices. A full rollout could have severe consequences if the model introduces regressions.
question: How do you implement a safe, phased rollout strategy with robust monitoring to catch issues early?
details:
  realistic_solution: "Implement a canary deployment strategy with granular control and differential monitoring. Select a very small, statistically representative subset of devices. Implement specific monitoring for this group, comparing key ML metrics against a baseline. Define clear, pre-set thresholds that automatically rollback the canary if breached."
  common_mistake: |
    **The Pitfall:** Deploying to a large, unisolated group (e.g., 10%) and relying solely on global fleet-wide metrics.
    **The Rationale:** Candidates rely on high-level averages without establishing strict, automated rollback thresholds for localized subgroups.
    **The Consequence:** Fleet-wide metrics dilute and mask the errors generated by the canary group, allowing broken models to damage a massive number of critical devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100,000 devices.
    - Inference rate: 1,000 inferences/day per device.
    - Bug failure rate: 1%.
    - Canary size: 0.1%.

    **Calculations:**
    - Canary Devices: 100,000 * 0.001 = 100 devices.
    - Canary Errors per Day: 100 devices * 1,000 inferences * 0.01 failure rate = 1,000 errors/day.

    **Conclusion & Interpretation:**
    - **Result: 1,000 errors/day isolated to 100 devices (Risk-Bound).** Statistically significant signal to trigger rollback safely.
