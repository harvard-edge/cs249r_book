title: The Fleet Heterogeneity Problem
scenario: Your company deployed edge AI cameras over 3 years. The fleet now contains 2,000 devices with Jetson Nano (128 CUDA cores), 5,000 with Jetson Xavier NX (384 CUDA cores), and 3,000 with Jetson Orin NX (1024 CUDA cores). You need to deploy a single updated detection model across the entire fleet.
question: How do you handle the 8x compute gap between the weakest and strongest devices?
details:
  realistic_solution: 'You need a **model tiering strategy** — multiple model variants compiled from the same training run, each targeting a hardware tier. The deployment package should carry all variants, but devices only load the one matching their tier.'
  common_mistake: |
    **The Pitfall:** Attempting to train one model and compile it uniformly for each platform.
    **The Rationale:** Candidates fail to realize a model optimized for the Orin will OOM or miss deadlines on the Nano.
    **The Consequence:** The weakest devices in the fleet go offline or suffer massive frame drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nano (~940 GOPS INT8 equivalent): YOLOv8-N (3.2 GOPS).
    - Xavier NX (~21 TOPS INT8): YOLOv8-S (16 GOPS).
    - Orin NX (~100 TOPS INT8): YOLOv8-M (39 GOPS).
    
    **Calculations:**
    - Nano compute time: 3.2/940 = 3.4ms -> ~8 FPS.
    - Xavier NX compute time: 16/21000 = 0.76ms -> ~25 FPS.
    - Orin NX compute time: 39/100000 = 0.39ms -> ~45 FPS.
    - Storage per device for all 3 tiers: 6MB + 12MB + 25MB = 43 MB.
    
    **Conclusion & Interpretation:**
    - **Result: 43 MB (Storage Overhead)**. Loading only the matching tier ensures all devices hit real-time deadlines without bloating local storage bounds.
  options:
  - Train one model and compile it for each platform.. A model that runs well on the Orin will OOM or miss deadlines on the Nano.
  - The memory leak is in the framework's autograd graph; disabling gradient computation with torch.no_grad() will fix it.
  - 'You need a model tiering strategy — multiple model variants compiled from the same training run, each targeting a hardware tier:'
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting the model.
  correct_index: 2
