title: The Fleet Heterogeneity Problem
scenario: 'Your company deployed edge AI cameras over 3 years. The fleet now contains: 2,000 devices with
  Jetson Nano (128 CUDA cores, 4 GB RAM), 5,000 with Jetson Xavier NX (384 CUDA cores, 8 GB RAM), and
  3,000 with Jetson Orin NX (1024 CUDA cores, 16 GB RAM). You need to deploy a single updated detection
  model across the entire fleet. How do you handle the 8× compute gap between the weakest and strongest
  devices?'
details:
  realistic_solution: 'You need a **model tiering strategy** — multiple model variants compiled from the
    same training run, each targeting a hardware tier:'
  common_mistake: '"Train one model and compile it for each platform." A model that runs well on the Orin
    will OOM or miss deadlines on the Nano.'
  napkin_math: 'Nano: 472 GFLOPS FP16 / ~2× for INT8 = ~940 GOPS. YOLOv8-N at 320×320: ~3.2 GOPS → 3.2/940
    = 3.4ms compute + overhead = ~8 FPS. Xavier NX: ~21 TOPS INT8. YOLOv8-S at 480×480: ~16 GOPS → 16/21000
    = 0.76ms + overhead = ~25 FPS. Orin NX: ~100 TOPS INT8. YOLOv8-M at 640×640: ~39 GOPS → 39/100000
    = 0.39ms + overhead = ~45 FPS. Storage for all 3 tiers on each device: 6 + 12 + 25 = 43 MB (only the
    matching tier is active).'
  options:
  - Train one model and compile it for each platform.. A model that runs well on the Orin will OOM or
    miss deadlines on the Nano.
  - The memory leak is in the framework's autograd graph; disabling gradient computation with torch.no_grad()
    will fix it.
  - 'You need a model tiering strategy — multiple model variants compiled from the same training run,
    each targeting a hardware tier:'
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting
    the model.
  correct_index: 2
