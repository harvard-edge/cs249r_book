title: Edge TPU Subgraph Partitioning and USB I/O Overhead
scenario: You are deploying a quantized INT8 CNN on a Google Coral Edge TPU connected via USB. Profiling reveals that inserting a single unsupported Swish activation between two supported Convolutions increases total latency by 12ms, even though the host CPU takes only 2ms to compute the Swish activation itself. The intermediate activation tensor is 2MB and the practical USB bandwidth is 400 MB/s.
question: Why does one unsupported Swish activation add 12ms of latency when the host CPU computes it in only 2ms?
details:
  realistic_solution: 'When the Coral compiler encounters an operator it cannot map to the Edge TPU (like an unsupported activation), it splits the scheduling into three subgraphs: Edge TPU -> Host CPU -> Edge TPU. The accelerator must pause execution and flush the 2MB activation tensor over the USB connection to the host CPU, wait for the CPU to compute the operation, and then wait for the CPU to send the 2MB result back over USB to resume the remaining layers. Because the Edge TPU relies on INT8 quantization and high-speed on-chip SRAM to achieve 4 TOPS at 2W, bouncing execution to the CPU makes the sluggish USB I/O the primary bottleneck.'
  common_mistake: |
    **The Pitfall:** Attributing latency solely to slow CPU computation.
    **The Rationale:** Candidates fail to identify the graph partitioning behavior that forces costly memory transfers back and forth across the slow USB bus.
    **The Consequence:** Wasting time trying to optimize the CPU Swish implementation instead of replacing it with a supported TPU operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate activation tensor: 2MB.
    - USB bandwidth: 400 MB/s.
    - Host CPU execution time for Swish: 2 ms.

    **Calculations:**
    - Edge TPU to Host CPU transfer (USB Tx): 2 MB / 400 MB/s = 0.005 seconds (5 ms).
    - Host CPU execution time: 2 ms.
    - Host CPU to Edge TPU transfer (USB Rx): 2 MB / 400 MB/s = 0.005 seconds (5 ms).
    - Total latency penalty: 5 ms (Tx) + 2 ms (Compute) + 5 ms (Rx) = 12 ms.

    **Conclusion & Interpretation:**
    - **Result: USB I/O Bottleneck (I/O-Bound).** The unsupported op forces the graph to split, causing a 10ms round-trip data transfer penalty that dwarfs the 2ms compute time.
