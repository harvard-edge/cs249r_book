title: Edge 4-Stage Synchronous Pipeline
scenario: 'A 4-stage vision pipeline maps cleanly to hardware blocks on an edge device:
  Sensor -> ISP -> NPU -> Display. Each isolated stage takes exactly 16ms to process
  its chunk of data.'
question: Identify the theoretical latency of a single frame and the steady-state
  pipeline throughput in FPS.
visual:
  kind: svg
  path: edge-2282.svg
  alt: A four-stage diagonal Gantt chart showing consecutive 16ms blocks overlapping
    in a standard pipeline execution pattern.
  caption: Synchronous Edge Pipeline
details:
  realistic_solution: 'Latency is the time for a single frame to traverse all sequentially
    dependent stages: 4 stages * 16ms = 64ms latency. Throughput in a steady state
    is bound by the slowest stage; since all are 16ms, the pipeline produces one frame
    every 16ms, yielding 1000 / 16 = 62.5 FPS.'
  common_mistake: Stating the throughput is 1000 / 64 = 15.6 FPS, ignoring the fundamental
    concept of pipeline stage overlapping.
  napkin_math: Latency = 4*16 = 64ms, FPS = 1000/16 = 62.5
