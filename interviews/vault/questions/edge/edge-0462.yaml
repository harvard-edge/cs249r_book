title: The Autonomous Driving Stall
scenario: You are an ML systems engineer on an autonomous vehicle team, tasked with optimizing a perception
  model on a Jetson AGX Orin (INT8). The profiler flags a custom depthwise convolution layer
  as a major bottleneck, preventing the system from meeting its 33ms per-frame deadline. The layer takes
  a 224x224x256 tensor as input. `ncu` reports that the GPU cores are mostly idle. Using the hardware
  specs provided, diagnose the root cause of the performance issue.
question: "What is the root cause of the depthwise convolution bottleneck on the Jetson AGX Orin?"
details:
  realistic_solution: The layer is severely memory-bound. The core issue is its extremely low Arithmetic
    Intensity (AI). The number of operations performed for each byte of data moved from DRAM is tiny.
    The Jetson AGX Orin's compute cores finish their work almost instantly and then spend the vast majority
    of their time waiting for the next batch of data to arrive from memory. The solution is not to reduce
    computation, but to restructure the memory access pattern, fuse the layer with an upstream or downstream
    operation to increase data reuse, or accept that this layer will never achieve high hardware utilization
    on its own.
  common_mistake: Engineers often fixate on the peak TOPS of a device and assume any slowdown is a compute
    problem. They might suggest redesigning the layer to have fewer MAC operations, when in fact the bottleneck
    is that the compute units are starved for data because of low memory bandwidth.
  napkin_math: 'First, calculate the layer''s Arithmetic Intensity (AI). Given: depthwise conv,
    3x3 kernel, 256 channels, 224x224 output. FLOPs = 3x3x256x224x224 = 115,605,504 \u2248 115.6 MFLOPs. Memory
    (weights + activations): weights = 3x3x256x1 = 2,304 params \u00d7 1 byte (INT8) = 2,304 B; input activations
    = 256x224x224x1 = 12,845,056 B; output = 256x224x224x1 = 12,845,056 B. Total = ~25.7 MB. AI = 115.6e6 / 25.7e6 \u2248 4.5
    Ops/Byte. Jetson Orin Ridge Point: 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte. Since 4.5 << 1,343, the
    layer is severely memory-bound.'
  options:
  - The layer is compute-bound; the Jetson's 275 TOPS is insufficient for the 115.6M operations required.
  - The device is power-throttling due to the high operation count, which is reducing the effective TOPS.
  - The layer is memory-bound; its arithmetic intensity is far below the hardware's ridge point, so performance
    is limited by memory bandwidth.
  - The bottleneck is the MIPI CSI-2 camera interface, which cannot supply data to the model fast enough.
  correct_index: 2
