title: Hailo-8 Dataflow Topology Memory Bottleneck
scenario: A hardware-aware NAS yielded two INT8 object detection models for a Hailo-8 edge device (26 TOPS, 2.5W, dataflow architecture, no local DRAM). Model X requires 15 GOPs with heavy branching. Model Y requires 20 GOPs with a strictly sequential topology.
question: Why does the lower-compute Model X run at 150 FPS while the higher-compute Model Y reaches 600 FPS on the Hailo-8?
details:
  realistic_solution: Because the Hailo-8 is a dataflow accelerator lacking local DRAM, it relies on mapping the entire network graph directly onto its distributed SRAM. A sequential model can be pipelined efficiently. Model X's heavy branching exhausts internal SRAM, forcing it to spill intermediate activations over the PCIe bus, causing severe bandwidth bottlenecks.
  common_mistake: |
    **The Pitfall:** Assuming that fewer FLOPs/GOPs mathematically guarantees lower latency on dataflow accelerators.
    **The Rationale:** Candidates rely on standard CPU/GPU intuition, failing to account for the unique memory topology of specialized NPUs that lack local DRAM.
    **The Consequence:** Selecting a theoretically "efficient" model that heavily thrashes the host PCIe bus because intermediate activations spill out of the chip's internal SRAM.
  napkin_math: |
    * **Compute Bound Model Y:** 26,000 GOPs / 20 GOPs = 1,300 max FPS.
    * **Compute Bound Model X:** 26,000 GOPs / 15 GOPs = 1,733 max FPS.
    * **Memory Bottleneck (Model X):** Heavy branching exhausts SRAM. Spilling a 4MB feature map over a 4 GB/s PCIe bus takes 8MB / 4000 MB/s = 2.0ms per inference.
    * **Throughput Ceiling:** 1 / 0.002s = 500 FPS limit. When accounting for synchronization, this crashes down to the observed **150 FPS**.
