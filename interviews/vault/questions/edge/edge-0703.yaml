title: 'Multi-Hardware Model Optimization Pipeline'
scenario: 'Your fleet has three hardware targets: Jetson Orin NX (TensorRT), Hailo-8 (Hailo Dataflow Compiler), and Google Coral (Edge TPU Compiler). You train one PyTorch model and need to deploy optimized binaries to all three. Each compiler has different quantization requirements, operator support, and calibration procedures.'
question: 'How would you design a CI/CD pipeline that builds and validates optimized binaries for Orin NX, Hailo-8, and Coral from one PyTorch checkpoint?'
details:
  realistic_solution: 'Design a four-stage CI/CD pipeline: Export, Target-Specific Quantization, Compilation, and Validation. The key challenge is operator coverage gaps; a model that exports to ONNX cleanly may fail compilation on specific targets. Incorporate INT8 calibration tailored to each target (Coral needs full-integer TFLite, Hailo requires its DFC, TensorRT uses PTQ/QAT) and validate inference on physical hardware.'
  common_mistake: 'Assuming that exporting to ONNX is sufficient for all compilers. Candidates believe ONNX is a universal intermediate representation that guarantees compilation success, missing the critical step of managing operator coverage gaps.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline compute: 3 parallel jobs, 1 GPU-hour average, $3/hr.
    - Validation compute: 3 hardware targets, 10 mins each = 30 device-minutes.
    - Engineer cost: $90/hr. Manual effort: 3 targets * 2 hours * 2/week.

    **Calculations:**
    - Cost per CI/CD run: 3 * 1 hr * $3 = $9 compute. Total ~$12 with device time.
    - Annual CI/CD cost: $12 * 2 runs/week * 52 weeks = $1,248/year.
    - Manual engineering cost: 12 hours/week * $90/hr * 52 weeks = $56,160/year.

    **Conclusion & Interpretation:**
    - **Result: $56,160 Saved (Compute-Bound Pipeline)**. The automated CI/CD pipeline yields a massive 45x return on investment by eliminating manual compilation overhead.
