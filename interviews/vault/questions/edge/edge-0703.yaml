title: Multi-Hardware Model Optimization Pipeline
scenario: 'Your fleet has three hardware targets: Jetson Orin NX (TensorRT), Hailo-8 (Hailo Dataflow Compiler),
  and Google Coral (Edge TPU Compiler). You train one PyTorch model and need to deploy optimized binaries
  to all three. Each compiler has different quantization requirements, operator support, and calibration
  procedures. Design a CI/CD pipeline that produces validated binaries for all three targets from a single
  model checkpoint.'
details:
  realistic_solution: 'Design a four-stage CI/CD pipeline. Stage 1 (Export): Convert PyTorch checkpoint
    to ONNX and TFLite. Stage 2 (Target-Specific Quantization): Run INT8 calibration with target-specific
    requirements — Coral needs full-integer TFLite, Hailo needs Hailo-specific quantization via Dataflow
    Compiler, TensorRT uses its own PTQ/QAT calibration. Stage 3 (Compilation): Compile on target-specific
    toolchains in parallel (each ~1 GPU-hour). Stage 4 (Validation): Run inference on actual hardware
    devices, comparing accuracy against golden reference. Total cost: ~$12/run, saving $56K/year vs manual
    compilation. The key challenge is operator coverage gaps — a model that exports to ONNX may fail on
    specific targets.'
  common_mistake: '"Export to ONNX, then each compiler reads ONNX. Done." ONNX is a necessary but insufficient
    step. Each compiler has operator coverage gaps — the Coral Edge TPU compiler only supports a subset
    of TFLite ops, Hailo requires specific layer patterns for efficient mapping, and TensorRT has its
    own fusion rules. A model that exports cleanly to ONNX may fail compilation on one or more targets.'
  napkin_math: 'Pipeline cost per run: 3 compilation jobs × 1 GPU-hour avg × $3/hr = $9 compute. 3 hardware
    targets × 10 min validation = 30 device-minutes. Total: ~$12 per model version. At 2 releases/week:
    $1,248/year. Engineering time saved vs manual compilation: 3 targets × 2 hours manual × 2/week × 52
    weeks × $90/hr = $56,160/year. ROI: 45× return on CI/CD investment. The pipeline pays for itself in
    the first week.'
