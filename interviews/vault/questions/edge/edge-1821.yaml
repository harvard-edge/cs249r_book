title: On-Device Privacy Guardrails for Intersection Monitoring
scenario: You are specifying the architecture for a real-time pedestrian safety monitor deployed on a Google Coral Edge TPU at city intersections. City governance mandates all faces must be detected and blurred on-device before transmission, and confidence scores securely logged to audit bias.
question: How would you integrate on-device face blurring and bias-audit logging while keeping the Coral Edge TPU pipeline fully INT8-compatible?
details:
  realistic_solution: Specify a unified, fully INT8-quantized CNN architecture (e.g., a multi-head MobileNet SSD) that performs both pedestrian and face detection in a single pass to ensure 100% TPU compatibility. Implement the actual face blurring via optimized CPU OpenCV routines post-inference. Bias monitoring should be specified as a lightweight metadata logging system that batches and encrypts anonymized bounding box confidence scores for cloud-side fairness analysis.
  common_mistake: |
    **The Pitfall:** Proposing complex, separate models for guardrails.
    **The Rationale:** Candidates prioritize standard cloud-native safety architectures over the TPU's strict INT8 and memory constraints.
    **The Consequence:** Unsupported operators trigger CPU fallback, completely bottlenecking the accelerator and violating real-time constraints.
  napkin_math: |
    - Pedestrian detector compute: ~1.5 GOPS.
    - Face detection head compute: ~0.5 GOPS.
    - Total compute per frame: 2.0 GOPS.
    - Compute at 30 FPS: 60 GOPS.
    - TPU Utilization: 60 GOPS / 4000 GOPS (4 TOPS) = 1.5%.
    **The unified model requires only 1.5% of the 4 TOPS capacity, easily fitting the 2W limit.**
