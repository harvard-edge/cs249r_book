title: The Edge Memory Budget
scenario: You are on an autonomous vehicle team deploying a 500 million parameter perception model to an edge device. The model is currently in FP16 format, and you need to reduce its memory footprint. Your team decides to quantize only the model's weights to INT8.
question: How much weight memory, in GB, is saved by quantizing a 500 million parameter model from FP16 to INT8?
details:
  realistic_solution: The solution requires knowing the byte representation for each data type. FP16 (half-precision float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte. The memory savings is the difference between the total memory required for the weights in each format.
  common_mistake: |
    **The Pitfall:** Confusing FP16 with FP32 or confusing bits with bytes.
    **The Rationale:** Candidates often treat FP16 as 4 bytes, or report the final size of the model instead of the difference. A classic error is using bit-width (16 vs 8) as a multiplier to get a result that is 8x too large.
    **The Consequence:** Incorrectly estimating the memory savings, leading to flawed hardware provisioning decisions.
  napkin_math: |
    * **Model parameters:** 500 million
    * **FP16 weight memory:** 500,000,000 * 2 bytes = 1,000,000,000 bytes (1 GB)
    * **INT8 weight memory:** 500,000,000 * 1 byte = 500,000,000 bytes (0.5 GB)
    * **Memory savings:** 1.0 GB - 0.5 GB = **0.5 GB**
  options:
  - 1.5 GB
  - 1.0 GB
  - 0.5 GB
  - 4.0 GB
  correct_index: 2
