title: 'Edge Systolic Array Evaluation: Weight-Stationary vs Row-Stationary on Jetson'
scenario: Compare weight-stationary (WS) and row-stationary (RS) dataflow for a depthwise
  convolution on Jetson Orin DLA (5.5 TOPS INT8 per core, 200GB/s internal BW) for
  EfficientNet-B0 block (32 channels, 112x112, 3x3 dw-conv). Show SRAM access counts
  and energy implications for each dataflow.
question: For the 32-channel 112x112 3x3 depthwise conv on Orin DLA, how do WS and
  RS dataflows compare in SRAM access and energy?
details:
  realistic_solution: 'DW conv: 32 channels, weights = 32*9 = 288 values. Activations:
    32*112^2 = 401K values. WS dataflow: weights stationary in register file. Activations
    (input) read: 32*112^2 (with padding: 32*114^2 = 415K). Output written: 32*112^2=401K.
    Total SRAM accesses: 288 (weight load, amortized) + 415K + 401K = 816K accesses (415K reads +
    401K writes). RS dataflow: processes one output row at a time, keeping partial
    sums stationary. Input row read: 3 rows of 32*114 = 10.95K, output row written:
    32*112. Total for 112 rows: same 816K accesses. Both similar for DW.
    RS wins for standard conv where partial sums are large.'
  common_mistake: Applying weight-stationary dataflow to depthwise convolutions where
    weights are tiny (9 values per channel) and the real bandwidth bottleneck is activations,
    not weights.
  napkin_math: 'DW 32ch, 3x3, 112x112: Weight: 32*9=288 bytes INT8. Activation in:
    32*(112+2)^2=415,872 bytes (with padding). Output: 32*112^2=401,408 bytes. Total:
    817,568 bytes = 0.818MB per inference. At 200GB/s DLA BW: 0.818MB/200GB/s
    = 4.1\u03bcs. FLOPs: 2*32*112^2*9=7.2M. Compute: 7.2M/5.5T = 0.0013ms = 1.3\u03bcs. AI =
    7.2M/0.818MB = 8.8 FLOPs/byte. DLA ridge \u2248 5500G/200G = 27.5 FLOPs/byte. AI=8.8 < 27.5
    \u2192 memory bound. Latency: 4.1\u03bcs for dw-conv block.'
