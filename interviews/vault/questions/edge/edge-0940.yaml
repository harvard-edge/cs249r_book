title: Edge New 0001
scenario: Deploying a 7B parameter LLM on an edge server with a single T4 GPU (16GB GDDR6, 320GB/s). The
  system must serve requests at minimum latency. Analyze the tradeoff between running batch size 1 versus
  batch size 8 for auto-regressive decoding.
details:
  realistic_solution: For auto-regressive decoding, the workload is overwhelmingly memory-bandwidth bound.
    A 7B model tightly fits the 16GB T4. At batch size 1, the GPU reads 14GB per token, heavily underutilizing
    compute. At batch size 8, it reads the identical 14GB but processes 8 tokens simultaneously. The optimal
    tradeoff favors batch size 8 to dramatically multiply overall throughput without significantly impacting
    individual per-token generation latency.
  common_mistake: Assuming compute (TFLOPS) is the bottleneck for generation, ignoring that LLM decoding
    on GPUs is almost entirely bound by memory bandwidth.
  napkin_math: FP16 size = 7B * 2B = 14GB. Bandwidth = 320GB/s. Time to read weights = 14GB / 320GB/s
    = 43.7ms/token. BS=1 yields 22.8 tokens/s. BS=8 yields 183 tokens/s overall (22.8 per sequence), as
    computation overhead is mathematically negligible.
