title: The Robot's Perception Power Budget
scenario: 'An autonomous delivery robot has a strict 15W power budget and a 30 FPS deadline. You must choose between Model A (Efficient-CNN: 50 GOPS, 20 MB data movement per frame) and Model B (Small-ViT: 20 GOPS, 1.5 GB data movement per frame).'
question: Which model should you choose under the 15W, 30 FPS budget, and why?
details:
  realistic_solution: "The ResNet-based CNN (Model A) is the only tenable path. While the ViT executes under the 33ms latency deadline, its memory-bound architecture violates the Thermal Design Power (TDP) constraints. For 30 FPS, the ViT generates 45 GB/s of DRAM traffic, which overwhelms the SoC's memory controller and guarantees catastrophic thermal throttling. Model A leverages compute-bound spatial convolutions, maximizing ALU utilization without triggering DRAM-induced TDP violations."
  common_mistake: |
    **The Pitfall:** Calculating only theoretical latency and ignoring memory bandwidth power consumption.
    **The Rationale:** Candidates focus on compute FLOPs and ignore that DRAM access is the primary energy consumer on edge devices.
    **The Consequence:** The chosen model exceeds the thermal design power (TDP) limit, leading to thermal throttling or system failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline: 30 FPS (33ms).
       - Power Budget: 15W.
       - Model A: 50 GOPS, 20 MB/frame.
       - Model B: 20 GOPS, 1.5 GB/frame.
    2. **Calculations:**
       - Model B Bandwidth = 1.5 GB/frame * 30 FPS = 45 GB/s.
       - Model A Bandwidth = 20 MB/frame * 30 FPS = 600 MB/s.
    3. **Conclusion & Interpretation:**
       - **Model A is viable; Model B exceeds TDP.** Sustaining 45 GB/s of LPDDR/DRAM traffic requires far more than the 15W envelope.
  options:
  - Model B is the better choice because its calculated latency (1.5 GB / 204.8 GB/s ≈ 7.3ms) is faster, providing a larger safety margin within the 33ms budget.
  - Neither model is viable, as their compute requirements (500-800 GOPS) are too high for an edge device.
  - Model A is the only choice because its compute-bound nature makes it far more power-efficient, whereas Model B's memory-bound nature would cause it to exceed the 15W power budget.
  - Both models are viable, but Model A is preferable because compute-bound workloads are easier to optimize with techniques like kernel fusion.
  correct_index: 2
