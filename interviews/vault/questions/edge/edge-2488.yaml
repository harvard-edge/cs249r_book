title: Orin Zero-Copy PCIe Avoidance
scenario: A Jetson AGX Orin reads 4K Lidar-Camera fused frames from an NVMe drive.
  Initially, frames route via CPU RAM, then over PCIe to GPU memory, bottlenecking
  throughput.
question: Explain how implementing zero-copy memory using CUDA unified memory mitigates
  the CPU overhead and prevents the pipeline stall.
details:
  realistic_solution: The Orin has an integrated CPU-GPU architecture sharing the
    same physical LPDDR5 memory pool. Traditional explicit copies route data into
    CPU-allocated RAM, then trigger a CUDA memcpy that needlessly shuttles data across
    the internal PCIe bus emulator to a GPU-allocated segment. Zero-copy pins the
    memory space so the GPU can directly access the NVMe DMA target buffer, eliminating
    the redundant intra-RAM copy and drastically reducing CPU utilization.
  common_mistake: Explaining discrete GPU PCIe bottlenecks instead of realizing the
    Orin shares physical memory and the "copy" is just an OS-level software abstraction
    that zero-copy bypasses.
  napkin_math: Avoiding a 24MB redundant memory copy at 50 GB/s internal memcpy saves
    ~0.48ms of latency per frame.
