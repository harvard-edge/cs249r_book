title: Apply double-buffering to calculate total image processing latency
scenario: A multi-camera system on a Jetson AGX Orin processes 4 cameras sequentially.
  The NPU takes 4ms to process one camera's frame. Transferring the frame from the
  image signal processor to the NPU's local memory takes 3ms via DMA.
question: Apply a double-buffering strategy to calculate the total time required to
  process a batch of 4 frames.
details:
  realistic_solution: 'With double-buffering, DMA transfers overlap with NPU compute.
    Frame 1 takes 3ms to transfer, then 4ms to compute. During Frame 1''s 4ms compute,
    Frame 2 transfers (3ms), so Frame 2 is ready instantly. The timeline is: initial
    transfer (3ms) + 4 consecutive computes (4x4ms). The total time is 19ms.'
  common_mistake: Summing transfer and compute times linearly (28ms) or assuming perfect
    overlap without accounting for the initial pipeline fill delay.
  napkin_math: 3ms + (4 * 4ms) = 19ms
