title: Thermal Specification for Edge TPU Burst Workloads
scenario: We are deploying a real-time defect detection system on a manufacturing line using a Google
  Coral Edge TPU (PCIe form factor). The system must process bursts of 60 frames per second requiring
  4 TOPS of INT8 compute for 10-second intervals, followed by 20-second idle periods. Given the 2W power
  consumption during active inference and a harsh ambient factory temperature of 45°C, design a thermal
  management specification. Your specification must prevent thermal throttling and address how you will
  handle the transition between burst and sustained performance.
question: "What thermal management specification would prevent Coral Edge TPU throttling during 10-second 2W bursts at 45°C ambient?"
details:
  realistic_solution: The design should leverage the 33% duty cycle to average out thermal dissipation
    while ensuring sufficient thermal mass to absorb the 10-second burst. A well-designed passive heatsink
    thermally coupled to a metal enclosure is preferred for reliability in a factory. The system must
    maintain the junction temperature below the 85°C throttling threshold by managing the 40°C thermal
    headroom from the high ambient baseline.
  common_mistake: Candidates often calculate cooling requirements based on continuous 2W power draw without
    factoring in the burst duty cycle, leading to over-engineered active cooling. Conversely, they may
    ignore the high 45°C ambient temperature and assume standard room temperature, resulting in undersized
    passive heatsinks that cause the Edge TPU to throttle.
  napkin_math: 'Peak active power = 2W. Duty cycle = 10s active / (10s active + 20s idle) = 33%. Average
    power = 2W * 0.33 = 0.66W. Target max junction temp (Tj) = 85°C. Ambient temp (Ta) = 45°C. Max allowed
    ΔT = 85 - 45 = 40°C. Required thermal resistance (θja) for average load = 40°C / 0.66W = 60.6°C/W.
    For the burst: 2W * 10s = 20 Joules of heat generated. The heatsink''s thermal capacity must be large
    enough that 20J does not spike the temperature by more than 40°C before dissipation catches up.'
