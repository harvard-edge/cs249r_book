title: The Unaligned Memory DMA Fault
scenario: You configure a hardware DMA (Direct Memory Access) controller to stream incoming camera pixels
  directly into the `tensor_arena` array of your TFLite Micro model. It works perfectly on your Cortex-M4
  dev board. You move the exact same C++ code to a Cortex-M0+ production board. The moment the DMA starts,
  the system crashes with a Hard Fault. Why does the exact same DMA code crash on the M0+?
details:
  realistic_solution: You hit an **Unaligned Memory Access Fault**. 32-bit architecture = 4 bytes per
    word. Addresses like 0x1000, 0x1004, 0x1008 are valid. An address like 0x1001 forces the CPU to read
    across two physical memory banks, which the M0+ physically cannot
  common_mistake: '"The M0+ doesn''t have DMA." It usually does. The issue is how different ARM cores
    handle memory addresses.'
  napkin_math: 32-bit architecture = 4 bytes per word. Addresses like 0x1000, 0x1004, 0x1008 are valid.
    An address like 0x1001 forces the CPU to read across two physical memory banks, which the M0+ physically
    cannot do, resulting in a 0-cycle crash.
