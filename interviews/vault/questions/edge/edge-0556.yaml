title: The Unaligned Memory DMA Fault
scenario: You configure a hardware DMA (Direct Memory Access) controller to stream incoming camera pixels directly into the `tensor_arena` array of your TFLite Micro model. It works perfectly on your Cortex-M4 dev board. You move the exact same C++ code to a Cortex-M0+ production board. The moment the DMA starts, the system crashes with a Hard Fault.
question: Why does the exact same DMA code crash on the M0+?
details:
  realistic_solution: You hit an Unaligned Memory Access Fault. A 32-bit architecture processes 4 bytes per word. Addresses evenly divisible by 4 (0x1000, 0x1004) are aligned. The M4 CPU has hardware support to handle unaligned access, but the M0+ does not, immediately faulting if asked to do so.
  common_mistake: |
    **The Pitfall:** Assuming the Cortex-M0+ simply lacks DMA capabilities.
    **The Rationale:** Engineers assume moving to a lower-end board removes major peripherals.
    **The Consequence:** Investigating nonexistent hardware missing features rather than fixing the memory alignment flags in the C++ allocation code.
  napkin_math: |
    1. **Architecture:** 32-bit architecture = 4 bytes per word.
    2. **Valid Access:** Addresses like 0x1000, 0x1004, 0x1008 are naturally aligned.
    3. **The Fault:** An address like 0x1001 forces the CPU to read across two physical memory banks.
    4. **Result:** The M0+ physically cannot perform this action, resulting in an immediate 0-cycle crash.
