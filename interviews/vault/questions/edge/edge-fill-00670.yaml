title: Designing an Efficient MobileNet for Google Coral Edge TPU
scenario: You are tasked with deploying a real-time object detection model on a fleet of smart cameras
  equipped with Google Coral Edge TPUs. The model needs to classify at least 50 frames per second (FPS)
  with a latency under 20ms per inference, while operating within a strict power budget of 2W. The Coral
  Edge TPU provides 4 TOPS (Trillions Operations Per Second) for INT8 operations, and only supports INT8
  inference. You are considering using a MobileNetV2 architecture. Describe how you would design and optimize
  this network to meet the performance and power constraints, specifically focusing on depthwise separable
  convolutions, inverted residuals, and quantisation-aware training for INT8 deployment.
details:
  realistic_solution: The solution would involve starting with a MobileNetV2 architecture, leveraging
    its inverted residual blocks and depthwise separable convolutions for computational efficiency. Given
    the Coral Edge TPU's INT8-only capability, quantisation-aware training (QAT) would be crucial during
    the fine-tuning phase to maintain accuracy. The model should be designed with a judicious choice of
    width and resolution multipliers to balance accuracy and latency. For example, reducing the input
    resolution or the network's width can significantly reduce FLOPs and parameters. Profiling on the
    target hardware is essential to understand actual latency and power consumption, guiding iterative
    design adjustments. Tools like TensorFlow Lite's converter with INT8 quantization would be used to
    prepare the model for deployment on the Coral Edge TPU.
  common_mistake: A common mistake is to directly quantize a floating-point trained model without proper
    quantisation-aware training (QAT), leading to significant accuracy degradation. Another mistake is
    to solely focus on FLOP reduction without considering memory access patterns and the specific hardware
    accelerator's capabilities (e.g., INT8-only support), which can lead to suboptimal actual latency
    despite low theoretical FLOPs.
  napkin_math: Given 4 TOPS (INT8) on the Coral Edge TPU, this translates to 4 * 10^12 INT8 operations
    per second. If the target is 50 FPS, each inference must complete within 20ms. Therefore, each inference
    can consume at most (4 * 10^12 operations/second) / 50 FPS = 8 * 10^10 INT8 operations (80 GOPS) per
    frame. A typical MobileNetV2 might have around 300-600 MFLOPS (floating-point operations). While not
    a direct conversion, the 80 GOPS budget indicates that the model's effective operations need to be
    significantly optimized. The primary constraint will be actual throughput on the hardware due to memory
    access and specific layer implementations, not just theoretical TOPS. For power (2W), reducing computational
    load directly contributes to lower energy consumption.
