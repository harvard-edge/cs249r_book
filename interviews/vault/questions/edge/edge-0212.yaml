title: The Activation Memory Diet
scenario: You're optimizing a real-time object detection model for an autonomous driving platform running
  on a Jetson AGX Orin. The system has a strict 33ms per-frame deadline, and memory bandwidth is a major
  bottleneck. You identify a large intermediate activation tensor with dimensions `80 x 60 x 512` that
  is currently in FP16 precision.
details:
  realistic_solution: The calculation requires knowing the size in bytes for each data type. FP16 (half-precision
    float) uses 2 bytes per value. INT8 (8-bit integer) uses 1 byte per value. Quantizing from FP16 to
    INT8 exactly halves the memory required for that tensor.
  common_mistake: Engineers often confuse bits and bytes, or forget the byte-width of floating-point types.
    A common error is to assume FP16 is 16 bytes instead of 16 bits (2 bytes), leading to an 8x calculation
    error. Another mistake is to calculate the savings but report the original size, or to divide by two
    twice.
  napkin_math: '1. Calculate total elements: 80 * 60 * 512 = 2,457,600 elements. 2. In FP16 (2 bytes/element),
    memory = 2,457,600 * 2 = 4,915,200 bytes (~4.9 MB). 3. In INT8 (1 byte/element), memory = 2,457,600
    * 1 = 2,457,600 bytes (~2.45 MB). Quantization cuts memory bandwidth requirements perfectly in half.'
  options:
  - 4.69 MB
  - 1.17 MB
  - 2.34 MB
  - 19.66 MB
  correct_index: 2
