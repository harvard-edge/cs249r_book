title: The Activation Memory Diet
scenario: 'You''re optimizing a real-time object detection model for an autonomous driving platform running on a Jetson AGX Orin. The system has a strict 33ms per-frame deadline, and memory bandwidth is a major bottleneck. You identify a large intermediate activation tensor with dimensions `80 x 60 x 512` that is currently in FP16 precision.'
question: How much memory does the 80 x 60 x 512 activation use in FP16 versus INT8, and how much bandwidth does quantization save?
details:
  realistic_solution: 'The calculation requires knowing the size in bytes for each data type. FP16 (half-precision float) uses 2 bytes per value. INT8 (8-bit integer) uses 1 byte per value. Quantizing from FP16 to INT8 exactly halves the memory required for that tensor.'
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes or misjudging float widths.
    **The Rationale:** Engineers assume FP16 is 16 bytes instead of 16 bits (2 bytes).
    **The Consequence:** They severely miscalculate the memory footprint, often leading to an 8x calculation error.
  napkin_math: |
    *   **Total Elements:** 80 * 60 * 512 = 2,457,600 elements.
    *   **FP16 Memory:** 2,457,600 * 2 bytes = 4,915,200 bytes (~4.69 MB).
    *   **INT8 Memory:** 2,457,600 * 1 byte = 2,457,600 bytes (~2.34 MB).
    *   **Result:** **Quantization cuts memory bandwidth requirements perfectly in half to 2.34 MB.**
  options:
  - 4.69 MB
  - 1.17 MB
  - 2.34 MB
  - 19.66 MB
  correct_index: 2
