title: The Federated Fine-Tuning Payback Period
scenario: 'You are an ML Systems Engineer for a fleet of 10,000 autonomous delivery robots, each equipped with a Jetson AGX Orin. The fleet''s perception model is failing on a new type of reflective traffic sign. The two options are Federated Learning (FL) directly on the robots or collecting, scrubbing, and manually labeling images in the cloud.'
question: 'Is Federated Learning economically feasible for the 10,000-robot reflective-sign problem compared with cloud collection and manual labeling?'
details:
  realistic_solution: 'The correct approach is to calculate the operational cost (OpEx) for both options. The napkin math reveals that the cost of using the fleet''s distributed, low-power compute for Federated Learning is trivial compared to the immense cost of specialized human labor for manual annotation. The on-device training leverages existing capital expenditure (the robots) as a low-cost data generation and model improvement engine, making it the clear economic winner.'
  common_mistake: |
    **The Pitfall:** Assuming manual labeling is a quick and cheap fix while overestimating the cost of on-device compute.
    **The Rationale:** Engineers visualize FL as complex and power-hungry (running 24/7), while underestimating the massive human-hours required for production-scale annotation.
    **The Consequence:** They reject a highly cost-effective automated pipeline in favor of an expensive, unscalable manual labor process.
  napkin_math: |
    * Manual annotation: 10,000 robots × 10 images/day = 100,000 images.
    * Manual cost: 100,000 images × $0.10/img = $10,000/day.
    * FL Compute: Jetson Orin (~30W) × 1 hr = 0.03 kWh. Fleet total = 10k × 0.03 = 300 kWh.
    * FL Power cost: 300 kWh × $0.20/kWh = $60/day.
    * FL Network cost: 50MB × 10k = 500GB. 500GB × $0.01/GB = $5/day.
    * **Conclusion: FL OpEx ($65/day) is >150x cheaper than manual annotation ($10,000/day).**
  options:
  - Manual labeling is cheaper. Running training on 1,000 devices for 3 months will incur massive energy and hardware degradation costs that exceed the labor expense.
  - Manual labeling is cheaper. A team of 5 annotators can label the required images in a few weeks, which is more cost-effective than building and maintaining a complex FL pipeline.
  - Federated Learning is drastically cheaper. The total energy cost is less than $100, whereas the manual labeling cost is approximately $750,000.
  - Neither is viable. The security risk of a model poisoning attack during Federated Learning is too high for a safety-critical system, making the feature a non-starter.
  correct_index: 2
