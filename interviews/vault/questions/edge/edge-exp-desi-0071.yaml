title: Architecting Multi-Model Inference on Qualcomm Cloud AI 100
scenario: Your team needs to deploy a real-time conversational AI pipeline consisting of an ASR model,
  an LLM, and a TTS model on an on-premise edge server equipped with a single Qualcomm Cloud AI 100 accelerator.
  The hardware provides exactly 32 GB of LPDDR4x memory, 400 TOPS of INT8 compute, and operates under
  a strict 75W power envelope. You are tasked with designing the end-to-end model quantization, deployment,
  and memory management architecture to ensure the entire pipeline fits and operates efficiently without
  exceeding hardware constraints.
question: "How would you quantize and place the ASR, LLM, and TTS models on one Cloud AI 100 so they fit in 32 GB and stay within 75W?"
details:
  realistic_solution: A strong L5 candidate will evaluate the tradeoffs and design an architecture that
    mandates INT8 (W8A8) quantization for the LLM to capitalize on the 400 TOPS INT8 compute and halve
    the memory footprint. They will structure the memory layout to pin the heavy LLM weights in the 32
    GB LPDDR4x memory while leaving a dedicated, hard-capped memory pool for the ASR/TTS models and dynamic
    KV cache, ensuring deterministic performance and power stability under the 75W limit.
  common_mistake: Candidates often propose serving models at FP16 without accounting for the hard 32 GB
    memory limit when combining multiple models and KV caches. They also frequently overlook the requirement
    to quantize to INT8 in order to actually leverage the 400 TOPS throughput capability, resulting in
    sub-optimal architectures that bottleneck on memory bandwidth or exceed the 75W TDP.
  napkin_math: 'For a 14B parameter LLM: At FP16, weights require 14B * 2 bytes = 28 GB. With a 2 GB ASR
    model and a 1 GB TTS model, total weight memory is 31 GB, leaving only 1 GB for KV cache and activations
    (risking OOM on the 32 GB Qualcomm Cloud AI 100). By designing for INT8 quantization, the LLM footprint
    drops to 14 GB. Total model memory becomes 14 GB + 2 GB + 1 GB = 17 GB. This safely leaves 15 GB for
    high-throughput batching and KV caching while unlocking the accelerator''s 400 TOPS INT8 peak performance.'
