title: The SRAM Bottleneck
scenario: You are validating a new perception model for your company's self-driving car platform. The edge accelerator in the car has a 4 MB on-chip SRAM that functions as a 'tensor arena' for high-speed operations. The model's largest intermediate activation tensor has dimensions of 112x112x256 and uses FP16 precision. To avoid slow DMA transfers to off-chip DRAM, this entire tensor must fit into the SRAM.
question: What is the memory footprint of the 112x112x256 FP16 activation tensor, and will it fit in 4 MB SRAM?
details:
  realistic_solution: No, the tensor will not fit. Its footprint is 6.13 MB, which is significantly larger than the 4 MB SRAM capacity. This blocks deployment. The system would be forced to 'tile' the tensor, breaking it into smaller chunks and repeatedly transferring them from slower off-chip LPDDR5 memory, causing the perception pipeline to miss real-time deadlines.
  common_mistake: |
    **The Pitfall:** Assuming 1 byte per parameter (INT8 equivalent).
    **The Rationale:** Engineers perform quick mental calculations using standard quantization sizes, forgetting the 2-byte impact of FP16 precision.
    **The Consequence:** A disastrous 'go' decision for a model that will immediately overflow the SRAM and throttle in the field.
  napkin_math: |
    1. **Element Count:** 112 * 112 * 256 = 3,211,264 elements.
    2. **Byte Size:** FP16 uses 2 bytes per element. Total Bytes = 3,211,264 * 2 = 6,422,528 bytes.
    3. **Megabyte Conversion:** 6,422,528 bytes / (1024 * 1024) = **6.13 MB**.
    4. **Conclusion:** Since 6.13 MB > 4 MB, the tensor does not fit and 2.13 MB must spill to slower DRAM.
  options:
  - '3.06 MB; it fits. (Misconception: Assumes 1 byte per element/INT8 precision)'
  - '49.0 MB; it does not fit. (Misconception: Confuses bits with bytes, using 16 bytes for FP16)'
  - 6.13 MB; it does not fit.
  - '6.42 MB; it does not fit. (Misconception: Uses 1,000,000 instead of 1024*1024 for MB conversion)'
  correct_index: 2
