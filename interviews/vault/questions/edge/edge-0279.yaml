title: The SRAM Bottleneck
scenario: You are validating a new perception model for your company's self-driving car platform. The
  edge accelerator in the car has a 4 MB on-chip SRAM that functions as a 'tensor arena' for high-speed
  operations. The model's largest intermediate activation tensor has dimensions of 112x112x256 and uses
  FP16 precision. To avoid slow DMA transfers to off-chip DRAM, this entire tensor must fit into the SRAM.
  Calculate the memory footprint of this tensor and determine if it fits.
question: "What is the memory footprint of the 112x112x256 FP16 activation tensor, and will it fit in 4 MB SRAM?"
details:
  realistic_solution: No, the tensor will not fit. Its footprint is 6.13 MB, which is significantly larger
    than the 4 MB SRAM capacity. This is a critical finding that blocks deployment. The system would be
    forced to 'tile' the tensor, breaking it into smaller chunks and repeatedly transferring them from
    slower off-chip LPDDR5 memory. This added DMA overhead would cause the perception pipeline to miss
    its real-time deadlines, a catastrophic failure in an automotive context. The ML systems engineer
    must now work with the modeling team to reduce the channel depth or apply quantization.
  common_mistake: The most common mistake is to forget the impact of data precision on memory size. Engineers
    often perform a quick calculation assuming 1 byte per value (as is common in INT8), underestimating
    the footprint by a factor of 2 for FP16. This leads to a disastrous 'go' decision for a model that
    will immediately overflow the SRAM and fail in the field.
  napkin_math: Tensor elements = 112 * 112 * 256 = 3,211,264 elements. FP16 uses 2 bytes per element.
    Total Size = 3,211,264 * 2 = 6,422,528 bytes. 6,422,528 bytes / 1024 / 1024 = 6.125 MB. The on-chip
    SRAM is 4 MB. Since 6.125 MB > 4 MB, the tensor will not fit in the fast tensor arena and must be
    tiled, spilling 2.125 MB to the slower 204.8 GB/s external DRAM, significantly increasing latency.
  options:
  - '3.06 MB; it fits. (Misconception: Assumes 1 byte per element/INT8 precision)'
  - '49.0 MB; it does not fit. (Misconception: Confuses bits with bytes, using 16 bytes for FP16)'
  - 6.13 MB; it does not fit.
  - '6.42 MB; it does not fit. (Misconception: Uses 1,000,000 instead of 1024*1024 for MB conversion)'
  correct_index: 2
