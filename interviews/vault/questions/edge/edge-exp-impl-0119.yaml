title: Sizing the Distilled INT8 Student Model
scenario: After successfully distilling a 70B parameter teacher model, you are sizing the resulting INT8
  student model for deployment on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) for on-premise
  inference. The student model requires 2 operations (1 MAC) per parameter per token generated. Calculate
  the maximum number of parameters the student can have to sustain exactly 10,000 tokens per second while
  running at 50% compute utilization of the 400 TOPS limit. Additionally, quantify how much memory will
  remain for KV cache and activations after loading these INT8 weights.
details:
  realistic_solution: The correct approach is to calculate the available operations per second at the
    target utilization, divide by the token generation rate to find operations per token, and derive the
    parameter count. Finally, calculate the INT8 memory footprint and subtract it from the total available
    hardware memory.
  common_mistake: Candidates often confuse TOPS (Tera Operations) with MACs, forgetting to divide by 2
    since 1 MAC equals 2 operations. They also frequently miscalculate the memory footprint by assuming
    FP16 (2 bytes per weight) instead of utilizing the INT8 (1 byte per weight) specified by the hardware
    target.
  napkin_math: '1. Target Compute: 50% of 400 TOPS INT8 = 200 TOPS (200e12 ops/sec).

    2. Ops per token: 200e12 ops/sec / 10,000 tokens/sec = 20e9 ops/token.

    3. Parameter count: 20e9 ops / 2 ops/parameter = 10e9 parameters (10 Billion).

    4. Weight Memory: 10B INT8 parameters = 10 GB.

    5. Remaining Memory: 32 GB (Total LPDDR4x) - 10 GB = 22 GB remaining for KV cache and activations.'
