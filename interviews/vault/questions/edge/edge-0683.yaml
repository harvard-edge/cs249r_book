title: The NUMA-Aware Edge AI
scenario: You're deploying a complex multi-stage ML pipeline on a high-end edge SoC with multiple CPU clusters and integrated NPUs. You observe that scaling the number of CPU threads for pre-processing beyond a certain point actually decreases overall throughput, even though there are available cores.
question: What advanced memory architecture concept might explain this throughput decrease, and how would you mitigate it?
details:
  realistic_solution: It is Non-Uniform Memory Access (NUMA) cache coherence breakdown. Cross-domain L3 reads trigger QPI/interconnect latency blocks causing system stalls. Pinning threads explicitly via strict core affinity mitigates this.
  common_mistake: |
    **The Pitfall:** Assuming throughput degradation is purely a software synchronization or thread contention issue.
    **The Rationale:** Candidates overlook hardware-level Non-Uniform Memory Access (NUMA) domains where cross-cluster memory access incurs massive latency penalties.
    **The Consequence:** Wasting time debugging software locks while the true bottleneck remains unresolved remote memory access.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Local access: 100 cycles
       - Remote access: 300 cycles
    2. **Calculations:**
       - If thread spreading causes 50% remote: (0.5 * 100) + (0.5 * 300) = 200 cycles avg.
    3. **Conclusion & Interpretation:**
       - **Result: 2x latency multiplier penalty.** Throughput directly inverts at scaling limits.
