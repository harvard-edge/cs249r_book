title: MEC Rack Bisection Bandwidth Collapse
scenario: A 5G Multi-access Edge Computing (MEC) rack uses a 2-tier Fat-Tree topology. 16 Leaf switches
  connect to 4 Spine switches. Each leaf has 16x 100GbE downlinks to edge servers. Each leaf only has
  4x 100GbE uplinks to the spines. During a federated learning job across 64 nodes (spread evenly across
  4 leaves), all-reduce bandwidth drops to exactly 25% of expected.
details:
  realistic_solution: Root cause is topological oversubscription. The leaf switches have 16 downlinks
    (1.6 Tbps) but only 4 uplinks (400 Gbps), creating a 4:1 oversubscription ratio. When nodes on different
    leaves communicate during the all-reduce phase, traffic must traverse the spine. Since all 64 nodes
    participate simultaneously, the uplinks are perfectly saturated at a 4:1 ratio. The solution is to
    map the distributed training job to nodes within the same leaf switch (localizing traffic) or upgrade
    the uplinks to achieve a 1:1 non-blocking bisection bandwidth.
  common_mistake: Assuming the Ring All-Reduce algorithm is implemented incorrectly or CPUs are bottlenecking.
  napkin_math: Leaf downlinks = 16 * 100Gbps = 1600 Gbps. Leaf uplinks = 4 * 100Gbps = 400 Gbps. Oversubscription
    ratio = 1600 / 400 = 4:1. Maximum inter-leaf bandwidth per node = 100Gbps / 4 = 25Gbps. This perfectly
    explains the exact 25% performance degradation.
