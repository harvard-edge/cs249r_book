title: MEC Rack Bisection Bandwidth Collapse
scenario: A 5G Multi-access Edge Computing (MEC) rack uses a 2-tier Fat-Tree topology. 16 Leaf switches connect to 4 Spine switches. Each leaf has 16x 100GbE downlinks to edge servers. Each leaf only has 4x 100GbE uplinks to the spines. During a federated learning job across 64 nodes (spread evenly across 4 leaves), all-reduce bandwidth drops to exactly 25% of expected.
question: Why does all-reduce bandwidth drop to exactly 25% in the 2-tier Fat-Tree MEC rack?
details:
  realistic_solution: Root cause is topological oversubscription. The leaf switches have 16 downlinks but only 4 uplinks, creating a 4:1 oversubscription ratio. When nodes on different leaves communicate during the all-reduce phase, traffic must traverse the spine and the uplinks are perfectly saturated.
  common_mistake: |
    **The Pitfall:** Assuming the Ring All-Reduce algorithm is implemented incorrectly or CPUs are bottlenecking.
    **The Rationale:** Candidates immediately look for software or compute issues instead of analyzing the physical network topology.
    **The Consequence:** They miss the fundamental 4:1 topological oversubscription ratio, leading to ineffective software optimization attempts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Leaf downlinks: 16 * 100Gbps.
       - Leaf uplinks: 4 * 100Gbps.
    2. **Calculations:**
       - Downlink capacity = 1600 Gbps.
       - Uplink capacity = 400 Gbps.
       - Oversubscription ratio = 1600 / 400 = 4:1.
       - Inter-leaf bandwidth per node = 100Gbps / 4 = 25Gbps.
    3. **Conclusion & Interpretation:**
       - **The 4:1 topological oversubscription limits bandwidth to exactly 25%. Result: Network-Bandwidth Bound.**
