title: The Self-Attention Latency Trap
scenario: You are an ML Systems Engineer on an autonomous vehicle team. Your perception model, a small Vision Transformer (ViT), is running on a Jetson AGX Orin but is taking 45ms per inference, missing the critical 33ms 'hard real-time' deadline for obstacle detection. This is causing dropped frames and is a safety risk. You diagnose the model and find that while its theoretical FLOPs are low, its memory access patterns during self-attention are stalling the compute units.
question: Which of the following strategies would you apply to solve this latency crisis while best preserving model quality?
details:
  realistic_solution: The correct approach is to replace the Vision Transformer with a CNN architecture built with depthwise separable convolutions, such as a MobileNet or a custom NAS-derived equivalent. ViT's self-attention mechanism, while powerful, has quadratic complexity with the number of patches and results in non-local, random memory accesses that lead to low arithmetic intensity. This makes it memory-bandwidth-bound on edge GPUs like the Orin. In contrast, CNNs, especially those using depthwise separable convolutions, have high arithmetic intensity and local memory access patterns that fully exploit the hardware's specialized tensor cores and high on-chip memory bandwidth.
  common_mistake: |
    **The Pitfall:** Believing that FLOPs are the only metric that matters for latency.
    **The Rationale:** Engineers shrink models with inefficient memory patterns instead of switching to architectures with higher arithmetic intensity.
    **The Consequence:** The model remains memory-bandwidth-bound and fails to utilize the specialized hardware efficiently.
  napkin_math: |
    * Orin specs: 275 TOPS, 204.8 GB/s bandwidth
    * ViT attention complexity: O(N² * D). For 224x224 (N=196 patches), non-local access makes it memory-bound.
    * Standard 3x3 conv (256 in/out): 3 * 3 * 256 * 256 = 589,824 MACs
    * Depthwise separable 3x3 conv: (3 * 3 * 256) + (1 * 1 * 256 * 256) = 2,304 + 65,536 = 67,840 MACs
    * **Depthwise separable conv provides an ~8.7x reduction in compute and memory access, keeping the Orin compute-bound.**
  options:
  - Apply aggressive INT4 quantization to the existing ViT.
  - Use Neural Architecture Search (NAS) to find a smaller, more optimized ViT configuration.
  - Replace the ViT with a CNN built using depthwise separable convolutions.
  - Implement a Mixture-of-Experts (MoE) layer to only activate a subset of the ViT's blocks per frame.
  correct_index: 2
