title: The Watchdog Timer's Deadline
scenario: You are designing the fault tolerance system for a vision-based obstacle avoidance model on
  an autonomous drone. The system runs on a Jetson AGX Orin. To prevent the entire system from hanging
  due to a frozen inference process, you implement a hardware watchdog timer with a 500ms timeout. If
  the application fails to 'pet' the watchdog within this window, the hardware will force a hard reboot.
  Your system requires 150ms to perform a clean shutdown (e.g., log the failure, save state to flash).
  Explain the purpose of the watchdog timer and calculate the absolute maximum permissible inference latency
  your model can have before it risks a hard reboot.
question: "What does the 500ms watchdog do, and what maximum inference latency remains after reserving 150ms for clean shutdown?"
details:
  realistic_solution: The watchdog timer is a 'dead man's switch' for system reliability. The application
    must reset (or 'pet') the timer at the end of every successful processing loop. If the loop hangs,
    the petting stops, the timer expires, and the system reboots. To calculate the maximum allowed inference
    latency, you must subtract the time required for a safe shutdown from the total watchdog timeout.
    This ensures that even in the worst-case scenario where inference takes its maximum allowed time,
    there is still just enough time to perform a clean shutdown before the watchdog forces a hard reset.
    The maximum inference latency is therefore 500ms − 150ms = 350ms.
  common_mistake: Engineers often assume the entire 500ms watchdog timeout is their latency budget for
    inference. They forget that the watchdog is a hard deadline for the *entire* application loop, which
    includes not just inference but also sensor I/O, post-processing, and critically, the time needed
    to safely shut down if a problem is detected. Exceeding this budget means the system doesn't have
    time to perform a clean shutdown, leading to an abrupt, potentially dangerous, hard reboot.
  napkin_math: '1. Identify total budget: The hardware watchdog provides a 500ms window. 2. Subtract the
    time required for a safe shutdown: 500ms − 150ms = 350ms. 3. The application must process the frame
    and ''pet'' the watchdog within this time. Therefore, the absolute maximum inference latency allowed
    before the system assumes a fatal hang and triggers a hard reboot is strictly 350ms.'
  options:
  - 500ms. The entire watchdog window is the latency budget.
  - 650ms. The shutdown time is added to the watchdog timeout.
  - 350ms. The safe shutdown time must be subtracted from the total budget.
  - 150ms. The inference budget is equal to the safe shutdown time.
  correct_index: 2
