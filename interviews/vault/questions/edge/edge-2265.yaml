title: Orin Multi-Modal Fusion Queue Instability
scenario: An autonomous driving pipeline on a Jetson AGX Orin aggregates sensor events
  into a single fusion queue. LiDAR frames arrive deterministically at 10 Hz, and
  Camera frames arrive at 30 Hz. The neural sensor fusion inference takes exactly
  25.5ms per combined event.
question: Analyze the stability of the fusion queue over a 10-second operational window.
visual:
  kind: svg
  path: edge-2265.svg
  alt: A linear chart demonstrating the queue size steadily increasing over the 10
    second window because service is slower than arrival.
  caption: Unstable Queue Growth (ρ > 1)
details:
  realistic_solution: The combined arrival rate is 10 Hz + 30 Hz = 40 events per second,
    meaning an event arrives on average every 25ms. The required service time is 25.5ms
    per event. Because the service time strictly exceeds the inter-arrival time (Utilization
    ρ = 25.5 / 25.0 = 1.02), the queue is fundamentally unstable and will grow deterministically.
    Over 10 seconds, it processes 392 events while 400 arrive, creating a backlog
    of 8 events.
  common_mistake: Mistaking this for an M/M/1 probabilistic queue and trying to find
    a stable steady-state using rho formulas instead of recognizing ρ > 1 means infinite
    deterministic growth.
  napkin_math: Arrival = 40 Hz = 1 event / 25ms. Service = 25.5ms. Backlog = 0.5ms
    per event. 10s * 40 = 400 events. Backlog = 400 * 0.5ms = 200ms = ~8 events.
