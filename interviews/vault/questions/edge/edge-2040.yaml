title: Diagnosing Graceful Degradation on Jetson Orin for Edge ML
scenario: An autonomous delivery robot operating on an NVIDIA Jetson Orin (64 GB LPDDR5, 275 TOPS INT8, 60W) at the edge is running a critical perception model. Under increasing environmental clutter and fluctuating network connectivity, the robot's object detection accuracy starts to drop intermittently, and its path planning becomes erratic. The Jetson Orin's CPU utilization remains around 70%, GPU utilization fluctuates between 60-90%, and memory usage is consistently at 85% with occasional spikes to 95%.
question: How would you diagnose the root cause of the performance degradation and the failure of graceful fallback mechanisms?
details:
  realistic_solution: 'Implement comprehensive telemetry for key system metrics (power draw, temperature, model inference latency per stage, and output quality metrics). Specifically, investigate the degradation ladder implementation: are fallback models being activated? Utilize the Jetson''s built-in power monitoring tools to correlate performance drops with power limits (60W) or thermal events. Introduce synthetic load testing to pinpoint the exact trigger for performance drops and identify which degradation step (e.g., lower resolution input, simpler model) is failing or being improperly triggered.'
  common_mistake: |
    **The Pitfall:** Overlooking I/O blocking during fallback model activation.
    **The Rationale:** Engineers focus solely on CPU/GPU thermal limits, assuming that loading a fallback model simply "works" without validating the disk latency impact of swapping memories.
    **The Consequence:** The fallback mechanism itself stalls the perception pipeline, destroying graceful degradation entirely.
  napkin_math: |
    1. **Swap Requirement:** Activating fallback swaps 1 GB of inactive memory to storage.
    2. **eMMC Write Speed:** ~100 MB/s.
    3. **Latency Cost:** 1 GB (1000 MB) / 100 MB/s = 10 seconds.
    **Result: A 10-second block completely stalls real-time perception, causing erratic path planning.**
