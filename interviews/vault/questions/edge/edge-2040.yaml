title: Diagnosing Graceful Degradation on Jetson Orin for Edge ML
scenario: An autonomous delivery robot operating on an NVIDIA Jetson Orin (64 GB LPDDR5,
  275 TOPS INT8, 60W) at the edge is running a critical perception model. Under increasing
  environmental clutter and fluctuating network connectivity, the robot's object detection
  accuracy starts to drop intermittently, and its path planning becomes erratic. While
  the system doesn't crash, its operational performance degrades significantly, occasionally
  leading to missed deliveries or minor navigation errors. The Jetson Orin's CPU utilization
  remains around 70%, GPU utilization fluctuates between 60-90%, and memory usage
  is consistently at 85% with occasional spikes to 95%. You suspect the graceful degradation
  mechanisms are not functioning as expected. How would you diagnose the root cause
  of the performance degradation and the failure of graceful fallback mechanisms?
question: How would you diagnose the root cause of the performance degradation and
  the failure of graceful fallback mechanisms?
details:
  realistic_solution: 'Implement comprehensive telemetry for key system metrics (CPU/GPU
    utilization, memory pressure, power draw, temperature, model inference latency
    per stage, network latency, and output quality metrics like object detection confidence
    scores) at different operational loads. Use a distributed tracing system to identify
    bottlenecks across the perception and planning pipelines. Specifically, investigate
    the degradation ladder implementation: are fallback models being activated? Is
    their activation causing an unexpected cascade of resource contention? Utilize
    the Jetson''s built-in power monitoring tools to correlate performance drops with
    power limits or thermal events. Introduce synthetic load testing that simulates
    varying degrees of clutter and network conditions to reproduce and pinpoint the
    exact trigger for performance drops and identify which degradation step (e.g.,
    lower resolution input, simpler model, increased quantization) is failing or being
    improperly triggered.'
  common_mistake: Overlooking the interplay between power management profiles, thermal
    throttling, and model performance on edge devices. Often, engineers might focus
    solely on CPU/GPU metrics without considering how power limits (60W constraint)
    and thermal states dynamically reduce effective compute capacity, leading to performance
    drops that appear as degradation but are actually resource throttling, or assuming
    fallbacks are robust without validating their latency impact.
  napkin_math: If activating the fallback model requires swapping 1 GB of inactive memory
    to an onboard eMMC storage (with typical write speeds of ~100 MB/s), the page fault
    handling would introduce a latency of 1 GB / 100 MB/s = 10 seconds. Even with a
    fast NVMe SSD at 2 GB/s, swapping 1 GB takes 500 ms. This completely stalls the
    real-time perception pipeline, destroying the intended graceful degradation and
    causing erratic path planning.
