title: Evaluating Flash Storage Endurance for Edge Checkpointing
scenario: A fleet of Jetson AGX Orin modules on delivery robots run SLAM. To prevent
  data loss from power interruptions, the team proposes saving 4 GB of mission state
  every 5 minutes to an eMMC storage with a write speed of 100 MB/s.
question: Evaluate the feasibility of this checkpointing strategy regarding storage
  lifespan and compute interruption, given the hardware specs.
details:
  realistic_solution: Writing 4 GB at 100 MB/s takes 40 seconds, meaning the system
    spends 13% of its time (40s out of 300s) actively blocking on heavy I/O. Furthermore,
    writing 4 GB every 5 minutes translates to 1.15 TB written per day, which will
    destroy a typical edge eMMC flash drive in weeks due to wear-out.
  common_mistake: Evaluating only the storage capacity and completely ignoring write
    endurance (TBW) and I/O blocking latency.
  napkin_math: 4000 MB / 100 MB/s = 40 s; 4 * (1440/5) = 1152 GB/day
