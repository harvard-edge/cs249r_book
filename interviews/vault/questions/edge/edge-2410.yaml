title: Evaluating Flash Storage Endurance for Edge Checkpointing
scenario: 'A fleet of Jetson AGX Orin modules on delivery robots run SLAM. To prevent data loss from power interruptions, the team proposes saving 4 GB of mission state every 5 minutes to an eMMC storage with a write speed of 100 MB/s.'
question: Evaluate the feasibility of this checkpointing strategy regarding storage lifespan and compute interruption, given the hardware specs.
details:
  realistic_solution: 'This strategy is structurally flawed. Writing 4 GB at 100 MB/s monopolizes the I/O subsystem for 40 seconds, blocking critical paths. Furthermore, writing 1.15 TB per day will exceed the Total Bytes Written (TBW) endurance of typical edge eMMC flash memory in weeks, physically destroying the storage. A delta-encoding strategy, log-structured NVMe, or non-volatile RAM (NVRAM) is required for high-frequency edge checkpointing.'
  common_mistake: |
    **The Pitfall:** Evaluating capacity while ignoring endurance and I/O blocking.
    **The Rationale:** Candidates often verify that 4GB fits on the disk, completely ignoring the flash memory write endurance (TBW) and the latency penalty of slow eMMC storage.
    **The Consequence:** The hardware will physically fail within weeks from flash wear-out, and the application will suffer 13% unresponsiveness.
  napkin_math: |
    **Assumptions & Constraints:**
    - I/O Bandwidth: 100 MB/s.
    - Checkpoint Size: 4000 MB (4 GB).
    - Frequency: Every 5 minutes (288 times/day).

    **Calculations:**
    - I/O Latency: 4000 MB / 100 MB/s = 40 seconds.
    - Total Writes: 4 GB * 288 = 1152 GB/day (1.15 TB/day).

    **Conclusion & Interpretation:**
    - **Result: 1.15 TB/day (I/O-Bound & Hardware Failure)**. eMMC is destroyed by 1.15 TB/day wear, and the system blocks 40 seconds every 5 minutes.
