title: On-Device Fine-Tuning Memory Strategy
scenario: We are implementing continuous on-device fine-tuning for a visual anomaly detection model deployed on an NVIDIA Jetson Orin. However, a standard training forward-pass for a high-resolution batch consumes too much memory, threatening to OOM when the factory control software is running.
question: How would you use freezing and gradient checkpointing to fine-tune on Jetson Orin without OOMing 32 GB shared memory?
details:
  realistic_solution: 'Architect a hybrid approach: freeze early, high-resolution feature extractor layers to permanently drop their forward-pass activations, and apply selective gradient checkpointing to the remaining trainable layers. Evaluate the tradeoff by identifying layers where the activation-size-to-compute ratio is highest, ensuring re-computation does not thermal throttle the 60W Orin.'
  common_mistake: |
    **The Pitfall:** Blindly applying aggressive gradient checkpointing across all layers.
    **The Rationale:** Candidates prioritize lowering memory footprint at all costs to fix the OOM error.
    **The Consequence:** They cause massive re-compute overhead that completely saturates the Jetson Orin's Ampere GPU, inevitably leading to thermal throttling and failing to meet real-time operational constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Limit: 32 GB shared memory, 60W TDP
       - Standard Training Demand: 25 GB FP16 + 10 GB OS = 35 GB
    2. **Calculations:**
       - Initial State: 35 GB (Fails > 32 GB hard limit)
       - Freezing Optimization: Dropping 70% of layers' activations cuts footprint to ~7.5 GB.
       - Selective Checkpointing: Remaining 30% cuts footprint further to ~2 GB.
       - Optimized Total: 2 GB + 10 GB (OS) = 12 GB
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** Applying freezing and targeted checkpointing shrinks the active payload to 12 GB. This aggressively sidesteps the 32 GB shared boundary, averting an OOM crash without driving unrecoverable 60W thermal load from over-recomputation.
