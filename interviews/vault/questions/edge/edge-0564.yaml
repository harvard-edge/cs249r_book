title: 'The Factory Floor EMI Ghost: Fault Tolerance & Checkpointing'
scenario: 'Your edge defect detection system produces correct results on weekends but generates random misclassifications during weekday production. A 500kW variable-frequency drive (VFD) motor starts up 3 meters away when the line runs.'
question: 'How is EMI corrupting inference, and where in the data path is it entering?'
details:
  realistic_solution: 'The VFD generates broadband EMI that radiates into the MIPI CSI-2 camera cable, which acts as an antenna. At 3m, field strength reaches 10 V/m. The induced common-mode voltage exceeds the receiver''s threshold, bypassing the differential signaling CMRR and causing random bit flips in the image data stream before it even reaches the accelerator.'
  common_mistake: |
    **The Pitfall:** Recommending generic solutions like "add a metal enclosure around the device."
    **The Rationale:** Candidates know EMI causes issues but lack the electrical engineering depth to pinpoint exact coupling mechanisms.
    **The Consequence:** A Faraday cage helps but doesn't fix the unshielded CSI-2 cable acting as an antenna, leaving the system vulnerable to data corruption.
  napkin_math: |
    **Assumptions & Constraints:**
    - VFD EMI field at 3m: ~10 V/m.
    - CSI-2 cable length: 15cm (acts as antenna).
    - CMRR at VFD switching harmonics: ~20dB.

    **Calculations:**
    - Induced common-mode voltage = E * l = 10 V/m * 0.15m = 1.5V.
    - Differential noise = 1.5V / 10^(20/20) = 150mV.
    - CSI-2 threshold is ~100mV differential.
    - 150mV > 100mV -> Bit flips occur.

    **Conclusion & Interpretation:**
    - **Result: >100mV (Signal-Bound)**. The CSI-2 cable acts as an antenna, inducing >100mV differential noise and corrupting raw image data.
