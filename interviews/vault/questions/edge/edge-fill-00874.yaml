title: 'Knowledge Distillation on Google Coral Edge TPU: Teacher-Student Model Evaluation'
scenario: Your team is tasked with deploying an image classification model to a fleet of Google Coral
  Edge TPUs (4 TOPS INT8, 2W, INT8 only) for real-time inference. The original high-accuracy teacher model
  is a ResNet-50, which is too large and slow for the Edge TPU's constraints. You've successfully trained
  a smaller, MobileNetV2-based student model using knowledge distillation to achieve comparable accuracy
  while being significantly more efficient. Describe in detail the comprehensive evaluation process you
  would use to compare the original ResNet-50 (hypothetically deployed on a more powerful, server-side
  GPU) against the distilled MobileNetV2 running on the Coral Edge TPU. Your evaluation should go beyond
  just accuracy and consider the platform's specific capabilities and limitations (INT8-only precision,
  limited compute, power consumption, latency). What are the key architectural and operational trade-offs
  you would highlight to stakeholders when presenting your findings?
details:
  realistic_solution: 'The evaluation should be multi-faceted, comparing both models (teacher on server-grade
    GPU vs. student on Coral TPU) across a spectrum of metrics:

    1.  **Accuracy/Quality Metrics:** Beyond Top-1, evaluate Top-5 accuracy, F1-score (especially for
    imbalanced datasets), and precision/recall curves. Assess robustness by introducing common edge-specific
    noise or occlusions to the test data.

    2.  **Inference Latency:** Measure end-to-end inference time (including pre/post-processing) on the
    Coral Edge TPU for the student model. Compare this against the teacher''s latency on its intended
    hardware.

    3.  **Power Consumption & Efficiency:** Monitor the actual power draw of the Edge TPU during inference
    to calculate ''inferences per joule'' or ''inferences per watt''. This is critical for battery-powered
    or energy-constrained edge devices.

    4.  **Model Size & Memory Footprint:** Compare the binary size and run-time memory usage of both models,
    particularly the student on the Coral, ensuring it fits within device constraints.

    5.  **INT8 Quantization Impact:** Specifically analyze how the Coral''s INT8-only precision impacts
    the distilled student model. Evaluate if certain distillation losses (e.g., logit matching vs. feature
    map distillation) perform differently post-quantization and if any post-training quantization-aware
    fine-tuning was required.

    6.  **Throughput:** Measure the maximum inferences per second the student model can achieve on the
    Coral Edge TPU under sustained load.

    7.  **Cost-Benefit Analysis:** Quantify the trade-offs: e.g., ''X% reduction in accuracy for Y% reduction
    in latency and Z% better power efficiency, enabling deployment on 1000s of Edge TPUs instead of 10s
    of server GPUs.'' This frames the technical metrics in business value.'
  common_mistake: A common mistake is to solely focus on the student model's 'top-1 accuracy' on a standard
    validation set, overlooking crucial operational metrics like inference latency per watt, memory footprint,
    or the practical impact of INT8 quantization on specific distillation techniques (e.g., how fine-grained
    feature distillation might be affected by reduced precision). Another pitfall is not rigorously comparing
    the *effective* performance (e.g., F1-score for imbalanced classes, robustness to out-of-distribution
    inputs, or performance on edge-specific noise patterns) of the student vs. teacher in a representative
    production environment, rather than just isolated benchmark scores. Ignoring the full system cost-benefit
    analysis (deployment complexity, maintenance) is also frequent.
  napkin_math: 'Let''s assume the teacher model (ResNet-50) requires 200 GOPS and the student model (MobileNetV2)
    requires 50 GOPS.

    Google Coral Edge TPU specs: 4 TOPS INT8 (4000 GOPS), 2W power consumption.


    **Teacher (ResNet-50) on Server GPU (e.g., 200 TOPS, 100W):**

    -   Theoretical compute time: 200 GOPS / (200 TOPS) = 0.001 seconds (1ms)

    -   Actual observed latency: 50ms

    -   Power efficiency: (1 / 0.050s) / 100W = 0.2 inferences/sec/W


    **Student (MobileNetV2) on Coral Edge TPU (4 TOPS, 2W):**

    -   Theoretical compute time: 50 GOPS / (4 TOPS) = 0.0125 seconds (12.5ms) (ignoring overheads)

    -   Actual observed latency (with overheads): 30ms

    -   Power efficiency: (1 / 0.030s) / 2W ≈ 16.67 inferences/sec/W


    **Comparison:**

    -   The student model on Coral is approximately 16.67 / 0.2 = **83x more power-efficient** than the
    teacher on the server GPU, despite a potential slight drop in accuracy. This efficiency gain is crucial
    for edge deployment and scalability, directly addressing the 2W power budget of the Coral.'
