title: Calculate memory bandwidth overhead for sequential image preprocessing
scenario: 'A Jetson AGX Orin (up to 204.8 GB/s LPDDR5) processes 4K video frames (3840x2160,
  3 channels, 1 byte/channel) at 60 FPS. The pre-processing pipeline involves 3 sequential
  memory-bound operations: read raw frame, normalize and write, then read to format
  into a tensor and write.'
question: Calculate the minimum memory bandwidth consumed by this pre-processing pipeline
  as a percentage of total available bandwidth.
details:
  realistic_solution: One 4K frame is 3840 x 2160 x 3 = 24.88 MB. At 60 FPS, the raw
    data rate is ~1.49 GB/s. The pipeline requires 5 memory accesses per pixel (read
    raw, write norm; read norm, write tensor; read tensor to NPU). 1.49 GB/s x 5 =
    ~7.45 GB/s. This uses 7.45 / 204.8 = ~3.6% of the available memory bandwidth.
  common_mistake: Forgetting that each sequential preprocessing step requires both
    a read and a write to DRAM, drastically underestimating memory traffic.
  napkin_math: 1.49 GB/s * 5 accesses / 204.8 GB/s = 3.6%
