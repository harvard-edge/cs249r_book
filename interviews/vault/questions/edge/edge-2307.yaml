title: Calculate memory bandwidth overhead for sequential image preprocessing
scenario: A Jetson AGX Orin (up to 204.8 GB/s LPDDR5) processes 4K video frames (3840x2160, 3 channels, INT8 input) at 60 FPS. The pre-processing pipeline performs three steps: (1) read raw INT8 frame, (2) normalize to FP16 and write back, (3) read the FP16 normalized buffer and write the final NCHW tensor for the NPU.
question: Calculate the minimum memory bandwidth consumed by this pre-processing pipeline as a percentage of total available bandwidth.
details:
  realistic_solution: 'Frame size INT8 = 3840*2160*3 = 24.88 MB. At 60 FPS raw read rate = 1.49 GB/s. After normalization to FP16, each subsequent buffer is 2x larger = 49.76 MB/frame = 2.99 GB/s. Per-frame DRAM traffic: read INT8 (1.49) + write FP16 (2.99) + read FP16 (2.99) + write FP16 NCHW (2.99) + final read by NPU (2.99) = 13.45 GB/s. Utilization = 13.45 / 204.8 = 6.6% of LPDDR5 bandwidth, nearly 2x the naive 1-byte-per-channel estimate.'
  common_mistake: |
    **The Pitfall:** Forgetting data type expansion during normalization.
    **The Rationale:** Candidates assume bandwidth cost scales linearly with the number of operations without accounting for the byte-size of the intermediate tensors.
    **The Consequence:** Severely underestimating memory bandwidth consumption by ignoring that FP16 doubles the byte traffic downstream.
  napkin_math: |
    * INT8 frame size: 3840 * 2160 * 3 = 24.88 MB
    * FP16 frame size: 49.76 MB
    * Kernel 1 (Normalize): Read INT8 (24.88 MB) + Write FP16 (49.76 MB)
    * Kernel 2 (Format): Read FP16 (49.76 MB) + Write FP16 (49.76 MB)
    * NPU execution: Read FP16 (49.76 MB)
    * Total per-frame traffic: 24.88 + 49.76 * 4 = 223.92 MB
    * Total bandwidth at 60 FPS: 223.92 MB * 60 ≈ 13.44 GB/s
    * **Utilization: 13.44 / 204.8 = ~6.6% of LPDDR5 bandwidth.**
