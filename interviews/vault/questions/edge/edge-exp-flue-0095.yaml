title: Guardrail Memory Footprint on Cloud AI 100
scenario: Your enterprise requires strict guardrails for an on-premise healthcare application deployed
  on a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To satisfy the organizational
  accountability framework, you must run an input toxicity classifier (1B parameters) and an output PII
  redactor (2B parameters) alongside the primary generative model (24B parameters). All models are quantized
  to INT8. Calculate the total memory footprint for the model weights and determine exactly how much memory
  remains available for the KV cache and intermediate activations.
question: "What total INT8 weight memory do the guardrails and 24B model require, and how much of the 32 GB remains for KV cache and activations?"
details:
  realistic_solution: Since all models are quantized to INT8, each parameter requires exactly 1 byte of
    memory. You must sum the parameters of the responsible AI guardrail models and the primary model to
    find the total weight footprint, then subtract this from the accelerator's total memory capacity.
    The remaining memory constraint will dictate the maximum sequence length and batch size the deployment
    can safely support.
  common_mistake: Candidates often forget to convert parameter counts to bytes based on the precision,
    or they incorrectly assume INT8 requires 2 bytes instead of 1 byte. Some may also fail to sum the
    parameter counts of all three models before subtracting from the total hardware capacity.
  napkin_math: '1. Precision conversion: INT8 = 1 byte per parameter.

    2. Total parameters = 1B (input guardrail) + 2B (output guardrail) + 24B (main model) = 27 Billion
    parameters.

    3. Total weight memory footprint = 27B * 1 byte = 27 GB.

    4. Total memory capacity of Qualcomm Cloud AI 100 = 32 GB.

    5. Remaining memory for KV cache/activations = 32 GB - 27 GB = 5 GB.'
