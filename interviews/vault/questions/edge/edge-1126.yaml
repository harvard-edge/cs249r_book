title: 'Edge Systolic Array Analyze: Why Hailo-8 Dataflow Wins for Computer Vision'
scenario: A team is evaluating inference architectures for MobileNetV2 (0.3 GOPS INT8, 3.4M params) at batch=1. They are comparing a conventional edge GPU (60W, 102.4 GB/s) that writes intermediate activations to LPDDR5 with a Hailo-8 dataflow accelerator (2.5W) that keeps activations on its 6MB SRAM.
question: Why does the Hailo-8 architecture achieve significantly better energy efficiency than the GPU for this workload, and how much DRAM traffic is avoided?
details:
  realistic_solution: 'Hailo-8 architecture: 26 TOPS INT8, on-chip SRAM ~6MB, dataflow
    processes entire CNN without going to external DRAM for intermediate activations.
    MobileNetV2: 3.4M params = 3.4MB INT8. Computation: 0.3 GOPS. On conventional
    GPU (e.g., Jetson at 60W): each layer''s activations written to LPDDR5 and read
    back: for MobileNetV2 ~28 layer transitions * 0.5MB avg activation = 14MB * 2
    (read+write) = 28MB DRAM per inference. At 102.4GB/s: 273\u00b5s. Compute: 0.3G / 275
    TOPS = 1.1\u00b5s. Memory-bound. Hailo-8: all activations stay on 6MB SRAM. DRAM only
    for weights (once) and input/output. Energy: Hailo 2.5W vs Jetson 60W = 24x less
    power.'
  common_mistake: |
    **The Pitfall:** Attributing Hailo-8 efficiency entirely to its low power draw.
    **The Rationale:** Candidates often see the 2.5W spec and stop there, without understanding the architectural reason.
    **The Consequence:** Failing to recognize that the dataflow architecture eliminates external memory accesses by keeping activations on-chip through the entire convolution chain.
  napkin_math: |
    1. **Activation memory per layer**: ~0.5MB average.
    2. **Total DRAM traffic for GPU**: 28 layers * 0.5MB * 2 (read+write) = 28MB per inference.
    3. **GPU DRAM time**: 28MB / 102.4GB/s = 273µs. Compute time = 0.3G / 275 TOPS ≈ 1.1µs. Total time ≈ 274µs.
    4. **GPU Energy**: 60W * 274µs = **16.4mJ per inference**.
    5. **Hailo-8 DRAM traffic**: Weights (3.4MB) + Input (0.6MB) + Output (0.06MB) = 4.06MB.
    6. **Hailo-8 time**: 3.4MB / 50GB/s (internal) + compute = 68µs + compute. Total ≈ 68µs.
    7. **Hailo-8 Energy**: 2.5W * 68µs = **0.17mJ per inference**.
    8. **Energy Ratio**: 16.4 / 0.17 ≈ **96x better energy efficiency**.
