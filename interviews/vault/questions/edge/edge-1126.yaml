title: 'Edge Systolic Array Analyze: Why Hailo-8 Dataflow Wins for Computer Vision'
scenario: Explain why the Hailo-8 (26 TOPS INT8, 2.5W) dataflow architecture achieves
  10x better energy efficiency than GPU-based inference for convolutional networks.
  Use arithmetic intensity analysis for MobileNetV2 (0.3 GOPS INT8, 3.4M params) at
  batch=1, and quantify the memory bandwidth difference.
question: Why is Hailo-8 more energy efficient than a GPU for batch-1 MobileNetV2,
  and how much DRAM traffic does its dataflow avoid?
details:
  realistic_solution: 'Hailo-8 architecture: 26 TOPS INT8, on-chip SRAM ~6MB, dataflow
    processes entire CNN without going to external DRAM for intermediate activations.
    MobileNetV2: 3.4M params = 3.4MB INT8. Computation: 0.3 GOPS. On conventional
    GPU (e.g., Jetson at 60W): each layer''s activations written to LPDDR5 and read
    back: for MobileNetV2 ~9 layer transitions * 0.5MB avg activation = 4.5MB * 2
    (read+write) = 9MB DRAM per inference. At 102.4GB/s: 88μs. Compute: 0.3G / 275
    TOPS = 1.1μs. Memory-bound. Hailo-8: all activations stay on 6MB SRAM. DRAM only
    for weights (once) and input/output. Energy: Hailo 2.5W vs Jetson 60W = 24x less
    power.'
  common_mistake: Attributing Hailo-8 efficiency entirely to its low power draw without
    understanding that the dataflow architecture eliminates external memory accesses
    by keeping activations on-chip through the entire convolution chain.
  napkin_math: 'MobileNetV2 activation memory per layer: ~0.5MB average. 28 layers:
    if all written to DRAM: 28*0.5*2=28MB DRAM traffic. Jetson: 28MB/102.4GB/s=273μs
    DRAM + compute 1.1μs = 274μs. 60W * 274μs = 16.4μJ per inference. Hailo-8: weights
    (3.4MB, loaded once) + input (0.6MB) + output (0.06MB) = 4.06MB DRAM. Time: 3.4MB/bus_bw
    (internal, ~50GB/s) + compute = 68μs + compute. 2.5W * 68μs = 0.17μJ per inference.
    Energy ratio: 16.4/0.17 = 96x better energy efficiency. Not 10x but ~96x — the
    dataflow reuse dramatically helps.'
