title: Diagnosing FP16 Overflow on Jetson Orin
scenario: You have deployed a custom object detection model on an NVIDIA Jetson Orin edge device. To maximize
  throughput and stay within the 60W TDP limit, you compiled the model using TensorRT with FP16 precision
  to run on the Ampere GPU. While the model achieved 85% mAP during FP32 training, the FP16 deployment
  on the Jetson Orin suffers a massive drop to 55% mAP, with bounding boxes frequently collapsing. The
  data pipeline and preprocessing on the 32 GB LPDDR5 memory are identical to the training setup.
question: "Why does the FP16 TensorRT deployment on Jetson Orin drop from 85% to 55% mAP with collapsing bounding boxes?"
details:
  realistic_solution: The root cause is likely numerical overflow in the bounding box regression heads
    or intermediate normalization layers, as FP16 has a limited dynamic range (exponent range of 5 bits).
    The solution is to use TensorRT's layer-by-layer precision fallback capabilities, explicitly setting
    the regression heads and sensitive exponential operations to run in FP32, while keeping the heavy
    convolutional backbone in FP16.
  common_mistake: Candidates often assume the accuracy drop is a general quantization issue and suggest
    jumping straight to INT8 calibration or retraining the entire model with QAT. They may overlook the
    specific numerical instability associated with FP16 representation of coordinate regressions, missing
    the need for localized precision debugging.
  napkin_math: The NVIDIA Jetson Orin delivers up to 275 TOPS (INT8), translating to roughly 137.5 TFLOPS
    for dense FP16 on the Ampere GPU. In FP16, the maximum representable value is 65,504. In bounding
    box regression, networks often output exp(x) to predict dimensions. If an intermediate coordinate
    prediction x exceeds 11.09, exp(11.09) = 65,512, which overflows FP16 and results in Inf. Pinning
    the final coordinate decoding layers to FP32 consumes a negligible fraction of the 32 GB LPDDR5 memory
    and costs less than 2% of the FP16 throughput, but entirely resolves the overflow.
