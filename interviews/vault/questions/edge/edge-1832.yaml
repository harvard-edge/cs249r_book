title: Qualcomm Cloud AI 100 Multi-Model Serving Architecture
scenario: You are deploying a video analytics pipeline to an on-premise server equipped with a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The pipeline requires running four independent ResNet-50 variants concurrently to process 16 independent 1080p camera streams at 30 FPS.
question: How would you design model serving for four ResNet-50 variants and 16 camera streams on one Qualcomm Cloud AI 100 to maximize utilization?
details:
  realistic_solution: A unified inference server should be used to manage all four models within a single process, utilizing a Qualcomm-specific backend. Models should be statically loaded into the 32GB device memory since they are small. The server must use dynamic batching to group frames from the 16 streams, minimizing PCIe transfers, and leverage the accelerator's spatial sharing to execute models concurrently.
  common_mistake: |
    **The Pitfall:** Proposing a naive microservice architecture where each model has its own independent serving process communicating via HTTP/gRPC.
    **The Rationale:** Microservices are the standard paradigm for scalable cloud software, making it a natural default for backend engineers.
    **The Consequence:** On a single physical accelerator, independent processes struggle to share device memory safely and incur massive PCIe transfer and serialization overheads, completely bottlenecking the 400 TOPS chip.
  napkin_math: |
    1. **Compute Demand:** 16 streams * 30 FPS = 480 frames/sec.
    2. **ResNet-50 Workload:** ~8 GOPS per frame.
    3. **Total Workload:** 480 frames/sec * 8 GOPS = 3.84 TOPS.
    4. **Result:** The workload requires only **~1% of the 400 TOPS** available. The system is entirely bound by data orchestration and PCIe overhead, mandating a unified, single-process inference server to minimize data movement.
