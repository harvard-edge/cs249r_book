title: Edge Federated Round Straggler Budget
scenario: A factory FL round selects 500 edge devices. Each device trains locally for 4 minutes, but 15% of devices take 12 minutes due to thermal throttling. The coordinator waits for 90% of selected devices. Optimize the round policy.
question: How should the FL coordinator handle 15% thermal stragglers when it waits for 90% of 500 edge devices?
details:
  realistic_solution: Waiting for 90% requires 450 devices. Only 85% finish in 4 minutes, so the coordinator must wait for some throttled devices unless it lowers the quorum or selects more devices. A better policy is over-selection, thermal-aware eligibility, or a lower quorum with reweighting.
  common_mistake: |
    **The Pitfall:** Waiting for all devices or using a fixed quorum without considering thermal stragglers and bias.
    **The Rationale:** Candidates assume network connectivity is the only straggler cause and ignore edge-specific thermal constraints.
    **The Consequence:** Round times are artificially inflated to 12 minutes, destroying FL convergence efficiency.
  napkin_math: |
    1. Assumptions & Constraints:
       - Edge devices: 500
       - Quorum requirement: 90% (450 devices)
       - Fast devices (85%): finish in 4 minutes
       - Throttled devices (15%): finish in 12 minutes
    2. Calculations:
       - Fast devices = 0.85 * 500 = 425 devices
       - Shortfall for quorum = 450 - 425 = 25 devices
    3. Conclusion & Interpretation:
       - **Result: Straggler-Bound. At least 25 throttled devices must finish, pushing the round time toward 12 minutes.**
