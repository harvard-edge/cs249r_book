title: Edge Federated Round Straggler Budget
scenario: A factory FL round selects 500 edge devices. Each device trains locally
  for 4 minutes, but 15% of devices take 12 minutes due to thermal throttling. The
  coordinator waits for 90% of selected devices. Optimize the round policy.
question: How should the FL coordinator handle 15% thermal stragglers when it waits
  for 90% of 500 edge devices?
details:
  realistic_solution: Waiting for 90% requires 450 devices. Only 85% finish in 4 minutes,
    so the coordinator must wait for some throttled devices unless it lowers the quorum
    or selects more devices. A better policy is over-selection, thermal-aware eligibility,
    or a lower quorum with reweighting.
  common_mistake: Waiting for all devices or using a fixed quorum without considering
    thermal stragglers and bias.
  napkin_math: Fast devices = 0.85 x 500 = 425. Need 450 for 90% quorum, so at least
    25 throttled devices must finish, pushing the round toward 12 minutes.
