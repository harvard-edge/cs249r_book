title: Operator Scheduling and Fusion on Edge TPU
scenario: You are deploying a real-time vision model to a Google Coral Edge TPU (4
  TOPS INT8, 2W, USB form factor). Profiling reveals a severe latency bottleneck caused
  by execution graph fragmentation; an unsupported custom operator in the middle of
  the network forces the compiler to schedule the first half of the model on the TPU,
  offload an intermediate tensor to the host CPU for the custom op, and transfer it
  back for the remainder. You need to analyze the scheduling bottleneck and quantify
  the impact of fixing it.
question: What scheduling bottleneck is caused by the unsupported custom operator,
  and how much latency is saved by making the graph fully TPU-compatible?
details:
  realistic_solution: The correct approach is to analyze the Edge TPU compiler logs
    to identify the unsupported operator causing graph fragmentation. By replacing
    the custom operator with a mathematically similar, Edge TPU-supported operation
    (e.g., swapping a custom activation for ReLU), the entire model can be scheduled
    as a single execution subgraph on the TPU, eliminating costly context switches
    and host-device memory transfers.
  common_mistake: Candidates often focus solely on INT8 quantization without analyzing
    the compiled execution graph. They may overlook the catastrophic latency penalty
    of host-device memory transfers caused by scheduling unsupported operators on
    the CPU.
  napkin_math: Assume the intermediate tensor before the CPU offload is 104x104x128
    in INT8, totaling ~1.38 MB. Moving this data to the host and back over the USB
    connection (assumed effective bandwidth of 300 MB/s) takes (1.38 MB * 2) / 300
    MB/s = 9.2 ms in transfer overhead. If the model requires 10 GOPS, the 4 TOPS
    Edge TPU compute time is roughly 2.5 ms. The scheduling fragmentation causes a
    9.2 ms I/O penalty, inflating latency by nearly 4x. Ensuring all operators are
    supported keeps the schedule entirely on the TPU, saving 9.2 ms per inference.
