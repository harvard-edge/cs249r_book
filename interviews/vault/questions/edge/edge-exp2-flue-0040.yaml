title: Depthwise Separable Convolution on Jetson Orin
scenario: You are deploying a high-resolution vision model on an NVIDIA Jetson Orin (275 TOPS INT8, 60W
  TDP) for real-time robotic navigation. To meet strict latency constraints within the power budget, you
  propose replacing a standard 3x3 convolution layer with a depthwise separable convolution. The input
  feature map to this layer has a spatial resolution of 128x128 with 256 channels, and the output requires
  256 channels.
details:
  realistic_solution: The candidate should recall the FLOPs formulas for both standard and depthwise separable
    convolutions and calculate the reduction factor. For a standard convolution, the cost is proportional
    to the spatial dimensions, kernel size squared, input channels, and output channels. A depthwise separable
    convolution splits this into a depthwise step and a pointwise step, dramatically reducing the total
    operations and memory bandwidth required on the Jetson Orin.
  common_mistake: Candidates often forget the exact formula for depthwise separable convolution FLOPs
    or fail to quantify the exact reduction ratio. They might also incorrectly calculate the reduction
    factor by omitting the pointwise 1x1 convolution cost.
  napkin_math: 'Standard 3x3 MACs: 128 * 128 * 256 * 256 * 3 * 3 = 9.66 GMACs.

    Depthwise Separable MACs: Depthwise (128 * 128 * 256 * 3 * 3 = 37.7 MMACs) + Pointwise (128 * 128
    * 256 * 256 * 1 * 1 = 1.07 GMACs) = 1.11 GMACs.

    Reduction Ratio: 1 / (1/K^2 + 1/C_out) = 1 / (1/9 + 1/256) ≈ 8.7x reduction.

    Given the Jetson Orin''s 275 TOPS capacity, reducing this single layer''s cost from ~19.3 GOPS to
    ~2.2 GOPS (multiplying MACs by 2 for ops) frees up ~17 GOPS, leaving plenty of headroom for the Ampere
    GPU/DLA and keeping within the 60W TDP.'
