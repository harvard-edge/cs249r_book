title: Coreset Memory Bottleneck on Dataflow Edge
scenario: To maximize data efficiency, your team curated a coreset of 100,000 INT8 embeddings. You deployed a hybrid model where a CNN extracts features, followed by a nearest-neighbor classifier against this coreset. It compiled successfully for the Hailo-8 dataflow accelerator. In production, inference is heavily bottlenecked, the host memory bus is saturated, and power draw is abnormally low.
question: What is the root cause of this underutilization?
details:
  realistic_solution: The Hailo-8 dataflow architecture lacks local DRAM. The 51.2 MB coreset exceeds on-chip SRAM, forcing continuous host-to-device streaming over PCIe for every frame. This thrashes the host memory bus and starves the compute engines. The solution is knowledge distillation to compress the non-parametric classifier into a standard parametric fully connected layer that fits entirely in SRAM.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the bottleneck as INT8 quantization error or driver overhead.
    **The Rationale:** Engineers apply GPU intuition (which has discrete VRAM) to dataflow accelerators that rely purely on host streaming.
    **The Consequence:** Futile debugging of metric learning functions while the hardware starves for data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coreset: 100,000 samples * 512 dims = 51.2 MB.
       - Target: 60 FPS.
       - Hailo-8: No local DRAM, relies on PCIe Gen3 x4 (~3.9 GB/s max).
    2. **Calculations:**
       - Required bandwidth: 51.2 MB/frame * 60 FPS = 3.07 GB/s.
       - PCIe utilization: 3.07 GB/s / 3.9 GB/s = ~79% of theoretical max (likely 100% of practical goodput).
    3. **Conclusion & Interpretation:**
       - **3.07 GB/s bandwidth saturated**.
       - **Result: Memory-Bandwidth Bound (Data starvation drops power to 0.8W)**.
