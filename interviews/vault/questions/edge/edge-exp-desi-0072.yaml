title: Operator Scheduling Architecture on Cloud AI 100
scenario: Design the operator scheduling architecture for deploying a multi-modal perception pipeline
  on an on-premise Qualcomm Cloud AI 100 inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The
  pipeline consists of several concurrent models that share the same accelerator. Architect a static execution
  schedule that balances parallel operator execution to saturate the 400 TOPS engine while applying aggressive
  memory reuse to avoid exceeding the 32 GB LPDDR4x limit. Evaluate the tradeoffs in your layer fusion
  and execution order strategy to guarantee deterministic latency.
question: "How would you statically schedule concurrent models on Cloud AI 100 to saturate 400 TOPS while reusing memory within 32 GB?"
details:
  realistic_solution: An L5 engineer will design an ahead-of-time (AOT) static scheduler. The architecture
    should utilize liveness analysis to aggressively reuse memory buffers in the 32 GB LPDDR4x for intermediate
    activations across the concurrent models. They will evaluate the tradeoff between vertical layer fusion
    (to reduce memory trips) and horizontal parallel execution (to increase utilization), concluding that
    a predefined memory pool with static offset assignments is essential for deterministic inference.
  common_mistake: Candidates often suggest dynamic scheduling approaches typical of cloud GPUs, which
    introduce unacceptable runtime overhead for a 75W edge accelerator. They also frequently propose maximizing
    parallel execution without realizing that LPDDR4x memory bandwidth will become the primary bottleneck
    before compute is saturated.
  napkin_math: Assuming 3 concurrent models with 4 GB weights each (12 GB total INT8). This leaves 20
    GB of the 32 GB LPDDR4x for activations. If unoptimized parallel execution requires 15 GB of peak
    intermediate activation memory, static scheduling with liveness analysis can overlap non-concurrent
    buffers. By fusing operators, we reduce intermediate writes by roughly 40%, shrinking the peak activation
    footprint to ~9 GB and ensuring the 75W power budget isn't wasted on unnecessary DRAM transactions
    while utilizing the 400 TOPS capacity.
