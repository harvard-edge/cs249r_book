title: 'Coral Edge TPU: Activation Memory & Compute-Memory Tradeoff for Real-time Segmentation'
scenario: You are deploying a real-time semantic segmentation model on an edge TPU (4 TOPS INT8, 2W, INT8 only). You have two INT8 quantized models, `SegNet-Tiny` (sequential, lower overall activation memory but potential peak issues) and `Unet-Mini` (skip connections, higher peak activation memory due to stored feature maps). Both achieve comparable quality. Evaluate which model is more suitable for continuous, low-latency inference. Discuss how activation management strategies influence your choice, given the hardware constraints.
question: Which model do you recommend and why?
details:
  realistic_solution: 'A realistic approach involves analyzing peak activation memory requirements, determined by the largest intermediate tensor size. Given INT8-only hardware, activation storage is simplified to 1 byte per activation. `SegNet-Tiny` is simpler to manage due to its sequential nature, while `Unet-Mini`''s skip connections necessitate storing multiple feature maps concurrently, multiplying peak activation footprint and blowing past tight on-chip SRAM limits.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model parameter count or total operations instead of peak activation memory usage.
    **The Rationale:** Bringing cloud mental models (where VRAM is plentiful) to constrained edge architectures.
    **The Consequence:** Selecting a model that mathematically cannot fit its intermediate feature maps on-chip, triggering OOM errors or fatal latency stalls during inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: INT8 only (1 byte per activation).
       - Unet-Mini: Requires concurrent storage of skip connection feature maps.
       - SegNet-Tiny: Sequential architecture.
    2. **Calculations:**
       - Activation memory = Batch Size * Height * Width * Channels * 1 byte.
       - Peak footprint (Sequential) = Max(Layer_i, Layer_i+1).
       - Peak footprint (Skip Connections) = Layer_i + Layer_Skip + Layer_i+1.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound**. SegNet-Tiny is vastly superior; Unet's skip connections drastically multiply the peak activation footprint, exceeding hard SRAM limits.
