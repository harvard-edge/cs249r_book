title: 'Diagnosing DLA Memory Bottlenecks on Jetson Orin'
scenario: 'You are deploying a high-resolution vision model (4K input) on an NVIDIA Jetson Orin using the DLA accelerator. During profiling, you notice the application is hitting the 60W TDP limit and thermal throttling. The DLA INT8 compute utilization is extremely low (barely 40 TOPS out of the theoretical 275 TOPS), while the 32 GB LPDDR5 memory bandwidth is completely saturated.'
question: 'What is the likely architectural root cause of this severe memory bottleneck?'
details:
  realistic_solution: 'The root cause is a mismatch between the DLA''s dataflow mapping and the layer characteristics. In early layers of a 4K vision model, activation maps are massive while weight tensors are relatively small. If the compiler defaults to a weight-stationary dataflow, the tiny weights are kept in the DLA''s local SRAM while the huge activations are repeatedly fetched from the LPDDR5 memory. This causes massive off-chip memory traffic, starving the systolic array of data and spiking power consumption. The solution is to override the compiler''s tiling configuration to use an output-stationary or row-stationary dataflow for these early layers, maximizing activation reuse in SRAM.'
  common_mistake: |
    **The Pitfall:** Suggesting generic solutions like reducing input resolution or pruning without addressing dataflow.
    **The Rationale:** Candidates often default to standard model compression techniques instead of hardware-specific memory access patterns.
    **The Consequence:** The proposed solution fails to resolve the massive off-chip memory traffic starving the systolic array.
  napkin_math: |
    - **Activation size:** 3840 * 2160 * 64 bytes = ~530 MB.
    - **Weight size:** 3 * 3 * 64 * 64 = ~36 KB.
    - **Effective LPDDR5 bandwidth:** 200 GB/s.
    - **Arithmetic intensity (weight-stationary):** 100 MACs/byte.
    - **Max compute:** 200 GB/s * 100 MACs/byte = **20 Tera-MACs/s (40 TOPS INT8)**.
