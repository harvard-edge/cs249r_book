title: Hailo-8 End-to-End Latency Decomposition
scenario: You are designing an edge traffic analysis system deploying a 30 GOPS INT8
  object detection model on a Hailo-8 accelerator. The dataflow architecture boasts
  26 TOPS and 2.5W power consumption but features no local DRAM, relying entirely
  on streaming inputs and outputs directly from host memory over PCIe. While the raw
  theoretical compute latency is approximately 1.15ms, early prototyping shows a sequential
  end-to-end latency of 15ms per frame. Evaluate the system's pipeline bottlenecks
  and decompose the latency into host preprocessing, bus transfer, accelerator compute,
  and host postprocessing.
question: How would you break down the 15 ms Hailo-8 latency across preprocessing,
  PCIe transfers, accelerator compute, and postprocessing?
details:
  realistic_solution: An L5 engineer systematically breaks down the 15ms into host
    preprocessing (image decoding/resizing), PCIe input streaming, accelerator compute,
    PCIe output streaming, and host postprocessing (like Non-Maximum Suppression).
    They will identify that CPU-bound pre/postprocessing dominates the critical path,
    and propose a solution that pipelines these stages—overlapping host CPU tasks
    with Hailo-8 compute—while switching to a lighter input format (like YUV420) to
    slash PCIe transfer latency.
  common_mistake: Candidates often assume latency on edge accelerators is purely compute-bound
    (GOPS / TOPS) and ignore the bus transfer times and host-CPU dependencies. Because
    the Hailo-8 relies on host streaming rather than local DRAM, ignoring PCIe bandwidth
    constraints and unoptimized CPU-side pre/postprocessing leads to wildly inaccurate
    architectural sizing.
  napkin_math: 'Compute latency: 30 GOPS / 26 TOPS = 1.15 ms. PCIe Transfer In (1080p
    RGB): 1920 * 1080 * 3 bytes = 6.22 MB. Over a PCIe Gen3 x4 bus (~3.9 GB/s effective
    bandwidth), input streaming takes 6.22 MB / 3.9 GB/s = 1.59 ms. Output transfer
    (e.g., 2 MB of raw detection tensors) = 0.51 ms. Total accelerator footprint =
    1.59 ms (in) + 1.15 ms (compute) + 0.51 ms (out) = 3.25 ms. The remaining 11.75
    ms of the 15 ms end-to-end latency is entirely consumed by host-side preprocessing
    (e.g., ~5 ms for resizing) and postprocessing (e.g., ~6.75 ms for NMS).'
