title: Designing a Hybrid Quantization Strategy for Jetson Orin
scenario: Your team is deploying a multi-modal perception pipeline (e.g., a 7B parameter transformer with a CNN backbone) on an NVIDIA Jetson Orin platform constrained to a 60W TDP and 32 GB LPDDR5 shared memory. To hit a strict 30 FPS target, you must leverage the 275 TOPS INT8 capability across both the Ampere GPU and the DLA accelerators.
question: How would you choose PTQ vs QAT, calibration granularity, and GPU/DLA mapping for a 7B multimodal pipeline on Jetson Orin?
details:
  realistic_solution: |
    A strong candidate evaluates the tradeoffs and proposes a heterogeneous strategy: applying INT8 PTQ with per-tensor quantization for the standard CNN backbone mapped to the highly efficient DLA. For the sensitive transformer layers, they recommend QAT with per-channel quantization targeting the Ampere GPU. They will architect a pipeline that explicitly minimizes data movement across the 32 GB shared memory pool, balancing the 60W thermal budget.
  common_mistake: |
    **The Pitfall:** Proposing uniform INT8 PTQ across the entire heterogeneous pipeline.
    **The Rationale:** Standard tutorials apply a single quantization method globally.
    **The Consequence:** Overlooking the stricter operator constraints of the DLA, causing accuracy collapse or forcing costly memory transfers back to the GPU.
  napkin_math: |
    - **FP16 Model Size:** 7B parameters * 2 bytes = 14 GB.
    - **INT8 Model Size:** 7B parameters * 1 byte = 7 GB.
    - **Latency Budget:** 30 FPS = 33 ms per frame.
    - **Memory Bandwidth:** Jetson Orin LPDDR5 = ~200 GB/s.
    - **INT8 Weight Read Time:** 7 GB / 200 GB/s = 35 ms.
    - **The Bottleneck:** Even with INT8, reading weights takes 35 ms, missing the 33 ms SLA. The system is memory-bound, necessitating **INT4 weights** or severe pruning.
