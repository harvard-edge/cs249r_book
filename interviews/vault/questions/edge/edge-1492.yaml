title: Architecting Dataflow for Google Coral Edge TPU
scenario: An inference architecture is being designed for a drone using a Google Coral Edge TPU. The design must account for stringent INT8 quantization to prevent memory thrashing.
question: What tiling and dataflow strategy would you use to optimize a high-resolution CNN for the Coral Edge TPU's INT8 systolic array?
details:
  realistic_solution: The optimal design strictly relies on fully supported INT8 operators to ensure 100% of the graph executes on the Edge TPU. To maximize throughput, the architecture should employ a weight-stationary tiling strategy, heavily optimizing the spatial dimensions of activation maps to fit within the on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Proposing complex operators that aren't supported by the TPU or ignoring the systolic dataflow.
    **The Rationale:** Candidates assume edge NPUs are as flexible as GPUs and fail to architect for weight-stationary constraints.
    **The Consequence:** Unsupported operators force the graph to fall back to the slow host CPU, and suboptimal tiling causes excessive SRAM thrashing, crushing throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute capacity: 4 TOPS (INT8).
       - Frame workload: 10 GOPS/frame.
       - Unoptimized utilization: 20%.
       - Optimized weight-stationary utilization: 80%.
    2. **Calculations:**
       - Theoretical Max FPS: 4,000 GOPS / 10 GOPS = 400 FPS.
       - Naive FPS (Thrashing): 400 FPS * 0.20 = 80 FPS.
       - Optimized FPS: 400 FPS * 0.80 = 320 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 320 FPS achieved with weight-stationary tiling (Memory Access-Bound).**
