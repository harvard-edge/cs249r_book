title: Distilled INT8 Quantization Collapse
scenario: We trained a 1.5B parameter student model using logit matching from a massive teacher to deploy on an NVIDIA Jetson Orin. The student achieves excellent accuracy in FP16. To leverage the Orin's 275 TOPS INT8 engine and Ampere GPU/DLA accelerators within the strict 60W TDP, we apply post-training INT8 quantization. However, after INT8 quantization, the distilled model's accuracy unexpectedly collapses by 20%, whereas an identical architecture trained from scratch drops only 2% under the same quantization.
question: What causes this severe accuracy degradation specific to the distilled model after INT8 quantization?
details:
  realistic_solution: The root cause is that matching teacher logits often forces the student to produce extreme outlier activations to mimic the teacher's unconstrained probability distributions. When these extreme outliers are mapped to a limited INT8 dynamic range, it causes severe clipping and catastrophic precision loss. To diagnose this, you must profile the activation histograms of the distilled model versus the scratch model. The proper fix is to employ Quantization-Aware Distillation (QAD), where simulated INT8 quantization is applied during the distillation process to force hardware-friendly representations.
  common_mistake: |
    **The Pitfall:** Assuming distillation failure or blaming hardware operator support.
    **The Rationale:** Candidates incorrectly assume the distillation process failed to transfer the teacher's knowledge, not realizing that logit matching fundamentally alters the student's internal numerical distributions.
    **The Consequence:** Wasting time tuning the distillation loss weights or trying to run unsupported layers on the CPU, instead of fixing the quantization strategy.
  napkin_math: |
    * **Model Size (FP16):** 1.5B parameters * 2 bytes = 3 GB
    * **FP16 Weight Load Time:** 3 GB / 204 GB/s (Orin memory bandwidth) = 14.7 ms per frame
    * **60 FPS Latency Budget:** 16.6 ms
    * **Remaining Compute Time (FP16):** 16.6 ms - 14.7 ms = 1.9 ms (risks latency misses and maxing out 60W TDP)
    * **Model Size (INT8):** 1.5B parameters * 1 byte = 1.5 GB
    * **INT8 Weight Load Time:** 1.5 GB / 204 GB/s = 7.35 ms per frame
    * **Conclusion:** Successfully utilizing INT8 **halves the weight payload**, leaving ample headroom (9.25 ms) for compute and power.
