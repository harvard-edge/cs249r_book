title: Orin Inference Server Stability
scenario: A Jetson AGX Orin deployed as an edge inference server runs two model replicas behind a load balancer. The aggregate Poisson arrival rate is 200 req/s. Each replica has a service-time distribution with mean 8ms and standard deviation 4ms (CV=0.5).
question: Evaluate per-replica utilization, predict whether the queue is stable, and estimate the expected wait time using the M/G/1 Pollaczek-Khinchine formula.
visual:
  kind: svg
  path: edge-2283.svg
  alt: A chart showing queue length remaining low and stable at 80% utilization before skyrocketing near 100%.
  caption: Queue Stability Evaluation
details:
  realistic_solution: Using M/G/1 queueing theory, we divide the aggregate load between the two replicas. The utilization (ρ) determines stability. Because the service time variance (CV=0.5) is non-zero—driven by the scene-dependent complexity of the vision pre/post-processing—the Pollaczek-Khinchine formula must be applied. The variance acts as a direct latency multiplier, severely inflating the queue wait time well beyond a simple deterministic (M/D/1) model, exposing the hidden cost of unpredictable edge processing.
  common_mistake: |
    **The Pitfall:** Assuming that a stable utilization factor (e.g., ρ = 0.8) guarantees low and stable latency.
    **The Rationale:** Candidates rely on standard M/M/1 or deterministic averages, ignoring the mathematical reality that high variance in processing times geometrically inflates queueing delays.
    **The Consequence:** The edge server experiences devastating latency spikes in production despite "healthy" average CPU utilization metrics, violating SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival rate (λ) per replica: 100 req/s.
       - Service time mean: 8ms (μ = 1 / 0.008 = 125 req/s).
       - Service time standard dev (σ): 4ms = 0.004s.
    2. **Calculations:**
       - Utilization (ρ) = λ / μ = 100 / 125 = 0.8 (Queue is stable since ρ < 1).
       - M/G/1 Wait Time (Wq) = (ρ² + (λ*σ)²) / (2*λ*(1-ρ))
       - Wq = (0.8² + (100 * 0.004)²) / (2 * 100 * 0.2) = (0.64 + 0.16) / 40 = 0.02s (20 ms).
       - M/D/1 Baseline (no variance) = ρ² / (2*λ*(1-ρ)) = 0.64 / 40 = 0.016s (16 ms).
    3. **Conclusion & Interpretation:**
       - **Result: 20ms expected wait time. The system is Queue-Bound; service-time variance inflates expected latency by 25% despite stable utilization.**
