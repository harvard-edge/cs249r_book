title: Orin Inference Server Stability
scenario: A Jetson AGX Orin deployed as an edge inference server runs two model replicas behind a load balancer. The aggregate Poisson arrival rate is 200 req/s. Each replica has a service-time distribution with mean 8ms and standard deviation 4ms (CV=0.5, i.e., not deterministic - vision pre/post-processing varies with scene complexity).
question: Evaluate per-replica utilization, predict whether the queue is stable, and estimate the expected wait time using the M/G/1 Pollaczek-Khinchine formula.
visual:
  kind: svg
  path: edge-2283.svg
  alt: A chart showing queue length remaining low and stable at 80% utilization before skyrocketing near 100%.
  caption: Queue Stability Evaluation
details:
  realistic_solution: 'Per replica: lambda=100 req/s, mu=125 req/s, rho=0.8 (stable). P-K mean wait Wq = (rho^2 + (lambda*sigma)^2) / (2*lambda*(1-rho)) = (0.64 + (100*0.004)^2) / (2*100*0.2) = (0.64 + 0.16)/40 = 20 ms. M/D/1 with same mean: Wq_D = rho^2/(2*lambda*(1-rho)) = 0.64/40 = 16 ms. The 25% wait inflation comes from the CV=0.5 variance term, not from utilization.'
  common_mistake: |
    **The Pitfall:** Stopping at ρ=0.8 and concluding the system latency is acceptable.
    **The Rationale:** Candidates rely on average deterministic processing times, ignoring that variance in service time (from scene complexity) inflates wait time via queueing dynamics.
    **The Consequence:** The system experiences unexplained latency spikes in production because the theoretical model failed to account for the mathematical impact of variance.
  napkin_math: |
    1. Calculate per-replica arrival rate (λ): 200 req/s / 2 = 100 req/s.
    2. Calculate service rate (μ): 1 / 0.008s = 125 req/s.
    3. Evaluate stability (ρ): ρ = λ / μ = 100 / 125 = 0.8. (Since ρ < 1, the queue is stable).
    4. Calculate M/G/1 expected wait time (Wq):
       - Wq = (ρ^2 + (λ * σ)^2) / (2 * λ * (1 - ρ))
       - Wq = (0.8^2 + (100 * 0.004)^2) / (2 * 100 * (1 - 0.8))
       - Wq = (0.64 + 0.16) / 40 = 0.8 / 40 = 0.02s = 20 ms.
    5. Calculate M/D/1 baseline wait time (Wq_D):
       - Wq_D = ρ^2 / (2 * λ * (1 - ρ)) = 0.64 / 40 = 0.016s = 16 ms.
    **The variable service time (CV=0.5) adds a 25% latency tax (20ms vs 16ms), even though the queue remains stable at 80% utilization.**
