title: Orin Inference Server Stability
scenario: A Jetson AGX Orin deployed as an edge inference server runs two model replicas
  behind a load balancer. The aggregate Poisson arrival rate is 200 req/s. Each replica
  has a service-time distribution with mean 8ms and standard deviation 4ms (CV=0.5,
  i.e., not deterministic - vision pre/post-processing varies with scene complexity).
question: Evaluate per-replica utilization, predict whether the queue is stable,
  and estimate the expected wait time using the M/G/1 Pollaczek-Khinchine formula.
  Compare against an M/D/1 (deterministic) baseline and quantify the latency tax
  imposed by the variable service time.
visual:
  kind: svg
  path: edge-2283.svg
  alt: A chart showing queue length remaining low and stable at 80% utilization before
    skyrocketing near 100%.
  caption: Queue Stability Evaluation
details:
  realistic_solution: 'Per replica: lambda=100 req/s, mu=125 req/s, rho=0.8 (stable).
    P-K mean wait Wq = (rho^2 + (lambda*sigma)^2) / (2*lambda*(1-rho)) = (0.64 + (100*0.004)^2)
    / (2*100*0.2) = (0.64 + 0.16)/40 = 20 ms. M/D/1 with same mean: Wq_D = rho^2/(2*lambda*(1-rho))
    = 0.64/40 = 16 ms. The 25% wait inflation comes from the CV=0.5 variance term,
    not from utilization.'
  common_mistake: Stopping at rho=0.8 and concluding the system is "fine," ignoring
    that variance in service time inflates wait time even at the same average utilization.
  napkin_math: 'rho = 100*0.008 = 0.8; M/G/1 Wq = (0.8^2 + (100*0.004)^2) / (2*100*(1-0.8))
    = 0.8/40 = 20 ms; M/D/1 Wq = 16 ms; CV=0.5 adds 25% latency tax.'
