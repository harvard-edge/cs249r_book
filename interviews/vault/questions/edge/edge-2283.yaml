title: Orin Inference Server Stability
scenario: A Jetson AGX Orin deployed as an edge inference server handles bursts of
  object detection requests. The arrival rate is 100 requests per second, and the
  deterministic service time is 8ms per request.
question: Evaluate the utilization factor of the processor to predict if the request
  queue will stabilize or grow infinitely.
visual:
  kind: svg
  path: edge-2283.svg
  alt: A chart showing queue length remaining low and stable at 80% utilization before
    skyrocketing near 100%.
  caption: Queue Stability Evaluation
details:
  realistic_solution: The arrival rate (lambda) is 100 req/s. The service rate (mu)
    is 1 / 0.008s = 125 req/s. The utilization factor (rho) is lambda / mu = 100 /
    125 = 0.8. Because rho < 1.0, the system handles incoming requests faster than
    they arrive, guaranteeing long-term queue stability.
  common_mistake: Inverting the utilization fraction (125/100 = 1.25) and incorrectly
    stating the system is overloaded and unstable.
  napkin_math: rho = 100 * 0.008 = 0.8 < 1.0
