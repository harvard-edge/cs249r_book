title: Latency Budgeting for Defect Detection on Edge TPU
scenario: You are tasked with specifying the end-to-end pipeline architecture for a defect detection system on a manufacturing line using a Google Coral Edge TPU (4 TOPS INT8, USB form factor, 2W power limit). The product line moves quickly, requiring an end-to-end latency of no more than 25ms per frame from camera capture to triggering a mechanical reject arm over a local network.
question: How would you allocate the 25ms camera-to-reject-arm latency budget for a Coral Edge TPU defect detection pipeline?
details:
  realistic_solution: A robust specification must explicitly decompose the 25ms budget across all pipeline stages, accounting for data movement. The design should specify capturing the image directly into a pre-allocated buffer, performing lightweight CPU preprocessing (resizing and INT8 quantization), and compiling the entire model strictly for the Edge TPU to avoid CPU fallbacks. Post-processing must be highly optimized, potentially using a C++ extension, to ensure the overall budget is maintained.
  common_mistake: |
    **The Pitfall:** Focusing solely on the TPU's peak 4 TOPS performance and theoretical inference time.
    **The Rationale:** Candidates neglect the critical latency bottlenecks of USB data transfer, CPU-bound INT8 quantization, and NMS post-processing.
    **The Consequence:** The system misses the strict 25ms latency deadline because data movement dominates the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 224x224x3 image. INT8 Tensor size = 150.5 KB.
    - Total Latency Budget: 25ms.
    - USB 3.0 transfer speed: 400 MB/s.
    
    **Calculations:**
    - USB 3.0 transfer time = 150.5 KB / 400 MB/s = 0.38ms (budget 1ms for overhead).
    - TPU Inference (quantized MobileNetV2): ~1 GOP. Actual compute is ~3ms due to memory bandwidth.
    - Pipeline Budget: Capture (5ms) + CPU Pre (3ms) + USB Tx (1ms) + TPU Inf (3ms) + USB Rx (1ms) + CPU Post (4ms) + Network (5ms).
    
    **Conclusion & Interpretation:**
    - **Result: 22ms (Data-Movement Bound)**. The pipeline heavily relies on minimal data transfer to meet the 25ms end-to-end latency budget.
