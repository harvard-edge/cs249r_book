title: 'Dataset Curation: Mastery — Edge-Aware Data Curation for Continual Learning'
scenario: Your object detection model on an edge device experiences concept drift after 6 months of deployment (new product types). The device has 8GB available for data storage.
question: How would you design the 8GB replay buffer and update schedule to adapt to new product classes without catastrophic forgetting?
details:
  realistic_solution: 'Experience replay with reservoir sampling. Store compressed features (not raw images) for old classes. New class data: collect 500 examples/class via active learning. Interleave old (80%) and new (20%) during fine-tuning. Update model monthly.'
  common_mistake: |
    **The Pitfall:** Fine-tuning only on new data or storing raw images for replay.
    **The Rationale:** Candidates ignore catastrophic forgetting or fail to calculate the storage inefficiency of raw images.
    **The Consequence:** The model forgets original classes entirely, or the replay buffer exhausts the 8GB storage budget instantly.
  napkin_math: |
    * Storage budget: 8GB.
    * New classes: 10 types * 500 images * 310KB JPEG = ~1.55GB.
    * Replay buffer available: 8GB - 1.55GB = 6.45GB.
    * Compressed features (ResNet50): 2048 floats * 4 bytes = 8KB/image.
    * Capacity: 6.45GB / 8KB = ~806K replay examples (~10K per original class).
    * Fine-tuning 1M samples * 5 epochs at batch=32 = 156K steps.
    * 275 TOPS for 7M model = 42M FLOPs/image -> 5M total images * 42M FLOPs = 210 TFLOPs.
    * **Compute time is 210 TFLOPs / 275 TOPS = ~0.76 seconds pure compute; monthly updates are highly feasible.**
