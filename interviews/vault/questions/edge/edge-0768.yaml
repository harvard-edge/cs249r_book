title: The Silent Drift
scenario: You manage a fleet of 5,000 industrial inspection robots operating in remote factories with
  intermittent internet access. They use a vision model to detect defects. How do you monitor their ML
  model's performance and detect drift or sensor failures without continuous cloud connectivity, ensuring
  issues are caught before critical errors accumulate?
details:
  realistic_solution: "Implement robust on-device telemetry and anomaly detection:\n  1.  **On-Device\
    \ Feature Extraction & Metrics:** Instead of raw data, extract key inference metrics and input data\
    \ statistics locally. This includes model confidence scores, prediction distributions, inference latency,\
    \ GPU/CPU utilization, sensor health metrics (e.g., camera frame drops, temperature), and input data\
    \ characteristics (e.g., mean pixel values, brightness, contrast, feature vector centroids).\n  2.\
    \  **Local Anomaly Detection:** Apply lightweight statistical methods (e.g., Exponentially Weighted\
    \ Moving Average (EWMA), Z-score, or simple thresholding) to these metrics to detect deviations from\
    \ a learned baseline. For example, a sudden drop in average confidence or a shift in the distribution\
    \ of predicted classes could indicate model drift.\n  3.  **Aggregated Telemetry:** Aggregate detected\
    \ anomalies, summary statistics (e.g., daily min/max/avg for metrics), and event logs, rather than\
    \ raw data. These smaller payloads are buffered and uploaded during connectivity windows.\n  4.  **Fallback\
    \ Mechanisms:** If a critical anomaly is detected (e.g., model output becomes nonsensical), the device\
    \ should be able to switch to a fallback model, a safe mode, or trigger a local alert for human intervention."
  common_mistake: '"Store all raw data and upload when connected." This is often impractical due to storage,
    bandwidth, and privacy constraints, especially for high-volume sensor data like video.'
  napkin_math: Storing 10 seconds of 1080p RGB video (at ~3MB/s) for 24 hours is approximately 259GB.
    Storing metadata (confidence, bounding box, timestamps, small input features) for 10 FPS for 24 hours
    is typically under 100MB. This 2500x reduction in data volume makes local storage and intermittent
    upload feasible.
