title: The Silent Drift
scenario: A fleet of 5,000 industrial inspection robots with intermittent internet access uses a vision model to detect defects.
question: How do you monitor their ML model's performance and detect drift or sensor failures without continuous cloud connectivity, ensuring issues are caught early?
details:
  realistic_solution: Implement an on-device anomaly detection telemetry agent. Extract lightweight metrics locally (e.g., confidence score distributions, bounding box entropy, GPU thermals). Apply statistical thresholding (like EWMA or Z-scores) against a baseline on the device itself. Batch these small summary payloads and upload them asynchronously. If a severe drift anomaly triggers locally, engage a safe-mode fallback and flag the payload for priority upload.
  common_mistake: |
    **The Pitfall:** Attempting to store and upload raw video frames.
    **The Rationale:** Assuming cloud-side data lakes are required to perform proper drift analysis via manual review.
    **The Consequence:** Filling local storage in hours and permanently saturating the intermittent network links, leaving the devices unmonitored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video: 1080p RGB at ~3 MB/s.
    - Telemetry metadata: ~100 MB / 24 hours.

    **Calculations:**
    - Raw Video Storage (24h): 3 MB/s * 86,400s = ~259,200 MB = 259.2 GB.
    - Compression Ratio: 259.2 GB / 0.1 GB = 2592x reduction.

    **Conclusion & Interpretation:**
    - **Result: 2592x reduction (Storage-Bound)**. Telemetry aggregation achieves a 2500x data reduction, making disconnected monitoring viable.
