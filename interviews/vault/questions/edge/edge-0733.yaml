title: 'The Overnight OTA Update: OTA & Firmware Updates'
scenario: You're an engineer on an autonomous vehicle team. A critical perception model update needs to
  be pushed to the fleet overnight. The full container image for the update is 800 MB. For safety, the
  update only occurs when the vehicle is parked in a garage with a stable cellular connection of at least
  40 Mbps. Calculate the minimum time required for a vehicle to download this update.
question: "What is the minimum time to download an 800 MB container image over a 40 Mbps cellular connection?"
details:
  realistic_solution: The correct approach requires standardizing the units. Since network bandwidth is
    in Megabits per second (Mbps), you must first convert the 800 MegaByte (MB) update size into Megabits
    (Mb). After that, it's a simple division to find the total time in seconds.
  common_mistake: The most common mistake is confusing Megabits (Mb) and MegaBytes (MB). Network bandwidth
    is specified in bits per second (Mbps), while file sizes are given in Bytes (MB). Engineers often
    forget the 8x conversion factor and divide the file size directly by the network speed, resulting
    in a wildly optimistic download time that is 8 times too small.
  napkin_math: '1. Convert update size to Megabits: 800 MB * 8 bits/byte = 6400 Mb'
  options:
  - 20 seconds
  - 2.5 seconds
  - 160 seconds
  - 1280 seconds
  correct_index: 2
