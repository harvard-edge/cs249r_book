title: 'Dataflow Tradeoffs on Qualcomm AI 100'
scenario: 'You are deploying a large language model inference pipeline on an on-premise server utilizing the Qualcomm Cloud AI 100 accelerator. The model''s bottleneck is the attention mechanism''s projection matrices.'
question: 'Should the LLM projection matrices use weight-stationary or output-stationary dataflow, and how should you tile them?'
details:
  realistic_solution: 'For LLM projection layers where batch sizes are small but sequence lengths are long, Output-Stationary (OS) is often preferred to keep the high-precision partial sums in the local SRAM, preventing expensive round-trips to the 32 GB LPDDR4x memory. The tiling strategy must be heavily optimized to maximize arithmetic intensity; the tiles must be sized such that all operands (activations and weights) fit in the on-chip SRAM to continuously feed the compute engines, bridging the gap between the 400 TOPS compute and the LPDDR4x bandwidth.'
  common_mistake: |
    **The Pitfall:** Reflexively choosing Weight-Stationary dataflow.
    **The Rationale:** Candidates assume WS is always best because it is typical for CNNs on edge NPUs, failing to recognize that LLM attention layers involve massive intermediate activation matrices.
    **The Consequence:** Causes severe memory bandwidth bottlenecks as high-precision partial sums are repeatedly written to and read from the much slower LPDDR4x memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - AI 100 delivers 400 TOPS (400e12 INT8 ops/sec).
    - LPDDR4x bandwidth is around 136 GB/s.
    - Matrix multiplication (M*K x K*N) ops = 2*M*N*K, data = M*K + K*N + M*N bytes.

    **Calculations:**
    - Required arithmetic intensity = (400e12 ops/sec) / (136e9 bytes/sec) ≈ 2941 ops/byte.
    - Tile sizes must satisfy: 2/(1/M + 1/N + 1/K) > 2941.

    **Conclusion & Interpretation:**
    - **Result: >2941 ops/byte (Memory-Bound)**. Output-Stationary dataflow keeps partial sums on-chip, preventing the 136 GB/s LPDDR4x bandwidth from draining.
