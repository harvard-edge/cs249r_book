title: Sparse Format for Edge Model Weights
scenario: Your pruned MobileNetV3 model has 70% sparsity (70% of weights are zero). On a Jetson Orin (32
  GB LPDDR5, 60W), the model occupies 15 MB in dense format. Should you store the weights in a sparse
  format (CSR or bitmap+values), and how does this affect inference latency vs memory savings?
details:
  realistic_solution: 'Dense format: 15 MB of weights, all stored including zeros. Sparse CSR: store only
    non-zero values (30% of 15 MB = 4.5 MB) plus row pointers and column indices. CSR overhead: 4.5M non-zero
    values × 4 bytes (col index) + row pointers = ~18 MB total — LARGER than dense because index overhead
    exceeds zero storage savings at 70% sparsity. CSR only wins above ~90% sparsity for FP32 weights.
    Bitmap format: 1 bit per weight for zero/non-zero mask (15M bits / 8 = 1.875 MB) + 4.5 MB values =
    6.375 MB. Saves 57.5% memory. But inference: GPU sparse kernels (cuSPARSE) typically achieve only
    30-50% of dense Tensor Core throughput because of irregular memory access patterns. On Jetson Orin
    with its Ampere GPU: dense GEMM at 60 TOPS INT8 vs sparse at ~25 TOPS. The ~8.6 MB memory saving is
    modest vs 32 GB LPDDR5. Keep dense unless memory is critical (multiple models loaded simultaneously).'
  common_mistake: Assuming sparse storage always wins because you store fewer values. CSR format adds
    index overhead, and sparse matrix operations on GPU are often slower than dense operations because
    they lose memory coalescing and Tensor Core utilization.
  napkin_math: 'Dense: 15 MB storage, inference at 60 TOPS INT8. Sparse CSR: values = 4.5 MB + col indices
    ≈ 18 MB total (worse than dense). Sparse bitmap: values = 4.5 MB + bitmap = 1.875 MB (15M bits / 8)
    = 6.375 MB total (57.5% savings), inference at 25 TOPS. 2:4 structured sparsity (Ampere native): 7.5
    MB (50% savings), inference at 60 TOPS (Tensor Core supported). Winner: if sparsity is structured
    2:4, use it — same speed, half memory. If unstructured 70%, keep dense.'
