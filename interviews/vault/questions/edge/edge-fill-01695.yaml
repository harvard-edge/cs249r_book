title: Fairness-Aware Model Deployment on Edge AI Accelerator
scenario: You are tasked with deploying a critical credit scoring model onto a fleet of Qualcomm Cloud
  AI 100 accelerators, each with 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power budget.
  The model's predictions must adhere to strict fairness requirements, specifically demonstrating demographic
  parity and equalized odds across multiple protected attributes (age, gender, ethnicity) and their intersections.
  Design a system for on-device inference that not only meets throughput targets but also continuously
  monitors and reports fairness metrics without exceeding the given hardware constraints.
question: "How would you design on-device inference and lightweight fairness monitoring for demographic parity and equalized odds on Cloud AI 100?"
details:
  realistic_solution: 'A realistic solution would involve a two-pronged approach: optimizing the base
    model for efficiency while pre-calculating and storing minimal, critical statistical summaries on
    the Qualcomm Cloud AI 100 during inference. A lightweight fairness monitoring module, tightly integrated
    with the inference pipeline, would periodically aggregate these summaries to estimate demographic
    parity and equalized odds for pre-defined subgroups. For intersectional fairness, instead of storing
    every possible combination, a stratified sampling or approximation method could be used, or a subset
    of high-risk intersections could be prioritized for direct monitoring. Batch processing on the AI
    100''s INT8 capabilities would be leveraged for throughput, and a separate, less frequent off-device
    process (e.g., a central server) would handle deeper, more comprehensive subgroup analysis and model
    retraining if significant fairness drifts are detected, minimizing the on-device computational burden.'
  common_mistake: Candidates often propose post-hoc bias mitigation techniques without considering their
    computational overhead for real-time edge deployment or fail to address intersectional fairness, focusing
    only on individual protected attributes. Another common mistake is assuming infinite memory or compute
    for storing and processing fairness statistics directly on the constrained edge device, leading to
    impractical solutions.
  napkin_math: "Given the 32 GB LPDDR4x, imagine you need to store prediction results and ground truth\
    \ labels for $N$ recent inferences to compute fairness metrics. If each inference requires storing\
    \ a prediction (1 byte INT8), a true label (1 byte INT8), and 5 protected attributes (e.g., 5 bytes\
    \ INT8), that's ~7 bytes per inference. To track demographic parity for $P$ protected groups and equalized\
    \ odds (true/false positive rates) for $P$ protected groups and $C$ classes, you'd need to store counts\
    \ for each. If you want to monitor over the last $10^6$ inferences, that would be $7 \times 10^6$\
    \ bytes = 7 MB. This shows storing raw data is feasible. Now consider the computational cost: If calculating\
    \ 2 fairness metrics (e.g., demographic parity and equalized odds) for 5 protected attributes and\
    \ their 20 significant intersections, each requiring a pass over $10^6$ records, and assuming 100\
    \ INT8 operations per metric per record, that's $2 \times 25 \times 10^6 \times 100$ ops = $5 \times\
    \ 10^9$ INT8 operations. With 400 TOPS ($400 \times 10^{12}$ ops/sec), this calculation is instantaneous,\
    \ showing that the bulk of the challenge lies in memory access patterns and efficient data structures,\
    \ not raw FLOPS for simple metric calculation."
