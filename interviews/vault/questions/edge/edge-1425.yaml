title: Batch Size Impact on Compute Utilization
scenario: A team is deploying a quantized object detection model on a Qualcomm Cloud AI 100 on-premise inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During profiling, they notice that with a batch size of 1, the accelerator only achieves 40 actual TOPS in sustained throughput. However, when the batch size is increased to 32, the sustained throughput dramatically increases to 320 TOPS.
question: Why does Cloud AI 100 utilization jump from 40 sustained TOPS at batch size 1 to 320 TOPS at batch size 32?
details:
  realistic_solution: The discrepancy is caused by the execution being strictly memory-bandwidth bound at batch size 1 and transitioning to compute-bound at higher batch sizes. At batch 1, the accelerator must fetch the entire model weight matrix from the LPDDR4x memory for a very small number of MAC (multiply-accumulate) operations, leaving the massive 400 TOPS INT8 compute engines idle while waiting for data. Increasing the batch size amortizes the memory read cost by reusing the loaded weights across multiple input samples, significantly increasing the arithmetic intensity and allowing the accelerator to fully utilize its compute cores.
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling or the 75W TDP limit for the poor batch 1 performance.
    **The Rationale:** Candidates see a massive drop from 400 theoretical TOPS and assume physical throttling is the culprit.
    **The Consequence:** They miss the fundamental architectural reality of LPDDR4x memory bandwidth bottlenecking the stream of weights for a single input.
  napkin_math: |
    **Assumptions & Constraints:**
    - Qualcomm Cloud AI 100: 400 peak TOPS.
    - Layer weight matrix: 10 MB.

    **Calculations:**
    - At batch size 1: 40 TOPS / 400 peak TOPS = 10% compute utilization.
    - At batch size 32: 320 TOPS / 400 peak TOPS = 80% compute utilization.
    - At batch 1, the arithmetic intensity is ~1 MAC/byte.
    - At batch 32, the 10 MB weight load is used for 32 inputs, increasing intensity to ~32 MACs/byte.

    **Conclusion & Interpretation:**
    - **Result: 80% compute utilization (Compute-Bound)**. This 32x increase in data reuse overcomes the LPDDR4x bandwidth limit and saturates the 400 TOPS engine.
