title: Batch Size Impact on Compute Utilization
scenario: A team is deploying a quantized object detection model on a Qualcomm Cloud
  AI 100 on-premise inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP).
  During profiling, they notice that with a batch size of 1, the accelerator only
  achieves 40 actual TOPS in sustained throughput. However, when the batch size is
  increased to 32, the sustained throughput dramatically increases to 320 TOPS. Explain
  why this massive discrepancy in compute utilization occurs and what architectural
  hardware constraints are causing the low performance at batch size 1.
question: Why does Cloud AI 100 utilization jump from 40 sustained TOPS at batch size
  1 to 320 TOPS at batch size 32?
details:
  realistic_solution: The discrepancy is caused by the execution being strictly memory-bandwidth
    bound at batch size 1 and transitioning to compute-bound at higher batch sizes.
    At batch 1, the accelerator must fetch the entire model weight matrix from the
    LPDDR4x memory for a very small number of MAC (multiply-accumulate) operations,
    leaving the massive 400 TOPS INT8 compute engines idle while waiting for data.
    Increasing the batch size amortizes the memory read cost by reusing the loaded
    weights across multiple input samples, significantly increasing the arithmetic
    intensity and allowing the accelerator to fully utilize its compute cores.
  common_mistake: Candidates often blame thermal throttling or the 75W power limit
    without analyzing the arithmetic intensity. They might also incorrectly assume
    the compute cores are fully occupied but stalling on instruction fetching, rather
    than identifying the fundamental memory bandwidth bottleneck inherent to LPDDR4x
    when streaming weights for a single input.
  napkin_math: 'At batch size 1: 40 TOPS / 400 peak TOPS = 10% compute utilization.
    At batch size 32: 320 TOPS / 400 peak TOPS = 80% compute utilization. Assume a
    layer has an INT8 weight matrix of 10 MB. At batch 1, the arithmetic intensity
    is ~1 MAC/byte. At batch 32, the same 10 MB weight load is used for 32 inputs,
    increasing the arithmetic intensity to ~32 MACs/byte. This 32x increase in data
    reuse allows the system to overcome the limited LPDDR4x bandwidth and saturate
    the 400 TOPS compute capacity.'
