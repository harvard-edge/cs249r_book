title: On-Device LoRA Gradient Checkpointing Tradeoffs
scenario: We are implementing on-premise LoRA fine-tuning for a 7B parameter LLM on a single Qualcomm
  Cloud AI 100 inference accelerator to personalize a customer service bot. The accelerator features 32
  GB of LPDDR4x memory, 400 TOPS INT8 compute, and a strict 75W power envelope. During the forward pass
  with a sequence length of 4096 and a batch size of 2, the system runs out of memory before the backward
  pass can begin. How would you diagnose this bottleneck and quantify the compute-memory tradeoff of applying
  gradient checkpointing to fit the workload within the hardware constraints?
question: "How would you diagnose this bottleneck and quantify the compute-memory tradeoff of applying gradient checkpointing to fit the workload within the hardware constraints?"
details:
  realistic_solution: A strong candidate will first break down the memory usage into weights, optimizer
    states, and forward-pass activations, calculating the activation footprint per layer. They will identify
    that storing all intermediate activations for the entire network exceeds the remaining memory capacity
    of the accelerator. The correct approach is to implement gradient checkpointing (activation recomputation)
    at specific layer boundaries, leveraging the ample 400 TOPS compute to handle the extra forward pass
    while drastically reducing peak memory to fit within the 32 GB limit.
  common_mistake: Candidates often immediately suggest reducing batch size or sequence length without
    analytically quantifying the activation memory footprint. They may also wrongly assume INT8 quantization
    applies equally to fine-tuning activations, or fail to account for the compute overhead of checkpointing
    against the 400 TOPS capacity.
  napkin_math: 'Base memory: 7B INT8 model weights = 7 GB. Remaining capacity: 32 GB - 7 GB = 25 GB. FP16
    activation memory per layer (batch=2, seq_len=4096, hidden=4096) is roughly 34 bytes per token, yielding
    2 * 4096 * 4096 * 34 bytes ≈ 1.14 GB per layer. For 32 layers, total activation memory = 36.5 GB,
    causing an OOM (7 + 36.5 = 43.5 GB > 32 GB). With gradient checkpointing every 6 layers (√32), peak
    activation memory drops to (36.5 GB / 6) + (1.14 GB * 6) ≈ 12.9 GB. Total peak memory is now 7 GB
    + 12.9 GB = 19.9 GB, fitting safely within the 32 GB LPDDR4x limit.'
