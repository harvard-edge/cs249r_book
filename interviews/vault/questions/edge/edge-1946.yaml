title: Hardware-aware NAS for Real-time Object Detection on NVIDIA Jetson Orin
scenario: You are leading a project to deploy a real-time object detection model on an NVIDIA Jetson Orin. The primary challenge is to achieve ultra-low latency inference (targeting <30ms per frame) while maintaining high accuracy. Initial neural architecture search (NAS) results yielded models that are too large or too slow for the hardware profile.
question: How would you design and implement a hardware-aware NAS strategy that explicitly constrains the search space by the Jetson Orin's SRAM/LPDDR5 capacity, actual INT8 FLOPs, and measured inference latency?
details:
  realistic_solution: 'A realistic solution involves developing a hardware-aware NAS pipeline that deeply integrates the Jetson Orin''s characteristics:
    1. **Device-Specific Latency Predictor:** Build a lightweight latency prediction model trained on benchmark inference times of actual blocks executed on the Orin.
    2. **Memory Constraint Integration:** Incorporate LPDDR5 memory usage as a hard constraint.
    3. **INT8 Utilization Optimization:** Guide search towards architectures that maximize utilization of the INT8 units.
    4. **Power-Aware Objectives:** Introduce power consumption as an optimization objective.'
  common_mistake: |
    **The Pitfall:** Relying solely on proxy metrics like theoretical FLOPs or parameter counts.
    **The Rationale:** Candidates use standard NAS approaches without directly integrating device-specific memory bandwidth and quantization constraints.
    **The Consequence:** Discovered architectures heavily exceed memory limits or poorly utilize INT8 units, requiring extensive post-search optimization to hit the targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target FPS: 30 FPS.
       - Compute Capability: 275 Tera OPS (INT8).
       - Realistic limits are typically memory bandwidth, not theoretical compute.
    2. **Calculations:**
       - Latency Budget: 1000 ms / 30 FPS = 33.3 ms per frame.
       - Operations Budget (per second): 275 TOPS / 30 = ~9.16 Tera INT8 operations per frame.
       - Compute Bound Theoretical Check: A model with 10^10 INT8 ops could theoretically hit 27,500 FPS (275e12 / 10e9).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Theoretical operations vastly exceed practical needs, proving models are rarely compute-bound here. Hardware-aware NAS must explicitly constrain on memory bandwidth and operator compatibility rather than theoretical FLOPs.
