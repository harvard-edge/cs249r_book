title: The Real-Time Batching Trap
scenario: You're designing the perception system for an autonomous forklift in a warehouse. The system has a hard real-time deadline of 33ms to process each camera frame to avoid collisions. A single model inference takes 20ms. To improve overall throughput, a teammate suggests batching two frames together before processing.
question: What is the most immediate and critical consequence of this choice for this real-time system?
details:
  realistic_solution: The system will miss its real-time deadline. While batching might increase aggregate throughput, the latency for any given frame increases because it must wait for the batch to be filled and then processed. The time to get a result for the first frame is now at least the inference time for the *entire* batch, which is `~2 * 20ms = 40ms` (optimistically). This 40ms latency violates the 33ms hard deadline, leading to potential system failure.
  common_mistake: |
    **The Pitfall:** Confusing throughput with latency.
    **The Rationale:** Engineers focus on maximizing the number of inferences per second without considering the per-frame wait time.
    **The Consequence:** They mistakenly implement static batching, missing the hard 33ms deadline and potentially causing physical collisions in the warehouse.
  napkin_math: |
    1. Hard deadline = 33ms.
    2. Latency (Batch Size 1) = 20ms (Meets deadline).
    3. Latency (Batch Size 2) ≈ 2 × 20ms = 40ms.
    4. **40ms > 33ms. The system fails its real-time constraint.**
  options:
  - It will cause the system to miss its 33ms deadline.
  - It will increase the system's throughput, improving performance.
  - It will have no effect on the 33ms deadline.
  - It will reduce the power consumption per inference.
