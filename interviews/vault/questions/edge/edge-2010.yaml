title: 'Edge MLOps Performance Regression on Jetson Orin'
scenario: 'You are responsible for the MLOps pipeline managing real-time object detection models deployed on a fleet of NVIDIA Jetson Orin devices (32 GB LPDDR5, 275 TOPS INT8, 60W). A new version of your YOLOv8s model was recently pushed to production via your automated CI/CD pipeline. Post-deployment monitoring indicates a severe performance regression: the average FPS has dropped from 45 FPS to 20 FPS in complex scenes.'
question: 'How would you diagnose the YOLOv8s FPS regression on Jetson Orin and improve MLOps so future CI/CD catches edge performance regressions?'
details:
  realistic_solution: 'Diagnose by using profiling tools like Nsight Systems to identify the bottleneck (e.g., CPU pre-processing or suboptimal TensorRT engine compilation). Optimize by explicitly targeting INT8 precision and ensuring the CI/CD pipeline incorporates a hardware-in-the-loop benchmarking stage to evaluate model iterations directly on the Jetson Orin before deployment.'
  common_mistake: 'Candidates might overlook edge-specific hardware constraints, fail to consider integrating performance profiling/benchmarking into CI/CD for specific target hardware, or neglect pre/post-processing bottlenecks.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original performance: 45 FPS (22.2 ms/frame).
    - Regressed performance: 20 FPS (50 ms/frame).
    - Target performance: 50 FPS (20 ms/frame).

    **Calculations:**
    - Regression gap: 50 ms - 22.2 ms = 27.8 ms overhead.
    - Target savings: 50 ms - 20 ms = 30 ms reduction needed.
    - Savings via fix: 15 ms (pre-processing) + 15 ms (INT8 quantization) = 30 ms.

    **Conclusion & Interpretation:**
    - **Result: 50 FPS achieved (Compute-Bound)**. Resolving CPU and FP16 fallbacks via proper CI/CD guardrails reclaims strict latency targets.
