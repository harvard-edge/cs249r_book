title: Edge TPU Visual Inspection Data Quality Pipeline
scenario: You are deploying a defect detection model on a factory floor using Google Coral Edge TPU accelerators
  (4 TOPS INT8, 2W) attached via USB. The camera feeds occasionally suffer from sensor degradation (noise,
  blur, dropped frames) which causes the INT8-quantized model to produce false positives. Design a data
  validation and quality gating specification that runs entirely on the edge device to filter out bad
  frames before inference, given the strict 2W power and limited INT8 operator support.
details:
  realistic_solution: The optimal design uses lightweight, deterministic checks on the host CPU (e.g.,
    checking frame resolution and basic pixel variance for complete sensor failure) combined with a tiny,
    INT8-quantized 'blur/noise detector' model compiled specifically for the Coral TPU. The data contract
    must specify that only frames passing these low-latency checks are passed to the heavier defect detection
    model, ensuring the TPU's 4 TOPS are reserved for valid data.
  common_mistake: Candidates often propose running complex, floating-point anomaly detection models or
    statistical checks (like calculating full image entropy or running a secondary FP32 ResNet) before
    the main model. They forget that the Coral Edge TPU only supports INT8 operations and that running
    the host CPU heavily will exceed the 2W power budget or cause thermal throttling.
  napkin_math: Assuming a 30 FPS camera feed, we have 33ms per frame. The Coral TPU provides 4 TOPS (4
    trillion operations per second). A tiny INT8 quality-gate model might require 300 MOPs (0.0003 TOPS)
    per frame. 0.0003 TOPS / 4 TOPS = 0.075ms inference time. This is well within the 33ms budget, leaving
    over 32ms for the main defect detection model while easily operating within the 2W power constraints.
