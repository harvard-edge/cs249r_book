title: Edge New 0019
scenario: 'Using DVFS on Orin: dropping GPU clock frequency by 20% drops power consumption by 40% but
  increases model latency by 25%. Analyze the energy-per-inference tradeoff for a battery-operated autonomous
  rover.'
question: "Does lowering the Orin GPU clock by 20% reduce energy per inference despite a 25% latency increase?"
details:
  realistic_solution: Dynamic Voltage and Frequency Scaling (DVFS) exploits the cubic relationship between
    voltage/frequency and dynamic power. A 40% drop in power combined with a 25% increase in execution
    time results in an overall reduction in total energy consumed per inference. As long as the 25% latency
    penalty does not violate the rover's real-time safety deadlines, lowering the frequency mathematically
    extends the battery range of the mission.
  common_mistake: Equating power (Watts) directly with energy (Joules), forgetting to multiply by the
    extended inference time to find the true battery drain.
  napkin_math: Let Base Power = P, Base Time = T. Base Energy = P * T. New Power = 0.6P. New Time = 1.25T.
    New Energy = 0.6P * 1.25T = 0.75 * P * T. Energy per inference drops by 25%.
