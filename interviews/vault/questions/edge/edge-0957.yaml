title: Edge New 0019
scenario: 'Using DVFS on Orin: dropping GPU clock frequency by 20% drops power consumption by 40% but increases model latency by 25%. You need to analyze the energy-per-inference tradeoff for a battery-operated autonomous rover.'
question: Does lowering the Orin GPU clock by 20% reduce energy per inference despite a 25% latency increase?
details:
  realistic_solution: Dynamic Voltage and Frequency Scaling (DVFS) exploits the cubic relationship between voltage/frequency and dynamic power. A 40% drop in power combined with a 25% increase in execution time results in an overall reduction in total energy consumed per inference. As long as the 25% latency penalty does not violate the rover's real-time safety deadlines, lowering the frequency mathematically extends the battery range of the mission.
  common_mistake: |
    **The Pitfall:** Equating lower power (Watts) directly with lower energy (Joules) without factoring time.
    **The Rationale:** Candidates forget to multiply the reduced power consumption by the extended inference time to find the true battery drain per inference.
    **The Consequence:** Incorrectly optimizing system clocks, potentially increasing total energy drain if the latency penalty outweighs the power savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DVFS on Orin: dropping GPU clock drops power by 40% (New Power = 0.6P).
       - Latency increases by 25% (New Time = 1.25T).
    2. **Calculations:**
       - Base Energy = P * T.
       - New Energy = 0.6P * 1.25T = 0.75 * P * T.
       - Energy Reduction = 25%.
    3. **Conclusion & Interpretation:**
       - **Result: Energy Efficient.** Energy per inference drops by 25%, extending the battery range of the rover as long as the 25% latency increase is within real-time deadlines.
