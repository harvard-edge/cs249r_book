title: 'Fluency: Explaining Activation Memory vs. Weight Memory Trade-off for Edge Practitioners'
scenario: A hardware engineer new to ML asks why a MobileNetV3 model with only 5 MB of weights consumes
  over 200 MB of memory during inference on a Jetson Orin. They expect memory usage to equal model size.
  Explain the distinction between weight memory and activation memory in a way that reveals the engineering
  constraint clearly.
question: "Why can a MobileNetV3 with only 5MB of weights consume over 200MB during inference on Jetson Orin?"
details:
  realistic_solution: 'Weights are stored once and are fixed: 5 MB for MobileNetV3. Activations are the
    feature maps that flow through the network during the forward pass: at input 224×224×3 the first conv
    produces 112×112×16 = 790 KB; the next stage 56×56×24 = 300 KB. These exist simultaneously with adjacent
    layers during computation. With TensorRT''s memory reuse, peak is bounded by the two largest concurrent
    tensors. At batch 8, each tensor multiplies by 8. The engineering constraint: activation memory scales
    as O(B × H × W × C) while weight memory is O(C_in × C_out × k²) — independent of batch and spatial
    dimensions.'
  common_mistake: Explaining activations as just 'temporary memory' without quantifying why they can dwarf
    weight memory. The key insight is that activation tensor size scales with spatial resolution and batch
    size — both of which are independent of the model parameter count — so a lightweight model with large
    input images can have enormous activation memory.
  napkin_math: 'First expansion layer (worst case): input 112×112×16, output 112×112×96. Both must exist
    simultaneously: (112×112×16 + 112×112×96) × 4 B = (200704 + 1204224) × 4 = 5.6 MB for fp32. At batch=8:
    44.8 MB just for that layer pair. Total forward pass peak with optimal memory reuse: ~200 MB at batch=8,
    40× the weight size.'
