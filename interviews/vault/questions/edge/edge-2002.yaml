title: Jetson Orin Edge Model Memory Management for Autonomous Vehicles
scenario: 'You are responsible for optimizing the model serving infrastructure on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous driving application. The system requires a primary object detection model that is always active, consuming 10 GB of RAM and 60 TOPS (INT8). Additionally, the system needs to handle several ''on-demand'' secondary models. Each secondary model, when fully loaded and active, uses 4 GB of RAM and 20 TOPS (INT8). When a secondary model is ''pre-loaded'' (its weights are in RAM but it''s not active), it consumes 2 GB of RAM. The Jetson Orin''s OS and other system processes require 2 GB of RAM. The design mandates that the primary model is always resident, and only one secondary model can be active at any given time.'
question: How many unique secondary models can be pre-loaded on the 32GB Jetson Orin while reserving RAM and TOPS for the primary and one active secondary?
details:
  realistic_solution: Implement a hierarchical memory management strategy where critical models are pinned to memory. For dynamic secondary models, employ an LRU (Least Recently Used) or LFU (Least Frequently Used) caching mechanism for pre-loaded models. Continuously monitor memory pressure and intelligently offload less critical pre-loaded models to faster persistent storage (e.g., NVMe if available) when necessary. Utilize model compression techniques like quantization or pruning to reduce the memory footprint of pre-loaded weights.
  common_mistake: |
    **The Pitfall:** Ignoring system-level overhead or peak activation footprints.
    **The Rationale:** Candidates often do simple division of available memory without isolating static weight sizes from active memory state or system OS reservations.
    **The Consequence:** The pre-loading strategy overallocates models, inevitably triggering an OOM kill when a secondary model becomes active.
  napkin_math: |
    1. **RAM Reserved:** 2 GB (OS) + 10 GB (Primary Active) + 4 GB (Active Secondary) = 16 GB.
    2. **RAM Available for Pre-loading:** `32 GB (Total) - 16 GB (Reserved) = 16 GB`.
    3. **Max Pre-loaded Models (Memory limit):** `16 GB / 2 GB (per model) = 8 models`.
    4. **Active TOPS Check:** 60 TOPS (Primary) + 20 TOPS (Active Secondary) = 80 TOPS.
    5. **TOPS Budget Check:** 80% of 275 TOPS = 220 TOPS. Since 80 TOPS < 220 TOPS, compute is not the bottleneck.
    **The limiting factor is RAM, allowing for a maximum of 8 pre-loaded secondary models.**
