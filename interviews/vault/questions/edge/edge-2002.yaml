title: Jetson Orin Edge Model Memory Management for Autonomous Vehicles
scenario: You are responsible for optimizing the model serving infrastructure on an NVIDIA Jetson Orin for an autonomous driving application. The system requires a primary object detection model that is always active, consuming 10 GB of RAM and 60 TOPS (INT8). Additionally, the system needs to handle several 'on-demand' secondary models. Each secondary model, when fully loaded and active, uses 4 GB of RAM and 20 TOPS (INT8). When a secondary model is 'pre-loaded' (its weights are in RAM but it's not active), it consumes 2 GB of RAM. The OS and other system processes require 2 GB of RAM. The design mandates that the primary model is always resident, and only one secondary model can be active at any given time.
question: How many unique secondary models can be pre-loaded while reserving RAM and TOPS for the primary and one active secondary?
details:
  realistic_solution: 'Implement a hierarchical memory management strategy pinning critical models to memory. For dynamic secondary models, employ an LRU (Least Recently Used) caching mechanism. Continuously monitor memory pressure and offload less critical models to NVMe. Compute the strict memory reservation: OS + Primary Active + One Active Secondary. Divide the remaining RAM pool by the pre-loaded weight size.'
  common_mistake: |
    **The Pitfall:** Ignoring system-level overhead or peak activation footprints.
    **The Rationale:** Candidates often do simple division of available memory without isolating static weight sizes from active memory state or system OS reservations.
    **The Consequence:** The pre-loading strategy overallocates models, inevitably triggering an OOM kill when a secondary model becomes active.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 32 GB RAM, 275 TOPS.
    - OS: 2 GB RAM.
    - Primary active: 10 GB RAM, 60 TOPS.
    - Active secondary: 4 GB RAM, 20 TOPS.
    - Pre-loaded secondary: 2 GB RAM, 0 TOPS.
    - Constraint: Only 1 active secondary at a time.

    **Calculations:**
    - RAM Reserved: 2 GB (OS) + 10 GB (Primary) + 4 GB (Active Secondary) = 16 GB.
    - RAM Available for Pre-loading: 32 GB - 16 GB = 16 GB.
    - Max Pre-loaded Models: 16 GB / 2 GB/model = 8 models.
    - TOPS Budget Check: 60 TOPS + 20 TOPS = 80 TOPS (well under 275 TOPS max).

    **Conclusion & Interpretation:**
    - **Result: 8 models (Memory Capacity-Bound)**. The limiting factor is RAM, strictly allowing for a maximum of 8 pre-loaded secondary models without causing an OOM panic.
