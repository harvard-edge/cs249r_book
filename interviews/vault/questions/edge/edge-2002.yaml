title: Jetson Orin Edge Model Memory Management for Autonomous Vehicles
scenario: 'You are responsible for optimizing the model serving infrastructure on
  an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous driving
  application. The system requires a primary object detection model that is always
  active, consuming 10 GB of RAM and 60 TOPS (INT8). Additionally, the system needs
  to handle several ''on-demand'' secondary models. Each secondary model, when fully
  loaded and active, uses 4 GB of RAM and 20 TOPS (INT8). When a secondary model is
  ''pre-loaded'' (its weights are in RAM but it''s not active), it consumes 2 GB of
  RAM. The Jetson Orin''s OS and other system processes require 2 GB of RAM. The design
  mandates that the primary model is always resident, and only one secondary model
  can be active at any given time.


  Your task is to determine the optimal configuration for pre-loading secondary models
  to minimize cold-start latency. Specifically, calculate the maximum number of *unique
  secondary models* that can be pre-loaded into the Jetson Orin''s RAM (meaning their
  2GB weights are in memory) *while still reserving enough memory and TOPS for the
  primary model and one active secondary model*. Ensure that the total RAM usage does
  not exceed the 32 GB limit and that the active models do not exceed 80% of the total
  available INT8 TOPS.'
question: How many unique secondary models can be pre-loaded on the 32GB Jetson Orin
  while reserving RAM and TOPS for the primary and one active secondary?
details:
  realistic_solution: Implement a hierarchical memory management strategy where critical
    models are pinned to memory. For dynamic secondary models, employ an LRU (Least
    Recently Used) or LFU (Least Frequently Used) caching mechanism for pre-loaded
    models. Continuously monitor memory pressure and intelligently offload less critical
    pre-loaded models to faster persistent storage (e.g., NVMe if available) when
    necessary. Utilize model compression techniques like quantization or pruning to
    reduce the memory footprint of pre-loaded weights.
  common_mistake: Overlooking system-level RAM reservations (OS, other processes)
    or failing to account for the peak memory footprint of an actively loaded secondary
    model when calculating space for pre-loaded models. Another common mistake is
    neglecting to verify the TOPS constraint against the concurrent active models.
  napkin_math: '1. Calculate RAM reserved for OS, primary active model, and one active
    secondary model: 2 GB (OS) + 10 GB (Primary) + 4 GB (Active Secondary) = 16 GB.

    2. Calculate remaining RAM for pre-loaded secondary models: 32 GB (Total) - 16
    GB (Reserved) = 16 GB.

    3. Determine maximum pre-loaded secondary models: 16 GB / 2 GB (per pre-loaded
    model) = 8 models.

    4. Verify TOPS constraint for active models: 60 TOPS (Primary) + 20 TOPS (Active
    Secondary) = 80 TOPS.

    5. Calculate 80% of total INT8 TOPS: 275 TOPS * 0.8 = 220 TOPS.

    6. Since 80 TOPS < 220 TOPS, the TOPS constraint is met. The limiting factor is
    RAM, allowing for a maximum of 8 pre-loaded secondary models.'
