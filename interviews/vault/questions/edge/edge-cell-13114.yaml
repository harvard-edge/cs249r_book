title: 'Edge TCO Evaluation: Batch vs Real-Time Inference Cost Model'
scenario: 'A medical imaging clinic can run MRI inference (ResNet-50, 9 GOPS, 512x512 input) in real-time mode (Jetson Orin, 60W, $499) or overnight batch mode (Hailo-8+Pi5, 7.5W, $280). 50 scans/day, each taking 100ms inference. Real-time: instant results. Batch: 8-hour delay. Calculate 5-year TCO for each mode and the cost premium for real-time results.'
question: What is the 5-year TCO premium for real-time Jetson Orin inference versus overnight Hailo-8+Pi5 batch inference?
details:
  realistic_solution: Compute hardware plus five-year power cost. Jetson Orin costs $499 in CapEx and 60W × 43,800h × $0.10/kWh / 1000 = $262.80 in power, for about $761.80. Hailo-8+Pi5 costs $280 in CapEx and 7.5W × 43,800h × $0.10/kWh / 1000 = $32.85 in power, for about $312.85. The real-time option costs about $448.95 more over five years, buying instant results instead of an 8-hour batch delay.
  common_mistake: Treating real-time vs batch as only a latency question rather than a cost question — batch processing can use the same hardware at lower average utilization and potentially different power states.
  napkin_math: 5 years = 43,800 h. Jetson power = 60 × 43,800 × 0.10 / 1000 = $262.80; TCO = $499 + $262.80 = $761.80. Hailo power = 7.5 × 43,800 × 0.10 / 1000 = $32.85; TCO = $280 + $32.85 = $312.85. Premium = $448.95.
