title: Datacenter vs Edge Efficiency Trade-off for Video Analytics
scenario: 'A city deploys 1000 traffic cameras. Option A: stream all video to cloud H100 servers (100Mbps
  per camera, processed in datacenter with PUE=1.3). Option B: deploy Jetson Orin (60W) at each camera,
  send only metadata to cloud. Compare total system power and TCO for both options over 3 years.'
question: "How do cloud streaming and Jetson Orin edge processing compare in total power and 3-year TCO for 1000 traffic cameras?"
details:
  realistic_solution: 'Option A (cloud): Network: 1000 cameras × 100Mbps requires ~25Gbps aggregated bandwidth
    → 50 network switches at 500W = 25kW network. H100 processing: 1000 cameras at 30fps requires ~40
    H100s at 700W each = 28kW. PUE=1.3: facility power=28×1.3=36.4kW for GPUs + network. Total ≈ 61kW.
    Option B (edge): 1000 Jetson Orins × 60W = 60kW + minimal network (metadata only). Comparable total
    power! But edge eliminates 1000×100Mbps=100Gbps WAN bandwidth cost (≈$200k/month for 100Gbps WAN).
    Edge wins on TCO.'
  common_mistake: Comparing only compute power without including network infrastructure power (switches,
    routers consume 10-30W per port at scale).
  napkin_math: 'Cloud: 40 H100s × 700W × 1.3 PUE = 36.4kW + 25kW network = 61.4kW. Edge: 1000×60W=60kW.
    Power: tied. WAN cost: 100Gbps at $2/Mbps/month = $200k/month = $7.2M/3yr. Jetson cost: 1000×$500
    = $500k. Cloud inference cost: 40 H100s × $3/hr × 26,280hr = $3.1M/3yr. Edge wins by ~$9M over 3 years.'
