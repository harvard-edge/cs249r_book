title: Mixed-Precision Quantization Aware Training for Edge GPUs
scenario: A robotics team needs to deploy a ResNet-50 variant on a Jetson AGX Orin,
  but standard post-training quantization degrades tracking accuracy below acceptable
  thresholds.
question: Design a custom quantization-aware training scheme that targets the Orin's
  INT8 tensor cores while selectively keeping sensitive depthwise layers in FP16.
details:
  realistic_solution: Implement mixed-precision quantization-aware training by inserting
    fake-quantization nodes for standard convolutions to simulate INT8 range. For
    sensitive depthwise layers, bypass fake-quantization and cast inputs to FP16,
    maintaining accurate gradient flow through both precision branches during fine-tuning.
  common_mistake: Attempting to quantize the scaling factors and biases to INT8, which
    require higher precision like INT32 or FP16 for accumulation.
  napkin_math: 275 TOPS INT8 vs ~85 TFLOPS FP16 implies a >3x theoretical throughput
    drop for unquantized bottleneck layers.
