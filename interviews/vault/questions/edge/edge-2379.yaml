title: Mixed-Precision Quantization Aware Training for Edge GPUs
scenario: A robotics team needs to deploy a ResNet-50 variant on an edge GPU, but standard post-training quantization degrades tracking accuracy below acceptable thresholds.
question: Design a custom quantization-aware training scheme that targets INT8 tensor cores while selectively keeping sensitive depthwise layers in FP16.
details:
  realistic_solution: Implement mixed-precision quantization-aware training by inserting fake-quantization nodes for standard convolutions to simulate INT8 range. For sensitive depthwise layers, bypass fake-quantization and cast inputs to FP16, maintaining accurate gradient flow through both precision branches during fine-tuning.
  common_mistake: |
    **The Pitfall:** Attempting to quantize scaling factors and biases to INT8.
    **The Rationale:** Candidates misunderstand that these require higher precision for accumulation to prevent extreme precision loss.
    **The Consequence:** Severe degradation in model accuracy due to truncation errors in sensitive layers.
  napkin_math: |
    - Compare INT8 vs FP16 compute: 275 TOPS INT8 vs ~85 TFLOPS FP16.
    - Calculate theoretical throughput drop for unquantized bottleneck layers: **>3x**.
