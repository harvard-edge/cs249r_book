title: Analyzing Power Spikes on Google Coral Edge TPU
scenario: A smart camera system uses a Google Coral Edge TPU (4 TOPS INT8, 2W max power) to run an object detection model at 10 frames per second. Each inference requires 0.1 Tera-operations. When observing the power profile, engineers notice that the TPU repeatedly spikes to its 2W maximum rather than drawing a steady, lower continuous power.
question: Why does the Coral Edge TPU spike to 2W at 10 FPS, and what are the energy per inference and average power?
details:
  realistic_solution: The system is exhibiting 'race-to-sleep' behavior. The Coral Edge TPU processes the INT8 quantized workload at its maximum compute capacity (4 TOPS), drawing its peak 2W power, to finish the inference as quickly as possible. Once complete, it drops into a low-power idle state. This strategy often yields better overall energy efficiency than running continuously at a lower clock speed. The average power is simply a function of the active duty cycle.
  common_mistake: |
    **The Pitfall:** Assuming the 2W rating is a constant draw regardless of workload.
    **The Rationale:** Candidates see peak power specs and assume it represents continuous consumption, failing to account for "race-to-sleep" duty cycling.
    **The Consequence:** They incorrectly suggest the model is inefficient rather than recognizing an intentional power management strategy.
  napkin_math: |
    1. Time per inference = 0.1 TOP / 4 TOPS = 0.025 seconds (25 ms).
    2. Energy per inference = Peak Power × Active Time = 2W × 0.025s = 0.05 Joules (50 mJ).
    3. At 10 FPS, total energy per second = 10 × 50 mJ = 500 mJ/s.
    4. **Average power draw = 0.5W, despite the 2W spikes.**
