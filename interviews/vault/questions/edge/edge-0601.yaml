title: The Integer Roofline
scenario: You're profiling a YOLOv8 detection model on a Jetson Orin NX. The Orin's
  DLA is rated at 100 TOPS INT8 with 102 GB/s of memory bandwidth. Your model achieves
  18 TOPS.
question: How do you construct the integer roofline for YOLOv8 on the Orin DLA, and
  why might 18 TOPS not mean compute underutilization?
details:
  realistic_solution: Constructing a roofline model reveals the hardware ridge point.
    Next, calculate the model's Arithmetic Intensity (Ops/Byte). Because the arithmetic
    intensity of standard YOLOv8 is significantly lower than the DLA's ridge point,
    the system operates on the 'sloped' memory-bound side of the roofline graph. Hitting
    18 TOPS simply means you are achieving a percentage of the *attainable memory
    bandwidth ceiling*, not the peak compute ceiling. To improve performance, you
    must increase arithmetic intensity via layer fusion or tiling to reduce DRAM traffic,
    rather than optimizing mathematical kernels.
  common_mistake: '**The Pitfall:** Using peak theoretical hardware TOPS as the denominator
    for calculating utilization efficiency.

    **The Rationale:** Engineers assume that low TOPS utilization implies inefficiently
    written compute kernels, failing to construct a roofline model that identifies
    the true memory ceiling.

    **The Consequence:** Months are wasted optimizing matrix-multiply code that is
    already sitting completely idle waiting for data fetches from DRAM.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hardware Ridge Point: 100 TOPS / 102 GB/s ≈ 980 Ops/Byte.

    - YOLOv8-S INT8 Ops: ~28.4 Billion. Total Memory Traffic (Weights+Acts): ~55 MB.


    **Calculations:**

    - Model Arithmetic Intensity (AI) = 28.4e9 Ops / 55e6 Bytes ≈ 516 Ops/Byte.

    - Compare: 516 Ops/Byte < 980 Ops/Byte (Model is memory-bound).

    - Bandwidth Ceiling = 102 GB/s * 516 Ops/Byte = ~52.6 TOPS.

    - True Utilization = 18 actual TOPS / 52.6 attainable TOPS = ~34% of ceiling.


    **Conclusion & Interpretation:**

    - **Result: 34% Utilization (Memory-Bandwidth-Bound)**. The 18 TOPS metric reflects
    poor memory access efficiency, not a compute kernel bottleneck.

    '
