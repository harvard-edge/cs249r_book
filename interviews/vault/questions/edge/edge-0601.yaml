title: The Integer Roofline
scenario: You're profiling a YOLOv8 detection model on a Jetson Orin NX. The Orin's DLA (Deep Learning
  Accelerator) is rated at 100 TOPS INT8 with 102 GB/s of memory bandwidth. Your model achieves 18 TOPS.
  The team says 'we're only at 18% utilization — we need to optimize the kernels.' Construct the integer
  roofline and explain why the team may be wrong.
details:
  realistic_solution: First, build the integer roofline. The ridge point = 100 TOPS / 102 GB/s ≈ **980
    INT8 Ops/Byte**. Now compute the model's arithmetic intensity. YOLOv8-S has ~28.4 billion INT8 Ops
    and loads ~11.2 million parameters (11.2 MB at INT8) plus activations (~40 MB for 640×640 input).
    Total memory traffic ≈ 55 MB per inference. Arithmetic intensity = 28.4 × 10⁹ / 55 × 10⁶ ≈ **516 Ops/Byte**.
    At 516 Ops/Byte, the workload sits *below* the ridge point — it is **memory-bandwidth bound**, not
    compute-bound. The attainable throughput = 102 GB/s × 516 ≈ 52.6 TOPS. Achieving 18 TOPS means ~34%
    of the memory-bandwidth ceiling, which suggests memory access inefficiency (strided access, activation
    spills), not compute underutilization. The fix is tiling and layer fusion to reduce memory traffic,
    not faster math.
  common_mistake: '"18% utilization means the kernels are inefficient — fuse more layers." This assumes
    the workload is compute-bound. On edge NPUs, the ridge point is far lower than on data center GPUs.'
  napkin_math: Ridge point = 100 TOPS / 102 GB/s ≈ 980 Ops/Byte. YOLOv8-S intensity ≈ 516 Ops/Byte → memory-bound.
    Bandwidth ceiling = 102 × 516 ≈ 52.6 TOPS (52,632 GOps/s). Actual = 18 TOPS → 34% of bandwidth ceiling.
    Kernel optimization should target memory access patterns, not compute throughput.
