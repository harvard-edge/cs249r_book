title: The Integer Roofline
scenario: You're profiling a YOLOv8 detection model on a Jetson Orin NX. The Orin's DLA (Deep Learning Accelerator) is rated at 100 TOPS INT8 with 102 GB/s of memory bandwidth. Your model achieves 18 TOPS. The team says 'we're only at 18% utilization — we need to optimize the kernels.'
question: How do you construct the integer roofline for YOLOv8 on the Orin DLA, and why might 18 TOPS not mean compute underutilization?
details:
  realistic_solution: First, build the integer roofline. The ridge point = 100 TOPS / 102 GB/s ≈ **980 INT8 Ops/Byte**. Now compute the model's arithmetic intensity. YOLOv8-S has ~28.4 billion INT8 Ops and loads ~11.2 million parameters (11.2 MB at INT8) plus activations (~40 MB for 640x640 input). Total memory traffic ≈ 55 MB per inference. Arithmetic intensity = 28.4 × 10⁹ / 55 × 10⁶ ≈ **516 Ops/Byte**. At 516 Ops/Byte, the workload sits *below* the ridge point — it is **memory-bandwidth bound**, not compute-bound. The attainable throughput = 102 GB/s × 516 ≈ 52.6 TOPS. Achieving 18 TOPS means ~34% of the memory-bandwidth ceiling, which suggests memory access inefficiency (strided access, activation spills), not compute underutilization. The fix is tiling and layer fusion to reduce memory traffic, not faster math.
  common_mistake: |
    **The Pitfall:** Assuming low absolute TOPS utilization means the compute kernels are inefficient.
    **The Rationale:** Candidates look at peak theoretical hardware TOPS without constructing a roofline model, missing that the workload is constrained by memory bandwidth.
    **The Consequence:** The team wastes time trying to optimize mathematical operations (compute) when the actual fix requires layer fusion or tiling to reduce memory traffic.
  napkin_math: |
    1. Calculate Hardware Ridge Point: 100 TOPS / 102 GB/s ≈ 980 Ops/Byte.
    2. Calculate Model Arithmetic Intensity: ~28.4 billion Ops / ~55 MB traffic ≈ 516 Ops/Byte.
    3. Compare AI to Ridge Point: 516 Ops/Byte < 980 Ops/Byte, meaning the model is memory-bound.
    4. Calculate Bandwidth Ceiling: 102 GB/s * 516 Ops/Byte ≈ 52.6 TOPS.
    5. Calculate true utilization: 18 TOPS actual / 52.6 TOPS ceiling ≈ 34% of attainable throughput.
    **Achieving 18 TOPS indicates memory access inefficiency (34% of the bandwidth ceiling), not compute underutilization.**
