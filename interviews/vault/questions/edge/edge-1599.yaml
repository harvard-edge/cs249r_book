title: Calculate Efficiency for GPU vs DLA on Orin
scenario: You are optimizing an inference workload on an NVIDIA Jetson Orin. The platform
  delivers a total of 275 TOPS INT8 at a 60W TDP, utilizing both its Ampere GPU and
  DLA (Deep Learning Accelerator). To compare the efficiency of these accelerators,
  assume the DLA provides 110 TOPS using 15W of the power budget, while the GPU provides
  the remaining compute using the remaining power. Calculate the efficiency of both
  the DLA and the GPU in TOPS per Watt, and determine the maximum FPS if your model
  requires 2.5 TOPS per frame and runs exclusively on the DLA.
question: What are the DLA and GPU TOPS/W efficiencies, and what max FPS can the DLA
  deliver for a 2.5 TOPS/frame model?
details:
  realistic_solution: First, subtract the DLA's performance and power from the total
    system specs (275 TOPS, 60W TDP) to find the GPU's share. Then, divide the TOPS
    by the wattage for each accelerator to find their respective TOPS/W efficiencies.
    Finally, divide the DLA's available TOPS by the model's TOPS-per-frame requirement
    to find the max FPS.
  common_mistake: Candidates often fail to correctly isolate the GPU's power and compute
    from the total system specs before calculating efficiency. They may also apply
    the full system TOPS instead of the DLA-specific TOPS when calculating the maximum
    FPS.
  napkin_math: '1. DLA Efficiency: 110 TOPS / 15W = 7.33 TOPS/W. 2. GPU Compute: 275
    TOPS (total) - 110 TOPS (DLA) = 165 TOPS. 3. GPU Power: 60W (total) - 15W (DLA)
    = 45W. 4. GPU Efficiency: 165 TOPS / 45W = 3.66 TOPS/W. 5. DLA Max FPS: 110 TOPS
    / 2.5 TOPS/frame = 44 FPS.'
