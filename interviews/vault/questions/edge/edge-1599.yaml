title: 'Calculate Efficiency for GPU vs DLA on Orin'
scenario: 'An inference workload runs on an NVIDIA Jetson Orin. The platform delivers a total of 275 TOPS INT8 at a 60W TDP, utilizing both its Ampere GPU and DLA (Deep Learning Accelerator). The DLA provides 110 TOPS using 15W of the power budget, while the GPU provides the remaining compute using the remaining power.'
question: 'What are the DLA and GPU TOPS/W efficiencies, and what max FPS can the DLA deliver for a 2.5 TOPS/frame model?'
details:
  realistic_solution: |
    First, subtract the DLA's performance and power from the total system specs (275 TOPS, 60W TDP) to find the GPU's share. Then, divide the TOPS by the wattage for each accelerator to find their respective TOPS/W efficiencies. Finally, divide the DLA's available TOPS by the model's TOPS-per-frame requirement to find the max FPS.
  common_mistake: |
    **The Pitfall:** Failing to isolate the GPU's power and compute from the total system specs.
    **The Rationale:** Rushing the math and dividing the total system TOPS by the GPU's isolated power, or vice versa.
    **The Consequence:** Completely incorrect efficiency metrics, leading to workloads being scheduled on the wrong subsystem.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total System: 275 TOPS, 60 W TDP.
    - DLA: 110 TOPS, 15 W.
    - Model requirement: 2.5 TOPS/frame.

    **Calculations:**
    - DLA Efficiency: 110 TOPS / 15 W = 7.33 TOPS/W.
    - GPU Compute: 275 TOPS - 110 TOPS = 165 TOPS.
    - GPU Power: 60 W - 15 W = 45 W.
    - GPU Efficiency: 165 TOPS / 45 W = 3.67 TOPS/W.
    - DLA Max FPS: 110 TOPS / 2.5 TOPS/frame = 44 FPS.

    **Conclusion & Interpretation:**
    - **Result: 7.33 TOPS/W vs 3.67 TOPS/W (Power-Bound).** The DLA is significantly more efficient per watt, capable of delivering 44 FPS independently.
