title: Knowledge Distillation for Hailo-8 Dataflow
scenario: You are tasked with deploying a real-time object detection model onto a Hailo-8 edge AI accelerator
  for a smart camera system. The Hailo-8 is a dataflow accelerator providing 26 TOPS at INT8 precision
  within a strict 2.5W power envelope, but crucially, it has no local DRAM and relies entirely on streaming
  weights and activations from the host memory. The original float32 teacher model is too large to stream
  efficiently over the host interface, so you need to design a knowledge distillation pipeline to train
  a highly compact student model. Describe your specification for the student architecture and distillation
  process, analyzing how the Hailo-8's specific memory and dataflow constraints shape your design choices.
details:
  realistic_solution: The specification should mandate a student architecture built exclusively from Hailo-supported
    operations that fuse well in its dataflow compiler, minimizing host memory roundtrips. The distillation
    process should use pure logit matching rather than intermediate feature matching, giving the student
    topological freedom to fit the spatial dataflow paradigm. Furthermore, the pipeline must incorporate
    quantization-aware training (QAT) to ensure the final INT8 student maximizes the 26 TOPS compute capacity
    while strictly adhering to the streaming memory limits.
  common_mistake: Candidates often propose complex feature-based distillation methods matching intermediate
    activation maps without considering the target hardware constraints. They fail to realize that the
    student model must be aggressively optimized for INT8 dataflow execution and minimal memory bandwidth,
    meaning the student architecture must heavily diverge from the teacher.
  napkin_math: Targeting 60 FPS gives a 16.6ms per-frame budget. Assuming a host interface provides ~4
    GB/s bandwidth, streaming a distilled 10MB INT8 model takes ~2.5ms (10MB / 4000 MB/s). This leaves
    ~14.1ms for compute. At 26 TOPS, the peak available compute in 14.1ms is ~366 GOPS (26,000 GOPS *
    0.0141s). Therefore, the distillation target must shrink the student to under 10MB in INT8 weights
    and fewer than 366 GOPS per inference to meet the SLA without starving the dataflow engine.
