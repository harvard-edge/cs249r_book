title: The Edge Inference Power Profiling
scenario: 'You''re designing a battery-powered inspection drone with a Qualcomm RB5 (15 TOPS, 7W typical).
  The drone carries a 99.9 Wh battery (the FAA limit for carry-on). Your manager asks: ''How many hours
  of continuous AI-powered inspection can we get?'' You measure idle power at 3W and inference power at
  9W. Your colleague divides: 99.9Wh / 9W = 11.1 hours. Why is this estimate both too optimistic and too
  pessimistic?'
question: "Why is this estimate both too optimistic and too pessimistic?"
details:
  realistic_solution: 'The estimate is too optimistic because it ignores non-AI power consumers: (1) Drone motors: 150-300W in flight (this dominates everything — the AI is <5% of total power). (2) Camera and gimbal: 3W. (3) GPS, IMU, barometer: 1W. (4) Radio telemetry: 2W. (5) Voltage regulator losses: ~15% of total. Total flight power is ~250W. Flight time: 99.9Wh / 259W = 23.1 minutes — the AI''s 9W draw is a tiny fraction of the total budget.'
  common_mistake: '"Battery life = capacity / power draw." This ignores that the drone isn''t just an AI computer — the physical locomotion dominates the power budget.'
  napkin_math: >
    Drone: 250W flight + 9W AI = 259W total power draw.

    Flight time = 99.9 Wh / 259 W = 0.3857 hours = 23.1 minutes.

    AI's share: 9 / 259 = 3.5% of power.

    In 23.1 minutes (0.3857h), the AI consumes 9W * 0.3857h = 3.47 Wh. The remaining 96.43 Wh powers the base platform (motors, sensors, comms). The colleague's 11.1 hours estimate is purely for the compute board sitting on a desk doing inference.
