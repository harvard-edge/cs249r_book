title: Real-time Data Drift Detection on Google Coral Edge TPU
scenario: A smart factory deploys a real-time visual inspection system on Google Coral Edge TPUs (4 TOPS INT8, 2W, INT8 only). Each TPU runs a trained INT8 quantized classification model to identify defective components on an assembly line. The factory observes a recent increase in false negatives, suspecting data drift due to gradual changes in ambient lighting or camera sensor degradation.
question: How would you detect lighting or camera-sensor data drift on Coral Edge TPUs using integer-friendly statistics without uploading raw data?
details:
  realistic_solution: To detect data drift on the Coral Edge TPU, select a critical, low-dimensional model output (e.g., the confidence score of the predicted class or an activation from a specific internal layer). Discretize the range of this feature into a predefined number of bins. On the Edge TPU, maintain counts of inferences falling into each bin for both a 'current' window and a 'baseline' reference window. Compare these binned distributions using integer arithmetic. For example, calculate a simplified PSI proxy by comparing normalized bin counts (proportions) and leveraging a pre-computed, quantized lookup table for logarithmic terms, or a simpler metric like Total Variation Distance (sum of absolute differences of proportions) if log operations are completely prohibitive.
  common_mistake: |
    **The Pitfall:** Attempting to perform complex floating-point statistical calculations (like exact KL divergence) directly on the INT8-only Edge TPU.
    **The Rationale:** Standard drift detection libraries rely heavily on continuous floating-point operations (logarithms, division), which are familiar to data scientists.
    **The Consequence:** The Edge TPU cannot execute these operations natively, forcing a fallback to the slow, low-power ARM CPU, leading to massive latency spikes and potentially crashing the real-time inference pipeline.
  napkin_math: |
    1. **Setup:** Discretize a model output into `k` bins. Let `P_c_i` be the proportion in bin `i` for current data, and `P_b_i` for baseline data.
    2. **Integer Scaling:** Calculate proportions using integer math: `P_c_i = (C_i * 1000) / N_c`.
    3. **Total Variation Distance (TVD):** A hardware-friendly drift metric using only subtraction and absolute values.
    4. **TVD Formula:** `TVD = Sum(|P_c_i - P_b_i|) / 2`.
    5. **Result:** By comparing the TVD against a pre-calibrated threshold, drift can be detected entirely with **fast integer arithmetic** on the device.
