title: The Fleet Data Toll
scenario: Your automotive team runs a fleet of 10,000 test vehicles to improve a driver assistance model.
  The current strategy is to upload 10 GB of sensor data daily from each vehicle to the cloud for centralized
  training. Your cellular data plan costs $0.10 per GB. A new proposal suggests using Federated Learning
  (FL), which would only require uploading a 50 MB model update from each vehicle daily. Explain the privacy
  benefit of FL and calculate the total daily data transmission cost for the **centralized** approach.
question: "What privacy benefit does FL provide, and what is the daily centralized upload cost for 10,000 vehicles at 10 GB each and $0.10/GB?"
details:
  realistic_solution: The primary privacy benefit of Federated Learning is that raw user data never leaves
    the local device. In this case, sensitive sensor data (which could include location, images, or driving
    habits) from the 10,000 vehicles is not exposed to the central server, reducing risk and liability.
  common_mistake: Engineers often underestimate the operational costs of data transmission at scale. They
    might calculate the cost for a single vehicle and forget to multiply by the fleet size, or they confuse
    units (e.g., MB vs. GB), leading to a 1000x error in their cost estimation. Another common mistake
    is calculating the cost for the FL approach instead of the centralized one requested.
  napkin_math: '1. Total Data Volume: 10,000 vehicles × 10 GB/vehicle = 100,000 GB = 100 TB per day

    2. Total Centralized Cost: 100,000 GB × 0.10/GB = 10,000 per day

    3. Annual Centralized Cost: 10,000/day × 365 days = 3,650,000 per year


    For comparison, the Federated Learning approach:

    1. Total FL Data Volume: 10,000 vehicles × 50 MB/vehicle = 500,000 MB = 500 GB per day

    2. Total FL Cost: 500 GB × 0.10/GB = 50 per day → 18,250 per year

    3. Savings: 3,650,000 − 18,250 = 3,631,750 per year (a 200× reduction in data transmission costs).
    The FL approach transmits 200× less data while also keeping raw sensor data on-device, providing both
    an economic and privacy advantage.'
  options:
  - $1.00 per day. (This is the cost for a single vehicle, failing to account for the fleet size.)
  - $50.00 per day. (This is the cost for the Federated Learning approach, not the requested centralized
    one.)
  - '$10,000 per day. (Correct: 10,000 vehicles x 10 GB/vehicle x $0.10/GB)'
  - $10.00 per day. (This calculation incorrectly assumes 10 MB of data per vehicle instead of 10 GB,
    a common unit error.)
  correct_index: 2
