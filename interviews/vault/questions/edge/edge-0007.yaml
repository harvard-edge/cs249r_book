title: The Camera Bandwidth Bottleneck
scenario: You're designing the sensor suite for a new autonomous vehicle. The perception team wants to use multiple high-resolution cameras. Before analyzing the compute requirements for the perception models, you need to validate the data ingress pathway from the physical sensors to the SoC.
question: What is the approximate maximum data transfer rate of a standard 4-lane MIPI CSI-2 camera interface, the most common interconnect for automotive cameras?
details:
  realistic_solution: A standard 4-lane MIPI CSI-2 interface has a maximum data rate of approximately 2.5 GB/s. This is a fundamental physical constraint that dictates the total volume of raw pixel data that can be ingested by the SoC per second, regardless of how powerful the downstream processor is. Exceeding this limit means frames will be dropped before they can ever be processed.
  common_mistake: |
    **The Pitfall:** Confusing the camera sensor's MIPI I/O bandwidth with the system's main DRAM bandwidth.
    **The Rationale:** Engineers see high DRAM specs (e.g., 204.8 GB/s on Orin) and ignore the physical constraints of the much slower peripheral interfaces that ingest the raw pixel data.
    **The Consequence:** Designing a camera suite that saturates the physical MIPI bus, resulting in dropped frames before computation even begins.
  napkin_math: |
    - **Single 4K camera payload:** 3840 * 2160 * 1.5 bytes (12-bit RAW) = 12.44 MB per frame.
    - **Bandwidth per camera:** 12.44 MB * 30 FPS = 373.2 MB/s.
    - **Bandwidth for 8 cameras:** 8 * 373.2 MB/s = 2.98 GB/s.
    - **Limit:** 4-lane MIPI CSI-2 physical link maxes out at ~2.5 GB/s.
    - **Conclusion:** 2.98 GB/s > 2.5 GB/s, meaning **the physical bus will be saturated**.
  options:
  - ~200 GB/s
  - ~32 GB/s
  - ~2.5 GB/s
  - ~480 MB/s
  correct_index: 2
