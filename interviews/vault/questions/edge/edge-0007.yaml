title: The Camera Bandwidth Bottleneck
scenario: You're designing the sensor suite for a new autonomous vehicle. The perception team wants to
  use multiple high-resolution cameras. Before analyzing the compute requirements for the perception models,
  you need to validate the data ingress pathway from the physical sensors to the SoC. What is the approximate
  maximum data transfer rate of a standard 4-lane MIPI CSI-2 camera interface, the most common interconnect
  for automotive cameras?
question: "What is the approximate maximum data transfer rate of a standard 4-lane MIPI CSI-2 camera interface, the most common interconnect for automotive cameras?"
details:
  realistic_solution: A standard 4-lane MIPI CSI-2 interface has a maximum data rate of approximately
    2.5 GB/s. This is a fundamental physical constraint that dictates the total volume of raw pixel data
    that can be ingested by the SoC per second, regardless of how powerful the downstream processor is.
    Exceeding this limit means frames will be dropped before they can ever be processed.
  common_mistake: Engineers often confuse the camera sensor's dedicated I/O bandwidth with the system's
    main DRAM bandwidth. They might see '204.8 GB/s' on the Jetson AGX Orin's spec sheet and assume there
    are no data input bottlenecks, ignoring the much slower peripheral interfaces like MIPI which actually
    connect to the camera sensor.
  napkin_math: 'Single 4K camera payload: 3840 * 2160 * 1.5 bytes (12-bit RAW) = 12.44 MB per frame. At
    30 FPS: 12.44 MB * 30 = 373.2 MB/s. For 8 cameras: 8 * 373.2 MB/s = 2.98 GB/s. A standard 4-lane MIPI
    CSI-2 physical link maxes out at roughly 2.5 GB/s. 2.98 GB/s > 2.5 GB/s, meaning the physical bus
    will be saturated before processing even begins.'
  options:
  - ~200 GB/s
  - ~32 GB/s
  - ~2.5 GB/s
  - ~480 MB/s
  correct_index: 2
