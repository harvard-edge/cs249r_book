title: The Foggy Road Catastrophe
scenario: "You are the tech lead for the perception team at a major automotive company. Your team's new ViT-based pedestrian detector, running in FP32, achieves 99.5% accuracy on your validation set. To meet the production hardware budget, the model must be quantized. After a standard post-training static quantization (PTQ) to INT8, the overall accuracy drops slightly to 98%, which seems acceptable. However, during fleet validation, you discover a catastrophic failure: the INT8 model's accuracy on pedestrians in foggy conditions has plummeted to 35%."
question: Why did INT8 PTQ preserve overall accuracy but fail on foggy pedestrians, and how would you fix it?
details:
  realistic_solution: The core issue is almost certainly catastrophic activation clipping. The low-contrast features in foggy images likely push activation values in certain layers outside the narrow dynamic range captured during calibration on 'clean' data. The Softmax and GELU activations in ViTs are particularly prone to producing extreme outliers that get saturated in INT8, destroying the model's ability to discern fine-grained features.
  common_mistake: |
    **The Pitfall:** Brute-forcing with QAT or collecting more data without hypothesis.
    **The Rationale:** A junior engineer might immediately suggest 'Just use Quantization-Aware Training (QAT)' or blame the calibration dataset without a specific hypothesis.
    **The Consequence:** QAT is computationally expensive and doesn't diagnose the root cause, while blindly collecting 'more fog data' wastes valuable time and resources.
  napkin_math: |
    1. **FP32 Inference Constraint**: Using a 5 TOps model, Jetson AGX Orin FP32 peak is ~5.3 TFLOPS. Time = 5 TOps / 5.3 TFLOPS ≈ 943ms → way over 33ms budget.
    2. **INT8 Inference Constraint**: Orin INT8 peak is ~275 TOPS. Time = 5 TOps / 275 TOPS ≈ 18ms → **within 33ms budget**.
    3. **The Quantization Dilemma**: INT8 dynamic range is [-128, 127]. Fog activations with low contrast cluster in a tiny sub-range, getting quantized to just 2-3 INT8 levels → information destroyed.
    4. **Result**: The real fix is **mixed-precision**: keep fog-sensitive layers (Softmax, final attention) in FP16 while keeping bulk compute in INT8. FP16 layers add ~5ms overhead → total ≈ **23ms**, maintaining the <33ms budget safely.
