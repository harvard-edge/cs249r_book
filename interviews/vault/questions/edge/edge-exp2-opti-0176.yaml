title: Edge TPU Model Quantization and Footprint Optimization
scenario: Your team is porting a custom MobileNetV2-based object detection model (originally 3.4M parameters
  in FP32) to run on a Google Coral Edge TPU via a USB accelerator. The device provides 4 TOPS for INT8
  operations within a strict 2W power budget, but your initial compilation attempt fails because unsupported
  operations are falling back to the host CPU, causing severe latency spikes. You need to diagnose the
  model graph to identify the CPU fallback bottleneck, quantify the memory footprint reduction from full
  INT8 quantization, and verify if the fully mapped model will execute efficiently on the hardware.
question: "How would you diagnose Edge TPU CPU fallbacks in the MobileNetV2 graph and verify the fully INT8 model fits and runs efficiently?"
details:
  realistic_solution: The candidate should analyze the model architecture to identify and replace unsupported
    operations (e.g., replacing Hardswish with ReLU6) to ensure the entire graph compiles exclusively
    for the Edge TPU's limited operator set. After ensuring full compatibility, they should calculate
    the INT8 parameter size and estimate the peak activation memory to verify the model avoids expensive
    host-device memory transfers and sustains the 4 TOPS throughput.
  common_mistake: Candidates often assume that applying post-training quantization is sufficient to run
    the model on the Edge TPU, ignoring that certain activation functions (like Swish or Hardswish) or
    custom layers are unsupported and force a CPU fallback. They also frequently forget to account for
    the memory required for intermediate activation tensors alongside the parameter weights.
  napkin_math: 'Original FP32 parameter footprint: 3.4M × 4 bytes = 13.6 MB. Fully quantized INT8 parameter
    footprint: 3.4M × 1 byte = 3.4 MB (a 4x reduction). Peak activation memory for the largest feature
    map (112×112×32 INT8): 112 × 112 × 32 × 1 byte = 401,408 bytes ≈ 392 KB. Total on-device memory during
    inference: 3.4 MB (weights) + 0.39 MB (activations) ≈ 3.8 MB. With the entire 3.8 MB INT8 footprint
    executing on the Coral Edge TPU, the system can fully leverage the 4 TOPS engine under the 2W limit.'
