title: CUDA-to-Vulkan Compute Porting for Cross-Vendor Edge GPUs
scenario: Your edge inference engine must run on both NVIDIA Jetson (CUDA) and Intel Arc discrete GPUs
  (no CUDA support). Vulkan Compute is the only shared GPU API. Evaluate porting custom CUDA kernels to
  Vulkan compute shaders for inference.
details:
  realistic_solution: 'For inference (not training), Vulkan Compute is viable but with constraints: (1)
    Matrix multiplications: use Vulkan''s cooperative matrix extension (VK_KHR_cooperative_matrix) for
    GPU-accelerated matmuls, available on both NVIDIA and Intel Arc. (2) Custom ops: rewrite as GLSL compute
    shaders compiled to SPIR-V. Shared memory becomes workgroup-shared storage (similar semantics, different
    syntax). (3) Performance gap: expect 15-25% overhead vs native CUDA on Jetson due to Vulkan''s more
    conservative memory model and explicit synchronization. Alternative: use ONNX Runtime with either
    CUDA EP (Jetson) or OpenVINO EP (Intel Arc) — higher-level abstraction, same ONNX model.'
  common_mistake: Treating Vulkan Compute as equivalent to CUDA in expressiveness. Vulkan compute shaders
    use SPIR-V and have no equivalent for CUDA shared memory bank conflict management, warp-level intrinsics,
    or dynamic parallelism.
  napkin_math: 'Custom CUDA kernel porting to Vulkan: ~4-8 weeks per complex kernel. For an inference
    engine with 10 custom kernels: 40-80 weeks of engineering. ONNX RT with EP switching: 2-4 weeks total.
    The abstraction-layer approach is 10-20x cheaper in engineering time.'
