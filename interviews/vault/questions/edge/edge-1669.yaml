title: Dynamic Thermal Throttling on Jetson Orin
scenario: You are designing the multi-modal perception stack for an autonomous delivery robot. Operating in direct sunlight imposes a strict 40W sustained thermal and power limit on the SoC.
question: How would you partition workloads and use DVFS P-states to keep the perception system under a 40W sustained power cap?
details:
  realistic_solution: A robust architecture relies on a closed-loop controller that shifts static, high-efficiency workloads (like CNN backbones) to the DLAs while reserving the primary GPU for complex, dynamic tasks. By leveraging the CMOS equation (P = C V^2 f + P_static), the system dynamically scales voltage and frequency (DVFS). Since dynamic power scales cubically with frequency (assuming V scales with f), slightly lowering clocks yields massive power savings with minimal TOPS loss.
  common_mistake: |
    **The Pitfall:** Assuming a linear relationship between power and compute capability.
    **The Rationale:** Candidates often assume that reducing power by 33% linearly reduces TOPS by exactly 33%, failing to separate static baseline power from dynamic compute power and ignoring cubic DVFS scaling.
    **The Consequence:** Miscalculating the available compute budget and failing to properly leverage DVFS for optimal power management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Baseline static power + memory power is ~10W.
       * Rated TDP is 60W (50W active). Capped limit is 40W (30W active).
    2. **Calculations:**
       * Active power ratio: 30W / 50W = 0.6.
       * Frequency scaling (CMOS P ∝ f^3): f_new / f_max = (0.6)^(1/3) ≈ 0.84.
       * Available Compute: 0.84 * 275 TOPS = ~231 TOPS INT8.
       * Energy Efficiency: 40W to process 30 FPS = 40J/s / 30 frames/s = 1.33 Joules/frame.
    3. **Conclusion & Interpretation:**
       * **Lowering clocks via DVFS allows retaining 84% of compute capability while dropping active power by 40%. Result: Power/Thermal-Bound.**
