title: Edge Tensor Parallelism Approval Spec
scenario: A drone team wants tensor parallelism across two co-packaged accelerators.
  Specify the approval checklist before using it in the perception loop.
question: What must be measured before approving tensor parallelism across two edge
  accelerators in a real-time perception loop?
details:
  realistic_solution: Measure per-layer collective payloads, link bandwidth and latency,
    synchronization count, compute saved, SRAM fit, jitter, failure behavior, and
    deadline headroom. Tensor parallelism is acceptable only if communication jitter
    stays within the control-loop budget.
  common_mistake: Using datacenter tensor-parallel defaults without checking edge
    interconnect jitter and hard real-time deadlines.
  napkin_math: A 0.5 ms average collective can still fail a 33 ms loop if P99 jitter
    spikes to several milliseconds across many layers.
