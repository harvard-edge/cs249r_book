title: Edge Tensor Parallelism Approval Spec
scenario: A drone team wants tensor parallelism across two co-packaged accelerators to speed up a real-time perception loop.
question: What must be measured before approving tensor parallelism across two edge accelerators in a real-time perception loop?
details:
  realistic_solution: Measure per-layer collective payloads, link bandwidth and latency, synchronization count, compute saved, SRAM fit, jitter, failure behavior, and deadline headroom. Tensor parallelism is acceptable only if communication jitter stays within the control-loop budget.
  common_mistake: |
    **The Pitfall:** Using datacenter tensor-parallel defaults without checking edge interconnect jitter.
    **The Rationale:** Engineers assume standard datacenter parallelization techniques seamlessly map to constrained edge interconnects.
    **The Consequence:** Overlooking high latency variance that breaches hard real-time drone deadlines.
  napkin_math: |
    - **Jitter Risk:** A 0.5 ms average communication collective seems safe on paper.
    - **Final Result:** **However, if P99 jitter spikes to several milliseconds across many layers, the strict 33 ms perception loop will inevitably fail.**
