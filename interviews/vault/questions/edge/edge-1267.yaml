title: Thermal and Bandwidth Graceful Degradation on Hailo-8
scenario: You are designing the perception system for an autonomous last-mile delivery robot utilizing a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 operates as a dataflow accelerator with no local DRAM, it relies entirely on streaming weights and activations from host memory. During peak summer operation, the host system experiences thermal throttling, severely limiting available memory bandwidth and preventing the Hailo-8 from executing its full suite of object detection, segmentation, and intent prediction models at 30 FPS. Design a graceful degradation ladder to ensure the robot can maintain safe, fail-operational status.
question: What graceful degradation ladder would keep the Hailo-8 robot fail-operational when host thermal throttling cuts memory bandwidth?
details:
  realistic_solution: The system should implement Quality-of-Service (QoS) shedding by pre-compiling a unified pipeline where non-critical model branches can be dynamically bypassed without reloading weights. The degradation ladder should first drop the heavy intent prediction model, then reduce the frame rate or crop the resolution for the segmentation model. Simultaneously, the robot's planning module must reduce the driving speed to increase the allowable reaction time margin, compensating for the degraded perception fidelity.
  common_mistake: |
    **The Pitfall:** Suggesting to dynamically load smaller, less accurate "fallback" models into the accelerator.
    **The Rationale:** Candidates apply cloud-based model swapping paradigms to an edge accelerator.
    **The Consequence:** Swapping models requires massive memory bandwidth to stream the new weights, which exacerbates the exact host memory bottleneck caused by the thermal throttling.
  napkin_math: |
    * Original pipeline: Object Detection (6 TOPS) + Segmentation (11 TOPS) + Intent Prediction (8 TOPS) = 25 TOPS.
    * Host memory bandwidth reduced by 40% due to thermal throttling.
    * Step 1: Drop Intent Prediction saves 8 TOPS and proportional bandwidth. Remaining = 17 TOPS.
    * Step 2: Halve Segmentation frame rate saves 5.5 TOPS and proportional bandwidth. Remaining = 11.5 TOPS.
    * **The degraded pipeline requires 11.5 TOPS, reducing the required host streaming bandwidth by over 50% to maintain fail-operational status.**
