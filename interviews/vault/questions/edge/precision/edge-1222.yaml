title: 'GPTQ 3-bit Latency Degradation on Ampere'
scenario: 'Your team deployed a 70B parameter LLM onto an NVIDIA Jetson Orin edge device for a robotics application. To fit the model into the Orin''s 32 GB LPDDR5 memory, the team aggressively quantized the model weights to 3-bit using GPTQ. However, during production inference, the token generation latency is exceptionally high, and profiling shows that the Ampere GPU compute units are severely underutilized despite the availability of the DLA accelerator.'
question: 'Why does 3-bit GPTQ make the 70B model fit on Jetson Orin but still degrade token-generation performance?'
details:
  realistic_solution: 'While 3-bit quantization successfully reduces the model size to fit into memory, the Ampere architecture on the Jetson Orin lacks native hardware support for 3-bit matrix multiplications. The GPU must unpack and cast the 3-bit weights into a supported format (like INT8 or FP16) on the fly before computing the activations. This continuous runtime dequantization creates a massive compute bottleneck, stalling the CUDA cores and preventing the system from leveraging its high INT8 throughput.'
  common_mistake: |
    **The Pitfall:** Assuming a smaller memory footprint always directly translates to faster inference.
    **The Rationale:** Candidates ignore hardware-specific instruction set constraints, incorrectly assuming the Jetson Orin's Ampere GPU has native hardware support for 3-bit matrix multiplications.
    **The Consequence:** The system suffers massive compute stalls during runtime dequantization, obliterating any performance gains from the reduced memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 70 billion parameters.
    - Quantization: 3-bit (3 bits / 8 bits/byte) = 26.25 GB.
    - Hardware Capability: Jetson Orin has 275 TOPS for INT8, 0 TOPS for native 3-bit.

    **Calculations:**
    - Compute Overhead: Unpacking requires ~2 ops per weight.
    - Total Overhead: For 70B weights, this is 140 GOPS of pure overhead per token.

    **Conclusion & Interpretation:**
    - **Result: 140 GOPS Overhead (Compute-Bound)**. The immense 140 GOPS dequantization penalty completely bottlenecks the CUDA cores, negating the memory transfer savings.
