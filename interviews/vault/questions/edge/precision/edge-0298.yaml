title: The INT8 Energy Dividend
scenario: Your team is optimizing an object detection model for a new ADAS platform. To meet the strict 30W thermal budget, you're converting the model's FP16 weights and activations to INT8.
question: 'From a pure hardware physics perspective, approximately how much more energy-efficient is a single INT8 arithmetic operation compared to a single FP16 operation?'
details:
  realistic_solution: 'An INT8 operation is approximately 5x more energy-efficient than an FP16 operation. This is derived from the fundamental energy costs of computation. An FP16 op costs ~5.3pJ, while an INT8 op costs ~1.0pJ.'
  common_mistake: |
    **The Pitfall:** Conflating memory savings with energy savings.
    **The Rationale:** Candidates see that INT8 uses half the bits of FP16 and incorrectly assume the energy savings are exactly 2x.
    **The Consequence:** They ignore the non-linear relationship between bit width and physical CMOS switching energy, underestimating the thermal benefits of INT8.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 MAC operation energy: ~5.3 pJ.
    - INT8 MAC operation energy: ~1.0 pJ.

    **Calculations:**
    - Efficiency Ratio = 5.3 pJ / 1.0 pJ = 5.3x.

    **Conclusion & Interpretation:**
    - **Result: 5.3x more efficient (Compute Energy-Bound)**. Switching to INT8 provides non-linear thermal benefits beyond simply halving bit-width.
  options:
  - ~2x more efficient
  - ~18x more efficient
  - ~5x more efficient
  - The efficiency is roughly the same
  correct_index: 2
