title: The INT8 Energy Dividend (edge-0280)
scenario: You're working on the perception stack for a new autonomous vehicle. To stay within the strict 30W thermal design power (TDP), your team is quantizing the primary detection model from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: From first principles, what is the approximate energy reduction for a single arithmetic operation when you move from FP32 to INT8?
details:
  realistic_solution: 'The energy consumed by an FP32 operation is approximately **18x** higher than for an INT8 operation. This is a fundamental physical invariant. The energy of a digital multiplier scales roughly with the square of the bit-width, so reducing precision yields a much larger dividend in power savings than just the linear reduction in bits would suggest. This is why INT8 is critical for power-constrained edge AI systems.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width.
    **The Rationale:** Engineers assume the energy savings are a linear 4x reduction (32 bits / 8 bits), confusing energy scaling with memory scaling.
    **The Consequence:** Severely underestimating the super-linear power efficiency benefits of INT8 quantization during hardware evaluation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization from 32-bit (FP32) to 8-bit (INT8).
    - Energy of a digital multiplier scales roughly with the square of the bit-width.

    **Calculations:**
    - FP32 to INT8 multiplier ratio: (32/8)^2 = 16x (baseline).
    - Empirical invariant: FP32 operations consume roughly 18x more energy than INT8 operations due to floating-point logic overhead.

    **Conclusion & Interpretation:**
    - **Result: Massive Energy Dividend (Power-Bound).** Reducing precision yields a super-linear 18x reduction in power consumption, making INT8 critical for edge AI.
  options:
  - ~4x
  - ~300x
  - ~18x
  - ~2x
  correct_index: 2
