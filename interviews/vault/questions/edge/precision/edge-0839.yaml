title: Diagnosing Federated Quantization Divergence
scenario: You are deploying federated learning for a 25M parameter predictive text model across 10,000 edge devices over constrained LTE networks. To mitigate the 100MB per client update cost, your team applies deterministic uniform 8-bit quantization to the gradients. However, after deployment, you observe that training stalls and the global model fails to converge.
question: How do you analyze this failure, and what specific characteristics of the quantized gradients are causing the stall?
details:
  realistic_solution: Diagnose systematic bias from deterministic uniform 8-bit quantization whose resolution is too coarse relative to many gradient magnitudes. Gradients smaller than half a quantization step, such as 1e-4 with a 1e-3 step, are repeatedly rounded to zero, so small but consistent client updates vanish and the aggregated direction is biased. Use stochastic rounding, error feedback, residual accumulation, or a finer/adaptive quantizer so the expected quantized gradient preserves the true update direction.
  common_mistake: |
    **The Pitfall:** Suspecting hyperparameter tuning issues (learning rate) or non-IID data distributions.
    **The Rationale:** In standard centralized pipelines, non-IID data is the default scapegoat for divergence, masking the low-level quantization math error.
    **The Consequence:** Endless hyperparameter grid searches waste vast amounts of engineering effort while the fundamental statistical bias from the deterministic rounding remains active and unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - True FP32 gradient value: g = 1e-4.
    - Uniform 8-bit quantization step: Delta = 1e-3.
    - Neighboring quantization bins around g are 0 and 1e-3.
    - Fleet size: 10,000 clients.

    **Calculations:**
    - Deterministic nearest-bin path: Q(1e-4) = 0 because 1e-4 is below half a 1e-3 step.
    - Deterministic fleet sum for that coordinate = 10,000 * 0 = 0, even though every client had the same positive gradient.
    - Stochastic rounding to neighboring bins uses P(Q=1e-3) = (g - 0) / Delta = 1e-4 / 1e-3 = 0.10 and P(Q=0) = 0.90.
    - Expected quantized gradient per client = 0.10 * 1e-3 + 0.90 * 0 = 1e-4.
    - Expected fleet aggregation for that coordinate = 10,000 * 1e-4 = 1.0; a realized round will vary around this expectation.

    **Conclusion & Interpretation:**
    - **Result: 1.0 in expectation (Precision-Bound)**. Stochastic rounding preserves the true gradient without deterministic bias, but any single aggregation round is a random realization rather than an exact recovery.
