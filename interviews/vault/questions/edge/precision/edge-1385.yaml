title: INT8 Compute Throughput on Cloud AI 100
scenario: A computer vision pipeline is deployed on a Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 75W, 32 GB memory). The model requires 800 billion operations (800 GOPS) per inference. Assume memory bandwidth is sufficient to remain compute-bound.
question: What is the maximum theoretical inference throughput for the 800 GOPS model on the 400 TOPS INT8 hardware?
details:
  realistic_solution: |
    The correct approach simply divides the total INT8 operations per second available on the accelerator by the operations required for a single inference. Since we assume the workload is compute-bound and fits within the 32 GB memory, memory bandwidth does not bottleneck the throughput. Thus, the theoretical maximum inferences per second is directly derived from the peak INT8 TOPS.
  common_mistake: |
    **The Pitfall:** Misaligning the magnitude of Tera-Operations and Giga-Operations.
    **The Rationale:** Engineers often divide raw numbers blindly or factor the 75W power limit into a pure theoretical compute calculation.
    **The Consequence:** Providing throughput estimates that are off by factors of 1000, destroying project feasibility planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator peak compute: 400 TOPS INT8.
    - Model compute requirement: 800 GOPS per inference.

    **Calculations:**
    - Convert TOPS to GOPS: 400 TOPS = 400,000 GOPS.
    - Maximum throughput: 400,000 GOPS / 800 GOPS/inference = 500 inferences per second.

    **Conclusion & Interpretation:**
    - **Result: 500 inferences per second (Compute-Bound)**. Memory bandwidth is sufficient to remain compute-bound, so max throughput directly derives from peak TOPS.
