title: The Energy Cost of Precision (edge-0316)
scenario: Your team is optimizing a perception model for an autonomous vehicle's edge accelerator. To fit within a tight 30W power budget, you're considering quantizing key layers from FP16 to INT8.
question: For a single arithmetic operation, roughly how much more energy does an FP16 multiply-accumulate (MAC) consume compared to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes approximately 5.3 times more energy than an INT8 operation. This is derived from fundamental hardware constants, as transistor switching energy scales quadratically with the number of bits.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are linearly proportional to the reduction in bit-width.
    **The Rationale:** Engineers divide 16 by 8 and incorrectly estimate a 2x energy saving.
    **The Consequence:** They severely underestimate the power savings of INT8 quantization, potentially blocking viable deployments due to imagined power constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy costs scale quadratically with bit-width, not linearly.
    - Known invariants: FP32 costs ~5x more than FP16, and ~18x more than INT8.

    **Calculations:**
    - Let INT8 energy = E.
    - FP16 energy ≈ 5.3x E.

    **Conclusion & Interpretation:**
    - **Result: ~5.3x (Power-Bound)**. An FP16 MAC consumes approximately 5.3x more energy than an INT8 MAC, severely impacting the 30W TDP.
  options:
  - ~2x more energy
  - ~18x more energy
  - ~5.3x more energy
  - The energy is the same, but throughput is higher
  correct_index: 2
