title: Designing a Mixed-Precision Strategy for Edge Deployment on Hailo-8
scenario: You are tasked with deploying a real-time object detection model onto a fleet of devices equipped with the Hailo-8 AI accelerator. The Hailo-8 offers 26 TOPS for INT8 operations with a typical power consumption of only 2.5W. Your goal is to maximize throughput and minimize power usage for continuous inference on the edge, while ensuring the model's accuracy remains within 1% of its FP32 baseline. The initial model was trained in full FP32 precision.
question: What INT8 quantization and deployment strategy would you use on Hailo-8 to maximize throughput and power efficiency within 1% of FP32 accuracy?
details:
  realistic_solution: |
    A realistic solution should target Hailo-8's supported INT8 deployment path rather than assuming arbitrary FP16/BF16 execution on the accelerator:
    1.  **Compatibility and profiling:** Compile the FP32 model through the Hailo toolchain, identify unsupported operators, layout conversions, and layers with high quantization sensitivity.
    2.  **Representative PTQ first:** Calibrate INT8 weights and activations with production-like images, checking mAP by class and by confidence range rather than only aggregate accuracy.
    3.  **Use QAT when PTQ misses:** If PTQ loses more than 1% accuracy, fine-tune with quantization-aware training and adjust preprocessing, normalization, activation clipping, and per-channel weight quantization where the toolchain supports it.
    4.  **Change the graph, not the precision fantasy:** Fuse operators, replace unsupported layers, prune or resize the detector head, and keep the graph on Hailo-8. If a sensitive operation must run off-chip, treat it as a CPU/NPU partitioning exception and measure the transfer cost.
    5.  **Benchmark on target devices:** Validate FPS, power, thermals, and accuracy on the fleet hardware, then iterate on calibration data, QAT checkpoints, and model architecture until the INT8 graph meets the 1% accuracy target.
  common_mistake: |
    **The Pitfall:** Blindly quantizing the entire model to INT8 without proper calibration or sensitivity analysis.
    **The Rationale:** Candidates assume quantization is a one-size-fits-all automatic step.
    **The Consequence:** Significant performance degradation or unstable inference results, particularly missing the 1% accuracy retention requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 target path: INT8 accelerator execution, 26 TOPS peak.
    - Example detector workload: 10 GOPS per frame after supported graph compilation.
    - End-to-end latency also includes preprocessing, post-processing, transfers, and utilization loss.

    **Calculations:**
    - Ideal INT8 compute lower bound: 10 x 10^9 ops / 26 x 10^12 ops/s = 0.00038 s = 0.38 ms.
    - At 25% effective utilization after scheduling, memory, and graph overheads: 0.38 ms / 0.25 = 1.52 ms accelerator time.
    - A 30 FPS target allows 33.3 ms per frame, leaving budget for camera input, preprocessing, post-processing, and host orchestration.

    **Conclusion & Interpretation:**
    - **Result: INT8 execution is the plausible Hailo-8 path**. The throughput target is feasible only if the graph compiles efficiently and accuracy is recovered through calibration or QAT; unsupported FP16/BF16 mixed execution should not be assumed on the accelerator.
