title: Designing a Mixed-Precision Strategy for Edge Deployment on Hailo-8
scenario: 'You are tasked with deploying a real-time object detection model onto a fleet of devices equipped with the Hailo-8 AI accelerator. The Hailo-8 offers 26 TOPS for INT8 operations with a typical power consumption of only 2.5W. Your goal is to maximize throughput and minimize power usage for continuous inference on the edge, while ensuring the model''s accuracy remains within 1% of its FP32 baseline. The initial model was trained in full FP32 precision.'
question: What mixed-precision conversion and deployment strategy would you use on Hailo-8 to maximize throughput and power efficiency within 1% of FP32 accuracy?
details:
  realistic_solution: |
    A realistic solution would involve a multi-stage approach tailored for edge accelerators like Hailo-8:
    1.  **Profiling & Sensitivity Analysis**: Identify critical layers or operations in the FP32 model that are highly sensitive to quantization. Tools can help analyze activation distributions and potential precision loss.
    2.  **Quantization-Aware Training (QAT) or Post-Training Quantization (PTQ) with Calibration**: Prioritize QAT if feasible, as it often yields better accuracy recovery. If not, use PTQ with a diverse, representative calibration dataset. Experiment with different calibration algorithms (e.g., MinMax, moving average, or more advanced techniques provided by Hailo's toolkit).
    3.  **Layer-wise Precision Assignment**: Instead of uniform quantization, selectively apply INT8 to layers that tolerate it well, while retaining FP16/BF16 for sensitive layers (if the Hailo-8's specific architecture supports mixed-precision execution beyond just INT8, or if specific layers can be offloaded to a co-processor). This ensures critical accuracy is maintained where it matters most, maximizing the use of Hailo-8's efficient INT8 capabilities for the majority of operations.
    4.  **Loss Scaling**: If FP16 is used during any training or fine-tuning phase, implement appropriate loss scaling to manage the reduced dynamic range and prevent underflow of gradients.
    5.  **Rigorous Benchmarking & Iteration**: Continuously evaluate the quantized model on Hailo-8, measuring actual inference latency, power consumption, and accuracy against the FP32 baseline on target hardware. Iterate on quantization parameters and layer-wise precision decisions based on these empirical results.
  common_mistake: |
    **The Pitfall:** Blindly quantizing the entire model to INT8 without proper calibration or sensitivity analysis.
    **The Rationale:** Candidates assume quantization is a one-size-fits-all automatic step.
    **The Consequence:** Significant performance degradation or unstable inference results, particularly missing the 1% accuracy retention requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ideal INT8 Scenario: 10 GOPS (INT8) / 26 TOPS = 0.38 ms.
    - Mixed-Precision Target: 10% (1 GOPS) in FP16, 90% (9 GOPS) in INT8.

    **Calculations:**
    - INT8 Time: (9 * 10^9) / (26 * 10^12) \approx 0.346 ms.
    - FP16 Time (Hypothetical): Assuming 13 TOPS FP16 throughput: (1 * 10^9) / (13 * 10^12) \approx 0.077 ms.
    - Total Sequential Time: 0.346 ms + 0.077 ms = ~0.423 ms.

    **Conclusion & Interpretation:**
    - **Result: ~0.423 ms (Compute-Feasible)**. A minor latency tradeoff successfully meets the 1% accuracy requirement.
