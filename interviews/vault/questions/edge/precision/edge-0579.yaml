title: 'The Night-Vision Quantization Collapse'
scenario: 'Your team is developing a pedestrian detection model for an autonomous vehicle, deploying to a Jetson AGX Orin. To meet the 33ms hard real-time deadline, you quantize the production FP16 model to INT8. The model is calibrated using a diverse dataset of daytime driving scenes. In all daylight validation tests, the INT8 model is a success: latency is cut in half, and mAP is within 0.5% of the FP16 original. However, during night-time testing, the system exhibits a catastrophic failure. In scenes with bright streetlights or oncoming headlights, the INT8 model''s recall drops by over 80%, failing to detect pedestrians that the FP16 model correctly identifies.'
question: 'What numerical INT8 failure is occurring on the Orin, and why does it disproportionately affect high-contrast night scenes?'
details:
  realistic_solution: 'The catastrophic failure is caused by activation outlier overflow due to a brittle calibration strategy mapping daylight values to [-128, 127].'
  common_mistake: 'Blaming the calibration dataset for not having enough night images instead of fixing the fundamental arithmetic failure of activation clipping.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Calibration range (daylight): [-10.0, 12.0]. Max absolute = 12.0.
    - Headlight activation spike: 45.0.

    **Calculations:**
    - INT8 scale factor = 12.0 / 127 ≈ 0.0945.
    - Unclipped value for 45.0: 45.0 / 0.0945 = 476.
    - The network clips 476 to the max of 127.
    - Output after clipping: 127 * 0.0945 = 12.0.

    **Conclusion & Interpretation:**
    - **Result: 73% Signal Loss (Precision-Bound)**. The massive signal reduction from 45.0 to 12.0 wipes out the feature gradients needed for detection.
