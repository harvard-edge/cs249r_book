title: The Headlight Blindness Quantization Failure
scenario: Your team is optimizing a critical pedestrian detection model for an automotive ECU, targeting a Jetson AGX Orin. To meet the 33ms hard real-time deadline, you've quantized the model from FP16 to INT8 using post-training quantization (PTQ). Your calibration dataset consists of 10,000 diverse daytime driving scenes. The resulting INT8 model maintains 99% of the FP16 accuracy on your daytime validation set. However, during in-car night testing, the model's recall for pedestrians drops to nearly zero when the camera sees oncoming headlights, whereas the original FP16 model handled the scene correctly.
question: Why did PTQ pass daytime validation but fail under headlight glare, and what immediate fix beats simply adding night calibration data?
details:
  realistic_solution: The catastrophic failure is caused by activation range overflow. The daytime calibration set established a narrow dynamic range. Headlights create values orders of magnitude larger, which get saturated to the maximum representable value in INT8 (127), destroying gradients. A simple data fix degrades daytime precision.
  common_mistake: |
    **The Pitfall:** Blindly following the playbook to add more data without diagnosing the mathematical failure.
    **The Rationale:** Re-calibrating with night data applies a massive scale factor.
    **The Consequence:** Permanently degrades daytime precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime activation range: [-6.0, 6.0].
    - Use affine INT8 with qmin = -128, qmax = 127.
    - Headlight glare activation: 50.0.

    **Calculations:**
    - Scale s = (6.0 - -6.0) / (127 - -128) = 12.0 / 255 = 0.0471.
    - Zero-point z = round(-128 - (-6.0 / 0.0471)) ≈ 0.
    - Quantize with q = round(50.0 / 0.0471) + 0 = 1062.
    - Clamp to INT8 range: q_clamped = min(127, 1062) = 127.
    - Dequantized clipped value = (127 - 0) * 0.0471 = 5.98, not 50.0.

    **Conclusion & Interpretation:**
    - **Result: 127 Hard Clip (Precision-Bound)**. The INT8 clipping destroys the signal gradient completely, erasing the features needed for detection.
