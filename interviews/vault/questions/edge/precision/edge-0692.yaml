title: Quantization Impact on Detection mAP
scenario: 'You''re deploying YOLOv8s (11.2M params) for construction site safety monitoring. On your target GPU, FP32 latency is 12ms per frame, and batching 8 camera frames takes 30ms because batching improves utilization. You have three quantization options: FP32 (44.9 mAP on COCO), FP16 (44.8 mAP), and INT8 (43.5 mAP). The safety team requires ≥43.0 mAP for hard-hat detection.'
question: Which precision should you deploy for 8 camera streams under a 33ms budget, and what latency and throughput do FP32, FP16, and INT8 imply?
details:
  realistic_solution: 'INT8 meets the 43.0 mAP threshold on COCO (43.5), but validate on your domain first. Compute analysis from the measured FP32 baseline: FP32 is 12ms per frame and about 30ms for a batch of 8, which barely fits the 33ms budget with little headroom. FP16 is roughly 2x faster, so it is ~6ms per frame and ~15ms per batch of 8. INT8 is roughly another 2x faster, so it is ~3ms per frame and ~8ms per batch of 8. However, the 43.5 mAP is measured on COCO — construction site distribution differs significantly. Small hard hats at distance are particularly sensitive to quantization error in the detection head. Recommendation: run INT8 calibration on construction site data, validate domain-specific mAP, and if it drops below 43.0, use FP16 as the safer choice with adequate performance.'
  common_mistake: |
    **The Pitfall:** Assuming COCO mAP degradation maps linearly to domain-specific tasks.
    **The Rationale:** Engineers see that INT8 meets the 43.0 mAP threshold on COCO and immediately deploy it without testing on target domain data.
    **The Consequence:** Quantization error disproportionately affects small objects (like hard hats at a distance), pushing the real-world mAP well below the safety requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 33ms. 8 cameras.
       - Measured FP32 latency: 12ms per frame; batch-of-8 latency: 30ms.
       - Scaling assumption: FP32 -> FP16 is ~2x; FP16 -> INT8 is ~2x.
    2. **Calculations:**
       - FP32 inference: 12ms per frame. Batch-of-8: 30ms. Throughput at batch cadence: 8 / 0.030 = ~267 FPS aggregate, with 30/33 = 91% of the frame budget used.
       - FP16 inference: 12 / 2 = ~6ms per frame. Batch-of-8: 30 / 2 = ~15ms. Throughput: 8 / 0.015 = ~533 FPS aggregate, with 15/33 = 45% of the budget used.
       - INT8 inference: 6 / 2 = ~3ms per frame. Batch-of-8: 15 / 2 = ~7.5ms, rounded to ~8ms. Throughput: 8 / 0.008 = ~1000 FPS aggregate, with 8/33 = 24% of the budget used.
    3. **Conclusion & Interpretation:**
       - **Result: FP32 barely fits, FP16 has comfortable headroom, and INT8 has the most throughput.** Deploy INT8 only after construction-site validation; otherwise FP16 is the safer latency/accuracy tradeoff.
