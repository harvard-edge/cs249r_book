title: Orin Parameter Bandwidth
scenario: A language model with 500 million parameters is loaded onto an edge accelerator for text generation.
question: Calculate the minimum memory bytes read from LPDDR5 strictly to load the weights for one full forward pass if stored in FP16 versus INT8.
details:
  realistic_solution: 'In FP16, each parameter takes 2 bytes. The model requires strictly 1.0 GB of memory read per pass. In INT8, each parameter takes 1 byte, requiring strictly 500 MB per pass. This directly halves the memory bandwidth requirement, which is critical for auto-regressive generation where batch size is 1 and execution is inherently memory-bound.'
  common_mistake: |
    **The Pitfall:** Calculating FP16 as 4 bytes, or assuming 500 million parameters implies 500 megabits instead of computing byte precision directly.
    **The Rationale:** Confusing FP16 with FP32, or misunderstanding the structural relationship between parameter counts and bit/byte storage formats.
    **The Consequence:** Miscalculating memory bandwidth constraints by 2x, leading to incorrect hardware sizing or failing to deploy auto-regressive generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 500 million parameters.
    - FP16 representation: 2 bytes per parameter.
    - INT8 representation: 1 byte per parameter.

    **Calculations:**
    - FP16 read size: 500,000,000 * 2 bytes = 1,000,000,000 bytes (1.0 GB).
    - INT8 read size: 500,000,000 * 1 byte = 500,000,000 bytes (500 MB).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. INT8 strictly halves the necessary data movement, lowering the bottleneck constraint from 1.0 GB/pass to 500 MB/pass.
