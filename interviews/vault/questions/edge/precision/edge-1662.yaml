title: Edge TPU QAT and Mixed-Precision Pipeline Design
scenario: >-
  You are designing a custom mixed-precision training recipe for a vision model targeting a Google Coral Edge TPU. Your training cluster uses BF16/FP32 for efficiency, but the target hardware demands strictly INT8 operations.
question: How would you design a BF16/FP32 QAT pipeline that simulates strict INT8 Edge TPU execution and avoids accuracy loss?
details:
  realistic_solution: 'Design a pipeline where master weights and gradients are kept in FP32 to prevent underflow, while the forward pass simulates INT8 quantization using FakeQuantize nodes. Operators unsupported by the Coral TPU (like SiLU or GeLU) must be replaced with supported approximations (like ReLU6) before QAT begins. Straight-through estimators allow gradients to propagate back to the FP32 master weights.'
  common_mistake: |
    **The Pitfall:** Applying standard AMP without proper INT8 simulation and operator mapping.
    **The Rationale:** Candidates rely on default PyTorch/TensorFlow mixed-precision flags.
    **The Consequence:** This creates a massive domain gap upon final quantization. Furthermore, if unsupported operators slip through, the Edge TPU falls back to host CPU execution, causing disastrous latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 10 GOPS/inference at 60 FPS (600 GOPS required).
    - Coral TPU capacity: 4 TOPS (4000 GOPS) at 2W.

    **Calculations:**
    - Hardware utilization: 600 GOPS / 4000 GOPS = 15% peak compute capacity.
    - Estimated power draw: 15% * 2W = 0.3W.

    **Conclusion & Interpretation:**
    - **Result: 0.3W (Compute-Bound).** The simulated INT8 pipeline will comfortably meet latency targets while drawing only ~0.3W, well within the strict 2W thermal envelope.
