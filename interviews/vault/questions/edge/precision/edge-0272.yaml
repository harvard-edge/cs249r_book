title: 'The INT8 Memory Payoff: Quantization Fundamentals'
scenario: Your team is optimizing a YOLO-family object detection model for a new ADAS (Advanced Driver-Assistance Systems) feature. The model runs on a Jetson AGX Orin. The initial model has 11 million parameters and is stored in FP16 precision. To improve performance and reduce memory pressure, you are tasked with quantizing it to INT8.
question: How does the storage footprint change, and what is the final size in MB, after quantizing 11M FP16 weights to INT8?
details:
  realistic_solution: 'Quantizing from FP16 to INT8 halves the memory required for model weights. FP16 uses 16 bits (2 bytes) per parameter, while INT8 uses 8 bits (1 byte) per parameter. For an 11M parameter model, the storage footprint is reduced from 22 MB to 11 MB, a 50% savings.'
  common_mistake: |
    **The Pitfall:** Confusing the quantization reduction factor or mixing up bits and bytes.
    **The Rationale:** Candidates often instinctively say "4x reduction" (thinking of FP32 to INT8) or make unit errors when calculating total size.
    **The Consequence:** Incorrect footprint calculations lead to flawed memory budgeting, potentially causing out-of-memory errors when deploying alongside other applications.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 11 Million.
    - Initial Datatype: FP16 (2 bytes).
    - Target Datatype: INT8 (1 byte).

    **Calculations:**
    - Baseline Memory (FP16): 11M params * 2 bytes/param = 22 MB.
    - Reduction Factor: 2 bytes / 1 byte = 2x reduction.
    - New Memory Footprint: 22 MB / 2 = 11 MB.

    **Conclusion & Interpretation:**
    - **Result: 11 MB (Memory-Bound)**. The precise 50% savings frees up exactly 11 MB for adjacent processes.
  options:
  - '22 MB'
  - '5.5 MB'
  - '11 MB'
  - '88 MB'
