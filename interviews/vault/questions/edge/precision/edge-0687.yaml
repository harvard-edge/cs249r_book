title: The PTQ vs QAT Question
scenario: Your manager says 'just quantize the model to INT8 — it takes five minutes
  with TensorRT.' You push back and say you need two weeks for quantization-aware
  training.
question: Why do you need two weeks for quantization-aware training instead of a five-minute
  TensorRT INT8 PTQ pass?
details:
  realistic_solution: 'Post-training quantization (PTQ) collects activation statistics
    from a small calibration dataset (~1000 images) and sets quantization ranges based
    on observed min/max values. It works well when: activation distributions are symmetric
    and well-behaved, the model is large (redundancy absorbs quantization noise),
    and the task is tolerant of small errors (classification). PTQ *fails* when: (1)
    the model has outlier channels — a few activations with 10x the magnitude of others
    force the quantization range to be wide, crushing precision for the majority,
    (2) the task is precision-sensitive — depth estimation, segmentation boundaries,
    or small-object detection where a 1% pixel shift matters, (3) the model is already
    small — a MobileNet has less redundancy to absorb quantization error than a ResNet-50.
    QAT inserts fake-quantization nodes during training, so the model''s gradients
    learn to compensate for quantization error. The two weeks cover: fine-tuning with
    quantization noise (~3 days), hyperparameter search for learning rate and quantization
    scheme (~5 days), validation across the full test distribution including edge
    cases (~4 days).'
  common_mistake: '**The Pitfall:** Dogmatically stating that QAT is always better
    than PTQ.

    **The Rationale:** Candidates fail to explain when PTQ fails (outlier channels,
    precision-sensitive tasks) and why QAT fixes it (gradients compensate for noise).

    **The Consequence:** Unjustifiably spending weeks on QAT when PTQ would suffice,
    or failing to convince management of QAT''s necessity when it is critical.

    '
  napkin_math: '**Assumptions & Constraints:**

    - PTQ Calibration: 1000 images, 5ms each.

    - QAT Training: 50 epochs, 10,000 images, 20ms/image.


    **Calculations:**

    - PTQ Time: 1000 x 5ms = 5 seconds (+ TensorRT build = ~5 minutes).

    - QAT Time: 50 x 10,000 x 20ms = 10,000,000 ms ≈ 2.8 hours training (+ validation
    = ~2 weeks engineering time).

    - PTQ Accuracy Impact: -0.5% to -15%.

    - QAT Accuracy Impact: -0.1% to -0.5%.


    **Conclusion & Interpretation:**

    - **Result: Trade-off Justification (Compute-Bound).** QAT requires significant
    engineering time (weeks) but is necessary for precision-sensitive or outlier-heavy
    models where PTQ fails catastrophically.

    '
