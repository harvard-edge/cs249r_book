title: Sub-4-bit Weight Streaming for DRAM-less Edge Accelerators
scenario: Your team is deploying a heavy vision transformer to a DRAM-less edge dataflow accelerator for real-time drone surveillance. The accelerator accepts INT8 weights at execution time, while model storage and staging are constrained by host memory capacity and PCIe bandwidth. The model's footprint exceeds the limits if kept in standard INT8.
question: How would you use sub-4-bit host-side weight storage while still feeding INT8 weights efficiently to the accelerator?
details:
  realistic_solution: A robust design stores the model in a 4-bit or 3-bit compressed format on the host to meet capacity and bandwidth constraints. A dedicated host-side pipeline using SIMD/NEON instructions performs asynchronous, batched dequantization to INT8 into a ring buffer. The DMA controller then streams these INT8 weights directly to the accelerator.
  common_mistake: |
    **The Pitfall:** Proposing advanced 3-bit AWQ but failing to account for severe CPU latency during on-the-fly dequantization.
    **The Rationale:** Candidates ignore the strict INT8 dataflow engine limits and assume the accelerator can natively perform mixed-precision MACs.
    **The Consequence:** The host CPU cannot dequantize weights fast enough, starving the compute engine and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80M parameter model.
    - Target 30 FPS pipeline.
    - PCIe limit: 2 GB/s.

    **Calculations:**
    - INT8 stored weights require 80MB per full model stream.
    - If INT8 weights are streamed every frame: 80MB * 30 FPS = 2.4 GB/s, which exceeds the 2 GB/s PCIe limit.
    - 4-bit host storage reduces model read bandwidth to 40MB * 30 FPS = 1.2 GB/s.
    - The dequantization pipeline must expand 40MB of packed weights into 80MB of INT8 weights per frame.
    - Required host dequantization read+write throughput = (40MB + 80MB) * 30 FPS = 3.6 GB/s of host memory traffic.
    - If the expanded INT8 weights must still cross PCIe every frame, PCIe remains 2.4 GB/s and the design fails; the ring buffer must stage/reuse chunks so PCIe sees a steady stream within 2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.2 GB/s compressed reads but 3.6 GB/s host dequantization traffic (Host-Compute Bound).** Sub-4-bit storage only helps if asynchronous dequantization and chunk reuse prevent the INT8-expanded stream from exceeding the PCIe budget.
