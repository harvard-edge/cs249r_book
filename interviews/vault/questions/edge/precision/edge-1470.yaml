title: Sub-4-bit Weight Streaming for DRAM-less Edge Accelerators
scenario: Your team is deploying a heavy vision transformer to a DRAM-less edge dataflow accelerator for real-time drone surveillance. The accelerator accepts INT8 weights at execution time, while model storage and staging are constrained by host memory capacity and PCIe bandwidth. The model's footprint exceeds the limits if kept in standard INT8.
question: How would you use sub-4-bit host-side weight storage while still feeding INT8 weights efficiently to the accelerator?
details:
  realistic_solution: A robust design stores the model in a 4-bit or 3-bit compressed format on the host to meet capacity and host-read bandwidth constraints. A dedicated host-side pipeline using SIMD/NEON instructions performs asynchronous, batched dequantization to INT8 into a ring buffer. Because the accelerator accepts INT8 at execution time, any dequantized weights sent over PCIe consume expanded INT8 bandwidth. The design only meets the 2 GB/s PCIe budget if it reuses resident chunks across frames, streams less than a full model per frame, or otherwise keeps expanded DMA below the link limit.
  common_mistake: |
    **The Pitfall:** Proposing advanced 3-bit AWQ but failing to account for severe CPU latency during on-the-fly dequantization.
    **The Rationale:** Candidates ignore the strict INT8 dataflow engine limits and assume the accelerator can natively perform mixed-precision MACs.
    **The Consequence:** The host CPU cannot dequantize weights fast enough, starving the compute engine and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80M parameter model.
    - Target 30 FPS pipeline.
    - PCIe limit: 2 GB/s.

    **Calculations:**
    - INT8 stored weights require 80MB per full model stream.
    - If INT8 weights are streamed every frame: 80MB * 30 FPS = 2.4 GB/s, which exceeds the 2 GB/s PCIe limit.
    - 4-bit host storage reduces compressed host reads to 40MB * 30 FPS = 1.2 GB/s.
    - The dequantization pipeline must expand 40MB of packed weights into 80MB of INT8 weights per frame.
    - Required host dequantization read+write throughput = (40MB + 80MB) * 30 FPS = 3.6 GB/s of host memory traffic.
    - If the expanded INT8 weights cross PCIe every frame, PCIe traffic remains 80MB * 30 FPS = 2.4 GB/s and the design fails.
    - To fit PCIe at 30 FPS, expanded DMA must average at most 2 GB/s / 30 = 66.7 MB/frame, so at least 13.3 MB/frame of expanded weights must be reused, skipped, or kept resident.

    **Conclusion & Interpretation:**
    - **Result: 1.2 GB/s compressed host reads, 3.6 GB/s host dequantization traffic, and a 66.7 MB/frame expanded PCIe budget (Host/PCIe Bound).** Sub-4-bit storage solves host capacity and read bandwidth, but the design also needs chunk reuse or reduced per-frame streaming because PCIe sees expanded INT8 weights after host dequantization.
