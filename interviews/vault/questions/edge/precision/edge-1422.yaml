title: Analyzing 3-bit GPTQ Latency Degradation on Jetson Orin
scenario: You are deploying a 14-billion parameter LLM to an NVIDIA Jetson Orin module. To maximize memory
  efficiency, you apply 3-bit GPTQ extreme quantization. While the model fits comfortably in memory, you
  observe that the inference latency is actually higher and power consumption spikes compared to using
  standard INT8 quantization.
question: Why can 3-bit GPTQ make the 14B model slower and more power-hungry on Jetson Orin than standard
  INT8 despite fitting in memory?
details:
  realistic_solution: The Jetson Orin natively accelerates INT8 and FP16 via Tensor Cores, but lacks hardware
    support for 3-bit arithmetic. Consequently, the 3-bit GPTQ weights must be fetched from memory and
    unpacked into FP16 or INT8 using complex bit-shifting and masking on general CUDA cores. This unstructured
    software unpacking requires hundreds of operations per parameter, creating a severe compute bottleneck
    that takes far longer to execute than the time saved from reading less data over the memory bus.
  common_mistake: '**The Pitfall:** Assuming smaller bit-widths automatically guarantee faster inference.

    **The Rationale:** Candidates incorrectly correlate reduced memory footprint directly with reduced
    latency.

    **The Consequence:** They overlook the hardware''s native precision support and the computational
    overhead required to unpack non-standard, unaligned bit-widths on the fly.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model Size: 14B parameters

    - Target Bitwidth: 3-bit vs INT8

    - LPDDR5 Bandwidth: ~200 GB/s

    - Unpacking Cost: ~100 ALU ops per parameter (bit-shifts/masks)

    - Orin CUDA Core INT32 Throughput: ~2 TOPS

    **Calculations:**

    - Capacity Savings: 14 GB (INT8) - 5.25 GB (3-bit) = 8.75 GB saved

    - Bandwidth Time Saved: 8.75 GB / 200 GB/s = ~43.75 ms

    - Compute Overhead: 14B parameters * 100 Ops/param = 1,400 GOPS (1.4 TOPS)

    - Unpacking Time: 1.4 TOPS / 2 TOPS = 700 ms

    **Conclusion & Interpretation:**

    - **Result: Compute-Bound.** Because the hardware lacks native 3-bit support, executing 1,400 GOPS
    of software unpacking takes ~700 ms, massively overshadowing the ~44 ms saved in memory bandwidth.'
