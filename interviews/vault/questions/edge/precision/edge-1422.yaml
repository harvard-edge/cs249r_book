title: Analyzing 3-bit GPTQ Latency Degradation on Jetson Orin
scenario: You are deploying a 14-billion parameter LLM to an NVIDIA Jetson Orin module. To maximize memory efficiency, you apply 3-bit GPTQ extreme quantization. While the model fits comfortably in memory, you observe that the inference latency is actually higher and power consumption spikes compared to using standard INT8 quantization.
question: Why can 3-bit GPTQ make the 14B model slower and more power-hungry on Jetson Orin than standard INT8 despite fitting in memory?
details:
  realistic_solution: 'The Jetson Orin natively accelerates INT8 and FP16 via Tensor Cores, but lacks hardware support for 3-bit arithmetic. Consequently, the 3-bit GPTQ weights must be fetched from memory and dequantized to FP16 or INT8 using general CUDA cores before the Tensor Cores can execute matrix multiplications. This unstructured unpacking creates a severe ALU bottleneck that negates memory bandwidth savings.'
  common_mistake: |
    **The Pitfall:** Assuming smaller bit-widths automatically guarantee faster inference.
    **The Rationale:** Candidates incorrectly correlate reduced memory footprint directly with reduced latency.
    **The Consequence:** They overlook the hardware's native precision support and the computational overhead required to unpack non-standard, unaligned bit-widths on the fly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 14B parameters
       - Unpacking Cost: 5 ALU ops per parameter
       - Target Bitwidth: 3-bit vs INT8
    2. **Calculations:**
       - Capacity Savings: 14 GB (INT8) - 5.25 GB (3-bit) = 8.75 GB saved
       - Compute Overhead: 14B parameters * 5 Ops/param = 70 Giga-operations per pass
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Because the hardware lacks native 3-bit tensor cores, executing 70 GOPS of unstructured software unpacking creates a massive ALU bottleneck that negates all theoretical memory bandwidth savings.
