title: INT8 Quantization Strategy for Google Coral Deployment
scenario: You are tasked with deploying a MobileNetV2-based object detection model on a Google Coral Edge TPU via a USB form factor. The device operates under a strict 2W power budget and delivers 4 TOPS exclusively for INT8 arithmetic. Your model currently uses FP32 precision, and you must design a specification to quantize the model entirely to INT8 to avoid latency-inducing CPU fallbacks due to the TPU's limited operator support.
question: How would you fully quantize and refactor the MobileNetV2 model so it runs entirely on the Coral Edge TPU without CPU fallbacks?
details:
  realistic_solution: Design a Quantization-Aware Training (QAT) pipeline that enforces per-tensor or per-channel INT8 quantization constraints during training. You must specify a representative calibration dataset to fix zero-points and scales accurately, and explicitly replace unsupported operations (like Swish) with TPU-supported alternatives like ReLU6 to guarantee full delegation to the Edge TPU.
  common_mistake: Candidates often propose standard Post-Training Quantization (PTQ) without accounting for the Edge TPU's strict INT8-only requirement and limited operator support. They frequently overlook that unsupported operators (like certain custom activations) will cause a fallback to the host CPU, destroying performance over the USB interface.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Edge TPU provides 4 TOPS at 2W.
    - MobileNetV2 model requires roughly 600 Million MACs (1.2 GOPs).
    - Target: 30 FPS (33.3 ms/frame budget).
    - USB 2.0 interface speed: approx. 60 MB/s.

    **Calculations:**
    - Theoretical compute time = 1.2 GOPs / 4000 GOPs = 0.3 ms.
    - Image transfer time (300x300x3 UINT8 = 270 KB) = 270 KB / 60 MB/s = 4.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 4.8 ms latency (I/O-Bound)**. Fully quantizing to INT8 avoids the severe USB ping-pong transfer bottlenecks that would occur with CPU fallbacks.
