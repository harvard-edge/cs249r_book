title: The Stereo Vision Memory Squeeze
scenario: A smart camera edge device has a strict 60 MB high-speed SRAM budget for model weights. The team must deploy two identical computer vision models concurrently for stereo vision. The original model occupies 50 MB in FP16 precision. The team proposes quantizing both models to INT8 to fit.
question: Will quantizing two 50 MB FP16 models to INT8 fit within the 60 MB SRAM weight budget, and why?
details:
  realistic_solution: Yes, this strategy will work. An FP16 model uses 2 bytes for every parameter, while an INT8 model uses only 1 byte. Quantizing the 50 MB FP16 model to INT8 will halve its size.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization provides a 4x memory reduction regardless of the starting precision.
    **The Rationale:** Engineers transitioning from server environments are accustomed to 32-bit floats, where moving to INT8 yields a 4x reduction.
    **The Consequence:** Incorrectly calculating memory bounds and causing unexpected Out-of-Memory crashes when moving from FP16 to INT8, which only yields a 2x reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Budget: 60 MB.
    - Base Model Size: 50 MB (FP16).
    - Number of models: 2.
    - Target Precision: INT8.

    **Calculations:**
    - Initial Size (2 models): 50 MB * 2 = 100 MB.
    - Quantization Factor: FP16 (2 bytes) to INT8 (1 byte) = 2x reduction.
    - Quantized Single Model: 50 MB / 2 = 25 MB.
    - Total Target Size: 25 MB * 2 = 50 MB.

    **Conclusion & Interpretation:**
    - **Result: 50 MB total footprint (Memory-Feasible).** Fits comfortably in 60 MB.
  options:
  - No, the total size is still 100 MB, which is over the 60 MB budget.
  - Yes, the total size will be 25 MB, leaving plenty of extra space.
  - Yes, the total size will be 50 MB, which fits within the 60 MB budget.
  - No, the quantization only provides a 1.5x reduction, resulting in a total size of ~67 MB, which is still too large.
