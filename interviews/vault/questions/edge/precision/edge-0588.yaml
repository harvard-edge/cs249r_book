title: The Headlight Glare Catastrophe
scenario: 'You are the tech lead for perception on a new ADAS platform. Your team is tasked with deploying a YOLOV8-based object detector on a Jetson AGX Orin, which has a hard real-time budget of 33ms per frame (30 FPS). The baseline FP16 model runs at 45ms. To meet the deadline, a junior engineer uses standard post-training quantization (PTQ), converting the entire model to INT8. They use 10,000 daytime driving frames for calibration. The results look great: latency drops to 25ms and mAP on the validation set only decreases by 0.8%. However, during night-time road tests, you hit a critical bug: in the presence of direct oncoming headlight glare, the model completely fails to detect pedestrians that the original FP16 model saw perfectly.'
question: Why did the 'successful' quantization lead to a catastrophic failure in production, and what is your precise, justified plan to fix it?
details:
  realistic_solution: The root cause is calibration distribution shift and layer sensitivity, not a generic INT8 speed/accuracy tradeoff. Daytime-only PTQ underestimates activation ranges produced by night headlight glare, so glare-sensitive early feature maps saturate during quantization and lose the contrast cues needed for pedestrian detection. Fix it by rebuilding calibration and validation sets with night, headlight, rain, and high dynamic range scenes; inspect per-layer saturation and accuracy sensitivity; use per-channel scales or percentile clipping where appropriate; keep only sensitive early or detection-head layers in FP16 if PTQ still clips; and use QAT only if representative PTQ plus selective FP16 cannot meet both accuracy and the 33ms deadline.
  common_mistake: |
    **The Pitfall:** Treating the daytime validation result as proof that the INT8 model is safe.
    **The Rationale:** Standard PTQ only preserves ranges represented in calibration, and out-of-distribution night glare can saturate sensitive feature maps.
    **The Consequence:** The deployment passes average validation metrics but fails on safety-critical night scenes unless calibration, validation, and selective precision are tied to the production distribution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime calibration range: [-12.0, 12.0].
    - Use symmetric signed INT8: q in [-127, 127], zero-point z = 0.
    - Night activation: r = 50.0.

    **Calculations:**
    - Scale s = 12.0 / 127 = 0.0945 FP units per INT8 step.
    - Quantize with q = clip(round(r / s) + z, -127, 127).
    - Unclipped q = round(50.0 / 0.0945) = 529.
    - Clipped q = 127.
    - Dequantize with r' = (q - z) * s = 127 * 0.0945 = 12.0.
    - Relative amplitude error = (50.0 - 12.0) / 50.0 = 76%.

    **Conclusion & Interpretation:**
    - **Result: 76% amplitude loss from saturation (Precision-Bound)**. Standard INT8 PTQ clips values outside the calibrated range; it does not need wrap-around to fail. The fix is representative night/glare calibration and validation, then per-layer mitigation such as per-channel scaling, percentile clipping, selective FP16, or QAT if PTQ remains insufficient.
