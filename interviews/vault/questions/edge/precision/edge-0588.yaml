title: The Headlight Glare Catastrophe
scenario: 'You are the tech lead for perception on a new ADAS platform. Your team is tasked with deploying a YOLOV8-based object detector on a Jetson AGX Orin, which has a hard real-time budget of 33ms per frame (30 FPS). The baseline FP16 model runs at 45ms. To meet the deadline, a junior engineer uses standard post-training quantization (PTQ), converting the entire model to INT8. They use 10,000 daytime driving frames for calibration. The results look great: latency drops to 25ms and mAP on the validation set only decreases by 0.8%. However, during night-time road tests, you hit a critical bug: in the presence of direct oncoming headlight glare, the model completely fails to detect pedestrians that the original FP16 model saw perfectly.'
question: Why did the 'successful' quantization lead to a catastrophic failure in production, and what is your precise, justified plan to fix it?
details:
  realistic_solution: 'The root cause is catastrophic activation overflow in the INT8 domain. The initial convolutional layers of a vision model often act as brightness/contrast detectors. Headlight glare creates extremely high activation values in the FP16 model, far outside the distribution of the ''daytime'' calibration data. The scaling factor ''S'' chosen during PTQ was therefore too aggressive; it mapped a relatively small dynamic range (e.g., [-15, 15]) to the full INT8 range ([-127, 127]). When a real activation value of, say, 100.0 from headlight glare hits this layer, it gets multiplied by the scaling factor and massively exceeds 127, causing it to clip or wrap-around. This injects a huge, non-linear error into the feature map, corrupting all subsequent layers and causing the model to fail. The correct solution is a mixed-precision strategy. Keep vulnerable layers in FP16 to preserve their dynamic range and quantize the remainder of the network to INT8.'
  common_mistake: |
    **The Pitfall:** Answering 'The calibration dataset was not representative' without diagnosing the mechanism.
    **The Rationale:** Candidates correctly identify the root cause but fail to understand the mathematical activation overflow causing the feature map corruption.
    **The Consequence:** Wasting time on brute-force Quantization-Aware Training (QAT) when selectively keeping early layers in FP16 solves the issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime range: [-12.0, 12.0]
    - Night activation: r = 50.0

    **Calculations:**
    - Scale S = 127 / 12.0 = 10.58
    - Quantized q = round(50.0 * 10.58) = 529 (clips to 127)
    - De-quantized r' = 127 / 10.58 = 12.0
    - Error = (50.0 - 12.0) / 50.0 = 76%

    **Conclusion & Interpretation:**
    - **Result: 76% error due to clipping (Precision-Bound)**. Mixed-precision is required to handle high activation values.
