title: Extreme Quantization Strategy for Large Models on Google Coral Edge TPU
scenario: You are leading the ML engineering effort for a critical real-time application that requires deploying a large, complex model (e.g., a 7B parameter LLM or a high-resolution instance segmentation model) on embedded hardware. The chosen platform is the Google Coral Edge TPU, which offers 4 TOPS for INT8 operations and has a strict power budget of 2W. Crucially, the Coral Edge TPU only natively supports INT8 inference. Your initial FP16/FP32 trained model is far too large (both in memory and compute requirements) to meet the target latency of <50ms per inference and an accuracy degradation ceiling of 5% from the FP16 baseline, even after aggressive INT8 post-training quantization.
question: Why is sub-4-bit deployment infeasible for the oversized model on Coral Edge TPU, and what fallback plan meets the latency and accuracy targets?
details:
  realistic_solution: A realistic solution starts by rejecting sub-4-bit emulation as the main Coral Edge TPU path. The Edge TPU accelerates supported INT8 graphs; arbitrary 2-4 bit LLM arithmetic would require packing, unpacking, and custom operations that fall back to the host or unsupported kernels. For a 7B LLM, replace the deployment target with a much smaller distilled model, a task-specific classifier/segmenter, or an offloaded/cloud-assisted LLM path. Use INT8 PTQ or QAT for the Coral-compatible model, verify compiler coverage, and measure end-to-end latency. If the 7B model is mandatory, choose different hardware with enough memory and native kernel support for low-bit LLM inference.
  common_mistake: |
    **The Pitfall:** Treating sub-4-bit compression as if it gives native Coral Edge TPU acceleration.
    **The Rationale:** The Edge TPU supports a constrained INT8 operator set; packed 2-4 bit LLM kernels are not the same as supported INT8 convolutions or matmuls.
    **The Consequence:** The model either cannot compile, spills to slow host execution, exceeds memory, or misses the <50 ms target despite looking small on paper.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameter LLM (14 GB at FP16).
    - Target: Average 3 bits/parameter (INT8/INT4/INT2 mix).
    - Coral Edge TPU: 4 TOPS peak for supported INT8 operations, 2W budget.
    - Target latency: <50 ms, so the request budget is 0.05 s.

    **Calculations:**
    - Compressed weight size: 7 billion x (3/8) bytes = 2.625 GB before scales, metadata, KV cache, and runtime buffers.
    - Even if the whole 4 TOPS peak were usable, the <50 ms budget allows at most 4 x 10^12 ops/s x 0.05 s = 200 GOPS.
    - A 7B LLM token step usually requires many billions of weight operations plus KV-cache traffic, and sub-4-bit unpack/dequantization is not native on Coral.
    - Therefore compression alone does not make the model compile or meet latency.

    **Conclusion & Interpretation:**
    - **Result: infeasible on Coral Edge TPU as stated**. The correct plan is to shrink/distill the model into a supported INT8 graph, offload the oversized model, or change hardware; sub-4-bit emulation on an INT8-only Coral is not a credible way to meet <50 ms and <5% accuracy loss.
