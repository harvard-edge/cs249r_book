title: 'Extreme Quantization Strategy for Large Models on Google Coral Edge TPU'
scenario: 'You are leading the ML engineering effort for a critical real-time application that requires deploying a large, complex model (e.g., a 7B parameter LLM or a high-resolution instance segmentation model) on embedded hardware. The chosen platform is the Google Coral Edge TPU, which offers 4 TOPS for INT8 operations and has a strict power budget of 2W. Crucially, the Coral Edge TPU only natively supports INT8 inference. Your initial FP16/FP32 trained model is far too large (both in memory and compute requirements) to meet the target latency of <50ms per inference and an accuracy degradation ceiling of 5% from the FP16 baseline, even after aggressive INT8 post-training quantization.'
question: 'How would you use extreme sub-4-bit quantization for the oversized model on the INT8-only Coral Edge TPU while meeting <50 ms latency and <5% accuracy loss?'
details:
  realistic_solution: 'The solution requires a multi-pronged approach: 1. **Baseline INT8 Quantization:** Establish PTQ/QAT baseline. 2. **Mixed-Precision & Sub-4-bit Strategy:** Bit-packing sub-4-bit into single INT8 bytes, and INT8 Emulation for sub-4-bit arithmetic using the Coral''s native INT8 instructions. 3. **Aggressive Accuracy Recovery:** Knowledge distillation and quantization-aware data augmentation.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on direct sub-4-bit quantization techniques without a clear plan for how these execute on an INT8-only accelerator.
    **The Rationale:** Leading to either unsupported operations or inefficient emulation.
    **The Consequence:** Failing to realize the hardware requires bit-packing and emulated INT8 instructions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameter LLM (14 GB at FP16).
    - Target: Average 3 bits/parameter (INT8/INT4/INT2 mix).
    - Compute: Coral Edge TPU = 4 TOPS (INT8).

    **Calculations:**
    - Compressed size: 7 billion $\times$ (3/8) bytes $\approx$ 2.6 GB.
    - Compute requirement: 200 GFLOPS equivalent = 400-800 GOPS needed.

    **Conclusion & Interpretation:**
    - **Result: 2.6 GB (Memory-Bound)**. While compute theoretically supports the load, memory bandwidth and emulation overhead for sub-4-bit are the critical bottlenecks.
