title: The Quantization Memory Payoff
scenario: 'You are deploying a 350 million parameter computer vision model to an edge device. The model weights are currently stored in FP16 format. To reduce the application''s memory footprint, you decide to quantize the model to INT8.'
question: 'What percentage reduction in weight memory should you expect when quantizing 350M parameters from FP16 to INT8?'
details:
  realistic_solution: 'Moving from FP16 to INT8 cuts the memory requirement per parameter in half. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte. Therefore, the total memory required for the model''s weights is reduced by exactly 50%.'
  common_mistake: |
    **The Pitfall:** Confusing the memory savings of FP16-to-INT8 quantization with FP32-to-INT8.
    **The Rationale:** Because INT8 is often touted as a "4x reduction" from standard FP32 formats, engineers hastily apply that heuristic universally.
    **The Consequence:** The team overestimates the memory savings (expecting 75%) and plans an architecture that will ultimately fail to fit in physical RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 350M parameters.
    - Quantization: FP16 (2 bytes) to INT8 (1 byte).

    **Calculations:**
    - Initial Memory (FP16): 350,000,000 * 2 bytes = 700 MB.
    - Quantized Memory (INT8): 350,000,000 * 1 byte = 350 MB.
    - Reduction Calculation: (700 MB - 350 MB) / 700 MB = 0.50.

    **Conclusion & Interpretation:**
    - **Result: Exactly 50% reduction (Memory-Capacity-Bound)**. The quantization yields a direct halving of the total weight memory footprint.
  options:
    - 'A 75% reduction.'
    - 'A 100% reduction.'
    - 'A 50% reduction.'
    - 'A 25% reduction.'
