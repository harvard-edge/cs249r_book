title: 'Optimizing Real-time Object Detection on NVIDIA Jetson Orin via Mixed-Precision'
scenario: 'You are tasked with deploying a high-accuracy real-time object detection model (e.g., YOLOv8 large) on an NVIDIA Jetson Orin development kit, which features 32 GB LPDDR5 memory, 275 TOPS INT8 performance, and a 60W power budget. The current FP32 model achieves 15 FPS on average, but the strict requirement is 30 FPS for multiple camera streams, and it consumes 25GB of the available 32GB GPU memory during peak load, frequently leading to Out-Of-Memory (OOM) errors.'
question: 'How would you diagnose bottlenecks and design a quantified mixed-precision plan for YOLOv8-L on Jetson Orin to reach 30 FPS without OOMs?'
details:
  realistic_solution: |
    A realistic solution involves a multi-stage, data-driven approach:

    1.  **Profile FP32 Baseline:** Use tools like NVIDIA Nsight Systems or PyTorch Profiler on the Jetson Orin to get a detailed breakdown of FP32 inference performance and memory usage. Identify the most computationally intensive layers and those with large activation footprints.

    2.  **Initial FP16 Conversion with AMP:** Leverage PyTorch's Automatic Mixed Precision (AMP) for inference. This automatically casts most operations to FP16 while keeping numerically sensitive operations in FP32. This immediately halves memory for most weights and activations and benefits from Orin's FP16 Tensor Cores. This addresses memory OOMs and provides initial speedup.

    3.  **INT8 Quantization via TensorRT:** For further acceleration and memory reduction, apply Post-Training Quantization (PTQ) to INT8 using NVIDIA TensorRT. This requires a representative calibration dataset. Critically, analyze profiling results to identify layers that are robust to INT8 quantization and those that might be more sensitive. Use TensorRT's quantization aware training (QAT) or calibration tools to ensure minimal accuracy loss. Focus on quantizing convolutional and linear layers which heavily benefit from INT8 Tensor Cores.

    4.  **Layer-Specific Precision:** Retain FP32 for numerically critical layers (e.g., softmax, normalization layers, some loss components, or custom operations) if profiling indicates severe accuracy degradation or if hardware doesn't offer accelerated INT8/FP16 paths.

    5.  **Batching & Memory Optimization:** Optimize the batch size for inference and explore TensorRT's memory-saving optimizations (e.g., layer fusion, efficient memory allocation strategies). Continuously monitor accuracy against a validation dataset after each optimization step.
  common_mistake: |
    **The Pitfall:** A "one-size-fits-all" approach to mixed-precision.
    **The Rationale:** Candidates blindly convert the entire model to INT8 without profiling, completely ignoring the numerical sensitivities of different layers or specific hardware support.
    **The Consequence:** The model suffers severe accuracy drops or introduces new performance bottlenecks due to frequent precision casting, failing to fully utilize the INT8 accelerators.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current State (FP32): 25 GB memory, 15 FPS (1/15s per frame).
    - INT8 is 2.5x faster than FP16.
    - Assuming 70% of ops are accelerated by INT8 and 30% remain FP16.

    **Calculations:**
    - FP16 conversion reduces footprint by ~2x: 25 GB / 2 = 12.5 GB.
    - FP32 base time cost = 1.0.
    - FP16 relative time cost = 0.5.
    - INT8 relative time cost = 0.5 / 2.5 = 0.2.
    - Mixed-precision time: (0.70 * 0.2) + (0.30 * 0.5) = 0.14 + 0.15 = 0.29 of original time.
    - Total speedup: 1.0 / 0.29 = ~3.45x.
    - Expected FPS: 15 FPS * 3.45 = ~51.75 FPS.

    **Conclusion & Interpretation:**
    - **Result: ~51.75 FPS (Compute-Bound)**. Mixed-precision via AMP and TensorRT PTQ significantly exceeds the 30 FPS target while eliminating OOMs.
