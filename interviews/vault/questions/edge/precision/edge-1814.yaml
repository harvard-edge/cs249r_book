title: INT8 Dataflow Deployment for a DRAM-Less Accelerator
scenario: You are tasked with deploying an FP32 object detection model to a dataflow edge accelerator for real-time video analytics. The accelerator provides strictly INT8 compute and features no local DRAM, streaming data directly from host memory.
question: How would you convert and compile the FP32 detector into a fully INT8 dataflow graph without host-memory graph breaks?
details:
  realistic_solution: |
    Start from the FP32 detector by exporting a clean graph, folding batch norm and other fusable layers, and replacing unsupported operators with accelerator-supported INT8 equivalents before compilation. Calibrate with representative PTQ data, or use QAT if accuracy drops, then compile with constraints that require every layer to map to supported INT8 dataflow operators. Inspect the compiler report for graph partitions, host fallbacks, precision changes, and activation spills; any unsupported layer must be fused, rewritten, or moved to a supported model variant rather than left as a host-memory graph break.
  common_mistake: |
    **The Pitfall:** Executing standard mixed-precision deployment (retaining FP16 for sensitive layers).
    **The Rationale:** Candidates copy cloud inference heuristics without accounting for the architectural hostility of DRAM-less dataflow accelerators toward graph partitions.
    **The Consequence:** The dataflow pipeline shatters, spilling gigabytes of activation memory to the host CPU, instantly turning real-time inference into a slideshow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Feature Map: 256-channel 128x128 in FP16
    - PCIe Gen3 x4 bandwidth: ~3.9 GB/s
    - Accelerator capability: 4 GOPS in < 0.2 ms natively

    **Calculations:**
    - FP16 activation size = 256 * 128 * 128 * 2 bytes = 8,388,608 bytes = 8.0 MiB (~8.39 MB)
    - Round-trip host transfer = 2 * 8.39 MB = 16.78 MB
    - PCIe round-trip time = 16.78 MB / 3,900 MB/s = 0.00430 s = 4.3 ms

    **Conclusion & Interpretation:**
    - **Result: 4.3 ms per graph break (I/O-Bound)**. A single mixed-precision or host-fallback partition can dominate sub-millisecond on-chip execution, so the deployable graph must remain fully INT8 and accelerator-resident.
