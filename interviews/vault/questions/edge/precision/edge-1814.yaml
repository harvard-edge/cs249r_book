title: INT8 Dataflow Specification for Hailo-8
scenario: You are tasked with deploying an FP32 object detection model to a dataflow edge accelerator for real-time video analytics. The accelerator provides strictly INT8 compute and features no local DRAM, streaming data directly from host memory.
question: What precision-reduction and deployment pipeline efficiently runs the FP32 detector on this architecture without host-memory streaming bottlenecks?
details:
  realistic_solution: Mandate a rigorous Quantization-Aware Training (QAT) methodology that forces 100% of the model graph into INT8 precision. To compensate for activation degradation, implement Top-K sparsification or expand channel widths prior to compilation. The dataflow architecture requires the model to entirely reside on-chip; falling back to mixed-precision destroys the pipeline throughput by flooding the host PCIe bus.
  common_mistake: |
    **The Pitfall:** Executing standard mixed-precision deployment (retaining FP16 for sensitive layers).
    **The Rationale:** Candidates copy cloud inference heuristics without accounting for the architectural hostility of DRAM-less dataflow accelerators toward graph partitions.
    **The Consequence:** The dataflow pipeline shatters, spilling gigabytes of activation memory to the host CPU, instantly turning real-time inference into a slideshow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Feature Map: 256-channel 128x128 in FP16
    - PCIe Gen3 x4 bandwidth: ~3.9 GB/s
    - Accelerator capability: 4 GOPS in < 0.2 ms natively

    **Calculations:**
    - FP16 Activation Size = 256 * 128 * 128 * 2 bytes = 8.38 MB
    - Round-trip PCIe penalty = (8.38 MB * 2) / 3900 MB/s = 4.3 ms
    - Theoretical max FPS with graph break = 1000 ms / 4.3 ms = 232 FPS

    **Conclusion & Interpretation:**
    - **Result: 4.3 ms penalty (I/O-Bound)**. A single precision fallback inflates latency by 20x compared to pure on-chip execution.
