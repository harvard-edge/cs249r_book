title: Hailo-8 Mixed Precision INT8 Clipping Diagnosis
scenario: An object detection model was quantized to INT8 for a Hailo-8. The mAP plummeted by 15%, particularly on low-contrast objects.
question: Design a mixed-precision diagnostic strategy to restore mAP without falling below the 20 TOPS throughput requirement?
details:
  realistic_solution: The mAP drop on low-contrast objects suggests activation clipping or high quantization noise in sensitivity-critical layers. I would compare INT8 and FP16 activations layer by layer, compute SQNR or cosine similarity, inspect calibration histograms for clipped low-contrast features, and run an ablation that restores only the worst layers to FP16. Leave initial feature extraction, final detection heads, or other measured outliers in FP16, while keeping the dense intermediate layers in INT8 so the model can recover accuracy without dropping below the 20 TOPS target.
  common_mistake: |
    **The Pitfall:** Switching the entire model back to FP16.
    **The Rationale:** Candidates take the easiest path to restore accuracy without calculating the performance cost of reverting fully to floating point.
    **The Consequence:** Immediately violates the 20 TOPS throughput requirement on an accelerator explicitly optimized for INT8.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline throughput: 26 TOPS (INT8)
    - Target minimum throughput: 20 TOPS
    - Candidate sensitive layers account for 15-20% of model operations.

    **Calculations:**
    - Throughput budget allows a drop of 26 - 20 = 6 TOPS.
    - Maximum allowed relative drop = 6 / 26 = 23%.
    - If FP16 fallback for sensitive layers costs about the same fraction as their operation share, restoring 15-20% of operations gives estimated throughput = 26 * (1 - 0.15 to 0.20) = 22.1 to 20.8 TOPS.
    - Validate layer choices by SQNR/cosine-similarity ranking and mAP ablations; do not restore layers that are not accuracy-sensitive.

    **Conclusion & Interpretation:**
    - **Result: about 20.8-22.1 TOPS under the 15-20% FP16 fallback budget (Precision-Bound).** Mixed precision is acceptable only if the measured sensitive-layer set restores mAP while keeping most operations on INT8.
