title: INT8 Calibration Set Size vs Accuracy
scenario: You're quantizing YOLOv8s (11.2M params, FP32) to INT8 using TensorRT's
  post-training quantization. The calibration step requires a representative dataset
  to determine the dynamic range of each layer's activations. Your training set has
  50,000 images.
question: How many calibration images do you actually need, and what happens if you
  use too few or too many?
details:
  realistic_solution: Calibration determines the min/max (or percentile) range of
    activations per layer to set the INT8 scale factors. The key insight is that you
    need enough samples to capture the activation distribution's tails, not to train
    the model. 500 to 1000 images is typically the sweet spot for robust calibration.
  common_mistake: '**The Pitfall:** Using all 50,000 training images for calibration.

    **The Rationale:** Candidates incorrectly assume that "more data is always better"
    applies to PTQ calibration.

    **The Consequence:** Calibration takes hours, provides negligible accuracy improvement
    over a tiny subset, and can actually overfit the activation ranges if the full
    dataset contains massive outliers.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Calibration pool: 50,000 images.

    - Processing speed: 15ms per image.


    **Calculations:**

    - 500 images: 500 * 15ms + 30s overhead = 37.5s.

    - 5,000 images: 5000 * 15ms + 30s overhead = 105s.

    - Accuracy returns: 500 images hits 44.0 mAP. 5,000 images hits 44.3 mAP.

    - Value: The initial 500 images recover 1.9% mAP in 6 seconds (0.3s per 0.1% mAP).


    **Conclusion & Interpretation:**

    - **Result: 500-1000 images (Compute-Bound)**. The first 500 images are 70x more
    valuable per second of calibration time than the remaining bulk. 500-1,000 images
    perfectly balances accuracy and pipeline speed.

    '
  options:
  - The issue stems from OS-level scheduling interference; pinning the inference thread
    to a dedicated core will eliminate the performance variance.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline
    will have minimal impact on end-to-end latency.
  - Use all 50,000 images for calibration — more data is always better.. Calibration
    is not training.
  - 'Calibration determines the min/max (or percentile) range of activations per layer
    to set the INT8 scale factors. The key insight: you need enough samples to capture
    the activation distribution''s tails, not to train the model.'
