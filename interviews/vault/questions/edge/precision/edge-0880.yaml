title: IoT Vibration Dynamic Range
scenario: 'A Cortex-M7 microcontroller monitors turbine vibrations via a 20M parameter 1D-ResNet. Input signals have a massive dynamic range, from 0.01g (micro-fractures) to 100g (normal heavy load). The NPU only supports symmetric INT8. Standard PTQ drops anomaly detection recall from 99% to 45%.'
question: 'How would you preserve 0.01g turbine anomalies on a symmetric INT8 Cortex-M7 NPU with signals ranging up to 100g?'
details:
  realistic_solution: 'Standard linear quantization fails because the dynamic range (10^4) exceeds the capacity of linear INT8. Implement a log2 companding layer (similar to mu-law) in the DSP before passing the signal to the NPU, and retrain the 1D-ResNet using QAT to operate on these logarithmically scaled inputs. Alternatively, use QAT with Parameterized Clipping Activation (PACT) to deliberately clip 100g outliers and allocate all INT8 bins to the critical 0-2g range.'
  common_mistake: |
    **The Pitfall:** Relying on standard min-max calibration over the entire dataset.
    **The Rationale:** Candidates blindly use standard PTQ tools without inspecting the signal dynamic range.
    **The Consequence:** The 100g peaks map to 127, crushing the critical 0.01g micro-fracture signatures entirely into the 0 bin, destroying all anomaly recall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Signal range is [-100g, 100g].
    - INT8 has 255 bins.
    - Target signals are at 0.01g.

    **Calculations:**
    - Linear Min-Max bin size = 200 / 255 = 0.78g/bin. A 0.01g signal rounds to 0.
    - Log2 Companding Range: Log2(100) = 6.64, Log2(0.01) = -6.64. Range = 13.28.
    - Bin size = 13.28 / 255 = 0.052.

    **Conclusion & Interpretation:**
    - **Result: 0.052 bin size (Precision-Bound)**. Non-linear companding or extreme clipping perfectly preserves relative amplitude across the 10^4 range within INT8.
  options:
  - 'Using standard min-max calibration over the whole dataset, which maps the 100g peaks to 127 and completely crushes the critical 0.01g micro-fracture signatures into the 0 bin.'
  - 'Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.'
  - 'Standard linear quantization fails here because the dynamic range (10^4) exceeds the representational capacity of linear INT8. To fix this without upgrading the hardware, the system architecture must incorporate non-linear signal compression before NPU execution.'
  - 'The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.'
