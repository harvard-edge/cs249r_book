title: INT8 Quantization Impact on Regression Heads
scenario: We deployed an object detection model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, dataflow architecture, no local DRAM, streaming from host memory). The FP32 model was post-training quantized to INT8 to run on the accelerator. During edge testing, the model achieves the target throughput, but the bounding box predictions become highly jittery and inaccurate, even though the classification accuracy remains identical to the FP32 baseline.
question: Why does INT8 quantization make box regression jittery while classification stays accurate, and what FPS can 65 GOPS/frame achieve at 50% Hailo-8 utilization?
details:
  realistic_solution: Classification is robust to quantization because it relies on the relative magnitude of logits (the argmax remains unchanged even with precision loss). Bounding box regression, however, requires continuous, high-dynamic-range coordinate predictions, making it highly sensitive to the truncation errors and limited binning of INT8 precision. Because Hailo-8 enforces strict INT8 execution, the best mitigation is to output dense INT8 feature maps and perform the final high-precision anchor decoding on the host CPU.
  common_mistake: |
    **The Pitfall:** Blaming the hardware architecture (e.g., host streaming latency or lack of DRAM) for the jitter.
    **The Rationale:** Candidates assume that because throughput is met, any artifact must be a result of the dataflow pipeline dropping frames or corrupting memory.
    **The Consequence:** They try to optimize I/O or DMA buffers instead of addressing the fundamental algorithmic loss of continuous precision in the regression head.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Peak Compute: 26 TOPS = 26,000 GOPS.
    - Effective Compute (50% utilization) = 13,000 GOPS.
    - Compute target: 65 GOPS/frame.
    - Power Budget: 2.5W.

    **Calculations:**
    - Maximum FPS = 13,000 GOPS / 65 GOPS/frame = 200 FPS.
    - Power efficiency = 200 FPS / 2.5W = 80 FPS/Watt.

    **Conclusion & Interpretation:**
    - **Result: 200 FPS (Compute-Bound)**. While the FPS and power are efficient, bounding box regression is highly sensitive to INT8 truncation errors.
