title: 'Quantizing a Large Language Model for Qualcomm Cloud AI 100 Deployment'
scenario: 'Your team is tasked with deploying a state-of-the-art large language model (LLM), originally trained in FP16, onto a Qualcomm Cloud AI 100 accelerator. The target application demands extremely low latency and high throughput for real-time inference at the edge. The Qualcomm Cloud AI 100 offers 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and operates within a 75W power envelope. You need to achieve the highest possible INT8/INT4 performance while maintaining acceptable model accuracy.'
question: 'How would you quantize and deploy the FP16 LLM on the Qualcomm Cloud AI 100 to maximize INT8/INT4 performance while preserving accuracy?'
details:
  realistic_solution: 'Start with a thorough analysis of the FP16 model sensitivity to quantization. Prioritize Post-Training Quantization (PTQ) with various calibration strategies. If accuracy drops significantly, explore Quantization-Aware Training (QAT). Experiment with mixed-precision strategies, perhaps keeping critical layers in FP16/BF16. For memory optimization, consider per-channel quantization. Critically, profile memory usage to ensure the quantized model fits within the 32 GB LPDDR4x. Benchmark performance to validate the 400 TOPS INT8 utilization.'
  common_mistake: 'Neglecting the impact of quantization on model accuracy, especially for activation functions and outliers. Over-relying on default PTQ methods without sufficient calibration data. Not fully leveraging INT8 TOPS and ignoring memory constraints.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7 billion parameters.
    - Hardware: Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x @ 50-70 GB/s).
    - Single forward pass compute: 200 GOPS (INT8).

    **Calculations:**
    - FP16 footprint: 7B * 2 bytes = 14 GB. INT8 footprint: 7B * 1 byte = 7 GB.
    - INT8 Compute latency minimum: 200 * 10^9 ops / (400 * 10^12 ops/s) = 0.5 ms.
    - Memory loading latency (INT8): 7 GB / 50 GB/s = 140 ms.

    **Conclusion & Interpretation:**
    - **Result: 140 ms Memory Latency (Memory-Bandwidth-Bound)**. Loading weights from memory massively dominates execution time, rendering the 400 TOPS capacity secondary.
