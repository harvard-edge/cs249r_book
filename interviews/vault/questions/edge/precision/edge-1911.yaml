title: Deploying Sub-4-bit LLMs on a 75W Edge Accelerator
scenario: Your team is tasked with deploying a cutting-edge large language model (LLM), requiring high throughput and low latency, onto an edge accelerator. The target model has a significant memory footprint and computational demand. To meet the aggressive deployment goals and maximize the utility of the memory and processing power within a 75W power envelope, you decide to explore extreme quantization techniques, specifically sub-4-bit quantization.
question: How would you deploy sub-4-bit weight quantization for the LLM while using INT8-friendly kernels and fallbacks?
details:
  realistic_solution: |
    Use the target edge accelerator's compiler and runtime as the gate for deployment: compile the graph, inspect which operators map to supported accelerator kernels, and only use AWQ or GPTQ weight-only sub-4-bit quantization where the runtime can efficiently unpack or dequantize into supported INT8-friendly matrix kernels. Keep activations in the precision required by the supported kernels, and leave unsupported layers in INT8/FP16 or fuse/rewrite them rather than assuming every low-bit layer accelerates. Recover accuracy through calibration, distillation, or light fine-tuning, then validate perplexity, task accuracy, memory footprint, fallback transfers, power, and end-to-end latency on real prompts within the 75W envelope.
  common_mistake: |
    **The Pitfall:** Overlooking integration overhead and assuming direct hardware acceleration.
    **The Rationale:** Developers assume that the hardware inherently accelerates non-standard bit-widths without verifying the specific kernel support.
    **The Consequence:** The model falls back to inefficient software-emulated paths, resulting in significant latency or accuracy degradation if recovery techniques are poorly chosen.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters.
    - Memory Limit: 32 GB.
    - Target Precision: 3-bit packed weight-only storage, idealized at 0.375 bytes/parameter before scales and metadata.

    **Calculations:**
    - FP16 Footprint: 70B * 2 bytes = 140 GB (OOM).
    - Ideal packed 3-bit footprint: 70B * 0.375 bytes = 26.25 GB before group scales, metadata, runtime buffers, and KV cache.
    - Headline remaining memory: 32 GB - 26.25 GB = 5.75 GB before those overheads.
    - Any layer without supported low-bit or INT8-friendly kernels must remain in INT8/FP16 or fall back, adding memory traffic and latency not captured by the packed-weight footprint.

    **Conclusion & Interpretation:**
    - **Result: memory may fit only in an ideal packed-weight estimate.** Deployment is release-ready only if the AI 100 toolchain maps the quantized layers to efficient kernels and bounds higher-precision fallbacks, KV cache, metadata, and runtime buffers inside the 32 GB budget.
