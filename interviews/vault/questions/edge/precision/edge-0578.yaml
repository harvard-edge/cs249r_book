title: The Night-Vision Quantization Catastrophe
scenario: Your team is developing a pedestrian detection model for an autonomous vehicle. To meet the 30 FPS deadline, you've quantized the model from FP16 to INT8 using Post-Training Quantization (PTQ). Your calibration dataset consists of 100,000 diverse, high-quality images from daytime driving.
question: Why is this daytime-only PTQ calibration and validation insufficient, and what catastrophic failure mode should you expect under night-time glare?
details:
  realistic_solution: |
    The daytime-only PTQ calibration is insufficient because it chooses INT8 scales from a distribution that does not include night-time glare. Bright headlights and reflections can produce activations far outside the calibrated range, so those values saturate at the INT8 limits instead of preserving contrast. The expected catastrophic failure mode is severe pedestrian-detection recall collapse: glare-region features clip, pedestrians that remain visible in FP16 become false negatives, and the detector misses them despite passing daytime validation.
  common_mistake: |
    **The Pitfall:** Retreating to FP16 because INT8 is deemed "too inaccurate."
    **The Rationale:** Engineers observe the severe failure and mistakenly blame the data type's inherent precision rather than the calibration mapping.
    **The Consequence:** The model misses its 30 FPS performance target because the optimized INT8 pipeline is abandoned.
  napkin_math: |
    **Assumptions & Constraints:**
    - Signed INT8 range: [-127, 127] for a symmetric activation tensor.
    - Daytime calibration observes activations in [-5.0, 5.0].
    - Night-time glare produces an activation of 25.0.

    **Calculations:**
    - Scale = 5.0 / 127 = 0.0394 FP units per INT8 step.
    - Quantized glare value before clipping = round(25.0 / 0.0394) = 635.
    - INT8 can store at most 127, so the value saturates to 127.
    - Dequantized value after clipping = 127 * 0.0394 = 5.0.
    - Relative amplitude lost = (25.0 - 5.0) / 25.0 = 80%.

    **Conclusion & Interpretation:**
    - **Result: 80% activation-amplitude loss (Precision-Bound)**. The glare feature is flattened to the largest daytime value, destroying contrast cues and causing false negatives for pedestrians in high-glare night scenes.
