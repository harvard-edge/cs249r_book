title: Jetson Orin Peak INT8 Performance Recall
scenario: 'You are preparing to deploy a computer vision model on an NVIDIA Jetson Orin. The system is heavily constrained by its 60W TDP power budget.'
question: To set expectations for the inference latency of your quantized model, what is the theoretical peak INT8 compute performance of the NVIDIA Jetson Orin, and what hardware components contribute to this?
details:
  realistic_solution: The correct answer is 275 TOPS for INT8 operations. The candidate should correctly recall this specification and ideally note that this peak performance is achieved by co-utilizing the Ampere GPU architecture and the onboard Deep Learning Accelerator (DLA) while operating within the 60W TDP limit.
  common_mistake: |
    **The Pitfall:** Confusing the TOPS rating with older Jetson modules or citing FP16 numbers.
    **The Rationale:** Candidates forget that the peak INT8 rating combines the compute capabilities of both the Ampere GPU and the DLA accelerator.
    **The Consequence:** Incorrectly estimating the total available compute budget for the deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin 64GB has a peak of 275 TOPS (INT8 dense) and ~204 GB/s memory bandwidth within a 60W TDP.

    **Calculations:**
    - Power efficiency = 275 TOPS / 60W = 4.58 TOPS/Watt.
    - Arithmetic Intensity to saturate = (275e12 OPs) / (204e9 Bytes/s) $\approx$ 1348 OPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: Peak is 275 TOPS (Memory-Bandwidth Bound)**. To avoid becoming Memory-Bandwidth Bound, the model must maintain an extreme arithmetic intensity of >1348 OPs/Byte.
