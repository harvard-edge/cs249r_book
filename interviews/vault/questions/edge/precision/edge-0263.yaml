title: The INT8 Energy Dividend (edge-0263)
scenario: You are optimizing a perception model for an autonomous vehicle's edge accelerator, which has a very strict thermal design power (TDP). To reduce power consumption, you're considering quantizing a convolutional layer from FP16 to INT8.
question: Approximately how much more energy does a single FP16 multiply-accumulate (MAC) operation consume compared to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes roughly 5× more energy than an INT8 operation. While the bit-width is only double, floating-point arithmetic units are significantly more complex and energy-intensive than the simple integer units used for INT8. The provided physics constants show FP32-to-FP16 is a ~3.4× energy jump and FP32-to-INT8 is a ~18× jump. The ratio between them gives the FP16-to-INT8 energy gap.
  common_mistake: |
    **The Pitfall:** Conflating memory savings with energy savings.
    **The Rationale:** Engineers see that FP16 (16 bits) uses twice the memory of INT8 (8 bits) and incorrectly assume the energy savings are also 2×.
    **The Consequence:** Underestimating the power benefits of quantization, potentially leading to suboptimal hardware sizing or exceeding thermal budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physics of computation: An FP32 MAC costs ~18 pJ.
    - FP16 MAC cost: ~5.3 pJ (~3.4x less than FP32).
    - INT8 MAC cost: ~1.0 pJ (~5x less than FP16).

    **Calculations:**
    - Ratio: 5.3 pJ (FP16) / 1.0 pJ (INT8) = 5.3x.

    **Conclusion & Interpretation:**
    - **Result: 5.3x (Power-Bound)**. Switching from FP16 to INT8 reduces MAC energy consumption by over 5x.
  options:
  - ~2× more energy
  - ~18× more energy
  - ~5× more energy
  - The energy is roughly the same
