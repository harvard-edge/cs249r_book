title: 'The Energy Cost of Precision: Extreme Quantization'
scenario: In automotive systems, managing the power budget is critical to prevent overheating and ensure reliability. When optimizing a perception model, a common technique is to move from 32-bit floating-point (FP32) arithmetic to 8-bit integer (INT8) arithmetic.
question: Approximately how much energy does a compute operation save when switching from FP32 to INT8?
details:
  realistic_solution: On representative digital accelerator hardware, an FP32 operation can consume roughly 18x more energy than an INT8 operation, though the exact ratio is architecture- and workload-dependent. FP32 ALUs must handle sign, exponent, and mantissa logic, requiring more switching activity than an 8-bit integer datapath.
  common_mistake: |
    **The Pitfall:** Conflating memory footprint savings with computational energy savings.
    **The Rationale:** Candidates easily identify that INT8 takes 4x less memory space than FP32, and falsely assume the computation energy savings scale perfectly linearly at 4x as well.
    **The Consequence:** Teams may underestimate the potential power reduction from quantization, leading to overly conservative thermal designs or missed efficiency opportunities.
  napkin_math: |
    **Assumptions & Constraints:**
       - FP32 requires complex multiplier and adder circuits for mantissa and exponent logic.
       - INT8 utilizes a significantly smaller, simpler integer ALU circuit.
    **Calculations:**
       - On commonly cited accelerator energy models, the switching-complexity difference is roughly an 18x operation-energy multiplier for FP32 versus INT8.
    **Conclusion & Interpretation:**
       - **Result: approximately 18x on representative hardware.** An INT8 multiply can consume far less energy than an FP32 multiply, but the exact savings depend on the accelerator and workload.
  options:
    - Around 4×, because it uses 4 times fewer bits.
    - Around 3-4×, the savings for using half-precision (FP16).
    - Around 18×, due to the complexity of floating-point vs. integer logic.
    - Over 100×, similar to the latency gap between cache and DRAM.
