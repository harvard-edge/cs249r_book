title: Mixed-Precision Deployment for a 64 GB LLM on a 32 GB Edge Accelerator
scenario: Deploying a 64 GB FP32 LLM for real-time inference on an edge accelerator with 32 GB memory. You need lowest latency and target accuracy within the 75W power limit.
question: What mixed-precision deployment strategy fits the FP32 LLM within 32 GB memory while minimizing latency and preserving accuracy?
details:
  realistic_solution: |
    Profile the FP32 model to identify precision-sensitive layers. Employ INT8 post-training quantization or QAT for most weights to maximize compute throughput and reduce bandwidth, while selectively retaining FP16 for layers that materially protect accuracy. The memory plan must include more than weights: reserve space for KV cache, activations, runtime workspaces, and OS/driver overhead, and cap context length or batch size if those buffers crowd the 32 GB limit. Latency and power should be validated on the target board because FP16 fallback may reduce accuracy loss but can increase memory traffic and lower INT8 accelerator utilization.
  common_mistake: |
    **The Pitfall:** Blindly converting the entire model to INT8 or FP16 without analyzing layer sensitivity.
    **The Rationale:** Candidates assume uniform quantization is sufficient and focus solely on raw TOPS.
    **The Consequence:** Uniform INT8 leads to catastrophic accuracy degradation, while uniform FP16 fails to resolve the memory bandwidth bottleneck, resulting in OOM or severe latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 model size: ~64 GB for weights, so uniform FP16/BF16 weights would be ~32 GB and uniform INT8 weights would be ~16 GB.
    - Memory limit: 32 GB total, including weights, KV cache, activations, runtime buffers, and OS/driver overhead.
    - FP16 fallback is assumed to be slower and more bandwidth-heavy than INT8 on the target accelerator.

    **Calculations:**
    - Uniform FP16/BF16: ~32 GB (OOM once KV cache and activations are loaded).
    - Mixed precision (80% INT8, 20% FP16): (0.8 * 16 GB) + (0.2 * 32 GB) = 12.8 GB + 6.4 GB = 19.2 GB.
    - This leaves a headline ~12.8 GB for KV cache, activations, workspaces, and runtime overhead before any OS/driver reservations.
    - Latency/power implication: keep the FP16 20% only on accuracy-sensitive layers, because those layers use roughly 2x the weight bandwidth of INT8 and may run outside the fastest INT8 path.

    **Conclusion & Interpretation:**
    - **Result: 19.2 GB weight footprint with limited remaining memory.** Mixed INT8/FP16 can fit the weights under 32 GB, but the latency-minimizing strategy is to maximize INT8 coverage and reserve FP16 only where measured accuracy recovery justifies the bandwidth, power, and fallback cost.
