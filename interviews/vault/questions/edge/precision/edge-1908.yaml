title: 'Optimizing Large Language Model Inference with Mixed-Precision on Qualcomm Cloud AI 100'
scenario: 'Deploying an LLM for real-time inference on an edge accelerator with 32 GB memory. The FP32 model exceeds the 32 GB memory. You need lowest latency and target accuracy within the 75W power limit.'
question: 'What mixed-precision deployment strategy fits the FP32 LLM within 32 GB memory while minimizing latency and preserving accuracy?'
details:
  realistic_solution: 'Profile the FP32 model to identify precision-sensitive layers. Employ INT8 Post-Training Quantization (PTQ) or QAT for the majority of the network to maximize compute and bandwidth, while selectively retaining FP16 for highly sensitive layers to prevent accuracy collapse.'
  common_mistake: |
    **The Pitfall:** Blindly converting the entire model to INT8 or FP16 without analyzing layer sensitivity.
    **The Rationale:** Candidates assume uniform quantization is sufficient and focus solely on raw TOPS.
    **The Consequence:** Uniform INT8 leads to catastrophic accuracy degradation, while uniform FP16 fails to resolve the memory bandwidth bottleneck, resulting in OOM or severe latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 model size: ~64 GB.
    - Memory limit: < 32 GB.

    **Calculations:**
    - Uniform FP16/BF16: ~32 GB (OOM once KV cache and activations are loaded).
    - Mixed precision (80% INT8, 20% FP16): (0.8 * 16 GB) + (0.2 * 32 GB) = 12.8 GB + 6.4 GB = 19.2 GB.
    - This leaves ~12.8 GB for KV cache and active context.

    **Conclusion & Interpretation:**
    - **Result: 19.2 GB (Memory-Bound)**. Mixed INT8/FP16 precision reduces the footprint to 19.2 GB, safely fitting memory while maximizing INT8 compute.
