title: Architecting Extreme Quantization for Hailo-8 Streams
scenario: You are deploying a real-time vision transformer onto an edge dataflow accelerator. The hardware lacks local DRAM and must stream all weights and activations directly from host memory. The baseline model's INT8 streaming requirements exceed the available host memory bandwidth for the target frame rate.
question: How would you store sub-4-bit weights and execute on Hailo-8's INT8 datapath to relieve host-memory bandwidth?
details:
  realistic_solution: Do not assume Hailo-8 can consume arbitrary packed sub-4-bit weights on its INT8 datapath. A valid deployment needs compiler/runtime support that treats the packed weights as a compressed representation and expands or dequantizes them into a supported INT8 execution format at a defined boundary. If that unpack happens on the host before PCIe transfer, it does not reduce host-interface bandwidth. It only helps the bandwidth problem when the Hailo compiler supports packed transfer plus on-device decompression or an equivalent generated dataflow stage; otherwise the practical fix is to redesign, prune, or quantize to the supported INT8 path and reduce activation/model traffic by architecture changes.
  common_mistake: |
    **The Pitfall:** Proposing 4-bit execution natively on the accelerator.
    **The Rationale:** Candidates assume that because the weights are 4-bit, the hardware will magically execute 4-bit math to save power.
    **The Consequence:** They fail to recognize that the Hailo-8 ALU natively expects INT8. Attempting to feed 4-bit payloads directly to the ALU without a specialized unpacking architecture will result in corrupted operations or compiler failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target accelerator: INT8 dataflow execution path with no generic sub-4-bit MAC assumption.
       - Baseline stream: 25 MB/frame at 60 FPS = 1.5 GB/s.
       - Example composition: 15 MB weights + 10 MB activations per frame.
    2. **Calculations:**
       - If 4-bit weights are unpacked on the host before transfer: PCIe stream remains 25 MB/frame, so bandwidth remains 1.5 GB/s.
       - If the compiler supports packed weight transfer and on-device expansion: stream becomes 7.5 MB packed weights + 10 MB activations = 17.5 MB/frame.
       - Supported packed-transfer bandwidth: 17.5 MB/frame * 60 FPS = 1.05 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Conditional bandwidth relief.** Sub-4-bit storage only relieves host-memory bandwidth if the Hailo toolchain supports packed transfer and expansion before the INT8 MAC path. Generic runtime unpacking to INT8 on the host preserves model accuracy constraints but does not solve the bus bottleneck.
