title: Architecting Extreme Quantization for Hailo-8 Streams
scenario: You are deploying a real-time vision transformer onto an edge dataflow accelerator. The hardware lacks local DRAM and must stream all weights and activations directly from host memory. The baseline model's INT8 streaming requirements exceed the available host memory bandwidth for the target frame rate.
question: How would you store sub-4-bit weights and execute on Hailo-8's INT8 datapath to relieve host-memory bandwidth?
details:
  realistic_solution: 'Store weights in 4-bit precision in host memory to halve the bandwidth requirements. As weights are streamed to the Hailo-8, dynamically unpack them into INT8 registers for computation. This leverages the abundant INT8 compute (26 TOPS) to alleviate the scarce host streaming bandwidth, maximizing the dataflow accelerator efficiency.'
  common_mistake: |
    **The Pitfall:** Proposing 4-bit execution natively on the accelerator.
    **The Rationale:** Candidates assume that because the weights are 4-bit, the hardware will magically execute 4-bit math to save power.
    **The Consequence:** They fail to recognize that the Hailo-8 ALU natively expects INT8. Attempting to feed 4-bit payloads directly to the ALU without a specialized unpacking architecture will result in corrupted operations or compiler failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Accelerator: 26 TOPS INT8, 2.5W, No DRAM
       - Baseline INT8 Bandwidth: 25 MB/frame * 60 FPS = 1.5 GB/s
       - Model Compute Limit: 5 GOPS/frame * 60 FPS = 300 GOPS (0.3 TOPS)
    2. **Calculations:**
       - Extreme 4-bit Bandwidth: 12.5 MB/frame * 60 FPS = 750 MB/s
       - Idle Compute Overhead: 26 TOPS - 0.3 TOPS = 25.7 TOPS
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** The dataflow topology is inherently starved by the host interconnect. Spending a fraction of the 25.7 TOPS idle headroom to dynamically unpack 4-bit host streams perfectly relieves the 1.5 GB/s bus saturation.
