title: Symmetric Zero-Point Quantization on Edge
scenario: Compiling an object detection model for the Hailo-8 NPU requires PTQ to 8-bit integers.
question: What zero-point value does symmetric INT8 quantization use, and what hardware overhead does it avoid on edge NPUs?
details:
  realistic_solution: Symmetric quantization forces the zero-point to exactly 0, allowing integer MAC units to skip subtracting the zero-point offset entirely during accumulation. Asymmetric quantization requires computing the cross-terms of the zero-points, adding significant ALU overhead and power cost.
  common_mistake: |
    **The Pitfall:** Assuming asymmetric quantization provides better accuracy for "free" and defaulting to it without profiling.
    **The Rationale:** In standard floating-point frameworks, asymmetric quantization can better capture skewed activation distributions, so practitioners assume it is strictly superior.
    **The Consequence:** Deploying asymmetric quantization on hardware without efficient zero-point subtraction or compensation paths can add extra arithmetic, memory traffic, or requantization work that degrades inference speed and power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Asymmetric math: (W - Z_w) * (A - Z_a).
    - Symmetric math: Z_w = 0 and Z_a = 0.

    **Calculations:**
    - Asymmetric arithmetic must account for zero-points, either through subtraction before multiply or through compensation terms such as W*Z_a, A*Z_w, and Z_w*Z_a.
    - Symmetric INT8 sets the zero-point to 0, so the inner loop can use the direct W*A product when the hardware format and calibration support it.
    - The benefit is implementation-dependent overhead avoidance, not a guaranteed 4x reduction in MAC count.

    **Conclusion & Interpretation:**
    - **Result: zero-point 0 avoids zero-point compensation overhead (Compute-Bound)**. Symmetric quantization can map more cleanly to edge NPU integer MAC datapaths, but the exact speedup depends on hardware support.
