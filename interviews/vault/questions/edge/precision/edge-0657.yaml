title: The Bloated INT8 Model
scenario: You've successfully quantized your FP32 object detection model to INT8 for deployment on an edge device, expecting a 4x reduction in model memory footprint (weights). However, after deployment, you notice the total RAM usage during inference is only reduced by about 2x-2.5x compared to the FP32 version.
question: What explains this discrepancy, and what other components contribute significantly to the overall memory footprint?
details:
  realistic_solution: Accurately isolate fixed engine overhead and runtime scratchpad requirements from direct model payload reductions. Optimization pipelines must account for irreducible runtime RAM consumption alongside pure topology footprints.
  common_mistake: |
    **The Pitfall:** Assuming "model memory footprint" only refers to weights.
    **The Rationale:** Candidates focus entirely on static weight reduction, assuming that quantization applies uniformly to all data within the inference pipeline.
    **The Consequence:** Misjudging the total system RAM requirements, leading to unexpected Out-Of-Memory (OOM) errors during execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Model Weights Size: ~25 MB.
    - Inference Runtime Engine + Scratchpad Overhead: Fixed ~15 MB.
    - Activation Footprint (e.g., 14x14x1024 layer in FP32): ~0.8 MB (negligible for this example relative to engine).

    **Calculations:**
    - Expected INT8 Weight Size = 25 MB / 4 = 6.25 MB.
    - Total FP32 Inference RAM = 25 MB (weights) + 15 MB (overhead) = 40 MB.
    - Total INT8 Inference RAM = 6.25 MB (weights) + 15 MB (overhead) = 21.25 MB.
    - Realized Memory Reduction Ratio = 40 MB / 21.25 MB ≈ 1.88x.

    **Conclusion & Interpretation:**
    - **Result: ~1.88x Reduction (Overhead-Bound)**. Static weights scale perfectly, but fixed runtime engine costs severely dampen total RAM savings.
