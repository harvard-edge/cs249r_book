title: The INT8 Calibration Drift
scenario: Your team deployed an INT8-quantized pedestrian detection model on a TI
  TDA4VM in an autonomous shuttle. Calibration was performed in July using 2000 images
  from a sunlit suburban route. Come December, field reports show an 8% mAP drop —
  pedestrians in heavy coats and low-angle winter sun are being missed. The FP32 model
  shows no accuracy change on the same winter scenes.
question: What went wrong with the quantization, and how do you fix it without retraining?
details:
  realistic_solution: Post-training quantization computes scale factors based on calibration
    dataset activation distributions. The high-contrast summer data resulted in wide
    quantization ranges, wasting precision for the low-contrast winter activations
    which fall into a tightly bounded range. This causes the INT8 model to effectively
    operate at ~4-bit precision for winter scenes. The fix is to run Post-Training
    Quantization (PTQ) recalibration using representative winter data to recalculate
    the activation scale factors.
  common_mistake: '**The Pitfall:** Assuming INT8 inherently lacks precision for winter
    scenes.

    **The Rationale:** Engineers see the FP32 model succeed and wrongly assume an
    irreversible limit of 8-bit precision.

    **The Consequence:** Unnecessarily doubling compute cost by switching to FP16,
    or worse, launching a massive retraining campaign.

    '
  napkin_math: '**Assumptions & Constraints:**

    - INT8 representation: 127 positive bins.

    - Summer max activation: 12.0.

    - Winter activation range: [0.5, 2.0] (range = 1.5).


    **Calculations:**

    - Summer step size: 12.0 / 127 = 0.094.

    - Usable bins for winter data with summer calibration: 1.5 / 0.094 ≈ 16 bins.

    - Winter recalibration (channel max = 3.0): step size = 3.0 / 127 = 0.0236.

    - Recalibrated usable bins: 1.5 / 0.0236 ≈ 63 bins.


    **Conclusion & Interpretation:**

    - **Result: 4x precision improvement (~63 bins vs 16 bins) (Precision-Bound)**.
    The model suffered from quantization drift due to shifted activation distributions,
    severely compressing dynamic range.

    '
