title: Mitigating Bandwidth Bottlenecks for 4-bit AWQ on Jetson Orin
scenario: You are deploying a 7B parameter transformer model for real-time local processing on an NVIDIA Jetson Orin. To fit within the 60W TDP and reduce memory footprint, you apply 4-bit AWQ, reducing the model size from 14 GB (FP16) to 3.5 GB, easily fitting into the 32 GB LPDDR5 memory. However, during the auto-regressive decoding phase on the Ampere GPU, you notice the latency is 2x slower than expected and compute utilization is extremely low, despite the device's 275 TOPS INT8 capability.
question: Why is the 4-bit AWQ 7B model slow during decoding on Jetson Orin, and what fused-kernel fix would remove the bottleneck?
details:
  realistic_solution: |
    The bottleneck is bandwidth-bound decoding on LPDDR5, not peak INT8 TOPS. An unfused AWQ path can read compressed weights, materialize dequantized FP16 tiles in global memory, and then read those FP16 tiles again for GEMV/GEMM, so memory traffic dominates while compute units sit underutilized. The fix is a fused CUDA weight-dequantization-and-matmul kernel that keeps scales, zero points, and dequantized fragments in registers or shared memory and never writes dequantized weights back to LPDDR5.
  common_mistake: |
    **The Pitfall:** Assuming moving to 4-bit quantization automatically yields proportional speedups.
    **The Rationale:** Neglecting the intermediate dequantization step required before matrix multiplication.
    **The Consequence:** Creating massive global memory traffic overhead that kills inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model compressed with 4-bit AWQ: about 3.5 GB of weights.
    - FP16 version of the same weights: about 14 GB.
    - LPDDR5 Bandwidth: ~204 GB/s.

    **Calculations:**
    - In a bandwidth-bound decode step, the useful lower bound is reading the compressed 4-bit weights needed by the layer sequence once, about 3.5 GB across the model.
    - A bad unfused implementation can add FP16 global-memory traffic by writing dequantized tiles and reading them again. In the worst whole-model accounting, that adds up to 14 GB write + 14 GB read = 28 GB of avoidable traffic.
    - That makes unfused traffic up to 3.5 GB + 28 GB = 31.5 GB for the same weight pass, before activation and KV-cache traffic.
    - A fused dequantize-plus-matmul path removes the avoidable FP16 weight-materialization traffic, leaving compressed-weight reads plus smaller activation, scale, and KV traffic.

    **Conclusion & Interpretation:**
    - **Result: bandwidth-bound dequantization overhead.** The safe conclusion is not a guaranteed tokens/s number; fusion can remove up to 28 GB of avoidable global-memory traffic per full weight pass and substantially improve decode throughput if the current kernel materializes FP16 weights in LPDDR5.
