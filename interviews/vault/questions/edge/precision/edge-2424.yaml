title: TensorRT PTQ Calibration on Orin with 200 Scenes
scenario: A robotics team is using TensorRT 8.6 on Jetson AGX Orin to deploy a PointPillars LiDAR detector. The team has only 200 unlabeled scenes locally and must choose between TensorRT's INT8 calibrators. A first pass with MinMax produced a 3% mAP drop, but spot-checks on night scenes showed double-digit recall loss. QAT is infeasible.
question: Evaluate which TensorRT INT8 calibrator best fits the 200-scene constraint, and what concrete TensorRT mitigations are available before resorting to QAT?
details:
  realistic_solution: |
    Use `IInt8EntropyCalibrator2` as the first TensorRT PTQ choice for the 200 unlabeled scenes because entropy calibration is designed to choose activation scales from representative data rather than stretching every tensor to the most extreme MinMax outlier. With night-scene recall loss, make the calibration cache from a deliberately stratified 200-scene set that includes night, sparse returns, close objects, and high-intensity outliers; do not rely on random daytime samples.

    Before QAT, the concrete TensorRT mitigations are to compare MinMax versus entropy-2 calibration on the same validation slice, inspect per-layer quantization sensitivity, keep sensitive layers or outputs in FP16 through TensorRT precision constraints where the network and builder support them, use explicit dynamic ranges only when they are measured from representative activations, and fall back to FP16 for unsupported or accuracy-critical plugins. Do not present DLA as a generic PointPillars fallback on Orin, and do not treat `--best` as an accuracy-specific INT8 calibration fix; it is a builder tactic/precision search convenience that still needs validation.
  common_mistake: |
    **The Pitfall:** Treating QAT vs Post-Training Quantization (PTQ) as the only available choices.
    **The Rationale:** Unawareness of TensorRT's deep PTQ configuration knobs (calibrator choice, per-layer overrides, DLA fallback).
    **The Consequence:** Abandoning INT8 entirely or investing weeks in attempting QAT without labels, when simple PTQ parameter tuning could recover the accuracy gap.
  napkin_math: |
    **Assumptions & Constraints:**
    - Problem: Heavy-tail LiDAR feature distribution.
    - Constraint: 200 unlabeled scenes (QAT impossible).

    **Calculations:**
    - MinMax uses observed extrema, so a few LiDAR outliers can widen the scale and reduce useful INT8 resolution for common activations.
    - Entropy-2 calibration chooses scales from the activation histogram and is usually the better first PTQ test for vision-style networks with limited unlabeled calibration data.
    - Mixed precision should be applied only to layers shown by ablation to drive the recall loss, then re-benchmarked for latency and accuracy.

    **Conclusion & Interpretation:**
    - **Result: entropy-2 calibration plus measured mixed-precision mitigation**. With only 200 scenes, the defensible answer is representative calibration and targeted FP16 fallbacks, not fixed mAP-gain claims or generic DLA offload.
