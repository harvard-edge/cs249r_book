title: The Energy Cost of Precision (edge-0379)
scenario: You're working on a perception model for an autonomous driving platform and need to reduce the power consumption of your neural network running on the vehicle's edge accelerator. You propose converting some of the FP32 operations to INT8.
question: For a single arithmetic operation, roughly how much more energy-efficient is INT8 compared to FP32?
details:
  realistic_solution: 'Silicon-level silicon switching costs dictates that an INT8 MAC requires approximately 18x less energy per cycle than floating-point mantissa/exponent logic arrays.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width (e.g., 32/8 = 4x).
    **The Rationale:** Engineers ignore the significantly more complex, power-hungry circuitry required for floating-point math compared to simple integer math.
    **The Consequence:** Underestimating the power savings of INT8 quantization during hardware and model design.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware limits as specified.

    **Calculations:**
    - Physics of switching states yields ~18x ratio

    **Conclusion & Interpretation:**
    - **Result: ~18x more efficient.**
  options:
  - '~4× more efficient'
  - '~2× more efficient'
  - '~18× more efficient'
  - '~64× more efficient'
