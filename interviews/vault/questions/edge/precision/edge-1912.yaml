title: INT8 Vision Model Deployment on Hailo-8
scenario: Your team needs to deploy a real-time object detection model onto an edge device. The target hardware is the Hailo-8, offering up to 26 TOPS at 2.5W. The current FP32 model achieves 90% mAP and runs at 10 FPS on a discrete GPU, but must be converted to a Hailo-compatible INT8 graph and tuned to meet the target latency. The product specification demands a minimum of 85% mAP and a processing throughput of 30 FPS.
question: How would you quantize the object detector for Hailo-8 to achieve at least 85% mAP and 30 FPS under its 26 TOPS, 2.5W constraints?
details:
  realistic_solution: Use Hailo's supported INT8 deployment workflow rather than GPTQ/AWQ or 2-bit weight-only LLM methods. First compile the detector and remove or replace unsupported operators, then run representative INT8 PTQ with calibration images that match production lighting, scales, and object classes. If mAP drops below 85%, use QAT, activation clipping, per-channel weight quantization where supported, pruning, input-size tuning, or a smaller detector head. Benchmark the compiled graph on Hailo-8 for FPS, power, thermals, and host preprocessing/post-processing overhead, and iterate on architecture or calibration until both 85% mAP and 30 FPS are met.
  common_mistake: |
    **The Pitfall:** Applying LLM-style GPTQ/AWQ or sub-4-bit assumptions to a Hailo-8 object detector.
    **The Rationale:** Hailo-8 is optimized around compiled INT8 dataflow, so unsupported precision formats do not automatically improve speed or memory residency.
    **The Consequence:** The model may fail to compile efficiently, fall back off-device, lose mAP, or miss 30 FPS despite aggressive paper compression.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target FPS: 30 FPS.
    - Baseline Model Size: 100 MB (FP32).
    - Baseline Compute: 10 GFLOPs (~10e9 Operations).
    - Hardware: Hailo-8, 26 TOPS INT8 peak for supported compiled graphs.
    - Assume 20% effective utilization after dataflow, memory, and host overheads.

    **Calculations:**
    - INT8 model size estimate: 100 MB x (8 / 32) = 25 MB before metadata and buffers.
    - Required Compute per second at 30 FPS: 30 * 10 GOPS = 300 GOPS = 0.3 TOPS.
    - Effective INT8 throughput: 26 TOPS x 0.20 = 5.2 TOPS.
    - Utilization needed: 0.3 TOPS / 5.2 TOPS = 5.8%.
    - Per-frame compute lower bound at 20% utilization: 10 GOPS / 5,200 GOPS/s = 1.9 ms, leaving most of the 33.3 ms frame budget for I/O and post-processing.

    **Conclusion & Interpretation:**
    - **Result: INT8 is the realistic Hailo-8 path**. The compute budget is plausible if the graph compiles cleanly and mAP remains above 85%; the release risk is quantization accuracy, unsupported layers, and host pipeline overhead, not unsupported sub-4-bit packing.
