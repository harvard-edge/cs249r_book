title: Hailo-8 INT8 Streaming Throughput and Precision
scenario: You are deploying a ResNet-based model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The Hailo-8 must stream activations from host memory via a 4 GB/s PCIe connection. You observe that when the host streams FP16 activations to the device (which then quantizes to INT8 internally), the system bottlenecks on I/O. When you pre-quantize the activations to INT8 on the host to save bandwidth, the latency improves but accuracy drops by 5%.
question: Assuming 8MB of INT8 activations per frame, why does host INT8 pre-quantization double Hailo-8 FPS but reduce accuracy, and what are the FPS limits?
details:
  realistic_solution: 'The Hailo-8 relies on streaming from host memory because it lacks local DRAM. Streaming FP16 activations consumes twice the bandwidth of INT8, creating an I/O bottleneck. However, pre-quantizing to INT8 on the host applies a static quantization range to the activations before they reach the dataflow core, leading to clipping errors and a 5% accuracy drop. The tradeoff is between I/O bound latency (FP16 streaming) and quantization error (INT8 streaming).'
  common_mistake: |
    **The Pitfall:** Focusing only on the 26 TOPS compute capability instead of the host streaming bottleneck.
    **The Rationale:** Candidates assume all accelerators have local memory and fail to analyze PCIe bandwidth limitations.
    **The Consequence:** They incorrectly assume the accuracy drop is purely from INT8 compute rather than the loss of dynamic range when pre-quantizing activations statically on the host before streaming.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 activations require 8MB per frame (FP16 requires 16MB).
    - PCIe Gen3 connection provides 4 GB/s (4,000 MB/s).

    **Calculations:**
    - FP16 FPS limit is 4,000 MB/s / 16 MB/frame = 250 FPS.
    - INT8 FPS limit is 4,000 MB/s / 8 MB/frame = 500 FPS.

    **Conclusion & Interpretation:**
    - **Result: 500 FPS (I/O-Bound)**. The INT8 approach doubles the theoretical throughput but introduces precision loss due to early, static quantization on the host.
