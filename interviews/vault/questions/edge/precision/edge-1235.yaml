title: Hailo-8 INT8 Streaming Throughput and Precision
scenario: You are deploying a ResNet-based model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The Hailo-8 must stream activations from host memory via a 4 GB/s PCIe connection. You observe that when the host streams FP16 activations to the device, the system bottlenecks on I/O. When you pre-quantize the activations to INT8 on the host to save bandwidth, the latency improves but accuracy drops by 5%.
question: Assuming 8MB of INT8 activations per frame, what link-limited FPS ceiling does host pre-quantization create, and why can accuracy drop?
details:
  realistic_solution: |
    The bottleneck is the host-to-accelerator activation stream, not the 26 TOPS compute rating. FP16 activations are 16 MB per frame, so an ideal 4,000 MB/s payload link caps throughput at 250 FPS. Host-side INT8 pre-quantization reduces the stream to 8 MB per frame, raising the ideal link-limited ceiling to 500 FPS. Real PCIe protocol overhead and runtime scheduling reduce achievable FPS, so this is an I/O ceiling rather than guaranteed end-to-end device throughput. The accuracy drop comes from applying a static INT8 quantization range before streaming, which can clip or coarsen activations.
  common_mistake: |
    **The Pitfall:** Focusing only on the 26 TOPS compute capability instead of the host streaming bottleneck.
    **The Rationale:** Candidates assume all accelerators have local memory and fail to analyze PCIe bandwidth limitations.
    **The Consequence:** They incorrectly assume the accuracy drop is purely from INT8 compute rather than the loss of dynamic range when pre-quantizing activations statically on the host before streaming.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 activations require 8MB per frame (FP16 requires 16MB).
        - PCIe Gen3 connection provides an idealized 4 GB/s payload budget (4,000 MB/s before protocol/runtime overhead).

    **Calculations:**
        - Ideal FP16 link ceiling is 4,000 MB/s / 16 MB/frame = 250 FPS.
        - Ideal INT8 link ceiling is 4,000 MB/s / 8 MB/frame = 500 FPS.
        - If effective payload bandwidth is lower after overhead, both ceilings scale down proportionally.

    **Conclusion & Interpretation:**
        - **Result: 250 FPS FP16 vs. 500 FPS INT8 ideal link ceilings (I/O-Bound)**. The INT8 approach doubles the theoretical host-streaming ceiling, but it does not by itself guarantee end-to-end FPS and can reduce accuracy due to early, static host quantization.
