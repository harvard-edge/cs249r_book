title: Extreme Quantization of Vision Transformer on Hailo-8
scenario: You are a lead ML engineer tasked with deploying a large vision transformer model, initially trained in FP32, onto an edge device constrained by a strict power budget and low latency requirements. Your target hardware is the Hailo-8, which boasts 26 TOPS (Tera Operations Per Second) for INT8 computations with a typical power consumption of 2.5W.
question: How would you deploy a compressed ViT on Hailo-8 while respecting its supported INT8 execution path?
details:
  realistic_solution: 1. Establish a supported INT8 deployment baseline with Hailo's compiler and runtime, using PTQ first and QAT if calibration accuracy is insufficient. 2. Check operator coverage for the ViT blocks, especially attention, normalization, reshape, and activation patterns, because unsupported operators or host fallback can dominate latency. 3. Treat 2-bit weights as a theoretical compression or offline storage format unless the deployment flow supports the resulting operators; packing four 2-bit values into an INT8 word does not by itself make the INT8 engine execute native 2-bit MACs. 4. If sub-4-bit compression is required, use model reparameterization, distillation, or custom supported layers that unpack/dequantize to INT8 before execution, then profile the unpack cost and accuracy loss. 5. Select mixed precision only within formats accepted by the Hailo toolchain, and fall back to INT8 or a smaller/distilled ViT when 2-bit execution cannot be compiled efficiently.
  common_mistake: |
    **The Pitfall:** Naively applying uniform sub-4-bit quantization or assuming native hardware support for arbitrary bitwidths.
    **The Rationale:** Candidates fail to consider activation distributions or how 2-bit weights must be packed into an INT8-native accelerator.
    **The Consequence:** Severe, unrecoverable accuracy degradation and suboptimal memory access optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameter count: 100M.
    - Packing structure: Four 2-bit weights per INT8 word.
    - Hailo-8 execution path is assumed to be INT8 unless a supported sub-4-bit operator exists.

    **Calculations:**
    - FP32 size: 100M * 4 bytes = 400 MB.
    - INT8 size: 100M * 1 byte = 100 MB.
    - 2-bit weight-only size: 100M * 0.25 bytes = 25 MB.
    - Reduction factor from FP32 storage: 400 MB / 25 MB = 16x.
    - Reduction factor from INT8 storage: 100 MB / 25 MB = 4x.
    - If weights must be unpacked to INT8 for execution, the compute engine still consumes INT8-form tensors or tiles, so the 25 MB storage footprint does not imply native 2-bit throughput.

    **Conclusion & Interpretation:**
    - **Result: 25 MB Storage Only, Not Native 2-Bit Execution**. The realistic deployment target is a compiled INT8 or supported mixed-precision ViT; 2-bit packing helps only if the Hailo flow can execute or cheaply expand it without accuracy or latency loss.
