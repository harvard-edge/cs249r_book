title: Quantization Error Localization for Accuracy Drop on Coral Edge TPU
scenario: A MobileNetV2 model quantized to INT8 for Coral Edge TPU shows 89% top-1 accuracy (vs 91.5% FP32 baseline). The 2.5% accuracy drop is above the acceptable 1% threshold. Using per-layer sensitivity analysis, the team finds that layers 12-15 (inverted residual blocks at 14x14 spatial resolution) show the highest quantization error.
question: How would you fix the 2.5% INT8 accuracy drop when layers 12-15 are the most quantization-sensitive on Coral Edge TPU?
details:
  realistic_solution: Sensitivity analysis shows layers 12-15 are problematic, but Coral Edge TPU deployment is constrained to fully supported INT8 subgraphs rather than arbitrary per-layer precision changes. First verify full-model INT8 post-training quantization with a representative calibration set that covers the 14x14 activation distributions, then inspect the compiler report for unsupported or CPU-fallback ops around layers 12-15. If those layers remain sensitive, rewrite or fuse the offending blocks so they quantize cleanly, correct batch-norm folding and activation ranges, and recalibrate. If the loss is still above the 1% threshold, use full-model QAT or a small architecture change and recompile for the Edge TPU; only move a problematic op to CPU if latency and power budgets can tolerate the fallback.
  common_mistake: |
    **The Pitfall:** Treating the Coral Edge TPU like a GPU that can run selective FP16 or mixed-precision fallback layers.
    **The Rationale:** Candidates instinctively throw more precision at accuracy problems, forgetting that Edge TPU acceleration requires compiler-supported INT8 operators.
    **The Consequence:** Sensitive layers may fall back to the host CPU or fail compilation, so accuracy improves only by sacrificing the latency and power properties that motivated the Edge TPU deployment.
  napkin_math: |
    **Assumptions & Constraints:**
       - Accuracy gap: 2.5% below FP32 baseline.
       - Target recovery: at least 1.5 percentage points to reach the acceptable <= 1% loss threshold.
       - Problematic layers: 12-15 (inverted residual blocks).
    **Calculations:**
       - Current loss vs FP32: 91.5% - 89.0% = 2.5 percentage points.
       - Maximum acceptable loss: 1.0 percentage point.
       - Required recovery: 2.5 - 1.0 = 1.5 percentage points.
       - Calibration, op rewrites, and full-model QAT must be evaluated against this measured recovery target; do not assume a per-layer quantization switch is available on Edge TPU.
    **Conclusion & Interpretation:**
       - **Result: Need >=1.5 Point Measured Recovery**. Use representative calibration and Edge TPU-supported INT8 graph changes first, then QAT or architecture changes if measured accuracy remains below the threshold.
