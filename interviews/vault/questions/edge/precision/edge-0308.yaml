title: The Edge Memory Diet
scenario: You're optimizing a perception model for an autonomous vehicle's main computer, which uses a system-on-chip similar to a Jetson AGX Orin. The model has 45 million parameters and its weights are currently stored in FP16 format. You are considering quantizing the weights to INT8 to reduce memory pressure and improve cache performance.
question: What is the weight-memory reduction in MB from quantizing 45 million FP16 parameters to INT8?
details:
  realistic_solution: 'Quantizing the model''s 45 million parameters from FP16 to INT8 will halve the memory required for the weights. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. This results in a memory reduction of 45 MB, freeing critical VRAM on memory-constrained edge devices.'
  common_mistake: Miscalculating the bytes per parameter for different precisions, such as assuming FP16 uses 1 byte per parameter or confusing the savings on weights with total runtime activation memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - 45 million parameters
    - Original format: FP16 (2 bytes/parameter)
    - Target format: INT8 (1 byte/parameter)

    **Calculations:**
    - Initial memory = 45,000,000 * 2 bytes = 90 MB
    - Quantized memory = 45,000,000 * 1 byte = 45 MB
    - Reduction = 90 MB - 45 MB = 45 MB

    **Conclusion & Interpretation:**
    - **Result: 45 MB Reduction (Memory-Capacity-Bound)**. Quantization successfully halves the static weight memory footprint.
  options:
  - 'A 22.5 MB reduction.'
  - 'A 45 MB reduction.'
  - 'A 67.5 MB reduction.'
  - 'A 135 MB reduction.'
