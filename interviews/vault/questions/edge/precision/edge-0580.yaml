title: The Night-Blind Perception Model
scenario: Your team is developing a pedestrian detection model for an autonomous vehicle, targeting a Jetson AGX Orin. The FP32 model is highly accurate but misses the 33ms per-frame deadline. To accelerate it, you apply standard post-training INT8 quantization (PTQ). You use your diverse, 1-million-image daytime dataset for calibration. The resulting INT8 model now runs in 25ms, meeting the latency budget, and maintains 99% of the FP32 accuracy on your daytime validation set.
question: What failure mode can daytime-only INT8 calibration introduce, despite 25ms latency and 99% daytime accuracy?
details:
  realistic_solution: The optimization backfired because the calibration dataset was not representative of the inference conditions. INT8 quantization maps the FP32 activation range seen during calibration to a fixed integer range. Extreme values from unrepresented conditions such as headlights can saturate at the INT8 maximum, clipping away relative contrast and feature detail that the detector needs at night.
  common_mistake: |
    **The Pitfall:** Suggesting Quantization-Aware Training (QAT) with the same non-representative calibration data.
    **The Rationale:** QAT with the same non-representative data will suffer the same catastrophic failure mode, wasting time without fixing the root cause.
    **The Consequence:** The model will continue to perform poorly in unrepresented conditions, and engineering time is wasted.
  napkin_math: |
    **Assumptions & Constraints:**
    - The prompt already establishes that the INT8 model runs in 25ms, meeting the 33ms deadline.
    - Daytime calibration range: [-15.0, 20.0].
    - Night headlight activation: 80.0.
    - Signed INT8 uses 255 representable steps across the calibrated range.

    **Calculations:**
    - Quantization scale from daytime data: S = (20 - -15) / 255 = 0.137 FP units per INT8 step.
    - A headlight activation of 80.0 is 60.0 units above the calibrated maximum of 20.0.
    - Quantized headlight value would exceed the INT8 maximum and therefore clips to 127.
    - Dequantized clipped value is approximately the calibrated maximum, 20.0, not the original 80.0.
    - Relative amplitude lost = (80.0 - 20.0) / 80.0 = 75%.

    **Conclusion & Interpretation:**
    - **Result: 25ms but unsafe under glare (Precision-Bound)**. The latency and daytime accuracy claims can both be true while the model still fails because the calibration scale clips out-of-distribution night activations.
