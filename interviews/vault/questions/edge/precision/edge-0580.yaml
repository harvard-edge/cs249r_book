title: 'The Night-Blind Perception Model'
scenario: 'Your team is developing a pedestrian detection model for an autonomous vehicle, targeting a Jetson AGX Orin. The FP32 model is highly accurate but misses the 33ms per-frame deadline. To accelerate it, you apply standard post-training INT8 quantization (PTQ). You use your diverse, 1-million-image daytime dataset for calibration. The resulting INT8 model now runs in 25ms, meeting the latency budget, and maintains 99% of the FP32 accuracy on your daytime validation set.'
question: 'What failure mode can daytime-only INT8 calibration introduce, despite 25ms latency and 99% daytime accuracy?'
details:
  realistic_solution: 'The optimization backfired because the calibration dataset was not representative of the inference conditions. INT8 quantization maps the dynamic range of FP32 activation values to a fixed integer range. Extreme values from unrepresented conditions (headlights) get aggressively clipped, permanently destroying the feature map gradient.'
  common_mistake: 'Suggesting Quantization-Aware Training (QAT) with the same non-representative calibration data will suffer the same catastrophic failure mode, wasting time without fixing the root cause.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin compute: 275 TOPS, 204.8 GB/s memory bandwidth.
    - Target: 33ms real-time deadline. FP32 model: 50 GFLOPs.

    **Calculations:**
    - FP32 constraint: 50G / 33ms = 1.5 TFLOPS sustained.
    - INT8 scale factor (daytime): mapping [-15.0, 20.0] to [-128, 127] yields S = (20 - -15) / 255 = 0.137.
    - Memory transfer for 50MB INT8 weights: 50MB / 204.8 GB/s = 0.24ms.
    - Compute time: 50G / 275T = 0.18ms.

    **Conclusion & Interpretation:**
    - **Result: 0.42ms Latency (Memory-Bound)**. Latency is massively improved, but the constrained scale factor S will clip extreme nighttime activations (e.g., headlights), destroying accuracy.
