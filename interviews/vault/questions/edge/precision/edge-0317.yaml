title: 'The Perception Model''s Memory Diet (edge-0317)'
scenario: 'You are an engineer on an autonomous vehicle team deploying a LiDAR perception model to a Jetson AGX Orin. A key convolutional layer in your model produces an activation tensor of size 256x256x128. The model currently runs in FP16 precision. To reduce memory pressure, you are considering quantizing the network to INT8.'
question: 'How much memory in MB is saved for the 256x256x128 activation tensor when converting it from FP16 to INT8?'
details:
  realistic_solution: 'The calculation is a straightforward comparison of data type sizes. FP16 (half-precision float) uses 2 bytes per element. INT8 (8-bit integer) uses 1 byte per element. For the same number of elements, INT8 uses exactly half the memory of FP16. The savings are therefore 50% of the original FP16 size.'
  common_mistake: |
    **The Pitfall:** Forgetting that quantization applies to activations, not just weights.
    **The Rationale:** Engineers often focus solely on weight reduction and miscalculate the size difference by reporting the final INT8 size instead of the *savings*, or confusing byte-to-bit ratios.
    **The Consequence:** Underestimating actual memory savings, leading to inaccurate memory profiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation tensor size: 256x256x128.
    - FP16 precision (2 bytes).
    - INT8 precision (1 byte).

    **Calculations:**
    - Total elements: 256 $\times$ 256 $\times$ 128 = 8,388,608 elements.
    - FP16 size: 8,388,608 $\times$ 2 bytes $\approx$ 16.8 MB.
    - INT8 size: 8,388,608 $\times$ 1 byte $\approx$ 8.4 MB.
    - Savings: 16.8 MB - 8.4 MB.

    **Conclusion & Interpretation:**
    - **Result: 8.4 MB (Memory-Bound)**. Quantization halves the memory footprint for activations as well as weights.
  options:
  - '~16.8 MB'
  - '~4.2 MB'
  - '~8.4 MB'
  - '0 MB'
