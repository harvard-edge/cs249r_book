title: The Energy Cost of Precision (edge-0339)
scenario: You're optimizing a perception model for an autonomous vehicle's main ECU, which has a strict thermal and power budget. A teammate argues for keeping a non-critical post-processing function in FP32 for 'maximum precision.' To justify moving to INT8, you need to state the fundamental energy cost.
question: Approximately how much more energy does a single FP32 operation consume compared to an INT8 operation?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation. This is a fundamental physical constant related to the energy required to switch the transistors that make up the arithmetic logic units (ALUs). For a power-constrained system like an automotive ECU, this ~18x factor is a non-negotiable reason to use lower-precision formats wherever the model's accuracy tolerates it.
  common_mistake: Engineers often incorrectly assume the energy cost scales linearly with bit width (i.e., 32/8 = 4x). They forget that the energy consumption of digital logic, particularly multipliers, scales super-linearly with the number of bits. Another common mistake is confusing this ratio with the memory footprint ratio.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physics of computation constants for standard ALUs.
    - Comparison between FP32 and INT8 operations.

    **Calculations:**
    - Direct recall: energy ratio between FP32 and INT8 compute is a stable physical constant.

    **Conclusion & Interpretation:**
    - **Result: ~18x (Energy-Bound)**. An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
  options:
  - '~4x more energy'
  - '~100x more energy'
  - '~18x more energy'
  - 'The energy is the same, only memory changes'
