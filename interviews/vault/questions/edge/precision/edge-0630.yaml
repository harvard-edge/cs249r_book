title: The Night-Drive Quantization Collapse
scenario: You are the ML Systems Architect for the perception team at a leading autonomous vehicle company. Your team must deploy a new, larger SOTA object detection model (from a FP32 baseline) onto the fleet's existing hardware, a Jetson AGX Orin-based ECU with a hard 33ms latency budget for the perception stage.
question: Why did the INT8 model fail under headlight glare, and how would mixed precision fix it within the 33ms Orin budget?
details:
  realistic_solution: The root cause is a dynamic range mismatch. Headlight glare creates outlier activations that were not represented in the daytime-heavy calibration set, so full INT8 PTQ clips glare-sensitive feature maps and destroys low-contrast pedestrian evidence. Use mixed precision by keeping the input stem, normalization, attention/fusion, and final detection layers that show saturation in FP16, while leaving the bulk convolutional backbone in INT8. Then profile the full TensorRT engine on Orin, including memory traffic and pre/post-processing, and accept the deployment only if the measured end-to-end perception stage remains under 33ms.
  common_mistake: |
    **The Pitfall:** Immediately suggesting Quantization-Aware Training (QAT) to fix the accuracy drop.
    **The Rationale:** Candidates fall back on QAT as a universal "fix-it" button for INT8 degradation, ignoring the extreme engineering cost of the retraining pipeline.
    **The Consequence:** Masking the root cause (dynamic range clipping) and undertaking weeks of expensive infrastructure work instead of correctly diagnosing and resolving the numeric saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Performance: ~68 TFLOPS. FP16: ~137 TFLOPS. INT8: ~275 TOPS.
    - Per-inference work after deployment optimization: 5 trillion operations.
    - Latency Budget: 33ms per frame.

    **Calculations:**
    - Pure FP16 lower-bound time: 5 TOP / 137 TOPS = 36.5ms, which already misses 33ms before runtime overhead.
    - Pure INT8 lower-bound time: 5 TOP / 275 TOPS = 18.2ms, but the saturated glare-sensitive layers fail accuracy.
    - If profiling shows the sensitive layers are about 20% of deployed ops, a sequential lower-bound estimate is (4 TOP / 275 TOPS) + (1 TOP / 137 TOPS) = 14.5ms + 7.3ms = 21.8ms.
    - Add estimated tensor traffic of 100MB / 204.8 GB/s = ~0.5ms, before framework and synchronization overhead.
    - This leaves roughly 33ms - 22.3ms = 10.7ms for overhead, but the final gate must be measured end-to-end latency on the Orin engine.

    **Conclusion & Interpretation:**
    - **Result: mixed precision is plausible but must be profiled.** Keeping only saturation-prone layers in FP16 can restore dynamic range while the INT8 backbone preserves enough latency headroom to meet the 33ms budget after verification.
