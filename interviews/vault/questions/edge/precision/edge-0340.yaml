title: 'The Edge Memory Diet: Quantization Fundamentals'
scenario: 'You''re an engineer on an autonomous driving team deploying a perception model to a production vehicle using an NVIDIA Jetson AGX Orin. Your object detection model has 15 million parameters and is currently stored in FP16 format, occupying too much memory. To fix this, you''re converting the model''s weights to INT8.'
question: 'What is the new INT8 weight-memory footprint for a 15 million-parameter FP16 model after quantization?'
details:
  realistic_solution: 'An INT8 data type uses exactly 1 byte (8 bits) to store each value. For a model with 15 million parameters, the total memory required for the weights is simply 15 million parameters multiplied by 1 byte per parameter. This yields 15 MB, a 50% reduction in memory footprint compared to the original 30 MB FP16 model. This saving is critical for deploying large models on memory-constrained edge devices.'
  common_mistake: |
    **The Pitfall:** Miscalculating memory sizes by confusing bits with bytes, or using the FP32 size as a baseline.
    **The Rationale:** Engineers often forget the fundamental byte-width of datatypes (INT8 = 1 byte, FP16 = 2 bytes).
    **The Consequence:** Producing wildly inaccurate memory footprint estimates for edge deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 15,000,000 parameters.
    - FP16 element size: 2 bytes.
    - INT8 element size: 1 byte.

    **Calculations:**
    - Initial FP16 memory: 15,000,000 parameters $\times$ 2 bytes = 30 MB.
    - New INT8 memory: 15,000,000 parameters $\times$ 1 byte = 15 MB.
    - Memory Reduction: 30 MB - 15 MB = 15 MB.

    **Conclusion & Interpretation:**
    - **Result: 15 MB (Memory-Bound)**. Quantization to INT8 nets exactly a 50% memory savings compared to the FP16 baseline.
  options:
  - '30 MB'
