title: Mixed-Precision Perception on Jetson Orin
scenario: You are tasked with deploying a 5-billion parameter multimodal perception model on an edge device for an autonomous robot. The system must process 4 high-resolution camera streams at 30 frames per second while strictly adhering to a 60W TDP constraint.
question: How would you design a mixed-precision Jetson Orin deployment for the 5B multimodal model to meet 4-camera 30 FPS under 60W?
details:
  realistic_solution: |
    Design the deployment around measured latency and power, not blanket DLA offload. Split the graph into TensorRT subgraphs: DLA-eligible CNN/preprocessing blocks can run on DLA if they compile cleanly, while transformer attention, multimodal fusion, KV-cache work, and unsupported ops stay on the GPU. Use selective INT8 with calibration or QAT for robust convolution/MLP blocks, keep precision-sensitive attention and output heads in FP16, and prune or distill the model if profiling shows the 5B model cannot meet the frame budget. Run the 4 camera streams as a pipelined workload with small batches only where they do not violate per-camera latency; the system must retire 120 frames/s aggregate, which corresponds to one completed frame every 8.3 ms across the pipeline. Reserve memory for weights, activations, KV cache, camera buffers, and TensorRT workspaces. The release decision should be based on a TensorRT power/latency profile that keeps production throughput below 60W with thermal margin.
  common_mistake: |
    **The Pitfall:** Uniform conversion of the entire model to INT8 and ignoring the DLA.
    **The Rationale:** Candidates optimize blindly for speed without profiling precision-sensitive attention layers or acknowledging fixed-function accelerators.
    **The Consequence:** Severe accuracy degradation and thermal throttling from over-reliance on the Ampere GPU.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model Size: 5 Billion parameters.
       - Target Throughput: 4 cameras * 30 FPS = 120 inferences/second.
       - Hardware Limit: 60W TDP.
       - Candidate precision mix: 80% INT8 weights, 20% FP16 weights.
       - Runtime overhead: reserve several GB for activations, TensorRT workspaces, camera buffers, and KV/cache-like state.
    **Calculations:**
       - Mixed Weight Footprint: (4B * 1 byte) + (1B * 2 bytes) = 6 GB before scales/metadata.
       - Practical memory budget: 6 GB weights + runtime buffers/workspaces/activations means memory fit must be validated with the compiled engine, not by weights alone.
       - Aggregate completion interval: 1 / 120 frames/s = 8.3 ms, so the pipeline must complete one frame about every 8.3 ms in steady state while each camera still meets its own per-frame latency target.
       - DLA feasibility: only DLA-supported layers can move off GPU; unsupported transformer and attention paths remain GPU-bound.
    **Conclusion & Interpretation:**
       - **Result: Profile-Gated Mixed Precision Plan**. The viable design uses TensorRT selective INT8, GPU execution for unsupported multimodal/attention paths, opportunistic DLA placement for supported CNN subgraphs, and pruning/distillation if the measured 120 FPS aggregate pipeline exceeds the 60W or latency budget.
