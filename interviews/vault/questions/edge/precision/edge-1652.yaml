title: Sub-INT8 Quantization on Dataflow Accelerators
scenario: You are architecting a high-throughput video analytics pipeline targeting the Hailo-8 accelerator. The platform lacks local DRAM, meaning all data must stream from host memory via PCIe.
question: How would you design a mixed 4-bit/INT8 Hailo-8 quantization scheme to cut host bandwidth for a larger transformer and recover accuracy?
details:
  realistic_solution: Design a mixed-precision architecture where weights are quantized to INT4 and packed two-per-byte on the host. The dataflow graph compiled for Hailo-8 ingests this INT8 stream, unpacking the INT4 operands directly on-chip before feeding the MAC units. To preserve accuracy, activations remain in INT8, utilizing Quantization-Aware Training (QAT) to learn static step sizes and bypass dynamic activation scaling overhead.
  common_mistake: |
    **The Pitfall:** Proposing dynamic activation quantization or AWQ-style decompression.
    **The Rationale:** Candidates recommend standard GPU LLM quantization strategies that rely heavily on dynamic scaling arithmetic.
    **The Consequence:** Dataflow compilers reject dynamic scaling logic, or it introduces so much custom logic overhead it stalls the static pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame rate: 60 FPS.
    - INT8 payload size: 50 MB.
    - 4-bit packed payload size: 25 MB.

    **Calculations:**
    - INT8 streaming bandwidth: 50 MB * 60 FPS = 3.0 GB/s.
    - 4-bit packed bandwidth: 25 MB * 60 FPS = 1.5 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.5 GB/s bus traffic (PCIe Bandwidth-Bound)**. Packing 4-bit weights into INT8 vectors halves the PCIe bandwidth requirement, preventing host memory access from bottlenecking the dataflow pipeline.
