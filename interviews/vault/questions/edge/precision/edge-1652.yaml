title: Hailo-8 Supported INT8 Quantization for Transformers
scenario: You are architecting a high-throughput video analytics pipeline targeting the Hailo-8 accelerator. The platform lacks local DRAM, meaning all data must stream from host memory via PCIe.
question: How would you cut Hailo-8 transformer bandwidth and recover accuracy within supported INT8 quantization flows?
details:
  realistic_solution: Do not assume arbitrary INT4 unpacking inside the Hailo-8 dataflow compiler. Keep the deployable graph in the platform-supported INT8 flow, then reduce bandwidth with structured pruning, smaller transformer blocks, operator substitutions that compile cleanly, and static quantization parameters learned with QAT. Partition the model so sensitive layers such as embeddings, attention projections, and normalization-adjacent operations receive tighter calibration, per-layer scale tuning, or remain in the supported higher-accuracy path if the toolchain requires it. Recover accuracy by curating calibration data around outlier activations and retraining with quantization noise, then validate the compiled graph on-device rather than relying on a GPU-style mixed-precision simulation.
  common_mistake: |
    **The Pitfall:** Proposing dynamic activation quantization or AWQ-style decompression.
    **The Rationale:** Candidates recommend standard GPU LLM quantization strategies that rely heavily on dynamic scaling arithmetic.
    **The Consequence:** Dataflow compilers reject dynamic scaling logic, or it introduces so much custom logic overhead it stalls the static pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame rate: 60 FPS.
    - Baseline compiled INT8 streamed payload size: 50 MB per frame, using decimal MB/GB.
    - Hailo-supported structured pruning, operator substitutions, and QAT-compatible graph cleanup reduce streamed weights/activations by 30%.
    - The design stays in supported INT8 compilation; it does not assume unsupported INT4 unpacking or GPU-style dynamic quantization.

    **Calculations:**
    - INT8 host-streaming bandwidth: 50 MB * 60 FPS = 3,000 MB/s = 3.0 GB/s.
    - Supported optimized INT8 payload: 50 MB * 0.70 = 35 MB.
    - Optimized streaming bandwidth: 35 MB * 60 FPS = 2.1 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 2.1 GB/s supported INT8 host-streamed traffic.** Bandwidth is reduced through Hailo-compiler-supported graph changes plus QAT/calibration, not by assuming unsupported on-chip INT4 unpacking.
