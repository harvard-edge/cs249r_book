title: The Foggy Road Catastrophe
scenario: 'You are the tech lead for the perception team at a major automotive company. Your team''s new ViT-based pedestrian detector, running in FP32, achieves 99.5% accuracy on your validation set. To meet the production hardware budget, the model must be quantized. After a standard post-training static quantization (PTQ) to INT8, the overall accuracy drops slightly to 98%, which seems acceptable. However, during fleet validation, you discover a catastrophic failure: the INT8 model''s accuracy on pedestrians in foggy conditions has plummeted to 35%.'
question: Why did INT8 PTQ preserve overall accuracy but fail on foggy pedestrians, and how would you fix it?
details:
  realistic_solution: |
    The likely issue is calibration and domain shift, not that INT8 is universally broken. The PTQ calibration set preserved overall accuracy because it mostly represented common clear-weather images, but fog changes contrast and activation ranges in the layers that matter for pedestrians. Fix it by recalibrating with representative fog/night data, using per-channel or activation-aware quantization, keeping numerically sensitive ViT layers such as normalization, attention score, or early low-contrast feature stages in FP16, and escalating to QAT only if representative calibration plus mixed precision does not recover the fog slice.
  common_mistake: |
    **The Pitfall:** Brute-forcing with QAT or collecting more data without hypothesis.
    **The Rationale:** A junior engineer might immediately suggest 'Just use Quantization-Aware Training (QAT)' or blame the calibration dataset without a specific hypothesis.
    **The Consequence:** QAT is computationally expensive and doesn't diagnose the root cause, while blindly collecting 'more fog data' wastes valuable time and resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-inference work: 5 trillion operations.
    - Jetson AGX Orin peak: ~5.3 TFLOPS FP32, ~275 TOPS INT8.
    - Latency budget: 33ms.

    **Calculations:**
    - FP32 lower-bound time = 5 TOP / 5.3 TOPS = 0.943s, so full FP32 is not viable.
    - INT8 lower-bound time = 5 TOP / 275 TOPS = 18.2ms, leaving about 14.8ms for memory, scheduling, and selected higher-precision layers.
    - If 10% of the work is promoted from INT8 to FP16 at 137 TOPS, time is (4.5 TOP / 275 TOPS) + (0.5 TOP / 137 TOPS) = 16.4ms + 3.6ms = 20.0ms before overhead.

    **Conclusion & Interpretation:**
    - **Result: Mixed precision can plausibly stay under 33ms, but the primary fix is representative calibration and quantization policy.** The math is a peak-throughput budget, not proof that every layer maps perfectly to peak hardware.
