title: Asymmetric vs Symmetric Quantization Overhead
scenario: A team deploys a vision model on the Qualcomm Cloud AI 100 on-premise inference accelerator. They initially use symmetric INT8 quantization and achieve high utilization. However, due to poor accuracy, they switch to asymmetric INT8 quantization. The accuracy recovers, but the team observes a significant slowdown in the dense layers despite the model size remaining identical.
question: Why does switching from symmetric to asymmetric INT8 quantization slow dense layers on the Cloud AI 100?
details:
  realistic_solution: Symmetric INT8 is often faster because the dot product can use a simpler zero-centered MAC path. Asymmetric INT8 introduces zero-points, so kernels must compensate for offsets using terms based on activation sums, weight sums, and the dot-product length. Weight-side sums can often be precomputed, but activation-side corrections are runtime work and may prevent the Cloud AI 100 compiler from using its fastest fused dense-layer path. The slowdown is from zero-point bookkeeping and lost fast-path fusion, not from a larger model.
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to memory bandwidth from loading zero-points.
    **The Rationale:** Candidates fail to realize that asymmetric quantization introduces zero-point compensation work, including runtime activation-sum corrections and compiler fast-path restrictions.
    **The Consequence:** Misdiagnosing the compute-bound slowdown as memory-bound, leading to useless attempts to optimize data layout.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operation: INT8 dot product of length N.
    - Symmetric quantization uses zero-point 0.
    - Asymmetric quantization uses nonzero activation and/or weight zero-points.

    **Calculations:**
    - Symmetric: dot(x, w) is N INT8 MACs plus normal output scaling.
    - Asymmetric: dot(x - z_x, w - z_w) expands to dot(x, w) - z_x * sum(w) - z_w * sum(x) + N * z_x * z_w.
    - sum(w) and N * z_x * z_w can often be precomputed or folded into bias terms.
    - sum(x) depends on the runtime activation tile, so it adds reductions/bookkeeping or blocks a fused fast path.

    **Conclusion & Interpretation:**
    - **Result: Slower dense layers from zero-point compensation overhead.** The exact slowdown depends on kernel fusion, tiling, precomputation, and hardware support; it should not be assumed to be exactly 2x.
