title: Hailo-8 INT8 Quantization Strategy for Dataflow Streaming
scenario: You are leading the deployment of a vision transformer onto a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow architecture with no local DRAM, all weights and activations must stream continuously from the host memory.
question: Evaluate the system-level impact of choosing per-channel versus per-tensor INT8 quantization on the streaming architecture's throughput.
details:
  realistic_solution: The optimal strategy prioritizes per-tensor quantization to minimize host-to-device memory traffic, keeping the dataflow pipeline saturated. The lack of local DRAM means metadata overhead directly impacts latency. If per-tensor accuracy is insufficient, PTQ calibration strategies (like KL divergence) must be evaluated before resorting to mixed-precision.
  common_mistake: |
    **The Pitfall:** Blindly recommending per-channel quantization for better accuracy.
    **The Rationale:** Candidates assume compute is the bottleneck and ignore the overhead of streaming thousands of unique scales and zero-points.
    **The Consequence:** The 26 TOPS dataflow engine stalls while waiting for streaming quantization parameters, severely degrading inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer specs: 1M parameter layer with 2048 output channels.
    - Per-tensor metadata: Adds 8 bytes (1 scale, 1 ZP).
    - Per-channel metadata: Adds 2048 * 8B = 16KB of metadata per layer.

    **Calculations:**
    - Network overhead: Over a 100-layer network, per-channel adds 1.6MB of metadata to stream per frame.
    - Bandwidth impact: At 30 FPS, that's 48MB/s of pure metadata overhead.

    **Conclusion & Interpretation:**
    - **Result: 48MB/s (Memory-Bound).** Per-channel quantization aggressively consumes host bus bandwidth, starving the dataflow compute engine.
