title: Symmetric QAT Pipeline Creation
scenario: You are designing an INT8 quantization scheme for a custom CNN on a Hailo-8 accelerator for local traffic monitoring.
question: Formulate a quantization-aware training (QAT) strategy that accounts for symmetric INT8 datapaths to minimize accuracy degradation on long-tail classes.
details:
  realistic_solution: Create a QAT pipeline enforcing symmetric, per-channel quantization for weights and per-tensor symmetric quantization for activations. By clipping outliers during the forward pass and approximating gradients with the Straight-Through Estimator, the model parameters become robust to the hardware's lack of zero-point shifting.
  common_mistake: |
    **The Pitfall:** Designing asymmetric quantization.
    **The Rationale:** Candidates default to standard asymmetric schemes which offer slightly more representational range but might not be natively supported by the hardware.
    **The Consequence:** Requires costly ALU emulation of zero-point shifts, heavily degrading inference latency and missing the real-time target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Precision: INT8 (Symmetric vs Asymmetric).
    - Hardware: Dataflow engine natively expects Zero-Point = 0.

    **Calculations:**
    - Symmetric inference cost: Native MAC operations map 1:1 to hardware.
    - Asymmetric inference cost: Emulating zero-point shifts introduces additional addition/multiplication overhead per MAC, reducing effective TOPS significantly.

    **Conclusion & Interpretation:**
    - **Result: Emulation Overhead (Compute-Bound).** Symmetric quantization is strictly required to fully utilize the compute engine; asymmetric quantization incurs emulated math that degrades inference latency.
