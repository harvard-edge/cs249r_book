title: INT4 Weight-Only Quantization for LLM on Hailo-8
scenario: A team wants to deploy a 3B parameter LLM on a 4GB Hailo-8. They propose INT4 weight-only quantization with INT8 activations (W4A8).
question: What packed W4A8 weight size fits in 4GB, and how does INT4 dequantization affect Hailo-8 throughput?
details:
  realistic_solution: The packed W4A8 weight payload is 1.5GB, so the weights fit in 4GB before scale/zero-point metadata, packing alignment, activations, KV-cache, and runtime overheads. However, Hailo-8 INT8 ALUs require on-the-fly INT4-to-INT8 dequantization, so the ideal compute throughput is reduced by about 15%. The resulting token-rate estimate is only a compute upper bound; end-to-end LLM throughput needs an explicit memory-bandwidth and runtime analysis.
  common_mistake: |
    **The Pitfall:** Assuming W4A8 runs at INT4 hardware throughput without penalty.
    **The Rationale:** Engineers assume the accelerator natively computes INT4, overlooking that the target hardware possesses strictly INT8 ALUs.
    **The Consequence:** Drastically overestimating hardware throughput by ignoring the on-the-fly W4-to-INT8 dequantization overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B LLM, counting packed weight bytes first.
    - Hailo-8 = 4GB RAM, 26 TOPS INT8.
    - 15% dequantization overhead.
    - 1 token = 6B FLOPs.

    **Calculations:**
    - Packed W4A8 weights = 3B parameters * 4 bits = 12e9 bits = 1.5e9 bytes ≈ 1.5GB before scales, alignment, activations, KV-cache, and runtime buffers.
    - Effective ideal compute after dequantization overhead = 26 TOPS * 0.85 = 22.1 TOPS.
    - Ideal compute-only latency = 6e9 ops/token / 22.1e12 ops/s = 0.27ms/token, before memory movement and runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: 1.5GB footprint with a 15% ideal-throughput penalty (Compute-Estimate-Bound).** The model fits by weight size, but the 0.27ms/token figure is not an end-to-end claim without explicit bandwidth and runtime measurements.
