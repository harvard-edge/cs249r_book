title: The INT8 vs FP16 Energy Budget
scenario: 'Your team is deploying a perception model on a battery-constrained autonomous robot. To extend mission time, you''re evaluating quantization strategies.'
question: 'How much more energy does a single FP16 operation consume compared to an INT8 operation?'
details:
  realistic_solution: 'An FP16 operation consumes roughly 5x more energy than an INT8 operation. While the exact number depends on the specific hardware architecture, the fundamental physics of computation show that the energy required for a floating-point operation is significantly higher than for an integer operation, far exceeding the 2x difference in bit width.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings correlate linearly with bit width reduction (2x).
    **The Rationale:** Candidates equate memory footprint reduction directly to ALU energy consumption.
    **The Consequence:** Drastically underestimating the battery-life benefits of aggressive INT8 quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 to INT8 energy ratio: ~18x.
    - FP32 to FP16 energy ratio: ~3.4x.

    **Calculations:**
    - FP16 to INT8 ratio: 18 / 3.4 = ~5.3x.

    **Conclusion & Interpretation:**
    - **Result: ~5.3x more energy (Power-Bound)**.
  options:
  - '~2x more energy'
  - '~5x more energy'
  - '~18x more energy'
  - 'The energy consumption is roughly the same'
