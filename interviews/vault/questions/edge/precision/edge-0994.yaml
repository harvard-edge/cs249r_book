title: Edge Activation Clipping
scenario: An INT8 edge detector works indoors but misses objects outdoors at noon. Activation logs show many values at the maximum code during high-glare frames.
question: Why would an INT8 edge detector clip activations during high-glare outdoor frames?
details:
  realistic_solution: The calibration data likely underrepresented glare, so signed INT8 activation scales are too narrow for outdoor noon frames and values saturate at the maximum code, +127. Exposure or camera AGC can contribute, but the quantization evidence is activation saturation. Use representative calibration, per-channel scaling, or QAT.
  common_mistake: |
    **The Pitfall:** Blaming the camera hardware or detector architecture.
    **The Rationale:** Candidates might assume hardware or architectural limitations before checking quantization ranges and activation saturation.
    **The Consequence:** Wasting time debugging hardware or model architecture instead of fixing the quantization calibration dataset.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Signed INT8 activation scale is limited to range [-128, +127].
    2. **Calculations:**
       * A spike at the maximum INT8 code (+127) indicates values are hitting the representable limit rather than utilizing the full dynamic range.
    3. **Conclusion & Interpretation:**
       * **The calibration data likely underrepresented the high-glare activation magnitudes. Result: Calibration Range Mismatch.**
