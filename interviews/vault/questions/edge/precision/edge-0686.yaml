title: The Fixed-Point Trade-off
scenario: 'Your team has successfully trained an object detection model in FP32 that achieves 90% mAP on your validation set. When you deploy this model to a low-power edge microcontroller with a fixed-point DSP, the accuracy drops significantly to 65% mAP.'
question: Why does FP32-to-fixed-point deployment drop mAP from 90% to 65%, and what steps would you take to fix it?
details:
  realistic_solution: "The significant accuracy drop is almost certainly due to **quantization effects**. Floating-point 32-bit (FP32) numbers offer a wide dynamic range and high precision. Fixed-point arithmetic (e.g., INT8 or INT16), common on edge DSPs for efficiency, has a much smaller dynamic range and fewer bits to represent values, leading to:\n1. **Reduced Precision:** Loss of fine-grained detail in weights and activations.\n2. **Reduced Dynamic Range:** Values exceeding the fixed-point range will either clip (saturate) or wrap around, leading to large errors. This is especially problematic for layers with wide ranges of activation values.\n3. **Accumulation Errors:** In operations like convolutions, repeated additions of quantized values can accumulate small errors, leading to larger deviations."
  common_mistake: |
    **The Pitfall:** Blaming the hardware's compute capability instead of the numeric representation.
    **The Rationale:** Candidates may assume that if a model runs but accuracy drops, the chip is just "not powerful enough," failing to understand how quantization affects numeric distribution.
    **The Consequence:** Chasing hardware upgrades instead of fixing the quantization calibration or choosing a more robust quantization scheme.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation range: [-1000, 1000].
    - INT8 resolution: 256 discrete bins.

    **Calculations:**
    - Step size for [-1000, 1000] in INT8 = 2000 / 255 = ~7.8 units.

    **Conclusion & Interpretation:**
    - **Result: ~7.8 units per bin (Quantization Precision Loss).** This results in a massive loss of precision compared to FP32, causing the accuracy drop.
