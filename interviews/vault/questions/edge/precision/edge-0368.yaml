title: The Perception Model Memory Diet
scenario: Your primary object detection model has 50 million parameters and currently runs in FP16 precision. To free up memory for a new sensor fusion model, you propose quantizing the existing model to INT8.
question: What trade-off does INT8 quantization introduce, and how much memory do 50 million weights require in FP16 versus INT8?
details:
  realistic_solution: The primary trade-off is a significant reduction in memory footprint and potentially faster inference, in exchange for a possible degradation in model accuracy. The smaller dynamic range of INT8 can lead to clipping or overflow of activation and weight values if a careful calibration process is not performed.
  common_mistake: |
    **The Pitfall:** Applying a 4x memory reduction factor when moving from FP16 to INT8.
    **The Rationale:** Engineers memorize the FP32 -> INT8 heuristic (4x reduction) and blindly apply it, forgetting the baseline is already FP16 (2 bytes).
    **The Consequence:** Incorrectly forecasting available memory limits, leading to out-of-memory errors when the new sensor fusion model is deployed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameter count: 50,000,000. FP16 = 2 bytes/parameter. INT8 = 1 byte/parameter.
    2. **Calculations:**
       - FP16 Memory: 50,000,000 * 2 = 100,000,000 bytes = 100 MB.
       - INT8 Memory: 50,000,000 * 1 = 50,000,000 bytes = 50 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 100 MB vs 50 MB.** The transition from FP16 to INT8 yields a 2x memory reduction, saving exactly 50 MB of RAM.
  options:
  - 200 MB for FP16, 100 MB for INT8. (Incorrectly treats FP16 as 4 bytes and INT8 as 2 bytes)
  - 100 MB for FP16, 25 MB for INT8. (Incorrectly applies a 4x reduction factor, common for FP32->INT8)
  - 100 MB for FP16, 50 MB for INT8.
  - 50 MB for FP16, 12.5 MB for INT8. (Off by a factor of 2 and then incorrectly applies 4x reduction)
  correct_index: 2
