title: The Energy Cost of Precision
scenario: You are optimizing a computer vision model for a battery-powered drone.
  To meet the power budget, you are considering quantizing the model from FP16 to
  INT8.
question: From a hardware physics perspective, roughly how much more energy does a
  single FP16 multiply-accumulate (MAC) operation consume compared to a single INT8
  MAC?
details:
  realistic_solution: FP16 operations fundamentally consume ~5x more energy than INT8
    equivalents. In CMOS hardware, energy dissipation corresponds directly to the
    physical switching of transistors and capacitance of datapaths. Compressing precision
    drastically slashes ALUs transistor counts and SRAM fetch energy, directly extending
    drone battery life without touching system-level battery hardware.
  common_mistake: '**The Pitfall:** Assuming energy consumption scales linearly with
    bit width (e.g., 2x).

    **The Rationale:** Engineers mistakenly believe that cutting bit width in half
    simply halves the energy.

    **The Consequence:** Edge deployments drastically underestimate the battery savings
    gained by aggressive INT8 quantization.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Operations: FP16 vs INT8.


    **Calculations:**

    - FP32 energy cost ≈ 18x INT8.

    - FP32 energy cost ≈ 3.4x FP16.

    - FP16 vs INT8 ratio = 18 / 3.4 ≈ 5.3x.


    **Conclusion & Interpretation:**

    - **Result: ~5x more energy (Energy-Bound)**. Energy cost corresponds to hardware
    transistor switching, severely penalizing higher precisions.

    '
  options:
  - About 2x more energy
  - About 18x more energy
  - About 5x more energy
  - The energy difference is negligible
