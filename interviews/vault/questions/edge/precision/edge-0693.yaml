title: The QAT Cliff
scenario: You post-training quantized (PTQ) your autonomous driving detection model from FP16 to INT4 on a Jetson Orin. Overall mAP dropped only 2%. But when you test on nighttime scenes with low-contrast pedestrians, recall for the 'pedestrian' class drops from 94% to 71%. Your safety team blocks deployment.
question: What went wrong with PTQ, and what is the principled fix?
details:
  realistic_solution: 'PTQ calibrates quantization ranges using a representative dataset, but calibration statistics are dominated by the majority distribution (daytime, high-contrast). Nighttime pedestrians have activations in the long tail of the distribution — small magnitude, low contrast. INT4''s 16 discrete levels crush these subtle features. The principled fix is Quantization-Aware Training (QAT): insert fake-quantization nodes during fine-tuning so the network learns to separate these distributions, and use mixed-precision (INT4 backbone, INT8 head).'
  common_mistake: |
    **The Pitfall:** Reverting entirely to INT8 without diagnosing the distribution failure.
    **The Rationale:** Candidates assume "INT4 is just too aggressive" instead of recognizing the specific feature-collapse of long-tail distributions.
    **The Consequence:** Leaving massive performance and memory savings on the table by abandoning INT4 entirely rather than applying targeted QAT.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Illustrative calibrated activation range for the affected tensor: [0, 1].
       - Nighttime pedestrian activation range: [0.01, 0.05].
       - Quantization scale is determined by the calibrated range and zero-point, not by bit width alone.
    2. **Calculations:**
       - With an INT8 affine scale over [0, 1], step size is roughly 1/255 = 0.0039, so the [0.01, 0.05] span covers about 0.04 / 0.0039 = ~10 step intervals.
       - With an INT4 affine scale over [0, 1], step size is roughly 1/15 = 0.067, which is larger than the whole nighttime span.
       - The nighttime values do not have "zero bins"; instead, many distinct low-contrast activations alias to the same one or two representable codes.
    3. **Conclusion & Interpretation:**
       - **Result: Severe Feature Aliasing**. INT4 PTQ can collapse separability in the low-amplitude tail even when overall mAP looks acceptable; QAT or mixed precision is needed for the sensitive detection head.
