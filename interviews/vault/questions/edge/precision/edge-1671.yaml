title: Mixed-Precision LLM Architecture for a 32 GB INT8 Edge Accelerator
scenario: You are tasked with deploying a 35B parameter Mixture-of-Experts (MoE) LLM onto a single on-premise edge accelerator with 32 GB of memory and high-throughput INT8 matrix engines. Standard INT8 per-tensor quantization fails to fit the model in memory, while uniform INT4 causes unacceptable perplexity degradation.
question: What mixed-precision quantization architecture would fit a 35B MoE LLM into 32 GB while using the accelerator's INT8 engines?
details:
  realistic_solution: A robust architecture uses W4A8 quantization for the majority of the model, dynamically unpacking 4-bit weights into INT8 registers at runtime to feed the accelerator's INT8 compute units. To preserve accuracy, highly sensitive layers (first/last, MoE routers, outlier channels) are retained in INT8. This hybrid approach reduces weight footprint while maintaining arithmetic intensity.
  common_mistake: |
    **The Pitfall:** Proposing standard INT8 quantization for the entire model.
    **The Rationale:** Candidates fail to calculate that the INT8 weights alone exceed the 32GB memory limit, and they overlook the architectural overhead of dequantizing 4-bit weights to INT8 to leverage the hardware ALUs.
    **The Consequence:** The model immediately runs out of memory (OOM) due to exceeding the 32GB limit, or the system suffers unacceptable perplexity degradation by uniformly using INT4 without preserving sensitive layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 35B parameter model, 32 GB memory limit
    - W4A8 quantization for 95% of weights, INT8 for 5%

    **Calculations:**
    - INT8 baseline = 35B * 1 byte = 35 GB decimal (~32.6 GiB), before KV cache and runtime overhead.
    - Mixed W4A8 = (35B * 0.95 * 0.5 bytes) + (35B * 0.05 * 1 byte) = 16.625 GB + 1.75 GB = 18.375 GB.
    - Remaining memory = 32 GB - 18.375 GB = 13.625 GB for KV cache, routing metadata, and runtime workspace.

    **Conclusion & Interpretation:**
    - **Result: 18.375 GB weights (Memory-Capacity-Bound)**. The W4A8 plus selective INT8 layout fits the model; unpack/dequantization feeds INT8 execution while the memory saving comes from storing most weights at 4 bits.
