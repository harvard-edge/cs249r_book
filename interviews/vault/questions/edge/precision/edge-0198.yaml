title: The Perception Model's Memory Diet
scenario: Your team is deploying an object detection model onto a vehicle's compute unit. The model currently runs in FP16 precision. It has 50 million parameters and its largest activation map consumes 20 MB of memory. To improve performance and reduce the memory footprint, your team wants to quantize it to INT8.
question: What total memory savings for weights and the largest activation should you expect when quantizing the 50M-parameter FP16 model to INT8?
details:
  realistic_solution: Quantizing from FP16 (2 bytes per value) to INT8 (1 byte per value) reduces the footprint of both the weight tensors and the activation maps by a factor of 2. You must account for both components to accurately forecast the VRAM optimization for the deployed system.
  common_mistake: |
    **The Pitfall:** Calculating memory savings for weights but forgetting activations.
    **The Rationale:** Engineers often focus entirely on parameter count, missing that activation maps are a significant portion of the memory footprint in vision models.
    **The Consequence:** A major underestimation of the total memory savings achieved by quantization.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model parameters: 50M
       - Largest activation map (FP16): 20 MB
       - FP16 = 2 bytes/param, INT8 = 1 byte/param
    **Calculations:**
       - FP16 weight memory: 50M * 2 bytes = 100 MB
       - INT8 weight memory: 50M * 1 byte = 50 MB
       - Weight savings: 100 MB - 50 MB = 50 MB
       - FP16 activation memory: 20 MB
       - INT8 activation memory: 10 MB
       - Activation savings: 20 MB - 10 MB = 10 MB
       - Total savings: 50 MB + 10 MB = 60 MB
    **Conclusion & Interpretation:**
       - **Result: Memory Optimization.** 60 MB total savings (50 MB weights + 10 MB activations).
  options:
  - 50 MB savings
  - 10 MB savings
  - 60 MB savings
  - 120 MB savings
  correct_index: 2
