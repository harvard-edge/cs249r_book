title: 'Optimizing Edge Deployment: Mixed-Precision Training for Coral Edge TPU'
scenario: 'A machine learning team is deploying an image classification model onto a Google Coral Edge TPU. The team has two candidate models: Model A (trained in FP32, intended for post-training quantization) and Model B (trained using mixed-precision, intended for PTQ or QAT).'
question: 'How would you compare Model A and Model B for INT8-only Coral deployment across accuracy, throughput, energy, and quantization risks?'
details:
  realistic_solution: '1. **Training & Quantization:** Apply PTQ for Model A, and both PTQ and QAT for Model B. 2. **Performance Benchmarking:** Evaluate final INT8 accuracy, throughput (FPS), and power consumption on the TPU. 3. **Resource Analysis:** Compare quantized model sizes and memory footprints. 4. **Tradeoff Analysis:** Analyze the trade-offs between accuracy, throughput, and power, prioritizing metrics that stay within the 2W budget.'
  common_mistake: |
    **The Pitfall:** Assuming mixed-precision training automatically improves INT8 deployment.
    **The Rationale:** Candidates believe mixed-precision guarantees better quantized models without an explicit QAT strategy.
    **The Consequence:** Deploying a model with unexpectedly poor accuracy or performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral provides 4 TOPS (4000 GOPS).
    - Budget is 2W.
    - Model A uses 2 GOPS, 1.8W.
    - Model B uses 2.2 GOPS, 1.95W.

    **Calculations:**
    - Model A Max FPS = 4000 / 2 = 2000 FPS.
    - Model B Max FPS = 4000 / 2.2 = 1818 FPS.

    **Conclusion & Interpretation:**
    - **Result: 1818 FPS (Compute-Bound)**. The marginal accuracy gain from Model B incurs an 182 FPS drop and a 0.15W power increase.
