title: 'Optimizing Edge Deployment: Mixed-Precision Training for Coral Edge TPU'
scenario: 'A machine learning team is deploying an image classification model onto a Google Coral Edge TPU. The team has two candidate models: Model A (trained in FP32, intended for post-training quantization) and Model B (trained using mixed-precision, intended for PTQ or QAT).'
question: How would you compare Model A and Model B for INT8-only Coral deployment across accuracy, throughput, energy, and quantization risks?
details:
  realistic_solution: Compare only deployable INT8 artifacts on the Coral Edge TPU. For Model A, run representative PTQ and measure the accuracy loss, compiled operator coverage, FPS, and board power. For Model B, do not credit mixed-precision training by itself; convert it to a Coral-compatible INT8 model with PTQ and, if needed, QAT that simulates INT8 weights and activations. Prefer the model that meets the accuracy target after INT8 conversion, keeps all critical ops on the TPU, stays inside the 2W budget, and has lower latency at the target input size. If Model B keeps more accuracy but introduces unsupported operators, CPU fallbacks, or higher power, Model A may be the better deployment choice.
  common_mistake: |
    **The Pitfall:** Choosing Model B because it was trained with mixed precision before checking the final Coral INT8 graph.
    **The Rationale:** Mixed-precision training can help optimization, but the Coral Edge TPU executes supported INT8 operations; PTQ/QAT quality and operator coverage decide deployability.
    **The Consequence:** A model that looked better in training may lose accuracy after INT8 conversion, fall back to CPU for unsupported ops, exceed the 2W budget, or run slower than the simpler PTQ candidate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral provides up to 4 TOPS INT8 peak, but real FPS depends on compiler coverage, utilization, memory movement, and host overhead.
    - Budget is 2W.
    - Model A uses 2 GOPS/frame after INT8 PTQ and measures 1.8W.
    - Model B uses 2.2 GOPS/frame after INT8 PTQ/QAT and measures 1.95W.
    - Assume both compile fully to Edge TPU and sustain 35% of peak after overheads.

    **Calculations:**
    - Effective throughput: 4000 GOPS/s x 0.35 = 1400 GOPS/s.
    - Model A estimated FPS: 1400 / 2 = 700 FPS.
    - Model B estimated FPS: 1400 / 2.2 = 636 FPS.
    - Both stay under 2W in the assumed measurement, but Model B has about 9% lower throughput and 0.15W less power headroom.

    **Conclusion & Interpretation:**
    - **Result: choose by measured INT8 accuracy and compiled performance, not training precision**. If Model B's INT8 accuracy gain is meaningful and it has no CPU fallbacks, its 9% throughput and 0.15W power cost may be acceptable; otherwise Model A is safer for Coral deployment.
