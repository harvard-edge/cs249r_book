title: 'Model Size Estimation: Specify Memory Budget for Edge LLM with Fixed 16GB'
scenario: 'You need to specify the maximum LLM model size and configuration for an edge system with 16GB LPDDR5 (no swap). Requirements: OS needs 3GB, CUDA needs 1GB, and minimum 2GB KV-cache is required for 8 concurrent users at 512-token context. The model must achieve >60% accuracy on the MMLU benchmark.'
question: What LLM family, precision, parameter count, KV-cache budget, and Time Per Output Token (TPOT) would you deploy within the 16GB constraints?
details:
  realistic_solution: 'Available for model+KV: 16-3-1=12GB. KV requirement: ~2.1GB. Model budget: 12-2=10GB. Recommendation: 7B INT4 = 3.5GB. Total: 3+1+3.5+2.1=9.6GB < 16GB. MMLU: 7B INT4 (GPTQ): ~65-68%.'
  common_mistake: |
    **The Pitfall:** Specifying an FP16 model that breaches the memory budget.
    **The Rationale:** Candidates often default to standard FP16 7B models without performing a strict memory accounting of system and KV-cache overhead.
    **The Consequence:** Recommending a 14GB FP16 model plus 6GB of overhead yields 20GB, causing the 16GB edge system to crash immediately with an OOM error.
  napkin_math: |
    1. **Assumptions & Constraints:** 16GB RAM. 3GB OS, 1GB CUDA. 8 users, 512 context. Target model is 7B INT4 (0.5 bytes/param).
    2. **Calculations:** Available RAM = 16 - 3 - 1 = 12GB. KV Cache per token (7B, 32 heads, 128 dim) = 2 * 32 * 32 * 128 * 2 bytes = 524 KB. Total KV = 8 * 512 * 524 KB = 2.1GB. Model Weights = 7B * 0.5 = 3.5GB. Total Usage = 3 + 1 + 3.5 + 2.1 = 9.6GB.
    3. **Conclusion & Interpretation:** **A 7B INT4 model safely fits (9.6GB < 16GB). Memory-Capacity Bound constraints necessitate aggressive quantization.**
