title: Systolic Array Dataflow Optimization for Qualcomm Cloud AI 100
scenario: A new Transformer-based object detection model is deployed on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP) for real-time edge inference. Initial profiling shows that while the INT8 throughput is theoretically very high, the actual inference latency is 2x higher than expected for the transformer's self-attention layers, and the AI Cores are significantly underutilized (averaging 30% utilization). You suspect an issue with how data is fed into the systolic arrays.
question: What could be the root cause of this underutilization and increased latency, specifically considering the characteristics of transformer layers and the Qualcomm AI 100's architecture?
details:
  realistic_solution: The problem likely stems from a suboptimal dataflow strategy for the self-attention layers. Given the large intermediate activations and smaller weight matrices characteristic of transformer attention, an output-stationary dataflow might be more efficient than a weight-stationary one for these specific layers. This minimizes redundant fetching of activations and maximizes on-chip reuse of outputs as they are computed. Additionally, optimizing tiling parameters (tile sizes for weights, inputs, and outputs) to fit within the 144 MB on-die SRAM of each AI core (or the shared LPDDR4x for larger tiles) would reduce costly LPDDR4x accesses, ensuring data is available to the systolic array when needed.
  common_mistake: |
    **The Pitfall:** Assuming a 'one-size-fits-all' weight-stationary dataflow.
    **The Rationale:** Candidates apply CNN optimization strategies (weight-stationary) to Transformer attention heads, which have large intermediate activations and smaller weight matrices.
    **The Consequence:** Frequent off-chip memory accesses to LPDDR4x, causing severe latency spikes and leaving the AI Cores starved.
  napkin_math: |
    *   Qualcomm AI 100 Peak Compute: 400 TOPS (400e12 ops/s).
    *   Assume a layer requires 10e9 INT8 ops and observed latency is 100ms.
    *   Effective TOPS = 10e9 / 0.1s = 0.1 TOPS.
    *   Utilization = 0.1 / 400 = 0.025%, indicating a massive memory bottleneck.
    *   LPDDR4x bandwidth = 136 GB/s. If each op requires 2 bytes (input+weight), max compute is 136 / 2 = 68 Gops/s (0.068 TOPS) without on-chip reuse.
    *   **Without proper output-stationary tiling in the 144 MB SRAM, memory bandwidth heavily caps performance, starving the systolic array.**
