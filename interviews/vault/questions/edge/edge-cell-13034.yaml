title: 'Edge Queueing Theory Design: Hailo-8 vs Jetson Orin Queueing Analysis'
scenario: Design an edge inference system for a smart city pedestrian counter with λ=50 detections/s.
  Compare Hailo-8 (26 TOPS INT8, 2.5W) vs Jetson Orin (275 TOPS INT8, 60W) using M/D/1 queuing. Detection
  model requires 5 GOPS per inference. Calculate throughput, utilization, queue wait, and cost/W for each
  platform.
question: "For λ=50 detections/s and a 5 GOPS model, what are throughput, utilization, queue wait, and power efficiency on Hailo-8 versus Jetson Orin?"
details:
  realistic_solution: 'Model: 5 GOPS/inference. Hailo-8: 26 TOPS INT8 = 26,000 GOPS. μ_hailo = 26000/5
    = 5200 inf/s. ρ=50/5200=0.0096. M/D/1 Wq = ρ²/(2μ(1-ρ)) ≈ 0 (negligible). W ≈ 1/5200 + 0 = 0.19ms.
    Cost: 2.5W for 50 inf/s = 0.05W/inf/s. Jetson Orin: 275 TOPS. μ_orin = 275000/5 = 55000 inf/s. W ≈
    0.018ms. Cost: 60W for 50 inf/s = 1.2W/inf/s. Hailo-8 is 24x more power efficient and fully meets
    SLO. Choose Hailo-8.'
  common_mistake: Using TOPS directly without converting to inferences/second based on model complexity,
    and not accounting for memory bandwidth as a secondary bottleneck on Hailo-8.
  napkin_math: 'Hailo-8: μ=5200 inf/s, ρ=0.0096, M/D/1 Wq≈0, W=0.19ms. Power: 2.5W / 50 inf/s = 0.05 W/(inf/s).
    Jetson Orin: μ=55000 inf/s, ρ=0.0009, W=0.018ms. Power: 60W / 50 inf/s = 1.2 W/(inf/s). Power ratio:
    1.2/0.05 = 24x. Cost ratio (assuming $50 Hailo vs $500 Orin): 10x. For city deployment: 1000 intersections,
    Hailo saves 57.5kW of power = ~$50K/year electricity. Choose Hailo-8 for this task.'
