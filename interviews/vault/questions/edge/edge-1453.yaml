title: Streaming Dataflow Bottlenecks on Edge Accelerators
scenario: 'You are profiling a fully connected layer on an edge accelerator lacking local DRAM, streaming directly from host memory. The host connection provides a maximum bandwidth of 4 GB/s. The layer requires 100 Mega-Operations (MOPS) and streams a total of 2 Megabytes of weights and input activations from the host. You observe that the accelerator only achieves 0.2 TOPS of actual throughput, leaving the compute array heavily underutilized.'
question: "Why does the accelerator reach only 0.2 TOPS on this 100 MOPS, 2 MB layer despite a significantly higher peak capability?"
details:
  realistic_solution: 'Because the accelerator lacks local DRAM and relies on streaming, performance on low-reuse fully connected layers is strictly limited by host bandwidth. Calculating the arithmetic intensity and multiplying by host bandwidth proves the system is completely memory-bound, capping performance well below peak TOPS.'
  common_mistake: |
    **The Pitfall:** Blaming host-to-device latency, driver overhead, or power throttling.
    **The Rationale:** Candidates see low accelerator utilization and assume system overhead without calculating the actual arithmetic intensity versus available streaming bandwidth.
    **The Consequence:** Misdiagnosing a fundamental memory-bandwidth starvation issue as a software overhead problem.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer Compute: 100 MOPS.
       - Layer Data: 2 MB.
       - Host Bandwidth: 4 GB/s.
    2. **Calculations:**
       - Arithmetic Intensity = 100 MOPS / 2 MB = 50 OPS/Byte.
       - Max Throughput = Bandwidth * Arithmetic Intensity = 4 GB/s * 50 OPS/Byte = 200 GOPS = 0.2 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: 0.2 TOPS (Memory-Bandwidth Bound)**
