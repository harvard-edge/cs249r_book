title: Edge TPU Operator Fusion Tradeoff
scenario: You are deploying a custom CNN-based vision model to a Google Coral Edge TPU via a USB 3.0 connection. The model utilizes a novel activation function, Swish, which is not natively supported by the Edge TPU compiler and causes the execution graph to partition.
question: Should you keep Swish on the host CPU or replace it with ReLU6 for full INT8 TPU execution, and why?
details:
  realistic_solution: You must unconditionally replace Swish with a supported activation like ReLU6 and perform Quantization-Aware Training (QAT) to recover accuracy. The Edge TPU compiler requires fully contiguous INT8 operations. An unsupported layer forces the graph to fracture, requiring intermediate activations to be offloaded from the TPU, sent across the slow USB 3.0 bus to the host CPU, processed, and shipped back. This catastrophic data movement overhead destroys both the latency budget and the 2W power efficiency mandate.
  common_mistake: |
    **The Pitfall:** Prioritizing a minor theoretical accuracy bump from Swish over hardware compatibility.
    **The Rationale:** ML engineers are trained to chase state-of-the-art accuracy metrics, ignoring the systemic penalty of graph partitioning on dedicated edge accelerators.
    **The Consequence:** The resulting USB bus thrashing spikes inference latency by an order of magnitude and severely drains battery power, rendering the edge deployment unusable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intermediate tensor shape: 1x64x120x120 INT8 = 921.6 KB.
       - USB 3.0 realistic transfer speed: ~300 MB/s.
       - Framerate target: 30 FPS (33.3ms budget).
    2. **Calculations:**
       - Round-trip transfer size (TPU -> Host -> TPU) = 921.6 KB * 2 ≈ 1.84 MB.
       - Transfer latency penalty = 1.84 MB / 300 MB/s ≈ 6.1 ms.
       - Overhead ratio = 6.1 ms / 33.3 ms = 18.3% of total budget wasted on transport.
    3. **Conclusion & Interpretation:**
       - **Result: 6.1ms wasted per frame. Graph partitioning shifts the system to become I/O-Bound on the USB bus, mandating a fully supported operation like ReLU6.**
