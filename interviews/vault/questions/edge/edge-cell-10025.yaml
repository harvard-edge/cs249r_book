title: 'Recall: Defining Activation Memory and Its Relationship to Sequence Length'
scenario: 'A new ML engineer joining an edge team asks: ''What exactly is activation memory, and why does
  it scale with sequence length for Transformers but not for CNNs?'' They are about to profile a DistilBERT
  deployment on Jetson Orin and need a precise conceptual foundation before interpreting the profiler
  output.'
details:
  realistic_solution: 'Activation memory is the memory required to store intermediate feature tensors
    produced during the forward pass, retained for use during the backward pass (training) or for the
    next layer''s input (inference). For Transformers, the attention mechanism produces S×S score matrices
    (where S = sequence length), making attention activation memory O(S²). For CNNs, feature maps scale
    as O(H×W×C) for fixed spatial resolution — O(1) with respect to sequence length. For DistilBERT on
    Orin (6 layers, H=768, S=512): attention activations per layer = 12 heads × B × 512 × 512 × 2 B =
    3.1 MB/layer × 6 = 18.9 MB total — easily fits in LPDDR5.'
  common_mistake: Conflating activation memory with model weight memory, or stating that activation memory
    scales with sequence length for all neural networks. CNNs have activation memory that scales with
    spatial resolution (H×W) for a fixed-size input — the equivalent of sequence length — but CNNs are
    typically used with fixed-resolution inputs in edge deployment, making activation memory effectively
    constant per batch.
  napkin_math: 'DistilBERT attention activation per layer: num_heads × B × S × S × dtype = 12 × 1 × 512
    × 512 × 2 B = 6.3 MB. Wait — 12 × 512² × 2 = 6,291,456 B = 6 MB/layer. 6 layers = 36 MB. Plus residual
    stream: 6 × 1 × 512 × 768 × 2 B = 4.7 MB. Total inference activations: ~41 MB. This fits trivially
    in Orin''s 32 GB LPDDR5. At S=8192 (8× longer): attention ≈ 36 MB × 256 = 9.2 GB — now significant.'
