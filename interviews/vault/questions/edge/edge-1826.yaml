title: 'Thermal Specification for Edge TPU Burst Workloads'
scenario: We are deploying a real-time defect detection system on a manufacturing line using a Google Coral Edge TPU (PCIe form factor). The system must process bursts of 60 frames per second requiring 4 TOPS of INT8 compute for 10-second intervals, followed by 20-second idle periods. The device consumes 2W during active inference and operates in a harsh ambient factory temperature of 45°C.
question: What thermal management specification would prevent Coral Edge TPU throttling during 10-second 2W bursts at 45°C ambient?
details:
  realistic_solution: |
    The design should leverage the 33% duty cycle to average out thermal dissipation while ensuring sufficient thermal mass to absorb the 10-second burst. A well-designed passive heatsink thermally coupled to a metal enclosure is preferred for reliability in a factory. The system must maintain the junction temperature below the 85°C throttling threshold by managing the 40°C thermal headroom from the high ambient baseline.
  common_mistake: |
    **The Pitfall:** Calculating cooling requirements based on continuous 2W power draw.
    **The Rationale:** Ignoring the 33% duty cycle and assuming worst-case continuous load.
    **The Consequence:** Designing an over-engineered active cooling system, or conversely, ignoring the 45°C ambient temperature and using an undersized passive heatsink that causes throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power: Peak active = 2W. Duty cycle = 10s active / 30s total = 33%.
    - Thermal Headroom: Max Tj (85°C) - Ambient (45°C) = 40°C.

    **Calculations:**
    - Average Power: 2W * 0.33 = 0.66W.
    - Required Thermal Resistance: 40°C / 0.66W = 60.6°C/W.
    - Burst Heat: 2W * 10s = 20 Joules.

    **Conclusion & Interpretation:**
    - **Result: 20 Joules (Thermal-Bound Burst)**. The heatsink must have enough thermal mass to absorb the 20J burst without spiking the temperature more than 40°C before continuous dissipation catches up.
