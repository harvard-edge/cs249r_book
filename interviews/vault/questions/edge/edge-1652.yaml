title: Sub-INT8 Quantization on Dataflow Accelerators
scenario: You are architecting a high-throughput video analytics pipeline targeting
  the Hailo-8 accelerator. The platform provides 26 TOPS of INT8 compute at 2.5W but
  lacks local DRAM, meaning all data must stream from host memory. To fit a larger
  transformer model within the host bandwidth constraints, design a mixed 4-bit/INT8
  quantization architecture that packs sub-byte weights into the INT8 data stream,
  and explain how you would recover the accuracy loss.
question: How would you design a mixed 4-bit/INT8 Hailo-8 quantization scheme to cut
  host bandwidth for a larger transformer and recover accuracy?
details:
  realistic_solution: Design a static architecture where weights are quantized to
    4-bit and packed two per INT8 word on the host. The Hailo-8 ingests the INT8 stream
    and uses a custom compiled dataflow graph that first splits the INT8 values into
    two 4-bit operands before feeding them into the standard INT8 MAC units. Accuracy
    is recovered by keeping activations in INT8 and using Quantization-Aware Training
    (QAT) with learned step sizes, avoiding dynamic scaling overhead during inference.
  common_mistake: Candidates often suggest standard post-training quantization methods
    like AWQ without considering the hardware's static dataflow nature. They may propose
    dynamic activation quantization or complex decompression schemes that require
    unsupported custom logic on the Hailo-8, or fail to address the host memory streaming
    bottleneck.
  napkin_math: Hailo-8 provides 26 TOPS INT8 at 2.5W. At 60 FPS, the compute budget
    is 26e12 / 60 = 433 GOPS/frame. A 50M parameter model at INT8 requires 50MB of
    weights. If weights are streamed continuously from the host, this requires 50MB
    * 60 = 3.0 GB/s bandwidth. By packing 4-bit weights into the INT8 stream, the
    payload drops to 25MB, requiring only 1.5 GB/s host-to-device bandwidth. This
    50% reduction prevents PCIe bottlenecking and leaves enough bandwidth for streaming
    high-resolution input frames.
