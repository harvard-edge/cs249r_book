title: The Vision Transformer Deadline Miss
scenario: You are an ML Systems Engineer on an autonomous vehicle team using a Jetson AGX Orin (275 TOPS, 204.8 GB/s memory bandwidth) for the perception system. Your current object detector, a highly-optimized MobileNet-style CNN, meets the 33ms per-frame hard-realtime deadline. Your team wants to upgrade to a more accurate Vision Transformer (ViT) model. During testing, the ViT model misses the 33ms deadline. A profiler reveals that 80% of the latency is spent in the self-attention layers when processing the 640x640 INT8 input images.
question: "For the 640x640 INT8 ViT on Orin, are the self-attention layers compute-bound or memory-bandwidth-bound?"
details:
  realistic_solution: The self-attention mechanism is **memory-bandwidth-bound**. To determine this, we must calculate the Arithmetic Intensity (AI) of the operation and compare it to the hardware's ridge point. The Jetson AGX Orin's ridge point is `~1,342 Ops/Byte` (275 TOPS / 204.8 GB/s). The AI of the self-attention layer is significantly lower than this, meaning the memory system cannot supply data fast enough to keep the compute units busy. The bottleneck is not the total number of operations, but the rate at which we can move data to and from memory.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the quadratic scaling of FLOPs in transformers.
    **The Rationale:** Engineers assume the O(N^2) complexity means the model is always compute-bound, ignoring the memory access patterns.
    **The Consequence:** They fail to target the true bottleneck (the need to read/write the large intermediate attention score matrix), misdiagnosing the issue on specialized hardware with high compute-to-memory ratios.
  napkin_math: |
    1. **Sequence length (N):** 640x640 image with 16x16 patches: `N = (640/16)^2 = 40^2 = 1,600 tokens`.
    2. **Self-attention FLOPs (per head, per layer):**
       - Q*K^T: `2 * N * N * d = 2 * 1600 * 1600 * 64 = 327M FLOPs`.
       - Attn*V: `2 * N * N * d = 327M FLOPs`.
       - Total per head: `~654M FLOPs`.
       - With 12 heads: `~7.8 GFLOPs`.
    3. **Memory traffic (INT8):**
       - Q, K, V matrices: `3 * N * d * 12 heads * 1 byte = 3.68 MB` (read).
       - Attention scores (N x N x 12 heads): `30.72 MB` (materialized: written then read).
       - Output matrix: `1.22 MB` (written).
       - Total memory traffic (read + write): `~70 MB`.
    4. **Arithmetic Intensity:** `AI = 7.8 GFLOPs / 70 MB ≈ 111 Ops/Byte`.
    5. **Hardware Ridge Point:** `275 TOPS / 204.8 GB/s ≈ 1,342 Ops/Byte`.
    **Since the AI (111) is much lower than the Ridge Point (1,342), the self-attention layer is severely memory-bandwidth bound.**
  options:
  - It's compute-bound. The $O(N^2)$ FLOPs growth from the 1600-token sequence is too much for the Orin's 275 TOPS.
  - It's memory-bandwidth-bound. The arithmetic intensity of self-attention is lower than the hardware's ridge point.
  - It's power-throttling. The operation's intensity is causing the Orin to exceed its 60W thermal design power (TDP) and clock down.
  - It's a software issue. The INT8 quantization is not being properly fused by the compiler, leading to high dispatch overhead.
  correct_index: 1
