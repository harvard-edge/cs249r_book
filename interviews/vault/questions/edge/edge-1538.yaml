title: Load Balancing Strategies for Stateful Edge Inference
scenario: 'We are building an on-premise LLM-based customer service system using a
  cluster of servers, each with 8x Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x,
  400 TOPS INT8, 75W). We are evaluating two routing strategies for incoming user
  prompts: Strategy A uses consistent hashing on user session IDs to route requests
  to specific accelerators, aiming to maximize KV cache hit rates. Strategy B uses
  a weighted round-robin approach based on current accelerator queue depths to minimize
  queueing delay. Given the hardware constraints of the Cloud AI 100, which approach
  is better and why?'
question: Given the hardware constraints of the Cloud AI 100, which approach is better
  and why?
details:
  realistic_solution: Strategy A (consistent hashing) is the superior design for stateful
    LLM workloads on this platform. Because the Cloud AI 100 relies on 32GB of LPDDR4x,
    the cost of recomputing KV cache for a migrated session is severe. Consistent
    hashing guarantees that a user's session remains pinned to a specific card's memory,
    avoiding redundant compute and dramatically reducing tail latency, which outweighs
    the benefits of perfectly balanced queues.
  common_mistake: Candidates often default to the dynamic least-loaded approach (Strategy
    B) without considering the massive compute penalty of KV cache misses. They fail
    to recognize that edge accelerators have strict memory constraints where stateful
    locality is critical for performance.
  napkin_math: Assume an INT8 model takes 16GB, leaving 16GB for KV caches on the
    32GB Cloud AI 100. If a user's cache is 256MB, one card holds 64 sessions. With
    Strategy B across 8 cards, a follow-up request has an 87.5% chance of a cache
    miss. Recomputing a 1000-token prompt for a 16B parameter model requires ~32 TeraOps
    (2 * 16B * 1000). On the 400 TOPS INT8 engine at 50% utilization (200 TOPS), this
    miss adds a 160ms penalty (32 / 200). Strategy A eliminates this 160ms overhead
    entirely.
