title: Load Balancing Strategies for Stateful Edge Inference
scenario: 'We are building an on-premise LLM-based customer service system using a cluster of servers, each with 8x Qualcomm Cloud AI 100 accelerators. We are evaluating two routing strategies for incoming user prompts: Strategy A uses consistent hashing on user session IDs, while Strategy B uses a weighted round-robin approach based on queue depths.'
question: Given the hardware constraints of the Cloud AI 100, which approach is better and why?
details:
  realistic_solution: Strategy A (consistent hashing) is the superior design for stateful LLM workloads on this platform. Because the Cloud AI 100 relies on 32GB of LPDDR4x, the cost of recomputing KV cache for a migrated session is severe. Consistent hashing guarantees that a user's session remains pinned to a specific card's memory, avoiding redundant compute and dramatically reducing tail latency.
  common_mistake: |
    **The Pitfall:** Defaulting to dynamic least-loaded routing without considering stateful KV cache penalties.
    **The Rationale:** Candidates often apply stateless cloud load-balancing strategies to stateful LLM deployments.
    **The Consequence:** The system experiences massive latency spikes as accelerators constantly recompute dropped KV caches for bounced user sessions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cards: 8. Memory per card: 32GB.
       - INT8 model footprint: 16GB. Remaining for KV Cache: 16GB.
       - User cache size: 256MB.
       - Recompute penalty (16B model, 1000 tokens): ~32 TeraOps.
       - Compute throughput: 200 TOPS utilization.
    2. **Calculations:**
       - Cache capacity per card: 16GB / 256MB = 64 sessions.
       - Cache Miss Probability (Strategy B): 7/8 = 87.5%.
       - Recompute Latency: 32 TOPS / 200 TOPS = 160ms.
    3. **Conclusion & Interpretation:**
       - **Result: Strategy A eliminates 160ms recompute overhead (Memory State-Bound).** Consistent hashing guarantees cache locality.
