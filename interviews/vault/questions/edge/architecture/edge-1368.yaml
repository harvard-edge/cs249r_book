title: Stream Bandwidth for Depthwise Convs on Hailo-8
scenario: You are deploying an EfficientNet edge model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). Unlike typical edge GPUs, Hailo-8 has no local DRAM and streams data directly from host memory. For a specific layer, you have an INT8 input feature map of 100x100x64. You apply a 3x3 depthwise convolution followed by a 1x1 pointwise convolution expanding to 128 channels. The accelerator hits 10 TOPS of actual utilization on this layer.
question: What host memory streaming bandwidth is required to feed the 100x100x64 depthwise-plus-pointwise layer at 10 TOPS utilization?
details:
  realistic_solution: Calculate the host-streamed input activation bytes plus depthwise and pointwise weight bytes, then calculate depthwise and pointwise MACs separately to derive execution time at 10 TOPS. The pointwise output is produced on chip and is not part of the input feed bandwidth. The resulting bandwidth is above PCIe Gen3 x16 and slightly above typical PCIe Gen4 x16 usable bandwidth, so lane configuration matters.
  common_mistake: |
    **The Pitfall:** Forgetting that Hailo-8 lacks local DRAM and miscalculating total Operations.
    **The Rationale:** Candidates overlook the streaming nature of the dataflow accelerator and the 2x Operations per MAC.
    **The Consequence:** This leads to drastic underestimation of the required PCIe host memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 100x100x64 INT8. DW conv: 3x3. PW conv: 1x1 to 128 channels.
    - Target compute utilization: 10 TOPS (10^13 ops/sec).

    **Calculations:**
    - Host-Streamed Bytes: (100*100*64) input acts + (3*3*64) DW weights + (64*128) PW weights = 648,768 bytes.
    - Depthwise MACs: 100*100*64*9 = 5.76M MACs.
    - Pointwise MACs: 100*100*64*128 = 81.92M MACs.
    - Total MACs: 5.76M + 81.92M = 87.68M MACs.
    - Total Operations: 87.68M * 2 = 175.36M Ops.
    - Execution Time at 10 TOPS: 175.36M / 10^13 = 17.536 microseconds.
    - Required Bandwidth: 648,768 bytes / 17.536 us = 36.99 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 36.99 GB/s (I/O-Bound)**. Feeding this layer at 10 TOPS requires ~37 GB/s of sustained host bandwidth, which exceeds PCIe Gen3 x16 and is slightly above typical PCIe Gen4 x16 usable bandwidth, but not all wider/newer PCIe configurations.
