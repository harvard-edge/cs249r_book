title: 'Datacenter vs Edge Efficiency Trade-off for Video Analytics'
scenario: 'A city deploys 1000 traffic cameras. Option A: stream all video to cloud H100 servers (100Mbps per camera, processed in datacenter with PUE=1.3). Option B: deploy Jetson Orin (60W) at each camera, send only metadata to cloud.'
question: 'How do cloud streaming and Jetson Orin edge processing compare in total power and 3-year TCO for 1000 traffic cameras?'
details:
  realistic_solution: 'Option A (cloud): Network: 1000 cameras * 100Mbps requires 100Gbps aggregated bandwidth -> 50 network switches at 500W = 25kW network. H100 processing: 1000 cameras at 30fps requires ~40 H100s at 700W each = 28kW. PUE=1.3: facility power=28*1.3=36.4kW for GPUs + network. Total ≈ 61kW. Option B (edge): 1000 Jetson Orins * 60W = 60kW + minimal network (metadata only). Comparable total power! But edge eliminates 1000*100Mbps=100Gbps WAN bandwidth cost (≈$200k/month for 100Gbps WAN). Edge wins on TCO.'
  common_mistake: |
    **The Pitfall:** Comparing only datacenter compute power without including the network infrastructure power.
    **The Rationale:** Candidates forget that continuously streaming high-bandwidth video requires massive network switches that consume significant power at scale.
    **The Consequence:** They falsely conclude that the datacenter is vastly more power-efficient, ignoring the heavy TCO penalty of the WAN bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud Power: 40 H100s × 700W × 1.3 PUE = 36.4 kW. Network switches (100 Gbps) = 25 kW. Total = 61.4 kW.
    - Edge Power: 1000 Jetson Orins × 60W = 60.0 kW. Power is effectively tied.
    - WAN cost (100 Gbps at $2/Mbps/month) = $200k/month = $7.2M (3-year).
    - H100 inference cost = $3.1M.

    **Calculations:**
    - Cloud TCO (3-year): WAN cost ($7.2M) + H100 inference cost ($3.1M). Total ≈ $10.3M.
    - Edge TCO (3-year): 1000 Jetsons × $500 = $500k.

    **Conclusion & Interpretation:**
    - **Result: $10M Savings (TCO-Bound)**. Edge deployment wins on TCO by roughly $10M over 3 years while consuming the same total power.
