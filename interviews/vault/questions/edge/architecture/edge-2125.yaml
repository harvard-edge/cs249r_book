title: Datacenter vs Edge Efficiency Trade-off for Video Analytics
scenario: 'A city deploys 1000 traffic cameras. Option A: stream all video to cloud H100 servers (100Mbps per camera, processed in datacenter with PUE=1.3). Option B: deploy Jetson Orin (60W) at each camera, send only metadata to cloud.'
question: How do cloud streaming and Jetson Orin edge processing compare in total power and 3-year TCO for 1000 traffic cameras?
details:
  realistic_solution: 'Option A (cloud): 1000 cameras * 100Mbps requires 100Gbps of continuous uplink. If the datacenter uses 40 H100s at 700W and 25kW of switching, IT load is 28kW + 25kW = 53kW; with PUE=1.3, facility power is about 69kW. Option B (edge): 1000 Jetson Orins at 60W plus about 1kW of metadata networking is about 61kW. Power is comparable, but TCO is dominated by the cloud video WAN. Using an explicit dedicated-bandwidth assumption of $10/Mbps-month, 100Gbps costs about $36M over 3 years; metadata backhaul at 1Gbps costs about $0.36M. Edge wins TCO under that assumption, but the conclusion depends on bandwidth pricing, hardware price, maintenance, and operations.'
  common_mistake: |
    **The Pitfall:** Comparing only datacenter compute power without including the network infrastructure power.
    **The Rationale:** Candidates forget that continuously streaming high-bandwidth video requires massive network switches that consume significant power at scale.
    **The Consequence:** They falsely conclude that the datacenter is vastly more power-efficient, ignoring the heavy TCO penalty of the WAN bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud ingest: 1000 cameras * 100Mbps = 100Gbps = 100,000Mbps.
    - Cloud IT load: 40 H100s * 700W = 28kW; switching = 25kW; PUE = 1.3.
    - Edge load: 1000 Jetson Orins * 60W = 60kW plus ~1kW metadata networking.
    - Electricity: $0.12/kWh. Illustrative dedicated WAN: $10/Mbps-month.
    - Hardware: 40 H100s * $25k = $1.0M; 1000 Jetsons * $700 = $0.7M.

    **Calculations:**
    - Cloud facility power = (28kW + 25kW) * 1.3 = 68.9kW.
    - Cloud 3-year power = 68.9 * 8760 * 3 * $0.12 = ~$0.22M.
    - Cloud WAN = 100,000Mbps * $10 * 36 months = $36.0M.
    - Cloud 3-year subtotal = $36.0M WAN + $1.0M H100s + $0.22M power = ~$37.2M.
    - Edge 3-year power = 61kW * 8760 * 3 * $0.12 = ~$0.19M.
    - Edge metadata WAN at 1Gbps = 1000Mbps * $10 * 36 months = $0.36M.
    - Edge 3-year subtotal = $0.7M Jetsons + $0.19M power + $0.36M metadata WAN = ~$1.25M.

    **Conclusion & Interpretation:**
    - **Result: power is comparable, WAN cost drives TCO (TCO-Bound)**. Under the stated pricing, edge saves roughly $36M over 3 years, but the answer must state the WAN and hardware assumptions rather than claiming bandwidth is free.
