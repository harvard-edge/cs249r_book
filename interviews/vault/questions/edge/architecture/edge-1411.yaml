title: 'Explaining Latency Regressions in Depthwise Convolutions on Cloud AI 100'
scenario: 'Your team replaces standard convolutions in a ResNet-like model with depthwise separable convolutions to reduce FLOPs before deploying to a Qualcomm Cloud AI 100 on-premise accelerator (400 TOPS INT8, 32 GB LPDDR4x). While the theoretical FLOPs drop by 8x, the end-to-end inference latency on the AI 100 actually increases by 15%.'
question: 'Why can replacing dense convolutions with depthwise separable convolutions slow the Cloud AI 100 despite an 8x FLOP reduction?'
details:
  realistic_solution: 'The Qualcomm Cloud AI 100 is optimized for high arithmetic intensity (dense matrix multiplications). Depthwise convolutions have extremely low arithmetic intensity (FLOPs-to-byte ratio), making the operation severely memory-bandwidth bound on the LPDDR4x interface.'
  common_mistake: 'Assuming fewer FLOPs always equate to lower latency. Engineers ignore arithmetic intensity and hardware execution models.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 3x3 conv: ~231M OPs, ~690KB data.
    - Depthwise 3x3 conv: ~903K OPs, ~103KB data.
    - LPDDR4x bandwidth: ~136 GB/s. AI 100 Compute: 400 TOPS.

    **Calculations:**
    - Standard Conv Arithmetic Intensity: ~335 OPs/byte.
    - Depthwise Conv Arithmetic Intensity: ~8.8 OPs/byte.
    - Required Intensity to max out 400 TOPS: 400,000 Giga-OPs / 136 GB/s ≈ 2941 OPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 8.8 OPs/byte (Memory-Bound)**. Depthwise convolutions fall drastically short of the hardware's arithmetic intensity requirements and become deeply memory-bound, causing latency regressions.
