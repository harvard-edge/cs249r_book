title: Edge Encoder Decoder Serving Spec
scenario: You are deploying an encoder-decoder speech model on an edge gateway. The product team gives only average utterance length, but the SLA is based on time to first partial transcript and final transcript.
question: What latency metrics and model parameters are needed to specify encoder-decoder speech serving on an edge gateway?
details:
  realistic_solution: The spec needs encoder time, decoder time per token, streaming chunk size, beam width, expected and P95 output length, time to first partial transcript, final transcript latency, and memory footprint. Encoder cost affects startup latency; decoder cost and beam width dominate long outputs.
  common_mistake: |
    **The Pitfall:** Using average utterance length alone to spec latency.
    **The Rationale:** Candidates miss the difference between first-partial latency (encoder bounded) and long-tail decode cost (decoder bounded).
    **The Consequence:** The deployed gateway consistently violates SLAs on longer or more complex utterances.
  napkin_math: |
    1. Assumptions & Constraints:
       - Example Encoder time: 40 ms
       - Example Decoder time: 8 ms/token
       - Transcript length: 20 tokens
    2. Calculations:
       - Total transcript cost = 40 ms + (20 * 8 ms) = 200 ms
    3. Conclusion & Interpretation:
       - **Result: Decoder-Bound long-tail. The 200 ms total ignores streaming chunk size and beam width costs that dominate decoding.**
