title: Architecting Sequence Models for Hailo-8 Dataflow
scenario: Your team is deploying a real-time sequence prediction model on an edge sensor powered by a dataflow accelerator. The accelerator possesses no local DRAM, meaning all model weights and KV caches must stream from the host processor's memory over PCIe.
question: Which sequence model architecture—encoder-only, decoder-only, or hybrid—best fits a host-streamed accelerator providing 26 TOPS of INT8 compute at 2.5W, and why?
details:
  realistic_solution: The optimal design uses an encoder-only model or a heavy encoder with a very lightweight decoder. The encoder processes the input sequence in one pass, so its weights and intermediate state are streamed once. A decoder-only autoregressive model repeatedly streams decoder weights and a growing KV cache for every generated token, which makes host-interface traffic dominate even when the INT8 compute budget looks large. A hybrid is acceptable only if the decoder is small enough that per-token streaming remains bounded.
  common_mistake: |
    **The Pitfall:** Proposing a standard decoder-only architecture like a small LLM.
    **The Rationale:** Candidates focus entirely on the 26 TOPS compute metric and fail to recognize that autoregressive decoding on a chip with no local DRAM requires streaming the entire model's weights from the host for every single generated token.
    **The Consequence:** The dataflow accelerator is completely bottlenecked by PCIe transfers, resulting in severe latency and abysmal throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decoder-only model size: 100M INT8 parameters = 100 MB streamed per generated token.
    - Hybrid model: 90 MB encoder streamed once, 10 MB decoder streamed per generated token.
    - Output length: 50 generated tokens.
    - Average KV-cache traffic: 5 MB per token for decoder-only, 0.5 MB per token for the lightweight hybrid decoder.
    - Host-interface bandwidth: 33.3 GB/s.

    **Calculations:**
    - Decoder-only traffic: 50 * (100 MB weights + 5 MB KV) = 5,250 MB.
    - Decoder-only streaming time: 5,250 MB / 33,300 MB/s = 158 ms.
    - Hybrid traffic: 90 MB encoder + 50 * (10 MB decoder + 0.5 MB KV) = 615 MB.
    - Hybrid streaming time: 615 MB / 33,300 MB/s = 18.5 ms.
    - Compute is not the deciding term unless the per-token GOP count is large enough to exceed these transfer times.

    **Conclusion & Interpretation:**
    - **Result: About 18.5 ms for the hybrid versus 158 ms for decoder-only (I/O-Bound).** Encoder-heavy or encoder-only designs minimize repeated host streaming and KV-cache growth.
