title: T4 LLM Decode Batching Tradeoff
scenario: Deploying a 7B parameter LLM on an edge server with a single T4 GPU. The system must serve requests at minimum latency.
question: What is the latency and throughput tradeoff between batch size 1 and batch size 8 for autoregressive decoding on the T4?
details:
  realistic_solution: Batch size 1 minimizes per-request latency because each decode step advances one sequence with the smallest KV-cache, compute, and scheduling work. Batch size 8 can improve aggregate tokens/sec by sharing each weight pass across eight active sequences and using the GPU more efficiently, but it does not give free 8x throughput or flat latency. Each request now waits for a larger batched decode step with more KV-cache traffic, more matrix work, and queueing. On a latency-sensitive T4 edge server, use batch 1 or a small dynamic batch for strict minimum latency; use batch 8 only when higher aggregate throughput is worth higher per-request token latency.
  common_mistake: |
    **The Pitfall:** Assuming compute (TFLOPS) is the bottleneck for generation.
    **The Rationale:** Engineers mistakenly analyze the generation phase using the same compute-bound logic as the prompt processing phase.
    **The Consequence:** Fearing latency degradation, they deploy with Batch Size 1 and throw away 8x potential system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 7B parameters.
    - Precision: FP16 (14 GB footprint).
    - Memory bandwidth: 320 GB/s.
    - Exact decode latency also depends on KV-cache size, kernels, sequence lengths, and batching policy.

    **Calculations:**
    - Weight-streaming lower bound per decode step = 14 GB / 320 GB/s = 43.75ms before KV-cache traffic, compute, and kernel overhead.
    - Batch size 1 latency per generated token is at least this lower bound plus one sequence's KV/cache and compute overhead.
    - Batch size 8 can amortize the weight pass across up to 8 output tokens, giving an optimistic upper bound of 8 / 43.75ms = ~183 tokens/s aggregate if weight bandwidth were the only cost.
    - Real batch size 8 throughput is lower than that bound, and per-request token latency is higher than batch size 1 because the batched step includes 8 sequences' KV traffic and compute.

    **Conclusion & Interpretation:**
    - **Result: Throughput/latency tradeoff, not free 8x scaling.** Batching can raise aggregate decode throughput by amortizing weight bandwidth and improving GPU utilization, but it increases per-request latency and is bounded by KV traffic, compute, and scheduling overhead.
