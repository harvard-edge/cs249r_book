title: Compile Shared-Backbone Two-Head MobileNetV3 for Hailo-8 Inference
scenario: You need to run MobileNetV3-Large shared backbone with two task heads (classification + detection) on Hailo-8. The backbone is 0.18 GFLOPs, classification head 0.04 GFLOPs, detection head 0.12 GFLOPs.
question: How would you compile the two-head MobileNetV3 model on Hailo-8 so the 0.18 GFLOP backbone runs only once?
details:
  realistic_solution: Export and compile one multi-output network, not two independent models. Keep the MobileNetV3 backbone and both task heads in a single ONNX graph with two named outputs, then run the Hailo parser/compiler on that full graph so the branch point is represented once in the compiled HEF. Validate the compiled graph and runtime behavior with Hailo tools such as the model parse/optimization reports, Hailo profiler/runtime statistics, and measured end-to-end latency. If a head uses unsupported operators, replace or move only that head's post-processing outside the HEF; do not split the shared backbone into two separate HEFs unless you accept running it twice.
  common_mistake: |
    **The Pitfall:** Compiling two separate HEF files and running backbone inference twice (once per task).
    **The Rationale:** Engineers often treat multi-task models as completely independent networks when deploying to hardware accelerators.
    **The Consequence:** This completely doubles the compute and latency for the shared prefix, wasting throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target frame rate: 30 FPS.
    - Backbone compute: 0.18 GFLOPs.
    - Classification compute: 0.04 GFLOPs.
    - Detection compute: 0.12 GFLOPs.

    **Calculations:**
    - Shared per-frame compute: 0.18 + 0.04 + 0.12 = 0.34 GFLOPs/frame.
    - Shared per-second work at 30 FPS: 0.34 * 30 = 10.2 GFLOP/s.
    - Unshared per-frame compute: (0.18 + 0.04) + (0.18 + 0.12) = 0.52 GFLOPs/frame.
    - Unshared per-second work at 30 FPS: 0.52 * 30 = 15.6 GFLOP/s.
    - Avoided work: 0.52 - 0.34 = 0.18 GFLOPs/frame, a 0.18 / 0.52 = 34.6% reduction versus running two separate backbone paths.

    **Conclusion & Interpretation:**
    - **Result: 34.6% Less Per-Frame Compute Than Two Separate Models**. A single compiled two-output graph runs the shared backbone once and branches to both heads; separate HEFs would duplicate the 0.18 GFLOP backbone.
