title: LoRA Adapter Merge for Memory-Constrained Inference
scenario: An edge device with 4GB RAM is running a 3B parameter INT4 model (1.5GB) with a LoRA r=64 adapter (190MB). The combined footprint causes allocation failures at runtime.
question: Why is the 3B INT4 model with an r=64 LoRA adapter failing on 4GB RAM, and how would you fix it without degrading accuracy?
details:
  realistic_solution: |
    The failure is likely peak runtime memory, not just stored weights: the 1.5GB INT4 base, 190MB adapter, activations, runtime workspace, OS, and temporary dequantization/merge buffers leave too little contiguous headroom on a 4GB device. To avoid degrading accuracy, merge the trained LoRA adapter into the base model offline in the build pipeline, quantize/calibrate the merged artifact, and deploy a single validated model image. If hot-swap adapters are required, retrain or fine-tune a lower-rank adapter and validate accuracy; do not assume post-hoc SVD truncation is lossless.
  common_mistake: |
    **The Pitfall:** Truncating the adapter with SVD and calling it accuracy-preserving.
    **The Rationale:** Engineers equate retained singular-value energy with task accuracy, even though low-energy directions can matter for the adapted behavior.
    **The Consequence:** The model may fit in memory but silently lose the domain-specific accuracy the adapter was trained to provide.
  napkin_math: |
    **Assumptions & Constraints:**
    - RAM: 4GB.
    - LoRA r=64 Memory: 190MB.
    - INT4 Base Weights: 1500MB.
    - OS/runtime/workspace/activations: about 2100MB.

    **Calculations:**
    - Current steady footprint: 1500MB base + 190MB adapter + 2100MB overhead = 3790MB.
    - Nominal remaining RAM: 4096MB - 3790MB = 306MB.
    - A runtime merge/dequantization buffer or allocator fragmentation can exceed the 306MB margin and fail allocation.
    - Offline merged deployment removes the separate adapter and runtime merge buffer: 1500MB base+merged weights + 2100MB overhead = 3600MB.
    - New nominal margin: 4096MB - 3600MB = 496MB.
    - The offline merge must be performed once in the build pipeline, then accuracy and quantization calibration must be validated before deployment.

    **Conclusion & Interpretation:**
    - **Result: lower peak runtime memory pressure (Memory-Bound).** Offline merge deploys the trained adapter behavior as one validated artifact; any lower-rank replacement must be retrained and revalidated before it can be considered accuracy-preserving.
