title: Dataflow Accelerator CNN Architecture Evaluation
scenario: You are evaluating two CNN architectures for real-time video analytics on a Hailo-8 dataflow accelerator. Architecture A uses depthwise separable convolutions to minimize FLOPs. Architecture B uses standard grouped convolutions, resulting in 40% more theoretical FLOPs but different memory access patterns and better data reuse in a compiled on-chip dataflow graph.
question: Which CNN architecture should you choose for Hailo-8, and how would you evaluate actual on-device performance beyond FLOP count?
details:
  realistic_solution: Architecture B is likely superior for this target, but it must be confirmed with the Hailo compiler and device profiling rather than FLOP count alone. Depthwise convolutions often have low arithmetic intensity and poor data reuse, so they can underutilize a dataflow accelerator even with fewer operations. Grouped convolutions increase reuse and may map better to the Hailo-8 fabric, producing lower latency despite higher theoretical FLOPs. Evaluate compiled graph placement, on-chip buffer pressure, achieved utilization, and measured layer latency on representative inputs.
  common_mistake: |
    **The Pitfall:** Equating lower theoretical FLOPs strictly with lower latency.
    **The Rationale:** Candidates ignore arithmetic intensity and the host-memory bandwidth bottleneck of streaming accelerators.
    **The Consequence:** Deploying memory-bound depthwise models that cripple performance on dataflow hardware.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: Hailo-8 dataflow accelerator with compiler-managed on-chip buffering.
       - Hypothetical external-memory bandwidth limit for poorly placed tensors: 4 GB/s.
       - Depthwise Convolution AI: ~9 Ops/Byte.
       - Grouped Convolution AI: ~500 Ops/Byte.
    **Calculations:**
       - Depthwise bandwidth-limited throughput: 4 GB/s * 9 Ops/Byte = 36 GOPS.
       - Grouped bandwidth-limited throughput: 4 GB/s * 500 Ops/Byte = 2000 GOPS = 2 TOPS.
       - 2000 / 36 = ~55x higher bandwidth-limited throughput, but still below a 26 TOPS compute peak.
    **Conclusion & Interpretation:**
       - **Result: grouped convolutions have far better bandwidth-limited utilization.** The 55x ratio is a roofline utilization signal, not a guaranteed end-to-end speedup; the final choice should be based on compiled Hailo-8 latency and dataflow fit.
