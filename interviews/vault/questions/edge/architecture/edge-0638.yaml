title: The Autonomous Vision Unification Dilemma
scenario: You are the new Principal Engineer for the 'Perception v5' team at a leading autonomous vehicle company. The current v4 system uses a dozen specialized CNNs for tasks like pedestrian detection, lane finding, and sign recognition.
question: How would you make a 2B-parameter ViT replacement for the v4 CNN stack fit the 33ms edge latency budget?
details:
  realistic_solution: The correct approach is a multi-stage architectural redesign that attacks the computational complexity at its source, demonstrating a grasp of architectural trade-offs beyond simple optimization.
  common_mistake: |
    **The Pitfall:** Proposing only incremental optimizations like vanilla quantization or unstructured pruning.
    **The Rationale:** Candidates fail to realize the sheer magnitude of the performance gap (15x) requires a holistic architectural redesign, not just standard optimizations.
    **The Consequence:** The ViT implementation will still massively miss the real-time 33ms budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2B-parameter ViT = 2GB (INT8).
       - Orin Memory Bandwidth = 204.8 GB/s.
       - 8 cameras at 640x480 = 2.45MP, 16x16 patches -> N = 9600.
       - Target latency budget = 33ms.
    2. **Calculations:**
       - Weight footprint alone is 2GB, before activations, KV tensors, image buffers, runtime workspace, or redundancy for safety.
       - If weights were streamed once per inference, the lower bound is 2GB / 204.8 GB/s = 9.8ms. Real execution also needs activation traffic and compute, so this is not the full latency.
       - Token count is also too high for naive global attention: N = 9600 gives N^2 = 92.2M attention scores per layer. Efficient attention kernels tile these scores rather than materializing all heads and layers as separate DRAM matrices, but the quadratic score/value work still dominates.
       - To fit 33ms, the design must reduce both parameters and tokens: for example, distill/quantize the backbone below the 16GB memory envelope, use local/windowed attention, reduce tokens with CNN or patch-merging stems, and run global fusion only on compact BEV or ROI tokens.
    3. **Conclusion & Interpretation:**
       - **Result: A naive 2B global-attention ViT is not a physically plausible 33ms edge replacement.** The path is architectural compression and token reduction, not a precise latency estimate from materialized attention matrices.
