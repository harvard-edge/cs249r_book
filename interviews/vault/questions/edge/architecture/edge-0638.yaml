title: The Autonomous Vision Unification Dilemma
scenario: You are the new Principal Engineer for the 'Perception v5' team at a leading autonomous vehicle company. The current v4 system uses a dozen specialized CNNs for tasks like pedestrian detection, lane finding, and sign recognition. The proposed unified model ingests 8 camera streams at 640x480 using 16x16 visual patches.
question: How would you make a 2B-parameter ViT replacement for the v4 CNN stack fit the 33ms edge latency budget?
details:
  realistic_solution: |
    Do not deploy the naive 2B global-attention ViT as a direct replacement. Make it an edge-suitable perception architecture: keep a compact shared CNN or hierarchical visual stem per camera, reduce tokens with patch merging before attention, use local/windowed attention for per-camera processing, and fuse cameras only after projecting into compact BEV or ROI tokens. Distill from the 2B teacher into a much smaller student and quantize only after the token and architecture changes are in place.

    The target design should reserve the 33ms path for obstacle, lane, sign, and free-space outputs, with any large-language or global scene reasoning run at lower rate or off the safety-critical path. The proof is measured end-to-end latency and power on the edge runtime, not just showing the 2GB weights fit in memory.
  common_mistake: |
    **The Pitfall:** Proposing only incremental optimizations like vanilla quantization or unstructured pruning.
    **The Rationale:** Candidates fail to realize the sheer magnitude of the performance gap (15x) requires a holistic architectural redesign, not just standard optimizations.
    **The Consequence:** The ViT implementation will still massively miss the real-time 33ms budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B-parameter ViT quantized to INT8: about 2GB of weights.
    - Orin memory bandwidth: 204.8 GB/s.
    - 8 cameras at 640x480 with 16x16 patches.
    - Target latency budget: 33ms.

    **Calculations:**
    - Patches per camera = (640 / 16) * (480 / 16) = 40 * 30 = 1,200.
    - Total naive tokens = 1,200 * 8 cameras = 9,600.
    - Global attention score count per layer scales as N^2 = 9,600^2 = 92.2M token pairs before heads, value mixing, MLPs, and activation traffic.
    - Weight footprint alone is 2GB, before activations, KV tensors, image buffers, runtime workspace, or safety redundancy.
    - If weights were streamed once per inference, the memory lower bound is 2GB / 204.8 GB/s = 9.8ms; real execution also needs compute and repeated activation traffic, so memory capacity alone does not prove 33ms feasibility.
    - Reducing tokens 4x through stems, patch merging, or ROIs cuts global attention pairs about 16x; using local attention and compact BEV fusion avoids full 9,600-token global attention.

    **Conclusion & Interpretation:**
    - **Result: a naive 2B global-attention ViT is not a plausible 33ms edge replacement.** Fit the budget by distilling to a smaller student, reducing tokens before attention, using local/windowed per-camera processing, and fusing only compact BEV or ROI tokens on the safety path.
