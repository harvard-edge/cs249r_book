title: The Sealed Oven Trap
scenario: Your outdoor perception system works perfectly in the lab but shuts down after 10 minutes of operation in the field during a summer day. You added a fan inside the case, but it didn't help.
question: Based on the thermal diagram, what is the physical flaw in your cooling strategy?
details:
  realistic_solution: 'You have a **Thermal Discontinuity**. The trapped air gap between the SoC and the enclosure wall acts as an insulator. The fix is a **Direct Thermal Path**: use a copper heat pipe or a thick thermal block to connect the SoC heatsink directly to the aluminum enclosure wall. The enclosure becomes the heatsink. Combined with a white solar shield to reduce solar load, the junction temperature can be kept below the throttle threshold.'
  common_mistake: |
    **The Pitfall:** Adding a fan inside a sealed IP67 enclosure.
    **The Rationale:** Software engineers intuitively treat fans as a universal solution for heat, ignoring that sealed systems lack an airflow path for heat exchange.
    **The Consequence:** The fan merely circulates hot air internally, leading to thermal throttling and hardware failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power: 25W. Air-gap thermal resistance: 5°C/W. Direct thermal path resistance: 1°C/W.
    2. **Calculations:**
       - With air gap: ΔT = 25W * 5°C/W = 125°C rise.
       - With direct path: ΔT = 25W * 1°C/W = 25°C rise.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Discontinuity.** The trapped air gap causes a fatal 125°C rise. A direct thermal block drops this by 100°C, saving the system.
