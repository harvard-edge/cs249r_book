title: The Attention Bandwidth Bottleneck
scenario: To fix the previous ViT latency issue, your team deploys a hybrid CNN-Transformer requiring
  only 15 GFLOPs per frame. The edge SoC is rated for 1 TOPS (1000 GFLOPs/s), so theoretically compute
  should take 15ms, easily meeting the 33ms deadline. However, on-device profiling reveals inference takes
  45ms, and ALU utilization plummets to 12% specifically during the Multi-Head Attention (MHA) layers.
question: Why is the SoC's compute drastically underutilized during the MHA layers, causing a deadline
  miss despite the low total FLOP count?
details:
  realistic_solution: Multi-Head Attention operations exhibit exceptionally low Arithmetic Intensity,
    requiring massive data transfers of Key and Value tensors relative to the number of mathematical operations
    performed. Because edge SoCs have severely constrained memory bandwidth, the ALUs sit idle waiting
    for data to arrive from DRAM. Consequently, the MHA layer's execution time is heavily bounded by memory
    access speeds rather than theoretical compute limits, causing the overall latency to exceed the real-time
    deadline.
  common_mistake: '**The Pitfall:** Attempting to solve the latency issue by applying magnitude pruning
    to reduce the MHA layer''s FLOP count.

    **The Rationale:** Engineers often assume that execution time is strictly proportional to computational
    complexity ($O(N^2)$ FLOPs), believing that fewer operations will linearly decrease latency.

    **The Consequence:** The team spends weeks pruning the network without seeing meaningful latency improvements,
    because reducing compute operations does not reduce the fundamental DRAM bandwidth bottleneck required
    to load the attention matrices.'
  napkin_math: '**Assumptions & Constraints:** The edge SoC has 1 TOPS compute capacity and 15 GB/s memory
    bandwidth. An MHA layer requires loading a 15 MB Key/Value cache from DRAM to perform 15 MFLOPs of
    calculation.


    **Calculations:** Time spent computing assuming 100% utilization: 15 MFLOPs / 1 TOPS = 0.015 ms. Time
    spent transferring data: 15 MB / 15 GB/s = 1.0 ms. The ratio of memory transfer time to compute time
    is roughly 66:1.


    **Conclusion:** Execution is entirely dominated by memory bandwidth (1.0ms) rather than compute capability
    (0.015ms), resulting in severe ALU starvation (~1.5% theoretical utilization locally) and explaining
    the massive discrepancy between expected FLOP-based latency and actual profiled latency.'
