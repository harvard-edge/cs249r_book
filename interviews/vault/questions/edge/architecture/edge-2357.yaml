title: PagedAttention Block Size Fragmentation
scenario: An edge deployment of Llama-2-7B on a Jetson AGX Orin uses PagedAttention. The iGPU MMU has ~512 TLB entries and lacks large-page support for the unified-memory carveout. The system runs 32 concurrent sessions averaging 1024 tokens each. The architect is comparing 16-token vs 256-token blocks.
question: Starting from the fragmentation comparison shown, explain why the fragmentation argument inverts on this iGPU once you account for block-table entries, and recommend a block size.
visual:
  kind: svg
  path: edge-2357.svg
  alt: Bar chart showing high internal fragmentation for 256-token blocks compared to 16-token blocks.
  caption: KV Cache Internal Fragmentation Ratio.
details:
  realistic_solution: 16-token blocks generate 16x more block-table entries per sequence. For a 32-session, 1024-token workload, a 16-block size requires 2048 block-table entries that the attention kernel must dereference per launch, which thrashes the Orin iGPU's ~512 entry TLB and adds ~5-15% kernel-launch overhead. While 16-token blocks align with HBM burst requirements, the page-walk cost multiplies. Selecting a block size of 64-128 tokens optimally balances internal fragmentation with TLB capacity.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on internal fragmentation ratios.
    **The Rationale:** Candidates look only at wasted KV slots (like CPU RAM fragmentation) but ignore MMU capabilities.
    **The Consequence:** Thrashing the small TLB on the iGPU, creating massive memory latency that negates any capacity savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Concurrent sessions: 32.
    - Average tokens per session: 1024.
    - TLB entries available: ~512.

    **Calculations:**
    - 16-token blocks: 1024 / 16 = 64 blocks/session. 64 * 32 sessions = 2048 page table entries.
    - 256-token blocks: 1024 / 256 = 4 blocks/session. 4 * 32 sessions = 128 page table entries.

    **Conclusion & Interpretation:**
    - **Result: 64-128 tokens block size (TLB Thrashing-Bound)**. 2048 entries guarantees severe TLB thrashing on a 512-entry MMU. A block size of 64-128 balances fragmentation while staying safely within TLB limits.
