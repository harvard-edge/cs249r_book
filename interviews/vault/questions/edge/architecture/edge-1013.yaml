title: 'Optimize EfficientNet-Lite for Jetson Orin with TensorRT and INT8 calibration'
scenario: 'You are deploying EfficientNet-Lite0 (4.7M params, 0.35 GFLOPs) on Jetson Orin (275 TOPS, 60W) for a real-time anomaly detection system at 60 FPS. The TF-Lite baseline achieves 45 FPS. Using TensorRT INT8 on Jetson Orin''s Ampere GPU, optimization aims to achieve 60 FPS while keeping average power below 15W.'
question: 'What is the actual GPU utilization for the 21 GFLOPs workload on a 69 TFLOPS Orin profile, and why is 30% wrong?'
details:
  realistic_solution: 'Utilization = 21 GFLOPs / 69 TFLOPs = 21G/69T = 0.03% (not 30%). The error confuses GFLOPS with TFLOPS units.'
  common_mistake: |
    **The Pitfall:** Running TensorRT optimization in MAXN power mode (60W) during calibration.
    **The Rationale:** Engineers default to peak performance profiles, forgetting the strict 15W power budget requires using Jetson's nvpmodel to set the correct profile.
    **The Consequence:** Exceeding the power budget during deployment and failing system constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware peak: 69 TFLOPS.
    - Actual workload: 21 GFLOPs.

    **Calculations:**
    - GPU utilization = actual FLOPs / peak FLOPs.
    - Utilization = 21 $\times$ 10^9 / (69 $\times$ 10^12) = 3.04 $\times$ 10^-4.

    **Conclusion & Interpretation:**
    - **Result: 0.03% (Compute-Bound)**. Confusing GFLOPs with TFLOPs leads to dramatically misestimating actual hardware utilization.
