title: Optimize EfficientNet-Lite for Jetson Orin with TensorRT and INT8 calibration
scenario: You are reviewing a Jetson Orin sizing note for an EfficientNet-Lite0 anomaly detector. The model workload at 60 FPS is 21 GFLOPs/sec, and the selected Orin power profile advertises 69 TFLOPS peak GPU throughput. A junior engineer reports that the detector uses about 30% of the GPU.
question: What is the actual GPU utilization for the 21 GFLOPs workload on a 69 TFLOPS Orin profile, and why is 30% wrong?
details:
  realistic_solution: Utilization = 21 GFLOPs / 69 TFLOPs = 21G/69T = 0.03% (not 30%). The error confuses GFLOPS with TFLOPS units.
  common_mistake: |
    **The Pitfall:** Dividing 21 by 69 and treating GFLOPs and TFLOPS as the same unit.
    **The Rationale:** Engineers sometimes compare the numeric prefixes directly and forget that 1 TFLOP/s equals 1000 GFLOP/s.
    **The Consequence:** The utilization estimate is inflated by 1000x, leading the team to chase nonexistent GPU saturation instead of profiling latency, memory, and power bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware peak: 69 TFLOPS.
    - Actual workload: 21 GFLOPs.

    **Calculations:**
    - GPU utilization = actual FLOPs / peak FLOPs.
    - Utilization = 21 $\times$ 10^9 / (69 $\times$ 10^12) = 3.04 $\times$ 10^-4.

    **Conclusion & Interpretation:**
    - **Result: 0.03% (Compute-Bound)**. Confusing GFLOPs with TFLOPs leads to dramatically misestimating actual hardware utilization.
