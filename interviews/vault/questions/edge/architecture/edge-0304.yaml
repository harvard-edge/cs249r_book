title: 'The Vision Transformer Quadratic Burden'
scenario: 'You are designing a real-time object detection system for an autonomous vehicle edge computer, like a Jetson AGX Orin. You are comparing a small Vision Transformer (ViT) against a classic CNN like MobileNet.'
question: 'For a fixed input image size, what is the fundamental scaling reason that the ViT self-attention layers are often computationally prohibitive on such devices?'
details:
  realistic_solution: 'The computational complexity of standard self-attention is quadratic, O(N²), with respect to the number of input patches (N). For a CNN, the complexity of a convolutional layer is linear, O(H * W), with respect to the number of input pixels. As image resolution increases, the ViT compute cost explodes quadratically.'
  common_mistake: 'Focusing only on parameter count or memory, rather than the computational complexity (FLOPs). A small ViT can have fewer parameters than a large CNN, but its compute scales much more poorly with image resolution.'
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN scales linearly O(H*W). ViT scales quadratically O(N^2).
    - Base resolution: 224x224 (196 patches).
    - Target resolution: 448x448 (784 patches).

    **Calculations:**
    - Base ViT complexity: 196^2 = 38,416.
    - High-res ViT complexity: 784^2 = 614,656.
    - ViT compute increase: 614,656 / 38,416 = 16x.
    - CNN compute increase: 448^2 / 224^2 = 4x.

    **Conclusion & Interpretation:**
    - **Result: 16x Compute Increase (Compute-Bound)**. ViT self-attention severely penalizes high-resolution edge perception systems.
  options:
    - 'Vision Transformers always have more parameters than CNNs.'
    - 'The self-attention mechanism computational cost scales quadratically with the input sequence length.'
    - 'Edge NPUs lack the hardware to efficiently perform the matrix multiplications required by Transformers.'
    - 'The activation memory required by the Key-Value cache in Transformers is too large for the SRAM on edge devices.'
