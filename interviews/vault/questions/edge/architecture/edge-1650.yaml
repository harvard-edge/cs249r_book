title: Dataflow Optimization for Sequenced Output
scenario: You are deploying a sequence-to-sequence model for real-time sensor telemetry parsing on a dataflow accelerator. Because it has no local DRAM, all weights and intermediate activations must stream continuously from the host via PCIe.
question: Which sequence model architecture and host-device streaming strategy would maximize throughput on the DRAM-less dataflow accelerator?
details:
  realistic_solution: The optimal design is a heavily quantized, encoder-only architecture with a non-autoregressive prediction head (such as CTC or a parallel sequence decoder). Because the Hailo-8 excels at continuous dataflow through a fixed graph, an encoder-only approach allows the weights to be streamed and pinned to the compute units once per input sequence. This single-pass execution eliminates the iterative weight-reloading penalty of autoregressive decoding, fully utilizing the device's compute pipeline.
  common_mistake: |
    **The Pitfall:** Deploying standard autoregressive decoder models on a DRAM-less accelerator.
    **The Rationale:** Candidates rely on task familiarity with LLMs, ignoring the severe memory bandwidth penalty of decoding token-by-token.
    **The Consequence:** Re-streaming the entire weight matrix over PCIe for every single token causes catastrophic PCIe bottlenecking and >99% compute starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 100MB INT8. PCIe Gen3 x4 bandwidth: ~4 GB/s. Compute: 26 TOPS.
    2. **Calculations:**
       - Autoregressive Max Token Rate: 4 GB/s / 100 MB/token = 40 tokens/sec.
       - Compute capability: 26 TOPS allows >100,000 tokens/sec.
       - Utilization: 40 / 100,000 = <0.1% active compute.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Bottleneck.** Switching to an encoder-only (single-pass) architecture streams the 100MB weights once per sequence, dramatically increasing effective token throughput.
