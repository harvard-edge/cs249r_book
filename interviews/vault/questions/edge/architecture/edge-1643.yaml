title: Heterogeneous CNN Design for Jetson Orin
scenario: 'Your team is building a high-speed robotics perception system deploying on an NVIDIA Jetson Orin. You need to process 4 high-resolution 4K camera streams at 60 FPS for real-time obstacle avoidance. The Orin features both an Ampere GPU and specialized Deep Learning Accelerators (DLA).'
question: 'What CNN architecture would you design to map 4K 60 FPS perception across Orin''s GPU and DLA while maximizing INT8 throughput within 60W?'
details:
  realistic_solution: 'Design a bifurcated architecture. Use standard 3x3 dense convolutions for early, high-resolution feature extraction to run efficiently on the DLA. Route the lower-resolution, complex semantic heads to the flexible Ampere GPU. Ensure channel counts are multiples of 32 to maximize Tensor Core utilization.'
  common_mistake: |
    **The Pitfall:** Using uniform, generic architectures.
    **The Rationale:** Candidates design a uniform architecture like MobileNetV3 and try to run it entirely on the GPU, ignoring the DLA.
    **The Consequence:** Relying on ops like Swish causes poor utilization on the fixed-function DLA, leading to pipeline stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras at 60 FPS = 240 frames/sec.
    - Model requires 50 GOPS/frame.
    - Jetson LPDDR5 bandwidth is limited.

    **Calculations:**
    - Compute load = 240 * 50 GOPS = 12 TOPS (fits within 275 TOPS).
    - Memory for 4K inputs = ~6 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~6 GB/s (Memory-Bandwidth-Bound)**. The architecture must fuse consecutive convolution layers in local DLA SRAM to reduce DRAM roundtrips.
