title: Edge TPU Model Quantization and Footprint Optimization
scenario: Your team is porting a custom MobileNetV2-based object detection model to run on a Google Coral Edge TPU via a USB accelerator. Your initial compilation attempt fails because unsupported operations are falling back to the host CPU, causing severe latency spikes.
question: How would you diagnose Edge TPU CPU fallbacks in the MobileNetV2 graph and verify the fully INT8 model fits and runs efficiently?
details:
  realistic_solution: Use the Edge TPU compiler logs and partition report to identify unsupported operators and CPU fallback boundaries, then inspect the runtime delegate profile for host/device crossings over USB. Replace or lower unsupported activations such as HardSwish to Edge TPU-supported INT8 operators, recalibrate or retrain as needed, and verify that the compiled graph delegates the expected ops. Parameter and activation footprint estimates are useful screening checks, but they do not prove full on-TPU residency or efficient execution without the compiler and profiling evidence.
  common_mistake: |
    **The Pitfall:** Assuming post-training INT8 quantization automatically guarantees Edge TPU compilation.
    **The Rationale:** Candidates conflate datatype precision (INT8) with operator support (e.g., missing that custom activations force graph breaks).
    **The Consequence:** Graph partitioning occurs, resulting in catastrophic I/O latency as intermediate tensors thrash across the USB bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FP32 parameters: 3.4M
    - Peak activation tensor: 112x112x32
    - Precision: Fully INT8 quantized

    **Calculations:**
    - INT8 Weights: 3.4M * 1 byte = 3.4 MB
    - Peak INT8 Activation: 112 * 112 * 32 * 1 byte = 401,408 bytes = ~0.39 MB
    - Simple footprint screen: 3.4 MB weights + 0.39 MB peak activation = ~3.8 MB.
    - Deployment verification still requires the compiler partition report, supported-op coverage, and runtime profiling of host/device boundaries.

    **Conclusion & Interpretation:**
    - **Result: ~3.8 MB footprint estimate (Compilation/Partition Bound)**. The small INT8 footprint is necessary but not sufficient; efficient execution is verified only when the compiler places the graph on the Edge TPU without unexpected CPU partitions and profiling shows no fallback transfers.
