title: Recall MobileNet depthwise separable FLOP savings on Jetson Orin
scenario: You are onboarding an edge ML engineer to the Jetson Orin platform. They ask why MobileNet architectures are preferred over ResNets for edge vision tasks.
question: Why are MobileNet architectures preferred over ResNets for edge vision on Jetson Orin, and how do depthwise separable convolutions help?
details:
  realistic_solution: 'Depthwise separable convs reduce FLOPs by ~8-9x versus standard convs. On the Jetson Orin Ampere GPU, standard convolutions map to efficient dense matmuls on Tensor Cores, while depthwise operations map to scalar CUDA cores. The net result is a practical ~4-5x speedup and significant power reduction due to lower overall GPU utilization time.'
  common_mistake: |
    **The Pitfall:** Assuming FLOP reduction scales linearly into power and latency reduction.
    **The Rationale:** Candidates do the math for an 8x reduction in operations and assume the device will run 8x faster.
    **The Consequence:** They ignore hardware architecture constraints—specifically that Jetson Tensor Cores favor dense standard convolutions, meaning depthwise operations execute at lower efficiency on generic CUDA cores, muting the theoretical gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Matrix Units: Accelerated for dense standard convolutions (e.g., ResNet)
       - MobileNetV3 Compute: 0.22 GOPS (Sparse Depthwise)
       - ResNet-50 Compute: 4.1 GOPS (Dense Standard)
    2. **Calculations:**
       - Theoretical FLOP Gap: 4.1 / 0.22 ≈ 18.6x
       - Practical Hardware Latency Gap: MobileNet (~4ms) vs ResNet (~20ms) = 5x
    3. **Conclusion & Interpretation:**
       - **Result: Architecture-Bound.** While MobileNet mathematically removes ~18x operations, the target hardware fails to densely pack depthwise operations across its matrix multiply units, yielding only a 5x practical speedup.
