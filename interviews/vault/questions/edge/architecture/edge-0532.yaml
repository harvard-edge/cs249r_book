title: 'The Tracker Addition Budget'
scenario: 'Your perception stack runs YOLOv8-S detection at 20ms per frame on a Jetson Orin NX, leaving 13ms of headroom in your 33ms budget. Your team wants to add a Transformer-based tracker (ByteTrack with a ReID model, ~15 GFLOPs). The ReID model alone takes 12ms.'
question: 'Why is the estimate 20ms + 12ms = 32ms dangerously wrong for fitting within the 33ms budget?'
details:
  realistic_solution: 'The 20ms + 12ms = 32ms estimate ignores: (1) **GPU memory contention** — both models compete for the same LPDDR5 bandwidth. When running concurrently, memory bandwidth is split, increasing compute latency by 15% (+4.8ms). (2) **CUDA context switching** — swapping between two TensorRT engines incurs ~1-2ms of overhead per switch. (3) **NMS and post-processing** — detection NMS takes ~3ms on dense scenes (not included in the 20ms). (4) **Data transfer** — copying detection crops to the ReID model''s input tensor takes ~0.5ms. Realistic total: 20ms (detect) + 12ms (ReID) + 4.8ms (contention) + 3ms (NMS) + 0.5ms (copy) + 2ms (context switch) = **42.3ms** → 23 FPS, missing the 30 FPS deadline. Fix: use a lightweight tracker (DeepSORT with a MobileNet ReID: 2 GFLOPs, ~3ms) or run the ReID model at half rate (every other frame, using motion prediction to interpolate).'
  common_mistake: |
    **The Pitfall:** Assuming zero overhead and perfect sequential execution.
    **The Rationale:** Candidates simply add the isolated inference times together, ignoring the hidden costs of memory contention, context switching, and data movement on a shared system-on-chip.
    **The Consequence:** Deploying a system that theoretically fits the budget but consistently misses real-time deadlines in production, causing frame drops and tracking failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base detection: 20ms.
    - Isolated ReID: 12ms.
    - Memory contention penalty (shared LPDDR5): +4.8ms (~15% increase).
    - NMS / Post-processing overhead: +3ms.
    - Memory copy (crops to ReID input): +0.5ms.
    - CUDA context switch between TensorRT engines: +2ms.

    **Calculations:**
    - Realistic Total: 20 + 12 + 4.8 + 3 + 0.5 + 2 = 42.3ms.

    **Conclusion & Interpretation:**
    - **Result: 42.3ms (Compute-Bound)**. 42.3ms completely misses the 33ms (30 FPS) hard deadline, resulting in ~23 FPS.
