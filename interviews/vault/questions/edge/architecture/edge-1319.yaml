title: Encoder vs Decoder on Edge TPU
scenario: We are deploying a low-latency intent classification and entity extraction model for an offline smart home hub. The target hardware is a Google Coral Edge TPU via a USB accelerator. You must choose between an encoder-only model (like a 25M-parameter MobileBERT) and a small decoder-only model (like a 125M-parameter quantized GPT).
question: Should the offline smart home hub use a MobileBERT-style encoder or a small quantized GPT-style decoder on the Coral Edge TPU?
details:
  realistic_solution: The encoder-only architecture is the correct choice. Encoder models run a single forward pass with static sequence lengths, mapping perfectly to the Edge TPU compiler's requirement for fixed-shape, fully supported INT8 operators. Decoder models require autoregressive step-by-step generation, necessitating dynamic memory access (KV cache) and unsupported ops, which triggers CPU fallbacks that break the 2W power budget and ruin latency.
  common_mistake: |
    **The Pitfall:** Choosing the decoder-only model due to recent generative AI trends.
    **The Rationale:** Candidates falsely assume small GPTs can run efficiently anywhere, ignoring the TPU's requirement for static graphs and lack of dynamic KV cache support.
    **The Consequence:** Autoregressive decoding triggers continuous USB/CPU fallbacks, destroying latency and exceeding the 2W power budget.
  napkin_math: |
    **Assumptions & Constraints:**
       - TPU Compute: 4000 GOPS (4 TOPS).
       - Encoder: 25M params, 128 tokens.
       - Decoder: 125M params, dynamic KV cache required.
    **Calculations:**
       - Encoder compute requirement: 2 * 25M params * 128 tokens = 6.4 GOPS.
       - Encoder TPU compute time: 6.4 GOPS / 4000 GOPS = 1.6 ms per inference.
       - Decoder memory operations: Requires distinct auto-regressive passes, forcing dynamic KV caching and CPU fallback via USB.
    **Conclusion & Interpretation:**
       - **Result: Decoder CPU Fallback**. The encoder executes entirely on the TPU in ~1.6ms. The decoder's dynamic graph breaks the compiler constraints, forcing a fatal USB/CPU fallback.
