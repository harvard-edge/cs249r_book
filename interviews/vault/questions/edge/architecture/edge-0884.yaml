title: 'KV Cache Quantization Cast Overhead'
scenario: 'To fit a 3B model onto a mobile NPU (8GB RAM, 50GB/s bandwidth), you quantize the KV cache from FP16 to INT8. Memory usage successfully drops from 3GB to 1.5GB. However, token generation latency regresses drastically, jumping from 30ms/token to 65ms/token.'
question: 'Why does INT8 KV-cache quantization halve memory but raise decode latency to 65ms/token on the mobile NPU, and what would you change?'
details:
  realistic_solution: 'The root cause is the lack of native mixed-precision support for Attention on the NPU, leading to massive dequantization overhead. The continuous casting turns a memory-bound operation into a compute-bound bottleneck. The solution is either to fuse the dequantization step directly into the attention kernel or to keep the KV cache in FP16 and rely on grouped-query attention (GQA).'
  common_mistake: 'Assuming the INT8 memory is simply slower to read than FP16 memory due to alignment issues.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B, 32 layers. KV cache: 2000 tokens (393 MB in INT8).
    - Bandwidth: 50 GB/s. NPU Scalar ALU: 50 GOPS.

    **Calculations:**
    - Read latency: 393 MB / 50 GB/s = ~8 ms.
    - Dequantization math: 393M INT8 values * 4 ops = 1.5 GOPS.
    - Cast latency: 1.5 GOPS / 50 GOPS = 30 ms.
    - Total per-token latency: 30 ms (base) - 8 ms (bandwidth) + 30 ms (cast) = ~52 ms.

    **Conclusion & Interpretation:**
    - **Result: ~52ms per token (Compute-Bound)**. Hardware lacking native mixed-precision shifts the bottleneck from memory to ALU during casting.
  options:
    - 'The root cause is the lack of native mixed-precision support for Attention on the NPU, leading to massive dequantization overhead.'
    - 'Operator fusion primarily reduces compute time by eliminating redundant arithmetic operations between layers.'
    - 'Assuming the INT8 memory is simply slower to read than FP16 memory due to alignment issues.'
    - 'The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.'
