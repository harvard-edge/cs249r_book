title: Federated LoRA Aggregation for Edge Fleet Personalization
scenario: A fleet of industrial edge devices each fine-tune local LoRA adapters on device-specific sensor data. The central server wants to aggregate these into a global adapter without transmitting raw data.
question: How would you design a communication-efficient federated averaging protocol for LoRA?
details:
  realistic_solution: 'To be communication-efficient, transmit only the low-rank B and A matrices (r*d bytes per matrix) rather than the full computed delta_W matrix. The server computes the global product and then factorizes via truncated SVD before returning the updated adapters. Additionally, implement differential privacy by clipping client updates and adding Gaussian noise before upload.'
  common_mistake: |
    **The Pitfall:** Applying standard FedAvg (averaging all model parameters directly) to LoRA adapters without considering the nonlinear composition of the A and B matrices.
    **The Rationale:** Treating adapters as standard weights rather than understanding their low-rank algebraic constraints.
    **The Consequence:** Corrupted global model convergence because averaging A matrices across clients and B matrices separately gives mathematically incorrect updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 devices, rank=8, 32 layers. Q+V matrices (4 mats per layer).
    - Precision: FP16 (2 bytes).
    - Uplink: 10 Mbps (1.25 MB/s).

    **Calculations:**
    - Payload size: 4 matrices * 32 layers * 8 rank * 4096 dim * 2 bytes = 8.39 MB.
    - Upload time: 8.39 MB / 1.25 MB/s = 6.7 seconds (parallel across devices).
    - Server FLOP computation: negligible (1.72 TFLOP = 0.0017s).

    **Conclusion & Interpretation:**
    - **Result: Network-Bound Aggregation**. By transmitting A/B matrices rather than the full delta_W, the payload stays small enough to complete a global synchronization round in under 15 seconds.
