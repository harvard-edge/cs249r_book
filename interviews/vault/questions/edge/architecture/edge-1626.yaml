title: Jetson Orin LLM Memory Footprint
scenario: We are porting a 15 billion parameter language model to an NVIDIA Jetson Orin platform for a robotics application. We will use INT8 quantization for the model weights. The robotic control stack and OS permanently reserve 8 GB of memory.
question: How much memory is required for the 15B INT8 weights, and how much remains for KV cache and activations after the 8 GB reserve on a 32 GB system?
details:
  realistic_solution: 'Correctly map 1 INT8 parameter to 1 byte, calculate the total weight size in gigabytes, and then subtract both the OS reserved memory and the weight memory from the total 32 GB hardware limit to find the remaining capacity.'
  common_mistake: |
    **The Pitfall:** Miscalculating weight sizes or forgetting the unified memory architecture.
    **The Rationale:** Candidates confuse bits and bytes for INT8, or fail to subtract the OS reserved memory from the shared pool.
    **The Consequence:** Grossly overestimating available memory, leading to out-of-memory errors during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 15B parameters, INT8 quantization (1 byte per parameter).
       - Total Memory: 32 GB LPDDR5.
       - OS/Control stack reserve: 8 GB.
    2. **Calculations:**
       - Weight Size: 15 billion parameters * 1 byte = 15 GB.
       - Available Memory Pool: 32 GB - 8 GB = 24 GB.
       - Remaining Memory: 24 GB - 15 GB = 9 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Exactly 9 GB remains for KV cache and activations, capping the maximum context length achievable in real-time operation.
