title: MobileNet vs VGG NPU Bottleneck
scenario: You are porting an image classifier to an Edge NPU with 2 TOPS (INT8) peak compute and 4 GB/s memory bandwidth. A custom VGG-like model has 8 GOPS and requires 12MB of memory traffic per inference. MobileNetV2 has only 0.6 GOPS but requires 30MB of memory traffic due to unfused depthwise layers. Surprisingly, MobileNetV2 yields 133 FPS, while the larger VGG model yields 250 FPS.
question: Why does the lower-GOPS MobileNetV2 run slower than the VGG-like model, and which model should you choose to meet 200+ FPS on the 2 TOPS, 4 GB/s NPU?
details:
  realistic_solution: |
    MobileNetV2 is slower because its unfused depthwise layers move too many bytes for the amount of computation, making it memory-bound despite its low GOPS count. The VGG-like model has much higher arithmetic intensity, so its runtime is set mainly by 8 GOPS of compute: about 4ms on a 2 TOPS NPU. Its 12MB memory traffic takes only about 3ms, so memory does not bottleneck it. To hit 200+ FPS, choose the VGG-like model, or choose MobileNetV2 only after fusing depthwise/pointwise layers enough to reduce bandwidth traffic.
  common_mistake: |
    **The Pitfall:** Assuming fewer MACs/GOPS always means faster inference.
    **The Rationale:** Candidates see that MobileNet has >10x fewer GOPS than VGG and incorrectly assume it will run faster, ignoring memory bandwidth bottlenecks and Roofline analysis.
    **The Consequence:** Trying to prune MobileNet further to improve FPS, which completely fails because the model is entirely memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU limits: 2 TOPS (2,000 GOPS), 4 GB/s bandwidth.
    - VGG: 8 GOPS, 12MB memory traffic.
    - MobileNet: 0.6 GOPS, 30MB memory traffic.

    **Calculations:**
    - NPU Ridge Point: 2,000 GOPS / 4 GB/s = 500 OPS/Byte.
    - MobileNet AI: 0.6 GOPS / 30MB = 20 OPS/Byte.
    - MobileNet compute time: 0.6 GOPS / 2000 GOPS/s = 0.3ms.
    - MobileNet memory time: 30MB / 4 GB/s = 7.5ms, so runtime is ~7.5ms (133 FPS).
    - VGG AI: 8 GOPS / 12MB = 666 OPS/Byte.
    - VGG compute time: 8 GOPS / 2000 GOPS/s = 4.0ms.
    - VGG memory time: 12MB / 4 GB/s = 3.0ms, so runtime is ~4.0ms (250 FPS).

    **Conclusion & Interpretation:**
    - **Result: 250 FPS vs 133 FPS (Compute-Bound vs Memory-Bound)**. VGG meets the 200 FPS requirement because its 4ms compute time dominates its 3ms memory time, while MobileNetV2 is limited by 7.5ms of memory traffic.
