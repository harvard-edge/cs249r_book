title: Edge TPU Inference Bottleneck Analysis
scenario: A 10-million parameter vision model, fully quantized to INT8, is deployed on a USB 2.0 accelerator. During real-world benchmarking, the system achieves a small fraction of expected inference throughput, and compute utilization remains consistently low.
question: Why does the USB 2.0 accelerator show low utilization despite a fully INT8 10-million-parameter model and high peak compute capability?
details:
  realistic_solution: The bottleneck is the I/O transfer rate over the USB interface, not the compute capacity. While the accelerator has high compute density, the input data (activations) and potentially weights must be transferred from the host CPU. USB 2.0 has a theoretical maximum bandwidth of 480 Mbps (60 MB/s), which is severely insufficient for keeping fast compute units fed with data, leading to low utilization.
  common_mistake: |
    **The Pitfall:** Assuming the compute capacity is the primary bottleneck.
    **The Rationale:** Candidates focus on the peak TOPS capability and fail to account for memory bandwidth and I/O limitations of the USB interface.
    **The Consequence:** Wasting time trying to further compress or prune the model instead of addressing the data transfer overhead between the host and accelerator.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Model size (INT8): 10 million parameters = 10 MB.
       * USB 2.0 practical bandwidth: ~40 MB/s.
       * Accelerator peak compute: ~4 TOPS.
    2. **Calculations:**
       * Time to transfer a 10 MB payload over USB: 10 MB / 40 MB/s = 250 milliseconds.
       * Compute time for ~200 MMACs (0.4 GOPS): 0.4 * 10^9 OPS / (4 * 10^12 OPS) = 0.1 milliseconds.
    3. **Conclusion & Interpretation:**
       * **The I/O latency (250 milliseconds) completely dominates the compute time (0.1 milliseconds). Result: I/O Bandwidth-Bound.**
