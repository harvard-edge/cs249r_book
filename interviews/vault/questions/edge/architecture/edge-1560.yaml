title: Depthwise Separable Convolution on Jetson Orin
scenario: You are deploying a high-resolution vision model on an NVIDIA Jetson Orin (275 TOPS INT8, 60W TDP) for real-time robotic navigation. To meet strict latency constraints within the power budget, you propose replacing a standard 3x3 convolution layer with a depthwise separable convolution. The input feature map to this layer has a spatial resolution of 128x128 with 256 channels, and the output requires 256 channels.
question: How many MACs does the standard 3x3 convolution use versus depthwise separable convolution, and what is the reduction factor?
details:
  realistic_solution: |
    A standard 3x3 convolution costs H * W * Cin * Cout * K * K MACs, so this layer uses 128 * 128 * 256 * 256 * 3 * 3 = 9.66 GMACs. A depthwise separable version costs the depthwise 3x3 step plus the pointwise 1x1 step: 128 * 128 * 256 * 3 * 3 = 37.7 MMACs, plus 128 * 128 * 256 * 256 = 1.07 GMACs, for about 1.08 GMACs total. The reduction factor is 9.66 / 1.08 ≈ 8.9x.
  common_mistake: |
    **The Pitfall:** Forgetting to include the pointwise 1x1 convolution cost in the reduction calculation.
    **The Rationale:** Candidates often incorrectly assume the reduction ratio is simply related to the 3x3 spatial filter without adding back the 1x1 cross-channel fusion.
    **The Consequence:** They wildly overestimate the computational savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input spatial resolution: 128x128 with 256 channels.
    - Output requires 256 channels.
    - Kernel size: 3x3.

    **Calculations:**
    - Standard 3x3 MACs: 128 * 128 * 256 * 256 * 3 * 3 = 9.66 GMACs.
    - Depthwise Separable MACs: Depthwise (128 * 128 * 256 * 3 * 3 = 37.7 MMACs) + Pointwise (128 * 128 * 256 * 256 * 1 * 1 = 1.07 GMACs) = 1.08 GMACs.
    - Reduction Ratio: 9.66 GMACs / 1.08 GMACs ≈ 8.9x reduction.

    **Conclusion & Interpretation:**
    - **Result: 8.9x reduction (Compute-Bound)**. Reducing this single layer's cost from 9.66 GMACs to about 1.08 GMACs leaves substantially more compute headroom within the 60W TDP.
