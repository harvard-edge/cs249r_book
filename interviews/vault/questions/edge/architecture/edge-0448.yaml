title: The Driver Monitoring Latency Budget
scenario: A driver monitoring system on Jetson Orin has a 15W budget and 33ms deadline. Pre/post-processing takes 8ms. Comparing 1.5 TeraOps CNN vs 2.0 TeraOps ViT.
question: 'Under a 15W budget and 8ms fixed overhead, which model meets the 33ms deadline: Efficient-CNN or Small-ViT?'
details:
  realistic_solution: Calculate sustained TOPS based on the power budget (15W), not peak theoretical TOPS. With sustained TOPS, calculate inference time for each model and add fixed pipeline overhead to verify the 33ms deadline.
  common_mistake: |
    **The Pitfall:** Using the headline "peak" TOPS number for latency estimates, ignoring the power budget.
    **The Rationale:** Engineers assume silicon always runs at maximum advertised clock speeds regardless of thermal or electrical constraints.
    **The Consequence:** Predicting wildly optimistic latencies and deploying models that fail to meet hard real-time safety deadlines in constrained vehicles.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15W budget.
    - Efficiency = 4.6 TOPS/W.
    - Overhead = 8ms.
    - Budget = 33ms.

    **Calculations:**
    - Sustained Compute = 15 * 4.6 = 69 TOPS.
    - Efficient-CNN = 1.5 / 69 = 21.7ms + 8ms = 29.7ms.
    - Small-ViT = 2.0 / 69 = 29.0ms + 8ms = 37.0ms.

    **Conclusion & Interpretation:**
    - **Result: CNN = 29.7ms, ViT = 37.0ms (Power-Bound)**. Relying on peak advertised TOPS instead of sustained envelope TOPS causes fatal deadline misses.
