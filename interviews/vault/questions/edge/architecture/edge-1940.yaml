title: 'Coral Edge TPU Feasibility for MobileNetV3-Small: Memory and Performance Estimation'
scenario: A MobileNetV3-Small variant (2.5M parameters) is being deployed on a Google Coral Edge TPU (4 TOPS INT8, 2W). The system requires 30 FPS inference (33ms latency). The model performs roughly 220 Million INT8 operations per inference.
question: Based on a feasibility estimation of memory footprint and INT8 operations, can the Coral Edge TPU meet the 30 FPS requirement?
details:
  realistic_solution: |
    Yes, the compute estimate is favorable: 220M INT8 ops per frame at 30 FPS requires 6.6 GOPS sustained, or 0.0066 TOPS, which is far below the Coral Edge TPU's 4 TOPS peak. The 2.5M INT8 weights are also only about 2.5 MB, so parameter storage is not the limiting factor.

    The deployment is still not guaranteed from TOPS alone. Profile peak activation memory with the actual input shape, run the TFLite Edge TPU compiler, and check that all latency-critical operators are placed on the TPU without host CPU fallback. Treat the 4 TOPS number as an upper bound and verify measured p99 latency, activation placement, and any preprocessing/postprocessing overhead before claiming the 33ms target is met.
  common_mistake: |
    **The Pitfall:** Overlooking activation memory or directly comparing FP32 FLOPs to INT8 TOPS.
    **The Rationale:** Engineers size the hardware purely based on parameter count, ignoring intermediate feature maps.
    **The Consequence:** The model fits in storage but OOMs during inference, or fails to meet latency targets because precision conversion wasn't accounted for.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2.5M parameters (INT8), ~220M INT8 operations per inference.
    - Hardware: Coral Edge TPU, 4 TOPS INT8 peak; host board RAM is not the same as TPU-local working memory.
    - Target: 30 FPS.

    **Calculations:**
    - Weight Memory: 2.5M parameters * 1 byte (INT8) = 2.5 MB.
    - Activation Memory: Estimated peak ~12 MB.
    - Total Footprint: 2.5 MB + 12 MB = 14.5 MB.
    - Required Compute: 220M ops/frame * 30 FPS = 6.6 GOPS = 0.0066 TOPS.
    - Ideal compute utilization: 0.0066 / 4 = 0.165% of peak.
    - If effective utilization is only 10% after compiler placement and memory overhead, available throughput is ~0.4 TOPS, still above 0.0066 TOPS, but unsupported ops or excess activation spilling can dominate latency.

    **Conclusion & Interpretation:**
    - **Result: Rough Compute Feasibility, Deployment Not Guaranteed**. The peak-TOPS check is favorable, but real Coral feasibility depends on TFLite Edge TPU compilation, operator coverage, activation placement, and measured FPS.
