title: The Depthwise Efficiency Gain
scenario: You are designing a perception model for a new autonomous vehicle platform based on the Jetson AGX Orin. Your thermal budget is tight. A colleague suggests replacing a standard 3x3 convolutional layer in your network with a 3x3 depthwise separable convolution to save power.
question: For a 112x112 layer with 64 input channels and 128 output channels, what FLOP reduction do you get from a 3x3 depthwise separable convolution?
details:
  realistic_solution: 'The depthwise separable convolution achieves an ~8.4x reduction in computation, which translates to proportionally lower latency and power consumption.'
  common_mistake: Calculating only the cost of the depthwise convolution and ignoring the pointwise convolution, leading to a massive overestimation of the savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Spatial dimensions: 112x112
    - Channels: 64 in, 128 out
    - Kernel: 3x3

    **Calculations:**
    - Standard Conv FLOPs = 2 * 112^2 * 64 * 9 * 128 = 1.85 GFLOPs
    - Depthwise FLOPs = 2 * 112^2 * 64 * 9 = 14.5 MFLOPs
    - Pointwise FLOPs = 2 * 112^2 * 64 * 128 = 205.5 MFLOPs
    - Ratio = 1,850 / (14.5 + 205.5) = 8.4x

    **Conclusion & Interpretation:**
    - **Result: 8.4x Reduction (Compute-Bound)**. The two-step process yields a massive reduction in FLOPs, lowering both latency and power.
  options:
  - 'An ~8.4x reduction in FLOPs'
  - 'A ~9x reduction in FLOPs'
  - 'A ~128x reduction in FLOPs'
  - 'A ~2x reduction in FLOPs'
