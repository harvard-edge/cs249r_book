title: 'The Qualcomm RB5 Hexagon DSP'
scenario: 'Your robotics team is building a warehouse inventory drone. Your primary workload is MobileNetV2 classification (0.3 GFLOPs) running at 60 FPS on barcode images. A junior engineer put the model on the GPU because GPUs are for ML. The drone battery life is 18 minutes.'
question: 'Can you do better to improve the drone battery life by relocating the ML workload?'
details:
  realistic_solution: 'Relocate the inference workload to the Hexagon DSP. The DSP fixed-function pipeline and lower voltage domain are purpose-built for low-arithmetic-intensity tasks like MobileNet, vastly improving TOPS/W.'
  common_mistake: |
    **The Pitfall:** Assuming the GPU is the optimal choice for all ML inference due to raw FLOPS.
    **The Rationale:** Engineers equate ML exclusively with GPUs, ignoring architectural mismatches for small sequential workloads.
    **The Consequence:** Massive power inefficiency, draining the drone battery significantly faster than necessary.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU: 1.4 TFLOPS FP16, 1.5W.
    - DSP: 15 TOPS INT8, 0.3W.
    - Workload: MobileNetV2 (0.3 GFLOPs), 60 FPS.

    **Calculations:**
    - Sustained throughput needed: 0.3 GFLOPs * 60 = 18 GFLOPS.
    - GPU power efficiency: 18 GFLOPS / 1.5W = 12 GFLOPS/W.
    - DSP power efficiency: 18 GFLOPS / 0.3W = 60 GFLOPS/W.

    **Conclusion & Interpretation:**
    - **Result: 5x better power efficiency (Power-Bound)**. Relocating to the DSP prevents unnecessary battery drain.
