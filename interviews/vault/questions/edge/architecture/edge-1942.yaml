title: 'Hardware-aware NAS Deployment on NVIDIA Jetson Orin for Real-time Object Detection'
scenario: 'You are tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). Your team has developed a neural architecture search (NAS) pipeline that explores MobileNet-like architectures. The current best model from a general-purpose NAS, while highly accurate, exhibits unacceptable tail latencies and frequently exceeds the power budget.'
question: 'Why might the general-purpose NAS model miss Jetson Orin latency and power targets, and how should hardware-aware NAS fix this?'
details:
  realistic_solution: 'Implement a hardware-aware NAS approach where the search space is explicitly constrained by hardware-specific metrics like actual latency measurements on the Jetson Orin, estimated SRAM/DRAM usage, and power consumption. The goal is to find Pareto-optimal architectures that balance accuracy, latency, and power within the Orin''s memory hierarchy constraints.'
  common_mistake: 'Solely optimizing for FLOPs or MACs during the NAS process. FLOPs are a hardware-agnostic proxy, causing the NAS to select models with fragmented memory access patterns that thrash LPDDR5 bandwidth.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin LPDDR5 memory bandwidth: ~68 GB/s.
    - Required Framerate: 30 FPS (~33ms target).
    - Problematic model: fragmented access requires 2 GB of data movement per frame.

    **Calculations:**
    - At 30 FPS, total memory movement is 2 GB * 30 = 60 GB/s (nearing the limit).
    - Memory transfer time per frame: 2 GB / 68 GB/s ≈ 29.4 ms.

    **Conclusion & Interpretation:**
    - **Result: 29.4 ms (Memory-Bound)**. Memory transfers completely consume the ~33ms real-time budget, ignoring compute time, necessitating hardware-aware NAS to minimize memory access fragmentation.
