title: 'The Depthwise Separable Efficiency Gain: Transformer Systems Cost'
scenario: 'Your team is optimizing a perception CNN for a new autonomous vehicle prototype. A key bottleneck is a standard 3x3 convolutional layer with 128 input channels and 256 output channels. To improve performance on the vehicle''s edge accelerator, you are replacing it with a 3x3 depthwise separable convolution.'
question: 'For a 3x3 convolution with 128 input and 256 output channels, what FLOP reduction factor does a depthwise separable version provide?'
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, expensive operation with two cheaper ones: a depthwise convolution and a pointwise convolution (1x1). The reduction in FLOPs is the ratio of the original cost to the new, combined cost. This factor is dominated by the number of output channels and the kernel size.'
  common_mistake: |
    **The Pitfall:** Assuming the reduction is exactly the square of the kernel size (9x), or ignoring the 1x1 pointwise convolution's cost.
    **The Rationale:** Engineers rely on the K^2 asymptotic heuristic and forget the residual pointwise cost becomes dominant.
    **The Consequence:** An overestimation of compute savings, leading to missed real-time deadlines on constrained edge hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Kernel K=3, Cin=128, Cout=256.

    **Calculations:**
    - Standard Cost: K^2 * Cin * Cout = 9 * 128 * 256.
    - Separable Cost: K^2 * Cin + Cin * Cout = 9 * 128 + 128 * 256.
    - Reduction Factor: (Cout * K^2) / (K^2 + Cout) = (256 * 9) / (9 + 256) = 2304 / 265 \approx 8.69.

    **Conclusion & Interpretation:**
    - **Result: ~8.7x FLOP reduction (Compute-Bound)**. The depthwise separable version drastically cuts compute requirements.
  options:
    - 'Exactly 9x reduction'
    - '~256x reduction'
    - '~8.7x reduction'
    - '~2x reduction'
