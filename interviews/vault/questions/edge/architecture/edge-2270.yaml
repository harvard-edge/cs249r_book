title: Orin Edge Llama Batch Cache
scenario: A Jetson AGX Orin is serving Llama-3-8B locally at batch size 8 for an edge customer service kiosk. The model uses 32 layers, 8 KV heads, and 128 head dim at FP16.
question: Is the Orin's 204.8 GB/s LPDDR5 bandwidth or the cache capacity the binding constraint on per-token decode latency at 2048 tokens context length?
visual:
  kind: svg
  path: edge-2270.svg
  alt: Bar chart showing memory linear growth reaching 2GB at 2048 tokens.
  caption: KV Cache growth by sequence length.
details:
  realistic_solution: 'Per-token cache across the batch reaches 2 GB at 2048 tokens. Capacity easily fits in Orin''s 32-64 GB unified memory, so capacity is NOT binding. Bandwidth is binding: each decode step must stream the entire 2 GB cache plus model weights (~16 GB for Llama-3-8B FP16).'
  common_mistake: Computing the cache for a single sequence and ignoring the batch-8 multiplier, or assuming Orin's ample DRAM means bandwidth is also fine.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size 8, 32 layers, 8 KV heads, 128 dim, FP16 (2 bytes)
    - 2048 tokens context length
    - 204.8 GB/s LPDDR5 bandwidth

    **Calculations:**
    - Cache per token (batch) = 2 * 32 * 8 * 128 * 8 * 2 bytes = 1 MB/token
    - Total cache at 2048 tokens = 2 GB
    - Decode rate = 204.8 GB/s / (2 GB cache + 16 GB weights) = ~11 tokens/s

    **Conclusion & Interpretation:**
    - **Result: 11 tokens/s (Memory-Bandwidth-Bound)**. Capacity is ample, but streaming the massive KV cache and weights at each auto-regressive step limits throughput.
