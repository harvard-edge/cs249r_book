title: Jetson Orin MobileNetV2 vs EfficientNetB0 Deployment
scenario: Comparing MobileNetV2 vs EfficientNetB0 for a Jetson Orin deployment where LPDDR5 bandwidth limits efficiency.
question: Which model, MobileNetV2 or EfficientNetB0, would you deploy on the Jetson Orin, and why?
details:
  realistic_solution: Compare the two candidates using measured Orin latency, activation traffic, operator support, and accuracy at the target input size. MobileNetV2 is often the safer low-latency choice because its depthwise separable and inverted residual blocks keep parameter count low and are widely optimized, but EfficientNetB0 can win if its accuracy gain justifies extra activation traffic and its squeeze-excitation and scaling pattern compile efficiently. The release decision should be based on profiled INT8 throughput, memory bandwidth counters, and accuracy per watt, not a blanket rule that one architecture always wins.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs or parameter counts to choose the model.
    **The Rationale:** Engineers treat FLOPs as a direct proxy for latency without considering memory access patterns.
    **The Consequence:** Selecting a model that frequently stalls the memory bus, failing to utilize INT8 capabilities and exceeding thermal budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin LPDDR5 bandwidth = 204 GB/s.
    - Candidate A: MobileNetV2, roughly 3.5M parameters.
    - Candidate B: EfficientNetB0, roughly 5.3M parameters.
    - INT8 weights use 1 byte per parameter.

    **Calculations:**
    - MobileNetV2 INT8 weight storage is about 3.5 MB; EfficientNetB0 is about 5.3 MB.
    - If weights were reread once per inference at 100 FPS, lower-bound weight traffic would be 350 MB/s and 530 MB/s, both far below 204 GB/s.
    - Therefore model weight reads alone do not explain a bandwidth bottleneck.
    - The comparison must include activation tensors, depthwise/pointwise reuse, operator fusion, and measured off-chip traffic from profiling.

    **Conclusion & Interpretation:**
    - **Result: Profiled Activation Traffic Decides The Winner**. MobileNetV2 is a plausible low-latency default, but EfficientNetB0 should be rejected only if measurements show worse latency or energy at the required accuracy.
