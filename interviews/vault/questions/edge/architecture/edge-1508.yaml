title: Diagnosing CPU Fallback in EfficientNet on Edge TPU
scenario: You are deploying a standard EfficientNet-B0 model to a Google Coral Edge TPU for a smart camera application. After running the compiler, you notice the inference latency is 45ms instead of the expected 3ms. The compiler logs reveal that the model graph has been partitioned, with several depthwise convolutions and activation layers falling back to the host CPU.
question: What architectural feature of standard EfficientNet causes this fallback, and how is it resolved?
details:
  realistic_solution: The root cause is the use of the Swish (SiLU) activation function and Squeeze-and-Excitation (SE) blocks, which are not natively supported by the Edge TPU's INT8 ALUs. This forces graph partitioning. Switch to EfficientNet-Lite, which replaces Swish with ReLU6 and removes SE blocks, compiling seamlessly to INT8.
  common_mistake: |
    **The Pitfall:** Assuming the Edge TPU lacks hardware support for depthwise separable convolutions.
    **The Rationale:** Candidates see depthwise convolutions falling back and misdiagnose the root cause as a fundamental compute limitation rather than an activation function mismatch.
    **The Consequence:** They suggest replacing depthwise convolutions with standard ones, which drastically increases FLOPs without solving the compatibility issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected fully compiled Edge TPU latency: ~3 ms.
    - Observed partitioned latency: 45 ms.
    - Extra latency comes from host fallback, graph handoffs, and tensor copies around unsupported Swish/SE operations.

    **Calculations:**
    - Added fallback latency = 45 ms observed - 3 ms expected = 42 ms.
    - Relative slowdown = 45 ms / 3 ms = 15x.
    - Replacing Swish and SE with Edge-TPU-supported EfficientNet-Lite blocks removes the partition boundaries that create this 42 ms penalty.

    **Conclusion & Interpretation:**
    - **Result: 42 ms of avoidable fallback overhead (CPU-Fallback Bound).** The observed 45 ms latency is consistent with graph partitioning, so the fix is an Edge-TPU-compatible architecture rather than more FLOP reduction.
