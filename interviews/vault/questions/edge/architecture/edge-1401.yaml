title: Edge TPU Precision Requirements for Efficient CNNs
scenario: You are tasked with porting an EfficientNet-Lite model to run on a Google Coral Edge TPU for a battery-powered security camera. The Edge TPU provides 4 TOPS of compute within a tight 2W power budget, making it ideal for this USB-connected edge device. However, to leverage the TPU hardware, the model must be compiled specifically for it.
question: What specific numerical precision format is strictly required by the Google Coral Edge TPU for hardware acceleration?
details:
  realistic_solution: The correct answer is 8-bit integer (INT8) quantization. The Google Coral Edge TPU's systolic array is designed exclusively for INT8 arithmetic, meaning weights and activations must be fully quantized to INT8 prior to compilation for the operations to execute on the accelerator.
  common_mistake: |
    **The Pitfall:** Stating that FP16 is supported or that partially quantized models will run efficiently.
    **The Rationale:** Candidates conflate the Edge TPU with other flexible edge accelerators (like NVIDIA Jetson) and don't realize unquantized layers fall back to the CPU.
    **The Consequence:** Massive latency spikes because the compute graph is forced to jump between the TPU and the weak host CPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge TPU compute: 4 TOPS (4000 GOPS) at 2W.
    - MobileNetV2 compute: 0.6 GOPS/inference.
    - Host CPU compute: ~20 GOPS at 2W.

    **Calculations:**
    - Edge TPU max inferences = 4000 / 0.6 = 6667 inferences/second.
    - CPU max inferences = 20 / 0.6 = 33.3 inferences/second.

    **Conclusion & Interpretation:**
    - **Result: Falling back to CPU drops efficiency from 3333.5 inf/J to 16.6 inf/J.** Hardware support dictates 8-bit precision strictly.
