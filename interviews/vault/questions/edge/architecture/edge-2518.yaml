title: NPU Preemption Context Switch
scenario: A mobile SoC switches context from a vision app to a voice agent. The OS must swap a 20 MB active NPU context from SRAM to shared memory.
question: What latency bubble comes from writing out and reading in a 20 MB NPU context at 50 GB/s?
details:
  realistic_solution: A full context switch requires saving the current 20 MB NPU state to shared memory, then loading the next 20 MB state. Synchronous eviction and fetching strictly bounds the total synchronization bubble before generation resumes.
  common_mistake: |
    **The Pitfall:** Only calculating the memory read time (0.4ms).
    **The Rationale:** Candidates focus solely on the time it takes to load the new voice agent's state into SRAM.
    **The Consequence:** They completely forget the mandatory write-back of the evicted active vision context, underestimating the total latency bubble by 50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context size: 20 MB active NPU SRAM context.
    - Memory bandwidth: 50 GB/s (50,000 MB/s).

    **Calculations:**
    - Write out evicted context: 20 MB / 50,000 MB/s = 0.4 ms.
    - Read in new context: 20 MB / 50,000 MB/s = 0.4 ms.
    - Total latency bubble = 0.4 ms + 0.4 ms = 0.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.8 ms (Memory-Bandwidth Bound)**. The total synchronization bubble includes both write-out and read-in traffic.
