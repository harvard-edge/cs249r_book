title: Encoder-Only NLU Model for Google Coral Edge TPU
scenario: Your team is tasked with deploying a real-time Natural Language Understanding (NLU) model on embedded devices, specifically utilizing the Google Coral Edge TPU. The NLU task involves classifying short text snippets.
question: Which architecture (encoder-only, decoder-only, or encoder-decoder) fits Coral Edge TPU NLU best under 4 TOPS INT8 and 2W, and why?
details:
  realistic_solution: An encoder-only architecture (e.g., a highly compressed MobileBERT-style classifier) is the best topology for short-text NLU classification. Encoder-only models provide bidirectional context in one pass, avoid autoregressive decoding, and are easier to quantize to the INT8 operators expected by the Coral Edge TPU compiler. The model still must be small enough and operator-compatible enough to compile fully to the TPU; otherwise CPU fallback can dominate latency and power. Decoder-only or encoder-decoder models are a poor fit unless the task requires generation, which this classification workload does not.
  common_mistake: |
    **The Pitfall:** Attempting to deploy decoder-only or full encoder-decoder models without aggressive pruning.
    **The Rationale:** Candidates ignore the strict INT8 requirement or fail to realize that auto-regressive generation is computationally infeasible for a 4 TOPS/2W edge device.
    **The Consequence:** The model exceeds the thermal and power limits, causing device instability or completely failing to compile for the Coral TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral Edge TPU: 4 TOPS INT8, 2W power limit.
    - Target task: Classification (NLU).
    - Example encoder-only classifier cost: 20 GOPS/inference after pruning and INT8 quantization.
    - Example decoder or encoder-decoder cost: 200 GOPS/inference plus sequential generation steps.

    **Calculations:**
    - Encoder lower-bound latency at peak = 20e9 ops / 4e12 ops/s = 0.005 s = 5 ms.
    - At 25% effective utilization, encoder latency estimate = 20e9 / 1e12 = 20 ms.
    - Decoder-style model lower-bound latency for one pass = 200e9 / 4e12 = 50 ms, before any token-by-token generation loop.
    - Classification needs one bidirectional representation, so generation capacity is wasted work and creates extra latency/power risk.

    **Conclusion & Interpretation:**
    - **Result: Encoder-Only INT8 Classifier Is The Correct Fit**. The conclusion follows from topology and supported execution, not from a fixed 0.5 TOPS budget per inference.
