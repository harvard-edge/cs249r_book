title: Optimize Jetson Orin Depthwise Convolution Latency with TensorRT Fusion
scenario: MobileNetV2 inference on a Jetson Orin achieves 120 FPS with TensorRT FP16. Profiling shows 35% of the execution time is spent in depthwise convolution layers, even though they represent only 5% of total FLOPs.
question: How would you optimize the depthwise convolutions specifically for the Jetson Orin's Ampere architecture to reduce this latency?
details:
  realistic_solution: |
    Jetson Orin Ampere: depthwise conv runs on CUDA cores (not tensor cores). Optimization: (1) use TRT layer-specific tactics: trt.TacticSource.EDGE_MASK_CONVOLUTIONS; (2) ensure channel counts are multiples of 32 for warp efficiency (MobileNetV2 standard channels: 16, 24, 32, 64, 96, 160, 320 — most are fine); (3) use TRT's graph optimization to fuse depthwise + BN + ReLU6 into single kernel; (4) try replacing 3x3 depthwise with 5x5 at reduced depth (MobileNetV3 insight) — sometimes faster on Jetson due to better CUDA core occupancy. Profile with nsys to confirm improvement.
  common_mistake: |
    **The Pitfall:** Switching depthwise layers to FP32 to target Ampere tensor cores.
    **The Rationale:** Candidates assume tensor cores can accelerate any dense operation if the precision is changed.
    **The Consequence:** No speedup occurs because tensor cores only accelerate dense matmul (not depthwise), wasting engineering effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current metrics: 120 FPS = 8.3ms total time. 35% of 8.3ms = 2.9ms spent in depthwise ops.
    - FLOPs utilization: 5% of 0.3 GFLOPs = 15M FLOPs.
    - Hardware capability: peak dense FP16 throughput is not a useful bound for depthwise kernels, which are often memory/launch/occupancy limited.

    **Calculations:**
    - Observed performance: 15M FLOPs / 2.9ms = 5.2 GFLOPS.
    - This low observed arithmetic rate indicates the depthwise section is not limited by peak tensor throughput.
    - If 17 depthwise blocks each launch separate depthwise, BN, and ReLU6 kernels, that is about 51 launches.
    - Fusing each block to one depthwise+activation kernel reduces this to 17 launches.
    - With about 40 us launch/scheduling overhead avoided for each removed launch, saved time is (51 - 17) * 0.040ms = 1.36ms.
    - New depthwise time estimate: 2.9ms - 1.36ms = 1.54ms, about 1.9x faster for the depthwise portion.
    - New end-to-end latency estimate: 8.3ms - 1.36ms = 6.94ms, or about 144 FPS.

    **Conclusion & Interpretation:**
    - **Result: Depthwise Section Is Kernel-Efficiency Bound**. TensorRT fusion and better CUDA-core scheduling can materially reduce latency, but the derived gain is about 1.9x for depthwise ops and about 1.2x end-to-end under these assumptions, not an unsupported 4x overall speedup.
