title: 'The Transformer''s Quadratic Curse on Edge'
scenario: 'Your autonomous vehicle team is choosing a perception model to run on an edge device like a Jetson AGX Orin. You are comparing a classic CNN (like MobileNet) against a modern Vision Transformer (ViT).'
question: 'For a fixed input image size, which operation is the primary compute bottleneck in the ViT, and how does its computational cost scale as you increase the number of input image patches?'
details:
  realistic_solution: 'The primary compute bottleneck in a Vision Transformer is the self-attention mechanism. Its computational complexity scales quadratically with the number of patches, which is proportional to the input image''s area.'
  common_mistake: 'Assuming that if a CNN and a ViT have a similar parameter count, their inference latency will scale similarly with resolution.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 128x128 image = N patches.
    - 256x256 image = 4N patches.

    **Calculations:**
    - CNN FLOPs scaling: linearly with area (4x).
    - ViT self-attention FLOPs scaling: quadratically with patch count: (4N)^2 / N^2 = 16x.

    **Conclusion & Interpretation:**
    - **Result: 16x Compute (Compute-Bound)**. The quadratic scaling makes high-resolution ViTs very expensive for real-time edge applications.
  options:
  - 'The MLP Head, which scales linearly with the embedding dimension.'
  - 'Convolutional stem, which scales linearly with the number of pixels.'
  - 'Self-attention, which scales quadratically (O(N^2)) with the number of patches.'
  - 'Layer normalization, which scales linearly with the number of patches.'
  correct_index: 2
