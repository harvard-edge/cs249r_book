title: The Depthwise Separable Dividend (edge-0335)
scenario: A perception model for an autonomous vehicle's edge computer has a strict 33ms latency budget. A key bottleneck is a standard 2D convolutional layer with a 3x3 kernel, 256 input channels, and 512 output channels. A proposed optimization is replacing it with a depthwise separable convolution.
question: For the 3x3 layer with 256 input and 512 output channels, what MAC reduction factor does a depthwise separable convolution provide?
details:
  realistic_solution: |
    The reduction in computation comes from factorizing the single dense standard convolution into two smaller operations: a lightweight 3x3 depthwise convolution and a more expensive 1x1 pointwise convolution.
  common_mistake: |
    **The Pitfall:** Overestimating the savings by only considering the depthwise part of the operation.
    **The Rationale:** Forgetting that the subsequent 1x1 pointwise convolution accounts for the vast majority of the computation.
    **The Consequence:** Inaccurate performance profiling and missed latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 kernel, 256 input channels, 512 output channels.
    - Standard Conv vs Depthwise Separable Conv.

    **Calculations:**
    - Standard Conv MACs per pixel = 3² * 256 * 512 = 1,179,648.
    - Depthwise Separable MACs per pixel = (3² * 256) + (256 * 512) = 2,304 + 131,072 = 133,376.
    - Reduction factor = 1,179,648 / 133,376 = 8.84x.

    **Conclusion & Interpretation:**
    - **Result: 8.84x reduction (Compute-Bound)**. By separating the spatial filtering from the channel mixing, the layer's compute burden is reduced by ~8.8x.
  options:
  - Around 2x. The savings are proportional to the ratio of output to input channels.
  - Around 9x. The savings come from factorizing the convolution, though the 1x1 pointwise part is still the dominant cost.
  - Around 80x. The savings are massive because you are no longer mixing channels in the main convolution.
  - Around 512x. The savings are proportional to the number of output channels.
  correct_index: 1
