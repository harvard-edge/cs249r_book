title: LoRA Fine-Tuning for Domain Shift on Jetson Orin Without GPU
scenario: An edge device needs to fine-tune a 3B model with LoRA on domain-specific data collected locally, but it does not have a discrete GPU (uses unified LPDDR5 memory). The default PyTorch CUDA training fails.
question: How do you configure and run LoRA training on a Jetson Orin NX without a discrete GPU?
details:
  realistic_solution: Use Jetson's CUDA-on-ARM support and configure memory correctly. Since memory is unified, allocate a small batch size with gradient accumulation. The training is entirely compute-bound, but fits within memory and takes practical time for offline fine-tuning.
  common_mistake: |
    **The Pitfall:** Attempting to use CUDA-based PyTorch training as if it were a discrete data center GPU.
    **The Rationale:** Candidates forget that Jetson's GPU shares LPDDR5 with the CPU and lacks features like ECC or NCCL backends.
    **The Consequence:** PyTorch CUDA kernels fail to compile or throw out-of-memory errors when relying on default server-class settings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson GPU peak FP16: ~40 TOPS. Memory BW: 68 GB/s.
    - 3B model LoRA training step.

    **Calculations:**
    - FLOPs per step = 6 * 3B params * 512 seq_len = 9.2 TFLOPs.
    - Compute time per step = 9.2 TFLOPs / 40 TOPS = 0.23s.
    - Memory bandwidth time = 1.5GB / 68 GB/s = 22ms.
    - Compute time (0.23s) >> Memory time (0.022s).

    **Conclusion & Interpretation:**
    - **Result: 0.23s per step (Compute-Bound)**. Training is purely compute-bound at 0.23s per step.
