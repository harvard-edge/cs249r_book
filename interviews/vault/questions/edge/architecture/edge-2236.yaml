title: 'Continual LoRA Adaptation on Edge Devices'
scenario: 'An edge robotics platform collects new demonstrations weekly and needs to update its task LoRA adapter without forgetting previously learned behaviors.'
question: 'How would you update the weekly LoRA adapter on the edge device without catastrophic forgetting of prior robot behaviors?'
details:
  realistic_solution: 'Use a replay buffer storing 5-10% of historical data to mix with new data during adapter fine-tuning. This elegantly guards against catastrophic forgetting and avoids the inference-time latency penalties of sequential adapter composition.'
  common_mistake: |
    **The Pitfall:** Simply training a new LoRA adapter solely on new data and replacing the old one.
    **The Rationale:** Candidates treat LoRA updates identically to standard fine-tuning without considering distribution shifts in sequential task learning.
    **The Consequence:** The model suffers catastrophic forgetting of previous task distributions, causing robotic failure on older established tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weekly new data: 100K examples.
    - Replay buffer size: 5% (5K examples).
    - Storage cost per example: 2KB.

    **Calculations:**
    - Total training payload = 105K examples.
    - Without replay: Performance on task T-1 degrades by ~20%.
    - With 5% replay: Degradation <2%.
    - Storage cost: 5,000 * 2KB = 10,000 KB = 10 MB.

    **Conclusion & Interpretation:**
    - **Result: 10 MB (Storage-Bound)**. A 5% replay buffer trivially prevents catastrophic forgetting for only 10MB of persistent storage.
