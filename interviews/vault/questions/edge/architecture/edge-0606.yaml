title: 'The Drone Fleet Vision Upgrade'
scenario: 'You are the lead ML Systems Engineer for a company that operates a fleet of thousands of autonomous drones for agricultural monitoring. The current drones use a highly optimized CNN-based model on a Jetson AGX Orin to detect crop diseases, operating under a strict 30W power budget to maximize flight time. A new Vision Transformer (ViT) model promises a 15% accuracy improvement, which could save millions in crop losses. However, early prototyping shows the ViT model, despite having a similar parameter count to the CNN, runs 5x slower and pushes the Orin to its 60W maximum power profile, making it a non-starter.'
question: 'What are your first three design decisions, and how do you justify them quantitatively?'
details:
  realistic_solution: 'The core issue is the mismatch between the ViT''s computational pattern and the edge hardware''s strengths. The self-attention mechanism''s memory access is scattered and has low arithmetic intensity, leading to memory bandwidth bottlenecks. This contrasts with CNNs, whose dense, localized computations keep the Tensor Cores fed efficiently. A full ViT is infeasible.'
  common_mistake: |
    **The Pitfall:** Focusing only on parameter counts or theoretical FLOPs when comparing CNNs and ViTs.
    **The Rationale:** Engineers assume similar GFLOPs imply similar latency, ignoring the massive differences in memory access patterns and arithmetic intensity.
    **The Consequence:** The ViT deployment fails drastically because it becomes severely memory-bound on edge hardware, running 5x slower.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin peak compute: 275 TOPS.
    - Orin memory bandwidth: 204.8 GB/s.
    - ViT self-attention Arithmetic Intensity (AI): ~2 OPS/Byte.

    **Calculations:**
    - Orin Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1342 OPS/Byte.
    - 2 OPS/Byte (ViT AI) << 1342 OPS/Byte (Hardware Ridge).
    - ViT attention memory time: 1 MB / 204.8 GB/s = 4.8 us.
    - ViT attention compute time: 2M FLOPs / 275 TOPS = 0.007 us.

    **Conclusion & Interpretation:**
    - **Result: Memory Time Dominates Compute (Memory-Bound)**. The Vision Transformer falls heavily to the left of the roofline ridge, starving the INT8 engine and blowing up execution latency.
