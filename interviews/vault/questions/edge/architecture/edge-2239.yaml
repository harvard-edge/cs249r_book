title: Adapter Compression for Bandwidth-Constrained Edge Deployment
scenario: You need to OTA-update LoRA adapters to 10,000 edge devices over a cellular network with 1 Mbps average bandwidth.
question: How would you deliver LoRA adapter updates to 10,000 edge devices over 1 Mbps cellular links?
details:
  realistic_solution: For incremental updates, use delta compression (adapter_v2 - adapter_v1). A typical delta is 5-10% of the full size. Over 1 Mbps, a compressed delta update takes mere seconds. Use adapter quantization (FP16 → INT8) for a further 2x size reduction at minimal quality loss.
  common_mistake: |
    **The Pitfall:** Sending full adapter weights for every minor update.
    **The Rationale:** Engineers assume adapters are small enough not to matter, ignoring the compounding cost over low bandwidth links.
    **The Consequence:** Updates take significantly longer and cost 10-100x more bandwidth across the 10,000 device fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base adapter: Rank-16 for a 7B model (32 layers, 4096 dim).
    - Precision: FP16 (2 bytes per param) to INT8 (1 byte per param).
    - Network Bandwidth: 1 Mbps.
    - Delta serialization: 10% of the full adapter bytes after patch compression.

    **Calculations:**
    - Rank-16 full adapter params: 2 matrices * 16 * 4096 params * 32 layers = 4,194,304 params.
    - FP16 full adapter size: 4,194,304 params * 2 bytes = 8,388,608 bytes = 8.39 MB decimal.
    - Full transfer time at 1 Mbps: (8.39 MB * 8 bits/byte) / 1 Mbps = 67.1 seconds.
    - Delta compression at 10% of the full FP16 adapter: 8.39 MB * 0.10 = 0.839 MB.
    - INT8 quantization of that delta gives an additional 2x reduction: 0.839 MB / 2 = 0.420 MB.
    - Compressed transfer time: (0.420 MB * 8 bits/byte) / 1 Mbps = 3.36 seconds.
    - Fleet bandwidth (10,000 devices): 10,000 * 0.420 MB = 4.20 GB.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound.** Using delta compression and quantization shrinks the payload to 0.420 MB, enabling a 3.36-second update per device and about 4.20 GB total CDN bandwidth.
