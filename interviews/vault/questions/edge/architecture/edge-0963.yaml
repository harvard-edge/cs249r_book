title: Edge New 0027
scenario: To survive edge node power losses, a T4 checkpoints a 1GB LLM KV cache to the host CPU via PCIe Gen4 (32GB/s) every 10 tokens.
question: What inference latency overhead comes from checkpointing a 1GB LLM KV cache over PCIe Gen4 every 10 tokens?
details:
  realistic_solution: 'Checkpointing large KV caches directly stalls the GPU if not done asynchronously. A 1GB transfer over PCIe Gen4 takes significant time compared to token generation, introducing a massive stutter in the auto-regressive decoding phase.'
  common_mistake: Ignoring the PCIe bus bandwidth limit when designing cloud-like state checkpointing for local edge servers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 GB KV cache checkpointed every 10 tokens
    - PCIe Gen4 bandwidth = 32 GB/s
    - Normal generation = 20 ms/token

    **Calculations:**
    - Transfer time = 1 GB / 32 GB/s = 31.25 ms
    - Penalty per token = 31.25 ms / 10 = 3.125 ms
    - Overhead % = 3.125 / 20 = 15.6%

    **Conclusion & Interpretation:**
    - **Result: 3.125 ms/token (I/O-Bandwidth-Bound)**. PCIe bus transfers stall the auto-regressive decode loop, causing massive jitter and degrading user experience.
