title: INT8 Encoder Model for 100-Token Edge NLU
scenario: Your team is tasked with deploying a compact language model for real-time natural language understanding on an edge device with an NPU, shared mobile memory, and a tight power budget. The application requires processing an average of 100 tokens per query with a maximum latency of 100ms.
question: Which LLM architecture would you choose on this platform for 100-token NLU under 100ms, and how do memory, INT8 compute, and power constraints affect it?
details:
  realistic_solution: Deploy a highly distilled encoder-only architecture such as MobileBERT, MiniLM, or a similarly small BERT-style model, then quantize it with QAT to INT8 so it fits the device's MAC and memory constraints. For a 100-token NLU workload under 100ms, avoid an autoregressive decoder unless generation is actually required; the fixed-latency encoder path is a much better fit for the platform. Operator fusion and careful memory routing still matter to keep attention and activation traffic within the LPDDR4x bandwidth envelope.
  common_mistake: |
    **The Pitfall:** Selecting large foundation models and ignoring LPDDR4x bandwidth ceilings.
    **The Rationale:** Candidates stare at the massive 400 TOPS specification and erroneously assume compute capacity directly translates to LLM generation speed.
    **The Consequence:** The auto-regressive decoder thrashes the memory bus, violating the 100ms latency SLA and forcing constant thermal throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 100ms latency per query
    - Hardware: mobile-class NPU with shared LPDDR memory and a few-watt power budget
    - Workload: one 100-token NLU pass, not token-by-token generation

    **Calculations:**
    - Encoder-only NLU runs one bounded forward pass over the 100-token sequence.
    - Autoregressive decoding adds one or more sequential passes per generated token and repeatedly reads weights and KV state.
    - With shared memory and a small power envelope, the practical limit is sustained bandwidth and operator efficiency, not just peak INT8 TOPS.
    - A distilled INT8 encoder with fused attention/MLP blocks minimizes sequential work and keeps activations small enough for predictable latency.

    **Conclusion & Interpretation:**
    - **Result: Distilled encoder-only model.** The 100-token NLU requirement favors a compact INT8 encoder because it avoids autoregressive memory traffic and gives the best chance of meeting a 100ms edge latency target.
