title: 'On-Device LoRA Inference with INT4 Weight Quantization'
scenario: 'An edge device runs a 7B base model quantized to INT4 (AWQ) with a BF16 LoRA adapter. Inference shows the LoRA dequantize-compute-requantize pattern adds 35% latency overhead per layer.'
question: 'How would you optimize BF16 LoRA adapter computation to eliminate the 35% latency overhead on the INT4 base model?'
details:
  realistic_solution: 'Three optimization approaches: (1) Merge and requantize: merge the LoRA adapter into the base weight matrix offline (W_merged = W_base + B*A), then requantize the merged matrix to INT4. Zero inference overhead. Downside: cannot hot-swap adapters without full requantization. (2) Separate INT8 LoRA: quantize the LoRA matrices to INT8. LoRA matrices are small (r × d = 8 × 4096 = 32K values per matrix), INT8 quantization error is negligible at this scale. Perform LoRA computation in INT8, accumulate in INT32, cast to BF16 for output. (3) Fused kernel: write a custom kernel that fuses dequantize + base matmul + LoRA addition into a single pass, avoiding materialization of the dequantized matrix. This approach is used in llama.cpp GGML kernels for LoRA with quantized base.'
  common_mistake: |
    **The Pitfall:** Keeping the LoRA computation in BF16 while the base model runs in INT4.
    **The Rationale:** Candidates fail to realize that the type mismatch requires dequantizing the massive base weight matrix to BF16 just to perform the LoRA addition.
    **The Consequence:** This quadruples the memory bandwidth requirement for the base weights, completely destroying the latency benefits of INT4 quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base matmul: d_in * d_out = 4096 * 4096 = 16.8M values.
    - INT4 size: 8.4MB. BF16 size: 33.6MB.
    - LoRA add: 32K values = 64KB BF16 per matrix.

    **Calculations:**
    - LoRA overhead vs base: 2 * seq_len * d * r / (2 * seq_len * d * d) = r/d = 8/4096 = 0.2%.
    - Bandwidth penalty: Dequantizing to BF16 causes a 4x penalty.

    **Conclusion & Interpretation:**
    - **Result: ~2% Latency Overhead (Memory-Bandwidth Mitigated)**. A fused kernel eliminates materialization, returning bandwidth to INT4 rates.
