title: Hardware-Aware NAS for Jetson Orin DLA
scenario: Your team is using Hardware-Aware NAS to design a multi-camera perception model for an autonomous delivery robot powered by an NVIDIA Jetson Orin. The NAS objective is to maximize mAP while strictly ensuring the model runs entirely on the Deep Learning Accelerator (DLA) to leave the Ampere GPU free for planning workloads.
question: How would you constrain the NAS search space and cost model so the Orin DLA-only perception model is compatible and meets latency targets?
details:
  realistic_solution: Constrain the NAS search space exclusively to operators natively supported by the Orin DLA. Instead of theoretical FLOPs, the cost model must incorporate a hardware-calibrated latency lookup table (LUT) or an analytical latency predictor trained on actual DLA measurements to accurately evaluate the latency-accuracy tradeoff.
  common_mistake: |
    **The Pitfall:** Using raw FLOPs or parameter counts as proxy metrics for latency in the NAS cost model.
    **The Rationale:** Candidates default to standard NAS techniques, assuming theoretical FLOPs map perfectly to hardware execution.
    **The Consequence:** The NAS selects operators unsupported by the DLA, causing CPU/GPU fallbacks that destroy latency and violate the GPU-free requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS for 4 cameras. Latency budget = 8.25ms per camera.
    - Total Jetson Orin TOPS = 275. DLA portion ≈ 25% (68.75 TOPS).
    - Realistic DLA efficiency (40%).

    **Calculations:**
    - Effective DLA compute = 68.75 * 0.40 = 27.5 TOPS.
    - Max operations per inference = 27.5 TOPS * 0.00825 seconds = 226.8 GOPs.

    **Conclusion & Interpretation:**
    - **Result: ~225 GOPs (Compute-Bound Mitigation)**. The NAS cost model must constrain operations to ~225 GOPs exclusively using DLA-native ops.
