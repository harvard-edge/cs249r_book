title: Jetson Orin Batching Bandwidth
scenario: A multi-camera object tracking pipeline is deployed on a Jetson AGX Orin. Four 1080p cameras stream at 30 FPS, triggering YOLOv8 INT8 inferences.
question: Analyze the memory bandwidth bottleneck when batching the 4 concurrent streams together versus processing them sequentially.
details:
  realistic_solution: Batching 4 frames combines the inference execution, meaning the model weights (e.g., 10MB for INT8 YOLOv8) are read from LPDDR5 only once per batch instead of four separate times. Sequentially running inferences requires transferring the same weights 120 times per second, eating into the 204.8 GB/s bandwidth. Although YOLOv8 is relatively small, the batched approach amortizes weight loading, saving power and avoiding latency spikes when other pipeline tasks simultaneously access memory.
  common_mistake: |
    **The Pitfall:** Calculating pure computational TOPS utilization but ignoring memory bandwidth limits.
    **The Rationale:** Candidates forget that sequentially loading model weights for separate concurrent streams multiplies the memory bandwidth requirement over the LPDDR bus.
    **The Consequence:** The pipelines starve for data, introducing severe latency spikes and power waste.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 cameras at 1080p, 30 FPS (Total 120 FPS).
       - YOLOv8 INT8 model weights: 10 MB.
       - Jetson AGX Orin Bandwidth: 204.8 GB/s.
    2. **Calculations:**
       - Sequential reads: 10 MB * 120 FPS = 1.2 GB/s bandwidth consumed.
       - Batched reads (batch=4 at 30 FPS): 10 MB * 30 FPS = 0.3 GB/s bandwidth consumed.
    3. **Conclusion & Interpretation:**
       - **Result: 1.2 GB/s vs 0.3 GB/s.** Batching amortizes weight loading by 4x, saving significant power and alleviating **Memory-Bandwidth-Bound** pressure.
