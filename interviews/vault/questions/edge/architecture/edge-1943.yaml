title: 'Hardware-aware NAS for Hailo-8: Latency and Memory Constraints'
scenario: 'You are tasked with deploying a real-time object detection model on the Hailo-8 edge AI accelerator (26 TOPS INT8, 2.5W). Your current MobileNetV3-based architecture is exhibiting high latency for certain layers and exceeding the available SRAM budget on the device.'
question: 'How would you identify Hailo-8 layer bottlenecks and estimate whether a modified layer meets 5ms latency or 50KB feature-map memory?'
details:
  realistic_solution: 'A realistic solution involves creating a hardware-aware cost function that models both computational and memory aspects. For latency, estimate cycles per layer by considering the number of INT8 MAC operations, Hailo-8''s specific dataflow architecture (e.g., pipelining, parallelism capabilities), and critical memory access overheads. The formula would be an aggregate of: (Number of INT8 MACs) / (Effective INT8 TOPS * 10^12) * (Empirical or modeled pipeline/memory access penalty factor). For memory, calculate the total bytes for weights and activations (feature maps) for the layer, accounting for INT8 quantization (1 byte per value). This means summing (tensor_dims * num_channels * 1 byte) for all relevant tensors. These metrics would then be used within a NAS loop to guide architecture search or pruning decisions, ensuring the generated models fit the Hailo-8''s constraints. Validate latency estimates using nsys profiling on hardware.'
  common_mistake: |
    **The Pitfall:** Focusing only on FLOPs/TOPS without considering quantized memory access patterns.
    **The Rationale:** Candidates fail to account for the true energy cost of SRAM vs. DRAM or the practical execution pipeline of the Hailo-8.
    **The Consequence:** The NAS generates models that theoretically fit the latency target but massively exceed the physical memory constraints in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Peak Compute: 26 TOPS (26 * 10^12 ops/s).
    - INT8 MACs for layer: H_out * W_out * K * K * C_in * C_out.
    - Example layer MACs: 100 GMACs (100 * 10^9 MACs).
    - Feature map memory (INT8): H * W * C * 1 byte.
    - Example memory (7x7x128): 7 * 7 * 128 * 1.

    **Calculations:**
    - Ideal latency: (100 * 10^9) / (26 * 10^12) = ~3.8 ms.
    - Memory: 7 * 7 * 128 * 1 = 6272 bytes = ~6.1 KB.

    **Conclusion & Interpretation:**
    - **Result: ~3.8 ms, ~6.1 KB (Compute/Memory-Bound)**. The layer easily fits within 5ms and 50KB limits.
