title: CNN Translation Equivariance as Hardware Efficiency
scenario: A vision transformer (ViT) and a CNN both achieve similar accuracy on ImageNet. However, the CNN requires 4x fewer parameters and 3x fewer FLOPs.
question: From a systems perspective, why does a CNN's translation equivariance and local connectivity translate into lower parameter count and FLOPs than a similarly accurate ViT?
details:
  realistic_solution: |
    Translation equivariance means the same convolution kernel is applied at every spatial location, while local connectivity means each output reads only a small neighborhood. Systems implications: (1) Parameter efficiency: a 3x3x256x256 convolution has about 590K parameters and shares them across the full feature map. Standard ViTs also share transformer weights across positions, but they use global token mixing and often need wider blocks to match the same visual prior. (2) Compute: convolution scales with local kernel size and spatial positions, while self-attention scales with all token pairs. (3) Locality and reuse: convolution has regular access patterns and reuses weights across output positions, improving arithmetic intensity and cache behavior. The contrast is shared local kernels versus global attention, not position-specific ViT parameters.
  common_mistake: |
    **The Pitfall:** Explaining equivariance purely from a statistical learning perspective.
    **The Rationale:** Candidates focus on the theoretical ML benefits (generalization) and fail to connect spatial priors to concrete hardware execution mechanics like cache locality and register reuse.
    **The Consequence:** Missing the fundamental reason why convolutions map perfectly to systolic arrays and Tensor Cores, leading to poor hardware-software co-design.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN (ResNet-50): 25M params, 4 GFLOPs for 224x224.
    - ViT-B/16: 86M params, 17 GFLOPs for 224x224.
    - CNN kernel: 3x3 at 56x56 resolution.

    **Calculations:**
    - Parameter ratio: 86M / 25M = 3.4x.
    - FLOP ratio: 17 / 4 = 4.25x.
    - CNN weight reuse: for one output channel, the same 3x3 kernel is applied at 56 * 56 = 3136 output positions at that resolution.

    **Conclusion & Interpretation:**
    - **Result: shared local computation reduces parameters and FLOPs.** The 3136 output-position applications provide high potential weight reuse, subject to the hardware cache hierarchy, while ViT global attention pays for interactions across all tokens.
