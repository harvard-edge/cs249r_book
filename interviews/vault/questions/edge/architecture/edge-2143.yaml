title: Knowledge Distillation for Compressing ViT to MobileNet on Hailo-8
scenario: A ViT-B/16 teacher model (86M params, 17 GFLOPS, 81% top-1 on ImageNet) is used to distill a MobileNetV3-small student (2.5M params, 0.06 GFLOPS) for Hailo-8 deployment (26 TOPS INT8, 2.5W). The student baseline accuracy is 67%.
question: With feature-based distillation from ViT-B/16 to MobileNetV3-small on Hailo-8, what top-1 accuracy is realistically achievable?
details:
  realistic_solution: 'Baseline student: 67% top-1. Logit-only distillation (soft targets, temperature T=4): typically adds 1.5-2.5% over hard-label training, reaching about 69%. Feature-based distillation that matches intermediate representations can add another 1-2%, and small-model tuning can add about 0.5-1%. Realistic achievable accuracy is 70-72% top-1. MobileNetV3-small requires about 0.06 GOPS per image. Hailo-8 peak INT8 throughput is 26 TOPS = 26,000 GOPS/s, so the ideal compute floor is 0.06 / 26,000 s = 2.3 microseconds per image. At 30 FPS, the model uses about 1.8 GOPS/s, far below peak. The limiting factor is student capacity and representation alignment, not throughput.'
  common_mistake: |
    **The Pitfall:** Expecting distillation to fully close the accuracy gap between a large teacher and a tiny student.
    **The Rationale:** Candidates overestimate the power of distillation without accounting for the fundamental parameter capacity gap.
    **The Consequence:** Unrealistic accuracy targets are promised to stakeholders that cannot be met by the small edge model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher top-1 accuracy: 81%.
    - Student baseline accuracy: 67%.
    - Target hardware: Hailo-8 (26 TOPS INT8).
    - Student compute cost: 0.06 GOPS/inference.

    **Calculations:**
    - KD gains: +2% (logit) + 1.5% (feature) + 1% (tuning) = ~4.5%.
    - Estimated student top-1: 67% + 4.5% = ~71.5%.
    - Remaining irreducible capacity gap: 81% - 71.5% = 9.5%.
    - Hailo-8 peak throughput: 26 TOPS = 26,000 GOPS/s.
    - Ideal compute floor per image: 0.06 GOPS / 26,000 GOPS/s = 0.0000023s = 2.3 microseconds.
    - Throughput needed at 30 FPS: 0.06 GOPS/frame * 30 frames/s = 1.8 GOPS/s.
    - Peak compute utilization at 30 FPS: 1.8 / 26,000 = 0.000069 = 0.0069%.

    **Conclusion & Interpretation:**
    - **Result: ~71.5% Top-1 (Capacity-Bound)**. Distillation cannot overcome the fundamental parameter capacity gap, even though compute is virtually untouched.
