title: 'LoRA Inference on Jetson Orin: Adapter Fusion Strategy'
scenario: You are deploying a fine-tuned LLM with a LoRA adapter on Jetson Orin.
question: Should you merge the LoRA adapter before deployment or apply it dynamically during inference on Jetson Orin?
details:
  realistic_solution: Prefer merging for a single fixed adapter because it simplifies deployment and removes runtime adapter dispatch, extra small matmuls, and adapter-weight reads. The dynamic LoRA compute at seq_len=1 is usually tiny on Orin, so the decision should be based on measured latency, memory bandwidth, and operational flexibility. Keep dynamic adapters when multiple adapters must be switched or served in the same session; merge when one adapter is fixed for the deployment.
  common_mistake: |
    **The Pitfall:** Always merging adapters for zero inference overhead.
    **The Rationale:** Candidates fail to mathematically quantify the actual overhead of dynamic adapters on edge hardware, assuming the compute penalty is massive.
    **The Consequence:** Losing the flexibility of dynamic multi-LoRA switching for a negligible compute gain, though merging does correctly save memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin GPU compute reference = 275 TOPS INT8.
    - LoRA rank-16 adapter, seq_len=1, d_model=4096.
    - 32 layers.
    - Adapter weights use FP16/BF16, 2 bytes per value.

    **Calculations:**
    - Dynamic LoRA compute per adapted layer = down projection plus up projection = 2 * 4096 * 16 = 131,072 MACs.
    - Across 32 layers = 32 * 131,072 = 4,194,304 MACs per token.
    - If counted as one operation per MAC at 275e12 ops/sec, ideal compute time = 4.19e6 / 275e12 = 1.5e-8 seconds, about 15 ns.
    - Static adapter weight footprint = 32 * 2 matrices * 4096 * 16 * 2 bytes = 8,388,608 bytes, about 8.4 MB.

    **Conclusion & Interpretation:**
    - **Result: negligible ideal compute overhead and about 8.4 MB of adapter weights.** Merging mainly reduces runtime overhead, adapter-weight traffic, and deployment complexity; dynamic adapters are acceptable when flexibility matters and measured latency is small.
