title: Calculate Maximum Context Length on Jetson Orin
scenario: 'You are deploying a 7-billion parameter transformer model on an NVIDIA Jetson Orin for real-time edge inference. The INT8 model weights occupy 7 GB, while the OS and other processes reserve 4 GB.'
question: 'Given the model has 32 layers, 32 KV heads, and a head dimension of 128, what is the maximum batch-1 context length (in tokens) assuming an FP16 KV cache?'
details:
  realistic_solution: 'First, determine the available memory by subtracting the weights and OS reservations from the total memory capacity. Then, calculate the memory required per token for the KV cache based on the model architecture and data type, and divide the available memory by this per-token cost.'
  common_mistake: |
    **The Pitfall:** Forgetting the V in KV Cache or miscalculating FP16 byte size.
    **The Rationale:** Candidates forget that both Keys and Values must be stored, missing a factor of 2.
    **The Consequence:** The context length is wildly overestimated, leading to unexpected Out-Of-Memory errors during extended inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin has 32 GiB memory.
    - Available Memory is 32 GiB - 7 GiB - 4 GiB = 21 GiB.
    - Model has 32 layers, 32 KV heads, 128 head dim, FP16 (2 bytes).

    **Calculations:**
    - Available Memory = 21 * 1024^3 = 22,548,578,304 bytes.
    - KV Cache per token = 2 (K & V) * 32 (layers) * 32 (heads) * 128 (head dim) * 2 bytes (FP16) = 524,288 bytes (0.5 MiB).
    - Max Context Length = 22,548,578,304 / 524,288 = 43,008 tokens.

    **Conclusion & Interpretation:**
    - **Result: 43,008 tokens (Memory-Capacity-Bound)**. The Jetson Orin can safely handle a 43,008 token context window.
