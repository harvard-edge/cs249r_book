title: The Self-Attention Traffic Jam
scenario: You're an ML Systems Engineer on the perception team for an autonomous vehicle. Your pedestrian detection model, a standard Vision Transformer (ViT-Base), is running on a Jetson AGX Orin. It's only achieving 10 FPS, critically missing the 30 FPS (33ms) system deadline. Profiling reveals the self-attention blocks have extremely low arithmetic intensity.
question: What is the most effective change to meet the deadline?
details:
  realistic_solution: 'Replace the architecture with a modern CNN using depthwise separable convolutions (e.g., EfficientNet or a NAS-derived model). Vision Transformers have O(N²) self-attention leading to non-local memory patterns and low arithmetic intensity, making them severely memory-bound. CNNs exhibit high spatial locality and arithmetic intensity, allowing them to fully exploit the Orin''s specialized tensor cores.'
  common_mistake: |
    **The Pitfall:** Applying datacenter-centric optimizations like bigger batches or surface-level quantization.
    **The Rationale:** Engineers focus on peak TOPS and ignore the fundamental mismatch between quadratic attention memory access and edge bandwidth limits.
    **The Consequence:** The model remains memory-bound and continues to miss hard real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin: 275 TOPS, 204.8 GB/s bandwidth
    - ViT config: 224x224 input, 16x16 patches (N=196)

    **Calculations:**
    - Orin Ridge Point: 275,000 GOPs / 204.8 GB/s ~ 1,342 Ops/Byte
    - ViT Self-Attention AI: ~N Ops/Byte = ~196 Ops/Byte (INT8)
    - 196 Ops/Byte << 1342 Ops/Byte

    **Conclusion & Interpretation:**
    - **Result: 196 Ops/Byte (Memory-Bound)**. The ViT's low arithmetic intensity (196) starves the hardware. Switching to depthwise convolutions drastically raises AI above the ridge point.
  options:
  - Apply INT8 quantization to the Vision Transformer and keep the architecture.
  - Increase the Jetson Orin's power mode from 15W to 60W to increase TOPS.
  - Replace the ViT with a MobileNet-style CNN using depthwise separable convolutions.
  - Increase the batch size to better saturate the GPU cores.
  correct_index: 2
