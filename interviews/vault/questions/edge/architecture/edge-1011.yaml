title: 'Fluency: explain MobileNet width multiplier for resource-constrained edge deployment'
scenario: A hardware engineer on your team is deploying a custom product detector on a Hailo-8 (26 TOPS, 2.5W). They ask what a 'width multiplier of 0.5' means for MobileNetV3 and how to choose the right value given the Hailo-8's compute budget.
question: What does a 0.5 MobileNetV3 width multiplier mean, how does it affect FLOPs and accuracy, and which value should Hailo-8 use?
details:
  realistic_solution: A width multiplier α=0.5 halves the channel count in MobileNetV3 layers. Because many convolutions scale both input and output channels, FLOPs scale approximately with α², so 0.5 width is roughly one-quarter the dense-convolution compute of the baseline. It also reduces model capacity, so accuracy usually drops unless the task is very easy. On Hailo-8, choose the width multiplier from the accuracy/latency tradeoff, not from peak TOPS alone. For this 30 FPS detector, α=1.0 is the right starting choice if it fits memory and meets latency; reduce to the smallest α that meets latency only if profiling shows the full-width model misses the target.
  common_mistake: |
    **The Pitfall:** Treating width multiplier as a linear scaler on FLOPs.
    **The Rationale:** Candidates assume halving the width halves the compute, forgetting that both input and output channels are scaled, making the reduction quadratic.
    **The Consequence:** Over-compressing the model and sacrificing accuracy unnecessarily when the hardware has ample headroom.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3-Large Baseline Compute: 0.22 GFLOPs.
    - Hardware Capability: 26 TOPS (26,000 GOPS).
    - Target Framerate: 30 FPS.

    **Calculations:**
    - FLOPs scaling with width multiplier α is quadratic (α²).
    - Per-frame compute at α=0.5: 0.22 GFLOPs * (0.5)² = 0.055 GFLOPs/frame.
    - Per-frame compute at α=0.75: 0.22 GFLOPs * (0.75)² = 0.124 GFLOPs/frame.
    - Per-second work at α=0.75 and 30 FPS: 0.124 GFLOPs/frame * 30 frames/s = 3.72 GFLOP/s, or about 7.43 GOPS if counting multiply-add as two operations.
    - Hailo-8 peak budget: 26 TOPS = 26,000 GOPS, so 7.43 GOPS is about 0.029% of peak.

    **Conclusion & Interpretation:**
    - **Result: Width Multiplier Is Accuracy-Latency Tradeoff, Not Peak-Compute Bound**. α=0.5 means half-width channels, about quarter compute, and usually lower accuracy. On Hailo-8, use α=1.0 if it meets measured latency and memory constraints; shrink only as much as needed to hit the deployment target.
