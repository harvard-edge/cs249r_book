title: Edge PagedAttention Block Tuning
scenario: You are tuning PagedAttention on a Jetson Orin with a strict LPDDR5 bandwidth cap. The edge inference batch size is strictly fixed to 2. Total KV size is 1 MB per token.
question: How would you design a block size strategy to balance fragmentation waste against memory pointer fetch latency?
details:
  realistic_solution: With a tiny batch size of 2, a server-sized block (e.g., 256) wastes up to 255 MB per request due to fragmentation. Conversely, a block size of 1 requires thousands of non-contiguous pointer fetches per step, creating memory latency bubbles. Create a block size of 16 or 32 that aligns perfectly with the 64-byte LPDDR5 cache line size to ensure single-burst pointer fetches while limiting waste.
  common_mistake: |
    **The Pitfall:** Blindly importing server-optimized block sizes (e.g., 256 tokens).
    **The Rationale:** Engineers assume standard cloud-native vLLM configurations map directly to edge deployments, ignoring the vastly different batching characteristics.
    **The Consequence:** Causing an immediate Out-Of-Memory (OOM) error due to massive internal fragmentation on edge workloads that inherently run at low batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV size: 1 MB per token.
    - Batch size: 2.
    - LPDDR5 cache line size: 64 bytes.

    **Calculations:**
    - Server block size waste (block=256): (256 - 1) * 2 seqs * 1 MB = 510 MB wasted overhead.
    - Edge block size waste (block=32): (32 - 1) * 2 seqs * 1 MB = 62 MB wasted overhead.

    **Conclusion & Interpretation:**
    - **Result: Internal Fragmentation Mitigated (Memory-Bound Mitigated)**. Sizing blocks to 16 or 32 perfectly aligns memory pointer fetches to the 64-byte LPDDR5 cache line while bounding fragmentation waste to acceptable levels.
