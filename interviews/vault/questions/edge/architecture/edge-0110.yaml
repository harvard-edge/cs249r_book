title: The Bus Priority Trap
scenario: 'On your SoC, the NPU inference latency fluctuates wildly between 10ms and 45ms, even though no other ML models are running. You notice the jitter increases when more cameras are active.'
question: Based on the SoC architecture diagram, what physical component is causing the NPU to stall?
details:
  realistic_solution: 'The bottleneck is the **Shared LPDDR5 Memory Bus**. In an SoC, the ISP and NPU share the same physical memory controller. ISP writes (from cameras) are typically higher priority to prevent frame drops. The NPU''s memory fetches for weights and activations get queued behind the ISP''s burst writes, causing massive latency jitter. The fix is **Temporal Staggering** (sequentializing camera triggers) or reducing input precision/resolution to lower the bandwidth footprint.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU is struggling to context switch between camera streams.
    **The Rationale:** Candidates look at the software layer and assume task scheduling is the issue, missing the underlying physical hardware contention.
    **The Consequence:** Attempting to solve the issue with software batching when the root cause is massive, uncoordinated DMA write traffic from the ISP.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4x 1080p streams at 60 FPS.
    - 16-bit YUV format.

    **Calculations:**
    - Pixels/sec = 4 * 1920 * 1080 * 60 = 497 million pixels/sec.
    - Bandwidth = 497 million * 2 bytes = ~1 GB/s continuous write traffic.

    **Conclusion & Interpretation:**
    - **Result: ~1 GB/s (Shared Bus Contention).** This saturates the shared bus arbitration logic, stalling the NPU's memory fetches.
