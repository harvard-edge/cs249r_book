title: ADAS SoC L3 Cache Contention
scenario: You are designing an automotive ADAS SoC with an 8-core CPU, a shared 16MB L3 cache, and a discrete NPU sharing LPDDR5 DRAM. When running a Vision Transformer (ViT) on the NPU in isolation, latency is 15ms. When simultaneously running LiDAR point-cloud preprocessing on the CPU, the ViT latency degrades to 42ms.
question: Why does CPU LiDAR preprocessing raise ViT latency from 15ms to 42ms, and how would you isolate memory contention?
details:
  realistic_solution: The degradation is caused by contention in the shared L3 cache hierarchy and LPDDR5 DRAM bus. The CPU's random LiDAR memory traffic can evict cacheable shared working sets from L3 and consume DRAM bandwidth, increasing NPU service time even if the NPU has private SRAM for some tensors. The architectural solution requires strict memory isolation. Implement Cache Quality of Service (QoS) / Cache Allocation Technology (CAT) to partition L3 capacity where the NPU path uses shared cache, and throttle or schedule CPU LiDAR DMA/DRAM traffic so it cannot starve the NPU. Map large streaming NPU buffers as non-cacheable when appropriate to avoid polluting L3.
  common_mistake: |
    **The Pitfall:** Lowering the CPU priority of the LiDAR thread.
    **The Rationale:** This is a scheduling fix rather than an architectural one.
    **The Consequence:** This doesn't stop the cache eviction when the thread actually is scheduled to run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared L3 cache: 16MB.
    - ViT working set: 8MB. LiDAR working set: 12MB.
    - NPU and CPU share LPDDR5 bandwidth; cacheable buffers may also compete in shared L3/LLC.

    **Calculations:**
    - Total required cache: 8MB + 12MB = 20MB (> 16MB L3 capacity).
    - Observed latency penalty = 42ms - 15ms = 27ms.
    - The working-set sum exceeds L3 capacity, so concurrent execution can cause shared-cache thrash for cacheable data.
    - The 27ms added latency is also consistent with DRAM bus contention: the CPU LiDAR stage can delay NPU reads/writes even when tensors are not literally resident in shared L3.

    **Conclusion & Interpretation:**
    - **Result: 27ms extra latency, raising ViT inference to 42ms (Memory-Contention Bound)**. The combined working sets exceed L3 capacity and share DRAM bandwidth, so isolate cache ways where applicable and enforce memory-bandwidth QoS or scheduling for CPU LiDAR preprocessing.
