title: 'Depthwise Convolutions on Jetson Orin'
scenario: 'A vision model is optimized for a Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). Standard 3x3 convolutions are replaced with depthwise separable convolutions, reducing theoretical operations by a factor of roughly 8. However, profiling shows inference latency only improves by a factor of 2, and GPU utilization drops significantly.'
question: 'Why did replacing 3×3 convolutions with depthwise separable convolutions cut FLOPs 8× but improve Orin latency only 2×?'
details:
  realistic_solution: |
    The correct reasoning identifies that depthwise convolutions have a dramatically lower arithmetic intensity (operations per byte of memory accessed) compared to standard convolutions. Standard convolutions reuse the same input activations across multiple output channels, keeping the compute units fed. Depthwise convolutions only apply one filter per input channel, forcing the hardware to read and write feature maps from memory with very little intermediate compute. On a Jetson Orin with massive compute capacity (275 TOPS), the depthwise layers instantly become memory-bandwidth bound, leaving the compute units starving and limiting the expected latency reduction.
  common_mistake: |
    **The Pitfall:** Assuming execution time scales perfectly linearly with theoretical FLOP count reduction.
    **The Rationale:** Engineers focus purely on computational complexity, forgetting that data movement limits modern accelerator performance.
    **The Consequence:** Overestimating latency improvements and being surprised when heavily optimized models become severely memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin limits: 32 GB LPDDR5, 275 TOPS INT8.
    - Feature map: 56x56, 128 channels. Filter: 3x3.

    **Calculations:**
    - Standard Conv OPs: 56 * 56 * 128 * 128 * 3 * 3 * 2 = ~924M OPs.
    - Depthwise OPs: 56 * 56 * 128 * 3 * 3 * 2 = ~7.2M OPs.
    - Memory I/O (Depthwise): Read (401 KB) + Write (401 KB) = 802 KB.
    - Arithmetic Intensity: 7.2M OPs / 802 KB = ~9 OPs/byte.

    **Conclusion & Interpretation:**
    - **Result: ~9 OPs/byte Arithmetic Intensity (Memory-Bound).** With 275 TOPS available, this extremely low arithmetic intensity guarantees the hardware starves for data, severely capping speedup.
