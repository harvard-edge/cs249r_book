title: Depthwise Convolutions on Jetson Orin
scenario: A vision model is optimized for a Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). Standard
  3x3 convolutions are replaced with depthwise separable convolutions, reducing theoretical operations
  by a factor of roughly 8. However, profiling shows inference latency only improves by a factor of 2,
  and GPU utilization drops significantly.
question: Why did replacing 3×3 convolutions with depthwise separable convolutions cut FLOPs 8× but improve
  Orin latency only 2×?
details:
  realistic_solution: Depthwise convolutions have a dramatically lower arithmetic intensity compared to
    standard convolutions. A depthwise separable block includes a pointwise convolution, bringing total
    OPs to ~110M (an 8x reduction). However, the arithmetic intensity drops to ~137 OPs/byte. On an Orin
    with massive 275 TOPS, the layer falls below the ridge point and becomes memory-bandwidth bound, limiting
    the latency improvement to 2x.
  common_mistake: '**The Pitfall:** Assuming execution time scales perfectly linearly with theoretical
    FLOP count reduction.

    **The Rationale:** Engineers focus purely on computational complexity, forgetting that data movement
    limits modern accelerator performance.

    **The Consequence:** Overestimating latency improvements and being surprised when heavily optimized
    models become severely memory-bound.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Jetson Orin limits: 32 GB LPDDR5, 275 TOPS INT8.

    - Feature map: 56x56, 128 channels. Filter: 3x3.


    **Calculations:**

    - Standard Conv OPs: ~924M OPs.

    - DW-Sep OPs (Depthwise + Pointwise): ~7.2M + ~102.7M = ~110M OPs.

    - Memory I/O (DW-Sep): ~802 KB.

    - Arithmetic Intensity: 110M OPs / 802 KB = ~137 OPs/byte.


    **Conclusion & Interpretation:**

    - **Result: ~137 OPs/byte Arithmetic Intensity (Memory-Bound).** The 8x reduction in FLOPs does not
    translate to 8x speedup because the low arithmetic intensity starves the 275 TOPS hardware.

    '
