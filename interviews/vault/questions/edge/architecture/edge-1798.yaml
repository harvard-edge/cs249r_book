title: Multi-Stream Video Analytics on Qualcomm Cloud AI 100
scenario: You are designing an on-premise multi-stream video analytics appliance using the Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system must process as many 30 FPS 1080p camera streams as possible in real-time using an EfficientNet-lite based object detector.
question: How would you modify EfficientNet-lite and batching on the Cloud AI 100 to maximize 30 FPS stream density without becoming memory-bandwidth bound?
details:
  realistic_solution: The optimal approach treats EfficientNet-lite as memory-bandwidth limited, especially in depthwise-heavy blocks. Reduce activation traffic with operator fusion, keep tensors in accelerator-local memory where possible, prefer block shapes that improve reuse on INT8 matrix units, and consider replacing the most bandwidth-heavy depthwise stages with grouped or fused convolutions when profiling shows higher arithmetic intensity. Use small micro-batches drawn across streams to amortize weight reads, but cap the batch size at the point where added activation traffic and latency still fit the 30 FPS deadline. The 32 GB capacity helps hold models and queues; LPDDR4x bandwidth, not capacity, is the limiting resource.
  common_mistake: |
    **The Pitfall:** Assuming that minimizing FLOPs via depthwise separable convolutions automatically maximizes throughput.
    **The Rationale:** Candidates are trained that fewer operations equals faster execution.
    **The Consequence:** They fail to recognize that depthwise convolutions have exceptionally low arithmetic intensity, leading to memory bandwidth bottlenecks on the LPDDR4x interface rather than fully utilizing the 400 TOPS compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - EfficientNet-lite INT8 model requires 2 GOPS per frame.
    - Stream target: 30 FPS.
    - Cloud AI 100 theoretical compute limit: 400 TOPS = 400,000 GOPS using decimal units.
    - LPDDR4x memory bandwidth: ~136 GB/s = 136,000 MB/s decimal.
    - The 5 MB weight and 6 MB activation estimates are decimal MB per frame before batching or fusion.

    **Calculations:**
    - One stream requires 2 GOP/frame * 30 FPS = 60 GOPS.
    - Theoretical compute limit: 400,000 GOPS / 60 GOPS/stream ≈ 6,666 streams.
    - Unbatched memory traffic: 5 MB weights + 6 MB activations = 11 MB/frame. 11 MB * 30 FPS = 330 MB/s per stream.
    - Rough memory limit before latency, PCIe/host overhead, and scheduling losses: 136,000 MB/s / 330 MB/s ≈ 412 streams.

    **Conclusion & Interpretation:**
    - **Result: about 412 streams as a rough unbatched bandwidth upper bound (Memory-Bound)**. The raw compute ceiling is not the useful sizing limit here; batching and fusion mainly help by amortizing weight reads and reducing activation traffic before latency and runtime overhead reduce the practical stream count.
