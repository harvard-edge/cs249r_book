title: Edge TPU Sequence Scaling Bottleneck Analysis
scenario: We deployed a quantized INT8 Vision Transformer on a Google Coral Edge TPU. At a base sequence length of 196 tokens, the model runs efficiently at 15ms per inference. However, when we increase the input resolution to yield 784 tokens, the inference time spikes disproportionately to over 240ms, and we observe heavy PCIe bus traffic and host CPU thrashing.
question: Why does increasing ViT sequence length from 196 to 784 tokens make Coral Edge TPU latency exceed 240ms and trigger host thrashing?
details:
  realistic_solution: 'The spike is driven by the O(n²) space complexity of the self-attention mechanism. When the sequence length increases 4x, the intermediate attention matrices increase 16x. Because the Coral has a strict ~8MB SRAM limit, these massive INT8 activations spill back to the host CPU over the USB/PCIe bus, causing the latency penalty.'
  common_mistake: |
    **The Pitfall:** Assuming compute time and memory scale linearly with input size.
    **The Rationale:** Candidates forget the quadratic complexity of self-attention and the hard physical limits of edge SRAM.
    **The Consequence:** Catastrophic latency regression when processing higher resolution images.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length increase: N=196 to N=784 (4x)
    - Attention scaling: O(N²)
    - Hardware: Coral Edge TPU (~8MB SRAM)

    **Calculations:**
    - Memory scale factor: 4² = 16x increase.
    - Score matrix per head at N=196: ~38KB.
    - Total matrix memory (12 heads) at N=196: ~460KB (Fits in 8MB).
    - Total matrix memory at N=784: 460KB * 16 ~ 7.36MB.
    - 7.36MB + Model Weights > 8MB SRAM limit.

    **Conclusion & Interpretation:**
    - **Result: SRAM Overflow & Host Fallback (Memory-Bound)**. The O(n²) memory footprint exceeds the 8MB SRAM, triggering a fallback to the host CPU over PCIe.
