title: Sequence Length Scaling Bottlenecks in Edge Vision Transformers
scenario: Running a Vision Transformer on Orin. Increasing the patch sequence length from 256 to 1024 increases attention FLOPs quadratically but only increases memory reads linearly.
question: How does increasing ViT patch sequence length from 256 to 1024 shift the execution bottleneck on Orin?
details:
  realistic_solution: Transformers at short sequence lengths often hover near the memory-bound region because weight and activation traffic can dominate the relatively small attention matmuls. As sequence length increases to 1024, full attention compute grows roughly with N^2 while token/KV traffic grows closer to N, so arithmetic intensity rises. The bottleneck therefore tends to move toward compute-bound on Orin, but the exact crossing point depends on model width, heads, layers, batch size, kernel fusion, and memory efficiency.
  common_mistake: |
    **The Pitfall:** Treating sequence length scaling as a linear penalty on edge devices.
    **The Rationale:** This ignores the quadratic compute explosion of full attention.
    **The Consequence:** Deploying a model that severely bottlenecks the system and heavily taxes the edge device's computational capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence lengths scaling from N=256 to N=1024 on Orin.
    - Hold model width, layers, heads, and batch size constant.

    **Calculations:**
    - Full-attention score/value work scales with N^2, so increasing N from 256 to 1024 gives (1024 / 256)^2 = 16x more attention compute for the same model shape.
    - Token, activation, and KV traffic scale closer to N for this comparison, so the same length change gives about 1024 / 256 = 4x more linear memory traffic.
    - Arithmetic intensity therefore rises by roughly 16x / 4x = 4x, before accounting for constants, projection layers, kernel fusion, and cache behavior.

    **Conclusion & Interpretation:**
    - **Result: arithmetic intensity rises about 4x.** The longer sequence is more likely to move toward a compute-bound regime on Orin, but this is a conditional roofline shift rather than a universal guarantee.
