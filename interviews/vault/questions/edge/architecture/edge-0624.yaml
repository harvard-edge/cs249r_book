title: The Unified Automotive Perception Stack Design
scenario: Designing a unified 8-camera perception stack. Must choose CNN, ViT, or hybrid under hard real-time SoC constraints.
question: 'What architecture would you choose for the unified 8-camera perception stack under real-time SoC constraints: CNN, ViT, or a hybrid?'
details:
  realistic_solution: Propose a pragmatic, hybrid approach. Heavy CNN encoders reduce spatial dimensions before projecting limited patches to a lightweight Transformer backend, retaining performance while strictly controlling memory bus traffic.
  common_mistake: |
    **The Pitfall:** Dogmatically choosing "pure ViT" because it's state-of-the-art, or "pure CNN" out of edge conservatism.
    **The Rationale:** Engineers follow AI hype trains without calculating the staggering edge memory bandwidth required by pure self-attention.
    **The Consequence:** Designing an architecture that instantly blows past the real-time latency budget due to immense matrix operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p image (1920x1080), 16x16 patches with padding in height.
    - Jetson Orin bandwidth = 204 GB/s.
    - Budget = 33ms.

    **Calculations:**
    - Patch grid = ceil(1920/16) * ceil(1080/16) = 120 * 68 = 8160 tokens per camera.
    - For 8 cameras, naive full fusion would expose up to 65,280 tokens before any downsampling.
    - Full attention scales as N^2, so even per-camera attention is 8160^2 = 66.6M score entries per layer before value projection and MLP compute.
    - The dominant issue is not reading a stored attention matrix; efficient kernels usually stream or tile attention. The cost pressure comes from quadratic score/value work plus repeated Q/K/V, activation, and weight traffic across layers.
    - A CNN stem that reduces each camera to a compact feature grid before cross-camera attention can cut token count by 16x or more, reducing the quadratic attention term by roughly 16^2 = 256x.

    **Conclusion & Interpretation:**
    - **Result: Quadratic attention pressure dominates naive pure ViT scaling.** The defensible edge design is a hybrid: use CNN or windowed local encoders to reduce spatial tokens, then apply limited global attention only on compact features.
