title: 'The Autonomous Vision System Fork: ViT vs. Specialized CNN'
scenario: 'Your are designing a Level 3 autonomous driving stack. The system must process a 640x640 driver-facing camera stream within a 33ms hard real-time budget on a highly constrained thermal SoC. The model development team has two prototypes: a highly accurate Vision Transformer (ViT) and a MobileNet-style CNN.'
question: Which DMS model should you choose for the constrained SoC, ViT or MobileNet-style CNN, and how would you prove it meets the 33ms budget?
details:
  realistic_solution: |
    Choose the MobileNet-style CNN unless the ViT proves bounded latency on the actual SoC with margin. The CNN has regular memory access, linear scaling with pixels, and depthwise separable layers that are easier to schedule under a hard 33ms deadline. The ViT's global attention and activation traffic create a larger latency tail even when the nominal FLOPs appear to fit.

    Prove the budget with an end-to-end measurement plan: compile the exact model with the target runtime, profile per-layer latency and DRAM traffic at the deployed batch size and precision, include camera ingest and pre/post-processing, run worst-case night/day frames, and report p99 or worst-case latency below 33ms with thermal steady-state power. The proof is measured layer timing plus end-to-end deadline evidence, not a peak-TOPS estimate.
  common_mistake: |
    **The Pitfall:** Assuming highly accurate ViTs can simply be "optimized" to fit edge constraints via standard pruning or quantization.
    **The Rationale:** Candidates trust cloud-based trends showing ViT superiority, ignoring the catastrophic quadratic computational scaling at high resolutions.
    **The Consequence:** Wasting months attempting to deploy a model architecture that is fundamentally mathematically incompatible with the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input resolution: 640x640
    - Hard latency deadline: 33.3ms (30 FPS)
    - Available SoC Compute: ~33.7 effective TOPS (at 15W TDP)
    - ViT example: 16x16 patches, width d=768, 12 transformer layers.
    - MobileNet-style CNN estimate: 1.5 GOPs with depthwise separable convolutions.

    **Calculations:**
    - Max allowed ops per frame = 33.7 TOPS * 0.0333s = 1.12 Tera-operations
    - CNN compute time = 1.5 GOPs / 33.7 TOPS = 0.045ms ideal; even at 10% effective utilization this is ~0.45ms, leaving budget for memory, pre/post-processing, and safety margin.
    - ViT token count = (640/16) * (640/16) = 1,600 tokens.
    - ViT attention score/value work per layer is approximately 2 * N^2 * d = 2 * 1,600^2 * 768 = 3.9 GOPs for QK^T and attention-value multiply, before softmax and memory traffic.
    - ViT projection work per layer is approximately 8 * N * d^2 = 7.5 GOPs.
    - Attention + projections for 12 layers = (3.9 + 7.5) * 12 = 136.8 GOPs before MLP blocks.
    - A transformer MLP commonly adds about 16 * N * d^2 per layer = 15.1 GOPs/layer, or 181.2 GOPs for 12 layers.
    - Total ViT block estimate = 136.8 + 181.2 = 318 GOPs, about 212x the 1.5 GOP CNN. Ideal compute time is 318 / 33,700 = 9.4ms, but the large activation and attention traffic make actual edge latency much less predictable than the CNN under a 33ms hard deadline.

    **Conclusion & Interpretation:**
    - **Result: choose the MobileNet-style CNN and prove it empirically.** The CNN's smaller and more regular workload can be bounded with per-layer timing, DRAM counters, end-to-end p99 latency, and thermal steady-state tests. The ViT needs the same proof, but its global attention traffic and much larger op count make it the risky choice for a constrained 33ms SoC.
