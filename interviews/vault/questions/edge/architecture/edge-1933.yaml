title: Optimizing MobileNetV3 for Edge Deployment on Qualcomm Cloud AI 100
scenario: 'You are tasked with deploying a MobileNetV3-Large model on an edge accelerator. The deployment experiences latency spikes and occasionally exceeds the power envelope.'
question: 'How would you optimize MobileNetV3-Large on the Cloud AI 100 to reduce latency spikes and stay within the 75W power envelope?'
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: (1) Aggressive INT8 post-training quantization, leveraging the 400 TOPS INT8 capability. (2) Analyzing memory access patterns of depthwise and pointwise convolutions to ensure data locality and efficient use of the 32 GB LPDDR4x. This might involve reordering operations or using hardware-specific optimized kernels. (3) Exploring architecture modifications like adjusting width multipliers or input resolution to find the sweet spot for accuracy-latency-power tradeoffs specific to the Qualcomm Cloud AI 100''s performance profile, guided by profiling data.'
  common_mistake: |
    **The Pitfall:** Focusing purely on FLOP reduction without addressing memory access patterns.
    **The Rationale:** Candidates assume lower FLOPs (depthwise convolutions) always translate to lower latency and power.
    **The Consequence:** Memory stalls on the LPDDR4x bus cause unpredictable latency spikes and underutilize the compute cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Compute Peak: 400 TOPS.
    - Model Requirement: 1.5 billion ops (0.0015 TOPS) per inference.
    - Memory Bandwidth limit: 50 GB/s.
    - Data movement per inference: 10 MB.

    **Calculations:**
    - Theoretical compute-bound limit: 400 TOPS / 0.0015 TOPS = 266,666 FPS.
    - Bandwidth-bound limit: 50,000 MB/s / 10 MB = 5,000 FPS.

    **Conclusion & Interpretation:**
    - **Result: The system is memory bandwidth limited to ~5,000 FPS (Memory-Bandwidth-Bound)**.
