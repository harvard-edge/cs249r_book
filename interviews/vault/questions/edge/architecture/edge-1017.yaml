title: 'Mastery: efficient CNN architecture selection for power-constrained edge deployment'
scenario: 'You must select between MobileNetV3-Small (0.056 GFLOPs, 67.4% top-1), EfficientNet-Lite0 (0.35 GFLOPs, 75.1% top-1), and MobileNetV2-0.35x (0.059 GFLOPs, 60.3% top-1) for a wildlife camera running on solar power. The platform is Hailo-8 (26 TOPS, 2.5W) running at 5 FPS.'
question: 'Which of the three MobileNet-family models would you choose for the 5 FPS solar Hailo-8 wildlife camera, and why?'
details:
  realistic_solution: 'At 5 FPS, compute: 0.35G * 5 = 1.75 GOPS. Hailo-8 at 26 TOPS: 0.0067% utilization. Inference power for all three models is virtually identical (~0.01W). Decision framework: (1) accuracy is the primary differentiator (7% gap between worst and best); (2) model size affects SRAM usage (Hailo-8: 24MB) — EfficientNet-Lite0 5.4M params * 1B = 5.4MB, all fit; (3) confidence calibration matters for wildlife classification — EfficientNet-Lite0 better calibrated; (4) choose EfficientNet-Lite0 — 7pp accuracy gain for zero power cost at 5 FPS.'
  common_mistake: |
    **The Pitfall:** Choosing the lowest FLOP model primarily to save power on a high-TOPS accelerator.
    **The Rationale:** Engineers mistakenly assume that model FLOPs directly scale with total system power, ignoring idle power and extreme under-utilization.
    **The Consequence:** A less accurate model is deployed with absolutely no meaningful power savings for the overall system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target platform: Hailo-8 (26 TOPS, 2.5W active power).
    - Frame rate: 5 FPS.
    - System idle power: ~0.5W.

    **Calculations:**
    - Compute utilization at 5 FPS: (5 * 0.35 GOPS) / 26000 GOPS = 0.0067%.
    - Inference active power for Lite0: 2.5W * (5 * 0.35 / 26000) = ~0.00017W.
    - Accuracy gap impact over 1 year: 157M inferences * 7.7% gap = ~12M more correct classifications.

    **Conclusion & Interpretation:**
    - **Result: 0.0067% Utilization (Compute-Bound)**. Selecting smaller FLOP models unnecessarily sacrifices significant accuracy when inference power makes zero dent in overall system idle power.
