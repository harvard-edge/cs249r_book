title: Choose a Hailo-8 Model for a 5 FPS Solar Wildlife Camera
scenario: You must select between MobileNetV3-Small (0.056 GFLOPs, 67.4% top-1), EfficientNet-Lite0 (0.35 GFLOPs, 75.1% top-1), and MobileNetV2-0.35x (0.059 GFLOPs, 60.3% top-1) for a wildlife camera running on solar power. The platform is Hailo-8 (26 TOPS, 2.5W) running at 5 FPS.
question: Which of the three listed models would you choose for the 5 FPS solar Hailo-8 wildlife camera, and why?
details:
  realistic_solution: Choose EfficientNet-Lite0. At 5 FPS its compute demand is only 0.35 GFLOPs/frame * 5 = 1.75 GFLOP/s, which is tiny compared with a 26 TOPS Hailo-8 budget. MobileNetV3-Small and MobileNetV2-0.35x are also far below the throughput limit, so peak compute does not distinguish them. The key tradeoff is accuracy versus a negligible difference in accelerator duty cycle at 5 FPS; EfficientNet-Lite0 gives the best top-1 accuracy (75.1%) and still leaves large latency and power headroom. Avoid claiming power scales linearly to milliwatts from TOPS utilization, because active and system idle power dominate at such low frame rates.
  common_mistake: |
    **The Pitfall:** Choosing the lowest FLOP model primarily to save power on a high-TOPS accelerator.
    **The Rationale:** Engineers mistakenly assume that model FLOPs directly scale with total system power, ignoring idle power and extreme under-utilization.
    **The Consequence:** A less accurate model is deployed with absolutely no meaningful power savings for the overall system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target platform: Hailo-8 (26 TOPS, 2.5W active power).
    - Frame rate: 5 FPS.
    - System idle power: ~0.5W.

    **Calculations:**
    - EfficientNet-Lite0 work: 0.35 GFLOPs/frame * 5 FPS = 1.75 GFLOP/s.
    - Hailo-8 peak: 26 TOPS = 26,000 GOPS.
    - Approximate utilization using the same operation convention: 1.75 GOPS / 26,000 GOPS = 0.0067% if 1 GFLOP is counted as 1 GOP.
    - MobileNetV3-Small work: 0.056 * 5 = 0.28 GFLOP/s.
    - MobileNetV2-0.35x work: 0.059 * 5 = 0.295 GFLOP/s.
    - All three are far below peak; the smaller models save little practical energy once fixed active and system idle power are included.
    - Accuracy advantage: EfficientNet-Lite0 is 75.1% top-1 versus 67.4% and 60.3%.

    **Conclusion & Interpretation:**
    - **Result: Choose EfficientNet-Lite0 (Accuracy-Bound)**. At 5 FPS the accelerator has ample headroom, so use the most accurate listed model unless measured latency, memory, or thermal data show a real deployment constraint.
