title: Knowledge Distillation from Transformer to CNN for Hailo-8
scenario: A ViT-S teacher (22M params, 4.6 GFLOP, INT8=22MB) achieves 79% on COCO person detection. A
  ResNet-18 student (11M params, 1.8 GFLOP, INT8=11MB) achieves 71% without distillation.
question: What accuracy gain can feature distillation from ViT-S to ResNet-18 deliver on Hailo-8, and
  what representation issues arise?
details:
  realistic_solution: Direct feature matching requires projection layers because ViT uses patch tokens
    while ResNet-18 uses spatial feature maps. Using intermediate feature map distillation at matching
    spatial resolutions with an L2 projection head typically recovers 3-4% mAP of the 8% gap between the
    teacher and student.
  common_mistake: '**The Pitfall:** Directly matching ViT attention maps to CNNs.

    **The Rationale:** Candidates forget CNNs don''t have attention maps natively.

    **The Consequence:** The distillation pipeline fails without projecting to a common representation
    space.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Teacher (ViT-S) Accuracy: 79%.

    - Student (ResNet-18) Accuracy: 71%.

    - Distillation Recovery: Typically 30-50% of the accuracy gap.


    **Calculations:**

    - Accuracy Gap = 79% - 71% = 8%.

    - Expected Gain = 8% * 0.40 = 3.2%.


    **Conclusion & Interpretation:**

    - **Result: ~3% mAP Gain (Representation-Bound)**. Proper projection between token and spatial representations
    is required to achieve this gain.

    '
