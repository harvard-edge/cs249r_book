title: Knowledge Distillation from Transformer to CNN for Hailo-8
scenario: A ViT-S teacher (22M params, 4.6 GFLOP, INT8=22MB) achieves 79% on COCO person detection. A ResNet-18 student (11M params, 1.8 GFLOP, INT8=11MB) achieves 71% without distillation.
question: What mAP gain can feature distillation from ViT-S to ResNet-18 deliver on Hailo-8, and what representation issues arise?
details:
  realistic_solution: Direct feature matching requires projection layers because ViT uses patch tokens while ResNet-18 uses spatial feature maps. Using intermediate feature map distillation at matching spatial resolutions with an L2 projection head might recover roughly 3-4 percentage points of mAP from the 8-point teacher-student gap, but the actual gain depends on the distillation loss, projection design, calibration data, and training recipe.
  common_mistake: |
    **The Pitfall:** Directly matching ViT attention maps to CNNs.
    **The Rationale:** Candidates forget CNNs don't have attention maps natively.
    **The Consequence:** The distillation pipeline fails without projecting to a common representation space.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher (ViT-S) person-detection mAP: 79%.
    - Student (ResNet-18) person-detection mAP: 71%.
    - Distillation Recovery: rough expectation of 30-50% of the mAP gap, not a guaranteed result.

    **Calculations:**
    - mAP gap = 79% - 71% = 8 percentage points.
    - Midpoint estimate = 8 * 0.40 = 3.2 percentage points.

    **Conclusion & Interpretation:**
    - **Result: roughly 3-4 percentage points of possible mAP recovery (Representation-Bound).** Projection layers are needed for representation compatibility, but achieving the gain depends on the full distillation recipe.
