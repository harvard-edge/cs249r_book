title: 'Specification: define CNN model requirements for Hailo-8 production deployment'
scenario: You are writing the model specification for a Hailo-8-based embedded vision product (26 TOPS, 2.5W). The product must classify 20 product categories at 30 FPS using a MobileNet-family backbone.
question: What complete model specification would you write for a 20-class, 30 FPS MobileNet-family classifier on Hailo-8?
details:
  realistic_solution: Enforce strict constraints ensuring compiler compatibility with the Hailo Dataflow Compiler (DFC). Channel dimensions must be evenly divisible by 4. Operator blocks must avoid unmapped routines (e.g., Squeeze-and-Excitation). Quantization targets INT8 format with <2% metric drop. Set execution FLOP boundaries under 0.5 GFLOPs to retain massive thermal headroom, and limit input footprints to 224x224 to fully stabilize in the 14MB local SRAM.
  common_mistake: |
    **The Pitfall:** Issuing broad GFLOP constraints while completely ignoring strict hardware compiler limitations.
    **The Rationale:** Candidates architect generic mobile models, forgetting that static dataflow accelerators rely on rigidly mapped topological layouts.
    **The Consequence:** The model outright crashes the Hailo DFC compilation stage, completely preventing deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Goal: 0.5 GFLOPs at 30 FPS.
    - Hailo-8 Peak: 26 TOPS (26,000 GOPS), 2.5W TDP.
    - Architecture requires ~5M INT8 parameters.

    **Calculations:**
    - Actual Workload: 0.5 GFLOPs * 30 = 15 GOPS.
    - Utilization: 15 GOPS / 26,000 GOPS = 0.058%.
    - Weights Storage: 5M * 1 byte = 5 MB.

    **Conclusion & Interpretation:**
    - **Result: 0.058% Utilization (Massive Hardware Headroom)**. Utilizing 0.058% of TOPS effortlessly meets the 2.5W thermal limit while keeping operations within SRAM.
