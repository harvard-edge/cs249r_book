title: 'Specification: define CNN model requirements for Hailo-8 production deployment'
scenario: You are writing the model specification for a Hailo-8-based embedded vision product (26 TOPS, 2.5W). The product must classify 20 product categories at 30 FPS using a MobileNet-family backbone.
question: Which key model constraints should you check for a 20-class, 30 FPS MobileNet-family classifier on Hailo-8?
details:
  realistic_solution: Check a small set of deployment constraints rather than writing a full architecture specification. The model should have 20 output classes, meet 30 FPS after Hailo compilation, use Hailo-supported operators, quantize cleanly to INT8 with an acceptable accuracy drop, and keep input size, activation footprint, and weights within the device memory budget. A MobileNet-family model around 224x224 input and under about 0.5 GFLOPs/frame would leave large compute headroom on Hailo-8.
  common_mistake: |
    **The Pitfall:** Issuing broad GFLOP constraints while completely ignoring strict hardware compiler limitations.
    **The Rationale:** Candidates architect generic mobile models, forgetting that static dataflow accelerators rely on rigidly mapped topological layouts.
    **The Consequence:** The model outright crashes the Hailo DFC compilation stage, completely preventing deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Goal: 0.5 GFLOPs at 30 FPS.
    - Hailo-8 Peak: 26 TOPS INT8 peak throughput, 2.5W TDP.
    - Architecture requires ~5M INT8 parameters.
    - Hailo deployment is gated by compiler support, quantization behavior, input shape, activation footprint, and mapped graph memory.

    **Calculations:**
    - Actual Workload: 0.5 GFLOPs * 30 = 15 GOPS.
    - Peak-throughput sanity check only: 15 GOPS / 26,000 GOPS = 0.058% of advertised INT8 peak, before considering operator mix or compiler mapping.
    - Weights Storage: 5M * 1 byte = 5 MB.
    - The 5 MB weight estimate is a device-memory and streaming-budget check, not proof that all weights and activations fit in on-chip SRAM.
    - Required release checks: Hailo-supported ops, static input shape, INT8 calibration accuracy, compiled FPS >= 30, activation memory within compiler limits, and thermal behavior at sustained load.

    **Conclusion & Interpretation:**
    - **Result: Compiler and memory mapping bound, not raw TOPS bound**. The compute budget is small on paper, but the model is acceptable only if the Hailo compiler maps the graph, quantization preserves accuracy, and the activation/weight footprint fits the device execution plan.
