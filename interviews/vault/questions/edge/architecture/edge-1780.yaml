title: 'Hailo-8 Local Memory Architecture Recall'
scenario: 'Your team is evaluating a Hailo-8 accelerator (26 TOPS INT8, 2.5W) for deploying a series of edge vision models. Before estimating the model size constraints for the device itself, you need to establish the hardware baseline.'
question: 'What is the capacity of the onboard local DRAM on a Hailo-8 chip available for storing model weights and activations?'
details:
  realistic_solution: 'The correct answer is that the Hailo-8 has zero (no) local DRAM. It uses a unique dataflow architecture where distributed on-chip SRAM holds intermediate compute states, and model weights are continuously streamed from the host system''s memory over the host interface.'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo-8 operates like a mobile GPU with dedicated onboard DRAM.
    **The Rationale:** Engineers are used to architectures like TPUs or GPUs that have gigabytes of LPDDR4/5.
    **The Consequence:** Incorrect memory constraint calculations that fail to realize models must be streamed from the host.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 accelerator architecture.
    - Model size: 25M parameters (INT8).

    **Calculations:**
    - Hailo-8 Onboard DRAM: 0 GB.
    - Host Memory Footprint: 25,000,000 parameters * 1 byte = 25 MB.

    **Conclusion & Interpretation:**
    - **Result: 0 GB Local DRAM (Memory-Bound)**. The Hailo-8 dataflow architecture streams weights from the host, so all models must reside in the host's DRAM.
