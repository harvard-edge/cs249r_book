title: 'Hardware-Aware NAS for Edge TPU Real-Time Inference'
scenario: 'You are leading the deployment of a real-time object detection model on a fleet of drones equipped with the Google Coral Edge TPU. The system must operate within a strict 2W power budget and achieve at least 30 FPS. Since the Edge TPU provides 4 TOPS but requires fully INT8 quantized models and has limited operator support, standard off-the-shelf architectures like MobileNetV3 often suffer from latency bottlenecks due to fallback to the host CPU for unsupported operations.'
question: 'How would you design a hardware-aware NAS for Coral Edge TPU that meets 30 FPS, 2W, INT8, and operator-compatibility constraints?'
details:
  realistic_solution: 'The optimal design involves a proxy-less or hardware-in-the-loop NAS where the search space is pre-filtered to include only Edge TPU-compatible operations (e.g., standard convolutions, depthwise convolutions, avoiding certain non-linearities like Swish if not fully supported without fallback). The reward function must jointly evaluate INT8 quantized accuracy (using Quantization-Aware Training during the evaluation phase) and on-device latency (or a highly accurate latency lookup table profiled directly on the Coral). By embedding the quantization and operator constraints directly into the search space and using measured latency rather than theoretical FLOPs as the cost metric, the NAS will converge on a model that fully utilizes the 4 TOPS accelerator without costly host CPU context switches.'
  common_mistake: |
    **The Pitfall:** Proposing a generic NAS approach (e.g., DARTS) optimizing only for FLOPs or parameter count.
    **The Rationale:** Candidates fail to explicitly incorporate the Edge TPU's specific INT8 quantization requirements and operator whitelist into the search space.
    **The Consequence:** The NAS converges on a model that fits the FLOP budget but falls back to the CPU for unsupported operators, completely missing the 30 FPS latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency: 30 FPS = 33.3 ms per frame.
    - Edge TPU Peak Compute: 4 TOPS (INT8).
    - Effective compute at ~30% utilization: 1.2 TOPS.

    **Calculations:**
    - Available operations per frame: 1.2 TOPS / 30 FPS = 40 GOPs.
    - A single CPU fallback incurs a 5-10 ms penalty, destroying the 33.3 ms budget.

    **Conclusion & Interpretation:**
    - **Result: 40 GOPs (Compute-Bound)**. The NAS must constrain the search space to 100% TPU-compatible operations and < 40 GOPs to meet the 30 FPS and 2W limits.
