title: 'The Autonomous Perception Stack Redesign: Neural Architecture Search'
scenario: 'You are the new Staff ML Systems Engineer for the perception team at an autonomous vehicle company. The research team has produced a state-of-the-art Vision Transformer (ViT) that achieves 99% accuracy on your internal benchmarks. However, it was designed in the cloud with A100s. When benchmarked on the target hardware, a 60W NVIDIA Jetson AGX Orin, it runs at a dismal 2 FPS and consumes 100W, tripping the thermal breakers. The model has two heads: one for 3D object detection and another that generates brief textual descriptions of complex scenes. The product requirement is a strict 30 FPS inference rate with a power budget under 40W.'
question: 'How do you integrate techniques like distillation, pruning, FlashAttention, operator fusion, and speculative decoding to meet the goal?'
details:
  realistic_solution: 'First, apply model distillation and structured pruning to reduce the raw compute and memory footprint. Second, replace standard attention with FlashAttention-2 to transition from memory-bandwidth-bound to compute-bound, maximizing Orin GPU utilization. Third, employ TensorRT for operator fusion and INT8 quantization. Finally, for text generation, use speculative decoding with a lightweight drafter model to validate tokens in parallel.'
  common_mistake: 'Proposing a single silver bullet solution like just use INT8 quantization, ignoring that the model is fundamentally memory-bound. Applying optimizations in the wrong order is also a frequent pitfall.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin compute: ~200 INT8 TOPS, memory bandwidth: ~150 GB/s.
    - Model: 300 GOPs ViT with 1024 patches (N=1024), 12 heads, 12 layers.

    **Calculations:**
    - Attention read/write per inference: 1024 * 1024 * 12 * 12 = ~150MB.
    - Memory transfer time for attention: 150MB / 150 GB/s = 1ms.
    - Compute time: 300 GOPs / 200 TOPS = 1.5ms.
    - Total theoretical inference time: 1ms + 1.5ms = 2.5ms.

    **Conclusion & Interpretation:**
    - **Result: 2.5ms (Compute-Bound with FlashAttention)**. Re-architecting with FlashAttention and INT8 quantization easily resolves the 30 FPS requirement.
