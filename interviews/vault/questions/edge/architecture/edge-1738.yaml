title: Encoder-Decoder Sizing on Qualcomm AI 100
scenario: You are deploying an on-premise translation service on a cluster of Qualcomm Cloud AI 100 accelerators. The system needs to maximize throughput while adhering to strict power and memory limits. You must decide whether to deploy a 7B parameter decoder-only model or a 3B parameter encoder-decoder model.
question: Which translation model would you deploy on Cloud AI 100, the 7B decoder-only or 3B encoder-decoder, and how would you batch it?
details:
  realistic_solution: Deploy the 3B parameter encoder-decoder model with dynamic batching. Translation benefits from a bidirectional encoder over the source text plus a smaller autoregressive decoder, and the 3B footprint leaves more memory headroom for KV cache, encoder states, and runtime buffers. Use length-bucketed dynamic batches, starting around 64 requests and raising toward the low hundreds only when measured latency and memory headroom allow it.
  common_mistake: |
    **The Pitfall:** Assuming decoder-only models are universally superior.
    **The Rationale:** The dominance of decoder-only LLMs (like GPT/Llama) biases candidates towards selecting them for all generative tasks.
    **The Consequence:** On this translation setup, the larger decoder-only model spends more memory on weights and KV cache, reducing feasible batch size and hurting throughput per watt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Qualcomm Cloud AI 100.
    - Memory Limit: 32 GB.
    - 7B Decoder-only (INT8): 7 GB weights.
    - 3B Encoder-Decoder (INT8): 3 GB weights.
    - Decoder KV cache per generated token: 256 KB for the 7B model, 128 KB for the smaller 3B decoder.
    - Sequence length: 1024 tokens.
    - Reserve 4 GB for runtime buffers, encoder states, and fragmentation.

    **Calculations:**
    - 7B KV cache per request: 1024 tokens * 256 KB = 256 MB.
    - 7B available cache memory: 32 GB - 7 GB - 4 GB = 21 GB, giving about 21,000 MB / 256 MB = 82 active requests.
    - 3B decoder KV cache per request: 1024 tokens * 128 KB = 128 MB.
    - 3B available cache memory: 32 GB - 3 GB - 4 GB = 25 GB, giving about 25,000 MB / 128 MB = 195 active requests before latency limits.

    **Conclusion & Interpretation:**
    - **Result: choose the 3B encoder-decoder with dynamic batches around 64-128 requests (Memory-Bound)**. The theoretical memory ceiling is roughly 195 active 1024-token requests, but production batching should leave latency and runtime headroom.
