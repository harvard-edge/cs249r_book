title: Designing an Efficient MobileNet for Google Coral Edge TPU
scenario: You are tasked with deploying a real-time object detection model on a fleet of smart cameras. The model needs to classify at least 50 frames per second (FPS) with a latency under 20ms per inference, while operating within a strict power budget of 2W. The hardware provides 4 TOPS for INT8 operations, and only supports INT8 inference. You are considering using a MobileNetV2 architecture.
question: 'How would you design and optimize MobileNetV2 for 50 FPS under 20ms and 2W on the INT8-only TPU?'
details:
  realistic_solution: 'The solution would involve starting with a MobileNetV2 architecture, leveraging its inverted residual blocks and depthwise separable convolutions for computational efficiency. Given the INT8-only capability, quantisation-aware training (QAT) would be crucial during the fine-tuning phase to maintain accuracy. The model should be designed with a judicious choice of width and resolution multipliers to balance accuracy and latency. Profiling on the target hardware is essential to understand actual latency and power consumption.'
  common_mistake: |
    **The Pitfall:** Directly quantizing a floating-point trained model without Quantization-Aware Training (QAT).
    **The Rationale:** Candidates focus solely on FLOP reduction without considering INT8-only hardware constraints and numerical degradation during basic post-training quantization.
    **The Consequence:** The deployed model suffers massive accuracy drops, or achieves low theoretical FLOPs but poor actual latency due to sub-optimal INT8 memory access.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware limits: 4 TOPS (INT8), 2W.
    - Target: 50 FPS, <20 ms latency.
    - MobileNetV2 requires ~300-600 MFLOPS.

    **Calculations:**
    - Max ops budget per frame = 4 TOPS / 50 FPS = 80 GOPS/frame.
    - 600 MFLOPS (0.6 GOPS) is significantly smaller than the 80 GOPS budget.

    **Conclusion & Interpretation:**
    - **Result: 80 GOPS budget > 0.6 GOPS required (Memory/Compiler-Bound)**. Performance limitations will arise from memory bottlenecks or unsupported compiler ops, not raw compute.
