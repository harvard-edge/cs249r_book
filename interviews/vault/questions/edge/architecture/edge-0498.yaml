title: 'The Drone''s Dropped Frames'
scenario: 'You are an ML Systems Engineer at an autonomous drone company. Your perception model, a Vision Transformer (ViT), is causing the flight controller to miss its 33ms (30 FPS) frame processing deadline on a Jetson AGX Orin. nvsmi shows the GPU is at 100% utilization, but the effective TOPS are far below the device''s peak 275 TOPS. A teammate suggests replacing the ViT with a MobileNetV3, which uses depthwise separable convolutions, claiming it will be faster.'
question: 'Using arithmetic intensity, why is the ViT bottlenecked on the Orin and why would MobileNetV3 likely be faster?'
details:
  realistic_solution: 'The diagnosis is a memory bandwidth bottleneck. The Vision Transformer''s self-attention mechanism has low Arithmetic Intensity (AI) because it performs many non-local memory accesses for its all-to-all patch comparisons. The Jetson AGX Orin has a high Ridge Point (~1,342 Ops/Byte), meaning it requires high-AI workloads to achieve peak performance. Since the ViT''s AI is below the Orin''s Ridge Point, it is memory-bound. A MobileNetV3, using depthwise separable convolutions, has much higher data reuse and therefore higher AI. This makes it compute-bound on the Orin, allowing it to better saturate the powerful compute cores and achieve performance closer to its peak TOPS rating, thus meeting the real-time deadline.'
  common_mistake: |
    **The Pitfall:** Confusing 100% GPU utilization with 100% computational throughput.
    **The Rationale:** A GPU can report 100% utilization while its ALUs are mostly stalled waiting for data from memory. Engineers assume Transformers are just "slow" without understanding the hardware-specific reason.
    **The Consequence:** Spending time optimizing compute kernels when the fundamental issue is memory bandwidth starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin Ridge Point: ~1,342 Ops/Byte.
    - ViT Self-Attention Arithmetic Intensity (AI): Low, due to non-local memory accesses for all-to-all patch comparisons.
    - MobileNetV3 (CNN) Arithmetic Intensity: High, due to significant spatial locality and data reuse in depthwise/pointwise convolutions.

    **Calculations:**
    - ViT AI < 1,342 Ops/Byte, placing it on the memory-bound slope of the Roofline model.
    - MobileNetV3 AI is higher, pushing it closer to being compute-bound.

    **Conclusion & Interpretation:**
    - **Result: ViT AI < 1,342 Ops/Byte (Memory-Bound)**. MobileNetV3 utilizes the Orin's 275 TOPS more efficiently, resolving the bottleneck.
  options:
  - 'The ViT is memory-bandwidth-bound due to the low arithmetic intensity of attention; the CNN''s higher arithmetic intensity makes it compute-bound and a better fit for the Orin''s architecture.'
  - 'The GPU is at 100%, so the system is thermally throttling. A new model won''t help until we add a bigger heatsink.'
  - 'The ViT model is too large and is causing slow data swapping from NVMe storage, which is the bottleneck.'
  - 'The model has too many layers. Reducing the depth of the ViT is the only way to meet the latency target, as model family doesn''t matter.'
