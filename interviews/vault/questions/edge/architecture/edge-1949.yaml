title: 'Edge Deployment Tradeoffs: Encoder-Decoder Architectures on Jetson Orin'
scenario: You are tasked with deploying a natural language processing (NLP) model for real-time text analysis on an edge platform. The core requirement is to perform both text classification and short-form text summarization.
question: Which NLP architecture would you choose on the edge for both classification and summarization, and how would you meet memory, latency, and power limits?
details:
  realistic_solution: |
    Use one coherent multi-task deployment architecture: a compact, distilled encoder-decoder model with a shared encoder, a lightweight classification head on the encoder representation, and a constrained decoder for short summaries. This keeps classification single-pass while still supporting abstractive summarization without deploying unrelated model families. Quantize weights and supported activations to INT8 where accuracy holds, keep sequence lengths and output summary length bounded, and use batching only if it does not violate latency. Validate memory traffic, decoder token latency, and sustained power on the edge platform; if summarization misses the budget, use extractive summarization or a smaller distilled encoder-decoder rather than adding a separate large decoder-only model.
  common_mistake: |
    **The Pitfall:** Selecting a large, general-purpose transformer model without significant quantization.
    **The Rationale:** Candidates assume edge devices with large RAM can comfortably run massive models without hardware-specific optimization.
    **The Consequence:** This leads to massive memory bandwidth saturation, severe inference latency, and thermal throttling from exceeding the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge platform: 275 TOPS INT8 compute, 60W limit, 64GB LPDDR5.
    - Target: 30 requests/s.
    - Distilled encoder-decoder weights: 300M parameters after compression.
    - INT8 model size: 300 MB.
    - Example compute: 30 GOPS encoder pass plus 10 GOPS per generated summary token.
    - Summary cap: 20 generated tokens.

    **Calculations:**
    - Classification-only request: ~30 GOPS.
    - Summarization request: 30 GOPS encoder + 20 * 10 GOPS decoder = 230 GOPS.
    - Worst-case 30 summarization requests/s: 30 * 230 GOPS = 6900 GOPS/s = 6.9 TOPS.
    - Compute utilization at peak rating: 6.9 / 275 = ~2.5%.
    - If 300 MB of weights were streamed once per request at 30 requests/s, lower-bound weight traffic is 9 GB/s, before activations and KV/cache traffic.
    - Power budget at 30 requests/s is 60 J/s / 30 = 2 J/request, so measured energy must include decoder length and memory traffic.

    **Conclusion & Interpretation:**
    - **Result: Compact Shared Encoder-Decoder Is Feasible If Decoder Length And Memory Traffic Stay Bounded**. Peak TOPS is not the limiting estimate; sustained latency and power depend on output length, operator efficiency, and LPDDR5 traffic.
