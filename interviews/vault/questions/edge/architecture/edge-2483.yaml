title: Vision Transformer Memory Spillage
scenario: An L4 autonomous driving module on an LPDDR5X-class edge SoC receives 10 GB/s of sensor data and runs a compact 50-GFLOP Vision Transformer at 60 FPS with 204.8 GB/s unified memory bandwidth.
question: Evaluate why memory bandwidth bottlenecks a 50-GFLOP Vision Transformer despite the 204.8 GB/s limit, and propose a memory-fusion strategy?
details:
  realistic_solution: The 204.8 GB/s LPDDR ceiling is exceeded by repeated spills of attention intermediates and activation tensors, not by the 10 GB/s sensor input. In an unfused Vision Transformer, multi-head self-attention can materialize large score/probability tensors and write them to DRAM between kernels across many layers. Kernel fusion techniques such as FlashAttention-style tiled attention keep the attention matrix and softmax intermediates in local SRAM/registers, reducing DRAM traffic enough to recover throughput.
  common_mistake: |
    **The Pitfall:** Assuming the uncompressed 10 GB/s sensor data stream is the primary memory bottleneck.
    **The Rationale:** Candidates look at the large input pipe and ignore the quadratic read/write amplification of un-fused intermediate activations.
    **The Consequence:** Optimizations focus on input compression rather than implementing flash attention or kernel fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5X-class unified memory bandwidth: 204.8 GB/s.
    - Input stream: 10 GB/s.
    - Compact Vision Transformer: 50 GFLOPs/frame at 60 FPS.
    - Unfused attention and MLP kernels repeatedly write and reread intermediate activations from DRAM.

    **Calculations:**
    - Example tensor inventory: 24 blocks, about 1024 tokens, 12 heads, FP16 intermediates.
    - One attention score or probability tensor per block is 12 * 1024 * 1024 * 2 bytes = 25.2 MB.
    - If unfused kernels write and reread both score and probability tensors, attention alone can generate about 4 * 25.2 MB = 100.8 MB/block of DRAM traffic.
    - Add roughly 65 MB/block for QKV, projection, residual, and MLP intermediate read/write traffic, giving about 166 MB/block.
    - Total intermediate DRAM traffic = 166 MB/block * 24 blocks = 3,984 MB/frame, about 4 GB/frame.
    - Internal bandwidth at 60 FPS = 4 GB/frame * 60 = 240 GB/s of total intermediate read/write traffic.
    - Total with sensor stream ≈ 240 GB/s + 10 GB/s = 250 GB/s, above the 204.8 GB/s limit.
    - If tiled/fused attention cuts intermediate DRAM traffic by half, internal bandwidth falls to about 120 GB/s; adding the 10 GB/s sensor stream gives about 130 GB/s, below the memory limit.

    **Conclusion & Interpretation:**
    - **Result: ~250 GB/s unfused demand, reduced to ~130 GB/s with fusion (Memory-Bandwidth-Bound).** The bottleneck comes from transformer intermediate spills, and tiled/fused attention fixes it by keeping attention and activation intermediates in local SRAM/registers instead of DRAM.
