title: T4 Edge Dynamic Batching for Strict 50ms SLA
scenario: A T4 edge server must meet a strict 50ms latency SLA for a dynamic workload. The model takes 10ms of baseline overhead plus 2ms per item in the batch.
question: How should you choose the dynamic batching timeout and max batch size to meet the 50ms SLA?
details:
  realistic_solution: |
    Choose an explicit timeout and max batch size whose worst-case wait plus compute time stays under 50ms. A balanced choice is a 25ms batching timeout with max batch size 7: the compute time is 10ms + 2ms * 7 = 24ms, so worst-case latency is 25ms + 24ms = 49ms. Larger batches are possible only if the timeout is shortened; for example N=10 needs 30ms of compute, leaving at most 20ms of wait.
  common_mistake: |
    **The Pitfall:** Setting the timeout exactly to the SLA limit.
    **The Rationale:** This forgets that the actual model computation time will subsequently push the total latency beyond the strict SLA.
    **The Consequence:** The total latency consistently breaches the 50ms SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: 50ms.
    - Model compute: 10ms + 2ms * N.

    **Calculations:**
    - Wait_Time + Compute_Time <= 50ms.
    - General constraint: Timeout <= 50ms - (10ms + 2ms * N).
    - For a 25ms timeout: 10 + 2N <= 25 -> 2N <= 15 -> N = 7 max batch size.
    - Other valid operating points trade batch size for wait time; for example N=10 needs 30ms compute, so timeout must be <=20ms.

    **Conclusion & Interpretation:**
    - **Result: 25ms timeout with N=7 is one valid operating point (SLA-Bound)**. It gives worst-case latency of 25ms + 24ms = 49ms; larger batches require shorter timeouts.
