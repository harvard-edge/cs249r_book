title: T4 Edge Dynamic Batching for Strict 50ms SLA
scenario: A T4 edge server must meet a strict 50ms latency SLA for a dynamic workload. The model takes
  10ms of baseline overhead plus 2ms per item in the batch.
question: How should you choose the dynamic batching timeout and max batch size to meet the 50ms SLA?
details:
  realistic_solution: Dynamic batching groups asynchronous requests over a time window. To strictly guarantee
    the 50ms SLA, the sum of the maximum wait time (timeout window) and the compute time (10ms + 2ms *
    N) must not exceed 50ms. The tradeoff balances throughput (larger N) against the timeout window. A
    larger timeout catches more requests but requires smaller batches to finish in time. An optimal balance
    splits the budget evenly.
  common_mistake: '**The Pitfall:** Setting the timeout exactly to the SLA limit.

    **The Rationale:** This forgets that the actual model computation time will subsequently push the
    total latency beyond the strict SLA.

    **The Consequence:** The total latency consistently breaches the 50ms SLA.'
  napkin_math: '**Assumptions & Constraints:**

    - SLA: 50ms.

    - Model compute: 10ms + 2ms * N.


    **Calculations:**

    - Wait_Time + Compute_Time <= 50ms.

    - Splitting evenly: Wait_Time = 25ms, Compute_Time <= 25ms.

    - 10 + 2N <= 25 -> 2N <= 15 -> N = 7 max batch size.


    **Conclusion & Interpretation:**

    - **Result: N=7 (Compute-Bound)**. Throughput is 7 items / 50ms = 140 items/sec.

    '
