title: PEFT Memory Budgets on Jetson Orin for On-Device Fine-tuning
scenario: An edge robotics system needs to continuously fine-tune a 1B parameter model on-device using LoRA as new task demonstrations are collected.
question: What memory budget and training throughput should you expect for on-device LoRA fine-tuning of a 1B model on Jetson Orin?
details:
  realistic_solution: For training, the frozen 1B BF16 base weights must be resident with LoRA state, activations, and optimizer buffers; inference can deploy only the base plus adapter or a merged artifact without optimizer state. The base weights require about 2GB. LoRA rank-8 adapters for hidden_dim=2048 across 24 adapted layers have 2*8*2048*24 = 786,432 trainable params, or about 1.6MB in BF16. Adam keeps two FP32 moment buffers, and some mixed-precision setups also keep FP32 master adapter weights; under that explicit assumption optimizer-related memory is 786,432*(4+4+4) = 9.4MB. Activations for batch=1, seq=512 are workload-dependent; assume roughly 0.5GB only after profiling or checkpointing. If profiling estimates one step at about 3 TFLOP and sustained Orin FP16 throughput is 30 TFLOP/s, the ideal compute lower bound is 0.1s, or at most 10 steps/sec before memory bandwidth, thermal limits, and concurrent inference.
  common_mistake: |
    **The Pitfall:** Treating edge LoRA training like cloud training and assuming unlimited memory.
    **The Rationale:** Candidates forget that the Orin has unified LPDDR5 shared between CPU and GPU, lacking dedicated GPU memory.
    **The Consequence:** Choosing batch sizes or sequence lengths that exhaust the shared memory pool and crash the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 1B model in BF16 = 2 GB.
    - LoRA adapters: rank-8, hidden_dim=2048, 24 adapted layers.
    - Adapter params = 2 * 8 * 2048 * 24 = 786,432 params.
    - Adapter weights: BF16 = 786,432 * 2 bytes = 1.6 MB.
    - Training optimizer memory assumption: Adam two FP32 moments plus optional FP32 master adapter weights = 786,432 * 12 bytes = 9.4 MB.
    - Activations: assume ~0.5 GB for batch=1, seq=512 after profiling/checkpointing.
    - Sustained training throughput reference: 30 TFLOP/s FP16.
    - Per-step compute estimate is a profiling-derived lower-bound input, not derived from parameter count alone.

    **Calculations:**
    - Trainable-state memory = 1.6 MB + 9.4 MB = 11 MB.
    - Training-time rough memory = 2.0 GB base weights + 0.011 GB trainable state + 0.5 GB activations = about 2.5 GB, before allocator/workspace overhead.
    - Inference-time adapter memory excludes optimizer state and activations scale with the inference batch/sequence.
    - Profiling-derived compute per step = ~3 TFLOP.
    - Ideal lower-bound step time = 3 TFLOP / 30 TFLOP/s = 0.1s per step.
    - Upper-bound training throughput before overheads = 1 / 0.1s = 10 steps/sec.
    - If only 650ms/sec is available for background training, budgeted throughput = 0.65s / 0.1s = 6.5 steps/sec before overheads.

    **Conclusion & Interpretation:**
    - **Result: about 2.5GB training memory before overhead and 100ms/step ideal lower-bound latency (Compute-Bound).** A 5-6 steps/sec background target is plausible only after reserving time for inference and accounting for bandwidth, thermals, and scheduler overhead.
