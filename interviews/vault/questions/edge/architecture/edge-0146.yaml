title: The Depthwise Separable Dividend
scenario: An edge vision model is processing a 112x112x32 (HWC) feature map. You need to apply a convolution with a 3x3 kernel that produces a 112x112x64 output feature map.
question: What are the FLOPs for a standard 3x3 convolution versus a depthwise separable version, and what is the reduction factor?
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, dense convolutional layer with two smaller ones: a depthwise convolution that filters each input channel independently, and a pointwise (1x1) convolution that linearly combines the outputs of the depthwise pass. This factorization dramatically reduces computation.'
  common_mistake: |
    **The Pitfall:** Ignoring the cost of the pointwise pass in depthwise separable convolutions.
    **The Rationale:** Engineers often only consider the depthwise pass, believing the reduction is ~K^2, and forget that the 1x1 pass dominates computation.
    **The Consequence:** Severely overestimating the computational savings of depthwise separable convolutions during model architecture design.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 112x112x32.
    - Output: 112x112x64.
    - Kernel: 3x3.

    **Calculations:**
    - Standard Conv FLOPs: 2 x (112 x 112) x 64 (out channels) x 32 (in channels) x 9 (kernel) = 462,422,016.
    - Depthwise Pass FLOPs: 2 x (112 x 112) x 32 (channels) x 9 (kernel) = 7,225,344.
    - Pointwise Pass FLOPs: 2 x (112 x 112) x 64 (out channels) x 32 (in channels) x 1 = 51,380,224.
    - Depthwise Separable Total: 7,225,344 + 51,380,224 = 58,605,568 FLOPs.
    - Reduction Factor: 462,422,016 / 58,605,568 ≈ 7.89x.

    **Conclusion & Interpretation:**
    - **Result: Computationally Efficient (Compute-Bound).** The factorization reduces FLOPs by ~7.89x, though the pointwise (1x1) convolution dominates the compute cost.
  options:
  - The reduction is ~64x
  - The reduction is ~9x, which is K^2
  - The reduction is ~7.89x
  - The reduction is ~2x, the ratio of output to input channels
  correct_index: 2
