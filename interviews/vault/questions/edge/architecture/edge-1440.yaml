title: NAS Memory-Bound Analysis on Hailo-8
scenario: A hardware-aware NAS is optimizing a vision model for a Hailo-8 edge accelerator (26 TOPS INT8) that lacks local DRAM and streams weights from host memory over a 4 GB/s PCIe connection. The NAS consistently rejects architectures with low FLOP counts (e.g., 2 GOPS, 20M INT8 parameters) in favor of architectures with double the compute requirements (e.g., 4 GOPS, 4M INT8 parameters).
question: Why does hardware-aware NAS prefer a 4 GOPS, 4M-parameter model over a 2 GOPS, 20M-parameter model on Hailo-8?
details:
  realistic_solution: Because the Hailo-8 dataflow architecture possesses vast compute (26 TOPS) but relies entirely on external host memory, the system is catastrophically bottlenecked by PCIe transfer latency. A high-parameter model incurs a massive memory transfer penalty. The NAS correctly identifies that trading increased arithmetic complexity (more FLOPs) for a compressed parameter footprint (fewer memory fetches) drastically reduces overall end-to-end latency, capitalizing on the accelerator's surplus arithmetic intensity capacity.
  common_mistake: |
    **The Pitfall:** Exclusively optimizing for minimum FLOPs under the false assumption that less compute mathematically guarantees lower latency.
    **The Rationale:** Candidates apply cloud/GPU intuition—where high-bandwidth HBM masks transfer times—to an edge dataflow architecture bound by slow PCIe links.
    **The Consequence:** The team manually overrides the NAS to deploy the 20M-parameter model, unknowingly crippling the system on the memory bus and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Compute: 26 TOPS (26,000 GOPS).
    - Host PCIe Bandwidth: 4 GB/s (4,000 MB/s).
    - Model A: 20M INT8 parameters (20 MB), 2 GOPS.
    - Model B: 4M INT8 parameters (4 MB), 4 GOPS.

    **Calculations:**
    - Model A Compute Time = 2 / 26000 = 0.077 ms.
    - Model A Transfer Time = 20 MB / 4000 MB/s = 5.0 ms. Total ~5.0 ms.
    - Model B Compute Time = 4 / 26000 = 0.154 ms.
    - Model B Transfer Time = 4 MB / 4000 MB/s = 1.0 ms. Total ~1.0 ms.

    **Conclusion & Interpretation:**
    - **Result: Model B is 5x faster (Memory-Bandwidth-Bound)**. The system relies entirely on external memory, requiring high-compute/low-parameter topological designs to minimize transfer times.
