title: NAS Memory-Bound Analysis on Hailo-8
scenario: A hardware-aware NAS is optimizing a vision model for a Hailo-8 edge accelerator (26 TOPS INT8) with limited on-chip memory and an effective 4 GB/s off-chip transfer path for weights or activations that cannot stay resident. The NAS consistently rejects architectures with low FLOP counts (e.g., 2 GOPS, 20M INT8 parameters) in favor of architectures with double the compute requirements (e.g., 4 GOPS, 4M INT8 parameters).
question: Why does hardware-aware NAS prefer a 4 GOPS, 4M-parameter model over a 2 GOPS, 20M-parameter model on Hailo-8?
details:
  realistic_solution: Because the accelerator has far more INT8 compute than effective off-chip bandwidth, latency is dominated by model traffic when parameters or activations cannot stay on chip. The 20M-parameter model has fewer operations, but its 20 MB footprint costs about 5 ms to transfer over a 4 GB/s path, dwarfing its compute time. The 4M-parameter model roughly doubles compute, but its 4 MB footprint costs about 1 ms to transfer, so it is faster overall. The NAS is correctly trading extra arithmetic for a smaller memory footprint and higher arithmetic intensity.
  common_mistake: |
    **The Pitfall:** Exclusively optimizing for minimum FLOPs under the false assumption that less compute mathematically guarantees lower latency.
    **The Rationale:** Candidates apply cloud/GPU intuition—where high-bandwidth HBM often masks transfer times—to an edge dataflow architecture with a much tighter off-chip bandwidth budget.
    **The Consequence:** The team manually overrides the NAS to deploy the 20M-parameter model, unknowingly crippling the system on the memory bus and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Compute: 26 TOPS (26,000 GOPS).
    - Effective off-chip bandwidth for non-resident tensors: 4 GB/s (4,000 MB/s).
    - Model A: 20M INT8 parameters (20 MB), 2 GOPS.
    - Model B: 4M INT8 parameters (4 MB), 4 GOPS.

    **Calculations:**
    - Model A Compute Time = 2 / 26000 = 0.077 ms.
    - Model A Transfer Time = 20 MB / 4000 MB/s = 5.0 ms. Total ~5.0 ms.
    - Model B Compute Time = 4 / 26000 = 0.154 ms.
    - Model B Transfer Time = 4 MB / 4000 MB/s = 1.0 ms. Total ~1.0 ms.

    **Conclusion & Interpretation:**
    - **Result: Model B is about 5x faster (Memory-Bandwidth-Bound)**. The preferred architecture has higher compute but far lower memory traffic, which matters more under the stated 4 GB/s transfer constraint.
