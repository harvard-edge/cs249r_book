title: The Depthwise Separable Efficiency Gain
scenario: You're optimizing a computer vision pipeline for an autonomous vehicle's ADAS, which runs on an edge accelerator. Your profiler identifies a standard 3x3 convolutional layer as a major performance bottleneck. The input tensor to this layer is 112x112x256 (HWC), and it produces an output with 512 channels, using a stride of 1 and 'same' padding.
question: For the 112x112x256 to 512-channel 3x3 layer, how does a depthwise separable convolution work and what MAC reduction factor results?
details:
  realistic_solution: A depthwise separable convolution breaks a standard convolution into two cheaper steps. First, a depthwise convolution applies a 3x3 filter per input channel independently. Second, a pointwise convolution uses a 1x1 filter to expand to 512 output channels.
  common_mistake: |
    **The Pitfall:** Only computing the first (depthwise) stage and ignoring the pointwise stage.
    **The Rationale:** Candidates forget the pointwise convolution is necessary for channel projection.
    **The Consequence:** Overestimating the efficiency gain, assuming a massive ~512x improvement instead of the true ~8.8x gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input tensor: 112x112x256. Output channels: 512.
    - Kernel: 3x3.

    **Calculations:**
    - Standard MACs = 112 * 112 * 256 * 512 * 3 * 3 = 14.8 GMACs.
    - Depthwise MACs = 112 * 112 * 256 * 3 * 3 = 0.029 GMACs.
    - Pointwise MACs = 112 * 112 * 256 * 512 * 1 * 1 = 1.64 GMACs.
    - Total Separable MACs = 0.029 + 1.64 = 1.67 GMACs.
    - Reduction factor = 14.8 / 1.67 = 8.86x.

    **Conclusion & Interpretation:**
    - **Result: 8.86x reduction (Compute-Bound Mitigation)**. The depthwise separable convolution achieves an 8.86x reduction in compute.
  options:
  - The standard convolution is ~2x more expensive.
  - The standard convolution is ~9x more expensive.
  - The standard convolution is ~8.8x more expensive.
  - The standard convolution is ~512x more expensive.
  correct_index: 2
