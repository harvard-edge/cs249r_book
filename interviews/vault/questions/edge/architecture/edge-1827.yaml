title: Hailo-8 Transformer KV-Cache Streaming Architecture Specification
scenario: Design an edge deployment architecture for a 125M parameter transformer processing a context window of 2048 tokens using a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS at INT8 precision and consumes only 2.5W, but it lacks local DRAM, meaning all model weights and KV-cache tensors must stream continuously from host memory.
question: 'How would you partition a 125M-parameter transformer on Hailo-8 given O(n²) attention and host-streamed KV-cache bandwidth limits?'
details:
  realistic_solution: 'A robust specification partitions the transformer architecture: the compute-dense Feed-Forward Network (FFN) layers are compiled to the Hailo-8 dataflow pipeline, while the memory-bound O(n²) attention mechanism and KV-cache management remain on the host CPU. Alternatively, the design can specify a fixed-size sliding window attention to cap the KV-cache size, ensuring the streaming bandwidth from host memory never exceeds the interface throughput limits.'
  common_mistake: |
    **The Pitfall:** Designing a monolithic execution graph that attempts to stream the entire KV-cache for every token step.
    **The Rationale:** Candidates fail to analyze the interaction between the Hailo-8's lack of local DRAM and the linear growth of the KV-cache, expecting the 26 TOPS accelerator to mask the memory bottleneck.
    **The Consequence:** The system becomes severely bandwidth-bound, crashing throughput while the accelerator sits almost entirely idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 125M params (~125 MB in INT8).
    - Context: 2048 tokens, hidden size 768, 12 layers.
    - Hailo-8 compute: 26 TOPS, NO local DRAM.

    **Calculations:**
    - KV-cache size = 2048 tokens * 768 (hidden) * 2 (K+V) * 12 (layers) * 1 byte = ~37.7 MB.
    - Streaming data per token = 125 MB weights + 37.7 MB cache = 162.7 MB.
    - Compute per token = ~250 MOPs. Time on 26 TOPS = ~0.01 ms.
    - Streaming 162.7 MB over PCIe takes orders of magnitude longer than 0.01 ms compute.

    **Conclusion & Interpretation:**
    - **Result: 162.7 MB/token transfer limit (Memory-Bandwidth Bound)**. The system is severely limited by PCIe bandwidth, not compute.
