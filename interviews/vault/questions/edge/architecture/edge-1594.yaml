title: Transformer Attention Cost on Coral Edge TPU
scenario: You are deploying a quantized vision transformer to a Google Coral Edge TPU for real-time object tracking. You need to evaluate a self-attention layer processing a sequence length of 256 tokens with a hidden dimension of 512.
question: For N=256 and d=512 on a 4 TOPS Coral Edge TPU, how many INT8 ops does QK^T require and what is the minimum latency?
details:
  realistic_solution: The QK^T matrix multiplication complexity requires 2 * N^2 * d operations. Plugging in the sequence length (N=256) and hidden dimension (d=512) yields the total INT8 operations. Dividing this workload by the peak throughput of the Edge TPU yields the theoretical lower bound for execution time.
  common_mistake: |
    **The Pitfall:** Forgetting that one Multiply-Accumulate (MAC) is two operations.
    **The Rationale:** Hardware TOPS counts individual operations, so MAC counts must be doubled when calculating latency limits.
    **The Consequence:** Halving the true latency and falsely approving architectures that will miss real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length (N): 256.
    - Hidden dimension (d): 512.
    - Precision: INT8.
    - Accelerator throughput: 4 TOPS.

    **Calculations:**
    - MAC Count for QK^T: N^2 * d = 256^2 * 512 = 33,554,432 MACs.
    - Total INT8 Operations: 2 * MACs = 67,108,864 (~67.1 Mega-ops).
    - Minimum Latency: 67.1e6 ops / 4e12 ops/s = 1.677e-5 s.

    **Conclusion & Interpretation:**
    - **Result: 16.8 µs theoretical minimum latency (Compute-Bound)**. The latency is compute-bound for QK^T, assuming perfectly utilized MAC arrays.
