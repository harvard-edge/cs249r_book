title: The Vision Transformer Traffic Jam
scenario: You are an ML Systems Engineer on a self-driving car team, tasked with selecting
  a perception model for a forward-facing camera. The system runs on an edge GPU and
  has a hard real-time deadline of 33ms (30 FPS).
question: Why is a CNN a better fit than a ViT for the 33ms camera model on the edge
  GPU?
details:
  realistic_solution: Self-attention topologies generate immense Q@K^T dot product
    arrays inherently carrying brutally poor Arithmetic Intensity. While dense parallel
    computing engines trivially slice FLOPs, their unified memory buses hit saturation
    limits on the required DRAM block loads. Traditional CNN spatial architectures
    demonstrate deeply favorable memory re-usage curves fitting strict memory-bandwidth
    latency budgets.
  common_mistake: '**The Pitfall:** Blaming the raw FLOP count or parameter count
    of the ViT.

    **The Rationale:** Engineers often forget that data movement, not just computation,
    governs performance, especially on edge devices with limited memory bandwidth.

    **The Consequence:** They misdiagnose the bottleneck, failing to understand that
    ViTs suffer from poor arithmetic intensity, not just large FLOP counts.

    '
  napkin_math: "**Assumptions & Constraints:**\n   - Target Platform: Edge GPU (275\
    \ TOPS, 204.8 GB/s)\n   - Frame deadline: 33 ms (30 FPS)\n**Calculations:**\n\
    \   - Hardware Ridge Point: (275 * 10^12) Ops / (204.8 * 10^9) Bytes ≈ 1,342 Ops/Byte\n\
    \   - ViT AI (example): 200 GOps / 0.5 GB = 400 Ops/Byte\n**Conclusion & Interpretation:**\n\
    \   - **Result: Memory-Bound.** With an AI of 400 < 1342, the ViT starves the\
    \ compute cores, violating the 33 ms deadline. CNNs exhibit much higher arithmetic\
    \ intensity.\n"
  options:
  - The ViT has too many parameters, causing excessive swapping between DRAM and flash
    storage during inference.
  - The model has not been properly quantized to INT8. The FP32 operations are too
    slow for the hardware.
  - The ViT's self-attention mechanism has a low arithmetic intensity, making it memory-bandwidth
    bound on the architecture.
  - The ViT's total FLOPs exceed the 275 TOPS rating of the device, making it compute-bound.
  correct_index: 2
