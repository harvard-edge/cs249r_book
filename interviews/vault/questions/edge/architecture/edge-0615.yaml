title: The Mixture-of-Experts Power Trap
scenario: 'You are the Staff ML Systems Engineer for a fleet of autonomous delivery robots. Each robot uses a monolithic CNN on a Jetson AGX Orin at 30W. The model meets its 33ms latency budget but consumes most of the power. A research team proposes replacing it with a sparse Mixture-of-Experts (MoE) model. The MoE model is 3x larger, but a router activates only 1-2 experts per frame. The team claims it will be faster since only a fraction of the weights are used per inference.'
question: 'How would you validate whether the sparse MoE will actually be faster and more power-efficient than the CNN on the 30W Orin?'
details:
  realistic_solution: 'The validation plan must focus on the Roofline model and memory hierarchy. The core risk of the MoE model is that its sparse, dynamic access pattern destroys arithmetic intensity, making it memory-bound.'
  common_mistake: |
    **The Pitfall:** Only looking at FLOPs and ignoring memory bandwidth.
    **The Rationale:** The MoE model has fewer active parameters, so it seems faster. Engineers forget that moving scattered data costs time and energy.
    **The Consequence:** The cost of fetching randomly-accessed expert weights from slow DRAM easily erases any computational savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30W Orin provides ~137 TOPS, ~102 GB/s Bandwidth.
    - CNN is 10 GOPs, 50MB.
    - MoE prunes 50% ops and weights.
    - Sparse gather drops bandwidth to ~10% (10.2 GB/s).

    **Calculations:**
    - Compute Savings = 5 GOPs / 137 TOPS = 0.036 ms.
    - Memory Savings (Ideal) = 25MB / 102 GB/s = 0.24 ms.
    - Actual Read Time = 25MB / 10.2 GB/s = 2.45 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.45 ms penalty (Memory-Bandwidth-Bound)**. The memory penalty (2.45 ms) completely outweighs the compute savings (0.036 ms).
