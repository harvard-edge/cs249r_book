title: Edge TPU Attention Cost Analysis
scenario: You are deploying a small transformer-based wake-word model to a Google Coral Edge TPU. The model processes a 1-second audio window represented as a sequence of 256 tokens with an embedding dimension of 128. During deployment, the team notices that while the linear projection layers execute entirely on the Edge TPU, the attention computation falls back to the host CPU, drastically increasing latency.
question: Why does the 256-token transformer's attention fall back to CPU on the Edge TPU, and how would you keep it on INT8 hardware?
details:
  realistic_solution: The fallback is triggered because the compiled TFLite graph contains unsupported attention subgraphs for the Edge TPU's limited INT8 operator set, not merely because the chip lacks peak TOPS. To keep execution on INT8 hardware, redesign the model around TPU-compatible integer ops, use quantization-aware architecture choices, or intentionally split the graph so supported projection blocks run on TPU while attention is batched or cached on CPU. Replacing Softmax with ReLU is not a drop-in fix because it changes attention semantics.
  common_mistake: |
    **The Pitfall:** Assuming sufficient TOPS implies support for all mathematical operations.
    **The Rationale:** Candidates look at the 4 TOPS spec and assume the TPU can power through attention mechanisms natively.
    **The Consequence:** Graph partitioning causes massive intermediate activation tensors to serialize over the slow USB/PCIe bus, destroying real-time performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence (N): 256, Dimension (D): 128
    - QK^T and V MAC operations required.
    - Edge TPU INT8 peak: 4 TOPS

    **Calculations:**
    - QK^T MACs = 256 * 256 * 128 = 8.38 million MACs
    - Total Attention MACs (with V) = ~16.7 million MACs = 33.5 million ops
    - Theoretical TPU Time = 33.5e6 / 4e12 = 0.008 ms
    - PCIe/USB I/O transfer time for a 256x256 tensor = >2.0 ms

    **Conclusion & Interpretation:**
    - **Result: >2.0 ms (I/O-Bound)**. The bus transfer latency for the CPU fallback is orders of magnitude slower than the compute time.
