title: Unified Memory KV Read Bandwidth
scenario: An LLM on an Apple A17 Pro Neural Engine maintains a 2 GB sliding window KV cache. Unified Memory bandwidth is 50 GB/s.
question: What is the memory bandwidth utilization consumed purely by the KV cache during generation at 20 tokens per second?
details:
  realistic_solution: In the auto-regressive decoding phase, the entire 2 GB KV cache must be streamed from Unified Memory into the NPU for every single token generated. This consumes a massive fraction of the total system memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the entire KV cache stays resident in NPU SRAM.
    **The Rationale:** Candidates apply data center GPU intuition to edge NPUs, ignoring their severe memory-bandwidth constraints.
    **The Consequence:** Completely underestimating the auto-regressive decoding bottleneck, leading to wildly inaccurate latency projections.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV cache size = 2 GB per token generation step.
    - Target generation rate = 20 tokens/sec.
    - Total unified memory bandwidth = 50 GB/s.

    **Calculations:**
    - Required bandwidth = 2 GB/token * 20 tokens/sec = 40 GB/s.
    - Bandwidth saturation = 40 GB/s / 50 GB/s = 80%.

    **Conclusion & Interpretation:**
    - **Result: 80% utilization (Memory-Bandwidth Bound)**. KV cache streaming consumes 80% of total memory bandwidth.
