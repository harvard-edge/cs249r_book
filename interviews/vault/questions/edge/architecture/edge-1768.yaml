title: Sizing Llama-3 8B KV Cache for AI 100
scenario: You are designing an on-premise inference system using the Qualcomm Cloud AI 100 to serve an 8-billion parameter LLM for summarizing long corporate documents. The model weights are quantized to INT8. The hardware is limited to 32 GB LPDDR4x memory operating within a 75W envelope.
question: How would you calculate the maximum batch size and context length for an 8B INT8 LLM on 32 GB Cloud AI 100 and improve utilization?
details:
  realistic_solution: Calculate the combined static weight footprint and dynamic KV-cache dimension constraints. Suggest quantizing the KV-cache to W8A8 to unlock higher batch concurrency within the strict 32 GB bounds.
  common_mistake: |
    **The Pitfall:** Ignoring the dynamic memory growth of the KV-cache.
    **The Rationale:** Candidates often calculate the memory footprint of the model weights alone and fail to evaluate the tradeoff between batch size and sequence length within the strict 32 GB memory constraint.
    **The Consequence:** Deploying an architecture that encounters Out-Of-Memory (OOM) failures as soon as context length or request concurrency increases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Hardware: Qualcomm Cloud AI 100 (32 GB RAM).
    - Model Weights: 8 Billion parameters, INT8 quantization.
    - KV Cache Precision: FP16 (2 bytes per element).
    - LLM Dimensions: 32 layers, 8 KV heads, 128 head dimension.
    - Target Context Length: 8192 tokens.

    **Calculations:**
    - INT8 Weight Footprint = 8B params * 1 Byte = 8 GB.
    - Remaining Memory for KV Cache = 32 GB - 8 GB = 24 GB.
    - KV Cache per token = 2 (K, V) * 2 bytes * 32 layers * 8 heads * 128 dim = 131,072 bytes (128 KB).
    - Max total tokens in memory = 24 GB / 128 KB = (24 * 1024 * 1024 KB) / 128 KB = 196,608 tokens.
    - Max Concurrency for 8K Context = 196,608 / 8192 = 24 requests.

    **Conclusion & Interpretation:**
    - **Result: 24 Concurrent Requests (Memory-Capacity-Bound)**. Concurrency is limited by the available KV cache memory.
