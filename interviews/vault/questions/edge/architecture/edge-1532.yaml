title: Architecture Selection for Coral Edge TPU Translation
scenario: 'Your team is deploying an offline translation model on a smart camera equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). The research team has proposed three architectures: a standard encoder-decoder Transformer, an encoder-only model with a CRF layer, and a decoder-only LLM. The Edge TPU has strict limited operator support and requires full INT8 quantization, meaning unsupported operations will fall back to the host CPU and cause severe latency spikes.'
question: Which translation architecture should you deploy on the Coral Edge TPU given full INT8 quantization and limited operator support?
details:
  realistic_solution: A strong candidate evaluates operator support before choosing the model family. A standard Transformer encoder-decoder and a decoder-only LLM are both risky on Coral Edge TPU because LayerNorm, Softmax patterns, dynamic sequence handling, and autoregressive decode loops can fall back to the host and dominate latency. The deployable choice is an encoder-heavy, Edge-TPU-friendly translation model with fixed shapes, full INT8 quantization, supported ops, and minimal sequential decoding, or a constrained non-autoregressive formulation if the product can accept it. Any decoder must be tiny and verified in compiler logs; unsupported ops should not be placed in a per-token loop.
  common_mistake: |
    **The Pitfall:** Defaulting to decoder-only LLM architectures due to industry trends.
    **The Rationale:** Candidates ignore that autoregressive generation is heavily memory-bandwidth bound.
    **The Consequence:** They select an architecture that constantly reloads weights over a slow USB connection, crippling performance despite the TPU's high compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fixed-shape INT8 encoder path compiles fully to Edge TPU: ~8 ms.
    - Unsupported host fallback around a decoder step costs ~4 ms per generated token from CPU execution and handoff overhead.
    - Example output length: 30 tokens.

    **Calculations:**
    - Fully supported encoder-heavy path: ~8 ms plus a small fixed output head.
    - Autoregressive decoder with fallback: 30 tokens * 4 ms/token = 120 ms fallback overhead before useful TPU compute.
    - The issue is repeated host fallback in the decode loop, not reloading all model weights over USB for every token.

    **Conclusion & Interpretation:**
    - **Result: sequential fallback can add ~120 ms.** Prefer the architecture that keeps fixed-shape INT8 ops on the Edge TPU and minimizes or removes autoregressive host-side decoding.
