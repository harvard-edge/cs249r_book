title: 'Architecture Selection for Coral Edge TPU Translation'
scenario: 'Your team is deploying an offline translation model on a smart camera equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). The research team has proposed three architectures: a standard encoder-decoder Transformer, an encoder-only model with a CRF layer, and a decoder-only LLM. The Edge TPU has strict limited operator support and requires full INT8 quantization, meaning unsupported operations will fall back to the host CPU and cause severe latency spikes.'
question: 'Which translation architecture should you deploy on the Coral Edge TPU given full INT8 quantization and limited operator support?'
details:
  realistic_solution: 'A strong candidate evaluates the hardware first: the Coral TPU excels at dense INT8 matrix multiplications but struggles with dynamic control flow and memory-heavy sequential tasks. An encoder-decoder architecture is best. The heavy encoder processes the entire input sequence in parallel, utilizing the 4 TOPS efficiently. The autoregressive decoder is kept extremely lightweight, and the candidate must verify that all operators (like Softmax and LayerNorm) are either replaced with TPU-friendly INT8 approximations or pushed to the host CPU strategically to avoid constant context switching over the USB interface.'
  common_mistake: |
    **The Pitfall:** Defaulting to decoder-only LLM architectures due to industry trends.
    **The Rationale:** Candidates ignore that autoregressive generation is heavily memory-bandwidth bound.
    **The Consequence:** They select an architecture that constantly reloads weights over a slow USB connection, crippling performance despite the TPU's high compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50M parameter model in INT8 = 50 MB.
    - Coral TPU Peak Compute = 4 TOPS ($4 \times 10^{12}$ OPS).
    - USB 3.0 effective bandwidth ≈ 500 MB/s.

    **Calculations:**
    - Encoder compute (25M params, 50 tokens): $2 \times 25\text{M} \times 50 = 2.5$ GOPS = 0.625 ms compute time.
    - Decoder memory transfer (25M params, 50 tokens): 25 MB reloaded 50 times = 1.25 GB transferred.
    - Decoder transfer time = 1250 MB / 500 MB/s = 2.5 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2.5 seconds (I/O-Bound)**. The autoregressive decoder takes 2.5 seconds due to memory bandwidth starvation, proving an encoder-heavy architecture is far superior.
