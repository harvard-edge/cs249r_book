title: Encoder-Decoder Tradeoffs on Google Coral Edge TPU for Language Tasks
scenario: Your team is tasked with deploying a machine learning model for a specific natural language understanding (NLU) task on a device equipped with a Google Coral Edge TPU. The Coral Edge TPU provides 4 TOPS (Tera Operations Per Second) for INT8 operations, consumes 2W of power, and exclusively supports INT8 quantization for inference. The NLU task could range from simple text classification (requiring only an encoder) to more complex sequence-to-sequence tasks like summarization or translation (traditionally requiring encoder-decoder architectures).
question: How feasible are encoder-only, decoder-only, and encoder-decoder NLU models on the 4 TOPS, 2W, INT8-only Coral Edge TPU, and how would you make one deployable?
details:
  realistic_solution: For this constrained environment, highly optimized encoder-only architectures (MobileBERT, TinyBERT) are favored. Full encoder-decoders are typically out of scope. Key steps include applying aggressive model compression (pruning, distillation), utilizing INT8 Quantization-Aware Training (QAT) to minimize accuracy loss, and rigorous hardware profiling on the TFLite model to ensure operators are fully supported without CPU fallback.
  common_mistake: |
    **The Pitfall:** Attempting to directly deploy a standard transformer-based encoder-decoder model (e.g., T5 or BART) after naive INT8 quantization.
    **The Rationale:** Engineers fail to account for the specialized operator support required on the Coral Edge TPU.
    **The Consequence:** The model fails to run due to unhandled memory constraints and unsupported operations during deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference latency target: 100ms.
    - Edge TPU compute: 4 TOPS (4,000 GOPS) INT8.
    - Practical deployment requires every expensive op to compile to the Edge TPU.

    **Calculations:**
    - Maximum operations per inference: 4,000 GOPS * 0.1s = 400 GOPS available.
    - That peak budget is only useful for supported INT8 matrix/conv-style kernels.
    - Unsupported transformer ops, dynamic shapes, dequantization, or CPU fallback serialize parts of the graph and can dominate the 100ms budget.
    - A small encoder that compiles fully to INT8 is more deployable than a decoder or encoder-decoder with unsupported attention/cache/control-flow behavior.

    **Conclusion & Interpretation:**
    - **Result: deployability-bound, not peak-TOPS-bound.** Use a compressed encoder-only model with QAT and profile the compiled TFLite graph to avoid CPU fallback.
