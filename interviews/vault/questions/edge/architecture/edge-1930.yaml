title: 'Transformer LLM Deployment on NVIDIA Jetson Orin: Cost-Performance Analysis'
scenario: You are tasked with deploying a 7-billion parameter Transformer-based Large Language Model (LLM) onto an NVIDIA Jetson Orin module for on-device, real-time inference. The LLM primarily uses FP16 for weights and activations but can leverage INT8 for specific operations.
question: How would you deploy the 7B FP16/INT8 LLM on Jetson Orin to meet a 2048-token context and <100 ms per token latency?
details:
  realistic_solution: 'Start by separating fit from latency. A 7B FP16 model has about 14 GB of weights before runtime overhead, and a 2048-token KV cache for a typical 32-layer, 4096-hidden model is about 1 GB per sequence in FP16, so single-batch memory may fit on a 32 GB Orin but leaves limited room for activations, runtime buffers, and concurrency. The <100 ms/token target is the harder constraint: FP16 weight streaming and low effective utilization can miss it even when capacity fits. A realistic deployment would use TensorRT-LLM or an equivalent optimized runtime, INT8/INT4 weight quantization where supported, fused kernels, paged KV cache, batch size 1 unless measured otherwise, and fallback to a smaller model, reduced context, or offload if profiling cannot sustain the latency target.'
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of the KV-cache.
    **The Rationale:** Engineers often focus only on whether the static weights fit in memory.
    **The Consequence:** Especially for long context windows and larger batch sizes, ignoring KV-cache leads to out-of-memory errors or severe performance degradation due to memory bandwidth saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B params (FP16).
    - Target Context: 2048 tokens.
    - Target Latency: <100 ms per token.

    **Calculations:**
    - Base Weight Memory: 7B * 2 bytes/param = 14 GB before runtime overhead.
    - KV-Cache per Sequence: 2 (K+V) * 2048 tokens * 32 layers * 4096 hidden values * 2 bytes = 1,073,741,824 bytes = ~1.0 GiB.
    - Minimum single-sequence footprint: ~15 GB plus activations, allocator workspace, tokenizer/runtime buffers, and OS/GPU reservations.
    - INT8 weights reduce static weights to ~7 GB; 4-bit weights reduce them to ~3.5 GB, improving fit and bandwidth pressure.
    - A naive full-weight stream lower bound is 14 GB / 204.8 GB/s = ~68 ms/token, but real decode latency also includes GEMM efficiency, KV-cache reads/writes, kernel launch overhead, and achieved memory bandwidth.

    **Conclusion & Interpretation:**
    - **Result: FP16 May Fit, But <100 ms/token Is Not Guaranteed**. Meeting the target likely requires optimized kernels and INT8/4-bit weights; otherwise use a smaller model, shorter context, or offload path.
