title: The Autonomous Perception Stack Redesign
scenario: You are the new Tech Lead for the perception systems team at a leading autonomous vehicle company. Your fleet's vehicles use a custom Jetson AGX Orin-based compute module (275 INT8 TOPS, 32 GB LPDDR5). The current perception model is a dense, ResNet-50-like CNN that consumes ~200 INT8 TOPS, runs in 30ms, and draws 40W. The new product requirement mandates upgrading to a massive Vision Transformer (ViT) that requires 2,000 INT8 TOPS to run at the same 30ms latency, vastly exceeding the hardware's 275 TOPS limit. You cannot upgrade the hardware.
question: How would you redesign the perception architecture to handle the 2,000 TOPS ViT requirement on a 275 TOPS Orin in real time?
details:
  realistic_solution: The correct approach is to propose a system that decouples model capacity from inference cost. The best proposal is a **Sparse Mixture-of-Experts (MoE) Architecture built on a hardware-aware backbone.**
  common_mistake: Proposing a simple point solution, like 'let's just use MobileNetV3' or 'swap in a small Vision Transformer.' This fails to address the system-level problem. The core error is thinking in terms of incremental model optimization rather than architectural reformulation to handle the step-function increase in complexity under a fixed hardware budget. A senior answer proposes a *system*, not just a model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin specs: 275 INT8 TOPS, 204.8 GB/s BW.
    - ResNet processes a 4K image (24MB).

    **Calculations:**
    - Ridge point = 275T / 204.8G = 1342 Ops/Byte.
    - First conv layer reads 24MB, writes 24MB. Total memory = 48MB.
    - Ops = ~5GOPs. Arithmetic Intensity = 5G / 48M = 104 Ops/Byte.
    - Time dictated by bandwidth = 48MB / 204.8 GB/s = 0.23ms.
    - Time dictated by compute = 5G / 275T = 0.018ms.

    **Conclusion & Interpretation:**
    - **Result: 0.23ms (Memory-Bound)**. The arithmetic intensity is 104 Ops/Byte, which is far below the ridge point of 1342 Ops/Byte, heavily memory-bound.
