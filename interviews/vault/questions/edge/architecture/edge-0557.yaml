title: The Shared Bus Arbitration Lock
scenario: Your edge gateway runs a 4K camera feed into an NPU. You also have an external Gigabit Ethernet controller on the same physical PCIe bus. The NPU requires 3 GB/s of memory bandwidth to run the model at 30 FPS. The Ethernet controller uses 100 MB/s. The PCIe bus supports 4 GB/s. Theoretically, there is plenty of bandwidth, but when Ethernet traffic spikes, the NPU frame rate drops to 15 FPS.
question: Why does the NPU frame rate drop to 15 FPS when Ethernet traffic spikes, despite theoretical bandwidth sufficiency?
details:
  realistic_solution: You're experiencing bursty arbitration latency on the shared PCIe/interconnect path, not a simple average-bandwidth overload. The NPU and Ethernet controller share the same fabric, so large DMA bursts from the NIC can delay the NPU's memory transactions long enough to miss its ~10 microsecond service deadline. The fix is to isolate the NIC on a separate root port or use QoS / traffic shaping on the shared path so the NPU gets bounded service latency.
  common_mistake: |
    **The Pitfall:** Assuming the CPU is overwhelmed by network interrupts.
    **The Rationale:** Engineers default to OS-level software bottlenecks when facing network spikes.
    **The Consequence:** Debugging software endlessly when the starvation is physically happening at the hardware bus arbiter level.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU data deadline: ~10µs.
    - Ethernet lock time: ~25µs per burst.
    - PCIe Limit: 4 GB/s. Utilization: 3.1 GB/s.

    **Calculations:**
    - During a 25µs Ethernet burst, the NPU misses at least 2 data deadlines (25µs / 10µs).
    - Repeated bursts create enough tail latency to cut the effective frame rate roughly in half, even though average bandwidth still appears sufficient.

    **Conclusion & Interpretation:**
    - **Result: Pipeline Stalls (I/O-Bound)**. Despite sufficient average bandwidth, bursty contention on the shared interconnect creates deadline misses and cuts the frame rate.
