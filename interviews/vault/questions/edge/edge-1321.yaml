title: Evaluating INT8 Quantization Bias on Hailo-8
scenario: You are deploying a smart-city pedestrian detection model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W, no local DRAM). To meet the performance targets, the model is quantized to INT8. Your team proposes two fairness evaluation strategies. Pipeline A evaluates equalized odds on the FP32 model and only checks overall accuracy on the INT8 model. Pipeline B streams a demographically balanced 50,000-image dataset from host memory directly through the Hailo-8 to evaluate equalized odds on the physical hardware.
question: Should you choose FP32 fairness plus overall INT8 accuracy (Pipeline A), or evaluate equalized odds on the Hailo-8 hardware (Pipeline B)?
details:
  realistic_solution: Pipeline B is mandatory. Because the Hailo-8 executes INT8 dataflow without local DRAM, activation bounds are rigidly fixed during compilation. If the calibration data lacks subgroup representation, INT8 quantization disproportionately degrades performance for those minority groups. Streaming the dataset from host memory through the Hailo-8 ensures we measure actual on-device equalized odds, capturing hardware-specific quantization artifacts.
  common_mistake: |
    **The Pitfall:** Assuming that if the FP32 model is fair and overall INT8 accuracy is maintained, the INT8 model remains fair.
    **The Rationale:** Candidates often treat quantization as a uniform degradation across all classes, rather than a non-linear collapse that heavily penalizes minority feature distributions.
    **The Consequence:** Deploying a model that systematically discriminates against underrepresented demographic subgroups in production, despite passing FP32 fairness checks.
  napkin_math: |
    * 50,000 image dataset with 640x640 RGB inputs (~1.2MB per tensor = 60GB total).
    * Hailo-8 throughput: 26 TOPS INT8 / 16 GOPS model = 1,625 FPS.
    * Streaming bandwidth = 1,625 FPS * 1.2 MB = 1.95 GB/s PCIe bandwidth.
    * Evaluation time = 50,000 / 1,625 = **30.7 seconds**.
    * Proves Pipeline B is computationally trivial and highly efficient at 2.5W.
