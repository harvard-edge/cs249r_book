title: Energy Cost Analysis of Memory vs Compute on Jetson Orin
scenario: You are optimizing a transformer model for an NVIDIA Jetson Orin, which features an Ampere GPU + DLA accelerator capable of 275 TOPS INT8 at a 60W TDP. Profiling reveals that Layer A (a dense compute layer) achieves 80% utilization of the TOPS but consumes only 20W. Layer B (a memory-bound attention layer) achieves only 10% TOPS utilization but spikes system power consumption to 45W, due to constant off-chip data movement from the 32 GB LPDDR5 memory.
question: Given the Horowitz energy table principles, why does memory-bound Layer B draw 45W at only 10% TOPS utilization while dense Layer A draws 20W at 80% utilization?
details:
  realistic_solution: The candidate should apply the principle that off-chip memory access (LPDDR5) is significantly more energy-expensive than ALUs performing INT8 compute. Layer A keeps data on-chip (SRAM/registers) and runs efficiently. Layer B starves the compute units while thrashing the memory bus. The massive energy spike in Layer B is driven by the PHY and controller overhead of constantly moving data on and off the 32 GB LPDDR5.
  common_mistake: |
    **The Pitfall:** Assuming high compute utilization (TOPS) directly correlates with maximum power draw.
    **The Rationale:** Candidates focus on ALUs and neglect the fact that the physical data movement over the memory bus and PHY controllers typically costs orders of magnitude more energy than mathematical operations.
    **The Consequence:** Failing to optimize the memory access patterns of the model, leaving the system heavily power-constrained despite low apparent compute usage.
  napkin_math: |
    * Energy of 1 INT8 MAC (compute): ~0.1 pJ.
    * Energy of 32-bit LPDDR5 memory access: ~100 pJ.
    * Compute energy for 10^9 operations: 10^9 * 0.1 pJ = 0.1 mJ.
    * Memory energy for 1 GB data transfer (2.5 * 10^8 accesses): (10^9 bytes / 4 bytes) * 100 pJ = 25 mJ.
    * The energy cost of memory access is **250x** the cost of the compute.
    * Thrashing the LPDDR5 memory bus causes the massive 45W spike despite the ALU units being mostly idle.
