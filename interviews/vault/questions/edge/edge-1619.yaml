title: Weighted Round-Robin Routing for Heterogeneous Edge Accelerators
scenario: You are deploying a heterogeneous on-premise edge inference gateway. The cluster contains 3 Qualcomm Cloud AI 100 accelerators (each 400 TOPS INT8) and 2 legacy accelerators providing 150 TOPS INT8 each. You need to implement a weighted round-robin request router to distribute traffic proportionally based on compute capacity.
question: What minimal integer weighted round-robin weights should each accelerator get, and what total request capacity supports 0.5 TOPS/request?
details:
  realistic_solution: The load balancer must distribute traffic strictly according to the INT8 compute capacity of each accelerator to avoid saturating the legacy cards. By assigning weights proportional to the TOPS provided by each device, the Qualcomm Cloud AI 100 cards handle the majority of the routing traffic. This maximizes the efficiency of their 75W power footprint while keeping overall latency stable.
  common_mistake: |
    **The Pitfall:** Assigning weights based on memory capacity or failing to simplify weights.
    **The Rationale:** Candidates often misunderstand load balancing math, either using the wrong constraint metric or leaving weights as unwieldy fractions.
    **The Consequence:** The load balancer saturates the legacy cards with too much traffic or uses a computationally inefficient routing algorithm.
  napkin_math: |
    1. **Compute Ratios**: Qualcomm TOPS = 400, Legacy TOPS = 150. Weight ratio = 400 / 150 = 8/3.
    2. **Minimal Integer Weights**: **8** for each Qualcomm card, **3** for each Legacy card.
    3. **Total Compute Capacity**: (3 * 400) + (2 * 150) = 1200 + 300 = 1500 TOPS.
    4. **Total Request Capacity**: 1500 TOPS / 0.5 TOPS per request = **3000 requests per second**.
