title: Analyzing INT8 Quantization Disparities on Cloud AI 100
scenario: You are deploying a vision model for an on-premise access control system targeting an edge accelerator. To maximize throughput, the system compiles the model using purely INT8 quantization. During deployment, the overall Equalized Odds metric remains stable, but the false rejection rate for a specific minority demographic spikes by 18% compared to the FP32 baseline.
question: Why does pure INT8 raise one subgroup's false rejection rate, and what throughput cost comes from keeping the final 20% of compute in FP16?
details:
  realistic_solution: 'The accuracy drop occurs because INT8 quantization maps the continuous activation ranges into just 256 discrete bins. Features critical for distinguishing minority subgroups often represent a smaller portion of the overall calibration dataset, causing their activations to fall into the long tails of the distribution. These rare tail features are clipped or collapsed during INT8 quantization, destroying discriminative power. A mitigation strategy uses mixed-precision inference, keeping sensitive layers at FP16 at the cost of throughput.'
  common_mistake: |
    **The Pitfall:** Assuming the underlying training dataset is the sole cause of the bias, ignoring hardware deployment constraints.
    **The Rationale:** Treating fairness as exclusively a data or algorithmic problem rather than a systems-level issue exacerbated by precision reduction.
    **The Consequence:** Attempting to solve the problem by endlessly retraining the model with balanced data, rather than addressing the fact that fixed-point math fundamentally collapses the decision boundaries for underrepresented features.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 200 GOPs.
       - INT8 throughput: 400 TOPS.
       - FP16 throughput: 200 TFLOPS (half of INT8).
       - FP16 protection: 20% of compute (40 GOPs).
    2. **Calculations:**
       - Pure INT8 latency: 200 GOPs / 400 TOPS = 0.5 ms (2,000 FPS).
       - Mixed-precision INT8 portion: 160 GOPs / 400 TOPS = 0.4 ms.
       - Mixed-precision FP16 portion: 40 GOPs / 200 TFLOPS = 0.2 ms.
       - Total mixed latency: 0.4 ms + 0.2 ms = 0.6 ms (1,666 FPS).
       - Throughput drop: (2,000 - 1,666) / 2,000 = 16.7%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Tradeoff**. Fixing the fairness degradation via mixed precision costs exactly 16.7% of total throughput, highlighting the direct tension between algorithmic fairness and hardware efficiency.
