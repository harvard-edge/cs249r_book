title: The Fixed-Point Trade-off
scenario: Your team has successfully trained an object detection model in FP32 that achieves 90% mAP on
  your validation set. When you deploy this model to a low-power edge microcontroller with a fixed-point
  DSP, the accuracy drops significantly to 65% mAP. Explain why this happens and what steps you would
  take to fix it.
details:
  realistic_solution: "The significant accuracy drop is almost certainly due to **quantization effects**.\
    \ Floating-point 32-bit (FP32) numbers offer a wide dynamic range and high precision. Fixed-point\
    \ arithmetic (e.g., INT8 or INT16), common on edge DSPs for efficiency, has a much smaller dynamic\
    \ range and fewer bits to represent values, leading to:\n  1.  **Reduced Precision:** Loss of fine-grained\
    \ detail in weights and activations.\n  2.  **Reduced Dynamic Range:** Values exceeding the fixed-point\
    \ range will either clip (saturate) or wrap around, leading to large errors. This is especially problematic\
    \ for layers with wide ranges of activation values.\n  3.  **Accumulation Errors:** In operations\
    \ like convolutions, repeated additions of quantized values can accumulate small errors, leading to\
    \ larger deviations."
  common_mistake: '"The edge chip is just not powerful enough for this model." While true for performance,
    it doesn''t explain the accuracy drop if the model *runs*.'
  napkin_math: An FP32 number has ~7 decimal digits of precision and a dynamic range of $10^{-38}$ to
    $10^{38}$. An INT8 number (signed) can represent values from -128 to 127. If you map a range of [-1000,
    1000] to INT8, each step represents $2000/255 \approx 7.8$ units, a massive loss of precision compared
    to FP32.
