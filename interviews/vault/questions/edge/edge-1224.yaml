title: Federated Averaging Bottleneck on Jetson Orin
scenario: >-
  You are deploying a cross-silo federated averaging system across 10 NVIDIA Jetson Orin nodes to train a 50M parameter traffic model. You observe that although local training batches compute very quickly, the nodes sit idle for most of the training cycle, and federated synchronization rounds frequently timeout over the 100 Mbps wireless uplink.
question: Explain why the nodes are idling and why timeouts occur despite the massive compute capacity of the Jetson Orin.
details:
  realistic_solution: The issue stems from a severe compute-to-communication imbalance in the edge deployment. The NVIDIA Jetson Orin rapidly processes local training data using its Ampere GPU and RAM, bursting up to its TDP limit. However, transmitting the model gradients over the wireless edge network creates a huge bottleneck. The nodes finish computing quickly and then idle while waiting to upload weights, causing the federated averaging timeouts.
  common_mistake: |
    **The Pitfall:** Blaming the edge device compute capability.
    **The Rationale:** Candidates assume the INT8 engine might be insufficient for training or misdiagnose an I/O bottleneck as a processing limitation.
    **The Consequence:** Proposing expensive hardware upgrades that will not solve the issue, as the bottleneck is entirely bound by the slow 100 Mbps wireless uplink.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 50M parameters (FP32).
    - Network uplink: 100 Mbps (12.5 MB/s).
    - Hardware: NVIDIA Jetson Orin (fast local compute).

    **Calculations:**
    - Gradient payload: 50,000,000 * 4 bytes = 200 MB per round.
    - Upload time: 200 MB / 12.5 MB/s = 16 seconds per node.

    **Conclusion & Interpretation:**
    - **Result: 16 Seconds (Network-Bound).** The 16-second upload time completely dwarfs the fractional-second compute time, creating a severe compute-to-communication imbalance that causes timeouts.
