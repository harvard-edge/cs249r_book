title: Federated Averaging Bottleneck on Jetson Orin
scenario: You are deploying a cross-silo federated averaging system across 10 NVIDIA Jetson Orin nodes (32 GB LPDDR5, 60W TDP, Ampere GPU + DLA) to train a 50M parameter traffic model. You observe that although local training batches compute very quickly, the nodes sit idle for most of the training cycle, and federated synchronization rounds frequently timeout over the 100 Mbps wireless uplink.
question: Explain why the nodes are idling and why timeouts occur despite the massive compute capacity of the Jetson Orin.
details:
  realistic_solution: The issue stems from a severe compute-to-communication imbalance in the edge deployment. The NVIDIA Jetson Orin rapidly processes local training data using its Ampere GPU and 32GB RAM, bursting up to its 60W TDP limit. However, transmitting the model gradients over the wireless edge network creates a huge bottleneck. The nodes finish computing quickly and then idle while waiting to upload weights, causing the federated averaging timeouts.
  common_mistake: |
    **The Pitfall:** Blaming the edge device compute capability.
    **The Rationale:** Candidates assume the 275 TOPS INT8 might be insufficient for training or misdiagnose an I/O bottleneck as a processing limitation.
    **The Consequence:** Proposing hardware upgrades that will not solve the issue, as the bottleneck is entirely bound by the 100 Mbps network uplink.
  napkin_math: |
    - **Gradient size:** A 50M parameter model uses FP32 for training gradients, totaling 50M * 4 bytes = 200 MB per round.
    - **Uplink bandwidth:** 100 Mbps = 12.5 MB/s.
    - **Upload time:** 200 MB / 12.5 MB/s = 16 seconds per node.
    - **Final result:** **Uploading takes 16 seconds while compute takes a fraction of a second, causing a severe compute-to-communication imbalance.**
