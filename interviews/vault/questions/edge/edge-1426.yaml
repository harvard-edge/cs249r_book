title: Power-Constrained Degradation on Jetson Orin
scenario: A delivery robot uses an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). Under normal conditions, its primary perception model runs at 30 FPS requiring 160 TOPS on the GPU. When the battery drops below 15%, the system controller limits the total Jetson Orin power to a strict 25W TDP mode. The system behavior observed is that it completely drops the primary model and falls back to a 40 TOPS DLA-only model running at 15 FPS. Base system idle power is 10W, the Ampere GPU efficiency is 4 TOPS/W, and the DLA efficiency is 8 TOPS/W.
question: Why does the robot switch to a 40 TOPS DLA-only model at 15 FPS instead of running the 160 TOPS GPU model at a lower framerate under the 25W limit?
details:
  realistic_solution: The system sheds the primary model entirely because even at halved framerates, the GPU power required for the primary model exceeds the remaining compute power budget. By switching to the DLA, the system leverages a more power-efficient accelerator to maintain operational safety (fail-operational) while shedding QoS to fit safely within the strict 25W envelope.
  common_mistake: |
    **The Pitfall:** Assuming linear QoS shedding (dropping framerate) is always sufficient.
    **The Rationale:** Candidates fail to calculate actual power envelopes and overlook the architectural differences in performance-per-watt between the general GPU and the specialized DLA.
    **The Consequence:** Proposing a fallback state that still violates the strict 25W limit, causing system shutdown.
  napkin_math: |
    *   **Available Compute Budget:** Total (25W) - Base system (10W) = 15W.
    *   **GPU at 30 FPS:** 160 TOPS / 4 TOPS/W = 40W (Exceeds total system 25W limit).
    *   **GPU at 15 FPS:** 80 TOPS / 4 TOPS/W = 20W. Total system = 20W + 10W = 30W (Still exceeds 25W limit).
    *   **DLA at 15 FPS:** 40 TOPS / 8 TOPS/W = 5W. Total system = 5W + 10W = **15W**.
    *   **Result:** The DLA fallback safely fits within the 25W limit, proving its superior power efficiency.
