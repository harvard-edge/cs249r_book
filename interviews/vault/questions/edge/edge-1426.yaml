title: Power-Constrained Degradation on Jetson Orin
scenario: A delivery robot uses an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8,
  60W TDP, Ampere GPU + DLA accelerator). Under normal conditions, its primary perception
  model runs at 30 FPS requiring 160 TOPS on the GPU. When the battery drops below
  15%, the system controller limits the total Jetson Orin power to a strict 25W TDP
  mode. The system behavior observed is that it completely drops the primary model
  and falls back to a 40 TOPS DLA-only model running at 15 FPS. Given that base system
  idle power is 10W, the Ampere GPU efficiency is 4 TOPS/W, and the DLA efficiency
  is 8 TOPS/W, explain why this specific degradation ladder step was activated instead
  of simply running the primary model at a lower framerate.
question: Why does the robot switch to a 40 TOPS DLA-only model at 15 FPS instead
  of running the 160 TOPS GPU model at a lower framerate under the 25W limit?
details:
  realistic_solution: The system sheds the primary model entirely because even at
    halved framerates, the GPU power required for the primary model exceeds the remaining
    compute power budget. By switching to the DLA, the system leverages a more power-efficient
    accelerator to maintain operational safety (fail-operational) while shedding QoS
    (framerate and model capacity) to fit safely within the strict 25W envelope.
  common_mistake: Candidates often assume that linear QoS shedding (e.g., just dropping
    the primary model's framerate to 15 FPS) is sufficient. They fail to calculate
    the actual power envelope constraints and overlook the architectural differences
    in performance-per-watt between the Ampere GPU and the DLA.
  napkin_math: Total power budget = 25W. Available compute budget = Total (25W) -
    Base system (10W) = 15W. Primary model at 30 FPS needs 160 TOPS, taking 160 /
    4 = 40W GPU power. Dropping primary model to 15 FPS (half compute) requires 80
    TOPS, taking 80 / 4 = 20W GPU power. Total system power would be 20W (GPU) + 10W
    (Base) = 30W, which exceeds the strict 25W TDP limit. Fallback DLA model at 15
    FPS requires 40 TOPS. DLA power = 40 TOPS / 8 TOPS/W = 5W. Total degraded system
    power = 5W (DLA) + 10W (Base) = 15W, safely fitting the 25W limit.
