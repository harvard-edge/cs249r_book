title: Power-Constrained Degradation on Jetson Orin
scenario: A delivery robot uses an NVIDIA Jetson Orin. Under normal conditions, its primary perception model runs at 30 FPS requiring 160 TOPS on the GPU. When the battery drops below 15%, the system controller limits total power to a strict 25W TDP mode. The system drops the primary model and falls back to a 40 TOPS DLA-only model running at 15 FPS. Base system idle power is 10W, Ampere GPU efficiency is 4 TOPS/W, and DLA efficiency is 8 TOPS/W.
question: Why does the robot switch to a 40 TOPS DLA-only model at 15 FPS instead of running the 160 TOPS GPU model at a lower framerate under the 25W limit?
details:
  realistic_solution: The system sheds the primary model entirely because even at halved framerates, the GPU power required for the primary model exceeds the remaining compute power budget. By switching to the DLA, the system leverages a more power-efficient accelerator to maintain operational safety (fail-operational) while shedding QoS to fit safely within the strict 25W envelope.
  common_mistake: |
    **The Pitfall:** Assuming linear QoS shedding (dropping framerate on the GPU) is always sufficient to meet power constraints.
    **The Rationale:** Candidates fail to calculate actual power envelopes, overlooking the baseline system draw and the architectural differences in performance-per-watt between a general GPU and a specialized DLA.
    **The Consequence:** Proposing a fallback state that still violates the strict 25W limit, causing an abrupt, unsafe system shutdown.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total power limit: 25W.
    - Base system draw: 10W.
    - GPU efficiency: 4 TOPS/W.
    - DLA efficiency: 8 TOPS/W.

    **Calculations:**
    - Available compute budget: 25W - 10W = 15W.
    - GPU at 15 FPS (80 TOPS): 80 / 4 = 20W compute + 10W base = 30W total (fails limit).
    - DLA at 15 FPS (40 TOPS): 40 / 8 = 5W compute + 10W base = 15W total.

    **Conclusion & Interpretation:**
    - **Result: 15W (DLA) < 25W (Power-Bound Mitigated)**. The specialized DLA fallback operates safely within the power budget, proving that moving workloads to higher TOPS/W silicon is necessary for fail-operational states.
