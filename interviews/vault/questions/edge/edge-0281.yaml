title: The Perception Model's Memory Diet (edge-0281)
scenario: Your team is optimizing a 50-million-parameter perception model for an autonomous vehicle's
  edge ECU. The model weights are currently stored in FP16 format. To reduce the memory footprint, you
  are considering quantizing the weights to INT8. Explain the impact of this change and calculate the
  total memory savings for the model's weights.
question: "How much weight memory is saved by quantizing a 50-million-parameter FP16 model to INT8?"
details:
  realistic_solution: Quantizing from FP16 to INT8 halves the memory requirement for the weights. FP16
    (half-precision float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte per parameter.
    For a 50-million-parameter model, the memory usage for weights is reduced from 100 MB to 50 MB, resulting
    in a total saving of 50 MB. This is a critical optimization for fitting models into the tight memory
    budgets of automotive-grade hardware.
  common_mistake: The most common mistake is assuming the wrong base precision. Engineers often default
    to thinking about FP32 (4 bytes), but on edge devices, FP16 (2 bytes) is a very common starting point
    for baseline models. This leads to overestimating the memory savings by a factor of 3 (150MB vs 50MB).
  napkin_math: 1. **Calculate FP16 Memory:** 50,000,000 parameters × 2 bytes/parameter = 100,000,000 bytes
    = 100 MB.
  options:
  - 150 MB
  - 100 MB
  - 50 MB
  - 25 MB
  correct_index: 2
