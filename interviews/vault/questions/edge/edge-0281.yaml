title: The Perception Model's Memory Diet (edge-0281)
scenario: Your team is optimizing a 50-million-parameter perception model for an autonomous vehicle's edge ECU. The model weights are currently stored in FP16 format. To reduce the memory footprint, you are considering quantizing the weights to INT8.
question: How much weight memory is saved by quantizing a 50-million-parameter FP16 model to INT8?
details:
  realistic_solution: 'Quantizing from FP16 to INT8 halves the memory requirement for the weights. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. For a 50-million-parameter model, the memory usage for weights is reduced from 100 MB to 50 MB, resulting in a total saving of 50 MB. This optimization is critical for fitting models into automotive-grade hardware memory budgets.'
  common_mistake: |
    **The Pitfall:** Assuming the wrong base precision.
    **The Rationale:** Engineers often default to thinking about FP32 (4 bytes) because it is standard in cloud training.
    **The Consequence:** They overestimate the memory savings by a factor of 3 (150MB vs 50MB) because the baseline was already FP16 (2 bytes).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 50,000,000 parameters.
       - FP16 size: 2 bytes/parameter.
       - INT8 size: 1 byte/parameter.
    2. **Calculations:**
       - FP16 Memory = 50,000,000 * 2 bytes = 100 MB.
       - INT8 Memory = 50,000,000 * 1 byte = 50 MB.
       - Savings = 100 MB - 50 MB = 50 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Optimization.** **Total memory savings = 50 MB.**
  options:
  - 150 MB
  - 100 MB
  - 50 MB
  - 25 MB
  correct_index: 2
