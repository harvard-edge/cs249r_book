title: Achieve Mastery in Edge Queueing System Design Under Intermittent Connectivity
scenario: 'You are the principal engineer for an autonomous agricultural drone fleet running inference
  on Hailo-8 NPUs (26 TOPS). Drones disconnect from base station for 20-minute windows, buffering inference
  requests locally. Arrival rate: 4 req/s (Poisson). Service time: Hailo-8 processes at 50ms/req for crop
  disease detection. During disconnection, requests queue locally with 512MB buffer. Upon reconnection,
  results batch-upload. Design the complete queueing model including buffer sizing, overflow policy, and
  reconnection burst handling.'
details:
  realistic_solution: 'During connection: λ=4 req/s, μ=20 req/s (1/50ms), ρ=4/20=0.2. M/M/1 mean queue
    = ρ/(1-ρ)=0.25 requests. No issue. During disconnection (20 min=1200s): λ=4, μ=20, ρ=0.2 < 1 → queue
    still stable. Buffer: peak queue length at P99 = μt during burst. Requests in 20min: 4×1200=4800 arrivals;
    processed: 20×1200=24,000 → all processed, no buildup. Reconnection burst: 4800 results upload at
    10MB/s uplink... 4800 × 100KB/result = 480MB upload. Time: 480MB/10MB/s=48s. Buffer sizing: 512MB
    > 480MB ✓. If results are 200KB: 960MB > 512MB → must compress or reduce image quality to 50KB/result.'
  common_mistake: Modeling the system as M/M/1 during disconnection; with bounded buffer it is M/M/1/K
    (finite capacity), where K determines packet loss rate, not just latency.
  napkin_math: 'ρ=0.2 < 1 → queue stable even during disconnection. 20min × 4 req/s = 4,800 requests processed
    (20×1200=24,000 capacity >> 4800). Results: 4800 × 100KB = 480MB < 512MB buffer ✓. Upload at 10MB/s:
    48s burst. Steady state M/M/1: E[W]=ρ/(μ(1-ρ))=0.2/(20×0.8)=12.5ms.'
