title: PagedAttention Block Size Fragmentation
scenario: An edge deployment of an LLM on a Jetson AGX Orin uses PagedAttention for
  KV cache management. The system architect must choose between a block size of 16
  tokens and 256 tokens.
question: Evaluate the fragmentation trade-offs of large versus small KV cache page
  sizes.
visual:
  kind: svg
  path: edge-2357.svg
  alt: Bar chart showing high internal fragmentation for 256-token blocks compared
    to 16-token blocks.
  caption: KV Cache Internal Fragmentation Ratio.
details:
  realistic_solution: Smaller block sizes (e.g., 16 tokens) minimize internal fragmentation
    because very few allocated token slots are wasted if a sequence ends prematurely.
    However, they increase page table management overhead. Larger blocks (256 tokens)
    optimize memory bandwidth and reduce lookup overhead, but severely increase internal
    memory fragmentation, wasting Orin's limited unified memory on half-empty blocks.
  common_mistake: Assuming large blocks are always better for GPU memory bandwidth
    without recognizing the memory waste of internal fragmentation for variable sequences.
  napkin_math: 'Seq length 257: 256-block uses 2 blocks (512 capacity, ~50% waste).
    16-block uses 17 blocks (272 capacity, ~5% waste).'
