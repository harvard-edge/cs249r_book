title: Roofline Inference Latency on Jetson Orin
scenario: You need to deploy YOLOv8n (6.3 GFLOPs, 3.2M parameters, INT8 quantized) on a Jetson Orin NX.
  The Orin NX GPU has 32 Tensor Cores delivering 100 TOPS INT8 and 102.4 GB/s LPDDR5 bandwidth. Using
  the roofline model, estimate the inference latency. Is this model compute-bound or memory-bound on this
  hardware?
details:
  realistic_solution: The roofline model requires computing both the compute time and the memory time,
    then taking the maximum.
  common_mistake: '"6.3 GFLOPs / 100 TOPS = 0.063ms. Done." This uses peak TOPS and ignores that real
    utilization is 40–60% on edge GPUs due to kernel launch overhead, memory stalls, and operator coverage
    gaps. It also ignores the memory-bandwidth side of the roofline entirely.'
  napkin_math: 'Compute time: 6.3 GFLOP / 50 effective TOPS = 0.126ms. Memory time: 21.2 MB / 102.4 GB/s
    = 0.207ms. Bottleneck: memory (1.6× slower than compute). Arithmetic intensity: 297 OPs/byte vs ridge
    point 976 OPs/byte → memory-bound. Real measured latency (TensorRT FP16): ~3ms. Roofline predicts
    0.207ms → 14.5× gap. The gap comes from: kernel launch overhead (~0.5ms), non-fusible operators (~0.8ms),
    NMS post-processing on CPU (~1ms), data transfer (~0.5ms). Optimization target: fuse more operators
    to reduce memory traffic and close the gap.'
