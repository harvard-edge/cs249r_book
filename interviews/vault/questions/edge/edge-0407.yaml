title: Roofline Inference Latency on Jetson Orin
scenario: You need to deploy YOLOv8n (6.3 GOPs, 3.2M parameters, INT8 quantized, ~21.2 MB memory traffic per inference) on a Jetson Orin NX.
  The Orin NX GPU has 32 Tensor Cores delivering 100 TOPS INT8 and 102.4 GB/s LPDDR5 bandwidth. Using
  the roofline model, estimate the inference latency. Is this model compute-bound or memory-bound on this
  hardware?
question: "Using the roofline model, what inference latency do you estimate, and is YOLOv8n compute-bound or memory-bound on the Orin NX?"
details:
  realistic_solution: The roofline model requires computing both the compute time and the memory time,
    then taking the maximum. Compute time uses peak TOPS, while memory time uses memory bandwidth.
  common_mistake: '"6.3 GOPs / 100 TOPS = 0.063ms. Done." This ignores the memory-bandwidth side of the roofline entirely, assuming all models are compute-bound.'
  napkin_math: 'Compute time: 6.3 GOPs / 100 TOPS = 0.063ms. Memory time: 21.2 MB / 102.4 GB/s = 0.207ms.
    Bottleneck: memory (3.3x slower than compute). Arithmetic intensity: 6.3 GOPs / 21.2 MB = 297 OPs/byte vs ridge
    point 976 OPs/byte → memory-bound. Real measured latency: ~3ms. Roofline predicts
    0.207ms → 14.5x gap. The gap comes from: kernel launch overhead, non-fusible operators, NMS post-processing.'
  options:
  - "0.063ms, compute-bound"
  - "0.207ms, compute-bound"
  - "0.207ms, memory-bound"
  - "0.063ms, memory-bound"
  correct_index: 2
