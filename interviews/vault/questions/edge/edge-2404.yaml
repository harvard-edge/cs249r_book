title: Gateway Batch Pipeline Utilization
scenario: A Jetson AGX Orin aggregates 20 cameras, each sending a frame every second.
  The batched pipeline processes 4 frames concurrently in 100ms.
question: Analyze the effective throughput and utilization of the Orin pipeline to
  determine if it can sustain the gateway arrival rate.
details:
  realistic_solution: The arrival rate is 20 frames/s. The system's service rate is
    a batch of 4 frames per 100ms, which scales to 40 frames/s. Utilization ρ = 20
    / 40 = 0.5. The Orin can sustain the load at 50% utilization.
  common_mistake: Miscalculating batch throughput by dividing the batch size by 1
    second instead of scaling up the 100ms batch service time.
  napkin_math: 20 / (4 / 0.1) = 0.5 utilization
