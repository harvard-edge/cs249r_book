title: Optimizing Transformer Inference on Jetson Orin
scenario: You are architecting a smart city intersection camera system using the NVIDIA
  Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The system runs a 2.5 billion
  parameter transformer model for multi-object tracking. In FP16, the model requires
  5 TFLOPs per frame and processes 12 FPS, but hits the 60W TDP limit, causing thermal
  throttling. Analyze the memory and compute bottleneck, and quantify the performance
  and power improvements if you quantize to INT8 and utilize the DLA.
question: How would INT8 quantization and DLA utilization change the compute, memory,
  and power profile of the 2.5B tracking transformer?
details:
  realistic_solution: The bottleneck is the power consumption of FP16 compute on the
    Ampere GPU, which hits the 60W thermal ceiling. The solution is to quantize the
    model to INT8 and compile it for the DLA and GPU. This shifts the workload to
    dedicated INT8 hardware, drastically reducing the energy per operation, eliminating
    thermal throttling, and leaving plenty of LPDDR5 bandwidth and power headroom
    for other system processes.
  common_mistake: Candidates often focus only on the memory bandwidth savings of INT8
    without calculating the actual TOPS utilization or the proportional power reduction.
    They may also forget that the Orin's 275 TOPS rating specifically assumes INT8
    execution, leading to incorrect assumptions about FP16 capabilities.
  napkin_math: 'FP16 memory: 2.5B params * 2 bytes = 5GB. INT8 memory: 2.5GB (fits
    easily in 32 GB LPDDR5). Compute per frame in INT8 = 5 TOPS. Target 30 FPS requires
    30 * 5 = 150 TOPS. Jetson Orin max capacity = 275 TOPS INT8. Compute utilization
    = 150 / 275 = 54.5%. At peak efficiency (275 TOPS / 60W = 4.58 TOPS/W), running
    150 TOPS consumes approximately 150 / 4.58 = 32.7W, fixing the 60W throttling
    issue.'
