title: 'Optimizing Transformer Inference on Jetson Orin'
scenario: 'You are architecting a smart city intersection camera system using the NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The system runs a 2.5 billion parameter transformer model for multi-object tracking. In FP16, the model requires 5 TFLOPs per frame and processes 12 FPS, but hits the 60W TDP limit, causing thermal throttling.'
question: 'How would INT8 quantization and DLA utilization change the compute, memory, and power profile of the 2.5B tracking transformer?'
details:
  realistic_solution: 'The bottleneck is the power consumption of FP16 compute on the Ampere GPU, which hits the 60W thermal ceiling. The solution is to quantize the model to INT8 and compile it for the DLA and GPU. This shifts the workload to dedicated INT8 hardware, drastically reducing the energy per operation, eliminating thermal throttling, and leaving plenty of LPDDR5 bandwidth and power headroom for other system processes.'
  common_mistake: 'Candidates often focus only on the memory bandwidth savings of INT8 without calculating the actual TOPS utilization or the proportional power reduction. They may also forget that the Orin''s 275 TOPS rating specifically assumes INT8 execution, leading to incorrect assumptions about FP16 capabilities.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model: 2.5 billion parameters (FP16).
    - Target frame rate: 30 FPS.
    - Jetson Orin capacity: 32 GB LPDDR5, 275 TOPS INT8, 60W TDP.
    - INT8 compute requirement: 5 TOPS per frame.

    **Calculations:**
    - INT8 Memory footprint: 2.5B parameters * 1 byte = 2.5 GB.
    - Compute required for 30 FPS: 30 FPS * 5 TOPS/frame = 150 TOPS.
    - Compute utilization: 150 TOPS / 275 TOPS = 54.5%.
    - Peak power efficiency: 275 TOPS / 60W = 4.58 TOPS/W.
    - INT8 Power consumption: 150 TOPS / 4.58 TOPS/W = 32.7W.

    **Conclusion & Interpretation:**
    - **Result: 32.7W power consumption (Thermal-Bound)**. Quantizing to INT8 shifts the workload to dedicated INT8 hardware, fitting comfortably under the 60W thermal ceiling.
