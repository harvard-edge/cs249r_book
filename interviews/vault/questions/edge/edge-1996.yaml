title: 'Edge ML Inference: Optimizing Load Balancing with Hailo-8 Accelerators'
scenario: A cluster of 50 Hailo-8 accelerators (26 TOPS INT8, 2.5W each) processes 500 inference requests per second (sampled from 100 cameras). Each inference consumes 2 TOPS. You must evaluate routing architectures and handle temporary traffic spikes up to 1000 requests/second.
question: Which two routing architectures would you compare for the 50-Hailo-8 cluster, and how would you handle spikes to 1000 requests per second?
details:
  realistic_solution: 'A realistic solution involves a hybrid load balancing approach: consistent hashing for stream stickiness and local weighted round-robin for device distribution. For traffic spikes, implement dynamic load management strategies like selective inference, downsampling, or load shedding.'
  common_mistake: |
    **The Pitfall:** Applying traditional cloud load balancing without considering strict edge power and compute limits.
    **The Rationale:** Candidates assume infinite elasticity and uniform traffic distribution, ignoring that each chip has a hard 26 TOPS and 2.5W limit.
    **The Consequence:** During traffic spikes, edge nodes saturate and thermally throttle, leading to system-wide failure rather than graceful degradation.
  napkin_math: |
    1. **Assumptions & Constraints:** 50 devices at 26 TOPS each. Baseline is 500 req/s. Spike is 1,000 req/s. Inference cost is 2 TOPS.
    2. **Calculations:** Total Capacity = 50 * 26 = 1,300 TOPS. Baseline Load = 500 * 2 = 1,000 TOPS (77% util). Spike Load = 1,000 * 2 = 2,000 TOPS. Deficit = 2,000 - 1,300 = -700 TOPS.
    3. **Conclusion & Interpretation:** **Spike requires 2,000 TOPS against a 1,300 TOPS limit. Compute-Bound failure mandates dynamic load shedding.**
