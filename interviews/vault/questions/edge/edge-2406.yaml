title: PCIe PCIe Bottleneck on Accelerator FPS
scenario: A Hailo-8 accelerator (26 TOPS) runs object tracking on 1080p images (1920x1080,
  3 channels). The host connection is PCIe Gen3 x2 providing exactly 2.0 GB/s bandwidth.
question: Design the data-flow bound and calculate the theoretical upper limit on
  processing FPS if the host PCIe connection is the sole bottleneck.
details:
  realistic_solution: The uncompressed 1080p frame size is 1920 x 1080 x 3 = 6,220,800
    bytes (~6.22 MB). The maximum ingestion rate across the 2000 MB/s link is 2000
    / 6.22 = 321.5 FPS. Compute capabilities do not matter because data ingestion
    bounds the system.
  common_mistake: Calculating bounds using the accelerator's 26 TOPS or internal SRAM
    speed instead of the explicitly stated PCIe ingestion bottleneck.
  napkin_math: 2000 / (1920 * 1080 * 3 / 1000000) = 321.5 FPS
