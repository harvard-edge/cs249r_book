title: PCIe vs Compute Bind-Flip Under Thermal Throttle
scenario: A Hailo-8 accelerator (26 TOPS INT8) runs object tracking on 1080p images (6.22 MB raw RGB) at 50 GOPs per frame. The host connection is PCIe Gen3 x2 (~1.97 GB/s usable after encoding overhead). Realised on-chip utilisation is 70%. The Hailo-8 sustains full TOPS for 8 minutes in a fanless enclosure; once die temperature crosses 95 C, the firmware drops effective compute to 70% of nominal indefinitely.
question: Design the steady-state FPS budget by computing the PCIe-bound and compute-bound FPS in both cold and warm regimes, and identify the binding constraint in each.
details:
  realistic_solution: 'PCIe-bound FPS = 1970 MB/s usable / 6.22 MB per frame = 317 FPS (independent of thermal state). Compute-bound FPS, cold = 26000 GOPs/s * 0.70 utilisation / 50 GOPs per frame = 18200 / 50 = 364 FPS. Compute-bound FPS, warm = 26000 * 0.70 * 0.70 / 50 = 12740 / 50 = 254.8 FPS. Cold regime: min(317, 364) = 317 - PCIe binds. Warm regime: min(317, 255) = 255 - compute binds. The bind flips at the 8-minute mark.'
  common_mistake: |
    **The Pitfall:** Missing the bottleneck flip across thermal states.
    **The Rationale:** Candidates often benchmark only the cold regime and assume the system remains PCIe-bound, or they misapply the utilization multiplier.
    **The Consequence:** Establishing a "300 FPS" SLA that reliably passes for 8 minutes and then permanently fails by ~15% in production.
  napkin_math: |
    1. **PCIe Bound FPS:** 1970 MB/s / 6.22 MB = 316.7 FPS.
    2. **Compute Bound (Cold):** 26,000 * 0.70 / 50 = 364 FPS.
    3. **Compute Bound (Warm):** 26,000 * 0.70 * 0.70 / 50 = 254.8 FPS.
    4. **Cold Bottleneck:** min(317, 364) = 317 FPS (PCIe bound).
    5. **Warm Bottleneck:** min(317, 255) = 255 FPS (Compute bound).
    **Result: The bottleneck flips from PCIe to Compute upon thermal throttling.**
