title: PCIe PCIe Bottleneck on Accelerator FPS
scenario: A Hailo-8 accelerator (26 TOPS) runs object tracking on 1080p images (1920x1080,
  3 channels). Host connection is PCIe Gen3 x2 providing exactly 2.0 GB/s bandwidth.
  Sustained operation at full TOPS pushes the Hailo-8 to 2.5 W TDP, triggering thermal
  throttling after 8 minutes of continuous operation in a fanless enclosure. Throttled
  performance is ~70% of nominal.
question: Design the system FPS budget by integrating PCIe ingestion bandwidth,
  compute capacity, AND thermal throttling. Identify which constraint binds first
  in steady-state operation past 8 minutes.
details:
  realistic_solution: 'Frame size = 6.22 MB; PCIe Gen3 x2 ingestion = 2000/6.22
    = 321.5 FPS. Compute (assuming 50 GOPs/frame at 26 TOPS, 70% util) = 26000/50/0.7
    = 743 FPS. PCIe binds first at 321 FPS. After 8 min of operation, thermal throttle
    drops Hailo-8 effective TOPS by 30% to 18.2 TOPS -> 520 FPS compute. Throttled
    compute (520) is still > PCIe-bound (321), so PCIe remains the binding constraint
    in both cold AND warm-throttled regimes. The thermal warning from the judge
    matters because for simpler boards (PCIe Gen3 x4), compute would be the bind
    cold but PCIe could become bind warm - so the analysis must always integrate
    all three.'
  common_mistake: Calculating only PCIe-bound FPS in cold conditions and ignoring
    that the binding constraint can SHIFT after thermal throttling kicks in - a
    7-min benchmark looks rosy, an 8-hour deployment fails.
  napkin_math: 'PCIe: 321 FPS. Compute cold: 743 FPS. Compute throttled: 520 FPS.
    Bind = PCIe in both regimes here.'
