title: K3s GPU Scheduling for Jetson Orin Fleet Management
scenario: You're managing a fleet of 50 Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) devices running
  computer vision inference at factory sites. Devices have intermittent connectivity (reconnect every
  15-30 minutes). You're using K3s (lightweight Kubernetes) for orchestration. Pod scheduling fails during
  connectivity gaps.
details:
  realistic_solution: Use K3s with local-path storage and node-level autonomy. Enable --node-status-update-frequency=5m
    to reduce API chatter. Use DaemonSets (not Deployments) for inference pods — DaemonSets are scheduled
    locally and continue running without API server contact. Implement local health checks via systemd
    watchdog. Use NVIDIA device plugin for K3s with helm chart tailored for Jetson.
  common_mistake: Using standard Kubernetes deployment controllers that require constant API server connectivity.
    K3s edge deployments lose scheduling ability during disconnects, causing pods to enter Pending state
    and halting inference during network outages.
  napkin_math: '50 Jetson Orin devices, 15-30 min disconnect windows. Deployment pod: if kubelet loses
    contact with API server for >5 minutes (default node-not-ready timeout), pods are marked for eviction.
    50 devices * average 1 eviction/8 hours = 6.25 evictions/hour. Each eviction = pod restart + model
    reload (~30s on Jetson at LPDDR5 bandwidth: 14GB model / 204GB/s = 0.069s GPU load but 2-3s container
    startup). DaemonSets: never evicted during disconnect. Availability improves from ~95% to ~99.9%.'
