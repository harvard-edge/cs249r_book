id: edge-0596
title: The Headlight Blindness Quantization Failure
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your team is optimizing a critical pedestrian detection model for an automotive ECU, targeting
  a Jetson AGX Orin. To meet the 33ms hard real-time deadline, you''ve quantized the model from FP16 to
  INT8 using post-training quantization (PTQ). Your calibration dataset consists of 10,000 diverse daytime
  driving scenes. The resulting INT8 model performs excellently on your validation set, matching the FP16
  model''s accuracy. However, during in-car night testing, you discover a catastrophic failure: when the
  camera sees oncoming headlights, the model''s recall for pedestrians in the glare drops to nearly zero,
  whereas the original FP16 model handled the scene correctly. The on-call playbook for accuracy regressions
  suggests ''re-calibrating with more diverse data, including night scenes.'' Critique this playbook action
  and justify a more precise, immediate engineering intervention. Why did a seemingly successful quantization
  process lead to such a drastic, non-linear failure mode?'
details:
  realistic_solution: The playbook is wrong because this isn't a simple data distribution mismatch; it's
    a catastrophic failure caused by activation range overflow. The daytime calibration set established
    a relatively narrow dynamic range for the activation values. The intense, localized brightness of
    headlights creates activation values that are orders of magnitude larger than anything seen during
    calibration. In INT8, these extreme values are clipped (or 'saturated') to the maximum representable
    value (e.g., 127), causing a massive, non-linear loss of information in critical layers. The model
    can no longer distinguish between 'bright' and 'blinding,' effectively erasing the features needed
    for detection.
  common_mistake: 'The most common suggestion is to follow the playbook: ''Just add the night-time failure
    cases to the calibration set and re-run PTQ.'' While this might eventually work by broadening the
    calibration range, it''s a blunt instrument. It fails to diagnose the specific underlying mathematical
    failure and may unnecessarily degrade performance on the common daytime case by forcing a universal,
    overly conservative quantization scale. Another mistake is to declare ''INT8 precision is insufficient,''
    which is too general and ignores that the FP16 model''s success proves the core features are learnable.'
  napkin_math: Let's analyze the information loss. Assume a key convolutional layer's activations during
    daytime calibration are neatly contained in the range `[-6.0, 6.0]`. PTQ maps this to INT8 `[-128,
    127]`. The scaling factor `S` is `(6.0 - (-6.0)) / 255 ≈ 0.047`.
