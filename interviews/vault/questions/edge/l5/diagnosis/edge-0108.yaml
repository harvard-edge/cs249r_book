title: The Slow Sensor Stall
topic: real-time-deadlines
status: published
provenance: imported
scenario: You have a 30 FPS camera and a 10 Hz LiDAR. After fusing the sensors, your autonomous vehicle's
  detection rate drops to 10 FPS, causing jerky braking. Based on the synchronization diagram, why is
  your high-speed camera being throttled?
details:
  realistic_solution: 'You have a **Synchronous Fusion Barrier**. Naively waiting for both sensors forces
    the entire pipeline to the rate of the slowest component, discarding 67% of visual information. The
    fix is **Asynchronous Fusion**: run camera detections at 30 FPS and LiDAR at 10 Hz independently,
    then project the 2D detections into 3D using the most recent LiDAR depth map + temporal interpolation.'
  common_mistake: '"The LiDAR is the bottleneck — buy a 30 Hz LiDAR." A faster LiDAR helps but doesn''t
    solve the fundamental architecture issue.'
  napkin_math: At 60 mph (27 m/s), a 10 Hz rate means the car travels 2.7 meters between detections. At
    30 Hz, the gap drops to 0.9 meters. In an emergency, that 1.8-meter difference is life or death.
