schema_version: 1
id: edge-0681
title: The Transformer Patch Limit
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You decide to replace a standard CNN with a Vision Transformer (ViT) for a drone's obstacle
  avoidance system. The ViT has the exact same number of parameters as the CNN. However, when you increase
  the input camera resolution from 224x224 to 448x448 to see smaller wires, the CNN runs slightly slower,
  but the ViT completely crashes with an Out-of-Memory (OOM) error. Why?
details:
  realistic_solution: You hit the quadratic memory wall of self-attention. A CNN's activation memory grows
    *linearly* with the number of input pixels. A Vision Transformer splits the image into patches (tokens)
    and computes self-attention across all of them. The memory required to store the self-attention matrix
    scales quadratically ($O(N^2)$) with the number of patches. By doubling the resolution, you quadrupled
    the number of patches, which increased the attention memory requirement by 16x, instantly blowing
    out the edge device's RAM.
  common_mistake: '"Assuming that because both models have the same number of parameters, their memory
    footprint will scale identically when the input size changes."'
  napkin_math: At 224x224 with 16x16 patches, you have `(224/16)^2 = 196 patches`. The attention matrix
    size is proportional to `196^2 = ~38,416` elements. At 448x448, you have `(448/16)^2 = 784 patches`.
    The attention matrix size jumps to `784^2 = ~614,656` elements. A 16x explosion in intermediate activation
    memory purely from the attention mechanism.
