schema_version: 1
id: edge-0029
title: The Python GIL Multithreading Trap
topic: 3d-parallelism
status: published
provenance: imported
scenario: You run an object detection model on a Raspberry Pi. The camera capture takes 30ms. The ML model
  takes 40ms. In a sequential Python script, total time is 70ms (~14 FPS). To speed this up, you put the
  camera capture and the ML model into two separate Python `threading.Thread` objects. You expect them
  to run in parallel on the Pi's 4-core CPU, achieving 40ms total time (25 FPS). But the framerate remains
  exactly 14 FPS. Why did multithreading fail?
details:
  realistic_solution: 'Python''s Global Interpreter Lock (GIL) prevents true parallel execution. The GIL
    ensures only one thread executes Python bytecode at a time, even on a 4-core CPU. Your camera thread
    and ML thread take turns holding the GIL, executing sequentially: 30ms + 40ms = 70ms, identical to
    no threading at all. The fix: use `multiprocessing` instead of `threading` — each process gets its
    own Python interpreter and GIL, enabling true parallelism. The camera process captures frames into
    shared memory while the ML process runs inference, achieving 40ms total (bounded by the slower task)
    for 25 FPS.'
  common_mistake: '"The Raspberry Pi CPU is too weak to handle threads." The hardware has 4 cores; the
    limitation is entirely in the software interpreter.'
  napkin_math: Camera (30ms) + ML (40ms). Sequential = 70ms. Threading (with GIL context switching overhead)
    = 71ms. Multiprocessing (true parallelism) = bottlenecked by the slowest task = 40ms (25 FPS).
