id: edge-0701
title: The Edge LLM Context Window
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team wants to run a 3B-parameter LLM (Phi-3-mini, INT4 quantized) on a Jetson AGX Orin
  (64 GB unified LPDDR5, 204.8 GB/s bandwidth) for a conversational robotics assistant. The robot needs
  to maintain a 4096-token context window for multi-turn dialogue. During testing, the first response
  is fast (40 tokens/sec), but by the 10th turn of conversation, generation has slowed to 8 tokens/sec
  and the system is swapping. What went wrong?
details:
  realistic_solution: The KV-cache is eating your memory alive, and it grows with every token generated
    across every conversation turn.
  common_mistake: '"The model is too large for the device." A 3B INT4 model is only ~1.5 GB — well within
    64 GB. The candidate who focuses on model size alone misses the real memory consumer: the KV-cache.'
  napkin_math: 'KV-cache per token (FP16, 32 layers, 32 heads, 96 head_dim): 2 × 32 × 32 × 96 × 2 = 393,216
    bytes ≈ 384 KB. At 4096 tokens: 1.57 GB. With sliding window (2048): 785 MB. With GQA (8 KV heads):
    393,216 / 4 = 98,304 bytes/token → 196 MB at 2048-token window. With INT8 KV: 98 MB. Memory bandwidth
    for KV-cache reads during generation: 393,216 bytes/token × 40 tokens/sec = 15.3 MB/s (FP16). Trivial
    vs 204.8 GB/s available. The bottleneck isn''t bandwidth — it''s capacity and fragmentation.'
