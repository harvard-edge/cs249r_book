schema_version: 1
id: edge-0095
title: The Pruning Paradox
topic: kernel-fusion
status: published
provenance: imported
scenario: You structured-pruned 40% of channels from your detection model. FLOPs dropped 40%. But when
  you benchmark on the Hailo-8, latency only dropped 10%. On the Jetson Orin, it dropped 35%. Why does
  the same pruning give wildly different speedups on different hardware?
details:
  realistic_solution: 'Edge accelerators have fundamentally different execution models. The **Jetson Orin
    (GPU)** executes layers as CUDA kernels with configurable thread blocks. Fewer channels = fewer threads
    = proportional speedup (with some overhead). The **Hailo-8 (dataflow)** maps the model onto a fixed
    spatial pipeline at compile time. Each layer is assigned physical compute units based on its original
    shape. When you prune a layer from 64 to 38 channels, the Hailo''s compiler must still allocate compute
    units in multiples of its native SIMD width (typically 8 or 16). A 38-channel layer executes as if
    it had 48 channels (rounded up to the next multiple of 16), wasting 21% of the allocated compute.
    Across many layers, these rounding penalties accumulate, eroding the theoretical 40% FLOP reduction
    to a 10% latency reduction. Fix: use **hardware-aware pruning** that constrains channel counts to
    multiples of the target hardware''s native width. Prune from 64 to 32 channels (50% reduction, but
    hardware-aligned) instead of 64 to 38 (41% reduction, but misaligned).'
  common_mistake: '"The Hailo''s compiler isn''t optimized for pruned models." The compiler is fine —
    the issue is architectural.'
  napkin_math: '10 layers, each pruned from 64 to 38 channels. Hailo SIMD width = 16. Effective channels
    per layer: 48 (rounded up). Effective FLOP reduction: (64-48)/64 = 25%, not 40%. With hardware-aware
    pruning to 32 channels: effective reduction = 50%, and every channel is utilized. Latency improvement:
    Hailo ~45% (vs 10% naive), Orin ~48% (vs 35% naive).'
