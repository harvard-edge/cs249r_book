id: edge-0819
title: Evaluating Robust Aggregation in Corrupted Federated Networks
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are managing a global federated learning system for a mobile keyboard application. During
  a recent training round with 10,000 participating clients ($n=10^4$) sending updates for a 1M-parameter
  model ($d=10^6$), the global model's loss spikes dramatically. Telemetry indicates that 2% of the devices
  are sending heavily corrupted gradients due to memory faults on specific low-tier SOCs. The current
  aggregation uses standard FedAvg. Evaluate the trade-offs between implementing Krum, Coordinate-wise
  Median, and Trimmed Mean for robust aggregation, justifying your design decision based on Byzantine
  breakdown points and server-side computational complexity.
details:
  realistic_solution: Implement a Trimmed Mean aggregation (e.g., trimming the top and bottom 5%). It
    provides robust defense against the 2% corrupted updates (breakdown point well above the corruption
    rate) while scaling log-linearly with client count, avoiding the quadratic bottleneck of distance-based
    methods like Krum.
  common_mistake: Assuming gradient clipping with standard FedAvg is sufficient to prevent poisoning,
    or selecting Krum without realizing its quadratic scaling with the number of clients makes it computationally
    infeasible for large cohorts.
  napkin_math: 'For $n=10^4$ clients and $d=10^6$ parameters: Krum computes pairwise distances taking
    $O(n^2 d) \approx 10^8 \times 10^6 = 10^{14}$ operations per round. Trimmed Mean sorts each coordinate
    taking $O(d \cdot n \log n) \approx 10^6 \times (10^4 \times 13.3) \approx 1.33 \times 10^{11}$ operations.
    Trimmed mean is ~750x faster on the aggregator.'
