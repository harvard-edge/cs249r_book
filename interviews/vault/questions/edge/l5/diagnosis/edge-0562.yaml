schema_version: 1
id: edge-0562
title: The Real-Time Scheduling Priority
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your robotics team runs an obstacle detection model on an Intel Movidius Myriad X (4 TOPS) connected
  via USB 3.0 to an ARM Cortex-A72 host. The inference thread is set to Linux SCHED_FIFO priority 90 (near
  maximum). Average inference latency is 15ms, well within your 33ms deadline. But once every ~200 frames,
  latency spikes to 55ms, causing the robot to jerk. Your colleague says 'SCHED_FIFO should prevent preemption.'
  Why are you still missing deadlines?
details:
  realistic_solution: 'SCHED_FIFO only provides priority scheduling in user space — it cannot prevent
    kernel-level non-determinism. Three sources cause the 55ms spikes: (1) Linux kernel page reclaim (kswapd)
    can stall any process for 40ms while it writes dirty pages to disk; (2) USB 3.0 hub contention causes
    data transfer jitter from 3ms to 8ms; (3) DMA bus contention between the USB controller and system
    memory adds 5ms worst case. Total worst case: 15ms + 8ms + 40ms + 5ms = 68ms. Fix: use PREEMPT_RT
    kernel (bounds kernel latency), `mlockall()` (prevents page faults), `isolcpus` (dedicates a core),
    and replace USB with PCIe for deterministic transfers.'
  common_mistake: '"SCHED_FIFO guarantees real-time behavior on Linux." Standard Linux is not a real-time
    operating system — SCHED_FIFO only provides priority scheduling, not deterministic latency guarantees.'
  napkin_math: 'Average inference: 15ms. USB transfer (input + output): 2 × 1 MB at 5 Gbps = 3.2ms typical,
    8ms worst case (hub contention). Kernel page reclaim: 0ms typical, 40ms worst case. DMA bus contention:
    0ms typical, 5ms worst case. Total worst case: 15ms + 8ms + 40ms + 5ms = 68ms. With PREEMPT_RT + mlockall
    + isolcpus: worst case drops to 15ms + 5ms (USB) = 20ms. With PCIe instead of USB: 15ms + 0.5ms =
    15.5ms.'
