schema_version: 1
id: edge-exp2-real-0208
title: Fused Attention Optimization on Qualcomm Cloud AI 100
topic: kernel-fusion
status: published
provenance: imported
scenario: You are deploying a real-time vision transformer on an on-premise server using a Qualcomm Cloud
  AI 100 accelerator to process multiple camera streams. Profiling shows the pipeline is memory-bound
  during the attention mechanism's softmax and point-wise operations, failing to utilize the 400 TOPS
  INT8 compute capacity. Given the accelerator's 32 GB LPDDR4x memory and strict 75W power limit, evaluate
  a kernel fusion strategy to eliminate off-chip memory round-trips for intermediate activations and quantify
  the bandwidth savings.
details:
  realistic_solution: The candidate should propose a fused attention approach (like FlashAttention) specifically
    tailored for the AI 100's architecture, computing QK^T and softmax in a single pass using on-chip
    SRAM. They must evaluate the tradeoff between SRAM capacity limits and the massive reduction in LPDDR4x
    traffic. The optimal design tiles the sequence to fit intermediate INT8 activations entirely on-chip,
    maximizing the 400 TOPS compute utilization while staying well under the 75W power budget by minimizing
    memory I/O.
  common_mistake: Candidates often propose generic kernel fusion without calculating the actual memory
    traffic reduction or considering the hardware's specific constraints. They frequently ignore that
    off-chip LPDDR4x accesses dominate power consumption in a 75W envelope and fail to size the SRAM requirements
    for the fused intermediate block.
  napkin_math: For a sequence length N=1024, head dim d=64, and INT8 precision (1 byte/element). The intermediate
    QK^T attention matrix is N x N = 1024 x 1024 bytes = 1 MB per head. An unfused implementation writes
    this 1 MB to the 32 GB LPDDR4x and reads it back for softmax, costing 2 MB of traffic per head per
    inference. For 12 heads processing at 30 FPS across 10 concurrent streams, unfused memory traffic
    is 2 MB * 12 * 30 * 10 = 7.2 GB/s. Fusing the kernel keeps the 1 MB block in SRAM, saving 7.2 GB/s
    of LPDDR4x bandwidth. This drastically reduces the power draw (vital for the 75W limit) and frees
    up bandwidth to keep the 400 TOPS compute units fed.
