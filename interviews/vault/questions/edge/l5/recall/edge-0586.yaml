schema_version: 1
id: edge-0586
title: The Distillation Performance Trap
topic: kernel-fusion
status: published
provenance: imported
scenario: Your team is optimizing a perception model for an autonomous vehicle's forward-facing camera.
  The system runs on a Jetson AGX Orin and has a hard real-time deadline of 33ms per frame (30 FPS). The
  current ResNet-based detection model is heavily optimized with TensorRT and runs in 22ms, meeting the
  deadline.
details:
  realistic_solution: The optimization strategy failed because it traded a compute-bound problem for a
    memory-bound one by breaking operator fusion. The original ResNet, composed of standard `Conv-BN-ReLU`
    blocks, was aggressively fused by the TensorRT compiler into a small number of large, efficient GPU
    kernels. In a fused kernel, the intermediate data (e.g., the output of the Conv, which is the input
    to the BN) stays in fast on-chip L2 cache or registers.
  common_mistake: Focusing only on arithmetic. The most common mistake is to assume that latency is directly
    proportional to the number of FLOPs or MACs. An engineer might say, 'This is impossible, a model with
    fewer calculations must be faster. There must be a bug in the benchmark code or an op falling back
    to CPU.' While possible, this misses the systemic hardware interaction.
  napkin_math: 'Original fused Conv-BN-ReLU reads input+weights (12MB), writes output (10MB). Traffic
    = 22MB. Time = 22MB / 204.8GB/s = 0.1ms. Unfused custom op breaks it: Conv writes 10MB. BN reads 10MB,
    writes 10MB. ReLU reads 10MB, writes 10MB. Total traffic = 62MB. Time = 62MB / 204.8GB/s = 0.3ms.
    Latency increases 3x.'
