schema_version: 1
id: edge-exp2-real-0217
title: Multi-Model Serving Strategy on Hailo-8 Accelerator
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are designing a multi-model serving infrastructure on an edge gateway equipped with a single
  Hailo-8 accelerator (26 TOPS INT8, 2.5W). The pipeline must process a 30 FPS video stream, running a
  15MB object detector followed by a 10MB feature extractor for up to 3 detected objects per frame. Since
  the Hailo-8 is a dataflow architecture with no local DRAM that streams weights and activations directly
  from host memory, you must evaluate how to schedule and serve these models. Quantify the tradeoffs between
  temporal multiplexing (context switching per frame) versus co-compiling both models into a single spatial
  context.
details:
  realistic_solution: The optimal serving design avoids per-frame context switching by co-compiling the
    detector and feature extractor into a single multi-network Hailo executable (spatial multiplexing)
    so both graphs reside on-chip simultaneously. If the combined models exceed the chip's internal SRAM/control
    resources, the fallback strategy must be temporal multiplexing with large micro-batches (e.g., batching
    30 frames at a time) to amortize the PCIe network load time, utilizing host memory as a buffer.
  common_mistake: Candidates often only calculate compute requirements against the 26 TOPS rating and
    assume sequential execution is trivial. They treat the Hailo-8 like a traditional GPU with local VRAM,
    ignoring that swapping dataflow configurations from host memory over PCIe for every single frame creates
    a massive I/O bottleneck that breaks real-time latency.
  napkin_math: 'Compute is unconstrained: Detector (10 GOPS) + 3x Extractor (5 GOPS) = 25 GOPS/frame,
    requiring just 0.75 TOPS at 30 FPS (vastly under the 26 TOPS limit). However, temporal context switching
    requires reloading 15MB + 10MB = 25MB of network configuration per frame. Over an edge PCIe Gen3 x2
    link (~1.5 GB/s practical bandwidth), loading 25MB takes ~16.6ms. Switching contexts twice per frame
    (Detector -> Extractor -> Detector) costs ~33.2ms. At 30 FPS, the frame budget is exactly 33.3ms,
    meaning I/O overhead consumes 99% of the latency budget before any inference occurs.'
