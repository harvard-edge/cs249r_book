schema_version: 1
id: edge-crit-20045
title: Speculative Decoding on Jetson Orin
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You want to use speculative decoding for a 7B target model on Jetson Orin (32GB LPDDR5, 102
  GB/s, ~2 TFLOPS FP16). Options for draft: (A) 0.5B model, (B) 2-layer early-exit from 7B, (C) n-gram
  lookup table with no neural compute. Determine which approach reduces latency given Orin''s memory bandwidth
  constraint.'
details:
  realistic_solution: 'Target decode on Orin: 7B x 2B = 14GB weight read per token at 102 GB/s = 137ms/token
    (deeply memory-bound: 14 GFLOP / 2 TFLOPS = 7ms compute). (A) 0.5B draft: 1GB read/token at 102 GB/s
    = 10ms. K=5 draft: 50ms. Verify: 137ms (weights) + K+1 tokens KV cache. Total: 187ms for ~2.5 tokens
    = 75ms/tok vs 137ms. 1.83x speedup. But draft weights (1GB) compete for 32GB memory with target (14GB)
    + KV cache. (B) Early-exit (2 layers of 7B): per-layer weight = 7B x 2B / 32 layers = 437MB. 2 layers
    = 875MB read = 8.6ms/token. No extra memory. K=5: 43ms + 137ms = 180ms for ~2.3 tokens = 78ms. 1.76x.
    (C) N-gram lookup: 0ms compute, table ~50MB in memory. alpha=0.45 (low). K=8: E[tok] = 1.75. Time:
    0ms + 137ms = 137ms for 1.75 = 78ms. 1.75x. Surprisingly competitive! But variable alpha makes it
    unreliable. Winner: (A) 0.5B draft for consistent 1.83x speedup.'
  common_mistake: Assuming a neural draft model is always best. On Orin, even a tiny draft model competes
    for the same limited bandwidth (102 GB/s) as the target model, and Orin lacks the parallel execution
    capability to run draft and target simultaneously.
  napkin_math: 'Target: 14GB / 102 GB/s = 137ms. 0.5B draft: 1GB / 102 = 10ms. K=5 total: 50+137 = 187ms
    / 2.5 tokens = 75ms. Speedup: 1.83x. N-gram (free compute): 137ms / 1.75 = 78ms, 1.75x.'
