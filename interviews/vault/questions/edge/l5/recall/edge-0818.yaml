schema_version: 1
id: edge-0818
title: The RTSP Stream Bandwidth Saturation
topic: real-time-deadlines
status: published
provenance: imported
scenario: A Jetson Orin edge node receives 8 RTSP camera streams over a 1 Gbps Ethernet link. Each camera
  sends 1080p H.264 at 30 FPS. A typical 1080p H.264 stream at medium quality is ~4 Mbps. The Orin must
  decode all streams and run detection on each. Calculate total ingest bandwidth, decode throughput required,
  and determine the bottleneck — is it network, decode, or inference?
details:
  realistic_solution: 'Network: 8 × 4 Mbps = 32 Mbps (3.2% of 1 Gbps — trivial). Decode: 8 streams × 30
    FPS = 240 frames/s to decode. Orin''s NVDEC can decode up to 8× 4K30 or ~32× 1080p30 streams. 8 streams
    is well within NVDEC capability. Inference: YOLOv8-S on Orin at INT8 = ~2ms/frame. 240 frames/s ×
    2ms = 480ms of GPU time per second = 48% GPU utilization. This works. BUT: if model grows to YOLOv8-L
    (~8ms/frame), need 240 × 8 = 1,920ms/s — impossible on one GPU. Bottleneck shifts to inference at
    ~125 FPS max (4 cameras at 30 FPS). Real deployment uses skip-frame strategies: analyze every 3rd
    frame per camera → 80 inferences/s → 640ms/s = 64% GPU.'
  common_mistake: Only checking network bandwidth. 8 × 4 Mbps = 32 Mbps — easily fits in 1 Gbps. But the
    bottleneck is usually decode or inference, not network. Candidates who stop at the bandwidth check
    miss the real constraint.
  napkin_math: 'Network: 8 × 4 Mbps = 32 Mbps << 1 Gbps ✓. Decode: 8 × 30 = 240 FPS. NVDEC capacity: ~960
    1080p FPS → 25% utilized ✓. Inference (YOLOv8-S, 2ms): 240 × 2 = 480ms/s = 48% GPU ✓. Inference (YOLOv8-L,
    8ms): 240 × 8 = 1,920ms/s > 1,000ms → BOTTLENECK. Max cameras at full rate: 1,000/8/30 = 0.3 → 4 cameras.'
