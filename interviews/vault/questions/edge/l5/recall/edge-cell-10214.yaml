id: edge-cell-10214
title: Mastering Power-Aware Pipeline Scheduling on Jetson Orin
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'A Jetson Orin (60W TDP) compound AI pipeline runs: vision encoder (15W, 20ms), embedding model
  (10W, 8ms), LLM decoder (55W, 200ms per query). When all three run simultaneously, the system draws
  80W and triggers thermal throttling, reducing LLM throughput by 40%. A battery-powered deployment requires
  average power under 35W over any 10-second window. Design a power-aware scheduling strategy.'
details:
  realistic_solution: 'Pipeline the stages with explicit power budgeting: assign each stage to a non-overlapping
    time slot within the query budget. Vision encoder (15W, 20ms) → embedding (10W, 8ms) → LLM (55W, 200ms)
    = 228ms serial, peak power = max(15,10,55)=55W. Idle power between queries at 35W average: 35W over
    10s means 350J budget. Active pipeline: 15*0.020 + 10*0.008 + 55*0.200 = 0.3+0.08+11 = 11.38J per
    query. At 35W average: 350J/10s / 11.38J = 30.75 queries per 10s → 3 queries/s max. Queue queries
    and add sleep between: 10s * (35W/55W max_active) = 6.36s active per 10s → 2.6 queries/s sustainable.'
  common_mistake: 'Running all pipeline stages at maximum performance simultaneously, assuming the OS
    will handle power limits via DVFS. Jetson Orin''s DVFS responds to thermals with hundreds of milliseconds
    of lag, meaning the pipeline thrashes: run fast, overheat, throttle, recover, repeat.'
  napkin_math: 'Energy per query: 15W*20ms + 10W*8ms + 55W*200ms = 0.3J + 0.08J + 11J = 11.38J. 35W average
    * 10s = 350J budget per 10s window. Queries per window: 350/11.38 = 30.75... but that assumes sequential
    non-overlapping. Wait: 30.75 queries * 228ms each = 7.0s of active time in 10s. 7.0s * avg_power_during_active
    + 3.0s * idle_power = budget: 7.0 * 40W (pipeline avg) + 3.0 * 5W = 280+15=295J < 350J. Achievable
    at 30 queries/10s = 3 qps.'
