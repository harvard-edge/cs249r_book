schema_version: 1
id: edge-0928
title: Tracing Latency in Hybrid Edge-Cloud Pipelines
topic: latency-decomposition
status: published
provenance: imported
scenario: Retail cameras run an edge SSD detector (20ms), crop items, and send them to a cloud ViT classifier
  via an API. The end-to-end SLA is 500ms. P99 latency is spiking to 1200ms. You need to implement distributed
  tracing to isolate the bottleneck without adding more than 2ms overhead to the edge critical path.
details:
  realistic_solution: Implement W3C Trace Context propagation natively within the inference pipeline.
    Generate a 16-byte TraceID at the edge upon frame capture. Instead of making separate network calls
    to emit spans, inject the TraceID and local timestamps (capture_time, detection_end, queue_start)
    directly into the HTTP headers of the crop payload sent to the cloud classifier. The cloud service,
    possessing abundant resources, strips these headers, computes the edge durations, appends its own
    inference/DB spans, and asynchronously flushes the complete unified trace to the observability backend.
  common_mistake: Using an edge OpenTelemetry agent to independently emit spans to an observability backend
    over a separate network connection.
  napkin_math: 'Edge-emitted spans: 1 extra HTTP request (TLS + payload) = ~30-50ms blocking I/O if not
    perfectly async. Header injection: 3 timestamps (8 bytes each) + 16-byte TraceID = 40 bytes added
    to the existing payload. String formatting takes <0.1ms. Zero additional network connections.'
