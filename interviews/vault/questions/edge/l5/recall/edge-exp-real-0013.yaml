schema_version: 1
id: edge-exp-real-0013
title: Automotive ASIL-D Certification for Lidar Perception on Jetson Orin
topic: safety-certification
status: published
provenance: imported
scenario: Your team is building an autonomous driving system targeting ISO 26262 ASIL-D compliance. The
  primary Lidar perception stack, including object detection and free-space segmentation, runs on an NVIDIA
  Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The safety team requires deterministic execution
  times and guaranteed fault detection within a 50ms timeframe. Evaluate the architectural choices needed
  to achieve this level of functional safety on the Orin, specifically addressing how to handle transient
  hardware faults and software lockups.
details:
  realistic_solution: A robust solution involves a heterogeneous, asymmetric redundancy approach. The
    primary, high-accuracy Lidar model runs on the Ampere GPU. A secondary, simpler 'safety net' model
    runs on the independent DLA accelerators, providing diverse redundancy. An external ASIL-D certified
    safety MCU monitors both via a hardware watchdog timer and compares their outputs. If the outputs
    diverge significantly or the Orin misses a 50ms heartbeat, the MCU triggers a safe state (e.g., minimal
    risk maneuver).
  common_mistake: Candidates often assume the Jetson Orin is natively ASIL-D compliant or rely solely
    on software watchdogs. They might propose running identical redundant models on the single Ampere
    GPU, failing to recognize that this doesn't protect against systemic hardware faults in the GPU pipeline,
    or they ignore the DLA accelerators as a potential safety mechanism.
  napkin_math: If the safety goal requires fault detection within 50ms, and the external MCU needs 5ms
    to react and trigger the safe state, the Jetson Orin has a 45ms budget. If the primary Lidar model
    on the GPU takes 30ms (running at ~33 Hz), we have 15ms of slack. The DLA safety model must execute
    in parallel within that 45ms window. Assuming the 275 TOPS are split (e.g., 170 GPU, 105 DLA), the
    DLA model must be significantly quantized (INT8) and pruned to ensure it finishes within the required
    timeframe while consuming a fraction of the 60W TDP to prevent thermal throttling, which could violate
    the deterministic timing guarantees.
