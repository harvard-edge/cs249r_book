schema_version: 1
id: edge-cell-13050
title: 'Edge Queueing Theory Optimization: Memory-Aware Scheduling on Jetson Orin'
topic: queueing-theory
status: published
provenance: imported
scenario: A Jetson Orin (32GB LPDDR5, 102.4GB/s memory bandwidth) running multi-model inference shows
  P99=300ms despite GPU compute at 40% utilization. Profiling shows 70% of time is spent on weight loading
  (memory-bound decode). Using queueing + Roofline analysis, diagnose and quantify the fix from weight
  caching vs model switching policies.
details:
  realistic_solution: 'M/M/1 or M/D/1 Wq at ρ=0.825, μ=9.7: Wq ≈ 485ms (not 48.7ms — there''s a 10× decimal
    error in the original).'
  common_mistake: Treating memory bandwidth as a fixed background cost rather than modeling it as a shared
    resource with a separate queueing model (the memory bus has its own utilization and queuing delay).
  napkin_math: 'M/D/1 queue (or M/M/1 for this scenario): λ=8/s, μ=9.7/s, ρ=8/9.7=0.825. M/D/1 Wq = ρ/(2μ(1-ρ))
    = 0.825/(2×9.7×0.175) = 0.825/3.395 = 0.243s = 243ms... but M/M/1 Wq = ρ/(μ(1-ρ)) = 0.825/(9.7×0.175)
    = 0.825/1.6975 = 0.486s = 486ms ≈ 485ms (not 48.7ms — that is 10× too small, likely a decimal error).
    Key: 485ms not 48.7ms.'
