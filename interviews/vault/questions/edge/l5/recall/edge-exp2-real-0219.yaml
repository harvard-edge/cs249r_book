schema_version: 1
id: edge-exp2-real-0219
title: Sizing Telemetry for Coral Edge TPU Fleet
topic: monitoring-observability
status: published
provenance: imported
scenario: You are deploying 5,000 traffic monitoring nodes, each equipped with a Google Coral Edge TPU
  (4 TOPS INT8, 2W, USB form factor). You need to design a telemetry system to detect stragglers and hardware
  degradation (e.g., thermal throttling, USB bandwidth drops). Given the limited 50 Kbps cellular uplink
  per node, design the monitoring architecture and determine what metrics to collect, how often to send
  them, and how to size the central ingestion pipeline to achieve a 15-minute MTTR for node failures.
details:
  realistic_solution: Implement a local agent that aggregates metrics over a 1-minute window, calculating
    P99 latency, average TPU temperature, power draw, and USB error counts. Send a compressed heartbeat
    containing these aggregated metrics. Set up cloud-side alerting for when TPU power approaches 2W while
    TOPS utilization drops, signaling thermal throttling. Only upload detailed diagnostic logs when anomalous
    states are detected locally.
  common_mistake: Candidates often stream raw metrics (e.g., per-inference latency, full system logs)
    to the cloud, easily exceeding the 50 Kbps limit. They also frequently ignore hardware-specific failure
    modes like USB bus resets or the Edge TPU dropping to lower frequencies when approaching its 2W thermal
    limit, instead focusing only on software application errors.
  napkin_math: 'Compute capacity: 4 TOPS INT8. Power limit: 2W. If the model takes 10 GOPS/frame at 30
    FPS, it requires 300 GOPS (0.3 TOPS). Telemetry payload per minute: 10 aggregated metrics * 4 bytes
    = 40 bytes. Heartbeat bandwidth per node: 40 bytes * 8 bits / 60 seconds = 5.3 bps. For 5,000 nodes,
    central ingestion must handle 5,000 * 5.3 bps = 26.5 Kbps of continuous telemetry. This leaves over
    99.9% of the 50 Kbps cellular link available per node while detecting when a node hits its 2W limit
    and throttles down from 4 TOPS.'
