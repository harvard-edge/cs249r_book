schema_version: 1
id: edge-cell-13126
title: 'Edge TCO Optimization: Optimize Connectivity Costs Dominating TCO'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: An edge fleet of 1000 Jetson Orin units has connectivity costs dominating TCO at $15/unit/month
  (4G with full camera stream). Inference cost is only $3/unit/month (amortized hardware + power). Design
  an optimization to reduce connectivity by 90% without compromising functionality. Quantify 5-year savings
  and implementation cost.
details:
  realistic_solution: 'Current: $15 connectivity + $3 compute = $18/unit/month. 1000 units: $18K/month
    = $216K/yr = $1.08M/5yr. Optimization: run inference on Jetson, transmit only: (1) detection results
    (JSON, 100 bytes/event), (2) alert thumbnails (50KB for anomalies only). Assuming 100 events/day:
    100*100 bytes = 10KB/day vs current camera stream (1080p H.264: ~500MB/day). Reduction: 10KB/500MB
    = 0.002% of current data. New connectivity: $0.50/unit/month (LoRa/NB-IoT). Savings: $14.50/unit/month
    = $14.5K/month = $174K/yr = $870K/5yr. Development cost: $100K (3 months, 2 engineers). Net 5yr: $870K-$100K=$770K.
    Payback: 7 months.'
  common_mistake: Proposing to reduce data sent without designing the on-device edge processing pipeline
    that makes this possible, and not accounting for the development cost of moving logic to the edge.
  napkin_math: 'Current: $15 conn * 1000 * 60mo = $900K + $3 compute * 1000 * 60 = $180K = $1.08M total
    5yr. Optimized: $0.50 conn * 1000 * 60 = $30K + $180K compute = $210K total. Savings: $870K. Dev:
    $100K. Net: $770K. Payback: $100K / ($870K/60mo) = 6.9 months. Connectivity reduction: $15→$0.50/unit/month
    = 97% reduction (better than 90% target). Bandwidth: 500MB/day → 10KB/day = 50,000x reduction. This
    is the fundamental value proposition of edge AI: process data where it''s generated, transmit only
    insights.'
