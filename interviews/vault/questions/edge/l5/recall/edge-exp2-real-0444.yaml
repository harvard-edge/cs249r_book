schema_version: 1
id: edge-exp2-real-0444
title: Sizing Llama-3 8B KV Cache for AI 100
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are designing an on-premise inference system using the Qualcomm Cloud AI 100 to serve an
  8-billion parameter LLM for summarizing long corporate documents. The model weights are quantized to
  INT8 to leverage the 400 TOPS INT8 compute capacity. Given the hardware limit of 32 GB LPDDR4x memory
  operating within a 75W envelope, evaluate the maximum achievable batch size and context length before
  hitting memory capacity limits, and design a deployment strategy to optimize system utilization.
details:
  realistic_solution: A strong L5 candidate will first subtract the static INT8 weight footprint from
    the 32 GB capacity. They will then calculate the exact KV-cache size per token based on the model's
    architecture. To maximize the 400 TOPS compute utilization on the AI 100, they will evaluate the optimal
    batch size against the required sequence length for document summarization, likely suggesting INT8
    quantization for the KV-cache as well to double the effective context window or batch capacity.
  common_mistake: Candidates often only calculate the memory footprint of the model weights and ignore
    the dynamic memory growth of the KV-cache. Additionally, they may fail to evaluate the tradeoff between
    batch size and sequence length within the strict 32 GB memory constraint of the LPDDR4x subsystem.
  napkin_math: 'INT8 Model weights: 8B parameters * 1 byte = 8 GB. Remaining memory for KV cache & activations:
    32 GB - 8 GB = 24 GB. Assuming standard 8B architecture with Grouped Query Attention (32 layers, 8
    KV heads, 128 head dim): FP16 KV cache per token = 2 (K, V) * 2 bytes * 32 layers * 8 heads * 128
    dim = 131 KB per token. Max total tokens in memory = 24 GB / 131 KB = 183,206 tokens. For a document
    summarization task requiring an 8K (8192 tokens) context window, the maximum theoretical batch size
    is 183,206 / 8,192 = 22 concurrent requests.'
