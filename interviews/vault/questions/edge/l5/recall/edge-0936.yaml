schema_version: 1
id: edge-0936
title: IoT Edge TPU Sleep State Optimization
topic: energy-per-operation
status: published
provenance: imported
scenario: An industrial IoT sensor runs an anomaly model every 200ms. Inference takes 10ms on an edge
  TPU (2.5W active). In "clock-gated" mode, it uses 0.5W and wakes in 1ms (drawing 1.0W during wake).
  In "power-gated" mode, it uses 0.05W but takes 40ms to wake (drawing 1.5W during wake). Evaluate which
  sleep state minimizes average energy consumption per cycle.
details:
  realistic_solution: Calculate the energy consumed over a single 200ms duty cycle for both sleep states.
    Break the cycle into active time, wake time, and sleep time. Power gating has a much lower static
    draw but incurs a significant energy penalty during its long wake-up sequence. The optimal state depends
    entirely on whether the idle duration is longer than the break-even time of the deep sleep penalty.
    In this case, the duty cycle is long enough that power gating saves more energy.
  common_mistake: Choosing the power-gated mode solely because 0.05W is much lower than 0.5W, ignoring
    the massive energy penalty of the wake-up phase.
  napkin_math: 'Cycle = 200ms. Active = 10ms. Clock-gated: Wake=1ms, Sleep=189ms. Energy = (10ms*2.5W)
    + (1ms*1.0W) + (189ms*0.5W) = 25 + 1 + 94.5 = 120.5 mJ. Power-gated: Wake=40ms, Sleep=150ms. Energy
    = (10ms*2.5W) + (40ms*1.5W) + (150ms*0.05W) = 25 + 60 + 7.5 = 92.5 mJ. Power-gated saves 28 mJ per
    cycle.'
