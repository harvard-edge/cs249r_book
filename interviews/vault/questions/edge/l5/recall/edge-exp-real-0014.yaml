schema_version: 1
id: edge-exp-real-0014
title: Thermal Sizing for Fanless Hailo-8 Edge Camera
topic: thermal-management
status: published
provenance: imported
scenario: You are designing a fanless industrial smart camera using a host SoC and a Hailo-8 accelerator
  for defect detection. The Hailo-8 provides 26 TOPS at 2.5W, but as a dataflow accelerator with no local
  DRAM, it continuously streams from the host's LPDDR4. The sealed enclosure has a maximum passive dissipation
  limit of 8W at a 50°C ambient environment. The host SoC consumes 4W baseline, and memory streaming adds
  0.5W per GB/s. Evaluate the thermal feasibility of running a continuous vision pipeline requiring 13
  TOPS and 4 GB/s of memory bandwidth, and decide if structural or algorithmic changes are necessary.
details:
  realistic_solution: 'The candidate should calculate the total system power by summing the host baseline,
    scaled Hailo-8 power, and memory bandwidth power. Upon realizing the total power dangerously approaches
    the enclosure''s limits, they should propose practical mitigations: heavily quantizing or pruning
    the model to reduce bandwidth, employing temporal duty-cycling (burst then sleep), or mechanically
    bonding the Hailo-8 to the external metal chassis to increase the dissipation envelope.'
  common_mistake: Candidates often only consider the 2.5W TDP of the Hailo-8 module and ignore the significant
    thermal load added to the host SoC by continuous memory streaming. They may also overlook the necessity
    of a thermal buffer for reliable operation in a high-ambient 50°C environment.
  napkin_math: Host baseline power = 4.0W. Hailo-8 power at 13 TOPS = (13 / 26 TOPS) * 2.5W = 1.25W. Host
    memory streaming power = 4 GB/s * 0.5W/GB/s = 2.0W. Total system power = 4.0W + 1.25W + 2.0W = 7.25W.
    With an 8W dissipation limit, the thermal margin is only 0.75W (less than 10%), making sustained operation
    risky at 50°C without active cooling or workload reduction.
