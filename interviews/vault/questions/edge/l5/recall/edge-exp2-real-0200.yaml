schema_version: 1
id: edge-exp2-real-0200
title: Zero-Copy Pipeline Design on Unified Edge Architectures
topic: dma-data-movement
status: published
provenance: imported
scenario: Your team is deploying a real-time multi-camera perception stack on an NVIDIA Jetson Orin (32
  GB LPDDR5, Ampere GPU + DLA, 60W TDP). The current pipeline ingests frames from four 4K cameras, preprocesses
  them on the CPU, runs detection on the DLA, and performs tracking on the Ampere GPU. Engineers are observing
  memory bandwidth bottlenecks and high latency due to explicit data transfers between the processing
  units. Evaluate the current data movement architecture and design a concrete zero-copy pipeline that
  minimizes transfer overhead.
details:
  realistic_solution: The optimal solution leverages zero-copy memory (e.g., cudaHostAllocMapped) or hardware-specific
    buffer sharing APIs like NvSciBuf. By allocating pinned, mapped memory, the camera ISP can write frames
    directly into a shared buffer. The DLA and Ampere GPU can then access this same physical memory via
    their respective memory management units without any explicit data movement, completely eliminating
    intermediate CPU-to-device memory copies.
  common_mistake: Candidates often treat the Jetson Orin like a discrete desktop system, proposing PCIe-style
    DMA transfers or using standard cudaMemcpy operations. They fail to realize that the Orin features
    a unified memory architecture where the CPU, GPU, and DLA share the exact same physical 32 GB LPDDR5
    memory pool.
  napkin_math: 'For four 4K cameras at 30 FPS (RGB 8-bit): 4 * 3840 * 2160 * 3 bytes * 30 = 2.98 GB/s
    raw ingest. With explicit copies (ISP -> CPU -> GPU -> DLA), the data traverses the memory bus multiple
    times, potentially consuming over 17.8 GB/s (3 GB/s write + 3 * 2.98 GB/s read/write pairs) of bandwidth.
    Using a zero-copy architecture on the shared LPDDR5, the ISP writes once (3 GB/s), and the DLA/GPU
    read directly, saving roughly 12 GB/s of redundant memory bandwidth. This ensures the system leaves
    ample bandwidth headroom for the 275 TOPS INT8 compute workloads to run efficiently within the 60W
    TDP budget.'
