schema_version: 1
id: edge-exp2-real-0212
title: Hailo-8 Multi-Process Memory-Mapped Inference
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You are deploying a cascaded object detection and tracking pipeline on an edge gateway equipped
  with a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 acts as a dataflow accelerator without
  local DRAM, relying entirely on streaming weights and activations directly from the host memory. Three
  separate containerized processes need to run concurrent inferences using the same 120MB INT8 backbone
  model. Evaluate the memory architecture required to support this without exceeding a strict 200MB host
  memory budget for the backbone weights across all containers.
details:
  realistic_solution: The optimal solution is to memory-map (mmap) the shared backbone model weights from
    the host OS into the virtual address space of all three containers. Because the Hailo-8 streams data
    from host memory rather than caching it locally, mmap ensures that only a single physical 120MB copy
    resides in the host's RAM. The Hailo driver can then coordinate DMA transfers from this shared physical
    memory region directly to the dataflow engine for each inference request.
  common_mistake: Candidates often suggest loading the 120MB model independently in each of the three
    containers, which would consume 360MB of host memory and blow past the 200MB budget. They may also
    misunderstand the Hailo-8's architecture, incorrectly assuming it has dedicated device memory to cache
    the weights like a traditional GPU.
  napkin_math: 'Total host memory budget for backbone: 200MB. Model size: 120MB (INT8). Independent loading:
    3 containers * 120MB = 360MB (Exceeds 200MB budget by 160MB). Shared mmap loading: 1 * 120MB (physical
    memory) + page table overhead (<1MB) = ~120MB. Savings: 240MB, staying well within the 200MB budget
    while supporting the 26 TOPS streaming architecture.'
