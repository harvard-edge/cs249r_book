schema_version: 1
id: edge-cell-11114
title: 'Kernel Fusion: Mastery — Optimize Inference Latency for Real-Time Edge Vision'
topic: kernel-fusion
status: published
provenance: imported
scenario: You need to achieve 30 fps YOLOv8-nano (3.2M params, 8.7B FLOPs) on Jetson Orin (32GB LPDDR5,
  275 TOPS INT8, 60W) while staying under 20W. Current latency is 45ms (22 fps). Design a complete kernel
  fusion and optimization strategy to meet the 33ms target.
details:
  realistic_solution: At 275 TOPS, a model requiring 8.7 GOPS runs in ~0.03ms. The Jetson Orin's 275 TOPS
    INT8 is 275×10^12 ops/s, not 275×10^9.
  common_mistake: Applying fusion without profiling which ops contribute most to the 45ms; not checking
    if 8.7B FLOPs at 275 TOPS should take only 31.6ms theoretical, meaning 45ms = 42% efficiency.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model FLOPs: 8.7B ops (INT8). Inference time: 8.7B / 275T
    = 8.7×10^9 / 275×10^12 = 0.0000316s = 0.0316ms (not 31.6ms — that would be 1000× too slow, implying
    0.275 TOPS).'
