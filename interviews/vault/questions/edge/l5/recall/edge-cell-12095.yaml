id: edge-cell-12095
title: 'Model Size Estimation: Master Full Memory Audit for Edge LLM Deployment on Jetson Orin'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Perform a complete memory audit for deploying a 1B-parameter LLM (INT8 quantized) on Jetson
  Orin (32GB LPDDR5, 204 GB/s, 60W) for on-device chat inference. Include all components: model weights,
  KV-cache pool, activation buffers, ONNX/TensorRT runtime, operating system, camera/sensor processes,
  and CUDA context overhead. Determine maximum sustainable context length and concurrent users.'
details:
  realistic_solution: 'KV cache per token = 2 × num_layers × num_kv_heads × head_dim × bytes. For INT8
    (1B/element): 2 × 32 × 32 × 64 × 1B = 128KB per token.'
  common_mistake: Forgetting that Jetson Orin runs a full Linux OS (JetPack/Ubuntu) consuming 2-4GB RAM
    at idle, and GPU CUDA context consumes 200-500MB, leaving less than the full 32GB for ML.
  napkin_math: 'KV cache per token for edge transformer (32 layers, 32 KV heads, head_dim=64, INT8): 32
    layers × 2 (K+V) × 32 heads × 64 dim × 1B = 32 × 2 × 32 × 64 × 1 = 131,072 bytes = 128KB per token
    (not 256KB which would use 2B per element for INT8).'
