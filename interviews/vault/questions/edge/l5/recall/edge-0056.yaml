schema_version: 1
id: edge-0056
title: The Radar-Camera Fusion Latency
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your ADAS (Advanced Driver Assistance System) on an Ambarella CV5 fuses 77 GHz radar (range,
  velocity) with a front camera (classification, lane detection). The radar provides detections every
  50ms (20 Hz) with 0.5ms processing. The camera pipeline takes 25ms (ISP + neural network). Your fusion
  algorithm adds 5ms. Your colleague calculates total latency as max(0.5, 25) + 5 = 30ms. But the actual
  sensor-to-decision latency is 55ms. Where is the extra 25ms hiding, and when does the fusion latency
  overhead negate the benefit of having radar?
details:
  realistic_solution: 'The extra 25ms hides in three places: (1) sensor asynchrony — camera and radar
    have different clocks, so the fusion node waits up to one camera frame period (33ms worst case, ~17ms
    average) for temporally aligned data; (2) data transfer latency — the 25MB camera frame takes ~2-5ms
    to move through the ISP pipeline and DMA to the SoC; (3) synchronization buffering — the fusion algorithm
    holds frames until matching radar/camera timestamps arrive. Your colleague''s max(0.5, 25) + 5 = 30ms
    formula assumes instant, synchronized sensor delivery. For safety-critical decisions (emergency braking),
    use radar-only at 7.5ms; for rich scene understanding, accept the 55ms fused path.'
  common_mistake: '"Latency = max(sensor latencies) + fusion time." This assumes sensors are synchronized
    and that ''latency'' means only processing time.'
  napkin_math: 'Radar-only path: 5ms chirp + 0.5ms processing + 2ms decision = 7.5ms. Fused path: 55ms
    average. At 120 km/h (33.3 m/s): radar-only reaction distance = 0.25m. Fused reaction distance = 1.83m.
    Difference: 1.58m — at highway speed, this is the difference between a near-miss and a collision.
    Dual-path architecture: radar triggers emergency brake at 7.5ms, fusion provides rich scene understanding
    at 55ms for non-emergency decisions.'
