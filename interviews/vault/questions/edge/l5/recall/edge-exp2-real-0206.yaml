id: edge-exp2-real-0206
title: Evaluating GPU to Edge TPU Migration
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: Your team has a real-time object detection model originally optimized for an embedded GPU, relying
  heavily on FP16 Tensor Cores. To meet a strict 2W power limit, you are evaluating a migration to the
  Google Coral Edge TPU. The model requires 20 GOPS per inference, and the product requirement is 50 FPS.
  You must evaluate the architectural shift from GPU execution to the Coral Edge TPU, design the INT8
  quantization strategy given its limited operator support, and size the compute utilization against the
  TPU's 4 TOPS INT8 peak performance.
details:
  realistic_solution: The candidate should evaluate the model's architecture against the Coral's supported
    operations, mandating Quantization-Aware Training (QAT) to maintain accuracy in INT8. They must verify
    that all operators compile fully to the TPU to avoid CPU fallback. Furthermore, they should recognize
    that unlike a GPU's flexible thread blocks, the Edge TPU relies on a fixed spatial array, meaning
    tensor shapes must be optimized for its specific memory architecture to sustain high throughput.
  common_mistake: Candidates often assume that peak TOPS translates directly to achievable throughput,
    ignoring that the Edge TPU strictly requires INT8 quantization. They frequently overlook that unsupported
    operators will fall back to the host CPU, breaking the execution pipeline and causing massive latency
    spikes.
  napkin_math: 'Required compute: 20 GOPS/frame * 50 FPS = 1000 GOPS = 1.0 TOPS. Google Coral Edge TPU
    peak compute: 4 TOPS INT8. Theoretical compute utilization: 1.0 TOPS / 4.0 TOPS = 25%. Given typical
    Edge TPU utilization rates of 40-50% for standard CNNs due to memory constraints, a 25% target is
    safely achievable and will comfortably operate within the 2W power budget, provided there are zero
    CPU fallbacks.'
