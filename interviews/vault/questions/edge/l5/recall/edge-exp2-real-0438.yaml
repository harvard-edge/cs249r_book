schema_version: 1
id: edge-exp2-real-0438
title: Optimizing Object Detection Graph for Coral Edge TPU
topic: graph-compilation
status: published
provenance: imported
scenario: You are deploying a custom MobileNetV2-based SSD object detection model to a Google Coral Edge
  TPU via a USB connection. The Coral Edge TPU provides 4 TOPS of INT8 compute at just 2W but has strict
  operator support limitations. During your initial compilation with the Edge TPU compiler, you discover
  that several custom reshape operators in the SSD head fall back to the host CPU. Evaluate the tradeoff
  between modifying the graph to use natively supported INT8 operators versus pipelining the host-side
  execution.
details:
  realistic_solution: The optimal approach is to modify the model architecture prior to quantization to
    ensure 100% of the graph maps to supported Edge TPU operations. For an SSD head, this means replacing
    complex custom reshape or non-standard activations with standard INT8-supported equivalents. If a
    fallback is absolutely unavoidable, the graph must be partitioned to minimize the tensor size transferred
    between the Edge TPU and the host CPU, and pipelining must be used to hide the transfer latency.
  common_mistake: Candidates often assume they can simply run unsupported operators on the host CPU without
    considering the massive data transfer overhead. They might also suggest arbitrary graph rewrites without
    validating against the Coral's specific list of natively supported INT8 operations.
  napkin_math: Assume the INT8 model requires 2 GOPS per inference. The Coral Edge TPU provides 4 TOPS
    (4000 GOPS) peak, meaning at 50% efficiency (2000 effective GOPS), the TPU execution takes 1 ms (1000
    FPS). If the unsupported operator forces a 1MB activation tensor transfer back to the host via USB
    3.0 (approx 400 MB/s practical), the transfer alone takes 1MB / 400MB/s = 2.5 ms per frame. This host
    transfer bottleneck immediately limits the entire pipeline to a maximum of 400 FPS, wasting 60% of
    the available TPU compute.
