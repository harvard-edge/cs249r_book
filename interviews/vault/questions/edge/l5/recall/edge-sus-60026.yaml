schema_version: 1
id: edge-sus-60026
title: Reducing activation memory for on-device fine-tuning on Jetson Orin
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You need to perform on-device fine-tuning of a MobileNetV3-Large model on Jetson Orin (275 TOPS,
  32GB, 60W) using only local sensor data. The full fine-tuning run OOMs at batch=8 even though the model
  is only 5.4M parameters (21MB in FP32). You need to fit within 2GB RAM to leave headroom for the OS
  and other processes.
details:
  realistic_solution: 'Activation size: 8 × 96 × 28² × 4B = 2.4MB (not 7.2MB which is 3× too large).'
  common_mistake: 'Assuming that a 21MB model means fine-tuning will use ~63MB (parameters + gradients
    + Adam states). Ignoring activation memory: for MobileNetV3-Large at input 224×224×3, batch=8, intermediate
    feature maps across all layers sum to hundreds of MB — far more than the parameters.'
  napkin_math: 'Activation memory: batch=8, channels=96, spatial=28×28, float32. Size = 8 × 96 × 28 ×
    28 × 4B = 8 × 96 × 784 × 4 = 8 × 96 × 3136 = 2,408,448 bytes ≈ 2.4MB (not 7.2MB which would require
    3× more channels or float96).'
