id: edge-0929
title: Federated Learning Energy Optimization
topic: federated-learning
status: published
provenance: imported
scenario: You are deploying a 10MB Federated Learning model on 100,000 edge devices. Local training costs
  5mJ per batch (1,000 batches/epoch). Network transmission costs 500mJ/MB. The baseline uses 1 local
  epoch per round, converging in 200 rounds. A new proposal uses 5 local epochs per round, converging
  in 80 rounds. Evaluate the total energy cost per device to reach convergence.
details:
  realistic_solution: Calculate the energy per round for both strategies, then multiply by the number
    of rounds to find the total energy footprint. In Federated Learning, communication (transmitting weights)
    is often significantly more expensive than local computation. By doing more local work (epochs) per
    round, you reduce the total number of global syncs required. You must evaluate the sum of compute
    and communication energy over the entire convergence lifecycle. The proposal with 5 epochs actually
    saves total energy because the massive reduction in communication rounds more than offsets the increase
    in local compute.
  common_mistake: Assuming that doing 5x more local compute per round will inevitably burn more total
    battery life.
  napkin_math: 'Compute per epoch = 5mJ * 1000 = 5J. Comms per round = 10MB * 500mJ/MB * 2 (upload+download)
    = 10J. Baseline (1 epoch): 5J compute + 10J comms = 15J/round. Total = 15J * 200 rounds = 3000J. Proposal
    (5 epochs): 25J compute + 10J comms = 35J/round. Total = 35J * 80 rounds = 2800J. The proposal saves
    200J per device.'
