id: edge-0932
title: Autonomous Vehicle Dynamic Power Capping
topic: real-time-deadlines
status: published
provenance: imported
scenario: An autonomous vehicle edge cluster has 4 identical SoC nodes with a shared physical power budget
  of 200W. Normally, 3 perception nodes use 50W each (40W dynamic, 10W static) running at 30 FPS (20ms
  latency), and 1 planning node uses 30W. A routing failure causes the planning node to spike to 65W.
  Evaluate applying a 10% frequency reduction (and 10% voltage reduction) to the 3 perception nodes to
  prevent a system shutdown while maintaining 30 FPS.
details:
  realistic_solution: Applying a uniform 10% DVFS step to the perception nodes leverages the non-linear
    relationship between frequency/voltage and dynamic power. Since inference latency increases linearly
    but dynamic power decreases cubically (P ∝ V^2 * f), you can harvest massive power savings with minimal
    latency impact. By downclocking the perception nodes, the system safely absorbs the planning node's
    power spike while still comfortably meeting the 33.3ms deadline required for 30 FPS.
  common_mistake: Assuming a 10% frequency reduction only yields a 10% power reduction, which would fail
    to bring the system under the 200W budget.
  napkin_math: Current total = 3*50 + 65 = 215W (15W over budget). Reduce perception freq by 10% (0.9x).
    New latency = 20ms / 0.9 = 22.2ms (meets 33.3ms deadline). New dynamic power = 40W * (0.9)^3 = 29.16W.
    New node power = 29.16W + 10W = 39.16W. Savings per node = 10.84W. Total savings = 32.52W. New total
    = 3*39.16 + 65 = 182.48W (Safely under 200W).
