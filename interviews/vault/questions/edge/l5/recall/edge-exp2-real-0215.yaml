schema_version: 1
id: edge-exp2-real-0215
title: Hardware-Aware Shadow Deployment on Jetson Orin
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are designing the shadow deployment phase of an MLOps pipeline for an autonomous vehicle
  fleet equipped with NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). To validate training-serving
  consistency, the CI/CD system deploys a quantized INT8 candidate model to run in parallel with the production
  model, processing the same sensor streams. You must evaluate the feasibility of this shadow deployment
  strategy by calculating the memory and compute overhead, and decide how to partition the workloads between
  the Ampere GPU and the DLA to prevent the candidate model from degrading production latency.
details:
  realistic_solution: The correct approach involves a hardware-aware MLOps deployment strategy where the
    production model is pinned to the Ampere GPU for guaranteed latency, and the shadow model is offloaded
    to the DLA to isolate compute. The candidate must verify that the combined memory footprint can sustain
    both models without causing OS memory starvation. Furthermore, telemetry from both hardware components
    must be aggregated in the edge model registry to validate performance before the candidate model is
    promoted.
  common_mistake: Candidates often assume the cloud MLOps paradigm of unrestricted shadow deployments
    applies perfectly to the edge. They fail to calculate the exact memory footprint of dual models or
    ignore resource contention that could cause the production model to miss its real-time deadlines.
  napkin_math: Assume both the production and candidate models have 2 billion parameters. In INT8 precision,
    weights consume 2 GB per model, totaling 4 GB. Runtime activations, sensor buffers, and OS overhead
    require an additional 6 GB, bringing total utilization to 10 GB, which comfortably fits within the
    32 GB LPDDR5 limit. If processing each frame takes 400 GOPS at 30 FPS, each model requires 12 TOPS
    of compute (24 TOPS total). This utilizes less than 10% of the Orin's 275 TOPS INT8 capacity, allowing
    the shadow model to safely run on the DLA while staying well below the 60W TDP.
