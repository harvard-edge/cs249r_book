schema_version: 1
id: edge-cell-13048
title: 'Edge Queueing Theory Optimization: Reduce Jetson Orin P99 by Model Cascading'
topic: queueing-theory
status: published
provenance: imported
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) serving smart home voice commands shows P99=800ms
  at ρ=0.85 (M/M/1, μ=100 req/s, λ=85 req/s). A two-stage cascade is proposed: Stage 1 (small model, 10ms,
  handles 80% of requests), Stage 2 (large model, 80ms, handles remaining 20%). Quantify the P99 improvement
  from cascading without adding hardware.'
details:
  realistic_solution: 'Stage 1: λ=85, μ=100 (same server, small model takes 10ms). ρ_s1=85/100=0.85. Wq_s1=0.85/(100*0.15)=56.7ms.
    W_s1=56.7+10=66.7ms. 80% exit here: P99_short = 4.6*66.7=307ms. Stage 2 (20% of 85=17 req/s routed
    to large model): μ_s2=100/8=12.5 req/s (same server, 80ms service). ρ_s2=17/12.5=1.36 > 1 — unstable!
    Fix: separate the two models on different inference threads with resource partitioning. With 2 CUDA
    streams: μ_s2=50 req/s, ρ=0.34, Wq=0.34/(50*0.66)=10.3ms, W=90.3ms, P99=415ms. Cascade P99 (worst
    path) = 307ms (short) or 415ms (long). Better than 800ms.'
  common_mistake: Not accounting for the waterfall routing cost and the fact that 20% of requests see
    both Stage 1 and Stage 2 latency (series path), and using a single queueing model for the cascade.
  napkin_math: 'Baseline: ρ=0.85, Wq=56.7ms, W=66.7ms, P99=307ms. Wait, baseline P99=800ms implies W=800/4.6=174ms,
    Wq=165ms, ρ/(100*(1-ρ))=1.65 → ρ=0.94. More accurate baseline: ρ=0.94. With cascade: Stage 1 at ρ=0.85
    (small model gives spare capacity): P99_short=307ms. Stage 2: 20%*85=17 req/s at 80ms/req, μ=12.5/s
    → unstable. Must add capacity: use INT8 optimization to get μ_s2=25: ρ=0.68, Wq=85ms, P99_long=770ms.
    Still barely under SLO for long. Improvement for 80% of requests: 800→307ms = 2.6x.'
