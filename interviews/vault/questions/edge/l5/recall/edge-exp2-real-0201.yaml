schema_version: 1
id: edge-exp2-real-0201
title: Encoder-Decoder Sizing on Qualcomm AI 100
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are deploying an on-premise translation service on a cluster of Qualcomm Cloud AI 100 accelerators.
  The system needs to maximize throughput while adhering to the 75W power envelope and 32 GB LPDDR4x memory
  limit per card. You must decide whether to deploy a 7B parameter decoder-only model or a 3B parameter
  encoder-decoder model, and dimension the batch size accordingly. Evaluate the tradeoffs in memory bandwidth,
  compute utilization given the 400 TOPS INT8 peak, and overall throughput.
details:
  realistic_solution: A 3B parameter encoder-decoder model is the optimal choice for maximizing throughput
    on this hardware. The encoder processes the entire source sequence in a single, compute-dense forward
    pass that efficiently saturates the 400 TOPS INT8 engine. The smaller model size and more efficient
    cross-attention mechanism leave significantly more of the 32 GB memory available for larger batch
    sizes, which amortizes memory bandwidth costs during decoding and maximizes performance per watt.
  common_mistake: Candidates often assume decoder-only models are universally superior without calculating
    the KV-cache memory bandwidth bottleneck during generation. They frequently fail to realize that encoder-decoder
    architectures achieve much higher compute utilization on the Qualcomm Cloud AI 100's INT8 systolic
    arrays during the dense encoding phase.
  napkin_math: 'For a 7B Decoder-only (INT8): Weights take 7 GB. Remaining memory is 25 GB. KV cache per
    token (32 layers, 4096 dim) = 2 * 32 * 4096 * 1 byte = 256 KB. For 1024 tokens, KV cache is 256 MB
    per request. Max batch size is limited to ~97 (25 GB / 256 MB), leaving the 400 TOPS engine starved
    by memory bandwidth during auto-regressive decoding. For a 3B Encoder-Decoder (INT8): Weights take
    3 GB. With 29 GB available, the static cross-attention KV cache and smaller auto-regressive cache
    permit batch sizes of 400+. The dense encoder matrix multiplications fully utilize the 400 TOPS INT8
    compute under the 75W limit.'
