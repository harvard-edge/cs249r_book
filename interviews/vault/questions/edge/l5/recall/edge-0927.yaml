id: edge-0927
title: Safe A/B Testing on Storage-Constrained Edge
topic: vram-budgeting
status: published
provenance: imported
scenario: 500,000 autonomous vacuums run on an MCU with 16MB of total flash storage. The OS takes 8MB.
  The current navigation model (V1) is 6MB. The new model (V2) is 5.5MB. You want to run a fleet-wide
  A/B test but cannot fit both models on disk to do a shadow deployment or instant fallback.
details:
  realistic_solution: Since 8MB + 6MB + 5.5MB = 19.5MB (>16MB), you must partition the fleet into mutually
    exclusive A and B groups at the cloud registry. To ensure safe deployment without a local fallback
    model, utilize a hardware watchdog timer and an algorithmic minimal fallback in the OS (e.g., simple
    'bump-and-turn'). If V2 faults or times out, the watchdog resets the device, the OS boots into safe
    mode using the algorithmic fallback, navigates to the dock, and triggers an OTA network fetch to download
    V1 from the registry.
  common_mistake: Attempting to compress both models into RAM/Flash or doing a shadow run which causes
    an Out-Of-Memory brick.
  napkin_math: 'Flash required for dual-model: 19.5MB (Fails). Flash for A/B partitioning: 8MB + max(6MB,
    5.5MB) = 14MB (Leaves 2MB for logs). Recovery network cost: 6MB download @ 10 Mbps = ~4.8 seconds
    to fetch V1 upon critical failure.'
