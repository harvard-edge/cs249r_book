schema_version: 1
id: edge-cell-13194
title: 'Edge Transformer Cost Optimization: Optimize Edge Transformer via Pruning'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A BERT-base (110M params, INT8, 110MB) on Jetson Orin DLA (11 TOPS INT8) achieves 8ms latency
  per inference. Propose structured pruning to 55M params (50% reduction). Calculate: new latency, throughput
  improvement, memory savings, and the engineering cost justification for $30K pruning project. Deployment:
  100 Jetson Orins, 50 inferences/second per device.'
details:
  realistic_solution: 'DLA ridge: 55 FLOPs/byte. BERT-base INT8 AI: ~80 FLOPs/byte (compute bound). After
    50% pruning: 55M params, 55MB model. FLOPs: ~50% = half. AI unchanged (~80 FLOPs/byte). Still compute
    bound. Time: 8ms * 0.5 = 4ms. Throughput per DLA: 1/0.004=250/s. Improvement: 50% latency reduction,
    100% throughput improvement. Memory savings: 110→55MB. Energy: 2x more efficient. Engineering cost
    $30K: 100 Jetsons running 50 inf/s. Annual inference: 100*50*8760*3600=1.577B inferences. Time savings:
    4ms/inference. Energy per inference: DLA at 5W*4ms=0.02J saved (vs 0.04J). Annual energy: 100*5W*8760*$0.10/1000=$4,380/yr.
    Current. Savings: 50%=$2,190/yr. Hardware savings: none (same Jetsons). Engineering payback: $30K/$2,190/yr=13.7
    years — not justified on energy alone. Justified only if higher throughput enables removing some Jetson
    units.'
  common_mistake: Assuming 50% parameter reduction → 50% latency reduction in all cases, when for memory-bound
    workloads the latency improvement is proportional to bandwidth reduction (yes, 50%), but for compute-bound,
    it may be less due to kernel launch overhead.
  napkin_math: 'Pruned model: 55MB. Latency: 4ms. Throughput: 250/s per Jetson DLA. Current: 125/s per
    Jetson. Current fleet handles: 100*125=12,500/s >> 100*50=5000/s needed. Over-provisioned 2.5x. After
    pruning: 100*250=25000/s capacity. Same demand. No hardware savings from pruning. Energy: $2,190/yr
    savings. $30K/2190=$13.7yr payback. NOT justified. If instead pruning allows REDUCING fleet to 40
    Jetsons (from 100): 40*250=10000/s>5000/s. 60 Jetsons freed: 60*$499=$29.9K hardware + 60*$52.6=$3,156/yr
    power savings. Payback: $30K/($29.9K+$3.16K) = $30K/$33K = 0.91yr = 11 months. JUSTIFIED if fleet
    reduction is the goal.'
