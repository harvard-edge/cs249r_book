schema_version: 1
id: edge-0935
title: Mobile Speculative Decoding Energy Efficiency
topic: energy-per-operation
status: published
provenance: imported
scenario: A smartphone runs a 3B parameter LLM locally. Standard autoregressive generation draws 4W and
  produces 10 tokens/sec. Speculative decoding uses a 100M draft model (draws 1W) and verifies using the
  3B model (draws 4W). A verification step takes 100ms, evaluates 4 draft tokens in parallel, and has
  an average acceptance rate of 2.5 tokens per step. Evaluate the energy efficiency (Joules per token)
  of both methods.
details:
  realistic_solution: Calculate the energy consumed per token for standard generation. For speculative
    decoding, calculate the total energy per step (drafting + parallel verification) and divide by the
    expected number of accepted tokens per step. Speculative decoding not only reduces latency but can
    significantly improve energy efficiency on battery-constrained devices, provided the acceptance rate
    is high enough to offset the draft model's overhead and the higher peak power draw.
  common_mistake: Assuming speculative decoding uses more energy because it runs two models and draws
    higher peak power (5W total).
  napkin_math: 'Standard: 10 tok/s = 100ms/token. Energy = 4W * 0.1s = 0.4 J/token. Speculative: Draft
    4 tokens takes 100ms (1W * 0.1s = 0.1 J). Verification takes 100ms (4W * 0.1s = 0.4 J). Total step
    energy = 0.5 J. Tokens accepted per step = 2.5. Energy per token = 0.5 J / 2.5 tok = 0.2 J/token.
    Speculative decoding cuts energy consumption in half.'
