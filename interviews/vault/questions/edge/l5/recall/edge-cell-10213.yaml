id: edge-cell-10213
title: Mastering Context Window Management for Long-Running Edge Agents
topic: compound-ai-systems
status: published
provenance: imported
scenario: A Jetson Orin (32GB LPDDR5) runs a long-horizon maintenance agent with a 2B LLM (4096-token
  context window). Each maintenance session accumulates conversation history — after 45 minutes of interaction,
  the context fills completely and the agent loses early session context. Prefill time for a full 4096-token
  context is 2.1 seconds. Design a context compression strategy that preserves critical information while
  keeping prefill under 500ms.
details:
  realistic_solution: 'Three-tier context management: (1) Permanent slot (512 tokens): session metadata,
    initial diagnostic state, critical readings — never evicted. (2) Summarized history (1024 tokens):
    every 20 exchanges, compress prior turns using a fast extractive summarizer (not LLM-based). Compression
    ratio: 20 turns * 100 tokens avg = 2000 tokens → 200-token summary (10:1). (3) Recent working context
    (2560 tokens): last 15-20 turns verbatim. Prefill for 512+1024+2048=3584 tokens at Orin: 3584/4096
    * 2.1s = 1.84s — still over 500ms. Use INT4 to double throughput: 0.92s. Further: keep recent context
    at 1536 tokens: 512+1024+1536=3072 tokens: 0.79s. Or reduce 2B→1B model.'
  common_mistake: Simply truncating the oldest messages when the context fills, discarding potentially
    critical early diagnostic information (e.g., initial error codes, baseline sensor readings) that the
    agent needs for accurate diagnosis.
  napkin_math: 'Prefill scales linearly with context length. Full 4096 tokens: 2.1s. 500ms target: 2.1
    * (target/4096) = 0.5s → target = 4096 * 0.5/2.1 = 975 tokens. Alternatively with INT4 (2x throughput):
    4096 * 0.5/1.05 = 1950 tokens for prefill. Tiered budget: permanent(512) + summary(512) + recent(926)
    = 1950 tokens with INT4, prefill = 0.5s. Information loss: summarization captures ~85% of diagnostic
    relevance per compression event.'
