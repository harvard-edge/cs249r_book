schema_version: 1
id: edge-exp2-real-0190
title: Adversarial Input Purification on Qualcomm Cloud AI 100
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are deploying a computer vision system for physical defect detection in an automated factory
  using a Qualcomm Cloud AI 100 on-premise accelerator. You discover vulnerabilities to physical adversarial
  attacks, such as specific lighting patterns or adversarial stickers that cause false negatives. To mitigate
  this, you propose adding an input purification neural network (e.g., a denoising autoencoder) ahead
  of the primary detector. Evaluate the feasibility of running this defense mechanism given the AI 100's
  specific constraints (32 GB LPDDR4x, 400 TOPS INT8, 75W envelope) and size the required memory and compute
  overhead.
details:
  realistic_solution: The best approach involves deploying a lightweight, INT8-quantized convolutional
    purifier fused with the primary vision model. Because the Qualcomm Cloud AI 100 excels at INT8 workloads
    with 400 TOPS, the compute overhead of a small purifier is negligible. The critical optimization is
    fusing the graphs to keep intermediate activations on-chip (SRAM) rather than writing them back to
    the LPDDR4x memory, ensuring the system maintains high throughput while staying well under the 75W
    power limit.
  common_mistake: Candidates often suggest complex adversarial training techniques that rely on FP32/FP16
    precision, ignoring the accelerator's optimization for INT8. They may also fail to account for the
    memory bandwidth bottleneck of the LPDDR4x memory when adding sequential pre-processing networks,
    mistakenly assuming compute (TOPS) is the only limiting factor.
  napkin_math: 'Primary detector size: 150M parameters (150 MB at INT8). Purifier size: 10M parameters
    (10 MB at INT8). Total memory footprint is 160 MB, utilizing < 1% of the 32 GB LPDDR4x capacity. Compute
    overhead: Purifier requires 20 GOPS per frame. Theoretical compute time at 400 TOPS (400,000 GOPS)
    is 20 / 400,000 = 0.05 ms. Assuming 1080p input (6.2 MB), an unfused graph writing intermediate activations
    to LPDDR4x (assume 68 GB/s bandwidth) would add (6.2 MB * 2) / 68 GB/s = ~0.18 ms memory latency.
    Graph fusion eliminates this off-chip transfer, keeping the defense overhead strictly compute-bound
    (< 0.1 ms), confirming viability.'
