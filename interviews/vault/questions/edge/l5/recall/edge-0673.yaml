id: edge-0673
title: The Zero-Copy Illusion
topic: vram-budgeting
status: published
provenance: imported
scenario: You are optimizing an Edge TPU pipeline on a Coral Dev Board. You use a 'zero-copy' memory pointer
  to pass a tensor from the CPU directly to the NPU's input buffer. However, the system profiler shows
  a massive latency spike right before inference begins. If the pointer was passed directly, why is there
  still a latency spike?
details:
  realistic_solution: You hit a cache flush/invalidate penalty. The CPU operates on data in its fast L1/L2
    caches. When you tell the NPU (via a DMA engine) to read from a specific physical RAM address using
    a 'zero-copy' pointer, the NPU bypasses the CPU cache and reads directly from main DDR memory. If
    the CPU has recently written the image data but hasn't flushed its L1 cache back to main memory, the
    NPU will read stale, garbage data. To prevent this, the OS must issue a cache flush instruction before
    the NPU starts, forcing the CPU to write all dirty cache lines out to DDR.
  common_mistake: '"Confusing software-level ''zero-copy'' (avoiding `memcpy()` in C++) with hardware-level
    cache coherency."'
  napkin_math: Flushing 10MB of image data from a CPU's L2 cache to main DDR memory over a standard mobile
    memory bus might take `2-3 milliseconds`. If your total inference budget is only `10ms`, that invisible
    cache flush operation just consumed 30% of your entire real-time budget before the NPU even fired
    its first transistor.
