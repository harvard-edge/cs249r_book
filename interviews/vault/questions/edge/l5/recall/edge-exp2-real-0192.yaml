schema_version: 1
id: edge-exp2-real-0192
title: Sizing MobileNetV2 for Google Coral Edge TPU
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are deploying an object detection model on a Google Coral Edge TPU via a USB interface.
  The Coral provides 4 TOPS for INT8 operations within a 2W power budget, but requires full INT8 quantization
  and has limited operator support. You have selected an SSD with a MobileNetV2 backbone. You need to
  determine the maximum input resolution and channel depth multiplier that will allow the model to run
  at 30 FPS while strictly adhering to the Edge TPU's hardware constraints and INT8 quantization requirements.
details:
  realistic_solution: The optimal approach is to select MobileNetV2 with ReLU6, which is fully supported
    by the Edge TPU compiler for complete INT8 execution without CPU fallbacks. To achieve a reliable
    30 FPS, the model is sized to account for realistic TPU utilization (often 20-30% for depthwise layers)
    rather than peak 4 TOPS, and ensures the USB transfer bandwidth does not become the primary bottleneck
    for the chosen input resolution.
  common_mistake: Candidates often overlook the Edge TPU's strict INT8 quantization requirement and the
    fact that certain activation functions (like Hardswish) are poorly supported, leading them to choose
    architectures that fall back to CPU execution. They may also size the model based on peak TOPS without
    accounting for the low hardware utilization of depthwise separable convolutions on the systolic array.
  napkin_math: 'Edge TPU peak = 4 TOPS (4,000 GOPS). Target: 30 FPS = 33.3ms latency budget. Allocating
    15ms for TPU compute gives a theoretical limit of 4,000 GOPS * 0.015s = 60 GOPS. Assuming only 25%
    utilization for MobileNet''s depthwise convolutions, the practical limit is 15 GOPS per frame. MobileNetV2
    at 224x224 requires ~0.6 GOPS. We can safely scale resolution to 512x512, increasing compute by (512/224)^2
    ≈ 5.2x, bringing it to ~3.1 GOPS per frame, well within the 15 GOPS practical limit. USB 3.0 bandwidth
    (effective ~300 MB/s) easily handles the 512x512x3 input at 30 FPS (0.78 MB * 30 = 23.4 MB/s).'
