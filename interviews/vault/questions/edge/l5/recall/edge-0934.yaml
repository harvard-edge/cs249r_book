schema_version: 1
id: edge-0934
title: Retail Edge vs Cloud LLM TCO
topic: pruning-sparsity
status: published
provenance: imported
scenario: A retail chain evaluates adding a local voice assistant to 5,000 stores. Cloud API serving costs
  $0.50 per 1M tokens. Alternatively, an edge server costs $1,500 CapEx (amortized over 3 years), draws
  150W continuously, and electricity costs $0.12/kWh. Average usage per store is 20,000 tokens per day.
  Evaluate the 3-year Total Cost of Ownership (TCO) per store to decide between edge and cloud.
details:
  realistic_solution: Calculate the operational cost of the cloud API over 3 years based on daily token
    volume. Compare this to the sum of the edge server's CapEx and its 3-year operational power cost.
    For low-utilization, bursty edge deployments, the static power draw and upfront hardware amortization
    vastly outweigh the per-token cost of centralized cloud serving. The cloud deployment is orders of
    magnitude cheaper.
  common_mistake: Focusing only on the per-token inference cost and ignoring the continuous static power
    draw and hardware amortization of the edge server.
  napkin_math: 'Cloud: 20k tokens/day * 365 = 7.3M tokens/yr. 3-year tokens = 21.9M. Cloud Cost = 21.9
    * $0.50 = $10.95 over 3 years. Edge: CapEx = $1500. Power = 150W * 24h * 365d * 3yrs = 3942 kWh. Power
    Cost = 3942 * $0.12 = $473.04. Edge TCO = $1500 + $473.04 = $1973.04 over 3 years. Cloud ($10.95)
    is massively cheaper.'
