schema_version: 1
id: edge-exp2-real-0189
title: Edge TPU Activation Memory Constraint Evaluation
topic: activation-memory
status: published
provenance: imported
scenario: You are deploying a custom CNN for real-time defect detection on a Google Coral Edge TPU (4
  TOPS INT8, 2W power budget, USB/PCIe form factor). The model architecture has been chosen, but during
  deployment, you encounter memory allocation errors from the Edge TPU compiler due to peak activation
  sizes. Given the Coral's strict requirement for INT8 quantization and limited on-chip SRAM (~8MB), evaluate
  the tradeoffs between reducing activation spatial dimensions, splitting the model across the host CPU
  and Edge TPU, and altering the network's receptive field.
details:
  realistic_solution: The correct approach involves analyzing the peak activation memory at the bottleneck
    layer. Since the Edge TPU requires intermediate activations to fit on-chip to maintain its 4 TOPS
    performance at 2W, exceeding SRAM forces host-device memory swapping or compilation failure. The engineer
    must evaluate redesigning the network to strictly bound the maximum activation tensor size—such as
    aggressively downsampling early or using patching—rather than relying on CPU fallback.
  common_mistake: Candidates often suggest gradient checkpointing, forgetting that this is an edge inference
    scenario where backpropagation and forward-pass activation storage for gradients are irrelevant. They
    may also suggest simply 'quantizing to INT8' without realizing the Coral already strictly enforces
    this, or they might ignore the severe latency and power penalty of swapping activations over the USB/PCIe
    bus.
  napkin_math: 'Consider a layer with an input resolution of 512x512 and 64 channels. Memory = 512 * 512
    * 64 * 1 byte (INT8) = 16,777,216 bytes ≈ 16.7 MB. This single activation tensor strictly exceeds
    the Edge TPU''s ~8MB SRAM. By evaluating a design change to reduce spatial resolution to 256x256 early
    on: 256 * 256 * 64 * 1 byte = 4,194,304 bytes ≈ 4.2 MB. This fits comfortably within the SRAM alongside
    weights, preventing costly USB/PCIe host memory transfers and maintaining the 2W power budget.'
