schema_version: 1
id: edge-exp2-real-0220
title: Hailo-8 Dataflow Scheduling for High-Resolution Detection
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a custom YOLOv8-based object detector on a Hailo-8 accelerator (26 TOPS INT8,
  2.5W) connected via PCIe. The model has multiple high-resolution feature maps that exceed the on-chip
  memory capacity of the accelerator. Because the Hailo-8 relies on a dataflow architecture with no local
  DRAM, it must stream activations and weights directly from the host memory. Evaluate the optimal operator
  scheduling and layer fusion strategy to prevent PCIe bandwidth from becoming the primary bottleneck
  while maintaining the required 30 FPS throughput.
details:
  realistic_solution: The correct approach involves aggressive depth-first scheduling and layer fusion
    to maximize on-chip data retention. By partitioning the network into sub-graphs that fit entirely
    within the Hailo-8's distributed SRAM, we can stream input patches from the host, process them through
    multiple fused layers, and stream out only the final, heavily reduced activation maps. This transforms
    a bandwidth-bound problem into a compute-bound one, leveraging the 26 TOPS capability.
  common_mistake: Candidates often propose standard layer-by-layer execution, failing to realize that
    writing intermediate feature maps back to the host over PCIe will severely throttle performance due
    to bandwidth limits. They might also incorrectly assume the presence of local LPDDR attached directly
    to the Hailo-8.
  napkin_math: For a 1080p input (1920x1080x3 bytes = ~6.2MB), streaming at 30 FPS requires ~186 MB/s
    host-to-device bandwidth. If intermediate feature maps of a standard ResNet block (e.g., 256 channels
    at 120x120) were written back to host, it would cost 120x120x256 bytes = ~3.7MB per layer. Writing
    and reading this back for 10 sequential layers at 30 FPS demands over 2.2 GB/s, quickly saturating
    typical embedded PCIe Gen3 x2 (1.9 GB/s effective) or Gen2 x4 links. Fusing these 10 layers on-chip
    reduces the intermediate traffic to 0, easily hitting the 30 FPS target within the 2.5W power envelope.
