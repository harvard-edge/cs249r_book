schema_version: 1
id: edge-0926
title: Debugging Thermal Throttling Cascades
topic: real-time-deadlines
status: published
provenance: imported
scenario: Smart glasses run a hand-tracking model at 30 FPS (33ms budget) on an XR2 chip. Users report
  intermittent jitter. Profiling reveals the device hits 85°C, thermal throttles the DSP, pushing inference
  to 45ms. Polling the OS temperature API at 30Hz consumes 5% CPU, worsening the heat.
details:
  realistic_solution: Use an event-driven, piggybacked observability architecture. Instead of polling,
    register a callback for the OS `THERMAL_EVENT` broadcast to update a cached thermal state variable.
    To correlate temperature with jitter, maintain a lightweight lock-free circular buffer of the last
    100 inference latencies in memory. When a frame drops (latency > 33ms), dump the buffer along with
    the last known thermal state to flash storage for asynchronous upload when the device is charging
    and connected to Wi-Fi.
  common_mistake: Running a background thread that polls OS temperature and CPU frequency at the frame
    rate (30Hz).
  napkin_math: 'Polling overhead: 30 calls/sec * 1ms CPU time = 30ms/sec overhead (3% of CPU). Event-driven
    callback: 1 interrupt every few seconds = ~0 overhead. Circular buffer: 100 elements * 4 bytes (float32)
    = 400 bytes RAM. Flash write on drop: 404 bytes per jitter event.'
