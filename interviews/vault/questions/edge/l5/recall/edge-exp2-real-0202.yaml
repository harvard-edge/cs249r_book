schema_version: 1
id: edge-exp2-real-0202
title: Energy-Aware Operator Selection on Cloud AI 100
topic: energy-per-operation
status: published
provenance: imported
scenario: Your team is deploying a multi-camera video analytics pipeline on an on-premise edge server
  equipped with a Qualcomm Cloud AI 100 accelerator. The system is strictly capped at the accelerator's
  75W TDP limit, but requires maximizing INT8 inference throughput towards the theoretical 400 TOPS peak.
  You must design the model execution strategy by evaluating the energy cost of operations, specifically
  balancing high-density compute against off-chip accesses to the 32 GB LPDDR4x memory.
details:
  realistic_solution: A strong candidate applies Horowitz energy principles, recognizing that an off-chip
    LPDDR4x access costs orders of magnitude more energy than an INT8 MAC operation. They will evaluate
    operator selection, proposing aggressive operator fusion, weight caching in SRAM, and high arithmetic
    intensity layers to minimize DRAM traffic and stay within the 75W envelope.
  common_mistake: Candidates often focus solely on compute utilization (TOPS) without accounting for the
    disproportionate energy cost of DRAM accesses. They frequently propose memory-bandwidth-bound architectures
    that hit the 75W power wall long before reaching anywhere near the 400 TOPS peak.
  napkin_math: At the 75W limit and 400 TOPS peak, the available energy per operation is 75 J/s / 400e12
    ops/s = 0.1875 pJ/op. While an INT8 MAC costs ~0.1 pJ, an off-chip LPDDR4x DRAM access costs ~100
    pJ/byte. If the model has an arithmetic intensity of 100 ops/byte, the DRAM energy alone is 100 pJ
    / 100 ops = 1 pJ/op. Total energy per op becomes ~1.1 pJ/op. At 400 TOPS, this would consume 400e12
    * 1.1e-12 = 440W, severely violating the 75W TDP. To stay under 75W at 1.1 pJ/op, the accelerator
    can only sustain about 68 TOPS (75W / 1.1 pJ). The candidate must evaluate this to conclude that extremely
    high data reuse is required to approach 400 TOPS at 75W.
