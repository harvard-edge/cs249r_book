schema_version: 1
id: edge-exp2-desi-0459
title: Hardware-Aware NAS for Edge TPU Real-Time Inference
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are leading the deployment of a real-time object detection model on a fleet of drones equipped
  with the Google Coral Edge TPU. The system must operate within a strict 2W power budget and achieve
  at least 30 FPS. Since the Edge TPU provides 4 TOPS but requires fully INT8 quantized models and has
  limited operator support, standard off-the-shelf architectures like MobileNetV3 often suffer from latency
  bottlenecks due to fallback to the host CPU for unsupported operations. Design a Hardware-Aware Neural
  Architecture Search (NAS) strategy to find an optimal architecture that maximizes accuracy while strictly
  satisfying the latency, power, and Edge TPU operator constraints.
details:
  realistic_solution: The optimal design involves a proxy-less or hardware-in-the-loop NAS where the search
    space is pre-filtered to include only Edge TPU-compatible operations (e.g., standard convolutions,
    depthwise convolutions, avoiding certain non-linearities like Swish if not fully supported without
    fallback). The reward function must jointly evaluate INT8 quantized accuracy (using Quantization-Aware
    Training during the evaluation phase) and on-device latency (or a highly accurate latency lookup table
    profiled directly on the Coral). By embedding the quantization and operator constraints directly into
    the search space and using measured latency rather than theoretical FLOPs as the cost metric, the
    NAS will converge on a model that fully utilizes the 4 TOPS accelerator without costly host CPU context
    switches.
  common_mistake: Candidates often propose a generic NAS approach (e.g., DARTS or standard evolutionary
    search) optimizing only for FLOPs or parameter count without explicitly incorporating the Edge TPU's
    specific INT8 quantization requirements and operator whitelist into the search space. They may also
    fail to design a search strategy that penalizes CPU fallback, leading to models that technically fit
    the FLOP budget but miss the latency target in practice.
  napkin_math: 'Target: 30 FPS = 33.3 ms per frame latency budget. Edge TPU Peak Compute: 4 TOPS (INT8).
    Assuming 30% utilization due to memory bound operations and INT8 overhead, effective compute is ~1.2
    TOPS. Available operations per frame: 1.2 * 10^12 OPs / 30 frames = 40 GOPs per frame. The NAS search
    space should constrain the max theoretical FLOPs (or rather, INT8 MACs) to < 20 GMACs (40 GOPs) while
    ensuring 100% of operations map to the Edge TPU to avoid the typical 5-10ms penalty of a single CPU
    fallback, ensuring the entire inference stays well within the 33.3 ms budget at the 2W power limit.'
