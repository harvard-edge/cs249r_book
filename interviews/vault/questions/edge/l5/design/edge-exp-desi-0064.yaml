schema_version: 1
id: edge-exp-desi-0064
title: Architecting Edge TPU INT8 Knowledge Distillation
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are tasked with deploying a state-of-the-art vision model onto a smart security camera equipped
  with a Google Coral Edge TPU. The Edge TPU provides 4 TOPS of INT8 compute within a strict 2W power
  budget, but requires full INT8 quantization and has limited operator support. You have a massive float32
  teacher model in the cloud. Architect a knowledge distillation system that produces a student model
  capable of running entirely on the Edge TPU without CPU fallback, while maintaining maximum accuracy.
details:
  realistic_solution: The best approach integrates Quantization-Aware Training (QAT) directly into the
    distillation process. The student model should be constructed using strictly Edge TPU-compatible operators
    (e.g., MobileNet-style blocks with ReLU). During training, the float32 teacher generates soft labels,
    while the student model simulates INT8 quantization in its forward pass to learn quantization-robust
    weights. This ensures the final compiled model executes fully on the Edge TPU at maximum efficiency.
  common_mistake: Candidates often design a standard float32 distillation pipeline and apply post-training
    quantization (PTQ) afterwards, leading to severe accuracy degradation. They also frequently propose
    student architectures using complex operators that the Edge TPU compiler does not support, resulting
    in catastrophic latency from CPU fallbacks.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS (4 * 10^12 operations per second) consuming 2W.
    For a real-time target of 30 FPS, the theoretical maximum compute budget per frame is (4 * 10^12)
    / 30 = 133.3 GOPs. Accounting for a realistic INT8 MAC utilization of 30% due to memory bandwidth
    constraints, the distilled student model must be architected to require no more than roughly 40 GOPs
    per inference to reliably meet the latency target under the 2W limit.
