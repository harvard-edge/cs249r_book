schema_version: 1
id: edge-exp-desi-0054
title: Data Quality Gates for High-Throughput On-Premise Inference
topic: data-quality-validation
status: published
provenance: imported
scenario: You are designing the data pipeline for an on-premise defect detection system in a manufacturing
  plant, utilizing a fleet of Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W).
  The system ingests thousands of high-resolution images per second from factory cameras, but sensor degradation
  and lighting shifts frequently cause silent data corruption. You must architect an on-premise data validation
  and quality gating system that prevents anomalous data from causing false positives, while ensuring
  the accelerators are fully utilized and lineage is tracked for auditing.
details:
  realistic_solution: A strong design uses a tiered validation approach. Tier 1 executes lightweight,
    deterministic heuristics (e.g., blur detection, histogram analysis) on the host CPU to catch gross
    sensor errors instantly. Tier 2 reserves a small fraction of the accelerator's resources to run a
    highly quantized, INT8 tiny embedding model to flag out-of-distribution inputs. Lineage is maintained
    by attaching lightweight metadata headers at the ingestion point, which are asynchronously logged
    to a local time-series database without blocking the inference path.
  common_mistake: Candidates often propose running heavy, complex deep-learning anomaly detection models
    (like large Autoencoders) on the same accelerator before the primary task, failing to evaluate the
    memory and compute tradeoffs. Alternatively, they suggest cloud-based data validation, which violates
    the strict on-premise constraint and introduces unacceptable latency.
  napkin_math: Assuming the primary defect model requires 4 GB memory and 20 TOPS per stream. The Qualcomm
    Cloud AI 100 has 32 GB LPDDR4x and 400 TOPS. We are memory-bound to 8 concurrent streams (8 * 4 GB
    = 32 GB), utilizing only 160 TOPS (40%). To accommodate on-device anomaly detection, we reduce to
    7 primary streams (28 GB, 140 TOPS). This frees 4 GB of memory. An INT8 quantized data validation
    model requires 100 MB and 1 TOPS per stream. For 7 streams, this takes 700 MB and 7 TOPS, easily fitting
    into the remaining 4 GB and 260 TOPS while staying well within the 75W power envelope.
