schema_version: 1
id: edge-cell-10136
title: 'Mastery: efficient CNN architecture selection for power-constrained edge deployment'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You must select between MobileNetV3-Small (0.056 GFLOPs, 67.4% top-1), EfficientNet-Lite0 (0.35
  GFLOPs, 75.1% top-1), and MobileNetV2-0.35x (0.059 GFLOPs, 60.3% top-1) for a wildlife camera running
  on solar power. The platform is Hailo-8 (26 TOPS, 2.5W) running at 5 FPS. Demonstrate mastery of FLOP-accuracy-power
  tradeoffs with a formal decision framework.
details:
  realistic_solution: 'At 5 FPS, compute: 0.35G × 5 = 1.75 GOPS. Hailo-8 at 26 TOPS: 0.0067% utilization.
    Inference power for all three models is virtually identical (~0.01W). Decision framework: (1) accuracy
    is the primary differentiator (7% gap between worst and best); (2) model size affects SRAM usage (Hailo-8:
    24MB) — EfficientNet-Lite0 5.4M params × 1B = 5.4MB, all fit; (3) confidence calibration matters for
    wildlife classification — EfficientNet-Lite0 better calibrated; (4) choose EfficientNet-Lite0 — 7pp
    accuracy gain for zero power cost at 5 FPS.'
  common_mistake: Choosing the lowest FLOP model without considering that all three models are massively
    under-utilizing the Hailo-8 at 5 FPS, making power consumption from the model inference itself negligible
    — the decision should be driven by accuracy, not compute.
  napkin_math: 'Power model: Hailo-8 active inference power ≈ 0.005W × (FPS × FLOPs / Hailo_TOPS). At
    5 FPS, Lite0: 0.005 × (5 × 0.35 / 26) = 0.0003W. Idle power: Hailo-8 ~0.5W idle. Total: 0.5003W vs
    0.5001W for MV3-Small. Difference: 0.0002W (0.04%). Solar panel produces 2–5W — model choice has zero
    power impact. Accuracy impact: over 1 year × 5 FPS × 86400 sec/day × 365 days = 157M classifications.
    At 67.4% vs 75.1% accuracy: 12M fewer correct classifications for MV3-Small. Choose EfficientNet-Lite0.'
