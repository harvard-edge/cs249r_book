schema_version: 1
id: edge-exp2-desi-0460
title: Architecting a Streaming Pipeline for Hailo-8
topic: roofline-analysis
status: published
provenance: imported
scenario: You are architecting an edge perception system that relies on a Hailo-8 dataflow accelerator
  (26 TOPS INT8, 2.5W) connected to a low-power host SoC over PCIe Gen3 x2. Since the Hailo-8 has no local
  DRAM, all input streams and intermediate activations must stream directly from host memory. You need
  to design the neural network topology and partitioning pipeline to maximize utilization. How do you
  use the roofline model to evaluate the tradeoffs of which operations execute on the Hailo-8 versus the
  host, and how does the lack of local DRAM constrain your design?
details:
  realistic_solution: The design must account for the strict host-interface memory roofline by keeping
    the operational intensity high. The candidate should propose compiling the model such that the entire
    core feature extraction and dense compute blocks reside entirely within the Hailo-8's internal SRAM
    dataflow architecture. They should evaluate the tradeoff of keeping high-arithmetic-intensity operations
    (like deep convolutions) on the accelerator while moving high-bandwidth, low-intensity tasks (like
    NMS or certain element-wise operations) to the host only if they don't break the on-chip dataflow
    pipeline.
  common_mistake: Candidates often assume the 26 TOPS peak compute is achievable without deeply analyzing
    the memory bandwidth of the host connection. They may design a system that frequently swaps large
    intermediate feature maps back and forth to the host, ignoring the devastating impact this has on
    the system's roofline.
  napkin_math: Assuming a PCIe Gen3 x2 connection provides ~1.97 GB/s of effective bandwidth and the Hailo-8
    delivers 26 TOPS. The ridge point of the roofline (required arithmetic intensity to be compute-bound)
    is 26,000 GOPS / 1.97 GB/s = ~13,198 Ops/Byte. If the system streams a 2MB input tensor, the accelerator
    must perform at least 26 Giga-operations (2MB * 13,198 Ops/Byte) purely on-chip before returning data
    to the host, otherwise the design will fall onto the memory-bound slope of the roofline.
