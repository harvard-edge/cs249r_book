schema_version: 1
id: edge-crit-20012
title: FlashAttention on Jetson Orin's Unified Memory
topic: flash-attention
status: draft
provenance: imported
scenario: Jetson Orin has 32GB unified LPDDR5 (102 GB/s) shared between CPU and GPU, with 256 Ampere CUDA
  cores and 128KB shared memory per SM. You want to deploy a 7B model with FlashAttention for inference
  at seq_len=2048. Analyze whether FlashAttention's benefits transfer to unified memory architectures
  where there is no HBM.
details:
  realistic_solution: 'Standard attention IO for seq_len=2048, 32 heads, head_dim=128: 2 x 2048^2 x 2B
    x 32 = 512MB for attention matrix round-trip. At 102 GB/s: 5.0ms just for IO. FlashAttention IO: 3
    x 2048 x 128 x 2B x 32 = 48MB. At 102 GB/s: 0.47ms. Savings: 4.53ms per layer x 32 layers = 145ms
    total. For a target of <500ms end-to-end inference, this is critical. However, Orin''s 128KB SMEM
    limits tile size to B_r=B_c=64 in FP16, and the 256 CUDA cores mean compute throughput is ~2 TFLOPS
    FP16. Attention FLOPs: 2 x 32 x 2 x 2048^2 x 128 = 1.1 TFLOP. At 2 TFLOPS: 550ms compute even with
    FlashAttention. The bottleneck shifts to compute on Orin.'
  common_mistake: Assuming FlashAttention is unnecessary on unified memory because 'there is no HBM bottleneck.'
    LPDDR5 at 102 GB/s is 33x slower than H100's HBM3, making IO savings even more critical.
  napkin_math: 'Standard IO: 512MB / 102 GB/s = 5ms/layer. Flash IO: 48MB / 102 = 0.47ms/layer. Savings:
    4.5ms x 32 layers = 145ms. But compute: 1.1 TFLOP / 2 TFLOPS = 550ms — compute-bound on Orin.'
