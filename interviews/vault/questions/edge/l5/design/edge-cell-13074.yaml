schema_version: 1
id: edge-cell-13074
title: 'Edge Systolic Array Design: Systolic Array for Conv Layer on Jetson DLA'
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'Design the output-stationary (OS) dataflow for a depthwise separable convolution (MobileNetV2
  block: 3x3 dw-conv, 64 channels, 112x112 feature map, stride=1) on Jetson Orin DLA. Specify the data
  flow through the systolic array, memory access pattern, and compare to a pointwise (1x1) convolution
  on the same hardware.'
details:
  realistic_solution: 'DW 3x3, 64ch, 112x112: weights per channel = 3*3=9, total = 64*9 = 576 weights
    = 576 bytes INT8. FLOPs = 2*64*112*112*9 = 144M. Bytes: input=64*112^2=803KB, weights=576B, output=64*112^2=803KB.
    AI = 144M / 1606KB = 89.6 FLOPs/byte. Memory bound (DLA ridge ≈ 250). Output-stationary: each output
    pixel (channel, y, x) is computed by loading all 9 input pixels and 9 weights → 9 MACs. Weight reuse:
    same 9 weights for all 112*112 positions (per channel). WS is optimal for DW-conv. PW 1x1 conv (64→128):
    weights=64*128=8192, FLOPs=2*128*112^2*64=205M. AI=205M/(2*803KB+8192*2)=205M/1623KB=125 FLOPs/byte.
    Still memory bound but better than DW.'
  common_mistake: Applying the same dataflow strategy to depthwise convolutions as standard convolutions
    — depthwise convs have much lower arithmetic intensity and are better served by different dataflow
    (channel-last layout, no weight reuse across channels).
  napkin_math: 'DW: AI=144M/(64*112^2*1 input + 64*9 weights + 64*112^2*1 output)*2 = 144M/(803K+0.576K+803K)*2
    = 144M/3213K = 44.8 FLOPs/byte. Memory bound heavily (DLA ridge ~250). PW: AI=2*128*112^2*64 / (2*64*112^2
    + 64*128 + 128*112^2) = 205M/(1606K+8K+1606K) = 205M/3220K = 63.7 FLOPs/byte. Still memory bound.
    Roofline: DW time = 3213K/DLA_BW. Jetson DLA BW ≈ 200GB/s: 3213K/200G = 0.016ms. PW: 3220K/200G =
    0.016ms similar. Total MobileNetV2 block ≈ 0.032ms per block.'
