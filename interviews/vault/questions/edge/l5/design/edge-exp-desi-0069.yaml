id: edge-exp-desi-0069
title: Edge Video Analytics Pipeline Architecture
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are designing an object detection system for a smart camera deployed on a battery-powered
  drone. The system targets a Google Coral Edge TPU connected via USB, which has a strict 2W power budget
  and delivers up to 4 TOPS using INT8 precision. You need to architect a pipeline that converts an existing
  FP32 PyTorch model to run on the Coral Edge TPU while preserving detection accuracy for small objects
  and ensuring all operators are supported by the accelerator.
details:
  realistic_solution: The optimal design involves Quantization-Aware Training (QAT) to simulate INT8 precision
    during the training phase, which mitigates the accuracy loss for small objects. The architecture must
    strictly constrain the model to operators supported by the Edge TPU compiler, avoiding custom layers.
    If unsupported operators are necessary, they must be redesigned or partitioned to run on the host
    CPU, though the system architecture should minimize this to avoid USB data transfer bottlenecks.
  common_mistake: Candidates often propose simple post-training quantization (PTQ) without considering
    the Edge TPU's limited operator support or the accuracy degradation of INT8 on small object detection.
    They also frequently suggest using FP16 fallback layers, which the Edge TPU does not support natively,
    leading to costly CPU fallbacks over the USB interface.
  napkin_math: To process 30 FPS, the maximum inference time per frame is 1 / 30 = 33.3 ms. With a 4 TOPS
    INT8 peak capability, assuming 50% utilization due to USB bandwidth and memory bottlenecks, we get
    2 TOPS effective. For a 30 FPS target, the model can have at most (2 * 10^12 ops/sec) / 30 frames/sec
    = ~66 billion operations (66 GOPs) per frame. Given the 2W budget, the power efficiency is 4 TOPS
    / 2W = 2 TOPS/W, strictly prohibiting heavy CPU fallbacks.
