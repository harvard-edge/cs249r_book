schema_version: 1
id: edge-cell-13259
title: Design Continuous Batching for Edge LLM Serving on Hailo-8
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A Hailo-8 edge server handles LLM inference requests for a retail analytics application. Requests
  arrive at 2 req/s (Poisson). Each request has 128-token prompt and 64-token response. Hailo-8 running
  a 3B INT4 model: prefill 128 tokens = 20ms, decode per token = 8ms, decode 64 tokens = 512ms. Total
  per request: 532ms. Design a continuous batching strategy to maximize throughput while keeping P99 latency
  < 1000ms for each request.'
details:
  realistic_solution: P99 latency ≈ 4.6 × W (mean sojourn time = Wq + 1/μ), not 4.6 × Wq. Wq excludes
    the service time component.
  common_mistake: Using static batching where the full batch waits for the longest request; continuous
    batching inserts new requests at decode boundaries, improving GPU utilization without increasing individual
    request latency.
  napkin_math: 'M/M/1 P99 approximation: P99 ≈ -ln(0.01)/μ for sojourn time W, not waiting time Wq. W
    = 1/(μ(1-ρ)) is the mean sojourn time. P99 ≈ 4.6 × W (mean sojourn time) where W includes service
    time. Using Wq (queue wait only) would underestimate by excluding service time.'
