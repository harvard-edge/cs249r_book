id: edge-exp2-desi-0381
title: Architecting Dataflow for Google Coral Edge TPU
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are designing the inference architecture for a battery-powered drone using the Google Coral
  Edge TPU. The platform provides 4 TOPS of INT8 compute within a strict 2W power budget, utilizing a
  USB/PCIe form factor. Given its specialized systolic array architecture and limited operator support,
  evaluate different tiling strategies and dataflow assumptions (e.g., weight-stationary vs. output-stationary)
  to optimize a high-resolution CNN for maximum utilization. Your design must account for the platform's
  stringent INT8 quantization requirements to prevent memory thrashing and latency spikes.
details:
  realistic_solution: The optimal design strictly relies on fully supported INT8 operators (e.g., standard
    3x3 depthwise and pointwise convolutions) to ensure 100% of the graph executes on the Edge TPU. To
    maximize the 4 TOPS throughput, the architecture should employ a weight-stationary tiling strategy,
    heavily optimizing the spatial dimensions of activation maps to fit within the on-chip SRAM, while
    keeping weights pinned locally to minimize DRAM access energy.
  common_mistake: Candidates often propose complex, non-standard operators that cannot map to the Edge
    TPU's limited INT8 operator set, causing fallback to the host CPU. They also frequently ignore the
    specific dataflow (weight-stationary) of the Edge TPU's systolic array, leading to suboptimal tiling
    strategies that cause excessive SRAM thrashing.
  napkin_math: 'Theoretical peak: 4 TOPS at 2W = 2 TOPS/W. Assuming a model requires 10 GOPS per frame:
    Theoretical max FPS = 4000 GOPS / 10 GOPS = 400 FPS. With a naive tiling strategy causing memory bottlenecks,
    utilization might drop to 20%, yielding 80 FPS. By co-designing the network to match the Edge TPU''s
    weight-stationary dataflow, utilization can increase to 80%, achieving 320 FPS while staying within
    the 2W envelope.'
