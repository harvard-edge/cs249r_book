schema_version: 1
id: edge-cell-13073
title: 'Edge Systolic Array Design: Hailo-8 Dataflow for Video Analytics'
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'Design the dataflow schedule for running 3 simultaneous computer vision models on a Hailo-8
  (26 TOPS INT8, 2.5W): face detection (0.5 GOPS, 60 FPS), license plate OCR (2 GOPS, 10 FPS), and crowd
  counting (1.5 GOPS, 5 FPS). Total sustained load: 0.5*60 + 2*10 + 1.5*5 = 57.5 GOPS. Specify time-division
  multiplexing schedule and latency per model.'
details:
  realistic_solution: 'Hailo-8 TDM: run each model in round-robin time slices. Total GOPS budget: 26,000
    GOPS. Load: 57.5 GOPS = 0.22% utilization. Huge headroom. Face detection: 0.5 GOPS * 60 FPS = 30 GOPS/s.
    Time per inference: 0.5G/26000G = 19.2μs. At 60 FPS: budget 16.7ms. Schedule: run face every 16.7ms
    (takes 19.2μs). OCR: 2G/26000G = 76.9μs per inference. Budget 100ms (10 FPS). Crowd: 1.5G/26000G =
    57.7μs per inference. Budget 200ms (5 FPS). TDM schedule per 200ms: face ×12 (12*19.2μs=230μs), OCR
    ×2 (2*76.9μs=154μs), crowd ×1 (57.7μs). Total: 442μs / 200ms = 0.22% duty cycle. All constraints met
    with 99.8% idle time!'
  common_mistake: Assuming all three models can run simultaneously in parallel on one Hailo-8, which only
    has a single fixed dataflow engine (unlike a GPU with CUDA streams). Hailo-8 runs one compiled model
    at a time.
  napkin_math: 'Total compute budget: 26 TOPS sustained. Demand: 57.5 GOPS = 0.00221 fraction of 26 TOPS.
    Each model: face = 0.5G/26000G = 19.2μs per inference at 60FPS needs 60*19.2μs=1.15ms/sec. OCR = 76.9μs
    at 10FPS needs 769μs/sec. Crowd = 57.7μs at 5FPS needs 289μs/sec. Total compute: 2.21ms/sec out of
    1000ms/sec = 0.22% duty cycle. Latency: face 19.2μs (well under 16.7ms frame budget). OCR 76.9μs (under
    100ms). Crowd 57.7μs (under 200ms). Hailo-8 power at 0.22% duty: ~0.2W active + sleep overhead = ~0.5W
    total.'
