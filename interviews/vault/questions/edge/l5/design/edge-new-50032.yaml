id: edge-new-50032
title: Portable Model Optimization Pipeline for Multi-Edge Deployment
topic: software-portability
status: published
provenance: imported
scenario: 'Your autonomous vehicle platform must deploy the same perception model on three edge targets:
  Jetson Orin (NVIDIA), Qualcomm SA8650P (Qualcomm AI Engine), and TI TDA4VM (C7x DSP). Each has a different
  model format, quantization scheme, and runtime. Design a portable deployment pipeline.'
details:
  realistic_solution: 'Use ONNX as the pivot format: (1) Train in PyTorch, export to ONNX. (2) Apply platform-agnostic
    optimizations (graph simplification, constant folding) with ONNX Optimizer. (3) Branch into target-specific
    pipelines: Orin: ORT TensorRT EP or TRT directly (INT8 via TRT calibration). Qualcomm: QNN SDK (AIMET
    for INT8/INT4 quantization). TI: TIDL compiler (per-layer mixed INT8/INT16). (4) Unified validation:
    compare output tensors from all three targets against the ONNX-on-CPU reference, with tolerance thresholds
    per target. (5) CI: automated accuracy regression tests on device farm.'
  common_mistake: Maintaining three completely separate deployment pipelines with no shared infrastructure.
    This triples the engineering cost and creates model version drift across targets.
  napkin_math: 'Without shared pipeline: 3 targets x 2 engineers x 6 months = 36 engineer-months. With
    ONNX pivot: 2 shared engineers + 1 per target = 5 engineers x 4 months = 20 engineer-months. 44% cost
    reduction.'
