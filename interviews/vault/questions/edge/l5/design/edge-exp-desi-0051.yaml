schema_version: 1
id: edge-exp-desi-0051
title: Dataflow Batching Architecture for Multi-Camera Edge Streams
topic: batching-strategies
status: published
provenance: imported
scenario: You are designing the inference pipeline for a smart intersection processing 4 concurrent 1080p
  camera streams at 30 FPS. The system uses a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W) which
  streams activations directly from host memory since it has no local DRAM. Evaluate the tradeoffs between
  static and dynamic batching in this specific architecture, and design a scheduling policy that strictly
  guarantees a 15ms p99 latency SLA while maximizing the 26 TOPS throughput.
details:
  realistic_solution: The optimal approach is a synchronized static batching strategy (e.g., batch size
    4) tied directly to the camera hardware interrupts, or purely sequential execution (batch size 1)
    if latency is paramount. Since the Hailo-8 streams continuously from host memory, the system should
    allocate pinned host memory for DMA transfers and stream frames as soon as they are preprocessed.
    By pipelining the host-side preprocessing with the accelerator's dataflow execution, throughput is
    maintained without the latency penalty of waiting to form large dynamic batches.
  common_mistake: Candidates often propose continuous batching or large dynamic batch sizes commonly used
    for GPUs to maximize throughput. They fail to realize that because the Hailo-8 lacks local DRAM, buffering
    large batches on the host delays the start of the streaming dataflow execution, directly violating
    the tight latency SLA.
  napkin_math: For 4 streams at 30 FPS, a frame arrives every 33.3ms per camera. A 1080p frame requires
    ~6.2MB. Transferring a batch of 4 frames (24.8MB) over PCIe Gen3x4 (~3.9 GB/s) takes roughly 6.3ms.
    With 26 TOPS INT8 available, processing 4 frames of a 10 GOPS model takes (4 * 10) / 26,000 ≈ 1.5ms.
    Total latency (transfer + compute) is ~7.8ms, comfortably meeting a 15ms SLA, whereas a larger dynamic
    batch size of 16 would take ~25.2ms just to transfer, failing the SLA.
