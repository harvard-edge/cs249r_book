id: edge-fill-00493
title: Designing a Mixed-Precision Strategy for Edge Deployment on Hailo-8
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are tasked with deploying a cutting-edge deep learning model (e.g., a real-time object detection
  model or a small language model) onto a fleet of devices equipped with the Hailo-8 AI accelerator. The
  Hailo-8 offers 26 TOPS for INT8 operations with a typical power consumption of only 2.5W. Your goal
  is to maximize throughput and minimize power usage for continuous inference on the edge, while ensuring
  the model's accuracy remains within 1% of its FP32 baseline. The initial model was trained in full FP32
  precision. Design a comprehensive mixed-precision strategy, from model conversion to deployment, addressing
  potential challenges and tradeoffs.
details:
  realistic_solution: 'A realistic solution would involve a multi-stage approach tailored for edge accelerators
    like Hailo-8:

    1.  **Profiling & Sensitivity Analysis**: Identify critical layers or operations in the FP32 model
    that are highly sensitive to quantization. Tools can help analyze activation distributions and potential
    precision loss.

    2.  **Quantization-Aware Training (QAT) or Post-Training Quantization (PTQ) with Calibration**: Prioritize
    QAT if feasible, as it often yields better accuracy recovery. If not, use PTQ with a diverse, representative
    calibration dataset. Experiment with different calibration algorithms (e.g., MinMax, moving average,
    or more advanced techniques provided by Hailo''s toolkit).

    3.  **Layer-wise Precision Assignment**: Instead of uniform quantization, selectively apply INT8 to
    layers that tolerate it well, while retaining FP16/BF16 for sensitive layers (if the Hailo-8''s specific
    architecture supports mixed-precision execution beyond just INT8, or if specific layers can be offloaded
    to a co-processor). This ensures critical accuracy is maintained where it matters most, maximizing
    the use of Hailo-8''s efficient INT8 capabilities for the majority of operations.

    4.  **Loss Scaling**: If FP16 is used during any training or fine-tuning phase, implement appropriate
    loss scaling to manage the reduced dynamic range and prevent underflow of gradients.

    5.  **Rigorous Benchmarking & Iteration**: Continuously evaluate the quantized model on Hailo-8, measuring
    actual inference latency, power consumption, and accuracy against the FP32 baseline on target hardware.
    Iterate on quantization parameters and layer-wise precision decisions based on these empirical results.'
  common_mistake: Blindly quantizing the entire model to INT8 without proper calibration or awareness
    of precision-accuracy tradeoffs, leading to significant performance degradation or unstable inference
    results, especially for sensitive layers or activation functions. Another common mistake is neglecting
    the impact of loss scaling or dynamic range issues when moving from FP32 to lower precisions like
    FP16/BF16 during fine-tuning or post-training quantization, which can cause underflow/overflow issues
    and training instability.
  napkin_math: "Consider a deep learning model with 10 GOPS (FP32) that needs to run on Hailo-8. Hailo-8\
    \ provides 26 TOPS (INT8) at 2.5W.\n\n1.  **Ideal INT8 Scenario**: If the entire model could be perfectly\
    \ quantized to INT8 with no accuracy loss, the Hailo-8 could theoretically execute the 10 GOPS (INT8\
    \ equivalent) in approximately `(10 * 10^9 ops) / (26 * 10^12 ops/s) = 0.38 milliseconds`. This would\
    \ consume roughly 2.5W during this brief period.\n\n2.  **Mixed-Precision Tradeoff**: Suppose, to\
    \ maintain the 1% accuracy target, 10% of the model's operations (1 GOPS) must remain in FP16, while\
    \ the remaining 90% (9 GOPS) are quantized to INT8. If Hailo-8 processes FP16 at, say, 1/2 the throughput\
    \ of INT8 (hypothetically 13 TOPS FP16):\n    -   Time for 9 GOPS (INT8): `(9 * 10^9) / (26 * 10^12)\
    \ ≈ 0.346 ms`\n    -   Time for 1 GOPS (FP16): `(1 * 10^9) / (13 * 10^12) ≈ 0.077 ms`\n    -   Total\
    \ sequential inference time: `0.346 ms + 0.077 ms ≈ 0.423 ms`.\n\n    While slightly slower than the\
    \ ideal all-INT8 case (`0.423 ms` vs `0.38 ms`), this small latency increase might be a necessary\
    \ tradeoff to meet the accuracy requirement. The power consumption would still be dominated by the\
    \ Hailo-8's efficient operation, likely remaining around the 2.5W envelope, showcasing the advantage\
    \ of specialized edge accelerators even with mixed precision."
