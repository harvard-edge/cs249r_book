schema_version: 1
id: edge-exp2-desi-0350
title: Multi-Model Drone Inspection Design on Hailo-8
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are designing a low-power drone inspection system that must run 4 concurrent neural networks
  (each requiring 15 GOPS per frame) at 30 FPS. The target platform pairs a low-power host processor with
  a Hailo-8 accelerator, which provides 26 TOPS INT8 at just 2.5W. However, the Hailo-8 is a pure dataflow
  accelerator with no local DRAM, meaning all inputs, outputs, and model weights must stream continuously
  from host memory. Evaluate the architectural trade-offs of this system to estimate the true compute
  cost, taking into account host memory bandwidth contention and power budget.
details:
  realistic_solution: A strong L5 candidate will evaluate the system-level compute cost by identifying
    the PCIe bandwidth bottleneck. Instead of naive round-robin scheduling, they will design an architecture
    that spatially partitions the dataflow compiler to load all 4 models onto the Hailo-8 SRAM simultaneously,
    or use heavy temporal batching. This minimizes host-to-accelerator weight streaming, keeping the system
    within the 2.5W power envelope and reducing the host processor's compute burden.
  common_mistake: Candidates often only perform the raw compute calculation (1.8 TOPS needed vs 26 TOPS
    available) and assume the system will run at negligible power. They fail to account for the massive
    host-side compute and memory cost of swapping weights for 4 different models continuously over PCIe
    without local accelerator DRAM.
  napkin_math: 'Compute demand: 4 models * 30 FPS * 15 GOPS = 1800 GOPS = 1.8 TOPS. Theoretical utilization:
    1.8 TOPS / 26 TOPS = ~6.9%. Memory bandwidth cost if weights (e.g., 20MB per model) swap every frame:
    20MB * 4 * 30 FPS = 2.4 GB/s continuous PCIe traffic, which would blow past the host''s power budget.
    With spatial co-compilation, weight streaming drops to 0 GB/s during inference, isolating the compute
    cost strictly to the 2.5W Hailo-8 and the required 1.8 TOPS.'
