id: edge-cell-13106
title: 'Edge TCO Design: Optimize Jetson Orin Deployment for 3-Year ROI'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design a cost-optimal edge inference system for a retail chain deploying at 200 stores, each
  needing 30 FPS object detection for theft prevention. Hardware options: (A) Jetson Orin ($499, 60W),
  (B) Hailo-8+Pi5 ($280, 7.5W), (C) Cloud inference ($0.05/image). Model: YOLOv8m (INT8). Calculate 3-year
  TCO per store and total fleet, and recommend based on ROI.'
details:
  realistic_solution: Annual power cost = Watts × hours × $/kWh / 1000 = 60 × 8760 × 0.10 / 1000 = $52.56/yr.
  common_mistake: Comparing options only on upfront cost without calculating break-even month when cloud
    becomes more expensive than upfront investment.
  napkin_math: 'Annual power cost for single edge device: 60W × 8760hr × $0.10/kWh / 1000 = 60 × 8760
    × 0.10 / 1000 = 52,560 / 1000 = $52.56/yr (not $525.6/yr — that omits the /1000 to convert W to kW).'
