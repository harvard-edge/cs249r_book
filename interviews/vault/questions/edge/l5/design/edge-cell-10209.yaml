id: edge-cell-10209
title: Designing a Cascaded Model Pipeline on Jetson Orin + Coral TPU
topic: compound-ai-systems
status: published
provenance: imported
scenario: An industrial inspection system must classify defects in real-time at 30 fps using a Jetson
  Orin (32GB LPDDR5, 275 TOPS, 60W) paired with a Coral Edge TPU (4 TOPS, 2W). The pipeline needs a fast
  first-stage classifier (must run at 30 fps) and a slower second-stage analyzer for uncertain cases.
  Design a cascaded compound AI pipeline that uses both accelerators efficiently while staying within
  a 40W total power budget.
details:
  realistic_solution: '275 TOPS / (219M × 2 ops) = 627,854 theoretical fps. At realistic 5% system efficiency:
    32,700 fps. 32 fps would imply only ~7 MOPS throughput.'
  common_mistake: Running everything through the Jetson Orin and leaving the Coral TPU idle, or running
    the same model on both without considering that the Coral TPU only runs INT8 TFLite models and has
    strict model size limits (parameter count must fit in 8MB SRAM for single-chip).
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 219M MACs per frame, INT8. Throughput: (275×10^12 ops/s
    × 0.5 efficiency) / (219×10^6 × 2 ops/MAC) = 137.5T / 438M = 313,926 frames/s. At 50% utilization:
    156,963 fps. More precisely at peak: 275T × 0.5 / (219M × 2) = 137.5T / 438M = 313,926 fps ≈ 32,700
    fps at ~10% real-world utilization (not 32 fps which would imply 30 MOPS, 10,000× too slow).'
