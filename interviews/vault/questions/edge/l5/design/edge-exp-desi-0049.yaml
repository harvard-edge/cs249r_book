schema_version: 1
id: edge-exp-desi-0049
title: On-Device Fine-Tuning Checkpoint Architecture for Jetson Orin
topic: activation-memory
status: published
provenance: imported
scenario: Your team is designing a continuous learning system for an autonomous drone using an NVIDIA
  Jetson Orin module. The system must fine-tune a large Vision Transformer locally to adapt to new environments.
  The Orin is constrained by its 32 GB LPDDR5 unified memory and a strict 60W TDP. Given that the forward-pass
  activations for standard backpropagation exceed available memory, architect a gradient checkpointing
  strategy that balances activation memory reduction against the increased compute overhead on the Ampere
  GPU.
details:
  realistic_solution: A robust L5 design implements selective gradient checkpointing, targeting only the
    memory-heavy attention layers while bypassing lightweight layers like MLPs. The candidate should propose
    a dynamic memory manager that monitors the unified 32 GB LPDDR5 pool, adjusting the checkpointing
    interval based on available system memory. They should also evaluate shifting static inference tasks
    to the DLA accelerator to reserve the Ampere GPU's compute and power budget for the recomputation
    overhead.
  common_mistake: Candidates often propose simplistic checkpoint-every-layer strategies without considering
    the recomputation power cost, which can cause the device to throttle or exceed the 60W TDP. They also
    frequently forget that the 32 GB memory is shared between the Ampere GPU, CPU, and DLA, meaning peak
    ML memory usage must be kept well below the hardware maximum.
  napkin_math: Storing full activations for 24 transformer layers at 1.5 GB each requires 36 GB, exceeding
    the 32 GB LPDDR5 capacity (which also hosts the OS). By checkpointing every 4th layer, we store 6
    checkpoints (6 * 1.5 GB = 9.0 GB) and temporarily recompute up to 3 intermediate layers (3 * 1.5 GB
    = 4.5 GB). Peak activation memory drops from 36 GB to 13.5 GB, easily fitting the constraint. Recomputation
    adds ~33% compute overhead, but with 275 TOPS available, this requires minimal additional power, keeping
    the system within the 60W TDP.
