schema_version: 1
id: edge-exp2-desi-0458
title: Edge TPU Fleet CI/CD Architecture
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'You are tasked with designing the MLOps pipeline for deploying continuous model updates to
  a fleet of remote cameras powered by Google Coral Edge TPUs via USB. The edge devices have strict constraints:
  a 2W power budget, 4 TOPS of INT8 compute, and limited operator support requiring full INT8 quantization.
  Architect a CI/CD system that automates the transition from model training to Edge TPU compilation,
  validates operator compatibility, and orchestrates over-the-air (OTA) deployments without causing remote
  device failures.'
details:
  realistic_solution: The pipeline should trigger Quantization-Aware Training (QAT) or Post-Training Quantization
    (PTQ) to produce an INT8 TFLite model, followed immediately by the Edge TPU Compiler step. CI must
    include a hardware-in-the-loop runner containing actual Coral PCIe/USB devices to validate that 100%
    of operators mapped successfully to the TPU and to measure real-world power draw. The CD system should
    use a shadow deployment or canary rollout strategy, monitoring device telemetry (thermal/power) before
    completing the OTA update.
  common_mistake: Candidates frequently design standard cloud-native CI/CD pipelines that deploy containerized
    FP32 models, neglecting the mandatory Edge TPU compiler step and the strict INT8 quantization requirement.
    They also often miss the necessity of hardware-in-the-loop (HITL) automated testing to catch unsupported
    operators before OTA deployment.
  napkin_math: Assuming a target vision model requires 100 GOPS per frame, the 4 TOPS (4000 GOPS) Edge
    TPU can theoretically process 4000 / 100 = 40 frames per second. Operating at the maximum 2W power
    budget, the energy cost per inference is 2W / 40 FPS = 0.05 Joules per frame. The automated profiling
    step in the CI pipeline must verify the model operates within this 0.05J/frame envelope to prevent
    thermal throttling in the field.
