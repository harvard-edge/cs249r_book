schema_version: 1
id: edge-exp-desi-0063
title: Thermal and Bandwidth Graceful Degradation on Hailo-8
topic: graceful-degradation
status: published
provenance: imported
scenario: You are designing the perception system for an autonomous last-mile delivery robot utilizing
  a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 operates as a dataflow accelerator with
  no local DRAM, it relies entirely on streaming weights and activations from host memory. During peak
  summer operation, the host system experiences thermal throttling, severely limiting available memory
  bandwidth and preventing the Hailo-8 from executing its full suite of object detection, segmentation,
  and intent prediction models at 30 FPS. Design a graceful degradation ladder to ensure the robot can
  maintain safe, fail-operational status.
details:
  realistic_solution: The system should implement Quality-of-Service (QoS) shedding by pre-compiling a
    unified pipeline where non-critical model branches can be dynamically bypassed without reloading weights.
    The degradation ladder should first drop the heavy intent prediction model, then reduce the frame
    rate or crop the resolution for the segmentation model. Simultaneously, the robot's planning module
    must reduce the driving speed to increase the allowable reaction time margin, compensating for the
    degraded perception fidelity.
  common_mistake: Candidates often suggest dynamically loading smaller, less accurate 'fallback' models
    into the accelerator. They fail to realize that on a Hailo-8, swapping models requires significant
    host CPU intervention and massive memory bandwidth to stream the new weights, which exacerbates the
    exact bottleneck they are trying to solve.
  napkin_math: 'Assume the full pipeline requires 25 TOPS: Object Detection (6 TOPS), Segmentation (11
    TOPS), and Intent Prediction (8 TOPS), operating near the 26 TOPS limit and heavily utilizing host
    PCIe bandwidth. If thermal throttling reduces host memory bandwidth by 40%, dropping Intent Prediction
    saves 8 TOPS and its proportional bandwidth. Halving the Segmentation frame rate saves another 5.5
    TOPS. The new compute load is 11.5 TOPS (6 + 5.5), reducing the required host streaming bandwidth
    by over 50% and allowing continuous operation under the constrained thermal envelope.'
