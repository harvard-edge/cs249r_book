schema_version: 1
id: edge-exp2-desi-0366
title: Multi-TPU Routing for High-Frequency Industrial Inspection
topic: load-balancing
status: published
provenance: imported
scenario: You are designing the inference architecture for an industrial gateway receiving 8 concurrent
  60 FPS video streams. The system is equipped with an array of 4 Google Coral Edge TPUs (each delivering
  4 TOPS INT8 at 2W via a PCIe switch) running an INT8-quantized defect detection model. Design the request
  routing and load balancing layer to distribute the incoming frames across the TPUs while minimizing
  latency, handling stream fluctuations, and avoiding PCIe bandwidth saturation.
details:
  realistic_solution: Implement a device-aware routing strategy with a dedicated queue per Coral TPU,
    using a least-outstanding-requests policy rather than round-robin. To minimize PCIe contention and
    optimize the 4 TOPS throughput, pin specific camera streams to specific TPUs to maintain cache locality,
    and ensure the load balancer only dispatches batches that fit within the strict INT8 execution constraints.
  common_mistake: Candidates often propose standard cloud load balancing techniques like simple round-robin,
    ignoring the stateful nature of Edge TPUs. They forget that host-to-device PCIe transfer is a bottleneck
    and that context switching or model reloading on the Coral's limited SRAM is extremely expensive.
  napkin_math: 8 streams at 60 FPS = 480 frames/sec total inference load. With 4 Coral TPUs, each must
    process 120 FPS. If the INT8 model takes 10ms per inference (max 100 FPS per TPU), the current architecture
    will bottleneck. The load balancer must either dynamically downsample the streams to 50 FPS (8 * 50
    = 400 FPS, strictly utilizing the 4 * 100 FPS capacity) or the design requires a 5th 2W Coral TPU
    to handle the 480 FPS peak load.
