schema_version: 1
id: edge-exp2-desi-0347
title: Adversarial Defense Architecture for Streaming Edge Accelerators
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are designing an object detection system for an autonomous ground vehicle that must be resilient
  against physical adversarial patches (e.g., modified stop signs). The system uses a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W) connected via an M.2 interface. Because the Hailo-8 has no local DRAM and streams
  data directly from host memory, you must architect a defense strategy—choosing between host-side input
  sanitization, multi-model purification, or single-pass adversarial training—that meets real-time latency
  requirements without hitting memory or compute bottlenecks.
details:
  realistic_solution: The optimal design uses a single-pass, adversarially-trained INT8 model on the Hailo-8,
    combined with lightweight host-side spatial transformations (like randomized resizing/cropping) before
    streaming. This leverages the CPU/ISP for cheap preprocessing, utilizes the Hailo-8's dataflow architecture
    for efficient inference, and strictly bounds the host-to-accelerator streaming bandwidth.
  common_mistake: Candidates often suggest deploying complex generative purification models (like diffusion
    or GANs) that exceed the INT8 capabilities of the Hailo-8. They also frequently ignore the host-memory
    streaming architecture, proposing multi-pass defenses that would saturate the PCIe bandwidth with
    intermediate feature maps.
  napkin_math: A 1080p RGB frame (1920x1080x3 bytes) is ~6.2MB. At 30 FPS, one-way streaming requires
    186 MB/s of bandwidth. A multi-pass purification approach (e.g., host -> Hailo-8 -> host -> Hailo-8)
    would double this to 372 MB/s plus intermediate feature map overhead, risking saturation of a low-power
    PCIe Gen2 x1 link (~500 MB/s practical limit). A single robust model using ~10 TOPS easily fits within
    the 26 TOPS limit while maintaining the 2.5W power envelope.
