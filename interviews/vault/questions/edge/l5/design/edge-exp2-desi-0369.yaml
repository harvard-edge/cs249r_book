schema_version: 1
id: edge-exp2-desi-0369
title: Handling Host Memory Pressure for Hailo-8 Streams
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are designing a multi-camera smart city application running on an edge appliance equipped
  with a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 operates as a dataflow accelerator without
  local DRAM, continuously streaming activations and weights directly from the host's 4GB memory. During
  peak traffic hours, OS-level memory fragmentation and background daemon spikes cause severe host memory
  pressure, threatening the DMA buffers required by the accelerator. Design a robust memory management
  architecture to handle these host memory constraints and prevent Out-Of-Memory (OOM) evictions while
  maintaining continuous inference throughput.
details:
  realistic_solution: The architecture must implement a pre-allocated, physically contiguous memory pool
    (e.g., via a dedicated Contiguous Memory Allocator or CMA region) reserved exclusively for Hailo-8
    DMA operations at boot time. To handle dynamic application-level pressure, the system should feature
    a QoS-aware pipeline that drops low-priority camera frames early in the host CPU pipeline, ensuring
    the core dataflow streaming engine never starves or triggers an OS-level eviction.
  common_mistake: Candidates often suggest adding swap space or relying on standard Linux OOM killer priorities,
    failing to realize that swap destroys real-time streaming latency. Another mistake is treating the
    Hailo-8 like a typical GPU with dedicated VRAM, missing the crucial detail that it relies entirely
    on host memory pinning and DMA, making host memory fragmentation a critical failure point.
  napkin_math: 'Host memory capacity: 4096MB. OS + daemons reserve: 1536MB. Available: 2560MB. For 4 cameras,
    a 1080p RGB frame requires 1920*1080*3 bytes = 6.22MB. Buffering a queue depth of 5 frames per camera
    needs 4 * 5 * 6.22MB = 124.4MB for inputs. With INT8 weights and intermediate feature maps needing
    ~250MB, the total pinned memory is ~374.4MB. Allocating a 512MB CMA region at boot guarantees the
    26 TOPS accelerator avoids stalling due to 4KB page compaction during fragmentation.'
