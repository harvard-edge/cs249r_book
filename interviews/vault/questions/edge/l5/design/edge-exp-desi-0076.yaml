schema_version: 1
id: edge-exp-desi-0076
title: Zero-Copy Video Ingestion Pipeline for Hailo-8
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are designing a real-time multi-camera perception pipeline for an autonomous delivery robot
  using a Hailo-8 dataflow accelerator. The system must ingest 4 concurrent 1080p video streams at 30
  fps and feed them continuously into the accelerator for object detection. Given the Hailo-8's architecture—26
  TOPS INT8, 2.5W, and crucially, no local DRAM (it streams weights and activations directly from host
  memory over PCIe)—architect the host-side ingestion and memory management pipeline to prevent host memory
  bandwidth bottlenecks and ensure the accelerator remains fully utilized.
details:
  realistic_solution: A robust design utilizes a zero-copy pipeline (e.g., using V4L2 and dma-buf) to
    stream data directly from the camera interfaces to pinned, contiguous host memory. The host CPU is
    completely bypassed for data movement; hardware-decoded buffers are mapped directly to the Hailo RT
    driver. The ingestion pipeline maintains a ring buffer of continuous input streams, allowing the Hailo-8
    to fetch data over PCIe autonomously via DMA without waiting for CPU intervention.
  common_mistake: Candidates often design a standard frame-by-frame processing loop where the CPU decodes
    frames, copies them to user space for preprocessing, and then initiates individual DMA transfers.
    They fail to account for the Hailo-8's lack of local DRAM, leading to redundant memory copies that
    saturate the host memory bus and starve the dataflow accelerator.
  napkin_math: 4 cameras * 1920x1080 pixels * 3 bytes/pixel (RGB) * 30 FPS = ~746 MB/s of raw video ingestion.
    A naive pipeline involving CPU copies (Camera -> RAM -> CPU Cache -> RAM -> PCIe) requires >2.2 GB/s
    of host memory bandwidth. By using a zero-copy dma-buf pipeline, host memory bandwidth consumption
    is reduced strictly to the 746 MB/s hardware write and the 746 MB/s DMA read by the Hailo-8 over its
    PCIe Gen3 x4 interface, easily sustaining the 26 TOPS INT8 throughput.
