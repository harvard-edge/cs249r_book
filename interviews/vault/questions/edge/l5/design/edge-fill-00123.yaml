schema_version: 1
id: edge-fill-00123
title: Edge AI Perception Model Costing on Qualcomm AI 100
topic: compute-cost-estimation
status: published
provenance: imported
scenario: A self-driving car company plans to deploy a new perception model (e.g., for pedestrian detection)
  onto 100,000 edge vehicles. Each vehicle will be equipped with a Qualcomm Cloud AI 100 accelerator (32
  GB LPDDR4x, 400 TOPS INT8, 75W typical power). The perception model performs 200 billion INT8 operations
  per inference and needs to run at 25 inferences per second to meet real-time requirements. Estimate
  the annual compute cost, considering operations (INT8 OPs), accelerator-hours, and dollar cost, assuming
  each vehicle operates for an average of 8 hours per day, 365 days a year. Power cost is $0.20/kWh, and
  the amortized annual cost for one Qualcomm Cloud AI 100 unit is $300.
details:
  realistic_solution: 'A robust solution requires breaking down the problem: first, calculate the total
    INT8 operations per second per device, then aggregate this to annual operations across the entire
    fleet. Similarly, compute total accelerator-hours. For dollar cost, separately calculate annual power
    consumption and its cost per device, then scale for the fleet. Finally, add the amortized hardware
    cost. It''s also critical to verify if the required operations per second (5 TOPs) fit within the
    device''s capacity (400 TOPS).'
  common_mistake: Candidates often confuse theoretical peak performance (TOPS) with actual sustained throughput,
    leading to underestimation of device needs. They might also neglect the device's operational duty
    cycle or underestimate the cumulative power consumption across a large fleet, or overlook the amortized
    hardware cost in the total annual expenditure.
  napkin_math: "1. **INT8 Operations:** 200B ops/inf * 25 inf/sec = 5e12 ops/sec/device. Operating 8 hrs/day\
    \ * 365 days = 2920 hrs/year. Total ops/year/device = 5e12 ops/sec * 3600 sec/hr * 2920 hrs/year =\
    \ 5.256e19 ops/year/device. Total fleet ops = 5.256e19 ops/year/device * 100,000 devices = 5.256e24\
    \ INT8 ops/year. \n2. **Accelerator-Hours:** 2920 hrs/year/device * 100,000 devices = 2.92e8 Accelerator-hours/year.\n\
    3. **Dollar Cost:** Power/device/year = 0.075 kW * 2920 hrs/year = 219 kWh/year. Power cost/device/year\
    \ = 219 kWh * $0.20/kWh = $43.80. Total Power Cost = $43.80 * 100,000 devices = $4,380,000/year. Total\
    \ Amortized Hardware Cost = $300/device/year * 100,000 devices = $30,000,000/year. Total Annual Cost\
    \ = $4,380,000 (power) + $30,000,000 (hardware) = $34,380,000/year."
