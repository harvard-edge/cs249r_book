id: edge-exp2-desi-0456
title: Architecting a Multi-Camera Perception System for Jetson Orin
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are tasked with designing the perception architecture for an autonomous delivery robot using
  an NVIDIA Jetson Orin. The system must process six high-resolution 4K camera streams at 30 FPS simultaneously
  for real-time object detection and segmentation. The Orin provides 275 TOPS INT8, an Ampere GPU, a DLA
  (Deep Learning Accelerator), and 32 GB LPDDR5 within a 60W TDP. Design the neural network architecture
  and hardware mapping strategy, specifically evaluating standard convolutions versus depthwise separable
  convolutions and inverted residuals, to maximize accuracy while avoiding memory bandwidth bottlenecks.
details:
  realistic_solution: A strong candidate will design a hybrid architecture that balances FLOPs and memory
    bandwidth. They should propose an EfficientNet-style backbone but optimize the inverted bottlenecks
    for the hardware. They would map memory-bound depthwise operations to the DLA where possible, while
    keeping compute-heavy 1x1 point-wise convolutions on the Ampere GPU, carefully managing the 32 GB
    LPDDR5 shared memory to keep the compute units fed.
  common_mistake: Candidates often propose a standard MobileNet architecture purely to minimize FLOPs,
    ignoring the specific hardware characteristics of the Orin. They fail to realize that depthwise separable
    convolutions have low arithmetic intensity and can severely underutilize the Ampere GPU and DLA, causing
    the system to become memory-bound rather than compute-bound.
  napkin_math: 6 cameras * 30 FPS = 180 frames/sec. At 4K (8M pixels), an unoptimized CNN might need 100
    GOPS/frame, totaling 18 TOPS, well within the 275 TOPS INT8 limit. However, LPDDR5 provides ~204 GB/s
    bandwidth. A purely depthwise convolution layer has an arithmetic intensity of ~1 MAC/byte. To achieve
    even 50 TOPS on depthwise layers, it would require 50 TB/s of bandwidth, which is impossible. Therefore,
    the design must evaluate using standard or grouped convolutions (intensity > 50 MAC/byte) in early
    layers to avoid hitting the 204 GB/s memory wall, despite having higher theoretical FLOPs.
