schema_version: 1
id: edge-cell-13107
title: 'Edge TCO Design: Hailo-8 ROI for Smart Agriculture'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design an edge inference deployment for crop disease detection across 1000 farms using Hailo-8
  (26 TOPS INT8, 2.5W, $200). Each farm takes 5 images/day from drone. Alternative: cloud inference at
  $0.01/image. Calculate break-even point in months and 5-year ROI. Include battery considerations (solar
  + 10Ah LiPo at 3.7V = 37Wh) and connectivity (LoRa at $5/month).'
details:
  realistic_solution: Power cost = W × hr × devices × $/kWh / 1000 = 5.1 × 8760 × 5 × 0.10 / 1000 = $22.33/yr
    (not $22,338).
  common_mistake: Not checking if the power budget is feasible for battery-only operation before comparing
    against cloud — a 2.5W device running 24/7 on a 37Wh battery would drain in 37/2.5=14.8 hours, requiring
    daytime solar only.
  napkin_math: 'Annual power cost for 5-device deployment: 5.1W average × 8760hr × 5 devices × $0.10/kWh
    / 1000 = 5.1 × 8760 × 5 × 0.10 / 1000 = 22,338 / 1000 = $22.34 ≈ $22.33/yr (not $22,338 which omits
    the /1000 conversion).'
