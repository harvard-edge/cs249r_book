schema_version: 1
id: edge-exp-desi-0073
title: Coral Edge TPU Pipeline Bottleneck Analysis Design
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: Your team is deploying a multi-stage vision pipeline on a Google Coral Edge TPU via a USB 3.0
  interface. The Coral provides 4 TOPS for INT8 operations at just 2W, but requires all ops to be quantized
  to INT8 with limited operator support. Initial profiling shows the end-to-end latency is missing the
  30 FPS target, yet the Edge TPU utilization is surprisingly low. Design a profiling and bottleneck analysis
  architecture to systematically identify whether the latency bottleneck lies in USB I/O, host CPU pre/post-processing,
  or unsupported operations causing expensive context switches back to the host.
details:
  realistic_solution: A strong candidate will propose a systematic profiling approach starting with the
    Edge TPU compiler's log to check for subgraph partitioning (operator fallback). They will architect
    a tracing setup using system-level tools (like `perf` or `ftrace`) alongside Edge TPU runtime metrics
    to independently measure host-to-device I/O latency, CPU pre/post-processing time, and pure TPU execution
    time to isolate the exact bottleneck.
  common_mistake: Candidates often immediately assume the model is too large or complex for the TPU and
    focus on aggressive pruning or further quantization. They frequently overlook the PCIe/USB I/O overhead
    or the massive latency cost of subgraph partitioning when unsupported operators force execution back
    to the host CPU.
  napkin_math: Target latency for 30 FPS is ~33.3ms per frame. With 4 TOPS INT8 capacity, a 2 GOPS model
    takes theoretically 0.5ms to compute. However, over a USB 3.0 connection (~400 MB/s effective), transferring
    a 2MB input tensor takes 5ms. If an unsupported op causes a fallback, transferring a 1MB intermediate
    tensor back to the host and then to the TPU adds 2.5ms * 2 = 5ms per partition, quickly consuming
    the 33.3ms budget despite the 0.5ms TPU compute time.
