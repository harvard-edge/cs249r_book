id: edge-exp2-desi-0363
title: Multi-Model Compilation Strategy for NVIDIA Jetson Orin
topic: graph-compilation
status: published
provenance: imported
scenario: You are designing the inference compilation pipeline for an autonomous robot running on an NVIDIA
  Jetson Orin. The system must concurrently execute a CNN-based object detector, a Transformer-based planner,
  and a sensor fusion model within a strict 60W TDP budget. Given the Jetson Orin features an Ampere GPU
  and specialized Deep Learning Accelerators (DLAs), architect an ahead-of-time graph compilation and
  operator mapping strategy that maximizes the available 275 TOPS INT8 compute while efficiently sharing
  the 32 GB LPDDR5 memory pool.
details:
  realistic_solution: The optimal design leverages a compiler like TensorRT to partition the execution
    graph ahead-of-time based on hardware capabilities. The standard convolution layers of the object
    detector should be explicitly pinned to the DLAs for power-efficient INT8 execution. Meanwhile, the
    Transformer's attention mechanisms and any custom operators are assigned to the Ampere GPU. This hardware-aware
    compilation strategy ensures the 60W TDP is respected by offloading sustained workloads to the DLA,
    while utilizing unified memory to eliminate host-to-device transfer latency.
  common_mistake: Candidates often suggest compiling all models to run exclusively on the Ampere GPU,
    ignoring the power efficiency of the DLAs. Another common error is failing to address the operator
    fallback overhead that occurs when DLA-unsupported layers force costly context switches and memory
    copies between the DLA and GPU.
  napkin_math: Given the 275 TOPS INT8 peak performance, if the CNN requires 100 TOPS and the Transformer
    requires 80 TOPS, we are within the compute budget. However, the 32 GB LPDDR5 shared memory has a
    peak bandwidth of 204 GB/s. If the 3 models total 6 GB of INT8 weights and process 4 cameras at 1080p/30FPS
    (4 * 1920 * 1080 * 3 bytes * 30 FPS = ~746 MB/s input), the compute is feasible, but unoptimized memory
    accesses will bottleneck the system. Aggressive operator fusion and constant folding during compilation
    are required to reduce intermediate activation reads/writes and stay well below the 204 GB/s bandwidth
    ceiling.
