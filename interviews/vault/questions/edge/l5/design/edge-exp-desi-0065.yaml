schema_version: 1
id: edge-exp-desi-0065
title: Architecting a Vision-Language Pipeline on Jetson Orin
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is building an autonomous robot navigation system utilizing a 4-billion parameter
  Vision-Language Model (VLM) for real-time hazard detection. The system is deployed on an NVIDIA Jetson
  Orin with 32 GB LPDDR5, an Ampere GPU, a DLA accelerator, 275 TOPS INT8 compute, and a 60W TDP. Product
  requirements mandate an end-to-end latency of under 150ms per frame from camera sensor to control output.
  Architect the system pipeline, decomposing the latency across I/O, preprocessing, TTFT, and TPOT, and
  justify your hardware mapping to ensure the latency budget is met without exceeding the 60W TDP.
details:
  realistic_solution: A robust design leverages the Jetson Orin's heterogeneous architecture to pipeline
    the workload and decompose latency. Camera ingestion and preprocessing (resizing/normalization) should
    run on dedicated ISP and hardware compositors. The vision encoder component of the VLM should be compiled
    to INT8 and mapped to the DLA accelerator. This frees up the Ampere GPU and its memory bandwidth entirely
    for the language decoder, optimizing for the lowest possible TPOT while keeping the overall system
    within the 60W TDP.
  common_mistake: Candidates often fail to decompose the pipeline, defaulting to running the entire VLM
    on the Ampere GPU. They forget that preprocessing and vision encoding will steal memory bandwidth
    from the memory-bound auto-regressive generation phase, causing them to miss the latency target.
  napkin_math: "1. Budget: 150ms. \n2. I/O & Preprocessing: 15ms (using ISP/dedicated hardware). \n3.\
    \ TTFT (Vision Encoding + Prompt Processing): 60ms. By offloading the vision encoder to the DLA (utilizing\
    \ a portion of the 275 TOPS INT8), we save GPU cycles. \n4. TPOT Budget: 150ms - 15ms - 60ms = 75ms.\
    \ \n5. Generating 3 control tokens in 75ms requires 25ms per token (40 tokens/sec). \n6. Memory Bandwidth\
    \ for TPOT: A 4B parameter model in INT8 requires ~4 GB of memory. 4 GB * 40 passes/sec = 160 GB/s.\
    \ The Jetson Orin's 32 GB LPDDR5 provides ~204 GB/s, meaning the design is mathematically viable and\
    \ leaves headroom."
