id: edge-exp2-desi-0378
title: On-Premise Guardrail Architecture for Legal Summarization
topic: responsible-ai
status: published
provenance: imported
scenario: You are tasked with designing a secure, on-premise document summarization pipeline for legal
  contracts. The system must include strict responsible AI guardrails, specifically PII redaction and
  hallucination detection, before surfacing summaries to users. The entire pipeline must be deployed on
  a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). Architect the system,
  detailing how you will allocate hardware resources between the main summarization model and the guardrail
  models, and evaluate the tradeoffs between sequential and parallel guardrail execution to meet a 2-second
  end-to-end latency SLA.
details:
  realistic_solution: The optimal design quantizes the main summarization model (e.g., an 8B parameter
    model) to INT8, occupying ~8.5 GB. Instead of using LLMs for guardrails, architect a system using
    small, specialized INT8 models (e.g., DeBERTa for hallucination, lightweight NER for PII) running
    concurrently where possible. PII redaction runs pre-summarization, and hallucination detection runs
    post-summarization. By relying heavily on INT8 compilation, the 400 TOPS capability is maximized,
    keeping the total memory footprint (models + KV cache) well under the 32 GB constraint and ensuring
    the 75W thermal envelope is maintained.
  common_mistake: Candidates often design pipelines that exceed the 32 GB memory limit by chaining multiple
    large LLMs for each guardrail task. They also frequently fail to utilize the INT8 capabilities (400
    TOPS), proposing FP16 models which significantly bottleneck the pipeline and miss the latency SLA.
  napkin_math: An 8B model in INT8 requires ~8.5 GB. Two specialized BERT-sized guardrail models (PII,
    hallucination) in INT8 require ~220 MB total. Total static model memory = ~8.72 GB. This leaves ~23.28
    GB of the 32 GB LPDDR4x for KV cache and activations. With 400 INT8 TOPS, assuming 25% hardware utilization
    (100 effective TOPS), generating a 50-token summary using an 8B model (~16 GOPS/token) takes ~50 *
    (16 / 100000) = 0.008 seconds of pure compute, but memory bandwidth will be the bottleneck. At ~100
    GB/s bandwidth, loading 8.5 GB takes ~0.085s per token, leading to ~4.25s for 50 tokens at batch size
    1. The candidate should recognize that to meet the 2-second SLA, continuous batching and aggressive
    KV-cache management within the remaining 23 GB are strictly required.
