schema_version: 1
id: edge-exp2-desi-0365
title: Architecting an Object Detection Pipeline on Jetson Orin
topic: latency-decomposition
status: published
provenance: imported
scenario: You are tasked with designing an end-to-end real-time autonomous drone vision system deployed
  on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The system captures
  4K video at 60 FPS, runs an object detection model, and sends control signals based on the detections.
  The strict end-to-end latency budget from frame capture to control signal emission is 30ms. Architect
  the pipeline to meet this latency requirement, detailing how you allocate the latency budget across
  preprocessing, model inference, postprocessing, and communication, and justify your design choices regarding
  the allocation of tasks between the Ampere GPU and the DLA.
details:
  realistic_solution: A robust design pipelines the workload to hide latency and explicitly bounds each
    component. Preprocessing (ISP, resizing) should be handled by dedicated hardware blocks (VIC/ISP)
    taking ~5ms. The main object detection backbone should be quantized to INT8 and offloaded to the DLA
    to save power and free the Ampere GPU, taking ~10ms for inference. The Ampere GPU can be used for
    complex postprocessing like NMS, taking ~5ms. The remaining 10ms is budgeted for network/control signaling
    and buffer transfers. This ensures the 30ms budget is met while optimally utilizing the heterogeneous
    SoC.
  common_mistake: Candidates often focus solely on the neural network inference time (TPOT) and ignore
    the significant latency contributions of image signal processing (ISP), memory transfers between the
    CPU and GPU/DLA, and Non-Maximum Suppression (NMS) in postprocessing. They might also fail to utilize
    the DLA, overloading the Ampere GPU and causing thermal throttling or missing the 60W TDP constraint.
  napkin_math: 'Total budget = 30ms. Frame interval at 60 FPS = 16.67ms. Pipeline breakdown: Camera capture/ISP
    = 5ms. Memory copy to DLA/GPU (32GB/s memory bandwidth, 4K RGB frame is ~24MB) = 24MB / 32GB/s ≈ 0.75ms.
    INT8 Inference on DLA (assuming 50 GOPS model at 30% utilization of 275 TOPS) = 50e9 / (275e12 * 0.3)
    ≈ 0.6ms, but let''s allocate a conservative 10ms for kernel launch and execution. GPU NMS = 5ms. Control
    logic + Tx = 5ms. Total latency: 5 + 0.75 + 10 + 5 + 5 = 25.75ms, safely under the 30ms budget.'
