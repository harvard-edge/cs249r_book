id: edge-exp2-desi-0457
title: Hailo-8 Dataflow Optimization and Memory-Bound Operator Fusion
topic: kernel-fusion
status: published
provenance: imported
scenario: You are designing an object detection pipeline for a battery-powered drone using a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W). The model contains a sequence of memory-bound operations following the main convolutions.
  Since the Hailo-8 is a dataflow accelerator with no local DRAM and relies strictly on streaming from
  host memory, the host-to-device PCIe bandwidth is a major bottleneck. How would you design the fusion
  strategy for these operations to minimize latency and host memory access?
details:
  realistic_solution: The optimal design maps the sequence of memory-bound operations into a single continuous
    dataflow graph on the Hailo-8's spatial fabric. By configuring routing resources to stream the output
    of convolutions directly into subsequent units (activations, scaling) without returning to host memory,
    we bypass the PCIe bottleneck. This requires graph-level compiler fusion to ensure operations occupy
    adjacent compute units on the chip, forming a single streaming pipeline.
  common_mistake: Candidates often propose standard GPU-style kernel fusion (like CUDA thread block optimizations)
    which do not apply to a spatial dataflow architecture. They might also suggest caching intermediate
    tensors in local memory, failing to account for the Hailo-8's lack of local DRAM and the high penalty
    of streaming intermediate activations back and forth to the host.
  napkin_math: Assume an intermediate activation tensor is 4MB (INT8). If not fused, writing to host memory
    and reading it back via PCIe Gen3 x4 (~3.9 GB/s) takes (4MB * 2) / 3.9 GB/s = ~2 ms per layer. Fusing
    3 consecutive memory-bound operations saves ~6 ms per inference in transfer time alone, which is a
    massive saving for a 30 FPS (33 ms/frame) real-time target while operating within the tight 2.5W power
    envelope.
