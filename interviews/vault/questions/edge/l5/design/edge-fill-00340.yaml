schema_version: 1
id: edge-fill-00340
title: Latency Decomposition for Real-time Inference on NVIDIA Jetson Orin
topic: latency-decomposition
status: published
provenance: imported
scenario: You are tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin, which
  has 32 GB LPDDR5, 275 TOPS INT8, and operates within a 60W power budget. The end-to-end latency requirement
  is 100ms from camera input to actionable output. Describe how you would systematically decompose this
  end-to-end latency into its constituent components (e.g., Time To First Token/Tensor, Time Per Output
  Token/Tensor, network transfer, preprocessing, model inference, and postprocessing) to identify bottlenecks
  and optimize the system for real-time performance.
details:
  realistic_solution: "Implement detailed profiling at each stage: \n1.  **Input Acquisition**: Measure\
    \ time from camera frame capture to host memory, then to device memory (DMA transfer).\n2.  **Preprocessing**:\
    \ Profile each step (e.g., image decoding, resizing, color conversion) on the chosen compute unit\
    \ (CPU or GPU). Use NVIDIA's DALI or TensorRT plugins for GPU-accelerated preprocessing.\n3.  **Model\
    \ Inference**: Utilize TensorRT for model optimization and measure actual inference time on the Orin's\
    \ INT8 cores.\n4.  **Postprocessing**: Profile steps like Non-Maximum Suppression (NMS) and output\
    \ formatting.\n5.  **Output Transmission**: Measure time to send results over network or display.\n\
    Use tools like Nsight Systems, `nvprof`, and custom timers within the application code to get granular\
    \ measurements. Build a dashboard to visualize these latencies and identify the largest contributors,\
    \ then iteratively optimize the slowest components."
  common_mistake: A common mistake is focusing solely on model inference time without considering the
    overheads of data transfer (e.g., PCIe/USB camera input to device memory), preprocessing (e.g., image
    resizing, normalization on CPU vs. GPU), and postprocessing (e.g., NMS, bounding box filtering, output
    formatting). Neglecting these often leads to sub-optimal system performance even with a highly optimized
    model.
  napkin_math: 'Given a target end-to-end latency of 100ms:

    -   If preprocessing takes 20ms, model inference takes 50ms, and postprocessing takes 15ms, then network/I/O
    accounts for 100 - (20 + 50 + 15) = 15ms.

    -   If the model requires an input of 30 TOPS and the Orin provides 275 TOPS INT8, the theoretical
    inference time (excluding overheads) would be roughly 30/275 * 1000ms/s ≈ 109ms, indicating that the
    model itself might be too heavy or requires further optimization (e.g., sparsity, quantization) to
    fit within a 50ms budget, or the 50ms measured inference time includes other hidden operations. This
    highlights the need for careful decomposition and measurement, as the theoretical TOPS doesn''t directly
    translate to real-world latency without considering throughput, batching, and kernel efficiency.'
