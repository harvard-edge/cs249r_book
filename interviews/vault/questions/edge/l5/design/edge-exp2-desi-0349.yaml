schema_version: 1
id: edge-exp2-desi-0349
title: On-Premise RAG Pipeline Design for Cloud AI 100
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are designing an on-premise RAG system for a financial firm using a single Qualcomm Cloud
  AI 100 accelerator. The pipeline chains an embedding model, a cross-encoder ranker, and an 8B parameter
  LLM to answer queries securely. Given the platform's 32 GB LPDDR4x memory, 400 TOPS INT8 compute, and
  75W power envelope, architect the deployment strategy. Evaluate the tradeoffs of model co-location versus
  sequential swapping to meet a strict 1-second time-to-first-token latency requirement.
details:
  realistic_solution: The optimal design statically loads all three models into the 32 GB LPDDR4x memory
    by quantizing the 8B LLM to INT8 (or W4A8) and the embedding/ranking models to INT8. This leverages
    the accelerator's 400 TOPS INT8 compute capabilities and completely avoids PCIe transfer latency during
    the critical path. To maximize throughput within the 75W power budget, the architecture should pipeline
    the execution, allowing the embedding models to process incoming queries while the LLM generates output
    for previous ones.
  common_mistake: Candidates often suggest dynamically loading models into memory for each pipeline stage
    to save space, severely underestimating the PCIe bandwidth bottleneck. They also fail to exploit the
    400 TOPS INT8 engine, proposing FP16 models that exceed the 32 GB memory limit when deployed together
    with a large KV cache.
  napkin_math: An 8B LLM quantized to INT8 requires ~8 GB of memory. An INT8 embedding model and ranker
    consume ~1 GB combined, totaling 9 GB of static weights. Out of the 32 GB LPDDR4x, 23 GB remains for
    the KV cache and OS overhead. For a 2K token sequence, the KV cache requires ~1 GB per request in
    FP16, comfortably allowing a batch size of 16. Token generation is memory-bound; assuming ~136 GB/s
    bandwidth for LPDDR4x, an 8 GB model generates ~17 tokens/sec per user at batch size 1 (136/8), easily
    meeting the 1-second TTFT goal when avoiding model swap overheads.
