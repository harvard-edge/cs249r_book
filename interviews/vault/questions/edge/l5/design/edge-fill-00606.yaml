id: edge-fill-00606
title: Energy-Aware Model Design for Real-Time Inference on Google Coral Edge TPU
topic: energy-per-operation
status: published
provenance: imported
scenario: Your team is tasked with deploying a real-time object detection neural network on a fleet of
  Google Coral Edge TPUs. Each Coral Edge TPU offers 4 TOPS (INT8) of compute performance with a strict
  power budget of 2W and supports INT8 inference only. The application requires processing video frames
  at 30 FPS. You have considerable flexibility in tailoring the model architecture and selecting operators.
  Given the principles of Horowitz's energy table, which highlights a significant disparity in energy
  costs between memory access and compute operations (e.g., DRAM access vs. INT8 MACs), how would you
  design and optimize the neural network to achieve the lowest possible energy consumption per inference
  while maintaining a specified accuracy target, leveraging the specific characteristics of the Coral
  Edge TPU?
details:
  realistic_solution: 'The optimal solution involves a multi-pronged approach: 1. **Memory-Aware Architecture**:
    Prioritize neural network layers and operations that minimize data movement, particularly off-chip.
    This includes using depthwise separable convolutions, group convolutions, and efficient layer fusion
    techniques to keep data on-chip as much as possible. 2. **Aggressive Quantization-Aware Training (QAT)**:
    Ensure the model is robustly quantized to INT8, as this is the native and most energy-efficient data
    type for the Coral Edge TPU. 3. **Operator Selection**: Favor operators that map efficiently to the
    Coral''s INT8 MAC units. 4. **Micro-architectural Profiling**: Utilize profiling tools to understand
    the actual energy consumption of different model components and identify memory bottlenecks on the
    target hardware, guiding iterative design improvements. 5. **Data Layout Optimization**: Experiment
    with channel-last or other memory-friendly data layouts to improve cache utilization.'
  common_mistake: A common mistake is to primarily optimize for FLOPs/MACs count without adequately considering
    the energy cost of data movement, especially off-chip memory accesses. This often leads to architectures
    that are compute-efficient in theory but bottlenecked and power-hungry in practice due to excessive
    data fetches.
  napkin_math: Given the Coral Edge TPU's 2W power budget and 30 FPS requirement, the energy budget per
    frame is ~0.067 Joules (2W / 30 FPS). If a typical INT8 MAC costs ~0.2 pJ and an off-chip DRAM access
    costs ~100 pJ (illustrative values from Horowitz's table), then a single DRAM access is equivalent
    to ~500 INT8 MAC operations in terms of energy consumption. This stark difference underscores that
    an ideal model for the Coral Edge TPU should strive to maximize the compute-to-memory-access ratio.
