schema_version: 1
id: edge-exp2-desi-0380
title: Real-time Multi-Camera Pipeline Architecture for Hailo-8 Dataflow Accelerator
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are designing a real-time smart city intersection monitoring system that ingests four 1080p
  camera streams at 30 FPS. The inference will run on a Hailo-8 edge AI processor (26 TOPS INT8, 2.5W),
  which operates as a pure dataflow accelerator with no local DRAM, relying entirely on streaming from
  the host processor's memory over PCIe. Architect the streaming ingestion pipeline to handle frame capture,
  preprocessing, and continuous tensor streaming to the Hailo-8, minimizing host CPU overhead and preventing
  accelerator starvation.
details:
  realistic_solution: The optimal design bypasses user-space memory copies by using zero-copy mechanisms
    (like V4L2 with DMA-BUF or GStreamer pipelines) to ingest frames directly into pinned host memory.
    Preprocessing (resizing, format conversion) should ideally occur on the camera ISP or via hardware
    accelerators on the host SoC before the tensors are continuously streamed via PCIe to the Hailo-8's
    dataflow graph. The host CPU acts only to orchestrate DMA transfers rather than moving pixels.
  common_mistake: Candidates often propose standard batching frameworks or message queues (like Kafka
    or Redis) between ingestion and inference, failing to recognize that the Hailo-8 requires continuous,
    deterministic data streaming from host memory. They also frequently overlook the host PCIe bandwidth
    saturation and memory bandwidth bottlenecks when managing four uncompressed 1080p streams.
  napkin_math: Four 1080p cameras at 30 FPS = 4 * 1920 * 1080 * 3 (RGB) * 30 = 746 MB/s of raw frame data.
    Assuming a model input size of 640x640x3 INT8, the ingestion pipeline must downscale and stream 4
    * 640 * 640 * 3 * 30 = 147 MB/s of continuous tensor data over PCIe to the Hailo-8. With the Hailo-8's
    26 TOPS at 2.5W, processing 120 total FPS requires a model utilizing < 216 GOPS per frame, leaving
    ample compute headroom but making host memory bandwidth the primary bottleneck.
