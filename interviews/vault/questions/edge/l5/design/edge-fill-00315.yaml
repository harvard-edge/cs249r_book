id: edge-fill-00315
title: Designing for Memory Pressure on Qualcomm Cloud AI 100
topic: memory-pressure-management
status: published
provenance: imported
scenario: Your team is deploying a large language model (LLM) for real-time inference on the Qualcomm
  Cloud AI 100, which features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope.
  The current model, when loaded, consumes close to 28 GB of memory, leaving minimal headroom. During
  peak load, you observe frequent out-of-memory (OOM) errors and performance degradation due to memory
  pressure. Design a strategy to robustly manage memory pressure and minimize OOM events, considering
  the specific hardware constraints and real-time inference requirements.
details:
  realistic_solution: 'Implement a multi-pronged approach: (1) Deeply analyze memory usage patterns during
    inference to identify peak allocations and potential fragmentation. (2) Explore advanced memory pooling
    techniques (e.g., custom allocators, arena allocation) to reduce fragmentation overhead. (3) Dynamically
    adjust batch sizes or employ micro-batching with gradient accumulation (if applicable for fine-tuning
    on device, though primarily an inference scenario here, this principle can apply to memory-aware scheduling).
    (4) Investigate OS-level memory settings and eviction policies to ensure predictable behavior and
    prioritize critical model tensors. (5) Develop robust OOM handling mechanisms that can gracefully
    degrade (e.g., shed less critical requests, dynamically offload layers if feasible) rather than crashing
    the system, coupled with detailed memory profiling tools specific to the Qualcomm AI 100 environment.'
  common_mistake: Focusing solely on model quantization (e.g., INT8) without considering dynamic memory
    usage patterns, fragmentation issues, or the impact of OS-level memory management and caching on the
    limited LPDDR4x memory, leading to recurring OOMs despite initial optimizations.
  napkin_math: Given 32 GB LPDDR4x and a 28 GB model, only 4 GB is left for OS, runtime, activations,
    and temporary buffers. If an activation layer temporarily doubles its memory footprint for an operation
    (e.g., element-wise op requiring temporary copy), even a 2 GB layer can trigger an OOM. With 400 TOPS
    INT8, the device can process a lot of data; optimizing memory access patterns and reducing copy operations
    is crucial for sustaining this throughput without OOMs.
