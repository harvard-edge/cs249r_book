schema_version: 1
id: edge-fill-00830
title: 'Optimizing Edge Vision Models: Structured Pruning for Coral TPU'
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV3-SSD) on a fleet
  of smart cameras, each equipped with a Google Coral Edge TPU. The Coral Edge TPU provides 4 TOPS of
  INT8 compute with a typical power budget of ~2W. The current model, while performing adequately on server-grade
  GPUs, exceeds the Coral's latency and memory constraints for critical detection tasks (e.g., detecting
  anomalies in manufacturing, requiring <50ms inference time). You've identified that the model's size
  and computational footprint are the primary bottlenecks. How would you leverage pruning and sparsity
  techniques, specifically considering the Coral Edge TPU's architecture and INT8-only support, to achieve
  the performance targets without significant accuracy degradation?
details:
  realistic_solution: Implement structured pruning techniques (e.g., filter pruning, channel pruning,
    block pruning) that remove entire groups of weights, channels, or blocks, resulting in smaller, denser
    layers rather than randomly sparse ones. This allows the pruned model to still leverage the Coral's
    efficient dense INT8 tensor operations. Focus on pruning early layers more aggressively as they contribute
    more to computational cost. Implement an iterative pruning and fine-tuning schedule, starting with
    higher sparsity targets and gradually increasing them while monitoring accuracy. Utilize quantization-aware
    training in conjunction with pruning to ensure the pruned model performs well post-INT8 quantization.
    Explore architecture search (NAS) techniques that favor structured sparsity or efficient designs for
    edge TPUs.
  common_mistake: Applying unstructured pruning directly without considering the Coral's fixed-function
    INT8 pipeline. This often leads to sparse weights that cannot be efficiently mapped to the TPU's dense
    matrix multiplication units, resulting in minimal or even negative speedups despite reduced FLOPs,
    as the host CPU might be burdened with handling sparse operations. Another mistake is failing to retrain/finetune
    sufficiently after pruning, leading to significant accuracy drops.
  napkin_math: Let's assume a convolutional layer contributes significantly to the model's FLOPs. Original
    FLOPs ≈ C_in * C_out * K * K * H_out * W_out. If structured channel pruning reduces C_out by 50%,
    the new FLOPs for that layer would be ≈ C_in * (0.5 * C_out) * K * K * H_out * W_out = 0.5 * Original
    FLOPs. This directly translates to reduced dense operations for the Coral TPU. If the current model
    inference takes 100ms and we need 50ms, we need a 2x speedup. If the model requires 0.2 Giga-ops for
    full inference, and the Coral provides 4 TOPS = 4,000 GOPS, the ideal compute time is 0.2 / 4,000
    = 0.05ms. Actual inference time of 100ms is dominated by memory access, kernel launch overhead, and
    data movement rather than raw compute. Halving the FLOPs to 0.1 Giga-ops reduces the compute-bound
    portion proportionally, but optimizing memory access and operator fusion is equally important to achieve
    the 50ms target.
