title: The Occupancy Grid Map Memory
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'Your autonomous mining truck uses a Jetson AGX Orin (64 GB DRAM, 204.8 GB/s) to build a real-time
  occupancy grid map of its surroundings. The map covers a 200m × 200m area at 10cm resolution, updated
  at 10 Hz from LiDAR. Each cell stores: occupancy probability (1 float = 4 bytes), height (1 float =
  4 bytes), and terrain class (1 byte). Your colleague says ''it''s just a 2D array — memory is trivial.''
  Quantify the actual memory and bandwidth requirements, and identify when the map becomes the system
  bottleneck.'
details:
  realistic_solution: 'Grid dimensions: 200m / 0.1m = 2000 cells per axis. Total cells: 2000 × 2000 =
    **4 million cells**. Per-cell storage: 4 + 4 + 1 = **9 bytes**. Single frame map: 4M × 9 = **36 MB**.'
  common_mistake: '"A 2D grid is simple and cheap." This ignores the update rate, temporal history, and
    bandwidth implications of a high-resolution, high-frequency map.'
  napkin_math: 'Full grid: 4M cells × 9 bytes = 36 MB. With 10-frame history: 360 MB. Random access bandwidth
    amplification: 45 MB/s logical → 320 MB/s physical (7.1× amplification). Cache miss penalty: 50ms/s
    of CPU stall. Sparse representation (10% occupancy): 3.6 MB (fits L2), random access drops to 32 MB/s
    physical. Multi-resolution: 12.2 MB base, 122 MB with history — 66% memory reduction.'
