schema_version: 1
id: edge-0813
title: The CUDA Stream Contention Trap
topic: 3d-parallelism
status: published
provenance: imported
scenario: On a Jetson Orin (2048 CUDA cores, 275 TOPS INT8), you launch two detection models on separate
  CUDA streams expecting them to overlap. Model A uses 1800 cores and Model B uses 1600 cores. You observe
  zero overlap — they run sequentially in 35ms total instead of the expected ~20ms. Explain why and propose
  a fix that achieves at least partial overlap.
details:
  realistic_solution: 'The Orin has 2048 CUDA cores across 16 SMs (128 cores/SM). Model A requests 1800/128
    ≈ 14 SMs. Model B requests 1600/128 ≈ 13 SMs. Combined: 27 SMs needed, but only 16 exist. The GPU
    cannot overlap these kernels. Fix: Use NVIDIA MPS (Multi-Process Service) or redesign with smaller
    models. If you reduce Model A to use ~8 SMs and Model B to ~8 SMs (via TensorRT workspace limits or
    smaller batch sizes), both fit simultaneously. This reduces per-model throughput but the combined
    pipeline throughput improves from 35ms to max(20,18) ≈ 20ms — a 43% improvement.'
  common_mistake: Believing that separate CUDA streams guarantee parallel execution. Streams enable concurrent
    scheduling, but GPU SMs are a finite resource. If two kernels together demand more SMs than available,
    the GPU serializes them.
  napkin_math: 'Orin: 2048 cores / 128 cores per SM = 16 SMs. Model A: 1800 cores → ceil(1800/128) = 15
    SMs. Model B: 1600 cores → ceil(1600/128) = 13 SMs. Total needed: 15+13 = 28 > 16 → serialized. Fix:
    cap each at 8 SMs (1024 cores). Both fit in 16 SMs. Overlap achieved. Serial time: 35ms. Overlapped
    time ≈ 20ms. Speedup = 35/20 = 1.75×.'
