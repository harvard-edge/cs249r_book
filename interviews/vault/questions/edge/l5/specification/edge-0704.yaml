id: edge-0704
title: The Adaptive Model Diet
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your edge device for real-time video analytics needs to dynamically adapt its ML model performance
  based on available power, thermal limits, and real-time workload (e.g., number of objects to detect,
  scene complexity). You have a base model, but also several optimized variants (e.g., pruned, quantized
  to different precisions, smaller architectures). How do you design a runtime system that intelligently
  switches between these model variants, or even dynamically optimizes the model, to meet varying latency/throughput
  targets and power budgets without human intervention?
details:
  realistic_solution: "An adaptive, feedback-driven runtime optimization system:\n  1.  **Model Zoo &\
    \ Performance Profiles:** Maintain a \"model zoo\" of pre-optimized model variants (e.g., different\
    \ pruning ratios, INT8/FP16/FP32 versions, smaller/larger architectures). Each variant is thoroughly\
    \ profiled on the target hardware across different compute units (CPU, NPU, GPU) for latency, throughput,\
    \ power consumption, and accuracy.\n  2.  **Runtime Resource Monitoring:** Continuously monitor key\
    \ system metrics including compute utilization, memory bandwidth, thermal sensors, and power consumption.\n\
    \  3.  **Performance & Power Controller:** A central control module that continuously evaluates the\
    \ current system state against defined Service Level Objectives (SLOs) for latency, throughput, and\
    \ power budget.\n  4.  **Adaptive Decision Logic:** Rule-based thresholds or a lightweight RL agent\
    \ selects the optimal model variant from the zoo based on current resource availability.\n  5.  **Dynamic\
    \ Model Switching:** Efficient model loading with pre-loaded hot variants and smooth context switching\
    \ to avoid disrupting ongoing tasks."
  common_mistake: '"Preselect one model and stick with it." This fails to adapt to dynamic conditions,
    leading to either wasted resources or missed performance targets when conditions change.'
  napkin_math: A base FP32 model might take 100ms and consume 5W — this runs at 10 FPS, already below
    a 15 FPS input stream. Its INT8 variant might take 10ms and consume 0.5W (handles both 15 FPS and
    30 FPS). A smaller, less accurate INT8 variant might take 5ms and 0.2W. If the input frame rate doubles
    from 15 FPS to 30 FPS, only models with ≤33ms latency can keep up. The system would switch to the
    10ms INT8 model. If power drops from 5W to 0.3W, it would switch to the 5ms/0.2W model, accepting
    a minor accuracy drop to maintain operation. Switching overhead should be <10ms.
