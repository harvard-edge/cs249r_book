id: edge-0085
title: The Solar Panel Degradation Power Crunch
topic: power-budgeting
status: published
provenance: imported
scenario: Your remote environmental monitoring network has 800 solar-powered stations, each running a
  Coral Dev Board Mini (Edge TPU, 3W inference, 0.5W idle) with a 20W solar panel and a 50 Wh LiFePO4
  battery. The system was designed for 24/7 operation with 4 hours of daily sunlight (winter minimum).
  After 3 years, 120 stations (15%) in the sunniest locations are experiencing daily brownouts — shutting
  down for 2–4 hours before dawn. The batteries test fine. What's failing, and how do you redesign the
  power budget for a 10-year deployment?
details:
  realistic_solution: 'The solar panels are degrading faster than the spec sheet claims — but only in
    the sunniest locations. Standard polycrystalline panels degrade at ~0.5%/year under normal conditions,
    but panels in high-UV, high-temperature environments (desert, tropical) experience light-induced degradation
    (LID) and potential-induced degradation (PID) at 2–3%/year. After 3 years at 2.5%/year: the 20W panel
    now produces 20 × (1 - 0.075) = 18.5W peak.'
  common_mistake: '"The batteries are degrading." LiFePO4 batteries retain >80% capacity after 2,000 cycles.
    At 1 cycle/day × 3 years = 1,095 cycles — well within spec. The batteries test at 92% capacity.'
  napkin_math: '20W panel at year 0: 68 Wh/day. Year 3 (2.5%/yr degradation): 62.9 Wh. Year 5: 58.5 Wh
    — barely above 57 Wh consumption. Year 7: 54.3 Wh — daily deficit even in good sun. 28W panel at year
    10: 28 × 0.75 × 4 × 0.85 = 71.4 Wh — 25% margin remaining. Cost of 28W vs 20W panel: 15 × 800 = 12,000.
    Cost of 120 field visits to diagnose brownouts: 120 × 300 = 36,000. The 12,000 upfront investment
    prevents 36,000+ in field service costs.'
