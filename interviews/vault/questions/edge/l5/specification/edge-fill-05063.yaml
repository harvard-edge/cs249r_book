schema_version: 1
id: edge-fill-05063
title: Real-Time Inference Pipeline Specification for Autonomous Drone on Jetson Orin
topic: batching-strategies
status: published
provenance: imported
scenario: 'Design a real-time inference pipeline for an autonomous delivery drone using Jetson Orin NX
  (60W MODE). The pipeline must: (1) detect obstacles at 60fps (depth camera, 640×480), (2) run semantic
  segmentation at 10fps (for path planning), (3) run localization network at 100Hz. All within 60W TGP.
  Specify compute allocation.'
details:
  realistic_solution: 'Jetson Orin NX resources: GPU (2 Ampere SMs), DLA (2×64 TOPS), PVA (vision accelerator).
    Obstacle detection 60fps: YOLOv8-n (4ms GPU) = 60×4ms = 24ms/s = 24% GPU. Use DLA instead: ~2ms/frame
    on DLA, freeing GPU. Semantic segmentation 10fps: DeepLabV3+ (20ms GPU) = 10×20ms = 200ms/s but only
    200ms needed per second = 20% GPU time. Localization 100Hz: lightweight CNN (1ms GPU) = 100×1ms =
    100ms/s = 10% GPU. Total GPU: 10+20=30% (detection on DLA). GPU budget: 60W × 0.3 = 18W. DLA for detection:
    5W. System: 18+5+10(CPU+system) = 33W — well within 60W. Reserve 27W headroom for burst workloads.'
  common_mistake: Allocating GPU to all tasks simultaneously without using the DLA for the highest-frequency,
    simpler tasks; the Ethos-equivalent DLA on Jetson can handle simple detection at low power.
  napkin_math: 'Detection (DLA): 2ms/frame × 60fps = 5W DLA. Segmentation (GPU): 20ms × 10fps = 200ms/s
    GPU = 20% × 25W GPU = 5W. Localization (GPU): 1ms × 100Hz = 100ms/s = 10% × 25W = 2.5W. System: 10W.
    Total: 5+5+2.5+10 = 22.5W << 60W. Pipeline fits with significant headroom.'
