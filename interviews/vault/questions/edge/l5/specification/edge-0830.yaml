id: edge-0830
title: Latent vs. Raw Experience Replay Trade-offs
topic: vram-budgeting
status: published
provenance: imported
scenario: You are designing an on-device personalization pipeline for a smartwatch health monitor (Cortex-M4,
  256KB SRAM, 4MB Flash). To mitigate catastrophic forgetting of baseline physiological patterns during
  continuous local learning, you must implement an experience replay buffer using a strict 1MB Flash allocation.
  Evaluate the trade-offs between storing raw sensor windows (2KB per window) versus Latent Experience
  Replay (storing 256-byte intermediate feature embeddings from a frozen lower network). Justify your
  design considering buffer diversity, compute overhead during the replay forward pass, and Flash memory
  wear-leveling limits.
details:
  realistic_solution: Adopt Latent Experience Replay by freezing the lower convolutional layers of the
    network and storing 256-byte intermediate embeddings. This maximizes buffer diversity, eliminates
    the need to recompute lower-layer activations during interleaved updates, and significantly reduces
    Flash write amplification.
  common_mistake: Defaulting to raw data replay, which severely restricts buffer capacity on limited Flash
    and increases compute energy, or choosing latent replay without realizing the lower layers acting
    as the feature extractor must remain permanently frozen.
  napkin_math: 'Budget: 1MB. Raw Replay Capacity: 1,000,000 B / 2,000 B = 500 samples. Latent Replay Capacity:
    1,000,000 B / 256 B = 3,906 samples (7.8x more diversity). Compute savings: Freezing the first 3 layers
    (which typically account for ~60% of MACs in mobile 1D-CNNs) saves ~60% of the forward-pass compute
    energy for every replayed sample during local SGD steps.'
