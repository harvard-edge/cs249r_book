schema_version: 1
id: edge-sus-63017
title: Impact Assessment for Autonomous Medical Triage on Edge
topic: responsible-ai
status: published
provenance: imported
scenario: A hospital system is deploying an ML triage assistant on Jetson Orin devices in emergency waiting
  rooms. The model classifies patient urgency (1-5 scale) based on vital signs and symptom text. Before
  deployment, you must conduct an AI impact assessment. Define the required components of this assessment
  and the specific quantitative thresholds that must be met.
details:
  realistic_solution: 'Required impact assessment components: (1) Failure mode analysis: enumerate failure
    modes (misclassification by urgency level) and their clinical consequences. Map each error type to
    harm severity (false low urgency = potential death; false high urgency = resource waste). (2) Quantitative
    safety thresholds: sensitivity for true urgency-5 cases ≥ 99.5% (missed critical patient), specificity
    ≥ 85%. Evaluated on prospective hold-out from deployment hospital (not external dataset). (3) Subgroup
    performance audit: evaluate by age, sex, language, ethnicity at each urgency level. Maximum performance
    gap: ≤3pp sensitivity across demographic groups for urgency 4-5. (4) Distribution shift plan: define
    the feature drift detection threshold that triggers human-override mode (no autonomous classification
    until model is re-evaluated). Use a D-statistic threshold based on 90-day training distribution. (5)
    Human oversight requirements: model serves as decision support, not autonomous decision-maker. All
    urgency-5 classifications require nurse confirmation before acting.'
  common_mistake: Treating the impact assessment as a documentation exercise rather than a quantitative
    risk evaluation. Listing potential harms without specifying measurement methods and acceptance thresholds
    provides no actionable safety guarantee.
  napkin_math: 'Minimum test set for 99.5% sensitivity validation: at 95% CI with true sensitivity 99.5%,
    margin ±0.5pp: n = z²·p(1-p)/e² = (1.96)²·0.995·0.005/(0.005)² = 3.84·0.004975/0.000025 = 764 urgency-5
    cases minimum. Annual ED volume for typical hospital: 50K visits/year, urgency-5 rate ≈ 5% = 2,500
    cases/year. 764 cases = 4 months of prospective data at minimum before deployment. Subgroup analysis:
    764 × 6 demographic cells minimum = 4,584 urgency-5 cases for intersectional audit — 2 years of data.
    External validation dataset required.'
