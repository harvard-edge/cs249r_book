schema_version: 1
id: edge-cell-13134
title: 'Edge TCO Specification: Design Lifecycle Cost Model for 5-Year Edge Fleet'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Specify a complete 5-year lifecycle cost model for a 100-unit edge fleet of Jetson Orin devices
  ($499, 60W) for industrial automation. Include: Year 0 deployment, Year 1-3 steady operation, Year 3
  model refresh (engineering: $30K), Year 4-5 hardware migration to next-gen (assume 50% cost of current).
  Structure as NPV analysis at 8% discount rate.'
details:
  realistic_solution: 'Power: 100 × 60W × 8760hr × $0.10/1000 = $5,256/yr (not $52,560).'
  common_mistake: Not discounting future costs to present value when comparing options across multiple
    years, making the comparison invalid (a $100K cost in Year 5 is worth only $68K in today's money at
    8% discount).
  napkin_math: 'Annual fleet power: 100 devices × 60W × 8760hr × $0.10/kWh / 1000 = $5,256/yr (not $52,560
    which omits /1000).'
last_modified: '2026-04-01'
