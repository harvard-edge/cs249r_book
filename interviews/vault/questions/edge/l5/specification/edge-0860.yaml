id: edge-0860
title: SRAM Sizing vs Off-Chip DRAM Power
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are architecting a custom edge Vision Processing Unit (VPU) for a battery-powered security
  camera running at 30 fps. The primary model has 2MB of weights and requires 2MB for peak activations.
  You must choose between two memory architectures: Option A uses 4MB of on-chip SRAM to store both weights
  and activations. Option B uses 2MB of on-chip SRAM for activations and streams the 2MB of weights from
  off-chip LPDDR4 per frame. On-chip SRAM costs $0.50 per MB in silicon area. Off-chip DRAM access consumes
  100pJ/bit. Evaluate the trade-off between silicon cost and power consumption, and justify your design
  choice.'
details:
  realistic_solution: Choose Option A (4MB SRAM). The $1.00 extra silicon cost is justified because it
    eliminates continuous weight-streaming DRAM access, saving 48mW of power, which is critical for battery-operated
    edge devices.
  common_mistake: Focusing purely on the one-time BOM savings of Option B without quantifying the continuous
    active power penalty of streaming weights from DRAM, which severely degrades battery life.
  napkin_math: 'Option B DRAM throughput: 2MB/frame * 30 fps = 60 MB/s. Power: 60 MB/s * 8 bits/byte *
    100 pJ/bit = 48,000,000,000 pJ/s = 48 mW. A continuous 48 mW draw reduces a typical 10Wh battery''s
    lifespan by days, far outweighing a $1.00 hardware savings.'
