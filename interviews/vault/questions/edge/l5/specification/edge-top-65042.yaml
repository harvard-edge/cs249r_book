schema_version: 1
id: edge-top-65042
title: Federated LoRA Aggregation for Edge Fleet Personalization
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A fleet of industrial edge devices each fine-tune local LoRA adapters on device-specific sensor
  data. The central server wants to aggregate these into a global adapter without transmitting raw data.
  Design a federated averaging protocol for LoRA.
details:
  realistic_solution: 'Federated LoRA aggregation: (1) Correct aggregation: compute delta_W_i = B_i *
    A_i for each client, then average: delta_W_global = mean(delta_W_i). Decompose back via SVD to get
    global B_global, A_global for re-distribution. Problem: delta_W is d × d = 16MB per layer for re-transmission.
    (2) Communication-efficient: transmit only B_i and A_i (r*d = 64KB per matrix per layer) and compute
    the product server-side. Server computes delta_W_global = mean(B_i * A_i), then factorizes via truncated
    SVD. (3) Add differential privacy: clip client updates to L2 norm 1.0 and add Gaussian noise sigma=0.1
    before uploading B_i, A_i. (4) Weighted aggregation: weight by dataset size n_i: delta_W_global =
    sum(n_i * B_i * A_i) / sum(n_i).'
  common_mistake: Applying standard FedAvg (averaging all model parameters) to LoRA adapters without considering
    that the A and B matrices should not be averaged independently. Averaging A matrices across clients
    and B matrices separately gives a different result than averaging the full delta_W = B*A due to the
    nonlinearity of the composition.
  napkin_math: '100 edge devices, r=8, 32 layers, Q+V matrices: upload per device = 4 matrices * 32 layers
    * 2 * 8 * 4096 * 2B = 16.8MB. At 10 Mbps uplink: 13.4 seconds per device. 100 devices parallel: 13.4
    seconds. Server computation: compute B_i*A_i for 100 devices: 100 * 32 * 4 * 8 * 4096 * 4096 FLOP
    = 1.72 TFLOP = 0.0017 seconds on H100. Distribution back: 16.8MB * 100 devices = 1.68GB at 1 Gbps
    = 13.4 seconds. Total round: ~30 seconds.'
