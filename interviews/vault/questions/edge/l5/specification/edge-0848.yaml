id: edge-0848
title: Evaluating On-Device Adaptation Strategies for Mobile Keyboards
topic: vram-budgeting
status: published
provenance: imported
scenario: You are designing the on-device learning strategy for a smart keyboard on a mobile device (8GB
  RAM, but background processes are strictly limited to 256MB RAM and 10 minutes of execution per night).
  The goal is to adapt a 100M parameter language model to the user's specific vocabulary without sending
  data to the cloud. Evaluate the trade-offs between full fine-tuning, Parameter-Efficient Fine-Tuning
  (LoRA), and local retrieval-augmented generation (dynamic n-gram cache) focusing on memory constraints
  and computational limits.
details:
  realistic_solution: Full fine-tuning will OOM the 256MB limit. A local dynamic cache (RAG-lite) requires
    no backprop and uses <50MB RAM, making it the most robust for pure vocabulary additions. If deep semantic
    adaptation is required, LoRA with a quantized base model (INT8) and a strictly limited batch size
    keeps total memory under 150MB.
  common_mistake: Candidates often propose full fine-tuning without calculating optimizer state memory,
    or propose LoRA without realizing that backward pass activations must still be stored, potentially
    breaching the 256MB background process limit if batch sizes are unconstrained.
  napkin_math: 100M params in INT8 = 100MB. Full fine-tuning with Adam (FP32 states) = 100M * 4 bytes
    * (1 grad + 2 moments) = 1.2GB (OOM). LoRA (rank 8, ~100K params) = 100K * 4 * 3 = 1.2MB for optimizer
    states. Activation memory (seq=64, batch=16, 12 layers, 256 hidden, FP16) = 16 * 64 * 12 * 256 * 2
    bytes = ~6.2MB. Total LoRA memory = 100MB (weights) + 1.2MB (states) + 6.2MB (activations) ≈ 107MB,
    fitting within the 256MB constraint.
