schema_version: 1
id: edge-0028
title: The ROS 2 IPC Overhead
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You build an autonomous driving stack using ROS 2. Node A (Camera Driver) captures a 4K frame
  and publishes it. Node B (ML Perception) subscribes to the frame, runs inference, and publishes bounding
  boxes. The ML inference takes 20ms. However, the end-to-end latency from Node A to Node B is 55ms. What
  is ROS 2 doing that costs 35ms, and how do you fix it?
details:
  realistic_solution: 'The extra 35ms comes from ROS 2''s default DDS-based inter-process communication.
    Node A serializes the 24.8 MB image (CDR serialization: ~15ms on ARM), copies it to shared memory
    or the DDS transport layer (~5ms), Node B deserializes it (~13ms), plus DDS discovery and QoS overhead
    (~2ms). The fix: use ROS 2 Intra-Process Communication (zero-copy) by putting both nodes in a single
    process as composable nodes, or use the `ros2_shared_memory` transport. Zero-copy eliminates serialization
    entirely, reducing the 35ms overhead to under 1ms by passing a pointer instead of copying 50MB of
    data.'
  common_mistake: '"ROS 2 is built on DDS which uses UDP, so the network is slow." If both nodes are on
    the same machine, UDP loopback isn''t the primary bottleneck. The issue is memory copying.'
  napkin_math: 4K Image = `3840 * 2160 * 3 = 24.8 MB`. Two memory copies = 50 MB of traffic. On a Jetson
    Nano (25 GB/s bandwidth), just moving the memory takes ~2ms. The serialization/deserialization CPU
    overhead takes the other 33ms.
