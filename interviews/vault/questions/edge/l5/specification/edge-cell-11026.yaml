id: edge-cell-11026
title: 'Dataset Curation: Specify Data Quality Requirements for Safety-Critical Edge Deployment'
topic: dataset-curation
status: published
provenance: imported
scenario: You are writing the data quality specification for a pedestrian detection model deployed on
  Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) in autonomous forklifts. The system must achieve < 0.1% miss
  rate (false negative) on pedestrians. Define quantitative data quality SLAs for the training dataset.
details:
  realistic_solution: 'Safety-critical systems require: (1) Class balance SLA: pedestrian class >= 15%
    of all instances. (2) Scenario coverage: >= 500 examples each of night/low-light, partial occlusion,
    motion blur. (3) Label quality: >= 3 annotators, IoU >= 0.9 inter-annotator agreement. (4) Data freshness:
    no images > 24 months old.'
  common_mistake: Specifying only accuracy metrics without specifying data quality metrics that ensure
    coverage of rare-but-critical scenarios (e.g., low-light, partial occlusion).
  napkin_math: 'Target: 0.1% miss rate. Rare scenario coverage: miss rate on low-light typically 3× baseline.
    Need 3× more low-light samples. If baseline recall 99.9% needs 10K images, low-light needs 30K images.
    Label agreement: Fleiss κ >= 0.85 for safety applications. Annotation cost: 100K total images × 3
    annotators × $1.50/bbox = $450K. Dataset size: 100K training images with 5 bboxes/image avg = 500K
    bounding boxes. Storage: 100K × 1MB = 100GB. Audit: monthly stratified sample of 1K images reviewed
    by expert annotators.'
