title: Smartwatch Gesture Personalization
topic: vram-budgeting
status: published
provenance: imported
scenario: You are designing an on-device personalization system for a smartwatch gesture recognition model.
  The base model is a 5M parameter MobileNet-based CNN. The smartwatch OS restricts background ML training
  tasks to a strict 10MB memory budget. User data cannot leave the device. Evaluate the architectural
  trade-offs between full-network fine-tuning and using a localized personalization layer (freezing the
  backbone and training only the final 50K-parameter head). Justify your selection based on memory constraints.
details:
  realistic_solution: Implement a personalization layer architecture. By freezing the MobileNet backbone,
    it runs in standard inference mode, meaning intermediate activations are discarded immediately. Only
    the final layer's input activations and gradients are cached.
  common_mistake: Assuming the primary bottleneck for on-device training is compute (FLOPs) rather than
    the memory required to store intermediate activations during the forward pass for backpropagation.
  napkin_math: 'Full fine-tuning (Batch Size=16): 5M params = 20MB. Activations ~ 10MB/sample * 16 = 160MB.
    Total = 180MB (Fails 10MB budget). Personalization Layer: Frozen backbone peak inference memory ~
    2MB. Final layer input (1024-dim): 1024 * 4B * 16 = 65.5KB. Gradients/Optimizer for 50K params: ~800KB.
    Total peak memory < 3MB. Fits well within the 10MB budget.'
