id: edge-0599
title: The Sparse Model Fallacy
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is developing a perception model for an autonomous vehicle using the Jetson AGX Orin
  platform. You're trying to choose between two CNN architectures to minimize latency and power draw.
  Model A is a dense, monolithic architecture. Model B is a new, 'sparse' architecture using depthwise-separable
  convolutions that has 20% fewer MACs but many more small, sequential layers. Your team lead argues for
  Model B, stating, 'Fewer MACs means fewer operations, which must lead to lower latency and better TOPS/W.'
  Evaluate this assertion. Why might the team lead's prediction be catastrophically wrong, causing Model
  B to have *higher* latency and *worse* power efficiency in production?
details:
  realistic_solution: 'The team lead''s assertion is likely wrong because it ignores a critical factor:
    Arithmetic Intensity (AI). The Jetson AGX Orin, like most modern accelerators, has a very high ratio
    of peak compute to memory bandwidth. This means it needs a high number of operations per byte of data
    moved from memory to stay efficient (i.e., it has a high ''ridge point'' on the roofline model).'
  common_mistake: Focusing exclusively on the peak theoretical TOPS of the hardware or the total MAC count
    of the model. This is a common fallacy that treats hardware as a simple multiplier and ignores the
    physics of data movement. Engineers often forget that if you can't feed the compute units, their peak
    performance is irrelevant.
  napkin_math: 'Jetson Orin provides 204.8 GB/s BW and 275 TOPS. Arithmetic Intensity (AI) ridge point
    = 275 TOPS / 204.8 GB/s = 1342 ops/byte. Model A (dense) has AI = 2000, so it''s compute-bound: a
    100 GOP layer takes 100G / 275T = 0.36ms. Model B (depthwise) has AI = 100, so it''s memory-bound:
    100G / 100 = 1GB data. Loading 1GB takes 1GB / 204.8GB/s = 4.88ms. Model A wins on latency despite
    same FLOPs!'
