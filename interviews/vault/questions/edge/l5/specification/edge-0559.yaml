id: edge-0559
title: The Dataflow vs GPU Roofline
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is choosing between a Hailo-8 (26 TOPS, 2.5W, dataflow architecture) and a Jetson
  Orin NX (100 TOPS, 15W, GPU architecture) for a drone running YOLOv8-S. The Orin has 4× the TOPS. But
  in your benchmarks, the Hailo runs the model at 28 FPS while the Orin only hits 35 FPS. Why is the 4×
  TOPS advantage only yielding a 1.25× speedup?
details:
  realistic_solution: 'The Hailo-8 is a dataflow architecture — it maps the entire model graph onto a
    spatial pipeline of physical compute units. Activations flow between stages through on-chip buffers
    without ever touching external DRAM. The Orin NX is a GPU — it executes layers sequentially, reading
    weights and activations from LPDDR5 between each layer. For YOLOv8-S (arithmetic intensity ~516 Ops/Byte),
    the Orin is memory-bandwidth bound: its 102.4 GB/s LPDDR5 limits effective throughput to ~50 TOPS.
    The Hailo eliminates the DRAM bottleneck entirely, so its 26 TOPS are nearly fully utilized. Effective
    throughput: Hailo ~24 TOPS (92%) vs Orin ~35 TOPS (35%). The dataflow architecture changes the shape
    of the roofline itself — there is no memory wall.'
  common_mistake: '"The Orin''s drivers aren''t optimized yet" or "The Hailo benchmark is wrong." Both
    dodge the architectural explanation.'
  napkin_math: 'Hailo-8: 26 TOPS peak, ~92% utilization (no DRAM stalls) = 24 TOPS effective. Per-frame:
    28.4 GFLOPs / 24 TOPS = 1.18ms → ~28 FPS with overhead. Orin NX: 100 TOPS peak, bandwidth-limited
    to ~50 TOPS, 35% utilization = 35 TOPS effective. Per-frame: 28.4G / 35T = 0.81ms compute + ~28ms
    memory stalls → ~35 FPS. Power: Hailo at 2.5W = 11.2 FPS/W. Orin at 15W = 2.3 FPS/W. The Hailo is
    **4.9× more power-efficient** for this workload.'
