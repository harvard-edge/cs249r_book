schema_version: 1
id: edge-0027
title: The USB Bandwidth Saturation
topic: real-time-deadlines
status: published
provenance: imported
scenario: You build an edge AI system using a Raspberry Pi 4. You attach three 1080p USB 3.0 webcams to
  run parallel inference. A single webcam runs at 30 FPS perfectly. When you plug in all three, the framerates
  randomly drop to 12 FPS, and the video feeds occasionally tear or corrupt. The CPU usage is only 40%.
  What physical limitation are you hitting?
details:
  realistic_solution: 'You saturated the Raspberry Pi 4''s internal PCIe x1 lane that connects the USB
    3.0 host controller to the SoC. Each 1080p YUYV camera at 30 FPS requires ~124 MB/s of bandwidth.
    Three cameras need 373 MB/s, but all three USB 3.0 ports share a single PCIe Gen 2 x1 lane (~400 MB/s
    after protocol overhead). With three cameras, the bus is at ~93% capacity, causing frame drops and
    tearing when any burst exceeds the limit. The fix: use MJPEG compression on the cameras (reduces bandwidth
    10x), or use a USB hub with a separate host controller on a different bus, or switch to a platform
    with more PCIe lanes.'
  common_mistake: '"The USB 3.0 ports are too slow." A single USB 3.0 port has 5 Gbps, which is plenty.
    The problem is the internal routing.'
  napkin_math: A 1080p webcam streaming uncompressed YUYV (2 bytes/pixel) generates 1920 * 1080 * 2 =
    4.14 MB per frame. At 30 FPS, one camera outputs 124.4 MB/s. Three cameras simultaneously output 373.2
    MB/s. On a Raspberry Pi 4, all USB 3.0 ports share a single internal PCIe Gen 2.0 x1 lane. This lane
    has a practical bandwidth limit of ~400 MB/s. 373.2 MB/s + USB protocol overhead severely saturates
    the bus.
