id: edge-0843
title: Mitigating Client Drift in Federated Recommendation
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You are designing a Federated Learning system to train an on-device recommendation model (15MB
  parameters) across 50 million smartphones. You sample 5,000 devices per round over cellular networks
  (averaging 2MB/s upload bandwidth). The local data is heavily Non-IID: users in different demographics
  interact with completely disjoint sets of items (feature and label skew), and engagement varies wildly
  from 5 to 500 interactions per day (quantity skew). Using standard FedAvg with 5 local epochs, you observe
  that the global model''s loss oscillates wildly and fails to converge after 1,000 communication rounds.
  Evaluate the trade-offs of architectural and algorithmic interventions to stabilize training convergence
  under these extreme non-IID conditions.'
details:
  realistic_solution: Introduce a proximal regularization term (FedProx) to dynamically bound the local
    updates from the global model, or use control variates (SCAFFOLD) to correct the update directions.
    Given the bandwidth constraints, FedProx is preferable as it requires zero additional communication
    overhead, unlike SCAFFOLD which doubles the payload size.
  common_mistake: Assuming that increasing local training epochs ($E=10+$) or increasing the local learning
    rate will help devices learn their sparse local distributions better. Under extreme non-IID conditions,
    this rapidly exacerbates 'client drift', causing local models to overfit to disjoint parameter spaces
    so that their subsequent averaging destroys the model's performance.
  napkin_math: Under standard FedAvg, weight divergence scales with local epochs $E$. For a 15MB model
    over a 2MB/s link, the base upload takes 7.5 seconds. If we evaluate SCAFFOLD to correct drift, it
    requires sending client control variates alongside the weights, doubling the payload to 30MB and the
    upload time to 15s, significantly increasing the client dropout rate due to cellular timeouts. FedProx
    keeps the payload at 15MB (7.5s) while adding a local penalty $\frac{\mu}{2}||w - w^t||^2$ that restricts
    local divergence, stabilizing the global aggregation at the acceptable trade-off of requiring roughly
    20-30% more global rounds to reach the target accuracy.
