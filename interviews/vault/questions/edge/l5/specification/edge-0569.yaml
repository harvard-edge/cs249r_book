id: edge-0569
title: The Early vs Late Fusion Trade-off
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your autonomous vehicle has a camera and a LiDAR. You need to detect and localize objects in
  3D. Your team is debating two architectures: early fusion (concatenate raw camera pixels + LiDAR points,
  feed to one model) vs late fusion (run separate camera and LiDAR detectors, merge results). What are
  the system-level trade-offs, and which do you recommend for a Jetson Orin deployment?'
details:
  realistic_solution: 'Recommend late fusion for the Jetson Orin deployment. Late fusion runs camera YOLO
    (18ms on GPU) and LiDAR PointPillars (12ms on DLA) in parallel, completing in 18ms — 2.5x faster than
    early fusion''s 45ms on GPU alone. The 2.8 NDS accuracy gap (72.9 vs 70.1 on nuScenes) is modest.
    Late fusion also provides: graceful degradation (if LiDAR fails, camera still works), independent
    model updates (retrain one without affecting the other), and full utilization of the Orin''s heterogeneous
    compute (GPU + DLA simultaneously). Early fusion only wins when accuracy requirements are extremely
    tight and latency budget is generous.'
  common_mistake: '"Early fusion is always better because the model sees all the data." This ignores the
    computational and engineering costs.'
  napkin_math: 'Early fusion (BEVFusion): ~120 GFLOPs, 45ms on Orin GPU. Late fusion: Camera YOLO (28
    GFLOPs, 18ms GPU) + LiDAR PointPillars (18 GFLOPs, 12ms DLA) = 18ms parallel. Speedup: 2.5×. Accuracy:
    early fusion 72.9 NDS on nuScenes, late fusion ~70.1 NDS. The 2.8 NDS gap costs 2.5× the compute.'
