id: edge-0778
title: The Polyglot Fleet
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your company operates a fleet of 20,000 edge AI gateways, comprising three generations of hardware
  (e.g., NVIDIA Jetson Xavier, Orin Nano, and a custom NXP i.MX8M board). Each generation has different
  compute capabilities, memory, and supported ML accelerators/runtimes. How do you efficiently build,
  test, and deploy ML models across this heterogeneous fleet?
details:
  realistic_solution: "Implement a robust, automated CI/CD pipeline that embraces heterogeneity:\n  1.\
    \  **Device Profiling & Tagging:** Devices should report their hardware specifications (chipset, accelerator\
    \ type, memory), OS version, and installed ML runtime versions. This information is used to tag devices\
    \ in the fleet management system (e.g., `hw:jetson-orin-nano`, `os:yokto-3.1`, `runtime:tensorrt-8.5`).\n\
    \  2.  **Model Optimization Pipeline with Target-Specific Artifacts:** The CI/CD system should generate\
    \ and optimize *multiple model variants* from a single source model. For example, a PyTorch model\
    \ is converted to ONNX, then compiled for:\n      *   NVIDIA: TensorRT (FP16/INT8)\n      *   NXP:\
    \ TFLite (INT8) or proprietary NPU SDK format\n      Each variant is a distinct artifact, tagged with\
    \ its compatible hardware/software profile.\n  3.  **Centralized Model Registry:** Store all model\
    \ variants, their metadata (target profile, performance benchmarks, size, checksums), and versioning\
    \ information in a central registry.\n  4.  **Targeted Deployment:** When a device requests a model\
    \ update, the fleet management system uses the device's profile to select and deliver the *most suitable*\
    \ model variant. This ensures optimal performance and compatibility.\n  5.  **Automated Cross-Platform\
    \ Testing:** Implement automated integration tests on actual hardware (or emulators/simulators) for\
    \ each critical model variant. This catches performance regressions or compatibility issues before\
    \ broad deployment."
  common_mistake: '"Build one universal model and hope it runs everywhere." This leads to suboptimal performance,
    compatibility issues, or even complete failure on specific hardware targets, wasting resources and
    engineering time.'
  napkin_math: If a single base model requires 3 hardware targets and 2 quantization options, that implies
    6 unique model artifacts to build and test. Manually managing this for 20,000 devices is infeasible.
    Automated build and test on a representative set of devices for each variant is critical.
