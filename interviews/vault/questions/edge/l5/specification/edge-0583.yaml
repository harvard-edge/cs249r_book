id: edge-0583
title: The Perception Pipeline Fusion Fallacy
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your autonomous vehicle perception team is working to hit a strict 33ms per-frame deadline
  on a power-budgeted Jetson AGX Orin platform (60W). Currently, the pipeline runs two separate INT8-quantized
  models sequentially: a 5 TFLOP object detector and an 8 TFLOP segmentation model, taking a combined
  47ms. A teammate proposes fusing these into a single, multi-headed model. The fused model has a shared
  backbone, reducing the total compute to 11 TFLOPs. They argue this will save ~15% of FLOPs and should
  easily get you under the 33ms deadline. Evaluate this proposal. Under what conditions could this optimization
  paradoxically increase end-to-end latency and cause you to miss the deadline even more severely?'
details:
  realistic_solution: The proposal is extremely risky because it fundamentally changes the problem's Arithmetic
    Intensity (AI). While the sequential models are small enough to be compute-bound, the fused model's
    large, combined activation memory footprint can push it over the edge into being memory-bound.
  common_mistake: Focusing only on FLOPs. The common mistake is to assume that a reduction in total operations
    automatically translates to lower latency. Engineers making this mistake will agree with the proposal,
    arguing that '11 TFLOPs is faster than 13 TFLOPs, so latency must go down.' This completely ignores
    the memory system, which is often the real bottleneck on edge devices.
  napkin_math: Total compute = 13 TFLOPs -> INT8 ~26 TOPS. Orin memory bandwidth = 204.8 GB/s. Fusing
    creates a massive 300MB intermediate tensor that must be read/written simultaneously. Memory traffic
    = 600MB. Time = 600MB / 204.8 GB/s = 2.9ms just for the bottleneck, shifting AI down to 400 Ops/Byte
    and causing memory stalling.
