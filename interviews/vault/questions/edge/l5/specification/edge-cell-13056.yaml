schema_version: 1
id: edge-cell-13056
title: 'Edge Queueing Theory Specification: Multi-Tenant Edge Inference SLO'
topic: queueing-theory
status: published
provenance: imported
scenario: 'Specify SLOs and queuing policies for a shared Jetson Orin (275 TOPS INT8, 60W) serving 3 tenants:
  Tenant A (safety-critical, 20 req/s, P99<10ms), Tenant B (analytics, 50 req/s, P99<100ms), Tenant C
  (background training jobs, 5 req/s, P99<5000ms). Total λ=75 req/s. Assign priority levels and quantify
  queue wait for each class.'
details:
  realistic_solution: 'Three-level priority: A=high, B=medium, C=low. Preemptive priority scheduling.
    Per-class service times: A=5ms, B=8ms, C=100ms. μ_A=200/s, μ_B=125/s, μ_C=10/s. ρ_A=20/200=0.1, ρ_B=50/125=0.4,
    ρ_C=5/10=0.5. Total ρ=0.1+0.4+0.5=1.0 — exactly at capacity! Need to reduce C to 4/s: ρ_C=0.4, total=0.9.
    Priority analysis: A sees only own class → Wq_A=ρ_A/(μ_A(1-ρ_A))=0.1/(200*0.9)=0.56ms, P99_A=2.6ms
    ✓. B sees A+B: Wq_B=ρ_B/(μ_B(1-ρ_A-ρ_B))=0.4/(125*0.5)=6.4ms, P99_B=66ms ✓. C: residual capacity,
    Wq_C=large, P99_C=3000ms ✓.'
  common_mistake: Using a single FIFO queue for all tenants, causing safety-critical Tenant A to be blocked
    behind Tenant B's 50 req/s workload and violating its P99<10ms SLO.
  napkin_math: 'ρ_A=0.1, ρ_B=0.4, ρ_C=0.4 (reduced). Total=0.9. Priority queuing (preemptive): Wq_A=ρ_A/(μ_A*(1-ρ_A))=0.1/(200*0.9)=0.556ms.
    P99_A=4.6*(0.556+5)ms=25.6ms. Hmm, exceeds 10ms SLO. Need lower ρ_A: use 2 dedicated cores for A.
    With dedicated resource: ρ_A=0.1, W_A=5ms*1.11=5.56ms, P99=25.6ms still over. Need service time <
    2ms for P99<10ms. Model A must be faster: 1ms service → P99=4.6*1.11=5.1ms ✓. Or use NVDLA dedicated
    engine for A.'
