id: edge-cell-13133
title: 'Edge TCO Specification: Design $50K Budget Deployment for Smart Building'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design a complete edge AI deployment for a 10-floor office building with a $50K 3-year budget.
  Requirements: 30 FPS occupancy detection on 50 cameras, energy management integration (inference needed
  for HVAC control), P99 < 100ms. Specify hardware, connectivity, software, and verify against budget.
  Hardware options: Jetson Orin ($499), Hailo-8+Pi5 ($280), Coral+Pi4 ($60).'
details:
  realistic_solution: 'Model needs: 30 FPS * 50 cameras = 1500 FPS. Single Hailo-8: 200 FPS (BW-limited).
    Need 8 Hailo-8 units. Use 2 Jetson Orin edge servers (each handles 25 cameras at 30 FPS = 750 FPS).
    Spec: 2 Jetson Orin at $499 each = $998. PoE switches for cameras: $500. Networking: $2K. Software
    integration (REST API, HVAC hooks): $15K. Installation labor: 50 cameras * $100 = $5K. Power 3yr:
    2*60W*26280hr*$0.10/1000=$315. Maintenance contract 3yr: $2K. Training data labeling: $5K. Total:
    $998+$500+$2K+$15K+$5K+$315+$2K+$5K=$30.8K. Under $50K budget with $19.2K contingency.'
  common_mistake: Specifying hardware only and forgetting to budget for software integration ($10-20K
    for smart building integration), power management, and the physical installation labor cost ($50-200/camera
    for cable runs).
  napkin_math: 'Hardware: 2*$499=$998. Networking: $2500. Software: $15,000. Installation: $5000. Power
    3yr: 2*60*26280*$0.10/1000=$315. Maintenance: $2000. Data labeling: $5000. Total: $30,813. Budget
    left: $50K-$30.8K=$19.2K contingency (38.4%). Capacity: each Jetson handles 25 cameras at 30 FPS.
    2 Jetsons = 50 cameras. Capacity check: 50*30 FPS=1500 FPS demand. Jetson at 275 TOPS / YOLOv8s 9.3
    GOPS = 29,569 FPS theoretical, BW-limited ~500 FPS. 2 Jetsons = 1000 FPS capacity. 33% over SLO —
    add 3rd Jetson ($499+$158 power=$657) if headroom needed. Still under $50K ($31.4K).'
