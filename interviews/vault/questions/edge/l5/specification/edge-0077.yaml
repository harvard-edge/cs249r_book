id: edge-0077
title: The Thermal Staircase
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your edge AI box (Jetson Orin, 60W TDP, passive cooling) runs a multi-model perception stack
  for a security system: object detection + face recognition + behavior analysis. In benchmarks, the system
  processes 25 FPS. After 3 minutes of sustained operation in a 40°C outdoor enclosure, FPS drops to 25
  → 20 → 14 in discrete steps. Why does performance degrade in steps rather than gradually, and how do
  you design around it?'
details:
  realistic_solution: 'Modern SoCs like the Orin use DVFS (Dynamic Voltage and Frequency Scaling) with
    discrete power states (P-states), not continuous scaling. When the junction temperature hits a threshold
    (e.g., 80°C on Jetson Orin), the SoC drops to the next lower P-state — a discrete frequency/voltage
    step. Each step reduces both performance and power dissipation. The "staircase" pattern occurs because:
    (1) the system runs at full speed until T_junction hits 80°C, (2) drops to P-state 1 (lower clock
    → less heat → temperature stabilizes temporarily), (3) if ambient heat accumulation continues, temperature
    rises again and hits the next threshold, triggering P-state 2. To design around this: (a) profile
    your workload''s *sustained* thermal power, not peak; (b) use the Orin''s power mode presets (e.g.,
    30W mode) to voluntarily cap below the thermal ceiling from the start — a steady 20 FPS is better
    than 25 FPS that decays to 14; (c) implement workload shedding: drop the behavior analysis model when
    thermal headroom is low, preserving detection and face recognition at full frame rate.'
  common_mistake: '"Thermal throttling is gradual — the clock speed decreases linearly with temperature."
    This misunderstands how modern SoCs manage thermals.'
  napkin_math: 'Orin at MAXN (60W): 275 TOPS, T_junction hits 80°C in ~120s at 40°C ambient. P-state 1
    (~40W): ~180 TOPS → 20 FPS. P-state 2 (~25W): ~110 TOPS → 14 FPS. Voluntary 30W mode from boot: ~150
    TOPS sustained indefinitely → steady 18 FPS with no degradation. Total frames over 10 minutes: Throttled
    mode (MAXN start): 25 × 180s + 20 × 180s + 14 × 240s = 4,500 + 3,600 + 3,360 = 11,460 frames. Steady
    30W mode: 18 × 600s = 10,800 frames. The throttled path delivers ~6% more total frames, but with unpredictable
    step transitions that break downstream object tracking (track IDs are lost when frames are missed
    during thermal transitions). For safety-critical perception, the steady 18 FPS mode is superior: consistent
    inter-frame intervals maintain tracking continuity, and the system never enters a degraded state that
    operators must monitor.'
