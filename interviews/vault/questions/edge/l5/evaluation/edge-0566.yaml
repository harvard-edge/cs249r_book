id: edge-0566
title: The EMC Compliance Nightmare
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your Jetson Orin NX-based traffic monitoring system passes all functional tests but fails EMC
  (electromagnetic compatibility) compliance testing — specifically radiated emissions at 125 MHz and
  375 MHz exceed FCC Class B limits by 8 dB. Without FCC certification, you can't sell the product. The
  emissions only appear when the neural network is running inference. When the system is idle, it passes.
  What is the neural network doing that generates RF emissions, and how do you fix it without changing
  the model?
details:
  realistic_solution: The 125 MHz emission is the 5th harmonic of the Orin's 25 MHz reference clock, amplified
    by the neural network's memory access pattern. During inference, the GPU reads weights and activations
    from LPDDR5 in large, periodic bursts. The LPDDR5 interface runs at 6400 MT/s (3200 MHz clock), but
    the burst pattern has a lower-frequency envelope determined by the model's layer structure.
  common_mistake: '"The GPU is defective" or "We need a metal enclosure." A metal enclosure helps but
    adds $20-50 to BOM cost and may not be sufficient without understanding the emission source.'
  napkin_math: 'FCC Class B limit at 125 MHz: 43.5 dBμV/m at 3m. Measured: 51.5 dBμV/m (8 dB over). SSC
    at ±0.5%: spreads 125 MHz peak across 124.375-125.625 MHz (1.25 MHz bandwidth). Energy spread: 10
    × log10(1.25M / 9kHz RBW) = 21 dB theoretical, ~8 dB practical (due to modulation profile). Post-SSC:
    51.5 - 8 = 43.5 dBμV/m — exactly at limit. Add ferrite bead: -6 dB → 37.5 dBμV/m (6 dB margin) ✓.
    Total BOM cost: $0.55. PCB respin avoided: $10K-50K saved.'
