schema_version: 1
id: edge-0593
title: The Speculative Execution JIT Stall
topic: graph-compilation
status: published
provenance: imported
scenario: You are the tech lead for the perception team on a new autonomous vehicle. The core of your
  system is a large Vision Transformer (ViT) that processes 1200x1200 images for object detection. It's
  highly accurate but runs at 50ms on your automotive ECU (an NVIDIA Jetson AGX Orin), missing the hard
  33ms real-time deadline.
details:
  realistic_solution: The root cause is a Just-in-Time (JIT) Compilation Stall. Edge inference runtimes
    like TensorRT perform aggressive, profile-guided kernel optimization and fusion for a given model.
    When the ViT runs on every frame, the runtime compiles and caches highly specialized CUDA kernels
    that are 'hot' and ready. The 'drafter-verifier' design makes the ViT's execution sparse and intermittent.
    When the ViT is suddenly invoked after being dormant for hundreds of frames, the JIT runtime may treat
    it as a 'new' workload. It has to re-select, re-load, and potentially re-compile or re-specialize
    the kernels for the massive ViT. This compilation and kernel dispatch process itself can take 100-200ms
    on an embedded device, even if the model is already in memory. This one-time tax is catastrophic for
    a single frame in a hard real-time system. The design optimized for average latency while destroying
    the predictability of P99 latency, which is the only metric that matters for safety-critical automotive
    systems.
  common_mistake: 'The typical answer is to blame data movement or cache pollution. For example: ''The
    drafter model pollutes the L2 cache, forcing the verifier model to fetch its weights from slower DRAM.''
    While not wrong, this would only add a few milliseconds of latency, not the catastrophic 150ms+ spike
    observed. It fails to explain the non-linear system failure.'
  napkin_math: ViT has ~300M params. Memory read = 300MB / 204.8 GB/s = 1.46ms. Compute ~ 0.5 TFLOPS /
    137 TFLOPS = 3.6ms. Expected latency is ~5ms. If dynamic inputs (e.g., 1198x1200) trigger JIT re-compilation,
    compiling takes ~40-50ms CPU time. The GPU idles for 45ms waiting for the compiler, blowing past 33ms.
