schema_version: 1
id: edge-exp2-eval-0022
title: Evaluating Compute Migration to Dataflow Accelerator
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: 'We are migrating a real-time object detection pipeline from an edge GPU to a Hailo-8 dataflow
  accelerator to meet a strict 3W system power budget for a battery-powered camera. The Hailo-8 provides
  26 TOPS of INT8 compute at just 2.5W, but unlike a standard GPU, it has no local DRAM and relies entirely
  on streaming data from the host memory. You must evaluate two deployment alternatives: (A) partitioning
  the model to run large intermediate feature maps on the host CPU to reduce accelerator memory pressure,
  or (B) compiling the entire model onto the Hailo-8 and streaming only the raw input and final output.'
details:
  realistic_solution: Option B is the superior approach for a dataflow architecture like the Hailo-8.
    Unlike a GPU's execution model that reads and writes intermediate tensors to global memory between
    kernel launches, a dataflow accelerator spatially maps the network onto its compute grid, passing
    activations directly between adjacent compute elements on-chip. Compiling the entire model to the
    Hailo-8 minimizes host streaming overhead and keeps the chip operating efficiently within its 2.5W
    envelope.
  common_mistake: Candidates often apply a GPU-centric mental model, assuming they need to manage explicit
    host-to-device memory transfers for intermediate activations or relying on local DRAM to buffer large
    tensors. They mistakenly choose Option A, fearing the lack of local DRAM will cause a memory bottleneck
    for deep networks.
  napkin_math: Assuming a 1080p RGB input (1920 * 1080 * 3 bytes = 6.22 MB) at 30 FPS, the required input
    streaming bandwidth from the host is 6.22 MB * 30 = ~186 MB/s. If Option A were chosen and split at
    an intermediate layer outputting a 512x64x64 INT8 tensor (2.1 MB), it would add 126 MB/s (2.1 MB *
    2 ways * 30 FPS) of unnecessary PCIe traffic. With Option B, the 26 TOPS INT8 engine processes the
    stream entirely on-chip, achieving a peak efficiency of 10.4 TOPS/W (26 TOPS / 2.5W) while restricting
    host memory bandwidth strictly to the 186 MB/s input and negligible bounding box output.
