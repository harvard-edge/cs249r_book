id: edge-0795
title: The Graceful Degradation Under Sensor Failure
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your autonomous delivery robot has 3 sensors: a stereo camera pair, a 2D LiDAR, and an ultrasonic
  array. During a delivery, mud splashes onto the left stereo camera lens. Your perception stack loses
  stereo depth estimation. The robot is 500 meters from its destination on a busy sidewalk. What happens
  next?'
details:
  realistic_solution: 'Enter degraded perception mode via a sensor health matrix. With left stereo camera
    occluded: switch to monocular depth (accuracy drops from +/-5% to +/-30% at 5m), reduce speed from
    1.5 to 0.5 m/s (stopping distance: 0.17m), increase ultrasonic safety envelope to 1.5m as a hard boundary.
    Time to destination: 16.7 min vs 5.6 min at full speed — acceptable for delivery. Never stop on a
    busy sidewalk (creates its own hazard). Log degradation for fleet maintenance.'
  common_mistake: '"Stop immediately and wait for human intervention." Stopping on a busy sidewalk creates
    its own safety hazard (tripping, blocking wheelchair access). The system must degrade gracefully,
    not fail catastrophically.'
  napkin_math: 'Full perception: stereo depth ±5% at 5m, 1.5 m/s, stopping distance = 0.5m. Degraded:
    monocular depth ±30% at 5m (effective range uncertainty: 3.5-6.5m), 0.5 m/s, stopping distance = 0.17m.
    Safety margin with ultrasonic (1.5m envelope): even with 30% depth error, the ultrasonic provides
    a hard 1.5m safety boundary. Time to destination at 0.5 m/s: 500m / 0.5 = 1000s = 16.7 minutes (vs
    5.6 minutes at full speed). Acceptable for a delivery robot.'
