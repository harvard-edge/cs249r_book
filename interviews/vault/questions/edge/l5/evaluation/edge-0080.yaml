schema_version: 1
id: edge-0080
title: The High-Altitude Edge AI Failure
topic: power-budgeting
status: draft
provenance: imported
scenario: Your TI TDA4VM-based drone inspection system works flawlessly at your sea-level test facility
  in Houston. You deploy it for power line inspection in the Colorado Rockies at 3,500 meters (11,500
  feet) elevation. The system overheats and throttles within 8 minutes of flight, despite air temperature
  being 10°C cooler than Houston. At sea level in Houston (35°C, humid), the system runs indefinitely.
  At 3,500m in Colorado (25°C, dry), it overheats. How is a cooler environment causing worse thermal performance?
details:
  realistic_solution: Air density at 3,500m is only ~70% of sea-level density. This directly reduces convective
    cooling efficiency by ~24%, causing the thermal resistance to jump from 1.5 to 1.97 °C/W. Additionally,
    the drone's motors must spin faster in the thin air to maintain lift, increasing total thermal load
    to the adjacent board. This combination pushes the junction temperature over 95°C.
  common_mistake: '"The drone is working harder at altitude" or "The sun is more intense at altitude."
    While UV is stronger at altitude, the thermal issue is dominated by a different physical mechanism.'
  napkin_math: 'Sea-level junction: 35 + 20 × 1.5 = 65°C ✓. Altitude junction: thinner air reduces convective
    cooling by 24%, so R increases from 1.5 to 1.97 °C/W. Thinner air also requires the motors to work
    harder to generate lift, raising ambient board heat such that effective power dissipation reaches
    ~36W. 25 + 36 × 1.97 = ~96°C ✗ (throttling). Heatsink thermal mass (50g aluminum, 0.9 J/g·K) = 45
    J/°C. Net heating to reach 95°C takes ~8 minutes (transient). At a restricted 20W mode: 25 + 20 ×
    1.97 = 64.4°C ✓ (no throttling).'
