schema_version: 1
id: edge-exp-eval-0050
title: Evaluating Drift Detection Architectures for High-Throughput Edge
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are deploying a high-throughput defect detection system on an on-premise Qualcomm Cloud
  AI 100 inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W) processing 1000 frames per second.
  You need to implement data drift detection to monitor for lighting changes without violating the strict
  1ms inference SLA. Design A proposes running a lightweight INT8 autoencoder on the AI 100 alongside
  the main model to compute per-frame reconstruction error. Design B proposes 1% reservoir sampling, sending
  intermediate embeddings to the host CPU to compute Population Stability Index (PSI). Which design is
  better and why?
details:
  realistic_solution: Design B is the superior choice. Because data drift is a statistical population
    shift, processing 100% of frames is unnecessary. Sampling 1% of the data provides a statistically
    significant population for PSI calculations over a small time window. By offloading this to the host
    CPU, you completely isolate the drift detection workload, reserving the AI 100's compute and memory
    bandwidth strictly for the latency-critical inference path.
  common_mistake: Candidates often choose Design A, assuming they must utilize the 400 TOPS INT8 compute
    capacity to inspect every single frame for maximum reliability. They fail to recognize that drift
    is a macro-level statistical shift, and running a secondary model per frame risks memory bandwidth
    contention on the LPDDR4x, threatening the strict 1ms SLA.
  napkin_math: At 1000 FPS, a 1% reservoir sample yields 10 frames per second. If the model's penultimate
    layer embedding is 1024 INT8 dimensions (1 KB per frame), sending this to the host requires only 10
    KB/s of PCIe bandwidth, which is practically zero overhead. Over a 5-minute window, the host accumulates
    3,000 samples (3 MB total memory). Computing PSI on 3,000 samples takes <5ms on a standard host CPU,
    effectively detecting drift while consuming exactly 0 TOPS and 0W of the AI 100's 75W budget.
