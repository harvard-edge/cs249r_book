id: edge-0938
title: Receptive Field vs Model Size Trade-off for Edge Deployment
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'An edge device with 2MB model budget needs to classify 128×128 images. Option A: 8 layers of
  3×3 convs (RF=17, 1.8M params). Option B: 4 layers of 7×7 convs (RF=25, 3.2M params, exceeds budget).
  Option C: 5 layers of 3×3 convs + 2 dilated convs (dilation=2, RF=19, 1.5M params). Which achieves the
  best RF within budget?'
details:
  realistic_solution: 'Option A: RF=17 covers 13% of the 128px input. Within budget (1.8M params ≈ 1.8M
    × 2B = 3.6MB in FP16, but with INT8 quantization = 1.8MB). Marginal RF coverage for full-image classification.
    Option B: RF=25 (19.5% coverage) is better but 3.2M params = 3.2MB in INT8, exceeding 2MB budget.
    Eliminated. Option C: Dilated convolutions expand RF without adding parameters or reducing spatial
    resolution. Dilation=2 on a 3×3 kernel gives effective 5×5 RF per layer without 5×5 parameter cost.
    RF=19 with only 1.5M params = 1.5MB in INT8. Well within budget with better RF than Option A. Option
    C is the clear winner: it achieves a larger RF than Option A with ~17% fewer parameters by using dilated
    convolutions. The key insight is that dilated convolutions are ''free RF expansion'' — same parameter
    cost as regular convolutions but with multiplicatively larger receptive fields.'
  common_mistake: Using larger kernels to increase RF. Dilated 3×3 convolutions achieve the same RF as
    larger kernels with far fewer parameters — critical for edge deployment budgets.
  napkin_math: 'A: RF=17, 1.8MB. B: RF=25, 3.2MB (over budget). C: RF=19, 1.5MB. C wins: better RF than
    A at lower size. Dilated convs = free RF expansion.'
