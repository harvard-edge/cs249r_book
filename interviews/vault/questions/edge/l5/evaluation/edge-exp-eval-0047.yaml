schema_version: 1
id: edge-exp-eval-0047
title: Coral Edge TPU Model Selection and Throughput
topic: compute-cost-estimation
status: published
provenance: imported
scenario: 'You are designing an intrusion detection system for 1,000 remote substations. Each site has
  4 cameras streaming at 15 FPS, and you plan to process the streams using a single Google Coral Edge
  TPU (USB form factor, 4 TOPS INT8, 2W max). You must choose between two models: Model Alpha (8 GFLOPs
  FP32, standard ReLU activations) and Model Beta (3 GFLOPs FP32, uses Swish activations). Quantizing
  Model Alpha to INT8 loses 2% accuracy, while Model Beta loses 0.5% but requires CPU fallback for the
  Swish layers. Evaluate which model provides the most cost-effective compute strategy for this deployment.'
details:
  realistic_solution: Model Alpha is the correct choice. Even with a 2% accuracy drop, its standard operations
    (like ReLU) can be fully quantized and mapped to the Edge TPU, keeping the workload entirely on the
    accelerator. Model Beta's CPU fallback causes severe context-switching latency (often 10s of milliseconds
    per layer), making it impossible to hit real-time targets and defeating the 2W low-power advantage
    of the Coral device.
  common_mistake: Candidates often choose Model Beta based on the lower theoretical FLOPs and higher accuracy
    retention, failing to realize that the Coral Edge TPU has limited operator support. They miss that
    falling back to the host CPU for unsupported operations destroys throughput and vastly increases system
    power consumption.
  napkin_math: 'Requirement: 4 cameras * 15 FPS = 60 FPS per site. Model Alpha requires ~8 GOPs (INT8)
    per frame. Total compute needed: 60 FPS * 8 GOPs = 480 GOPs (0.48 TOPS). The Coral Edge TPU provides
    4 TOPS at 2W, so Model Alpha consumes only 12% of peak capacity, easily meeting the requirement. Model
    Beta theoretically needs 60 FPS * 3 GOPs = 180 GOPs, but host CPU fallback for Swish adds estimated
    20ms latency per frame. 1000ms / 20ms = max 50 FPS bottlenecked by CPU, missing the 60 FPS target.'
