id: edge-fill-00611
title: 'Energy-Aware Platform Selection for Edge AI: Qualcomm Cloud AI 100 vs. Edge AI Accelerator X'
topic: energy-per-operation
status: published
provenance: imported
scenario: 'You are tasked with selecting an optimal hardware platform for deploying a low-latency, real-time
  image classification service at the edge. You have two primary candidates:


  1. **Qualcomm Cloud AI 100:** 32 GB LPDDR4x, 400 TOPS INT8, 75W TDP.

  2. **Edge AI Accelerator X:** 16 GB LPDDR5, 200 TOPS INT8, 50W TDP.


  Both platforms need to achieve a minimum inference throughput of 1000 inferences/second for an INT8
  quantized model. The model requires approximately 10GB of memory. Given your understanding of the Horowitz
  energy table and the relative energy costs of memory access versus compute operations, evaluate which
  platform is more suitable from an energy perspective. Discuss the trade-offs in power consumption, memory
  bandwidth efficiency, and computational capacity, and how these impact your selection for an energy-constrained
  edge deployment.'
details:
  realistic_solution: "A realistic solution involves performing a detailed power analysis that considers\
    \ both compute and memory energy consumption. This includes: \n1. Estimating the total operations\
    \ (MACs) and memory accesses required by the model. \n2. Consulting Horowitz-like energy tables to\
    \ assign energy costs to INT8 operations and various memory access patterns (e.g., LPDDR4x vs. LPDDR5).\
    \ \n3. Calculating the energy per inference for each platform based on the estimated operations and\
    \ their associated energy costs, factoring in throughput requirements. \n4. Considering the sustained\
    \ power consumption and thermal limits for continuous operation, potentially throttling performance\
    \ to stay within a power budget. \n5. Exploring memory optimization techniques like operator fusion,\
    \ tiling, and quantization to minimize data movement and maximize data reuse on the selected platform."
  common_mistake: Candidates often overemphasize peak compute (TOPS) and overlook the significant energy
    cost of memory access, especially for memory-intensive models. They might also neglect the overall
    power budget (TDP) and the energy efficiency (TOPS/W) under realistic workloads, not just theoretical
    peaks.
  napkin_math: "Let's assume typical energy costs:\n- INT8 MAC operation: ~0.1 pJ\n- LPDDR4x memory access\
    \ (32-bit): ~100 pJ\n- LPDDR5 memory access (32-bit): ~80 pJ (hypothetical, slightly better than LPDDR4x\
    \ due to advancements)\n\n**Platform Efficiency (Theoretical Peak):**\n- Qualcomm Cloud AI 100: 400\
    \ TOPS / 75W = 5.33 TOPS/W\n- Edge AI Accelerator X: 200 TOPS / 50W = 4 TOPS/W\n\n**Example Inference\
    \ Energy (simplified):**\nIf a model requires 100 Billion MACs and 10 Billion memory accesses per\
    \ inference:\n- **Qualcomm (assuming dominant memory access energy):**\n  - Memory energy: 10 * 10^9\
    \ accesses * 100 pJ/access = 1 J\n  - Compute energy: 100 * 10^9 MACs * 0.1 pJ/MAC = 0.01 J\n  - Total\
    \ per inference (dominated by memory): ~1.01 J\n\n- **Edge AI Accelerator X (assuming dominant memory\
    \ access energy):**\n  - Memory energy: 10 * 10^9 accesses * 80 pJ/access = 0.8 J\n  - Compute energy:\
    \ 100 * 10^9 MACs * 0.1 pJ/MAC = 0.01 J\n  - Total per inference (dominated by memory): ~0.81 J\n\n\
    Even with higher compute TOPS/W, if the workload is memory-bound, the platform with more energy-efficient\
    \ memory (like LPDDR5 in our hypothetical example) or better memory management architecture could\
    \ be more energy-efficient overall, despite lower raw TOPS."
