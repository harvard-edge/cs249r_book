schema_version: 1
id: edge-exp2-eval-0411
title: Evaluating Edge Coreset Selection for On-Device Adaptation
topic: data-efficiency-selection
status: published
provenance: imported
scenario: 'You are designing an on-device continual learning pipeline for an autonomous robot powered
  by an NVIDIA Jetson Orin. The system captures 1080p video at 30 FPS and must select a subset of highly
  informative frames (a coreset) to store in its 32 GB LPDDR5 memory for nightly fine-tuning. You must
  evaluate two data pruning strategies: Strategy A computes a full embedding distance matrix for k-center
  clustering on the Ampere GPU, while Strategy B uses the DLA accelerator to compute streaming loss-based
  importance scores. Which strategy is better suited for this edge environment and why?'
details:
  realistic_solution: Strategy B is the better choice for the Jetson Orin. By offloading a lightweight
    loss-estimation model to the DLA, the system can score and filter frames in a streaming fashion, keeping
    the Ampere GPU free for primary inference. This strictly bounds memory usage to the actual coreset
    size and minimizes power draw, fitting well within the 60W TDP while efficiently selecting data for
    fine-tuning.
  common_mistake: Candidates often choose k-center clustering because of its theoretical guarantees for
    coreset diversity, ignoring the O(N^2) memory and compute complexity of the distance matrix. They
    fail to account for the Jetson Orin's 60W TDP and shared memory architecture, where continuous heavy
    GPU utilization for data selection starves the primary inference workloads.
  napkin_math: At 30 FPS, the system sees 108,000 frames per hour. Uncompressed 1080p RGB is ~6.2 MB per
    frame, so 1 hour of raw data is ~670 GB, far exceeding the Orin's 32 GB RAM. If we allocate a 4 GB
    RAM buffer for the coreset, we can retain ~645 frames. Strategy A's distance matrix for 108,000 frames
    requires (108,000^2 * 4 bytes) = 46.6 GB of memory, causing instant OOM on the 32 GB device. Strategy
    B only needs the 4 GB buffer and processes the 275 TOPS INT8 workload sequentially without matrix
    bottlenecks.
