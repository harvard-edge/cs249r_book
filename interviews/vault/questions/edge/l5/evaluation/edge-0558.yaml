schema_version: 1
id: edge-0558
title: The USB Power Suspension
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You deploy a Coral Edge TPU USB Accelerator to a Linux edge server to speed up inference. When
  the application starts, inference takes 2ms per frame. If the application stops and you restart it an
  hour later, the first inference takes 3 seconds, and then it goes back to 2ms. What OS power management
  feature is causing this massive cold-start penalty on the USB bus?
details:
  realistic_solution: You hit **USB Auto-Suspend (Selective Suspend)**. Normal inference over USB 3.0
    = 2ms. USB Port Wakeup + Enumeration + Firmware Load = ~3,000ms. The OS power-saving feature caused
    a 1,500x latency spike on the critical path of the application restart
  common_mistake: '"The model has to be reloaded into RAM." Loading a 10MB model into RAM takes milliseconds,
    not 3 seconds. The issue is the physical hardware bus.'
  napkin_math: Normal inference over USB 3.0 = 2ms. USB Port Wakeup + Enumeration + Firmware Load = ~3,000ms.
    The OS power-saving feature caused a 1,500x latency spike on the critical path of the application
    restart.
