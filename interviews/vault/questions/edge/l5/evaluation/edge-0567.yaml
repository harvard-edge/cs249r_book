id: edge-0567
title: The Thermal Camera Calibration Ghost
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your Ambarella CV5-based perimeter security system uses a LWIR thermal camera (640×512, 30 Hz)
  for person detection at night. The system works well from October through March. Starting in April,
  false positive rate climbs from 2% to 35% — the model detects 'people' where there are none, always
  near concrete walls and metal structures. By July, the system is unusable. Come October, it starts working
  again. The model hasn't changed. What's happening?
details:
  realistic_solution: The thermal camera measures temperature differences, not absolute temperatures.
    Person detection works because humans (~37°C skin, ~28°C clothed) are warmer than the background.
    In winter (ambient 5°C), a person creates a 23°C contrast against a wall. In summer (ambient 35°C),
    a person creates only a ~-7°C contrast against a sun-heated concrete wall (which can reach 50-60°C
    in direct sun). But the real problem is **thermal ghosting from retained heat**.
  common_mistake: '"The model can''t handle warm weather" or "Insects are triggering false detections."
    These don''t explain the specific pattern of detections near walls and metal structures.'
  napkin_math: 'Winter: person 28°C, wall 5°C, contrast = 23°C. Summer midnight: person 28°C, wall 33°C,
    contrast = -5°C (person is cooler than wall). Concrete cooling rate: Newton''s law, τ = ρ × c × V
    / (h × A). For a 20cm thick wall: τ ≈ 2400 × 880 × 0.2 / (10 × 1) = 42,240 seconds = 11.7 hours. Wall
    temp at midnight (8h after peak): T = 25 + (55-25) × e^(-8/11.7) = 25 + 30 × 0.505 = 40.15°C. At 2
    AM: 25 + 30 × e^(-10/11.7) = 37.7°C — nearly identical to human skin temperature. Temporal differencing
    buffer: 655 KB. Subtraction cost: 0.1ms/frame. False positive reduction: ~90% (walls are static).'
