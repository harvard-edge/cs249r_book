id: edge-0584
title: The Mixed-Precision Backfire
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is optimizing a 3D LiDAR object detection model for an autonomous vehicle's perception
  system, deploying to a Jetson AGX Orin. The baseline FP32 model works well. To meet the 30 FPS deadline,
  you convert the model to INT8 using Post-Training Quantization (PTQ). This meets the latency budget
  but causes an unacceptable drop in detection accuracy for distant objects.
details:
  realistic_solution: The mixed-precision approach created a dynamic range landmine. The core issue is
    **intermediate activation overflow**. In bright sunlight, LiDAR sensors can receive saturated, high-intensity
    returns from reflective surfaces (e.g., a white car bumper). The initial FP16 layers preserved this
    massive dynamic range without issue. However, when these large activation values were passed to the
    first INT8-quantized layer, they drastically exceeded the scale factor derived from the 'average'
    calibration set. This caused the values to clip (or wrap around) to the edge of the INT8 range (`-128`/`127`),
    effectively zeroing out the features in that entire region of the point cloud. The pedestrian, located
    adjacent to the reflective car, was collateral damage—their features were obliterated by the quantization
    overflow from the nearby object.
  common_mistake: The calibration dataset was flawed. It must have lacked examples of bright, reflective
    objects, so the quantization scales are wrong. We should just add more data and recalibrate.
  napkin_math: Let's assess the dynamic range. Assume the calibration data for an activation tensor had
    a max value of `50.0`. The INT8 quantization scale factor `S` would be `S = 50.0 / 127 ≈ 0.39`.
