schema_version: 1
id: edge-exp-eval-0053
title: Evaluating Operator Energy Tradeoffs on Edge TPU
topic: energy-per-operation
status: published
provenance: imported
scenario: You are deploying a quantized vision model to a Google Coral Edge TPU, operating under a strict
  2W power budget and providing 4 TOPS of INT8 compute. You must choose between Model A, which uses standard
  convolutions but requires 50 million off-chip DRAM accesses per inference due to its large working set
  size, and Model B, which uses depthwise-separable convolutions and has twice as many total INT8 operations
  but fits entirely in the on-chip SRAM. Evaluate which model is more energy-efficient for this edge deployment.
details:
  realistic_solution: Model B is significantly more energy-efficient and the correct choice for the Coral
    Edge TPU. The energy cost of moving data to and from off-chip DRAM is orders of magnitude higher than
    performing an INT8 MAC operation on-chip. By optimizing the architecture to fit within the local SRAM,
    Model B trades cheap compute for expensive memory bandwidth, easily staying within the 2W limit.
  common_mistake: Candidates often look only at the total operations and assume Model A is more energy-efficient
    because it has half the MACs of Model B. They fail to apply the principles of the Horowitz energy
    table, ignoring the massive energy disparity between on-chip compute and off-chip memory access.
  napkin_math: 'The Coral Edge TPU performs 4 TOPS at 2W, yielding roughly 0.5 pJ per INT8 operation (2W
    / 4e12 ops). Off-chip DRAM access costs roughly 100 pJ per word. For Model A: compute energy is 100M
    ops * 0.5 pJ = 50 uJ, plus DRAM energy of 50M accesses * 100 pJ = 5,000 uJ (Total: 5.05 mJ). For Model
    B: compute energy is 200M ops * 0.5 pJ = 100 uJ, plus local SRAM access energy (~5 pJ) for 100M accesses
    = 500 uJ (Total: 0.6 mJ). Model B uses over 8x less energy despite doing twice the operations.'
