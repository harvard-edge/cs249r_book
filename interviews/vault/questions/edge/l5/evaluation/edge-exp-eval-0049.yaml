id: edge-exp-eval-0049
title: Evaluating Active Learning for Cloud AI 100
topic: dataset-curation
status: published
provenance: imported
scenario: 'Your team is deploying a computer vision model for manufacturing defect detection on on-premise
  Qualcomm Cloud AI 100 accelerators. To improve the model''s performance on rare defects without exceeding
  the annotation budget, you must design an active learning pipeline. You are presented with two alternatives:
  Strategy A uses a massive FP32 proxy model in the cloud to calculate entropy and select uncertain samples,
  while Strategy B runs the production INT8 quantized model directly on the Cloud AI 100 to score and
  select samples. Which strategy do you choose, and how do you justify the tradeoff between selection
  quality and operational feasibility?'
details:
  realistic_solution: The better approach is Strategy B. Active learning must target the specific failure
    modes of the production model. Running the INT8 model on the Qualcomm Cloud AI 100 ensures the uncertainty
    scores capture quantization artifacts and actual deployment behavior. The hardware's high throughput
    is more than sufficient for offline batch scoring.
  common_mistake: Candidates often choose Strategy A, assuming the larger FP32 model provides strictly
    better uncertainty estimates. They fail to recognize that quantization alters the model's decision
    boundaries, meaning the FP32 model might be confident where the INT8 model fails.
  napkin_math: Assume an unlabeled pool of 5M images. The Cloud AI 100 delivers 400 TOPS INT8, allowing
    a ResNet-50 sized model to process ~2,500 FPS. Scoring 5M images takes 5,000,000 / 2,500 = 2,000 seconds
    (~33 minutes) on a single 75W card. Given the 32 GB LPDDR4x memory, large batch sizes can be used
    to maximize throughput, making Strategy B computationally trivial and highly effective.
