id: edge-exp2-eval-0414
title: ViT vs CNN Ensemble Memory Tradeoffs on Jetson Orin
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin with 32
  GB LPDDR5 unified memory, 275 TOPS INT8, 60W TDP, and an Ampere GPU + DLA accelerator. Two architectures
  meet the accuracy requirements: a Vision Transformer (ViT-L) with 300M parameters running in FP16, and
  an ensemble of three EfficientNet-B7 models (66M parameters each) running in INT8. Evaluate these alternatives
  and determine which architecture is better suited for this specific hardware platform.'
details:
  realistic_solution: The ensemble of EfficientNet-B7 models in INT8 is the superior choice. It significantly
    reduces memory bandwidth pressure on the shared 32 GB LPDDR5 memory and allows the workload to be
    offloaded to the Orin's DLA accelerator. This frees up the Ampere GPU for other computer vision pipeline
    tasks and operates much more efficiently within the 60W TDP constraint by utilizing the dedicated
    INT8 compute.
  common_mistake: Candidates often only calculate the static weight size without factoring in activation
    memory or the specific precision formats. They frequently overlook the unified memory architecture
    of the Orin and fail to recognize that the DLA is heavily optimized for INT8 CNN operations but typically
    struggles to accelerate custom transformer attention blocks.
  napkin_math: 'ViT-L (FP16): 300M params * 2 bytes/param = 600 MB weight footprint. Plus ~1.5 GB for
    high-res FP16 activations = ~2.1 GB peak memory footprint per frame. CNN Ensemble (INT8): 3 * 66M
    = 198M params * 1 byte/param = 198 MB weight footprint. Plus ~300 MB for INT8 activations = ~500 MB
    peak. The INT8 ensemble uses >4x less memory footprint on the shared 32 GB RAM and directly targets
    the 275 TOPS INT8 compute ceiling.'
