schema_version: 1
id: edge-0682
title: The LiDAR Point Cloud Memory Explosion
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your autonomous vehicle uses a 128-beam LiDAR spinning at 10 Hz. Each rotation produces ~240,000
  points. Each point is stored as (x, y, z, intensity, ring_id, timestamp) = 24 bytes. Your perception
  pipeline must: (1) accumulate 5 sweeps for temporal context, (2) voxelize the point cloud, (3) run PointPillars
  inference, and (4) output 3D bounding boxes — all within 100ms on a Jetson AGX Orin (64 GB LPDDR5, 204.8
  GB/s). During testing, the pipeline runs at 8 Hz instead of 10 Hz. Where''s the bottleneck?'
details:
  realistic_solution: 'The bottleneck is point cloud preprocessing, not model inference. Voxelizing 1.2M
    points (5 sweeps x 240K) involves random memory scatter operations — each point maps to a random voxel
    location. CPU-based voxelization achieves only ~5 GB/s effective bandwidth (random access pattern)
    vs 204.8 GB/s peak, taking ~33ms. PointPillars inference itself is only 15ms. Total with CPU voxelization:
    33ms + 15ms = 48ms (20 Hz). The fix: move voxelization to the GPU using CUDA kernels (hash-based scatter),
    which achieves ~20 GB/s effective random access. GPU voxelization takes 8ms, dropping total pipeline
    to 23ms (43 Hz capable, 4.3x headroom).'
  common_mistake: '"The model inference is too slow." PointPillars on an Orin GPU takes ~15ms. The 100ms
    budget has plenty of room for a 15ms model. The bottleneck is in the *data preparation*, not the model.'
  napkin_math: 'Voxel grid: 432 × 496 × 32 points × 24 bytes = 164.5 MB. Memory traffic for voxelization
    (random scatter): 164.5 MB at ~5 GB/s effective = 33ms (CPU) vs 8ms (GPU at ~20 GB/s). Total pipeline:
    CPU voxelization = 48ms (20 Hz). GPU voxelization = 23ms (43 Hz capable, 4.3× headroom). The lesson:
    in point cloud pipelines, preprocessing is 2-3× more expensive than inference. Optimize the data path,
    not just the model.'
