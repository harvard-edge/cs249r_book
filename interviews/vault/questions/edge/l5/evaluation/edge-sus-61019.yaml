id: edge-sus-61019
title: Interposer vs Package-on-Package for Edge Chiplets
topic: chiplet-architecture
status: published
provenance: imported
scenario: Compare silicon interposer and package-on-package (PoP) stacking for integrating a mobile ML
  accelerator chiplet with DRAM. Which is preferable for a wearable device targeting sub-300mW?
details:
  realistic_solution: PoP stacking (used in most smartphone SoCs) places DRAM directly above the logic
    die with wire bonds or through-silicon vias. At wearable power budgets, PoP bandwidth (~50 GB/s) is
    sufficient for sub-100 TOPS inference. Silicon interposer (500+ GB/s) is over-provisioned and adds
    ~50-100mW package power overhead. PoP cost is ~$2-5 vs CoWoS ~$50-100 at wearable volumes.
  common_mistake: Defaulting to silicon interposer because it offers higher bandwidth. Silicon interposers
    require advanced packaging (CoWoS) that is prohibitively expensive and power-hungry for wearable form
    factors.
  napkin_math: 'Wearable ML workload: 10-20 TOPS at INT8. Memory BW needed: 20 TOPS × 1 byte/op = 20 GB/s.
    PoP BW: ~50 GB/s — 2.5x headroom. Silicon interposer: 500 GB/s — 25x over-provisioned. PoP power:
    ~5mW for the interface. Interposer: ~50mW. For 300mW total budget, PoP saves 45mW (15%) for actual
    compute.'
