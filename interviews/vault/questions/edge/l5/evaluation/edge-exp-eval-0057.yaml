schema_version: 1
id: edge-exp-eval-0057
title: Knowledge Distillation vs Pruning on Qualcomm Cloud AI 100
topic: knowledge-distillation
status: published
provenance: imported
scenario: 'Your team is deploying a transformer-based query router (originally 7B parameters) to a Qualcomm
  Cloud AI 100 on-premise inference accelerator. The hardware features 32 GB LPDDR4x memory, delivers
  400 TOPS at INT8, and operates at 75W. To meet a strict 10ms latency SLA per token, you must compress
  the model. You are evaluating two options: using structured pruning to reduce the 7B model by 80%, or
  distilling the 7B teacher into a newly designed, dense 1.4B parameter student model. Evaluate these
  alternatives and determine the optimal approach for this specific hardware.'
details:
  realistic_solution: Knowledge distillation into a dense 1.4B student model is the superior architectural
    choice. The Qualcomm Cloud AI 100's 400 INT8 TOPS are heavily optimized for dense matrix multiplications.
    A dense 1.4B model guarantees high hardware utilization, predictable memory access patterns over the
    LPDDR4x bus, and zero control-flow divergence. Distillation allows the student to recover the teacher's
    logit distribution, maintaining significantly higher accuracy than an aggressively pruned 80% smaller
    model.
  common_mistake: Candidates often lean toward pruning because it seems simpler to implement, failing
    to consider hardware execution efficiency. They frequently overlook that high-ratio structured pruning
    severely damages model capacity and accuracy, and that unstructured pruning fails to yield actual
    speedups on dense INT8 systolic arrays without specialized sparse hardware support.
  napkin_math: A dense 1.4B parameter student model quantized to INT8 requires 1.4 GB of memory, easily
    fitting within the 32 GB LPDDR4x capacity while leaving ample room for context caching. Generating
    one token requires approximately 2.8 Giga-Operations (1.4B parameters * 2 OPs/parameter). Assuming
    a conservative 50% utilization of the theoretical 400 TOPS INT8 compute engine (200 effective TOPS),
    the compute time per token is 2.8 GOps / 200 TOPS = 0.014 ms, making the model easily capable of meeting
    the 10ms SLA. An irregularly pruned model would drastically lower hardware utilization below 20%,
    resulting in worse latency.
