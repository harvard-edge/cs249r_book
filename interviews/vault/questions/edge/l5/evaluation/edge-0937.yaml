id: edge-0937
title: Energy Optimization Strategy Selection
topic: roofline-analysis
status: published
provenance: imported
scenario: Two teams optimize inference energy for an edge vision model. Team A reduces FLOPs by 40% via
  pruning (but adds sparse memory accesses). Team B fuses 5 consecutive layers to increase arithmetic
  intensity from 15 to 45 FLOPs/byte without reducing total FLOPs. Which saves more energy on a chip with
  20 pJ/byte DRAM and 0.5 pJ/FLOP?
details:
  realistic_solution: 'Ridge point = 20/0.5 = 40 FLOPs/byte. Team A: Reduces compute energy by 40%, but
    sparse access patterns may increase memory traffic (irregular access defeats caching). If memory traffic
    stays constant, they save 40% of compute energy but the workload at AI=15 is memory-bound — compute
    is only ~27% of total energy. Net saving: ~11%. Team B: Fusion triples data reuse, reducing memory
    accesses by ~3x. At AI=15, memory dominates (~73% of energy). Reducing memory energy by 67% saves
    ~49% of total energy. Team B wins decisively because the workload is memory-energy-bound, making memory
    optimization far more impactful than FLOP reduction.'
  common_mistake: Assuming reducing FLOPs always reduces energy proportionally. In memory-bound regimes,
    data movement dominates total energy.
  napkin_math: 'At AI=15: mem_E = 15×0.5/(20+15×0.5) = 27% compute, 73% memory. Team A saves 40%×27% ≈
    11%. Team B saves 67%×73% ≈ 49%.'
