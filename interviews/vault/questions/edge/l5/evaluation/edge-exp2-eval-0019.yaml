schema_version: 1
id: edge-exp2-eval-0019
title: Architecture Selection for Coral Edge TPU Translation
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: 'Your team is deploying an offline translation model on a smart camera equipped with a Google
  Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). The research team has proposed three architectures:
  a standard encoder-decoder Transformer, an encoder-only model with a CRF layer, and a decoder-only LLM.
  The Edge TPU has strict limited operator support and requires full INT8 quantization, meaning unsupported
  operations will fall back to the host CPU and cause severe latency spikes. Evaluate these three architectural
  options and recommend the best system design for this specific hardware constraint.'
details:
  realistic_solution: 'A strong candidate evaluates the hardware first: the Coral TPU excels at dense
    INT8 matrix multiplications but struggles with dynamic control flow and memory-heavy sequential tasks.
    An encoder-decoder architecture is best. The heavy encoder processes the entire input sequence in
    parallel, utilizing the 4 TOPS efficiently. The autoregressive decoder is kept extremely lightweight,
    and the candidate must verify that all operators (like Softmax and LayerNorm) are either replaced
    with TPU-friendly INT8 approximations or pushed to the host CPU strategically to avoid constant context
    switching over the USB interface.'
  common_mistake: Candidates often default to decoder-only models due to industry trends, ignoring that
    autoregressive generation is memory-bandwidth bound and struggles on Edge TPUs due to KV cache management.
    They also frequently overlook the limited operator support, proposing complex attention mechanisms
    that will fail to compile for the TPU and silently fall back to the CPU.
  napkin_math: 'Assume a 50M parameter model in INT8 (approx. 50MB). The Coral TPU has 4 TOPS (4e12 OPS).
    Processing a 50-token input through a 25M parameter encoder requires ~2.5 GOPS (2 * 25M * 50). Compute
    time: 2.5e9 / 4e12 = 0.625ms. For the 25M parameter decoder generating 50 tokens autoregressively,
    compute is 50 * (2 * 25M * 1) = 2.5 GOPS (0.625ms compute). However, memory bandwidth dictates performance.
    Over a 5Gbps USB 3.0 connection (~500MB/s effective), loading the 25MB decoder weights 50 times requires
    transferring 1.25GB. 1250MB / 500MB/s = 2.5 seconds of memory latency, proving the system is completely
    memory-bound during decoding despite the 4 TOPS compute capacity.'
