id: edge-0804
title: The Model Theft from Edge Device
topic: federated-learning
status: published
provenance: imported
scenario: Your company spent $2M training a proprietary detection model. It's deployed on 5,000 edge devices
  running Jetson Orin. A competitor buys one of your devices on the secondary market. How do they extract
  your model, and what can you do to prevent it?
details:
  realistic_solution: 'Attack vectors escalate: (1) Unencrypted disk: $500 + 10 min. (2) Encrypted, no
    HSM: $5K JTAG + 1 week. (3) API distillation: 100K queries = $50K total. (4) Full defense stack (secure
    boot + TEE + HSM + rate-limited API + watermarking): >$500K to extract. Goal: make extraction cost
    exceed the $2M training cost. Key insight: the model must be decrypted in GPU memory for inference
    — encryption-at-rest alone is insufficient.'
  common_mistake: '"Encrypt the model file on disk." Encryption at rest is necessary but not sufficient
    — the model must be decrypted into GPU memory to run inference, and that''s where extraction happens.'
  napkin_math: 'Training cost: $2M. Disk extraction (unencrypted): $500 for the device + 10 minutes. Disk
    extraction (encrypted, no HSM): $5,000 for JTAG equipment + 1 week. API distillation: 100,000 queries
    × $0.01/query = $1,000 + 1 month of training = ~$50,000. With all defenses: physical extraction requires
    defeating secure boot + TEE + HSM ≈ $500,000+ and specialized expertise. The goal: make extraction
    cost > $2M.'
