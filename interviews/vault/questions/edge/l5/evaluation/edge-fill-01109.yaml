schema_version: 1
id: edge-fill-01109
title: 'Edge ML Inference: Optimizing Load Balancing with Hailo-8 Accelerators'
topic: load-balancing
status: published
provenance: imported
scenario: You are designing an edge ML inference system for real-time video analytics. A cluster of 50
  Hailo-8 accelerators (each 26 TOPS INT8, 2.5W) is deployed across multiple distributed edge nodes. Your
  system needs to process sampled streams from 100 cameras (each 1080p, 30 FPS, sampled at 5 FPS for inference).
  Each sampled frame requires an INT8 inference model consuming approximately 2 TOPS. You need to efficiently
  route these 500 inference requests per second across the 50 Hailo-8 devices. Compare and contrast two
  distinct request routing and load balancing architectures, focusing on their suitability for edge environments,
  impact on latency, throughput, fault tolerance, and power consumption. Propose a strategy for managing
  dynamic inference traffic, including handling potential spikes where the inference rate could temporarily
  double to 1000 requests/second.
details:
  realistic_solution: A realistic solution would involve a hybrid, hierarchical load balancing approach.
    At a higher level, a consistent hashing mechanism could distribute streams to specific edge nodes,
    minimizing data transfer and maintaining session stickiness for individual cameras. Within each edge
    node, a local, adaptive weighted round-robin or least-connection strategy would balance requests across
    its assigned Hailo-8 devices. Weights would be dynamically adjusted based on real-time metrics like
    Hailo-8 utilization, queue depth, and available power headroom, reported via a lightweight local agent.
    For traffic spikes, the system could implement strategies like dynamic batching (if latency permits),
    intelligent frame dropping based on priority, or temporarily routing less critical streams to a fallback,
    lower-performance CPU inference path. This ensures continuous operation within the 2.5W power envelope
    per device while maximizing the 26 TOPS INT8 capacity and maintaining fault tolerance through quick
    re-balancing upon device failure.
  common_mistake: A common mistake is to apply traditional cloud-based load balancing solutions without
    considering the unique constraints of edge devices, such as limited power budgets (2.5W per Hailo-8),
    potentially intermittent network connectivity, and the need for localized decision-making. Overlooking
    the specific computational capacity (26 TOPS INT8 per Hailo-8) and assuming uniform traffic distribution
    can lead to underutilization during low load or severe bottlenecks and thermal issues during spikes,
    rather than gracefully degrading performance or intelligently shedding load.
  napkin_math: 'Total Hailo-8 cluster capacity: 50 devices * 26 TOPS/device = 1300 TOPS INT8. Each inference
    consumes 2 TOPS. Baseline inference load: 100 cameras * 5 frames/sec/camera = 500 inferences/sec.
    This requires 500 inferences/sec * 2 TOPS/inference = 1000 TOPS, which is within the 1300 TOPS capacity.
    During a spike of 1000 inferences/sec, the system would require 1000 * 2 = 2000 TOPS, exceeding the
    1300 TOPS capacity by 700 TOPS. This deficit highlights the need for dynamic load management strategies
    like selective inference, downsampling, or load shedding to prevent saturation.'
