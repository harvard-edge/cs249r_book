id: edge-fill-01230
title: Evaluating A/B Rollout Strategies for Edge AI Models on Google Coral TPU
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: 'Your team has developed a new, more accurate image classification model (Model B) for a smart
  camera product. The current model (Model A) is deployed on a fleet of 10,000 edge devices, each equipped
  with a Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only). You need to roll out Model B while minimizing
  user impact, ensuring performance, and gathering robust A/B comparison metrics.


  **Compare and contrast two different rollout strategies:** (e.g., canary deployment vs. shadow deployment
  with traffic splitting) in terms of their suitability for this edge device ecosystem. Assume both models
  are optimized for INT8 inference on the Coral TPU.


  For each strategy, describe:

  1.  How it would be implemented given the Coral TPU''s specific hardware constraints (INT8-only inference,
  limited power budget, and potential intermittent network connectivity).

  2.  The key performance indicators (KPIs) and business metrics you would collect to evaluate Model B''s
  performance and stability against Model A on the edge.

  3.  Potential challenges specific to edge deployments (e.g., data synchronization, rollback mechanisms)
  and how to mitigate them for each strategy.'
details:
  realistic_solution: Implement an edge-native monitoring solution that leverages the Coral TPU's capabilities
    for local inference and pre-aggregates metrics locally before batch uploading to the cloud, reducing
    bandwidth and power consumption. Design the rollout mechanism to be robust to network disconnections,
    allowing for local evaluation and automated rollback based on pre-defined edge-side heuristics if
    issues are detected, before requiring central orchestration. Ensure both Model A and Model B are rigorously
    tested for INT8 compatibility and performance on the Coral TPU before deployment to avoid hardware-specific
    regressions.
  common_mistake: Ignoring the unique constraints of edge devices (limited compute, power, network intermittency,
    INT8-only processing) which make traditional cloud-centric rollout strategies (e.g., real-time A/B
    analytics, frequent model updates, instantaneous rollbacks) difficult or impossible to adapt directly.
    This often leads to incomplete data collection, delayed issue detection, or failed rollbacks.
  napkin_math: 'Given the Google Coral Edge TPU''s 4 TOPS (INT8) and 2W power budget:

    *   If a typical INT8 image classification inference takes 8ms on the Coral TPU, how many inferences
    can one TPU theoretically perform per second? (1000ms / 8ms = 125 inferences/sec).

    *   If a shadow deployment involves running both Model A and Model B concurrently on a single TPU,
    how would this impact overall inference latency if the TPU''s capacity is fully utilized by Model
    A? (It would likely double latency per request, or halve throughput, if not carefully managed or if
    Model A is already near capacity).

    *   If each device sends 50KB of batched telemetry data every hour, how much data would a fleet of
    10,000 devices generate in a 24-hour period? (50KB/hour * 10,000 devices * 24 hours = 12 GB/day),
    emphasizing the need for efficient data aggregation and compression.'
