schema_version: 1
id: edge-exp2-eval-0030
title: GPU vs DLA Parallel Scheduling Tradeoffs
topic: operator-scheduling
status: published
provenance: imported
scenario: We are deploying a multi-branch perception network on an NVIDIA Jetson Orin (32 GB LPDDR5, 275
  TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). You must evaluate two operator scheduling strategies.
  Schedule A executes branches sequentially on the Ampere GPU to maximize aggressive layer fusion. Schedule
  B schedules independent operators concurrently across both the GPU and the DLA to maximize theoretical
  hardware utilization. Which schedule is better for minimizing end-to-end latency, and why?
details:
  realistic_solution: Schedule A is typically superior for connected operators within the same network.
    By scheduling them sequentially on the Ampere GPU, the compiler can deeply fuse operators, retaining
    intermediate activations in SRAM and avoiding main memory trips. To maximize the 275 TOPS while staying
    under the 60W TDP, the DLA should be reserved for completely independent workloads (e.g., a separate
    wake-word model) rather than operator-level parallelism.
  common_mistake: Candidates often choose Schedule B, assuming that parallelizing operators across the
    GPU and DLA automatically yields higher throughput. They fail to realize that splitting a single network
    across heterogeneous accelerators prevents layer fusion, forcing large intermediate activation tensors
    out of fast SRAM and into the shared 32 GB LPDDR5, which creates a severe memory bandwidth bottleneck.
  napkin_math: Assume the workload requires 2.75 INT8 Tera-operations (TOPs) per frame. Schedule A (Sequential
    GPU, high fusion) achieves 50% of the platform's peak 275 TOPS (137.5 effective TOPS) due to optimal
    SRAM reuse. Latency = 2.75 / 137.5 = 20 ms. Schedule B (Parallel GPU + DLA) breaks fusion, pushing
    activations to LPDDR5 and dropping effective compute to 10% of peak (27.5 TOPS) due to memory stalls.
    Latency = 2.75 / 27.5 = 100 ms.
