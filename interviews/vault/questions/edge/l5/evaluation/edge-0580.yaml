id: edge-0580
title: The Night-Blind Perception Model
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is developing a pedestrian detection model for an autonomous vehicle, targeting a
  Jetson AGX Orin. The FP32 model is highly accurate but misses the 33ms per-frame deadline. To accelerate
  it, you apply standard post-training INT8 quantization (PTQ). You use your diverse, 1-million-image
  daytime dataset for calibration. The resulting INT8 model now runs in 25ms, meeting the latency budget,
  and maintains 99% of the FP32 accuracy on your daytime validation set.
details:
  realistic_solution: The optimization backfired because the calibration dataset was not representative
    of the inference conditions. INT8 quantization maps the dynamic range of FP32 activation values to
    a fixed integer range of [-128, 127]. This mapping is determined by a scaling factor calculated from
    a 'representative' calibration set.
  common_mistake: The most common incorrect answer is, 'We need to do Quantization-Aware Training (QAT).'
    While QAT can improve accuracy, it doesn't address the fundamental root cause. QAT would likely suffer
    the same problem if it used the same non-representative calibration data. Another common mistake is
    blaming the model architecture itself, suggesting a more 'robust' model is needed, which ignores the
    fact that the FP32 model worked perfectly.
  napkin_math: 'Orin specs: 275 TOPS, 204.8 GB/s. A 50 GFLOP FP32 model needs 50G / 33ms = 1.5 TFLOPS
    sustained. In INT8, Orin gives 275 TOPS. With asymmetric quantization mapping [-15.0, 20.0] to [-128,
    127], scale S = (20 - -15) / 255 = 0.137. Memory bandwidth for 50MB weights drops from 200MB (FP32)
    to 50MB (INT8). Fetch time: 50MB / 204.8GB/s = 0.24ms. Compute: 50G / 275T = 0.18ms. Total << 33ms.'
