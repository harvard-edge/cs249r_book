schema_version: 1
id: edge-exp2-eval-0021
title: INT8 Calibration Bias on Dataflow Edge Accelerators
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are deploying a pedestrian detection model on a Hailo-8 (26 TOPS INT8, 2.5W). Because the
  Hailo-8 is a dataflow accelerator with no local DRAM, the model must be fully quantized to INT8 so that
  weights and activations can stream efficiently from host memory. You need to evaluate the system to
  guarantee equalized odds across intersectional demographic subgroups. Option A uses a random 1,000-frame
  sample from the raw operational data for INT8 Post-Training Quantization (PTQ) calibration before running
  the full fairness evaluation. Option B curates a strictly balanced 1,000-frame PTQ calibration set across
  all subgroups before evaluation. Which design is better for evaluating and maintaining fairness, and
  why?
details:
  realistic_solution: Option B is correct. The Hailo-8 only executes INT8 arithmetic, relying on static
    quantization ranges determined during PTQ. If calibrated on an imbalanced dataset, the resulting INT8
    ranges will optimize for the majority group. A balanced calibration set ensures the INT8 scale factors
    accommodate the unique activation distributions of all intersectional groups, preserving equalized
    odds without requiring costly dynamic quantization on the host CPU.
  common_mistake: Candidates often choose Option A, assuming random sampling minimizes overall KL-divergence
    and global quantization error. They fail to realize that static INT8 clipping thresholds calibrated
    on an imbalanced dataset will disproportionately clip and degrade the distinct activation ranges of
    minority subgroups.
  napkin_math: Assume the majority group's activations span [-4, 4] and a minority group spans [-8, 8].
    Option A calibrates the Hailo-8 INT8 range to [-4, 4] (scale = 8/255 = 0.031). Minority activations
    > 4 are hard-clipped, potentially dropping subgroup recall by 10-15%. Option B calibrates the range
    to [-8, 8] (scale = 16/255 = 0.062), eliminating clipping for the minority group and preserving equalized
    odds, while only adding 0.031 of quantization noise to the majority group's activations.
