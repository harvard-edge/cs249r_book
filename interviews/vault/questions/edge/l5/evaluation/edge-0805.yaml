title: The Autonomous Vehicle Compliance Log
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your autonomous delivery robot (NVIDIA Orin AGX, 275 TOPS, 60W) must comply with NHTSA and
  EU AI Act regulations. Regulators require a complete audit trail: every inference decision, the sensor
  inputs that triggered it, and the model version — retained for 5 years. The robot processes 6 cameras
  at 30 FPS each. How do you log everything without impacting real-time inference or filling the onboard
  512 GB NVMe in a day?'
details:
  realistic_solution: 'Implement tiered logging to avoid 15.5 TB/day at full rate. Tier 1 (always): decision
    metadata at ~3.3 GB/day. Tier 2 (safety events): keyframes + bounding boxes at ~26 GB/day. Tier 3
    (incidents): full video 5s before/after at ~80 GB/day. 5-year storage per robot: ~200 TB on S3 Glacier
    at $800/month. Fleet of 500: $4.8M/year. Use a circular buffer on the 512 GB NVMe (fills in 47 min
    at full rate) with priority eviction. Log on a separate I/O thread to protect real-time inference.'
  common_mistake: '"Log every frame and inference result to disk." 6 cameras × 30 FPS × 1 MB/frame = 180
    MB/s = 15.5 TB/day. The 512 GB NVMe fills in 47 minutes.'
  napkin_math: '5-year cloud storage per robot: Tier 1: 3.3 GB/day × 365 × 5 ≈ 6 TB. Tier 2: 26 GB/day
    × 365 × 5 ≈ 47.5 TB. Tier 3: 80 GB/day × 365 × 5 ≈ 146 TB. Total: ~200 TB per robot. S3 Glacier: $0.004/GB/month.
    Cost: 200,000 GB × $0.004 = **$800/month per robot**. Fleet of 500 robots: $400K/month = $4.8M/year.
    This is a significant cost — it''s why tiered logging matters. Without tiering (full 30 FPS all cameras):
    15.5 TB/day × 365 × 5 ≈ 28.3 PB per robot. **Impossible to store.**'
