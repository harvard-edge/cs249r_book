id: edge-0568
title: The Physical Intruder
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your company's edge AI devices are deployed in public, physically accessible locations. A sophisticated
  competitor gains physical access to a device and attempts to extract your proprietary ML model or inject
  malicious firmware. What hardware and software mechanisms should be in place to detect and mitigate
  such an attack?
details:
  realistic_solution: "A multi-layered hardware and software security approach is crucial:\n  1.  **Secure\
    \ Boot Chain of Trust:** Implement a hardware-rooted chain of trust. An immutable **Root of Trust\
    \ (RoT)** in ROM verifies the bootloader, which verifies the OS kernel, which in turn verifies the\
    \ application and ML runtime. Any unauthorized modification in this chain prevents booting.\n  2.\
    \  **Trusted Execution Environment (TEE) / Hardware Security Module (HSM):** Utilize a TEE (e.g.,\
    \ ARM TrustZone) or a dedicated HSM chip to store cryptographic keys, perform secure decryption, and\
    \ execute sensitive code (like model loading/inference) in isolation from the main OS. This prevents\
    \ key extraction even if the main OS is compromised.\n  3.  **Physical Tamper Detection:** Integrate\
    \ physical sensors (e.g., enclosure switches, light sensors, temperature sensors, accelerometer for\
    \ movement) that can detect unauthorized access. If triggered, these can initiate a secure wipe of\
    \ sensitive data, disable functionality, or alert the fleet management system.\n  4.  **Model Encryption\
    \ and Secure Loading:** Encrypt model binaries and weights at rest. Decryption keys are stored in\
    \ the TEE/HSM and only released to the secure world for on-the-fly decryption and loading into protected\
    \ memory, never exposing the full decrypted model in insecure memory space."
  common_mistake: '"Encrypt the model on disk." While good, physical access allows for much deeper attacks,
    potentially bypassing OS-level encryption, extracting keys from memory, or booting alternative OS.'
  napkin_math: A hardware security module (TPM/HSM) can add $5-20 to the Bill of Materials (BOM). The
    cost of intellectual property theft for a state-of-the-art ML model can be $10M+. If a TPM prevents
    even 0.1% of IP theft attempts across a 1M device fleet, the ROI is substantial.
