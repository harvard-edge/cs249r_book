schema_version: 1
id: edge-exp-eval-0066
title: Format Selection for Host-Streamed Hailo-8 Inference
topic: storage-format-selection
status: published
provenance: imported
scenario: You are designing an edge sensor processing pipeline using an industrial PC equipped with a
  Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 has no local DRAM and relies entirely on streaming
  input tensors directly from the host PC's memory over PCIe. You must choose a storage format for 10TB
  of historical sensor logs on the local NVMe drive to run offline bulk inference for continuous learning.
  Option A is highly compressed Parquet (Zstd), and Option B is uncompressed flat binary records. Evaluate
  which format is better suited for maximizing the Hailo-8's utilization, given the system architecture.
details:
  realistic_solution: The correct approach is Option B (uncompressed flat binary records) or a very lightweight
    row-based compression like LZ4. Since the Hailo-8 streams directly from host memory, the host CPU
    must rapidly read, optionally decode, and feed the data. Uncompressed flat binaries can be memory-mapped
    (mmap) directly into host RAM in the exact tensor layout expected by the accelerator, completely bypassing
    CPU decoding overhead. This ensures the PCIe stream remains saturated and the accelerator achieves
    peak utilization.
  common_mistake: Candidates often blindly choose Parquet with Zstd compression, arguing that it minimizes
    disk I/O bottlenecks and saves storage space. They fail to account for the fact that the Hailo-8 lacks
    local DRAM; decoding columnar formats and decompressing Zstd is highly CPU-intensive, which bottlenecks
    the host's ability to stream memory to the accelerator, leaving the 26 TOPS severely underutilized.
  napkin_math: Assume the Hailo-8 processes 1000 frames/sec (FPS) of 1MB sensor tensors (1GB/s input bandwidth
    to saturate 26 TOPS). A standard edge NVMe SSD can easily read at 2GB/s, meaning raw binary reads
    (Option B) easily sustain the 1GB/s requirement with minimal CPU load. Conversely, single-threaded
    Zstd decompression on a low-power edge host CPU typically maxes out at 300-400 MB/s. Using Parquet
    (Option A) would bottleneck the pipeline at 300-400 FPS, leaving over 60% of the Hailo-8's compute
    capacity idle due to host CPU starvation.
