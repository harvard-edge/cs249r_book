id: edge-0781
title: Fleet-Wide Model Drift Detection Threshold
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You manage 2,000 edge cameras for traffic monitoring. Each device reports hourly inference
  statistics: mean confidence score, detection count per class, and a 64-bin histogram of confidence values.
  After 6 months, you notice that 150 devices in one region show a gradual decline in mean confidence
  from 0.82 to 0.71 over 3 weeks. Calculate the statistical threshold for triggering a drift alert, and
  determine whether this decline is real drift or normal variance.'
details:
  realistic_solution: 'Compute per-device z-scores against each device''s own baseline: z = (0.71 - 0.82)
    / 0.03 = -3.67 (p = 0.012%). With 48 hourly samples all showing z ≤ -3.67, noise probability is ~10^-188
    — definitively real drift. Fleet confirmation: 150 affected vs 0.24 expected by chance for this magnitude
    of drop (625x). Likely an environmental shift in one geographic region. Trigger per-region retraining,
    not a global update. Monitoring bandwidth: ~14.4 MB/day for the full fleet.'
  common_mistake: '"Set a fixed threshold — if mean confidence drops below 0.75, alert." A fixed threshold
    ignores that different deployment locations have inherently different confidence distributions (a
    busy intersection vs a quiet residential street). A device in a low-traffic area might normally have
    0.68 mean confidence because it sees fewer, more ambiguous objects.'
  napkin_math: 'Per-device: z = (0.71 − 0.82) / 0.03 = −3.67 → p = 0.012%. Over 48 hours: 48 independent
    hourly samples all showing z ≤ −3.67 → probability of noise: (0.00012)^48 ≈ 10^{-188}. This is definitively
    drift, not noise. Fleet-level: 150/2,000 = 7.5% of devices affected. If random, expected devices with
    z ≤ −3.67: 2,000 × 0.00012 = 0.24 devices. Observing 150 is 625× the expected count. Bandwidth for
    monitoring: 2,000 devices × (4 bytes mean + 256 bytes histogram + 40 bytes class counts) × 24 reports/day
    = 14.4 MB/day. Trivial.'
