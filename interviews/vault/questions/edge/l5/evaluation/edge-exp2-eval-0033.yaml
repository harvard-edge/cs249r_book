schema_version: 1
id: edge-exp2-eval-0033
title: Edge Storage Format for Hailo-8
topic: storage-format-selection
status: published
provenance: imported
scenario: 'You are designing an edge ML system for a smart city node. During off-peak hours, the system
  runs batch inference on stored sensor data using a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8
  has no local DRAM and streams data directly from host memory. You must choose a storage format for the
  accumulated data: Parquet with Snappy compression, TFRecord with GZIP, or uncompressed raw binary. The
  host system has a low-power ARM CPU and eMMC storage limited to 100 MB/s read bandwidth. Evaluate these
  alternatives and select the best format to maximize the Hailo-8''s utilization.'
details:
  realistic_solution: A row-based format with fast decompression (like TFRecord with Snappy/LZ4) is required.
    Uncompressed binary bottlenecks on eMMC read speeds, while GZIP bottlenecks on ARM CPU decompression.
    A row-based layout ensures the host CPU can stream decompressed frames directly into host memory for
    the Hailo-8 dataflow architecture without costly memory reorganization.
  common_mistake: Candidates often choose Parquet for its superior compression, failing to realize it's
    a columnar format. Reconstructing row-based tensors from columnar formats incurs massive CPU overhead,
    starving the Hailo-8 accelerator since it relies entirely on the host CPU to stream contiguous memory
    buffers.
  napkin_math: 'Assume a model requiring 100 GOPS/inference and a 1 MB input tensor. Hailo-8 max throughput:
    26 TOPS / 100 GOPS = 260 inf/sec (requires 260 MB/s host streaming). Uncompressed: limited by 100
    MB/s eMMC (100 inf/sec, 38% utilization). TFRecord + GZIP: limited by ARM CPU decompression at ~50
    MB/s (19% utilization). TFRecord + Snappy/LZ4 (assuming 3x compression): 100 MB/s eMMC provides 300
    MB/s decompressed, fully saturating the Hailo-8 at 260 inf/sec (100% utilization). Parquet would add
    columnar-to-row CPU translation overhead, dropping utilization below maximum.'
