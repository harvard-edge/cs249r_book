schema_version: 1
id: edge-fill-00290
title: 'Edge Inference Data Movement: Coral vs. CPU/GPU'
topic: dma-data-movement
status: published
provenance: imported
scenario: 'A company is developing a real-time object detection system for an industrial edge application.
  They are evaluating two embedded system architectures for deploying an INT8 quantized model:


  1.  **Architecture A**: An ARM Cortex-A based SoC with an integrated GPU (e.g., Mali-G76), where the
  model inference runs on the integrated GPU.

  2.  **Architecture B**: A system utilizing the Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only) paired
  with a less powerful host ARM Cortex-A CPU.


  The application continuously processes high-resolution video streams from a camera sensor. Given the
  distinct memory architectures and processing paradigms of these two options, compare and contrast their
  approaches to DMA transfers, zero-copy techniques, and the overall host-device data movement overhead.
  Discuss how these factors specifically impact system latency, throughput, and power consumption for
  the object detection task on each architecture.'
details:
  realistic_solution: A strong answer will detail how Architecture A might leverage shared virtual memory
    or dedicated GPU DMA engines, often within a unified memory architecture, to minimize copies. For
    Architecture B, it's crucial to discuss the explicit DMA operations managed by the host CPU, the need
    for pinned memory to optimize USB/PCIe transfers to the Coral, and strategic buffering. Candidates
    should emphasize the importance of asynchronous transfers and double buffering to hide latency, and
    the trade-offs between zero-copy (which might require specific hardware/driver support) and optimized
    copy operations. Power considerations related to data movement (e.g., number of transactions, active
    time of I/O controllers) should also be addressed.
  common_mistake: A common mistake is failing to account for the actual data path and ownership. For Architecture
    A, candidates might overestimate the CPU-GPU communication overhead, or underestimate the memory bandwidth
    contention if CPU and GPU heavily share resources. For Architecture B, they might overlook the host
    CPU's responsibility for orchestrating data transfers to and from the Coral Edge TPU, assuming the
    TPU handles everything autonomously. Another mistake is not considering the memory pinning requirements
    or implications of zero-copy on different operating systems/driver stacks.
  napkin_math: 'Candidates should be able to estimate data transfer times given image resolution (e.g.,
    1080p, 30fps, 3 bytes/pixel = ~178MB/s), bus bandwidth (e.g., USB 3.0 ~ 5Gbps, PCIe Gen3 x1 ~ 8Gbps),
    and the effective throughput after overhead. For example: `(image_width * image_height * color_depth)
    / effective_bus_bandwidth`. They might compare the energy cost of moving data versus computation,
    or quantify the latency added by multiple copy operations.'
