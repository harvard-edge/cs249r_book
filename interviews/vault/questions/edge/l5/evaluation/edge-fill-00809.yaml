id: edge-fill-00809
title: 'Hailo-8 Edge Deployment: Encoder-Decoder Architecture Tradeoffs for NLP Classification'
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: 'Your team is tasked with deploying a real-time Natural Language Processing (NLP) inference
  pipeline on an edge device, specifically targeting the Hailo-8 accelerator (26 TOPS INT8, 2.5W). The
  application requires high throughput and low latency for text classification, operating within a strict
  power budget. You are evaluating two potential model architectures, both quantized to INT8: a compact
  encoder-only model (e.g., MobileBERT) and a similarly sized decoder-only model (e.g., a distilled GPT-2
  variant adapted for classification by using the last token''s hidden state). Compare these two architectures
  for their suitability on the Hailo-8 for this task.'
details:
  realistic_solution: 'A realistic solution for text classification on Hailo-8 would likely prioritize
    an encoder-only architecture. This is because encoder-only models process all input tokens in parallel
    through their layers, which aligns perfectly with Hailo-8''s dataflow architecture for maximum efficiency
    and throughput. The solution would involve: 1) Thoroughly profiling both architectures on the Hailo-8
    to measure actual latency, throughput, and power consumption under realistic workloads. 2) Leveraging
    Hailo-8''s SDK to optimize model compilation, including layer fusion and memory access patterns, to
    maximize INT8 utilization. 3) Given the task is classification, the non-autoregressive nature of encoders
    avoids the potential sequential bottlenecks or unnecessary complexities that a decoder-only model
    might introduce, even when adapted for classification.'
  common_mistake: A common mistake is to overlook how the internal architecture (parallel vs. sequential
    processing) of encoder-only versus decoder-only models maps to specialized dataflow accelerators like
    Hailo-8. While both can perform classification, the highly parallel nature of encoder-only models
    often results in better utilization of the accelerator's compute units and lower effective latency
    for fixed-length inputs, compared to a decoder-only model that might still carry some overhead from
    its generative origins or less optimal dataflow graph compilation.
  napkin_math: Assume both an encoder-only and a decoder-only model for classification have a nominal
    computational cost of 100 GOPS (INT8). On a Hailo-8 with 26 TOPS (INT8), the theoretical peak processing
    time for one inference would be 100 GOPS / 26 TOPS = 0.0038 seconds (3.8ms), leading to a theoretical
    throughput of ~263 inferences/second. However, actual performance is heavily influenced by accelerator
    utilization. If an encoder-only model achieves 80% utilization (effective 20.8 TOPS) due to its parallel
    structure, its actual latency is 100 GOPS / 20.8 TOPS = 4.8ms. If a decoder-only model, due to its
    inherent sequential biases or less optimized graph compilation for classification on dataflow, only
    achieves 60% utilization (effective 15.6 TOPS), its latency would be 100 GOPS / 15.6 TOPS = 6.4ms.
    This difference significantly impacts real-time throughput and power efficiency on the edge.
