schema_version: 1
id: edge-0565
title: The Clock Drift Time-Series Poison
topic: latency-decomposition
status: published
provenance: imported
scenario: Your Ambarella CV5-based predictive maintenance system on an oil pipeline samples vibration
  data at 4 kHz and runs a 1D-CNN anomaly detection model every 500ms. The system works perfectly for
  the first 3 weeks, then suddenly generates a massive spike in false alarms every few hours. The vibration
  sensor is fine (verified with an oscilloscope). What's causing the anomaly?
details:
  realistic_solution: The issue is a classic buffer overflow caused by clock drift. The CV5 and the sensor
    ADC have independent crystals (e.g., ±30 ppm and ±50 ppm). The ADC generates 4000.32 samples per second,
    while the CV5 reads exactly 4000. Because of the 80 ppm difference, 0.32 samples per second are left
    in the driver's ring buffer. It takes 3 weeks for this slow accumulation to overflow a typical large
    DMA buffer. When the buffer finally wraps, the CV5 reads a 500ms window that contains a hard discontinuity
    (where the write pointer lapped the read pointer). The 1D-CNN interprets this sharp jump as a high-frequency
    mechanical shock, triggering a false alarm.
  common_mistake: Assuming the model is experiencing concept drift or continuous frequency shift. A constant
    clock drift does not cause a cumulative frequency shift, but it DOES cause a cumulative time drift,
    which eventually overflows asynchronous buffers if flow control is missing.
  napkin_math: 'Clock drift: 80 ppm relative. CPU reads exactly 4000 samples/s, but the sensor ADC generates
    4000.32 samples/s. Buffer accumulates 0.32 samples/s. In 3 weeks (1.81M seconds), the driver''s ring
    buffer accumulates ~580,000 extra samples. If the internal ring buffer is 500,000 samples, it overflows
    in week 3. When the write pointer laps the read pointer, the data contains discontinuous jumps. The
    1D-CNN detects these high-frequency tears as physical anomalies.'
