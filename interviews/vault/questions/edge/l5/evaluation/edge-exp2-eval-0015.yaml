schema_version: 1
id: edge-exp2-eval-0015
title: Edge Data Quality Gating on Jetson Orin
topic: data-quality-validation
status: published
provenance: imported
scenario: 'You are designing the data validation pipeline for an autonomous agricultural robot running
  on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The system ingests
  4x 4K camera streams and is prone to data quality issues like lens occlusion and severe glare. You must
  evaluate two data quality gating strategies before the main inference pipeline: Option A uses a deep
  autoencoder for anomaly detection running on the Ampere GPU, while Option B relies on fast heuristics
  computed via the ISP and a tiny INT8 classifier on the DLA. Evaluate these alternatives and determine
  which is better.'
details:
  realistic_solution: Option B is superior for this edge architecture. By offloading data quality checks
    to the ISP (for heuristics) and the DLA (for the INT8 classifier), you reserve the Ampere GPU's compute
    and the 32 GB LPDDR5 bandwidth for the main perception models. This heterogeneous compute strategy
    maximizes the 275 TOPS budget while keeping power within the 60W envelope.
  common_mistake: Candidates often default to the deep learning approach (Option A) because autoencoders
    are elegant for anomaly detection. They fail to evaluate system-level resource contention, forgetting
    that running validation on the primary GPU competes with the main perception workload for memory bandwidth
    and compute under a strict 60W TDP.
  napkin_math: Ingesting 4x 4K streams at 30 fps generates ~2.98 GB/s of raw data (4 * 3840 * 2160 * 3
    * 30). Option A's GPU autoencoder might require 50 TOPS, consuming ~15W and significantly eating into
    the 60W TDP limit. Option B's INT8 classifier on the DLA requires roughly 5 TOPS (less than 2% of
    the 275 TOPS limit) and ~2W, leaving ample thermal headroom and full GPU resources for the main task.
