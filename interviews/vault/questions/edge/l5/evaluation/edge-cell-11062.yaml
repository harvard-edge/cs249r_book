id: edge-cell-11062
title: 'Fault Tolerance: Evaluate Redundancy Strategies for Mission-Critical Edge Inference'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are deploying vision-based quality inspection on Jetson Orin (32GB LPDDR5, 275 TOPS INT8,
  60W) for a semiconductor fab. The line must achieve 99.99% uptime (< 52 minutes downtime/year). Compare:
  (A) single Jetson Orin with hot standby, (B) dual Jetson Orin active-active with voting, (C) Jetson
  Orin + cloud failover. Evaluate cost, latency, and uptime.'
details:
  realistic_solution: 'MTBF_single_Orin ≈ 50,000 hours. (A) Hot standby: MTBF_system = 2 × MTBF_single
    = 100K hours. Downtime: failover takes 10 seconds. (B) Active-active: MTBF_system ≈ MTBF²/(MTBF ×
    repair_time) — much higher. (C) Cloud failover: unacceptable 50ms+ latency for real-time inspection.'
  common_mistake: Choosing cloud failover without accounting for WAN latency making real-time inspection
    impossible; not quantifying MTBF improvement from redundancy.
  napkin_math: 'MTBF_single = 50K hours. Required uptime: 99.99% → max downtime 52 min/year = 0.876 hours.
    (A) Hot standby: MTBF_system = 50K²/(50K×8h repair) = 6,250 hours. Annual downtime: 8760/6,250 × 8h
    failover + 10s switch = 11.2h + 0.003h — exceeds 0.876h budget for hot standby alone. (B) Active-active:
    no failover time. MTBF_system = 50K²/(50K×8h) = 6,250h with series fails, but simultaneous failure
    probability is very low. Annual downtime ≈ 0. Extra cost: 2× Jetson Orin ($2K each) vs (A) 2× also.
    (C) Cloud: round-trip WAN = 50ms. Inspection at 30 fps = 33ms/frame. 50ms latency → misses frames
    → unacceptable. Winner: (B) active-active, cost = $4K, uptime >> 99.99%.'
