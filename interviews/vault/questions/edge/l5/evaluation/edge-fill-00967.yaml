title: 'Edge AI Accelerator Comparison: Operator Scheduling for BERT Inference'
topic: operator-scheduling
status: published
provenance: imported
scenario: 'You are tasked with deploying a real-time BERT-tiny model for natural language understanding
  on an edge device. You are considering two primary hardware platforms: the Qualcomm Cloud AI 100 (32
  GB LPDDR4x, 400 TOPS INT8, 75W) and a hypothetical ''EdgeCompute X'' accelerator (16 GB LPDDR5, 200
  TOPS INT8, 30W). The BERT-tiny model has several attention heads and feed-forward layers, with varying
  tensor sizes. Design a methodology to evaluate how operator scheduling strategies (memory reuse, parallel
  execution, and layer fusion) would impact the end-to-end latency and throughput of the BERT-tiny inference
  on these two distinct architectures. Specifically, discuss how you would measure and compare the effectiveness
  of these strategies given the different memory bandwidths and compute capabilities.'
details:
  realistic_solution: 'A realistic solution would involve: 1. Profiling the BERT-tiny model to identify
    critical paths and memory-intensive operations. 2. Utilizing hardware-specific scheduling primitives
    (e.g., Qualcomm''s NPU SDK, or a generic compiler like TVM/Glow customized for each backend) to explore
    different operator fusion and parallelization schemes. 3. Developing custom benchmarks that isolate
    the impact of memory reuse for specific layers and measure the overhead of dynamic scheduling. 4.
    Comparing actual latency and throughput metrics under varying batch sizes and input sequences, alongside
    detailed power consumption analysis, to determine the optimal platform and scheduling strategy for
    the specific latency and power budget constraints.'
  common_mistake: A common mistake would be to only focus on peak TOPS or raw memory size, neglecting
    the interplay between operator types, memory access patterns, and the specific scheduling capabilities
    (or limitations) of each accelerator's software stack. Overlooking the true memory bandwidth and latency
    impacts for intermediate tensor reuse, or failing to account for control flow overhead in parallel
    execution, can lead to inaccurate performance predictions.
  napkin_math: For a given operation, Latency ≈ (Workload / Compute_Throughput) + (Memory_Access_Size
    / Memory_Bandwidth). If we fuse two layers, we reduce intermediate memory traffic. For example, if
    layer A produces a 1GB intermediate tensor consumed by layer B, fusing them on-chip (if possible)
    could save 1GB of off-chip memory bandwidth.  Parallel execution of two independent 100 GFLOPS tasks
    on a 400 TOPS INT8 device could ideally reduce execution time by half if scheduled efficiently, assuming
    no data dependencies and sufficient compute units. Memory reuse factors into effective bandwidth;
    if an operation reuses data already in fast cache/register, its effective memory access latency approaches
    zero, significantly improving actual throughput over theoretical maximums.
