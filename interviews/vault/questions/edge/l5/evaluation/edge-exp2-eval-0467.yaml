schema_version: 1
id: edge-exp2-eval-0467
title: Optimizing Orin Pipeline Latency Breakdown
topic: latency-decomposition
status: published
provenance: imported
scenario: 'Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W TDP). The camera captures 4K video at 60 FPS, but the end-to-end latency from frame
  capture to actuation command is currently 85ms, missing the 33ms target. You have two proposed architectures:
  Architecture A runs preprocessing on the CPU, inference on the Ampere GPU (FP16), and postprocessing
  on the CPU. Architecture B offloads preprocessing to the ISP/hardware encoder, runs inference on the
  Deep Learning Accelerator (DLA) using INT8, and keeps postprocessing on the CPU. Evaluate these alternatives
  and determine which component of the latency decomposition will be the critical bottleneck in each.'
details:
  realistic_solution: Architecture B is superior for meeting the strict latency target. By offloading
    4K preprocessing to dedicated hardware, CPU overhead is drastically reduced. While the DLA might have
    lower peak TOPS than the Ampere GPU, utilizing INT8 on the DLA frees up the GPU for other tasks and
    provides highly deterministic, low-latency execution for standard convolutions. The critical bottleneck
    in A is CPU preprocessing and memory transfer; in B, it shifts to the INT8 quantization accuracy drop
    or the remaining CPU postprocessing.
  common_mistake: Candidates often focus solely on the theoretical TOPS difference between the GPU and
    DLA without considering the memory bandwidth bottleneck or the cost of data transfers between host
    memory, GPU memory, and DLA. They might also ignore the significant latency contribution of CPU-bound
    preprocessing for 4K video.
  napkin_math: 'Target Latency: 33ms (for 30 FPS processing if dropping every other frame, or aiming for
    60 FPS = 16.6ms). Arch A: CPU Preprocessing (4K image) ~30ms + GPU Inference (FP16, ~40ms) + Postprocessing
    ~15ms = 85ms. Arch B: HW Preprocessing ~5ms. DLA Inference (INT8): The Orin delivers 275 TOPS INT8
    total. Assuming DLA provides ~100 TOPS, and the model takes 100 Giga-Operations (GOPs): 100 GOPs /
    100 TOPS = 1ms compute time. Adding memory read/write (32 GB LPDDR5 at ~200 GB/s): 10MB activations
    * 2 / 200 GB/s = ~0.1ms. Total DLA time ~5ms (including overhead). CPU Postprocessing: ~10ms. Total
    Arch B = 5ms + 5ms + 10ms = 20ms. 20ms < 33ms target.'
