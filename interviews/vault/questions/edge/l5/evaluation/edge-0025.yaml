schema_version: 1
id: edge-0025
title: The RTOS vs RT-Linux Tradeoff
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is building an industrial quality inspection system. A camera captures parts on a
  conveyor belt at 60 FPS. You must run a defect detection model and trigger a reject actuator within
  16.7ms (one frame period) — a hard real-time deadline. The ML engineer wants Linux (for PyTorch, TensorRT,
  easy development). The firmware engineer wants FreeRTOS (for deterministic timing). The hardware is
  a Jetson Orin NX (Cortex-A78AE + Ampere GPU). Who is right?
details:
  realistic_solution: 'Neither is fully right — the answer is a heterogeneous architecture that uses both.
    The Orin NX''s Cortex-A78AE cores support ARM''s Split-Lock mode: some cores run Linux (for GPU/TensorRT),
    others run a bare-metal or RTOS safety island. The design: (1) Linux partition (cores 0-5): Runs TensorRT
    inference on the GPU. Inference takes ~8ms. Linux writes the detection result to a shared memory region
    (DRAM, cache-coherent). (2) FreeRTOS partition (cores 6-7): Runs a hard real-time control loop at
    1 kHz. Reads the shared memory for detection results. Controls the reject actuator GPIO with deterministic
    timing (jitter <10 µs). (3) Timing contract: Linux must deliver a result within 12ms (leaving 4.7ms
    for the RTOS to actuate). If Linux misses the deadline (GPU stall, kernel preemption), the RTOS defaults
    to "reject" (fail-safe). PREEMPT_RT Linux alone has worst-case latency of 50-150 µs on Orin — acceptable
    for many soft real-time tasks, but the 16.7ms hard deadline with safety implications requires the
    RTOS guarantee. FreeRTOS on the Cortex-R52 safety island (if present) or bare-metal on dedicated A78AE
    cores provides <1 µs jitter.'
  common_mistake: '"Use Linux with PREEMPT_RT — it''s ''real-time Linux.''" PREEMPT_RT reduces worst-case
    latency but does not make Linux a hard real-time OS. Or: "Use FreeRTOS for everything" — but FreeRTOS
    can''t run TensorRT or access the GPU.'
  napkin_math: 'Linux PREEMPT_RT worst-case scheduling latency on Orin: ~150 µs (measured with cyclictest).
    FreeRTOS on dedicated core: ~0.5 µs worst-case. Frame budget: 16.7ms. Inference (GPU via TensorRT):
    8ms average, 11ms worst case. Linux scheduling jitter: 0.15ms worst case. Shared memory write: 0.01ms.
    RTOS read + actuator trigger: 0.05ms. Total worst case: 11 + 0.15 + 0.01 + 0.05 = 11.21ms — 5.5ms
    of headroom. Without the RTOS safety net, a single Linux kernel stall (e.g., 5ms page fault during
    memory pressure) could push total to 16.2ms — dangerously close to the deadline with no fail-safe.'
