title: The Night-Vision Quantization Collapse
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your team is developing a pedestrian detection model for an autonomous vehicle, deploying to
  a Jetson AGX Orin. To meet the 33ms hard real-time deadline, you quantize the production FP16 model
  to INT8. The model is calibrated using a diverse dataset of daytime driving scenes. In all daylight
  validation tests, the INT8 model is a success: latency is cut in half, and mAP is within 0.5% of the
  FP16 original. However, during night-time testing, the system exhibits a catastrophic failure. In scenes
  with bright streetlights or oncoming headlights, the INT8 model''s recall drops by over 80%, failing
  to detect pedestrians that the FP16 model correctly identifies. Evaluate the team''s quantization methodology.
  Predict the precise numerical failure occurring within the silicon and justify why it disproportionately
  affects high-contrast night scenes.'
details:
  realistic_solution: 'The catastrophic failure is caused by **activation outlier overflow** due to a
    brittle calibration strategy. Here''s the causal chain:'
  common_mistake: 'A common answer is to simply blame the calibration dataset: ''We didn''t have enough
    night images.'' While true, this is an incomplete L3-level answer. It misses the fundamental, physical
    reason for the failure. An L5 answer must identify the specific arithmetic operation that is failing
    and why the environmental change triggers it. Another red herring is blaming the model architecture
    itself, when the FP16 version proves the architecture is sound.'
  napkin_math: 'Calibration range: [-10.0, 12.0]. Max abs = 12.0. INT8 scale = 12.0 / 127 = 0.0945. Night
    headlights cause an activation spike of 45.0. 45.0 / 0.0945 = 476, overflowing the max of 127. The
    network clips this, outputting 127 * 0.0945 = 12.0. A 73% signal loss wipes out the feature gradient.'
