schema_version: 1
id: edge-exp2-eval-0013
title: Optimizing RAG Pipeline Latency on Jetson Orin
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'Your team is deploying a local Retrieval-Augmented Generation (RAG) assistant for a robotics
  application on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The pipeline consists of
  an embedding model, a vector search step, and a 7B parameter LLM for generation. You are evaluating
  two deployment strategies to meet a strict 500ms end-to-end latency budget: Option A runs both the embedding
  model and the LLM concurrently on the Ampere GPU to maximize throughput, while Option B pins the embedding
  model to the Deep Learning Accelerator (DLA) and reserves the GPU exclusively for the LLM. Which architecture
  do you choose, and how do you allocate resources to ensure predictable latency?'
details:
  realistic_solution: Option B is the superior choice. By pinning the embedding model to the DLA, you
    physically isolate the compute workloads, eliminating GPU context switching. While the DLA might execute
    the embedding model slightly slower than the GPU would in isolation, it frees up the GPU's Ampere
    cores entirely for the memory-bandwidth-bound 7B LLM. This provides deterministic execution times
    for both stages of the pipeline, allowing you to confidently meet the 500ms deadline while staying
    within the 60W TDP.
  common_mistake: Candidates often choose Option A, assuming that the Ampere GPU will inherently process
    both models faster than offloading to the DLA. They fail to account for GPU context switching overhead
    and memory bandwidth contention when running two heterogeneous models concurrently, which leads to
    unpredictable latency spikes that violate the 500ms budget.
  napkin_math: A 7B parameter INT8 LLM requires ~7GB of memory. On the Jetson Orin's 32GB LPDDR5 (204
    GB/s bandwidth), generating 20 tokens at ~30 tokens/sec takes ~666ms if memory bandwidth is perfectly
    utilized, but we need to hit 500ms total. To hit 500ms, we might need a smaller model or lower precision
    (e.g., INT4, taking 3.5GB memory). If the embedding model takes 50ms on the DLA, and vector search
    takes 10ms on the CPU, we have 440ms left for the LLM. At INT4, reading 3.5GB takes ~17ms per token.
    440ms / 17ms/token ≈ 25 tokens generated within budget. Sharing the 204 GB/s bandwidth with the embedding
    model on the GPU would ruin this strict timing.
