schema_version: 1
id: edge-exp-eval-0065
title: Evaluating Guardrail Deployment on NVIDIA Jetson Orin Edge Devices
topic: responsible-ai
status: published
provenance: imported
scenario: 'We are deploying a vision-language model (VLM) for autonomous industrial inspection on an NVIDIA
  Jetson Orin edge device. To ensure safety and compliance, we must deploy a moderation guardrail model
  alongside the primary VLM to filter out hallucinations and unsafe commands. We have two alternatives:
  (A) A small dense transformer running on the Ampere GPU alongside the VLM, or (B) an INT8 quantized
  CNN-based guardrail targeting the Deep Learning Accelerator (DLA). Which guardrail architecture is better
  suited for this deployment, considering strict latency constraints and the Orin''s 60W TDP limit?'
details:
  realistic_solution: Alternative B is superior for this edge deployment. By leveraging the DLA for the
    INT8 quantized guardrail, we physically isolate the safety-critical moderation workload from the primary
    VLM running on the Ampere GPU. This prevents resource starvation, ensures predictable latency for
    the safety check, and efficiently utilizes the Orin's architecture while staying safely below the
    60W TDP limit.
  common_mistake: Candidates often default to the highest accuracy transformer guardrail (Alternative
    A) without considering the resource contention on the shared Ampere GPU. They fail to utilize the
    heterogeneous architecture, missing an opportunity to offload safety checks and keep the system within
    the thermal budget.
  napkin_math: The primary VLM consumes 20 GB of the 32 GB LPDDR5 and draws 40W on the GPU. Alternative
    A (GPU guardrail) requires 8 GB memory and 25W, causing the total system draw (65W) to exceed the
    60W TDP limit, leading to thermal throttling. Alternative B (INT8 DLA guardrail) utilizes a fraction
    of the Orin's 275 TOPS INT8 capacity, requires only 2 GB memory, and draws just 10W. Total power with
    Alternative B is 40W + 10W = 50W, leaving a safe 10W overhead while meeting all guardrail requirements.
