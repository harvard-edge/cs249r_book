id: edge-0564
title: 'The Factory Floor EMI Ghost: Fault Tolerance & Checkpointing'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your Hailo-8 defect detection system on a factory floor produces correct results during weekend
  testing but generates random misclassifications every 30-90 seconds during weekday production. The model,
  firmware, and inputs are identical. A 500kW variable-frequency drive (VFD) motor starts up 3 meters
  away when the production line runs. How is EMI corrupting inference, and where in the data path is it
  entering?
details:
  realistic_solution: 'The VFD generates broadband EMI from 150 kHz to 30 MHz during PWM switching. This
    couples into the system through three paths: (1) **Conducted** — power supply lines act as antennas.
    The VFD injects common-mode noise onto the AC mains. The edge device''s switching regulator has finite
    CMRR, allowing ~50mV of noise onto the 1.8V LPDDR4 supply rail — a 2.8% voltage fluctuation that can
    flip bits during DRAM refresh. (2) **Radiated** — the MIPI CSI-2 flat-flex cable from the camera acts
    as a 15cm antenna. At 3m from a 500kW VFD, field strength can reach 10 V/m. The CSI-2 differential
    signaling has ~40dB common-mode rejection, but at 10 V/m, induced common-mode voltage exceeds the
    receiver''s threshold, causing bit errors in image data. (3) **Ground loop** — the camera and Hailo-8
    board have separate ground connections to the machine frame, creating a ground loop that the VFD''s
    switching current drives.'
  common_mistake: '"Add a metal enclosure around the device." A generic Faraday cage helps but doesn''t
    explain the mechanism or guarantee the fix. You need to identify the coupling path.'
  napkin_math: 'VFD EMI field at 3m: ~10 V/m (measured, typical for 500kW drive). CSI-2 cable as antenna
    (15cm, 2 GHz bandwidth): induced voltage = E × l = 10 × 0.15 = 1.5V common-mode. CSI-2 CMRR at 1 MHz:
    ~40dB → differential noise = 1.5V / 100 = 15mV. CSI-2 threshold: ~100mV differential → normally safe.
    But at VFD switching harmonics (150 kHz fundamental, harmonics to 30 MHz), CMRR degrades to ~20dB
    → 150mV differential noise → bit errors. Ferrite choke attenuation: 25dB at 10 MHz → reduces noise
    to 8.4mV (150mV / 10^(25/20)). GMSL2 conversion cost: $30/camera (serializer + deserializer). Error
    rate without mitigation: ~1 corrupted frame per 30-90s matches the VFD''s switching burst pattern.'
