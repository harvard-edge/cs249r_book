id: edge-0824
title: Mitigating Catastrophic Forgetting on Edge
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You are building an on-device personalization feature for a smart camera (4 TOPS NPU, 512MB
  RAM). The base model is a 5MB MobileNetV3 trained to detect generic humans. To recognize specific family
  members, you fine-tune the final 1M parameters on-device using 100 user captures. Post-update, the model
  achieves 99% accuracy on the family, but its generic human detection accuracy collapses from 95% to
  12% due to catastrophic forgetting. Evaluate three mitigations for this specific hardware target: (A)
  Elastic Weight Consolidation (EWC), (B) a 50-image raw Replay Buffer, and (C) freezing the base model
  to train an independent Low-Rank Adapter (LoRA) or classifier head.'
details:
  realistic_solution: Option C (Adapters/Separate Head) is the optimal design choice for edge devices.
    By freezing the base network, it guarantees 0% forgetting on the original task, bounds the memory
    overhead to just tens of kilobytes, and massively reduces the on-device compute required for backpropagation
    compared to EWC or experience replay.
  common_mistake: Candidates blindly recommend EWC (Elastic Weight Consolidation) because it's the textbook
    solution for forgetting, failing to calculate the massive memory overhead of the Fisher Information
    Matrix on an edge device's constrained RAM.
  napkin_math: 'EWC Memory: 2 states (Anchor Weights + Fisher Matrix) * 1M params * 4 bytes = 8MB overhead.
    Replay Buffer: 50 images * 224 * 224 * 3 bytes (RGB) = ~7.5MB RAM. Adapter Head: 1280 (feature dim)
    * 10 (classes) * 4 bytes = 51KB overhead. Adapters are ~150x more memory-efficient.'
