id: edge-0939
title: Designing Fallback for an Autonomous System
topic: data-efficiency-selection
status: published
provenance: imported
scenario: 'An autonomous drone uses an onboard ML model for obstacle avoidance. The model occasionally
  fails (1 in 10K inferences) when encountering novel objects not in training data. Option A: heuristic
  fallback (stop and hover). Option B: simpler model trained on synthetic data covering more scenarios.
  Option C: always run both models and take the more conservative action. Which strategy for a safety-critical
  system?'
details:
  realistic_solution: 'Option C (parallel execution, conservative fusion) is the only acceptable answer
    for safety-critical systems. Option A (stop and hover) is safe but operationally degrading — if the
    drone stops every time the primary model is uncertain, it becomes unusable in novel environments (construction
    zones, unusual weather). 1 in 10K failures with continuous inference (~30 Hz) means a failure every
    ~5.5 minutes. Option B (simpler model on synthetic data) introduces its own failure modes — synthetic
    data may not cover real-world edge cases, and the simpler model may be confidently wrong on scenarios
    the primary model correctly flags as uncertain. Option C runs both models on every frame. The system
    takes the more conservative prediction (e.g., if either model detects an obstacle, avoid it). This
    provides: (1) redundancy — both must fail simultaneously for system failure, (2) safety — conservative
    fusion errs on the side of caution, (3) continuous operation — the drone never needs to stop, it just
    uses the safer prediction. Cost: 2x compute, which is acceptable for safety-critical applications.'
  common_mistake: Using 'stop and hover' as the only fallback for a drone. At 1/10K failure rate and 30Hz
    inference, the drone would stop every 5 minutes — operationally unacceptable.
  napkin_math: 'Primary failure: 1/10K. Secondary failure: 1/5K. Both fail simultaneously (if independent):
    1/50M. Conservative fusion: near-zero unsafe failures at 2x compute cost.'
