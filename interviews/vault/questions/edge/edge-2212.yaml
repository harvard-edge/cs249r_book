title: Edge DMA Double Buffer Budget
scenario: An edge accelerator processes 4 MB input tiles every 25 ms. Host-to-device DMA sustains 800 MB/s.
question: Can 800 MB/s DMA feed 4 MB tiles every 25 ms in a double-buffered edge pipeline?
details:
  realistic_solution: A double buffer pipeline requires 160 MB/s sustained bandwidth (4 MB / 25 ms). With an 800 MB/s DMA, there is 5x headroom. The minimum memory footprint is 8 MB plus alignment padding. Any observed stalls will stem from PCIe kernel launch latency, driver interrupts, or synchronization overhead rather than raw DMA bus saturation.
  common_mistake: |
    **The Pitfall:** Ignoring the per-frame bandwidth rate.
    **The Rationale:** Candidates compare the total tile size directly to total memory capacity and assume success.
    **The Consequence:** Missing whether the transfer pipe is fast enough to actually deliver data in real-time, resulting in starved compute units.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input tile size: 4 MB.
    - Processing time per tile: 25 ms.
    - Host-to-device DMA sustains 800 MB/s.

    **Calculations:**
    - Required bandwidth: 4 MB / 0.025 s = 160 MB/s.
    - Headroom: 800 MB/s / 160 MB/s = 5x.
    - Double buffer size: 4 MB * 2 = 8 MB.

    **Conclusion & Interpretation:**
    - **Result: 5x headroom and 8 MB minimum buffer requirement (Driver/Overhead Bound)**. The bottleneck is compute or driver overhead, not DMA bandwidth.
