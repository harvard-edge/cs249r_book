title: Edge DMA Double Buffer Budget
scenario: An edge accelerator processes 4 MB input tiles every 25 ms. Host-to-device DMA sustains 800 MB/s.
question: Can 800 MB/s DMA feed 4 MB tiles every 25 ms in a double-buffered edge pipeline?
details:
  realistic_solution: The required input bandwidth is 4 MB / 25 ms = 160 MB/s. Sustained DMA at 800 MB/s has 5x bandwidth headroom. A double buffer needs at least 8 MB plus alignment/padding, and stalls are more likely from synchronization or setup overhead than raw bandwidth.
  common_mistake: |
    **The Pitfall:** Ignoring the per-frame bandwidth rate.
    **The Rationale:** Candidates compare the total tile size directly to total memory capacity and assume success.
    **The Consequence:** Missing whether the transfer pipe is fast enough to actually deliver data in real-time, resulting in starved compute units.
  napkin_math: |
    1. **Bandwidth Demand:** 4 MB / 0.025 seconds = 160 MB/s required.
    2. **Bandwidth Headroom:** Sustained DMA is 800 MB/s. 800 / 160 = **5x headroom**.
    3. **Buffer Requirement:** A double buffer requires 2 * 4 MB = **8 MB** capacity.
