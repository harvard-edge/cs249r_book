title: 'Hailo-8 Edge Data Pipeline: Optimizing Storage for Efficient Inference'
scenario: A new object detection model is deployed on a Hailo-8 accelerator for real-time processing of video streams at the edge. The input frames arrive at 500 MB/s and are pre-processed into a dataset of image patches and associated metadata. This data needs to be temporarily stored on local flash storage before being fed to the Hailo-8 for inference.
question: Which storage format and compression traits would you choose for 500 MB/s patch ingestion on the Hailo-8, and why?
details:
  realistic_solution: For this scenario, a columnar storage format like Parquet, combined with efficient compression (e.g., Snappy, Zstd), would be a strong choice. Parquet allows for selective column reads, meaning only necessary features (e.g., image patch data vs. metadata) are loaded into memory, reducing I/O bandwidth and host CPU processing. Its columnar nature also lends itself well to high compression ratios for homogeneous data types within columns (e.g., all bounding box coordinates), further minimizing storage footprint and read times. For highly structured data directly consumed by TensorFlow, a well-structured TFRecord (e.g., using `tf.Example` for efficient serialization) could also be viable, ensuring data is ready for direct feeding to the model with minimal parsing overhead.
  common_mistake: |
    **The Pitfall:** Defaulting to general-purpose, row-oriented formats like CSV or JSON.
    **The Rationale:** Developers rely on cloud-native habits and ignore the massive CPU overhead required to deserialize row-oriented text formats for thousands of small metadata points.
    **The Consequence:** Creating a severe I/O and host CPU bottleneck that completely starves the edge accelerator of data, destroying system throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Raw ingestion rate: 500 MB/s.
       * Format: Columnar (Parquet) with Snappy compression.
       * Compression ratio: 5:1.
    2. **Calculations:**
       * Effective data transfer rate: 500 MB/s / 5 = 100 MB/s.
       * Total I/O reduction: 400 MB/s.
    3. **Conclusion & Interpretation:**
       **Result: I/O Bound Mitigated**. Dropping the flash read requirements from 500 MB/s to 100 MB/s prevents host CPU saturation and ensures the Hailo-8 is fed data fast enough to sustain high-throughput inference.
