title: Architecting Thermal Resilient Video Analytics
scenario: You are designing an on-premise video analytics appliance for a non-climate-controlled factory
  floor using a chassis with two Qualcomm Cloud AI 100 accelerators. The ambient temperature frequently
  reaches 45°C, causing the cards to hit their 75W TDP limits faster and thermally throttle their sustained
  performance from 400 TOPS INT8 down to 250 TOPS. Design a system architecture and inference scheduling
  strategy that guarantees a strict end-to-end latency SLA for 30 concurrent high-definition camera streams
  despite dynamic thermal throttling, while optimally utilizing the 32 GB LPDDR4x memory per card.
details:
  realistic_solution: 'A robust L6+ design involves a dynamic, thermal-aware orchestrator that monitors
    die temperatures and gracefully degrades accuracy or framerate. The system should implement a model
    cascade: routing frames to a smaller, cooler ''fallback'' INT8 model when thermal headroom drops,
    ensuring latency SLAs are strictly met. Furthermore, by optimizing memory access patterns and maximizing
    batching within the 32 GB LPDDR4x, the system reduces the power spent on memory I/O, shifting the
    75W power budget back to the compute cores to sustain higher overall TOPS.'
  common_mistake: Candidates often design static load balancers that fail when the system hits thermal
    limits, leading to massive latency spikes as queues back up. They also frequently overlook the relationship
    between memory bandwidth utilization (which generates significant heat) and the actual compute TOPS,
    failing to use the 32 GB LPDDR4x efficiently to batch streams without exceeding thermal envelopes.
  napkin_math: Total theoretical compute = 2 * 400 TOPS = 800 TOPS at 150W (75W each). At 45°C ambient,
    throttled sustained compute drops to 2 * 250 TOPS = 500 TOPS. For 30 streams at 30 FPS = 900 frames/sec.
    Allowed compute per frame = 500 * 10^12 OPs / 900 = ~555 GOPs/frame. If the primary model requires
    700 GOPs, it exceeds the throttled budget (700 * 900 = 630 TOPS > 500 TOPS). The architecture must
    fall back to a smaller 400 GOPs model or drop the processing rate to 20 FPS (700 GOPs * 600 frames/sec
    = 420 TOPS < 500 TOPS) to stay under the 75W thermal limit while preserving the SLA.
