title: The Autonomous Valet Shrink Ray
scenario: You must deploy a multi-modal Transformer model on a passively cooled automotive-grade ECU. The current FP16 model runs on a 60W Orin but is 5x too slow and over-budget on power.
question: What ordered optimization plan would make the 5x-too-slow valet Transformer meet 33ms on a 15W ECU, and why in that order?
details:
  realistic_solution: The correct approach is a multi-stage optimization pipeline where each step enables the next. The optimal order is (1) Knowledge Distillation, (2) Top-K Sparsification, (3) Quantization-Aware Training, and finally (4) Operator Fusion via the deployment compiler.
  common_mistake: |
    **The Pitfall:** Applying optimizations in a suboptimal order (e.g., quantizing before pruning).
    **The Rationale:** Candidates view optimizations as independent modules rather than a dependent pipeline.
    **The Consequence:** Reduced dynamic range ruins structured pruning effectiveness, leading to severe accuracy loss.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline latency: 165ms on 60W. Target latency: 33ms on 15W.
       - Speedup required: 5x.
       - INT8 Quantization speedup: ~2x.
    2. **Calculations:**
       - INT8 execution time: 165ms / 2 = 82.5ms.
       - Remaining speedup needed: 82.5ms / 33ms = 2.5x.
       - Target operations: 33ms at 9 TOPS = 0.033s * 9e12 ops/s = ~297 Giga-operations.
    3. **Conclusion & Interpretation:**
       - **Result: Quantization yields 2x; pruning/distillation is required for the remaining 2.5x.**
       - **Compute-Bound**
