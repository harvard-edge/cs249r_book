title: The Autonomous Valet Shrink Ray
scenario: You must deploy a multi-modal Transformer model on a passively cooled automotive-grade ECU with a strict 15W thermal limit and 70 TOPS (INT8). The current FP16 model runs on a 60W Orin but is 5x too slow and over-budget on power.
question: What ordered optimization plan would make the 5x-too-slow valet Transformer meet 33ms on a 15W ECU, and why in that order?
details:
  realistic_solution: The correct approach is a multi-stage optimization pipeline where each step enables the next. The optimal order is (1) Knowledge Distillation, (2) Structured Pruning, (3) Quantization-Aware Training, and finally (4) Operator Fusion via the deployment compiler.
  common_mistake: |
    **The Pitfall:** Applying optimizations in a suboptimal order (e.g., quantizing before pruning).
    **The Rationale:** Candidates view optimizations as independent modules rather than a dependent pipeline.
    **The Consequence:** Reduced dynamic range ruins structured pruning effectiveness, leading to severe accuracy loss.
  napkin_math: |
    - Baseline: 165ms on 60W. Target: 33ms on 15W (5x speedup).
    - INT8 Quantization: Cuts FP16 execution time from 160ms to 80ms (still too slow).
    - Required FLOP reduction: Must cut FLOPs by ~60% to hit 33ms.
    - Target compute footprint: 9 INT8 TOPS yields 9T / 275T = 32.7ms.
    **Quantization alone only provides a 2x speedup; pruning/distillation is required to achieve the full 5x.**
