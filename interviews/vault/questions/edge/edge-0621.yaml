title: The Autonomous Valet Shrink Ray
scenario: You are the Principal ML Systems Engineer at a luxury automaker. The company wants to ship an
  'Autonomous Valet' feature, which uses a large, multi-modal Transformer model to navigate parking structures.
  The proof-of-concept runs on a liquid-cooled NVIDIA AGX Orin in the trunk (60W setting), but for the
  mass-market sedan, it must be deployed on a passively cooled automotive-grade ECU with a strict 15W
  thermal and power budget. The ECU has 16GB of LPDDR5 memory (204.8 GB/s) and an accelerator delivering
  ~70 TOPS (INT8) at that power envelope. The current FP16 model is 5x too slow, violating the 33ms (30
  FPS) per-frame deadline, and over-budget on power. Propose a complete, ordered optimization plan to
  ship this feature. Justify the ordering of your techniques (e.g., pruning, distillation, quantization,
  fusion) and formulate the expected latency and power reduction at each stage.
details:
  realistic_solution: The correct approach is a multi-stage optimization pipeline where each step enables
    the next. The optimal order is (1) Knowledge Distillation, (2) Structured Pruning, (3) Quantization-Aware
    Training, and finally (4) Operator Fusion via the deployment compiler.
  common_mistake: Applying optimizations in a suboptimal order, for example, quantizing before pruning,
    which can harm the pruning process by reducing the dynamic range of weights, making it harder to distinguish
    important from unimportant ones. Another common mistake is ignoring the impact of unstructured vs.
    structured pruning on edge hardware, where only the latter provides real latency benefits without
    specialized compilers or hardware.
  napkin_math: Baseline 165ms on 60W Orin. To reach 33ms, we need a 5x speedup. The Orin delivers 275
    INT8 TOPS. If baseline uses FP16 (~137 TFLOPS) with ~22 TFLOPs per frame, compute is 22T / 137T =
    160ms + 5ms memory. Quantizing to INT8 gives 275 TOPS, reducing compute to 22T / 275T = 80ms. Still
    too slow. We must cut FLOPs by ~60%. A 9 TOPS model in INT8 yields 9T / 275T = 32.7ms, fitting the
    33ms budget perfectly.
