title: Active Learning Data Pipeline for Edge TPU Defect Detection
scenario: You are designing an active learning and data curation pipeline for a visual inspection system
  deployed across a manufacturing plant using Google Coral Edge TPU devices. The Edge TPUs have 4 TOPS
  of compute at 2W power and strictly require INT8 quantization with limited operator support. The factory
  cameras generate millions of images daily, but your annotation team can only label 1,000 images per
  week. Design a system architecture to select the most valuable images from the edge devices for annotation,
  specifically accounting for the hardware constraints and the fact that the deployed models are heavily
  quantized.
details:
  realistic_solution: The optimal design splits the active learning workload. The INT8 model deployed
    on the Coral Edge TPU performs a lightweight, first-pass filtering (e.g., saving images where the
    standard classification confidence is between 40% and 60%). These candidate images are uploaded to
    a central server. In the cloud, a larger, unquantized FP32 'teacher' model or an ensemble evaluates
    the uploaded candidates using rigorous uncertainty and diversity sampling (e.g., core-set selection)
    to pick the final 1,000 images for human annotation. This respects the edge hardware limits while
    maximizing annotation ROI.
  common_mistake: Candidates often propose running complex uncertainty estimation techniques (like Monte
    Carlo Dropout or deep ensembles) directly on the edge devices to select hard examples. This fails
    because the Coral Edge TPU strictly requires INT8 quantized models and has limited operator support,
    meaning these complex, unquantized architectures cannot run or would severely bottleneck the 4 TOPS
    hardware.
  napkin_math: Assuming a MobileNetV2-based INT8 model requires ~0.006 Tera-Operations per inference.
    With the Coral Edge TPU providing 4 TOPS at 2W, theoretical max throughput is roughly 666 FPS. If
    a factory line runs 5 cameras at 30 FPS (150 FPS total), the Edge TPU operates well within limits,
    utilizing only ~22% of its compute capacity and keeping power draw low. Processing 150 FPS yields
    ~13 million images daily. If the on-device INT8 confidence filter uploads just 0.05% of frames, ~6,500
    images are sent to the cloud daily. The cloud server then distills these 45,500 weekly images down
    to the 1,000 annotation budget.
