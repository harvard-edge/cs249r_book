title: Sizing Dynamic Batching for LLM Prefill on Edge
scenario: You are deploying an 8B parameter LLM (INT8) for a real-time smart factory monitoring application on a Qualcomm Cloud AI 100 accelerator. The SLA strictly mandates a P99 Time-To-First-Token (TTFT) of under 200ms. Incoming alerts have an average prompt length of 500 tokens.
question: Is the Cloud AI 100 compute-bound or memory-bound during prefill, and what dynamic-batching limit meets the 200ms TTFT SLA?
details:
  realistic_solution: During the prefill phase (processing the input prompt), LLM inference is highly compute-bound because the system performs large dense matrix multiplications (batch size * prompt length * hidden dimension). To guarantee the 200ms TTFT SLA, dynamic batching must be strictly clamped by the accelerator's effective INT8 compute throughput, not by its large 32 GB memory capacity. Saturating the VRAM with a massive batch would catastrophically violate the TTFT latency constraint.
  common_mistake: |
    **The Pitfall:** Assuming the edge LLM bottleneck is always memory capacity and maximizing the batch size to fill VRAM.
    **The Rationale:** Candidates conflate the memory-bound nature of token generation (decode phase) with the compute-bound nature of prompt processing (prefill phase).
    **The Consequence:** The system batches too many requests simultaneously, taking >1000ms to process the prefill, fatally violating the strict 200ms TTFT SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator: 400 TOPS INT8 (~200 effective TOPS at 50% utilization).
       - TTFT SLA: 200ms (0.2s).
       - Model: 8B parameters, 500 tokens per prompt.
       - Ops per token: ~2 * 8B = 16 GigaOps/token.
    2. **Calculations:**
       - Max operations allowed in 200ms: 200 TeraOps/s * 0.2s = 40 TeraOps.
       - Max total tokens processed within 200ms SLA: 40 TeraOps / 16 GigaOps/token = 2,500 tokens.
       - Max prefill batch size for 500-token prompts: 2,500 total tokens / 500 tokens/prompt = 5 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Maximum batch size of 5. The prefill phase is strictly Compute-Bound; attempting to batch more requests to utilize the remaining memory will violate the TTFT SLA.**
