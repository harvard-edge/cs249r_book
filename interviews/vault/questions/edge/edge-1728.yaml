title: Sizing Dynamic Batching for LLM Prefill on Edge
scenario: You are deploying an 8B parameter LLM (INT8) for a real-time smart factory monitoring application on an on-premise Qualcomm Cloud AI 100 accelerator. The SLA strictly mandates a P99 Time-To-First-Token (TTFT) of under 200ms. Incoming alerts have an average prompt length of 500 tokens. The chip provides 400 TOPS INT8 and has 32 GB of LPDDR4x memory within a 75W envelope.
question: Is the Cloud AI 100 compute-bound or memory-bound during prefill, and what dynamic-batching limit meets the 200ms TTFT SLA?
details:
  realistic_solution: The candidate must calculate the compute latency for the prefill phase and use it to constrain the maximum batch size. Given the 200ms TTFT requirement, the batch size must be strictly limited by the accelerator's effective compute throughput rather than its memory capacity. To maintain latency, the system should employ dynamic batching capped at a maximum token threshold per forward pass.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck on edge devices is solely memory capacity and maximizing batch size up to the 32 GB limit.
    **The Rationale:** Candidates focus on throughput optimization (filling the KV cache) without calculating the prefill compute latency.
    **The Consequence:** The system will violate the strict 200ms TTFT constraint long before memory runs out, failing the SLA.
  napkin_math: |
    1. Calculate effective compute capability: 400 TOPS INT8 * ~50% utilization = 200 effective TOPS (200 TeraOPs/s).
    2. Calculate max operations allowed within 200ms SLA: 200 TeraOPs/s * 0.2s = 40 TeraOPs.
    3. Calculate prefill compute per token for 8B model: ~2 * 8B parameters = 16 GigaOPs/token.
    4. Calculate max tokens processed within SLA: 40 TeraOPs / 16 GigaOPs/token = 2,500 tokens.
    5. Calculate max prefill batch size for 500-token prompts: 2,500 tokens / 500 tokens/prompt = 5.
    6. Memory check: 8 GB model + KV cache for 5 requests is well under the 32 GB limit.
    **The system is strictly compute-bound for latency, dictating a maximum batch size of 5.**
