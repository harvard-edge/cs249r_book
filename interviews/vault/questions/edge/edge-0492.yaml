title: 'The Edge Transformer Trap'
scenario: 'You are the Staff ML Systems Engineer for an autonomous driving team. Your current pedestrian detection model, a standard ResNet-34, is being replaced. The goal is to improve accuracy while strictly maintaining the 30 FPS processing rate (a 33ms hard real-time deadline) on the vehicle NVIDIA Jetson AGX Orin compute module.'
question: 'Should the ResNet-34 replacement be a Vision Transformer or an efficient CNN to maintain 30 FPS on Jetson Orin?'
details:
  realistic_solution: 'The correct approach is to diagnose the bottleneck using the Roofline model. The Jetson AGX Orin is compute-rich (275 TOPS) but its performance is gated by memory bandwidth (204.8 GB/s). The Vision Transformer self-attention mechanism has low arithmetic intensity, making it memory-bandwidth bound. The efficient CNN has a much higher arithmetic intensity, making it compute-bound and viable for the deadline.'
  common_mistake: |
    **The Pitfall:** Comparing models based on theoretical FLOPs or benchmark accuracy alone.
    **The Rationale:** Engineers often ignore arithmetic intensity and memory constraints of target hardware.
    **The Consequence:** Deploying a memory-bound ViT that fails to fully utilize compute units, causing severe latency and missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin: 275 TOPS, 204.8 GB/s bandwidth.
    - ViT AI: ~10-50 MACs/Byte. CNN AI: >500 MACs/Byte.

    **Calculations:**
    - Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1,342 MACs/Byte.
    - ViT AI (50) < Ridge Point (1342) = Memory-bound.
    - CNN AI (500) approaches compute-bound operation.

    **Conclusion & Interpretation:**
    - **Result: 1,342 MACs/Byte Ridge Point (Memory-Bandwidth-Bound)**. The ViT is utterly starved for bandwidth and will miss the 33ms deadline.
