title: The Edge Transformer Trap
scenario: You are the Staff ML Systems Engineer for an autonomous driving team. Your current pedestrian detection model, a standard ResNet-34, is being replaced. The goal is to improve accuracy while strictly maintaining the 30 FPS processing rate (a 33ms hard real-time deadline) on the vehicle's NVIDIA Jetson AGX Orin compute module.
question: Should the ResNet-34 replacement be a Vision Transformer or an efficient CNN to maintain 30 FPS on Jetson Orin?
details:
  realistic_solution: The correct approach is to diagnose the bottleneck using the Roofline model. The Jetson AGX Orin is compute-rich (275 TOPS) but its performance is gated by memory bandwidth (204.8 GB/s). The Vision Transformer's self-attention mechanism has low arithmetic intensity, making it memory-bandwidth bound. It cannot fully utilize the Orin's expensive compute units. The efficient CNN, specifically designed with techniques like depthwise separable convolutions, has a much higher arithmetic intensity, making it compute-bound. This allows it to achieve significantly higher hardware utilization and a lower final latency, making it the only viable path for meeting the 33ms hard real-time deadline.
  common_mistake: |
    **The Pitfall:** Comparing models based on theoretical FLOPs or benchmark accuracy alone.
    **The Rationale:** Engineers often ignore arithmetic intensity and memory constraints of target hardware.
    **The Consequence:** Deploying a memory-bound ViT that fails to fully utilize compute units, causing severe latency and missed real-time deadlines.
  napkin_math: |
    - Jetson AGX Orin Hardware Ridge Point: 275 TOPS / 204.8 GB/s ≈ 1342 MACs/Byte.
    - ViT Arithmetic Intensity: ~10-50 MACs/Byte (memory-bound).
    - Efficient CNN Arithmetic Intensity: >500 MACs/Byte (compute-bound).
    - **Conclusion: The CNN's higher operational intensity is required to hit the 33ms (30 FPS) deadline.**
