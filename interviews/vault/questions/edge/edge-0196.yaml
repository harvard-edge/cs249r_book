title: The Radar's SRAM Ingestion Time
scenario: An autonomous vehicle's radar sensor streams data to a Hailo-8 edge accelerator over a MIPI bus with a specified bandwidth of 2.5 GB/s. For each processing cycle, a 256 KB data frame must be transferred from the sensor buffer into the accelerator's on-chip SRAM using DMA.
question: Interpret the bus specification and calculate the minimum time required to DMA a 256 KB frame over a 2.5 GB/s MIPI bus.
details:
  realistic_solution: This requires calculating the physical DMA transport latency over the MIPI interface. The data size is in Kilobytes (KB), while the bandwidth is in Gigabytes per second (GB/s), necessitating strict unit alignment to determine the I/O-bound latency.
  common_mistake: |
    **The Pitfall:** Miscalculating interface transfer units by mixing up GB/s and MB/s or bits and bytes.
    **The Rationale:** Engineers sometimes rely on memory of PCIe latencies (~1 µs) instead of calculating deterministic transfer time based on bandwidth.
    **The Consequence:** Incorrectly estimating the data transfer bottleneck, leading to poor system architecture decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data Size: 256 KB = 256 * 1024 Bytes = 262,144 Bytes.
       - Bus Bandwidth: 2.5 GB/s = 2.5 * 10^9 Bytes/s = 2,500,000,000 Bytes/s.
    2. **Calculations:**
       - Transfer Time = Data Size / Bandwidth.
       - Time = 262,144 Bytes / 2,500,000,000 Bytes/s = 0.0001048576 seconds.
       - Convert to microseconds: 0.0001048576 * 1,000,000 = 104.8576 µs.
    3. **Conclusion & Interpretation:**
       - **Result: ~105 µs (Bandwidth-Bound)**
  options:
  - '~102 ms (Unit Error: Confusing GB/s with MB/s)'
  - '~1 µs (Concept Error: Quoting bus latency instead of calculating transfer time)'
  - '~105 µs'
  - '~819 µs (Unit Error: Confusing Gigabytes (GB) with Gigabits (Gb))'
  correct_index: 2
