title: The Radar's SRAM Ingestion Time
scenario: An autonomous vehicle's radar sensor streams data to a Hailo-8 edge accelerator over a MIPI bus with a specified bandwidth of 2.5 GB/s. For each processing cycle, a 256 KB data frame must be transferred from the sensor buffer into the accelerator's on-chip SRAM using DMA.
question: Interpret the bus specification and calculate the minimum time required to DMA a 256 KB frame over a 2.5 GB/s MIPI bus?
details:
  realistic_solution: 'This is a direct application of the bandwidth formula: Time = Size / Rate. The key is to align the units correctly. The data size is in Kilobytes (KB), while the bandwidth is in Gigabytes per second (GB/s).'
  common_mistake: |
    **The Pitfall:** Miscalculating units by mixing up GB/s and MB/s or bits and bytes.
    **The Rationale:** Engineers sometimes rely on memory of PCIe latencies (~1 µs) instead of calculating transfer time based on bandwidth.
    **The Consequence:** Incorrectly estimating the data transfer bottleneck, leading to poor system architecture decisions.
  napkin_math: |
    1. **Formula:** Transfer Time = Data Size / Bandwidth
    2. **Convert Data Size:** 256 KB = 262,144 Bytes
    3. **Convert Bandwidth:** 2.5 GB/s = 2,500,000,000 Bytes/s
    4. **Calculate:** Time = 262,144 / 2,500,000,000 = 0.0001048 seconds
    **Result: The DMA completes this transfer in roughly 105 µs.**
  options:
  - '~105 ms (Unit Error: Confusing GB/s with MB/s)'
  - '~1 µs (Concept Error: Quoting bus latency instead of calculating transfer time)'
  - '~105 µs'
  - '~840 µs (Unit Error: Confusing Gigabytes (GB) with Gigabits (Gb))'
  correct_index: 2
