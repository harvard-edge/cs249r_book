title: Dataflow Graph Splitting Overhead
scenario: You are deploying an object detection model on a dataflow accelerator lacking local DRAM. The compiler failed to fuse a heavy Conv2D layer with a custom activation function, splitting the graph and forcing an intermediate 1920x1080x16 INT8 feature map round-trip to the host CPU.
question: Assuming the Conv2D is 52 GOPS, what latency penalty does the 1920x1080x16 INT8 round trip add over a 2 GB/s PCIe link?
details:
  realistic_solution: The optimal approach is to modify the model architecture to use natively supported activations (like ReLU or SiLU) so the Hailo-8 compiler can spatially fuse the operations. This keeps the tensor entirely on-chip within the dataflow pipeline, maintaining the 2.5W power envelope and avoiding host memory wake-ups.
  common_mistake: |
    **The Pitfall:** Focusing only on the host CPU execution time for the custom activation.
    **The Rationale:** Engineers underestimate the catastrophic penalty of breaking spatial graph fusion on a dataflow architecture.
    **The Consequence:** Severe I/O bottlenecking, as streaming raw intermediate tensors over PCIe dwarfs the actual compute time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Conv2D Load: 52 GOPS. Accelerator peak: 26 TOPS. Feature Map: 1920x1080x16 bytes ≈ 33 MB. PCIe link: 2 GB/s (2000 MB/s).
    2. **Calculations:**
       - Pure Compute Time = 52 GOPS / 26,000 GOPS/sec = 2 ms.
       - Round-trip size = 33 MB (write) + 33 MB (read) = 66 MB.
       - Transfer Time = 66 MB / 2000 MB/s = 33 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 17.5x Latency Penalty.** The missing fusion adds 33 ms of pure I/O latency to a 2 ms operation, completely destroying real-time performance.
