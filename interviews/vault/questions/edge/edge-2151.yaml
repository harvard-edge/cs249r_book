title: Knowledge Distillation from Transformer to CNN for Hailo-8
scenario: 'A ViT-S teacher (22M params, 4.6 GFLOP, INT8=22MB) achieves 79% on COCO person detection. A ResNet-18 student (11M params, 1.8 GFLOP, INT8=11MB) achieves 71% without distillation.'
question: What accuracy gain can feature distillation from ViT-S to ResNet-18 deliver on Hailo-8, and what representation issues arise?
details:
  realistic_solution: 'Technical challenge: ViT uses patch tokens while ResNet-18 uses spatial feature maps. Direct feature matching requires projection layers. Solution: use intermediate feature map distillation at matching spatial resolutions and add an L2 projection head. Expected accuracy gain is 2-4% mAP.'
  common_mistake: |
    **The Pitfall:** Directly matching ViT attention maps to CNNs.
    **The Rationale:** Candidates forget CNNs don't have attention maps natively.
    **The Consequence:** The distillation pipeline fails without projecting to a common representation space.
  napkin_math: |
    1. **Assumptions & Constraints:** Hailo-8 throughput is 26 TOPS. ResNet-18 INT8 requires 1.8 GOPS per frame. Target framerate is 30 FPS.
    2. **Calculations:** Max theoretical FPS = 26,000 GOPS / 1.8 GOPS = ~14,444 FPS. At 30 FPS, utilization = (30 * 1.8) / 26000 = 0.00207 (0.2%).
    3. **Conclusion & Interpretation:** **Model size is the strict constraint on edge, as compute utilization is a mere 0.2%. Result: Compute-Bound.**
