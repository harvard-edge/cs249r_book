title: Data-Efficient Continuous Learning for Anomaly Detection on NVIDIA Jetson Orin
scenario: You are tasked with deploying a real-time anomaly detection system for industrial machinery
  on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). The system processes high-frequency sensor
  data streams (e.g., 1000 samples/sec per sensor, from 100 sensors, each sample being 16 bytes). Raw
  data cannot be continuously offloaded. The model requires occasional on-device updates (e.g., daily
  fine-tuning) to adapt to changing machine behaviors. Design a data pipeline that addresses the 'data
  wall problem' for continuous learning and mitigates 'model collapse risks' within these resource constraints.
  Specify how you would apply data efficiency techniques and the Information-Compute Ratio (ICR) framework
  to ensure sustained performance and adaptability.
details:
  realistic_solution: 'Implement a dynamic data selection strategy on the Jetson Orin. This includes:
    1) Online Coreset Selection/Data Pruning using techniques like reservoir sampling, diversity-based
    selection (e.g., k-center greedy on embeddings), or uncertainty sampling (active learning) to pick
    novel, informative data points. 2) Curriculum Learning for fine-tuning, where selected data is organized
    from easier to more challenging examples. 3) Judicious use of Synthetic Data Generation on-device
    to augment scarce anomaly data. 4) Continuous monitoring and application of the ICR framework to balance
    data quality/diversity with computational cost, optimizing coreset selection algorithms to stay within
    the 275 TOPS INT8 and 60W budget. 5) Implementing a rolling buffer for selected data, ensuring the
    fine-tuning dataset remains within a manageable size (e.g., 5-10 GB) to preserve overall system stability
    and performance.'
  common_mistake: A common mistake is attempting to store all incoming sensor data for on-device fine-tuning.
    This quickly exhausts the 32 GB LPDDR5 memory (daily raw data exceeds 130 GB), leading to excessive
    I/O, violating the 60W power budget due to constant data processing, and significantly slowing or
    halting model updates. This approach guarantees hitting the 'data wall problem' and risks model collapse
    if fine-tuning data becomes dominated by stale or noisy examples without proper selection.
  napkin_math: 'Raw data generation rate: 100 sensors * 1000 samples/sec/sensor * 16 bytes/sample = 1.6
    MB/sec. Daily raw data generation: 1.6 MB/sec * 3600 sec/hr * 24 hr/day ≈ 138.24 GB/day. This volume
    far exceeds the Jetson Orin''s 32 GB LPDDR5. Applying a 1% coreset selection ratio reduces daily storage
    to ~1.38 GB, making continuous on-device fine-tuning feasible within the memory and power envelope,
    directly addressing the data wall problem.'
