title: 'Fault Tolerance: Implement OTA Model Update with Rollback for Jetson Fleet'
scenario: You need to implement an OTA (over-the-air) model update system for 500 Jetson Orin (32GB LPDDR5,
  275 TOPS, 60W) devices. Models are 200MB (int8). A bad update bricked 10% of devices in the previous
  deployment. Implement an update protocol with automatic rollback that limits blast radius to < 1% of
  fleet.
details:
  realistic_solution: 'Canary deployment: push to 1% (5 devices) first. Monitor for 24 hours. If < 2%
    error rate, expand to 10% → 50% → 100%. Device-side: A/B partitions, new model to B, activate B, validate
    100 inferences, commit or rollback to A.'
  common_mistake: Pushing to all devices simultaneously; not having a validation step before marking an
    update as 'good'; not storing the rollback partition.
  napkin_math: '200MB model. Download per device: 200MB / (LTE 100Mbps/8) = 16 seconds. CDN cost: 500
    devices × 200MB = 100GB = $1 per update cycle. Canary: 5 devices first. 24-hour validation window:
    if previous bad update caused errors within 1 hour, 24h catches it. Blast radius if bad update passes
    canary: 5 devices = 1% (exactly at limit). If 1% canary is clean → expand. Device-side A/B: 2 × 200MB
    = 400MB storage for model partitions. Update atomic write: write to B partition, verify SHA256, switch
    active pointer. Rollback trigger: if 100-inference validation shows latency > 3× baseline or accuracy
    proxy (confidence distribution shift) → activate A in 50ms. Rollback success rate: 100% (partition
    A is read-only during update).'
