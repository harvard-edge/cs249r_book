title: The Transformer-CNN Resolution Trap
scenario: You are an ML Systems Engineer on the perception team for an autonomous truck company. Your team has just upgraded the front-facing cameras from 1280x720 to 1920x1080 to improve long-range object detection. Your current model, a Vision Transformer (ViT), achieved 25ms latency on the old resolution, comfortably meeting the 33ms (30 FPS) hard real-time deadline on a Jetson AGX Orin. After recompiling for the new, higher resolution, you are shocked to see latency jump to over 125ms. You must solve this problem and get the pipeline back under the 33ms deadline.
question: What is the most effective first step?
details:
  realistic_solution: 'The fundamental issue is the computational complexity of the Vision Transformer. The self-attention mechanism scales quadratically with the number of input patches, O(N²). Since the number of patches is proportional to the image resolution, a 2.25x increase in pixels results in a ~5x increase in compute and latency. The correct approach is to switch to an architecture whose cost scales more gracefully. A modern, efficient CNN using depthwise separable convolutions (like EfficientNet or MobileNet-family models) scales linearly with resolution, O(N). While this will still increase latency, it provides a computationally feasible starting point which can then be further optimized to meet the strict 33ms budget.'
  common_mistake: |
    **The Pitfall:** Attempting to brute-force or quantize the ViT to meet the deadline.
    **The Rationale:** Engineers accustomed to cloud-scale resources assume the ViT architecture is portable and minor fixes like quantization or downsampling are sufficient.
    **The Consequence:** Downsampling negates the entire purpose of the expensive camera upgrade, while simple quantization cannot close the massive 5x performance gap created by the ViT's quadratic scaling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old resolution: 1280x720.
    - New resolution: 1920x1080.
    - Architecture: Vision Transformer (computational complexity scales quadratically with patches/pixels, O(N^2)).
    - Baseline latency: 25ms.

    **Calculations:**
    - Resolution Increase Factor: (1920 * 1080) / (1280 * 720) = 2,073,600 / 921,600 = 2.25x.
    - Compute Increase Factor: (2.25)^2 = ~5.06x.
    - New Latency: 25ms * 5.06 = ~126.5ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** The quadratic scaling of the ViT self-attention mechanism causes a 5x latency jump to ~125ms, making simple optimizations like INT4 quantization (which would only yield a theoretical 2x speedup) insufficient.
  options:
  - Downsample the 1920x1080 camera input back to 1280x720 before feeding it to the ViT.
  - The Jetson AGX Orin's 204.8 GB/s memory bandwidth is the bottleneck. The model needs to be moved to a platform with faster on-chip memory.
  - Replace the Vision Transformer with an efficient CNN architecture (e.g., based on depthwise separable convolutions) and re-profile performance.
  - Apply more aggressive INT4 quantization to the ViT. This should provide a ~2x speedup over INT8, which is enough to meet the deadline.
  correct_index: 2
