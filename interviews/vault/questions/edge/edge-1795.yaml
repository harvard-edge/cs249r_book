title: On-Premise LLM Fine-Tuning Memory Specification
scenario: You are designing an on-premise continuous learning pipeline to fine-tune
  a 7B parameter LLM using a Qualcomm Cloud AI 100 accelerator. The device features
  32 GB of LPDDR4x memory and operates strictly under a 75W power limit. While the
  INT8 model weights consume about 7 GB, storing full forward-pass activations for
  a realistic batch size causes out-of-memory errors during the backward pass. Specify
  an activation memory management strategy that leverages the device's 400 TOPS INT8
  compute capability to satisfy the strict 32 GB memory constraint.
question: What activation memory strategy would let the 7B fine-tuning run within
  32 GB by trading Cloud AI 100 compute for memory?
details:
  realistic_solution: The optimal design implements selective gradient checkpointing
    to recompute intermediate activations on-the-fly during the backward pass instead
    of storing all of them in memory. Since the Qualcomm Cloud AI 100 provides a massive
    400 TOPS of compute, the system can easily absorb the ~30% computational overhead
    of recomputation. This strategy drastically reduces the forward-pass activation
    memory footprint, allowing for a stable batch size while safely fitting within
    the 32 GB LPDDR4x limit.
  common_mistake: Candidates often suggest drastically reducing the batch size to
    1 or heavily quantizing activations without analyzing the compute-memory tradeoff.
    They frequently overlook gradient checkpointing (activation recomputation) as
    a way to trade the accelerator's abundant compute throughput for scarce memory
    capacity.
  napkin_math: 'INT8 weights require 7 GB. For a batch size of 16 and sequence length
    of 2048, full FP16 activations across 32 transformer layers consume roughly 25.8
    GB (16 batch * 2048 seq * 4096 hidden * 32 layers * 2 bytes * 3 intermediate tensors).
    Total memory = 7 GB (weights) + 25.8 GB (activations) + 4 GB (optimizer/gradients)
    = 36.8 GB, exceeding the 32 GB LPDDR4x memory and causing OOM. By checkpointing
    every 4th layer, persistent activation storage drops to ~6.5 GB. Recomputing
    intermediate layers adds a transient ~3.2 GB peak overhead. The new peak footprint
    is 7 GB + 6.5 GB + 3.2 GB + 4 GB = 20.7 GB, leaving ample headroom.'
