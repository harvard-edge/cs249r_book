title: Watchdog Timeout Calculation Under Contention
scenario: You are deploying an ASIL-B collision avoidance system on an NVIDIA Jetson Orin. A watchdog timer triggers a safe-state fallback if a prediction is not produced every 50ms. The pipeline has fixed camera pre-processing (12ms) and control post-processing (3ms). A concurrent safety self-test on the DLA introduces a 20% latency penalty to the GPU inference due to shared memory contention, and the RTOS scheduler adds a worst-case 2ms jitter.
question: What is the maximum allowable base GPU inference time so the 50ms watchdog is never tripped under contention and jitter?
details:
  realistic_solution: To satisfy strict functional safety (FuSa) requirements, the worst-case execution time (WCET) must be modeled sequentially. The base GPU inference time must be mathematically isolated and scaled by the known LPDDR5 memory contention penalty. The correct approach sets up a bounded inequality where the sum of fixed latencies and penalized inference time strictly remains below the watchdog threshold.
  common_mistake: |
    **The Pitfall:** Applying the 20% memory contention penalty to the entire end-to-end pipeline latency.
    **The Rationale:** Candidates overlook that fixed camera ISP processing or CPU control logic is not subject to the same GPU-DLA memory contention.
    **The Consequence:** The calculation yields an overly conservative GPU budget or incorrectly flags a safe configuration as failing the watchdog.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard real-time deadline (Watchdog) = 50ms.
       - Fixed components = 12ms (pre) + 3ms (post) + 2ms (jitter) = 17ms.
       - DLA Contention penalty on GPU inference = +20% (1.2x multiplier).
    2. **Calculations:**
       - Remaining time budget for inference = 50ms - 17ms = 33ms.
       - Equation: Base Inference Time ($X$) * 1.2 = 33ms.
       - $X = 33 / 1.2 = 27.5ms$.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound maximum base execution time of 27.5ms.**
