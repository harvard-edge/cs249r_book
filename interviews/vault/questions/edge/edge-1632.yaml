title: Watchdog Timeout Calculation Under Contention
scenario: You are deploying an ASIL-B compliant collision avoidance system on an NVIDIA Jetson Orin operating at its 60W TDP to utilize its 275 TOPS INT8 performance. The system features a watchdog timer that triggers a vehicle safe-state fallback if an end-to-end prediction is not produced every 50ms. The pipeline consists of fixed camera pre-processing (12ms) and control post-processing (3ms). A concurrent safety self-test routine running on the DLA accelerator introduces a 20% latency penalty to the Ampere GPU neural network execution time due to bandwidth contention on the shared 32 GB LPDDR5 memory, and the RTOS scheduler adds a worst-case 2ms jitter.
question: What is the maximum allowable base GPU inference time so the 50 ms watchdog is never tripped under contention and jitter?
details:
  realistic_solution: To guarantee deterministic execution and satisfy the functional safety requirements, the worst-case execution time (WCET) must be calculated using the sum of all sequential pipeline stages. The base GPU inference time must be mathematically isolated and scaled by the known memory contention penalty. The correct approach sets up an inequality where the sum of fixed latencies and penalized inference time is less than or equal to the watchdog threshold.
  common_mistake: |
    **The Pitfall:** Applying the 20% memory contention penalty to the entire end-to-end pipeline latency.
    **The Rationale:** Candidates overlook that fixed camera ISP processing or CPU control logic is not subject to the same GPU-DLA memory contention.
    **The Consequence:** The calculation yields an overly conservative GPU budget or incorrectly flags a safe configuration as failing the watchdog.
  napkin_math: |
    1. Hard real-time deadline (Watchdog limit) = 50ms.
    2. Sum fixed components: Pre-processing (12ms) + Post-processing (3ms) + RTOS jitter (2ms) = 17ms.
    3. Remaining time budget for penalized inference = 50ms - 17ms = 33ms.
    4. Equation with 20% contention penalty: X * 1.2 = 33ms.
    5. **X = 33ms / 1.2 = 27.5ms. The maximum allowable base neural network execution time is 27.5ms.**
