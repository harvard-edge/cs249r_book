title: Drone Base Station Power Policy
scenario: A remote solar-powered drone base station must process drone footage but
  is strictly limited to 1 kWh per day. The Orin uses 15W in 15W mode.
question: Design a dynamic power management policy that switches the Orin from 15W
  mode to a deep sleep 1W state based on drone proximity RF signals.
details:
  realistic_solution: The 1 kWh daily budget allows for a continuous ~41W draw. However,
    a continuous 15W draw consumes 360Wh. To optimize thermal life and save power
    for night operations, the system monitors an RF interrupt. The Orin idles in 1W
    SC7 sleep (24Wh/day). When the drone is within 1km, it wakes to 15W mode for the
    10-minute fly-by. Total power drops drastically.
  common_mistake: Running the Orin constantly at 15W because it fits under the 41W
    theoretical limit, wasting battery during multiday cloudy periods.
  napkin_math: 1000Wh / 24h = 41.6W continuous budget
