title: Edge TPU Subgraph Partitioning Transfer Overhead
scenario: You are deploying an INT8 quantized vision model on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). The model graph contains a supported Conv2D operator, an unsupported custom Swish activation, and another supported Conv2D operator. The Edge TPU compiler schedules this by partitioning it into three subgraphs: TPU, CPU, and TPU. The intermediate feature map size is 1MB and the USB connection has an effective bandwidth of 400 MB/s.
question: Why does inserting an unsupported Swish between two TPU Conv2Ds cause high latency, and what USB transfer penalty does the 1MB feature map create?
details:
  realistic_solution: The disproportionate latency is caused by context switching between the Edge TPU and the host CPU. Because the Swish operator is unsupported, the scheduler must transfer the 1MB activation tensor out of the TPU over USB, compute it on the CPU, and send the 1MB result back to the TPU. This memory transfer overhead completely eclipses the fast INT8 compute times of the 4 TOPS accelerator, bottlenecking the entire pipeline.
  common_mistake: |
    **The Pitfall:** Blaming the CPU's compute speed instead of memory transfer overhead.
    **The Rationale:** Candidates assume the slowdown is purely due to the CPU being computationally slower at evaluating the Swish activation.
    **The Consequence:** Failing to identify that the catastrophic latency is caused by operator scheduling crossing the slow USB bus boundary twice.
  napkin_math: |
    1. **Data Transferred:** 1 MB (TPU to CPU) + 1 MB (CPU to TPU) = 2 MB total.
    2. **Transfer Time:** 2 MB / 400 MB/s = 0.005 seconds (5 ms).
    3. **Compute Comparison:** A typical Conv2D on a 4 TOPS INT8 accelerator takes <1 ms.
    **Result: The 5 ms USB scheduling transfer overhead dominates the sub-millisecond compute time.**
