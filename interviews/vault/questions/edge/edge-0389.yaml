title: The Federated Fleet Cost Equation
scenario: An automotive company is updating the perception models on a fleet of 10,000 vehicles. They are considering two strategies: (1) uploading all raw camera data to the cloud for central retraining, or (2) using Federated Learning to train on-device and only upload model gradients.
question: From a Total Cost of Ownership (TCO) perspective, what is the single biggest economic advantage of the Federated Learning approach in this scenario?
details:
  realistic_solution: The primary economic advantage is the massive reduction in data transmission costs. Raw sensor data from a single car can be gigabytes per hour, while a model update is typically megabytes. Egress data costs from thousands of devices over cellular networks often dominates the entire TCO calculation.
  common_mistake: |
    **The Pitfall:** Focusing purely on cloud compute storage costs and ignoring cellular transmission fees.
    **The Rationale:** Engineers underestimate the massive, recurring cost of transferring data over commercial cellular networks.
    **The Consequence:** Building an architecture that bankrupts the product via monthly cellular egress fees.
  napkin_math: |
    - **Centralized:** 10,000 vehicles * 100 GB/day = 1,000,000 GB (1 PB) daily. At $0.05/GB, this costs $50,000/day ($18M/year).
    - **Federated Learning:** 10,000 vehicles * 100 MB/day = 1,000 GB (1 TB) daily. Cost = $50/day ($18k/year).
    - **Final Result:** **Federated learning achieves a 1000× reduction in bandwidth, saving tens of millions in cellular data costs annually.**
  options:
  - Lower on-device compute requirements.
  - Reduced cloud storage costs for raw data.
  - Drastically reduced data transmission costs.
  - Faster model convergence during training.
  correct_index: 2
