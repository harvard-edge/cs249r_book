title: The Sensor Fusion PCIe Trap
scenario: 'Your team is building the perception stack for an autonomous vehicle. The system uses two Jetson AGX Orin modules connected via a PCIe Gen4 x8 link. GPU 0 processes LiDAR data, and GPU 1 processes a high-resolution camera stream. For sensor fusion, GPU 1 sends a 128 MB feature map to GPU 0. The current end-to-end latency is 25ms, safely within the 33ms hard real-time budget. A new camera sensor is proposed that would double the feature map size to 256 MB.'
question: What happens if the camera feature map grows from 128MB to 256MB over PCIe Gen4 x8, and why isn't an external InfiniBand link the right fix?
details:
  realistic_solution: 'The assumption of linear scaling is dangerously flawed. A long, sustained PCIe transfer can monopolize the receiving GPU''s memory controller and trigger head-of-line blocking. This can starve the GPU''s own compute kernels (like the LiDAR pipeline on GPU 0) of memory access, effectively stalling them. This non-linear latency spike causes the LiDAR pipeline to miss its deadlines, leading to cascade failure. Implementing Nsight Systems profiling would immediately reveal the memory controller saturation.'
  common_mistake: |
    **The Pitfall:** Assuming linear degradation and treating SOMs like Datacenters.
    **The Rationale:** Engineers perform a simple linear bandwidth calculation (double data = double time) and assume the rest of the pipeline is unaffected, ignoring head-of-line blocking. They then recommend InfiniBand without realizing it's inappropriate for embedded SOM interconnects.
    **The Consequence:** The perception task crashes due to internal memory starvation, and the hardware fix (InfiniBand) introduces completely unworkable form-factor and latency penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen4 x8 theoretical bandwidth: 16 GB/s.
    - Transfer size: 256 MB.

    **Calculations:**
    - Transfer time: 256 MB / 16 GB/s = 16 ms.

    **Conclusion & Interpretation:**
    - **Result: 16 ms (I/O-Bound Starvation)**. Prolonged 16 ms starvation throttles concurrent LiDAR GPU compute, causing deadline misses and perception crashes.
