title: On-Premise Continuous Learning Data Selection
scenario: Design a continuous learning data pipeline for an on-premise manufacturing
  quality control system powered by Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x,
  400 TOPS INT8, 75W). High-resolution factory cameras generate vast amounts of data,
  but strict privacy and limited uplink bandwidth prevent sending everything to the
  cloud. You must architect a system that performs on-device data pruning and coreset
  selection to identify only the most informative novel defects, while leveraging
  synthetic data generation to augment rare classes. Evaluate the architectural tradeoffs
  between aggressive on-premise data pruning, transmission costs, and the risk of
  model collapse from over-reliance on synthetic data.
question: How would you design on-device pruning and coreset selection on Cloud AI
  100 while avoiding uplink overload and synthetic-data collapse?
details:
  realistic_solution: The optimal design leverages the Qualcomm Cloud AI 100 to run
    the production model and simultaneously compute uncertainty metrics (e.g., entropy
    or margin sampling) on the INT8 outputs in real-time. Only images exhibiting high
    uncertainty or novel feature embeddings (coreset selection) are temporarily buffered
    in the 32 GB memory and transmitted over the constrained uplink. In the cloud,
    this high-value data is blended with domain-randomized synthetic data for fine-tuning,
    while explicitly maintaining a historical real-data holdout set to detect and
    prevent model collapse.
  common_mistake: Candidates often propose uniformly sampling data or sending raw
    video feeds, ignoring severe uplink constraints. They also frequently underutilize
    the edge hardware, failing to realize they can use the massive 400 TOPS INT8 compute
    on the Qualcomm Cloud AI 100 to perform sophisticated entropy or loss-based data
    scoring locally before transmission.
  napkin_math: Assume 10 factory cameras at 60 FPS, 8MB per image = 4.8 GB/s total
    generated data. If the factory uplink is 100 Mbps (12.5 MB/s), the required data
    pruning ratio is 12.5 MB/s / 4800 MB/s = 0.26% (only ~1 in 400 frames can be sent).
    The Qualcomm AI 100's 400 TOPS INT8 easily handles a 50 GOPS scoring model for
    all 600 combined FPS (600 * 50 GOPS = 30 TOPS, just 7.5% compute utilization).
    The 32 GB LPDDR4x memory can comfortably buffer over 3,000 high-resolution anomaly
    frames (approx. 24 GB) locally, batching transmissions during off-peak network
    usage.
