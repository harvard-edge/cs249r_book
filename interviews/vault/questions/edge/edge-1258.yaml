title: 'On-Premise Continuous Learning Data Selection'
scenario: 'An on-premise manufacturing quality control system is powered by Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W). High-resolution factory cameras generate vast amounts of data, but strict privacy and limited uplink bandwidth prevent sending everything to the cloud. The system must perform on-device data pruning and coreset selection to identify only the most informative novel defects, while leveraging synthetic data generation to augment rare classes.'
question: 'How would you design on-device pruning and coreset selection on Cloud AI 100 while avoiding uplink overload and synthetic-data collapse?'
details:
  realistic_solution: |
    The optimal design leverages the Qualcomm Cloud AI 100 to run the production model and simultaneously compute uncertainty metrics (e.g., entropy or margin sampling) on the INT8 outputs in real-time. Only images exhibiting high uncertainty or novel feature embeddings (coreset selection) are temporarily buffered in the 32 GB memory and transmitted over the constrained uplink. In the cloud, this high-value data is blended with domain-randomized synthetic data for fine-tuning, while explicitly maintaining a historical real-data holdout set to detect and prevent model collapse.
  common_mistake: |
    **The Pitfall:** Proposing uniform random sampling or attempting to send raw video feeds to the cloud.
    **The Rationale:** A failure to grasp the severe physical constraints of the factory uplink bandwidth.
    **The Consequence:** Instantly saturating the network, causing data drops, and failing to capture the rare, high-value anomaly frames needed for continuous learning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Generation: 10 cameras * 60 FPS = 600 FPS. Image size: 8 MB.
    - Uplink Capacity: 100 Mbps = 12.5 MB/s.
    - Scoring Compute: 50 GOPS/frame. Budget: 400 TOPS.
    - Buffer Capacity: 32 GB RAM.

    **Calculations:**
    - Raw Data Rate: 600 FPS * 8 MB/image = 4,800 MB/s.
    - Pruning Ratio Needed: 12.5 MB/s / 4,800 MB/s = 0.26% (send ~1 in 400 frames).
    - Scoring Cost: 600 FPS * 50 GOPS/frame = 30 TOPS (7.5% of budget).
    - Buffer: 24 GB available for ~3,000 anomaly frames.

    **Conclusion & Interpretation:**
    - **Result: 0.26% retention ratio (Network-Bound).** An on-device active learning filter is mathematically necessary and computationally trivial for this hardware.
