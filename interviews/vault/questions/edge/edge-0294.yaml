title: The Quadratic Bottleneck
scenario: Your team is designing a perception system for a self-driving car, deploying to an edge device like a Jetson AGX Orin. You are comparing a classic CNN against a newer Vision Transformer (ViT) architecture. To manage the compute budget, you need to identify the primary scaling bottlenecks.
question: Which of the following operations has a computational complexity (FLOPs) that scales quadratically with the number of input patches?
details:
  realistic_solution: 'A self-attention layer scales quadratically. The core computational bottleneck is the dot-product similarity calculation between all pairs of input patches (O(N^2 * d)). Standard convolutions, by contrast, scale linearly with spatial resolution.'
  common_mistake: |
    **The Pitfall:** Conflating static parameter count with dynamic computational scaling.
    **The Rationale:** Engineers focus heavily on the fixed weights of dense layers but ignore the massive sequence-length scaling penalty inside Attention mechanisms.
    **The Consequence:** Deploying ViTs on high-resolution edge perception tasks, resulting in catastrophic latency cliffs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input image: 224x224.
       - Patch size: 16x16.
       - Embedding dimension: d.
    2. **Calculations:**
       - Number of patches (N) = (224/16)^2 = 14^2 = 196.
       - Self-attention complexity = O(N^2 * d).
       - Scale factor = 196^2 = 38,416 dot products per embedding dim.
    3. **Conclusion & Interpretation:**
       - **Result: Quadratic Scaling (N^2)**. Self-attention intrinsically forces an N^2 bottleneck, strictly limiting maximum resolution on resource-constrained edge NPUs.
  options:
  - A 3x3 standard convolution
  - A self-attention layer
  - A ReLU activation function
  - A depthwise separable convolution
  correct_index: 1
