title: The Quadratic Bottleneck
scenario: Your team is designing a perception system for a self-driving car, deploying to an edge device
  like a Jetson AGX Orin. You are comparing a classic CNN against a newer Vision Transformer (ViT) architecture.
  To manage the compute budget, you need to identify the primary scaling bottlenecks. Which of the following
  operations has a computational complexity (FLOPs) that scales quadratically with the number of input
  patches?
question: "Which of the following operations has a computational complexity (FLOPs) that scales quadratically with the number of input patches?"
details:
  realistic_solution: A self-attention layer is the correct answer. Its computational complexity is dominated
    by the dot-product similarity calculation between all pairs of input patches. If there are 'N' patches,
    this results in a complexity of O(N^2 * d), where 'd' is the embedding dimension. In contrast, a standard
    convolution with a fixed kernel size has a complexity of O(N * d^2), which scales linearly with the
    number of patches. This quadratic scaling makes self-attention a significant bottleneck on edge devices
    as input resolution increases.
  common_mistake: Engineers often conflate parameter count with computational cost. They may also incorrectly
    assume that a standard convolution is always the most expensive operation in any vision model. While
    it is compute-intensive, its complexity scales linearly with the number of input pixels/patches, unlike
    the quadratic scaling of self-attention.
  napkin_math: For a standard ViT processing a 224x224 image with 16x16 patches, the number of patches
    (sequence length 'N') is (224/16)^2 = 14^2 = 196.
  options:
  - A 3x3 standard convolution
  - A self-attention layer
  - A ReLU activation function
  - A depthwise separable convolution
  correct_index: 1
