title: The Quadratic Bottleneck
scenario: Your team is designing a perception system for a self-driving car, deploying to an edge device like a Jetson AGX Orin. You are comparing a classic CNN against a newer Vision Transformer (ViT) architecture. To manage the compute budget, you need to identify the primary scaling bottlenecks.
question: Which of the following operations has a computational complexity (FLOPs) that scales quadratically with the number of input patches?
details:
  realistic_solution: A self-attention layer is the correct answer. Its computational complexity is dominated by the dot-product similarity calculation between all pairs of input patches. If there are 'N' patches, this results in a complexity of O(N^2 * d), where 'd' is the embedding dimension. In contrast, a standard convolution with a fixed kernel size has a complexity of O(N * d^2), which scales linearly with the number of patches. This quadratic scaling makes self-attention a significant bottleneck on edge devices as input resolution increases.
  common_mistake: |
    **The Pitfall:** Conflating parameter count with computational cost or assuming standard convolutions are the most expensive.
    **The Rationale:** Engineers often focus on the static number of weights rather than the dynamic scaling of self-attention.
    **The Consequence:** They might select architectures that scale poorly for high-resolution edge perception tasks.
  napkin_math: |
    - Input image: 224x224.
    - Patch size: 16x16.
    - Number of patches (sequence length 'N'): (224/16)^2 = 14^2 = 196.
    - Self-attention complexity: O(N^2 * d), which is **quadratic with respect to N**.
  options:
  - A 3x3 standard convolution
  - A self-attention layer
  - A ReLU activation function
  - A depthwise separable convolution
  correct_index: 1
