title: The AV Pipeline Stall
scenario: 'You are an ML systems engineer at an autonomous vehicle company. Your perception stack runs
  a large 3D object detection model across two interconnected Jetson AGX Orin accelerators to meet a 33ms
  (30 FPS) real-time deadline. The model is split using pipeline parallelism: Orin A runs the first half
  of the model, and Orin B runs the second half. Profiling shows the total compute time is 25ms, perfectly
  balanced (12.5ms per Orin). However, the measured end-to-end latency is 30.5ms. You find that the feature
  map transferred from Orin A to Orin B between stages is 64 MB. The Orins are connected by a dedicated
  100 Gbps (12.5 GB/s) link. What is the most likely cause of the 5.5ms overhead you are observing?'
details:
  realistic_solution: The communication link between the two accelerators is the bottleneck. The time
    required to transfer the 64 MB feature map over the 100 Gbps link is the primary source of the overhead.
    The pipeline can't be perfectly parallel because Orin B must wait for the data from Orin A. By calculating
    the transfer time, we can confirm this is the bottleneck before attempting other optimizations like
    model compression or changing the parallelism strategy.
  common_mistake: Blaming the compute (i.e., the model is 'too big') or generic 'software overhead' without
    doing the math. Engineers often underestimate the time cost of moving large tensors between processors,
    even on seemingly fast networks, and fail to isolate it as the primary bottleneck.
  napkin_math: Data transfer = 64 MB. Link speed = 100 Gbps (12.5 GB/s). Transfer time = 64 MB / 12.5
    GB/s = 5.12 ms. In a 30 FPS pipeline (33.3 ms deadline), dedicating 5.12 ms (15% of the total budget)
    purely to network overhead creates a massive stall. Pipeline Parallelism requires Orin B to wait for
    Orin A, breaking the tight real-time constraints.
  options:
  - The model's operators are not fully supported by the Jetson AGX Orin's hardware, causing frequent
    CPU fallbacks.
  - The 100 Gbps interconnect is the bottleneck; transferring the 64 MB feature map is taking ~5.1ms.
  - Real-time OS scheduling jitter and CUDA kernel launch overhead are consuming the extra 5.5ms.
  - The memory bandwidth on one of the Orin modules is saturated, slowing down its 12.5ms computation.
  correct_index: 1
