title: Mitigating Bandwidth Bottlenecks for 4-bit AWQ on Jetson Orin
scenario: You are deploying a 7B parameter transformer model for real-time local processing on an NVIDIA Jetson Orin. To fit within the 60W TDP and reduce memory footprint, you apply 4-bit AWQ, reducing the model size from 14 GB (FP16) to 3.5 GB, easily fitting into the 32 GB LPDDR5 memory. However, during the auto-regressive decoding phase on the Ampere GPU, you notice the latency is 2x slower than expected and compute utilization is extremely low, despite the device's 275 TOPS INT8 capability. Analyze the interaction between the 4-bit quantized weights, the dequantization overhead, and the memory subsystem to identify the bottleneck and quantify a solution.
question: Why is the 4-bit AWQ 7B model slow during decoding on Jetson Orin, and what fused-kernel fix would remove the bottleneck?
details:
  realistic_solution: |
    The bottleneck is the memory bandwidth saturation caused by reading 4-bit weights and writing/reading intermediate FP16 dequantized weights back to LPDDR5. The solution is to implement fused CUDA kernels that load 4-bit weights, perform on-the-fly dequantization in registers/shared memory, and immediately execute the matrix-vector multiplication.
  common_mistake: |
    **The Pitfall:** Assuming moving to 4-bit quantization automatically yields proportional speedups.
    **The Rationale:** Neglecting the intermediate dequantization step required before matrix multiplication.
    **The Consequence:** Creating massive global memory traffic overhead that kills inference throughput.
  napkin_math: |
    - **4-bit Model Size:** 3.5 GB weights per token.
    - **LPDDR5 Bandwidth:** ~204 GB/s. Max theoretical throughput = 204 / 3.5 = 58 tokens/s.
    - **Unfused Overhead:** Reading 4-bit (3.5 GB) + Writing FP16 (14 GB) + Reading FP16 (14 GB) = 31.5 GB memory traffic per token.
    - **Current Throughput:** 204 / 31.5 = 6.4 tokens/s.
    - **Optimization:** Fused kernels remove 28 GB of intermediate traffic, yielding a **~9x speedup** (to 58 tokens/s).
