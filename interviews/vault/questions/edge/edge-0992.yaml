title: Edge Pipeline Stage Balance
scenario: A two-stage edge pipeline has stage A taking 18 ms and stage B taking 11
  ms. A frame arrives every 33 ms. Estimate steady-state throughput and identify the
  bottleneck stage.
question: Can a two-stage edge pipeline with 18 ms and 11 ms stages keep up with 33
  ms frames?
details:
  realistic_solution: The steady-state pipeline initiation interval is the slower
    stage, 18 ms, which is below the 33 ms frame period. Even a purely serial path
    would be 18 + 11 = 29 ms, also below 33 ms, but with less margin. Stage A is the
    bottleneck.
  common_mistake: Adding stage times and concluding 29 ms is the steady-state interval,
    or ignoring the bottleneck stage.
  napkin_math: Steady-state interval = max(18,11)=18 ms. Slack between frame period
    and bottleneck stage interval = 33 - 18 = 15 ms. Serial latency = 29 ms.
