title: On-Device LoRA Rank Selection Trade-offs
scenario: You are deploying a 7B parameter base LLM on an NVIDIA Jetson AGX Orin (32GB unified memory)
  for on-device personalized text generation. The base model weights are quantized to INT8, occupying
  ~7GB. Full parameter fine-tuning is impossible due to memory limits, as Adam optimizer states and activations
  would exceed 50GB. You propose using Low-Rank Adapters (LoRA) on the attention projections ($W_q$ and
  $W_v$) for on-device learning. Evaluate the architectural and memory trade-offs between choosing rank
  r=8 versus r=64 across all 32 transformer layers (hidden size d=4096), specifically regarding optimizer
  memory footprint, backward pass bandwidth, and personalization data sparsity.
details:
  realistic_solution: Justify choosing r=8 over r=64 for edge learning. r=8 adds only ~4.2M trainable
    parameters across 32 layers, requiring ~33.5MB for FP32 Adam states. While r=64 (requiring ~268MB
    for states) also fits in memory, r=8 minimizes memory bandwidth during the backward pass, reduces
    edge energy consumption, and provides sufficient capacity for personalization without overfitting
    to the small local dataset.
  common_mistake: Focusing solely on the forward-pass parameter count while ignoring that the Adam optimizer
    requires 8 bytes per trainable parameter (momentum and variance states in FP32), and failing to recognize
    that higher ranks risk overfitting on sparse local data.
  napkin_math: 'For r=8 on W_q and W_v (d=4096):

    Params per layer = 2 modules * (d * r + r * d) = 2 * (4096 * 8 + 8 * 4096) = 131,072.

    Total params (32 layers) = 131,072 * 32 ≈ 4.19M.

    Adam states memory (8 bytes/param) = 4.19M * 8 ≈ 33.5 MB.

    For r=64, params ≈ 33.5M, Adam states ≈ 268 MB.

    Both fit within the 32GB RAM, but r=8 requires 8x less gradient memory bandwidth per optimization
    step.'
