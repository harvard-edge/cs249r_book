title: The Overnight OTA Update (edge-0740)
scenario: You're an engineer on the autonomous driving team. A critical bug requires you to push an emergency
  OTA (Over-the-Air) update to a fleet of vehicles. The update package, containing a new perception model
  and system patches, is 300 MB. The vehicles connect via a cellular link with an average download speed
  of 10 Mbps. Explain how you would calculate the minimum time required to download this update to a single
  vehicle.
question: "How would you calculate the minimum download time for a 300 MB OTA package over a 10 Mbps cellular link?"
details:
  realistic_solution: The correct approach is to make the units consistent before dividing. First, convert
    the payload size from MegaBytes (MB) to Megabits (Mb). Then, divide by the network bandwidth in Megabits
    per second (Mbps) to find the total time in seconds.
  common_mistake: The most common mistake is confusing megabits per second (Mbps) with megabytes per second
    (MB/s). Network speeds are measured in bits, while file sizes are measured in bytes. Forgetting the
    8x conversion factor between bytes and bits is a classic, fundamental error that leads to drastically
    underestimating download times.
  napkin_math: 'Package size: 300MB = 2,400Mb. Vehicle LTE connection: 10 Mbps average. Download time
    = 2,400 / 10 = 240 seconds. Unpacking and installing on Orin (204.8GB/s memory bandwidth, high IO)
    takes ~10 seconds. Reboot = 35 seconds. Total emergency deployment time per vehicle = 240s + 10s +
    35s = 285 seconds (<5 mins).'
  options:
  - 30 seconds
  - 4 minutes
  - 3.3 minutes
  - 40 minutes
  correct_index: 1
