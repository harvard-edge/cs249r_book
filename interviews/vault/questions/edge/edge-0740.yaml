title: The Overnight OTA Update
scenario: A critical bug requires pushing a 300 MB emergency OTA update to a fleet of autonomous vehicles. The vehicles connect via a cellular link with an average download speed of 10 Mbps.
question: How would you calculate the minimum time required to download this 300 MB OTA package over a 10 Mbps cellular link?
details:
  realistic_solution: |
    The correct approach is to make the units consistent before dividing. First, convert the payload size from MegaBytes (MB) to Megabits (Mb). Then, divide by the network bandwidth in Megabits per second (Mbps) to find the total time in seconds.
  common_mistake: |
    **The Pitfall:** Confusing megabits per second (Mbps) with megabytes per second (MB/s).
    **The Rationale:** Network speeds are commonly advertised in bits, while file sizes are measured in bytes.
    **The Consequence:** Forgetting the 8x conversion factor leads to drastically underestimating the download time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Package size: 300 MB = 2,400 Megabits (Mb).
    - Connection speed: 10 Mbps.

    **Calculations:**
    - Download time: 2,400 Mb / 10 Mbps = 240 seconds (4 minutes).

    **Conclusion & Interpretation:**
    - **Result: 240 seconds (I/O-Bound)**. Converting units properly prevents drastic underestimations.
