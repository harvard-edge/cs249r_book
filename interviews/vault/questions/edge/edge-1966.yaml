title: Optimizing Large Language Models for Edge Deployment on NVIDIA Jetson Orin using Knowledge Distillation
scenario: Your team is deploying a large language model (LLM) for real-time natural language understanding on an edge device (32 GB RAM, 275 TOPS INT8, 60W). The current state-of-the-art 10B parameter LLM exceeds the device's compute and memory capabilities for real-time inference (sub-20ms latency per query).
question: How would you distill the 10B LLM into an INT8 student for the edge device that fits 32GB, stays under 60W, and reaches sub-20ms queries?
details:
  realistic_solution: The most realistic solution would involve a multi-stage knowledge distillation approach. First, select the 10B parameter LLM as the teacher model. Then, design a much smaller student LLM (e.g., 500M-1B parameters) with an inherently efficient architecture. The distillation strategy should combine logit distillation (student mimics softened teacher outputs) with feature distillation (student hidden states match teacher's intermediate features) using a combined loss function. After initial distillation, apply Quantization-Aware Training (QAT) to the student model, targeting INT8 precision, to mitigate accuracy loss during quantization. Finally, utilize NVIDIA TensorRT to optimize the distilled and quantized student model for the Jetson Orin, compiling it into an efficient inference engine that maximizes INT8 utilization and leverages the platform's specific hardware accelerators. This entire process would involve iterative refinement based on monitoring latency, throughput, power consumption, and accuracy on the target hardware.
  common_mistake: |
    **The Pitfall:** Jumping directly to INT8 quantization or heavy pruning on the 10B model without distillation.
    **The Rationale:** Relying on simple compression tools instead of architecting a smaller, purpose-built student model.
    **The Consequence:** Either a catastrophic drop in model accuracy or failure to meet the strict sub-20ms real-time latency budget due to remaining architectural bloat.
  napkin_math: |
    * **Teacher Footprint**: 10B params in FP16 = 20 GB. Fits tightly, but inference compute (10.24 TFLOPs) vastly exceeds edge capacity.
    * **Student Sizing**: A 500M parameter model in FP16 = 1 GB. In INT8 = 0.5 GB.
    * **Compute Required**: 500M param INT8 model at 50 inferences/sec (sub-20ms) = 0.512 TOPS × 50 = 25.6 TOPS.
    * **Conclusion**: 25.6 TOPS is easily handled by the **275 TOPS** accelerator, leaving massive headroom and minimizing power draw below 60W.
