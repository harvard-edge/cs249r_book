title: Optimizing Large Language Models for Edge Deployment on NVIDIA Jetson Orin using Knowledge Distillation
scenario: Your team is deploying a large language model (LLM) for real-time natural language understanding on an edge device. The current state-of-the-art 10B parameter LLM exceeds the device's compute and memory capabilities for real-time inference.
question: How would you distill the 10B LLM into an INT8 student for the edge device that fits 32GB, stays under 60W, and reaches sub-20ms queries?
details:
  realistic_solution: |
    Directly deploying or naively quantizing a 10B model will fail latency constraints. The architecture demands Knowledge Distillation (KD) targeting a purpose-built sub-1B parameter student model. Utilize a combined loss function applying logit distillation and hidden-state feature alignment. Follow this with Quantization-Aware Training (QAT) to stabilize the student's weights at INT8 precision. Finally, compile the student using TensorRT, explicitly fusing layers and targeting the device's specific INT8 Tensor Cores to ensure the sub-20ms latency SLA is met without exceeding the thermal design power (TDP).
  common_mistake: |
    **The Pitfall:** Jumping directly to INT8 quantization or heavy pruning on the 10B model without distillation.
    **The Rationale:** Relying on simple compression tools instead of architecting a smaller, purpose-built student model.
    **The Consequence:** Either a catastrophic drop in model accuracy or failure to meet the strict sub-20ms real-time latency budget due to remaining architectural bloat.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher: 10B params. Target Latency: <20ms.
    - Hardware: 275 TOPS INT8.
    - Target Student: 500M params.

    **Calculations:**
    - Student Inference Compute: ~1 GFLOP/token (FP16). INT8 = 0.512 TOPS/pass.
    - Throughput Required: 50 tokens/sec (20ms/token).
    - Total Compute: 0.512 TOPS * 50 = 25.6 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 25.6 TOPS is well within the 275 TOPS limit (Memory and Latency-Bound)**. Resolved via distillation.
