title: Evaluating Extreme Gradient Quantization
scenario: Your team is deploying a Federated Learning pipeline to fine-tune a 100M
  parameter LLM adapter on user smartphones. Users typically connect to networks while
  charging overnight, providing a reliable upload window of exactly 5 minutes with
  an average uplink speed of 1 Mbps.
question: Is 4-bit gradient quantization sufficient in the 5-minute, 1 Mbps upload
  window, or is 1-bit with error feedback required?
details:
  realistic_solution: Calculate the total upload budget (37.5 MB) and determine that
    4-bit gradients (50 MB) exceed the limit. Select 1-bit quantization (12.5 MB payload)
    paired with local error feedback, which accumulates the quantization error locally
    and adds it to the next gradient step to ensure convergence.
  common_mistake: '**The Pitfall:** Relying on standard 4-bit quantization without
    checking the absolute physical limits.

    **The Rationale:** Candidates assume 4-bit compression is sufficient for any edge
    deployment because it works well for model serving.

    **The Consequence:** The 50 MB upload fails to complete in the strict 5-minute
    upload window, breaking the federated learning sync.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Upload Window: 5 minutes (300 seconds).

    - Uplink Speed: 1 Mbps (0.125 MB/s).

    - Model Size: 100M parameters.


    **Calculations:**

    - Total Upload Budget: 300 s * 0.125 MB/s = 37.5 MB.

    - Uncompressed FP16 Gradients: 100,000,000 * 2 bytes = 200 MB.

    - 4-bit Quantized Gradients: 100,000,000 * 0.5 bytes = 50 MB.

    - 1-bit Quantized Gradients: 100,000,000 / 8 bytes = 12.5 MB.


    **Conclusion & Interpretation:**

    - **Result: Network-Bound.** 4-bit quantized gradients (50 MB) exceed the 37.5
    MB budget. 1-bit quantized gradients (12.5 MB) with local error feedback are required
    to safely fit within the upload window.

    '
