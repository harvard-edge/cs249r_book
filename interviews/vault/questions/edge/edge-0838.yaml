title: Evaluating Extreme Gradient Quantization
scenario: Your team is deploying a Federated Learning pipeline to fine-tune a 100M parameter LLM adapter
  on user smartphones. Users typically connect to networks while charging overnight, providing a reliable
  upload window of exactly 5 minutes with an average uplink speed of 1 Mbps. You need to evaluate whether
  applying standard 4-bit gradient quantization is sufficient, or if 1-bit quantization with local error
  feedback is required to complete the sync.
details:
  realistic_solution: Calculate the total upload budget (37.5 MB) and determine that 4-bit gradients (50
    MB) exceed the limit. Select 1-bit quantization (12.5 MB payload) paired with local error feedback,
    which accumulates the quantization error locally and adds it to the next gradient step to ensure convergence.
  common_mistake: Assuming 4-bit or 8-bit quantization provides enough compression without calculating
    the absolute data transfer against the strict time and bandwidth constraints, or using 1-bit updates
    without an error feedback mechanism, leading to model divergence.
  napkin_math: 'Upload window: 5 mins = 300 seconds.

    Uplink speed: 1 Mbps = 0.125 MB/s.

    Total upload budget: 300 s * 0.125 MB/s = 37.5 MB.

    Uncompressed FP16 Gradients: 100M params * 2 bytes = 200 MB.

    4-bit Quantized Gradients: 100M params * 0.5 bytes = 50 MB (Exceeds 37.5 MB budget).

    1-bit Quantized Gradients: 100M params / 8 bits = 12.5 MB (Safely within budget).'
