title: Qualcomm Cloud AI 100 Toolchain and Specs Recall
scenario: 'Your team is evaluating the Qualcomm Cloud AI 100 for on-premise inference to replace an aging GPU cluster. The accelerator provides 32 GB LPDDR4x memory, 400 TOPS of INT8 compute, and operates within a 75W power envelope.'
question: What is the name of the primary software SDK and compiler toolchain provided by Qualcomm used to convert and optimize standard ONNX models for this specific hardware?
details:
  realistic_solution: 'The correct answer is the Qualcomm Cloud AI SDK (or Qualcomm AI Engine Direct / QNN). The candidate should recall that compiling for the AI 100 requires this bespoke compiler to successfully map standard ONNX operators to the underlying Hexagon tensor processors.'
  common_mistake: |
    **The Pitfall:** Naming generic conversion tools like TensorRT or OpenVINO.
    **The Rationale:** Candidates guess based on familiar NVIDIA/Intel stacks or confuse it with the mobile Snapdragon Neural Processing Engine (SNPE).
    **The Consequence:** The model cannot be compiled or optimized for the Hexagon DSP architecture.
  napkin_math: |
    *   **Compute Efficiency:** 400 TOPS / 75W = 5.33 TOPS/W.
    *   **Theoretical Inference:** A 1-teraflop inference op takes 1 TOPS / 400 TOPS = 2.5 milliseconds.
    *   **Result:** **Understanding the specific SDK ensures the massive 400 TOPS capacity is actually harnessed.**
