title: GPTQ 3-bit Latency Degradation on Ampere
scenario: Your team deployed a 70B parameter LLM onto an NVIDIA Jetson Orin edge device
  for a robotics application. To fit the model into the Orin's 32 GB LPDDR5 memory,
  the team aggressively quantized the model weights to 3-bit using GPTQ. However,
  during production inference, the token generation latency is exceptionally high,
  and profiling shows that the Ampere GPU compute units are severely underutilized
  despite the availability of the DLA accelerator. Explain why this specific quantization
  strategy causes performance degradation rather than a speedup on this hardware.
question: Why does 3-bit GPTQ make the 70B model fit on Jetson Orin but still degrade
  token-generation performance?
details:
  realistic_solution: While 3-bit quantization successfully reduces the model size
    to fit into memory, the Ampere architecture on the Jetson Orin lacks native hardware
    support for 3-bit matrix multiplications. The GPU must unpack and cast the 3-bit
    weights into a supported format (like INT8 or FP16) on the fly before computing
    the activations. This continuous runtime dequantization creates a massive compute
    bottleneck, stalling the CUDA cores and preventing the system from leveraging
    its high INT8 throughput.
  common_mistake: Candidates typically assume that a smaller memory footprint always
    translates to faster inference due to reduced memory bandwidth pressure. They
    often overlook the hardware-specific constraints, assuming the Jetson Orin can
    perform matrix multiplications directly on 3-bit integers.
  napkin_math: '1. Model Size: 70 billion parameters * 3 bits / 8 bits/byte = 26.25
    GB. This successfully fits inside the 32 GB LPDDR5 memory.

    2. Hardware Capability: The Jetson Orin boasts 275 TOPS for INT8 operations, but
    0 TOPS for native 3-bit operations.

    3. Compute Overhead: For every token generated, all 70B weights must be read and
    unpacked. If dequantization takes just 2 operations per weight, that''s 140 Giga-operations
    of pure overhead per token.

    4. Conclusion: The time spent unpacking the weights completely overshadows the
    time saved in memory transfer, leaving the 275 TOPS INT8 engines idle waiting
    for unpacked data.'
