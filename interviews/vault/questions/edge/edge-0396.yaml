title: The Depthwise Separable FLOPs Reduction
scenario: Your team is optimizing a perception model for an autonomous vehicle's main ECU. A profiler shows that a specific 3x3 standard convolutional layer is a major bottleneck. The layer processes a 56x56 feature map with 64 input channels and produces 128 output channels. You propose replacing it with a 3x3 depthwise separable convolution.
question: For the 56x56, 64-to-128 channel 3x3 layer, what FLOP reduction comes from using a depthwise separable convolution?
details:
  realistic_solution: Standard 3x3 layers expand MAC operations geometrically. Decoupling spatial integration via depthwise channels and cross-mapping them subsequently via pointwise 1x1 convolutions drops FLOP limits directly.
  common_mistake: |
    **The Pitfall:** Only calculating the cost of the 3x3 depthwise part and ignoring the 1x1 pointwise convolution.
    **The Rationale:** Engineers mistakenly equate the massive parameter reduction of the 3x3 step to the total FLOPs reduction, forgetting that the 1x1 step dominates the compute.
    **The Consequence:** Massively overestimating the computational savings of depthwise separable convolutions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shape: 56x56 map, 64 in, 128 out
    2. **Calculations:**
       - Standard Conv: 2 * 56 * 56 * 64 * 128 * 9 = ~462 MFLOPs
       - Depthwise Conv: 2 * 56 * 56 * 64 * 9 = ~3.6 MFLOPs
       - Pointwise Conv: 2 * 56 * 56 * 64 * 128 = ~51.4 MFLOPs
       - Separable Total: 3.6 + 51.4 = 55 MFLOPs
       - Reduction: 462M / 55M = 8.4x
    3. **Conclusion & Interpretation:**
       - **Result: 8.4x fewer FLOPs.**
  options:
  - ~2x reduction
  - ~128x reduction
  - ~8.4x reduction
  - ~9x reduction
  correct_index: 2
