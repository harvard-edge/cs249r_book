title: Optimizing ViT Attention Dataflow on Jetson Orin DLA
scenario: You are deploying a Vision Transformer (ViT) model on an NVIDIA Jetson AGX Orin (64 GB LPDDR5, 275 TOPS INT8, 60W TDP). The model's latency is severely bottlenecked during the self-attention phase when running on the Deep Learning Accelerator (DLA), which uses a fixed systolic array architecture.
question: Should QxK^T use weight-stationary or output-stationary dataflow, and how would you tile it to minimize LPDDR5 access on Orin?
details:
  realistic_solution: For the QxK^T operation, an output-stationary dataflow is optimal to accumulate the partial sums of the attention scores locally within the systolic array's accumulators, minimizing expensive write-backs to memory. We must tile the sequence length dimension so the active blocks of Q, K, and the partial output fit entirely within the DLA's local SRAM buffer. Utilizing INT8 precision allows us to leverage the Orin's 275 TOPS and significantly reduces the SRAM footprint.
  common_mistake: |
    **The Pitfall:** Blindly applying weight-stationary dataflows, assuming one of the operands can always be pinned to the systolic array.
    **The Rationale:** Candidates forget that in self-attention (QxK^T), both operands are dynamically generated activations, not static weights.
    **The Consequence:** A purely weight-stationary approach leads to massive systolic array thrashing, skyrocketing LPDDR5 access and completely blowing the 60W power budget.
  napkin_math: |
    - QxK^T MACs: N=1024, D=768 -> N^2 * D = 805M MACs (1.61 GOPS).
    - Size (INT8): Q and K take 2 * 1024 * 768 bytes = 1.5 MB (Fits in SRAM).
    - N^2 Output size = 1 MB.
    - Compute time at 275 TOPS = 1.61 / 275,000 = ~5.8 µs.
    - Fetching 1.5 MB from LPDDR5 (204 GB/s) = ~7.3 µs.
    **Conclusion: Output-stationary dataflow prevents writing the 1 MB partial sums back to LPDDR5, saving ~5 µs of memory latency per head and drastically reducing power consumption.**
