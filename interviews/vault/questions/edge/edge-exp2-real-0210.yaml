title: Heterogeneous Routing on NVIDIA Jetson Orin
scenario: You are designing an edge inference appliance using a single NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W TDP) to process 24 concurrent HD video streams for defect detection. The Orin features
  a heterogeneous compute architecture containing both an Ampere GPU and multiple Deep Learning Accelerators
  (DLAs). You need to design the intra-node request routing and load balancing system that dispatches
  incoming frame inference requests across the GPU and DLAs. Evaluate the tradeoffs of different routing
  algorithms to maximize the 275 TOPS throughput while accounting for the varying latency profiles of
  the GPU versus the DLAs and strictly adhering to the 60W power budget.
details:
  realistic_solution: Implement a dynamic heterogeneous router using weighted queueing or work-stealing,
    routing complex, dynamic-batch models to the Ampere GPU and steady-state, supported models to the
    DLAs. Because the Jetson Orin has unified 32 GB LPDDR5 memory, the router must pass memory pointers
    (zero-copy) rather than duplicating frames. To stay within the 60W TDP, the load balancer should batch
    aggressively on the GPU while keeping the DLAs continuously fed with single-stream pipelines, avoiding
    idle power spikes.
  common_mistake: Candidates often propose a naive round-robin router across all compute engines without
    accounting for the fact that DLAs are fixed-function accelerators with different latency and operator
    support than the Ampere GPU. They also frequently forget that the 32 GB LPDDR5 memory is unified,
    suggesting unnecessary memory copies between host and device queues that waste the power budget.
  napkin_math: 'Total load: 24 streams * 30 FPS = 720 frames per second (FPS). Available compute: 275
    TOPS INT8 total. Compute budget per frame: 275,000 GOPS / 720 FPS = ~381 GOPS per frame. If the Ampere
    GPU provides ~170 TOPS and the DLAs provide ~105 TOPS, the optimal static routing weight is roughly
    60% of frames/models to the GPU and 40% to the DLAs. Memory footprint for 720 FPS buffering at 1080p
    (RGB, 3 bytes): 720 * 1920 * 1080 * 3 = ~4.4 GB/s throughput, easily fitting within the 32 GB LPDDR5
    unified memory without saturating bandwidth.'
