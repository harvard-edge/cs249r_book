title: Memory Hierarchy Tradeoffs for LLM Deployment on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a large language model (LLM) quantized to INT8 on the Qualcomm Cloud AI 100. This device boasts 400 TOPS (Tera Operations Per Second) for INT8, features 32 GB LPDDR4x memory, and operates within a strict 75W power budget. The LLM's parameter count is substantial, exceeding the capacity of typical on-chip caches and fast memories.
question: How do LPDDR4x capacity, bandwidth, latency, and the 75W power limit constrain real INT8 throughput on Cloud AI 100 for this large LLM?
details:
  realistic_solution: A comprehensive analysis would first identify the theoretical peak bandwidth of LPDDR4x (e.g., 34 GB/s). The solution should discuss architectural implications such as the necessity for high data reuse (operational intensity) through extensive on-chip SRAM/register files to bridge the gap between 400 TOPS compute and slow external memory bandwidth. It should cover strategies like model partitioning, layer fusion, data-aware quantization, and efficient data tiling to minimize LPDDR4x accesses.
  common_mistake: |
    **The Pitfall:** Overemphasizing peak compute (TOPS) while ignoring memory bandwidth.
    **The Rationale:** Candidates often assume memory access is infinitely fast or ignore the power cost of memory transfers, focusing purely on theoretical INT8 throughput.
    **The Consequence:** An incomplete analysis that misses the real-world operational intensity requirements needed to prevent memory starvation.
  napkin_math: |
    1. **Compute:** 400 TOPS INT8 = 400 * 10^12 Ops/s
    2. **Bandwidth:** Peak LPDDR4x bandwidth ≈ 34 GB/s = 34 * 10^9 Bytes/s
    3. **Required Operational Intensity:** (400 * 10^12) / (34 * 10^9) ≈ 11,764 Ops/Byte
    **Result: Data must be loaded once from LPDDR4x and reused ~11,764 times on-chip to avoid memory starvation.**
