title: Edge Inference Load Balancing with Hailo-8 Accelerators
scenario: 'You are designing an inference service for a large-scale edge deployment, processing real-time video streams. Each edge node is equipped with multiple Hailo-8 AI processors. Your service receives varying inference requests; some require low-latency processing for critical alerts, while others involve batch processing for analytics.'
question: 'How would you design a request routing and load balancing strategy using consistent hashing and weighted round-robin to handle mixed critical and batch inference requests across Hailo-8 accelerators under failures or thermal throttling?'
details:
  realistic_solution: 'A hybrid approach combining local intelligent routing with a distributed global strategy. Each edge node runs a local router that monitors the health, load, and thermal state of its installed Hailo-8 accelerators. Requests are initially distributed using weighted round-robin across available Hailo-8s, with weights dynamically adjusted based on real-time metrics (inference queue depth, device temperature, power consumption). For models benefiting from stateful processing or model pinning, consistent hashing can be employed to direct specific requests to the same accelerator. Priority queues should be implemented for inference requests, routing low-latency, critical alerts to the least-loaded Hailo-8 with available capacity. Upon detection of a failure or significant performance degradation, the local router automatically re-routes requests to healthy accelerators within the same node.'
  common_mistake: |
    **The Pitfall:** Overlooking the low-power and edge-specific constraints of Hailo-8 devices.
    **The Rationale:** Candidates lead to naive server-side load balancing solutions that don't account for network latency to the edge, device thermal limitations, varying model sizes, or heterogeneous inference types.
    **The Consequence:** Poor distribution leads to single-accelerator overheating while others remain idle, crushing throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node has 4 Hailo-8 chips (26 TOPS, 2.5W each).
    - Total power limit 10W.
    - Target 70% utilization.

    **Calculations:**
    - Total capacity = 4 * 26 = 104 TOPS. Usable = 104 * 0.70 = 72.8 TOPS.
    - Critical capacity (2 chips) = 52 TOPS -> ~10.4 tasks/sec (5 TOPS each).
    - Batch capacity (2 chips) = 52 TOPS -> 26 tasks/sec (2 TOPS each).

    **Conclusion & Interpretation:**
    - **Result: 2 chips critical, 2 batch (Compute-Bound)**. Allocating 2 chips for critical and 2 for batch perfectly balances the 10W thermal envelope while segregating latency pools.
