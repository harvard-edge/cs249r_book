title: Multi-Model Drone Inspection Design on Hailo-8
scenario: You are designing a low-power drone inspection system that must run 4 concurrent neural networks (each requiring 15 GOPS per frame) at 30 FPS. The target platform pairs a low-power host processor with a Hailo-8 accelerator, which provides 26 TOPS INT8 at just 2.5W. The Hailo-8 is a pure dataflow accelerator with no local DRAM, meaning all inputs, outputs, and model weights must stream continuously from host memory.
question: What is the true system-level cost of running four 15 GOPS/frame networks at 30 FPS on Hailo-8, and how would you avoid bandwidth stalls?
details:
  realistic_solution: A strong L5 candidate will evaluate the system-level compute cost by identifying the PCIe bandwidth bottleneck. Instead of naive round-robin scheduling, they will design an architecture that spatially partitions the dataflow compiler to load all 4 models onto the Hailo-8 SRAM simultaneously, or use heavy temporal batching. This minimizes host-to-accelerator weight streaming, keeping the system within the 2.5W power envelope and reducing the host processor's compute burden.
  common_mistake: |
    **The Pitfall:** Calculating compute utilization while ignoring weight streaming bandwidth.
    **The Rationale:** Candidates perform the raw compute calculation (1.8 TOPS vs 26 TOPS) and assume the system will run at negligible power without considering data movement.
    **The Consequence:** They fail to account for the massive host-side compute and memory cost of swapping weights over PCIe, leading to severe power overruns and thermal throttling.
  napkin_math: |
    1. **Compute Demand**: 4 models * 30 FPS * 15 GOPS = 1800 GOPS = 1.8 TOPS.
    2. **Theoretical Utilization**: 1.8 TOPS / 26 TOPS = ~6.9%.
    3. **Memory Bandwidth Cost**: If weights (e.g., 20MB per model) swap every frame, 20MB * 4 models * 30 FPS = **2.4 GB/s continuous PCIe traffic**, which would overwhelm the host power budget.
    4. **Optimization**: With spatial co-compilation, all 4 models fit on the Hailo-8 SRAM simultaneously. Weight streaming drops to **0 GB/s**, isolating compute strictly to the 2.5W accelerator.
