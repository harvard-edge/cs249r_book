title: Jetson Orin Thermal Throttling and Inference Latency Tail on Embedded Systems
scenario: A Jetson Orin NX module deployed in an outdoor traffic monitoring system shows normal inference
  latency of 28ms (p50) in the morning but p99 latency degrades to 95ms by afternoon. The module is running
  in a passively cooled enclosure. Ambient temperature rises from 22°C in the morning to 38°C in the afternoon.
  The module TDP is 25W (operating in 15W NX mode). Diagnose the tail latency cause, quantify the thermal
  throttling mechanism, and propose a hardening solution.
question: "What causes the afternoon p99 latency spike, how does thermal throttling explain it, and how would you harden the Jetson deployment?"
details:
  realistic_solution: 'Root cause: passive cooling insufficient at 38°C ambient. Jetson Orin NX has a
    throttling onset at ~80°C junction temperature. Thermal resistance (θja) for passively cooled module
    ≈ 1.5-2°C/W. At 15W TDP: ΔT = 15W × 1.8°C/W = 27°C. Morning junction: 22 + 27 = 49°C (no throttling).
    Afternoon: 38 + 27 = 65°C (approaching limit but still below 80°C throttle). However, solar heating
    of the enclosure adds 10-15°C, making effective ambient 48-53°C. Junction: 53 + 27 = 80°C—right at
    throttle onset. Throttling reduces CPU/GPU clocks by 20-30%, increasing inference time from 28ms to
    95ms (3.4× at 30% clock reduction: 1/0.7 = 1.43× latency increase alone; combined with queueing effect
    at throttled throughput, p99 inflates 3-4×). Fix: add active cooling (5-10W fan), use thermally conductive
    enclosure material, or reduce TDP to 10W mode in summer.'
  common_mistake: 'Blaming software or model issues rather than thermal effects. Embedded systems without
    active cooling exhibit strong temperature-dependent performance. The key indicator is the temporal
    correlation: p99 degrades as ambient temperature rises throughout the day.'
  napkin_math: 'θja passive: 1.8°C/W. TDP 15W. Morning: 22°C + 15×1.8 = 22+27 = 49°C junction. Normal.
    Afternoon base: 38°C. Enclosure solar gain: +12°C effective = 50°C ambient. Junction: 50+27 = 77°C
    (near 80°C threshold). Solar peak: 55°C effective → 55+27 = 82°C (over threshold). Throttle: Orin
    reduces GPU clock by 25% at 80°C. Inference latency: 28ms / 0.75 = 37.3ms average. But throttled throughput
    means queue builds: at 25ms inter-arrival and 37.3ms service time, ρ = 37.3/25 = 1.49 > 1 → queue
    unstable → p99 → infinity practically. Small queue + throttle: p99 = 4-5× mean = 95ms. Fix with active
    cooling: add 5W fan, reduce θja to 0.8°C/W. Afternoon: 50+15×0.8 = 62°C, no throttle.'
