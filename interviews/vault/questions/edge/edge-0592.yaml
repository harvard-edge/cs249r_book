title: The Headlight Blind Spot
scenario: Your team is optimizing a pedestrian detection model for an automotive platform built on the NVIDIA Jetson AGX Orin. The FP16 model works perfectly but consumes 35W, and you need to get it under the 15W thermal budget. You decide to quantize the model to INT8.
question: What calibration mistake can make the INT8 pedestrian detector fail on night-time headlights despite fitting the 15W Orin budget?
details:
  realistic_solution: 'The root cause is a **calibration dataset mismatch**. The dataset used to calibrate the INT8 quantization ranges did not contain high-dynamic-range scenes like night-time with bright headlights. The quantization process calculates a scale factor based on the maximum activation value seen in the calibration data. When the daytime data''s maximum activation is, for example, 30.0, the scale factor is optimized for that range.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware or the intrinsic accuracy of INT8 arithmetic.
    **The Rationale:** Engineers assume the loss of precision in INT8 itself breaks the feature extraction rather than realizing quantization is a data-dependent compression strategy.
    **The Consequence:** They avoid INT8 entirely or attempt futile structural optimizations, missing that the fatal flaw is purely driven by an unrepresentative calibration dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute capability (15W Orin): 75 TOPS.
    - Compute requirement: 1.5 TOPS * 30 FPS = 45 TOPS.
    - Daytime Calibration Max Activation: 6.0.
    - Nighttime Headlights Max Activation: 60.0.
    - INT8 Max Value: 127.

    **Calculations:**
    - Scale factor: 6.0 / 127 = 0.0472.
    - Nighttime Scaled Value: 60.0 / 0.0472 = 1271.

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound.** The INT8 operation clips all high-intensity values down to 127 (effective value ~6.0), discarding roughly 90% of the activation amplitude and causing detection failure due to calibration mismatch.
