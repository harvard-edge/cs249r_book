title: The Headlight Blind Spot
scenario: Your team is optimizing a pedestrian detection model for an automotive platform built on the
  NVIDIA Jetson AGX Orin. The FP16 model works perfectly but consumes 35W, and you need to get it under
  the 15W thermal budget. You decide to quantize the model to INT8.
details:
  realistic_solution: The root cause is a **calibration dataset mismatch**. The dataset used to calibrate
    the INT8 quantization ranges did not contain high-dynamic-range scenes like night-time with bright
    headlights. The quantization process calculates a scale factor based on the maximum activation value
    seen in the calibration data. When the daytime data's maximum activation is, for example, 30.0, the
    scale factor is optimized for that range.
  common_mistake: 'The most common mistake is to blame the hardware or the quantization algorithm itself
    (e.g., ''the INT8 operators are buggy,'' or ''we should have used per-channel instead of per-tensor
    quantization''). While these can be factors, they miss the core issue: the optimization is not static.
    Its validity is directly tied to the statistical distribution of the input data. The failure is not
    in the *mechanics* of quantization, but in the *data used to define the quantization parameters*.'
  napkin_math: At 15W, Orin clocks down to ~75 TOPS INT8. Compute needed = 1.5 TOPS * 30 FPS = 45 TOPS
    (fits). Day calibration max = 6.0, scale = 6.0/127 = 0.047. Night headlight max = 60.0. 60.0 / 0.047
    = 1276 >> 127. The INT8 clip limits the signal to 6.0, losing 90% of activation amplitude and failing
    on headlights.
