title: The Autonomous Driving Latency Trap
scenario: You are diagnosing a latency issue in a new sensor fusion platform. The platform ingests data from eight 4K cameras (3840x2160, 12-bit RAW) at 30 FPS via a PCIe Gen4 x4 interface. The end-to-end latency budget is 33ms, but you are measuring over 50ms. Model inference on the GPU takes 8ms. Profiling reveals the data transfer over PCIe is the main bottleneck. A junior engineer suggests replacing PCIe with InfiniBand NDR to fix the network bottleneck.
question: Why is the suggestion to use InfiniBand likely flawed, and what is the actual bottleneck?
details:
  realistic_solution: |
    The suggestion is flawed because InfiniBand is a datacenter networking technology for connecting servers, not a protocol for on-board chip-to-chip communication within a single embedded system. It's impractical due to power, size, and cost. The true bottleneck is likely a 'double copy' issue, which should be solved with a zero-copy protocol like GPUDirect RDMA.
  common_mistake: |
    **The Pitfall:** Misattributing latency issues to raw bandwidth limits and proposing datacenter-grade networking.
    **The Rationale:** Engineers see a "slow transfer" and immediately assume "not enough GB/s," leading to overkill solutions like InfiniBand for an embedded system.
    **The Consequence:** Proposing solutions that are physically impossible, too power-hungry, or economically unviable for an edge device.
  napkin_math: |
    * **Frame Size:** 3840 x 2160 pixels * 1.5 bytes/pixel (12-bit) = 12.44 MB.
    * **Total Frame Rate:** 8 cameras * 30 FPS = 240 FPS.
    * **Total Bandwidth Required:** 12.44 MB * 240 FPS = 2.98 GB/s.
    * **PCIe Gen4 x4 Bandwidth:** ~8 GB/s.
    * **Result:** The 2.98 GB/s stream easily fits within the **8 GB/s PCIe limit**. The bottleneck is likely driver overhead or a double-copy issue, not the physical link.
  options:
  - The suggestion is correct; InfiniBand's lower latency and higher bandwidth are necessary for real-time sensor streams.
  - The board should be redesigned to use NVLink instead of PCIe to connect the sensor card, as NVLink is a faster GPU interconnect.
  - The suggestion is wrong because InfiniBand is a datacenter interconnect; the true bottleneck is likely a 'double copy' issue, which should be solved with a zero-copy protocol like GPUDirect RDMA.
  - The CPU is too slow to handle the DMA programming for PCIe. The system needs a CPU upgrade to reduce scheduling latency.
  correct_index: 2
