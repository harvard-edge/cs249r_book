title: The Autonomous Driving Latency Trap
scenario: You are an ML Systems Engineer at an autonomous vehicle company, diagnosing a latency issue
  in your new sensor fusion platform. The platform ingests data from eight 4K cameras (3840x2160, 12-bit
  RAW) at 30 FPS. The data is aggregated and transferred to a GPU for perception processing. The end-to-end
  latency budget is 33ms, but you're measuring over 50ms. Your model inference time on the GPU is only
  8ms. Profiling reveals the data transfer from the sensor interface card to the GPU memory over a PCIe
  Gen5 x16 link is the main source of latency. A junior engineer suggests replacing PCIe with InfiniBand
  NDR to 'fix the network bottleneck.' Why is this suggestion likely flawed, and what is the actual bottleneck?
details:
  realistic_solution: The suggestion is flawed because InfiniBand is a datacenter networking technology
    for connecting servers, not a protocol for on-board chip-to-chip communication within a single embedded
    system. It's impractical due to power, size, and cost.
  common_mistake: Engineers often misattribute latency issues to raw bandwidth limits. They see 'slow
    transfer' and think 'not enough GB/s,' leading them to propose overkill solutions like datacenter-grade
    networking (InfiniBand) without considering the context. They also might not differentiate between
    chip-to-chip interconnects (PCIe, NVLink) and rack-scale networks (InfiniBand).
  napkin_math: 8 cameras at 3840x2160. 12-bit RAW = 1.5 bytes/pixel. Frame size = 8.3M * 1.5B = 12.44
    MB. 8 cameras * 30 FPS = 240 fps. Total bandwidth = 12.44 MB * 240 = 2.98 GB/s. PCIe Gen4 x4 provides
    8 GB/s, easily handling this. Using 50 GB/s IB NDR adds unjustifiable power and cost for a 3 GB/s
    stream.
  options:
  - The suggestion is correct; InfiniBand's lower latency and higher bandwidth are necessary for real-time
    sensor streams.
  - The board should be redesigned to use NVLink instead of PCIe to connect the sensor card, as NVLink
    is a faster GPU interconnect.
  - The suggestion is wrong because InfiniBand is a datacenter interconnect; the true bottleneck is likely
    a 'double copy' issue, which should be solved with a zero-copy protocol like GPUDirect RDMA.
  - The CPU is too slow to handle the DMA programming for PCIe. The system needs a CPU upgrade to reduce
    scheduling latency.
  correct_index: 2
