title: Optimizing Object Detection Latency on Google Coral Edge TPU
scenario: A development team is deploying an object detection model (quantized to INT8, optimized for
  TensorFlow Lite) to a Google Coral Edge TPU USB Accelerator (4 TOPS INT8, ~2W power consumption). The
  end-to-end latency observed for processing a single camera frame is 150ms. The team suspects bottlenecks
  in the system. Given that the Edge TPU itself can perform inference at high speeds (e.g., ~400 FPS for
  MobileNetV2), describe how you would approach decomposing the 150ms end-to-end latency into its constituent
  components (e.g., Time To First Token (TTFT) if applicable, Time Per Output Token (TPOT) if applicable,
  network transmission, sensor data acquisition, preprocessing, actual model inference on the Edge TPU,
  and postprocessing) to identify the primary sources of delay. Focus on the practical steps and measurements
  you would take in an edge deployment.
details:
  realistic_solution: 'To realistically decompose latency, one would instrument the code at various stages:
    1) Measure sensor acquisition time. 2) Timestamp before and after image preprocessing on the host
    CPU. 3) Measure the data transfer time from host to Edge TPU (if not negligible for USB). 4) Measure
    the actual model inference time on the Edge TPU using the Coral API''s profiling tools. 5) Timestamp
    before and after postprocessing on the host CPU. 6) Timestamp network transmission if results are
    sent off-device. For TTFT/TPOT, this would apply if the model produced sequential outputs, which is
    less common for object detection but critical for generative models. The Edge TPU primarily offers
    single-pass inference. By logging these timestamps, a clear breakdown of the 150ms can be achieved.'
  common_mistake: A common mistake is to solely focus on the model inference time on the Edge TPU and
    neglect other significant contributors to end-to-end latency, such as inefficient image capture, CPU-bound
    preprocessing steps, slow data transfer over USB, or complex postprocessing logic running on the host
    CPU. Another mistake is not accounting for initialization overheads or batching strategies.
  napkin_math: If the model runs at ~400 FPS on the Edge TPU, its inference time is roughly 1/400 s =
    2.5 ms. If the total latency is 150ms, then 150ms - 2.5ms = 147.5ms is spent outside of the core TPU
    inference. This large difference immediately suggests significant bottlenecks in preprocessing, postprocessing,
    or data transfer/acquisition. For example, if preprocessing takes 100ms and postprocessing takes 40ms,
    then 140ms is accounted for, leaving 7.5ms for other overheads including data transfer and sensor
    reading.
