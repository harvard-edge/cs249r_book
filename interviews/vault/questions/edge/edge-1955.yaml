title: Pruning Techniques and Hardware Alignment on NVIDIA Jetson Orin
scenario: You are optimizing a large language model for deployment on an edge device to meet stringent latency and power targets.
question: How do structured and unstructured pruning differ for an LLM on an edge INT8 accelerator, and what accuracy-speedup tradeoffs do they create?
details:
  realistic_solution: For edge devices with specialized accelerators, prioritize structured pruning (e.g., filter pruning, block sparsity) as these patterns are often directly supported by hardware for optimized compute and memory access. Evaluate the actual latency and power consumption on the Jetson Orin using its native profiling tools after pruning and fine-tuning. For unstructured pruning, ensure the runtime (e.g., TensorRT) has explicit sparsity acceleration capabilities enabled and that the sparsity pattern is dense enough to be beneficial.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning for theoretical FLOPs reduction.
    **The Rationale:** Candidates fail to verify if the target hardware can actually exploit fine-grained sparsity.
    **The Consequence:** Minimal to no real-world inference speedup despite reduced model size.
  napkin_math: |
    - Unstructured 80% sparsity on 100 ops = 20 theoretical ops. If hardware can't skip them -> ~100 effective ops executed.
    - Structured 80% sparsity (removing channels) -> exactly 20 ops computed.
    - Result: Structured sparsity yields a near **5x speedup**.
