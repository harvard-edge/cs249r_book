title: 'Dataset Curation: Optimize Label Efficiency for Edge Model Training'
scenario: You have 100K unlabeled images from Jetson Orin deployments (32GB LPDDR5, 275 TOPS). Manual
  labeling costs $0.50/image. Your labeling budget is $5,000 (10K labels). Your current model achieves
  78% mAP. Optimize the labeling strategy to maximize mAP improvement with the fixed budget.
details:
  realistic_solution: 'Run inference on all 100K images on Jetson Orin. Select 10K by entropy-based active
    learning (highest uncertainty). Cluster by scene type to ensure diversity. Expected mAP gain: 4-6%
    vs 1-2% for random selection.'
  common_mistake: Labeling random 10K images. Not using the deployed model's uncertainty to identify the
    most informative samples.
  napkin_math: 'Jetson Orin at 200 fps inference. 100K images: 100K / 200 = 500 seconds = 8.3 minutes
    to score all. Entropy computation: negligible (softmax already computed). Select top-10% by entropy.
    K-means clustering (k=50 clusters) to ensure diversity: 100K × 512-dim features = 200MB. K-means converges
    in ~10 iterations: 50 iterations on 100K × 512 = 2.56B ops → < 1 second on Jetson. Label 200 from
    each cluster. Expected: active learning achieves ~82% mAP vs ~79% random. Saving: $45K in labels for
    equivalent model quality (would need ~100K random labels to match 10K active labels).'
