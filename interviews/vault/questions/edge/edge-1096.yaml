title: 'MLOps Lifecycle: Optimize OTA Update Pipeline for Hailo-8 Fleet'
scenario: 'A fleet of 10,000 Hailo-8 devices (26 TOPS, 2.5W) running factory inspection
  models receives weekly OTA updates. Current pipeline takes 4 hours to fully update
  the fleet (100 devices/hr rate limited by CDN). The team wants to reduce to under
  1 hour without increasing CDN costs. Current: single 80MB HEF model per device.
  Diagnose and quantify the fix.'
question: How can the 10,000-device Hailo-8 OTA update be reduced from 4 hours to
  under 1 hour without increasing CDN cost?
details:
  realistic_solution: 'Current: 100 devices/hr × 80MB = 8GB/hr CDN throughput. 10,000
    devices = 100 hours? But stated 4 hours. So: 10,000/4hr=2500 devices/hr. CDN:
    2500×80MB=200GB/hr=55.6MB/s. Issue: CDN rate limit is 55.6MB/s total. Fix: use
    peer-to-peer distribution — factory devices can see each other on LAN. First download
    to 10 seed devices (10×80MB=800MB at 55.6MB/s=14.4s). Then P2P: 10 seeds → 10,000
    devices on Gigabit LAN: each seed serves 1000 devices at 100MB/s each: 80MB/100MB/s=0.8s.
    Total: 15s + 0.8s = 16s << 1 hour. CDN cost: same 800MB (seeds only).'
  common_mistake: Increasing CDN bandwidth (increasing cost) when the bottleneck is
    the sequential update orchestration logic — with proper parallel batching, the
    same bandwidth can update all devices simultaneously.
  napkin_math: 'P2P: CDN downloads 80MB × 10 seeds = 800MB vs original 800GB (1000×
    less CDN). Factory LAN at 1Gbps=125MB/s. 10 seeds × 125MB/s = 1250MB/s aggregate
    to 10K devices. 80MB per device / (1250MB/s/1000 devices) = 80MB/1.25MB/s=64s
    per device. But parallel: all devices receive simultaneously. With 10 seeds each
    serving 1000: 80MB/(1250MB/s/10)=80/125=0.64s. Total: CDN download 800MB/55.6MB/s=14.4s
    + LAN distribution 0.64s = 15s. 16× faster than 4 hours.'
