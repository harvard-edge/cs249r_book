title: 'MLOps Lifecycle: Optimize OTA Update Pipeline for Hailo-8 Fleet'
scenario: A fleet of 10,000 Hailo-8 devices (26 TOPS, 2.5W) running factory inspection models receives weekly OTA updates. The current pipeline takes 100 hours to fully update the fleet because the CDN is rate-limited to ~2.22 MB/s. The current model is a single 80MB HEF file per device.
question: How can the 10,000-device Hailo-8 OTA update be reduced from 100 hours to under 1 hour without increasing CDN cost?
details:
  realistic_solution: 'Current bottleneck: 10,000 devices at 100 devices/hr = 100 hours. CDN throughput = 100 × 80MB = 8 GB/hr (approx 2.22 MB/s). The CDN rate limit is 2.22 MB/s total. Fix: use peer-to-peer (P2P) distribution (like BitTorrent) or IP Multicast. With P2P, we first download to a small number of seed devices, and then devices share chunks locally over the factory LAN. If using IP Multicast, one seed can broadcast the 80MB update across the local network, updating all 10,000 devices simultaneously. P2P spreads logarithmically, finishing the local distribution in minutes, drastically reducing the CDN load to just a few seed downloads.'
  common_mistake: |
    **The Pitfall:** Throwing money at the CDN to increase bandwidth.
    **The Rationale:** Candidates often suggest buying more CDN capacity, ignoring the constraint of not increasing CDN costs and overlooking the local network topology.
    **The Consequence:** Massively increased operational costs when the bottleneck could be completely bypassed using the high-speed local factory network.
  napkin_math: |
    * **Current CDN Load:** 10,000 devices * 80MB = 800GB
    * **Current Time:** 800GB / 2.22 MB/s ≈ 100 hours
    * **P2P CDN Load:** 80MB to 10 seed devices = 800MB
    * **P2P CDN Time:** 800MB / 2.22 MB/s = 360 seconds (6 minutes)
    * **Local LAN Distribution:** Gigabit LAN (125 MB/s) spreads logarithmically in minutes.
    * **Total New Time:** **< 15 minutes** (1000x CDN bandwidth cost reduction)
