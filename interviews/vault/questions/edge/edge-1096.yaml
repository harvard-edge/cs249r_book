title: 'MLOps Lifecycle: Optimize OTA Update Pipeline for Hailo-8 Fleet'
scenario: 'A fleet of 10,000 Hailo-8 devices (26 TOPS, 2.5W) running factory inspection models receives weekly OTA updates. Current pipeline takes 100 hours to fully update the fleet (100 devices/hr rate limited by CDN). The team wants to reduce to under 1 hour without increasing CDN costs. Current: single 80MB HEF model per device. Diagnose and quantify the fix.'
question: How can the 10,000-device Hailo-8 OTA update be reduced from 100 hours to under 1 hour without increasing CDN cost?
details:
  realistic_solution: 'Current bottleneck: 10,000 devices at 100 devices/hr = 100 hours. CDN throughput = 100 × 80MB = 8 GB/hr (approx 2.22 MB/s). The CDN rate limit is 2.22 MB/s total. Fix: use peer-to-peer (P2P) distribution (like BitTorrent) or IP Multicast. With P2P, we first download to a small number of seed devices, and then devices share chunks locally over the factory LAN. If using IP Multicast, one seed can broadcast the 80MB update across the local network, updating all 10,000 devices simultaneously. P2P spreads logarithmically, finishing the local distribution in minutes, drastically reducing the CDN load to just a few seed downloads.'
  common_mistake: 'Increasing CDN bandwidth (increasing cost) when the bottleneck can be completely bypassed using the high-speed local factory network. Candidates often suggest just buying more CDN capacity.'
  napkin_math: 'Original CDN load: 10,000 × 80MB = 800GB. At 2.22 MB/s limit, this takes 100 hours. With P2P: CDN only downloads 80MB to 10 seed devices = 800MB. Time on CDN = 800MB / 2.22 MB/s = 360 seconds (6 minutes). Once seeds have the data, they share on the local Gigabit LAN (125 MB/s per link). In a P2P swarm, 10,000 devices downloading 80MB takes only a few minutes. Total time is under 15 minutes, easily meeting the 1-hour goal while reducing CDN bandwidth costs by 1000x.'
