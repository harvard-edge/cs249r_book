title: Multi-Stream Video Ingestion PCIe Bandwidth
scenario: An edge security appliance uses a Hailo-8 accelerator to process 4 concurrent 1080p video streams at 30 FPS. The host CPU decodes the streams and copies uncompressed frames to the Hailo-8 over a PCIe Gen3 x4 link.
question: Design the data ingestion pipeline and calculate the exact data payload rate in MB/s required for the uncompressed RGB888 transfers.
details:
  realistic_solution: The ingestion pipeline must decode the H.264 streams on the host CPU/GPU, convert the YUV frames to RGB888 format in contiguous memory, and utilize PCIe Direct Memory Access (DMA) to stream the raw tensors into the Hailo-8. Each uncompressed frame is massive; multiplying the frame size by the framerate and the number of streams reveals the intense stress placed on the host-to-accelerator interconnect.
  common_mistake: |
    **The Pitfall:** Calculating interconnect bandwidth based on the highly compressed H.264 network bitrate (e.g., 5 Mbps) rather than the raw, uncompressed tensor size.
    **The Rationale:** Candidates conflate the external network transmission requirement with the internal memory bandwidth required by the NPU's spatial architecture.
    **The Consequence:** The internal PCIe link or memory bus is grossly undersized, leading to severe data starvation, dropped frames, and system stalling despite having a powerful NPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video specs: 4 streams, 1080p (1920x1080), 30 FPS.
    - Tensor format: RGB888 (3 bytes per pixel).
    - Transfer link: PCIe Gen3 x4.

    **Calculations:**
    - Single frame size = 1920 * 1080 * 3 bytes = 6,220,800 bytes (~6.22 MB).
    - Single stream bandwidth = 6.22 MB/frame * 30 FPS = 186.6 MB/s.
    - Total pipeline bandwidth = 186.6 MB/s * 4 streams = 746.4 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 746.4 MB/s (I/O-Bound)**. The system is critically dependent on PCIe Bandwidth to prevent starving the NPU with raw payload data.
