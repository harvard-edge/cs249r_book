title: Architecting Thermal Management for Unconditioned Edge Deployments
scenario: You are tasked with architecting the deployment strategy for a cluster of Qualcomm Cloud AI
  100 inference accelerators in a ruggedized, unconditioned telco edge environment. The ambient temperature
  fluctuates wildly, and the cooling system has a maximum heat dissipation limit. You need to design a
  system-level strategy that balances the 400 TOPS INT8 peak performance of each card against its 75W
  TDP to prevent thermal throttling while guaranteeing SLA latency for high-priority burst traffic.
details:
  realistic_solution: A robust architecture involves implementing a proactive, application-aware thermal
    management controller. This controller profiles the thermal capacitance of the system and employs
    dynamic voltage and frequency scaling (DVFS) alongside workload scheduling. It queues latency-tolerant
    batch jobs to maintain a steady thermal baseline and reserves thermal headroom to allow the Qualcomm
    Cloud AI 100 to operate at its full 400 TOPS capacity during brief, high-priority inference bursts
    without exceeding the thermal limits of the enclosure.
  common_mistake: Candidates often propose simplistic static underclocking or rely entirely on the hardware's
    built-in thermal throttling mechanisms, which leads to unpredictable latency spikes during burst traffic.
    They frequently fail to distinguish between sustained throughput workloads and latency-critical burst
    workloads when designing the thermal envelope.
  napkin_math: Assuming a peak power of 75W for 400 TOPS, the efficiency is 400 / 75 = 5.33 TOPS/W. If
    the enclosure's cooling system can only dissipate 50W continuously per card due to high ambient temperatures,
    sustained workloads must be capped at ~266 TOPS (50W * 5.33 TOPS/W) to prevent the internal temperature
    from rising. To handle a 5-second burst requiring 400 TOPS (75W), the system accumulates 25W * 5s
    = 125 Joules of excess heat. The thermal controller must ensure the system operates below 50W prior
    to the burst to build sufficient thermal capacitance to absorb this 125J without triggering hardware
    throttling.
