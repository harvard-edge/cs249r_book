title: Edge TPU Attention Cost Analysis
scenario: You are deploying a small transformer-based wake-word model to a Google Coral Edge TPU (4 TOPS
  INT8, 2W power budget). The model processes a 1-second audio window represented as a sequence of 256
  tokens with an embedding dimension of 128. During deployment, the team notices that while the linear
  projection layers execute entirely on the Edge TPU, the attention computation falls back to the host
  CPU, drastically increasing latency. Explain why this happens given the hardware's operator limitations
  and analyze the cost of the attention mechanism.
question: "Why does the 256-token transformer's attention fall back to CPU on the Edge TPU, and how would you keep it on INT8 hardware?"
details:
  realistic_solution: The fallback occurs because the standard attention mechanism includes a Softmax
    operation, which is difficult to map efficiently to pure INT8 hardware like the Coral without specialized
    approximations. To keep execution on the Edge TPU, the architecture needs to be modified, such as
    replacing the standard attention with a hardware-friendly variant (e.g., replacing Softmax with a
    ReLU-based attention or integer-only approximations) and ensuring all query, key, and value projections
    are properly quantized to INT8.
  common_mistake: Candidates often assume that because the device has 4 TOPS of compute, it can handle
    any matrix multiplication. They fail to recognize that the Coral Edge TPU has limited operator support,
    specifically requiring full INT8 quantization, and that softmax or dynamic operations in standard
    attention often lack hardware support, forcing a CPU fallback.
  napkin_math: 'For a sequence length N=256 and dimension D=128: The QK^T matrix multiplication requires
    N * N * D operations. 256 * 256 * 128 = 8.38 million MACs (or ~16.7 million operations). Multiplying
    by V adds another 8.38 million MACs, totaling ~33.5 million operations. Given the 4 TOPS (4 * 10^12
    ops/sec) INT8 capability of the Coral Edge TPU, this computation takes a negligible fraction of a
    millisecond natively (33.5e6 / 4e12 = 0.008 ms). However, transferring 256x256 intermediate activation
    tensors across the USB/PCIe bus to the CPU for Softmax evaluation incurs milliseconds of I/O latency,
    dwarfing the theoretical compute time.'
