title: Orin Shared LPDDR5 Deficit
scenario: A Jetson AGX Orin uses a 204.8 GB/s LPDDR5 shared memory pool. A dense 3D
  CNN needs 150 GB/s for tensor operations while the GPU rendering engine simultaneously
  requests 80 GB/s for graphics.
question: Design a memory QoS (Quality of Service) scheme to resolve the contention
  and calculate the resulting memory bandwidth deficit.
visual:
  kind: svg
  path: edge-2271.svg
  alt: Stacked bar chart showing 230 GB/s request vs 204.8 GB/s limit.
  caption: Memory Bandwidth Contention.
details:
  realistic_solution: Total requested bandwidth is $150 + 80 = 230$ GB/s, exceeding
    the 204.8 GB/s physical limit. A QoS design might prioritize the CNN at 150 GB/s
    to maintain real-time safety constraints, leaving $204.8 - 150 = 54.8$ GB/s for
    the GPU. The rendering engine faces an $80 - 54.8 = 25.2$ GB/s deficit, likely
    causing dropped frames.
  common_mistake: Assuming the theoretical 204.8 GB/s can perfectly accommodate independent
    workloads without contention overhead.
  napkin_math: 150 + 80 = 230 GB/s requested. 230 - 204.8 = 25.2 GB/s deficit.
