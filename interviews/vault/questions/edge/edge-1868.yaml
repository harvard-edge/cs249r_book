title: Optimizing Memory-Mapped Inference on Google Coral Edge TPU
scenario: You are deploying a new INT8 quantized TensorFlow Lite model for real-time object detection on a Google Coral Edge TPU. The model has a significant number of parameters (~50MB) and is memory-mapped for inference. During initial testing, you observe a 'cold start' latency of several hundreds of milliseconds for the first few inferences. Subsequent inferences are fast.
question: How would you diagnose and reduce the several-hundred-ms cold start for a 50 MB memory-mapped Coral TFLite model?
details:
  realistic_solution: A realistic solution involves proactive page prefetching. This can be achieved by using `mlock` or `madvise` with `MADV_WILLNEED` to advise the kernel to load the entire memory-mapped model into physical memory before the first inference. If `mlock` is not feasible due to privilege restrictions or memory constraints, a 'warm-up' pass through the model (e.g., performing a dummy inference on synthetic data) can also trigger page faults and load pages into cache, albeit less deterministically. For shared memory scenarios, ensuring the initial process properly prefetches or warms up the memory region before other processes attach can prevent redundant cold starts.
  common_mistake: |
    **The Pitfall:** Assuming memory-mapping guarantees instant zero-copy access.
    **The Rationale:** Developers overlook OS page faulting mechanisms, where memory-mapped pages are loaded into physical RAM only upon first access.
    **The Consequence:** Experiencing severe latency spikes on startup or during context switching that degrade user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 50MB. Page Size: 4KB.
       - Memory-mapped access on a flash storage system.
    2. **Calculations:**
       - Total Pages: 50MB / 4KB = 12,800 pages.
       - Page Fault Overhead: ~50 µs/page (conservative estimate).
       - Total Cold Start Latency: 12,800 pages * 50 µs/page = 640,000 µs = 640 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Page-Fault Bottleneck.** Relying on default memory mapping causes a massive 640ms cold start; proactive prefetching (`mlock` or `MADV_WILLNEED`) is required.
