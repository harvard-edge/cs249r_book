title: 'The Autonomous Perception Stack Redesign: Transformer Systems Cost'
scenario: You are the Lead ML Systems Architect for a top-tier automotive company. Your current perception
  system, based on a highly-optimized CNN (similar to EfficientNet-B5), is hitting accuracy limits on
  long-tail scenarios like occluded pedestrians and unusual weather. An offline prototype using a Vision
  Transformer (ViT) architecture shows a 5% mAP improvement, which the product team desperately wants.
details:
  realistic_solution: The junior engineers' analysis is flawed because it ignores the **Roofline Model**
    and the concept of **Arithmetic Intensity (AI)**. The core challenge is not total FLOPs, but whether
    the architecture can actually use the 275 TOPS of the SoC, which is determined by the memory system's
    ability to feed the compute units.
  common_mistake: Relying on FLOPs as the sole proxy for latency. A lower-FLOP CNN can be slower than
    a higher-FLOP ViT if the CNN's architecture (e.g., many depthwise separable convolutions with low
    arithmetic intensity) is memory-bound on the target hardware, while the ViT's dense matrix multiplies
    are compute-bound. Another mistake is assuming cloud performance translates directly to the edge,
    ignoring the quadratic scaling of self-attention on large sensor images and the much more constrained
    memory system of an automotive SoC.
  napkin_math: The fundamental flaw in the FLOPs analysis is revealed by a Roofline analysis of the AGX
    Orin.
