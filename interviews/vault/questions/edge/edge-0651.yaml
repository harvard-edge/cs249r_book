title: 'The Autonomous Perception Stack Redesign: Transformer Systems Cost'
scenario: 'You are the Lead ML Systems Architect for a top-tier automotive company. Your current perception system, based on a highly-optimized CNN (similar to EfficientNet-B5), is hitting accuracy limits on long-tail scenarios like occluded pedestrians and unusual weather. An offline prototype using a Vision Transformer (ViT) architecture shows a 5% mAP improvement, which the product team desperately wants.'
question: 'How would you evaluate whether the 5% mAP ViT can replace the CNN on Orin, and what is wrong with a FLOPs-only analysis?'
details:
  realistic_solution: 'The junior engineers'' analysis is flawed because it ignores the **Roofline Model** and the concept of **Arithmetic Intensity (AI)**. The core challenge is not total FLOPs, but whether the architecture can actually use the 275 TOPS of the SoC, which is determined by the memory system''s ability to feed the compute units. Use nsys profiling to verify arithmetic intensity limits.'
  common_mistake: |
    **The Pitfall:** Relying on FLOPs as the sole proxy for latency when comparing CNNs and ViTs.
    **The Rationale:** Engineers assume that models with similar theoretical GFLOPs will have similar inference speeds, ignoring memory architecture.
    **The Consequence:** The ViT deployment drastically underperforms because it hits the memory bandwidth ceiling of the automotive SoC.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin INT8 Ridge Point: 275 TOPS / 204.8 GB/s = 1342 OPS/Byte.
    - CNN Arithmetic Intensity (AI): ~1500 OPS/Byte (compute-bound).
    - ViT Self-Attention AI: ~5 OPS/Byte (memory-bound).

    **Calculations:**
    - ViT effective compute: 204.8 GB/s * 5 OPS/Byte = ~1 TOPS.
    - Utilization: The ViT uses ~1 TOPS / 275 TOPS = < 0.4%.

    **Conclusion & Interpretation:**
    - **Result: ~1 TOPS (Memory-Bound)**. The ViT uses less than 0.4% of the Orin's compute capacity, making it highly memory-bound.
