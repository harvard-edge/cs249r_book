title: Diagnosing Forgetting in Edge Anomaly Detection
scenario: You are deploying a continuous learning anomaly detection model on an industrial edge gateway (4GB RAM, 1GB free flash storage) monitoring a CNC machine. The model fine-tunes locally every hour using streaming vibration and temperature data. After 72 hours, the model perfectly identifies recent spindle wear anomalies but completely fails to detect a bearing failure anomaly it was explicitly trained to catch on day one.
question: What caused the day-one bearing anomaly to be forgotten, and what flash-backed replay strategy would you use within the 1GB limit?
details:
  realistic_solution: 'Implement a reservoir-sampled Experience Replay buffer. Allocate 500MB of the available flash storage to maintain a diverse set of historical edge cases. During the hourly local fine-tuning, interleave the current batch of new sensor data with an equal-sized batch randomly sampled from the replay buffer to explicitly preserve the historical decision boundaries.'
  common_mistake: |
    **The Pitfall:** Over-relying on compute-heavy regularization.
    **The Rationale:** Candidates might lean entirely on techniques like Elastic Weight Consolidation (EWC) because it avoids explicit state saving.
    **The Consequence:** EWC introduces massive compute overhead on a constrained edge CPU, slowing inference and tuning severely, while simply freezing layers prevents adaptation entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Storage capacity = 1GB total, 500MB allocated for flash replay buffer.
       - Sample size = 10KB (1000 float32 readings + metadata).
       - Generation rate = 10Hz.
    2. **Calculations:**
       - Samples per day = 10 * 60 * 60 * 24 = 864,000 samples.
       - Flash buffer capacity = 500,000,000 bytes / 10,000 bytes = 50,000 samples.
    3. **Conclusion & Interpretation:**
       - **Result: Reservoir Sampling Required**. Interleaving local batches with 50K stored diverse historical samples prevents catastrophic forgetting while adhering to the 1GB flash and 4GB RAM limits.
  options:
  - Relying purely on regularization techniques like Elastic Weight Consolidation (EWC) which introduces significant compute overhead on the edge CPU, or simply freezing the lower layers, which limits adaptation to new anomalies.
  - Increasing the number of inference threads will proportionally increase throughput, since modern accelerators scale linearly with thread count.
  - Implement a reservoir-sampled Experience Replay buffer. Allocate 500MB of the available flash storage to maintain a diverse set of historical edge cases.
  - Profiling overhead is masking the true performance; disabling all instrumentation will reveal that the system is already meeting targets.
  correct_index: 2
