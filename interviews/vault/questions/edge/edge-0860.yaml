title: SRAM Sizing vs Off-Chip DRAM Power
scenario: 'You are architecting a custom edge Vision Processing Unit (VPU) for a battery-powered security camera running at 30 fps. The primary model has 2MB of weights and requires 2MB for peak activations. You must choose between two memory architectures: Option A uses 4MB of on-chip SRAM to store both weights and activations. Option B uses 2MB of on-chip SRAM for activations and streams the 2MB of weights from off-chip LPDDR4 per frame. On-chip SRAM costs $0.50 per MB in silicon area. Off-chip DRAM access consumes 100pJ/bit. Evaluate the trade-off between silicon cost and power consumption, and justify your design choice.'
question: Would you choose 4MB on-chip SRAM or stream 2MB of weights from LPDDR4 each frame for the 30 FPS camera VPU, and why?
details:
  realistic_solution: Choose Option A (4MB SRAM). The $1.00 extra silicon cost is justified because it eliminates continuous weight-streaming DRAM access, saving 48mW of power, which is critical for battery-operated edge devices.
  common_mistake: |
    **The Pitfall:** Focusing purely on the one-time BOM savings of Option B.
    **The Rationale:** Candidates prioritize minimizing silicon cost without quantifying the continuous active power penalty of off-chip memory access.
    **The Consequence:** They select an architecture that requires continuous weight-streaming from DRAM, severely degrading the battery life of the edge device.
  napkin_math: |
    * Option A (4MB SRAM) Cost: 4 MB × $0.50/MB = $2.00.
    * Option B (2MB SRAM) Cost: 2 MB × $0.50/MB = $1.00. (Savings = $1.00)
    * Option B DRAM throughput: 2 MB/frame × 30 fps = 60 MB/s.
    * Option B DRAM power: 60 MB/s × 8 bits/byte × 100 pJ/bit = 48,000,000,000 pJ/s = 48 mW.
    * **A continuous 48 mW draw dominates the power budget; Option A (4MB SRAM) is strictly better for battery life despite the $1.00 extra BOM cost.**
