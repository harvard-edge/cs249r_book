title: Deterministic M/D/1 Queuing Delay for Edge Camera Streams
scenario: A Jetson AGX Orin processes 3 incoming factory inspection camera streams with an average aggregate rate of 60 frames per second. The Orin completes processing for any frame in exactly 15ms.
question: "Analyze the system as an M/D/1 queue to find the average wait time in the buffer before processing begins."
details:
  realistic_solution: Arrival rate lambda is 60 frames/sec. Service time D is 0.015 sec. Utilization rho = lambda * D = 0.9. The M/D/1 average wait time is W_q = (rho * D) / (2 * (1 - rho)). This yields 0.0135 / 0.2, determining the queuing delay.
  common_mistake: |
    **The Pitfall:** Using the M/M/1 wait time formula instead of M/D/1.
    **The Rationale:** Candidates default to M/M/1 due to familiarity, ignoring the deterministic nature of NPU execution.
    **The Consequence:** Vastly overestimating latency (predicting 135 ms instead of 67.5 ms), leading to unnecessary hardware upgrades.
  napkin_math: |
    *   **Arrival Rate ($\lambda$):** 60 frames/sec.
    *   **Service Time ($D$):** 0.015 seconds.
    *   **Utilization ($\rho$):** $\lambda \times D$ = 60 * 0.015 = 0.9.
    *   **M/D/1 Queueing Delay ($W_q$):** $(\rho \times D) / (2 \times (1 - \rho))$.
    *   **Calculation:** (0.9 * 0.015) / (2 * 0.1) = 0.0135 / 0.2 = 0.0675 seconds.
    *   **Result:** The average wait time is **67.5 ms**.
