title: Deterministic M/D/1 Queuing Delay for Edge Camera Streams
scenario: A Jetson AGX Orin processes 3 incoming factory inspection camera streams
  with an average aggregate rate of 60 frames per second. The Orin completes processing
  for any frame in exactly 15ms.
question: Analyze the system as an M/D/1 queue to find the average wait time in the
  buffer before processing begins.
details:
  realistic_solution: Arrival rate lambda is 60 frames/sec. Service time D is 0.015
    sec. Utilization rho = lambda * D = 0.9. The M/D/1 average wait time is W_q =
    (rho * D) / (2 * (1 - rho)). This yields 0.0135 / 0.2, determining the queuing
    delay.
  common_mistake: Using the M/M/1 wait time formula, which assumes exponential service
    times and vastly overestimates latency for deterministic NPU executions.
  napkin_math: W_q = (0.9 * 0.015) / (2 * 0.1) = 0.0675 seconds, or 67.5 ms average
    wait.
