title: Pruning Tradeoffs for Dataflow Edge Accelerators
scenario: You are deploying a 4-camera surround-view object detection system on a single Hailo-8 accelerator.
  The system must process 120 total frames per second (30 FPS per camera). The Hailo-8 provides 26 TOPS
  INT8 compute within a 2.5W envelope, but has no local DRAM, relying on continuous data streaming from
  host memory. To fit within the PCIe bandwidth and thermal limits, you must aggressively prune the base
  model. Evaluate unstructured pruning versus structured channel pruning for this specific architecture.
question: "For the 4-camera Hailo-8 detector, would you use unstructured pruning or structured channel pruning to fit PCIe and 2.5W limits?"
details:
  realistic_solution: The correct approach is to exclusively use structured pruning (such as channel or
    filter pruning). Structured pruning physically reduces the tensor dimensions, which directly shrinks
    the computational footprint and proportionally reduces the raw bytes that must be streamed from host
    memory. This aligns perfectly with the Hailo-8's dense spatial array and pipeline compiler, lowering
    both host-to-device bandwidth contention and active power consumption.
  common_mistake: Candidates often assume that unstructured pruning (e.g., 80% sparse weights) will yield
    proportional latency or memory bandwidth improvements. They fail to recognize that custom dataflow
    accelerators like Hailo-8 lack specialized sparse-index decoding hardware, meaning unstructured sparse
    tensors must still be padded, streamed, and computed as dense matrices.
  napkin_math: Base model requires 200 GOPS/frame and streams 15 MB of weights/activations per frame.
    At 120 FPS, compute is 24 TOPS (fits within the 26 TOPS Hailo-8 limit) and host bandwidth is 1.8 GB/s.
    If we apply 80% unstructured sparsity, bandwidth remains 1.8 GB/s and compute remains 24 TOPS for
    the dense dataflow array. If we instead apply 50% structured channel pruning, compute scales quadratically
    down by 4x to 6 TOPS, and memory footprints scale down by 2x to 7.5 MB/frame. The required streaming
    bandwidth drops to 900 MB/s, vastly reducing host overhead and leaving significant compute headroom
    within the 2.5W budget.
