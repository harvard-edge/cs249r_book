title: The Real-Time Driver Monitoring Dilemma
scenario: You are the Staff ML Systems Engineer for an automotive Tier 1 supplier. Your team is developing a driver monitoring system on a Jetson AGX Orin. The baseline MobileNetV2-based model correctly detects driver drowsiness in 25ms. The product team now wants to add 'cell phone use' detection to the same model. A naive approach of adding a second classification head and retraining increases model size by only 15%, but latency jumps to 40ms. Profiling shows the model is heavily compute-bound.
question: How do you solve this problem and ship both features while staying within a hard 33ms real-time budget?
details:
  realistic_solution: The correct approach is to use a Mixture-of-Experts (MoE) architecture. The model is compute-bound, so the goal is to add functionality without increasing the number of floating-point operations (FLOPs) executed per inference. With an MoE approach, you can train two separate, efficient 'expert' networks (one for drowsiness, one for cell phone use) that are roughly the same size as the original baseline model. A tiny, inexpensive gating network learns to route the input features to the correct expert for the current frame. Since only the gating network and one expert run per inference, the total computational load remains almost identical to the original baseline, keeping latency low. This allows the system to scale its capabilities without scaling its per-inference cost.
  common_mistake: |
    **The Pitfall:** Assuming parameter counts scale linearly with latency on accelerators.
    **The Rationale:** Engineers assume adding parameters proportionally increases latency, failing to account for arithmetic intensity or exploring MoE routing.
    **The Consequence:** Missing hard real-time deadlines by deploying dense models that push the hardware past a performance cliff.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target deadline: 33ms.
       - Original Model Latency: 25ms.
       - Naive Multi-Head Latency: 40ms.
    2. **Calculations:**
       - Proposed Architecture: Mixture-of-Experts (MoE).
       - MoE Gating Network Overhead: ~1ms.
       - MoE Expert Execution: ~25ms.
       - Total MoE Latency: 1ms + 25ms = 26ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Optimized.** MoE routes inputs to specialized experts, adding functionality without increasing per-inference FLOPs, comfortably beating the 33ms deadline.
  options:
  - Replace the CNN with a more expressive Vision Transformer (ViT) architecture to learn both tasks simultaneously.
  - Run Neural Architecture Search (NAS) to automatically find a single, more efficient architecture for both tasks.
  - Implement a Mixture-of-Experts (MoE) architecture with a gating network that routes inputs to a specialized 'drowsiness' or 'distraction' expert.
  - Apply 8-bit quantization. Since the model is compute-bound, reducing the data size will not help latency.
