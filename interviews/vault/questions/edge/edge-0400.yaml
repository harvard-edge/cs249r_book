title: The Depthwise Separable Efficiency Gain (edge-0400)
scenario: You're designing a perception model for an autonomous vehicle's side camera, which runs on a power-constrained chip like a Jetson AGX Orin. You are considering two options for a key convolutional layer that takes a 224x224x64 input tensor and must produce a 224x224x128 output tensor.
question: For the 224x224x64 to 224x224x128 layer, how many parameters do standard 3x3 and depthwise separable 3x3 convolutions require?
details:
  realistic_solution: The depthwise separable convolution dramatically reduces the parameter count, which is critical for edge devices with limited memory and power.
  common_mistake: |
    **The Pitfall:** Calculating parameters only for the 'depthwise' part and forgetting the 'pointwise' (1x1) part.
    **The Rationale:** The two-stage nature of depthwise separable convolutions is easily forgotten, leading to wildly overestimated parameter reductions. Another error is confusing parameters with MACs.
    **The Consequence:** Incorrect model sizing and misguided architectural choices during edge deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input tensor: 224x224x64. Output tensor: 224x224x128.
       - Standard Conv 3x3 vs Depthwise Separable 3x3.
    2. **Calculations:**
       - Standard Conv parameters = 3 * 3 * 64 * 128 = 73,728.
       - Depthwise Separable parameters = (3 * 3 * 64) + (1 * 1 * 64 * 128) = 576 + 8,192 = 8,768.
       - Ratio = 73,728 / 8,768 = ~8.4x.
    3. **Conclusion & Interpretation:**
       - **Result: Depthwise separable convolution requires 8,768 parameters, providing an ~8.4x parameter reduction.**
  options:
  - Depthwise separable is ~128x more efficient, requiring only 576 parameters.
  - Standard convolution is more efficient, requiring only 8,192 parameters.
  - Depthwise separable is ~8.4x more efficient, requiring 8,768 parameters versus 73,728.
  - They require the same number of parameters, but the MAC count is different.
  correct_index: 2
