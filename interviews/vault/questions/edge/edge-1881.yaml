title: Hailo-8 Memory Optimization for Real-time Inference
scenario: You are deploying a large language model (LLM) for real-time inference on a Hailo-8 dataflow accelerator. The model requires activations that exceed the available on-chip memory. During deployment, you observe frequent OOM errors and significant latency spikes due to data transfers.
question: How would you optimize memory and handle OOMs for an INT8 LLM on Hailo-8 when activations exceed on-chip memory?
details:
  realistic_solution: 'Implement dynamic layer-wise execution where intermediate activations are systematically pinned to host memory (CMA) and DMA-streamed. Apply sequence-length limits or dynamic batch sizing. Do not rely on OS swap space. Utilize INT8 activation quantization extensively to halve the transfer bandwidth required compared to FP16.'
  common_mistake: |
    **The Pitfall:** Focusing purely on model weight quantization while ignoring dynamic activation footprints.
    **The Rationale:** Candidates treat generative models like static CNNs, forgetting that the KV cache and intermediate activations grow dynamically and exceed fixed SRAM.
    **The Consequence:** Catastrophic latency spikes as the dataflow engine thrashes the host memory bus during generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 target latency: 10ms per inference pass.
       - Host DRAM bandwidth: 10 GB/s.
       - Transformer layer activation: 1 GB (FP16).
    2. **Calculations:**
       - INT8 quantization reduces activation to ~0.5 GB.
       - Bandwidth to stream 1 layer's activation: 0.5 GB / 10ms (0.01s) = 50 GB/s.
       - 50 GB/s >> 10 GB/s available DRAM bandwidth.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth Starvation.** Streaming just one layer's INT8 activations requires 50 GB/s, vastly exceeding the host's 10 GB/s limit, explaining the severe latency spikes.
