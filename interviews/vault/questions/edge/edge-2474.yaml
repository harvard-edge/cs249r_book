title: Analyzing WAL Persistence Before Thermal Crash
scenario: A Jetson AGX Orin processes a continuous video stream for security alerts,
  occasionally experiencing hard thermal shutdowns.
question: Analyze a strategy to prevent losing critical alert events that occur within
  the 2 seconds prior to a hard thermal shutdown.
details:
  realistic_solution: The application should write detected events to a durable write-ahead
    log (WAL) on the NVMe SSD immediately upon inference. Upon reboot, the system
    parses the WAL to transmit any unsent alerts, ensuring RAM loss during the power-cut
    doesn't drop the alert.
  common_mistake: Relying on OS-level core dumps or assuming volatile RAM contents
    can be safely recovered after a sudden thermal power-cut.
  napkin_math: RAM loses 2s = 60 frames
