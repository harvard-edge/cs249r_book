title: 'Analyzing WAL Persistence Before Thermal Crash'
scenario: 'A Jetson AGX Orin processes a continuous video stream for security alerts, occasionally experiencing hard thermal shutdowns.'
question: 'Analyze a strategy to prevent losing critical alert events that occur within the 2 seconds prior to a hard thermal shutdown.'
details:
  realistic_solution: |
    The application should write detected events to a durable write-ahead log (WAL) on the NVMe SSD immediately upon inference. Upon reboot, the system parses the WAL to transmit any unsent alerts, ensuring RAM loss during the power-cut doesn't drop the alert.
  common_mistake: |
    **The Pitfall:** Relying on OS-level core dumps or assuming volatile RAM contents can be safely recovered.
    **The Rationale:** Standard fault-tolerance paradigms assume graceful degradation or process-level restarts, not sudden hardware power cuts.
    **The Consequence:** Irrecoverable data loss of critical security events that were processed but not transmitted before the thermal trip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video framerate: 30 frames per second.
    - Time lost: 2 seconds prior to shutdown.

    **Calculations:**
    - Frames at risk: 30 fps * 2 seconds = 60 frames.

    **Conclusion & Interpretation:**
    - **Result: 60 frames lost (Storage-Bound).** Without a durable Write-Ahead Log (WAL) to NVMe, the events in those 60 frames are permanently lost from RAM.
