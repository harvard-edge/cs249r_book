title: Optimizing Large Language Model Inference with Mixed-Precision on Qualcomm Cloud AI 100
scenario: Your team is deploying a large language model (LLM) for real-time inference on a Qualcomm Cloud AI 100 accelerator, which features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W TDP. The LLM was initially trained in FP32 and has a memory footprint that exceeds the available 32 GB LPDDR4x when running with full precision. You need to achieve the lowest possible inference latency while maintaining a target accuracy, all within the power and memory constraints of the Qualcomm Cloud AI 100.
question: What mixed-precision deployment strategy would fit the FP32 LLM within the Cloud AI 100's 32 GB memory while minimizing latency and preserving accuracy?
details:
  realistic_solution: A realistic solution involves a multi-faceted approach. First, profiling the FP32 model to identify layers that are sensitive to precision reduction. Second, employing a mixed-precision strategy, potentially using FP16 or BF16 for most layers while keeping critical, sensitive layers in FP32 (if memory allows) or a higher precision FP8 format. Leveraging the Qualcomm Cloud AI 100's 400 TOPS INT8 capability suggests exploring INT8 quantization for suitable layers, possibly using techniques like quantization-aware training (QAT) or post-training quantization (PTQ) with calibration datasets. Loss scaling would be crucial during any mixed-precision fine-tuning to prevent underflow/overflow issues. For inference, optimizing kernel selection and data layout for the specific hardware, ensuring efficient memory bandwidth utilization to mitigate the LPDDR4x limitations, and strategically offloading less critical components to CPU or other available resources could further enhance performance within the 75W power budget.
  common_mistake: |
    **The Pitfall:** Blindly converting the entire model to INT8 or FP16 without analyzing layer sensitivity.
    **The Rationale:** Candidates often assume a uniform quantization approach is sufficient and focus solely on compute performance.
    **The Consequence:** This leads to significant accuracy degradation. Furthermore, neglecting the impact of memory access patterns and data movement on overall latency ignores the reality that LLMs are often bandwidth-bound.
  napkin_math: |
    * Assume FP32 model size: ~64 GB (exceeds 32 GB memory).
    * Target memory: < 32 GB.
    * FP16/BF16 conversion (2 bytes/param): ~32 GB (marginal fit, likely OOM with KV cache/activations).
    * INT8 conversion (1 byte/param) for 80% of layers + FP16 for 20%: (0.8 × 16 GB) + (0.2 × 32 GB) = 12.8 GB + 6.4 GB = 19.2 GB.
    * Compute speedup: Replacing a 100 GFLOPS FP32 operation with INT8 theoretically speeds up compute by 2-4x, but effective latency reduction is limited by LPDDR4x bandwidth.
    * **Applying INT8 to most layers and FP16 to sensitive layers reduces the footprint to ~19.2 GB, safely fitting in memory and maximizing the 400 TOPS INT8 engine.**
