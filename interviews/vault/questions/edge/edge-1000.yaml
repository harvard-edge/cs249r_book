title: 'Fluency: Identifying When Gradient Checkpointing Helps vs. Hurts on Constrained
  Edge Hardware'
scenario: A firmware engineer is debugging why enabling gradient checkpointing on
  a Jetson Orin training job for a 100M parameter ResNet increased training time by
  80% instead of the expected 33%. They want to understand under what conditions gradient
  checkpointing overhead deviates significantly from the theoretical one-extra-forward-pass
  model.
question: Why might gradient checkpointing on Orin increase ResNet training time by
  80% instead of the expected 33%?
details:
  realistic_solution: 'A common misdiagnosis is to blame memory bandwidth for weight reloading. However, a 100M parameter model (200MB in FP16) reloading its weights per layer only adds ~3ms total (4MB/layer / 68GB/s = 0.06ms * 50 layers). The actual 80% overhead on a Jetson Orin stems from CPU-bound framework inefficiencies. The PyTorch gradient checkpointing wrapper introduces significant host-device synchronization and kernel launch overhead. Because the Orin has lower single-thread CPU performance compared to desktop/server CPUs, this framework overhead dominates the step time, far exceeding the theoretical 33% compute overhead.'
  common_mistake: 'Assuming the overhead is simply due to memory bandwidth for reloading weights. While the Orin has lower memory bandwidth (68 GB/s) than a datacenter GPU, calculating the actual byte transfers shows this only accounts for ~2% overhead. The real mistake is ignoring host-side CPU overhead (kernel launches, synchronization) which disproportionately affects mobile SoCs like the Orin when running complex PyTorch wrappers.'
  napkin_math: 'Orin effective BW: 68 GB/s. ResNet weights per layer: 200 MB / 50
    layers = 4 MB/layer. Layer recompute weight reload: 4 MB / 68 GB/s = 0.059 ms/layer.
    50 layers recomputed = 2.9 ms additional. Forward pass time: ~50 ms. Backward:
    ~100 ms. Overhead: 2.9 ms / 150 ms = 2% — much less than reported 80%. Discrepancy
    suggests profiling issue: check for excessive host-device synchronization added
    by PyTorch checkpoint wrapper on Orin.'
