title: Jetson Orin Zero-Copy Vision
scenario: Engineering a real-time multi-camera video analytics pipeline for a delivery
  bot using a Jetson AGX Orin.
question: Design a memory-mapped zero-copy pipeline specification from the camera
  ISP to the GPU to ensure 4x 1080p 60FPS streams don't bottleneck the 204.8 GB/s
  LPDDR5 bandwidth.
details:
  realistic_solution: The specification should allocate NVMM (Nvidia Memory Management)
    buffers that are physically contiguous and shared between the ISP and GPU. Four
    1080p streams at 60FPS in RGB888 consume 1.49 GB/s. By avoiding CPU copy loops
    and using V4L2 to write directly to NVMM, the memory bus usage is kept at a fraction
    of the 204.8 GB/s limit, leaving ample bandwidth for TensorRT weight fetching.
  common_mistake: Routing the frames through OpenCV CPU mats before GPU upload, tripling
    the memory bandwidth usage to ~4.5 GB/s per stream due to copy overhead.
  napkin_math: 4 * 1920 * 1080 * 3 B * 60 = 1.49 GB/s
