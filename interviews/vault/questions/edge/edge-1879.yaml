title: LLM Deployment with Memory Constraints on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a 15-billion parameter large language model (LLM) for real-time inference on the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x memory. Despite quantizing the model weights to INT8, you encounter persistent out-of-memory (OOM) errors during inference. The model's architecture involves deep transformer layers, leading to substantial intermediate activation tensors.
question: Why can a 15B INT8 LLM still OOM on Cloud AI 100, and what memory-pressure strategies and OS effects would you consider?
details:
  realistic_solution: 'Effective solutions include: 1. Activation Checkpointing/Gradient Checkpointing (for training, but similar principles apply to managing large activation graphs during inference if intermediate results need to be recomputed for memory savings) or more practically, careful selection of batch size and sequence length to fit memory. 2. Layer-wise execution or dynamic offloading of model layers/activations to host memory (if available and latency permits) combined with techniques like speculative decoding or attention key-value cache optimization. 3. Further quantization of activations (e.g., INT4) if feasible, or employing dynamic batching with careful memory pooling to reduce fragmentation. Discussing how to monitor memory usage patterns (e.g., using `perf` or platform-specific tools) to identify peak usage, and the role of OS page caching or eviction for less critical data.'
  common_mistake: |
    **The Pitfall:** Focusing solely on weight quantization and ignoring dynamic memory footprint.
    **The Rationale:** Candidates often assume that if the weights fit in memory, the model will run successfully.
    **The Consequence:** They fail to account for activations, KV cache, and memory fragmentation, leading to inevitable OOM errors during inference.
  napkin_math: |
    1. Model weights (INT8): 15 billion parameters * 1 byte = 15 GB.
    2. Total memory capacity: 32 GB.
    3. Remaining memory for activations/OS: 32 GB - 15 GB = 17 GB.
    4. If batch size 1 requires 16 GB for activations/KV cache, it fits.
    5. If batch size 2 requires 32 GB for activations/KV cache, it exceeds the 17 GB remaining.
    6. Conclusion: Maximum effective batch size is severely constrained by the **17 GB limit** for activations.
