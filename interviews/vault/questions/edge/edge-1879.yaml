title: LLM Deployment with Memory Constraints on Qualcomm Cloud AI 100
scenario: You are deploying a 15-billion parameter large language model (LLM) for real-time inference on an accelerator with 32 GB memory. Despite quantizing the model weights to INT8, you encounter persistent out-of-memory (OOM) errors during inference. The model's architecture involves deep transformer layers, leading to substantial intermediate activation tensors.
question: Why can a 15B INT8 LLM still OOM on a 32 GB device, and what memory-pressure strategies and OS effects would you consider?
details:
  realistic_solution: LLMs possess a devastating dynamic memory profile driven exclusively by sequence lengths via the KV Cache. Even identically quantized static graphs can aggressively exceed available VRAM during decoding. The architectural fix requires explicitly clipping the operational sequence length, migrating to PagedAttention schemas, or reducing batch size to explicitly cap dynamic KV Cache growth below the device ceiling.
  common_mistake: |
    **The Pitfall:** Focusing solely on weight quantization and ignoring dynamic memory footprint.
    **The Rationale:** Candidates often assume that if the weights fit in memory, the model will run successfully.
    **The Consequence:** They fail to account for activations, KV cache, and memory fragmentation, leading to inevitable OOM errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: 15B INT8
       - Total System RAM: 32 GB
       - INT8 footprint: 1 byte per parameter
    **Calculations:**
       - Weights footprint: 15 * 10^9 bytes = 15 GB
       - Remaining RAM: 32 GB - 15 GB = 17 GB
       - If batch size = 2 KV Cache = ~20 GB (Exceeds 17 GB)
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound Activations.** Dynamic activation tensors and the KV cache will exceed the 17 GB headroom, causing an OOM despite the weights fitting in memory.
