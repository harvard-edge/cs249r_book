title: Dual-Branch Network Scheduling on Qualcomm AI 100
scenario: You are deploying a dual-branch vision model on a Qualcomm Cloud AI 100. The model has a shared 5MB input tensor that must remain in SRAM until both branches finish executing. Branch A requires 25MB of working memory during execution and produces a 5MB output. Branch B requires 10MB of working memory and produces a 15MB output. Both outputs must be kept in memory for a subsequent fusion layer.
question: What are the peak SRAM footprints for the A-then-B and B-then-A branch schedules, and which order minimizes spilling?
details:
  realistic_solution: Linear graph traversal dictates the total SRAM footprint dynamically. Scheduling heavily bloated temporary activation limits directly changes the peak required high-watermark.
  common_mistake: |
    **The Pitfall:** Assuming scheduling order only affects latency and ignoring asymmetric memory lifecycles.
    **The Rationale:** Candidates fail to account for the accumulated outputs that must be kept alive while the second branch executes.
    **The Consequence:** Incorrect peak memory estimates resulting in unexpected out-of-memory errors or performance-killing spills to LPDDR4x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 5MB shared
       - Branch A: 25MB work, 5MB out
       - Branch B: 10MB work, 15MB out
    2. **Calculations:**
       - A-then-B Executing A: 5MB in + 25MB A_work = 30MB Peak
       - A-then-B Executing B: 5MB in + 5MB A_out + 10MB B_work = 20MB Peak
       - B-then-A Executing B: 5MB in + 10MB B_work = 15MB Peak
       - B-then-A Executing A: 5MB in + 15MB B_out + 25MB A_work = 45MB Peak
    3. **Conclusion & Interpretation:**
       - **Result: A-then-B schedule saves 15MB of peak SRAM footprint.**
