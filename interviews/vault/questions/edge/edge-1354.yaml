title: Dual-Branch Network Scheduling on Qualcomm AI 100
scenario: You are deploying a dual-branch vision model on a Qualcomm Cloud AI 100 (400 TOPS INT8, 75W, 32 GB LPDDR4x). The model has a shared 5MB input tensor that must remain in SRAM until both branches finish executing. Branch A requires 25MB of working memory during execution and produces a 5MB output. Branch B requires 10MB of working memory and produces a 15MB output. Both outputs must be kept in memory for a subsequent fusion layer. To avoid spilling to LPDDR4x and keep intermediate tensors within the accelerator's limited SRAM, you must determine the optimal sequential execution order.
question: What are the peak SRAM footprints for the A-then-B and B-then-A branch schedules, and which order minimizes spilling?
details:
  realistic_solution: 'The correct approach is to trace the memory footprint at each execution step by tracking all live tensors: the shared input, the working memory of the currently executing branch, and the preserved outputs of previously completed branches. To minimize peak memory, the optimal schedule executes the branch with the larger working memory and smaller output tensor first, preventing large outputs from occupying SRAM during the execution of memory-intensive branches.'
  common_mistake: |
    **The Pitfall:** Assuming scheduling order only affects latency and ignoring asymmetric memory lifecycles.
    **The Rationale:** Candidates fail to account for the accumulated outputs that must be kept alive while the second branch executes.
    **The Consequence:** Incorrect peak memory estimates resulting in unexpected out-of-memory errors or performance-killing spills to LPDDR4x.
  napkin_math: |
    - **Schedule A then B:**
      - Executing A: 5MB (input) + 25MB (A_work) = 30MB peak.
      - Executing B: 5MB (input) + 5MB (A_out) + 10MB (B_work) = 20MB peak.
      - **Overall Peak = 30MB**.
    - **Schedule B then A:**
      - Executing B: 5MB (input) + 10MB (B_work) = 15MB peak.
      - Executing A: 5MB (input) + 15MB (B_out) + 25MB (A_work) = 45MB peak.
      - **Overall Peak = 45MB**.
    - **Conclusion:** Executing A then B is optimal and **saves 15MB of peak SRAM footprint**.
