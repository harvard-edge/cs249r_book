title: Flash Wearout vs. Recovery Time in Checkpointing
scenario: A fleet of mapping drones uses Jetson AGX Orins to locally checkpoint complex 3D map state to an SD card every 5 minutes.
question: Describe how the 5-minute checkpoint interval balances physical hardware constraints against the system's Recovery Time Objective (RTO).
details:
  realistic_solution: Shorter checkpoint intervals decrease RTO, meaning less recent mapping data is lost in the event of a crash. However, writing massive map data frequently severely degrades the physical SD card due to limited flash write cycles. Five minutes is a compromise that limits lost data to 5 minutes while preventing premature SD card death.
  common_mistake: |
    **The Pitfall:** Focusing solely on the CPU/bus overhead of checkpointing.
    **The Rationale:** Engineers often treat edge flash storage like enterprise SSDs, forgetting its severely limited write endurance.
    **The Consequence:** Ignoring flash memory degradation leads to premature SD card death and complete device failure in the field.
  napkin_math: |
    - **Frequency:** 60 minutes / 5 minutes = 12 writes/hr.
    - **Final Result:** **12 full-state writes per hour balances map recovery integrity against the finite Program/Erase (P/E) limits of the SD card.**
