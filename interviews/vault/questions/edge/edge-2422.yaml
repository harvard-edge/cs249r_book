title: Flash Wearout vs. Recovery Time in Checkpointing
scenario: A fleet of mapping drones uses Jetson AGX Orins to locally checkpoint complex
  3D map state to an SD card every 5 minutes.
question: Describe how the 5-minute checkpoint interval balances physical hardware
  constraints against the system's Recovery Time Objective (RTO).
details:
  realistic_solution: Shorter checkpoint intervals decrease RTO, meaning less recent
    mapping data is lost in the event of an Orin crash or power failure. However,
    writing massive map data frequently severely degrades the physical SD card due
    to limited flash write cycles (write amplification). Five minutes is a compromise
    that limits lost data to 5 minutes while preventing premature SD card death.
  common_mistake: Focusing solely on the CPU/bus overhead of checkpointing and ignoring
    flash memory degradation.
  napkin_math: 60 / 5 = 12 writes/hr
