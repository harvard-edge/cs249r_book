title: Flash Wearout vs. Recovery Time in Checkpointing
scenario: A fleet of mapping drones uses edge devices to locally checkpoint 3D map state to an SD card every 5 minutes.
question: Describe how the 5-minute checkpoint interval balances physical hardware constraints against the system's Recovery Time Objective (RTO).
details:
  realistic_solution: Shorter checkpoint intervals decrease RTO, meaning less recent mapping data is lost in a crash. However, frequently writing massive map data degrades the physical SD card due to limited flash write cycles. Five minutes is a compromise ensuring survivability without premature SD card death.
  common_mistake: |
    **The Pitfall:** Focusing solely on the CPU/bus overhead of checkpointing.
    **The Rationale:** Engineers often treat edge flash storage like enterprise NVMe SSDs, forgetting its severely limited write endurance.
    **The Consequence:** Ignoring flash memory degradation leads to premature SD card death and complete device failure in the field.
  napkin_math: |
    1. **Assumptions & Constraints:** Checkpoint interval = 5 minutes. SD cards have finite Program/Erase (P/E) cycles.
    2. **Calculations:** Frequency = 60 minutes / 5 minutes = 12 full-state writes per hour.
    3. **Conclusion & Interpretation:** **Result: 12 writes/hr balances integrity vs P/E limits.** **System Status: Storage-Endurance-Bound.**
