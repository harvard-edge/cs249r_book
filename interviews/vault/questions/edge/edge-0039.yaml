title: The Foggy Lens Confidence Collapse
scenario: A security camera runs a MobileNet-V2 person detector at 15 FPS. After a cold night, the lens fogs up at dawn. The system reports 'healthy,' but the false negative rate jumps from 2% to 65% for 3 hours before operations notices.
question: How does lens fog cause high-confidence false negatives in a CNN, and how can this failure be detected automatically?
details:
  realistic_solution: Fog creates a uniform low-contrast haze across the image. The model's convolutional filters rely on edge gradients to detect people — fog suppresses gradients below the activation thresholds of early layers. The model doesn't output garbage; it outputs high-confidence "no detection" because the foggy image genuinely looks like an empty scene to the network.
  common_mistake: |
    **The Pitfall:** Adding a hardware heater without implementing software detection.
    **The Rationale:** Addressing the physical symptom (fog) seems logical but fails to solve the monitoring observability gap.
    **The Consequence:** The system remains vulnerable to silent failures (running blind without alerting) if the heater breaks or other obstructions occur.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard sharp image Laplacian variance: ~800.
       - Foggy image Laplacian variance: < 100.
       - 3-hour blind window with 1 person/min traffic.
    2. **Calculations:**
       - Missed detections: 1 person/min * 180 minutes = 180 missed detections.
       - Detection threshold logic: Trigger alert if Laplacian variance < 100.
    3. **Conclusion & Interpretation:**
       - **Result: 180 missed detections.** Fog suppresses edge gradients below activation thresholds. A simple Laplacian variance check acts as a reliable software guardrail. **System Bottleneck: Data Quality / Observability**.
