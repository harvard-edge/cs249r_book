title: Optimizing CI/CD Deployment Pipelines for Hailo-8 Dataflow Architectures
scenario: Your MLOps team has implemented an automated CI/CD pipeline to deploy updated vision models to a fleet of autonomous industrial robots powered by the Hailo-8 edge AI processor. However, after a recent update, the overall system throughput has dropped significantly, despite the new model having the same INT8 operations count as the previous version. The pipeline currently compiles the model for the Hailo-8 (26 TOPS, 2.5W) but treats it as a standard discrete accelerator.
question: What deployment bottleneck can drop Hailo-8 throughput despite unchanged INT8 ops, and how should CI/CD configure host streaming?
details:
  realistic_solution: 'The bottleneck is likely memory bandwidth saturation caused by inefficient data streaming from the host memory to the Hailo-8. Because the Hailo-8 relies entirely on the host for memory, the CI/CD pipeline must explicit allocate contiguous pinned memory on the host and configure DMA transfers optimally to overlap data transfers with computation.'
  common_mistake: Assuming the bottleneck is strictly within the model's compute requirements or the Hailo-8's processing capabilities, failing to recognize that for dataflow accelerators without local DRAM, host-to-accelerator memory bandwidth is the primary constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 requires host streaming (no local DRAM)
    - 2MB input, 1MB output at 30 FPS
    - Non-pinned memory copy overhead = 1ms per MB

    **Calculations:**
    - Bandwidth required = 3MB * 30 FPS = 90 MB/s
    - Pageable copy overhead = 3MB * 1ms/MB = 3ms per frame
    - Pinned memory eliminates this 3ms overhead entirely

    **Conclusion & Interpretation:**
    - **Result: 3ms Overhead Saved (Memory-Bandwidth-Bound)**. Direct DMA via pinned memory is critical for dataflow accelerators lacking local DRAM to sustain throughput.
