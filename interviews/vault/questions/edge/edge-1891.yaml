title: Optimizing Real-time Inference on NVIDIA Jetson Orin with Adaptive Batching
scenario: You are tasked with deploying a critical real-time object detection model on an NVIDIA Jetson Orin platform (64 GB LPDDR5, 275 TOPS INT8, 60W TDP). The model needs to process a variable stream of input frames from multiple cameras. Your system must maintain an average end-to-end latency of less than 50ms for 90% of inferences while maximizing overall throughput. The input frame rate fluctuates from 10 FPS to 100 FPS across all cameras.
question: What batching and scheduling policy would you use on Jetson Orin to keep 90% of variable-camera inferences under 50 ms while maximizing throughput?
details:
  realistic_solution: An effective solution utilizes continuous batching. Keep the GPU busy with partially filled batches, inferring as soon as frames are available, and coalescing subsequent arrivals if the current batch is still processing. The scheduling policy must dynamically adapt batch sizes based on queue depth and latency budgets, implementing selective frame drops under extreme load to meet critical latency SLAs while staying within the 60W TDP.
  common_mistake: |
    **The Pitfall:** Implementing a static batch size.
    **The Rationale:** Candidates fail to account for variable input rates, setting a fixed batch that waits too long during low load or creates massive queues during high load.
    **The Consequence:** Missed real-time SLAs due to either unnecessary waiting or unbounded queuing, as well as memory bandwidth saturation.
  napkin_math: |
    1. **Peak Inference:** 275 TOPS (INT8) / 50 Giga-ops (per inference) = 5,500 Inferences Per Second (IPS) theoretical max.
    2. **Latency Target:** Target end-to-end latency is 50ms, implying a minimum processing rate of 1 / 0.050 = 20 inferences/second per critical stream.
    3. **Memory Constraint:** If a frame is 1MB, a batch of 32 requires 32MB of transfer per inference.
    4. **Bottleneck:** Uncontrolled batch scaling will saturate the LPDDR5 bandwidth, missing the 50ms latency target for real-time cameras despite raw compute headroom.
