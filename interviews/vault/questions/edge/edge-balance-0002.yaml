title: Edge Data Validation Sample
scenario: An edge gateway receives 80,000 sensor windows/day. Full validation costs 20 ms per window, but only 20 CPU-minutes/day are available for validation. Estimate the maximum full-validation sample size and decide whether sampling is required.
question: How many edge sensor windows can be fully validated with a 20 CPU-minute/day budget at 2 ms per window?
details:
  realistic_solution: The budget is 1,200 CPU-seconds. At 20 ms per window, the gateway can validate 60,000 windows, below the 80,000 daily windows. It must sample or use cheaper always-on checks for the remaining windows.
  common_mistake: Assuming edge validation must be sampled without checking the actual CPU budget.
  napkin_math: 20 min = 1,200 s. Windows = 1,200 / 0.020 = 60,000. Shortfall = 80,000 - 60,000 = 20,000 windows.
