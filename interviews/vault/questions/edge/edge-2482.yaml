title: Edge Server Queue Depth
scenario: An edge server processes IoT data using a single Hailo-8 accelerator. Requests arrive at 15 per second, and each inference takes 40ms.
question: Calculate the utilization of the accelerator and specify the required queue length to hold the average number of queued requests.
details:
  realistic_solution: Arrival rate lambda is 15/s. Service rate mu is 1/0.04 = 25/s. Utilization rho is 15/25 = 0.6. Using the M/M/1 formula, the average queue length L_q is rho^2 / (1 - rho).
  common_mistake: |
    **The Pitfall:** Calculating utilization incorrectly by mishandling the service rate inversion.
    **The Rationale:** Candidates often mix up the units of time (milliseconds vs seconds) when calculating the service rate.
    **The Consequence:** Arriving at a utilization rho > 1, falsely concluding the system is unstable and requires immediate hardware upgrades.
  napkin_math: |
    * **Arrival Rate (lambda):** 15 requests/sec.
    * **Service Time:** 40ms = 0.04 seconds.
    * **Service Rate (mu):** 1 / 0.04 = 25 inferences/sec.
    * **Utilization (rho):** 15 / 25 = 0.6 (60% utilized).
    * **Average Queue Length (L_q):** For an M/M/1 queue, L_q = rho^2 / (1 - rho).
    * **Calculation:** 0.6^2 / (1 - 0.6) = 0.36 / 0.4 = **0.9 requests**.
