title: Edge Server Queue Depth
scenario: An edge server processing IoT data has a single Hailo-8 accelerator. Requests
  arrive at 15 per second, and each inference takes 40ms.
question: Calculate the utilization of the accelerator and specify the required queue
  length to hold the average number of queued requests.
details:
  realistic_solution: Arrival rate lambda is 15/s. Service rate mu is 1/0.04 = 25/s.
    Utilization rho is 15/25 = 0.6. Using the M/M/1 formula, the average queue length
    L_q is rho^2 / (1 - rho).
  common_mistake: Calculating rho > 1 due to math errors in inversion and incorrectly
    stating the system is unstable.
  napkin_math: rho = 15 * 0.04 = 0.6. L_q = 0.6^2 / (1 - 0.6) = 0.36 / 0.4 = 0.9.
