title: The Sensor Synchronization Problem
scenario: 'Your autonomous vehicle''s perception stack on an Ambarella CV5 fuses three sensors: a camera
  at 30 FPS (33.3ms period), a LiDAR spinning at 10 Hz (100ms period), and a radar at 20 Hz (50ms period).
  Each sensor has an independent clock with up to ±2ms drift from the system clock. Your fusion algorithm
  requires all sensor readings to be within 10ms of each other. Your colleague says ''just use the latest
  reading from each sensor.'' Why does this fail, and how do you design a proper synchronization scheme?'
details:
  realistic_solution: 'The "latest reading" approach creates a worst-case temporal spread of: camera age
    (0-33ms) + LiDAR age (0-100ms) + clock drift (±2ms per sensor, ±6ms total). Worst case: camera frame
    from 33ms ago, LiDAR scan from 100ms ago, radar from 50ms ago — a 100ms spread. At 60 km/h, a vehicle
    moves 1.67m in 100ms. Fusing a camera image showing the vehicle at position X with a LiDAR scan showing
    it at position X-1.67m creates a ghost object or missed detection.'
  common_mistake: '"Use the latest reading from each sensor — they''re all recent enough." This creates
    temporal inconsistency: the ''latest'' camera frame might be 33ms old while the radar is 5ms old,
    fusing data from different moments in time.'
  napkin_math: 'Without sync: worst-case temporal spread = 100ms (LiDAR period). At 60 km/h = 16.7 m/s:
    positional error = 16.7 × 0.1 = **1.67m**. With ApproximateTimeSynchronizer (10ms window): worst-case
    spread = 10ms → error = 0.167m. With hardware PPS + motion compensation (1ms residual): error = 0.017m.
    Fusion rate: min(30, 10, 20) = 10 Hz (LiDAR-limited). Buffer memory: 3 frames × (2 MB camera + 1 MB
    LiDAR + 0.1 MB radar) = **9.3 MB** — trivial on the CV5''s 8 GB DRAM.'
