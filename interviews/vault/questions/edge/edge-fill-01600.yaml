title: Optimizing Edge ML Data Storage on NVIDIA Jetson Orin for Autonomous Drones
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W) for an autonomous drone. The drone continuously captures high-resolution video frames
  (1920x1080, 30fps) and corresponding inference results (bounding boxes, class probabilities). Due to
  intermittent network connectivity, data must be stored locally on the Jetson for at least 24 hours before
  offloading to a cloud backend. The available storage on the Jetson is limited to 256GB. Design and compare
  two distinct data storage architectures for this scenario, focusing on the trade-offs between storage
  format (e.g., raw frames + separate metadata, TFRecord, Parquet), compression techniques, and their
  impact on latency, storage efficiency, and computational load on the Orin.
question: "What two local storage architectures would you compare for 24 hours of 1080p 30fps video and detections on a 256GB Jetson Orin?"
details:
  realistic_solution: One architecture could involve storing raw video streams (e.g., H.264/H.265 compressed)
    in chunked files (e.g., MP4 segments) and storing associated inference metadata (JSON or Protobuf)
    in highly compressed Parquet files (using Zstd or Snappy) that are time-partitioned. This allows for
    efficient querying of metadata and minimizes raw video storage. A second architecture might involve
    aggregating batches of frames and their corresponding inference results into TFRecord files, utilizing
    TFRecord's ability to store structured data efficiently. Compression within TFRecord (e.g., using
    GZIP) would be evaluated. The comparison should detail how each approach utilizes the Jetson's hardware
    (e.g., hardware video decoders, GPU for potential preprocessing, CPU for deserialization) and its
    implications for power consumption (60W budget).
  common_mistake: Overlooking the computational cost of decompression and deserialization on the limited
    CPU/GPU resources of the Jetson Orin, leading to dropped frames or increased inference latency. Another
    common mistake is choosing a generic format like HDF5 or CSV without considering the specific access
    patterns (e.g., sequential vs. random access to frames or metadata) and the benefits of columnar vs.
    row-based storage for different data types.
  napkin_math: A 1920x1080 30fps video stream without compression would require approximately 16.1 TB
    for 24 hours (1920*1080*3 bytes/pixel * 30 fps * 3600 s/hr * 24 hr). With H.264 compression at 10
    Mbps (a common bitrate for this resolution), 24 hours of video is approximately 108 GB (10 Mbps *
    3600 s/hr * 24 hr / 8 bits/byte). Adding metadata (e.g., 1KB per frame) without efficient compression
    would add ~2.5 GB (1KB * 30 fps * 3600 s/hr * 24 hr). The total (108GB + 2.5GB = 110.5GB) fits within
    256GB, but aggressive compression for metadata (e.g., Parquet with Zstd) is still crucial to leave
    room for OS, models, and other application data, while balancing decompression overhead.
