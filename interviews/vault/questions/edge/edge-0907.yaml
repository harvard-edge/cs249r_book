title: Edge TPU Spatial Tiling Overhead
scenario: You are deploying a U-Net based super-resolution model on a Google Edge TPU (8MB SRAM, USB 3.0 interface). To fit the 1080p input image, the host CPU spatially tiles the image into 16x16 overlapping patches and sends them to the TPU sequentially. The system targets 30 FPS but only achieves 4 FPS. USB bandwidth monitoring shows 1.8 GB/s of sustained bidirectional transfer.
question: What is causing the 4 FPS bottleneck, and how would you change tiling and execution to reach 30 FPS?
details:
  realistic_solution: The severe bottleneck is the redundant PCIe/USB host-to-device data transfer caused by naive spatial tiling. Because convolutions have receptive fields, splitting an image into spatial tiles requires overlapping 'halos' to prevent edge artifacts. In a deep U-Net, this halo grows exponentially with depth. If the host tiles the input, it must transmit the massive overlapping regions repeatedly, saturating the USB 3.0 bandwidth. The co-design solution is 'Fused Layer Execution' or 'Depth-First Scheduling' inside the compiler. Instead of host-side tiling, send the entire image (or large chunks) to the TPU's DRAM. The TPU compiler should be configured to tile the computation internally inside the 8MB SRAM, calculating a tile all the way through the depth of the network before evicting. This keeps the intermediate halo exchanges entirely within the high-bandwidth on-chip SRAM, drastically reducing USB I/O.
  common_mistake: |
    **The Pitfall:** Compressing the image data over the USB bus using JPEG to save bandwidth.
    **The Rationale:** Candidates see a bandwidth bottleneck and immediately apply standard image compression techniques.
    **The Consequence:** JPEG compression introduces latency and artifacts that completely ruin the super-resolution model's output quality.
  napkin_math: |
    1. 1080p image = 1920 x 1080 x 3 = ~6.22 MB.
    2. USB 3.0 practical bandwidth: ~400 MB/s.
    3. Raw input at 30 FPS: 6.22 MB * 30 = ~186.6 MB/s.
    4. Deep network halo overlap: A 128x128 tile needs a 256x256 patch (4x area redundancy).
    5. Redundant transfer rate: 186.6 MB/s * 4 = 746.4 MB/s (Exceeds USB 3.0 limit).
    6. Conclusion: This completely saturates the ~400 MB/s bus, dropping framerate to **~4 FPS**.
  options:
  - The severe bottleneck is the redundant PCIe/USB host-to-device data transfer caused by naive spatial tiling. Because convolutions have receptive fields, splitting an image into spatial tiles requires overlapping 'halos' to prevent edge artifacts. In a deep U-Net, this halo grows exponentially with depth.
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally cannot meet the latency and accuracy requirements.
  - Profiling overhead is masking the true performance; disabling all instrumentation will reveal that the system is already meeting targets.
  - Compressing the image data over the USB bus using JPEG, which introduces latency and compression artifacts ruining the super-resolution.
