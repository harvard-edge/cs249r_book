title: Thermal Throttling in Memory-Bound Attention Layers
scenario: Your team deployed a transformer model on an NVIDIA Jetson Orin at the edge (60W TDP, 32 GB
  LPDDR5, 275 TOPS INT8). During the highly compute-dense MLP layers, the system draws about 40W and runs
  smoothly on the Ampere GPU. However, during the memory-bandwidth-bound self-attention layers, the system
  power spikes to the 60W TDP limit and thermally throttles, despite executing far fewer total INT8 MAC
  operations. Using the principle of the Horowitz energy table, analyze why the layer with fewer operations
  is consuming significantly more power.
details:
  realistic_solution: The power spike happens because off-chip DRAM accesses cost orders of magnitude
    more energy than ALU compute operations. The self-attention mechanism has low arithmetic intensity,
    meaning it requires massive amounts of data to be fetched from the 32 GB LPDDR5 memory for relatively
    few operations. While the compute-heavy MLP keeps the Ampere GPU busy with low-energy INT8 math out
    of SRAM, the attention layer saturates the memory bus, shifting the energy profile from cheap compute
    to expensive LPDDR5 accesses and hitting the TDP limit.
  common_mistake: Candidates often assume that power consumption strictly scales with the volume of compute
    operations (TOPS). They mistakenly conclude that a layer with fewer MACs must draw less power, ignoring
    the disproportionate energy cost of off-chip memory data movement.
  napkin_math: 'Assume an INT8 MAC costs ~0.1 pJ and a 32-bit LPDDR5 DRAM access costs ~1 nJ (1,000 pJ,
    or 10,000x the compute energy). Peak compute power: 275 TOPS * 0.1 pJ = 27.5W. If the MLP layer maxes
    compute but only uses 10% of memory bandwidth, it draws ~27.5W + small memory power. However, if the
    attention layer maxes the Jetson Orin''s ~200 GB/s LPDDR5 bandwidth, that translates to 50 billion
    32-bit accesses/sec. Memory power: 50e9 accesses/sec * 1 nJ/access = 50W. Added to the base SoC power,
    this easily reaches the 60W TDP limit, proving memory transfers dictate the peak power draw.'
