title: The GPU Power Gating Latency
scenario: Your battery-powered drone runs a Jetson Orin Nano (15W TDP) for obstacle avoidance. During straight-line flight, the GPU is idle. Your power engineer enables GPU power gating to save battery. On the next test flight, the drone clips a tree branch during a sudden turn. Investigation reveals the obstacle detection model took 180ms to produce its first detection after the turn began, instead of the expected 25ms.
question: Why did GPU power gating increase the initial detection latency to 180ms?
details:
  realistic_solution: GPU power gating removes power from the GPU's transistors to eliminate leakage current. When needed, the GPU must go through a full power-on sequence: rail ramp-up, clock stabilization, context restoration, and TensorRT cold-start penalty. The fix is to use clock gating instead, which keeps the GPU powered but stops the clock, dropping wake latency to ~2ms.
  common_mistake: |
    **The Pitfall:** Assuming the model is just slow to warm up and ignoring the hardware power state.
    **The Rationale:** Software engineers often don't realize that power gating physically removes voltage from transistors, requiring a full hardware initialization sequence.
    **The Consequence:** Trading critical safety latency for negligible battery savings. Clock gating should be used instead to maintain a 2ms wake latency.
  napkin_math: |
    - **Wake latency breakdown:** Rail ramp-up (5-10ms) + Clock stabilization (2-5ms) + Context restoration (10-20ms) + First inference cold penalty (50-100ms) = 67-135ms penalty.
    - **Power savings calculation:** Power gating saves 1.5W; clock gating saves ~0.9W. Difference is 0.6W. Over 20 mins, savings = 0.2 Wh.
    - **Consequence distance:** At 15 m/s flight speed, 155ms of blindness = 2.3 meters of undetected travel.
    - **Final result:** **A trivial 0.2 Wh battery saving caused 2.3 meters of blind flight, leading to the crash.**
