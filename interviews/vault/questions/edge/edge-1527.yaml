title: Evaluating Cost and Latency Trade-offs on Google Coral Edge TPU
scenario: You are designing an object detection pipeline for a fleet of autonomous warehouse robots. You are evaluating two deployment options: sending images to a cloud GPU server over 5G or processing locally on an attached Edge TPU (4 TOPS INT8, 2W). The robots operate 24/7 and process 10 frames per second.
question: Should the robots use cloud GPU inference over 5G or local Edge TPU inference for 10 FPS 24/7 object detection, and why?
details:
  realistic_solution: The better choice is the local Coral Edge TPU deployment, provided the model can be successfully quantized to INT8 with acceptable accuracy. While cloud GPUs offer higher throughput and ease of FP32 deployment, the continuous 5G data transmission for 10 FPS creates unacceptable latency variability and recurring bandwidth costs. The Edge TPU's 2W power consumption easily fits within a robot's power budget, and its 4 TOPS INT8 compute is more than sufficient for real-time object detection at 10 FPS, making it highly cost-effective and reliable.
  common_mistake: |
    **The Pitfall:** Favoring cloud deployment by focusing solely on GPU FP32 accuracy and theoretical throughput.
    **The Rationale:** Ignoring the continuous power draw of a 5G modem and the massive recurring bandwidth costs for 24/7 video streaming.
    **The Consequence:** Deploying a system that bankrupts the operational budget with data fees and suffers from unpredictable real-time performance due to network drops.
  napkin_math: |
    * **Local Edge TPU Compute**: Required compute for 10 FPS ≈ 20 GOPS. Edge TPU capacity = 4 TOPS (4,000 GOPS). Utilization = 0.5%.
    * **Local Edge TPU Power**: 2W × 24 hours = 48 Wh/day.
    * **Cloud 5G Data Cost**: 10 FPS × 100 KB/frame × 86,400 seconds/day = 86.4 GB/day per robot.
    * **Conclusion**: Local Edge TPU easily handles the compute while avoiding the prohibitive bandwidth costs and latency variance of continuous **86.4 GB/day** 5G transmission.
