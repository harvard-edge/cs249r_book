title: Evaluating Cost and Latency Trade-offs on Google Coral Edge TPU
scenario: 'You are designing an object detection pipeline for a fleet of autonomous warehouse robots. You are evaluating two deployment options: sending images to a cloud GPU server over 5G or processing locally on an attached Edge TPU. The robots operate 24/7 and process 10 frames per second.'
question: Should the robots use cloud GPU inference over 5G or local Edge TPU inference for 10 FPS 24/7 object detection, and why?
details:
  realistic_solution: |
    Local Edge TPU deployment is the superior architecture. While cloud GPUs offer immense FP32 throughput, 5G cloud streaming introduces prohibitive recurring bandwidth OpEx and massive latency jitter due to cell handoffs. By utilizing Post-Training Quantization (PTQ) to convert the model to INT8, the workload easily fits within the Edge TPU's compute ceiling and power envelope, achieving highly deterministic, real-time inference without crippling cellular data costs.
  common_mistake: |
    **The Pitfall:** Favoring cloud deployment by focusing solely on GPU FP32 accuracy and theoretical throughput.
    **The Rationale:** Ignoring the continuous power draw of a 5G modem and the massive recurring bandwidth costs for 24/7 video streaming.
    **The Consequence:** Deploying a system that bankrupts the operational budget with data fees and suffers from unpredictable real-time performance due to network drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Framerate: 10 FPS (24/7 operation).
    - Frame Size: 100 KB.
    - Edge TPU: 4 TOPS, 2W.

    **Calculations:**
    - Compute Required: 10 FPS * ~2 GOPS/frame = 20 GOPS (0.5% of 4 TOPS capacity).
    - Cloud 5G Data: 10 FPS * 100 KB * 86,400 seconds/day = 86.4 GB/day per robot.
    - Local Power Cost: 2W * 24 hours = 48 Wh/day.

    **Conclusion & Interpretation:**
    - **Result: Cloud incurs 86.4 GB/day/robot bandwidth (Cloud-Bound)**. Network OpEx and Latency Jitter.
