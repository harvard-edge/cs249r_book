title: The Thermal Handcuffs
scenario: You are selecting an edge accelerator for a drone with a strict 15W thermal budget. Your vendor provides a datasheet stating the chip's efficiency is 4.6 TOPS/W.
question: "What is the *maximum sustained performance* you can realistically expect from this chip under that thermal constraint?"
details:
  realistic_solution: "The TOPS/W metric directly tells you the operational performance you get for a given power input. Under a 15W thermal budget, the chip's compute performance is limited by that budget. Therefore, the maximum sustained performance is the efficiency multiplied by the power budget."
  common_mistake: |
    **The Pitfall:** Confusing a chip's headline peak performance with sustained operational throughput.
    **The Rationale:** Engineers assume the maximum rated TOPS is always achievable, ignoring thermal design constraints.
    **The Consequence:** Deploying systems that rapidly overheat, throttle, and miss hard real-time latency deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Strict 15W thermal budget
       - Efficiency: 4.6 TOPS/W
    2. **Calculations:**
       - Maximum sustained performance = 15W * 4.6 TOPS/W = 69 TOPS
    3. **Conclusion & Interpretation:**
       **Result: 69 TOPS (Thermal-Bound)**
  options:
  - 4.6 TOPS
  - 275 TOPS
  - 69 TOPS
  - 0.3 TOPS
  correct_index: 2
