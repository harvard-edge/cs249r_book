title: GPU vs DLA Parallel Scheduling Tradeoffs
scenario: We are deploying a multi-branch perception network on an edge device with a GPU and DLA accelerator. You must evaluate two operator scheduling strategies. Schedule A executes branches sequentially on the GPU to maximize aggressive layer fusion. Schedule B schedules independent operators concurrently across both the GPU and the DLA to maximize theoretical hardware utilization.
question: Which schedule is better for minimizing end-to-end latency, and why?
details:
  realistic_solution: Schedule A is typically superior for connected operators within the same network. By scheduling them sequentially on the Ampere GPU, the compiler can deeply fuse operators, retaining intermediate activations in SRAM and avoiding main memory trips. To maximize the 275 TOPS while staying under the 60W TDP, the DLA should be reserved for completely independent workloads (e.g., a separate wake-word model) rather than operator-level parallelism.
  common_mistake: |
    **The Pitfall:** Choosing Schedule B to maximize parallel hardware utilization.
    **The Rationale:** Candidates assume splitting a network across heterogeneous accelerators inherently increases throughput.
    **The Consequence:** Breaking operator fusion forces large intermediate activation tensors out of fast SRAM into LPDDR5, creating a severe memory bandwidth bottleneck.
  napkin_math: |
    - Workload: 2.75 INT8 TOPs per frame.
    - Schedule A (Sequential GPU, high fusion): 137.5 effective TOPS. Latency = 2.75 / 137.5 = **20 ms**.
    - Schedule B (Parallel GPU+DLA): Memory stalls drop effective compute to 27.5 TOPS. Latency = 2.75 / 27.5 = **100 ms**.
