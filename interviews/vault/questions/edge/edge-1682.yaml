title: Dual-Bank OTA Architecture for Coral Edge TPU Ensembles
scenario: You are designing an OTA update system for a smart city traffic monitoring fleet consisting of 5,000 devices. Each device utilizes a Google Coral Edge TPU via USB (4 TOPS INT8, 2W) attached to a low-power host SoC with only 1GB of total system RAM and 4GB of eMMC storage. The system runs an ensemble of three models (Object Detection, License Plate Recognition, and Anomaly Detection) that are strictly quantized to INT8 for the Edge TPU.
question: How would you design a zero-downtime A/B OTA scheme for 5,000 Coral devices that atomically updates the app and all three models?
details:
  realistic_solution: A robust solution requires a combined OTA payload where the host application and Edge TPU models are versioned and deployed together as a single atomic artifact. Given the 4GB eMMC limit, the A/B scheme should utilize a squashfs or similar compressed read-only root filesystem for the OS/app, leaving a shared mutable partition for logs and dynamic configuration. The models must be compiled specifically for the Edge TPU (fully mapped to INT8) before transmission to save space and compute on the edge device. The rollback mechanism must monitor a hardware watchdog and an application-level health check (e.g., successful inference execution on all three models) during a designated validation window post-reboot before permanently committing to the new partition.
  common_mistake: |
    **The Pitfall:** Treating the host OS and the Edge TPU models as separate update streams or ignoring the 4GB eMMC limit.
    **The Rationale:** Candidates often design complex, disjointed OTA systems without considering version coupling or the physical space required to store two copies of uncompressed binaries.
    **The Consequence:** The update process fails due to out-of-storage errors, or version mismatches between the host app and models cause system panics without a clean rollback path.
  napkin_math: |
    1. Analyze storage constraints: Total eMMC = 4GB (4000MB).
    2. Allocate partitions: Boot/Recovery = 100MB, Data (logs/configs) = 500MB. Remaining for A/B rootfs = 3400MB.
    3. Calculate max partition size: 3400MB / 2 = 1700MB per rootfs partition (A and B).
    4. Size the models (INT8): Object Detection ~ 5MB, LPR ~ 3MB, Anomaly Detection ~ 10MB. Total model size = 18MB.
    5. Size the payload: Host OS (minimal Linux) + app ~ 300MB compressed. Total payload per partition ~ 318MB.
    **The 318MB combined payload fits comfortably within the 1700MB partition limit, enabling safe A/B atomic updates.**
