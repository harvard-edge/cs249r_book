title: Ultra-Low Bandwidth Drift Detection
scenario: '1,000 agricultural drones run offline crop inspection using a CNN. Satellite uplink is strictly limited to 10 KB/s per drone. Seasonal lighting changes cause silent accuracy degradation. Sending raw 2MB RGB images for cloud validation is impossible.'
question: 'What observability payload would monitor seasonal data drift within the 10 KB/s satellite uplink limit?'
details:
  realistic_solution: 'Compute a lightweight statistical sketch using Locality Sensitive Hashing (LSH) or PCA directly on edge. Send a highly compressed 4-dimensional vector alongside softmax entropy. The cloud maintains a Kolmogorov-Smirnov (KS) test on these sketches to trigger retraining alerts.'
  common_mistake: |
    **The Pitfall:** Aggressively downsampling or JPEG-compressing images to hit 10KB constraints.
    **The Rationale:** Candidates default to generic image compression instead of leveraging ML-specific statistical embeddings.
    **The Consequence:** Compressed images lose critical semantic details needed to detect subtle data drift, rendering the observability pipeline useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Uplink limit: 10 KB/s (10,000 bytes/s).
       - Inference rate: 5 inferences/sec.
    2. **Calculations:**
       - Projected sketch (LSH/PCA): 4 float32 = 16 bytes.
       - Softmax entropy + metadata = 12 bytes.
       - Total payload per inference = 16 + 12 = 28 bytes.
       - Uplink consumed: 28 bytes * 5 inferences/sec = 140 bytes/sec.
    3. **Conclusion & Interpretation:**
       - **The lightweight statistical sketch uses only 140 bytes/sec, easily fitting the strict 10 KB/s satellite uplink limit.** (Result: Bandwidth-Bound)
