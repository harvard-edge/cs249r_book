title: Ultra-Low Bandwidth Drift Detection
scenario: 1,000 agricultural drones run offline crop inspection using a CNN. Satellite uplink is strictly
  limited to 10 KB/s per drone. Seasonal lighting changes cause silent accuracy degradation. Sending raw
  2MB RGB images for cloud-side validation is impossible. You must optimize the observability payload
  to monitor data drift.
question: "What observability payload would monitor seasonal data drift within the 10 KB/s satellite uplink limit?"
details:
  realistic_solution: Compute a lightweight statistical sketch of the data distribution directly on the
    edge. Extract a bottleneck feature layer (e.g., a 128-dimensional embedding) and project it down to
    a 4-dimensional vector using a pre-deployed random projection matrix (Locality Sensitive Hashing)
    or PCA. Send this 4-d sketch alongside the softmax entropy and basic image stats (mean brightness).
    The cloud maintains a running Kolmogorov-Smirnov (KS) test or Maximum Mean Discrepancy (MMD) on these
    sketches against the baseline training set sketches to trigger retraining alerts.
  common_mistake: Aggressively downsampling or JPEG-compressing the images to 10KB to send to the cloud.
  napkin_math: 'Raw image: 2,000,000 bytes. Uncompressed embedding: 128 float32 = 512 bytes. Projected
    sketch: 4 float32 = 16 bytes. Softmax entropy + metadata = 12 bytes. Total payload: 28 bytes per inference.
    At 5 inferences/sec = 140 bytes/sec, easily fitting the 10 KB/s budget (1.4% utilization).'
