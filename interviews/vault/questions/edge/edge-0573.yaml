title: The eMMC Wear-Out Time Bomb
scenario: Your fleet of 5,000 industrial inspection cameras runs 24/7. Each device writes inference metadata
  (bounding boxes, confidence scores, timestamps) to its 32 GB eMMC at a rate of 50 KB per inference,
  10 inferences per second. The eMMC is rated for 3,000 P/E cycles with 128 KB erase blocks. Six months
  after deployment, devices start failing in clusters — 200 devices die in week 26, another 300 in week
  27. What happened, and how do you prevent the next wave?
details:
  realistic_solution: The devices are dying from eMMC write amplification, and the cluster pattern reveals
    that all devices were deployed in the same week with identical firmware.
  common_mistake: '"The eMMC is defective — contact the supplier for a replacement batch." The cluster
    failure pattern (not random, but time-correlated) is the signature of wear-out, not manufacturing
    defects. Defects follow a bathtub curve with early failures; wear-out follows a normal distribution
    centered on the expected lifetime.'
  napkin_math: 'Logical write rate: 50 KB/inference × 10 Hz = 500 KB/s = 43.2 GB/day. However, because
    the eMMC erase block size is 128 KB, writing small 50 KB chunks triggers a Read-Modify-Write cycle,
    resulting in a Write Amplification Factor (WAF) of 8. Physical write rate = 43.2 GB/day × 8 = 345.6
    GB/day. Consumer eMMC (3,000 P/E): 32 GB × 3,000 = 96 TB lifetime. 96 TB / 345.6 GB/day = 278 days
    (~9 months). The cluster fails exactly around this time. With a RAM disk (tmpfs) fix buffering writes
    to larger chunks: physical writes drop back down to ~43 GB/day or lower, extending life dramatically.'
