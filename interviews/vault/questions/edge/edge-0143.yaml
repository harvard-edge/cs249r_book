title: 'The DMA Offload Dividend'
scenario: 'You''re optimizing an inference pipeline on a Jetson AGX Orin. A preprocessing step produces a 300 KB tensor that needs to be moved from general LPDDR5 DRAM to a specific memory region for the GPU. You can use a CPU-driven `memcpy` or set up a DMA transfer. Assume a realistic `memcpy` can achieve 10 GB/s, while the DMA controller can achieve 100 GB/s for this path.'
question: 'How long does a 300 KB transfer take using a 10 GB/s CPU memcpy versus a 100 GB/s DMA transfer?'
details:
  realistic_solution: 'The correct way to solve this is to apply the bandwidth formula (Time = Size / Bandwidth) to each case using the realistic bandwidth numbers provided. The DMA controller, being specialized hardware, can move the data much more efficiently than the general-purpose CPU, resulting in a significantly lower transfer time and freeing up the CPU for other tasks.'
  common_mistake: |
    **The Pitfall:** Assuming CPU `memcpy` operates at peak device bandwidth.
    **The Rationale:** Engineers often assume a CPU can hit the device's theoretical peak memory bandwidth (e.g., ~200 GB/s for Orin), ignoring CPU overhead and cache effects.
    **The Consequence:** They underestimate data transfer bottlenecks and misallocate CPU cycles for tasks better suited for DMA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Size: 300 KB = 300 * 10^3 bytes.
    - CPU memcpy bandwidth: 10 GB/s = 10 * 10^9 bytes/sec.
    - DMA bandwidth: 100 GB/s = 100 * 10^9 bytes/sec.

    **Calculations:**
    - CPU memcpy time: 300e3 / 10e9 = 30e-6 seconds = 30 µs.
    - DMA transfer time: 300e3 / 100e9 = 3e-6 seconds = 3 µs.

    **Conclusion & Interpretation:**
    - **Result: 3 µs (Bus-Bandwidth Bound)**. The DMA takes 3 µs compared to the CPU's 30 µs, saving significant time.
  options:
  - 'The CPU takes ~1.5 µs, the DMA takes ~0.3 µs. Both are very fast.'
  - 'The CPU takes 30 µs, the DMA takes 3 µs.'
  - 'Both take roughly the same time, ~1.5 µs, as they are limited by the device''s 204.8 GB/s peak memory bandwidth.'
  - 'The CPU takes ~240 µs, the DMA takes ~24 µs, because you confused GB/s with Gb/s.'
