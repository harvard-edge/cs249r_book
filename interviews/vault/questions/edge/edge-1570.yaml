title: On-Device Demographic Parity for Pedestrian Intention
scenario: You are deploying a pedestrian intention prediction model on an autonomous delivery robot powered by an edge SoC (275 TOPS INT8). The system monitors its own fairness by running an attribute classifier alongside the main model. Over a 1-hour window, adults appear in 80,000 frames and children in 28,000 frames. The model predicts "intent to cross" for adults in 16,000 frames and for children in 7,000 frames.
question: What is the Demographic Parity Difference between adults and children, and what is the TOPS overhead of a 0.5% fairness classifier?
details:
  realistic_solution: The correct approach calculates the positive prediction rate (selection rate) for each demographic group independently and then finds the absolute difference between them. Since Demographic Parity only considers the predicted outcomes and group membership, ground-truth labels are not required. The compute overhead is found by directly multiplying the percentage by the Jetson Orin's total TOPS.
  common_mistake: |
    **The Pitfall:** Mixing up Demographic Parity with Equalized Odds.
    **The Rationale:** Attempting to incorporate ground-truth labels into the calculation, which Demographic Parity does not require.
    **The Consequence:** Implementing overly complex fairness monitoring that requires costly true-label data streams at the edge, violating power and bandwidth constraints.
  napkin_math: |
    * **Adult Selection Rate**: 16,000 positive / 80,000 total = 0.20 (20%).
    * **Child Selection Rate**: 7,000 positive / 28,000 total = 0.25 (25%).
    * **Demographic Parity Difference**: |0.20 - 0.25| = 0.05 (5%).
    * **Compute Overhead**: 0.5% of 275 TOPS = 0.005 × 275 = **1.375 TOPS**.
