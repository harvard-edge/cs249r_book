title: Implementing sparse gradient updates for efficient edge fine-tuning
scenario: >-
  You need to implement personalization fine-tuning on an edge device where only the top-k most-changed parameters are updated each step (sparse gradient descent). This should reduce communication overhead in a future federated learning deployment. The model is a 20M parameter transformer encoder.
question: How would you implement top-k sparse gradient updates for the 20M-parameter transformer to reduce future federated communication?
details:
  realistic_solution: Register gradient hooks via parameter.register_hook(sparse_hook) that immediately zero out the gradient tensor in-place except for the top-k elements before the gradient accumulates into the parameter's .grad. Alternatively, use torch.nn.utils.parametrize to wrap parameters with a sparsity constraint. For truly sparse backward passes, custom CUDA kernels with sparse scatter-reduce operations are needed — but on Orin, the CPU can handle the top-k selection on the 80MB gradient tensor in ~2ms.
  common_mistake: |
    **The Pitfall:** Computing the full gradient tensor and then masking out small gradients before the optimizer step.
    **The Rationale:** Candidates rely on familiar dense operations and masking rather than using autograd parameter hooks to zero out gradients during the backward pass itself.
    **The Consequence:** This approach still computes and stores the full 80MB gradient tensor, saving absolutely no memory or compute during the backward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transformer parameters: 20M (FP32 = 4 bytes per param).
       - CPU top-k selection overhead: ~2ms for 20M elements.
       - Sparsity threshold: k = 100,000 (0.5%).
    2. **Calculations:**
       - Full dense gradient size: 20M * 4 bytes = 80 MB.
       - Sparse payload size: 100,000 indices * 4 bytes + 100,000 values * 4 bytes = 0.8 MB.
       - Communication reduction factor: 80 MB / 0.8 MB = 100x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory/Network-Bound.** Implementing a Top-K Sparsification hook provides a 100x communication reduction (from 80MB to 0.8MB) for a minimal 2ms CPU compute overhead per step.
