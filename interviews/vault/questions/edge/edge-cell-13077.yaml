title: 'Edge Systolic Array Evaluation: Output Stationary for Attention on Edge'
scenario: Evaluate whether output-stationary (OS) or weight-stationary (WS) dataflow is better for running
  a self-attention layer (seq=64, hidden=256, heads=4) on Jetson Orin DLA (INT8) for a keyword spotting
  transformer. Calculate memory access counts for QK^T under each dataflow strategy.
details:
  realistic_solution: 'QK^T: Q=(64,64), K=(64,64) per head (head_dim=64). Output=(64,64) per head. WS:
    K is ''weights'' (64*64=4096 values, 4KB). Q rows stream through. Each K column element reused for
    all 64 Q rows. K reads: 4096 (once). Q reads: 64*64=4096 (entire Q, multiple times? no: each Q row
    used 64 times for all K columns). Total: K=4096, Q=4096*64=262K? No: Q[i] * K^T → for each Q row (64
    elements), dot with all 64 K rows (64 elements each) = 64 reads of Q rows, each K row read 64 times.
    WS: K=4096 once, Q=64*64=4096 reads. Output: 64*64=4096 writes. OS: output element (i,j) requires
    Q[i] (64 elems) + K[j] (64 elems). Read Q[i] 64 times (for j=0..63), K[j] 64 times. Better: row-stationary.'
  common_mistake: Not accounting for the fact that attention matrices (QK^T) have a quadratic memory footprint
    with sequence length, making the choice of dataflow critical even at small seq lengths for edge devices.
  napkin_math: 'QK^T per head: Q=(64,64)=4096 bytes, K=(64,64)=4096 bytes, Output=(64,64)=4096 bytes.
    WS (K stationary): K loaded once=4096. Q loaded once per row: 64 rows * 64 elements = 4096 reads.
    Each Q row used 64 times — if WS keeps Q row in register: 4096 Q reads total. O written: 4096. Total:
    4096+4096+4096=12KB. OS: each output requires Q_row (64) + K_row (64) = 128 reads. 4096 outputs: 4096*128=512K
    reads. WS is 43x fewer reads. Clear winner: WS for QK^T. Total memory: 12KB / 200GB/s = 60ns. Compute:
    2*64*64*64=524K FLOPs / 5.5TOPS = 95ns. Compute bound for this tiny attention.'
