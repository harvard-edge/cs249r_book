title: The OTA Bandwidth Trap
scenario: You are an ML Systems Engineer for an automotive company managing a fleet of vehicles. You need to push a critical over-the-air update to fix a flaw in the pedestrian detection model. The binary patch for the model is 12 MegaBytes. The vehicle's cellular modem has a stable connection averaging 10 Megabits per second.
question: How long will it take to download the 12 MB model patch over a 10 Mbps cellular connection?
details:
  realistic_solution: Strictly map unit boundaries. Data size is Bytes (MB), bandwidth is Bits (Mbps). Apply the 8x payload multiplier directly.
  common_mistake: |
    **The Pitfall:** Confusing MegaBytes (MB) and Megabits (Mbps).
    **The Rationale:** Engineers divide file size in bytes directly by bandwidth in bits, forgetting the 8x conversion factor.
    **The Consequence:** Underestimating the OTA update download time by a factor of 8, causing critical deployment planning errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 12 MegaBytes patch
       - 10 Mbps link
    2. **Calculations:**
       - Patch = 12 MB * 8 = 96 Megabits (Mb)
       - Download Time = 96 Mb / 10 Mbps = 9.6s
    3. **Conclusion & Interpretation:**
       - **Result: 9.6 seconds.**
  options:
  - 1.2 seconds
  - 9.6 seconds
  - 12.0 seconds
  - 96.0 seconds
  correct_index: 1
