title: Degradation Ladder for Autonomous Edge Perception
scenario: You are designing the perception system for an autonomous delivery robot running on an NVIDIA Jetson AGX Orin (64 GB LPDDR5, 60W TDP). The robot typically runs a heavy multi-camera 3D object detector on the Ampere GPU, but extreme desert heat frequently causes thermal throttling, forcing the OS to cap power at 15W.
question: How would you specify a fail-operational degradation ladder for Jetson Orin when thermal throttling caps power at 15W?
details:
  realistic_solution: 'The specification should define a multi-tier ladder. Tier 1 (60W): Full 3D detection on the Ampere GPU. Tier 2 (Thermal Throttling to 15W): Shed quality-of-service tasks like long-range path planning, swap the heavy 3D detector for a lightweight 2D INT8 object detector, and pin this fallback model exclusively to the DLA. This keeps essential obstacle avoidance running at a lower power draw, allowing the robot to safely navigate to shade or a designated pull-over zone.'
  common_mistake: |
    **The Pitfall:** Proposing a binary fail-safe approach (stopping the robot) or failing to explicitly move workloads off the GPU.
    **The Rationale:** Candidates overlook the heterogeneous compute architecture, failing to realize the DLA is vastly more power-efficient for lightweight INT8 models than a heavily throttled Ampere GPU.
    **The Consequence:** The robot is unnecessarily stranded in extreme heat, or it continues to trigger hardware shutdowns because the GPU cannot operate within the 15W cap.
  napkin_math: |
    - The Jetson AGX Orin provides 275 TOPS INT8 at its 60W TDP.
    - Primary 3D model uses ~100 TOPS on the GPU. Throttling to 15W severely bottlenecks the GPU.
    - Lightweight INT8 fallback model (e.g., YOLOv8-Nano) requires only ~2 TOPS.
    **Conclusion: Shifting the 2 TOPS fallback workload entirely to the DLA fits easily within the 15W thermal budget, keeping the robot fail-operational.**
