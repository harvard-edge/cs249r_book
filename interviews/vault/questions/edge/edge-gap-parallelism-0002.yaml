title: Edge Model Split Requirements
scenario: A robot perception model exceeds one accelerator SRAM, so the team proposes splitting layers across two edge accelerators. Specify the requirements that must be measured before choosing the split point.
question: What measurements are required before choosing a layer split point across two edge accelerators?
details:
  realistic_solution: Measure activation size at candidate boundaries, per-stage compute time, link bandwidth/latency, SRAM footprint per stage, synchronization overhead, and deadline headroom. The best split minimizes cross-link activation traffic while balancing compute and memory.
  common_mistake: Splitting at the middle layer count instead of the point that balances compute and minimizes activation transfer.
  napkin_math: A split with 20 ms/10 ms stage compute is bottlenecked by the 20 ms stage even if memory fits; a 15 ms/15 ms split with a larger activation may still win if transfer is small.
