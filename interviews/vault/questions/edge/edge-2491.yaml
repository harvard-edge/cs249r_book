title: Orin Unified Memory Contention
scenario: A Jetson AGX Orin evaluates a large vision transformer. It utilizes a unified CPU-GPU architecture sharing LPDDR5 memory instead of dedicated discrete PCIe VRAM.
question: Explain the architectural benefits and potential bandwidth contention risks of Unified Memory when the ARM CPU and Ampere GPU simultaneously access high-resolution images.
details:
  realistic_solution: 'The benefit is zero-copy access: neither component has to stream data over a PCIe bus. However, both CPU and GPU share the same physical LPDDR5 controller. Heavy CPU load (like video decoding) directly cannibalizes memory bandwidth, causing GPU tensor throughput to inexplicably stall.'
  common_mistake: |
    **The Pitfall:** Stating that unified memory eliminates all bottlenecks.
    **The Rationale:** Candidates focus on the removal of PCIe transfers but forget that physical DRAM pins have absolute maximum throughput limits.
    **The Consequence:** Missing the shared contention point that causes mission-critical GPU tensor throughput to stall under heavy CPU load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total LPDDR5 bandwidth: 204.8 GB/s
       - High-resolution CPU processing load: 60 GB/s
    2. **Calculations:**
       - Available GPU Bandwidth: 204.8 GB/s - 60 GB/s = 144.8 GB/s
       - Bandwidth loss for GPU: 60 / 204.8 ~ 29% reduction
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Contention.** The CPU effectively steals 29% of the memory bus, severely starving memory-bound ViT layers.
