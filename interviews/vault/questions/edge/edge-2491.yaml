title: Orin Unified Memory Contention
scenario: A Jetson AGX Orin evaluates a large vision transformer. It utilizes a unified CPU-GPU architecture sharing LPDDR5 memory instead of dedicated discrete PCIe VRAM.
question: Explain the architectural benefits and potential bandwidth contention risks of Unified Memory when the ARM CPU and Ampere GPU simultaneously access high-resolution images.
details:
  realistic_solution: 'The core benefit is zero-copy access: neither component has to serialize and stream 4K frames across a narrow 16GB/s PCIe bus, drastically lowering latency. However, because both the ARM CPU cores and the GPU Stream Multiprocessors share the same physical LPDDR5 controller (204.8 GB/s), heavy CPU multi-processing (like decoding video) directly cannibalizes the memory bandwidth available to the GPU. If the CPU saturates its memory bus limit, GPU tensor throughput will inexplicably stall.'
  common_mistake: |
    **The Pitfall:** Stating that unified memory eliminates all bottlenecks.
    **The Rationale:** Candidates focus on the removal of PCIe transfers but forget that physical DRAM pins have absolute maximum throughput limits.
    **The Consequence:** Missing the shared contention point that causes GPU tensor throughput to stall under heavy CPU load.
  napkin_math: |
    * Total memory bandwidth: 204.8 GB/s
    * CPU decoding bandwidth usage: 60 GB/s
    * **GPU available bandwidth is hard-capped at 144.8 GB/s, slowing inference.**
