title: Active Learning Inference Time on Coral TPU
scenario: You are curating a dataset using active learning for an object detection model deployed on a Google Coral Edge TPU. To select the most uncertain samples for manual labeling, you must run inference on an unlabeled pool of 2,000,000 images using your current INT8 model. The model requires 8 GOPS per image. Assuming you can achieve 50% of the Coral's theoretical 4 TOPS INT8 peak performance due to USB/PCIe I/O and memory overhead, calculate how long it will take a single Coral device to process the entire unlabeled dataset.
question: How long will one Coral Edge TPU take to process 2,000,000 images at 50% of its 4 TOPS peak if each image costs 8 GOPS?
details:
  realistic_solution: The correct approach calculates the effective TOPS, determines the throughput in frames per second, and then divides the total dataset size by the throughput. Recognizing the difference between theoretical and effective hardware utilization is critical for realistic edge deployment and data curation planning.
  common_mistake: |
    **The Pitfall:** Using the theoretical peak TOPS without accounting for utilization, or confusing GOPS with TOPS.
    **The Rationale:** Candidates miss the 50% utilization constraint stated in the prompt or make a unit conversion error between 10^9 and 10^12.
    **The Consequence:** This leads to a massive underestimation of the processing time (often by a factor of 2 or 1000x), ruining the active learning curation schedule.
  napkin_math: |
    * Effective compute = 4 TOPS × 50% = 2 TOPS ($2 \times 10^{12}$ ops/sec).
    * Throughput = ($2 \times 10^{12}$ ops/sec) / ($8 \times 10^9$ ops/image) = 250 images/sec.
    * Total time = 2,000,000 images / 250 images/sec = 8,000 seconds.
    * **8,000 seconds is exactly 133.3 minutes (or ~2.22 hours).**
