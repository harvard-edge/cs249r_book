title: Edge-Cloud Hybrid Inference Break-Even
scenario: 'Your company deploys 1,000 smart cameras for retail analytics. Each camera runs a person re-identification
  model. Option A: run ReID on-device using a Hailo-8 accelerator ($80/device, 26 TOPS, 2.5W). Option
  B: stream compressed embeddings to the cloud and run ReID on a shared GPU cluster. Cloud GPU cost: $0.50/GPU-hour
  (A10G), each GPU handles 200 cameras. Network cost: $0.09/GB egress. Each camera sends 100 KB of embeddings
  per second. Calculate the break-even point — when does on-device become cheaper than cloud?'
question: "Calculate the break-even point — when does on-device become cheaper than cloud?"
details:
  realistic_solution: 'Build a 3-year TCO model. On-device (Hailo-8): hardware 80K + power 2.6K/yr + engineering
    50K/yr = 238K 3-year TCO. Cloud (A10G): 5 GPUs x 0.50/hr x 8760h = 21.9K compute + 3154 TB egress
    x 0.09/GB = 283.8K/yr = 305.7K/yr total OpEx. Cloud 3-year TCO = 917K. Break-even occurs when the
    network footprint falls below 20.2 KB/s per camera. At your 100 KB/s per camera, on-device is the
    clear winner. The critical insight: egress fees, not GPU compute, dominate cloud costs for high-frequency
    streaming workloads.'
  common_mistake: '"On-device has no recurring cost, so it''s always cheaper long-term." This ignores
    the on-device power cost, the engineering cost of maintaining edge firmware, and the opportunity cost
    of hardware that becomes obsolete.'
  napkin_math: 'Egress dominates: 1,000 × 100 KB/s = 100 MB/s = 3,154 TB/year. At 0.09/GB: 283.8K/year.
    Total Cloud OpEx: 21.9K (compute) + 283.8K (network) = 305.7K/yr. Cloud 3-year TCO = 917K. Edge Option:
    80K CapEx + 3 * (2.6K power + 50K eng) = 238K TCO. Solve for break-even network cost x: 3 * (21.9K
    + x) = 238K → x = $57.4K/yr network budget. This maps to ~637 TB/year, or 20.2 KB/s per camera. At
    >20.2 KB/s per camera, on-device wins. At 100 KB/s, on-device is 5x above break-even.'
