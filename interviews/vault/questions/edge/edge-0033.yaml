title: Edge-Cloud Hybrid Inference Break-Even
scenario: 'Your company deploys 1,000 smart cameras for retail analytics. Each camera
  runs a person re-identification model. Option A: run ReID on-device using a Hailo-8
  accelerator ($80/device, 26 TOPS, 2.5W). Option B: stream compressed embeddings
  to the cloud and run ReID on a shared GPU cluster. Cloud GPU cost: $0.50/GPU-hour
  (A10G), each GPU handles 200 cameras. Network cost: $0.09/GB egress. Each camera
  sends 100 KB of embeddings per second.'
question: Calculate the break-even point — when does on-device become cheaper than
  cloud?
details:
  realistic_solution: 'Build a 3-year TCO model. On-device (Hailo-8): hardware 80K
    + power 2.6K/yr + engineering 50K/yr = 238K 3-year TCO. Cloud (A10G): 5 GPUs x
    0.50/hr x 8760h = 21.9K compute + 3154 TB egress x 0.09/GB = 283.8K/yr = 305.7K/yr
    total OpEx. Cloud 3-year TCO = 917K. Break-even occurs when the network footprint
    falls below 20.2 KB/s per camera. At your 100 KB/s per camera, on-device is the
    clear winner. The critical insight: egress fees, not GPU compute, dominate cloud
    costs for high-frequency streaming workloads.'
  common_mistake: '**The Pitfall:** Assuming cloud is cheaper because of low GPU utilization.

    **The Rationale:** Candidates ignore egress fees, assuming cloud compute is the
    primary cost driver for high-frequency streaming workloads.

    **The Consequence:** The company hemorrhages cash on network bandwidth, paying
    4x more over 3 years compared to an edge deployment.

    '
  napkin_math: "1. Assumptions & Constraints:\n   - 1,000 cameras, 100 KB/s per camera\n\
    \   - Hailo-8 On-device: $80 CapEx, $2.6K/yr power, $50K/yr eng\n   - Cloud A10G:\
    \ $0.50/GPU-hr (200 cameras/GPU), $0.09/GB egress\n2. Calculations:\n   - Network\
    \ streaming = 1,000 * 100 KB/s = 100 MB/s = 3,154 TB/year\n   - Cloud Egress Cost\
    \ = 3,154,000 GB * $0.09 = $283.8K/yr\n   - Total Cloud OpEx = (5 GPUs * $0.50\
    \ * 8760) + $283.8K = $305.7K/yr\n   - Edge 3-year TCO = $80K + 3 * ($2.6K + $50K)\
    \ = $237.8K\n   - Break-even Egress Budget = ($237.8K / 3) - $21.9K = $57.3K/yr\
    \ = 637 TB/year\n   - Break-even streaming rate = 637 TB / (1,000 * 31.5M sec)\
    \ = 20.2 KB/s\n3. Conclusion & Interpretation:\n   - **Result: Cost-Bound. At\
    \ 100 KB/s, egress dominates and makes cloud 3-year TCO roughly 4x higher than\
    \ on-device.**\n"
