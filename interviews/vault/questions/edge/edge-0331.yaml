title: The Units of Arithmetic Intensity
scenario: You're profiling a new perception model on an autonomous vehicle's NVIDIA Jetson AGX Orin. To
  understand its performance limits, you need to place it on a roofline chart. What are the units of Arithmetic
  Intensity, the x-axis of this chart?
details:
  realistic_solution: The correct units for Arithmetic Intensity are Operations per Byte (Ops/Byte). This
    metric quantifies how many computational operations are performed for each byte of data transferred
    from memory. A high AI means a workload is compute-bound, while a low AI means it's memory-bound.
  common_mistake: Confusing Arithmetic Intensity with a raw performance metric like FLOPS, or inverting
    the ratio to Bytes/Op. Engineers often forget that AI is specifically about the ratio of compute to
    memory traffic, not just compute itself.
  napkin_math: Arithmetic Intensity (AI) represents Operations per Byte (OPS/Byte). For the Jetson AGX
    Orin, peak compute is 275 TOPS (INT8) and peak memory bandwidth is 204.8 GB/s. The Ridge Point = 275
    TOPS / 204.8 GB/s = 1342 OPS/Byte. A model must perform at least 1342 operations for every byte of
    data loaded from memory to be compute-bound on the Orin; otherwise, it is memory-bound.
  options:
  - FLOPS (Floating Point Operations Per Second)
  - Bytes/Op (Bytes per Operation)
  - Ops/Byte (Operations per Byte)
  - TOPS/W (Trillion Operations per Second per Watt)
  correct_index: 2
