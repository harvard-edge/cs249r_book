title: The Units of Arithmetic Intensity
scenario: You're profiling a new perception model on an autonomous vehicle's NVIDIA Jetson AGX Orin. To understand its performance limits, you need to place it on a roofline chart.
question: What are the units of Arithmetic Intensity, the x-axis of this chart?
details:
  realistic_solution: The correct units for Arithmetic Intensity are Operations per Byte (Ops/Byte). This metric quantifies how many computational operations are performed for each byte of data transferred from memory. A high AI means a workload is compute-bound, while a low AI means it's memory-bound.
  common_mistake: |
    **The Pitfall:** Confusing Arithmetic Intensity with a raw performance metric like FLOPS or inverting the ratio to Bytes/Op.
    **The Rationale:** Engineers often forget that Arithmetic Intensity specifically measures the ratio of compute to memory traffic, focusing only on the compute aspect.
    **The Consequence:** Misidentifying the units leads to an incorrect roofline analysis, potentially causing the team to optimize for compute when the model is actually memory-bound.
  napkin_math: |
    1. **Arithmetic Intensity (AI)** is defined as Operations per Byte (Ops/Byte).
    2. **Hardware Peak Compute:** Jetson AGX Orin peak compute is 275 TOPS (INT8).
    3. **Hardware Peak Bandwidth:** Peak memory bandwidth is 204.8 GB/s.
    4. **Result:** The Ridge Point is 275 TOPS / 204.8 GB/s = **1342 Ops/Byte**. A model must exceed this AI to be compute-bound.
  options:
  - FLOPS (Floating Point Operations Per Second)
  - Bytes/Op (Bytes per Operation)
  - Ops/Byte (Operations per Byte)
  - TOPS/W (Trillion Operations per Second per Watt)
  correct_index: 2
