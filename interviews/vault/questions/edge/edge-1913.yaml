title: Extreme Quantization Deployment on Qualcomm Cloud AI 100
scenario: You are tasked with deploying an LLM aggressively quantized to 2-bit (AWQ) onto a Qualcomm Cloud AI 100 accelerator. While the platform boasts 400 TOPS INT8, direct sub-4-bit support is limited.
question: How would you prepare, deploy, and validate the 2-bit AWQ LLM on the Cloud AI 100 given limited native sub-4-bit support?
details:
  realistic_solution: Because the hardware lacks native 2-bit matrix multiply accelerators, you must leverage the Qualcomm AI Engine Direct SDK to write custom kernel implementations. The 2-bit weights must be densely packed into INT8 containers in DRAM. At runtime, the kernel reads the INT8 block, unpacks/dequantizes it to INT8 or FP16 inside the fast on-chip SRAM, and executes the dense MAC operations. While the extra unpacking instructions consume compute cycles, the massive 400 TOPS capacity easily absorbs this. The true bottleneck remains memory bandwidth; effectively shrinking the weight footprint by 4x (INT8 to 2-bit) fundamentally alleviates the memory wall during auto-regressive generation.
  common_mistake: |
    **The Pitfall:** Assuming sub-4-bit quantization naturally accelerates compute without considering the hardware's instruction set architecture.
    **The Rationale:** Candidates overlook the severe cycle overhead required to unpack non-native bit-widths from memory registers prior to multiplication.
    **The Consequence:** The custom unpacking kernels are written inefficiently, shifting the bottleneck from memory back to compute, completely negating the latency benefits of the 2-bit compression.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 10B parameters, quantized to 2-bit AWQ.
       - Memory capacity: 32 GB LPDDR4x (approx 100 GB/s bandwidth).
       - Compute capacity: 400 TOPS INT8.
    2. **Calculations:**
       - Memory footprint = 10 * 10^9 * 2 bits / 8 bits/byte = 2.5 GB.
       - Time to read weights (per token) = 2.5 GB / 100 GB/s = 0.025 seconds (25ms).
       - Required operations (decode) = ~20 GigaOps per token.
       - Compute time available = 25ms. Threshold = 20 GOPS / 400 TOPS = 0.05ms (vast compute headroom for unpacking).
    3. **Conclusion & Interpretation:**
       - **Result: 25ms memory read time. The system is entirely Memory-Bandwidth-Bound. The massive INT8 compute capacity makes on-the-fly 2-bit unpacking highly viable.**
