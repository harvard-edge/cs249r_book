title: Extreme Quantization Deployment on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a large language model that has been aggressively quantized to 2-bit using an AWQ-like methodology onto a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). While the platform boasts high INT8 TOPS, direct sub-4-bit support might be limited.
question: How would you prepare, deploy, and validate the 2-bit AWQ LLM on the Cloud AI 100 given limited native sub-4-bit support?
details:
  realistic_solution: The most realistic solution involves leveraging the Qualcomm AI Engine Direct SDK to investigate or implement custom kernels for sub-4-bit operations if native support is not optimal. This might involve packing 2-bit weights into INT8 containers and writing custom dequantization/multiplication kernels. Pre-deployment, a thorough calibration and possibly retraining (QAT) specific to the Qualcomm Cloud AI 100's internal precision handling would be crucial for accuracy recovery. Memory access patterns would need to be optimized, potentially by designing the model to be memory-bound rather than compute-bound where possible, or by careful layer fusion. Validation would involve comparing on-device accuracy with floating-point baselines and profiling actual throughput against theoretical maximums.
  common_mistake: |
    **The Pitfall:** Assuming 400 TOPS INT8 directly translates to efficient sub-4-bit execution out-of-the-box.
    **The Rationale:** Candidates overlook the overhead of custom kernels required to pack/unpack 2-bit weights into INT8 containers and the calibration needed for the specific hardware.
    **The Consequence:** Deployment fails because the hardware chokes on unsupported operations, or latency is worse than INT8 due to massive unpacking overhead on the memory bus.
  napkin_math: |
    1. Calculate memory for 2-bit weights: A 10B parameter model uses ~2.5GB (10 * 10^9 * 2 bits / 8 bits/byte).
    2. Estimate memory bandwidth limit: Assume LPDDR4x provides ~100 GB/s.
    3. Calculate time to read weights: 2.5 GB / 100 GB/s = 0.025 seconds (25ms) per token generated.
    4. Compare with compute capacity: 400 TOPS INT8 provides vast compute; if packing/unpacking overhead takes <25ms, memory is the bottleneck.
    **If reading the 2.5GB weights takes 25ms and custom kernel execution takes less, the system becomes entirely memory-bound regardless of the 400 TOPS INT8 capacity.**
