title: Cross-Compiling CUDA Kernels for Jetson's Ampere GPU vs Cloud Ampere
scenario: Your custom CUDA kernel is compiled for sm_80 (A100, cloud). You deploy
  the same binary on Jetson Orin (sm_87, Ampere-based). The kernel runs but achieves 25%
  lower throughput than expected. Diagnose why a same-generation architecture has this performance
  gap.
question: Why does the sm_80 CUDA kernel achieve 25% lower throughput than expected on Jetson Orin sm_87
  despite both GPUs being Ampere?
details:
  realistic_solution: 'The 25% throughput drop is due to a drop in Streaming Multiprocessor (SM) occupancy caused by the architectural differences between A100 (GA100, sm_80) and Jetson Orin (GA10B, sm_87). A100 supports up to 2048 resident threads per SM, whereas Orin supports a maximum of 1536 resident threads per SM. If the kernel was tuned for A100 to use 512 threads per block, A100 can fit 4 blocks per SM (2048 threads). When this same kernel runs on Orin, it can only fit 3 blocks per SM (1536 threads). This results in a 25% reduction in active waves per SM, lowering the hardware''s ability to hide memory latency and resulting in the observed 25% throughput drop.'
  common_mistake: 'Assuming that because both GPUs are Ampere generation, their SM limits are identical. Candidates often blame PTX JIT compilation overhead, which is a one-time startup cost, or differences in memory bandwidth (LPDDR5 vs HBM2), without realizing that the kernel execution configuration itself is hitting a hard architectural occupancy wall specific to the GA10B (Orin) die.'
  napkin_math: 'A100 (sm_80) thread limit: 2048 threads/SM. Orin (sm_87) thread limit: 1536 threads/SM. With a block size of 512 threads: A100 fits 2048 / 512 = 4 blocks per SM. Orin fits 1536 / 512 = 3 blocks per SM. Occupancy ratio: 3 / 4 = 75%. Loss in occupancy = 25%. For latency-bound kernels, a 25% drop in resident warps translates directly to a proportional 25% drop in throughput.'
