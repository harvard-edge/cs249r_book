title: Continuous Batching for Multi-Camera Object Detection
scenario: You are deploying a multi-camera traffic monitoring system on an edge device. The system ingests streams from 8 cameras at 30 FPS each. You need to design a batching strategy for a YOLOv8 object detection model to maximize throughput while ensuring end-to-end latency remains strictly under 50ms per frame. The requests arrive asynchronously due to network jitter.
question: How would you batch 8 asynchronous 30 FPS camera streams to maximize throughput while keeping per-frame latency under 50 ms?
details:
  realistic_solution: 'Design a continuous/dynamic batching system with a strict timeout (e.g., 10ms max wait) and a maximum batch size of 8 (number of cameras). If the timeout is reached before 8 frames accumulate, dispatch the partial batch to the GPU. To meet the 50ms total latency budget, pipelining is essential: use the DLA for preprocessing or offloading secondary tasks, freeing the Ampere GPU for the main YOLO inference, and ensure memory transfers (host to device) overlap with compute using CUDA streams.'
  common_mistake: |
    **The Pitfall:** Proposing simple static batching.
    **The Rationale:** Candidates assume frames arrive perfectly uniformly.
    **The Consequence:** Network jitter delays arrivals, violating the strict 50ms latency constraint while waiting for full batches.
  napkin_math: |
    - Frame budget: 50ms. 8 cameras @ 30 FPS = 240 FPS. Average interval = 4.16ms.
    - Accumulate 8 frames = ~33.3ms under ideal conditions.
    - 10ms accumulation window averages ~2.4 frames per batch.
    - YOLOv8 (8-frame batch) compute = 240 GOPS.
    - Compute time at 275 TOPS = $\approx 0.87ms$, plus 0.1ms memory copy.
    - **Conclusion:** Bottleneck is accumulation time; dynamic batching with strict timeouts is critical.
