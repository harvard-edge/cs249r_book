title: Continuous Batching for Multi-Camera Object Detection
scenario: You are deploying a multi-camera traffic monitoring system on an NVIDIA
  Jetson Orin (64 GB LPDDR5, Ampere GPU + DLA, 60W TDP). The system ingests streams
  from 8 cameras at 30 FPS each. You need to design a batching strategy for a YOLOv8
  object detection model to maximize throughput while ensuring end-to-end latency
  remains strictly under 50ms per frame. The requests arrive asynchronously due to
  network jitter.
question: How would you batch 8 asynchronous 30 FPS camera streams on Jetson Orin
  to maximize throughput while keeping per-frame latency under 50 ms?
details:
  realistic_solution: 'Design a continuous/dynamic batching system with a strict timeout
    (e.g., 10ms max wait) and a maximum batch size of 8 (number of cameras). If the
    timeout is reached before 8 frames accumulate, dispatch the partial batch to the
    GPU. To meet the 50ms total latency budget, pipelining is essential: use the DLA
    for preprocessing or offloading secondary tasks, freeing the Ampere GPU for the
    main YOLO inference, and ensure memory transfers (host to device) overlap with
    compute using CUDA streams.'
  common_mistake: Candidates often propose simple static batching (wait for N frames)
    which violates the strict 50ms latency constraint when network jitter delays arrivals,
    or naive dynamic batching without considering the hardware's optimal batch sizes
    (e.g., multiples of 8 or 16 for Tensor Cores/DLA). They also frequently ignore
    the DLA (Deep Learning Accelerator) available on the Orin, putting all load on
    the Ampere GPU.
  napkin_math: 'Total frame budget: 50ms. 8 cameras @ 30 FPS = 240 FPS total. Average
    arrival interval: 1000ms / 240 = 4.16ms. To batch 8 frames takes ~33.3ms under
    ideal conditions. If we use a 10ms accumulation window, we average ~2.4 frames
    per batch. The Jetson Orin''s Ampere GPU + DLA can deliver 275 TOPS (INT8). Assuming
    YOLOv8 needs ~30 GOPS/frame, an 8-frame batch needs 240 GOPS. At 275 TOPS, inference
    compute is (240 / 275000) * 1000 = ~0.87ms, plus memory copy overhead on the 204 GB/s
    LPDDR5 bandwidth (e.g., transferring 24MB takes ~0.1ms). The bottleneck is accumulation time, not compute, making dynamic
    batching with strict timeouts critical to stay under 50ms.'
