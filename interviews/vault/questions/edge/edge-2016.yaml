title: Optimizing LLM Deployment on Hailo-8 with Custom Operator Challenges
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on a fleet of Hailo-8 edge devices. The pre-trained model is in PyTorch, but Hailo-8 requires an optimized ONNX representation or its native compiler format for best performance. The Hailo-8 boasts 26 TOPS (Tera Operations Per Second) for INT8 operations and consumes 2.5W. During conversion, you encounter several custom PyTorch operators that are not directly supported by the Hailo-8 ONNX runtime or its compiler. Furthermore, the model's complexity pushes the limits of the Hailo-8's compute capacity and power budget for the required inference latency.
question: How would you handle unsupported PyTorch operators and fit the LLM within the Hailo-8 latency, compute, and 2.5W power constraints?
details:
  realistic_solution: Identify unsupported operators and implement custom delegation strategies. This involves either replacing custom operations with equivalent, Hailo-8-supported operations, quantizing specific layers to INT8 where possible, or creating custom delegates for the Hailo-8 runtime that offload unsupported operations to a host CPU (if available and within latency budget). Utilize Hailo-8's SDK and profiling tools to analyze operator coverage and performance bottlenecks, iteratively refining the model conversion and deployment pipeline while ensuring accuracy. This often requires deep understanding of both the model architecture and the target hardware capabilities.
  common_mistake: |
    **The Pitfall:** Attempting to directly convert the PyTorch model without understanding Hailo-8's specific operator set.
    **The Rationale:** Relying blindly on default conversion tools without profiling how unsupported operations are handled by the compiler.
    **The Consequence:** Runtime errors, significant performance degradation from CPU fallbacks, or incorrect numerical results.
  napkin_math: |
    - Hailo-8 Compute: 26 TOPS (INT8).
    - Power Budget: 2.5W.
    - If an LLM requires 100 GOPS per inference, max inferences = 26,000 GOPS / 100 GOPS = 260 inferences/s.
    - Target latency = 100ms (0.1s).
    - Max model computation limit = 26 TOPS * 0.1s = 2,600 GOPS.
    - **Result: Energy consumed per 100ms inference = 2.5W * 0.1s = 0.25 Joules.**
