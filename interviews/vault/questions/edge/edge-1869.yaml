title: Optimizing Memory-Mapped Large Model Inference on Qualcomm Cloud AI 100
scenario: Your team is deploying a 70 billion parameter INT8 quantized model for real-time inference on a Qualcomm Cloud AI 100 accelerator. The accelerator has 32 GB LPDDR4x memory, delivers 400 TOPS INT8 performance, and operates within a 75W power envelope. The model's weights significantly exceed the available physical memory.
question: How would you design mmap-based inference for a 70B INT8 model that exceeds Cloud AI 100's 32 GB, while minimizing cold start and sharing weights?
details:
  realistic_solution: 'The solution requires a tiered approach: 1) Segment the model: Identify critical/hot layers (e.g., input/output layers, frequently used attention blocks) that ideally reside in memory. 2) Proactive Paging/Prefetching: Use `mmap` with `MADV_WILLNEED` on these hot segments during application startup, potentially in a background thread, to pre-fault pages and minimize cold start latency. 3) Demand Paging for Cold Segments: Allow less critical layers to be demand-paged, relying on the OS for loading. 4) Shared Memory: Utilize `MAP_SHARED` when `mmap`ing the weight file to allow multiple inference processes to share the same physical memory pages for model weights, reducing total memory footprint and improving resource utilization. 5) Custom Paging/Eviction (Advanced): For models vastly exceeding memory, implement a custom weight cache/eviction policy that dynamically loads/unloads segments based on access patterns, potentially using `mremap` or explicit file I/O for segments not suitable for standard `mmap`. 6) OS-level tuning: Consider `mincore` to monitor resident pages and `mlock` for truly critical segments (with caution due to potential system instability).'
  common_mistake: |
    **The Pitfall:** Naively using `mmap` for the entire model without pre-faulting.
    **The Rationale:** Candidates assume the OS will perfectly handle demand paging for a model larger than physical RAM.
    **The Consequence:** This leads to excessive page faults and thrashing during inference, causing unacceptable cold start latency and missed real-time deadlines.
  napkin_math: |
    1. Model Size: 70 billion parameters × 1 byte (INT8) = 70 GB.
    2. Memory Deficit: 70 GB - 32 GB (device memory) = 38 GB deficit.
    3. If the OS pages in 32GB from an NVMe drive at 5 GB/s read speed, initial load time = 32 GB / 5 GB/s = 6.4 seconds.
    4. **Without proactive pre-faulting (e.g., `MADV_WILLNEED`), the 6.4s latency is catastrophic for real-time inference.**
