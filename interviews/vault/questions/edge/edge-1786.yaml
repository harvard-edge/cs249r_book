title: Edge Inference Logging Storage Format
scenario: You are deploying a computer vision pipeline on a Google Coral Edge TPU in a USB form factor, operating within a strict 2W power budget. The device runs a model with limited operator support that must be quantized to INT8 to leverage the hardware's 4 TOPS capability, and it continuously generates prediction metadata.
question: What binary, row-oriented storage format native to the TensorFlow ecosystem is designed for efficiently logging sequential, append-only inference results to local storage?
details:
  realistic_solution: TFRecord is the correct answer. It is a lightweight, row-oriented binary storage format that excels at sequential write operations and continuous append-only logging on constrained hardware. Furthermore, it integrates natively with the TensorFlow Lite ecosystem used by the Edge TPU without requiring heavy third-party compression libraries.
  common_mistake: |
    **The Pitfall:** Suggesting Parquet, JSON, or CSV for logging on edge devices.
    **The Rationale:** Candidates default to columnar formats (Parquet) optimized for analytics or text formats that waste I/O bandwidth, forgetting the constraints of append-only edge writing.
    **The Consequence:** The limited flash storage wears out prematurely, or the system exceeds its 2W power budget due to excessive disk I/O.
  napkin_math: |
    1. Assume TPU processes 400 inferences per second.
    2. Calculate logging raw JSON (500 bytes/record): 400 * 500 B = 200 KB/s write bandwidth.
    3. Calculate logging binary TFRecord (100 bytes/record): 400 * 100 B = 40 KB/s.
    4. Calculate daily savings: (200 KB/s - 40 KB/s) * 3600 * 24 = ~13.8 GB/day.
    **Using TFRecord reduces write bandwidth by 5x, saving 13.8 GB of storage per day and minimizing flash wear.**
