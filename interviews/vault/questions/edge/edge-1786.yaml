title: Edge Inference Logging Storage Format
scenario: You are deploying a computer vision pipeline on a Google Coral Edge TPU
  in a USB form factor, operating within a strict 2W power budget. The device runs
  a model with limited operator support that must be quantized to INT8 to leverage
  the hardware's 4 TOPS capability, and it continuously generates prediction metadata.
  What binary, row-oriented storage format native to the TensorFlow ecosystem is specifically
  designed for efficiently logging these sequential, append-only inference results
  to local storage?
question: What binary, row-oriented storage format native to the TensorFlow ecosystem
  is specifically designed for efficiently logging these sequential, append-only inference
  results to local storage?
details:
  realistic_solution: TFRecord is the correct answer. It is a lightweight, row-oriented
    binary storage format that excels at sequential write operations and continuous
    append-only logging on constrained hardware. Furthermore, it integrates natively
    with the TensorFlow Lite ecosystem used by the Edge TPU without requiring heavy
    third-party compression libraries.
  common_mistake: Candidates often default to suggesting Parquet, forgetting that
    it is a columnar format optimized for read-heavy analytics and requires more memory
    to buffer row groups before writing. They may also suggest plain JSON or CSV,
    which lack binary efficiency and waste the limited I/O write bandwidth of edge
    devices.
  napkin_math: 'Assuming the Google Coral Edge TPU fully utilizes its 4 TOPS INT8
    capacity to process 400 inferences per second (e.g., 10 GOPS per inference). Logging
    raw JSON (500 bytes/record) requires: 400 * 500 B = 200 KB/s of write bandwidth.
    Using a binary TFRecord format (100 bytes/record) requires: 400 * 100 B = 40 KB/s.
    This 5x reduction saves 13.8 GB of storage per day and minimizes flash memory
    wear while operating within the tight 2W power constraint.'
