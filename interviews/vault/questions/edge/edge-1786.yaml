title: Edge Inference Logging Storage Format
scenario: You are deploying a computer vision pipeline on a Google Coral Edge TPU in a USB form factor. The device runs a model with limited operator support that must be quantized to INT8, and it continuously generates prediction metadata.
question: What binary, row-oriented storage format native to the TensorFlow ecosystem is designed for efficiently logging sequential, append-only inference results to local storage?
details:
  realistic_solution: TFRecord is the correct answer. It is a lightweight, row-oriented binary storage format that excels at sequential write operations and continuous append-only logging on constrained hardware. Furthermore, it integrates natively with the TensorFlow Lite ecosystem used by the Edge TPU without requiring heavy third-party compression libraries.
  common_mistake: |
    **The Pitfall:** Suggesting Parquet, JSON, or CSV for logging on edge devices.
    **The Rationale:** Candidates default to columnar formats (Parquet) optimized for analytics or text formats that waste I/O bandwidth, forgetting the constraints of append-only edge writing.
    **The Consequence:** The limited flash storage wears out prematurely, or the system exceeds its power budget due to excessive disk I/O.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference rate: 400 inferences per second.
       - Raw JSON log size: 500 bytes/record.
       - Binary TFRecord log size: 100 bytes/record.
    2. **Calculations:**
       - JSON write bandwidth: 400 * 500 B = 200 KB/s.
       - TFRecord write bandwidth: 400 * 100 B = 40 KB/s.
       - Daily savings: (200 KB/s - 40 KB/s) * 3600s * 24h = 13.824 GB/day.
    3. **Conclusion & Interpretation:**
       - **Result: 5x Write Bandwidth Reduction**. Using TFRecord saves ~13.8 GB of storage per day, minimizing flash wear and power draw.
