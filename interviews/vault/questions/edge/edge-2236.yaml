title: Continual LoRA Adaptation on Edge Devices
scenario: 'An edge robotics platform collects new demonstrations weekly and needs to update its task LoRA adapter without forgetting previously learned behaviors. The platform runs on an NVIDIA Jetson Orin.'
question: 'How would you update the weekly LoRA adapter on Jetson Orin without catastrophic forgetting of prior robot behaviors?'
details:
  realistic_solution: 'Options: (1) Elastic Weight Consolidation (EWC) on adapter parameters — add regularization term penalizing movement of important adapter weights; (2) adapter composition — maintain separate adapter per time window and compose them at inference (A_t + A_{t-1} applied sequentially); (3) replay buffer — store 5-10% of historical data and mix with new data. For production, (3) is most practical: 5% replay maintains >95% original task performance at cost of 5% additional training compute.'
  common_mistake: |
    **The Pitfall:** Simply training a new LoRA adapter on new data and replacing the old one.
    **The Rationale:** Candidates treat LoRA updates identically to standard fine-tuning without considering distribution shifts.
    **The Consequence:** The model suffers catastrophic forgetting of previous task distributions if the new training data doesn't cover the full original scope.
  napkin_math: |
    * Weekly new data: 100K examples.
    * Replay buffer (5%): 5K historical examples.
    * Total training: 105K examples.
    * Without replay: performance on task T-1 degrades by ~20%.
    * With 5% replay: <2% degradation.
    * Storage cost: 5K examples × 2KB avg = 10 MB replay buffer.
    * **Conclusion: A 5% replay buffer trivially prevents catastrophic forgetting for only 10MB of storage.**
