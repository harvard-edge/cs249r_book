title: 'Energy-optimal gradient computation schedule for battery-powered edge device'
scenario: 'You are designing an on-device learning system for a wildlife camera. The camera must run 24/7 with learning, using <10% battery per day on learning (2Wh budget). Each learning step takes 50ms (training forward + backward).'
question: 'How many learning steps can you afford per hour?'
details:
  realistic_solution: 'Profile power using tegrastats. The Orin consumes significantly more power during the backward pass than during inference. Calculate total energy per step, and divide the daily budget by this cost. Because the idle power alone exceeds the total battery budget, the system must aggressively duty-cycle the SoC, waking up only to batch process the learning steps.'
  common_mistake: |
    **The Pitfall:** Assuming constant TDP during training or ignoring idle power.
    **The Rationale:** Candidates multiply the 60W peak TDP by the step duration without accounting for dynamic power scaling or the base idle consumption.
    **The Consequence:** Battery depletion within hours instead of achieving 24/7 operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery budget for learning: 2Wh/day = 7200 Joules/day.
    - Step duration: 50ms.
    - Orin power: ~45W active (backward pass), ~5W idle.

    **Calculations:**
    - Energy per step: 50 ms * 45 W = 2.25 Joules.
    - Steps per day: 7200 J / 2.25 J/step = 3200 steps.
    - Steps per hour: 3200 / 24 = 133.3 steps/hour.
    - Idle energy: 24h * 5W = 120Wh (exceeds 20Wh total battery, must duty-cycle).

    **Conclusion & Interpretation:**
    - **Result: 133 steps per hour (Energy-Bound)**. Requires strict duty-cycling to meet budget.
