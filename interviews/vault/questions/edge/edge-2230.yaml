title: Energy-optimal gradient computation schedule for battery-powered edge device
scenario: You are designing an on-device learning system for a wildlife camera running
  on a 20Wh battery with Jetson Orin (60W TDP). The camera must run 24/7 with learning,
  using <10% battery per day on learning (2Wh budget). Each learning step takes 50ms
  (training forward + backward). How many learning steps can you afford per hour?
question: How many learning steps can you afford per hour?
details:
  realistic_solution: 'Measure actual power: use tegrastats to profile Orin power
    during training. Typical: ~45W during backward, ~20W during inference, ~5W idle.
    Budget: 2Wh = 7200 joules. Each step: 50ms \u00d7 45W = 2.25 joules. Steps per day:
    7200J / 2.25J = 3200 steps. Steps per hour: 3200/24 = 133 steps/hour. Schedule:
    one learning step every 27 seconds. Note: Remaining 26.95 seconds at idle per cycle
    would consume 120Wh/day (26.95s \u00d7 5W / 27s \u00d7 24h), which exceeds the 20Wh
    battery, meaning the Orin must be duty-cycled or steps batched.'
  common_mistake: 'Assuming Orin always runs at 60W during training. Power consumption
    scales with workload: inference-only is ~15W, full training (forward + backward)
    peaks at ~50W. Not accounting for idle/sleep power between steps.'
  napkin_math: 'Budget check: 133 steps/hour \u00d7 24 hours = 3192 steps \u00d7 2.25J = 7182
    joules \u2248 2Wh. \u2713 Camera total battery: 20Wh. Non-learning budget: 18Wh for sensing
    + comms + CPU. Orin idle at 5W \u00d7 24h = 120Wh \u2014 wait, Orin alone exceeds battery
    at any power state. Requires duty-cycling Orin completely. Power management: If
    Orin is duty-cycled and we batch 133 steps per hour, active time is 133 \u00d7 50ms =
    6.65s per hour. Energy for learning = 6.65s \u00d7 45W = 299.25J/hour. 299.25J \u00d7 24 =
    7182J \u2248 2Wh. Fits budget if strictly duty-cycled.'
