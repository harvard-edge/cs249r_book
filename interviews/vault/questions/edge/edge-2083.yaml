title: Optimizing Edge AI Dataset Curation for Qualcomm Cloud AI 100 Deployment
scenario: 'You are tasked with developing a highly accurate object detection model for industrial anomaly detection, designed for deployment on the Qualcomm Cloud AI 100. Given a tight budget for data labeling and the critical need for high precision and recall on the edge, you are evaluating two distinct dataset curation strategies: Strategy A (Traditional Batch Annotation) versus Strategy B (Active Learning & Iterative Refinement).'
question: "How would you compare traditional batch annotation versus active learning for Cloud AI 100 defect detection and choose a curation strategy?"
details:
  realistic_solution: A robust solution would involve a phased approach, potentially starting with Strategy B (Active Learning) to rapidly converge on a high-quality, maximally informative, and compact dataset, while also enabling early detection of dataset bias and issues with inter-annotator agreement. Key evaluation metrics would include not only traditional ML metrics (mAP, F1-score) but also hardware-centric metrics like model size (to fit within 32 GB LPDDR4x), inference latency (to meet real-time requirements given 400 TOPS INT8), power efficiency (75W budget), and data-to-performance efficiency (how much performance gain per labeled sample). The solution should emphasize how each strategy impacts these metrics and ultimately the TCO and deployment feasibility on the Qualcomm Cloud AI 100, including mechanisms for regular bias audits and inter-annotator agreement checks throughout the curation process.
  common_mistake: |
    **The Pitfall:** Advocating for massive datasets without considering the impact on edge resources or labeling budgets.
    **The Rationale:** Candidates default to "more data is better" without evaluating active learning economics.
    **The Consequence:** Wasting budget on uninformative labels and potentially baking in dataset bias that degrades real-world edge performance.
  napkin_math: |
    *   **Labeling Cost:** Strategy A (100,000 samples @ $0.10) = $10,000. Strategy B (10,000 active samples) = $1,000.
    *   **Model Size:** YOLOv8-L in INT8 is ~40MB, trivially fitting the 32 GB LPDDR4x.
    *   **Inference:** A 100 GOPS model on 400 TOPS INT8 gives 0.25 ms theoretical latency (4000 inf/sec).
    *   **Power:** 75W / 4000 inf/sec = 18.75 mJ per inference.
    *   **Result:** Both strategies produce models that easily fit the hardware, so the choice hinges entirely on data efficiency ($1,000 vs $10,000) and mitigating dataset bias.
