title: Optimizing Edge AI Dataset Curation for Qualcomm Cloud AI 100 Deployment
scenario: 'You are tasked with developing a highly accurate object detection model for industrial anomaly detection, designed for deployment on the Qualcomm Cloud AI 100. Given a tight budget for data labeling and the critical need for high precision and recall on the edge, you are evaluating two distinct dataset curation strategies: Strategy A (Traditional Batch Annotation) versus Strategy B (Active Learning & Iterative Refinement).'
question: "How would you compare traditional batch annotation versus active learning for Cloud AI 100 defect detection and choose a curation strategy?"
details:
  realistic_solution: A robust solution would involve a phased approach, starting with Strategy B (Active Learning) to rapidly converge on a high-quality, maximally informative, and compact dataset, while enabling early detection of dataset bias. Key evaluation metrics include traditional ML metrics (mAP, F1-score) and hardware-centric metrics like model size, inference latency, power efficiency, and data-to-performance efficiency. The solution emphasizes how each strategy impacts TCO and deployment feasibility.
  common_mistake: |
    **The Pitfall:** Advocating for massive datasets without considering the impact on edge resources or labeling budgets.
    **The Rationale:** Candidates default to "more data is better" without evaluating active learning economics.
    **The Consequence:** Wasting budget on uninformative labels and potentially baking in dataset bias that degrades real-world edge performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Strategy A: 100,000 samples @ $0.10.
       - Strategy B: 10,000 active samples @ $0.10.
       - Hardware: 32 GB LPDDR4x, 400 TOPS INT8, 75W budget.
    2. **Calculations:**
       - Labeling Cost: Strategy A = $10,000. Strategy B = $1,000.
       - Inference: A 100 GOPS model on 400 TOPS gives 0.25 ms latency (4000 inf/sec).
       - Power: 75W / 4000 inf/sec = 18.75 mJ per inference.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Efficiency Bound.** Both strategies produce models that easily fit the hardware constraints, so the optimal choice hinges entirely on data efficiency ($1,000 vs $10,000) and mitigating bias.
