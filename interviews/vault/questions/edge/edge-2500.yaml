title: Ring vs Star on Shared Medium
scenario: A robotic swarm of 5 Jetson AGX Orin modules connected via Wi-Fi 6 (1.2
  Gbps peak, 5ms CSMA contention latency per packet) runs federated learning, sharing
  50MB of FP16 weight updates.
question: Evaluate the total synchronization time per update using a Ring AllReduce
  topology versus a Star topology (central Parameter Server), determining which configuration
  minimizes network collapse.
details:
  realistic_solution: Ring AllReduce on N=5 involves 2(N-1)=8 steps. Each step transfers
    10MB at 150 MB/s (66ms) plus 5ms contention, totaling 8 * 71ms = 568ms. A Star
    topology forces 4 workers to send and receive 50MB to one server over a shared
    RF medium, causing 400MB of sequential traffic at the bottleneck. This takes 400MB
    / 150MB/s = 2.66 seconds. Ring AllReduce avoids congesting a single node's wireless
    link and is roughly 5x faster.
  common_mistake: Blindly assuming a centralized parameter server is simpler for small
    clusters, forgetting that shared-medium wireless networks suffer catastrophic
    collision degradation under bursty Star topology traffic.
  napkin_math: 'Ring: 2(5-1) * (10MB / 150MB/s + 5ms) = 8 * 71.6ms = ~573ms. Star:
    (4 workers * 2 * 50MB) / 150MB/s = 400 / 150 = 2.66s.'
