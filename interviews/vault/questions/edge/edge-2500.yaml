title: Ring vs Star on Shared Medium
scenario: A robotic swarm of 5 edge modules connected via Wi-Fi 6 runs federated learning, sharing 50MB of FP16 weight updates.
question: Evaluate the total synchronization time per update using a Ring AllReduce topology versus a Star topology, determining which configuration minimizes network collapse.
details:
  realistic_solution: Enforce a Ring AllReduce topology. A centralized Parameter Server (Star topology) creates catastrophic queueing delays and packet collisions on a shared RF medium like Wi-Fi. Ring AllReduce distributes the bandwidth demands sequentially between logical neighbors, effectively preventing the wireless access point from becoming a hard bottleneck.
  common_mistake: |
    **The Pitfall:** Defaulting to a Parameter Server (Star) topology for small cluster sizes.
    **The Rationale:** Candidates map cloud datacenter networking logic (where switches handle massive burst routing) to a shared, half-duplex RF medium.
    **The Consequence:** Extreme packet collision degradation, bringing the federated learning sync phase to an absolute crawl.
  napkin_math: |
    **Assumptions & Constraints:**
    - Swarm size (N): 5
    - Payload size: 50 MB per node
    - Wi-Fi 6 Link: 150 MB/s practical throughput, 5ms contention latency

    **Calculations:**
    - Ring steps: 2(N-1) = 8 steps
    - Ring step time: (10 MB / 150 MB/s) + 5ms = 66.6ms + 5ms = 71.6 ms
    - Total Ring time: 8 * 71.6 ms = ~573 ms
    - Star central bottleneck: 4 workers * 2 * 50 MB = 400 MB traffic over 1 link
    - Total Star time: 400 MB / 150 MB/s = 2.66 seconds

    **Conclusion & Interpretation:**
    - **Result: 573 ms (Network-Bound)**. The Star topology is nearly 5x slower due to centralized congestion on the shared medium.
