title: Hailo-8 Host Streaming Bandwidth and Throughput
scenario: You are designing a real-time edge ingestion pipeline for a smart factory using a single Hailo-8 dataflow accelerator. The Hailo-8 has no local DRAM, meaning input data must continuously stream from host memory. Your INT8 inspection model requires 65 GOPS per frame, and each preprocessed input tensor is 5 Megabytes.
question: For a 65 GOPS/frame model with 5 MB inputs, what is the theoretical maximum frame rate and minimum sustained host memory bandwidth required to avoid stalls?
details:
  realistic_solution: First, determine the maximum frames per second by dividing the total compute capacity by the per-frame compute requirement. Then, multiply this maximum FPS by the size of the input tensor to find the required host-to-accelerator streaming bandwidth. In a real deployment, you would also verify your host memory subsystem can support this DMA transfer rate.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with GOPS or ignoring sustained memory bandwidth.
    **The Rationale:** Candidates often make a 1000x arithmetic error (Tera vs Giga) or forget that "no local DRAM" means the host must sustain the full raw tensor bandwidth.
    **The Consequence:** Drastically miscalculating the maximum FPS or failing to provision a host system capable of keeping the accelerator fed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 Compute Capacity: 26 TOPS.
       - Model Requirement: 65 GOPS/frame.
       - Input Tensor Size: 5 MB/frame.
    2. **Calculations:**
       - Compute Capacity: 26 TOPS = 26,000 GOPS.
       - Theoretical Max FPS: 26,000 GOPS / 65 GOPS/frame = 400 FPS.
       - Required Streaming Bandwidth: 400 frames/sec * 5 MB/frame = 2,000 MB/s (2 GB/s).
       - Power Efficiency: 26 TOPS / 2.5W = 10.4 TOPS/W.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Demanding.** To achieve the theoretical max of 400 FPS, the host memory subsystem must sustain 2 GB/s to prevent accelerator stalls.
