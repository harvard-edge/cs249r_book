title: Active Learning Storage on Qualcomm Cloud AI 100
scenario: You are deploying a smart manufacturing vision model on an on-premise Qualcomm Cloud AI 100 inference accelerator. Leveraging the chip's 400 TOPS INT8 performance, the system continuously processes 2,500 frames per second across multiple camera streams. To curate a dataset for future retraining, you implement an active learning filter that saves frames for human annotation when the model's prediction confidence is uncertain.
question: If 0.05% of processed frames trigger the filter and each requires 1.5 MB, how much daily storage is required?
details:
  realistic_solution: The correct approach is to systematically multiply the processing throughput by the time window to find the total frame count, apply the uncertainty fraction, and then calculate the total storage. This highlights that even with a highly selective active learning filter (0.05%), the massive INT8 throughput of the accelerator results in a substantial daily data collection footprint that must be managed on-premise.
  common_mistake: |
    **The Pitfall:** Miscalculating the percentage or daily seconds.
    **The Rationale:** Candidates often use 0.05 instead of 0.0005 for the fraction, or fail to accurately calculate the total number of seconds in a 24-hour period, getting bogged down in complex compression schemes instead.
    **The Consequence:** Drastically overestimating or underestimating the storage footprint, leading to inadequate on-premise storage provisioning.
  napkin_math: |
    - **Calculate total seconds in a day:** 60 * 60 * 24 = 86,400 seconds.
    - **Calculate total frames processed daily:** 2,500 fps * 86,400 seconds = 216,000,000 frames.
    - **Calculate frames selected for labeling:** 216,000,000 * 0.0005 (0.05%) = 108,000 frames.
    - **Calculate total storage:** 108,000 frames * 1.5 MB/frame = 162,000 MB.
    - **Convert to gigabytes:** 162,000 MB / 1,000 = **162 GB per day.**
