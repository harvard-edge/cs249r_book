title: Active Learning Storage on Qualcomm Cloud AI 100
scenario: You are deploying a smart manufacturing vision model on an on-premise Qualcomm
  Cloud AI 100 inference accelerator. Leveraging the chip's 400 TOPS INT8 performance,
  the system continuously processes 2,500 frames per second across multiple camera
  streams. To curate a dataset for future retraining, you implement an active learning
  filter that saves frames for human annotation when the model's prediction confidence
  is uncertain. If 0.05% of processed frames trigger this uncertainty filter and each
  compressed frame requires 1.5 MB of storage, calculate the daily storage capacity
  required to hold this curated data.
question: How much daily storage is required for frames selected by the 0.05% uncertainty
  filter at 2,500 FPS and 1.5 MB per frame?
details:
  realistic_solution: The correct approach is to systematically multiply the processing
    throughput by the time window to find the total frame count, apply the uncertainty
    fraction, and then calculate the total storage. This highlights that even with
    a highly selective active learning filter (0.05%), the massive INT8 throughput
    of the accelerator results in a substantial daily data collection footprint that
    must be managed on-premise.
  common_mistake: Candidates often miscalculate by using 0.05 instead of 0.0005 for
    the percentage, or they fail to accurately calculate the total number of seconds
    in a 24-hour period. Some also get bogged down proposing complex data compression
    schemes rather than executing the straightforward volumetric calculation requested.
  napkin_math: '1. Calculate total seconds in a day: 60 * 60 * 24 = 86,400 seconds.

    2. Calculate total frames processed daily: 2,500 fps * 86,400 seconds = 216,000,000
    frames.

    3. Calculate frames selected for labeling: 216,000,000 * 0.0005 (0.05%) = 108,000
    frames.

    4. Calculate total storage: 108,000 frames * 1.5 MB/frame = 162,000 MB.

    5. Convert to gigabytes: 162,000 MB / 1,000 = 162 GB per day.'
