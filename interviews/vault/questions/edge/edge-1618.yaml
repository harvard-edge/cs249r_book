title: Hailo-8 End-to-End Latency Decomposition for Object Detection
scenario: You are deploying an INT8 object detection model on a Hailo-8 accelerator
  (26 TOPS, dataflow architecture without local DRAM). The host CPU captures a 1080p
  RGB image, preprocesses it, and streams it to the Hailo-8 over PCIe. The model requires
  13 GOPS per inference. After inference, the Hailo-8 streams raw INT8 bounding box
  predictions back to the host CPU, which runs Non-Maximum Suppression (NMS). Calculate
  the total end-to-end latency per frame, given CPU preprocessing takes 3 ms, host-memory
  PCIe streaming takes 1 ms each way, and CPU postprocessing takes 2 ms.
question: What is the total end-to-end latency per frame including preprocessing,
  PCIe transfers, Hailo-8 inference, and NMS?
details:
  realistic_solution: 'The end-to-end latency must sum all sequential components in
    the pipeline: CPU preprocessing, host-to-device PCIe streaming, Hailo-8 inference
    compute, device-to-host PCIe streaming, and CPU postprocessing. Because the Hailo-8
    is a dataflow accelerator that streams directly from host memory, these transfer
    times are explicit and unavoidable steps in the critical path.'
  common_mistake: Candidates often only calculate the theoretical accelerator compute
    time (GOPS / TOPS) and ignore the data transfer overheads and CPU preprocessing/postprocessing
    times. Forgetting that Hailo-8 lacks local DRAM and relies on host memory streaming
    is a frequent oversight.
  napkin_math: Compute time = 13 GOPS / 26 TOPS = 13e9 Operations / 26e12 Operations
    per second = 0.5 ms. Total Latency = Preprocessing (3.0 ms) + H2D Transfer (1.0
    ms) + Compute (0.5 ms) + D2H Transfer (1.0 ms) + Postprocessing NMS (2.0 ms) =
    7.5 ms end-to-end latency.
