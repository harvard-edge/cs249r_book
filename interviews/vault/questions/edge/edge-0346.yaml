title: 'The Edge Roofline: Calculating the Ridge Point'
scenario: You are an ML systems engineer on an autonomous driving team. Your team lead asks you to characterize the new NVIDIA Jetson AGX Orin accelerator you've just received. They want to know its 'ridge point' for INT8 operations to quickly classify if future perception models will be compute-bound or memory-bound.
question: Given the device's peak performance of 275 TOPS (INT8) and memory bandwidth of 204.8 GB/s, what is its approximate ridge point?
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (Ops/Byte) a workload must have to be limited by the processor's computation speed rather than its memory bandwidth. It separates compute-bound workloads from memory-bound ones on a roofline plot. To calculate it, you must use consistent units for compute and bandwidth. The Jetson AGX Orin provides 275 * 10^12 Ops/sec and 204.8 * 10^9 Bytes/sec. Dividing peak compute by memory bandwidth gives the correct operational intensity.
  common_mistake: |
    **The Pitfall:** Unit mismatch errors during division.
    **The Rationale:** The most common mistake is dividing Tera-ops per second (10^12) directly by Giga-bytes per second (10^9) without normalization.
    **The Consequence:** This results in an answer off by a factor of 1,000, breaking all subsequent bottleneck analysis. Another error is confusing it with power efficiency (TOPS/W).
  napkin_math: |
    1. **Formula**: Ridge Point = Peak Compute / Peak Memory Bandwidth.
    2. **Peak Compute**: 275 TOPS = 275 * 10^12 Ops/sec.
    3. **Peak Bandwidth**: 204.8 GB/s = 204.8 * 10^9 Bytes/sec.
    4. **Result**: 275e12 / 204.8e9 = **~1343 Ops/Byte**.
  options:
  - ~1.34 Ops/Byte
  - ~4.6 Ops/Byte
  - ~1343 Ops/Byte
  - ~0.74 Bytes/Op
  correct_index: 2
