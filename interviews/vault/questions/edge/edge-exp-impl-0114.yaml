title: 4-Bit Weight Packing for Coral Edge TPU Bandwidth
scenario: You are deploying a model to a Google Coral Edge TPU, which features a strict INT8-only compute
  pipeline providing 4 TOPS at 2W over a USB/PCIe interface. To overcome a severe memory bottleneck on
  the host bus, you apply extreme quantization by compressing weights to 4-bit and packing two weights
  into each INT8 register to halve memory transfers. If your device interface has an effective memory
  bandwidth of 8 GB/s and the model contains 32 million parameters, calculate the maximum theoretical
  inference rate (in inferences per second) assuming the system is strictly memory-bound.
question: "What is the maximum memory-bound inference rate after packing 32M 4-bit weights over an 8 GB/s interface?"
details:
  realistic_solution: The correct approach calculates the total data transferred per inference after the
    4-bit compression. By packing two 4-bit weights into one 8-bit byte (which the Coral can then unpack
    for its INT8 pipeline), each parameter consumes 0.5 bytes of memory bandwidth. Dividing the total
    memory bandwidth by the per-inference memory footprint yields the maximum throughput.
  common_mistake: Candidates often forget to convert bits to bytes, miscalculating the per-parameter footprint.
    They may also wrongly assume the Coral TPU natively executes 4-bit math, missing that the 4-bit packing
    is solely a memory bandwidth optimization requiring INT8 unpacking.
  napkin_math: '1. Quantized parameter size = 4 bits = 0.5 bytes.

    2. Memory per inference = 32,000,000 params * 0.5 bytes/param = 16,000,000 bytes (16 MB).

    3. Available bandwidth = 8 GB/s = 8,000,000,000 bytes/s.

    4. Max inferences per second = 8,000,000,000 bytes/s / 16,000,000 bytes/inference = 500 inferences
    per second.'
