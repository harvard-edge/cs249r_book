title: Edge TPU Multi-Camera Batching Evaluation
scenario: You are deploying a retail analytics system using a Google Coral Edge TPU (4 TOPS INT8, 2W). The system ingests frames from 4 independent cameras, each operating at 30 FPS. The perception model is a lightweight CNN fully quantized to INT8.
question: Should you use static batching of 4 frames or sequential batch-1 processing to minimize latency while meeting 120 FPS?
details:
  realistic_solution: |
    Strategy B (Batch size 1) is the correct choice. The Coral Edge TPU compiler bakes the batch size into the model geometry, making dynamic batching impractical. More importantly, gathering 4 frames from independent 30 FPS cameras introduces significant waiting latency. The Edge TPU processes a lightweight INT8 model in just a few milliseconds, so sequential processing easily handles the required throughput while drastically reducing latency.
  common_mistake: |
    **The Pitfall:** Reflexively choosing static batching of 4 to maximize hardware utilization.
    **The Rationale:** Candidates assume edge accelerators operate exactly like data center GPUs, ignoring the synchronization delay required to gather a full batch from uncoordinated cameras.
    **The Consequence:** Introducing artificial buffering delays that ruin real-time latency SLAs.
  napkin_math: |
    * **Frame Arrival Rate:** 120 FPS total = 1 frame every 8.33 ms.
    * **Compute Time (Batch=1):** ~1.5 ms (6 GOPS model on 4 TOPS TPU) + 1 ms PCIe overhead = 2.5 ms.
    * **Strategy B (Batch=1) Latency:** 2.5 ms (Since 2.5 ms < 8.33 ms, no queue builds up).
    * **Strategy A (Batch=4) Wait Time:** Must wait 33.3 ms to collect 1 frame from each camera.
    * **Strategy A Compute Time:** (6 GOPS * 4) / 4000 = 6.0 ms + 2 ms PCIe = 8 ms.
    * **Strategy A Latency:** 33.3 ms + 8 ms = 41.3 ms.
    * **Result:** **Sequential batch-1 processing** reduces latency by ~94% while sustaining 120 FPS.
