title: The Efficient Transformer Paradox
scenario: Your autonomous driving team is evaluating two perception models for a critical 3D object detection
  task on a Jetson AGX Orin, which is limited to a 30W power budget and a 33ms (30 FPS) latency deadline.
details:
  realistic_solution: The core issue is the difference in **Arithmetic Intensity (AI)** between the two
    models, which determines whether they are compute-bound or memory-bound on the Orin's architecture.
    The system's performance is not just about the number of ops, but whether the hardware can be kept
    fed with data to execute those ops.
  common_mistake: 'The most common wrong answer is to blame software: ''The Transformer has unsupported
    ops that fall back to the CPU'' or ''The framework has high overhead for attention mechanisms.'' While
    potentially true, these miss the fundamental hardware physics. The problem isn''t about a few unsupported
    ops; it''s about the nature of the entire model''s architecture interacting with the memory system.'
  napkin_math: 'Model A: 500 GOps, 200 MB data. AI = 2500 Ops/Byte. Model B: 100 GOps, 500 MB data. AI
    = 200 Ops/Byte. Orin 30W Ridge Point = 150 TOPS / 204.8 GB/s = 732 Ops/Byte. Model A (2500 > 732)
    is compute-bound, so dropping power lowers TOPS and slows it down. Model B (200 < 732) is memory-bound
    and unaffected by lower TOPS.'
