title: The Efficient Transformer Paradox
scenario: Your autonomous driving team is evaluating two perception models for a critical 3D object detection task on a Jetson AGX Orin, which is limited to a 30W power budget and a 33ms (30 FPS) latency deadline.
question: Why can the 500-GOp/200MB model beat the 100-GOp/500MB model on a 30W Jetson Orin despite doing 5× more operations?
details:
  realistic_solution: The core issue is the difference in **Arithmetic Intensity (AI)** between the two models, which determines whether they are compute-bound or memory-bound on the Orin's architecture. The system's performance is not just about the number of ops, but whether the hardware can be kept fed with data to execute those ops.
  common_mistake: |
    **The Pitfall:** Blaming software or unsupported operations.
    **The Rationale:** Candidates often assume that "The Transformer has unsupported ops that fall back to the CPU" or "The framework has high overhead," missing the fundamental hardware physics and arithmetic intensity.
    **The Consequence:** Optimizing the wrong part of the stack (e.g., trying to rewrite custom kernels) instead of recognizing the model is fundamentally memory-bound.
  napkin_math: |
    *   Model A: 500 GOps, 200 MB data. AI = 500e9 / 200e6 = 2500 Ops/Byte.
    *   Model B: 100 GOps, 500 MB data. AI = 100e9 / 500e6 = 200 Ops/Byte.
    *   Orin 30W Ridge Point = 150 TOPS / 204.8 GB/s = ~732 Ops/Byte.
    *   Model A (2500 > 732) is compute-bound, so dropping power lowers TOPS and slows it down, but it efficiently uses available compute.
    *   Model B (200 < 732) is memory-bound and unaffected by lower TOPS, capped strictly by memory bandwidth.
    *   **Model A can execute faster because it is not starved for data, fully utilizing the 150 TOPS, whereas Model B stalls on memory reads.**
