title: Heuristic Priority Queuing for Edge Vision
scenario: An edge accelerator (26 TOPS) processes frames from 6 IP cameras. A round-robin scheduler drops frames equally during isolated motion bursts on a single camera.
question: Apply a dynamic queueing mechanism to minimize overall dropped frames of high-value events without upgrading hardware.
details:
  realistic_solution: Implement a priority queue coupled with a lightweight CPU-based motion detection heuristic (e.g., pixel-difference threshold). Frames exhibiting significant motion bypass the normal queue and are placed in a high-priority queue. Static frames are pushed to a low-priority queue or dropped outright. This redirects the fixed Hailo-8 compute strictly to information-dense frames.
  common_mistake: |
    **The Pitfall:** Simply increasing the overall queue buffer size to handle bursts.
    **The Rationale:** Applying generic web-server load balancing logic (buffering) to a hard real-time computer vision problem.
    **The Consequence:** Added latency causing real-time security footage to become stale, without solving the underlying compute bottleneck.
  napkin_math: |
    * **Compute Ratio**: 6 cameras / 1 accelerator.
    * **Standard Allocation**: Each camera receives 16.6% of compute time.
    * **Burst Logic**: During a motion event, if 1 camera needs 50% compute, the priority queue dynamically reallocates resources away from static cameras.
