title: Diagnosing Host Bottlenecks with Dataflow Accelerators
scenario: A computer vision pipeline runs an INT8 object detection model on a Hailo-8 accelerator (26
  TOPS at 2.5W). Standalone benchmarking showed the Hailo-8 could achieve over 500 FPS, but when integrated
  into the final edge device, throughput drops to 30 FPS and the host CPU is pinned at 100% utilization.
  Given the Hailo-8's specific architectural characteristics, diagnose the system-level bottleneck causing
  these symptoms.
details:
  realistic_solution: 'Because the Hailo-8 is a dataflow accelerator with no local external DRAM, it relies
    entirely on streaming data directly from host memory. The root cause is a host-bound bottleneck: the
    CPU is spending all its cycles on inefficient image preprocessing or standard memory copies instead
    of using zero-copy DMA buffers. This starves the accelerator of data, explaining both the 100% CPU
    utilization and the massive drop in inference throughput.'
  common_mistake: Candidates often assume the model was poorly compiled, that the INT8 quantization degraded
    performance, or that the 26 TOPS rating is purely theoretical, completely missing the architectural
    data-feeding constraints.
  napkin_math: An uncompressed 4K frame (3840x2160x3 bytes) is ~24.8 MB. At 30 FPS, this requires 744
    MB/s of data throughput. If the edge CPU performs standard memory copies instead of DMA to feed the
    Hailo-8 over PCIe, it must read and write this memory, consuming ~1.5 GB/s of host memory bandwidth.
    A low-power edge CPU will easily saturate handling this copy operation, meaning the 2.5W / 26 TOPS
    accelerator sits idle waiting for the host.
