title: The Federated Fleet's Financial Failure
scenario: You are the lead ML Systems Engineer for an automotive company's 'Driver Alert' system, which
  uses a camera to detect distracted driving. The system runs on an NVIDIA Jetson AGX Orin in each car.
  To preserve driver privacy and save on data costs, the company chose a Federated Learning (FL) approach
  over uploading raw video to the cloud.
question: "How should you evaluate the true TCO of the FL driver-alert system, including failure-mode costs?"
details:
  realistic_solution: 'The most significant cost by far is the $500,000 write-off from the failed A/B
    test. This single event is an order of magnitude larger than the projected 6-month operational costs
    for either data transfer or on-device power consumption. The root cause is systemic: FL''s reliance
    on a distributed, unreliable fleet introduces novel risks like ''straggler bias,'' where a non-representative
    subset of devices contributes to the final model. This leads to a low-quality, biased model that fails
    in production, incurring massive downstream costs (recalls, re-training, loss of customer trust).
    The primary economic lesson is that the TCO of an ML system must include the financial risk of its
    specific failure modes, not just direct hardware and operational expenses.'
  common_mistake: Engineers often focus on the direct, line-item operational costs like data transmission
    or power consumption, which are easy to calculate. They forget to account for the second-order, systemic
    costs introduced by a new paradigm. In federated learning, the cost of managing an unreliable, heterogeneous
    fleet—and the financial impact of model failures caused by issues like stragglers or non-IID data—often
    dwarfs the direct operational expenses.
  napkin_math: '**1. On-Device Power Cost (6 months):** Training once per week on Jetson AGX Orin (60W
    TDP). Training time per round: ~30 min. Energy per round: 60W × 1800s = 108 kJ = 0.03 kWh. Fleet:
    10,000 vehicles × 26 rounds/6 months × 0.03 kWh = 7,800 kWh. At $0.12/kWh: ~$936 power cost over 6
    months. **2. Model upload cost per round:** 50 MB gradient × 10,000 vehicles × 26 rounds = 13,000
    GB. At $0.09/GB: ~$1,170. **3. Total operational costs (6 months): ~$2,106. The $500,000 write-off
    from the failed A/B test is 237x larger than 6 months of operational costs.**'
  options:
  - The on-device training is consuming too much power, leading to high electricity costs and battery
    degradation concerns.
  - The daily cellular data uploads of model weights are exorbitantly expensive.
  - A single model failure event, caused by 'straggler bias' inherent to the FL approach, cost more than
    all other operational expenses.
  - The hardware is inefficient; choosing a lower-power edge accelerator would have significantly reduced
    costs.
  correct_index: 2
