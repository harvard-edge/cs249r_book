title: The Federated Fleet's Financial Failure
scenario: You are the lead ML Systems Engineer for an automotive company's 'Driver Alert' system, which uses a camera to detect distracted driving. The system runs on an NVIDIA Jetson AGX Orin in each car. To preserve driver privacy and save on data costs, the company chose a Federated Learning (FL) approach over uploading raw video to the cloud.
question: What is the most accurate evaluation of the true Total Cost of Ownership (TCO) of the FL driver-alert system, including failure-mode costs?
details:
  realistic_solution: The catastrophic $500,000 write-off is the true dominant factor of the Total Cost of Ownership. Federated Learning on edge fleets inherently introduces statistical risks like straggler bias, where devices dropping offline skew the final global gradient. TCO calculations for edge FL must extend beyond operational line items (cellular data, compute power) to mathematically price the risk of deploying structurally biased, lower-quality models into safety-critical environments.
  common_mistake: |
    **The Pitfall:** Focusing only on direct, line-item operational costs.
    **The Rationale:** Engineers easily calculate data transmission or power consumption but forget the systemic risks of distributed training.
    **The Consequence:** The cost of managing a heterogeneous fleet—and the financial impact of model failures caused by issues like straggler bias—is ignored, leading to vastly underestimated TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 vehicles.
    - Rounds: 26 rounds (6 months).
    - Gradient upload: 50 MB.
    - Write-off cost: $500,000.

    **Calculations:**
    - On-Device Power (6 mo): 10,000 * 26 * 0.03 kWh * $0.12/kWh ≈ $936.
    - Upload cost (6 mo): 50 MB * 10,000 * 26 = 13,000 GB * $0.09/GB ≈ $1,170.
    - Total operational cost: $2,106.

    **Conclusion & Interpretation:**
    - **Result: $500,000 failure cost (Systemic Risk Bound)**. The system failure penalty from straggler bias dwarfed the $2,100 operational cost by >200x, proving that TCO must index risk.
  options:
  - The on-device training is consuming too much power, leading to high electricity costs and battery degradation concerns.
  - The daily cellular data uploads of model weights are exorbitantly expensive.
  - A single model failure event, caused by 'straggler bias' inherent to the FL approach, cost more than all other operational expenses.
  - The hardware is inefficient; choosing a lower-power edge accelerator would have significantly reduced costs.
  correct_index: 2
