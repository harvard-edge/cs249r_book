title: Analyzing Thermal Throttling on Google Coral Edge TPU
scenario: We are deploying an INT8 object detection model on a Google Coral Edge TPU (USB form factor)
  inside an enclosed outdoor camera housing. The Coral Edge TPU consumes 2W of power while delivering
  up to 4 TOPS. During lab testing at an ambient temperature of 25°C, the model runs consistently at 30
  FPS. However, when deployed outdoors on a hot day with an ambient temperature of 40°C, the system starts
  at 30 FPS but after 15 minutes, the throughput drops sharply and stabilizes at 15 FPS. Explain why this
  happens and analyze the thermal tradeoffs occurring within the enclosed system.
details:
  realistic_solution: The drop in FPS is caused by dynamic thermal throttling. The 2W of power drawn by
    the Coral Edge TPU generates heat that cannot adequately escape the enclosed housing, raising the
    internal temperature. Upon reaching its critical thermal junction threshold, the TPU's firmware automatically
    lowers the clock frequency to reduce power consumption and heat generation. This establishes a new
    thermal equilibrium with the 40°C ambient environment, but at the cost of halving the inference speed.
  common_mistake: Candidates often assume the performance drop is due to software issues like memory leaks,
    network latency, or OS scheduling, rather than physical environmental factors. They may fail to recognize
    that even a low 2W power draw generates trapped heat in a sealed enclosure, forcing the hardware to
    protect itself.
  napkin_math: 'Initial state: 4 TOPS at 2W yields 30 FPS (Compute per frame = 4 / 30 = 0.133 TOPs/frame).
    Throttled state: Performance drops to 15 FPS. Required compute at 15 FPS = 15 FPS * 0.133 TOPs/frame
    = ~2 TOPS. This indicates the system throttled the compute capacity by 50%. Assuming dynamic power
    scales roughly linearly with frequency, the TPU reduced its heat dissipation from 2W to approximately
    1W to safely operate within the hotter 40°C ambient conditions.'
