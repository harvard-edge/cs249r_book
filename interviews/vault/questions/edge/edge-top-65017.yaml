title: Power Island Gating Across Chiplet Dies for Edge Battery Life
scenario: An edge AI device with a two-die chiplet (CPU die + NPU die) needs to achieve 72-hour battery
  life. The NPU die draws 3W during inference and 50mW standby. The device runs inference 8 hours/day.
  Current battery is 10Wh. Design a power gating strategy.
details:
  realistic_solution: 'Power states: (1) Active inference: NPU on, die-to-die link active — 3W NPU + 0.2W
    link PHY = 3.2W; (2) Ready standby: NPU clock-gated, die-to-die link in low-power state — 50mW NPU
    + 20mW link = 70mW; (3) Deep sleep: NPU fully power-gated, die-to-die link off, context saved to DRAM
    — 2mW NPU leakage + 0mW link = 2mW. Wake-up from deep sleep: ~10ms (link re-initialization + NPU context
    restore). Acceptable if inference requests have >10ms lead time. Power budget: 8h*3.2W + 8h*0.07W
    + 8h*0.002W = 25.6 + 0.56 + 0.016 = 26.2 Wh. Exceeds 10Wh battery. Solution: reduce active duty cycle
    or use deeper sleep during brief idle windows.'
  common_mistake: Keeping the die-to-die link alive during NPU standby. The die-to-die PHY (SerDes or
    LVDS) can consume 100-500mW continuously for link maintenance. For a device that's idle 67% of the
    time, always-on die-to-die link can dominate standby power budget.
  napkin_math: 'Target: 10Wh / 72h = 139mW average budget. Inference: 8h at 3.2W = 25.6Wh → 25.6/72 =
    355mW average from inference alone — 2.5x over budget. Must either: reduce inference power to 1.25W
    (aggressive NPU power optimization), or reduce inference hours to 2.4h, or increase battery to 26Wh.
    Most practical: 3W NPU + aggressive sleep = 25.6 + 64h*2mW = 25.7Wh → need 26Wh battery.'
