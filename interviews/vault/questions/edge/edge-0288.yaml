title: The FP16 vs. INT8 Energy Tax
scenario: 'You are optimizing a perception model on an automotive-grade edge device. To reduce power consumption, you quantize the model''s compute-bound layers from FP16 to INT8 precision.'
question: 'Roughly how much more energy does a single FP16 MAC (Multiply-Accumulate) operation consume compared to an INT8 MAC?'
details:
  realistic_solution: 'An FP16 operation consumes roughly 5 times more energy than an INT8 operation. The physical constants show that FP32 math uses ~3.4x the energy of FP16, and ~18x the energy of INT8. The relative factor is the ratio of these two numbers, which is approximately 5.3x.'
  common_mistake: |
    **The Pitfall:** Conflating memory savings with energy savings.
    **The Rationale:** Engineers know INT8 uses half the memory of FP16 (1 byte vs. 2 bytes) and incorrectly assume the operational energy savings are also exactly 2×. They forget that operational energy scales with the complexity of the underlying digital logic (e.g., multiplier size).
    **The Consequence:** Underestimating the power savings of INT8 quantization, potentially leading to over-speccing the hardware or power supply.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 math uses ~3.4x the energy of FP16.
    - FP32 math uses ~18x the energy of INT8.

    **Calculations:**
    - Energy ratio (FP16 / INT8): 18 / 3.4 = 5.29x.

    **Conclusion & Interpretation:**
    - **Result: FP16 consumes approximately 5.3x more energy than INT8 (Power-Bound)**.
  options:
  - 'Roughly 2× more energy'
  - 'Roughly 5× more energy'
  - 'Roughly 18× more energy'
  - 'The energy difference is negligible'
