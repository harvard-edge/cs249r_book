title: Calculate memory bound latency for INT8 inference on Cloud AI 100
scenario: You are deploying an 8-billion parameter LLM quantized to INT8 on an inference accelerator. The model is memory bandwidth bound during the decoding phase. The accelerator has a memory bandwidth of 136 GB/s.
question: What is the theoretical minimum batch-1 single-token generation latency for the 8B INT8 model at 136 GB/s memory bandwidth?
details:
  realistic_solution: For autoregressive decoding at batch size 1, every parameter must be loaded from memory to generate a single token. The compute is mostly idle waiting for weights. Therefore, the minimum latency is determined solely by the time it takes to read all the weights from the memory.
  common_mistake: |
    **The Pitfall:** Calculating latency using the compute capacity.
    **The Rationale:** Candidates assume compute is the bottleneck without verifying the arithmetic intensity required to saturate the compute units given the available memory bandwidth.
    **The Consequence:** Severely underestimates latency and overestimates throughput for memory-bound LLM decoding tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 8 billion parameters in INT8 = 8 GB.
       - Memory bandwidth: 136 GB/s.
       - Autoregressive decoding at batch size 1.
    2. **Calculations:**
       - Minimum latency per token = (Data to load) / (Memory Bandwidth).
       - Latency = 8 GB / 136 GB/s = 0.0588 seconds.
       - Latency in ms = 58.8 ms per token.
    3. **Conclusion & Interpretation:**
       - **The minimum theoretical latency is 58.8 ms per token. Result: Memory-Bandwidth Bound.**
