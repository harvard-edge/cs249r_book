title: The ADAS Pipeline Frame Drop
scenario: You are an ML Systems Engineer on an ADAS perception team using a Jetson AGX Orin. Your new LiDAR segmentation model is failing its 33ms end-to-end latency budget. Profiling shows one custom layer is the main offender, taking 22ms to execute. For a single inference, this layer performs 1.5 billion INT8 operations and requires reading 800 MB of data from memory.
question: Using roofline analysis, is the 22ms custom LiDAR layer compute-bound or memory-bound on the 15W Orin?
details:
  realistic_solution: Execute a Roofline mapping. Calculate Arithmetic Intensity (AI) and cross-reference with the hardware ridge point. Re-architecting via kernel fusion is the only viable recovery.
  common_mistake: |
    **The Pitfall:** Mistaking high latency for a compute bottleneck.
    **The Rationale:** Engineers assume a slow layer needs a more powerful GPU, ignoring that edge performance is often dictated by the "Memory Wall" (DRAM bandwidth).
    **The Consequence:** Throwing more compute power at a memory-bound layer, yielding zero latency improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HW: 70 TOPS INT8 compute, 102.4 GB/s Memory Bandwidth
       - Layer: 1.5 GOPs compute, 0.8 GB data
    2. **Calculations:**
       - Layer AI = 1.5 GOPs / 0.8 GB = 1.875 Ops/Byte
       - HW Ridge Point = 70 TOPS / 102.4 GB/s = 683.5 Ops/Byte
       - Min Mem Latency = 0.8 GB / 102.4 GB/s = 7.8ms
    3. **Conclusion & Interpretation:**
       - **Result: Deeply Memory-Bound.** 1.875 Ops/Byte << 683.5 Ops/Byte ridge point.
  options:
  - The layer is compute-bound; 1.5 G-Ops is too much work for the 15W power profile. Increasing the Orin's power budget to 60W is the only solution.
  - The layer's performance is limited by PCIe bus contention with other peripherals in the ADAS system.
  - The layer is memory-bound. Its arithmetic intensity of 1.875 Ops/Byte is far below the Orin's roofline, and the 22ms latency is driven by poor memory access patterns given the theoretical minimum time of ~7.8ms to read 800 MB over the 102.4 GB/s bus.
  - The layer is compute-bound. The INT8 operations are likely not mapping efficiently to the Orin's Tensor Cores, leading to low TOPS utilization. A custom CUDA kernel is needed.
  correct_index: 2
