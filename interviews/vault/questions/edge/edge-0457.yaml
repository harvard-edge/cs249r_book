title: The ADAS Pipeline Frame Drop
scenario: You are an ML Systems Engineer on an ADAS perception team using a Jetson AGX Orin in its 15W power configuration. Your new LiDAR segmentation model is failing its 33ms (30 FPS) end-to-end latency budget. Profiling shows one custom layer is the main offender, taking 22ms to execute. For a single inference, this layer performs 1.5 billion INT8 operations and requires reading 800 MB of data from the Orin's LPDDR5 memory. In the 15W mode, the Orin provides approximately 70 TOPS INT8 throughput and 102.4 GB/s memory bandwidth.
question: Using roofline analysis, is the 22ms custom LiDAR layer compute-bound or memory-bound on the 15W Orin?
details:
  realistic_solution: The layer is severely memory-bound. Its performance is limited by memory bandwidth, not the GPU's compute capacity. The correct approach is to calculate the layer's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. An AI far below the ridge point indicates a memory bottleneck. The theoretical latency, based on memory bandwidth, will confirm the diagnosis. The only way to fix this is to re-architect the layer to reduce data movement (e.g., operator fusion, different data layout) because throwing more power or compute at it won't make the memory bus faster.
  common_mistake: |
    **The Pitfall:** Mistaking high latency for a compute bottleneck.
    **The Rationale:** Engineers assume a slow layer needs a more powerful GPU, ignoring that edge performance is often dictated by the "Memory Wall" (DRAM bandwidth).
    **The Consequence:** Throwing more compute power at a memory-bound layer, yielding zero latency improvement.
  napkin_math: |
    - **Arithmetic Intensity (AI):** 1.5 G-Ops / 0.8 GB = 1.875 Ops/Byte.
    - **Ridge Point (15W):** 70 TOPS / 102.4 GB/s = 683.5 Ops/Byte.
    - **Comparison:** AI (1.875) << Ridge Point (683.5). The layer is **deeply memory-bound**.
    - **Compute Latency:** 1.5 G-Ops / 70 TOPS = 0.021ms (negligible).
    - **Memory Latency:** 0.8 GB / 102.4 GB/s = **7.8ms theoretical minimum**.
    - **Diagnosis:** Gap between 7.8ms theoretical and 22ms actual indicates severe cache thrashing.
  options:
  - The layer is compute-bound; 1.5 G-Ops is too much work for the 15W power profile. Increasing the Orin's power budget to 60W is the only solution.
  - The layer's performance is limited by PCIe bus contention with other peripherals in the ADAS system.
  - The layer is memory-bound. Its arithmetic intensity of 1.875 Ops/Byte is far below the Orin's roofline, and the 22ms latency is driven by poor memory access patterns given the theoretical minimum time of ~7.8ms to read 800 MB over the 102.4 GB/s bus.
  - The layer is compute-bound. The INT8 operations are likely not mapping efficiently to the Orin's Tensor Cores, leading to low TOPS utilization. A custom CUDA kernel is needed.
  correct_index: 2
