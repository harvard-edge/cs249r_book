title: The ADAS Pipeline Frame Drop
scenario: You are an ML Systems Engineer on an ADAS perception team using a Jetson AGX Orin in its 15W
  power configuration. Your new LiDAR segmentation model is failing its 33ms (30 FPS) end-to-end latency
  budget. Profiling shows one custom layer is the main offender, taking 22ms to execute. For a single
  inference, this layer performs 1.5 billion INT8 operations and requires reading 800 MB of data from
  the Orin's LPDDR5 memory. In the 15W mode, the Orin provides approximately 70 TOPS INT8 throughput and
  102.4 GB/s memory bandwidth. Diagnose this layer's performance bottleneck using a roofline analysis.
question: "Using roofline analysis, is the 22ms custom LiDAR layer compute-bound or memory-bound on the 15W Orin?"
details:
  realistic_solution: The layer is severely memory-bound. Its performance is limited by memory bandwidth,
    not the GPU's compute capacity. The correct approach is to calculate the layer's Arithmetic Intensity
    (AI) and compare it to the hardware's ridge point. An AI far below the ridge point indicates a memory
    bottleneck. The theoretical latency, based on memory bandwidth, will confirm the diagnosis. The only
    way to fix this is to re-architect the layer to reduce data movement (e.g., operator fusion, different
    data layout) because throwing more power or compute at it won't make the memory bus faster.
  common_mistake: Engineers often mistake any slowdown for a compute bottleneck, assuming that if latency
    is high, the processor must be working hard. They might suggest using a more powerful GPU or increasing
    the power budget. This ignores that for edge devices, performance is often dictated by memory bandwidth
    (the 'Memory Wall'), not peak TOPS. The processor spends most of its time idle, waiting for data from
    relatively slow DRAM.
  napkin_math: '1. **Calculate Arithmetic Intensity (AI):** AI = Compute / Memory Traffic = 1.5 G-Ops
    / 0.8 GB = 1.875 Ops/Byte. 2. **Calculate Ridge Point at 15W:** Ridge Point = Peak Compute / Peak
    Bandwidth = 70 TOPS / 102.4 GB/s = 683 Ops/Byte. 3. **Compare:** AI (1.875) << Ridge Point (683).
    The layer is deeply memory-bound. 4. **Calculate memory-bound theoretical latency:** 0.8 GB / 102.4
    GB/s = 7.8ms. 5. **Calculate compute-bound theoretical latency:** 1.5 G-Ops / 70 TOPS = 0.021ms (negligible).
    6. **Diagnosis:** The theoretical minimum from memory bandwidth is 7.8ms, but measured is 22ms — nearly
    3x worse. This gap indicates poor memory access patterns (strided access, cache thrashing) on top
    of an already memory-bound workload. The fix is to re-architect the layer to improve data locality:
    fuse operators to avoid round-trips to DRAM, change the data layout for sequential access, or tile
    the computation to fit in L2 cache.'
  options:
  - The layer is compute-bound; 1.5 G-Ops is too much work for the 15W power profile. Increasing the Orin's
    power budget to 60W is the only solution.
  - The layer's performance is limited by PCIe bus contention with other peripherals in the ADAS system.
  - The layer is memory-bound. Its arithmetic intensity of 1.875 Ops/Byte is far below the Orin's roofline,
    and the 22ms latency is driven by poor memory access patterns given the theoretical minimum time of
    ~7.8ms to read 800 MB over the 102.4 GB/s bus.
  - The layer is compute-bound. The INT8 operations are likely not mapping efficiently to the Orin's Tensor
    Cores, leading to low TOPS utilization. A custom CUDA kernel is needed.
  correct_index: 2
