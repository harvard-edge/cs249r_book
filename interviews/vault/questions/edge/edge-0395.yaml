title: The INT8 Energy Dividend (edge-0395)
scenario: You're an engineer on an autonomous vehicle team, trying to reduce the power draw of a perception
  model running on a device like a Jetson AGX Orin. Your model currently uses FP16 precision. To meet
  the thermal budget, your colleague suggests quantizing the model to INT8. State the approximate energy
  reduction per operation you can expect from this change.
details:
  realistic_solution: The energy consumed by a compute operation is determined by the switching energy
    in the silicon logic, which does not scale linearly with bit width. According to the 'Invariants'
    table, an FP32 operation costs ~3.4x more energy than an FP16 operation, and ~18x more than an INT8
    operation. Therefore, the relative energy saving of INT8 over FP16 is the ratio of these two factors,
    which is approximately 5.3x.
  common_mistake: Engineers often mistakenly assume energy savings are directly proportional to the reduction
    in bit-width (e.g., 16-bit to 8-bit implies a 2x saving). Another common error is to misremember the
    ratio, confusing the FP16-to-INT8 relationship with the much larger FP32-to-INT8 one.
  napkin_math: Energy_Ratio = Energy_FP32_vs_INT8 / Energy_FP32_vs_FP16
  options:
  - ~2×
  - ~18×
  - ~5×
  - ~3.4×
  correct_index: 2
