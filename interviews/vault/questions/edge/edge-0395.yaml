title: The INT8 Energy Dividend (edge-0395)
scenario: You're an engineer on an autonomous vehicle team, trying to reduce the power draw of a perception model running on an edge device. Your model currently uses FP16 precision. To meet the thermal budget, your colleague suggests quantizing the model to INT8. State the approximate energy reduction per operation you can expect from this change.
question: What approximate per-operation energy reduction should you expect when quantizing from FP16 to INT8?
details:
  realistic_solution: The energy consumed by a compute operation is determined by the switching energy in the silicon logic, which does not scale linearly with bit width. According to the 'Invariants' table, an FP32 operation costs ~3.4x more energy than an FP16 operation, and ~18x more than an INT8 operation. Therefore, the relative energy saving of INT8 over FP16 is the ratio of these two factors, which is approximately 5.3x.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are directly proportional to the reduction in bit-width (e.g., 16-bit to 8-bit implies exactly a 2x saving).
    **The Rationale:** Engineers confuse data size reduction ratios with the non-linear physics of silicon switching energy.
    **The Consequence:** Wildly miscalculating the thermal envelope and power budget of the edge deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 to FP16 energy ratio = ~3.4x savings.
       - FP32 to INT8 energy ratio = ~18x savings.
    2. **Calculations:**
       - FP16 to INT8 Energy Ratio = Energy_FP32_vs_INT8 / Energy_FP32_vs_FP16.
       - 18 / 3.4 ≈ 5.29.
    3. **Conclusion & Interpretation:**
       - **Result: ~5.3x energy reduction.** Moving from FP16 to INT8 yields a 5.3x improvement in energy per operation, alleviating the **Power-Bound** constraint.
  options:
  - ~2×
  - ~18×
  - ~5×
  - ~3.4×
  correct_index: 2
