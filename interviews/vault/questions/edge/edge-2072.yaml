title: Edge Data Integrity Real-time Validation
scenario: Autonomous robots process 900 MB/s of sensor data on a Jetson Orin for real-time anomaly detection. Data integrity schemas must be enforced within 50ms.
question: How would you design a real-time data quality system on Jetson Orin that enforces schemas, drift gates, and anomaly checks within 50ms and 60W?
details:
  realistic_solution: Implement a lightweight, modular validation pipeline using pre-compiled FlatBuffers/Protobufs for minimal schema overhead. Quality gates should use zero-copy buffers and run an INT8 Isolation Forest or shallow autoencoder explicitly delegated to the DLA.
  common_mistake: |
    **The Pitfall:** Over-designing with cloud-centric validation patterns (Kafka/Spark streams) or massive deep learning anomaly models.
    **The Rationale:** Engineers port enterprise data pipelines to the edge without accounting for extreme memory bandwidth limitations.
    **The Consequence:** Validation tasks consume the entire compute and bandwidth budget, causing dropped packets and exceeding 60W.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50ms budget, 60W power.
    - Ingestion = 900 MB/s.
    - CPU checking costs 1000 cycles/KB.

    **Calculations:**
    - 50ms window = 45 MB of data.
    - CPU check = 45M cycles/50ms = 0.9 GHz sustained (heavy load).
    - INT8 model at 100 ops/byte = 900 MB/s * 100 ops = 90 GOPS.

    **Conclusion & Interpretation:**
    - **Result: 90 GOPS offloaded overhead (CPU-Compute-Bound)**. Bypassing the CPU and offloading to the DLA prevents CPU starvation while maintaining schema integrity.
