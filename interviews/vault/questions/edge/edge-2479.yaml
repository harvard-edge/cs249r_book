title: Dynamic Model Multiplexing
scenario: A factory edge device using a Hailo-8 (26 TOPS, 2.5W) must serve 5 different
  defect-detection models based on the current product line. Swapping models naively
  takes 2 seconds.
question: Create a dynamic model multiplexing infrastructure that ensures zero downtime
  during product line switchovers while maintaining the 2.5W power envelope.
details:
  realistic_solution: Implement a cascaded shadow-buffer architecture. Maintain a
    tiny router model in SRAM. Pre-load the incoming product line's weights into a
    background DMA buffer right before the switchover, enabling a pointer swap that
    takes milliseconds rather than seconds.
  common_mistake: Deploying all 5 models concurrently into memory, which immediately
    exceeds local memory limits and thermal envelopes.
  napkin_math: 2s swap time = 60 missed frames at 30 FPS. Pre-loading reduces this
    to a 5ms pointer swap (0 frames missed).
