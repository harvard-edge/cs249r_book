title: Dynamic Model Multiplexing
scenario: A factory edge device using a Hailo-8 must serve 5 different defect-detection models based on the current product line. Swapping models naively takes 2 seconds.
question: Create a dynamic model multiplexing infrastructure that ensures zero downtime during product line switchovers while maintaining the 2.5W power envelope.
details:
  realistic_solution: Implement a cascaded shadow-buffer architecture. Loading all 5 models into SRAM simultaneously violates the strict 2.5W memory power envelope. Instead, maintain a lightweight router model in memory. While the current model infers, asynchronously pre-load the incoming model's weights into a background DMA buffer just prior to the physical switchover. The active context switch then becomes a sub-millisecond pointer swap.
  common_mistake: |
    **The Pitfall:** Deploying all 5 models concurrently into memory.
    **The Rationale:** Candidates attempt to solve the swap latency by keeping all models "hot".
    **The Consequence:** This immediately exceeds local memory limits and the strict 2.5W thermal envelope of the accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - Swapping latency: 2 seconds.
    - Frame rate: 30 FPS.
    - Power limit: 2.5W (prevents loading all models).

    **Calculations:**
    - Naive dropped frames: 2 seconds * 30 FPS = 60 frames.
    - Shadow-buffer pointer swap time: 5 ms.
    - Shadow-buffer dropped frames: 5 ms < 33.3 ms = 0 frames.

    **Conclusion & Interpretation:**
    - **Result: 0 dropped frames (Context Switch Latency Bound)**. Background DMA transfers decouple the heavy memory load operations from the critical real-time execution path.
