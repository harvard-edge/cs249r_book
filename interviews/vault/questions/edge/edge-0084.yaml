title: The Brownout Weight Corruption
scenario: Your solar-powered wildlife monitoring station (Google Coral Dev Board, Edge TPU, 1 GB RAM)
  operates in a remote savanna. During cloudy periods, the 12V battery drops to 10.8V — below the voltage
  regulator's dropout threshold — for 200–500ms before the MPPT controller compensates. After these brownouts,
  the device continues running but produces wildly wrong detections — classifying elephants as vehicles,
  missing animals entirely. A full reboot fixes it. What happened to the model, and how do you prevent
  this?
details:
  realistic_solution: 'The brownout caused bit flips in DRAM where the model weights are stored. When
    the supply voltage drops below the DRAM''s minimum operating voltage (typically 1.1V for LPDDR4, derived
    from the 12V rail through regulators), the DRAM cells can''t maintain their charge correctly. Some
    bits flip — a weight value of 0.0312 (INT8: 8) becomes 0.527 (INT8: 135) if bit 7 flips. The model
    architecture is intact, the inference engine runs correctly, but it''s computing with corrupted weights
    — producing confident but meaningless outputs.'
  common_mistake: '"The Edge TPU crashed and needs a reboot." The device didn''t crash — it''s still running
    and producing outputs. A crash would be easier to detect and recover from.'
  napkin_math: 'Model size in DRAM: 4 MB = 32 Mbit. Probability of at least one bit flip during a 300ms
    brownout: depends on voltage margin, but empirically ~10⁻⁴ per Mbit at marginal voltage. For 32 Mbit:
    ~0.3% chance per brownout event. Brownouts per cloudy day: ~5. Probability of corruption per cloudy
    day: 1 - (1 - 0.003)⁵ ≈ 1.5%. Over a 90-day rainy season: ~1.35 corruption events expected per device.
    With 500 devices: ~675 silent corruption events per season. Voltage supervisor + CRC check cost: 0.50
    + 0 (software) = 0.50/device. Cost of undetected wrong outputs in a conservation context: missed poaching
    alerts, corrupted population surveys — potentially irreversible.'
