title: The Brownout Weight Corruption
scenario: Your solar-powered wildlife monitoring station (Google Coral Dev Board, Edge TPU, 1 GB RAM) operates in a remote savanna. During cloudy periods, the 12V battery drops to 10.8V — below the voltage regulator's dropout threshold — for 200–500ms before the MPPT controller compensates. After these brownouts, the device continues running but produces wildly wrong detections — classifying elephants as vehicles, missing animals entirely. A full reboot fixes it.
question: What caused the model to produce confident but meaningless outputs after the brownout, and how do you prevent it?
details:
  realistic_solution: 'The brownout caused bit flips in DRAM where the model weights are stored. When the supply voltage drops below the DRAM''s minimum operating voltage, the DRAM cells can''t maintain their charge. Some bits flip — a weight value of 0.0312 (INT8: 8) becomes 0.527 (INT8: 135) if bit 7 flips. The model architecture is intact, the inference engine runs correctly, but it''s computing with corrupted weights. Prevention requires a voltage supervisor reset or CRC integrity checks on weights.'
  common_mistake: |
    **The Pitfall:** Assuming the device crashed.
    **The Rationale:** Candidates often state, "The Edge TPU crashed and needs a reboot," without recognizing that a crashed device halts execution completely, whereas this device is actively producing outputs.
    **The Consequence:** Implementing a software watchdog that fails to detect the silent mathematical corruption, leading to prolonged transmission of corrupted data.
  napkin_math: |
    1. **Model Size:** 4 MB = 32 Mbit.
    2. **Bit Flip Probability:** ~10⁻⁴ per Mbit during marginal voltage brownout.
    3. **Corruption per Event:** 32 Mbit * 10⁻⁴ = 0.0032 (0.32% chance).
    4. **Events per Day:** ~5 brownouts.
    5. **Probability per Day:** 1 - (1 - 0.0032)⁵ ≈ 1.59% chance of corruption.
    **Result: Across a large fleet, silent data corruption is statistically inevitable under these power conditions.**
