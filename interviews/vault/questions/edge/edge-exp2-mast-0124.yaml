title: Hybrid On-Device FL using Hailo-8 Dataflow Accelerator
scenario: You are designing a cross-device federated learning system for smart city cameras to continuously
  update a pedestrian detection model based on non-IID local data. The edge nodes are equipped with a
  low-power host CPU and a Hailo-8 accelerator (26 TOPS INT8, 2.5W, dataflow architecture with no local
  DRAM, streaming directly from host memory). Since the Hailo-8 is an INT8 inference-only dataflow engine,
  you must synthesize a novel architecture that leverages it to accelerate the local FL training rounds
  without stalling the host CPU or exceeding strict edge power budgets. Design the end-to-end local training
  pipeline, addressing how to handle backpropagation, PCIe streaming, and the weight updates.
details:
  realistic_solution: The optimal architecture freezes the model backbone and uses the Hailo-8 purely
    as a highly efficient feature extractor (forward pass only). The host CPU streams input image batches
    to the Hailo-8 and receives low-dimensional INT8 embedding vectors back into host memory. The host
    CPU then performs a lightweight FP32 backward pass only on the final classification or bounding box
    regression heads to compute local gradients. This hybrid approach keeps the heavy lifting on the 26
    TOPS accelerator at 2.5W while minimizing host CPU workload and PCIe bandwidth utilization.
  common_mistake: Candidates often assume they can run standard full-network backpropagation on the Hailo-8,
    failing to recognize that it is strictly an INT8 dataflow inference accelerator without local DRAM.
    Alternatively, they propose streaming all intermediate activations back to the host CPU for backprop,
    which severely bottlenecks the PCIe bus and overwhelms the low-power CPU.
  napkin_math: For a batch of 32 images (224x224x3, ~150KB each), the host streams 4.8MB to the Hailo-8.
    Over a typical PCIe Gen3 x4 link (~3.9 GB/s), this transfer takes ~1.2ms. The forward pass of a 1-GOP
    backbone on the 26 TOPS Hailo-8 takes ~1.2ms (32 GOPs / 26 TOPS). The Hailo-8 streams back 32 INT8
    vectors of 1024-dim (32KB total), taking <0.1ms. The host CPU computes gradients for a small dense
    head (e.g., 1024x10 weights, ~10K MACs), taking <1ms. Total time per batch is ~3ms, meaning a local
    FL epoch of 1,000 batches completes in ~3 seconds while running at the 2.5W power envelope of the
    accelerator.
