title: Orin Edge Llama Batch Cache
scenario: A Jetson AGX Orin is serving Llama-3-8B locally at batch size 8 for an edge
  customer service kiosk. The model uses 32 layers, 8 KV heads, and 128 head dim at
  FP16.
question: Analyze the KV cache growth rate per token and calculate the memory consumed
  at a context length of 2048 tokens.
visual:
  kind: svg
  path: edge-2270.svg
  alt: Bar chart showing memory linear growth reaching 2GB at 2048 tokens.
  caption: KV Cache growth by sequence length.
details:
  realistic_solution: 'Per token across the batch: $2 \times 32 \times 8 \times 128
    \times 8 \times 2$ bytes $= 1,048,576$ bytes (1 MB) per step. For 2048 tokens,
    the cache grows to $1$ MB $\times 2048 = 2$ GB. The Orin''s RAM can easily handle
    this, but bandwidth overhead will slow decoding.'
  common_mistake: Calculating the cache for a single sequence and forgetting to scale
    by the active batch size.
  napkin_math: 2 * 32 * 8 * 128 * 8 (batch) * 2B = 1 MB/token. 1 MB * 2048 = 2 GB.
