title: 'The Edge Memory Diet: Quantization Fundamentals'
scenario: You're an engineer on an autonomous driving team deploying a perception model to a production
  vehicle using an NVIDIA Jetson AGX Orin. Your object detection model has 15 million parameters and is
  currently stored in FP16 format, occupying too much memory. To fix this, you're converting the model's
  weights to INT8. Explain the new memory footprint of the weights after quantization.
details:
  realistic_solution: An INT8 data type uses exactly 1 byte (8 bits) to store each value. For a model
    with 15 million parameters, the total memory required for the weights is simply 15 million parameters
    multiplied by 1 byte per parameter. This yields 15 MB, a 50% reduction in memory footprint compared
    to the original 30 MB FP16 model. This saving is critical for deploying large models on memory-constrained
    edge devices.
  common_mistake: The most common mistake is to forget the byte-width of the data types. Engineers often
    misremember or confuse the sizes, either calculating using the original FP16 size (2 bytes/param)
    or the FP32 size (4 bytes/param), leading to a 2x or 4x overestimation. Another error is confusing
    bits and bytes, for example by incorrectly dividing the memory size by 8.
  napkin_math: 'Initial FP16 memory: 15,000,000 parameters x 2 bytes/parameter = 30,000,000 bytes = 30
    MB. | New INT8 memory: 15,000,000 parameters x 1 byte/parameter = 15,000,000 bytes = 15 MB. | Memory
    Reduction: 30 MB - 15 MB = 15 MB (50% savings).'
  options:
