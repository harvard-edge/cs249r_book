title: Audio Stream Pipeline for Coral Edge TPU
scenario: 'We are deploying an always-on anomaly detection system for industrial maintenance using a Google
  Coral Edge TPU (USB form factor). The system ingests uncompressed 48kHz audio streams from 4 concurrent
  microphones in real-time. The predictive model expects mel-spectrogram features as input, which must
  be quantized to INT8 to utilize the Coral''s 4 TOPS INT8 compute capacity. You must evaluate two real-time
  data ingestion designs: (A) compute mel-spectrograms on the host CPU, quantize to INT8, and stream the
  features to the Edge TPU, or (B) stream raw INT16 audio directly to the Edge TPU via USB and compute
  the mel-spectrogram on-chip using 1D convolutions. Which pipeline is better for latency and system stability?'
question: "Which pipeline is better for latency and system stability?"
details:
  realistic_solution: Option A is the correct approach. The Google Coral Edge TPU has strictly limited
    operator support and requires INT8 quantization. Complex DSP operations like mel-spectrograms (which
    require FFTs) cannot run natively on the Edge TPU and will either fail to compile or force a costly
    fallback to the host CPU, ruining latency. The optimal design computes the features on the host CPU,
    quantizes them, and streams only the dense INT8 feature maps to the TPU.
  common_mistake: Candidates often choose option B to offload processing to the accelerator, ignoring
    the limited operator support of the Edge TPU. They fail to realize that signal processing operations
    like STFT/FFT are either unsupported or map poorly to its INT8 MAC architecture.
  napkin_math: 'Raw audio streaming: 48,000 samples/sec * 16 bits * 4 channels = 3.07 Mbps of raw data.
    USB 3.0 bandwidth (5 Gbps) can easily handle this. However, computing a 64-bin mel-spectrogram at
    100 frames/sec yields: 100 * 64 * 1 byte (INT8) = 6.4 KB/sec per channel, or 25.6 KB/sec total. Streaming
    25.6 KB/sec of pre-quantized INT8 features reduces payload size by ~15x compared to raw audio (384
    KB/sec vs 25.6 KB/sec). More importantly, keeping feature extraction off the TPU ensures the 4 TOPS
    / 2W budget is exclusively spent on supported INT8 matrix multiplications for the neural network without
    stalling.'
