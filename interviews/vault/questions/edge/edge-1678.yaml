title: 'Hailo-8 Streaming KV-Cache Architecture for Long-Context Transformers'
scenario: 'Your team is deploying a 1B parameter vision-language transformer on a robotic platform using a Hailo-8 accelerator. The model requires processing video sequences up to 4K tokens, but the Hailo-8 relies entirely on host memory streaming since it lacks local DRAM.'
question: 'How would you redesign attention dataflow for a 1B VLM on Hailo-8 to avoid streaming a 4K-token KV cache every generation step?'
details:
  realistic_solution: 'The optimal solution involves designing a fused, pipelined dataflow graph that streams compressed or quantized KV-caches (e.g., INT4) from the host, combined with a local temporal sliding window or token-dropping mechanism (like StreamingLLM) to strictly bound the cache size. The attention mechanism must be re-cast to map efficiently onto the 26 TOPS INT8 MAC array without stalling on host memory reads.'
  common_mistake: |
    **The Pitfall:** Proposing standard flash attention or sparse attention algorithms.
    **The Rationale:** Candidates correctly identify attention complexity as an issue but ignore the host-streaming bandwidth bottleneck caused by the lack of local DRAM.
    **The Consequence:** Failing to realize that even optimized attention still requires continuous memory streaming, completely stalling the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K token INT8 KV-cache (d_model=1024, 16 layers).
    - PCIe Gen3x4 bandwidth: ~3.9 GB/s.

    **Calculations:**
    - Cache size: 4096 $\times$ 1024 $\times$ 16 $\times$ 2 $\times$ 1 byte = 134 MB.
    - Streaming cost: 134 MB / 3900 MB/s = 34.3 ms per token.
    - Optimization: 512 tokens + INT4 KV-quantization = 8.4 MB (2.1 ms).

    **Conclusion & Interpretation:**
    - **Result: ~450 tokens/sec (Memory Bandwidth-Bound)**. Bounding context and quantizing KV cache resolves the host streaming bottleneck.
