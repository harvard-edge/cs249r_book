title: Specifying a Multi-Model Compound Pipeline Contract for Jetson Orin Deployment
scenario: 'You are writing the technical specification for a 3-stage compound AI pipeline
  on Jetson Orin (32GB LPDDR5, 275 TOPS, 60W): stage 1 is a vision classifier, stage
  2 is an embedding + retrieval stage, stage 3 is a generative LLM. Write the interface
  contracts between stages including: data format, memory layout, error handling,
  and the performance SLOs each stage must meet to satisfy an end-to-end 750ms P95
  latency.'
question: What is the theoretical FPS for a 219M-MAC INT8 model on a 275 TOPS Jetson
  Orin, and why is 627 FPS off by 1000×?
details:
  realistic_solution: 'Theoretical throughput: 275 TOPS / (438M ops/frame) = 627,853
    fps (not 627 fps). The error confuses TOPS with GOPS by 1000×.'
  common_mistake: Writing stage specs in isolation without a latency budget allocation
    — each team optimizes their stage independently and the overall pipeline still
    misses the SLA because nobody accounted for the coordination overhead between
    stages (data transfer, synchronization, error propagation).
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 219M MACs, INT8. Theoretical throughput:
    275×10^12 / (219×10^6 × 2) = 275T / 438M = 627,853 fps (not 627 fps — that would
    imply 0.275 GOPS). At 50% practical efficiency: ~313,926 fps.'
