title: Theoretical Throughput Calculation for Edge AI Models
scenario: You are estimating the performance of a 219M-MAC INT8 vision model on a Jetson Orin (275 TOPS). A junior engineer calculates the theoretical maximum frame rate to be 627 FPS. Identify the magnitude error in their calculation and explain the difference between TOPS and GOPS.
question: What is the theoretical FPS for a 219M-MAC INT8 model on a 275 TOPS Jetson Orin, and why is 627 FPS off by 1000×?
details:
  realistic_solution: 'Theoretical throughput is calculated by dividing total available operations per second by operations required per frame. 219M MACs is equal to 438M operations. 275 TOPS is 275 trillion operations per second. 275,000,000,000,000 / 438,000,000 = 627,853 fps. The junior engineer confused TOPS (trillions) with GOPS (billions), leading to an answer that is exactly 1000× too slow.'
  common_mistake: Conflating Tera-operations (TOPS) and Giga-operations (GOPS) when doing edge inference math, leading to estimates that are off by exactly a factor of 1000.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 219M MACs, INT8. Theoretical throughput: 275×10^12 / (219×10^6 × 2) = 275T / 438M = 627,853 fps (not 627 fps — that would imply 275 GOPS instead of 275 TOPS). At 50% practical efficiency: ~313,926 fps.'
