title: Zero-Copy DMA Pipeline for Accelerated Edge Video Streams
scenario: Four 1080p camera streams are piped into a Hailo-8 chip for real-time tracking,
  but the host CPU is maxed out performing H.264 decoding and frame resizing.
question: Create a hardware-accelerated pipeline specification that offloads decoding
  to an edge VPU and uses zero-copy memory buffers to feed the Hailo-8.
details:
  realistic_solution: Implement a pipeline where a hardware decoder writes YUV frames
    directly to contiguous DMA-addressable memory. The Hailo-8 driver is given physical
    memory pointers to ingest frames without CPU copies, while image scaling is folded
    directly into the network's first strided convolution layer.
  common_mistake: Keeping OpenCV CPU-based resizing in the loop, which forces a host-memory
    copy and breaks the zero-copy DMA architecture.
  napkin_math: 4 streams * 1920*1080*3 bytes * 30fps = ~746 MB/s required memory bandwidth.
