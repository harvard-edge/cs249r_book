title: Optimizing Object Detection Graph for Coral Edge TPU
scenario: You are deploying a custom MobileNetV2-based SSD object detection model to a Google Coral Edge TPU via a USB connection. During your initial compilation, you discover that several custom reshape operators in the SSD head fall back to the host CPU.
question: Evaluate the tradeoff between modifying the graph to use natively supported INT8 operators versus pipelining the host-side execution. Should you modify the SSD graph or pipeline the fallback?
details:
  realistic_solution: The optimal approach is structural graph optimization prior to post-training quantization (PTQ) to ensure 100% on-chip execution. Replace custom reshapes with standard INT8-supported equivalents. If host fallback is strictly unavoidable, partition the graph to minimize PCIe/USB I/O payloads and implement asynchronous pipelining to mask transfer latency.
  common_mistake: |
    **The Pitfall:** Assuming host-side CPU execution for unsupported operators is a trivial compute penalty.
    **The Rationale:** Candidates fail to account for the massive PCIe/USB transfer latency when moving activation tensors off-chip.
    **The Consequence:** Severe I/O bottlenecks that completely negate the accelerator's speed, missing real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 model: 2 GOPS per inference.
       - Coral TPU: 4 TOPS (4000 GOPS) peak, 50% utilization = 2000 GOPS effective.
       - USB 3.0 bandwidth: ~400 MB/s practical.
       - Unsupported op forces a 1MB activation transfer.
    2. **Calculations:**
       - TPU compute time: 2 GOPS / 2000 GOPS = 1 ms.
       - USB transfer latency: 1 MB / 400 MB/s = 2.5 ms.
       - Total pipeline time: 1 ms + 2.5 ms = 3.5 ms.
    3. **Conclusion & Interpretation:**
       - **3.5 ms total latency (max 285 FPS)**.
       - **Result: I/O-Bound (Transfer bottleneck wastes >60% of available TPU compute)**.
