title: Mitigating Catastrophic Forgetting from Extreme Staleness
scenario: A fleet of maritime cargo ships runs a local anomaly detection model (150MB ResNet-50) on engine telemetry using an edge Jetson Xavier NX. Ships lose connectivity for up to 45 days, performing continuous local training. Upon reconnection, the global model has advanced by 200 FedAvg rounds. Applying the ship's 45-day accumulated local update directly to the global model causes a 15% fleet-wide accuracy drop.
question: Why does applying the ship's 45-day stale update hurt fleet accuracy, and what reconciliation protocol should replace direct averaging?
details:
  realistic_solution: 'Measure cosine similarity between the stale local update and the recent global trajectory. If similarity is low, reject direct weight averaging. Instead, utilize Federated Distillation (FedDF) on the server: treat the ship''s 150MB model as a teacher generating soft labels over a server-side proxy dataset, training the current global model to assimilate the unique edge patterns via representation learning rather than raw parameter merging.'
  common_mistake: |
    **The Pitfall:** Applying a simple scalar decay factor (staleness penalty) to the update.
    **The Rationale:** Candidates assume that reducing the magnitude of the stale gradient is enough to prevent divergence.
    **The Consequence:** This fails to correct the adversarial direction of gradients computed on an entirely obsolete loss surface, continuing to actively eject the global model from its current loss basin.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Disconnect Period: 45 days (200 FedAvg rounds)
       - Drift Distance: 0.05 L2 norm per round
    2. **Calculations:**
       - Total Structural Drift: 200 rounds * 0.05 = ~10.0
       - Error Penalty Expansion: $0.5 \times (\Delta w)^T H (\Delta w)$
    3. **Conclusion & Interpretation:**
       - **Result: Convergence-Bound.** Attempting to raw-merge a gradient computed on a surface that has drifted 200 rounds into the past completely violates the Taylor approximation, actively ejecting the global model from its minimum.
