title: Mitigating Catastrophic Forgetting from Extreme Staleness
scenario: A fleet of maritime cargo ships runs a local anomaly detection model (150MB ResNet-50) on engine
  telemetry using an edge Jetson Xavier NX. Ships lose connectivity for up to 45 days, performing continuous
  local training (batch 32, LR 1e-4). Upon reconnection via a 2Mbps satellite link, the global model has
  advanced by 200 FedAvg rounds. Applying the ship's 45-day accumulated local update directly to the global
  model causes a 15% fleet-wide accuracy drop. Analyze the gradient geometry causing this failure and
  design a state reconciliation protocol.
details:
  realistic_solution: 'Measure cosine similarity between the stale local update and the recent global
    trajectory. If similarity is < 0.1, reject direct weight averaging. Instead, utilize Federated Distillation
    (FedDF) on the server: treat the ship''s 150MB model as a teacher generating soft labels over a 5GB
    server-side proxy dataset, training the current global model to assimilate the unique edge patterns
    via representation learning rather than parameter merging.'
  common_mistake: Applying a simple scalar decay factor (staleness penalty) to the update. This reduces
    the magnitude but fails to correct the adversarial direction of gradients computed on an entirely
    obsolete loss surface.
  napkin_math: Assuming a global drift of 0.05 L2 norm per round, total drift over 200 rounds is ~10.0.
    By Taylor expansion, applying a gradient Δw computed at w_{t-200} to the new state w_t introduces
    an error penalty proportional to 0.5 * (Δw)^T H (Δw). With a sharp local minimum (dominant Hessian
    eigenvalues > 2.0), this penalty dominates the true gradient, actively ejecting the global model from
    its current loss basin.
  options:
  - Applying a simple scalar decay factor (staleness penalty) to the update. This reduces the magnitude
    but fails to correct the adversarial direction of gradients computed on an entirely obsolete loss
    surface.
  - Increasing the number of local training epochs per round always improves FL convergence speed without
    any trade-offs.
  - Model accuracy drift can only be detected by periodically re-labeling production data; statistical
    tests on input distributions are unreliable.
  - Measure cosine similarity between the stale local update and the recent global trajectory. If similarity
    is < 0.1, reject direct weight averaging.
  correct_index: 3
