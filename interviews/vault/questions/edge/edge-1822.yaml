title: Fail-Safe Industrial Anomaly Detection on Edge TPU
scenario: You are tasked with specifying the software architecture for an industrial robotic arm's anomaly detection system, mandated to meet strict functional safety requirements. The inference target is a Google Coral Edge TPU connected via PCIe.
question: How would you design deterministic Coral Edge TPU inference with watchdogs and safety guarantees despite limited operator support?
details:
  realistic_solution: The specification must strictly mandate 100% INT8 quantization for the entire model graph, restricted to the supported operator set, ensuring execution exclusively on the Edge TPU without CPU fallback. Additionally, the design must include a dedicated real-time process on the host that manages a strict watchdog timer over the PCIe link and periodically executes a known-good self-test inference to verify the TPU's operational health.
  common_mistake: |
    **The Pitfall:** Allowing partial graph compilation with CPU fallback for unsupported operators.
    **The Rationale:** Candidates assume the Edge TPU is inherently deterministic and that falling back to the CPU is an acceptable compromise.
    **The Consequence:** The CPU fallback introduces non-deterministic latency spikes and context-switching overhead that violate real-time safety constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Anomaly detection model requires 20 GOPS per frame.
       - Theoretical compute on Coral Edge TPU: 4 TOPS.
    2. **Calculations:**
       - Compute Time = 20 GOPS / 4 TOPS = 5.0ms.
       - PCIe I/O Transfer = Estimated at 2.0ms.
       - Deterministic Latency = 5.0ms + 2.0ms = 7.0ms per frame.
    3. **Conclusion & Interpretation:**
       - **Result: 15ms Watchdog**. The strict 7.0ms latency enables a tightly coupled 15ms watchdog fail-safe timeout, securing real-time system certification.
