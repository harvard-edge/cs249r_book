title: The Frozen Robot Problem
scenario: You are designing the safety system for an autonomous delivery robot. If the main perception software enters an infinite loop and completely freezes, you must rely on a fundamental hardware mechanism to force a system reboot and recover the robot from this non-responsive state.
question: What hardware mechanism would reboot the robot if its perception software freezes?
details:
  realistic_solution: A hardware watchdog timer. This is a simple, independent hardware counter physically separate from the main processor. The main application software must 'pet the dog' (reset the timer) at a regular interval. If the software freezes, it fails to reset the timer. When the timer overflows, it triggers a hardware reset line on the CPU, forcing a full reboot. It's the ultimate hardware failsafe for a non-responsive system, which is critical for functional safety in robotics.
  common_mistake: |
    **The Pitfall:** Relying on software-level health checks.
    **The Rationale:** Engineers from a cloud background often confuse hardware watchdogs with software liveness probes (like a Kubernetes probe).
    **The Consequence:** A software check fails entirely when the OS scheduler itself hangs. The robot remains stuck indefinitely.
  napkin_math: |
    1. **Perception Loop**: 33ms (for a 30 FPS camera).
    2. **Watchdog Timeout**: Set to 100ms.
    3. **Behavior**: Software must 'pet the dog' once every 100ms.
    4. **Result**: If just 3 frames are dropped or the loop hangs, the **hardware triggers a reset**, preventing prolonged dangerous states.
  options:
  - A software liveness probe that pings a monitoring service.
  - Error-Correcting Code (ECC) memory to prevent corruption.
  - A hardware watchdog timer that triggers a CPU reset.
  - A graceful degradation module that switches to a simpler model.
  correct_index: 2
