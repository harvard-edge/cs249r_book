title: The Frozen Robot Problem
scenario: You are designing the safety system for an autonomous delivery robot. If the main perception
  software enters an infinite loop and completely freezes, what is the most fundamental hardware mechanism
  you would rely on to force a system reboot and recover the robot from this non-responsive state?
details:
  realistic_solution: A hardware watchdog timer. This is a simple, independent hardware counter physically
    separate from the main processor. The main application software must 'pet the dog' (reset the timer)
    at a regular interval. If the software freezes, it fails to reset the timer. When the timer overflows,
    it triggers a hardware reset line on the CPU, forcing a full reboot. It's the ultimate hardware failsafe
    for a non-responsive system, which is critical for functional safety in robotics.
  common_mistake: Engineers from a cloud background often confuse hardware watchdogs with software-level
    health checks (like a Kubernetes liveness probe). A software check fails when the OS scheduler itself
    hangs. Another common confusion is with ECC memory, which only protects against memory bit-flips,
    not logical software freezes.
  napkin_math: A typical edge system has a hard real-time deadline, for instance, a 33ms perception-action
    loop for a 30 FPS camera. A watchdog timer might be configured with a 100ms timeout. This means the
    software must successfully complete its loop and 'pet the dog' at least once every 100ms. If just
    3 consecutive frames are dropped or the main loop gets stuck, the watchdog will trigger, rebooting
    the system before the robot can remain unresponsive for a dangerous amount of time.
  options:
  - A software liveness probe that pings a monitoring service.
  - Error-Correcting Code (ECC) memory to prevent corruption.
  - A hardware watchdog timer that triggers a CPU reset.
  - A graceful degradation module that switches to a simpler model.
