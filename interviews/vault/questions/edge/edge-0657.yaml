title: The Bloated INT8 Model
scenario: You've successfully quantized your FP32 object detection model to INT8 for deployment on an
  edge device, expecting a 4x reduction in model memory footprint (weights). However, after deployment,
  you notice the total RAM usage during inference is only reduced by about 2x-2.5x compared to the FP32
  version. What explains this discrepancy, and what other components contribute significantly to the overall
  memory footprint?
details:
  realistic_solution: "While model weights often see a near 4x reduction from FP32 to INT8, the *total*\
    \ memory footprint during inference includes much more:\n  1.  **Intermediate Activations:** The tensors\
    \ produced by each layer (activations) often need to be stored, at least temporarily. These might\
    \ remain in higher precision (e.g., FP16 or even FP32, depending on the operator and hardware support)\
    \ for numerical stability or performance reasons, or they might be explicitly de-quantized/re-quantized\
    \ between layers, consuming more memory than expected.\n  2.  **Input/Output Buffers:** The input\
    \ image/data and the final output tensors (e.g., bounding boxes, class probabilities) also occupy\
    \ memory.\n  3.  **Scratchpad/Workspace Memory:** Many ML operations (e.g., convolutions using `im2col`,\
    \ matrix multiplications) require temporary scratchpad buffers for intermediate calculations or data\
    \ reordering. These buffers can be significant and might operate in higher precision.\n  4.  **Runtime\
    \ Overhead:** The ML inference engine itself (e.g., TFLite, ONNX Runtime), its internal data structures,\
    \ graph representation, and operating system overhead consume RAM.\n  5.  **Look-up Tables (LUTs):**\
    \ For certain quantized operations or post-processing steps (e.g., de-quantization, activation functions),\
    \ LUTs might be used, adding to memory."
  common_mistake: Assuming that "model memory footprint" only refers to the weights, and that quantization
    applies uniformly to all data within the inference pipeline.
  napkin_math: '*   **Model:** A typical ResNet-50 might have ~25 MB of FP32 weights. | *   **Expected
    INT8 Weights:** 25 MB / 4 = 6.25 MB. | *   **Peak Activations (FP32):** For a 224x224x3 input, a common
    intermediate layer might produce a 14x14x1024 feature map. In FP32, this is 14 * 14 * 1024 * 4 bytes
    ≈ 0.8 MB. If multiple such large activation maps need to be held, or if they are FP16/FP32, they add
    up. | *   **Scratchpad:** A convolution operation might temporarily require memory equivalent to several
    input/output feature maps. | *   **Total observed:** If weights are 6.25MB, but activations/buffers
    add 5-10MB and runtime adds 2-3MB, the total could be 13-19MB, which is only ~1.3x-1.9x smaller than
    the FP32 version''s 25MB weights + similar activation/buffer/runtime overhead (e.g., 25MB + 15MB =
    40MB for FP32 vs 15MB for INT8 total).'
