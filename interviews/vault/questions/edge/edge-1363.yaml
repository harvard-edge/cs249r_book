title: 'Hailo-8 Host Memory Bandwidth for Data Logging'
scenario: 'You are deploying a vision system using an edge accelerator that lacks local DRAM, forcing it to stream weights directly from host memory at 2.5 GB/s. The host has 4.0 GB/s total memory bandwidth. The system must simultaneously log raw 2 MB image frames to disk.'
question: 'What maximum logging FPS can the host sustain for uncompressed row frames versus 4x-compressed TFRecord with 200 MB/s overhead?'
details:
  realistic_solution: 'Evaluate the remaining host memory bandwidth after the accelerator''s dataflow streaming requirements are met. Subtract the memory bandwidth overhead of the TFRecord compression algorithm before calculating throughput. The optimal storage format maximizes logging rate while strictly respecting the shared memory bus constraints.'
  common_mistake: |
    **The Pitfall:** Focusing solely on storage space and ignoring memory bandwidth limits.
    **The Rationale:** Candidates forget that DRAM-less accelerators heavily share and monopolize the host memory bus.
    **The Consequence:** They fail to subtract the memory bandwidth overhead of the compression algorithm, resulting in wildly inaccurate throughput estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Host Bandwidth = 4000 MB/s.
    - Accelerator Streaming Bandwidth = 2500 MB/s.
    - Uncompressed frame = 2.0 MB. Compressed frame = 0.5 MB.
    - Compression overhead = 200 MB/s.

    **Calculations:**
    - Remaining Bandwidth = 4000 - 2500 = 1500 MB/s.
    - Uncompressed FPS: 1500 MB/s / 2.0 MB = 750 FPS.
    - TFRecord available bandwidth: 1500 MB/s - 200 MB/s = 1300 MB/s.
    - TFRecord FPS: 1300 MB/s / 0.5 MB = 2600 FPS.

    **Conclusion & Interpretation:**
    - **Result: 2600 FPS (Memory-Bandwidth Bound)**. TFRecord compression boosts throughput from 750 FPS to 2600 FPS despite the memory bandwidth overhead.
