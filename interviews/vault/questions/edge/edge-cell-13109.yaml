title: 'Edge TCO Diagnosis: Why Edge Deployment Is Losing Money'
scenario: 'A startup deployed 100 Jetson Orin units ($499 each) for smart parking, running 24/7 at 60W.
  Monthly revenue: $2/unit. At month 6, they project losses and cannot understand why. Diagnose the financial
  model error and calculate the actual break-even point. Power at $0.10/kWh. Include 4G connectivity at
  $8/unit/month.'
details:
  realistic_solution: 'Monthly revenue: 100 * $2 = $200. Monthly costs: Power: 100 * 60W * 720hr * $0.10/kWh
    = $432. Connectivity: 100 * $8 = $800. Hardware amort (36mo): 100 * $499 / 36 = $1,386. Total monthly
    cost: $432+$800+$1386 = $2,618. Monthly loss: $200 - $2618 = -$2,418. Break-even revenue needed: $2,618
    → $26.18/unit/month. Current revenue $2/unit = 13.2% of break-even. The business is fundamentally
    broken at $2/unit. Either revenue must 13x or costs must cut 13x. LoRa instead of 4G: saves $700/month.
    At $10/unit revenue: still losing $1618/month. Need $20+/unit revenue.'
  common_mistake: Building a business case based only on hardware amortization and ignoring that ongoing
    operational costs (power + connectivity) exceed the revenue for low-margin IoT use cases.
  napkin_math: 'Revenue: 100*$2=$200/month. Costs: Power=$432 + 4G=$800 + Amort=$1386 = $2618. Loss =
    $2418/month. Annual loss: $29K. Break-even price: $26.18/unit/month. To reach break-even with current
    costs: 13.1x revenue increase. Optimization: 1) Replace 4G with LoRa ($0.50/unit/month): saves $750/month.
    2) Reduce power to 20W (model optimization): saves $288/month. New costs: $2618-$750-$288=$1580. Break-even:
    $15.80/unit/month. Revenue must 7.9x. Parking spot pricing: $5-50/spot/month. Need premium tier to
    justify edge compute costs at 100-unit scale.'
