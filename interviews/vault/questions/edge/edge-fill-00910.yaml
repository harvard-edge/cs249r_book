title: Optimizing a Vision Model with Operator Fusion on Google Coral Edge TPU
scenario: 'You are deploying a custom vision model onto a Google Coral Edge TPU (4 TOPS INT8, 2W power
  budget, INT8 only). Your initial profiling reveals that a significant portion of inference time is spent
  on a sequence of memory-bound operations: `Conv2D (INT8) -> ReLU (INT8) -> BatchNorm (INT8) -> Quantize
  (INT8)`. Each of these is currently executed as a separate kernel. The `Conv2D` layer produces an output
  tensor of shape `(1, 64, 64, 128)` in `NHWC` format. Each kernel launch incurs an overhead. The ReLU,
  BatchNorm, and Quantize operations are element-wise and memory-bound.'
question: "How would you fuse ReLU, BatchNorm, and Quantize after the 1×64×64×128 INT8 Conv2D output to reduce Coral TPU memory I/O and launch overhead?"
details:
  realistic_solution: The most realistic solution involves fusing these sequential, memory-bound, element-wise
    operations (`ReLU`, `BatchNorm`, `Quantize`) into a single custom kernel that directly consumes the
    output of the `Conv2D` layer. This drastically reduces kernel launch overhead and improves data locality
    by keeping intermediate results in on-chip memory (registers or shared memory), avoiding costly global
    memory accesses between these operations. This approach maximizes throughput and energy efficiency
    by minimizing memory I/O, which is often the bottleneck on edge devices.
  common_mistake: A common mistake is to only optimize individual kernel implementations without considering
    the overall data flow and the significant overhead of multiple global memory accesses and kernel launches
    on a resource-constrained device like the Coral TPU. Overlooking the INT8-only constraint or the tight
    power budget (2W) can lead to solutions that are theoretically efficient but impractical or energy-inefficient
    for the target hardware.
  napkin_math: 'For the given `Conv2D` output tensor of shape `(1, 64, 64, 128)` with INT8 elements:

    1. Calculate the total global memory I/O (bytes read + bytes written) for the `ReLU -> BatchNorm ->
    Quantize` sequence if each is executed as a separate kernel.

    2. Calculate the total global memory I/O for the same sequence if `ReLU`, `BatchNorm`, and `Quantize`
    are fused into a single kernel, assuming the intermediate results are held in on-chip memory and only
    the final quantized output is written to global memory.

    3. Quantify the memory bandwidth savings in bytes per inference step achieved by this fusion.

    Show your calculations.'
