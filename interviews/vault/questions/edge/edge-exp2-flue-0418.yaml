title: Hailo-8 Host Memory Bandwidth Calculation
scenario: We are evaluating a Hailo-8 dataflow accelerator for an edge smart camera. The Hailo-8 provides
  26 TOPS (INT8) at just 2.5W, but it has no local DRAM and must stream all data from host memory. If
  our perception model requires 4 GOPs (Giga-Operations) per inference and needs to load 15 MB of weights
  and activations per frame from the host, calculate the required host memory bandwidth to keep the Hailo-8
  running at 100% of its peak 26 TOPS compute utilization.
question: "What host memory bandwidth is needed to keep Hailo-8 at 26 TOPS for a 4 GOPs/frame model streaming 15 MB per frame?"
details:
  realistic_solution: To find the required bandwidth, we must first determine the maximum frames per second
    (FPS) the accelerator can process if fully utilized. We divide the total operations per second (26
    TOPS) by the operations required per frame. Then, we multiply the resulting FPS by the data required
    per frame to get the total memory bandwidth.
  common_mistake: Candidates often fail to calculate the maximum frame rate first, or they mix up Gigabytes
    and Giga-Operations. Another common error is assuming the weights can be cached locally when the platform
    explicitly lacks local DRAM, meaning the full 15 MB must be streamed for every single frame.
  napkin_math: '1. Convert TOPS to GOPs: 26 TOPS = 26,000 GOPs.

    2. Calculate Max FPS: 26,000 GOPs / 4 GOPs/frame = 6,500 FPS.

    3. Calculate Required Bandwidth: 6,500 FPS * 15 MB/frame = 97,500 MB/s = 97.5 GB/s.'
