id: edge-fill-00909
title: Optimizing Memory-Bound Operations on Hailo-8 via Kernel Fusion
topic: kernel-fusion
status: published
provenance: imported
scenario: You are deploying a deep learning model to the Hailo-8, a 26 TOPS (INT8) dataflow accelerator
  with a 2.5W power budget. Your current model has a critical path involving several sequential memory-bound
  operations (e.g., element-wise additions followed by ReLU activations and normalization layers). These
  operations, when executed as separate kernels, incur significant overhead due to repeated memory access
  and kernel launch latency, limiting throughput and energy efficiency. Explain how kernel and operator
  fusion can mitigate these issues on the Hailo-8 architecture, specifically considering its dataflow
  nature and INT8 capabilities. Provide a high-level overview of the optimization strategy.
details:
  realistic_solution: A realistic solution involves identifying sequences of memory-bound operations that
    can be fused into a single, custom kernel or a highly optimized dataflow graph. On the Hailo-8, this
    would mean leveraging its compiler and hardware capabilities to combine these operations into a single
    computational unit. Instead of writing intermediate results to external DRAM after each operation,
    the fused kernel would keep data in on-chip buffers (SRAM/registers) and stream it directly from one
    sub-operation to the next. This minimizes off-chip memory bandwidth requirements and reduces the number
    of context switches/kernel launches, significantly improving latency, throughput, and power efficiency
    within the 2.5W budget.
  common_mistake: A common mistake is to treat each layer as a distinct, isolated computation that must
    complete before the next begins, leading to unnecessary global memory accesses and kernel launch overheads,
    especially for fine-grained operations. This approach neglects the dataflow processing capabilities
    of accelerators like the Hailo-8, where intermediate results can flow directly between fused operations
    without writing back to external memory.
  napkin_math: 'If each of N memory-bound operations requires M bytes of external memory access and L
    cycles for kernel launch overhead, executing them separately incurs N * (M_read + M_write + L) costs.
    By fusing, we can reduce this to (M_read_input + M_write_output + L_fused) by eliminating N-1 intermediate
    writes and N-1 kernel launches. For example, if N=3, M=1KB, L=100 cycles, and on-chip data movement
    is negligible. Separate: 3 * (2KB + 100 cycles). Fused: (1KB_read + 1KB_write + 100 cycles). The reduction
    in memory bandwidth could translate to a significant percentage of the 26 TOPS (INT8) effectively
    utilized, potentially increasing frames per second or reducing energy consumption closer to the 2.5W
    target.'
