schema_version: 1
id: edge-cell-13030
title: 'Edge Queueing Theory Analyze: Why Jetson Orin Pipeline Stalls'
topic: queueing-theory
status: published
provenance: imported
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) running a 4-camera inference pipeline shows
  average GPU utilization of 40% but frame processing latency of 800ms (SLO: 100ms). Using queueing theory,
  explain why high available capacity coexists with high latency, and identify the bottleneck stage.'
details:
  realistic_solution: 'M/M/1 at ρ=0.4: Wq = 0.4/(μ*(1-0.4)). If GPU were bottleneck with W=800ms: Wq =
    800ms - service time. But GPU at 40% means ρ=0.4, so Wq = ρ/(μ(1-ρ)) = 0.4/(μ*0.6). For this to equal
    ~700ms queue: μ = 0.4/(0.7*0.6) ≈ 0.95 fps — far too slow. The actual bottleneck is LPDDR5 memory
    bandwidth: 4 cameras * 1080p * 30fps = 4*1080*1920*3*30 = 712MB/s just for raw camera data. Jetson
    Orin LPDDR5 = 102.4GB/s total. Preprocessing (color convert, resize) saturates CPU/DMA, not GPU.'
  common_mistake: Assuming that 40% GPU utilization means the GPU is the bottleneck with 60% slack. High
    latency at low GPU util indicates a different bottleneck (memory bandwidth, preprocessing, or PCIe
    transfer).
  napkin_math: '4 cameras * 1920*1080 RGB30fps = 4*6.2MB*30 = 744MB/s raw data. Preprocessing (GPU decode
    + resize): 4*30 = 120 frames/s. At 40% GPU util: GPU processes 120 * 0.4 = 48 frames/s from inference
    side. Queue accumulates: 120 input - 48 processed = 72 frames/s surplus. Queue depth grows until memory
    full. Fix: use hardware NVJPEG decoder on Jetson to offload preprocessing, freeing GPU for inference.
    Or reduce to 2 cameras.'
