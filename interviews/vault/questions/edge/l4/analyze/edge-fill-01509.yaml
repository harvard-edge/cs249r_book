id: edge-fill-01509
title: Edge Active Learning and Bias Mitigation on Hailo-8
topic: dataset-curation
status: published
provenance: imported
scenario: A smart city initiative deploys computer vision models on Hailo-8 accelerators (26 TOPS INT8,
  2.5W dataflow accelerator) at thousands of intersections for real-time traffic analysis. The goal is
  to detect new types of road incidents for improved safety. Due to network bandwidth limitations and
  privacy concerns, only a small fraction of inference results, potentially flagged by an uncertainty
  score, can be sent to a central system for human review and re-labeling. Design an active learning strategy
  for selecting data samples on the Hailo-8 for human annotation. Explain *why* your selection criteria
  are optimal given the Hailo-8's computational power and energy constraints, and *how* you would detect
  and mitigate dataset bias that might arise from edge-only data selection and limited central feedback.
  Specifically, how would the 26 TOPS INT8 capability influence your choice of uncertainty estimation
  models and their efficiency on the device?
details:
  realistic_solution: 'Implement a hybrid active learning approach: utilize a lightweight, INT8-quantized
    uncertainty estimation model (e.g., a simplified Bayesian Neural Network variant or Monte Carlo Dropout)
    that can run efficiently on the Hailo-8''s 26 TOPS INT8. Combine uncertainty sampling with a low-cost
    diversity metric (e.g., k-means on feature embeddings) to prevent bias. Employ batching and intelligent
    prioritization for data offloading to the central system during opportune network conditions. A robust
    solution would also include a mechanism for periodic, secure model updates to the edge and local model
    performance monitoring to detect concept drift.'
  common_mistake: Candidates might propose computationally expensive uncertainty sampling methods (e.g.,
    deep ensembles) without considering the 2.5W power budget, leading to thermal throttling or rapid
    battery drain. Another mistake is relying solely on uncertainty without diversity, resulting in a
    biased dataset from the edge, or failing to address the challenges of network-limited feedback loops.
  napkin_math: Given 26 TOPS INT8, estimate the maximum frames per second (FPS) for a typical uncertainty
    estimation model, assuming a certain number of operations per inference (e.g., 500 GOPS). Calculate
    the power consumption of this active learning component and its impact on the device's 2.5W budget.
    For example, if an operation consumes X Joules, how many operations can be performed within the power
    budget over a minute? Compare the energy cost of running on-device active learning versus the energy/bandwidth
    cost of sending all raw data to the cloud for processing.
