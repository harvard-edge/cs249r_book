schema_version: 1
id: edge-cell-13104
title: 'Edge TCO Analyze: Hailo-8 vs Jetson Orin Cost Per Inference Lifecycle'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Analyze the cost-per-inference over a 3-year deployment for Hailo-8 (26 TOPS, 2.5W, $200 unit
  cost) vs Jetson Orin (275 TOPS, 60W, $499 unit cost) running a factory quality inspection model at 50
  inferences/second, 24/7. Include hardware amortization, power, and annual maintenance. Which is cheaper
  per inference?
details:
  realistic_solution: 'Hailo-8 (+ RPi 5 host at $80): total HW=$280. Power: (2.5+5W)=7.5W. Inferences:
    50/s * 3yr * 8760*3600 = 50 * 94,608,000 = 4.73B inferences. Hardware cost/inf: $280/4.73B = $0.0000000592.
    Power cost: 7.5W * 8760hr * 3 * $0.10 = $19.71. Power/inf: $19.71/4.73B = $0.0000000042/inf. Total/inf:
    $0.0000000634 (63.4 nano-$/inf). Jetson Orin: HW=$499. Power: 60W * 8760*3 = $157.68. Total: $657.
    Inferences: 4.73B. Cost/inf: $657/4.73B = $138.9 nano-$/inf. Hailo-8 system: 2.19x cheaper per inference.'
  common_mistake: Failing to convert total deployment cost to per-inference cost by dividing by total
    number of inferences over the deployment lifetime, and treating both platforms as equivalent when
    Hailo-8 may require a host processor (additional cost).
  napkin_math: 'Total inferences: 50/s * 3*365*24*3600 = 50 * 94.6M*3 = 14.19B... wait: 50 * 3 * 8760
    * 3600 = 50 * 94,608,000 = 4.73B. Hailo+Pi: HW=$280. Power=7.5W*8760*3/1000*$0.10=$19.71. Total=$299.71.
    $/inf=$299.71/4.73e9=$63.4e-9. Jetson: HW=$499. Power=60W*8760*3/1000*$0.10=$157.68. Total=$656.68.
    $/inf=$656.68/4.73e9=$138.8e-9. Hailo cheaper: 138.8/63.4=2.19x. Power savings: ($157.68-$19.71)*multiple_units.
    For 100-unit factory: (157.68-19.71)*100=$13,797 electricity savings over 3yr.'
