id: edge-fill-01691
title: 'Fairness Evaluation on Edge AI: Qualcomm Cloud AI 100'
topic: fairness-evaluation
status: published
provenance: imported
scenario: A financial institution deploys a credit scoring model on the Qualcomm Cloud AI 100 (32 GB LPDDR4x,
  400 TOPS INT8, 75W) for real-time loan approval decisions at the edge. Initial post-deployment audits
  reveal significant disparities in approval rates across different demographic subgroups, suggesting
  potential algorithmic bias. The model was trained on a large dataset and optimized for INT8 inference
  on the accelerator. You are tasked with analyzing the potential root causes of this bias, considering
  the edge deployment context and the specific hardware characteristics.
details:
  realistic_solution: To analyze this behavior, you would first define relevant protected attributes and
    fairness metrics (e.g., demographic parity, equalized odds, or intersectional fairness). Then, you
    would collect real-world inference logs from the Qualcomm Cloud AI 100, ensuring data privacy, and
    segment them by demographic subgroups. You'd analyze these segments for disparities in decision outcomes
    and model confidence. Investigate if the INT8 quantization process introduced or amplified bias by
    comparing the fairness metrics of the full-precision model with the quantized model. Additionally,
    explore if the edge deployment's data input pipeline or sensor data preprocessing introduces systemic
    differences that affect subgroups. Propose mitigation strategies such as re-calibrating decision thresholds
    per subgroup, re-training with fairness-aware regularization, or using post-processing techniques
    like re-ranking, keeping the Qualcomm Cloud AI 100's memory (32 GB LPDDR4x) and computational (400
    TOPS INT8) constraints in mind for any on-device adjustments.
  common_mistake: A common mistake is to solely focus on aggregate model performance metrics (e.g., overall
    accuracy) without deep diving into subgroup-specific performance or fairness metrics. Another mistake
    is to assume that optimizing for INT8 inference automatically maintains fairness properties without
    re-evaluating or retraining the model after quantization, or to overlook potential data drift on edge
    devices that can exacerbate bias over time.
  napkin_math: "If a model processes 1000 loan applications per second on the Qualcomm Cloud AI 100 and\
    \ 10% of these applications belong to a 'protected' subgroup. If the overall approval rate is 70%\
    \ but the protected subgroup's approval rate is 50%, while the majority group's is 72.2%, calculate\
    \ the demographic parity difference. \n\nTotal approvals = 1000 * 0.70 = 700\nProtected subgroup applications\
    \ = 1000 * 0.10 = 100\nProtected subgroup approvals = 100 * 0.50 = 50\nMajority group applications\
    \ = 1000 * 0.90 = 900\nMajority group approvals = 700 - 50 = 650\nMajority group approval rate = 650\
    \ / 900 = 0.7222 (approx)\n\nDemographic Parity Difference = |Protected Approval Rate - Majority Approval\
    \ Rate| = |0.50 - 0.7222| = 0.2222 or 22.22 percentage points. This quantifies the observed bias."
