schema_version: 1
id: edge-cell-13071
title: 'Edge Systolic Array Analyze: Weight-Stationary Dataflow for Edge Deployment'
topic: systolic-dataflow
status: published
provenance: imported
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8) deploys ResNet-50 (25M params INT8, 4.1 GOPS) for
  batch=1 inference. Analyze why the inference is memory-bandwidth bound using Roofline, calculate the
  achievable throughput, and explain how a weight-stationary dataflow (loading weights once per batch)
  changes the analysis for batch=64.
details:
  realistic_solution: 'Batch=1: weights = 25MB. Load once per inference: 25MB / 102.4GB/s = 244μs. Compute:
    4.1G / 275T = 14.9μs. Memory bound (244μs >> 14.9μs). AI = 4.1G/25MB = 164 FLOPs/byte << Jetson ridge
    (275T/102.4G = 2686 FLOPs/byte). Batch=64 weight-stationary: weights loaded ONCE, 64 inputs processed.
    FLOPs: 4.1G*64=262G. Weight bytes: 25MB (loaded once). Activation bytes: 64*(input + output) = 64*2*(224^2*3*1+1000*4)
    ≈ 64*4MB = 256MB. AI = 262G/(25+256)MB = 262G/281MB = 933 FLOPs/byte. Still below Jetson ridge (2686),
    but 5.7x better than batch=1. Throughput improves from 1/244μs=4100 FPS to 64/(?ms).'
  common_mistake: Not understanding that weight-stationary dataflow only helps when the batch size is
    large enough to amortize the one-time weight loading cost across many input samples.
  napkin_math: 'Batch=1: AI=164, memory bound. Time=244μs. Throughput=4100 img/s. Batch=64 WS: weights
    load once (244μs). Inputs: 64*224^2*3*1=9.7MB. AI = 262G / (25+9.7+10MB activations) = 262G/44.7MB
    = 5862. Above Jetson ridge (2686) → compute bound! Time = 262G/275T = 953μs for 64 images = 14.9μs/image.
    Throughput = 1/14.9μs = 67,000 img/s. From 4100 to 67,000 img/s: 16x improvement from batching + WS
    dataflow. Weight load overhead: 244μs / 953μs = 25.6% overhead at batch=64. At batch=256: overhead
    = 244/(4*953)=6.4%.'
