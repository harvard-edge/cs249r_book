schema_version: 1
id: edge-r2-42016
title: Priority Preemption for Real-Time Edge Inference
topic: tail-latency
status: published
provenance: imported
scenario: 'Your Jetson Orin runs two models concurrently: a safety-critical pedestrian detector (must
  complete in 15ms) and a comfort feature (lane marking detection, 50ms budget). Both share the GPU. Under
  load, the pedestrian detector''s P99 spikes to 35ms because it waits for the lane model''s CUDA kernels.
  Design a preemption strategy within the 60W envelope.'
details:
  realistic_solution: 'CUDA compute preemption (since Pascal) allows context switching, but with 50-200μs
    overhead. Strategy: (1) Assign pedestrian detector to a high-priority CUDA stream with CUDA_MPS or
    explicit stream priorities. (2) Split the lane model''s convolutions into smaller tiled kernels (max
    2ms each) so preemption points occur frequently. (3) Use Orin''s DLA for the lane model entirely,
    freeing the GPU exclusively for the pedestrian detector — DLAs have separate compute paths and don''t
    contend with GPU streams. (4) Time-slice: dedicate GPU to pedestrian model for the first 15ms of each
    33ms frame period, then lane model gets remaining 18ms. Result: pedestrian P99 = 12ms, lane model
    P99 = 42ms, total power = 45W.'
  common_mistake: Assuming CUDA supports true kernel preemption. NVIDIA GPUs use cooperative preemption
    at best — a running kernel must reach a preemption point before yielding. Long-running kernels can
    block high-priority work for milliseconds.
  napkin_math: 'Shared GPU: pedestrian waits up to 20ms for lane kernel to finish → P99 = 35ms. DLA offload:
    lane model on DLA = 25ms (DLA is slower but dedicated). GPU free for pedestrian: P99 = 12ms. Power:
    GPU at 35W + DLA at 10W = 45W < 60W. Time-slice: 15ms GPU + 18ms GPU = 33ms per frame, both models
    fit in 30fps cycle.'
