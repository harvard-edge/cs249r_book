schema_version: 1
id: edge-cell-10132
title: Optimize EfficientNet-Lite for Jetson Orin with TensorRT and INT8 calibration
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are deploying EfficientNet-Lite0 (4.7M params, 0.35 GFLOPs) on Jetson Orin (275 TOPS, 60W)
  for a real-time anomaly detection system at 60 FPS. The TF-Lite baseline achieves 45 FPS. Using TensorRT
  INT8 on Jetson Orin's Ampere GPU, optimize to achieve 60 FPS while keeping average power below 15W.
details:
  realistic_solution: Utilization = 21 GFLOPs / 69 TFLOPs = 21G/69T = 0.03% (not 30%). The error confuses
    GFLOPS with TFLOPS units.
  common_mistake: Running TensorRT optimization in MAXN power mode (60W) during calibration and deployment,
    which exceeds the 15W power budget; needing to use Jetson's nvpmodel to set power profile to 15W and
    re-validate throughput in that mode.
  napkin_math: 'GPU utilization: actual FLOPs / peak FLOPs. Actual: 21 GFLOPs workload. Hardware: 69 TFLOPS
    peak. Utilization = 21G / 69T = 21×10^9 / 69×10^12 = 3.04×10^-4 = 0.0304% ≈ 0.03% (not 30% — 30% would
    require 20.7 TFLOPs actual workload).'
