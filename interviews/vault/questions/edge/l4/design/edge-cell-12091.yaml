id: edge-cell-12091
title: 'Model Size Estimation: Design Memory Layout for Multi-Model Edge Vision System'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Design the memory layout for an edge vision system on Jetson Orin (32GB LPDDR5, 204 GB/s) running
  4 concurrent models: face detection (10M params INT8), license plate OCR (8M params INT8), crowd density
  estimation (15M params FP16), and anomaly detection (20M params FP16). All models must be resident in
  memory simultaneously for <5ms switching latency.'
details:
  realistic_solution: 'Weights: face 10MB + OCR 8MB + crowd 30MB + anomaly 40MB = 88MB. TensorRT engines
    (1.3× overhead): 10×1.3+8×1.3+30×1.3+40×1.3=114.4MB. Working activation memory (largest model, batch=4):
    crowd density 15M params → peak activation ~60MB. Total resident: 114.4+60 = 174.4MB of 32GB LPDDR5
    = 0.5%. Trivially fits. Switching: engines already in memory, switch = change inference stream. Latency:
    ~0.5ms (CUDA context switch). Well under 5ms.'
  common_mistake: Loading models on-demand from NVMe (reducing memory pressure but adding 10-50ms load
    time), when the problem specifies <5ms switching — models must be pre-loaded.
  napkin_math: 'Weights: 10+8+30+40=88MB (INT8 for first two, FP16 for latter). TensorRT: ×1.3=114MB.
    Max activation (anomaly 20M FP16 at 640×640 input): 640×640×128 channels × 2B = 104MB peak. But pipelining:
    only 1 model infers at a time → 1 activation buffer. Total: 114+104=218MB of 32GB (0.68%). 31.78GB
    free for camera buffers, OS, other apps.'
