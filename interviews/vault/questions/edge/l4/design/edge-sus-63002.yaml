schema_version: 1
id: edge-sus-63002
title: On-Device DP Inference for Medical Wearables
topic: differential-privacy
status: published
provenance: imported
scenario: A cardiac monitoring wearable runs a 500K-parameter arrhythmia classifier locally. Regulations
  require that the device not leak raw ECG signals to the cloud. A privacy engineer proposes adding Gaussian
  noise to the model's output logits before transmitting alert decisions. Evaluate this local differential
  privacy (LDP) approach versus keeping inference entirely on-device.
details:
  realistic_solution: 'On-device inference with no cloud transmission is strictly stronger from a privacy
    standpoint and feasible at 500K parameters. A 500K INT8 model requires ~500KB — fits in Cortex-M55
    SRAM. For the specific case where some signal must be transmitted (e.g., alert flags), use randomized
    response with calibrated flip probability: P(transmit true) = e^ε/(e^ε+1), achieving ε-LDP on the
    binary decision. For ε=1: flip probability = 1 - e^1/(e^1+1) ≈ 0.27. At 99.5% sensitivity clinical
    target, the LDP noise floor limits this approach — stay on-device.'
  common_mistake: Confusing output perturbation (adding noise to logits) with input perturbation or DP-SGD.
    Output perturbation on a classifier with only 2 outputs (normal/abnormal) provides very weak privacy
    — the high sensitivity of the argmax function means you need enormous noise to achieve ε < 10, which
    destroys clinical accuracy.
  napkin_math: '500K params × 1 byte (INT8) = 500KB. Cortex-M55 SRAM: 512KB–2MB — fits. Inference: 500K
    MACs at 100 MOPS = 5ms. Randomized response for ε=1: P(correct output) = e^1/(e^1+1) = 0.731. Effective
    sensitivity = 0.731 × 0.995 ≈ 72.8% — well below 99.5% clinical target. On-device with no transmission
    is the correct architecture.'
