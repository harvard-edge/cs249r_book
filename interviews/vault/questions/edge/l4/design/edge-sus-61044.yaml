id: edge-sus-61044
title: Adapter Compression for Bandwidth-Constrained Edge Deployment
topic: model-adaptation-systems
status: published
provenance: imported
scenario: You need to OTA-update LoRA adapters to 10,000 edge devices over a cellular network with 1 Mbps
  average bandwidth. Design the adapter update delivery system.
details:
  realistic_solution: 'Rank-16 adapter (7B model): 2 × 16 × 4096 × 32 layers × 2B = 67 MB. Over 1 Mbps:
    67 MB × 8 / 1 Mbps = 536 seconds — 9 minutes per update, acceptable for nightly OTA. For weekly incremental
    updates, delta compression (adapter_v2 - adapter_v1): typical delta 5-10% of full size = 3-7 MB →
    24-56 seconds over 1 Mbps — excellent. Use adapter quantization (FP16 → INT8) for further 2x size
    reduction at minimal quality loss.'
  common_mistake: Sending full adapter weights even though rank-16 adapters are already small. Engineers
    ignore that delta compression between adapter versions can reduce update sizes by 10-100x for incremental
    weekly updates.
  napkin_math: 'Rank-16 full adapter: 67 MB. Delta update (10% change): 6.7 MB. INT8 quantized delta:
    3.35 MB. Transfer at 1 Mbps: 3.35 MB × 8 / 1 Mbps = 26.8 seconds. 10,000 devices: if pushed simultaneously
    with CDN, bandwidth cost = 10K × 3.35 MB = 33.5 GB/week. CDN egress ~$0.01/GB: $0.335/week — negligible.'
