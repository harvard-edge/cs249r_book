id: cloud-fill2-32021
title: Demand Paging for Edge Model Deployment
topic: memory-mapped-inference
status: published
provenance: imported
scenario: 'You deploy a 3B parameter model (6 GB in FP16) on a Jetson Orin with 32 GB unified memory (shared
  between CPU and GPU). The device runs 3 concurrent inference services. Using traditional loading, each
  service loads its own copy: 3 × 6 GB = 18 GB, leaving only 14 GB for activations, KV cache, and OS.
  How does mmap with unified memory solve this, and what are the latency implications?'
details:
  realistic_solution: 6GB / 128KB = 49,152 page faults × 120μs = 5.9 seconds of fault overhead (not ~2
    seconds).
  common_mistake: Assuming mmap eliminates all memory pressure. The OS still needs to manage page tables
    and can evict pages under memory pressure, causing latency spikes from re-faulting.
  napkin_math: 'Page fault overhead: 6GB model / 128KB page size = 49,152 page faults. Each fault takes
    120μs. Total = 49,152 × 120μs = 5,898,240μs = 5.9 seconds (not ~2 seconds — 2 seconds would require
    16,667 faults or 40μs per fault).'
