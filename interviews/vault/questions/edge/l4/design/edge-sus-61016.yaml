id: edge-sus-61016
title: Chiplet Design for Edge Inference Power Constraints
topic: chiplet-architecture
status: published
provenance: imported
scenario: You are designing an edge inference accelerator with a 10W TDP. Explain why a chiplet approach
  (e.g., 2× 5W dies) is preferable to a single 10W monolithic die for this power envelope.
details:
  realistic_solution: At 10W TDP, a monolithic die must throttle more aggressively because any hot spot
    on the die affects the whole package. Two 5W chiplets can thermal-throttle independently — if one
    chiplet handles sparse attention (lower power), the other handles dense FFN (higher power) and each
    stays within its local thermal budget. Additionally, smaller 5W dies have better yield and can be
    binned to match performance requirements.
  common_mistake: Assuming chiplets always add power overhead from die-to-die links. At edge scale, the
    yield advantage of smaller dies dominates, and die-to-die links at short distances (interposer) consume
    <100mW, negligible at 10W TDP.
  napkin_math: 'Jetson Orin (60W, 275 TOPS) as reference. Scaling to 10W: ~46 TOPS. Single 10W die yield
    at 7nm (D₀=0.05, A=1.2 cm²): Y=(1+0.05×1.2/2)^-2 ≈ 94.2%. Two 5W chiplets (A=0.6 cm² each): Y=(1+0.05×0.6/2)^-2
    ≈ 97.1% each. Dual chiplet P(both good)=0.971²=94.3% — comparable yield with better thermal management.'
