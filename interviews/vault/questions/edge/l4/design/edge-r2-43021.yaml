schema_version: 1
id: edge-r2-43021
title: Storage Format for Edge Inference on Jetson Orin
topic: storage-format-selection
status: published
provenance: imported
scenario: Your Jetson Orin (32 GB LPDDR5, 60W) runs an object detection model that must load a 500K image
  calibration dataset from a 256 GB NVMe SSD for periodic recalibration. The recalibration must complete
  within 10 minutes. The dataset is currently stored as individual JPEG files in nested directories. Estimate
  I/O time and choose a better format.
details:
  realistic_solution: 'Individual files: each open() + read() + close() takes ~0.5ms of syscall overhead
    on Linux, even with NVMe. 500K files × 0.5ms = 250 seconds = 4.2 minutes just in syscall overhead,
    before any data transfer. With directory traversal (nested dirs), readdir() adds another 1-2 minutes.
    Total: 6+ minutes of metadata overhead on a 10-minute budget, leaving only 4 minutes for actual processing.
    Solution: pack images into tar shards (WebDataset format) or a SQLite database. Tar shards: 100 MB
    each, 1,000 shards. Sequential reads eliminate per-file syscall overhead. SQLite: single file, B-tree
    index for random access by image_id. On Jetson, SQLite is particularly attractive because the entire
    index fits in memory and the single-file format simplifies deployment.'
  common_mistake: Assuming NVMe bandwidth is the bottleneck. At 3.5 GB/s sequential and 500K × 200 KB
    = 100 GB, sequential reads would take 29 seconds. The real bottleneck is filesystem metadata — 500K
    small file opens on ext4 generate enormous inode lookup overhead.
  napkin_math: 'Individual files: 500K × 0.5ms open/read/close = 250s + directory walk 90s = 340s (5.7
    min). Data transfer: 100 GB / 3.5 GB/s = 29s. Total: 370s. Tar shards (1,000 × 100 MB): 1,000 opens
    + sequential read at 3.5 GB/s = 0.5s + 29s = 29.5s. Speedup: 12.5×. SQLite (single file, indexed):
    1 open + 100 GB sequential = 29s + index overhead ~2s = 31s. Both formats meet 10-min budget with
    9+ minutes for actual processing.'
