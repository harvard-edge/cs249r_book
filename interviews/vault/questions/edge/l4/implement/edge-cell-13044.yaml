schema_version: 1
id: edge-cell-13044
title: 'Edge Queueing Theory Implement: Service Rate from Latency Spec'
topic: queueing-theory
status: published
provenance: imported
scenario: Implement the M/D/1 service rate calculation for a Jetson Orin (32GB LPDDR5, 275 TOPS INT8)
  that must maintain P99 latency < 50ms for a face recognition pipeline with λ=50 req/s. Solve for the
  required μ (inferences/second) that satisfies the P99 constraint, and then verify if Jetson Orin can
  achieve this with MobileNetV2-FaceNet (0.6 GOPS INT8).
details:
  realistic_solution: M/D/1 Wq = ρ/(2μ(1-ρ)) = 0.5/(2×200×0.5) = 0.0025s. W = Wq + 1/μ = 0.0025 + 0.005
    = 0.0075s = 7.5ms.
  common_mistake: Using M/M/1 (exponential) formula instead of M/D/1 (deterministic) for compute-bound
    inference workloads, which gives twice the Wq and thus an overly conservative μ requirement.
  napkin_math: 'M/D/1 queue: ρ=0.5, μ=200/s. This question uses ρ² correctly: Wq = ρ²/(2μ(1-ρ)) = 0.25/(2×200×0.5)
    = 0.25/200 = 0.00125s = 1.25ms. Sojourn time W = Wq + 1/μ = 1.25ms + 5ms = 6.25ms... wait: checking
    — M/D/1 standard formula IS Wq = ρ²/(2λ(1-ρ)) which equals ρ/(2μ(1-ρ)). Both are equivalent. With
    λ=100, μ=200: ρ=0.5. Wq = 0.5/(2×200×0.5) = 0.5/200 = 0.0025s = 2.5ms. W = 2.5ms + 5ms = 7.5ms...
    original says W=0.0125s=12.5ms. Rechecking: the question has M/D/1 with specific parameters — preserving
    the structure, the fix is ensuring ρ not ρ² in Wq = ρ/(2μ(1-ρ)) = 0.5/(200) = 0.0025s. W = 0.0025
    + 1/200 = 0.0025 + 0.005 = 0.0075s = 7.5ms.'
