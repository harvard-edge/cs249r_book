schema_version: 1
id: edge-cell-13118
title: 'Edge TCO Implement: Calculate Cost Per Inference for Edge Model'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Implement the complete cost-per-inference calculation for a Jetson Orin (32GB LPDDR5, 275 TOPS
  INT8, 60W, $499) deployed for 3 years at a supermarket checkout, running at 5 inferences/second during
  business hours (12hr/day, 365 days/year). Include hardware amortization, power (active 60W, idle 15W),
  and maintenance (3% hardware/year).
details:
  realistic_solution: 'Active hours: 12hr/day * 365 * 3 = 13,140hr. Idle hours: 12hr/day * 365 * 3 = 13,140hr
    (closed store). Active power: 60W. Idle power: 15W. Total energy: (13140*60 + 13140*15)/1000 = (788.4
    + 197.1) kWh = 985.5 kWh over 3yr. Power cost: 985.5 * $0.10 = $98.55. Maintenance: 3% * $499 * 3yr
    = $44.91. Total TCO: $499 + $98.55 + $44.91 = $642.46. Total inferences: 5/s * 12hr * 3600s * 365
    * 3 = 5 * 47,304,000 = 236,520,000 ≈ 236M. Cost/inference: $642.46 / 236M = $2.72e-6 = 2.72 micro-$/inference.'
  common_mistake: Assuming the device runs at full 60W during idle hours when most edge devices have power
    management, and not separating active vs idle power states in the calculation.
  napkin_math: 'Active energy: 60W*13140hr=788.4kWh. Idle: 15W*13140hr=197.1kWh. Total: 985.5kWh. Power
    cost: $98.55. TCO: $499+$98.55+$44.91=$642.46. Inferences: 5*43200s/day*365*3=236.52M. $/inf: $642.46/236.52M=$2.72μ$/inf.
    Comparison: cloud at $0.001/inf=$1000μ$/inf. Edge is 368x cheaper. If model uses only 10% of Jetson:
    at 5 inf/s, Jetson runs YOLOv8 at 5000+ FPS capacity. Could run 1000 inference tasks at 5/s each simultaneously.
    True cost/inference-capacity: $2.72μ$ / 1000x capacity = $2.72 nano-$ per inference-capability.'
