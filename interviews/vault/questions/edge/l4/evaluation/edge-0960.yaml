id: edge-0960
title: Edge New 0023
topic: pruning-sparsity
status: published
provenance: imported
scenario: A 512KB lookup table for a DSP algorithm doesn't fit in the Cortex-M4's 256KB SRAM. You cache
  the most active 128KB in SRAM and read the rest from Flash. Analyze the latency tradeoff assuming an
  80% cache hit rate.
details:
  realistic_solution: Flash memory requires significant CPU wait states, whereas SRAM is zero-wait-state.
    By implementing a software caching mechanism, the system exploits spatial and temporal locality. The
    tradeoff involves the memory overhead to maintain cache tags and the CPU cycles to calculate hits/misses.
    Since 80% of accesses resolve in 1 cycle, the aggregate latency drops massively compared to running
    the entire table from Flash.
  common_mistake: Neglecting the software overhead cycles required to check the cache tags in C code when
    analyzing hit/miss ratios on MCUs.
  napkin_math: 'Flash access = 10 cycles. SRAM access = 1 cycle. 100% Flash = 10 cycles average. Cached
    (80% hit): (0.8 * 1) + (0.2 * 10) + software overhead (~2 cycles) = 0.8 + 2.0 + 2 = 4.8 cycles average.
    Execution speed doubles.'
