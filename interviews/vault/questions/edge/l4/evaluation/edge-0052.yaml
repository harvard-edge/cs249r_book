id: edge-0052
title: The Phantom Sensor Attack
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your autonomous ground vehicle relies on GPS, IMU, and a wheel encoder for localization. Malicious
  actors have developed sophisticated GPS spoofing devices that can broadcast fake GPS signals, making
  your vehicle believe it's in a different location. How do you design your sensor fusion and localization
  system to detect and mitigate such GPS spoofing attacks, ensuring the vehicle maintains accurate and
  trustworthy localization, even in an isolated edge environment without cloud verification?
details:
  realistic_solution: "A multi-layered approach leveraging sensor redundancy and consistency checks:\n\
    \  1.  **Multi-Sensor Fusion with Robust Estimators:** Use a state estimator (e.g., EKF, UKF, Factor\
    \ Graph Optimization) that fuses GPS, IMU, and wheel encoder data. The key is that the IMU and wheel\
    \ encoder provide *relative* motion, while GPS provides *absolute* position.\n  2.  **Innovation Monitoring:**\
    \ The state estimator predicts the vehicle's position based on IMU and wheel encoder inputs. It then\
    \ compares this prediction to the GPS measurement (the \"innovation\"). A consistently large innovation,\
    \ especially after applying the expected noise characteristics, is a strong indicator of GPS spoofing.\n\
    \  3.  **Cross-Modal Consistency Checks:**\n      *   **Velocity Consistency:** Compare GPS-derived\
    \ velocity with IMU-derived velocity (from integration) and wheel encoder velocity. If GPS velocity\
    \ significantly deviates from the other two, it's suspicious.\n      *   **Acceleration Consistency:**\
    \ Compare GPS-derived acceleration with IMU-measured acceleration.\n      *   **Position Consistency:**\
    \ If the vehicle has a map (even a local SLAM map), compare the GPS position to the estimated position\
    \ within the map based on visual/Lidar SLAM. A large discrepancy indicates an issue.\n  4.  **Signal\
    \ Quality Analysis:** Monitor raw GPS signal characteristics (e.g., signal strength from different\
    \ satellites, Carrier-to-Noise ratio, expected satellite constellation vs. observed). Spoofing devices\
    \ often transmit signals with unrealistic power levels or from an inconsistent set of satellites.\n\
    \  5.  **Redundant Absolute Sensors:** If available, incorporate other absolute positioning sensors\
    \ like Lidar-based localization against a pre-built HD map, or visual odometry against known landmarks.\
    \ These provide independent verification of position.\n  6.  **Anomaly Detection on GPS Data:** Implement\
    \ ML-based anomaly detection on the GPS data stream itself, looking for patterns that deviate from\
    \ typical GPS behavior (e.g., sudden jumps, inconsistent velocity, unrealistic satellite configurations).\n\
    \  7.  **Graceful Degradation & Fallback:** If GPS spoofing is detected with high confidence:\n  \
    \    *   **Disregard GPS:** The state estimator should temporarily or permanently stop trusting GPS\
    \ measurements.\n      *   **Rely on Dead Reckoning:** Fall back to IMU and wheel encoder data for\
    \ relative localization (dead reckoning). This will accumulate drift but provides a temporary solution.\n\
    \      *   **Safety Protocol:** Trigger a safety protocol (e.g., slow down, stop, request human intervention,\
    \ re-plan route to a safe zone using only dead reckoning)."
  common_mistake: '"Just use cryptographic GPS receivers." While these exist (e.g., Galileo''s OSNMA),
    they are not universally available or might not protect against all forms of spoofing. The question
    focuses on a general solution for existing hardware.'
  napkin_math: An IMU might drift 1 meter/minute in position without correction. GPS provides ~1-3m accuracy.
    If GPS reports a 50m jump in position within 1 second, while the IMU and wheel encoder report only
    0.5m movement, the innovation for GPS is ~49.5m. This is significantly higher than typical noise (e.g.,
    3m), indicating spoofing. A 100Hz IMU update provides 100 opportunities per second to detect discrepancies.
