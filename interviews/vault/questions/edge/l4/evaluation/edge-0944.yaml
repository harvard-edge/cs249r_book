title: Edge New 0005
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Running a Vision Transformer on Orin. Increasing the patch sequence length from 256 to 1024
  increases attention FLOPs quadratically but only increases memory reads linearly. Analyze how this shifts
  the execution bottleneck.
details:
  realistic_solution: Transformers at short sequence lengths often hover near the memory-bound region
    because the weight-fetching overhead dominates the self-attention compute. As sequence length increases
    to 1024, the O(N^2) complexity of the self-attention mechanism sharply increases the arithmetic intensity.
    The tradeoff provides higher contextual accuracy for the vision model, but shifts the execution squarely
    into the compute-bound region, heavily taxing the Orin's TOPS.
  common_mistake: Treating sequence length scaling as a linear penalty on edge devices, ignoring the quadratic
    compute explosion of full attention.
  napkin_math: 'N=256: Compute ~ 256^2 = 65k FLOPs. Memory ~ 256 tokens. N=1024: Compute ~ 1024^2 = 1M
    FLOPs. Memory ~ 1024 tokens. Compute grew 16x while memory grew 4x. Arithmetic intensity multiplied
    by 4, crossing the roofline ridge point.'
