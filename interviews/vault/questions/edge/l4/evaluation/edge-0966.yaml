schema_version: 1
id: edge-0966
title: Edge New 0030
topic: pruning-sparsity
status: published
provenance: imported
scenario: A T4 GPU runs continuous batching. A new request requiring a 500ms prefill phase arrives while
  the GPU is decoding tokens at 20ms/token for an active user. Analyze the chunked prefill tradeoff.
details:
  realistic_solution: If the GPU executes the 500ms prefill as a single monolithic block, the active user's
    generation will stutter for half a second, destroying the interactive SLA. Chunked prefill breaks
    the context encoding into smaller 50ms blocks, interleaving them with the decode steps. The tradeoff
    maintains the 20ms decoding cadence at the expense of slightly extending the total time-to-first-token
    for the new incoming request.
  common_mistake: Optimizing purely for lowest Time-To-First-Token (TTFT), resulting in catastrophic stuttering
    for all currently decoding users.
  napkin_math: 'Unchunked: User 1 waits 500ms. User 2 TTFT = 500ms. Chunked (10 blocks of 50ms): Cycle
    = 50ms prefill + 20ms decode = 70ms. User 1 token time = 70ms. User 2 TTFT = 10 * 70ms = 700ms. User
    1 never experiences massive stutter.'
