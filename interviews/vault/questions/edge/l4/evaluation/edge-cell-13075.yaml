schema_version: 1
id: edge-cell-13075
title: 'Edge Systolic Array Evaluation: Hailo-8 vs Coral TPU Dataflow Efficiency'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Compare Hailo-8 (26 TOPS INT8, 2.5W) vs Coral Edge TPU (4 TOPS INT8, 2W) for deploying EfficientNet-Lite0
  (INT8, 407M FLOPs, 4.7M params). Calculate throughput, latency, TOPS utilization percentage, and energy
  per inference. Which chip achieves better MFU and why?
details:
  realistic_solution: 'EfficientNet-Lite0: 407M FLOPs (not OPS — but assume GOPS ≈ GFLOPS for INT8). Batch=1.
    Coral: μ = 4000/0.407 = 9826 FPS. Hailo-8: μ = 26000/0.407 = 63,882 FPS. At batch=1, this is the theoretical
    compute-bound limit. Actual (memory bound): Coral BW ≈ 4GB/s (LPDDR4). Weight: 4.7MB. Time_mem = 4.7MB/4GB/s
    = 1.18ms. FPS = 850. Hailo-8 BW ≈ 6GB/s: Time_mem = 4.7MB/6GB/s = 0.78ms. FPS = 1280. Coral MFU =
    actual/theoretical = 850/9826 = 8.7%. Hailo MFU = 1280/63882 = 2%. Coral has higher MFU! Both memory
    bound, Coral''s lower peak makes it appear more utilized.'
  common_mistake: Computing TOPS utilization as FLOPs/TOPS without considering that at very high arithmetic
    intensity, both chips can achieve near-peak utilization, but at low batch sizes the memory-bound regime
    makes TOPS utilization irrelevant.
  napkin_math: 'EfficientNet-Lite0: 407M OPS, 4.7M params INT8. Coral (4 TOPS, BW~4GB/s): compute time=407M/4T=0.102ms,
    mem time=4.7MB/4GB/s=1.175ms. BW bound. FPS=1000/1.175=851. Power=2W. Energy=2W/851FPS=2.35mJ/inf.
    Hailo-8 (26 TOPS, BW~6GB/s): compute=407M/26T=0.016ms, mem=4.7/6000=0.78ms. FPS=1282. Power=2.5W.
    Energy=2.5/1282=1.95mJ/inf. Hailo-8: 1.51x more throughput, 1.21x less energy. MFU: Coral=8.7%, Hailo=2%.
    TOPS utilization misleading when memory bound.'
