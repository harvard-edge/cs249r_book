id: edge-0955
title: Edge New 0016
topic: duty-cycling
status: published
provenance: imported
scenario: An IoT node (Cortex-M4) draws 30mW active and 0.1mW sleeping. An inference takes 10ms. Analyze
  the energy tradeoff of continuously capturing and analyzing data versus duty-cycling the MCU to run
  only once every 100ms.
details:
  realistic_solution: Continuous listening guarantees zero missed events but burns continuous active power,
    draining batteries rapidly. Duty-cycling keeps the MCU in deep sleep 90% of the time, dramatically
    reducing average power consumption at the risk of missing brief anomalies. The optimal tradeoff utilizes
    a low-power hardware interrupt (e.g., an analog threshold sensor) to trigger the wake-up, combining
    the energy efficiency of sleep with the reliability of continuous monitoring.
  common_mistake: Ignoring the 0.1mW sleep baseline and wake-up transition energy, leading to overly optimistic
    battery life calculations.
  napkin_math: 'Continuous: 1000ms * 30mW = 30mJ/sec. Duty-cycled: 10 inferences/sec. Active time = 100ms,
    Sleep = 900ms. (100 * 30mW + 900 * 0.1mW) / 1000 = (3000 + 90) / 1000 = 3.09mJ/sec. Reduces energy
    by ~90%.'
