title: The Optimization Ladder
topic: kernel-fusion
status: published
provenance: imported
scenario: Your YOLOv8-S runs at 15 FPS on a Jetson Orin NX. You need 30 FPS. Your team immediately starts
  designing a custom smaller architecture. Why is this the wrong first step?
details:
  realistic_solution: 'Designing a custom architecture is wrong because you haven''t exhausted the optimization
    ladder — a prioritized sequence from cheapest to most expensive. Step 1: Export to TensorRT with FP16
    (~1.8x speedup, 2 hours of work) = 27 FPS. Step 2: INT8 quantization with calibration (~1.7x additional,
    4 hours) = 46 FPS. You''ve already exceeded 30 FPS with 2 days of engineering. A custom architecture
    requires months of design, training, and validation. The ladder: (1) compiler optimization, (2) precision
    reduction, (3) operator fusion, (4) pruning/distillation, (5) architecture change. Always exhaust
    cheaper rungs first.'
  common_mistake: '"We need a smaller model — let''s try YOLOv8-N or train a custom architecture." Architecture
    changes are the most expensive optimization and should be the last resort.'
  napkin_math: 'Baseline (PyTorch FP32): 15 FPS. After Step 1 (TensorRT FP16): 15 × 1.8 = 27 FPS. After
    Step 2 (INT8): 27 × 1.7 = 46 FPS. Already 1.5× over target — no need for Steps 3-5. Engineering time:
    2 hours vs 2 months for a custom architecture.'
