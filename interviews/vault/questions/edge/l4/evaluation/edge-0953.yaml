status: published
provenance: imported
scenario: A robotic arm uses Orin. Preprocessing an image takes 5ms on the ARM CPU or 1ms on the GPU.
  However, transferring the image to the GPU kernel costs 2ms. Analyze the latency tradeoff between CPU
  preprocessing vs GPU offloading for a 60 FPS loop.
details:
  realistic_solution: Processing on the CPU takes 5ms, avoiding transfer overhead. Offloading to the GPU
    takes 2ms (transfer) + 1ms (compute) = 3ms. While GPU offloading is technically 2ms faster, it forces
    the GPU to context switch from the main inference task, potentially starving the AI model. For a 60
    FPS loop (16.6ms), a 5ms CPU preprocess comfortably fits in parallel with the previous frame's GPU
    inference, making CPU the better systemic pipeline choice.
  common_mistake: Blindly migrating all mathematical operations to the GPU to lower isolated micro-benchmarks,
    creating severe resource contention in pipelined systems.
  napkin_math: 'CPU approach: Pipeline stage 1 (CPU) = 5ms. Stage 2 (GPU Inference) = ~10ms. Max pipeline
    latency = 10ms. GPU approach: Stage 1 (GPU Pre) = 3ms. Stage 2 (GPU Inf) = 10ms. Total GPU time =
    13ms. CPU offloading yields better hardware concurrency.'
