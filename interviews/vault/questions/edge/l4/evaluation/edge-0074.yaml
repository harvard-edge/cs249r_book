id: edge-0074
title: The Sealed Enclosure Thermal Trap
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your edge AI device runs a 15W SoC inside an IP67-sealed aluminum enclosure (no fans, no vents)
  deployed outdoors in Phoenix, Arizona. Peak ambient temperature: 50°C. The SoC''s maximum junction temperature
  (Tj_max) is 105°C. Your thermal engineer says the enclosure''s thermal resistance from junction to ambient
  is 3.2°C/W. Will the device survive summer, and if not, what do you do?'
details:
  realistic_solution: 'First, do the thermal math to see how bad it is: Thermal budget: Tj_max (105°C)
    - T_ambient_worst (50°C) - solar_adder (20°C) = 35°C margin for power dissipation. At 3.2°C/W: max
    sustained power = 35/3.2 = **10.9W**. Your 15W SoC exceeds this by 37%'
  common_mistake: '"Add a bigger heatsink." In a sealed IP67 enclosure, the heatsink is the enclosure
    itself. You can''t add fins or increase surface area without changing the enclosure design, which
    affects the mechanical, ingress protection, and mounting specifications. The thermal path is: junction
    → thermal pad → enclosure wall → ambient air (natural convection + radiation). A "bigger heatsink"
    means a bigger (heavier, more expensive) enclosure.'
  napkin_math: 'Thermal budget: Tj_max (105°C) - T_ambient_worst (50°C) - solar_adder (20°C) = 35°C margin
    for power dissipation. At 3.2°C/W: max sustained power = 35/3.2 = **10.9W**. Your 15W SoC exceeds
    this by 37%. With white enclosure (solar adder = 5°C): margin = 50°C, max power = 50/3.2 = 15.6W.
    Barely fits. With improved thermal interface (2.7°C/W) + white enclosure: max power = 50/2.7 = 18.5W.
    Comfortable 23% margin. Cost of white powder coating: $2/enclosure. Cost of thermal gap pad upgrade:
    $1.50/unit. Total fix: $3.50/unit to prevent $500 field replacement.'
