id: edge-0546
title: The Autonomous Drone's Latency Crisis
topic: data-parallelism
status: published
provenance: imported
scenario: You are the lead ML Systems Engineer for a new autonomous delivery drone. The perception system
  uses two co-packaged accelerator chips on a single board, connected by a high-speed 50 GB/s custom interconnect.
  The new perception model is a 400MB Vision Transformer that exceeds the 256MB on-chip SRAM of a single
  accelerator. The drone has a hard real-time deadline of 33ms per frame to detect and avoid obstacles.
details:
  realistic_solution: Pipeline parallelism is the superior strategy in this edge context. The core issue
    is the communication overhead relative to the latency budget.
  common_mistake: Engineers accustomed to datacenter environments often assume tensor parallelism is the
    default solution for large models. They underestimate the massive performance gap between datacenter
    interconnects like NVLink (900 GB/s) and even high-end edge interconnects (50 GB/s). This leads them
    to ignore the crippling cumulative latency penalty from the frequent All-Reduce operations required
    by tensor parallelism in a relatively lower-bandwidth regime.
  napkin_math: Splitting a 20-layer ViT across two chips means passing intermediate activations over the
    50 GB/s interconnect. If layer 10 outputs a 20 MB activation tensor, moving it takes 20 MB / 50 GB/s
    = 0.4 ms. If inference compute per chip takes 12.5 ms (half of 25ms), the 0.4 ms transfer adds only
    3.2% overhead. The high-speed interconnect makes pipeline parallelism highly efficient for this model.
