id: edge-0954
title: Edge New 0015
topic: pipeline-parallelism
status: draft
provenance: imported
scenario: A drone on Orin runs a detector (10ms) followed by a tracker (15ms). Analyze the real-time tradeoff
  between running them sequentially per frame versus setting up a pipeline parallel architecture across
  different processing streams.
details:
  realistic_solution: Running sequentially means frame N completes in 25ms, yielding 40 FPS, with minimal
    memory overhead. Pipeline parallelism allows the detector to process frame N+1 while the tracker processes
    frame N. The bottleneck becomes the longest stage (15ms), yielding 66 FPS. The tradeoff is increased
    memory consumption for buffering intermediate activations and a 1-frame latency delay. For high-speed
    drones, the 66% FPS boost is worth the buffer cost.
  common_mistake: Confusing throughput with latency; assuming that pipelining a workload automatically
    reduces the time it takes a single frame to traverse the system.
  napkin_math: 'Sequential latency: 10 + 15 = 25ms (40 FPS). Pipelined throughput: 1 / 15ms = 66.6 FPS.
    Pipelined latency for a single frame: 15ms (stage 1 wait) + 15ms (stage 2) = 30ms. You trade 5ms of
    absolute latency for a 26 FPS throughput gain.'
