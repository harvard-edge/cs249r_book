schema_version: 1
id: edge-0046
title: The Post-Repair Calibration Disaster
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your Qualcomm RB5-based autonomous cart uses stereo cameras for obstacle avoidance. A field
  technician replaces a cracked left camera lens. After repair, the cart starts veering right and bumping
  into obstacles on the left side. The new lens is the same model number as the original. Depth estimation
  error has jumped from ±3cm to ±40cm on the left side. What did the technician miss?
details:
  realistic_solution: Stereo depth estimation depends on precise knowledge of each camera's intrinsic
    parameters (focal length, principal point, distortion coefficients) and the extrinsic parameters (relative
    position and rotation between the two cameras). These are computed during factory calibration using
    a checkerboard pattern and stored in a calibration file on the device.
  common_mistake: '"The new lens is defective." Same model number lenses have manufacturing tolerances
    that are normally acceptable — the issue is that the system''s calibration is now invalid.'
  napkin_math: 'Focal length tolerance: ±5% = ±0.18mm on 3.6mm lens. Depth error from focal length alone:
    5% at all ranges. At 2m: ±10cm. Distortion mismatch: adds spatially varying error up to ±30cm at image
    edges. Combined: ±40cm at 2m (matches observation). Recalibration time: 15 minutes + 5 minutes processing.
    Pre-calibrated assembly cost premium: ~$5/unit (QR code + factory calibration). Collision cost without
    recalibration: potential product damage, liability, recall.'
