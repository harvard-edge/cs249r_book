id: edge-0765
title: The Edge AI Cost Model That Fooled the CFO
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Your team presents an edge AI cost model to the CFO: 5,000 Coral Dev Boards at $150 each =
  $750K, amortized over 3 years = $250K/year. The CFO approves. Eighteen months in, the actual annual
  spend is $1.8M — 7× over budget. The hardware cost was accurate. Where did the money go?'
details:
  realistic_solution: 'Hardware is only ~14% of edge AI TCO. The missing 86% ($1.55M/year) comes from:
    (1) connectivity/networking at $150/device/year for cellular backhaul ($750K), (2) software updates
    and OTA management requiring 2 FTEs ($400K), (3) power and installation at $55/device/year ($275K),
    (4) monitoring and MLOps tooling ($100K), and (5) field service for the 3% annual hardware replacement
    plus firmware debugging ($25K). The correct model multiplies hardware cost by 6-8x for true TCO.'
  common_mistake: '"The hardware must have had a high failure rate." The 3% annual failure rate was within
    budget. The overrun is in operational costs the model didn''t capture.'
  napkin_math: 'Hardware-only model: $250K/year (CFO-approved). Actual TCO: $1.8M/year. Hardware as %
    of TCO: 14%. The rule of thumb: **multiply edge hardware cost by 6–8× for true TCO**. For the CFO
    presentation, the correct framing: "$150/device to buy, $360/device/year to operate."'
