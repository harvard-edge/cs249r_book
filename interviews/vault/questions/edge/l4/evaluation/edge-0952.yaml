id: edge-0952
title: Edge New 0013
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A T4 edge server must meet a strict 50ms latency SLA for a dynamic workload. The model takes
  10ms of baseline overhead plus 2ms per item in the batch. Analyze the dynamic batching timeout and max
  batch size tradeoff.
details:
  realistic_solution: Dynamic batching groups asynchronous requests over a time window. To strictly guarantee
    the 50ms SLA, the sum of the maximum wait time (timeout window) and the compute time (10ms + 2ms *
    N) must not exceed 50ms. The tradeoff balances throughput (larger N) against the timeout window. A
    larger timeout catches more requests but requires smaller batches to finish in time. An optimal balance
    splits the budget evenly.
  common_mistake: Setting the timeout exactly to the SLA limit, forgetting that the actual model computation
    time will subsequently push the total latency beyond the SLA.
  napkin_math: Wait_Time + Compute_Time <= 50ms. If Wait_Time = 10ms, Compute_Time <= 40ms -> 10 + 2N
    <= 40 -> 2N <= 30 -> N=15 max batch size. Throughput = 15 items / 50ms = 300 items/sec.
