id: edge-0950
title: Edge New 0011
topic: real-time-deadlines
status: published
provenance: imported
scenario: An Orin SoC handles 4 independent 1080p camera streams (6MB per frame) at 30 FPS. Analyze the
  real-time tradeoff of batching all 4 frames into a single inference call versus running 4 concurrent
  single-batch inference streams.
details:
  realistic_solution: Batching 4 frames together maximizes GPU Tensor Core utilization and reduces kernel
    launch overhead, but forces the pipeline to wait for the last camera's frame to arrive, adding buffering
    latency. Concurrent single-batch streams minimize latency for each specific camera but increase CPU
    overhead and GPU context switching. For a 30 FPS target (33ms budget), the batching wait time is negligible
    if cameras are hardware-synchronized.
  common_mistake: Assuming batching inherently destroys real-time capabilities without measuring the actual
    frame synchronization offset.
  napkin_math: 'Data rate: 4 * 6MB * 30FPS = 720 MB/s. Batching wait: 0ms if synchronized, up to 33ms
    if out of phase. Kernel overhead: ~0.5ms. Batching saves 3 * 0.5ms = 1.5ms compute time per cycle,
    easily fitting the 33.3ms budget.'
