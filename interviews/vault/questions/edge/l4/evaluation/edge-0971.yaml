id: edge-0971
title: Edge New 0035
topic: model-size-estimation
status: published
provenance: imported
scenario: Deploying a 30B parameter transformer across an edge cluster of 4 Orin devices communicating
  via 1Gbps Ethernet. Analyze the tradeoff between pipeline parallelism and tensor parallelism given the
  severe network bottleneck.
details:
  realistic_solution: Tensor parallelism requires frequent synchronization (All-Reduce) for every layer,
    which would be catastrophically slow over a 1Gbps Ethernet link. Pipeline parallelism only requires
    passing intermediate activations at the boundaries of model partitions. The optimal tradeoff strongly
    favors pipeline parallelism to minimize communication volume, despite the potential 'bubble' idle
    time overhead during the startup and teardown phases.
  common_mistake: Applying cloud data center topologies (like Megatron-LM Tensor Parallelism) directly
    to edge hardware with high-latency, low-bandwidth networking.
  napkin_math: '1Gbps = 125MB/s. 30B model = 60GB in FP16 (15GB per Orin). TP communication: multiple
    MBs per layer * 100 layers. PP communication: SeqLen(1000) * Hidden(8192) * 2B = 16MB per chunk. 16MB
    / 125MB/s = 128ms communication overhead per pipeline stage.'
