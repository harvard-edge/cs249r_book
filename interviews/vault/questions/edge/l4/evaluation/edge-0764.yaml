id: edge-0764
title: The Inference Audit Trail Gap
topic: monitoring-observability
status: published
provenance: imported
scenario: 'Your medical imaging edge device (Jetson Orin NX, 100 TOPS) runs a chest X-ray triage model
  in a rural clinic. FDA 510(k) clearance requires that every inference can be reproduced: given the same
  input, the same model must produce the same output. During an audit, the FDA feeds a reference image
  and gets a different confidence score than your validation records show. The model file hash matches.
  What went wrong?'
details:
  realistic_solution: '**Non-deterministic inference** in the GPU execution path. TensorRT and CUDA do
    not guarantee bitwise-reproducible results by default. Three sources of non-determinism:'
  common_mistake: '"The model must have been updated between validation and audit." The hash matches —
    it''s the same model file.'
  napkin_math: 'Non-deterministic FP16 variance: typical max absolute difference between runs = 1e-3 to
    1e-2 in logit space. After sigmoid: confidence can shift by 0.5–2%. For a triage threshold at 0.50,
    a reading of 0.49 vs 0.51 flips the clinical decision. Deterministic mode latency penalty: 12ms →
    14ms (17% slower). For a non-real-time application (radiologist reviews in minutes), 2ms is irrelevant.
    For FDA compliance, determinism is non-negotiable.'
