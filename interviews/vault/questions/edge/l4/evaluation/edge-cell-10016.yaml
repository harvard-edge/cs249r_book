id: edge-cell-10016
title: Evaluating Hailo-8 vs. Jetson Orin Activation Memory Architecture for Embedded CV
topic: activation-memory
status: published
provenance: imported
scenario: Your team is selecting hardware for a smart camera CV pipeline running EfficientDet-D2 (8.1M
  parameters). Two options are Hailo-8 (26 TOPS, 2.5W, on-chip SRAM only — no external DRAM for activations)
  and Jetson Orin (275 TOPS, 60W, 32 GB LPDDR5). Evaluate which platform better handles the activation
  memory requirements of EfficientDet-D2 at 512×512 input resolution and whether Hailo-8's SRAM-only architecture
  imposes constraints on the model.
details:
  realistic_solution: 'EfficientDet-D2 peak activation: the BiFPN feature network at resolution P3 (64×64)
    with 112 channels: 64×64×112×1 B (int8) = 450 KB per tensor. Hailo''s SRAM can hold multiple such
    tensors. However, the backbone (EfficientNet-B2) at early layers has spatial resolution 256×256×32
    = 2 MB per tensor — exceeding Hailo''s per-layer SRAM if the full activation must be resident. Hailo''s
    compiler handles this via tiling: spatially tiles the input and streams through the chip, keeping
    only one tile in SRAM at a time. This is transparent to the user but adds 5-10% latency overhead.
    For EfficientDet-D2, Hailo-8 achieves ~30 fps at 512×512 at 2.5W vs Jetson Orin at ~120 fps at 60W.
    Choose Hailo-8 for power-constrained deployments, Orin for throughput-critical.'
  common_mistake: Evaluating Hailo-8 purely on TOPS rating without accounting for its fixed on-chip SRAM
    size (approximately 6 MB for activations) and the requirement that all intermediate activation tensors
    must fit within this SRAM during execution. Large activation tensors that exceed SRAM require the
    Hailo compiler to split layers into sub-operations, potentially reducing effective throughput.
  napkin_math: 'EfficientNet-B2 stage 1: 256×256×32×1 B (int8) = 2.1 MB. Hailo-8 SRAM ≈ 6 MB total. 2.1
    MB per tensor × 2 (double buffer) = 4.2 MB — fits but leaves only 1.8 MB for other buffers. Tiling
    factor: split 256×256 into 4 tiles of 128×128 = 0.53 MB each — well within SRAM. Power efficiency:
    Hailo-8 at 26 TOPS / 2.5W = 10.4 TOPS/W vs Orin at 275 TOPS / 60W = 4.6 TOPS/W — Hailo-8 is 2.3× more
    power-efficient.'
