schema_version: 1
id: edge-0967
title: Edge New 0031
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Serving an LLM on a 16GB T4. Static pre-allocation of max sequence length wastes 40% of memory
  to fragmentation. Analyze the tradeoff of implementing PageAttention to manage the KV cache dynamically.
details:
  realistic_solution: Static allocation reserves contiguous VRAM for maximum potential context sizes,
    causing massive internal fragmentation as most sequences terminate early. PageAttention allocates
    memory in small, non-contiguous blocks (pages), virtually eliminating internal fragmentation. The
    tradeoff adds minor pointer-chasing overhead to the memory access patterns, but reclaims up to 40%
    of the VRAM wasted by fragmentation. If average sequence length is 2048 × (1 − 0.40) = 1228.8 tokens
    after reclamation, the effective concurrency rises from 4 to approximately 6.5 concurrent users, a
    63% improvement. Real-world gains depend on actual sequence length distribution.
  common_mistake: Ignoring VRAM fragmentation on edge devices, assuming that a 16GB card can only handle
    4 users because of contiguous memory allocation rules.
  napkin_math: 'Available KV memory: 8GB. Static max_len=2048: 8GB / (2048 × 1MB) = ~4 concurrent users.
    With 40% fragmentation reclaimed by PageAttention: effective avg length = 2048 × (1-0.40) = 1228.8
    tokens. Effective capacity = 8GB / (1228.8 × 1MB) ≈ 6.5 concurrent users. Concurrency increases by
    ~63%.'
