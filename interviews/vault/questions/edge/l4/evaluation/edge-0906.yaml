id: edge-0906
title: SmartNIC NPU Arithmetic Intensity Mismatch
topic: neural-architecture-search
status: published
provenance: imported
scenario: A SmartNIC embedded with a 10 TOPS (INT8) NPU is designed to perform line-rate deep packet inspection
  at 100 Gbps. The security team deployed an LSTM-based anomaly detection model (batch size 1 per flow).
  The NPU has 8MB of SRAM with 400 GB/s internal bandwidth. Despite the 10 TOPS rating, the NPU drops
  45% of packets, and utilization sits at just 4%.
details:
  realistic_solution: 'The LSTM model running at batch size 1 is entirely memory-bandwidth bound due to
    low arithmetic intensity. An LSTM requires reading the entire weight matrix for every single token
    (packet payload byte) processed. The arithmetic intensity is approximately 1 MAC (2 operations) per
    1 byte of weight read. With an SRAM bandwidth of 400 GB/s, the theoretical maximum throughput is 400
    GigaMACs/s (0.8 TOPS), meaning 92% of the 10 TOPS compute array is starved of data. To fix this, you
    must co-design the algorithm/architecture: replace the LSTM with a 1D Convolutional Neural Network
    (CNN) or a small Transformer over a sliding window of packets. These architectures allow spatial parallelization
    and weight reuse across the sequence dimension, significantly raising the arithmetic intensity and
    allowing the hardware to utilize its 10 TOPS compute array.'
  common_mistake: Trying to increase the NPU clock speed or adding more SRAM capacity to the NPU.
  napkin_math: 'NPU Peak Compute: 10 TOPS. SRAM Bandwidth: 400 GB/s. LSTM Arithmetic Intensity: 2 OPs
    / 1 Byte = 2 OPs/Byte. Max achievable compute = 400 GB/s * 2 OPs/Byte = 800 GOPs = 0.8 TOPS. Utilization
    = 0.8 / 10 = 8% maximum (often lower due to overhead). To hit 10 TOPS, required intensity = 10,000
    GOPs / 400 GB/s = 25 OPs/Byte.'
