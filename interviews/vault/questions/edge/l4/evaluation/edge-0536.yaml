id: edge-0536
title: The ToF Sensor Crosstalk
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your warehouse deploys 8 Rockchip RK3588 edge nodes, each with a time-of-flight (ToF) depth
  sensor, for pallet detection along a 50-meter aisle. Each node works perfectly in isolation. When all
  8 are powered on simultaneously, depth readings become noisy — range error jumps from ±2cm to ±30cm
  — and pallet detection accuracy drops from 95% to 60%. The nodes are spaced 6 meters apart. What's happening?
details:
  realistic_solution: Time-of-flight sensors work by emitting modulated IR light (typically 850nm or 940nm)
    and measuring the phase shift of the reflected signal to compute distance. When multiple ToF sensors
    operate simultaneously, each sensor receives not only its own reflected light but also the modulated
    IR from neighboring sensors — this is **multipath interference** or **crosstalk**.
  common_mistake: '"The sensors are too close together" or "There''s WiFi interference." ToF sensors use
    infrared light, not radio, and 6 meters is a normal spacing for warehouse coverage.'
  napkin_math: 'ToF sensor: 1W optical, 60° FoV, 850nm. At 6m: inverse-square law gives ~1mW/m² from neighbor.
    Sensor pixel receives: own signal ~1mW (after 5% surface reflectivity at 3m), neighbor ~0.5mW (scattered).
    Interference ratio: 50%. Phase error at 50% interference: ±15° → range error = ±15/360 × 5m = ±0.21m
    ≈ ±20cm (matches observation order of magnitude). TDM at 8 sensors: 12.5 Hz each. FDM with 2 MHz separation:
    8 channels in 20-36 MHz band, zero crosstalk. Hardware cost for TDM sync: $2 per node (GPIO trigger
    cable).'
