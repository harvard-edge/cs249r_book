schema_version: 1
id: edge-0902
title: NPU Underutilization in Depthwise Convolutions
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are deploying a MobileNetV2-based object detector on a custom edge NPU featuring a 16x16
  systolic array (peak 512 MACs/cycle). The NPU has 2MB of SRAM and runs at 500 MHz. Profiling reveals
  that the standard 1x1 convolutions achieve 85% array utilization, but the 3x3 depthwise convolutions
  drop to roughly 6% utilization, causing the overall inference latency to miss the 15ms target by taking
  42ms.
details:
  realistic_solution: 'The root cause is a fundamental mismatch between the model''s arithmetic intensity
    and the systolic array''s spatial architecture. Depthwise convolutions process each input channel
    independently, meaning there is zero data reuse across channels. A 16x16 systolic array typically
    maps input channels to one dimension and output channels to the other. For a depthwise convolution,
    only 1 out of 16 rows/columns is active, wasting the rest of the array. To resolve this, you must
    co-design the architecture: either modify the model to use grouped convolutions (where group size
    matches the array dimension, e.g., 16) to restore channel reuse, or rewrite the compiler''s scheduling
    dataflow to map spatial dimensions (width/height tiles) to the systolic grid instead of channels during
    depthwise layers.'
  common_mistake: Assuming the memory bandwidth is the bottleneck and trying to quantize the depthwise
    weights to INT4.
  napkin_math: 'Systolic array capacity: 16x16 = 256 MAC units. Standard 1x1 conv mapping (Input Channels
    x Output Channels): perfectly fills the 16x16 grid. Depthwise conv mapping: 1 Input Channel -> 1 Output
    Channel. Active MACs per cycle = 1x16 (if spatial mapped 1D) or just 1x1. If mapped naively on the
    channel dimension, utilization = 16 / 256 = 6.25%.'
