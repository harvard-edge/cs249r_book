id: edge-0020
title: The TensorRT vs ONNX Runtime
topic: graph-compilation
status: published
provenance: imported
scenario: Your fleet of 5,000 delivery robots runs on Jetson Orin NX. You currently use TensorRT, which
  gives 2.5× faster inference than ONNX Runtime. But your ML team ships model updates weekly, and each
  TensorRT engine compilation takes 25 minutes per device. Your fleet manager complains that model updates
  take 3 days to roll out because devices compile sequentially during overnight idle windows. Should you
  switch to ONNX Runtime for faster deployment, or is there a better approach?
details:
  realistic_solution: 'Don''t switch to ONNX Runtime — pre-compile TensorRT engines in the cloud. Build
    a CI/CD pipeline that compiles TensorRT engines for the exact Orin NX GPU architecture in a cloud
    build farm, then distribute the pre-built binaries via OTA. Compilation: 25 min once in the cloud.
    Distribution: 5000 devices x 45MB engine / 50 concurrent downloads = ~5 hours. Total: 5.4 hours vs
    41.7 hours. You keep TensorRT''s 2.5x speed advantage (30 FPS vs 12 FPS) while solving the deployment
    bottleneck. ONNX Runtime is only acceptable if 12 FPS meets your safety minimum, which it likely does
    not for a delivery robot.'
  common_mistake: '"TensorRT is always the right choice because it''s faster" or "Switch to ONNX Runtime
    because deployment speed matters more." Both miss the nuance of fleet-scale deployment.'
  napkin_math: 'Current approach: 25 min/device × 5,000 devices ÷ 50 concurrent (overnight window) = 2,500
    min = 41.7 hours (matches the 3-day complaint with safety margins). Pre-compiled engine: 25 min compile
    + 5 hours distribution = 5.4 hours total. ONNX Runtime fallback: 0 min compile, but 2.5× slower inference.
    At 30 FPS target: TensorRT delivers 30 FPS, ONNX Runtime delivers 12 FPS — below the safety minimum.
    ONNX Runtime fallback only works if 12 FPS is acceptable (e.g., slow-speed warehouse operation).'
