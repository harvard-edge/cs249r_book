id: edge-0042
title: The Timestamp Drift
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your autonomous vehicle fuses camera images (30 FPS, MIPI CSI) with LiDAR point clouds (10 Hz,
  PCIe). In testing, 3D bounding boxes are accurate. In deployment at highway speed, the boxes consistently
  lag behind the actual vehicle positions by about 1–2 meters. The detection model hasn't changed. What
  is causing the spatial error?
details:
  realistic_solution: Sensor timestamp misalignment. The camera and LiDAR have independent clocks and
    different capture latencies. The camera exposes a frame in ~5ms (rolling shutter), while the LiDAR
    completes a 360° sweep in 100ms. If you naively pair "the latest frame from each sensor," you can
    have 50–100ms of temporal misalignment. At highway speed (30 m/s or ~108 km/h), a 50ms timestamp drift
    produces a **1.5 meter spatial offset** — exactly the error you're seeing. The fix is hardware-triggered
    synchronization (PPS signal from GPS to both sensors) or software compensation (ego-motion interpolation
    using IMU data to project the LiDAR cloud to the camera's exact capture timestamp).
  common_mistake: '"The model needs retraining on highway-speed data." The model is fine — the error is
    in the data pipeline, not the neural network.'
  napkin_math: 'Highway speed = 30 m/s. LiDAR sweep = 100ms. Worst-case misalignment = 100ms. Spatial
    error = 30 m/s × 0.1s = **3.0m**. Average misalignment (~50ms) = 30 × 0.05 = **1.5m**. At 60 km/h
    (urban): 16.7 m/s × 0.05s = 0.83m — still enough to misclassify lane position.'
