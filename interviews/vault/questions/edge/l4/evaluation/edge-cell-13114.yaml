schema_version: 1
id: edge-cell-13114
title: 'Edge TCO Evaluation: Batch vs Real-Time Inference Cost Model'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A medical imaging clinic can run MRI inference (ResNet-50, 9 GOPS, 512x512 input) in real-time
  mode (Jetson Orin, 60W, $499) or overnight batch mode (Hailo-8+Pi5, 7.5W, $280). 50 scans/day, each
  taking 100ms inference. Real-time: instant results. Batch: 8-hour delay. Calculate 5-year TCO for each
  mode and the cost premium for real-time results.'
details:
  realistic_solution: Power = 15W × 8760hr × 5 × $0.10/kWh / 1000 = $65.70 (not $657).
  common_mistake: Treating real-time vs batch as only a latency question rather than a cost question —
    batch processing can use the same hardware at lower average utilization and potentially different
    power states.
  napkin_math: 'Power cost: 15W × 8760hr × 5 devices × $0.10/kWh / 1000 = 15 × 8760 × 5 × 0.10 / 1000
    = 65,700 / 1000 = $65.70 ≈ $65.7 (not $657 which omits /1000).'
