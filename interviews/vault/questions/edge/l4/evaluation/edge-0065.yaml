schema_version: 1
id: edge-0065
title: The Power State Machine
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re designing the power management firmware for a smart doorbell with an Ambarella CV25S
  SoC (quad Cortex-A53 + CVflow NPU, 2.5W active, 15 mW standby). The doorbell must: always-on motion
  detection, wake to full AI in <200ms when a person is detected, run face recognition for 5 seconds,
  then return to low power. Your colleague implements two states: ON and OFF. After deployment, users
  complain about 1.5-second wake delays and the battery dying in 3 days instead of the target 60 days.
  Design the correct power state machine.'
details:
  realistic_solution: 'The correct design uses a 4-state power machine: S0 (Deep Sleep, 5 mW): CPU and
    NPU off. Only the always-on PIR sensor and a low-power comparator are active. Transition to S1 on
    PIR trigger. S1 (Sensor Wake, 50 mW): One A53 core at 400 MHz runs a tiny motion classifier (8-bit,
    50K params) on the low-res always-on camera (320×240, 5 FPS). This filters 95% of false PIR triggers
    (wind, animals). Transition to S2 if person-like motion detected, back to S0 after 2 seconds of no
    detection. S2 (Full AI, 2.5W): All cores + NPU active. High-res camera (1080p, 30 FPS). Run face recognition
    for up to 5 seconds. Transition to S3 on match or timeout. S3 (Network, 1.5W): NPU off, WiFi radio
    on. Transmit alert + thumbnail to cloud. Transition to S0 after ACK. The key insight: S1 is the screening
    state that prevents the expensive S2 wake for false triggers. The 200ms wake target is met by S0→S1
    (PIR to lightweight classifier), not S0→S2.'
  common_mistake: '"Two states (ON/OFF) is sufficient — just wake up faster." A binary power model forces
    a choice between always-on (kills battery) and deep sleep (slow wake), with no middle ground.'
  napkin_math: 'Assume 100 PIR triggers/day (wind, cats, cars), 5 actual person events. Two-state (ON/OFF):
    either always-on at 2.5W = 60 Wh/day (battery dead in hours) or wake all 100 triggers to full AI:
    100 × 5s × 2.5W = 1,250 Ws = 0.35 Wh + standby = ~0.7 Wh/day → 20 Wh battery / 0.7 = 28 days. Four-state:
    S0 standby = 5 mW × 23.9 hrs = 0.12 Wh. S1 screening = 100 triggers × 2s × 50 mW = 10 Ws = 0.003 Wh.
    S2 full AI = 5 events × 5s × 2.5W = 62.5 Ws = 0.017 Wh. S3 network = 5 × 3s × 1.5W = 22.5 Ws = 0.006
    Wh. Total: 0.146 Wh/day → 20 Wh / 0.146 = 137 days. The screening state alone extends battery life
    by 4.9×.'
