id: edge-cell-11019
title: 'Dataset Curation: Evaluate Active Learning Strategies for Edge-Deployed Models'
topic: dataset-curation
status: published
provenance: imported
scenario: 'Your object detection model runs on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) at 200 inference/sec.
  You want to implement active learning to select which images to upload for labeling. Compare: (A) entropy-based
  selection, (B) margin-based selection, (C) random selection. Evaluate computational cost on Jetson Orin
  and expected label efficiency.'
details:
  realistic_solution: Entropy and margin require only the softmax output (already computed during inference).
    Both add < 0.1ms overhead. Random selection is faster but wastes labels on easy examples. Entropy-based
    typically selects 3-5× more informative samples per label dollar.
  common_mistake: Implementing complex ensemble-based uncertainty on edge devices — too compute-heavy.
    Not measuring the actual overhead of uncertainty computation.
  napkin_math: 'Jetson Orin at 200 inference/sec. Softmax output: 80 classes for COCO. Entropy: H = -Σ
    p log p, 80 multiplications + log ops. At 240MHz with SIMD: ~0.01ms overhead. Margin: max - second_max:
    trivial. Overhead: 0.01ms/200fps = 0.2% compute overhead. Label efficiency: entropy-based selects
    images where model is uncertain. In practice, 20% of random data selected by entropy = equivalent
    performance to 60% random → 3× label efficiency gain. Labeling cost reduction: from $30K to $10K for
    same model quality.'
