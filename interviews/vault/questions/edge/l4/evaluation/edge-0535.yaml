schema_version: 1
id: edge-0535
title: The GPU Driver Crash Recovery
topic: safety-certification
status: published
provenance: imported
scenario: Your Jetson Orin-based autonomous forklift runs a safety-critical obstacle detection model.
  The NVIDIA GPU driver crashes once every ~72 hours (a known issue with the specific L4T version). The
  driver recovers in 3 seconds, but during recovery, the forklift has no perception. At 2 m/s, the forklift
  travels 6 meters blind. Your safety engineer says this is unacceptable. How do you maintain perception
  during a GPU driver crash?
details:
  realistic_solution: 'You need a perception fallback that doesn''t depend on the GPU. The Orin has multiple
    independent compute engines: (1) **DLA (Deep Learning Accelerator)** — has its own driver stack, independent
    of the GPU driver. Pre-load a lightweight obstacle detection model (MobileNet-SSD, ~5 MB) on DLA1.
    It runs at lower accuracy (75% mAP vs 92% for the GPU model) but provides continuous perception during
    GPU recovery. DLA inference: 15ms per frame → 66 FPS, more than sufficient. (2) **CPU fallback** —
    the Orin''s 12-core Cortex-A78AE can run a tiny YOLO-Nano model at ~5 FPS using ONNX Runtime with
    NEON SIMD. Latency: 200ms — marginal but better than blind. (3) **Ultrasonic/LiDAR safety curtain**
    — a hardware-only safety system using 4 ultrasonic sensors (no ML, no GPU, no driver) that triggers
    emergency stop when any object is within 2 meters. Response time: <10ms. Cost: $40 for 4 sensors +
    microcontroller.'
  common_mistake: '"Update the driver" or "File a bug with NVIDIA." Both are correct long-term actions
    but don''t solve the immediate safety problem for deployed units.'
  napkin_math: 'GPU driver crash: 3s recovery. Forklift speed: 2 m/s. Blind distance without fallback:
    6m. With DLA fallback (200ms activation): 0.4m blind distance. With ultrasonic curtain (always active,
    10ms response): 0.02m blind distance. DLA model size: 5 MB. DLA inference: 15ms/frame. CPU fallback:
    200ms/frame = 5 FPS. Ultrasonic sensor cost: $10 each × 4 = $40. Microcontroller (STM32): $5. Total
    safety system cost: $45. MTBF of GPU driver crash: 72 hours. Expected blind events per year: 8760/72
    = 122 events.'
