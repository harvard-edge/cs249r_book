title: Edge New 0034
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Split-computing a CNN over 5G. The edge Orin processes early layers and sends a 1MB intermediate
  tensor to the Cloud H100. Sending the raw image is 5MB. Analyze the tradeoff assuming a fluctuating
  10MB/s to 50MB/s network.
details:
  realistic_solution: Sending raw data takes 5x more bandwidth, making it highly susceptible to network
    fluctuations. By computing the early feature extraction layers on the edge Orin, the system compresses
    the semantic data down to a 1MB tensor. The tradeoff shifts a portion of the latency into deterministic
    edge compute while heavily reducing the variance of network transmission, resulting in a much tighter,
    more predictable end-to-end latency bound.
  common_mistake: Ignoring network bandwidth variance (jitter) and designing split-inference systems purely
    on peak theoretical 5G throughput.
  napkin_math: 'Raw (5MB): At 50MB/s = 100ms. At 10MB/s = 500ms (variance = 400ms). Split (1MB): Edge
    compute (~10ms) + Transfer (1MB/50=20ms to 1MB/10=100ms) = 30ms to 110ms (variance = 80ms). Split
    inference is vastly more stable.'
