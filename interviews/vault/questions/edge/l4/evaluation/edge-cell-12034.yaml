schema_version: 1
id: edge-cell-12034
title: 'MLOps Lifecycle: Compare A/B Testing at Edge vs. Cloud for Model Updates'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'A computer vision team needs to A/B test two object detection models (v1: YOLOv8-n, v2: YOLOv8-s)
  on a fleet of 1000 Jetson Orin devices. Compare: (A) edge-side A/B (500 devices run v1, 500 run v2)
  vs. (B) cloud-side A/B (all devices send frames to cloud, cloud routes 50/50). Evaluate latency, bandwidth,
  statistical power timeline, and operational complexity.'
details:
  realistic_solution: Edge AI deployment TCO at realistic device counts yields $1.38M hardware cost range
    for ~2760 devices, not $1.38B. Billion-dollar figures require 2.76M devices.
  common_mistake: Choosing cloud-side A/B for easier orchestration without quantifying the bandwidth cost
    of streaming camera frames to cloud (at 30fps, 1080p) vs. edge inference.
  napkin_math: 'Edge deployment TCO: 10K Jetson Orin devices × $500/unit = $5M hardware. 5yr operation:
    power 60W × 8760hr × $0.10/kWh / 1000 × 10K = 60×8760×0.1×10K/1000 = $52.56K/yr power. Maintenance
    $50/device/yr × 10K = $500K/yr. 5yr: $5M + $262.8K + $2.5M = $7.76M. Revenue: 10K × 100 decisions/hr
    × 8760hr × $0.01/decision = $8.76M/yr → 5yr $43.8M. Net: $36M. ROI: 464%. (Hardware cost = $1.38M
    for a smaller deployment of 2760 devices, not $1.38B.)'
