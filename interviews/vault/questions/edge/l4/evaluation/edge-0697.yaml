id: edge-0697
title: The DLA vs GPU Scheduling
topic: accelerator-comparison
status: published
provenance: imported
scenario: 'You''re building a perception stack on a Jetson Orin AGX (64 GB). It has an Ampere GPU (275
  TOPS INT8) and two DLA engines (each ~50 TOPS INT8, ~5W per DLA). Your manager says ''just run everything
  on the GPU — it''s faster.'' You argue that offloading the backbone to a DLA saves significant power.
  Your manager counters: ''power savings don''t matter, we''re plugged in.'' Who is right, and when does
  DLA scheduling actually matter?'
details:
  realistic_solution: 'Your manager is partially right — for a single model on a plugged-in system, the
    GPU is faster and simpler. But DLA scheduling matters in three scenarios: (1) **Pipeline parallelism**
    — the DLA runs the detection backbone while the GPU simultaneously runs the tracking model. Two engines
    working in parallel increase throughput even if each is individually slower. (2) **Thermal headroom**
    — the GPU at full load draws ~60W. In a sealed enclosure at 40°C ambient, this causes thermal throttling
    within 10 minutes. Offloading the backbone to a DLA (5W) reduces GPU load to ~30W, keeping the system
    below the thermal ceiling indefinitely. (3) **Operator coverage** — DLAs support a fixed set of operations
    (Conv2D, ReLU, pooling, etc.) but not all (e.g., deformable convolutions, custom attention). If your
    backbone is DLA-compatible but the head isn''t, the natural split is DLA-backbone + GPU-head.'
  common_mistake: '"DLA is always better because it''s more power-efficient" or "GPU is always better
    because it''s faster." Both ignore the scheduling context.'
  napkin_math: 'GPU-only: 275 TOPS at 60W = 4.6 TOPS/W. DLA: 50 TOPS at 5W = 10 TOPS/W (2.2× more efficient).
    Pipeline: DLA backbone 12ms (parallel with GPU tracker 8ms) + GPU head 5ms = 17ms → 58 FPS. GPU-only:
    backbone 6ms + head 5ms + tracker 8ms = 19ms → 52 FPS. DLA pipeline is both faster (parallel) and
    50% less power. Break-even: DLA wins whenever you have ≥2 concurrent models or thermal constraints.'
