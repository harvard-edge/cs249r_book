schema_version: 1
id: edge-0530
title: The Preempt-RT Kernel Tick Overhead
topic: real-time-deadlines
status: published
provenance: imported
scenario: You compile a custom Linux kernel with the PREEMPT_RT patch to guarantee hard real-time latency
  for your edge robot's motor controller. You configure the kernel timer tick frequency (HZ) to 1000 Hz
  for maximum responsiveness. The motor controller works perfectly. However, the background ML perception
  model (which ran fine at 30 FPS on standard Linux) now struggles to hit 15 FPS. Why did a real-time
  kernel destroy your throughput?
details:
  realistic_solution: 'The PREEMPT_RT kernel with HZ=1000 introduces massive timer interrupt overhead.
    At 1000 Hz, the kernel fires a timer interrupt every 1ms. Each interrupt triggers a full context save,
    scheduler evaluation, and context restore — costing ~20 microseconds each. That''s 20ms/second (2%)
    of CPU time consumed by pure OS overhead. Worse, PREEMPT_RT makes every kernel code path preemptible,
    adding lock overhead to every driver and subsystem call. The fix: use HZ=250 for the ML pipeline (4ms
    granularity is sufficient for 30 FPS), isolate the motor controller on a dedicated CPU core with HZ=1000
    using `isolcpus`, and run the ML model on the remaining cores with a standard scheduler.'
  common_mistake: '"The motor controller is using all the CPU." The motor controller is fast; the issue
    is the operating system itself.'
  napkin_math: 1000 timer interrupts per second. If an interrupt entry/exit and scheduler check takes
    20 microseconds, the CPU spends 20,000 microseconds (20ms) every second entirely inside the kernel.
    You surrendered 2% of your total CPU throughput to pure OS bureaucratic overhead.
