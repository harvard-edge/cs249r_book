title: Edge New 0028
topic: pruning-sparsity
status: published
provenance: imported
scenario: A T4 GPU serves an LLM with a 100ms per-token strict SLA. BS=1 takes 40ms. BS=2 takes 45ms.
  Each item added to the batch increases latency by 5ms. Analyze the maximum continuous batch size that
  maximizes throughput without violating the SLA.
details:
  realistic_solution: Continuous (iteration-level) batching adds new requests to the active batch on the
    fly. To prevent any single sequence from breaching the 100ms SLA, the combined latency of the largest
    possible batch must remain under the threshold. The tradeoff heavily favors maximizing the batch up
    to the mathematical limit, multiplying throughput heavily while safely absorbing the minor 5ms penalty
    per sequence.
  common_mistake: Failing to account for the marginal linear increase in memory access time per batch
    item, assuming batching is completely 'free' until OOM.
  napkin_math: Latency = 40ms + (N - 1) * 5ms. We require Latency <= 100ms. 40 + 5N - 5 <= 100 -> 35 +
    5N <= 100 -> 5N <= 65 -> N = 13. Max batch size is 13, yielding 13 tokens / 100ms = 130 tokens/sec.
