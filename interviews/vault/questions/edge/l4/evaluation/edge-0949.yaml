title: Edge New 0010
topic: pruning-sparsity
status: published
provenance: imported
scenario: A 500KB model must fit on a Cortex-M4 (256KB SRAM). You can apply 50% unstructured pruning (keep
  FP32) or 8-bit quantization (INT8). Analyze the tradeoff in latency and accuracy given the lack of sparse
  matrix hardware support.
details:
  realistic_solution: Unstructured pruning zeros out weights but requires storing indices (CSR format),
    meaning a 50% prune might not even reduce the size to 256KB. Furthermore, Cortex-M4 lacks hardware
    for sparse matrix multiplications, leading to branching overhead that actually increases latency.
    INT8 quantization guarantees a 4x size reduction (to 125KB) with dense matrix math that executes predictably
    fast. INT8 is the definitive choice.
  common_mistake: Blindly applying unstructured pruning from cloud literature to microcontrollers, completely
    ignoring index storage overhead and the lack of sparse ALU support.
  napkin_math: 'Pruned 50%: 250KB weights + ~50KB indices = 300KB (Still OOM). INT8: 500KB / 4 = 125KB.
    Fits in SRAM with 131KB to spare for activations and RTOS.'
