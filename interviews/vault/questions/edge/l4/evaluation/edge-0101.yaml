schema_version: 1
id: edge-0101
title: The Memory Copy Ceiling
topic: graph-compilation
status: published
provenance: imported
scenario: Your multi-model vision pipeline is missing its 33ms frame deadline (30 FPS). You check the
  compute time for each model and it only adds up to 41ms total. Based on the memory flow diagram, where
  are the 'missing' milliseconds being spent?
details:
  realistic_solution: You are suffering from **Sync Overruns via Memory Bouncing**. The pipeline copies
    data from GPU to CPU and back between every model. Each round-trip takes 2-4ms, and worse, `cudaMemcpy`
    is synchronous, meaning the GPU sits idle during the transfer. The fix is to keep all tensors on the
    GPU using **Unified Memory** or explicit device-to-device transfers, and moving preprocessing to the
    GPU (e.g., NVIDIA DALI).
  common_mistake: '"The models are too slow — use smaller models." The models themselves only take 41ms
    of compute. The missing time is in data movement.'
  napkin_math: 3 transfers × 4ms/transfer = 12ms of pure overhead. Total time = 41ms (compute) + 12ms
    (overhead) = 53ms. Eliminating the bounce saves 12ms, bringing you to 41ms (still needs pipelining
    to hit 33ms).
