schema_version: 1
id: edge-cell-13076
title: 'Edge Systolic Array Evaluation: Weight-Stationary vs Row-Stationary on Jetson'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Compare weight-stationary (WS) and row-stationary (RS) dataflow for a depthwise convolution
  on Jetson Orin DLA (5.5 TOPS INT8 per core, 200GB/s internal BW) for EfficientNet-B0 block (32 channels,
  112x112, 3x3 dw-conv). Show SRAM access counts and energy implications for each dataflow.
details:
  realistic_solution: 'DW conv: 32 channels, weights = 32*9 = 288 values. Activations: 32*112^2 = 401K
    values. WS dataflow: weights stationary in register file. Activations (input) read: 32*112^2 (with
    padding: 32*114^2 = 415K). Output written: 32*112^2=401K. Total SRAM accesses: 288 (weight load, amortized)
    + 415K + 401K = 816K reads + 401K writes. RS dataflow: processes one output row at a time, keeping
    partial sums stationary. Input row read: 3 rows of 32*114 = 10.95K, output row written: 32*112. Total
    for 112 rows: same 816K reads + 401K writes. Both similar for DW. RS wins for standard conv where
    partial sums are large.'
  common_mistake: Applying weight-stationary dataflow to depthwise convolutions where weights are tiny
    (9 values per channel) and the real bandwidth bottleneck is activations, not weights.
  napkin_math: 'DW 32ch, 3x3, 112x112: Weight: 32*9=288 bytes INT8. Activation in: 32*(112+2)^2=415,872
    bytes (with padding). Output: 32*112^2=401,408 bytes. Total: 817,568 bytes in + 401K out = 1.22MB
    per inference. At 200GB/s DLA BW: 1.22MB/200GB/s = 6.1μs. FLOPs: 2*32*112^2*9=7.2M. Compute: 7.2M/5.5T=0.013ms=13μs.
    Memory bound (6.1μs BW, 13μs compute — wait, compute is slower). Actually compute bound (13μs > 6.1μs).
    AI = 7.2M/1.22MB = 59 FLOPs/byte. DLA ridge ≈ 5500G/200G = 27.5 FLOPs/byte. AI=59 > 27.5 → compute
    bound. Latency: 13μs for dw-conv block.'
