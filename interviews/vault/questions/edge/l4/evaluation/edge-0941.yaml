id: edge-0941
title: Edge New 0002
topic: real-time-deadlines
status: published
provenance: imported
scenario: A vision model on an Orin SoC (275 TOPS) processes 4K video at 30 FPS. You must choose between
  a standard CNN layer (100 GOPs, 10MB weights) and a depthwise layer (10 GOPs, 10MB weights). Analyze
  the roofline tradeoff given 200GB/s memory bandwidth.
details:
  realistic_solution: Depthwise convolutions dramatically reduce operations but maintain the same parameter
    footprint for spatial weights, significantly lowering arithmetic intensity. This shifts the workload
    from compute-bound into the memory-bound region of the roofline model. While the standard CNN better
    utilizes the 275 TOPS, the depthwise layer still executes faster overall because the compute reduction
    outpaces the memory penalty, making it strictly superior for real-time edge pipelines.
  common_mistake: Believing that lowering GOPs always results in an exactly proportional reduction in
    latency, without checking the memory bandwidth floor.
  napkin_math: 'Standard: 100 GOPs / 275 TOPS = 0.36ms. Memory: 10MB / 200 GB/s = 0.05ms. Time = 0.36ms
    (Compute bound). Depthwise: 10 GOPs / 275 TOPS = 0.036ms. Memory: 10MB / 200 GB/s = 0.05ms. Time =
    0.05ms (Memory bound). Depthwise is 7.2x faster.'
