title: Edge New 0021
topic: real-time-deadlines
status: published
provenance: imported
scenario: A vision pipeline on an Orin SoC involves CPU preprocessing and GPU inference. Analyze the tradeoff
  between explicitly copying the 10MB frames from CPU pinned memory to GPU memory versus using unified
  memory (zero-copy) for a 30 FPS target.
details:
  realistic_solution: With unified memory on Jetson Orin, CPU and GPU physically share the same DRAM.
    Using zero-copy memory avoids the explicit DMA allocation and data duplication. However, if the GPU
    reads the same memory locations repeatedly (e.g., iterative convolutions), unified memory without
    hardware caching can degrade compute bandwidth. For a sequential CNN pass, zero-copy drastically reduces
    latency and memory footprint, making it ideal.
  common_mistake: Assuming Orin requires explicit PCIe host-to-device memory transfers like discrete GPUs,
    completely missing the shared physical memory architecture.
  napkin_math: Explicit copy of 10MB at Orin DRAM bandwidth (~200GB/s) takes roughly 0.05ms, but OS/driver
    DMA setup adds ~0.5ms. For a 30 FPS pipeline (33.3ms budget), zero-copy reclaims ~1.5% of the frame
    budget and saves 10MB of physical RAM per frame.
