id: edge-0770
title: The Offline-First Edge Design
topic: safety-certification
status: published
provenance: imported
scenario: Your edge AI system monitors a remote oil pipeline in the Alaskan wilderness. It has satellite
  connectivity that works 4 hours per day (weather-dependent) with 256 Kbps bandwidth. The system must
  detect pipeline leaks 24/7. How do you design the system to operate independently of cloud connectivity?
details:
  realistic_solution: 'Design offline-first: run all inference on-device with no cloud dependency. The
    leak detection model operates on local compute with buffered sensor data. Use the 4h satellite window
    (effective ~350 MB/day) for priority-ranked uploads: critical alerts first (50 KB), daily summaries,
    then thumbnails. Store 30 days of raw data locally on a 2 TB drive. Model updates arrive as delta
    patches (~1.4 MB/day amortized). The cloud enhances but never gates the safety-critical detection
    loop.'
  common_mistake: '"Buffer all data and upload when connectivity is available." At 30 FPS of inference
    results, you''d generate gigabytes per day — impossible to upload at 256 Kbps.'
  napkin_math: 'Satellite window: 4h × 256 Kbps = 460 MB. Usable (protocol overhead): ~350 MB. Daily upload:
    50 KB (report) + 1 MB (thumbnails) + 10 MB (model update, weekly amortized = 1.4 MB/day) = ~2.5 MB/day.
    Remaining: 347 MB for video = 347 MB / 2 Mbps compression = 23 minutes of video per day. Sufficient
    for all critical events.'
