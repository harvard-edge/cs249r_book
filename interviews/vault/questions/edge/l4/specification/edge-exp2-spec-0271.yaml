schema_version: 1
id: edge-exp2-spec-0271
title: On-Premise Intersectional Fairness Specification for Diagnostic Models
topic: fairness-evaluation
status: published
provenance: imported
scenario: You must define the system specifications for continuously evaluating the intersectional fairness
  of a medical imaging model deployed on-premise in regional clinics. The model runs on a Qualcomm Cloud
  AI 100 accelerator, which features 32 GB LPDDR4x memory and delivers 400 TOPS INT8 within a 75W power
  envelope. Due to strict patient privacy laws, all demographic parity and equalized odds evaluations
  must be performed locally on the edge device without transmitting raw data back to a central server.
  How would you specify the architectural requirements to track and compute these fairness metrics across
  various demographic subgroups while co-locating with the primary diagnostic workload?
details:
  realistic_solution: A strong specification designs a local, streaming evaluation service that maintains
    running confusion matrices for each predefined intersectional subgroup. The system should allocate
    a strict memory quota within the 32 GB limit for metric tracking and utilize the accelerator's INT8
    capabilities to update fairness statistics in micro-batches. This ensures that the equalized odds
    calculations happen entirely on the Qualcomm Cloud AI 100, respecting privacy constraints and the
    75W power limit without starving the primary inference workload.
  common_mistake: Candidates often suggest aggregating raw patient data and sending it to the cloud for
    batch fairness analysis, completely ignoring the on-premise privacy constraints. Alternatively, they
    might specify running complex evaluation jobs that require large memory buffers, exceeding the hardware's
    32 GB limit when co-located with the primary model.
  napkin_math: Assuming the main model and OS utilize 28 GB of the 32 GB LPDDR4x memory, we have 4 GB
    available. If we track intersectional fairness across 4 attributes (e.g., 5 ages, 2 genders, 5 races,
    4 risk levels), we have 200 subgroups. Maintaining 4 counters (TP, FP, TN, FN) as 32-bit integers
    (4 bytes) per subgroup requires 200 * 4 * 4 = 3,200 bytes. To compute 30-day sliding window equalized
    odds for 50,000 monthly patients, storing the INT8 predictions and ground truth labels requires 50,000
    * 2 bytes = 100 KB. This memory footprint is negligible compared to the 4 GB available, and processing
    these updates leverages an imperceptible fraction of the 400 TOPS INT8 compute.
