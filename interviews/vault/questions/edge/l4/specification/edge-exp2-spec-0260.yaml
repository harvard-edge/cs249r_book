schema_version: 1
id: edge-exp2-spec-0260
title: On-Premise LLM Fine-Tuning Memory Specification
topic: activation-memory
status: published
provenance: imported
scenario: You are designing an on-premise continuous learning pipeline to fine-tune a 7B parameter LLM
  using a Qualcomm Cloud AI 100 accelerator. The device features 32 GB of LPDDR4x memory and operates
  strictly under a 75W power limit. While the INT8 model weights consume about 7 GB, storing full forward-pass
  activations for a realistic batch size causes out-of-memory errors during the backward pass. Specify
  an activation memory management strategy that leverages the device's 400 TOPS INT8 compute capability
  to satisfy the strict 32 GB memory constraint.
details:
  realistic_solution: The optimal design implements selective gradient checkpointing to recompute intermediate
    activations on-the-fly during the backward pass instead of storing all of them in memory. Since the
    Qualcomm Cloud AI 100 provides a massive 400 TOPS of compute, the system can easily absorb the ~30%
    computational overhead of recomputation. This strategy drastically reduces the forward-pass activation
    memory footprint, allowing for a stable batch size while safely fitting within the 32 GB LPDDR4x limit.
  common_mistake: Candidates often suggest drastically reducing the batch size to 1 or heavily quantizing
    activations without analyzing the compute-memory tradeoff. They frequently overlook gradient checkpointing
    (activation recomputation) as a way to trade the accelerator's abundant compute throughput for scarce
    memory capacity.
  napkin_math: INT8 weights require 7 GB. For a batch size of 4 and sequence length of 2048, full FP16
    activations across 32 transformer layers consume roughly 6.4 GB (4 batch * 2048 seq * 4096 hidden
    * 32 layers * 2 bytes * 3 intermediate tensors). Total memory = 7 GB (weights) + 6.4 GB (activations)
    + 4 GB (optimizer/gradients) = 31 GB, risking OOM on the 32 GB LPDDR4x memory. By checkpointing every
    4th layer, activation storage drops to ~5 GB. The new footprint is 7 GB + 5 GB + 4 GB = 16 GB, leaving
    ample headroom.
