schema_version: 1
id: edge-cell-12101
title: 'Model Size Estimation: Specify Memory Budget for Edge LLM with Fixed 16GB'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Specify the maximum LLM model size and configuration that can be deployed on an edge system
  with 16GB LPDDR5 (limited, no swap). Requirements: OS must have 3GB, CUDA needs 1GB, minimum 2GB KV-cache
  for 8 concurrent users at 512-token context, model must achieve >60% accuracy on MMLU benchmark. Constrain:
  model family, precision, max params, and expected TPOT.'
details:
  realistic_solution: 'Available for model+KV: 16-3-1=12GB. KV requirement: 8×512×262KB (per token for
    ~1B model) = 1.07GB. Model budget: 12-2=10GB. Model in INT4: 10GB / 0.5B per param = 20B params max.
    INT8: 10GB / 1B = 10B params. Recommendation: 7B INT4 = 3.5GB. KV (7B model: 2×32layers×32heads×128dim×2B
    per token = 524KB/token). KV: 8×512×524KB=2.1GB. Total: 3+1+3.5+2.1=9.6GB < 16GB ✓. MMLU: 7B INT4
    (GPTQ): ~65-68% ✓. TPOT: 3.5GB/204GB/s=17ms/token.'
  common_mistake: 'Specifying a 7B model in FP16 (14GB) which doesn''t fit: 14+3+1+2=20GB > 16GB; failing
    to consider INT4 or smaller models.'
  napkin_math: '7B INT4: 3.5GB. KV (7B, 32 layers, 32 KV heads, 128 dim): per token = 2×32×32×128×2B=524KB.
    8 users × 512 tokens = 2.1GB KV. OS: 3GB. CUDA: 1GB. Total: 3+1+3.5+2.1=9.6GB < 16GB ✓. TPOT: 3.5GB
    weights / 204GB/s = 17ms/token. Acceptable for edge chat (< 50ms target). MMLU 7B INT4: ~66% (qualifies
    > 60%).'
