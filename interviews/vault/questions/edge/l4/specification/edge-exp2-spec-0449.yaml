schema_version: 1
id: edge-exp2-spec-0449
title: Hybrid Compute Partitioning for Coral Edge TPU
topic: accelerator-comparison
status: published
provenance: imported
scenario: You are designing an edge vision system for a smart camera with a strict 5W total power budget.
  The pipeline requires a heavy object detection CNN (100 GOPS per frame) running at 30 FPS, followed
  by a custom multi-object tracker utilizing dynamic control flow. You must design a system that leverages
  a Google Coral Edge TPU (4 TOPS INT8, 2W, USB/PCIe form factor) alongside a low-power host CPU. Specify
  how you will partition the workload, comparing the compute profiles of the two processors, and handle
  the Edge TPU's limited operator support and INT8 quantization requirements.
details:
  realistic_solution: The optimal design fully quantizes the CNN backbone and detection heads to INT8,
    compiling them into a single subgraph executed entirely on the 2W Google Coral Edge TPU. The raw bounding
    box proposals (a small tensor) are then transferred once over the USB/PCIe bus to the host CPU. The
    CPU, which sits at the highly-programmable end of the spectrum and is better suited for branch-heavy
    logic, handles the custom tracker, cleanly separating it from the highly-efficient, INT8-constrained
    TPU accelerator.
  common_mistake: Candidates often assume the entire pipeline can be forced onto the Edge TPU or ignore
    the USB/PCIe bandwidth penalty of compiling a model with unsupported operators. They fail to realize
    that unsupported layers cause the compiler to partition the model between the TPU and CPU, resulting
    in frequent, latency-killing host-to-device memory transfers.
  napkin_math: The CNN requires 100 GOPS/frame * 30 FPS = 3000 GOPS = 3 TOPS. The Coral Edge TPU provides
    4 TOPS at 2W, handling this heavy dense compute at 75% utilization. If an unsupported operator split
    the model causing 5 intermediate 2MB tensor transfers per frame over a USB interface, the bandwidth
    would be 2MB * 5 transfers * 30 FPS = 300 MB/s. By keeping the CPU-bound tracking logic separate and
    transferring just the final 10KB proposal tensor once, the bandwidth takes only 10KB * 1 * 30 FPS
    = 300 KB/s, eliminating the I/O bottleneck.
