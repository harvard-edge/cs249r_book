id: edge-exp2-spec-0450
title: Data Pruning for Edge TPU Object Detection
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are tasked with specifying a data selection and pruning strategy for an object detection
  model to be deployed on a Google Coral Edge TPU. The target hardware provides 4 TOPS at INT8 precision,
  consumes 2W of power, and requires all operations to be fully quantized to INT8 to avoid costly fallbacks.
  Given an initial dataset of 5 million images, design a pipeline to select a 500k image coreset that
  maximizes the final quantized model's accuracy without exceeding a strict training compute budget.
details:
  realistic_solution: The strategy requires a quantization-aware data selection curriculum. First, train
    a small proxy model and apply post-training quantization to INT8. Use this quantized proxy to score
    the 5 million images, prioritizing data points where the INT8 proxy exhibits high uncertainty or divergence
    from an FP32 teacher, ensuring the 500k coreset teaches features robust to the Edge TPU's limited
    operator support.
  common_mistake: Candidates often suggest generic active learning or coreset methods without considering
    the target hardware's numerical constraints. They fail to analyze how INT8 quantization on the Google
    Coral Edge TPU affects the usefulness of certain data points, specifically those with subtle features
    that are obliterated during quantization.
  napkin_math: A standard CNN processing a 300x300 image requires ~2 GOPS. On the Google Coral Edge TPU
    delivering 4 TOPS (4,000 GOPS), inference takes 2 / 4000 = 0.5 milliseconds per frame. The energy
    per inference is 2W * 0.5ms = 1mJ. Ensuring the data selection process forces the model to rely only
    on INT8-supported operators guarantees we maintain this 2,000 FPS throughput and 1mJ energy footprint,
    avoiding a CPU fallback that would multiply latency and break the 2W power budget.
