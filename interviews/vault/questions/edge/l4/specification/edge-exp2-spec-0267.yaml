schema_version: 1
id: edge-exp2-spec-0267
title: Data Curation for Hailo-8 INT8 Quantization
topic: dataset-curation
status: published
provenance: imported
scenario: You are defining the dataset curation requirements for a vision model deploying to a Hailo-8
  dataflow accelerator. The Hailo-8 provides 26 TOPS at INT8 precision and operates at 2.5W, but it has
  no local DRAM and relies entirely on streaming from host memory. Design a data selection and curation
  specification that addresses the strict INT8 calibration needs of this architecture, ensuring the chosen
  dataset captures activation outliers to prevent severe accuracy drops during quantization.
details:
  realistic_solution: The specification must mandate stratified sampling for the calibration dataset to
    cover the full dynamic range of activations (e.g., extreme lighting, dense objects). Since the Hailo-8
    requires aggressive INT8 quantization and streams from host memory, the curation process must isolate
    challenging edge cases to properly calibrate the scale factors and prevent activation clipping that
    would otherwise destroy model accuracy.
  common_mistake: Candidates often propose standard random sampling for the calibration dataset, ignoring
    the extreme sensitivity of INT8 quantization to activation outliers. They also frequently overlook
    how the lack of local DRAM requires careful curation of high-density scenes to validate host memory
    streaming performance.
  napkin_math: Assuming a model requires 50 GOPS per inference, Hailo-8's 26 TOPS theoretically allows
    520 FPS. If a model's intermediate feature map is 2MB, streaming it back and forth without local DRAM
    consumes 4MB/frame of host bandwidth. At 520 FPS, this requires 2.08 GB/s memory bandwidth. Curation
    must explicitly include complex, high-object-density scenes to validate that accuracy holds up when
    the system hits these host memory I/O limits.
