schema_version: 1
id: edge-exp2-spec-0285
title: INT8 Quantization Strategy for Google Coral Deployment
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are tasked with deploying a MobileNetV2-based object detection model on a Google Coral Edge
  TPU via a USB form factor. The device operates under a strict 2W power budget and delivers 4 TOPS exclusively
  for INT8 arithmetic. Your model currently uses FP32 precision, and you must design a specification to
  quantize the model entirely to INT8 to avoid latency-inducing CPU fallbacks due to the TPU's limited
  operator support.
details:
  realistic_solution: Design a Quantization-Aware Training (QAT) pipeline that enforces per-tensor or
    per-channel INT8 quantization constraints during training. You must specify a representative calibration
    dataset to fix zero-points and scales accurately, and explicitly replace unsupported operations (like
    Swish) with TPU-supported alternatives like ReLU6 to guarantee full delegation to the Edge TPU.
  common_mistake: Candidates often propose standard Post-Training Quantization (PTQ) without accounting
    for the Edge TPU's strict INT8-only requirement and limited operator support. They frequently overlook
    that unsupported operators (like certain custom activations) will cause a fallback to the host CPU,
    destroying performance over the USB interface.
  napkin_math: 'The Edge TPU provides 4 TOPS (4 trillion operations per second) at 2W. A typical MobileNetV2
    model requires roughly 600 Million MACs (1.2 GOPs). Theoretical compute time per inference: 1.2 GOPs
    / 4000 GOPs = 0.3 ms. For a 30 FPS target (33.3 ms/frame budget), the compute is well within limits.
    However, transferring a 300x300x3 UINT8 image (270 KB) over a standard USB 2.0 interface (approx.
    60 MB/s) takes 4.5 ms, confirming that full INT8 compilation is crucial to avoid CPU-TPU ping-pong
    transfer bottlenecks.'
