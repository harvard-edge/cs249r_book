schema_version: 1
id: edge-exp2-spec-0455
title: Observability for On-Premise AI 100 Accelerators
topic: monitoring-observability
status: published
provenance: imported
scenario: You are deploying a fleet of on-premise inference servers, each equipped with a Qualcomm Cloud
  AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The models perform real-time video analytics
  for factory safety. You need to design a telemetry system that can quickly identify and isolate stragglers—accelerators
  that are underperforming and causing pipeline bottlenecks. How do you design the observability stack
  to ensure high reliability without overwhelming the factory's limited external network bandwidth?
details:
  realistic_solution: Design a two-tiered observability stack. Deploy a lightweight local agent on each
    inference server to poll the Qualcomm AI 100's hardware counters (e.g., memory bandwidth utilization,
    compute utilization, temperature) and application metrics (latency, throughput). The agent aggregates
    and downsamples this data locally, sending only summarized metrics (e.g., p95 latency, average utilization)
    and critical alerts (e.g., thermal throttling) to a centralized on-premise dashboard. Straggler detection
    is performed locally by comparing metrics against expected baselines before transmission.
  common_mistake: Candidates often propose sending raw telemetry data or high-frequency logs directly
    to a central cloud dashboard. They fail to account for the limited external network bandwidth in an
    on-premise factory setting and do not utilize edge aggregation or hardware-specific telemetry interfaces
    efficiently.
  napkin_math: 'Assume 100 metrics sampled at 1 Hz per AI 100 accelerator. Each metric is an 8-byte float
    + 4-byte timestamp = 12 bytes. Unaggregated raw data: 100 * 12 bytes * 1 Hz = 1.2 KB/s per accelerator.
    For 50 accelerators, that is 60 KB/s (or ~5 GB/day). By aggregating locally to send 1-minute summaries
    (min, max, avg, p95), the payload is reduced: 4 statistics * 12 bytes = 48 bytes per metric per minute.
    Total payload: 100 metrics * 48 bytes / 60 seconds = 80 bytes/s per accelerator. For 50 accelerators,
    the bandwidth drops from 60 KB/s to 4 KB/s, significantly reducing network strain while maintaining
    sufficient granularity for straggler detection.'
