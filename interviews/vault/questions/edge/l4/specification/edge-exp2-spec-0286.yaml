schema_version: 1
id: edge-exp2-spec-0286
title: On-Device Privacy Guardrails for Intersection Monitoring
topic: responsible-ai
status: published
provenance: imported
scenario: 'You are specifying the architecture for a real-time pedestrian safety monitor deployed on a
  Google Coral Edge TPU (4 TOPS INT8, 2W power budget, USB/PCIe form factor) at city intersections. City
  governance mandates strict privacy guardrails: all faces must be detected and blurred on-device before
  any event footage is transmitted, and the system must securely log confidence scores to audit for demographic
  bias. Break down and design a specification that integrates these responsible AI requirements while
  ensuring all models are fully INT8 quantized, given the Coral''s limited operator support and severe
  latency penalty for CPU fallback.'
details:
  realistic_solution: Specify a unified, fully INT8-quantized CNN architecture (e.g., a multi-head MobileNet
    SSD) that performs both pedestrian and face detection in a single pass to ensure 100% TPU compatibility.
    Implement the actual face blurring via optimized CPU OpenCV routines post-inference. Bias monitoring
    should be specified as a lightweight metadata logging system that batches and encrypts anonymized
    bounding box confidence scores for cloud-side fairness analysis.
  common_mistake: Candidates often propose complex, separate models for guardrails (like heavy face detection
    transformers) without realizing they contain operators unsupported by the Coral TPU. They also frequently
    forget that failing to strictly quantize these guardrail models to INT8 forces operations onto the
    weak host CPU, completely bottlenecking the 4 TOPS accelerator.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS (4000 GOPS) at a 2W power limit. A quantized
    MobileNet-based pedestrian detector requires ~1.5 GOPS, and an added face detection head for the privacy
    guardrail adds ~0.5 GOPS, totaling 2.0 GOPS per frame. At 30 FPS, the total compute requirement is
    60 GOPS per second. This requires only 1.5% of the 4 TOPS peak capacity (60 / 4000), ensuring the
    device stays comfortably within the 2W power budget while strictly enforcing the privacy specification
    entirely on-device.
