schema_version: 1
id: edge-exp2-spec-0290
title: Design a Dataflow Accelerator Pipeline for ResNet-50 on Hailo-8
topic: systolic-dataflow
status: published
provenance: imported
scenario: You are designing the inference pipeline for a multi-camera smart city application running ResNet-50
  on a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS of INT8 compute at just 2.5W, but it
  operates purely as a dataflow architecture with no local DRAM, streaming data directly from host memory
  over PCIe. Given the target frame rate of 30 FPS across 4 cameras (120 FPS total), design the layer
  execution and weight buffering strategy, specifying whether to use a weight-stationary or output-stationary
  dataflow for the primary convolutions.
details:
  realistic_solution: The optimal approach is to map the entire ResNet-50 subgraph onto the Hailo-8's
    distributed on-chip memory hierarchy, utilizing pipeline parallelism. For early layers with large
    activations and small weights, a weight-stationary dataflow minimizes PCIe traffic since weights can
    be pinned on-chip while activations stream through. For later layers with many channels but small
    spatial dimensions, an output-stationary approach is preferred to accumulate partial sums locally
    before streaming the final features back to the host, maximizing the 26 TOPS INT8 throughput within
    the strict 2.5W power budget.
  common_mistake: Candidates often assume traditional layer-by-layer execution with intermediate activations
    written back to main memory, which defeats the purpose of a dataflow architecture. They also frequently
    default to weight-stationary without analyzing the activation sizes vs weight sizes for specific ResNet
    layers when streaming from host memory.
  napkin_math: ResNet-50 requires ~8 billion operations (8 GOPS) per frame. At 120 FPS total, the compute
    requirement is 120 * 8 = 960 GOPS, or ~1 TOPS. The Hailo-8 provides 26 TOPS, so compute is abundant
    (under 4% utilization). However, memory bandwidth is the bottleneck. ResNet-50 has ~25.6M parameters
    (~25.6MB in INT8). If we batch N=1 and swap weights per layer from host, we transfer 25.6MB * 120
    FPS = ~3 GB/s just for weights. Instead, by keeping the 25.6MB of weights stationary on-chip (if it
    fits in the distributed SRAM) and streaming only the 224x224x3 input (150KB) and 1x1x1000 output (1KB),
    the required PCIe bandwidth drops to (150KB + 1KB) * 120 FPS = ~18 MB/s, well within any host interface
    limits.
