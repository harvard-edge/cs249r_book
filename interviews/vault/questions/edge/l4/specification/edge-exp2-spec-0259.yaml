schema_version: 1
id: edge-exp2-spec-0259
title: Shadow Deployment Design on Qualcomm Cloud AI 100
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are deploying an upgraded defect detection model to a manufacturing floor equipped with
  a single Qualcomm Cloud AI 100 on-premise inference accelerator. The current model is stable, but the
  new version promises higher recall. Design a shadow deployment strategy that validates the new model's
  performance on live 60 FPS video streams without disrupting the primary pipeline. You must specify how
  traffic is duplicated and how you ensure the combined workload fits within the 32 GB LPDDR4x memory
  and 400 TOPS INT8 constraints.
details:
  realistic_solution: Design a shadow deployment where the primary model processes the 60 FPS stream synchronously,
    while frames are asynchronously duplicated to a lower-priority queue for the canary model. The Qualcomm
    Cloud AI 100 execution engine must be configured to prioritize the primary model to guarantee latency,
    while the canary model processes frames opportunistically to evaluate accuracy without impacting the
    75W power envelope or the main pipeline.
  common_mistake: Candidates often propose cloud-based API traffic splitting which doesn't apply to a
    single on-premise accelerator ingesting a continuous physical stream. They also frequently fail to
    account for the simultaneous memory and compute footprint of running both models concurrently on the
    same edge device.
  napkin_math: Assume the current INT8 model requires 2 GB memory and 12 TOPS to maintain 60 FPS, while
    the new model requires 2.5 GB and 15 TOPS. A shadow deployment requires running both concurrently,
    consuming 2 GB + 2.5 GB = 4.5 GB of the 32 GB LPDDR4x memory, and 12 TOPS + 15 TOPS = 27 TOPS of the
    400 TOPS INT8 capacity. This easily fits within the hardware limits, leaving 27.5 GB and 373 TOPS
    for frame buffering and OS overhead.
