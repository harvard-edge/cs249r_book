id: edge-exp2-spec-0274
title: AOT Compilation Strategy for Cloud AI 100
topic: graph-compilation
status: published
provenance: imported
scenario: Your team is deploying a high-throughput video analytics pipeline onto an on-premise server
  equipped with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model includes
  several custom operations not natively supported by the accelerator's compiler. Specify the requirements
  and design an ahead-of-time (AOT) graph compilation and partitioning system to ensure the unsupported
  operations do not cripple the overall INT8 throughput.
details:
  realistic_solution: 'The candidate should specify a multi-stage compilation pipeline: first, perform
    constant folding and INT8 quantization calibration. Next, implement an operator lowering and graph
    partitioning pass that identifies subgraphs supported by the Qualcomm AI 100. Critically, the design
    must cluster unsupported operations to minimize the number of graph breaks (context switches between
    the host and the accelerator), thereby preserving the high efficiency required within the 75W TDP.'
  common_mistake: Candidates often assume that any unsupported operation simply runs on the host CPU without
    analyzing the severe latency penalty of the host-to-accelerator memory transfers. They also frequently
    overlook the necessity of INT8 calibration during the AOT compilation phase to leverage the 400 TOPS
    peak.
  napkin_math: The Qualcomm Cloud AI 100 provides 400 TOPS INT8. For a model requiring 100 GOPS per frame,
    the theoretical peak is 400,000 / 100 = 4,000 frames per second (FPS). If an unsupported operation
    causes a graph break, forcing a 20 MB intermediate tensor to be copied back to the host over a PCIe
    Gen4 interface (~16 GB/s), the transfer alone takes 20 MB / 16 GB/s = 1.25 ms per frame. This data
    transfer introduces a hard bottleneck, limiting the pipeline to a maximum of 1 / 0.00125 = 800 FPS,
    wasting 80% of the accelerator's theoretical compute capacity.
