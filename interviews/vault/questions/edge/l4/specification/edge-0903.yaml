id: edge-0903
title: FPGA DSP Slice Mapping for INT4
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing an FPGA-based accelerator for a 2W smart camera. The system needs to run a
  15-million parameter CNN at 30 FPS. To fit the tight 1.5 GB/s LPDDR4 bandwidth budget, you quantize
  the model weights to INT4. However, after synthesis, the FPGA routing is severely congested, clock frequency
  drops from 300MHz to 120MHz, and power consumption exceeds 3W, despite using fewer bits.
details:
  realistic_solution: The routing congestion and frequency drop occur because the FPGA's hardened DSP
    slices are natively designed for 8x8 or 18x18 bit arithmetic. When you explicitly force INT4 MAC operations,
    the synthesis tool often bypasses the hardened, power-efficient DSP slices and implements the INT4
    multipliers using general-purpose LUTs (Look-Up Tables) and distributed routing. This consumes massive
    programmable logic area, causing routing congestion, dropping the clock frequency, and spiking dynamic
    power. The hardware-software co-design solution is to store the weights in DRAM as INT4 (to save the
    critical memory bandwidth), but unpack them to INT8 on-the-fly inside the FPGA's BRAM/registers right
    before computation. This allows the compute engine to utilize the hardened INT8 DSP slices efficiently
    while still achieving the 50% bandwidth reduction.
  common_mistake: Adding more pipeline registers to fix the clock frequency, which worsens area and power.
  napkin_math: 'Memory bandwidth needed at INT8: 15M weights * 1 byte * 30 FPS = 450 MB/s per read (often
    read multiple times if not cached perfectly). INT4 reduces this to 225 MB/s. DSP slice dynamic power
    is typically 0.1-0.2x the power of an equivalent LUT-based multiplier. By unpacking INT4->INT8 locally,
    we save ~1W of LUT switching power.'
