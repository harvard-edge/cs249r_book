schema_version: 1
id: edge-exp2-spec-0454
title: Qualcomm Cloud AI 100 Multi-Model Serving Architecture
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a video analytics pipeline to an on-premise server equipped with a single
  Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The pipeline requires running
  four independent ResNet-50 variants concurrently to process 16 independent 1080p camera streams at 30
  FPS. Design the model serving infrastructure to handle request routing, model loading, and batching
  to maximize utilization of the accelerator while staying within the 32GB memory limit and a 50ms latency
  budget.
details:
  realistic_solution: A unified inference server should be used to manage all four models within a single
    process, utilizing a Qualcomm-specific backend. Models should be statically loaded into the 32GB device
    memory since they are small. The server must use dynamic batching to group frames from the 16 streams,
    minimizing PCIe transfers, and leverage the accelerator's spatial sharing to execute models concurrently.
  common_mistake: Candidates often propose a naive microservice architecture where each model has its
    own independent serving process communicating via HTTP/gRPC. They fail to realize that on a single
    accelerator, memory bandwidth and PCIe transfer overheads will bottleneck the system, and independent
    processes will struggle to safely share the 32GB device memory.
  napkin_math: Four INT8 ResNet-50 models take ~100MB, easily fitting in the 32GB LPDDR4x. 16 streams
    at 30 FPS = 480 frames/sec. ResNet-50 is ~8 GOPS/frame. Total compute = 480 * 8 = 3.84 TOPS. This
    is roughly 1% of the 400 TOPS available, proving the bottleneck is data movement and orchestration,
    not raw compute on the 75W card.
