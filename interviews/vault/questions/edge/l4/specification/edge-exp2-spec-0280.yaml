schema_version: 1
id: edge-exp2-spec-0280
title: Jetson Orin Multi-Model TensorRT Deployment
topic: model-format-conversion
status: published
provenance: imported
scenario: You are tasked with deploying a complex vision pipeline consisting of a heavy object detector
  and a lightweight semantic segmentation model on an NVIDIA Jetson Orin. The device features an Ampere
  GPU, a DLA accelerator, 32 GB LPDDR5 memory, and has a strict 60W TDP constraint. You need to design
  the model conversion specification from PyTorch to a deployment-ready format, detailing your strategy
  for operator coverage gaps and hardware delegation to achieve the target 275 TOPS INT8 performance.
details:
  realistic_solution: The optimal specification converts PyTorch models to ONNX, then compiles them into
    TensorRT engines. To maximize the 275 TOPS and stay under the 60W TDP, the heavy object detector is
    compiled for the Ampere GPU in INT8 precision, while the segmentation model is explicitly delegated
    to the DLA. Any operator gaps during ONNX export are resolved by writing custom TensorRT plugins or
    modifying the source model architecture to use supported operations rather than allowing CPU fallbacks.
  common_mistake: Candidates often propose running all models on the Ampere GPU, completely neglecting
    the DLA accelerator, which leads to suboptimal power usage within the 60W TDP. They also frequently
    overlook the cost of CPU fallbacks when ONNX-to-TensorRT conversion fails due to unsupported operators.
  napkin_math: If the detector requires 150 GOPS per frame and runs at 60 FPS, it needs 9 TOPS. The segmentation
    model requires 50 GOPS at 60 FPS, needing 3 TOPS. Total compute is 12 TOPS. While this is well under
    the 275 TOPS INT8 theoretical limit of the Jetson AGX Orin 64GB (60W TDP), memory bandwidth is the
    real bottleneck. A 2GB FP32 model requires reading 2GB per inference; at 60 FPS, that's 120 GB/s.
    Converting to INT8 reduces the model size to ~0.5GB, requiring only 30 GB/s from the 64 GB LPDDR5,
    drastically reducing power consumption and keeping the system well within the 60W TDP.
