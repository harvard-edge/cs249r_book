schema_version: 1
id: edge-exp2-spec-0289
title: Real-Time Sensor Ingestion Pipeline for Jetson Orin
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are designing a real-time autonomous navigation system deployed on an NVIDIA Jetson Orin
  (32 GB LPDDR5, Ampere GPU + DLA, 60W TDP). The system must ingest high-resolution camera feeds and LiDAR
  point clouds simultaneously while maintaining a strict 30ms latency budget. Break down the data ingestion
  pipeline and specify how you would allocate the Orin's memory bandwidth and hardware accelerators to
  meet these requirements.
details:
  realistic_solution: The optimal design bypasses standard user-space copies by using zero-copy memory
    (NVIDIA Argus or V4L2 to NVMM) so camera frames go directly to GPU and DLA accessible memory without
    CPU intervention. LiDAR UDP packets should be processed via a dedicated CPU thread pinned to a specific
    core, using a lightweight ring buffer. Deep learning-based feature extraction should be offloaded
    to the DLA, reserving the Ampere GPU's 275 TOPS strictly for the fused perception model.
  common_mistake: Candidates often design a standard cloud-style Kafka or gRPC pipeline, ignoring the
    massive memory bandwidth bottleneck of a shared-memory architecture like the Jetson Orin. They also
    frequently fail to utilize the dedicated DLA or hardware video decoders, instead pushing all ingestion
    and preprocessing tasks to the Ampere GPU, which starves the actual inference model.
  napkin_math: Assume 4x 4K cameras at 30 FPS (4 * 3840 * 2160 * 3 bytes * 30 FPS = 2.98 GB/s of raw video
    data). The Jetson Orin has 32 GB LPDDR5 with ~204 GB/s theoretical memory bandwidth. A naive pipeline
    copying data 3 times (kernel to user to GPU) consumes ~9 GB/s just for video ingestion. Using zero-copy
    buffers reduces this to ~3 GB/s, safely preserving the bandwidth required to feed the 275 TOPS INT8
    Ampere GPU and DLA to perform inference within the tight 60W TDP limit.
