schema_version: 1
id: edge-exp2-spec-0265
title: Jetson Orin Fleet Compute Cost
topic: compute-cost-estimation
status: published
provenance: imported
scenario: We are deploying a fleet of 1,000 smart city traffic monitoring devices, each utilizing an NVIDIA
  Jetson Orin edge compute platform. The Jetson Orin features 32 GB LPDDR5 memory, 275 TOPS INT8 peak
  performance (combining the Ampere GPU and DLA), and a 60W TDP. Design a deployment specification to
  determine if the hardware can support processing two concurrent video streams that each require 150
  INT8 TOPS, and estimate the daily electricity cost for the entire deployed fleet.
details:
  realistic_solution: The candidate should immediately identify that the required 300 TOPS (2 streams
    * 150 TOPS) exceeds the Jetson Orin's peak 275 TOPS capacity, requiring a system redesign such as
    dropping the frame rate by ~10% or applying model pruning. For the cost estimation, since the device
    will be operating at maximum capacity to handle the heavy workload, using the full 60W TDP provides
    an accurate worst-case power projection for the fleet.
  common_mistake: Candidates often compare the required compute directly to the peak hardware specs without
    realizing the requirement exceeds the physical limits. They also frequently estimate power costs using
    average generic values rather than utilizing the specific 60W TDP constraint to find the worst-case
    operating cost.
  napkin_math: 'Compute requirement: 2 streams * 150 TOPS = 300 TOPS total. Hardware limit: 275 TOPS (deficit
    of 25 TOPS, requiring ~9% reduction in processing load). Power calculation: 1,000 devices * 60W max
    TDP = 60,000W or 60 kW. Daily energy: 60 kW * 24 hours = 1,440 kWh per day. Assuming an electricity
    rate of $0.15/kWh, the daily compute power cost is 1,440 kWh * $0.15 = $216 per day for the fleet.'
