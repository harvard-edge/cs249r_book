id: edge-0823
title: Diagnosing On-Device Catastrophic Forgetting
topic: pruning-sparsity
status: published
provenance: imported
scenario: A smart home camera (Cortex-A53, 128MB RAM) runs an on-device continuous learning pipeline.
  It fine-tunes the classification head of an EfficientNet-Lite0 model to recognize household pets from
  daily motion-triggered clips. After three days of adaptation, users report the camera accurately identifies
  their pets but completely fails to detect foundational base classes like 'packages' and 'vehicles'.
  Diagnose the root cause and propose a mitigation strategy that fits within a strict 10MB memory constraint.
details:
  realistic_solution: The model suffers from catastrophic forgetting due to a heavily skewed local data
    distribution. The optimal mitigation is Latent Rehearsal (storing bottleneck feature embeddings instead
    of raw images) to replay base classes during local fine-tuning.
  common_mistake: Suggesting raw image rehearsal buffers, which immediately exceed the memory constraint,
    or simply lowering the learning rate which only delays the inevitable forgetting of base classes.
  napkin_math: 'Raw Image Buffer: 1,000 images * 224 * 224 * 3 bytes = 150.5 MB (Fails constraint). Latent
    Rehearsal Buffer: 1,000 embeddings * 1280 floats * 4 bytes/float = 5.12 MB (Fits well within the 10MB
    budget and enables base-class retention).'
