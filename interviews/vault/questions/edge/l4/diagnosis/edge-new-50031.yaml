schema_version: 1
id: edge-new-50031
title: Cross-Compiling CUDA Kernels for Jetson's Ampere GPU vs Cloud Ampere
topic: software-portability
status: published
provenance: imported
scenario: Your custom CUDA kernel is compiled for sm_80 (A100, cloud). You deploy the same binary on Jetson
  Orin (sm_87, Ampere-based). The kernel runs but is 25% slower than expected. Diagnose why a same-generation
  architecture has this performance gap.
details:
  realistic_solution: 'SM waste: 900 blocks / 132 SMs = 6.82 → 7 waves. Tail wave: 108 of 132 SMs active.
    Waste = (1/7) × (24/132) = 2.6%. Gemini''s 3.6% may use different block count or SM count assumptions.'
  common_mistake: Assuming sm_80 code runs optimally on sm_87 because both are Ampere. While binary compatibility
    exists (sm_80 PTX runs on sm_87), the JIT recompilation from PTX to sm_87 SASS may not optimize for
    Orin's specific configuration.
  napkin_math: 'SM utilization waste from tail wave: model has 900 blocks total. H100 has 132 SMs. Full
    waves: 900 / 132 = 6.82 → 6 full waves + 1 partial wave. Partial wave blocks: 900 - 6×132 = 900 -
    792 = 108 blocks. Tail wave: 108 out of 132 SMs busy → 24 idle SMs. SM waste in tail wave = 24/132
    = 18.2%. Overall waste = (1/7 waves) × (24/132) = 0.143 × 0.182 = 2.6%... but Gemini says 3.6%. With
    7 waves (6 full + 1 tail): tail fraction = 1/7 = 14.3%. SM waste in tail = (132-108)/132 = 24/132
    = 18.2%. Total: 1/7 × 24/132 = 24/924 = 2.6% vs Gemini''s 3.6%. Using 900/132: floor=6, tail=108,
    so 7 total waves. Gemini result: 1/7 × (132-8)/132 = 0.1429 × 0.9394... where 8 = 900 mod 132? 900/132:
    6×132=792, remainder=108. Gemini says 8 blocks in tail? 900 mod 132 = 108, not 8. Fix: 1/7 × (132-108)/132
    = 1/7 × 24/132 = 0.026 = 2.6%. Gemini says 3.6%. If there are blocks=900 and 132 SMs: 900=7×132-24=924-24,
    so remainder=108. The gap is (1 - 108/132) × 1/7 = 24/132/7 = 2.6%.'
