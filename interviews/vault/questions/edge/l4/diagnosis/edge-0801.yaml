id: edge-0801
title: The Secure Boot Chain
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is deploying a proprietary face liveness detection model on a fleet of smart locks.
  You must extend the Secure Boot chain of trust to verify the model weights before inference. How does
  model weight integrity verification add to boot time, and how do you trade off boot-to-first-inference
  latency against model authenticity checks?
details:
  realistic_solution: 'Secure Boot typically verifies a 10 MB kernel in milliseconds. But an ML model
    might be 100 MB to 1 GB. Hashing a large model file on an embedded CPU during the critical boot path
    destroys the "boot-to-first-inference" latency SLA (which for a smart lock must be <1 second). The
    trade-off requires architectural changes: (1) **Lazy Verification:** Only verify the first few layers
    of the model during boot to allow immediate inference, and verify the rest in a background thread.
    (2) **Hardware Crypto Acceleration:** Offload the SHA-256 hashing to a dedicated crypto engine (e.g.,
    ARM TrustZone CryptoCell) via DMA, freeing the CPU to initialize the camera and ML runtime concurrently.
    (3) **Encrypted Execution:** Instead of just hashing, store the model encrypted on disk and decrypt
    it directly into the NPU''s secure memory enclave on-the-fly, so the plaintext weights never touch
    the CPU''s main RAM.'
  common_mistake: '"Just hash the model file during boot." This ignores the massive size difference between
    firmware binaries and ML models, and the resulting latency impact.'
  napkin_math: 'A Cortex-A53 doing software SHA-256 achieves ~20 MB/s. Hashing a 100 MB model adds 5 seconds
    to boot time — unacceptable for a smart lock. Using a hardware crypto accelerator with DMA: ~200 MB/s.
    Time drops to 0.5 seconds. If you use block-level dm-verity (verifying 4KB blocks only when they are
    paged into memory by the ML runtime), the upfront boot penalty drops to near zero, amortizing the
    verification cost across the first few inferences.'
