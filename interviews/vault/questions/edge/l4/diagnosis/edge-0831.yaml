id: edge-0831
title: Debugging SecAgg Stragglers and Metric Bias
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A fleet of 5 million mobile devices runs an on-device NLP model. You deploy a Federated Analytics
  pipeline using Secure Aggregation to collect quantized performance metrics (15KB per device). You configure
  the SecAgg coordinator with a 15-second round timeout and a minimum client survival threshold of 60%.
  Over a week, you observe that 85% of the rounds fail completely. In the few rounds that succeed, the
  aggregated average inference latency is 12ms, despite lab profiling showing a fleet-wide average of
  35ms. Diagnose the root cause of the high failure rate and the biased latency metric.
details:
  realistic_solution: The 15-second timeout systematically excludes low-end devices (stragglers) which
    require ~25 seconds to compute and transmit their metrics. Since low-end devices make up roughly half
    the fleet, survival rates rarely hit the 60% threshold, causing rounds to fail. Successful rounds
    are heavily biased toward flagship devices, artificially deflating the aggregated latency to 12ms.
    The solution is to dynamically scale the timeout based on device tier or implement asynchronous aggregation.
  common_mistake: Candidates often suspect data corruption, incorrect quantization scales, or uniform
    network outages, failing to connect the strict timeout with device heterogeneity.
  napkin_math: 'Flagship latency: 12ms. Low-end latency: 58ms. True avg = (12+58)/2 = 35ms. Flagship upload
    time: 4s. Low-end upload time: 25s. With a 15s timeout, only flagships complete. Average survival
    rate = 50% (flagships only), which is less than the 60% threshold, causing most rounds to abort unless
    a cohort randomly contains mostly flagships.'
