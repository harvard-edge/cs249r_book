schema_version: 1
id: edge-0896
title: RoCEv2 Deadlock in Drone Swarm
topic: network-bandwidth-bottlenecks
status: draft
provenance: imported
scenario: A localized edge cluster of 16 autonomous drone base stations relies on RoCEv2 over a 25GbE
  switch to perform real-time distributed SLAM. During heavy map synchronization (bursts of 50MB per node),
  the entire cluster's network throughput suddenly drops to 0 Mbps and requires a hard switch reset to
  recover.
details:
  realistic_solution: Diagnose Priority Flow Control (PFC) deadlock. RoCEv2 relies on a lossless network
    achieved via PFC. When nodes send bursty all-to-all traffic (like map sync), circular buffer dependencies
    form across switch ports. A pause frame from node A pauses the switch port, which pauses node B, which
    is pausing the switch, creating a cyclic dependency. The solution is to configure PFC watchdog timers
    to drop packets breaking the deadlock, or move to a lossy RDMA protocol (like relying on ECN/DCQCN
    alone) since edge networks struggle with strict lossless guarantees.
  common_mistake: Assuming switch buffer overflow caused TCP-like backoff or packet loss.
  napkin_math: 16 nodes * 50MB burst = 800MB total burst. 25GbE = ~3.125GB/s. Typical edge switch buffer
    is 2-4MB. 800MB >> 4MB, meaning PFC pause frames are guaranteed to trigger. Without deadlock prevention,
    the probability of a circular dependency approaches 100% during simultaneous all-to-all bursts.
