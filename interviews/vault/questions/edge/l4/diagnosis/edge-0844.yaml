schema_version: 1
id: edge-0844
title: Diagnosing Federated Client Drift
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are debugging a federated learning rollout for a mobile keyboard application running on
  50,000 active daily devices. The model uses FedAvg with E=5 local epochs and local learning rate η=0.01.
  While the model converges in IID simulation, the production global model loss diverges after 20 rounds.
  Telemetry shows that during rounds 15-20, 80% of participating devices are from a region where users
  type predominantly in a specific regional dialect with vocabulary distributions differing from the global
  average by a KL divergence of 2.5. Diagnose the cause of this divergence and explain how to mitigate
  the resulting gradient skew.
details:
  realistic_solution: The divergence is caused by client drift where local models overfit to their non-IID
    regional data. Mitigate this by replacing FedAvg with FedProx, adding a proximal term (μ/2)||w - w_t||^2
    (e.g., μ=0.01) to the local objective to constrain how far local weights diverge from the global model.
  common_mistake: Misdiagnosing the divergence as a simple learning rate or batch size issue, failing
    to recognize 'client drift' caused by the highly non-IID statistical heterogeneity of the regional
    datasets.
  napkin_math: With E=5, client drift scales as O(η^2 * E^2 * σ^2), where σ^2 is the variance of gradients
    across clients. If regional skew increases σ^2 by 10x, the drift ||w_i - w_global||^2 grows 10x faster
    per round. The proximal term dampens this, capping the max weight delta per round.
