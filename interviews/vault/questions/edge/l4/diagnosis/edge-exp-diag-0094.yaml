schema_version: 1
id: edge-exp-diag-0094
title: Debugging Fallback OOM on Cloud AI 100
topic: graceful-degradation
status: published
provenance: imported
scenario: 'You have deployed an on-premise defect detection system using a Qualcomm Cloud AI 100 accelerator
  (32 GB LPDDR4x, 400 TOPS INT8, 75W). To ensure fail-operational reliability, the system uses a degradation
  ladder: it normally runs a high-accuracy primary model, but under high load, it gracefully degrades
  to a lightweight fallback model. However, you observe a critical symptom: exactly when the system attempts
  to degrade and load the fallback model, the accelerator''s power spikes to its 75W limit, latencies
  skyrocket, and the system completely drops video frames for several seconds before recovering. What
  is the root cause of this failure during the fallback transition?'
details:
  realistic_solution: The root cause is severe PCIe paging caused by exceeding the 32 GB LPDDR4x memory
    capacity during the context switch. When the degradation ladder triggers, the system attempts to allocate
    memory for the fallback model before the primary model's memory is fully freed. To achieve true fail-operational
    graceful degradation, the lightweight fallback model must be permanently pinned in the accelerator's
    memory, or the transition must be orchestrated to release primary model layers sequentially before
    loading the fallback.
  common_mistake: Candidates often assume the fallback model itself is computationally inefficient or
    that the 400 TOPS INT8 compute limit is being exceeded. They fail to analyze the system's memory high-water
    mark, missing that the transition represents a concurrent state where both models exist in memory
    simultaneously.
  napkin_math: 'Steady state memory usage: Primary model (INT8 weights + activations) = 28 GB. Fallback
    model (INT8 weights + activations) = 6 GB. Transition memory requirement = 28 GB + 6 GB = 34 GB. System
    capacity = 32 GB LPDDR4x. Deficit = 34 GB - 32 GB = 2 GB. The 2 GB deficit forces the accelerator
    to swap memory over the PCIe bus while attempting to maintain 400 TOPS of compute, immediately pegging
    the card at its 75W TDP and causing thermal/power throttling.'
