schema_version: 1
id: edge-sus-63012
title: Fairness Degradation from Quantization on Edge
topic: fairness-evaluation
status: published
provenance: imported
scenario: 'A face verification model (FP32) passes your fairness audit: FPR gap between skin tone groups
  (Fitzpatrick scale 1-2 vs 5-6) is 1.8%, within the 2% SLA. After PTQ to INT8 for edge deployment on
  a Hailo-8, the FPR gap widens to 6.2%. Overall accuracy drops only 0.4%. Diagnose why quantization disproportionately
  degrades fairness for darker skin tones and propose a fix.'
details:
  realistic_solution: 'The root cause is calibration set bias in PTQ. INT8 quantization clips activations
    at [min_calib, max_calib] derived from the calibration set. If the calibration set is 90% lighter
    skin tones, the activation range is calibrated for that distribution. Darker skin tone images activate
    different feature detectors with different dynamic ranges — those activations are more likely to be
    clipped or saturated under the lighter-calibrated quantization scheme, increasing FPR for that group.
    Fix: (1) Stratify the PTQ calibration set with equal representation across Fitzpatrick groups (100
    images per group, 600 total minimum). (2) Use per-layer per-subgroup activation range analysis: log
    activations for each Fitzpatrick group separately and choose calibration range that minimizes worst-case
    quantization error across groups, not average error. (3) Evaluate fairness metrics on INT8 model before
    deployment — treat quantization as a model change requiring re-audit.'
  common_mistake: Assuming accuracy is a sufficient proxy for fairness during quantization calibration.
    Standard PTQ calibration minimizes average quantization error, which can amplify existing small disparities
    if the feature distributions for minority subgroups are underrepresented in the calibration set.
  napkin_math: 'Calibration set: 128 images standard. If 90% light skin: 115 light, 13 dark. Activation
    percentile for darker tones: dynamic range may be 15% wider (darker pixels activate different Conv1
    channels). Clipping at light-skin percentile: 15% of dark-skin activations saturated → effectively
    zero gradient information for affected features → 3-4× higher FPR. Fix: 600 stratified images (100
    per Fitzpatrick level) = 4.7× more calibration data, still completes in <30 seconds on CPU.'
