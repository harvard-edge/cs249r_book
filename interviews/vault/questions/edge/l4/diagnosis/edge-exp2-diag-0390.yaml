schema_version: 1
id: edge-exp2-diag-0390
title: Diagnosing Host Bottlenecks with Synthetic Data on Hailo-8
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are deploying an object detection model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W). To
  improve data efficiency for rare edge cases, your team heavily relied on synthetic data generation,
  which required complex input transformations (simulated noise injection and lighting normalization)
  during training. During on-device profiling, you observe that the end-to-end latency is severely degraded,
  the host CPU utilization is at 100%, and the Hailo-8 is frequently idle despite streaming data directly
  from host memory. Identify the root cause of this system-level symptom.
details:
  realistic_solution: The root cause is a data starvation bottleneck at the host-accelerator interface
    caused by the preprocessing overhead of the synthetic data pipeline. Because the Hailo-8 is a dataflow
    accelerator without local DRAM, it streams inputs directly from host memory. The complex input transformations
    (noise injection/normalization) required to match the synthetic training distribution overwhelm the
    host CPU, preventing it from streaming frames to the Hailo-8 fast enough, thereby leaving the 26 TOPS
    accelerator starved for data.
  common_mistake: Candidates often misdiagnose this as a purely compute-bound issue on the accelerator
    or assume INT8 quantization destroyed the synthetic data features. They frequently overlook the Hailo-8's
    specific architecture (no local DRAM) and its heavy reliance on the host CPU for data streaming.
  napkin_math: Assume an input resolution of 1080p (1920x1080x3 bytes ≈ 6.22 MB/frame). To achieve 60
    FPS, the host must stream ≈ 373 MB/s to the Hailo-8. If the complex preprocessing required for the
    synthetic data domain takes 25ms per frame on the host CPU (limiting throughput to 40 FPS), the maximum
    achievable bandwidth drops to 248 MB/s. Even though the Hailo-8 (at 26 TOPS) might execute the INT8
    model in just 3ms per frame (capable of 333 FPS), the end-to-end system is bottlenecked by the 25ms
    host preprocessing, resulting in high latency and severe accelerator underutilization.
