schema_version: 1
id: edge-fill-03004
title: Tail Latency from Thermal Throttling on Jetson Orin
topic: tail-latency
status: published
provenance: imported
scenario: A computer vision pipeline on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) processes 30 FPS
  camera feeds. In a 25°C lab, P99 frame latency is 28ms. In a 40°C deployment environment, P99 spikes
  to 95ms intermittently. The pipeline includes YOLOv8n inference at INT8.
details:
  realistic_solution: Monitor tegrastats to correlate throttle events with latency spikes. Reduce sustained
    power budget from 60W to 40W (MAXN to 30W mode) to stay below thermal limits at 40°C. Alternatively,
    implement frame-dropping for non-critical frames and prioritize latency over throughput during thermal
    events.
  common_mistake: Assuming the latency spike is a software bug and spending time profiling CUDA kernels.
    Thermal throttling is hardware-level and won't appear in software traces as a distinct event.
  napkin_math: 'Jetson Orin thermal limits trigger at ~95°C junction temp. At 40°C ambient with 60W TDP:
    assuming ~30°C thermal resistance, junction = 40 + 60*0.5 = 70°C (borderline). Throttling reduces
    TOPS by 30-50%, from 275 to ~140 TOPS. YOLOv8n at INT8 needs ~4 GOPS; at 140 TOPS = 140,000 GOPS headroom,
    up to 35,000 concurrent inferences possible — far from the bottleneck. Check memory bandwidth throttling
    instead.'
