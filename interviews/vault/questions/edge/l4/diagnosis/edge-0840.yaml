schema_version: 1
id: edge-0840
title: Diagnosing On-Device LoRA Memory Bottlenecks
topic: vram-budgeting
status: published
provenance: imported
scenario: You are implementing on-device fine-tuning for a 3B parameter conversational model on a mobile
  device with a strict 6GB shared memory limit. You apply 4-bit quantization to the base weights (reducing
  them to 1.5GB) and inject LoRA adapters (r=8) into the attention layers across all 32 layers, adding
  only 12MB of trainable parameters. Using an SGD optimizer, you expect the training footprint to be under
  2GB. However, when the first training step begins with a sequence length of 1024 and batch size 1, the
  app instantly crashes with an Out-of-Memory (OOM) error at 5.5GB. How do you diagnose and resolve this
  hidden memory bloat?
details:
  realistic_solution: Diagnose that the root cause is activation memory. Even with frozen base weights,
    backpropagating gradients to the LoRA adapters requires storing the intermediate forward activations
    for every layer where an adapter is present. To resolve this, implement Gradient Checkpointing (activation
    recomputation) to trade compute for memory, or restrict LoRA adapters to only the final few layers
    so early-layer activations can be immediately discarded during the forward pass.
  common_mistake: Assuming that Parameter-Efficient Fine-Tuning (PEFT) inherently guarantees Memory-Efficient
    Fine-Tuning. Candidates often incorrectly guess that the OOM is caused by optimizer states or un-frozen
    base model gradients, completely missing the massive memory footprint of the forward activations required
    for backpropagation.
  napkin_math: 'Fixed footprint: 1.5GB (4-bit Base) + 12MB (LoRA params) + 12MB (Gradients) + 12MB (SGD
    State) = ~1.54GB. Activation memory: Saving forward activations for backprop in a standard transformer
    requires ~34 bytes per token per hidden dimension per layer. For seq_len=1024, hidden_dim=3072, and
    32 layers: 34 * 1024 * 3072 * 32 bytes ≈ 3.42GB. Total peak memory is 1.54GB + 3.42GB = 4.96GB. With
    OS/framework fragmentation overhead, this easily hits the 5.5GB OOM crash point.'
