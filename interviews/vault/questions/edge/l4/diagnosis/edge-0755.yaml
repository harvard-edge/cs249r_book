schema_version: 1
id: edge-0755
title: The Resource Tug-of-War
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'An edge device is running two independent ML models on a single NPU: one for critical safety
  monitoring (high priority, low latency, e.g., collision avoidance) and another for background analytics
  (lower priority, best-effort, e.g., long-term behavior analysis). How do you ensure the safety model
  always meets its deadlines without significantly starving the analytics model, especially when both
  are contending for the NPU?'
details:
  realistic_solution: "Managing shared resources like an NPU requires careful scheduling and resource\
    \ partitioning.\n  1.  **Priority-Based Preemption:** If the NPU and its driver support it, the safety\
    \ model should be scheduled with a higher priority. When the safety model needs the NPU, it should\
    \ preempt the analytics model. This is critical for hard real-time guarantees.\n  2.  **Resource Partitioning\
    \ (Hardware):** If the NPU architecture allows (e.g., multiple independent compute units or configurable\
    \ partitions), dedicate a portion of the NPU to the safety model and the remainder to the analytics\
    \ model. This provides strong isolation.\n  3.  **Time-Slicing with Quotas:** Implement a scheduler\
    \ that time-slices the NPU. The safety model gets a guaranteed time slice (e.g., 80% of NPU time)\
    \ to meet its deadlines, while the analytics model gets the remaining time (20%) or runs during idle\
    \ periods. This ensures both progress.\n  4.  **Quality of Service (QoS) Guarantees:** Some NPU drivers\
    \ or system-level frameworks offer QoS settings, allowing you to specify latency or throughput targets\
    \ for different workloads, which the underlying scheduler then tries to enforce.\n  5.  **Offline\
    \ Analysis (WCET):** Determine the Worst-Case Execution Time (WCET) for the safety model on the NPU.\
    \ This helps allocate sufficient resources to guarantee its deadlines even under peak load.\n  6.\
    \  **Load Monitoring & Adaptation:** Monitor NPU utilization. If the safety model's load is unusually\
    \ high, temporarily reduce the analytics model's frequency or switch it to a less demanding variant.\
    \ If the safety model is idle, the analytics model can burst.\n  7.  **Dedicated Cores (if NPU is\
    \ multi-core):** If the NPU has multiple independent cores, assign one or more to the safety critical\
    \ task."
  common_mistake: '"Just give the safety model priority, and the analytics model will run when it can."
    This can lead to the analytics model never running or running too infrequently to be useful.'
  napkin_math: If the safety model requires 10ms of NPU time every 100ms (10% utilization) and has a deadline
    of 20ms, the scheduler must ensure it gets its 10ms within that window. The analytics model can then
    use the remaining 90% of the NPU time. If the NPU has a peak throughput of 100 TOPS, the safety model
    might be allocated 10 TOPS guaranteed, leaving 90 TOPS for analytics.
