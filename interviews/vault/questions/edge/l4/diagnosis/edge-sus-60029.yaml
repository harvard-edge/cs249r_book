id: edge-sus-60029
title: Debugging gradient flow through quantization-aware training on Jetson Orin
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are implementing quantization-aware training (QAT) for an EfficientNet-B0 model targeting
  INT8 deployment on Jetson Orin. After inserting fake quantization nodes (FakeQuant), the model's validation
  accuracy during QAT plateaus at 10% below the FP32 baseline. You suspect gradient flow through fake
  quant is incorrect.
details:
  realistic_solution: 'Implement FakeQuant using STE: forward computes round(x / scale) × scale (true
    quantization simulation), backward returns the gradient unchanged (identity, as if round were the
    identity function). In PyTorch: use torch.fake_quantize_per_tensor_affine() which implements STE internally.
    Verify gradient flow with hooks: register_hook on each layer''s output to confirm non-zero gradients
    flow back through FakeQuant nodes.'
  common_mistake: Using a step function (round-to-nearest) as-is in fake quantization, which has zero
    gradient almost everywhere and gradient undefined at integer boundaries. Without the Straight-Through
    Estimator (STE), gradients are zero and the model cannot learn to place weights in quantization-friendly
    positions.
  napkin_math: 'EfficientNet-B0: 5.3M params, top-1 accuracy 77.1% FP32. QAT with correct STE: expected
    INT8 accuracy drop ~0.5-1%. Observed drop of 10% indicates zero/wrong gradients. Test: run 1 training
    step, check if any parameter has .grad.abs().mean() > 1e-7 — if all zeros, STE is not working. FakeQuant
    layers: EfficientNet-B0 has ~80 conv layers, each needing weight + activation FakeQuant = 160 FakeQuant
    nodes.'
