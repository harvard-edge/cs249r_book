id: edge-0760
title: The OTA Rollback That Bricked the Fleet
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You push an OTA model update to 8,000 Jetson Orin NX devices. The update includes a new TensorRT
  8.6 engine and an updated CUDA runtime. 2,000 devices report healthy, but 6,000 go silent — they're
  stuck in a boot loop. Your rollback mechanism restores the previous model file, but the devices still
  won't boot. What went wrong with your rollback strategy?
details:
  realistic_solution: The OTA updated both the model *and* the CUDA/TensorRT runtime as a coupled pair.
    The new TensorRT 8.6 engine is incompatible with the old CUDA 11.4 runtime, and vice versa. Rolling
    back only the model restores a TensorRT 8.5 engine that now tries to load against TensorRT 8.6 libraries
    — symbol mismatch, crash, reboot, repeat.
  common_mistake: '"The rollback should restore the model file and everything works." Model-only rollback
    is insufficient when the update touched the runtime stack.'
  napkin_math: 'Orin NX eMMC: 64 GB. Slot A: 16 GB (OS + runtime + model). Slot B: 16 GB (mirror). User
    data: 32 GB. OTA payload (compressed): ~4 GB. Download at 10 Mbps cellular: 4 GB / 10 Mbps = ~53 minutes.
    Write to eMMC at 200 MB/s: 16 GB / 200 = 80 seconds. Health check timeout: 60 seconds. Total rollback
    time if update fails: 60s (timeout) + 15s (reboot) = 75 seconds. Without A/B partitions: 6,000 bricked
    devices × $200 truck roll = **$1.2M recovery cost**.'
