schema_version: 1
id: edge-exp2-diag-0464
title: Diagnosing Hotspots in Edge Consistent Hashing
topic: load-balancing
status: published
provenance: imported
scenario: You have an edge cluster of three NVIDIA Jetson Orin modules processing factory video streams,
  utilizing consistent hashing based on camera IDs for request routing. Each NVIDIA Jetson Orin features
  an Ampere GPU, a DLA accelerator, and 32 GB of shared LPDDR5 memory, operating with a strict 60W TDP
  constraint. You observe that one specific Jetson Orin node frequently suffers from severe thermal throttling
  and out-of-memory errors, while the other two nodes remain well under their 275 TOPS INT8 compute capacity,
  despite each node receiving the exact same number of camera streams.
details:
  realistic_solution: The root cause is a 'hot key' issue inherent to static consistent hashing when stream
    complexities are heterogeneous. Certain high-resolution streams demand significantly more Ampere GPU
    and DLA cycles as well as a larger memory footprint. When routed to the same node, they saturate the
    memory and cause the chip to hit its 60W TDP limit, triggering thermal throttling and OOM cascades.
    The solution is to implement an active load-aware routing layer (e.g., least-outstanding-requests
    or custom weighted routing based on real-time TOPS/memory utilization) that breaks the static hashing
    for heavy streams.
  common_mistake: Candidates often blame a faulty Jetson Orin unit, poor ambient cooling, or suggest blindly
    switching to a round-robin algorithm. They frequently fail to analyze how consistent hashing creates
    load imbalances when payload complexities vary, ignoring how this directly impacts the strict memory
    and TDP limits of edge hardware.
  napkin_math: Assume the OS and base services consume 8 GB of the 32 GB LPDDR5, leaving 24 GB for inference.
    A standard stream requires 2 GB and 15 TOPS, while a 'heavy' stream requires 8 GB and 65 TOPS. If
    consistent hashing assigns 4 heavy streams to Node 1, the memory demand is 4 * 8 GB = 32 GB, which
    exceeds the 24 GB available, causing an OOM. Furthermore, 4 * 65 TOPS = 260 TOPS pushes the hardware
    right to its 275 TOPS INT8 limit, sustaining max utilization and reliably hitting the 60W TDP thermal
    threshold, while other nodes handle standard streams effortlessly.
