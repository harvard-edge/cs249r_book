schema_version: 1
id: edge-0901
title: ECMP Hash Polarization in Edge Storage
topic: load-balancing
status: published
provenance: imported
scenario: An edge storage rack uses 4 parallel 100GbE links between a Top-of-Rack (ToR) switch and a dense
  NVMe-oF storage array to provide 400Gbps aggregate bandwidth. However, when 4 edge inference servers
  pull 100Gbps video streams simultaneously, total throughput caps at 100Gbps. One specific 100GbE link
  shows 100% utilization while the other 3 show near 0%.
details:
  realistic_solution: 'Diagnose Equal-Cost Multi-Path (ECMP) hash polarization/collision. ECMP distributes
    traffic across parallel links by hashing packet header fields (typically 5-tuple: Src IP, Dst IP,
    Protocol, Src Port, Dst Port). If the 4 inference servers connect to a single IP/Port on the storage
    array and use fixed source ports, or if the switch''s hash algorithm only checks IP addresses, the
    hashes for all 4 flows compute to the same output port modulo 4. The solution is to vary the source
    ports (multiplexing flows), use a deeper hashing algorithm, or implement flowlet switching.'
  common_mistake: Assuming the storage array's NVMe controllers are internally bottlenecked at 100Gbps.
  napkin_math: 4 flows mapping across 4 links. Output port = hash(flow_i) % 4. If all hashes result in
    the same modulo (e.g., 0), all traffic goes to Link 0. Maximum throughput = 1 link * 100Gbps = 100Gbps.
    Wasted bandwidth = 3 links * 100Gbps = 300Gbps. System operates at 25% efficiency.
