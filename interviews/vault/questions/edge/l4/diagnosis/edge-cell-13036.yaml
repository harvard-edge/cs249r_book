id: edge-cell-13036
title: 'Edge Queueing Theory Diagnosis: Hailo-8 Throughput Under Real Traffic'
topic: queueing-theory
status: published
provenance: imported
scenario: A Hailo-8 (26 TOPS INT8, 2.5W) deployed in a retail store shows measured throughput of 8 FPS
  on a camera with 30 FPS input, despite the chip rating suggesting 50+ FPS for MobileNetV2. Diagnose
  using queueing theory what the bottleneck is, and quantify the throughput gap.
details:
  realistic_solution: 'MobileNetV2 on Hailo-8: rated 30 FPS. Observed 8 FPS. Bottleneck analysis: camera
    input at 30 FPS raw. Host preprocessing (USB3 transfer + CPU resize/normalize): 30 * 1080*1920*3 bytes
    = 186MB/s from camera. USB3 = 5Gbps = 625MB/s — OK. CPU resize: single-core at 1 FPS for 4K→224 resize
    is typical without optimization. Diagnosis: CPU preprocessing is the bottleneck (μ_cpu ≈ 8-10 FPS),
    not Hailo-8. Fix: hardware JPEG decode + GPU preprocessing, or use Jetson Orin as host CPU instead
    of Raspberry Pi.'
  common_mistake: Assuming the Hailo-8 TOPS rating directly translates to FPS without accounting for the
    host CPU preprocessing overhead and PCIe/USB transfer latency.
  napkin_math: 'Hailo-8 theoretical: 26 TOPS, MobileNetV2 = 0.3 GOPS, so μ = 26000/0.3 = 86,667 FPS (clearly
    not the limit). Actual rate = 8 FPS. CPU preprocessing: OpenCV resize 1080p→224 on ARM Cortex-A72
    (RPi 4): ~100 CPU-ms per frame = 10 FPS max. Bottleneck: CPU at 10 FPS, Hailo at 86k FPS. Fix: NEON-optimized
    resize or GPU preprocessing → 100x speedup available. Expected post-fix: 25-30 FPS (limited by camera
    input and USB transfer time).'
