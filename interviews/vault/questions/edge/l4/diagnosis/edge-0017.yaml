schema_version: 1
id: edge-0017
title: The Pipeline Overlap
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your edge perception system runs three stages sequentially: camera preprocessing (8ms), neural
  network inference (20ms), and post-processing/NMS (5ms) — totaling 33ms for a single frame. You need
  to hit 30 FPS. Without changing any model or buying new hardware, how do you cut the per-frame latency?'
details:
  realistic_solution: Pipeline the stages across frames. While the neural network processes frame N, the
    camera preprocessor ingests frame N+1, and post-processing finalizes frame N−1. In a 3-stage pipeline,
    the throughput is limited by the *slowest stage* (20ms), not the sum (33ms). This gives you 1 frame
    every 20ms = **50 FPS** — well above the 30 FPS requirement. The trade-off is increased *latency*
    (each individual frame takes 33ms from capture to output), but the *throughput* (frames per second
    delivered to the planner) meets the deadline.
  common_mistake: '"Optimize the neural network to run faster." The question explicitly says no model
    changes. The answer is architectural.'
  napkin_math: 'Sequential: 33ms/frame = 30.3 FPS (barely meets deadline, no margin). Pipelined: max(8,
    20, 5) = 20ms/frame = 50 FPS throughput. Latency per frame = 33ms (unchanged), but throughput headroom
    = 50/30 = 67% margin for WCET spikes.'
