schema_version: 1
id: edge-exp2-diag-0007
title: Diagnosing Sustained Throughput Drop on Hailo-8
topic: thermal-management
status: published
provenance: imported
scenario: We are deploying an edge vision system using a host CPU paired with a Hailo-8 accelerator (26
  TOPS INT8, 2.5W, no local DRAM). The system is housed in a passively cooled, sealed outdoor enclosure
  operating at 45°C ambient. Initially, the system easily sustains 60 FPS processing 4 video streams.
  However, after 15 minutes, throughput unpredictably drops to 20 FPS. Telemetry shows the Hailo-8 die
  temperature is only 65°C, well below its 85°C thermal limit, yet accelerator utilization plummets. Based
  on the hardware architecture, what is the root cause of this performance collapse?
details:
  realistic_solution: The root cause is thermal throttling of the host CPU or memory controller, not the
    accelerator. Because the Hailo-8 relies 100% on streaming from host memory over PCIe, any degradation
    in host memory bandwidth directly starves the accelerator. In the sealed 45°C enclosure, the host
    processor (which typically generates significantly more heat than the 2.5W Hailo-8) hits its thermal
    limit and underclocks its memory controller and PCIe root complex. This chokes the host bandwidth,
    starving the Hailo-8 of input data and causing utilization to plummet despite the accelerator being
    thermally safe.
  common_mistake: Candidates often assume the accelerator itself must be silently thermal throttling or
    that there is a software memory leak causing overhead. They fail to account for the Hailo-8's specific
    dataflow architecture, which lacks local DRAM and relies entirely on the host memory subsystem, missing
    the system-level thermal interactions.
  napkin_math: The Hailo-8 pulls only 2.5W, but a typical edge host CPU pulls ~15W, dominating the thermal
    load. To process 4x 1080p streams at 15 FPS each (60 FPS total), the host must push 4 * 1920 * 1080
    * 3 bytes * 15 FPS = ~373 MB/s of raw input over PCIe, plus output detections. When the host CPU hits
    95°C due to ambient heat buildup, it throttles its memory/PCIe clocks by ~66% to reduce power. The
    reliable host streaming bandwidth drops from ~2 GB/s to ~125 MB/s, which is a third of the required
    373 MB/s, forcing the overall system throughput to drop from 60 FPS down to 20 FPS as the Hailo-8
    stalls waiting for data.
