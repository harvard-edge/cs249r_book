schema_version: 1
id: edge-exp-diag-0030
title: Diagnosing Edge TPU Compiler Graph Partitioning
topic: graph-compilation
status: published
provenance: imported
scenario: Your team is deploying a custom CNN to a Google Coral Edge TPU (PCIe form factor) to leverage
  its highly efficient 4 TOPS INT8 compute at just 2W. During ahead-of-time compilation, you notice the
  Edge TPU compiler partitions the graph into three subgraphs, with the middle subgraph falling back to
  the host CPU. This causes severe latency spikes and high host CPU utilization. How do you identify the
  root cause of this compilation failure, and what constraints of the Edge TPU architecture typically
  lead to this symptom?
details:
  realistic_solution: The symptom indicates an unsupported operator or a dequantize/requantize step forcing
    the graph to split. To diagnose, you must parse the Edge TPU compiler's log files to locate the exact
    node causing the fallback (e.g., a custom activation like Swish or an unsupported padding mode). The
    solution is to apply operator lowering by substituting the unsupported op with mathematically equivalent
    supported ops (like ReLU6) or by truncating the graph to compile only the strictly supported backbone,
    handling the rest manually on the CPU.
  common_mistake: Candidates often assume that post-training quantization to INT8 guarantees full hardware
    compilation. They overlook that the Edge TPU has highly limited operator support and strict tensor
    shape constraints, meaning even correctly quantized INT8 operations will fall back to the CPU if they
    aren't on the hardware's explicitly supported whitelist.
  napkin_math: A fully compiled model needing 1 GOPS takes roughly 0.25ms on the 4 TOPS INT8 Edge TPU.
    However, graph partitioning introduces PCIe data transfer overhead. If an intermediate 2MB tensor
    must be moved from the Edge TPU to the CPU and back over a PCIe Gen2 x1 link (~500 MB/s practical
    bandwidth), the transfer alone takes (2MB * 2) / 500 MB/s = 8ms. This 8ms I/O bottleneck completely
    overshadows the 0.25ms compute time, nullifying the throughput benefits and the 2W power efficiency
    of the accelerator.
