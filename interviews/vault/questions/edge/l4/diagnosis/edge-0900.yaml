id: edge-0900
title: Adversarial Traffic on Edge Dragonfly
topic: load-balancing
status: published
provenance: imported
scenario: A specialized edge cluster for autonomous vehicle fleet management uses a miniature Dragonfly
  topology connecting 72 nodes across 9 chassis (8 nodes per chassis). Intra-chassis links are 200Gbps;
  inter-chassis optical links are 100Gbps. A distributed graph neural network (GNN) inference task causes
  massive congestion on a single inter-chassis link, while other optical links sit at 0% utilization.
details:
  realistic_solution: Identify the failure of static minimal routing in a Dragonfly topology. Dragonfly
    relies on high-radix routers and sparse global links. If static minimal (shortest-path) routing is
    used, an adversarial traffic pattern (like a GNN where one chassis communicates heavily with exactly
    one other chassis) will bottleneck on the single dedicated global link between those two chassis.
    The solution is to enable Adaptive Routing (AR) or Valiant Load Balancing (VLB), which routes traffic
    non-minimally through intermediate chassis to utilize idle global links and increase effective bisection
    bandwidth.
  common_mistake: Blaming the GNN's graph partitioning and attempting to manually re-partition the graph.
  napkin_math: In a 9-group Dragonfly, each group has 1 direct link to every other group. Traffic from
    Group A to Group B uses 1 link (100Gbps). With VLB, Group A can route to Group B via the 7 other groups.
    Effective bandwidth = 1 direct link + 7 indirect paths = 8 * 100Gbps = 800Gbps. Static routing leaves
    700Gbps of potential bandwidth unused.
