id: edge-fill-00371
title: Diagnosing Latency Spikes with Batching on Qualcomm Cloud AI 100
topic: batching-strategies
status: published
provenance: imported
scenario: You are deploying a real-time object detection model on a Qualcomm Cloud AI 100 accelerator,
  equipped with 32 GB LPDDR4x memory, delivering 400 TOPS (INT8) within a 75W power envelope. The system
  processes a continuous stream of camera frames from an edge device. Initially, a static batch size of
  4 was implemented to optimize for average throughput. However, production monitoring now shows sporadic,
  critical latency spikes, occasionally exceeding 100ms for individual frames, even though the average
  throughput remains within acceptable limits. Your task is to diagnose the root cause of these tail latency
  spikes, specifically investigating how the current static batching strategy interacts with input arrival
  patterns and the hardware capabilities of the Qualcomm Cloud AI 100.
details:
  realistic_solution: Implement a dynamic batching strategy with a tunable timeout mechanism and a maximum
    batch size. For instance, accumulate requests for a maximum of 5ms or until a batch size of 8 is reached,
    whichever occurs first. This approach optimizes for throughput under high load while ensuring low
    latency for individual requests during sparse periods. Additionally, explore continuous batching if
    the model and framework support it, to maximize device utilization and minimize idle time on the Qualcomm
    Cloud AI 100, coupled with intelligent scheduling policies that prioritize latency-sensitive requests.
  common_mistake: Relying solely on static batching for edge inference without considering the variability
    of input arrival rates or the potential for queueing delays. This often leads to requests waiting
    for a full batch to form, causing significant tail latency, especially when demand fluctuates or individual
    inference times are not perfectly uniform.
  napkin_math: Assume a static batch size of 4 and an average request arrival rate that would fill a batch
    every 20ms. If a single request arrives and no other requests follow for 15ms, it will incur at least
    15ms of queuing delay waiting for the batch to fill. If inference for a batch of 4 takes 10ms, the
    total latency for that first request is 15ms (queue) + 10ms (inference) = 25ms. With a dynamic batching
    timeout of 5ms, the same request would wait at most 5ms for a batch to form. If no other requests
    arrive, it would be processed as a batch of 1. If inference for a batch of 1 takes 3ms, the total
    latency is 5ms (queue/timeout) + 3ms (inference) = 8ms, a substantial improvement in tail latency.
