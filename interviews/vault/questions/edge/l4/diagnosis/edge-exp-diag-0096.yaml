schema_version: 1
id: edge-exp-diag-0096
title: Diagnosing OOM from Memory Fragmentation on AI 100
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are running an object detection pipeline on an on-premise Qualcomm Cloud AI 100 inference
  accelerator. The INT8 model weights consume 8 GB of the 32 GB LPDDR4x memory, and peak activations require
  another 6 GB. After several days of continuous operation handling dynamic batch sizes from multiple
  camera feeds, the application crashes with a device Out-Of-Memory (OOM) error, even though system telemetry
  reports only 18 GB of memory was in use. How do you diagnose the root cause of this failure?
details:
  realistic_solution: The root cause is memory fragmentation in the LPDDR4x device memory. Continuous
    allocation and deallocation of variably sized activation buffers over days fragment the available
    memory pool. When the system needs to allocate a large contiguous block for a sudden spike in batch
    size, the allocator fails to find a single contiguous chunk of free memory, triggering an OOM despite
    having sufficient total free memory. The fix is to pre-allocate a fixed-size memory pool for the maximum
    expected batch size upfront.
  common_mistake: Candidates often assume an application-level memory leak and suggest profiling the Python
    or C++ host code. They fail to consider device-level memory fragmentation caused by dynamic batching
    and variable tensor shapes on the accelerator's memory allocator.
  napkin_math: 'Available memory: 32 GB LPDDR4x. Static usage: 8 GB (INT8 Weights). Peak dynamic usage:
    6 GB (Activations). Max theoretical usage = 14 GB. Reported free memory = 32 GB - 14 GB = 18 GB. If
    the 18 GB of free memory is highly fragmented into isolated 10-50 MB chunks, an allocation request
    for a contiguous 1 GB activation tensor for a new batch will fail, causing an OOM on the 75W accelerator.'
