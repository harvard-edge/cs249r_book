schema_version: 1
id: edge-exp-diag-0087
title: INT8 Calibration Dataset Bias at the Edge
topic: dataset-curation
status: published
provenance: imported
scenario: Your team deployed a quantized pedestrian detection model to an NVIDIA Jetson Orin, leveraging
  the DLA accelerator and Ampere GPU to achieve high throughput using INT8 precision within the 60W TDP.
  The original FP32 model performed well across all conditions, but the edge deployment is experiencing
  a severe spike in false negatives exclusively during dusk and nighttime. The overall training dataset
  contains 90% daytime and 10% nighttime images. Given the hardware utilization of the Jetson Orin's 275
  TOPS INT8 engines, diagnose the root cause of this specific failure.
details:
  realistic_solution: The root cause is a blindly sampled INT8 calibration dataset that failed to stratify
    for lighting conditions. Because the Jetson Orin's DLA relies on INT8 precision, activations must
    be mapped to an 8-bit integer range [-128, 127]. If the calibration set was dominated by high-contrast
    daytime images, the quantization scale factors were set too wide. Consequently, small-magnitude activations
    typical of low-contrast nighttime images (e.g., 0.04, which quantizes to round(0.04/0.094) = 0) get
    quantized to zero, effectively erasing the signal before the DLA can process it. The fix is to curate
    a small, uniformly balanced calibration dataset that captures the full dynamic range of all deployment
    environments.
  common_mistake: Candidates often misdiagnose this as a general model capacity issue, a camera sensor
    dynamic range failure, or suggest retraining the entire model with more nighttime data. They fail
    to connect the symptom to the INT8 quantization process and the calibration dataset's distribution.
  napkin_math: 'Assume daytime activations span [-12.0, 12.0] and nighttime activations span [-0.8, 0.8].
    If the calibration set is biased to daytime, the INT8 scale factor is 24.0 / 255 ≈ 0.094 per bit.
    A critical nighttime feature producing an activation of 0.04 will be quantized: round(0.04 / 0.094)
    = round(0.43) = 0. The 32 GB LPDDR5 and 275 TOPS of compute are rendered useless for nighttime inference
    because the critical feature data is destroyed at the precision conversion layer due to biased calibration
    curation.'
