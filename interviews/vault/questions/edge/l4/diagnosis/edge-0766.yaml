schema_version: 1
id: edge-0766
title: The CAN Bus Telemetry Flood
topic: collective-communication
status: published
provenance: imported
scenario: Your autonomous forklift (TI TDA4VM, 8 TOPS) runs pallet detection and publishes results over
  the vehicle's CAN bus at 20 Hz. The forklift also has 15 other ECUs (motor controller, battery management,
  safety systems) sharing the same 500 Kbps CAN bus. After adding ML telemetry (detection count, confidence,
  latency, model version) to the CAN traffic, the safety system starts missing emergency stop messages.
  What went wrong, and how do you fix it without removing the telemetry?
details:
  realistic_solution: The ML telemetry is **saturating the CAN bus bandwidth**, causing lower-priority
    messages to be arbitrated out. CAN uses priority-based arbitration — lower message IDs win. If the
    ML telemetry messages have lower IDs (higher priority) than the safety system, they'll starve safety
    messages. Even if safety messages have higher priority, the bus utilization is the problem.
  common_mistake: '"Increase the CAN bus baud rate to 1 Mbps." CAN bus speed is set at the vehicle design
    level — changing it requires re-qualifying every ECU on the bus, which is a 6-month certification
    effort.'
  napkin_math: 'CAN bus budget: 3,846 frames/sec. Safety-critical allocation (must-have): 800 frames/sec
    (21%). Motor/battery/sensors: 1,700 frames/sec (44%). Headroom for jitter: 500 frames/sec (13%). Available
    for ML: 846 frames/sec (22%). Original ML demand: 240 frames/sec — fits numerically but pushes total
    utilization to 71%, above the reliability threshold. After optimization: 24 frames/sec (0.6% of bus).
    Total utilization: 65.6% — safely below the 70% threshold. Detailed telemetry over Ethernet: 100 Mbps
    link, ML data at ~50 Kbps = 0.05% utilization — effectively unlimited.'
