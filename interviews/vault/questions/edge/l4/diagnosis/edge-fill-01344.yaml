schema_version: 1
id: edge-fill-01344
title: 'Functional Safety Diagnosis on Jetson Orin: Watchdog Timer Malfunction'
topic: safety-certification
status: published
provenance: imported
scenario: A safety-critical autonomous driving system deployed on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W) is designed to meet ASIL-D functional safety requirements according to ISO 26262.
  During operation, the ML inference pipeline, responsible for object detection, experiences a transient
  software fault causing it to occasionally hang for several seconds. The system relies on a hardware
  watchdog timer (WDT) and periodic self-test routines to ensure deterministic execution and detect such
  anomalies. Describe how you would diagnose the root cause of the hanging ML pipeline, considering the
  interplay between the WDT, self-test routines, and the Jetson Orin's hardware capabilities, when the
  WDT unexpectedly fails to reset the system despite the hang.
details:
  realistic_solution: 'Diagnosis would involve a multi-layered approach:

    1.  **Analyze WDT logs/status registers**: Check if the WDT was actually triggered, if its configuration
    (timeout period, reset mechanism) was correct, and if its own health monitoring (if available) indicated
    any issues. This would involve accessing low-level hardware registers or system logs.

    2.  **Inspect OS/Kernel logs**: Look for evidence of the ML pipeline''s unresponsiveness (e.g., process
    not responding, CPU starvation, memory issues) and any messages related to WDT interactions.

    3.  **Augment self-test routines**: Introduce finer-grained, periodic self-tests within the ML pipeline
    itself (e.g., checking inference completion within expected deadlines, validating intermediate tensor
    integrity, monitoring GPU/TPU utilization) and establish clear safety monitors that report to a higher-level
    safety supervisor.

    4.  **Hardware-level diagnostics**: Utilize Jetson Orin''s internal diagnostic features (e.g., debug
    ports, performance counters, error reporting registers) to pinpoint hardware or driver issues if software
    logs are inconclusive.

    5.  **Deterministic execution analysis**: Ensure the ML pipeline''s execution path is truly deterministic.
    Undeterministic behavior might mask the true fault and make reproduction difficult.

    6.  **Fault Injection**: Systematically inject faults (e.g., deliberately freezing the ML process)
    in a testing environment to reproduce the WDT failure and understand its exact trigger conditions
    and limitations.'
  common_mistake: Assuming the watchdog timer is infallible or that simple process monitoring is sufficient.
    Overlooking silent data corruption or partial failures that don't trigger immediate system crashes
    but still compromise safety. Not having layered diagnostic mechanisms or assuming the WDT acts as
    a panacea for all software hangs, especially if the WDT itself becomes compromised or configured incorrectly.
  napkin_math: If the WDT on the Jetson Orin is configured to trigger a reset after `T_WDT_timeout = 200
    ms` of no petting, and the ML pipeline's maximum allowed latency before a safety violation is `T_safety_critical
    = 150 ms`, there's already a potential safety gap (`T_WDT_timeout - T_safety_critical = 50 ms`). If
    the WDT itself malfunctions, say, it stops decrementing its counter or fails to assert the reset signal,
    and a higher-level system supervisor polls the ML pipeline's health every `T_supervisor_poll = 500
    ms`, then a hang could persist for up to `T_supervisor_poll` before the *next* detection layer identifies
    the issue. This implies a maximum detection time of `T_WDT_timeout + T_supervisor_poll = 700 ms` in
    a malfunctioning WDT scenario before system-level intervention, severely violating the `T_safety_critical`
    requirement. The diagnostic challenge is identifying *why* the `T_WDT_timeout` threshold was crossed
    without a reset, implying a WDT failure or incorrect configuration rather than just an ML pipeline
    hang.
