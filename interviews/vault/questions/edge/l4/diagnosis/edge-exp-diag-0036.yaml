schema_version: 1
id: edge-exp-diag-0036
title: Diagnosing Latency Spikes on Edge TPUs
topic: monitoring-observability
status: published
provenance: imported
scenario: Your team deployed a fleet of INT8-quantized object detection models to remote traffic cameras
  equipped with Google Coral Edge TPUs via USB. Telemetry dashboards show that during the afternoon, inference
  latency intermittently spikes from 10ms to over 100ms, and overall throughput drops significantly. The
  host CPU load remains under 20%, and memory usage is stable. What is the most likely cause of this degradation,
  and how would you diagnose it?
details:
  realistic_solution: The root cause is thermal throttling. The Google Coral Edge TPU draws up to 2W under
    sustained load, generating significant heat. During warm afternoons, rising ambient temperatures cause
    the passively cooled USB accelerator to hit its thermal limit, triggering the driver to aggressively
    downclock the device to prevent hardware damage. Diagnosis requires exposing the TPU's onboard temperature
    sensor metrics to the observability stack.
  common_mistake: Candidates often assume software-level issues like garbage collection pauses, memory
    leaks, or network congestion, failing to consider the physical and environmental constraints of edge
    hardware.
  napkin_math: The Coral Edge TPU delivers 4 TOPS INT8 at roughly 2W. If a model takes 10ms to run at
    full speed, it requires 0.04 tera-operations per inference. When thermal throttling engages, the clock
    speed can drop by up to 10x to shed heat. At 0.4 TOPS, the same 0.04 tera-operation inference will
    now take 100ms (0.04 / 0.4 = 0.1 seconds), directly explaining the latency spike observed in the telemetry.
