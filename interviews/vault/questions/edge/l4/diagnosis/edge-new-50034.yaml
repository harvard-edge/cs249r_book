schema_version: 1
id: edge-new-50034
title: Handling INT8 Quantization Discrepancies Across Edge Runtimes
topic: software-portability
status: published
provenance: imported
scenario: Your INT8-quantized object detection model achieves 42.1 mAP when quantized with TensorRT's
  PTQ on Jetson Orin, but only 39.8 mAP when the same FP32 model is quantized with ONNX Runtime's built-in
  quantizer using the same calibration dataset. The 2.3 mAP gap is unacceptable.
details:
  realistic_solution: 'MinMax calibration is sensitive to outliers — a single extreme activation value
    can expand the quantization range, wasting precision for the majority of values. Switch ORT to percentile
    calibration (clip at 99.99th percentile) or use the entropy method via onnxruntime.quantization.CalibrationMethod.Entropy.
    Additionally, TensorRT applies per-channel quantization by default for Conv weights while ORT defaults
    to per-tensor. Enable per-channel quantization in ORT: quantize_dynamic with per_channel=True. These
    two changes typically recover 1.5-2.0 mAP.'
  common_mistake: 'Blaming the calibration dataset size. Both use the same 1000-image calibration set.
    The difference lies in the quantization algorithm: TensorRT uses entropy-based calibration (KL divergence
    minimization) while ORT''s default uses MinMax calibration.'
  napkin_math: 'Per-tensor INT8 for a weight range of [-2.0, 8.0]: scale = 10/255 = 0.039, 8-bit resolution
    across full range. Per-channel with typical range [-1.0, 1.5]: scale = 2.5/255 = 0.0098, 4x finer
    resolution. This directly explains the mAP gap.'
