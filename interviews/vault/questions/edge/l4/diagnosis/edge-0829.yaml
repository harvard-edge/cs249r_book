id: edge-0829
title: Diagnosing Forgetting in Edge Anomaly Detection
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a continuous learning anomaly detection model on an industrial edge gateway
  (4GB RAM, 1GB free flash storage) monitoring a CNC machine. The model fine-tunes locally every hour
  using streaming vibration and temperature data. After 72 hours, the model perfectly identifies recent
  spindle wear anomalies but completely fails to detect a bearing failure anomaly it was explicitly trained
  to catch on day one. Analyze the root cause and propose a local storage strategy to fix this without
  exceeding the available flash memory.
details:
  realistic_solution: Implement a reservoir-sampled Experience Replay buffer. Allocate 500MB of the available
    flash storage to maintain a diverse set of historical edge cases. During the hourly local fine-tuning,
    interleave the current batch of new sensor data with an equal-sized batch randomly sampled from the
    replay buffer to explicitly preserve the historical decision boundaries.
  common_mistake: Relying purely on regularization techniques like Elastic Weight Consolidation (EWC)
    which introduces significant compute overhead on the edge CPU, or simply freezing the lower layers,
    which limits adaptation to new anomalies.
  napkin_math: 1 sample = 10KB (1000 float32 readings + metadata). A 500MB flash allocation allows storing
    50,000 historical samples. At a 10Hz sampling rate, a day generates ~864,000 samples. By using reservoir
    sampling to maintain the 50K buffer and interleaving batches (e.g., 32 new + 32 replay), the model
    avoids catastrophic forgetting while remaining well within the 1GB storage and 4GB RAM limits.
