schema_version: 1
id: edge-0664
title: The eMMC Cold Start
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your edge device loads a 200 MB model from eMMC flash into DRAM at boot. The eMMC spec says
  300 MB/s sequential read, so you expect a 0.67-second load time. In practice, first inference takes
  over 3 seconds. Where did the other 2.3 seconds go?
details:
  realistic_solution: 'The 300 MB/s spec is for large sequential reads. Model loading involves: (1) filesystem
    overhead — ext4 metadata lookups, inode traversal, and block allocation table reads add ~200ms, (2)
    the model file is fragmented on a well-used eMMC — random 4K reads drop to ~20 MB/s, adding ~500ms,
    (3) TensorRT engine deserialization — parsing the serialized engine, allocating CUDA memory, and building
    the execution context takes ~1.5s for a 200 MB engine, (4) CUDA context initialization on first use
    adds ~300ms. The fix: (a) store the model on a dedicated, defragmented partition, (b) use `mmap()`
    to map the weight file so pages load on demand during the first inference rather than all at once,
    (c) keep a lightweight fallback model (~20 MB, loads in <200ms) that serves immediately while the
    full model loads in a background thread.'
  common_mistake: '"The eMMC is slower than spec." The raw bandwidth is fine — the overhead is elsewhere.'
  napkin_math: 'Sequential read: 200MB / 300MB/s = 0.67s. The missing 2.3s is execution overhead. TensorRT
    deserialization on a Cortex-M4 or Orin CPU involves memory allocation and PCIe/system bus transfers.
    Moving 200MB to Orin''s DRAM at 204.8 GB/s is instant (0.001s). But CUDA context initialization takes
    ~300ms. JIT compiling/optimizing un-cached engine layers easily eats 1.5s. Flash fragmentation adds
    the remaining 0.5s.'
