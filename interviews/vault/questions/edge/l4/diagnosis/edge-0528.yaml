id: edge-0528
title: The Watchdog Timeout Freeze
topic: latency-decomposition
status: published
provenance: imported
scenario: Your autonomous drone uses a Jetson Nano. The flight controller expects a heartbeat signal from
  your ML perception script over UART every 200ms. If it doesn't get one, it assumes the Jetson crashed
  and triggers an emergency landing. Your ML inference takes 50ms. However, once a minute, the drone emergency
  lands. Your inference didn't crash. What OS-level event stalled your script for over 200ms?
details:
  realistic_solution: 'The script was preempted by a Linux kernel page reclaim or I/O write-back event.
    The Jetson Nano runs standard Linux, which periodically flushes dirty pages to the SD card. When memory
    pressure triggers the OOM killer''s neighbor — the `kswapd` page reclaim daemon — or when `pdflush`/`writeback`
    runs, the kernel can stall user-space threads for 300-1500ms while it synchronizes pages to the slow
    SD card (~25 MB/s). This obliterates the 200ms heartbeat deadline. The fix: use `mlockall()` to pin
    inference memory, move logging to tmpfs, disable swap, and use a PREEMPT_RT kernel to bound kernel
    latency.'
  common_mistake: '"The Jetson thermal throttled." Throttling slows things down by 20-30%, it doesn''t
    cause a 4x latency spike that lasts for half a second.'
  napkin_math: Inference = 50ms. Deadline = 200ms. Linux `sync()` or SD card write-back stall under heavy
    load = 300ms to 1,500ms. The OS overhead completely obliterates your 150ms of safety margin.
