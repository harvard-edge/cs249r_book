schema_version: 1
id: edge-fill-00103
title: Systolic Array Dataflow Optimization for Qualcomm Cloud AI 100
topic: systolic-dataflow
status: published
provenance: imported
scenario: A new Transformer-based object detection model is deployed on a Qualcomm Cloud AI 100 (32 GB
  LPDDR4x, 400 TOPS INT8, 75W TDP) for real-time edge inference. Initial profiling shows that while the
  INT8 throughput is theoretically very high, the actual inference latency is 2x higher than expected
  for the transformer's self-attention layers, and the AI Cores are significantly underutilized (averaging
  30% utilization). You suspect an issue with how data is fed into the systolic arrays. What could be
  the root cause of this underutilization and increased latency, specifically considering the characteristics
  of transformer layers and the Qualcomm AI 100's architecture?
details:
  realistic_solution: The problem likely stems from a suboptimal dataflow strategy for the self-attention
    layers. Given the large intermediate activations and smaller weight matrices characteristic of transformer
    attention, an output-stationary dataflow might be more efficient than a weight-stationary one for
    these specific layers. This minimizes redundant fetching of activations and maximizes on-chip reuse
    of outputs as they are computed. Additionally, optimizing tiling parameters (tile sizes for weights,
    inputs, and outputs) to fit within the 144 MB on-die SRAM of each AI core (or the shared LPDDR4x for
    larger tiles) would reduce costly LPDDR4x accesses, ensuring data is available to the systolic array
    when needed.
  common_mistake: A common mistake is assuming a 'one-size-fits-all' dataflow (e.g., always weight-stationary)
    for all layers or models, without considering the specific memory access patterns of different operations
    (like matrix multiplications in attention heads) or the limited on-chip memory. Inefficient tiling
    strategies can also lead to frequent off-chip memory accesses, starving the systolic array.
  napkin_math: 'If the Qualcomm AI 100 delivers 400 TOPS (INT8), it means 400 * 10^12 operations per second.
    If a specific layer requires 10^10 INT8 ops and the observed latency is 100ms, the effective TOPS
    is (10^10 ops) / (0.1 s) = 10^11 ops/s = 0.1 TOPS. This implies a massive underutilization: (0.1 TOPS
    / 400 TOPS) * 100% = 0.025% utilization, far worse than the 30% average. The discrepancy suggests
    a bottleneck. If we assume a memory bound scenario, with LPDDR4x bandwidth of 136 GB/s, and each INT8
    operation requires, say, 2 bytes of data (input + weight, simplified), then 136 GB/s / (2 bytes/op)
    = 68 Giga-ops/s, which is 0.068 TOPS. This shows how quickly memory bandwidth can become the bottleneck
    if data is not reused efficiently on-chip, even if the compute units are theoretically capable of
    higher throughput.'
