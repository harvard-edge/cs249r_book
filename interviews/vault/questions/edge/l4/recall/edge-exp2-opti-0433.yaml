schema_version: 1
id: edge-exp2-opti-0433
title: Mitigating Bandwidth Bottlenecks for 4-bit AWQ on Jetson Orin
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 7B parameter transformer model for real-time local processing on an NVIDIA
  Jetson Orin. To fit within the 60W TDP and reduce memory footprint, you apply 4-bit AWQ, reducing the
  model size from 14 GB (FP16) to 3.5 GB, easily fitting into the 32 GB LPDDR5 memory. However, during
  the auto-regressive decoding phase on the Ampere GPU, you notice the latency is 2x slower than expected
  and compute utilization is extremely low, despite the device's 275 TOPS INT8 capability. Analyze the
  interaction between the 4-bit quantized weights, the dequantization overhead, and the memory subsystem
  to identify the bottleneck and quantify a solution.
details:
  realistic_solution: The bottleneck is the memory bandwidth saturation caused by reading 4-bit weights
    and writing/reading intermediate FP16 dequantized weights back to LPDDR5. The solution is to implement
    fused CUDA kernels that load 4-bit weights, perform on-the-fly dequantization in registers/shared
    memory, and immediately execute the matrix-vector multiplication. This avoids global memory round-trips
    for the dequantized weights, shifting the operation back to being bounded only by the initial weight
    read.
  common_mistake: Candidates often assume that moving from FP16 to 4-bit quantization automatically yields
    a proportional speedup in memory-bound workloads. They fail to realize that without fused operations,
    the GPU must dequantize weights to FP16 into global memory before matrix multiplication, creating
    massive memory traffic overhead.
  napkin_math: The 7B model requires loading 3.5 GB of 4-bit weights per token. Assuming Orin's ~204 GB/s
    LPDDR5 bandwidth, theoretical max speed is 204 GB/s / 3.5 GB = 58 tokens/s. Unfused dequantization
    writes 14 GB (FP16) to memory and reads it back, totaling 3.5 (read 4-bit) + 14 (write FP16) + 14
    (read FP16) = 31.5 GB of memory traffic per token. This drops throughput to 204 / 31.5 = 6.4 tokens/s.
    Implementing a fused kernel removes the 28 GB of intermediate traffic, reducing traffic back to 3.5
    GB per token and quantifying a potential ~9x speedup (from 6.4 to 58 tokens/s), effectively resolving
    the bottleneck.
