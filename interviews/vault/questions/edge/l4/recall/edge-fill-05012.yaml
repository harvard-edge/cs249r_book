schema_version: 1
id: edge-fill-05012
title: INT4 Weight-Only Quantization for LLM on Hailo-8
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A team wants to deploy a 3B parameter LLM on Hailo-8 (26 TOPS INT8, 2.5W, 4GB on-chip memory).
  At FP16, the model is 6GB — doesn't fit. They propose INT4 weight-only quantization with INT8 activations
  (W4A8). Calculate the memory footprint and estimate throughput implications.
details:
  realistic_solution: 'W4A8 model size: 3B params × 0.5 bytes = 1.5GB weights (fits Hailo-8). Activations
    at INT8 add ~200MB for typical batch processing. Total ≈ 1.7GB — fits. However, Hailo-8 INT8 units
    require dequantizing INT4→INT8 weights on-the-fly, which costs ~10-20% throughput overhead. Effective
    throughput: 26 TOPS × 0.85 = 22 TOPS. Per-token decode: 3B × 2 FLOPs/param / 22 TOPS = 0.27ms per
    token ≈ 3700 tok/s — exceeds memory bandwidth limit of 4GB/2.5W scenario.'
  common_mistake: Assuming W4A8 runs at INT4 hardware throughput; Hailo-8 has INT8 compute units, so W4
    weights must be dequantized to INT8 before matrix multiplication, adding overhead.
  napkin_math: 'W4 model: 3B × 0.5B/param = 1.5GB (fits 4GB). Dequant overhead: ~15% = 22 effective TOPS.
    Token decode: 6B FLOPs / 22 TOPS = 0.27ms = 3700 tok/s. Memory bandwidth limited at 100+ GB/s effective
    — check Hailo-8 on-chip bandwidth specs.'
