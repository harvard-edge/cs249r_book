schema_version: 1
id: edge-exp2-opti-0437
title: Edge TPU Multi-Model Cache Thrashing
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a cascaded vision pipeline (Object Detection followed by Image Classification)
  on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, USB 3.0 interface). The inference server loads
  Model A (Detection, 5.5MB INT8) and Model B (Classification, 4.5MB INT8), executing them sequentially
  for each incoming video frame. Despite the 4 TOPS capability, the system is suffering from severe latency
  bottlenecks, and profiling reveals the TPU is idle for over 80% of the inference cycle.
details:
  realistic_solution: The Google Coral Edge TPU has exactly 8MB of on-chip SRAM for parameter caching.
    Because Model A (5.5MB) and Model B (4.5MB) combined require 10MB, they exceed the SRAM limit. The
    serving infrastructure is forced to evict and reload weights across the USB 3.0 bus for every single
    step of the cascade, causing parameter thrashing. The solution is either implementing temporal batching
    in the inference server (run Model A for 10 frames, then Model B) to amortize load times, or aggressively
    pruning Model B to <2.5MB so both models fit entirely in the 8MB SRAM.
  common_mistake: Candidates typically assume the bottleneck is CPU pre-processing, image transfer latency
    over USB, or unsupported operators falling back to the CPU. They often suggest multithreading the
    CPU or resizing inputs without analyzing the physical memory constraints and model loading behavior
    of the specific accelerator.
  napkin_math: 'SRAM capacity = 8MB. Combined INT8 models = 10MB (guaranteed cache miss every inference).
    Practical USB 3.0 bandwidth = ~400 MB/s. Weight transfer penalty per frame: 5.5MB (Model A) + 4.5MB
    (Model B) = 10MB transfer. Transfer latency = 10MB / 400 MB/s = 25 ms. Actual compute time at 4 TOPS
    = ~1.5 ms per model (3 ms total). Unoptimized total latency = 25 ms (loading) + 3 ms (compute) = 28
    ms (~35 FPS). If Model B is pruned to 2MB, combined size = 7.5MB (<8MB). Weights stay pinned in SRAM,
    transfer latency drops to 0 ms. Optimized total latency = 3 ms compute. Throughput jumps from 35 FPS
    to ~333 FPS (a 9x improvement).'
