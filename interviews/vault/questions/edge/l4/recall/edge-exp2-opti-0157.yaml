schema_version: 1
id: edge-exp2-opti-0157
title: Edge TPU Multi-Model Pipeline Fallback Optimization
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a compound visual QA system on a Google Coral Edge TPU (4 TOPS INT8, 2W).
  The pipeline chains an object detector and a custom OCR classifier. Currently, the system only achieves
  13 FPS instead of the target 30 FPS. Profiling reveals that while the detector runs entirely on the
  TPU in 15ms, the OCR model suffers severe latency due to an unsupported Swish activation function, forcing
  intermediate tensors to be transferred back and forth over the USB/PCIe interface to the host CPU.
details:
  realistic_solution: Diagnose the graph compilation logs to identify the unsupported Swish operator causing
    the CPU fallback. Replace it with a Coral-supported ReLU6 activation and retrain/requantize the model
    to strict INT8. Recompile the model with the Edge TPU compiler to ensure the entire subgraph is mapped
    to the TPU, eliminating the catastrophic host-device I/O overhead.
  common_mistake: Candidates often suggest pruning the model, buying a more powerful edge device, or aggressive
    downsampling. They fail to identify that the CPU fallback and the resulting host-to-device memory
    transfer over the USB/PCIe interface is the true bottleneck, not the raw compute capacity.
  napkin_math: 'Current baseline latency: Detector (15ms on TPU) + OCR (60ms total: 10ms TPU + 40ms USB
    transfer overhead + 10ms CPU). Total = 75ms, yielding 1000/75 = 13.3 FPS. Optimized pipeline: Swapping
    to ReLU6 and full INT8 compilation eliminates the 40ms transfer and 10ms CPU time. The OCR model now
    takes roughly 12ms entirely on the 4 TOPS TPU. New total latency = 15ms (Detector) + 12ms (OCR) =
    27ms. New throughput = 1000/27 = 37 FPS, exceeding the 30 FPS target while maintaining the 2W power
    budget.'
