id: edge-cell-10215
title: Optimizing FAISS Index Type Selection for Jetson Orin Memory Constraints
topic: compound-ai-systems
status: published
provenance: imported
scenario: A Jetson Orin (32GB LPDDR5) RAG system needs to search a 500,000-document corpus with 768-dim
  embeddings. FAISS IndexFlatL2 (exact search) requires 500K * 768 * 4 bytes = 1.47GB and takes 180ms
  per query. FAISS IVF100,PQ96 (approximate) requires 180MB and takes 8ms per query but has 12% recall
  loss at top-10. Evaluate which index type to use given the memory and latency constraints, and calculate
  the optimal IVF cluster count.
details:
  realistic_solution: 'With 32GB available and the full pipeline (3B model at ~3GB INT8 + other overhead
    ~2GB), the flat index at 1.47GB fits easily. However, 180ms for retrieval is too slow if P95 latency
    SLA is 500ms. Use IVF1000,Flat (1000 clusters, exact within cluster): memory = flat centroids (1000*768*4=3MB)
    + flat shards (same 1.47GB) ≈ 1.47GB, but query time with nprobe=50 = 50/1000 * 180ms = 9ms, recall@10
    ~95%. This gives near-exact recall with 20x speedup. Alternatively IVF1000,PQ64 at 60MB + 12ms, recall
    88%.'
  common_mistake: Choosing the approximate index purely based on memory savings without calculating whether
    the recall loss is acceptable for the downstream LLM quality, or failing to tune nprobe (the number
    of clusters searched at query time) to balance speed vs recall.
  napkin_math: 'IndexFlatL2: 500K * 768 * 4 = 1,536,000,000 bytes = 1.47GB. Query: scans full 1.47GB at
    LPDDR5 68.3GB/s = 21.5ms theoretical (actual 180ms due to distance compute overhead). IVF1000,Flat
    nprobe=50: searches 50 clusters of 500 docs each = 25,000 docs. 25K/500K * 180ms = 9ms. Recall with
    nprobe=50 and 1000 clusters: ~95% (nprobe/nlist = 5% coverage, but clustered so ~95% recall for typical
    distributions). IVF100,PQ96: 180MB, 8ms, 88% recall — acceptable if downstream quality degrades gracefully.'
