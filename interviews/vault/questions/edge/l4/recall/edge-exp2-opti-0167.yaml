schema_version: 1
id: edge-exp2-opti-0167
title: Thermal Throttling Degradation on Jetson Orin
topic: graceful-degradation
status: published
provenance: imported
scenario: An autonomous mobile robot powered by an NVIDIA Jetson Orin is operating in an industrial setting.
  Due to high ambient temperatures and sustained 60W TDP utilization, the SoC triggers thermal throttling,
  reducing the available Ampere GPU clock speed by 40%. The perception pipeline normally runs a heavy
  3D LiDAR+Camera fusion model on the GPU and a lightweight pedestrian tracking model on the DLA accelerator.
  You need to analyze the bottleneck and design a degradation ladder to maintain fail-operational status
  at a safe 20 FPS.
details:
  realistic_solution: Implement a deterministic fallback strategy that sheds the LiDAR point-cloud processing
    (quality-of-service shedding) and switches to an INT8 2D camera-only object detection model on the
    GPU. This eliminates the heavy 3D fusion bottleneck. The system maintains the pedestrian tracking
    on the DLA. This fail-operational state sacrifices depth precision but guarantees the minimum 20 FPS
    required for emergency braking.
  common_mistake: Candidates often suggest naive frame dropping, which ruins the tracking model's temporal
    consistency and violates the fail-operational safety requirement. Another common error is attempting
    to seamlessly migrate the complex 3D fusion model to the DLA, ignoring that the DLA lacks support
    for certain custom layers and is already saturated by the tracking model.
  napkin_math: 'Normal state: 3D fusion requires ~120 TOPS (INT8), Tracking requires 20 TOPS (INT8). Total
    140 TOPS (well under the 275 TOPS max, but draws near 50W-60W TDP). Throttled state: GPU clock drops
    40%, effectively capping GPU throughput and increasing latency per frame beyond the 50ms (20 FPS)
    deadline. Fallback state: 2D Camera-only model requires 35 TOPS (INT8). Total pipeline drops to 55
    TOPS (35 GPU + 20 DLA). This 60% reduction in compute load allows the Orin to comfortably process
    frames within 30ms even at throttled clock speeds, dropping power consumption and allowing the SoC
    to cool.'
