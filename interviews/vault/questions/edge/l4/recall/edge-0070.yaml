id: edge-0070
title: The Edge Inference Power Profiling
topic: power-budgeting
status: published
provenance: imported
scenario: 'You''re designing a battery-powered inspection drone with a Qualcomm RB5 (15 TOPS, 7W typical).
  The drone carries a 99.9 Wh battery (the FAA limit for carry-on). Your manager asks: ''How many hours
  of continuous AI-powered inspection can we get?'' You measure idle power at 3W and inference power at
  9W. Your colleague divides: 99.9Wh / 9W = 11.1 hours. Why is this estimate both too optimistic and too
  pessimistic?'
details:
  realistic_solution: 'The estimate is too optimistic because it ignores non-AI power consumers: (1) Drone
    motors: 150-300W in flight (this dominates everything — the AI is <5% of total power). (2) Camera
    and gimbal: 3W. (3) GPS, IMU, barometer: 1W. (4) Radio telemetry: 2W. (5) Voltage regulator losses:
    ~15% of total. Total flight power: ~250W average. Flight time: 99.9Wh / 250W = 24 minutes — the AI''s
    5.7W average draw is irrelevant to flight time.'
  common_mistake: '"Battery life = capacity / power draw." This ignores that the drone isn''t just an
    AI computer — and that the AI doesn''t run at constant power.'
  napkin_math: 'Drone: 250W flight + 5.7W AI = 255.7W → 99.9/255.7 = 23.4 min. AI''s share: 5.7/255.7
    = 2.2% of power. Ground robot: 20W base + 5.7W AI = 25.7W → 99.9/25.7 = 3.88 hours. Energy per inference:
    9W active, but wait, total power per sec = 5.7J = 5.7W. For 24 minutes (0.4h): AI consumes 5.7W *
    0.4h = 2.28 Wh. The remaining 97.6 Wh powers the base platform (motors, sensors, comms).'
