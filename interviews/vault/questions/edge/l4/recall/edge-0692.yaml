schema_version: 1
id: edge-0692
title: Quantization Impact on Detection mAP
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re deploying YOLOv8s (11.2M params) on a Jetson Orin for construction site safety monitoring.
  You have three quantization options: FP32 (44.9 mAP on COCO), FP16 (44.8 mAP), and INT8 (43.5 mAP).
  The safety team requires ≥43.0 mAP for hard-hat detection. Calculate the inference latency and throughput
  for each option, and determine the optimal precision given a 33ms latency budget and a requirement to
  process 8 camera streams.'
details:
  realistic_solution: 'INT8 meets the 43.0 mAP threshold on COCO (43.5), but validate on your domain first.
    Compute analysis: FP16 at ~6ms per inference can handle 8 cameras batched in ~15ms (within 33ms budget).
    INT8 at ~3ms handles the same batch in ~8ms, freeing GPU headroom for tracking or additional models.
    However, the 43.5 mAP is measured on COCO — construction site distribution differs significantly.
    Small hard hats at distance are particularly sensitive to quantization error in the detection head.
    Recommendation: run INT8 calibration on construction site data, validate domain-specific mAP, and
    if it drops below 43.0, use FP16 as the safer choice with adequate performance.'
  common_mistake: '"INT8 is fastest and meets the 43.0 mAP threshold, so always use INT8." This ignores
    that the 43.5 mAP is measured on COCO — your construction site distribution is different. Domain-specific
    accuracy often drops more than COCO benchmarks suggest, especially for small objects (hard hats at
    distance) where quantization error in the detection head causes more missed detections.'
  napkin_math: 'Compute scaling: FP32 → FP16 = 2× speedup (16-bit Tensor Cores). FP16 → INT8 = 2× speedup
    (8-bit Tensor Cores). FP32 → INT8 = 4× speedup. Memory scaling: FP32 weights = 44.8 MB. FP16 = 22.4
    MB. INT8 = 11.2 MB. Bandwidth savings: 4× from FP32 to INT8. For 8 cameras at FP16: GPU utilization
    = 8 × 6ms / 33ms = 145% → must batch. Batch-of-8 FP16: ~15ms (batching amortizes kernel launch overhead).
    GPU utilization: 15/33 = 45%. Power: ~20W. At INT8 batch-of-8: ~8ms, GPU utilization 24%, power ~12W.
    The 8W savings × 8,760h × $0.12/kWh = $8.41/year per device — negligible. Choose based on accuracy,
    not power.'
