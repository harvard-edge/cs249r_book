id: edge-0917
title: Drone Power-Precision Tradeoff
topic: real-time-deadlines
status: published
provenance: imported
scenario: A battery-powered drone runs obstacle avoidance at 30 FPS. The model requires 10 GOPS/frame.
  The SoC has an FP16 GPU (2 TFLOPS peak, drawing 4W) and an INT8 NPU (8 TOPS peak, drawing 1W). Quantizing
  the model to INT8 increases the required compute to 12 GOPS due to quantization-aware scaling layers,
  and drops accuracy by 1%. The product manager suggests using the GPU to avoid the 20% compute penalty
  and accuracy drop. Evaluate the impact on flight time to justify your architectural choice.
details:
  realistic_solution: Although the INT8 model requires 20% more operations (12 GOPS vs 10 GOPS), the NPU's
    power efficiency (TOPS/Watt) is vastly superior to the GPU. We must calculate the energy consumed
    per frame for both accelerators to determine the battery drain. The GPU consumes 20mJ per frame, while
    the NPU consumes only 1.5mJ per frame. Despite the compute overhead from quantization scaling layers,
    the INT8 NPU is over 13x more energy-efficient per frame. For a battery-constrained edge device, the
    NPU is the only viable choice to maximize flight time.
  common_mistake: Focusing solely on the 20% increase in GOPS and assuming the INT8 model will draw more
    total energy because it requires more operations.
  napkin_math: "GPU efficiency: 2 TFLOPS / 4W = 500 GFLOPS/W. \nGPU Frame Energy: 10 GOPS / 500 GFLOPS/W\
    \ = 0.02 Joules = 20 mJ.\nNPU efficiency: 8 TOPS / 1W = 8000 GOPS/W. \nNPU Frame Energy: 12 GOPS /\
    \ 8000 GOPS/W = 0.0015 Joules = 1.5 mJ.\nAt 30 FPS, GPU draws 0.6W average, NPU draws 0.045W average.\
    \ The NPU saves 0.555W continuously."
