id: edge-cell-12010
title: 'Latency Decomposition: Diagnose and Fix Jetson Orin Inference Latency Spike'
topic: latency-decomposition
status: published
provenance: imported
scenario: A deployed Jetson Orin (275 TOPS INT8, 60W) running a safety classifier at 60fps shows occasional
  latency spikes from 8ms to 45ms under sustained load. The model is INT8 TensorRT, 2 GOPs. Profiling
  shows GPU utilization stays at 60% during spikes. Diagnose and quantify a fix.
details:
  realistic_solution: 'At 60fps, camera ISP consumes ~15 GB/s of LPDDR5 (4K × 3 channels × 60fps × 1 byte
    = 1.3GB/s — actually modest). More likely: thermal throttling reduces clocks. Jetson Orin at 60W sustained
    hits thermal limits, throttling GPU from 1.3GHz to 0.8GHz (38% reduction) → latency spikes 1.6×. Fix:
    enable power mode NVPModel 2 (30W) or add active cooling to sustain 60W without throttle.'
  common_mistake: Assuming latency spikes are compute-bound and adding more GPU resources; missing that
    LPDDR5 bandwidth contention with CPU and camera ISP causes the spikes.
  napkin_math: 'Model: 2 GOPs INT8. At full 275 TOPS: 2/275 ≈ 7.3ms? No: 2G/275T = 0.0073ms — far too
    fast. Realistic at 60% util: 2G/(275T×0.6) = 0.012ms. So latency is 8ms overhead-dominated. Spike
    to 45ms = 5.6× slower → consistent with thermal throttle from 1.3GHz to 0.23GHz (unlikely) or memory
    contention. Most likely: other processes competing. Fix: pin process to DLA exclusively (no GPU sharing)
    → deterministic 6ms.'
