id: edge-fill-01517
title: Optimizing Dataset Curation for Hailo-8 Edge Deployment
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing an industrial defect detection system deployed on a fleet of edge devices,
  each powered by a Hailo-8 NPU (26 TOPS INT8, 2.5W dataflow accelerator). The current model exhibits
  a persistently high false positive rate for a critical defect, impacting operational efficiency. You're
  tasked with optimizing the dataset curation and labeling workflow to rapidly address this issue. How
  would you diagnose the bottleneck in the current data pipeline and quantify the potential improvement
  of your proposed solution, leveraging the Hailo-8's capabilities?
details:
  realistic_solution: Implement an active learning strategy where the current model, deployed on the Hailo-8
    NPUs at the edge, performs real-time inference on newly collected data. The model identifies samples
    with high uncertainty (e.g., predictions close to the decision boundary) or specific patterns indicative
    of false positives. Only these 'most informative' samples are then streamed back to a human annotation
    pipeline for labeling. This ensures that annotation efforts are focused on data that directly addresses
    the model's weaknesses, leveraging the Hailo-8's high INT8 throughput for efficient on-device filtering.
  common_mistake: A common mistake is to simply collect more data and label it without strategic prioritization,
    or to send all collected data to human annotators without an efficient filtering mechanism. This leads
    to slow iteration cycles, high annotation costs, and potentially redundant labeling effort on data
    that doesn't significantly improve model performance for the target problem (reducing false positives).
  napkin_math: 'Assume the existing system collects 50,000 new images daily. Without active learning,
    20% are randomly selected for full annotation, resulting in 10,000 images/day for human labeling.
    Each image takes 30 seconds to annotate, leading to 300,000 seconds (83.3 hours) of annotation effort
    daily, requiring ~10 annotators. With active learning, the Hailo-8 performs inference on all 50,000
    images. Given its 26 TOPS INT8 capability, inference on a typical object detection model takes ~5ms
    per image. Total daily inference time: 50,000 images * 5ms/image = 250 seconds. From these, only 5%
    (2,500 images) are identified as highly informative for human review. This reduces annotation effort
    to 2,500 images/day * 30 seconds/image = 75,000 seconds (20.8 hours), requiring ~2-3 annotators. This
    quantifies an 80% reduction in annotation costs and a significant acceleration in the model improvement
    cycle, enabled by the Hailo-8''s efficient on-device inference.'
