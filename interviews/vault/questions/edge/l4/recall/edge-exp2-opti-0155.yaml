schema_version: 1
id: edge-exp2-opti-0155
title: Dynamic Batching Latency Optimization on Jetson Orin
topic: batching-strategies
status: published
provenance: imported
scenario: Your team is deploying a multi-camera perception system for an autonomous vehicle using an NVIDIA
  Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The system ingests 6 concurrent video streams at
  30 FPS, and you are currently using dynamic batching on the Ampere GPU with a 15ms timeout window to
  maximize throughput. However, tail latency periodically spikes to 80ms, violating the strict 33.3ms
  real-time latency deadline for the control loop. You must diagnose the root cause of these latency spikes
  and quantify a new batching and scheduling strategy to eliminate the bottleneck.
details:
  realistic_solution: The optimal approach is to replace dynamic batching on the GPU with a hybrid static
    batching strategy that leverages both the Ampere GPU and the DLA. By splitting the 6 streams into
    fixed static batches of 2, you can pipeline the execution across the GPU and the two DLA cores. This
    eliminates the dynamic batching wait window entirely and provides deterministic execution times, resolving
    the memory bandwidth contention that causes tail latency spikes.
  common_mistake: Candidates often suggest simply reducing the dynamic batching timeout window, which
    reduces average latency but fails to address the tail latency caused by GPU memory contention. They
    frequently overlook the Jetson Orin's heterogeneous architecture and fail to utilize the DLA (Deep
    Learning Accelerator) for deterministic, fixed-batch execution.
  napkin_math: 'Target deadline: 1000ms / 30 FPS = 33.3ms. Current dynamic batch latency: 15ms (timeout)
    + 18ms (GPU infer for batch 6) = 33ms, with spikes to 80ms due to memory contention. Solution: Jetson
    Orin provides 275 TOPS INT8 total. The model requires 0.5 TOPS per frame. 30 FPS * 6 streams = 180
    frames/sec = 90 TOPS, well within the 275 TOPS limit. Splitting into static batch size 2 (1 GPU pipeline,
    2 DLA cores), execution time drops to 8ms per batch without wait timeouts, guaranteeing an 8ms end-to-end
    latency and meeting the strict 33.3ms deadline.'
