id: edge-cell-13053
title: 'Edge Queueing Theory Realization: Jetson Orin Memory vs Compute Bottleneck'
topic: queueing-theory
status: published
provenance: imported
scenario: Concretely determine whether a Jetson Orin (275 TOPS INT8, 102.4GB/s LPDDR5) serving EfficientNet-B4
  (INT8, 1.2 GOPS, 18M params) at batch=1 is compute-bound or memory-bandwidth-bound at λ=100 req/s. Derive
  the service time from both perspectives and use it to compute M/D/1 metrics.
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. Cloud prefill advantage vs edge comes from larger models,
    not raw TFLOPS inflation.'
  common_mistake: Using peak TOPS without checking if memory bandwidth is the binding constraint — for
    small batch sizes, inference is almost always memory bandwidth bound.
  napkin_math: 'H100 at 989 TFLOPS FP16 (corrected from 1979). Edge-to-cloud offload decision: H100 prefill
    2B model = 2×seq×2B/989T. At seq=512: 2×512×2B/989T = 2.07ms vs edge TinyBERT 0.23ms → edge wins for
    latency.'
