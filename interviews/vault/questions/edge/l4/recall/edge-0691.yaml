id: edge-0691
title: INT8 Calibration Set Size vs Accuracy
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're quantizing YOLOv8s (11.2M params, FP32) to INT8 for deployment on a Jetson Orin using
  TensorRT's post-training quantization. The calibration step requires a representative dataset to determine
  the dynamic range of each layer's activations. Your training set has 50,000 images. How many calibration
  images do you actually need, and what happens if you use too few or too many?
details:
  realistic_solution: 'Calibration determines the min/max (or percentile) range of activations per layer
    to set the INT8 scale factors. The key insight: you need enough samples to capture the activation
    distribution''s tails, not to train the model.'
  common_mistake: '"Use all 50,000 images for calibration — more data is always better." Calibration is
    not training. Using 50,000 images takes hours and provides negligible accuracy improvement over a
    well-chosen subset. Worse, it can actually hurt accuracy if the calibration set is not representative
    of the deployment distribution.'
  napkin_math: 'Calibration set size vs mAP (YOLOv8s, COCO val): 100 images → 42.1 mAP (−2.5). 500 → 44.0
    (−0.6). 1,000 → 44.2 (−0.4). 5,000 → 44.3 (−0.3). FP32 baseline: 44.6. Sweet spot: 500–1,000 images.
    Calibration time: 500 images × 15ms + 30s overhead = 38s. Time per 0.1% mAP improvement: going from
    500→5,000 images buys 0.3% mAP in 75 extra seconds = 25s per 0.1% mAP. Going from 100→500 buys 1.9%
    in 6 seconds = 3.2s per 0.1% mAP. The first 500 images are ~8× more valuable per second than the next
    4,500.'
