schema_version: 1
id: edge-sus-60025
title: Exporting a model with custom autograd to TensorRT for Jetson Orin deployment
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You have trained a 50M parameter object detection model on H100 with a custom non-maximum suppression
  (NMS) operation implemented as a torch.autograd.Function. You need to deploy it to Jetson Orin (275
  TOPS, 32GB, 60W). TensorRT export via torch.onnx.export fails because the custom autograd function has
  no ONNX equivalent.
details:
  realistic_solution: '4 GFLOP model at 275 TOPS: 4G/275T = 0.0145ms (not 14.5ms — 14.5ms uses GOPS not
    TOPS, off by 1000×).'
  common_mistake: Trying to export the custom autograd function directly to ONNX. Since torch.autograd.Function.backward()
    is not needed at inference time, engineers often forget they need to define the ONNX symbolic (forward-only)
    registration, not the gradient function.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 4 GFLOPs. Inference time: 4G / 275T = 4×10^9 / 275×10^12
    = 1.455×10^-5 s = 0.0145ms (not 14.5ms — that would require 0.275 GOPS, 1000× slower than Jetson Orin).'
