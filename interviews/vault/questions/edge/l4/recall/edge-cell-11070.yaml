id: edge-cell-11070
title: 'Fault Tolerance: Realize Checkpoint Storage Architecture for 200-Device Jetson Fleet'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Realize the checkpoint storage architecture for a fleet of 200 Jetson Orin (32GB LPDDR5, 275
  TOPS, 60W) devices, each running online learning with LoRA adaptation. Requirements: 30-day checkpoint
  history, cloud backup within 1 hour of creation, and recovery within 5 minutes. Specify storage at every
  tier.'
details:
  realistic_solution: Edge checkpoint storage is dominated by NVMe endurance and cloud sync costs. LoRA
    state at 2MB per checkpoint is small relative to NVMe endurance limits.
  common_mistake: Not sizing local NVMe correctly for 30-day retention; not accounting for cloud egress
    costs; not specifying retention policies to manage storage growth.
  napkin_math: 'LoRA checkpoints: 1K devices × 2MB/checkpoint × 4/hour = 8MB/hr per device storage equivalent.
    Total fleet: 1K × 8MB/hr = 8GB/hr NVMe writes across fleet. Per device: 8MB/hr is negligible for NVMe
    (GB/s capability). Cloud sync: 1K × 2MB × 4/day = 8GB/day. At $0.09/GB = $0.72/day = $263/year.'
