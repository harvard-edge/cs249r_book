schema_version: 1
id: edge-cell-13051
title: 'Edge Queueing Theory Realization: Concrete Queue Depth for Coral Edge TPU'
topic: queueing-theory
status: published
provenance: imported
scenario: Size the input queue (in bytes) for a Coral Edge TPU (4 TOPS, 2W) running plant disease detection
  at λ=10 req/s with P99 SLO of 500ms. Images are 224x224 RGB at INT8. Calculate queue depth, memory footprint,
  and whether the host MCU (Cortex-M7, 512KB SRAM) can hold the queue.
details:
  realistic_solution: 'Coral TPU: 4 TOPS, MobileNetV2 = 0.3 GOPS, μ = 4000/0.3 = 13,333/s. ρ=10/13333=0.00075.
    Queue depth L = λ*W_max = 10 * 0.5 = 5 requests. Image size: 224*224*1 byte (INT8) = 50,176 bytes
    ≈ 49KB. Queue memory: 5 * 49KB = 245KB < 512KB SRAM. Fits! Wq at ρ=0.00075: M/D/1 Wq ≈ 0. W = 0.3ms
    service time. P99 ≈ 1ms << 500ms. System is wildly overprovisioned for compute; SRAM is real constraint
    but barely met.'
  common_mistake: Sizing queue in number of requests without converting to bytes to check if host MCU
    SRAM is sufficient, then discovering it cannot fit and requiring external flash (100x latency penalty).
  napkin_math: 'μ=13,333/s, ρ=0.00075, Wq≈0. L=5 max (from Little''s with W=500ms SLO). Image: 224*224=50,176
    bytes per image. Queue: 5*50,176=250,880 bytes=245KB. SRAM: 512KB. Remaining after queue: 512-245=267KB
    for code+stack. Tight but feasible. If SLO=100ms: L=1 image = 49KB queue. 30x less SRAM needed. Alternative:
    stream from flash at 10 req/s (100ms/req latency from flash = SLO violation). Must buffer in SRAM.'
