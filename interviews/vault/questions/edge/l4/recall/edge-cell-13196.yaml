schema_version: 1
id: edge-cell-13196
title: 'Edge Transformer Cost Realization: Size Phi-3 Deployment on Jetson Orin'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Concretely size the memory footprint, decode throughput, and P99 latency for Phi-3-Mini-4K-Instruct
  (3.8B params) at INT8 and INT4 quantization on Jetson Orin (32GB LPDDR5, 102.4GB/s). Assume: 32 transformer
  layers, 2048 hidden dim, 32 attention heads, seq=512, batch=1. Is the 2-second P99 SLO met?'
details:
  realistic_solution: 'INT8: weights=3.8GB. KV cache at seq=512: per layer KV = 2*32heads*64head_dim*512seq*1byte
    = 2*32*64*512=2,097,152 bytes=2MB per layer. 32 layers: 64MB. Total BW per decode step: 3.8GB weights
    + 64MB KV = 3.864GB. Latency: 3.864GB/102.4GB/s=37.7ms/token. 100 output tokens: 3.77s > 2s SLO. FAILS.
    INT4: weights=1.9GB. KV at INT8 (2x compressed): 32MB. Total: 1.932GB. Latency: 1.932/102.4=18.9ms/token.
    100 tokens: 1.89s < 2s SLO ✓. Need INT4 with INT8 KV to meet 2s P99.'
  common_mistake: Calculating decode latency only for the model weight loading without including KV cache
    memory bandwidth (which scales with sequence length and must be loaded each decode step).
  napkin_math: 'INT8 weights: 3.8B*1=3.8GB. KV per token per layer: 2*32*64*2bytes=8192 bytes. 32 layers:
    262,144 bytes=256KB per position. At seq=512: 256KB*512=128MB KV cache. Decode step BW: 3.8GB weights
    + 128MB KV = 3.928GB. Time: 3.928/102.4=38.4ms/tok. 100 toks: 3.84s. Over SLO. INT4: 1.9GB weights
    + 64MB KV (INT8 KV): 1.964GB. Time: 19.2ms/tok. 100 toks: 1.92s < 2s ✓. Edge case: at seq=2048, KV
    grows 4x: INT4 would be 1.9+256MB=2.156GB → 21.1ms/tok → 100 toks=2.11s. FAILS at long context. Use
    paged attention to limit active KV to 512 tokens.'
