id: edge-cell-12036
title: 'MLOps Lifecycle: Diagnose Edge Fleet Model Drift and Quantify Retraining Trigger'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 500 Jetson Orin devices in a retail chain run a customer count model. After 3 months, the model's
  mAP (measured via weekly manual spot-checks on 10 devices) degrades from 0.87 to 0.79. Diagnose the
  likely causes and specify a quantitative monitoring system that would have detected drift 2 weeks earlier.
  Include the retraining trigger threshold.
details:
  realistic_solution: 'Root causes: (1) seasonal clothing changes (summer→fall) cause appearance distribution
    shift — most likely. (2) Camera lens dirt accumulation: 3-month indoor cameras degrade ~10% brightness.
    (3) Firmware update changed JPEG compression → different pixel distributions. Monitoring: embed a
    confidence score proxy monitor — log per-device average detection confidence daily. Drift alert: if
    7-day rolling avg confidence drops > 8% from baseline → trigger review. Retraining: if mAP proxy <
    0.83 (5% threshold) on validation set of 1000 synthetic examples.'
  common_mistake: Blaming model drift immediately without checking for data drift (seasonal changes in
    clothing → different appearance), hardware drift (camera degradation), or deployment drift (firmware
    updates changing preprocessing).
  napkin_math: 'Confidence proxy: 1000 detections/device/day × 4 bytes confidence = 4KB/device/day × 500
    devices = 2MB/day. Easily transmitted. Baseline confidence: 0.87 avg. At mAP=0.79 (9% drop), confidence
    proxy typically shows 6-8% drop 2-3 weeks prior (leading indicator). Threshold at 5% drop → alerts
    at week 10, retraining by week 12 → mAP stays > 0.83.'
