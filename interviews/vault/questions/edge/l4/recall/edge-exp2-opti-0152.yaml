schema_version: 1
id: edge-exp2-opti-0152
title: Canary Rollout Context Thrashing on AI 100
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are executing a 50/50 canary rollout of an upgraded INT8 vision model on an on-premise server
  equipped with a single Qualcomm Cloud AI 100. Both the 12GB legacy model and the 12GB canary model fit
  comfortably within the 32 GB LPDDR4x memory. However, during the rollout phase, overall system throughput
  drops dramatically despite utilizing only a fraction of the 400 TOPS INT8 capacity, and power draw spikes
  near the 75W TDP limit. You must diagnose the structural bottleneck of this traffic splitting approach
  and quantify a fix.
details:
  realistic_solution: The bottleneck is memory bandwidth saturation from alternating model executions,
    which thrashes the accelerator's internal SRAM caches. The solution is to optimize the progressive
    rollout strategy by implementing request batching at the traffic router level, routing chunks of requests
    to Model A then Model B, amortizing the cost of loading model weights from LPDDR4x into the active
    compute tiles.
  common_mistake: Candidates typically assume the bottleneck is compute-bound and suggest quantizing further
    or upgrading the 75W power supply. They fail to analyze the memory bandwidth penalty of context switching
    between two massive models on a per-request basis during the traffic split.
  napkin_math: The Qualcomm Cloud AI 100 has 32 GB LPDDR4x, providing approximately 136 GB/s of bandwidth.
    Swapping a 12 GB model into execution units takes 12 GB / 136 GB/s = 88 ms. With a naive round-robin
    50/50 split, every inference incurs an 88 ms memory penalty, limiting throughput to a maximum of ~11
    FPS. By updating the rollout traffic router to batch 50 requests per model before switching contexts,
    the memory penalty is amortized to 88 ms / 50 = 1.76 ms per inference. This unblocks the 400 TOPS
    INT8 engine, increasing throughput by nearly 50x and keeping power efficiency within the 75W envelope.
