schema_version: 1
id: edge-sus-60034
title: Analyzing computational graph overhead for real-time control on Jetson Orin
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are deploying a neural network controller for a robotic arm on Jetson Orin. The control
  loop must run at 100Hz (10ms budget per inference). The model (2M params, LSTM-based) currently runs
  at 8ms in eager mode. After adding online RL fine-tuning (backward pass), total step time is 45ms —
  4.5× over budget.
details:
  realistic_solution: '4M ops at 275 TOPS: 4×10^6 / 275×10^12 = 14.5 nanoseconds = 0.0145μs (not 14.5μs
    — that requires 0.275 GOPS).'
  common_mistake: Running the full backward pass (including LSTM gradient through time) inside the 10ms
    control loop. LSTM backpropagation through time (BPTT) unrolls through all time steps and is inherently
    sequential — it cannot be parallelized and adds O(T) overhead for T time steps.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. Model: 4M ops. Inference time: 4×10^6 / 275×10^12 = 1.455×10^-8
    s = 14.55 nanoseconds ≈ 0.0145 microseconds = 0.0145μs (not 14.5μs — 14.5μs would require 275 GOPS
    not TOPS, off by 1000×).'
