schema_version: 1
id: edge-fill-05007
title: Sliding Window Attention for Long Context on Jetson Orin
topic: attention-scaling
status: published
provenance: imported
scenario: You're deploying Mistral-7B on Jetson Orin (32GB LPDDR5, 68 GB/s). The model uses sliding window
  attention (SWA) with window_size=4096. For a 16K token inference, compare the KV cache memory and bandwidth
  for full attention vs SWA. The model has 32 layers, 8 KV heads, head_dim=128.
details:
  realistic_solution: 'Full attention KV cache: 2×8×16384×128×2B×32 = 2.14GB. SWA KV cache: only 4096
    tokens active per layer = 2×8×4096×128×2B×32 = 535MB — 4× reduction in KV memory. Per-token decode
    bandwidth (full): load 2.14GB KV cache; per-token decode (SWA): load 268MB. At 68 GB/s: full attention
    decode = 15.7ms/token; SWA decode = 7.9ms/token — 2× faster decode. Trade-off: tokens beyond window
    size have no attention to earlier context.'
  common_mistake: Assuming SWA saves compute proportionally to context reduction; the savings are in KV
    cache memory and bandwidth, not total attention FLOPs for full sequence processing.
  napkin_math: 'Full KV: 2×8×16K×128×2B×32 layers = 2.14GB. SWA KV: 2.14GB × (4096/16384) = 535MB. Decode
    latency = KV size / bandwidth: 2.14GB/68GB/s=15.7ms vs 535MB/68GB/s=7.9ms. 4× KV memory reduction
    (2.14GB→35MB), 2× decode speedup (15.7ms→7.9ms).'
