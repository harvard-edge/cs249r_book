id: edge-0107
title: The Memory Copy Choke
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are processing 4K video on an ARM-based edge device. You notice that the CPU utilization
  is at 100%, and the NPU is mostly idle, even though the model is highly optimized. Based on the data
  path diagram, what is the 'silent' task consuming all your CPU cycles?
details:
  realistic_solution: The bottleneck is the **CPU memcpy** between memory spaces. A 4K frame is ~24 MB.
    Standard Linux drivers often force multiple copies between kernel-space, application-space, and NPU-space.
    At 30 FPS, the CPU is forced to move ~1.4 GB/s across RAM boundaries, saturating the bus. The fix
    is a **Zero-Copy DMA Pipeline** (e.g., using `dmabuf`), allowing the NPU to read directly from the
    camera buffer.
  common_mistake: '"The NPU must be struggling with 4K resolution." The NPU is fine; it''s waiting for
    the CPU to hand it the data.'
  napkin_math: 30 FPS × 24 MB/frame × 2 copies = 1.44 GB/s. For a low-power ARM CPU, this can consume
    100% of available memory bandwidth and compute cycles.
