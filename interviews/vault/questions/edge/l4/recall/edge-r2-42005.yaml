schema_version: 1
id: edge-r2-42005
title: Tail Latency on Edge with Thermal Throttling
topic: tail-latency
status: published
provenance: imported
scenario: Your Jetson Orin runs a real-time object detection model with P50 = 12ms and P99 = 85ms. The
  P99 spikes correlate with ambient temperature exceeding 35°C. The Orin throttles from 275 TOPS to ~180
  TOPS under thermal constraints. How do you maintain P99 below 25ms within the 60W power budget?
details:
  realistic_solution: 'Three-pronged approach: (1) Thermal-aware scheduling — monitor junction temperature
    and switch to a lighter model variant (e.g., YOLOv8-S instead of YOLOv8-M) when temp exceeds 80°C,
    before hardware throttling kicks in. The lighter model runs at 8ms even at reduced clocks. (2) DLA
    offload — move backbone inference to the Orin''s dual DLAs, which have separate thermal domains and
    don''t throttle as aggressively. (3) Frame skipping with interpolation — at thermal limit, process
    every 2nd frame and interpolate bounding boxes, effectively halving compute load while maintaining
    apparent real-time output. Combined, P99 drops to ~20ms even under sustained thermal pressure.'
  common_mistake: Trying to solve thermal throttling with better cooling alone. On edge devices, the power
    budget is fixed — you must design the software to gracefully degrade or preempt throttling.
  napkin_math: 'Normal: 275 TOPS, model takes 12ms. Throttled: 180 TOPS = 65% capacity, latency = 12ms
    / 0.65 ≈ 18.5ms base + memory contention = ~85ms observed (queuing). Light model: 3× fewer FLOPs =
    4ms at 275 TOPS, 6.2ms at 180 TOPS. DLA offload: backbone on DLA (15 TOPS dedicated) = 10ms, head
    on GPU = 3ms, total = 13ms even when GPU throttled.'
