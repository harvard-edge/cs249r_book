id: edge-cell-13245
title: Realize Systolic Array Output-Stationary Tiling on Hailo-8
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'You must implement a matrix multiply on Hailo-8 using output-stationary dataflow where partial
  sums accumulate in-place. The operation: W [512×256] × X [256×128] = Y [512×128]. Hailo-8 has 13 TOPS
  and 2MB on-chip SRAM. With 1MB reserved for weights and activations, you have 1MB for partial sums.
  Realize the tiling strategy for output-stationary execution and compute the number of tiles and total
  SRAM traffic.'
details:
  realistic_solution: 'Output tile Y_tile: must fit in 1MB SRAM: 1MB = 1,048,576 bytes. Y_tile size =
    T_m × T_n × 4B (FP32 accumulation). Max tile: T_m × T_n = 262,144. Balanced: T_m=512, T_n=512 → 512²×4=1MB
    exactly. But M=512, N=128 → output is 512×128=65,536 elements × 4B=256KB < 1MB. Full output fits in
    SRAM. K dimension: stream X [256×128] in chunks of K=64 (fits with weights tile). Tiles: ceil(512/512)
    × ceil(128/128) = 1×1 = 1 tile. Total SRAM traffic: W loaded once = 512×256×1B=128KB (INT8); X loaded
    once = 256×128×1B=32KB; Y written once = 512×128×4B=256KB. Total = 416KB. Single-tile output-stationary:
    no re-reads of Y. Optimal.'
  common_mistake: Using tile sizes that maximize compute utilization without verifying partial sum buffer
    fits; output-stationary requires the output tile to remain in SRAM throughout the entire K-dimension
    accumulation.
  napkin_math: 'Output fits in SRAM: 512×128×4B = 256KB < 1MB ✓. Input X: 256×128×1B = 32KB. Weight W:
    512×256×1B = 128KB. Total on-chip: 256+32+128 = 416KB < 2MB ✓. No tiling needed — single-pass output-stationary.
    FLOPs: 2×512×256×128 = 33.5M. Time at 13 TOPS: 33.5M/13T = 2.6μs.'
