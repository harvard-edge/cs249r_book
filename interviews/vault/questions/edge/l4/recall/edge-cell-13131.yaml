id: edge-cell-13131
title: 'Edge TCO Realization: Unit Economics for Edge AI Product'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Calculate the unit economics for a commercial edge AI product based on Hailo-8 ($200 component
  cost). Product sells at $999 retail. BOM: Hailo-8=$200, RPi CM4=$55, PCB+enclosure=$80, power supply=$15,
  assembly=$30. BOM total: $380. Distribution margin: 30%. Warranty reserve: 5%. Calculate gross margin,
  net margin, and break-even unit volume assuming $500K fixed development costs.'
details:
  realistic_solution: 'Revenue per unit: $999. Distribution (30%): $999*0.3=$299.70 to distributor. Net
    revenue: $999*0.7=$699.30. COGS: BOM=$380 + warranty reserve 5%: $999*0.05=$49.95 + warranty reserve
    on BOM claims: simpler = $380*1.05 = $399. Net margin per unit: $699.30-$399=$300.30. Gross margin
    %: $300.30/$699.30=42.9%. Break-even: $500K / $300.30 = 1665 units. Annual volume at break-even: if
    sold over 2yr: 833 units/yr. Retail price for $500K fixed cost recovery: BOM cost + distribution +
    warranty amortized. At 3000 units: net profit = 3000*$300.30-$500K=$400.9K before tax.'
  common_mistake: Calculating gross margin as (price - BOM) / price without including distribution margins
    and warranty reserves, and not separating gross margin from net margin after fixed costs.
  napkin_math: 'Revenue: $999. Distribution: $299.70. Net: $699.30. COGS: $380 BOM + $49.95 warranty =
    $429.95. Unit margin: $699.30-$429.95=$269.35. Gross margin: 269.35/699.30=38.5%. Break-even: $500K/$269.35=1857
    units. At 5000 units: margin = 5000*$269.35-$500K=$846.75K profit. Hailo-8 as key component: $200/$380=52.6%
    of BOM. If Hailo-8 volume discount applies at 10K units (10% off): new BOM=$360. New margin: $699.30-$360*1.05=$699.30-$378=$321.30.
    Break-even: $500K/$321.30=1556 units. Volume pricing critical for hardware startups.'
