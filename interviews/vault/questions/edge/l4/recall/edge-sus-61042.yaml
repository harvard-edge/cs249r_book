id: edge-sus-61042
title: 'LoRA Inference on Jetson Orin: Adapter Fusion Strategy'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: You are deploying a fine-tuned LLM with a LoRA adapter on Jetson Orin (60W, 64 GB LPDDR5). Should
  you merge the adapter before deployment or apply it dynamically during inference?
details:
  realistic_solution: 'Merge for edge deployment: dynamic LoRA requires two matmuls (xA and (xA)B) per
    adapted layer per token. On Orin with 275 TOPS, these extra matmuls cost ~0.5ms per layer for a 7B
    model. With 32 layers: 16ms overhead per decode step on top of ~80ms base decode = 20% overhead. Merging
    eliminates this entirely. Only keep dynamic adapters if: (1) multiple adapters needed simultaneously,
    (2) adapter switching is needed within a session.'
  common_mistake: Always merging adapters for zero inference overhead without considering that Orin's
    limited compute makes the adapter's matmul overhead more significant relative to total inference time
    than on server GPUs.
  napkin_math: 'Orin GPU: 275 TOPS INT8. LoRA rank-16 adapter extra compute per layer: 2 × (seq_len ×
    d_model × rank) MACs. For seq_len=1, d_model=4096, rank=16: 2 × 4096 × 16 = 131K MACs. 32 layers:
    4.2M MACs. At 275 TOPS: 4.2M / 275×10¹² = 15ns — negligible! Merge is not strictly necessary for latency
    but eliminates memory bandwidth for adapter weights: 32 × 2 × 4096 × 16 × 2B = 8.4 MB saved from LPDDR5
    reads.'
