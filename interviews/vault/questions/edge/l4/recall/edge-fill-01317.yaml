id: edge-fill-01317
title: Graceful Degradation on Hailo-8 for Edge Surveillance
topic: graceful-degradation
status: published
provenance: imported
scenario: Your team is deploying an AI-powered surveillance system on edge devices, with each device featuring
  a Hailo-8 accelerator (26 TOPS INT8, 2.5W dataflow accelerator) for real-time object detection. The
  system's primary goal is continuous, reliable operation, but it faces unpredictable environmental factors
  such as fluctuating network bandwidth, variable camera feed complexity (e.g., dense crowds vs. empty
  scenes), and potential power fluctuations. Design a comprehensive graceful degradation strategy for
  this system. Detail the specific 'degradation ladders' you would implement, how 'model fallbacks' would
  be triggered and managed, and the techniques for 'quality-of-service shedding'. Explain the trade-offs
  between 'fail-safe' and 'fail-operational' approaches in this context, and justify your chosen stance
  for a surveillance application. Your solution must account for the Hailo-8's stated performance and
  power budget.
details:
  realistic_solution: "Implement a multi-stage degradation ladder:\n1.  **Optimal Mode:** Primary, high-accuracy\
    \ object detection model (e.g., a highly optimized MobileNetV3-SSD variant quantized to INT8) running\
    \ on Hailo-8 at target FPS (e.g., 10-15 FPS, consuming ~1.5-2W). Monitor Hailo-8 utilization, network\
    \ latency, and CPU load.\n2.  **QoS Shedding (Tier 1 Degradation):** If Hailo-8 utilization exceeds\
    \ 80%, network latency spikes, or CPU load passes 70% threshold, activate QoS shedding:\n    *   Reduce\
    \ frame rate: Process every 2nd or 3rd frame (e.g., 5-7 FPS).\n    *   Prioritize classes: Only detect\
    \ critical objects (e.g., 'person', 'vehicle'), ignoring less important ones.\n    *   Reduce inference\
    \ resolution: Downscale input frames before inference.\n3.  **Model Fallback (Tier 2 Degradation):**\
    \ If QoS shedding is insufficient (e.g., utilization remains high, or alerts are missed), switch to\
    \ a significantly lighter, faster model (e.g., a custom tiny YOLO, even simpler than the primary one,\
    \ specifically designed for Hailo-8's lower TOPS footprint). This model would trade accuracy for guaranteed\
    \ latency and throughput. The Hailo-8 would be reconfigured with new weights.\n4.  **Fail-Operational\
    \ Baseline (Tier 3 Degradation):** In extreme conditions (e.g., persistent high load, critical component\
    \ failure), resort to basic motion detection using CPU, or a minimal 'presence detection' model on\
    \ Hailo-8, sending only metadata (timestamps, zone of activity) rather than full bounding boxes or\
    \ images. The system remains operational but with significantly reduced functionality.\n\n**Fail-Operational\
    \ Justification:** For a surveillance system, a fail-operational approach is paramount. Losing all\
    \ detection capability ('fail-safe') is unacceptable as it creates security blind spots. Providing\
    \ even severely degraded service (e.g., just motion detection) is preferable to complete shutdown,\
    \ offering 'graceful degradation' over catastrophic failure. Triggers would be threshold-based (e.g.,\
    \ Hailo-8 response time exceeding 500ms for 30s, or available power dropping below 2W). Recovery would\
    \ involve monitoring metrics and smoothly scaling back up the ladder once conditions improve."
  common_mistake: A common mistake is to propose a simple 'binary' fallback (e.g., full model or no model)
    rather than a multi-stage degradation ladder. Candidates might also overlook the practical implications
    of the Hailo-8's 2.5W power budget on sustained performance, assume infinite memory for multiple models,
    or fail to define clear, quantifiable triggers and recovery mechanisms for each degradation stage.
    Another oversight is neglecting the 'fail-operational' aspect, which is critical for surveillance,
    often leaning towards a full system shutdown ('fail-safe') prematurely.
  napkin_math: 'Given Hailo-8''s 26 TOPS INT8 and 2.5W power budget:

    *   If a moderately complex INT8 model requires 2 TOPS per inference, the maximum theoretical FPS
    is 26 TOPS / 2 TOPS/inference = 13 FPS. This sets a baseline for ''optimal'' performance.

    *   If the primary model aimed for 30 FPS, it would need to be extremely lightweight, consuming <
    0.86 TOPS per inference (26 TOPS / 30 FPS), highlighting the strict constraints.

    *   A fallback model requiring only 0.5 TOPS per inference could theoretically support 26 TOPS / 0.5
    TOPS/inference = 52 FPS. This illustrates the performance headroom gained through degradation.

    *   The 2.5W power budget is critical: if the Hailo-8 at full load consumes 2W, and the rest of the
    edge device (CPU, RAM, network) consumes 3W, the total system draws 5W, potentially exceeding a thermal
    envelope or battery life. Degrading inference (reducing FPS, using smaller models) directly reduces
    Hailo-8''s power consumption, helping to stay within the 2.5W limit and overall system power budget,
    preventing thermal throttling or battery drain.'
