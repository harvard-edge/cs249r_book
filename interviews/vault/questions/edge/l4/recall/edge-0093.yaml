id: edge-0093
title: The Model Pruning Speedup Myth
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your team pruned a YOLOv8-M model to 90% sparsity — 90% of the weights are zero. The intern
  calculated: ''only 10% of weights remain, so inference should be 10× faster on our Jetson Orin NX.''
  After deploying the sparse model with TensorRT, inference time is unchanged — 22ms, same as the dense
  model. The intern is confused. Explain why 90% sparsity gave 0× speedup, and what kind of pruning would
  actually help.'
details:
  realistic_solution: The intern performed **unstructured pruning** — zeroing out individual weights scattered
    randomly throughout each tensor. The weight tensors still have the same shape (e.g., a 256×256×3×3
    convolution is still stored as a 256×256×3×3 tensor, just with 90% zeros). GPU and DLA hardware execute
    dense matrix multiplications on fixed-size tiles (e.g., 16×16 on Orin's Tensor Cores). A tile with
    90% zeros still takes the same number of clock cycles as a tile with 0% zeros — the hardware performs
    the multiply-accumulate regardless of whether the operand is zero.
  common_mistake: '"The runtime doesn''t support sparsity" or "We need a special sparse inference engine."
    While runtime support matters, the fundamental issue is the type of sparsity.'
  napkin_math: 'Unstructured 90% sparse: tensor shape unchanged, memory traffic unchanged, compute unchanged
    → 0× speedup. Structured 50% channel pruning: tensor dimensions halved, FLOPs reduced ~4× (quadratic
    in channels), memory reduced ~2× → 2-3× real speedup. NVIDIA 2:4 sparsity (50%): Tensor Core throughput
    doubles → ~1.8× real speedup (accounting for non-TC layers). The 90% unstructured model wastes 90%
    of its memory bandwidth loading zeros.'
