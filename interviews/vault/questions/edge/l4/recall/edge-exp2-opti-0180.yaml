schema_version: 1
id: edge-exp2-opti-0180
title: Hailo-8 Host Streaming Bottleneck
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are deploying a vision pipeline on an edge gateway equipped with a Hailo-8 accelerator.
  Your system must process 1080p video at 60fps using a 30 GOPs object detection model. The Hailo-8 is
  a dataflow accelerator providing 26 TOPS INT8 at 2.5W, but crucially, it has no local DRAM and relies
  on continuous data streaming from host memory. Profiling traces show your end-to-end latency is 50ms
  per frame (20fps), with the host CPU at 100% utilization while the Hailo-8 is idle 70% of the time.
details:
  realistic_solution: Use a profiler (e.g., perf or HailoRT trace tools) to analyze the host CPU bottlenecks.
    The trace will show the CPU is spending excessive time converting raw video frames into normalized
    float arrays. The fix is to allocate contiguous zero-copy DMA buffers for the raw video frames and
    move the image normalization/resize operations directly into the Hailo-8 compiler's dataflow graph,
    allowing the host to stream raw UINT8 pixels straight to the accelerator without CPU intervention.
  common_mistake: Candidates often assume the bottleneck is PCIe bandwidth or accelerator compute, suggesting
    model quantization or pruning. They fail to realize that because the Hailo-8 lacks local DRAM, any
    host CPU latency from preprocessing (like image resizing or FP32 float conversions) will immediately
    starve the dataflow accelerator's input stream.
  napkin_math: 'Compute demand: 30 GOPs = 0.03 TOPS per frame. At 60 fps, 1.8 TOPS is needed, utilizing
    just ~7% of the Hailo-8''s 26 TOPS capacity. Raw UINT8 1080p input payload: 1920 * 1080 * 3 bytes
    = 6.22 MB. Streaming requirement: 6.22 MB * 60 fps = 373 MB/s (easily handled by PCIe Gen3 x4). However,
    if the CPU normalizes to FP32 first, it processes 24.88 MB per frame. On a low-power edge CPU, this
    memory-bound FP32 loop takes ~40ms, dominating the 50ms total latency. Fusing normalization into the
    Hailo-8 hardware removes this 40ms CPU penalty, dropping latency below the 16.6ms threshold required
    for 60fps.'
