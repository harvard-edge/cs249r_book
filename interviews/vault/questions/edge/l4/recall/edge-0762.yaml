id: edge-0762
title: The Edge-Cloud Sync Conflict
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your retail analytics system has 500 NVIDIA Jetson Nano devices in stores, each running a person-counting
  model. The cloud trains an improved model weekly using aggregated data. But stores have unreliable WiFi
  — some devices haven't synced in 3 weeks. When they finally connect, the cloud has iterated through
  3 model versions. How do you handle the sync, and what happens to the stale devices' inference results
  in the meantime?
details:
  realistic_solution: 'This is a **distributed consistency problem** with two dimensions: model versioning
    and data reconciliation.'
  common_mistake: '"Push the latest model version when the device reconnects." This seems obvious but
    ignores data consistency and the analytics pipeline.'
  napkin_math: '500 devices. Average sync gap: 5 days (80% connect daily, 15% weekly, 5% monthly). Stale
    devices at any time: ~25 on v(n-1), ~10 on v(n-2), ~3 on v(n-3). Model engine per SKU: Nano engine
    = 8 MB, Xavier NX engine = 12 MB. Sync bandwidth per device: 8 MB model + 3 weeks × 24 hours × 60
    min × 1 count/min × 20 bytes = 8 MB + 0.6 MB = 8.6 MB. At 5 Mbps WiFi: 14 seconds to sync. Correction
    factor accuracy: ±1.5% after calibration vs ±5% without version-aware correction.'
