title: Edge TPU Systolic Dataflow for Depthwise Convolutions
scenario: 'You are designing a real-time tracking system for a drone using a Google Coral Edge TPU (4 TOPS INT8, 2W power limit, USB/PCIe interface). The model uses novel lightweight convolution blocks that map poorly to standard dense systolic arrays, causing low MAC utilization.'
question: 'How would you redesign dataflow, tiling, and operators so the drone tracker fully uses the Coral Edge TPU without CPU fallbacks?'
details:
  realistic_solution: 'A strong candidate will synthesize a hardware-aware mapping strategy, such as reformulating the network to prioritize pointwise (1x1) convolutions that perfectly utilize the systolic array, while restructuring the dataflow to minimize SRAM reads. They must enforce strict INT8 quantization to guarantee 100% on-chip execution, and design a tiling schema that completely hides the USB/PCIe transfer latency.'
  common_mistake: |
    **The Pitfall:** Assuming standard weight-stationary dataflows will be efficient for depthwise convolutions.
    **The Rationale:** Candidates treat all convolutions equally and ignore how depthwise ops severely underutilize dense systolic arrays.
    **The Consequence:** MAC utilization plummets and the system bottleneck shifts to the slow USB/PCIe interface due to poor tiling.
  napkin_math: |
    * Edge TPU: 4 TOPS at 2W (2 TOPS/W).
    * Model requirement: 100 GOPS/frame.
    * Theoretical max throughput: 4,000 GOPS / 100 GOPS = 40 FPS.
    * Poor utilization scenario: 20% systolic array utilization drops effective TOPS to 0.8 (yielding only 8 FPS).
    * Optimized scenario: Restructuring to 1x1 convolutions pushes utilization to 80% (effective 3.2 TOPS).
    * **Conclusion: Optimized tiling achieves 32 FPS while remaining strictly within the 2W power envelope.**
