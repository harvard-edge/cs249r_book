title: Heterogeneous Graph Compilation on Jetson Orin
scenario: You are designing an ahead-of-time compiler for a multi-modal autonomous driving pipeline deployed on an NVIDIA Jetson Orin. The pipeline consists of four high-resolution vision backbones and a custom Transformer-based sensor fusion module. The system has a strict 60W TDP constraint and needs to process 120 total frames per second using the Ampere GPU and DLA accelerators (275 TOPS INT8 peak).
question: What graph partitioning and operator lowering strategy would you use to hit 120 FPS within the Jetson Orin's 60W TDP?
details:
  realistic_solution: Formulate a custom pass manager to partition the graph based on hardware affinity. The heavy convolutional vision backbones are fused, quantized to INT8, and lowered specifically to the DLA. The memory-bound Transformer attention layers are isolated, compiled in FP16, and scheduled on the Ampere GPU, with explicit asynchronous memory copies inserted to hide latency.
  common_mistake: Candidates often default to compiling the entire graph for the GPU using standard INT8 builders, ignoring the DLA completely. Alternatively, they forcefully lower unsupported operations to the DLA, resulting in implicit CPU fallbacks that destroy latency and throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Framerate: 4 streams at 30 FPS = 120 FPS.
    - Backbone compute: 0.5 TOPS per frame. Orin DLA: ~114 TOPS.

    **Calculations:**
    - Total backbone compute: 0.5 * 120 = 60 TOPS.
    - DLA utilization: 60 / 114 = ~52%.
    - DLA-to-GPU transfer (50 MB/frame): 50 MB * 120 FPS = 6 GB/s (~3% of 204 GB/s bandwidth).

    **Conclusion & Interpretation:**
    - **Result: 60 TOPS (Compute-Bound)**. Offloading convolutional backbones to the DLA leaves the GPU free for the Transformer while staying safely under the bandwidth limit.
