title: Architecting Thermal Management for Qualcomm Cloud AI 100
scenario: You are designing an on-premise edge video analytics appliance utilizing the Qualcomm Cloud AI 100 accelerator (75W TDP, 400 TOPS INT8). The system must process high-resolution video continuously in an unconditioned warehouse environment where ambient temperatures reach 45°C.
question: How would you balance active cooling, DVFS, and workload shedding to sustain throughput at 45°C on the 75W Cloud AI 100?
details:
  realistic_solution: 'A robust design implements a tiered strategy: first, optimizing the INT8 workload to maximize TOPS per Watt; second, using predictive thermal management to slightly throttle sustained performance (e.g., capping at 50W) before critical limits are reached; and third, implementing an active, dust-resistant cooling solution.'
  common_mistake: |
    **The Pitfall:** Relying solely on maximum active cooling or aggressive thermal throttling.
    **The Rationale:** Candidates ignore the acoustic/dust constraints of warehouse environments and the SLA impacts of massive down-clocking.
    **The Consequence:** The system either fails due to fan burnout or repeatedly violates real-time throughput deadlines.
  napkin_math: |
    - Peak efficiency: 400 TOPS / 75W = 5.33 TOPS/W.
    - Thermally constrained power cap: 50W.
    - Sustained performance: 50W * 5.33 TOPS/W = 266.5 TOPS.
    - Cost per stream: 2 TOPS (example).
    - Max sustained streams: 266.5 / 2 = **133 streams** (down from 200).
