title: Evaluating Activation Memory Impact of Batch Size Scaling on Jetson Orin Inference
scenario: You are optimizing throughput for a YOLOv8-L object detection pipeline on Jetson Orin (32 GB
  LPDDR5). At batch size 1, inference takes 18 ms and uses 1.2 GB memory. At batch size 8, inference takes
  28 ms and uses 6.8 GB. At batch size 16, inference OOMs. Evaluate whether the memory scaling is linear
  and identify the likely cause of the OOM at batch size 16.
details:
  realistic_solution: 'From B=1→B=8: memory grows from 1.2 to 6.8 GB. Activation component (linear): ~1.0
    GB × 8 = 8.0 GB expected, but actual is 6.8 GB — sublinear, consistent with fixed workspace overhead
    (~0.2 GB at B=1 not scaling with batch). Extrapolating to B=16: 6.8 - fixed_overhead × (16/8) ≈ 6.8
    GB activations at B=8 → 13.6 GB activations + 0.2 GB workspace = 13.8 GB. Plus OS + CUDA context (~3
    GB on Orin). Total ≈ 17 GB — does not exceed 32 GB. OOM at B=16 suggests TensorRT is using a larger-than-expected
    workspace (possibly set to 4 GB) or feature pyramid memory grows superlinearly. Profile with `trtexec
    --dumpLayerInfo` to identify the offending layer.'
  common_mistake: Assuming activation memory scales perfectly linearly with batch size and extrapolating
    linearly from batch=1 to batch=16. In practice, some activation tensors (e.g., feature map pyramids
    with fixed spatial resolution) scale linearly, while workspace buffers in TensorRT are often batch-size-independent
    fixed allocations, causing superlinear total memory growth at small batch sizes and sublinear at large
    batch.
  napkin_math: 'Linear model: M(B) = M_fixed + M_per_sample × B. From data: M_fixed + M_per × 1 = 1.2,
    M_fixed + M_per × 8 = 6.8. Solving: M_per = (6.8-1.2)/7 = 0.8 GB/sample, M_fixed = 0.4 GB. Predicted
    M(16) = 0.4 + 0.8×16 = 13.2 GB. OOM at 32 GB is unexpected — check if LPDDR5 is also serving CPU tasks
    consuming >18 GB concurrently.'
