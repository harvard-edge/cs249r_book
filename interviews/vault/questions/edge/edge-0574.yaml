title: The Futile Pruning
scenario: You are leading the optimization of a real-time perception model for a delivery robot, targeting
  a Jetson AGX Orin with a strict 33ms latency budget. To meet this deadline, your team applies 80% unstructured
  weight pruning to the model's main convolutional layers, expecting a nearly 5x speedup in those layers.
  However, in hardware tests, the end-to-end latency improves by only 15%. Your junior engineer, seeing
  the model is still too slow, proposes increasing the pruning to 95% sparsity. Critically evaluate the
  initial pruning result. Why did the massive reduction in FLOPs yield such a disappointing latency improvement,
  and why is the proposal to 'just prune more' likely to fail? Justify an alternative optimization strategy
  that addresses the actual bottleneck.
details:
  realistic_solution: The initial pruning strategy failed because it addressed the wrong bottleneck. On
    hardware like the Jetson Orin, many convolutional layers are memory-bandwidth-bound, not compute-bound.
    Unstructured pruning reduces the number of computations, but it doesn't change the amount of data
    that must be read from slow LPDDR5 memory. The hardware's memory subsystem still has to load the entire
    (or mostly entire) weight tensor, and the performance is dominated by this memory access time, not
    the compute time. The irregular, sparse memory access patterns can also lead to cache misses and inefficient
    use of the memory bus, negating the theoretical FLOP reduction.
  common_mistake: Focusing solely on algorithmic complexity (FLOPs) and assuming it translates linearly
    to performance. A junior engineer might say, 'The pruning wasn't aggressive enough,' or 'We must still
    be compute-bound,' failing to see that the system has become entirely memory-bound, and the bottleneck
    is no longer the arithmetic itself.
  napkin_math: 'Baseline conv: 4ms memory + 1ms compute = 5ms. 80% unstructured pruning zeroes out 80%
    of weights, cutting theoretical compute to 0.2ms. However, unstructured sparsity doesn''t reduce tensor
    size unless compressed, so the 4ms memory load from LPDDR5 (204.8 GB/s) remains unchanged. New latency
    = 4ms mem + 0.2ms compute = 4.2ms. A massive 80% compute drop yields only a 16% real-world speedup.'
