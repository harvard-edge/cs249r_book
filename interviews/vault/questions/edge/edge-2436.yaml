title: PCIe Double-Buffering for Edge Accelerators
scenario: A Hailo-8 chip processes 1080p RGB frames (6 MB each) transferred from a
  host CPU via PCIe Gen3 x4 (roughly 3000 MB/s effective bandwidth). Total target
  throughput is 120 FPS.
question: Apply pipelining formulas to calculate the transfer latency and determine
  if a 2-frame double buffer can fully overlap communication with computation.
details:
  realistic_solution: At 120 FPS, the maximum allowable time per frame is 8.3ms. Transferring
    a 6MB frame at 3000 MB/s takes exactly 2ms. Since the PCIe transfer time (2ms)
    is strictly less than the available compute budget (8.3ms), buffering just 2 frames
    allows the host to DMA frame N+1 while the Hailo-8 is actively computing frame
    N. This yields 100% compute overlap.
  common_mistake: Calculating the bandwidth using raw theoretical PCIe limits without
    applying frame size math to verify that compute genuinely dominates transfer latency.
  napkin_math: 6 MB / 3000 MB/s = 2ms transfer. 1000ms / 120 FPS = 8.3ms compute.
