title: PCIe Double-Buffering for Edge Accelerators
scenario: A Hailo-8 chip processes 1080p RGB frames (6 MB each) transferred from a host CPU via PCIe Gen3 x4 (roughly 3000 MB/s effective bandwidth). Total target throughput is 120 FPS.
question: Apply pipelining formulas to calculate the transfer latency and determine if a 2-frame double buffer can fully overlap communication with computation.
details:
  realistic_solution: At 120 FPS, the maximum allowable time per frame is 8.3ms. Transferring a 6MB frame at 3000 MB/s takes exactly 2ms. Since the PCIe transfer time (2ms) is strictly less than the available compute budget (8.3ms), buffering just 2 frames allows the host to DMA frame N+1 while the Hailo-8 is actively computing frame N. This yields 100% compute overlap.
  common_mistake: |
    **The Pitfall:** Calculating bandwidth using raw theoretical PCIe limits without checking frame sizes against the compute budget.
    **The Rationale:** Candidates fail to explicitly prove that `T_compute > T_transfer`, which is the absolute prerequisite for perfect overlap in a double-buffered pipeline.
    **The Consequence:** Designing an overly complex N-buffering strategy when a simple double buffer guarantees 100% overlap, or missing a hidden I/O bottleneck entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Target throughput: 120 FPS.
       * Frame size: 6 MB.
       * Effective PCIe bandwidth: 3000 MB/s.
    2. **Calculations:**
       * Target compute time per frame: 1000 ms / 120 FPS = 8.33 ms.
       * Transfer latency: 6 MB / 3000 MB/s = 0.002 s = 2.0 ms.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound (8.33 ms > 2.0 ms)**. Because transfer time is strictly less than compute time, a 2-frame double buffer perfectly masks communication latency behind computation.
