title: Hailo-8 Stream Profiling and Latency Bottleneck Analysis
scenario: You are designing a high-throughput video analytics pipeline using a host CPU connected to a
  Hailo-8 accelerator via PCIe. The Hailo-8 is a dataflow accelerator capable of 26 TOPS at INT8 precision,
  but profiling shows the end-to-end latency is significantly higher than expected and accelerator utilization
  is poor. Given that the Hailo-8 has no local DRAM and relies on streaming data directly from host memory,
  specify a comprehensive profiling architecture to isolate whether the bottleneck is in host-side pre-processing,
  PCIe transfer bandwidth, or the accelerator's internal dataflow execution.
question: "What profiling architecture would you use to determine whether Hailo-8 latency comes from preprocessing, PCIe bandwidth, or dataflow stalls?"
details:
  realistic_solution: The specification must include host-side system profiling (e.g., using perf or eBPF)
    to measure CPU pre-processing latency and PCIe bus monitoring to track the actual streaming throughput.
    The candidate should also specify using Hailo's native profiling tools to analyze the compiled dataflow
    graph, ensuring that the accelerator is not stalling due to data starvation caused by host memory
    bandwidth limits.
  common_mistake: Candidates often assume the bottleneck is the accelerator's compute capacity and immediately
    suggest quantizing further or pruning the model. They frequently overlook the Hailo-8's unique memory
    architecture and fail to profile the host-to-device streaming rate or the host CPU's ability to prepare
    and feed data fast enough.
  napkin_math: Assuming a 1080p RGB input frame (1920 * 1080 * 3 bytes = 6.22 MB). To process a stream
    at 60 FPS, the host must continuously stream at least 6.22 MB * 60 = 373.2 MB/s of input data. While
    a typical PCIe Gen3 x4 connection provides ~3.9 GB/s, if the host memory bandwidth is saturated by
    other processes, the stream rate will drop. If the stream drops to 150 MB/s, the Hailo-8 will stall
    for over 50% of the time, meaning its effective compute drops far below its 26 TOPS peak and overall
    latency spikes.
