title: Watchdog Resets Under Thermal Throttling
scenario: A perception system for industrial automation is deployed on a Qualcomm Cloud AI 100 (400 TOPS
  INT8, 32 GB LPDDR4x, 75W). To meet ISO 26262 functional safety requirements, a concurrent Built-In Self-Test
  (BIST) routine runs alongside the inference workload and must pet an external watchdog timer every 50ms.
  During peak thermal load testing, the system experiences intermittent watchdog resets, even though the
  primary INT8 inference consistently meets its strict 20ms latency deadline. Explain why the watchdog
  is triggering under these specific conditions.
details:
  realistic_solution: Under peak thermal load, the accelerator throttles its clock frequency to stay within
    the 75W power envelope, reducing the overall TOPS available. Because the realtime inference task has
    higher priority, it consumes all available throttled compute to meet its 20ms deadline. Consequently,
    the lower-priority background BIST routine is starved of compute cycles and fails to complete its
    routine within the 50ms window, causing the watchdog timer to trigger a system reset.
  common_mistake: Candidates often assume the inference workload itself is failing or missing its deadline
    due to thermal throttling. They may miss the interaction between task prioritization, thermal frequency
    scaling, and the starvation of secondary safety tasks.
  napkin_math: At the full 400 TOPS, an inference requiring 6 TeraOps takes 15ms (6/400 = 0.015s). The
    BIST needs 1 TeraOp, taking 2.5ms (1/400). Total time 17.5ms fits within a 20ms camera frame period.
    Under 75W thermal limits, if the chip throttles to 300 TOPS, inference takes exactly 20ms (6/300 =
    0.02s). Since frames arrive every 20ms, the prioritized inference runs continuously at 100% utilization.
    The BIST receives 0 TOPS of compute, misses its 50ms watchdog deadline, and triggers a safety reset.
