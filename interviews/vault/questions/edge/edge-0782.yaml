title: The Inconspicuous Sticker Attack
scenario: Your company deploys ML-powered traffic cameras that classify vehicles (car, truck, bus, etc.) and read license plates. Researchers demonstrate a 'physical adversarial attack' where a specially designed, inconspicuous sticker placed on a vehicle's license plate consistently causes your edge model to misclassify it (e.g., a sedan is seen as a motorcycle) or misread the plate.
question: How would you design your edge vision system to detect and mitigate such physical-world adversarial attacks?
details:
  realistic_solution: "A multi-pronged defense focusing on input validation, model robustness, and multi-modal verification:\n  1.  **Input Pre-processing & Anomaly Detection:**\n      *   **Robust Pre-processing:** Use techniques that normalize or filter out adversarial patterns (e.g., denoising autoencoders, total variation regularization, randomized smoothing).\n      *   **Outlier Detection:** Analyze image patches for unusual texture, color, or frequency components that might indicate an adversarial perturbation. Statistical anomaly detection on feature vectors before inference.\n      *   **Spatial Consistency Checks:** If a small, localized region (the sticker) causes a drastic change in classification, flag it.\n  2.  **Multi-Modal/Multi-Sensor Fusion:**\n      *   **Camera + Radar/LiDAR:** If the camera classifies a sedan as a motorcycle, but radar/LiDAR confirm the physical dimensions of a sedan, use this discrepancy to flag a potential attack or override the classification.\n      *   **Temporal Consistency:** Track the vehicle over multiple frames. An adversarial attack is less likely to be perfectly consistent across varying angles, distances, and lighting. Look for sudden, inexplicable classification changes.\n  3.  **Ensemble Models & Model Diversity:**\n      *   **Diverse Architectures:** Run multiple models (e.g., ResNet, EfficientNet, Vision Transformer) or models trained with different data augmentations. An attack optimized for one model might fail against another.\n      *   **Quantization Diversity:** Use models with different quantization schemes.\n  4.  **Adversarial Training (Physical Simulation):** Train the model with augmented data that includes simulated physical-world adversarial patches, considering lighting variations, rotations, and distortions.\n  5.  **Explainability (XAI) for Anomaly Detection:** Use XAI techniques (e.g., saliency maps) to understand *why* the model made a certain classification. If the model is focusing on an unusual part of the image (the sticker) to make a misclassification, it's an indicator."
  common_mistake: |
    **The Pitfall:** Relying exclusively on digital adversarial training.
    **The Rationale:** Candidates assume "adversarial training with digital perturbations" solves the issue, ignoring that physical-world attacks introduce different types of noise (lighting, perspective, texture).
    **The Consequence:** The model remains vulnerable to physical patches, and the system lacks a runtime detection mechanism for anomalies.
  napkin_math: |
    1. Frame budget at 30 FPS = 33.3 ms.
    2. Single YOLOv5s on edge hardware: ~15 ms + 2 ms preprocess = 17 ms.
    3. Dual diverse models: 2 × 15 ms + 2 ms = 32 ms (barely fits 33.3 ms budget).
    4. Dual-model energy cost increase: ~7 W extra × 8,760 hr × $0.12/kWh = $7.35/year.
    5. **Defense costs <$10/year in energy; preventing one missed toll evasion (~$50) easily pays for multiple years of dual-model compute.**
