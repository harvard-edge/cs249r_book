title: The Inconspicuous Sticker Attack
scenario: Your company deploys ML-powered traffic cameras that classify vehicles (car, truck, bus, etc.) and read license plates. Researchers demonstrate a 'physical adversarial attack' where a specially designed, inconspicuous sticker placed on a vehicle's license plate consistently causes your edge model to misclassify it (e.g., a sedan is seen as a motorcycle) or misread the plate.
question: How would you design your edge vision system to detect and mitigate such physical-world adversarial attacks?
details:
  realistic_solution: 'Relying purely on digital adversarial training is insufficient for physical-world attacks. Implement a multi-layered defense: (1) Pre-processing anomaly detection to flag localized high-frequency spatial anomalies. (2) Multi-modal sensor fusion to cross-validate camera output against radar/LiDAR dimensional data. (3) Model ensembling (e.g., diverse architectures like CNN vs Vision Transformer) where physical perturbations optimized for one architecture routinely fail to transfer to the other.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on digital adversarial training.
    **The Rationale:** Candidates assume "adversarial training with digital perturbations" solves the issue, ignoring that physical-world attacks introduce different types of noise (lighting, perspective, texture).
    **The Consequence:** The model remains vulnerable to physical patches, and the system lacks a runtime detection mechanism for anomalies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 33.3 ms (30 FPS).
       - Single model latency: 17 ms.
       - Dual diverse models latency: 34 ms.
       - Extra power: ~7 W.
    2. **Calculations:**
       - Dual model latency: 2 * 15 ms + 4 ms (overhead) = 34 ms (misses budget natively, requires pipelining).
       - Energy cost: 7 W * 8760 hr = 61 kWh.
       - Financial cost: 61 kWh * $0.12/kWh = $7.35/year.
    3. **Conclusion & Interpretation:**
       - **Result: ~$7/year operating cost increase.** Ensembling diverse model architectures and incorporating multi-modal checks (radar) are financially trivial compared to the penalty of missed toll evasion.
