title: 'Edge TCO Realization: Concrete 1-Year Cost Breakdown for Edge AI System'
scenario: Concretely calculate the 1-year cost breakdown for a single edge unit ($499, 60W TDP) deployed in a warehouse for pick-and-place AI guidance. It runs 16hr/day at 50W average, 8hr off at 5W standby, $0.10/kWh. Include hardware amortization (3yr), power, quarterly maintenance visits ($200 each), and connectivity ($50/month).
question: What is the 1-year cost breakdown across amortized hardware, power, maintenance, and connectivity?
details:
  realistic_solution: Convert all isolated hardware and operational expenditures into a unified annual TCO model. Calculate hardware amortization over the specified lifespan, integrate exact standby and active energy profiles, and sum the recurring OPEX (maintenance and LTE/5G connectivity). This reveals that labor and networking vastly overshadow hardware and compute energy.
  common_mistake: |
    **The Pitfall:** Adding up costs in different time units without converting everything to annual cost for a clean comparison.
    **The Rationale:** Missing basic accounting principles and rushing the calculation.
    **The Consequence:** Providing a completely inaccurate and unreadable Total Cost of Ownership (TCO) breakdown to stakeholders.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HW: $499 (3-year amortization).
       - Power: 16 h at 50 W, 8 h at 5 W, $0.10/kWh.
       - Maintenance: 4 visits at $200. Connectivity: $50/month.
    2. **Calculations:**
       - HW: $499 / 3 = $166.33/yr.
       - Energy: ((16 * 50) + (8 * 5)) * 365 * 0.0001 = $30.66/yr.
       - Maintenance: 4 * 200 = $800/yr.
       - Connectivity: 12 * 50 = $600/yr.
       - Total: $166.33 + $30.66 + $800 + $600 = $1,596.99.
    3. **Conclusion & Interpretation:**
       - **Result: OPEX-Bound TCO.** Service ($800) and connectivity ($600) account for 87.7% of the total cost, dwarfing the $30 power and $166 hardware costs.
