title: 'The Perception Model Memory Diet: Quantization Fundamentals'
scenario: You're working on an autonomous vehicle's perception stack, running on a Jetson AGX Orin. Your team has a new object detection model with 80 million parameters, currently consuming too much memory in its default FP16 precision. You are tasked with evaluating a switch to INT8 quantization for the model weights.
question: How much weight memory does the 80 million parameter model use in FP16 versus INT8?
details:
  realistic_solution: The calculation is a straightforward comparison based on the byte size of each data type. FP16 (half-precision float) uses 2 bytes per value, while INT8 (8-bit integer) uses 1 byte.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes or misjudging FP16 size.
    **The Rationale:** Engineers often assume FP16 takes 4 bytes (like FP32) or make a factor-of-8 error by not converting bits to bytes.
    **The Consequence:** Completely inaccurate baseline memory capacity estimates, leading to poor hardware sizing choices.
  napkin_math: |
    1. **Parameter Count:** 80 million parameters.
    2. **FP16 Size:** 2 bytes/param. 80M * 2 = **160 MB**.
    3. **INT8 Size:** 1 byte/param. 80M * 1 = **80 MB**.
    4. **Impact:** Memory is halved. On a Jetson AGX Orin (204.8 GB/s bandwidth), loading 80 MB takes 0.39 ms instead of 0.78 ms, doubling the potential memory-bound framerate.
  options:
  - 320 MB for FP16, 80 MB for INT8
  - 160 MB for FP16, 80 MB for INT8
  - 20 MB for FP16, 10 MB for INT8
  - 160 MB for FP16, 160 MB for INT8
  correct_index: 1
