title: 'The Perception Model Memory Diet: Quantization Fundamentals'
scenario: You're working on an autonomous vehicle's perception stack, running on a Jetson AGX Orin. Your
  team has a new object detection model with 80 million parameters, currently consuming too much memory
  in its default FP16 precision. To improve performance, you're tasked with evaluating a switch to INT8
  quantization for the model weights. Explain the impact of this change by calculating the model's weight
  memory footprint in megabytes (MB) for both FP16 and INT8 precision.
details:
  realistic_solution: The calculation is a straightforward comparison based on the byte size of each data
    type. FP16 (half-precision float) uses 2 bytes per value, while INT8 (8-bit integer) uses 1 byte.
  common_mistake: The most common mistake is confusing bits and bytes, leading to an 8x error in the final
    calculation. Another frequent error is using the wrong size for FP16, either assuming it's 4 bytes
    like FP32 or 1 byte, which negates the comparison. This reveals a gap in understanding fundamental
    data types.
  napkin_math: 'Parameters: 80 million. In FP16 (2 bytes/param): 80M * 2 = 160 MB memory footprint. In
    INT8 (1 byte/param): 80M * 1 = 80 MB. Memory saved: 160MB - 80MB = 80 MB (a 50% reduction). On Jetson
    AGX Orin (204.8 GB/s bandwidth), loading 80 MB takes 80 MB / 204.8 GB/s = 0.39 ms instead of 0.78
    ms, doubling the potential memory-bound framerate while freeing space for other processes.'
  options:
  - 320 MB for FP16, 80 MB for INT8
  - 160 MB for FP16, 80 MB for INT8
  - 20 MB for FP16, 10 MB for INT8
  - 160 MB for FP16, 160 MB for INT8
  correct_index: 1
