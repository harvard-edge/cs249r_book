title: 'Real-Time Object Detection on Hailo-8: Analyzing Jank and ANR'
scenario: A critical real-time object detection system on an embedded platform uses a Hailo-8 AI accelerator. The system must process video at 30 FPS (33ms frame budget). Despite inference times averaging 10-15ms, the system exhibits intermittent video 'jank' and Application Not Responding (ANR) timeouts.
question: As a senior ML Systems Engineer, how would you systematically analyze the root causes of these real-time performance violations given the stated constraints?
details:
  realistic_solution: 'Perform a Worst-Case Execution Time (WCET) analysis across the entire pipeline. Use tools like `nsys profiling` to monitor CPU/GPU interrupts, PCIe DMA transfers, and memory contention. Ensure the Linux scheduler is not inducing priority inversion on the CPU preprocessing threads.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the average-case inference latency of the NPU.
    **The Rationale:** High TOPS specifications mislead developers into ignoring system I/O, OS scheduling, and long-tail pre/post-processing overheads.
    **The Consequence:** Systems miss hard real-time deadlines due to unprofiled worst-case execution spikes in non-accelerator components.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame budget: 30 FPS = 33.3ms.
       - Hailo-8 average inference: ~10ms.
       - Assumed worst-case execution time (WCET) for NPU: 25ms.
    2. **Calculations:**
       - Remaining budget for OS/IO/Pre/Post = 33.3ms - 25ms = 8.3ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU/IO Bottleneck**. If the ancillary tasks (camera capture, memory mapping, NMS) exceed the tight 8.3ms margin during system pressure, the pipeline drops the frame, triggering jank regardless of NPU TOPS.
