title: 'Real-Time Object Detection on Hailo-8: Analyzing Jank and ANR'
scenario: A critical real-time object detection system on an embedded platform uses a Hailo-8 AI accelerator (26 TOPS). The system must process video at 30 FPS (33ms frame budget). Despite inference times averaging 10-15ms, the system exhibits intermittent video 'jank' and Application Not Responding (ANR) timeouts.
question: As a senior ML Systems Engineer, how would you systematically analyze the root causes of these real-time performance violations given the stated constraints?
details:
  realistic_solution: "1. **WCET Analysis:** Identify the Worst-Case Execution Time for camera capture, pre-processing, inference, post-processing, and display. 2. **Profiling Critical Path:** Monitor CPU utilization, DDR memory bandwidth, and PCIe transfer rates between host and Hailo-8. 3. **OS/RTOS Analysis:** Investigate Linux kernel scheduling policies, priority inversion, and interrupt handling latencies. 4. **Interrupt-Driven Pipelines:** Ensure data transfers avoid CPU polling overhead. 5. **Jank Prevention:** Implement robust buffering and analyze frame drops. 6. **ANR Analysis:** Check logs for long-running blocking operations or deadlocks."
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the average inference latency of the NPU.
    **The Rationale:** High TOPS specifications mislead developers into ignoring I/O, OS scheduling, memory bandwidth, and pre/post-processing overheads.
    **The Consequence:** Systems miss real-time deadlines due to long-tail latencies and worst-case execution time (WCET) spikes in non-accelerator components.
  napkin_math: |
    - Frame budget at 30 FPS: 1000ms / 30 = 33.3ms.
    - Hailo-8 average inference: 10ms.
    - Hailo-8 worst-case execution time (WCET): e.g., 25ms.
    - Remaining budget for OS/IO/display: 33.3ms - 25ms = 8.3ms.
    - If ancillary tasks exceed 8.3ms during memory pressure, the system drops the frame, resulting in **jank**.
