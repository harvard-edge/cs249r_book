title: Edge TPU Cluster Load Balancing for Real-Time Video Analytics
scenario: You are designing an edge computing node for a smart city intersection that
  processes video streams from 8 independent 30 FPS cameras. The node is equipped
  with a host CPU and an array of 4 Google Coral Edge TPUs (each providing 4 TOPS
  at 2W via PCIe). You must design a request routing and load balancing architecture
  to distribute INT8-quantized object detection inferences across the 4 Edge TPUs,
  ensuring no single TPU becomes a bottleneck while handling traffic bursts and dynamic
  frame dropping.
question: How would you route and load-balance 8 camera streams across 4 Coral Edge
  TPUs while handling bursts and frame drops?
details:
  realistic_solution: A robust architecture uses a least-outstanding-requests routing
    strategy to account for variations in inference times. Since the Coral Edge TPUs
    only support specific INT8 operations, the host CPU must act as an intelligent
    gateway, compiling the graph to run fully on the TPU to avoid expensive context
    switching back to the host. The router should implement an active-worker pull
    model with backpressure to drop frames gracefully at the gateway level rather
    than saturating the PCIe queue.
  common_mistake: Candidates often propose a simple round-robin load balancer without
    considering the host CPU overhead of moving image frames or the limited operator
    support on the Coral. They also frequently forget that Edge TPUs require INT8
    quantization, meaning the host must handle unsupported operations before routing,
    creating a host-side routing bottleneck.
  napkin_math: 8 cameras * 30 FPS = 240 frames per second (FPS) total. Each Coral
    Edge TPU does 4 TOPS. Assuming a MobileNet V2 SSD INT8 model requires ~2 GOPs
    per inference, a single TPU can theoretically handle 4 TOPS / 2 GOPs = 2000 inferences
    per second. Realistically, PCIe latency and memory transfers reduce this; assuming
    25% efficiency, 1 TPU yields 500 FPS. 4 TPUs provide 2000 FPS capacity. For 240
    FPS total routing, transferring a 300x300x3 INT8 tensor (270 KB) per frame requires
    240 * 270 KB = ~65 MB/s total bandwidth, easily managed by PCIe Gen2 x1 (500 MB/s
    per lane). The load balancer can safely distribute per-frame requests without
    saturating the bus.
