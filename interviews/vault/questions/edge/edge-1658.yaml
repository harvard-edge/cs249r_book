title: Edge TPU Cluster Load Balancing for Real-Time Video Analytics
scenario: You are designing an edge computing node for a smart city intersection that processes video streams from 8 independent 30 FPS cameras. The node is equipped with a host CPU and an array of 4 Google Coral Edge TPUs (each providing 4 TOPS at 2W via PCIe).
question: How would you route and load-balance 8 camera streams across 4 Coral Edge TPUs while handling bursts and frame drops?
details:
  realistic_solution: A robust architecture uses a least-outstanding-requests routing strategy to account for variations in inference times. Since the Coral Edge TPUs only support specific INT8 operations, the host CPU must act as an intelligent gateway, compiling the graph to run fully on the TPU to avoid expensive context switching back to the host. The router should implement an active-worker pull model with backpressure to drop frames gracefully at the gateway level rather than saturating the PCIe queue.
  common_mistake: |
    **The Pitfall:** Proposing a basic round-robin load balancer that pushes frames directly to the PCIe bus.
    **The Rationale:** Treating the Edge TPUs like standard web servers without understanding host CPU graph compilation and unsupported operator fallbacks.
    **The Consequence:** Saturating the PCIe queue with unprocessable frames during a burst, leading to system-wide lockups instead of graceful frame dropping.
  napkin_math: |
    * **System Load**: 8 cameras × 30 FPS = 240 FPS total.
    * **TPU Capacity**: 4 TOPS / 2 GOPs (MobileNet) = 2000 inferences/sec theoretical. With PCIe overhead, assume 500 FPS per TPU.
    * **Total Capacity**: 4 TPUs × 500 FPS = 2000 FPS.
    * **PCIe Bandwidth**: 240 FPS × 270 KB (300x300x3 INT8) = ~65 MB/s.
    * **Conclusion**: 65 MB/s is easily handled by PCIe Gen2 x1 (500 MB/s). The system is computationally secure, requiring only an active-worker pull router.
