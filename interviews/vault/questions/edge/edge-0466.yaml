title: 'The Sensor Fusion Bottleneck: 3D Parallelism'
scenario: You are an ML systems engineer for an autonomous vehicle platform. A new
  multi-camera perception model is being deployed on a single Jetson AGX Orin, but
  it's missing its 33ms (30 FPS) real-time deadline.
question: How should you parallelize the independent camera branches to get the multi-camera
  model below the 33ms deadline?
details:
  realistic_solution: The correct approach is a form of **Model Parallelism** where
    independent parts of the model graph are assigned to different accelerators.
  common_mistake: 'The most common mistakes are:'
  napkin_math: The goal is to get latency below 33ms.
  options:
  - 'Use data parallelism: process frame N on Orin 1 and frame N+1 on Orin 2 to increase
    throughput.'
  - 'Use tensor parallelism: split the layers of the 10ms fusion head across both
    Orins to parallelize its computation.'
  - 'Use model parallelism: run the front camera backbone on Orin 1 and the side camera
    backbone on Orin 2 simultaneously, then transfer features to one Orin for fusion.'
  - 'Use pipeline parallelism: assign the front camera backbone to Orin 1, and the
    side camera backbone plus the fusion head to Orin 2.'
  correct_index: 2
