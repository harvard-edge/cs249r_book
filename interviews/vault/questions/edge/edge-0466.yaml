title: 'The Sensor Fusion Bottleneck: 3D Parallelism'
scenario: You are an ML systems engineer for an autonomous vehicle platform. A new multi-camera perception model is being deployed on a single Jetson AGX Orin, but it is missing its 33ms (30 FPS) real-time deadline.
question: How should you parallelize the independent camera branches to get the multi-camera model below the 33ms deadline?
details:
  realistic_solution: The correct approach is a form of Model Parallelism where independent parts of the model graph (the camera backbones) are assigned to different parallel compute streams (e.g., separate CUDA streams) on the Orin before the fusion step.
  common_mistake: |
    **The Pitfall:** Using pipeline parallelism or standard data parallelism.
    **The Rationale:** Candidates often suggest pipeline parallelism (which adds latency) or data parallelism (which increases throughput but does not reduce the latency of a single frame).
    **The Consequence:** The system will fail to meet the hard 33ms real-time deadline for individual frames.
  napkin_math: |
    - **Target Deadline:** 33ms (30 FPS).
    - **Sequential Execution:** Front camera backbone (20ms) + Side camera backbone (20ms) + Fusion head (10ms) = 50ms (misses deadline).
    - **Model Parallelism:** Front camera (20ms) and Side camera (20ms) execute concurrently.
    - **New Latency:** Max(20ms, 20ms) + Fusion (10ms) = **30ms**.
    - **Result:** 30ms is strictly less than the **33ms deadline**, achieving real-time performance.
  options:
  - 'Use data parallelism: process frame N on stream 1 and frame N+1 on stream 2 to increase throughput.'
  - 'Use tensor parallelism: split the layers of the fusion head to parallelize its computation.'
  - 'Use model parallelism: run the front camera backbone and the side camera backbone simultaneously on different streams, then fuse.'
  - 'Use pipeline parallelism: assign the front camera backbone to early layers, and the side camera backbone to later layers.'
  correct_index: 2
