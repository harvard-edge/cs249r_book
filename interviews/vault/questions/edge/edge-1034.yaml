title: 'Dataset Curation: Implement On-Device Data Augmentation Budget for Jetson Orin'
scenario: You are implementing data augmentation for online learning on Jetson Orin. Your model trains on 64 images/batch at 224×224. The augmentation pipeline must complete within 10ms per batch to not bottleneck the 100ms training step.
question: How would you implement augmentation for 64-image batches on Jetson Orin and verify it stays under the 10 ms budget?
details:
  realistic_solution: Use GPU-accelerated augmentation (DALI or torchvision on CUDA). Jetson Orin GPU can run 224×224 augmentation at much higher throughput than CPU. Alternatively, pre-augment offline if compute budget is tight.
  common_mistake: |
    **The Pitfall:** Running augmentation on the CPU while the GPU is idle waiting.
    **The Rationale:** Standard tutorials often demonstrate augmentation using CPU libraries like PIL or standard torchvision, which engineers copy-paste without considering edge CPU bottlenecks.
    **The Consequence:** The CPU limits the pipeline to well over the 10ms budget, leaving the powerful GPU underutilized and slowing down overall training.
  napkin_math: |
    *   **CPU Augmentation:** OpenCV resize 224×224 ≈ 0.2ms/image × 64 = 12.8ms (over the 10ms budget).
    *   **GPU Payload Size:** 64 images × 224 × 224 × 3 bytes = 9.63 MB.
    *   **GPU Transfer Time:** 9.63 MB / 68 GB/s (Orin GPU bandwidth) = 0.14ms.
    *   **GPU Augmentation Ops:** Vectorized transforms take ~2ms.
    *   **Total GPU Pipeline:** ~2.1ms.
    *   **Result:** **~2.1ms < 10ms budget**, highly successful when using GPU-accelerated libraries.
