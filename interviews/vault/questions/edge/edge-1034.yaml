title: 'Dataset Curation: Implement On-Device Data Augmentation Budget for Jetson
  Orin'
scenario: You are implementing data augmentation for online learning on Jetson Orin
  (32GB LPDDR5, 275 TOPS INT8, 60W). Your model trains on 64 images/batch at 224×224.
  The augmentation pipeline (random crop, flip, color jitter, cutmix) must complete
  within 10ms per batch to not bottleneck the 100ms training step. Implement and verify
  the augmentation budget.
question: How would you implement augmentation for 64-image batches on Jetson Orin
  and verify it stays under the 10 ms budget?
details:
  realistic_solution: Use GPU-accelerated augmentation (DALI or torchvision on CUDA).
    Jetson Orin GPU can run 224×224 augmentation at much higher throughput than CPU.
    Alternatively, pre-augment offline if compute budget is tight.
  common_mistake: Running augmentation on CPU while GPU is idle waiting; not measuring
    actual CPU augmentation time on ARM Cortex-A78AE cores.
  napkin_math: 'Jetson Orin CPU (12-core Cortex-A78AE): OpenCV resize 224×224 ≈ 0.2ms/image
    × 64 = 12.8ms — already over budget. GPU augmentation: 64 images × 224×224×3 =
    9.7MB. At Jetson Orin GPU bandwidth 68GB/s: 9.7MB / 68GB/s = 0.14ms data movement.
    Augmentation ops: vectorized, ~2ms for all transforms on 64 images. Total GPU
    augmentation: ~2.1ms < 10ms budget. Use torchvision.transforms with CUDA tensors.
    CPU pre-fetch next batch while GPU trains.'
