title: The RTOS Interconnect Crisis
scenario: 'You''re building a safety-critical edge ML system for medical diagnostics, running on a real-time
  operating system (RTOS). It consists of several independent processes: a sensor data acquisition process,
  an ML inference process, and a decision logic process. These processes need to communicate rapidly and
  reliably, often exchanging large data buffers (e.g., image frames, sensor arrays). How do you choose
  and implement an inter-process communication (IPC) mechanism that guarantees real-time deadlines, minimizes
  latency, handles large data transfers efficiently, and provides fault tolerance to prevent a single
  process failure from crashing the entire system?'
question: "Which IPC mechanisms would you use on the RTOS to meet real-time deadlines, move large buffers efficiently, and isolate process failures?"
details:
  realistic_solution: "A combination of optimized, RTOS-aware IPC mechanisms:\n  1.  **Shared Memory (for\
    \ Large Data Buffers):** For transferring large data like image frames or sensor arrays, shared memory\
    \ is the most efficient.\n      *   **Mechanism:** Processes map a common region of physical memory\
    \ into their virtual address spaces.\n      *   **Synchronization:** Access to shared memory *must*\
    \ be protected by real-time-safe synchronization primitives like mutexes, semaphores, or spinlocks\
    \ to prevent race conditions. Ring buffers implemented in shared memory are excellent for continuous\
    \ data streams.\n      *   **Fault Tolerance:** A process crashing while holding a lock can deadlock\
    \ the system. Use watchdog timers or robust error handling to detect and release stale locks, or ensure\
    \ processes are designed to be crash-resistant in critical sections.\n  2.  **Message Queues (for\
    \ Small, Event-Driven Messages):** For control signals, status updates, or small metadata, RTOS message\
    \ queues are ideal.\n      *   **Mechanism:** Processes send structured messages to a queue, and others\
    \ receive them. Queues can be blocking or non-blocking, with priority support.\n      *   **Real-time\
    \ Guarantees:** RTOS message queues are typically priority-aware and bounded, ensuring messages are\
    \ delivered within predictable timeframes.\n      *   **Fault Tolerance:** If a receiving process\
    \ crashes, messages might accumulate in its queue. The OS might reclaim resources, or a watchdog could\
    \ restart the receiver.\n  3.  **Pipes/FIFOs (for Stream-like Data):** For unidirectional data streams\
    \ between parent/child processes, named pipes (FIFOs) can be used, but they are generally less performant\
    \ than shared memory for large buffers and less flexible than message queues for structured messages.\n\
    \  4.  **Watchdog Timers:** Implement hardware or software watchdog timers for each critical process.\
    \ If a process fails to \"pet\" its watchdog within a defined interval (indicating a hang or crash),\
    \ the watchdog can trigger a reset of that process, or a system-wide reboot, preventing deadlock.\n\
    \  5.  **Data Integrity Checks:** For any data exchanged, especially in shared memory, include checksums\
    \ or CRCs to detect data corruption, which could be caused by memory errors or faulty processes.\n\
    \  6.  **Redundancy & Heartbeats:** For highly critical systems, consider redundant communication\
    \ paths or \"heartbeat\" messages between processes to detect failures quickly."
  common_mistake: '"Just use TCP/IP sockets over localhost." While flexible, TCP/IP adds significant overhead,
    non-determinism, and is not designed for the strict real-time and low-latency requirements of safety-critical
    embedded systems.'
  napkin_math: 'Transferring a 1MB image frame:

    - Shared memory (memcpy): ~0.1ms (10 GB/s local bus)

    - Message queue (kernel-mediated): ~1-5ms (two context switches + copy)

    - TCP/IP loopback: ~2-10ms (protocol stack overhead + copies)

    - Shared memory is 10-100x faster for large buffers, making it the only viable IPC for real-time image
    transfer under 1ms budgets.'
