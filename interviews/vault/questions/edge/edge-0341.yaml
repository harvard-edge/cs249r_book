title: The Depthwise Separable Dividend (edge-0341)
scenario: Your autonomous driving team is optimizing a perception model for a Jetson AGX Orin. A key bottleneck is a standard 3x3 convolutional layer that maps a 128-channel feature map to a 256-channel output. To meet the 33ms real-time deadline, a teammate suggests replacing it with a 3x3 depthwise separable convolution.
question: For a 3x3 layer mapping 128 channels to 256 channels, what MAC reduction factor comes from using a depthwise separable convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper steps: a depthwise convolution (one filter per input channel) and a pointwise convolution (a 1x1 convolution to mix channels). The total cost is the sum of these two steps. The reduction in Multiply-Accumulate operations (MACs) is typically around 8-9x for a 3x3 kernel, not hundreds of times cheaper.'
  common_mistake: |
    **The Pitfall:** Overestimating the computational savings by ignoring the pointwise convolution.
    **The Rationale:** Engineers focus on the dramatic MAC reduction of the depthwise step (~K^2 savings) but forget the 1x1 pointwise step to mix channels.
    **The Consequence:** They falsely assume savings proportional to the number of output channels (~256x), miscalculating the actual latency benefits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Convolution Kernel: 3x3.
    - Input Channels (C_in): 128.
    - Output Channels (C_out): 256.

    **Calculations:**
    - Standard Conv MACs (per spatial location): 3^2 * 128 * 256 = 294,912.
    - Depthwise Separable MACs (per spatial location): (3^2 * 128) + (128 * 256) = 1,152 + 32,768 = 33,920.
    - Reduction Ratio: 294,912 / 33,920 = ~8.7x.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** The MAC reduction factor is ~8.7x, demonstrating that ignoring the pointwise convolution leads to massive overestimation of latency savings.
  options:
  - ~256x reduction
  - ~8.7x reduction
  - ~2x reduction
  - The cost is identical, but latency is lower
  correct_index: 1
