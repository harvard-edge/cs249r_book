title: Drone Edge Compute vs Flight Efficiency
scenario: A drone performs powerline inspection. The battery is 150 Wh. The motors draw 250W. Running the vision model in FP16 draws 30W at 30 FPS. Quantizing the model to INT8 reduces chip power to 10W, but due to slight accuracy degradation, the drone must fly 20% slower to capture more overlapping frames for reliable detection.
question: Which precision, FP16 or INT8, maximizes total powerline-inspection distance for the 150 Wh drone?
details:
  realistic_solution: In robotics and drones, optimizing edge compute power is counterproductive if it significantly increases the runtime of the massive mechanical power draw. The FP16 model uses more compute power but allows faster flight, resulting in a net increase in total inspection distance.
  common_mistake: |
    **The Pitfall:** Optimizing solely for the AI chip's power consumption.
    **The Rationale:** Candidates reflexively choose INT8 because it drops compute power by 66%, ignoring the mechanical system's baseline power.
    **The Consequence:** They optimize compute power at the cost of flight speed, actually reducing the total inspection distance and worsening system-level efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: 150 Wh. Motors: 250W.
       - FP16 Compute: 30W. INT8 Compute: 10W (but flies 20% slower).
    2. **Calculations:**
       - FP16 Total Power = 250W + 30W = 280W. Flight Time = 150 / 280 = 0.535h.
       - FP16 Distance covered = 0.535 * Speed.
       - INT8 Total Power = 250W + 10W = 260W. Flight Time = 150 / 260 = 0.576h.
       - INT8 Distance covered = 0.576 * (0.8 * Speed) = 0.461 * Speed.
    3. **Conclusion & Interpretation:**
       - **FP16 covers ~16% more distance because motor power dominates compute savings. Result: System-Power Optimization.**
