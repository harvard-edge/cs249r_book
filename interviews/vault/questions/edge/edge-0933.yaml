title: Drone Edge Compute vs Flight Efficiency
scenario: A drone performs powerline inspection. The battery is 150 Wh. The motors draw 250W. Running
  the vision model in FP16 draws 30W at 30 FPS. Quantizing the model to INT8 reduces chip power to 10W,
  but due to slight accuracy degradation, the drone must fly 20% slower to capture more overlapping frames
  for reliable detection. Evaluate which precision maximizes the total distance inspected.
details:
  realistic_solution: Calculate the total flight time for both configurations based on total system power
    (motors + compute). Then calculate the relative distance covered, factoring in the slower flight speed
    of the INT8 configuration. In robotics and drones, optimizing edge compute power is counterproductive
    if it significantly increases the runtime of the massive mechanical power draw. The FP16 model uses
    more compute power but allows faster flight, resulting in a net increase in total inspection distance.
  common_mistake: Optimizing solely for the AI chip's power consumption without considering the massive
    baseline power draw of the drone's mechanical systems.
  napkin_math: FP16 Total Power = 250W + 30W = 280W. Flight Time = 150 Wh / 280W = 0.535 hours. Distance
    = 0.535 * Speed_V. INT8 Total Power = 250W + 10W = 260W. Flight Time = 150 Wh / 260W = 0.576 hours.
    Distance = 0.576 * (0.8 * Speed_V) = 0.461 * Speed_V. FP16 covers 16% more distance despite higher
    compute power.
