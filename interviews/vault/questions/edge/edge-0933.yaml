title: Drone Edge Compute vs Flight Efficiency
scenario: 'A drone performs powerline inspection. The battery is 150 Wh. The motors draw 250W. Running the vision model in FP16 draws 30W at 30 FPS. Quantizing the model to INT8 reduces chip power to 10W, but due to slight accuracy degradation, the drone must fly 20% slower to capture more overlapping frames for reliable detection.'
question: 'Which precision, FP16 or INT8, maximizes total powerline-inspection distance for the 150 Wh drone?'
details:
  realistic_solution: 'Calculate the total flight time for both configurations based on total system power (motors + compute). Then calculate the relative distance covered, factoring in the slower flight speed of the INT8 configuration. In robotics and drones, optimizing edge compute power is counterproductive if it significantly increases the runtime of the massive mechanical power draw. The FP16 model uses more compute power but allows faster flight, resulting in a net increase in total inspection distance.'
  common_mistake: |
    **The Pitfall:** Optimizing solely for the AI chip's power consumption.
    **The Rationale:** Candidates reflexively choose INT8 because it drops compute power by 66%, ignoring the mechanical system's baseline power.
    **The Consequence:** They optimize compute power at the cost of flight speed, actually reducing the total inspection distance and worsening system-level efficiency.
  napkin_math: |
    * FP16 Total Power = 250W (motors) + 30W (compute) = 280W.
    * FP16 Flight Time = 150 Wh / 280W = 0.535 hours.
    * FP16 Distance = 0.535 × Speed_V.
    * INT8 Total Power = 250W + 10W = 260W.
    * INT8 Flight Time = 150 Wh / 260W = 0.576 hours.
    * INT8 Distance = 0.576 × (0.8 × Speed_V) = 0.461 × Speed_V.
    * **Conclusion: FP16 covers ~16% more distance despite its higher compute power.**
