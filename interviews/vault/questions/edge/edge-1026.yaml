title: Optimizing FAISS Index Type Selection for Jetson Orin Memory Constraints
scenario: A Jetson Orin (32GB LPDDR5) RAG system needs to search a 500,000-document corpus with 768-dim embeddings. FAISS IndexFlatL2 (exact search) requires 500K * 768 * 4 bytes = 1.54GB and takes 180ms per query. FAISS IVF100,PQ96 (approximate) requires 180MB and takes 8ms per query but has 12% recall loss at top-10.
question: Which FAISS index should you use for 500,000 768-dim embeddings on Orin, and what IVF cluster count and nprobe would you choose?
details:
  realistic_solution: 'With 32GB available and the full pipeline (3B model at ~3GB INT8 + other overhead ~2GB), the flat index at 1.536GB fits easily. However, 180ms for retrieval is too slow if P95 latency SLA is 500ms. Use IVF1000,Flat (1000 clusters, exact within cluster): memory = flat centroids (1000*768*4=3MB) + flat shards (same 1.536GB) ≈ 1.536GB, but query time with nprobe=50 = 50/1000 * 180ms = 9ms, recall @interviews/vault/questions/tinyml/tinyml-1021.yaml ~95%. This gives near-exact recall with 20x speedup. Alternatively IVF1000,PQ64 at 60MB + 12ms, recall 88%.'
  common_mistake: |
    **The Pitfall:** Choosing the approximate index purely based on memory savings.
    **The Rationale:** Candidates see a massive memory reduction and assume it's the right choice without calculating whether the recall loss is acceptable for the downstream LLM quality, or they fail to tune `nprobe` to balance speed vs recall.
    **The Consequence:** The RAG system operates quickly but suffers from severe knowledge retrieval degradation, ultimately producing poor LLM generation quality.
  napkin_math: |
    * IndexFlatL2 Memory: 500,000 * 768 * 4 = 1,536,000,000 bytes = **1.536 GB**.
    * IndexFlatL2 Query: Scans full 1.536 GB at LPDDR5 68.3 GB/s = 22.5ms theoretical (180ms actual due to overhead).
    * IVF1000,Flat with `nprobe`=50: Searches 50 clusters of 500 docs each = 25,000 docs.
    * Query time reduction: (25,000 / 500,000) * 180ms = **9ms**.
    * Recall with `nprobe`=50 and 1000 clusters: **~95%** (5% coverage, but clustered).
    * IVF1000,Flat offers near-exact recall with a 20x speedup, fitting easily within the 32GB Orin memory.
