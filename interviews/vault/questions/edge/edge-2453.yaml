title: LPDDR5 Bandwidth Consumption for 4K Video Buffering
scenario: A video analytics pipeline on a Jetson AGX Orin buffers 4K video frames
  (3840x2160x3 bytes) in LPDDR5 memory before passing them to the GPU.
question: Calculate the memory bandwidth consumed just by writing and reading 30 frames
  per second to and from DRAM.
details:
  realistic_solution: Each 4K frame is approximately 25 MB. Writing 30 FPS takes 750
    MB/s of bandwidth. Reading it back to the GPU takes another 750 MB/s. The total
    bandwidth consumed by this simple buffer loop is 1.5 GB/s, which is well within
    the 204.8 GB/s LPDDR5 limit.
  common_mistake: Calculating only the write bandwidth and forgetting the read back
    required for GPU processing.
  napkin_math: 3840 * 2160 * 3 * 30 * 2 / 1,000,000,000 = 1.49 GB/s
