title: LPDDR5 Bandwidth Consumption for 4K Video Buffering
scenario: A Jetson AGX Orin video analytics pipeline buffers 30 FPS 4K RGB video frames in LPDDR5 memory before GPU processing.
question: What is the memory bandwidth consumed just by writing and reading 30 frames per second to and from DRAM?
details:
  realistic_solution: The naive buffering loop acts as a simple read/write pass. The CPU/DMA writes the 24.88MB frame to DRAM, and the GPU subsequently reads it. This requires symmetric bandwidth consumption (write + read), resulting in ~1.5 GB/s of continuous bandwidth load. While well within the Orin's 204.8 GB/s limit, zero-copy NVMM pipelines should be utilized to bypass redundant CPU writes.
  common_mistake: |
    **The Pitfall:** Calculating only the write bandwidth (746 MB/s).
    **The Rationale:** Forgetting that placing data in an intermediate buffer necessitates an equal and opposite read operation by the consuming processor.
    **The Consequence:** Underestimating the true system memory bus contention, leading to mysterious latency spikes in memory-bound architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video: 3840 x 2160 x 3 bytes (RGB) at 30 FPS.
    - Data flow: 1 Write to DRAM, 1 Read from DRAM.

    **Calculations:**
    - Frame Size: 3840 * 2160 * 3 = 24.88 MB.
    - One-way Bandwidth: 24.88 MB * 30 FPS = 746.5 MB/s.
    - Total Bandwidth: 746.5 MB/s * 2 (Write + Read) = 1.49 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.49 GB/s (Memory Bandwidth-Bound)**. Memory Bandwidth load is 1.49 GB/s.
