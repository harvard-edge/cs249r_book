title: The GPS Time Sync Disaster
scenario: Your Qualcomm RB5-based autonomous delivery robot fuses camera (30 FPS), LiDAR (10 Hz), and
  IMU (200 Hz) for navigation. GPS provides the time reference. The robot enters a downtown urban canyon
  and loses GPS lock. Within 45 seconds, the fusion algorithm starts producing wildly incorrect pose estimates
  — the robot thinks it's 2 meters to the left of its actual position. All three sensors are still producing
  data. What happened?
question: "What happened?"
details:
  realistic_solution: The sensor fusion algorithm (Extended Kalman Filter) aligns measurements by timestamp.
    Camera frames arrive with a hardware timestamp from the RB5's ISP, LiDAR points carry the scanner's
    internal clock, and IMU samples use the RB5's system clock. GPS PPS (pulse-per-second) synchronizes
    all three clocks to UTC with <1μs accuracy. Without GPS, each clock drifts independently, but more
    importantly, the EKF loses its absolute global reference. The small timestamp drifts (causing ~3.4mm
    of LiDAR offset) are secondary to the uncorrected IMU bias, which accumulates quadratically over time
    (0.5 \times a \times t^2) to create a ~2 meter position hallucination within 45 seconds.
  common_mistake: '"The sensors are broken" or "GPS is needed for positioning." GPS isn''t used for position
    here — it''s used for time synchronization, and that''s what failed.'
  napkin_math: 'Crystal drift: 50 ppm (LiDAR). At 45s, LiDAR drift = 2.25ms. Robot speed: 1.5 m/s. Absolute
    spatial offset from sync drift at 45s = 1.5 m/s × 2.25ms = 3.375mm. This alone doesn''t cause a 2m
    error. The 2m error comes from the IMU integration. IMU integration error without GPS correction:
    0.5 × 0.002 m/s² × 45² = 2.02m. Without GPS pulses to discipline the EKF, the uncorrected IMU bias
    dominates.'
