title: The GPS Time Sync Disaster
scenario: Your Qualcomm RB5-based autonomous delivery robot fuses camera (30 FPS), LiDAR (10 Hz), and IMU (200 Hz) for navigation. GPS provides the time reference. The robot enters a downtown urban canyon and loses GPS lock. Within 45 seconds, the fusion algorithm starts producing wildly incorrect pose estimates — the robot thinks it's 2 meters to the left of its actual position. All three sensors are still producing data.
question: Why did losing GPS lock cause the sensor fusion algorithm to produce a 2-meter pose error within 45 seconds?
details:
  realistic_solution: The sensor fusion algorithm (Extended Kalman Filter) aligns measurements by timestamp. Camera frames arrive with a hardware timestamp from the RB5's ISP, LiDAR points carry the scanner's internal clock, and IMU samples use the RB5's system clock. GPS PPS (pulse-per-second) synchronizes all three clocks to UTC with <1μs accuracy. Without GPS, each clock drifts independently, but more importantly, the EKF loses its absolute global reference. The small timestamp drifts (causing ~3.4mm of LiDAR offset) are secondary to the uncorrected IMU bias, which accumulates quadratically over time (0.5 * a * t^2) to create a ~2 meter position hallucination within 45 seconds.
  common_mistake: |
    **The Pitfall:** Concluding that GPS is required for position tracking and the sensors are broken.
    **The Rationale:** Engineers assume GPS loss means loss of location, forgetting its critical role as an absolute global time reference (PPS).
    **The Consequence:** Misdiagnosing the root cause, leading to unnecessary sensor hardware changes rather than fixing the time synchronization fallback.
  napkin_math: |
    * Uncorrected IMU bias integration: Distance = 0.5 * a * t²
    * Assumed IMU bias: 0.002 m/s²
    * Time without GPS lock: 45 seconds
    * Accumulated position error: 0.5 * 0.002 * (45)² = 2.025 meters
    * **Without GPS PPS pulses to discipline the EKF, uncorrected IMU bias dominates, causing the ~2m drift.**
