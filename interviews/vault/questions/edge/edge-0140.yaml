title: The Edge SRAM Speed Advantage
scenario: An edge accelerator, like a Hailo-8, integrates a large on-chip SRAM for computation. Roughly
  how much faster is accessing this on-chip SRAM compared to accessing the main system LPDDR5 DRAM?
question: "Roughly how much faster is accessing this on-chip SRAM compared to accessing the main system LPDDR5 DRAM?"
details:
  realistic_solution: On-chip SRAM access is physically close to the compute units, making its latency
    comparable to an L2 cache, around ~4 ns. LPDDR5 DRAM is on a separate chip, and access is much slower,
    around ~100 ns. Therefore, SRAM is roughly 100 ns / 4 ns = 25x faster.
  common_mistake: Engineers often either underestimate the gap, thinking it's only 2-3x, or they overestimate
    it by applying cloud-scale HBM vs L1 latency ratios (~300x). The edge memory hierarchy has its own
    distinct physics.
  napkin_math: If an on-chip SRAM read felt like 4 seconds (like an L2 cache access), waiting for an off-chip
    LPDDR5 read would feel like 100 seconds, or about 1.5 minutes. This is why data locality is critical
    for accelerator performance.
  options:
  - ~2x faster
  - ~300x faster
  - ~25x faster
  - They are about the same speed
  correct_index: 2
