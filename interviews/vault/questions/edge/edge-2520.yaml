title: Prefix Caching TTFT Bubble
scenario: A local RAG app on a Jetson Orin Nano caches a 200MB (2000-token) prompt state. A new query of 100 tokens arrives. The Orin Nano computes dense attention at 500 tokens/sec.
question: Evaluate the pipeline bubble (TTFT delay) created by synchronizing the new tokens with the cached state.
details:
  realistic_solution: Even with a 100% prefix cache hit for the first 2000 tokens, the 100 new tokens must undergo a dense prefill computation against the cached 200MB KV state before generation can start. At 500 tokens/sec, this prefill takes 100 / 500 = 200ms. The generation pipeline stalls for 200ms.
  common_mistake: |
    **The Pitfall:** Assuming prefix caching makes prompt processing instantaneous.
    **The Rationale:** Developers often forget that newly appended tokens still require a dense prefill computation against the cached state.
    **The Consequence:** They underestimate the Time To First Token (TTFT) delay, resulting in a 200ms pipeline stall that degrades user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - New Tokens: 100 tokens.
       - Compute Rate: 500 tokens/sec.
    2. **Calculations:**
       - TTFT Delay = 100 tokens / 500 tokens/sec = 0.2s.
    3. **Conclusion & Interpretation:**
       - **Result: 200ms Stalled Prefill**. Appended tokens must complete dense attention against the cache, cementing a deterministic 200ms TTFT impact.
