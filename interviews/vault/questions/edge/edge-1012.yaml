title: Implement MobileNetV3 INT8 quantization for Hailo-8 dataflow compilation
scenario: You are deploying MobileNetV3-Large on Hailo-8 (26 TOPS, 2.5W) for a retail shelf-monitoring camera. The Hailo Dataflow Compiler (DFC) requires INT8 quantization with per-layer calibration. The model has H-swish activations.
question: How would you compile MobileNetV3-Large for Hailo-8 and handle INT8 quantization of its H-swish activations?
details:
  realistic_solution: 'Pipeline: (1) Export PyTorch → ONNX with H-swish decomposed to relu6(x+3)/6 × x; (2) hailo_sdk.runner.ClientRunner.translate_onnx_model(); (3) Calibrate with 1,024 representative images using hailo_sdk.runner.ClientRunner.optimize(calib_dataset); (4) Compile to HEF (Hailo Executable Format). For H-swish multiply: DFC represents it as two quantized tensors multiplied — verify via hailo_model_zoo benchmark. If accuracy drops >2%: use QAT (Quantization-Aware Training) with fake-quantize nodes for the H-swish multiply.'
  common_mistake: |
    **The Pitfall:** Using the default quantization settings for H-swish without decomposition.
    **The Rationale:** Developers overlook that edge architectures like Hailo-8 natively support only simpler activation functions like ReLU and ReLU6.
    **The Consequence:** The compiler fails to map the H-swish operator or falls back to an unoptimized approximation, destroying both latency and detection accuracy.
  napkin_math: |
    1. **Compute Throughput:** MobileNetV3-Large requires 0.44 GOPS (INT8 MACs * 2). Hailo-8 provides 26 TOPS.
    2. **Theoretical Latency:** `0.44 GOPS / 26,000 GOPS = 17 microseconds` per image (~60,000 FPS).
    3. **Model Footprint:** 5.4M parameters * 1 byte (INT8) = 5.4 MB.
    4. **Memory Constraint:** Hailo-8 has 24 MB SRAM, so the entire model fits on-chip.
    5. **Utilization:** At 30 FPS, the model utilizes `30 / ~2000 (practical FPS) = 1.5%` of the accelerator's capacity.
    **The entire pipeline operates comfortably out of SRAM with massive thermal and compute headroom.**
