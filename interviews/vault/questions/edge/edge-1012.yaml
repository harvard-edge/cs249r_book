title: Implement MobileNetV3 INT8 quantization for Hailo-8 dataflow compilation
scenario: You are deploying MobileNetV3-Large on Hailo-8 (26 TOPS, 2.5W) for a retail
  shelf-monitoring camera. The Hailo Dataflow Compiler (DFC) requires INT8 quantization
  with per-layer calibration. The model has H-swish activations. Implement the full
  compilation pipeline and address the H-swish quantization challenge.
question: How would you compile MobileNetV3-Large for Hailo-8 and handle INT8 quantization
  of its H-swish activations?
details:
  realistic_solution: 'Pipeline: (1) Export PyTorch → ONNX with H-swish decomposed
    to relu6(x+3)/6 × x; (2) hailo_sdk.runner.ClientRunner.translate_onnx_model();
    (3) Calibrate with 1,024 representative images using hailo_sdk.runner.ClientRunner.optimize(calib_dataset);
    (4) Compile to HEF (Hailo Executable Format). For H-swish multiply: DFC represents
    it as two quantized tensors multiplied — verify via hailo_model_zoo benchmark.
    If accuracy drops >2%: use QAT (Quantization-Aware Training) with fake-quantize
    nodes for the H-swish multiply.'
  common_mistake: Using the default Hailo DFC quantization settings for H-swish without
    noting that Hailo-8 natively supports only ReLU and ReLU6 as activation functions;
    H-swish must be decomposed to (x × relu6(x+3) / 6) which DFC handles, but quantization
    of the multiply operation requires special calibration.
  napkin_math: 'Hailo-8: 26 TOPS INT8. MobileNetV3-Large: 0.22 GFLOPs ≈ 0.44 GOPS
    (INT8 MACs × 2). Throughput: 0.44G / 26T = 17μs per image → 60,000 FPS theoretical.
    Practical published: ~2,000 FPS at batch=1. Model size: 5.4M params × 1B (INT8)
    = 5.4MB. Hailo-8 SRAM: 24MB — entire model fits on-chip. Latency benefit: no HBM
    transfers, pure SRAM → critical path is compute. At 30 FPS: utilizes 30/2000 =
    1.5% of Hailo-8 capacity. Significant thermal headroom.'
