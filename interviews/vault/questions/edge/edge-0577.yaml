title: The Perception Pipeline Performance Cliff
scenario: Your autonomous vehicle team has a perception model running on a Jetson AGX Orin, comfortably
  meeting its 30 FPS (33ms) deadline. To improve detection range, the team retrains the model on 1080p
  video instead of 720p. The model architecture is identical. The input data increases by 2.25x (1920*1080
  / 1280*720). The team's white-paper estimate predicts a 2.25x slowdown, targeting a new latency of ~75ms
  (~13 FPS). Instead, latency explodes to 200ms (~5 FPS). Nsight Systems confirms the GPU is now memory-bandwidth-limited.
  Evaluate the team's initial estimate and justify the catastrophic, non-linear performance collapse.
details:
  realistic_solution: The team's initial estimate was flawed because it assumed the model would remain
    compute-bound. The performance collapsed because the increase in activation tensor sizes caused a
    **Kernel Fusion Failure**.
  common_mistake: The team's initial estimate was correct, there must be a bug in the new model code or
    a thermal throttling issue. A 2.25x increase in pixels should lead to a ~2.25x increase in work, so
    the initial estimate seems sound. The extra slowdown must come from an external factor.
  napkin_math: 720p = 0.92M pixels. 1080p = 2.07M pixels (2.25x increase). Original activations = 100MB.
    New = 225MB. Orin L2 cache is ~4MB. 225MB causes intermediate tensors to spill to main memory. A 225MB
    write+read to DRAM (204.8 GB/s) takes 450MB / 204.8 GB/s = 2.2ms per spilled layer, destroying kernel
    fusion benefits.
