title: Edge TPU Fallback Model Compute Budget
scenario: You are designing a fail-operational pedestrian tracking system deployed on a Google Coral Edge TPU. The primary model requires 100 GOPS per frame, achieving roughly 40 FPS at peak performance. During extreme summer heat, the Coral Edge TPU thermally throttles, reducing its sustained compute capacity to 1 TOPS. The system has a strict safety requirement to maintain a minimum of 20 FPS, necessitating a switch to a less accurate but faster fallback model.
question: What is the maximum fallback-model compute budget in GOPS per frame to sustain 20 FPS after throttling to 1 TOPS?
details:
  realistic_solution: The candidate should recognize that the degraded state dictates the available compute (1 TOPS). To find the maximum allowed GOPS per frame for the fallback model, they must divide the degraded compute capacity by the target minimum frame rate. This ensures the system gracefully degrades by shedding quality (using a smaller model) to maintain the required quality-of-service (frame rate).
  common_mistake: |
    **The Pitfall:** Using the peak TOPS capacity for the calculation instead of the throttled TOPS.
    **The Rationale:** Candidates forget to read the constraint of the degraded state, or fail to convert TOPS to GOPS properly.
    **The Consequence:** Designing a fallback model that is still too computationally heavy, failing to maintain the critical 20 FPS safety requirement during thermal events.
  napkin_math: |
    1. Degraded compute capacity = 1 TOPS = 1000 GOPS.
    2. Target minimum frame rate = 20 FPS.
    3. Maximum fallback model compute = Available Compute / Target FPS.
    4. 1000 GOPS / 20 FPS = **50 GOPS per frame**.
