title: Optimizing Edge AI Dataset Curation for Qualcomm Cloud AI 100 Deployment
scenario: 'You are tasked with developing a highly accurate object detection model for industrial anomaly
  detection, designed for deployment on the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W).
  Given a tight budget for data labeling and the critical need for high precision and recall on the edge,
  you are evaluating two distinct dataset curation strategies:


  1.  **Strategy A (Traditional Batch Annotation):** A large volume of raw sensor data is collected and
  sent to a third-party labeling service for comprehensive annotation. Quality assurance involves a separate
  internal team reviewing a fixed percentage of labels for correctness and inter-annotator agreement.

  2.  **Strategy B (Active Learning & Iterative Refinement):** An initial small, high-quality dataset
  is manually labeled to train a baseline model. This model is then used in an active learning loop to
  identify and prioritize the most informative unlabeled samples for subsequent expert annotation, iteratively
  improving model performance.


  When evaluating these strategies, consider not only the cost and speed of annotation but also the impact
  on model performance on the target hardware, potential for dataset bias, and the practical challenges
  of ensuring inter-annotator agreement across different labelers. How would you systematically compare
  and recommend a strategy, leveraging the Cloud AI 100''s specifications to justify your decision?'
details:
  realistic_solution: A robust solution would involve a phased approach, potentially starting with Strategy
    B (Active Learning) to rapidly converge on a high-quality, maximally informative, and compact dataset,
    while also enabling early detection of dataset bias and issues with inter-annotator agreement. Key
    evaluation metrics would include not only traditional ML metrics (mAP, F1-score) but also hardware-centric
    metrics like model size (to fit within 32 GB LPDDR4x), inference latency (to meet real-time requirements
    given 400 TOPS INT8), power efficiency (75W budget), and data-to-performance efficiency (how much
    performance gain per labeled sample). The solution should emphasize how each strategy impacts these
    metrics and ultimately the TCO and deployment feasibility on the Qualcomm Cloud AI 100, including
    mechanisms for regular bias audits and inter-annotator agreement checks throughout the curation process.
  common_mistake: Candidates often fail to explicitly link dataset curation choices to the specific constraints
    and capabilities of the target edge hardware (e.g., Qualcomm Cloud AI 100). Common mistakes include
    advocating for overly large datasets without considering the impact on model size, training time,
    and potential inference latency bottlenecks on limited edge resources; or neglecting the importance
    of active learning for maximizing data efficiency when labeling budgets are constrained and deployment
    is on specialized hardware. Furthermore, insufficient attention to inter-annotator agreement or failing
    to proactively identify and mitigate dataset bias during curation can lead to models that perform
    poorly or unfairly on the edge device, even if numerically accurate on a validation set.
  napkin_math: '1. **Labeling Cost Comparison:** Estimate samples needed for target accuracy for both
    strategies. Calculate total labeling cost: (samples * cost_per_sample). 2. **Model Size vs. Memory:**
    Calculate expected model size (e.g., X MB) considering INT8 quantization. Compare with 32 GB LPDDR4x.
    3. **Inference Performance:** Estimate model operations (e.g., Y GOPS). Calculate inferences per second:
    (400 TOPS INT8 / Y GOPS) * 1000. 4. **Power Efficiency:** Estimate power consumption per inference
    for target latency. Compare with 75W budget. These calculations demonstrate a quantitative understanding
    of the trade-offs.'
