title: Thermal Throttling on Qualcomm Cloud AI 100
scenario: You are monitoring an on-premise deployment running continuous inference on a Qualcomm Cloud
  AI 100 accelerator. The model fully utilizes the 32 GB LPDDR4x memory and operates at the maximum 75W
  TDP to achieve peak 400 TOPS INT8 throughput. After 45 minutes of sustained peak load in an edge cabinet
  with restricted airflow, telemetry shows the P99 inference latency suddenly increasing by 40% while
  the input request rate remains constant. Explain why this performance degradation occurs under these
  specific conditions.
details:
  realistic_solution: The system is experiencing thermal throttling. Because the accelerator operates
    continuously at its maximum 75W limit in an environment with restricted cooling, the accumulated heat
    exceeds the safe junction temperature threshold. The device firmware automatically scales down the
    clock frequency to reduce power and prevent physical damage, directly causing the increase in latency.
    A 40% latency spike corresponds to the chip throttling to approximately 400/1.4 ≈ 286 TOPS (not 240
    TOPS, which would cause 66.7% latency increase). Telemetry should focus on die temperature and clock
    speed metrics to verify this.
  common_mistake: Candidates often incorrectly suspect memory leaks, garbage collection pauses, or network
    congestion without analyzing the physical operating constraints of edge hardware. They fail to link
    the continuous 75W power draw to environmental thermal limits.
  napkin_math: 'Operating at the 75W TDP limit means the chip generates 75 Joules of heat per second.
    If the restricted airflow cabinet only dissipates 55W, there is an excess of 20W (20 J/s). Assuming
    a heatsink thermal mass of roughly 600 J/°C, the temperature increases by 20 / 600 = 0.033 °C/s. Over
    45 minutes (2700 seconds), this would cause a 90°C temperature rise, quickly hitting the thermal threshold
    (e.g., 95°C) and forcing the chip to throttle compute. A 40% latency spike (1.4x) corresponds to throttling
    down to 400 / 1.4 ≈ 286 TOPS. Note: throttling to 240 TOPS would cause a 66.7% latency increase (400/240
    = 1.667x), not 40%.'
