title: 'Real-Time Video Ingestion Bottleneck on Cloud AI 100'
scenario: 'You are deploying a multi-camera real-time video analytics pipeline on an on-premise server equipped with a Qualcomm Cloud AI 100 accelerator. The system ingests 16 parallel 1080p 30FPS RTSP streams, decodes them, and runs an INT8 object detection model. While the Cloud AI 100 is rated for 400 TOPS INT8 at 75W and should easily handle this, you observe erratic inference latency and accelerator utilization is stuck at 15%.'
question: 'What is the root cause of this poor accelerator utilization?'
details:
  realistic_solution: 'The root cause is a host-to-device data ingestion bottleneck. The decoded uncompressed frames are overwhelming the host memory bandwidth and PCIe bus during transfer to the accelerator''s 32 GB LPDDR4x memory, starving the 400 TOPS compute units. The solution requires optimizing the ingestion pipeline by using pinned (page-locked) memory, batched DMA transfers, or offloading the decoding step directly to hardware that shares memory with the AI accelerator.'
  common_mistake: |
    **The Pitfall:** Assuming the model is compute-bound or the accelerator lacks TOPS capacity.
    **The Rationale:** Engineers immediately suggest pruning the model instead of investigating the host-to-device ingestion pipeline.
    **The Consequence:** Accelerator utilization remains stuck at 15% because the root cause (PCIe/memory bandwidth starvation) is unaddressed.
  napkin_math: |
    - Frame rate: 16 streams * 30 FPS = 480 frames/sec.
    - Uncompressed 1080p frame: 1920 * 1080 * 3 bytes = 6.22 MB.
    - Total data rate to accelerator: 480 * 6.22 MB = **~2.98 GB/s**.
    - Inefficient host-side copies saturate memory bandwidth, leaving the 400 TOPS engine idle 85% of the time.
