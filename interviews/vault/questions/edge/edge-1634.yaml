title: Dataflow Latency and Energy on AI 100
scenario: You are mapping an INT8 linear layer (Batch*Seq=1024, In_Features=8192, Out_Features=8192) onto an edge accelerator. The platform features 400 TOPS INT8 peak compute and operates at a 75W TDP. Using a weight-stationary dataflow with spatial tiling to optimize memory accesses, your mapping achieves an 80% sustained utilization of the peak compute.
question: What are the expected execution latency in milliseconds and the energy consumed in millijoules for this single layer?
details:
  realistic_solution: 'First, calculate the total INT8 operations for the matrix multiplication layer. Then, determine the effective compute throughput by applying the 80% utilization factor to the peak TOPS. Finally, divide the total operations by the effective throughput to find latency, and multiply by the 75W TDP to find the energy consumption.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply MACs by 2 to get total operations, or failing to apply the 80% utilization factor to the peak TOPS before calculating latency.
    **The Rationale:** Misunderstanding the difference between MACs and operations, or treating theoretical peak throughput as achievable sustained throughput.
    **The Consequence:** Underestimating latency by 2x or 1.25x, leading to missed real-time deadlines and overly optimistic energy budgets in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer Dimensions: 1024 x 8192 x 8192.
       - Peak Compute: 400 TOPS (INT8).
       - Sustained Utilization: 80%.
       - Power Envelope: 75W.
    2. **Calculations:**
       - Total MACs: 1024 * 8192 * 8192 = 68,719,476,736 MACs (~68.7 billion).
       - Total INT8 Ops: 68.719 billion * 2 = 137.438 GOPs.
       - Effective Compute: 400 TOPS * 0.80 = 320 TOPS = 320,000 GOPs.
       - Latency: 137.438 GOPs / 320,000 GOPs = 0.0004295 seconds = 0.43 ms.
       - Energy: 0.0004295 s * 75 W = 0.0322 Joules = 32.2 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Execution**. The layer requires 0.43 ms and 32.2 mJ at 80% efficiency, demonstrating the high throughput of sustained spatial dataflow for INT8 GEMMs.
