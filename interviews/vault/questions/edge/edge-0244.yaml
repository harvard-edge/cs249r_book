title: The INT8 Energy Dividend (edge-0244)
scenario: You are trying to reduce the power draw of a perception model on an autonomous vehicle's main compute unit. Your colleague suggests quantizing the model's weights and activations from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: From a pure hardware physics perspective, what is the approximate energy saving for a single compute operation when using INT8 versus FP32?
details:
  realistic_solution: An FP32 operation consumes fundamentally more energy than an INT8 operation due to the physics of CMOS transistor switching. Moving from complex floating-point ALUs to highly optimized integer multiplier-accumulators (MACs) radically decreases dynamic power consumption, which is the primary thermal constraint in edge systems.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with memory savings (4x).
    **The Rationale:** Engineers correctly identify that INT8 is a 4x reduction in bit-width and mistakenly map that directly to ALU energy consumption.
    **The Consequence:** Drastically underestimating the thermal and battery life benefits of quantization on the edge.
  napkin_math: |
    **Assumptions & Constraints:**
    - Datatypes: FP32 vs INT8
    - Metric: Dynamic energy per compute operation

    **Calculations:**
    - Standard FP32 ALU operation cost: ~18 picojoules
    - Standard INT8 MAC operation cost: ~1 picojoule
    - Ratio = 18 / 1 = 18x

    **Conclusion & Interpretation:**
    - **Result: 18x (Compute-Energy Bound)**. INT8 provides an ~18x fundamental energy saving per operation.
  options:
    - '~4x. This matches the exact memory capacity reduction (32 bits to 8 bits).'
    - '~18x. This reflects the exponential difference in transistor switching logic between floating-point and integer ALUs.'
    - '~16x. This reflects a squared relationship of the bit reduction.'
    - '~256x. This assumes energy scales exponentially with the number of representable values (2^8 vs 2^32).'
  correct_index: 1
