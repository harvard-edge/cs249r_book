title: Analyzing Performance Degradation in Edge ML Model Rollouts
scenario: You are responsible for deploying a new computer vision model (v2) to a fleet of NVIDIA Jetson
  Orin devices (each with 32 GB LPDDR5, 275 TOPS INT8, and a 60W power envelope) operating at the edge.
  During a canary deployment, you observe that a subset of updated devices experiences a significant drop
  in inferencing throughput (e.g., from 60 FPS to 30 FPS) and increased P99 latency (e.g., from 50ms to
  150ms) compared to the previous model version (v1). The new model, v2, utilizes a slightly different
  neural architecture with 10% more parameters and a more aggressive 4-bit quantization scheme, deployed
  via a standard containerized update. How would you systematically analyze *why* this performance degradation
  is occurring on the Jetson Orin devices, pinpointing the root cause before proceeding with a full-scale
  progressive rollout? What specific metrics would you monitor and collect, and how would you correlate
  them with the observed performance issues?
details:
  realistic_solution: 'Implement a phased diagnostic approach: 1. Collect granular device-level metrics
    (CPU/GPU utilization, memory bandwidth, temperature, power draw, I/O rates) from both affected and
    healthy canary devices, and compare them against baseline devices running v1. 2. Profile model inference
    execution on-device using platform-specific tools like NVIDIA Nsight Systems or Jetson power tools
    to identify bottlenecks within the model''s execution graph (e.g., specific layers, memory access
    patterns, kernel launch times). 3. Analyze system logs for OOM errors, driver issues, or containerization
    overhead. 4. Conduct targeted micro-benchmarks for key components of v2 (e.g., 4-bit inference kernel
    performance) in isolation. This comprehensive data allows for robust correlation between model changes
    and system resource behavior.'
  common_mistake: Overlooking resource contention, memory bandwidth saturation, or thermal throttling
    at the edge, assuming only model complexity or quantization quality is the sole issue. Also, failing
    to establish comprehensive baseline performance and system health metrics before and during canary
    deployments, leading to difficulty in isolating the change impact.
  napkin_math: If v1 processes 60 FPS (approx. 16.7ms per inference) with 50ms P99 latency, and v2 drops
    to 30 FPS (approx. 33.3ms per inference) with 150ms P99 latency, this indicates a 2x throughput reduction
    and 3x P99 latency increase. Given the Jetson Orin's 275 TOPS INT8, a 10% increase in parameters for
    v2 might seem minor. However, if the new 4-bit quantization scheme, while theoretically more efficient,
    leads to sub-optimal memory access patterns or requires specific, non-accelerated CPU preprocessing
    for each inference, it could drastically reduce the *effective* utilization of the 275 INT8 TOPS.
    For instance, if the new quantization causes a 2x increase in memory bandwidth consumption per inference,
    the 32 GB LPDDR5, which has a finite bandwidth (e.g., ~68 GB/s for some Orin models), could become
    the primary bottleneck, resulting in the observed throughput and latency degradation.
