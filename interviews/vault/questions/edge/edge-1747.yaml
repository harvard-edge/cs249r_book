title: Hailo-8 Multi-Process Memory-Mapped Inference
scenario: You are deploying a cascaded object detection and tracking pipeline on an edge gateway equipped with a Hailo-8 accelerator. The Hailo-8 acts as a dataflow accelerator without local DRAM, relying entirely on streaming weights and activations directly from the host memory. Three separate containerized processes need to run concurrent inferences using the same 120MB INT8 backbone model.
question: How would you share the 120 MB Hailo-8 backbone across three containers while staying under a 200 MB host memory budget?
details:
  realistic_solution: The optimal solution is to memory-map (mmap) the shared backbone model weights from the host OS into the virtual address space of all three containers. Because the Hailo-8 streams data from host memory rather than caching it locally, mmap ensures that only a single physical 120MB copy resides in the host's RAM. The Hailo driver can then coordinate DMA transfers from this shared physical memory region directly to the dataflow engine for each inference request.
  common_mistake: |
    **The Pitfall:** Suggesting independent loading of the model in each container.
    **The Rationale:** Candidates misunderstand the Hailo-8 architecture, incorrectly assuming it caches weights locally like a traditional GPU.
    **The Consequence:** Consumes 360MB of host memory, completely blowing past the strict 200MB budget.
  napkin_math: |
    * Host memory budget: 200MB
    * Model size: 120MB (INT8)
    * Independent loading: 3 * 120MB = 360MB (Exceeds budget by 160MB)
    * Shared mmap loading: 1 * 120MB (physical) + page table overhead (<1MB) = ~120MB
    * **Savings: 240MB, keeping total usage well under the 200MB budget.**
