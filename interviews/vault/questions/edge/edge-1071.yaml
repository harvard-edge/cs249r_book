title: 'MLOps Lifecycle: Compare OTA Update Strategies for Fleet of Jetson Orin Edge
  Devices'
scenario: 'A fleet of 5000 Jetson Orin (32GB LPDDR5, 60W) edge devices deployed at
  retail locations needs OTA model updates. Two strategies: (A) full model replacement
  (500MB TensorRT engine) vs. (B) delta updates (adapter-only, 50MB). Evaluate total
  bandwidth cost, update time per device, risk of partial update failure, and rollback
  complexity at fleet scale.'
question: For 5000 Jetson Orins, how do 500MB full-model OTA updates compare with
  50MB delta updates in bandwidth, time, failure risk, and rollback?
details:
  realistic_solution: 'Strategy A: 500MB × 5000 devices = 2.5TB bandwidth. At $0.09/GB
    CDN: $225/update. Update time: 500MB at 10Mbps (retail WiFi) = 400s ≈ 7min. Failure
    recovery: if device loses power during 7min window, full re-download. Strategy
    B: 50MB × 5000 = 250GB, $22.50/update. 40s update time. Failure window 10× smaller
    → 10× fewer failures. Rollback: keep previous adapter (50MB) on device → instant
    swap. Strategy B wins on all metrics except requiring base model + adapter orchestration.'
  common_mistake: Focusing only on bandwidth cost without modeling failure recovery
    cost at fleet scale; at 5000 devices, 1% failure rate = 50 devices needing manual
    intervention.
  napkin_math: 'A: 500MB × 5000 = 2.5TB. CDN: $225. Time: 500MB/10Mbps = 400s. B:
    50MB × 5000 = 250GB. CDN: $22.50. Time: 40s. Failure rate (power loss in window):
    assume 0.1%/min × 7min = 0.7% failures in A: 35 devices, manual cost $50 each
    = $1,750. In B: 0.1%/min × 40s/60 = 0.067% → 3 failures = $150. Total cost A:
    $225+$1,750=$1,975. Total cost B: $22.50+$150=$172.50. B is 11× cheaper per update.'
