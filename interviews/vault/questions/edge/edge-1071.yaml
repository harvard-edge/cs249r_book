title: 'MLOps Lifecycle: Compare OTA Update Strategies for Fleet of Jetson Orin Edge Devices'
scenario: A fleet of 5000 Jetson Orin (32GB LPDDR5, 60W) edge devices deployed at retail locations needs OTA model updates. You are evaluating two strategies: (A) full model replacement (500MB TensorRT engine) versus (B) delta updates (adapter-only, 50MB).
question: For 5000 Jetson Orins, how do 500MB full-model OTA updates compare with 50MB delta updates in bandwidth cost, update time, and fleet-wide failure risk?
details:
  realistic_solution: 'Strategy A: 500MB × 5000 devices = 2.5TB bandwidth. At $0.09/GB CDN: $225/update. Update time: 500MB at 10Mbps (retail WiFi) = 400s ≈ 7min. Failure recovery: if device loses power during 7min window, full re-download. Strategy B: 50MB × 5000 = 250GB, $22.50/update. 40s update time. Failure window 10× smaller → 10× fewer failures. Rollback: keep previous adapter (50MB) on device → instant swap. Strategy B wins on all metrics except requiring base model + adapter orchestration.'
  common_mistake: |
    **The Pitfall:** Focusing only on bandwidth cost without modeling failure recovery cost at fleet scale.
    **The Rationale:** Candidates calculate CDN savings but fail to recognize that longer update windows proportionally increase the risk of power loss or network interruption during the update.
    **The Consequence:** Choosing an OTA strategy that seems cheap on paper but requires expensive manual intervention for bricked devices in the field.
  napkin_math: |
    * **Strategy A (Full - 500MB):**
      * Total Data: 500MB × 5000 = 2.5 TB. CDN cost: $225.
      * Update time (10Mbps WiFi): 500MB / 10Mbps = 400s (~7 min).
      * Failure risk (0.1%/min): 0.7% × 5000 = 35 failures.
      * Manual recovery cost: 35 × $50 = $1,750.
      * Total Cost A = $225 + $1,750 = **$1,975**.
    * **Strategy B (Delta - 50MB):**
      * Total Data: 50MB × 5000 = 250 GB. CDN cost: $22.50.
      * Update time (10Mbps WiFi): 50MB / 10Mbps = 40s.
      * Failure risk: (0.1%/min × 0.67 min) = ~0.067% × 5000 = 3 failures.
      * Manual recovery cost: 3 × $50 = $150.
      * Total Cost B = $22.50 + $150 = **$172.50**.
    * Strategy B is **~11x cheaper** per fleet update.
