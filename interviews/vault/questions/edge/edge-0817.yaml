title: The Multi-Model Memory Tetris
scenario: 'A robotics platform runs 5 concurrent models on a Jetson Orin (32 GB LPDDR5, 204.8 GB/s): SLAM (3.2 GB, 40ms), object detection (1.8 GB, 15ms), path planning (0.5 GB, 8ms), speech recognition (0.8 GB, 25ms), and gesture recognition (0.6 GB, 12ms). All models must run within a 50ms window. The total memory for weights is 6.9 GB, but with activations and workspace the total peaks at 18 GB. Design a scheduling strategy that respects both the memory ceiling and the 50ms deadline. What happens if you add a 6th model (4 GB weights, 20ms)?'
question: "How would you schedule the 5 models within the 32 GB and 50 ms limits, and what changes when adding a 6th 4 GB, 20 ms model?"
details:
  realistic_solution: 'Phase 1 (0-15ms): Run detection (1.8 GB, 15ms) and path planning (0.5 GB, 8ms) and gesture (0.6 GB, 12ms) concurrently on GPU. Phase 2: SLAM (3.2 GB, 40ms) and speech (0.8 GB, 25ms). Peak memory fits in 32 GB. Total wall time: 15 + 40 = 55ms > 50ms deadline. Must optimize: overlap Phase 1 tail with Phase 2 start, and reduce SLAM to ~25ms via TensorRT INT8 optimization. Revised schedule: Phase 1 (0-15ms): detection + path + gesture. Phase 2: speech starts at t=12, SLAM starts at t=15. Both finish by max(15+25, 12+25) = 40ms < 50ms deadline. Adding a 6th model (4 GB, 20ms): schedule alongside path planning and gesture in Phase 1, move detection to Phase 2. Phase 1 = max(20, 8, 12) = 20ms, Phase 2 = max(25, 25, 15) = 25ms (using INT8 SLAM). Total = 20 + 25 = 45ms, which fits the deadline but increases peak memory pressure.'
  common_mistake: Only budgeting model weights without accounting for activation memory, TensorRT workspace, and CUDA context overhead. Also, assuming all 5 models can start simultaneously — memory fragmentation and concurrent allocation peaks can push well beyond the sum of static weights.
  napkin_math: '32 GB LPDDR5 total. 5 models: 6.9 GB weights. Peak if all concurrent: ~19.3 GB — fits, but concurrent scheduling may cause OOM spikes. Two-phase schedule: Phase 1 = 15ms, Phase 2 = 40ms (SLAM), total = 55ms. Exceeds 50ms. Fix: apply TensorRT INT8 to SLAM (reducing to ~25ms). Effective wall time = max(15+25, 12+25) = 40ms. 6th model (20ms) pushes Phase 1 to 20ms, Phase 2 (with detection moved) to 25ms. Total = 45ms. Fits within 50ms.'
  options:
  - 'Run all 5 models sequentially: 40+15+8+25+12 = 100ms. This exceeds the deadline, so models must be pruned.'
  - 'Run all 5 models concurrently: max(40,15,8,25,12) = 40ms. This meets the deadline and fits comfortably within the 32 GB memory limit.'
  - 'Schedule in two phases to respect memory limits. Phase 1: detection, path, gesture (15ms). Phase 2: speech, SLAM. Total is 55ms, so SLAM must be optimized to 25ms (e.g., INT8) to achieve a 40ms total. A 6th model requires re-balancing.'
  - 'Only budget model weights (6.9 GB) and run everything concurrently, ignoring activation memory and workspace overhead.'
  correct_index: 2
