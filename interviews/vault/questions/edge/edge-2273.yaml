title: Orin Ethernet Switch AllReduce
scenario: A 4-node array of Jetson AGX Orins connected via a 1 Gigabit Ethernet switch performs an AllReduce on a 10 MB layer gradient. The switch supports full-duplex, but one of the four uplinks is degraded - it negotiated only 100 Mbps after a flaky PHY auto-negotiation - while the other three remain at 1 Gbps.
question: Create a topology mapping and calculate AllReduce time for both ring and tree, identifying which degrades more gracefully.
visual:
  kind: svg
  path: edge-2273.svg
  alt: Nodes connected through a central Ethernet Switch but logically forming a Ring.
  caption: Logical Ring over Physical Switch.
details:
  realistic_solution: Ring is bottlenecked by the slowest link. Each ring link carries 2*(3/4)*10 = 15 MB = 120 Mb; over 100 Mbps that takes 1200 ms - a 10x slowdown versus 120 ms on a healthy ring. Tree placement, however, can route around the bad uplink: if the degraded node is a leaf, it sends/receives only its own 10 MB payload twice (reduce + broadcast) at 100 Mbps = 1600 ms, but if the degraded uplink hosts the root, it sees 20 MB / 100 Mbps = 1600 ms. With careful root selection, tree degrades gracefully (only the slow leaf pays the penalty); ring cannot avoid the bad link because every node must traverse it.
  common_mistake: |
    **The Pitfall:** Blindly applying the textbook bandwidth-symmetric ring formula and concluding ring still beats tree.
    **The Rationale:** Candidates miss that a ring is a serial chain, meaning a single slow link acts as a global bottleneck for the entire cluster.
    **The Consequence:** The entire AllReduce collective slows down by 10x, whereas a smart tree topology could have isolated the failure.
  napkin_math: |
    - Healthy ring: 15 MB payload = 120 Mb. At 1000 Mbps, it takes 120 ms.
    - Degraded ring: The 120 Mb payload must traverse the 100 Mbps link, taking 1200 ms.
    - Tree with degraded leaf: Only the degraded leaf's 20 MB (160 Mb) traverses the slow 100 Mbps link, taking 1600 ms.
    **Conclusion: Tree isolates the failure so only the slow leaf pays the 1600ms penalty, whereas ring forces all nodes to suffer a 1200ms latency.**
