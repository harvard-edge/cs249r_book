title: Orin Ethernet Switch AllReduce
scenario: A 4-node array of Jetson AGX Orins connected via a 1 Gigabit Ethernet switch
  performs an AllReduce on a 10 MB layer gradient. The switch supports full-duplex.
question: Create a topology mapping and calculate the time taken to synchronize using
  a tree topology versus a ring topology.
visual:
  kind: svg
  path: edge-2273.svg
  alt: Nodes connected through a central Ethernet Switch but logically forming a Ring.
  caption: Logical Ring over Physical Switch.
details:
  realistic_solution: 'In a tree topology, the root becomes a bottleneck: $2 \times
    10$ MB $= 20$ MB ($160$ Mb) over 1 Gbps takes $160$ ms. In Ring AllReduce, data
    transferred per link is $2 \times (3/4) \times 10 = 15$ MB ($120$ Mb). Since the
    switch is full-duplex, the Ring runs concurrently, taking $120$ Mb / $1000$ Mbps
    $= 120$ ms. The Ring is 40 ms faster.'
  common_mistake: Assuming the 1 GbE switch means broadcast is cost-free, ignoring
    the ingress bottleneck at the root node.
  napkin_math: Tree bottleneck = 160Mb / 1000Mbps = 160ms. Ring = 120Mb / 1000Mbps
    = 120ms.
