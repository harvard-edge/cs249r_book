title: Edge Compute Transfer Overlap
scenario: An edge accelerator computes on tile A for 6 ms while DMA loads tile B in 2 ms. There are 20 tiles. Estimate total time with perfect double-buffer overlap after the first tile.
question: What total time do 20 tiles take if compute is 6 ms/tile and overlapped DMA is 2 ms/tile after the first tile?
details:
  realistic_solution: 'The steady-state stage is compute-bound at 6 ms/tile. Pay one initial 2 ms load, then 20 compute intervals: about 2 + 20 x 6 = 122 ms. Without overlap, it would be 20 x (6+2)=160 ms.'
  common_mistake: Adding compute and DMA for every tile even when double buffering overlaps the shorter stage.
  napkin_math: Overlapped total ≈ initial load 2 ms + 20 x max(6,2) = 122 ms. Sequential = 160 ms.
