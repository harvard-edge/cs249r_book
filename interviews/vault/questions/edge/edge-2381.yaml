title: 'Dual-Bank Atomic Checkpointing on Edge Storage Media'
scenario: 'A fleet of Jetson AGX Orins performs continuous learning on-device for predictive maintenance. Sudden power losses during the weight update step corrupt the local model.'
question: 'Evaluate a dual-bank checkpointing mechanism where the Orin writes to an A/B partition on the eMMC over the alternative of simply journaling gradients.'
details:
  realistic_solution: 'Dual-bank A/B checkpointing ensures atomicity; if power fails during the A write, partition B remains intact. While journaling gradients saves write bandwidth, it requires deterministic replay for recovery which is complex on Orin. A/B doubles storage but guarantees a maximum recovery time of one eMMC read.'
  common_mistake: 'Overestimating eMMC write endurance when writing full 100MB model checkpoints every few minutes.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 100MB.
    - eMMC sequential write speed: 50MB/s.

    **Calculations:**
    - Write time: 100MB / 50MB/s = 2 seconds.
    - Vulnerability window per save = 2 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2 Seconds (I/O-Bound)**. A dual-bank checkpointing scheme is necessary to ensure atomic writes during the vulnerability window.
