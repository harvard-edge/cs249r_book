title: The INT8 Energy Dividend (edge-0363)
scenario: You are optimizing a perception model for an autonomous vehicle's camera system running on a Jetson AGX Orin. A key strategy is quantizing the model from FP32 to INT8 to reduce power consumption.
question: Based on the fundamental physics of computation, what is the approximate energy-saving ratio for a single compute operation when switching from FP32 to INT8?
details:
  realistic_solution: An INT8 compute operation is approximately **18 times** more energy-efficient than an FP32 operation. This is a physical property of the silicon. The energy consumed by a multiplier circuit is proportional to the switching activity, which scales with the complexity of the operation. Reducing the bit width by a factor of 4 (from 32 to 8) drastically reduces the underlying hardware complexity, leading to this super-linear energy saving.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are strictly linear with bit width (e.g., 32/8 = 4x).
    **The Rationale:** Candidates equate memory footprint reduction directly to ALU energy consumption.
    **The Consequence:** Grossly underestimating the battery life extension provided by quantization.
  napkin_math: |
    **Assumptions & Constraints:**
       - FP32 to INT8 energy saving is driven by fundamental physical hardware constants, not linear bit-width ratios.
    **Calculations:**
       - Energy scaling is non-linear based on ALU circuit complexity (transistor count and switching activity).
    **Conclusion & Interpretation:**
       - **Result: 18x More Efficient**. An INT8 operation is ~18x more energy-efficient than FP32.
  options:
  - ~4x more efficient
  - ~3.4x more efficient
  - ~18x more efficient
  - ~580x more efficient
  correct_index: 2
