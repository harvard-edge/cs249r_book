title: 'Dataset Curation: Optimize On-Device Dataset Compression for Storage-Constrained Edge'
scenario: Your Jetson Orin (32GB LPDDR5) device needs to store 50K training images for periodic on-device fine-tuning. Raw images at 224x224x3 (150KB each) total 7.5GB, exceeding your 4GB budget for training data.
question: How would you store 50,000 training examples within the 4GB budget without significant quality loss?
details:
  realistic_solution: Store pre-extracted features instead of raw images. Use a frozen backbone (ResNet50 or MobileNet) to extract 512-dim features offline. Store as float16. This reduces storage 200x while preserving most task-relevant information for classification heads.
  common_mistake: |
    **The Pitfall:** Blindly lowering JPEG quality or resizing to a smaller resolution.
    **The Rationale:** Candidates default to standard image compression techniques without considering the downstream impact on model accuracy.
    **The Consequence:** Substantial degradation in fine-tuning effectiveness, making the deployed model less accurate.
  napkin_math: |
    1. **Option A (Resize 112x112):** 50K x 112x112x3 = 1.88GB. Quality loss: ~2% accuracy.
    2. **Option B (JPEG 50):** 50K x ~25KB = 1.25GB. Quality loss: ~1.5% accuracy.
    3. **Option C (Features):** 50K x 512 x 2 bytes (FP16) = 51.2MB. Labels: 50K x 4 bytes = 200KB. Total = **51.4MB**.
    4. **Conclusion:** Feature extraction is 150x smaller and fits entirely in RAM. Fine-tuning 50K examples over 5 epochs takes **~0.1 seconds** on a 275 TOPS Orin.
