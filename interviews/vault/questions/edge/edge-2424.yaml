title: QAT vs PTQ Trade-offs for Edge Degradation
scenario: A robotics team maps an FP32 LiDAR model to INT8 on a Jetson AGX Orin,
  observing a 3% mAP drop and 4x latency speedup. They have only 200 unlabeled scenes
  available locally for calibration (no access to the original training dataset).
  The fleet ships globally and operates in conditions never seen in the calibration
  set.
question: Evaluate the trade-off of QAT versus PTQ given the constraint of only 200
  local calibration scenes and missing access to the original training set. Identify
  whether QAT is even feasible here and what alternative recovery strategies exist
  for fleet deployment.
details:
  realistic_solution: PTQ is computationally cheap and requires no backpropagation,
    but led to the 3% drop due to rounding errors. QAT simulates INT8 precision noise
    during the forward pass of a fine-tuning regime. The trade-off is that while QAT
    is highly likely to recover the lost 3% mAP by adapting the weights, it requires
    vast GPU hours, the full original dataset, and a complex training pipeline.
  common_mistake: Assuming QAT executes directly on the edge Orin device rather than
    a cloud GPU cluster.
  napkin_math: 32 / 8 = 4x
