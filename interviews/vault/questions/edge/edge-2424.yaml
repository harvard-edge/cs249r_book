title: TensorRT PTQ Calibration on Orin with 200 Scenes
scenario: A robotics team is using TensorRT 8.6 on Jetson AGX Orin to deploy a PointPillars
  LiDAR detector. The team has only 200 unlabeled scenes locally (no original training
  set, no labels) and must choose between TensorRT's three INT8 calibrators - IInt8MinMaxCalibrator,
  IInt8EntropyCalibrator2, and IInt8LegacyCalibrator (percentile-based). A first pass
  with IInt8MinMaxCalibrator on the 200 scenes produced a 3% mAP drop and 4x latency
  speedup over FP32, but spot-checks on out-of-distribution night scenes showed double-digit
  recall loss on small objects. QAT is infeasible because the team lacks labels and
  the original dataset.
question: Evaluate which TensorRT INT8 calibrator best fits the 200-scene unlabeled
  constraint, why the dataset's coverage gap (no night scenes) limits any PTQ approach
  regardless of calibrator choice, and what concrete TensorRT-side mitigations (per-tensor
  vs per-channel weight quantization, layer-precision overrides, sparsity, or DLA
  core fallback) are available before resorting to QAT. Justify the recommended pipeline
  and note which Orin-specific knobs (DLA, --useDLACore, --fp16 mixed-precision fallback)
  are relevant.
details:
  realistic_solution: 'Calibrator choice. IInt8EntropyCalibrator2 minimises KL divergence
    between the FP32 and INT8 activation distributions and is TensorRT''s default
    for vision; on the 3D-feature pyramid in PointPillars it typically beats Min-Max
    by 1-2% mAP because LiDAR feature distributions have heavy tails that Min-Max
    stretches across. The legacy percentile calibrator can edge it out for very long-tailed
    distributions. Switch to IInt8EntropyCalibrator2 first - free win, no retraining.
    The 200-scene coverage gap remains: PTQ can only adapt scales to whatever calibration
    sees, so night scenes will still degrade. Mitigations available in TensorRT without
    labels: (1) keep per-channel quantization on weights (the default; do not disable),
    it usually preserves 0.5-1% mAP vs per-tensor weights; (2) use layer-precision
    overrides (setPrecision(kFP16)) on the small first convs and the final detection
    head, which carry the heaviest accuracy burden and have negligible TOPS impact;
    (3) mixed FP16/INT8 builds via --best instead of --int8 - retain INT8 in the heavy
    3D-conv backbone, FP16 elsewhere; (4) Orin-specific: offload sensitive layers
    to DLA in FP16 (--useDLACore=0/1) so the GPU INT8 only runs the well-quantized
    backbone. QAT is the right answer long-term but blocked here. Recommendation:
    switch to Entropy calibrator + FP16 head/first-conv override + DLA fallback for
    sensitive layers; collect a 2k-scene labeled night-driving set for QAT in the
    next release.'
  common_mistake: 'Treating QAT vs PTQ as the only knob and missing that TensorRT
    exposes calibrator choice, per-layer precision overrides, and DLA fallback - all
    of which can recover most of the gap without labels or retraining. Also: assuming
    QAT can run on the Orin itself.'
  napkin_math: 'PTQ choices ranked: per-channel weight INT8 + Entropy calibrator +
    FP16 head ~ -0.5% mAP; Min-Max + per-tensor ~ -3% to -10% on OOD. Latency impact
    of FP16 head < 5% (head is small). DLA offload preserves FP16 accuracy at no GPU
    cost.'
