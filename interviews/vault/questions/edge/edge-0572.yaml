title: The TDA4VM Vision Pipeline
scenario: 'You''re designing an ADAS system on the TI TDA4VM SoC. It has a C7x DSP (80 GFLOPs), an MMA
  deep learning accelerator (8 TOPS INT8), two R5F safety cores (lockstep, ASIL-D capable), and an A72
  application processor. Your perception pipeline must run simultaneously: (1) a primary object detection
  model (YOLOv5s, 7.2 GFLOPs), (2) a lane detection model (1.5 GFLOPs), and (3) a driver monitoring model
  (0.8 GFLOPs). All three must complete within 33ms. How do you partition across the heterogeneous cores?'
details:
  realistic_solution: 'Partition across the heterogeneous SoC by workload characteristics. Primary detection
    (YOLOv5s, 7.2 GFLOPs): run on the MMA accelerator — it''s the largest model and benefits most from
    INT8 acceleration (~12ms). Lane detection (1.5 GFLOPs): run on the C7x DSP — it''s a lightweight model
    that maps well to DSP vector operations (~3ms). Driver monitoring (0.8 GFLOPs): run on the A72 CPU
    with NEON — it''s tiny and the A72 has spare cycles (~5ms). Safety watchdog: runs on the R5F lockstep
    cores (ASIL-D), monitoring all outputs. All three models run in parallel, completing in max(12, 3,
    5) = 12ms, leaving 21ms of margin within the 33ms deadline.'
  common_mistake: '"Run all three models on the MMA accelerator sequentially." Even if the MMA theoretically
    supports it, moving models that are better suited for DSP/CPU onto the MMA results in poor utilization.
    Running them sequentially takes ~20ms. Add pre/post-processing and you hit 30ms, dangerously close
    to the 33ms budget. More critically, you''ve left the heterogeneous cores (C7x DSP, A72) completely
    idle.'
  napkin_math: 'Sequential on MMA only: 12ms (YOLO) + 3ms (Lane) + 5ms (Driver) = 20ms inference + 5ms
    ISP + 5ms pre/post = 30ms. Dangerously close to 33ms with a tight margin. Partitioned: max(12, 3,
    5) = 12ms total inference + 10ms overhead = 22ms total, leaving 11ms margin (33% headroom). The partitioning
    also enables the C7x and A72 to handle sensor preprocessing and CAN communication in their idle cycles.
    MMA utilization: 12ms/33ms = 36%. C7x utilization: 3ms/33ms = 9%. A72 utilization: 5ms/33ms = 15%.
    R5F: <1ms/33ms = ~3%.'
  options:
  - Run all three models on the MMA accelerator sequentially.. Even if the MMA theoretically supports
    it, moving models that are better suited for DSP/CPU onto the MMA results in poor utilization.
  - Software-only health checks are sufficient; a hardware watchdog timer adds unnecessary complexity
    to the system design.
  - 'Partition across the heterogeneous SoC by workload characteristics. Primary detection (YOLOv5s, 7.2
    GFLOPs): run on the MMA accelerator — it''s the largest model and benefits most from INT8 acceleration
    (~12ms). Lane detection (1.5 GFLOPs): run on the C7x DSP — it''s a lightweight model that maps well
    to DSP vector operations (~3ms).'
  - Streaming all raw metrics to the cloud in real-time is the most reliable approach because edge-side
    aggregation risks losing critical anomalies.
  correct_index: 2
