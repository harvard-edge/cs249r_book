title: The TDA4VM Vision Pipeline
scenario: 'You''re designing an ADAS system on the TI TDA4VM SoC. It has a C7x DSP (80 GFLOPs), an MMA deep learning accelerator (8 TOPS INT8), two R5F safety cores, and an A72 CPU. Your perception pipeline must run simultaneously: (1) primary object detection (YOLOv5s, 7.2 GFLOPs), (2) lane detection (1.5 GFLOPs), and (3) driver monitoring (0.8 GFLOPs). All three must complete within 33ms.'
question: 'How do you partition across the heterogeneous cores to guarantee the 33ms deadline?'
details:
  realistic_solution: 'Partition across the heterogeneous SoC by workload characteristics. Primary detection (YOLOv5s, 7.2 GFLOPs): run on the MMA accelerator — it''s the largest model and benefits most from INT8 acceleration (~12ms). Lane detection (1.5 GFLOPs): run on the C7x DSP — it''s a lightweight model that maps well to DSP vector operations (~3ms). Driver monitoring (0.8 GFLOPs): run on the A72 CPU with NEON — it''s tiny and the A72 has spare cycles (~5ms). Safety watchdog: runs on the R5F lockstep cores (ASIL-D), monitoring all outputs. All three models run in parallel, completing in max(12, 3, 5) = 12ms, leaving 21ms of margin within the 33ms deadline.'
  common_mistake: |
    **The Pitfall:** Running all three models on the MMA accelerator sequentially.
    **The Rationale:** Candidates assume the primary ML accelerator is simply the fastest place to run everything.
    **The Consequence:** Sequential execution stacks latencies dangerously close to the 33ms limit while leaving the DSP and CPU completely idle.
  napkin_math: |
    * Sequential on MMA: 12ms (YOLO) + 3ms (Lane) + 5ms (Driver) = 20ms + 10ms overhead = 30ms (dangerously close to 33ms).
    * Partitioned approach:
    * MMA: YOLOv5s (~12ms)
    * DSP: Lane detection (~3ms)
    * CPU: Driver monitoring (~5ms)
    * Total Parallel Inference = max(12, 3, 5) = 12ms.
    * **Conclusion: 12ms parallel inference + 10ms overhead = 22ms total, leaving a massive 33% (11ms) margin of safety.**
  options:
  - Run all three models on the MMA accelerator sequentially.. Even if the MMA theoretically supports it, moving models that are better suited for DSP/CPU onto the MMA results in poor utilization.
  - Software-only health checks are sufficient; a hardware watchdog timer adds unnecessary complexity to the system design.
  - 'Partition across the heterogeneous SoC by workload characteristics. Primary detection (YOLOv5s, 7.2 GFLOPs): run on the MMA accelerator — it''s the largest model and benefits most from INT8 acceleration (~12ms). Lane detection (1.5 GFLOPs): run on the C7x DSP — it''s a lightweight model that maps well to DSP vector operations (~3ms).'
  - Streaming all raw metrics to the cloud in real-time is the most reliable approach because edge-side aggregation risks losing critical anomalies.
  correct_index: 2
