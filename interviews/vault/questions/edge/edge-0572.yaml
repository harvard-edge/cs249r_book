title: The TDA4VM Vision Pipeline
scenario: 'You''re designing an ADAS system on a heterogeneous SoC containing a DSP, an INT8 deep learning accelerator (MMA), two safety cores, and a CPU. Your perception pipeline must run primary object detection, lane detection, and driver monitoring simultaneously within 33ms.'
question: 'How do you partition across the heterogeneous cores to guarantee the 33ms deadline?'
details:
  realistic_solution: 'Partition across the heterogeneous SoC by workload characteristics. Run the massive YOLOv5s model on the INT8 MMA accelerator, map lightweight lane detection to DSP vector operations, and execute tiny driver monitoring on the CPU. Running them in parallel minimizes total pipeline latency.'
  common_mistake: |
    **The Pitfall:** Running all three models on the MMA accelerator sequentially.
    **The Rationale:** Candidates assume the primary ML accelerator is simply the fastest place to run everything.
    **The Consequence:** Sequential execution stacks latencies dangerously close to the 33ms limit while leaving the DSP and CPU completely idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MMA (YOLOv5s) = 12ms. DSP (Lane) = 3ms. CPU (Driver) = 5ms.
       - Synchronization overhead = 10ms. Deadline = 33ms.
    2. **Calculations:**
       - Sequential on MMA: 12ms + 3ms + 5ms + 10ms overhead = 30ms (dangerously close to 33ms).
       - Partitioned parallel execution: max(12, 3, 5) = 12ms.
       - Total Parallel Latency: 12ms compute + 10ms overhead = 22ms.
    3. **Conclusion & Interpretation:**
       - **Parallel inference completes in 22ms total, leaving a massive 33% (11ms) margin of safety.** (Result: Concurrency-Bound)
  options:
  - 'Run all three models on the MMA accelerator sequentially. Even if the MMA theoretically supports it, moving models that are better suited for DSP/CPU onto the MMA results in poor utilization.'
  - 'Software-only health checks are sufficient; a hardware watchdog timer adds unnecessary complexity to the system design.'
  - 'Partition across the heterogeneous SoC by workload characteristics, running YOLOv5s on the MMA, Lane detection on the DSP, and Driver monitoring on the CPU.'
  - 'Streaming all raw metrics to the cloud in real-time is the most reliable approach because edge-side aggregation risks losing anomalies.'
