title: The Thermal Throttling Cliff
scenario: Your team is evaluating two perception models for an autonomous vehicle platform running on
  a Jetson AGX Orin, which has a configurable power limit. Model A is a large, compute-intensive CNN.
  Model B is a smaller model designed with custom operations that require significant memory access. When
  the Orin is configured to its maximum 60W power limit (e.g., on a cool day), both models achieve the
  target 45 FPS. However, after 20 minutes of operation, the system's thermal envelope is reached, and
  the Orin throttles down to its 30W power profile to prevent overheating. In this state, Model A's performance
  collapses to 15 FPS, while Model B's performance only degrades gracefully to 41 FPS. Evaluate these
  results. Why does one model's performance fall off a cliff, while the other degrades predictably? Justify
  which model is the correct choice for a production deployment.
details:
  realistic_solution: The behavior is explained by the Roofline model and the differing bottlenecks of
    the two models. Model A is **compute-bound**. Its performance is directly proportional to the available
    TOPS, which in turn depends on the GPU's clock frequency and power. Model B is **memory-bound**; its
    performance is limited by the DRAM bandwidth. Thermal throttling aggressively scales down GPU clock
    frequency and voltage to reduce power consumption, which massively reduces the available TOPS. However,
    memory bandwidth is largely unaffected by these power-saving measures.
  common_mistake: A common mistake is to say 'Model A is just too big for the hardware.' This is superficial;
    it was clearly running fine at 45 FPS initially. The key is not its absolute size, but its relationship
    with the hardware subsystems. Another wrong turn is to blame the hardware, e.g., 'The vehicle's cooling
    system is inadequate.' This deflects from analyzing the software-hardware interaction, which is the
    core of the problem. A robust system must work within the given physical constraints.
  napkin_math: 'Orin 60W Ridge Point = 1342 Ops/Byte; 30W Ridge Point = 732 Ops/Byte. Model A AI = 2000
    (Compute-bound); Model B AI = 400 (Memory-bound). At 60W: Model A takes 2e12 / 275e12 = 7.2ms. Model
    B takes 2e9 / 204.8e9 = 9.7ms. At 30W: Model A slows to 2e12 / 150e12 = 13.3ms. Model B stays 9.7ms,
    unaffected by TOPS drop.'
