title: The Thermal Throttling Cliff
scenario: Two perception models are evaluated on a Jetson AGX Orin. Model A is a compute-intensive CNN. Model B relies on custom operations with heavy memory access. At a 60W limit, both achieve 45 FPS. When thermal throttling forces a 30W limit, Model A collapses to 15 FPS, while Model B gracefully degrades to 41 FPS.
question: Why does Model A's performance collapse under thermal throttling while Model B's only degrades slightly, and which model is better for production?
details:
  realistic_solution: The behavior is explained by the Roofline model and the differing bottlenecks of
    the two models. Model A is **compute-bound**. Its performance is directly proportional to the available
    TOPS, which in turn depends on the GPU's clock frequency and power. Model B is **memory-bound**; its
    performance is limited by the DRAM bandwidth. Thermal throttling aggressively scales down GPU clock
    frequency and voltage to reduce power consumption, which massively reduces the available TOPS. However,
    memory bandwidth is largely unaffected by these power-saving measures.
  common_mistake: |
    **The Pitfall:** Assuming Model A is just "too big" or blaming inadequate cooling.
    **The Rationale:** Engineers look at the symptoms without analyzing the hardware subsystem interactions dictated by the Roofline model.
    **The Consequence:** Failing to select the correct model for a constrained physical environment, leading to fragile production deployments.
  napkin_math: |
    1. **Model Profiles**: Model A AI = 2000 (Compute-bound); Model B AI = 400 (Memory-bound).
    2. **At 60W (275 TOPS, 204 GB/s)**:
       - Model A (6 TOps): 6e12 / 275e12 = 21.8 ms (45 FPS).
       - Model B (4.5 GB): 4.5e9 / 204.8e9 = 22.0 ms (45 FPS).
    3. **At 30W (Throttled to ~90 TOPS, Memory slightly drops to 184 GB/s)**:
       - Model A: 6e12 / 90e12 = 66.6 ms **(15 FPS)**.
       - Model B: 4.5e9 / 184.3e9 = 24.4 ms **(41 FPS)**.
    4. **Conclusion**: Thermal throttling drastically reduces clock speeds (TOPS) but barely touches memory bandwidth. Model B is the correct choice.
