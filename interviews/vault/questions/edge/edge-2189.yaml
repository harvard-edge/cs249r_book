title: Storage Format for Edge Inference on Jetson Orin
scenario: Your Jetson Orin runs an object detection model that must load a 500K image calibration dataset from a 256 GB NVMe SSD for periodic recalibration. The recalibration must complete within 10 minutes. The dataset is currently stored as individual JPEG files in nested directories.
question: How long will 500K individual JPEG reads take from NVMe, and what storage format would meet the 10-minute recalibration budget?
details:
  realistic_solution: 'Individual files: each open() + read() + close() takes ~0.5ms of syscall overhead on Linux, even with NVMe. 500K files × 0.5ms = 250 seconds = 4.2 minutes just in syscall overhead, before any data transfer. With directory traversal (nested dirs), readdir() adds another 1-2 minutes. Total: 6+ minutes of metadata overhead on a 10-minute budget, leaving only 4 minutes for actual processing. Solution: pack images into tar shards (WebDataset format) or a SQLite database. Tar shards: 100 MB each, 1,000 shards. Sequential reads eliminate per-file syscall overhead. SQLite: single file, B-tree index for random access by image_id. On Jetson, SQLite is particularly attractive because the entire index fits in memory and the single-file format simplifies deployment.'
  common_mistake: |
    **The Pitfall:** Assuming NVMe sequential bandwidth is the bottleneck.
    **The Rationale:** Engineers calculate data transfer time based on raw NVMe speed but forget the filesystem metadata overhead of opening hundreds of thousands of small files.
    **The Consequence:** They wrongly conclude the hardware is too slow when the actual issue is the enormous inode lookup overhead on ext4.
  napkin_math: |
    1. **Individual Files Overhead**: 500K * 0.5ms open/read/close = 250s + directory walk 90s = 340s (5.7 min).
    2. **Data Transfer**: 100 GB / 3.5 GB/s = 29s.
    3. **Total Individual Files Time**: 340s + 29s = **369s**.
    4. **Tar Shards (1,000 x 100 MB)**: 1,000 opens (0.5s) + sequential read at 3.5 GB/s (29s) = **29.5s** (12.5x speedup).
    5. **SQLite (Single File, Indexed)**: 1 open + 100 GB sequential (29s) + index overhead (~2s) = **31s**. Both formats meet the 10-minute budget with over 9 minutes left for processing.
