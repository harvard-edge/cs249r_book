title: The Autonomous Perception Stack Fork
scenario: You are the lead architect for the perception system of a new Level 3 autonomous vehicle. Your
  team is debating two competing designs for the core perception stack, which must run on a Jetson AGX
  Orin-class processor with a strict 30W thermal design power (TDP) budget and meet a 33ms per-frame deadline.
details:
  realistic_solution: The decision cannot be based on FLOPs alone, but on how efficiently each architecture
    uses the hardware. The correct KPI is **Achieved TOPS-per-Watt**, which measures the actual realized
    computational throughput against the power consumed.
  common_mistake: Focusing only on total FLOPs, parameter count, or theoretical model accuracy. A model
    with fewer FLOPs can be slower and less power-efficient if its architecture creates memory-bound operators
    that underutilize the GPU's compute units. Another common mistake is assuming the chip's advertised
    'Peak TOPS' is achievable for any workload; in reality, it's only achievable by compute-bound workloads.
  napkin_math: 'At 30W, Orin downclocks to ~137 INT8 TOPS and ~100 GB/s bandwidth. Design A requires 10
    T-ops, AI = 500. Design B requires 5 T-ops, AI = 50. Ridge point is 137 TOPS / 100 GB/s = 1370 Ops/Byte.
    Both are memory bound! A takes 10T / 500 = 20GB data movement. B takes 5T / 50 = 100GB. Time for A:
    20GB / 100 GB/s = 200ms. Time for B: 100GB / 100 GB/s = 1000ms. Design A is 5x faster due to higher
    AI.'
