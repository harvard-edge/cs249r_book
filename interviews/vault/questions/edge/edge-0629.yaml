title: The Autonomous Perception Stack Fork
scenario: You are the lead architect for the perception system of a new Level 3 autonomous vehicle. Your team is debating two competing designs for the core perception stack, which must run on a Jetson AGX Orin-class processor with a strict 30W thermal design power (TDP) budget and meet a 33ms per-frame deadline.
question: How should you choose between the two 30W perception designs, and why is achieved TOPS-per-watt more useful than FLOPs?
details:
  realistic_solution: The decision cannot be based on FLOPs alone, but on how efficiently each architecture uses the hardware. The correct KPI is Achieved TOPS-per-Watt, which measures the actual realized computational throughput against the power consumed.
  common_mistake: |
    **The Pitfall:** Relying exclusively on total FLOPs or parameter count.
    **The Rationale:** Candidates incorrectly assume the chip's advertised 'Peak TOPS' is achievable for any workload, ignoring that memory-bound operators severely underutilize compute units.
    **The Consequence:** Choosing a model with fewer FLOPs that is actually slower and less power-efficient in production.
  napkin_math: |
    1. **Ridge Point:** At 30W, Orin downclocks to ~137 INT8 TOPS and ~100 GB/s bandwidth. Hardware Ridge Point = 137 TOPS / 100 GB/s = 1370 Ops/Byte.
    2. **Design A (Compute-Heavy):** 10 T-ops, Arithmetic Intensity (AI) = 500 Ops/Byte. Since 500 < 1370, it is Memory Bound. Data movement = 10T / 500 = 20 GB. Time = 20 GB / 100 GB/s = **200ms**.
    3. **Design B (Compute-Light):** 5 T-ops, Arithmetic Intensity (AI) = 50 Ops/Byte. Since 50 < 1370, it is also Memory Bound. Data movement = 5T / 50 = 100 GB. Time = 100 GB / 100 GB/s = **1000ms**.
    4. **Conclusion:** Design A is **5x faster** (200ms vs 1000ms) despite doing 2x more FLOPs, purely because its higher AI requires less memory bandwidth.
