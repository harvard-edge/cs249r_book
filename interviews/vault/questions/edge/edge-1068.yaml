title: 'Latency Decomposition: Full Pipeline Latency Audit for Autonomous Drone on Jetson Orin'
scenario: An autonomous drone uses a Jetson Orin (275 TOPS INT8, 60W, 204 GB/s LPDDR5) running a perception-planning-control pipeline. Components: stereo camera capture (2ms), depth estimation CNN (INT8, 8 GOPs), object detection YOLOv8-m (26 GOPs INT8), trajectory planning (CPU, 5ms), motor command output (1ms).
question: Can the sequential pipeline meet the 30ms budget, what is the bottleneck, and what fix is needed?
details:
  realistic_solution: Yes, the pipeline easily meets the 30ms budget. A common pitfall is miscalculating the latency by dividing GOPS by TOPS without accounting for the 1000x magnitude difference. The true bottleneck is the CPU-bound trajectory planning (5ms), which takes the majority of the ~8.3ms total pipeline time. The quantified fix is to simply run the models sequentially, as pipelining adds unnecessary complexity for a system comfortably under budget.
  common_mistake: |
    **The Pitfall:** Failing to convert TOPS (Tera-ops) to GOPS (Giga-ops).
    **The Rationale:** Candidates divide 26 / 110 and get 0.236, but incorrectly assume the unit is seconds (236ms) instead of milliseconds.
    **The Consequence:** A 1000x overestimation of inference latency, leading to the incorrect conclusion that pipelining or a smaller model is required.
  napkin_math: |
    - **YOLOv8-m compute time:** 26 GOPs INT8. Orin at 275 TOPS * 40% utilization = 110 TOPS effective.
    - **Correct latency math:** 26 GOPs / 110 TOPS = (26 * 10^9) / (110 * 10^12) = 0.000236s = 0.236ms.
    - **Depth estimation latency:** 8 GOPs / 110 TOPS = 0.000072s = 0.072ms.
    - **Total pipeline latency:** 2ms (capture) + 0.07ms (depth) + 0.24ms (YOLO) + 5ms (plan) + 1ms (control) = 8.31ms.
    - **Final result:** **The pipeline easily meets the 30ms budget (8.3ms total), and the CPU planner (5ms) is the actual bottleneck.**
