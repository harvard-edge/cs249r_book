title: 'Latency Decomposition: Full Pipeline Latency Audit for Autonomous Drone on
  Jetson Orin'
scenario: 'An autonomous drone uses Jetson Orin (275 TOPS INT8, 60W, 204 GB/s LPDDR5)
  running a perception-planning-control pipeline. Components: stereo camera capture
  (2ms), depth estimation CNN (INT8, 8 GOPs), object detection YOLOv8-m (26 GOPs INT8),
  trajectory planning (CPU, 5ms), motor command output (1ms). The drone requires end-to-end
  loop < 30ms at 30Hz. Audit the pipeline, identify the bottleneck, and quantify a
  fix.'
question: Can the drone perception-planning-control loop meet the 30ms budget, what
  is the bottleneck, and what quantified fix would you use?
details:
  realistic_solution: 'Yes, the pipeline easily meets the 30ms budget. A common pitfall is miscalculating the latency by dividing GOPS by TOPS without accounting for the 1000x magnitude difference (e.g., treating 26 GOPs / 110 effective TOPS as 236ms instead of 0.236ms). The actual INT8 compute time for the 26 GOP model on a 110 effective TOPS GPU is ~0.24ms. The true bottleneck is the CPU-bound trajectory planning (5ms), which takes the majority of the ~8.3ms total pipeline time. The quantified fix is to simply run the models sequentially, as pipelining adds unnecessary complexity for a system comfortably under budget.'
  common_mistake: 'Failing to convert TOPS (Tera-ops) to GOPS (Giga-ops), resulting in a 1000x overestimation of inference latency and incorrectly concluding the hardware is insufficient.'
  napkin_math: 'YOLOv8-m: 26 GOPs INT8. Orin at 275 TOPS × 40% util = 110 TOPS effective. 
    Incorrect math: 26 / 110 = 0.236 seconds = 236ms.
    Correct math: 26 GOPs / 110 TOPS = 26×10^9 / 110×10^12 = 0.000236s = 0.236ms.
    Total pipeline sequential: 2ms (capture) + 0.07ms (depth) + 0.24ms (YOLO) + 5ms (plan) + 1ms (control) = ~8.3ms total.
    This is well within the 30ms budget.'
