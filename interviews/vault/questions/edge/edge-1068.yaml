title: 'Latency Decomposition: Full Pipeline Latency Audit for Autonomous Drone on
  Jetson Orin'
scenario: 'An autonomous drone uses Jetson Orin (275 TOPS INT8, 60W, 204 GB/s LPDDR5)
  running a perception-planning-control pipeline. Components: stereo camera capture
  (2ms), depth estimation CNN (INT8, 8 GOPs), object detection YOLOv8-m (26 GOPs INT8),
  trajectory planning (CPU, 5ms), motor command output (1ms). The drone requires end-to-end
  loop < 30ms at 30Hz. Audit the pipeline, identify the bottleneck, and quantify a
  fix.'
question: Can the drone perception-planning-control loop meet the 30ms budget, what
  is the bottleneck, and what quantified fix would you use?
details:
  realistic_solution: 'Sequential: 2 + (8/110) + (26/110) + 5 + 1 = 2 + 73ms + 236ms
    — impossible. Use INT8 at 275 TOPS: 8/275 ≈ 29ms, 26/275 ≈ 95ms. Still too slow.
    Fix: use DLA for depth (dedicated, ~8ms) and GPU for YOLO (~26ms at 40% util ≈
    65ms). Pipeline them: max(8,65) = 65ms. Still over budget. Reduce YOLO to YOLOv8-s
    (6.5 GOPs): 6.5/275×0.5 ≈ 47ms. Or use INT4: halve latency → 24ms YOLO. Total:
    2 + max(8, 24) + 5 + 1 = 32ms. Close — optimize planning to 3ms.'
  common_mistake: Running depth estimation and object detection sequentially when
    they can be pipelined; also underestimating memory bandwidth pressure when both
    models share LPDDR5.
  napkin_math: 'YOLOv8-m: 26 GOPs INT8. Orin at 275 TOPS × 40% util = 110 TOPS effective.
    26/110 = 0.24s? No: 26G/110T = 0.24ms — that''s right. Wait: 26 GOPs / 110 TOPS
    = 0.24ms. So pipeline: 2 + 0.24 + 5 + 1 = 8.24ms total. Well within 30ms. Key:
    275 TOPS is INT8 ops/s not FLOPS — 26G INT8 ops / 275G ops/s = 94ms? Recheck:
    275 TOPS = 275×10^12 ops/s. 26 GOPs = 26×10^9. 26×10^9 / 275×10^12 = 0.094ms.
    Total pipeline: ~7ms. Comfortable under 30ms budget.'
