title: 'Optimizing Edge Deployment: Mixed-Precision Training for Coral Edge TPU'
scenario: >-
  A machine learning team is deploying an image classification model onto a Google Coral Edge TPU (4 TOPS, 2W, INT8 only). The team has two candidate models: Model A (trained in FP32, intended for post-training quantization) and Model B (trained using mixed-precision, intended for PTQ or QAT).
question: How would you compare Model A and Model B for INT8-only Coral deployment across accuracy, throughput, energy, and quantization risks?
details:
  realistic_solution: |
    1. **Training & Quantization:** Apply PTQ for Model A, and both PTQ and QAT for Model B.
    2. **Performance Benchmarking:** Evaluate final INT8 accuracy, throughput (FPS), and power consumption on the TPU.
    3. **Resource Analysis:** Compare quantized model sizes and memory footprints.
    4. **Tradeoff Analysis:** Analyze the trade-offs between accuracy, throughput, and power, prioritizing metrics that stay within the 2W budget.
  common_mistake: |
    **The Pitfall:** Assuming mixed-precision training automatically improves INT8 deployment.
    **The Rationale:** Candidates believe mixed-precision guarantees better quantized models without an explicit QAT strategy.
    **The Consequence:** Deploying a model with unexpectedly poor accuracy or performance.
  napkin_math: |
    - **Throughput:** Coral provides 4000 GOPS. If a model requires 2 GOPS/inference, max FPS is `4000 / 2 = 2000 inferences/sec`.
    - **Latency:** If Model B is 10% slower due to complexity, it achieves `~1818 inferences/sec`.
    - **Power:** Both Model A (1.8W) and Model B (1.95W) fit within the 2W budget.
    - **Result:** **The team must quantify whether a marginal accuracy gain from Model B justifies an 182 FPS drop and a 0.15W power increase.**
