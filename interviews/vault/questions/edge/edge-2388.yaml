title: Symmetric QAT Pipeline Creation
scenario: You are designing an INT8 quantization scheme for a custom CNN on a Hailo-8
  accelerator for local traffic monitoring.
question: Formulate a quantization-aware training (QAT) strategy that explicitly accounts
  for the accelerator's symmetric INT8 datapath to minimize accuracy degradation on
  long-tail classes.
details:
  realistic_solution: Create a QAT pipeline enforcing symmetric, per-channel quantization
    for weights and per-tensor symmetric quantization for activations. By clipping
    outliers during the forward pass and approximating gradients with the Straight-Through
    Estimator, the model parameters become robust to the hardware's lack of zero-point
    shifting.
  common_mistake: Designing asymmetric quantization, which the hardware may not natively
    support, requiring costly emulation of zero-point shifts.
  napkin_math: 26 TOPS INT8 capacity is fully utilized when zero-points equal 0.
