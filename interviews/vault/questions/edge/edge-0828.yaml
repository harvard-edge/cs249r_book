title: Edge Experience Replay Buffer Sizing
scenario: You are deploying continuous learning for an edge security camera on an NPU with 128MB of dedicated
  RAM for training buffers. The model fine-tunes on 224x224 RGB frames. To mitigate catastrophic forgetting,
  you must implement an experience replay buffer. Given that each raw float32 frame is approximately 602KB,
  calculate the maximum number of historical frames you can store in 64MB (leaving the rest for activations
  and weights), and determine the capacity impact of storing frames as heavily compressed JPEGs (average
  25KB per frame) instead.
details:
  realistic_solution: Store historical examples in a compressed format (like JPEG or INT8) in the replay
    buffer and decompress them on-the-fly during the training pass. This trades a small compute overhead
    for a vastly larger replay capacity.
  common_mistake: Candidates often assume historical frames must be stored in uncompressed float32 in
    memory, leading to an extremely small historical buffer that fails to adequately represent past data
    distributions.
  napkin_math: 'Allocated memory for replay: 64MB. Uncompressed FP32 frame: 224 * 224 * 3 * 4 bytes =
    602 KB. Capacity = 64MB / 602KB = ~106 frames. If we store as JPEG (compress 24x to ~25KB): Capacity
    = 64MB / 25KB = 2,560 frames. Decompressing JPEG to FP32 on the fly takes <1ms on Orin, well worth
    the 24x memory efficiency gain.'
