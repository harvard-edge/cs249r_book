title: Edge Experience Replay Buffer Sizing
scenario: An edge security camera fine-tunes a model on 224x224 RGB frames to mitigate catastrophic forgetting. The NPU has 128MB of RAM, leaving 64MB allocated for an experience replay buffer. Raw float32 frames are ~602KB each.
question: How many historical frames fit in the 64MB buffer as uncompressed FP32 versus heavily compressed 25KB JPEGs, and which format is structurally superior for this task?
details:
  realistic_solution: Store historical examples in a compressed format (like JPEG or INT8) in the replay
    buffer and decompress them on-the-fly during the training pass. This trades a small compute overhead
    for a vastly larger replay capacity.
  common_mistake: |
    **The Pitfall:** Storing historical frames as uncompressed float32.
    **The Rationale:** Developers assume training buffers must match the network's native input precision in RAM.
    **The Consequence:** The historical buffer is too small to adequately represent past data distributions, failing to prevent catastrophic forgetting.
  napkin_math: |
    1. **Available Memory**: 64MB.
    2. **Uncompressed FP32 Frame**: 224 * 224 * 3 channels * 4 bytes = 602 KB.
    3. **FP32 Capacity**: 64MB / 602KB = **~106 frames**.
    4. **Compressed JPEG Frame**: 25 KB.
    5. **JPEG Capacity**: 64MB / 25KB = **2,560 frames**.
    6. **Conclusion**: On-the-fly JPEG decompression (<1ms overhead) yields a **24x capacity increase**, making it vastly superior for experience replay.
