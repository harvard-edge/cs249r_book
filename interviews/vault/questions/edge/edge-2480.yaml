title: Wildlife Camera Energy Waste
scenario: A wildlife camera uses a Hailo-8 accelerator (2.5W active, 50mW idle) to
  process video. The camera captures and processes 1 second of video every minute.
question: Analyze the total energy consumption per hour and determine the percentage
  of energy wasted during the idle periods.
details:
  realistic_solution: Calculate active and idle time per hour. Active time is 60 seconds;
    idle time is 3540 seconds. Multiply each by their respective power to find energy
    in Joules. The idle energy constitutes a surprisingly large portion of the total
    budget.
  common_mistake: Assuming active power dominates the energy budget simply because
    2.5W is much larger than 50mW, ignoring the time-weighting.
  napkin_math: Active = 2.5W * 60s = 150J. Idle = 0.05W * 3540s = 177J. Idle waste
    = 177 / (150 + 177) = 54.1%.
