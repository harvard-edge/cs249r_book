title: A/B Partition OTA Power Throttling on AI 100
scenario: An on-premise edge server uses an AI accelerator for continuous video analytics. The system implements an A/B partition scheme for OTA firmware updates to ensure high availability. During the flash programming phase of a background OTA update, the system controller automatically throttles the INT8 inference throughput, even though the neural network weights are fully loaded in memory.
question: Why does the accelerator throttle INT8 inference during background OTA flash programming even though weights are already in memory?
details:
  realistic_solution: The throttling is a necessary power management tradeoff to stay within the strict 75W TDP limit. Writing to the secondary flash partition (Partition B) requires dedicated power for the flash controller and storage cells. To prevent exceeding the 75W envelope and triggering a system brownout, the power management IC dynamically downclocks the compute cores, sacrificing temporary inference throughput to safely accommodate the flash programming power spike.
  common_mistake: |
    **The Pitfall:** Incorrectly attributing throttling to memory or CPU bottlenecks.
    **The Rationale:** Candidates assume that since the weights are in RAM, the bottleneck must be PCIe bus contention or CPU overhead.
    **The Consequence:** They completely miss the physics of the system's strict power envelope, failing to recognize that flash programming competes directly with the accelerator's 75W budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TDP limit: 75W.
       - Compute power: 400 TOPS at 75W.
       - OTA flash programming spike: ~15W.
    2. **Calculations:**
       - Remaining Power Budget: 75W - 15W = 60W.
       - Throttled Performance: (60W / 75W) * 400 TOPS = 320 TOPS.
       - Performance Drop: 400 - 320 = 80 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound (TDP Cap)**. The system dynamically trades 80 TOPS of compute performance to carve out the 15W needed for flash programming, preventing a strict TDP violation.
