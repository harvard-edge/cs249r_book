title: A/B Partition OTA Power Throttling on AI 100
scenario: An on-premise edge server uses a Qualcomm Cloud AI 100 (75W TDP, 400 TOPS INT8, 32 GB LPDDR4x) for continuous video analytics. The system implements an A/B partition scheme for OTA firmware updates to ensure high availability. During the flash programming phase of a background OTA update, the system controller automatically throttles the INT8 inference throughput, even though the neural network weights are fully loaded in the 32 GB LPDDR4x memory.
question: Why does the Cloud AI 100 throttle INT8 inference during background OTA flash programming even though weights are already in LPDDR4x?
details:
  realistic_solution: The throttling is a necessary power management tradeoff to stay within the strict 75W TDP limit. Writing to the secondary flash partition (Partition B) requires dedicated power for the flash controller and storage cells. To prevent exceeding the 75W envelope and triggering a system brownout, the power management IC dynamically downclocks the compute cores, sacrificing temporary inference throughput to safely accommodate the flash programming power spike.
  common_mistake: |
    **The Pitfall:** Incorrectly attributing throttling to memory or CPU bottlenecks.
    **The Rationale:** Candidates assume that since the weights are in RAM, the bottleneck must be PCIe bus contention or CPU overhead.
    **The Consequence:** They completely miss the physics of the system's strict power envelope, failing to recognize that flash programming competes directly with the accelerator's 75W budget.
  napkin_math: |
    1. **Power Budget:** Maximum board power limit = 75W (capable of 400 TOPS).
    2. **OTA Overhead:** Background flash programming requires ~15W of peak power.
    3. **Remaining Compute Power:** `75W - 15W = 60W` available for the inference engine.
    4. **Throttled Performance:** Assuming linear scaling, `(60W / 75W) * 400 TOPS = 320 TOPS`.
    **The system safely trades 80 TOPS of performance to prevent a TDP violation during the 15W flash programming spike.**
