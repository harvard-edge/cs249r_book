title: Architecting a Real-Time Vision Pipeline on Jetson Orin
scenario: You are tasked with designing a real-time multi-camera perception system for an autonomous guided
  vehicle using an NVIDIA Jetson Orin. The system must process four 4K camera streams at 30 FPS, running
  object detection and semantic segmentation. Given the platform's 32 GB LPDDR5 memory, 275 TOPS INT8
  capability, 60W TDP, and the split between the Ampere GPU and DLA accelerators, how would you partition
  the compute workloads and manage memory to avoid bottlenecks while staying within power limits?
details:
  realistic_solution: The optimal design maps the dense, standard convolutions of the object detector
    to the DLA, freeing up the Ampere GPU's Tensor Cores and CUDA cores for the complex, non-standard
    operations of the segmentation model or post-processing. Memory traffic is minimized by utilizing
    zero-copy memory buffers, preventing unnecessary host-to-device copies, and ensuring memory accesses
    are coalesced for the Ampere architecture.
  common_mistake: Candidates often default to running all neural network inference on the Ampere GPU,
    ignoring the DLA (Deep Learning Accelerator), which leads to underutilization of the 275 TOPS and
    risks exceeding the 60W TDP. They also frequently overlook the memory bandwidth constraints of the
    shared 32 GB LPDDR5 when simultaneously capturing 4K video, running ISP, and performing GPU memory
    accesses.
  napkin_math: 'Raw input rate: 4 cameras * 3840 * 2160 pixels * 3 bytes * 30 FPS = ~2.98 GB/s. Assuming
    the combined models require roughly 0.5 TOPS per frame per camera, 4 streams at 30 FPS require 4 *
    30 * 0.5 = 60 TOPS of compute. This fits well within the 275 TOPS INT8 budget. By offloading 30 TOPS
    to the DLA, the Ampere GPU can run at a lower clock state, keeping total system power comfortably
    under the 60W TDP.'
