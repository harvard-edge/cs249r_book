title: Drift Detection I/O Bottleneck on Dataflow Edge
scenario: >-
  An edge inspection system uses a Hailo-8 accelerator running a 4 GOPS model. Input frames are 2MB each. To detect data drift via Population Stability Index (PSI) on the host CPU, the team modifies the graph to stream a 3MB intermediate INT8 feature map back to the host for every single frame. The host-accelerator interface has a maximum sustainable bandwidth of 1 GB/s (1000 MB/s). Upon deployment, the inference pipeline, which previously ran smoothly at 400 FPS, severely degrades and stabilizes at a maximum of 200 FPS.
question: Why does streaming a 3MB intermediate feature map to the host cap the Hailo-8 pipeline at 200 FPS despite low compute use?
details:
  realistic_solution: The performance collapse happens because the Hailo-8 is a dataflow accelerator with no local DRAM; it must stream all inputs and outputs over the host interface. By extracting a large intermediate feature map for drift detection, the system shifts from being compute-bound to completely I/O-bound. The 26 TOPS compute capacity is irrelevant because the accelerator is starved for data, waiting on the 1 GB/s interface to transfer the massive 3MB intermediate tensors.
  common_mistake: |
    **The Pitfall:** Assuming a compute bottleneck on the host CPU or accelerator.
    **The Rationale:** Candidates fixate on the PSI calculation overhead or misunderstand how dataflow accelerators lack local DRAM and manage memory.
    **The Consequence:** Attempting to optimize the CPU code or quantize further, ignoring the fundamental physical I/O limitation of streaming a 5MB payload over a 1 GB/s bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Interface bandwidth: 1000 MB/s (1 GB/s).
    - Original I/O: 2MB input per frame.
    - Modified I/O: 2MB input + 3MB output = 5MB per frame.

    **Calculations:**
    - Original I/O footprint at 400 FPS: 400 * 2MB = 800 MB/s (Fits in 1000 MB/s).
    - Modified maximum I/O frame rate: 1000 MB/s / 5 MB/frame = 200 FPS.

    **Conclusion & Interpretation:**
    - **Result: 200 FPS (I/O-Bound).** Extracting the 3MB tensor shifts the bottleneck entirely to the PCIe bus, capping throughput at exactly 200 FPS regardless of the available TOPS.
