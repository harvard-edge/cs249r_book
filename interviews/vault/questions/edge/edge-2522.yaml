title: UFS 4.0 Storage KV Offload
scenario: A mobile device offloads older KV cache blocks to UFS 4.0 storage (4 GB/s read). During generation, the NPU suddenly needs to attend to a 500 MB offloaded block.
question: Evaluate the pipeline stall time introduced by retrieving this offloaded context block.
details:
  realistic_solution: The generation loop must halt until the offloaded memory is retrieved from non-volatile storage into SRAM/LPDDR.
  common_mistake: |
    **The Pitfall:** Treating storage bandwidth like RAM.
    **The Rationale:** Failing to recognize that off-chip fetches cause blocking synchronous pipeline bubbles during auto-regressive attention.
    **The Consequence:** Severe, unexpected latency spikes that ruin the user experience.
  napkin_math: |
    - Storage read speed: 4 GB/s (4000 MB/s)
    - Block size: 500 MB
    - Stall time = 500 MB / 4000 MB/s = 0.125 seconds.
    **125 ms pipeline block.**
