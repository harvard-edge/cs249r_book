title: UFS 4.0 Storage KV Offload
scenario: A mobile device offloads older KV cache blocks to UFS 4.0 storage (4 GB/s
  read). During generation, the NPU suddenly needs to attend to a 500 MB offloaded
  block.
question: Evaluate the pipeline stall time introduced by retrieving this offloaded
  context block.
details:
  realistic_solution: The generation loop must halt until the offloaded memory is
    retrieved from non-volatile storage into SRAM/LPDDR. Fetching 500 MB at 4 GB/s
    takes 500 / 4000 = 125ms. This creates a hard 125ms synchronous stall in the token
    generation pipeline.
  common_mistake: Treating storage bandwidth like RAM and failing to recognize that
    off-chip fetches cause blocking synchronous pipeline bubbles during auto-regressive
    attention.
  napkin_math: 500 MB / 4000 MB/s = 0.125 seconds = 125 ms pipeline block.
