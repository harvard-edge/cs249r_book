title: Jetson Orin Carbon Footprint for Continuous Edge Inference Deployment
scenario: A smart city deploys 5,000 Jetson Orin NX modules for continuous pedestrian detection at intersections. Each module draws 25W average. The city's electricity grid has an intensity of 450 gCO2/kWh.
question: What is the annual carbon footprint of the 5,000-node edge fleet versus H100 cloud inference, and where is the carbon break-even?
details:
  realistic_solution: 'Edge fleet: 5,000 × 25W = 125 kW continuous. Annual: 125 kW × 8,760h = 1,095,000 kWh. Carbon: 1,095,000 × 0.450 = 492,750 kgCO2 = 493 tCO2/year. Cloud alternative: 5,000 cameras × ~30fps × 1 inference. H100 throughput for YOLO-v8n at batch 1 ≈ 2,000 fps. Need ceil(5,000 × 30 / 2,000) = 75 H100 GPUs. Power: 75 × 700W × 1.2 PUE = 63 kW. Plus network: 5,000 streams × 2 Mbps (compressed) = 10 Gbps, network infra power ≈ 15 kW. Total cloud: 78 kW. Annual: 78 × 8,760 = 683,280 kWh. If cloud at 120 gCO2/kWh (green grid): 82 tCO2. Edge 493 tCO2 vs cloud 82 tCO2—cloud is 6× lower carbon IF on green grid. On same grid (450g): cloud = 683,280 × 0.45 = 307 tCO2 vs edge 493 tCO2—cloud still 38% lower.'
  common_mistake: |
    **The Pitfall:** Ignoring network transmission carbon for cloud deployment.
    **The Rationale:** Analysts often compare edge device power directly to cloud server power, forgetting that sending thousands of continuous video streams requires substantial power for network infrastructure.
    **The Consequence:** Highly biased sustainability calculations that artificially favor cloud deployments over edge.
  napkin_math: |
    *   **Edge Power:** 5,000 units × 0.025 kW = 125 kW.
    *   **Edge Annual Energy:** 125 kW × 8,760h = 1,095,000 kWh.
    *   **Edge Carbon (450g):** 1,095,000 × 0.450 kg/kWh = 492,750 kgCO2.
    *   **Cloud GPUs needed:** ceil(5,000 cameras × 30fps / 2,000fps/H100) = 75 H100s.
    *   **Cloud Power:** 75 GPUs × 700W × 1.2 PUE = 63 kW + 15 kW (network) = 78 kW.
    *   **Cloud Annual Energy:** 78 kW × 8,760h = 683,280 kWh.
    *   **Cloud Carbon (same grid, 450g):** 683,280 × 0.450 kg/kWh = 307,476 kgCO2.
    *   **Cloud Carbon (green grid, 120g):** 683,280 × 0.120 kg/kWh = 81,993 kgCO2.
    *   **Break-even Grid Intensity for Cloud:** 492,750 kgCO2 / 683,280 kWh = **0.721 kgCO2/kWh (721 gCO2/kWh)**.
