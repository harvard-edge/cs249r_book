title: The Automotive Roofline Dilemma
scenario: You are the new Principal Engineer designing the perception compute module for a next-generation autonomous truck. The current system uses a power-hungry 150W automotive GPU. Your mandate is to drastically reduce cost and power for the new platform, targeting a total power budget of 45W and a 30 FPS processing rate for a challenging new multi-camera vision model.
question: Which compute architecture would you choose to meet 45W and 30 FPS for the memory-intensive vision model, and why isn't peak TOPS enough?
details:
  realistic_solution: The correct approach is to recognize that system performance is a function of both the hardware's capabilities and the workload's demands. A Vision Transformer, especially on high-resolution camera data, is fundamentally a memory-intensive architecture. The self-attention mechanism requires large matrix multiplications (Q, K, V) that often exceed on-chip cache, leading to significant memory traffic.
  common_mistake: |
    **The Pitfall:** Fixating on the 'peak TOPS' marketing number and ignoring memory bandwidth.
    **The Rationale:** Engineers assume a high TOPS chip must be better without calculating the Arithmetic Intensity (AI) of the workload.
    **The Consequence:** Selecting hardware with immense compute that stalls waiting for data (the 'Memory Wall'), completely failing to meet the 30 FPS latency deadline.
  napkin_math: |
    * Target ViT: 500 GOPs, 10 GB memory access/inference.
    * Hardware Bandwidth: 204.8 GB/s.
    * Reading 10 GB takes 10 GB / 204.8 GB/s = 48.8ms.
    * Without computing anything, **48.8ms already misses the 33ms (30 FPS) deadline.**
    * Compute time at 275 TOPS: 500G / 275T = 1.8ms.
    * Arithmetic Intensity is 500G / 10GB = 50 Ops/Byte, well below the Orin's 1342 ridge point.
    * **The model is entirely memory-bound and cannot achieve 30 FPS without architectural changes like caching activations in SRAM.**
