title: The Automotive Roofline Dilemma
scenario: You are the new Principal Engineer designing the perception compute module for a next-generation
  autonomous truck. The current system uses a power-hungry 150W automotive GPU. Your mandate is to drastically
  reduce cost and power for the new platform, targeting a total power budget of 45W and a 30 FPS processing
  rate for a challenging new multi-camera vision model.
question: "Which compute architecture would you choose to meet 45W and 30 FPS for the memory-intensive vision model, and why isn't peak TOPS enough?"
details:
  realistic_solution: The correct approach is to recognize that system performance is a function of both
    the hardware's capabilities and the workload's demands. A Vision Transformer, especially on high-resolution
    camera data, is fundamentally a memory-intensive architecture. The self-attention mechanism requires
    large matrix multiplications (Q, K, V) that often exceed on-chip cache, leading to significant memory
    traffic.
  common_mistake: Engineers often fixate on the 'peak TOPS' marketing number. They assume the 275 TOPS
    'Big Core' chip must be better than the 26 TOPS 'Heterogeneous' chip. This ignores the reality that
    performance is dictated by the *lesser* of compute or memory bandwidth. A chip with immense compute
    is useless if it's constantly stalled waiting for data from slow memory (the 'Memory Wall'). This
    also ignores the critical TOPS/W metric, especially in a power-constrained environment like a vehicle.
  napkin_math: 'Target: ViT with 500 GOPs, 10 GB memory access/inference. Orin provides 204.8 GB/s. Reading
    10 GB alone takes 10GB / 204.8 GB/s = 48.8ms. We already miss the 30 FPS (33ms) deadline without even
    computing! Compute at 275 TOPS takes 500G / 275T = 1.8ms. The AI is 500G / 10GB = 50 Ops/Byte, far
    below Orin''s 1342 ridge point. To fix this, cache activations in SRAM or use a CNN with higher AI.'
