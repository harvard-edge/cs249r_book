title: The PoE Voltage Drop Mystery
scenario: 'Your NXP i.MX 8M Plus edge AI cameras are powered via Power-over-Ethernet (PoE, IEEE 802.3af
  — 15.4W max). In the lab with a 2-meter cable, everything works: the camera runs inference at 12W total
  system power. In the field, cameras on 80-meter cable runs intermittently reboot during inference. Cameras
  on 30-meter runs work fine. The PoE switch provides 15.4W per port. What''s happening at 80 meters?'
details:
  realistic_solution: 'PoE delivers power over the same Cat5e/Cat6 cable that carries data. The cable
    has finite resistance: Cat5e is ~9.38 Ω/100m per conductor (AWG 24). PoE uses 2 pairs (4 conductors,
    2 for positive, 2 for return). Effective resistance for an 80m run: 9.38 × 0.8 = 7.5 Ω per conductor.
    With 2 conductors in parallel per polarity: 7.5 / 2 = 3.75 Ω per polarity. Total loop resistance:
    3.75 × 2 = 7.5 Ω.'
  common_mistake: '"80 meters is within the 100-meter Ethernet spec, so it should work." The 100-meter
    spec is for data integrity, not power delivery. Power has different constraints.'
  napkin_math: 'Cat5e resistance: 9.38 Ω/100m. At 80m, loop resistance: 7.5Ω. Steady-state: 12W → 0.277A
    → 2.08V drop → 45.9V at device ✓. Peak burst: 18W → 0.417A → 3.13V drop → 44.9V (steady state OK).
    Cable inductance: 42μH. With 100μF PD capacitance, current step dI/dt through inductance: V = L ×
    dI/dt. If current rises in 1μs: V = 42μH × 0.14A / 1μs = 5.9V spike. Device sees 48 - 3.13 - 5.9 =
    38.97V → borderline UVLO at 37V. With 1000μF cap: dI/dt slows to ~10μs → spike = 0.59V → safe at 44.3V.'
