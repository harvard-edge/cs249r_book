title: 'The PoE Voltage Drop Mystery'
scenario: 'Your edge AI cameras are powered via Power-over-Ethernet (PoE, IEEE 802.3af — 15.4W max). In the lab with a 2-meter cable, everything works: the camera runs inference at 12W total system power. In the field, cameras on 80-meter cable runs intermittently reboot during inference. Cameras on 30-meter runs work fine. The PoE switch provides 48V (15.4W per port).'
question: 'What is causing the cameras on 80-meter cables to intermittently reboot during inference?'
details:
  realistic_solution: |
    PoE delivers power over the same Cat5e/Cat6 cable that carries data. The cable has finite resistance: Cat5e is ~9.38 Ω/100m per conductor (AWG 24). PoE uses 2 pairs (4 conductors, 2 for positive, 2 for return). Effective resistance for an 80m run: 9.38 * 0.8 = 7.5 Ω per conductor. With 2 conductors in parallel per polarity: 7.5 / 2 = 3.75 Ω per polarity. Total loop resistance: 3.75 * 2 = 7.5 Ω. Transient bursts during inference exceed Under-Voltage Lockout (UVLO) limits.
  common_mistake: |
    **The Pitfall:** Stating that 80 meters is within the 100-meter Ethernet spec, so it should work perfectly.
    **The Rationale:** Candidates confuse the 100-meter specification for data integrity with the constraints for power delivery, ignoring the voltage drop caused by the cable's physical resistance.
    **The Consequence:** The camera experiences borderline Under-Voltage Lockout (UVLO) during power spikes, leading to intermittent reboots in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - PoE spec: 48V source.
    - Cable spec: Cat5e at ~9.38 Ω/100m resistance.
    - Power draw: 12W steady, 18W peak burst.

    **Calculations:**
    - Cat5e resistance: 9.38 Ω/100m. At 80m, resistance is 7.5 Ω per conductor.
    - Using 2 pairs for PoE, the effective loop resistance is 7.5 Ω.
    - Steady-state (12W): Current I ~ 0.26A. Voltage drop = 0.26A * 7.5 Ω = 1.95V. Device receives 48V - 1.95V = 46.05V (Safe).
    - Peak burst (18W): Current I ~ 0.40A. Voltage drop = 0.40A * 7.5 Ω = 3.0V. Device receives 45V.
    - Transient current steps (e.g., dI/dt of 0.14A in 1μs) across the cable's 42μH inductance cause a V = L(dI/dt) = 5.9V spike.

    **Conclusion & Interpretation:**
    - **Result: 39.1V (Power-Bound / Voltage Drop)**. The device sees 45V - 5.9V = 39.1V during transient bursts, approaching the 37V UVLO threshold and causing reboots.
