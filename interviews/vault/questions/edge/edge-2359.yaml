title: AGX Orin LPDDR5 Effective Bandwidth
scenario: A developer runs a theoretical benchmark on the Jetson AGX Orin's LPDDR5 and observes 160 GB/s for contiguous matrix reads, but only 30 GB/s for random gather operations.
question: State why practical bandwidth utilization collapses under random memory access compared to contiguous streaming.
visual:
  kind: svg
  path: edge-2359.svg
  alt: Bar chart comparing sequential 160 GB/s against random access 30 GB/s with a red dashed line at peak 204.8 GB/s.
  caption: Effective Bandwidth vs Access Pattern.
details:
  realistic_solution: |
    Peak theoretical bandwidth assumes continuous, sequential bursts that maximize DRAM page hit rates. Random access patterns cause continuous DRAM page misses and precharge penalties, destroying spatial locality and dropping effective bandwidth to a small fraction of the peak.
  common_mistake: |
    **The Pitfall:** Assuming algorithmic memory traffic always achieves the advertised theoretical peak bandwidth.
    **The Rationale:** Treating RAM purely as a fast lookup table without understanding physical DRAM pages and precharge penalties.
    **The Consequence:** Severely underestimating memory-bound latency for models with heavy scatter/gather or non-contiguous access patterns.
  napkin_math: |
    - **Peak Sequential Bandwidth:** 204.8 GB/s.
    - **Observed Random Bandwidth:** 30 GB/s.
    - **Efficiency Loss:** 30 / 204.8 = **~14.6%** utilization of peak capacity.
