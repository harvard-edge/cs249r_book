title: AGX Orin LPDDR5 Effective Bandwidth
scenario: A developer runs a theoretical benchmark on the Jetson AGX Orin's LPDDR5
  and observes 160 GB/s for contiguous matrix reads, but only 30 GB/s for random gather
  operations.
question: State why practical bandwidth utilization collapses under random memory
  access compared to contiguous streaming.
visual:
  kind: svg
  path: edge-2359.svg
  alt: Bar chart comparing sequential 160 GB/s against random access 30 GB/s with
    a red dashed line at peak 204.8 GB/s.
  caption: Effective Bandwidth vs Access Pattern.
details:
  realistic_solution: Peak theoretical bandwidth (204.8 GB/s) assumes continuous,
    sequential bursts that maximize DRAM page hit rates. Random access patterns cause
    continuous DRAM page misses and precharge penalties, destroying spatial locality
    and dropping effective bandwidth to a small fraction of the peak.
  common_mistake: Assuming algorithmic memory traffic always achieves the advertised
    theoretical peak bandwidth of the hardware.
  napkin_math: Random access efficiency = 30 / 204.8 ≈ 14.6%.
