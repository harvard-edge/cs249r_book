title: TensorRT DLA to GPU Fallback Optimization
scenario: 'We are deploying a real-time object detection model converted from ONNX to TensorRT on an NVIDIA Jetson Orin. The goal is to run inference entirely on the DLA accelerator to save the Ampere GPU for concurrent tracking algorithms. However, profiling shows unexpected latency spikes, and it appears certain layers are falling back to the GPU.'
question: How do you diagnose the operator coverage gap causing this fallback and quantify the performance cost?
details:
  realistic_solution: 'Use the TensorRT `trtexec` tool with detailed profiling to identify the specific ONNX operators unsupported by the DLA (e.g., specific padding types or non-standard activations). Once identified, modify the original model architecture to substitute these with DLA-supported equivalents before re-exporting to ONNX. This ensures the entire graph is compiled for the DLA, eliminating the fallback overhead and freeing the Ampere GPU.'
  common_mistake: |
    **The Pitfall:** Treating the platform's TOPS as a single uniform compute pool.
    **The Rationale:** Candidates often suggest simply applying INT8 quantization without diagnosing the actual bottleneck.
    **The Consequence:** They fail to realize that falling back from DLA to GPU introduces massive memory transfer and context-switching overhead, stalling the pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:** LPDDR5 bandwidth is ~205 GB/s. Intermediate feature map is 128 channels at 256x256 (approx 8.4MB). GPU context switch adds ~0.5ms.
    2. **Calculations:** Transfer time = 8.4 MB / 205 GB/s = ~0.04ms. Two transfers (DLA->GPU->DLA) + 2 context switches = 2*(0.04) + 2*(0.5) = 1.08ms overhead. Latency budget = 10ms (100 FPS).
    3. **Conclusion & Interpretation:** **A single unsupported operator consumes over 10% of the 10ms latency budget. Result: Host-Fallback-Bound.**
