title: Optimizing Sensor Data Storage on NVIDIA Jetson Orin for Edge ML
scenario: You are deploying an ML system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) that
  continuously collects high-frequency sensor data. This data, consisting of 10 float32 features and a
  timestamp per record, must be stored locally on a 64 GB eMMC before being periodically uploaded. The
  primary use cases are real-time inference (reading recent data) and batch analytics (reading specific
  features over longer periods). You need to select an optimal storage format (e.g., Parquet, TFRecord)
  and compression strategy to maximize the amount of historical data stored while minimizing read/write
  latency on the device's limited resources. Quantify the storage efficiency improvement and estimate
  how many days of data can be stored locally under your chosen solution.
question: "Which storage format and compression would you choose on Jetson Orin, and how many days of 10-feature float32 sensor records fit in 64 GB?"
details:
  realistic_solution: Analyze the data access patterns. For mixed workloads with selective column reads
    (analytics) and full-record reads (inference prep), a columnar format like Parquet often offers superior
    efficiency. Employ a compression codec (e.g., Snappy or LZ4) that balances compression ratio with
    decompression speed, crucial for the Jetson Orin's embedded CPU. Implement a data retention policy
    with tiered storage if external, slower storage is available, moving older, less frequently accessed
    data to more compressed or cheaper tiers.
  common_mistake: Neglecting to consider the specific read patterns on an edge device. For example, using
    a row-oriented format like TFRecord when most queries only access a small subset of columns for analytics
    can lead to inefficient I/O and wasted decompression cycles, especially if the device is CPU-bound
    or power-limited.
  napkin_math: Given 10 float32 features + 1 timestamp (8 bytes) per record = 10*4 + 8 = 48 bytes/record
    uncompressed. If we assume a 5x compression ratio with Parquet for float data, each record consumes
    ~9.6 bytes. With a 64 GB (64 * 1024^3 bytes) storage, the device can store approximately (64 * 1024^3)
    / 9.6 records. If data comes in at 1000 records/second, this translates to (64 * 1024^3 / 9.6) / (1000
    records/s * 3600 s/hr * 24 hr/day) = ~62 days of data.
