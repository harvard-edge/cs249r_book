title: Architecting a Multi-Camera Perception System for Jetson Orin
scenario: You are tasked with designing the perception architecture for an autonomous delivery robot using an NVIDIA Jetson Orin. The system must process six high-resolution 4K camera streams at 30 FPS simultaneously for real-time object detection and segmentation.
question: What CNN architecture and GPU/DLA mapping would you use for six 4K 30 FPS streams on Jetson Orin without becoming memory-bound?
details:
  realistic_solution: Design a hybrid architecture balancing FLOPs and memory bandwidth. Map memory-bound depthwise operations to the DLA where possible, while keeping compute-heavy 1x1 point-wise convolutions on the Ampere GPU. Standard convolutions are needed early on because pure depthwise layers lack the arithmetic intensity to prevent stalling the LPDDR5 interface.
  common_mistake: |
    **The Pitfall:** Proposing a standard MobileNet architecture purely to minimize FLOPs.
    **The Rationale:** Candidates fail to realize that depthwise separable convolutions have extremely low arithmetic intensity and severely underutilize the Ampere GPU and DLA.
    **The Consequence:** The system becomes memory-bound on the LPDDR5 bandwidth rather than compute-bound, failing to reach the required FPS.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Limit: LPDDR5 provides ~204 GB/s bandwidth
       - Load: 6 cameras * 30 FPS = 180 frames/sec
       - Depthwise Conv AI = ~1 MAC/byte
    2. **Calculations:**
       - To reach even 50 TOPS on pure depthwise: 50e12 MACs / 1 MAC/byte = 50 TB/s
       - 50 TB/s vastly exceeds the 204 GB/s available limit
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Must use standard or grouped convolutions (AI > 50 MAC/byte) in early layers to avoid the memory wall.
