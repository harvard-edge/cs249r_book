title: Evaluating Active Learning for Cloud AI 100
scenario: Your team is deploying a computer vision model for manufacturing defect detection on on-premise Qualcomm Cloud AI 100 accelerators. To improve the model's performance on rare defects without exceeding the annotation budget, you must design an active learning pipeline. Strategy A uses a massive FP32 proxy model in the cloud to calculate entropy and select uncertain samples. Strategy B runs the production INT8 quantized model directly on the Cloud AI 100 to score and select samples.
question: Which strategy do you choose, and how do you justify the tradeoff between selection quality and operational feasibility?
details:
  realistic_solution: The better approach is Strategy B. Active learning must target the specific failure modes of the production model. Running the INT8 model on the Qualcomm Cloud AI 100 ensures the uncertainty scores capture quantization artifacts and actual deployment behavior. The hardware's high throughput is more than sufficient for offline batch scoring.
  common_mistake: |
    **The Pitfall:** Choosing Strategy A because a larger FP32 model seems like it would provide better uncertainty estimates.
    **The Rationale:** Candidates assume higher precision models are always better for active learning scoring.
    **The Consequence:** They fail to target the specific quantization artifacts and failure modes of the actual INT8 production model, selecting suboptimal data.
  napkin_math: |
    1. Unlabeled pool: 5M images.
    2. Cloud AI 100 throughput (ResNet-50 INT8): ~2,500 FPS.
    3. Total scoring time: 5,000,000 images / 2,500 FPS = 2,000 seconds.
    4. Conclusion: Scoring takes only **~33 minutes**, making on-device scoring computationally trivial.
