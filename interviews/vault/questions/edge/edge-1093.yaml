title: 'Model Size Estimation: Realize Memory Layout for CV Pipeline on Jetson Orin'
scenario: 'Size the complete LPDDR5 memory layout for a computer vision pipeline on
  Jetson Orin (32GB LPDDR5, 204 GB/s). Pipeline: 4K camera (MIPI CSI-2) → ISP → 3
  concurrent models (object detection 50MB INT8 TRT, segmentation 80MB FP16 TRT, classification
  20MB INT8 TRT) → H.265 encoder → RTSP stream. Account for camera frame buffers,
  model working memory, and OS.'
question: What LPDDR5 memory budget should you allocate for this 4K camera, 3-model,
  H.265 pipeline on the 32GB Jetson Orin?
details:
  realistic_solution: 'OS + JetPack: 3GB. Camera ISP buffers (4K NV12 triple-buffer):
    3×4096×2160×1.5B=39.8MB. H.265 encoder buffer: 1×4096×2160×1.5B=13.3MB. Object
    detection (50MB TRT + 200MB activation): 250MB. Segmentation (80MB TRT FP16 +
    300MB activation): 380MB. Classification (20MB TRT + 50MB activation): 70MB. CUDA
    context: 500MB. Total: 3000+40+13+250+380+70+500=4,253MB ≈ 4.15GB of 32GB = 13%.
    Enormous headroom.'
  common_mistake: 'Forgetting camera frame buffers: 4K at 30fps requires triple buffering:
    3×4096×2160×3 bytes = 79.6MB for RGB or 53MB for NV12 (YUV420) — significant but
    manageable.'
  napkin_math: '4K NV12: 4096×2160×1.5=13.3MB per frame. Triple buffer: 39.8MB. H.265:
    13.3MB. Models: 50+80+20=150MB TRT engines. Activations: 200+300+50=550MB. OS:
    3000MB. CUDA: 500MB. Total: 4,253MB. 32GB - 4.3GB = 27.7GB available for additional
    workloads or camera buffer expansion.'
