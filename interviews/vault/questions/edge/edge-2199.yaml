title: Edge Accelerator Selection Spec
scenario: Selecting an edge accelerator based on vendor TOPS numbers.
question: What benchmark and hardware data are required before selecting an edge accelerator based on vendor TOPS numbers?
details:
  realistic_solution: Require sustained throughput on actual models, memory bandwidth, supported operators, thermal throttling behavior, compiler maturity, and fallback cost for unsupported ops. TOPS alone is not a selection criterion.
  common_mistake: |
    **The Pitfall:** Treating vendor TOPS as directly comparable without checking operator coverage and sustained power.
    **The Rationale:** Vendors heavily market peak theoretical TOPS as a single figure of merit.
    **The Consequence:** Selecting an accelerator that looks good on paper but forces critical operations to fall back to the CPU, destroying latency.
  napkin_math: |
    1. **Assumptions & Constraints:** Accelerator A = 40 TOPS (20% fallback). Accelerator B = 20 TOPS (0% fallback). CPU is 10x slower.
    2. **Calculations:** Amdahl's Law for A = 1 / (0.2 + 0.8/40) = 4.5x speedup. Amdahl's Law for B = 1 / (0 + 1.0/20) = 20x speedup.
    3. **Conclusion & Interpretation:** **Result: 20 TOPS chip is 4.4x faster end-to-end.** Vendor TOPS are irrelevant if critical operators fall back to the host CPU. **System Status: Operator-Support-Bound.**
