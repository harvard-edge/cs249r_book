title: Edge Accelerator Selection Spec
scenario: You must choose an accelerator for an edge gateway that runs object detection, re-identification, and occasional local fine-tuning. Vendors provide TOPS numbers but little else.
question: What benchmark and hardware data are required before selecting an edge accelerator based on vendor TOPS numbers?
details:
  realistic_solution: Require sustained throughput on the actual models, memory capacity, memory bandwidth, supported operators, quantization formats, batch-1 latency, power at sustained load, thermal throttling behavior, compiler maturity, and fallback cost for unsupported ops. TOPS alone is not a selection criterion.
  common_mistake: |
    **The Pitfall:** Treating vendor TOPS as directly comparable without checking operator coverage, memory, and sustained power.
    **The Rationale:** Vendors heavily market peak theoretical TOPS as a single figure of merit, making it an easy trap for engineers evaluating hardware.
    **The Consequence:** Selecting an accelerator that looks good on paper but forces critical operations to fall back to the CPU, destroying latency and throughput.
  napkin_math: |
    1. **Scenario:** Accelerator A has 40 TOPS but falls back 20% of operators to a slow CPU. Accelerator B has 20 TOPS but full delegation.
    2. **Amdahl's Law Impact:** If 20% of a workload runs on a CPU that is 10x slower than the accelerator, overall speedup is capped at 5x regardless of the 40 TOPS peak.
    3. **Result:** The **20 TOPS accelerator** will outperform the 40 TOPS accelerator in end-to-end latency.
