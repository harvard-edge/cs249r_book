title: MobileNet vs VGG NPU Bottleneck
scenario: You are porting an image classifier to an Edge NPU with 2 TOPS (INT8) peak compute and 4 GB/s memory bandwidth. A custom VGG-like model has 8 GOPS and requires 12MB of memory traffic per inference. MobileNetV2 has only 0.6 GOPS but requires 30MB of memory traffic due to unfused depthwise layers. Surprisingly, MobileNetV2 yields 133 FPS, while the larger VGG model yields 250 FPS.
question: Which model should you choose to meet 200+ FPS on the 2 TOPS, 4 GB/s NPU, and why?
details:
  realistic_solution: The NPU performance is strictly governed by the Roofline model. The NPU's ridge point (the Arithmetic Intensity where compute-bound meets memory-bound) is 500 OPS/Byte. MobileNetV2 relies heavily on depthwise separable convolutions which lack data reuse, giving it a very low arithmetic intensity that makes it severely memory-bound. VGG uses dense convolutions with high data reuse, pushing its AI well above the ridge point, thus achieving near-peak TOPS. To get 200+ FPS, you must choose the VGG model, or heavily optimize MobileNet's memory bandwidth by fusing depthwise and pointwise layers to shift its Arithmetic Intensity to the right on the Roofline plot.
  common_mistake: |
    **The Pitfall:** Assuming fewer MACs/GOPS always means faster inference.
    **The Rationale:** Candidates see that MobileNet has >10x fewer GOPS than VGG and incorrectly assume it will run faster, ignoring the Roofline model and memory bandwidth bottlenecks.
    **The Consequence:** Trying to prune MobileNet further to improve FPS, which fails because the model is entirely memory-bound.
  napkin_math: |
    * **NPU Ridge Point:** 2,000 GOPS / 4 GB/s = 500 OPS/Byte
    * **MobileNet AI:** 0.6 GOPS / 30MB = 20 OPS/Byte (Severely Memory Bound)
    * **MobileNet Inference Time:** 30MB / 4 GB/s = 7.5ms (133 FPS)
    * **VGG AI:** 8 GOPS / 12MB = 666 OPS/Byte (Compute Bound)
    * **VGG Inference Time:** 8 GOPS / 2000 GOPS = 4.0ms (**250 FPS**)
    * **Conclusion:** VGG meets the 200 FPS requirement because its high Arithmetic Intensity better utilizes the NPU.
