title: MobileNet vs VGG NPU Bottleneck
scenario: You are porting an image classifier to an Edge NPU with 2 TOPS (INT8) peak compute and 4 GB/s
  memory bandwidth. A custom VGG-like model has 8 GOPS and requires 12MB of memory traffic per inference.
  MobileNetV2 has only 0.6 GOPS but requires 30MB of memory traffic due to unfused depthwise layers. Surprisingly,
  MobileNetV2 yields 133 FPS, while the larger VGG model yields 250 FPS. Optimize the model choice to
  achieve a strict 200+ FPS requirement.
details:
  realistic_solution: The NPU performance is strictly governed by the Roofline model. The NPU's ridge
    point (the Arithmetic Intensity where compute-bound meets memory-bound) is 500 OPS/Byte. MobileNetV2
    relies heavily on depthwise separable convolutions which lack data reuse, giving it a very low arithmetic
    intensity that makes it severely memory-bound. VGG uses dense convolutions with high data reuse, pushing
    its AI well above the ridge point, thus achieving near-peak TOPS. To get 200+ FPS, you must choose
    the VGG model, or heavily optimize MobileNet's memory bandwidth by fusing depthwise and pointwise
    layers to shift its Arithmetic Intensity to the right on the Roofline plot.
  common_mistake: Assuming fewer MACs always means faster inference, and trying to prune MobileNet further
    to improve FPS.
  napkin_math: 'NPU Ridge Point: (2 * 10^12 OPS) / (4 * 10^9 B/s) = 500 OPS/B.

    MobileNet AI: 0.6 GOPS / 30MB = 20 OPS/B (Memory Bound). Inference time = 30MB / 4 GB/s = 7.5ms (133
    FPS).

    VGG AI: 8 GOPS / 12MB = 666 OPS/B (Compute Bound). Inference time = 8 GOPS / 2 TOPS = 4.0ms (250 FPS).

    VGG easily meets the 200 FPS (5ms) requirement.'
