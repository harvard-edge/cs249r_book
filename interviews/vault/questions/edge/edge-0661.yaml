title: The MMIO Sensor Bottleneck
scenario: Your edge AI system reads data from 8 environmental sensors via I2C at 400 kHz. Your sensor fusion model expects 100 Hz input data (10ms intervals), but the I2C bus overhead limits you to 60 Hz.
question: How does the I2C sensor polling rate limit the ML model's input freshness, and why does this bus bottleneck cause the model's accuracy to drop despite the GPU running at full speed?
details:
  realistic_solution: The model's accuracy drops because it is receiving stale, temporally smeared features. The GPU is perfectly capable of running the sensor fusion model at 100 Hz, but the I2C bus acts as a severe bottleneck. I2C requires addressing the device, sending a register address, waiting for the sensor to convert, and reading the bytes back — all sequentially. If reading 8 sensors takes 16ms, the first sensor's data is 16ms older than the last sensor's data by the time the tensor is formed. The ML model was likely trained on perfectly synchronized, instantaneous snapshots of the environment. In production, it receives a "smeared" snapshot, destroying the temporal correlations between sensors that the model relies on. The fix is to decouple the sensor reads from the CPU/GPU using a dedicated microcontroller (or PRU/sensor hub) that reads the sensors concurrently via SPI or parallel I2C buses, buffers them, and DMA-transfers a perfectly coherent snapshot to the ML model's input tensor memory at exactly 100 Hz.
  common_mistake: |
    **The Pitfall:** Recommending a faster I2C clock (e.g., 1 MHz Fast-mode Plus) as the primary solution.
    **The Rationale:** Candidates focus on raw bit rate without understanding the serial nature and protocol overhead of the I2C bus.
    **The Consequence:** Even at 1 MHz, the sequential polling of 8 sensors still results in temporally smeared data, failing to resolve the fundamental data freshness issue.
  napkin_math: |
    * I2C at 400 kHz = ~40 KB/s raw bit rate.
    * Protocol overhead (start, address, ack, stop) means an 8-byte read takes ~30 bytes on the wire.
    * 1 sensor read = 240 bits / 400,000 bits/sec = 0.6 ms.
    * 8 sensors sequentially = 8 × 0.6 ms = 4.8 ms in pure bus time.
    * Add OS context switching (~1.4 ms per read): 8 × 1.4 ms = 11.2 ms. Total = 4.8 + 11.2 = 16 ms.
    * **The sequential 16 ms read time exceeds the model's 10 ms update rate, forcing it to consume stale, "smeared" features.**
