title: The MMIO Sensor Bottleneck
scenario: Your edge AI system reads data from 8 environmental sensors via I2C at 400 kHz. Your sensor
  fusion model expects 100 Hz input data (10ms intervals), but the I2C bus overhead limits you to 60 Hz.
  How does the I2C sensor polling rate limit the ML model's input freshness, and why does this bus bottleneck
  cause the model's accuracy to drop despite the GPU running at full speed?
details:
  realistic_solution: The model's accuracy drops because it is receiving stale, temporally smeared features.
    The GPU is perfectly capable of running the sensor fusion model at 100 Hz, but the I2C bus acts as
    a severe bottleneck. I2C requires addressing the device, sending a register address, waiting for the
    sensor to convert, and reading the bytes back — all sequentially. If reading 8 sensors takes 16ms,
    the first sensor's data is 16ms older than the last sensor's data by the time the tensor is formed.
    The ML model was likely trained on perfectly synchronized, instantaneous snapshots of the environment.
    In production, it receives a "smeared" snapshot, destroying the temporal correlations between sensors
    that the model relies on. The fix is to decouple the sensor reads from the CPU/GPU using a dedicated
    microcontroller (or PRU/sensor hub) that reads the sensors concurrently via SPI or parallel I2C buses,
    buffers them, and DMA-transfers a perfectly coherent snapshot to the ML model's input tensor memory
    at exactly 100 Hz.
  common_mistake: '"Use a faster I2C clock (1 MHz Fast-mode Plus)." Even at 1 MHz, the fundamental protocol
    overhead remains — I2C is a serial bus with per-byte acknowledgment.'
  napkin_math: 'I2C at 400 kHz = ~40 KB/s raw bit rate. But protocol overhead (start, address, ack, stop)
    means an 8-byte sensor read takes ~30 bytes on the wire. $30 \times 8 \text{ bits} / 400,000 = 0.6\text{ms}$
    per sensor. For 8 sensors sequentially: $8 \times 0.6\text{ms} = 4.8\text{ms}$ just in bus time. Add
    OS context switching and driver overhead (~1.4ms per read), and you hit ~16ms total. The model expects
    a 10ms update rate but the data takes 16ms to collect. The ML pipeline is starved by the physical
    bus architecture.'
