title: Hailo-8 INT8 Energy Per Operation Math
scenario: You are evaluating a Hailo-8 accelerator for a smart camera deployment. The Hailo-8 provides
  26 TOPS of INT8 compute at a typical power draw of 2.5W, utilizing a dataflow architecture that streams
  directly from host memory rather than relying on local DRAM. Calculate the average energy per INT8 operation
  at peak utilization, and compare it to the theoretical baseline energy of an INT8 MAC.
question: "What is the average energy per INT8 operation at 26 TOPS and 2.5W, and how does it compare with an INT8 MAC baseline?"
details:
  realistic_solution: To find the energy per operation, divide the total power consumption by the total
    operations per second. Because the Hailo-8 uses a dataflow architecture and lacks local DRAM, the
    2.5W heavily reflects internal compute and SRAM routing rather than expensive external DRAM fetches.
    Calculating this yields a per-MAC energy that can be compared against standard baselines like the
    Horowitz table.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with MACs, forgetting that
    one MAC equals two operations. They also frequently struggle with unit conversions, failing to translate
    Watts and Tera-ops into picojoules (pJ) or femtojoules (fJ).
  napkin_math: '1. Power = 2.5 Joules/second (W).

    2. Peak throughput = 26 x 10^12 ops/sec (TOPS).

    3. Energy/op = 2.5 / 26e12 = ~0.096e-12 Joules = ~96 femtojoules (fJ).

    4. 1 MAC = 2 ops, so Energy/MAC = ~192 fJ (~0.2 pJ).

    5. This ~0.2 pJ/MAC system-level efficiency closely matches the theoretical bare-metal Horowitz estimate
    for an INT8 MAC, demonstrating the minimal overhead of the dataflow architecture.'
