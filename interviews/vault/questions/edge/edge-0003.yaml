title: The Sensor Bandwidth Limit
scenario: You're designing the input stage for a perception system on a Jetson AGX Orin. A high-resolution
  camera is connected via a standard 4-lane MIPI CSI-2 interface. To assess potential data bottlenecks,
  you need to know the physical limits. What is the approximate maximum data rate you can expect to transfer
  from this single camera interface into the SoC?
question: "What is the approximate maximum data rate you can expect to transfer from this single camera interface into the SoC?"
details:
  realistic_solution: The maximum data rate for a standard 4-lane MIPI CSI-2 interface, which is the common
    standard for connecting cameras in edge and mobile systems, is approximately 2.5 GB/s. This is a fundamental
    physical limit of the serial interface itself and is a critical number for designing any high-throughput
    vision pipeline.
  common_mistake: Engineers unfamiliar with edge hardware often confuse sensor interface bandwidth with
    the main system memory bandwidth. They might recall the much larger 204.8 GB/s LPDDR5 bandwidth of
    the Orin SoC and incorrectly assume the camera can stream data that fast. Another common error is
    to conflate it with general-purpose interconnects like PCIe or Ethernet, which have very different
    specifications.
  napkin_math: A modern 12-megapixel automotive camera sensor might produce ~24 MB of raw Bayer data per
    frame. At a 2.5 GB/s (2500 MB/s) bandwidth limit, the theoretical maximum frame rate from the sensor
    is 2500 MB/s / 24 MB/frame ≈ 104 FPS. This shows the MIPI interface is often the first bottleneck
    in a high-speed camera pipeline, dictating the maximum frame rate you can process at full resolution.
  options:
  - ~205 GB/s
  - ~50 GB/s
  - ~2.5 GB/s
  - ~125 MB/s
  correct_index: 2
