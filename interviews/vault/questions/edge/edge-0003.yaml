title: The Sensor Bandwidth Limit
scenario: You're designing the input stage for a perception system on a Jetson AGX Orin. A high-resolution camera is connected via a standard 4-lane MIPI CSI-2 interface. To assess potential data bottlenecks, you need to know the physical limits.
question: What is the approximate maximum data rate you can expect to transfer from a standard 4-lane MIPI CSI-2 interface into the SoC?
details:
  realistic_solution: The maximum data rate for a standard 4-lane MIPI CSI-2 interface, which is the common standard for connecting cameras in edge and mobile systems, is approximately 2.5 GB/s. This is a fundamental physical limit of the serial interface itself and is a critical number for designing any high-throughput vision pipeline.
  common_mistake: |
    **The Pitfall:** Conflating sensor interface bandwidth with system memory bandwidth.
    **The Rationale:** Engineers confuse camera interface limits with the main system memory bandwidth (e.g., LPDDR5) or PCIe specs.
    **The Consequence:** Designing perception pipelines that assume impossibly high frame rates, only to hit a hard physical bottleneck in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw Bayer data (12MP camera): ~24 MB per frame.
       - MIPI CSI-2 (4-lane) Bandwidth Limit: 2.5 GB/s (2500 MB/s).
    2. **Calculations:**
       - Theoretical Max Frame Rate: 2500 MB/s / 24 MB/frame ≈ 104 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Interface-Bound.** The MIPI CSI-2 interface imposes a hard 2.5 GB/s physical limit, bottlenecking raw ingestion regardless of SoC capabilities.
  options:
  - ~205 GB/s
  - ~50 GB/s
  - ~2.5 GB/s
  - ~125 MB/s
