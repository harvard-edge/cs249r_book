title: Latency Bottleneck on Qualcomm AI 100
scenario: 'We are deploying a batched object detection model on an on-premise edge server equipped with a Qualcomm Cloud AI 100 (400 TOPS INT8). During testing, the end-to-end latency for processing a batch of 8 high-resolution images is measured at 265ms. Hardware profiling reveals that the actual INT8 inference execution on the accelerator takes only 15ms.'
question: 'Why does the batch-8 Cloud AI 100 pipeline take 265ms end to end when accelerator inference is only 15ms?'
details:
  realistic_solution: 'The candidate must decompose the 265ms end-to-end latency to explain the discrepancy. Because the Qualcomm Cloud AI 100 processes the INT8 workload very quickly (15ms) leveraging its 400 TOPS, the bottleneck shifts to the host CPU and system I/O. The 1Gbps network transfer of 16MB of compressed images alone takes 128ms (16MB / 125MB/s), which by itself exceeds typical latency budgets. The remaining latency is consumed by CPU-bound image decoding, host-to-device memory copies over PCIe, and post-processing (NMS). Optimizations: use 10GbE or direct frame capture to eliminate network transfer, implement hardware JPEG decode, and overlap PCIe transfers with compute.'
  common_mistake: |
    **The Pitfall:** Assuming the accelerator's memory bandwidth or power limit is the bottleneck.
    **The Rationale:** Candidates focus solely on the high-performance ML silicon and ignore host-side system operations.
    **The Consequence:** They fail to decompose the pipeline and miss the massive network I/O penalty.
  napkin_math: |
    * 8 compressed images (2MB each) over 1Gbps network: 16MB / 125MB/s = 128ms latency.
    * CPU image decoding and resizing (preprocessing) = ~80ms.
    * Host-to-Device transfer over PCIe Gen4 x8 (~200MB): 200MB / 16GB/s = ~12ms.
    * Post-processing (NMS) = ~30ms.
    * Total Non-Accelerator Time: 128 + 80 + 12 + 30 = 250ms.
    * **Conclusion: Network transfer (128ms) consumes nearly half the total latency, proving it is the true bottleneck.**
