title: 'The Sensor Fusion Bottleneck: Real-Time Deadlines'
scenario: 'A sensor fusion system uses two GPUs. GPU1 preprocesses data from a sensor suite (cameras, LiDAR) and streams a continuous 14 Gbps of tensor data to GPU2 for perception modeling. The hard real-time deadline requires this GPU-to-GPU transfer to complete with a P99 latency under 5ms. Two architecture proposals are being diagnosed.'
question: 'How do you evaluate whether the interconnect proposals can meet the 14 Gbps stream and P99 under 5ms requirement?'
details:
  realistic_solution: |
    The correct approach is to calculate the maximum theoretical bandwidth for each interconnect and compare it against the system's requirement.
  common_mistake: |
    **The Pitfall:** Focusing on latency-saving protocols like RDMA while ignoring fundamental bandwidth deficits.
    **The Rationale:** Engineers assume advanced networking stacks (like RoCE) magically solve all data transfer problems.
    **The Consequence:** No protocol overhead reduction can overcome a physical pipe that is simply too small for the payload, guaranteeing missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Requirement: 14 Gbps continuous stream.
    - Proposal A (10GbE): Bandwidth is physically limited to 10 Gbps.

    **Calculations:**
    - Bandwidth Deficit (Proposal A): 14 Gbps - 10 Gbps = 4 Gbps.

    **Conclusion & Interpretation:**
    - **Result: 4 Gbps physical deficit (Network-Bound).** No amount of protocol optimization can overcome a physical pipe that is too small for the payload.
  options:
  - 'Proposal A is better if you use RDMA over Ethernet (RoCE), as it bypasses the CPU and reduces latency.'
  - 'Proposal B is the only option. The 10GbE link in Proposal A has less bandwidth (10 Gbps) than required (14 Gbps), making it a non-starter.'
  - 'Proposal B is not ideal because PCIe is a high-latency bus. A system with NVLink is the only way to meet a 5ms deadline for multi-GPU communication.'
  - 'Proposal A is sufficient. The 4 Gbps deficit can be eliminated by applying real-time tensor compression before the network transfer.'
  correct_index: 1
