title: Adversarial Purification on Hailo-8
scenario: You are deploying a traffic sign recognition system on a Hailo-8 dataflow accelerator. To defend against physical adversarial patch attacks, you decide to prepend a small adversarial purification CNN to the main detection model. The main detector requires 40 GOPS per frame, and the purification CNN requires 12 GOPS per frame. Assume 100% compute utilization and sufficient host memory streaming bandwidth.
question: What maximum FPS and energy per frame result from running the 40 GOPS detector plus 12 GOPS purifier on the 2.5W Hailo-8?
details:
  realistic_solution: 'Sum the operations required for both the main model and the purification network to find the total GOPS per frame. Divide the total compute capacity of the Hailo-8 by the per-frame compute requirement to find the maximum FPS. Divide the power consumption by the FPS to determine energy per frame.'
  common_mistake: |
    **The Pitfall:** Calculating FPS for the two models separately or mismanaging units.
    **The Rationale:** Candidates forget to combine the computational cost per frame or struggle to convert TOPS to GOPS and Watts to Joules.
    **The Consequence:** Incorrect capacity sizing and flawed energy efficiency estimations for the edge deployment.
  napkin_math: |
    - **Total Compute:** 40 GOPS (detector) + 12 GOPS (purification) = 52 GOPS/frame.
    - **Hailo-8 Capacity:** 26 TOPS = 26,000 GOPS.
    - **Max FPS:** 26,000 GOPS / 52 GOPS/frame = **500 FPS**.
    - **Energy Per Frame:** 2.5W (Joules/sec) / 500 FPS = 0.005 Joules = **5 mJ**.
