title: Adversarial Purification on Hailo-8
scenario: You are deploying a traffic sign recognition system on a Hailo-8 dataflow
  accelerator (26 TOPS INT8, 2.5W, no local DRAM, streaming from host memory). To
  defend against physical adversarial patch attacks, you decide to prepend a small
  adversarial purification CNN to the main detection model. The main detector requires
  40 GOPS per frame, and the purification CNN requires 12 GOPS per frame. Assuming
  100% compute utilization and that the host memory streaming bandwidth is sufficient,
  calculate the maximum theoretical frame rate (FPS) of the robust pipeline and the
  energy consumed per frame.
question: What maximum FPS and energy per frame result from running the 40 GOPS detector
  plus 12 GOPS purifier on the 2.5W Hailo-8?
details:
  realistic_solution: The correct approach is to sum the operations required for both
    the main model and the purification network to find the total GOPS per frame.
    Then, divide the total compute capacity of the Hailo-8 by the per-frame compute
    requirement to find the maximum FPS. Finally, divide the power consumption by
    the FPS to determine the energy per frame.
  common_mistake: Candidates often forget to convert TOPS to GOPS correctly, or they
    calculate the FPS for the two models separately rather than combining their computational
    cost per frame. Additionally, they may struggle with the units when converting
    power (Watts) and frame rate into energy per frame.
  napkin_math: '1. Total compute per frame = 40 GOPS (detector) + 12 GOPS (purification)
    = 52 GOPS.

    2. Hailo-8 compute capacity = 26 TOPS = 26,000 GOPS.

    3. Max FPS = 26,000 GOPS / 52 GOPS/frame = 500 FPS.

    4. Energy per frame = Power / FPS = 2.5W (Joules/sec) / 500 frames/sec = 0.005
    Joules = 5 millijoules (mJ).'
