title: Edge Compute Sizing Spec
scenario: You are asked to size compute for an edge analytics rollout across 500 sites. The product team gives model FLOPs but not frame rates, duty cycles, batching, or deadline.
question: What inputs are required before estimating edge hardware count from model FLOPs across 500 sites?
details:
  realistic_solution: You need per-site event rate, FPS, duty cycle, deadline, model operations per inference, sustained accelerator efficiency, preprocessing cost, batching constraints, and redundancy requirements. FLOPs per model is only one term in the demand equation.
  common_mistake: |
    **The Pitfall:** Sizing hardware based solely on model FLOPs.
    **The Rationale:** Candidates often treat model FLOPs as the only variable, ignoring operational requirements like event rate, duty cycle, or latency deadlines.
    **The Consequence:** Buying incorrect hardware because event rates or latency deadlines actually dominate the compute requirements.
  napkin_math: |
    * **Compute Demand per Site:** (Operations per inference * Inferences per second) / Sustained hardware efficiency
    * **Fleet Demand:** Compute Demand per Site * 500 + Redundancy headroom
