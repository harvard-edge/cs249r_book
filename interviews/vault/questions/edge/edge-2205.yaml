title: Edge Compute Sizing Spec
scenario: You are asked to size compute for an edge analytics rollout across 500 sites. The product team gives model FLOPs but not frame rates, duty cycles, batching, or deadline.
question: What inputs are required before estimating edge hardware count from model FLOPs across 500 sites?
details:
  realistic_solution: You need per-site event rate, FPS, duty cycle, deadline, model operations per inference, sustained accelerator efficiency, preprocessing cost, batching constraints, and redundancy requirements. FLOPs per model is only one term in the demand equation.
  common_mistake: |
    **The Pitfall:** Sizing hardware based solely on model FLOPs.
    **The Rationale:** Candidates treat model FLOPs as the only variable, completely ignoring operational requirements like event rate, duty cycle, or latency deadlines.
    **The Consequence:** Procuring incorrect hardware because event rates or latency deadlines actually dominate the compute requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 500 sites.
       - Compute demand must account for real-world utilization factors, not just model FLOPs.
    2. **Calculations:**
       - Compute Demand per Site = (FLOPs per inference * Inferences per second) / Sustained hardware efficiency.
       - Inferences per second depends on: Event rate, FPS, Duty cycle, Deadline, Batching constraints.
       - Fleet Demand = Compute Demand per Site * 500 + Redundancy headroom.
    3. **Conclusion & Interpretation:**
       - **Result: System-Level Bottlenecks.** FLOPs per model is only one term; ignoring operational requirements like duty cycle and deadlines leads to massive hardware misallocation.
