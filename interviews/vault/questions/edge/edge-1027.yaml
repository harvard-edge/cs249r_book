title: Realizing a Two-Stage Compound Pipeline on Coral TPU + Jetson Orin
scenario: A smart camera system uses a Coral Edge TPU (4 TOPS, 2W) for fast object detection and a Jetson Orin (275 TOPS, 60W) for compound AI analysis of flagged scenes. The Coral TPU processes frames at 30 fps; only 5% of frames are flagged for Orin analysis. The Orin pipeline runs image embedding (15ms) + scene context retrieval from 10K-entry FAISS (5ms) + 1B LLM description (400ms).
question: Using an M/D/1 queue at ρ=0.63, what is the average Orin queue length for flagged Coral TPU frames?
details:
  realistic_solution: 'M/D/1 queue length Lq = ρ²/(2(1-ρ)) is the correct formula. With ρ=0.63: Lq = 0.3969/0.74 = 0.536.'
  common_mistake: |
    **The Pitfall:** Sending flagged frames synchronously to Orin and blocking the Coral TPU pipeline until Orin completes analysis.
    **The Rationale:** At 30fps * 5% = 1.5 flagged frames/second but Orin processes at 1/0.420s = 2.38 fps, the system appears to have headroom.
    **The Consequence:** Ignores burst patterns, leading to dropped frames and unacceptable latency spikes.
  napkin_math: |
    - M/D/1 queue parameter: ρ = 0.63
    - Queue length formula: Lq = ρ² / (2(1-ρ))
    - Lq = 0.63² / (2 × 0.37)
    - Lq = 0.3969 / 0.74 = 0.536
    **Average requests in queue: 0.536**
