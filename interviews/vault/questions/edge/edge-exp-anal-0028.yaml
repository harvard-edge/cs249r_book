title: Hailo-8 INT8 Streaming Throughput and Precision
scenario: You are deploying a ResNet-based model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local
  DRAM). The Hailo-8 must stream activations from host memory via a 4 GB/s PCIe connection. You observe
  that when the host streams FP16 activations to the device (which then quantizes to INT8 internally),
  the system bottlenecks on I/O. When you pre-quantize the activations to INT8 on the host to save bandwidth,
  the latency improves but accuracy drops by 5%. Explain why this performance-accuracy tradeoff occurs
  given the Hailo-8's architecture, and calculate the maximum frames-per-second (FPS) supported in both
  the FP16 and INT8 streaming scenarios.
details:
  realistic_solution: The Hailo-8 relies on streaming from host memory because it lacks local DRAM. Streaming
    FP16 activations consumes twice the bandwidth of INT8, creating an I/O bottleneck. However, pre-quantizing
    to INT8 on the host applies a static quantization range to the activations before they reach the dataflow
    core, leading to clipping errors and a 5% accuracy drop. The tradeoff is between I/O bound latency
    (FP16 streaming) and quantization error (INT8 streaming).
  common_mistake: Candidates often fail to calculate the exact I/O bottleneck and instead focus only on
    the compute capabilities (26 TOPS). They may incorrectly assume the accuracy drop is purely from the
    INT8 compute rather than the loss of dynamic range when pre-quantizing activations before streaming.
  napkin_math: 'Assume the model requires streaming 8MB of activations per frame from host to device.
    In FP16, this requires 16MB per frame. With a 4 GB/s PCIe link: FP16 FPS limit = 4,000 MB/s / 16 MB/frame
    = 250 FPS. INT8 FPS limit = 4,000 MB/s / 8 MB/frame = 500 FPS. The INT8 approach doubles the theoretical
    throughput but introduces precision loss due to early quantization.'
