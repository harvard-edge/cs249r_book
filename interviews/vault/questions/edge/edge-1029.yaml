title: Recalling Jetson Orin Memory Architecture for Multi-Model Compound Systems
scenario: A systems engineer is planning a compound AI deployment on Jetson Orin. The pipeline includes a vision encoder (2GB), embedding model (0.5GB), 3B LLM (6GB INT8), and a FAISS index (2GB).
question: Does LPDDR5 unified memory on Jetson Orin mean the CPU, GPU, and DLA all share the same physical DRAM, and what are the bandwidth implications for concurrent multi-model execution?
details:
  realistic_solution: 'Yes, Jetson Orin uses unified memory: the 32GB LPDDR5 is physically shared between CPU, GPU, iGPU, DLA, PVA, and other engines — no PCIe copies needed. Total bandwidth: 68.3GB/s. A 3B LLM decode at ~50 tok/s reads model weights once per token: 6GB per forward pass cycle. At 50 tok/s: 6GB * 50 = 300GB/s memory bandwidth — 4.4x over LPDDR5 capacity. This is why the 3B model achieves only ~12-15 tok/s on Orin. The embedding and vision encoder, when run concurrently, further contend for bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming that unified memory eliminates memory bandwidth contention.
    **The Rationale:** Candidates correctly know unified memory means "no PCIe copies," but incorrectly assume it means unlimited bandwidth access.
    **The Consequence:** Concurrent execution saturates the shared physical LPDDR5 bus, severely degrading LLM decode speeds and overall pipeline latency.
  napkin_math: |
    1. LPDDR5 bandwidth: 68.3 GB/s.
    2. 3B INT8 model weights: 3 GB.
    3. Theoretical decode speed (memory-bound): 68.3 GB/s / 3 GB = 22.8 tok/s.
    4. Concurrent embedding model (500MB, 200 vecs/s): 100 GB/s bandwidth demand.
    5. Combined demand: 300 GB/s (LLM at 50 tok/s) + 100 GB/s = 400 GB/s.
    6. Conclusion: 400 GB/s demand vs 68.3 GB/s supply requires **serialization**.
