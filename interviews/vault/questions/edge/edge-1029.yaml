title: Recalling Jetson Orin Memory Architecture for Multi-Model Compound Systems
scenario: 'A systems engineer is planning a compound AI deployment on Jetson Orin
  (32GB LPDDR5, 275 TOPS). The pipeline includes a vision encoder (2GB), embedding
  model (0.5GB), 3B LLM (6GB INT8), and a FAISS index (2GB). They ask: does LPDDR5
  unified memory on Jetson Orin mean the CPU, GPU, and DLA all share the same physical
  DRAM, and what are the bandwidth implications for concurrent multi-model execution?'
question: Does LPDDR5 unified memory on Jetson Orin mean the CPU, GPU, and DLA all
  share the same physical DRAM, and what are the bandwidth implications for concurrent
  multi-model execution?
details:
  realistic_solution: 'Yes, Jetson Orin uses unified memory: the 32GB LPDDR5 is physically
    shared between CPU, GPU, iGPU, DLA, PVA, and other engines — no PCIe copies needed.
    Total bandwidth: 68.3GB/s. A 3B LLM decode at ~50 tok/s reads model weights once
    per token: 6GB per forward pass cycle. At 50 tok/s: 6GB * 50 = 300GB/s memory
    bandwidth — 4.4x over LPDDR5 capacity. This is why the 3B model achieves only
    ~12-15 tok/s on Orin. The embedding and vision encoder, when run concurrently,
    further contend for bandwidth.'
  common_mistake: Assuming that unified memory eliminates memory bandwidth contention
    between the CPU, GPU, and DLA. Unified address space means no copies, but all
    three compute units share the same physical LPDDR5 bus — they compete for the
    same 68.3GB/s bandwidth. Concurrent execution can saturate the memory bus.
  napkin_math: 'LPDDR5 bandwidth: 68.3GB/s. 3B INT8 model: 3B * 1 byte = 3GB weights.
    Decode: reads all weights per token step. Achievable decode speed: 68.3GB/s /
    3GB = 22.8 tok/s theoretical (memory-bound). Actual ~15 tok/s due to attention
    KV overhead and efficiency. Concurrent embedding model (500MB, runs at ~200 vecs/s):
    bandwidth demand = 500MB * 200 = 100GB/s — again memory-bound. Combined LLM +
    embedding: 300+100=400GB/s demand vs 68.3GB/s supply → need serialization.'
