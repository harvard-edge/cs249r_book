title: The Vibration-Induced Phantom Detections
scenario: Your Hailo-8 vision system on a robotic welding arm detects weld defects using a 5MP camera
  at 20 FPS. The system achieves 97% accuracy on the test bench. On the production robot, accuracy drops
  to 82% — but only during active welding. Between welds (robot stationary), accuracy returns to 96%.
  The camera is rigidly mounted to the arm. What's different during welding?
details:
  realistic_solution: 'During welding, the robot arm vibrates at ~100 Hz with 0.5 mm peak amplitude. Max
    velocity = 2π × 100 × 0.5 = 314 mm/s. At 10 ms exposure (one full cycle), the sensor integrates over
    1.0 mm peak-to-peak displacement = 259 pixels of blur on a 3.86 μm pixel pitch. Catastrophic for defect
    detection. Between welds, vibration stops and accuracy recovers. Fixes: (1) reduce exposure to 0.05
    ms (4-pixel blur, needs 200× more illumination via strobed LED), (2) vibration-damping mount with
    10:1 isolation, or (3) accelerometer-triggered capture at vibration peaks where velocity = 0.'
  common_mistake: '"Welding arc light is saturating the camera." Arc light is a real concern but would
    cause overexposure, not the specific accuracy pattern described (accuracy recovers between welds even
    though the arc was present during the weld).'
  napkin_math: 'Vibration: 100 Hz, 0.5 mm peak amplitude. Camera: 5MP, 20 FPS, 10 ms exposure.

    FOV: 10 mm, pixel pitch = 10 mm / 2592 px ≈ 3.86 μm.


    Sinusoidal motion: x(t) = 0.5·sin(2π·100·t) mm. Max velocity = 0.5 × 2π × 100 = 314 mm/s.


    **10 ms exposure (= 1 full cycle at 100 Hz):**

    Sensor integrates over full peak-to-peak = 1.0 mm. Blur = 1000 μm / 3.86 μm = 259 pixels. Catastrophic.


    **1 ms exposure:** Worst-case blur ≈ v_max × t_exp = 314 × 0.001 = 0.314 mm = 81 pixels. Still too
    much.


    **0.1 ms exposure:** 314 × 0.0001 = 0.031 mm = 8 pixels. Borderline.


    **0.05 ms exposure:** 314 × 0.00005 = 0.016 mm = 4 pixels. Acceptable. Needs 200× more light (strobed
    LED).


    **Alternatives:** Vibration-damping mount (10:1 isolation → ~3 pixel residual). Accelerometer-triggered
    capture at displacement peaks (velocity = 0 → zero blur, 200 opportunities/s > 20 FPS need).'
