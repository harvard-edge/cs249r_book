title: The Vibration-Induced Phantom Detections
scenario: Your Hailo-8 vision system on a robotic welding arm detects weld defects using a 5MP camera at 20 FPS. The system achieves 97% accuracy on the test bench, but drops to 82% on the production robot during active welding. Between welds (robot stationary), accuracy returns to 96%. The camera is rigidly mounted to the arm.
question: What is the root cause of the accuracy drop during active welding?
details:
  realistic_solution: During welding, the robot arm vibrates at ~100 Hz with 0.5 mm peak amplitude. At a 10 ms exposure time, the sensor integrates over 259 pixels of blur, destroying accuracy. The problem is strictly motion blur, not lighting.
  common_mistake: |
    **The Pitfall:** Assuming welding arc light is saturating the camera.
    **The Rationale:** Candidates fixate on the welding arc causing overexposure without correlating it to the physical movement of the arm.
    **The Consequence:** Attempting to tune camera gains or adding optical filters, which fails to fix the 259-pixel mechanical motion blur destroying the inference accuracy.
  napkin_math: |
    - **Vibration specs:** 100 Hz, 0.5 mm peak amplitude.
    - **Optical specs:** 5MP FOV 10 mm, pixel pitch = 10 mm / 2592 px ≈ 3.86 μm.
    - **Max Velocity:** v_max = 0.5 * 2π * 100 = 314 mm/s.
    - **10 ms exposure (1 full cycle):** Integrates over full peak-to-peak (1.0 mm). Blur = 1000 μm / 3.86 μm = 259 pixels. (Catastrophic).
    - **0.1 ms exposure:** 314 mm/s * 0.0001s = 0.031 mm = 8 pixels. (Borderline).
    - **0.05 ms exposure:** 314 mm/s * 0.00005s = 0.016 mm = 4 pixels. (Acceptable, but needs strobed LED).
    - **Final result:** **The 10 ms exposure causes 259 pixels of motion blur. Reducing exposure to 0.05 ms or using a vibration-damping mount solves it.**
