title: Tensor Arena Planning for Jetson Orin Multi-Model Serving
scenario: 'Your Jetson Orin (32 GB LPDDR5, 60W) serves 5 TensorRT models concurrently for autonomous driving: perception (2.1 GB GPU memory), tracking (800 MB), prediction (1.2 GB), planning (600 MB), and control (200 MB). Total model memory is 4.9 GB. GPU memory is shared with the system (Linux + display = 4 GB), leaving 28 GB for models. However, memory fragmentation after 24 hours of operation causes allocation failures even though total free memory is sufficient.'
question: How do you plan memory allocation to prevent fragmentation?
details:
  realistic_solution: 'Apply the tensor arena pattern from TinyML at edge scale: pre-allocate a contiguous memory pool at startup and sub-allocate within it. Strategy: (1) Allocate one contiguous GPU memory block of 6 GB at process start (leaves 22 GB for growth). (2) Use a custom allocator (arena/bump allocator) that sub-allocates to each model from this block. Models receive fixed offsets: perception at offset 0, tracking at 2.1 GB, prediction at 2.9 GB, planning at 4.1 GB, control at 4.7 GB. (3) No dynamic allocation after initialization — TensorRT''s IExecutionContext uses pre-allocated device memory for activations. (4) For variable-size inputs (different image resolutions), allocate for the maximum expected size at startup. Waste some memory but eliminate fragmentation. TensorRT supports this via createExecutionContextWithoutDeviceMemory() + manual memory binding.'
  common_mistake: |
    **The Pitfall:** Relying on dynamic memory allocation (`cudaMalloc`) during continuous operation.
    **The Rationale:** Candidates assume standard memory management is fine as long as total requested memory is less than total free memory.
    **The Consequence:** Dynamic allocation creates memory holes over 24 hours, leading to intermittent Out-Of-Memory (OOM) failures and forcing system restarts in safety-critical autonomous driving.
  napkin_math: |
    1. Dynamic fragmentation = 15-25% of allocated memory becomes unusable. 4.9 GB × 20% = 980 MB wasted holes.
    2. Arena allocation approach: 0% fragmentation.
    3. Pre-allocate a contiguous 6 GB block (4.9 GB models + 1.1 GB padding).
    4. **This static 6 GB block leaves 22 GB free, guarantees zero allocation failures over 24 hours, and ensures deterministic latency.**
