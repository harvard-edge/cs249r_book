title: 'Edge Transformer Cost Implement: BERT Inference Latency on Jetson'
scenario: You must calculate the inference latency breakdown for TinyBERT (14.5M params, INT8, 4 layers, hidden=312) on Jetson Orin DLA at batch=4, seq=64. Break down by attention computation, FFN computation, and memory bandwidth.
question: Which is the bottleneck?
details:
  realistic_solution: Decompose the transformer into attention (QKV projection, score, context) and FFN (two matmuls) with different arithmetic intensities to determine if compute or memory dominates.
  common_mistake: |
    **The Pitfall:** Treating the entire transformer as a single operation.
    **The Rationale:** Candidates fail to decompose the architecture into blocks, missing that different components have distinct arithmetic intensities.
    **The Consequence:** Inaccurate latency estimations and failure to identify the true execution bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - TinyBERT layer: batch=4, seq=64.
    - Jetson Orin DLA: 11 TOPS INT8, 200GB/s bandwidth.

    **Calculations:**
    - QKV+O FLOPs: 4*2*4*64*312*312 = 199.5M.
    - FFN FLOPs: 2*2*4*64*312*1200=383.4M.
    - Total per layer: 603.3M FLOPs. 4 layers: 2.41G FLOPs.
    - Compute time: 2.41G / 11T = 0.219ms.
    - BW time: 14.5MB / 200GB/s = 0.073ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Compute latency (0.219ms) exceeds memory bandwidth latency (0.073ms).
