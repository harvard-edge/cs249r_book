title: 'Edge Transformer Cost Implement: BERT Inference Latency on Jetson'
scenario: 'Calculate the inference latency breakdown for TinyBERT (14.5M params, INT8, 4 layers, hidden=312) on Jetson Orin DLA (11 TOPS INT8, 200GB/s) at batch=4, seq=64. Break down by: attention computation, FFN computation, and memory bandwidth. Which is the bottleneck?'
question: Which is the bottleneck?
details:
  realistic_solution: 'QKV FLOPs: 3 \u00d7 2 \u00d7 4 \u00d7 64 \u00d7 312 \u00d7 312 = 1.49\u00d710^8. FFN FLOPs: 2 \u00d7 2 \u00d7 4 \u00d7 64 \u00d7 312 \u00d7 1200 = 3.83\u00d710^8.'
  common_mistake: Treating the entire transformer as a single operation instead of decomposing into attention (QKV projection, score, context) and FFN (two matmuls) with different arithmetic intensities.
  napkin_math: 'TinyBERT layer (batch=4, seq=64): QKV FLOPs: 3*2*4*64*312*312 = 149.6M. FFN FLOPs: 2*2*4*64*312*1200=383.4M. Attention scores: 2*4*12*64^2*26=10.2M FLOPs. Total per layer: 149.6M+383.4M+10.2M=543.2M FLOPs. 4 layers: 2.17G FLOPs. DLA 11 TOPS: 2.17G/11T=0.197ms. BW: 14.5MB/200GB/s=0.073ms. Compute bound (0.197ms > 0.073ms).'
