title: 'Edge Transformer Cost Implement: BERT Inference Latency on Jetson'
scenario: 'Calculate the inference latency breakdown for TinyBERT (14.5M params, INT8,
  4 layers, hidden=312) on Jetson Orin DLA (11 TOPS INT8, 200GB/s) at batch=4, seq=64.
  Break down by: attention computation, FFN computation, and memory bandwidth. Which
  is the bottleneck?'
question: Which is the bottleneck?
details:
  realistic_solution: 'QKV FLOPs: 3 × 2 × 4 × 64 × 312 × 312 = 1.49×10^8 (not 4.71×10^8).
    4.71×10^8 would require hidden=312² ≈ 97K which is wrong.'
  common_mistake: Treating the entire transformer as a single operation instead of
    decomposing into attention (QKV projection, score, context) and FFN (two matmuls)
    with different arithmetic intensities.
  napkin_math: 'TinyBERT layer (batch=4, seq=64): QKV FLOPs: 3*2*4*64*312*312. Calculating:
    3×2=6; 6×4=24; 24×64=1536; 1536×312=479,232; 479,232×312=149,560,384 ≈ 1.49e8
    (not 4.71e8). FFN FLOPs: 2*2*4*64*312*1200=1.52e8. Attention scores: 2*4*12*64^2*26=10.2M
    FLOPs. Total per layer: 149M+152M+10.2M=311M FLOPs. 4 layers: 1.25G FLOPs. DLA
    11 TOPS: 1.25G/11T=0.114ms. BW: 14.5MB/200GB/s=0.073ms. Compute bound (0.114ms
    > 0.073ms).'
