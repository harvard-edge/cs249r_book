title: The Headlight Blindness Problem
scenario: You are the Tech Lead for the perception team building an autonomous delivery robot. The product
  requires 24/7 operation, meaning the robot must function in lighting conditions from bright, direct
  sunlight to dark nights with only its headlights for illumination. The core perception model is a 300
  GOps vision transformer, running on a Jetson AGX Orin with a hard real-time latency budget of 33ms (30
  FPS) for safe obstacle avoidance.
details:
  realistic_solution: The correct approach is to architect a mixed-precision model that surgically addresses
    the points of failure. The most vulnerable layers to activation overflow are typically the **first
    few convolutional or patch-embedding layers** and the **final output/head layers**.
  common_mistake: The most common answers are 'Just use Quantization-Aware Training (QAT)' or 'The calibration
    dataset is bad, add more extreme lighting examples.' While not wrong, these answers miss the architectural
    point. QAT is an expensive full retraining process that may not even solve a fundamental dynamic range
    mismatch between trained weights and extreme real-world inputs. Simply adding more data to the calibration
    set for PTQ can help, but it often fails to prevent overflow for outlier inputs and doesn't demonstrate
    a deep understanding of *which* layers are sensitive and why.
  napkin_math: 'Target: 33ms/frame on Orin (137 FP16 TFLOPS, 275 INT8 TOPS, 204.8 GB/s). A 5 TFLOP model
    in pure FP16 takes 5T / 137T = 36.5ms (misses 33ms deadline). Leaving 10% sensitive initial layers
    in FP16 (0.5 TFLOPs) and 90% in INT8 (4.5 TOPS) yields: FP16 time 0.5T / 137T = 3.6ms, INT8 time 4.5T
    / 275T = 16.3ms. Total compute = 19.9ms. We save 16.6ms, easily beating the 33ms target.'
