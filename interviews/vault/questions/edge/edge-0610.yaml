title: The Headlight Blindness Problem
scenario: You are the Tech Lead for the perception team building an autonomous delivery robot. The robot must function in lighting conditions from bright, direct sunlight to dark nights with only its headlights for illumination. The core perception model is a 300 GOps vision transformer running with a hard real-time latency budget of 33ms (30 FPS).
question: What quantization architecture would meet the 33ms budget while avoiding INT8 activation overflow across extreme lighting?
details:
  realistic_solution: The correct approach is to architect a mixed-precision model that surgically addresses the points of failure. The most vulnerable layers to activation overflow are typically the **first few convolutional or patch-embedding layers** and the **final output/head layers**.
  common_mistake: |
    **The Pitfall:** Exclusively relying on Quantization-Aware Training (QAT) or adding calibration data.
    **The Rationale:** Candidates default to retraining instead of architecting a mixed-precision model.
    **The Consequence:** QAT fails to prevent overflow for outlier inputs, leading to system failure in extreme lighting conditions.
  napkin_math: |
    1. **Assumptions & Constraints:** Model requires 5 TOPs compute. Real-time budget is 33ms. FP16 throughput is 137 TFLOPs, INT8 is 275 TOPS.
    2. **Calculations:** Pure FP16 = 5T / 137T = 36.5ms. Mixed (10% FP16, 90% INT8) = (0.5T / 137T) + (4.5T / 275T) = 3.6ms + 16.3ms = 19.9ms.
    3. **Conclusion & Interpretation:** **Mixed-precision (19.9ms) safely meets the 33ms deadline while preventing overflow in sensitive layers. Real-Time Constraint met.**
