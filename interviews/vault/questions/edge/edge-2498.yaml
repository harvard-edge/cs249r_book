title: Cache Thrashing Bandwidth Impact on LPDDR5
scenario: A poorly optimized pooling layer on an edge camera thrashes the cache, causing
  2 million cache misses per second to external LPDDR5. Each cache miss fetches a
  64-byte line.
question: Analyze the additional memory bandwidth consumed entirely due to these cache
  misses.
details:
  realistic_solution: Every miss pulls 64 bytes over the bus. With 2,000,000 misses
    per second, the bandwidth penalty is 2,000,000 * 64 bytes = 128,000,000 bytes/sec,
    or exactly 128 MB/s.
  common_mistake: Reporting the penalty as 2 MB/s by failing to multiply the miss
    count by the cache line size.
  napkin_math: 2e6 * 64 / 1e6 = 128 MB/s
