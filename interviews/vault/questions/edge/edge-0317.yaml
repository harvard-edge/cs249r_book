title: The Perception Model's Memory Diet (edge-0317)
scenario: You are an engineer on an autonomous vehicle team deploying a LiDAR perception model to a Jetson
  AGX Orin. A key convolutional layer in your model produces an activation tensor of size 256x256x128.
  The model currently runs in FP16 precision. To reduce memory pressure, you are considering quantizing
  the network to INT8. Calculate the memory savings for just this one activation tensor after converting
  it from FP16 to INT8, and explain your reasoning.
question: "How much memory in MB is saved for the 256x256x128 activation tensor when converting it from FP16 to INT8?"
details:
  realistic_solution: The calculation is a straightforward comparison of data type sizes. FP16 (half-precision
    float) uses 2 bytes per element. INT8 (8-bit integer) uses 1 byte per element. For the same number
    of elements, INT8 uses exactly half the memory of FP16. The savings are therefore 50% of the original
    FP16 size.
  common_mistake: Engineers often forget that quantization applies to activations, not just weights. Another
    common mistake is to miscalculate the size difference, either by reporting the final INT8 size instead
    of the *savings*, or by confusing the byte-to-bit ratios (e.g., assuming a 4x saving, which is typical
    for FP32-to-INT8, not FP16-to-INT8).
  napkin_math: 1. **Calculate elements:** Total elements in the activation tensor is `256 * 256 * 128
    = 8,388,608` elements.
  options:
  - ~16.8 MB. This is the original FP16 size, not the savings.
  - ~4.2 MB. This incorrectly assumes a 4x reduction from FP16.
  - ~8.4 MB. Correct, this is half the original FP16 size.
  - 0 MB. This incorrectly assumes quantization only saves memory on weights, not activations.
  correct_index: 2
