title: The Polling Power Trap
scenario: Your battery-powered wildlife camera (STM32H7 at 480 MHz, Cortex-M7, 1 MB SRAM) runs a tiny
  object detection model to classify animals. The camera checks for motion by polling a PIR sensor every
  10ms in a tight loop, then runs inference when motion is detected. Battery life is 2 days — the product
  requirement is 30 days. The inference model only runs ~5 times per day. Where is all the power going?
details:
  realistic_solution: 'The power drain is the **polling loop**, not the inference. The STM32H7 at 480
    MHz draws ~300 mW in active mode. Polling the PIR sensor every 10ms keeps the CPU in active mode 24/7:
    300 mW × 24 hrs = 7.2 Wh/day. A typical 18650 LiPo battery holds ~10 Wh → 1.4 days (matches the observed
    2-day life with overhead). The fix is **interrupt-driven wake**: configure the PIR sensor output as
    an EXTI interrupt source, put the STM32H7 into Stop2 mode (draws ~3 µW — 100,000× less than active
    mode). When the PIR triggers, the interrupt wakes the CPU in ~5 µs, the CPU runs inference, then returns
    to Stop2. Power budget: Stop2 standby = 3 µW × 24 hrs = 0.072 mWh/day. 5 inference wake-ups × 50ms
    × 300 mW = 0.0208 mWh/day. Total: ~0.093 mWh/day. Battery life: 10 Wh / 0.000093 Wh/day = **~107,526
    days ≈ 294 years** — the battery''s self-discharge rate (~2-3%/month) becomes the real limit, giving
    a practical life of ~2-3 years.'
  common_mistake: '"The neural network inference is draining the battery." If inference runs 5 times/day
    at 50ms each, that''s 250ms of compute per day — negligible.'
  napkin_math: 'Polling: 300 mW continuous = 7.2 Wh/day → 10 Wh battery / 7.2 = 1.4 days. Interrupt-driven:
    0.003 mW standby + 5 × 0.05s × 300 mW wake = 0.072 mWh/day standby + 0.0208 mWh/day inference = 0.0928
    mWh/day → 10 Wh / 0.0000928 Wh = 107,000 days (battery self-discharge is the real limit at ~2-3%/month
    → practical life ~2-3 years). The polling loop wastes 77,000× more energy than the actual useful compute.'
