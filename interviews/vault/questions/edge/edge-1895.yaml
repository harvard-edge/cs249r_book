title: Optimizing Real-time Inference Latency on Jetson Orin
scenario: A real-time object detection model on an NVIDIA Jetson Orin (275 TOPS INT8, 60W, LPDDR5) averages 150ms per inference, far exceeding the 50ms target.
question: How would you profile the Jetson Orin pipeline to find whether the 150 ms inference latency is compute-, memory-, I/O-, or power-throttling-bound?
details:
  realistic_solution: Utilize NVIDIA Nsight Systems (nsys) to capture a timeline of CPU, GPU, and memory activity. Check for large gaps between CUDA kernel executions, indicating CPU-bound pre/post-processing or I/O stalls. Analyze memory bandwidth utilization to see if LPDDR5 is saturated by inefficient memory access patterns. Finally, verify `jetson_clocks` state; if the 60W power envelope triggers thermal throttling, the system will dynamically downclock the GPU, manifesting as elongated kernel execution times.
  common_mistake: |
    **The Pitfall:** Immediately applying architectural tweaks (e.g., swapping activation functions).
    **The Rationale:** Assuming the bottleneck is purely mathematical compute without empirical profiling data.
    **The Consequence:** Wasting engineering cycles on model architecture changes while the true culprit (e.g., CPU image decoding or thermal throttling) remains untouched.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Compute: 100 Giga-Operations (GOps). Orin Peak: 275 TOPS INT8.
       - Memory Bandwidth: ~200 GB/s. Data movement: 2 GB per inference.
    2. **Calculations:**
       - Max Theoretical Compute: 100 GOPs / 275 TOPS = ~0.36 ms.
       - Memory Transfer Time: 2 GB / 200 GB/s = 10 ms.
    3. **Conclusion & Interpretation:**
       - **Result: System-Bound. Raw compute requires <1ms. The 150ms latency proves the bottleneck is unequivocally memory I/O, CPU overhead, or extreme thermal throttling.**
