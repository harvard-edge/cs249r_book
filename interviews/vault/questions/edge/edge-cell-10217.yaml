title: Recalling Key Constraints of Coral Edge TPU for Compound Pipelines
scenario: A developer wants to deploy the retrieval stage of a RAG pipeline — specifically a cross-encoder
  reranker — on the Coral Edge TPU (4 TOPS, 2W). The reranker is a 22M parameter BERT-tiny model. What
  are the fundamental hardware constraints of the Coral Edge TPU that determine whether this deployment
  is feasible?
details:
  realistic_solution: 'Coral Edge TPU constraints: (1) On-chip SRAM: 8MB. Models > 8MB have parameters
    streamed from host over USB/PCIe, reducing throughput by 60-80%. (2) Operations: only a subset of
    TFLite ops are supported; dynamic shapes and certain attention mechanisms are not supported. (3) Quantization:
    INT8 only, must be full-integer quantized (not per-axis for some ops). For BERT-tiny at 22MB: execution
    will be 60-80% slower than in-SRAM. Consider DistilBERT-tiny at 6MB INT8 (fits in SRAM) or run on
    Jetson Orin instead.'
  common_mistake: 'Assuming any INT8-quantized model can run on the Coral TPU. The Coral TPU has a hard
    constraint: all model weights and activations must fit in its 8MB on-chip SRAM. Models exceeding 8MB
    require parameter streaming from host, which dramatically reduces throughput. BERT-tiny at 22M params
    INT8 = 22MB — 2.75x over the SRAM limit.'
  napkin_math: 'Coral SRAM: 8MB. BERT-tiny INT8: 22M params * 1 byte = 22MB. Overflow: 22-8=14MB streamed
    from host. USB 3.0 bandwidth: 400MB/s. Streaming overhead per inference: 14MB / 400MB/s = 35ms just
    for weight streaming vs ~5ms for in-SRAM execution. Effective throughput degradation: (5ms baseline)
    / (5+35ms) = 12.5% of peak throughput. DistilBERT-tiny: 6MB INT8, fits in SRAM, ~200 inferences/s
    at 4 TOPS.'
