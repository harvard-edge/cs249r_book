title: 'Kernel Fusion: Optimize Int8 Fusion Pipeline for Hailo-8 NPU'
scenario: You are deploying an object detection model on Hailo-8 (26 TOPS INT8, 2.5W).
  The Hailo-8 dataflow architecture requires all fused ops to be specified at compile
  time. Your YOLOv5s model runs at 8ms per frame (125 FPS). Optimize the model architecture
  to reduce to 5ms (200 FPS) by identifying the best fusion opportunities in the Hailo
  dataflow.
question: How would you reduce YOLOv5s latency from 8ms to 5ms on Hailo-8 by exploiting
  compile-time dataflow fusion?
details:
  realistic_solution: 'Hailo-8 executes a pre-compiled dataflow graph. All ops between
    HBM reads are fused by the compiler. Key: eliminate unnecessary HBM reads by keeping
    activations on-chip between ops. Reduce model layers to minimize HBM round trips.'
  common_mistake: Trying to apply dynamic fusion at runtime on Hailo-8 — it's a dataflow
    processor where all fusion is static (compile-time only). Not understanding Hailo's
    unique dataflow execution model.
  napkin_math: 'Hailo-8: 26 TOPS INT8, 2.5W, on-chip SRAM (estimated 10MB). YOLOv5s:
    7.2M params, 16.5B FLOPs. Theoretical: 16.5B / 26T = 0.635ms per frame. Current
    8ms = 7.9% efficiency. Massive gap → mostly HBM bound. YOLOv5s activations per
    layer: bottleneck 80×80×256 = 1.6MB per layer. On-chip SRAM 10MB → fits 6 layers
    of activations. With dataflow compilation fusing 6-layer chains: HBM reads = model_params
    (7.2MB) + input/output per chain. Chain of 6 layers: HBM reads every 6 layers
    instead of every layer. Reduction: 6×. Current 8ms → 8/6 = 1.33ms theoretical.
    With compiler efficiency 60%: 2.2ms. But 5ms target... Optimization: use YOLOv5n
    (1.9M params) instead of s. 4.5B FLOPs / 26T = 0.17ms + HBM = ~3ms. Meets 5ms.
    Power: 2.5W max → 200 FPS / 2.5W = 80 FPS/W. Excellent efficiency.'
