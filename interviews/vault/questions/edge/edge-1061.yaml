title: 'Kernel Fusion: Optimize Int8 Fusion Pipeline for Hailo-8 NPU'
scenario: You are deploying an object detection model on Hailo-8 (26 TOPS INT8, 2.5W). The Hailo-8 dataflow architecture requires all fused ops to be specified at compile time. Your YOLOv5s model runs at 8ms per frame (125 FPS).
question: "How would you reduce YOLOv5s latency from 8ms to 5ms on Hailo-8 by exploiting compile-time dataflow fusion?"
details:
  realistic_solution: Hailo-8 executes a pre-compiled dataflow graph. All ops between HBM reads are fused by the compiler. The key is to eliminate unnecessary HBM reads by keeping activations on-chip between ops. Reduce model layers to minimize HBM round trips. Switching to YOLOv5n (1.9M params) drastically reduces layer count and HBM round trips.
  common_mistake: |
    **The Pitfall:** Trying to apply dynamic fusion at runtime on a dataflow processor.
    **The Rationale:** Candidates apply GPU-centric runtime optimizations, not understanding Hailo's unique static dataflow execution model where all fusion is compile-time only.
    **The Consequence:** Optimization efforts yield zero runtime improvement since the hardware cannot dynamically alter its spatial pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8: 26 TOPS, 2.5W, 10 MB on-chip SRAM.
       - YOLOv5s: 16.5B FLOPs, 80x80x256 activations = 1.6 MB/layer.
       - YOLOv5n: 4.5B FLOPs.
    2. **Calculations:**
       - Theoretical compute YOLOv5s = 16.5 GOPS / 26 TOPS = 0.635 ms. Actual = 8 ms (Efficiency 7.9%, highly HBM-bound).
       - Fusing 6 layers fits in 10 MB SRAM (6 * 1.6 = 9.6 MB), reducing HBM reads by 6x.
       - Theoretical compute YOLOv5n = 4.5 GOPS / 26 TOPS = 0.17 ms + HBM latency = ~3 ms.
    3. **Conclusion & Interpretation:**
       - **Result: ~3 ms latency with YOLOv5n** (HBM-Bound optimized via fusion).
