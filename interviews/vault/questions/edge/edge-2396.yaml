title: Thermal Throttling Orin
scenario: A robotics startup uses Jetson AGX Orins configured in 60W mode. Their newly
  deployed visual-inertial odometry model causes thermal throttling and massive battery
  drain.
question: Formulate a diagnostic framework to pinpoint the compute bottlenecks and
  propose an architectural modification to keep the power strictly under 30W.
details:
  realistic_solution: First, profile INT8 utilization versus memory-bound operations,
    as high LPDDR5 bandwidth usage drives massive power consumption. Redesign the
    architecture by replacing dense attention layers with depthwise convolutions and
    lowering precision to INT8, enabling the 15-30W power modes.
  common_mistake: Assuming TOPS usage is the primary power draw, completely ignoring
    the massive energy cost of off-chip LPDDR5 memory accesses.
  napkin_math: P_total = P_compute + P_mem < 30W
