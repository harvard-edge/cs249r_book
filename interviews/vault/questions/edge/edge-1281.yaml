title: Systolic Array Tiling Strategy for Google Coral Edge TPU
scenario: You are designing a real-time object detection system for a smart camera
  connected via USB to a Google Coral Edge TPU. The Edge TPU provides 4 TOPS of INT8
  compute at a strict 2W power budget, utilizing a dedicated systolic array architecture
  with limited operator support. You need to deploy a custom CNN onto this accelerator.
  Evaluate the tradeoffs between weight-stationary and output-stationary dataflows
  for this specific hardware, and architect a tiling strategy that maximizes the systolic
  array utilization without exceeding the 2W envelope or triggering host-CPU fallbacks
  over the USB bus.
question: How would you choose weight- versus output-stationary tiling for the Coral
  Edge TPU to keep the INT8 systolic array busy without CPU fallbacks?
details:
  realistic_solution: 'A strong L5 candidate will architect a pipeline where all operators
    are strictly INT8 quantized and fused to guarantee execution exclusively on the
    Edge TPU. They will evaluate layer dimensions to dynamically adapt the dataflow:
    utilizing output-stationary mapping for early layers with massive activation maps
    to minimize partial sum memory traffic, and weight-stationary mapping for deeper,
    parameter-heavy layers to keep the systolic array fully fed. Their tiling strategy
    will be precisely sized to fit weights and activations simultaneously within the
    on-chip SRAM, completely avoiding costly USB bus transfers during layer execution.'
  common_mistake: Candidates often propose generic tiling architectures without accounting
    for the Edge TPU's strict INT8 quantization requirement or limited operator support,
    which leads to immediate host-CPU fallback. They also frequently overlook the
    USB/PCIe bandwidth bottleneck, designing tiling sizes that cause constant thrashing
    between the host memory and the limited on-chip SRAM.
  napkin_math: The Coral Edge TPU delivers 4 TOPS at 2W, equating to an efficiency
    of 2 TOPS/W. Processing a 30 FPS video stream gives a maximum hardware compute
    budget of 4,000 GOPS / 30 FPS = 133.3 GOPS per frame. If the INT8 quantized CNN
    requires 40 GOPS per frame, the theoretical hardware utilization is 40 / 133.3
    = 30%. At the 2W maximum power draw, the network compute theoretically consumes
    roughly 0.30 * 2W = 0.6W, leaving a comfortable 1.4W power and thermal headroom
    for USB I/O data movement and host communications.
