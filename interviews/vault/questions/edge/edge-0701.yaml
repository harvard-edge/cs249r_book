validation_issues:
- The KV-cache calculation for FP16 is incorrect; it should be (2 × Num_Heads × Head_Dim) × (2 bytes/FP16)
  per token, and the provided number (393 KB) implies a much smaller head dimension than the commonly
  understood 128/96 for Phi-3.
