title: Hailo-8 Dataflow Memory Constraints for Operator Scheduling
scenario: A computer vision model is being compiled for edge deployment on a dataflow accelerator (26 TOPS INT8, 2.5W). The compiler must schedule operators to stream data directly through the chip's fabric rather than executing layer-by-layer.
question: What specific hardware memory characteristic of the dataflow accelerator dictates this spatial operator scheduling approach?
details:
  realistic_solution: The candidate must recall that the accelerator has no local DRAM and operates as a pure dataflow accelerator. Operator scheduling must focus on layer fusion and mapping operators spatially onto the chip's distributed SRAM so that activations flow directly from one layer to the next, with any unavoidable spills streaming directly to host memory.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator has attached local DRAM.
    **The Rationale:** Most edge GPUs use LPDDR memory to buffer intermediate activations, so developers default to temporal layer-by-layer scheduling.
    **The Consequence:** Applying conventional memory reuse strategies that fail on a pure dataflow architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Architecture: 26 TOPS INT8, 2.5W budget.
       - No local DRAM (only distributed SRAM).
       - DRAM access cost: ~20-50 pJ/bit. SRAM access cost: ~1-5 pJ/bit.
    2. **Calculations:**
       - Compute efficiency required: 26 TOPS / 2.5W = 10.4 TOPS/W.
       - Energy delta: SRAM vs DRAM is roughly a 10x to 50x energy saving per bit.
    3. **Conclusion & Interpretation:**
       - **Result: ~10x energy savings per bit.** Without local DRAM, operators must be spatially fused into SRAM to meet the extreme 2.5W power budget. **System Bottleneck: Memory-Bound (Data Movement / Power)**.
