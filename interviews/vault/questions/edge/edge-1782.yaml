title: Hailo-8 Dataflow Memory Constraints for Operator Scheduling
scenario: A computer vision model is being compiled for edge deployment on a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The compiler must schedule operators to stream data directly through the chip's fabric rather than executing layer-by-layer.
question: What specific hardware memory characteristic of the Hailo-8 dictates this spatial operator scheduling approach?
details:
  realistic_solution: The candidate must recall that the Hailo-8 has no local DRAM
    and operates as a pure dataflow accelerator. Operator scheduling must focus on
    layer fusion and mapping operators spatially onto the chip's distributed SRAM
    so that activations flow directly from one layer to the next, with any unavoidable
    spills streaming directly to host memory.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator has attached local DRAM.
    **The Rationale:** Most edge GPUs (like Jetson) use LPDDR memory to buffer intermediate activations, so developers default to temporal layer-by-layer scheduling.
    **The Consequence:** Applying conventional memory reuse strategies that fail on a pure dataflow architecture.
  napkin_math: |
    1. **Compute efficiency**: 26 TOPS / 2.5W = 10.4 TOPS/W.
    2. **DRAM cost**: Accessing local DRAM typically costs ~20-50 pJ/bit.
    3. **SRAM cost**: Accessing on-chip SRAM costs ~1-5 pJ/bit.
    4. **Conclusion**: Eliminating DRAM accesses keeps activations in SRAM, saving roughly **10x energy per bit**, allowing the chip to hit its strict **2.5W power budget**.
