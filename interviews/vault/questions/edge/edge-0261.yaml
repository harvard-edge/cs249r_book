title: The Autonomous Driving Bottleneck
scenario: You are an ML systems engineer at an autonomous vehicle company, evaluating a new perception
  model on a Jetson AGX Orin. You've profiled a critical convolution layer and found it executes 400 Giga-Ops
  (INT8) for every frame processed. To do this, it needs to read and write a total of 600 MB of data from
  the device's LPDDR5 memory. The Jetson AGX Orin has a peak compute performance of 275 TOPS (INT8) and
  a memory bandwidth of 204.8 GB/s. Is this specific layer compute-bound or memory-bound?
question: "Is this specific layer compute-bound or memory-bound?"
details:
  realistic_solution: 'The layer is memory-bound. To determine this, we compare the workload''s Arithmetic
    Intensity (AI) to the hardware''s Ridge Point. The Ridge Point is the AI needed to saturate the GPU.

    1. **Hardware Ridge Point** = Peak Compute / Memory Bandwidth = (275 * 10^12 Ops/sec) / (204.8 * 10^9
    Bytes/sec) ≈ 1343 Ops/Byte.

    2. **Workload Arithmetic Intensity** = Total Ops / Total Bytes = (400 * 10^9 Ops) / (600 * 10^6 Bytes)
    ≈ 667 Ops/Byte.

    Since the workload''s AI (667 Ops/Byte) is less than the hardware''s Ridge Point (1343 Ops/Byte),
    the system cannot supply data fast enough to keep the compute units fully utilized. The bottleneck
    is memory bandwidth.'
  common_mistake: 'Engineers often get fixated on the headline peak TOPS number of an accelerator and
    assume that if the workload is slow, it must be because the model is too complex (compute-bound).
    They fail to calculate the Arithmetic Intensity (AI) of the workload and compare it to the hardware''s
    ridge point, which reveals the true bottleneck: the ability of the memory system to feed the compute
    units.'
  napkin_math: '1. **Hardware Ridge Point:** 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.

    2. **Workload AI:** 400 GOps / 600 MB = 400e9 / 600e6 = 667 Ops/Byte.

    3. **Comparison:** 667 < 1,343 → **memory-bound**. The compute units are starved for data.

    4. **Achievable performance:** Since memory-bound, perf = AI x BW = 667 x 204.8 GB/s = 136.6 TOPS
    (only ~50% of 275 TOPS peak).'
  options:
  - Compute-bound, because the hardware's ridge point is only ~1.3 Ops/Byte, which the workload far exceeds.
  - Compute-bound, because the 400 Giga-Ops workload is a significant fraction of the chip's 275 TOPS
    capacity.
  - It is perfectly balanced, as the arithmetic intensity and ridge point are roughly within a factor
    of 2x of each other.
  - Memory-bound, because its arithmetic intensity (~667 Ops/Byte) is lower than the hardware's ridge
    point (~1343 Ops/Byte).
