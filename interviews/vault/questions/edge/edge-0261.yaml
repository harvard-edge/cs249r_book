title: The Autonomous Driving Bottleneck
scenario: You are an ML systems engineer at an autonomous vehicle company, evaluating a new perception model on an edge accelerator. You've profiled a critical convolution layer and found it executes 400 Giga-Ops (INT8) for every frame processed. To do this, it needs to read and write a total of 600 MB of data from the device's LPDDR5 memory. The accelerator has a peak compute performance of 275 TOPS (INT8) and a memory bandwidth of 204.8 GB/s.
question: Is this specific layer compute-bound or memory-bound?
details:
  realistic_solution: 'The layer is memory-bound. To determine this, we compare the workload''s Arithmetic Intensity (AI) to the hardware''s Ridge Point. The Ridge Point is the AI needed to saturate the GPU. Since the workload''s AI is less than the hardware''s Ridge Point, the system cannot supply data fast enough to keep the compute units fully utilized. The bottleneck is memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming the workload must be compute-bound because 400 Giga-Ops is a large number.
    **The Rationale:** Engineers fail to calculate the Arithmetic Intensity (AI) of the workload and compare it to the hardware's ridge point.
    **The Consequence:** Time is wasted optimizing compute kernels instead of addressing the true memory bandwidth bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer execution: 400 Giga-Ops (INT8) per frame.
    - Data read/write: 600 MB per frame.
    - Hardware: 275 TOPS (INT8), 204.8 GB/s bandwidth.
    
    **Calculations:**
    - Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.
    - Workload AI: 400 GOps / 600 MB = 400e9 / 600e6 = 667 Ops/Byte.
    - Comparison: 667 < 1,343.
    
    **Conclusion & Interpretation:**
    - **Result: ~136.6 TOPS (Memory-Bound)**. Achievable performance is only 50% of peak because the layer is memory-bound.
  options:
  - Compute-bound, because the hardware's ridge point is only ~1.3 Ops/Byte, which the workload far exceeds.
  - Compute-bound, because the 400 Giga-Ops workload is a significant fraction of the chip's 275 TOPS capacity.
  - It is perfectly balanced, as the arithmetic intensity and ridge point are roughly within a factor of 2x of each other.
  - Memory-bound, because its arithmetic intensity (~667 Ops/Byte) is lower than the hardware's ridge point (~1343 Ops/Byte).
