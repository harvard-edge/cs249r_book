title: The YUV Conversion Bottleneck
scenario: Your autonomous driving stack receives 4K camera frames. The hardware ISP outputs standard YUV420 format. Your object detection model expects RGB input. You add a simple OpenCV `cvtColor(YUV2RGB)` at the start of your Python inference loop.
question: Why is the NPU only running at 40% utilization while you are dropping frames?
details:
  realistic_solution: |
    The CPU is choking on the memory bandwidth required to convert the image. `cvtColor` is an element-wise operation running on the main CPU. It must read the 4K YUV image from RAM, perform math on millions of pixels sequentially, and write a massive 4K RGB image back to RAM, all before the NPU can even begin its first convolution. This starves the NPU because it sits completely idle waiting for the CPU to finish its data-prep chore.
  common_mistake: |
    **The Pitfall:** Assuming simple image conversions are computationally "free" operations.
    **The Rationale:** Ignoring the CPU's severe memory bandwidth limitations when handling high-resolution, uncompressed video streams.
    **The Consequence:** Starving the high-performance NPU because it sits completely idle waiting for the CPU to finish sequential data preparation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Size: 4K (YUV420 = 12.4 MB, RGB = 25 MB).
    - Rate: 30 FPS.

    **Calculations:**
    - Memory Read/Write per Frame: 12.4 MB + 25 MB = 37.4 MB.
    - Total Memory Bandwidth: 37.4 MB * 30 FPS = 1.12 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.12 GB/s single-threaded CPU load starves NPU (Memory Bandwidth and CPU-Bound)**.
