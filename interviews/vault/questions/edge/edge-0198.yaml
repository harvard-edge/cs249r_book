title: The Perception Model's Memory Diet
scenario: Your team at a self-driving car company is trying to deploy a new object detection model onto
  a vehicle's compute unit, which is based on the NVIDIA Jetson AGX Orin. The model currently runs in
  FP16 precision. It has 50 million parameters and its largest activation map consumes 20 MB of memory.
  To improve performance and reduce the memory footprint, your team wants to quantize it to INT8. Explain
  the total memory savings (for both weights and activations) you would expect from this quantization.
question: "What total memory savings for weights and the largest activation should you expect when quantizing the 50M-parameter FP16 model to INT8?"
details:
  realistic_solution: Quantizing from FP16 (2 bytes per value) to INT8 (1 byte per value) reduces the
    size of both weights and activations by a factor of 2. You must account for both to get the total
    savings.
  common_mistake: Engineers often calculate the memory savings for the model weights but forget to account
    for the savings from quantizing the activation maps. Since activations can be a significant portion
    of the total memory footprint, especially for vision models, ignoring them leads to a major underestimation
    of the total savings.
  napkin_math: '1. Calculate FP16 weight memory: 50M params * 2 bytes = 100 MB'
  options:
  - 50 MB savings
  - 10 MB savings
  - 60 MB savings
  - 150 MB savings
  correct_index: 2
