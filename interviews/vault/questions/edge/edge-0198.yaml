title: The Perception Model's Memory Diet
scenario: Your team at a self-driving car company is trying to deploy a new object detection model onto a vehicle's compute unit. The model currently runs in FP16 precision. It has 50 million parameters and its largest activation map consumes 20 MB of memory. To improve performance and reduce the memory footprint, your team wants to quantize it to INT8.
question: What total memory savings for weights and the largest activation should you expect when quantizing the 50M-parameter FP16 model to INT8?
details:
  realistic_solution: Quantizing from FP16 (2 bytes per value) to INT8 (1 byte per value) reduces the size of both weights and activations by a factor of 2. You must account for both to get the total savings.
  common_mistake: |
    **The Pitfall:** Calculating memory savings for weights but forgetting activations.
    **The Rationale:** Engineers often focus entirely on parameter count, missing that activation maps are a significant portion of the memory footprint in vision models.
    **The Consequence:** A major underestimation of the total memory savings achieved by quantization.
  napkin_math: |
    - **FP16 weight memory:** 50M params * 2 bytes = 100 MB.
    - **INT8 weight memory:** 50M params * 1 byte = 50 MB.
    - **Weight savings:** 50 MB.
    - **Activation savings:** Drops from 20 MB (FP16) to 10 MB (INT8) = 10 MB savings.
    - **Final result:** **50 MB + 10 MB = 60 MB total savings.**
  options:
  - 50 MB savings
  - 10 MB savings
  - 60 MB savings
  - 150 MB savings
  correct_index: 2
