title: 'Latency Decomposition: Size E2E Latency for Smart Camera on Jetson Orin'
scenario: 'Concretely size the end-to-end latency for a smart camera system on Jetson Orin (275 TOPS INT8,
  204 GB/s LPDDR5, 60W). Pipeline: 1080p frame capture → ISP processing → object detection (YOLOv8-n,
  4.2 GOPs INT8) → face recognition CNN (1.2 GOPs INT8) → JSON event output over MQTT. Target: process
  every frame at 30fps (33ms budget).'
details:
  realistic_solution: 'Frame capture: 1080p at 30fps = 33ms inter-frame, capture itself 0.5ms. ISP (hardware):
    2ms. YOLOv8-n: 4.2G/275T ≈ 0.015ms compute, realistic with memory ops ~3ms. Face recognition: 1.2G/275T
    ≈ 1ms. JSON serialize: 0.5ms. MQTT publish (local broker): 1ms. Total: ~8ms. 25ms slack for multiple
    detections and post-processing.'
  common_mistake: Forgetting ISP processing time and MQTT serialization/network latency in the budget;
    treating inference as the only component.
  napkin_math: 'YOLOv8-n: 4.2 GOPs. 4.2G/275T = 0.015ms ideal. Memory: 1080×1920×3=6.2MB input. 6.2MB/204GB/s
    = 0.03ms transfer. Realistic inference with kernel overhead: 3ms. Face CNN: ~1ms. Pipeline total:
    0.5+2+3+1+0.5+1 = 8ms << 33ms budget. System can handle burst of 4 faces without missing frames.'
