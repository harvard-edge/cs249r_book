title: Edge DMA Double Buffer Budget
scenario: An edge accelerator processes 4 MB input tiles every 25 ms. Host-to-device DMA sustains 800 MB/s. Size whether a double-buffered DMA pipeline can feed the accelerator without stalls.
question: Can 800 MB/s DMA feed 4 MB tiles every 25 ms in a double-buffered edge pipeline?
details:
  realistic_solution: The required input bandwidth is 4 MB / 25 ms = 160 MB/s. Sustained DMA at 800 MB/s has 5x bandwidth headroom. A double buffer needs at least 8 MB plus alignment/padding, and stalls are more likely from synchronization or setup overhead than raw bandwidth.
  common_mistake: Comparing tile size to memory capacity only and forgetting the per-frame bandwidth rate.
  napkin_math: Demand = 4 MB / 0.025 s = 160 MB/s. Headroom = 800/160 = 5x. Double buffer = 2 x 4 MB = 8 MB.
