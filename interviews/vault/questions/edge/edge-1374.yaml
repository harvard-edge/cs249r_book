title: Encoder-Decoder Latency on Edge TPU
scenario: We are evaluating architectures for a sequence task on a Google Coral Edge TPU. An INT8 quantized encoder-decoder model requires 10 Giga-Operations (GOPS) for the encoder pass and 2 GOPS per generated token in the decoder. Assuming 100% compute utilization and no memory bottlenecks, determine the latency for generating a 10-token output sequence.
question: What is the theoretical minimum latency to generate 10 tokens with a 10 GOPS encoder and 2 GOPS per decoder token?
details:
  realistic_solution: 'To find the theoretical minimum latency, we must first sum the total operations required for the entire sequence generation: one encoder pass plus ten decoder passes. We then convert the hardware''s processing rate to match units (GOPS) and divide total operations by this rate to find latency in seconds, finally converting to milliseconds.'
  common_mistake: |
    **The Pitfall:** Confusing Tera-Operations (TOPS) with Giga-Operations (GOPS) or forgetting that decoder latency scales linearly with the number of generated tokens.
    **The Rationale:** Candidates often misalign unit magnitudes or misunderstand the auto-regressive nature of decoder inference.
    **The Consequence:** Produces calculations that are off by orders of magnitude or completely underestimate the sequence generation time.
  napkin_math: |
    1. Encoder operations = 10 GOPS.
    2. Decoder operations = 10 tokens * 2 GOPS/token = 20 GOPS.
    3. Total operations = 10 GOPS + 20 GOPS = 30 GOPS.
    4. Hardware processing rate = 4 TOPS = 4,000 GOPS.
    5. Latency = Total Operations / Processing Rate = 30 GOPS / 4,000 GOPS/sec = 0.0075 seconds.
    6. Latency in milliseconds = 0.0075 * 1000 = **7.5 ms**.
