title: Batching Vision Transformers for TOPS Utilization
scenario: A Jetson AGX Orin (up to 275 TOPS) is running a batch size 1 vision transformer.
  The profile shows 10 TOPS actual utilization.
question: Apply a system-level change to increase utilization without changing the
  model weights or input resolution.
details:
  realistic_solution: Increase the batch size to process multiple concurrent camera
    streams or pipeline frames if latency limits allow. This increases arithmetic
    intensity, hiding LPDDR5 memory latency and driving actual MAC utilization toward
    the peak TOPS rating.
  common_mistake: Blaming the compiler for low TOPS utilization when the math is fundamentally
    starved by low batch size arithmetic intensity.
  napkin_math: intensity = bs * MACs / (Weights + bs*Acts)
