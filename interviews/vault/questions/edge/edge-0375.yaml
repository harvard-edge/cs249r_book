title: The Efficiency Litmus Test
scenario: 'You are evaluating different accelerators like the Jetson AGX Orin and Hailo-8 for an autonomous vehicle''s perception stack. The primary constraint is the vehicle''s 30W power budget for this component.'
question: 'What is the single most important efficiency metric you should use to compare how much compute performance each chip delivers for a given amount of power?'
details:
  realistic_solution: 'The key metric is **TOPS/W** (Trillion Operations Per Second per Watt). This metric directly measures computational efficiency, answering the question: ''For every watt of power I spend, how much compute do I get?'' In a power-constrained environment like a car, this is the most critical factor for choosing hardware.'
  common_mistake: |
    **The Pitfall:** Fixating on the headline number of peak TOPS.
    **The Rationale:** Engineers focus on absolute performance (TOPS) without considering the power required to achieve it. A chip with massive TOPS is unusable if it consumes 300W in a power-constrained vehicle.
    **The Consequence:** Selecting hardware that blows past the thermal or power budget, causing system instability or requiring expensive, heavy cooling systems.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8: 26 TOPS / 2.5W = 10.4 TOPS/W.
    - Jetson AGX Orin: 275 TOPS / 60W = ~4.6 TOPS/W.

    **Calculations:**
    - TOPS/W provides an apples-to-apples comparison of computational efficiency within a strict power budget.

    **Conclusion & Interpretation:**
    - **Result: TOPS/W provides an apples-to-apples comparison of computational efficiency within a strict power budget (Power-Bound)**.
  options:
  - 'Peak TOPS'
  - 'Power Draw (Watts)'
  - 'TOPS / Watt'
  - 'PUE (Power Usage Effectiveness)'
