title: The INT8 vs FP16 Energy Budget
scenario: Your team is deploying a perception model on a battery-constrained autonomous robot. To extend
  mission time, you're evaluating quantization strategies. State the approximate energy consumption ratio
  between a single FP16 operation and an INT8 operation. How much more energy does the FP16 operation
  consume?
details:
  realistic_solution: An FP16 operation consumes roughly 5× more energy than an INT8 operation. While
    the exact number depends on the specific hardware architecture, the fundamental physics of computation
    show that the energy required for a floating-point operation is significantly higher than for an integer
    operation, far exceeding the 2x difference in bit width.
  common_mistake: Engineers often conflate memory savings with energy savings. They see that INT8 uses
    half the bits of FP16 and incorrectly assume the energy savings are also 2×. This ignores the disproportionately
    higher energy cost of floating-point arithmetic units (which handle mantissa and exponent logic) compared
    to simpler integer ALUs.
  napkin_math: 'The source-of-truth constants state that the energy ratio of FP32 vs. INT8 is ~18×, and
    the ratio of FP32 vs. FP16 is ~3.4×. We can find the FP16 vs. INT8 ratio by using FP32 as a common
    reference point:'
  options:
  - ~2x more energy
  - ~5x more energy
  - ~18x more energy
  - The energy consumption is roughly the same
  correct_index: 1
