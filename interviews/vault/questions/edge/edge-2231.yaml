title: Chiplet Design for Edge Inference Power Constraints
scenario: You are designing an edge inference accelerator with a 10W TDP.
question: Why is a 2x5W chiplet design preferable to one 10W monolithic die for an edge inference accelerator?
details:
  realistic_solution: 'At 10W TDP, a monolithic die must throttle more aggressively because any hot spot on the die affects the whole package. Two 5W chiplets can thermal-throttle independently, allowing specialized compute to stay within local thermal budgets.'
  common_mistake: Assuming chiplets always add significant power overhead from die-to-die links and underestimating the thermal management advantages of chiplets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10W TDP limit
    - Defect density D0=0.05, 10W die A=1.2 cm^2, 5W die A=0.6 cm^2

    **Calculations:**
    - Monolithic Yield = (1 + 0.05 * 1.2 / 2)^-2 = 94.2%
    - Single Chiplet Yield = (1 + 0.05 * 0.6 / 2)^-2 = 97.1%
    - Dual Chiplet Yield = 0.971^2 = 94.3%

    **Conclusion & Interpretation:**
    - **Result: 94% Yield (Power-Bound)**. Since yield is comparable, the chiplet architecture is vastly superior for independent thermal management and preventing aggressive localized throttling.
