title: Chiplet Design for Edge Inference Power Constraints
scenario: You are designing an edge inference accelerator with a 10W TDP.
question: Why is a 2x5W chiplet design preferable to one 10W monolithic die for an edge inference accelerator?
details:
  realistic_solution: 'At 10W TDP, a monolithic die must throttle more aggressively because any hot spot on the die affects the whole package. Two 5W chiplets can thermal-throttle independently, allowing specialized compute to stay within local thermal budgets. While smaller dies typically have better yield, at these specific sizes the yields are comparable, meaning the thermal advantage dominates.'
  common_mistake: |
    **The Pitfall:** Assuming chiplets always add significant power overhead from die-to-die links.
    **The Rationale:** Candidates overestimate the power of short-distance links (interposers) and underestimate the thermal management advantages of chiplets.
    **The Consequence:** Choosing a monolithic design that suffers from aggressive thermal throttling due to localized hot spots.
  napkin_math: |
    - **Single Die Yield:** Single 10W die at 7nm (D0=0.05, A=1.2 cm^2): Y = (1 + 0.05 * 1.2 / 2)^-2 ≈ 94.2%.
    - **Chiplet Yield:** Two 5W chiplets (A=0.6 cm^2 each): Y = (1 + 0.05 * 0.6 / 2)^-2 ≈ 97.1% each.
    - **Dual Chiplet Yield:** P(both good) = 0.971^2 ≈ 94.3%.
    - **Result:** Both designs offer **~94% yield**, making the choice heavily favor the chiplet design for its **superior independent thermal management**.
