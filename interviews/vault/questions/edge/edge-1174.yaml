title: 'Edge TCO Realization: Unit Economics for Edge AI Product'
scenario: A commercial edge AI product based on Hailo-8 sells at $999 retail. BOM components include Hailo-8=$200, RPi CM4=$55, PCB+enclosure=$80, power supply=$15, assembly=$30. Distribution margin is 30%. Warranty reserve is 5%. Fixed development costs are $500K.
question: What are the gross margin, net unit margin, and break-even volume for the $999 Hailo-8 edge AI product?
details:
  realistic_solution: Calculate net revenue by subtracting the distribution margin. Calculate COGS by summing the BOM and adding the warranty reserve. Subtract COGS from net revenue to find net margin per unit. Finally, divide the fixed development costs by the net margin per unit to determine the break-even volume.
  common_mistake: |
    **The Pitfall:** Calculating gross margin purely as (price - BOM) / price.
    **The Rationale:** Failing to include distribution margins and warranty reserves in unit economics.
    **The Consequence:** Drastically overestimating profitability and underestimating the break-even volume.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Retail price: $999. BOM: $380.
       - Distribution margin: 30%. Warranty reserve: 5%.
       - Fixed costs: $500,000.
    2. **Calculations:**
       - Net Revenue = $999 * (1 - 0.30) = $699.30.
       - Warranty Cost = $999 * 0.05 = $49.95.
       - COGS = $380 + $49.95 = $429.95.
       - Net Unit Margin = $699.30 - $429.95 = $269.35.
       - Gross Margin % = $269.35 / $699.30 = 38.5%.
       - Break-even Volume = $500,000 / $269.35 = 1856.3.
    3. **Conclusion & Interpretation:**
       - **Result: Financial-Bound. The break-even volume is 1857 units with a 38.5% gross margin.**
