title: The Rain-Soaked Quantization Cliff
scenario: Your outdoor person detection system (Qualcomm RB5, Hexagon DSP, 15 TOPS INT8) achieves 94%
  mAP on your test set. After deploying 1,000 units, you discover that accuracy drops to 68% mAP during
  rain and to 52% during heavy snow — but only on the INT8 quantized model. The FP32 version of the same
  model scores 89% in rain and 81% in snow. Why does quantization amplify the weather-related accuracy
  drop?
details:
  realistic_solution: 'The INT8 calibration dataset didn''t include rain or snow conditions. During post-training
    quantization (PTQ), the calibration step determines the dynamic range (min/max) of each activation
    tensor using representative data. If calibration uses only clear-weather images, the activation ranges
    are tuned for that distribution. Rain and snow introduce: (1) **Low-contrast features** — raindrops
    and snowflakes reduce contrast, pushing activations into a narrower range. With INT8''s 256 levels
    calibrated for clear-weather''s wider range, the rain-condition activations occupy only ~40 levels
    — severe quantization noise. (2) **High-frequency noise** — rain streaks and snowflakes create high-frequency
    patterns that activate early convolutional filters differently. These activations may exceed the calibrated
    max, causing **clipping** — values above the calibration max are clamped to 127, losing all discriminative
    information.'
  common_mistake: '"The model wasn''t trained on enough rain/snow data." Training data matters, but it
    doesn''t explain why FP32 handles rain at 89% while INT8 drops to 68% — a 21-point gap from quantization
    alone.'
  napkin_math: 'Clear-weather activation range: [-3.2, 4.8] → INT8 scale = 8.0/255 = 0.031 per level.
    Rain-condition activation range: [-1.1, 1.8] → occupies (2.9/8.0) × 255 = 92 levels out of 255. Effective
    precision: 92/255 = 36% of the available dynamic range → equivalent to ~6.5-bit quantization, not
    8-bit. With weather-inclusive calibration: range widens to [-4.0, 5.5] → rain activations occupy (2.9/9.5)
    × 255 = 78 levels. Still reduced, but per-channel quantization recovers the remaining gap. QAT result:
    INT8 rain mAP improves from 68% to 86% — within 3 points of FP32.'
