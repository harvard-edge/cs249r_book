title: 'Edge TCO Design: Size Fleet Budget for Autonomous Vehicle Fleet'
scenario: 'Design the inference compute budget for an autonomous vehicle (AV) company deploying 10,000
  robotaxis. Each AV needs: 1 Jetson Orin (60W, $499), 1 Hailo-8 for backup (2.5W, $200). Target: 5-year
  fleet, 24/7 operation, 50% uptime (charging/garage). Include hardware, power from vehicle battery at
  $0.12/kWh-equivalent, annual maintenance, and OTA costs.'
details:
  realistic_solution: 'Per vehicle: Jetson 60W + Hailo 2.5W = 62.5W at 50% uptime = 31.25W avg. HW: $499+$200=$699.
    Power: 31.25W * 8760hr * 5yr / 1000 * $0.12 = $163.8. Annual maintenance (3%): $699*0.03=$21/yr. OTA:
    $500/vehicle/yr. 5yr per vehicle: $699 + $163.8 + 5*($21+$500) = $699+$164+$2605=$3,468. Fleet (10K):
    $34.68M. Comparison: pure cloud for AV is infeasible (latency: round-trip to cloud = 100ms+ vs 10ms
    requirement). Edge mandatory for AV. Revenue model: $34.68M / 10K vehicles / 5yr / 365 / 24hr = $0.079/hr
    hardware cost per vehicle. Vs $15-20/hr revenue target: 0.5% of revenue.'
  common_mistake: Forgetting that AV power comes from the vehicle battery (ultimately from charging),
    and not converting vehicle power cost into $/kWh equivalent based on electricity cost for EV charging.
  napkin_math: 'Per vehicle: 62.5W * 0.5 utilization = 31.25W. Power 5yr: 31.25W * 43800hr * $0.12/kWh
    = $164. HW: $699. OTA 5yr: $2500. Maintenance 5yr: $105. Total: $3,468. Fleet: $34.68M. Per vehicle
    amortized: $3468/5yr=$694/yr=$57.8/month. AV subscription: $1000-2000/month. Compute hardware = 5.8%
    of AV cost. Other costs (lidar, cameras, actuators, insurance): ~$150K/vehicle. Inference compute
    is small fraction of AV TCO. Jetson Orin specifically designed for this: ~3 Jetsons/AV (front, side,
    rear clusters).'
