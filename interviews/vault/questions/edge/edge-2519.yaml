title: Unified Memory KV Read Bandwidth
scenario: An LLM on an Apple A17 Pro Neural Engine maintains a 2 GB sliding window
  KV cache. Unified Memory bandwidth is 50 GB/s.
question: Determine the memory bandwidth utilization consumed purely by the KV cache
  during generation at 20 tokens per second.
details:
  realistic_solution: In the auto-regressive decoding phase, the entire 2 GB KV cache
    must be streamed from Unified Memory into the NPU for every single token generated.
    2 GB/token * 20 tokens/sec = 40 GB/s. This consumes 80% of the total system memory
    bandwidth.
  common_mistake: Assuming the entire 2 GB KV cache stays resident in NPU SRAM, ignoring
    that edge NPUs lack multi-GB SRAM and are heavily memory-bandwidth bound during
    decoding.
  napkin_math: (2 GB * 20 tokens/s) / 50 GB/s = 40 / 50 = 80% bandwidth saturation.
