title: Unified Memory KV Read Bandwidth
scenario: An LLM on an Apple A17 Pro Neural Engine maintains a 2 GB sliding window KV cache. Unified Memory bandwidth is 50 GB/s.
question: What is the memory bandwidth utilization consumed purely by the KV cache during generation at 20 tokens per second?
details:
  realistic_solution: In the auto-regressive decoding phase, the entire 2 GB KV cache must be streamed from Unified Memory into the NPU for every single token generated. 2 GB/token * 20 tokens/sec = 40 GB/s. This consumes 80% of the total system memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the entire 2 GB KV cache stays resident in NPU SRAM.
    **The Rationale:** Candidates apply data center GPU intuition (where large SRAM or HBM exists) to edge NPUs, ignoring their severe memory-bandwidth constraints.
    **The Consequence:** Completely underestimating the auto-regressive decoding bottleneck, leading to wildly inaccurate latency projections.
  napkin_math: |
    1. KV cache size = 2 GB per token generation step.
    2. Target generation rate = 20 tokens/sec.
    3. Required memory bandwidth = 2 GB/token * 20 tokens/s = 40 GB/s.
    4. Total available bandwidth = 50 GB/s.
    5. Bandwidth saturation = 40 / 50 = **80%**.
