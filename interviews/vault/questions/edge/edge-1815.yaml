title: Jetson Orin Multi-Model TensorRT Deployment
scenario: 'You are tasked with deploying a complex vision pipeline consisting of a heavy object detector and a lightweight semantic segmentation model on an NVIDIA Jetson Orin. The device features an Ampere GPU, a DLA accelerator, 64 GB LPDDR5 memory, and has a strict 60W TDP constraint.'
question: How would you convert and delegate the detector and segmentation models on Jetson Orin to maximize INT8 performance under 60W?
details:
  realistic_solution: 'The optimal specification converts PyTorch models to ONNX, then compiles them into TensorRT engines. To maximize the 275 TOPS and stay under the 60W TDP, the heavy object detector is compiled for the Ampere GPU in INT8 precision, while the segmentation model is explicitly delegated to the DLA. Any operator gaps during ONNX export are resolved by writing custom TensorRT plugins or modifying the source model architecture to use supported operations rather than allowing CPU fallbacks.'
  common_mistake: |
    **The Pitfall:** Running all models on the Ampere GPU.
    **The Rationale:** Candidates neglect the DLA accelerator assuming the GPU is powerful enough to handle everything.
    **The Consequence:** This leads to suboptimal power usage that quickly exceeds the 60W TDP when multiple models are running concurrently.
  napkin_math: |
    *   **Compute Requirements:** Detector (150 GOPS at 60 FPS) = 9 TOPS. Segmentation (50 GOPS at 60 FPS) = 3 TOPS. Total = 12 TOPS.
    *   **Memory Bandwidth (FP32):** A 2GB FP32 model requires reading 2GB per inference; at 60 FPS = 120 GB/s.
    *   **Memory Bandwidth (INT8):** Converting to INT8 reduces model to ~0.5GB, requiring only 30 GB/s from LPDDR5.
    *   **Result:** **INT8 is required not for compute, but to drastically reduce memory bandwidth power consumption to stay within the 60W TDP.**
