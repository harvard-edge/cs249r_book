title: Streaming Data Validation for Hailo-8 Edge Inference
scenario: You are designing the data ingestion and validation pipeline for a multi-camera smart city deployment using a host processor connected to a Hailo-8 accelerator. Because the Hailo-8 has no local DRAM and relies on streaming data directly from host memory, processing corrupted or out-of-distribution frames wastes critical host-to-accelerator bandwidth.
question: Evaluate the architectural tradeoffs between performing lightweight data quality checks on the host CPU versus running a small validation model on the Hailo-8, sizing the bandwidth and compute requirements for 4x 1080p 30 FPS streams.
details:
  realistic_solution: 'A strong candidate will evaluate the host-device bottleneck. They will propose a hybrid approach: simple thresholding heuristics on the host CPU during the frame decode step to drop obviously bad frames early, combined with a quantized INT8 lightweight anomaly detection layer fused into the early stages of the main model on the Hailo-8. This leverages the dataflow architecture to seamlessly process validated features deeper into the network without extra memory round-trips.'
  common_mistake: |
    **The Pitfall:** Proposing to run all validation checks on the host CPU.
    **The Rationale:** Candidates assume validation is a preprocessing step best suited for general-purpose CPUs without calculating the host memory bandwidth impact.
    **The Consequence:** The host-device bottleneck is worsened, and the continuous dataflow architecture of the Hailo-8 is interrupted, negating its efficiency.
  napkin_math: |
    - **Raw Data Bandwidth:** 4 streams * 1920 * 1080 pixels * 3 channels * 30 FPS = ~746 MB/s.
    - **PCIe Usage:** 746 MB/s consumes ~19% of a standard PCIe Gen3 x4 bandwidth (~3.9 GB/s).
    - **Compute Requirement:** 2 GOPS/frame * 120 total FPS = 240 GOPS (0.24 TOPS).
    - **Compute Utilization:** 0.24 TOPS / 26 TOPS = **<1% of the accelerator's capacity**.
