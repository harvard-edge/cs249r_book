title: Streaming Data Validation for Hailo-8 Edge Inference
scenario: You are designing the data ingestion and validation pipeline for a multi-camera
  smart city deployment using a host processor connected to a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W). Because the Hailo-8 has no local DRAM and relies on streaming
  data directly from host memory, processing corrupted or out-of-distribution frames
  wastes critical host-to-accelerator bandwidth. Evaluate the architectural tradeoffs
  between performing lightweight data quality checks (e.g., blur detection, blank
  frame removal) on the host CPU versus running a small validation model on the Hailo-8
  prior to the main inference task. Size the bandwidth and compute requirements for
  validating 4x 1080p camera streams at 30 FPS.
question: Where should lightweight validation run for 4x 1080p 30 FPS streams on Hailo-8,
  and how do bandwidth and compute shape that choice?
details:
  realistic_solution: 'A strong candidate will evaluate the host-device bottleneck.
    They will propose a hybrid approach: simple thresholding heuristics on the host
    CPU during the frame decode step to drop obviously bad frames early, combined
    with a quantized INT8 lightweight anomaly detection layer fused into the early
    stages of the main model on the Hailo-8. This leverages the dataflow architecture
    to seamlessly process validated features deeper into the network without extra
    memory round-trips.'
  common_mistake: Candidates often propose running all validation checks on the host
    CPU without calculating the impact on host memory bandwidth, or they suggest complex
    sequential validation models that interrupt the continuous dataflow architecture
    of the Hailo-8, negating its efficiency.
  napkin_math: 4 streams * 1920 * 1080 pixels * 3 channels * 30 FPS = ~746 MB/s of
    raw INT8 image data. This consumes ~20% of a standard PCIe Gen3 x4 bandwidth (~3.9
    GB/s). If a validation model requires 2 GOPS per frame, at 120 total FPS, it requires
    240 GOPS. The Hailo-8 provides 26,000 GOPS (26 TOPS) at 2.5W, meaning the validation
    model consumes less than 1% of the accelerator's compute capacity (0.009 TOPS)
    and negligible additional power, making fused on-device validation highly efficient.
