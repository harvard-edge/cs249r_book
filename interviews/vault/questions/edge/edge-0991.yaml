title: Edge Load Imbalance Diagnosis
scenario: Three edge gateways each have 100 rps capacity. Traffic is 180 rps total,
  but one gateway is overloaded at 120 rps while the others are at 30 rps each. Analyze
  the failure.
question: Why is one edge gateway overloaded when total traffic is only 180 rps across
  300 rps of capacity?
details:
  realistic_solution: The issue is load imbalance, not total capacity. Routing, sticky
    sessions, camera affinity, or hash partitioning is sending too much traffic to
    one gateway. The fix is balancing policy or shard reassignment, not simply adding
    capacity.
  common_mistake: Looking at aggregate capacity and missing per-node hot spots.
  napkin_math: Total utilization is 180/300 = 60%, but the hot gateway is 120/100
    = 120% utilized.
