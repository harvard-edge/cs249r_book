title: Edge Load Imbalance Diagnosis
scenario: Three edge gateways each have 100 rps capacity. Traffic is 180 rps total, but one gateway is overloaded at 120 rps while the others are at 30 rps each.
question: Why is one edge gateway overloaded when total traffic is only 180 rps across 300 rps of capacity, and how would you fix it?
details:
  realistic_solution: The issue is load imbalance driven by flawed ingress architecture. Sticky sessions, coarse-grained camera affinity, or skewed hash partitioning are routing disproportionate traffic to a single node. The fix involves implementing dynamic Layer 7 load balancing or fine-grained shard reassignment, rather than indiscriminately scaling up hardware.
  common_mistake: |
    **The Pitfall:** Looking only at aggregate capacity and ignoring per-node distribution.
    **The Rationale:** Engineers often average traffic across the cluster, assuming perfect load balancing.
    **The Consequence:** Unnecessary capacity upgrades instead of fixing the underlying routing or sharding issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Capacity: 300 rps (100 rps per gateway).
       - Total Traffic: 180 rps.
    2. **Calculations:**
       - System Utilization: 180 rps / 300 rps = 60%.
       - Hot Node Utilization: 120 rps / 100 rps = 120%.
    3. **Conclusion & Interpretation:**
       - **Result: Imbalance-Bound.** While aggregate capacity is ample, flawed load distribution structurally overloads a single gateway.
