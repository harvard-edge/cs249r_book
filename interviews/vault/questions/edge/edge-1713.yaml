title: Storage I/O Optimization for Qualcomm AI 100
scenario: An on-premise video analytics appliance using a Qualcomm Cloud AI 100 (32
  GB LPDDR4x, 400 TOPS INT8, 75W) is severely underutilized, hitting only 10% of its
  compute capacity. The pipeline currently reads independent JSON metadata files and
  raw PNG images from an edge NVMe drive. You need to diagnose this data loading bottleneck
  and propose an optimized storage format that can keep the accelerator fully fed.
question: What data-loading bottleneck is leaving the Cloud AI 100 at 10% utilization,
  and what storage format would keep it fed?
details:
  realistic_solution: The ideal solution involves migrating to a sequential binary
    format like TFRecord or WebDataset, interleaving metadata and images. To balance
    PCIe bandwidth and CPU decompression overhead, lightweight compression like LZ4
    or Snappy should be used. This allows large sequential reads from the NVMe drive
    directly into the host memory, minimizing CPU parsing overhead before transferring
    to the 32 GB LPDDR4x on the accelerator.
  common_mistake: Candidates often suggest migrating all data to a columnar format
    like Parquet, not realizing it is suboptimal for storing large uncompressed image
    tensors. Alternatively, they might propose aggressive compression like GZIP, which
    reduces disk I/O but introduces a massive CPU decompression bottleneck on the
    limited edge host.
  napkin_math: Assuming the AI 100 processes a 40 GOPs INT8 model at its 400 TOPS
    peak, it can process 10,000 frames/sec. A raw 224x224 RGB image is ~150 KB. To
    fully saturate the AI 100, the data loader must supply 10,000 * 150 KB = 1.5 GB/s
    of data. Reading 10,000 individual PNGs and JSONs per second incurs massive filesystem
    overhead (IOPS bottleneck) and decoding latency. Packing them into 100 MB TFRecord
    shards allows sequential disk reads at >2 GB/s, easily satisfying the 1.5 GB/s
    requirement to utilize the full 400 TOPS.
