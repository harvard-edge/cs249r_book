title: Optimizing Multi-branch Vision Model Inference on Google Coral Edge TPU
scenario: You are tasked with deploying a multi-branch real-time object detection model onto a Google Coral Edge TPU. The Coral features 4 TOPS INT8 performance and operates within a 2W power budget, processing exclusively in INT8. Initial profiling shows the model is bottlenecked by latency, and peak memory usage is close to the device's limits.
question: How would you optimize operator execution order on the Coral Edge TPU for the multi-branch INT8 detector to reduce latency, memory, and energy?
details:
  realistic_solution: |
    Analyze the computation graph to identify critical paths. (1) Memory Reuse: use topological sort to deallocate large intermediate tensors early. (2) Parallel Execution: identify independent subgraphs for concurrent execution. (3) Layer Fusion: group Conv-BN-ReLU into single fused kernels to reduce memory access latency.
  common_mistake: |
    **The Pitfall:** Focusing solely on model quantization or pruning without addressing execution graph optimization.
    **The Rationale:** Overlooking data dependencies, attempting to parallelize sequential operations, or ignoring memory transfer overheads between non-fused operations.
    **The Consequence:** Failing to reach latency and memory targets despite deploying an INT8 model, due to inefficient memory reuse and kernel overhead.
  napkin_math: |
    - Critical path compute: 10 billion INT8 ops (10 GOPS).
    - Execution time: 10 GOPS / 4 TOPS = 0.0025 seconds (2.5 ms).
    - Memory bandwidth unoptimized: 1 GB/s. Fused bandwidth: 200 MB/s.
    - **Result: 2.5 ms compute leaves ample headroom in the 33ms budget for memory transfers and parallel branching.**
