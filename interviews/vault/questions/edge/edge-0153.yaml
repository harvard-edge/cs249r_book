title: The Kernel Launch Tax
scenario: An engineer is optimizing a vision model for a 33ms real-time deadline on an edge device. They use a compiler to fuse a Conv2D layer, a BatchNorm layer, and a ReLU activation into a single GPU kernel.
question: What is the primary overhead that this operator fusion reduces?
details:
  realistic_solution: |
    The primary overhead reduced is kernel launch latency and intermediate memory I/O. Each time the CPU asks the GPU to run a kernel, there's a fixed overhead cost. Furthermore, the output of each separate operation must be written to main memory and read back. A fused kernel is launched only once, and intermediate data stays within the GPU's fast on-chip SRAM/caches.
  common_mistake: |
    **The Pitfall:** Believing that operator fusion reduces the total number of computations (FLOPs).
    **The Rationale:** Engineers assume "faster" means "fewer math operations," not realizing the math is identical but the data movement is drastically reduced.
    **The Consequence:** Focusing on pruning or quantization when simply enabling compiler fusion could solve the latency issue without accuracy loss.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Kernel Launch Overhead: ~5 µs per launch.
       - Memory Access Time: ~100 ns.
       - Number of kernels fused: 3 into 1 (saves 2 launches).
    2. **Calculations:**
       - Launch Time Saved: 2 * 5 µs = 10 µs.
       - Memory Equivalent: 10 µs / 100 ns = 100 main memory accesses avoided.
    3. **Conclusion & Interpretation:**
       - **Result: 10 µs saved per fused block (Kernel Launch-Bound).** Intermediate memory I/O is drastically reduced.
  options:
  - Total floating-point operations (FLOPs) of the model.
  - The model's memory footprint on disk.
  - Kernel launch overhead and DRAM traffic between layers.
  - The peak power draw of the accelerator.
