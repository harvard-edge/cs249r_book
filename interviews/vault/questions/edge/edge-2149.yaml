title: Depthwise Separable Conv vs Standard Conv Roofline on Jetson Orin DLA
scenario: Jetson Orin DLA runs at ~15 TOPS INT8. Compare standard 3x3 Conv (64->64
  channels, 112x112 input) vs depthwise separable Conv (same dimensions) on the DLA.
  Calculate FLOPs, parameters, and where each sits on the roofline.
question: On Orin DLA, how do 3x3 standard and depthwise separable 64->64 convs compare
  in FLOPs, parameters, and roofline position?
details:
  realistic_solution: 'Standard Conv: FLOPs = 2*64*64*3*3*112*112 = 924.8M. Params =
    64*64*3*3 = 36,864. DW-Sep Conv: DW FLOPs = 2*64*3*3*112*112 = 14.5M. PW FLOPs
    = 2*64*64*112*112 = 102.8M. Total = 117.3M — 7.9x fewer FLOPs. Standard Conv AI:
    924.8M FLOPs / (36.9KB weights + 1.6MB activations). Activation (INT8): 64*112*112*1B
    = 803KB in + 803KB out. Weights: 36.9KB. AI = 924.8M/(1.64MB) = 564 FLOPs/byte. 
    DW layer AI: 14.5M/(1.6MB + 576B) = 9 FLOPs/byte. PW layer AI: 102.8M/(1.6MB + 4KB)
    = 64 FLOPs/byte. DLA ridge ≈ 15T/100G = 150 FLOPs/byte. Standard Conv: AI (564) >
    ridge (150) -> compute-bound. DW-Sep: AI (9 and 64) < ridge -> memory-bound. DW
    layer throughput ceiling: 100 GB/s * 9 = 0.9 TOPS effective.'
  common_mistake: Comparing FLOPs without considering that depthwise convolution has
    much lower arithmetic intensity due to its smaller weight matrices, potentially
    moving it further into the memory-bound regime.
  napkin_math: 'DLA Memory BW: ~100 GB/s. Ridge: 15 TOPS/100 GB/s = 150 FLOPs/B. Standard
    Conv AI: 564 FLOPs/B -> compute-bound, ceiling = 15 TOPS. DW Conv AI: 9 FLOPs/B
    -> memory-bound. Standard Conv is much more DLA-efficient per FLOP despite higher
    total FLOPs.'
