title: 'Fault Tolerance: Design Checkpoint Strategy for Jetson Orin Continuous Inference'
scenario: 'You are deploying an object detection model on 500 Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) devices in autonomous warehouse robots. Each device runs 24/7.'
question: 'How would you design fault tolerance for model state and continuity across power loss, storage corruption, and model degradation?'
details:
  realistic_solution: 'Three failure modes: (1) Power loss: use atomic write with journaling for any model state. (2) Storage corruption: store model in redundant flash partitions (A/B update scheme). (3) Model degradation: monitor per-class detection confidence; rollback if drops > 10%.'
  common_mistake: |
    **The Pitfall:** Failing to distinguish between inference fault tolerance (model always available) and learning fault tolerance (online learning state preserved).
    **The Rationale:** Most edge deployments are static, so engineers don't anticipate the complexities of mutable on-device states.
    **The Consequence:** A sudden power loss corrupts the model state during a write operation, permanently bricking the robot's perception pipeline.
  napkin_math: |
    * Model size: 7M params × 1B (int8) = 7MB.
    * Two partitions (A/B) require 14MB on 32GB LPDDR5 (trivial).
    * Write 7MB at NVMe 500 MB/s = 14ms atomic write window.
    * Power loss during 14ms window: probability = 14ms / (MTBF_power × 86,400,000 ms/day).
    * Assuming MTBF_power = 365 days = 31.5B ms. Probability per write = 14 / 31.5B = 4.4×10⁻¹⁰.
    * 500 devices × 1 update/week = 500 writes/week.
    * Expected corruptions/year: 500 × 52 × 4.4×10⁻¹⁰ = 1.1×10⁻⁵.
    * **The A/B partition scheme combined with a 14ms atomic journal write reduces expected yearly corruptions to virtually zero.**
