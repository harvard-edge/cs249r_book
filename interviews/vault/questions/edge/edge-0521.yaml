title: 'The Self-Driving Stall: Diagnosing a Memory-Bound Vision Transformer'
scenario: You are an ML Systems Engineer at an automotive company designing a driver-monitoring system
  on a Jetson AGX Orin. Your prototype uses a large Vision Transformer (ViT) model, but profiling shows
  its inference latency is 45ms, badly missing your 30ms real-time deadline. The Orin's built-in profiler
  reports that GPU core utilization is only 25%, but the memory controller load is consistently near 100%
  during inference.
question: "Why is the ViT missing the 30ms deadline with 25% GPU utilization but near-100% memory-controller load on the Orin?"
details:
  realistic_solution: The correct approach is to use the Roofline model to diagnose the bottleneck. First,
    calculate the ViT's Arithmetic Intensity (AI). With an AI far below the hardware's ridge point, the
    model is confirmed to be memory-bound. This explains why the GPU is mostly idle—it's waiting for data.
  common_mistake: Engineers often fixate on peak GFLOPs or TOPS, assuming more compute is always the answer.
    They might incorrectly diagnose the problem as 'compute-bound' because the ViT has 32x more operations
    than the MobileNet. This leads them to suggest a more powerful GPU, ignoring the clear evidence of
    a memory bottleneck (low GPU utilization, high memory controller load).
  napkin_math: Let ViT require 0.8 TOps and move 8 GB of data. AI = 0.8e12 / 8e9 = 100 Ops/Byte. Orin
    Ridge Point = 275 TOPS / 204.8 GB/s = 1342 Ops/Byte. Because 100 << 1342, the ViT is extremely memory-bound.
    Transfer time = 8 GB / 204.8 GB/s = 39 ms. Compute time = 0.8e12 / 275e12 = 2.9 ms. Total time ~ 39
    ms + overheads = 45 ms.
  options:
  - The ViT's 16 GOPS are too high for the hardware, making it compute-bound. The MobileNet's 0.5 GOPS
    are a better fit for the available compute.
  - The low GPU utilization indicates a CPU bottleneck in the data preprocessing pipeline; the model choice
    is irrelevant until the data loading is fixed.
  - The ViT is memory-bound, confirmed by its low Arithmetic Intensity (100 Ops/Byte). Switching to MobileNet,
    which moves 10x less data, should reduce latency by ~10x to ~4.5 ms.
  - Both models are memory-bound, but the MobileNet has a lower Arithmetic Intensity (~17 Ops/Byte), which
    means it will be even *more* memory-bound and thus slower than the ViT.
  correct_index: 2
