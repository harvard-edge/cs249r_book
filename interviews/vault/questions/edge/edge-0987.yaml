title: Edge Fallback Capacity
scenario: An edge gateway normally runs a neural detector at 20 FPS. A fallback rule-based detector can run at 80 FPS but has lower accuracy. During thermal throttling, the neural detector drops to 12 FPS, below the 15 FPS minimum.
question: Can an 80 FPS rule-based fallback restore throughput when the neural detector drops to 12 FPS and the minimum is 15 FPS?
details:
  realistic_solution: Execute a failover policy. The fallback significantly over-delivers against the SLA, protecting aggregate real-time availability despite degraded categorical precision.
  common_mistake: |
    **The Pitfall:** Refusing to failover because of accuracy degradation.
    **The Rationale:** Candidates often insist on keeping the primary neural model active, failing to realize that dropping below the minimum throughput SLA constitutes a hard system failure.
    **The Consequence:** Complete loss of real-time availability instead of gracefully degraded functionality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA Minimum Throughput: 15 FPS.
       - Neural Detector (Throttled): 12 FPS.
       - Fallback Rule-Based Detector: 80 FPS.
    2. **Calculations:**
       - Throttled Deficit = 15 FPS - 12 FPS = -3 FPS.
       - Fallback Headroom = 80 FPS - 15 FPS = +65 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: +65 FPS Headroom (Compute-Sufficient Fallback)** - The fallback logic successfully restores required system availability.
