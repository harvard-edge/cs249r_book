title: 'Qualcomm Cloud AI 100 Compute and Memory Recall'
scenario: 'We are building an on-premise inference server and need to select the right model serving infrastructure. Our target platform is the Qualcomm Cloud AI 100 accelerator to handle multiple concurrent INT8 models.'
question: 'What is the maximum INT8 compute throughput and total memory capacity of this specific accelerator?'
details:
  realistic_solution: 'The candidate should successfully recall that the Qualcomm Cloud AI 100 provides 400 TOPS of INT8 compute and has 32 GB of LPDDR4x memory. This knowledge is fundamental for determining maximum batch sizes and the number of concurrently loaded models.'
  common_mistake: 'Candidates often confuse the Qualcomm Cloud AI 100 with other edge devices or datacenter GPUs, misstating the memory as 16GB or 80GB, or guessing the TOPS based on older architectures.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Platform: Qualcomm Cloud AI 100.
    - Peak Compute: 400 TOPS (INT8). TDP: 75W.
    - Memory: 32 GB LPDDR4x.

    **Calculations:**
    - Power efficiency: 400 TOPS / 75W = 5.33 TOPS/W.
    - Compute density: 400 TOPS / 32 GB = 12.5 TOPS per GB.

    **Conclusion & Interpretation:**
    - **Result: 400 TOPS, 32 GB (Compute-Bound)**. These specs dictate the fundamental bounds for concurrent batch processing.
