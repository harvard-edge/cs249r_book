title: The Perception Pipeline's Processing Deficit
scenario: You are designing the perception pipeline for an autonomous shuttle. It uses a forward-facing camera that captures frames at 40 FPS. Your object detection model, running on the vehicle's edge computer, takes exactly 30ms to process a single frame. Assuming frames are processed sequentially in a simple queue.
question: Can the 40 FPS system with 30 ms processing meet its real-time deadline, and what is the per-frame deficit or surplus?
details:
  realistic_solution: The system cannot meet its real-time deadline and is unstable. The camera produces a new frame every 1000ms / 40 FPS = 25ms. However, the model takes 30ms to process a frame. This means that for every frame that arrives, the system falls behind by an additional 5ms. The input queue of frames waiting to be processed will grow continuously, leading to ever-increasing latency and eventually dropped frames, which is catastrophic for an autonomous vehicle.
  common_mistake: |
    **The Pitfall:** Only looking at the absolute processing time (30ms) and assuming it's "fast enough".
    **The Rationale:** Candidates see 30ms is less than a common 33ms (30 FPS) deadline and ignore the actual 40 FPS arrival rate.
    **The Consequence:** The input queue grows infinitely because processing takes longer than the arrival interval, leading to system failure and dropped frames.
  napkin_math: |
    1. Frame arrival interval: 1000 ms / 40 FPS = 25 ms/frame.
    2. Processing time: 30 ms/frame.
    3. Deficit per frame: 30 ms - 25 ms = **5 ms deficit**.
  options:
  - The system is unstable; it has a 5ms deficit per frame because processing takes longer than the frame arrival interval.
  - The system is stable; it has a 5ms surplus per frame.
  - The system is stable; 30ms is faster than the standard 33ms (30 FPS) automotive deadline.
  - The system is unstable; it has a 10ms deficit per frame (40ms - 30ms).
