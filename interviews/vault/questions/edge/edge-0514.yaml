title: 'The Autonomous Perception Bottleneck: Transformer Systems Cost'
scenario: You are tasked with deploying a real-time perception model onto an edge NPU. A junior engineer argues that a MobileNetV2 architecture is better than ResNet-50 because its depthwise layers have fewer FLOPs.
question: Are the representative ResNet-50 and MobileNetV2 INT8 layers compute-bound or memory-bound on the NPU, and how do you tell?
details:
  realistic_solution: "Both layers are severely memory-bound. Calculating the Arithmetic Intensity (AI) against the Orin's roofline ridge point reveals that the GPU compute cores remain fundamentally starved for data. While depthwise convolutions aggressively slash FLOPs, their channel-independent spatial memory access patterns suffer from abysmal AI, making them significantly slower on wide memory-bus hardware than dense spatial convolutions."
  common_mistake: |
    **The Pitfall:** Assuming a lower FLOP count directly translates to faster hardware performance.
    **The Rationale:** Candidates see that depthwise separable convolutions drastically reduce MACs and ignore their poor memory access patterns.
    **The Consequence:** Models are deployed that are severely starved for data, running slower than higher-FLOP architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Jetson AGX Orin (~1,342 Ops/Byte ridge point).
    2. **Calculations:**
       - ResNet 3x3 AI: High, but < 1,342 Ops/Byte.
       - MobileNetV2 Depthwise AI: ~9 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Both are Memory-Bound.** Depthwise layers have severely low Arithmetic Intensity.
  options:
  - The ResNet layer is compute-bound due to its high FLOP count, while the MobileNet layer is memory-bound.
  - Both layers are compute-bound because the Jetson AGX Orin is a powerful edge device with high TOPS.
  - Both layers are memory-bound, as their Arithmetic Intensities are well below the Orin's Ridge Point.
  - The MobileNet layer is compute-bound because depthwise convolutions are known to have low arithmetic intensity, while the ResNet layer is memory-bound.
  correct_index: 2
