title: 'The Autonomous Perception Bottleneck: Transformer Systems Cost'
scenario: 'You are an ML Systems Engineer on an autonomous driving team, tasked with deploying a real-time
  perception model onto a Jetson AGX Orin. The team is debating between two backbones: a classic ResNet-50
  and a MobileNetV2-style architecture discovered through Neural Architecture Search (NAS). A junior engineer
  argues the MobileNet is an obvious choice because its key layers have fewer FLOPs. To verify this, you
  are asked to diagnose the primary performance bottleneck for a representative layer from each model
  running in INT8 precision.'
question: "Are the representative ResNet-50 and MobileNetV2 INT8 layers compute-bound or memory-bound on the Orin, and how do you tell?"
details:
  realistic_solution: The correct approach is to calculate the Arithmetic Intensity (AI) for each layer
    and compare it to the hardware's ridge point. Both layers are significantly memory-bound.
  common_mistake: Engineers often assume that a lower FLOP count directly translates to higher performance
    on hardware. They see that depthwise separable convolutions drastically reduce MACs and conclude the
    model must be faster. This ignores the critical role of memory bandwidth and arithmetic intensity.
    An operation can have few FLOPs but be so starved for data that it runs slower than a more arithmetically
    intense one.
  napkin_math: '**1. ResNet Standard `3x3` Convolution:**'
  options:
  - The ResNet layer is compute-bound due to its high FLOP count, while the MobileNet layer is memory-bound.
  - Both layers are compute-bound because the Jetson AGX Orin is a powerful edge device with high TOPS.
  - Both layers are memory-bound, as their Arithmetic Intensities are well below the Orin's Ridge Point.
  - The MobileNet layer is compute-bound because depthwise convolutions are known to have low arithmetic
    intensity, while the ResNet layer is memory-bound.
  correct_index: 2
