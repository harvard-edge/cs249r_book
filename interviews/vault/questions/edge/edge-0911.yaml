title: On-Device LLM KV Cache Spilling
scenario: Deploying a 3B parameter LLM on a premium smartphone (8GB unified LPDDR5 RAM at 51.2 GB/s). Initially, text generation achieves 18 tokens/sec. However, when the context window reaches 2000 tokens, generation speed plummets to 3 tokens/sec, and the OS occasionally kills the background app.
question: Why does generation slow at a 2000-token context, and how would you manage the KV cache to avoid OS kills?
details:
  realistic_solution: This performance cliff strictly denotes memory-spilling dynamics where expansive KV structures overflow primary SRAM, inducing deep thrashing across unified DRAM and backing partitions. Senior engineering mandates architectural interventions like PagedAttention or aggressive Flash-Decoding chunking alongside intensive INT4 KV cache down-quantization to strictly confine memory bandwidth within physical SoC ceilings.
  common_mistake: |
    **The Pitfall:** Reducing the vocabulary size or hidden dimension of the model to save memory.
    **The Rationale:** Candidates try to solve the memory issue by statically shrinking the model architecture.
    **The Consequence:** This degrades model quality significantly without solving the dynamic scaling issue of the KV cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3B INT8
       - Target Context: 2000 tokens
       - LPDDR5 Bandwidth: 51.2 GB/s
       - Layers: 32, Dim: 3072, FP16 KV
    2. **Calculations:**
       - Model footprint: 3 GB
       - KV Cache footprint: 2 * 2 * 3072 * 32 * 2000 ≈ 786 MB
       - Total footprint: 3 GB + 0.786 GB = 3.786 GB
       - Max theoretical throughput: 51.2 GB/s / 3.786 GB = 13.5 tokens/sec
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Spilling.** A drop to 3 tokens/sec indicates the working set exceeds the NPU's localized SRAM, triggering severe OS-level unified DRAM thrashing.
