title: On-Device LLM KV Cache Spilling
scenario: Deploying a 3B parameter LLM on a premium smartphone (8GB unified LPDDR5 RAM at 51.2 GB/s).
  Initially, text generation achieves 18 tokens/sec. However, when the context window reaches 2000 tokens,
  generation speed plummets to 3 tokens/sec, and the OS occasionally kills the background app.
question: "Why does generation slow at a 2000-token context, and how would you manage the KV cache to avoid OS kills?"
details:
  realistic_solution: The performance cliff is due to the KV cache exceeding the NPU/GPU's localized SRAM
    tier and competing with the OS for unified DRAM, causing severe page thrashing. To fix this, you must
    change the architecture to aggressively manage memory locality. First, implement 4-bit KV cache quantization
    to reduce the footprint by 75%. Second, implement a chunked attention mechanism (like Flash-Decoding)
    that loads smaller blocks of the KV cache into the fast SRAM compute cores, performing local reductions
    before a final global reduction, minimizing DRAM round-trips and avoiding OS-level page faults.
  common_mistake: Reducing the vocabulary size or hidden dimension of the model, which degrades quality
    without solving the dynamic scaling issue.
  napkin_math: 3B model = 3GB (INT8). KV cache for 2000 tokens (fp16, d_model=3072, 32 layers) = 2*2*3072*32
    * 2000 = ~786MB. Total footprint = 3.78GB. Generating 1 token requires reading 3.78GB. At 51.2 GB/s,
    max theoretical throughput is 51.2 / 3.78 = 13.5 tok/sec. Dropping to 3 tok/sec implies OS swapping.
