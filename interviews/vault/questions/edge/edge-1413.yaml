title: Compute Efficiency and Power Limits on Jetson Orin
scenario: A computer vision model is deployed on a Jetson Orin (32 GB LPDDR5, 60W TDP, 275 TOPS INT8 peak). The model requires 50 GOPS per frame. The system achieves 1,000 FPS while drawing the maximum 60W, falling far short of the theoretical peak compute expectation.
question: Why does the Jetson Orin hit its 60W power limit before reaching its 275 TOPS compute limit, and what is the energy cost per inference?
details:
  realistic_solution: |
    The theoretical maximum throughput of 5500 FPS is unreachable because the 275 TOPS INT8 rating assumes perfect data locality and 100% concurrent utilization of both the DLA and Ampere GPU. In a real deployment, fetching activations and weights from the 32 GB LPDDR5 memory draws substantial power. The system hits its 60W thermal and power limit primarily due to the energy cost of memory bandwidth and data movement, which forces the compute cores to throttle. The true cost of edge deployment must account for total system power rather than isolated compute capabilities.
  common_mistake: |
    **The Pitfall:** Translating peak TOPS directly into throughput without accounting for system power.
    **The Rationale:** Candidates divide TOPS by GOPS and assume perfect data locality.
    **The Consequence:** Grossly overestimating real-world throughput and failing to budget power for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical Maximum: 275,000 GOPS / 50 GOPS/frame = 5,500 FPS.
    - Realized Performance: 1,000 FPS at 60W limit.

    **Calculations:**
    - Realized Utilization: 1,000 FPS * 50 GOPS = 50,000 GOPS (50 TOPS).
    - Compute Utilization: 50 TOPS / 275 TOPS = 18.18%.
    - Energy Cost: 60 Watts (Joules/sec) / 1,000 frames/sec = 0.06 Joules = 60 mJ per frame.

    **Conclusion & Interpretation:**
    - **Result: 18.18% compute utilization (Memory-Bound)**. Fetching data from LPDDR5 consumes the majority of the 60W budget, forcing the compute cores to throttle.
