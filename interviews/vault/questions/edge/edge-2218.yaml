title: Trace-based optimization of computational graph for Jetson Orin deployment
scenario: You want to deploy a YOLO-v8 nano model on Jetson Orin for real-time object detection at 30fps. The PyTorch eager model runs at 45ms per frame (22fps). You need to optimize the computational graph for deployment without gradient computation overhead.
question: How would you optimize the 45 ms PyTorch YOLOv8n model for 30 fps inference on Jetson Orin without gradient overhead?
details:
  realistic_solution: 'Convert via torch.jit.trace(model.eval(), example_input) — eliminates gradient tracking (30% of inference overhead). Export to ONNX and convert with trtexec --fp16 to generate a TensorRT engine for Orin''s Ampere GPU. Enable layer fusion and constant folding in TensorRT. Use trtexec --workspace=2048 to constrain memory. Expected throughput: 45ms -> 15ms (3x speedup from TensorRT + FP16 fusion).'
  common_mistake: |
    **The Pitfall:** Deploying the model in training mode with `requires_grad=True` and without `model.eval()`.
    **The Rationale:** Developers unfamiliar with inference optimization forget to disable gradient tracking and fusion opportunities.
    **The Consequence:** BatchNorm tracks running statistics and Dropout remains active, causing unnecessary overhead and missed constant folding/operator fusion, keeping the frame rate low.
  napkin_math: |
    1. **Compute Bound**: YOLO-v8n requires 3.2 GFLOPS FP32 per image.
    2. **Theoretical Latency**: Orin GPU provides ~137.5 TFLOPS FP16 (half of 275 TOPS INT8). 3.2 GFLOPS / 137.5 TFLOPS = 0.023ms compute-bound latency.
    3. **Current Overhead**: Actual latency is 45ms, meaning >99% is overhead (memory bandwidth, kernel launches, Python).
    4. **TensorRT Speedup**: Converting to TensorRT typically reduces overhead by ~3x.
    5. **Final Latency**: 45ms / 3 = **15ms** (well within the 33ms budget for 30fps).
