title: Architecting ISO-26262 Compliant Vision on Coral Edge TPU
scenario: You are designing an ASIL-B certified pedestrian detection system for an industrial autonomous forklift using a Google Coral Edge TPU (PCIe). The system must guarantee a maximum reaction latency of 50ms and cannot fail silently. Given the Coral's 4 TOPS INT8 limit, 2W power envelope, and lack of built-in hardware lockstep capabilities, you need to design a safe architecture.
question: How would you design an architecture that provides deterministic execution, continuous self-testing, and fail-safe handling without violating the 50ms ASIL-B latency?
details:
  realistic_solution: The optimal architecture uses a primary INT8 quantized MobileNetV3 model on the Edge TPU. To achieve ASIL-B without hardware lockstep, we implement software-based temporal redundancy by processing the same frame twice or processing offset frames and comparing bounding boxes on the host CPU. A dedicated hardware watchdog timer monitors a heartbeat signal over PCIe. For self-testing, we interleave a deterministic golden input tensor into the TPU queue every 10 frames and verify the output.
  common_mistake: |
    **The Pitfall:** Proposing a secondary model on the host CPU for redundancy.
    **The Rationale:** Candidates default to heterogeneous redundancy without calculating the latency and power cost of running a heavy CNN on a low-power host CPU.
    **The Consequence:** Violates the 50ms latency constraint, exceeds power/cost budgets, and fails to implement a proper PCIe hardware watchdog.
  napkin_math: |
    - **Compute requirement:** MobileNetV3-SSD requires 1.5 GOPS per frame.
    - **Throughput limits:** At 4 TOPS, theoretical max is ~2666 FPS, but PCIe overhead caps it at ~100 FPS (10ms per inference).
    - **Temporal redundancy:** Processing 2 frames takes 2 * 10ms = 20ms.
    - **Host comparison:** 5ms host CPU comparison.
    - **Latency headroom:** 20ms + 5ms = 25ms total processing. This leaves a 25ms buffer for the watchdog timeout before hitting the 50ms limit.
    - **Self-testing:** Running a golden frame every 10 frames adds 1ms overhead per cycle (10% throughput reduction).
    - **Final result:** **The 25ms total latency meets the 50ms deadline while providing ASIL-B redundancy.**
