title: 'Edge TCO Realization: Concrete 1-Year Cost Breakdown for Edge AI System'
scenario: 'Concretely calculate the 1-year cost breakdown for a single Jetson Orin unit ($499, 32GB LPDDR5,
  275 TOPS, 60W) deployed in a warehouse for pick-and-place AI guidance: running 16hr/day at 50W average,
  8hr off at 5W standby, $0.10/kWh. Include hardware amortization (3yr), power, quarterly maintenance
  visits ($200 each), and connectivity (industrial Ethernet, $50/month).'
details:
  realistic_solution: 'Annual costs: Hardware amortization: $499/3yr = $166.33/yr. Power: (16hr*50W +
    8hr*5W)*365 * $0.10/1000 = (800+40)*365*$0.10/1000 = 840*365*$0.10/1000 = $30.66/yr. Maintenance:
    4*$200=$800/yr. Connectivity: $50*12=$600/yr. Total: $166.33+$30.66+$800+$600=$1,596.99/yr ≈ $1,597/yr.
    Breakdown: HW=10.4%, Power=1.9%, Maintenance=50.1%, Connectivity=37.6%. Connectivity + Maintenance
    dominate (87.7%). Optimization focus: reduce maintenance (predictive maintenance alerts → 2 visits/yr
    = $400, saves $400/yr) and connectivity (WiFi instead of Ethernet: $10/month = $480/yr, saves $120/yr).'
  common_mistake: Adding up costs in different time units (amortization in years, power in hours, maintenance
    quarterly) without converting everything to annual cost for a clean comparison.
  napkin_math: 'HW amort: $499/3=$166.33. Power: (16*50+8*5)W * 365days * $0.10/1000 = 840*365*0.0001=$30.66.
    Maintenance: 4*$200=$800. Connectivity: 12*$50=$600. Total: $1,597/yr. Monthly cost: $133. Breakdown%:
    HW=10.4%, Power=1.9%, Maint=50.1%, Conn=37.6%. Power is tiny! A 60W device costs only $31/yr to power
    at 16hr/day. Main cost drivers are service contracts and connectivity. Rule of thumb: for enterprise
    edge, expect service costs to dwarf power for well-maintained hardware.'
