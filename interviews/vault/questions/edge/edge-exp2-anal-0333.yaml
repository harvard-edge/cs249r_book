title: Per-Channel INT8 Overhead on AI 100
scenario: You are deploying a vision model on a Qualcomm Cloud AI 100 on-premise accelerator (75W, 32
  GB LPDDR4x, 400 TOPS INT8). You observe that switching from per-tensor to per-channel INT8 quantization
  for the weights restores the model's accuracy, but the inference latency increases slightly. Given that
  the hardware must fetch a scale factor and zero-point for each quantization bucket, explain why the
  per-channel approach causes this performance drop and calculate the additional memory payload required
  if a linear layer has 4096 output channels.
details:
  realistic_solution: Per-channel quantization improves accuracy by isolating outlier weights to individual
    channels, preventing them from skewing the quantization range of the entire tensor. However, instead
    of loading a single scale and zero-point pair for the whole tensor, the hardware must now load a unique
    pair for every output channel. This extra metadata fetching from the LPDDR4x memory reduces arithmetic
    intensity, marginally slowing down the computation and preventing the accelerator from hitting its
    peak 400 TOPS INT8.
  common_mistake: Candidates often mistakenly attribute the slowdown to the INT8 MAC operations themselves
    being computationally more complex. They fail to identify that the bottleneck stems from the increased
    memory bandwidth pressure of loading granular quantization metadata.
  napkin_math: 'For a layer with 4096 output channels: Per-tensor metadata requires 1 FP32 scale (4 bytes)
    and 1 INT8 zero-point (1 byte) = 5 bytes. Per-channel metadata requires 4096 scales * 4 bytes + 4096
    zero-points * 1 byte = 16,384 + 4,096 = 20,480 bytes (~20.5 KB). The additional memory payload is
    20,480 - 5 = 20,475 bytes per layer. Across a deep network, fetching this extra metadata from the
    32 GB LPDDR4x consumes additional bandwidth and overhead within the 75W budget.'
