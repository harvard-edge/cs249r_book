title: Google Coral Edge TPU Subgraph Optimization
scenario: You are deploying an object detection model to a smart camera equipped with
  a Google Coral Edge TPU (USB form factor). The Edge TPU offers 4 TOPS of INT8 compute
  at a 2W power envelope. After applying basic post-training quantization, the model
  achieves only 10 FPS instead of the target 30 FPS. Profiling reveals that several
  operations are falling back to the host CPU because they were not successfully quantized
  to INT8.
question: Why is the Coral Edge TPU model reaching only 10 FPS after quantization,
  and how would you eliminate CPU fallbacks to hit 30 FPS?
details:
  realistic_solution: Diagnose the fallback operators using the Edge TPU compiler
    logs. Replace unsupported operations (like certain custom activations) with Edge
    TPU-compatible ones and ensure the entire graph is strictly quantized to INT8
    to prevent subgraph partitioning. Keeping execution entirely on the TPU eliminates
    the expensive USB transfer bottlenecks.
  common_mistake: Candidates often assume that targeting an accelerator automatically
    improves performance. They fail to account for the massive latency penalty of
    host-to-device memory transfers over USB when unsupported or non-INT8 operators
    are delegated back to the host CPU.
  napkin_math: Assume the model requires 2 GOPS per frame. The Edge TPU provides 4,000
    GOPS (4 TOPS), yielding a theoretical limit of 2,000 FPS. However, if a fallback
    occurs, transferring a 2MB intermediate tensor over a real-world USB 3.0 connection
    (e.g., 400 MB/s throughput) takes 5ms. Two transfers (TPU to CPU, CPU to TPU)
    add 10ms of pure I/O overhead per fallback. With just 3 fallbacks per inference,
    I/O latency adds 30ms per frame, capping performance at ~33 FPS even if compute
    takes 0ms. Eliminating these fallbacks removes the 30ms penalty, easily exceeding
    the 30 FPS target while staying within the 2W power budget.
