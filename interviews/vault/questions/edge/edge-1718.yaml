title: Google Coral Edge TPU Subgraph Optimization
scenario: You are deploying an object detection model to a smart camera equipped with a Google Coral Edge TPU. The Edge TPU offers 4 TOPS of INT8 compute at a 2W power envelope. After applying basic post-training quantization, the model achieves only 10 FPS instead of the target 30 FPS. Profiling reveals that several operations are falling back to the host CPU because they were not successfully quantized to INT8.
question: "Why is the Coral Edge TPU model reaching only 10 FPS after quantization, and how would you eliminate CPU fallbacks to hit 30 FPS?"
details:
  realistic_solution: Diagnose the fallback operators using the Edge TPU compiler logs. Replace unsupported operations (like certain custom activations) with Edge TPU-compatible ones and ensure the entire graph is strictly quantized to INT8 to prevent subgraph partitioning. Keeping execution entirely on the TPU eliminates the expensive USB transfer bottlenecks.
  common_mistake: |
    **The Pitfall:** Assuming that targeting an accelerator automatically improves performance while ignoring host-to-device transfer latency.
    **The Rationale:** Candidates fail to account for the massive latency penalty of host-to-device memory transfers over USB when unsupported or non-INT8 operators are delegated back to the host CPU.
    **The Consequence:** USB bandwidth bottlenecks destroy throughput, capping performance well below CPU-only baselines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 2 GOPS per frame.
       - Edge TPU: 4,000 GOPS (4 TOPS).
       - USB 3.0 throughput: ~400 MB/s.
       - Fallback transfer size: 2 MB intermediate tensor.
    2. **Calculations:**
       - Theoretical max FPS = 4,000 GOPS / 2 GOPS = 2,000 FPS (0.5 ms/frame).
       - Single fallback transfer latency (host to device and back) = (2 MB + 2 MB) / 400 MB/s = 10 ms.
       - With 3 fallbacks: 3 * 10 ms = 30 ms of pure I/O latency per frame.
       - Max FPS with fallbacks = 1000 ms / (0.5 ms + 30 ms) = ~32.7 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 30ms latency penalty from I/O** (USB Bandwidth-Bound).
