title: The Real-Time Deadline Trap
scenario: You are designing the perception system for an autonomous forklift in a warehouse. The safety protocol requires the obstacle detection model to process each camera frame within a 33ms deadline to ensure a 30 FPS response rate. On your edge accelerator, the model takes 20ms for inference on a single frame. To improve the accelerator's efficiency, you consider batching two frames together.
question: Is batching two frames feasible when single-frame inference is 20 ms and the real-time deadline is 33 ms?
details:
  realistic_solution: This is not a feasible strategy. While batching can improve throughput, it increases the latency for each individual frame in the batch. The total time to process a batch of two would be at least 40ms, which violates the hard real-time deadline of 33ms.
  common_mistake: |
    **The Pitfall:** Confusing throughput (FPS) with hard real-time latency.
    **The Rationale:** Engineers optimizing for raw efficiency calculate the amortized time per frame (e.g., 20ms per frame), forgetting that the batch must wait for both frames to complete.
    **The Consequence:** Designing a system that processes data efficiently but fundamentally violates critical safety deadlines.
  napkin_math: |
    *   **System deadline:** 33 ms per frame.
    *   **Batch processing time:** A batch size of 2 requires at least 2 × 20 ms = 40 ms.
    *   **Result:** Waiting 40 ms for the first frame's result clearly exceeds the **33 ms hard real-time deadline**, rendering batching unsafe.
  options:
  - Yes, because the amortized time per frame is still 20ms, which is under the deadline.
  - No, the total processing time for the batch (40ms) exceeds the 33ms real-time deadline.
  - Yes, because batching increases compute efficiency and overall FPS.
  - Yes, because the time per frame in the batch becomes 10ms (20ms / 2), which is faster.
  correct_index: 1
