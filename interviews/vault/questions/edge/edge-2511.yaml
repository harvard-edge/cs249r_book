title: 1GbE Orin AllGather Sync
scenario: 4 Jetson Orins perform a Ring AllGather on 5 MB of local camera features
  over a 1GbE switch (125 MB/s per link). Software adds a 1ms TCP/IP synchronization
  barrier per step.
question: Compute the total latency of the AllGather operation.
details:
  realistic_solution: In a Ring AllGather for N=4, there are N-1=3 steps. Each step
    transfers P/N = 5 MB / 4 = 1.25 MB per node. Transfer time per step is 1.25 MB
    / 125 MB/s = 10ms. Adding the 1ms sync barrier, each step takes 11ms. Total time
    is 3 steps * 11ms = 33ms.
  common_mistake: Forgetting that AllGather transfers (N-1)/N of the final buffer
    size, or skipping the cumulative multi-step TCP/IP barrier overhead.
  napkin_math: Steps = 3. Payload/step = 5/4 = 1.25MB. Time/step = (1.25/125)*1000
    + 1 = 11ms. Total = 3 * 11 = 33ms.
