title: 1GbE Orin AllGather Sync
scenario: Four Jetson Orins perform a Ring AllGather on 5 MB of local camera features over a 1GbE switch (125 MB/s per link). The network stack adds a 1ms TCP/IP synchronization barrier per step.
question: What is the total latency of the Ring AllGather operation across the four nodes?
details:
  realistic_solution: In a Ring AllGather for N=4, there are N-1=3 steps. Each step
    transfers P/N = 5 MB / 4 = 1.25 MB per node. Transfer time per step is 1.25 MB
    / 125 MB/s = 10ms. Adding the 1ms sync barrier, each step takes 11ms. Total time
    is 3 steps * 11ms = 33ms.
  common_mistake: |
    **The Pitfall:** Forgetting the step count or the TCP/IP barrier overhead.
    **The Rationale:** Engineers often calculate the raw transfer time of the entire payload without breaking it down into the discrete steps required by the ring topology.
    **The Consequence:** Underestimating the total synchronization latency, particularly for small payloads where the network barrier dominates.
  napkin_math: |
    1. **Number of steps**: N - 1 = 4 - 1 = 3 steps.
    2. **Payload per step**: Total Size / N = 5 MB / 4 = 1.25 MB.
    3. **Transfer time per step**: 1.25 MB / 125 MB/s = 10 ms.
    4. **Total time per step**: 10 ms (transfer) + 1 ms (barrier) = 11 ms.
    5. **Total latency**: 3 steps * 11 ms = **33 ms**.
