title: Analyzing Fusion Memory Spills on Qualcomm Cloud AI 100
scenario: You are deploying an INT8 vision model to a Qualcomm Cloud AI 100 on-premise inference accelerator
  (400 TOPS INT8, 75W, 32 GB LPDDR4x). The AOT compiler aggressively fuses operators to maximize the 400
  TOPS compute capacity. Before fusion, a sequence of three identical blocks each required 100 GOPS of
  compute and 15 MB of intermediate activation memory, easily fitting in the accelerator's 50 MB on-die
  SRAM. After fusion, the compiler combines them into a single kernel requiring 300 GOPS, but the combined
  intermediate working set grows to 65 MB, forcing a spill to the LPDDR4x memory (which has an effective
  bandwidth of 100 GB/s). Analyze why the aggressive fusion strategy degrades overall inference latency.
question: "Why does fusing the three 100-GOPS blocks into one 300-GOPS kernel make inference slower on the Cloud AI 100?"
details:
  realistic_solution: The candidate should calculate the execution time for both scenarios to prove the
    fused version is slower. The unfused kernels are purely compute-bound because their memory footprint
    stays within the fast SRAM. The fused kernel becomes memory-bound because spilling the excess working
    set to the LPDDR4x introduces a memory transfer delay that adds directly to the execution latency,
    overpowering the benefits of fusion.
  common_mistake: Candidates often assume that operator fusion always improves performance by reducing
    kernel launch overhead and avoiding redundant memory accesses. They fail to recognize that if the
    fused working set exceeds on-chip SRAM capacity, it triggers a severe memory bandwidth bottleneck
    on the slower LPDDR4x memory.
  napkin_math: 'Unfused: Compute time per kernel = 100 GOPS / 400 TOPS = 0.25 ms. Total compute for 3
    blocks = 0.75 ms. All 15 MB fits in SRAM, so memory latency is hidden. Fused: Compute time = 300 GOPS
    / 400 TOPS = 0.75 ms. The 65 MB working set exceeds the 50 MB SRAM by 15 MB. Assuming the 15 MB excess
    is written to and read from the 32 GB LPDDR4x (30 MB total transfer). LPDDR4x transfer time = 30 MB
    / 100 GB/s = 0.3 ms. Total fused time = 0.75 ms (compute) + 0.3 ms (memory spill penalty) = 1.05 ms.
    Fusion increases latency by 40%.'
