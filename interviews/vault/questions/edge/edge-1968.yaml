title: Knowledge Distillation for Efficient LLM Deployment on Qualcomm Cloud AI 100
scenario: You must deploy a large language model (LLM) for a critical NLP task onto a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The original model is too large.
question: How would you use knowledge distillation to deploy an accurate INT8 student LLM on the Cloud AI 100 within 32GB LPDDR4x, 400 TOPS, and 75W limits?
details:
  realistic_solution: Design a lightweight student architecture optimized for INT8 execution (e.g., grouped query attention). Utilize intermediate feature distillation alongside logit matching to transfer rich representations from the FP32 teacher to the student. Crucially, integrate Quantization-Aware Training (QAT) simultaneously with the distillation process. This ensures the student model learns to mitigate the INT8 precision loss inherent to the Cloud AI 100's hardware, maximizing the 400 TOPS throughput within the 75W power envelope.
  common_mistake: |
    **The Pitfall:** Applying Post-Training Quantization (PTQ) after standard distillation.
    **The Rationale:** Treating distillation and quantization as independent sequential steps rather than co-optimizing them for the target hardware.
    **The Consequence:** Severe accuracy degradation when deploying to INT8, or selecting a student architecture that maps poorly to the accelerator's specific memory bandwidth constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W).
       - Distillation factor: Student is 1/10th the parameters of the teacher.
    2. **Calculations:**
       - Teacher Size: 13B params in FP32 = 52 GB (Exceeds 32 GB RAM).
       - Student Size: 1.3B params in FP32 = 5.2 GB.
       - Student Size INT8: 1.3B params * 1 byte = 1.3 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound to Compute-Bound. Distillation + INT8 quantization reduces the footprint from 52GB to 1.3GB, allowing the model to fit and leverage the 400 TOPS NPU.**
