title: 'Edge Systolic Array Optimization: DLA vs GPU Load Balancing on Jetson'
scenario: A Jetson Orin (275 TOPS INT8, 60W, DLA 11 TOPS) runs MobileNetV2 (0.3 GOPS, 3.4M params) entirely
  on GPU at 2000 FPS using 5% GPU utilization. Identify that moving to DLA saves power while maintaining
  FPS, calculate power savings, and determine the maximum FPS DLA can sustain. Give the power-efficiency
  improvement.
question: "Can MobileNetV2 move from GPU to DLA while maintaining 2000 FPS, and what power savings and maximum DLA FPS result?"
details:
  realistic_solution: 'DLA: 11 TOPS. MobileNetV2: 0.3 GOPS. Theoretical FPS = 11000G/0.3G = 36,667 FPS.
    Activation BW: 12MB per inference. DLA BW: 200GB/s. BW-limited FPS = 1000ms/(12MB/200GB/s) = 1000ms/0.06ms
    = 16,667 FPS. Sustained DLA: 16,667 FPS >> 2000 FPS requirement. GPU power at 5% utilization: 5% *
    60W = 3W. DLA power: 11 TOPS * 0.02W/TOPS ≈ 0.22W (DLA much more power efficient). Plus DLA controller
    ≈ 0.5W. Total DLA: 0.72W vs 3W GPU. Savings: 3-0.72 = 2.28W. For 1000 Jetson units: 2.28kW saved continuously.'
  common_mistake: Not verifying that the DLA can actually sustain the required FPS before recommending
    the power-saving migration, and not accounting for DLA warmup time and memory copy overhead.
  napkin_math: 'DLA BW-limited FPS: 12MB/200GB/s = 60μs per inference, 16,667 FPS. Meets 2000 FPS requirement
    (8.3x headroom). GPU power at 5%: 5% * (60-15W idle) = 2.25W + 15W idle = 17.25W. DLA power: ~1.5W
    (DLA + controller) + 10W idle = 11.5W. Savings: 17.25-11.5 = 5.75W. At 1000 deployed units: 5.75kW
    = 50.4 MWh/year = $5000/year electricity savings. Migration cost: software recompile for TensorRT
    DLA mode (4 hours engineering). ROI: immediate.'
