title: Federated Learning Architecture on Hailo-8 Dataflow Accelerators
scenario: You are architecting a cross-device federated learning system for automotive in-cabin monitoring. The edge nodes utilize Hailo-8 dataflow accelerators (26 TOPS INT8, 2.5W), which lack local DRAM and must stream all weights and activations directly from host memory.
question: How would you design on-device federated learning with Hailo-8 nodes given host streaming bottlenecks and non-IID driver data?
details:
  realistic_solution: The optimal design keeps the Hailo-8 strictly for forward-pass feature extraction using its dataflow architecture, streaming only compressed feature vectors back to the host CPU. A lightweight, low-parameter adapter or classifier is then updated locally on the host CPU rather than the accelerator. This mitigates the memory-streaming bottleneck and drastically reduces the communication payload sent to the central FL server.
  common_mistake: |
    **The Pitfall:** Proposing standard federated averaging with full model backpropagation executing entirely on the edge accelerator.
    **The Rationale:** Candidates read "26 TOPS" and assume the accelerator should handle all math unconditionally.
    **The Consequence:** Without local DRAM, streaming intermediate activations and gradients back and forth from host memory severely bottlenecks the system, completely neutralizing the compute advantage and destroying the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full backpropagation streaming requires ~100MB of activations per frame.
    - Framerate: 30 FPS.
    - Inference extraction creates a 2KB feature vector.

    **Calculations:**
    - Full backpropagation demands 100MB * 30 FPS = 3 GB/s of host-to-accelerator bandwidth, easily saturating edge bus links.
    - By running only inference on the Hailo-8 to extract a 2KB feature vector, bus traffic drops to 60 KB/s.

    **Conclusion & Interpretation:**
    - **Result: 60 KB/s (Bandwidth-Bound)**. Updating a 100K parameter adapter on the CPU means only 400KB (FP32) is transmitted during FL communication rounds, making the architecture viable.
