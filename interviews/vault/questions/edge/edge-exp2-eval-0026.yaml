title: Zero-Copy Memory Mapping for Multi-Stream Inference
scenario: 'You are deploying a multi-camera computer vision pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5,
  Ampere GPU, 275 TOPS). The system must run four independent inference processes, one for each high-resolution
  camera stream, using the exact same 8 GB FP16 transformer model. The OS and intermediate activations
  require at least 10 GB of memory to function without thrashing. You are presented with two alternatives:
  (A) Each process independently loads the 8 GB model weights into its own allocated GPU memory. (B) A
  single copy of the weights is stored on disk, memory-mapped (mmap) by each process, and accessed by
  the GPU via pinned zero-copy memory. Evaluate these alternatives and determine the best design.'
question: "Which memory design should you use for four processes sharing the same 8 GB model on the 32 GB Jetson Orin, and why?"
details:
  realistic_solution: Alternative B is the correct design. Because the Jetson Orin shares its 32 GB LPDDR5
    memory physically between the CPU and GPU, using mmap allows multiple processes to map the same read-only
    weight file into their virtual address spaces while sharing the same underlying physical memory pages
    in the OS page cache. Utilizing zero-copy memory avoids unnecessary duplication, prevents OOM, and
    drastically reduces cold-start latency.
  common_mistake: Candidates often choose independent GPU allocation (Alternative A) assuming it provides
    better memory bandwidth, forgetting that the Jetson Orin uses a unified memory architecture. They
    fail to realize that independent loading will duplicate the weights in physical memory, leading to
    an inevitable Out-Of-Memory (OOM) crash.
  napkin_math: 'Alternative A Memory: 4 processes * 8 GB weights = 32 GB. Total required: 32 GB + 10 GB
    (OS/activations) = 42 GB. This exceeds the Jetson Orin''s 32 GB LPDDR5 capacity (OOM). Alternative
    B Memory: 1 shared mmap copy = 8 GB. Total required: 8 GB + 10 GB (OS/activations) = 18 GB. This fits
    comfortably within the 32 GB limit, leaving 14 GB headroom.'
