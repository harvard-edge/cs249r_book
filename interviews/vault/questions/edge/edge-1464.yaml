title: Architecting Data Pruning for Edge Continual Learning
scenario: Your team is deploying specialized on-premise language models using the Qualcomm Cloud AI 100. You receive 10 million new telemetry logs daily but cannot train on all of them due to the 75W power constraint and time limits.
question: How would you build a streaming coreset pipeline to select from 10 million daily logs under the 75W limit?
details:
  realistic_solution: Deploy a lightweight INT8 embedding proxy model directly on the accelerator. Process the incoming streaming logs using a submodular optimization algorithm (e.g., Facility Location) within the LPDDR4x memory to maintain a highly informative, diverse coreset. This aggressively filters redundant data before it triggers expensive fine-tuning.
  common_mistake: |
    **The Pitfall:** Proposing storing all data and using random sampling, or suggesting a massive proxy model for data scoring.
    **The Rationale:** Engineers either choose the easiest path (random) or a cloud-centric path (massive proxy), ignoring the strict power envelope.
    **The Consequence:** Random sampling misses rare edge cases, while a large proxy model exceeds the 75W thermal limit and saturates the latency budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 million logs daily.
       - AI 100 capacity: 400 TOPS (400,000 GOPS).
       - Lightweight embedding model: 2 GOPS/log.
    2. **Calculations:**
       - Throughput (25% utilization): 100,000 GOPS / 2 GOPS/log = 50,000 logs/sec.
       - Total Scoring Time: 10,000,000 logs / 50,000 logs/sec = 200 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Feasibility.** Processing the daily corpus takes only 200 seconds of active compute, making an advanced streaming coreset highly viable under strict thermal limits.
