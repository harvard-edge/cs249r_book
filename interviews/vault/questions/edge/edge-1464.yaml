title: Architecting Data Pruning for Edge Continual Learning
scenario: Your team is deploying specialized on-premise language models using the Qualcomm Cloud AI 100. You receive 10 million new telemetry logs daily but cannot train on all of them due to the 75W power constraint and time limits.
question: How would you build a streaming coreset pipeline on Cloud AI 100 to select from 10 million daily logs under the 75W limit?
details:
  realistic_solution: Deploy a lightweight INT8 embedding model on the Qualcomm Cloud AI 100 to process incoming logs in a streaming fashion. Use a low-overhead submodular optimization algorithm on the 32 GB LPDDR4x memory to maintain a diverse coreset of the most informative samples. This maximizes data efficiency while respecting the strict on-premise compute and thermal envelope.
  common_mistake: |
    **The Pitfall:** Proposing storing all data and using random sampling, or suggesting a large proxy model for data scoring.
    **The Rationale:** Engineers either choose the easiest path (random) or a cloud-centric path (massive proxy model), ignoring the power envelope.
    **The Consequence:** Random sampling misses rare but informative edge cases. A large proxy model exceeds the accelerator's strict 75W power limit and latency constraints.
  napkin_math: |
    *   **Scoring compute per log:** 2 GOPS (using a small embedding model).
    *   **Accelerator Capacity:** 400 TOPS (400,000 GOPS).
    *   **Theoretical throughput:** 400,000 / 2 = 200,000 logs/second.
    *   **Conservative throughput (25% util):** 50,000 logs/second.
    *   **Total scoring time:** 10,000,000 logs / 50,000 logs/sec = 200 seconds.
    *   **Result:** Processing 10M logs takes **just 200 seconds** of compute, making a 5% streaming coreset highly feasible on this hardware.
