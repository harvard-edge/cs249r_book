title: Architecting Data Pruning for Edge Continual Learning
scenario: Your team is deploying specialized on-premise language models using the
  Qualcomm Cloud AI 100. You receive 10 million new telemetry logs daily but cannot
  train on all of them due to the 75W power constraint and time limits. Design a streaming
  data selection and coreset generation pipeline that maximizes the Information-Compute
  Ratio (ICR) to determine which data to keep for daily continual learning.
question: How would you build a streaming coreset pipeline on Cloud AI 100 to select
  from 10 million daily logs under the 75W limit?
details:
  realistic_solution: Deploy a lightweight INT8 embedding model on the Qualcomm Cloud
    AI 100 to process incoming logs in a streaming fashion. Use a low-overhead submodular
    optimization algorithm on the 32 GB LPDDR4x memory to maintain a diverse coreset
    of the most informative samples. This maximizes data efficiency while respecting
    the strict on-premise compute and thermal envelope.
  common_mistake: Candidates often propose storing all data and using random sampling,
    or they suggest running a large proxy model for data scoring that exceeds the
    accelerator's limits. They fail to evaluate the tradeoff between the compute spent
    on data selection versus the compute saved during training.
  napkin_math: The Qualcomm Cloud AI 100 delivers 400 TOPS INT8. If scoring a single
    log with a small embedding model takes 2 GOPS, theoretical throughput is 200,000
    logs/second. At a conservative 25% utilization, it processes 50,000 logs/second.
    Scoring the daily 10 million logs takes just 200 seconds. Selecting a 5% coreset
    (500,000 logs) easily fits within the 32 GB LPDDR4x memory for the selection algorithm
    and drastically reduces the subsequent fine-tuning compute.
