title: Hailo-8 Model Thrashing with mmap Weight Loading
scenario: 'We are deploying a sequential multi-model pipeline (Detection, Pose, Re-ID) on an edge gateway equipped with a Hailo-8 accelerator (26 TOPS INT8, 2.5W). To conserve host RAM, we implemented memory-mapped weight loading (mmap) from the local eMMC for the three 15MB models. During load testing, inference runs perfectly for a single model in isolation, but the full pipeline experiences severe stuttering and the effective compute drops to less than 1 TOPS.'
question: Why does the mmap-based three-model Hailo-8 pipeline stutter and drop below 1 TOPS even though each 15 MB model runs alone?
details:
  realistic_solution: 'The root cause is host OS page faulting stalling the DMA stream. Because the Hailo-8 has no local DRAM, it relies entirely on host memory to stream weights and activations. Using ''mmap'' lazily maps the weights; when the pipeline switches models, the accelerator''s memory requests trigger major page faults. The host CPU must halt the stream and fetch the weights from the slow eMMC into RAM. The solution is to pin the weights in host RAM using ''mlock'' or process larger batches to amortize disk I/O latency.'
  common_mistake: |
    **The Pitfall:** Suspecting PCIe bandwidth or thermal throttling.
    **The Rationale:** Candidates miss the interaction between OS-level lazy loading (mmap) and the accelerator's lack of local DRAM.
    **The Consequence:** Time is wasted tuning PCIe settings when the actual issue is major page faults continuously hitting the slow eMMC disk.
  napkin_math: |
    *   **Compute Time:** 15MB INT8 model requires ~15 GOPs -> 15 / 26000 TOPS = 0.58 ms. 3 models = 1.73 ms per frame.
    *   **Disk Loading Time:** Evicted weights loaded from 150 MB/s eMMC -> 15MB / 150 MB/s = 100 ms per model. 3 models = 300 ms.
    *   **Total Frame Latency:** 301.73 ms (~3.3 FPS).
    *   **Result:** **Effective accelerator utilization is 1.73ms / 301.73ms = 0.57%, dropping the 26 TOPS accelerator to ~0.15 TOPS due to I/O starvation.**
