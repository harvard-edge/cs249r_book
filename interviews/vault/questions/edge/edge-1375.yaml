title: Energy Cost of INT8 MACs on Google Coral
scenario: 'You are deploying an object detection model to a Google Coral Edge TPU. The accelerator consumes 2W of power while delivering peak throughput of 4 TOPS for INT8 operations. The model requires 10 billion INT8 MACs per inference.'
question: 'What is the energy per INT8 MAC in pJ and total compute energy per inference for 10 billion MACs on the 2W, 4 TOPS Edge TPU?'
details:
  realistic_solution: 'The correct approach is to first determine the energy per single operation by dividing the total power by the operations per second. Then, multiply by 2 to find the energy per MAC. Finally, multiply the energy per MAC by the total number of MACs per inference to get the total energy.'
  common_mistake: |
    **The Pitfall:** Forgetting that a single MAC consists of two operations.
    **The Rationale:** Candidates often equate MACs directly to OPs without verifying the hardware definition.
    **The Consequence:** They calculate energy estimates that are completely off by a factor of 2.
  napkin_math: |
    * Power = 2W = 2 Joules/second.
    * Throughput = 4 TOPS = 4 × 10^12 Operations/second.
    * Energy per OP = 2 / (4 × 10^12) J = 0.5 × 10^-12 J = 0.5 pJ.
    * Energy per MAC = 0.5 pJ/OP × 2 OPs/MAC = 1.0 pJ/MAC.
    * Energy per inference = 10 × 10^9 MACs × 1.0 pJ/MAC = 10 × 10^-3 J.
    * **Conclusion: Energy per MAC is 1.0 pJ, and total compute energy is 10 mJ.**
