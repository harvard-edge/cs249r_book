title: Hailo-8 Zero-Copy Gateway
scenario: A smart city gateway deploys a YOLOv8 model using a Hailo-8 NPU (2.5W) to process 4K video from a traffic camera.
question: Construct an end-to-end multi-process serving architecture that maintains the 2.5W power envelope while moving data from the video decoder to the Hailo engine.
details:
  realistic_solution: The architecture must use a POSIX shared memory (shm) block or Linux dma-buf. The hardware video decoder writes the raw 4K YUV frames directly into shared memory. The Hailo-8 inference engine reads pointers to these buffers via the HailoRT C++ API without copying the payload. This prevents the host CPU from moving memory, keeping total system power low.
  common_mistake: |
    **The Pitfall:** Passing 4K image payloads over local loopback (gRPC/REST) or standard pipes.
    **The Rationale:** Software engineers default to standard cloud microservice communication patterns without considering edge memory bandwidth.
    **The Consequence:** Triggers massive host CPU utilization for memory copies, spiking system power well beyond the strict 2.5W envelope.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K frame resolution (3840 x 2160 x 3 bytes).
       - Target framerate: 30 FPS.
    2. **Calculations:**
       - 4K frame size = 3840 * 2160 * 3 bytes ≈ 24.8 MB.
       - Required bandwidth = 24.8 MB/frame * 30 FPS = 746 MB/s.
    3. **Conclusion & Interpretation:**
       - **A zero-copy shared memory architecture saves ~750 MB/s of memory bandwidth. Result: Memory-Bandwidth Mitigation.**
