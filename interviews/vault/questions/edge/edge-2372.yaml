title: Hailo-8 Zero-Copy Gateway
scenario: A smart city gateway deploys a YOLOv8 model using a Hailo-8 NPU (2.5W) to
  process 4K video from a traffic camera.
question: Construct an end-to-end multi-process serving architecture that maintains
  the 2.5W power envelope while moving data from the video decoder to the Hailo engine.
details:
  realistic_solution: The architecture must use a POSIX shared memory (shm) block
    or Linux dma-buf. The hardware video decoder writes the raw 4K YUV frames directly
    into shared memory. The Hailo-8 inference engine reads pointers to these buffers
    via the HailoRT C++ API without copying the payload. This prevents the host CPU
    from moving memory, keeping total system power low.
  common_mistake: Passing 4K image payloads over local loopback (gRPC/REST) or standard
    pipes, which triggers massive host CPU utilization and spikes power well beyond
    2.5W.
  napkin_math: 4K frame = 24MB. 30fps = 720MB/s bandwidth saved via zero-copy.
