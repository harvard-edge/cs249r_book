title: Zero-Copy DMA Pipeline for Accelerated Edge Video Streams
scenario: Four 1080p camera streams are piped into an edge AI chip for real-time tracking, but the host CPU is maxed out performing H.264 decoding and frame resizing.
question: Create a hardware-accelerated pipeline specification that offloads decoding to a VPU and uses zero-copy memory buffers?
details:
  realistic_solution: Specify a media pipeline where the VPU decodes H.264 into DMA-BUF or other platform-supported contiguous video buffers, then a hardware ISP, V4L2, or GStreamer element performs colorspace conversion and resize into the tensor layout expected by the model. Pass the prepared buffers to the inference accelerator only through its supported zero-copy interface or runtime integration, not by handing arbitrary physical pointers to the chip. Validate that CPU copies are absent with platform tracing, GStreamer/V4L2 buffer inspection, driver counters, and the accelerator vendor's profiling tools.
  common_mistake: |
    **The Pitfall:** Keeping OpenCV CPU-based resizing in the loop.
    **The Rationale:** Candidates rely on familiar software libraries instead of fully utilizing hardware pipelines.
    **The Consequence:** This forces a host-memory copy and completely breaks the zero-copy DMA architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Streams: 4.
    - Frame size: 1920 * 1080 * 3 bytes.
    - Framerate: 30 FPS.

    **Calculations:**
    - Bandwidth required: 4 * 1920 * 1080 * 3 * 30 = ~746 MB/s.

    **Conclusion & Interpretation:**
    - **Result: ~746 MB/s (Memory-Bound)**. Zero-copy DMA is essential to handle this bandwidth without CPU bottleneck.
