title: 'Image Validation Gate Throughput Calculation'
scenario: 'You are deploying a defect detection model on an NVIDIA Jetson Orin device on a manufacturing line. To ensure data quality, you implement a pre-processing validation check on incoming 10-megapixel grayscale images to detect corrupted frames before inference. The validation algorithm requires 200 INT8 operations per pixel.'
question: 'With 0.2% of Jetson Orin''s 275 TOPS allocated, what maximum FPS can validate 10-megapixel frames at 200 INT8 ops per pixel?'
details:
  realistic_solution: 'The candidate should calculate the operations required per frame, determine the total allowed operations per second based on the percentage of the Jetson Orin''s TOPS, and divide the allowed operations by the operations per frame to find the max FPS.'
  common_mistake: |
    **The Pitfall:** Miscalculating unit conversions between TOPS and GOPS, or misapplying the percentage budget.
    **The Rationale:** Candidates forget that 1 TOPS = 1000 GOPS, or they apply 0.2 as 20% instead of 0.2%.
    **The Consequence:** The allocated compute budget is wildly incorrect, leading to a system design that either starves the primary model or severely underutilizes the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operations per frame: 10,000,000 pixels * 200 ops/pixel = 2 GOPS.
    - Total Jetson Orin compute: 275 TOPS = 275,000 GOPS.
    - Compute budget allocated: 0.2%.

    **Calculations:**
    - Allowed compute budget = 0.2% of 275,000 GOPS = 0.002 * 275,000 = 550 GOPS.
    - Max validation FPS = 550 GOPS / 2 GOPS = 275 FPS.

    **Conclusion & Interpretation:**
    - **Result: 275 FPS (Compute-Bound)**. The system can validate a maximum of 275 frames per second.
