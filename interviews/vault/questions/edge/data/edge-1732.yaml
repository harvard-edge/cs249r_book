title: Data Pruning for Hailo-8 Streaming Limits
scenario: You are deploying a custom object detection model on a Hailo-8 edge accelerator. To fit within host memory bandwidth limits and the power budget, your team proposes using synthetic data generation and coreset selection to train a highly compact model.
question: How should Hailo-8 bandwidth limits shape data pruning for a compact 30 FPS detector?
details:
  realistic_solution: Architect a hardware-software co-design strategy. Synthetic data and coreset selection should preserve rare object poses, lighting, occlusion, and edge cases while pruning redundant backgrounds and near-duplicate frames. The goal is not to derive a parameter count directly from the 4 GB/s link, but to train a compact model whose compiled graph, activations, and input/output traffic fit the 30 FPS deployment budget.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical dataset size reduction without considering deployment hardware.
    **The Rationale:** Candidates optimize the data strategy for standard GPU training, ignoring the reliance on streaming from host memory.
    **The Consequence:** Training a model that achieves high accuracy offline but fails to run in real-time due to massive PCIe bandwidth starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 GB/s host/device traffic budget.
    - Target framerate: 30 FPS.
    - Hailo deployment uses a compiled dataflow graph; model parameters are not assumed to be fully re-streamed every frame.

    **Calculations:**
    - Total traffic budget per frame = 4000 MB/s / 30 FPS = 133.3 MB/frame.
    - This budget must cover camera input, outputs, DMA transfers, and any activation traffic exposed by the compiled pipeline.
    - A max parameter count cannot be computed from this bandwidth alone unless the prompt states that weights are streamed every frame, which is not the normal sizing model here.

    **Conclusion & Interpretation:**
    - **Result: bandwidth-constrained pruning target (Deployment-Bound)**. Keep the model compact and activation-efficient, but validate the compiled graph's measured traffic instead of treating 4 GB/s as a direct parameter-count formula.
