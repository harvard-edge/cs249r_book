title: The ROS 2 IPC Overhead
scenario: You build an autonomous driving stack using ROS 2. Node A captures a 4K frame and publishes it. Node B subscribes to the frame, runs inference, and publishes bounding boxes. The ML inference takes 20ms. However, the end-to-end latency from Node A to Node B is 55ms.
question: What is ROS 2 doing that costs 35ms, and how do you fix it?
details:
  realistic_solution: |
    ROS 2/DDS is serializing, deserializing, allocating, and copying a large 4K image across the publisher/subscriber boundary before inference starts. If Node A and Node B can be composed in one process, use ROS 2 intra-process communication so ownership can be passed without a full DDS serialization path. If they must remain separate processes, use the platform's supported zero-copy path such as loaned messages with a DDS shared-memory transport. The fix is not a single universal package; it depends on the ROS 2 distribution, message type, and DDS vendor support.
  common_mistake: |
    **The Pitfall:** Blaming the network layer (UDP/DDS) for the latency bottleneck.
    **The Rationale:** Candidates know DDS utilizes UDP, wrongly assuming that loopback packet routing is the culprit rather than memory serialization.
    **The Consequence:** Wasting time proposing arcane network optimizations while the actual CPU-bound memory copy operation continues to stall the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K Image footprint: 3840 * 2160 * 3 = 24,883,200 bytes, about 24.9 MB
    - Available Bandwidth: 25 GB/s
    - Unexplained latency gap: 35ms

    **Calculations:**
    - Minimum full-buffer traffic for serialize + deserialize copies = 24.9 MB * 2 = 49.8 MB
    - Ideal bandwidth-only copy time = 49.8 MB / 25 GB/s = about 2.0 ms
    - Observed non-inference gap = 55ms - 20ms = 35ms
    - Remaining gap beyond ideal copy time is roughly 33ms, attributable to serialization/deserialization CPU work, allocation, cache effects, and extra copies.

    **Conclusion & Interpretation:**
    - **Result: Serialization/Copy Overhead**. The bandwidth lower bound is small, so the measured 35ms is dominated by ROS 2/DDS message handling and process-boundary copies; intra-process or supported zero-copy/shared-memory transport removes that overhead.
