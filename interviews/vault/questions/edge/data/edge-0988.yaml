title: Edge Data Validation Sample
scenario: An edge gateway receives 80,000 sensor windows/day. Full validation costs 20 ms per window, but only 20 CPU-minutes/day are available for validation.
question: How many edge sensor windows can be fully validated with a 20 CPU-minute/day budget at 20 ms per window, and is sampling required?
details:
  realistic_solution: 'The budget is 1,200 CPU-seconds. At 20 ms per window, the gateway can validate 60,000 windows, below the 80,000 daily windows. It must sample or use cheaper always-on checks for the remaining windows.'
  common_mistake: |
    **The Pitfall:** Assuming all edge sensor windows can be fully validated without checking the CPU budget.
    **The Rationale:** Candidates apply cloud-scale data validation mentalities to edge gateways with strict CPU time allocations.
    **The Consequence:** Exhaustion of the daily compute budget, starving critical routing or preprocessing tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 20 CPU-minutes/day
    - Validation cost: 20 ms/window

    **Calculations:**
    - Budget in seconds = 20 * 60 = 1200 seconds
    - Validated windows = 1200 s / 0.020 s = 60,000 windows
    - Shortfall = 80,000 - 60,000 = 20,000 windows

    **Conclusion & Interpretation:**
    - **Result: 60,000 windows (Compute-Bound)**. CPU budget is insufficient for full validation, requiring sampling or lightweight checks.
