title: The Calibration Drift
scenario: Your agricultural edge AI system uses a multispectral camera (visible + near-infrared) on a Raspberry Pi 4 to detect crop disease. The model achieves 92% accuracy in lab testing. After 6 months of outdoor deployment, accuracy drops to 74%. You retrain with new field data — accuracy recovers to 89% but drops again within 3 months. The model architecture hasn't changed.
question: What is the recurring source of degradation, and how do you build a system that self-corrects?
details:
  realistic_solution: 'The recurring degradation is sensor calibration drift, not concept drift. Multispectral cameras have filters and sensors that degrade with UV exposure, temperature cycling, and dust accumulation. The fix is a runtime calibration pipeline: include a known spectral reference card in the camera''s field of view, compute a per-pixel correction matrix, and apply it before inference. This decouples model accuracy from physical sensor drift.'
  common_mistake: |
    **The Pitfall:** Blaming concept drift or suggesting more diverse training data.
    **The Rationale:** Candidates fail to account for physical hardware degradation, such as sensor calibration drift due to UV exposure and thermal cycling.
    **The Consequence:** The team wastes resources constantly retraining the model on drifting data without addressing the root physical cause.
  napkin_math: |
    **Assumptions & Constraints:**
    - NIR filter drift: 5 nm shift over 6 months
    - Biological Signal: Healthy vs diseased leaf reflectance delta is ~15%

    **Calculations:**
    - A 5 nm shift causes ~3% systematic error in measured reflectance
    - Impact: 3% error is 20% of the target 15% signal, enough to flip classifications
    - Calibration latency: 4x4 transform * 5 bands = 80 ops/pixel * 2M pixels = 160M ops

    **Conclusion & Interpretation:**
    - **Result: Hardware Calibration Drift.** At 160M ops (~5ms on Cortex-A72), runtime calibration is essential and feasible.
