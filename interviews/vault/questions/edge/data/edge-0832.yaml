title: Designing Privacy-Preserving Fleet-Wide Analytics
scenario: You are deploying a new on-device vision model to 5 million smart doorbells. You need to monitor the global False Positive Rate (FPR) for a new 'package detected' class. Strict privacy policies prohibit uploading raw images or individual inference logs, and daily uplink bandwidth is strictly limited to under 5KB per device.
question: How would you estimate the global package-detection FPR under LDP while keeping each doorbell under 5KB/day of uplink?
details:
  realistic_solution: Each doorbell should compute daily counts for false positives and eligible negative opportunities, quantize or bucket the local FPR, then apply an LDP mechanism such as randomized response before upload. The server aggregates the noisy reports and debiases them using the known randomized-response probabilities to estimate the global FPR. A compact report can fit under 5KB/day by sending the randomized bin or two noisy counts plus a small protocol header; Secure Aggregation is optional for hiding individual messages from the server, but its overhead must be budgeted separately.
  common_mistake: |
    **The Pitfall:** Proposing complex Secure Multi-Party Computation (SMPC) protocols or relying on Centralized Differential Privacy.
    **The Rationale:** Candidates often jump to heavy cryptographic solutions for privacy without calculating the bandwidth overhead, or they assume the aggregation server can be trusted with raw metrics.
    **The Consequence:** SMPC drastically exceeds the 5KB/day bandwidth limit, while Centralized DP violates strict privacy policies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each device locally counts daily negative opportunities N and false positives FP.
    - Core LDP design sends either randomized quantized counts or an 8-bin randomized FPR report.
    - Daily report includes the LDP metric bytes plus lightweight metadata.
    - Secure Aggregation is optional and budgeted separately from the core LDP estimator.
    - Uplink budget is 5KB/day per device.

    **Calculations:**
    - Fleet FPR target = sum(FP_i) / sum(N_i), not the unweighted mean of per-device FPRs.
    - Core LDP payload: 1 byte for a randomized 8-bin FPR report, or a few bytes for randomized quantized FP and N counts.
    - Metadata/header budget: assume ~64 bytes for model version, day, and cohort identifiers.
    - Core report size is roughly 1-16 bytes of metrics + 64 bytes metadata, well under 5KB/day.
    - For randomized response, debias each reported bin or count with known truthful probability p and alternate probability q: estimated true count = (observed_count - n*q) / (p - q).
    - Estimate global FPR by debiasing and aggregating the false-positive numerator and negative-opportunity denominator, then computing estimated FP / estimated N.
    - Optional simplified SecAgg overhead example: 50 peers * 32 bytes = 1,600 bytes; total with SecAgg is still about 1.7KB/day but is not required for the LDP estimator.

    **Conclusion & Interpretation:**
    - **Result: Core LDP FPR Report Fits Easily Under 5KB/day.** The estimator works by debiasing noisy false-positive and negative-opportunity reports, then forming a fleet-level ratio. Optional SecAgg can hide reports from the server but its overhead is a separate budget item.
