title: Delta-Compressed ONNX Updates over Cellular Links
scenario: You're deploying a quantized INT8 model (200 MB) to 10,000 Jetson Orin edge devices. Each device downloads model updates over a 50 Mbps cellular link. The current format is ONNX (Protocol Buffers).
question: How long does a 200 MB ONNX update take over 50 Mbps, and what update format would cut bandwidth by at least 80%?
details:
  realistic_solution: A 200 MB update over 50 Mbps takes about 32 seconds per device before protocol overhead. To cut bandwidth by at least 80%, keep the deployed model as ONNX if that is the runtime contract, but distribute updates as compressed binary deltas from the previous ONNX artifact rather than sending the full protobuf again. For example, compute a bsdiff/xdelta patch between old.onnx and new.onnx, compress it with Zstd, sign the patch and target hash, then apply and verify the reconstructed ONNX file on device. The patch must be 40 MB or smaller to meet the 80% reduction target; a 20 MB compressed delta gives a 90% reduction.
  common_mistake: |
    **The Pitfall:** Treating "change the model file format" as the bandwidth solution.
    **The Rationale:** The device still needs a valid deployable artifact, and full-file compression of INT8 weights usually gives limited savings.
    **The Consequence:** The OTA package remains far above the 40 MB target needed for an 80% reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full ONNX: 200 MB.
    - 50 Mbps link (6.25 MB/s).
    - Required bandwidth cut: at least 80%, so the delivered update must be at most 20% of 200 MB.

    **Calculations:**
    - Full time: 200 MB / 6.25 MB/s = 32 seconds per device.
    - 80% reduction target: 200 MB * 0.20 = 40 MB maximum update payload.
    - Example compressed delta: 20 MB.
    - Delta transfer time: 20 MB / 6.25 MB/s = 3.2 seconds per device.
    - Fleet bandwidth: 10,000 * 200 MB = 2,000,000 MB = 2 TB full update, versus 10,000 * 20 MB = 200,000 MB = 200 GB delta update.

    **Conclusion & Interpretation:**
    - **Result: 32 seconds for the full ONNX update, or about 3.2 seconds with a 20 MB compressed delta.** A signed compressed delta format satisfies the bandwidth target while preserving ONNX as the reconstructed deployable artifact.
