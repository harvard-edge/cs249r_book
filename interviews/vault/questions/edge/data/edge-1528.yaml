title: Edge Data Quality Gating on Jetson Orin
scenario: You are designing the data validation pipeline for an autonomous agricultural robot running on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The system ingests 4x 4K camera streams and is prone to data quality issues like lens occlusion and severe glare. Option A uses a deep autoencoder for anomaly detection running on the Ampere GPU, while Option B relies on fast heuristics computed via the ISP and a tiny INT8 classifier on the DLA.
question: 'Which data quality gate is better on Jetson Orin: a GPU autoencoder or ISP heuristics plus a tiny DLA INT8 classifier?'
details:
  realistic_solution: Option B is superior for this edge architecture. By offloading data quality checks to the ISP (for heuristics) and the DLA (for the INT8 classifier), you reserve the Ampere GPU's compute and the 32 GB LPDDR5 bandwidth for the main perception models. This heterogeneous compute strategy maximizes the 275 TOPS budget while keeping power within the 60W envelope.
  common_mistake: Candidates often default to the deep learning approach (Option A) because autoencoders are elegant for anomaly detection. They fail to evaluate system-level resource contention, forgetting that running validation on the primary GPU competes with the main perception workload for memory bandwidth and compute under a strict 60W TDP.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw data: 4x 4K streams at 30 fps = ~2.98 GB/s.
    - Option A (GPU autoencoder): ~50 TOPS, ~15W.
    - Option B (DLA INT8 classifier): ~5 TOPS, ~2W.

    **Calculations:**
    - Option A consumes ~25% of TDP (15W/60W) and competes for LPDDR5 bandwidth.
    - Option B uses <2% of TOPS (5/275) and ~3% of TDP (2W/60W).

    **Conclusion & Interpretation:**
    - **Result: Option B (Compute-Bound)**. Offloading validation to the DLA preserves GPU compute and memory bandwidth for the primary perception task.
