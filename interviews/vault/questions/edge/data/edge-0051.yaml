title: Sensor Fusion Latency Budget
scenario: Your autonomous delivery robot fuses data from a stereo camera (30 FPS, 33ms frame interval), a 2D LiDAR (15 Hz, 67ms scan interval), and an IMU (200 Hz, 5ms). The perception pipeline must produce a fused obstacle map within 50ms of the most recent sensor reading. The camera object detector takes 20ms, the LiDAR scan matcher takes 8ms, and the fusion algorithm takes 5ms.
question: Can you meet the 50ms deadline, and what is the maximum sensor-to-output latency?
details:
  realistic_solution: Yes, you can meet the 50ms processing deadline if the 50ms requirement is interpreted as sensor-processing latency from the newest triggering sample to the fused map. The camera path (20ms detection + 5ms fusion = 25ms) is the critical processing path. The LiDAR path (8ms + 5ms = 13ms) is faster, but the LiDAR only updates every 67ms, so a fused map may contain a LiDAR scan that is up to one scan period old. The IMU at 200 Hz provides motion estimates every 5ms to motion-compensate that older LiDAR geometry; it improves spatial alignment, but it does not make the LiDAR sample newer. Maximum processing latency is 25ms, well within the 50ms budget with 25ms margin.
  common_mistake: |
    **The Pitfall:** Adding processing times sequentially without considering asynchronous sensors.
    **The Rationale:** Candidates assume all sensors deliver data simultaneously and processing starts immediately, incorrectly calculating 20ms + 8ms + 5ms = 33ms.
    **The Consequence:** The worst-case latency includes waiting for the slowest sensor, which is missed, leading to incorrect latency margins and potential failure in a real system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera path: 20ms + 5ms = 25ms.
    - LiDAR path: 8ms + 5ms = 13ms.
    - Budget: 50ms.

    **Calculations:**
    - Worst-case processing latency from newest camera frame to output: 25ms (camera-bound).
    - Margin: 50ms - 25ms = 25ms.
    - Maximum LiDAR data age in the fused map: up to 67ms (one scan period), separate from the 25ms processing latency.
    - Example motion compensation need: at 1 m/s, a 67ms-old LiDAR scan is shifted by 1 m/s * 0.067s = 0.067m = 67mm before IMU correction.

    **Conclusion & Interpretation:**
    - **Result: 25ms processing latency with up to 67ms LiDAR data age (Sensor-Asynchrony Mitigated)**. The deadline is met on processing latency; IMU motion compensation addresses LiDAR staleness as a separate data-freshness issue.
