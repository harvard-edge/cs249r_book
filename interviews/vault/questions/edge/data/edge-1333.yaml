title: Audio Stream Pipeline for Coral Edge TPU
scenario: 'We are deploying an always-on anomaly detection system for industrial maintenance using a Google Coral Edge TPU. The system ingests uncompressed 48kHz audio streams from 4 concurrent microphones in real-time. The predictive model expects mel-spectrogram features as input, which must be quantized to INT8. You must evaluate two real-time data ingestion designs: (A) compute mel-spectrograms on the host CPU, quantize to INT8, and stream the features to the Edge TPU, or (B) stream raw INT16 audio directly to the Edge TPU and compute the mel-spectrogram on-chip.'
question: Which pipeline is better for latency and system stability?
details:
  realistic_solution: 'Option A is the correct approach. The Google Coral Edge TPU has strictly limited operator support and requires INT8 quantization. Complex DSP operations like mel-spectrograms (which require FFTs) cannot run natively on the Edge TPU and will force a costly fallback to the host CPU. The optimal design computes features on the host, quantizing them and streaming dense INT8 feature maps to the TPU.'
  common_mistake: |
    **The Pitfall:** Attempting to offload all processing (including DSP) to the accelerator.
    **The Rationale:** Candidates assume NPU hardware uniformly handles all mathematical operations, ignoring the specialized INT8 MAC architecture of the Edge TPU.
    **The Consequence:** Compilation failures or forced CPU fallbacks that completely destroy the real-time latency budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw audio: 48kHz, 16 bits (2 bytes), 4 channels.
       - Mel-spec: 64 bins, 100 frames/sec, INT8 (1 byte).
       - USB 3.0 bandwidth: ~5 Gbps.
    2. **Calculations:**
       - Raw audio stream: 48,000 * 2 * 4 = 384 KB/sec (~3.07 Mbps).
       - Quantized Mel-spec stream: 100 * 64 * 1 * 4 = 25.6 KB/sec.
       - Bandwidth reduction = 384 KB/sec / 25.6 KB/sec = 15x.
    3. **Conclusion & Interpretation:**
       - **Result: CPU Preprocessing Wins**. Pre-computing on the CPU reduces payload size by ~15x and ensures the TPU's 4 TOPS budget is exclusively spent on supported INT8 matrix multiplications without stalling on unsupported DSP ops.
