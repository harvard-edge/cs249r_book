title: 'Dataset Curation: Optimize Label Efficiency for Edge Model Training'
scenario: 'You have 100K unlabeled images from Jetson Orin deployments. Manual labeling costs $0.50/image. Your labeling budget is $5,000 (10K labels). Your current model achieves 78% mAP.'
question: How would you choose 10,000 of the 100,000 unlabeled images to maximize mAP gain under the $5,000 labeling budget?
details:
  realistic_solution: |
    Run inference on all 100K images on Jetson Orin. Select 10K by entropy-based active learning (highest uncertainty). Cluster by scene type to ensure diversity. Expected mAP gain: 4-6% vs 1-2% for random selection.
  common_mistake: |
    **The Pitfall:** Labeling 10,000 completely random images.
    **The Rationale:** Random sampling is the default for general datasets without considering active learning.
    **The Consequence:** Wasting the $5,000 budget on redundant data points and achieving a negligible 1-2% mAP gain instead of 4-6%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 100K images.
    - Labeling Cost: $0.50/image.
    - Budget: $5,000 (10K labels).
    - Device Compute: 200 FPS on Jetson Orin.

    **Calculations:**
    - Inference Time: 100,000 images / 200 FPS = 500 seconds (8.3 minutes).
    - K-means Compute: 50 iterations * 100K * 512 = 2.56B ops (< 1 second).
    - Cost Savings: Active labels for 10K ($5K) vs random 100K labels ($50K).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Active Learning)**. Spending ~8.3 minutes on inference and <1s on clustering identifies the most valuable 10K images, achieving equivalent accuracy and saving $45,000.
