title: The Radar-Camera Fusion Latency
scenario: Your ADAS (Advanced Driver Assistance System) on an Ambarella CV5 fuses 77 GHz radar (range, velocity) with a front camera (classification, lane detection). The radar provides detections every 50ms (20 Hz) with 0.5ms processing. The camera pipeline takes 25ms (ISP + neural network). Your fusion algorithm adds 5ms. Your colleague calculates total latency as max(0.5, 25) + 5 = 30ms. But the actual sensor-to-decision latency is 55ms.
question: Where is the extra 25ms hiding, and when does the fusion latency overhead negate the benefit of having radar?
details:
  realistic_solution: The extra 25ms is synchronization overhead, not neural-network compute. The radar produces a usable detection quickly, but only every 50ms. To fuse it with the camera, the system buffers camera output until a temporally compatible radar/camera pair is available, so the fused decision can be delayed by the radar cadence and alignment window. In this case the camera pipeline and fusion compute are 25ms + 5ms = 30ms, but timestamp matching adds about 25ms of waiting, producing the observed 55ms sensor-to-decision latency. Radar's latency advantage is negated whenever the fused path waits for the next synchronization window long enough that fused latency exceeds a radar-only fast path; safety-critical braking should therefore keep a separate radar-only path while rich scene understanding can use the slower fused path.
  common_mistake: |
    **The Pitfall:** Calculating latency as max(sensor latencies) + fusion time.
    **The Rationale:** This assumes sensors are synchronized and that 'latency' means only processing time.
    **The Consequence:** Underestimating end-to-end latency and ignoring sensor asynchrony and data transfer times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Radar update period: 50ms. Radar processing: 0.5ms.
    - Camera pipeline: 25ms. Fusion algorithm: 5ms.
    - Fused path average latency: 55ms.
    - Radar-only fast path decision overhead: 2ms.
    - Vehicle speed: 120 km/h (33.3 m/s).

    **Calculations:**
    - Naive fused processing latency = max(0.5ms, 25ms) + 5ms = 30ms.
    - Radar cadence can add up to one 50ms frame period of alignment wait; this example shows about 25ms average wait.
    - Actual fused latency = 25ms camera + 25ms synchronization wait + 5ms fusion = 55ms.
    - Radar-only fast path latency after a fresh radar detection = 0.5ms + 2ms = 2.5ms, bounded by the 50ms radar update cadence for newly appearing hazards.
    - Radar-only reaction window using the next radar update = 50ms + 0.5ms + 2ms = 52.5ms.
    - Radar-only worst-case reaction distance = 33.3 m/s * 0.0525s = 1.75m.
    - Fused reaction distance: 33.3 m/s * 0.055s = 1.83m.
    - Break-even: fusion negates radar's latency benefit when synchronization wait makes fused latency exceed the radar-only reaction window, here 55ms > 52.5ms.
    - Braking delta at break-even comparison = 1.83m - 1.75m = 0.08m; compared with an already-available radar detection, the delta is much larger.

    **Conclusion & Interpretation:**
    - **Result: Fusion exceeds the radar-only reaction window (Latency-Bound)**. The hidden 25ms is synchronization wait from the 50ms radar cadence. When the fused decision arrives later than the radar-only path, safety-critical braking should use a separate radar fast path while fused perception handles richer context.
