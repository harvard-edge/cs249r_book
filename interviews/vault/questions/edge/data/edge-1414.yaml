title: Information-Compute Ratio on Coral TPU
scenario: You are deploying a continuous data pruning system on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget) to select high-value frames from a video stream for cloud training. At 30 FPS, the INT8-quantized scoring model accurately selects a diverse coreset, and the system operates efficiently. When the camera is upgraded to 120 FPS, the Coral TPU easily handles the throughput mathematically, but the system's Information-Compute Ratio (ICR) collapses, and the device consumes its maximum 2W power continuously without any proportional improvement in the downstream cloud model's accuracy.
question: Why does the Coral TPU system's Information-Compute Ratio collapse at 120 FPS despite fitting within the 4 TOPS limit?
details:
  realistic_solution: The performance collapse is due to the diminishing marginal information gain of high-frame-rate video. In the ICR framework (ICR = Information Gain / Compute Cost), adjacent frames at 120 FPS are highly correlated and provide near-zero novel features. However, the Edge TPU must still execute the same INT8 operations and draw its 2W power to run the scoring model on these redundant frames. The information numerator drops significantly for redundant frames, while the per-frame compute denominator remains constant, leading to a collapsed ICR.
  common_mistake: |
    **The Pitfall:** Focusing solely on the compute ceiling (4 TOPS) and ignoring data redundancy.
    **The Rationale:** Candidates assume that if the hardware can process frames efficiently, it inherently captures more useful data.
    **The Consequence:** Wasting the edge device's tight power budget on computing highly redundant, uninformative frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral compute constraint: 4 TOPS (4,000 GOPS).
    - INT8 scoring model = 2 GOPS/frame.
    - At 120 FPS, required compute = 120 * 2 GOPS = 240 GOPS/s, which is only 6% of the 4 TOPS peak.

    **Calculations:**
    - The hardware can process the frames: 240 GOPS/s is well below 4,000 GOPS/s.
    - The per-frame scoring cost does not fall at 120 FPS; the TPU still spends 2 GOPS for every frame and remains active continuously.
    - The extra frames are only 8.3 ms apart instead of 33.3 ms apart, so many adjacent frames add little new training signal.
    - Therefore, in ICR = Information Gain / Compute Cost, the numerator falls sharply for redundant frames while the denominator stays fixed at 2 GOPS/frame and the system keeps drawing up to 2W.

    **Conclusion & Interpretation:**
    - **Result: ICR collapse despite spare TOPS (Data/Power-Bound)**. The collapse is caused by redundant data, not by exceeding the Coral TPU compute limit.
