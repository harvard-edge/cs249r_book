title: 'Information-Compute Ratio on Coral TPU'
scenario: 'You are deploying a continuous data pruning system on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget) to select high-value frames from a video stream for cloud training. At 30 FPS, the INT8-quantized scoring model accurately selects a diverse coreset, and the system operates efficiently. When the camera is upgraded to 120 FPS, the Coral TPU easily handles the throughput mathematically, but the system''s Information-Compute Ratio (ICR) collapses, and the device consumes its maximum 2W power continuously without any proportional improvement in the downstream cloud model''s accuracy.'
question: 'Why does the Coral TPU system''s Information-Compute Ratio collapse at 120 FPS despite fitting within the 4 TOPS limit?'
details:
  realistic_solution: 'The performance collapse is due to the diminishing marginal information gain of high-frame-rate video. In the ICR framework (ICR = Information Gain / Compute Cost), adjacent frames at 120 FPS are highly correlated and provide near-zero novel features. However, the Edge TPU must still execute the same INT8 operations and draw its 2W power to run the scoring model on these redundant frames. The compute denominator increases by 4x, while the information numerator remains largely static, leading to a collapsed ICR.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the compute ceiling (4 TOPS) and ignoring data redundancy.
    **The Rationale:** Candidates assume that if the hardware can process frames efficiently, it inherently captures more useful data.
    **The Consequence:** Wasting the edge device's tight power budget on computing highly redundant, uninformative frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral compute constraint: 4 TOPS (4,000 GOPS).
    - INT8 scoring model = 2 GOPS/frame.

    **Calculations:**
    - 30 FPS scenario: Compute = 60 GOPS (1.5% util). Assuming 1 unit of info, ICR = 1 / 2 GOPS = 0.5.
    - 120 FPS scenario: Compute = 240 GOPS (6% util). Highly redundant frames = 0.1 units of info.
    - Collapsed ratio: ICR = 0.1 / 2 GOPS = 0.05.

    **Conclusion & Interpretation:**
    - **Result: 0.05 ICR (Data/Power-Bound)**. A 90% reduction in per-frame efficiency leads to wasted power computing redundant data.
