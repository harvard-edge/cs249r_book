title: The Rolling Shutter Tear
scenario: You deploy a high-speed robotics perception model that runs at 120 FPS. The object detection model's accuracy drops from 95% on a stationary dataset to 40% when the robot is spinning quickly, even though motion blur is minimal.
question: Based on the exposure diagram, what physical phenomenon is destroying your accuracy?
details:
  realistic_solution: 'The system is suffering from the Rolling Shutter Effect. CMOS sensors expose line-by-line. During rapid spin, the bottom of the frame captures a different point in space/time than the top, physically shearing the image. Convolutions trained on orthogonal data fail to recognize distorted spatial features. Mitigate by using a Global Shutter sensor or aggressively augmenting the training set with geometric shear.'
  common_mistake: |
    **The Pitfall:** Blaming the neural network's generalization ability or "motion blur".
    **The Rationale:** Engineers assume ML models are robust to all camera motion without understanding the physical physics of line-scan CMOS image capture.
    **The Consequence:** Wasting time tuning CNN architectures instead of fixing the hardware sensor or applying the exact required shear augmentations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera speed: 120 FPS (8.3ms per frame).
       - Robot spin rate: 180 degrees/sec.
       - Sensor readout time: ~8ms from top to bottom.
    2. **Calculations:**
       - Spin rate per ms = 180 / 1000 = 0.18 degrees/ms.
       - Angular drift during readout = 8 ms * 0.18 degrees/ms = 1.44 degrees.
    3. **Conclusion & Interpretation:**
       - **Result: Geometric Shear (Rolling Shutter)**. The 1.44-degree physical warping between the top and bottom of the frame breaks the spatial relationships the CNN depends on.
