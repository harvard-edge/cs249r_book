title: Edge TPU Storage Format and I/O Throughput Sizing
scenario: You are deploying an object detection model to an industrial inspection camera accelerated by a Google Coral Edge TPU via a USB 3.0 interface. The system needs to buffer hard negative examples locally on an eMMC drive for daily batch uploads. You must evaluate and select an appropriate storage format and quantify the I/O throughput to ensure the Edge TPU's processing capability is utilized efficiently without exceeding the overall power budget.
question: What storage format should the Coral pipeline use for hard negatives on eMMC, and how would you size I/O to keep the Edge TPU fed?
details:
  realistic_solution: |
    Store hard negatives as preprocessed INT8 tensors in a simple sequential format such as uncompressed TFRecord records or length-prefixed raw flat buffers, with metadata kept small and separate. This matches the Edge TPU input representation, supports sequential eMMC writes and daily batch reads, and avoids spending host CPU power on JPEG/PNG decode or columnar decoding. Size the path from the tensor byte size and expected capture rate: for normal 30 FPS inference, the tensor stream is modest; for hard-negative buffering, capacity depends on the fraction of frames retained and uploaded each day.
  common_mistake: |
    **The Pitfall:** Suggesting complex columnar formats like Parquet or heavily compressed formats (like JPEG or PNG) to save storage space.
    **The Rationale:** Candidates focus entirely on storage efficiency, ignoring the computational cost of decoding.
    **The Consequence:** The weak host CPU consumes too much power and time decompressing data, bottlenecking the system and failing to keep the Edge TPU saturated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input tensor size: 300x300x3 INT8 = 270 KB per frame.
    - Camera rate: 30 FPS.
    - Hard-negative retention rate: 5% of frames.
    - Metadata/framing overhead: 10%.
    - Practical eMMC sequential bandwidth: 100 MB/s.

    **Calculations:**
    - Live tensor read/write rate at 30 FPS: 30 * 270 KB = 8.1 MB/s before overhead.
    - Buffered hard negatives: 30 FPS * 5% = 1.5 samples/s.
    - eMMC write rate for hard negatives: 1.5 * 270 KB * 1.10 = ~446 KB/s.
    - Daily upload volume: 446 KB/s * 86,400 s/day = ~38.5 GB/day.
    - eMMC bandwidth share: 0.446 MB/s / 100 MB/s = ~0.45%.

    **Conclusion & Interpretation:**
    - **Result: eMMC I/O Feasible, Storage Capacity Dominates.** Raw INT8 tensor records keep the Edge TPU input path simple; at 5% retention, bandwidth is tiny relative to eMMC capability, but daily storage/upload planning must handle roughly 39 GB/day.
