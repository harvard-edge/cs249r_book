title: Jetson Zero-Copy Pipelines
scenario: A Jetson AGX Orin passes decoded 1080p camera frames from GStreamer CPU buffers into a TensorRT engine, causing high memory usage.
question: Analyze why standard CPU memory buffers are highly inefficient on this platform and name a better primitive?
details:
  realistic_solution: Standard GStreamer CPU buffers force decoded frames out of the NVIDIA memory path, so the pipeline often copies frame bytes into CPU-addressable storage and then maps or copies them again for CUDA/TensorRT preprocessing. On Jetson, the better primitive for a standard GStreamer-to-TensorRT path is an NVIDIA memory buffer such as `NvBufSurface` exported through DMA-BUF, typically carried through `video/x-raw(memory:NVMM)` caps. That keeps decoder output in a shared hardware buffer that CUDA or TensorRT preprocessing can map with synchronization, avoiding redundant CPU staging copies.
  common_mistake: |
    **The Pitfall:** Assuming the Jetson requires traditional host-to-device transfers.
    **The Rationale:** Candidates treat the Jetson like a desktop CPU with a discrete PCIe GPU, failing to recognize its unified memory architecture.
    **The Consequence:** Implementing explicit `cudaMemcpy` operations that pointlessly duplicate data in RAM, saturating the memory bus and killing real-time performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p RGB frame size is about 1920 * 1080 * 3 = 6.22 MB.
    - CPU-buffer path may copy those frame bytes into and out of CPU staging memory before inference.
    - NvBufSurface/DMA-BUF zero-copy still passes metadata, file descriptors, mappings, and synchronization fences; it does not reduce the transfer to an 8-byte pointer.

    **Calculations:**
    - Avoiding one redundant full-frame copy saves about 6.22 MB per frame.
    - Avoiding two redundant full-frame copies saves about 12.44 MB per frame.
    - At 30 fps, one avoided copy is about 187 MB/s of memory traffic avoided; two avoided copies are about 373 MB/s.

    **Conclusion & Interpretation:**
    - **Result: frame-byte copies avoided, not pointer-only transfer**. NvBufSurface/DMA-BUF keeps decoded frames in a GPU-accessible Jetson buffer path and reduces memory bandwidth pressure while preserving the required mapping and synchronization semantics.
