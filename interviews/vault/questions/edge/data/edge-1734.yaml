title: Streaming Data Validation for Hailo-8 Edge Inference
scenario: You are designing the data ingestion and validation pipeline for a multi-camera smart city deployment using a host processor connected to a Hailo-8 accelerator. Because the Hailo-8 has no local DRAM and relies on streaming data directly from host memory, processing corrupted or out-of-distribution frames wastes critical host-to-accelerator bandwidth.
question: What are the architectural tradeoffs between performing lightweight data quality checks on the host CPU versus running a small validation model on the Hailo-8 for 4x 1080p 30 FPS streams?
details:
  realistic_solution: 'Propose a hybrid approach: simple thresholding heuristics on the host CPU during decode, combined with a quantized INT8 lightweight anomaly detection layer fused into the main model on the Hailo-8. This leverages the dataflow architecture to seamlessly process validated features without extra memory round-trips.'
  common_mistake: Proposing to run all validation checks on the host CPU without calculating the host memory bandwidth impact, worsening the host-device bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 streams, 1920x1080, 3 channels, 30 FPS
    - Hailo-8 capacity: 26 TOPS
    - Validation model compute: 2 GOPS/frame

    **Calculations:**
    - Data Bandwidth = 4 * 1920 * 1080 * 3 * 30 = 746 MB/s
    - PCIe Gen3 x4 utilization = 746 MB/s / 3.9 GB/s = ~19%
    - Compute Requirement = 2 GOPS * 120 FPS = 240 GOPS = 0.24 TOPS

    **Conclusion & Interpretation:**
    - **Result: <1% Compute Utilization (Memory-Bandwidth-Bound)**. Fusing the validation model on the accelerator prevents wasteful PCIe streaming while trivially consuming compute.
