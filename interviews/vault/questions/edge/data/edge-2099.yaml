title: Data Pruning for Edge TPU Deployment
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV2-SSD) to a Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only) for an industrial inspection task. The model was initially trained on a very large dataset (10M images) but exhibits diminishing returns due to data redundancy. You suspect significant portions of the training data are either uninformative or highly correlated. To improve iteration speed and reduce training costs, you propose implementing a data pruning strategy like coreset selection or a similar data efficiency technique.
question: How would you quantify the potential benefits of such a strategy, specifically targeting the limitations of the Edge TPU?
details:
  realistic_solution: Implement a coreset selection algorithm (e.g., based on k-centers, diversity, or importance sampling) to reduce the training dataset size by 50-70% while maintaining or slightly improving model accuracy for the specific task. The solution would involve defining a metric for data importance (e.g., gradients, uncertainty, influence functions) and iteratively selecting a subset of the data. This would significantly reduce the computational burden of retraining, allowing faster experimentation with hyperparameter tuning or architectural changes, and ultimately leading to a more robust model that performs optimally within the Google Coral Edge TPU's constraints (e.g., achieving target latency/throughput with INT8 operations).
  common_mistake: |
    **The Pitfall:** Focusing solely on model compression (e.g., quantization, pruning model weights) without considering the efficiency gains possible from optimizing the training data itself.
    **The Rationale:** Another mistake is to apply naive data reduction without a clear metric for retaining critical information.
    **The Consequence:** This potentially leads to 'model collapse' or degraded performance, especially on edge devices with limited inference capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial dataset: 10M images; baseline training/evaluation iteration: 24 hours.
    - Pruned dataset: 3M images (70% reduction).
    - Target deployment must compile to Edge TPU INT8 and meet latency, memory, and power budgets.

    **Calculations:**
    - Dataset reduction factor = 10M / 3M ≈ 3.33, meaning 70% fewer training samples are read and augmented per epoch.
    - If input reading and augmentation dominate the 24-hour loop, the lower-bound iteration time could approach 24 / 3.33 ≈ 7.2 hours; if model compute or evaluation dominates, the wall-clock speedup will be smaller.
    - The defensible benefit is a measured reduction in retraining time, storage, and labeling/review volume, not an assumed universal 3.33x end-to-end speedup.
    - Edge TPU benefit must be measured after retraining: compile success, INT8 model size, peak activation memory, latency/FPS, and board power versus the unpruned-data model.

    **Conclusion & Interpretation:**
    - **Result: 70% fewer samples, with speedup dependent on the training stack.** Coreset selection can reduce retraining cost and iteration time, but the Edge TPU claim is only valid if the resulting INT8 model preserves accuracy while meeting compile, latency, memory, and power targets on the Coral device.
