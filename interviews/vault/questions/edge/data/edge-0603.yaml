title: The Thermal Camera Calibration Drift
scenario: Your perimeter security system uses 200 Jetson Orin NX devices, each paired
  with a FLIR Lepton 3.5 thermal camera and an RGB camera. The thermal-RGB fusion
  model detects intruders at night with 99.2% recall. After 14 months, nighttime recall
  has dropped to 91% — but only for the thermal channel. The RGB channel (with IR
  illuminator) is unchanged. Daytime performance (RGB-only) is unaffected. The thermal
  cameras still produce images, and the model file is unchanged.
question: What's degrading the thermal channel, and how do you architect a self-correcting
  system?
details:
  realistic_solution: The thermal camera's radiometric calibration has drifted. The
    Lepton 3.5 performs a Flat Field Correction (FFC) — an internal shutter closes
    briefly to capture a uniform reference frame, which is subtracted from subsequent
    frames to correct for non-uniform pixel response. The FFC must be triggered periodically
    to maintain true radiometric accuracy over long operational periods.
  common_mistake: '**The Pitfall:** Assuming the hardware sensor has degraded over
    time.

    **The Rationale:** Candidates incorrectly conclude that since only the thermal
    channel degraded, the sensor itself must be dying.

    **The Consequence:** Replacing perfectly functional cameras instead of correctly
    diagnosing the radiometric calibration drift that is burying the signal in quantization
    noise.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Contrast: Human (37°C) vs background (20°C) at 200m = ~2.0°C.

    - Quantization: INT8 over a 30°C range = 0.118°C/level.

    - Drift: Uncorrected calibration drifts ~1.5°C over time.


    **Calculations:**

    - Drifted contrast: 2.0°C - 1.5°C = 0.5°C.

    - Signal intensity: 0.5°C / 0.118°C = ~4.2 INT8 levels.

    - Recalibrated contrast: 1.9°C (16 INT8 levels).


    **Conclusion & Interpretation:**

    - **Result: 4.2 Levels (Signal-to-Noise-Bound)**. The 1.5°C drift crushes the
    weak long-range thermal signal into the ±2 INT8 quantization noise floor. Regular
    Flat Field Correction (FFC) restores the 16-level dynamic range.

    '
