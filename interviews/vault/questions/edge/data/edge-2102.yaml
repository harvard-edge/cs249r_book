title: 'Optimizing Data for Edge AI on Hailo-8'
scenario: 'Your team is deploying a real-time object detection model on the Hailo-8 edge AI accelerator, which boasts 26 TOPS (INT8) and a typical power consumption of 2.5W. The initial model performs well in the lab, but struggles with generalization and inference latency in diverse real-world scenarios due to a large, uncurated training dataset. You suspect the data wall problem is hindering performance and slowing down development cycles.'
question: 'How would you approach identifying and mitigating this issue, specifically leveraging data efficiency and selection techniques given the Hailo-8''s constraints?'
details:
  realistic_solution: 'Implement coreset selection or active learning to strategically prune the dataset to its most informative samples. For instance, use a technique like uncertainty sampling or diversity-based coreset selection. This reduced dataset speeds up training and improves edge generalization.'
  common_mistake: 'Continuously collecting more data without a strategic selection process, assuming more data is always better, which drastically slows training.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original dataset: 100 epochs, 20 minutes/epoch = 2,000 minutes total.
    - Coreset selection reduces dataset size by 50% while maintaining performance.

    **Calculations:**
    - Training time per epoch drops to 10 minutes.
    - Total training time: 100 epochs * 10 min/epoch = 1,000 minutes (16.67 hours).
    - Savings: 2,000 - 1,000 = 1,000 minutes saved per run.

    **Conclusion & Interpretation:**
    - **Result: 16.67 Hours Training Time (Compute-Bound)**. Coreset selection saves 1,000 minutes per training run, drastically reducing development cycles.
