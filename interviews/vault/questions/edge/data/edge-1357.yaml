title: Edge Telemetry Storage Sizing on Jetson Orin
scenario: You are deploying a perception logging service on an NVIDIA Jetson Orin for an autonomous edge device. The system generates 2500 event logs per second, where each log contains INT8 tensor metadata averaging 4 KB in raw row-based format. You allocate exactly 3 GB of memory to buffer these logs before batch flushing them to an NVMe drive.
question: How long does the 3 GB uncompressed log buffer last, and what is the hourly Parquet disk footprint with 4x compression if you switch to a columnar format?
details:
  realistic_solution: Implementing a columnar storage format (Parquet) with lightweight compression (e.g., Snappy or LZ4) minimizes NVMe write amplification and extends SSD lifespan. The 3 GB RAM buffer acts as an asynchronous staging area, allowing for efficient, massive sequential disk flushes that optimize PCIe bus utilization.
  common_mistake: |
    **The Pitfall:** Applying the compression ratio to the in-memory buffer capacity.
    **The Rationale:** Candidates overlook that telemetry data is typically buffered uncompressed in RAM before serialization and compression routines are applied during the disk flush.
    **The Consequence:** Wildly inaccurate memory duration estimates, leading to buffer overflows and dropped telemetry frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ingestion rate: 2500 events/sec
    - Uncompressed log size: 4 KB/event
    - Buffer capacity: 3 GB (3000 MB)
    - Compression ratio: 4x

    **Calculations:**
    - Uncompressed data rate = 2500 * 4 KB = 10,000 KB/sec = 10 MB/sec
    - Buffer duration = 3000 MB / 10 MB/sec = 300 seconds
    - Compressed disk rate = 10 MB/sec / 4 = 2.5 MB/sec
    - Hourly footprint = 2.5 MB/sec * 3600 sec = 9000 MB = 9 GB

    **Conclusion & Interpretation:**
    - **Result: 300s, 9GB (Storage-Bound)**. 300 seconds buffer duration, 9 GB hourly footprint.
