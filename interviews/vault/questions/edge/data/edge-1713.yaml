title: Storage I/O Optimization for Qualcomm AI 100
scenario: An on-premise video analytics appliance using a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) is severely underutilized, hitting only 10% of its compute capacity. The pipeline currently reads independent JSON metadata files and raw PNG images from an edge NVMe drive.
question: What data-loading bottleneck is leaving the Cloud AI 100 at 10% utilization, and what storage format would keep it fed?
details:
  realistic_solution: The ideal solution involves migrating to a sequential binary format like TFRecord or WebDataset, interleaving metadata and images. To balance PCIe bandwidth and CPU decompression overhead, lightweight compression like LZ4 or Snappy should be used. This allows large sequential reads from the NVMe drive directly into the host memory, minimizing CPU parsing overhead before transferring to the 32 GB LPDDR4x on the accelerator.
  common_mistake: Candidates often suggest migrating all data to a columnar format like Parquet, not realizing it is suboptimal for storing large uncompressed image tensors. Alternatively, they might propose aggressive compression like GZIP, which reduces disk I/O but introduces a massive CPU decompression bottleneck on the limited edge host.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100 INT8 capacity: 400 TOPS. Model requires 40 GOPS (10,000 fps max).
    - Image size: 224x224 RGB (~150 KB).

    **Calculations:**
    - Required data throughput: 10,000 frames/sec * 150 KB/frame = 1.5 GB/s.
    - TFRecord sharding enables sequential reads at >2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.5 GB/s (I/O-Bound)**. Parsing independent JSON/PNG files creates a massive CPU/IOPS bottleneck; sequential binary formats fully utilize the NPU.
