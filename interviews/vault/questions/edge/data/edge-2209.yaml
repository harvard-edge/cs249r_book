title: Edge Label Quality Gate Spec
scenario: You need a label-quality gate for edge-collected safety incidents before retraining. Labels come from different sites, shifts, and annotators.
question: What validation rules should gate edge-collected safety labels before retraining to prevent corruption?
details:
  realistic_solution: Require annotator agreement, per-site sampling, disagreement escalation, schema validation, timestamp/device consistency, class-balance checks, and holdout review for rare safety classes. The gate should fail closed for high-impact labels rather than letting noisy incident labels dominate retraining.
  common_mistake: |
    **The Pitfall:** Checking only schema format (e.g., ensuring a label field is not null).
    **The Rationale:** Candidates often approach quality gates purely from a software engineering perspective rather than a statistical ML perspective.
    **The Consequence:** Ignoring disagreement rates, site skew, and rare-class risk allows catastrophic noise to silently corrupt the highest-weighted gradient updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Assume 2% of collected labels are high-severity safety-critical events.
    - In a weighted loss function, rare events might make up 50% of the retraining loss magnitude.

    **Calculations:**
    - A small fraction of these rare labels accounts for massive gradient updates.

    **Conclusion & Interpretation:**
    - **Result: 50% loss magnitude (Data-Bound)**. If even a small fraction of these rare labels are noisy or misannotated, they will completely dominate the gradient update and destroy the model's safety reliability.
