title: The Unverifiable Edge Inference
scenario: Smart cameras perform on-device inference for retail analytics, sending only aggregated data to the cloud. Clients demand auditability of inferences to resolve disputes.
question: How do you design the system to ensure data provenance and tamper-proof audit trails for on-device ML inferences, even with limited storage and intermittent cloud connectivity?
details:
  realistic_solution: Implement a cryptographic hash chain for inference logs. For each inference, generate a log entry with metadata and compute its SHA256 hash, chaining it to the previous entry's hash. Periodically sign batches with a device-specific private key and store them in a secure local WORM partition. Upload these signed, chained logs during connectivity windows. This guarantees tamper-evident provenance without storing raw privacy-violating video.
  common_mistake: |
    **The Pitfall:** Storing and uploading raw video snippets for audit purposes.
    **The Rationale:** Assuming visual proof is the only way to resolve disputes, ignoring cryptographic logging alternatives.
    **The Consequence:** Violating privacy policies, exhausting edge storage, and incurring massive cellular data costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference rate: 10 inferences/sec. Log entry size: 100 bytes.
    - Video bit rate: ~3 MB/s.

    **Calculations:**
    - Log Data: 10 * 100 bytes = 1 KB/sec.
    - Daily Log Storage: 1 KB/s * 86400s = ~86.4 MB/day.
    - Raw Video Storage: 3 MB/s * 86400s = ~259 GB/day.

    **Conclusion & Interpretation:**
    - **Result: <100MB daily (Storage-Bound)**. Cryptographic logs use <100MB daily, making auditability viable over intermittent connections without saving 259GB of video.
