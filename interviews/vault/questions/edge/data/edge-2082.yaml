title: 'Coral Edge TPU Disease Detection: Active Learning for Rare Disease Data Curation'
scenario: Your team is developing an agricultural drone equipped with a camera to detect early signs of a rare plant disease. The drone uses a custom object detection model running on a Google Coral Edge TPU. The current model struggles with the rare disease due to extreme class imbalance in your initial dataset. To significantly improve performance for this rare disease, you propose an active learning strategy for dataset curation.
question: How would you design and quantify an active learning loop to improve rare plant disease detection on a Coral Edge TPU under INT8 and annotation-budget constraints?
details:
  realistic_solution: |
    Implement an active learning loop that scores field images with the current INT8-compatible model, selects candidates by rare-class uncertainty plus diversity over embeddings, and caps near-duplicates from the same field, lighting condition, or disease stage. Quantify each round with a fixed annotation budget: for example, review 1,000 highest-value candidates, measure the actual positive yield and rare-class validation lift, and stop when marginal positives per 100 labels or recall improvement falls below a preset threshold. Use a multi-stage annotation workflow with inter-annotator agreement checks for ambiguous disease cases, then retrain and re-quantize so the Coral Edge TPU model is evaluated on rare-class recall, precision, calibration, and INT8 accuracy loss before the next sampling round.
  common_mistake: |
    **The Pitfall:** Proposing simple random sampling or only uncertainty-based sampling without considering diversity.
    **The Rationale:** Uncertainty-only loops often select many near-duplicate ambiguous frames from the same field, lighting condition, or disease stage instead of covering the rare subtype distribution.
    **The Consequence:** The annotation budget is spent on redundant labels, rare visual variants remain underrepresented, and the INT8 edge model still misses the disease cases the loop was meant to improve.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial dataset: 10,000 images, 100 positive.
    - Target: 5x increase = 500 new positive examples or an agreed rare-class recall lift.
    - Annotation cost: 30 seconds and $0.50 per ambiguous image.
    - Batch size: 1,000 selected ambiguous/diverse images per round.
    - Positive yield is measured as y, not assumed.

    **Calculations:**
    - One round annotation cost: 1,000 images * $0.50 = $500.
    - One round annotation time: 1,000 images * 30 seconds = 30,000 seconds = ~8.3 hours.
    - New positives per round = 1,000 * y. If y = 20%, one round adds 200 positives; about 3 rounds are needed to reach 500 positives.
    - At y = 20%, estimated spend is 3 * $500 = $1,500 and labeling time is 3 * 8.3 = ~25 hours before retraining/evaluation overhead.

    **Conclusion & Interpretation:**
    - **Result: cost depends on measured positive yield and validation lift.** A 1,000-image round costs about $500 and 8.3 labeling hours; continue only while positives per label or rare-class metric improvement justifies the next round.
