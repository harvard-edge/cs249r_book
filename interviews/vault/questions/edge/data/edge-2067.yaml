title: Real-time Edge Video Pipeline Optimization Under Uplink Limits
scenario: You are tasked with deploying a real-time object detection system on edge devices. Each device ingests high-resolution video (1080p@30FPS) from multiple cameras. The processed bounding box data, along with critical cropped regions of interest (ROI), must be sent to a central cloud for analysis. The current pipeline involves CPU-based processing, inference, and transmission over a constrained 5 Mbps effective uplink. Your team observes intermittent end-to-end latency spikes exceeding 500ms for critical events and occasional local buffer overflows.
question: How would you optimize this video pipeline to avoid 500 ms spikes and buffer overflows under a 5 Mbps uplink budget?
details:
  realistic_solution: |
    Profile the pipeline with timestamps at capture, decode, preprocessing, inference, post-processing, enqueue, transmit, and cloud acknowledgment. Reduce uplink pressure by sending metadata by default, cropping only high-priority ROIs, compressing ROIs with bounded quality settings, deduplicating repeated detections, and aggregating events within a small latency budget. Add backpressure so low-priority events are dropped or summarized before buffers overflow, and cap batch sizes so batching does not create 500ms tail latency. Track queue depth, bytes queued, service rate, frame-drop rate, and per-stage p95/p99 latency to separate local processing delay from backlog-driven network delay.
  common_mistake: |
    **The Pitfall:** Focusing solely on raw inference throughput while overlooking CPU-bound tasks and uplink saturation.
    **The Rationale:** Candidates fail to apply intelligent filtering and compression at the edge, transmitting excessively large unoptimized ROIs.
    **The Consequence:** The limited 5 Mbps uplink saturates immediately, causing massive queue buildups and violating the 500ms latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uplink Capacity: 5 Mbps = 625 KB/s.
    - Event Size (cropped ROI + metadata) = 15 KB.

    **Calculations:**
    - Maximum sustainable event rate = 625 KB/s / 15 KB/event = ~41.7 events/s.
    - If arrivals average 50 events/s, queue growth = 50 - 41.7 = 8.3 events/s.
    - Excess queued data grows by 8.3 * 15 KB = 124.5 KB/s.
    - Added network drain time grows by 124.5 KB / 625 KB/s = about 199ms per second of sustained overload.
    - Local service latency example = 70ms + 20ms + 30ms + 100ms = 220ms before any existing backlog.

    **Conclusion & Interpretation:**
    - **Result: about 41.7 events/s sustainable (Uplink/Queue-Bound)**. A 50 events/s burst does not instantly imply 500ms latency, but sustained overload grows backlog until end-to-end delay exceeds the 500ms budget unless filtering, compression, backpressure, or dropping reduces the arrival rate.
