title: Edge Active Learning Upload Budget
scenario: An edge defect detector captures 200,000 frames per day. An uncertainty sampler keeps 0.5% of the frames for active learning labeling. Each compressed frame is 300 KB.
question: Does uploading the selected edge frames fit within a 2 GB/day link budget?
details:
  realistic_solution: The sampler keeps 1,000 frames/day. At 300 KB each, upload volume is 300 MB/day, which fits easily within 2 GB/day. This leaves headroom for metadata and retries.
  common_mistake: |
    **The Pitfall:** Using the raw frame volume instead of the sampled volume, or ignoring protocol overhead.
    **The Rationale:** Candidates often skip the sampling multiplication step, assuming the full dataset must be transferred.
    **The Consequence:** Incorrectly concluding the system is physically impossible to deploy, or failing to budget for metadata and retries.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total frames captured: 200,000 frames/day.
    - Active learning sampling rate: 0.5%.
    - Compressed frame size: 300 KB.
    - Daily link budget: 2 GB/day.

    **Calculations:**
    - Selected Frames: 200,000 * 0.005 = 1,000 frames/day.
    - Upload Volume: 1,000 frames * 300 KB/frame = 300,000 KB/day.
    - Conversion to MB: 300,000 KB / 1000 = 300 MB/day.

    **Conclusion & Interpretation:**
    - **Result: 300 MB/day fits within the 2 GB/day budget (Network-Feasible).**
