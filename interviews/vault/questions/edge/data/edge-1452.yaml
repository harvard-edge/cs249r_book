title: Unified Memory Contention in High-Frequency Edge Ingestion
scenario: You have a real-time sensor ingestion pipeline running on an edge SoC with unified LPDDR5 memory shared by I/O, CPU, GPU, and DLA. The system ingests uncompressed 30 MB LiDAR point clouds at 20Hz. When you increase the rate to 60Hz, latency spikes and frame drops appear even though the GPU and DLA are at only 30% utilization and power is 40W, below the 60W TDP limit.
question: Why do latency spikes and frame drops appear at 60Hz LiDAR ingestion despite 30% accelerator utilization and 40W power draw?
details:
  realistic_solution: The bottleneck is memory bandwidth contention on the unified LPDDR5 memory. The SoC shares a single memory pool across the CPU, GPU, DLA, and I/O controllers. High-frequency uncompressed data ingestion forces the memory controller to constantly service I/O writes and CPU preprocessing reads, which competes directly with the GPU/DLA trying to fetch weights and activations. This contention causes memory queuing delays, leading to latency spikes even when the 275 TOPS compute capacity is mostly idle.
  common_mistake: |
    **The Pitfall:** Assuming the compute units are thermal throttling.
    **The Rationale:** Candidates ignore the explicitly stated 40W power draw and low 30% utilization, failing to realize the SoC uses a Unified Memory Architecture (UMA) where CPU, GPU, and I/O share the same memory pool.
    **The Consequence:** Attempting to optimize the model to use INT8 on the DLA, which does absolutely nothing to fix the memory bandwidth contention caused by uncompressed point clouds.
  napkin_math: |
    **Assumptions & Constraints:**
       * Uncompressed LiDAR frame = 30 MB.
       * Baseline ingestion rate = 20Hz; new ingestion rate = 60Hz.
       * SoC uses Unified Memory Architecture (UMA), so I/O writes and preprocessing reads share memory bandwidth with accelerators.
    **Calculations:**
       * 20Hz raw ingress = 30 MB * 20 = 600 MB/s.
       * 60Hz raw ingress = 30 MB * 60 = 1.8 GB/s.
       * Scaling from 20Hz to 60Hz triples the unavoidable I/O write traffic before CPU preprocessing or accelerator reads.
    **Conclusion & Interpretation:**
       * **Result: Memory Contention-Bound.** The 60Hz stream triples shared-memory pressure, so UMA memory-controller queues can stall preprocessing and accelerator fetches even while compute units and power remain underutilized.
