title: Active Learning Data Pipeline for Edge TPU Defect Detection
scenario: You are designing an active learning and data curation pipeline for a visual inspection system deployed across a manufacturing plant using Google Coral Edge TPU devices. The Edge TPUs have 4 TOPS of compute at 2W power and strictly require INT8 quantization with limited operator support. The factory cameras generate millions of images daily, but your annotation team can only label 1,000 images per week.
question: How would you select 1,000 weekly images for annotation from Coral Edge TPU devices given INT8-only, limited-operator hardware?
details:
  realistic_solution: The optimal design splits the active learning workload. The INT8 model deployed on the Coral Edge TPU performs a lightweight, first-pass filtering (e.g., saving images where the standard classification confidence is between 40% and 60%). These candidate images are uploaded to a central server. In the cloud, a larger, unquantized FP32 'teacher' model or an ensemble evaluates the uploaded candidates using rigorous uncertainty and diversity sampling (e.g., core-set selection) to pick the final 1,000 images for human annotation. This respects the edge hardware limits while maximizing annotation ROI.
  common_mistake: Candidates often propose running complex uncertainty estimation techniques (like Monte Carlo Dropout or deep ensembles) directly on the edge devices to select hard examples. This fails because the Coral Edge TPU strictly requires INT8 quantized models and has limited operator support, meaning these complex, unquantized architectures cannot run or would severely bottleneck the 4 TOPS hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV2 INT8 inference: ~0.006 TOPS.
    - Coral Edge TPU: 4 TOPS at 2W.
    - Factory line: 5 cameras at 30 FPS = 150 FPS.
    
    **Calculations:**
    - Max throughput: 4 TOPS / 0.006 TOPS = ~666 FPS.
    - Utilization: 150 FPS / 666 FPS = ~22% compute capacity.
    - On-device INT8 filter uploads 0.05% of 13M frames = 6,500 daily.
    - Cloud distilled: 45,500 weekly images down to 1,000 budget.
    
    **Conclusion & Interpretation:**
    - **Result: 22% Utilization (Compute-Bound)**. The Edge TPU easily filters the frames locally, heavily reducing the data bandwidth requirement.
