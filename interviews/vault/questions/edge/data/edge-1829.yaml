title: Data Pruning for Edge TPU Object Detection
scenario: You are tasked with specifying a data selection and pruning strategy for an object detection model to be deployed on an edge accelerator. The target hardware provides 4 TOPS at INT8 precision, consumes 2W of power, and requires all operations to be fully quantized to INT8 to avoid costly fallbacks.
question: How would you select a 500k-image coreset from 5 million images to maximize accuracy after INT8 deployment on the Edge TPU?
details:
  realistic_solution: |
    Build the coreset with the deployed constraint in the loop. Compile a fully INT8 Edge TPU-compatible proxy, score all 5 million images with both FP32 and INT8 views, and select 500k images that combine class/scene coverage, hard examples, high INT8 uncertainty, and large FP32-to-INT8 disagreement. Exclude examples whose value depends on unsupported operators or CPU fallback behavior, because the objective is deployed INT8 accuracy on the Edge TPU rather than FP32 validation accuracy.
  common_mistake: |
    **The Pitfall:** Using generic active learning scores derived from an FP32 model.
    **The Rationale:** Candidates forget the target hardware constraints, assuming FP32 uncertainty perfectly mirrors INT8 uncertainty.
    **The Consequence:** The selected coreset over-indexes on subtle features that are subsequently obliterated during INT8 quantization, severely capping deployed accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 TOPS (4,000 GOPS) at 2W power.
    - Model cost: ~2 GOPS per frame.

    **Calculations:**
    - Ideal hardware latency at perfect utilization = 2 GOP / 4,000 GOP/s = 0.0005 s = 0.5 ms.
    - Energy per inference at 2W for 0.5 ms = 2 J/s * 0.0005 s = 0.001 J = 1 mJ.
    - This estimate excludes host preprocessing, memory stalls, and utilization loss.

    **Conclusion & Interpretation:**
    - **Result: 0.5 ms and 1 mJ are ideal lower bounds.** The coreset should optimize accuracy for the fully quantized path; any selection process that rewards FP32-only behavior or fallback-dependent features will not maximize deployed Edge TPU accuracy.
