title: Edge Data Quality Gate Compute Utilization
scenario: You are deploying a vision data quality gate on an NVIDIA Jetson Orin. The system ingests 4 camera streams at 30 frames per second. Before passing the frames to the main Ampere GPU perception pipeline, you must validate the data integrity using a lightweight INT8 model running on the DLA accelerator. This validation model requires 10 GOPs per frame.
question: What percentage of Jetson Orin's 275 TOPS INT8 budget is consumed by a 10 GOPs/frame quality gate on 4 cameras at 30 FPS?
details:
  realistic_solution: First, calculate the total operations per second required by
    the validation model across all streams by multiplying the cameras, frame rate,
    and compute per frame. Convert the total GOPs to TOPS by dividing by 1,000. Finally,
    divide this required compute by the Jetson Orin's total capacity (275 TOPS) to
    find the utilization percentage. This confirms the data quality gate is lightweight
    enough to leave ample compute headroom for the primary perception tasks.
  common_mistake: |
    **The Pitfall:** Calculating compute requirements for a single frame instead of the entire multi-camera stream.
    **The Rationale:** Candidates fail to account for the spatial and temporal dimensions (number of cameras and frame rate) and confuse GOPs with TOPS.
    **The Consequence:** Underestimating the INT8 compute utilization by orders of magnitude, leading to downstream bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 4 camera streams at 30 FPS.
    - Validation model compute: 10 GOPs/frame.
    - Peak Orin INT8 compute: 275 TOPS.

    **Calculations:**
    - Total FPS: 4 * 30 = 120 FPS.
    - Compute Required: 120 FPS * 10 GOPs/frame = 1200 GOPs = 1.2 TOPS.
    - Utilization Percentage: (1.2 TOPS / 275 TOPS) * 100 = 0.436%.

    **Conclusion & Interpretation:**
    - **Result: 0.44% of total INT8 compute budget consumed (Compute-Feasible).**
