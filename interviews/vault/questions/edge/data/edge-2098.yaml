title: 'Edge ML with Hailo-8: Data Efficiency for Continuous Adaptation'
scenario: You are tasked with designing the data pipeline for a fleet of smart industrial inspection cameras equipped with Hailo-8 AI processors. The model needs to continuously adapt and improve due to environmental factors. However, data collection from the edge is costly, bandwidth-limited, and memory is constrained.
question: How would you select and process data for continuous learning on Hailo-8 without exceeding the power budget or risking model collapse?
details:
  realistic_solution: Use a bounded edge pipeline rather than collecting every frame. Run normal inference on Hailo-8 and compute cheap host-side selection signals such as low confidence, high entropy, novelty against recent embeddings, and defect-class rarity. Keep selected samples in a fixed-size ring buffer with diversity quotas so common lighting shifts do not evict rare defects. Periodically offload a small coreset, embeddings, labels, and summary statistics for cloud retraining; keep raw frames local unless they are explicitly selected. Prevent model collapse with replay from a stable reference set, conservative update gates, and regularization or distillation against the deployed model before promoting an adapted model.
  common_mistake: |
    **The Pitfall:** Indiscriminately collecting all data or relying solely on simple confidence-based filtering.
    **The Rationale:** Candidates often transfer cloud-based big data mindsets to the edge, ignoring bandwidth and power costs.
    **The Consequence:** Rapid battery depletion, saturated networks, and model collapse due to catastrophic forgetting of rare defects.
  napkin_math: |
    **Assumptions & Constraints:**
       - Data ingestion: 30 FPS * 1 MB/frame = 30 MB/s.
       - Selection target: retain 1 informative frame per second at 100 KB/sample after crop/compression.
       - Upload bandwidth: 1 Mbps.
    **Calculations:**
       - Raw ingest rate = 30 MB/s, so storing everything for 1 hour would be 30 * 3600 = 108,000 MB (~108 GB).
       - Selected coreset rate = 1 sample/s * 100 KB = 100 KB/s.
       - One-hour coreset storage = 100 KB/s * 3600 s = 360 MB, about 300x smaller than raw capture.
       - Upload time for 360 MB at 1 Mbps = 360 * 8 / 1 = 2880 seconds (~48 minutes).
    **Conclusion & Interpretation:**
       - **Result: Bandwidth-Constrained Selection**. The pipeline must avoid raw-frame upload and send only a bounded coreset or metadata; power feasibility still needs measurement, but the storage and bandwidth math supports the selection policy.
