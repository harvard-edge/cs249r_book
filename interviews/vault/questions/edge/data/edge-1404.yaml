title: 'Hailo-8 Local DRAM Memory Architecture'
scenario: 'You are evaluating the Information-Compute Ratio (ICR) framework for an edge deployment pipeline on the Hailo-8 dataflow accelerator. The device provides 26 TOPS INT8 compute under a strict 2.5W power envelope. To optimize data selection and avoid the data wall problem during real-time processing, you must design a pipeline that feeds data efficiently to the hardware.'
question: 'What is the specific capacity of local DRAM on the Hailo-8?'
details:
  realistic_solution: 'The candidate should recall that the Hailo-8 has exactly zero local DRAM. As a dataflow accelerator, it relies entirely on streaming data directly from the host system''s memory. This means data pipelines must be designed for continuous, steady streaming rather than relying on on-device memory buffers.'
  common_mistake: |
    **The Pitfall:** Assuming all accelerators possess local DRAM.
    **The Rationale:** Candidates accustomed to GPUs or TPUs assume that edge AI accelerators include at least a small amount of dedicated local LPDDR memory to buffer inputs.
    **The Consequence:** They mistakenly design pipelines for burst-loading data batches into the accelerator's local memory, which is impossible on a dataflow architecture like Hailo-8.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 26 TOPS INT8.
    - Power: 2.5W.
    - Local DRAM: 0 GB.

    **Calculations:**
    - Pipeline Constraint: If processing an INT8 input tensor of 2MB at 30 FPS, the host must continuously stream at 2MB * 30 = 60 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 60 MB/s (Memory-Bandwidth Bound)**. There is no local DRAM to stage data.
