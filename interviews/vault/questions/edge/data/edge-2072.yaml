title: Edge Data Integrity Real-time Validation
scenario: Autonomous robots process 900 MB/s of sensor data on a Jetson Orin for real-time anomaly detection. Data integrity schemas must be enforced within 50ms.
question: How would you design a real-time data quality system on Jetson Orin that enforces schemas, drift gates, and anomaly checks within 50ms and 60W?
details:
  realistic_solution: |
    Build a staged validation path. Run schema and range checks as CPU-friendly fast-path code over zero-copy or pinned buffers, using precompiled FlatBuffers/Protobuf accessors and rejecting malformed records before expensive work. Keep drift gates as streaming statistics or sketches updated incrementally. Use the GPU or DLA only for anomaly models that compile cleanly through TensorRT into supported INT8 DNN operations, such as a small autoencoder; keep Isolation Forests or unsupported control-heavy checks on CPU/GPU code paths instead of assuming DLA delegation. Budget each stage with per-window timing, queue depth, and power telemetry so validation can shed optional anomaly scoring before missing the 50ms deadline.
  common_mistake: |
    **The Pitfall:** Over-designing with cloud-centric validation patterns (Kafka/Spark streams) or massive deep learning anomaly models.
    **The Rationale:** Engineers port enterprise data pipelines to the edge without accounting for extreme memory bandwidth limitations.
    **The Consequence:** Validation tasks consume the entire compute and bandwidth budget, causing dropped packets and exceeding 60W.
  napkin_math: |
    **Assumptions & Constraints:**
    - Window budget: 50ms within 60W.
    - Ingestion rate: 900 MB/s.
    - CPU checking costs 1000 cycles/KB.
    - Optional INT8 anomaly model costs 100 ops/byte and must use supported accelerator ops.

    **Calculations:**
    - Data per 50ms window = 900 MB/s * 0.05s = 45 MB.
    - 45 MB is about 45,000 KB, so schema checking costs about 45,000 * 1000 = 45M cycles per window.
    - Sustained CPU rate for schema checks = 45M cycles / 0.05s = 900M cycles/s, about 0.9 GHz of one core before cache misses and branching overhead.
    - Optional anomaly scoring at 100 ops/byte = 900 MB/s * 1,000,000 bytes/MB * 100 ops/byte = 90 GOPS.

    **Conclusion & Interpretation:**
    - **Result: schema checks are CPU-significant but feasible; anomaly scoring is accelerator-feasible only if the model maps to supported TensorRT/DLA or GPU ops.** The design is pipeline- and memory-bandwidth-sensitive, so it should keep schema checks on a fast CPU path and offload only compatible DNN-style anomaly models.
