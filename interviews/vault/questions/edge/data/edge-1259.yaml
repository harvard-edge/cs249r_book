title: Data Quality Gates for High-Throughput On-Premise Inference
scenario: An on-premise pipeline runs 8 defect detection streams on a 32GB Cloud AI 100. Frequent sensor degradation causes silent corruption.
question: How would you architect on-premise data validation and lineage tracking on Cloud AI 100 without starving the defect detectors?
details:
  realistic_solution: A strong design uses a tiered validation approach. Tier 1 executes lightweight CPU heuristics and records lineage metadata off the accelerator. Tier 2 reserves a small, explicit accelerator budget for a highly quantized INT8 embedding model that flags out-of-distribution inputs. The validation path should run asynchronously with bounded queues and shed validation samples before it steals memory or compute from the primary defect detectors.
  common_mistake: |
    **The Pitfall:** Proposing heavy, complex deep-learning anomaly models, like large autoencoders, on the same accelerator.
    **The Rationale:** Engineers apply generalized cloud validation models without evaluating intense memory tradeoffs on the physical edge silicon.
    **The Consequence:** The validation model consumes the remaining device memory and compute budget, preventing the primary defect model from running concurrent streams.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator budget: 32 GB device memory and 400 INT8 TOPS peak.
    - Reserve for runtime buffers, queues, and fragmentation: 4 GB.
    - Primary defect detector per stream: 3 GB working set and 20 TOPS sustained.
    - Tiny validation model per stream: 100 MB working set and 1 TOPS sustained.

    **Calculations:**
    - Primary workload for 8 streams: 8 * 3 GB = 24 GB and 8 * 20 TOPS = 160 TOPS.
    - Validation workload for 8 streams: 8 * 0.1 GB = 0.8 GB and 8 * 1 TOPS = 8 TOPS.
    - Total memory including reserve: 24 GB + 0.8 GB + 4 GB = 28.8 GB, leaving 3.2 GB headroom.
    - Total sustained compute: 160 TOPS + 8 TOPS = 168 TOPS, below the 400 TOPS peak budget.

    **Conclusion & Interpretation:**
    - **Result: Tiny validation fits within 28.8 GB and 168 TOPS.** The validation budget is explicit and bounded, while heavier anomaly models should be rejected or sampled offline because they would compete directly with the defect detectors.
