title: The Thermal Camera Calibration Ghost
scenario: Your Ambarella CV5-based perimeter security system uses a LWIR thermal camera (640x512, 30 Hz) for person detection at night. The system works well from October through March. Starting in April, false positive rate climbs from 2% to 35% — the model detects 'people' where there are none, always near concrete walls and metal structures. By July, the system is unusable. Come October, it starts working again. The model hasn't changed.
question: 'What''s happening?'
details:
  realistic_solution: 'The thermal camera measures temperature differences, not absolute temperatures. Person detection works because humans (~37°C skin, ~28°C clothed) are warmer than the background. In winter (ambient 5°C), a person creates a 23°C contrast against a wall. In summer (ambient 35°C), a person creates only a ~-7°C contrast against a sun-heated concrete wall (which can reach 50-60°C in direct sun). But the real problem is thermal ghosting from retained heat.'
  common_mistake: |
    **The Pitfall:** Blaming the model for poor warm-weather generalization or insect interference.
    **The Rationale:** Candidates forget that thermal cameras measure relative temperature differences, not absolute shapes.
    **The Consequence:** Wasting months retraining the model on summer data instead of implementing temporal background subtraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Human skin: 37°C (~28°C clothed); Summer wall at 2 AM: ~37.7°C
    - Winter wall: 5°C

    **Calculations:**
    - Winter contrast = 28°C - 5°C = 23°C
    - Summer contrast (2 AM) = 28°C - 37.7°C = -9.7°C
    - Retained heat matches human temperature, blinding the sensor

    **Conclusion & Interpretation:**
    - **Result: Loss of thermal contrast (Sensor-Bound)**. Model fails due to sensor physics.
  options:
  - 'The model can''t handle warm weather. or "Insects are triggering false detections." These don''t explain the specific pattern of detections near walls and metal structures.'
  - 'The thermal camera measures temperature differences, not absolute temperatures. Person detection works because humans (~37°C skin, ~28°C clothed) are warmer than the background. In winter (ambient 5°C), a person creates a 23°C contrast against a wall.'
  - 'Signed model binaries prevent all forms of model tampering, including runtime weight modification through memory corruption.'
  - 'The power budget should be managed at the application level by adding sleep intervals between inferences, with no firmware changes needed.'
