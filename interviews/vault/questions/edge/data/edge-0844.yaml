title: Diagnosing Federated Client Drift
scenario: You are debugging a federated learning rollout for a mobile keyboard application running on 50,000 active daily devices. The model uses FedAvg with E=5 local epochs and local learning rate η=0.01. While the model converges in IID simulation, the production global model loss diverges after 20 rounds. Telemetry shows that during rounds 15-20, 80% of participating devices are from a region where users type predominantly in a specific regional dialect with vocabulary distributions differing from the global average by a KL divergence of 2.5.
question: What is causing the production FedAvg loss to diverge after dialect-skewed rounds 15-20, and how would you mitigate the gradient skew?
details:
  realistic_solution: 'The divergence is caused by client drift where local models overfit to their non-IID regional data. Mitigate this by replacing FedAvg with FedProx, adding a proximal term (μ/2)||w - w_t||^2 (e.g., μ=0.01) to the local objective to constrain how far local weights diverge from the global model.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing divergence as a simple learning rate or batch size issue.
    **The Rationale:** Candidates treat federated training like centralized training and overlook "client drift".
    **The Consequence:** They fail to recognize the statistical heterogeneity (non-IID data) causing local models to overfit to regional dialects, ruining the global model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Client drift scales as O(η² * E² * σ²), where σ² is gradient variance.
    - Regional skew increases σ² by 10x.

    **Calculations:**
    - If regional skew increases σ² by 10x, the drift ||w_i - w_global||² grows 10x faster per round.

    **Conclusion & Interpretation:**
    - **Result: 10x Drift (Client Drift).** Replacing FedAvg with FedProx adds a proximal term that dampens this drift, capping the maximum weight divergence per round.
