title: Edge TPU INT8 Calibration Coreset Optimization
scenario: A visual wake-word model is being deployed on a Google Coral Edge TPU. Post-Training Quantization (PTQ) to INT8 is required using a 1,000-sample calibration dataset chosen from 1 million images. Using random data selection causes a 15% accuracy drop because rare anomalous images produce massive activation spikes that skew the INT8 scaling factors.
question: How do you systematically optimize the calibration data selection to diagnose and fix this quantization bottleneck?
details:
  realistic_solution: |
    The optimal approach is to use coreset selection techniques, such as density-based clustering or activation entropy filtering, to prune outliers and select a highly representative calibration subset. By filtering out anomalous images with extreme activations prior to compilation, we restrict the calibration dynamic range to the true distribution. This prevents the INT8 scale factor from being stretched by outliers, thereby preserving high precision and smaller step sizes for the vast majority of normal inferences.
  common_mistake: |
    **The Pitfall:** Blindly increasing the calibration dataset size or switching to QAT.
    **The Rationale:** Candidates assume more data or more complex training automatically solves quantization issues.
    **The Consequence:** Adding more random data increases the probability of capturing a destructive outlier, further degrading accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - PTQ chooses INT8 scales from observed activation ranges in the calibration set.
    - Random calibration samples include rare outliers that stretch min/max or percentile ranges.
    - A coreset should preserve common modes while excluding mislabeled or nonrepresentative activation spikes.

    **Calculations:**
    - With a symmetric INT8 scale, quantization step size is proportional to the calibrated absolute activation maximum divided by 127.
    - If a rare activation spike sets the scale, normal activations use only a small fraction of available codes, increasing rounding error.
    - Activation clustering and entropy checks identify samples that represent dense normal modes and samples that only inflate the scale.
    - The expected gain is measured by lower calibration-set clipping/rounding error and validation accuracy recovery, not by a guaranteed fixed multiplier in effective resolution.

    **Conclusion & Interpretation:**
    - **Result: Representative Scales, Not Guaranteed 16x Resolution**. Coreset selection fixes the bottleneck by choosing calibration samples that set useful INT8 ranges for normal inference while separately testing rare cases for accuracy regressions.
