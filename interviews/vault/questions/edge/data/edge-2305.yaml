title: Orin JPEG Decode to TensorRT Pipeline
scenario: A high-speed defect detection pipeline on a Jetson AGX Orin is bottlenecked by OpenCV CPU JPEG decoding before GPU inference.
question: Design a Jetson decode-to-inference pipeline that keeps JPEG frames in NVMM and avoids CPU copies before TensorRT?
details:
  realistic_solution: Use a Jetson multimedia pipeline such as GStreamer or DeepStream to decode JPEG payloads into NVMM buffers, then keep the frames in device-accessible memory through colorspace conversion, resize, and batching. Feed TensorRT through the supported DeepStream nvinfer path or a custom plugin that maps the NVMM-backed surface to CUDA-accessible input tensors. TensorRT should consume GPU tensors produced by that integration layer, not bind directly to the NVMM abstraction itself. This removes CPU decode and host-memory copies while preserving the explicit buffer conversion and synchronization points required by the stack.
  common_mistake: |
    **The Pitfall:** Decoding via NVJPEG but copying to host memory for resizing.
    **The Rationale:** Relying on familiar CPU-based tools like OpenCV for intermediate pre-processing steps, inadvertently breaking the zero-copy pipeline.
    **The Consequence:** Re-introducing costly PCIe/Memory round trips, negating the latency benefits of the hardware decoder.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline path: CPU JPEG decode, CPU resize/color conversion, then host-to-device upload.
    - Zero-copy path: Jetson multimedia decode to NVMM, GPU/VIC preprocessing, TensorRT input via DeepStream or custom CUDA plugin.

    **Calculations:**
    - Baseline frame movement includes at least one decoded-frame CPU allocation plus one host-to-device copy before inference.
    - NVMM path keeps the decoded surface device-accessible and converts it once into a TensorRT-compatible GPU tensor.
    - Copy-count reduction: remove the CPU decoded-frame copy and the explicit host-to-device upload from the steady-state path.

    **Conclusion & Interpretation:**
    - **Result: fewer CPU copies (Pipeline-Bound)**. The design reduces decode and transfer overhead, but the remaining bottleneck depends on decode, preprocessing, and TensorRT timing rather than being automatically or exclusively TensorRT-bound.
