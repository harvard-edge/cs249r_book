title: Unified Memory Bandwidth Starvation
scenario: A real-time streaming pipeline on an NVIDIA Jetson Orin ingests 4 uncompressed 8K video streams at 60 FPS. The pipeline explicitly copies frames from the ingestion buffer to a 'device' buffer for Ampere GPU feature computation, and then copies again to a separate buffer for the DLA accelerator.
question: Why do four 8K60 streams drop frames on Jetson Orin despite low compute use, and how much LPDDR5 bandwidth do the explicit copies consume?
details:
  realistic_solution: |
    Using decimal units, each 8K RGB frame is 7680 * 4320 * 3 = 99.5 MB, approximated as 100 MB. Four streams at 60 FPS produce about 24 GB/s of capture writes. The described pipeline adds two explicit full-frame copies: ingestion buffer to GPU device buffer, then GPU output to a DLA buffer. Each copy performs a read and a write, so explicit copying adds 4 * 24 = 96 GB/s on top of the 24 GB/s capture writes, for about 120 GB/s of LPDDR5 movement before normal GPU/DLA reads, writes, cache traffic, display, and CPU work. That can still create shared-memory contention despite low compute use. The fix is zero-copy UMA sharing with NvSciBuf, V4L2 DMA-BUF, or pinned buffers so stages pass references instead of copying full frames.
  common_mistake: |
    **The Pitfall:** Assuming total memory footprint determines memory bottlenecks.
    **The Rationale:** Candidates note the 15 GB footprint fits well within the 32 GB capacity, incorrectly concluding memory is not the issue.
    **The Consequence:** They fail to realize that explicit host-to-device memory copies on a Unified Memory Architecture (UMA) multiply bandwidth requirements and starve the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 4 streams * 60 FPS.
    - Unit convention: decimal MB/GB.
    - Frame Size: 8K RGB = 7680 * 4320 * 3 bytes = 99.5 MB, approximated as 100 MB.
    - Physical Memory Bandwidth: 204.8 GB/s.

    **Calculations:**
    - Base Ingestion Rate: 4 * 60 * 100 MB = 24 GB/s.
    - Explicit copy 1, ingestion to GPU buffer: read 24 GB/s + write 24 GB/s = 48 GB/s.
    - Explicit copy 2, GPU output to DLA buffer: read 24 GB/s + write 24 GB/s = 48 GB/s.
    - Total explicit movement described by the scenario = capture write 24 GB/s + copies 96 GB/s = 120 GB/s.

    **Conclusion & Interpretation:**
    - **Result: about 120 GB/s before ordinary processing traffic (Memory-Bandwidth Starvation)**. The explicit copies alone consume a large share of the 204.8 GB/s memory bus; unsupported extra traversals should not be counted unless the pipeline states them.
