title: Active Learning Strategies for On-Premise Defect Detection
scenario: A defect detection model runs on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). Strategy A uses entropy over softmax outputs from the INT8 model, while Strategy B runs a parallel fp16 teacher model to calculate prediction variance.
question: Which active learning strategy do you select, and how do you justify the hardware resource tradeoffs?
details:
  realistic_solution: Strategy A is the practical choice. Entropy from the existing INT8 model reuses outputs already produced by the production inference path, so its incremental compute and memory cost is negligible. Strategy B adds a second fp16 teacher pass for every frame, which consumes extra model memory, activation bandwidth, and compute cycles on a 75W edge accelerator that is already serving the primary INT8 pipeline. Use the teacher offline or on sampled batches only if better uncertainty calibration is needed.
  common_mistake: |
    **The Pitfall:** Selecting Strategy B for superior uncertainty calibration.
    **The Rationale:** Prioritizing academic dataset purity metrics over hardware architectural constraints.
    **The Consequence:** Causing massive pipeline stalls and out-of-memory errors on the NPU by forcing parallel execution of unoptimized fp16 graphs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cloud AI 100 serving the production INT8 pipeline at 60 FPS.
    - Parallel teacher model: 500 MB fp16 weights and 1.5 TFLOP of work per frame.
    - Strategy A reuses the INT8 softmax already computed by the production model.

    **Calculations:**
    - Incremental Strategy A cost: one entropy reduction over class probabilities, effectively negligible next to inference.
    - Incremental Strategy B compute = 1.5 TFLOP/frame * 60 frames/s = 90 TFLOP/s.
    - Minimum teacher weight traffic if weights are streamed once per frame = 500 MB/frame * 60 frames/s = 30 GB/s, before input, activation, and output traffic.

    **Conclusion & Interpretation:**
    - **Result: Strategy B adds at least 90 TFLOP/s and 30 GB/s of runtime pressure.** Strategy A is preferred because it avoids a second model pass on the bandwidth- and power-limited edge NPU.
