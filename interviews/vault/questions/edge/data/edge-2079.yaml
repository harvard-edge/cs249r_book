title: 'Edge Active Learning and Bias Mitigation on Hailo-8'
scenario: 'A smart city initiative deploys computer vision models on Hailo-8 accelerators at thousands of intersections for real-time traffic analysis. Due to network bandwidth limitations and privacy concerns, only a small fraction of inference results can be sent to a central system for human review and re-labeling.'
question: 'How would you select Hailo-8 traffic samples for annotation, estimate uncertainty efficiently, and mitigate bias under 26 TOPS INT8 and 2.5W?'
details:
  realistic_solution: 'Implement a hybrid active learning approach: utilize a lightweight, INT8-quantized uncertainty estimation model (e.g., a simplified Bayesian Neural Network variant or Monte Carlo Dropout) that can run efficiently on the Hailo-8. Combine uncertainty sampling with a low-cost diversity metric (e.g., k-means on feature embeddings) to prevent bias. Employ batching and intelligent prioritization for data offloading to the central system during opportune network conditions. A robust solution would also include a mechanism for periodic, secure model updates to the edge and local model performance monitoring to detect concept drift.'
  common_mistake: |
    **The Pitfall:** Proposing computationally expensive uncertainty sampling methods (e.g., deep ensembles) or ignoring diversity.
    **The Rationale:** Candidates apply cloud-based active learning strategies without considering the strict 2.5W power budget or network bottlenecks.
    **The Consequence:** Results in severe thermal throttling, rapid battery drain, or heavily biased edge datasets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute budget: 26 TOPS (INT8)
    - Power budget: 2.5W
    - Uncertainty model compute: 0.5 TOPS

    **Calculations:**
    - Processing time = 0.5 TOPS / 26 TOPS = 19.2 ms per frame
    - Compute energy = 19.2 ms * 2.5W = 0.048 Joules per frame
    - Network transmission energy = ~100 mJ/MB = 0.1 Joules for 1MB frame

    **Conclusion & Interpretation:**
    - **Result: 0.048 Joules per frame (Power-Bound)**. On-device estimation uses ~50% less energy than sending raw data, preserving the 2.5W budget.
