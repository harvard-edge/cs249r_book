title: Diagnosing Data Starvation on Jetson Orin
scenario: A Jetson Orin processes 8 concurrent 1080p streams. GPU utilization is 30% but pipeline maxes at 60 FPS total.
question: What is causing this throughput bottleneck, and how would you diagnose the root cause within the data ingestion pipeline?
details:
  realistic_solution: |
    The root cause is data starvation before inference: compressed video decode and preprocessing are running on the CPU, so frames arrive at the GPU slower than the model can consume them. Diagnose it by profiling per-stage FPS, CPU utilization, decode queues, and GPU idle time, then move H.264/H.265 decode to NVDEC and keep resize/colorspace conversion in the accelerated video pipeline where possible.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is model inference compute and suggesting further quantization or model pruning.
    **The Rationale:** Candidates focus purely on the deep learning model's TOPS requirement, forgetting that real-world edge pipelines include heavy I/O preprocessing.
    **The Consequence:** Time is wasted optimizing a model that is already waiting on data, ignoring available hardware accelerators (NVDEC).
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 compressed 1080p streams at 30 FPS target = 240 decoded frames/s.
    - Observed pipeline throughput = 60 decoded frames/s total.
    - GPU utilization = 30%, so inference compute is not saturated.

    **Calculations:**
    - Delivered fraction = 60 FPS / 240 FPS target = 25%.
    - GPU idle headroom implied by utilization = 70%, consistent with waiting for frames.
    - The bottleneck is the decode/preprocess stage, not raw RGB network bandwidth; compressed inputs must be decoded before inference.

    **Conclusion & Interpretation:**
    - **Result: decode/preprocess is CPU-Compute-Bound.** Offloading compressed-stream decode to NVDEC and profiling preprocessing queues should raise the delivered frame rate toward the 240 FPS input target.
