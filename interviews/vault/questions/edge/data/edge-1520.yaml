title: Diagnosing Data Starvation on Jetson Orin
scenario: A Jetson Orin processes 8 concurrent 1080p streams. GPU utilization is 30% but pipeline maxes at 60 FPS total.
question: What is causing this throughput bottleneck, and how would you diagnose the root cause within the data ingestion pipeline?
details:
  realistic_solution: The root cause is data starvation; the CPU is bottlenecked on software video decoding and frame preprocessing, failing to feed the hardware accelerators. The solution is to offload decoding to the dedicated hardware NVDEC.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is model inference compute and suggesting further quantization or model pruning.
    **The Rationale:** Candidates focus purely on the deep learning model's TOPS requirement, forgetting that real-world edge pipelines include heavy I/O preprocessing.
    **The Consequence:** Time is wasted optimizing a model that is already waiting on data, ignoring available hardware accelerators (NVDEC).
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 streams, 1080p RGB, 30 FPS (target 240 FPS).
    - Jetson Orin = 275 TOPS INT8.

    **Calculations:**
    - Ingestion = 8 * 1920 * 1080 * 3 bytes * 30 FPS = ~1.49 GB/s.
    - Software decoding 1.5 GB/s destroys the CPU cores.

    **Conclusion & Interpretation:**
    - **Result: CPU Decoding maxes at 60 FPS (CPU-Compute-Bound)**. The GPU is completely starved because the CPU cannot parse H.264/H.265 streams fast enough.
