title: On-Device Active Learning Data Selection
scenario: You are designing an active learning data curation system for a fleet of autonomous inspection
  robots powered by the NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8). The primary perception model
  runs on the Ampere GPU, consuming 20 GB of memory and strictly operating within a 60W TDP. You need
  to implement an on-device data selection strategy using uncertainty sampling to curate hard examples
  from a 30 FPS 1080p camera stream.
question: How would you size and place the uncertainty-sampling pipeline on Jetson Orin so it fits memory,
  uses the DLA, and respects the 5 Mbps uplink?
details:
  realistic_solution: The optimal approach offloads a lightweight, INT8 quantized uncertainty estimator
    (e.g., a small student model) to the DLA accelerator, preserving GPU resources and adhering to the
    60W TDP. Uninformative frames are discarded immediately in memory, while high-entropy frames are compressed
    (JPEG/H.265) and queued in a local buffer sized to the remaining RAM before being transmitted over
    the 5 Mbps uplink.
  common_mistake: '**The Pitfall:** Proposing complex ensemble-based uncertainty estimation (like MC Dropout)
    on the main GPU and failing to buffer frames appropriately.

    **The Rationale:** Candidates ignore the strict 60W power limit, available RAM for raw frame buffering,
    and the severe 5 Mbps cellular uplink bottleneck.

    **The Consequence:** The proposed solution violates power and resource constraints while failing to
    transmit the curated data over the network.'
  napkin_math: '**Assumptions & Constraints:**

    - 1080p RGB frame: 1920x1080x3 bytes = ~6.2 MB.

    - Frame rate: 30 FPS (raw throughput = 186 MB/s).

    - Jetson Orin RAM: 32 GB (20 GB main model + 2 GB OS = 10 GB available for buffer).

    - Cellular uplink: 5 Mbps (0.625 MB/s).

    - Compressed JPEG size: 1 MB.


    **Calculations:**

    - Raw video buffer capacity: 10 GB / 186 MB/s = ~53 seconds.

    - Compressed buffer capacity: 10 GB / 1 MB = 10,000 frames.

    - Upload time per compressed frame: 1 MB / 0.625 MB/s = 1.6 seconds.

    - Max continuous curation rate: 60 seconds / 1.6 seconds/frame = 37.5 frames/minute.


    **Conclusion & Interpretation:**

    - **Result: 37 frames per minute (Network-Bound)**. Immediately compressing selected hard examples
    allows storing 10,000 frames and respecting the 5 Mbps cellular uplink.

    '
