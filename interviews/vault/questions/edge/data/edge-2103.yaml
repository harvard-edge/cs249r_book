title: 'Optimizing Data Efficiency for Edge Deployment on NVIDIA Jetson Orin'
scenario: 'You are tasked with deploying a real-time object detection model on an edge device for an autonomous drone. The initial model struggles with inference latency and memory footprint. Specifically, the data pipeline is identified as a bottleneck, consuming excessive memory and leading to dropped frames. Your goal is to optimize the data efficiency to meet the 30 FPS requirement while maintaining 90% mAP.'
question: 'How would you diagnose the data bottleneck, use coreset selection or pruning, and quantify gains toward 30 FPS and 90% mAP?'
details:
  realistic_solution: 'A strong solution would involve diagnosing data bottlenecks using profiling tools to identify memory usage and I/O latency in the data loading and preprocessing pipeline. Techniques like coreset selection (e.g., using k-center greedy) or data pruning based on importance sampling could be applied to reduce the dataset size, thereby decreasing training time, storage, and potentially improving model generalization by reducing noise. Curriculum learning could be explored to structure training data for faster convergence. The candidate should quantify the impact of reduced data on memory footprint, training time, and how this translates to improved inference performance on the Jetson Orin, potentially using the Information-Compute Ratio (ICR) framework to evaluate efficiency gains. They should also consider the risks of model collapse with aggressive data reduction and mitigation strategies (e.g., synthetic data augmentation for specific edge cases or continuous online learning from new edge data). Use nsys profiling to measure I/O latency.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model quantization or architecture optimization.
    **The Rationale:** Candidates neglect upstream data efficiency and hardware constraints.
    **The Consequence:** Bottlenecks remain in the data loading pipeline, preventing the system from reaching 30 FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS requires ~33 ms per frame.
    - Data bottleneck currently consumes 15 ms per frame.
    - Coreset selection optimization reduces data footprint by 50%.

    **Calculations:**
    - Memory freed: 5 GB out of 10 GB previously consumed.
    - Processing time reduction: 50% of 15 ms = 7.5 ms saved.

    **Conclusion & Interpretation:**
    - **Result: 7.5 ms saved (I/O-Bound)**. New total frame time reduced, directly increasing throughput.
