title: Optimizing Data Efficiency for Edge Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a real-time object detection model on an edge device for an autonomous drone. The initial model struggles with inference latency and memory footprint. Specifically, the data pipeline is identified as a bottleneck, consuming excessive memory and leading to dropped frames. Your goal is to optimize the data efficiency to meet the 30 FPS requirement while maintaining 90% mAP.
question: How would you diagnose the data bottleneck, use coreset selection or pruning, and quantify gains toward 30 FPS and 90% mAP?
details:
  realistic_solution: |
    Profile the deployed pipeline with nsys/tegrastats and separate model inference from online I/O, decode, resize, normalization, and host-to-device copies. If the bottleneck is online preprocessing, optimize it directly with frame queues, zero-copy buffers, hardware decode, fused GPU preprocessing, and bounded batching. Use coreset selection or pruning only for the training/evaluation corpus: retain diverse and hard examples, retrain or calibrate on that subset, then verify that the deployed model still reaches 90% mAP. Report gains as total frame time before and after the input-pipeline changes, with mAP measured on a held-out full validation set.
  common_mistake: |
    **The Pitfall:** Focusing solely on model quantization or architecture optimization.
    **The Rationale:** Candidates neglect upstream data efficiency and hardware constraints.
    **The Consequence:** Bottlenecks remain in the data loading pipeline, preventing the system from reaching 30 FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS requires ~33 ms per frame.
    - Baseline total frame time: 40 ms, including 15 ms online decode/preprocess/I/O.
    - Input-pipeline optimization cuts the 15 ms online bottleneck by 50%.
    - Coreset pruning is used for retraining only and must retain at least 90% mAP on validation.

    **Calculations:**
    - Processing time saved = 15 ms * 50% = 7.5 ms.
    - New frame time = 40 ms - 7.5 ms = 32.5 ms.
    - Throughput = 1000 ms/s / 32.5 ms ≈ 30.8 FPS.
    - Training-set reduction can lower storage/training cost, but it does not by itself improve deployed FPS.

    **Conclusion & Interpretation:**
    - **Result: 30.8 FPS If mAP Holds**. The FPS target is met only because the online input path drops below the 33 ms budget; the 90% mAP target must be confirmed separately after coreset-based retraining.
