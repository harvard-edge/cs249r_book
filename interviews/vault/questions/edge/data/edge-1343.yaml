title: Active Learning Budget on Coral Edge TPU
scenario: You are deploying a computer vision model on a Google Coral Edge TPU (4 TOPS INT8, 2W) for a smart retail checkout system. To address dataset shift without overwhelming human annotators, you implement an active learning strategy where the Coral TPU runs a lightweight uncertainty estimator to select edge-case frames for manual annotation. The camera captures video at 30 FPS, and the uncertainty model requires 50 MOPS (Million Operations) per frame.
question: What are the daily labeling cost per device and Coral TPU compute fraction for the 50 MOPS uncertainty estimator at 30 FPS?
details:
  realistic_solution: A robust edge active learning pipeline must balance the data selection rate with available annotation budgets while staying well within the hardware's compute limits. By ensuring the uncertainty model is quantized to INT8, it executes efficiently on the Coral Edge TPU, consuming a negligible fraction of compute and leaving ample headroom for the main inference task, while keeping daily labeling costs predictable.
  common_mistake: Candidates often miscalculate the daily frame count by failing to correctly convert seconds to a full 24-hour period, or they mismatch unit scales (MOPS vs TOPS) when evaluating compute utilization against the 4 TOPS limit. They might also forget that the uncertainty model itself must be quantized to INT8 to run on the Edge TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Framerate: 30 FPS. Selection rate: 0.5%. Annotation cost: $0.05/image.
    - Uncertainty model: 50 MOPS. Coral TPU: 4 TOPS (4,000 GOPS).

    **Calculations:**
    - Daily frames: 30 * 3600 * 24 = 2,592,000 frames.
    - Labeled frames: 2,592,000 * 0.005 = 12,960. Daily budget: 12,960 * $0.05 = $648.
    - Compute requirement: 30 FPS * 50 MOPS = 1.5 GOPS.
    - Utilization: 1.5 / 4000 = 0.0375%.

    **Conclusion & Interpretation:**
    - **Result: $648/day, 0.0375% TOPS (Compute-Bound)**. INT8 quantization ensures the uncertainty model uses negligible compute while effectively managing dataset shift.
