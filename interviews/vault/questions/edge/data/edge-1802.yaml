title: 'Data Curation for Hailo-8 INT8 Quantization'
scenario: 'You are defining the dataset curation requirements for a vision model deploying to a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS at INT8 precision and operates at 2.5W, but it has no local DRAM and relies entirely on streaming from host memory.'
question: 'How would you curate an INT8 calibration dataset for Hailo-8 so activation outliers are captured and quantization accuracy is preserved?'
details:
  realistic_solution: 'The specification must mandate stratified sampling for the calibration dataset to cover the full dynamic range of activations (e.g., extreme lighting, dense objects). Since the Hailo-8 requires aggressive INT8 quantization and streams from host memory, the curation process must isolate challenging edge cases to properly calibrate the scale factors and prevent activation clipping that would otherwise destroy model accuracy.'
  common_mistake: |
    **The Pitfall:** Proposing standard random sampling for the calibration dataset.
    **The Rationale:** Candidates treat calibration data gathering the same as standard training/validation set splits.
    **The Consequence:** Failing to capture extreme activation outliers, causing severe activation clipping during INT8 inference and destroying model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Performance: 26 TOPS (INT8) at 2.5W.
    - Model compute requirement: 50 GOPS.
    - Intermediate feature map: 2MB per frame.

    **Calculations:**
    - Max theoretical throughput: 26,000 GOPS / 50 GOPS = 520 FPS.
    - Memory traffic: Streaming 2MB back and forth = 4MB/frame host bandwidth.
    - Total bandwidth: 4MB $\times$ 520 FPS = 2.08 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 2.08 GB/s (Memory Bandwidth-Bound)**. Curation must include high-density scenes to explicitly stress-test these host memory I/O limits.
