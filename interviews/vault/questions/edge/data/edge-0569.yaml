title: The Early vs Late Fusion Trade-off
scenario: 'Your autonomous vehicle has a camera and a LiDAR. You need to detect and localize objects in 3D. Your team is debating two architectures: early fusion (concatenate raw camera pixels + LiDAR points, feed to one model) vs late fusion (run separate camera and LiDAR detectors, merge results).'
question: What are the system-level trade-offs between early and late fusion, and which do you recommend for a Jetson Orin deployment?
details:
  realistic_solution: Recommend late fusion. Late fusion leverages the Orin's heterogeneous architecture by running a 2D camera detector (e.g., YOLO) on the Ampere GPU and a 3D LiDAR detector (e.g., PointPillars) concurrently on the Deep Learning Accelerator (DLA). This hides the latency of the slower modality, achieving massive speedups over an early fusion monolithic transformer that would monopolize the GPU. Furthermore, late fusion provides fault-tolerance (graceful degradation if a sensor fails) and simplifies independent model lifecycle updates.
  common_mistake: |
    **The Pitfall:** Assuming early fusion is always better because the model sees all the raw data simultaneously.
    **The Rationale:** Candidates focus purely on theoretical model capability or accuracy potential, ignoring the heterogeneous compute architecture of the edge device.
    **The Consequence:** Recommending an architecture that fails to meet latency budgets and underutilizes available hardware accelerators (like the DLA), leading to sub-optimal system performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Early Fusion (BEVFusion): ~120 GFLOPs, 45ms latency on Orin GPU.
    - Late Fusion: Camera YOLO (28 GFLOPs, 18ms on GPU) + LiDAR PointPillars (18 GFLOPs, 12ms on DLA).
    - Target: Minimize total inference latency.

    **Calculations:**
    - Early fusion latency = 45ms (sequential execution on GPU).
    - Late fusion latency = max(18ms, 12ms) = 18ms (concurrent execution on heterogeneous compute blocks).
    - Speedup = 45ms / 18ms = 2.5x.

    **Conclusion & Interpretation:**
    - **Result: 18ms (Compute-Bound)**. The system efficiently utilizes concurrent hardware blocks (GPU + DLA), achieving a 2.5x speedup over monolithic execution.
