title: Optimizing Data Storage for On-Device Inference on Qualcomm Cloud AI 100
scenario: You are designing the data ingestion and inference pipeline for a highly sensitive on-device ML application running on the Qualcomm Cloud AI 100. The application processes continuous streams of sensor data, performing real-time inference on a large, pre-trained model. Due to strict latency requirements and limited persistent storage, you need to efficiently store and access intermediate inference results, model checkpoints, and potentially raw sensor data for re-processing.
question: What storage format strategy would you use for sensor data, intermediate results, and checkpoints on Cloud AI 100 to balance compression, speed, and LPDDR4x use?
details:
  realistic_solution: Separate the formats by access pattern. Store raw sensor data in rotated chunked binary or columnar files with lightweight compression such as LZ4/Snappy when replay or analytics need column reads. Store intermediate inference results in compact append-only binary records or a small embedded log with indexes for timestamp/model version, because they are written continuously and read sequentially during recovery. Store model checkpoints in the framework-native checkpoint format or sharded binary blobs with manifests and checksums, since checkpoints must preserve tensor names, shapes, and optimizer/state metadata. Keep hot chunks bounded in LPDDR4x, spill durable data to local storage, and use atomic file rotation so latency-critical inference is not blocked by checkpoint or replay writes.
  common_mistake: |
    **The Pitfall:** Defaulting to general-purpose storage formats (CSV, JSON) or overly complex serialized formats.
    **The Rationale:** Candidates fail to consider the specific access patterns, memory constraints, and computational limits of the edge architecture.
    **The Consequence:** Massive parsing overhead, inefficient memory utilization (loading entire files into 32GB LPDDR4x), and increased I/O that blows the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor stream rate: 100 MB/s.
    - Intermediate output rate: 1000 features/record, 4 bytes/feature, 100 records/sec = 400 KB/s.
    - Memory limit: 32 GB LPDDR4x.
    - Persistent storage is required for raw streams and checkpoints; LPDDR4x should hold only bounded hot buffers.

    **Calculations:**
    - Raw data per hour = 100 MB/s * 3600 s = 360 GB, so raw replay data cannot live entirely in 32 GB memory.
    - Intermediate output over 1 hour: 400 KB/s * 3600 s = 1.44 GB.
    - A 60-second hot buffer for raw input = 100 MB/s * 60 = 6 GB, leaving memory for inference tensors and system overhead.

    **Conclusion & Interpretation:**
    - **Result: format strategy must be split by data type.** Raw sensor streams need chunking and spill-to-storage, intermediate results fit compact append logs, and checkpoints need framework-native sharded files with checksums rather than a single generic analytics format.
