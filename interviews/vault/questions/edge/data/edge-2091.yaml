title: Optimizing Data Storage for On-Device Inference on Qualcomm Cloud AI 100
scenario: You are designing the data ingestion and inference pipeline for a highly sensitive on-device ML application running on the Qualcomm Cloud AI 100. The application processes continuous streams of sensor data, performing real-time inference on a large, pre-trained model. Due to strict latency requirements and limited persistent storage, you need to efficiently store and access intermediate inference results, model checkpoints, and potentially raw sensor data for re-processing.
question: What storage format strategy would you use for sensor data, intermediate results, and checkpoints on Cloud AI 100 to balance compression, speed, and LPDDR4x use?
details:
  realistic_solution: Adopt a columnar binary format like Parquet or TFRecord coupled with a lightweight compression algorithm (e.g., LZ4 or Snappy). This avoids heavy CPU parsing overhead associated with JSON/CSV, staying within the 75W budget. Data should be streamed in batch-aligned columnar chunks directly to LPDDR4x, maximizing INT8 inference throughput while gracefully handling the multi-dimensional sensor payload.
  common_mistake: |
    **The Pitfall:** Defaulting to general-purpose storage formats (CSV, JSON) or overly complex serialized formats.
    **The Rationale:** Candidates fail to consider the specific access patterns, memory constraints, and computational limits of the edge architecture.
    **The Consequence:** Massive parsing overhead, inefficient memory utilization (loading entire files into 32GB LPDDR4x), and increased I/O that blows the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor stream rate: 100 MB/s.
    - Intermediate output rate: 1000 features/record, 4 bytes/feature, 100 records/sec = 400 KB/s.
    - Memory limit: 32 GB LPDDR4x.

    **Calculations:**
    - Raw data per hour: 100 MB/s * 3600 s = 360 GB (Exceeds 32 GB memory).
    - Compressed data (Snappy, 5:1 ratio): 360 GB / 5 = 72 GB.
    - Intermediate output over 1 hour: 400 KB/s * 3600 s = 1.44 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.44 GB intermediate storage (Memory/Power Bound)**. Utilizing columnar binary formats with lightweight compression (like Snappy) drastically reduces the memory footprint and CPU parsing overhead while staying within the 75W budget.
