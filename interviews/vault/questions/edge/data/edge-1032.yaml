title: 'Dataset Curation: Evaluate Centralized vs Federated Data Curation for Edge Fleet'
scenario: 'You manage 5,000 edge devices deployed in warehouses across 50 sites. Each device captures 100 JPEG images/day at 310 KB/image. You are comparing (A) centralized data collection: upload all images for cloud curation, vs (B) federated: upload one 140 MB compressed model update per device per day, vs (C) hybrid: upload the 20% most informative filtered images.'
question: How do centralized upload, federated updates, and a hybrid approach compare for the 5,000-device warehouse data pipeline in terms of data quality, bandwidth, privacy, and model improvement rate?
details:
  realistic_solution: |
    Centralized upload gives the best data quality and fastest debugging loop because humans and cloud training jobs can inspect every image, but it has the highest privacy exposure for raw data and a fleet-wide 155 GB/day bandwidth cost. Federated updates keep raw images on device and improve privacy, but bandwidth is not automatically lower here: one 140 MB compressed update per device per day is larger than the 31 MB/day of raw JPEGs per device, and small local datasets can slow model improvement through noisy updates. A hybrid approach uploads only the 20% most informative images, giving lower fleet bandwidth than centralized and less privacy exposure than uploading everything; its model-improvement rate is a tradeoff between centralized inspectability and federated privacy.
  common_mistake: |
    **The Pitfall:** Choosing federated learning purely for privacy without calculating bandwidth costs.
    **The Rationale:** Assuming gradient updates are always smaller than raw data, ignoring the size of modern LLM gradients vs small local datasets.
    **The Consequence:** Implementing a system that costs 4.5x more in bandwidth ($22k vs $5k) while suffering from gradient noise due to tiny per-device batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Devices: 5,000.
    - Data/Device: 100 images/day at 310 KB/image.
    - Bandwidth Cost: $0.09/GB.
    - Federated Cadence: one compressed update/device/day.
    - Federated Update Size: 140 MB after compression.

    **Calculations:**
    - Centralized Upload: 5,000 * 100 * 310 KB = 155 GB/day fleet-wide. Cost = 155 * $0.09 * 365 = $5,091.75/year.
    - Per-device centralized volume: 100 * 310 KB = 31 MB/day.
    - Federated Upload: 5,000 * 140 MB/update * 1 update/day = 700 GB/day fleet-wide. Cost = 700 * $0.09 * 365 = $22,995/year.
    - Hybrid (20% Filtered): 5,000 * 20 * 310 KB = 31 GB/day fleet-wide. Cost = 31 * $0.09 * 365 = $1,018.35/year.
    - Federated is 140 MB / 31 MB = 4.5x more upload per device than centralized under this daily-update assumption.

    **Conclusion & Interpretation:**
    - **Result: Hybrid costs about $1,018/yr vs Centralized about $5,092/yr vs Federated $22,995/yr fleet-wide (Bandwidth-Bound)**. With the stated daily 140 MB compressed update, federated has the best raw-data privacy but the worst bandwidth; hybrid trades off privacy, inspectable data quality, and improvement speed.
