title: 'Dataset Curation: Evaluate Centralized vs Federated Data Curation for Edge Fleet'
scenario: 'You manage 5,000 edge devices deployed in warehouses across 50 sites. You are comparing (A) centralized data collection: upload all images for cloud curation, vs (B) federated: on-device filtering with only gradient updates uploaded.'
question: How do centralized upload, federated updates, and a hybrid approach compare for the 5,000-device warehouse data pipeline in terms of data quality, bandwidth, privacy, and model improvement rate?
details:
  realistic_solution: |
    The core architectural tradeoff lies between data quality and operational bandwidth. Centralized collection provides high-fidelity data for active learning but incurs massive ingress costs and privacy risks. Federated Learning (FL) reduces bandwidth by orders of magnitude via local SGD, but small local batch sizes introduce high gradient variance and slow convergence. The optimal edge MLOps strategy is a hybrid approach: deploy an on-device lightweight zero-shot filter to curate the most informative samples, uploading only this high-signal subset to the centralized feature store.
  common_mistake: |
    **The Pitfall:** Choosing federated learning purely for privacy without calculating bandwidth costs.
    **The Rationale:** Assuming gradient updates are always smaller than raw data, ignoring the size of modern LLM gradients vs small local datasets.
    **The Consequence:** Implementing a system that costs 4.5x more in bandwidth ($22k vs $5k) while suffering from gradient noise due to tiny per-device batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Devices: 5,000.
    - Data/Device: 100 images/day at 310 KB/image.
    - Bandwidth Cost: $0.09/GB.
    - Federated Update Size: 140 MB (with 100x compression).

    **Calculations:**
    - Centralized Upload: 5,000 * 100 * 310 KB = 155 GB/day. Cost = 155 * $0.09 * 365 = $5,093/year.
    - Federated Upload: 5,000 * 140 MB = 700 GB/day. Cost = 700 * $0.09 * 365 = $22,995/year.
    - Hybrid (20% Filtered): 5,000 * 20 * 310 KB = 31 GB/day. Cost = 31 * $0.09 * 365 = $1,019/year.

    **Conclusion & Interpretation:**
    - **Result: Hybrid costs $1,019/yr vs Federated $22,995/yr (Bandwidth-Bound)**. Federated gradient payloads exceed raw data size.
