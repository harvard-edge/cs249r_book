title: Design an Edge-to-Cloud Data Pipeline for Monthly Model Refresh
scenario: You are designing an end-to-end data pipeline for a monthly model refresh across 1,000 edge devices. Each device collects 1,000 curated images/month. The data must be aggregated, deduplicated, labeled, and used for centralized fine-tuning on 8 cloud GPUs.
question: How would you design the monthly model refresh pipeline from edge collection to cloud fine-tuning?
details:
  realistic_solution: 'Implement a multi-stage pipeline: (1) Edge upload via LTE, about 25 seconds per device at 100 Mbps before overhead. (2) Centralized perceptual hashing and global deduplication to filter the 1M raw images down to a high-signal subset. (3) Active learning scoring to select the top ~50K samples for human labeling. (4) Cloud fine-tuning on 8 H100 GPUs, about 8.3 minutes for 600K images over 5 epochs at the stated batch and step time. The primary end-to-end bottleneck is human labeling and review turnaround, so the SLA should separate compute latency from multi-day labeling latency.'
  common_mistake: |
    **The Pitfall:** Not accounting for full pipeline latency or global deduplication overhead.
    **The Rationale:** Candidates often assume data simply arrives ready to train and forget about network upload times, or they assume deduplication happens locally on each device.
    **The Consequence:** The pipeline estimate misses major delays like cross-device global index building and labeling turnaround times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Devices: 1,000. Images/device: 1,000. Total: 1,000,000 images.
    - Image size: 310 KB.
    - Connection: 100 Mbps LTE per device.

    **Calculations:**
    - Upload volume per device: 1,000 * 310 KB = 310 MB using decimal units.
    - 100 Mbps = 12.5 MB/s, so upload time per device = 310 MB / 12.5 MB/s = 24.8 seconds before LTE/protocol overhead.
    - Fine-tuning dataset (after dedup/filtering): 600K images.
    - Fine-tuning time (8 H100s, batch=512, 85ms/step, 5 epochs): (600,000 * 5) / 512 = 5,859 steps * 0.085s = 498 seconds.
    - Compute pipeline time from upload and training is minutes to hours; labeling 50K selected samples at human-review scale is the multi-day component.

    **Conclusion & Interpretation:**
    - **Result: ~25 seconds/device upload and ~8.3 minutes fine-tuning (Human-in-the-Loop Bound overall).** The computational workload is small relative to labeling and QA, so the monthly refresh SLA should budget labeling explicitly instead of claiming an unsupported exact end-to-end latency.
