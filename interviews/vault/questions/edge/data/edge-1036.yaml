title: Edge Replay Buffer Design for Continual Learning with 8GB Storage
scenario: Your object detection model on an edge device experiences concept drift after 6 months of deployment. The device has 8GB available for data storage.
question: How would you design the 8GB replay buffer and update schedule to adapt to new product classes without catastrophic forgetting?
details:
  realistic_solution: |
    Use a storage-aware replay buffer with two pools: raw JPEGs for new classes under active review and compressed feature vectors for old-class replay. Extract features on-device after inference or during a scheduled maintenance window, store labels, class, timestamp, and embedding checksum, and maintain a class-balanced reservoir with extra quota for rare and recently drifting classes. For each monthly update, collect about 500 new examples per class, train with an 80% old-feature replay and 20% new-data mix, evaluate on a fixed old-class validation slice, then promote the model only if old-class precision and new-class recall both pass thresholds.
  common_mistake: |
    **The Pitfall:** Fine-tuning only on new data or storing raw images for replay.
    **The Rationale:** Candidates ignore catastrophic forgetting or fail to calculate the extreme storage inefficiency of raw JPEGs versus compressed features.
    **The Consequence:** The model forgets original classes entirely, or the replay buffer exhausts the 8GB storage budget instantly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decimal storage budget: 8 GB; feature vectors are approximately 8 KiB each.
    - New classes: 10 types * 500 images * 310 KB JPEG = ~1.55 GB.
    - Compressed features are extracted on-device and stored for replay: 2048 floats * 4 bytes = 8192 bytes/image.

    **Calculations:**
    - Replay buffer available = 8 GB - 1.55 GB = 6.45 GB.
    - Approximate capacity using decimal GB and 8 KiB features = 6.45e9 bytes / 8192 bytes = ~787,000 replay examples.
    - Monthly update set example: 5,000 new images + 20,000 sampled replay features = 25,000 examples.
    - With 80% replay / 20% new data over 5 epochs, the update reads 25,000 * 5 * 8 KB = ~1.0 GB of feature tensors from storage/cache.
    - The 8 GB budget is therefore driven by replay coverage and retention, not by storing a full raw-image training set.

    **Conclusion & Interpretation:**
    - **Result: ~787K Replay Examples (Storage-Bound).** Extracting and storing compressed features on-device allows a large replay buffer under 8 GB while keeping monthly updates focused on curated new-class data plus sampled old-class replay.
