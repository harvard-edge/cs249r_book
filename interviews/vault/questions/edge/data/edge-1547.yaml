title: Edge TPU Audio Event Ingestion Architecture
scenario: You are designing a real-time anomaly detection system for industrial machines using acoustic sensors. The edge device is equipped with a USB accelerator. You have two proposed streaming ingestion pipelines. Architecture A uses a local sliding window buffer that computes mel-spectrograms on the host CPU before feeding INT8-quantized frames to the TPU every 500ms. Architecture B streams raw audio directly into a recurrent model on the TPU that processes sample-by-sample.
question: Which streaming ingestion architecture is better for the edge anomaly detector, and why?
details:
  realistic_solution: Architecture A is better. The host CPU should convert raw audio into compact mel-spectrogram frames, then send batched INT8 feature tensors to the accelerator. That reduces transfer volume and maps naturally to CNN-style accelerator kernels, while Architecture B depends on raw sample-by-sample recurrent execution that is inefficient and often unsupported on this accelerator class.
  common_mistake: |
    **The Pitfall:** Selecting Architecture B under the delusion that "end-to-end deep learning" is inherently superior.
    **The Rationale:** Candidates blindly assume that bypassing host CPU operations always decreases latency, ignorant of the fact that raw audio throughput completely chokes limited USB pipes.
    **The Consequence:** The model fails to compile due to unsupported recurrent operators, and INT8 quantization utterly destroys the uncompressed audio signal fidelity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio window: 16 kHz sample rate, 0.5 seconds = 8,000 samples
    - Architecture A payload: 64x64 INT8 mel-spectrogram
    - Accelerator: INT8 compute optimized

    **Calculations:**
    - Data Transfer (Arch A): 64 * 64 * 1 byte = 4 KB payload every 500ms (8 KB/s bandwidth)
    - Raw audio volume before framing: 8,000 INT16 samples every 500ms = 16 KB per window.
    - Architecture A trades modest host DSP for a compact accelerator-friendly feature tensor; Architecture B also requires recurrent sample-by-sample scheduling that does not map well to the TPU.

    **Conclusion & Interpretation:**
    - **Result: Arch A (Compute-Architecture Bound)**. Architecture A keeps the bus idle, prevents recurrent logic failures, and perfectly utilizes the hardware CNN array.
