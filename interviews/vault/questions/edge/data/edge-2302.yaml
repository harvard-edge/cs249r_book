title: Jetson Orin Zero-Copy Vision
scenario: Engineering a real-time multi-camera video analytics pipeline for a delivery bot.
question: Design a memory-mapped zero-copy pipeline specification from the camera ISP to the GPU to ensure 4x 1080p 60FPS streams don't bottleneck the 204.8 GB/s LPDDR5 bandwidth.
details:
  realistic_solution: The specification should allocate NVMM (Nvidia Memory Management) buffers that are physically contiguous and shared between the ISP and GPU. Four 1080p streams at 60FPS in RGB888 consume 1.49 GB/s. By avoiding CPU copy loops and using V4L2 to write directly to NVMM, the memory bus usage is kept at a fraction of the 204.8 GB/s limit, leaving ample bandwidth for TensorRT weight fetching.
  common_mistake: |
    **The Pitfall:** Routing frames through OpenCV CPU mats before GPU upload.
    **The Rationale:** Candidates often default to familiar CPU-based vision libraries instead of hardware-accelerated zero-copy pipelines.
    **The Consequence:** Triples memory bandwidth usage due to unnecessary CPU-GPU memory copies, leading to frame drops and high latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 streams, 1080p resolution (1920x1080), 3 bytes/pixel (RGB888), 60 FPS.
    2. **Calculations:**
       - 4 streams * 1920 * 1080 * 3 bytes/pixel * 60 FPS = 1,492,992,000 bytes/s.
       - 1,492,992,000 bytes/s = ~1.49 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** A zero-copy pipeline easily handles the 1.49 GB/s load without bottlenecking the 204.8 GB/s bus limit.
