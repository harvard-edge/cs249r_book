title: Edge Data Buffering and Parquet Compression
scenario: An autonomous drone utilizes an NVIDIA Jetson Orin (Ampere GPU + DLA, 275 TOPS INT8, 60W TDP) to run perception models. The system must log tabular feature embeddings and object metadata for offline active learning. Uncompressed structured telemetry is generated at 150 MB/s. To optimize disk I/O and keep overall power draw within the 60W TDP, the pipeline buffers exactly 1 minute of data in the Orin's 32 GB LPDDR5 memory. It then converts the buffer to a columnar Parquet format with Zstd compression (achieving a 5:1 compression ratio) and flushes it to the edge SSD as a single row group.
question: For 150 MB/s telemetry buffered for 1 minute, what are the uncompressed buffer size, compressed Parquet row group size, and 2-hour storage need?
details:
  realistic_solution: 'The in-memory 1-minute LPDDR5 buffer remains uncompressed: 150 MB/s * 60 s = 9,000 MB, or about 9 GB. The 5:1 compression applies only when that buffer is converted to an on-disk Parquet row group, so each flushed row group is 9 GB / 5 = 1.8 GB. For 2 hours, the system writes 120 one-minute row groups, so storage needed is 1.8 GB * 120 = 216 GB.'
  common_mistake: |
    **The Pitfall:** Applying the 5:1 compression ratio to the in-memory buffer rather than just the disk write, or miscalculating unit conversions.
    **The Rationale:** Candidates fail to realize that data must be buffered uncompressed in memory before compression algorithms can run efficiently on a block/chunk.
    **The Consequence:** Underestimating the required LPDDR5 memory and potentially causing OOM errors on the edge device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uncompressed telemetry rate: 150 MB/s.
    - Buffer duration: 1 minute (60 seconds).
    - Parquet compression ratio (Zstd): 5:1.
    - Mission duration: 2 hours (120 minutes).

    **Calculations:**
    - Uncompressed in-memory buffer size = 150 MB/s * 60 seconds = 9,000 MB (9 GB).
    - Compressed on-disk row group size = 9 GB / 5 = 1.8 GB.
    - Total SSD Storage Required = 150 MB/s * 120 minutes * 60 seconds/minute / 5 = 216,000 MB = 216 GB.

    **Conclusion & Interpretation:**
    - **Result: 9 GB uncompressed buffer, 1.8 GB compressed row group, and 216 GB for 2 hours.**
