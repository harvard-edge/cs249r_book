title: The Vibration-Induced Phantom Detections
scenario: Your vision system on a robotic welding arm detects weld defects using a
  5MP camera at 20 FPS. The system achieves 97% accuracy on the test bench, but drops
  to 82% on the production robot during active welding. Between welds (robot stationary),
  accuracy returns to 96%. The camera is rigidly mounted to the arm.
question: What is the root cause of the accuracy drop during active welding?
details:
  realistic_solution: During welding, the robotic arm vibrates powerfully at ~100
    Hz with a 0.5 mm peak amplitude. At a 10 ms exposure time, the sensor integrates
    over 259 pixels of spatial drift, causing catastrophic motion blur that destroys
    edge features. The root cause is strict mechanical vibration coupling, which requires
    strobed LED lighting or drastic exposure reduction to ~0.05 ms.
  common_mistake: '**The Pitfall:** Assuming welding arc light is saturating the camera.

    **The Rationale:** Candidates fixate on the welding arc causing overexposure without
    correlating it to the physical movement of the arm.

    **The Consequence:** Attempting to tune camera gains or adding optical filters,
    which fails to fix the 259-pixel mechanical motion blur destroying the inference
    accuracy.

    '
  napkin_math: "**Assumptions & Constraints:**\n   - Sensor: 5MP (2592 px width),\
    \ 10mm FOV\n   - Vibration: 100 Hz, 0.5 mm peak amplitude (1.0 mm peak-to-peak)\n\
    \   - Exposure: 10 ms\n**Calculations:**\n   - Pixel pitch: 10 mm / 2592 px ≈\
    \ 3.86 μm/px\n   - Max velocity: v = A * 2π * f = 0.5 mm * 2π * 100 Hz ≈ 314 mm/s\n\
    \   - 10 ms exposure displacement: 1.0 mm (full cycle)\n   - Motion blur: 1000\
    \ μm / 3.86 μm/px = 259 pixels\n   - 0.05 ms exposure displacement: 314 mm/s *\
    \ 0.00005 s = 0.0157 mm ≈ 4 pixels\n**Conclusion & Interpretation:**\n   - **Result:\
    \ Sensor-Bound Defect.** A 10 ms exposure results in catastrophic 259-pixel blur.\
    \ Reducing exposure to 0.05 ms or mechanically isolating the sensor is required.\n"
