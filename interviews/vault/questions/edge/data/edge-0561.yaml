title: The Stereo Depth vs Monocular Trade-off
scenario: Your autonomous forklift uses stereo cameras (2x 1080p, 30 FPS, 8-bit grayscale raw frames over CSI) for depth estimation. The stereo matching algorithm runs on the TI TDA4VM's hardware stereo accelerator and produces dense depth maps at 5ms per frame. A colleague proposes replacing stereo with a single camera plus a monocular depth estimation neural network (MiDaS-small, 2 GFLOPs), arguing it halves the camera cost and cable complexity.
question: What are the bandwidth, compute, and accuracy trade-offs of replacing stereo with MiDaS-small monocular depth on the TDA4VM forklift?
details:
  realistic_solution: 'The trade-off has three axes. Bandwidth is halved because one raw 1080p grayscale stream is removed. Compute shifts from a dedicated 5ms stereo accelerator to a general neural-network workload, so the cost depends on the effective TDA4VM inference budget and competes with other perception tasks. Accuracy is the main blocker: at 10m, monocular depth uncertainty of ±2.5m consumes much more of the braking margin than stereo ±0.2m, so it is not a drop-in replacement for a safety-rated forklift unless the system adds conservative triggers, lower speed, redundancy, or a larger detection range.'
  common_mistake: |
    **The Pitfall:** Rejecting monocular depth purely because "it's estimated, not measured."
    **The Rationale:** Candidates often rely on platitudes rather than quantifying the exact performance and safety envelope differences for the specific hardware.
    **The Consequence:** The candidate fails to mathematically prove that the safety stopping distance is violated, missing the true engineering constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stereo depth error at 10m is ±0.2m.
    - Monocular depth error at 10m is ±2.5m.
    - Forklift stopping distance is 1.5m at 2 m/s.
    - Camera format: 1920 * 1080, 8-bit grayscale, 30 FPS.
    - Plausible effective TDA4VM NN throughput available to this task: 0.5 TOPS after sharing with other perception workloads.

    **Calculations:**
    - One camera bandwidth = 1920 * 1080 * 1 byte * 30 FPS = 62.2 MB/s.
    - Stereo camera bandwidth = 2 * 62.2 MB/s = 124.4 MB/s.
    - Monocular camera bandwidth = 62.2 MB/s, a 50% camera-ingest reduction.
    - Stereo compute = 5ms on the dedicated stereo accelerator.
    - MiDaS-small ideal NN time at 0.5 TOPS = 2 GFLOPs / 500 GFLOP/s = 4ms before preprocessing, memory traffic, and scheduling overhead, and it uses shared NN/DSP resources rather than the stereo block.
    - Safety margin at a 10m obstacle: stereo worst-case remaining margin = 10m - 0.2m error - 1.5m stop = 8.3m.
    - Monocular worst-case remaining margin = 10m - 2.5m error - 1.5m stop = 6.0m, which is 2.3m less margin and can force earlier braking or lower speed to maintain the same safety case.

    **Conclusion & Interpretation:**
    - **Result: 50% less camera bandwidth, but worse safety margin.** Monocular depth can save cabling and ingest bandwidth, but it moves compute onto shared ML resources and greatly increases range uncertainty. The safety decision should be based on remaining stopping margin under worst-case depth error, not on a direct error-vs-stopping-distance comparison.
