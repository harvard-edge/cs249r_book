title: Orin Zero-Copy Cropping
scenario: A Jetson AGX Orin streams data from 1080p cameras in LPDDR-backed NVIDIA buffers. The application crops the center 800x600 region of each frame and sends it to inference. Naive zero-copy fails because the cropped region's row stride still follows the source pitch, while the model expects a compact tensor layout.
question: How do you pass an 800x600 crop to the GPU without CPU memcpy when the source pitch differs from the tensor layout?
details:
  realistic_solution: Represent the crop as an ROI view into the original pitched Jetson buffer instead of pretending it is a compact 800-byte-wide tensor. Preserve the source pitch and x/y offset in a CUDA/NvBufSurface/DMA-BUF-backed descriptor, then run a GPU or VIC preprocessing stage that is pitch-aware and writes the model's required NCHW/NHWC tensor layout. This avoids CPU memcpy while still doing any required format conversion, resize, normalization, or repacking on hardware that understands the buffer stride and alignment.
  common_mistake: |
    **The Pitfall:** Cropping via standard OpenCV CPU functions before inference.
    **The Rationale:** Candidates treat image cropping as a generic CPU task.
    **The Consequence:** The system manually copies data to GPU memory, breaking the latency and power benefits of zero-copy Unified Virtual Memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Source frame is 1080p with a pitch larger than the 800-pixel crop width.
    - The crop can be referenced by base pointer, pitch, x/y offset, width, and height.
    - The model input still requires a packed tensor, so preprocessing must consume the pitched ROI correctly.

    **Calculations:**
    - CPU memcpy path copies crop bytes into a temporary compact buffer before preprocessing.
    - ROI path passes metadata plus the original buffer handle and avoids that CPU byte copy.
    - A pitch-aware GPU/VIC kernel may still read the ROI and write the inference tensor; that work is not zero seconds, but it is scheduled on the accelerator path.

    **Conclusion & Interpretation:**
    - **Result: pitched ROI handoff**. Zero-copy means avoiding a CPU staging copy, not eliminating all memory traffic. Correctness comes from preserving pitch/alignment metadata until the accelerator produces the packed tensor required by inference.
