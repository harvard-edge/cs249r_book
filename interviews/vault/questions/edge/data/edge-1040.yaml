title: 'Dataset Curation: Specify Data Quality Requirements for Safety-Critical Edge Deployment'
scenario: You are writing the data quality specification for a pedestrian detection model deployed on an edge device in autonomous forklifts. The system must achieve < 0.1% miss rate (false negative) on pedestrians.
question: What quantitative data quality SLAs would you set for the pedestrian detector to achieve a < 0.1% miss rate?
details:
  realistic_solution: |
    Set SLAs that can be audited against the <0.1% miss-rate goal: (1) each safety-critical slice (low light, glare, occlusion, motion blur, small pedestrian, reflective clothing, background clutter, loading-dock crossing, near/far range, camera vibration) must have at least 3,000 labeled pedestrian instances in the held-out validation set with zero misses before release; (2) training data must include at least 10x that positive coverage across the same slices plus hard negatives from empty aisles, mannequins, forklifts, and pallets; (3) labels require box IoU >= 0.9 agreement on audited pedestrian boxes, with all disagreements adjudicated; (4) per-slice false-negative rate, not just aggregate recall, is a release gate; (5) data freshness requires quarterly refresh for active sites and immediate refresh after camera, lighting, or layout changes.
  common_mistake: |
    **The Pitfall:** Specifying only accuracy metrics without data quality metrics.
    **The Rationale:** Candidates assume accuracy metrics inherently guarantee robustness across all conditions.
    **The Consequence:** They fail to ensure coverage of rare-but-critical scenarios like low-light or partial occlusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target miss rate: <0.1% false negatives per audited slice.
    - Use the rule of three: with zero observed misses, the 95% upper confidence bound is about 3/N.
    - Safety-critical validation slices: 10 slices.
    - Annotation cost: $1.50/bbox for the primary label pass; 20% of boxes receive independent QA relabeling.
    - Dataset size: 100K training images with 5 bboxes/image avg.

    **Calculations:**
    - Required validation positives per slice: 3 / 0.001 = 3,000 pedestrian instances with zero misses.
    - Total held-out positive coverage across 10 slices: 10 * 3,000 = 30,000 pedestrian instances.
    - Training corpus labels: 100K images * 5 bboxes/image avg = 500K bounding boxes.
    - Primary annotation cost: 500K boxes * $1.50/bbox = $750K.
    - QA relabeling cost: 20% * 500K boxes * $1.50/bbox = $150K.
    - Total annotation budget: $750K + $150K = $900K.
    - Storage: 100K * 1MB = 100GB.

    **Conclusion & Interpretation:**
    - **Result: 3,000 zero-miss validation positives per critical slice, 100GB storage, and ~$900K labeling/QA budget (Data-Quality-Bound).** The release gate is per-slice evidence for the <0.1% miss-rate objective, not arbitrary class balance alone.
