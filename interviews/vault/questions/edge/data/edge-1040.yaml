title: 'Dataset Curation: Specify Data Quality Requirements for Safety-Critical Edge Deployment'
scenario: 'You are writing the data quality specification for a pedestrian detection model deployed on an edge device in autonomous forklifts. The system must achieve < 0.1% miss rate (false negative) on pedestrians.'
question: 'What quantitative data quality SLAs would you set for the pedestrian detector to achieve a < 0.1% miss rate?'
details:
  realistic_solution: 'Safety-critical systems require: (1) Class balance SLA: pedestrian class >= 15% of all instances. (2) Scenario coverage: >= 500 examples each of night/low-light, partial occlusion, motion blur. (3) Label quality: >= 3 annotators, IoU >= 0.9 inter-annotator agreement. (4) Data freshness: no images > 24 months old. Validate the pipeline with nsys profiling.'
  common_mistake: |
    **The Pitfall:** Specifying only accuracy metrics without data quality metrics.
    **The Rationale:** Candidates assume accuracy metrics inherently guarantee robustness across all conditions.
    **The Consequence:** They fail to ensure coverage of rare-but-critical scenarios like low-light or partial occlusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target miss rate: 0.1%. Baseline recall 99.9% needs 10K images.
    - Rare scenario coverage: miss rate on low-light is 3x baseline.
    - Annotation cost: $1.50/bbox, 3 annotators.
    - Dataset size: 100K training images with 5 bboxes/image avg.

    **Calculations:**
    - Rare scenario coverage needs 3x low-light samples: 30K images.
    - Total dataset size: 100K training images * 5 bboxes/image avg = 500K bounding boxes.
    - Annotation cost: 100K total images * 3 annotators * $1.50/bbox = $450K.
    - Storage: 100K * 1MB = 100GB.

    **Conclusion & Interpretation:**
    - **Result: 100GB, $450K (Data-Bound)**. Requires substantial dataset scaling to meet 0.1% miss rate.
