title: 'Dataset Curation: Implement On-Device Data Augmentation Budget for Jetson Orin'
scenario: Data augmentation for online learning is being implemented on a Jetson Orin. The model trains on 64 images/batch at 224x224. The augmentation pipeline must complete within 10ms per batch to not bottleneck the 100ms training step.
question: How would you implement augmentation for 64-image batches and verify it stays under the 10 ms budget?
details:
  realistic_solution: |
    Implement the augmentation path as a GPU-resident batch pipeline on Orin: decode or stage images into unified-memory tensors, then run fused or batched CUDA/DALI operations for resize, crop, flip, color jitter, normalization, and layout conversion. Preallocate buffers for the 64-image batch, avoid CPU PIL transforms and extra host-device copies, and use CUDA streams so augmentation overlaps with data loading where possible. Verify the 10 ms budget by timing warm runs with CUDA events and Nsight Systems on the target Orin, reporting p50/p95 batch latency and failing the pipeline if p95 augmentation exceeds 10 ms.
  common_mistake: |
    **The Pitfall:** Running augmentation on the CPU while the GPU is idle waiting.
    **The Rationale:** Standard tutorials often demonstrate augmentation using CPU libraries (PIL or standard torchvision), which engineers copy-paste without considering edge CPU bottlenecks.
    **The Consequence:** The CPU limits the pipeline well over the 10 ms budget, leaving the powerful GPU starving and stalling overall training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 images per batch, 224x224 resolution.
    - 10 ms target budget.
    - Augmentation runs entirely on the Orin GPU after the batch is already in unified memory; no PCIe copy is required.
    - Effective LPDDR5/shared-memory bandwidth for the image read/write path: 68 GB/s.

    **Calculations:**
    - CPU-only resize baseline: 0.2 ms/image * 64 = 12.8 ms, so CPU augmentation fails the 10 ms budget.
    - Batch tensor size: 64 * 224 * 224 * 3 bytes = 9.63 MB.
    - GPU memory traffic for one read plus one write: 2 * 9.63 MB / 68 GB/s = 0.28 ms.
    - GPU augmentation kernels: vectorized crop/color/flip transforms ≈ 2.0 ms.
    - GPU pipeline total: 0.28 ms memory traffic + 2.0 ms kernels = 2.28 ms.

    **Conclusion & Interpretation:**
    - **Result: ~2.3 ms Total Latency (GPU-Pipeline Bound).** The CPU path is excluded because it misses the budget; keeping augmentation on the Orin GPU with shared-memory tensor access stays comfortably below 10 ms.
