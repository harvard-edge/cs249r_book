title: Calibration Data Pruning for Edge TPU Quantization
scenario: 'You are training an object detection model to deploy on a Google Coral Edge TPU (4 TOPS INT8, 2W). The model achieves 95% mAP in FP32, but after post-training quantization to INT8 using your full 1M-image training dataset for calibration, the accuracy drops to 60%. A colleague suggests randomly sampling 10,000 images for calibration instead. When you do this, accuracy recovers to 85%.'
question: Why did using 10,000 random calibration images improve Coral Edge TPU INT8 accuracy versus the full 1M-image dataset?
details:
  realistic_solution: 'The full dataset contains extreme outliers (rare anomalies or noisy data) that push the min/max activation values far apart. Because the Google Coral Edge TPU requires strict INT8 quantization (which only has 256 distinct bins), a wide activation range forces the quantization step size to be large, destroying the precision needed for typical activations. Randomly sampling a smaller subset acts as implicit data pruning, statistically excluding rare outliers, narrowing the calibration range, and providing finer INT8 resolution for the features that matter most.'
  common_mistake: |
    **The Pitfall:** Assuming that more data is always better for quantization calibration.
    **The Rationale:** Candidates apply standard deep learning intuition (more data = better generalization) to quantization, failing to realize that calibration sets the min/max bounds for the integer bins.
    **The Consequence:** Outliers artificially stretch the INT8 quantization range, destroying the representational capacity for the vast majority of normal activations.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 resolution: 256 representable bins.
    - Full 1M dataset outlier activation: 127.5.
    - Pruned 10K dataset max activation: 12.75.

    **Calculations:**
    - Step size for 1M dataset = 127.5 / 255 = 0.5 per bin.
    - Step size for 10K dataset = 12.75 / 255 = 0.05 per bin.

    **Conclusion & Interpretation:**
    - **Result: 10x Finer Resolution (Quantization Calibration).** This 10x finer resolution preserves the subtle feature details required to maintain accuracy.
