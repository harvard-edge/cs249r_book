title: Edge AI Feature Store Optimization for Real-time Inference
scenario: You are designing an autonomous vehicle perception system using an edge AI accelerator. Input features for each frame are pre-processed and stored on an embedded NVMe SSD before being fed to the model. You anticipate processing up to 100 frames per second, with each frame's features amounting to approximately 50MB of raw data.
question: Which storage format and compression strategy would you choose for 50MB frames at 100 FPS on the edge accelerator, and why?
details:
  realistic_solution: For an edge device like the Qualcomm Cloud AI 100, a highly optimized custom binary format or a specialized TFRecord structure would likely be preferred. This allows for precise control over data layout, enabling zero-copy deserialization or direct memory mapping. Implementing block-level compression (e.g., LZ4 or Zstd for speed) on the NVMe SSD is crucial to reduce I/O bandwidth requirements. The data pipeline should pre-fetch compressed data into the 32 GB LPDDR4x memory, allowing for quick decompression and direct feed to the accelerator, minimizing I/O stalls and ensuring the 400 TOPS INT8 compute can be saturated.
  common_mistake: |
    **The Pitfall:** Choosing general-purpose formats (like standard Parquet) without accounting for CPU deserialization overhead.
    **The Rationale:** Engineers prioritize storage space and disk I/O over the latency penalty incurred when the host CPU must decode complex formats.
    **The Consequence:** The host CPU throttles the pipeline, failing to feed the accelerator fast enough and missing the 10ms per-frame deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame size: 50MB raw. Target rate: 100 FPS (10ms budget). NVMe read speed: ~3-7 GB/s.
    2. **Calculations:**
       - Raw Data Throughput required: 100 FPS * 50 MB = 5 GB/s.
       - Compressed (5:1 ratio via LZ4/Zstd): 100 FPS * 10 MB = 1 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound without Compression.** Uncompressed data risks saturating the NVMe bus. Block-level compression reduces I/O to a safe 1 GB/s, provided a fast, low-overhead deserialization format (like custom binary or flat TFRecords) is used.
