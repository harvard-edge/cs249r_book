title: Evaluating Edge Coreset Selection for On-Device Adaptation
scenario: 'You are designing an on-device continual learning pipeline for an autonomous robot. The system captures 1080p video at 30 FPS and must select a subset of highly informative frames (a coreset) to store in memory for nightly fine-tuning. You must evaluate two data pruning strategies: Strategy A computes a full embedding distance matrix for k-center clustering on the Ampere GPU, while Strategy B uses the DLA accelerator to compute streaming loss-based importance scores.'
question: Which strategy is better suited for this edge environment and why?
details:
  realistic_solution: 'Strategy B is the better choice for the edge environment. By offloading a lightweight loss-estimation model to the DLA, the system can score and filter frames in a streaming fashion, keeping the primary GPU free for primary inference. This strictly bounds memory usage to the actual coreset size and minimizes power draw, efficiently selecting data for fine-tuning.'
  common_mistake: |
    **The Pitfall:** Choosing k-center clustering for its theoretical diversity guarantees.
    **The Rationale:** Candidates focus purely on algorithmic coreset diversity and ignore the O(N^2) memory and compute complexity of the distance matrix.
    **The Consequence:** Continuous heavy GPU utilization starves primary inference workloads and causes instant OOM on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Ingestion: 30 FPS.
    - Frame Size: Uncompressed 1080p RGB is ~6.2 MB.
    - Buffer Capacity: 4 GB.

    **Calculations:**
    - Total frames per hour: 30 * 60 * 60 = 108,000 frames.
    - Buffer frame capacity: 4000 MB / 6.2 MB = ~645 frames.
    - Strategy A (Distance Matrix) Memory: 108,000^2 elements * 4 bytes (FP32) = 46.6 GB.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Bound.** Strategy A requires 46.6 GB for the distance matrix, causing instant OOM. Strategy B operates sequentially, strictly bounding memory to the 4 GB buffer.
