title: 'Edge TPU Storage: Optimizing Data Formats for Real-time Inference Buffering'
scenario: A remote wildlife monitoring system utilizes an edge accelerator (4 TOPS INT8, 2W power budget) for real-time object detection. Due to highly intermittent satellite connectivity, the system must buffer up to 12 hours of processed inference results locally on a small NVMe drive before successful uplink. Each inference produces approximately 10KB of structured metadata and a 50KB cropped image region per frame. The pipeline processes data at 5 FPS.
question: How would you store and compress 12 hours of inference results at 5 FPS for energy-efficient, reliable local buffering?
details:
  realistic_solution: Use an append-friendly local buffer made of rotated chunk files, each containing length-prefixed binary records for metadata plus the cropped image bytes, with a small sidecar index for timestamps, object classes, and upload state. Compress images with an image-appropriate codec or quality setting, and use LZ4 or Snappy for metadata/chunk compression when it saves space without burning the 2W power budget; avoid GZIP/ZLIB unless benchmarks show the extra CPU energy is acceptable. Make each chunk independently recoverable with checksums, atomic rename on close, and a write-ahead manifest so power loss does not corrupt the whole 12-hour buffer.
  common_mistake: |
    **The Pitfall:** Defaulting to JSON/CSV or columnar formats like Parquet.
    **The Rationale:** Candidates choose familiar cloud analytics formats without considering edge I/O profiles.
    **The Consequence:** JSON/CSV cause massive file sizes and parsing overhead, blowing the 2W power budget, while Parquet adds unnecessary schema overhead for sequential write-heavy edge patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Throughput: 5 FPS.
    - Payload per frame: 10KB metadata + 50KB image = 60KB.
    - Duration: 12 hours.

    **Calculations:**
    - Raw Data Rate: 5 FPS * 60KB = 300 KB/second.
    - Uncompressed Buffer: 300 KB/sec * 3600 sec/hour * 12 hours = ~12.96 GB.
    - If cropped images average 2x compression with an image-appropriate codec, image data becomes 50KB / 2 = 25KB per frame.
    - Metadata plus compressed image payload = 10KB + 25KB = 35KB per frame.
    - Estimated buffer = 5 FPS * 35KB * 3600 sec/hour * 12 hours = 7.56 GB before chunk indexes and manifests.

    **Conclusion & Interpretation:**
    - **Result: about 7.6 GB plus index overhead, storage-feasible but energy-sensitive.** Use image codecs for crops and lightweight chunk compression for metadata; benchmark heavier compression before using it under the 2W budget.
