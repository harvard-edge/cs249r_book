title: Edge AI Data Storage Optimization on Qualcomm Cloud AI 100
scenario: You are tasked with designing the data pipeline for a critical real-time ML inference application deployed on a fleet of Qualcomm Cloud AI 100 accelerators. Each accelerator features 32 GB LPDDR4x memory and delivers 400 TOPS INT8 performance. The application generates and consumes a high volume of sensor data (e.g., video frames, radar sweeps, telemetry) that needs to be temporarily stored locally for up to 72 hours for fault tolerance, re-processing, and local model fine-tuning before being aggregated.
question: How would you design the local storage pipeline for 72 hours of sensor data on Cloud AI 100 while minimizing I/O and memory overhead?
details:
  realistic_solution: A robust solution would involve a multi-faceted approach. For historical data archiving or occasional re-processing, a columnar format like Parquet, often compressed with Zstandard or Snappy, is beneficial due to its efficient query capabilities (predicate pushdown) and high compression ratios, allowing more data to fit into the 32 GB LPDDR4x. However, for immediate inference data, a custom binary format or TFRecord (for TensorFlow-based models) structured for rapid sequential reads and batched processing might be more appropriate. Leveraging features like protobuf for serialization within TFRecord can offer schema evolution and efficiency. Crucially, implement a strategy for selective feature loading, only decompressing and materializing the exact data fields required for the current inference step. Utilize efficient data structures that minimize memory copies. Consider memory-mapped files for frequently accessed datasets to reduce parsing overhead and system calls. Integrate hardware-accelerated decompression if available, or carefully benchmark software codecs against the device's general-purpose CPU cores.
  common_mistake: A common mistake is choosing a generic data format (e.g., JSON, CSV) or a sub-optimal compression algorithm without fully considering the specific hardware constraints and access patterns of an edge device. Forgetting that decompression consumes valuable CPU/DSP cycles, or loading entire records into memory when only specific features are needed, can lead to thrashing the 32 GB LPDDR4x memory and becoming compute-bound on decompression rather than inference. Neglecting the performance characteristics of LPDDR4x (e.g., burst access, cache lines) for data loading is another pitfall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uncompressed data rate: 100 MB/s. Target storage: 72 hours.
    - Storage limit: 256GB NAND flash. Inference batch: 1MB takes 10ms (100MB/s throughput).

    **Calculations:**
    - Raw 72h data size: 100 MB/s * 259,200s = 25.92 TB.
    - Required compression ratio: 25.92 TB / 256 GB = ~100x.
    - Decompression budget: Must be <10% of 10ms inference.

    **Conclusion & Interpretation:**
    - **Result: >100x compression (I/O-Bound)**. Achieving 100x compression while keeping decompression overhead under 1ms is critical for maintaining real-time throughput.
