title: Streaming Coreset Selection for Edge Continual Learning
scenario: A team is deploying specialized on-premise language models using a Qualcomm Cloud AI 100 accelerator card inside a 75W server power budget. They receive 10 million new telemetry logs daily but cannot train on all of them due to power and time limits.
question: How would you build a streaming coreset pipeline to select from 10 million daily logs under the 75W limit?
details:
  realistic_solution: |
    Deploy a lightweight INT8 embedding proxy on the accelerator and keep the coreset index on the host in ordinary DRAM. As logs stream in, embed each log, update a bounded diversity sketch or facility-location approximation, and retain only candidates that improve coverage or represent rare clusters. The accelerator performs the dense embedding work inside the 75W budget, while the host maintains compact metadata and avoids full-corpus fine-tuning until the selected coreset is ready.
  common_mistake: |
    **The Pitfall:** Proposing storing all data and using random sampling, or suggesting a massive proxy model for data scoring.
    **The Rationale:** Engineers either choose the easiest path (random) or a cloud-centric path (massive proxy), ignoring the strict power envelope.
    **The Consequence:** Random sampling misses rare edge cases, while a large proxy model exceeds the 75W thermal limit and saturates the latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 million logs daily.
    - AI 100 peak capacity: 400 TOPS = 400,000 GOPS.
    - Sustained utilization target inside the 75W budget: 25%.
    - Lightweight embedding model: 2 GOPS/log.

    **Calculations:**
    - Sustained compute = 400,000 GOPS * 25% = 100,000 GOPS.
    - Scoring throughput = 100,000 GOPS / 2 GOPS/log = 50,000 logs/sec.
    - Total Scoring Time: 10,000,000 logs / 50,000 logs/sec = 200 seconds.
    - Average daily rate = 10,000,000 logs / 86,400 sec = ~116 logs/sec, far below the sustained scoring rate.

    **Conclusion & Interpretation:**
    - **Result: 200 seconds of accelerator scoring at 25% utilization (Compute-Feasible).** The streaming coreset design is viable because the proxy scorer has large throughput headroom and the host stores only compact embeddings, cluster summaries, and selected examples.
