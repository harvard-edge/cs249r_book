title: The Aging Sensor Drift
scenario: Your Google Coral-based air quality monitoring system uses a metal-oxide (MOx) gas sensor to detect volatile organic compounds (VOCs), feeding readings into a regression model that estimates PPM concentration. The system was calibrated and deployed in a factory. After 8 months, the model consistently under-reports VOC levels by 25-40%. The factory's reference instrument confirms VOC levels haven't changed. The Coral and model are functioning correctly.
question: What's causing the systematic under-reporting?
details:
  realistic_solution: 'Metal-oxide gas sensors degrade through a well-characterized mechanism: the sensing element (typically SnO₂) undergoes surface poisoning from exposure to silicone vapors, sulfur compounds, and other contaminants common in factory environments. The sensor''s baseline resistance increases by 5-15% per year, and its sensitivity (resistance change per PPM of VOC) decreases by 20-40% per year.'
  common_mistake: '"The model has drifted" or "The sensor needs cleaning." The model is deterministic (same input -> same output), and cleaning doesn''t reverse the underlying degradation mechanism.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor aging: baseline +10%/year, sensitivity -30%/year.

    **Calculations:**
    - After 8 months: baseline +6.7%, sensitivity -20%.
    - Error: 100 PPM reads as 79 PPM (21% error).
    - After 12 months: 100 PPM reads as 63 PPM (37% error).

    **Conclusion & Interpretation:**
    - **Result: 37% error (Accuracy-Bound)**. Modeling the physical degradation curve allows for software-based correction without frequent hardware recalibration.
