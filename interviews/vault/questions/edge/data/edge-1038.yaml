title: 'Dataset Curation: Optimize On-Device Dataset Compression for Storage-Constrained Edge'
scenario: Your edge device needs to store 50K training images for periodic on-device fine-tuning. Raw images at 224x224x3 (150KB each) total 7.5GB, exceeding your 4GB budget for training data.
question: How would you store 50,000 training examples within the 4GB budget without significant quality loss?
details:
  realistic_solution: Store pre-extracted features instead of raw images. Use a frozen backbone to extract 512-dim features offline. Store as float16. This reduces storage by about 146x relative to the 7.5 GB raw-image estimate while preserving most task-relevant information for classification heads, permitting fast on-device fine-tuning over multiple epochs.
  common_mistake: |
    **The Pitfall:** Blindly lowering JPEG quality or resizing to a smaller resolution.
    **The Rationale:** Candidates default to standard image compression techniques without considering the downstream impact on model accuracy.
    **The Consequence:** Substantial degradation in fine-tuning effectiveness, making the deployed model less accurate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Budget: 4 GB.
    - Dataset: 50,000 images.
    - Raw Image estimate from prompt: 150 KB/image, so 50,000 images total 7.5 GB.
    - Uncompressed pixel calculations assume 1 byte per color channel.

    **Calculations:**
    - Option A (Resize 112x112, uncompressed RGB): 50,000 * 112 * 112 * 3 bytes = 1.88 GB.
    - Option B (JPEG quality 50 estimate): 50,000 * 25 KB/image ≈ 1.25 GB.
    - Option C (Pre-extracted Features): 50,000 * 512 dims * 2 bytes (FP16) = 51.2 MB.
    - Labels: 50,000 * 4 bytes = 200 KB. Total = 51.4 MB.
    - Reduction versus prompt raw storage: 7.5 GB / 51.4 MB ≈ 146x.

    **Conclusion & Interpretation:**
    - **Result: 51.4 MB (Storage-Bound).** Frozen-backbone feature storage is the best fit under the 4 GB budget, but it changes fine-tuning to adapter/head training rather than full image-based augmentation.
