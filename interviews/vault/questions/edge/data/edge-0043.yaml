title: The Dropped Frame Dilemma
scenario: You are building a real-time perception system for an autonomous forklift. It uses a high-resolution camera (30 FPS), a LiDAR (10 Hz), and an IMU (100 Hz). All sensor data needs to be fused before being fed into a neural network for obstacle detection. Occasionally, under heavy load (e.g., complex scenes), you observe dropped camera frames or out-of-sync sensor data, leading to detection failures.
question: How would you design a robust, real-time sensor data pipeline that handles variable ML inference times and prevents data loss or desynchronization?
details:
  realistic_solution: 'Replace standard unbounded FIFOs with fixed-size ring buffers to enforce O(1) memory bounds and deterministic latency. Implement strict timestamp-based synchronization for sensor fusion rather than relying on arrival order. Introduce active backpressure: when the inference engine exceeds its time budget, the ingestion pipeline must deterministically drop frames (e.g., skip N frames) rather than allowing queue growth, ensuring the model always evaluates the most recent physical state.'
  common_mistake: |
    **The Pitfall:** Using unboundly large FIFO buffers everywhere.
    **The Rationale:** Engineers assume that absorbing transient spikes is safely accomplished by queueing data.
    **The Consequence:** Unbounded memory growth leading to out-of-memory crashes, and feeding dangerously "stale" frames to the perception model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera input rate: 30 FPS.
    - Neural network processing rate: 20 FPS (50 ms/frame).
    - RGB frame size (1080p): 6.2 MB.

    **Calculations:**
    - Frame accumulation rate: 30 FPS - 20 FPS = +10 frames/sec.
    - Memory growth rate: 10 frames * 6.2 MB = 62 MB/s.
    - Queue size after 1 minute: 62 MB/s * 60 s = 3,720 MB (~3.7 GB).

    **Conclusion & Interpretation:**
    - **Result: ~3.7 GB memory leak per minute (Memory Exhaustion/Latency Bound)**. Unbounded FIFO queues cause catastrophic memory exhaustion and unbounded latency, feeding dangerously stale data to the perception model.
