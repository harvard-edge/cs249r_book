title: 'Hailo-8 Edge Data Pipeline: Optimizing Storage for Efficient Inference'
scenario: A new object detection model is deployed on a Hailo-8 accelerator for real-time processing of video streams at the edge. The input frames arrive at 500 MB/s and are pre-processed into a dataset of image patches and associated metadata. This data needs to be temporarily stored on local flash storage before being fed to the Hailo-8 for inference.
question: Which storage format and compression traits would you choose for 500 MB/s patch ingestion on the Hailo-8, and why?
details:
  realistic_solution: Use large sequential RecordIO/TFRecord-style binary shards for the image patches, with fixed-size records or length-prefixed records, a compact sidecar index for offsets and metadata, and lightweight block compression such as LZ4 or Snappy only where benchmarks show the host can keep up. This workload is temporary 500 MB/s edge ingestion for a Hailo-8 pipeline, so append throughput, sequential reads, low parse overhead, bounded flash write amplification, and predictable prefetch matter more than cloud analytics features. Store metadata in the sidecar or a small columnar file for later analysis, but do not put the hot patch stream in Parquet unless measured access is columnar and offline.
  common_mistake: |
    **The Pitfall:** Defaulting to general-purpose, row-oriented formats like CSV or JSON.
    **The Rationale:** Developers rely on cloud-native habits and ignore the massive CPU overhead required to deserialize row-oriented text formats for thousands of small metadata points.
    **The Consequence:** Creating a severe I/O and host CPU bottleneck that completely starves the edge accelerator of data, destroying system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw ingestion rate: 500 MB/s.
    - Format: sequential binary patch shards with sidecar metadata.
    - Compression ratio depends on image-patch entropy and metadata structure; assume an illustrative 2:1 ratio for planning, not a guarantee.

    **Calculations:**
    - Illustrative compressed write rate = 500 MB/s / 2 = 250 MB/s if LZ4/Snappy achieves 2:1 on representative patches.
    - If patches are already compressed or high entropy, write rate remains near 500 MB/s, so the format still needs sequential append and prefetch.
    - Metadata is small enough to keep in a sidecar index; avoid per-record text or nested column parsing on the hot path.

    **Conclusion & Interpretation:**
    - **Result: choose shardable binary records for the hot path.** Compression may reduce I/O pressure, but the primary requirement is sequential flash access and low CPU parsing so the Hailo-8 stays fed.
