title: Optimizing Sensor Data Storage on NVIDIA Jetson Orin for Edge ML
scenario: You are deploying an ML system on an NVIDIA Jetson AGX Orin that continuously collects high-frequency sensor data. This data, consisting of 10 float32 features and a timestamp per record, must be stored locally on a 64 GB eMMC before being periodically uploaded. The primary use cases are real-time inference and batch analytics.
question: Which format and compression optimize Orin analytics plus upload, and how many days of 10-feature float32 records fit in 64 GB?
details:
  realistic_solution: Select Parquet with LZ4 compression because this prompt optimizes periodic upload and batch analytics while keeping decompression cost low for Orin-side reads. For a pure real-time append log, a binary ring buffer would be better, but Parquet + LZ4 is reasonable when analytics and upload dominate. With 10 float32 features plus one 8-byte timestamp, each raw record is 48 bytes. At 1000 records/sec and an assumed 5x compression ratio for uniform sensor columns, 64 GB stores about 6.67 billion records, or roughly 77.2 days of data.
  common_mistake: |
    **The Pitfall:** Selecting row-oriented formats (like TFRecord) for mixed workloads.
    **The Rationale:** Engineers default to ML-native formats without realizing row-based storage ruins I/O efficiency when analytics queries only need 2 out of 10 columns.
    **The Consequence:** Wasted CPU cycles on decompression and massive I/O bottlenecks that stall real-time execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Record: 10 float32 (40 bytes) + 1 timestamp (8 bytes) = 48 bytes/record.
       - Ingestion rate: 1000 records/sec.
       - Storage: 64 GB decimal (64 * 10^9 bytes).
       - Compression: illustrative ~5x ratio using Parquet + LZ4 on uniform sensor columns.
    2. **Calculations:**
       - Compressed record size = 48 bytes / 5 = 9.6 bytes.
       - Total records storable = (64 * 10^9) / 9.6 = ~6.67 * 10^9 records.
       - Daily ingestion = 1000 * 3600 * 24 = 86,400,000 records/day.
       - Days of storage = (6.67 * 10^9) / 86,400,000 = ~77.2 days.
    3. **Conclusion & Interpretation:**
       - **Result: ~77 days with Parquet + LZ4 under the stated 1000 records/sec and 5x compression assumptions.** The choice is justified when analytics and upload matter more than maximum append speed.
