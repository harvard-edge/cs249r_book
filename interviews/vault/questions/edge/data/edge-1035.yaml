title: Federated Learning Data Strategy for Industrial Edge Fleet
scenario: Designing a Federated Learning strategy for 50,000 Jetson Orin devices with non-IID defect data to reach 95% precision.
question: What federated learning data strategy would you use for 50,000 non-IID Jetson Orin devices to reach 95% defect precision?
details:
  realistic_solution: |
    Use a data-first federated strategy: profile each client by defect taxonomy, camera/site, and production line; cluster clients with similar defect distributions; and run stratified client sampling so each round contains enough rare-defect and hard-negative examples. Locally filter duplicates and low-confidence labels, rebalance mini-batches toward rare defects, and keep a small per-site validation slice for precision tracking. Train a shared backbone with per-cluster heads or adapters, then personalize locally on curated site-specific examples. Use FedProx or clustered FedAvg as the optimizer layer; apply privacy controls only after measuring the precision tradeoff, because DP noise can hurt a 95% precision target.
  common_mistake: |
    **The Pitfall:** Applying FedAvg naively on non-IID data.
    **The Rationale:** Engineers assume standard federated aggregation works out-of-the-box regardless of severe local data distribution skew.
    **The Consequence:** The global model performs poorly across all individual sites because it averages inherently disjoint defect distributions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50,000 devices.
    - 10% participation (5000/round).
    - 7M param model.
    - Server bandwidth = 1.25 GB/s.
    - Local update: 100 curated samples/device, 5 epochs.
    - Effective edge training throughput assumed for the small update: 275 GFLOP/s, not the headline 275 INT8 TOPS inference rate.

    **Calculations:**
    - Payload = 7M params * 1 byte (compressed) = 7 MB.
    - 5000 * 7 MB = 35 GB/round.
    - Network time = 35 GB / 1.25 GB/s = 28 seconds/round before protocol overhead.
    - Local compute = 100 samples * 5 epochs * 7M * 6 FLOPs = 21B FLOPs.
    - Local compute time = 21 GFLOPs / 275 GFLOP/s = 0.076 seconds/device, plus data-loading and optimizer overhead.

    **Conclusion & Interpretation:**
    - **Result: ~28 seconds minimum communication time per round (Network-Bandwidth-Bound).** The data strategy should reduce wasted rounds by sampling representative defect clusters and emphasizing rare defects, while local compute is small compared with fleet communication and orchestration.
