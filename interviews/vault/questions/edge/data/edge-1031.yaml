title: 'Dataset Curation: Design On-Device Data Collection Pipeline for Edge Models'
scenario: You are building a federated data collection system for fine-tuning object detection models deployed on 10,000 Jetson Orin devices (32GB LPDDR5, 275 TOPS INT8, 60W). Each device captures 100 images/day in industrial settings.
question: How would you design the on-device quality filtering and upload pipeline for 10,000 Orin devices capturing 100 images per day?
details:
  realistic_solution: |
    On each device, run a cheap quality gate before upload: blur detection with Laplacian variance, perceptual-hash deduplication against a rolling 24-hour local index, and confidence-based sampling that prioritizes uncertain detections around 0.3-0.7. Maintain a bounded local spool with metadata, priority, retry count, and age; upload in compressed batches during allowed network windows, retry with exponential backoff, and evict lowest-priority duplicates first when disk or queue limits are reached. Target about a 20% upload rate, with urgent rare or safety-critical samples allowed to bypass normal sampling.
  common_mistake: |
    **The Pitfall:** Uploading all raw images without on-device filtering.
    **The Rationale:** Candidates default to cloud-centric data collection strategies, completely ignoring the strict bandwidth limitations of edge deployments.
    **The Consequence:** This overwhelms the cellular upload bandwidth and dramatically increases operational data costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10K devices, 100 images/day/device, 20% upload rate.
    - Decimal units: 1 MB = 1000 KB; network rates are decimal Mb/s.
    - Image size: 1920x1080x3 = 6.2 MB raw, JPEG compressed to 310 KB.
    - LTE bandwidth: 10Mbps.

    **Calculations:**
    - Upload volume per device = 20 images * 310KB = 6.2MB/day.
    - Total upload across fleet = 200K images * 310KB = 62GB/day.
    - Per-device upload in bits = 6.2MB * 8 = 49.6Mb.
    - Approximate network time per device = 49.6 Mb / 10 Mb/s = 4.96 seconds/day before protocol overhead.
    - Quality-filter compute time per device = 100 images * 3 ms/image = 300 ms/day, plus detector scoring if confidence sampling is not already available from inference.

    **Conclusion & Interpretation:**
    - **Result: 6.2 MB/day per device, 62 GB/day fleet-wide (Network-Bound)**. On-device filtering limits each device to roughly 5 seconds of upload time per day, while bounded queues, prioritization, and retries keep the fleet stable during network outages.
