title: 'Dataset Curation: Design On-Device Data Collection Pipeline for Edge Models'
scenario: You are building a federated data collection system for fine-tuning object detection models deployed on 10,000 Jetson Orin devices (32GB LPDDR5, 275 TOPS INT8, 60W). Each device captures 100 images/day in industrial settings.
question: How would you design the on-device quality filtering and upload pipeline for 10,000 Orin devices capturing 100 images per day?
details:
  realistic_solution: 'On-device: (1) Blur detection (Laplacian variance, CPU, 1ms/image) → discard if < 100. (2) Duplicate detection (perceptual hash, 2ms/image) → discard if hamming distance < 8 to last 24h. (3) Confidence-based sampling: run detector, upload if confidence 0.3-0.7 (uncertain cases most valuable). Target: upload 20% of images.'
  common_mistake: Uploading all raw images without on-device filtering, overwhelming upload bandwidth; or running heavy quality filters that drain battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10K devices, 100 images/day/device, 20% upload rate.
    - Image size: 1920x1080x3 = 6.2MB raw, JPEG compressed to 310KB.
    - LTE bandwidth: 10Mbps.

    **Calculations:**
    - Upload volume per device = 20 images * 310KB = 6.2MB/day.
    - Total upload across fleet = 200K images * 310KB = 62GB/day.
    - Network time per device = 6.2MB / (10Mbps / 8) = ~5 seconds/day.
    - Compute time per device = 100 images * 3ms/image = 300ms/day.

    **Conclusion & Interpretation:**
    - **Result: 6.2MB/day (Network-Bound)**. On-device filtering effectively limits the network load to 5 seconds per day while compute overhead remains negligible.
