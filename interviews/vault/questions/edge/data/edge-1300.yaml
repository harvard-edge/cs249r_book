title: INT8 Calibration Dataset Bias at the Edge
scenario: Your team deployed a quantized pedestrian detection model to an NVIDIA Jetson Orin, leveraging the DLA accelerator and Ampere GPU to achieve high throughput using INT8 precision. The original FP32 model performed well across all conditions, but the edge deployment is experiencing a severe spike in false negatives exclusively during dusk and nighttime. The overall training dataset contains 90% daytime and 10% nighttime images.
question: Why does the INT8 Jetson Orin deployment miss pedestrians specifically at dusk and night despite strong FP32 performance?
details:
  realistic_solution: The root cause is a blindly sampled INT8 calibration dataset that failed to stratify for lighting conditions. Because the Jetson Orin's DLA relies on INT8 precision, activations must be mapped to an 8-bit integer range [-128, 127]. If the calibration set was dominated by high-contrast daytime images, the quantization scale factors were set too wide. Consequently, small-magnitude activations typical of low-contrast nighttime images (e.g., 0.04, which quantizes to round(0.04/0.094) = 0) get quantized to zero, effectively erasing the signal before the DLA can process it. The fix is to curate a small, uniformly balanced calibration dataset that captures the full dynamic range of all deployment environments.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the false negatives as a general model capacity or camera sensor dynamic range issue.
    **The Rationale:** Candidates suggest retraining the model with more nighttime data, failing to connect the symptom to the precision loss of the INT8 quantization process.
    **The Consequence:** Wasting significant resources on data collection and retraining without fixing the underlying numerical representation bug.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daytime activations: [-12.0, 12.0].
       - Nighttime activations: [-0.8, 0.8].
       - Target format: INT8 ([-128, 127]).
    2. **Calculations:**
       - INT8 scale factor (biased to daytime) = 24.0 / 255 ≈ 0.094 per bit.
       - A critical nighttime feature activation (e.g., 0.04) quantized = round(0.04 / 0.094) = round(0.42) = 0.
    3. **Conclusion & Interpretation:**
       - **Result: Activation quantizes to 0.** The critical low-light signal is destroyed at the precision conversion layer, resulting in a severe **Precision-Bound** failure.
