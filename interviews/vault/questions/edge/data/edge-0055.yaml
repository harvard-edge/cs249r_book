title: The Sensor Synchronization Problem
scenario: 'Your autonomous vehicle''s perception stack on an Ambarella CV5 fuses three sensors: a camera at 30 FPS (33.3ms period), a LiDAR spinning at 10 Hz (100ms period), and a radar at 20 Hz (50ms period). Each sensor has an independent clock with up to ±2ms drift from the system clock. Your fusion algorithm requires all sensor readings to be within 10ms of each other.'
question: Why does the naive 'just use the latest reading from each sensor' approach fail, and how do you design a proper synchronization scheme?
details:
  realistic_solution: 'The "latest reading" approach creates a worst-case temporal spread of: camera age (0-33ms) + LiDAR age (0-100ms) + clock drift (±2ms per sensor, ±6ms total). Worst case: camera frame from 33ms ago, LiDAR scan from 100ms ago, radar from 50ms ago - a 100ms spread. At 60 km/h, a vehicle moves 1.67m in 100ms. Fusing a camera image showing the vehicle at position X with a LiDAR scan showing it at position X-1.67m creates a ghost object or missed detection.'
  common_mistake: |
    **The Pitfall:** Relying solely on the "latest available" reading from asynchronous sensors.
    **The Rationale:** Candidates may think that grabbing the most recent buffer is sufficient for real-time systems, ignoring the wildly different sampling periods and independent clock drift.
    **The Consequence:** Fusing data from different moments in time, leading to positional errors, ghost objects, or missed detections in perception algorithms.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera at 30 FPS (33.3ms period), LiDAR at 10 Hz (100ms period), radar at 20 Hz (50ms period).
    - Clock drift ±2ms per sensor.
    - Vehicle speed: 60 km/h (16.7 m/s).

    **Calculations:**
    - Worst-case temporal spread without sync = 100ms (LiDAR period).
    - Positional error = 16.7 m/s * 0.1s = 1.67m.
    - With ApproximateTimeSynchronizer (10ms window): worst-case spread = 10ms -> error = 0.167m.
    - With hardware PPS + motion compensation (1ms residual): error = 0.017m.

    **Conclusion & Interpretation:**
    - **Result: 1.67m Error (Temporal-Bound).** Fusing data from different moments in time leads to massive positional errors, requiring hardware synchronization.
