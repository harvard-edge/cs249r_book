title: Optimizing Edge AI Dataset Curation for Qualcomm Cloud AI 100 Deployment
scenario: 'You are tasked with developing a highly accurate object detection model for industrial anomaly detection, designed for deployment on the Qualcomm Cloud AI 100. Given a tight budget for data labeling and the critical need for high precision and recall on the edge, you are evaluating two distinct dataset curation strategies: Strategy A (Traditional Batch Annotation) versus Strategy B (Active Learning & Iterative Refinement).'
question: How would you compare traditional batch annotation versus active learning for Cloud AI 100 defect detection and choose a curation strategy?
details:
  realistic_solution: Choose Strategy B only if the active-learning loop improves rare-defect recall enough to justify its review and engineering overhead. Start with a small balanced seed set, run uncertainty/diversity sampling on production-like images, force quotas for rare defect classes, and validate each iteration against a locked rare-defect slice. For Cloud AI 100 deployment, the winning dataset is the one that preserves precision/recall while producing a model that compiles cleanly, meets latency and memory targets, and avoids extra model iterations caused by class imbalance. If active learning does not beat batch annotation on rare-defect recall after overhead, use targeted batch labeling for the missing classes.
  common_mistake: |
    **The Pitfall:** Advocating for massive datasets without considering the impact on edge resources or labeling budgets.
    **The Rationale:** Candidates default to "more data is better" without evaluating active learning economics.
    **The Consequence:** Wasting budget on uninformative labels and potentially baking in dataset bias that degrades real-world edge performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strategy A: 100,000 samples @ $0.10.
    - Strategy B: 10,000 active-learning samples @ $0.10 plus review iterations and engineering overhead.
    - Active-learning overhead: $3,000 for tooling, model scoring, reviewer adjudication, and extra validation.
    - The scenario is a labeling-economics decision; no per-inference operation count is provided.

    **Calculations:**
    - Labeling cost for Strategy A = 100,000 * $0.10 = $10,000.
    - Direct labeling cost for Strategy B = 10,000 * $0.10 = $1,000.
    - Total Strategy B planning cost = $1,000 + $3,000 overhead = $4,000.
    - Net savings = $10,000 - $4,000 = $6,000 if quality matches.
    - Strategy B should be selected only if validation metrics show comparable or better precision and recall on rare defect modes and Cloud AI 100 compile/latency targets still pass.

    **Conclusion & Interpretation:**
    - **Result: Strategy B is about $6,000 cheaper under the stated overhead and is data-efficiency bound.** Choose it only when iterative validation confirms that the smaller curated set preserves rare-defect coverage and Cloud AI 100 deployment metrics.
