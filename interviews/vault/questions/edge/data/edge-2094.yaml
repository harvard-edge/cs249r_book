title: Optimizing Edge ML Data Storage on NVIDIA Jetson Orin for Autonomous Drones
scenario: An autonomous drone processes 1080p 30fps video using an Orin (60W budget). Due to intermittent connectivity, 24 hours of video and metadata must be stored locally on a 256GB drive.
question: What two local storage architectures would you compare for 24 hours of 1080p 30fps video and detections on a 256GB Jetson Orin?
details:
  realistic_solution: Compare two concrete local storage architectures. Architecture A stores hardware-encoded H.264/H.265 video segments using NVENC plus Zstd-compressed Parquet detection metadata keyed by timestamp/frame id. Architecture B stores raw or lightly compressed RGB frame shards plus sidecar metadata for maximum replay fidelity. Architecture A is the practical default because it fits the 256GB drive and uses dedicated encode hardware inside the 60W budget; Architecture B is useful only for short forensic windows because raw 1080p30 RGB video is about 17.9 TB over 24 hours before metadata.
  common_mistake: |
    **The Pitfall:** Overlooking hardware encoding blocks and choosing generic ML formats like TFRecord for raw video.
    **The Rationale:** Porting cloud data pipelines directly to the edge without considering local storage limits or hardware decoder/encoder availability.
    **The Consequence:** Rapidly exceeding the 256GB disk capacity, dropping frames, and violating the strict 60W power budget via CPU saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video: 1080p RGB at 30 fps. Duration: 24 hours (86,400s).
    - Drive: 256 GB. H.264 Target Bitrate: 10 Mbps.
    - Metadata: 1 KB/frame.

    **Calculations:**
    - Raw Video: 1920 * 1080 * 3 * 30 * 86400 = 16,124,928,000,000 bytes = ~16.1 TB decimal (~14.7 TiB), far above 256GB.
    - H.264 Video: (10 Mbps * 86400) / 8 = 108,000 MB = 108 GB.
    - Metadata: 1 KB * 30 fps * 86400 = 2.59 GB.

    **Conclusion & Interpretation:**
    - **Result: ~110.6 GB (Storage-Capacity Bound)**. Raw video requires 16TB, while H.264 + Parquet fits comfortably at ~110.6 GB total.
