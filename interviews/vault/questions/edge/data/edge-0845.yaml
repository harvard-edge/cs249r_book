title: Non-IID Variance Skew in FedAvg
scenario: You are operating a Federated Learning (FedAvg) system for smartwatch activity recognition. You have 1,000 devices selected per round. Group A (800 typical users) generates 50 samples/device. Group B (200 athlete users) generates 200 samples/device with highly variable, non-IID data distributions. In standard FedAvg, a client's update weight is proportional to its dataset size (w_k = n_k / n_total). The local gradient variance for an athlete device is 10x higher than a typical user's device (σ_B^2 = 10σ_A^2).
question: What is the variance-contribution ratio of athlete Group B to typical Group A in the FedAvg aggregated gradient?
details:
  realistic_solution: 'The variance contribution ratio is 40x. Group B completely dominates the global update''s variance because FedAvg squares the per-client weights during aggregation, heavily amplifying the impact of clients that have both larger local datasets and higher intrinsic variance.'
  common_mistake: |
    **The Pitfall:** Forgetting that weights are squared during variance aggregation.
    **The Rationale:** Candidates assume that because groups contribute equally, the variance ratio matches the individual variance ratio.
    **The Consequence:** Grossly underestimating how severely non-IID power-users destabilize global model convergence in Federated Learning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Group A: 800 users, 50 samples/device. Variance = σ_A^2.
    - Group B: 200 users, 200 samples/device. Variance = 10σ_A^2.
    - Total samples: (800 x 50) + (200 x 200) = 80,000.

    **Calculations:**
    - Weight A (w_A): 50 / 80,000 = 1 / 1,600.
    - Weight B (w_B): 200 / 80,000 = 1 / 400.
    - Variance A Contribution: 800 x (1 / 1,600)^2 x σ_A^2 = (1 / 3,200) x σ_A^2.
    - Variance B Contribution: 200 x (1 / 400)^2 x 10σ_A^2 = (1 / 80) x σ_A^2.
    - Ratio (Var_B / Var_A): (1 / 80) / (1 / 3,200) = 3200 / 80 = 40.

    **Conclusion & Interpretation:**
    - **Result: Variance-Dominated (Data-Bound).** Group B completely dominates the global update's variance by a factor of 40x due to the squared weights in FedAvg.
