title: Optimizing Real-time Edge ML Data Pipelines with Coral TPU
scenario: You are designing a real-time anomaly detection system for industrial machinery. The system uses a pre-trained TensorFlow Lite object detection model deployed on a Google Coral Edge TPU. The TPU has a performance of 4 TOPS (Trillions Operations Per Second) for INT8 operations, consumes 2W, and exclusively supports INT8 inference. The input data is a continuous stream of high-resolution sensor readings (e.g., vibration data, thermal imaging) that needs to be pre-processed and fed to the model at a rate of 30 frames per second. The pre-processing involves normalization and resizing, which takes 5ms per frame on the host CPU. The object detection model requires approximately 100 Giga-operations (GOPs) per inference.
question: Where are the throughput bottlenecks in the Coral Edge TPU pipeline for 30 FPS, given 5 ms CPU preprocessing, 100 GOP inference, and INT8-only support?
details:
  realistic_solution: |
    The pipeline has two named stages: 5 ms of host CPU preprocessing and about 25 ms of INT8 inference on the Coral Edge TPU. If the stages are serialized for each frame, the single-stream latency is 30 ms, so the TPU inference stage is the critical path and the system has only about 3.3 ms of margin against a 33.3 ms frame budget at 30 FPS. If preprocessing and inference are pipelined, throughput is bounded by max(25 ms TPU, 5 ms CPU), so CPU preprocessing alone is not the bottleneck; the remaining risks are host-to-TPU transfer overhead, queueing, and any unsupported non-INT8 operations falling back to the CPU. The fix is to verify full INT8 compilation, overlap CPU preprocessing with TPU inference, and profile transfer plus queue latency before optimizing the already-small CPU stage.
  common_mistake: |
    **The Pitfall:** Evaluating only the TPU's theoretical capability without accounting for host CPU serial logic.
    **The Rationale:** Candidates see 4 TOPS and assume 30 FPS is trivial.
    **The Consequence:** They miss that pre-processing blocks the pipeline and limits the actual realized throughput, or they deploy an unquantized FP32 model which the TPU will reject.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU theoretical max: 4 TOPS = 4 * 10^12 INT8 ops/second.
    - Model requires 100 GOPs = 100 * 10^9 ops.
    - Pre-processing overhead: 5ms/frame on host CPU.
    - Target: 30 FPS.

    **Calculations:**
    - TPU inference time per frame = 100 GOP / 4 TOPS = 0.025s = 25ms.
    - CPU preprocessing time per frame = 5ms.
    - Sequential per-frame time = 25ms + 5ms = 30ms, or about 33 FPS.
    - Pipelined critical path is max(25ms TPU, 5ms CPU) = 25ms, or about 40 FPS before transfer overhead.
    - CPU preprocessing load at 30 FPS = 30 * 5ms = 150ms of CPU work per second, or about 15% of one core.

    **Conclusion & Interpretation:**
    - **Result: TPU inference is the critical path but 30 FPS is feasible if the model is INT8 and transfers are controlled.** Sequential execution has only about 3ms of per-frame margin; pipelining gives more throughput headroom, while CPU preprocessing alone is not the bottleneck.
