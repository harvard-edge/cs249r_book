title: The Post-Replacement Camera Miscalibration
scenario: A field technician replaces a broken camera module on a traffic monitoring device with an identical make and model. After the swap, the system reports that all vehicles are 15% smaller than before, and speed estimates are 12% too fast.
question: What did the technician miss?
details:
  realistic_solution: 'Every camera lens has unique **intrinsic parameters** — focal length, principal point, and distortion coefficients — that vary slightly between individual units due to manufacturing tolerances. The original camera was calibrated during installation: its intrinsic parameters were measured using a checkerboard pattern and stored in a calibration file on the device. The system uses these parameters to convert pixel measurements to real-world dimensions (meters) and to undistort the image before inference.'
  common_mistake: |
    **The Pitfall:** Assuming identical camera models output identical physical-to-pixel projections.
    **The Rationale:** Engineers overlook the manufacturing variances in lenses and sensor alignment.
    **The Consequence:** Severe systemic errors in physical world measurements (size, speed), leading to cascading failures in tracking and planning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Focal length tolerance: ±5%. Calibration accuracy: <0.5% error.
    2. **Calculations:**
       - Worst-case scaling variance: +5% original lens vs -5% replacement lens = ~10-15% perceived size shift.
       - Speed error is proportional to the miscalibrated pixel-to-meter ratio.
    3. **Conclusion & Interpretation:**
       - **Result: Missing Intrinsic Calibration.** The system lacks the unique intrinsic parameters matrix for the new lens, warping all physical measurements.
