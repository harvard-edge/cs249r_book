title: Specifying Hardware Accelerated CV Pipelines on Edge
scenario: A multi-camera perception system on an AGX Orin reads four 1080p 30FPS streams. The developer applies a CPU-based OpenCV resize to each frame before passing it to the GPU, causing CPU pegging.
question: How would you specify a hardware-accelerated pipeline path to eliminate the CPU bottleneck for this workload?
details:
  realistic_solution: 'The developer should use the Jetson''s hardware NVDEC for decoding and the VIC (Video Image Compositor) or CUDA for resizing directly in GPU memory. Avoiding CPU-based resizing eliminates the heavy host-to-device memory copies, dramatically reducing CPU load.'
  common_mistake: |
    **The Pitfall:** Multi-threading the CPU OpenCV code.
    **The Rationale:** Candidates attempt to solve CPU bottlenecking with traditional software parallelism.
    **The Consequence:** Memory bandwidth remains saturated due to unnecessary host-to-device copies, keeping the system crippled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 1920 x 1080 pixels.
    - Pixel Format: RGB (3 bytes/pixel).
    - Frame Rate: 30 FPS.
    - Cameras: 4 streams.

    **Calculations:**
    - Frame Size: 1920 * 1080 * 3 bytes = 6.22 MB.
    - Single Stream Throughput: 6.22 MB * 30 FPS = 186.6 MB/s.
    - Total Throughput: 4 * 186.6 MB/s = 746.4 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound.** 746.4 MB/s of data is copied unnecessarily across memory buses due to CPU processing. This bottleneck is eliminated entirely by using a hardware-accelerated VIC pipeline.
