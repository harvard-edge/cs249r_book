title: Edge Split-Compute Framing
scenario: Two Jetson AGX Orins are connected via a dedicated 10 Gbps Ethernet link,
  cooperating to run a split-compute vision transformer.
question: Given intermediate activation sizes of 5 MB per frame, compute the theoretical
  maximum FPS limited strictly by the interconnect bandwidth.
visual:
  kind: svg
  path: edge-2275.svg
  alt: Two Jetson node blocks connected by a single bidirectional edge representing
    the 10 Gbps interconnect.
  caption: Split-Compute Edge Topology
details:
  realistic_solution: A 10 Gbps link equates to roughly 1.25 GB/s, or 1250 MB/s theoretical
    maximum bandwidth. Transferring 5 MB per frame means the interconnect can sustain
    at most 1250 MB/s / 5 MB/frame = 250 FPS.
  common_mistake: Failing to convert gigabits to gigabytes, calculating 10,000 MB
    / 5 MB = 2000 FPS.
  napkin_math: 1250 MB/s / 5 MB = 250 FPS
