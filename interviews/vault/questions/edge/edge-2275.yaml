title: Edge Split-Compute Framing
scenario: Two Jetson AGX Orins are connected via a dedicated 10 Gbps Ethernet link,
  cooperating to run a split-compute vision transformer. Activation sizes are not
  uniform - 70% of frames produce 5 MB activations, 30% produce 12 MB activations
  due to dynamic-token-pruning that depends on scene content - and TCP/IP framing
  adds ~6% overhead per transfer.
question: Compute the expected sustainable FPS given the variable activation sizes
  and TCP/IP overhead, and quantify how much the worst-case (12 MB) frames degrade
  P99 frame time relative to the average.
visual:
  kind: svg
  path: edge-2275.svg
  alt: Two Jetson node blocks connected by a single bidirectional edge representing
    the 10 Gbps interconnect.
  caption: Split-Compute Edge Topology
details:
  realistic_solution: 'Effective bandwidth after 6% TCP/IP overhead: 1250 * 0.94 =
    1175 MB/s. Average activation per frame = 0.7*5 + 0.3*12 = 7.1 MB. Sustainable
    FPS = 1175 / 7.1 ~= 165 FPS. P99 frame transfer is gated by 12 MB frames: 12
    / 1175 = 10.2 ms (98 FPS-equivalent), versus average 7.1 / 1175 = 6.0 ms - tail
    is 1.7x worst, so any pipeline budget must size for the 12 MB case.'
  common_mistake: Using only the 5 MB activation size and ignoring the 30% larger
    frames, or forgetting TCP/IP framing tax - both lead to overestimating FPS.
  napkin_math: 'Effective BW = 10000/8 * 0.94 = 1175 MB/s; avg frame = 0.7*5 + 0.3*12
    = 7.1 MB; FPS ~= 165; P99 frame = 12/1175 = 10.2 ms.'
