title: Edge Split-Compute Framing
scenario: >-
  Two Jetson AGX Orins are connected via a dedicated 10 Gbps Ethernet link, cooperating to run a split-compute vision transformer. Activation sizes are not uniform - 70% of frames produce 5 MB activations, 30% produce 12 MB activations due to dynamic-token-pruning that depends on scene content. TCP/IP framing adds ~6% overhead per transfer.
question: Compute the expected sustainable FPS given the variable activation sizes and TCP/IP overhead, and quantify how much the worst-case (12 MB) frames degrade P99 frame time relative to the average.
visual:
  kind: svg
  path: edge-2275.svg
  alt: Two Jetson node blocks connected by a single bidirectional edge representing
    the 10 Gbps interconnect.
  caption: Split-Compute Edge Topology
details:
  realistic_solution: 'Calculate effective bandwidth after TCP overhead. Determine the weighted average activation size to find sustainable average FPS. Then, calculate the transfer latency for the specific 12 MB worst-case frame to accurately define the P99 latency bound.'
  common_mistake: |
    **The Pitfall:** Overlooking TCP framing overhead and workload variance.
    **The Rationale:** Candidates often use peak theoretical link bandwidths and model the "happy path" 5 MB activations as the constant state.
    **The Consequence:** This severely overestimates achievable throughput and results in a brittle pipeline budget that will violently miss deadlines whenever a 12 MB frame is generated.
  napkin_math: |
    1. **Link Bandwidth:** `10 Gbps = 1250 MB/s`.
    2. **Effective BW:** After 6% TCP/IP tax = `1250 * 0.94 = 1175 MB/s`.
    3. **Average Frame:** `(0.7 * 5 MB) + (0.3 * 12 MB) = 3.5 + 3.6 = 7.1 MB`.
    4. **Sustainable FPS:** `1175 MB/s / 7.1 MB = ~165 FPS`.
    5. **Average Latency:** `7.1 MB / 1175 MB/s = 6.0 ms`.
    6. **P99 Latency (12 MB):** `12 MB / 1175 MB/s = 10.2 ms`.
    7. **Result:** The worst-case frame time is **1.7x longer** (10.2ms vs 6.0ms), dictating that any pipeline budget must be sized for the 12 MB tail latency.
