title: The Edge Roofline Dilemma
scenario: You're an engineer on an autonomous robotics team deploying a new perception model to a Jetson
  AGX Orin. The model requires 50 Giga-Operations (G-Ops) and moves 400 MB of data (weights, activations,
  IO) for each inference. Using the hardware specs provided, calculate the model's Arithmetic Intensity
  and explain whether it is compute-bound or memory-bound on this platform.
details:
  realistic_solution: The model is memory-bound. To determine this, we compare the model's Arithmetic
    Intensity (AI) to the hardware's Ridge Point. The Ridge Point is the AI needed to saturate the compute
    units. If the model's AI is lower than the Ridge Point, the memory system cannot supply data fast
    enough, and the model is memory-bound.
  common_mistake: Confusing the terms or the formula. Engineers often think 'more operations' automatically
    means 'compute-bound' without considering the *ratio* of compute to memory access. A second common
    error is inverting the Arithmetic Intensity formula to be Bytes/Op instead of Ops/Byte, leading to
    an incorrect interpretation.
  napkin_math: Model Arithmetic Intensity (AI) = 50 G-ops / 400 MB = 50e9 / 400e6 = 125 Ops/Byte. Orin
    Ridge Point = Peak Compute / Peak Bandwidth = 275e12 Ops/sec / 204.8e9 Bytes/sec = 1342.7 Ops/Byte.
    Since 125 Ops/Byte << 1342.7 Ops/Byte, the model requires data much faster than the memory can provide
    it relative to compute speed. The model is severely memory-bound.
  options:
  - Compute-bound, because 50 G-Ops is a large number of operations.
  - Compute-bound, because its Arithmetic Intensity (~125 Ops/Byte) is less than the Orin's Ridge Point
    (~1342 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity (~125 Ops/Byte) is less than the Orin's Ridge Point
    (~1342 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity is ~8 Bytes/Op.
  correct_index: 2
