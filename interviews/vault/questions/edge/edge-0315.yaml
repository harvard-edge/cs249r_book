title: The Edge Roofline Dilemma
scenario: You're an engineer on an autonomous robotics team deploying a new perception model to a Jetson AGX Orin. The model requires 50 Giga-Operations (G-Ops) and moves 400 MB of data (weights, activations, IO) for each inference.
question: For a 50 G-Op inference that moves 400 MB on a Jetson AGX Orin, what is the arithmetic intensity and is it compute- or memory-bound?
details:
  realistic_solution: The model is memory-bound. To determine this, we compare the model's Arithmetic Intensity (AI) to the hardware's Ridge Point. The Ridge Point is the AI needed to saturate the compute units. If the model's AI is lower than the Ridge Point, the memory system cannot supply data fast enough, and the model is memory-bound.
  common_mistake: |
    **The Pitfall:** Confusing operations scale with arithmetic intensity.
    **The Rationale:** Engineers often think 'more operations' automatically means 'compute-bound' without considering the ratio of compute to memory access, or they invert the formula to Bytes/Op.
    **The Consequence:** Misidentifying the bottleneck and applying the wrong optimization techniques.
  napkin_math: |
    1. **Model Arithmetic Intensity (AI):** 50 G-ops / 400 MB = 50e9 / 400e6 = 125 Ops/Byte.
    2. **Orin Ridge Point:** Peak Compute / Peak Bandwidth = 275e12 Ops/sec / 204.8e9 Bytes/sec = 1342.7 Ops/Byte.
    3. **Comparison:** 125 Ops/Byte << 1342.7 Ops/Byte.
    **Result: The model is severely memory-bound.**
  options:
  - Compute-bound, because 50 G-Ops is a large number of operations.
  - Compute-bound, because its Arithmetic Intensity (~125 Ops/Byte) is less than the Orin's Ridge Point (~1342 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity (~125 Ops/Byte) is less than the Orin's Ridge Point (~1342 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity is ~8 Bytes/Op.
  correct_index: 2
