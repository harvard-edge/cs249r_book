title: The Model IP Leak
scenario: Your company has developed a highly valuable, proprietary ML model that provides a significant competitive advantage. You need to deploy this model to thousands of edge devices in potentially untrusted environments. Competitors are actively trying to extract or tamper with your model weights and architecture.
question: How do you protect the model's intellectual property and ensure its integrity against reverse engineering or malicious modification on the edge device itself?
details:
  realistic_solution: Establish a hardware-backed chain of trust. Encrypt the model weights at rest. Leverage a Trusted Execution Environment (TEE, like ARM TrustZone) with secure boot to load and decrypt the model only within isolated enclave memory. Utilize hardware Root of Trust (HRoT) capabilities to bind the model execution strictly to the target silicon, preventing unauthorized offline extraction.
  common_mistake: |
    **The Pitfall:** Relying solely on obfuscation or network-level security (e.g., encrypted communication to a cloud API).
    **The Rationale:** Candidates often focus on securing data in transit but forget about data at rest and in use on the physical device.
    **The Consequence:** Obfuscation can be reversed, and network security doesn't protect the model once it's on the device and potentially running in plain text in memory, allowing easy extraction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 25 MB INT8
       - Hardware AES-256 decrypt bandwidth: 2 GB/s
       - TEE execution overhead: ~5%
       - Base inference latency: 15 ms
    2. **Calculations:**
       - Decrypt latency (at boot): 25 MB / 2,000 MB/s = 12.5 ms
       - Protected inference latency: 15 ms * 1.05 = 15.75 ms
       - Overhead per frame: 15.75 ms - 15 ms = 0.75 ms
    3. **Conclusion & Interpretation:**
       - **Result: TEE Security.** Encrypted weights and TEE execution add < 1 ms per frame overhead while strongly protecting IP.
