title: The Model IP Leak
scenario: Your company has developed a highly valuable, proprietary ML model that provides a significant competitive advantage. You need to deploy this model to thousands of edge devices in potentially untrusted environments. Competitors are actively trying to extract or tamper with your model weights and architecture.
question: How do you protect the model's intellectual property and ensure its integrity against reverse engineering or malicious modification on the edge device itself?
details:
  realistic_solution: "A multi-layered hardware-software security approach is required:\n1. **Hardware Root of Trust (HRoT) & Secure Boot:** Ensure that only trusted software can execute on the device.\n2. **Trusted Execution Environments (TEEs):** Utilize TEEs like ARM TrustZone. The ML model runs within this isolated environment.\n3. **Model Encryption:** Encrypt the model weights at rest. Decryption keys stay within the TEE.\n4. **Secure Provisioning:** Implement secure OTA update mechanisms.\n5. **Memory Protection Units (MPUs/MMUs):** Configure memory access controls.\n6. **Watermarking/Fingerprinting:** Embed subtle watermarks into the model weights."
  common_mistake: |
    **The Pitfall:** Relying solely on obfuscation or network-level security (e.g., encrypted communication to a cloud API).
    **The Rationale:** Candidates often focus on securing data in transit but forget about data at rest and in use on the physical device.
    **The Consequence:** Obfuscation can be reversed, and network security doesn't protect the model once it's on the device and potentially running in plain text in memory, allowing easy extraction.
  napkin_math: |
    1. Model size: 25 MB INT8 on Orin.
    2. AES-256 HW decrypt time: 25 MB / 2 GB/s = 12.5 ms (one-time at boot).
    3. TEE execution overhead: ~5% (inference goes from 15 ms to 15.75 ms).
    4. Security cost: ~$5/device * 5,000 devices = $25,000.
    5. Model training cost: $2,000,000.
    6. Security investment: $25,000 / $2,000,000 = 1.25%.
    7. Conclusion: TEE + encrypted weights adds **<1 ms/frame latency** and costs **1.25% of the asset value**.
