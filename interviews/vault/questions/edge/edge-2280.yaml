title: Edge Gateway Latency Bounds
scenario: An edge gateway receives unpredictable bursty requests from IoT sensors.
  Service time per request is strictly deterministic at 20ms. The system must maintain
  an average wait time strictly below 40ms.
question: Calculate the maximum allowable processor utilization (rho) that ensures
  the average wait time remains at or below the 40ms constraint.
visual:
  kind: svg
  path: edge-2280.svg
  alt: A plot depicting wait time against utilization, highlighting the intersection
    at 80% utilization for the 40ms limit.
  caption: Wait Time Constraint Surface
details:
  realistic_solution: Using the M/D/1 expected wait time formula Wq = (rho * D) /
    (2 * (1 - rho)), we plug in Wq = 40ms and D = 20ms. This yields 40 = (rho * 20)
    / (2 - 2*rho). Solving for rho gives 80 - 80*rho = 20*rho, meaning 100*rho = 80,
    so rho = 0.8. The system can handle up to 80% utilization.
  common_mistake: Solving the equation for an M/M/1 queue instead, which would result
    in a highly pessimistic maximum utilization of 66%.
  napkin_math: 40 = (rho * 20)/(2 - 2*rho) -> rho = 0.8
