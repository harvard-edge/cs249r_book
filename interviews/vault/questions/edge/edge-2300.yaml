title: PIR-Triggered Accelerator Power States
scenario: A Hailo-8 accelerator is deployed for perimeter security, performing object
  detection only when a Passive Infrared (PIR) motion sensor triggers.
question: State the specific power mode the system and accelerator should maintain
  prior to the PIR trigger to maximize battery life.
visual:
  kind: svg
  path: edge-2300.svg
  alt: Timeline showing near-zero sleep power, a PIR trigger event, and an active
    compute spike.
  caption: Event-Driven Power Profile
details:
  realistic_solution: The host system should be in a Deep Sleep or Suspend-to-RAM
    state, and the Hailo-8 must be completely powered down or in its lowest retention
    sleep mode (drawing single-digit milliwatts). The PIR sensor runs independently
    on a microwatt circuit and fires an external GPIO interrupt to wake the host,
    which then powers up the Hailo-8.
  common_mistake: Leaving the accelerator in an idle but active state (drawing ~1W),
    completely draining edge batteries.
  napkin_math: PIR power (~uW) << Idle NPU power (~W)
