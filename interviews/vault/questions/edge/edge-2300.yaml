title: PIR-Triggered Accelerator Power States
scenario: A Hailo-8 accelerator is deployed for perimeter security, performing object detection only when a Passive Infrared (PIR) motion sensor triggers.
question: State the specific power mode the system and accelerator should maintain prior to the PIR trigger to maximize battery life.
visual:
  kind: svg
  path: edge-2300.svg
  alt: Timeline showing near-zero sleep power, a PIR trigger event, and an active compute spike.
  caption: Event-Driven Power Profile
details:
  realistic_solution: Implement an event-driven hardware interrupt architecture. The host CPU and Hailo-8 accelerator must be placed in a deep sleep or power-gated retention state (drawing single-digit milliwatts). The independent, microwatt-level PIR sensor triggers a physical GPIO wake interrupt to the host, which then powers up the inference accelerator, preventing the massive parasitic drain of active idle states.
  common_mistake: |
    **The Pitfall:** Leaving the accelerator in an active idle state.
    **The Rationale:** Candidates assume the accelerator should stay ready to minimize latency when an event occurs.
    **The Consequence:** The device draws ~1W continuously in active idle, completely draining the edge batteries within days.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PIR sensor power: ~10-50 µW.
       - NPU Active Idle power: ~1 W.
       - NPU Sleep/Retention power: ~0.001 W (1 mW).
    2. **Calculations:**
       - Power ratio (Idle vs PIR): 1 W / 10 µW = 100,000x.
       - Standby energy savings: (1 W - 0.00001 W) / 1 W = 99.999%.
    3. **Conclusion & Interpretation:**
       - **Result: 100,000x power reduction.** Hardware-triggered event-driven architecture allows the accelerator to power gate completely, dramatically extending battery life compared to polling.
