title: PIR-Triggered Accelerator Power States
scenario: A Hailo-8 accelerator is deployed for perimeter security, performing object detection only when a Passive Infrared (PIR) motion sensor triggers.
question: State the specific power mode the system and accelerator should maintain prior to the PIR trigger to maximize battery life.
visual:
  kind: svg
  path: edge-2300.svg
  alt: Timeline showing near-zero sleep power, a PIR trigger event, and an active compute spike.
  caption: Event-Driven Power Profile
details:
  realistic_solution: The host system should be in a Deep Sleep or Suspend-to-RAM state, and the Hailo-8 must be completely powered down or in its lowest retention sleep mode (drawing single-digit milliwatts). The PIR sensor runs independently on a microwatt circuit and fires an external GPIO interrupt to wake the host, which then powers up the Hailo-8.
  common_mistake: |
    **The Pitfall:** Leaving the accelerator in an active idle state.
    **The Rationale:** Candidates assume the accelerator should stay ready to minimize latency when an event occurs.
    **The Consequence:** The device draws ~1W continuously in active idle, completely draining the edge batteries within days.
  napkin_math: |
    1. PIR power consumption is in the microwatt range (~10-50 µW).
    2. Idle NPU power consumption is in the watt range (~1 W).
    3. **1 W / 10 µW = 100,000x difference. Relying on PIR sleep saves 99.999% of standby energy.**
