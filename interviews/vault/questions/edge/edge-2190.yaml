title: FlatBuffers vs Protobuf for Edge Model Serving
scenario: Your Jetson Orin edge device loads a TFLite model that's serialized as a FlatBuffer. A colleague suggests switching to Protocol Buffers for better ecosystem compatibility.
question: Why did TFLite choose FlatBuffers, and what performance property would you lose by switching to Protobuf?
details:
  realistic_solution: FlatBuffers enables zero-copy `mmap()` memory access. Protobuf demands deep serialization copies and instantiation of heap objects, bloating runtime VRAM and causing massive page faults on load.
  common_mistake: |
    **The Pitfall:** Assuming the format choice is about serialization speed or file size on disk.
    **The Rationale:** Candidates forget that Protobuf requires full deserialization (allocating objects, copying strings) whereas FlatBuffers supports zero-copy access via mmap().
    **The Consequence:** Wasting critical edge device memory by unnecessarily holding two copies of the model in RAM (the file and the deserialized objects).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 50MB
       - FlatBuffer uses zero-copy mmap
       - Protobuf requires object instantiation
    2. **Calculations:**
       - FlatBuffer RAM = 50MB mapped
       - Protobuf RAM = 50MB map + 80MB instantiated objects = 130MB
    3. **Conclusion & Interpretation:**
       - **Result: Protobuf introduces 2.6x memory bloat.**
