title: FlatBuffers vs Protobuf for Edge Model Serving
scenario: Your Jetson Orin edge device (32 GB LPDDR5) loads a TFLite model (50 MB) that's serialized as a FlatBuffer. A colleague suggests switching to Protocol Buffers for better ecosystem compatibility.
question: Why did TFLite choose FlatBuffers, and what performance property would you lose by switching to Protobuf?
details:
  realistic_solution: 'FlatBuffers supports zero-copy access — the serialized bytes ARE the in-memory representation. You mmap() the file and directly read fields via pointer arithmetic without any parsing or memory allocation. Protobuf requires full deserialization: allocating objects, copying strings, building vtables. For a 50 MB model: FlatBuffer load time = mmap() syscall (~0.1ms) + first-access page faults (lazy). Protobuf deserialization: parse 50 MB of wire format, allocate ~80 MB of runtime objects (Protobuf''s in-memory representation is larger due to object headers and pointers), copy all data. This takes 200-500ms and doubles memory usage temporarily. On edge devices with tight memory budgets, the zero-copy property is critical — you never need 2× the model size in memory.'
  common_mistake: |
    **The Pitfall:** Assuming the format choice is about serialization speed or file size on disk.
    **The Rationale:** Candidates forget that Protobuf requires full deserialization (allocating objects, copying strings) whereas FlatBuffers supports zero-copy access via mmap().
    **The Consequence:** Wasting critical edge device memory by unnecessarily holding two copies of the model in RAM (the file and the deserialized objects).
  napkin_math: |
    - **FlatBuffer load:** mmap 50 MB = 0.1ms. Peak memory = 50 MB (mapped, shared with page cache).
    - **Protobuf load:** parse + allocate = 300ms. Peak memory = 50 MB (file) + 80 MB (deserialized objects) = 130 MB.
    - **Impact at scale:** 10 concurrent models = 500 MB (FlatBuffer) vs 1.3 GB (Protobuf).
    - **Conclusion:** Protobuf introduces **2.6x memory overhead** for zero serving benefit.
