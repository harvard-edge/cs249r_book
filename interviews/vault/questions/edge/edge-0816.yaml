title: The Edge Inference Offload Decision
scenario: An edge camera with a Jetson Orin runs a detection model locally in 15ms. Alternatively, it can offload inference to a nearby edge server over a 1 Gbps wired link (0.5ms RTT) — the server runs the same model in 3ms. Each input frame is 500 KB and the response is 1 KB.
question: What are the local versus offloaded end-to-end latencies, and below what bandwidth does offloading become slower than 15 ms local inference?
details:
  realistic_solution: 'Local: 15ms total. Offload at 1 Gbps: transfer = 500 KB / (1 Gbps/8) = 500/125,000 KB/s... more precisely, 500 KB × 8 / 1,000,000 kbps = 4ms transfer. Plus 0.5ms RTT + 3ms inference + ~0ms response transfer = 7.5ms. Offload wins (7.5ms < 15ms). Break-even: need transfer + 0.5 + 3 ≤ 15, so transfer ≤ 11.5ms. 500 KB / 11.5ms = 43.5 KB/ms = 43,500 KB/s = 348 Mbps. Below ~348 Mbps, local inference wins.'
  common_mistake: |
    **The Pitfall:** Ignoring the data transfer time and focusing only on the server's raw inference speedup.
    **The Rationale:** Candidates forget that the 500 KB frame must be transmitted over the network, which can dominate the latency equation at lower bandwidths.
    **The Consequence:** Designing an offload architecture that is actually slower end-to-end than local edge inference.
  napkin_math: |
    - **Local latency:** 15ms.
    - **Offload latency (1 Gbps):** 500 KB / (125 MB/s) = 4ms transfer.
    - **Total Offload:** 4ms (transfer) + 0.5ms (RTT) + 3ms (inference) = 7.5ms.
    - **Break-even:** Transfer must be <= 15ms - 3ms - 0.5ms = 11.5ms.
    - **Minimum bandwidth:** 500 KB / 11.5ms = 43.48 KB/ms = 43,478 KB/s = **~348 Mbps**.
