title: The Edge Inference Offload Decision
scenario: An edge camera with a Jetson Orin runs a detection model locally in 15ms. Alternatively, it
  can offload inference to a nearby edge server over a 1 Gbps wired link (0.5ms RTT) — the server runs
  the same model in 3ms. Each input frame is 500 KB and the response is 1 KB. Calculate end-to-end latency
  for both paths. At what network bandwidth does offloading become slower than local inference?
question: "What are the local versus offloaded end-to-end latencies, and below what bandwidth does offloading become slower than 15 ms local inference?"
details:
  realistic_solution: 'Local: 15ms total. Offload at 1 Gbps: transfer = 500 KB / (1 Gbps/8) = 500/125,000
    KB/s... more precisely, 500 KB × 8 / 1,000,000 kbps = 4ms transfer. Plus 0.5ms RTT + 3ms inference
    + ~0ms response transfer = 7.5ms. Offload wins (7.5ms < 15ms). Break-even: need transfer + 0.5 + 3
    ≤ 15, so transfer ≤ 11.5ms. 500 KB / 11.5ms = 43.5 KB/ms = 43,500 KB/s = 348 Mbps. Below ~348 Mbps,
    local inference wins.'
  common_mistake: Ignoring data transfer time. The raw inference speedup from the server is 5×, but the
    network transfer of the 500 KB frame can dominate at lower bandwidths.
  napkin_math: 'Local: 15ms. Offload at 1 Gbps: 500KB/(125 MB/s) = 4ms transfer + 0.5ms RTT + 3ms inference
    = 7.5ms. Speedup: 15/7.5 = 2×. Break-even: transfer ≤ 15 - 3 - 0.5 = 11.5ms. Min BW = 500KB/11.5ms
    = 43.5 KB/ms = 348 Mbps.'
