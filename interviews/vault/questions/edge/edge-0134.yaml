title: Worst-Case vs. Average-Case
scenario: 'A traffic light control system uses an edge model to detect emergency vehicles. The system has a hard real-time requirement to react within 33ms (a 30 FPS SLA). Profiling shows your model''s average inference time is 28ms, but its P99 (worst-case) latency is 45ms.'
question: 'Does this system satisfy the real-time requirement?'
details:
  realistic_solution: 'No. For a hard real-time system, worst-case execution time strictly governs compliance. A P99 latency of 45ms violates the 33ms budget, guaranteeing system failure in critical moments.'
  common_mistake: |
    **The Pitfall:** Focusing on average-case latency instead of worst-case execution time.
    **The Rationale:** In typical web services, average latency or P95 is the standard metric. Engineers incorrectly apply this web intuition to hard real-time physical systems.
    **The Consequence:** An average time that meets the budget is irrelevant if the system unpredictably misses its deadline, causing catastrophic safety-critical failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame Deadline = 33 ms.
       - Worst-Case Latency (P99) = 45 ms.
    2. **Calculations:**
       - Compare P99 latency against the hard real-time deadline.
       - 45 ms > 33 ms.
    3. **Conclusion & Interpretation:**
       - **The 45 ms P99 latency strictly exceeds the 33 ms deadline, failing the requirement.** (Result: Latency-Bound)
  options:
  - 'Yes, because the average latency (28ms) is well below the 33ms deadline.'
  - 'No, because the worst-case latency (45ms) exceeds the 33ms deadline.'
  - 'Yes, because the Jetson AGX Orin has over 200 TOPS, which is sufficient.'
  - 'It''s impossible to say without knowing the P99.9 latency.'
  correct_index: 1
