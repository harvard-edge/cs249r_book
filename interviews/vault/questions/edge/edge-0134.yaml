title: Worst-Case vs. Average-Case
scenario: A new traffic light control system uses a model on a Jetson AGX Orin to detect emergency vehicles. The system has a hard real-time requirement to react within 33ms (a 30 FPS SLA). Profiling shows your model's *average* inference time is 28ms, but its P99 (worst-case) latency is 45ms.
question: Does this system satisfy the real-time requirement?
details:
  realistic_solution: No, the system does not meet the requirement. For a hard real-time system, the worst-case latency must be less than or equal to the deadline. Here, the P99 latency of 45ms is greater than the 33ms budget, meaning the system will fail to react in time in at least 1% of cases, which is unacceptable.
  common_mistake: |
    **The Pitfall:** Focusing on average-case latency instead of worst-case execution time.
    **The Rationale:** In typical web services, average latency or P95 is the standard metric. Engineers incorrectly apply this to hard real-time systems.
    **The Consequence:** An average time that meets the budget is irrelevant if the system unpredictably misses its deadline, potentially causing safety-critical failures.
  napkin_math: |
    * Worst-Case Latency = 45 ms.
    * Frame Deadline = 33 ms.
    * **45 ms > 33 ms → Requirement NOT Met.**
  options:
  - Yes, because the average latency (28ms) is well below the 33ms deadline.
  - No, because the worst-case latency (45ms) exceeds the 33ms deadline.
  - Yes, because the Jetson AGX Orin has over 200 TOPS, which is sufficient.
  - It's impossible to say without knowing the P99.9 latency.
  correct_index: 1
