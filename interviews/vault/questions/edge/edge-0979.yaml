title: Autonomous Vehicle Edge Data Pruning Pipeline
scenario: 'An autonomous test vehicle generates 5 GB/s of raw sensor data. The on-board storage is a single 16 TB NVMe drive that must capture an entire 8-hour driving shift. An Apple A17 Pro Neural Engine (35 TOPS) runs an INT8 heuristic to classify and drop redundant frames.'
question: 'What is the required data drop rate (selectivity) the A17 model must achieve to prevent the SSD from overflowing during the 8-hour shift?'
visual:
  kind: svg
  path: edge-0979.svg
  alt: A stepped bar chart showing data volume decreasing massively from 144 TB Raw Sensor Data down to 16 TB Saved Data after passing through the A17 Neural Engine filter.
  caption: Data Volume Reduction Pipeline
details:
  realistic_solution: 'The raw data generated over an 8-hour shift is 5 GB/s * 3600 s/hr * 8 hr = 144,000 GB (144 TB). Because the storage capacity is only 16 TB, the pipeline must filter out the vast majority of the data. The design should utilize an in-memory ring buffer where the A17 rapidly scores frames for novelty. To fit 144 TB into 16 TB, the pipeline must discard 128 TB, requiring the model to drop at least 88.9% of the incoming data.'
  common_mistake: |
    **The Pitfall:** Proposing a pipeline that writes everything to disk first before pruning.
    **The Rationale:** Standard offline data processing paradigms often ingest first and filter later.
    **The Consequence:** Writing 5 GB/s directly to the NVMe will instantly saturate the write bandwidth and quickly destroy the drive's TBW endurance.
  napkin_math: |
    * Raw data generated: 5 GB/s * 3600 s/hr * 8 hr = 144,000 GB = 144 TB.
    * Storage capacity: 16 TB.
    * Data to discard: 144 TB - 16 TB = 128 TB.
    * Required drop rate: 128 TB / 144 TB = 0.8888.
    * **The model must drop at least 88.9% of incoming data in memory.**
