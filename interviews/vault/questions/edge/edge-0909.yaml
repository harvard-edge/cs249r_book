title: Multi-Camera NPU PCIe Bottleneck
scenario: A retail edge server processes 16 concurrent 1080p video streams at 30fps. The system uses a host CPU connected to an edge NPU via PCIe Gen3 x4. Inference latency spikes to 200ms when all streams are active, despite the NPU reporting only 40% compute utilization. Memory profiling shows 99% PCIe bus saturation.
question: Why does latency spike despite 40% NPU utilization, and how would you redesign the video pipeline?
details:
  realistic_solution: The system is bottlenecked by the PCIe memory hierarchy. You must redesign the architecture to use Zero-Copy and edge-native decoding. Pass the compressed H.264/H.265 streams directly to the NPU's hardware video decoder to bypass the uncompressed frame transfer.
  common_mistake: |
    **The Pitfall:** Upgrading to a faster NPU or reducing the batch size to lower latency.
    **The Rationale:** Ignoring the I/O bottleneck and assuming the issue is compute-bound.
    **The Consequence:** Wasting budget on hardware upgrades without resolving the actual PCIe saturation issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16 streams, 1080p (1920x1080), 3 channels, 30fps.
       - PCIe Gen3 x4 real-world bandwidth: ~3.2 GB/s.
    2. **Calculations:**
       - Uncompressed data rate = 16 * 1920 * 1080 * 3 * 30 = 2,985,984,000 bytes/s (~2.98 GB/s).
       - PCIe Utilization = 2.98 GB/s / 3.2 GB/s = 93%.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound. Transmitting uncompressed frames consumes 93% of the bus, causing massive queueing delays and latency spikes.**
