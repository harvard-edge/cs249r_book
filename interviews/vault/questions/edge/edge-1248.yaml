title: Jetson Orin Roofline Bottleneck Analysis
scenario: You are deploying a vision transformer on an edge accelerator. The device has 32 GB LPDDR5 providing 204 GB/s of memory bandwidth, delivers 275 TOPS INT8, and has a 60W TDP. The model requires 100 Giga-Operations (GOPS) per inference and loads 0.5 GB of weights (INT8) per pass with batch size 1. You observe that the system is only achieving about 40.8 TOPS and power draw is well below the 60W limit.
question: Using the roofline model, explain why the accelerator achieves only about 40.8 TOPS for batch-1 ViT inference despite a 275 TOPS peak.
details:
  realistic_solution: 'The system is heavily memory-bound. Calculate the arithmetic intensity by comparing operations per inference to the memory access required. Because the arithmetic intensity is much lower than the ridge point of the roofline, the theoretical peak compute cannot be reached. The solution requires increasing arithmetic intensity, typically by increasing batch size or implementing weight-stationary caching.'
  common_mistake: |
    **The Pitfall:** Assuming the model is compute-bound because transformers are computationally heavy.
    **The Rationale:** Ignoring the fundamentally low arithmetic intensity of batch-1 inference.
    **The Consequence:** Suggesting optimizations to compute kernels or increasing the power limit, wasting engineering time without moving the memory bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Bandwidth: 204 GB/s.
       - Hardware Peak Compute: 275 TOPS (275,000 GOPS).
       - Model Compute: 100 GOPS.
       - Model Traffic: 0.5 GB per pass.
    2. **Calculations:**
       - Hardware Ridge Point: 275,000 GOPS / 204 GB/s = 1348 OPS/Byte.
       - Model Arithmetic Intensity: 100 GOPS / 0.5 GB = 200 OPS/Byte.
       - Max Achievable Throughput: 200 OPS/Byte * 204 GB/s = 40,800 GOPS = 40.8 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound**. The 40.8 TOPS calculation mathematically proves the compute cores are starved for data, showing only ~15% utilization of the peak compute capability.
