title: Architecting Extreme Quantization for Hailo-8 Streams
scenario: You are tasked with deploying a real-time vision transformer onto a Hailo-8 dataflow accelerator,
  which features 26 TOPS of INT8 compute at just 2.5W. Crucially, the Hailo-8 lacks local DRAM and must
  stream all weights and activations directly from host memory. The baseline model's INT8 streaming requirements
  exceed the available host memory bandwidth for the target frame rate. You need to design a system that
  employs sub-4-bit extreme quantization to compress the model in host memory while efficiently executing
  on the Hailo-8's INT8 datapath.
question: "How would you store sub-4-bit weights and execute on Hailo-8's INT8 datapath to relieve host-memory bandwidth?"
details:
  realistic_solution: The correct design stores weights in 4-bit precision in host memory using techniques
    like AWQ to preserve accuracy and minimize memory footprint. As weights are streamed to the Hailo-8,
    they are dynamically unpacked into INT8 registers for computation. This architecture leverages the
    abundant INT8 compute (26 TOPS) to alleviate the scarce host streaming bandwidth, maximizing the efficiency
    of the dataflow accelerator.
  common_mistake: Candidates often suggest standard INT8 quantization without realizing it fails to solve
    the host memory streaming bottleneck, or they propose 4-bit execution without recognizing that the
    Hailo-8 ALU natively expects INT8, requiring a specialized packing and unpacking architecture.
  napkin_math: For a 25M parameter model running at 60 FPS, standard INT8 streaming requires 25MB * 60
    = 1.5 GB/s of host bandwidth. Applying 4-bit extreme quantization halves the size, reducing the required
    streaming bandwidth to 750 MB/s. The model needs roughly 5 GOPS per frame, so 60 FPS consumes 300
    GOPS (0.3 TOPS). With 26 TOPS available on the Hailo-8 at 2.5W, 25.7 TOPS remain available, easily
    absorbing the minor overhead of unpacking 4-bit weights into INT8 formats.
