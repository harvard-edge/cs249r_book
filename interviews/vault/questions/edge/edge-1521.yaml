title: Diagnosing Hotspots in Edge Consistent Hashing
scenario: You have an edge cluster of three compute modules processing factory video streams, utilizing consistent hashing based on camera IDs for request routing. You observe that one specific node frequently suffers from severe thermal throttling and out-of-memory errors, while the other two nodes remain well under their capacity.
question: Why does one node throttle and OOM while all three nodes receive the same number of camera streams?
details:
  realistic_solution: The root cause is a 'hot key' issue inherent to static consistent hashing when stream complexities are heterogeneous. High-resolution streams demand significantly more GPU cycles and a larger memory footprint. When routed to the same node, they saturate the memory and cause the chip to hit its TDP limit, triggering thermal throttling and OOM cascades. Implement an active load-aware routing layer that breaks the static hashing for heavy streams.
  common_mistake: |
    **The Pitfall:** Blaming faulty hardware or suggesting a switch to basic round-robin routing.
    **The Rationale:** Ignoring the fact that static consistent hashing creates "hot keys" when payload complexities are highly heterogeneous.
    **The Consequence:** The problem persists or moves to a different node, failing to address the fundamental load imbalance caused by heavy video streams.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 24 GB available RAM for inference per node.
       - Standard Stream: 2 GB, 15 TOPS. Heavy Stream: 8 GB, 65 TOPS.
       - Consistent hashing assigns 4 heavy streams to Node 1.
    2. **Calculations:**
       - Memory Demand (Node 1): 4 * 8 GB = 32 GB (exceeds 24 GB → OOM).
       - Compute Demand (Node 1): 4 * 65 TOPS = 260 TOPS (near limit → thermal throttle).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Hotspot.** A static hot key causes one node to exceed both memory and TDP limits simultaneously, necessitating dynamic load-aware routing.
