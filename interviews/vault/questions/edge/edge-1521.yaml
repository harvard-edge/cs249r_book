title: Diagnosing Hotspots in Edge Consistent Hashing
scenario: You have an edge cluster of three NVIDIA Jetson Orin modules processing factory video streams, utilizing consistent hashing based on camera IDs for request routing. You observe that one specific Jetson Orin node frequently suffers from severe thermal throttling and out-of-memory errors, while the other two nodes remain well under their 275 TOPS INT8 compute capacity.
question: Why does one Jetson Orin throttle and OOM while all three nodes receive the same number of camera streams?
details:
  realistic_solution: The root cause is a 'hot key' issue inherent to static consistent hashing when stream complexities are heterogeneous. Certain high-resolution streams demand significantly more Ampere GPU and DLA cycles as well as a larger memory footprint. When routed to the same node, they saturate the memory and cause the chip to hit its 60W TDP limit, triggering thermal throttling and OOM cascades. The solution is to implement an active load-aware routing layer that breaks the static hashing for heavy streams.
  common_mistake: |
    **The Pitfall:** Blaming faulty hardware or suggesting a switch to basic round-robin routing.
    **The Rationale:** Ignoring the fact that static consistent hashing creates "hot keys" when payload complexities are highly heterogeneous.
    **The Consequence:** The problem persists or moves to a different node, failing to address the fundamental load imbalance caused by heavy video streams.
  napkin_math: |
    *   **Available Memory:** 32 GB RAM - 8 GB (OS/services) = 24 GB available for inference.
    *   **Standard Stream:** 2 GB, 15 TOPS.
    *   **Heavy Stream:** 8 GB, 65 TOPS.
    *   **Hotspot Scenario:** Consistent hashing assigns 4 heavy streams to Node 1.
    *   **Memory Demand:** 4 * 8 GB = 32 GB (exceeds 24 GB -> OOM).
    *   **Compute Demand:** 4 * 65 TOPS = 260 TOPS (near 275 limit, sustains max util -> 60W thermal throttle).
    *   **Result:** A **static hot key** causes one node to exceed both memory and TDP limits simultaneously.
