title: The Case of the Missing Gigabytes
scenario: An engineer deploys a computer vision model to a Jetson AGX Orin with 32 GB of RAM. The model's weights and activations require 24 GB. The application crashes with an out-of-memory (OOM) error.
question: Besides the model itself and the OS, what other major consumer of DRAM on an edge device accounts for the multi-gigabyte discrepancy?
details:
  realistic_solution: The OS reserves a baseline of 2-4 GB. Critically, the Linux kernel will pre-allocate a large Contiguous Memory Allocator (CMA) region at boot time to service real-time DMA requests from peripherals, such as high-bandwidth cameras. This reserved memory is not available to user-space applications.
  common_mistake: |
    **The Pitfall:** Underestimating system-reserved memory for hardware peripherals.
    **The Rationale:** Engineers from cloud/desktop backgrounds often only account for OS usage (1-2 GB) and forget that high-bandwidth edge peripherals require large, pre-allocated Contiguous Memory Allocator (CMA) buffers.
    **The Consequence:** Miscalculating available user-space memory leads to unexpected OOM crashes in production edge environments.
  napkin_math: |
    * **Total System RAM:** 32 GB.
    * **Model Memory:** 24 GB.
    * **OS Reservation:** ~2 GB.
    * **CMA Buffer (Camera DMA):** ~6 GB pre-allocated for real-time acquisition.
    * **Remaining RAM:** 32 GB - 24 GB - 2 GB - 6 GB = **0 GB free memory**, triggering the OOM.
  options:
  - Page file / swap space on the eMMC storage.
  - Memory fragmentation from other running processes.
  - The OS kernel, which typically uses a few hundred megabytes.
  - A large, pre-allocated DMA buffer for the camera sensor stream.
  correct_index: 3
