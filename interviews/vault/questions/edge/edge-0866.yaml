title: CNN Translation Equivariance as Hardware Efficiency
scenario: A vision transformer (ViT) and a CNN both achieve similar accuracy on ImageNet. However, the CNN requires 4x fewer parameters and 3x fewer FLOPs.
question: From a systems perspective, why does a CNN's translation equivariance and local connectivity translate into lower parameter count and FLOPs than a similarly accurate ViT?
details:
  realistic_solution: 'Translation equivariance means the same convolution kernel is shared across all spatial positions. Systems implications: (1) Parameter efficiency: a 3x3x256x256 conv has only 590K parameters but covers the entire spatial resolution — ViT needs position-specific parameters for each patch. (2) Compute regularity: convolutions map perfectly to systolic arrays and Tensor Cores due to their regular, predictable access patterns. (3) Spatial locality: each conv only reads a local receptive field, enabling excellent cache utilization. (4) Data reuse: each weight is reused across all spatial positions, giving very high arithmetic intensity. ViT''s global attention reads all patches for every patch — poor locality.'
  common_mistake: |
    **The Pitfall:** Explaining equivariance purely from a statistical learning perspective.
    **The Rationale:** Candidates focus on the theoretical ML benefits (generalization) and fail to connect spatial priors to concrete hardware execution mechanics like cache locality and register reuse.
    **The Consequence:** Missing the fundamental reason why convolutions map perfectly to systolic arrays and Tensor Cores, leading to poor hardware-software co-design.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * CNN (ResNet-50): 25M params, 4 GFLOPs for 224x224.
       * ViT-B/16: 86M params, 17 GFLOPs for 224x224.
       * CNN kernel: 3x3 at 56x56 resolution.
    2. **Calculations:**
       * Parameter ratio: 86M / 25M = 3.4x.
       * FLOP ratio: 17 / 4 = 4.25x.
       * CNN weight reuse: each 3x3 kernel is used 56 * 56 = 3136 times at one resolution without reloading weights.
    3. **Conclusion & Interpretation:**
       **Result: Massive Data Reuse**. The 3136x reuse of weights provides exceptional arithmetic intensity, fundamentally optimizing memory bandwidth utilization compared to ViT's global attention.
