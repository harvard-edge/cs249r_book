title: CNN Translation Equivariance as Hardware Efficiency
scenario: A vision transformer (ViT) and a CNN both achieve similar accuracy on ImageNet. However, the
  CNN requires 4× fewer parameters and 3× fewer FLOPs. From a systems perspective, explain why the CNN's
  inductive bias (translation equivariance and local connectivity) translates directly into hardware efficiency
  gains.
details:
  realistic_solution: 'Translation equivariance means the same convolution kernel is shared across all
    spatial positions. Systems implications: (1) Parameter efficiency: a 3×3×256×256 conv has only 590K
    parameters but covers the entire spatial resolution — ViT needs position-specific parameters for each
    patch. (2) Compute regularity: convolutions map perfectly to systolic arrays and Tensor Cores due
    to their regular, predictable access patterns. (3) Spatial locality: each conv only reads a local
    receptive field, enabling excellent cache utilization. (4) Data reuse: each weight is reused across
    all spatial positions, giving very high arithmetic intensity. ViT''s global attention reads all patches
    for every patch — poor locality.'
  common_mistake: 'Explaining equivariance purely from a statistical learning perspective without connecting
    it to concrete hardware benefits: weight sharing, regular memory access patterns, and data reuse.'
  napkin_math: 'CNN (ResNet-50): 25M params, 4 GFLOPs for 224×224. | ViT-B/16: 86M params, 17 GFLOPs for
    224×224. | Param ratio: 3.4×. FLOP ratio: 4.25×. | CNN weight reuse: each 3×3 kernel used 56×56 =
    3136 times at one resolution.'
