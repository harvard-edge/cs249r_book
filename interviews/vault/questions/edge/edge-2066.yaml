title: 'Jetson Orin: Real-time Multi-Stream Video Pipeline Bottleneck Analysis'
scenario: Your team is deploying an edge AI application on an NVIDIA Jetson Orin for real-time anomaly detection in a factory setting. The system must process 8 concurrent 1080p video streams at 30 FPS each. The pipeline involves decoding, pre-processing, INT8 inference, and storing results to an SSD. You observe that the pipeline is dropping frames, indicating a throughput bottleneck.
question: Where would you investigate, and how would you apply the data pipeline equation to diagnose and optimize the system for sustained performance?
details:
  realistic_solution: Systematic profiling of each pipeline stage (decoding, pre-processing, inference, storage) to pinpoint the actual bottleneck. Utilizing the Jetson's hardware video decoders (NVDEC), optimizing pre-processing with CUDA-accelerated OpenCV operations or TensorRT pre-processors, employing efficient memory management (e.g., shared memory, pinned memory for DMA), and asynchronous execution to overlap compute and I/O. Applying the data pipeline equation means identifying the stage with the highest latency (`max(latency_stage_i)`) and focusing optimization efforts there, ensuring that the aggregate data loading rate meets or exceeds the required `8 streams * 30 FPS * (bytes_per_frame)`.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the GPU INT8 inference speed.
    **The Rationale:** Candidates assume the neural network is always the bottleneck, ignoring the massive data ingestion requirements of multi-stream high-resolution video.
    **The Consequence:** Wasting time quantizing and pruning models while the actual pipeline drops frames due to CPU saturation during video decoding and pre-processing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 8 streams at 1080p (1920x1080 RGB), 30 FPS.
       * CPU pre-processing step takes 5ms per frame.
    2. **Calculations:**
       * Raw data rate: 8 streams * 30 FPS * 1920 * 1080 * 3 bytes = ~1.49 GB/s.
       * Total frames/sec: 8 * 30 = 240 frames/s.
       * Total CPU time per second: 240 frames * 5ms = 1200ms.
    3. **Conclusion & Interpretation:**
       **Result: CPU-Bound**. Requiring 1.2 seconds of CPU time per real second proves the CPU is mathematically saturated by pre-processing, making it the primary bottleneck before the data ever reaches the GPU.
