title: 'Edge Transformer Cost Realization: FLOPs per Token for Small Transformers'
scenario: Calculate the exact FLOPs per token for a decode step of Phi-3-Mini (3.8B
  params, 32 layers, hidden=2048, FFN=8192, heads=32) at batch=1. Compare to the 2N
  approximation. Determine if Jetson Orin (275 TOPS INT8) is compute or memory bandwidth
  bound for this workload.
question: What are the exact decode FLOPs per token for Phi-3-Mini, how do they compare
  to 2N, and is Jetson Orin compute- or bandwidth-bound?
details:
  realistic_solution: 'Per decode step (batch=1), one new token generated. QKV projection
    (output from new token): 3 * 2 * 1 * hidden^2 = 3*2*2048^2=25.2M FLOPs. Attention
    over seq=512: 2*heads*seq*head_dim = 2*32*512*64=2.10M FLOPs. FFN: 2*2*1*hidden*FFN_dim=2*2*2048*8192=67.1M
    FLOPs. Per layer: 25.2+2.1+67.1=94.4M FLOPs. 32 layers: 3.02G FLOPs. 2N approx:
    2*3.8B=7.6G FLOPs. Ratio: 7.6/3.02=2.5x overestimate. Actual: 3.02G FLOPs/token.
    Compute time: 3.02G/275T=0.011ms=11μs. BW time: 3.8GB (INT8)/102.4GB/s=37.1ms.
    BW-bound by 3373x! Compute is negligible for batch=1 decode.'
  common_mistake: Using 2N for all model sizes without checking that the KV cache
    read adds significant additional compute for long sequences (attention score computation
    scales as O(seq) for each decode step).
  napkin_math: 'QKV: 3*2*2048^2=25.2M. Attn: 2*32*512*64=2.1M. FFN: 2*2*2048*8192=67.1M.
    Per layer: 94.4M. 32 layers: 3.02G FLOPs. 2N: 7.6G (2.5x overestimate). Compute:
    3.02G/275T=11μs. BW: 3.8GB/102.4G=37.1ms. BW/Compute ratio: 37.1ms/0.011ms=3373x.
    Completely memory-bandwidth-bound. 99.997% of time spent loading weights. Compute
    utilization: 0.003%. Key insight: for batch=1 decode, TOPS rating is irrelevant
    — bandwidth is everything. Hailo-8 vs Jetson for decode: Hailo-8 6GB/s vs Jetson
    102.4GB/s → Jetson 17x faster for Phi-3 decode. Jetson wins.'
