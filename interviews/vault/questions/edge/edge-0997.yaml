title: Evaluating Activation Memory Impact of Batch Size Scaling on Jetson Orin Inference
scenario: You are optimizing throughput for a YOLOv8-L object detection pipeline on an edge device with 32 GB memory. At batch size 1, inference takes 18 ms and uses 1.2 GB memory. At batch size 8, inference takes 28 ms and uses 6.8 GB. At batch size 16, inference OOMs.
question: Is YOLOv8-L memory scaling from batch 1 to 8 linear, and what likely causes the OOM at batch 16?
details:
  realistic_solution: 'From B=1→B=8: memory grows from 1.2 to 6.8 GB. Activation component (linear): ~1.0 GB × 8 = 8.0 GB expected, but actual is 6.8 GB — sublinear, consistent with fixed workspace overhead (~0.2 GB at B=1 not scaling with batch). Extrapolating to B=16: 6.8 - fixed_overhead × (16/8) ≈ 6.8 GB activations at B=8 → 13.6 GB activations + 0.2 GB workspace = 13.8 GB. Plus OS + CUDA context (~3 GB on Orin). Total ≈ 17 GB — does not exceed 32 GB. OOM at B=16 suggests TensorRT is using a larger-than-expected workspace (possibly set to 4 GB) or feature pyramid memory grows superlinearly. Profile with `trtexec --dumpLayerInfo` to identify the offending layer.'
  common_mistake: |
    **The Pitfall:** Assuming activation memory scales perfectly linearly with batch size.
    **The Rationale:** Candidates linearly extrapolate from batch=1 to batch=16 without accounting for fixed overheads or workspace buffers.
    **The Consequence:** Misdiagnosing the OOM as an activation issue rather than a TensorRT workspace or memory leak problem.
  napkin_math: |
    - Linear model: $M(B) = M_{fixed} + M_{per\_sample} * B$
    - Using data: $M_{fixed} + M_{per} = 1.2$, $M_{fixed} + 8 * M_{per} = 6.8$
    - Solve: $M_{per} = 0.8$ GB/sample, $M_{fixed} = 0.4$ GB.
    - Predicted $M(16) = 0.4 + 0.8 * 16 = 13.2$ GB.
    - OOM at 32 GB is unexpected -> indicates an external memory sink or **superlinear workspace growth**.
