title: The Fleet Update Dilemma
scenario: 'You are a Staff ML Systems Engineer at an automotive company with a fleet of 100,000 connected
  vehicles. An A/B test reveals your current pedestrian detection model underperforms on e-scooters. You
  must solve this by choosing between two update strategies:'
question: "Which update strategy has lower annual TCO for fixing e-scooter detection across 100,000 vehicles, centralized upload or FL?"
details:
  realistic_solution: The correct approach is to calculate the annual TCO for both options. Strategy B
    (Federated Learning) is overwhelmingly more economical. The massive reduction in daily data transfer
    costs creates savings that dwarf the upfront platform license fee. This also provides the unquantified,
    but significant, benefit of improved user privacy by not exfiltrating raw sensor data.
  common_mistake: Engineers often focus on a single, visible cost (like a large software license or a
    cloud training bill) and completely ignore the 'invisible' but dominant operational costs, like data
    transfer over a large fleet. At scale, data movement is almost always the most expensive part of the
    system.
  napkin_math: '**Strategy A (Centralized) TCO:**'
  options:
  - Strategy A, because the $5M platform fee for Strategy B is far greater than the $800k annual training
    cost for Strategy A.
  - Strategy A, because uploading raw data allows for more powerful, unbiased centralized models, which
    justifies the higher but manageable data cost.
  - Strategy B, because the annual data transfer cost is dramatically lower, making the total cost (~$5.7M)
    significantly less than Strategy A (~$73.8M).
  - The costs are roughly equivalent; the high license fee of Strategy B cancels out the data savings,
    so the decision should be based on privacy alone.
  correct_index: 2
