title: TFLite INT8 Conversion on Cortex-M4
scenario: We are converting a PyTorch anomaly detection CNN into TensorFlow Lite for Microcontrollers to deploy on a Cortex-M4. The original FP32 model weights consume exactly 600,000 bytes. The TFLite Micro runtime engine requires 32,000 bytes of static overhead.
question: What are the INT8 weight size and remaining SRAM tensor arena after converting the 600,000-byte FP32 model for the Cortex-M4?
details:
  realistic_solution: The correct approach requires understanding the data type mappings during model format conversion. FP32 uses 4 bytes per parameter, meaning the model has 150,000 parameters. An INT8 conversion maps each parameter to 1 byte. We then calculate total device SRAM in bytes and subtract the converted weights and runtime overhead to find the available tensor arena space.
  common_mistake: |
    **The Pitfall:** Forgetting data type byte sizes or using base-10 conversion for SRAM.
    **The Rationale:** Candidates blindly divide by 4 or assume 1 KB = 1000 bytes instead of 1024 bytes.
    **The Consequence:** Incorrect memory allocation calculations leading to hard out-of-memory crashes at runtime.
  napkin_math: |
    - Parameter Count: 600,000 bytes / 4 bytes/FP32 = 150,000 parameters.
    - INT8 Weights Size: 150,000 parameters * 1 byte/INT8 = 150,000 bytes.
    - Total Device SRAM: 256 KB * 1024 bytes/KB = 262,144 bytes.
    - Tensor Arena: 262,144 - 150,000 (weights) - 32,000 (runtime) = 80,144 bytes.
    **The INT8 weights take 150,000 bytes, leaving exactly 80,144 bytes for the tensor arena.**
