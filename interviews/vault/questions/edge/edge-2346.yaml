title: Orin Max Batch KV Limits
scenario: 'Serving a 32-layer LLM with 8 KV-heads and 128 head-dim in FP16 on a Jetson Orin. Context is 16k tokens.'
question: Evaluate the maximum batch size if 24GB of RAM is strictly reserved for the KV cache.
visual:
  kind: svg
  path: edge-2346.svg
  alt: Bar chart comparing 24GB KV cache capacity to individual 2.14GB request footprints.
  caption: Memory footprint scaling for KV cache batch size.
details:
  realistic_solution: 'KV cache per token: 2 bytes * 32 layers * 8 heads * 128 dim * 2 (K+V) = 131,072 bytes. For a 16,384 token sequence: 131,072 * 16384 = 2,147,483,648 bytes (exactly 2 GiB) per request. Maximum batch size = 24 GiB / 2 GiB = 12. The max integer batch size is 12.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by 2 for Key and Value.
    **The Rationale:** Candidates calculate simply 1 byte per FP16 param or ignore either Key or Value.
    **The Consequence:** Context length or batch capacity is wildly overestimated, causing immediate OOM during scaling.
  napkin_math: |
    1. **Assumptions & Constraints:** 32 layers, 8 KV heads, 128 head_dim, FP16 (2 bytes). 16,384 tokens. KV RAM reserved is 24 GiB.
    2. **Calculations:** KV per token = 2 (K+V) * 32 * 8 * 128 * 2 bytes = 131,072 bytes. KV per request = 131,072 * 16384 = 2,147,483,648 bytes (2 GiB). Max batch size = 24 GiB / 2 GiB = 12.
    3. **Conclusion & Interpretation:** **The max integer batch size is exactly 12. Result: Memory-Capacity-Bound.**
