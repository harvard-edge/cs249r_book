title: Handling INT8 Quantization Discrepancies Across Edge Runtimes
scenario: Your INT8-quantized object detection model achieves 42.1 mAP when quantized with TensorRT's PTQ on Jetson Orin, but only 39.8 mAP when the same FP32 model is quantized with ONNX Runtime's built-in quantizer using the same calibration dataset. The 2.3 mAP gap is unacceptable.
question: Why is ORT INT8 quantization 2.3 mAP worse than TensorRT on the same calibration set, and how would you close the gap?
details:
  realistic_solution: 'MinMax calibration is sensitive to outliers — a single extreme activation value can expand the quantization range, wasting precision for the majority of values. Switch ORT to percentile calibration (clip at 99.99th percentile) or use the entropy method via onnxruntime.quantization.CalibrationMethod.Entropy. Additionally, TensorRT applies per-channel quantization by default for Conv weights while ORT defaults to per-tensor. Enable per-channel quantization in ORT: quantize_dynamic with per_channel=True. These two changes typically recover 1.5-2.0 mAP.'
  common_mistake: |
    **The Pitfall:** Blaming the calibration dataset size for the mAP gap.
    **The Rationale:** Engineers assume more data will fix quantization errors without looking at the underlying algorithms.
    **The Consequence:** They ignore that TensorRT uses entropy-based and per-channel calibration by default, while ORT uses MinMax per-tensor, missing the simple configuration fix.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-tensor range: [-2.0, 8.0] (Range: 10).
    - Per-channel range: [-1.0, 1.5] (Range: 2.5).

    **Calculations:**
    - Per-tensor Scale = 10 / 255 = 0.039.
    - Per-channel Scale = 2.5 / 255 = 0.0098.

    **Conclusion & Interpretation:**
    - **Result: 4x Precision Loss (Accuracy-Bound)**. Utilizing ORT's default per-tensor constraints severely expands outlier coverage, mathematically degrading accuracy resolution compared to TensorRT.
