title: The Self-Healing Edge Sentinel
scenario: You manage a fleet of autonomous industrial robots operating in remote mines.
  These robots run complex ML models for navigation, object recognition, and predictive
  maintenance. They can operate for weeks without any network connectivity to the
  cloud.
question: How would you design a low-overhead on-device monitoring, self-healing,
  and forensic logging system for mine robots offline for weeks?
details:
  realistic_solution: "Implement a multi-layered, hierarchical monitoring system on\
    \ the device:\n  1.  **Metric Collection & Aggregation:** Collect key system metrics\
    \ (CPU/GPU utilization, memory, disk I/O, temperature, power consumption), model\
    \ inference metrics (latency, throughput, confidence scores, output distributions),\
    \ and application-specific health checks. Aggregate these into time windows (e.g.,\
    \ 5-minute averages) to reduce storage.\n  2.  **On-Device Anomaly Detection:**\n\
    \      *   **Rule-Based Thresholding:** Simple, low-cost checks (e.g., \"if CPU\
    \ > 90% for 10 min,\" \"if inference latency > 500ms for 5 consecutive inferences\"\
    ).\n      *   **Statistical Process Control (SPC):** Use EWMA (Exponentially Weighted\
    \ Moving Average) or CUSUM (Cumulative Sum) charts to detect shifts in mean or\
    \ variance of key metrics (e.g., model confidence, prediction entropy) over time.\
    \ This requires storing only a few statistics, not raw data.\n      *   **Lightweight\
    \ ML Models for Anomaly Detection:** Train a small, simple autoencoder or one-class\
    \ SVM *on the device* using normal operational data. Periodically infer on new\
    \ metric streams. Deviations indicate anomalies.\n  3.  **Local Mitigation & Self-Healing:**\n\
    \      *   **Service Restart:** If a specific ML service crashes or hangs, restart\
    \ it.\n      *   **Model Rollback:** If a model version is degrading (e.g., consistently\
    \ low confidence, high error rate), automatically switch to the previous stable\
    \ version (if pre-staged).\n      *   **Resource Management:** Dynamically adjust\
    \ inference batch size or frequency if system load is too high.\n      *   **Safe\
    \ Mode/Degraded Operation:** If critical components fail, switch to a safe, minimal\
    \ operational mode (e.g., stop ML, just navigate safely to base).\n  4.  **Forensic\
    \ Data Capture & Prioritization:**\n      *   **Event-Triggered Logging:** Only\
    \ capture detailed logs, stack traces, and relevant input/output tensors *when\
    \ an anomaly is detected*.\n      *   **Circular Buffer for Pre-Anomaly Data:**\
    \ Maintain a small circular buffer of recent sensor data/model inputs to capture\
    \ context *leading up to* an anomaly.\n      *   **Prioritized Uplink:** When\
    \ connectivity is restored, prioritize uploading critical anomaly reports and\
    \ forensic data over routine metrics. Implement exponential backoff for retries.\n\
    \  5.  **Resource Constraints:** Use SQLite for local storage, optimize logging\
    \ levels, use memory-mapped files where possible, and ensure all local ML models\
    \ are highly quantized and tiny."
  common_mistake: '"Store all logs and metrics locally and upload when connected."
    This is insufficient. It doesn''t enable *real-time* local anomaly detection or
    self-healing, nor does it address resource constraints for long-term storage of
    raw data.'
  napkin_math: '**Assumptions & Constraints:**

    - Lightweight ML anomaly model: 10 input, 2 hidden, 10 output.


    **Calculations:**

    - Total parameters: (10*2) + (2*10) + 12 biases = 52.

    - FP32 model size: 52 * 4 bytes = 208 bytes.


    **Conclusion & Interpretation:**

    - **Result: 208 bytes (Compute-Bound)**. Memory is completely negligible, allowing
    the robot to run it locally at 100Hz continuously offline.

    '
