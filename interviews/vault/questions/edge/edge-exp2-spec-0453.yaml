title: Latency Budgeting for Defect Detection on Edge TPU
scenario: You are tasked with specifying the end-to-end pipeline architecture for a defect detection system
  on a manufacturing line using a Google Coral Edge TPU (4 TOPS INT8, USB form factor, 2W power limit).
  The product line moves quickly, requiring an end-to-end latency of no more than 25ms per frame from
  camera capture to triggering a mechanical reject arm over a local network. Design the latency budget
  specification, detailing the expected time spent in image capture, preprocessing, USB data transfer,
  INT8 TPU inference, post-processing, and network I/O, ensuring all hardware constraints are met.
question: "How would you allocate the 25ms camera-to-reject-arm latency budget for a Coral Edge TPU defect detection pipeline?"
details:
  realistic_solution: A robust specification must explicitly decompose the 25ms budget across all pipeline
    stages, accounting for data movement. The design should specify capturing the image directly into
    a pre-allocated buffer, performing lightweight CPU preprocessing (resizing and INT8 quantization),
    and compiling the entire model strictly for the Edge TPU to avoid CPU fallbacks. Post-processing must
    be highly optimized, potentially using a C++ extension, to ensure the overall budget is maintained.
  common_mistake: Candidates frequently focus solely on the TPU's 4 TOPS peak performance and theoretical
    inference time, neglecting the critical latency bottlenecks of USB data transfer, CPU-bound INT8 quantization
    of the input, and non-max suppression (NMS) post-processing. They also often fail to account for the
    latency penalty if unsupported operations fall back from the TPU to the host CPU.
  napkin_math: 'Input: 224x224x3 image. INT8 Tensor size = 224 * 224 * 3 = 150.5 KB. USB 3.0 transfer
    time (assuming 400 MB/s effective) = 150.5 KB / 400 MB/s = 0.38ms (budget 1ms for overhead). Inference:
    A quantized MobileNetV2-based detector requires ~1 GOP. At 4 TOPS (4000 GOPs/sec), theoretical compute
    time is 0.25ms, but actual TPU latency is typically ~3ms due to memory bandwidth. Realistic budget:
    Capture/ISP (5ms) + CPU Preprocessing (3ms) + USB Tx (1ms) + TPU Inference (3ms) + USB Rx (1ms) +
    CPU NMS Post-processing (4ms) + Network/Actuation (5ms) = 22ms total end-to-end latency.'
