title: 'Jetson Orin Edge Monitoring: Key Telemetry for Performance Degradation'
scenario: >-
  You've deployed a critical real-time inference model on an NVIDIA Jetson Orin in a remote, constrained environment. Your primary objective is to maintain high availability and performance.
question: For basic recall-level monitoring, what specific telemetry metric is crucial to track to quickly detect compute-related performance degradation, and why?
details:
  realistic_solution: Crucial telemetry includes GPU utilization (specifically SM utilization or Tensor Core activity, directly tied to the INT8 capability) and LPDDR5 memory bandwidth utilization. High GPU utilization with lower-than-expected inference throughput points to a potential bottleneck in data feeding or processing pipeline, while high memory bandwidth utilization highlights data transfer constraints impacting the LPDDR5. These directly reflect the device's specialized compute performance.
  common_mistake: |
    **The Pitfall:** Focusing solely on generic CPU utilization or overall device temperature.
    **The Rationale:** Candidates rely on standard server metrics rather than accelerator-specific telemetry like Tensor Core activity or LPDDR5 memory bandwidth.
    **The Consequence:** Missing the actual bottleneck, such as data feeding issues or memory bandwidth saturation, leading to prolonged performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin with 275 TOPS INT8 capability.
    - Workload: Real-time continuous inference.

    **Calculations:**
    - Expected TOPS usage: (Inferences_Per_Second) * (Avg_TOPS_Per_Inference).
    - Metric comparison: Compare expected TOPS against actual Tensor Core / SM utilization.

    **Conclusion & Interpretation:**
    - **Result: Deviated Utilization (Compute/Memory-Bound).** A significant deviation from expected Tensor Core utilization or LPDDR5 bandwidth directly points to a data-feeding pipeline bottleneck.
