title: Quantized Edge TPU Fairness Evaluation Strategy
scenario: Your team is deploying a real-time face detection model for a smart doorbell
  using a Google Coral Edge TPU. The device operates on a tight 2W power budget and
  requires fully INT8 quantized models to utilize the 4 TOPS accelerator effectively.
  Before launch, you must design a framework to evaluate intersectional fairness (e.g.,
  across skin tone and lighting conditions), specifically accounting for the fact
  that INT8 quantization and limited operator support might disproportionately degrade
  performance for certain subgroups compared to the original FP32 model.
question: How would you evaluate intersectional fairness for the INT8 face detector
  on the Coral Edge TPU under the 2W deployment constraints?
details:
  realistic_solution: A strong candidate will insist on evaluating fairness metrics
    (like equalized odds) directly on the quantized INT8 model using hardware-in-the-loop
    (HITL) testing on the actual Coral Edge TPU. They will design a calibration strategy
    for post-training quantization (PTQ) that uses a demographically balanced representative
    dataset to minimize activation clipping biases, and establish a CI/CD pipeline
    that measures subgroup performance latency and accuracy strictly on the target
    hardware.
  common_mistake: Candidates often propose evaluating fairness only on the FP32 model
    in the cloud, incorrectly assuming that the accuracy drop from INT8 quantization
    will be uniformly distributed across all demographic groups. They also frequently
    fail to account for the Edge TPU's limited operator support, which might force
    fallbacks to the host CPU and change the latency characteristics for specific
    edge cases.
  napkin_math: With a 4 TOPS accelerator, a standard MobileNetV2-based detector requires
    ~0.3 GOPS per frame, theoretically allowing over 10,000 FPS. Realistically, accounting
    for I/O overhead on the USB/PCIe interface, inference takes ~10ms per frame (100
    FPS). To evaluate a balanced fairness dataset of 50,000 images across 10 intersectional
    subgroups (5,000 images each) to achieve statistical significance, it will take
    50,000 * 0.01s = 500 seconds (~8.3 minutes) per model candidate. At 2W, this entire
    validation run consumes just 1,000 Joules (0.00027 kWh), making exhaustive on-device
    fairness validation practically free and fast enough for every pull request.
