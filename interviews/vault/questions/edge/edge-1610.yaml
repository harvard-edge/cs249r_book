title: Edge TPU Encoder-Decoder Throughput Calculation
scenario: You are deploying a lightweight sequence-to-sequence model on a Google Coral Edge TPU (4 TOPS INT8). The model's encoder requires 15 GOPS to process a prompt, while the autoregressive decoder requires 2 GOPS per generated token. Every request generates exactly 20 output tokens.
question: What maximum inferences per second can the Coral Edge TPU achieve when each seq2seq request needs a 15 GOPS encoder plus 20×2 GOPS decoder?
details:
  realistic_solution: The total compute required per inference is the sum of the one-time encoder processing and the iterative decoding for all output tokens. Once the total operations per inference is found, divide the total compute capacity of the Coral Edge TPU by this per-inference cost to find the maximum theoretical throughput in inferences per second.
  common_mistake: |
    **The Pitfall:** Forgetting the autoregressive nature of decoders or miscalculating TOPS to GOPS.
    **The Rationale:** Candidates often multiply encoder cost by output length or fail to scale the units properly.
    **The Consequence:** Drastically inaccurate throughput estimates that misalign hardware provisioning.
  napkin_math: |
    - Encoder cost: 15 GOPS.
    - Decoder cost: 20 tokens * 2 GOPS/token = 40 GOPS.
    - Total inference compute: 15 + 40 = 55 GOPS.
    - Hardware capacity: 4 TOPS = 4,000 GOPS.
    - Maximum throughput: 4,000 GOPS / 55 GOPS/inference = **72.7 inferences per second**.
