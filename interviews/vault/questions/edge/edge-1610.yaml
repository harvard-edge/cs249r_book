title: Edge TPU Encoder-Decoder Throughput Calculation
scenario: You are deploying a lightweight sequence-to-sequence model on an edge NPU. The model's encoder requires 15 GOPS to process a prompt, while the autoregressive decoder requires 2 GOPS per generated token. Every request generates exactly 20 output tokens.
question: What maximum inferences per second can a 4 TOPS NPU achieve when each seq2seq request needs a 15 GOPS encoder plus 20x2 GOPS decoder?
details:
  realistic_solution: "The inference throughput sits precisely at 72.7 inferences per second. Seq2Seq deployments demand calculating total GOPS by factoring the single-pass prompt encoder (15 GOPS) and the iterative autoregressive decoder (40 GOPS across 20 tokens). Provisioning solely based on encoder TOPS leads to catastrophic under-sizing of edge infrastructure."
  common_mistake: |
    **The Pitfall:** Forgetting the autoregressive nature of decoders or miscalculating TOPS to GOPS.
    **The Rationale:** Candidates often multiply encoder cost by output length or fail to scale the units properly.
    **The Consequence:** Drastically inaccurate throughput estimates that misalign hardware provisioning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 4 TOPS = 4,000 GOPS.
       - Encoder compute: 15 GOPS/prompt.
       - Decoder compute: 2 GOPS/token.
       - Output: 20 tokens/request.
    2. **Calculations:**
       - Decoder cost = 20 * 2 = 40 GOPS.
       - Total inference compute = 15 + 40 = 55 GOPS.
       - Max throughput = 4,000 GOPS / 55 GOPS = 72.7 inferences/sec.
    3. **Conclusion & Interpretation:**
       - **72.7 inferences per second.**
