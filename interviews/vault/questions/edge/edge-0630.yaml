title: The Night-Drive Quantization Collapse
scenario: You are the ML Systems Architect for the perception team at a leading autonomous vehicle company. Your team must deploy a new, larger SOTA object detection model (from a FP32 baseline) onto the fleet's existing hardware, a Jetson AGX Orin-based ECU with a hard 33ms latency budget for the perception stage.
question: Why did the INT8 model fail under headlight glare, and how would mixed precision fix it within the 33ms Orin budget?
details:
  realistic_solution: The root cause is a dynamic range mismatch. The headlight glare introduces extreme outlier activation values that were not present in the daytime-heavy calibration dataset. Standard PTQ calculates a narrow scaling factor from this limited data, causing the high-intensity glare values to be 'clipped' to the maximum INT8 value (127). This clipping saturates entire feature maps, destroying the subtle, low-intensity information needed to detect a distant pedestrian in the darker parts of the scene.
  common_mistake: |
    **The Pitfall:** Immediately suggesting Quantization-Aware Training (QAT) to fix the accuracy drop.
    **The Rationale:** Candidates fall back on QAT as a universal "fix-it" button for INT8 degradation, ignoring the extreme engineering cost of the retraining pipeline.
    **The Consequence:** Masking the root cause (dynamic range clipping) and undertaking weeks of expensive infrastructure work instead of correctly diagnosing and resolving the numeric saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * FP32 Performance: ~68 TFLOPS. FP16: ~137 TFLOPS. INT8: ~275 TOPS.
       * Model Size: 5 TFLOPs.
       * Latency Budget: 33ms.
    2. **Calculations:**
       * Pure FP16 time: 5T / 137T = 36.5ms (misses 33ms budget).
       * Mixed (80% INT8, 20% FP16) time: (4T / 275T) + (1T / 137T) = 14.5ms + 7.3ms = 21.8ms.
       * Memory Read Overhead: 100MB / 204.8 GB/s = ~0.5ms.
       * Total Latency = 21.8ms + 0.5ms = 22.3ms.
    3. **Conclusion & Interpretation:**
       **Result: 22.3ms < 33ms (Compute-Bound Mitigated)**. Mixed precision successfully retains the sensitive high-dynamic-range outliers in FP16 while using INT8 for the bulk of the network, preserving accuracy and easily meeting the 30 FPS deadline.
