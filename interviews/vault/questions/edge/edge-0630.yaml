title: The Night-Drive Quantization Collapse
scenario: You are the ML Systems Architect for the perception team at a leading autonomous vehicle company.
  Your team must deploy a new, larger SOTA object detection model (from a FP32 baseline) onto the fleet's
  existing hardware, a Jetson AGX Orin-based ECU with a hard 33ms latency budget for the perception stage.
details:
  realistic_solution: The root cause is a dynamic range mismatch. The headlight glare introduces extreme
    outlier activation values that were not present in the daytime-heavy calibration dataset. Standard
    PTQ calculates a narrow scaling factor from this limited data, causing the high-intensity glare values
    to be 'clipped' to the maximum INT8 value (127). This clipping saturates entire feature maps, destroying
    the subtle, low-intensity information needed to detect a distant pedestrian in the darker parts of
    the scene.
  common_mistake: The most common L4/L5 answer is to immediately jump to Quantization-Aware Training (QAT).
    QAT is a powerful tool, but it's a brute-force solution that requires an expensive and slow retraining
    pipeline. A Staff+ engineer must first diagnose the root cause, which QAT might fix but won't explain.
    Another common mistake is suggesting a fallback to FP16, without first calculating if it's even feasible
    within the strict latency and power budgets of the edge device.
  napkin_math: Orin FP32 performance is ~68 TFLOPS. A 5 TFLOP model takes 5T / 68T = 73.5ms (misses 33ms
    budget). pure FP16 yields ~137 TFLOPS, taking 5T / 137T = 36.5ms (still misses). Mixed precision targets
    80% INT8 (275 TOPS) and 20% FP16 (137 TFLOPS). Compute time = (4T / 275T) + (1T / 137T) = 14.5ms +
    7.3ms = 21.8ms. Adding 100MB / 204.8 GB/s = 0.5ms memory read, total latency is ~22ms. We hit 30 FPS!
