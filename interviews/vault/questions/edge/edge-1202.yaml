title: Edge Overlap Pipeline Design
scenario: An edge accelerator can DMA input tiles while computing previous tiles, but the current runtime serializes copy then compute.
question: How would you redesign an edge runtime that serializes DMA and compute despite hardware support for overlap?
details:
  realistic_solution: Implement an asynchronous double-buffering pipeline using separate command queues for the DMA engine and the compute core. Allocate a bounded ring of device memory buffers. By utilizing hardware completion events (e.g., CUDA events or equivalent interrupts), the CPU can instruct the DMA to prefetch tile N+1 into buffer B while the compute core processes tile N from buffer A, fully hiding memory latency behind compute.
  common_mistake: |
    **The Pitfall:** Throwing hardware at a software problem.
    **The Rationale:** Engineers assume slow performance guarantees an under-powered accelerator chip.
    **The Consequence:** Buying a more expensive, faster accelerator while leaving the runtime serialized and missing performance targets anyway.
  napkin_math: |
    **Assumptions & Constraints:**
    - DMA copy time: 3 ms.
    - Compute time: 9 ms.
    - Current execution is strictly sequential.

    **Calculations:**
    - Serialized tile time: 3 ms + 9 ms = 12 ms.
    - Overlapped pipeline tile time: max(3 ms, 9 ms) = 9 ms.
    - Speedup: 12 ms / 9 ms = 1.33x.

    **Conclusion & Interpretation:**
    - **Result: 25% end-to-end latency reduction (12ms to 9ms) (Pipeline Optimization)**. Double-buffering fully hides the memory transfer latency behind the compute stage.
