title: Edge Overlap Pipeline Design
scenario: An edge accelerator can DMA input tiles while computing previous tiles,
  but the current runtime serializes copy then compute. Design the pipeline change.
question: How would you redesign an edge runtime that serializes DMA and compute despite
  hardware support for overlap?
details:
  realistic_solution: Use double buffering, separate DMA and compute queues, completion
    events, and a bounded ring of tile buffers. Preload the next tile while computing
    the current tile, and ensure cache coherency before the accelerator reads each
    buffer.
  common_mistake: Buying a faster accelerator while leaving the runtime serialized.
  napkin_math: If copy is 3 ms and compute is 9 ms, overlap reduces steady-state tile
    time from 12 ms to about 9 ms.
