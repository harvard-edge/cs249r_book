title: Edge Overlap Pipeline Design
scenario: An edge accelerator can DMA input tiles while computing previous tiles, but the current runtime serializes copy then compute.
question: How would you redesign an edge runtime that serializes DMA and compute despite hardware support for overlap?
details:
  realistic_solution: Use double buffering, separate DMA and compute queues, completion events, and a bounded ring of tile buffers. Preload the next tile while computing the current tile, and ensure cache coherency before the accelerator reads each buffer.
  common_mistake: |
    **The Pitfall:** Throwing hardware at a software problem.
    **The Rationale:** Engineers assume slow performance guarantees an under-powered accelerator chip.
    **The Consequence:** Buying a more expensive, faster accelerator while leaving the runtime serialized and missing performance targets anyway.
  napkin_math: |
    1. **Serialized Baseline:** If copy is 3 ms and compute is 9 ms, steady-state tile time = 12 ms.
    2. **Overlapped Pipeline:** Since compute (9 ms) > copy (3 ms), the transfer perfectly hides behind compute.
    3. **Conclusion:** Overlap reduces steady-state tile time from 12 ms to **~9 ms** (a 25% speedup).
