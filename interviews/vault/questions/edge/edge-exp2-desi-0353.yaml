title: Active Learning Curation for Edge TPU
scenario: You are designing the dataset curation and active learning pipeline for a fleet of smart cameras
  deployed on Google Coral Edge TPUs (4 TOPS INT8, 2W power budget, USB form factor). Because the Edge
  TPU strictly requires INT8 quantization and has limited operator support, the deployed models experience
  unexpected accuracy drops in specific field environments. Design a system to automatically select, annotate,
  and curate data from these edge devices to improve the quantized model's accuracy, balancing the need
  for representative INT8 calibration data against edge bandwidth constraints.
details:
  realistic_solution: The ideal architecture runs a lightweight uncertainty sampling filter directly on
    the edge device to select highly informative frames. In the cloud, the curated dataset is actively
    balanced to include long-tail scenarios specifically chosen to improve INT8 calibration histograms.
    This ensures the quantized model running on the 4 TOPS Edge TPU maintains high accuracy by accurately
    capturing the dynamic range of activations without wasting annotation budget on redundant data.
  common_mistake: Candidates often propose streaming all low-confidence edge predictions to the cloud
    without considering bandwidth limitations or the specific characteristics of the hardware. They frequently
    miss the critical need to curate a specialized calibration dataset that captures extreme activation
    ranges to prevent INT8 quantization degradation on the Edge TPU.
  napkin_math: A camera running at 30 FPS generates ~2.6M frames/day. Transmitting all frames at 200KB
    each requires 520 GB/day per device, which is unscalable. By implementing an edge-based active learning
    filter that selects only the top 0.1% most uncertain frames, the transfer is reduced to 2,600 frames
    or ~520 MB/day. From this, curating a highly diverse subset of 1,000 frames is sufficient to build
    robust activation histograms for the INT8 calibration step required by the Google Coral Edge TPU.
