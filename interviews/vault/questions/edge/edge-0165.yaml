title: The TinyML Tensor Arena Calculation
scenario: You are optimizing a keyword-spotting model for a Cortex-M4 microcontroller with 256KB of SRAM.
  To minimize memory, you must calculate the required size for the TensorFlow Lite for Microcontrollers
  'tensor arena'. At the most memory-intensive point, the interpreter must hold a 25KB input tensor to
  a convolutional layer *and* that layer's resulting 40KB output tensor concurrently. What is the minimum
  required size for the tensor arena to execute this specific operation?
question: "What is the minimum required size for the tensor arena to execute this specific operation?"
details:
  realistic_solution: The tensor arena is a single contiguous memory block that must be large enough for
    the point of maximum concurrent memory usage. For a single layer's execution, this peak is typically
    the sum of its input tensor(s) and output tensor(s). Therefore, the minimum required arena size for
    this operation is the sum of the input and output tensor sizes.
  common_mistake: Engineers often pick the size of the single largest tensor (40 KB) and assume that's
    the peak requirement. This is incorrect because the interpreter needs memory for a layer's input(s)
    *and* output(s) simultaneously during execution. Another mistake is summing all tensors in the model,
    ignoring the fact that memory is reused after a tensor is no longer needed.
  napkin_math: 1.  **Input Tensor Size:** `25 KB`
  options:
  - 40 KB
  - 95 KB
  - 65 KB
  - 256 KB
  correct_index: 2
