title: The Roofline Litmus Test
scenario: An engineer is deploying a classic CNN-based object detection model on a Jetson AGX Orin for
  a delivery drone. Profiling shows the model has an arithmetic intensity of about 600 Ops/Byte. The Jetson's
  documentation states its ridge point for INT8 is approximately 1,342 Ops/Byte. Based on these two numbers,
  identify the primary performance bottleneck for this model.
details:
  realistic_solution: The model is **memory-bound**. The arithmetic intensity (AI) represents the ratio
    of operations to memory accesses. The ridge point is the minimum AI a model needs to have to become
    compute-bound on that hardware. Since the model's AI is less than the hardware's ridge point, performance
    is limited by the speed of memory access, not the peak compute speed.
  common_mistake: A common mistake is to see the high peak TOPS of a GPU (275 TOPS for the Orin) and assume
    every workload will be compute-bound. However, if a model's arithmetic intensity is low, it cannot
    perform enough calculations for every byte of data it fetches, causing the powerful compute units
    to wait idly. The system is 'starved for data'.
  napkin_math: The roofline model is defined by the relationship between a model's Arithmetic Intensity
    (AI) and the hardware's Ridge Point.
  options:
  - Compute-bound
  - Memory-bound
  - Network-bound
  - Power-bound
  correct_index: 1
