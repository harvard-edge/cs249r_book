title: The Roofline Litmus Test
scenario: A CNN-based object detection model is deployed on a Jetson AGX Orin. Profiling shows the model has an arithmetic intensity of 600 Ops/Byte. The Jetson's INT8 ridge point is approximately 1,342 Ops/Byte.
question: Given an arithmetic intensity of 600 Ops/Byte and an INT8 ridge point of 1,342 Ops/Byte, what is the primary performance bottleneck?
details:
  realistic_solution: The model is **memory-bound**. The arithmetic intensity (AI) represents the ratio
    of operations to memory accesses. The ridge point is the minimum AI a model needs to have to become
    compute-bound on that hardware. Since the model's AI is less than the hardware's ridge point, performance
    is limited by the speed of memory access, not the peak compute speed.
  common_mistake: |
    **The Pitfall:** Assuming a powerful GPU means all workloads are compute-bound.
    **The Rationale:** Engineers see the high peak TOPS rating and ignore the relationship between memory access and operations.
    **The Consequence:** Attempting to optimize compute kernels when the actual limitation is data starvation (memory bandwidth).
  napkin_math: |
    1. **Model Arithmetic Intensity (AI)**: 600 Ops/Byte.
    2. **Hardware Ridge Point**: 1,342 Ops/Byte.
    3. **Comparison**: 600 < 1,342.
    4. **Conclusion**: Because the model's AI is lower than the ridge point, it is fundamentally **memory-bound**.
  options:
  - Compute-bound
  - Memory-bound
  - Network-bound
  - Power-bound
  correct_index: 1
