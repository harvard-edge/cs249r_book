title: Edge TPU QAT and Mixed-Precision Pipeline Design
scenario: You are designing a custom mixed-precision training recipe for a vision
  model that must eventually run on a Google Coral Edge TPU. Your training cluster
  uses BF16/FP32 for efficiency, but the target hardware demands strictly INT8 operations,
  providing 4 TOPS at 2W. You need to design a Quantization-Aware Training (QAT) architecture
  that leverages BF16 for fast convergence while simulating INT8 precision in the
  forward pass to ensure strict mapping to the Coral TPU's limited operator set without
  accuracy degradation.
question: How would you design a BF16/FP32 QAT pipeline that simulates strict INT8
  Edge TPU execution and avoids accuracy loss?
details:
  realistic_solution: Design a training pipeline where master weights and gradients
    are kept in FP32 to prevent underflow, while the forward pass simulates INT8 quantization
    for activations and weights using FakeQuantize nodes. Operators unsupported by
    the Coral TPU (like SiLU or GeLU) must be replaced with supported approximations
    (like ReLU6) before QAT begins. Straight-through estimators allow gradients to
    propagate back to the FP32 master weights, ensuring the final exported INT8 model
    matches the simulated accuracy.
  common_mistake: Candidates often apply standard Automatic Mixed Precision (AMP)
    recipes without properly integrating FakeQuantize nodes, leading to a massive
    domain gap when the model is converted to INT8. They also frequently assume the
    Coral Edge TPU can handle fallback FP16 operations, failing to realize that any
    non-INT8 operation will trigger a disastrous latency spike due to host CPU fallback.
  napkin_math: Assume the model requires 10 GOPS per inference and targets 60 FPS,
    needing 10 * 60 = 600 GOPS of throughput. The Google Coral Edge TPU provides 4
    TOPS (4,000 GOPS) at 2W. The maximum theoretical framerate is 4000 GOPS / 10 GOPS
    = 400 FPS. Our 600 GOPS workload utilizes 600 / 4000 = 15% of peak capacity. The
    estimated power consumption for this workload would be approximately 15% * 2W
    = 0.3W, well within the strict thermal envelope of the edge device.
