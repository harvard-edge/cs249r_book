title: Architecting Knowledge Distillation for Coral Edge TPU
scenario: Your team needs to deploy a real-time object detection model on a Google Coral Edge TPU for
  a smart camera system. The platform is strictly constrained to 4 TOPS INT8 compute, a 2W power budget,
  and a limited set of supported neural network operators. The current teacher model is a highly accurate
  but massive float32 model that cannot run on the Coral. You must design a knowledge distillation and
  training pipeline to create a student model that fits the Coral's strict INT8 constraints and operator
  limits while maximizing accuracy.
question: "How would you distill the float32 teacher into a Coral-compatible INT8 student while respecting Edge TPU operator limits?"
details:
  realistic_solution: The best approach is to first design a student model strictly using Edge TPU-supported
    operations (e.g., standard or depthwise convolutions). The pipeline should perform knowledge distillation
    alongside Quantization-Aware Training (QAT). The teacher generates float32 soft targets, while the
    student simulates INT8 quantization during the forward pass but uses float32 gradients for updates,
    ensuring the final compiled INT8 model retains high accuracy and compiles successfully.
  common_mistake: Candidates often suggest distilling directly into an INT8 student without considering
    Quantization-Aware Training (QAT), or they select a student architecture that includes operators not
    supported by the Edge TPU compiler. They also frequently fail to align the feature maps between a
    complex float32 teacher and a heavily quantized student.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS (4,000 GOPS) of INT8 compute. For a real-time
    requirement of 30 FPS, the per-frame compute budget is 4,000 GOPS / 30 = ~133.3 GOPS. A typical distilled
    student model like MobileNetV2-SSD requires approximately 1.2 GOPS. This requires only 1.2 / 133.3
    = 0.9% of the per-frame compute limit, easily guaranteeing 30 FPS execution while safely remaining
    under the strict 2W thermal and power envelope.
