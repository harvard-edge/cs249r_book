title: The Autonomous Driving FPS Mystery
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your new LiDAR-based 3D object detection model runs on a Jetson AGX Orin (in its 60W power profile). The model must achieve a 20 FPS minimum to meet the real-time perception system's deadline. However, live profiling shows the pipeline only achieves 12 FPS, even though `nvprof` reports 95% GPU utilization. You've determined the model performs approximately 40 GFLOPs and requires moving 16 GB of data (weights, activations, and large intermediate 3D voxel grids from DRAM) for each inference.
question: Using Orin's roofline, what bottleneck explains 12 FPS despite 95% GPU utilization for the 40 GFLOP, 16 GB LiDAR model?
details:
  realistic_solution: The model is memory-bandwidth bound. To determine this, we compare the model's Arithmetic Intensity (AI) with the hardware's Roofline Ridge Point. The model's AI is low, meaning it performs relatively few calculations for each byte it fetches from memory. The Jetson Orin's architecture has powerful compute units, but they are being starved of data by the relatively slower main memory bandwidth. 95% utilization mostly represents stall cycles.
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization means the workload is compute-bound.
    **The Rationale:** Engineers see 'busy' compute units and fail to realize utilization metrics can include stall time waiting for DRAM.
    **The Consequence:** Attempting to optimize compute kernels or buy a faster GPU instead of addressing the actual data movement bottleneck.
  napkin_math: |
    * Jetson AGX Orin memory bandwidth = 204.8 GB/s.
    * Peak FP16 compute (dense) = 137.5 TFLOPS.
    * Ridge Point = 137,500 GFLOPS / 204.8 GB/s = 671 OPS/Byte.
    * Model Arithmetic Intensity (AI) = 40 GFLOPs / 16 GB = 2.5 OPS/Byte.
    * Since 2.5 << 671, the model is severely memory-bound.
    * Time to read 16 GB = 16 GB / 204.8 GB/s = 78.1 ms per frame.
    * Max throughput = 1000 ms / 78.1 ms = **12.8 FPS** (misses the 50ms / 20 FPS deadline).
  options:
  - The model is compute-bound. 95% GPU utilization indicates the compute units are saturated and we need a more powerful GPU to reach 20 FPS.
  - The device is thermal throttling. The 60W power draw is too high, causing the GPU to lower its clock frequency and miss the FPS target.
  - The model is memory-bandwidth bound. Its arithmetic intensity is too low for the AGX Orin's architecture, causing the GPU to stall while waiting for data.
  - The model's power consumption exceeds the 60W budget. The low TOPS/W efficiency is the root cause of the poor performance.
  correct_index: 2
