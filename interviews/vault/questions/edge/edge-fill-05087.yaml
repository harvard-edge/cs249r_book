title: INT8 Activation Quantization Range Calibration for Object Detection on Jetson Orin
scenario: Deploying YOLO v8-m (25M params) on Jetson Orin with TensorRT INT8. The model is calibrated
  on 500 nighttime images (calibration set) but deployed in both day and night conditions. Daytime deployment
  shows 3.8% mAP drop vs nighttime calibration shows only 0.5% mAP drop. Diagnose and fix.
details:
  realistic_solution: 'Nighttime calibration: activation distributions have low mean intensities, narrow
    range. INT8 scales set for dark inputs. Daytime inputs: brighter, higher activations, wider range
    → clipping at INT8 max → significant accuracy loss. Diagnosis confirmed: 3.8% day loss >> 0.5% night
    loss. Fix: mixed calibration dataset with 50% day + 50% night images (500 total = 250 each). Recalibrate
    TensorRT engine. Expected improvement: day mAP drop reduces to ~1-1.5%. Alternative: use per-channel
    activation quantization with entropy calibration — wider dynamic range coverage. Check: histogram
    of intermediate activations for day vs night images — look for clipping >5% of values.'
  common_mistake: Collecting a calibration dataset that matches only one deployment condition; calibration
    should cover the full distribution of deployment inputs to set correct activation ranges.
  napkin_math: 'Night activation range: e.g., [0, 50]. Day activation range: [0, 200]. INT8 with night
    calibration: scale=50/127 → day values > 50 are clipped. Range [0,200] calibrated to [0,50] clips
    75% of the day dynamic range ((200-50)/200 = 75%) → 3.8% mAP loss. Mixed calibration: scale=200/127
    → both day/night covered, ending clipping. Night slightly degraded (~1%) but day improves significantly
    (from 3.8% to ~1%).'
