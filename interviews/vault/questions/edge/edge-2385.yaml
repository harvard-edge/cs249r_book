title: Asynchronous Gradient Clipping for Unstable Edge Connections
scenario: Distributed edge Jetson devices are federally training a forecasting model,
  but devices frequently drop off the 5G network for several training rounds.
question: Evaluate the use of asynchronous gradient clipping and local momentum buffering
  to maintain training stability when a node reconnects after missing 3 synchronization
  rounds.
details:
  realistic_solution: Storing local momentum allows the returning node to apply its
    accumulated updates. However, because the global model has drifted over 3 rounds,
    stale local gradients might degrade convergence. Gradient clipping bounds this
    damage, but dynamically down-weighting the stale updates based on lag is a safer
    evaluation.
  common_mistake: Applying the accumulated stale gradients directly with the current
    learning rate, causing catastrophic forgetting in the global model.
  napkin_math: Staleness factor = 3 rounds. Weighting update by 1/(1+staleness) yields
    a 0.25 scaling factor applied to stale gradients.
