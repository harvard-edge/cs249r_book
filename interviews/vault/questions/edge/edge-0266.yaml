title: 'The Unstable Perception Queue'
scenario: 'You are designing the perception system for an autonomous vehicle. The forward-facing camera feeds frames to your object detection model at a constant rate of 30 frames per second (FPS). Your model takes exactly 40ms to process a single frame. The system starts with an empty queue.'
question: 'With 30 FPS arrivals and 40 ms processing, how many frames are waiting after one second?'
details:
  realistic_solution: 'The system is unstable because the time to process a frame (40ms) is longer than the time between frame arrivals (1000ms / 30 FPS ≈ 33.3ms). The queue will grow continuously.'
  common_mistake: |
    **The Pitfall:** Confusing throughput with latency and assuming a 'fast' 40ms model is sufficient.
    **The Rationale:** Engineers fail to compare the processing time (service rate) directly against the frame arrival interval (arrival rate).
    **The Consequence:** If Processing Time > Arrival Interval, the queue is unstable and grows infinitely, violating any real-time guarantee.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate: 30 FPS $\rightarrow$ 1 frame every 33.3ms.
    - Service rate: 1 frame per 40ms $\rightarrow$ max throughput = 25 FPS.

    **Calculations:**
    - Stability check: Arrival rate (30) > Service rate (25) $\rightarrow$ queue is unstable and grows unboundedly.
    - Frames processed in 1 second: floor(1000ms / 40ms) = 25 frames.
    - Frames arrived in 1 second: 30 frames.
    - Frames waiting: 30 - 25 = 5 frames.

    **Conclusion & Interpretation:**
    - **Result: 5 frames (Queue-Bound)**. Frames waiting in queue after 1 second is 5 frames (and growing by 5 every second).
  options:
  - '0 frames'
  - '25 frames'
  - '5 frames'
  - '1 frame'
  correct_index: 2
