title: JIT Tracing Memory Leak
scenario: An NLP model deployed on an edge CPU processes variable-length text sequences. Inference takes
  50ms, using 200MB memory. Over 24 hours of processing random lengths, memory grows linearly by 2MB per
  inference until the system OOMs at 4GB.
details:
  realistic_solution: The graph capture mode used was JIT tracing, which hardcodes static shapes. The
    framework dispatcher maintains an LRU cache of compiled execution graphs. Because inputs are variable-length,
    almost every sequence length is unique, causing continuous cache misses. The framework recompiles
    a new static graph for each length, and the memory planner allocates new cached workspaces, leaking
    2MB per unique length until OOM.
  common_mistake: Blaming standard heap fragmentation or a Python garbage collection failure for the gradual
    memory growth.
  napkin_math: Base memory = 200MB. Limit = 4GB. Available = 3.8GB = 3,800MB. Each new sequence length
    triggers a JIT compilation caching 2MB of graph metadata. 3,800MB / 2MB = 1,900 unique lengths. If
    sequence lengths are uniformly distributed [1, 2048] and 1 unique length arrives per minute, OOM occurs
    in 1,900 minutes (31.6 hours).
