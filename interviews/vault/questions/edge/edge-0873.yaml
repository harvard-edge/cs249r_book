title: JIT Tracing Memory Leak
scenario: An NLP model deployed on an edge CPU processes variable-length text sequences. Inference takes 50ms, using 200MB memory. Over 24 hours of processing random lengths, memory grows linearly by 2MB per inference until the system OOMs at 4GB.
question: Why does memory grow by 2MB per inference for variable-length text on the edge CPU, eventually OOMing at 4GB?
details:
  realistic_solution: The graph capture mode used was JIT tracing, which hardcodes static shapes. The framework dispatcher maintains an LRU cache of compiled execution graphs. Because inputs are variable-length, almost every sequence length is unique, causing continuous cache misses. The framework recompiles a new static graph for each length, and the memory planner allocates new cached workspaces, leaking 2MB per unique length until OOM.
  common_mistake: |
    **The Pitfall:** Blaming standard heap fragmentation or Python garbage collection.
    **The Rationale:** Engineers assume standard memory leaks without understanding how JIT compilation interacts with dynamic shapes.
    **The Consequence:** They waste time profiling Python objects instead of fixing the compilation framework's caching behavior.
  napkin_math: |
    - **Memory Available:** 4GB (Limit) - 200MB (Base) = 3.8GB = **3,800MB**.
    - **Leak per Compilation:** 2MB of graph metadata cached per unique sequence length.
    - **Unique Lengths to OOM:** 3,800MB / 2MB = **1,900 unique lengths**.
    - **Time to OOM:** If 1 unique length arrives per minute, OOM occurs in 1,900 minutes = **31.6 hours**.
