title: Hailo-8 Inference Throughput and Power Efficiency Estimation
scenario: You are deploying a custom object detection model to a Hailo-8 dataflow accelerator for a smart city camera application. The model requires 65 GOPS (Giga Operations) per frame at INT8 precision. The Hailo-8 provides 26 TOPS of INT8 compute at 2.5W and streams activations directly from host memory without local DRAM.
question: What are the theoretical maximum FPS and frames per Joule for the 65 GOPS/frame Hailo-8 detector?
details:
  realistic_solution: First, convert the theoretical peak compute from TOPS to GOPS to match the model's requirements. Then, divide the total available operations per second by the operations required per frame to find the maximum theoretical FPS. Finally, divide this FPS by the power consumption in Watts (which is equivalent to Joules per second) to determine the energy efficiency.
  common_mistake: |
    **The Pitfall:** Failing to align compute units (TOPS to GOPS) or misunderstanding Watts as Joules/second.
    **The Rationale:** Candidates struggle with unit conversions or forget the lack of local DRAM bottlenecks theoretical limits.
    **The Consequence:** Calculating completely erroneous frame rates or power efficiencies.
  napkin_math: |
    * Compute conversion: 26 TOPS = 26,000 GOPS
    * Theoretical throughput: 26,000 GOPS / 65 GOPS/frame = 400 FPS
    * Power efficiency: 400 frames/sec / 2.5 Watts (Joules/sec) = 160 frames/Joule
    * **Theoretical maximum is 400 FPS and 160 frames per Joule.**
