title: On-Device Demographic Parity for Pedestrian Intention
scenario: You are deploying a pedestrian intention prediction model on an autonomous delivery robot powered
  by an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The system monitors its own fairness
  by running an attribute classifier alongside the main model. Over a 1-hour window (108,000 frames),
  adults appear in 80,000 frames and children in 28,000 frames. The model predicts 'intent to cross' for
  adults in 16,000 frames and for children in 7,000 frames. Calculate the Demographic Parity Difference.
  Additionally, if the fairness attribute classifier consumes 0.5% of the Orin's INT8 compute capacity,
  quantify this overhead.
details:
  realistic_solution: The correct approach calculates the positive prediction rate (selection rate) for
    each demographic group independently and then finds the absolute difference between them. Since Demographic
    Parity only considers the predicted outcomes and group membership, ground-truth labels are not required.
    The compute overhead is found by directly multiplying the percentage by the Jetson Orin's total TOPS.
  common_mistake: Candidates often mix up Demographic Parity with Equalized Odds, attempting to incorporate
    true ground-truth labels into the calculation instead of just the model's positive prediction rates.
    They may also struggle to quickly execute the hardware compute percentage calculation.
  napkin_math: '1. Adult selection rate: 16,000 predicted positive / 80,000 total adults = 0.20 (20%).

    2. Child selection rate: 7,000 predicted positive / 28,000 total children = 0.25 (25%).

    3. Demographic Parity Difference: |0.20 - 0.25| = 0.05 (5%).

    4. Compute overhead: 0.5% of 275 TOPS = 0.005 * 275 = 1.375 TOPS.'
