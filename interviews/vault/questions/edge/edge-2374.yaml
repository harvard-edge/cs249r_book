title: Triton Dynamic Batching on Edge
scenario: A Jetson AGX Orin hosts three independent models (Detection, Tracking, Re-ID) for retail analytics, currently suffering from CUDA context switching overhead.
question: How would you design a multi-tenant serving architecture using NVIDIA Triton to allocate GPU memory effectively and implement dynamic batching?
details:
  realistic_solution: 'Deploy a single Triton Inference Server instance to manage all three models, eliminating CUDA context thrashing between independent Python processes. Enable Triton''s dynamic batcher with a 15ms window on the Re-ID model to gather concurrent crops from the detector into a single efficient batched matrix multiply.'
  common_mistake: Spinning up three separate PyTorch inference scripts without considering shared memory device constraints, causing severe memory fragmentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin memory = 64 GB
    - OS/Video Buffer reservation = 10 GB
    - 3 independent models

    **Calculations:**
    - Available memory = 64 GB - 10 GB = 54 GB
    - Max memory per model = 54 GB / 3 = 18 GB

    **Conclusion & Interpretation:**
    - **Result: 18 GB per model (Memory-Capacity-Bound)**. Centralized Triton serving eliminates context thrashing and safely maps individual model instances into shared unified memory.
