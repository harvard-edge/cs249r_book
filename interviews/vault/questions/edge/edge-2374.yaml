title: Triton Dynamic Batching on Edge
scenario: A Jetson AGX Orin hosts three independent models (Detection, Tracking, Re-ID)
  for retail analytics, currently suffering from CUDA context switching overhead.
question: Design a multi-tenant serving architecture using NVIDIA Triton to allocate
  GPU memory effectively and implement dynamic batching.
details:
  realistic_solution: 'Deploy a single Triton Inference Server instance to manage
    all three models, eliminating CUDA context thrashing between independent Python
    processes. Allocate memory carefully: 10GB for OS/video buffer, and roughly 15GB
    pinned per model. Enable Triton''s dynamic batcher with a 15ms window on the Re-ID
    model to gather concurrent crops from the detector into a single efficient batched
    matrix multiply.'
  common_mistake: Spinning up 3 separate PyTorch inference scripts, causing memory
    fragmentation and high context-switching overhead on a unified memory device.
  napkin_math: Orin 64GB - 10GB OS = 54GB available. 54GB / 3 models = 18GB max per
    model.
