title: Optimizing Object Detection Latency and Throughput on Hailo-8 with Advanced Batching Strategies
scenario: A company is developing a next-generation smart surveillance camera powered by an edge AI processor. The camera is designed to perform real-time object detection on multiple high-definition video feeds simultaneously. The primary performance requirements are minimizing end-to-end latency for detecting critical events (e.g., within 50ms) while maximizing the number of concurrent video streams processed per device (throughput). Your team needs to design an inference pipeline that leverages the accelerator's capabilities efficiently, focusing on batching strategies.
question: How would you use static, dynamic, and continuous batching to balance 50 ms critical-event latency with maximum multi-stream throughput?
details:
  realistic_solution: An L5 engineer would propose a hybrid batching strategy tailored to the HW's dataflow architecture. This might involve a small, fixed static batch size for the most critical, low-latency paths, combined with a dynamic or continuous batching mechanism for background inference tasks or when higher throughput can tolerate slightly increased latency. The solution would include a sophisticated scheduling policy that monitors incoming frame rates, utilization, and queue depths.
  common_mistake: |
    **The Pitfall:** An over-reliance on static batching without considering variable arrival rates.
    **The Rationale:** Candidates ignore the dynamic system load, leading to latency spikes while waiting for a full batch.
    **The Consequence:** Increased latency under low load or under-utilization under high load, violating the 50ms real-time constraints.
  napkin_math: |
    * Assume single image inference (T_inf_single) = 5ms, Pre/Post Overhead = 10ms.
    * Static Batching (B=1): Latency = 15ms, Throughput = 1/15 inf/ms.
    * Static Batching (B=4, linear scaling): Latency = 10ms + 20ms = 30ms, Throughput = 4/30 inf/ms.
    * Dataflow HW Advantage: Batch inference scales sub-linearly.
    * If T_inf_batch(4) = 15ms:
    * **Optimized Latency = 10ms + 15ms = 25ms, Throughput = 4/25 inf/ms.**
