title: 'Flash Attention on Jetson Orin: SRAM vs DRAM Tiling'
scenario: You're deploying a ViT-Large model (1024 patch tokens, d=1024) on Jetson
  Orin (32GB LPDDR5, 275 TOPS INT8, 60W) for satellite imagery analysis. Standard
  attention runs at 4 FPS; the target is 10 FPS. LPDDR5 bandwidth is 204GB/s (much
  lower than HBM). Flash Attention is not available via TensorRT for this model.
question: How would you speed up ViT-Large attention from 4 FPS to 10 FPS on Jetson
  Orin without TensorRT Flash Attention?
details:
  realistic_solution: 'Implement custom CUDA kernel with tiles sized to fit in Jetson''s
    40KB shared memory per SM. For ViT: d=1024, tile B_r=32, B_c=32 → tile memory
    = (32*1024 + 32*1024 + 32*1024) * 2 = 192KB → too large. Use d=64 per head split
    or B_r=16, B_c=16 → 48KB. Alternatively, apply linear attention approximation
    (Performer) which removes the N^2 scaling entirely.'
  common_mistake: Implementing Flash Attention in CUDA without accounting for Jetson
    Orin's Ampere architecture (Orin uses Ampere GPU cores). Jetson Orin lacks the
    HBM memory system; LPDDR5's lower bandwidth makes IO-aware attention even more
    critical, but tile sizes must be recalculated for L2/shared memory.
  napkin_math: 'ViT-Large, N=1024 patches, d=1024, 16 heads (d_head=64). Standard
    attention per layer: QK^T = 1024*1024*64*2 = 128MB read/write. 16 layers: 2GB
    HBM traffic. At LPDDR5 204GB/s: 2GB/204GB/s = 9.8ms just for attention reads.
    Target 10 FPS = 100ms/frame. Attention takes ~10% of budget with Flash Attention;
    standard attention takes ~50%. Flash Attention 5x reduction in DRAM traffic: 2GB
    → 400MB → 2ms, freeing 7.8ms for other ops.'
