title: 'Flash Attention on Jetson Orin: SRAM vs DRAM Tiling'
scenario: You're deploying a ViT-Large model (1024 patch tokens, d=1024) on Jetson Orin for satellite imagery analysis. Standard attention runs at 4 FPS; the target is 10 FPS. Flash Attention is not available via TensorRT for this model.
question: How would you speed up ViT-Large attention from 4 FPS to 10 FPS on Jetson Orin without TensorRT Flash Attention?
details:
  realistic_solution: 'Implement custom CUDA kernel with tiles sized to fit in Jetson''s 40KB shared memory per SM. For ViT: d=1024, tile B_r=32, B_c=32 -> tile memory = (32*1024 + 32*1024 + 32*1024) * 2 = 192KB -> too large. Use d=64 per head split or B_r=16, B_c=16 -> 48KB. Alternatively, apply linear attention approximation (Performer) which removes the N^2 scaling entirely.'
  common_mistake: |
    **The Pitfall:** Implementing Flash Attention in CUDA without accounting for Jetson Orin's Ampere architecture.
    **The Rationale:** Candidates often assume server-grade HBM properties and tile sizes when writing custom kernels for edge devices.
    **The Consequence:** Tile sizes exceed the 40KB shared memory per SM on Jetson Orin, causing register spilling and performance worse than standard attention.
  napkin_math: |
    1. **Model Dimensions**: N=1024 patches, d=1024, 16 heads (d_head=64).
    2. **Standard Attention Traffic per layer**: Reading Q, K, V and writing/reading intermediate N x N matrices (QK^T and softmax) takes ~128MB of traffic.
    3. **Total Traffic**: 16 layers * 128MB = ~2GB HBM/DRAM traffic.
    4. **Latency without Flash Attention**: At LPDDR5 204GB/s, 2GB / 204GB/s = 9.8ms just for attention memory movement.
    5. **Target**: 10 FPS = 100ms/frame budget.
    6. **Flash Attention Speedup**: 5x reduction in DRAM traffic (2GB -> 400MB).
    7. **Final Latency**: 400MB / 204GB/s = **~2ms per frame**, freeing ~7.8ms for other operations.
