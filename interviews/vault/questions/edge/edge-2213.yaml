title: Edge DMA Transfer Contract
scenario: A camera pipeline uses DMA from sensor to host memory, then accelerator DMA from host to device memory.
question: What DMA transfer contract is needed to avoid extra copies in an edge camera-to-accelerator pipeline?
details:
  realistic_solution: The contract should specify buffer ownership, alignment, stride, pixel format, lifetime, cache coherency, synchronization fences, maximum transfer time, and fallback path. It should make explicit whether the sensor buffer can be passed directly to the accelerator or must be reformatted.
  common_mistake: |
    **The Pitfall:** Assuming DMA always means zero-copy.
    **The Rationale:** Engineers assume that if hardware DMA handles the transfer, it requires no CPU involvement, ignoring format mismatches.
    **The Consequence:** Hidden CPU copies occur due to misaligned formats or cache state boundaries, destroying performance.
  napkin_math: |
    1. **Copy Penalty:** If a 6 MB frame must be reformatted by the CPU at 3 GB/s, the copy alone costs 2 ms.
    2. **Throughput Loss:** At 30 FPS, this hidden copy burns **60 ms of CPU time every second** before ML processing even begins.
