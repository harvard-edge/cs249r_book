title: Edge DMA Transfer Contract
scenario: A camera pipeline uses DMA from sensor to host memory, then accelerator DMA from host to device memory.
question: What DMA transfer contract is needed to avoid extra copies in an edge camera-to-accelerator pipeline?
details:
  realistic_solution: The contract should specify buffer ownership, alignment, stride, pixel format, lifetime, cache coherency, synchronization fences, maximum transfer time, and fallback path. It must strictly mandate Zero-Copy DMA pipelines where the sensor buffer is passed directly to the accelerator via shared dmabuf pointers.
  common_mistake: |
    **The Pitfall:** Assuming DMA always means zero-copy.
    **The Rationale:** Engineers assume that if hardware DMA handles the transfer, it requires no CPU involvement, ignoring format or alignment mismatches.
    **The Consequence:** Hidden CPU copies occur due to misaligned formats or cache state boundaries, destroying performance and starving the accelerator.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame size: 6 MB.
       - CPU memory bandwidth: 3 GB/s.
    2. **Calculations:**
       - Single CPU Copy Penalty: 6 MB / 3 GB/s = 2 ms per frame.
       - Pipeline Throughput Loss (30 FPS): 2 ms * 30 = 60 ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound**. Without strict zero-copy DMA, the hidden formatting copy burns 60 ms of CPU time every second before ML processing even begins.
