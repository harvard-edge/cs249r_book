title: Edge DMA Transfer Contract
scenario: A camera pipeline uses DMA from sensor to host memory, then accelerator
  DMA from host to device memory. Specify the transfer contract needed to avoid copies
  and deadline misses.
question: What DMA transfer contract is needed to avoid extra copies in an edge camera-to-accelerator
  pipeline?
details:
  realistic_solution: The contract should specify buffer ownership, alignment, stride,
    pixel format, lifetime, cache coherency, synchronization fences, maximum transfer
    time, and fallback path. It should make explicit whether the sensor buffer can
    be passed directly to the accelerator or must be reformatted.
  common_mistake: Assuming DMA means zero-copy even when formats, cache state, or
    ownership boundaries force a CPU copy.
  napkin_math: If a 6 MB frame must be copied by CPU at 3 GB/s, the copy alone costs
    2 ms; at 30 FPS that is 60 ms/s of CPU time before processing.
