title: Evaluate hardware encoding to resolve disk bandwidth bottlenecks on edge
scenario: A Jetson AGX Orin captures uncompressed 1080p RGB video at 30 FPS. Writing
  this data directly to a slow mechanical HDD (100 MB/s write limit) is causing frames
  to be dropped before inference runs.
question: Evaluate whether a hardware H.265 compression step before the disk write
  will resolve the bottleneck, assuming 100:1 compression.
details:
  realistic_solution: Uncompressed 1080p at 30 FPS generates ~186.6 MB/s (1920x1080x3x30).
    The HDD maxes at 100 MB/s, causing drops. With H.265 at 100:1, the data rate drops
    to ~1.86 MB/s. The Orin's dedicated hardware encoder easily compresses this real-time
    without stealing AI compute, completely eliminating the HDD write bottleneck.
  common_mistake: Believing that adding a compression step will slow down the pipeline
    by confusing CPU-based encoding latency with dedicated hardware encoding throughput.
  napkin_math: 186.6 MB/s / 100 = 1.86 MB/s << 100 MB/s disk limit
