title: Orin 4K Memory Bandwidth
scenario: A Jetson AGX Orin writes 4K (3840x2160) RGB video to memory at 60 fps.
question: Calculate the percentage of total memory bandwidth consumed by writing these frames against the LPDDR5 limit (204.8 GB/s).
visual:
  kind: svg
  path: edge-2368.svg
  alt: Bar chart comparing massive 204.8 GB/s capacity against tiny 1.5 GB/s camera write.
  caption: Camera write bandwidth vs total LPDDR5 capacity.
details:
  realistic_solution: A single 4K RGB888 frame requires 3840 x 2160 x 3 bytes (24.88 MB). At 60 FPS, the memory controller must sustain a write throughput of ~1.49 GB/s. Compared to the Orin's theoretical 204.8 GB/s LPDDR5 bandwidth, this consumes just 0.72%, leaving ample headroom for concurrent NPU/GPU memory transactions.
  common_mistake: |
    **The Pitfall:** Forgetting the 3 bytes for RGB channels and calculating only the pixel count.
    **The Rationale:** Basic math errors under pressure or forgetting that standard 4K video is multi-channel.
    **The Consequence:** Underestimating the required memory bandwidth by 3x.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 4K (3840 x 2160 pixels)
    - Format: RGB (3 bytes per pixel)
    - Target Framerate: 60 FPS
    - Total Memory Bandwidth: 204.8 GB/s

    **Calculations:**
    - Bytes per frame = 3840 * 2160 * 3 = 24,883,200 bytes (~24.88 MB)
    - Write throughput = 24.88 MB/frame * 60 FPS = 1,493 MB/s (~1.49 GB/s)
    - Bandwidth percentage = (1.49 GB/s / 204.8 GB/s) * 100 = 0.72%

    **Conclusion & Interpretation:**
    - **Result: 0.72% (Compute-Bound)**. System is highly compute-bound for other tasks; video I/O is a trivial fraction of total memory bandwidth.
