title: Orin 4K Memory Bandwidth
scenario: A Jetson AGX Orin writes 4K (3840x2160) RGB video to memory at 60 fps. The
  LPDDR5 bandwidth limit is 204.8 GB/s.
question: Calculate the percentage of total memory bandwidth consumed by writing these
  frames.
visual:
  kind: svg
  path: edge-2368.svg
  alt: Bar chart comparing massive 204.8 GB/s capacity against tiny 1.5 GB/s camera
    write.
  caption: Camera write bandwidth vs total LPDDR5 capacity.
details:
  realistic_solution: One 4K RGB frame = 3840 * 2160 * 3 bytes (RGB) = 24,883,200
    bytes (~24.88 MB). At 60 fps, throughput = 24.88 MB * 60 = 1,493 MB/s (~1.49 GB/s).
    Percentage = 1.49 / 204.8 = 0.72%.
  common_mistake: Forgetting the 3 bytes for RGB channels and calculating only the
    pixel count.
  napkin_math: 3840*2160*3*60 = 1.49 GB/s. 1.49 / 204.8 = 0.72%
