title: The OTA Update Budget
scenario: You're an engineer for an automotive company deploying a critical OTA (Over-the-Air) update. The update includes a new perception model with 50 million parameters, which will be deployed in a container. The model requires FP16 precision.
question: How do you calculate the FP16 model weight size for 50M parameters, and what is the total download size with a 150 MB container base?
details:
  realistic_solution: The correct approach is to calculate the model size based on its parameter count and precision, then add the size of the container base. Each parameter in FP16 precision requires 2 bytes of storage. Therefore, a 50 million parameter model needs 100 MB for its weights. Adding the 150 MB container base results in a total update size of 250 MB.
  common_mistake: |
    **The Pitfall:** Calculating FP16 parameter sizes using 1 byte or 4 bytes per parameter.
    **The Rationale:** Engineers confuse FP16 precision (2 bytes) with INT8 (1 byte) or FP32 (4 bytes) during back-of-the-napkin estimates.
    **The Consequence:** Severely underestimating or overestimating the total required bandwidth and flash storage limits for the OTA update.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Model parameters: 50,000,000.
       * Precision: FP16 (2 bytes per parameter).
       * Container Base Size: 150 MB.
    2. **Calculations:**
       * Model Weights Size = 50,000,000 params * 2 bytes/param = 100,000,000 bytes.
       * Convert to MB: 100,000,000 bytes / (1000 * 1000 bytes/MB) = 100 MB.
       * Total Update Size = 100 MB (model) + 150 MB (container) = 250 MB.
    3. **Conclusion & Interpretation:**
       **Result: 250 MB**. Properly accounting for FP16 memory density and container overhead dictates the actual required OTA download size.
  options:
  - 200 MB
  - 100 MB
  - 250 MB
  - 350 MB
  correct_index: 2
