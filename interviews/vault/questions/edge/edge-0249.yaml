title: The Federated Fleet's Data Bill
scenario: You are the systems architect for a fleet of 100,000 autonomous delivery robots. The primary operational cost at scale is the cellular data transmission for sending data back to the cloud. To continuously improve your perception models, you must gather data from the fleet.
question: Which of the following daily data collection strategies results in the highest data cost?
details:
  realistic_solution: Uploading 500MB of raw camera images per robot daily results in the highest cost. At fleet scale, the total data volume (50 TB/day) dominates all other options, directly translating to the highest operational expenditure for cellular data. This massive cost is a primary economic driver for adopting communication-efficient techniques like Federated Learning.
  common_mistake: |
    **The Pitfall:** Underestimating the sheer volume of raw sensor data compared to model gradients or logs.
    **The Rationale:** Engineers might incorrectly assume that 'model stuff' (gradients) is always the heaviest data load, given the complexity of deep learning.
    **The Consequence:** Selecting a data collection strategy that dramatically overshoots the cellular budget, leading to massive cost overruns.
  napkin_math: |
    * Fleet size: 100,000 robots.
    * Option 0: 10 MB * 100,000 = 1 TB/day.
    * Option 1: 500 MB * 100,000 = 50 TB/day.
    * Option 2: 1 MB * 100,000 = 100 GB/day.
    * Option 3: 1 GB * 1,000 (1%) = 1 TB/day.
    * **50 TB/day is clearly the highest cost.**
  options:
  - Uploading 10MB of model gradients per robot via Federated Learning.
  - Uploading 500MB of raw camera images per robot for central training.
  - Uploading 1MB of summary statistics per robot from on-device analytics.
  - Triggering a 'debug dump' on 1% of the fleet, uploading a 1GB snapshot from each.
  correct_index: 1
