title: 'Dataset Curation: Design On-Device Data Collection Pipeline for Edge Models'
scenario: You are building a federated data collection system for fine-tuning object detection models
  deployed on 10,000 Jetson Orin devices (32GB LPDDR5, 275 TOPS INT8, 60W). Each device captures 100 images/day
  in industrial settings. Design the on-device quality filtering and upload pipeline that maximizes data
  quality while respecting bandwidth and compute constraints.
details:
  realistic_solution: 'On-device: (1) Blur detection (Laplacian variance, CPU, 1ms/image) → discard if
    < 100. (2) Duplicate detection (perceptual hash, 2ms/image) → discard if hamming distance < 8 to last
    24h. (3) Confidence-based sampling: run detector, upload if confidence 0.3-0.7 (uncertain cases most
    valuable). Target: upload 20% of images.'
  common_mistake: Uploading all raw images without on-device filtering, overwhelming upload bandwidth;
    or running heavy quality filters that drain battery.
  napkin_math: '10K devices × 100 images/day × 20% upload = 200K images/day. Each image: 1920×1080×3 =
    6.2MB raw. JPEG compress 20:1 = 310KB. Upload: 200K × 310KB = 62GB/day across all devices. Per device:
    20 images × 310KB = 6.2MB/day upload. At LTE 10Mbps: 5 seconds/day of bandwidth. On-device filtering:
    100 images × 3ms/image = 300ms/day compute — negligible for Jetson Orin at 275 TOPS.'
