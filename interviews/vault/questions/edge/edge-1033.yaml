title: 'Dataset Curation: Evaluate Active Learning Strategies for Edge-Deployed Models'
scenario: Your object detection model runs on Jetson Orin at 200 inference/sec. You want to implement active learning to select which images to upload for labeling.
question: How would you compare entropy, margin, and random image selection for active learning on the 200 inference/sec Jetson Orin detector?
details:
  realistic_solution: Entropy and margin require only the softmax output (already computed during inference). Both add < 0.1ms overhead. Random selection is faster but wastes labels on easy examples. Entropy-based typically selects 3-5× more informative samples per label dollar.
  common_mistake: |
    **The Pitfall:** Implementing complex ensemble-based uncertainty estimation on edge devices.
    **The Rationale:** Candidates borrow state-of-the-art active learning methods from academic research without considering edge compute constraints.
    **The Consequence:** The heavy computational burden of running multiple models (ensembles) destroys the real-time inference framerate, making the system unusable in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference Rate: 200 inference/sec (5ms per frame).
       - Entropy calculation: 80 COCO classes.
    2. **Calculations:**
       - Entropy Overhead: 80 operations at 240MHz SIMD = ~0.01ms.
       - Margin Overhead: max - second_max = <0.01ms.
       - Relative Compute Cost: 0.01ms / 5ms = 0.2% compute overhead.
       - Label Efficiency: Entropy hits equivalent performance with 20% of labels compared to random selection.
    3. **Conclusion & Interpretation:**
       - **Result: 0.2% Compute Overhead**. The ultra-low latency cost of softmax-based entropy allows a 3x label efficiency gain without impacting the 200 fps pipeline.
