title: Hailo-8 INT8 FPS and Energy Estimation
scenario: We are deploying an edge computer vision pipeline on a gateway equipped with a Hailo-8 accelerator. The primary model is an INT8 object detector that requires 52 GOPs (Giga Operations) per frame. Given the Hailo-8's theoretical peak performance of 26 TOPS and its 2.5W typical power envelope, assume 100% compute utilization.
question: What are the theoretical maximum FPS and energy per frame for the 52 GOPs detector on the 2.5W Hailo-8?
details:
  realistic_solution: First, align the units by converting 26 TOPS to 26,000 GOPs. Dividing this by the model's 52 GOPs per frame yields a theoretical maximum throughput of 500 FPS. For the energy cost, we divide the 2.5W active power by the 500 FPS throughput, resulting in 0.005 Joules, or 5 mJ per frame. While this establishes a hard theoretical upper bound, a complete engineering answer notes that actual FPS will be lower due to host PCIe streaming constraints.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with MACs or struggling to convert Watts to energy per frame.
    **The Rationale:** Candidates forget that 1 MAC equals 2 Operations, and misunderstand the relationship between Power (Joules/sec) and Energy (Joules).
    **The Consequence:** Frame rate projections and battery life estimations are completely incorrect.
  napkin_math: |
    * Convert peak compute: 26 TOPS = 26,000 GOPs/sec.
    * Calculate Max FPS: 26,000 GOPs/sec / 52 GOPs/frame = **500 FPS.**
    * Calculate Energy/Frame: Power = 2.5W = 2.5 Joules/sec.
    * Energy/Frame = (2.5 Joules/sec) / (500 frames/sec) = 0.005 Joules = **5 mJ.**
