title: Hailo-8 INT8 FPS and Energy Estimation
scenario: We are deploying an edge computer vision pipeline on a gateway equipped
  with a Hailo-8 accelerator. The primary model is an INT8 object detector that requires
  52 GOPs (Giga Operations) per frame. Given the Hailo-8's theoretical peak performance
  of 26 TOPS and its 2.5W typical power envelope, calculate the theoretical maximum
  frame rate (FPS) and the energy consumed per frame at this maximum throughput. Assume
  100% compute utilization for this theoretical estimate.
question: What are the theoretical maximum FPS and energy per frame for the 52 GOPs
  detector on the 2.5W Hailo-8?
details:
  realistic_solution: First, align the units by converting 26 TOPS to 26,000 GOPs.
    Dividing this by the model's 52 GOPs per frame yields a theoretical maximum throughput
    of 500 FPS. For the energy cost, we divide the 2.5W active power by the 500 FPS
    throughput, resulting in 0.005 Joules, or 5 mJ per frame. While this establishes
    a hard theoretical upper bound, a complete engineering answer notes that actual
    FPS will be lower due to host PCIe streaming constraints.
  common_mistake: Candidates often confuse TOPS with MACs, forgetting that 1 MAC equals
    2 Operations. They also frequently struggle to convert watts (Joules/second) into
    energy per frame (Joules/frame), and often fail to mention that the lack of local
    DRAM on the Hailo-8 means host memory streaming will heavily throttle this theoretical
    100% utilization in practice.
  napkin_math: '1. Convert peak compute: 26 TOPS = 26,000 GOPs/sec. 2. Calculate Max
    FPS: 26,000 GOPs/sec / 52 GOPs/frame = 500 FPS. 3. Calculate Energy/Frame: Power
    = 2.5W = 2.5 Joules/sec. Energy/Frame = (2.5 Joules/sec) / (500 frames/sec) =
    0.005 Joules = 5 millijoules (mJ).'
