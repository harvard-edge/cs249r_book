title: Hailo-8 VRAM Budgeting for Edge LLM Inference
scenario: An automotive company is deploying an on-device conversational AI agent on a Hailo-8 edge AI accelerator (26 TOPS INT8, 2.5W). The initial deployment is encountering frequent out-of-memory errors and unexpected latency spikes.
question: How would you budget and optimize weights, activations, and KV-cache on Hailo-8 to stop OOMs and meet sub-100 ms conversational inference?
details:
  realistic_solution: Implement aggressive memory budgeting to manage the dynamic footprint. Apply FlashAttention-2 or Multi-Query Attention (MQA) to drastically compress the memory footprint of the autoregressive KV-cache. Quantize static weights to INT8, but meticulously profile the peak intermediate activations during the forward pass, employing activation recomputation (checkpointing) or layer fusion to prevent OOMs. Constrain the maximum sequence length to strictly guarantee the KV-cache remains within the hardware's strict SRAM boundaries.
  common_mistake: |
    **The Pitfall:** Sizing the system architecture strictly based on static model parameter counts (weights).
    **The Rationale:** Candidates forget that Transformer architectures autoregressively build an unbounded KV-cache and generate massive intermediate activation tensors during the prefill phase.
    **The Consequence:** The system fits in memory during offline testing but immediately crashes with hard OOM faults in production as the conversation context window expands.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 15M INT8 parameters.
       - Sequence: 256 tokens, Batch size 1, 4 layers, 4 heads, head dim 64.
       - Datatype: FP16 for KV-Cache (2 bytes per value).
    2. **Calculations:**
       - Weight Memory = 15,000,000 * 1 byte = 15 MB.
       - KV-Cache Footprint = 4 (layers) * 4 (heads) * 256 (tokens) * 64 (dim) * 2 (K&V) * 2 bytes = 1,048,576 bytes = 1 MB.
       - Peak Activations (Estimate) = ~10 MB for forward pass intermediates.
       - Total Memory Required = 15 MB + 1 MB + 10 MB = 26 MB.
    3. **Conclusion & Interpretation:**
       - **Result: ~26 MB total footprint. The system is Memory-Capacity-Bound; failing to account for the 11 MB of dynamic cache/activations guarantees an OOM on constrained edge devices.**
