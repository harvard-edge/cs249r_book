title: 'Edge Queueing Theory Specification: Multi-Tenant Edge Inference SLO'
scenario: Specify SLOs and queuing policies for a shared Jetson Orin (275 TOPS INT8, 60W) serving 3 tenants: Tenant A (safety-critical, 20 req/s, P99<10ms), Tenant B (analytics, 50 req/s, P99<100ms), Tenant C (background training jobs, 5 req/s, P99<5000ms). Total lambda=75 req/s.
question: What priority levels and queueing policy should the shared Jetson Orin use for tenants A, B, and C, and do their P99 SLOs hold?
details:
  realistic_solution: |
    Three-level priority: A=high, B=medium, C=low. Preemptive priority scheduling. Model A must be optimized to < 2ms service to meet the P99 SLO.
  common_mistake: |
    **The Pitfall:** Using a single FIFO queue for all tenants.
    **The Rationale:** Defaulting to simple server queue logic without accounting for strict safety-critical latency limits.
    **The Consequence:** Tenant A is blocked behind Tenant B's and C's larger workloads, violently violating its P99 < 10ms SLO.
  napkin_math: |
    - **Arrival Rates:** A = 20/s, B = 50/s, C = 5/s.
    - **Service Times:** A = 5ms, B = 8ms, C = 100ms.
    - **Service Rates (mu):** A = 200/s, B = 125/s, C = 10/s.
    - **Utilization (rho):** A = 0.1, B = 0.4, C = 0.5. Total = 1.0 (At capacity!). Reduce C to 4/s -> rho_C = 0.4.
    - **Priority Queue Wq_A:** rho_A / (mu_A * (1 - rho_A)) = 0.1 / (200 * 0.9) = 0.556 ms.
    - **P99_A:** 4.6 * (0.556 + 5) ms = 25.6 ms.
    - **The Failure:** 25.6 ms violates the 10 ms SLO. Tenant A's model must be optimized to < 2 ms service time to meet the SLA.
