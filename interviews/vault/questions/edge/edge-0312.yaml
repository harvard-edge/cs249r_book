title: The Fleet's Cellular Bill
scenario: 'You''re an engineer on an autonomous vehicle team, tasked with evaluating the data transmission costs for a new driver drowsiness detection feature. The fleet consists of 100,000 vehicles. Your team is comparing two approaches.'
question: "For 100,000 vehicles, what are the daily cellular costs of uploading 500 MB raw logs versus 10 MB model updates at $0.05/GB?"
details:
  realistic_solution: 'The correct way to solve this is to first calculate the total amount of data generated by the entire fleet per day, then convert that to Gigabytes, and finally multiply by the cost per GB.'
  common_mistake: |
    **The Pitfall:** Failing to convert Megabytes to Gigabytes before multiplying by the cost per GB.
    **The Rationale:** Engineers rush the arithmetic and mismatch the units.
    **The Consequence:** The projected budget is off by a factor of 1000, completely invalidating the cost-benefit analysis.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000 vehicles.
       - Centralized payload: 500 MB/day per vehicle.
       - Federated payload: 10 MB/day per vehicle.
       - Cellular cost: $0.05/GB.
    2. **Calculations:**
       - Centralized data: 100,000 * 500 MB = 50,000,000 MB = 50,000 GB/day.
       - Centralized cost: 50,000 GB * $0.05 = $2,500/day.
       - Federated data: 100,000 * 10 MB = 1,000,000 MB = 1,000 GB/day.
       - Federated cost: 1,000 GB * $0.05 = $50/day.
    3. **Conclusion & Interpretation:**
       - **Result: $2,450 Daily Savings**. Federated Learning slashes data volume by 50x, effectively bypassing the cellular bandwidth cost trap.
  options:
  - $5,000 (Calculated Trap)
  - $50,000 (Calculated Trap)
  - $2,500 vs $50
  - $5 (Calculated Trap)
  correct_index: 2
