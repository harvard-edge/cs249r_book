title: Knowledge Distillation for Hailo-8 Dataflow
scenario: You are tasked with deploying a real-time object detection model onto a dataflow edge AI accelerator. The accelerator provides 26 TOPS at INT8 precision but has no local DRAM and relies entirely on streaming weights and activations from the host memory. The original float32 teacher model is too large to stream efficiently.
question: How would you design the student model and distillation process given its INT8 dataflow execution and no local DRAM?
details:
  realistic_solution: The specification should mandate a student architecture built exclusively from Hailo-supported operations that fuse well in its dataflow compiler, minimizing host memory roundtrips. The distillation process should use pure logit matching rather than intermediate feature matching, giving the student topological freedom to fit the spatial dataflow paradigm. Furthermore, the pipeline must incorporate quantization-aware training (QAT) to ensure the final INT8 student maximizes the 26 TOPS compute capacity while strictly adhering to the streaming memory limits.
  common_mistake: |
    **The Pitfall:** Proposing complex feature-based distillation matching intermediate activation maps.
    **The Rationale:** Candidates ignore the lack of local DRAM on the target hardware.
    **The Consequence:** The student model fails to optimize for INT8 dataflow execution and minimal memory bandwidth.
  napkin_math: |
    - Budget for 60 FPS: 16.6ms per frame.
    - Stream 10MB INT8 model over 4 GB/s host interface: $10MB / 4000 MB/s = 2.5ms$.
    - Remaining compute time: $16.6ms - 2.5ms = 14.1ms$.
    - Peak compute available: 26 TOPS * 0.0141s = **366 GOPS**.
