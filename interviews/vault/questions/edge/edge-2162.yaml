title: Inference Latency Spikes During OTA
scenario: A predictive maintenance sensor uses a Cortex-M7 (480 MHz, 512 KB SRAM) and a single 4 MB external NOR flash chip. The flash uses an A/B partition scheme, storing active firmware in Partition A and inactive firmware in Partition B. The ML model weights (1.5 MB) are read directly from Partition A during the inference loop, which normally completes in 15ms. During an OTA update, the device writes the new image to Partition B in 4 KB sectors, where each sector erase/write cycle locks the flash for 40ms.
question: Why do Cortex-M7 inference latencies spike from 15ms to exactly 55ms during OTA writes to the inactive flash partition?
details:
  realistic_solution: |
    Standard external NOR flash cannot perform read operations while a write/erase operation is ongoing (unless it has expensive Read-While-Write support). Because the 1.5 MB model exceeds the 512 KB SRAM, weights must be fetched directly from flash during inference via Execute-in-Place (XIP). When the OTA task initiates a 40ms write to Partition B, any concurrent memory read from Partition A stalls the CPU bus until the flash operation completes.
  common_mistake: |
    **The Pitfall:** Attributing the latency to CPU starvation, RTOS thread priority, or network overhead.
    **The Rationale:** Software engineers instinctively look for scheduling issues rather than hardware bus contention.
    **The Consequence:** Wasting time tuning RTOS priorities when the physical NOR flash simply cannot read and write simultaneously.
  napkin_math: |
    - **Normal Inference Time:** 15 ms.
    - **Flash Sector Write Time:** 40 ms.
    - **Worst-case Stall:** The CPU bus stalls completely during the 40ms write.
    - **Spiked Latency:** 15 ms + 40 ms = **55 ms**.
