title: Canary Rollout CPU Fallback Degradation
scenario: You are conducting a canary rollout of an updated INT8 object detection model to 5% of a fleet
  of remote cameras, each equipped with a Google Coral Edge TPU via PCIe. Shortly after the progressive
  rollout begins, telemetry from the canary group shows that inference latency has increased dramatically
  and host CPUs are reporting thermal warnings. The model was successfully quantized to INT8, and the
  previous model version continues to run perfectly on the remaining 95% of the fleet within the 2W power
  envelope. What is the root cause of this deployment failure?
question: "What is the root cause of this deployment failure?"
details:
  realistic_solution: The root cause is that the updated model architecture includes an operation (e.g.,
    an unsupported activation function or unfused layer) that is not supported by the Google Coral Edge
    TPU compiler. Although the model is properly quantized to INT8, unsupported operations cause the Edge
    TPU to delegate that specific layer and all subsequent operations back to the host CPU via PCIe. This
    fallback completely eliminates the latency advantage of the TPU's 4 TOPS and significantly increases
    host power draw, leading to the observed thermal warnings and latency spikes.
  common_mistake: Candidates often blame network bandwidth during the OTA update, memory leaks in the
    deployment agent, or assume the INT8 quantization itself failed. They frequently miss the hardware-specific
    constraint of limited operator support and the cascading effects of hardware-to-host CPU fallback
    on Edge TPU devices.
  napkin_math: Assume the model requires 4 GOPS of compute. On the Edge TPU (4 TOPS peak, assuming 50%
    efficiency = 2 TOPS), inference takes 4 GOPS / 2000 GOPS/s = 2 ms at 2W. If an unsupported operator
    forces the second half of the model (2 GOPS) to run on a host ARM CPU with an effective INT8 throughput
    of 20 GOPS/s (0.02 TOPS), the CPU portion takes 2 GOPS / 20 GOPS/s = 100 ms. Total latency spikes
    from 2 ms to 102 ms (a 51x increase), and the host CPU power draw spikes, drastically exceeding the
    Edge TPU's 2W envelope and triggering thermal throttling.
