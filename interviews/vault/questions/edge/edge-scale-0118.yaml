title: Edge Drift Alert Spec
scenario: A predictive-maintenance model runs at 40 factories. Some factories have different machine types and duty cycles. Specify a drift alert that separates true model drift from normal site-specific operating patterns.
question: What should an edge drift alert specify to distinguish true drift from normal factory-specific patterns?
details:
  realistic_solution: The alert should define site baselines, machine-type cohorts, minimum sample windows, feature distribution metrics, outcome lag handling, and escalation rules. It should compare each site to its own baseline and to peer cohorts, not only to a global distribution.
  common_mistake: Using one global baseline and flagging every site with a legitimate different duty cycle as drift.
  napkin_math: If Site A normally runs 70% night shifts and Site B runs 10%, a global baseline can make both look anomalous for the wrong reason.
