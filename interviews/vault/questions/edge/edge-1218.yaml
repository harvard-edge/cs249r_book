title: Drift Detection Bottleneck on Dataflow Edge
scenario: A pedestrian detection model runs on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W) attached to a smart city camera. Because the Hailo-8 has no local DRAM, it streams data directly from host memory. To detect data drift, the engineering team enabled continuous Population Stability Index (PSI) monitoring on an intermediate feature map layer. However, enabling this drift detection causes the per-frame inference latency to spike from 10ms to 45ms, even though the host CPU utilization remains low.
question: Why does extracting an intermediate feature map metric cause such a severe latency degradation on a dataflow architecture?
details:
  realistic_solution: The latency spike occurs because extracting an intermediate feature map forces the Hailo-8 to interrupt its efficient, fused dataflow pipeline to stream massive intermediate activations back to host memory over the PCIe bus. Without local DRAM to buffer these tensors, the compute pipeline stalls. Drift detection should instead be performed purely on the low-dimensional final output predictions or by asynchronously sampling raw input frames on the host CPU.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is caused by insufficient compute capacity (TOPS) on the accelerator or a CPU bottleneck.
    **The Rationale:** Engineers often evaluate edge accelerators purely on their TOPS rating, ignoring the critical memory hierarchy and how data actually moves on and off the chip.
    **The Consequence:** Teams waste time optimizing model weights or CPU code, completely missing that the dataflow pipeline has been fundamentally broken by a massive off-chip memory transfer.
  napkin_math: |
    1. **Baseline Speed:** 10ms baseline latency implies a 100 FPS capability.
    2. **Data Transfer:** A 128x128x64 INT8 feature map consumes exactly 1,048,576 bytes (~1 MB).
    3. **Bandwidth Demand:** Extracting this at 100 FPS forces 100 MB/s of continuous off-chip write bandwidth back to the host memory over PCIe.
    4. **Result:** Because the Hailo-8 lacks local DRAM to buffer this, forcing an off-chip write breaks the fused layer pipeline, adding **35ms of synchronization overhead** per frame.
