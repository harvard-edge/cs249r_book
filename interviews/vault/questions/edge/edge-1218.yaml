title: Drift Detection Bottleneck on Dataflow Edge
scenario: 'A pedestrian detection model runs on a Hailo-8 dataflow accelerator attached to a smart city camera. Because the Hailo-8 has no local DRAM, it streams data directly from host memory. To detect data drift, the team enabled continuous Population Stability Index (PSI) monitoring on an intermediate feature map layer. However, enabling this causes the per-frame inference latency to spike from 10ms to 45ms, even though the host CPU utilization remains low.'
question: 'Why does extracting an intermediate feature map metric cause such a severe latency degradation on a dataflow architecture?'
details:
  realistic_solution: 'Extracting an intermediate feature map forces the Hailo-8 to interrupt its efficient, fused dataflow pipeline to stream massive intermediate activations back to host memory over the PCIe bus. Without local DRAM to buffer these tensors, the compute pipeline stalls. Drift detection should be performed purely on low-dimensional final outputs.'
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is caused by insufficient compute capacity on the accelerator or a CPU bottleneck.
    **The Rationale:** Engineers often evaluate edge accelerators purely on their TOPS rating, ignoring the critical memory hierarchy.
    **The Consequence:** Teams waste time optimizing model weights or CPU code, completely missing that the dataflow pipeline has been fundamentally broken by a massive off-chip memory transfer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline 10ms latency (100 FPS).
    - Feature map: 128x128x64 INT8.

    **Calculations:**
    - Data Transfer: 128 * 128 * 64 = 1,048,576 bytes (~1 MB).
    - Bandwidth Demand: 1 MB * 100 FPS = 100 MB/s continuous off-chip write bandwidth over PCIe.

    **Conclusion & Interpretation:**
    - **Result: 35ms of synchronization overhead per frame (Memory-Bandwidth-Bound)**. Forcing an off-chip write breaks the fused dataflow pipeline.
