title: Diagnosing INT8 Quantization Failures from Biased Calibration
scenario: You deployed an object detection model to an NVIDIA Jetson Orin for 24/7 autonomous monitoring.
  To utilize the Ampere GPU and DLA accelerator's combined 275 TOPS INT8 performance and stay under the
  60W TDP, you quantized the FP32 model to INT8. During daytime operations, the model matches the FP32
  accuracy, but at night, predictions become completely erratic despite the FP32 model performing perfectly
  on nighttime validation data. What dataset curation failure caused this hardware-specific symptom?
question: "What calibration dataset curation failure caused the Jetson Orin INT8 model to fail at night while FP32 still works?"
details:
  realistic_solution: The root cause is a biased calibration dataset used during the post-training quantization
    process. The Jetson Orin requires INT8 precision to hit its TOPS targets, which maps floating-point
    activations to a 256-value range. If the curated calibration dataset only contained daytime images,
    the activation scaling factors are strictly optimized for daylight pixel distributions. Nighttime
    images with different luminance and noise profiles cause severe activation clipping in the INT8 layers,
    destroying accuracy. The fix is to re-curate a representative calibration set spanning all operational
    lighting conditions.
  common_mistake: Candidates often misdiagnose this as a general domain shift, thermal throttling, or
    low-light sensor noise, ignoring the clue that the FP32 model works perfectly at night. They fail
    to connect the edge hardware's INT8 requirement to the data curation process.
  napkin_math: INT8 represents values from -128 to 127. If daytime activations span [-5.0, 5.0], the scale
    factor is 5.0/127 = 0.039. If nighttime features shift activations to [0.0, 12.0], the daytime INT8
    configuration clips all values above 5.0, losing 58% of the activation range (7.0 / 12.0). The Orin's
    32 GB LPDDR5 memory easily accommodates a massive 1000-image diverse calibration set (1920x1080x3
    bytes * 1000 = ~6.2 GB in RAM), allowing for accurate MinMax or Entropy calibration without memory
    pressure.
