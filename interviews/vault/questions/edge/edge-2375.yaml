title: Hailo-8 Batching vs Latency
scenario: A Hailo-8 chip (100mW standby, 2.5W active) monitors powerlines. Frames
  arrive at 1 fps. Processing 1 frame takes 10ms.
question: Analyze whether buffering 10 frames into a single batch is more energy-efficient
  than processing each frame individually as it arrives.
details:
  realistic_solution: Processing 1 frame individually takes 10ms at 2.5W, plus 990ms
    at 0.1W, yielding 124mJ per second. Over 10 seconds, this is 1240mJ. Batching
    10 frames takes 100ms at 2.5W (250mJ) plus 9.9s at 0.1W (990mJ) = 1240mJ. The
    accelerator energy is identical. However, batching is vastly superior because
    it allows the host SoC/CPU to remain in deep sleep for 9.9 seconds rather than
    waking up every 1 second.
  common_mistake: Analyzing only the NPU accelerator power and concluding batching
    offers no benefit, ignoring the massive wake-up energy cost of the host CPU.
  napkin_math: '1 frame: (0.01s * 2.5W) + (0.99s * 0.1W) = 0.025 + 0.099 = 0.124 J.'
