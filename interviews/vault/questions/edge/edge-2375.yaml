title: 'Hailo-8 Batching vs Latency'
scenario: 'A Hailo-8 chip monitors powerlines. Frames arrive at 1 fps. Processing 1 frame takes 10ms.'
question: 'Analyze whether buffering 10 frames into a single batch is more energy-efficient than processing each frame individually as it arrives.'
details:
  realistic_solution: 'While the accelerator energy remains identical (processing 10 frames takes the same total compute time), batching allows the host CPU and SoC to enter deep sleep states for 9.9 seconds. Waking the host CPU every second for individual frames incurs massive wake-up energy penalties that dominate the total power draw.'
  common_mistake: |
    **The Pitfall:** Analyzing only the NPU power consumption.
    **The Rationale:** Engineers isolate the accelerator's efficiency and ignore the host CPU's baseline power and wake-up costs.
    **The Consequence:** A deployment that drains the system battery drastically faster than anticipated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8: 100mW standby, 2.5W active.
    - Frame arrival: 1 FPS.
    - Processing time: 10ms per frame.

    **Calculations:**
    - Individual (1 frame/s): 10ms @ 2.5W + 990ms @ 0.1W = 0.025J + 0.099J = 0.124 J/s. Over 10s = 1.24 J.
    - Batched (10 frames): 100ms @ 2.5W + 9.9s @ 0.1W = 0.25J + 0.99J = 1.24 J.
    - Accelerator energy is equal (1.24J), but host CPU idle time increases from 0.99s intervals to a single 9.9s interval.

    **Conclusion & Interpretation:**
    - **Result: Host sleep time increases by 10x (System-Level Energy Optimization)**. Host wake-up overhead is the true bottleneck.
