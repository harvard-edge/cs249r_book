title: The Edge VLM's KV-Cache Budget
scenario: Your team is deploying a new driver-assistance Vision-Language Model (VLM) on an automotive-grade compute module. The model has 24 attention layers, 16 heads, and a head dimension of 128. To maintain conversational context, you must support a sequence length of 4096 tokens.
question: "How much VRAM is required for the FP16 KV-cache with 24 layers, 16 heads, head dimension 128, and 4096 tokens?"
details:
  realistic_solution: The KV-cache stores the Key and Value vectors for every token in the context window, across all attention layers and heads. With FP16 precision (2 bytes per value), the calculation is a direct multiplication of the dimensions of the cache.
  common_mistake: |
    **The Pitfall:** Off-by-two dimension miscalculation.
    **The Rationale:** Engineers often forget to account for *both* the Key and Value tensors, or miscalculate the bytes per parameter, using 1 for INT8 or 4 for FP32 instead of the required 2 for FP16.
    **The Consequence:** The system is provisioned with half the necessary memory, leading to out-of-memory errors halfway through generating a response.
  napkin_math: |
    1. **Variables:** 24 layers, 16 heads, 128 head dimension, 4096 tokens, FP16 (2 bytes).
    2. **Formula:** `Total Size = Sequence Length * 2 (for K and V) * Layers * Heads * Head Dimension * Bytes per element`.
    3. **Calculation:** `4096 * 2 * 24 * 16 * 128 * 2 bytes = 805,306,368 bytes`.
    4. **Conversion:** `805,306,368 / (1024 * 1024) = 768 MB`.
    **The total VRAM required for the FP16 KV-cache is exactly 768 MB.**
  options:
  - '384 MB (Miscalculation: Forgetting to account for both Key and Value tensors)'
  - '1536 MB (Miscalculation: Using 4 bytes for FP32 instead of 2 bytes for FP16)'
  - 768 MB
  - '805 MB (Miscalculation: Using 1000x1000 for MB conversion instead of 1024x1024)'
  correct_index: 2
