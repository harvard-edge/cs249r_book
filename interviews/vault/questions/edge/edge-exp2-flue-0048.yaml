title: Encoder vs Decoder on DRAM-less Hailo-8
scenario: You are deploying a 100 million parameter sequence model (quantized to INT8, yielding exactly
  100MB of weights) to a Hailo-8 edge accelerator. The device provides 26 TOPS of INT8 compute at just
  2.5W, but critically has no local DRAM—all weights must stream from host memory over a 4 GB/s PCIe link.
  Calculate and compare the theoretical minimum latency of an encoder-only architecture processing a 128-token
  sequence in a single parallel pass versus a decoder-only architecture generating 128 tokens sequentially.
question: "What are the theoretical minimum latencies for encoder-only versus decoder-only processing of 128 tokens on the DRAM-less Hailo-8?"
details:
  realistic_solution: The correct approach calculates both the compute time and the memory transfer time
    to identify the true bottleneck. On a DRAM-less dataflow accelerator like the Hailo-8, host memory
    bandwidth dictates performance for autoregressive generation. An encoder-only architecture is vastly
    superior under these constraints because it amortizes the cost of loading weights across the entire
    parallel sequence.
  common_mistake: Candidates often calculate latency using only the 26 TOPS compute limit and ignore the
    systemic memory bottleneck caused by the lack of local DRAM. They frequently fail to realize that
    autoregressive decoders must reload the entire weight matrix across the host bus for every single
    generated token.
  napkin_math: 'Compute limit: 100M parameters ≈ 200M OPs/token. For 128 tokens = 25.6 GOPs. Compute time
    = 25.6 GOPs / 26 TOPS = ~0.98 ms.

    Encoder memory limit: Loads 100MB weights exactly once. Latency = 100MB / 4000 MB/s = 25 ms. Encoder
    is memory-bound at 25 ms.

    Decoder memory limit: Loads 100MB weights 128 times (once per generated token). Total data moved =
    100MB * 128 = 12.8 GB. Latency = 12.8 GB / 4 GB/s = 3.2 seconds. Decoder is severely memory-bound
    at 3.2 seconds.'
