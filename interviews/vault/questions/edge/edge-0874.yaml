title: Emulation Overhead in Fused DSP Ops
scenario: On a mobile SoC (CPU + DSP), an unfused model takes 20ms (15ms Conv2D on DSP, 5ms Swish activation
  on CPU). You enable graph rewriting to fuse Conv2D + Swish and assign it to the DSP. Latency skyrockets
  to 45ms.
question: "Why did fusing Conv2D + Swish onto the DSP increase latency from 20ms to 45ms?"
details:
  realistic_solution: The DSP lacks native hardware instructions for the exponential function required
    by Swish (x * sigmoid(x)). The compiler successfully fused the operations, and the framework dispatcher
    sent the entire subgraph to the DSP. However, the DSP runtime is forced to emulate exp() using a Taylor
    series approximation in its scalar ALU, taking hundreds of cycles per element. The hardware-compiler
    co-design failed to check hardware op support before fusion.
  common_mistake: Assuming the DSP simply has a lower clock speed than the CPU, making all pointwise operations
    slower.
  napkin_math: 'Unfused: 15ms (Conv) + 5ms (CPU Swish) = 20ms. Fused DSP: 15ms (Conv) + (5ms * 6x emulation
    penalty on DSP scalar ALU) = 45ms.'
