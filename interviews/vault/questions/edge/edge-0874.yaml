title: Emulation Overhead in Fused DSP Ops
scenario: On a mobile SoC (CPU + DSP), an unfused model takes 20ms (15ms Conv2D on DSP, 5ms Swish activation on CPU). You enable graph rewriting to fuse Conv2D + Swish and assign it to the DSP. Latency skyrockets to 45ms.
question: Why did fusing Conv2D + Swish onto the DSP increase latency from 20ms to 45ms?
details:
  realistic_solution: The DSP lacks native hardware instructions for the exponential function required by Swish. The compiler successfully fused the operations, but the DSP runtime is forced to emulate exp() using a Taylor series approximation in its scalar ALU, taking hundreds of cycles per element. The hardware-compiler co-design failed to check hardware op support before fusion.
  common_mistake: |
    **The Pitfall:** Assuming operator fusion always improves performance by reducing memory traffic.
    **The Rationale:** Candidates assume the DSP simply has a lower clock speed or fail to realize DSPs are heavily optimized for MACs but lack native support for complex transcendentals like exponential functions.
    **The Consequence:** A hardware-compiler co-design failure where unsupported ops are forcibly fused, leading to massive emulation overhead.
  napkin_math: |
    - **Unfused latency:** 15ms (Conv) + 5ms (CPU Swish) = 20ms.
    - **Fused DSP emulation penalty:** DSP lacks native `exp()` instructions. Emulating Swish takes 6x longer in the scalar ALU.
    - **Fused latency:** 15ms (Conv) + (5ms * 6x penalty) = 45ms.
    - **Final result:** **45ms latency due to expensive scalar emulation of unsupported math functions.**
