title: 'Dataset Curation: Mastery — Edge-Aware Data Curation for Continual Learning'
scenario: Your object detection model on Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) experiences concept
  drift after 6 months of deployment (new product types). Design a continual learning data curation system
  that prevents catastrophic forgetting while adapting to new classes. The device has 8GB available for
  data storage. Quantify replay buffer design and update schedule.
question: "How would you design the 8GB replay buffer and update schedule to adapt to new product classes without catastrophic forgetting?"
details:
  realistic_solution: 'Experience replay with reservoir sampling. Store compressed features (not raw images)
    for old classes. New class data: collect 500 examples/class via active learning. Interleave old (80%)
    and new (20%) during fine-tuning. Update model monthly.'
  common_mistake: Fine-tuning only on new data without a replay buffer → catastrophic forgetting of original
    80 classes. Or storing raw images for replay — storage-inefficient.
  napkin_math: '8GB storage budget. New classes: 10 new types × 500 images × 310KB JPEG = 1.55GB. Replay
    buffer for old 80 classes: 8GB - 1.55GB = 6.45GB. Store as compressed features: ResNet50 features
    = 2048 floats × 4 bytes = 8KB/image. 6.45GB / 8KB = 805K replay examples ≈ 10K per original class.
    Fine-tuning: 1M total samples (805K old + 195K new) × 5 epochs at Jetson batch=32: steps = 5M/32 =
    156K steps. At 275 TOPS for 7M model (6 FLOPs/token → 42M FLOPs/image): 42M × 156K / 275T = 23.8 seconds
    total fine-tuning. Monthly update feasible.'
