title: Drone Fused Layer Tiling
scenario: A drone is running a high-resolution (4K) object detection CNN on a custom edge accelerator. Processing takes 200ms per frame. The accelerator has 4MB of SRAM and LPDDR4 memory with 25 GB/s bandwidth. Hardware monitors show the compute units (MACs) are only 18% utilized.
question: Why are the accelerator MACs only 18% utilized, and what SRAM tiling strategy would reduce the 200ms frame time?
details:
  realistic_solution: The model is severely memory-bandwidth bound due to low arithmetic intensity in the early high-resolution layers. The intermediate activations vastly exceed the 4MB SRAM, causing continuous spilling to DRAM. You must architect a 'fused layer tiling' (depth-first) memory strategy. Divide the 4K image into smaller spatial patches (e.g., 256x256). Push each patch through multiple layers sequentially, keeping all intermediate activations strictly within the 4MB SRAM, and only write the heavily downsampled output back to DRAM.
  common_mistake: |
    **The Pitfall:** Applying channel pruning or weight quantization to resolve latency.
    **The Rationale:** Candidates incorrectly assume the bottleneck is parameter loading or raw compute, missing the massive intermediate activation memory footprint.
    **The Consequence:** Compute reductions barely impact the memory bandwidth bottleneck, leaving frame times largely unchanged.
  napkin_math: |
    - Early layer activations: 4K (3840x2160) * 32 channels * 2 bytes (FP16) ≈ 530MB.
    - LPDDR4 transfer time: 530MB / 25 GB/s = ~21ms.
    - Read/Write roundtrip per layer: 21ms * 2 = 42ms.
    - Total DRAM wait for 4 early layers: 42ms * 4 = **168ms of pure DRAM wait time**, explaining the 200ms latency.
