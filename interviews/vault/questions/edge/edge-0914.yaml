title: Drone Fused Layer Tiling
scenario: A drone is running a high-resolution (4K) object detection CNN on a custom edge accelerator. Processing takes 200ms per frame. The accelerator has 4MB of SRAM and LPDDR4 memory with 25 GB/s bandwidth. Hardware monitors show the compute units (MACs) are only 18% utilized.
question: Why are the accelerator MACs only 18% utilized, and what SRAM tiling strategy would reduce the 200ms frame time?
details:
  realistic_solution: "The extreme latency stems from severe LPDDR4 memory thrashing. The intermediate activation tensors for 4K inputs drastically exceed the 4MB SRAM, forcing sequential reads/writes to DRAM per layer. Implement depth-first fused layer tiling (e.g., 256x256 spatial patches). This architecture retains intermediate feature maps strictly within on-chip SRAM across multiple layers, flushing to DRAM only after aggressive spatial downsampling resolves the bandwidth starvation."
  common_mistake: |
    **The Pitfall:** Applying channel pruning or weight quantization to resolve latency.
    **The Rationale:** Candidates incorrectly assume the bottleneck is parameter loading or raw compute, missing the massive intermediate activation memory footprint.
    **The Consequence:** Compute reductions barely impact the memory bandwidth bottleneck, leaving frame times largely unchanged.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image: 4K (3840x2160).
       - SRAM: 4MB.
       - LPDDR4 bandwidth: 25 GB/s.
    2. **Calculations:**
       - Early layer activation size: 3840 * 2160 * 32 * 2 (FP16) ≈ 530MB.
       - Transfer time per read/write = 530MB / 25 GB/s = ~21ms.
       - Roundtrip per layer = 42ms. For 4 early layers = 168ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (~168ms waiting on DRAM).** Depth-first fused layer tiling is required to retain tensors in SRAM.
