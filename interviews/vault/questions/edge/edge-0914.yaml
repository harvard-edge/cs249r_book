title: Drone Fused Layer Tiling
scenario: A drone is running a high-resolution (4K) object detection CNN on a custom edge accelerator.
  Processing takes 200ms per frame. The accelerator has 4MB of SRAM and LPDDR4 memory with 25 GB/s bandwidth.
  Hardware monitors show the compute units (MACs) are only 18% utilized.
details:
  realistic_solution: The model is severely memory-bandwidth bound due to low arithmetic intensity in
    the early high-resolution layers. The intermediate activations vastly exceed the 4MB SRAM, causing
    continuous spilling to DRAM. You must architect a 'fused layer tiling' (depth-first) memory strategy.
    Instead of computing layer 1 entirely and writing to DRAM, then reading back for layer 2, divide the
    4K image into smaller spatial patches (e.g., 256x256). Push each patch through multiple layers sequentially,
    keeping all intermediate activations strictly within the 4MB SRAM, and only write the heavily downsampled
    output back to DRAM.
  common_mistake: Applying channel pruning or weight quantization, which reduces compute and weight footprint
    but barely impacts the massive activation memory bottleneck.
  napkin_math: 4K image * 32 channels * 2 bytes (fp16) = ~530MB activation size for early layers. Transferring
    530MB to/from DRAM at 25 GB/s takes ~42ms per layer. For 4 early layers, that's 168ms of pure DRAM
    wait time, explaining the 200ms latency.
