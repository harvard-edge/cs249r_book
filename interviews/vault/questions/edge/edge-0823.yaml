title: Diagnosing On-Device Catastrophic Forgetting
scenario: >-
  A smart home camera runs an on-device continuous learning pipeline. It fine-tunes the classification head of an EfficientNet-Lite0 model to recognize household pets from daily motion-triggered clips. After three days of adaptation, users report the camera accurately identifies their pets but completely fails to detect foundational base classes like 'packages' and 'vehicles'.
question: Diagnose the root cause of the base class forgetting and propose a mitigation strategy that fits within a strict 10MB memory constraint.
details:
  realistic_solution: The model suffers from catastrophic forgetting due to a heavily skewed local data distribution. The optimal mitigation is Latent Rehearsal (storing bottleneck feature embeddings instead of raw images) to replay base classes during local fine-tuning.
  common_mistake: |
    **The Pitfall:** Suggesting raw image rehearsal buffers or simply lowering the learning rate.
    **The Rationale:** Candidates default to standard experience replay without calculating the memory footprint, or assume tuning hyperparameters can stop distribution drift.
    **The Consequence:** Raw images immediately exceed the 10MB constraint causing OOMs, while lowering the learning rate only delays the inevitable catastrophic forgetting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base class retention requires ~1,000 samples.
       - Memory budget: 10MB limit.
       - Raw image: 224x224x3 (RGB).
       - Embedding: 1280 floats (FP32).
    2. **Calculations:**
       - Raw Image Buffer: 1,000 images * 224 * 224 * 3 bytes = 150.5 MB.
       - Latent Embedding Buffer: 1,000 embeddings * 1280 floats * 4 bytes/float = 5.12 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Storing raw images grossly exceeds the 10MB constraint (150.5 MB), whereas Latent Rehearsal correctly mitigates catastrophic forgetting while securely fitting the budget at 5.12 MB.
