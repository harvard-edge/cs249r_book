title: Row vs Columnar Storage Latency and Throughput Tradeoffs
scenario: 'An on-premise inference pipeline running on a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x,
  400 TOPS INT8, 75W) processes 100-feature sensor data records. After migrating the local storage format
  from uncompressed CSV to Snappy-compressed Parquet, the team observes two distinct behaviors: end-to-end
  latency increased by 15% for streaming requests (batch size 1), but overall throughput increased by
  300% for large batched requests (batch size 4096) that only require 10 specific features for the model.
  Explain why this performance divergence occurs and calculate the exact memory read reduction in the
  LPDDR4x RAM for a single 4096-record batch.'
details:
  realistic_solution: The latency increase for streaming requests happens because Parquet's columnar nature
    requires seeking across different column chunks and decompressing blocks just to assemble a single
    row, creating CPU and memory access overhead that outweighs the I/O savings. Conversely, for large
    batches needing only 10 features, Parquet allows projection pushdown. The system only reads the specific
    column chunks needed from disk into the 32GB LPDDR4x RAM, drastically reducing memory bandwidth utilization
    and preventing the 400 TOPS accelerator from becoming I/O bound.
  common_mistake: Candidates often assume that compressed columnar formats are universally faster due
    to reduced I/O. They fail to account for the CPU decompression overhead and the cost of row-reconstruction
    for single-record streaming, which dominates the execution time when batch sizes are small.
  napkin_math: 'Assume each feature is a 4-byte float (100 features = 400 bytes/record). For a batch of
    4096 records: CSV (row-based) requires reading all features into memory: 4096 * 400 bytes = 1,638,400
    bytes (~1.64 MB) read into LPDDR4x. Parquet (columnar) reading only 10 features: 4096 * (10 * 4 bytes)
    = 163,840 bytes (~164 KB) read. Memory read reduction per batch = 1,638,400 - 163,840 = 1,474,560
    bytes (90% reduction), directly freeing up memory bandwidth for the AI accelerator.'
