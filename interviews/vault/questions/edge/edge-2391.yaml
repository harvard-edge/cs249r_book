title: Jetson Multi-Model Triton Serving
scenario: An autonomous delivery robot runs 5 different vision models (segmentation,
  depth, tracking, etc.) using a single Jetson AGX Orin.
question: Design a serving architecture to maximize GPU utilization and handle varying
  frame rates among the camera models.
details:
  realistic_solution: Deploy Triton Inference Server locally on the Orin. Configure
    dynamic batching for models sharing identical streams, and use Triton's instance
    groups and independent CUDA streams to allocate concurrent model execution, utilizing
    the 275 TOPS without head-of-line blocking.
  common_mistake: Running a naive python loop that executes models sequentially, causing
    severe frame drops on fast cameras.
  napkin_math: 5 models sharing 275 TOPS via concurrent streams.
