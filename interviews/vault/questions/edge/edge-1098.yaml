title: 'Edge Queueing Theory Recall: Little''s Law at the Network Edge'
scenario: State Little's Law and apply it to a Jetson Orin (32GB LPDDR5, 275 TOPS
  INT8, 60W) running a YOLOv8 detection pipeline. If the system maintains L=3 frames
  in the processing queue and processes 15 FPS, what is the mean latency per frame?
  What does this imply for real-time video at 30 FPS?
question: What is the mean latency per frame, and what does it imply for real-time
  video at 30 FPS?
details:
  realistic_solution: 'Little''s Law: L = λ × W. L=3 frames in system, λ=15 FPS. W
    = L/λ = 3/15 = 200ms per frame. For 30 FPS real-time: each frame must be processed
    in 33ms. Current W=200ms means the system is running 6x slower than needed. At
    15 FPS output with 30 FPS input, queue grows unboundedly — ρ=30/15=2.0 > 1. System
    is overloaded. Need to reduce model complexity, use Hailo-8 co-processor (26 TOPS
    INT8, 2.5W), or drop frames.'
  common_mistake: Forgetting that Little's Law applies to the steady-state average
    and confusing frames in queue (Lq) with frames in system (L = Lq + frame being
    processed).
  napkin_math: 'W = L/λ = 3/15 = 0.2s = 200ms. 30FPS real-time requires W ≤ 33ms.
    Gap: 200/33 = 6x. YOLOv8n on Jetson Orin: ~5ms inference. Where does 200ms go?
    Likely preprocessing bottleneck (camera→GPU copy, resize). Optimize preprocessing:
    reduce from 150ms to 15ms → W = 20ms < 33ms. Jetson Orin 275 TOPS INT8 can run
    YOLOv8s at ~150 FPS with optimized TensorRT, so compute not the bottleneck.'
