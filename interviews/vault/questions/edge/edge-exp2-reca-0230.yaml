title: Shadow Deployment Quantization Requirement on Coral TPU
scenario: Your team is executing a shadow deployment to evaluate a new object detection model against
  the production baseline on a fleet of IoT devices equipped with Google Coral Edge TPUs. The Edge TPU
  provides 4 TOPS at just 2W of power, but it has extremely strict operator support. To successfully compile
  the new candidate model and deploy it to receive duplicated live traffic, what specific numerical precision
  format must the model be fully converted to?
question: "To successfully compile the new candidate model and deploy it to receive duplicated live traffic, what specific numerical precision format must the model be fully converted to?"
details:
  realistic_solution: The correct answer is full INT8 (8-bit integer) quantization. The Google Coral Edge
    TPU exclusively supports fully quantized INT8 models; any operations or layers left in floating-point
    format will be delegated to the low-power host CPU, ruining latency and invalidating the performance
    metrics of the shadow deployment.
  common_mistake: Candidates often assume the Coral Edge TPU supports FP16 (half-precision) or dynamic
    range quantization, which are common on edge GPUs but unsupported here. They may also incorrectly
    assume that mixed-precision is acceptable for the accelerator.
  napkin_math: The Coral Edge TPU provides 4 TOPS at a 2W power budget, yielding a high efficiency of
    2 TOPS/W. If the new INT8-quantized candidate model requires 8 GOPs (0.008 TOPS) per inference, the
    theoretical maximum throughput of the accelerator is 4 TOPS / 0.008 TOPS = 500 inferences per second.
    In a shadow deployment where both the production and candidate models run sequentially on the same
    TPU to compare outputs, the theoretical max per model drops to 250 frames per second.
