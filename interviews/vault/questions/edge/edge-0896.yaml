title: RoCEv2 Deadlock in Drone Swarm
scenario: A localized edge cluster of 16 autonomous drone base stations relies on RoCEv2 over a 25GbE switch to perform real-time distributed SLAM. During heavy map synchronization (bursts of 50MB per node), the entire cluster's network throughput suddenly drops to 0 Mbps and requires a hard switch reset to recover.
question: Why does the RoCEv2 SLAM cluster drop to 0 Mbps during 50MB all-to-all map sync bursts, and how would you fix it?
details:
  realistic_solution: Diagnose Priority Flow Control (PFC) deadlock. RoCEv2 relies on a lossless network achieved via PFC. When nodes send bursty all-to-all traffic (like map sync), circular buffer dependencies form across switch ports. A pause frame from node A pauses the switch port, which pauses node B, which is pausing the switch, creating a cyclic dependency. The solution is to configure PFC watchdog timers to drop packets breaking the deadlock, or move to a lossy RDMA protocol since edge networks struggle with strict lossless guarantees.
  common_mistake: |
    **The Pitfall:** Assuming switch buffer overflow caused TCP-like backoff or packet loss.
    **The Rationale:** Engineers apply standard TCP/IP networking mental models to RDMA technologies, completely missing the lossless pause-frame mechanism of RoCEv2.
    **The Consequence:** They attempt to tune TCP windows or increase buffers, failing to prevent the inevitable L2 pause-frame deadlock that bricks the switch.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 nodes, 50MB burst per node.
    - 25GbE switch bandwidth: ~3.125 GB/s.
    - Switch buffer size: 2-4 MB.

    **Calculations:**
    - Total burst = 16 * 50 MB = 800 MB.
    - Buffer overflow condition: 800 MB >> 4 MB.

    **Conclusion & Interpretation:**
    - **Result: 800 MB Burst (Network-Bound)**. The 800 MB burst guarantees PFC pause frames are triggered. Without deadlock prevention, a circular dependency pauses the switch entirely.
