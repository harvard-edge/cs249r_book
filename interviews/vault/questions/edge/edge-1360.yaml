title: Calculate Sustained TOPS Under Edge Thermal Throttling
scenario: You are deploying an inference service on a Qualcomm Cloud AI 100 accelerator in a ruggedized on-premise edge appliance. The card is rated for a 75W TDP and delivers a peak of 400 TOPS in INT8. However, due to the passive cooling constraints of the edge appliance at an elevated ambient temperature, the system can only safely dissipate 60W of heat from the card before continuous thermal throttling engages.
question: Assuming a linear relationship between power draw and compute throughput when throttled, with passive cooling limited to 60W, what maximum sustained INT8 TOPS can the Cloud AI 100 deliver?
details:
  realistic_solution: "The correct approach is to recognize that the accelerator will throttle its clock speeds and power consumption to match the enclosure's 60W heat dissipation limit to maintain a safe operating temperature. By determining the compute efficiency (TOPS/Watt) and applying it to the sustained thermal limit, you can estimate the actual continuous throughput. Provisioning the workload for this sustained throughput ensures stable latency without triggering erratic thermal cycling."
  common_mistake: |
    **The Pitfall:** Assuming the accelerator will run at 400 TOPS until overheating and shutting down.
    **The Rationale:** Candidates ignore continuous thermal throttling mechanisms that step down clock speeds to match environmental heat dissipation limits.
    **The Consequence:** Under-provisioning real-time latency budgets, leading to erratic thermal cycling and missed inference deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud AI 100: 75W TDP, 400 TOPS peak
       - Sustained thermal dissipation limit: 60W
       - Linear throttling relationship
    2. **Calculations:**
       - Compute efficiency = 400 TOPS / 75W = 5.333 TOPS/W
       - Max sustained throughput = 60W * 5.333 TOPS/W = 320 TOPS
    3. **Conclusion & Interpretation:**
       **Result: 320 TOPS (Thermal-Bound)**
