title: 'Deploying Large Language Models on Qualcomm Cloud AI 100: Encoder-Decoder Tradeoffs'
scenario: Your team is tasked with deploying a large language model (LLM) for real-time natural language
  understanding on an edge device, specifically the Qualcomm Cloud AI 100. This device features 32 GB
  LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power budget. The application requires processing
  an average of 100 tokens per query with a maximum latency of 100ms. Evaluate the architectural tradeoffs
  between encoder-only, decoder-only, and encoder-decoder models in this context. Specifically, discuss
  how the device's memory, computational power, and power envelope influence your choice, and outline
  a high-level architecture that optimizes for inference speed, power efficiency, and model accuracy under
  these constraints.
question: "Which LLM architecture would you choose on Cloud AI 100 for 100-token NLU under 100ms, and how do memory, INT8 compute, and 75W affect it?"
details:
  realistic_solution: A realistic solution would involve selecting a highly optimized, pruned, and quantized
    (INT8) model architecture. For instance, a distilled encoder-only model (e.g., a highly compact BERT
    variant) or a very small, efficient decoder-only model (e.g., MobileLLM or TinyLlama with aggressive
    pruning) would be strong candidates. The choice should prioritize minimal memory footprint for weights
    and activations, and maximal INT8 utilization. Key techniques include knowledge distillation from
    larger models, structured pruning, and quantization-aware training to maintain accuracy post-quantization.
    The solution should also describe how the model layers might map to the NPU's specific capabilities,
    strategies for minimizing costly data movement between LPDDR4x and compute units, and potential micro-batching
    or parallel processing approaches to maximize throughput while adhering to the 100ms latency per query.
  common_mistake: Overlooking the memory bandwidth limitations and the impact of LPDDR4x on recurrent
    or attention-heavy models, or failing to account for the actual INT8 utilization achievable for various
    model types, assuming peak TOPS are always accessible. Another common mistake is not considering the
    full end-to-end latency including data transfer, pre/post-processing, and the inherent sequential
    nature of decoder-only models.
  napkin_math: '1. **Peak INT8 Operations**: 400 TOPS = 400 x 10^12 INT8 operations per second. 2. **Memory
    Limit**: 32 GB LPDDR4x for model weights, activations, and intermediate states. A typical 7B parameter
    LLM, quantized to INT8 (1 byte per parameter), would consume ~7 GB for weights alone. Activations
    can easily push total memory usage beyond 32 GB for larger sequence lengths or batch sizes. 3. **Latency
    Constraint**: 100ms per query. This implies a total of 400 x 10^12 ops/s * 0.1s = 40 x 10^12 operations
    are available per 100ms inference window. 4. **Power Budget**: 75W. For a 100ms inference, energy
    consumption is 75W * 0.1s = 7.5 Joules. This constraint impacts sustained performance and cooling,
    favoring highly efficient operations.'
