title: Hierarchical Robot Wi-Fi 6 Sync
scenario: A hierarchical AllReduce spans 2 robots via Wi-Fi 6 (1.2 Gbps). Inside each
  robot, 2 Jetson Orins sync via PCIe Gen4 x8 (16 GB/s). Payload is 100 MB.
question: Evaluate the total execution time for a Local Reduce -> Global AllReduce
  -> Local Broadcast topology.
details:
  realistic_solution: Local PCIe syncs are instantaneous (100MB / 16GB/s = ~6ms).
    The Global AllReduce across the 2 robots via Wi-Fi requires 2 steps (Reduce +
    Broadcast) of 100 MB each at 150 MB/s. Global time = 2 * (100 MB / 150 MB/s) =
    1.33s. The inter-robot wireless link dominates, creating a massive synchronization
    bubble.
  common_mistake: Treating the topology as a flat 4-node ring over Wi-Fi, which would
    unnecessarily force slow wireless links into every step of the collective instead
    of isolating them.
  napkin_math: Global step = 2 * (100MB / 150MB/s) = 1.33s. Local steps = 2 * (100MB
    / 16000MB/s) = 0.0125s. Total =~ 1.34s.
