title: Hierarchical Robot Wi-Fi 6 Sync
scenario: A hierarchical AllReduce spans 2 robots via Wi-Fi 6 (1.2 Gbps). Inside each robot, 2 Jetson Orins sync via PCIe Gen4 x8 (16 GB/s). Payload is 100 MB.
question: Evaluate the total execution time for a Local Reduce -> Global AllReduce -> Local Broadcast topology.
details:
  realistic_solution: Network segmentation ensures the global execution step absorbs the bulk of the synchronization cost due to Wi-Fi serialization. Local intra-node PCIe links resolve near-instantaneously.
  common_mistake: |
    **The Pitfall:** Treating the topology as a flat ring network.
    **The Rationale:** Candidates often model the entire cluster as a flat 4-node ring over Wi-Fi, which forces slow wireless links into every step of the collective instead of isolating them in a hierarchical approach.
    **The Consequence:** Designing a synchronization strategy that drastically overestimates latency and underutilizes local high-bandwidth PCIe links.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload Size: 100 MB.
       - Inter-robot Wireless Link: Wi-Fi 6 at 1.2 Gbps = 150 MB/s.
       - Intra-robot Local Link: PCIe Gen4 x8 at 16 GB/s = 16,000 MB/s.
       - Topology Steps: Local Reduce (PCIe) -> Global AllReduce (Wi-Fi, effectively Reduce + Broadcast) -> Local Broadcast (PCIe).
    2. **Calculations:**
       - Local Reduce Time (PCIe) = 100 MB / 16,000 MB/s = 0.00625 s.
       - Global AllReduce Time (Wi-Fi, 2 steps: 100MB Reduce + 100MB Broadcast) = 2 * (100 MB / 150 MB/s) = 1.333 s.
       - Local Broadcast Time (PCIe) = 100 MB / 16,000 MB/s = 0.00625 s.
       - Total Execution Time = 0.00625 + 1.333 + 0.00625 = 1.3458 s.
    3. **Conclusion & Interpretation:**
       - **Result: ~1.35s (Network-Bandwidth-Bound)**
