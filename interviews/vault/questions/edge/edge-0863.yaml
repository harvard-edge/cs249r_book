title: Staleness-Aware Reconciliation in Offline Drones
scenario: A remote agricultural drone fleet uses federated learning to update a 10 million parameter vision model. The fleet syncs daily, but Drone Alpha goes offline for $\tau = 15$ rounds. Upon reconnection, it must merge its stale local adaptation with the new global state. The central server uses a staleness-aware reconciliation discount factor $s(\tau) = \frac{1}{1 + 0.2\tau}$. A standard uniform aggregation weight of $0.05$ (for 20 drones) applies. All updates and models are transmitted using INT8 quantization (1 byte per parameter).
question: What is Drone Alpha's discounted aggregation weight after 15 stale rounds, and what total INT8 uplink plus downlink payload is required?
details:
  realistic_solution: Apply the staleness discount to scale down the contribution weight to 0.0125 to prevent divergence, and budget 20MB of total bandwidth for the complete bidirectional state sync.
  common_mistake: |
    **The Pitfall:** Applying the stale update with its full original weight and only calculating the uplink payload.
    **The Rationale:** Candidates often forget that a reconnecting device needs to download the current global state in addition to uploading its stale local update.
    **The Consequence:** Global model divergence due to stale gradients and under-provisioned bandwidth for the sync event.
  napkin_math: |
    * Staleness $\tau = 15$ rounds.
    * Discount factor $s(15) = 1 / (1 + (0.2 \times 15)) = 1 / 4 = 0.25$.
    * Effective weight = Base Weight $\times s(15) = 0.05 \times 0.25 = \mathbf{0.0125}$.
    * Single payload size = 10,000,000 params $\times 1$ byte/param = 10 MB.
    * Total payload = 10 MB uplink + 10 MB downlink = **20 MB**.
  options:
  - Weight 0.05, Payload 10MB
  - Weight 0.0125, Payload 10MB
  - Weight 0.25, Payload 20MB
  - Weight 0.0125, Payload 20MB
  correct_index: 3
