title: Hardware-Aware NAS for a Vision Model on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a real-time object detection model onto a Qualcomm Cloud AI 100 accelerator. The current baseline model achieves 90% mAP but requires 150 GOPS and 12 GB of activations, leading to unacceptable latency and memory footprint.
question: How would you design a hardware-aware NAS pipeline for the AI 100 to reduce the 150 GOPS, 12GB-activation baseline while keeping at least 88% mAP?
details:
  realistic_solution: Enforce strict NAS reward structures around intermediate activation footprints and layer fusion efficiency instead of minimizing theoretical parameter counts, as the platform's high computational limit massively outpaces available RAM capability.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs reduction.
    **The Rationale:** Candidates optimize for generalized theoretical FLOPs without considering the actual hardware's memory bandwidth, cache hierarchy, and specific INT8 quantization efficiency.
    **The Consequence:** Designing models that are mathematically "smaller" but perform worse on-device due to inefficient memory access patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Capability: 400 TOPS INT8.
    - Target Latency: 10 ms (0.01 s).
    - Current Model Compute: 150 GOPS.
    - Current Model Activations: 12 GB.

    **Calculations:**
    - Maximum Allowable Compute for 10ms Latency = 400 TOPS * 0.01 s = 4000 GOPS (Compute is abundant).
    - Baseline Throughput Required = 150 GOPS / 0.01 s = 15 TOPS (Easily fits).
    - Activation Memory Penalty = A 12 GB footprint severely restricts batching or consumes >37% of total 32GB RAM for a single inference stream.

    **Conclusion & Interpretation:**
    - **Result: 12 GB Activations (Memory-Footprint-Bound)**. NAS must ruthlessly prioritize reducing intermediate activations and optimizing data locality over raw FLOP minimization.
