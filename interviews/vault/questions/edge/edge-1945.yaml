title: Hardware-Aware NAS for a Vision Model on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a real-time object detection model onto a
  Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). The current
  baseline model achieves 90% mAP but requires 150 GOPS and 12 GB of activations,
  leading to unacceptable latency and memory footprint. Your goal is to use Hardware-aware
  Neural Architecture Search (NAS) to find an optimal model architecture that can
  run efficiently on this specific platform, while maintaining at least 88% mAP.
question: How would you design a hardware-aware NAS pipeline for the AI 100 to reduce
  the 150 GOPS, 12GB-activation baseline while keeping at least 88% mAP?
details:
  realistic_solution: A realistic solution would involve defining a hardware-aware
    search space that considers operations well-supported by the Qualcomm Cloud AI
    100's INT8 capabilities. The NAS reward function should incorporate a hardware-feedback
    loop, directly measuring or accurately predicting latency and memory usage on
    the target device, rather than just proxies like FLOPs or parameter count. Techniques
    similar to MCUNet, which co-design neural architectures and their efficient inference
    library, could be adapted. This would involve a supernet that leverages the NPU's
    characteristics, and an evolutionary or reinforcement learning search algorithm
    guided by a multi-objective reward that balances accuracy, latency (measured or
    predicted for INT8 inference), and LPDDR4x memory footprint (e.g., SRAM usage
    for critical layers). Quantization-aware training (QAT) would be integrated into
    the final stages or as part of the search process.
  common_mistake: A common mistake is to focus solely on FLOPs reduction without considering
    the actual hardware's memory bandwidth, cache hierarchy, and INT8 quantization
    efficiency. Optimizing for theoretical FLOPs on a general-purpose GPU might not
    translate to real-world latency improvements on a specialized NPU like the Qualcomm
    Cloud AI 100, especially if memory access patterns are inefficient or if the model
    doesn't fully utilize the INT8 capabilities.
  napkin_math: 'Given 400 TOPS INT8 and a target latency of 10ms, a naive upper bound
    on computation is 400 TOPS * 0.01s = 4 TeraOps, or 4000 GOPS. However, this assumes
    100% utilization. If your model needs 50 GOPS at 10ms, it implies an effective
    throughput of 50 GOPS / 0.01s = 5 TOPS. If the baseline model takes 12 GB activations
    for a single inference, and the device has 32 GB LPDDR4x, this might fit, but
    consider batching: a batch size of 2 would already consume 24 GB, leaving little
    for weights and other overheads. You need to estimate activation sizes for potential
    candidate architectures, targeting activations to be no more than, say, 8 GB to
    allow for batching and other data. Also, consider the 75W TDP; if an operation
    consumes X mJ/op, how many operations can you sustain per second? For memory,
    LPDDR4x typically has a peak bandwidth around 50-60 GB/s. If a layer requires
    200 MB of data movement, that alone consumes ~4ms of bandwidth (200MB / 50GB/s).
    Summing these memory access times becomes crucial for overall latency.'
