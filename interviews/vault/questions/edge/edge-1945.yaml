title: Hardware-Aware NAS for a Vision Model on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a real-time object detection model onto a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). The current baseline model achieves 90% mAP but requires 150 GOPS and 12 GB of activations, leading to unacceptable latency and memory footprint.
question: How would you design a hardware-aware NAS pipeline for the AI 100 to reduce the 150 GOPS, 12GB-activation baseline while keeping at least 88% mAP?
details:
  realistic_solution: A realistic solution would involve defining a hardware-aware search space that considers operations well-supported by the Qualcomm Cloud AI 100's INT8 capabilities. The NAS reward function should incorporate a hardware-feedback loop directly measuring or predicting latency and memory usage on the target device, balancing accuracy, latency, and LPDDR4x memory footprint.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs reduction.
    **The Rationale:** Candidates optimize for generalized theoretical FLOPs without considering the actual hardware's memory bandwidth, cache hierarchy, and specific INT8 quantization efficiency.
    **The Consequence:** Designing models that are mathematically "smaller" but perform worse on-device due to inefficient memory access patterns.
  napkin_math: |
    1. **Theoretical Upper Bound:** 400 TOPS * 0.01s (10ms target latency) = 4000 GOPS.
    2. **Effective Throughput:** If a model needs 50 GOPS at 10ms, effective throughput is 50 GOPS / 0.01s = 5 TOPS.
    3. **Activation Memory:** A 12 GB activation footprint limits batching (e.g., batch 2 = 24 GB, nearly exhausting RAM).
    **Result: NAS must prioritize activation reduction (<8GB) and memory-friendly INT8 operations over raw FLOP reduction.**
