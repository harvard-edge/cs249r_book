title: The Edge-Cloud Hybrid Inference
scenario: Your agricultural drone runs a lightweight crop disease detector (MobileNetV3, 0.22 GFLOPs)
  on a Google Coral Edge TPU (4 TOPS, 2W). It classifies 95% of images correctly on-device in 3ms. For
  the remaining 5% of ambiguous cases, your team proposes offloading to a cloud model (EfficientNet-B7,
  37 GFLOPs) via a 4G LTE connection. Design the offloading policy and calculate whether this hybrid approach
  actually helps.
details:
  realistic_solution: 'The hybrid approach provides marginal accuracy gain at disproportionate cost. On-device
    handles 95% of frames at 3ms with 100% availability. Cloud offload adds 285-515ms latency for 5% of
    frames, with only ~70% availability over rural 4G. The net accuracy gain: 5% of frames x 4.5% improvement
    = 0.225% overall. The energy cost: cloud offload via 4G modem costs 250x more energy per frame (1.5J
    vs 0.006J). The practical design: batch ambiguous frames, upload them during charging/docking for
    offline analysis, and use results to fine-tune the on-device model. Real-time cloud offload only makes
    sense with reliable, low-latency connectivity.'
  common_mistake: '"Offload anything below 90% confidence to the cloud for better accuracy." This ignores
    the latency and reliability costs of cellular connectivity in agricultural settings.'
  napkin_math: 'On-device: 3ms, 95% accuracy, 100% availability. Cloud offload: 285-515ms, 99.5% accuracy,
    ~70% availability (rural). Hybrid benefit: 5% of frames × 4.5% accuracy improvement = **0.225% overall
    accuracy gain** at the cost of 285ms latency on 5% of frames. Energy: offload via 4G modem = 3W ×
    0.5s = 1.5J per offload. On-device: 2W × 0.003s = 0.006J. Offloading costs 250× more energy per frame.
    At 10 FPS, 5% offload rate: 0.5 offloads/s × 1.5J = 0.75W additional average power — a 37% increase
    over the Coral''s 2W.'
