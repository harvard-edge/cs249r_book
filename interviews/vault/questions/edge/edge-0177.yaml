title: The Efficiency Metric
scenario: You're on the autonomous vehicle perception team, selecting a new accelerator for the car's
  main computer. The system has a strict thermal design power (TDP) budget of 30 Watts to avoid overheating
  in the sealed enclosure. When comparing two different chips, what is the single most important **efficiency**
  metric to consider?
question: "When comparing two different chips, what is the single most important **efficiency** metric to consider?"
details:
  realistic_solution: The most critical metric is TOPS/W (Tera-Operations Per Second Per Watt). This value
    tells you how much computational performance you get for every watt of power consumed, directly measuring
    the chip's power efficiency. Given a fixed power budget, a higher TOPS/W allows you to achieve more
    computational throughput.
  common_mistake: Engineers often fixate on peak theoretical performance (raw TOPS) without considering
    the power required to achieve it. In a power-constrained environment like a car, a chip that is twice
    as powerful but uses three times the energy is a non-starter.
  napkin_math: Given a strict 30W power budget, the most critical metric is TOPS/W (Tera-Operations Per
    Second per Watt). If Chip A offers 3 TOPS/W and Chip B offers 5 TOPS/W, Chip B can deliver 150 TOPS
    (5 * 30W) while Chip A only delivers 90 TOPS (3 * 30W) without exceeding the 30W thermal limit.
  options:
  - Peak TOPS (Tera-Operations Per Second)
  - TOPS/$ (Performance per Dollar)
  - TOPS/W (Performance per Watt)
  - TOPS/mm² (Performance per unit area)
  correct_index: 2
