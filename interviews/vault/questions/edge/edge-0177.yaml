title: The Efficiency Metric
scenario: You're on the autonomous vehicle perception team, selecting a new accelerator for the car's main computer. The system has a strict thermal design power (TDP) budget of 30 Watts to avoid overheating in the sealed enclosure.
question: When comparing two different chips, what is the single most important efficiency metric to consider?
details:
  realistic_solution: TOPS/W measures power efficiency. It quantifies how many Trillion Operations Per Second a chip can execute for every watt of power it consumes. This is the most critical metric for power-constrained edge devices because the thermal envelope is fixed.
  common_mistake: |
    **The Pitfall:** Fixating on peak theoretical performance (raw TOPS).
    **The Rationale:** Engineers ignore the power required to achieve peak TOPS, failing to realize the chip will throttle in a constrained enclosure.
    **The Consequence:** Selecting a powerful but inefficient chip that overheats or exceeds the vehicle's power delivery limits.
  napkin_math: |
    - **Thermal budget:** 30W.
    - **Comparison:** If Chip A offers 3 TOPS/W, it delivers 90 TOPS. If Chip B offers 5 TOPS/W, it delivers 150 TOPS.
    - **Final result:** **TOPS/W dictates maximum performance within the strict 30W limit.**
  options:
  - The chip's maximum theoretical compute performance (peak TOPS).
  - The memory bandwidth available per watt.
  - 'Power efficiency: the operations delivered per watt of power consumed.'
  - The financial cost per TOP of performance ($/TOP).
  correct_index: 2
