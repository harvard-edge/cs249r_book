title: The Camera Data Deluge
scenario: You are designing the initial data ingestion pipeline for an autonomous delivery robot. The primary sensor is a single 1080p monochrome camera running at 30 frames per second.
question: Before any processing or compression, what is the approximate bandwidth you must provision to move raw pixel data from the sensor to the SoC's memory for this single camera stream?
details:
  realistic_solution: "A 1080p, 30 FPS monochrome sensor pumps approximately 60 MB/s of raw pixel telemetry directly into memory. Pre-provisioning the SoC memory controller for this baseline is mandatory; failing to accommodate raw sensor throughput before the ISP and H.264 compression stages guarantees massive frame droppage and instantaneous corruption of the perception pipeline."
  common_mistake: |
    **The Pitfall:** Confusing raw sensor bandwidth with compressed video bandwidth.
    **The Rationale:** Candidates are accustomed to H.264 streams and forget that perception pipelines require uncompressed sensor frames.
    **The Consequence:** The hardware memory bus is drastically under-provisioned, leading to frame drops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 1080p (1920 x 1080).
       - Depth: Monochrome (1 byte/pixel).
       - Frame rate: 30 FPS.
    2. **Calculations:**
       - Pixels per frame = 1920 * 1080 = 2,073,600.
       - Frame size = 2.07 MB.
       - Raw bandwidth = 2.07 MB/frame * 30 FPS = ~62.2 MB/s.
    3. **Conclusion & Interpretation:**
       - **~60 MB/s baseline bandwidth.**
  options:
  - ~600 KB/s
  - ~6 MB/s
  - ~60 MB/s
  - ~6 GB/s
  correct_index: 2
