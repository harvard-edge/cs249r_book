title: Calculate memory bound latency for INT8 inference on Cloud AI 100
scenario: You are deploying an 8-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 on-premise
  inference accelerator. The model is memory bandwidth bound during the decoding phase. The accelerator
  has 32 GB of LPDDR4x memory and provides 400 TOPS of INT8 compute at a 75W TDP. Assuming the memory
  bandwidth is 136 GB/s, calculate the theoretical minimum latency for generating a single token when
  batch size is 1.
question: "What is the theoretical minimum batch-1 single-token generation latency for the 8B INT8 model at 136 GB/s memory bandwidth?"
details:
  realistic_solution: For autoregressive decoding at batch size 1, every parameter must be loaded from
    memory to generate a single token, making it a memory-bound operation. The compute is mostly idle
    waiting for weights. Therefore, the minimum latency is determined solely by the time it takes to read
    all the weights from the 32 GB LPDDR4x memory.
  common_mistake: Candidates often try to calculate latency using the 400 TOPS INT8 compute capacity,
    failing to recognize that autoregressive decoding at batch size 1 is strictly memory bandwidth bound.
    They might also forget to convert the parameter count (8 billion) into the actual byte size for INT8
    (8 GB).
  napkin_math: '1. Model size: 8 billion parameters in INT8 = 8 GB of weights to load per token.

    2. Memory bandwidth: 136 GB/s (typical for 4-channel LPDDR4x).

    3. Minimum latency per token = (Data to load) / (Memory Bandwidth) = 8 GB / 136 GB/s.

    4. Latency = 0.0588 seconds = 58.8 milliseconds per token (or ~17 tokens/second).'
