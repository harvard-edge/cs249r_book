title: 'Heterogeneous Compute Dispatch on Jetson Orin: GPU vs DLA vs CPU'
scenario: 'Jetson Orin AGX has three compute targets: Ampere GPU (2048 CUDA cores),
  2x NVDLA engines (Deep Learning Accelerator), and 12-core ARM CPU. A multi-model
  autonomous driving pipeline must schedule perception (CNN), planning (transformer),
  and mapping (classical SLAM) across all three. Design the dispatch.'
question: How would you dispatch perception, planning, and SLAM across Orin's GPU,
  DLAs, and ARM CPU within the 60W budget?
details:
  realistic_solution: 'Dispatch strategy: (1) Perception CNN (YOLOv8) -> DLA: convolutions
    are well-supported on DLA, and DLA achieves 118 TOPS INT8 at only ~5W. (2) Planning
    transformer -> GPU: attention and large matmuls need GPU''s flexibility and Tensor
    Cores. (3) SLAM -> CPU: point cloud processing and graph algorithms run best on
    ARM cores. This leaves GPU free for the transformer at 20W, DLA handles CNN at
    5W, CPU does SLAM at 10W. Total: 35W, well under 60W MAXN budget. Key: use TensorRT''s
    setDeviceType() per layer to split a single model across GPU and DLA.'
  common_mistake: Running everything on the GPU because it is the most powerful. The
    GPU at full load draws 40W of the 60W budget, leaving insufficient power for DLA
    and CPU workloads. DLA is 5-10x more power-efficient than GPU for supported operations.
  napkin_math: 'GPU-only: 40W for CNN + 40W for transformer = 80W (exceeds 60W TDP).
    GPU+DLA split: 5W DLA (CNN) + 20W GPU (transformer) + 10W CPU (SLAM) = 35W. Power
    headroom: 25W for thermal margin and other subsystems.'
