title: IP Camera Gigabit Bottleneck
scenario: A Jetson AGX Orin receives 8 uncompressed 1080p30 video streams from IP
  cameras through a 1 Gigabit Ethernet switch.
question: Evaluate the risk of packet drop on the 1 Gigabit Ethernet port and propose
  a network-level fix.
visual:
  kind: svg
  path: edge-2349.svg
  alt: 8 cameras funneling into a Gigabit switch pointing to an Orin node, with a
    bottleneck indicator.
  caption: Gigabit Ethernet bottleneck for uncompressed video streams.
details:
  realistic_solution: A single uncompressed 1080p30 stream is 1920*1080*3 bytes *
    30 fps = ~186 MB/s (1.49 Gbps). Eight streams require nearly 12 Gbps. The 1 Gigabit
    (0.125 GB/s) port will experience catastrophic packet drops. The fix is to apply
    H.264/H.265 compression at the camera level to reduce streams to <10 Mbps each.
  common_mistake: Calculating video bits incorrectly and believing 1 Gbps handles
    eight uncompressed streams.
  napkin_math: 8 * 1.49 = 11.92 Gbps > 1 Gbps
