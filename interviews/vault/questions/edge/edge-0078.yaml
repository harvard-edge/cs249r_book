title: The Thermal Derating Curve
scenario: Your autonomous delivery robot uses a Jetson Orin NX (100 TOPS INT8, 25W TDP) in a fanless aluminum enclosure. In the lab at 25°C, you sustain 30 FPS with the Orin running at its 25W power mode. The robot deploys in Phoenix, Arizona where summer ambient temperatures reach 45°C. After 15 minutes of operation, FPS drops to 21 FPS and stays there due to thermal 'derating.'
question: How is thermal derating causing the 30 FPS to 21 FPS drop, and what power budget is safe at 45°C ambient?
details:
  realistic_solution: Thermal derating is the SoC's self-protection mechanism. The Orin NX has a maximum junction temperature (Tj_max) of ~105°C. When Tj approaches this limit, the DVFS (Dynamic Voltage and Frequency Scaling) governor reduces clock frequencies and disables compute units to lower power dissipation.
  common_mistake: |
    **The Pitfall:** "Just add a bigger heatsink" without calculating the required thermal resistance.
    **The Rationale:** Candidates fail to quantitatively assess whether a passive cooling solution can physically dissipate 25W at 45°C ambient while keeping the junction temperature below its maximum limit.
    **The Consequence:** The system will still thermally throttle in the field, leading to unpredictable latency and missed real-time deadlines.
  napkin_math: |
    *   Assume thermal resistance θ_ja = 3.2°C/W.
    *   Lab (25°C, 25W): Tj = 25 + (3.2 * 25) = 105°C (marginal).
    *   Phoenix (45°C, 25W): Tj = 45 + (3.2 * 25) = 125°C (exceeds Tj_max).
    *   To maintain Tj = 100°C at 45°C ambient: Power limit = (100 - 45) / 3.2 = 17.2W.
    *   Derating to 17.2W drops compute capability, leading to 21 FPS.
    *   To maintain 25W at 45°C: required θ_ja = (100 - 45) / 25 = 2.2°C/W.
    *   **A better thermal solution (θ_ja <= 2.2°C/W) is required to sustain 30 FPS at 45°C.**
