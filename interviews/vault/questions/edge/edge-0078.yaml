title: The Thermal Derating Curve
scenario: Your autonomous delivery robot uses a Jetson Orin NX (100 TOPS INT8, 25W TDP) in a fanless aluminum
  enclosure. In the lab at 25°C, you sustain 30 FPS with the Orin running at its 25W power mode. The robot
  deploys in Phoenix, Arizona where summer ambient temperatures reach 45°C. After 15 minutes of operation,
  FPS drops to 21 FPS and stays there. Your thermal engineer says the Orin is 'derating.' Explain what's
  happening quantitatively and design the power budget for worst-case ambient.
question: "How is thermal derating causing the 30 FPS to 21 FPS drop, and what power budget is safe at 45°C ambient?"
details:
  realistic_solution: Thermal derating is the SoC's self-protection mechanism. The Orin NX has a maximum
    junction temperature (Tj_max) of ~105°C. When Tj approaches this limit, the DVFS (Dynamic Voltage
    and Frequency Scaling) governor reduces clock frequencies and disables compute units to lower power
    dissipation.
  common_mistake: '"Just add a bigger heatsink." This may not be sufficient — you need to calculate whether
    any passive solution can maintain full performance at 45°C ambient.'
  napkin_math: 'θ_ja = 3.2°C/W. Lab (25°C, 25W): Tj = 105°C (marginal). Phoenix (45°C, 25W): Tj = 125°C
    (throttles to 17.2W → 21 FPS). With θ_ja = 2.0°C/W: Tj = 95°C at 25W (safe → 30 FPS). Cost of better
    thermal: $40/unit × 1000 robots = $40K. Cost of 30% FPS loss: missed deliveries, slower routes → far
    more expensive.'
