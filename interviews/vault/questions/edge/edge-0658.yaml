title: DRAM Bandwidth for 30 FPS Inference
scenario: Your edge device has LPDDR4x memory with 25.6 GB/s bandwidth, shared between the CPU, GPU, ISP,
  and display controller. You need to run a segmentation model (DeepLabv3-MobileNetV2, 2.7 GFLOPs, 2.1M
  params INT8) at 30 FPS on the GPU. The ISP consumes 4 GB/s for 1080p camera processing, and the display
  controller uses 2 GB/s. Estimate whether you have enough DRAM bandwidth for 30 FPS inference.
question: "Do you have enough DRAM bandwidth to run DeepLabv3-MobileNetV2 at 30 FPS alongside the ISP and display?"
details:
  realistic_solution: Segmentation models have high activation-to-weight ratios because they maintain
    spatial resolution through the network.
  common_mistake: '"Model weights are 2.1 MB. At 30 FPS that''s 63 MB/s. Trivial compared to 25.6 GB/s."
    This only counts weight reads and ignores activation memory traffic, which dominates for segmentation
    models that produce large spatial feature maps.'
  napkin_math: 'GPU bandwidth need: 1.8 GB/s out of 25.6 GB/s = 7%. System total: 9.3 GB/s = 36%. Comfortable
    on average. But ISP bursts at 8 GB/s for 2ms during frame readout → instantaneous demand = 8 + 1.8
    + 2 + 1.5 = 13.3 GB/s = 52%. Still under peak, but memory controller queuing adds ~1ms latency to
    GPU requests during ISP bursts. Fix: schedule inference to start 5ms after ISP frame capture completes,
    avoiding the burst overlap.'
  options:
  - Segmentation models have high activation-to-weight ratios because they maintain spatial resolution
    through the network.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal
    impact on end-to-end latency.
  - The bottleneck is PCIe transfer between CPU and GPU; using zero-copy memory will eliminate this overhead
    entirely.
  - Model weights are 2.1 MB. At 30 FPS that's 63 MB/s.
  correct_index: 0
