title: Develop three-year TCO energy model for delivery robot edge compute
scenario: A fleet of 100 delivery robots requires a vision model taking 50 GFLOPs
  per frame at 10 FPS. You must choose between outfitting them with Hailo-8 (2.5W)
  or Jetson AGX Orin (15W), both of which easily meet the throughput requirement.
question: Develop a 3-year TCO model comparing these two options based purely on continuous
  energy usage at a cost of $0.20 per kWh.
details:
  realistic_solution: Hailo-8 uses 2.5W * 24h * 365 * 3 = 65.7 kWh. Orin uses 15W
    * 24h * 365 * 3 = 394.2 kWh. Over 3 years at $0.20/kWh, energy cost per robot
    is ~$13.14 for Hailo-8 vs ~$78.84 for Orin. For the fleet of 100 robots, choosing
    the Hailo-8 saves exactly $6,570 in energy costs.
  common_mistake: Over-provisioning hardware by selecting the higher TOPS Orin without
    realizing the Hailo-8 covers the low compute requirement at a fraction of the
    power.
  napkin_math: (15W - 2.5W) * 24 * 365 * 3 / 1000 * $0.20 * 100 = $6570
