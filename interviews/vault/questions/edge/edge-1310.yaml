title: Diagnosing Operator Fallback on Qualcomm Cloud AI 100
scenario: You have deployed an on-premise vision-language model onto a Qualcomm Cloud AI 100 inference accelerator. After converting the model to ONNX and quantizing to INT8, inference throughput is severely bottlenecked and power draw is near the 75W limit. Profiling indicates that certain operators are falling back to the host CPU.
question: What is the root cause of the operator fallback on the Cloud AI 100, and how do you diagnose the specific coverage gaps?
details:
  realistic_solution: The bottleneck is structural operator fallback caused by incomplete ONNX opset support (e.g., dynamic shapes or complex activations) in the Qualcomm AI Engine Direct SDK. This partitions the computational graph, forcing massive intermediate tensors to ping-pong over the PCIe bus between device LPDDR4x and host memory. Extract verbose compiler delegation logs to isolate the unsupported nodes, then mathematically decompose or replace them with native, supported equivalents in PyTorch before exporting.
  common_mistake: |
    **The Pitfall:** Assuming universal support for ONNX operators across hardware compilers.
    **The Rationale:** Candidates overlook the severe penalty of CPU fallback, attempting to fix throughput by tweaking batch sizes instead of inspecting the execution provider's delegation logs.
    **The Consequence:** The root cause remains unaddressed, and the accelerator's performance is completely nullified by PCIe data transfer overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fallback tensor size: 50 MB.
       - PCIe Gen4 x8 bandwidth: ~16 GB/s.
       - Latency budget: 20 ms (50 FPS).
    2. **Calculations:**
       - Round-trip transfer: (50 MB / 16,000 MB/s) * 2 = 6.25 ms.
       - Budget consumed: 6.25 ms / 20 ms = 31.25%.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe transfer consumes >30% of latency.** Operator fallback creates catastrophic memory ping-ponging, starving the INT8 compute cores and destroying end-to-end throughput.
