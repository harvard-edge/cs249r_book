title: Diagnosing Operator Fallback on Qualcomm Cloud AI 100
scenario: Your team is deploying a vision-language model onto an on-premise Qualcomm
  Cloud AI 100 inference accelerator. After converting the model to ONNX and quantizing
  to INT8, you notice inference throughput is severely bottlenecked and power draw
  is near the 75W limit. Profiling indicates that despite the theoretical 400 TOPS
  INT8 capacity, certain operators are falling back to the host CPU. Identify the
  root cause of this fallback and explain how to diagnose the specific operator coverage
  gaps.
question: What causes the ONNX INT8 VLM to fall back to the host CPU on Cloud AI 100,
  and how do you find the unsupported operators?
details:
  realistic_solution: The root cause is an operator coverage gap where the Qualcomm
    AI Engine Direct SDK does not support specific ONNX nodes (e.g., dynamic shapes
    or esoteric activations). This forces the runtime to split the graph, transferring
    intermediate tensors between the 32 GB LPDDR4x device memory and host memory over
    PCIe. To diagnose, you must run the compiler with verbose logging to identify
    unsupported sub-graphs and replace them with mathematically equivalent, supported
    operations before re-compiling.
  common_mistake: Candidates often assume that standard ONNX operators are universally
    supported by all hardware compilers. They frequently overlook the severe performance
    penalty of CPU fallback and attempt to fix the issue by tweaking batch sizes rather
    than inspecting the execution provider's delegation logs.
  napkin_math: 'If a single unsupported operator forces a 50 MB intermediate tensor
    to fall back to the host CPU over a PCIe Gen4 x8 connection (~16 GB/s), the round-trip
    data movement takes: (50 MB / 16,000 MB/s) * 2 = 6.25 ms. For a model with a 20
    ms latency budget (50 FPS), a single fallback consumes over 30% of the budget
    just in data transfer, starving the 400 TOPS INT8 compute cores and completely
    nullifying the accelerator''s performance.'
