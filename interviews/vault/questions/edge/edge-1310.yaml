title: Diagnosing Operator Fallback on Qualcomm Cloud AI 100
scenario: You have deployed an on-premise vision-language model onto a Qualcomm Cloud AI 100 inference accelerator. After converting the model to ONNX and quantizing to INT8, inference throughput is severely bottlenecked and power draw is near the 75W limit. Profiling indicates that despite the theoretical 400 TOPS INT8 capacity, certain operators are falling back to the host CPU.
question: What is the root cause of the operator fallback on the Cloud AI 100, and how do you diagnose the specific coverage gaps?
details:
  realistic_solution: The root cause is an operator coverage gap where the Qualcomm AI Engine Direct SDK does not support specific ONNX nodes (e.g., dynamic shapes or esoteric activations). This forces the runtime to split the graph, transferring intermediate tensors between the 32 GB LPDDR4x device memory and host memory over PCIe. To diagnose, you must run the compiler with verbose logging to identify unsupported sub-graphs and replace them with mathematically equivalent, supported operations before re-compiling.
  common_mistake: |
    **The Pitfall:** Assuming universal support for ONNX operators across hardware compilers.
    **The Rationale:** Candidates overlook the severe penalty of CPU fallback, attempting to fix throughput by tweaking batch sizes instead of inspecting the execution provider's delegation logs.
    **The Consequence:** The root cause remains unaddressed, and the accelerator's performance is completely nullified by PCIe data transfer overheads.
  napkin_math: |
    1. Assume a single unsupported operator forces a 50 MB intermediate tensor to fall back to the host CPU over PCIe Gen4 x8 (~16 GB/s).
    2. Round-trip data movement takes: (50 MB / 16,000 MB/s) * 2 = 6.25 ms.
    3. For a model with a 20 ms latency budget (50 FPS), a single fallback consumes >30% of the budget just in data transfer.
    4. **This starves the 400 TOPS INT8 compute cores, explaining the severe bottleneck.**
