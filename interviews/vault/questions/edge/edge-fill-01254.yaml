title: Real-time Multi-Model Object Analysis on Google Coral Edge TPU
scenario: A security firm requires a real-time, on-device system to detect suspicious objects and classify
  them. This compound AI system must operate on a Google Coral Edge TPU, which provides 4 TOPS (Tera Operations
  Per Second) for INT8 computations and has a power budget of 2W. The system involves an initial object
  detection model (Model A) followed by a more detailed classification model (Model B) for identified
  objects. Design the architecture, including model orchestration, data flow, and necessary optimizations,
  ensuring an end-to-end latency of less than 100ms per frame and efficient power usage given the specified
  hardware constraints.
details:
  realistic_solution: The solution would involve careful selection or quantization of both Model A (object
    detection) and Model B (classification) to INT8 format. Model A (e.g., a highly optimized MobileNetV2-SSD-Lite
    INT8 model) performs initial detection. Upon detecting regions of interest, these are cropped and
    fed into Model B (e.g., an efficient INT8-quantized image classifier like EfficientNet-Lite). Agent
    orchestration would manage sequential execution, potentially batching multiple detections from Model
    A for efficient processing by Model B. Optimizations include model pruning, knowledge distillation
    to create smaller models, and strategic pipeline scheduling (e.g., only running Model B on high-confidence
    detections or a limited number of top-k objects per frame). Utilizing custom TensorFlow Lite delegates
    for Coral Edge TPU is essential for maximizing hardware utilization and performance.
  common_mistake: Ignoring the strict INT8-only constraint and the limited TOPS, leading to models that
    cannot run efficiently or at all on the device. Another common pitfall is failing to optimize inter-model
    communication and data transfer, resulting in pipeline stalls and significantly increased end-to-end
    latency.
  napkin_math: 'Target latency: 100ms per frame. Coral Edge TPU peak performance: 4 TOPS (INT8). Assume
    Model A requires ~5 GOPs and Model B requires ~2 GOPs per object. For a single object detected, total
    compute: 5 GOPs (A) + 2 GOPs (B) = 7 GOPs. Throughput: 4 TOPS / 7 GOPs ≈ 570 inferences/second. Time
    per inference: 1/570 s ≈ 1.75 ms, which easily meets the latency goal for a single object. If 10 objects
    are detected per frame, Model B needs 2 GOPs * 10 = 20 GOPs. Total compute becomes 5 GOPs (A) + 20
    GOPs (B) = 25 GOPs. Throughput: 4 TOPS / 25 GOPs = 160 inferences/second. Time per inference: 1/160
    s ≈ 6.25 ms. This still fits comfortably within the 100ms budget, highlighting that inter-model data
    transfer, memory bandwidth, and CPU orchestration overhead are likely to become the primary bottlenecks
    rather than raw INT8 compute TOPS.'
