title: Dual-Model Memory Management on Edge TPU
scenario: 'You are deploying a sequential vision pipeline on a Google Coral Edge TPU (4 TOPS INT8, 2W,
  USB 3.0 form factor). The pipeline consists of a 6MB detection model and a 4MB classification model,
  all quantized to INT8. The Coral has 8MB of on-chip SRAM. Option A: Swap the models sequentially over
  the USB 3.0 bus for each frame. Option B: Co-compile both models, forcing 2MB of intermediate INT8 activations
  to spill to host memory over USB continuously during inference. Evaluate which memory management strategy
  provides better system latency.'
question: "With 8 MB Coral SRAM, should you swap the 4 MB model over USB or spill 2 MB activations, and which has lower latency?"
details:
  realistic_solution: Option A is the superior choice. While swapping a model over USB incurs a latency
    penalty, it is a single, contiguous bulk transfer. Option B requires spilling and fetching intermediate
    INT8 activations multiple times during the forward pass. USB 3.0 has high protocol overhead for frequent,
    small, synchronous transfers. The optimal engineering decision is to swap the smaller model entirely
    per batch or per frame rather than thrashing the host-to-device bus with activation data.
  common_mistake: Candidates frequently choose Option B, assuming that full model swapping (Option A)
    is a catastrophic anti-pattern. They fail to evaluate the USB bus latency and calculate that spilling
    intermediate activations per layer incurs massively higher transaction overhead compared to a single
    bulk transfer of model weights.
  napkin_math: 'USB 3.0 effective bandwidth: ~400 MB/s. Option A (Model Swap): Transferring the 4MB model
    takes 4MB / 400 MB/s = 10ms. Option B (Activation Spill): Spilling 2MB of activations across 10 layers
    requires 10 round trips. Transfer time is 10 * (2MB / 400 MB/s) = 50ms, ignoring severe USB transaction
    overhead. Execution time for a 10 GOPS INT8 model at 4 TOPS is 10e9 / 4e12 = 2.5ms. Option A total
    latency per frame is ~12.5ms. Option B is at least ~52.5ms. Option A is >4x faster.'
