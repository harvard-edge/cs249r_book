title: The Autonomous Driving Frame Budget
scenario: The primary perception model for an autonomous vehicle runs on a Jetson AGX Orin with a peak performance of 275 TOPS for INT8 inference. To maintain control stability, the system has a hard real-time deadline of 33ms for each perception cycle. Assume 100% of the chip's compute capacity is available.
question: At 275 INT8 TOPS and a 33 ms deadline, what is the maximum theoretical number of TeraOps the model can perform per frame?
details:
  realistic_solution: The Jetson AGX Orin's 275 TOPS rating means it can perform 275 trillion operations
    per second. The deadline is 33 milliseconds, which is 0.033 seconds. To find the maximum number of
    operations the model can have, you must multiply the hardware's execution rate by the allowed time
    budget. This calculation determines the total operational 'work' that can be done within one frame.
    In a real-world scenario, you would never achieve 100% utilization, but this calculation gives you
    the absolute theoretical upper bound for model complexity.
  common_mistake: |
    **The Pitfall:** Confusing the hardware's rate of execution (TOPS) with the total count of operations a model can have.
    **The Rationale:** Engineers either state the chip's spec directly without considering the time budget, or they make a unit conversion error with the deadline.
    **The Consequence:** Designing models that are physically impossible to execute within the required real-time deadline.
  napkin_math: |
    1. **Peak Compute Rate**: 275 TOPS (Tera-Operations Per Second).
    2. **Latency Budget**: 33 milliseconds = 0.033 seconds.
    3. **Max Theoretical Operations**: 275 TOPS * 0.033 s = **9.075 Tera-Ops**.
    4. **Practical Reality**: At a typical 30% utilization, the model must be kept under ~2.7 Tera-Ops to meet the 33ms hard deadline.
  options:
  - 275 TOPS
  - 8,333 TOPS
  - 9.075 TeraOps
  - 9,075 TeraOps
  correct_index: 2
