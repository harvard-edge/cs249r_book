title: The Autonomous Driving Frame Budget
scenario: You're an engineer on an autonomous vehicle team. The primary perception model runs on a Jetson
  AGX Orin, which has a peak performance of 275 TOPS for INT8 inference. To maintain control stability
  and react to dynamic objects, your system has a hard real-time deadline of 33ms for each perception
  cycle. Explain the maximum theoretical number of operations (in TeraOps) your model can have to guarantee
  it meets this deadline. For this calculation, assume 100% of the chip's compute capacity is available
  and utilized.
question: "At 275 INT8 TOPS and a 33 ms deadline, what is the maximum theoretical number of TeraOps the model can perform per frame?"
details:
  realistic_solution: The Jetson AGX Orin's 275 TOPS rating means it can perform 275 trillion operations
    per second. The deadline is 33 milliseconds, which is 0.033 seconds. To find the maximum number of
    operations the model can have, you must multiply the hardware's execution rate by the allowed time
    budget. This calculation determines the total operational 'work' that can be done within one frame.
    In a real-world scenario, you would never achieve 100% utilization, but this calculation gives you
    the absolute theoretical upper bound for model complexity.
  common_mistake: The most common mistake is confusing the hardware's *rate* of execution (TOPS, or Tera-Operations
    Per Second) with the total *count* of operations a model can have. Engineers either state the chip's
    spec directly without considering the time budget, or they make a unit conversion error with the deadline
    (e.g., multiplying by 33 instead of 0.033).
  napkin_math: Peak Compute Rate = 275 TOPS = 275 * 10^12 Operations / Second. Latency Budget = 33 milliseconds
    = 0.033 Seconds. Max Theoretical Operations per Frame = 275e12 Ops/sec * 0.033 sec = 9.075 * 10^12
    Operations (9.075 Tera-Ops). In reality, achieving 100% utilization is impossible. At a typical 30%
    utilization, the model must be kept under ~2.7 Tera-Ops to meet the 33ms hard deadline.
  options:
  - 275 TOPS
  - 8,333 TOPS
  - 9.075 TeraOps
  - 9,075 TeraOps
  correct_index: 2
