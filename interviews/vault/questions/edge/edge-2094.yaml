title: Optimizing Edge ML Data Storage on NVIDIA Jetson Orin for Autonomous Drones
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous drone. The drone continuously captures high-resolution video frames (1920x1080, 30fps) and inference results. Due to intermittent network connectivity, data must be stored locally on the Jetson for at least 24 hours before offloading. The available storage is limited to 256GB.
question: What two local storage architectures would you compare for 24 hours of 1080p 30fps video and detections on a 256GB Jetson Orin?
details:
  realistic_solution: |
    Compare storing raw video streams (H.264/H.265 in MP4 segments) with associated inference metadata in highly compressed Parquet files (Zstd) vs aggregating batches into TFRecord files (GZIP). The comparison should detail how each approach utilizes hardware video decoders and impacts the 60W power budget.
  common_mistake: |
    **The Pitfall:** Overlooking the computational cost of decompression and deserialization.
    **The Rationale:** Choosing generic formats like HDF5 or CSV without considering specific access patterns or the limited CPU/GPU resources of the edge device.
    **The Consequence:** Dropped frames, increased inference latency, and exceeding the strict 60W power budget.
  napkin_math: |
    - Raw 1080p video: 1920 * 1080 * 3 bytes * 30 fps * 3600s * 24h = ~16.1 TB.
    - H.264 compressed (10 Mbps): 10 Mbps * 3600s * 24h / 8 bits/byte = ~108 GB.
    - Metadata (1KB/frame): 1KB * 30 fps * 3600s * 24h = ~2.5 GB.
    - **Total Storage: 108 GB + 2.5 GB = 110.5 GB (Fits comfortably within 256GB).**
