title: The Early vs Late Fusion Trade-off
scenario: Your autonomous vehicle has a camera and a LiDAR. You need to detect and localize objects in 3D. Your team is debating two architectures: early fusion (concatenate raw camera pixels + LiDAR points, feed to one model) vs late fusion (run separate camera and LiDAR detectors, merge results).
question: What are the system-level trade-offs between early and late fusion, and which do you recommend for a Jetson Orin deployment?
details:
  realistic_solution: Recommend late fusion for the Jetson Orin deployment. Late fusion runs camera YOLO (18ms on GPU) and LiDAR PointPillars (12ms on DLA) in parallel, completing in 18ms — 2.5x faster than early fusion's 45ms on GPU alone. The 2.8 NDS accuracy gap (72.9 vs 70.1 on nuScenes) is modest. Late fusion also provides: graceful degradation (if LiDAR fails, camera still works), independent model updates (retrain one without affecting the other), and full utilization of the Orin's heterogeneous compute (GPU + DLA simultaneously). Early fusion only wins when accuracy requirements are extremely tight and latency budget is generous.
  common_mistake: |
    **The Pitfall:** Assuming early fusion is always better because the model sees all the raw data simultaneously.
    **The Rationale:** Candidates focus purely on theoretical model capability or accuracy potential, ignoring the heterogeneous compute architecture of the edge device.
    **The Consequence:** Recommending an architecture that fails to meet latency budgets and underutilizes available hardware accelerators (like the DLA), leading to sub-optimal system performance.
  napkin_math: |
    1. Analyze early fusion (BEVFusion): ~120 GFLOPs, 45ms latency on Orin GPU.
    2. Analyze late fusion: Camera YOLO (28 GFLOPs, 18ms GPU) + LiDAR PointPillars (18 GFLOPs, 12ms DLA).
    3. Calculate late fusion latency: Since they run in parallel on heterogeneous compute, total latency = max(18ms, 12ms) = 18ms.
    4. Calculate speedup: 45ms / 18ms = 2.5x faster.
    5. Compare accuracy: Early fusion 72.9 NDS vs late fusion ~70.1 NDS (2.8 NDS gap).
    **Late fusion provides a 2.5x speedup, completing in 18ms, at the cost of a modest 2.8 NDS accuracy drop.**
