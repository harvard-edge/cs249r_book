title: Diagnosing CPU Fallback in EfficientNet on Edge TPU
scenario: You are deploying a standard EfficientNet-B0 model to a Google Coral Edge TPU (4 TOPS INT8,
  2W budget) for a smart camera application. After running the Edge TPU compiler, you notice the inference
  latency is 45ms instead of the expected 3ms. The compiler logs reveal that the model graph has been
  partitioned, with several depthwise convolutions and activation layers falling back to the host CPU.
  What architectural feature of standard EfficientNet is causing this fallback, and how do you resolve
  it?
question: "What architectural feature of standard EfficientNet is causing this fallback, and how do you resolve it?"
details:
  realistic_solution: The root cause is the use of the Swish (SiLU) activation function and Squeeze-and-Excitation
    (SE) blocks in standard EfficientNet, which are not natively supported by the Edge TPU's INT8 ALUs.
    This forces the compiler to partition the graph and run unsupported ops on the host CPU. The solution
    is to switch to the EfficientNet-Lite architecture, which replaces Swish with ReLU6 and removes SE
    blocks, allowing the entire model to compile into a single INT8 graph for the TPU.
  common_mistake: Candidates often assume the Edge TPU simply lacks hardware support for depthwise separable
    convolutions or that the memory bandwidth is saturated. They might incorrectly suggest replacing depthwise
    convolutions with standard convolutions, which would drastically increase FLOPs and parameter count
    without solving the underlying hardware compatibility issue.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS (INT8). EfficientNet-B0 requires ~0.78 GOPS.
    Ideal TPU execution time is 0.78 / 4000 = 0.195 ms. If unsupported Swish activations force just 20%
    of operations (0.15 GOPS) to a low-power host CPU capable of 10 GOPS, the CPU time is 0.15 / 10 =
    15 ms. Furthermore, graph partitioning adds USB/PCIe transfer overhead for each context switch (e.g.,
    4 partitions * 2 ms transfer = 8 ms). Total latency spikes from ~0.2 ms to >23 ms, violating realtime
    constraints and the 2W power limit.
