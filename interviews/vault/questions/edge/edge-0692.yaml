title: Quantization Impact on Detection mAP
scenario: "You're deploying YOLOv8s (11.2M params) for construction site safety monitoring. You have three quantization options: FP32 (44.9 mAP on COCO), FP16 (44.8 mAP), and INT8 (43.5 mAP). The safety team requires ≥43.0 mAP for hard-hat detection."
question: Which precision should you deploy for 8 camera streams under a 33ms budget, and what latency and throughput do FP32, FP16, and INT8 imply?
details:
  realistic_solution: 'INT8 meets the 43.0 mAP threshold on COCO (43.5), but validate on your domain first. Compute analysis: FP16 at ~6ms per inference can handle 8 cameras batched in ~15ms (within 33ms budget). INT8 at ~3ms handles the same batch in ~8ms, freeing GPU headroom for tracking or additional models. However, the 43.5 mAP is measured on COCO — construction site distribution differs significantly. Small hard hats at distance are particularly sensitive to quantization error in the detection head. Recommendation: run INT8 calibration on construction site data, validate domain-specific mAP, and if it drops below 43.0, use FP16 as the safer choice with adequate performance.'
  common_mistake: |
    **The Pitfall:** Assuming COCO mAP degradation maps linearly to domain-specific tasks.
    **The Rationale:** Engineers see that INT8 meets the 43.0 mAP threshold on COCO and immediately deploy it without testing on target domain data.
    **The Consequence:** Quantization error disproportionately affects small objects (like hard hats at a distance), pushing the real-world mAP well below the safety requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 33ms. 8 cameras. Base latency scaling: FP32 -> FP16 (2x), FP16 -> INT8 (2x).
    2. **Calculations:**
       - FP16 inference: ~6ms per frame. Batch-of-8: ~15ms. GPU util: 15/33 = 45%.
       - INT8 inference: ~3ms per frame. Batch-of-8: ~8ms. GPU util: 8/33 = 24%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Headroom Available.** Both FP16 and INT8 meet the 33ms budget via batching. FP16 is recommended due to higher robustness on out-of-distribution small objects.
