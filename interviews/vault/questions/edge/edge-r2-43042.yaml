title: Privacy Budget for Continuous Edge Learning
scenario: Your edge fleet of 5,000 Jetson Orin devices runs continuous federated learning — one aggregation
  round every hour, 24/7. Each round samples 500 devices. The target is (ε=10, δ=1e-5) over one year (8,760
  rounds). Using the moments accountant, what noise multiplier σ is needed, and at what point does the
  model stop improving because the noise overwhelms the gradient signal?
details:
  realistic_solution: 'The moments accountant with subsampled Gaussian mechanism gives much tighter bounds.
    Subsampling rate q = 500/5000 = 0.1. For T = 8,760 rounds, ε = 10, δ = 1e-5: using the RDP accountant,
    the required noise multiplier σ ≈ 4.5. This means noise std = σ × C = 4.5 × C for clipping norm C.
    Signal-to-noise analysis: average gradient magnitude per parameter after aggregating 500 devices ≈
    0.1. Noise per parameter: σ × C / 500 = 4.5 × 1.0 / 500 = 0.009. SNR = 0.1 / 0.009 = 11.1 — adequate
    for learning. However, as the model converges, gradients shrink (e.g., to 0.01 after 3,000 rounds).
    SNR drops to 1.1 — near the noise floor. The model effectively stops learning around round 3,000-4,000.
    Solution: decrease learning rate and increase batch size (sample more devices per round) as training
    progresses.'
  common_mistake: 'Using basic composition: 8,760 × per-round ε = total ε. This gives per-round ε = 10/8760
    = 0.00114 — impossibly tight. Basic composition is far too loose for this many rounds.'
  napkin_math: 'RDP per round (α=20, q=0.1, σ=4.5): ε_RDP ≈ 2α × q² / σ² = 40 × 0.01 / 20.25 = 0.0198.
    Total RDP: 8760 × 0.0198 = 173.4. Convert to (ε,δ): ε = 173.4 - ln(1e-5)/(20-1) = 173.4 - (-11.51/19)
    = 173.4 + 0.61 = 174.0. Too high — need higher σ or α optimization. At σ=25: 0.00064 × 8760 = 5.6.
    Convert: 5.6 + 0.61 = 6.2. Still high. SNR: 0.1 / (25/500) = 0.1/0.05 = 2.0 — marginal. Learning is
    very slow.'
