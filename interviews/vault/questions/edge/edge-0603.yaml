title: The Thermal Camera Calibration Drift
scenario: Your perimeter security system uses 200 Jetson Orin NX devices, each paired with a FLIR Lepton
  3.5 thermal camera (160×120, 14-bit radiometric) and an RGB camera. The thermal-RGB fusion model detects
  intruders at night with 99.2% recall. After 14 months, nighttime recall has dropped to 91% — but only
  for the thermal channel. The RGB channel (with IR illuminator) is unchanged. Daytime performance (RGB-only)
  is unaffected. The thermal cameras still produce images, and the model file is unchanged. What's degrading
  the thermal channel, and how do you architect a self-correcting system?
details:
  realistic_solution: 'The thermal camera''s **radiometric calibration** has drifted. The Lepton 3.5 performs
    a Flat Field Correction (FFC) — an internal shutter closes briefly to capture a uniform reference
    frame, which is subtracted from subsequent frames to correct for non-uniform pixel response. The FFC
    is triggered periodically (default: every 3 minutes) or on temperature change.'
  common_mistake: '"The thermal camera''s sensor is degrading." FLIR Lepton sensors are rated for 50,000+
    hours (5.7 years) of continuous operation. At 14 months, the sensor is within spec.'
  napkin_math: 'Thermal contrast of a human at 50m: body (37°C) vs background (20°C winter night) = 17°C
    — easy to detect. At 200m: thermal contrast drops to ~2°C due to atmospheric absorption. With 1.5°C
    calibration drift: effective contrast = 0.5°C. INT8 resolution at 30°C range: 30/255 = 0.118°C per
    level. A 0.5°C signal = 4.2 INT8 levels — barely above the ±2 level quantization noise. Detection
    probability drops from 99% to ~60% at 200m range. With blackbody recalibration: drift corrected to
    <0.1°C. Effective contrast restored to 1.9°C = 16 INT8 levels — robust detection. Blackbody reference
    cost: $25 × 200 = $5,000. Missed intruder cost: one security breach at a critical infrastructure site
    = $100K–$10M.'
