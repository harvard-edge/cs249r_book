title: The Thermal Camera Calibration Drift
scenario: Your perimeter security system uses 200 Jetson Orin NX devices, each paired with a FLIR Lepton 3.5 thermal camera (160x120, 14-bit radiometric) and an RGB camera. The thermal-RGB fusion model detects intruders at night with 99.2% recall. After 14 months, nighttime recall has dropped to 91% — but only for the thermal channel. The RGB channel (with IR illuminator) is unchanged. Daytime performance (RGB-only) is unaffected. The thermal cameras still produce images, and the model file is unchanged.
question: "What's degrading the thermal channel, and how do you architect a self-correcting system?"
details:
  realistic_solution: 'The thermal camera''s **radiometric calibration** has drifted. The Lepton 3.5 performs a Flat Field Correction (FFC) — an internal shutter closes briefly to capture a uniform reference frame, which is subtracted from subsequent frames to correct for non-uniform pixel response. The FFC is triggered periodically (default: every 3 minutes) or on temperature change.'
  common_mistake: |
    **The Pitfall:** Assuming the hardware sensor has degraded over time.
    **The Rationale:** Candidates incorrectly conclude that since only the thermal channel degraded, the sensor itself must be dying.
    **The Consequence:** Replacing perfectly functional cameras instead of correctly diagnosing the radiometric calibration drift that is burying the signal in quantization noise.
  napkin_math: |
    1. **Thermal Contrast:** Body (37°C) vs winter night background (20°C) = 17°C contrast.
    2. **Atmospheric Absorption:** At 200m, contrast drops to ~2°C.
    3. **Calibration Drift Impact:** With a 1.5°C drift, effective contrast = `2.0°C - 1.5°C = 0.5°C`.
    4. **INT8 Quantization Resolution:** 30°C range / 255 = 0.118°C per level.
    5. **Signal to Noise:** A 0.5°C signal corresponds to `0.5 / 0.118 = 4.2` INT8 levels (barely above ±2 level quantization noise).
    6. **Recalibration Recovery:** With blackbody correction, drift is <0.1°C, restoring contrast to 1.9°C (16 INT8 levels).
    **The 1.5°C uncorrected drift buries the weak long-range signal in quantization noise; physical recalibration restores robust detection.**
