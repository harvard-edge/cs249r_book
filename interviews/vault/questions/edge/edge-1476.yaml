title: Architecting Knowledge Distillation for Coral Edge TPU
scenario: Your team needs to deploy a real-time object detection model on a Google Coral Edge TPU for a smart camera system. The platform is strictly constrained to 4 TOPS INT8 compute, a 2W power budget, and a limited set of supported neural network operators. The current teacher model is a highly accurate but massive float32 model that cannot run on the Coral.
question: How would you distill the float32 teacher into a Coral-compatible INT8 student while respecting Edge TPU operator limits?
details:
  realistic_solution: The best approach is to first design a student model strictly using Edge TPU-supported operations (e.g., standard or depthwise convolutions). The pipeline should perform knowledge distillation alongside Quantization-Aware Training (QAT). The teacher generates float32 soft targets, while the student simulates INT8 quantization during the forward pass but uses float32 gradients for updates, ensuring the final compiled INT8 model retains high accuracy and compiles successfully.
  common_mistake: |
    **The Pitfall:** Distilling directly into an INT8 student without Quantization-Aware Training (QAT), or selecting unsupported operators.
    **The Rationale:** Candidates fail to realize that post-training quantization often destroys the accuracy of heavily compressed student models, or they ignore the compiler's strict hardware constraints.
    **The Consequence:** The final model either suffers from severe accuracy degradation or outright fails to compile for the Edge TPU.
  napkin_math: |
    * Edge TPU compute: 4 TOPS (4,000 GOPS) INT8.
    * Target real-time frame rate: 30 FPS.
    * Per-frame compute budget: 4,000 GOPS / 30 = **~133.3 GOPS**.
    * Typical distilled student model (e.g., MobileNetV2-SSD): ~1.2 GOPS.
    * Utilization: 1.2 / 133.3 = **0.9%** of the per-frame compute limit.
    * This easily guarantees 30 FPS execution while remaining safely under the 2W thermal/power envelope.
