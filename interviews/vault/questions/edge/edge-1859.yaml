title: Hailo-8 Memory Bandwidth for Convolution Layer
scenario: Consider an INT8 convolutional neural network inference running on a Hailo-8 AI processor. A specific 3x3 convolution layer operates on 128 input channels, producing 256 output channels, with input feature maps of 32x32 pixels. The weights reside in SRAM and each input activation byte fetched from LPDDR4 is reused 4 times.
question: For the 3x3 convolution, how many MACs are required, what input-activation bandwidth is needed in 1 ms with 4x reuse, and is it memory-bound versus 68 GB/s?
details:
  realistic_solution: To calculate the MAC operations, multiply the kernel dimensions by input channels, output channels, and the output feature map size. With the data reuse factor, compute the bytes needed from DRAM. Convert this to bandwidth given the 1ms execution time and compare against the 68 GB/s peak.
  common_mistake: |
    **The Pitfall:** Failing to account for data reuse or miscalculating MACs.
    **The Rationale:** Candidates forget that on-chip caching means the same byte doesn't need to be fetched for every MAC operation, or they mix up bytes/ms to GB/s conversions.
    **The Consequence:** Incorrectly estimating memory bandwidth requirements, leading to false conclusions about whether the layer is compute or memory bound.
  napkin_math: |
    - **Total MACs:** (3 * 3 * 128 input_channels) * 256 output_channels * (32 * 32 output_size) = 301,989,888 INT8 MAC operations.
    - **Bytes to fetch:** 301,989,888 MACs / 4 (reuse factor) = 75,497,472 bytes.
    - **Required Bandwidth:** 75,497,472 bytes / 0.001 seconds = 75,497,472,000 bytes/s ≈ 75.5 GB/s.
    - **Final result:** **75.5 GB/s > 68 GB/s (Hailo-8 peak LPDDR4), therefore it is memory-bound.**
