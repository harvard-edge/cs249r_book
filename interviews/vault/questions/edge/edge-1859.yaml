title: Hailo-8 Memory Bandwidth for Convolution Layer
scenario: Consider an INT8 convolutional neural network inference running on an edge AI processor. A specific 3x3 convolution layer operates on 128 input channels, producing 256 output channels, with input feature maps of 32x32 pixels. The weights reside in SRAM and each input activation byte fetched from DRAM is reused 4 times.
question: For the 3x3 convolution, how many MACs are required, what input-activation bandwidth is needed in 1 ms with 4x reuse, and is it memory-bound versus a 68 GB/s bandwidth limit?
details:
  realistic_solution: To calculate the MAC operations, multiply the kernel dimensions by input channels, output channels, and the output feature map size. With the data reuse factor, compute the bytes needed from DRAM. Convert this to bandwidth given the 1ms execution time and compare against the 68 GB/s peak to determine memory bottlenecking.
  common_mistake: |
    **The Pitfall:** Failing to account for data reuse or miscalculating MACs.
    **The Rationale:** Candidates forget that on-chip caching means the same byte doesn't need to be fetched for every MAC operation, or they mix up bytes/ms to GB/s conversions.
    **The Consequence:** Incorrectly estimating memory bandwidth requirements, leading to false conclusions about whether the layer is compute or memory bound.
  napkin_math: |
    **Assumptions & Constraints:**
       - Layer: 3x3 Conv, 128 in_channels, 256 out_channels
       - Output spatial size: 32x32
       - Precision: INT8 (1 byte per MAC)
       - Reuse factor: 4
       - Target Latency: 1 ms
       - Hardware bandwidth: 68 GB/s
    **Calculations:**
       - Total MACs: 3 * 3 * 128 * 256 * 32 * 32 = 301,989,888 MACs
       - Bytes fetched from DRAM: 301,989,888 / 4 = 75,497,472 bytes
       - Required Bandwidth: 75,497,472 bytes / 0.001 s = 75.5 GB/s
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The required 75.5 GB/s exceeds the peak 68 GB/s LPDDR4 bandwidth.
