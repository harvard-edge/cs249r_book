title: 'Model Size Estimation: Compare Memory Footprint: Full Model vs. Quantized on Jetson Orin'
scenario: Evaluate the LPDDR5 memory footprint (32GB, 204 GB/s) on Jetson Orin for a YOLOv8-l model (43.7M params) in three precisions: FP32, FP16, and INT8 TensorRT. Include weights, input tensor (640x640x3 at FP32), and output tensor (84x8400).
question: How much memory does YOLOv8-l use on Jetson Orin in FP32, FP16, and INT8 TensorRT, and how many concurrent instances fit?
details:
  realistic_solution: 'Weights: FP32: 43.7M×4B=174.8MB. FP16: 87.4MB. INT8: 43.7MB. TensorRT: ×1.3. Input: 640×640×3×4B=4.7MB (kept FP32 for camera pipeline). Output: 84×8400×4B=2.8MB. Activation peak (FP32): ~200MB. Total FP32: 174.8+200+4.7+2.8=382MB. FP16: 87.4+100+4.7+2.8=194.9MB. INT8 TRT: 56.8+50+4.7+2.8=114.3MB. All fit in 32GB. Max concurrent instances: 32GB/114MB = 280 INT8 instances (but compute bottleneck applies first).'
  common_mistake: |
    **The Pitfall:** Reporting only weight memory without output/input tensor sizes.
    **The Rationale:** Candidates focus purely on parameter counts and forget that activations and dense detection heads consume significant memory.
    **The Consequence:** Underestimating the true runtime memory footprint, leading to OOM issues when scaling concurrent streams.
  napkin_math: |
    * Weights (FP32): 43.7M × 4B = 174.8MB
    * Weights (INT8 TRT): 43.7MB × 1.3 (overhead) = 56.8MB
    * Input (FP32): 640 × 640 × 3 × 4B = 4.7MB
    * Output (FP32): 84 × 8400 × 4B = 2.8MB
    * INT8 TRT Total: 56.8MB + activations (50MB) + I/O (7.5MB) = 114.3MB
    * Memory limit instances: 32GB / 114.3MB = ~280 instances
    * Compute limit instances (30fps): 275 TOPS / (165 GFLOPs × 30) = ~55 instances
    * **The system is compute-bottlenecked at 55 instances (6.3GB), well under the 32GB memory limit.**
