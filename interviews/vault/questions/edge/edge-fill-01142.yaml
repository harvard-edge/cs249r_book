title: MLOps for Edge Deployment with Google Coral Edge TPU
scenario: You are tasked with designing an MLOps pipeline for deploying a real-time object detection model
  (e.g., MobileNetV3-SSD) to a fleet of Google Coral Edge TPUs. Each Coral TPU offers 4 TOPS for INT8
  operations and consumes 2W of power, exclusively supporting INT8 inference. The base model is trained
  in FP32 on a cloud GPU. Your team needs to ensure seamless continuous integration/continuous deployment
  (CI/CD) of model updates, track experiments effectively, maintain reproducibility, and guarantee training-serving
  consistency despite the transition to INT8 on a resource-constrained edge device. Describe the key MLOps
  challenges and your proposed architectural solutions to address them, specifically considering the Coral
  TPU's limitations.
details:
  realistic_solution: Implement a robust model registry that versions both FP32 trained models and their
    corresponding INT8 quantized versions, along with quantization configuration metadata and validation
    metrics (e.g., INT8 vs. FP32 accuracy delta). The CI/CD pipeline should include automated quantization
    (e.g., using TensorFlow Lite Converter with post-training quantization or quantization-aware training),
    followed by comprehensive validation on actual Coral Edge TPUs or highly accurate emulators. Establish
    performance baselines (latency, throughput, power consumption) for different model versions on Coral
    devices. For training-serving consistency, monitor inference outputs and key performance indicators
    (KPIs) from edge devices and compare them against cloud-based FP32 predictions or golden datasets
    to detect concept drift or accuracy regressions post-quantization. Utilize experiment tracking to
    log all quantization parameters, model metrics, and hardware-specific performance benchmarks.
  common_mistake: Deploying an FP32 trained model directly after a naive INT8 quantization without rigorous
    edge-specific validation, leading to significant accuracy degradation or unexpected latency spikes
    due to unsupported operations or inefficient memory access patterns on the Coral TPU. Another common
    mistake is not integrating edge-specific hardware-in-the-loop testing into the CI/CD pipeline.
  napkin_math: Given the Coral TPU's 4 TOPS (INT8), if a typical object detection model inference requires
    400 Giga Operations (GOPs), the theoretical maximum inference rate is 4 TOPS / 400 GOPs = 4000 GOPs
    / 400 GOPs = 10 inferences per second. This is purely computational; actual performance will be lower
    due to memory access, I/O, and software overhead. The 2W power consumption is also a critical factor
    for battery-powered or passively cooled deployments.
