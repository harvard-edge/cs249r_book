title: 'Edge Transformer Cost Evaluation: Distilled vs Full Transformer on Hailo-8'
scenario: 'Compare DistilBERT (66M params, INT8, 6 layers) vs BERT-base (110M params, INT8, 12 layers)
  on Hailo-8 (26 TOPS INT8, 2.5W, 6GB/s) for product review sentiment at batch=1, seq=64. Calculate throughput,
  accuracy tradeoff (DistilBERT: 97% of BERT accuracy), and cost per 1M inferences.'
details:
  realistic_solution: 'Assuming fixed seq=64 compiled to Hailo-8. DistilBERT INT8: 66MB. BW: 66MB/6GB/s=11ms.
    FLOPs: ~2*66M*64=8.45M FLOPs. Compute: 8.45M/26T=0.000325ms. BW-bound. 11ms. BERT-base INT8: 110MB.
    BW: 110/6000=18.3ms. FLOPs=14.1M. BW-bound. 18.3ms. Throughput: DistilBERT: 1000/11=91/s. BERT: 1000/18.3=54.6/s.
    DistilBERT: 67% faster, 97% accuracy. Power: 2.5W. Energy: DistilBERT=2.5W*0.011s=27.5mJ. BERT=45.75mJ.
    Cost 1M inferences: DistilBERT=2.5W*1M*0.011s/3.6e6/0.10=$0.076. BERT=$0.127. DistilBERT wins on cost,
    accuracy acceptable.'
  common_mistake: Not calculating whether Hailo-8 can actually compile BERT (with dynamic attention patterns)
    — Hailo-8 requires fixed-shape models compiled ahead of time, and variable sequence length attention
    may not be directly supported.
  napkin_math: 'DistilBERT: 66MB INT8, BW=66/6000=0.011s=11ms. Throughput=91/s. Energy=27.5mJ. Cost/1M:
    1M*0.0275J/1M/3.6M J/kWh*$0.10=$0.00000076/inf*1M=$0.76. Hmm, let me recalculate: 2.5W*11ms=0.0275J
    per inf. 1M infs: 0.0275J*1M=27,500J=7.64Wh=$0.000764. BERT: 45.75mJ per inf. 1M: 45,750J=12.7Wh=$0.00127.
    Annual at 1M/day: DistilBERT: $0.000764*365=$0.279. BERT: $0.00127*365=$0.464. Energy cost negligible.
    Hailo-8 itself: $200 hardware / (91 inf/s * 86400 * 365) / 1M = 200/2.87B*1M=$0.000070/1M inf. Hardware
    dominates energy costs by 100x.'
