title: Orin NVJPEG Decoding Pipeline
scenario: A high-speed defect detection pipeline on a Jetson AGX Orin is bottlenecked by OpenCV CPU JPEG decoding before GPU inference.
question: Design a pipeline utilizing the Orin's hardware NVJPEG decoder and NVMM memory to pass decoded frames directly to TensorRT without CPU intervention.
details:
  realistic_solution: Utilize the dedicated NVJPEG hardware accelerator block via GStreamer or DeepStream. Decode the compressed payloads directly into GPU-accessible NVMM buffers. Configure TensorRT to bind natively to these NVMM device pointers. This entirely bypasses host (CPU) memory allocations and copies, dropping decode latency drastically and freeing CPU cycles for application logic.
  common_mistake: |
    **The Pitfall:** Decoding via NVJPEG but copying to host memory for resizing.
    **The Rationale:** Relying on familiar CPU-based tools like OpenCV for intermediate pre-processing steps, inadvertently breaking the zero-copy pipeline.
    **The Consequence:** Re-introducing costly PCIe/Memory round trips, negating the latency benefits of the hardware decoder.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline CPU Decode: 15 ms.
       - NVJPEG Hardware Decode: 2 ms.
    2. **Calculations:**
       - Latency Saved: 15 ms - 2 ms = 13 ms per frame.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound. Zero-copy hardware decoding saves 13ms, shifting the bottleneck exclusively to TensorRT inference.**
