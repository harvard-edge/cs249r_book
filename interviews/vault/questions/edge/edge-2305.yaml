title: Orin NVJPEG Decoding Pipeline
scenario: Optimizing a high-speed defect detection pipeline that is currently bottlenecked
  by OpenCV CPU JPEG decoding before the GPU inference on a Jetson AGX Orin.
question: Design a pipeline utilizing the Orin's hardware NVJPEG decoder and NVMM
  memory to pass decoded frames directly to TensorRT without CPU intervention.
details:
  realistic_solution: Initialize the NVJPEG library to decode incoming compressed
    buffers directly into GPU-accessible NVMM buffers. Configure TensorRT to accept
    NVMM device pointers natively. This bypasses the host memory completely, reducing
    frame decode latency from 15ms on the CPU to under 2ms on the hardware accelerator.
  common_mistake: Decoding using NVJPEG but copying the result back to host memory
    (CPU) to perform standard image resizing before copying it back to the GPU.
  napkin_math: 15ms CPU - 2ms NVJPEG = 13ms latency saved
