title: Hardware-Aware NAS Compute Constraint Calculation
scenario: You are setting up a hardware-aware Neural Architecture Search (NAS) to find an optimal computer
  vision model for the Qualcomm Cloud AI 100. The target platform features 32 GB LPDDR4x memory and delivers
  400 TOPS of INT8 compute within a 75W envelope. The product requirements demand a minimum throughput
  of 10,000 frames per second (FPS) for the entire accelerator. Assuming the models evaluated in the search
  space are perfectly compute-bound and achieve 100% utilization of the INT8 units, calculate the absolute
  maximum number of operations (in GOps) a candidate architecture can have per frame before it is rejected
  by the NAS constraint predictor.
question: "What is the maximum GOps per frame a candidate model can use while still meeting 10,000 FPS on the 400 TOPS INT8 accelerator?"
details:
  realistic_solution: The correct approach involves a straightforward division of the accelerator's peak
    theoretical compute capacity by the required throughput. Since the system is defined as compute-bound
    and at 100% utilization, the maximum operations per frame is exactly the total operations per second
    divided by the frames per second.
  common_mistake: Candidates often forget to align the units between TOPS (tera-operations per second)
    and GOps (giga-operations), resulting in off-by-1000 errors. Another mistake is improperly assuming
    batch size impacts the theoretical compute-bound operations-per-frame limit in this specific idealized
    setup.
  napkin_math: '1. Identify the peak compute capacity: 400 TOPS = 400,000 GOps (Giga-Operations per second).
    2. Identify the target throughput: 10,000 FPS. 3. Calculate max operations per frame: Max Ops = Peak
    Compute / Target FPS. 4. Max Ops = 400,000 GOps / 10,000 frames = 40 GOps per frame.'
