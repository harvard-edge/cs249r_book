title: Edge New 0014
scenario: A robotic arm uses Orin. Preprocessing an image takes 5ms on the ARM CPU or 1ms on the GPU. However, transferring the image to the GPU kernel costs 2ms.
question: For the 60 FPS robotics loop, should image preprocessing stay on the ARM CPU or be offloaded to the GPU?
details:
  realistic_solution: Processing on the CPU takes 5ms, avoiding transfer overhead. Offloading to the GPU takes 2ms (transfer) + 1ms (compute) = 3ms. While GPU offloading is technically 2ms faster, it forces the GPU to context switch from the main inference task, potentially starving the AI model. For a 60 FPS loop (16.6ms), a 5ms CPU preprocess comfortably fits in parallel with the previous frame's GPU inference, making CPU the better systemic pipeline choice.
  common_mistake: |
    **The Pitfall:** Blindly migrating all mathematical operations to the GPU to lower isolated micro-benchmarks.
    **The Rationale:** Engineers assume "GPU is faster" without accounting for transfer overhead and context switching in a pipelined system.
    **The Consequence:** Creating severe resource contention and pipeline stalls, ultimately increasing end-to-end latency.
  napkin_math: |
    - CPU approach: Stage 1 (CPU Pre) = 5ms. Stage 2 (GPU Inference) = ~10ms. E2E Latency = 15ms. Pipeline bottleneck = 10ms (100 FPS).
    - GPU approach: Stage 1 (GPU Pre) = 3ms. Stage 2 (GPU Inf) = 10ms. Total GPU time = 13ms. E2E Latency = 13ms. Bottleneck = 13ms (76 FPS).
    - **Result: CPU offloading yields better hardware concurrency and higher total throughput.**
