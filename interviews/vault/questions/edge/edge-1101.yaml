title: 'Edge Queueing Theory Design: Multi-Model Pipeline on Jetson Orin'
scenario: 'A multi-stage inference pipeline on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous vehicle is being designed. Stage 1 = object detection (YOLOv8m, 8ms), Stage 2 = depth estimation (8ms), Stage 3 = planning (2ms). Input is from a camera at 30 FPS. The pipeline is modeled as a tandem queue (M/D/1 at each stage).'
question: 'Using the correct M/D/1 formula, what is the queue wait for the 8 ms detection stage at 30 FPS?'
details:
  realistic_solution: 'M/D/1 Wq = \rho/(2\mu(1-\rho)), not \rho^2/(2\mu(1-\rho)). With \rho=0.24, \mu=125: Wq = 0.24/(2*125*0.76) = 1.27ms.'
  common_mistake: |
    **The Pitfall:** Adding mean latencies together while ignoring queue buildup, or using the wrong formula ($\rho^2$ instead of $\rho$ in the numerator).
    **The Rationale:** Candidates often incorrectly recall the M/D/1 formula or assume a deterministic pipeline has zero queueing wait.
    **The Consequence:** Drastically underestimating latency and falsely concluding the pipeline will comfortably meet its SLO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stage 1 (M/D/1 Queue): Arrival rate $\lambda=30$ req/s.
    - Service rate $\mu=125$/s.

    **Calculations:**
    - Utilization: $\rho = 30/125 = 0.24$.
    - Queue wait time formula: $W_q = \rho / (2\mu(1-\rho))$.
    - Calculation: $W_q = 0.24 / (2 \times 125 \times 0.76) = 0.24 / 190 = 0.00126s$.

    **Conclusion & Interpretation:**
    - **Result: ~1.26ms (Queueing-Bound)**. Proper M/D/1 formulas correctly bound the latency instead of the incorrect $\rho^2$ variant which yields 0.3ms.
