title: Diagnosing Sudden Inference Latency Spikes on Hailo-8 Under Load
scenario: You are deploying a multi-camera object tracking pipeline on an industrial PC equipped with a Hailo-8 accelerator. The system processes four 1080p streams simultaneously. During initial testing in an air-conditioned lab, the system maintains a steady 120 FPS overall throughput. However, when deployed in a factory floor enclosure where ambient temperatures hover around 45°C, the throughput drops to 40 FPS after 10 minutes of operation, despite the host CPU load remaining under 30%. The Hailo-8 is a dataflow accelerator that streams directly from host memory (no local DRAM) and typically draws around 2.5W.
question: What is the most likely cause of the Hailo-8 throughput collapse in the 45°C enclosure?
details:
  realistic_solution: At 45°C ambient, passive enclosure dissipation degrades significantly. The silicon junction breaches its safe thermal threshold (e.g., 85°C), forcing aggressive DVFS (Dynamic Voltage and Frequency Scaling) throttling on the Hailo-8, slashing compute throughput to prevent physical damage.
  common_mistake: |
    **The Pitfall:** Defaulting to software-level or bandwidth bottlenecks.
    **The Rationale:** Candidates often jump to assumptions about PCIe bandwidth saturation or host-side memory copying issues, suggesting model architecture tweaks without considering environmental context.
    **The Consequence:** Wasting engineering effort on code optimization when the fundamental issue is physical thermal management in a harsh environment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Nominal Throughput: 120 FPS.
       - Enclosure Throughput: 40 FPS.
       - Nominal Hardware Capability (Hailo-8): 26 TOPS.
    2. **Calculations:**
       - Compute required per frame (empirical) = 26 TOPS / 120 FPS ≈ 0.2167 TOPS/frame.
       - Effective compute under throttle = 40 FPS * 0.2167 TOPS/frame ≈ 8.67 TOPS.
       - Throttling reduction = (26 TOPS - 8.67 TOPS) / 26 TOPS ≈ 66.6% degradation.
    3. **Conclusion & Interpretation:**
       - **Result: ~66% Performance Drop (Thermal-Bound)**
