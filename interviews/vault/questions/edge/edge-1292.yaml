title: Diagnosing Sudden Inference Latency Spikes on Hailo-8 Under Load
scenario: You are deploying a multi-camera object tracking pipeline on an industrial
  PC equipped with a Hailo-8 accelerator. The system processes four 1080p streams
  simultaneously. During initial testing in an air-conditioned lab, the system maintains
  a steady 120 FPS overall throughput. However, when deployed in a factory floor enclosure
  where ambient temperatures hover around 45°C, the throughput drops to 40 FPS after
  10 minutes of operation, despite the host CPU load remaining under 30%. Given the
  Hailo-8 is a dataflow accelerator that streams directly from host memory (no local
  DRAM) and typically draws around 2.5W, what is the most likely cause of this severe
  performance degradation?
question: What is the most likely cause of the Hailo-8 throughput collapse in the
  45°C enclosure?
details:
  realistic_solution: The root cause is thermal throttling. The Hailo-8 is highly
    efficient at 2.5W, but in a sealed enclosure at 45°C ambient, heat dissipation
    becomes challenging. When the chip reaches its thermal limit (e.g., 85°C junction
    temperature), the driver automatically throttles the clock frequency to prevent
    damage. This directly reduces the processing speed (TOPS), manifesting as a severe
    drop in FPS. Because the Hailo-8 streams directly from host memory, the host CPU
    might still push data, but the accelerator cannot process it as fast, leading
    to backpressure and overall throughput reduction.
  common_mistake: Candidates often jump to software-level bottlenecks, assuming PCIe
    bandwidth saturation or host-side memory copying issues. They might suggest optimizing
    the model architecture or lowering the input resolution without considering the
    environmental context and the specific hardware characteristics of the Hailo-8.
  napkin_math: 'Assuming the Hailo-8 operates at 26 TOPS at its nominal clock speed
    to achieve 120 FPS. 26 TOPS / 120 FPS = ~0.216 TOPS/frame required. When throttled
    to 40 FPS, the effective processing capability drops to: 40 FPS * 0.216 TOPS/frame
    = ~8.66 TOPS. This represents a 66% reduction in clock speed or active processing
    units due to thermal throttling to maintain a safe temperature limit at 2.5W power
    draw in a 45°C environment.'
