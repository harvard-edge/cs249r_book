title: Calculate Precision Throughput Delta on Cloud AI 100
scenario: You are porting an object detection model to an on-premise Qualcomm Cloud AI 100 accelerator
  (32 GB LPDDR4x, 75W). The model requires 100 GOPS per inference. The accelerator is rated for 400 TOPS
  in INT8. Assuming FP16 performance is exactly half of INT8 (200 TOPS) and your workload achieves 50%
  hardware utilization in both precisions, calculate the absolute difference in throughput (FPS) when
  quantizing the model from FP16 to INT8.
details:
  realistic_solution: First, determine the effective GOPS for both FP16 and INT8 by multiplying the peak
    TOPS by 1000 and then by the 50% utilization factor. Then, divide each effective GOPS value by the
    model's 100 GOPS requirement to find the FPS for each precision. Finally, subtract the FP16 FPS from
    the INT8 FPS to find the delta.
  common_mistake: Candidates often forget to convert TOPS to GOPS (a factor of 1000) before dividing by
    the per-inference GOPS. Another common error is failing to apply the 50% utilization factor to the
    theoretical peak TOPS.
  napkin_math: 'INT8 Peak: 400 TOPS. Effective INT8: 400 * 1000 * 0.5 = 200,000 GOPS. INT8 FPS: 200,000
    / 100 = 2,000 FPS. FP16 Peak: 200 TOPS. Effective FP16: 200 * 1000 * 0.5 = 100,000 GOPS. FP16 FPS:
    100,000 / 100 = 1,000 FPS. Difference: 2,000 - 1,000 = 1,000 FPS.'
