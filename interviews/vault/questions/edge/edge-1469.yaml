title: Architecting Energy-Efficient Streams for Hailo-8
scenario: You are designing a video analytics pipeline using a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 is a dataflow accelerator with no local DRAM; it streams data directly from host memory via PCIe. Your system must process four 1080p camera streams simultaneously.
question: Architect the data ingestion and model execution flow for four 1080p streams to minimize host memory access energy per operation.
details:
  realistic_solution: The design must leverage the dataflow architecture by establishing persistent, dedicated PCIe streams that feed data continuously into the Hailo-8's on-chip memory without host CPU intervention. Models should be compiled to keep intermediate activations entirely on-chip. For four streams, the architecture should either spatial-multiplex the models if they fit on-chip simultaneously, or process continuous chunks of each stream to amortize the model switching cost over the PCIe bus, thereby drastically reducing host DRAM access energy.
  common_mistake: |
    **The Pitfall:** Ignoring the energy cost of moving data.
    **The Rationale:** Candidates focus solely on the 26 TOPS/2.5W compute efficiency of the accelerator, ignoring the host memory read energy.
    **The Consequence:** They might propose batching or frequent context switching between streams, which causes thrashing over the PCIe bus and massive energy spikes from host memory reads.
  napkin_math: |
    1. Compute efficiency: 26 TOPS / 2.5W = ~10.4 TOPS/W or ~0.1 pJ/Op.
    2. Reading from host LPDDR4 costs ~20-50 pJ/bit.
    3. For a 1080p frame (1920x1080x3 bytes = ~6MB or ~48Mb), reading it once costs ~1 mJ.
    4. **If the model requires multiple passes over the data from host memory, the memory energy (mJ scale) completely dwarfs the compute energy (µJ scale), destroying system efficiency.**
