title: Architecting Energy-Efficient Streams for Hailo-8
scenario: You are designing a video analytics pipeline using a Hailo-8 accelerator. The Hailo-8 is a dataflow accelerator with no local DRAM; it streams data directly from host memory via PCIe. Your system must process four 1080p camera streams simultaneously.
question: Architect the data ingestion and model execution flow for four 1080p streams to minimize host memory access energy per operation.
details:
  realistic_solution: Exploit the Hailo-8's dataflow architecture by establishing persistent, dedicated PCIe streams and aggressively fusing the model graph so intermediate activations reside entirely in on-chip SRAM. For multiple streams, avoid round-robin frame scheduling. Instead, spatially multiplex the four models concurrently on the chip if capacity allows, or temporally batch massive continuous chunks of each stream to eliminate costly model-switching over PCIe and minimize host LPDDR4 read energy.
  common_mistake: |
    **The Pitfall:** Ignoring the energy cost of moving data.
    **The Rationale:** Candidates focus solely on the 26 TOPS/2.5W compute efficiency of the accelerator, ignoring the host memory read energy.
    **The Consequence:** They might propose batching or frequent context switching between streams, which causes thrashing over the PCIe bus and massive energy spikes from host memory reads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute efficiency: 26 TOPS / 2.5W ≈ 10.4 TOPS/W (~0.1 pJ/Op).
       - Host memory read energy: ~20-50 pJ/bit.
       - 1080p frame size: ~6 MB (~48 Mb).
    2. **Calculations:**
       - Memory read cost per frame: 48 Mb * 20 pJ/bit ≈ 1 mJ.
       - Compute cost per frame (estimated): ~100 µJ.
    3. **Conclusion & Interpretation:**
       - **Result: Memory energy dwarfs compute energy by 10x.** Frequent stream switching or multipass execution will thrash the PCIe bus and drain massive power via LPDDR4 memory reads.
