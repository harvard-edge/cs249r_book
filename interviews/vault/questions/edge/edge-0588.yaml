title: The Headlight Glare Catastrophe
scenario: 'You are the tech lead for perception on a new ADAS platform. Your team is tasked with deploying
  a YOLOV8-based object detector on a Jetson AGX Orin, which has a hard real-time budget of 33ms per frame
  (30 FPS). The baseline FP16 model runs at 45ms. To meet the deadline, a junior engineer uses standard
  post-training quantization (PTQ), converting the entire model to INT8. They use 10,000 daytime driving
  frames for calibration. The results look great: latency drops to 25ms and mAP on the validation set
  only decreases by 0.8%. However, during night-time road tests, you hit a critical bug: in the presence
  of direct oncoming headlight glare, the model completely fails to detect pedestrians that the original
  FP16 model saw perfectly. Assess the situation. Why did the ''successful'' quantization lead to a catastrophic
  failure in production, and what is your precise, justified plan to fix it?'
details:
  realistic_solution: 'The root cause is catastrophic activation overflow in the INT8 domain. The initial
    convolutional layers of a vision model often act as brightness/contrast detectors. Headlight glare
    creates extremely high activation values in the FP16 model, far outside the distribution of the ''daytime''
    calibration data. The scaling factor ''S'' chosen during PTQ was therefore too aggressive; it mapped
    a relatively small dynamic range (e.g., [-15, 15]) to the full INT8 range ([-127, 127]). When a real
    activation value of, say, 100.0 from headlight glare hits this layer, it gets multiplied by the scaling
    factor and massively exceeds 127, causing it to clip or wrap-around. This injects a huge, non-linear
    error into the feature map, corrupting all subsequent layers and causing the model to fail. The correct
    solution is a mixed-precision strategy. Instead of quantizing the entire model uniformly, you should
    profile the activation distributions layer-by-layer on a more representative dataset that includes
    these HDR night scenes. You will likely find that only the first 1-2 layers are vulnerable to this
    overflow. The plan is to keep these specific, vulnerable layers in FP16 to preserve their dynamic
    range and quantize the remainder of the network to INT8. This provides the best trade-off: you fix
    the critical failure mode while still reaping most of the latency benefits from INT8, likely still
    meeting your 33ms budget.'
  common_mistake: 'The most common answer is simply: ''The calibration dataset was not representative;
    we need to add night-time scenes.'' While true, this is an incomplete L3-level diagnosis. It identifies
    ''what'' but not ''why''. An L5 answer must diagnose the specific numerical mechanism of failure (activation
    overflow) and propose a more surgical solution than just retraining. Another common mistake is to
    immediately jump to ''We need to do Quantization-Aware Training (QAT)'', which is a brute-force, expensive
    solution that may not be necessary.'
  napkin_math: 'Let''s assume the daytime calibration data shows a typical activation range of [-12.0,
    12.0] for a specific early convolution layer. The INT8 scaling factor `S` is calculated as `S = 127
    / 12.0 = 10.58`. Now, a night scene with headlight glare causes a real FP16 activation value of `r
    = 50.0`. The quantization operation is `q = round(r * S) = round(50.0 * 10.58) = round(529)`. This
    value, `529`, is massively outside the `[-128, 127]` range of INT8. The hardware will saturate this
    to `127`. To see the error, we de-quantize this clipped value back to the FP16 domain: `r'' = q_clipped
    / S = 127 / 10.58 = 12.0`. The intended value was `50.0`, but the system interpreted it as `12.0`.
    This is a `(50.0 - 12.0) / 50.0 = 76%` error for that single activation. This massive, nonlinear error
    wipes out the feature map''s integrity, leading to total failure.'
