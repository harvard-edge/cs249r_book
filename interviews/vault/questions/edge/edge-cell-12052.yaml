title: 'Model Format Conversion: Size TensorRT Engine Storage for Multi-Model Jetson Deployment'
scenario: 'A Jetson Orin deployment needs 3 models: (1) YOLOv8-m (25.9M params, INT8 TensorRT), (2) depth
  estimation ResNet (44M params, FP16 TensorRT), (3) segmentation FCN-ResNet50 (32.9M params, INT8 TensorRT).
  Size the TensorRT engine files, validate they fit in 32GB LPDDR5, and estimate load time from NVMe SSD
  at 3.5 GB/s.'
details:
  realistic_solution: 'YOLOv8-m INT8: 25.9M × 1B × 1.3 = 33.7MB engine. ResNet-44M FP16: 44M × 2B × 1.3
    = 114.4MB. FCN-ResNet50 INT8: 32.9M × 1B × 1.3 = 42.8MB. Total engines: 190.9MB. Load time from NVMe:
    190.9MB / 3500MB/s = 54.5ms. Memory at runtime (weights + activations): YOLOv8 ~200MB working set,
    ResNet ~500MB, FCN ~300MB. Total: ~1GB. 32GB LPDDR5: trivial fit.'
  common_mistake: Equating TensorRT engine size with parameter count × dtype_bytes; TensorRT engines include
    activation buffers, calibration tables, and layer fusion metadata, typically 1.2-1.5× raw weight size.
  napkin_math: 'TensorRT engine = weights + metadata (1.3× multiplier typical). YOLOv8-m INT8: 25.9MB
    × 1.3 = 33.7MB. ResNet-44M FP16: 88MB × 1.3 = 114MB. FCN-ResNet50 INT8: 32.9MB × 1.3 = 42.8MB. Total:
    190.5MB. SSD load: 190.5MB/3500MB/s = 54ms. RAM: 1GB working set / 32GB = 3.1% usage. ✓'
