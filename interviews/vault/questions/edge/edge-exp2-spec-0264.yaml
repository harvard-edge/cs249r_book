title: Dual-Model Security Pipeline on Google Coral Edge TPU
scenario: 'Design a compound AI system for a smart security camera that runs a two-stage pipeline: an
  object detection model to find faces, followed by a feature extraction model to generate embeddings
  for a local vector search. The entire pipeline must be deployed on a Google Coral Edge TPU (4 TOPS INT8,
  2W, USB form factor). Specify how you would orchestrate the models, handle the strict INT8 quantization
  requirements, and manage the host-to-device data routing to meet a 15 FPS real-time processing constraint.'
question: "How would you orchestrate the detector, embedding model, INT8 quantization, and host-device routing on the Coral Edge TPU to meet 15 FPS?"
details:
  realistic_solution: The correct approach involves fully quantizing both models to INT8 using post-training
    integerization to ensure 100% of operations run on the Edge TPU. The host CPU must orchestrate the
    pipeline by retrieving the detection bounding boxes, cropping the original frame, and batching the
    cropped faces before sending them back over USB for the embedding pass, pipelining these operations
    across concurrent frames to hide transfer latency.
  common_mistake: Candidates often ignore the USB data transfer overhead between the two chained models,
    assuming the TPU can route intermediate tensors directly without host CPU intervention. They also
    frequently overlook the Coral's strict requirement that all operators must be INT8 quantized, leading
    to costly CPU fallbacks that break latency constraints.
  napkin_math: Target latency for 15 FPS is 66.6ms per frame. Assume an INT8 MobileNet SSD detection takes
    12ms and an INT8 MobileFaceNet takes 4ms per face on the 4 TOPS TPU. For a frame with 3 faces, total
    TPU inference is 12ms + (3 * 4ms) = 24ms. USB transfer for the full frame (300x300x3 bytes = 270KB)
    and 3 cropped faces (3 * 112x112x3 = 112KB) totals ~382KB, taking ~2ms over USB 3.0. This leaves ~40ms
    for host-side NMS, cropping, and vector DB routing, safely within the 66.6ms budget.
