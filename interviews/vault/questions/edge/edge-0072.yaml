title: The DVFS Latency Jitter
scenario: Your real-time safety system on a Jetson Orin NX must guarantee inference completes within 25ms (hard deadline — parts of the production line are moving). During testing, 99.5% of inferences complete in 18ms. But 0.5% spike to 35ms, violating the deadline. The spikes don't correlate with model complexity, input content, or GPU temperature. They appear random.
question: "What's causing the latency spikes, and how do you guarantee the 25ms deadline?"
details:
  realistic_solution: "The spikes are caused by Dynamic Voltage and Frequency Scaling (DVFS) transitions. The Orin NX's power governor dynamically adjusts GPU clock frequency based on utilization. Between inference calls (during pre/post-processing on the CPU), GPU utilization drops briefly. The governor reduces the GPU clock from 1.3 GHz to 800 MHz to save power. When the next inference call arrives, the governor must ramp the clock back up \u2014 this transition takes 5\u201315ms (voltage regulator settling time + PLL relock). The inference itself takes 18ms, but the DVFS ramp adds up to 15ms, totaling 33ms."
  common_mistake: |
    **The Pitfall:** Blaming random latency spikes on thermal throttling.
    **The Rationale:** Candidates fail to recognize that thermal throttling causes sustained slowdowns, whereas DVFS clock ramping causes random millisecond-scale jitter.
    **The Consequence:** Missing critical safety deadlines while misdiagnosing perfectly healthy thermal behavior.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard deadline: 25ms
       - Inference at 1.3 GHz: 18ms
       - DVFS ramp: 5-15ms (800 MHz -> 1.3 GHz)
    2. **Calculations:**
       - Inference at 800 MHz = 18 * (1300/800) = 29.25ms
       - Worst-case latency = 29.25ms + 5ms ramp = 34.25ms
       - 34.25ms > 25ms deadline
    3. **Conclusion & Interpretation:**
       **Result: 34.25ms max latency (Compute-Bound)**
