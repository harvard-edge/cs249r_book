title: The DVFS Latency Jitter
scenario: Your real-time safety system on a Jetson Orin NX must guarantee inference completes within 25ms
  (hard deadline — parts of the production line are moving). During testing, 99.5% of inferences complete
  in 18ms. But 0.5% spike to 35ms, violating the deadline. The spikes don't correlate with model complexity,
  input content, or GPU temperature. They appear random. What's causing the latency spikes, and how do
  you guarantee the 25ms deadline?
details:
  realistic_solution: The spikes are caused by **Dynamic Voltage and Frequency Scaling (DVFS)** transitions.
    The Orin NX's power governor dynamically adjusts GPU clock frequency based on utilization. Between
    inference calls (during pre/post-processing on the CPU), GPU utilization drops briefly. The governor
    reduces the GPU clock from 1.3 GHz to 800 MHz to save power. When the next inference call arrives,
    the governor must ramp the clock back up — this transition takes 5–15ms (voltage regulator settling
    time + PLL relock). The inference itself takes 18ms, but the DVFS ramp adds up to 15ms, totaling 33ms.
  common_mistake: '"The GPU is thermally throttling." Temperature is stable at 72°C, well below the 97°C
    throttle point. Thermal throttling produces sustained slowdowns, not random spikes.'
  napkin_math: 'DVFS transition time: 5–15ms (voltage regulator dependent). GPU clock range: 800 MHz →
    1.3 GHz. Inference at 1.3 GHz: 18ms. Inference at 800 MHz: 18 × (1300/800) = 29.25ms — already over
    the 25ms deadline. With DVFS ramp: 29.25 + 5 = 34.25ms worst case — matches the observed 35ms spikes.
    Power cost of pinning: 2W × 24h × 365d × $0.12/kWh = $2.10/year per device. For 500 devices: $1,050/year.
    Cost of one missed safety deadline: potential injury, regulatory shutdown, lawsuit. The $2.10/device/year
    is the cheapest insurance in the system.'
