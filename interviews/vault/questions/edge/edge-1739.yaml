title: 'Energy-Aware Operator Selection on Cloud AI 100'
scenario: 'Your team is deploying a multi-camera video analytics pipeline on an on-premise edge server equipped with a Qualcomm Cloud AI 100 accelerator. The system is strictly capped at the accelerator''s 75W TDP limit, but requires maximizing INT8 inference throughput towards the theoretical 400 TOPS peak.'
question: 'How would you design the Cloud AI 100 execution strategy to maximize INT8 throughput under 75W while minimizing LPDDR4x access energy?'
details:
  realistic_solution: 'A strong candidate applies Horowitz energy principles, recognizing that an off-chip LPDDR4x access costs orders of magnitude more energy than an INT8 MAC operation. They will evaluate operator selection, proposing aggressive operator fusion, weight caching in SRAM, and high arithmetic intensity layers to minimize DRAM traffic and stay within the 75W envelope.'
  common_mistake: |
    **The Pitfall:** Focusing solely on compute utilization (TOPS) without accounting for DRAM access energy.
    **The Rationale:** Engineers optimize for maximum arithmetic throughput but ignore that moving data from LPDDR4x is orders of magnitude more expensive than computing it.
    **The Consequence:** The system hits the 75W power wall long before reaching the 400 TOPS peak due to massive DRAM energy consumption.
  napkin_math: |
    - Power budget: 75 W (75 J/s).
    - Peak compute: 400 TOPS (400e12 ops/s).
    - Available energy per op: 75 / 400e12 = **0.1875 pJ/op**.
    - INT8 MAC energy: **~0.1 pJ**.
    - Off-chip LPDDR4x access energy: **~100 pJ/byte**.
    - At Arithmetic Intensity of 100 ops/byte, DRAM energy is 100 pJ / 100 ops = **1 pJ/op**.
    - Total energy: 1.0 (DRAM) + 0.1 (MAC) = **1.1 pJ/op**.
    - Max sustained compute at 75W: 75 W / 1.1 pJ = **~68 TOPS** (far below 400 TOPS).
