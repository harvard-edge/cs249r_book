title: Priority Queue Multi-Camera Scheduling
scenario: 'A Jetson AGX Orin processes inferences from 10 cameras using a single FIFO queue, resulting in high tail latency. Two of the cameras monitor a safety-critical zone.'
question: 'How can the scheduling model be optimized to ensure safety-critical cameras bypass FIFO without starving the other 8 cameras?'
details:
  realistic_solution: 'Replace the single M/M/1 queue with a non-preemptive priority queue system. The 2 safety-critical streams are assigned High Priority, guaranteeing their requests are scheduled next as soon as the current inference finishes. To prevent starvation of the 8 Normal Priority streams, implement a weighted round-robin or time-to-live (TTL) aging mechanism that bumps delayed normal requests to high priority after a 50ms threshold.'
  common_mistake: |
    **The Pitfall:** Implementing batching across all 10 cameras to increase throughput.
    **The Rationale:** Candidates default to batching to solve latency issues by improving raw accelerator utilization.
    **The Consequence:** Batching actually increases the wait time for the first arrival in the batch, drastically worsening the worst-case tail latency for the safety-critical streams.
  napkin_math: |
    * Single FIFO queue: Critical streams wait behind 8 normal streams (e.g., 50ms wait).
    * Priority Queue (Non-preemptive): High priority guarantees scheduling immediately after current inference finishes.
    * Priority Wait Time: Drops from 50ms to ~15ms (max 1 inference delay).
    * **Conclusion: High priority isolation ensures safety, while a 50ms TTL aging mechanism prevents standard stream starvation.**
