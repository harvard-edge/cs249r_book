title: Priority Queue Multi-Camera Scheduling
scenario: A Jetson AGX Orin processes inferences from 10 cameras using a single FIFO
  queue, resulting in high tail latency. Two of the cameras monitor a safety-critical
  zone.
question: Optimize the scheduling model to ensure the safety-critical cameras bypass
  standard FIFO logic without completely starving the other 8 cameras.
details:
  realistic_solution: Replace the single M/M/1 queue with a non-preemptive priority
    queue system. The 2 safety-critical streams are assigned High Priority, guaranteeing
    their requests are scheduled next as soon as the current inference finishes. To
    prevent starvation of the 8 Normal Priority streams, implement a weighted round-robin
    or time-to-live (TTL) aging mechanism that bumps delayed normal requests to high
    priority after a 50ms threshold.
  common_mistake: Implementing batching across all 10 cameras, which actually increases
    the wait time for the first arrival in the batch and worsens worst-case latency.
  napkin_math: High priority isolation drops critical wait time from 50ms to ~15ms
    (1 inference delay).
