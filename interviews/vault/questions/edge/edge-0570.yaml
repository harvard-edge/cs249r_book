title: The Edge-Cloud Split Inference
scenario: >-
  Your edge camera needs to run a large model (ResNet-152, 60 GFLOPs) that doesn't fit the 33ms latency budget on a Jetson Nano. The camera has a 50ms round-trip to a cloud GPU. Your colleague suggests running inference entirely in the cloud.
question: Why might splitting the model between edge and cloud be better than either extreme?
details:
  realistic_solution: Pure cloud inference hits a 50ms network RTT plus cloud compute time, which exceeds the budget. Pure edge inference takes 80ms, also over budget. Splitting the model allows early layers to compute on the edge and sends highly compressed intermediate features to the cloud.
  common_mistake: |
    **The Pitfall:** Believing cloud inference is always faster because cloud GPUs are bigger.
    **The Rationale:** Candidates focus solely on compute capability while ignoring the fixed network latency and bandwidth constraints.
    **The Consequence:** Failing to meet the latency deadline by adopting a pure cloud approach that suffers from inescapable network RTT overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Real-time deadline: 33ms (30 FPS).
       - Jetson Nano latency (pure edge): 80ms.
       - Cloud latency: 50ms RTT + 5ms compute = 55ms.
    2. **Calculations:**
       - Pure edge: 80ms (> 33ms limit).
       - Pure cloud: 55ms (> 33ms limit).
       - Split architecture (pipelined): Early layers run on edge, sending highly compressed features. Transmission time drops to ~10ms.
       - Pipelined latency: ~28ms end-to-end.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** Pure cloud is strictly network-bound (50ms RTT); a pipelined split execution compresses the payload, achieving ~28ms latency and meeting the 33ms deadline.
