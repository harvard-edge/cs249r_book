title: The Edge-Cloud Split Inference
scenario: Your edge camera needs to run a large model (ResNet-152, 60 GFLOPs) that doesn't fit the 33ms
  latency budget on a Jetson Nano (128 CUDA cores). The camera has a 50ms round-trip to a cloud GPU. Your
  colleague says 'just run inference in the cloud.' Why might splitting the model between edge and cloud
  be better than either extreme?
question: "Why might splitting the model between edge and cloud be better than either extreme?"
details:
  realistic_solution: 'Pure cloud inference: 50ms network RTT + 5ms cloud inference = 55ms — over budget.
    Pure edge inference: 80ms on the Nano — over budget. But the model has a natural split point.'
  common_mistake: '"Cloud inference is always faster because cloud GPUs are bigger." This ignores network
    latency and bandwidth constraints.'
  napkin_math: 'Pure edge (Nano): 80ms. Pure cloud: 55ms. Split (naive): 58ms. Split (compressed + pipelined):
    28ms. Bandwidth: 50 KB × 30 FPS = 1.5 MB/s = 12 Mbps — fits in a typical LTE connection. Cloud cost:
    1 GPU serves ~11 edge devices without batching (3ms per inference, 30 FPS = 90ms/s of GPU time per
    device, 1000ms/90ms ≈ 11 devices per GPU). With batch size 3 and batching efficiency: ~30 devices
    per GPU are achievable at the cost of minor added latency.'
