title: The Edge-Cloud Split Inference
scenario: Your edge camera needs to run a large model (ResNet-152, 60 GFLOPs) that doesn't fit the 33ms latency budget on a Jetson Nano (128 CUDA cores). The camera has a 50ms round-trip to a cloud GPU. Your colleague suggests running inference entirely in the cloud.
question: Why might splitting the model between edge and cloud be better than either extreme?
details:
  realistic_solution: Pure cloud inference hits a 50ms network RTT plus cloud compute time, which exceeds the budget. Pure edge inference takes 80ms, also over budget. Splitting the model allows early layers to compute on the edge and sends highly compressed intermediate features to the cloud.
  common_mistake: |
    **The Pitfall:** Believing cloud inference is always faster because cloud GPUs are bigger.
    **The Rationale:** Candidates focus solely on compute capability while ignoring the fixed network latency and bandwidth constraints.
    **The Consequence:** Failing to meet the latency deadline by adopting a pure cloud approach that suffers from inescapable network RTT overhead.
  napkin_math: |
    - **Pure edge (Nano):** 80ms (over budget).
    - **Pure cloud:** 50ms network RTT + 5ms cloud inference = 55ms (over budget).
    - **Split (compressed + pipelined):** Computes early layers on edge, sends small intermediate features, saving transmission time.
    - **Bandwidth:** 50 KB * 30 FPS = 1.5 MB/s = 12 Mbps, which fits in a typical LTE connection.
    - **Cloud cost scaling:** 1 GPU serves ~11 edge devices without batching, or ~33 with batch size 3.
    - **Final result:** **A pipelined split execution can achieve ~28ms latency, meeting the 33ms deadline.**
