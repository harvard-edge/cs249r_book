title: Edge TPU Multi-Camera Batching Evaluation
scenario: 'You are deploying a retail analytics system using a Google Coral Edge TPU (4 TOPS INT8, 2W,
  PCIe form factor). The system ingests frames from 4 independent cameras, each operating at 30 FPS. The
  perception model is a lightweight CNN fully quantized to INT8. You must choose between two strategies:
  A) Static batching of 4 frames to process one frame from each camera simultaneously, or B) Processing
  each frame sequentially with a static batch size of 1. Evaluate these alternatives and determine which
  strategy is superior for minimizing end-to-end latency while meeting throughput requirements.'
details:
  realistic_solution: Strategy B (Batch size 1) is the correct choice. The Coral Edge TPU compiler bakes
    the batch size into the model geometry, making dynamic batching impractical without padding overhead.
    More importantly, gathering 4 frames from independent 30 FPS cameras introduces significant waiting
    latency. Because the Edge TPU's 4 TOPS capacity can process a lightweight INT8 model in just a few
    milliseconds—well below the inter-frame arrival time—sequential processing easily handles the required
    throughput while drastically reducing end-to-end latency per frame.
  common_mistake: Candidates often reflexively choose static batching of 4 to maximize hardware utilization
    and throughput, assuming that edge accelerators operate exactly like data center GPUs. They frequently
    overlook the synchronization delay required to gather a full batch from multiple uncoordinated cameras
    and ignore the Edge TPU compiler's requirement that batch size is fixed at compile time.
  napkin_math: '4 cameras at 30 FPS generate 120 frames per second, meaning a new frame arrives roughly
    every 8.33 ms (1000ms / 120). Assume an INT8 MobileNet-v2 variant requiring ~6 GOPS. On the 4 TOPS
    (4000 GOPS) Edge TPU, compute time per frame is ~1.5 ms. With PCIe overhead of ~1 ms, total inference
    time is 2.5 ms per frame. Strategy B (Batch=1): Processing takes 2.5 ms < 8.33 ms arrival rate, so
    queues don''t build; latency is ~2.5 ms. Strategy A (Batch=4): You must wait ~33.3 ms to collect one
    frame from each camera. Compute time is ~(6 GOPS * 4) / 4000 = 6.0 ms + 2 ms PCIe = 8 ms. Total latency
    = 33.3 ms wait + 8 ms compute = 41.3 ms. Strategy B reduces latency by ~94% while easily sustaining
    the 120 FPS throughput requirement.'
