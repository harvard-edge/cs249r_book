title: Dataflow Graph Splitting Overhead
scenario: You are deploying an object detection model on a Hailo-8 edge accelerator (26 TOPS INT8, 2.5W).
  The compiler failed to fuse a heavy Conv2D layer with a custom activation function, splitting the graph.
  Because the Hailo-8 is a dataflow accelerator with no local DRAM, it must stream an intermediate 1920x1080x16
  INT8 feature map back to host memory, let the host CPU compute the activation, and stream it back for
  the next layer over a 2 GB/s PCIe link. Calculate the latency impact of this missing operator fusion
  compared to the theoretical compute time of the layer.
question: "Assuming the Conv2D is 52 GOPS, what latency penalty does the 1920x1080x16 INT8 round trip add over a 2 GB/s PCIe link?"
details:
  realistic_solution: The optimal approach is to modify the model architecture to use natively supported
    activations (like ReLU or SiLU) so the Hailo-8 compiler can spatially fuse the operations. This keeps
    the tensor entirely on-chip within the dataflow pipeline, maintaining the 2.5W power envelope and
    avoiding host memory wake-ups.
  common_mistake: Candidates often focus only on the CPU compute latency of the custom activation, forgetting
    that edge dataflow accelerators rely entirely on host memory streaming. They fail to quantify the
    massive PCIe I/O bottleneck incurred when a spatial graph is broken.
  napkin_math: Let's assume the Conv2D requires 52 GOPS. At 26 TOPS (26,000 GOPS), the compute time is
    52 / 26,000 = 0.002 seconds (2 ms). The feature map size is 1920 * 1080 * 16 bytes ≈ 33 MB. The broken
    fusion requires writing 33 MB to the host and reading 33 MB back (66 MB total). At a 2 GB/s (2000
    MB/s) link speed, the transfer takes 66 MB / 2000 MB/s = 33 ms. The missing fusion step increases
    the latency of this block from 2 ms to 35 ms, a 17.5x penalty.
