title: Optimizing Drift Detection on Hailo-8 Dataflow Accelerator
scenario: We are running a traffic monitoring model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because
  the Hailo-8 is a dataflow accelerator with no local DRAM, it streams activations directly from host
  memory. To detect data drift, the current pipeline extracts dense intermediate feature maps back to
  the host CPU to compute Population Stability Index (PSI) every frame, causing a severe throughput bottleneck.
  How would you diagnose this bottleneck and optimize the drift detection strategy?
details:
  realistic_solution: The bottleneck is the PCIe bandwidth saturated by streaming large intermediate feature
    maps from the Hailo-8 back to the host CPU. The optimization is to shift drift detection to the model's
    compact output representations (e.g., bounding box statistics, confidence scores) and compute drift
    on a sampled subset of frames on the host. This avoids interrupting the Hailo-8's stream-processing
    pipeline and drastically reduces host memory contention.
  common_mistake: Candidates often suggest running the PSI calculation directly on the Hailo-8, failing
    to realize it is an INT8 dataflow accelerator not suited for complex statistical operations across
    frames. Others suggest reducing the input resolution, missing the PCIe bandwidth bottleneck caused
    by streaming large intermediate feature maps back to the host.
  napkin_math: An intermediate feature map of 64x64x256 in INT8 requires ~1MB per frame. At 30 FPS, streaming
    this back to the host requires 30 MB/s of continuous bandwidth, stalling the host CPU. By shifting
    drift detection to output bounding boxes (e.g., 100 boxes * 6 values = 600 bytes/frame) and sampling
    at 1 FPS, the data transfer for drift detection drops from 30,000,000 bytes/s to 600 bytes/s. This
    50,000x reduction allows the Hailo-8 to fully utilize its 26 TOPS without host I/O stalls.
