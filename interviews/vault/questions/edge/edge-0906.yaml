title: SmartNIC NPU Arithmetic Intensity Mismatch
scenario: A SmartNIC embedded with an NPU is designed to perform line-rate deep packet inspection at 100 Gbps. The security team deployed an LSTM-based anomaly detection model (batch size 1 per flow). The NPU has 8MB of SRAM with 400 GB/s internal bandwidth. Despite the 10 TOPS rating, the NPU drops 45% of packets, and utilization sits at just 4%.
question: Why does the SmartNIC NPU sit at 4% utilization on a batch-1 LSTM DPI model, and what model change fixes it?
details:
  realistic_solution: 'The LSTM model running at batch size 1 is entirely memory-bandwidth bound due to low arithmetic intensity. An LSTM requires reading the entire weight matrix for every single token (packet payload byte) processed. To fix this, co-design the architecture: replace the LSTM with a 1D Convolutional Neural Network (CNN) or a small Transformer over a sliding window of packets. These architectures allow spatial parallelization and weight reuse, raising the arithmetic intensity.'
  common_mistake: |
    **The Pitfall:** Trying to increase the NPU clock speed or adding more SRAM capacity.
    **The Rationale:** Candidates misdiagnose the bottleneck as compute or capacity rather than fundamental memory bandwidth starvation.
    **The Consequence:** Hardware redesigns that fail to improve throughput because the arithmetic intensity remains too low.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak Compute: 10 TOPS (10,000 GOPs)
    - SRAM Bandwidth: 400 GB/s
    - LSTM Arithmetic Intensity: ~2 OPs/Byte

    **Calculations:**
    - Max throughput = Bandwidth * Intensity = 400 GB/s * 2 OPs/Byte = 800 GOPs = 0.8 TOPS
    - Utilization = 0.8 TOPS / 10 TOPS = 8% maximum theoretical (4% observed due to overheads)

    **Conclusion & Interpretation:**
    - **Result: 8% max theoretical utilization (Memory-Bandwidth Bound)**. The LSTM's low arithmetic intensity starves the 10 TOPS compute array, requiring an architectural shift to CNNs/Transformers.
