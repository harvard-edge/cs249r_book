title: The Self-Attention Traffic Jam
scenario: You're an ML Systems Engineer on the perception team for an autonomous vehicle. Your pedestrian
  detection model, a standard Vision Transformer (ViT-Base), is running on a Jetson AGX Orin. It's only
  achieving 10 FPS, critically missing the 30 FPS (33ms) system deadline. Profiling reveals the self-attention
  blocks have extremely low arithmetic intensity. What is the most effective change to meet the deadline?
details:
  realistic_solution: The correct approach is to replace the architecture. Vision Transformers, with their
    O(N²) self-attention mechanism, require fetching data from all over the input to calculate each output
    token. This results in a random-access memory pattern and very low data reuse, leading to a low arithmetic
    intensity. On edge hardware with limited memory bandwidth, this makes the model severely memory-bound.
    A modern CNN using depthwise separable convolutions (e.g., MobileNet, EfficientNet) exhibits high
    spatial locality—a filter kernel reuses input pixels multiple times as it slides across the feature
    map. This drastically increases arithmetic intensity, allowing the model to better utilize the Jetson
    Orin's compute units and break the memory bottleneck.
  common_mistake: Applying datacenter-centric solutions (e.g., bigger batches) or surface-level optimizations
    (e.g., quantization alone) without addressing the fundamental mismatch between the model's architecture
    and the edge hardware's memory system. Many engineers forget that peak TOPS are irrelevant if the
    model is memory-bound.
  napkin_math: 1. **Diagnose the Bottleneck:** The problem states low arithmetic intensity. The Jetson
    AGX Orin has a ridge point of ~1,342 Ops/Byte (INT8). The ViT's self-attention has an Arithmetic Intensity
    (AI) of roughly `SequenceLength / BytesPerElement`. For a 224x224 image with 16x16 patches, SequenceLength
    is 196. In INT8, the AI is ~196 Ops/Byte. Since 196 ≪ 1342, the model is severely memory-bound. Performance
    is dictated by Memory Bandwidth (204.8 GB/s), not Peak TOPS (275 TOPS).
  options:
  - Apply INT8 quantization to the Vision Transformer and keep the architecture.
  - Increase the Jetson Orin's power mode from 15W to 60W to increase TOPS.
  - Replace the ViT with a MobileNet-style CNN using depthwise separable convolutions.
  - Increase the batch size to better saturate the GPU cores.
  correct_index: 2
