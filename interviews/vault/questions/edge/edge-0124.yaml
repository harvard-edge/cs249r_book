title: 'The Thermal Throttling Trap: Power Budgeting'
scenario: 'You''re deploying a perception model to a Jetson AGX Orin, which the datasheet advertises as having 275 TOPS (INT8) of peak performance. However, the autonomous robot chassis it''s being installed in can only continuously dissipate 30W of heat.'
question: 'What sustained INT8 performance should you design around under the robot''s 30W thermal limit, and why?'
details:
  realistic_solution: 'The Jetson AGX Orin, like most complex SoCs, uses DVFS with pre-defined power profiles (P-states) to manage the trade-off between performance and power consumption. When constrained to a 30W thermal envelope, the system will not run at half performance. Instead, it will engage a specific, more efficient 30W power mode. For the AGX Orin, this mode delivers approximately 170 TOPS. This is because the underlying voltages and frequencies are optimized for that power level, resulting in a higher TOPS/Watt efficiency than at peak power.'
  common_mistake: 'Assuming performance scales linearly with power. Engineers often take the peak performance (275 TOPS) and its associated power draw (e.g., 60W) to calculate a single TOPS/Watt efficiency number. They then incorrectly multiply this by the new, lower power budget (30W), failing to account for the non-linear reality of Dynamic Voltage and Frequency Scaling (DVFS), where efficiency changes at different power points.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin peak performance: 275 TOPS (INT8) in MAXN mode (60W).
    - Robot continuous thermal dissipation limit: 30W.

    **Calculations:**
    - Peak Efficiency: 275 TOPS / 60W = ~4.6 TOPS/Watt.
    - The Orin has a specific 30W DVFS power profile, typically yielding ~170 TOPS, not a linear scaling of peak performance.

    **Conclusion & Interpretation:**
    - **Result: ~170 TOPS (Thermal-Bound)**. Because of Dynamic Voltage and Frequency Scaling (DVFS), efficiency increases at lower power modes, allowing better than linear performance scaling.
  options:
  - '138 TOPS, because performance scales linearly with the power budget.'
  - '275 TOPS, the device will just run hotter but should maintain its advertised performance.'
  - 'Around 170 TOPS, as the device selects its more efficient 30W DVFS power profile.'
  - '26 TOPS, which is the peak performance of other efficient edge accelerators in that power range.'
