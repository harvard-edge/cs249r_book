title: Hailo-8 Traffic Camera Drift Detection Specification
scenario: A smart city traffic camera uses a Hailo-8 accelerator (26 TOPS INT8, 2.5W)
  to run an object detection model, streaming data directly from the host SoC's memory
  since it lacks local DRAM. The city experiences significant seasonal weather changes
  (snow, heavy rain) that degrade model accuracy. Design a system specification to
  detect data drift at the edge without exceeding the host's limited memory bandwidth
  or disrupting the primary inference stream.
question: How would you detect seasonal data drift at the edge on Hailo-8 without
  adding host memory bandwidth pressure or disrupting inference?
details:
  realistic_solution: The optimal specification leverages the Hailo-8's dataflow architecture
    by extracting low-dimensional intermediate INT8 feature maps or embeddings from
    the existing inference pipeline. These tiny representations are sampled periodically
    (e.g., 1 FPS) and sent to the host CPU, which maintains a reference distribution
    and computes a lightweight Population Stability Index (PSI) to detect drift with
    minimal memory and compute overhead.
  common_mistake: Candidates often suggest computing complex statistical metrics like
    KL divergence on raw incoming high-resolution images. They fail to account for
    the fact that the Hailo-8 streams directly from host memory, and adding heavy
    raw-image processing on the host CPU would bottleneck memory bandwidth and exceed
    system power constraints.
  napkin_math: At 30 FPS, raw 1080p RGB inputs (1920x1080x3 bytes = 6.2 MB) consume
    186 MB/s of host-to-accelerator memory bandwidth. If drift detection extracts
    a 512-byte INT8 feature vector at 1 FPS, the data transfer for drift analysis
    is just 512 B/s. This adds roughly 0.0002% bandwidth overhead, safely preserving
    memory bandwidth for the 26 TOPS accelerator and keeping power draw near the 2.5W
    baseline.
