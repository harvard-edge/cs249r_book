title: The 30 FPS Deadline
scenario: You are designing the perception system for an autonomous vehicle. The system must process camera frames at a rate of 30 frames per second (FPS) to meet its real-time safety requirements.
question: What is the maximum permissible, or 'worst-case execution time', for the entire ML pipeline to process a single frame?
details:
  realistic_solution: The maximum permissible latency is approximately 33.3 milliseconds. This is the time budget for the entire end-to-end pipeline, from sensor data acquisition to the final output tensor. If the pipeline takes longer than this on any single frame, the system misses its deadline, which is unacceptable in a safety-critical application.
  common_mistake: |
    **The Pitfall:** Confusing the frame rate number (30) with the latency budget (30ms).
    **The Rationale:** Engineers often think about average-case latency rather than the absolute worst-case execution time (WCET) required for hard real-time systems.
    **The Consequence:** Designing a system that misses deadlines on edge cases, leading to catastrophic failures.
  napkin_math: |
    - Calculate time per frame: 1000 ms / 30 frames.
    - **Result: 33.3 ms per frame.**
  options:
  - 16.6 ms
  - 30 ms
  - 33.3 ms
  - 100 ms
  correct_index: 2
