title: Edge New 0015
scenario: 'A drone on an Orin runs a detector (10ms) followed by a tracker (15ms).'
question: Analyze the real-time tradeoff between running the detector and tracker sequentially per frame versus using pipeline parallel streams.
details:
  realistic_solution: Running sequentially means frame N completes in 25ms, yielding 40 FPS, with minimal memory overhead. Pipeline parallelism allows the detector to process frame N+1 while the tracker processes frame N. The bottleneck becomes the longest stage (15ms), yielding 66 FPS. The tradeoff is increased memory consumption and a 1-frame latency delay.
  common_mistake: |
    **The Pitfall:** Confusing throughput with latency.
    **The Rationale:** Candidates assume pipelining automatically reduces the time it takes a single frame to traverse the system.
    **The Consequence:** Recommending a pipeline that actually increases end-to-end latency for individual frames, which can be fatal in fast-moving drone control.
  napkin_math: |
    **Assumptions & Constraints:**
    - Detector takes 10ms.
    - Tracker takes 15ms.

    **Calculations:**
    - Sequential Latency = 10 + 15 = 25ms (40 FPS throughput).
    - Pipeline Bottleneck = max(10, 15) = 15ms (66.6 FPS throughput).
    - Pipelined Latency for frame N = 15ms wait + 15ms compute = 30ms.

    **Conclusion & Interpretation:**
    - **Result: Pipeline parallelism trades 5ms latency for 26.6 FPS gain (Latency-Bound)**. Latency-Bound tradeoff.
