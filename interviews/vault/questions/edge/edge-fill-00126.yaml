title: Edge TPU Inference Cost and Scalability
scenario: Your team is designing a new smart camera system that needs to perform real-time object detection
  at 30 frames per second (FPS) per camera feed. Each camera will be equipped with a Google Coral Edge
  TPU, which offers 4 TOPS for INT8 operations and consumes 2W of power under load. The object detection
  model, once quantized to INT8, is estimated to require 100 Giga-operations (INT8 GOps) per inference.
  You need to specify the hardware requirements and estimate the operational costs.
details:
  realistic_solution: The candidate should calculate the total GOps required per second per camera (100
    GOps/inference * 30 inferences/sec = 3000 GOps/sec = 3 TOPS/sec). Since a single Coral Edge TPU provides
    4 TOPS, one TPU per camera is theoretically sufficient. They should then consider the power consumption
    (2W per camera) and scale this up for a fleet, discussing cooling, power supply sizing, and aggregate
    energy costs. Discussion should also cover model quantization strategies and performance tuning for
    the specific hardware, and potentially batching if a single inference doesn't saturate the TPU.
  common_mistake: Ignoring the practical limitations of sustained throughput versus theoretical TOPS,
    or underestimating the impact of INT8-only constraints on model accuracy and development effort (quantization).
    Often, developers neglect power budget implications across a fleet of devices.
  napkin_math: Required GOps/sec = 100 GOps/inference * 30 inferences/sec = 3000 GOps/sec = 3 TOPS/sec.
    Available TOPS per TPU = 4 TOPS. Therefore, 1 TPU per camera is theoretically sufficient (4 TOPS /
    3 TOPS/sec = ~1.33 'extra capacity'). Power consumption per camera = 2W. For 1000 cameras, total power
    = 2W * 1000 = 2000W = 2kW.
