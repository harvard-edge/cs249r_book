title: 'Fault Tolerance: Fluency — Checkpoint Size for Edge Online Learning'
scenario: 'Your Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) runs a YOLOv8-medium model (26M params) with LoRA fine-tuning (rank 8). The device writes a checkpoint every 30 minutes to NVMe.'
question: What should each YOLOv8-medium LoRA checkpoint include, and what are its size, write time, and 30-day storage use?
details:
  realistic_solution: 'Checkpoint must include: frozen base model (int8) + LoRA weights (fp32) + optimizer state for LoRA + training metadata. Base model is large but can be restored from factory image — only the LoRA delta needs to be checkpointed for online learning state.'
  common_mistake: |
    **The Pitfall:** Checkpointing the entire frozen base model and forgetting optimizer states.
    **The Rationale:** Candidates treat LoRA tuning exactly like full fine-tuning without separating out the lightweight learned adapters.
    **The Consequence:** The checkpoint balloons from ~1MB to >26MB, needlessly increasing NVMe wear.
  napkin_math: |
    *   **Base Model:** 26M parameters = 26MB (INT8).
    *   **LoRA Parameters:** Rank-8 adapter = ~110K params * 4 bytes (FP32) = 442 KB.
    *   **Optimizer State:** AdamW = 2 * 442 KB = 884 KB.
    *   **Total LoRA Checkpoint:** 442 KB + 884 KB + 10 KB metadata = 1.33 MB.
    *   **Write Time:** 1.33 MB / 4 GB/s NVMe = 0.33 ms (negligible).
    *   **Result:** **Storage Cost = 30 days * 48 checkpoints/day * 1.33 MB = 1.92 GB (trivial on Orin).**
