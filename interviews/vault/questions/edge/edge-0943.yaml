title: Edge New 0004
scenario: A video analytics model on a T4 GPU (65 TFLOPS, 320GB/s) processes high-resolution frames. Increasing
  resolution from 1080p to 4K multiplies FLOPs by 4x (to 10GFLOPs) and activation memory by 4x (to 40MB).
  Analyze the FPS scaling tradeoff.
details:
  realistic_solution: Scaling to 4K significantly increases both arithmetic and memory pressure. Because
    CNN architectures typically maintain a high arithmetic intensity, the bottleneck is often the compute
    capability of the GPU rather than the memory bandwidth, especially for activations that stay in the
    L2 cache. The tradeoff is a proportional 4x drop in maximum frame rate to gain the spatial resolution
    needed for detecting small objects.
  common_mistake: Assuming moving to 4K causes a memory-bound cliff due to activation sizes without calculating
    the actual bandwidth ceiling.
  napkin_math: '1080p: 2.5GFLOPs, 10MB. 4K: 10GFLOPs, 40MB. Compute limit at 4K: 65 TFLOPS / 10 GFLOPs
    = 6500 FPS (theoretical). Memory limit: 320GB/s / 40MB = 8000 FPS. The workload remains compute-bound,
    so FPS drops exactly by a factor of 4.'
