title: The Sensor Fusion PCIe Bottleneck
scenario: A Level 4 AV perception system uses 8x 4K cameras at 30 FPS connected via PCIe Gen5 capture cards to a host with dual GPUs.
question: What is the likely cause of the 25ms camera-to-GPU copy in the two-GPU PCIe Gen5 perception system?
details:
  realistic_solution: The massive 25ms latency stems from a bounce buffer copy. Data is DMA'd from the capture card into host CPU RAM, then copied again via a secondary DMA transfer into GPU HBM. Enabling GPUDirect RDMA eliminates the host RAM bounce, allowing the PCIe capture cards to write directly to GPU memory via Peer-to-Peer (P2P) transfers.
  common_mistake: |
    **The Pitfall:** Blaming the PCIe hardware bandwidth.
    **The Rationale:** Confusing raw hardware theoretical bandwidth with the effective software path throughput, ignoring host-memory bounce buffers.
    **The Consequence:** Recommending expensive hardware upgrades instead of implementing zero-copy RDMA software fixes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x 4K RGB cameras at 30 FPS. Frame size: 3840 x 2160 x 3 bytes.
    - Interconnect: PCIe Gen5 (~64 GB/s theoretical).

    **Calculations:**
    - 1 Frame Payload: 3840 * 2160 * 3 = 24.88 MB.
    - Total Payload (8 cameras): 8 * 24.88 MB = 199.04 MB.
    - Theoretical Transfer Time: 199 MB / 64,000 MB/s = ~3.1 ms.

    **Conclusion & Interpretation:**
    - **Result: 25ms latency implies double-buffering (Software-Bound)**. GPUDirect RDMA is required.
  options:
  - NVLink is saturated by the 199MB transfer. Consolidate to a single GPU.
  - CAN bus interrupts are preempting the CPU cudaMemcpy operations.
  - The system performs a bounce buffer copy; GPUDirect RDMA is required.
  - PCIe Gen5 is fundamentally too slow; 199MB requires >25ms hardware time.
  correct_index: 2
status: deleted
