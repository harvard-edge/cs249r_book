title: The Sensor Fusion PCIe Bottleneck
scenario: You are an ML Systems Engineer at an AV startup designing the perception system for a Level 4 autonomous truck. The system uses two powerful GPUs in a single chassis to process data from 8x 4K cameras running at 30 FPS. The GPUs are connected via NVLink 4.0. The cameras are connected to the host system via PCIe Gen5 capture cards.
question: What is the likely cause of the 25ms camera-to-GPU copy in the two-GPU PCIe Gen5/NVLink perception system?
details:
  realistic_solution: |
    The PCIe bus is the bottleneck, but not because of a raw hardware limitation. The massive 25ms copy time indicates a highly inefficient data path. The system is performing a 'bounce buffer' copy: the camera's PCIe card DMAs data into host (CPU) RAM, and then the application initiates a second, separate DMA transfer from host RAM to the GPU's HBM.
  common_mistake: |
    **The Pitfall:** Blaming the wrong interconnect or assuming a hardware limitation.
    **The Rationale:** Engineers might blame NVLink (irrelevant here) or incorrectly conclude the PCIe bus is too slow, failing to distinguish raw hardware bandwidth from effective software data path bandwidth.
    **The Consequence:** Recommending expensive hardware upgrades instead of enabling GPUDirect RDMA.
  napkin_math: |
    - Image size: 3840 * 2160 * 3 bytes (RGB) = 24.88 MB.
    - Total data per frame (8 cameras): 8 * 24.88 MB = 199 MB.
    - Expected PCIe Gen5 transfer time for 199 MB: ~3 ms (at ~64 GB/s theoretical).
    - **Result: The 25ms latency is an order of magnitude higher, indicating software path overhead rather than raw PCIe limits.**
  options:
  - The NVLink connection between the two GPUs is saturated. Consolidate the model onto a single GPU to eliminate this traffic.
  - The vehicle's CAN bus is flooding the CPU with messages, causing OS scheduling delays that stall the cudaMemcpy operation.
  - The system is bottlenecked by an inefficient data path over PCIe; enable GPUDirect RDMA to allow the cameras to write directly to GPU memory.
  - The PCIe Gen5 bus is fundamentally too slow for 8x 4K cameras. The system requires an upgrade to a newer interconnect standard.
  correct_index: 2
