title: The Degradation Ladder
scenario: You're designing the reliability system for a fleet of Jetson AGX Orin devices performing real-time object detection for a security application. The system must never be down for more than a few minutes. You design a three-stage degradation ladder triggered by a watchdog process. The timeouts are: Initial Detection Timeout (10 seconds), Service Restart Timeout (15 seconds), and OS Reboot Timeout (90 seconds).
question: What is the maximum time to recovery if all three watchdog stages—10s detection, 15s service restart, and 90s OS reboot—fire sequentially?
details:
  realistic_solution: The maximum time to recovery is the sum of the timeouts for each sequential stage in the degradation ladder. The clock starts when the application hangs, and each stage must fail for its full timeout period before the next one begins.
  common_mistake: |
    **The Pitfall:** Underestimating the Maximum Time to Recovery by only considering the longest single timeout.
    **The Rationale:** Engineers mistakenly assume watchdogs run concurrently or only the final failsafe duration matters, ignoring the sequential nature of degradation stages.
    **The Consequence:** System downtime guarantees are violated because the true recovery time is the cumulative sum of all cascading timeouts.
  napkin_math: |
    1. Stage 1 (Initial Detection Timeout): 10s.
    2. Stage 2 (Service Restart Timeout): 15s.
    3. Stage 3 (Full OS Reboot Timeout): 90s.
    4. Calculate cumulative sequential downtime: 10s + 15s + 90s = 115s.
    **If a failure cascades through all stages sequentially, the total downtime is 115 seconds, well within the 'few minutes' requirement.**
  options:
  - 90 seconds
  - 105 seconds
  - 115 seconds
  - 25 seconds
  correct_index: 2
