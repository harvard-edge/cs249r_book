title: The Degradation Ladder
scenario: 'You''re designing the reliability system for a fleet of Jetson AGX Orin devices performing
  real-time object detection for a security application. The system must never be down for more than a
  few minutes. You design a three-stage degradation ladder triggered by a watchdog process. The timeouts
  are: Initial Detection Timeout (10 seconds), Service Restart Timeout (15 seconds), and OS Reboot Timeout
  (90 seconds).'
question: "What is the maximum time to recovery if all three watchdog stages—10s detection, 15s service restart, and 90s OS reboot—fire sequentially?"
details:
  realistic_solution: The maximum time to recovery is the sum of the timeouts for each sequential stage
    in the degradation ladder. The clock starts when the application hangs, and each stage must fail for
    its full timeout period before the next one begins.
  common_mistake: Engineers often underestimate the Maximum Time to Recovery by only considering the longest
    single timeout (the 90-second hardware watchdog) instead of summing the timeouts of the sequential
    stages. They forget that the system must fail through each preceding stage before the next one is
    triggered, making the total time cumulative.
  napkin_math: 'Stage 1: Initial Detection Timeout takes 10s. Stage 2: Service Restart Timeout takes 15s. Stage 3: Full OS Reboot Timeout takes 90s. If a failure cascades through all stages sequentially, total downtime = 10s + 15s + 90s = 115 seconds. Well within the "few minutes" requirement.'
  options:
  - 90 seconds
  - 105 seconds
  - 115 seconds
  - 25 seconds
  correct_index: 2
