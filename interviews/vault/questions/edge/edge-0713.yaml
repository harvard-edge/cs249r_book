title: The Degradation Ladder
scenario: 'You are designing the reliability system for a fleet of Jetson AGX Orin devices. You design a three-stage degradation ladder triggered by a watchdog process. The timeouts are: Initial Detection Timeout (10 seconds), Service Restart Timeout (15 seconds), and OS Reboot Timeout (90 seconds).'
question: What is the maximum time to recovery if all three watchdog stages fire sequentially?
details:
  realistic_solution: The maximum time to recovery (MTTR) is strictly additive in a sequential degradation ladder. The watchdog clock begins at application hang. It must exhaust the 10s detection window, fail the 15s service restart window, and finally trigger and complete the 90s hardware reboot sequence. Designing parallel watchdogs or early-abort heuristics is required to lower this worst-case boundary.
  common_mistake: |
    **The Pitfall:** Evaluating the MTTR based solely on the longest individual timeout stage (90s).
    **The Rationale:** Engineers assume watchdog triggers are evaluated simultaneously or fail to map out the state machine's required failure cascade.
    **The Consequence:** The system violates hard availability SLAs because the true worst-case downtime is significantly longer than documented.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stage 1 (Detection): 10s.
    - Stage 2 (Service Restart): 15s.
    - Stage 3 (OS Reboot): 90s.
    - Architecture: Cascading sequential failure.

    **Calculations:**
    - Maximum Time to Recovery (MTTR) = Sum(Timeouts).
    - MTTR = 10s + 15s + 90s = 115 seconds.

    **Conclusion & Interpretation:**
    - **Result: 115 seconds (Recovery-Time-Bound)**. The system is strictly bounded by the cumulative sum of the sequential degradation ladder.
  options:
  - 90 seconds
  - 105 seconds
  - 115 seconds
  - 25 seconds
  correct_index: 2
