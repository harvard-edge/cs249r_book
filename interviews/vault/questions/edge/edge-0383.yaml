title: 'The Power Efficiency Litmus Test: Energy Per Operation'
scenario: You're evaluating a new accelerator for an autonomous vehicle's perception system. The vendor's
  datasheet highlights its `TOPS/W` rating. What fundamental characteristic of the hardware does this
  metric allow you to quickly assess?
details:
  realistic_solution: TOPS/W measures **power efficiency**. It quantifies how many Trillion Operations
    Per Second a chip can execute for every watt of power it consumes. This is the most critical metric
    for power-constrained edge devices (like in a car or a drone) because the thermal envelope is fixed.
    A higher TOPS/W means more sustained compute performance within the same power budget.
  common_mistake: Confusing peak performance (TOPS) with performance *efficiency* (`/W`). At the edge,
    a system's performance is almost always limited by a strict power or thermal budget (e.g., 30W). A
    chip with high peak TOPS that exceeds this budget is useless, while a chip with a higher TOPS/W rating
    can deliver more sustained performance within that fixed budget.
  napkin_math: An autonomous vehicle's compute module has a strict 30W thermal budget.
  options:
  - The chip's maximum theoretical compute performance (peak TOPS).
  - The memory bandwidth available per watt.
  - 'Power efficiency: the operations delivered per watt of power consumed.'
  - The financial cost per TOP of performance ($/TOP).
  correct_index: 2
