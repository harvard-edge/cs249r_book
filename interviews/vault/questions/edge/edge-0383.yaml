title: 'The Power Efficiency Litmus Test: Energy Per Operation'
scenario: You're evaluating a new accelerator for an autonomous vehicle's perception system. The vendor's datasheet highlights its TOPS/W rating.
question: What fundamental characteristic of the hardware does the TOPS/W metric allow you to quickly assess?
details:
  realistic_solution: TOPS/W measures absolute power efficiency. It quantifies how many Trillion Operations Per Second a chip can execute for every watt of power it consumes. This is the paramount metric for edge devices operating within fixed thermal envelopes, as higher TOPS/W dictates the maximum sustained compute performance before thermal throttling occurs.
  common_mistake: |
    **The Pitfall:** Confusing peak performance (TOPS) with performance efficiency (TOPS/W).
    **The Rationale:** Engineers assume peak theoretical capability dictates real-world performance, ignoring thermal throttling.
    **The Consequence:** Selecting an accelerator with massive peak TOPS that must immediately throttle back due to hitting the 30W limit, resulting in lower actual performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Thermal constraint: 30W fixed budget
       - Metric: TOPS/W (Power Efficiency)
    2. **Calculations:**
       - Accelerator A (5 TOPS/W): 5 * 30W = 150 TOPS sustained
       - Accelerator B (1 TOPS/W): 1 * 30W = 30 TOPS sustained
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound Sustained Performance.** TOPS/W directly predicts the achievable sustained performance under a strict thermal limit.
  options:
  - 'The chip''s maximum theoretical compute performance (peak TOPS).'
  - 'The memory bandwidth available per watt.'
  - 'Power efficiency: the operations delivered per watt of power consumed.'
  - 'The financial cost per TOP of performance ($/TOP).'
  correct_index: 2
