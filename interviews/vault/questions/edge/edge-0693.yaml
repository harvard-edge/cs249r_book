title: The QAT Cliff
scenario: You post-training quantized (PTQ) your autonomous driving detection model from FP16 to INT4
  on a Jetson Orin. Overall mAP dropped only 2% — acceptable. But when you test on nighttime scenes with
  low-contrast pedestrians, recall for the 'pedestrian' class drops from 94% to 71%. Your safety team
  blocks deployment. What went wrong with PTQ, and what is the principled fix?
details:
  realistic_solution: 'PTQ calibrates quantization ranges using a representative dataset, but the calibration
    statistics are dominated by the *majority distribution* (daytime, high-contrast). Nighttime pedestrians
    have activations in the long tail of the distribution — small magnitude, low contrast. INT4''s 16
    discrete levels crush these subtle features into the same quantization bin, destroying the signal.
    The fix is **Quantization-Aware Training (QAT)**: insert fake-quantization nodes during fine-tuning
    so the network learns to be robust to INT4 discretization. QAT forces the gradient updates to account
    for quantization error, effectively widening the activation distributions for hard classes. Additionally,
    use per-channel quantization on the critical detection head layers and mixed-precision: INT4 for the
    backbone (where features are robust) and INT8 for the detection head (where precision matters for
    safety-critical classes).'
  common_mistake: '"INT4 is too aggressive — go back to INT8." This may work but doesn''t explain *why*
    PTQ failed selectively, and it leaves performance on the table.'
  napkin_math: INT8 = 256 levels. INT4 = 16 levels. A nighttime pedestrian might produce activations in
    the range [0.01, 0.05]. INT8 step size for range [0, 1] = 1/256 ≈ 0.004 → 10 distinct levels in [0.01,
    0.05]. INT4 step size = 1/16 = 0.0625 → **zero** distinct levels in [0.01, 0.05] — the entire signal
    collapses to one bin.
