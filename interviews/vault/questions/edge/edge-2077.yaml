title: Edge Data Quality and Validation for Critical Hailo-8 Deployments
scenario: You are leading the ML deployment for an autonomous drone system where computer vision models are executed on a Hailo-8 AI accelerator. The drone relies on high-fidelity sensor data for navigation. Data quality issues can lead to severe operational failures.
question: How would you design a real-time data quality pipeline for a Hailo-8 drone that enforces data contracts and detects sensor anomalies without cloud reliance?
details:
  realistic_solution: 'A realistic solution involves a multi-layered approach: (1) Lightweight, compiled schema validation (e.g., using Protobuf/Flatbuffers) at the data ingestion point. (2) Real-time, localized statistical anomaly detection (e.g., Z-score, simple moving average deviations) on key sensor metrics, performed directly on the Hailo-8 (if feasible) or a low-power host CPU. (3) Data contracts enforced through versioned metadata accompanying data streams. (4) Event-driven quality gates that can temporarily quarantine or alert on suspicious data, with a feedback loop to recalibrate sensors or trigger re-transmission. (5) Lineage tracking through minimal metadata tags, allowing for delayed, batched upload to the cloud for deeper analysis and auditing without impacting real-time edge operations.'
  common_mistake: |
    **The Pitfall:** Designing validation systems that are too computationally intensive or rely on cloud connectivity.
    **The Rationale:** Candidates often apply standard cloud-based data quality tools without considering edge power, latency, and offline requirements.
    **The Consequence:** Increased latency, exceeded power budgets, and silent failures during disconnected operations.
  napkin_math: |
    **Assumptions & Constraints:**
       - Total Compute Available: 26 TOPS.
       - Total Power Budget: 2.5W.
       - CV Model Compute/Power: ~10 TOPS, 2.0W.
    **Calculations:**
       - Remaining Compute for Validation: 26 TOPS - 10 TOPS = 16 TOPS.
       - Remaining Power for Validation: 2.5W - 2.0W = 0.5W.
       - Memory for 1-minute 30Hz moving average: 1KB * 30 frames * 60 seconds = 1.8MB per sensor.
    **Conclusion & Interpretation:**
       - **Result: Strict Resource Bounds**. Validation must fit entirely within 16 TOPS, 0.5W, and 1.8MB per sensor stream.
