title: The Offline-First Edge Design
scenario: Your edge AI system monitors a remote oil pipeline in the Alaskan wilderness. It has satellite connectivity that works 4 hours per day (weather-dependent) with 256 Kbps bandwidth. The system must detect pipeline leaks 24/7.
question: How do you design the system to operate independently of cloud connectivity?
details:
  realistic_solution: 'Design strictly offline-first: run all inference on-device with zero cloud dependency. Use the tiny satellite window for priority-ranked uploads: critical alerts first, daily telemetry summaries, then thumbnails. Model updates must arrive as heavily compressed delta patches. The cloud enhances reporting but never gates the safety-critical detection loop.'
  common_mistake: |
    **The Pitfall:** Buffering all raw video data locally and attempting to upload it when connectivity is available.
    **The Rationale:** Treating the edge device merely as an ingestion node for cloud-centric processing.
    **The Consequence:** Generating gigabytes per day that mathematically cannot be transferred over a 256 Kbps link, permanently filling local storage and causing system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Satellite Window: 4 hours per day.
    - Bandwidth: 256 Kbps.
    - Upload priorities: Alerts (50 KB), Summary (1 MB), Model Delta (1.4 MB).

    **Calculations:**
    - Window bandwidth: 4 hours * 3600s * 256 Kbps = 3.68 Gigabits = 460 Megabytes.
    - Usable bandwidth (overhead): ~350 MB.
    - Mandatory daily payloads: ~2.5 MB.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound Architecture**. Edge inference is mandatory; the daily 350 MB budget strictly prohibits streaming continuous video feeds.
