title: Reducing activation memory for on-device fine-tuning on Jetson Orin
scenario: You need to perform on-device fine-tuning of a MobileNetV3-Large model on Jetson Orin (275 TOPS, 32GB, 60W) using local sensor data. The full fine-tuning run OOMs at batch=8 even though the model is only 5.4M parameters (21MB in FP32). You need to fit within 2GB RAM to leave headroom for the OS and other processes.
question: What is the FP32 activation memory for a batch=8, 96-channel, 28x28 feature map, and why is 7.2 MB too high?
details:
  realistic_solution: |
    Activation size is calculated by multiplying batch size, channels, spatial dimensions, and data type size. The actual size is 2.4MB, so 7.2MB is incorrect (3x too large).
  common_mistake: |
    **The Pitfall:** Assuming fine-tuning memory is dictated solely by model parameters and optimizer states.
    **The Rationale:** Ignoring activation memory, which for a batch of images and high-resolution feature maps across all layers, sums to hundreds of megabytes.
    **The Consequence:** Encountering unexpected Out-Of-Memory (OOM) errors on the edge device during fine-tuning.
  napkin_math: |
    - Batch size = 8, Channels = 96, Spatial = 28x28, FP32 (4 bytes).
    - Calculation: 8 * 96 * 28 * 28 * 4 bytes = 2,408,448 bytes.
    - **Result: ~2.4 MB (not 7.2 MB, which is exactly 3x too large).**
