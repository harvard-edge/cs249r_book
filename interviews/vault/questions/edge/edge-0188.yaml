title: The Continuous Batching Throughput Advantage
scenario: You are designing an offline data processing pipeline for an autonomous vehicle fleet. The goal is to maximize TPOT (Throughput of Processing) on a cluster of Jetson AGX Orin devices. Inference requests arrive with variable timing.
question: Which gives higher TPOT for variable arrivals: static batching of 8 with a 10ms timeout or continuous batching, and why?
details:
  realistic_solution: Continuous batching will yield significantly higher TPOT. With static batching, the GPU is often idle, either waiting for 8 requests to arrive or waiting for the 10ms timeout to be reached with a smaller batch. This wait time is pure waste. Continuous batching (or dynamic batching) eliminates this waste. It maintains a queue of requests and processes a batch as soon as the GPU has capacity, immediately swapping in new requests as old ones finish. This keeps the GPU close to 100% utilization, maximizing the number of inferences completed over time.
  common_mistake: |
    **The Pitfall:** Assuming that waiting to form a larger, static batch is always more efficient for overall throughput.
    **The Rationale:** Candidates focus solely on maximizing hardware efficiency per inference pass, ignoring the significant GPU idle time that accumulates while the system waits for the batch to fill or the timeout to expire.
    **The Consequence:** The system suffers from high latency variance and significantly lower overall Throughput of Processing (TPOT).
  napkin_math: |
    - Inference on a batch of 8 takes 80ms.
    - With static batching and a 10ms timeout, incomplete batches cause idle GPU time.
    - Continuous batching immediately injects new requests as others finish, keeping the GPU near 100% utilization.
    **Conclusion: Continuous batching eliminates the 10ms wait time per batch, substantially increasing TPOT.**
  options:
  - Static batching is better because a larger batch size of 8 is more hardware-efficient.
  - Continuous batching is better because it minimizes GPU idle time by processing requests from a queue as soon as capacity is available.
  - The throughput will be identical because the underlying hardware performance is the same.
  - Static batching with a very short timeout (e.g., 1ms) would be better than continuous batching.
  correct_index: 1
