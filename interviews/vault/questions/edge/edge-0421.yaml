title: The Fragmented Inference Graph
scenario: You are an ML systems engineer deploying a custom vision model to a Jetson AGX Orin for a real-time
  object detection task. The system requires 30 FPS performance (a 33ms per-frame deadline), but your
  model is currently running at 22 FPS (45ms per-frame).
details:
  realistic_solution: The correct approach is to apply operator fusion. The profiler data clearly shows
    that the `BatchNorm` and `Activation` layers are memory-bound; their execution time is dominated by
    the cost of reading data from DRAM and writing it back, plus the overhead of launching a separate
    GPU kernel for each one. By fusing these operations into their preceding `Conv2D` layers (e.g., creating
    a single `Conv-BN-SiLU` operator), the intermediate tensors never have to be written to or read from
    main memory. The calculations are performed on-the-fly in the GPU's fast on-chip caches or registers.
    This effectively eliminates the DRAM roundtrips and kernel launch overhead, saving almost the entire
    14ms currently spent in those layers and bringing the total inference time down to ~31ms, thus meeting
    the 33ms deadline.
  common_mistake: 'Engineers often focus only on FLOPs, assuming that computational layers like `Conv2D`
    are the only source of latency. They misdiagnose the problem as compute-bound and suggest optimizations
    like pruning or increasing clock speed, which fail to address the true bottleneck: memory bandwidth
    and kernel launch overhead for small, element-wise operations.'
  napkin_math: The key insight is that the `BatchNorm` and `Activation` layers have extremely low Arithmetic
    Intensity (AI).
  options:
  - Increase the GPU clock speed and power draw to make the existing kernels run faster.
  - Apply structured pruning to the `Conv2D` layers to reduce the model's total FLOPs.
  - Fuse the `BatchNorm` and `Activation` layers into their preceding `Conv2D` operations.
  - Convert the entire model to INT8 precision to reduce memory bandwidth pressure.
  correct_index: 2
