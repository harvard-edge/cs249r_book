title: The Fragmented Inference Graph
scenario: 'You are deploying a custom vision model to an edge SoC for a real-time object detection task. The system requires 30 FPS performance (33ms per-frame deadline), but your model currently takes 45ms per frame.'
question: 'What optimization should you apply to get the 45ms model under the 33ms frame deadline?'
details:
  realistic_solution: 'Apply operator fusion. Profiler data (e.g., using nsys) reveals that `BatchNorm` and `Activation` layers are memory-bound. By fusing these operations into their preceding `Conv2D` layers (creating a single `Conv-BN-SiLU` operator), intermediate tensors bypass main memory entirely, executing within GPU registers/SRAM.'
  common_mistake: |
    **The Pitfall:** Focusing only on FLOPs and assuming computational layers are the sole source of latency.
    **The Rationale:** Engineers misdiagnose the problem as compute-bound and suggest optimizations like pruning or increasing clock speed.
    **The Consequence:** They fail to address the true bottleneck: memory bandwidth and kernel launch overhead for small, element-wise operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current latency: 45ms (22 FPS).
       - Latency deadline: 33ms (30 FPS).
       - Element-wise operations (BN/Activation) memory I/O latency: 14ms.
    2. **Calculations:**
       - Fusing `Conv2D + BN + Activation` completely eliminates the 14ms intermediate DRAM reads/writes and kernel launch overhead.
       - Optimized Latency = 45ms - 14ms = 31ms.
    3. **Conclusion & Interpretation:**
       - **Fusing saves ~14ms of memory I/O time, reducing the total inference time to 31ms (safely under the 33ms deadline).** (Result: Memory-Bandwidth Bound)
  options:
  - 'Increase the GPU clock speed and power draw to make the existing kernels run faster.'
  - 'Apply structured pruning to the Conv2D layers to reduce the model''s total FLOPs.'
  - 'Fuse the BatchNorm and Activation layers into their preceding Conv2D operations.'
  - 'Convert the entire model to INT8 precision to reduce memory bandwidth pressure.'
  correct_index: 2
