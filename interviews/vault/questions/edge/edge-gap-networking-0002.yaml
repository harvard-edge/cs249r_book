title: Edge Retry Storm Policy
scenario: A fleet of edge gateways retries failed inference requests to a regional service. During outages, synchronized retries have caused overload after recovery. Specify the retry policy.
question: What retry policy prevents edge gateways from amplifying regional inference outages?
details:
  realistic_solution: Use bounded retries, exponential backoff with jitter, retry budgets, circuit breakers, local fallback, and server retry-after signals. Gateways should drop or degrade low-priority requests rather than synchronize retry bursts.
  common_mistake: Adding retries to improve reliability while causing a thundering herd during recovery.
  napkin_math: If 5,000 gateways retry twice in the same second, they add 10,000 requests/s on top of normal recovery traffic.
