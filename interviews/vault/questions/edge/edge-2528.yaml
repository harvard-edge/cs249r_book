title: CSI-2 Direct vs PCIe Switched Latency
scenario: A 4K 60fps camera streams 500 MB/s of data. A switched topology routes the CSI-2 stream through an FPGA buffer, which then forwards it via PCIe Gen4 x4 to a Jetson Orin, instead of using direct memory-mapped CSI-2.
question: Evaluate the added synchronization overhead of the store-and-forward FPGA topology per frame.
details:
  realistic_solution: To translate protocols, the FPGA must buffer a full frame before initiating the PCIe DMA. This switched topology adds a synchronization bubble compared to direct line-by-line CSI-2 writes.
  common_mistake: |
    **The Pitfall:** Treating the FPGA routing bandwidth as zero-latency.
    **The Rationale:** Candidates focus solely on the high bandwidth of the PCIe Gen4 link, forgetting that protocol translation requires frame-level store-and-forward buffering.
    **The Consequence:** Severe underestimation of end-to-end latency, breaking strict real-time deadlines in the perception pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stream Bandwidth: 500 MB/s at 60 FPS.
       - Topology: Store-and-forward FPGA buffer to PCIe Gen4 x4 (8 GB/s).
    2. **Calculations:**
       - Frame Size: 500 MB/s / 60 FPS = 8.33 MB/frame.
       - FPGA Buffering Delay: 1 second / 60 FPS = 16.66ms.
       - PCIe DMA Transfer Time: 8.33 MB / 8000 MB/s ≈ 1.04ms.
       - Total Synchronization Overhead: 16.66ms + 1.04ms = 17.7ms.
    3. **Conclusion & Interpretation:**
       - **Result: 17.7ms synchronization delay per frame (Latency-Bound).**
