title: CSI-2 Direct vs PCIe Switched Latency
scenario: A 4K 60fps camera streams 500 MB/s. A switched topology routes CSI-2 through
  an FPGA buffer, then via PCIe Gen4 x4 (8 GB/s) to a Jetson Orin, instead of direct
  memory-mapped CSI-2.
question: Evaluate the added synchronization overhead of the store-and-forward FPGA
  topology per frame.
details:
  realistic_solution: To translate protocols, the FPGA must buffer a full frame (500
    MB/s / 60 fps = 8.3 MB) before initiating the PCIe DMA. Buffering takes 16.6ms.
    The PCIe DMA takes 8.3 MB / 8 GB/s = ~1ms. This switched topology adds a 17.6ms
    synchronization bubble compared to direct line-by-line CSI-2 writes.
  common_mistake: Treating the FPGA routing bandwidth as zero-latency, forgetting
    that protocol translation requires frame-level store-and-forward buffering.
  napkin_math: Frame = 500MB/s / 60 = 8.33MB. Buffer wait = 16.6ms. DMA = 8.33/8000
    = 1.04ms. Total delay = 17.6ms.
