title: Streaming Dataflow Bottlenecks on Hailo-8
scenario: You are profiling a fully connected layer on a Hailo-8 edge accelerator (26 TOPS INT8 peak compute,
  2.5W power, no local DRAM, streaming directly from host memory). The host connection provides a maximum
  bandwidth of 4 GB/s. The layer requires 100 Mega-Operations (MOPS) and streams a total of 2 Megabytes
  of weights and input activations from the host. You observe that the accelerator only achieves 0.2 TOPS
  of actual throughput, leaving the compute array heavily underutilized. Explain why this bottleneck occurs
  given the accelerator's architecture.
question: "Why does the Hailo-8 reach only 0.2 TOPS on this 100 MOPS, 2 MB layer despite a 26 TOPS INT8 peak?"
details:
  realistic_solution: The candidate should recognize that because the Hailo-8 lacks local DRAM and relies
    on streaming, performance on low-reuse layers is strictly limited by the host bandwidth. They must
    calculate the arithmetic intensity of the layer and multiply it by the host bandwidth to prove that
    the system is completely memory-bound, capping the performance well below the theoretical 26 TOPS.
  common_mistake: Candidates often blame host-to-device latency, driver overhead, or power throttling
    (due to the 2.5W envelope). They fail to analyze the arithmetic intensity of the workload and compare
    the required data feed rate against the available streaming bandwidth.
  napkin_math: Arithmetic Intensity = 100 MOPS / 2 MB = 50 OPS/Byte. Maximum achievable compute throughput
    = Host Bandwidth * Arithmetic Intensity = 4 GB/s * 50 OPS/Byte = 200 GOPS = 0.2 TOPS. Because 0.2
    TOPS is drastically lower than the 26 TOPS peak capability, the compute array starves while waiting
    for data from the host.
