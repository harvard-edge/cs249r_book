title: The Federated Fleet's Budget Blowout
scenario: You are an ML Systems Engineer on the autonomous driving team at a major EV manufacturer. You're running an A/B test on 10,000 vehicles to evaluate a new lane-keeping model trained via Federated Learning. Your legacy model was 40 MB and was updated once per day. The new, more complex model is 50 MB and requires four communication rounds per day to converge effectively. The finance department reports that the daily cellular data costs for the A/B test group have unexpectedly quintupled. Cellular data costs $2.00 per GB.
question: What is the primary driver of the 5x daily cellular data cost increase in the 10,000-vehicle FL A/B test?
details:
  realistic_solution: The primary driver of the cost increase is the 4x jump in communication frequency, which creates a multiplicative effect with the model size. In Federated Averaging, each 'communication round' involves the device downloading the global model and uploading its updated local model. Therefore, the total data transfer is a function of both model size and communication frequency. The 4x increase in frequency, combined with a 1.25x increase in model size, results in a 5x total increase in data transferred per day, perfectly explaining the cost explosion.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the static 25% increase in the model size (40 MB to 50 MB).
    **The Rationale:** Engineers assume that a 25% larger binary dictates a proportional cost increase, ignoring the multiplicative frequency of federated communication rounds.
    **The Consequence:** Architectural decisions completely fail to project true operational costs, resulting in multimillion-dollar budget overruns.
  napkin_math: |
    1. Calculate Legacy daily data per vehicle: 40 MB download + 40 MB upload (1 round) = 80 MB.
    2. Calculate New daily data per vehicle: (50 MB download + 50 MB upload) * 4 rounds = 400 MB.
    3. Calculate data increase ratio: 400 MB / 80 MB = 5x increase per vehicle.
    4. Calculate Fleet cost (Legacy): 10,000 * 80 MB = 800 GB/day. At $2.00/GB = $1,600/day.
    5. Calculate Fleet cost (New): 10,000 * 400 MB = 4,000 GB/day. At $2.00/GB = $8,000/day.
    **The 50 MB model multiplied by 4 daily rounds results in 400 MB/day per vehicle, a perfect 5x increase driving daily costs to $8,000.**
  options:
  - The 25% increase in model size is the primary cause, as larger binaries always have proportionally higher transfer costs.
  - The new model is uploading raw sensor data logs for debugging, which is a standard practice in A/B tests for safety-critical systems.
  - The 4x increase in communication frequency is the dominant cost driver, creating a 5x multiplicative effect when combined with the larger model size.
  - On-device training for the new model is more compute-intensive, causing the cellular modem to draw more power and transmit more telemetry, leading to higher data charges.
  correct_index: 2
