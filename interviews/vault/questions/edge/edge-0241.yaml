title: The Fundamental Bottleneck Metric
scenario: You're profiling a new object detection model for an autonomous vehicle on a power-constrained
  edge accelerator like a Jetson AGX Orin. You need to determine if the model's performance is limited
  by the GPU's raw computational power or its memory bandwidth. What is the fundamental metric you would
  calculate to make this determination?
details:
  realistic_solution: The fundamental metric is **Arithmetic Intensity (AI)**. It is the ratio of compute
    operations (OPS) to data movement (Bytes). By comparing the model's AI to the hardware's ridge point,
    you can definitively tell if it's compute-bound (AI > ridge point) or memory-bound (AI < ridge point).
  common_mistake: Engineers often confuse the *result* of a bottleneck (like high latency) with its *cause*.
    They might also focus on a related but distinct metric like power efficiency (TOPS/W) or memory capacity
    (total RAM used), rather than the specific ratio that defines the performance bottleneck.
  napkin_math: Let's say a layer in your model performs 20 Giga-OPS (20e9 OPS) and reads 500 MegaBytes
    (500e6 Bytes) of data (weights + activations).
  options:
  - TOPS/W
  - P99 Latency (ms)
  - Arithmetic Intensity (Ops/Byte)
  - Total Activation Memory (MB)
