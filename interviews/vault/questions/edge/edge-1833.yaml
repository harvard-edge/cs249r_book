title: Observability for On-Premise AI 100 Accelerators
scenario: You are deploying a fleet of on-premise inference servers, each equipped with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The models perform real-time video analytics for factory safety. You need to design a telemetry system that can quickly identify and isolate stragglers—accelerators that are underperforming and causing pipeline bottlenecks.
question: How do you design the observability stack to ensure high reliability without overwhelming the factory's limited external network bandwidth?
details:
  realistic_solution: Design a two-tiered observability stack. Deploy a lightweight local agent on each inference server to poll the Qualcomm AI 100's hardware counters and application metrics. The agent aggregates and downsamples this data locally, sending only summarized metrics (e.g., p95 latency, average utilization) and critical alerts to a centralized on-premise dashboard. Straggler detection is performed locally by comparing metrics against expected baselines before transmission.
  common_mistake: |
    **The Pitfall:** Sending raw, high-frequency telemetry data directly to a central cloud dashboard.
    **The Rationale:** Candidates are accustomed to cloud-native environments where egress bandwidth is practically unlimited and cheap.
    **The Consequence:** The factory's limited external network is completely saturated by metrics, crippling core operational traffic.
  napkin_math: |
    1. Assume 100 metrics sampled at 1 Hz per AI 100. Unaggregated raw data (12 bytes/metric): 1.2 KB/s per accelerator.
    2. For 50 accelerators, that is 60 KB/s (~5 GB/day).
    3. By aggregating locally into 1-minute summaries (min, max, avg, p95), the payload is 4 stats * 12 bytes = 48 bytes per metric per minute.
    4. Total payload per accelerator: 100 metrics * 48 bytes / 60s = 80 bytes/s.
    5. **For 50 accelerators, local aggregation drops bandwidth from 60 KB/s to 4 KB/s, preserving the factory network.**
