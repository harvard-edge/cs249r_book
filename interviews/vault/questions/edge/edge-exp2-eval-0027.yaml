title: Edge TPU Model Swapping and Memory Pressure
scenario: 'You are deploying a multi-model video analytics pipeline on a gateway device utilizing a USB
  Google Coral Edge TPU (4 TOPS INT8, 2W). The host device has severely constrained RAM, and the Edge
  TPU requires swapping distinct INT8 quantized models in and out of its local SRAM to process sequential
  pipeline stages. You must evaluate two memory management strategies to handle the tensor I/O: (A) preemptively
  allocating fixed, pinned host memory pools for each model''s input/output tensors, or (B) using a single,
  dynamically allocated memory pool that relies on OS-level eviction and page caching to clear inactive
  tensors. Which approach better prevents OOM crashes and memory fragmentation?'
question: "Which approach better prevents OOM crashes and memory fragmentation?"
details:
  realistic_solution: Alternative A (pre-allocated fixed memory pools) is the superior architectural choice
    for this constrained environment. By pinning host memory and maintaining strict, contiguous boundaries
    for the INT8 I/O tensors of each model, you completely bypass OS-level memory fragmentation and prevent
    unexpected OOM kills under peak inference load. This predictable memory footprint ensures the 4 TOPS
    Edge TPU isn't starved waiting for the host OS to reclaim and compact fragmented memory pages.
  common_mistake: Candidates often choose the dynamic pool (B), assuming the OS page cache will efficiently
    handle memory eviction and maximize available RAM for other processes. They fail to account for the
    severe memory fragmentation and unpredictable latency spikes that occur when the OS struggles to find
    contiguous physical memory pages for USB/PCIe DMA transfers to the Coral TPU.
  napkin_math: Assume 3 INT8 models, each requiring 5MB for parameters and 3MB for I/O tensors (8MB total
    per model). In approach A, fixed pools reserve 3 * 8MB = 24MB of pinned host memory permanently with
    zero fragmentation overhead. In approach B, dynamic allocation of 8MB chunks at 30 FPS generates 240MB/sec
    of transient buffer allocations. If OS memory reclamation and compaction lags by just 2 seconds during
    a CPU spike, host memory pressure immediately surges by 480MB, leading to massive fragmentation and
    highly probable OOM kills on edge devices with <1GB RAM.
