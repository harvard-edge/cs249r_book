title: Encoder-Decoder Latency Disparity on Jetson Orin
scenario: We are deploying a real-time 1B parameter encoder-decoder translation model on an NVIDIA Jetson Orin (32 GB LPDDR5 with ~200 GB/s bandwidth, 275 TOPS INT8, 60W TDP, Ampere GPU). During profiling, the encoder processes 50-token input sequences in 10ms, efficiently utilizing the Ampere GPU. However, the decoder takes 250ms to generate 50 output tokens, during which the 275 TOPS compute capacity is less than 10% utilized. Explain why this massive latency and utilization disparity occurs between the encoder and decoder architectures, despite running on the exact same hardware.
question: Why does the encoder run in 10ms while the autoregressive decoder takes 250ms on the same Jetson Orin hardware?
details:
  realistic_solution: The latency disparity occurs because of the fundamental architectural difference between parallel encoding and autoregressive decoding. The encoder processes the entire input sequence simultaneously, loading the model weights from the LPDDR5 memory into the GPU just once and fully leveraging the 275 TOPS compute. The decoder, however, generates tokens sequentially; for each new token, it must reload the entire model weights from memory, leaving the compute units starved and idle while waiting for memory bandwidth.
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to the decoder having more complex operations or needing more raw compute power.
    **The Rationale:** Candidates focus on the sequential nature of the output without identifying the underlying hardware memory bottleneck.
    **The Consequence:** They try to optimize the decoder's math operations, failing to resolve the fundamental memory bandwidth starvation.
  napkin_math: |
    * Model size (INT8): 1B parameters = 1 GB weights.
    * Encoder phase: Loads 1 GB once for all 50 tokens. Transfer time = 1 GB / 200 GB/s = 5 ms. Compute bound.
    * Decoder phase: Must reload the 1 GB weights for EACH of the 50 tokens sequentially.
    * Decoder transfer time per token = 1 GB / 200 GB/s = 5 ms.
    * Total decoder transfer time for 50 tokens = 50 × 5 ms = 250 ms.
    * **The 250ms decoder latency is entirely bottlenecked by the LPDDR5 memory bandwidth, starving the compute units.**
