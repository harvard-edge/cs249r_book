title: 'Edge TCO Design: Size Fleet Budget for Autonomous Vehicle Fleet'
scenario: An autonomous vehicle company is deploying 10,000 robotaxis. Each AV requires a primary edge module (60W, $499) and a backup accelerator (2.5W, $200). The fleet operates 24/7 with 50% uptime. Power comes from the vehicle battery at a $0.12/kWh equivalent. Maintenance is 3% of hardware cost annually, and OTA updates cost $500/vehicle/year.
question: What is the 5-year total cost of ownership (TCO) for the inference compute hardware across the 10,000-vehicle fleet?
details:
  realistic_solution: |
    Per vehicle: Hardware = $699. Power at 50% utilization = 31.25W. Power cost over 5 years = $164.25. Annual maintenance = $20.97/yr. OTA = $500/vehicle/yr. 5-year TCO per vehicle is $3,468. Fleet TCO is $34.68M.
  common_mistake: |
    **The Pitfall:** Forgetting to convert vehicle power consumption into a $/kWh equivalent.
    **The Rationale:** Engineers often treat embedded power as "free" or fail to link it to the actual electricity cost of EV charging.
    **The Consequence:** Significantly underestimating the operational energy costs of running compute hardware on battery-powered vehicles over a multi-year lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware per AV: $499 + $200 = $699.
    - Power: 62.5W total * 50% uptime = 31.25W avg = 0.03125 kW.
    - Timeframe: 5 years, $0.12/kWh.
    - OPEX: 3% hardware maintenance/yr, $500 OTA/yr.

    **Calculations:**
    - 5-Year Energy Cost: 0.03125 kW * 24 h/day * 365 days/yr * 5 years * $0.12 = $164.25.
    - 5-Year Maintenance: $699 * 0.03 * 5 = $104.85.
    - 5-Year OTA Cost: $500 * 5 = $2,500.
    - TCO per AV: $699 (HW) + $164.25 (Energy) + $104.85 (Maint) + $2,500 (OTA) = $3,468.10.
    - Total Fleet TCO: $3,468.10 * 10,000 = ~$34.68 Million.

    **Conclusion & Interpretation:**
    - **Result: ~$34.68 Million TCO (OpEx-Bound)**. OTA software updates dominate the TCO, significantly outweighing power and hardware costs.
