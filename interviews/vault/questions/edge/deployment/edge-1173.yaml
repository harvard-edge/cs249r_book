title: Solar Sizing and TCO for a Remote Edge Weather Station
scenario: Concretely size a solar power system for a remote weather monitoring station running 24/7 with a 60W peak, 15W idle power profile. Solar irradiance is 5 peak sun hours/day. The system uses a LiFePO4 battery and requires 3-day autonomy.
question: What panel wattage, LiFePO4 battery capacity, and 5-year TCO would you size for the 24/7 remote station versus grid power?
details:
  realistic_solution: Calculate daily energy usage from the stated 60W peak and 15W idle profile using a 50% active/idle duty cycle. That is 900 Wh/day. With 5 peak sun hours and 85% solar efficiency, panel sizing is 900 / (5 * 0.85) = 212W, so specify a 250W panel. For 3-day autonomy with 90% usable LiFePO4 depth of discharge, battery sizing is 3 * 900 / 0.90 = 3,000 Wh, so specify about 3.0 kWh. At $0.10/kWh, equivalent grid energy costs only $164.25 over 5 years, while a standalone solar system is about $1,800 using explicit capex assumptions; solar is justified by remote availability or avoided grid-extension costs, not by energy price alone.
  common_mistake: |
    **The Pitfall:** Calculating panel size based strictly on average power without accounting for system efficiencies.
    **The Rationale:** Candidates often forget charge controller efficiency (85%) and battery charge/discharge depth limits.
    **The Consequence:** The solar panel is drastically undersized, leading to offline devices during consecutive cloudy days.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power profile: 50% active at 60W + 50% idle at 15W.
    - 5 peak sun hours/day. 3-day autonomy.
    - Efficiencies: Solar 85%, Battery DoD 90%.
    - Solar capex estimate: 250W panel $250, 3.0 kWh LiFePO4 battery $1,200, charge controller/mount/enclosure $250, 5-year maintenance $100.

    **Calculations:**
    - Daily energy = (60W * 12h) + (15W * 12h) = 720 Wh + 180 Wh = 900 Wh/day.
    - Panel sizing = 900 Wh / (5 hrs * 0.85) = 212W -> 250W panel.
    - Battery sizing = (3 days * 900 Wh) / 0.90 = 3000 Wh = 3.0 kWh.
    - 5-year grid energy = 900 Wh/day * 365 * 5 = 1642.5 kWh.
    - 5-year grid power cost = 1642.5 kWh * $0.10/kWh = $164.25.
    - 5-year solar TCO = $250 + $1,200 + $250 + $100 = $1,800.

    **Conclusion & Interpretation:**
    - **Result: 250W panel, 3.0 kWh battery, about $1,800 solar TCO versus $164.25 grid energy cost (Energy-Capacity Bound)**. The off-grid design is driven by autonomy and site access, while forgetting charge and DoD efficiencies would undersize the installation.
