title: Recalling Jetson Orin Memory Architecture for Multi-Model Compound Systems
scenario: A systems engineer is planning a compound AI deployment on Jetson Orin. The pipeline includes a vision encoder (2GB), embedding model (0.5GB), 3B LLM (3GB INT8), and a FAISS index (2GB).
question: Does LPDDR5 unified memory on Jetson Orin mean the CPU, GPU, and DLA all share the same physical DRAM, and what are the bandwidth implications for concurrent multi-model execution?
details:
  realistic_solution: 'Yes, Jetson Orin uses physically shared LPDDR5 unified memory across the CPU, GPU, DLA, PVA, and other engines, so the pipeline avoids PCIe copies between processors. Unified memory does not mean independent bandwidth pools: concurrent vision, embedding, FAISS, and LLM workloads contend for the same memory controller and cache hierarchy. LLM decode can be strongly memory-bandwidth sensitive because each generated token streams substantial layer weights and KV-cache data, but exact tok/s cannot be derived from model size alone. Actual throughput depends on architecture, quantization, batching, cache reuse, KV-cache traffic, and scheduler overlap.'
  common_mistake: |
    **The Pitfall:** Assuming that unified memory eliminates memory bandwidth contention.
    **The Rationale:** Candidates correctly know unified memory means "no PCIe copies," but incorrectly assume it means unlimited bandwidth access.
    **The Consequence:** Concurrent execution saturates the shared physical LPDDR5 bus, severely degrading LLM decode speeds and overall pipeline latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LPDDR5 unified memory bandwidth: 68.3 GB/s.
       - Pipeline resident data: vision encoder 2GB, embedding model 0.5GB, 3B INT8 LLM 3GB, FAISS index 2GB.
       - These allocations share capacity and bandwidth; they are not copied to separate CPU/GPU/DLA memory pools.
    2. **Calculations:**
       - Total resident footprint: 2GB + 0.5GB + 3GB + 2GB = 7.5GB, which fits in 32GB shared DRAM.
       - Bandwidth is the shared resource: CPU retrieval over the FAISS index, GPU LLM decode, and DLA/GPU vision inference all draw from the same 68.3 GB/s pool.
       - A defensible bandwidth estimate must use profiled per-layer memory traffic, KV-cache reads/writes, activation traffic, and cache reuse. Multiplying full model size by tokens/sec is only a rough worst-case intuition, not a valid exact decode-speed formula.
    3. **Conclusion & Interpretation:**
       - **Result: Shared Memory Removes Copies, Not Contention.** The design fits in capacity, but concurrent multi-model execution can become memory-bandwidth-bound; validate with profiling and consider serialization, batching, or scheduling if decode and retrieval interfere.
