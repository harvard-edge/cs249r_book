title: Hailo-8 Dataflow Compilation with Unsupported Ops
scenario: You are deploying a novel hybrid vision-transformer architecture for real-time robotic perception onto a Hailo-8 accelerator. The model contains a custom non-linear activation and a specialized attention operator that are unsupported by the Hailo Dataflow Compiler. Given the Hailo-8's unique architecture—26 TOPS INT8, 2.5W, and crucially, no local DRAM (relying entirely on streaming from host memory).
question: How would you convert and deploy the unsupported activation and attention operators without breaking Hailo-8 dataflow efficiency?
details:
  realistic_solution: 'The correct L6+ approach is to rewrite the ONNX graph prior to compilation. The custom activation should be mathematically approximated using supported INT8 operations (e.g., polynomial expansions or piecewise linear approximations via LUTs) that can be fused natively. The custom attention should be decomposed into standard batched matrix multiplications. If host fallback is strictly unavoidable, the architect must split the model into exactly two partitions (e.g., heavy CNN backbone on Hailo, lightweight head on CPU) to ensure only a single unidirectional transfer occurs, preserving the continuous stream processing nature of the Hailo-8.'
  common_mistake: |
    **The Pitfall:** Naively suggesting standard runtime CPU delegation (e.g., ONNX Runtime fallback) for unsupported operators.
    **The Rationale:** Candidates fail to realize that breaking a dataflow graph on a DRAM-less device forces a pipeline flush and PCIe roundtrip.
    **The Consequence:** Destroying the device's low-latency continuous stream processing, invalidating the 2.5W advantage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation tensor: 1x256x64x64 INT8 (1 MB)
    - Hailo-8 (no local DRAM)
    - 60 FPS target

    **Calculations:**
    - CPU fallback stream = (1 MB out + 1 MB in) * 60 FPS = 120 MB/s PCIe load
    - CPU op takes 5ms * 60 FPS = 300ms stall time per second
    - Effective throughput drops 30% (from 26 TOPS to 18.2 TOPS)

    **Conclusion & Interpretation:**
    - **Result: 300ms stall per second (Compute-Bound)**. Pipeline flush destroys continuous stream processing efficiency.
