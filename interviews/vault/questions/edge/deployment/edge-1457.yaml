title: Shadow Deployment Architecture on Jetson Orin
scenario: You are designing a shadow deployment pipeline for an autonomous robotics fleet operating on the NVIDIA Jetson Orin platform. The current production computer vision model runs on the Ampere GPU, utilizing 14 GB of memory and drawing 35W of power during peak load. You need to architect a mechanism to seamlessly deploy and evaluate a new experimental model alongside the production model in a shadow mode, processing the same live camera feeds.
question: How would you run a shadow vision model on Jetson Orin without adding production latency or exceeding the 32 GB, 60W limits?
details:
  realistic_solution: Architect the system using containerized isolation and a separate best-effort shadow path. Compile the shadow model for the DLA using INT8 quantization, leaving the Ampere GPU dedicated to the production model. Feed the shadow process from a duplicated camera buffer or message queue, run it at low priority, and drop shadow frames when it falls behind. This keeps shadow evaluation decoupled from the production critical path while staying within the 32 GB and 60W budgets.
  common_mistake: |
    **The Pitfall:** Proposing to run both models in parallel on the GPU.
    **The Rationale:** Assuming that if it fits in memory, it will run without issues.
    **The Consequence:** Exceeding the strict 60W TDP limit, leading to severe thermal throttling, OOM errors, or system crashes that impact the production critical path.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory limit: 32 GB total.
    - Current memory use: 4 GB OS + 14 GB production model = 18 GB.
    - Power limit: 60W total platform budget.
    - Current power use: 35W production GPU load + about 5W system overhead = 40W.
    - Constraint: A second GPU copy of the model would add about 35W.

    **Calculations:**
    - Memory headroom for shadow model = 32 GB - 18 GB = 14 GB.
    - Power with a second GPU model = 40W + 35W = 75W, which exceeds the 60W limit.
    - Power with an isolated INT8 DLA shadow model = 40W + 5-10W = 45-50W.
    - Remaining power headroom = 60W - 45-50W = 10-15W.
    - Latency condition: production does not wait on shadow results; late shadow frames are dropped.

    **Conclusion & Interpretation:**
    - **Result: isolated best-effort DLA shadowing (Latency-Isolated).** The design is acceptable only if the shadow model is decoupled from the production critical path; the 45-50W estimate shows it can also fit the power budget.
