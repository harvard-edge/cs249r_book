title: Roofline Tradeoff for Standard CNN vs Depthwise on Edge SoC
scenario: A vision model on an edge SoC (275 TOPS) processes 4K video at 30 FPS. You must choose between a standard CNN layer (100 GOPs, 10MB weights) and a depthwise layer (10 GOPs, 10MB weights) given 200GB/s memory bandwidth.
question: Which layer should you choose for the 4K 30 FPS vision model, standard CNN or depthwise, under the roofline tradeoff?
details:
  realistic_solution: Depthwise convolutions dramatically reduce operations but keep the same 10MB memory footprint in this setup, so their arithmetic intensity is much lower. The standard CNN is compute-bound at about 0.36ms, while the depthwise layer becomes memory-bound at about 0.05ms. The depthwise layer is still the faster choice because its reduced compute demand leaves memory bandwidth as the limiting floor, not because it has lower memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming latency drops exactly proportionally to GOPs.
    **The Rationale:** Candidates fail to check the memory bandwidth floor, expecting a 10x GOPs reduction to yield a 10x speedup.
    **The Consequence:** Miscalculating pipeline latency and failing to anticipate when a layer hits the memory wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware limits: 275 TOPS, 200 GB/s bandwidth.
    - Standard Layer: 100 GOPs, 10MB.
    - Depthwise Layer: 10 GOPs, 10MB.

    **Calculations:**
    - Standard Layer Compute Time = 100 GOPs / 275 TOPS = 0.36ms.
    - Standard Layer Memory Time = 10MB / 200 GB/s = 0.05ms.
    - Standard Layer Total = 0.36ms (Compute Bound).
    - Depthwise Layer Compute Time = 10 GOPs / 275 TOPS = 0.036ms.
    - Depthwise Layer Memory Time = 10MB / 200 GB/s = 0.05ms.
    - Depthwise Layer Total = 0.05ms (Memory Bound).

    **Conclusion & Interpretation:**
    - **Result: depthwise 0.05ms vs standard 0.36ms.** The depthwise layer is memory-bound but still about 7.3x faster overall (0.36 / 0.05) because its compute time falls below the shared 0.05ms memory floor.
