title: Edge TCO Optimization
scenario: A 500-unit Hailo-8 retail fleet draws 7.5W for 8 active hours. Goal is to cut annual power cost by 60%.
question: What power-management plan will cut the 500-store Hailo-8 fleet's annual power cost by 60%, and what savings result?
details:
  realistic_solution: Implement a deep sleep mode during off-hours (16hr/day) using device suspend states. Pre-wake 5 min before open can be implemented trivially with a cron job to hide the 5-second cold boot latency.
  common_mistake: |
    **The Pitfall:** Completely powering off devices during idle hours instead of using suspend states.
    **The Rationale:** Engineers hunt for 0W idle consumption without considering the cold-start latency of complex embedded Linux boards.
    **The Consequence:** Causing SLO violations during the morning rush due to 40-second boot times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active = 7.5W (8hr).
    - Sleep = 0.5W (16hr).
    - 500 units, $0.10/kWh.

    **Calculations:**
    - Old = 7.5W * 24h = 180 Wh/day.
    - New = (7.5 * 8) + (0.5 * 16) = 68 Wh/day.
    - Old Cost = 500 * 65.7 kWh * 0.1 = $3285.
    - New Cost = 500 * 24.8 kWh * 0.1 = $1241.
    - Savings = $3285 - $1241 = $2044.

    **Conclusion & Interpretation:**
    - **Result: 62.2% Cost Reduction (Power-Bound (Optimized))**. Combining deep sleep with predictive pre-waking hits the power budget without violating SLAs.
