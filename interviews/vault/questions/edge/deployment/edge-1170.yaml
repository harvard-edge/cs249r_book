title: Edge TCO Optimization
scenario: A 500-unit Hailo-8 retail fleet draws 7.5W for 8 active hours. Goal is to cut annual power cost by 60%.
question: What power-management plan will cut the 500-store Hailo-8 fleet's annual power cost by 60%, and what savings result?
details:
  realistic_solution: Put each store device into a managed suspend/deep-sleep state for the 16 closed hours and keep it active for the 8 open hours. Use the fleet manager plus device RTC or BMC wake timers to schedule resume 5 minutes before opening, with health checks and staggered wake-up, so the 40-second cold-boot path is not on the morning traffic path. Baseline annual power cost is 500 * 65.7 kWh * $0.10 = $3,285. The managed-sleep plan costs about 500 * 24.82 kWh * $0.10 = $1,241/year, saving about $2,044/year or 62.2%, which clears the 60% reduction goal.
  common_mistake: |
    **The Pitfall:** Completely powering off devices during idle hours instead of using suspend states.
    **The Rationale:** Engineers hunt for 0W idle consumption without considering the cold-start latency of complex embedded Linux boards.
    **The Consequence:** Causing SLO violations during the morning rush due to 40-second boot times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active = 7.5W (8hr).
    - Sleep = 0.5W (16hr).
    - 500 units, $0.10/kWh.

    **Calculations:**
    - Old energy per unit = 7.5W * 24h = 180 Wh/day = 0.180 kWh/day.
    - Old annual energy per unit = 0.180 kWh/day * 365 = 65.7 kWh/year.
    - New energy per unit = (7.5W * 8h) + (0.5W * 16h) = 60 Wh + 8 Wh = 68 Wh/day = 0.068 kWh/day.
    - New annual energy per unit = 0.068 kWh/day * 365 = 24.82 kWh/year.
    - Old fleet cost = 500 * 65.7 kWh * $0.10 = $3,285/year.
    - New fleet cost = 500 * 24.82 kWh * $0.10 = $1,241/year.
    - Savings = $3,285 - $1,241 = $2,044/year.
    - Reduction = $2,044 / $3,285 = 62.2%.

    **Conclusion & Interpretation:**
    - **Result: 62.2% Cost Reduction (Power-Bound (Optimized))**. Combining deep sleep with predictive pre-waking hits the power budget without violating SLAs.
