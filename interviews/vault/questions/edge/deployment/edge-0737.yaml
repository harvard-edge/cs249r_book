title: 'The OTA Bandwidth Budget: OTA & Firmware Updates'
scenario: |
  A critical patch is required for the perception model running on an autonomous vehicle's edge compute unit. The full model is packaged in a 550 MB container image. However, by leveraging container layering, the differential OTA (Over-the-Air) update is only 40 MB.
question: 'How long does the 40 MB differential OTA patch take to download over a stable 20 Mbps cellular connection?'
details:
  realistic_solution: |
    The key is to harmonize the units before performing the division. Network speeds are universally measured in bits per second, while file sizes are measured in bytes. First, convert the network bandwidth from Mbps to MB/s by dividing by 8. Then, divide the size of the differential update by the bandwidth in MB/s to find the time in seconds.
  common_mistake: |
    **The Pitfall:** Confusing Megabits per second (Mbps) with MegaBytes (MB) when calculating download times.
    **The Rationale:** The acronyms look similar and network providers intentionally use the larger-sounding "bits" for marketing.
    **The Consequence:** An 8x estimation error, leading to drastically underestimated update windows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bandwidth: 20 Megabits/sec.
    - Transfer size: 40 MB differential update.

    **Calculations:**
    - Bandwidth in bytes: 20 Mbps / 8 bits/Byte = 2.5 MB/s.
    - Download time: 40 MB / 2.5 MB/s = 16 seconds.

    **Conclusion & Interpretation:**
    - **Result: 16 seconds download time (Network-Bound).** Confusing Mbps with MB/s leads to drastic estimation errors.
