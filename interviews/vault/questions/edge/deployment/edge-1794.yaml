title: Shadow Deployment Design on Qualcomm Cloud AI 100
scenario: You are deploying an upgraded defect detection model to a manufacturing floor equipped with a single on-premise inference accelerator. The current model is stable, but the new version promises higher recall, and must be validated on live 60 FPS video streams without disrupting the primary pipeline.
question: How would you shadow the new model on live 60 FPS streams while preserving primary latency and fitting within edge resource constraints?
details:
  realistic_solution: Design a shadow deployment where the primary model processes the 60 FPS stream synchronously, while frames are asynchronously duplicated to a lower-priority queue for the canary model. The execution engine must be configured to prioritize the primary model to guarantee latency, while the canary model processes frames opportunistically to evaluate accuracy without impacting the thermal power envelope or the main pipeline.
  common_mistake: |
    **The Pitfall:** Proposing cloud-based API traffic splitting.
    **The Rationale:** Candidates use web-dev deployment patterns (like 5% canary routing) which don't apply to a single on-premise accelerator ingesting a continuous physical camera stream.
    **The Consequence:** The design is impossible to implement physically, and candidates fail to verify if running two models simultaneously fits within edge memory constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 32 GB LPDDR4x, 400 TOPS capacity.
       * INT8 primary model = 2 GB, 12 TOPS.
       * Canary INT8 model = 2.5 GB, 15 TOPS.
    2. **Calculations:**
       * Total memory = 2 GB + 2.5 GB = 4.5 GB.
       * Total compute = 12 TOPS + 15 TOPS = 27 TOPS.
    3. **Conclusion & Interpretation:**
       * **Concurrent shadow execution strictly consumes 4.5 GB and 27 TOPS, leaving vast headroom for OS and buffers. Result: Compute/Memory Slack-Abundant.**
