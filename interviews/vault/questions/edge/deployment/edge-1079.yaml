title: 'Model Format Conversion: Compare TFLite vs. ONNX Runtime for ARM Cortex on Jetson'
scenario: A MobileNetV2 model (3.4M params, 300M MACs) needs to run on the Cortex-A78AE CPU cores of Jetson Orin.
question: For MobileNetV2 on Jetson Orin Cortex-A78AE CPUs, how do TFLite XNNPACK and ONNX Runtime ACL compare for FP16 latency, memory, and op coverage?
details:
  realistic_solution: 'MobileNetV2 requires 300M MACs (600M FLOPs). The Cortex-A78AE at 2.2GHz with 4 cores and FP16 NEON can theoretically achieve ~70.4 GFLOPS. Latency: 600M FLOPs / 70.4 GFLOPS = 8.5ms. TFLite XNNPACK is highly optimized for ARM NEON, measuring ~10ms in practice (due to packing overhead). ONNX Runtime ACL runs slightly slower around ~15ms because it is less optimized for this specific core. TFLite wins on CPU. Memory: TFLite runtime overhead ~2MB vs. ONNX Runtime ~8MB. Both fit comfortably.'
  common_mistake: |
    **The Pitfall:** Ignoring operation coverage differences between runtimes.
    **The Rationale:** Candidates focus solely on theoretical FLOPs or benchmark marketing numbers without checking if runtimes natively support all ops.
    **The Consequence:** Experiencing unpredictable latency degradation during inference due to costly CPU fallbacks for unsupported operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV2: 300M MACs = 600M FLOPs.
    - Cortex-A78AE FP16 NEON Peak: 4 cores x 2.2 GHz x 8 FLOPs/cycle = 70.4 GFLOPS.
    - Measured TFLite XNNPACK Latency: ~10ms.
    - Measured ONNX Runtime ACL Latency: ~15ms.

    **Calculations:**
    - Theoretical Latency: 600M FLOPs / 70.4 GFLOPS = 8.5ms.
    - XNNPACK Overhead: 10ms - 8.5ms = 1.5ms.
    - ACL Overhead: 15ms - 8.5ms = 6.5ms.

    **Conclusion & Interpretation:**
    - **Result: TFLite Dominates (Compute-Bound).** TFLite XNNPACK is highly optimized for ARM NEON and wins on latency by minimizing runtime overhead compared to ONNX Runtime ACL.
