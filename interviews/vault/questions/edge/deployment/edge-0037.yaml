title: The Sensor Aging Silent Accuracy Rot
scenario: You're the ML platform architect for a fleet of 10,000 Ambarella CV5 devices running quality inspection in semiconductor fabs. After 18 months, aggregate defect escape rate has increased from 0.1% to 0.4% — a 4x degradation. But no single device shows a dramatic drop. Every device's accuracy has degraded by a small, nearly imperceptible amount — 0.3–0.5% each. Your monitoring system, which alerts on >2% per-device accuracy drops, never triggered.
question: How do you detect and correct fleet-wide gradual degradation that's invisible at the individual device level?
details:
  realistic_solution: |
    Do not assume a specific sensor failure from the aggregate metric alone. Treat this as fleet-level drift: small per-device shifts are below the individual alert threshold but become visible when aggregated across 10,000 devices. Detect it with cohort-level monitoring by device age, fab line, lighting recipe, sensor batch, firmware, and model version; track confidence score calibration, defect escape rate, embedding distribution, and human audit samples. Correct it by segmenting the affected cohorts, recalibrating thresholds or retraining with recent data where appropriate, and only then scheduling hardware inspection or replacement for cohorts whose drift points to a physical cause.
  common_mistake: |
    **The Pitfall:** Lowering the per-device alert threshold to catch the minor degradation.
    **The Rationale:** Engineers attempt to fix visibility at the individual node level without accounting for normal statistical variation.
    **The Consequence:** Alert fatigue. A 0.5% threshold triggers thousands of false positives daily, rendering the monitoring system useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 devices, 0.3 percentage-point degradation per device over 18 months.
       - Individual monthly noise/variance: about ±0.5 percentage points.
       - Escape cost: $1,000 per defect, 1M chips/month volume.
    2. **Calculations:**
       - Linearized monthly fleet drift = 0.3 pp / 18 months = 0.0167 pp/month.
       - Standard error of fleet mean = 0.5 pp / sqrt(10,000) = 0.005 pp.
       - Monthly drift SNR = 0.0167 / 0.005 = 3.3, visible at fleet level even though each device is noisy.
       - 18-month drift SNR = 0.3 / 0.005 = 60, making the aggregate drift unmistakable.
       - Additional escapes = (0.4% - 0.1%) * 1M = 3,000 defects/month.
       - Cost of additional escapes = 3,000 * $1,000 = $3,000,000/month.
    3. **Conclusion & Interpretation:**
       - **Result: Fleet-Aggregated Drift Detection**. Individual devices remain below the 2% alert threshold, but aggregate and cohort statistics expose the gradual drift early enough to trigger calibration, retraining, threshold redesign, or targeted hardware investigation.
