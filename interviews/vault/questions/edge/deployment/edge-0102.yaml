title: The Model Cloning Waste
scenario: You are deploying a 4-camera monitoring system on a Jetson Orin. Each camera uses the same YOLOv8-S model.
question: Based on the VRAM allocation diagram, why is your system using 16% more memory than it needs to?
details:
  realistic_solution: You have **Redundant Weight Loading**. Since model weights are read-only, a single 22 MB copy can serve all 4 cameras. Load the weights once and run 4 inference passes with different input tensors. More importantly, **batch the 4 camera inputs** into a single call (batch size 4) to improve GPU occupancy and amortize kernel launch overhead.
  common_mistake: '"4 cameras need 4 model instances." The cameras need 4 inference passes, but NOT 4 copies of the weights.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras using YOLOv8-S (11M parameters, FP16).

    **Calculations:**
    - Redundant instances: 4 * 22 MB = 88 MB VRAM.
    - Single batched instance: 22 MB VRAM.
    - Savings: 88 MB - 22 MB = 66 MB.

    **Conclusion & Interpretation:**
    - **Result: 66 MB Saved (Memory-Bound)**. Loading weights once and batching inputs saves VRAM and maximizes Orin hardware utilization.
