title: Latency Spikes in Cascaded Edge TPU Pipelines
scenario: A smart home hub uses a two-stage compound AI pipeline on a Google Coral Edge TPU (4 TOPS INT8, 2W USB form factor). Stage 1 is a lightweight object detector, and Stage 2 is a larger classification model routed to based on Stage 1's output. Both models are fully quantized to INT8 and theoretically require a combined 0.1 TOPS per inference, which is well within the 4 TOPS capability. However, when Stage 2 is triggered, the pipeline experiences a sudden 20ms latency spike before Stage 2 inference even begins.
question: Why does Stage 2 trigger a 20ms latency spike on Coral Edge TPU despite the pipeline needing only 0.1 TOPS of compute?
details:
  realistic_solution: The Google Coral Edge TPU has limited on-chip SRAM (around 8MB). Because the compound pipeline contains two separate models whose combined size exceeds this on-chip memory, the Edge TPU cannot keep both models resident simultaneously. When the system routes to Stage 2, it must swap the INT8 weights for Stage 2 from the host CPU memory over the USB connection. This data transfer creates a severe I/O bottleneck that halts the pipeline, rendering the 4 TOPS compute capacity idle until the transfer completes.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is due to FP32-to-INT8 conversion or compute throttling.
    **The Rationale:** Candidates focus solely on the 4 TOPS compute metric and ignore the physical SRAM constraints of the Edge TPU and the USB bus bottleneck.
    **The Consequence:** Failing to address the root cause, leaving the pipeline starved while waiting for model weights to transfer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stage 2 model INT8 weights: 8 MB.
       - Coral Edge TPU SRAM limit: ~8 MB (cannot hold both models).
       - USB 3.0 effective bandwidth: ~400 MB/s.
    2. **Calculations:**
       - Weight transfer time = Data Size / Bandwidth.
       - Transfer time = 8 MB / 400 MB/s = 0.02 seconds (20 ms).
    3. **Conclusion & Interpretation:**
       - **Result: 20 ms.** The exact latency spike perfectly matches the time required to swap weights over USB. The system is severely **I/O-Bandwidth-Bound**.
