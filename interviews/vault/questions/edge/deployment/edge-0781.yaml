title: Fleet-Wide Model Drift Detection Threshold
scenario: You manage 2,000 edge cameras for traffic monitoring. Each device reports hourly inference statistics. After 6 months, 150 devices in one region show a gradual decline in mean confidence from 0.82 (historical standard deviation of 0.03) to 0.71 over 3 weeks.
question: What statistical threshold should trigger a drift alert, and is the mean confidence drop from 0.82 to 0.71 real drift or normal variance?
details:
  realistic_solution: Compute the regional fleet mean against the sampling distribution of the 150 affected devices, preferably using each device's own baseline and a predeclared alert rule. With a historical per-device standard deviation of 0.03, the standard error of a 150-device mean is about 0.00245, so a drop from 0.82 to 0.71 is far beyond a 3-sigma regional alert threshold. Treat it as strong evidence of regional drift, confirm with data-quality checks and geographic clustering, then trigger region-specific retraining rather than a blind global model update.
  common_mistake: |
    **The Pitfall:** Setting a static, fixed threshold for drift alerts across the entire fleet.
    **The Rationale:** Engineers assume confidence scores should be uniform globally, ignoring environmental variance across localized deployment zones.
    **The Consequence:** Alert storms in naturally noisy environments and undetected silent failures in high-confidence zones.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Historical regional mean confidence: 0.82.
       - Historical per-device standard deviation: 0.03.
       - Observed regional mean over the 150 affected devices: 0.71.
       - Alert policy: trigger if a regional mean is more than 3 standard errors below baseline for two consecutive daily windows, after excluding telemetry outages.
    2. **Calculations:**
       - Standard error for a 150-device mean = 0.03 / sqrt(150) ≈ 0.00245.
       - Regional mean z-score = (0.71 - 0.82) / 0.00245 ≈ -44.9.
       - 3-sigma lower alert threshold = 0.82 - 3 * 0.00245 ≈ 0.8127.
       - Observed mean 0.71 is 0.1027 below the threshold.
    3. **Conclusion & Interpretation:**
       - **Result: Alertable Regional Drift**. Under the stated fleet-mean alert policy, the 0.71 mean is far outside normal sampling variance for 150 devices. It should be treated as a high-confidence drift alert, then confirmed against telemetry, device mix, and regional environmental changes before retraining.
