title: Fleet-Wide Model Drift Detection Threshold
scenario: You manage 2,000 edge cameras for traffic monitoring. Each device reports hourly inference statistics. After 6 months, 150 devices in one region show a gradual decline in mean confidence from 0.82 to 0.71 over 3 weeks. The historical 0.03 standard deviation is across device daily means in that region.
question: What statistical threshold should trigger a drift alert, and is the mean confidence drop from 0.82 to 0.71 real drift or normal variance?
details:
  realistic_solution: Compute the regional fleet mean against the stated baseline variance model. Since 0.03 is the across-device standard deviation of device daily means, the standard error for the 150-device regional mean is about 0.00245 and a drop from 0.82 to 0.71 is far beyond a 3-sigma regional alert threshold. The alert should fire only after two consecutive valid windows below threshold and after excluding telemetry outages, device mix changes, or known regional events.
  common_mistake: |
    **The Pitfall:** Setting a static, fixed threshold for drift alerts across the entire fleet.
    **The Rationale:** Engineers assume confidence scores should be uniform globally, ignoring environmental variance across localized deployment zones.
    **The Consequence:** Alert storms in naturally noisy environments and undetected silent failures in high-confidence zones.
  napkin_math: |
    **Assumptions & Constraints:**
    - Historical regional mean confidence: 0.82.
    - Interpret the 0.03 historical value as the across-device standard deviation of device daily means.
    - Observed regional mean over the 150 affected devices: 0.71.
    - Alert policy: trigger if the regional mean is more than 3 standard errors below baseline for two consecutive daily windows, after excluding telemetry outages.

    **Calculations:**
    - Standard error for a 150-device mean = 0.03 / sqrt(150) ≈ 0.00245.
    - One-window 3-sigma lower threshold = 0.82 - 3 * 0.00245 ≈ 0.8127.
    - Observed z-score = (0.71 - 0.82) / 0.00245 ≈ -44.9.
    - A single 0.71 window satisfies the numeric threshold; the alert fires only if a second consecutive valid daily window is also below 0.8127.

    **Conclusion & Interpretation:**
    - **Result: alertable regional drift if repeated.** Under the stated across-device variance model, 0.71 is far below the 3-sigma threshold, but the production policy requires two consecutive valid windows and checks for telemetry, device-mix, or regional environmental shifts before retraining.
