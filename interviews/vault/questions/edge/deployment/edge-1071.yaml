title: 'MLOps Lifecycle: Compare OTA Update Strategies for Fleet of Jetson Orin Edge Devices'
scenario: 'A fleet of 5000 Jetson Orin edge devices deployed at retail locations needs OTA model updates. You are evaluating two strategies: (A) full model replacement (500MB TensorRT engine) versus (B) delta updates (adapter-only, 50MB).'
question: 'For 5000 Jetson Orins, how do 500MB full-model OTA updates compare with 50MB delta updates in bandwidth cost, update time, and fleet-wide failure risk?'
details:
  realistic_solution: 'Strategy B (Delta via LoRA adapter) heavily outperforms Strategy A. 500MB * 5000 devices = 2.5TB bandwidth ($225 at $0.09/GB CDN). Update time at 10Mbps (retail WiFi) is 400s (~7min). Strategy B uses 50MB * 5000 = 250GB ($22.50), taking 40s. The 10x smaller failure window proportionally reduces fleet-wide brick risk, enabling instant A/B partition rollback.'
  common_mistake: |
    **The Pitfall:** Focusing only on bandwidth cost without modeling failure recovery cost at fleet scale.
    **The Rationale:** Candidates calculate CDN savings but fail to recognize that longer update windows proportionally increase the risk of power loss or network interruption during the update.
    **The Consequence:** Choosing an OTA strategy that seems cheap on paper but requires expensive manual intervention for bricked devices in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 5000 Jetson Orin edge devices.
    - Network: 10 Mbps retail WiFi uplink.
    - Strategy A (Full TensorRT engine): 500MB payload.
    - Strategy B (LoRA Delta Adapter): 50MB payload.
    - CDN Cost: $0.09/GB; Manual recovery: $50/device; Failure rate: 0.1%/min.

    **Calculations:**
    - Strategy A: 500MB * 5000 = 2.5 TB = 2500 GB. CDN Cost: 2500 * $0.09 = $225. Time/device: (500MB * 8 bits/byte) / 10 Mbps = 400s (6.67 min). Failures: 6.67 min * 0.1%/min * 5000 = ~33. Recovery Cost: 33 * $50 = $1,650. Total: $1,875.
    - Strategy B: 50MB * 5000 = 250 GB. CDN Cost: 250 * $0.09 = $22.50. Time/device: (50MB * 8 bits/byte) / 10 Mbps = 40s (0.67 min). Failures: 0.67 min * 0.1%/min * 5000 = ~3. Recovery Cost: 3 * $50 = $150. Total: $172.50.

    **Conclusion & Interpretation:**
    - **Result: Strategy B is ~11x cheaper ($172.50 vs $1875) (Bandwidth-Bound)**. LoRA delta updates mitigate constrained retail bandwidth bottlenecks.
