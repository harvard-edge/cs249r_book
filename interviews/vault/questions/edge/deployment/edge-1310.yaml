title: Diagnosing Operator Fallback on Qualcomm Cloud AI 100
scenario: You have deployed an on-premise vision-language model onto a Qualcomm Cloud AI 100 inference accelerator. After converting the model to ONNX and quantizing to INT8, inference throughput is severely bottlenecked and power draw is near the 75W limit. Profiling indicates that certain operators are falling back to the host CPU.
question: What is the root cause of the operator fallback on the Cloud AI 100, and how do you diagnose the specific coverage gaps?
details:
  realistic_solution: |
    The likely root cause is incomplete accelerator coverage for the exported ONNX graph: unsupported operators, unsupported attributes, dynamic shapes, or graph partitions that the Cloud AI 100 execution provider cannot lower to the accelerator. Diagnose it by enabling verbose compiler and runtime delegation logs, comparing the ONNX node list against the supported-operator matrix for the exact SDK/runtime version, and inspecting the final partitioned graph to identify nodes assigned to the CPU execution provider. Once the unsupported nodes are known, replace them with supported equivalents, freeze or simplify dynamic shapes, or rewrite the affected subgraph before re-exporting and recompiling.
  common_mistake: |
    **The Pitfall:** Assuming universal support for ONNX operators across hardware compilers.
    **The Rationale:** Candidates overlook the severe penalty of CPU fallback, attempting to fix throughput by tweaking batch sizes instead of inspecting the execution provider's delegation logs.
    **The Consequence:** The root cause remains unaddressed, and the accelerator's performance is completely nullified by PCIe data transfer overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unsupported subgraph emits a 50 MB intermediate tensor.
    - PCIe Gen4 x8 effective one-way payload bandwidth: ~16 GB/s.
    - Latency budget: 20 ms (50 FPS).

    **Calculations:**
    - One-way host/device transfer: 50 MB / 16,000 MB/s = 3.125 ms.
    - If the partition requires device-to-host and host-to-device movement, round-trip transfer = 2 * 3.125 ms = 6.25 ms.
    - Budget consumed: 6.25 ms / 20 ms = 31.25%.

    **Conclusion & Interpretation:**
    - **Result: fallback can consume >30% of the latency budget before CPU compute time is counted (Delegation-Coverage Bound)**. The primary diagnosis is unsupported ONNX coverage and graph partitioning; PCIe transfer is one plausible symptom when a fallback boundary moves large activations between host and accelerator.
