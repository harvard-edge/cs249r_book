title: Canary Rollout Latency Spike on Edge TPU
scenario: 'You are overseeing a canary deployment of a new INT8-quantized object detection model to a fleet of remote sensors equipped with Google Coral Edge TPUs (USB form factor). The existing ''Blue'' model processes 30 FPS smoothly. However, telemetry from the ''Green'' canary devices shows a severe symptom: frame rates have plummeted to 12 FPS, and the host devices are reporting critical thermal alerts before crashing. Both models have roughly the same parameter count and successfully passed the Edge TPU compiler.'
question: What is the root cause of this deployment failure?
details:
  realistic_solution: The root cause is an operator in the 'Green' model that is not supported by the Edge TPU's limited INT8 operator set. The compiler partitioned the graph, executing supported layers on the TPU but delegating the unsupported partition to the host CPU. That partition boundary adds CPU compute plus repeated USB memory transfers, so a small unsupported graph region can dominate latency. The extra host work explains the thermal alerts relative to the expected low-power Coral path; it should be treated as the mechanism behind throttling, not as a precisely derived wattage from the FPS data.
  common_mistake: |
    **The Pitfall:** Assuming the issue is a pure memory leak or a drastically different architecture.
    **The Rationale:** Candidates often look for standard software bugs or parameter size issues, missing the specific architectural quirk of the Edge TPU compiler.
    **The Consequence:** Failure to identify silent CPU fallback, leaving the underlying performance and thermal bottleneck unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
       - Blue model (Baseline): 30 FPS (~33ms latency), 100% TPU execution.
       - Green model (Canary): most layers still execute on the TPU, but one unsupported partition executes on the host CPU.
       - The unsupported partition creates two costs: slower CPU execution and TPU-to-host-to-TPU transfer overhead.
    **Calculations:**
       - Observed Green throughput: 12 FPS, so observed per-frame latency is about 1,000ms / 12 = 83ms.
       - Baseline Blue latency at 30 FPS is about 1,000ms / 30 = 33ms.
       - Extra latency introduced by the Green graph partition is therefore about 83ms - 33ms = 50ms/frame.
       - The compiler success only proves that the graph can be partitioned; it does not prove every operator is executed on the TPU.
       - A tens-of-milliseconds penalty from CPU fallback plus USB transfers is enough to explain the observed 30 FPS to 12 FPS drop.
    **Conclusion & Interpretation:**
       - **Result: CPU Fallback & Thermal Throttling Risk**. The unsupported operator forces slow host computation and USB I/O, adding roughly 50ms/frame of overhead. The same CPU fallback explains the host thermal alerts; exact wattage depends on the host and enclosure rather than being derived from the FPS split.
