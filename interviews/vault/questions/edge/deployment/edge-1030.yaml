title: Theoretical Throughput Calculation for Edge AI Models
scenario: 'You are estimating the performance of a 219M-MAC INT8 vision model on a Jetson Orin. A junior engineer calculates the theoretical maximum frame rate to be 627 FPS.'
question: 'What is the theoretical FPS for a 219M-MAC INT8 model on a 275 TOPS Jetson Orin, and why is 627 FPS off by 1000x?'
details:
  realistic_solution: 'Theoretical throughput is calculated by dividing total available operations per second by operations required per frame. 219M MACs is equal to 438M operations. 275 TOPS is 275 trillion operations per second. 275,000,000,000,000 / 438,000,000 = 627,853 fps. The junior engineer confused TOPS (trillions) with GOPS (billions), leading to an answer that is exactly 1000× too slow.'
  common_mistake: |
    **The Pitfall:** Conflating Tera-operations (TOPS) and Giga-operations (GOPS).
    **The Rationale:** Junior engineers often mix up metric prefixes when doing rapid hardware sizing.
    **The Consequence:** Completely inaccurate hardware procurement and latency scaling predictions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin Compute: 275 TOPS (Trillions of operations per second).
    - Model Operations: 219M MACs = 438 Million Operations per frame.

    **Calculations:**
    - Theoretical Throughput: 275,000,000,000,000 / 438,000,000 = 627,853 FPS.
    - Junior engineer error: 275,000,000,000 / 438,000,000 = 627 FPS (used GOPS instead of TOPS).

    **Conclusion & Interpretation:**
    - **Result: 627,853 FPS theoretical. The estimate was off by 1000x due to unit confusion (Compute-Bound)**.
