title: On-Premise RAG Pipeline Design for Cloud AI 100
scenario: You are designing an on-premise RAG system for a financial firm using a single Qualcomm Cloud AI 100 accelerator. The pipeline chains an embedding model, a cross-encoder ranker, and an 8B parameter LLM to answer queries securely.
question: For the Cloud AI 100 RAG pipeline, would you co-locate the embedding, ranker, and 8B LLM or swap them sequentially to meet 1s TTFT?
details:
  realistic_solution: |
    The optimal architecture statically pins all three models in the LPDDR4x memory by applying W8A8 or W4A8 quantization to the 8B LLM, and INT8 to the embedding and cross-encoder models. This exploits the accelerator's high INT8 throughput and entirely bypasses PCIe transfer latency during the critical generation path. To maximize resource utilization and throughput within the power envelope, implement pipeline parallelism: overlap the embedding of incoming queries with the autoregressive decoding of previous requests.
  common_mistake: |
    **The Pitfall:** Dynamically swapping models into memory for each pipeline stage.
    **The Rationale:** Developers try to optimize for maximum free memory to support a massive KV cache, without calculating the time penalty of swapping weights over PCIe.
    **The Consequence:** Severe PCIe transfer latency during the critical path, violating the strict 1-second TTFT requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 32 GB LPDDR4x, 400 TOPS INT8.
    - Models: 8B LLM, Embedding, Ranker.

    **Calculations:**
    - Quantized Weights: 8B LLM (INT8) = 8 GB. Embedding + Ranker (INT8) = 1 GB. Total = 9 GB.
    - Remaining Memory: 32 GB - 9 GB = 23 GB (available for KV cache and OS).
    - KV Cache: 2K context in FP16 ≈ 1 GB per request, comfortably allowing batch size 16.

    **Conclusion & Interpretation:**
    - **Result: 9 GB total weight footprint (Memory Capacity-Bound)**. Co-location is feasible and optimal.
