title: Dual-Model Security Pipeline on Google Coral Edge TPU
scenario: 'Design a compound AI system for a smart security camera that runs a two-stage pipeline: an object detection model to find faces, followed by a feature extraction model to generate embeddings for a local vector search. The entire pipeline must be deployed on an edge accelerator via USB.'
question: How would you orchestrate the detector, embedding model, INT8 quantization, and host-device routing to meet 15 FPS on a 4 TOPS INT8, 2W accelerator?
details:
  realistic_solution: The correct approach is to compile both the detector and embedding model for INT8 execution on the accelerator where the operators are supported, while keeping decode, NMS, ROI bookkeeping, and any unsupported preprocessing on the host. Send one resized detector input over USB, return compact detection metadata, then send only cropped face tensors needed for embedding rather than full intermediate frames. Use a small host-side pipeline with double buffering, bounded face batches, and transfer scheduling so detector, crop preparation, embedding, and local vector search overlap enough to meet the 66.6 ms frame budget without claiming that every operation runs on the accelerator.
  common_mistake: |
    **The Pitfall:** Ignoring USB data transfer overhead between the chained models and neglecting the strict INT8 quantization requirement.
    **The Rationale:** Candidates incorrectly assume the accelerator can route intermediate tensors directly between models without host CPU intervention, and they assume FP16 or FP32 fallback is viable.
    **The Consequence:** The system incurs massive CPU fallback penalties and unexpected USB transfer latencies, failing to meet the 15 FPS constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 TOPS INT8 compute limit, USB 3.0 interface (~400 MB/s).
    - Requirement: 15 FPS minimum throughput.
    - Pipeline: Face detection (12ms) -> Crop -> Embedding (4ms per face).

    **Calculations:**
    - Target latency for 15 FPS: 1000ms / 15 = 66.6ms per frame.
    - Accelerator Compute (INT8): Detector takes 12ms, Feature Extractor takes 4ms per face.
    - For 3 faces: Total inference = 12ms + (3 * 4ms) = 24ms.
    - Full frame USB transfer: 300x300x3 bytes = 270 KB.
    - Cropped faces USB transfer: 3 * 112x112x3 bytes = 112.9 KB.
    - Total USB payload: 382.9 KB. At USB 3.0 speeds (~400 MB/s), this takes ~1-2ms.

    **Conclusion & Interpretation:**
    - **Result: ~26ms (Compute-Bound)**. Total latency is ~26ms, leaving ~40ms for host-side NMS and routing, safely passing the 66.6ms budget.
