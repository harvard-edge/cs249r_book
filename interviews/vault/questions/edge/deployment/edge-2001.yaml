title: Reducing LLM Cold Start on Qualcomm Cloud AI 100
scenario: You are deploying a large language model (LLM) for real-time inference on a Qualcomm Cloud AI 100 accelerator in an edge-server appliance. The model requires approximately 20 GB of memory when loaded and executed. Your primary concern is minimizing cold start latency for new inference requests, as the system frequently scales down during idle periods to conserve power.
question: How would you minimize cold start latency for a 20GB LLM on Qualcomm Cloud AI 100 when scaling to zero, while staying within memory and power limits?
details:
  realistic_solution: Use pre-quantized INT8 artifacts and precompiled, runtime-ready binaries so wake-up does not include conversion or graph compilation. Keep the serving process and accelerator runtime resident when the latency SLA matters, or use a warm pool instead of full teardown. Store weights on fast local NVMe, use mmap or staged loading to avoid extra copies, and page the least-used shards only after the first-token path is ready. If full scale-to-zero is mandatory, expose a slower cold-start SLA; otherwise keep a minimal controller and compiled runtime alive within the power budget.
  common_mistake: |
    **The Pitfall:** Overlooking the memory bandwidth limitations and sequential access penalties for large model files.
    **The Rationale:** Candidates fail to pre-quantize and optimize the model specifically for INT8 operations on the Qualcomm Cloud AI 100.
    **The Consequence:** This leads to slower load times and suboptimal inference performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 20 GB.
    - Local NVMe sequential read: 2 GB/s.
    - Runtime initialization and graph binding after precompilation: 1-2 seconds.
    - Full graph compilation at wake-up would add tens of seconds and is not acceptable.

    **Calculations:**
    - Raw weight read lower bound = 20 GB / 2 GB/s = 10 seconds.
    - End-to-end cold start with precompiled artifacts is at least 10 seconds plus 1-2 seconds runtime setup.
    - Avoiding full teardown or keeping a warm pool removes the 20 GB reload from the first request path.

    **Conclusion & Interpretation:**
    - **Result: Full Scale-to-Zero Is I/O-Bound.** A true cold start cannot be subsecond for a 20 GB model; practical mitigation is precompiled artifacts, fast staged loading, and avoiding full accelerator/runtime teardown when latency is critical.
