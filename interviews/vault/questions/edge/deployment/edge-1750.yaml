title: Hardware-Aware Shadow Deployment on Jetson Orin
scenario: You are designing the shadow deployment phase of an MLOps pipeline for an autonomous vehicle fleet equipped with NVIDIA Jetson Orin. To validate training-serving consistency, the CI/CD system deploys a quantized INT8 candidate model to run in parallel with the production model, processing the same sensor streams.
question: Is shadow-deploying the INT8 candidate on Jetson Orin feasible, and how would you partition production and candidate workloads?
details:
  realistic_solution: |
    Shadow deployment is feasible only after profiling confirms that the candidate does not steal latency, memory bandwidth, or thermal headroom from production. Keep the production model on its known-good runtime and reserve its GPU/DLA/CPU resources first. Run the candidate on an isolated execution lane where supported: a separate DLA context if the compiled graph is DLA-compatible, a lower-priority GPU stream/MIG-like scheduling partition where available, or a reduced-rate CPU/GPU shadow path when full-rate isolation is not possible. The edge registry should collect paired predictions, latency, memory, power, and throttle events so promotion is based on both model agreement and resource contention.
  common_mistake: |
    **The Pitfall:** Assuming cloud MLOps paradigms of unrestricted shadow deployments apply perfectly to the edge.
    **The Rationale:** Candidates fail to calculate the combined memory footprint or ignore hardware resource contention (like PCIe/LPDDR bandwidth).
    **The Consequence:** The shadow model steals resources from the production model, causing it to miss hard real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
       - Jetson Orin: 32 GB LPDDR5, 275 TOPS INT8.
       - Two 2B-parameter models in INT8 (Production + Shadow).
       - Required inference: 30 FPS, ~400 GOPS per frame.
       - Reserve memory for OS, camera buffers, TensorRT workspaces, and activations.
    **Calculations:**
       - Memory footprint: 2 GB (Prod weights) + 2 GB (Shadow weights) + 6 GB (Activations & OS) = 10 GB total.
       - Compute requirement per model: 400 GOPS * 30 FPS = 12 TOPS.
       - Total compute requirement = 24 TOPS.
       - Headroom before contention: 32 GB - 10 GB = 22 GB, but LPDDR bandwidth, thermals, and DLA operator support still need runtime profiling.
    **Conclusion & Interpretation:**
       - **Result: Feasible With Isolation Checks**. The raw 10 GB and 24 TOPS estimates leave capacity, so shadowing can proceed if production remains pinned to its validated latency budget and the candidate is placed on a DLA-compatible or lower-priority isolated runtime without increasing production tail latency.
