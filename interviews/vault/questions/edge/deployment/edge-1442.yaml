title: A/B Partition OTA Power Throttling on Jetson Orin
scenario: An on-premise edge server uses an NVIDIA Jetson Orin for continuous video analytics under a 60W module power budget. The system implements an A/B partition scheme for OTA firmware updates to ensure high availability. During the flash programming phase of a background OTA update, the system controller automatically lowers INT8 inference throughput, even though the neural network weights are fully loaded in memory.
question: Why does the system throttle INT8 inference during background OTA flash programming even though weights are already in memory?
details:
  realistic_solution: The throttling is a platform power-management decision, not a model-weight loading issue. During OTA, flash writes, storage controller activity, CPU verification, and I/O traffic consume part of the shared module power and thermal envelope. If the accelerator continued running at the same clocks, the combined workload could exceed the configured 60W budget or thermal limits, so the controller reduces inference clocks or scheduling priority until programming completes. Inference is reduced because it is one of the large controllable loads during the update, even though the weights are already resident in memory.
  common_mistake: |
    **The Pitfall:** Incorrectly attributing throttling only to weight loading or memory capacity.
    **The Rationale:** Candidates assume that since the weights are in RAM, the update cannot affect inference performance.
    **The Consequence:** They miss that flash programming, verification, and inference share the same module power and thermal envelope, so the system may deliberately reduce the largest controllable load during OTA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Module power budget: 60W.
    - Normal inference workload already operates near the configured budget.
    - OTA flash programming, verification, and storage I/O add several watts of extra platform load.

    **Calculations:**
    - If inference remains at its normal power while OTA adds extra load, total module power can exceed the 60W envelope.
    - The controller therefore lowers inference clocks, batch admission, or scheduling priority until the sum of inference plus OTA power fits within the budget.
    - The exact TOPS reduction depends on DVFS tables and workload efficiency; it cannot be derived from a simple linear watts-to-TOPS ratio without an explicit platform model.

    **Conclusion & Interpretation:**
    - **Result: power-envelope throttling during OTA (Power-Bound)**. The system reduces INT8 inference because OTA activity consumes shared power and thermal headroom, not because the model weights need to be reloaded.
