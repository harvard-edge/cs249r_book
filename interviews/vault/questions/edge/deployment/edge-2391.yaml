title: Jetson Multi-Model Triton Serving
scenario: An autonomous delivery robot runs 5 different vision models (segmentation, depth, tracking, etc.) using a single Jetson AGX Orin.
question: Design a serving architecture to maximize GPU utilization and handle varying frame rates among the 5 concurrent models?
details:
  realistic_solution: Deploy NVIDIA Triton Inference Server natively on the Orin. Leverage Triton's dynamic batching for models processing homogeneous streams. Crucially, isolate the 5 discrete models using independent CUDA streams and concurrent model execution configuration (`instance_group`). This parallelizes the kernels on the Ampere GPU at the hardware level via Multi-Process Service (MPS) or Multi-Instance GPU (MIG) depending on memory constraints, completely eliminating Python-level GIL bottlenecks and head-of-line blocking.
  common_mistake: |
    **The Pitfall:** Orchestrating multi-model execution via a sequential Python `for` loop or basic threading without managing CUDA streams.
    **The Rationale:** Candidates unfamiliar with low-level GPU scheduling assume standard OS threading naturally parallelizes GPU kernels.
    **The Consequence:** Kernels are launched onto the default stream sequentially, causing severe head-of-line blocking, starved GPU utilization, and massive frame drops on high-speed inputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin compute: 275 TOPS.
    - Workload: 5 distinct vision models with asymmetric execution times and framerates.
    - Default CUDA execution: Synchronous on Stream 0.

    **Calculations:**
    - Sequential Execution (Stream 0): Total latency = Sum(Latency_1 to Latency_5). GPU idle time between kernels dominates.
    - Concurrent Execution (Independent CUDA Streams): Total latency ≈ Max(Latency_1 to Latency_5), bounded by SM capacity.

    **Conclusion & Interpretation:**
    - **Result: Concurrent Execution (Compute-Bound)**. Throughput scales massively by avoiding orchestration-bound head-of-line blocking, unlocking full TOPS across parallel SMs.
