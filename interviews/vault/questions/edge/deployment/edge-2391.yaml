title: Jetson Multi-Model Triton Serving
scenario: An autonomous delivery robot runs 5 different vision models (segmentation, depth, tracking, etc.) using a single Jetson AGX Orin.
question: Design a serving architecture to maximize GPU utilization and handle varying frame rates among the 5 concurrent models?
details:
  realistic_solution: Deploy Triton on the Jetson AGX Orin with one or more tuned instances per model, separate request queues, and explicit ingress rate control for each camera/model stream. Use dynamic batching only where frames are homogeneous and latency budgets allow it. Configure per-model queue limits, priorities, and backpressure so slower or lower-rate models do not block high-rate inputs. CUDA streams and Triton concurrent model execution can overlap kernels when SMs, memory bandwidth, and copy engines allow it, but Jetson AGX Orin does not support MIG and concurrency is not a guarantee of full hardware parallelism.
  common_mistake: |
    **The Pitfall:** Orchestrating multi-model execution via a sequential Python `for` loop or basic threading without managing CUDA streams.
    **The Rationale:** Candidates unfamiliar with low-level GPU scheduling assume standard OS threading naturally parallelizes GPU kernels.
    **The Consequence:** Kernels are launched onto the default stream sequentially, causing severe head-of-line blocking, starved GPU utilization, and massive frame drops on high-speed inputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin compute: 275 TOPS.
    - Workload: 5 distinct vision models with asymmetric execution times and framerates.
    - Default CUDA execution: Synchronous on Stream 0.

    **Calculations:**
    - Sequential orchestration: a burst from one model can delay launches for the other 4 models, creating head-of-line blocking.
    - Triton queues plus per-model instances: each model has an independent backlog and scheduler policy.
    - Stream overlap helps only when kernels and memory traffic leave spare resources; otherwise latency is bounded by SM occupancy, bandwidth, and queue depth, not simply max(latency_i).
    - Heterogeneous frame rates require rate limiting or frame dropping at ingress so a high-FPS stream cannot consume all request slots.

    **Conclusion & Interpretation:**
    - **Result: queue-aware multi-model serving**. Triton improves utilization by avoiding Python orchestration bottlenecks and applying per-model scheduling, while backpressure and rate policies protect latency under asymmetric frame rates.
