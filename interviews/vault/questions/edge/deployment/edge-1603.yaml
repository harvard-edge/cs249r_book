title: Agent Orchestration Memory Footprint on Jetson Orin
scenario: You are deploying an autonomous robotic navigation agent on an edge device with 32 GB RAM. The pipeline requires a 7B LLM for decision making, a vision transformer (ViT) for object detection, and a Whisper model for voice commands. The 7B model is quantized to INT8, the ViT takes 2GB, and Whisper takes 1GB. The OS and base services consume 4GB of RAM.
question: Given 32 GB RAM, a 7B INT8 LLM, 2 GB ViT, 1 GB Whisper, 4 GB OS, and 1 MB/token KV cache, what max context window fits?
details:
  realistic_solution: Aggregate the total static memory blocks consumed by the base OS footprint alongside the unswappable INT8 quantized parameter arrays for all resident inference engines. The remaining delta reflects strictly allocatable KV working memory. Dividing this residual headroom dynamically sets your absolute operational maximum context threshold to avoid aggressive OS OOM-Killer interventions.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the memory footprint of the quantized 7B model itself.
    **The Rationale:** Candidates focus only on the KV cache or the auxiliary models in their calculations.
    **The Consequence:** Overestimating the available memory for the context window, leading to OOM errors in production.
  napkin_math: |
    **Assumptions & Constraints:**
       - RAM: 32 GB LPDDR5
       - 7B LLM (INT8)
       - ViT: 2 GB, Whisper: 1 GB, OS: 4 GB
       - KV Cache constraint: 1 MB / token
    **Calculations:**
       - 7B weights: 7 GB
       - Fixed footprint: 4 GB + 2 GB + 1 GB + 7 GB = 14 GB
       - RAM available for KV: 32 GB - 14 GB = 18 GB
       - Max context tokens: 18,000 MB / 1 MB/token = 18,000 tokens
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound Context Limit.** Competing agent models compress the available RAM, limiting the LLM context to exactly 18,000 tokens.
