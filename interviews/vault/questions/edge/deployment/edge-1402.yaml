title: Hailo-8 Local Memory Specification
scenario: You are deploying a multi-model RAG pipeline on an edge gateway equipped with a Hailo-8 dataflow accelerator. The pipeline requires passing intermediate embeddings between a lightweight embedding model and a small generative model.
question: When designing the memory buffer for these intermediate states, how much local DRAM does the accelerator provide to store these chained inference outputs?
details:
  realistic_solution: The accelerator provides 0 GB of local DRAM for storing chained inference outputs. Intermediate embeddings must be kept in host memory or another external buffer; the local accelerator DRAM capacity itself is zero.
  common_mistake: |
    **The Pitfall:** Falsely assuming the accelerator contains dedicated onboard VRAM (e.g., 4GB LPDDR4).
    **The Rationale:** Candidates pattern-match edge accelerators to standard edge GPUs (like NVIDIA Jetsons) which possess shared unified memory.
    **The Consequence:** Building memory-bound model pipelines that catastrophically fail to execute due to uncalculated PCIe data-streaming chokepoints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Local DRAM: 0 GB

    **Calculations:**
    - Local DRAM available for intermediate states = 0 GB.
    - Therefore no chained inference output can be stored in accelerator-local DRAM.

    **Conclusion & Interpretation:**
    - **Result: 0 GB.** Buffer capacity for intermediate states must come from host or external memory, not local accelerator DRAM.
