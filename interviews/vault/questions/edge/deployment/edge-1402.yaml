title: Hailo-8 Local Memory Specification
scenario: You are deploying a multi-model RAG pipeline on an edge gateway equipped with a dataflow accelerator. The pipeline requires passing intermediate embeddings between a lightweight embedding model and a small generative model.
question: When designing the memory buffer for these intermediate states, how much local DRAM does the accelerator provide to store these chained inference outputs?
details:
  realistic_solution: Dataflow accelerators like the Hailo-8 are architected with zero local DRAM. All intermediate computational states and model weights must stream continuously over the PCIe interface from the host system's primary memory, meaning pipeline engineers must aggressively profile bus latency rather than local memory capacities.
  common_mistake: |
    **The Pitfall:** Falsely assuming the accelerator contains dedicated onboard VRAM (e.g., 4GB LPDDR4).
    **The Rationale:** Candidates pattern-match edge accelerators to standard edge GPUs (like NVIDIA Jetsons) which possess shared unified memory.
    **The Consequence:** Building memory-bound model pipelines that catastrophically fail to execute due to uncalculated PCIe data-streaming chokepoints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Local DRAM: 0 GB
    - Pipeline state to transfer: 512 KB embedding
    - PCIe edge bandwidth: ~2 GB/s

    **Calculations:**
    - Data Transfer Volume = 512 KB out + 512 KB back in = 1 MB total transfer
    - Pipeline Latency Cost = 1 MB / 2000 MB/s = 0.5 ms per chained call

    **Conclusion & Interpretation:**
    - **Result: 0 GB (I/O-Bound)**. Zero local memory means 100% of intermediate data creates direct bus latency.
