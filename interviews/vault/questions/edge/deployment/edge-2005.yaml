title: Edge AI Model Serving on Hailo-8 with Dynamic Workloads
scenario: You are designing model serving infrastructure for an industrial inspection system equipped with a Hailo-8 AI processor. The system must simultaneously run multiple AI models and handle variable inference loads throughout the day.
question: How would you design a Hailo-8 model serving strategy for multiple variable-load inspection models with sub-50ms critical latency and low cold starts?
details:
  realistic_solution: Implement a lightweight embedded inference server around precompiled Hailo-8 dataflow artifacts. Pin the hot set and all safety-critical inspection models resident so the sub-50ms path never waits for a graph load. Keep noncritical models in a separately budgeted standby pool with priority-based admission and eviction based on deadlines, inspection criticality, and scheduled product-line changes rather than generic recency. Prewarm predictable shift-change models before traffic arrives. Use a deadline-aware scheduler with strict per-model queues, admission control, and no batching on critical paths; shed low-priority inspections before cache misses or queueing delay break the SLA.
  common_mistake: |
    **The Pitfall:** Treating the edge device's model serving like a cloud environment (e.g., heavyweight containers, infinite RAM assumptions).
    **The Rationale:** Engineers default to familiar cloud-native tools without realizing they introduce massive latency penalties and memory overhead on embedded hardware.
    **The Consequence:** Severe cold start delays when swapping models, leading to missed defects and underutilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 = 26 TOPS INT8.
    - Sub-50ms target latency.
    - Battery = 37 Wh at 2.5W typical draw.
    - Measured critical model runtime when resident: 20ms.
    - Cold model load or graph swap penalty: 100ms+.

    **Calculations:**
    - Critical path budget after resident inference = 50ms - 20ms = 30ms for queueing and dispatch.
    - A 100ms cold load exceeds the entire 50ms SLA before inference begins.
    - 37 Wh / 2.5W = 14.8 hours uptime.

    **Conclusion & Interpretation:**
    - **Result: Critical Models Must Stay Resident (Cold-Load-Bound)**. The serving strategy should spend memory on hot models and use admission control for cold paths rather than relying on peak TOPS arithmetic.
