title: Edge AI Model Serving on Hailo-8 with Dynamic Workloads
scenario: You are designing model serving infrastructure for an industrial inspection system equipped with a Hailo-8 AI processor. The system must simultaneously run multiple AI models and handle variable inference loads throughout the day.
question: How would you design a Hailo-8 model serving strategy for multiple variable-load inspection models with sub-50ms critical latency and low cold starts?
details:
  realistic_solution: Implement an embedded inference server utilizing Hailo-8's Dataflow Compiler. Keep critical base models loaded in memory while proactively lazy-loading infrequent models. Dynamically map model dataflows to Hailo-8's architecture for concurrent execution.
  common_mistake: |
    **The Pitfall:** Treating the edge device's model serving like a cloud environment (e.g., heavyweight containers, infinite RAM assumptions).
    **The Rationale:** Engineers default to familiar cloud-native tools without realizing they introduce massive latency penalties and memory overhead on embedded hardware.
    **The Consequence:** Severe cold start delays when swapping models, leading to missed defects and underutilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 = 26 TOPS INT8.
    - Sub-50ms target latency.
    - Battery = 37 Wh at 2.5W typical draw.
    - Context switch = 100ms+ penalty.

    **Calculations:**
    - 50 GOPS model = 26,000 / 50 = 520 inferences/second theoretical.
    - 37 Wh / 2.5W = 14.8 hours uptime.

    **Conclusion & Interpretation:**
    - **Result: Sub-50ms budget is blown by a single 100ms context switch (Context-Switch-Bound)**. Careful time-slicing and persistent memory allocation are mandatory.
