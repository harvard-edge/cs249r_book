title: Analyzing Performance Degradation in Edge ML Model Rollouts
scenario: You are deploying a new computer vision model (v2) to a fleet of NVIDIA Jetson Orin devices. During a canary deployment, you observe a significant drop in inferencing throughput (60 FPS to 30 FPS) and increased P99 latency (50ms to 150ms) compared to the v1 model. The v2 model has 10% more parameters and uses an experimental 4-bit quantization path that may fall back to less optimized kernels.
question: How would you diagnose the Jetson Orin canary drop from 60 to 30 FPS and P99 jump from 50 to 150 ms, and which metrics would you correlate?
details:
  realistic_solution: 'Implement a phased diagnostic approach: 1. Collect granular device-level metrics (CPU/GPU utilization, memory bandwidth, temperature, power draw) and compare against v1 baselines. 2. Profile inference on-device using NVIDIA Nsight Systems to identify bottlenecks (e.g., 4-bit unpacking overhead, memory access patterns). 3. Conduct targeted micro-benchmarks for the 4-bit inference kernel in isolation.'
  common_mistake: |
    **The Pitfall:** Assuming model complexity or quantization inherently improves performance without profiling the specific hardware implementation.
    **The Rationale:** Candidates assume 4-bit quantization is "smaller and faster" than INT8 without considering if the hardware natively accelerates 4-bit ops.
    **The Consequence:** They overlook critical edge resource contention (like memory bandwidth saturation or CPU unpacking overhead) and fail to isolate the true systemic bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
       - Platform: Jetson Orin with mature INT8 acceleration; the v2 4-bit path may use less optimized kernels or unpacking.
       - Baseline v1: 60 FPS, 50ms P99
       - Canary v2: 30 FPS, 150ms P99, 10% larger parameter size
    **Calculations:**
       - Throughput degradation: 30 FPS / 60 FPS = 50% of baseline throughput.
       - P99 latency degradation: 150ms / 50ms = 3x worse.
       - Parameter growth alone is 1.1x, so the larger regression suggests another bottleneck must be isolated.
    **Conclusion & Interpretation:**
       - **Result: bottleneck not proven from aggregate metrics.** The 4-bit path is a strong suspect, but profiling must determine whether latency comes from compute, memory bandwidth, kernel launch overhead, CPU unpacking, or host/device synchronization.
