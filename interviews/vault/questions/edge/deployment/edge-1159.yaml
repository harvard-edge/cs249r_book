title: 'Edge TCO Fluency: Rapid Cost-Per-Inference Estimation'
scenario: 'Three edge systems are evaluated over 3 years at 10 inferences/second, 24/7 at an electricity
  rate of $0.10/kWh: (1) Jetson Orin ($499, 60W), (2) Hailo-8+Pi5 ($280, 7.5W), (3) Coral+Pi4 ($60, 7W).'
question: What are the 3-year total cost and cost-per-inference for these systems, and how do they rank
  by cost-efficiency?
details:
  realistic_solution: 'Compute 3-year power cost as watts × 26,280 hours × $0.10/kWh / 1000, then add
    hardware CapEx. Jetson Orin: $499 + $157.68 = $656.68. Hailo-8+Pi5: $280 + $19.71 = $299.71. Coral+Pi4:
    $60 + $18.40 = $78.40. Over 3 years at 10 inferences/second, the total inferences are 946,080,000.
    Dividing TCO by this volume yields the cost-per-inference: Orin is $6.94e-7, Hailo is $3.17e-7, and
    Coral is $8.29e-8. Coral ranks best by cost-efficiency.'
  common_mistake: '**The Pitfall:** Forgetting to include the host processor power.

    **The Rationale:** Candidates often only calculate the power of the accelerator chip itself and forget
    the host SBC.

    **The Consequence:** This significantly underestimates the power budget for edge accelerators, which
    are typically dominated by the host system.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 3 years = 26,280 hours.

    - Energy rate = $0.10/kWh.

    - Inferences: 10 inf/s * 3600 * 24 * 365 * 3 = 946,080,000 inferences.

    - Jetson (60W, $499), Hailo+Pi (7.5W, $280), Coral+Pi (7W, $60).


    **Calculations:**

    - Jetson Power Cost = 60W * 26,280h / 1000 * $0.10 = $157.68. Total = $656.68. Cost/inf = $656.68
    / 946,080,000 = $6.94e-7.

    - Hailo Power Cost = 7.5W * 26,280h / 1000 * $0.10 = $19.71. Total = $299.71. Cost/inf = $299.71 /
    946,080,000 = $3.17e-7.

    - Coral Power Cost = 7W * 26,280h / 1000 * $0.10 = $18.40. Total = $78.40. Cost/inf = $78.40 / 946,080,000
    = $8.29e-8.


    **Conclusion & Interpretation:**

    - **Result: $78.40 TCO (OpEx-Bound Mitigation)**. By 3-year TCO and cost-per-inference, Coral ($8.29e-8/inf)
    beats Hailo ($3.17e-7/inf) and Orin ($6.94e-7/inf).'
