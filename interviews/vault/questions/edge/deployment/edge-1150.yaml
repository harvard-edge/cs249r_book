title: 'Edge TCO Design: Hailo-8 ROI for Smart Agriculture'
scenario: 'Design an edge inference deployment for crop disease detection across 1000 farms using Hailo-8 (26 TOPS INT8, 2.5W, $200). Each farm takes 5 images/day from drone. Alternative: cloud inference at $0.01/image. Battery considerations: solar + 10Ah LiPo at 3.7V = 37Wh. Connectivity: LoRa at $5/month.'
question: What is the break-even point and 5-year ROI for deploying Hailo-8 edge inference on 1000 farms versus cloud inference?
details:
  realistic_solution: 'Cloud cost is 1000 farms * 5 images/day * 30 days * $0.01 = $1,500/month, or $90,000 over 5 years. Edge CapEx is $200 * 1000 = $200,000, and LoRa OpEx is $5 * 1000 = $5,000/month, or $300,000 over 5 years. The break-even equation is $200,000 + $5,000m <= $1,500m; since edge monthly OpEx is already $3,500/month higher than cloud inference OpEx, no nonnegative month m can break even. The 5-year edge TCO is $500,000 before any solar or enclosure costs. Versus cloud, the 5-year net value is $90,000 - $500,000 = -$410,000, so ROI defined as net savings divided by total edge spend is -82%. Power should be duty-cycled for the sparse workload: continuous 2.5W operation uses 60Wh/day, while a 37Wh battery cannot support 24/7 operation without solar recharge.'
  common_mistake: |
    **The Pitfall:** Ignoring persistent edge connectivity costs.
    **The Rationale:** Engineers assume moving compute to the edge inherently lowers total monthly OpEx by completely zeroing out cloud APIs.
    **The Consequence:** They miss that maintaining LoRa connectivity ($5/month per farm) can exceed the direct cloud inference API cost ($1.50/month per farm) for this sparse workload.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1000 farms, 5 images/day each.
       - Cloud API = $0.01/image. LoRa Edge connectivity = $5.00/month.
       - Hailo-8 = 2.5W. Battery = 37Wh.
    2. **Calculations:**
       - Cloud Cost = 5 images/day * 30 days * $0.01 = $1.50/month per farm.
       - Fleet cloud cost = $1.50 * 1000 = $1,500/month; 5-year cloud cost = $1,500 * 60 = $90,000.
       - Edge CapEx = $200 * 1000 = $200,000.
       - Edge LoRa OpEx = $5.00/month/farm * 1000 = $5,000/month; 5-year LoRa cost = $300,000.
       - Break-even condition after m months: $200,000 + $5,000m <= $1,500m. This has no m >= 0 solution because edge OpEx exceeds cloud OpEx by $3,500/month before CapEx recovery.
       - 5-year edge TCO = $200,000 + $300,000 = $500,000.
       - 5-year net value versus cloud = $90,000 - $500,000 = -$410,000.
       - 5-year ROI on edge spend = -$410,000 / $500,000 = -82%.
       - Continuous runtime on battery = 37Wh / 2.5W = 14.8 hours, so sparse inference should be duty-cycled rather than run 24/7.
    3. **Conclusion & Interpretation:**
       - **Result: No break-even and -82% 5-year ROI.** The edge architecture never breaks even because the $5/month LoRa baseline cost exceeds the $1.50/month cloud inference cost per farm before recovering the $200,000 hardware CapEx.
