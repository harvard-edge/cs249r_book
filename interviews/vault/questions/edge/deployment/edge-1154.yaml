title: 'Edge TCO Diagnosis: Connectivity Cost Surprise in IoT Fleet'
scenario: "A company budgeted $500K for a 2,000-unit Jetson Orin ($499 each) smart city deployment. At month 3, they've spent $200K more than projected. The extra cost is from 4G data overages (budget: $5/unit/month, actual: $25/unit/month)."
question: What caused the 4G overage, how much does it cost annually, and how should the 2,000-unit Jetson fleet fix it?
details:
  realistic_solution: This is a classic violation of edge computing principles. The units are streaming raw video data to the cloud instead of utilizing their onboard Jetson compute to process locally. Update the fleet firmware to only transmit the low-bandwidth inference JSON metadata, drastically slashing 4G payloads.
  common_mistake: |
    **The Pitfall:** Streaming raw data from an edge inference device.
    **The Rationale:** Engineers design an "edge" system but still transmit raw camera streams to the cloud for visualization/logging.
    **The Consequence:** Completely negating the bandwidth savings that justified the high CapEx of using edge inference hardware, resulting in massive OpEx overages.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet Size: 2,000 units.
    - Data Overage Cost: $20/unit/month extra ($25 actual - $5 budget).
    - Current Data Consumption: ~25GB/month (implies streaming raw clips).
    - Proposed Fix: Transmit only 50KB thumbnail + 1KB JSON result per event, ~20 events/day.

    **Calculations:**
    - Annual Overage Cost = $20/unit/month * 2000 units * 12 months = $480,000/year.
    - Optimized Daily Usage = 20 events * 51 KB = 1020 KB ≈ 1 MB/day.
    - Optimized Monthly Usage = 1 MB/day * 30 days = 30 MB/month.

    **Conclusion & Interpretation:**
    - **Result: $480,000/year Savings (Bandwidth-Cost-Bound)**. Transmitting inference metadata instead of raw video prevents massive OpEx overruns.
