title: 'Edge TCO Mastery: Full Lifecycle Cost Model for Industrial Edge AI'
scenario: Build a comprehensive 5-year TCO model for an industrial predictive maintenance system of 200 edge units ($499, 60W active power) deployed in a steel mill. Costs include hardware, power ($0.10/kWh), connectivity ($2K/site setup + $500/yr), model retraining ($50K/year), and maintenance contracts (5% of HW/year). The system delivers an opportunity cost value of $500K/year via downtime prevention.
question: What is the 5-year TCO, ROI, and payback period for the 200-unit predictive maintenance deployment?
details:
  realistic_solution: |
    Hardware CapEx is 200 * $499 = $99,800. Five-year power is 200 * 60W * 43,800h / 1000 * $0.10 = $52,560. For one steel-mill site, connectivity is a $2,000 one-time setup plus $500/year for 5 years, or $4,500 total. Retraining is $250,000 and maintenance is $24,950 over 5 years, so 5-year TCO is $431,810. Five-year value is $2,500,000, giving ROI = ($2,500,000 - $431,810) / $431,810 = 479%. Standard payback uses the initial outlay of $101,800 ($99,800 hardware + $2,000 setup) divided by annual net benefit after recurring OpEx: $500,000 - ($10,512 power + $500 connectivity + $50,000 retraining + $4,990 maintenance) = $433,998/year. Payback is $101,800 / $433,998 = 0.23 years, or about 2.8 months.
  common_mistake: |
    **The Pitfall:** Building a cost-only model without including the value delivered.
    **The Rationale:** Candidates forget that Total Cost of Ownership (TCO) must be paired with Return on Investment (ROI) to justify business cases.
    **The Consequence:** A $400k+ edge deployment appears as a pure expense, leading to project cancellation despite massive operational value.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 units, $499 each, 60W active power.
    - $0.10/kWh power cost.
    - One steel-mill site: $2,000 connectivity setup plus $500/year.
    - Value generated: $500K/year.

    **Calculations:**
    - 5-yr Hardware: 200 * $499 = $99,800.
    - 5-yr Power: 200 units * 60W * 43,800h / 1000 * $0.10/kWh = $52,560.
    - 5-yr Connectivity: $2,000 + (5 * $500) = $4,500.
    - 5-yr Retraining: 5 * $50K = $250,000.
    - 5-yr Maintenance: 5 * ($99,800 * 0.05) = $24,950.
    - 5-yr TCO = $431,810.
    - 5-yr Value: $500K * 5 = $2,500,000.
    - ROI = ($2,500,000 - $431,810) / $431,810 = 4.789 (479%).
    - Initial outlay = $99,800 hardware + $2,000 connectivity setup = $101,800.
    - Annual recurring cost = $10,512 power + $500 connectivity + $50,000 retraining + $4,990 maintenance = $66,002.
    - Annual net benefit = $500,000 - $66,002 = $433,998.
    - Payback = $101,800 / $433,998 = 0.23 years, or about 2.8 months.

    **Conclusion & Interpretation:**
    - **Result: $431,810 5-year TCO, 479% ROI, and 0.23-year payback.** The payback period is based on cumulative cash flow against the initial outlay, not year-1 cost divided by gross annual value.
