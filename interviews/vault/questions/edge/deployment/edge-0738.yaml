title: The Automotive OTA Update
scenario: A critical bug requires you to roll out a new perception model to an autonomous vehicle fleet. The full update package, including the model, dependencies, and container image, is 2 GB.
question: How long will the 2 GB OTA update download take over a stable 40 Mbps cellular connection?
details:
  realistic_solution: The correct way to solve this is to first make the units consistent (convert the file size from gigabytes to megabits) and then divide by the network speed.
  common_mistake: |
    **The Pitfall:** Confusing megabits (Mb) with megabytes (MB).
    **The Rationale:** Engineers often forget that network speeds are advertised in bits per second, while file sizes are measured in bytes.
    **The Consequence:** Calculating download times that are 8x faster than reality, leading to faulty deployment schedules.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - File size: 2 GB (Gigabytes). Network speed: 40 Mbps (Megabits per second).
    2. **Calculations:**
       - 2 GB = 2 * 1024 MB = 2048 MB.
       - 2048 MB * 8 bits/byte = 16,384 Megabits (Mb).
       - Time = 16,384 Mb / 40 Mbps = 409.6 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 409.6 Seconds (~6.8 minutes).** The vehicle will spend nearly 7 minutes completing the download portion of the OTA update.
  options:
  - ~51 seconds
  - ~16 seconds
  - ~6.8 minutes
  - ~2.7 minutes
  correct_index: 2
