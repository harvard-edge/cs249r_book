title: 'The A/B Partitioning Storage Tax'
scenario: 'You are designing an edge device with a 1 MB application firmware image (model + code). To ensure safe and reliable over-the-air (OTA) updates with rollback capabilities, you''re using an A/B partitioning scheme.'
question: 'What minimum flash storage is required for a 1 MB firmware image with A/B OTA partitions and 100 KB bootloader/OS overhead?'
details:
  realistic_solution: 'The correct approach is to sum the storage for the operating system/bootloader overhead and two full application partitions. One partition (A) runs the active firmware, while the other (B) is used to download the new firmware. Once validated, the bootloader switches to boot from partition B. Partition A is kept as a fallback until the next update cycle. Therefore, the minimum required storage is the OS overhead plus twice the application image size.'
  common_mistake: |
    **The Pitfall:** Calculating storage based on only one copy of the application image.
    **The Rationale:** Engineers forget that A/B partitioning inherently requires provisioning space for *two* complete copies of the application image.
    **The Consequence:** Provisioning a device with half the required flash storage, making safe OTA updates impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - OS + Bootloader overhead: 100 KB.
    - Application image size: 1 MB.
    - Partitioning scheme: A/B (requires two full copies).

    **Calculations:**
    - Total Flash = (OS + Bootloader) + (App Image Size $\times$ 2).
    - Total Flash = 100 KB + (1 MB $\times$ 2) = 100 KB + 2 MB.

    **Conclusion & Interpretation:**
    - **Result: 2.1 MB (Storage-Bound)**. A/B partitioning inherently demands overhead for two complete copies to support safe OTA rollbacks.
  options:
  - '~1.1 MB'
  - '~2.1 MB'
  - '~2.0 MB'
  - 'Slightly more than 1 MB'
