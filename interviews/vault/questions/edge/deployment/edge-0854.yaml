title: On-Device Shadow Evaluation Trade-offs
scenario: A wearable AR glass system implements on-device learning to adapt its gaze-tracking CNN (5MB, 150M MACs) to individual users. To prevent regression on general saccades, you must evaluate the adapted variant via 'shadow mode' alongside the frozen baseline on the neural DSP (8MB SRAM). A single inference takes 15ms and consumes 100mW. The system requires at least 50 FPS and strict thermal limits.
question: Can the AR glasses continuously run both gaze-tracking models on every frame, and what shadow-mode architecture meets 50 FPS and 8MB SRAM?
details:
  realistic_solution: No, the glasses cannot run two full gaze models on every frame. That would require 30ms of inference per frame, exceeding the 20ms/frame budget for 50 FPS, and two 5MB model copies would exceed the 8MB SRAM before activations. Use the adapted model on every displayed frame, keep the baseline as the shared frozen base, and run shadow comparisons on a sampled/interleaved schedule such as every 10th frame with delayed logging rather than gating rendering. Store the adaptation as a small adapter so SRAM holds one 5MB base, the adapter, and activations.
  common_mistake: |
    **The Pitfall:** Suggesting running both models sequentially on every frame.
    **The Rationale:** Candidates simply double the workload without checking the math against the constraints.
    **The Consequence:** Doubling latency and power draw immediately violates the 50 FPS requirement and the strict AR thermal envelope.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline model: 15ms inference, 100mW power, 5MB size.
       - Target: >= 50 FPS (<= 20ms per frame average).
       - Hardware: 8MB SRAM strict limit.
    2. **Calculations:**
       - Dual full-model execution per frame latency = 15ms + 15ms = 30ms, which is slower than the 20ms/frame budget (33.3 FPS effective).
       - Dual full-model memory = 5MB + 5MB = 10MB before activations, exceeding 8MB SRAM.
       - Interleaved shadow schedule with baseline on 1/10 frames: average DSP work = 15ms + (15ms / 10) = 16.5ms per frame equivalent, under the 20ms average compute budget.
       - Adapter memory approach = 5MB shared base + 0.2MB adapter + 2MB activations = 7.2MB, under 8MB.
    3. **Conclusion & Interpretation:**
       - **Result: running both models on every frame is infeasible.** Interleaved shadow evaluation with a shared base plus small adapter keeps displayed-frame inference at 15ms, average shadow compute at 16.5ms/frame equivalent, and SRAM at about 7.2MB.
