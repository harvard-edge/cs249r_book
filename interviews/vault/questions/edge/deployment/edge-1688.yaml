title: Edge TPU Multi-Model Pipeline Fallback Optimization
scenario: You are deploying a compound visual QA system on a Google Coral Edge TPU (4 TOPS INT8, 2W). The pipeline chains an object detector and a custom OCR classifier. Currently, the system only achieves 13 FPS instead of the target 30 FPS. Profiling reveals that while the detector runs entirely on the TPU in 15ms, the OCR model suffers severe latency due to an unsupported Swish activation function, forcing intermediate tensors to be transferred back and forth over the USB/PCIe interface to the host CPU.
question: How would you fix the Coral Edge TPU OCR bottleneck to ensure the detector-plus-OCR pipeline reaches 30 FPS?
details:
  realistic_solution: 'Diagnose the graph compilation logs to identify the unsupported Swish operator causing the CPU fallback. Replace it with a Coral-supported ReLU6 activation and retrain/requantize the model to strict INT8. Recompile the model with the Edge TPU compiler to ensure the entire subgraph is mapped to the TPU, eliminating the catastrophic host-device I/O overhead.'
  common_mistake: Suggesting pruning the model, buying a more powerful edge device, or aggressive downsampling, failing to identify that the CPU fallback and the resulting host-to-device memory transfer is the true bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS (33.3 ms/frame)
    - Detector time = 15 ms
    - Baseline OCR time = 60 ms (10ms TPU + 40ms USB I/O + 10ms CPU)

    **Calculations:**
    - Replace Swish with ReLU6 to eliminate USB I/O
    - Optimized OCR time = 12 ms entirely on TPU
    - Total pipeline time = 15 ms + 12 ms = 27 ms
    - Throughput = 1000 / 27 ms = 37 FPS

    **Conclusion & Interpretation:**
    - **Result: 37 FPS (I/O-Bandwidth-Bound)**. Removing the unsupported operator eliminates catastrophic host-device data transfer, restoring real-time performance.
