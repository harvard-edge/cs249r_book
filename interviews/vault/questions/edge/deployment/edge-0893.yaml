title: 'Heterogeneous Edge Model Registry'
scenario: 'Your consumer hardware startup has 1 million active devices across 3 generations. Gen 1 uses a Coral EdgeTPU (INT8), Gen 2 uses Jetson Nano (FP16), Gen 3 uses Snapdragon Hexagon (INT8/FP16). You train a single PyTorch model. You must design a CI/CD pipeline and registry to update all devices over unmetered WiFi without exhausting device storage.'
question: 'How would you build the CI/CD pipeline and model registry to update all three hardware generations without exhausting device storage?'
details:
  realistic_solution: 'Implement a target-aware Model Registry with hardware-specific compilation in the CI/CD pipeline. The pipeline takes the PyTorch artifact, exports to ONNX, and branches into three compilation paths: EdgeTPU Compiler (INT8), TensorRT (FP16), and Qualcomm SNPE (INT8). The registry tags each resulting artifact with `model_version`, `target_hw`, and `precision`. During the OTA check-in, the edge device sends its hardware manifest (e.g., `hw: coral_edgetpu`). The registry dynamically resolves this to the exact thin binary required. This trades pipeline complexity (maintaining N compilation toolchains) for edge storage efficiency and reduced network transfer times.'
  common_mistake: |
    **The Pitfall:** Packaging all compiled targets into a single "fat binary" container.
    **The Rationale:** Engineers try to simplify the deployment pipeline by letting the edge device select the right model at runtime.
    **The Consequence:** The massive fat binary exhausts the limited flash storage on older edge devices, causing widespread deployment failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fat binary payload: 15MB + 30MB + 20MB = 65MB.
    - Target device free storage: e.g., 32MB.

    **Calculations:**
    - 65MB fat binary exceeds 32MB free storage constraint.
    - Thin binary size: 15MB (Coral target).
    - 15MB < 32MB constraint.

    **Conclusion & Interpretation:**
    - **Result: 100% Deployment Failure for Fat Binaries (Storage-Bound)**. Target-specific resolution is required at the edge to prevent out-of-memory errors during model OTA updates.
