title: Optimizing RAG Pipeline Latency on Jetson Orin
scenario: 'Your team is deploying a local Retrieval-Augmented Generation (RAG) assistant for a robotics application on an NVIDIA Jetson Orin. The pipeline consists of an embedding model, a vector search step, and a 7B parameter LLM for generation. You are evaluating two deployment strategies to meet a strict 500ms end-to-end latency budget: Option A runs both the embedding model and the LLM concurrently on the Ampere GPU. Option B pins the embedding model to the Deep Learning Accelerator (DLA) and reserves the GPU exclusively for the LLM.'
question: Which architecture do you choose, and how do you allocate resources to ensure predictable latency?
details:
  realistic_solution: Option B is the superior choice. By pinning the embedding model to the DLA, you physically isolate the compute workloads, eliminating GPU context switching. While the DLA might execute the embedding model slightly slower than the GPU would in isolation, it frees up the GPU's Ampere cores entirely for the memory-bandwidth-bound 7B LLM. This provides deterministic execution times for both stages of the pipeline, allowing you to confidently meet the 500ms deadline while staying within the 60W TDP.
  common_mistake: |
    **The Pitfall:** Running both models concurrently on the GPU to maximize theoretical throughput.
    **The Rationale:** Candidates assume that the Ampere GPU will process both models faster than offloading to the slower DLA.
    **The Consequence:** They fail to account for GPU context switching overhead and memory bandwidth contention, leading to unpredictable latency spikes that violate the hard 500ms budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Budget: 500ms total latency.
    - Memory Bandwidth: 204 GB/s.
    - LLM Model: 7B INT4 requires 3.5GB memory.

    **Calculations:**
    - Embedding & Search Overhead (DLA): ~50ms + ~10ms CPU search = ~60ms.
    - Remaining Budget for LLM = 440ms.
    - LLM Memory Load Time = 3.5GB / 204 GB/s = ~17ms per token.
    - Tokens Generated = 440ms / 17ms/token = ~25 tokens generated.

    **Conclusion & Interpretation:**
    - **Result: 440ms remaining (Memory-Bandwidth-Bound)**. Offloading embedding to the DLA protects the critical 204 GB/s bus, ensuring the LLM hits the 500ms latency ceiling consistently.
