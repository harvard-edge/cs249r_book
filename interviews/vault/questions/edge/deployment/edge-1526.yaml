title: Optimizing RAG Pipeline Latency on Jetson Orin
scenario: 'Your team is deploying a local Retrieval-Augmented Generation (RAG) assistant for a robotics application on an NVIDIA Jetson Orin. The pipeline consists of an embedding model, a vector search step, and a 7B parameter LLM for generation. You are evaluating two deployment strategies to meet a strict 500ms end-to-end latency budget: Option A runs both the embedding model and the LLM concurrently on the Ampere GPU. Option B pins the embedding model to the Deep Learning Accelerator (DLA) and reserves the GPU exclusively for the LLM.'
question: Which architecture do you choose, and how do you allocate resources to ensure predictable latency?
details:
  realistic_solution: Option B is the safer architecture for predictable latency, assuming the embedding model is compatible with DLA. Pin the embedding model to DLA, keep vector search on the CPU, and reserve the GPU for the 7B LLM generation path. This does not guarantee determinism or prove the 500 ms budget by itself, but it reduces GPU scheduling interference and avoids running the embedding model concurrently with the latency-critical LLM. The final allocation should be validated with measured p95/p99 stage latencies under realistic query load.
  common_mistake: |
    **The Pitfall:** Running both models concurrently on the GPU to maximize theoretical throughput.
    **The Rationale:** Candidates assume that the Ampere GPU will process both models faster than offloading to the slower DLA.
    **The Consequence:** They fail to account for GPU context switching overhead and memory bandwidth contention, leading to unpredictable latency spikes that violate the hard 500ms budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target budget: 500 ms total latency.
    - DLA embedding latency estimate after compilation: ~50 ms.
    - CPU vector search estimate: ~10 ms.
    - LLM latency must be measured; model-size divided by memory bandwidth is not a valid per-token latency model.

    **Calculations:**
    - Non-LLM latency with DLA offload = 50 ms + 10 ms = 60 ms.
    - Remaining budget for LLM generation and orchestration = 500 ms - 60 ms = 440 ms.
    - Option A must also fit embedding, search, and LLM work into 500 ms while sharing GPU compute and memory bandwidth, increasing p99 risk.

    **Conclusion & Interpretation:**
    - **Result: 440 ms remains for the measured LLM path.** Choose Option B for resource isolation and lower p99 risk, then accept it only if profiling shows the LLM stage fits the remaining budget.
