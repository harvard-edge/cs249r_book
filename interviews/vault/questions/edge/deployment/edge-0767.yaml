title: The Cellular Diet
scenario: You need to deploy a 250MB model update to a fleet of 100,000 smart cameras in rural areas. Each camera has a cellular plan limited to an average of 500KB/day of free data for system updates.
question: How do you efficiently manage this deployment without massive overages?
details:
  realistic_solution: Implement **delta updates** (binary diffing) to minimize the payload size. The device requests only the byte-level differences from its current model version to the target version. Distribute the update over several days or weeks by sending chunks within each device's 500KB/day free allowance and reassembling them on the device. Prioritize critical security or bugfix updates, and use opportunistic transfers when devices connect to Wi-Fi or have higher bandwidth allowances. Consider implementing peer-to-peer sharing if devices are in close proximity and network topology allows, further reducing cloud egress bandwidth.
  common_mistake: |
    **The Pitfall:** Pushing the full model update whenever a device connects.
    **The Rationale:** Candidates often assume that standard cloud deployment strategies (like Docker container pulls) apply directly to edge devices.
    **The Consequence:** This ignores strict bandwidth caps, leading to massive overage charges or an impossibly long 500-day deployment cycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 250MB (250,000KB).
    - Device Limit: 500KB/day.
    - Fleet Size: 100,000 devices.

    **Calculations:**
    - Full Update Problem: 250,000KB / 500KB/day = 500 days per device.
    - Delta Update Strategy: Binary diff = 10% of full size = 25MB (25,000KB).
    - Per-device transfer time for the delta = 25,000KB / 500KB/day = 50 days.
    - Fleet aggregate free allowance = 100,000 * 500KB/day = 50,000,000KB/day (~50GB/day).
    - Total fleet delta transfer = 100,000 devices * 25MB = 2.5TB, which also takes about 50 days if all devices consume their allowance in parallel.

    **Conclusion & Interpretation:**
    - **Result: 50 days per device, and about 50 fleet days under parallel capped transfers (Bandwidth-Bound)**. Shrinking payloads avoids severe overage costs while keeping the rollout cadence explicit.
