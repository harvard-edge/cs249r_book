title: 'Edge TCO Fluency: Quick TCO Estimation for Edge Deployment'
scenario: 'Two edge fleets are being evaluated over a 3-year lifespan: (1) 100 Jetson Orin units at 60W, $499 each; (2) 100 Coral Edge TPU systems at 2W, $25 each. Electricity costs $0.10/kWh, and cloud inference costs $0.001/inference.'
question: What are the 3-year TCOs for the Jetson Orin and Coral Edge TPU fleets, and at what daily inference volume does the Coral fleet beat the cloud?
details:
  realistic_solution: Jetson fleet CapEx is 100 * $499 = $49,900 and 3-year power is 100 * 60W * 26,280h / 1000 * $0.10 = $15,768, so Jetson fleet TCO is $65,668. Coral fleet CapEx is 100 * $25 = $2,500 and power is 100 * 2W * 26,280h / 1000 * $0.10 = $525.60, so Coral fleet TCO is $3,025.60. At $0.001 per cloud inference, the Coral fleet break-even is 3,025,600 inferences over 3 years, or about 2,763 inferences/day across the fleet. That is about 27.6 inferences/day per Coral unit.
  common_mistake: |
    **The Pitfall:** Ignoring the power cost entirely or failing to convert watts to kilowatts.
    **The Rationale:** Candidates often focus purely on hardware CapEx or use the formula `watts × hours × rate` without dividing by 1000.
    **The Consequence:** This leads to massive overestimation of power costs (by 1000x) or completely ignores the dominating operational expense of high-power edge nodes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 units. 3 years = 26,280 hours. Rate = $0.10/kWh.
    - Jetson: $499 CapEx, 60W.
    - Coral: $25 CapEx, 2W.
    - Cloud: $0.001/inference.

    **Calculations:**
    - Jetson power = 100 * 60W * 26,280h / 1000 * $0.10 = $15,768.
    - Jetson TCO = $49,900 + $15,768 = $65,668.
    - Coral power = 100 * 2W * 26,280h / 1000 * $0.10 = $525.60.
    - Coral TCO = $2,500 + $525.60 = $3,025.60.
    - Coral fleet break-even volume = $3,025.60 / $0.001 = 3,025,600 inferences over 3 years.
    - Fleet daily break-even = 3,025,600 / (3 * 365) = 2,763 inferences/day.
    - Per-unit daily break-even = 2,763 / 100 = 27.6 inferences/day/device.

    **Conclusion & Interpretation:**
    - **Result: $65,668 Jetson fleet TCO, $3,025.60 Coral fleet TCO, and 2,763 Coral fleet inferences/day to beat cloud.** The equivalent per-unit Coral threshold is about 27.6 inferences/day.
