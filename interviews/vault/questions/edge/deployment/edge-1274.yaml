title: Architecting an INT8 Dataflow Pipeline for Hailo-8
scenario: You are designing an edge gateway for real-time video analytics that relies on a Hailo-8 accelerator. The application requires deploying a state-of-the-art vision model. The Hailo-8 provides 26 TOPS of INT8 compute at a highly efficient 2.5W, but it operates as a pure dataflow accelerator with no local DRAM, streaming all weights and activations directly from host memory.
question: How would you convert and partition the vision model for Hailo-8 so unsupported ops do not create costly host round trips?
details:
  realistic_solution: 'A strong L5 candidate will evaluate the conversion graph to ensure a single, contiguous block of operations is mapped to the Hailo-8. They will propose using ONNX as an intermediate format with strict static shapes, applying QAT (Quantization-Aware Training) for optimal INT8 accuracy, and explicitly partitioning the model so that pre-processing and complex post-processing are delegated to the host CPU, minimizing host-accelerator memory traffic and keeping the 26 TOPS engine fully utilized.'
  common_mistake: |
    **The Pitfall:** Designing a standard sequential pipeline and ignoring host-memory streaming constraints.
    **The Rationale:** Candidates place unsupported operators in the middle of the graph.
    **The Consequence:** This causes severe performance penalties due to repeated context switching and bidirectional memory transfers between host and accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Stream is 640x640x3 (1.2 MB) at 60 FPS.
    - Compute Requirement is 100 GOPS/frame.
    - Fallback Penalty requires a 32MB intermediate tensor at 60 FPS.

    **Calculations:**
    - Input Stream bandwidth is 1.2 MB * 60 = ~72 MB/s continuous stream.
    - Compute Requirement is 100 GOPS/frame * 60 = 6 TOPS (Easily fits 26 TOPS limit).
    - Fallback Penalty bandwidth is 32MB * 2 (read/write) * 60 = 3.8 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.8 GB/s (Memory-Bound)**. A single graph break heavily taxes host memory bandwidth and destroys the efficiency of the 2.5W system.
