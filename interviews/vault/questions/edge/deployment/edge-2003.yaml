title: 'Edge Object Detection with Hailo-8: Latency, Throughput, and Power Optimization'
scenario: An autonomous drone must process 1080p video at 30 FPS using a YOLOv5s model (9 GMACs). The end-to-end latency budget is 70ms.
question: How would you architect the serving infrastructure and latency budget across data acquisition, pre/post-processing, and inference to meet 70ms end-to-end latency on a Hailo-8?
details:
  realistic_solution: 'Deploy using HailoRT for zero-copy memory transfers and pipeline execution. Quantize YOLOv5s to INT8. Allocate the 70ms budget carefully: 10ms for DMA frame capture, 15ms for NEON-accelerated CPU pre-processing (resize/normalize), 15ms for Hailo-8 INT8 inference, and 10ms for NMS post-processing on the CPU, leaving a 20ms safety margin. Avoid generic frameworks; bind native C++ pipelines directly to the V4L2 camera buffers to prevent memory bounce.'
  common_mistake: |
    **The Pitfall:** Allocating the entire 70ms budget to the NPU inference time based on theoretical TOPS.
    **The Rationale:** Ignoring Amdahl's Law and underestimating the dominant cost of memory copies, image decoding, and NMS on resource-constrained host CPUs.
    **The Consequence:** The system easily achieves 30 FPS in benchmarking the model alone but drops frames in production due to CPU pre-processing bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: YOLOv5s (9 GMACs = 18 GOPs INT8). Target: 1080p @ 30 FPS (33.3ms interval). End-to-End Deadline: 70ms.
    - Hailo-8: 26 TOPS.

    **Calculations:**
    - Theoretical Compute: 18 GOPs / 26 TOPS = ~0.69ms.
    - Realistic Inference (accounting for memory I/O): ~10-15ms.
    - Pipeline Budget: 10ms (Capture) + 15ms (Pre) + 15ms (Infer) + 10ms (Post) = 50ms.

    **Conclusion & Interpretation:**
    - **Result: NPU requires <1ms (I/O and Pre/Post-processing Bound)**. Host CPU tasks dominate the 70ms budget.
