title: 'The Edge-Cloud Hybrid Inference'
scenario: 'Your agricultural drone runs a lightweight crop disease detector (MobileNetV3, 0.22 GFLOPs) on a Google Coral Edge TPU (4 TOPS, 2W). It classifies 95% of images correctly on-device in 3ms. For the remaining 5% of ambiguous cases, your team proposes offloading to a cloud model (EfficientNet-B7, 37 GFLOPs) via a 4G LTE connection.'
question: 'What 4G offloading policy should handle the 5% ambiguous crop images, and does the hybrid approach actually help?'
details:
  realistic_solution: 'The hybrid approach provides marginal accuracy gain at disproportionate cost. On-device handles 95% of frames at 3ms with 100% availability. Cloud offload adds 285-515ms latency for 5% of frames, with only ~70% availability over rural 4G. The net accuracy gain: 5% of frames x 4.5% improvement = 0.225% overall. The energy cost: cloud offload via 4G modem costs 250x more energy per frame (1.5J vs 0.006J). The practical design: batch ambiguous frames, upload them during charging/docking for offline analysis, and use results to fine-tune the on-device model. Real-time cloud offload only makes sense with reliable, low-latency connectivity.'
  common_mistake: '"Offload anything below 90% confidence to the cloud for better accuracy." This ignores the latency and reliability costs of cellular connectivity in agricultural settings.'
  napkin_math: |
    **Assumptions & Constraints:**
    - On-device Coral TPU: 3ms latency, 95% accuracy, 2W power, 100% availability.
    - Cloud EfficientNet offload: 285ms latency, 99.5% accuracy, 3W 4G modem power, 70% availability.
    - Frame rate: 10 FPS. Offload rate: 5% of frames (0.5 frames/s).

    **Calculations:**
    - Hybrid accuracy benefit: 5% offloaded * 4.5% accuracy improvement = 0.225% overall gain.
    - Energy per on-device inference: 2W * 0.003s = 0.006J.
    - Energy per cloud offload: 3W * 0.5s = 1.5J (250x more than on-device).
    - Average power increase: 0.5 offloads/s * 1.5J = 0.75W.

    **Conclusion & Interpretation:**
    - **Result: 0.225% accuracy gain for 37% power increase (Power & Latency Bound)**. Real-time 4G cloud offloading provides marginal accuracy gains at a disproportionate latency and energy cost.
