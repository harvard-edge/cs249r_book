title: Qualcomm Cloud AI 100 Multi-Model Serving Architecture
scenario: 'You are deploying a video analytics pipeline to an on-premise server equipped with a single Qualcomm Cloud AI 100 accelerator. The pipeline requires running four independent ResNet-50 variants concurrently to process 16 independent 1080p camera streams at 30 FPS.'
question: 'How would you design model serving for four ResNet-50 variants and 16 camera streams on one Qualcomm Cloud AI 100 to maximize utilization?'
details:
  realistic_solution: 'Use a unified inference server to manage all four models within a single process. Models should be statically loaded into device memory. The server must use dynamic batching to group frames from the 16 streams, minimizing PCIe transfers, and leverage the accelerator''s spatial sharing to execute models concurrently.'
  common_mistake: |
    **The Pitfall:** Proposing a naive microservice architecture where each model has its own independent serving process communicating via HTTP/gRPC.
    **The Rationale:** Microservices are the standard paradigm for scalable cloud software, making it a natural default.
    **The Consequence:** Independent processes struggle to share device memory safely and incur massive PCIe transfer and serialization overheads, completely bottlenecking the chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 streams at 30 FPS.
    - ResNet-50 workload: ~8 GOPS per frame.
    - Hardware: 400 TOPS limit.

    **Calculations:**
    - Compute Demand: 16 * 30 = 480 frames/sec.
    - Total Workload: 480 frames/sec * 8 GOPS = 3840 GOPS = 3.84 TOPS.
    - Utilization: 3.84 TOPS / 400 TOPS = ~1%.

    **Conclusion & Interpretation:**
    - **Result: System uses only ~1% of compute (PCIe-Bandwidth-Bound)**. Architecture performance is entirely dominated by minimizing raw data movement.
