title: Multi-Model Serving Strategy on Hailo-8 Accelerator
scenario: You are designing a multi-model serving infrastructure on an edge gateway equipped with a single Hailo-8 accelerator (26 TOPS INT8, 2.5W). The pipeline must process a 30 FPS video stream, running a 15MB object detector followed by a 10MB feature extractor for up to 3 detected objects per frame. Since the Hailo-8 is a dataflow architecture with no local DRAM that streams weights and activations directly from host memory, you must evaluate how to schedule and serve these models.
question: Should the Hailo-8 detector and feature extractor be temporally multiplexed or co-compiled into one spatial context, and why?
details:
  realistic_solution: The preferred serving design is to co-compile the detector and feature extractor into one multi-network Hailo executable when the compiler can fit the combined dataflow resources. That spatial context avoids host-driven configuration churn between the detector and per-object extractor and lets intermediate tensors or compact feature handoffs stay in the accelerator pipeline. If the combined graph cannot fit, use temporal multiplexing with persistent compiled network groups and explicit time slices, not 30-frame micro-batches; keep queues small and bound latency to the 33.3 ms frame budget.
  common_mistake: |
    **The Pitfall:** Only calculating compute requirements against the 26 TOPS rating and assuming sequential execution is trivial.
    **The Rationale:** Candidates treat the Hailo-8 like a traditional GPU with local VRAM, ignoring that swapping dataflow configurations from host memory over PCIe is required.
    **The Consequence:** Swapping configurations for every single frame creates a massive I/O bottleneck that completely breaks real-time latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Detector (10 GOPS) + 3x Extractor (5 GOPS) = 25 GOPS/frame.
    - 30 FPS requires 0.75 TOPS (under 26 TOPS limit).
    - Spatial co-compilation avoids per-frame network reconfiguration.
    - Temporal multiplexing cost is scheduler/context overhead and extra host handoff latency, not reloading all weights every frame.
    - PCIe Gen3 x2 link: ~1.5 GB/s practical bandwidth.

    **Calculations:**
    - Frame budget at 30 FPS: 33.3ms.
    - Compute demand: 25 GOPS/frame * 30 FPS = 0.75 TOPS, so peak compute is not the limiter.
    - Independent scheduling requires detector output to return to the host and up to 3 extractor dispatches per frame.
    - Even a 1-2 ms dispatch/handoff cost per stage can consume 3-8 ms of the 33.3 ms budget before inference variability.
    - Spatial co-compilation reduces this to one scheduled pipeline pass per frame and avoids repeated host arbitration.

    **Conclusion & Interpretation:**
    - **Result: Spatial Co-Compilation Preferred**. The workload fits by compute, so the design choice is about avoiding context churn and host handoffs. Use one compiled spatial context when resources fit; otherwise temporal multiplex with persistent contexts and tight queues, not large frame batches.
