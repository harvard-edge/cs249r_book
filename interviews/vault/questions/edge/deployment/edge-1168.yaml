title: 'Edge TCO Optimization: Model Compression for Edge Cost Reduction'
scenario: A fleet of 200 Jetson Orin units (60W) currently runs ResNet-101. The team proposes investing $60K (2 months of engineering) to compress the model to MobileNetV3-Large with a 0.5% accuracy loss. This enables moving to a Hailo-8+Pi5 setup. Power costs $0.10/kWh.
question: What is the correct 5-year power cost for 200 Jetson Orin units at 60W and $0.10/kWh before compression?
details:
  realistic_solution: 'Power: 200 * 60W * 43,800hr * $0.10/1000 = $52,560.'
  common_mistake: |
    **The Pitfall:** Evaluating model compression purely on theoretical accuracy loss without quantifying long-term TCO.
    **The Rationale:** Candidates often focus strictly on model metrics rather than the systemic financial impact of hardware and power scaling over a 5-year period.
    **The Consequence:** Missing a massive ROI opportunity because they refuse to accept a negligible 0.5% accuracy drop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 200 devices.
    - Device power: 60W.
    - Operation duration: 5 years (24/7).
    - Power cost: $0.10 / kWh.

    **Calculations:**
    - Operating Hours (5 years): 24 hrs * 365 days * 5 years = 43,800 hours.
    - Total Energy (kWh): 200 devices * 60W * 43,800 hrs / 1000 W/kW = 525,600 kWh.
    - Fleet Power Cost: 525,600 kWh * $0.10/kWh = $52,560.

    **Conclusion & Interpretation:**
    - **Result: $52,560 power cost over 5 years (Power-Bound).** Compressing the model easily justifies the $60K engineering cost.
