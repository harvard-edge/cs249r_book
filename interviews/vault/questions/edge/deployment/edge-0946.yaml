title: Edge New 0007
scenario: A keyword spotting model (100K params) runs on a Cortex-M4. FP32 requires 400KB Flash, while INT8 requires 100KB. However, lacking native 8-bit dot product instructions, unpacking INT8 to INT32 adds 4 CPU cycles per weight.
question: Is INT8 still faster than FP32 on the Cortex-M4 despite 4 extra unpack cycles per weight?
details:
  realistic_solution: Yes, it is massively faster. On simple MCUs, Flash memory incurs profound wait-state latencies compared to single-cycle SRAM. The spatial compression of INT8 allows the entire model to migrate from slow Flash to fast SRAM. The latency eliminated by avoiding Flash reads profoundly offsets the arithmetic cost of the software unpacking loop.
  common_mistake: |
    **The Pitfall:** Refusing to quantize on simple MCUs because they lack specialized AI accelerators or SIMD.
    **The Rationale:** Engineers often focus solely on compute cycle counts and ignore the massive latency difference between memory tiers (Flash vs SRAM).
    **The Consequence:** Missing the opportunity to completely eliminate slow Flash reads, resulting in a much slower FP32 implementation.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model size: 100K parameters
       - FP32 Flash read: 10 cycles/byte
       - SRAM read: 1 cycle/byte
       - Unpack overhead: 4 CPU cycles per parameter
    **Calculations:**
       - FP32 Flash latency: 100K * 4 bytes * 10 cycles/byte = 4,000,000 cycles
       - INT8 memory footprint: 100 KB (fits in SRAM)
       - INT8 SRAM latency: 100K * 1 byte * 1 cycle/byte = 100,000 cycles
       - INT8 Unpack overhead: 100K * 4 cycles = 400,000 cycles
       - Total INT8 latency: 100,000 + 400,000 = 500,000 cycles
       - Speedup: 4,000,000 / 500,000 = 8x
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound I/O Win.** Despite unpacking overhead, migrating from Flash to SRAM yields an 8x speedup.
