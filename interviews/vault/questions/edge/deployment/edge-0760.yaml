title: 'Diagnosis: Unrecoverable Boot Loop from Coupled OTA Rollback'
scenario: |
  An OTA model update is pushed to 8,000 Jetson Orin NX devices. The update includes a new TensorRT 8.6 engine and an updated CUDA runtime. 2,000 devices report healthy, but 6,000 go silent — they are stuck in a boot loop. The rollback mechanism restores the previous model file, but the devices still won't boot.
question: What went wrong with your rollback strategy?
details:
  realistic_solution: The OTA updated both the model and the CUDA/TensorRT runtime. The new TensorRT 8.6 engine is incompatible with the old CUDA 11.4 runtime. Rolling back only the model restores an old engine that crashes against the new runtime. An effective rollback must restore both the model and runtime partitions simultaneously.
  common_mistake: |
    **The Pitfall:** Believing a model-only rollback is sufficient.
    **The Rationale:** Assuming the model is the only volatile piece of the application state.
    **The Consequence:** Restoring an old model onto a newly updated runtime guarantees a symbol mismatch, causing an unrecoverable boot loop and bricking the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Previous bootable set: old model engine + CUDA 11.4/TensorRT runtime.
    - OTA changes: new TensorRT 8.6 engine + updated CUDA/TensorRT runtime.
    - Rollback action performed: model file only.

    **Calculations:**
    - Healthy boot requires a compatible tuple: {model engine, TensorRT runtime, CUDA runtime, application loader}.
    - After model-only rollback, the device has {old engine, new runtime, new loader}.
    - Compatibility check fails because serialized TensorRT engines are not portable across incompatible runtime versions.

    **Conclusion & Interpretation:**
    - **Result: rollback unit mismatch (Architecture-Bound).** Rollback must be atomic across the model artifact and its runtime partition; otherwise the restored artifact can still crash during boot.
