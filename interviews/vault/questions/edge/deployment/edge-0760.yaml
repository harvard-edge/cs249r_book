title: 'The OTA Rollback That Bricked the Fleet'
scenario: |
  An OTA model update is pushed to 8,000 Jetson Orin NX devices. The update includes a new TensorRT 8.6 engine and an updated CUDA runtime. 2,000 devices report healthy, but 6,000 go silent — they are stuck in a boot loop. The rollback mechanism restores the previous model file, but the devices still won't boot.
question: 'What went wrong with your rollback strategy?'
details:
  realistic_solution: |
    The OTA updated both the model *and* the CUDA/TensorRT runtime as a coupled pair. The new TensorRT 8.6 engine is incompatible with the old CUDA 11.4 runtime, and vice versa. Rolling back only the model restores a TensorRT 8.5 engine that now tries to load against TensorRT 8.6 libraries — symbol mismatch, crash, reboot, repeat.
  common_mistake: |
    **The Pitfall:** Believing a model-only rollback is sufficient.
    **The Rationale:** Assuming the model is the only volatile piece of the application state.
    **The Consequence:** Restoring an old model onto a newly updated runtime (or vice versa) guarantees a symbol mismatch, causing an unrecoverable boot loop and bricking the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - OTA Payload: ~4 GB.
    - Download Bandwidth: 10 Mbps (1.25 MB/s).
    - eMMC Write Speed: 200 MB/s.
    - Rollback Budget: 60s (health timeout) + 15s (reboot) = 75 seconds.

    **Calculations:**
    - Download Time: 4 GB / 1.25 MB/s = ~53 minutes.
    - Write to eMMC: 16 GB / 200 MB/s = 80 seconds.
    - Business Impact: 6,000 bricked devices * $200 truck roll = $1.2M recovery cost.

    **Conclusion & Interpretation:**
    - **Result: $1.2M Recovery Cost (Storage-Bound).** Without proper A/B partitions, the unrecoverable boot loop requires expensive physical intervention.
