title: 'Diagnosis: Unrecoverable Boot Loop from Coupled OTA Rollback'
scenario: 'An OTA model update is pushed to 8,000 Jetson Orin NX devices. The update includes a new TensorRT
  8.6 engine and an updated CUDA runtime. 2,000 devices report healthy, but 6,000 go silent — they are
  stuck in a boot loop. The rollback mechanism restores the previous model file, but the devices still
  won''t boot.

  '
question: What went wrong with your rollback strategy?
details:
  realistic_solution: The OTA updated both the model and the CUDA/TensorRT runtime. The new TensorRT 8.6
    engine is incompatible with the old CUDA 11.4 runtime. Rolling back only the model restores an old
    engine that crashes against the new runtime. An effective rollback must restore both the model and
    runtime partitions simultaneously.
  common_mistake: '**The Pitfall:** Believing a model-only rollback is sufficient.

    **The Rationale:** Assuming the model is the only volatile piece of the application state.

    **The Consequence:** Restoring an old model onto a newly updated runtime guarantees a symbol mismatch,
    causing an unrecoverable boot loop and bricking the device.'
  napkin_math: '**Assumptions & Constraints:**

    - OTA Payload: 4 GB.

    - Download Bandwidth: 1.25 MB/s (10 Mbps).

    - eMMC Write Speed: 200 MB/s.

    - Rollback Budget: 75 seconds.


    **Calculations:**

    - Download Time: 4096 MB / 1.25 MB/s = 3276 seconds.

    - Write to eMMC: 4096 MB / 200 MB/s = 20 seconds.

    - Boot Loop Impact: 6,000 devices bricked at $200 per truck roll = $1.2M recovery cost.


    **Conclusion & Interpretation:**

    - **Result: $1.2M Recovery Cost (Architecture-Bound).** While the 20s write easily fits the rollback
    budget, the version mismatch inevitably bricks the devices.'
