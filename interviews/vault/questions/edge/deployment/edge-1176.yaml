title: 'Edge TCO Specification: Design $50K Budget Deployment for Smart Building'
scenario: |
  Design a complete edge AI deployment for a 10-floor office building with a $50K 3-year budget. Requirements: 30 FPS occupancy detection on 50 cameras, energy management integration, P99 < 100ms. Hardware options: Jetson Orin ($499), Hailo-8+Pi5 ($280), Coral+Pi4 ($60).
  Benchmarked per-node capacity for this occupancy model at low-latency batch=1 operation is Jetson Orin 400 FPS, Hailo-8+Pi5 200 FPS, and Coral+Pi4 30 FPS.
question: What complete edge AI deployment would meet 50 cameras at 30 FPS with P99 <100ms under the $50K 3-year budget?
details:
  realistic_solution: |
    Model needs: 30 FPS * 50 cameras = 1500 FPS. Based on the supplied per-node capacities, Jetson requires ceil(1500/400)=4 nodes, Hailo requires ceil(1500/200)=8 nodes, and Coral would require 50 nodes because one Coral+Pi4 is already saturated by one 30 FPS stream. Choose Hailo-8+Pi5 because it provides enough per-node headroom while keeping one node per floor/network closet feasible. Deploy 10 Hailo nodes, one per floor, and assign 5 cameras per node: 5 * 30 FPS = 150 FPS/node, or 75% of the 200 FPS budget. Latency budget: RTSP ingest/preprocess 15ms, Hailo inference P99 25ms, queueing under 75% load 10ms, tracking and REST/MQTT publish 20ms, for about 70ms P99 before network jitter, below the 100ms requirement. Architecture: cameras connect through per-floor PoE switches to local closets, each Pi5 handles RTSP ingest and preprocessing, Hailo-8 runs occupancy inference locally, and results publish to the energy-management system with health monitoring. Cost: 10 Hailo+Pi5 nodes at $280 = $2,800; 10-floor PoE switching at $350/floor = $3,500; software integration $15,000; installation labor 50 * $100 = $5,000; labeling/calibration $5,000; 3-year power at 10 * 7.5W * 26,280h * $0.10/kWh / 1000 = $197; maintenance $2,500. Total 3-year TCO is about $33,997, under the $50K budget.
  common_mistake: |
    **The Pitfall:** Specifying hardware only and ignoring integration and operational costs.
    **The Rationale:** Candidates often treat deployment as a purely hardware-purchasing exercise.
    **The Consequence:** They forget to budget for software integration ($10-20K), power, and physical installation labor ($50-200/camera), which often dominate the real-world TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 50 cameras * 30 FPS = 1500 FPS total.
    - Budget: $50,000 for 3 years.
    - Per-node capacities: Jetson 400 FPS, Hailo-8+Pi5 200 FPS, Coral+Pi4 30 FPS.

    **Calculations:**
    - Minimum nodes by throughput: Jetson ceil(1500/400)=4; Hailo ceil(1500/200)=8; Coral ceil(1500/30)=50.
    - Coral is rejected because each node runs at 100% load for one camera, leaving no P99 headroom.
    - Use 10 Hailo nodes, one per floor: 5 cameras/node * 30 FPS = 150 FPS/node, or 75% utilization.
    - Latency budget: ingest/preprocess 15ms + inference P99 25ms + queueing 10ms + tracking/EMS publish 20ms = 70ms P99.
    - Hardware Cost: 10 * $280 = $2,800.
    - Networking: 10 floors * $350 PoE switching/floor = $3,500.
    - Software & Labor: Integration ($15,000) + Installation (50 cameras * $100 = $5,000) + Labeling/calibration ($5,000) = $25,000.
    - Power (3 yrs): 10 * 7.5W * 26,280 hr * $0.10/kWh / 1000 = $197.
    - Maintenance (3 yrs): $2,500.
    - Total TCO: $2,800 + $3,500 + $25,000 + $197 + $2,500 = $33,997.

    **Conclusion & Interpretation:**
    - **Result: $33,997 TCO (Budget-Bound)**. A 10-node Hailo+Pi5 deployment keeps each node below its FPS budget, grounds networking/labor in the 10-floor and 50-camera scale, and leaves enough latency headroom for P99 <100ms.
