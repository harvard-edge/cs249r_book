title: 'Edge TCO Specification: Design $50K Budget Deployment for Smart Building'
scenario: |
  Design a complete edge AI deployment for a 10-floor office building with a $50K 3-year budget. Requirements: 30 FPS occupancy detection on 50 cameras, energy management integration, P99 < 100ms. Hardware options: Jetson Orin ($499), Hailo-8+Pi5 ($280), Coral+Pi4 ($60).
question: What complete edge AI deployment would meet 50 cameras at 30 FPS with P99 <100ms under the $50K 3-year budget?
details:
  realistic_solution: |
    Model needs: 30 FPS * 50 cameras = 1500 FPS. Use one coherent Hailo-8+Pi5 stack, assuming a lightweight occupancy model runs at about 200 FPS per Hailo node with batch=1 or small microbatches. Eight nodes would have enough aggregate throughput but can overload a 7-camera node, so deploy 9 nodes across floor/network closets and assign at most 6 cameras per node: 6 * 30 FPS = 180 FPS, leaving headroom for decode, tracking, and P99 <100ms. Architecture: cameras connect through PoE switches to local closets, each Pi5 handles RTSP ingest and preprocessing for its cameras, Hailo-8 runs occupancy inference locally, and results publish to the energy-management system through REST/MQTT with health monitoring. Cost: 9 Hailo+Pi5 nodes at $280 = $2,520; PoE switches $2,500; software integration $15,000; installation labor 50 * $100 = $5,000; labeling/calibration $5,000; 3-year power at 9 * 7.5W * 26,280h * $0.10/kWh / 1000 = $177; maintenance $2,000. Total 3-year TCO is about $32,197, under the $50K budget.
  common_mistake: |
    **The Pitfall:** Specifying hardware only and ignoring integration and operational costs.
    **The Rationale:** Candidates often treat deployment as a purely hardware-purchasing exercise.
    **The Consequence:** They forget to budget for software integration ($10-20K), power, and physical installation labor ($50-200/camera), which often dominate the real-world TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 50 cameras * 30 FPS = 1500 FPS total.
    - Budget: $50,000 for 3 years.

    **Calculations:**
    - Hailo Node Capacity: ~200 FPS per Hailo+Pi5 node for a lightweight occupancy model.
    - Aggregate sizing: ceil(1500 / 200) = 8 nodes minimum.
    - Camera placement sizing: 8 nodes would average 6.25 cameras/node; use 9 nodes so the max planned load is 6 cameras/node = 180 FPS/node.
    - Hardware Cost: 9 * $280 = $2,520.
    - Networking: PoE switches = $2,500.
    - Software & Labor: Integration ($15,000) + Installation ($5,000) + Labeling ($5,000) = $25,000.
    - Power (3 yrs): 9 * 7.5W * 26,280 hr * $0.10/kWh / 1000 = $177.
    - Maintenance (3 yrs): $2,000.
    - Total TCO: $2,520 + $2,500 + $25,000 + $177 + $2,000 = $32,197.

    **Conclusion & Interpretation:**
    - **Result: $32,197 TCO (Budget-Bound)**. A 9-node Hailo+Pi5 deployment keeps each node below its realistic FPS budget, leaves latency headroom for P99 <100ms, and still fits comfortably under the $50K 3-year budget.
