title: Jetson Orin Multi-Model TensorRT Deployment
scenario: You are tasked with deploying a complex vision pipeline consisting of a heavy object detector and a lightweight semantic segmentation model on an NVIDIA Jetson Orin. The device features an Ampere GPU and a DLA accelerator, and has a strict 60W TDP constraint.
question: How would you convert and delegate the detector and segmentation models on Jetson Orin to maximize INT8 performance under 60W?
details:
  realistic_solution: The optimal specification converts PyTorch models to ONNX, then compiles them into TensorRT engines. To maximize performance and stay under the 60W TDP, the heavy object detector is compiled for the Ampere GPU in INT8 precision, while the segmentation model is explicitly delegated to the DLA. Any operator gaps during ONNX export are resolved by writing custom TensorRT plugins or modifying the source model architecture to use supported operations rather than allowing CPU fallbacks.
  common_mistake: |
    **The Pitfall:** Running all models on the Ampere GPU.
    **The Rationale:** Candidates neglect the DLA accelerator assuming the GPU is powerful enough to handle everything.
    **The Consequence:** This leads to suboptimal power usage that quickly exceeds the 60W TDP when multiple models are running concurrently.
  napkin_math: |
    **Assumptions & Constraints:**
    - TDP Constraint: 60W.
    - Target FPS: 60 FPS.
    - Detector compute: 150 GOPS.
    - Segmentation compute: 50 GOPS.
    - Detector engine target: GPU INT8.
    - Segmentation engine target: DLA INT8.

    **Calculations:**
    - Detector demand: 150 GOP/frame * 60 FPS = 9,000 GOPS = 9 TOPS.
    - Segmentation demand: 50 GOP/frame * 60 FPS = 3,000 GOPS = 3 TOPS.
    - Combined demand if both run on GPU: 12 TOPS plus shared DRAM traffic and scheduling contention.
    - Delegating segmentation to DLA removes about 3 TOPS of GPU work and lets the GPU run the heavier detector engine independently.

    **Conclusion & Interpretation:**
    - **Result: Resource- and power-constrained deployment.** INT8 is the right engine format for TensorRT/DLA efficiency, but model size times FPS is not a valid bandwidth estimate. The defensible plan is GPU INT8 for the detector, DLA INT8 for segmentation, and profiling under the 60W mode to verify throughput and power.
