title: 'The Overnight OTA Update: OTA & Firmware Updates'
scenario: A critical perception model update needs to be pushed to an autonomous vehicle fleet overnight. The full container image for the update is 800 MB. The update occurs when the vehicle is parked with a stable cellular connection of at least 40 Mbps.
question: What is the minimum time to download an 800 MB container image over a 40 Mbps cellular connection?
details:
  realistic_solution: The correct approach requires standardizing the units. Since network bandwidth is in Megabits per second (Mbps), you must first convert the 800 MegaByte (MB) update size into Megabits (Mb). After that, it's a simple division to find the total time in seconds.
  common_mistake: |
    **The Pitfall:** Confusing Megabits (Mb) and MegaBytes (MB) and dividing directly.
    **The Rationale:** Engineers often forget the 8x conversion factor between file sizes and network speeds.
    **The Consequence:** Calculating a download time that is 8 times too fast, leading to missed maintenance windows.
  napkin_math: |
    **Assumptions & Constraints:**
       - Update size: 800 MegaBytes (MB).
       - Network speed: 40 Megabits per second (Mbps).
    **Calculations:**
       - Update size in Megabits: 800 MB * 8 bits/byte = 6400 Mb.
       - Download time: 6400 Mb / 40 Mbps = 160 seconds.
    **Conclusion & Interpretation:**
       - **Result: 160 Seconds**. The minimum theoretical download time is 160 seconds, which fits easily within an overnight maintenance window.
  options:
  - 20 seconds
  - 2.5 seconds
  - 160 seconds
  - 1280 seconds
  correct_index: 2
