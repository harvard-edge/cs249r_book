title: 'Edge Compute vs Thermal Throttling on Orin'
scenario: 'A team deploys an INT8 model requiring 550 GOPS per inference on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). They configure their serving infrastructure to handle concurrent requests targeting 400 FPS. They calculate that 400 FPS * 0.55 TOPS = 220 TOPS, which sits safely under the 275 TOPS theoretical limit. However, under this load, the system experiences severe thermal throttling and throughput drops significantly below the target.'
question: 'Why does the Jetson Orin throttle at 400 FPS even though 220 TOPS is below the advertised 275 TOPS INT8 peak?'
details:
  realistic_solution: 'The system throttles because the power required to sustain 220 TOPS on the GPU exceeds the available power budget once baseline system components (CPU, memory, peripherals) draw their required wattage. To stabilize the system, the team must lower the target throughput, quantize/prune the model further, or explicitly compile subgraphs to the DLA to distribute the thermal load and improve performance-per-watt.'
  common_mistake: |
    **The Pitfall:** Treating advertised compute limits as isolated software budgets.
    **The Rationale:** Candidates often assume theoretical maximum TOPS can be allocated indefinitely without considering whole-system physical constraints.
    **The Consequence:** They fail to account for the shared 60W TDP, ignoring that the CPU, DLA, and 32 GB LPDDR5 memory all consume power alongside the active GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Efficiency: 275 TOPS / 60W = ~4.58 TOPS/Watt.
    - System Overhead: 32 GB LPDDR5, CPU, and IO draw a conservative 20W.

    **Calculations:**
    - Compute Power Demand: 220 target TOPS / 4.58 TOPS/Watt = ~48W.
    - Total Power: 48W + 20W = 68W.

    **Conclusion & Interpretation:**
    - **Result: 68W (Power-Bound)**. 68W > 60W TDP limit, triggering throttling. Sustainable compute is roughly (60W - 20W) * 4.58 = ~183 TOPS (~333 FPS max).
