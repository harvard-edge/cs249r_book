title: RAG Concurrency and Power on Cloud AI 100
scenario: 'You are deploying a local RAG pipeline on an on-premise server powered by a single Qualcomm Cloud AI 100 accelerator. The compound system routes requests between a local embedding model that takes 2 GB of INT8 memory and a generative LLM that requires 14 GB of INT8 memory. Each active RAG session requires exactly 1.5 GB of KV cache and intermediate state.'
question: 'How many concurrent RAG sessions can the 32 GB Cloud AI 100 support, and what is the power budget per session at 75W?'
details:
  realistic_solution: 'Subtract the static memory footprint of all models in the multi-model pipeline from total device memory. Divide remaining memory by per-session dynamic memory (KV cache) and take the floor. Divide total TDP by maximum concurrent sessions for the power budget.'
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the static memory footprint of both models before calculating dynamic session capacity.
    **The Rationale:** Engineers focus heavily on the LLM and KV cache, overlooking the smaller embedding model in a multi-model pipeline.
    **The Consequence:** The system is overprovisioned for concurrent requests, resulting in catastrophic Out-of-Memory (OOM) crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device: 32 GB RAM, 75W TDP.
    - Static Models: 2 GB (Embedding) + 14 GB (LLM).
    - Session state: 1.5 GB KV cache.

    **Calculations:**
    - Total Static Memory: 2 GB + 14 GB = 16 GB.
    - Available Dynamic Memory: 32 GB - 16 GB = 16 GB.
    - Max Concurrency: floor(16 GB / 1.5 GB) = 10 sessions.
    - Power Budget: 75W / 10 = 7.5W per session.

    **Conclusion & Interpretation:**
    - **Result: Exactly 10 concurrent sessions at 7.5W each (Memory-Capacity-Bound)**. The hardware capacity is fundamentally limited by dynamic KV cache memory.
