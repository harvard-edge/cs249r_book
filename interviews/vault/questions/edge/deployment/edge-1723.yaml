title: Edge TPU Multi-Model Cache Thrashing
scenario: You are deploying a cascaded vision pipeline (Object Detection followed by Image Classification) on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, USB 3.0 interface). The inference server loads Model A (Detection, 5.5MB INT8) and Model B (Classification, 4.5MB INT8), executing them sequentially for each incoming video frame. Despite the 4 TOPS capability, the system is suffering from severe latency bottlenecks, and profiling reveals the TPU is idle for over 80% of the inference cycle.
question: How would you diagnose the Coral cascade's 80% idle time and fix SRAM weight thrashing between the 5.5MB and 4.5MB models?
details:
  realistic_solution: Diagnose the 80% idle time by separating TPU compute from model invocation and host-to-device transfer time in the profiler, then check whether switching between the two compiled models is causing repeated model-load or cache pressure. The bottleneck should be described as model-resident memory/cache pressure or repeated host-to-device transfers, not a guaranteed fixed SRAM limit. Keep the cascade semantics intact by reducing one or both model footprints, merging compatible stages into one compiled graph where possible, reordering to avoid unnecessary second-stage runs, or using serving support that keeps both models resident if the runtime and hardware allow it.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is CPU pre-processing, image transfer latency over USB, or unsupported operators falling back to the CPU.
    **The Rationale:** Engineers often suggest multithreading the CPU or resizing inputs without analyzing the physical memory constraints and model loading behavior of the specific accelerator.
    **The Consequence:** Wasting time optimizing host code while the hardware accelerator remains severely starved for weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - Combined Models: 5.5MB + 4.5MB = 10MB.
    - USB 3.0 bandwidth: ~400 MB/s.
    - Profiling reports TPU idle for over 80% of the inference cycle.

    **Calculations:**
    - If profiler traces show 10MB of model data moved across USB per frame, transfer time alone is 10MB / 400 MB/s = 25 ms.
    - 80% idle means only 20% of each inference cycle is useful TPU execution; for a 25 ms transfer-dominated wait, compute is a minority of total latency.
    - Shrinking or combining the models helps only if it removes the measured reload/cache-pressure transfer path while preserving the per-frame A-then-B cascade.

    **Conclusion & Interpretation:**
    - **Result: repeated model-transfer/cache pressure to verify (Memory/Serving Bound)**. The defensible fix is to prove the reloads in profiling, then reduce or co-reside the cascade models; the exact optimized latency must come from the post-change profile rather than a hardcoded SRAM assumption.
