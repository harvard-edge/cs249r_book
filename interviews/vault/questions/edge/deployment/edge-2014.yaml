title: Optimizing ONNX Model Deployment on Qualcomm Cloud AI 100 with Operator Coverage Gaps
scenario: You are deploying a new computer vision model, trained in PyTorch, to a Qualcomm Cloud AI 100 accelerator. During the ONNX conversion and subsequent attempt to run it with a vendor-provided runtime, you encounter issues related to unsupported operators, leading to performance degradation and fallback to the host CPU.
question: How would you identify, diagnose, and resolve ONNX operator gaps and delegate work to maximize throughput on the Qualcomm Cloud AI 100?
details:
  realistic_solution: 1. **Pre-conversion Analysis:** Compare the PyTorch graph and exported ONNX ops against the Qualcomm Cloud AI 100 compiler/runtime support matrix. 2. **ONNX Conversion:** Rewrite unsupported operations into supported ONNX equivalents, fold constants, and simplify dynamic shapes before compile. 3. **Compiler and Runtime Profiling:** Inspect compile reports and runtime traces to find unsupported ops, CPU fallbacks, layout conversions, and graph partitions. 4. **Subgraph Partitioning:** Keep large contiguous supported subgraphs on Cloud AI 100 and allow host execution only when transfer overhead is below the latency budget. 5. **Vendor Extension:** If rewriting is not viable, use the Cloud AI 100 SDK/runtime extension or vendor plugin path for the compiled target rather than a mobile DSP kernel path. 6. **Quantization Review:** Verify INT8 calibration and per-op precision support on the compiled target.
  common_mistake: |
    **The Pitfall:** Blindly delegating unsupported subgraphs to the host CPU.
    **The Rationale:** Candidates rely on automatic framework fallbacks without considering memory bus physics.
    **The Consequence:** The massive data transfer overhead back and forth to the CPU completely negates the AI 100's 400 TOPS performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target is 125 FPS (8ms).
    - CPU fallback latency per unsupported op is 4ms.

    **Calculations:**
    - Current total latency = accelerator path 8ms + CPU fallback 4ms = 12ms/frame.
    - Current throughput = 1000ms / 12ms = 83.3 FPS, below the 125 FPS target.
    - Custom plugin reduces only the fallback portion by 75%: 4ms * 0.25 = 1ms.
    - Optimized total latency = 8ms + 1ms = 9ms/frame, or about 111 FPS.

    **Conclusion & Interpretation:**
    - **Result: fallback latency drops to 1ms, but end-to-end latency is still 9ms.** A plugin narrows the gap, but hitting 125 FPS also requires reducing the accelerator path or other pipeline overhead below the remaining 1ms.
