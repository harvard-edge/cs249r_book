title: The Zero-Touch Provisioning Pipeline
scenario: 'You''re deploying 1,000 Coral Dev Board Mini devices for a retail shelf-monitoring pilot. Your ops team says they will flash a generic firmware image to all devices at the factory, and the devices will download their ML models on first boot.'
question: 'Why is generic provisioning insufficient for 1,000 Coral devices, and what hardware-specific model compilation and calibration must it include?'
details:
  realistic_solution: 'Generic provisioning works for standard software, but ML models on edge accelerators are tightly coupled to the specific silicon. A generic model file cannot run efficiently on a Coral Edge TPU; the model must be compiled specifically for the Edge TPU architecture using the Edge TPU Compiler. The provisioning server must identify the exact hardware SKU and deliver the correctly compiled binary (e.g., `edgetpu.tflite`).'
  common_mistake: |
    **The Pitfall:** Assuming standard `.tflite` files are universally hardware-accelerated.
    **The Rationale:** Engineers treat edge models like standard cloud containers that just run everywhere.
    **The Consequence:** The models execute completely on the host CPU, causing severe throttling and losing >90% of expected performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Generic FP32 model runs on host CPU.
    - Compiled INT8 model runs on Edge TPU.

    **Calculations:**
    - CPU Inference = 2 FPS.
    - TPU Inference = 60 FPS.
    - Performance loss ratio = 60 / 2 = 30x.

    **Conclusion & Interpretation:**
    - **Result: 30x performance loss (Compilation-Bound)**. Failing to provide hardware-specific compiled binaries results in a 30x performance loss.
