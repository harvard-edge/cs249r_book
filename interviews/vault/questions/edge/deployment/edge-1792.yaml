title: Qualcomm Cloud AI 100 Toolchain and Specs Recall
scenario: Your team is evaluating the Qualcomm Cloud AI 100 for on-premise inference to replace an aging GPU cluster.
question: What is the name of the primary software SDK and compiler toolchain provided by Qualcomm used to convert and optimize standard ONNX models for this specific hardware?
details:
  realistic_solution: The correct answer is Qualcomm QNN / AI Engine Direct, used with the Qualcomm Cloud AI 100 software stack to compile and optimize ONNX models for the accelerator. The candidate should recall that AI 100 deployment requires Qualcomm's compiler/runtime path to map standard operators onto the underlying tensor processors.
  common_mistake: |
    **The Pitfall:** Naming generic conversion tools like TensorRT or OpenVINO.
    **The Rationale:** Candidates guess based on familiar NVIDIA/Intel stacks or confuse it with the mobile Snapdragon Neural Processing Engine (SNPE).
    **The Consequence:** The model cannot be compiled or optimized for the Hexagon DSP architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - AI 100 provides up to 400 TOPS INT8 at 75W.
    - A model with 1 tera-operation of INT8 work is used only as a throughput example.

    **Calculations:**
    - Compute efficiency = 400 TOPS / 75W = 5.33 TOPS/W.
    - Ideal latency for 1 TOP of work = 1 TOP / 400 TOPS = 0.0025 s = 2.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.5 ms ideal compute time for 1 TOP of INT8 work**. The SDK/toolchain answer matters because the model must compile onto AI 100 before that theoretical capacity is usable.
