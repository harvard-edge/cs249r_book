title: The Low-Rank Decomposition Latency Paradox
scenario: You decompose a $4096 \times 4096$ weight matrix in an edge-deployed transformer into two low-rank
  matrices of dimensions $4096 \times 256$ and $256 \times 4096$ (rank 256). This reduces parameters from
  16.8M to 2.1M — an 8x reduction. However, inference latency on a Jetson Orin (with Tensor Cores) only
  drops by 15%, not the expected 8x.
question: Why does the 8x low-rank FLOP reduction for the 4096x4096 matrix yield only a 15% latency drop
  on the Jetson Orin?
details:
  realistic_solution: Three factors explain the gap. First, the FLOP reduction is 8x (33.6 MFLOPs vs 4.2
    MFLOPs). Second, the lower arithmetic intensity of tall-skinny matrices reduces Tensor Core utilization
    from ~40% to ~10%, dropping effective throughput from ~110 TOPS to ~27.5 TOPS. This limits the theoretical
    8x compute speedup to only 2x (a 50% latency drop). Third, splitting the operation introduces a second
    kernel launch. The additional memory synchronization and kernel overhead consume the remaining gains,
    yielding the final net 15% latency drop.
  common_mistake: '**The Pitfall:** Equating parameter reduction with proportional speedup.

    **The Rationale:** Candidates assume that having 8x fewer parameters automatically yields an ~8x speedup,
    confusing model size with compute time and ignoring hardware execution realities.

    **The Consequence:** This leads to drastically incorrect performance estimates and missed latency
    targets.'
  napkin_math: '**Assumptions & Constraints:**

    - Original matmul: 4096x4096.

    - Decomposed matmuls: 4096x256 + 256x4096.

    - Jetson Orin: 275 TOPS INT8.


    **Calculations:**

    - Original FLOPs = 33.6M FLOPs.

    - Decomposed FLOPs = 4.2M FLOPs (8x reduction).

    - Skinny matmuls drop utilization from ~40% to ~10%.

    - Compute speedup = 8 * (27.5/110) = 2x (50% latency drop).

    - Kernel launch overhead accounts for the remaining 35% difference.


    **Conclusion & Interpretation:**

    - **Result: 15% net latency drop (Compute/Overhead-Bound)**. Poor Tensor Core utilization reduces
    the 8x FLOP advantage to 2x, and kernel launch overhead further diminishes the gain, leaving only
    a 15% net latency drop.'
  options:
  - Three factors explain the gap. First, while the parameter reduction is 8× (16.8M → 2.1M), the FLOP
    reduction is also 8× for matrix-vector products. The original matrix-vector multiply costs 2 \times
    4096^2 = 33.6 MFLOPs.
  - Graph-level optimizations are always superior to kernel-level optimizations because they capture global
    data flow patterns.
  - Equating parameter reduction with proportional speedup. 'We have 8x fewer parameters, so we should
    see ~8x speedup.' This confuses model size with compute time and ignores hardware execution realities.
  - The latency is dominated by data preprocessing on the CPU; moving to GPU-accelerated preprocessing
    will resolve the bottleneck.
  correct_index: 0
