title: Optimizing a Multi-Modal RAG Pipeline for Edge Deployment on Hailo-8
scenario: You are tasked with deploying a real-time multi-modal RAG system on an edge device for an industrial inspection application. The target hardware is a Hailo-8 AI processor. The multi-model pipeline involves a lightweight CNN, a transformer, an ASR model, a vector database, and a small decoder-only LLM. Your primary challenges are end-to-end latency (target < 200ms), managing memory, and staying within the 2.5W power budget.
question: How would you design and deploy the Hailo-8 multimodal RAG pipeline to meet <200 ms latency, memory, routing, and 2.5W power constraints?
details:
  realistic_solution: Aggressively quantize all components to INT8 to leverage Hailo-8 dataflow MACs. To meet the 2.5W constraint, continuous parallel model execution is impossible; employ an orchestrator (state-machine) on the host CPU to dynamically route data. For instance, gate the ASR and LLM components until the CNN detects an anomaly. Asynchronously batch shared memory buffers between the CPU and NPU to eliminate PCIe bottlenecking, ensuring the sequential critical path remains under the 200ms threshold.
  common_mistake: |
    **The Pitfall:** Treating each model independently without considering cumulative latency and pipeline resource contention.
    **The Rationale:** Candidates focus on optimizing individual models but ignore the data transfer and context switching overheads between them.
    **The Consequence:** Failing to optimize data transfer between pipeline stages or across the host CPU leads to significant performance bottlenecks, missing the 200ms target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: <200 ms.
    - Power limit: 2.5W.
    - Models: CNN, Transformer, ASR, LLM.

    **Calculations:**
    - Sequential critical path (estimated): Object detection (10 ms) + Anomaly (15 ms) + RAG encoding (5 ms) + LLM generation (50 ms) = 80 ms.
    - Compute Efficiency: 26 TOPS / 2.5W ≈ 10.4 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: 80 ms latency (Power Limit Bound)**. Continuous execution of all models would breach the 2.5W thermal limit, requiring dynamic routing to power gate inactive pipeline stages.
