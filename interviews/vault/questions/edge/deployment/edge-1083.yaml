title: 'Model Format Conversion: Specify ONNX Conversion Pipeline with Validation for Edge'
scenario: Specify a production-grade ONNX conversion pipeline for deploying PyTorch models to edge accelerators. The pipeline must validate numerical equivalence (< 0.1% MAE), handle unsupported ops, report conversion failures with actionable messages, and run in CI/CD in under 10 minutes.
question: What CI/CD stages and pass/fail criteria would you specify for this PyTorch-to-ONNX conversion pipeline?
details:
  realistic_solution: 'Stage 1 (2min): export with torch.onnx.export, opset 17, declared static deployment shapes, and onnx.checker.check_model. Stage 2 (1min): run compiler/operator coverage checks; fail with operator name, node path, and suggested replacement when unsupported ops, dynamic reshape, or shape-inference errors appear. Stage 3 (2min): run PyTorch and ONNX Runtime on 100 validation inputs; compute relative MAE = mean(abs(onnx - pytorch)) / mean(abs(pytorch)) and fail if >0.001 (0.1%). Stage 4 (3min): compile/calibrate INT8 with 50 representative images; fail on calibration, shape, or unsupported-op errors. Stage 5 (2min): run accelerator simulator on 50 inputs, compare against ONNX outputs, and fail if task metric drops >1 percentage point or output relative MAE exceeds the deployment threshold. Total budget: 10 minutes.'
  common_mistake: |
    **The Pitfall:** Validating numerical equivalence using only a single static input shape.
    **The Rationale:** Engineers verify a successful forward pass on a "dummy" tensor but skip rigorous validation against dynamic shapes or edge-case stride patterns.
    **The Consequence:** The model passes CI/CD but fails randomly in production when presented with diverse, real-world inputs that trigger unsupported op fallbacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 validation inputs, about 15 GFLOPs per input.
    - Accelerated CI runner: 10 TFLOPS ideal throughput.
    - Numerical equivalence threshold: relative MAE <= 0.001.
    - CI/CD wall-clock deadline: 10 minutes.

    **Calculations:**
    - Validation compute lower bound: 100 * 15 GFLOPs / 10 TFLOPS = 0.15 s before framework, I/O, and comparison overhead.
    - Accelerator simulation lower bound: 50 inputs / 10 FPS = 5 s before setup and report generation.
    - These lower bounds show the validation workload is small enough for a 10-minute CI job; export, compiler checks, calibration, simulator startup, artifact upload, and failure reporting consume most of the wall-clock budget.
    - Pass/fail checks: onnx.checker succeeds, no unsupported deployment ops remain, relative MAE <= 0.001 on validation inputs, INT8 calibration/compile succeeds, and simulator output stays within the deployment error threshold or task metric drops by no more than 1 percentage point.

    **Conclusion & Interpretation:**
    - **Result: feasible under a 10-minute CI deadline if conversion and compiler stages complete normally.** The numeric checks are validation lower bounds, while the remaining time is workflow allocation for tooling overhead and actionable failure reports.
