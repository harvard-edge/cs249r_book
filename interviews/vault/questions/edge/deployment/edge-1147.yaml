title: 'Edge TCO Analyze: Hailo-8 vs Jetson Orin Cost Per Inference Lifecycle'
scenario: You are analyzing the cost-per-inference over a 3-year deployment for a $200 dataflow accelerator (paired with an $80 host CPU) versus a $499 edge SoC running a factory quality inspection model at 50 inferences/second, 24/7.
question: Which platform provides a cheaper per-inference cost when including hardware amortization and power consumption over 3 years?
details:
  realistic_solution: 'Dataflow system (+ host): total HW=$280. Power: (2.5+5W)=7.5W. Inferences: 50/s * 3yr * 8760*3600 = 50 * 94,608,000 = 4.73B inferences. Hardware cost/inf: $280/4.73B = $0.0000000592. Power cost: 7.5W * 8760hr * 3 * $0.10 = $19.71. Power/inf: $19.71/4.73B = $0.0000000042/inf. Total/inf: $0.0000000634 (63.4 nano-$/inf). Edge SoC: HW=$499. Power: 60W * 8760*3 = $157.68. Total: $657. Inferences: 4.73B. Cost/inf: $657/4.73B = $138.9 nano-$/inf. The Dataflow system is 2.19x cheaper per inference.'
  common_mistake: |
    **The Pitfall:** Comparing only raw hardware unit costs.
    **The Rationale:** Candidates forget to include power consumption over a continuous 24/7, 3-year lifecycle, and often forget that PCIe accelerators require a host CPU.
    **The Consequence:** Significantly miscalculating total cost of ownership (TCO) at scale, leading to sub-optimal hardware procurement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 50 inf/sec, 3 years. Energy = $0.10/kWh.
       * Dataflow system = $280 hardware, 7.5W total power.
       * SoC system = $499 hardware, 60W total power.
    2. **Calculations:**
       * Total inferences = 50 * 8760 * 3600 * 3 = 4.73B.
       * Dataflow TCO = $280 + (7.5W * 26280h * $0.10 / 1000) = $280 + $19.71 = $299.71.
       * SoC TCO = $499 + (60W * 26280h * $0.10 / 1000) = $499 + $157.68 = $656.68.
       * Dataflow TCO/inf = $299.71 / 4.73e9 = 63.4 nano-dollars.
       * SoC TCO/inf = $656.68 / 4.73e9 = 138.8 nano-dollars.
    3. **Conclusion & Interpretation:**
       * **The Dataflow edge node is 2.19x cheaper per inference when factoring in long-term power draw. Result: TCO-Bound.**
