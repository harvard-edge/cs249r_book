title: Dataflow Accelerator vs Edge SoC Cost Per Inference
scenario: You are analyzing the cost-per-inference over a 3-year deployment for a $200 dataflow accelerator (paired with an $80 host CPU) versus a $499 edge SoC running a factory quality inspection model at 50 inferences/second, 24/7.
question: Which platform provides a cheaper per-inference cost when including hardware amortization and power consumption over 3 years?
details:
  realistic_solution: 'Dataflow system (+ host): total HW=$280. Power is 2.5W accelerator + 5W host CPU = 7.5W. Runtime is 3 * 8,760 = 26,280 hours, or 94,608,000 seconds. Inferences: 50/s * 94,608,000s = 4.73B inferences. Dataflow power cost: 7.5W / 1000 * 26,280h * $0.10/kWh = $19.71, so total TCO is $299.71 and cost/inf is $299.71 / 4.73B = 63.4 nano-$/inf. Edge SoC power cost: 60W / 1000 * 26,280h * $0.10/kWh = $157.68, so total TCO is $656.68 and cost/inf is $656.68 / 4.73B = 138.8 nano-$/inf. The Dataflow system is 2.19x cheaper per inference.'
  common_mistake: |
    **The Pitfall:** Comparing only raw hardware unit costs.
    **The Rationale:** Candidates forget to include power consumption over a continuous 24/7, 3-year lifecycle, and often forget that PCIe accelerators require a host CPU.
    **The Consequence:** Significantly miscalculating total cost of ownership (TCO) at scale, leading to sub-optimal hardware procurement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 50 inf/sec, 3 years. One year = 8,760 hours; total runtime = 26,280 hours.
       * Energy = $0.10/kWh.
       * Dataflow system = $200 accelerator + $80 host CPU = $280 hardware, with 2.5W accelerator + 5W host = 7.5W total power.
       * SoC system = $499 hardware, 60W total power.
    2. **Calculations:**
       * Total seconds = 26,280h * 3,600s/h = 94,608,000s.
       * Total inferences = 50 inf/s * 94,608,000s = 4,730,400,000.
       * Dataflow power = 7.5W / 1000 * 26,280h * $0.10/kWh = $19.71.
       * Dataflow TCO = $280 + $19.71 = $299.71.
       * SoC power = 60W / 1000 * 26,280h * $0.10/kWh = $157.68.
       * SoC TCO = $499 + $157.68 = $656.68.
       * Dataflow TCO/inf = $299.71 / 4.7304e9 = 63.4 nano-dollars.
       * SoC TCO/inf = $656.68 / 4.7304e9 = 138.8 nano-dollars.
    3. **Conclusion & Interpretation:**
       * **The Dataflow edge node is 2.19x cheaper per inference when factoring in long-term power draw. Result: TCO-Bound.**
