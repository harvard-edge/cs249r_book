title: OTA Update Time for Edge Fleet
scenario: 'You manage a fleet of 500 edge AI cameras deployed across a city. Each device has a 4G LTE connection averaging 5 Mbps download and 32 GB eMMC storage with A/B partitioning. You need to push a model update consisting of a new TensorRT engine file (45 MB) plus a firmware delta update (12 MB).'
question: 'What is the total fleet update time for the 57 MB update across 500 LTE cameras, and what is the bottleneck?'
details:
  realistic_solution: 'The bottleneck is not the download or flash — it''s the staged rollout monitoring windows. Per-device execution is ~115s. But fleet rollout uses staged waves: canary (25 devices, 2 min) + 1h monitoring + wave 2 (125 devices, 2 min) + 2h monitoring + wave 3 (350 devices, 2 min) = 3h 6min total. The actual data transfer is trivial.'
  common_mistake: |
    **The Pitfall:** Assuming network download speed across the fleet in parallel dictates the total update time.
    **The Rationale:** Developers accustomed to fast cloud networks simply calculate Total File Size / Bandwidth.
    **The Consequence:** Planners wildly underestimate fleet maintenance windows, ignoring the mandatory staging and observation periods required to ensure a bad update doesn't brick the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - 57 MB update at 5 Mbps.
    - Flash, verify, reboot takes ~24s.
    - Staged waves: Canary + 1h obs + Wave 2 + 2h obs + Wave 3.

    **Calculations:**
    - Per-Device Transfer: 57 MB * 8 Mbps/MB / 5 Mbps = 91.2s.
    - Total Per-Device: 91.2s + 24s = ~115s.
    - Fleet Staged Time: 2m (canary) + 60m + 2m (wave 2) + 120m + 2m (wave 3) = 186 minutes.

    **Conclusion & Interpretation:**
    - **Result: 3 hours and 6 minutes total update time (Process-Bound)**. Mandatory observation windows heavily dominate the rollout schedule.
