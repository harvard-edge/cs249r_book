title: Real-Time Kernel Scheduling Isolation for ML Throughput
scenario: You compile a custom Linux kernel with the PREEMPT_RT patch to guarantee hard real-time latency for your edge robot's motor controller. You configure the kernel timer tick frequency (HZ) to 1000 Hz for maximum responsiveness. The motor controller works perfectly. However, the background ML perception model (which ran fine at 30 FPS on standard Linux) now struggles to hit 15 FPS.
question: Why did the real-time kernel configuration cut ML throughput, and how do you preserve motor-control latency without starving perception?
details:
  realistic_solution: 'The problem is not that PREEMPT_RT inherently destroys throughput; it is that the real-time controller, IRQs, and ML workload are sharing scheduling resources without partitioning. PREEMPT_RT and a 1000 Hz tick can add overhead, but the primary fix is to reserve dedicated CPU time for the motor controller and keep perception off that path: pin the RT thread to isolated core(s), move unrelated IRQs away with IRQ affinity, place ML workers in a separate cpuset/cgroup on the remaining cores, and keep the ML process under normal or carefully bounded real-time priority. Reducing HZ may help as a secondary tuning step, but it is not the main remedy.'
  common_mistake: |
    **The Pitfall:** Treating the kernel tick rate as the whole explanation.
    **The Rationale:** Candidates see HZ=1000 and PREEMPT_RT and focus on timer overhead while ignoring CPU affinity, IRQ placement, and scheduler priority inversion between control and perception.
    **The Consequence:** They change a global kernel knob but still let the RT controller, interrupts, and ML threads interfere with one another, so either motor latency or ML throughput remains unstable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Timer tick frequency (HZ) = 1000 Hz.
    - Context save/scheduler/restore overhead per interrupt = 20 microseconds.

    **Calculations:**
    - 1,000 interrupts/sec * 20 us/interrupt = 20,000 microseconds/sec.
    - 20,000 us = 20 ms per second.
    - 20 ms / 1000 ms = 2%.
    - A 2% tick cost alone cannot explain a 30 FPS to 15 FPS drop; contention, IRQ placement, and scheduling priority are the larger suspects.

    **Conclusion & Interpretation:**
    - **Result: Scheduling-Isolation Problem**. The tick overhead is real but too small by itself to halve throughput. Partition RT control and ML perception with CPU isolation, IRQ affinity, and cpusets, then tune HZ only if measurements show it matters.
