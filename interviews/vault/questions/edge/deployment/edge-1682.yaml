title: Dual-Bank OTA Architecture for Coral Edge TPU Ensembles
scenario: You are designing an OTA update system for a smart city traffic monitoring fleet of 5,000 devices. Each device uses a Google Coral Edge TPU attached to a host SoC with 1GB RAM and 4GB eMMC storage. The system runs an ensemble of three INT8-quantized models.
question: How would you design a zero-downtime A/B OTA scheme for 5,000 Coral devices that atomically updates the app and all three models?
details:
  realistic_solution: Implement an atomic, dual-bank A/B partition scheme where the host OS, inference application, and fully compiled Edge TPU model binaries are bundled into a single immutable compressed root filesystem (e.g., squashfs). To fit within the 4GB eMMC constraint, the partitions must be carefully sized. The update agent writes the entire payload to the inactive partition, updates the bootloader flag, and reboots. A strict hardware watchdog paired with an inference health check (verifying non-zero outputs from all three models) must successfully execute within a designated time window, otherwise the bootloader automatically falls back to the known-good partition.
  common_mistake: |
    **The Pitfall:** Treating the host OS and the Edge TPU ML models as separate, asynchronous update streams.
    **The Rationale:** Candidates rely on standard cloud microservice patterns (pulling model weights dynamically at runtime) without recognizing the tight coupling between edge inference code and compiled TPU binaries.
    **The Consequence:** A version mismatch between the host preprocessing code and the Edge TPU model binary causes catastrophic system panics with no atomic rollback path, bricking remote devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total eMMC storage: 4GB (4000MB).
    - Required Partitions: Boot, Data (logs), Rootfs A, Rootfs B.
    - Models: Object Detection (~5MB), LPR (~3MB), Anomaly (~10MB) = 18MB total INT8.

    **Calculations:**
    - Allocate static partitions: Boot/Recovery (100MB) + Data/Configs (500MB) = 600MB.
    - Remaining space for A/B rootfs: 4000MB - 600MB = 3400MB.
    - Maximum partition size per bank (A/B): 3400MB / 2 = 1700MB.
    - Estimated compressed OS + App + Models payload: ~300MB + 18MB = ~318MB.

    **Conclusion & Interpretation:**
    - **Result: 318MB Payload (Storage-Bound)**. The payload comfortably fits the 1700MB partition limit, mandating compressed read-only filesystems to enable atomic A/B updates.
