title: 'Edge TCO Optimization: Optimize Connectivity Costs Dominating TCO'
scenario: An edge fleet of 1000 AI nodes has connectivity costs dominating TCO at $15/unit/month (4G with full camera stream). Inference cost is only $3/unit/month.
question: How would you cut the 1000-unit fleet's 4G connectivity cost by at least 90%, and what are the 5-year savings and payback?
details:
  realistic_solution: 'Execute inference directly on the edge hardware and transmit solely lightweight telemetry (e.g., JSON bounding boxes or low-res alert thumbnails). This slashes daily cellular payloads from 500MB to ~10KB, reducing connectivity TCO from $15 to $0.50 per unit. Over a 5-year timeline across 1000 nodes, this yields $870K in gross savings. Factoring a $100K software development cost, the net savings hit $770K with an aggressive 6.9-month payback.'
  common_mistake: |
    **The Pitfall:** Proposing data reduction without accounting for the development cost of shifting logic to the edge.
    **The Rationale:** Candidates ignore the engineering capital required to redesign the embedded application.
    **The Consequence:** ROI estimates are overly optimistic, leading to budget overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 1000 units.
    - Current TCO: $18/unit/month ($15 connectivity + $3 compute).
    - Optimized connectivity: $0.50/unit/month.
    - Development cost: $100K.

    **Calculations:**
    - Current 5-year TCO = 1000 * $18 * 60 = $1.08M.
    - Optimized 5-year TCO = 1000 * $3.50 * 60 = $210K.
    - Gross savings = $1.08M - $210K = $870K.
    - Net savings = $870K - $100K = $770K.
    - Payback period = $100K / ($870K / 60 months) = 6.9 months.

    **Conclusion & Interpretation:**
    - **Result: $770K Net Savings and 6.9 month payback (Cost-Bound)**. Shifting workloads to edge compute drastically slashes recurring connectivity TCO.
