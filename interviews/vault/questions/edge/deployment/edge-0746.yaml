title: The Edge Container Overhead
scenario: Your team wants to deploy a 1.5 GB YOLOv8 model and a 1 GB camera ISP pipeline on a Jetson Orin NX (8 GB unified memory) using Docker containers. The DevOps engineer says 'containers are lightweight — the memory overhead is negligible.' Your embedded systems colleague says 'Docker on an 8 GB device running ML is insane.'
question: How does Docker's memory overhead reduce the unified memory available for ML model weights and activations on Jetson, and what does the actual memory budget look like?
details:
  realistic_solution: 'On a Jetson, the CPU and GPU share the same physical LPDDR5 RAM; there is no separate GPU VRAM pool for Docker to steal from. Container runtime processes, page cache, cgroup metadata, and overlay filesystem activity consume ordinary system RAM, which reduces the shared memory left for CUDA allocations, TensorRT workspaces, model weights, and activations. In this budget the bare-metal workload is already at the edge: OS 1.5 GB + ISP 1.0 GB + weights 1.5 GB + peak activations/workspace 3.95 GB = 7.95 GB, leaving only about 50 MB. A roughly 90 MB container/runtime overhead is enough to push the unified-memory peak over 8 GB, but the key diagnosis is that the workload has almost no memory margin; Docker is the final pressure, not a direct GPU-VRAM reservation.'
  common_mistake: |
    **The Pitfall:** Assuming Containers have zero overhead because they share the host kernel.
    **The Rationale:** Candidates extrapolate cloud server principles without understanding the userspace memory footprint of the container runtime.
    **The Consequence:** On edge unified memory architectures, ignoring this small but fixed overhead consumes the tiny remaining memory margin, guaranteeing an OOM kill under load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM: 8.0 GB.
    - OS: 1.5 GB. Camera ISP: 1.0 GB.
    - YOLOv8 Weights: 1.5 GB. YOLOv8 Activations: ~3.95 GB.
    - Approximate container/runtime overhead: daemon and shim RSS, cgroup metadata, overlay/page-cache pressure, and networking state totaling ~90 MB under this workload.

    **Calculations:**
    - Bare-metal unified-memory peak = 1.5 + 1.0 + 1.5 + 3.95 = 7.95 GB used.
    - Bare-metal free margin = 8.0 - 7.95 = 0.05 GB (~50 MB).
    - Container/runtime overhead = ~90 MB = 0.09 GB.
    - Containerized peak = 7.95 + 0.09 = 8.04 GB, before any additional fragmentation or transient allocation spikes.

    **Conclusion & Interpretation:**
    - **Result: 8.04 GB unified-memory peak (Memory Capacity-Bound)**. The workload is already essentially at capacity; container overhead can trigger OOM because it consumes shared system RAM that CUDA/TensorRT also need, not because Docker directly reserves GPU VRAM.
