title: The Edge Container Overhead
scenario: Your team wants to deploy a 1.5 GB YOLOv8 model and a 1 GB camera ISP pipeline on a Jetson Orin NX (8 GB unified memory) using Docker containers. The DevOps engineer says 'containers are lightweight — the memory overhead is negligible.' Your embedded systems colleague says 'Docker on an 8 GB device running ML is insane.'
question: How does Docker's memory overhead (cgroups, overlay2) reduce the available GPU memory for ML model weights and activations, and what does the actual memory budget look like?
details:
  realistic_solution: "On a Jetson, the CPU and GPU share the same physical LPDDR5 RAM. Any memory consumed by the CPU (like the Docker daemon) is memory stolen directly from the GPU's VRAM pool. Docker container overhead has three components that eat into your ML budget: (1) Runtime memory (~50 MB). (2) Filesystem cache (~30 MB). (3) Network namespace (~10 MB). Total runtime overhead is ~90 MB. After the OS (1.5 GB), camera ISP (1 GB), and model weights (1.5 GB), you have ~4 GB free. But activations need 3.9 GB. That 90 MB Docker overhead is the difference between running successfully and triggering the Linux OOM killer."
  common_mistake: |
    **The Pitfall:** Assuming Containers have zero overhead because they share the host kernel.
    **The Rationale:** Candidates extrapolate cloud server principles without understanding the userspace memory footprint of the container runtime.
    **The Consequence:** On edge unified memory architectures, ignoring this small but fixed overhead consumes the tiny remaining memory margin, guaranteeing an OOM kill under load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM: 8.0 GB.
    - OS: 1.5 GB. Camera ISP: 1.0 GB.
    - YOLOv8 Weights: 1.5 GB. YOLOv8 Activations: ~3.95 GB.
    - Docker Overhead: Runtime (~50 MB), FS cache (~30 MB), Network (~10 MB).

    **Calculations:**
    - Bare Metal Baseline: 1.5 + 1.0 + 1.5 + 3.95 = 7.95 GB used.
    - Free Memory (Bare Metal) = 8.0 - 7.95 = 0.05 GB (50 MB).
    - Docker Overhead = 50 + 30 + 10 = 90 MB (0.09 GB).
    - Total with Docker = 7.95 + 0.09 = 8.04 GB.

    **Conclusion & Interpretation:**
    - **Result: 8.04 GB Used (Memory Capacity-Bound)**. The ~90 MB container overhead consumes the tiny 50 MB remaining memory margin, guaranteeing a system OOM kill.
