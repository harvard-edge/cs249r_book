title: Hailo-8 Vision Model Conversion with Custom Operators
scenario: You are tasked with deploying a compact vision transformer or CNN inspection model for real-time inference on a fleet of Hailo-8 edge devices. The pre-trained model is in PyTorch, but Hailo-8 requires an optimized ONNX representation or its native compiler format for best performance. During conversion, you encounter several custom PyTorch operators that are not directly supported by the Hailo-8 compiler. Furthermore, the model's complexity pushes the limits of the Hailo-8's compute capacity and power budget for the required inference latency.
question: How would you handle unsupported PyTorch operators and fit the vision model within Hailo-8 latency, compute, and 2.5W limits?
details:
  realistic_solution: Identify unsupported operators from the Hailo compiler report and replace them with supported ONNX patterns before deployment. For a vision CNN or compact transformer, this usually means folding preprocessing, replacing custom activations or reshapes, fixing static input shapes, and quantizing the supported graph to INT8 with calibration data. Avoid designing the deployment around ad hoc host fallbacks; if a small unsupported pre/post step must remain on the CPU, account for transfer latency explicitly and keep the accelerator graph contiguous. Use Hailo SDK profiling to verify operator coverage, memory traffic, latency, and power, then simplify or retrain the model if the compiled graph misses the target.
  common_mistake: |
    **The Pitfall:** Attempting to directly convert the PyTorch model without understanding Hailo-8's specific operator set.
    **The Rationale:** Relying blindly on default conversion tools without profiling how unsupported operations are handled by the compiler.
    **The Consequence:** Runtime errors, significant performance degradation from CPU fallbacks, or incorrect numerical results.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 Compute: 26 TOPS (INT8), Power Budget: 2.5W.
    - Compact vision model requirement: 100 GOPS per inference.
    - Target latency: 100ms (0.1s).

    **Calculations:**
    - Idealized compute-bound throughput = 26,000 GOPS/s / 100 GOPS = 260 inferences/s.
    - Idealized compute time per inference = 100 GOPS / 26,000 GOPS/s = 3.85ms.
    - This is only a lower bound; unsupported operators, memory traffic, compiler scheduling, and host delegation can dominate single-request latency.
    - Energy consumed per 100ms inference = 2.5W * 0.1s = 0.25 Joules.

    **Conclusion & Interpretation:**
    - **Result: theoretical compute is not the latency proof.** The 100 GOPS vision model has enough aggregate TOPS in an ideal compute-bound case, but the 100ms target is met only if profiling shows conversion, memory movement, and any host-side preprocessing fit inside the remaining budget.
