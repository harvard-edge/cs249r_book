title: TFLite INT8 Conversion on Cortex-M4
scenario: We are converting a PyTorch anomaly detection CNN into TensorFlow Lite for Microcontrollers
  to deploy on a Cortex-M4. The original FP32 model weights consume exactly 600,000 bytes. The TFLite
  Micro runtime engine requires 32,000 bytes of static overhead.
question: What are the INT8 weight size and remaining SRAM tensor arena after converting the 600,000-byte
  FP32 model for the Cortex-M4?
details:
  realistic_solution: FP32 uses 4 bytes per parameter, meaning the model has 150,000 parameters. An INT8
    conversion maps each parameter to 1 byte, so the weights consume 150,000 bytes. The remaining tensor
    arena space is determined by subtracting the 150,000-byte weights and the 32,000-byte runtime overhead
    from the total SRAM available on the specific Cortex-M4 MCU variant.
  common_mistake: '**The Pitfall:** Forgetting data type byte sizes or using base-10 conversion for SRAM.

    **The Rationale:** Candidates blindly divide by 4 or assume 1 KB = 1000 bytes instead of 1024 bytes.

    **The Consequence:** Incorrect memory allocation calculations leading to hard out-of-memory crashes
    at runtime.

    '
  napkin_math: '**Assumptions & Constraints:**

    - FP32 Weights Size: 600,000 bytes (4 bytes per parameter).

    - TFLite Micro Runtime Overhead: 32,000 bytes.

    - MCU SRAM: Variable based on specific M4 variant.


    **Calculations:**

    - Parameter Count: 600,000 / 4 = 150,000 parameters.

    - INT8 Weights Size: 150,000 * 1 = 150,000 bytes.

    - Total Memory Required: 150,000 + 32,000 = 182,000 bytes.


    **Conclusion & Interpretation:**

    - **Result: 150,000 Byte Weights**. The INT8 weights take 150,000 bytes, and the system requires at
    least 182,000 bytes of total SRAM to accommodate the weights and runtime overhead.

    '
