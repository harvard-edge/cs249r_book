title: TFLite INT8 Conversion on Cortex-M4
scenario: We are converting a PyTorch anomaly detection CNN into TensorFlow Lite for Microcontrollers to deploy on a Cortex-M4 with 256,000 bytes of SRAM. The original FP32 model weights consume exactly 600,000 bytes and will be stored in flash after conversion. The TFLite Micro runtime engine requires 32,000 bytes of SRAM overhead.
question: What is the INT8 weight size in flash and remaining SRAM tensor arena on a 256,000-byte SRAM Cortex-M4?
details:
  realistic_solution: FP32 uses 4 bytes per parameter, so the model has 150,000 parameters. INT8 conversion maps each parameter to 1 byte, so the converted weights consume 150,000 bytes in flash. Since the weights are stored in flash, the SRAM tensor arena is not reduced by the weight file size. From 256,000 bytes of SRAM, subtract the 32,000-byte TFLite Micro runtime overhead, leaving 224,000 bytes for the tensor arena and other activation buffers.
  common_mistake: |
    **The Pitfall:** Forgetting data type byte sizes or using base-10 conversion for SRAM.
    **The Rationale:** Candidates blindly divide by 4 or assume 1 KB = 1000 bytes instead of 1024 bytes.
    **The Consequence:** Incorrect memory allocation calculations leading to hard out-of-memory crashes at runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Weights Size: 600,000 bytes (4 bytes per parameter).
    - INT8 weights are stored in flash, not in the SRAM tensor arena.
    - TFLite Micro runtime SRAM overhead: 32,000 bytes.
    - MCU SRAM: 256,000 bytes.

    **Calculations:**
    - Parameter Count: 600,000 / 4 = 150,000 parameters.
    - INT8 Weights Size: 150,000 * 1 = 150,000 bytes.
    - Remaining SRAM tensor arena: 256,000 - 32,000 = 224,000 bytes.

    **Conclusion & Interpretation:**
    - **Result: 150,000 Byte Weights and 224,000 Byte SRAM Arena**. The converted weights occupy flash, while SRAM remaining after runtime overhead is available for the tensor arena.
