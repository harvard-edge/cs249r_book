title: '1kHz Sensor Stream: Immediate Inference vs Batching on Cortex-M4'
scenario: A vibration sensor feeds a Cortex-M4 at 1kHz. The anomaly detection model takes 4ms to run.
question: At a 1kHz sensor rate with 4ms inference, should the Cortex-M4 drop samples for immediate inference or batch 10 samples?
details:
  realistic_solution: Neither option can process every 1kHz sample with the stated 4ms inference cost. Immediate inference on each sample runs at about 250 samples/s, while batching 10 samples adds about 10ms of wait time and 5ms of execution time, for an effective throughput of about 667 samples/s if the batch must fill before running. The practical answer is to downsample, use a smaller/faster model, or accept dropping/overwriting samples; batching 10 does not make the system keep up with the full stream.
  common_mistake: |
    **The Pitfall:** Processing single samples immediately.
    **The Rationale:** Candidates attempt to minimize latency by executing inferences the instant a sensor interrupts.
    **The Consequence:** This leads to massive data loss on high-frequency streams because the inference time exceeds the sampling period.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1kHz sensor rate (1ms period).
    - Model takes 4ms.
    - Batch of 10 takes 5ms of execution time after accumulation.

    **Calculations:**
    - Single-sample service rate = 1 / 4ms = 250 samples/s.
    - Batch latency = 10ms wait + 5ms exec = 15ms.
    - Batch throughput = 10 samples / 15ms = 667 samples/s.

    **Conclusion & Interpretation:**
    - **Result: neither mode keeps up with the full 1kHz stream.** Immediate inference is lower latency, but batching 10 still falls short of the input rate, so the design needs a faster model or explicit sample decimation.
