title: 'Optimizing Hailo-8 OTA Updates'
scenario: 'We deploy an edge camera system using a Hailo-8 accelerator. Because the Hailo-8 has no local DRAM and streams data directly from host memory, the host memory bus is heavily utilized during inference. During an OTA model update over a 5 Mbps cellular link, downloading and writing the full 50MB model binary to the inactive A/B flash partition saturates the shared host memory bus, causing severe inference frame drops.'
question: 'How would you prevent a 50MB OTA update over 5 Mbps from starving Hailo-8 inference on the shared host memory bus?'
details:
  realistic_solution: 'The correct approach is to implement binary delta updates (e.g., bsdiff) to drastically reduce the OTA payload size, combined with rate-limiting the flash programming. By writing to flash in small chunks, the system avoids starving the Hailo-8 of the host memory bandwidth it requires.'
  common_mistake: |
    **The Pitfall:** Suggesting stopping inference during the update or adding more RAM to the host.
    **The Rationale:** Candidates ignore strict uptime requirements and hardware cost constraints of edge devices.
    **The Consequence:** They fail to solve the architectural contention between flash DMA and the Hailo-8 streaming dependency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model size: 50 MB
    - Network link: 5 Mbps (0.625 MB/s)
    - Rate-limited flash write: 500 KB/s
    - Delta update reduction: 90% (5 MB payload)

    **Calculations:**
    - Original transfer bus contention = 50 MB / 0.625 MB/s = 80 seconds
    - New network transfer time = 5 MB / 0.625 MB/s = 8 seconds
    - Rate-limited flash write time = 5 MB / 0.5 MB/s = 10 seconds

    **Conclusion & Interpretation:**
    - **Result: 10 seconds flash write (Bandwidth-Bound)**. Rate-limiting safely bounds memory bus utilization, guaranteeing the Hailo-8 maintains its streaming bandwidth.
