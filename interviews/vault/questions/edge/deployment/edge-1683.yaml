title: Canary Rollout Context Thrashing on AI 100
scenario: You are executing a 50/50 canary rollout of an upgraded INT8 vision model on an on-premise server equipped with a single Qualcomm Cloud AI 100. Both the 12GB legacy model and the 12GB canary model fit comfortably within the 32 GB LPDDR4x memory. However, during the rollout phase, overall system throughput drops dramatically despite utilizing only a fraction of the 400 TOPS INT8 capacity, and power draw spikes near the 75W TDP limit.
question: What is the structural bottleneck of this traffic splitting approach on the Cloud AI 100, and how would you quantify a fix?
details:
  realistic_solution: 'The bottleneck is model residency churn and LPDDR bandwidth pressure from naive 50/50 routing, not arithmetic throughput. Even though both 12GB models fit in 32GB, alternating requests can force repeated weight working-set reloads, cold caches, and queue fragmentation. Fix it with routing affinity: keep each model resident, use sticky batching per model version, and dedicate a minimum share of capacity to legacy and canary traffic so requests are grouped without breaking rollout percentages. Quantify the fix by measuring model reload or weight-read bytes per request before and after affinity.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-bound and suggesting further quantization.
    **The Rationale:** Candidates focus on the models rather than the infrastructure handling the traffic split.
    **The Consequence:** They fail to solve the memory bandwidth thrashing, leaving the system starved for data and wasting compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 12 GB per version.
    - LPDDR4x Bandwidth: ~136 GB/s.
    - Canary split: 50% legacy, 50% canary.

    **Calculations:**
    - Reloading a 12 GB weight working set from LPDDR costs 12 GB / 136 GB/s = 88ms of bandwidth time if it happens for a request group.
    - Naive alternating can approach one reload-sized bandwidth event per request when the active working set is evicted, adding up to 88ms of memory pressure per request.
    - Sticky batches of 50 requests per model reduce reload amortization to 88ms / 50 = 1.76ms per request, while dedicated model residency can make the reload term near zero.
    - The rollout should preserve 50/50 traffic over a time window, not by strict per-request alternation.

    **Conclusion & Interpretation:**
    - **Result: from up to 88ms/request to about 1.76ms/request reload amortization (Memory-Bandwidth Bound)**. Sticky routing and pinned residency reduce weight movement without claiming a compute-side 50x speedup.
