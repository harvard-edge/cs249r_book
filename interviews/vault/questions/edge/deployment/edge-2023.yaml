title: 'Hailo-8 Edge Deployment: Canary Release for Object Detection Model'
scenario: Your team is deploying an updated object detection model to a fleet of 1000 edge devices, each powered by a Hailo-8 AI processor. The current model processes 100 FPS with an average inference latency of 8ms. The new model offers a 10% improvement in accuracy but has slightly higher computational demands.
question: How would you run a 10% canary of the new Hailo-8 object detector across 1,000 devices, monitor it, and estimate power impact?
details:
  realistic_solution: 'Implement a canary release strategy with a small, isolated subset of devices (10% of the fleet). Use traffic splitting at the device level or an upstream gateway to route 10% of the workload to the new model. Monitor key metrics like inference latency, throughput, model accuracy (if online evaluation is feasible), device temperature, and crucially, power draw, ensuring it remains within acceptable limits. Define clear rollback triggers (e.g., 5% increase in latency, 20% increase in power consumption, or specific error rates) and automate the rollback process. The solution would involve robust metric collection from the edge devices and a centralized monitoring system with alerting.'
  common_mistake: |
    **The Pitfall:** Overlooking power consumption implications at scale.
    **The Rationale:** Candidates often focus solely on software metrics (latency, accuracy) during canary releases, ignoring physical hardware constraints.
    **The Consequence:** The new model exceeds thermal or battery limits when rolled out globally, causing device failures or throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Canary Fleet Size: 10% of 1000 devices = 100 devices.
    - Current Total Power: 100 devices * 2.5W/device = 250W.
    - New Model Power Assumption: 5% increase.

    **Calculations:**
    - New Model Power: 2.5W * 1.05 = 2.625W.
    - Canary Fleet Power: 100 devices * 2.625W/device = 262.5W.
    - Power Increase: 262.5W - 250W = 12.5W extra for the canary fleet.

    **Conclusion & Interpretation:**
    - **Result: 12.5W Canary Power Increase (Power-Bound)**. The full rollout impact would require an additional 125W, which must be verified against cluster power limits.
