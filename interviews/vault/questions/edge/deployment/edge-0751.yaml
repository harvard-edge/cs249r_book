title: The Brick Avoidance Protocol
scenario: A critical OTA update for a new vision model fails on 10% of your 50,000 edge devices due to insufficient disk space.
question: How do you prevent these devices from becoming unrecoverable and ensure they can eventually receive a working update?
details:
  realistic_solution: Architect an atomic A/B partitioning scheme. The bootloader writes the incoming firmware to an inactive partition. A hardware watchdog timer validates the successful boot of the new partition; upon failure or timeout, the bootloader automatically pivots back to the active, known-good partition. Coupled with a persistent telemetry daemon, this guarantees fail-safe remote recovery.
  common_mistake: |
    **The Pitfall:** Implementing naive retry loops for failed updates.
    **The Rationale:** Candidates apply cloud server logic where instances are ephemeral and can just be restarted or re-pulled.
    **The Consequence:** Edge devices enter infinite boot loops or fill remaining disk space with error logs, resulting in permanent, costly field bricks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 50,000 devices
    - Failure rate: 10% (5,000 devices)
    - Manual recovery cost: $200 per bricked device

    **Calculations:**
    - Total recovery cost = 5,000 * $200 = $1,000,000
    - Cost of 500MB extra flash for A/B partitioning = ~$0.01 per device = $500 fleet-wide

    **Conclusion & Interpretation:**
    - **Result: $1M (Financial-Bound)**. The recovery risk absolutely mandates an A/B partition architecture.
