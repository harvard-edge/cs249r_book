title: Diagnosing End-to-End Latency in a Multi-Model Edge Pipeline on Hailo-8
scenario: Your team has deployed a compound AI system on an edge device for real-time video analytics. The system consists of two sequential neural networks (an object detection model followed by a fine-grained classification model that processes crops from the first model output). Initial tests show an end-to-end latency of 250ms, which is significantly higher than the target 100ms.
question: 'How would you diagnose the 250 ms latency in the Hailo-8 two-model video pipeline when CPU utilization is low?'
details:
  realistic_solution: 'A systematic approach involves examining the data transfer mechanism between models via nsys profiling. When chaining models on a DRAM-less accelerator, intermediate tensors are often copied back to host memory, converted, and re-uploaded. Fusing the models or passing memory pointers directly on-device removes this severe I/O overhead.'
  common_mistake: |
    **The Pitfall:** Jumping to optimize individual model parameters without considering the inter-model data transfer overhead.
    **The Rationale:** Candidates focus purely on compute times and ignore inefficient memory resource allocation across API boundaries for sequential inference.
    **The Consequence:** Time is wasted attempting to shrink models while the 250ms latency remains stubbornly high due to untouched memory conversion overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Models A & B: ~100 GOPS each.
    - Hailo-8: 26 TOPS.
    - Batch size: 10 crops (256x256x3) = 1.96 MB.

    **Calculations:**
    - Theoretical compute time = 200 GOPS / 26,000 GOPS = ~7.7 ms.
    - Total unaccounted latency = 250 ms - 7.7 ms = ~242.3 ms.
    - Transferring 2 MB payload back and forth over a slow edge bus matches this 240+ ms delay.

    **Conclusion & Interpretation:**
    - **Result: ~240 ms memory overhead (I/O Transfer-Bound)**. Failing to fuse models incurs massive inter-model host memory roundtrips.
