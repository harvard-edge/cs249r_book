title: The Hardware SKU Qualification Matrix
scenario: 'Your company is selecting edge hardware for a new smart city deployment of 10,000 traffic monitoring nodes. You''re evaluating three candidates: NVIDIA Jetson Orin NX (100 TOPS INT8, $399, 15W), Hailo-8 on RPi CM4 ($189, 26 TOPS, 2.5W), and Ambarella CV25 ($85, 5 TOPS INT8, 1.2W). Your model needs 4 TOPS sustained throughput at 30 FPS. The procurement team says ''just buy the cheapest one that meets the TOPS requirement.'''
question: Why is this wrong?
details:
  realistic_solution: |
    Procurement's 'cheapest that meets TOPS' approach fails because peak TOPS is not the same as sustained, qualified throughput. The CV25 only has a 1 TOPS headline margin over a 4 TOPS requirement, so any loss from operator fallback, memory bandwidth, thermal throttling, batching limits, or compiler coverage disqualifies it. Hardware qualification must require measured sustained 30 FPS on the target model, not a spec-sheet peak number. After rejecting unqualified hardware, compare viable SKUs on operator coverage, power efficiency, operating temperature, support lifetime, and 5-year TCO.
  common_mistake: |
    **The Pitfall:** Selecting the Ambarella CV25 because 5 TOPS > 4 TOPS.
    **The Rationale:** Procurement relies strictly on spec sheet peak numbers rather than real-world sustained performance.
    **The Consequence:** The deployed hardware fails to maintain 30 FPS under continuous load, causing system failure despite looking correct on paper.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required sustained throughput: 4 TOPS at 30 FPS.
    - Ambarella CV25 peak rating: 5 TOPS INT8.
    - Qualification rule: measured sustained throughput must meet the requirement with engineering margin.
    - Energy cost: $0.12/kWh.
    - Fleet: 10,000 units over 5 years (43,800 hours).
    - Orin NX: 15W, $399 HW.
    - Hailo-8: 2.5W, $189 HW.

    **Calculations:**
    - CV25 peak headroom = 5 TOPS - 4 TOPS = 1 TOPS, or 25% over the requirement before real-model losses.
    - If sustained utilization falls below 80% of peak, CV25 sustained throughput is under 4 TOPS and misses the deadline.
    - Energy per Watt over 5 years = 0.001 kW * 43,800 hr = 43.8 kWh.
    - Energy cost per Watt over 5 years = 43.8 kWh * $0.12 = $5.256.
    - Orin NX TCO per device: $399 + (15W * $5.256) = $477.84.
    - Hailo-8 TCO per device: $189 + (2.5W * $5.256) = $202.14.
    - Fleet TCO (10k units): Orin = $4.78M, Hailo = $2.02M.
    - Total Savings: $4.78M - $2.02M = $2.76M.

    **Conclusion & Interpretation:**
    - **Result: sustained-throughput qualification first, TCO second**. The cheapest SKU is wrong unless it proves at least 4 TOPS sustained on the actual model; among qualified alternatives, power-efficient hardware can materially reduce fleet TCO.
