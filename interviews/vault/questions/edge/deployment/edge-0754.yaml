title: 'The Boot Time Budget'
scenario: 'Your edge AI security camera (Jetson Orin Nano, 8 GB RAM, 128 GB NVMe) must begin producing detections within 3 seconds of power-on. Currently, boot takes 22 seconds: 2s UEFI, 8s Linux kernel + systemd, 4s loading Python + PyTorch, 8s loading the YOLOv8-L model and building the TensorRT engine.'
question: 'How do you cut boot-to-first-detection from 22 seconds to under 3 seconds?'
details:
  realistic_solution: 'Attack each phase independently. Replace UEFI with a minimal U-Boot. Build a custom kernel with initramfs. Eliminate Python and use the TensorRT C++ runtime directly. Pre-compile the TensorRT engine offline and serialize it to disk.'
  common_mistake: '"Use a faster SSD" or "Optimize the Linux boot." Storage speed helps marginally, but the 8-second TensorRT engine build is the real killer — and it is not a storage problem.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Current Boot: 2s UEFI + 8s Linux + 4s Python + 8s TensorRT = 22s.
    - Storage: NVMe sequential read at 3 GB/s.
    - Target Engine size: 50 MB.

    **Calculations:**
    - Optimized Boot: 0.5s bootloader + 0.8s kernel = 1.3s.
    - Pre-compiled Engine Load: 50 MB / 3 GB/s = 17ms I/O + ~480ms alloc = 0.5s.
    - Total Time: 1.3s + 0.5s = 1.8s.

    **Conclusion & Interpretation:**
    - **Result: 1.8s Boot Time (Latency-Bound)**. Pre-compiling the TensorRT engine trivially removes the severe 8s generation tax.
