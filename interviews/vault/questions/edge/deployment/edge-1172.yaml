title: 'Edge TCO Realization: Scale-Up vs Scale-Out for Edge Fleet'
scenario: 'A manufacturing plant needs 500 TOPS INT8 inference capacity. Option A: 2 Jetson Orin (275 TOPS each = 550 TOPS, $499 each, 60W each). Option B: 20 Hailo-8 M.2 accelerators (26 TOPS each = 520 TOPS, $200 each, 2.5W each) installed across 4 supported PCIe carrier hosts at 5 accelerators per host.'
question: How would you size the Jetson Orin and Hailo-8 options for 500 TOPS INT8, compute 3-year TCO, and compare failure modes?
details:
  realistic_solution: |
    Option A needs 2 Jetson Orins because 2 * 275 TOPS = 550 TOPS, meeting the 500 TOPS target. Its 3-year TCO is $998 hardware + $315.36 power = $1,313.36.

    Option B needs 20 Hailo-8 M.2 accelerators because 20 * 26 TOPS = 520 TOPS, hosted as 5 accelerators per supported PCIe carrier host across 4 hosts. With $80 assumed per host and 5W host power, its 3-year TCO is $4,320 hardware + $183.96 power = $4,503.96.

    Option A is much cheaper but has coarse failure domains: losing either Jetson drops available capacity to 275 TOPS, below the 500 TOPS requirement. Option B is more expensive but degrades more gradually at the accelerator level; however, one Hailo failure leaves 494 TOPS, slightly below target, and one Pi host failure can remove about 130 TOPS if five cards sit behind that host. Choose Option B only when operational resilience or easier sparing is worth the additional TCO, and add a spare Hailo/host if the SLA requires full capacity after a single failure.
  common_mistake: |
    **The Pitfall:** Comparing only hardware acquisition costs.
    **The Rationale:** Procurement often focuses on capital expenditure (CapEx) without modeling operational risk.
    **The Consequence:** Choosing Option A because it is 3.5x cheaper upfront, completely ignoring the massive single-point-of-failure risk and downtime penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - Timeframe: 3 years (26,280 hours).
    - Power cost: $0.10/kWh.
    - Option A sizing: ceil(500 / 275) = 2 Jetson Orins = 550 TOPS.
    - Option B sizing: ceil(500 / 26) = 20 Hailo-8 accelerators = 520 TOPS.
    - Option A hardware: 2 * $499 = $998; power: 2 * 60W = 120W.
    - Option B hardware: 20 * $200 + 4 * $80 supported PCIe carrier hosts = $4,320; power: (20 * 2.5W) + (4 * 5W) = 70W.

    **Calculations:**
    - Option A Power: 120W * 26,280h * $0.10/kWh / 1000 = $315.36.
    - Option A Total TCO: $998 + $315.36 = $1,313.36.
    - Option B Power: 70W * 26,280h * $0.10/kWh / 1000 = $183.96.
    - Option B Total TCO: $4,320 + $183.96 = $4,503.96.
    - Failure check: 1 Jetson failure leaves 275 TOPS; 1 Hailo failure leaves 494 TOPS; 1 carrier host failure can remove 5 Hailos = 130 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Option A is lower TCO; Option B has smaller accelerator-level failure domains but still needs sparing for full N+1 capacity.** Option B costs about $4.5k vs $1.3k over 3 years and is justified only if the plant values graceful degradation or can add spares to meet the failure SLA.
