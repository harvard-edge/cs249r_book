title: 'Edge TCO Analyze: Power Budget Dominates Edge IoT Deployment'
scenario: 'Analyze the TCO breakdown for 10,000 Coral Edge TPU units (4 TOPS, 2W, $25) deployed in smart city infrastructure over 5 years. Identify whether hardware, power, or connectivity dominates. Power: $0.10/kWh. 4G connectivity: $2/unit/month.'
question: 'For 10,000 Coral Edge TPU units over 5 years, what percentage of TCO comes from hardware, power, connectivity, maintenance, and software?'
details:
  realistic_solution: 'Hardware: 10,000 * $25 = $250K. Power: 10,000 * 2W * 8760hr * 5yr * $0.10/kWh = $87.6K. Connectivity: 10,000 * $2/month * 12 * 5 = $1.2M. Maintenance (2%): 10,000 * 0.02 * $25 * 5 = $25K. OTA/software: $50K/yr * 5 = $250K. Total: $250K + $87.6K + $1.2M + $25K + $250K = $1.8125M. Percentages: Hardware 13.8%, Power 4.8%, Connectivity 66.2%, Maintenance 1.4%, Software 13.8%. Connectivity dominates at 66%! Optimization: switch to LoRaWAN (sends inferences to cloud, not raw video): $0.10/unit/month = $60K vs $1.2M. Saves $1.14M.'
  common_mistake: 'Assuming hardware purchase dominates TCO for IoT devices, when in practice connectivity costs (SIM cards, data plans) often exceed hardware cost within 12-18 months.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 Coral Edge TPUs.
    - Timeframe: 5 years (43,800 hours, 60 months).
    - Hardware cost: $25/unit. Power cost: $0.10/kWh.
    - Connectivity (4G): $2/unit/month. LoRaWAN: $0.10/unit/month.

    **Calculations:**
    - Hardware TCO: 10,000 * $25 = $250K (13.8%).
    - Power TCO: 10,000 * 2W * 43,800hr * $0.10/1000 = $87.6K (4.8%).
    - Connectivity TCO (4G): 10,000 * $2 * 60mo = $1.2M (66.2%).
    - Maintenance & Software TCO: $25K + $250K = $275K.
    - Total TCO (4G): $1.81M.
    - Optimized Connectivity (LoRaWAN): 10,000 * $0.10 * 60mo = $60K.
    - Savings: $1.2M - $60K = $1.14M.

    **Conclusion & Interpretation:**
    - **Result: 66% TCO from connectivity (Network-Bound)**. Sending only inference results over LoRaWAN instead of raw frames over 4G reduces TCO by 63%.
