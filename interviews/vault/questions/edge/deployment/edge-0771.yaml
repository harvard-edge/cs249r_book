title: The Model Versioning Fleet Problem
scenario: 'You manage a fleet of 10,000 edge devices deployed across 200 retail stores for shelf monitoring. The fleet has 5 different hardware SKUs: (A) Jetson Orin Nano, (B) Hailo-8L on RPi5, (C) Google Coral on RPi4, (D) Intel NCS2 on x86 mini-PC, (E) Qualcomm RB3 Gen 2. You currently have 3 model versions in production (v2.1, v2.2, v2.3) because you can''t update all devices simultaneously — OTA rollouts take 2 weeks per wave.'
question: How many distinct model binaries do you need to maintain, and what's the real operational cost?
details:
  realistic_solution: 'The real binary count is ~30 (5 SKUs x 3 versions x 2 toolchain variants), not 15. Each SKU uses a different compiler (TensorRT, Hailo Dataflow, Edge TPU Compiler, OpenVINO, SNPE) with debug/release variants. CI cost is modest ($360/year) but engineer time dominates: 1 engineer at 40% = $72K/year on cross-platform work. Standardizing from 5 to 2 SKUs saves ~$45K/year — enough to justify higher per-unit hardware cost.'
  common_mistake: |
    **The Pitfall:** "5 hardware SKUs * 3 model versions = 15 binaries."
    **The Rationale:** People underestimate the combinatorial explosion because they ignore compilation and optimization differences (debug/release variants, specific compiler toolchains).
    **The Consequence:** They vastly underestimate the real operational and engineering cost of maintaining a fragmented hardware fleet.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Matrix: 5 SKUs * 3 versions * 2 toolchain variants (debug/release) = 30 binaries
       - CI/Testing Cost: ~$1,440/year
       - Engineering Cost: $180K salary
    2. **Calculations:**
       - Fragmented Fleet Eng Cost: 1 engineer * 40% time * $180K = $72,000/year
       - Standardized Fleet Eng Cost (2 SKUs): 1 engineer * 15% time * $180K = $27,000/year
       - Potential Savings: $72,000 - $27,000 = $45,000/year
    3. **Conclusion & Interpretation:**
       - **Result: Operational Overhead-Bound.** Standardizing from 5 to 2 SKUs directly saves $45K/year in cross-platform maintenance, easily justifying higher per-unit hardware costs for standardization.
