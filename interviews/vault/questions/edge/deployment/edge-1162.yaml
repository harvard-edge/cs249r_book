title: 'Edge TCO Implement: Fleet Power Cost Optimization'
scenario: You need to implement the power cost calculation for a 1000-unit Hailo-8 (2.5W) edge fleet with Raspberry Pi 5 hosts (5W).
question: For a 1000-unit Hailo-8+Pi5 fleet, what are annual power cost at $0.10/kWh, duty-cycling savings if off-hours sleep power is 1W per unit for 12 hours/day, and 5-year NPV at a 5% discount rate?
details:
  realistic_solution: Total active power is 1000 * (2.5W + 5W) = 7500W = 7.5kW. Annual 24/7 cost is 7.5kW * 8760h * $0.10/kWh = $6,570/year. With 12 hours/day active and 12 hours/day at 1W sleep power per unit, duty-cycled cost is 7.5kW * 4380h * $0.10 + 1.0kW * 4380h * $0.10 = $3,285 + $438 = $3,723/year. Annual savings are $6,570 - $3,723 = $2,847/year. The 5-year NPV of those savings at a 5% discount rate is $2,847 * ((1 - 1.05^-5) / 0.05) = $2,847 * 4.329 = $12,326.
  common_mistake: |
    **The Pitfall:** Failing to apply Net Present Value (NPV) to multi-year cost savings.
    **The Rationale:** Candidates simply multiply the annual savings by 5, ignoring the time value of money.
    **The Consequence:** They overstate the value of future savings relative to present costs, leading to flawed ROI and payback period analyses.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total power active = 1000 × (2.5W + 5.0W) = 7.5 kW.
    - Annual cost (24/7) = 7.5 kW × 8760 hr × $0.10/kWh = $6,570/yr.
    - Duty cycle: 12hr/day active at 7.5 kW fleet power, 12hr/day sleep at 1W/unit = 1.0 kW fleet power.
    - 5% discount rate for NPV.

    **Calculations:**
    - Active cost = 7.5 kW × 4380 hr × $0.10 = $3,285.
    - Idle cost = 1.0 kW × 4380 hr × $0.10 = $438.
    - Total duty cycle cost = $3,723/yr.
    - Annual Savings = $6,570 - $3,723 = $2,847/yr.
    - 5-year NPV at 5%: $2,847 × ((1 - 1.05^-5) / 0.05) = $2,847 × 4.329 = $12,326.

    **Conclusion & Interpretation:**
    - **Result: $6,570/year baseline, $3,723/year duty-cycled, $2,847/year savings, and $12,326 5-year NPV.** The result depends on the explicit 1W-per-unit off-hours sleep assumption.
