title: 'Edge TCO Implement: Fleet Power Cost Optimization'
scenario: 'You need to implement the power cost calculation for a 1000-unit Hailo-8 (2.5W) edge fleet with Raspberry Pi 5 hosts (5W).'
question: 'For a 1000-unit Hailo-8+Pi5 fleet, what are annual power cost at $0.10/kWh, duty-cycling savings (50% during off-hours), and 5-year NPV at a 5% discount rate?'
details:
  realistic_solution: 'Total power: 1000 * (2.5+5) = 7500W = 7.5kW. Annual cost (24/7): 7500W * 8760hr * $0.10/1000 = $6,570/yr. With 50% duty cycle (12hr/day active): 7500W * 4380hr * $0.10/1000 + 1000*0.5W*(idle) * 4380hr * $0.10/1000 = $3285 + $219 = $3504/yr. Annual savings: $6570-$3504 = $3066/yr. NPV of savings over 5yr at 5% discount: PV = 3066*(1-(1.05)^-5)/0.05 = 3066*4.329 = $13,273. Power management implementation cost: ~$5K (firmware development). ROI: ($13,273-$5000)/$5000 = 165%. Payback: $5000/$3066 = 1.63 years.'
  common_mistake: |
    **The Pitfall:** Failing to apply Net Present Value (NPV) to multi-year cost savings.
    **The Rationale:** Candidates simply multiply the annual savings by 5, ignoring the time value of money.
    **The Consequence:** They overstate the value of future savings relative to present costs, leading to flawed ROI and payback period analyses.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total power active = 1000 × (2.5W + 5.0W) = 7.5 kW.
    - Annual cost (24/7) = 7.5 kW × 8760 hr × $0.10/kWh = $6,570/yr.
    - 50% duty cycle (12hr active, 12hr idle at assumed 1W/unit sleep mode).
    - 5% discount rate for NPV.

    **Calculations:**
    - Active cost = 7.5 kW × 4380 hr × $0.10 = $3,285.
    - Idle cost = 1.0 kW × 4380 hr × $0.10 = $438.
    - Total duty cycle cost = $3,723/yr.
    - Annual Savings = $6,570 - $3,723 = $2,847/yr.
    - 5-year NPV at 5%: $2,847 × ((1 - 1.05^-5) / 0.05) = $2,847 × 4.329 = $12,326.

    **Conclusion & Interpretation:**
    - **Result: $12,326 NPV (Cost-Bound)**. The 5-year NPV of the power savings is $12,326, which yields a strong ROI against a ~$5K implementation cost.
