title: The Bricked OTA Update
scenario: Your fleet of 200 NXP i.MX 8M Plus devices monitors crop health on farms across Iowa. You push a 45 MB model update over 4G/LTE. 30 devices (15%) lose connectivity mid-update and are now bricked with a partially written model file.
question: Why are ML model updates significantly more dangerous than generic firmware updates in constrained environments, and how does size dictate partition architecture?
details:
  realistic_solution: ML models are dangerous to update because their size creates a much longer vulnerable transfer and write window. In this scenario, the 45 MB model is 15x larger than the 3 MB firmware baseline at the same bandwidth, so a spotty rural 4G link has far more time to drop mid-update. If the device downloads and overwrites the active .tflite file directly, a partial write can corrupt the model and crash the inference engine on load. The fix is staged download to inactive storage, checksum or signature verification, and A/B model partitions with atomic activation so the previous known-good model remains bootable after a failed transfer.
  common_mistake: |
    **The Pitfall:** Using a naive "download and overwrite" approach and relying on simple retries.
    **The Rationale:** Cloud infrastructure can safely retry HTTP downloads, so candidates apply this directly to edge updates.
    **The Consequence:** A partial write corrupts the .tflite file, crashing the inference engine and permanently bricking the device requiring a physical truck roll.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 45 MB. Firmware size: 3 MB.
    - 4G rural bandwidth: 0.625 MB/s.
    - Observed mid-update connectivity loss: 30 of 200 devices (15%).

    **Calculations:**
    - Model download time = 45 MB / 0.625 MB/s = 72 seconds.
    - Firmware download time = 3 MB / 0.625 MB/s = 4.8 seconds.
    - Exposure window ratio = 72 / 4.8 = 15x longer for the model update.
    - Observed bricking from naive overwrite = 30 / 200 = 15% of the fleet.
    - The 15x exposure ratio explains why model updates are riskier, but it does not mathematically derive a 15% bricking probability; the observed rate depends on connection reliability, power loss, retry behavior, and write semantics.

    **Conclusion & Interpretation:**
    - **Result: the model update has a 15x longer vulnerable window, and this fleet observed 15% bricking under naive overwrite.** Large ML models require staged download, checksum verification, and A/B model partitions with atomic activation so a mid-update disconnect leaves the previous model intact.
