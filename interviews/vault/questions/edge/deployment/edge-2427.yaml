title: Dynamic Batching Inefficiencies in TensorRT
scenario: A Jetson AGX Orin serves a TensorRT engine strictly compiled for a maximum batch size of 8.
question: Explain why dynamically sending a batch size of 3 might result in sub-optimal latency compared to an engine compiled specifically for batch 3.
details:
  realistic_solution: During ahead-of-time compilation, TensorRT auto-tunes and selects hardware kernels optimized for the specific max dimensions provided. An engine compiled for batch 8 relies on kernels tuned for larger thread blocks. When given a batch of 3, the engine either pads the execution or utilizes the less efficient large-batch kernels, underutilizing CUDA cores and causing higher latency than a tailored batch-3 kernel.
  common_mistake: |
    **The Pitfall:** Assuming dynamic batch engines automatically recompile hardware kernels at runtime.
    **The Rationale:** Candidates confuse frontend framework flexibility (like PyTorch) with ahead-of-time compiled inference engines.
    **The Consequence:** Severe underutilization of CUDA cores and unnecessarily high latency for smaller batches.
  napkin_math: |
    **Assumptions & Constraints:**
       - Engine Compiled Max Batch Size: 8.
       - Requested Runtime Batch Size: 3.
    **Calculations:**
       - Execution slot utilization: 3 active slots / 8 total compiled slots.
       - Padded or wasted execution slots: 8 - 3 = 5 slots.
    **Conclusion & Interpretation:**
       - **Result: 62.5% Underutilization**. 5 out of 8 execution slots are padded and wasted because the static engine must execute the hardware kernel tuned for a batch of 8.
