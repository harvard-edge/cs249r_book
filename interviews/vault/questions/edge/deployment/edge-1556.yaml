title: Evaluating OTA Strategies for Qualcomm Cloud AI 100
scenario: A fleet of edge servers running Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8) requires OTA updates. Network bandwidth is constrained to 50 Mbps. The options are A) full A/B atomic updates, or B) differential delta patches with local host staging.
question: Which OTA update strategy is better suited for this 50 Mbps constrained environment, and how is rollback handled?
details:
  realistic_solution: |
    Approach B (differential updates with local staging) is vastly superior for this scenario. Given the 50 Mbps bandwidth limit, downloading a full system image and model payload would take hours and risk network interruption. The host system should use a local staging cache to receive delta patches, verify their integrity, and assemble the full image before flashing the firmware or loading the new model into the Qualcomm Cloud AI 100's memory. Rollback is managed by keeping the previous known-good model and firmware locally on the host's SSD.
  common_mistake: |
    **The Pitfall:** Defaulting to full A/B partitioning for multi-GB model payloads.
    **The Rationale:** Candidates prefer the simplicity and atomic guarantees of full image updates, ignoring physical network realities.
    **The Consequence:** Causing hours of network saturation per update, increasing the risk of interrupted downloads and system downtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bandwidth limit: 50 Mbps.
    - Full Payload (Approach A): 28 GB model = 229,376 Megabits.
    - Delta Patch (Approach B): 5% delta = 1.4 GB = 11,469 Megabits.

    **Calculations:**
    - Full Download Time: 229,376 Mb / 50 Mbps ≈ 4,588 seconds (~76.5 minutes).
    - Delta Download Time: 11,469 Mb / 50 Mbps ≈ 229 seconds (~3.8 minutes).

    **Conclusion & Interpretation:**
    - **Result: ~3.8 minutes vs ~76.5 minutes (I/O-Bound)**. Differential patches eliminate over an hour of vulnerability window per update.
