title: The Update Blind Spot
scenario: A security camera system performs firmware updates by deleting the old model, downloading the new one, and then loading it. This process takes 45 seconds.
question: What is the primary security flaw in an update design that deletes the old model before downloading and loading the new one, taking 45 seconds?
details:
  realistic_solution: |
    This naive deployment strategy induces a catastrophic Inference Gap. A 45-second deletion cycle guarantees total system blindness. The canonical architectural fix is implementing A/B Partitioning with hot-swapping: the updated model is fetched entirely into an inactive secondary partition, verified cryptographically, and then pointer-swapped into the active stream to ensure zero downtime.
  common_mistake: |
    **The Pitfall:** Assuming short downtime during updates is acceptable for security devices.
    **The Rationale:** Engineers used to web services might think a 45-second maintenance window is normal and harmless.
    **The Consequence:** For a security camera, 45 seconds of blindness is a massive, exploitable window that defeats the purpose of the system.
  napkin_math: |
    **Assumptions & Constraints:**
       - Update blind spot: 45 seconds
       - Intruder walking speed: ~1.5 m/s
    **Calculations:**
       - Unmonitored distance: 45 s * 1.5 m/s = 67.5 meters
    **Conclusion & Interpretation:**
       - **Result: Architectural Security Flaw.** A 45-second inference gap allows a target to cross 67.5 meters completely unobserved, requiring A/B partition hot-swapping to fix.
