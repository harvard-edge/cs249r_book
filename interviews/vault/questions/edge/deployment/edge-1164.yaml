title: Edge TCO Mastery Multi-Tier Edge-Cloud-Hybrid Cost Optimization
scenario: Design the optimal edge-cloud-hybrid architecture for a hospital network of 50 sites, each with 10 medical imaging AI requests/hour (simple triage) and 2 complex diagnosis requests/hour. The simple model fits on a Hailo-8 edge accelerator, while the complex model requires an H100 on the cloud. The goal is to minimize total 5-year TCO while meeting P99 < 500ms for simple and P99 < 10s for complex queries.
question: What is the correct 5-year power cost for 50 Hailo-8 edge devices operating at 7.5W continuously, assuming $0.10/kWh?
details:
  realistic_solution: 'Power cost over 5 years is calculated by determining the total Watt-hours across the fleet, converting to kilowatt-hours, and multiplying by the energy rate. 50 devices × 7.5W = 375W. Over 43,800 hours (5 years) = 16,425 kWh.'
  common_mistake: |
    **The Pitfall:** Misplacing decimal points when converting Watts to Kilowatts.
    **The Rationale:** Engineers often forget to divide by 1000 when scaling up to fleet-level Watt-hours, drastically overestimating hardware operational costs.
    **The Consequence:** Incorrectly concluding that edge hardware power costs are prohibitive, pushing architecture toward an unnecessarily expensive cloud-only design.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 50 devices.
    - Power consumption: 7.5 W per device.
    - Duration: 5 years.
    - Energy cost: $0.10/kWh.

    **Calculations:**
    - Fleet Power Draw: 50 devices * 7.5 W = 375 W.
    - Total Time: 5 years * 365 days * 24 hours = 43,800 hours.
    - Total Energy: 375 W * 43,800 hours = 16,425,000 Watt-hours.
    - Convert to kWh: 16,425,000 Wh / 1000 = 16,425 kWh.
    - Total Cost: 16,425 kWh * $0.10/kWh = $1,642.50.

    **Conclusion & Interpretation:**
    - **Result: $1,642.50 (Power-Cost Bound Mitigated)**. The 5-year fleet power cost is minimal, proving that edge compute operational costs are virtually negligible compared to constant cloud utilization.
