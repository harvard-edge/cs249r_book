title: Shadow Deployment Memory Constraints on Jetson Orin
scenario: You are deploying a new INT8 object detection model to a fleet of NVIDIA Jetson Orin devices for autonomous robotics. To safely evaluate the new model without impacting the main control loop, you decide to use a shadow deployment strategy where both the current V1 and the new V2 models run concurrently. The Jetson Orin has 32 GB of shared LPDDR5 memory, and the base operating system, ROS2 stack, and camera buffers consume a constant 14 GB.
question: Given that V1 uses 6 GB of memory and V2 uses 7 GB, how much shared memory remains during the shadow rollout?
details:
  realistic_solution: A proper shadow deployment on edge hardware must account for peak memory consumption when both models are loaded into the shared memory pool. The solution requires summing the memory footprints of the OS, V1, and V2, and subtracting this total from the physical limit.
  common_mistake: |
    **The Pitfall:** Forgetting that edge devices use shared system memory for both CPU and GPU.
    **The Rationale:** Candidates accustomed to discrete GPUs assume separate VRAM and RAM pools, or forget to account for base system OS overhead.
    **The Consequence:** Attempting to load models that fit in purely theoretical VRAM limits but cause OOM crashes when competing with the OS in a unified memory architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Available Memory: 32 GB.
    - Base System Overhead: 14 GB.
    - V1 Memory: 6 GB.
    - V2 Memory: 7 GB.

    **Calculations:**
    - Total Consumed Memory: 14 GB + 6 GB + 7 GB = 27 GB.

    **Conclusion & Interpretation:**
    - **Result: 5 GB (Memory-Bound).** Remaining Memory Buffer = 32 GB - 27 GB = 5 GB.
