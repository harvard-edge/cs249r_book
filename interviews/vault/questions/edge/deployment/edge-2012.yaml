title: Optimizing FOTA for NVIDIA Jetson Orin Fleets with A/B Partitions
scenario: Your company deploys a fleet of edge SoC devices in remote, intermittently connected industrial environments. Each device runs a critical ML inference application. A new firmware image, including an updated OS and a large ML model, needs to be deployed via Firmware-Over-The-Air (FOTA). The system employs an A/B partition scheme.
question: How would you design a reliable A/B FOTA strategy for remote devices under intermittent networks and power interruptions?
details:
  realistic_solution: 'The solution involves a phased A/B update: 1. **Download**: The new firmware (e.g., 2GB image) is downloaded to the inactive B partition. This phase uses resumable downloads and cryptographic hashing. Ensure the download process does not exceed the thermal budget under peak ML inference load. 2. **Verification**: After download, the image on B is cryptographically verified against a manifest. 3. **Atomic Switch**: A bootloader-level atomic switch configures the device to boot from B. 4. **Post-Boot Validation**: Upon booting from B, extensive health checks are performed. 5. **Rollback**: If post-boot validation fails, the bootloader automatically reverts to the A partition on the next reboot. 6. **Commit**: If validation passes, B is marked primary. Delta updates and flash endurance management are essential.'
  common_mistake: |
    **The Pitfall:** Failing to handle robust rollback mechanisms or power loss scenarios.
    **The Rationale:** Candidates design simple download-and-replace scripts without considering what happens if a power failure occurs during the partition switch or if the new model crashes post-boot.
    **The Consequence:** Bricking remote edge devices that require expensive physical manual intervention to recover.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 2GB FOTA image over a 1 Mbps remote network.
       * 32GB eMMC with an 8GB base OS.
    2. **Calculations:**
       * Download time = (2048 MB * 8 Mb/MB) / 1 Mbps = 16,384 seconds = ~4.5 hours.
       * A/B base OS partition overhead = 16GB. Remaining storage = 16GB.
       * Flash write endurance: 100GB/yr is ~3 P/E cycles/yr (safe).
    3. **Conclusion & Interpretation:**
       * **The 4.5-hour download must be network resilient, and the A/B scheme tightly caps the maximum ML model footprint at 16GB. Result: Storage Capacity-Bound.**
