title: 'KV-Cache-Aware Load Balancing at the Edge'
scenario: 'You run a distributed inference service across 4 edge nodes (each with one GPU), serving a conversational AI. Users report that multi-turn conversations are much slower than single-turn queries. Your load balancer uses round-robin.'
question: 'Why are multi-turn conversations slower with round-robin routing across 4 edge nodes, and how would you fix it?'
details:
  realistic_solution: 'When round-robin sends turn 2 of a conversation to a different node than turn 1, the new node has no KV cache for the prior context. It must reprocess all previous tokens (prefix recomputation). Solution: session-affinity routing (sticky sessions). Hash the conversation_id to a specific node to preserve the KV cache, similar to prefix caching in vLLM.'
  common_mistake: 'Thinking the model weights need to be reloaded per turn. Pinning weights into memory solves nothing since the actual bottleneck is prefix recomputation of the KV cache.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model, 2K context, 32 layers.
    - 2000-token history.
    - Prefill speed: 1ms/token.

    **Calculations:**
    - Prefix recompute time: 2000 tokens * 1ms/token = 2 seconds added latency per turn.
    - KV cache memory per conversation: 32 layers * 2 * 4096 * 2000 * 2 bytes ≈ 1 GB.

    **Conclusion & Interpretation:**
    - **Result: 0s Recompute vs 2s (Compute-Bound)**. Session affinity eliminates the 2-second prefill penalty at the cost of 1 GB KV cache memory per active conversation.
