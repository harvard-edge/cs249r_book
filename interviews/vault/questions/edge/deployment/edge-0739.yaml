title: The OTA Flash Budget Crunch
scenario: You're scoping the storage for an automotive ECU running a driver-assist feature. The ECU has a 512 MB flash memory chip. The bootloader and RTOS consume 48 MB, and the architecture requires a dedicated 150 MB partition for the OTA agent. The current application uses 200 MB. A pending update contains a new, larger vision model that is 120 MB.
question: Can the 120 MB vision model update be safely deployed on the 512 MB ECU, and how much flash remains free?
details:
  realistic_solution: 'No, the update cannot be safely deployed. We must account for all reserved space on the flash memory. The space available to the application is not the total flash size, but what remains after the OS and the critical OTA partition are permanently reserved.'
  common_mistake: |
    **The Pitfall:** Ignoring the dedicated OTA staging partition when calculating free space.
    **The Rationale:** Engineers subtract the OS and current application from the total and incorrectly conclude there is plenty of room, forgetting that safe A/B OTA updates require a rigid, dedicated download buffer.
    **The Consequence:** The OTA download will exhaust available memory midway, potentially bricking the ECU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total storage: 512 MB.
       - OS + Bootloader: 48 MB.
       - Dedicated OTA Partition: 150 MB.
       - Current application size: 200 MB.
       - New model size: 120 MB.
    2. **Calculations:**
       - Total Committed Space = 48 MB + 150 MB + 200 MB = 398 MB.
       - Effective Free Space = 512 MB - 398 MB = 114 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound (Update Fails)**. The required 120 MB exceeds the available 114 MB flash. The system cannot stage the update.
  options:
  - Yes, it fits. The OS and app use 248 MB, leaving 264 MB of free space.
  - Yes, it fits. The 120 MB model can be downloaded directly into the 150 MB OTA partition.
  - No, it does not fit. After reserving space for the OS and the OTA partition, only 114 MB of flash remains, which is less than the 120 MB required.
  - Yes, it fits. After the OS (48 MB) and OTA partition (150 MB) are reserved, there is 314 MB of space for the application.
  correct_index: 2
