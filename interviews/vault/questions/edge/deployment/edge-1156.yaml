title: 'Edge TCO Evaluation: 3 Edge Hardware Options for Retail Analytics'
scenario: 'A 500-store retail analytics deployment requires edge hardware (1 unit/store, 24/7, 30 FPS object detection). Options are (A) Jetson Orin ($499, 60W), (B) Hailo-8+Pi5 ($280, 7.5W), (C) Intel NCS2+Pi4 ($175, 4W). The evaluation is based on a 3-year TCO at $0.10/kWh.'
question: 'What are the correct 3-year power costs for the 7.5W Hailo-8+Pi5 and 4W NCS2+Pi4 options at $0.10/kWh?'
details:
  realistic_solution: 'B power: 7.5W x 26,280hr x $0.10/1000 = $19.71. C power: 4W x 26,280hr x $0.10/1000 = $10.51. Always divide W x hr x $/kWh by 1000.'
  common_mistake: |
    **The Pitfall:** Not checking if lower-cost options can actually achieve the required throughput.
    **The Rationale:** Focus is purely on minimizing TCO without ensuring the hardware can process the 30 FPS YOLOv8s workload.
    **The Consequence:** Selecting hardware that is cost-effective but fails to meet real-time performance requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operation: 24/7 over 3 years (26,280 hours).
    - Power cost: $0.10/kWh.
    - Hardware: Hailo-8+Pi5 (7.5W) and NCS2+Pi4 (4W).

    **Calculations:**
    - Option B (Hailo-8) power cost: 7.5W $\times$ 26,280hr $\times$ $0.10 / 1000.
    - Option C (NCS2) power cost: 4W $\times$ 26,280hr $\times$ $0.10 / 1000.

    **Conclusion & Interpretation:**
    - **Result: $19.71 and $10.51 (Power/Cost-Bound)**. TCO metrics must properly convert Watts to kilowatts when computing long-term energy costs.
