title: The Emergency OTA Rollout
scenario: You are an ML systems engineer for an autonomous vehicle company. A critical bug has been discovered in the perception model that requires an immediate Over-the-Air (OTA) update for the entire fleet. The compressed update package for the new model is 512 MB.
question: How long will the 512 MB OTA package take to download over a 100 Mbps connection?
details:
  realistic_solution: 'The correct approach is to harmonize the units before performing the division. Since there are 8 bits in a byte, we must convert the file size from MegaBytes to Megabits to match the bandwidth unit.'
  common_mistake: |
    **The Pitfall:** Confusing Megabits (Mb) with MegaBytes (MB).
    **The Rationale:** People often overlook that network bandwidth is measured in bits per second, while file sizes are in bytes.
    **The Consequence:** Forgetting to convert units leads to an 8x error in the calculation, drastically underestimating the required time.
  napkin_math: |
    **Assumptions & Constraints:**
    - File Size: 512 MB.
    - Bandwidth: 100 Mbps (Megabits per second).

    **Calculations:**
    - Unit Conversion: Convert MegaBytes to Megabits: 512 MB * 8 bits/byte = 4096 Mb.
    - Calculate Time = Total Data / Rate = 4096 Mb / 100 Mbps = 40.96 seconds.

    **Conclusion & Interpretation:**
    - **Result: 41.0 seconds (Network-Bound)**. Resolving the byte-to-bit mismatch ensures accurate deployment timelines.
  options:
  - '5.1 seconds'
  - '41.0 seconds'
  - '328 seconds'
  - '0.6 seconds'
