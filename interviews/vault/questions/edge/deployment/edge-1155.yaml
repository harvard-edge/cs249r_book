title: 'Edge TCO Evaluation: Coral TPU vs Cloud Inference for Low-Volume Deployments'
scenario: A beehive monitor runs MobileNetV2 at 1 inference/minute, 24/7. You are evaluating a Coral Edge TPU ($60 total system, 7W active) versus AWS Lambda cloud inference at $0.0001 per inference.
question: For the beehive monitor at 1 inference per minute, what is the 3-year TCO for edge versus Lambda, and what is the daily break-even volume?
details:
  realistic_solution: Over 3 years, the Coral Edge TPU system costs $60 hardware plus 7W * 8760h/year * 3 years / 1000 * $0.10/kWh = $18.40 in power, for a 3-year edge TCO of $78.40. Lambda at 1 inference/minute handles 1,576,800 inferences over 3 years, costing $157.68 at $0.0001/inference. The break-even volume is $78.40 / $0.0001 = 784,000 inferences over 3 years, or 716 inferences/day. This workload runs 1,440 inferences/day, so edge is cheaper here; cloud is cheaper only below about 716 inferences/day.
  common_mistake: |
    **The Pitfall:** Assuming edge computing is universally cheaper because cloud providers charge a "per-inference tax."
    **The Rationale:** Candidates completely ignore the edge system's baseline hardware CapEx and continuous 24/7 power draw (OpEx), which accumulate regardless of inference volume.
    **The Consequence:** Organizations deploy complex physical edge hardware for low-volume tasks, vastly overspending on TCO compared to a simple, serverless cloud endpoint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge hardware: $60. Power: 7W, 24/7/365. Energy cost: $0.10/kWh. Lifecycle: 3 years.
    - Cloud Lambda: $0.0001 per inference.
    - Volume: 1 inference / minute.

    **Calculations:**
    - Edge OpEx (3 years) = 7W * 8760h * 3yrs / 1000 * $0.10 = $18.40.
    - Edge TCO = $60 (CapEx) + $18.40 = $78.40.
    - Cloud Volume (3 years) = 1 * 60 * 24 * 365 * 3 = 1,576,800 inferences.
    - Cloud TCO = 1,576,800 * $0.0001 = $157.68.
    - Break-even equation: $78.40 = N_inf * $0.0001 => N_inf = 784,000 (over 3 yrs).
    - Daily Break-even = 784,000 / (3 * 365) = 716 inferences/day.

    **Conclusion & Interpretation:**
    - **Result: 716 inferences/day (Cost-Bound)**. Edge TCO is cheaper at this volume, with the break-even threshold determining the optimal deployment strategy.
