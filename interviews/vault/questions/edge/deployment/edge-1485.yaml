title: Architecting a Resilient OTA Update System for Jetson Orin
scenario: Your team is deploying a fleet of autonomous mobile robots powered by the NVIDIA Jetson Orin. These robots operate in remote warehouses with unreliable, low-bandwidth network connections. You need to design a robust Over-The-Air (OTA) update system that handles full OS, driver, and AI model updates without bricking the device.
question: How would you design OTA updates for Jetson Orin robots to allow zero-downtime downloads and automatic rollback after boot failure?
details:
  realistic_solution: 'Implement an A/B rootfs partition scheme. The active partition runs the robot while the OTA daemon slowly fetches the payload into the inactive partition. Use a hardware watchdog timer and strict boot-status flags. If the new partition fails health checks (including DLA/GPU probing), the bootloader forcefully reverts to the known-good partition.'
  common_mistake: |
    **The Pitfall:** Downloading the payload and flashing the active rootfs in place.
    **The Rationale:** Engineers accustomed to fast-network cloud containers fail to design for the massive payloads of ML models on slow edge connections.
    **The Consequence:** A power cycle or network drop midway through the 18-hour download completely bricks the autonomous robot.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network bandwidth: 1 Mbps.
       - Update payload delta: 8 GB.
       - Storage required: 2x 16GB (A/B layout).
    2. **Calculations:**
       - Download time = (8 GB * 8000 Mb/GB) / 1 Mbps = 64,000 seconds.
       - 64,000 seconds = ~17.7 hours.
    3. **Conclusion & Interpretation:**
       - **Result: A/B Partitioning Required**. Because the OTA takes 17.7 hours, it must run entirely in the background on an inactive partition to guarantee zero inference downtime and fail-safe rollback.
