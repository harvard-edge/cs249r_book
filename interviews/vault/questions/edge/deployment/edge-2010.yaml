title: Edge MLOps Performance Regression on Jetson Orin
scenario: 'You are responsible for the MLOps pipeline managing real-time object detection models deployed on a fleet of NVIDIA Jetson Orin devices (32 GB LPDDR5, 275 TOPS INT8, 60W). A new version of your YOLOv8s model was recently pushed to production via your automated CI/CD pipeline. Post-deployment monitoring indicates a severe performance regression: the average FPS has dropped from 45 FPS to 20 FPS in complex scenes.'
question: How would you diagnose the YOLOv8s FPS regression on Jetson Orin and improve MLOps so future CI/CD catches edge performance regressions?
details:
  realistic_solution: Diagnose the 45 to 20 FPS regression by first reproducing v1 and v2 on the same Jetson Orin image, then comparing Nsight Systems traces, TensorRT build logs, precision modes, CPU preprocessing, memory copies, thermals, and scene-complexity buckets against the last good release. Fix the identified bottleneck, such as FP16 fallback, CPU preprocessing, or a changed TensorRT engine profile. Improve CI/CD with hardware-in-the-loop Jetson Orin benchmarks, golden-video regression suites, P50/P95 FPS and latency gates, artifact/version pinning, power/thermal telemetry capture, and automatic canary rollback when edge metrics regress.
  common_mistake: |
    **The Pitfall:** Overlooking edge-specific hardware constraints or neglecting pre/post-processing bottlenecks.
    **The Rationale:** Candidates fail to consider integrating performance profiling/benchmarking into CI/CD for specific target hardware.
    **The Consequence:** This leads to undetected performance regressions in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original performance: 45 FPS (22.2 ms/frame).
    - Regressed performance: 20 FPS (50 ms/frame).
    - Recovery target: restore at least the prior 45 FPS baseline.

    **Calculations:**
    - Regression gap: 50 ms - 22.2 ms = 27.8 ms overhead.
    - To recover 45 FPS, v2 must remove about 27.8 ms/frame of added latency.
    - Example diagnosis: 12 ms CPU preprocessing + 10 ms TensorRT precision fallback + 6 ms extra copies = 28 ms.

    **Conclusion & Interpretation:**
    - **Result: 45 FPS restored if profiling removes the added 27.8 ms/frame.** CI/CD should gate releases on the same Jetson Orin hardware using fixed workloads, latency/FPS thresholds, and rollback triggers.
