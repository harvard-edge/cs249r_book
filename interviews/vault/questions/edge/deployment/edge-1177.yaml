title: 'Edge TCO Specification: Design Lifecycle Cost Model for 5-Year Edge Fleet'
scenario: 'You need to specify a complete 5-year lifecycle cost model for a 100-unit fleet of edge devices (60W) for industrial automation, including Year 0 deployment, Year 1-3 steady operation, Year 3 model refresh, and Year 4-5 hardware migration, structured as an NPV analysis at an 8% discount rate.'
question: What is the annual fleet power cost for 100 edge devices at 60W and $0.10/kWh?
details:
  realistic_solution: |
    The annual fleet power cost must be calculated by converting unit wattage into kilowatt-hours (kWh) over continuous yearly operation. A critical step in edge TCO modeling is correctly scaling the thermal design power (TDP) or continuous load by the operational uptime (8,760 hours/year) and the local utility rate. Failing to convert Watts to Kilowatts results in a catastrophic 1000x overestimation of OpEx, potentially killing the edge deployment business case.
  common_mistake: |
    **The Pitfall:** Failing to convert Watts to kiloWatts during the cost calculation.
    **The Rationale:** Forgetting to divide the total Watt-hours by 1000, leading to a massive 10x overestimation of power costs.
    **The Consequence:** Incorrectly skewing the Total Cost of Ownership (TCO) model, making edge deployments look artificially unviable compared to cloud alternatives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet Size: 100 devices.
    - Power Draw: 60 Watts per device (continuous).
    - Operation: 24/7 (8,760 hours/year).
    - Power Cost: $0.10 per kWh.

    **Calculations:**
    - Total Energy per Device: 60W * 8,760 hours = 525,600 Watt-hours = 525.6 kWh/year.
    - Fleet Energy: 100 * 525.6 kWh = 52,560 kWh/year.
    - Annual Power Cost: 52,560 kWh * $0.10/kWh = $5,256/year.

    **Conclusion & Interpretation:**
    - **Result: $5,256 per year (Operational Expense)**. OpEx.
