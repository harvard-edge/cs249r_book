title: Edge AI Camera 3-Year TCO With Power and Maintenance
scenario: Estimate the 3-year total cost of ownership for one edge AI camera system with $280 hardware cost, 7.5W continuous power draw, $0.10/kWh electricity, and annual maintenance equal to 5% of hardware cost.
question: What is the corrected 3-year TCO for one edge system after including power and 5% annual maintenance?
details:
  realistic_solution: TCO = hardware $280 + power $19.71 + maintenance $42 = $341.71 after correcting the power calculation.
  common_mistake: |
    **The Pitfall:** Calculating TCO from hardware cost alone.
    **The Rationale:** Candidates forget ongoing OpEx like power and maintenance, even when each line item is small.
    **The Consequence:** They understate lifecycle cost and produce financial estimates that do not reconcile with operations budgets.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware Cost: $280
       - Power Usage: 7.5W
       - Power Rate: $0.10/kWh
       - Timeframe: 3 years (24/7 operation)
       - Maintenance: 5% of hardware cost annually

    **Calculations:**
       - Power Consumption (3 yrs): 7.5W * 24 hours * 365 days * 3 years = 197.1 kWh
       - Total Power Cost: 197.1 kWh * $0.10/kWh = $19.71
       - Total Maintenance Cost (3 yrs): ($280 * 0.05) * 3 years = $14 * 3 = $42.00
       - Total TCO: $280.00 + $19.71 + $42.00 = $341.71

    **Conclusion & Interpretation:**
       - **Result: $341.71 3-year TCO.** The corrected lifecycle cost includes hardware, power, and annual maintenance.
