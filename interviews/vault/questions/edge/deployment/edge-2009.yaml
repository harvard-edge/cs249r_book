title: MLOps for LLM Deployment on Qualcomm Cloud AI 100 Edge Devices
scenario: Your team has developed a new, highly accurate but computationally intensive Large Language Model (LLM) for real-time natural language understanding. The requirement is to deploy this model to a fleet of edge devices powered by the Qualcomm Cloud AI 100.
question: How would you design the MLOps lifecycle for frequent LLM updates on Qualcomm Cloud AI 100 while meeting 32GB memory, INT8, and 75W constraints?
details:
  realistic_solution: Build a Cloud AI 100-specific MLOps pipeline. Register each model, tokenizer, calibration set, quantization recipe, ONNX/export artifact, compiler version, and runtime package as immutable versions. Quantize to INT8, compile for the Cloud AI 100 software stack, then run hardware-in-the-loop tests on the exact accelerator for resident memory, KV-cache headroom at supported context lengths, p99 latency, tokens/s, thermals, and power under the 75W envelope. Promote only artifacts that pass accuracy and target-hardware gates. Roll out frequent updates with shadow or canary traffic to a small device subset, monitor latency, power, error rate, and output-quality drift, and automatically roll back on regressions. Use pruning or further compression only when benchmarks show INT8 compilation still misses memory, throughput, or power targets.
  common_mistake: |
    **The Pitfall:** Neglecting aggressive model optimization stages within the CI/CD pipeline.
    **The Rationale:** Candidates often rely on cloud-based deployment paradigms and forget the strict edge constraints of memory, compute, and power.
    **The Consequence:** Deployment of models that exceed the 32GB memory limit or fail to meet strict latency and power requirements, leading to broken edge inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target constraints: 32 GB memory, 75W power.
    - Model size: 30 billion parameters.
    - INT8 weights use about 1 byte per parameter before scale metadata, runtime buffers, and KV cache.
    - Per-token throughput must be measured on the compiled target because bytes moved per token depends on architecture, context length, batching, and cache behavior.

    **Calculations:**
    - FP16 Memory: 30B * 2 bytes = 60 GB (Exceeds 32 GB limit).
    - INT8 Weight Memory: 30B * 1 byte = 30 GB before metadata.
    - Remaining nominal headroom in a 32 GB budget is only 2 GB.
    - Scale tables, runtime workspaces, activations, and KV cache can exceed that 2 GB unless the model is sharded, further compressed, or constrained to short context and small batch.
    - A bandwidth-only token estimate would need bytes read per token, not total resident model size.

    **Conclusion & Interpretation:**
    - **Result: Capacity and Profiling Bound.** INT8 is necessary but not sufficient; the MLOps gate must check compiled memory footprint, KV-cache limits, measured latency/tokens per second, and power on target hardware before release.
