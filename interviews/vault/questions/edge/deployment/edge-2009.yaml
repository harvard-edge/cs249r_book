title: MLOps for LLM Deployment on Qualcomm Cloud AI 100 Edge Devices
scenario: Your team has developed a new, highly accurate but computationally intensive Large Language Model (LLM) for real-time natural language understanding. The requirement is to deploy this model to a fleet of edge devices powered by the Qualcomm Cloud AI 100.
question: How would you design the MLOps lifecycle for frequent LLM updates on Qualcomm Cloud AI 100 while meeting 32GB memory, INT8, and 75W constraints?
details:
  realistic_solution: 'Implement an MLOps pipeline with automated model optimization. This includes INT8 quantization and pruning to reduce the model''s memory footprint and improve inference speed. A model registry stores optimized versions tagged with quantization levels and performance benchmarks. The CI/CD pipeline needs a hardware-in-the-loop (HIL) testing stage replicating the Cloud AI 100 to verify the model fits within 32GB LPDDR4x, meets latency via INT8 TOPS, and adheres to the 75W envelope. Experiment tracking captures all optimization metrics to ensure reproducibility.'
  common_mistake: |
    **The Pitfall:** Neglecting aggressive model optimization stages within the CI/CD pipeline.
    **The Rationale:** Candidates often rely on cloud-based deployment paradigms and forget the strict edge constraints of memory, compute, and power.
    **The Consequence:** Deployment of models that exceed the 32GB memory limit or fail to meet strict latency and power requirements, leading to broken edge inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target constraints: 32 GB memory, 75W power.
    - Model size: 30 billion parameters.
    - LPDDR4x bandwidth: ~136 GB/s.

    **Calculations:**
    - FP16 Memory: 30B * 2 bytes = 60 GB (Exceeds 32 GB limit).
    - INT8 Memory: 30B * 1 byte = 30 GB (Fits within 32 GB).
    - Inference time per token (INT8): 30 GB / 136 GB/s = ~220 ms.
    - Throughput: 1 / 0.220s = ~4.5 tokens/second.

    **Conclusion & Interpretation:**
    - **Result: ~4.5 tok/s (Memory Bandwidth-Bound)**. The deployment is constrained by memory capacity (forcing INT8) and then by memory bandwidth bounds (~4.5 tok/s) rather than compute, demanding aggressive quantization in the automated pipeline.
