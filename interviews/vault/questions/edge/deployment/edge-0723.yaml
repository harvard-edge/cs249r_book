title: The OTA Download Fallacy
scenario: You are an engineer on an autonomous vehicle team responsible for Over-the-Air (OTA) updates. You need to calculate the time required to download a new 8 GB perception model update to a vehicle over its 1 Gbps cellular connection.
question: How long does an 8 GB update take to download over a 1 Gbps cellular connection, ignoring protocol overhead?
details:
  realistic_solution: The correct way to solve this is to first make the units consistent. You must convert the network speed from Gigabits per second (Gbps) to Gigabytes per second (GB/s) by dividing by 8. Then, you can divide the total package size by the network speed in the correct units.
  common_mistake: |
    **The Pitfall:** Confusing Gigabits (Gb) with Gigabytes (GB).
    **The Rationale:** Engineers incorrectly divide the 8 GB package size by the 1 Gbps network speed without unit conversion.
    **The Consequence:** The download time is vastly underestimated, leading to poorly planned update windows and drained vehicle batteries.
  napkin_math: |
    **Assumptions & Constraints:**
    - Update Size: 8 GB.
    - Cellular Connection Speed: 1 Gbps.
    
    **Calculations:**
    - Convert Units: 1 Gbps / 8 bits/byte = 0.125 GB/s (125 MB/s).
    - Calculate Download Time: 8 GB / 0.125 GB/s = 64 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: 64 seconds (Network-Bound)**. A naive calculation ignoring unit conversion is incorrect by a factor of 8.
  options:
  - 8 seconds
  - 4 seconds
  - 64 seconds
  - 32 seconds
  correct_index: 2
