title: 'Edge AI Model Deployment: Latency vs. Throughput on Jetson Orin'
scenario: Your team is deploying a continuously trained deep learning model for real-time object detection onto a fleet of NVIDIA Jetson Orin devices. Each Jetson Orin has 32 GB LPDDR5 memory and provides up to 275 TOPS (INT8) for AI inference. The current INT8 optimized model requires an average of 15 TOPS of computational effort per inference and consumes 2 GB of memory. A critical requirement is to maximize inference throughput while ensuring an end-to-end latency not exceeding 50ms per inference batch, maintaining training-serving consistency.
question: Can the 15 TOPS INT8 model meet a 50ms latency target on Jetson Orin, and what CI/CD profiling and MLOps steps would you add?
details:
  realistic_solution: The 15 TOPS INT8 figure alone does not prove the model meets 50ms; the release decision must come from end-to-end profiling on Jetson Orin. Add CI/CD gates that build the exact TensorRT or runtime artifact, deploy it to target hardware, and measure preprocessing, transfer, inference, postprocessing, p50/p95/p99 latency, throughput, memory, thermals, and power at the intended batch sizes. Fail the release if p99 batch latency exceeds 50ms or if training-serving consistency checks fail. Track model, data, quantization, calibration, and runtime versions in the registry so regressions can roll back. Only if profiling misses the SLA should the team consider model changes such as pruning, distillation, lower precision, or architecture changes.
  common_mistake: |
    **The Pitfall:** Overlooking the discrepancy between theoretical maximum throughput and per-inference latency constraints.
    **The Rationale:** Engineers assume that sufficient total compute guarantees meeting individual latency targets.
    **The Consequence:** The deployed system achieves high throughput but consistently misses hard real-time latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin max compute: 275 TOPS.
    - Model operation count must be measured or estimated per inference; "15 TOPS" alone is not a latency unit.
    - Hard latency target: 50 ms.
    - CI benchmark reports p50, p95, and p99 latency at batch 1 on the target device.

    **Calculations:**
    - Required measured latency: p99 end-to-end batch-1 latency <= 50ms.
    - Peak TOPS can bound throughput only after defining operations per inference and realized efficiency.
    - If profiling shows 42ms inference + 6ms preprocessing + 4ms transfer, total = 52ms and optimization is required.
    - If profiling shows 35ms inference + 5ms preprocessing + 3ms transfer, total = 43ms and the target is feasible with margin.

    **Conclusion & Interpretation:**
    - **Result: Benchmark-Required Feasibility.** Peak TOPS arithmetic cannot prove the target impossible; the CI gate should use measured end-to-end latency on Jetson Orin and fail models whose profiled p99 exceeds 50ms.
