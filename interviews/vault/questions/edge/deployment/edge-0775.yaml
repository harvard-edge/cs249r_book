title: The Bandwidth-Constrained Model Update
scenario: Your fleet of 5,000 wildlife monitoring cameras runs on solar-powered cellular (Quectel RM500Q modem, 50 KB/s average throughput, 500 MB/month data cap). The current model is a MobileNetV2-SSD (6.2 MB INT8). You need to deploy an updated model that's 8.1 MB.
question: How do you ship the 8.1 MB model update without blowing the 500 MB/month cellular data budget?
details:
  realistic_solution: Use binary delta updates (bsdiff/courgette). Since the updated model shares most weights with the current model (same architecture, fine-tuned on new data), the binary diff between the old and new TFLite flatbuffer is dramatically smaller than the full file.
  common_mistake: |
    **The Pitfall:** Relying solely on standard compression tools like gzip for full model files.
    **The Rationale:** Engineers assume gzip will reduce the size enough, failing to realize that 5,000 cameras downloading 5 MB still burns 25 GB of expensive bandwidth.
    **The Consequence:** Consuming excessive portions of the strict 500 MB/month per-device data cap, leaving no room for critical telemetry uploads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 5,000 devices.
    - Monthly data cap: 500 MB/device.
    - Full model size: 8.1 MB.
    - Binary delta size: 0.49 MB.

    **Calculations:**
    - Full push per device: 8.1 MB.
    - Delta push per device: 0.49 MB.
    - Full Budget Impact: 8.1 MB / 500 MB = 1.62%.
    - Delta Budget Impact: 0.49 MB / 500 MB = 0.098%.

    **Conclusion & Interpretation:**
    - **Result: Delta consumes <0.1% of budget (Bandwidth-Bound Mitigated)**. Binary diffs drastically reduce bandwidth pressure, leaving the vast majority of the data cap available for critical telemetry.
