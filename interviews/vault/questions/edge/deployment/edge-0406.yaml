title: 'The Fleet Firmware Fragmentation Crisis'
scenario: 'Your company has 4,000 edge AI devices across 3 hardware generations. 1,000 Coral Dev Boards (Edge TPU, TF Lite 2.5), 1,500 Hailo-8 on RPi CM4 (HailoRT 4.14), and 1,500 Jetson Orin NX (JetPack 5.1.2). Over 2 years, firmware updates were applied inconsistently — some devices accepted updates, others were offline or had failed updates. You now have 23 distinct firmware versions across the fleet. A new model requires TF Lite ≥2.8, HailoRT ≥4.16, and JetPack ≥5.1.3. Only 40% of the fleet meets the requirements.'
question: 'How do you untangle this?'
details:
  realistic_solution: 'This is a fleet convergence problem — you need to bring 23 versions down to 3 (one per hardware platform) without disrupting operations. Develop specific QA paths and leverage staged rollouts.'
  common_mistake: '"Push the latest firmware to all devices simultaneously." A mass firmware push to 2,400 non-compliant devices risks bricking devices that are 2+ versions behind (firmware updates often cannot skip versions safely), and saturates the network.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 23 firmware versions across 3 hardware platforms (69 possible configurations).
    - Grouping configurations yields 8 upgrade paths per platform.
    - 2 hours testing time per scenario.

    **Calculations:**
    - Naive QA Time: 69 configs * 2 hours = 138 hours QA.
    - Grouped QA Time: 8 paths * 3 platforms = 24 scenarios * 2 hours = 48 hours QA.
    - Rollout: Tier 1 (8 days) + Tier 2 (12 days) + Tier 3 (10 days) = 30 days total.

    **Conclusion & Interpretation:**
    - **Result: 48 hours QA (Deployment-Bound)**. Grouped testing and staged rollouts systematically converge the fleet without high failure risks.
