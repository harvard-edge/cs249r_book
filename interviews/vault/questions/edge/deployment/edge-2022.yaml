title: Edge ML Model Rollout on NVIDIA Jetson Orin
scenario: Your team is responsible for deploying and updating an object detection model on a fleet of edge devices in a manufacturing plant. These devices process real-time video streams, and model updates need to be rolled out with minimal disruption and the ability to quickly revert to a previous version if issues arise.
question: How would you design an OTA rollout with observability, seamless model/config transitions, and rollback for a Jetson Orin factory fleet?
details:
  realistic_solution: |
    Architect a multi-stage progressive delivery pipeline using OCI-compliant containers plus versioned model and configuration bundles. Implement an OTA daemon that supports signed binary delta updates (e.g., via OSTree or xdelta) to reduce bandwidth and an A/B slot layout so the device can boot or relaunch the last-known-good model/config pair. Use canary rollout, shadow deployments, and local telemetry for latency, dropped frames, confidence drift, error rates, thermal state, and watchdog resets before widening the rollout. Safeguard the fleet with automated rollback tied to local health checks and a control-plane kill switch.
  common_mistake: |
    **The Pitfall:** Overlooking heterogeneous network conditions and total power budget during A/B testing.
    **The Rationale:** Assuming cloud-native A/B testing paradigms apply perfectly to edge devices without considering the TDP limits when running dual models in shadow mode.
    **The Consequence:** Failed deployments, device instability, thermal throttling, and excessively long update cycles across the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Artifact Size: 500 MB.
    - Update Bandwidth: 5 Mbps.
    - Delta Update Savings: 80% reduction.

    **Calculations:**
    - Convert bandwidth: 5 Mb/s / 8 = 0.625 MB/s.
    - Full update time: 500 MB / 0.625 MB/s = 800 seconds (~13.3 mins).
    - Delta Update Payload: 500 MB * 0.20 = 100 MB.
    - Delta Update Time: 100 MB / 0.625 MB/s = 160 seconds (~2.6 mins).
    - Transfer-time savings: 800 seconds - 160 seconds = 640 seconds (~10.7 mins).

    **Conclusion & Interpretation:**
    - **Result: delta updates reduce OTA transfer time by about 10.7 minutes per device.** This supports the rollout design, but seamless transitions and rollback still require versioned artifacts, health checks, and local recovery logic.
