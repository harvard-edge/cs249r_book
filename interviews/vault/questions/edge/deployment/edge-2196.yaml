title: Edge Canary Store Sizing
scenario: A retail chain wants to canary a new edge vision model in 5% of 2,400 stores. Each store processes 18,000 frames/day and the new model adds 3 ms/frame on a local gateway.
question: How much extra compute does the 5% edge canary add, and which rollout metric matters most per store?
details:
  realistic_solution: 'The critical telemetry must pivot from aggregate fleet compute to local queueing metrics. While 1.8 gateway-hours across the fleet appears trivial, the deterministic addition of 3ms per frame cascades into 54 seconds of delayed queuing per store. This micro-delay easily triggers concurrent SLA buffer overruns during peak foot-traffic hours, causing isolated but severe local degradation.'
  common_mistake: |
    **The Pitfall:** Analyzing only fleet-wide compute impacts and ignoring local queue dynamics.
    **The Rationale:** Candidates treat edge gateways like cloud auto-scaling groups, missing that a single overloaded store cannot borrow compute from another.
    **The Consequence:** The canary succeeds globally but causes severe real-time deadline misses in individual high-traffic stores.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stores in Canary: 5% of 2,400 = 120 stores.
    - Frames per store/day: 18,000.
    - Added compute: 3 ms/frame.

    **Calculations:**
    - Added daily compute per store = 18,000 * 0.003s = 54 seconds.
    - Total canary compute = 120 stores * 54s = 6,480 seconds (1.8 hours/day).

    **Conclusion & Interpretation:**
    - **Result: 54 seconds added per store (Compute-Bound)**. Aggregate global compute is irrelevant; local real-time queueing drives SLO misses.
