title: The Edge Model A/B Testing
scenario: Your cloud ML team A/B tests model updates by routing 5% of traffic to the new model and comparing metrics in real-time. They suggest the same approach for your fleet of 2,000 industrial inspection robots running on edge dataflow accelerators. You push back.
question: Why doesn't cloud-style A/B testing work on edge, and what's the alternative?
details:
  realistic_solution: 'Cloud A/B testing fails on edge because you cannot route traffic between models — each device runs exactly one model. Deploying the new model to 5% of devices (100 robots) means those 100 robots see 100% new-model behavior, creating high variance and risk. Instead, use shadow mode: deploy both models to every device, run the candidate model on every frame without acting on its outputs, and log prediction divergences. Upload metrics nightly. Compare candidate vs. production predictions across all 2,000 devices with zero production risk.'
  common_mistake: |
    **The Pitfall:** Assuming "deploy the new model to 5% of devices" is identical to routing 5% of traffic.
    **The Rationale:** Candidates conflate cloud-based request routing with edge device-level deployment, ignoring that a single robot processes 100% of its own physical environment.
    **The Consequence:** Deploying the candidate model to 5% of devices puts 100 physical robots at 100% risk of failure, which is unacceptable for physical systems.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 1 GB device memory. 30 FPS inference. 0.5 Mbps upload link.
       * Shadow mode requires 12 MB/model.
       * 100 bytes/frame log. 8 hours/day active.
    2. **Calculations:**
       * Memory = 24 MB total (safe).
       * Logs = 100 bytes * 30 FPS * 3600s * 8h = 86.4 MB/device/day.
       * Upload time = (86.4 MB * 8 Mb/MB) / 0.5 Mbps = ~23 minutes.
       * Fleet data = 2000 * 86.4 MB = 172.8 GB/day.
    3. **Conclusion & Interpretation:**
       * **Uploading 172.8 GB/day fleet-wide is highly manageable via staggered batching, proving shadow mode is viable. Result: Telemetry Bandwidth-Feasible.**
