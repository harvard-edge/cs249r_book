title: 'Model Format Conversion: Realize TensorRT Engine Storage for Dual-Model Hailo Deployment'
scenario: 'Size the HEF (Hailo Executable Format) storage and SRAM requirements for a dual-model Hailo-8 deployment: (1) vehicle detection (YOLOv5-s, 7.2M params INT8) and (2) license plate recognition (LPRNet, 1.7M params INT8). The Hailo-8 has 32MB on-chip SRAM.'
question: How much HEF storage and SRAM are required, do both Hailo-8 models fit simultaneously, and what switching overhead remains?
details:
  realistic_solution: 'YOLOv5-s HEF: 7.2MB * 1.15 = 8.3MB. LPRNet HEF: 1.7MB * 1.15 = 1.96MB. Total: 10.26MB < 32MB SRAM. Both fit simultaneously on Hailo-8. Model switching: not needed since both fit. Hailo-8 can be partitioned to run both concurrently (split compute budget). Vehicle detection throughput: YOLOv5-s 7.2M params, FLOPs at 640x640: ~16 GFLOPs / 26 TOPS = 0.62ms/frame = 1613fps. LPR (smaller input 94x24): ~1.8 GFLOPs / 26 TOPS = 0.069ms/frame. Can run both models in pipeline without switching overhead.'
  common_mistake: |
    **The Pitfall:** Assuming HEF size exactly equals the INT8 weight count.
    **The Rationale:** Candidates forget that the Hailo compiler adds control flow metadata and may split models into sub-graphs, typically increasing the size by 1.1-1.2x.
    **The Consequence:** Miscalculating SRAM requirements and incorrectly concluding whether models can run concurrently.
  napkin_math: |
    **Assumptions & Constraints:**
    - YOLOv5-s parameters: 7.2M INT8.
    - LPRNet parameters: 1.7M INT8.
    - HEF expansion factor: 1.15x.
    - Hailo-8 SRAM: 32MB.
    - Hailo-8 performance: 26 TOPS.
    - Split ratio: 80% YOLO, 20% LPR.

    **Calculations:**
    - YOLOv5-s HEF = 7.2M * 1.15 = 8.28 MB.
    - LPRNet HEF = 1.7M * 1.15 = 1.96 MB.
    - Total HEF = 8.28 + 1.96 = 10.24 MB.
    - YOLO compute budget = 26 TOPS * 0.8 = 20.8 TOPS.
    - LPR compute budget = 26 TOPS * 0.2 = 5.2 TOPS.
    - YOLO throughput = 16 GFLOPs / 20.8 TOPS = 0.77ms (1299 FPS).
    - LPR throughput = 1.8 GFLOPs / 5.2 TOPS = 0.35ms (2857 FPS).

    **Conclusion & Interpretation:**
    - **Result: 10.24 MB (Memory Capacity).** Models fit comfortably in SRAM without swapping, allowing concurrent pipelined execution.
