title: Size Hailo HEF Storage and SRAM for Dual-Model Edge Deployment
scenario: 'Size the HEF (Hailo Executable Format) storage and SRAM requirements for a dual-model Hailo-8 deployment: (1) vehicle detection (YOLOv5-s, 7.2M params INT8) and (2) license plate recognition (LPRNet, 1.7M params INT8). The Hailo compiler reports HEF package sizes of 9MB for YOLOv5-s and 3MB for LPRNet, with runtime SRAM reservations of 24MB and 6MB respectively. The Hailo-8 has 32MB on-chip SRAM.'
question: How much HEF storage and SRAM are required, do both Hailo-8 models fit simultaneously, and what switching overhead remains?
details:
  realistic_solution: Use the Hailo compiler outputs, not parameter count, for deployable storage and SRAM sizing. HEF storage is 9MB + 3MB = 12MB on host flash. Runtime SRAM reservation is 24MB + 6MB = 30MB, which fits within the 32MB Hailo-8 SRAM with about 2MB headroom. Both network groups can remain resident, so there is no HEF reload/model-switching overhead on the critical path; the remaining overhead is only normal pipeline handoff/scheduling between detection and LPR, which must be measured but is not a PCIe model reload.
  common_mistake: |
    **The Pitfall:** Assuming HEF size exactly equals the INT8 weight count.
    **The Rationale:** Candidates forget that the Hailo compiler adds control flow metadata and may split models into sub-graphs, typically increasing the size by 1.1-1.2x.
    **The Consequence:** Miscalculating SRAM requirements and incorrectly concluding whether models can run concurrently.
  napkin_math: |
    **Assumptions & Constraints:**
    - YOLOv5-s HEF package from compiler: 9MB.
    - LPRNet HEF package from compiler: 3MB.
    - YOLOv5-s SRAM reservation from compiler: 24MB.
    - LPRNet SRAM reservation from compiler: 6MB.
    - Hailo-8 SRAM: 32MB.

    **Calculations:**
    - Total HEF storage = 9MB + 3MB = 12MB on host flash.
    - Total resident SRAM = 24MB + 6MB = 30MB.
    - SRAM headroom = 32MB - 30MB = 2MB.
    - Since both compiled network groups are resident, HEF reload switching time = 0 on the inference path.

    **Conclusion & Interpretation:**
    - **Result: 12MB HEF storage and 30MB SRAM reservation.** Both models fit simultaneously, so no PCIe/HEF model-switch overhead remains; only ordinary pipeline scheduling overhead remains.
