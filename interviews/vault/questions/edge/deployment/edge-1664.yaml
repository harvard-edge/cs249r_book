title: 'Multi-Tenant LLM Serving on Cloud AI 100'
scenario: 'You are deploying a multi-tenant LLM serving infrastructure on an on-premise edge server equipped with a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). You need to concurrently serve latency-sensitive conversational queries using an 8B parameter model and throughput-optimized background summarizations using a 14B parameter model.'
question: 'How would you serve the 8B chat model and 14B summarization model concurrently on one Cloud AI 100 while meeting chat SLAs?'
details:
  realistic_solution: 'Implement an inference server with continuous batching and paged attention to rigidly manage the KV cache within the 32GB limit. Both models must be quantized to INT8 to co-locate them in memory, entirely avoiding swap-induced cold starts. A priority-aware scheduler should preempt the 14B background batch at the token-generation iteration level to immediately process incoming 8B latency-sensitive requests, heavily utilizing the 400 TOPS compute to maximize overall token throughput.'
  common_mistake: |
    **The Pitfall:** Proposing model swapping over PCIe, or failing to account for the massive KV cache footprint in a strict 32 GB environment.
    **The Rationale:** Candidates forget that swapping gigabytes of weights from host memory introduces unacceptable cold start latencies, and they overlook that autoregressive generation requires retaining activations across sequences.
    **The Consequence:** The conversational agent fails its strict latency SLA due to swapping overhead or crashes due to OOM from an unmanaged KV cache.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8B INT8 weights = 8 GB; 14B INT8 weights = 14 GB. Total static memory = 22 GB.
    - Remaining memory on 32 GB accelerator = 10 GB for KV cache and workspace.
    - INT8 KV cache dim: 4096, 32 layers.

    **Calculations:**
    - KV cache per token: 4096 * 32 * 2 (K/V) * 1 byte = 262,144 bytes = 256 KB.
    - Max KV capacity: 10 GB / 256 KB = 40,960 tokens total. At 1000 tokens/request, this supports a concurrent batch size of ~40.
    - 8B compute = 16 GOPS/token. Max theoretical throughput = 400 TOPS / 16 GOPS = 25,000 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: ~40 Concurrent Batch Size (Memory-Capacity-Bound)**. Co-locating both models in INT8 leaves 10 GB for KV cache, perfectly supporting a batched serving strategy that meets the SLA without swapping.
