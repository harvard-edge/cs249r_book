title: Canary Rollout CPU Fallback Degradation
scenario: You are conducting a canary rollout of an updated INT8 object detection model to 5% of a fleet of remote cameras that use Coral Edge TPU accelerators attached to low-power host CPUs. Telemetry shows inference latency has dramatically increased and host CPUs are reporting thermal warnings. The previous model version runs within the Edge TPU power envelope.
question: What is the root cause of this deployment failure?
details:
  realistic_solution: The updated model topology contains an operator, such as an unsupported activation or reshape pattern, that the Edge TPU compiler cannot map. INT8 conversion can still succeed, but the compiled graph is partitioned and the unsupported portion runs on the host CPU through the TensorFlow Lite fallback path. The root cause is CPU fallback from an unsupported operator, which explains both the latency spike and the host thermal warnings.
  common_mistake: |
    **The Pitfall:** Blaming external infrastructure factors (network bandwidth, OTA agent memory leaks) rather than investigating graph partitioning.
    **The Rationale:** Candidates assume that if a model compiles to INT8 without hard-failing, it will execute entirely on the NPU, ignoring compiler warnings about CPU delegation.
    **The Consequence:** Engineering teams waste days debugging the OTA pipeline while remote host CPUs literally melt down trying to process dense neural network layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Previous all-Edge-TPU model latency: ~2 ms.
    - Host CPU sustained INT8 throughput for delegated layers: ~20 GOPS.
    - Unsupported graph partition delegates 2 GOPS of later model work to the host.

    **Calculations:**
    - CPU fallback compute time = 2 GOPS / 20 GOPS/s = 0.10 s = 100 ms.
    - End-to-end latency is at least ~2 ms TPU time + ~100 ms CPU time, plus delegation and tensor-copy overhead.

    **Conclusion & Interpretation:**
    - **Result: >100 ms latency after fallback (CPU-Compute-Bound).** The failure is explained by unsupported operators causing host execution, not by the INT8 format or the rollout system itself.
