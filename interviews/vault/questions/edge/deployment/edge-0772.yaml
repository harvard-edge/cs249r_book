title: The Hardware Lifecycle Cliff
scenario: Your company deployed 50,000 edge AI devices in 2022 using NVIDIA Jetson TX2 modules. It's now 2026. NVIDIA has announced end-of-life for the TX2. Your latest models require TensorRT 10 features that will never be backported to Pascal. You can't replace 50,000 devices overnight.
question: How would you design a 3-year transition strategy for 50,000 Jetson TX2 devices reaching end of life?
details:
  realistic_solution: 'The transition requires a **tiered fleet strategy** with three concurrent tracks: **Track 1 - Extend (2026-2027):** Freeze TX2 devices on the last supported JetPack/TensorRT stack and maintain a separate legacy CI/CD lane. Do not promise TensorRT 10 features on Pascal; instead ship distilled, pruned, or otherwise compatible legacy models and limit this track to sites whose business requirements still tolerate the older capability. Budget: ~$0 hardware, $400k/year engineering. **Track 2 - Managed degradation or selective offload (2026-2028):** For networked, lower-duty-cycle sites, keep the TX2 local path as the safety/default path and send selected crops, metadata, or explicitly designed feature payloads to a cloud service only when latency, privacy, and bandwidth budgets allow. Treat this as capability augmentation, not a universal split-inference replacement for 50,000 devices. Budget: ~$55k/year cloud compute for 15k low-duty-cycle devices. **Track 3 - Rolling replacement
    (2026-2028):** Replace devices in priority order: highest-value and unsupported-use-case locations first, lowest-value last. Target a modern module class such as Orin Nano at $199 plus $50 installation per device. At 15,000 devices/year over 2 years (30,000 total), replacement capex is 30,000 * $249 = $7.47M. Total 3-year transition cost across all tracks is about $8.83M when the $1.36M engineering/cloud OPEX is included. The key insight: not all 50,000 devices need the latest model at the same time, but every TX2 path needs an explicit compatibility and retirement policy.'
  common_mistake: |
    **The Pitfall:** Proposing to "just keep running the old models on old hardware" or "replace everything immediately."
    **The Rationale:** The first leads to a growing capability gap; the second is financially impossible.
    **The Consequence:** A strategy that either fails to meet business capability requirements or results in a rejected, cost-prohibitive budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 50,000 Jetson TX2 devices.
    - Replacement hardware: Orin Nano ($199 + $50 install = $249/device).
    - Transition horizon: 3 years.
    - Legacy engineering OPEX: $400k/year for 3 years.
    - Selective offload OPEX: $55k/year for 3 years.

    **Calculations:**
    - Full replacement cost: 50,000 * $249 = $12.45M.
    - Tiered strategy replacement (30,000 devices): 30,000 * $249 = $7.47M.
    - Legacy engineering OPEX: $400k/year * 3 = $1.20M.
    - Selective offload OPEX: $55k/year * 3 = $0.165M.
    - Tiered strategy OPEX: $1.20M + $0.165M = $1.365M.
    - Total tiered cost over 3 years: $7.47M capex + $1.365M opex = $8.835M.
    - Savings versus immediate full replacement: $12.45M - $8.835M = $3.615M.

    **Conclusion & Interpretation:**
    - **Result: tiered strategy saves about $3.6M over immediate full replacement (Cost-Bound)**. The cost model separates replacement capex from 3-year engineering/cloud opex and avoids assuming TX2 can run TensorRT 10-era features locally.
