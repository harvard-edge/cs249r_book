title: The USB Power Suspension
scenario: You deploy a Coral Edge TPU USB Accelerator to a Linux edge server to speed
  up inference. When the application starts, inference takes 2ms per frame. If the
  application stops and you restart it an hour later, the first inference takes 3
  seconds, and then it goes back to 2ms.
question: What OS power management feature is causing this massive cold-start penalty
  on the USB bus?
details:
  realistic_solution: 'You hit USB Auto-Suspend (Selective Suspend). Normal inference
    over USB 3.0 = 2ms. USB Port Wakeup + Enumeration + Firmware Load = ~3,000ms.
    The OS power-saving feature caused a 1,500x latency spike on the critical path
    of the application restart.

    '
  common_mistake: '**The Pitfall:** Assuming the model has to be reloaded into RAM.

    **The Rationale:** Software engineers default to memory latency instead of bus
    latency.

    **The Consequence:** Wasting time optimizing model loading when the issue is the
    physical hardware bus going to sleep.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Normal Inference: 2 ms over USB 3.0.

    - Cold Start: Port Wakeup + Enumeration + Firmware Load = ~3000 ms.


    **Calculations:**

    - Impact: 3000 ms / 2 ms = 1500x latency spike.


    **Conclusion & Interpretation:**

    - **Result: 1500x latency spike (I/O-Bound Bus Suspend)**. The OS power-saving
    feature puts the physical USB bus to sleep, causing a massive 3000 ms cold start
    delay.

    '
