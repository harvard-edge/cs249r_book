title: Multi-Camera Batch Serving
scenario: Deploying a multi-camera traffic monitoring system where a single Hailo-8 processes frames from 4 different streams at 30 FPS each. Per-frame model latency is 8 ms at batch=1 and 22 ms at batch=4 (the chip is more compute-efficient per frame at batch=4 but per-frame latency rises).
question: Identify the serving technique that combines independent frames into a single batch, and quantify the latency-vs-throughput trade-off to meet the 33ms SLA.
details:
  realistic_solution: 'Spatial/dynamic batching. Trade-off: batch=1 gives 4 sequential inferences * 8 ms = 32 ms per round (just inside 33 ms SLA, throughput = 125 FPS). Batch=4 gives 22 ms per round (well under SLA, throughput = 4/22 ms = 182 FPS). Batch=4 wins on both latency AND throughput here. The throughput gain (1.45x) shows that the chip''s vector units saturate at batch=1 inefficiency - it scales sub-linearly with batch size but still outperforms loop-of-1 below SLA.'
  common_mistake: |
    **The Pitfall:** Defaulting to batch=1 for low individual latency.
    **The Rationale:** Engineers see 8ms vs 22ms and assume batch=1 is definitively "faster" for real-time operation.
    **The Consequence:** They miss that the per-stream SLA is evaluated globally per round; batch=4 delivers significantly higher total FPS while successfully completing all 4 frames well within the 33ms window.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 streams at 30 FPS. SLA = 33ms.
       - Batch=1 latency = 8ms.
       - Batch=4 latency = 22ms.
    2. **Calculations:**
       - Loop of Batch=1: 4 inferences * 8ms = 32ms total round time. Throughput = 4/32ms = 125 FPS.
       - Single Batch=4: 1 inference = 22ms total round time. Throughput = 4/22ms = 182 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Batch=4**. Spatial batching processes all 4 frames in 22ms, outperforming the 32ms loop of 1 while still strictly adhering to the 33ms SLA and delivering higher total throughput.
