title: 'Model Size Estimation: Compare MobileNet vs. EfficientNet Memory on Jetson Orin'
scenario: Compare MobileNetV3-Large (5.4M params, 219M MACs) vs. EfficientNet-B3 (12M params, 1.8B MACs) for deployment on an edge device at batch size 8.
question: How do MobileNetV3-Large and EfficientNet-B3 compare in INT8 TensorRT memory, latency, and accuracy per MB?
details:
  realistic_solution: MobileNetV3-L INT8 under TensorRT requires ~28.2 MB at batch 8. EfficientNet-B3 INT8 scales to ~56.8 MB at batch 8. While EfficientNet reaches a superior peak absolute accuracy, MobileNet leverages depthwise separable convolutions to offer significantly higher accuracy per MB, making it the superior topology for memory-constrained edge deployment.
  common_mistake: |
    **The Pitfall:** Using MACs as the sole proxy for inference latency.
    **The Rationale:** Candidates ignore that EfficientNet's compound scaling creates more memory-bandwidth-intensive patterns compared to MobileNet's depthwise separable convolutions.
    **The Consequence:** Inaccurately estimating performance by failing to account for the memory wall.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MobileNet INT8 TRT: 7 MB weights, 20 MB activations, 0.15 MB/batch input
       - EfficientNet INT8 TRT: 15.6 MB weights, 40 MB activations, 0.15 MB/batch input
       - Batch size: 8
    2. **Calculations:**
       - MobileNet Memory: 7 + 20 + (8 * 0.15) = 28.2 MB
       - EfficientNet Memory: 15.6 + 40 + (8 * 0.15) = 56.8 MB
       - MobileNet Efficiency: 75.2% / 28.2 MB = 2.67 acc%/MB
       - EfficientNet Efficiency: 82.1% / 56.8 MB = 1.45 acc%/MB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Tradeoff.** EfficientNet delivers higher absolute accuracy, but MobileNet yields 1.8x more accuracy per MB.
