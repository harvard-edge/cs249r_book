title: 'Model Size Estimation: Compare MobileNet vs. EfficientNet Memory on Jetson Orin'
scenario: Compare MobileNetV3-Large (5.4M params, 219M MACs) vs. EfficientNet-B3 (12M params, 1.8B MACs) for deployment on Jetson Orin at batch size 8.
question: How do MobileNetV3-Large and EfficientNet-B3 compare in INT8 TensorRT memory, latency, and accuracy per MB?
details:
  realistic_solution: MobileNetV3-L INT8 TRT is about 28.2MB at batch 8 and infers very quickly. EfficientNet-B3 INT8 is about 56.8MB at batch 8. MobileNet gives more accuracy per MB of memory consumed, but EfficientNet reaches a higher peak absolute accuracy.
  common_mistake: |
    **The Pitfall:** Using MACs as the sole proxy for inference latency.
    **The Rationale:** Candidates ignore that EfficientNet's compound scaling creates more memory-bandwidth-intensive patterns compared to MobileNet's depthwise separable convolutions.
    **The Consequence:** Inaccurately estimating performance by failing to account for the memory wall.
  napkin_math: |
    - **MobileNet INT8 TRT Memory:** 7MB weights + 20MB activations = 27MB. Batch 8 input = 8 * 0.15MB = 1.2MB. Total = 28.2MB.
    - **EfficientNet INT8 TRT Memory:** 15.6MB weights + 40MB activations = 55.6MB. Batch 8 input = 8 * 0.15MB = 1.2MB. Total = 56.8MB.
    - **Memory ratio:** 55.6 / 27 = 2.06x more memory for EfficientNet.
    - **Accuracy gap:** 82.1% - 75.2% = 6.9%.
    - **Efficiency Metric:** EfficientNet = 82.1 / 55.6 = 1.48 acc%/MB. MobileNet = 75.2 / 27 = 2.78 acc%/MB.
    - **Final result:** **MobileNet is significantly more memory-efficient (2.78 vs 1.48 acc%/MB), but EfficientNet delivers higher absolute accuracy.**
