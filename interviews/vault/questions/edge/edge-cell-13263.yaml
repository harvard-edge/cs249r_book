title: 'Edge Transformer Fluency: Prefill FLOPs on Jetson Orin'
scenario: 'At a system design interview, estimate the prefill time for a 1024-token prompt on a 7B parameter
  transformer on Jetson Orin NX (100 TOPS INT4 effective). The model has 32 layers, 32 heads, 128 head
  dimension. Provide: (1) total FLOPs for linear layers, (2) total FLOPs for attention, (3) which dominates,
  and (4) expected prefill latency.'
details:
  realistic_solution: Attention per layer at these dimensions = ~8.59 GFLOPs (not TFLOPs). GFLOPs is the
    correct unit for small/medium models.
  common_mistake: Using 6N per token (training formula) for inference, or forgetting attention FLOPs scale
    as O(S²) and become significant at 1024 tokens.
  napkin_math: 'Attention FLOPs per layer (batch=1, seq=512, 8 heads, head_dim=64): Score matmul: 2×1×8×512²×64
    = 2×8×262,144×64 = 268,435,456 ≈ 268M FLOPs = 0.268 GFLOPs. QKV projections: 3×2×1×512×512² (if hidden=512):
    3×2×512×262,144 = 805,306,368 ≈ 805M FLOPs. Total per layer: ~1.07 GFLOPs ≈ 8.59 GFLOPs for full attention
    (not TFLOPs — GFLOPs is correct for this model size).'
