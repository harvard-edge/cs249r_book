title: Sizing Object Detection for Hailo-8 Dataflow Limits
scenario: You are deploying a multi-camera object detection system for a smart intersection using a single
  Hailo-8 accelerator. The system processes four 1080p video feeds at 30fps and is constrained to a 2.5W
  power budget. You are evaluating a 25M parameter CNN (approximately 50 GOps per frame). Given the Hailo-8
  is a dataflow accelerator with 26 TOPS INT8 and no local DRAM (relying entirely on streaming from host
  memory), evaluate the feasibility of this architecture and identify the primary system bottleneck.
details:
  realistic_solution: The correct approach involves calculating both the compute utilization and the host-to-device
    memory bandwidth required for streaming. Since the Hailo-8 relies on compiling the entire network
    pipeline onto its internal SRAM, a 25M parameter model will likely exceed on-chip capacity, forcing
    weight swapping over PCIe. To resolve this, the candidate should propose using a significantly smaller
    architecture (e.g., 5M parameters) or heavy structural pruning to ensure the model fits entirely on-chip,
    thereby avoiding PCIe thrashing.
  common_mistake: Candidates often only compare the required GOps against the 26 TOPS compute capacity
    and conclude the system will easily handle the workload. They fail to account for the lack of local
    DRAM on the Hailo-8, neglecting the severe PCIe bandwidth bottlenecks that occur if a model's weights
    and activations cannot fit entirely on-chip and must be constantly context-switched from host memory.
  napkin_math: 'Compute check: 50 GOps * 30 FPS * 4 cameras = 6,000 GOps = 6 TOPS, which is well within
    the 26 TOPS INT8 limit. Memory check: 25M parameters in INT8 = 25MB of weights. If weights must be
    swapped from host memory per frame due to context switching, the required PCIe bandwidth is 25MB *
    120 FPS = 3.0 GB/s. PCIe Gen3 x4 provides ~3.9 GB/s of practical bandwidth. Streaming 3.0 GB/s of
    weights plus 120 frames of high-res video will saturate the bus and cause massive latency spikes,
    proving the model is too large despite the available TOPS.'
