title: The On-Device Drift Detector
scenario: Your fleet of 3,000 Hailo-8 devices (26 TOPS, 2.5W) runs quality inspection on a factory production
  line. The model was trained on Product Rev A. Six months later, the factory silently transitions to
  Product Rev B — slightly different surface texture and color. Detection accuracy degrades from 98% to
  82%, but nobody notices for weeks because there's no ground truth on-device. Design an on-device drift
  detection system that runs within the Hailo-8's power budget.
question: "How would you design an on-device drift detection system for the Hailo-8 quality inspection fleet within the 2.5 W power budget?"
details:
  realistic_solution: 'Drift detection must be **compute-free or nearly so** — it piggybacks on signals
    the primary model already produces:'
  common_mistake: '"Run a second model to check the first model''s outputs." A second model doubles compute
    and power — the Hailo-8 is already running near its 2.5W budget with the primary model.'
  napkin_math: 'Primary model inference: 8ms at 2.1W on Hailo-8. Drift computation overhead: ~0.02ms (100
    multiplies on the host ARM CPU at 1.5 GHz). Power overhead: <1 mW — 0.04% of the 2.5W budget. Storage
    for 30-day baseline: 720 hourly histograms × 20 bins × 4 bytes = 57.6 KB. Alert bandwidth: 30 KB per
    event. At 1 drift event/month: 30 KB/month — invisible against any data plan. Detection latency: drift
    detected within 1–4 hours of onset (depending on production volume), vs weeks without monitoring.'
