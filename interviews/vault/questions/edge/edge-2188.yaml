title: INT8 Quantization and Tensor Core Throughput on Orin
scenario: Your edge device runs a YOLOv8-M model in FP16 at 22ms per frame (45 fps). Converting to INT8 should theoretically give 2× Tensor Core throughput (275 TOPS INT8 vs 138 TFLOPS FP16).
question: What is the expected INT8 latency for the 22ms FP16 path after accounting for memory, quantization, mixed-precision, and overhead terms?
details:
  realistic_solution: 'Total INT8 latency: 7.7ms (compute) + 3.3ms (memory) + 2.2ms (mixed-precision) + 1.1ms (unaccounted) + 0.5ms (quantization overhead) = 14.8ms. The 1.1ms represents the 5% of the original 22ms FP16 latency that was unaccounted for and did not receive a speedup.'
  common_mistake: |
    **The Pitfall:** Assuming a 2× theoretical TOPS increase yields a straight 2× end-to-end model speedup (11ms).
    **The Rationale:** Failing to apply Amdahl's Law, forgetting that many layers are memory-bound, and ignoring the overhead of data format conversions.
    **The Consequence:** Overpromising performance gains to stakeholders and failing to identify actual memory-bandwidth bottlenecks.
  napkin_math: |
    * **Original 22ms FP16 Breakdown**: 70% compute (15.4 ms), 15% memory (3.3 ms), 10% mixed-precision (2.2 ms), 5% unaccounted (1.1 ms).
    * **Compute Speedup**: 2x improvement -> 15.4 ms / 2 = 7.7 ms.
    * **Static Components**: Memory (3.3 ms) + Mixed-precision (2.2 ms) + Unaccounted (1.1 ms) = 6.6 ms.
    * **Quantization Overhead**: Dequantization steps add ~0.5 ms.
    * **Total INT8 Latency**: 7.7 + 6.6 + 0.5 = **14.8 ms**.
