title: INT8 Quantization and Tensor Core Throughput on Orin
scenario: Your Jetson Orin runs a YOLOv8-M model in FP16 at 22ms per frame (45 fps).
  Converting to INT8 should theoretically give 2× Tensor Core throughput (275 TOPS
  INT8 vs 138 TFLOPS FP16). Measure the actual expected speedup accounting for memory
  bandwidth, quantization overhead, and mixed-precision layers.
question: What is the corrected expected INT8 latency for the 22 ms YOLOv8-M path
  after adding memory, quantization, mixed-precision, and overhead terms?
details:
  realistic_solution: 'Total INT8 latency: 7.7ms (compute) + 3.3ms (memory) + 2.2ms (mixed-precision) + 1.1ms (unaccounted) + 0.5ms (quantization overhead) = 14.8ms. The 1.1ms represents the 5% of the original 22ms FP16 latency that was unaccounted for and did not receive a speedup.'
  common_mistake: 'Assuming 2× Tensor Core throughput translates to a 2× model speedup (11ms). Many layers are memory-bound (not compute-bound), quantization adds dequantize overhead, and some layers (like the detection head) may remain in FP16 for accuracy. Also, forgetting to carry over the unaccounted 5% overhead from the original profile.'
  napkin_math: 'Original 22ms FP16 breakdown: 70% compute (15.4ms), 15% memory (3.3ms), 10% mixed-precision (2.2ms), 5% unaccounted (1.1ms). After INT8 conversion: Compute gets 2× speedup (15.4 / 2 = 7.7ms). Memory stays 3.3ms. Mixed-precision stays 2.2ms. Unaccounted stays 1.1ms. New quantization overhead adds 0.5ms. Total = 7.7 + 3.3 + 2.2 + 1.1 + 0.5 = 14.8ms.'
