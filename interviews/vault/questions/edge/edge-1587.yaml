title: TensorRT INT8 Graph Optimization on Jetson Orin
scenario: You are deploying an autonomous navigation model to an NVIDIA Jetson Orin edge node. By applying ahead-of-time compilation via TensorRT, you fuse operators and quantize the graph to INT8 to utilize the Ampere GPU and DLA accelerator. The unoptimized FP16 graph required 1.65 Tera-operations per frame, while the compiled and optimized INT8 graph requires only 0.55 Tera-operations per frame.
question: Calculate the theoretical maximum throughput (in FPS) for the compiled graph and the energy consumed per frame assuming the system operates at its peak 60W TDP.
details:
  realistic_solution: The correct approach evaluates the performance using the compiled, post-fusion INT8 graph requirements against the Jetson Orin's peak INT8 capability. Once the maximum FPS is established, dividing the system's power envelope by the throughput gives the energy per frame, which is a critical thermal and battery metric for edge deployments.
  common_mistake: |
    **The Pitfall:** Using the unoptimized operations count or confusing Tera-operations with Giga-operations.
    **The Rationale:** Candidates fail to evaluate the post-fusion INT8 performance against the correct hardware limit, or they fail to link Watts to Joules.
    **The Consequence:** Producing completely inaccurate FPS and energy consumption estimates.
  napkin_math: |
    - **Theoretical Max FPS:** 275 TOPS / 0.55 Tera-operations = **500 FPS**.
    - **Energy per frame:** 60 Watts (Joules/sec) / 500 FPS = 0.12 Joules per frame (**120 mJ**).
