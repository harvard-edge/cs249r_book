title: TensorRT INT8 Graph Optimization on Jetson Orin
scenario: You are deploying an autonomous navigation model to an NVIDIA Jetson Orin
  edge node. By applying ahead-of-time compilation via TensorRT, you fuse operators
  and quantize the graph to INT8 to utilize the Ampere GPU and DLA accelerator. The
  unoptimized FP16 graph required 1.65 Tera-operations per frame, while the compiled
  and optimized INT8 graph requires only 0.55 Tera-operations per frame. Calculate
  the theoretical maximum throughput (in FPS) for the compiled graph and the energy
  consumed per frame assuming the system operates at its peak 60W TDP.
question: For the TensorRT-compiled 0.55 TOP/frame INT8 graph on Jetson Orin, what
  max FPS and energy per frame do you expect at 60W?
details:
  realistic_solution: The correct approach evaluates the performance using the compiled,
    post-fusion INT8 graph requirements against the Jetson Orin's peak INT8 capability.
    Once the maximum FPS is established, dividing the system's power envelope by the
    throughput gives the energy per frame, which is a critical thermal and battery
    metric for edge deployments.
  common_mistake: Candidates often use the unoptimized operation count for their throughput
    calculations or confuse the units between Tera-operations and Giga-operations.
    They also frequently fail to properly connect Watts (Joules per second) to FPS
    (Frames per second) to calculate energy per frame.
  napkin_math: Theoretical Max FPS = Peak INT8 Compute / Optimized Compute per Frame
    = 275 TOPS / 0.55 Tera-operations = 500 FPS. Energy per frame = Peak Power (TDP)
    / FPS = 60W (Joules/sec) / 500 FPS = 0.12 Joules per frame (or 120 mJ).
