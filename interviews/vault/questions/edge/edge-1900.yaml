title: Optimizing Latency on Edge Accelerators for LLM Inference
scenario: 'You are deploying a large language model (LLM) for real-time sentiment analysis on an edge device equipped with 32 GB LPDDR4x memory and a dedicated high-TOPS accelerator. The pipeline experiences inconsistent latency spikes, occasionally exceeding the strict 50ms end-to-end latency budget.'
question: "How would you systematically find and fix the bottlenecks causing latency spikes beyond the 50 ms budget?"
details:
  realistic_solution: 'Start with high-level system profiling (nsys, perf) to isolate the CPU, memory, or accelerator bottleneck. The raw compute power makes it highly unlikely the accelerator is the issue. Instrumentation and SDK trace tools will likely reveal that the 50ms budget is consumed by memory-bound data transfers from the LPDDR4x or inefficient host-side CPU tokenization. Implement zero-copy techniques, optimize memory layouts, and offload CPU pre-processing.'
  common_mistake: |
    **The Pitfall:** Blindly micro-optimizing ML kernels before establishing the true bottleneck.
    **The Rationale:** Candidates often jump to modifying the model architecture or assume cloud profiling tools provide insights into specialized edge accelerators.
    **The Consequence:** Wasting engineering effort on non-critical paths while ignoring massive latency from host CPU pre-processing or inefficient memory transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator: 400 TOPS (400 * 10^12 INT8 ops/sec).
       - LLM inference requires 200 billion INT8 ops.
       - Budget: 50ms.
    2. **Calculations:**
       - Compute time = (2 * 10^11) / (400 * 10^12) = 0.5 ms.
       - LPDDR4x transfer of 1GB at 50 GB/s = ~20ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth / Host-Bound (Not Compute)**
