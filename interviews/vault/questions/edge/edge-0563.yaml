title: The Multi-Resolution Input Strategy
scenario: 'Your autonomous security patrol robot runs YOLOv8-S on a Jetson Orin NX at 640×640 input resolution,
  achieving 28 FPS at 22W. During summer patrols, the sealed enclosure heats up and the Orin throttles
  to 15W, dropping to 19 FPS — below your 25 FPS safety minimum. Your colleague proposes a simple fix:
  ''When thermal throttling is detected, switch to 320×320 input.'' Analyze the compute savings, accuracy
  impact, and design a proper adaptive resolution system.'
details:
  realistic_solution: 'Resolution reduction affects compute quadratically for convolutional layers (FLOPs
    scale with H×W) but has fixed costs that don''t scale:'
  common_mistake: '"320×320 is 4× fewer pixels, so it''s 4× faster." The relationship between resolution
    and inference time is not purely linear due to fixed overhead costs.'
  napkin_math: '640→320: FLOPs 28.4G → 7.1G (4×). Total time: 36ms → 13.5ms (2.67×, fixed costs). At 15W
    throttled: 640 = 50ms (20 FPS ✗), 480 = 28ms (35 FPS ✓), 320 = 17ms (59 FPS ✓). Accuracy: 640 mAP
    = 44.9%, 480 mAP ≈ 40%, 320 mAP ≈ 33%. Detection range: 640 detects persons to ~100m, 320 to ~50m.
    For a patrol robot at 2 m/s with 5m stopping distance: 50m detection range gives 22.5s reaction time
    — sufficient.'
