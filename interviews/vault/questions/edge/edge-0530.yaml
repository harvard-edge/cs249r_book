title: The Preempt-RT Kernel Tick Overhead
scenario: You compile a custom Linux kernel with the PREEMPT_RT patch to guarantee hard real-time latency for your edge robot's motor controller. You configure the kernel timer tick frequency (HZ) to 1000 Hz for maximum responsiveness. The motor controller works perfectly. However, the background ML perception model (which ran fine at 30 FPS on standard Linux) now struggles to hit 15 FPS.
question: Why did a real-time kernel destroy your ML throughput?
details:
  realistic_solution: 'The PREEMPT_RT kernel with HZ=1000 introduces massive timer interrupt overhead. Each interrupt triggers a context save, scheduler evaluation, and context restore. Worse, PREEMPT_RT makes every kernel code path preemptible, adding lock overhead. The fix: use HZ=250 for the ML pipeline, isolate the motor controller on a dedicated CPU core with HZ=1000 using `isolcpus`, and run the ML model on the remaining cores with a standard scheduler.'
  common_mistake: |
    **The Pitfall:** Assuming the motor controller is hogging the CPU resources.
    **The Rationale:** Candidates often jump to application-level profiling, assuming the new real-time task is using 100% of the core, completely missing the OS-level tick overhead.
    **The Consequence:** Wasting time profiling the motor controller while the actual CPU cycles are burning inside the kernel's scheduler and interrupt handlers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Timer tick frequency (HZ) = 1000 Hz.
       - Context save/scheduler/restore overhead per interrupt = 20 microseconds.
    2. **Calculations:**
       - 1,000 interrupts/sec * 20 us/interrupt = 20,000 microseconds/sec.
       - 20,000 us = 20 ms per second.
       - 20 ms / 1000 ms = 2%.
    3. **Conclusion & Interpretation:**
       - **Result: OS Overhead-Bound**. You surrender 2% of your total CPU throughput to pure OS bureaucratic overhead, compounded across all cores and thread context switches.
