title: SRAM vs DRAM Energy Roofline
scenario: A wearable health monitor runs an anomaly model continuously. The power budget is strictly 5mW.
  The SoC has an efficient NPU (10 TOPS/W) and 1MB of SRAM. A proposed Transformer-based model requires
  5 M-Operations per inference at 100 Hz, and 2MB of weights. Because it exceeds SRAM, the weights must
  be streamed from off-chip DRAM for every inference. Evaluate if the new model fits within the 5mW budget.
question: "Does the 2MB Transformer model fit the 5mW power budget at 100 Hz, and what dominates the energy?"
details:
  realistic_solution: The compute power alone is minimal (0.05 mW) and easily fits the budget, but the
    true failure point is the memory access energy. Fetching data from off-chip DRAM consumes orders of
    magnitude more energy per byte than on-chip SRAM or the compute operations themselves. Streaming 2MB
    of weights from DRAM at 100 Hz draws 20 mW, which is 4x the entire device power budget. The Transformer
    model is completely infeasible not because of compute operations, but because the memory-bound nature
    of the larger weights catastrophically breaches the energy roofline.
  common_mistake: Calculating only the compute power (0.5 GOPS / 10 TOPS/W = 0.05 mW) and concluding the
    model perfectly fits the budget, completely ignoring the DRAM access energy.
  napkin_math: 'Compute power: 5 M-Ops * 100 Hz = 500 MOPS = 0.5 GOPS.

    Compute power draw = 0.5 GOPS / 10,000 GOPS/W (10 TOPS/W) = 0.00005 W = 0.05 mW.

    Memory bandwidth: 2MB * 100 Hz = 200 MB/s.

    Assuming typical LPDDR DRAM access costs ~100 pJ/byte:

    Memory power draw = 200 * 10^6 bytes/s * 100 * 10^-12 J/byte = 0.02 W = 20 mW.

    Total power = 0.05 mW + 20 mW = 20.05 mW. This is 4x the strict 5mW budget.'
