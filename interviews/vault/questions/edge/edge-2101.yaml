title: Data-Efficient Continuous Learning for Anomaly Detection on NVIDIA Jetson Orin
scenario: You are tasked with deploying a real-time anomaly detection system for industrial machinery on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). The system processes high-frequency sensor data streams (e.g., 1000 samples/sec per sensor, from 100 sensors, each sample being 16 bytes). Raw data cannot be continuously offloaded. The model requires occasional on-device updates (e.g., daily fine-tuning) to adapt to changing machine behaviors.
question: How would you design the Jetson Orin data pipeline to avoid the data wall and model collapse during daily on-device fine-tuning?
details:
  realistic_solution: 'Implement a dynamic data selection strategy on the Jetson Orin. This includes: 1) Online Coreset Selection/Data Pruning using techniques like reservoir sampling, diversity-based selection (e.g., k-center greedy on embeddings), or uncertainty sampling (active learning) to pick novel, informative data points. 2) Curriculum Learning for fine-tuning, where selected data is organized from easier to more challenging examples. 3) Judicious use of Synthetic Data Generation on-device to augment scarce anomaly data. 4) Continuous monitoring and application of the ICR framework to balance data quality/diversity with computational cost, optimizing coreset selection algorithms to stay within the 275 TOPS INT8 and 60W budget. 5) Implementing a rolling buffer for selected data, ensuring the fine-tuning dataset remains within a manageable size (e.g., 5-10 GB) to preserve overall system stability and performance.'
  common_mistake: |
    **The Pitfall:** Storing all incoming sensor data for on-device fine-tuning.
    **The Rationale:** Engineers often default to standard cloud-based batch training practices where retaining massive datasets is feasible.
    **The Consequence:** This quickly exhausts the 32 GB LPDDR5 memory, causes excessive I/O that violates the 60W power budget, and risks model collapse as the dataset becomes dominated by stale or redundant normal operational data.
  napkin_math: |
    1. **Raw Data Rate**: 100 sensors * 1000 samples/sec * 16 bytes = 1.6 MB/sec.
    2. **Daily Accumulation**: 1.6 MB/sec * 3600 sec/hr * 24 hr/day ≈ 138.24 GB/day.
    3. **Hardware Constraint**: 138 GB/day > 32 GB LPDDR5 (Data Wall hit).
    4. **Resolution**: Applying a 1% coreset selection ratio reduces daily storage to **~1.38 GB**, making continuous fine-tuning viable.
