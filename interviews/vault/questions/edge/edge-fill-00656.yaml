title: 'Transformer LLM Deployment on NVIDIA Jetson Orin: Cost-Performance Analysis'
scenario: You are tasked with deploying a 7-billion parameter Transformer-based Large Language Model (LLM)
  onto an NVIDIA Jetson Orin module (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for on-device, real-time inference.
  The LLM primarily uses FP16 for weights and activations but can leverage INT8 for specific operations.
  The target application requires generating a continuous stream of tokens with a maximum context window
  of 2048 tokens and a latency target of less than 100ms per token.
question: "How would you deploy the 7B FP16/INT8 LLM on Jetson Orin to meet a 2048-token context and <100 ms per token latency?"
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Aggressive quantization
    (e.g., INT8 for linear layers) to reduce model size and leverage Orin''s INT8 TOPS. 2) Employing optimized
    inference libraries (e.g., TensorRT) and kernel fusion. 3) Implementing a dynamic KV-cache management
    strategy (e.g., paged attention) or selective compression. 4) Exploring linear attention mechanisms
    or windowed attention to mitigate O(N^2) complexity where applicable. 5) Careful batching considering
    the 32GB LPDDR5 memory and 60W power budget.'
  common_mistake: A common mistake is underestimating the memory footprint of the KV-cache, especially
    for long context windows and larger batch sizes, often leading to out-of-memory errors or severe performance
    degradation due to memory bandwidth saturation, even if the parameter memory fits.
  napkin_math: For a 7B parameter FP16 model, the base weight memory is 7B * 2 bytes/param = 14 GB. The
    KV-cache for a single sequence with a 2048-token context, 32 layers, and a hidden dimension of 4096
    (FP16) would be approximately 2 * 2048 * 32 * 4096 * 2 bytes ≈ 1 GB. This shows that the KV-cache
    significantly consumes the 32 GB LPDDR5 memory, particularly if batching is used or multiple models
    are loaded. The 275 INT8 TOPS provides considerable compute, but FLOPs will need to be converted to
    INT8 operations for a true comparison.
