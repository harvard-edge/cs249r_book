title: Diagnosing SRAM Thrashing in Edge Accelerators
scenario: You are deploying an INT8 object detection model on an edge AI accelerator equipped with exactly
  2.0MB of on-chip SRAM and external LPDDR4 DRAM. The model consists of 1.8MB of weights and requires
  800KB for peak intermediate activations. During performance profiling, you observe that inference latency
  is 3x slower than the theoretical compute-bound roofline limit, and the system power consumption is
  significantly higher than expected. How do you diagnose the root cause of this anomaly?
details:
  realistic_solution: The root cause is SRAM capacity overflow. The combined footprint of weights (1.8MB)
    and peak activations (0.8MB) is 2.6MB, exceeding the 2.0MB SRAM limit. This forces continuous eviction
    and fetching of tensors from external DRAM. Diagnosis involves profiling DRAM bandwidth utilization
    or SRAM miss rates. The solution is to apply operator fusion to reduce the peak activation size or
    use depth-first inference scheduling to keep the active working set under 2.0MB.
  common_mistake: Candidates often assume that because the 1.8MB model weights are smaller than the 2.0MB
    SRAM capacity, they can be permanently pinned in fast memory. They fail to analyze the concurrent
    memory footprint (weights + activations) and overlook the resulting DRAM thrashing.
  napkin_math: Total Memory Needed = 1.8MB (weights) + 0.8MB (activations) = 2.6MB. SRAM Capacity = 2.0MB.
    The 0.6MB deficit forces DRAM spillage. Fetching from LPDDR4 costs ~100 pJ/bit vs SRAM's ~1 pJ/bit.
    Loading 1.8MB of weights from DRAM per inference frame consumes 1.8MB * 8 bits/byte * 100 pJ/bit ≈
    1.44mJ of memory transfer energy alone, dominating both latency and the thermal budget.
  options:
  - The power budget should be managed at the application level by adding sleep intervals between inferences,
    with no firmware changes needed.
  - Running inference at lower clock speeds increases total energy consumption because the task takes
    longer to complete.
  - The root cause is SRAM capacity overflow. The combined footprint of weights (1.8MB) and peak activations
    (0.8MB) is 2.6MB, exceeding the 2.0MB SRAM limit. This forces continuous eviction and fetching of
    tensors from external DRAM.
  - Candidates often assume that because the 1.8MB model weights are smaller than the 2.0MB SRAM capacity,
    they can be permanently pinned in fast memory. They fail to analyze the concurrent memory footprint
    (weights + activations) and overlook the resulting DRAM thrashing.
