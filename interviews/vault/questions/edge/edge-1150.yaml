title: 'Edge TCO Design: Hailo-8 ROI for Smart Agriculture'
scenario: 'Design an edge inference deployment for crop disease detection across 1000 farms using Hailo-8 (26 TOPS INT8, 2.5W, $200). Each farm takes 5 images/day from drone. Alternative: cloud inference at $0.01/image. Calculate break-even point in months and 5-year ROI. Include battery considerations (solar + 10Ah LiPo at 3.7V = 37Wh) and connectivity (LoRa at $5/month).'
question: What is the break-even point and 5-year ROI for deploying Hailo-8 edge inference on 1000 farms versus cloud inference?
details:
  realistic_solution: 'Cloud cost: 1000 farms * 5 images * 30 days * $0.01 = $1,500/month. Edge cost: CapEx is $200 * 1000 = $200,000 for Hailo-8. Edge OpEx (LoRa): $5 * 1000 = $5,000/month. Since Edge OpEx ($5K/mo) exceeds Cloud OpEx ($1.5K/mo), the deployment never breaks even on compute costs alone unless cloud connectivity (sending 5 images/day over LTE) costs more than $3.50/month per farm. Regarding power: 2.5W running 24/7 uses 60Wh/day. A 37Wh battery cannot support 24/7 operation (drains in 14.8 hours). The device must be duty-cycled to wake up only for the 5 drone images.'
  common_mistake: 'Failing to realize that LoRa connectivity for edge inference ($5/mo) is more expensive than the direct cloud inference API cost ($1.50/mo), and that a 37Wh battery cannot sustain 24/7 2.5W power draw.'
  napkin_math: 'Cloud API: 5 img/day * 30 * $0.01 = $1.50/mo. Edge LoRa = $5/mo. Edge loses $3.50/mo/farm without factoring in LTE savings. Battery: 37Wh / 2.5W = 14.8 hours. Need duty cycling. 5 inferences take seconds. If idle power is negligible, 37Wh easily covers the active time.'
