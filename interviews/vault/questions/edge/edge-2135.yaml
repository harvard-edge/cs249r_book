title: Roofline Analysis for CNN Inference on Jetson Orin Nano
scenario: You deploy ResNet-50 on Jetson Orin Nano (70 TOPS INT8, LPDDR5 at 68 GB/s). The first conv layer has 3x224x224 input, 64 filters of 7x7. You measure 18 TOPS throughput. Plot this on the roofline and identify which axis is limiting.
question: Where does ResNet-50 conv1 land on the Orin roofline, and is compute or memory bandwidth limiting the 18 TOPS result?
details:
  realistic_solution: |
    Conv1 FLOPs = 2*64*3*7*7*112*112 \approx 236M FLOPs. Memory = (3*224*224 + 64*3*7*7 + 64*112*112)*1 byte \approx 150KB + 9KB + 803KB = 962KB. AI = 236M FLOPs / 962KB \approx 245 FLOPs/byte. Ridge = 70e12/68e9 \approx 1029 FLOPs/byte. This layer is memory-bound; theoretical max = 68 GB/s * 245 FLOPs/byte \approx 16.7 TOPS. Achieved 18 TOPS suggests some on-chip cache reuse is happening, slightly exceeding the naive memory bandwidth ceiling.
  common_mistake: |
    **The Pitfall:** Using peak TOPS without accounting for memory bandwidth limits.
    **The Rationale:** Ignoring the Roofline model for early convolutional layers.
    **The Consequence:** Setting unrealistic latency targets that are physically impossible due to low channel counts and memory saturation.
  napkin_math: |
    - **Ridge Point:** 70 TOPS / 68 GB/s ≈ 1029 FLOPs/byte.
    - **Conv1 AI:** 236M FLOPs / 963 KB ≈ 245 FLOPs/byte.
    - **Status:** AI (245) < Ridge (1029), so it is severely memory-bound.
    - **Theoretical Ceiling:** 68 GB/s * 245 FLOPs/byte ≈ 16.7 TOPS.
    - **Observed:** 18 TOPS suggests slight on-chip cache reuse exceeding the naive ceiling.
