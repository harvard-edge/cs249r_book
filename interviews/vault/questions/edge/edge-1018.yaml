title: 'Specification: define CNN model requirements for Hailo-8 production deployment'
scenario: You are writing the model specification for a Hailo-8-based embedded vision product (26 TOPS, 2.5W). The product must classify 20 product categories at 30 FPS using a MobileNet-family backbone.
question: What complete model specification would you write for a 20-class, 30 FPS MobileNet-family classifier on Hailo-8?
details:
  realistic_solution: 'Model spec: (1) Architecture family: MobileNetV3 or EfficientNet-Lite; (2) FLOPs budget: ≤0.5 GFLOPs (leaves >99% headroom on Hailo-8 at 30 FPS for other system tasks); (3) Accuracy: ≥92% top-1 on proprietary 20-class dataset; (4) Input: 224×224 RGB; (5) Hailo constraints: all channel counts divisible by 4, activations: ReLU6 only, no SE blocks (not natively supported in DFC v3.x); (6) Quantization: INT8 with <2% accuracy drop vs FP32; (7) Latency: <2ms per inference at batch=1; (8) Test: 500-image validation set, 30-day stability test at 40°C.'
  common_mistake: |
    **The Pitfall:** Specifying a FLOPs budget without Hailo-8-specific constraints.
    **The Rationale:** Candidates forget that dataflow accelerators have strict operator and topology limitations.
    **The Consequence:** The specified model fails to compile or run efficiently because it uses unsupported operators or non-divisible channel counts.
  napkin_math: |
    - **Compute Budget:** 0.5 GFLOPs × 30 FPS = **15 GOPS**.
    - **Utilization:** 15 GOPS / 26,000 GOPS = **0.058% TOPS utilization**.
    - **Thermal Estimate:** Active power is extremely low (~0.6W), keeping the system well under the 2.5W TDP.
    - **Memory Target:** ~5M params × 1B (INT8) = **5MB weights**. Activations fit easily within Hailo-8's ~14MB SRAM.
