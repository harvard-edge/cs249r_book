title: Zero-Copy Host Streaming Architecture for Hailo-8 Memory
scenario: You are designing a multi-camera edge gateway utilizing a Hailo-8 M.2 module (26 TOPS INT8,
  2.5W) for real-time perception. Because the Hailo-8 has no local DRAM and relies entirely on streaming
  data from host memory over PCIe, your system processes four simultaneous 1080p video streams decoded
  by the host CPU. Despite showing 400MB of free RAM in steady-state, the 2GB host system experiences
  sporadic OS-level OOM kills after several days of uptime. Architect a system-level memory management
  strategy from first principles that resolves these OOMs while meeting the Hailo-8's zero-copy streaming
  requirements.
details:
  realistic_solution: Architect a unified, pre-allocated ring buffer pool of physically contiguous DMA-coherent
    memory during system boot. Video decoders write directly into this pre-allocated pool, and the Hailo-8
    driver reads from it via zero-copy PCIe DMA. By never allocating or freeing memory during steady-state
    operation, physical memory fragmentation is permanently eliminated, and host memory pressure is strictly
    capped.
  common_mistake: Candidates often suggest adding swap space, tweaking Linux OOM killer scores, or using
    standard OS memory allocators (malloc/new) for each frame. They fail to recognize that the Hailo-8's
    lack of local DRAM places immense pressure on physically contiguous host memory for DMA transfers,
    leading to severe memory fragmentation over time rather than an absolute memory leak.
  napkin_math: 'Four 1080p streams require 1920x1080x3 bytes = 6.22MB per raw RGB frame. To prevent pipeline
    stalls on the Hailo-8, we need a depth of 4 input buffers per stream: 4 streams * 4 buffers * 6.22MB
    = ~100MB input pool. Assuming 2MB output tensors per frame: 4 streams * 4 buffers * 2MB = 32MB output
    pool. Streaming model weights require ~50MB. Total contiguous memory to reserve at boot is 100MB +
    32MB + 50MB = 182MB. Reserving this strict 182MB pool upfront prevents CMA (Contiguous Memory Allocator)
    allocation failures in the 2GB system over indefinite uptimes.'
