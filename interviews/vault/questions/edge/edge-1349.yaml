title: Distilling to INT8 for Google Coral Edge TPU
scenario: Your team has trained a massive FP32 teacher model for an object detection task, but deployment is targeted for a Google Coral Edge TPU. The Coral only supports INT8 operations and has a peak throughput of 4 TOPS within a strict 2W power budget. You need to design a knowledge distillation pipeline that trains a student model specifically tailored for this hardware.
question: How would you design the Coral Edge TPU student distillation pipeline, and what theoretical max FPS does a 50 GOPs/frame student achieve?
details:
  realistic_solution: |
    The optimal approach is to use Quantization-Aware Training (QAT) in conjunction with Knowledge Distillation. The student model should have fake-quantization nodes inserted during training, allowing it to mimic the teacher's soft targets while explicitly modeling the INT8 constraints of the Coral Edge TPU.
  common_mistake: |
    **The Pitfall:** Performing standard knowledge distillation first and then post-training quantization (PTQ) to INT8.
    **The Rationale:** Separating the distillation and quantization steps is a common cloud paradigm.
    **The Consequence:** Severe accuracy degradation because the student model hasn't learned to compensate for the quantization errors during the distillation process.
  napkin_math: |
    - **Hardware Compute:** 4 TOPS = 4000 GOPs.
    - **Model Requirement:** 50 GOPs / frame.
    - **Theoretical Max FPS:** 4000 GOPs / 50 GOPs/frame = **80 FPS**.
