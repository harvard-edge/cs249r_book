title: Distilling to INT8 for Google Coral Edge TPU
scenario: Your team has trained a massive FP32 teacher model for an object detection
  task, but deployment is targeted for a Google Coral Edge TPU. The Coral only supports
  INT8 operations and has a peak throughput of 4 TOPS within a strict 2W power budget.
  You need to design a knowledge distillation pipeline that trains a student model
  specifically tailored for this hardware. Assuming the student model requires 50
  GOPs (Giga Operations per second) per inference frame, calculate the theoretical
  maximum FPS achievable on the Coral Edge TPU.
question: How would you design the Coral Edge TPU student distillation pipeline, and
  what theoretical max FPS does a 50 GOPs/frame student achieve?
details:
  realistic_solution: The optimal approach is to use Quantization-Aware Training (QAT)
    in conjunction with Knowledge Distillation. The student model should have fake-quantization
    nodes inserted during training, allowing it to mimic the teacher's soft targets
    while explicitly modeling the INT8 constraints of the Coral Edge TPU. This ensures
    the distilled model maintains accuracy when fully quantized for deployment.
  common_mistake: Candidates often suggest performing standard knowledge distillation
    first and then applying post-training quantization to INT8. This frequently leads
    to severe accuracy degradation on the Coral because the student model hasn't learned
    to compensate for the quantization errors during the distillation process.
  napkin_math: 'Coral Edge TPU peak throughput = 4 TOPS = 4,000 GOPs. Student model
    requirement = 50 GOPs / frame. Theoretical Max FPS = (4,000 GOPs / second) / (50
    GOPs / frame) = 80 FPS. (Note: Real-world FPS will be lower due to memory bandwidth
    and overhead).'
