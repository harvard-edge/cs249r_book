title: Edge Fleet Compute Cost Estimate
scenario: A city deploys 3,000 traffic cameras. Each edge box runs a detector costing
  12 GOP per frame at 5 FPS. Estimate total fleet operations per second and explain
  why cloud offload is not automatically cheaper.
question: How many operations per second does a 3,000-camera edge fleet need at 12
  GOP/frame and 5 FPS?
details:
  realistic_solution: Each camera needs 12 x 5 = 60 GOP/s. Across 3,000 cameras, the
    fleet needs 180,000 GOP/s, or 180 TOPS sustained. Cloud offload would also carry
    network bandwidth, latency, and privacy costs, so compute alone does not decide
    placement.
  common_mistake: Multiplying by cameras but forgetting frame rate, or comparing edge
    compute cost to cloud compute while ignoring upload bandwidth.
  napkin_math: 'Per camera demand = 12 GOP/frame x 5 frames/s = 60 GOP/s. Across 3,000
    cameras: 60 x 3,000 = 180,000 GOP/s = 180 x 10^12 ops/s = 180 TOPS.'
