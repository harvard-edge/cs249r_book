title: Edge Fleet Compute Cost Estimate
scenario: 'A city deploys 3,000 traffic cameras. Each edge box runs a detector costing 12 GOP per frame at 5 FPS.'
question: How many operations per second does a 3,000-camera edge fleet need at 12 GOP/frame and 5 FPS?
details:
  realistic_solution: 'Each camera needs 12 x 5 = 60 GOP/s. Across 3,000 cameras, the fleet needs 180,000 GOP/s, or 180 TOPS sustained. Cloud offload would also carry network bandwidth, latency, and privacy costs, so compute alone does not decide placement.'
  common_mistake: |
    **The Pitfall:** Multiplying by cameras but forgetting the frame rate, or comparing edge compute cost directly to cloud compute.
    **The Rationale:** Candidates often focus purely on operations per frame and forget the temporal dimension (FPS), or ignore the massive network bandwidth required to upload raw video.
    **The Consequence:** Drastically underestimating compute requirements or proposing an unfeasible cloud architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 3,000 cameras.
    - Compute per frame: 12 GOP.
    - Frame rate: 5 FPS.

    **Calculations:**
    - Per camera demand = 12 GOP/frame * 5 frames/s = 60 GOP/s.
    - Fleet demand = 60 GOP/s * 3,000 cameras = 180,000 GOP/s.

    **Conclusion & Interpretation:**
    - **Result: 180 TOPS (Compute Requirement).** The fleet requires 180 TOPS sustained compute, indicating significant edge deployment requirements.
