title: ADAS SoC L3 Cache Contention
scenario: You are designing an automotive ADAS SoC with an 8-core CPU, a shared 16MB L3 cache, and a discrete
  NPU sharing LPDDR5 DRAM. When running a Vision Transformer (ViT) on the NPU in isolation, latency is
  15ms. When simultaneously running LiDAR point-cloud preprocessing on the CPU, the ViT latency degrades
  to 42ms.
details:
  realistic_solution: The degradation is caused by cache contention and thrashing in the shared L3 cache
    and DRAM bus. The CPU's random memory access patterns for LiDAR preprocessing are evicting the NPU's
    localized tensor data. The architectural solution requires strict memory isolation. Implement Cache
    Quality of Service (QoS) / Cache Allocation Technology (CAT) to hard-partition the L3 cache (e.g.,
    8MB locked for NPU, 8MB for CPU). Additionally, map the NPU's large intermediate activation buffers
    as 'non-cacheable' to bypass the L3 entirely, forcing them directly to LPDDR5 via DMA, preserving
    the L3 for latency-sensitive weights.
  common_mistake: Lowering the CPU priority of the LiDAR thread, which doesn't stop the cache eviction
    when the thread actually is scheduled to run.
  napkin_math: ViT needs 8MB working set; LiDAR needs 12MB. 8+12 = 20MB > 16MB L3. Thrashing causes DRAM
    trips (100ns vs 15ns L3). 10,000 memory accesses * 85ns penalty = 0.85ms per layer * 32 layers = ~27ms
    extra latency.
