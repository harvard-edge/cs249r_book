title: 'Edge TPU Deployment: Encoder-Decoder Model Latency Diagnosis'
scenario: Your team is deploying a new natural language understanding (NLU) service on a fleet of Google Coral Edge TPUs. The chosen model is a compressed, but still full-fledged, sequence-to-sequence (encoder-decoder) architecture for a complex NLU task. After initial deployment, you observe that the end-to-end inference latency is consistently higher than acceptable (e.g., >500ms per inference), and some devices are intermittently reporting thermal warnings, impacting overall system reliability. The model is already quantized to INT8 as required by the Coral TPU.
question: What architectural and deployment issues likely cause >500ms latency and thermal warnings for the INT8 encoder-decoder NLU model on Coral Edge TPU?
details:
  realistic_solution: 'Instead of a monolithic encoder-decoder, consider task specialization (breaking down the task into an encoder-only MobileBERT variant) or model partitioning (offloading the heavy decoder to a local gateway). Encoder-decoder models frequently exceed the Edge TPU''s tight power and memory budgets due to massive intermediate activation movement.'
  common_mistake: |
    **The Pitfall:** Porting large generic encoder-decoder architectures directly to highly constrained edge devices.
    **The Rationale:** Candidates assume quantization automatically solves all performance problems without considering memory movement.
    **The Consequence:** Memory bandwidth saturation causes the TPU to repeatedly stall, resulting in >500ms latency and thermal warnings due to continuous high-power memory fetching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute limit: 4 TOPS (INT8).
       - Target Operations: 20 billion INT8 ops.
       - Intermediate Activations: 50 MB.
       - Memory Bus Speed: 100 MB/s.
    2. **Calculations:**
       - Theoretical Compute Time: 20e9 / 4e12 = 0.005 seconds (5 ms).
       - Decoder Memory Movement (10 passes): 50 MB * 10 passes = 500 MB.
       - Transfer Time: 500 MB / 100 MB/s = 5 seconds (5000 ms).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Data movement completely dominates the theoretical compute, causing catastrophic >500ms latency despite sufficient TOPS.
