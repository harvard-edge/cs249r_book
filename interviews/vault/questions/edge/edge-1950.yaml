title: 'Edge TPU Deployment: Encoder-Decoder Model Latency Diagnosis'
scenario: 'Your team is deploying a new natural language understanding (NLU) service on a fleet of Google Coral Edge TPUs. Each Coral Edge TPU provides 4 TOPS (Trillions of Operations Per Second) for INT8 operations and consumes approximately 2W of power. The chosen model is a compressed, but still full-fledged, sequence-to-sequence (encoder-decoder) architecture for a complex NLU task. After initial deployment, you observe that the end-to-end inference latency is consistently higher than acceptable (e.g., >500ms per inference), and some devices are intermittently reporting thermal warnings, impacting overall system reliability. The model is already quantized to INT8 as required by the Coral TPU.'
question: What architectural and deployment issues likely cause >500ms latency and thermal warnings for the INT8 encoder-decoder NLU model on Coral Edge TPU?
details:
  realistic_solution: 'Instead of a monolithic encoder-decoder, consider task specialization (breaking down the task into an encoder-only MobileBERT variant) or model partitioning (offloading the heavy decoder to a local gateway). Encoder-decoder models frequently exceed the Edge TPU''s tight power and memory budgets due to massive intermediate activation movement.'
  common_mistake: |
    **The Pitfall:** Porting large generic encoder-decoder architectures directly to highly constrained edge devices.
    **The Rationale:** Candidates assume quantization automatically solves all performance problems without considering memory movement.
    **The Consequence:** Memory bandwidth saturation causes the TPU to repeatedly stall, resulting in >500ms latency and thermal warnings due to continuous high-power memory fetching.
  napkin_math: |
    *   **Theoretical Compute:** A 20 billion INT8 ops model takes 20e9 / 4e12 = 0.005 seconds (5 ms) at 4 TOPS.
    *   **Memory Movement:** Moving 50MB of intermediate activations 10 times across a 100MB/s memory bus takes 500MB / 100MB/s = 5 seconds.
    *   **Result:** **Data movement completely dominates theoretical compute, causing catastrophic latency despite sufficient TOPS.**
