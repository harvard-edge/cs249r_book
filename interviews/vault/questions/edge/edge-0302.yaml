title: The Federated Fleet's Primary Directive
scenario: You are designing the training architecture for a fleet of 100,000 autonomous vehicles. The alternative to centralized training is a federated learning approach.
question: From a systems and economics perspective, what is the primary motivation for choosing federated learning in this context?
details:
  realistic_solution: The primary benefit is the massive reduction in network bandwidth costs and the preservation of user privacy. Raw sensor data (video, LiDAR, etc.) is enormous and prohibitively expensive to upload from a large fleet over cellular networks. Federated learning avoids this by training locally and only transmitting small, aggregated model updates. This also means sensitive user data never leaves the vehicle, which is a critical privacy and security feature.
  common_mistake: |
    **The Pitfall:** Believing federated learning's primary goal is to reduce total compute cost or improve model accuracy.
    **The Rationale:** It is common to conflate edge execution with cost savings, ignoring that federated learning actually offloads computation to the edge and can degrade accuracy compared to centralized training.
    **The Consequence:** Misaligning architectural goals and failing to understand the true network and privacy value propositions of federated learning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000 vehicles.
       - Raw data per vehicle: 20 GB/day.
       - Model update per vehicle: 50 MB/day.
    2. **Calculations:**
       - Centralized upload = 20 GB * 100,000 = 2 PB/day.
       - Federated upload = 50 MB * 100,000 = 5 TB/day.
    3. **Conclusion & Interpretation:**
       - **Result: ~400x bandwidth reduction (5 TB vs 2 PB), ensuring network economic feasibility.**
  options:
  - To reduce total computational cost by offloading training from expensive cloud GPUs to the vehicle's edge processors.
  - To achieve higher model accuracy than is possible with centralized training by using more diverse, real-world data.
  - To massively reduce network bandwidth costs and preserve user privacy by not uploading raw sensor data.
  - To enable faster, lower-latency inference decisions on the vehicle.
  correct_index: 2
