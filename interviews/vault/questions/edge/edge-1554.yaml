title: Optimizing Orin Pipeline Latency Breakdown
scenario: 'Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The camera captures 4K video at 60 FPS, but the end-to-end latency from frame capture to actuation command is currently 85ms, missing the 33ms target. Architecture A runs preprocessing on the CPU, inference on the Ampere GPU (FP16), and postprocessing on the CPU. Architecture B offloads preprocessing to the hardware encoder, runs inference on the Deep Learning Accelerator (DLA) using INT8, and keeps postprocessing on the CPU.'
question: 'Which architecture is more likely to meet the 33 ms latency target, and what is the critical bottleneck in each?'
details:
  realistic_solution: 'Architecture B is superior for meeting the strict latency target. By offloading 4K preprocessing to dedicated hardware, CPU overhead is drastically reduced. While the DLA might have lower peak TOPS than the Ampere GPU, utilizing INT8 on the DLA frees up the GPU for other tasks and provides highly deterministic, low-latency execution for standard convolutions. The critical bottleneck in A is CPU preprocessing and memory transfer; in B, it shifts to the INT8 quantization accuracy drop or the remaining CPU postprocessing.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the theoretical TOPS difference between the GPU and DLA.
    **The Rationale:** The GPU has higher peak compute numbers, so it seems like the faster choice for inference.
    **The Consequence:** Candidates ignore the severe latency penalty of CPU-bound preprocessing for 4K video and the memory transfer costs, failing to meet the real-time deadline.
  napkin_math: |
    * Target Latency: 33ms (for 30 FPS processing).
    * Arch A: CPU Preprocessing (4K image) ~30ms + GPU Inference (FP16) ~40ms + Postprocessing ~15ms = 85ms.
    * Arch B: HW Preprocessing ~5ms.
    * DLA Inference (INT8): Assume model takes 100 GOPs. DLA provides ~100 TOPS = 1ms compute.
    * Memory transfer: 10MB activations * 2 / 200 GB/s = ~0.1ms. Total DLA time ~5ms.
    * CPU Postprocessing: ~10ms.
    * **Total Arch B = 5ms + 5ms + 10ms = 20ms, well under the 33ms target.**
