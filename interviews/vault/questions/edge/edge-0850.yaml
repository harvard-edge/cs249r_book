title: Evaluating Opportunistic On-Device Training Triggers
scenario: You are designing the on-device training scheduler for a federated learning system updating
  a smartphone keyboard's next-word prediction model. The target device has a 4000 mAh battery (operating
  at 3.8V), a peak thermal envelope of 45°C, and requires 20 minutes of continuous NPU compute for a local
  training epoch, which consumes 5W of power. The product manager proposes a scheduling policy to run
  training epochs whenever the device screen has been off for more than 5 minutes to maximize model freshness.
  Evaluate the feasibility of this policy, identify the primary constraint violations, and propose a robust
  set of opportunistic scheduling conditions to prevent user experience degradation.
details:
  realistic_solution: 'Implement a strict tripartite opportunistic scheduling policy: the device must
    be on unmetered Wi-Fi, connected to a power source (charging), and fully idle (screen off for >15
    mins). Additionally, implement a thermal watchdog to pause training if the battery/SoC temperature
    exceeds 40°C.'
  common_mistake: Assuming 'screen-off' implies the device is 'idle' and ignoring the severe battery drain
    and thermal accumulation impact of a sustained 5W workload on a passively cooled device.
  napkin_math: A 5W load at 3.8V draws ~1315 mA. A 20-minute training epoch (0.33 hours) consumes 1315
    * 0.33 = ~438 mAh. This single epoch drains roughly 11% of the 4000 mAh battery capacity. Triggering
    this untethered multiple times during the day would severely degrade battery life.
