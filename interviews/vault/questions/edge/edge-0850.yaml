title: Evaluating Opportunistic On-Device Training Triggers
scenario: You are designing an on-device training scheduler for a smartphone keyboard. The device has a 4000 mAh battery (3.8V), a 45°C thermal limit, and requires 20 minutes of continuous NPU compute for a local training epoch consuming 5W. The product manager proposes running training epochs whenever the device screen has been off for more than 5 minutes.
question: Is running a 20-minute, 5W training epoch whenever the screen is off for 5 minutes feasible, and what scheduling conditions would you require?
details:
  realistic_solution: |
    Implement a strict tripartite opportunistic scheduling policy: the device must be on unmetered Wi-Fi, connected to a power source (charging), and fully idle (screen off for >15 mins). Additionally, implement a thermal watchdog to pause training if the battery/SoC temperature exceeds 40°C.
  common_mistake: |
    **The Pitfall:** Assuming "screen-off" implies the device is "idle" and ignoring battery drain.
    **The Rationale:** Candidates focus on the user's immediate attention rather than the physical constraints of a passively cooled, battery-powered device under sustained load.
    **The Consequence:** Severe battery degradation and thermal throttling, leading to a terrible user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery Capacity: 4000 mAh at 3.8V.
       - Power Draw: 5W.
       - Epoch Duration: 20 minutes (0.33 hours).
    2. **Calculations:**
       - Current Draw: 5W / 3.8V ≈ 1.315 A = 1315 mA.
       - Capacity Consumed: 1315 mA * 0.33 hours = 438 mAh.
       - Battery Impact: 438 mAh / 4000 mAh ≈ 11%.
    3. **Conclusion & Interpretation:**
       - **Result: 11% battery drain per epoch (Energy-Bound).** Unfeasible without external power.
