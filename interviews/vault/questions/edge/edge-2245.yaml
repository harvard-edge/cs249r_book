title: PUE and WUE Optimization for ML Training Infrastructure
scenario: Your on-premises GPU cluster has PUE=1.6 and WUE=2.1 L/kWh. A cloud provider offers PUE=1.2 and WUE=0.5 L/kWh. The cluster runs 800 H100 GPUs at 80% average utilization.
question: What is the annual PUE overhead energy waste, water consumption, savings from cloud migration, and break-even PUE/WUE for on-prem?
details:
  realistic_solution: First, accurately estimate the full IT load by accounting for GPU utilization (80%) and adding the server/networking overhead (~30%). Calculating the annual IT energy yields ~5.1M kWh. Apply the Power Usage Effectiveness (PUE) difference to isolate the raw energy wasted on facility cooling. Applying the Water Usage Effectiveness (WUE) difference reveals massive multi-million liter water waste, heavily favoring the cloud migration strategy from a sustainability perspective.
  common_mistake: |
    **The Pitfall:** Calculating PUE overhead based only on GPU power.
    **The Rationale:** Candidates forget to account for the full IT load, which includes servers, networking, and storage overhead.
    **The Consequence:** PUE applies to total IT load, not just accelerator power, leading to underestimated energy waste.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Power: 800 H100s * 700W = 560 kW.
       - Utilization: 80%.
       - System overhead: 30%.
    2. **Calculations:**
       - Effective IT Load: 560 kW * 0.80 * 1.3 = 582.4 kW.
       - Annual IT Energy: 582.4 kW * 8760 hr = ~5.1M kWh.
       - PUE overhead waste difference: (1.6 - 1.2) * 5.1M kWh = 2.04M kWh/year.
       - Water savings: (2.1 - 0.5) * 5.1M kWh = 8.16M liters/year.
    3. **Conclusion & Interpretation:**
       - **Result: 2.04M kWh energy and 8.16M liters of water wasted.** On-prem requires PUE < 1.2 to achieve operational parity with the cloud provider.
