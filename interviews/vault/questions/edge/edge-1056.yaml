title: 'Kernel Fusion: Design Efficient Inference Kernel for MobileNet on Jetson Orin'
scenario: You are designing an inference kernel for MobileNetV3-Large on Jetson Orin
  (32GB LPDDR5, 275 TOPS INT8, 60W). The network has many Depthwise Separable Convolutions
  followed by BatchNorm and Relu6. Design a fusion strategy and estimate the throughput
  improvement from fusing DWConv + BN + ReLU6.
question: What is the activation size of a 112×112×16 depthwise-conv output in float32,
  and why is 6.4MB wrong?
details:
  realistic_solution: 'Depthwise conv output activations for MobileNetV2 first layer
    (112×112×16 in float32): 112 × 112 × 16 × 4B = 803KB. 6.4MB would require 8× more
    channels or dtype.'
  common_mistake: Fusing DWConv + BN requires BN to be in inference mode (scale/bias
    pre-computed) — not possible during training. Don't confuse training vs inference
    fusion.
  napkin_math: 'MobileNetV2 first depthwise conv: input 112×112×16, DW kernel 3×3.
    DWConv output = 112×112×16 (same channels). Activation size: 112 × 112 × 16 ×
    4B = 802,816 bytes ≈ 802.8KB (not 6.4MB — that would require 112×112×16×32B which
    is impossible for float32).'
