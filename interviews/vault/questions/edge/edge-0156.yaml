title: The Watchdog Timer and the Checkpoint Tax
scenario: You are designing the fault-tolerance system for a vision-based autonomous robot. A hardware watchdog timer is configured to reboot the system if the main control loop doesn't 'pet' it within a 50ms deadline. The loop consists of 5ms for image preprocessing and 2ms for motor control commands. To ensure rapid recovery after a reboot, the system periodically saves a state checkpoint to its NVMe SSD, an operation which takes 1ms.
question: How does the 1ms checkpoint affect the 50ms watchdog budget, and what maximum inference latency is allowed when checkpointing?
details:
  realistic_solution: The watchdog timer imposes a hard real-time budget on the entire control loop. Every operation within the loop consumes a portion of this budget. A checkpoint, even if infrequent, creates a 'worst-case' execution path that is longer than a typical path. To guarantee system stability, we must design for this worst case. The total time spent on fixed overhead (preprocessing, postprocessing) and the checkpoint operation must be subtracted from the watchdog's deadline to find the remaining time budget for the variable-length operation, which is the model inference.
  common_mistake: |
    **The Pitfall:** Focusing solely on average-case inference latency.
    **The Rationale:** Engineers often forget to budget for worst-case execution paths or assume infrequent I/O costs are negligible.
    **The Consequence:** The system experiences unexpected, cascading watchdog timeouts in production.
  napkin_math: |
    * Total watchdog budget: 50ms
    * Fixed overhead: 5ms (preprocessing) + 2ms (motor control) = 7ms
    * Worst-case checkpoint overhead: 1ms (NVMe SSD write)
    * Total worst-case fixed overhead: 7ms + 1ms = 8ms
    * **Maximum allowed inference latency: 50ms - 8ms = 42ms.**
  options:
  - 43ms
  - 49ms
  - 42ms
  - 42.9ms
  correct_index: 2
