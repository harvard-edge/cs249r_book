title: The Watchdog Timer and the Checkpoint Tax
scenario: You are designing the fault-tolerance system for a vision-based autonomous robot. A hardware watchdog timer is configured to reboot the system if the main control loop doesn't 'pet' it within a 50ms deadline. The loop consists of 5ms for image preprocessing and 2ms for motor control commands. To ensure rapid recovery, the system periodically saves a state checkpoint to its NVMe SSD, which takes 1ms.
question: How does the 1ms checkpoint affect the 50ms watchdog budget, and what maximum inference latency is allowed when checkpointing?
details:
  realistic_solution: 'The watchdog imposes a hard real-time budget. A checkpoint creates a worst-case execution path. The total fixed overhead (preprocessing, motor control, and the checkpoint) must be subtracted from the deadline to find the safe budget for inference.'
  common_mistake: |
    **The Pitfall:** Focusing solely on average-case inference latency.
    **The Rationale:** Engineers often forget to budget for worst-case execution paths or assume infrequent I/O costs are negligible.
    **The Consequence:** The system experiences unexpected, cascading watchdog timeouts in production when checkpoints occur.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Watchdog deadline: 50ms
       - Preprocessing: 5ms
       - Motor control: 2ms
       - Checkpoint I/O: 1ms
    2. **Calculations:**
       - Total worst-case fixed overhead: 5ms + 2ms + 1ms = 8ms
       - Maximum allowed inference: 50ms - 8ms = 42ms
    3. **Conclusion & Interpretation:**
       - **Result: 42ms Maximum Inference.** The model must strictly execute under 42ms to guarantee the watchdog is petted during a checkpoint cycle.
  options:
  - 43ms
  - 49ms
  - 42ms
  - 42.9ms
  correct_index: 2
