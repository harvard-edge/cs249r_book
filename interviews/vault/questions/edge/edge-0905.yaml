title: MCU SIMD Alignment for Audio CNNs
scenario: You are deploying a keyword spotting CNN on an ARM Cortex-M4 microcontroller (features DSP extensions,
  32-bit SIMD MAC instructions, 256KB SRAM, 120MHz). The input is a 13-band MFCC spectrogram. Using an
  INT8 quantized model, inference takes 180ms per window, missing the 50ms real-time deadline. Profiler
  shows the CMSIS-NN library is executing standard scalar instructions instead of packed SIMD.
question: "Why is the INT8 keyword-spotting CNN using scalar CMSIS-NN kernels on the Cortex-M4, and how would you hit the 50ms deadline?"
details:
  realistic_solution: The Cortex-M4 DSP extensions (like SMLAD) perform dual 16-bit or quad 8-bit MAC
    operations in a single cycle, but they strictly require data to be 4-byte aligned in memory, and the
    inner loop dimension (usually channels) must be a multiple of 4. Because the input feature has 13
    bands (channels), the CMSIS-NN optimized kernels cannot fully pack the SIMD registers and fall back
    to the unoptimized scalar C implementation, processing one MAC per cycle instead of four. The co-design
    solution is to pad the input features from 13 to 16 bands (filling the extra bands with zeros) and
    ensure all intermediate layer channel counts are multiples of 4. This slightly increases the theoretical
    FLOPs but allows the compiler to map the operations to the SIMD DSP instructions, yielding a near
    4x speedup.
  common_mistake: Overclocking the MCU or aggressively pruning the model, which hurts accuracy and battery
    life.
  napkin_math: 'Theoretical compute: 13 channels * scalar MAC = 13 cycles. Padded compute: 16 channels
    / 4 (SIMD quad MAC) = 4 cycles. Time reduction is 13/4 = 3.25x speedup. At 168MHz, each cycle = 5.95ns.
    Latency drops from 180ms to ~55ms, and with slight loop unrolling, comfortably hits the <50ms target.'
