title: Edge Fallback Capacity
scenario: An edge gateway normally runs a neural detector at 20 FPS. A fallback rule-based detector can run at 80 FPS but has lower accuracy. During thermal throttling, the neural detector drops to 12 FPS, below the 15 FPS minimum. Determine whether fallback restores throughput.
question: Can an 80 FPS rule-based fallback restore throughput when the neural detector drops to 12 FPS and the minimum is 15 FPS?
details:
  realistic_solution: Yes. The fallback exceeds the 15 FPS minimum by a large margin, so it can preserve availability while the neural detector cools down. The tradeoff is lower accuracy during degradation, so use it only under thermal or overload conditions.
  common_mistake: Keeping the neural model active even when it misses the minimum throughput requirement.
  napkin_math: Fallback headroom = 80 - 15 = 65 FPS; throttled neural path is 3 FPS below the minimum.
