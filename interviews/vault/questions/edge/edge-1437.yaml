title: Thermal Throttling on Jetson Orin GPU vs DLA
scenario: We are serving an INT8 vision pipeline on an NVIDIA Jetson Orin (Ampere GPU + DLA accelerator). The model requires 200 TOPS to process multiple video streams. When configured to execute entirely on the Ampere GPU, the system hits thermal throttling after 5 minutes and drops frames. When reconfigured to map specific layers to the DLA, it runs indefinitely.
question: Why does moving some layers from the Ampere GPU to the DLA let the 200 TOPS vision pipeline run without thermal throttling?
details:
  realistic_solution: The system failure is caused by exceeding the 60W Thermal Design Power (TDP) limit when running the Ampere GPU at high utilization. The GPU is flexible but less power-efficient for pure tensor math than the Deep Learning Accelerator (DLA). By offloading a portion of the model's graph to the DLA, the inference server shifts compute to a highly efficient fixed-function block. This reduces the total power draw below the 60W threshold, preventing thermal throttling while still meeting the overall TOPS requirement.
  common_mistake: |
    **The Pitfall:** Assuming that if compute requirements are under the theoretical peak, the system won't throttle.
    **The Rationale:** Candidates ignore the differing performance-per-watt efficiencies of general-purpose GPUs versus fixed-function DLAs.
    **The Consequence:** Severe thermal throttling and dropped frames during continuous serving.
  napkin_math: |
    - GPU requirement (2.5 TOPS/W): 200 TOPS / 2.5 TOPS/W = 80W (exceeds 60W TDP).
    - Split computation: 100 TOPS on DLA, 100 TOPS on GPU.
    - DLA power (10 TOPS/W): 100 TOPS / 10 TOPS/W = 10W.
    - GPU power (2.5 TOPS/W): 100 TOPS / 2.5 TOPS/W = 40W.
    - Total optimized power: 10W + 40W = 50W.
    **The 50W split design leaves a 10W margin under the 60W TDP, preventing thermal throttling.**
