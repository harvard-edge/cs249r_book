title: Memory Footprint Estimation for Qualcomm Cloud AI 100
scenario: You are tasked with deploying a 13-billion parameter language model onto a Qualcomm Cloud AI
  100 on-premise inference accelerator. The platform features 32 GB of LPDDR4x memory and operates at
  a 75W TDP. Assuming the model weights are quantized to INT8 to leverage the accelerator's 400 TOPS INT8
  compute capability, calculate if the model fits within the available memory, while reserving exactly
  4 GB for KV cache and 2 GB for execution workspace.
question: "Does the INT8 13B model fit in 32 GB on Cloud AI 100 after reserving 4 GB for KV cache and 2 GB for workspace, and how much remains?"
details:
  realistic_solution: The correct approach involves determining the memory required for the weights based
    on the INT8 precision, and then adding the specified dynamic memory requirements. By multiplying the
    parameter count by the byte size of the data type, we get the static footprint. Subtracting the static
    footprint, KV cache, and workspace from the total 32 GB capacity determines if the deployment is feasible.
  common_mistake: Candidates often calculate only the static weight footprint and forget to deduct the
    dynamic memory requirements like KV cache and execution workspace from the total capacity. They may
    also incorrectly calculate the memory footprint by forgetting that INT8 quantization uses exactly
    1 byte per parameter.
  napkin_math: 'Weights footprint: 13 billion parameters * 1 byte/parameter (INT8) = 13 GB. Total required
    memory: 13 GB (weights) + 4 GB (KV cache) + 2 GB (workspace) = 19 GB. Qualcomm Cloud AI 100 capacity:
    32 GB. Remaining memory: 32 GB - 19 GB = 13 GB. The model fits with 13 GB of memory to spare.'
