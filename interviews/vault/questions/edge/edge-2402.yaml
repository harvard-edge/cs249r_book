title: Orin Downscaling for 20 TOPS
scenario: A traffic monitoring system uses a Jetson AGX Orin running an INT8 model
  that requires 20 TOPS of compute and 18 GB/s of LPDDR5 bandwidth (activation +
  weight streaming) to meet a real-time SLA. The 15W power mode throttles LPDDR5
  to ~67 GB/s peak (vs 204.8 in 60W mode); the 30W mode delivers ~140 GB/s.
question: Determine the lowest power mode that satisfies BOTH compute (20 TOPS)
  AND bandwidth (18 GB/s) requirements. Justify why "20 TOPS << 275 TOPS peak"
  alone does not guarantee 15W is sufficient.
details:
  realistic_solution: 'Compute: 20 / 275 = 7.3% utilization, easily fits 15W. Bandwidth:
    18 GB/s required vs ~67 GB/s available in 15W (27% util) - looks fine numerically.
    BUT realized LPDDR5 utilization for ML workloads is typically capped at 60-70%
    of theoretical peak due to refresh cycles and bank conflicts; 67 * 0.65 = 44
    GB/s effective, leaving 18/44 = 41% utilization and tight headroom for any concurrent
    workload (DLA, vision pipeline). 30W mode (~140 GB/s peak, ~91 GB/s effective)
    gives 18/91 = 20% with comfortable room. Recommend 30W as baseline for SLA-safe
    operation.'
  common_mistake: Picking 15W based purely on compute headroom and missing that bandwidth
    throttling at lower power modes can fail the SLA even when TOPS look adequate.
  napkin_math: '20 TOPS < 275 TOPS peak (15W OK on compute). BW: 18 / 44 effective
    = 41% util (tight in 15W). Choose 30W for headroom.'
