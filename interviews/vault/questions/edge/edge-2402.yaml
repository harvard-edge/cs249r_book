title: Orin Downscaling for 20 TOPS
scenario: A traffic monitoring system uses a Jetson AGX Orin. You have an INT8 model
  that requires 20 TOPS to run in real-time.
question: Determine the lowest power mode the Jetson AGX Orin can safely run to support
  this model, given its 275 TOPS peak.
details:
  realistic_solution: The Orin has power modes scaling down to 15W. Since 20 TOPS
    is a tiny fraction of the 275 TOPS peak (roughly 7%), the Jetson can safely be
    constrained to its lowest 15W mode while still having ample compute headroom.
  common_mistake: Choosing the maximum 60W performance mode just to be safe, wasting
    massive amounts of power for no latency benefit.
  napkin_math: 20 TOPS < 275 TOPS
