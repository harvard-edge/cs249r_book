title: Orin Thermal Throttle Floor for SLA
scenario: A roadside Jetson AGX Orin enclosure (passive heatsink, no fan, IP67 housing) runs a 20 TOPS INT8 traffic-monitoring model that must hold 30 FPS. In a controlled 25 C bench the unit holds 60W mode (275 TOPS peak) and meets the SLA. In summer field conditions the enclosure internal temperature rises to 75 C and the SoC dynamic frequency scaler clamps the GPU clock by 32% sustained, dropping the platform to a 30W envelope (~140 GB/s LPDDR5, ~165 TOPS effective peak). The model needs 18 GB/s of bandwidth.
question: Determine whether the thermally-throttled 30W envelope meets the 30 FPS SLA, and recommend whether thermal mitigation or model trimming is the cheaper fix.
details:
  realistic_solution: 'Worst-case compute: 165 TOPS (30W ceiling) * (1 - 0.32) = 112 TOPS effective. The 20 TOPS demand is still 18% utilisation - compute is fine. Worst-case bandwidth: 140 GB/s peak * 0.65 efficiency = 91 GB/s effective; the throttled clock scales LPDDR5 controller throughput too, so apply the 32% haircut: 91 * 0.68 = 62 GB/s usable. The model needs 18 GB/s sustained, plus the camera ISP/VIC pipeline typically reserves ~10 GB/s, leaving 62 - 28 = 34 GB/s headroom - SLA still passes, but timing-jitter margin is thin and any cosmic-ray-class spike (refresh, periodic GC) threatens the 30 FPS deadline. Cheaper fix: add a small heatpipe to the housing - dropping internal temperature ~10 C eliminates the 32% throttle entirely and restores full 30W envelope at $5-10 BOM, vs. retraining and redeploying a smaller model across the fleet at $50k+ engineering cost.'
  common_mistake: |
    **The Pitfall:** Overlooking LPDDR5 clock throttling.
    **The Rationale:** Engineers treat thermal throttling as an additive percentage on compute power only, forgetting memory controllers live on the same scaled SoC buses.
    **The Consequence:** They miss that memory bandwidth degrades in lockstep with compute, threatening the SLA immediately since vision models are bandwidth-hungry.
  napkin_math: |
    1. **Compute Floor**: 165 TOPS * 0.68 = 112 TOPS (20 TOPS demand easily fits).
    2. **Bandwidth Floor**: 140 GB/s * 0.65 (efficiency) * 0.68 (thermal haircut) = 62 GB/s.
    3. **System Demand**: 18 GB/s (model) + 10 GB/s (ISP) = 28 GB/s.
    4. **Result**: Headroom is 34 GB/s (SLA passes, but tightly). A **$10 heatpipe is vastly cheaper** than a $50k model redesign.
