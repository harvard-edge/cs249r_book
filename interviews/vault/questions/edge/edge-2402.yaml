title: Orin Thermal Throttle Floor for SLA
scenario: A roadside Jetson AGX Orin enclosure (passive heatsink, no fan, IP67 housing)
  runs a 20 TOPS INT8 traffic-monitoring model that must hold 30 FPS. In a controlled
  25 C bench the unit holds 60W mode (275 TOPS peak) and meets the SLA with 7% compute
  utilisation. In summer field conditions the enclosure internal temperature rises
  to 75 C and the SoC TJ_max-driven dynamic frequency scaler clamps the GPU clock
  by 32% sustained, then the BPMP fallback drops the platform to MAXN-equivalent 30W
  (~140 GB/s LPDDR5, ~165 TOPS effective peak). The model needs 18 GB/s of bandwidth.
question: Determine whether the thermally-throttled 30W envelope still meets the 30
  FPS SLA, accounting for both the 32% clock haircut on top of the 30W ceiling and
  realistic LPDDR5 efficiency (~65% of peak under ML traffic). Compute the worst-case
  effective TOPS and bandwidth headroom, and recommend whether thermal mitigation
  (heatpipe, fan) or model trimming is the cheaper fix.
details:
  realistic_solution: 'Worst-case compute: 165 TOPS (30W ceiling) * (1 - 0.32) = 112
    TOPS effective. The 20 TOPS demand is still 18% utilisation - compute is fine.
    Worst-case bandwidth: 140 GB/s peak * 0.65 efficiency = 91 GB/s effective; the
    throttled clock scales LPDDR5 controller throughput too, so apply the 32% haircut:
    91 * 0.68 = 62 GB/s usable. The model needs 18 GB/s sustained, plus the camera
    ISP/VIC pipeline typically reserves ~10 GB/s, leaving 62 - 28 = 34 GB/s headroom
    - SLA still passes, but timing-jitter margin is thin and any cosmic-ray-class
    spike (refresh, periodic GC) threatens the 30 FPS deadline. Cheaper fix: add a
    small heatpipe to the housing - dropping internal temperature ~10 C eliminates
    the 32% throttle entirely and restores full 30W envelope at $5-10 BOM, vs. retraining
    and redeploying a smaller model across the fleet at $50k+ engineering cost.'
  common_mistake: Treating thermal throttling as an additive percentage on power only,
    missing that the BPMP applies the same DVFS haircut to the LPDDR5 controller,
    so memory bandwidth degrades in lockstep with compute - precisely when the SLA
    can least afford it.
  napkin_math: 'Compute floor: 165 * 0.68 = 112 TOPS, demand 20 (OK). BW floor: 140
    * 0.65 * 0.68 = 62 GB/s; demand 18 + ISP 10 = 28; headroom 34 GB/s (tight). Heatpipe
    << model trim cost.'
