title: 'Edge Queueing Theory Implement: Little''s Law for Edge Buffer Sizing'
scenario: Implement a buffer size calculation using Little's Law for a Jetson Orin
  (32GB LPDDR5) edge gateway. The system serves 8 IP cameras at 30 FPS each (λ=240
  frames/s). Inference (μ=300 frames/s). Maximum acceptable latency W=100ms. What
  buffer size (in frames and MB) is required? Assume 640x480 RGB images at FP16.
question: What buffer size (in frames and MB) is required?
details:
  realistic_solution: 'Little''s Law: L = λ * W = 240 * 0.1 = 24 frames maximum in
    system. In queue: Lq = L - ρ = L - λ/μ = 24 - 240/300 = 24 - 0.8 = 23.2 → 24 frames
    buffer. Image size: 640*480*3*2 bytes (RGB FP16) = 1.843MB per frame. Buffer:
    24 * 1.843MB = 44.2MB. Trivially fits in 32GB LPDDR5. Verify: M/M/1 Wq at ρ=0.8
    = 0.8/(300*0.2) = 13.3ms. W = 13.3+3.33 = 16.7ms << 100ms. Buffer needed is just
    4 frames (Little''s Law at actual W: L=240*0.0167=4).'
  common_mistake: Using system capacity (32GB LPDDR5) as the buffer without considering
    whether that much buffer violates the latency SLO — a large buffer allows longer
    waits.
  napkin_math: 'λ=240 fps, W_max=100ms, L_max=λ*W=24 frames. Per frame: 640*480*3
    channels * 2 bytes (FP16) = 1.843MB. Total buffer: 24*1.843 = 44.2MB. Actual W
    at ρ=0.8: 16.7ms. Actual L = 240*0.0167 = 4 frames = 7.4MB buffer. Design buffer:
    24 frames (44MB) for headroom, 4 frames (7.4MB) minimum. Both << 32GB LPDDR5.
    Real concern: LPDDR5 102.4GB/s vs 240*1.843MB/s = 442MB/s — bandwidth fine.'
