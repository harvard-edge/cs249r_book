title: The Inference Memory Leak
scenario: Your TI TDA4VM-based dashcam runs a lane detection model 24/7. Memory usage starts at 1.8 GB after boot. After 3 days of continuous operation, memory usage reaches 7.2 GB and the OOM killer terminates the inference process. The model is loaded once at startup and never reloaded. The input pipeline processes frames in a fixed-size ring buffer.
question: Where is the 5.4 GB leak coming from over 3 days of continuous inference?
details:
  realistic_solution: 'Multiple subtle sources compound over 3 days: (1) **TensorRT engine cache** — the TDA4VM''s TIDL runtime caches optimized execution plans. Each unique input shape triggers a new cache entry. If the camera occasionally delivers frames at slightly different resolutions (e.g., during USB bandwidth negotiation or ISP reconfiguration), each unique resolution creates a new cached plan. At ~2 MB per plan, 100 unique resolutions over 3 days = 200 MB. (2) **Python garbage collection fragmentation** — if using Python (common with TFLite/ONNX), the CPython allocator requests memory from the OS in 256 KB arenas but never returns them. Small temporary allocations (bounding box lists, confidence arrays) fragment these arenas. After millions of inferences: 3 days × 86400s × 30 FPS = 7.8M inferences. Even 100 bytes of fragmentation per inference = 780 MB. (3) **DMA buffer leak** — the V4L2 camera driver allocates DMA buffers for each frame. If the application doesn''t properly release buffers back to the driver (e.g., missing `VIDIOC_QBUF` call on an error path), each leaked buffer is 1920×1080×2 (NV12) = 4.1 MB. One leak per hour = 72 buffers = 295 MB over 3 days. (4) **Syslog file descriptors** — if the inference process opens log files without closing them (or appends to an in-memory log), file descriptor table and kernel buffer cache grow.'
  common_mistake: |
    **The Pitfall:** Blaming the ML model itself and suggesting switching frameworks to fix the memory leak.
    **The Rationale:** Candidates assume the neural network execution is leaking memory, ignoring that the model weights and activations are static across inferences.
    **The Consequence:** Wasting weeks rewriting the model pipeline in a new framework only to face the exact same OOM crashes caused by the surrounding infrastructure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Uptime: 3 days (259,200 seconds) at 30 FPS.
       * Total inferences: ~7.78 million.
       * Total leak: 5.4 GB.
    2. **Calculations:**
       * Python fragmentation: 7.78M inferences * ~500 bytes/inf = ~3.89 GB.
       * V4L2 DMA leak: 1 leak/hr * 72 hours * 4.1 MB (1080p NV12) = ~295 MB.
       * TensorRT Engine cache: 100 unique input shapes * 2 MB = ~200 MB.
       * Total identified: 3.89 GB + 295 MB + 200 MB = ~4.38 GB (matches order of magnitude).
    3. **Conclusion & Interpretation:**
       **Result: Infrastructure-Bound Leak**. Moving the inference loop to C++, fixing DMA buffer releases, and forcing static input resolutions eliminates the vast majority of the 5.4 GB leak.
  options:
  - The model has a memory leak — switch to a different framework.. The model itself is stateless between inferences.
  - The bottleneck is PCIe transfer between CPU and GPU; using zero-copy memory will eliminate this overhead entirely.
  - 'Multiple subtle sources compound over 3 days: (1) TensorRT engine cache — the TDA4VM''s TIDL runtime caches optimized execution plans. Each unique input shape triggers a new cache entry.'
  - Converting the model to a different framework's format (e.g., ONNX to TFLite) will automatically optimize it for the target hardware.
  correct_index: 2
