title: The Federated Fleet TCO (edge-0398)
scenario: 'Your automotive company is deploying a new predictive maintenance model to a fleet of 10,000 vehicles to detect engine anomalies. You are comparing two training strategies: Centralized (sending 50 MB/day raw data per vehicle) and Federated Learning (sending 5 MB/day FL updates per vehicle). Cellular data costs $0.05/GB.'
question: For 10,000 vehicles sending 50 MB/day raw data versus 5 MB/day FL updates at $0.05/GB, what monthly data cost trade-off do you get?
details:
  realistic_solution: 'The primary trade-off is between data transfer costs and model complexity. Centralized training has access to all raw data but incurs massive data transfer costs. Federated Learning dramatically reduces these costs at the expense of potentially simpler on-device models and the engineering complexity of the FL pipeline.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on cloud compute (training) costs while completely neglecting cellular data transmission costs.
    **The Rationale:** Applying datacenter intuition to edge architectures where network egress is often the dominant operational expenditure (OpEx).
    **The Consequence:** Designing centralized architectures that incur staggering monthly cellular bills, making the ML product financially unviable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 vehicles.
    - Centralized payload: 50 MB/day per vehicle.
    - FL payload: 5 MB/day per vehicle.
    - Cellular data cost: $0.05/GB.

    **Calculations:**
    - Centralized Volume: 10,000 * 50 MB/day * 30 days = 15,000,000 MB = 15,000 GB.
    - Centralized Cost: 15,000 GB * $0.05/GB = $750/month.
    - FL Volume: 10,000 * 5 MB/day * 30 days = 1,500,000 MB = 1,500 GB.
    - FL Cost: 1,500 GB * $0.05/GB = $75/month.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound Cost**. Federated Learning cuts raw cellular data transfer costs by 10x, turning an expensive upload into a feasible architecture.
  options:
  - 'Centralized: $10/mo, Federated: $0.10/mo'
  - 'Centralized: $100,000/mo, Federated: $1,000,000/mo'
  - 'Centralized: $750/mo, Federated: $75/mo'
  - 'Centralized: $10,000/mo, Federated: $10,000/mo'
