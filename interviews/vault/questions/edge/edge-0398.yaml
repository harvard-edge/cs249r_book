title: The Federated Fleet TCO (edge-0398)
scenario: 'Your automotive company is deploying a new predictive maintenance model to a fleet of 10,000
  vehicles to detect engine anomalies. You are comparing two training strategies:'
details:
  realistic_solution: The primary trade-off is between data transfer costs and model complexity. Centralized
    training has access to all raw data but incurs massive data transfer costs. Federated Learning dramatically
    reduces these costs at the expense of potentially simpler on-device models and the engineering complexity
    of the FL pipeline. The cost difference is staggering.
  common_mistake: Engineers often focus on the cloud compute (training) costs, which are significant,
    but completely neglect the data transmission costs. For edge and automotive applications with large
    fleets, data egress over cellular networks is frequently the dominant operational expenditure (OpEx),
    not the server-side training.
  napkin_math: 'Centralized: 10,000 vehicles * 50 MB/day = 500 GB/day raw data. Over a month (30 days),
    this is 15 TB. At $0.05/GB, OpEx = $750/month. Federated Learning: Transmits a 5 MB model update per
    day. 10,000 * 5 MB/day = 50 GB/day or 1.5 TB/month. At $0.05/GB, OpEx = $75/month. FL cuts data transfer
    costs by 10x.'
  options:
  - 'Centralized: $10/mo, Federated: $0.10/mo'
  - 'Centralized: $100,000/mo, Federated: $1,000,000/mo'
  - 'Centralized: $100,000/mo, Federated: $1,000/mo'
  - 'Centralized: $10,000/mo, Federated: $10,000/mo'
  correct_index: 2
