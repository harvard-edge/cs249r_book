title: 'Dataset Curation: Optimize On-Device Dataset Compression for Storage-Constrained Edge'
scenario: Your Jetson Orin (32GB LPDDR5) device needs to store 50K training images for periodic on-device
  fine-tuning. Raw images at 224×224×3 = 150KB each = 7.5GB total, exceeding your 4GB budget for training
  data. Optimize the storage strategy to fit 50K examples in 4GB without significant quality degradation.
details:
  realistic_solution: Store pre-extracted features instead of raw images. Use a frozen backbone (ResNet50
    or MobileNet) to extract 512-dim features offline. Store as float16. This reduces storage 200× while
    preserving most task-relevant information for classification heads.
  common_mistake: Simply lowering JPEG quality blindly or resizing to smaller resolution without measuring
    impact on model accuracy.
  napkin_math: 'Option A: Resize to 112×112: 50K × 112×112×3 = 1.88GB. Quality loss: ~2% accuracy. Option
    B: JPEG quality=50: 50K × ~25KB = 1.25GB. Quality loss: ~1.5%. Option C: Pre-extracted features: 50K
    × 512 × 2bytes (fp16) = 51.2MB — 150× smaller. Labels: 50K × 4 bytes = 200KB. Total: 51.4MB. Only
    trains linear head/adapter, not backbone. Fine-tuning time: 51.4MB fits in RAM, 50K × 5 epochs / batch
    256 = 977 steps. At 275 TOPS: tiny MLP forward pass << 1 TOPS → 0.1 seconds total. Winner: feature
    storage (Option C).'
