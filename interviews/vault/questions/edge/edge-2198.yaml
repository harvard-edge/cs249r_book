title: Edge Accelerator TOPS Per Watt Sizing
scenario: An edge box can use Accelerator A at 40 TOPS and 20 W or Accelerator B at 26 TOPS and 8 W. The model needs 4 TOPS sustained per camera and the box must process 6 cameras under a 25 W accelerator power budget.
question: Do both edge accelerators fit 6 cameras under a 25 W budget, and which would you prefer on efficiency grounds?
details:
  realistic_solution: The workload needs 6 x 4 = 24 TOPS. Both accelerators have enough compute. Accelerator A uses 20 W and fits under 25 W; Accelerator B uses 8 W and also fits with more power headroom. If both meet latency, B is more power efficient; choose A only if sustained performance or operator support requires it.
  common_mistake: |
    **The Pitfall:** Choosing the higher TOPS part without checking that the lower-power accelerator already meets demand.
    **The Rationale:** Engineers default to "more compute is better" or "future-proofing" without running the actual requirement numbers.
    **The Consequence:** Wasting power budget, increasing thermal load, and likely increasing the Bill of Materials (BOM) cost unnecessarily.
  napkin_math: |
    *   **Demand:** 6 cameras * 4 TOPS/camera = 24 TOPS.
    *   **Accelerator A Efficiency:** 40 TOPS / 20 W = 2.0 TOPS/W.
    *   **Accelerator B Efficiency:** 26 TOPS / 8 W = 3.25 TOPS/W.
    *   **Budget Check:** Both fit the 25W budget. Both meet the 24 TOPS demand.
    *   **Conclusion:** **Accelerator B** has better efficiency (3.25 TOPS/W) and leaves 17W of power headroom.
