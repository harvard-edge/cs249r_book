title: Edge Accelerator TOPS Per Watt Sizing
scenario: An edge box can use Accelerator A at 40 TOPS and 20 W or Accelerator B at
  26 TOPS and 8 W. The model needs 4 TOPS sustained per camera and the box must process
  6 cameras under a 25 W accelerator power budget. Size which accelerator fits.
question: Do both edge accelerators fit 6 cameras under a 25 W budget, and which would
  you prefer on efficiency grounds?
details:
  realistic_solution: The workload needs 6 x 4 = 24 TOPS. Both accelerators have enough
    compute. Accelerator A uses 20 W and fits under 25 W; Accelerator B uses 8 W and
    also fits with more power headroom. If both meet latency, B is more power efficient;
    choose A only if sustained performance or operator support requires it.
  common_mistake: Choosing the higher TOPS part without checking that the lower-power
    accelerator already meets demand.
  napkin_math: Demand = 24 TOPS. A efficiency = 2 TOPS/W. B efficiency = 3.25 TOPS/W.
    Both fit compute and power; B has better TOPS/W.
