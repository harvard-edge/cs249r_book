title: 'Edge Accelerator TOPS Per Watt Sizing'
scenario: 'An edge box can use Accelerator A at 40 TOPS and 20 W or Accelerator B at 26 TOPS and 8 W. The model needs 4 TOPS sustained per camera and the box must process 6 cameras under a 25 W accelerator power budget.'
question: 'Do both edge accelerators fit 6 cameras under a 25 W budget, and which would you prefer on efficiency grounds?'
details:
  realistic_solution: |
    Both accelerators satisfy the 24 TOPS workload demand. Accelerator A operates at 2.0 TOPS/W, safely under the 25 W TDP limit. Accelerator B operates at 3.25 TOPS/W and fits with 17 W of thermal headroom. On efficiency grounds, Accelerator B is strictly preferred unless specific operator support matrices mandate A.
  common_mistake: |
    **The Pitfall:** Choosing the higher TOPS part without checking that the lower-power accelerator already meets demand.
    **The Rationale:** Engineers default to "more compute is better" or "future-proofing" without analyzing actual workload requirements.
    **The Consequence:** Wasting power budget, increasing thermal load, and likely inflating the Bill of Materials (BOM) cost unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 6 cameras requiring 4 TOPS each.
    - Budget: 25 W TDP limit.
    - Accel A: 40 TOPS, 20 W.
    - Accel B: 26 TOPS, 8 W.

    **Calculations:**
    - Total Demand: 6 * 4 = 24 TOPS.
    - Accel A Efficiency: 40 / 20 = 2.0 TOPS/W.
    - Accel B Efficiency: 26 / 8 = 3.25 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: Accelerator B fits 6 cameras under budget (17 W headroom) (Power-Bound).** It is preferred for its superior TOPS/W efficiency.
