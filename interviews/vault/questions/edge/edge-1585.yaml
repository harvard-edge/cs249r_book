title: Calculate Cooling Requirements for Cloud AI 100 Deployment
scenario: 'You are deploying an on-premise edge inference cluster utilizing Qualcomm Cloud AI 100 accelerators. Each accelerator consumes 75W of power while running at its peak INT8 performance. If you are deploying a dense server chassis containing 8 of these accelerators, calculate the total thermal dissipation requirement in British Thermal Units per hour (BTU/hr) for the accelerator payload alone to ensure sustained performance without thermal throttling.'
question: What BTU/hr cooling load is required for the 8-card Cloud AI 100 accelerator payload at 75W per card?
details:
  realistic_solution: 'The correct approach is to first calculate the total power consumption of all the accelerators in the chassis in Watts. Then, apply the standard conversion factor that 1 Watt of power dissipation roughly equals 3.412 BTU/hr of heat load. This gives the baseline cooling requirement that the HVAC or server chassis fans must handle to prevent the cards from throttling under continuous maximum load.'
  common_mistake: |
    **The Pitfall:** Forgetting the Watt to BTU/hr conversion or miscalculating the payload.
    **The Rationale:** Candidates calculate the power for a single card or mistakenly try to factor in the 32 GB LPDDR4x memory power separately.
    **The Consequence:** The cooling system is drastically under-provisioned, leading to immediate thermal throttling and failure.
  napkin_math: |
    1. **Assumptions & Constraints:** 8 accelerators, 75W each. 1 Watt = 3.412 BTU/hr.
    2. **Calculations:** Total Power = 8 * 75W = 600W. Total Heat Load = 600W * 3.412 BTU/hr/W = 2,047.2 BTU/hr.
    3. **Conclusion & Interpretation:** **The cooling system must handle at least ~2050 BTU/hr just for the accelerator payload. Result: Thermal-Bound.**
