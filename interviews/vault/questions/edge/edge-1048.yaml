title: 'Fault Tolerance: Mastery — Fault Tolerant Edge Fleet for Autonomous Industrial Vision'
scenario: >-
  You are designing a safety-critical vision system across 1,000 Jetson Orin devices in an automotive stamping plant. The system must operate at 99.95% uptime. Devices run online learning to adapt to new part geometries.
question: What complete fault-tolerance architecture would you design for 1,000 online-learning Orin vision systems to achieve 99.95% uptime?
details:
  realistic_solution: Layered FT includes A/B partitions with OTA canary deployment for base models. Online LoRA state checkpoints locally every 10 minutes and uploads to cloud every 24h. Failure detection uses watchdog timers and inference latency monitors. Recovery uses hot spare devices pre-loaded with the last cloud LoRA state.
  common_mistake: |
    **The Pitfall:** Treating online learning state and base model as one monolithic checkpoint.
    **The Rationale:** Candidates default to standard cloud checkpointing strategies, overlooking the massive bandwidth cost of uploading full models from 1,000 edge devices.
    **The Consequence:** Saturating the factory network and skyrocketing cloud transfer costs, while failing to design recovery paths for hardware versus software failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 1,000 devices; MTBF: 50,000 hours.
       - Uptime goal: 99.95%.
       - Online LoRA checkpoint: 2MB (6 times/hour).
    2. **Calculations:**
       - Hardware failures: 1,000 * 8760h / 50,000h = 175 failures/year.
       - Downtime (4h replacement): 175 * 4h = 700 hours/year.
       - Uptime fraction: 1 - (700 / 8,760,000) = 99.992%.
       - Cloud upload cost: 1,000 * 2MB * 24h = 2GB/day ($65/year).
    3. **Conclusion & Interpretation:**
       - **Result: Reliability-Bound.** Sizing hot spares limits downtime to yield 99.992% uptime, and syncing small 2MB LoRA checkpoints preserves network bandwidth economically.
