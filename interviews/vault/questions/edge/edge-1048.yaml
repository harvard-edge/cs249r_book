title: 'Fault Tolerance: Mastery — Fault Tolerant Edge Fleet for Autonomous Industrial Vision'
scenario: You are designing a safety-critical vision system across 1,000 Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) devices in an automotive stamping plant. The system must operate at 99.95% uptime. Devices run online learning to adapt to new part geometries.
question: What complete fault-tolerance architecture would you design for 1,000 online-learning Orin vision systems to achieve 99.95% uptime?
details:
  realistic_solution: Layered FT includes A/B partitions with OTA canary deployment for base models. Online LoRA state checkpoints locally every 10 minutes and uploads to cloud every 24h. Failure detection uses watchdog timers and inference latency monitors. Recovery uses hot spare devices pre-loaded with the last cloud LoRA state.
  common_mistake: |
    **The Pitfall:** Treating online learning state and base model as one monolithic checkpoint.
    **The Rationale:** Candidates default to standard cloud checkpointing strategies, overlooking the massive bandwidth cost of uploading full models from 1,000 edge devices.
    **The Consequence:** Saturating the factory network and skyrocketing cloud transfer costs, while failing to design recovery paths for hardware vs software failures.
  napkin_math: |
    - **Hardware failures:** 1,000 devices with MTBF of 50K hours = 1000 * 8760 / 50000 = 175 failures/year.
    - **Replacement downtime:** With 3% hot spares, mean replacement time = 4 hours. Downtime = 175 * 4h = 700 device-hours/year.
    - **Uptime calculation:** 700 / 8,760,000 total device-hours = 0.008% downtime, yielding **99.992% uptime.**
    - **Online LoRA checkpoints:** 1,000 devices * 2MB/checkpoint * 6/hour = 12,000 MB/hr (12 GB/hr) to local NVMe.
    - **Cloud upload cost:** 1,000 * 2MB every 24h = 2GB/day. At $0.09/GB = $0.18/day = $65/year.
    - **Final result:** **Reliability goals are met economically with hot spares and infrequent cloud syncs.**
