title: Design spatial tiling to fit BEV features in SRAM
scenario: An autonomous rover uses a custom edge SoC with 4MB of fast SRAM and external
  LPDDR5. A 3D object detection model requires storing an 8MB Bird's Eye View (BEV)
  feature map between the backbone and detection head.
question: Design a feature map tiling strategy to execute the detection head without
  spilling intermediate activations to the slow LPDDR5 memory.
details:
  realistic_solution: Divide the 8MB BEV feature map into 4 independent spatial tiles
    of 2MB each. Load tile 1 into the 4MB SRAM, run the detection head operations
    (using the remaining <2MB for weights and buffers), stream the bounding box outputs
    to DRAM, and overwrite the SRAM with tile 2. This keeps the dataflow fully SRAM-resident.
  common_mistake: Suggesting standard layer-by-layer execution which forces the entire
    8MB tensor out to external memory, heavily bottlenecking the NPU.
  napkin_math: 8MB total / 4 tiles = 2MB per tile < 4MB SRAM
