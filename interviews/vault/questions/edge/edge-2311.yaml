title: Design spatial tiling to fit BEV features in SRAM
scenario: An autonomous rover uses a custom edge SoC with 4MB of fast SRAM and external LPDDR5. A 3D object detection model requires storing an 8MB Bird's Eye View (BEV) feature map between the backbone and detection head.
question: Design a feature map tiling strategy to execute the detection head without spilling intermediate activations to the slow LPDDR5 memory.
details:
  realistic_solution: 'Divide the 8MB BEV feature map into 4 independent spatial tiles of 2MB each. Load tile 1 into the 4MB SRAM, run the detection head operations (using the remaining <2MB for weights), stream outputs to DRAM, and overwrite SRAM with tile 2. This keeps the critical dataflow fully SRAM-resident.'
  common_mistake: |
    **The Pitfall:** Suggesting standard layer-by-layer execution.
    **The Rationale:** Candidates apply standard cloud/GPU execution models without considering strict edge SRAM limits.
    **The Consequence:** Forces the entire 8MB tensor out to external memory, heavily bottlenecking the NPU with slow LPDDR5 access.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM capacity: 4MB
       - BEV feature map size: 8MB
       - Spatial tiles needed: 4
    2. **Calculations:**
       - Memory per tile: 8MB / 4 = 2MB
       - Required SRAM (tile + weights buffers): 2MB + <2MB = ~3.5MB
       - 3.5MB < 4MB total SRAM.
    3. **Conclusion & Interpretation:**
       - **Result: Fully SRAM-Resident.** By tiling to 2MB, the execution completely avoids the LPDDR5 bandwidth penalty.
