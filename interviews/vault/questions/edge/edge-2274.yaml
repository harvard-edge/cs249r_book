title: Edge Vision Fan-In Bottleneck
scenario: A smart factory routes 8 IP cameras streaming 1080p 30FPS raw RGB video
  to a single Jetson AGX Orin central node over standard Gigabit Ethernet.
question: Determine if the Gigabit network link can handle the raw fan-in or if on-camera
  compression is strictly required.
visual:
  kind: svg
  path: edge-2274.svg
  alt: A fanout diagram showing 8 camera nodes pointing into a single Jetson central
    node.
  caption: Camera to Edge Fan-In Topology
details:
  realistic_solution: Raw 1080p 30FPS RGB requires 1920 * 1080 * 3 * 30 bytes/sec,
    which is about 186 MB/s per camera. With 8 cameras, the total fan-in bandwidth
    is 8 * 186 MB/s = 1.48 GB/s. A Gigabit Ethernet link maxes out at 125 MB/s, so
    the network is severely bottlenecked and on-camera compression is strictly required.
  common_mistake: Confusing Gigabit (Gbps) with Gigabyte (GB/s), incorrectly assuming
    1 Gbps = 1 GB/s and thinking the network has enough capacity.
  napkin_math: 8 * 186 MB/s = 1488 MB/s > 125 MB/s
