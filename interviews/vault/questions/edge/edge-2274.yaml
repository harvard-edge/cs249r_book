title: Edge Vision Fan-In Bottleneck
scenario: A smart factory routes 8 MIPI sensors streaming 1080p 30FPS raw RGB through
  per-sensor MIPI-to-Ethernet bridges to a single Jetson AGX Orin central node over
  standard Gigabit Ethernet. Streams are encapsulated in RTP over UDP/IP/Ethernet,
  giving roughly 5% framing/protocol overhead end-to-end.
question: Determine whether the 1 GbE link can handle the raw fan-in once RTP/UDP/IP
  framing overhead is included, and quantify how many sensors could be supported
  if you compress with H.264 at a 100:1 ratio (still incurring the same protocol
  overhead).
visual:
  kind: svg
  path: edge-2274.svg
  alt: A fanout diagram showing 8 camera nodes pointing into a single Jetson central
    node.
  caption: Camera to Edge Fan-In Topology
details:
  realistic_solution: Per-sensor raw payload = 1920*1080*3*30 = 186 MB/s. With 5%
    RTP/UDP/IP overhead the wire rate becomes ~195 MB/s per sensor; eight sensors
    push ~1.56 GB/s versus a 1 GbE budget of ~119 MB/s after the same framing tax.
    Raw is ~13x over budget. With 100:1 H.264 compression each sensor drops to ~1.95
    MB/s on the wire, so 8 sensors fit in ~16 MB/s - leaving headroom for ~60 sensors
    before the link saturates.
  common_mistake: Forgetting to subtract the 5% protocol/framing overhead on both
    sides of the comparison, or confusing Gigabit (Gbps) with Gigabyte (GB/s) and
    overestimating the link's payload capacity.
  napkin_math: 'Raw payload + 5% overhead: 8 * 186 * 1.05 = 1562 MB/s; effective
    GbE = 125 * 0.95 = 119 MB/s; ratio = 13.1x over budget. With 100:1 H.264: 8 *
    1.95 = 15.6 MB/s, well under 119 MB/s.'
