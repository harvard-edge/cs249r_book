title: The PCIe Latency Trap
scenario: 'You are an ML Systems Engineer on an autonomous driving team, debugging a sensor fusion pipeline
  on a Jetson AGX Orin. The pipeline takes data from 4 cameras, sends it to a custom hardware accelerator
  over a PCIe Gen4 x4 bus for pre-processing, and then runs a perception model on the GPU. Your end-to-end
  latency budget is 33ms. You measure a total latency of 45ms. System profiling shows:'
details:
  realistic_solution: The most likely cause is that the driver is making inefficient, small data transfers
    instead of a few large DMA (Direct Memory Access) transfers. Each PCIe transaction has a latency overhead
    (on the order of ~1µs for the round trip). If the total 64MB of data is being sent in thousands of
    small chunks (e.g., 4KB pages), the cumulative latency overhead from all these separate transactions
    will dominate the total time, even if the bus has high bandwidth. The fix involves rewriting the driver
    to coalesce memory into a large, contiguous block before initiating a single, large DMA transfer.
  common_mistake: Engineers often calculate data transfer time using only the peak theoretical bandwidth
    (e.g., Time = Size / Bandwidth), ignoring the massive performance penalty from transaction overhead,
    especially in drivers not optimized for large, contiguous transfers. A bus can be bandwidth-rich but
    latency-poor. If software sends data in many small packets instead of a few large ones, performance
    becomes dominated by the latency of each individual transaction, not the bus's total throughput.
  napkin_math: 'Total data = 64 MB. PCIe Gen4 x4 bandwidth = 8 GB/s. Ideal transfer = 64 MB / 8 GB/s =
    8 ms. Observed is 28 ms. If data is sent in 4KB chunks, that''s 16,384 transactions. Assuming 1µs
    latency per transaction: 16,384 * 1µs = 16.38 ms overhead. 8 ms + 16.38 ms = 24.38 ms, closely matching
    the 28ms observed latency.'
  options:
  - The PCIe bus is sharing bandwidth with the GPU, which is also accessing system DRAM. This contention
    is saturating the bus.
  - The MIPI CSI-2 camera interfaces are the real bottleneck and are failing to deliver data to system
    memory fast enough.
  - The driver is using small, non-coalesced memory transfers, making the operation bound by PCIe's transaction
    latency rather than its bandwidth.
  - The effective sustained bandwidth of the PCIe bus is much lower than its theoretical peak, likely
    around 2.3 GB/s due to hardware limitations.
  correct_index: 2
