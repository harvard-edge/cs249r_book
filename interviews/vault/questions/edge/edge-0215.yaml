title: The Hidden Cost of Continuous Batching
scenario: You're designing a perception system for a self-driving car with a hard 33ms deadline. The model's
  inference time is 20ms. To handle bursts of objects, you consider continuous batching and set the batching
  timeout to 15ms. Explain the impact of this timeout on a single frame that arrives when the system is
  idle. Will it meet its deadline?
details:
  realistic_solution: The frame will miss its deadline. The total latency experienced by a request is
    the time it waits in the batching queue plus the actual inference time. By setting a 15ms timeout,
    the system will always wait up to 15ms for other requests to arrive before dispatching the batch.
    For a single frame arriving in an idle system, the latency will be its wait time (15ms) plus its inference
    time (20ms), for a total of 35ms. This 35ms latency violates the 33ms hard real-time deadline.
  common_mistake: Engineers often forget that the batching timeout represents a guaranteed latency floor.
    They focus only on the model's inference time and assume any time 'left over' from the deadline is
    a safe margin, ignoring the delay introduced by the batching scheduler itself.
  napkin_math: '1. **System Deadline**: 33ms. | 2. **Batching Timeout (Max Wait Time)**: 15ms. | 3. **Model
    Inference Time**: 20ms. | 4. **Frame Arrival**: A single frame arrives at t=0. | 5. **System Action**:
    The system waits for the timeout period to see if other requests arrive to form a batch. | 6. **Batch
    Dispatch**: At t=15ms, the timeout expires and a batch of 1 is dispatched. | 7. **Total Latency**:
    15ms (wait time) + 20ms (inference time) = 35ms. | 8. **Deadline Check**: 35ms > 33ms. **Deadline
    missed.**'
  options:
  - The frame misses its deadline, as its total latency becomes 15ms (wait) + 20ms (inference) = 35ms.
  - The frame meets its deadline, as its inference time is only 20ms, well within the 33ms budget.
  - It's impossible to know without knowing the batching overhead of the inference server.
  - The frame meets its deadline, because the timeout (15ms) is less than the inference time (20ms).
  correct_index: 0
