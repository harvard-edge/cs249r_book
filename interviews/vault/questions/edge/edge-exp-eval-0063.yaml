title: Operator Scheduling Tradeoffs on Jetson Orin GPU vs DLA
scenario: You are deploying a multi-camera perception pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). The pipeline consists of a heavy CNN backbone
  followed by a transformer-based fusion head. You must evaluate two operator scheduling strategies. Strategy
  A aggressively fuses all backbone layers and schedules the entire pipeline on the Ampere GPU to minimize
  memory transfers. Strategy B partitions the graph, scheduling the CNN backbone on the DLA accelerator
  and the transformer head on the GPU to enable concurrent execution. Which strategy do you choose to
  maximize throughput while staying within the 60W power budget, and why?
details:
  realistic_solution: Strategy B is superior for this platform. The Jetson Orin's DLA is specifically
    designed for high-efficiency CNN execution. Scheduling the backbone on the DLA offloads significant
    compute from the GPU, allowing the GPU and DLA to run in a pipelined fashion (concurrent execution).
    Because the Orin uses a unified memory architecture (32 GB LPDDR5), passing intermediate tensors between
    the DLA and GPU avoids PCIe transfer overhead. The power savings and ability to execute operators
    in parallel keep the system well under the 60W TDP while achieving higher overall throughput.
  common_mistake: Candidates often choose Strategy A to avoid the memory copy overhead between the DLA
    and GPU, assuming layer fusion on the GPU will always yield the lowest latency. They fail to account
    for the severe 60W power constraints and the fact that the GPU might thermal throttle if sustained
    at high utilization, whereas the DLA is highly power-efficient.
  napkin_math: 'Assume the perception pipeline requires 4 INT8 TOPS per frame. To achieve a target of
    30 FPS, the system needs 120 sustained TOPS. Strategy A (GPU only): running 120 TOPS on the Ampere
    GPU might draw ~45W, leaving only 15W of the 60W TDP for the CPU, 32GB LPDDR5 memory, and peripherals,
    highly risking thermal throttling. Strategy B (DLA + GPU): If the CNN backbone takes 80 TOPS and the
    transformer takes 40 TOPS, offloading 80 TOPS to the DLA might consume only ~10W due to its fixed-function
    efficiency. The remaining 40 TOPS on the GPU might consume ~15W. Total compute power drops to 25W,
    comfortably leaving 35W for the rest of the SoC and ensuring stable performance out of the 275 available
    TOPS.'
