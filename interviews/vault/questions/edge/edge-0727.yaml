title: 'The OTA Update Budget: OTA & Firmware Updates'
scenario: You are an ML Systems Engineer on an autonomous vehicle team. Your current
  perception model is 2.5 GB. You have a new, more accurate FP16 model that is 3.5
  GB. The fleet connects via a standard LTE cellular connection, which provides a
  realistic average download speed of 25 Mbps (megabits per second). To manage data
  costs and ensure a good user experience, a full model update must complete in under
  20 minutes while the vehicle is parked and charging.
question: Can you safely deploy the 3.5 GB FP16 model over 25 Mbps LTE within a 20-minute
  update budget, and what is the best-case download time?
details:
  realistic_solution: No, the update is too slow to fit safely within the 20-minute
    budget. The download alone takes almost the entire budget in ideal conditions,
    leaving no margin for network variability, download interruptions, or on-device
    installation time. A production system requires a significant safety buffer. The
    correct engineering decision is to reject this model for OTA deployment and develop
    a delta patching strategy or quantize the model.
  common_mistake: '**The Pitfall:** Confusing megabits (Mb) with megabytes (MB).

    **The Rationale:** Network speeds are traditionally measured in megabits per second
    (Mbps), while file sizes are in gigabytes (GB). Engineers forget to multiply the
    byte size by 8 to convert to bits.

    **The Consequence:** An 8x underestimate of the required download time, resulting
    in a fundamentally broken OTA deployment plan that drains battery and disrupts
    the user experience.

    '
  napkin_math: '**Assumptions & Constraints:**

    - File Size: 3.5 GB.

    - Network Speed: 25 Mbps (megabits per second).


    **Calculations:**

    - Convert GB to MB: 3.5 GB = 3,500 MB.

    - Convert MB to Mb: 3,500 MB * 8 = 28,000 Mb.

    - Download Time: 28,000 Mb / 25 Mbps = 1,120 seconds.

    - Time in minutes: 1,120 / 60 = 18.66 minutes.


    **Conclusion & Interpretation:**

    - **Result: Network-Bound Risk**. 18.7 minutes of pure transfer time leaves virtually
    zero headroom in a 20-minute SLA, requiring delta updates or model compression.

    '
  options:
  - ~2.3 minutes
  - ~1.1 seconds
  - ~18.7 minutes
  - ~149 minutes
  correct_index: 2
