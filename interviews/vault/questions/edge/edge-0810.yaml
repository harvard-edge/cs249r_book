title: 'Edge-Cloud Federated Learning System'
scenario: 'Your fleet of 500 hospital bedside monitors runs a patient fall detection model. After 6 months, accuracy has dropped from 94% to 87% due to distribution shift. HIPAA prohibits uploading patient video to the cloud.'
question: 'How would you design a HIPAA-compliant federated learning system for the 500 monitors, including protocol, privacy, convergence, and device budget?'
details:
  realistic_solution: 'Design a privacy-preserving federated learning system utilizing differential privacy (DP-SGD) and advanced composition. Incorporate secure aggregation to prevent gradient inversion attacks.'
  common_mistake: |
    **The Pitfall:** Proposing vanilla FedAvg where each device trains locally and uploads gradients.
    **The Rationale:** Candidates assume standard federated learning is inherently private, ignoring gradient inversion risks.
    **The Consequence:** Patient data is leaked via inversion attacks, violating HIPAA, and the system diverges due to non-IID data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 devices. Privacy budget ε=8, 20 rounds, 10% subsampling.
    - DP noise costs ~2% accuracy. 15W GPU for 8 min/round.

    **Calculations:**
    - Net accuracy: 87% + 5% (retraining) - 2% (DP cost) = 90%.
    - Compute cost per round: 8 min * 15W = 7.2 kJ.
    - Energy total: 7.2 kJ * 20 rounds = 144 kJ (0.04 kWh = $0.005).
    - Fleet compute cost: 500 * $0.005 = $2.50.

    **Conclusion & Interpretation:**
    - **Result: $2.50 Fleet Cost (Privacy-Bound)**. System provides compliant model retraining at negligible edge energy overhead.
