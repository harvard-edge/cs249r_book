title: Edge-Cloud Federated Learning System
scenario: Your fleet of 500 hospital bedside monitors runs a patient fall detection model. After 6 months, accuracy has dropped from 94% to 87% due to distribution shift. HIPAA prohibits uploading patient video to the cloud. Design a federated learning system that retrains the model across the fleet without any raw data leaving the devices. Specify the communication protocol, privacy guarantees, convergence timeline, and the compute/bandwidth budget per device.
question: How would you design a HIPAA-compliant federated learning system for the 500 monitors, including protocol, privacy, convergence, and device budget?
details:
  realistic_solution: Design a privacy-preserving federated learning system with differential privacy, communication efficiency, and convergence guarantees.
  common_mistake: |
    **The Pitfall:** Proposing vanilla FedAvg where each device trains locally and uploads gradients.
    **The Rationale:** Candidates often assume standard federated learning is inherently private without understanding inversion attacks.
    **The Consequence:** Patient information can be leaked via gradient inversion attacks, violating HIPAA, and edge devices may fail due to limited compute or non-IID data causing divergence.
  napkin_math: |
    - Privacy budget: ε=8 per round, 20 rounds with subsampling (50/500 = 10%).
    - Effective ε ≈ 8 * √(20 * 0.1) = 11.3 (advanced composition).
    - Accuracy cost of DP noise: ~2% mAP reduction.
    - Net accuracy: 87% + 5% (retraining gain) - 2% (DP cost) = **90%**.
    - Compute cost: 8 min * 15W GPU = 7.2 kJ per round.
    - Energy per round: 7.2 kJ * 20 rounds = 144 kJ = 0.04 kWh = $0.005.
    - **Fleet compute cost: 500 * $0.005 = $2.50 per retraining cycle.**
