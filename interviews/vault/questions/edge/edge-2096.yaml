title: Data Pruning for Edge Deployment on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a deep learning model onto a Qualcomm Cloud AI 100 accelerator. The initial training dataset is substantial, causing concerns about deployment constraints.
question: What is data pruning, how does it differ from coreset selection, and when would it help deploy on the Cloud AI 100?
details:
  realistic_solution: For this scenario, data pruning involves removing redundant or less informative examples from the training data, often based on metrics like sample difficulty, uncertainty, or contribution to model error. Unlike coreset selection, which aims for a representative subset, pruning often focuses on identifying and discarding specific 'unhelpful' data. A realistic solution would be to use techniques like 'active learning' or 'error-based pruning' during model development. Specifically, after an initial training phase, identify data points that the model consistently misclassifies or for which it has low confidence, and either prioritize or prune these based on a defined strategy. Alternatively, prune data that is easily classified, to focus training on harder examples. This refined dataset would then be used for fine-tuning a smaller model suitable for the Qualcomm Cloud AI 100's 32 GB LPDDR4x memory, ensuring the 400 TOPS INT8 can be utilized efficiently for the critical samples.
  common_mistake: |
    **The Pitfall:** Confusing data pruning with coreset selection or general data augmentation.
    **The Rationale:** Candidates fail to understand that pruning discards specific "unhelpful" data rather than seeking a statistically representative subset.
    **The Consequence:** Incorrect application of the method, failing to optimize the model for specific deployment constraints.
  napkin_math: |
    1. Assumptions & Constraints:
       - Original dataset: 100,000 images (1 MB each) = 100 GB
       - Target pruning rate: 90%
    2. Calculations:
       - Pruned dataset size = 100 GB * (1 - 0.90) = 10 GB
    3. Conclusion & Interpretation:
       - **Result: Storage-Bound optimization. Pruning 90% retains critical information while ensuring the dataset fits comfortably for edge-based fine-tuning pipelines.**
