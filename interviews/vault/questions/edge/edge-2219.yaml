title: Implementing efficient backward pass for continual learning on Jetson Orin
scenario: You are implementing continual learning with Elastic Weight Consolidation (EWC) on an edge device (275 TOPS, 64GB, 60W). EWC requires computing the Fisher information diagonal (expected squared gradients per parameter) after learning each task. For a 10M parameter model, this requires running 1000 data samples and accumulating gradient² statistics within memory and power constraints.
question: How would you compute the Fisher diagonal over 1,000 samples for a 10M-parameter EWC model efficiently on the edge device?
details:
  realistic_solution: 'Use per-sample gradients via torch.func.grad and vmap to vectorize gradient computation across a mini-batch. Accumulate Fisher diagonal as sum of squared gradients without storing individual gradients. Use half precision (FP16) for Fisher accumulation. Power budget: EWC Fisher computation should be done in one pass, not incrementally — run at task boundary, then discard the graph.'
  common_mistake: |
    **The Pitfall:** Running the full backward pass for each sample sequentially and holding the full graph in memory (batch=1).
    **The Rationale:** Directly porting standard PyTorch backward loops without utilizing functional gradient vectorization.
    **The Consequence:** Massive power waste and potential memory exhaustion, turning a background continual learning task into a critical battery drain.
  napkin_math: |
    * **Sequential Approach (Batch=1)**: 1000 samples × 10 ms/sample = 10 seconds. Power = 10s × 60W = 600 Joules.
    * **Vectorized Approach (Batch=32)**: Time per pass = 5 ms. Passes = 1000 / 32 = 32 passes. Total Time = 32 × 5 ms = 160 ms.
    * **Vectorized Power**: 160 ms × 60W = 9.6 Joules.
    * **Conclusion**: Using vectorization (`vmap`) yields a **62x energy reduction**, critical for battery-powered deployments.
