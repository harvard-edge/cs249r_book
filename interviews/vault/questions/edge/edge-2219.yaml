title: Implementing efficient backward pass for continual learning on Jetson Orin
scenario: You are implementing continual learning with Elastic Weight Consolidation (EWC) on an edge device. EWC requires computing the Fisher information diagonal (expected squared gradients per parameter) after learning each task. For a 10M parameter model, this requires running 1000 data samples and accumulating gradient^2 statistics within memory and power constraints.
question: How would you compute the Fisher diagonal over 1,000 samples for a 10M-parameter EWC model efficiently on the edge device?
details:
  realistic_solution: |
    Iterating over 1,000 samples sequentially with a batch size of 1 triggers massive kernel launch overhead and wastes power. The optimal approach is leveraging functional vectorization (e.g., `torch.func.vmap`) to compute per-sample gradients in parallel across a mini-batch. Accumulate the squared gradients directly into a running FP16 Fisher diagonal buffer to avoid materializing the full Jacobian in memory, destroying the computation graph immediately after each batch to preserve RAM.
  common_mistake: |
    **The Pitfall:** Running the full backward pass for each sample sequentially and holding the full graph in memory (batch=1).
    **The Rationale:** Directly porting standard PyTorch backward loops without utilizing functional gradient vectorization.
    **The Consequence:** Massive power waste and potential memory exhaustion, turning a background continual learning task into a critical battery drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Samples: 1000.
       - Edge Power: 60W continuous draw.
    2. **Calculations:**
       - Sequential (Batch=1): 1000 samples * 10 ms/sample = 10 seconds. Energy = 10s * 60W = 600 Joules.
       - Vectorized (Batch=32): 1000 / 32 = 32 passes. Time = 32 * 5 ms = 160 ms. Energy = 0.16s * 60W = 9.6 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 62x energy reduction (600J to 9.6J). Bottleneck: Power and Kernel Overhead-Bound.**
