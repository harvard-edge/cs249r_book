title: Hardware-Aware NAS for Jetson Orin DLA
scenario: Your team is using Hardware-Aware NAS to design a multi-camera perception model for an autonomous
  delivery robot powered by an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP, 275 TOPS INT8). The NAS objective
  is to maximize mAP while strictly ensuring the model runs entirely on the Deep Learning Accelerator
  (DLA) to leave the Ampere GPU free for planning workloads. You need to define the search space constraints
  and cost model for the NAS algorithm to ensure the discovered architectures are actually DLA-compatible
  and meet a strict latency target.
question: "How would you constrain the NAS search space and cost model so the Orin DLA-only perception model is compatible and meets latency?"
details:
  realistic_solution: The correct approach involves constraining the NAS search space exclusively to operators
    natively supported by the Orin DLA. Furthermore, instead of theoretical FLOPs, the cost model must
    incorporate a hardware-calibrated latency lookup table (LUT) or an analytical latency predictor trained
    on actual DLA measurements to accurately evaluate the latency-accuracy tradeoff.
  common_mistake: Candidates often use raw FLOPs or parameter counts as proxy metrics for latency in the
    NAS cost model, ignoring that the DLA has specific supported operators and memory-bound performance.
    They might allow the NAS to search for complex attention mechanisms or arbitrary convolutions that
    force fallbacks to the Ampere GPU, defeating the primary goal.
  napkin_math: Assuming a target of 30 FPS for 4 concurrent cameras, the latency budget is 33ms / 4 =
    8.25ms per camera. The Jetson Orin provides 275 TOPS INT8 total (across Ampere + DLA). If we estimate
    the DLA portion provides roughly 25% of total system TOPS (68.75 TOPS) at full utilization, a realistic
    40% efficiency yields an effective 27.5 TOPS. For an 8.25ms budget, the maximum operations per inference
    is (27.5 * 10^12) * 0.00825 = 226.8 Giga-operations (GOPs). The NAS cost model must strictly constrain
    the search space to architectures under ~225 GOPs while ensuring intermediate activations don't saturate
    the memory bandwidth of the 32 GB LPDDR5.
