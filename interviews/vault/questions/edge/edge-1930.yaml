title: 'Transformer LLM Deployment on NVIDIA Jetson Orin: Cost-Performance Analysis'
scenario: You are tasked with deploying a 7-billion parameter Transformer-based Large Language Model (LLM) onto an NVIDIA Jetson Orin module for on-device, real-time inference. The LLM primarily uses FP16 for weights and activations but can leverage INT8 for specific operations.
question: How would you deploy the 7B FP16/INT8 LLM on Jetson Orin to meet a 2048-token context and <100 ms per token latency?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Aggressive quantization (e.g., INT8 for linear layers) to reduce model size and leverage Orin''s INT8 TOPS. 2) Employing optimized inference libraries (e.g., TensorRT) and kernel fusion. 3) Implementing a dynamic KV-cache management strategy (e.g., paged attention) or selective compression. 4) Exploring linear attention mechanisms or windowed attention to mitigate O(N^2) complexity where applicable. 5) Careful batching considering the 32GB LPDDR5 memory and 60W power budget.'
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of the KV-cache.
    **The Rationale:** Engineers often focus only on whether the static weights fit in memory.
    **The Consequence:** Especially for long context windows and larger batch sizes, ignoring KV-cache leads to out-of-memory errors or severe performance degradation due to memory bandwidth saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B params (FP16).
       - Target Context: 2048 tokens.
       - Target Latency: <100 ms per token.
    2. **Calculations:**
       - Base Weight Memory: 7B * 2 bytes/param = 14 GB.
       - KV-Cache per Sequence: 2 (K+V) * 2048 * 32 layers * 4096 hidden_dim * 2 bytes = 1,073,741,824 bytes = ~1 GB.
       - Total Memory Footprint: 14 GB (weights) + 1 GB (KV cache) = 15 GB.
       - Bandwidth Consideration: Reading 14 GB weights at 204.8 GB/s bandwidth takes ~68ms per token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound (68ms/token)**. The 15 GB footprint fits, and the memory bandwidth easily supports single-batch generation under the 100ms budget.
