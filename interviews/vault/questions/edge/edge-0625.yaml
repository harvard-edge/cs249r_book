title: 'The 360° Vision System Latency Collapse'
scenario: 'Your perception system uses eight 1080p cameras feeding into a central Jetson AGX Orin. The architecture runs eight separate lightweight classification models, one per camera, and attempts late fusion. This design has a 150ms end-to-end latency, catastrophically missing the 33ms hard real-time deadline. The system already consumes 55W.'
question: 'What new architecture would meet the 33ms and 60W budgets for eight cameras while leaving headroom for future LiDAR?'
details:
  realistic_solution: |
    The "N-model" approach introduces massive kernel launch overhead and poor hardware utilization. The optimal solution is early sensor fusion using a unified Bird's-Eye View (BEV) transformer or large unified CNN. This consolidates data into a single dense compute graph, drastically reducing kernel launches, maximizing Tensor Core utilization via TensorRT, and easily fitting the 33ms latency SLA.
  common_mistake: |
    **The Pitfall:** Suggesting incremental fixes like "prune the existing models more" or "upgrade the hardware."
    **The Rationale:** Engineers often attempt to optimize the sub-optimal pipeline rather than recognizing the core architectural flaw of N separate models.
    **The Consequence:** Failing to hit latency targets because the bottleneck is kernel launch overhead and PCIe/memory bandwidth, not sheer parameter count.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 separate models vs 1 unified model.
    - 33 ms hard real-time deadline.
    - Memory bandwidth: 204.8 GB/s.

    **Calculations:**
    - Old (8 models): Load 400 MB = 2 ms. True cost is 8x kernel launch overhead and disjointed cache utilization (~30% of 275 TOPS).
    - New (1 BEV model): Load 200 MB = 1 ms. Single dense graph achieves 70-80% utilization (~200 TOPS).

    **Conclusion & Interpretation:**
    - **Result: >2x Effective Compute Utilization Increase (Kernel-Launch-Bound).** Unifying the models eliminates launch overhead, easily meeting the 33ms deadline.
  options:
  - 'The solution is to move to a single, unified architecture that performs early fusion and is deployed with hardware-aware compilation.'
  - 'The latency is dominated by data preprocessing on the CPU; moving to GPU-accelerated preprocessing will resolve the bottleneck.'
  - 'Using a larger model with more parameters will improve both accuracy and latency, because larger models have better computational efficiency.'
  - 'Prune the existing 8 models more aggressively to eliminate parameter overhead.'
