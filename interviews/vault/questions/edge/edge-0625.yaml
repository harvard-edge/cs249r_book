title: The 360° Vision System Latency Collapse
scenario: You are the lead architect for an autonomous trucking company. Your current perception system uses eight 1080p cameras feeding into a central Jetson AGX Orin. The current architecture runs eight separate, lightweight classification models, one per camera, and then attempts a late fusion of their outputs. This design has a 150ms end-to-end latency, catastrophically missing the 33ms hard real-time deadline for object detection. The system already consumes 55W.
question: What new architecture would meet the 33ms and 60W budgets for eight cameras while leaving headroom for future LiDAR?
details:
  realistic_solution: The 'N-model' approach is fundamentally flawed. The solution is to move to a single, unified architecture that performs early fusion, is optimized via distillation, and is deployed with hardware-aware compilation.
  common_mistake: |
    **The Pitfall:** Suggesting incremental, insufficient fixes like "prune the existing models more" or suggesting more powerful hardware.
    **The Rationale:** Engineers often try to optimize the existing sub-optimal pipeline rather than stepping back to realize the architecture itself is flawed.
    **The Consequence:** Failing to hit the latency targets because the bottleneck is kernel launch overhead and memory bandwidth, not sheer parameter count.
  napkin_math: |
    *   **Old System (8 models):** Orin memory bandwidth is 204.8 GB/s. Loading eight 50MB models = 400MB. Load time = 400MB / 204.8 GB/s ≈ 2ms. The real cost is 8 separate kernel launch sequences causing massive CPU overhead.
    *   **Old Compute Utilization:** 8 small models are memory-bound, achieving ~30% of peak TOPS (60 TOPS).
    *   **New System (1 Unified BEV Model):** One 200MB model loaded once = 200MB / 204.8 GB/s ≈ 1ms.
    *   **New Compute Utilization:** One large, dense graph is compute-bound, hitting 70-80% of peak (140-160 TOPS).
    *   **Result:** A **>2x increase in effective compute utilization**, allowing the system to hit the 33ms deadline.
  options:
  - The 'N-model' approach is fundamentally flawed. The solution is to move to a single, unified architecture that performs early fusion, is optimized via distillation, and is deployed with hardware-aware compilation.
  - The latency is dominated by data preprocessing on the CPU; moving to GPU-accelerated preprocessing will resolve the bottleneck.
  - Using a larger model with more parameters will improve both accuracy and latency, because larger models have better computational efficiency.
  - Suggesting incremental, insufficient fixes like 'prune the existing models more' or 'try a slightly smaller backbone.' These fail to address the core architectural flaw: the lack of early, cross-sensor fusion and the massive overhead of running eight separate models.
