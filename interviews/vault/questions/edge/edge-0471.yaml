title: 'The Autonomous Driving Perception Stall: Real-Time Deadlines'
scenario: You are an ML systems engineer on an autonomous vehicle team. Your team has developed a new,
  highly accurate LiDAR segmentation model. During on-device testing with a NVIDIA Jetson AGX Orin, you
  observe that the model runs at only ~4 FPS, far below the required 30 FPS for real-time perception.
  Profiling shows the model requires 5 Trillion INT8 operations and accesses 50 GB of data (weights, activations,
  I/O) per inference. Using the hardware specs provided, diagnose the primary performance bottleneck.
details:
  realistic_solution: The primary bottleneck is memory bandwidth. The model's Arithmetic Intensity (AI)
    is too low to saturate the Jetson AGX Orin's powerful compute units. The device's roofline shows that
    it requires a high ratio of operations per byte of data moved to achieve peak performance. Since the
    model's AI is far below the device's Ridge Point, it is memory-bound. The performance is limited not
    by the 275 TOPS of compute, but by the 204.8 GB/s of memory bandwidth.
  common_mistake: Engineers often see low FPS and immediately blame the raw compute capacity of the device
    ('the model is too complex'), without considering the memory system. They assume that if a device
    is rated for 275 TOPS, any model using less than that should run at full speed. This ignores the fact
    that compute units will be idle (stalled) if the memory can't supply data fast enough.
  napkin_math: '1. **Calculate the hardware''s Ridge Point (Ops/Byte):** This is the AI needed to become
    compute-bound. Jetson AGX Orin: 275 TOPS INT8 / 204.8 GB/s = 1,343 Ops/Byte. 2. **Calculate model''s
    Arithmetic Intensity:** Model at ~4 FPS. If model has 10 TOps and moves 100 GB/s of data during inference,
    AI = 10e12 / 100e9 = 100 Ops/Byte. 3. **Diagnosis:** AI (100) << Ridge Point (1,343) → severely memory-bound.
    Achievable throughput = 204.8 GB/s × 100 Ops/Byte = 20.48 TOPS → 7.4% of peak. This matches the observed
    ~4 FPS.'
  options:
  - The model is compute-bound; its 5 Trillion operations are too much for the AGX Orin's GPU.
  - The device is power-throttling, as the AGX Orin cannot sustain the required TOPS/W in its 15W power
    mode.
  - The model is memory-bound; its low arithmetic intensity means performance is limited by memory bandwidth,
    not compute.
  - The MIPI CSI-2 camera interface is the bottleneck, as it cannot feed frames to the system fast enough.
  correct_index: 2
