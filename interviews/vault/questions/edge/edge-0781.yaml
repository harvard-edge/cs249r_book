title: Fleet-Wide Model Drift Detection Threshold
scenario: You manage 2,000 edge cameras for traffic monitoring. Each device reports hourly inference statistics. After 6 months, 150 devices in one region show a gradual decline in mean confidence from 0.82 (historical standard deviation of 0.03) to 0.71 over 3 weeks.
question: What statistical threshold should trigger a drift alert, and is the mean confidence drop from 0.82 to 0.71 real drift or normal variance?
details:
  realistic_solution: 'Compute per-device z-scores against each device''s own baseline. Since the drop spans weeks and the z-score exceeds 3.5, the probability of continuous random noise is infinitesimal. Confirm this geographically; trigger region-specific retraining rather than a blind global model update.'
  common_mistake: |
    **The Pitfall:** Setting a static, fixed threshold for drift alerts across the entire fleet.
    **The Rationale:** Engineers assume confidence scores should be uniform globally, ignoring environmental variance across localized deployment zones.
    **The Consequence:** Alert storms in naturally noisy environments and undetected silent failures in high-confidence zones.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Historical Mean: 0.82, StdDev: 0.03.
       - Observed Mean: 0.71.
       - Devices affected: 150 (out of 2,000).
    2. **Calculations:**
       - Z-score = (0.71 - 0.82) / 0.03 = -3.67.
       - Probability of single event noise (p) ≈ 0.00012.
       - Expected random affected devices = 2000 * 0.00012 = 0.24 devices.
       - Observed affected = 150 (which is 625x higher than expected).
    3. **Conclusion & Interpretation:**
       - **Result: Definitive Drift**. A z-score of -3.67 sustained over weeks on 150 clustered devices statistically eliminates normal variance; this is a confirmed environmental distribution shift.
