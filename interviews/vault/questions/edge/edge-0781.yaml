title: Fleet-Wide Model Drift Detection Threshold
scenario: You manage 2,000 edge cameras for traffic monitoring. Each device reports hourly inference statistics (mean confidence, detection count, 64-bin histogram). After 6 months, 150 devices in one region show a gradual decline in mean confidence from 0.82 (historical standard deviation of 0.03) to 0.71 over 3 weeks.
question: What statistical threshold should trigger a drift alert, and is the mean confidence drop from 0.82 to 0.71 real drift or normal variance?
details:
  realistic_solution: 'Compute per-device z-scores against each device''s own baseline: z = (0.71 - 0.82) / 0.03 = -3.67 (p = 0.012%). With 48 hourly samples all showing z <= -3.67, noise probability is ~10^-188 — definitively real drift. Fleet confirmation: 150 affected vs 0.24 expected by chance for this magnitude of drop (625x). Likely an environmental shift in one geographic region. Trigger per-region retraining, not a global update. Monitoring bandwidth: ~14.4 MB/day for the full fleet.'
  common_mistake: |
    **The Pitfall:** Setting a static, fixed threshold for drift alerts across the entire fleet.
    **The Rationale:** Engineers assume confidence scores should be uniform, ignoring environmental variance across deployment locations.
    **The Consequence:** High false-positive alert rates in naturally low-confidence environments and missed drift in typically high-confidence zones.
  napkin_math: |
    - Per-device z-score: (0.71 - 0.82) / 0.03 = -3.67.
    - Probability of single event noise: p ≈ 0.00012 (0.012%).
    - Probability of 48-hour continuous noise: (0.00012)^48 ≈ 10^-188.
    - Expected random affected devices: 2000 * 0.00012 = 0.24.
    - Observed affected: 150 (625x expected), meaning **drift is definitively real**.
    - Bandwidth: 2000 devices * 300 bytes * 24 reports/day = **14.4 MB/day**.
