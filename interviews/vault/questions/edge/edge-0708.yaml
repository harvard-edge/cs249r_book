title: The NPU Definition
scenario: Modern edge devices often feature an NPU alongside the CPU and GPU. What does NPU stand for,
  and what mathematical operation is it physically optimized to perform?
question: "What does NPU stand for, and what mathematical operation is it physically optimized to perform?"
details:
  realistic_solution: Neural Processing Unit. It is highly optimized for massively parallel, low-precision
    Multiply-Accumulate (MAC) operations, which form the backbone of matrix multiplications in neural
    networks.
  common_mistake: Thinking it stands for Network Processing Unit or assuming it's just a faster CPU.
  napkin_math: '- Orin NPU (DLA): 275 TOPS INT8. CPU (Cortex-A78): ~50 GOPS INT8.
    NPU is ~5,500× more efficient for MAC ops. | - One Conv2D layer (3×3, 256 input
    channels, 64 output channels, 56×56 output): MACs = 3×3×256×64×56×56 ≈ 462M MACs = 924M OPs.
    NPU: 924M / 275T = 3.36µs. CPU: 924M / 50G = 18.5ms. | - => NPU completes in microseconds
    what takes the CPU milliseconds — purpose-built silicon for the dominant operation.'
  options:
  - Network Processing Unit; optimized for fast Wi-Fi routing.
  - Neural Processing Unit; optimized for dense Multiply-Accumulate (MAC) operations.
  - Node Partition Unit; optimized for virtualizing the edge operating system.
  - Numeric Precision Unit; optimized for high-accuracy 64-bit floating point math.
  correct_index: 1
