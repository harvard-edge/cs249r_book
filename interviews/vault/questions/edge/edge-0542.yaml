title: The Ambarella CV5 Encoding Bottleneck
scenario: 'An 8K dashcam uses an Ambarella CV5, which runs an H.265 encoder and a CVflow neural network accelerator (20 TOPS) simultaneously on separate hardware blocks. During testing, the object detection model''s inference latency spikes from 15ms to 40ms whenever the encoder is active.'
question: Since the model and encoder use separate hardware blocks, what causes the inference latency to spike when the encoder is active?
details:
  realistic_solution: The bottleneck is **shared DRAM bandwidth**. Both the encoder and the NN accelerator are memory-bandwidth-hungry, and they share the same LPDDR5 memory bus.
  common_mistake: |
    **The Pitfall:** Stating that the encoder and NN accelerator are sharing compute resources.
    **The Rationale:** Candidates often assume that any concurrent slowdown implies shared processing cores, missing system-level interconnects.
    **The Consequence:** Failing to identify shared DRAM bandwidth as the bottleneck leads to ineffective software optimizations instead of memory-access solutions.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5 bandwidth is 17.9 GB/s.
    - Active components: 8K30 Encoder (5.2 GB/s), NN (1.2 GB/s), ISP (3.0 GB/s), OS (1.0 GB/s).

    **Calculations:**
    - Total bandwidth demand = 5.2 + 1.2 + 3.0 + 1.0 = 10.4 GB/s.
    - Average utilization = 10.4 / 17.9 = 58%.
    - Memory controller burst contention inflates NN latency to 40ms.
    - Dropping to 4K reduces encoder to 1.5 GB/s (total 6.7 GB/s).

    **Conclusion & Interpretation:**
    - **Result: Burst contention creates latency spike despite 58% avg util (Memory-Bandwidth Bound)**. Reducing encoder resolution eliminates the stall.
