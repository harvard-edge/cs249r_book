title: The Ambarella CV5 Encoding Bottleneck
scenario: You're building an 8K dashcam with on-device AI using the Ambarella CV5. The CV5 can encode
  8K30 video (H.265) and run a CVflow neural network accelerator (20 TOPS) simultaneously. But during
  testing, your object detection model's inference latency spikes from 15ms to 40ms whenever the encoder
  is active. The model and encoder use separate hardware blocks. What's happening?
details:
  realistic_solution: The bottleneck is **shared DRAM bandwidth**. Both the encoder and the NN accelerator
    are memory-bandwidth-hungry, and they share the same LPDDR5 memory bus.
  common_mistake: '"The encoder and neural network accelerator are sharing compute resources." They''re
    not — the CVflow NN engine and the H.265 encoder are physically separate hardware blocks. The candidate
    who stops at "resource contention" without identifying *which* resource is contending will miss the
    real answer.'
  napkin_math: 'DRAM bandwidth budget: 17.9 GB/s available. Encoder (8K30): 5.2 GB/s (29%). NN (30 FPS):
    1.2 GB/s (7%). ISP: 3.0 GB/s (17%). Other: 1.0 GB/s (6%). Total: 10.4 GB/s (58%). Average utilization
    looks fine, but burst contention at the memory controller causes 2.7× latency inflation on the NN
    path. Downscaling to 4K recording: encoder drops to 1.5 GB/s, total = 6.7 GB/s (37%), burst conflicts
    drop dramatically, NN latency returns to 15ms.'
