title: The Driver Monitoring Latency Budget
scenario: You're an ML systems engineer on an automotive team designing a new driver monitoring system. The system runs on an NVIDIA Jetson AGX Orin, which is allocated a strict 15W power budget. The end-to-end pipeline latency from frame capture to driver alert must be under the 33ms hard real-time deadline. The pipeline has a fixed 8ms overhead for data pre/post-processing. You are evaluating Efficient-CNN (1.5 TeraOps/frame) and Small-ViT (2.0 TeraOps/frame).
question: Under a 15W budget and 8ms fixed overhead, which model meets the 33ms deadline: Efficient-CNN or Small-ViT?
details:
  realistic_solution: Calculate sustained TOPS based on the power budget (15W), not peak theoretical TOPS. The Jetson AGX Orin offers ~4.6 TOPS/W efficiency. With sustained TOPS, calculate inference time for each model and add fixed pipeline overhead to verify the 33ms deadline.
  common_mistake: |
    **The Pitfall:** Using the headline "peak" TOPS number (e.g., 275 TOPS) for latency estimates, ignoring the power budget.
    **The Rationale:** Engineers assume silicon always runs at maximum advertised clock speeds regardless of thermal or electrical constraints.
    **The Consequence:** Predicting wildly optimistic latencies and deploying models that completely fail to meet hard real-time safety deadlines in constrained vehicles.
  napkin_math: |
    - **Sustained Compute:** 15W budget * 4.6 TOPS/W efficiency = 69 Sustained TOPS.
    - **Efficient-CNN Latency:** 1.5 TeraOps / 69 TOPS = 21.7 ms inference.
    - **Small-ViT Latency:** 2.0 TeraOps / 69 TOPS = 29.0 ms inference.
    - **Total Latency Check:** Efficient-CNN = 21.7 + 8 = 29.7 ms. Small-ViT = 29.0 + 8 = 37.0 ms.
    - **Final Result:** **The Efficient-CNN meets the budget (~29.7 ms), while the Small-ViT misses the 33 ms deadline.**
