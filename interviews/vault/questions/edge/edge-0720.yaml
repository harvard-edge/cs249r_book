title: The OTA Flash Budget
scenario: 'You''re an engineer on an automotive team responsible for deploying a new perception model to a fleet of vehicles. The target ECU has 2MB of total flash storage.'
question: 'When planning the over-the-air (OTA) update, which of the following is the most fundamental constraint to identify first?'
details:
  realistic_solution: 'The most fundamental constraint is the available flash storage in the inactive partition. For fail-safe A/B partitioning, half the flash is reserved for the new image. If the payload exceeds this reserved space, the update is physically impossible.'
  common_mistake: |
    **The Pitfall:** Focusing on network bandwidth or installation time instead of available fail-safe flash storage.
    **The Rationale:** Engineers accustomed to cloud environments assume storage is infinite, focusing instead on transfer optimization.
    **The Consequence:** The team builds an update package that physically cannot be installed because it exceeds the inactive A/B partition size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash: 2MB.
    - A/B Partitioning requires two equal slots.

    **Calculations:**
    - Partition Size: 2MB / 2 = 1MB per slot.
    - OS Overhead: RTOS and bootloader consume ~100KB.
    - Max Payload: 1MB - 100KB = 900KB.

    **Conclusion & Interpretation:**
    - **Result: 900KB absolute physical limit (Storage-Capacity-Bound)**. The OTA update fundamentally cannot exceed the available inactive slot capacity.
  options:
    - 'The vehicle''s 4G/5G network bandwidth for the download.'
    - 'The power consumed by the flash write operation.'
    - 'The available storage space in the inactive firmware partition.'
    - 'The compute time required to validate the new model post-installation.'
  correct_index: 2
