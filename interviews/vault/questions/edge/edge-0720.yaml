title: The OTA Flash Budget
scenario: You're an engineer on an automotive team responsible for deploying a new perception model to a fleet of vehicles. The target ECU has 2MB of total flash storage.
question: When planning the over-the-air (OTA) update, which of the following is the most fundamental constraint to identify first?
details:
  realistic_solution: The most fundamental constraint is the available flash storage in the inactive partition. To ensure the vehicle can recover from a failed update, a portion of the flash (often half) is reserved to hold the complete new firmware image while the current one is running. If the new image is larger than this reserved space, the update is physically impossible regardless of network speed or permitted downtime.
  common_mistake: |
    **The Pitfall:** Focusing on network bandwidth or installation time instead of available fail-safe flash storage.
    **The Rationale:** Engineers accustomed to cloud or mobile environments assume storage is essentially infinite, focusing instead on optimizing transfer times.
    **The Consequence:** The team builds an update package that physically cannot be installed because it exceeds the size of the inactive A/B partition required for safe rollbacks.
  napkin_math: |
    1. **Total Flash:** 2MB.
    2. **A/B Partitioning:** For fail-safe updates, flash is split into two 1MB partitions (Active and Inactive).
    3. **OS Overhead:** If the RTOS and bootloader consume 100KB within a partition, the hard limit for the update payload is 900KB.
    4. **Result:** The absolute physical limit for the new model + application code is **900KB**, less than half the advertised total storage.
  options:
  - The vehicle's 4G/5G network bandwidth for the download.
  - The power consumed by the flash write operation.
  - The available storage space in the inactive firmware partition.
  - The compute time required to validate the new model post-installation.
  correct_index: 2
