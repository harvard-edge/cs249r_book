title: The Edge Container Overhead
scenario: Your team wants to deploy a 1.5 GB YOLOv8 model and a 1 GB camera ISP pipeline on a Jetson Orin NX (8 GB unified memory) using Docker containers. The DevOps engineer says 'containers are lightweight — the memory overhead is negligible.' Your embedded systems colleague says 'Docker on an 8 GB device running ML is insane.'
question: "How does Docker's memory overhead (cgroups, overlay2) reduce the available GPU memory for ML model weights and activations, and what does the actual memory budget look like?"
details:
  realistic_solution: "On a Jetson, the CPU and GPU share the same physical LPDDR5 RAM. Any memory consumed by the CPU (like the Docker daemon) is memory stolen directly from the GPU's potential VRAM pool. Docker container overhead has three components that eat into your ML budget:\n  (1) **Runtime memory:** The container runtime (containerd + shim) uses ~50 MB.\n  (2) **Filesystem cache:** The container's filesystem layer (overlay2) caches metadata in RAM: ~30 MB for a typical ML container image.\n  (3) **Network namespace:** The isolated network stack takes ~10 MB.\n  Total runtime overhead: **~90 MB**.\n  While 90 MB sounds small on an 8 GB device, it's a massive percentage of your *headroom*. After the OS (1.5 GB), camera ISP (1 GB), and your ML model weights (1.5 GB), you have ~4 GB free. But the ML model needs activation memory (often 2-3x the weight size for large batch sizes or high resolutions). If activations need 3.9 GB, that 90 MB Docker overhead is the difference between running successfully and triggering the Linux OOM killer."
  common_mistake: |
    **The Pitfall:** Assuming "Containers have zero overhead because they share the host kernel."
    **The Rationale:** Candidates extrapolate cloud server principles without understanding the userspace memory footprint of the container runtime.
    **The Consequence:** On edge unified memory architectures, ignoring this small but fixed overhead consumes the tiny remaining memory margin, guaranteeing an OOM kill under load.
  napkin_math: |
    1. **Device Capacity:** 8.0 GB.
    2. **Bare Metal Usage:** OS (1.5 GB) + ISP (1.0 GB) + Model Weights (1.5 GB) = 4.0 GB used. Remaining: 4.0 GB.
    3. **Activations:** YOLOv8 activations require ~3.95 GB. Total bare metal = `4.0 + 3.95 = 7.95 GB` (Fits with 50 MB free).
    4. **Docker Overhead:** Runtime (~50 MB) + Filesystem cache (~30 MB) + Network (~10 MB) = ~90 MB.
    5. **Total with Docker:** `7.95 GB + 0.09 GB = 8.04 GB` (Exceeds 8.0 GB).
    **The ~90 MB container overhead consumes the tiny remaining memory margin, triggering the Linux OOM killer.**
