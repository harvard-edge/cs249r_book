title: RDMA over PCIe for Jetson Orin Multi-Node Edge Cluster
scenario: >-
  Four Jetson Orin modules (32GB LPDDR5 each) are connected via 10GbE for a distributed edge inference system. The team wants to implement RDMA to reduce latency for model state sharing.
question: Is RDMA appropriate for four Jetson Orins on 10GbE, and what simpler alternative could achieve similar latency benefits?
details:
  realistic_solution: 'RDMA over 10GbE (iWARP or RoCEv2) reduces latency 5-10x but has high setup complexity for only 4 nodes. A simpler alternative for a small cluster is io_uring for async TCP with zero-copy, which achieves 30-50μs latency at 10GbE. RDMA setup overhead is justified only if you have >1000 messages/s with <50μs strict latency requirements.'
  common_mistake: |
    **The Pitfall:** Blindly recommending full InfiniBand RDMA for a tiny edge cluster.
    **The Rationale:** Candidates recognize RDMA's latency benefits from data center environments but fail to context-switch to the edge.
    **The Consequence:** This introduces massive setup complexity, custom driver maintenance, and cost overhead that completely overshadows the minor latency gains for a 4-node system.
  napkin_math: |
    1. 10GbE provides ~1.25 GB/s bandwidth.
    2. For control messages (1KB state sync), TCP latency is ~200μs, RDMA is ~15μs (13x faster).
    3. At 100 syncs/sec, TCP adds `100 * 200μs = 20ms` overhead per second (2% of a 1s cycle).
    4. RDMA adds `100 * 15μs = 1.5ms`.
    5. **Result:** A 20ms/s TCP overhead is perfectly acceptable for a 4-node edge system. RDMA is only necessary if the sync rate strictly exceeds 1000/s.
