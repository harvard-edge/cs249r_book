title: 'Edge TCO Fluency: Rapid Cost-Per-Inference Estimation'
scenario: 'Estimate from memory the cost-per-inference for these systems over 3 years at 10 inferences/second, 24/7: (1) Jetson Orin ($499, 60W), (2) Hailo-8+Pi5 ($280, 7.5W), (3) Coral+Pi4 ($60, 7W). State the formula and rank by cost-efficiency.'
question: What are the 3-year total cost and cost-per-inference for Jetson Orin, Hailo-8+Pi5, and Coral+Pi4 at 10 inferences/s?
details:
  realistic_solution: 'Compute 3-year power cost as watts × 26,280 hours × $0.10/kWh / 1000, then add hardware CapEx. Jetson Orin: $499 + $157.68 = $656.68. Hailo-8+Pi5: $280 + $19.71 = $299.71. Coral+Pi4: $60 + $18.40 = $78.40. At 10 inferences/s for 3 years, each system serves about 946 million inferences, so Coral is cheapest, then Hailo, then Orin, assuming all meet the latency and accuracy requirement.'
  common_mistake: Forgetting to include the host processor power (Pi or similar) in the Hailo-8 and Coral TPU systems, which dominate the power budget for these edge accelerators.
  napkin_math: '3 years = 26,280 h. Inferences = 10 × 26,280 × 3600 = 946,080,000. Power: Orin = 60W × 26,280h × $0.10/1000 = $157.68; Hailo = 7.5W × 26,280h × $0.10/1000 = $19.71; Coral = 7W × 26,280h × $0.10/1000 = $18.40. TCO: $656.68, $299.71, $78.40.'
