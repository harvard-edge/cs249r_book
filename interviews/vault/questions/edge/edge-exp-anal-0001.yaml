title: Edge TPU Operator Fallback Penalty
scenario: A team deploys a 20 GOPS INT8-quantized vision model on a Google Coral Edge TPU (4 TOPS INT8,
  2W budget) connected via USB 3.0 (250 MB/s effective bandwidth). They expect a compute latency of 5ms.
  However, they observe a total inference latency of 45ms. Profiling shows that due to the Edge TPU's
  limited operator support, an unsupported activation in the middle of the network forces a 5 MB intermediate
  tensor to be sent to the host CPU and back. Explain why this happens and calculate the exact I/O penalty.
details:
  realistic_solution: Because the Edge TPU relies on rigid, custom ASICs optimized strictly for efficiency
    over programmability, unsupported operators force model partitioning. The system must pause acceleration,
    serialize the 5 MB tensor over the USB bus to the CPU, compute the unsupported layer, and transfer
    it back. This I/O transfer completely negates the 4 TOPS compute advantage.
  common_mistake: Candidates often blame the host CPU's slow compute speed for the delay or assume the
    accelerator is thermally throttling to stay within its 2W envelope. They fail to mathematically evaluate
    the host-device data transfer bottleneck over USB.
  napkin_math: 'Theoretical Compute Time: 20 GOPS / 4,000 GOPS (4 TOPS) = 0.005 seconds (5ms). Transfer
    to CPU: 5 MB / 250 MB/s = 0.02 seconds (20ms). Transfer back to TPU: 5 MB / 250 MB/s = 0.02 seconds
    (20ms). Total Transfer Penalty = 20ms + 20ms = 40ms. Total Latency = 5ms compute + 40ms transfer =
    45ms.'
