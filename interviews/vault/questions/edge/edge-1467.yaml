title: Zero-Copy Video Pipeline Architecture for Google Coral Edge TPU
scenario: You are designing an edge-based smart security camera system. The system
  captures 1080p video at 60 FPS and runs object detection on a Google Coral Edge
  TPU connected via USB 3.0. The Edge TPU provides 4 TOPS at 2W and requires INT8
  quantized models. Your team noticed that the CPU utilization is at 100% and inference
  framerate is dropping to 15 FPS, even though the Coral Edge TPU is only utilized
  at 30%. Architect a data movement pipeline to resolve this bottleneck, considering
  host-to-device transfers.
question: How would you redesign the 1080p60 Coral USB data pipeline to fix 100% CPU
  use while the Edge TPU sits at 30% utilization?
details:
  realistic_solution: The optimal design uses a zero-copy pipeline leveraging DMA
    buffers (e.g., Linux dma-buf). The camera ISP writes directly to contiguous pinned
    memory. The application passes file descriptors rather than copying pixel data.
    The Edge TPU driver then initiates a DMA transfer directly from this pinned memory
    over the USB controller, completely bypassing CPU memory copies.
  common_mistake: Candidates often suggest optimizing the model architecture or quantizing
    further, ignoring that the Edge TPU already requires INT8. They miss the host-side
    data movement bottleneck, assuming `memcpy` from camera driver to user-space,
    and then from user-space to the USB device driver is 'fast enough' on edge devices.
  napkin_math: 1080p at 60 FPS RGB = 1920 * 1080 * 3 bytes * 60 = 373 MB/s. USB 3.0
    real-world bandwidth is ~400 MB/s. A naive pipeline (Camera -> Kernel RAM -> User
    RAM -> USB Kernel Driver) performs 3 copies, requiring 373 * 3 = 1.12 GB/s of
    host memory bandwidth and heavy CPU interrupt load. The zero-copy DMA approach
    reduces this to ~373 MB/s single-trip, easily fitting within the USB 3.0 limits
    and freeing the CPU.
