title: 'Fault Tolerance: Optimize Checkpoint Frequency for Battery-Powered Edge Device'
scenario: Your Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) device runs on a 100Wh
  battery backup (2-hour runtime at 60W load). The device runs online learning checkpointing
  every 5 minutes (LoRA weights, 2MB per checkpoint). Each checkpoint write costs
  energy. Optimize checkpoint frequency to balance recovery completeness against battery
  life impact.
question: How much battery does checkpointing 2MB LoRA weights every 5 minutes consume,
  and is it worth reducing the frequency?
details:
  realistic_solution: Checkpointing overhead for edge devices is dominated by write
    energy, not compute. 12mJ per checkpoint event is negligible vs continuous inference
    power draw.
  common_mistake: Not accounting for NVMe write energy in battery budget; checkpointing
    too frequently and draining battery during power events (when checkpointing is
    most important).
  napkin_math: 'Checkpointing energy: 12mJ per checkpoint = 0.0000033 Wh = 0.000003333
    Wh per event. 6 checkpoints/hour × 8760 hours/year = 52,560 events/year. Annual
    energy: 52,560 × 0.0000033 Wh = 0.173 Wh/year from checkpointing = negligible
    vs 60W baseline.'
