title: Diagnosing OOM from Memory Fragmentation on AI 100
scenario: You are running an object detection pipeline on an on-premise Qualcomm Cloud AI 100 inference accelerator. The INT8 model weights consume 8 GB of device memory, and peak activations require another 6 GB. After several days of continuous operation handling dynamic batch sizes from multiple camera feeds, the application crashes with a device Out-Of-Memory (OOM) error, even though system telemetry reports only 18 GB of memory was in use.
question: How do you diagnose the root cause of this failure?
details:
  realistic_solution: |
    The root cause is memory fragmentation in the LPDDR4x device memory. Continuous allocation and deallocation of variably sized activation buffers over days fragment the available memory pool. When the system needs to allocate a large contiguous block for a sudden spike in batch size, the allocator fails to find a single contiguous chunk of free memory, triggering an OOM despite having sufficient total free memory. The fix is to pre-allocate a fixed-size memory pool for the maximum expected batch size upfront.
  common_mistake: |
    **The Pitfall:** Assuming an application-level memory leak and suggesting profiling the host code.
    **The Rationale:** Candidates often jump to standard software debugging techniques without considering hardware-specific memory management constraints.
    **The Consequence:** They fail to identify device-level memory fragmentation caused by dynamic batching, leading to ineffective debugging strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Available Memory: 32 GB LPDDR4x.
       - Static Usage: 8 GB (INT8 Weights).
       - Peak Dynamic Usage: 6 GB (Activations).
    2. **Calculations:**
       - Max Theoretical Usage: 8 GB + 6 GB = 14 GB.
       - Reported Free Memory: 32 GB - 14 GB = 18 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Fragmentation OOM)**. If the 18 GB of free memory is highly fragmented, an allocation request for a contiguous 1 GB activation tensor will fail, causing an OOM.
