title: Drone Power-Precision Tradeoff
scenario: A battery-powered drone runs obstacle avoidance at 30 FPS. The FP16 base model requires 10 GFLOPs/frame. The SoC has an FP16 GPU (2 TFLOPS peak, drawing 4W) and an INT8 NPU (8 TOPS peak, drawing 1W). Quantizing the model to INT8 increases the required compute to 12 GOPS due to quantization-aware scaling layers, and drops accuracy by 1%. The product manager suggests using the GPU to avoid the 20% compute penalty and accuracy drop.
question: Which accelerator should run obstacle avoidance to maximize flight time, given the 12 GOPS INT8 NPU model and 1% accuracy drop?
details:
  realistic_solution: Although the INT8 model requires 20% more operations (12 GOPS vs 10 GFLOPs), the NPU's power efficiency (TOPS/Watt) is vastly superior to the GPU. We must calculate the energy consumed per frame for both accelerators to determine the battery drain. The GPU consumes 20mJ per frame, while the NPU consumes only 1.5mJ per frame. Despite the compute overhead from quantization scaling layers, the INT8 NPU is over 13x more energy-efficient per frame. For a battery-constrained edge device, the NPU is the only viable choice to maximize flight time.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 20% increase in raw operations.
    **The Rationale:** Candidates assume that because the INT8 model requires more operations, it will inherently draw more total energy.
    **The Consequence:** They mistakenly choose the GPU, which completely drains the drone's battery far faster due to its lower power efficiency.
  napkin_math: |
    1. GPU efficiency: 2 TFLOPS (2000 GFLOPS) / 4W = 500 GFLOPS/W.
    2. GPU Frame Energy: 10 GFLOPs / 500 GFLOPS/W = 0.02 Joules = 20 mJ.
    3. NPU efficiency: 8 TOPS (8000 GOPS) / 1W = 8000 GOPS/W.
    4. NPU Frame Energy: 12 GOPS / 8000 GOPS/W = 0.0015 Joules = 1.5 mJ.
    5. **At 30 FPS, the GPU draws 0.6W average, while the NPU draws 0.045W. The NPU saves 0.555W continuously, making it the only viable choice for flight time.**
