title: Evaluating GPU to Edge TPU Migration
scenario: Your team has a real-time object detection model originally optimized for an embedded GPU in FP16. To meet a strict 2W power limit, you are evaluating a migration to the Google Coral Edge TPU. The model requires 20 GOPS per inference, and the product requirement is 50 FPS.
question: How would you migrate the 20 GOPS, 50 FPS detector from an FP16 GPU to the Coral Edge TPU and verify it fits the 4 TOPS INT8 limit?
details:
  realistic_solution: |
    Evaluate the model's architecture against the Coral's supported operations, mandating Quantization-Aware Training (QAT) to maintain accuracy in INT8. Verify that all operators compile fully to the TPU to avoid CPU fallback. Tensor shapes must be optimized for its specific memory architecture to sustain high throughput.
  common_mistake: |
    **The Pitfall:** Assuming peak TOPS translates directly to achievable throughput without checking operator compatibility.
    **The Rationale:** Candidates see that the math fits within the TOPS limit but ignore that unsupported operators fall back to the host CPU.
    **The Consequence:** Breaking the execution pipeline, causing massive latency spikes due to CPU-TPU synchronization overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 20 GOPS/frame.
       - Target throughput: 50 FPS.
       - Target hardware: Coral Edge TPU (4 TOPS INT8).
    2. **Calculations:**
       - Total Required Compute: 20 GOPS * 50 FPS = 1000 GOPS = 1 TOPS.
       - Peak Capacity: 4 TOPS.
       - Theoretical Utilization: 1 TOPS / 4 TOPS = 25%.
    3. **Conclusion & Interpretation:**
       - **Result: 25% compute utilization (Compute-Feasible).** Fits safely if operators fully compile without CPU fallbacks.
