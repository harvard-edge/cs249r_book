title: Architecting a Multi-Model Pipeline on Qualcomm Cloud AI 100
scenario: Your team needs to deploy a computer vision pipeline consisting of an object
  detector, a tracker, and a transformer-based re-identification model on an on-premise
  edge server. The deployment target is a single Qualcomm Cloud AI 100 accelerator
  featuring 32 GB LPDDR4x memory, 400 TOPS (INT8), and a strict 75W power limit. Evaluate
  the memory layout and execution strategy to maximize throughput while ensuring the
  models fit within the 32 GB footprint without causing out-of-memory errors during
  peak load. Design the memory management architecture to handle variable batch sizes
  up to 16.
question: How would you lay out memory and schedule detector, tracker, and transformer
  Re-ID execution on Cloud AI 100 for batches up to 16?
details:
  realistic_solution: A robust design involves quantizing the models to INT8 to leverage
    the 400 TOPS capacity and reduce static memory footprint by 4x. The architecture
    should include a shared memory pool for activations across the pipeline stages,
    as they execute sequentially. Memory pinning and pre-allocation for the maximum
    batch size of 16 ensure predictable execution without dynamic allocation overhead.
  common_mistake: Candidates often only sum up the static parameter sizes of the models
    and assume they will fit. They frequently neglect the dynamic activation memory
    required for a batch size of 16, especially for the memory-intensive transformer
    re-identification model, leading to runtime OOM errors.
  napkin_math: 'Detector (FP32: 200MB -> INT8: 50MB) + Tracker (FP32: 50MB -> INT8:
    12.5MB) + Re-ID Transformer (FP32: 1.2GB -> INT8: 300MB) = ~362.5MB static weights.
    For batch size 16, Re-ID activations might peak at 4GB per layer. Total required
    memory = 362.5MB (weights) + 4GB (activations) + 1GB (OS/Driver overhead) = ~5.4GB,
    well within the 32 GB LPDDR4x limit, allowing for parallel streams or larger models
    if needed.'
