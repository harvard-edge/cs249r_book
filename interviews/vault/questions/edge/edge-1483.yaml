title: Architecting a Multi-Model Pipeline on Qualcomm Cloud AI 100
scenario: A pipeline consisting of an object detector, a tracker, and a transformer Re-ID model must run on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8).
question: How would you lay out memory and schedule detector, tracker, and transformer Re-ID execution on Cloud AI 100 for batches up to 16?
details:
  realistic_solution: Quantize all models to INT8 to shrink static weights by 4x. Architect a shared memory pool for activations, exploiting the sequential execution pipeline (detector -> tracker -> Re-ID). Pin and pre-allocate this pool for the maximum batch size of 16 to guarantee deterministic memory footprints and avoid dynamic allocation jitter, ensuring the massive transformer activations do not cause runtime OOM errors.
  common_mistake: |
    **The Pitfall:** Summing only static weight sizes and allowing dynamic allocations.
    **The Rationale:** Forgetting that dynamic activation memory for a transformer at batch=16 dwarfs the static weights.
    **The Consequence:** In-production Out-Of-Memory crashes during peak load spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max Batch Size = 16. Execution is sequential.
       - INT8 Weights: Detector 50MB, Tracker 12.5MB, Re-ID 300MB.
       - Re-ID peak activations per layer = 4GB.
    2. **Calculations:**
       - Static Weights: 50 + 12.5 + 300 = 362.5 MB.
       - Shared Activation Pool (determined by max operator, Re-ID): 4,000 MB.
       - OS/Overhead: 1,000 MB.
       - Total Footprint: 362.5 MB + 4,000 MB + 1,000 MB = 5,362.5 MB (~5.4 GB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound. Pre-allocating ~5.4GB guarantees safety within the 32GB envelope.**
