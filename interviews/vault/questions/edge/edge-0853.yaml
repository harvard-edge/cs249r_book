title: Debugging Edge Shadow Mode OOM Crashes
scenario: A smart home company implements on-device continuous learning to personalize a wake-word detection model. To monitor the newly adapted variant, it is deployed in 'shadow mode' to run concurrently with the frozen baseline model. The edge device features an ARM Cortex-M7 with 1.5MB of available SRAM. The baseline model requires 800KB of RAM for its weights and intermediate activations, while the shared audio ring buffer uses 200KB. Shortly after enabling shadow evaluation, the devices begin hard crashing due to memory faults.
question: Why do the wake-word devices hard crash after enabling shadow-mode evaluation alongside the baseline under a 1.5MB SRAM limit?
details:
  realistic_solution: The system experiences an Out-Of-Memory (OOM) crash because executing two independent model instances simultaneously exceeds the strict 1.5MB SRAM limit. The architecture must be updated to either temporally multiplex the shadow evaluations (e.g., running the shadow model only on every 10th inference cycle) or share the frozen feature extraction backbone between both classification heads to reduce the memory footprint by at least 300KB.
  common_mistake: |
    **The Pitfall:** Assuming crashes are due to numerical instability or power throttling.
    **The Rationale:** Candidates overlook basic memory footprint arithmetic and assume the adaptation process (NaNs) or intensive computations caused the crash.
    **The Consequence:** Wasting time debugging the learning rate or power modes when the system simply lacks the physical SRAM to load both models simultaneously.
  napkin_math: |
    * **Baseline Model Memory:** 800KB
    * **Shadow Model Memory:** 800KB
    * **Shared Audio Buffer:** 200KB
    * **Total Required Memory:** 800 + 800 + 200 = 1800KB
    * **Available SRAM:** 1500KB
    * **Deficit:** 1800KB - 1500KB = **+300KB (Immediate OOM crash)**
