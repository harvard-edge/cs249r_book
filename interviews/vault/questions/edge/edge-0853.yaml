title: Debugging Edge Shadow Mode OOM Crashes
scenario: A smart home company implements on-device continuous learning to personalize a wake-word detection
  model. To monitor the newly adapted variant for catastrophic forgetting, it is deployed in 'shadow mode'
  to run concurrently with the frozen baseline model. The edge device features an ARM Cortex-M7 with 1.5MB
  of available SRAM for machine learning. The baseline model requires 800KB of RAM for its weights and
  intermediate activations, while the shared audio ring buffer uses 200KB. Shortly after enabling shadow
  evaluation on real-world continuous audio streams, the devices begin hard crashing due to memory faults
  when motion is detected. Diagnose the root cause of the failure.
details:
  realistic_solution: The system experiences an Out-Of-Memory (OOM) crash because executing two independent
    model instances simultaneously exceeds the strict 1.5MB SRAM limit. The architecture must be updated
    to either temporally multiplex the shadow evaluations (e.g., running the shadow model only on every
    10th inference cycle) or share the frozen feature extraction backbone between both classification
    heads to reduce the memory footprint by at least 300KB.
  common_mistake: Assuming the crashes are caused by numerical instability (NaNs) from the on-device adaptation
    process or power throttling from running intensive computations, without systematically analyzing
    the memory footprint of simultaneous execution.
  napkin_math: 'Baseline Model Memory: 800KB. Shadow Model Memory: 800KB. Audio Buffer: 200KB. Total Memory
    Required = 800 + 800 + 200 = 1800KB. Available SRAM = 1500KB. Memory Deficit = 1800 - 1500 = +300KB
    (Immediate OOM crash).'
