title: Differential Map Checkpointing for Edge Bots
scenario: A fleet of delivery robots with Jetson AGX Orin chips runs local mapping.
  They periodically checkpoint their 2 GB local SLAM map state over a flaky cellular
  connection to the cloud.
question: Design a differential checkpointing strategy that minimizes cellular data
  usage assuming 5% of the map changes between 10-minute intervals.
details:
  realistic_solution: Instead of uploading 2 GB, track dirty memory pages or use a
    Merkle tree to identify modified map chunks. Send only the 5% modified data (100
    MB). Compress this delta before transmission to further reduce cellular bandwidth
    usage.
  common_mistake: Uploading the full 2 GB binary state each time, overwhelming the
    limited edge network.
  napkin_math: 2000 * 0.05 = 100 MB
