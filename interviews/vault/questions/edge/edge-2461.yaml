title: Differential Map Checkpointing for Edge Bots
scenario: A fleet of delivery robots with Jetson AGX Orin chips runs local mapping. They periodically checkpoint their 2 GB local SLAM map state over a flaky cellular connection to the cloud.
question: Design a differential checkpointing strategy that minimizes cellular data usage assuming 5% of the map changes between 10-minute intervals.
details:
  realistic_solution: |
    Instead of uploading 2 GB, track dirty memory pages or use a Merkle tree to identify modified map chunks. Send only the 5% modified data (100 MB). Compress this delta before transmission to further reduce cellular bandwidth usage.
  common_mistake: |
    **The Pitfall:** Uploading the full 2 GB binary state each time.
    **The Rationale:** It's the simplest implementation and mirrors standard local file saving.
    **The Consequence:** Overwhelming the limited edge cellular network and causing extreme data usage and latency.
  napkin_math: |
    - **Map Size:** 2 GB = 2000 MB.
    - **Modification Rate:** 5%.
    - **Modified Data Upload:** 2000 MB * 0.05 = **100 MB**.
