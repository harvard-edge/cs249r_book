title: 'Edge Queueing Theory Diagnosis: Hailo-8 Throughput Under Real Traffic'
scenario: A Hailo-8 deployed in a retail store shows measured throughput of 8 FPS on a camera with 30 FPS input, despite the chip rating suggesting 50+ FPS for MobileNetV2.
question: Why does the Hailo-8 retail pipeline deliver only 8 FPS on a 30 FPS camera, and how large is the gap to expected MobileNetV2 throughput?
details:
  realistic_solution: 'MobileNetV2 on Hailo-8: rated 30 FPS. Observed 8 FPS. Bottleneck analysis: camera input at 30 FPS raw. Host preprocessing (USB3 transfer + CPU resize/normalize): 30 * 1080*1920*3 bytes = 186MB/s from camera. USB3 = 5Gbps = 625MB/s — OK. CPU resize: single-core at 1 FPS for 4K→224 resize is typical without optimization. Diagnosis: CPU preprocessing is the bottleneck (μ_cpu ≈ 8-10 FPS), not Hailo-8. Fix: hardware JPEG decode + GPU preprocessing, or use Jetson Orin as host CPU instead of Raspberry Pi.'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo-8 TOPS rating directly translates to FPS.
    **The Rationale:** Candidates focus solely on the accelerator's compute capacity.
    **The Consequence:** They fail to account for the host CPU preprocessing overhead and PCIe/USB transfer latency.
  napkin_math: |
    - Hailo-8 theoretical limit: 26 TOPS / 0.3 GOPS = 86,667 FPS.
    - CPU preprocessing (OpenCV resize 1080p->224 on ARM): ~100 CPU-ms per frame = 10 FPS max.
    - Expected post-fix throughput (with optimized resize): **25-30 FPS**.
