title: The Real-Time Perception Budget
scenario: The main camera of an autonomous vehicle provides frames at a hard real-time deadline of 30 frames per second (FPS). The perception model must finish processing before the next frame arrives.
question: What is the maximum per-frame latency allowed for a 30 FPS hard real-time perception model?
details:
  realistic_solution: The system runs at 30 FPS, meaning a new frame is generated every 1/30th of a second. To meet the real-time deadline, all processing for a given frame must finish within this window.
  common_mistake: |
    **The Pitfall:** Confusing throughput (FPS) with latency (ms) or miscalculating the conversion factor.
    **The Rationale:** Candidates often perform incomplete math, stating '30' without units, or ignoring the 1000ms/sec conversion.
    **The Consequence:** Specifying a latency bound that is off by orders of magnitude, guaranteeing system failure in real-time environments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard real-time deadline throughput: 30 FPS.

    **Calculations:**
    - Time Window: 1 second = 1000 milliseconds.
    - Per-Frame Latency Bound: 1000 ms / 30 FPS = 33.3 ms.

    **Conclusion & Interpretation:**
    - **Result: 33.3 ms maximum allowed latency (Latency-Bound).**
  options:
  - 16 ms
  - 30 ms
  - 33 ms
  - 100 ms
  correct_index: 2
