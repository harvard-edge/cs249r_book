title: The Depthwise Efficiency Gain
scenario: You are designing a perception model for a new autonomous vehicle platform based on the Jetson AGX Orin. Your thermal budget is tight. A colleague suggests replacing a standard 3x3 convolutional layer in your network with a 3x3 depthwise separable convolution to save power.
question: For a 112x112 layer with 64 input channels and 128 output channels, what FLOP reduction do you get from a 3x3 depthwise separable convolution?
details:
  realistic_solution: 'The key is to calculate the FLOPs for both the standard and depthwise separable convolutions and then find their ratio. The depthwise separable convolution achieves an ~8.4x reduction in computation, which translates to proportionally lower latency and power consumption.'
  common_mistake: |
    **The Pitfall:** Calculating only the cost of the depthwise convolution and ignoring the pointwise convolution.
    **The Rationale:** Engineers often forget that depthwise separable convolutions are a two-step process.
    **The Consequence:** This leads to a massive overestimation of the savings, suggesting a 100x+ reduction instead of the realistic ~8-9x.
  napkin_math: |
    - **Standard Conv FLOPs:** 2 * 112^2 * 64 * 9 * 128 ≈ 1.85 GFLOPs.
    - **Depthwise FLOPs:** 2 * 112^2 * 64 * 9 ≈ 14.5 MFLOPs.
    - **Pointwise FLOPs:** 2 * 112^2 * 64 * 128 ≈ 205.5 MFLOPs.
    - **Total DS FLOPs:** 14.5 + 205.5 ≈ 220 MFLOPs.
    - **Efficiency Ratio:** 1,850 / 220 ≈ **8.4x fewer FLOPs**.
  options:
  - An ~8.4x reduction in FLOPs
  - A ~9x reduction in FLOPs
  - A ~128x reduction in FLOPs
  - A ~2x reduction in FLOPs
  correct_index: 0
