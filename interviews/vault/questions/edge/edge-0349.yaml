title: The Depthwise Efficiency Gain
scenario: You are designing a perception model for a new autonomous vehicle platform based on the Jetson
  AGX Orin. Your thermal budget is tight. A colleague suggests replacing a standard 3x3 convolutional
  layer in your network with a 3x3 depthwise separable convolution to save power.
question: "For a 112x112 layer with 64 input channels and 128 output channels, what FLOP reduction do you get from a 3x3 depthwise separable convolution?"
details:
  realistic_solution: "The key is to calculate the FLOPs for both the standard and depthwise separable\
    \ convolutions and then find their ratio.\n\nAssume the input is 112×112 spatial with 64 input channels,\
    \ producing 112×112 output with 128 channels using a 3×3 kernel.\n\n1. **Standard Conv FLOPs:** 2\
    \ × H × W × C_in × K² × C_out = 2 × 112² × 64 × 9 × 128 ≈ 1.85 GFLOPs\n\n2. **Depthwise Separable\
    \ Conv FLOPs:**\n   - Depthwise: 2 × 112² × 64 × 9 = 14.5 MFLOPs\n   - Pointwise: 2 × 112² × 64 ×\
    \ 128 = 205.5 MFLOPs\n   - Total: 14.5 + 205.5 = 220 MFLOPs\n\n3. **Efficiency Gain:** 1,850 MFLOPs\
    \ / 220 MFLOPs ≈ **8.4× fewer FLOPs**\n\nThe depthwise separable convolution achieves an ~8.4× reduction\
    \ in computation, which translates to proportionally lower latency and power consumption on the thermally-constrained\
    \ Jetson AGX Orin."
  common_mistake: A common mistake is to only calculate the cost of the first step (the depthwise convolution)
    and forget to include the cost of the second step (the 1x1 pointwise convolution). This leads to a
    massive overestimation of the savings, suggesting a 100x+ reduction when the reality is closer to
    10x.
  napkin_math: 'Standard Conv FLOPs ≈ `2 * 112² * 64 * 9 * 128` ≈ 1.85 GFLOPs


    Depthwise Separable Conv FLOPs:

    1. **Depthwise:** `2 × 112² × 64 × 9` ≈ 14.5 MFLOPs

    2. **Pointwise (1×1):** `2 × 112² × 64 × 128` ≈ 205.5 MFLOPs

    3. **Total DS FLOPs:** 14.5 + 205.5 ≈ **220 MFLOPs**


    **Efficiency Ratio:** 1,850 / 220 ≈ **8.4×** fewer FLOPs


    This matches the theoretical approximation: ratio ≈ 1/(1/C_out + 1/K²) = 1/(1/128 + 1/9) ≈ 8.4×. The
    savings come from decoupling spatial filtering (depthwise) from channel mixing (pointwise), avoiding
    the expensive C_in × C_out cross-channel computation in the spatial kernel.'
  options:
  - An ~8.4x reduction in FLOPs
  - A ~9x reduction in FLOPs
  - A ~128x reduction in FLOPs
  - A ~2x reduction in FLOPs
  correct_index: 0
