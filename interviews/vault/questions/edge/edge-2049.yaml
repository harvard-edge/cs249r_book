title: Adversarial Robustness of INT8 Models on Coral Edge TPU for Security Applications
scenario: You are designing a critical real-time security monitoring system that utilizes an object detection model deployed on a Google Coral Edge TPU (4 TOPS INT8, 2W power consumption, INT8-only inference). The system is deployed in an environment susceptible to physical adversarial attacks, specifically camouflaged objects (adversarial patches) designed to cause misclassification or evasion. Despite robust training, the model occasionally fails to detect anomalous objects when these patches are present, compromising system reliability.
question: How does INT8-only inference on the 4 TOPS, 2W Coral Edge TPU affect adversarial patch susceptibility and feasible defense strategies?
details:
  realistic_solution: A realistic solution involves implementing quantization-aware adversarial training (QAT) directly in the INT8 domain to ensure robustness is maintained post-quantization. Focus on lightweight, low-overhead defense mechanisms suitable for edge devices, such as input transformations (e.g., randomized resizing/cropping, JPEG compression, spatial smoothing, or bit-depth reduction) applied as a preprocessing step.
  common_mistake: |
    **The Pitfall:** Assuming standard FP32 adversarial training directly translates to INT8 models.
    **The Rationale:** Candidates fail to account for the discrete nature and precision loss of INT8 quantization, which can warp the decision boundaries modeled during standard adversarial training.
    **The Consequence:** The model remains vulnerable, and proposing computationally heavy defense mechanisms exceeds the 2W power budget or the strict real-time constraints of the 4 TOPS TPU.
  napkin_math: |
    1. Target inference rate is 30 FPS, providing a ~33ms budget per frame.
    2. If a defense mechanism (e.g., input transformation) adds 5ms of preprocessing latency, the model's core inference time drops to 28ms.
    3. **A heavy defense mechanism that requires continuous full-frame recalculations will easily exceed the 4 TOPS capacity, destroying the 30 FPS real-time requirement.**
