title: The CAN Bus Bandwidth Crunch
scenario: Your Ambarella CV5-based ADAS system runs 4 perception models and sends results over CAN bus to the vehicle ECU. Each model outputs bounding boxes, lane lines, and free-space polygons at 30 Hz. The vehicle's CAN bus is standard CAN 2.0B running at 500 kbps, shared with 15 other ECUs (engine, brakes, steering, etc.). Your ML telemetry is causing CAN bus errors and the engine ECU is missing messages.
question: How much effective bandwidth does CAN 2.0B provide, and what share is your 30 Hz ML telemetry consuming?
details:
  realistic_solution: 'CAN 2.0B frames carry a maximum of 8 bytes of payload with 47 bits of overhead. Effective data rate at 500 kbps is ~36 KB/s maximum throughput (58% efficiency). The ML telemetry demands excessive bandwidth, causing frame drops.'
  common_mistake: Assuming CAN bus has plenty of bandwidth because ML messages are small, while ignoring CAN framing overhead and real-time priority implications.
  napkin_math: |
    **Assumptions & Constraints:**
    - CAN 2.0B at 500 kbps, 8-byte payload per 111-bit frame
    - ML telemetry: 592 bytes at 30 Hz

    **Calculations:**
    - Effective bandwidth = 8 bytes / 111 bits * 500 kbps = 36 KB/s
    - Telemetry bandwidth = 592 bytes * 30 Hz = 17.4 KB/s
    - Share = 17.4 / 36 = 48%

    **Conclusion & Interpretation:**
    - **Result: 36 KB/s effective, 48% consumed (Bandwidth-Bound)**. High utilization by ML telemetry causes collisions and critical message drops for other vehicle ECUs.
