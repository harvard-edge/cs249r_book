title: The CAN Bus Bandwidth Crunch
scenario: Your Ambarella CV5-based ADAS system runs 4 perception models and sends results over CAN bus
  to the vehicle ECU. Each model outputs bounding boxes, lane lines, and free-space polygons at 30 Hz.
  The vehicle's CAN bus is standard CAN 2.0B running at 500 kbps, shared with 15 other ECUs (engine, brakes,
  steering, etc.). Your ML telemetry is causing CAN bus errors and the engine ECU is missing messages.
  Quantify the problem.
question: "How much effective bandwidth does CAN 2.0B provide, and what share is your 30 Hz ML telemetry consuming?"
details:
  realistic_solution: 'CAN 2.0B frames carry a maximum of 8 bytes of payload with 47 bits of overhead
    (SOF, arbitration, control, CRC, ACK, EOF, interframe spacing). Effective data rate at 500 kbps: 8
    bytes / (8×8 + 47) bits × 500 kbps = 64 / 111 × 500K = 288,288 bits/sec ≈ **36 KB/s** maximum throughput
    (58% efficiency).'
  common_mistake: '"CAN bus has plenty of bandwidth — our messages are small." This ignores the overhead
    of CAN framing and the real-time priority implications.'
  napkin_math: 'CAN 2.0B: 500 kbps, 8-byte payload, 111-bit frame → 36 KB/s effective. ML telemetry: 592
    bytes × 30 Hz = 17.4 KB/s = 48% of bus. With delta encoding: 88 bytes × 30 Hz = 2.6 KB/s = 7%. CAN
    FD: 5 Mbps data phase, 64-byte payload → ~250 KB/s effective. ML at 17.4 KB/s = 7% of CAN FD bus.
    Automotive Ethernet: 12.5 MB/s → ML telemetry is 0.14% of bandwidth.'
