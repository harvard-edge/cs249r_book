title: The EMC Compliance Failure
scenario: 'Your edge AI product (Hailo-8 on a custom carrier board with Rockchip RK3588) passes all functional tests but fails FCC Part 15 Class A EMC testing — radiated emissions exceed the limit by 8 dB at 480 MHz and 960 MHz. These are the 1st and 2nd harmonics of the USB 3.0 clock (480 MHz). You cannot ship the product until it passes. Redesigning the PCB will take 4 months and cost $200K. The product launch is in 6 weeks.'
question: How do you diagnose and fix the EMC failure without a full board respin?
details:
  realistic_solution: 'EMC failures at USB 3.0 harmonics are common for edge AI products. The 480 MHz emissions come from the high-speed differential signals on the USB 3.0 traces between the RK3588 and the Hailo-8''s M.2 connector. The root cause is typically a combination of impedance discontinuities or common-mode conversion. The rapid fix is adding a targeted common-mode choke to the USB lines on the existing board via minor manual rework, avoiding a massive delay.'
  common_mistake: |
    **The Pitfall:** Attempting to solve the issue with a generic shielding can.
    **The Rationale:** Candidates assume placing a metal shield over the board eliminates all radiated noise.
    **The Consequence:** A simple shield typically provides only 3–5 dB of attenuation, which is insufficient to close the 8 dB gap, resulting in continued FCC failure.
  napkin_math: |
    *   **EMC Target:** FCC Class A limit is ~43 dBμV/m. Measurement is 51 dBμV/m (8 dB over).
    *   **Fix Attenuation:** Common-mode choke attenuation = 18 dB -> New measurement = 33 dBμV/m (Passes with 10 dB margin).
    *   **Rework Cost:** Choke ($0.80) x 5000 units = $4,000. Prototype rework = $1,500. Total = $5,500.
    *   **Result:** **A $0.80 component saves $200K in respin costs and 4 months of delay.**
