title: Shadow Deployment on Jetson Orin
scenario: We are deploying an upgraded perception model to a fleet of autonomous vehicles equipped with NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The current model uses 12 GB of RAM and 80 TOPS. The proposed new model uses 16 GB of RAM and 150 TOPS.
question: How would you shadow-deploy the 150 TOPS model on Jetson Orin without causing thermal throttling or OOMs in the 80 TOPS safety path?
details:
  realistic_solution: The optimal design prioritizes the primary model on the Ampere GPU and schedules the shadow model on the DLA accelerator, or processes a heavily sampled subset of frames (e.g., 10%) for the shadow model. By duty-cycling the shadow inference and aggressively monitoring thermal metrics, the system avoids hitting the 60W TDP limit. Output comparisons and telemetry should be aggregated locally and uploaded off-peak to conserve bandwidth.
  common_mistake: |
    **The Pitfall:** Running both models concurrently on every frame.
    **The Rationale:** Candidates often suggest running the shadow model in parallel on the GPU without considering the strict 60W TDP limit.
    **The Consequence:** Hitting the 60W thermal limit, causing the GPU to throttle and introducing catastrophic latency spikes into the primary safety-critical inference path.
  napkin_math: |
    * **Total Memory:** 12 GB + 16 GB = 28 GB (Fits within 32 GB, 87.5% utilization)
    * **Total Compute:** 80 TOPS + 150 TOPS = 230 TOPS (Fits within 275 TOPS, 83.6% utilization)
    * **Thermal Reality:** Sustaining 83.6% utilization will rapidly exceed the 60W TDP.
    * **Shadow Strategy:** Duty-cycle the shadow model (e.g., process 1 in 10 frames).
    * **New Shadow Compute:** 150 TOPS / 10 = 15 TOPS average.
    * **Total System Compute:** 80 TOPS + 15 TOPS = **95 TOPS** (34% utilization, safely avoids thermal throttling).
