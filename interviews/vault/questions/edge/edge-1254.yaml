title: Shadow Deployment on Jetson Orin
scenario: We are deploying an upgraded perception model to a fleet of autonomous vehicles. The current model uses 12 GB of RAM and 80 TOPS. The proposed new model uses 16 GB of RAM and 150 TOPS.
question: How would you shadow-deploy the 150 TOPS model without causing thermal throttling or OOMs in the 80 TOPS safety path?
details:
  realistic_solution: The optimal design prioritizes the primary model on the main GPU and schedules the shadow model on the DLA accelerator, or processes a heavily sampled subset of frames. By duty-cycling the shadow inference and aggressively monitoring thermal metrics via hardware telemetry, the system avoids hitting the TDP limit. Telemetry should be aggregated locally and uploaded off-peak.
  common_mistake: |
    **The Pitfall:** Running both models concurrently on every frame.
    **The Rationale:** Candidates often suggest running the shadow model in parallel on the GPU without considering the strict hardware TDP limits.
    **The Consequence:** Hitting the thermal limit, causing the GPU to throttle and introducing catastrophic latency spikes into the primary safety-critical inference path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware limits: 32 GB LPDDR5, 275 TOPS INT8, 60W TDP.
       - Current model: 12 GB RAM, 80 TOPS.
       - Proposed model: 16 GB RAM, 150 TOPS.
    2. **Calculations:**
       - Total Memory: 12 GB + 16 GB = 28 GB (87.5% utilization, safely fits).
       - Total Compute: 80 TOPS + 150 TOPS = 230 TOPS (83.6% utilization).
       - Sustaining 83.6% compute utilization will exceed the 60W TDP.
       - Shadow Strategy: Duty-cycle the shadow model (e.g., 10% sampling rate).
       - Duty-Cycled Compute: 150 TOPS / 10 = 15 TOPS average.
       - New Total Compute: 80 TOPS + 15 TOPS = 95 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound**. Sustained parallel execution exceeds the thermal boundary. Duty-cycling reduces total utilization to 34%, safely avoiding thermal throttling.
