title: Mitigating Activation Outliers in Hailo-8 INT8 Quantization
scenario: You are porting an FP32 ResNet variant to an edge accelerator. A direct post-training INT8 quantization yields an unacceptable 5% drop in mAP due to heavy activation outliers in the final residual blocks.
question: Propose a mixed-precision or node-specific quantization strategy to recover accuracy while remaining within the INT8 hardware constraints.
details:
  realistic_solution: Since edge accelerators natively accelerate INT8, falling back to FP32 for outlier layers requires offloading to the host CPU, causing severe latency penalties. Instead, use per-channel weight quantization combined with activation clipping (e.g., ReLU6 or KL-divergence calibration) on the final blocks to constrain the dynamic range and preserve INT8 execution.
  common_mistake: |
    **The Pitfall:** Suggesting a fallback to FP16/FP32 execution on the accelerator.
    **The Rationale:** Candidates accustomed to cloud GPUs assume mixed precision is always natively supported and free.
    **The Consequence:** They propose an architecture that requires offloading layers to the host CPU, destroying latency on a strictly INT8 edge device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 requires 1 byte per parameter.
       - FP32 requires 4 bytes per parameter.
    2. **Calculations:**
       - FP32 fallback increases memory footprint and bandwidth by 4x for those layers.
       - Host CPU offloading adds PCIe latency round-trips.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (Host CPU Offload)**. Keeping the operations in INT8 avoids the 4x bandwidth penalty and severe latency penalties of CPU offloading.
