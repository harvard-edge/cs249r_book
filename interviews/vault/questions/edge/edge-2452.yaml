title: Mitigating Activation Outliers in Hailo-8 INT8 Quantization
scenario: You are porting an FP32 ResNet variant to a Hailo-8 accelerator. A direct
  post-training INT8 quantization yields an unacceptable 5% drop in mAP due to heavy
  activation outliers in the final residual blocks.
question: Propose a mixed-precision or node-specific quantization strategy to recover
  accuracy while remaining within the INT8 hardware constraints.
details:
  realistic_solution: Since Hailo-8 natively accelerates INT8, falling back to FP32
    for outlier layers requires offloading to the host CPU, causing severe latency
    penalties. Instead, use per-channel weight quantization combined with activation
    clipping (e.g., ReLU6 or KL-divergence calibration) on the final blocks to constrain
    the dynamic range and preserve INT8 execution.
  common_mistake: Suggesting a fallback to FP16/FP32 execution on the accelerator
    without realizing the Hailo-8 is strictly an INT8 edge device.
  napkin_math: 1 byte INT8 vs 4 bytes FP32 saves 4x memory bandwidth.
