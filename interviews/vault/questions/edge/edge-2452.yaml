title: Mitigating Activation Outliers in Hailo-8 INT8 Quantization
scenario: You are porting an FP32 ResNet variant to a Hailo-8 accelerator. A direct post-training INT8 quantization yields an unacceptable 5% drop in mAP due to heavy activation outliers in the final residual blocks.
question: Propose a mixed-precision or node-specific quantization strategy to recover accuracy while remaining within the INT8 hardware constraints.
details:
  realistic_solution: Since Hailo-8 natively accelerates INT8, falling back to FP32 for outlier layers requires offloading to the host CPU, causing severe latency penalties. Instead, use per-channel weight quantization combined with activation clipping (e.g., ReLU6 or KL-divergence calibration) on the final blocks to constrain the dynamic range and preserve INT8 execution.
  common_mistake: |
    **The Pitfall:** Suggesting a fallback to FP16/FP32 execution on the accelerator.
    **The Rationale:** Candidates accustomed to cloud GPUs assume mixed precision is always natively supported and free.
    **The Consequence:** They propose an architecture that requires offloading layers to the host CPU, destroying latency on a strictly INT8 edge device.
  napkin_math: |
    1. **Data Types:** INT8 requires 1 byte per parameter; FP32 requires 4 bytes per parameter.
    2. **Memory Bandwidth:** Using INT8 strictly maintains a 4x reduction in memory bandwidth and footprint compared to FP32 fallback.
    **Keeping the operations in INT8 avoids the severe latency penalties of CPU offloading.**
