title: The Physical Intruder
scenario: Your company's edge AI devices are deployed in public, physically accessible locations. A sophisticated competitor gains physical access to a device and attempts to extract your proprietary ML model or inject malicious firmware.
question: What hardware and software mechanisms should be in place to detect and mitigate such an attack?
details:
  realistic_solution: "A hardware-rooted chain of trust is required. Implement an immutable Root of Trust (RoT) in ROM, and a Hardware Security Module (HSM) or Trusted Execution Environment (TEE) like ARM TrustZone. Models must be encrypted at rest; decryption keys reside purely in the HSM/TEE and are only unsealed into secure SRAM during inference. Physical tamper sensors (chassis intrusion, light) should trigger an immediate zeroization of keys."
  common_mistake: |
    **The Pitfall:** Suggesting only OS-level disk encryption (e.g., "Encrypt the model on disk").
    **The Rationale:** Candidates often think of cloud security models where physical access is assumed to be restricted.
    **The Consequence:** With physical access, an attacker can bypass OS-level encryption, extract keys from memory, or boot an alternative OS, leading to full model compromise.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BOM Cost: TPM/HSM adds $5-20 per device.
       - IP Value: State-of-the-art ML model > $10M.
    2. **Calculations:**
       - Cost of IP loss per incident: $10,000,000.
       - Fleet protection cost (e.g., 10k devices): 10,000 * $20 = $200,000.
    3. **Conclusion & Interpretation:**
       - **Result: High ROI for Hardware Security.** The $200k capital expenditure prevents catastrophic $10M+ IP theft.
