title: 'Model Format Conversion Fidelity: PyTorch to CoreML to ONNX Round-Trip'
scenario: You convert a PyTorch segmentation model to CoreML, then export the CoreML model to ONNX via coremltools. The round-trip PyTorch->CoreML->ONNX produces different outputs than direct PyTorch->ONNX, with a max diff of 0.05 in FP32.
question: How would you debug the 0.05 FP32 output mismatch from PyTorch->CoreML->ONNX, and what conversion flow should you use?
details:
  realistic_solution: 'The 0.05 max diff is too large for FP32 (should be < 1e-5 for a faithful conversion). Debug by comparing intermediate: PyTorch vs CoreML (direct), and PyTorch vs ONNX (direct). If PyTorch->CoreML is faithful but CoreML->ONNX introduces error, the issue is in coremltools'' ONNX export (known issues with transpose handling and gather ops). Solution: never do round-trip conversions. Export directly to each target format from PyTorch: torch.onnx.export for ONNX, coremltools.convert for CoreML. Maintain the PyTorch model as the single source of truth.'
  common_mistake: |
    **The Pitfall:** Treating model format conversion as a lossless translation.
    **The Rationale:** Candidates assume intermediate representation frameworks perfectly map operations 1:1.
    **The Consequence:** Compounding graph transformation errors (op decomposition, constant folding) ruin output fidelity.
  napkin_math: |
    - FP32 machine epsilon: ~1.19e-7.
    - Max Diff: 0.05.
    - Ratio: 0.05 / 1.19e-7 = 420,000x epsilon.
    **A difference of 420,000x epsilon proves a fundamental conversion bug, not standard rounding error.**
