title: Quantized Conv Layer Performance on Google Coral Edge TPU
scenario: You are optimizing an INT8 quantized CNN for deployment on a Google Coral Edge TPU. Consider a crucial convolutional layer with an input feature map of 32x32x128, applying 256 filters of size 3x3.
question: Assuming a perfectly efficient weight-stationary systolic array execution, neglecting data movement overheads and only considering MAC operations, what is the theoretical minimum time in milliseconds for this layer?
details:
  realistic_solution: Determine the spatial output dimensions factoring in padding and stride, compute the total Multiply-Accumulate (MAC) count, and divide by the accelerator's peak throughput (converting TOPS to MACs/s). This yields the strict theoretical compute bound, representing the roofline ceiling before memory I/O stalls are introduced.
  common_mistake: |
    **The Pitfall:** Conflating TOPS with MACs or failing to account for spatial dimension reduction.
    **The Rationale:** Candidates forget that 1 MAC equals 2 Operations (one multiply, one add) when parsing accelerator spec sheets.
    **The Consequence:** Underestimating the required compute time by exactly 50%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 32x32x128; Stride: 1; Padding: 0
       - Filters: 256, 3x3
       - Throughput: 4 TOPS (2 * 10^12 MACs/s)
    2. **Calculations:**
       - Output spatial dimension = (32 - 3 + 1) = 30x30
       - Total MACs = (30 * 30 * 256) * (3 * 3 * 128) = 265,420,800 MACs
       - Time = 265,420,800 / 2e12 = 0.0001327 seconds
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. The theoretical minimum compute time is 0.1327 ms.**
