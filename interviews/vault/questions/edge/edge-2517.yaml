title: PagedAttention Fragmentation on Edge
scenario: An 8B model runs on a Jetson Orin 64GB at batch size 4. KV cache block size
  is 64 tokens. Sequence length is 105 tokens. KV size is 1 MB per token.
question: Analyze the memory fragmentation overhead introduced by this block configuration.
details:
  realistic_solution: For a sequence of 105 tokens, the system allocates ceil(105/64)
    = 2 blocks per sequence. This allocates 128 slots. Wasted slots per sequence =
    128 - 105 = 23. For batch size 4, 92 slots are wasted. At 1 MB per token, fragmentation
    consumes 92 MB of useless memory.
  common_mistake: Calculating memory purely as seq_len * batch_size * token_size,
    missing the internal fragmentation caused by rigid block size boundaries.
  napkin_math: 'Allocated = 2 blocks * 64 = 128. Wasted = 128 - 105 = 23. For batch
    4: 23 * 4 = 92 wasted tokens * 1MB = 92 MB.'
