title: PagedAttention Fragmentation on Edge
scenario: An 8B model runs on a Jetson Orin 64GB at batch size 4. KV cache block size is 64 tokens. Sequence length is 105 tokens. KV size is 1 MB per token.
question: Analyze the memory fragmentation overhead introduced by this block configuration.
details:
  realistic_solution: For a sequence of 105 tokens, the system allocates ceil(105/64) = 2 blocks per sequence. This allocates 128 slots. Wasted slots per sequence = 128 - 105 = 23. For batch size 4, 92 slots are wasted. At 1 MB per token, fragmentation consumes 92 MB of useless memory.
  common_mistake: |
    **The Pitfall:** Calculating memory purely as seq_len * batch_size * token_size.
    **The Rationale:** Candidates assume continuous memory allocation without accounting for discrete KV cache blocking.
    **The Consequence:** They miss the internal fragmentation caused by rigid block size boundaries, underestimating real-world memory pressure.
  napkin_math: |
    1. **Block Allocation:** Sequence length = 105 tokens. Block size = 64 tokens. `ceil(105/64) = 2 blocks` allocated per sequence.
    2. **Allocated Slots:** `2 blocks * 64 tokens/block = 128 slots`.
    3. **Wasted Slots (per sequence):** `128 - 105 = 23 slots`.
    4. **Batch Wasted Slots:** For batch size 4, `23 * 4 = 92 slots`.
    5. **Fragmentation Overhead:** `92 slots * 1 MB/token = 92 MB`.
    **The memory fragmentation overhead is 92 MB for this batch.**
