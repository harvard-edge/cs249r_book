title: PagedAttention Fragmentation on Edge
scenario: An 8B model runs on an edge device at batch size 4. KV cache block size is 64 tokens. Sequence length is 105 tokens. KV size is 1 MB per token.
question: Analyze the memory fragmentation overhead introduced by this block configuration.
details:
  realistic_solution: With a sequence length of 105 tokens and a block size of 64, the PagedAttention memory manager must allocate ceil(105/64) = 2 blocks per sequence. This allocates 128 slots. The wasted slots per sequence represent internal fragmentation. Across the entire batch, this discrete KV cache blocking wastes significant memory that cannot be utilized by other requests.
  common_mistake: |
    **The Pitfall:** Calculating memory purely as seq_len * batch_size * token_size.
    **The Rationale:** Candidates assume continuous memory allocation without accounting for discrete KV cache blocking.
    **The Consequence:** They miss the internal fragmentation caused by rigid block size boundaries, underestimating real-world memory pressure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length: 105 tokens.
       - Block size: 64 tokens.
       - Batch size: 4.
       - Memory per token: 1 MB.
    2. **Calculations:**
       - Blocks allocated per sequence: ceil(105 / 64) = 2 blocks.
       - Allocated slots per sequence: 2 * 64 = 128 slots.
       - Wasted slots per sequence: 128 - 105 = 23 slots.
       - Batch Wasted Slots: 23 * 4 = 92 slots.
       - Fragmentation Overhead: 92 slots * 1 MB/token = 92 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound**. The memory fragmentation overhead is exactly 92 MB for this batch, completely wasted due to internal block fragmentation.
