validation_issues:
- The Napkin Math calculation '26 TOPS accelerator must stall during the host context switch. If the CPU
  op takes 5ms, the Hailo-8 is idle for 300ms every second, reducing its effective theoretical throughput
  from 26 TOPS to 18.2' is missing the explanation of how 300ms idle time is calculated and how it leads
  to 18.2 TOPS. It likely implies 5ms idle * 60 FPS = 300ms idle/sec, and (26 TOPS * (1 - 0.3)) = 18.2
  TOPS, but this should be explicit.
