title: Hailo-8 Dataflow Compilation with Unsupported Ops
scenario: You are deploying a novel hybrid vision-transformer architecture for real-time robotic perception
  onto a Hailo-8 accelerator. The model contains a custom non-linear activation and a specialized attention
  operator that are unsupported by the Hailo Dataflow Compiler. Given the Hailo-8's unique architecture—26
  TOPS INT8, 2.5W, and crucially, no local DRAM (relying entirely on streaming from host memory)—design
  a deployment and conversion strategy to handle these gaps without destroying the device's dataflow pipeline
  efficiency.
details:
  realistic_solution: The correct L6+ approach is to rewrite the ONNX graph prior to compilation. The
    custom activation should be mathematically approximated using supported INT8 operations (e.g., polynomial
    expansions or piecewise linear approximations via LUTs) that can be fused natively. The custom attention
    should be decomposed into standard batched matrix multiplications. If host fallback is strictly unavoidable,
    the architect must split the model into exactly two partitions (e.g., heavy CNN backbone on Hailo,
    lightweight head on CPU) to ensure only a single unidirectional transfer occurs, preserving the continuous
    stream processing nature of the Hailo-8.
  common_mistake: Candidates often naively suggest standard runtime CPU delegation (e.g., ONNX Runtime
    fallback) for the unsupported operators. They fail to realize that breaking a dataflow graph on a
    device with no local DRAM forces a pipeline flush, requiring intermediate tensors to be written back
    to the host over PCIe and read back again, destroying latency and throughput.
  napkin_math: Assume an intermediate activation tensor at the unsupported operator is 1x256x64x64 at
    INT8, totaling 1 MB. If CPU fallback is used mid-graph at 60 FPS, the Hailo-8 must stream 1 MB out
    and 1 MB back in per frame, consuming 120 MB/s of host PCIe bandwidth just for this operator. More
    critically, the 26 TOPS accelerator must stall during the host context switch. If the CPU op takes
    5ms, the Hailo-8 is idle for 300ms every second, reducing its effective theoretical throughput from
    26 TOPS to 18.2 TOPS, completely invalidating the 2.5W dataflow advantage.
