title: Edge New 0003
scenario: Running an MLP on Cortex-M4 (168MHz, 256KB SRAM). A 100KB FP32 weight matrix can be loaded from
  Flash (10MB/s) per inference or pre-loaded into SRAM (single cycle). Analyze the latency tradeoff versus
  memory utilization for a 10Hz sampling rate.
details:
  realistic_solution: Pre-loading the 100KB matrix into SRAM ensures single-cycle latency for memory reads,
    achieving maximum compute utilization for the core. However, it consumes 40% of the tightly constrained
    256KB SRAM, potentially crowding out I/O buffers. Fetching from Flash saves SRAM but introduces severe
    wait states. Given the 10Hz target (100ms budget), Flash reads are acceptable, freeing SRAM for other
    critical RTOS tasks.
  common_mistake: Always optimizing for minimum latency by caching everything in SRAM, causing out-of-memory
    errors for concurrent OS processes.
  napkin_math: 'SRAM access: ~0ms. Flash read: 100KB / 10MB/s = 10ms. 10ms overhead fits easily within
    the 100ms (10Hz) deadline, making Flash streaming the optimal choice to save precious SRAM.'
