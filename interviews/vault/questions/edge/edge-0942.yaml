title: Edge New 0003
scenario: Running an MLP on a Cortex-M4 microcontroller. A 100KB FP32 weight matrix can be loaded from Flash (10MB/s) per inference or pre-loaded into SRAM (single cycle).
question: Should the 100KB FP32 weight matrix be streamed from Flash or preloaded into SRAM at a 10Hz sampling rate?
details:
  realistic_solution: Pre-loading the 100KB matrix into SRAM ensures single-cycle latency for memory reads, achieving maximum compute utilization for the core. However, it consumes 40% of the tightly constrained 256KB SRAM, potentially crowding out I/O buffers. Fetching from Flash saves SRAM but introduces severe wait states. Given the 10Hz target (100ms budget), Flash reads are acceptable, freeing SRAM for other critical RTOS tasks.
  common_mistake: |
    **The Pitfall:** Over-optimizing latency by caching all weights in SRAM.
    **The Rationale:** Engineers reflexively optimize for maximum compute utilization, neglecting strict SRAM limitations on microcontrollers.
    **The Consequence:** Exhausting the limited SRAM, causing OOM errors for concurrent RTOS tasks or I/O buffers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sampling rate: 10Hz (100ms deadline). Flash read speed: 10MB/s. Weight matrix: 100KB.
    2. **Calculations:**
       - Flash read latency = 100 KB / 10 MB/s = 10 ms.
       - Margin against deadline = 100 ms - 10 ms = 90 ms remaining for compute.
    3. **Conclusion & Interpretation:**
       - **Result: Flash Streaming Preferred.** A 10ms read overhead easily fits within the 100ms deadline, preserving precious SRAM for the OS.
