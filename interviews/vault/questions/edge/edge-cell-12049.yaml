title: 'Model Format Conversion: Compare TFLite vs. ONNX Runtime for ARM Cortex on Jetson'
scenario: A MobileNetV2 model (3.4M params, 300M MACs) needs to run on the Cortex-A78AE CPU cores of Jetson
  Orin. Compare TFLite with XNNPACK delegate vs. ONNX Runtime with ACL (ARM Compute Library) for FP16
  inference. Evaluate latency, memory usage, and op coverage.
details:
  realistic_solution: 'MobileNetV2: 300M MACs. Cortex-A78AE at 2.2GHz, 4 cores with FP16 NEON: ~35 GFLOPS.
    Latency: 300M×2 FLOPs / 35G = 17ms. TFLite XNNPACK: highly optimized for ARM NEON, measured ~10ms
    FP32, ~7ms FP16. ONNX Runtime ACL: ~12ms FP32. TFLite wins on CPU. Memory: TFLite runtime overhead
    ~2MB vs. ONNX Runtime ~8MB. Both fit comfortably in Jetson.'
  common_mistake: 'Ignoring op coverage differences: ONNX Runtime ACL may not support all MobileNetV2
    ops natively, causing CPU fallback for some ops, degrading latency unpredictably.'
  napkin_math: 'MobileNetV2: 300M MACs = 600M FLOPs. Cortex-A78AE FP16 NEON: 4 cores × 2.2GHz × 8 FLOPs/cycle
    (NEON 128-bit FP16) = 70.4 GFLOPS. Latency: 600M/70.4G = 8.5ms. XNNPACK adds packing/unpacking overhead
    → ~10ms measured. ONNX RT ACL: ~15ms (less optimized for this core). TFLite XNNPACK wins.'
