title: Stochastic Input Variance and P99 Latency on Jetson Orin Vision Pipelines
scenario: A Jetson Orin AGX running a real-time object detection pipeline achieves p50 = 18ms and p99 = 67ms. Profiling reveals 1% of frames are 'complex' and trigger full-resolution processing at 52ms, while 99% use an early-exit fast path at 17ms. The downstream system requires p99 < 40ms.
question: Can the current Jetson YOLO-v8l architecture meet the p99 < 40ms SLA, and what changes would bring it under the deadline?
details:
  realistic_solution: 'Current p99 = 67ms > 40ms SLA. Gap: 27ms. The p99 exceeds 52ms because of system overheads (DMA, scheduler, ISP, power state transitions). To close the gap: (1) Enable MAXN and pin GPU clocks (saves 6ms). (2) Redesign early-exit threshold to reduce complex-frame rate to 0.5%, meaning the 99th percentile frame is now a 17ms fast frame. (3) Use CUDA streams with pre-allocated DMA buffers (saves 3ms). Combined p99: 17ms compute + 6ms overhead = 23ms. Meets SLA.'
  common_mistake: |
    **The Pitfall:** Assuming p99 latency equals the worst-case model computation time.
    **The Rationale:** Candidates forget that streaming pipelines accumulate jitter from power state transitions, OS scheduling, and DMA transfers.
    **The Consequence:** The deployed system suffers sudden tail latency spikes that violate downstream SLAs.
  napkin_math: |
    - Current p99: 67ms (52ms compute + 15ms system overhead).
    - Target SLA: 40ms.
    - Step 1: Pin GPU clocks to eliminate power transition overhead (saves 6ms -> 9ms overhead).
    - Step 2: Reduce complex frames to <1% via threshold tuning.
    - New p99 compute frame: 17ms (fast path now dominates the 99th percentile).
    - Step 3: Pre-allocate DMA buffers (saves 3ms -> 6ms overhead).
    - Final p99: 17ms compute + 6ms overhead = **23ms (Meets 40ms SLA)**.
