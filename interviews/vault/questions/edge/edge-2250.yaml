title: Stochastic Input Variance and P99 Latency on Jetson Orin Vision Pipelines
scenario: An edge node running a real-time object detection pipeline achieves p50 = 18ms and p99 = 67ms. Profiling reveals 1% of frames are 'complex' and trigger full-resolution processing at 52ms, while 99% use an early-exit fast path at 17ms. The downstream system requires p99 < 40ms.
question: Can the current architecture meet the p99 < 40ms SLA, and what changes would bring it under the deadline?
details:
  realistic_solution: "The 40ms SLA is easily achievable through systemic execution profiling rather than aggressive model pruning. The 67ms P99 is dominated by asynchronous OS scheduling jitter, ISP handoffs, and DVFS power state transitions. Remediate this by explicitly pinning GPU clock frequencies (MAXN mode), leveraging pre-allocated CUDA DMA streams, and tuning the early-exit heuristic to <1%. This guarantees the fast-path dictates the 99th percentile, anchoring tail latency at 23ms."
  common_mistake: |
    **The Pitfall:** Assuming p99 latency equals the worst-case model computation time.
    **The Rationale:** Candidates forget that streaming pipelines accumulate jitter from power state transitions, OS scheduling, and DMA transfers.
    **The Consequence:** The deployed system suffers sudden tail latency spikes that violate downstream SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target SLA: p99 < 40ms.
       - Current p99: 67ms (52ms compute + 15ms system overhead).
       - Complex frame threshold currently captures 1%.
    2. **Calculations:**
       - Pin GPU clocks: System overhead drops to 9ms.
       - Pre-allocate DMA buffers: System overhead drops to 6ms.
       - Redesign early-exit to < 1%: Fast path (17ms) now dictates the 99th percentile.
       - Final p99 = 17ms (compute) + 6ms (overhead) = 23ms.
    3. **Conclusion & Interpretation:**
       - **23ms final p99.** System-level tuning and threshold shifting easily meet the < 40ms SLA.
