title: Adversarial Vulnerability from Edge Quantization
scenario: You deploy a multi-camera security system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8,
  60W TDP, Ampere GPU + DLA). To handle 6 concurrent video streams at 30 FPS, where each frame requires
  1.5 TOPS of inference compute, you must quantize your adversarially-trained model to INT8. After deployment,
  you observe that the INT8 model is highly vulnerable to physical adversarial patches (e.g., printed
  patterns on clothing), whereas the original unquantized model was immune. Explain why INT8 quantization
  degrades adversarial robustness and calculate the compute utilization to prove why higher precision
  was impossible.
question: "Why did INT8 quantization make the Jetson Orin model vulnerable to physical adversarial patches, and why was higher precision infeasible?"
details:
  realistic_solution: Adversarial training creates highly non-linear decision boundaries to separate clean
    and perturbed inputs. INT8 quantization introduces rounding noise and requires clipping activation
    outliers, effectively flattening these defensive boundaries and allowing adversarial features to propagate.
    The compute constraint forces this tradeoff, as the system requires near-maximum utilization of the
    Orin's INT8 accelerators to meet the latency and throughput requirements.
  common_mistake: Candidates often vaguely state that 'INT8 loses information' without explaining that
    adversarial robustness relies on precise, fine-grained decision boundaries and activation outliers
    that are destroyed by INT8 clipping and quantization noise. They also frequently forget to do the
    math proving that FP16 or FP32 is not computationally feasible.
  napkin_math: Compute per stream = 30 FPS * 1.5 TOPS/frame = 45 TOPS. Total compute for 6 streams = 6
    * 45 TOPS = 270 TOPS. Jetson Orin INT8 limit = 275 TOPS. Compute utilization = (270 / 275) * 100 =
    98.2%. Since FP16 throughput on the Ampere GPU would be at most half of the INT8 TOPS (and FP32 even
    lower), running higher precision for a 270 TOPS equivalent workload is mathematically impossible on
    this 60W edge device.
