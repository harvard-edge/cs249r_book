title: Power-Constrained QoS Shedding on Hailo-8
scenario: You are running a perception pipeline on a Hailo-8 dataflow accelerator. The pipeline includes a primary object detector requiring 0.5 INT8 TOPS per frame and a secondary enhancement model requiring 0.2 TOPS per frame. A thermal event forces a QoS shedding strategy, capping the Hailo-8 power budget at 1.0W. Assume linear power-to-compute scaling.
question: At a 1.0W cap, what degraded compute capacity and primary-detector FPS can the Hailo-8 sustain after shedding the secondary model?
details:
  realistic_solution: The correct approach is to calculate the compute efficiency (TOPS per Watt) of the Hailo-8, apply the degraded 1.0W power budget to find the new TOPS limit, and then divide this available compute by the primary model's per-frame requirement. Shedding the enhancement model entirely ensures the critical fail-operational path (the detector) gets all remaining resources.
  common_mistake: |
    **The Pitfall:** Failing to calculate TOPS/W efficiency or forgetting to drop the secondary model.
    **The Rationale:** Candidates overlook the linear scaling instruction or misapply the shed compute constraint.
    **The Consequence:** Incorrect capacity calculations leading to either complete system shutdown or continued thermal violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Hailo-8 with 26 TOPS at 2.5W (linear scaling).
       - Primary object detector: 0.5 TOPS per frame.
       - Thermal cap: 1.0W maximum power budget.
    2. **Calculations:**
       - Compute Efficiency: 26 TOPS / 2.5W = 10.4 TOPS/Watt.
       - Degraded capacity at 1.0W: 10.4 TOPS/Watt * 1.0W = 10.4 TOPS.
       - Max sustainable FPS (Primary Only): 10.4 TOPS / 0.5 TOPS/frame = 20.8 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Graceful Degradation to 20.8 FPS**. By shedding the secondary model, the system sustains the critical primary detector at 20.8 FPS while remaining under the 1.0W thermal cap.
