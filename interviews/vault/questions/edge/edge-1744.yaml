title: Fused Attention Optimization on Qualcomm Cloud AI 100
scenario: You are deploying a real-time vision transformer on an on-premise server using a Qualcomm Cloud AI 100 accelerator to process multiple camera streams. Profiling shows the pipeline is memory-bound during the attention mechanism's softmax and point-wise operations.
question: What fused attention strategy would you use on Cloud AI 100 to remove LPDDR4x round-trips, and how much bandwidth would it save?
details:
  realistic_solution: Propose a fused attention approach like FlashAttention-2 tailored for the AI 100's architecture, computing QK^T and softmax in a single pass using on-chip SRAM. This maximizes compute utilization while staying under the power budget by minimizing memory I/O.
  common_mistake: |
    **The Pitfall:** Proposing generic kernel fusion without calculating SRAM capacity.
    **The Rationale:** Candidates suggest fusion but ignore the hardware's specific SRAM constraints and fail to quantify the memory traffic reduction.
    **The Consequence:** The fused block exceeds SRAM capacity, causing register spilling back to LPDDR4x and nullifying power and latency benefits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length N=1024, head dim d=64.
    - INT8 precision (1 byte/element).
    - 12 heads at 30 FPS across 10 concurrent streams.

    **Calculations:**
    - Intermediate QK^T matrix: 1024 * 1024 * 1 byte = 1 MB per head.
    - Unfused memory traffic: Write 1 MB + Read 1 MB = 2 MB per head.
    - Total unfused bandwidth: 2 MB * 12 heads * 30 FPS * 10 streams = 7.2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 7.2 GB/s (Memory-Bandwidth Bound)**. Fusing the attention kernel keeps the 1 MB block in SRAM, saving 7.2 GB/s of LPDDR4x bandwidth.
