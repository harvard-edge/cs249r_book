title: Multi-Stream Video Analytics on Qualcomm Cloud AI 100
scenario: You are designing an on-premise multi-stream video analytics appliance using
  the Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system
  must process as many 30 FPS 1080p camera streams as possible in real-time using
  an EfficientNet-lite based object detector. You need to analyze the architectural
  tradeoffs between standard convolutions and depthwise separable convolutions, specifically
  focusing on how they interact with the accelerator's INT8 compute throughput and
  memory bandwidth. Specify the model architecture modifications required to maximize
  stream density within the 75W power envelope.
question: How would you modify EfficientNet-lite and batching on the Cloud AI 100
  to maximize 30 FPS stream density without becoming memory-bandwidth bound?
details:
  realistic_solution: The optimal approach involves balancing compute and memory access
    by modifying the inverted residual blocks. While depthwise convolutions reduce
    FLOPs, increasing the channel expansion ratio slightly or fusing layers can improve
    arithmetic intensity to better utilize the INT8 matrix multipliers. Given the
    generous 32 GB of memory, batching frames from multiple streams will help saturate
    the 400 TOPS compute units and amortize weight-loading costs, ultimately maximizing
    the number of supported concurrent streams.
  common_mistake: Candidates often assume that minimizing FLOPs via depthwise separable
    convolutions automatically maximizes throughput on all accelerators. They fail
    to recognize that depthwise convolutions have low arithmetic intensity, which
    can lead to memory bandwidth bottlenecks on the LPDDR4x interface rather than
    fully utilizing the 400 TOPS compute capacity.
  napkin_math: Assume an EfficientNet-lite INT8 model requires 2 GOPS per frame. At
    30 FPS, one stream requires 60 GOPS. The accelerator provides 400 TOPS (400,000
    GOPS) INT8. Theoretical max streams = 400,000 GOPS / 60 GOPS/stream ≈ 6,666 streams.
    However, memory bandwidth is the bottleneck. LPDDR4x typically provides ~136 GB/s.
    If loading the 5 MB model weights and 6 MB activations per frame (unbatched) requires
    11 MB/frame * 30 FPS = 330 MB/s per stream, the memory bandwidth limits us to
    136,000 MB/s / 330 MB/s ≈ 412 streams. Batching multiple streams (e.g., batch
    size 16) amortizes the 5 MB weight read, reducing memory traffic per frame and
    pushing the limit closer to the compute bound.
