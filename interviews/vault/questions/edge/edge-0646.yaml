title: 'The Autonomous Perception Stack Redesign: Neural Architecture Search'
scenario: 'You are the new Staff ML Systems Engineer for the perception team at an autonomous vehicle
  company. The research team has produced a state-of-the-art Vision Transformer (ViT) that achieves 99%
  accuracy on your internal benchmarks. However, it was designed in the cloud with A100s. When benchmarked
  on the target hardware, a 60W NVIDIA Jetson AGX Orin, it runs at a dismal 2 FPS and consumes 100W, tripping
  the thermal breakers. The model has two heads: one for 3D object detection and another that generates
  brief textual descriptions of complex scenes (e.g., ''pedestrian looking at phone near crosswalk'').
  The product requirement is a strict 30 FPS inference rate with a power budget under 40W. Your VP of
  Engineering asks you to formulate the full-stack optimization strategy to make this model deployable.
  Propose your multi-stage plan, justifying the order of operations and the expected gains at each stage.
  How do you integrate techniques like distillation, pruning, FlashAttention, operator fusion, and speculative
  decoding to meet the goal?'
details:
  realistic_solution: 'The problem requires a holistic, multi-stage approach that first refactors the
    architecture, then optimizes memory access, and finally tunes the execution.

    1.  **Stage 1: Model Distillation & Pruning.** The first step is to drastically reduce the raw compute
    and memory footprint. Use the large ViT as a ''teacher'' model to distill its knowledge into a much
    smaller, structurally efficient ''student'' model. This student could be a compact ViT or a hybrid
    CNN-Transformer. This provides the largest initial reduction in FLOPs and parameter count. Follow
    this with structured pruning to further reduce the weight density.

    2.  **Stage 2: Fix the Memory Bottleneck.** The student ViT, while smaller, still suffers from the
    quadratic complexity of standard attention. Replace the standard attention layers with an I/O-aware
    algorithm like FlashAttention. This is critical: it changes the operation from being memory-bandwidth-bound
    to compute-bound, allowing the Orin''s GPU to achieve much higher utilization. This is the single
    most important step for reducing both latency and power, as it minimizes expensive off-chip DRAM access.

    3.  **Stage 3: Operator Fusion & Quantization.** With a smaller, memory-efficient model, now you can
    optimize the execution graph. Use a compiler like TensorRT to perform operator fusion, combining sequential
    layers (e.g., Conv-BN-ReLU) into single kernels. This reduces kernel launch overhead and intermediate
    memory writes. Finally, apply INT8 quantization to the fused graph. This step maximizes throughput
    by using the Orin''s dedicated INT8 Tensor Cores and further reduces power, as INT8 arithmetic is
    far more energy-efficient than FP16/FP32.

    4.  **Stage 4: Accelerate Text Generation.** For the text-generation head, standard auto-regressive
    decoding is slow. Implement speculative decoding. Use a tiny ''drafter'' model (e.g., a 1-layer transformer)
    to generate 4-5 candidate tokens in parallel. The larger, more accurate student model then validates
    these tokens in a single forward pass, rather than generating them one-by-one. This dramatically reduces
    the latency of the text output for a small computational cost.'
  common_mistake: Proposing a single 'silver bullet' solution like 'just use INT8 quantization'. This
    ignores that the model is fundamentally memory-bound and architecturally bloated. Another common mistake
    is applying optimizations in the wrong order, for instance, trying to fuse operators on the massive
    original graph before distillation, which yields minimal impact. Finally, engineers often misdiagnose
    the power issue, attributing it all to compute (FLOPs) while ignoring that DRAM data movement is often
    the dominant energy consumer on edge devices.
  napkin_math: At 40W, Orin yields ~200 INT8 TOPS and ~150 GB/s bandwidth. The ViT requires processing
    1024 patches (N=1024). Attention scales as O(N^2). Attention scores read/write = 1024 * 1024 * 12
    heads * 12 layers = 150MB. Memory transfer takes 150MB / 150 GB/s = 1ms just for attention activations.
    If the model has 300 GOPs, compute is 300G / 200T = 1.5ms. Total inference ~2.5ms. Highly efficient,
    well within 33ms.
