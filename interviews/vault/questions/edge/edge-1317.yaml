title: Evaluating Drift Detection Architectures for High-Throughput Edge
scenario: You are deploying a high-throughput defect detection system on an on-premise Qualcomm Cloud AI 100 inference accelerator processing 1000 frames per second. You need to implement data drift detection to monitor for lighting changes without violating the strict 1ms inference SLA. Design A proposes running a lightweight INT8 autoencoder on the AI 100 alongside the main model to compute per-frame reconstruction error. Design B proposes 1% reservoir sampling, sending intermediate embeddings to the host CPU to compute Population Stability Index (PSI).
question: Which design is better and why?
details:
  realistic_solution: Design B is the superior choice. Because data drift is a statistical population shift, processing 100% of frames is unnecessary. Sampling 1% of the data provides a statistically significant population for PSI calculations over a small time window. By offloading this to the host CPU, you completely isolate the drift detection workload, reserving the AI 100's compute and memory bandwidth strictly for the latency-critical inference path.
  common_mistake: |
    **The Pitfall:** Choosing Design A to utilize the AI 100's compute capacity on every frame.
    **The Rationale:** Candidates incorrectly assume drift detection requires inspecting 100% of frames for reliability.
    **The Consequence:** The secondary model causes memory bandwidth contention on the LPDDR4x, violating the strict 1ms SLA.
  napkin_math: |
    * Target rate: 1000 FPS
    * 1% reservoir sample rate: 10 FPS
    * Embedding size: 1024 INT8 dimensions (1 KB per frame)
    * Required PCIe bandwidth: 10 KB/s
    * 5-minute window sample count: 3,000 samples (3 MB total)
    * **Host CPU computes PSI on 3,000 samples in <5ms, consuming 0 TOPS and 0W of the AI 100's budget.**
