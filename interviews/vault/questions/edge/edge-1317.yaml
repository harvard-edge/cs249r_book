title: Evaluating Drift Detection Architectures for High-Throughput Edge
scenario: You are deploying a high-throughput defect detection system on an on-premise Qualcomm Cloud AI 100 inference accelerator processing 1000 frames per second. You need to implement data drift detection without violating the strict 1ms inference SLA. Design A proposes running a lightweight INT8 autoencoder on the AI 100. Design B proposes 1% reservoir sampling, sending intermediate embeddings to the host CPU to compute Population Stability Index (PSI).
question: Which design is better and why?
details:
  realistic_solution: 'Design B is the superior choice. Data drift is a statistical population shift; processing 100% of frames is unnecessary. Sampling 1% offloads the work to the host CPU, isolating the drift workload and reserving the AI 100''s compute strictly for the latency-critical path.'
  common_mistake: |
    **The Pitfall:** Choosing Design A to utilize the AI 100's compute capacity on every frame.
    **The Rationale:** Candidates assume drift detection requires inspecting 100% of frames for reliability.
    **The Consequence:** The secondary model causes memory bandwidth contention, violating the strict 1ms inference SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target rate: 1000 FPS
       - Sample rate (Design B): 1% (10 FPS)
       - Embedding size: 1024 INT8 dimensions (1 KB/frame)
    2. **Calculations:**
       - PCIe bandwidth needed: 10 FPS * 1 KB = 10 KB/s
       - 5-minute window sample size: 3000 samples (3 MB)
    3. **Conclusion & Interpretation:**
       - **Result: Zero NPU Overhead.** The host CPU effortlessly computes PSI on 3 MB of data, consuming 0W and 0 TOPS of the AI 100's budget.
