title: Edge Activation Clipping
scenario: An INT8 edge detector works indoors but misses objects outdoors at noon. Activation logs show many values at the maximum code during high-glare frames. Analyze the failure.
question: Why would an INT8 edge detector clip activations during high-glare outdoor frames?
details:
  realistic_solution: The calibration data likely underrepresented glare, so signed INT8 activation scales are too narrow for outdoor noon frames and values saturate at the maximum code, +127. Exposure or camera AGC can contribute, but the quantization evidence is activation saturation. Use representative calibration, per-channel scaling, or QAT.
  common_mistake: Blaming the camera or detector architecture before checking quantization ranges and activation saturation.
  napkin_math: A spike at the maximum INT8 code indicates values are hitting the representable limit rather than using the full dynamic range.
