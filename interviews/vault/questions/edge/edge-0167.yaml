title: The Quantization Memory Payoff
scenario: You are deploying a 350 million parameter computer vision model to an edge device. The model
  weights are currently stored in FP16 format. To reduce the application's memory footprint, you decide
  to quantize the model to INT8. Explain the expected percentage reduction in memory required for the
  model's weights.
details:
  realistic_solution: Moving from FP16 to INT8 cuts the memory requirement per parameter in half. FP16
    (half-precision float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses just 1 byte. Therefore,
    the total memory required for the model's weights is reduced by exactly 50%.
  common_mistake: Engineers often confuse the memory savings of FP16-to-INT8 quantization with FP32-to-INT8.
    They mistakenly calculate a 75% saving (a 4-byte float to a 1-byte integer) instead of the correct
    50% saving (a 2-byte float to a 1-byte integer). Another common error is confusing the '2x smaller'
    factor with a '100%' or '200%' reduction, which is arithmetically impossible.
  napkin_math: Initial FP16 Memory = 350,000,000 parameters × 2 bytes/parameter = 700 MB
  options:
  - A 75% reduction.
  - A 100% reduction.
  - A 50% reduction.
  - A 25% reduction.
  correct_index: 2
