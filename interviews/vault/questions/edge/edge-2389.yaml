title: Edge Autoregressive Bandwidth
scenario: A local assistant uses a 10B parameter model in INT8 on a Jetson AGX Orin.
question: Explain how to estimate the minimum memory bandwidth required to generate
  15 tokens per second for a single user.
details:
  realistic_solution: In autoregressive generation at batch size 1, memory bandwidth
    is the absolute bottleneck. A 10B parameter model in INT8 requires 10GB of memory.
    Generating 15 tokens per second means streaming those weights 15 times per second,
    requiring roughly 150 GB/s of bandwidth.
  common_mistake: Calculating raw compute FLOPS instead of memory bandwidth for memory-bound
    batch-size 1 decoding.
  napkin_math: 10 GB * 15 tokens/sec = 150 GB/s, which fits within 204.8 GB/s.
