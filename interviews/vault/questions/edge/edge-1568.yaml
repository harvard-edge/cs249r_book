title: Encoder vs Decoder on DRAM-less Hailo-8
scenario: You are deploying a 100 million parameter sequence model to a Hailo-8 edge accelerator. The device provides 26 TOPS of INT8 compute at just 2.5W, but critically has no local DRAM.
question: What are the theoretical minimum latencies for encoder-only versus decoder-only processing of 128 tokens on the DRAM-less Hailo-8?
details:
  realistic_solution: Host memory bandwidth limits autoregressive decoders because they reload the full weight plane on every single unrolled token context switch. Encoders batch token inputs naturally, hitting memory just once and maintaining near-peak ALU occupancy.
  common_mistake: |
    **The Pitfall:** Calculating latency using only the 26 TOPS compute limit.
    **The Rationale:** Candidates ignore the lack of local DRAM and fail to realize that autoregressive decoders must reload the entire weight matrix across the PCIe bus for every single generated token.
    **The Consequence:** Selecting a decoder architecture that is thousands of times slower than anticipated due to catastrophic PCIe thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 Weights: 100MB
       - PCIe Link: 4000 MB/s (4 GB/s)
       - Sequence: 128 tokens
    2. **Calculations:**
       - Encoder Load = 100MB * 1 = 100MB. Latency = 100MB / 4000 MB/s = 25ms
       - Decoder Load = 100MB * 128 = 12.8 GB. Latency = 12.8 GB / 4 GB/s = 3.2s
    3. **Conclusion & Interpretation:**
       - **Result: Decoder causes 3.2s catastrophic stall.** Encoder processes in 25ms.
