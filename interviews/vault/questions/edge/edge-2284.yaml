title: PCIe Hailo-8 Model Broadcast
scenario: A local edge cluster contains 10 Hailo-8 accelerators attached to a host
  CPU via a shared 1 Gbps (125 MB/s) PCIe switch. The host must load a 50 MB INT8
  model to all accelerators sequentially.
question: Evaluate the theoretical minimum time required to broadcast the model to
  all 10 accelerators over the shared sequential link.
visual:
  kind: svg
  path: edge-2284.svg
  alt: A star topology graph showing a single host node pointing sequentially to multiple
    Hailo accelerator nodes.
  caption: PCIe Sequential Broadcast
details:
  realistic_solution: Because the broadcast is strictly sequential over a shared 125
    MB/s link, the total data transferred is 10 accelerators * 50 MB = 500 MB. The
    minimum time to push this data across the PCIe switch is 500 MB / 125 MB/s = 4.0
    seconds.
  common_mistake: Treating the network as a multi-cast link and assuming all 10 devices
    receive the 50 MB concurrently in just 0.4 seconds.
  napkin_math: (10 * 50 MB) / 125 MB/s = 4.0s
