title: PCIe Hailo-8 Model Broadcast
scenario: A local edge cluster contains 10 Hailo-8 accelerators attached to a host
  CPU via a shared 1 Gbps (125 MB/s) PCIe switch. The host must load a 50 MB INT8
  model to all 10 accelerators. Each DMA setup (descriptor build + doorbell + interrupt
  ack) costs 200 us per device, the PCIe switch arbitration imposes 8% overhead under
  contention, and only one DMA channel is active at a time on the host.
question: Evaluate total broadcast time accounting for raw bytes, DMA setup overhead
  per device, and PCIe switch arbitration tax. Identify whether the bottleneck is
  bandwidth or DMA setup, and quantify how much pipelining DMA setup with bytes
  in-flight could save.
visual:
  kind: svg
  path: edge-2284.svg
  alt: A star topology graph showing a single host node pointing sequentially to multiple
    Hailo accelerator nodes.
  caption: PCIe Sequential Broadcast
details:
  realistic_solution: 'Bytes: 10 * 50 MB = 500 MB. Effective BW under arbitration
    = 125 * 0.92 = 115 MB/s, so wire time = 500 / 115 = 4.35 s. Add DMA setup = 10
    * 200 us = 2 ms (negligible). Bandwidth dominates by ~2000x, so DMA pipelining
    saves at most 2 ms - chasing it is wasted engineering. The win is to use PCIe
    multicast (if the switch supports posted MWr broadcasts) which collapses 500
    MB to 50 MB on the upstream link, dropping to ~0.43 s.'
  common_mistake: Spending engineering effort pipelining DMA setup with transfers
    when the bandwidth term is 3 orders of magnitude larger than the setup term.
    Or assuming the PCIe link is multicast-capable without checking switch features.
  napkin_math: 'BW-bound: 500 MB / (125 * 0.92) = 4.35 s; DMA setup: 10 * 200 us =
    2 ms; ratio = 2175x bandwidth-dominated.'
