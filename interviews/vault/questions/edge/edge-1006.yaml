title: Realizing Tiled Activation Processing for CNNs on Hailo-8 SRAM Constraints
scenario: You are compiling ResNet-34 for Hailo-8. The Hailo Dataflow Compiler (DFC) reports that the 7x7 conv stem layer at resolution 112x112x64 produces a 3.1 MB activation tensor that exceeds the available SRAM for that pipeline stage after accounting for weight storage and double buffering.
question: How does Hailo-8 handle the ResNet-34 7x7 stem activation that exceeds SRAM, and what latency tradeoff results?
details:
  realistic_solution: 'Hailo-8 DFC automatically tiles large activations spatially. For the 3.1 MB intermediate activation: it is tiled into 4 spatial blocks of ~0.78 MB each. Each tile is processed independently through subsequent layers (depth-first per tile). This means the 112x112 spatial map is processed in passes, adding inter-tile communication overhead. Latency impact: 4x the single-tile processing time for that layer, typically adding 2-5 ms for the stem layer. Downstream layers at smaller spatial resolutions may fit entirely in SRAM without tiling. Net result: Hailo-8 successfully runs ResNet-34 with a latency penalty of ~5-10% for large-resolution early layers.'
  common_mistake: |
    **The Pitfall:** Assuming that an activation exceeding SRAM causes a compilation failure or requires reducing model resolution.
    **The Rationale:** Developers used to standard GPU/CPU memory hierarchies forget or don't know about automatic spatial tiling capabilities in specialized dataflow compilers.
    **The Consequence:** Unnecessarily compromising model accuracy by shrinking input resolution when the hardware can handle it natively via tiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available SRAM: ~6 MB.
    - Intermediate activation: 112x112x64 = 3.1 MB.
    - Weight tile for 7x7 conv (64 out channels): ~9 KB.

    **Calculations:**
    - DFC tiles activation into 4 spatial blocks (56x56x64).
    - Memory per tile = 3.1 MB / 4 = 0.78 MB.

    **Conclusion & Interpretation:**
    - **Result: 0.78 MB tile fits comfortably within the 6 MB SRAM footprint.** Spatial tiling enables execution of large activations on limited SRAM.
