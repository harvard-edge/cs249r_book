title: 'Edge TCO Specification: Design Lifecycle Cost Model for 5-Year Edge Fleet'
scenario: Specify a complete 5-year lifecycle cost model for a 100-unit fleet of edge devices (60W) for industrial automation. Include: Year 0 deployment, Year 1-3 steady operation, Year 3 model refresh (engineering: $30K), Year 4-5 hardware migration to next-gen. Structure as NPV analysis at 8% discount rate.
question: What is the annual fleet power cost for 100 edge devices at 60W and $0.10/kWh?
details:
  realistic_solution: 'Power: 100 × 60W × 8760hr × $0.10/1000 = $5,256/yr (not $52,560).'
  common_mistake: |
    **The Pitfall:** Failing to convert Watts to kiloWatts during the cost calculation.
    **The Rationale:** Forgetting to divide the total Watt-hours by 1000, leading to a massive 10x overestimation of power costs.
    **The Consequence:** Incorrectly skewing the Total Cost of Ownership (TCO) model, making edge deployments look artificially unviable compared to cloud alternatives.
  napkin_math: |
    * **Power per Device**: 60 Watts.
    * **Annual Hours**: 24 hours/day × 365 days = 8,760 hours/year.
    * **Total Fleet Energy**: 100 devices × 60W × 8,760 hours = 52,560,000 Watt-hours = 52,560 kWh.
    * **Annual Fleet Power Cost**: 52,560 kWh × $0.10/kWh = **$5,256 per year**.
