title: On-Device Personalization Memory Footprint
scenario: |
  An edge device runs a personalized acoustic anomaly detector for factory machines. The base model is a ResNet-18 feature extractor. To adapt to a specific machine's noise profile, you freeze the ResNet and append a 2-layer FP32 MLP personalization head (Input: 256, Hidden: 64, Output: 2). You train this head on-device using the Adam optimizer with a batch size of 16.
question: What exact byte footprint is needed for the MLP head's weights, gradients, Adam states, and batch activations with batch size 16?
details:
  realistic_solution: |
    With the backbone frozen, its intermediate activations are safely discarded. Compute the total parameters of the 2-layer FP32 MLP (16,578). Each parameter requires 16 bytes: 4 for the weight, 4 for the gradient, and 8 for the Adam optimizer states (first and second moments). Finally, calculate the transient activation memory for the batch of 16 flowing through the two layers, yielding a highly constrained, cache-friendly footprint of ~286 KB.
  common_mistake: |
    **The Pitfall:** Forgetting optimizer state memory requirements.
    **The Rationale:** Candidates often forget that Adam requires 8 bytes per parameter for first and second moment states, or they incorrectly include memory for the frozen ResNet-18's intermediate activations.
    **The Consequence:** The calculated memory footprint is wildly underestimated, potentially leading to Out-Of-Memory (OOM) errors during on-device fine-tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 parameters (16 bytes total: 4 weight + 4 grad + 8 Adam state).
    - Frozen backbone (no gradients/activations).
    - Batch size: 16.

    **Calculations:**
    - Params L1: (256 * 64) + 64 = 16,448. Params L2: (64 * 2) + 2 = 130. Total = 16,578.
    - State footprint: 16,578 * 16 bytes = 265,248 bytes.
    - Activations footprint: (16 * 256 * 4) + (16 * 64 * 4) = 16,384 + 4,096 = 20,480 bytes.

    **Conclusion & Interpretation:**
    - **Result: 285,728 bytes (~286 KB) total footprint (VRAM Capacity Bound)**. Overlooking Adam optimizer states drastically underestimates on-device fine-tuning memory limits.
