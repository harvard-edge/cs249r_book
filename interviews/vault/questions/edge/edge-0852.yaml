title: On-Device Personalization Memory Footprint
scenario: 'An edge device runs a personalized acoustic anomaly detector for factory machines. The base
  model is a ResNet-18 feature extractor. To adapt to a specific machine''s noise profile, you freeze
  the ResNet and append a 2-layer FP32 MLP personalization head (Input: 256, Hidden: 64, Output: 2). You
  train this head on-device using the Adam optimizer with a batch size of 16. Calculate the exact memory
  footprint in bytes required to store the MLP''s weights, gradients, optimizer states, and batch activations
  for backpropagation.'
details:
  realistic_solution: Recognize that the backbone is frozen, so its intermediate activations are discarded.
    Calculate the memory for 16,578 parameters (16 bytes per param for weights, grads, and Adam states)
    and add the activation memory for the batch of 16 flowing into the two linear layers.
  common_mistake: Candidates often forget that Adam requires 8 bytes per parameter for first and second
    moment states (which quadruples the base weight memory when including gradients), or they incorrectly
    include memory for the frozen ResNet-18's intermediate activations.
  napkin_math: 'Params: L1 (256*64 + 64 bias) + L2 (64*2 + 2 bias) = 16,448 + 130 = 16,578 params.

    Param Memory (FP32+Adam): 16,578 * 16 bytes (W:4, G:4, M:4, V:4) = 265,248 bytes.

    Activations (BS=16): L1_in (16*256*4 = 16,384 B) + L2_in (16*64*4 = 4,096 B) = 20,480 bytes.

    Total Footprint = 265,248 + 20,480 = 285,728 bytes (~286 KB).'
