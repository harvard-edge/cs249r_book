title: Depthwise Separable Convolution FLOP Savings
scenario: MobileNet replaces standard 3x3 convolutions with depthwise separable convolutions. For an input with 256 channels and 256 output channels at spatial resolution 56x56, you need to determine the efficiency gain.
question: "For 256 input and output channels at 56x56, what FLOP reduction factor does MobileNet's depthwise separable convolution provide?"
details:
  realistic_solution: 'Standard conv: 3 * 3 * 256 * 256 * 56 * 56 ≈ 1.85B FLOPs. Depthwise (3 * 3 * 256 * 56 * 56) + pointwise (1 * 1 * 256 * 256 * 56 * 56): ≈ 7.2M + 206M = 213M FLOPs. Reduction factor is ≈ 8-9x.'
  common_mistake: |
    **The Pitfall:** Believing depthwise separable only saves memory, not compute.
    **The Rationale:** Candidates memorize that depthwise convolutions have fewer parameters, but forget to mathematically factorize the operation.
    **The Consequence:** They underestimate the massive compute savings, which are roughly proportional to the kernel width squared.
  napkin_math: |
    1. Reduction factor ≈ 1/C_out + 1/k².
    2. With k=3 and large channel counts (C_out = 256), the 1/C_out term is negligible.
    3. **Reduction factor ≈ 1/3² = 1/9, meaning ~8-9x fewer FLOPs.**
  options:
  - ~2x — depthwise separable only halves the convolution cost.
  - ~4x — it removes spatial computation but keeps channel computation.
  - ~8-9x — it factorizes a k² * C operation into k² + C operations.
  - ~64x — each channel is processed independently with no cross-channel interaction.
  correct_index: 2
