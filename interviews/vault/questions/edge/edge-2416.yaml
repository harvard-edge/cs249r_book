title: Evaluating M/M/1 Wait Times in Edge Video Processing
scenario: A multi-camera traffic intersection system on a Jetson AGX Orin operates
  as an M/D/1 queue (Poisson arrivals, deterministic service). Images arrive at
  an average rate of 20 per second and processing time is exactly 40 ms (25 frames/s
  capacity). Deterministic service is realistic for fixed-resolution INT8 video
  inference.
question: Apply the M/D/1 Pollaczek-Khinchine formula to compute the expected wait
  time in the queue before a frame begins processing. Compare against the M/M/1
  prediction and explain the difference.
details:
  realistic_solution: 'lambda = 20, mu = 25, rho = 0.8. M/D/1 Wq = rho / (2*mu*(1-rho))
    = 0.8 / (2*25*0.2) = 0.08 s = 80 ms. M/M/1 Wq = rho / (mu*(1-rho)) = 160 ms.
    Deterministic service halves the queueing delay because service variance is
    zero - exactly the regime real INT8 inference operates in. The 80 ms M/D/1 estimate
    is the truthful one to size buffers against.'
  common_mistake: Defaulting to M/M/1 for video inference and over-estimating queueing
    delay by 2x; or confusing total time-in-system with queue wait time.
  napkin_math: 'M/D/1 Wq = 0.8 / (2*25*0.2) = 80 ms; M/M/1 Wq = 160 ms; deterministic
    service saves 50%.'
