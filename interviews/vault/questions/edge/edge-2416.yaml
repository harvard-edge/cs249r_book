title: Coral TPU Batching Effect on Queue Stability
scenario: A 4-lane traffic-monitoring pipeline on a Coral Dev Board (Edge TPU) runs
  YOLOv5n at fixed resolution. Per-frame service time is 25 ms when frames are processed
  singly (40 fps capacity), but the Edge TPU runtime supports static batching - batches
  of 2 take 32 ms (62.5 effective fps), batches of 4 take 48 ms (83 effective fps).
  Frames arrive Poisson at 60 fps aggregated across the four lanes. The system must
  hold a 95th-percentile response time under 80 ms to satisfy a downstream signal-control
  SLA.
question: Evaluate whether batch-of-1, batch-of-2, or batch-of-4 best satisfies the
  60 fps arrival rate at the 80 ms p95 SLA, using M/D/1 Pollaczek-Khinchine for waiting
  time and remembering that batching adds a fill-time component (waiting for the batch
  to assemble) on top of queueing. Identify which batch size minimises tail latency,
  and explain why the largest batch is not always the answer despite its higher throughput
  ceiling.
details:
  realistic_solution: 'Arrival rate lambda = 60 fps. Batch-of-1 (mu=40, rho=1.5) is
    unstable - drop. Batch-of-2 effective mu = 62.5 fps but the unit of work is a
    2-frame batch, so view as M/D/1 with lambda_b = 30 batches/s, mu_b = 31.25 batches/s,
    rho = 0.96 - very close to instability, expected fill time 1/lambda_b * 1 ~= 33
    ms wait for the second frame plus M/D/1 Wq = (rho / (2*mu_b*(1-rho))) = 0.96/(2*31.25*0.04)
    = 384 ms - fails the SLA badly. Batch-of-4: lambda_b = 15, mu_b = 20.83 (1/0.048),
    rho = 0.72; M/D/1 Wq = 0.72 / (2*20.83*0.28) = 62 ms; fill time for the slowest
    frame in a batch of 4 at 60 fps arrivals ~= 3/60 = 50 ms; service 48 ms; total
    ~= 62 + 50 + 48 = 160 ms total response (head of batch sees less). For p95 with
    deterministic service and Poisson arrivals, the dominant term is fill + service
    for the last-arriving frame in the batch, which exceeds 80 ms in every batch >=
    2 case at this load. Recommend dropping the offered load (e.g., spatial down-sampling)
    or upgrading to a faster TPU; static batching cannot meet the 80 ms p95 at 60
    fps Poisson here.'
  common_mistake: 'Picking the largest batch for highest throughput ceiling while
    ignoring the fill-time penalty: a batch-of-4 forces the first arriving frame to
    wait for three more arrivals, adding ~50 ms of pure waiting on top of any queueing
    - which alone blows the SLA.'
  napkin_math: 'B=1: rho=1.5 unstable. B=2: rho=0.96, Wq~384 ms. B=4: rho=0.72, Wq~62
    ms but fill ~50 ms + service 48 ms -> 160 ms total. None meets p95<80 ms at lambda=60
    fps; lower lambda or upgrade hardware.'
