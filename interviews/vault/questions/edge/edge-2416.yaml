title: Evaluating M/M/1 Wait Times in Edge Video Processing
scenario: A multi-camera traffic intersection system on a Jetson AGX Orin operates
  as an M/M/1 queue. Images arrive at an average rate of 20 per second and process
  at an average rate of 25 per second.
question: Evaluate the expected wait time in the queue before a frame begins processing.
details:
  realistic_solution: Using the M/M/1 queue formula W_q = rho / (mu - lambda), where
    arrival rate lambda = 20, service rate mu = 25, and utilization rho = 20/25 =
    0.8. The expected wait time is 0.8 / (25 - 20) = 0.8 / 5 = 0.16 seconds, or 160
    ms.
  common_mistake: Confusing total time in system (W) with wait time in queue (W_q).
  napkin_math: 0.8 / (25 - 20) = 0.16 s
