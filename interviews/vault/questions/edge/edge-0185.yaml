title: 'The Depthwise Separable Dividend: Transformer Systems Cost'
scenario: You're optimizing a CNN for a self-driving car's perception system running on an edge SoC. A key layer uses a standard 3x3 convolution with 64 input channels and 128 output channels, processing a 224x224 feature map.
question: What FLOP and parameter reduction do you get by replacing this 3x3 64-to-128 convolution with a depthwise separable convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard conv into two steps: (1) depthwise 3×3 conv processing each input channel independently (57.8 MFLOPs), and (2) 1×1 pointwise conv combining outputs (822 MFLOPs). Total: 879.8 MFLOPs vs 7,400 MFLOPs standard = 8.4× reduction. The savings depend on C_out and K: ratio ≈ 1/(1/C_out + 1/K²). The ~9× rule-of-thumb (K²) is an approximation that ignores pointwise cost.'
  common_mistake: |
    **The Pitfall:** Using the K^2=9x rule-of-thumb blindly.
    **The Rationale:** Candidates often quote the spatial kernel size squared (9x) as the savings, ignoring the expensive pointwise step which dominates the cost when channel counts are high.
    **The Consequence:** Overestimating the performance gains from depthwise separable convolutions on edge hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 3x3 Conv, 64 input channels, 128 output channels, 224x224 spatial map.
    2. **Calculations:**
       * Standard FLOPs = 2 * 9 * 64 * 128 * (224^2) = 7.40 GFLOPs.
       * Depthwise FLOPs = 2 * 9 * 64 * (224^2) = 57.8 MFLOPs.
       * Pointwise FLOPs = 2 * 64 * 128 * (224^2) = 822 MFLOPs.
       * Total Depthwise Separable FLOPs = 57.8 + 822 = 879.8 MFLOPs.
    3. **Conclusion & Interpretation:**
       * **Savings = 7,400 / 879.8 = 8.4x reduction, heavily dominated by the pointwise operation. Result: Compute-Bound.**
  options:
  - ~128x reduction. This incorrectly equates the savings to the number of output channels, ignoring the cost of the pointwise convolution.
  - ~9x reduction. This uses the kernel size squared (3x3=9) as a rule-of-thumb, which is a close but imprecise approximation.
  - ~8.4x reduction.
  - ~2x reduction. This suggests a misunderstanding of the magnitude of savings offered by this architectural change.
  correct_index: 2
