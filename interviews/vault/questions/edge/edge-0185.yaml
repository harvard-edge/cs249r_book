title: 'The Depthwise Separable Dividend: Transformer Systems Cost'
scenario: You're optimizing a CNN for a self-driving car's perception system running on a Jetson AGX Orin.
  A key layer uses a standard 3x3 convolution with 64 input channels and 128 output channels, processing
  a 224x224 feature map.
question: "What FLOP and parameter reduction do you get by replacing this 3x3 64-to-128 convolution with a depthwise separable convolution?"
details:
  realistic_solution: 'A depthwise separable convolution splits a standard conv into two steps: (1) depthwise
    3×3 conv processing each input channel independently (57.8 MFLOPs), and (2) 1×1 pointwise conv combining
    outputs (822 MFLOPs). Total: 879.8 MFLOPs vs 7,400 MFLOPs standard = 8.4× reduction. The savings depend
    on C_out and K: ratio ≈ 1/(1/C_out + 1/K²). The ~9× rule-of-thumb (K²) is an approximation that ignores
    pointwise cost.'
  common_mistake: A common mistake is calculating only the depthwise savings and quoting 128× (C_out)
    as the factor, ignoring the expensive pointwise step. Another is using the K²=9× rule-of-thumb without
    checking if the pointwise cost is significant. For this configuration, pointwise dominates (822 vs
    57.8 MFLOPs), so the true savings are 8.4×, not 9×.
  napkin_math: 'C_in=64, C_out=128, K=3, spatial=224×224=50,176.


    **Standard 3×3 Conv:** FLOPs = 2 × 9 × 64 × 128 × 50,176 = 7.40 GFLOPs. Params = 9 × 64 × 128 = 73,728.


    **Depthwise Separable:**

    Depthwise (3×3, one filter/channel): FLOPs = 2 × 9 × 64 × 50,176 = 57.8 MFLOPs. Params = 9 × 64 =
    576.

    Pointwise (1×1, C_in→C_out): FLOPs = 2 × 64 × 128 × 50,176 = 822 MFLOPs. Params = 64 × 128 = 8,192.

    Total: 57.8 + 822 = 879.8 MFLOPs. Params = 576 + 8,192 = 8,768.


    **Savings:** FLOPs: 7,400/879.8 = 8.41×. Params: 73,728/8,768 = 8.41×.

    Theoretical: 1/(1/C_out + 1/K²) = 1/(1/128 + 1/9) = 8.4×.'
  options:
  - ~128x reduction. This incorrectly equates the savings to the number of output channels, ignoring the
    cost of the pointwise convolution.
  - ~9x reduction. This uses the kernel size squared (3x3=9) as a rule-of-thumb, which is a close but
    imprecise approximation.
  - ~8.4x reduction.
  - ~2x reduction. This suggests a misunderstanding of the magnitude of savings offered by this architectural
    change.
  correct_index: 2
