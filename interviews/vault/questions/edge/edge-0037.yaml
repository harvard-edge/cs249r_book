title: The Sensor Aging Silent Accuracy Rot
scenario: You're the ML platform architect for a fleet of 10,000 Ambarella CV5 devices
  running quality inspection in semiconductor fabs. After 18 months, aggregate defect
  escape rate has increased from 0.1% to 0.4% — a 4x degradation. But no single device
  shows a dramatic drop. Every device's accuracy has degraded by a small, nearly imperceptible
  amount — 0.3–0.5% each. Your monitoring system, which alerts on >2% per-device accuracy
  drops, never triggered.
question: How do you detect and correct fleet-wide gradual degradation that's invisible
  at the individual device level?
details:
  realistic_solution: The degradation is caused by image sensor aging — a well-known
    phenomenon in CMOS sensors under continuous illumination. The CV5's Sony IMX sensor
    experiences hot pixel accumulation, dark current increases, and color filter degradation.
    You must implement fleet-level aggregation analytics to detect micro-drifts that
    fall below individual noise floors, and schedule targeted sensor replacements
    rather than model retraining.
  common_mistake: '**The Pitfall:** Lowering the per-device alert threshold to catch
    the minor degradation.

    **The Rationale:** Engineers attempt to fix visibility at the individual node
    level without accounting for normal statistical variation.

    **The Consequence:** Alert fatigue. A 0.5% threshold triggers thousands of false
    positives daily, rendering the monitoring system useless.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 10,000 devices, 0.3% degradation\
    \ per device over 18 months.\n   - Individual monthly variance: ±0.5%.\n   - Escape\
    \ cost: $1,000 per defect, 1M chips/month volume.\n2. **Calculations:**\n   -\
    \ Fleet degradation signal = 10,000 * 0.017%/month = 170% aggregate signal.\n\
    \   - Fleet noise = sqrt(10,000 * 0.5%^2) = 50%.\n   - Fleet SNR = 170% / 50%\
    \ = 3.4 (High confidence, p < 0.001).\n   - Cost of additional escapes = 0.3%\
    \ * 1M * $1,000 = $3,000,000/month.\n3. **Conclusion & Interpretation:**\n   -\
    \ **Result: Fleet-Aggregated SNR Dominates**. Individual sensor aging is lost\
    \ in noise, but fleet statistics yield a 3.4 SNR, clearly exposing the silent\
    \ rot causing $3M/month in damages.\n"
