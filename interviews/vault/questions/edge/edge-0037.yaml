title: The Sensor Aging Silent Accuracy Rot
scenario: You're the ML platform architect for a fleet of 10,000 Ambarella CV5 devices (20 TOPS) running
  quality inspection in semiconductor fabs. After 18 months, aggregate defect escape rate has increased
  from 0.1% to 0.4% — a 4× degradation. But no single device shows a dramatic drop. Every device's accuracy
  has degraded by a small, nearly imperceptible amount — 0.3–0.5% each. Your monitoring system, which
  alerts on >2% per-device accuracy drops, never triggered. How do you detect and correct fleet-wide gradual
  degradation that's invisible at the individual device level?
details:
  realistic_solution: 'The degradation is caused by image sensor aging — a well-known phenomenon in CMOS
    sensors under continuous illumination. The CV5''s Sony IMX sensor experiences: (1) hot pixel accumulation:
    stuck pixels increase from ~50 at deployment to ~500 after 18 months of 24/7 operation under fab lighting.
    Each hot pixel is a bright dot that the model may interpret as a defect (false positive) or that masks
    a real defect in its vicinity (false negative). (2) Dark current increase: the sensor''s noise floor
    rises with cumulative photon exposure, reducing the signal-to-noise ratio for subtle defects. (3)
    Color filter degradation: UV exposure from fab lighting causes the Bayer filter to yellow slightly,
    shifting the color response — the model was trained on the original color profile.'
  common_mistake: '"Lower the per-device alert threshold from 2% to 0.5%." At 0.5% threshold with normal
    statistical variation, you''d get thousands of false alerts daily across 10,000 devices — alert fatigue
    would make the system useless.'
  napkin_math: 'Per-device degradation: 0.3%/18 months = 0.017%/month. Fleet aggregate: 0.017% × 10,000
    = 170% signal (easily detectable with fleet statistics). Individual device noise: ±0.5% monthly variation.
    SNR for individual detection: 0.017/0.5 = 0.034 (undetectable). SNR for fleet detection: 170/√(10,000
    × 0.5²) = 170/50 = 3.4 (clearly detectable at p < 0.001). Semiconductor defect escape cost: 500–50,000
    per defective chip reaching the customer. 0.3% increase in escape rate × 1M chips/month = 3,000 additional
    escapes/month. At 1,000 average escape cost: 3M/month in quality losses. Sensor replacement cost:
    50/sensor × 10,000 devices / 3-year cycle = 167K/year. The 167K/year sensor refresh prevents 36M/year
    in quality losses.'
