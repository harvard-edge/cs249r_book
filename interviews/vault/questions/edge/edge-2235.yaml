title: Heterogeneous Chiplet ISA Compatibility
scenario: A developer compiles a TFLite model targeting an edge chiplet that combines ARM CPU dies with a custom RISC-V ML accelerator die.
question: What software stack challenges arise when TFLite must target ARM CPU chiplets plus a custom RISC-V ML accelerator die?
details:
  realistic_solution: 'Heterogeneous ISA chiplets require: (1) a common tensor interchange format (e.g., NHWC vs NCHW layout per die), (2) memory alignment contracts (RISC-V vector extensions may require 128-byte alignment vs ARM NEON''s 16-byte), (3) explicit runtime dispatch choosing which die handles each operator based on profiled cost tables. The TFLite XNNPACK delegate handles CPU, but the RISC-V ML die needs a custom accelerator delegate with its own compiler pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming the TFLite delegate system handles all ISA differences transparently.
    **The Rationale:** The delegate API abstracts operator dispatch but not ABI differences in tensor layout, memory alignment requirements, or custom data types.
    **The Consequence:** Silent memory corruption or massive overhead from unaligned memory accesses and constant layout permutation during handoffs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TFLite MobileNetV3 (90 ops)
       - 30 FPS target (33ms budget)
    2. **Calculations:**
       - Operator dispatch overhead: ~10µs per operator handoff
       - Total overhead = 90 * 10µs = 900µs = 0.9ms
       - Overhead percentage = 0.9ms / 33ms = 2.7%
    3. **Conclusion & Interpretation:**
       **Result: 2.7% of budget (Acceptable)**
