title: The DLA vs GPU Scheduling
scenario: You're building a perception stack on a Jetson Orin AGX (64 GB). It has an Ampere GPU (275 TOPS INT8) and two DLA engines (each ~50 TOPS INT8, ~5W per DLA). Your manager says 'just run everything on the GPU — it's faster.' You argue that offloading the backbone to a DLA saves significant power.
question: When does offloading the backbone to a DLA actually improve performance over running everything on the faster GPU?
details:
  realistic_solution: 'Your manager is partially right — for a single model on a plugged-in system, the GPU is faster and simpler. But DLA scheduling matters in three scenarios: (1) **Pipeline parallelism** — the DLA runs the detection backbone while the GPU simultaneously runs the tracking model. Two engines working in parallel increase throughput even if each is individually slower. (2) **Thermal headroom** — the GPU at full load draws ~60W. In a sealed enclosure at 40°C ambient, this causes thermal throttling within 10 minutes. Offloading the backbone to a DLA (5W) reduces GPU load to ~30W, keeping the system below the thermal ceiling indefinitely. (3) **Operator coverage** — DLAs support a fixed set of operations (Conv2D, ReLU, pooling, etc.) but not all (e.g., deformable convolutions, custom attention). If your backbone is DLA-compatible but the head isn''t, the natural split is DLA-backbone + GPU-head.'
  common_mistake: |
    **The Pitfall:** Asserting that the GPU is always better because it's faster, or DLA is always better because it's efficient.
    **The Rationale:** Candidates ignore the system-level scheduling context, such as pipeline parallelism and thermal throttling limits.
    **The Consequence:** Building an unbalanced pipeline that either thermal throttles within minutes or achieves suboptimal end-to-end throughput.
  napkin_math: |
    1. Assumptions & Constraints:
       - GPU peak: 275 TOPS INT8, 60W
       - DLA peak: 50 TOPS INT8, 5W
    2. Calculations:
       - GPU-only efficiency = 275 / 60 = 4.58 TOPS/W
       - DLA efficiency = 50 / 5 = 10 TOPS/W
       - GPU-only pipeline = backbone 6ms + head 5ms + tracker 8ms = 19ms (52 FPS)
       - DLA pipeline (parallel) = DLA backbone 12ms + GPU head 5ms (parallel with tracker 8ms) = 17ms (58 FPS)
    3. Conclusion & Interpretation:
       - **Result: Power-Bound & Parallelism-Bound. DLA pipeline is both faster (58 FPS vs 52 FPS) and uses 50% less power.**
  options:
  - "Using a larger model with more parameters will improve both accuracy and latency, because larger models have better computational efficiency."
  - "'Your manager is partially right — for a single model on a plugged-in system, the GPU is faster and simpler. But DLA scheduling matters in three scenarios: (1) Pipeline parallelism — the DLA runs the detection backbone while the GPU simultaneously runs the tracking model."
  - "The thermal issue is caused by ambient temperature; adding a larger heatsink will fully solve the throttling without any software changes."
  - "DLA is always better because it's more power-efficient. or GPU is always better because it's faster. Both ignore the scheduling context."
  correct_index: 1
