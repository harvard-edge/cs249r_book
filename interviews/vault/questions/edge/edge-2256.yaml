title: LoRA Adapter Update Over-the-Air for Edge Devices
scenario: A fleet of 10,000 edge AI devices each running a 7B base model with LoRA adapters needs monthly adapter updates pushed OTA. Each adapter is 30MB.
question: How would you design the OTA LoRA adapter update system for 10,000 devices to minimize bandwidth and ensure reliability?
details:
  realistic_solution: Implement delta compression (xdelta3) to distribute 3-5MB differentials instead of 30MB full files. Deploy via a CDN to localize edge pulls. The device downloads the delta safely in the background and applies it atomically, keeping v_n-1 for instant rollback on SHA-256 failure.
  common_mistake: |
    **The Pitfall:** Pushing full adapter files each month without delta compression.
    **The Rationale:** Candidates overlook the fact that weight updates typically change by only a small percentage, and distributing full files incurs massive bandwidth waste.
    **The Consequence:** Unnecessary network congestion and high CDN costs (transferring 300GB instead of 50GB per month).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10K devices, 5MB delta per adapter
       - Connection: 10 Mbps (1.25 MB/s)
    2. **Calculations:**
       - Total Transfer = 10,000 * 5MB = 50GB/month
       - Download Time = 5MB / 1.25MB/s = 4 seconds
    3. **Conclusion & Interpretation:**
       - **Result: 50GB Total Transfer.** Instantaneous 4s background transfer with zero service interruption.
