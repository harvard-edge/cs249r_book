title: 'Optimizing Deep Learning Inference on Jetson Orin: Diagnosing Performance Bottlenecks in Operator Scheduling'
scenario: You are deploying a large language model (LLM) for real-time inference on an NVIDIA Jetson Orin. Your model, after quantization to INT8, consistently achieves only 15 FPS, far below the expected 50+ FPS for its complexity. Profiling reveals that while individual operator latencies are low, the overall pipeline has significant idle time between layers and frequent memory transfers between CPU and GPU.
question: How would you diagnose why the Jetson Orin pipeline reaches only 15 FPS, focusing on execution order, memory reuse, and CPU-GPU transfers?
details:
  realistic_solution: 'Utilize NVIDIA''s profiling tools (e.g., Nsight Systems, Nsight Compute if applicable for custom kernels, or `trtexec` with `--export-profile`) to visualize the operator execution timeline. Look for: 1. Memory Reuse: Identify operators that produce intermediate tensors that are immediately consumed by subsequent operators. Can these be fused or scheduled to minimize memory writes to and reads from global device memory (LPDDR5)? 2. Parallel Execution: Determine if independent branches of the computation graph can be executed concurrently. Is the current scheduler bottlenecking on sequential execution of independent ops? 3. Layer Fusion: Check if adjacent operators (e.g., Conv-ReLU-BN) are being fused by the TensorRT builder. If not, investigate reasons (e.g., unsupported data types, dynamic shapes, custom layers). 4. Data Movement: Pinpoint excessive data transfers between host (CPU) and device (GPU). Could input/output tensors be pinned, or could more operations remain on the device? 5. Scheduler Analysis: Examine the TensorRT build logs for optimization reports. Consider using a custom `IBuilderConfig` to explicitly control certain fusion or memory optimization behaviors, or even a custom plugin for specific operators if standard TensorRT optimizations aren''t sufficient for the Orin''s architecture.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to model architecture changes or lower-level kernel optimizations.
    **The Rationale:** Candidates fail to thoroughly analyze the operator graph execution plan and memory access patterns first.
    **The Consequence:** Overlooking the simple scheduler behaviors and memory transfers that actually dominate edge device latency.
  napkin_math: |
    * Target compute: 50 FPS requires ~5.5 TOPS per inference
    * Theoretical compute time: 5.5 TOPS / 275 TOPS = 20 ms (50 FPS)
    * Observed compute time: 15 FPS = ~66 ms per inference
    * Overhead difference: 66 ms - 20 ms = 46 ms
    * Transfer limit: 1 GB transfer at 204.8 GB/s takes ~5 ms
    * **The massive 46 ms overhead confirms severe memory thrashing and missed operator fusions rather than compute limits.**
