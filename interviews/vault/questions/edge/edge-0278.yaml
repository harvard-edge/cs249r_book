title: 'The Edge Roofline Ridge Point: Roofline Analysis'
scenario: You're an engineer on an autonomous vehicle team, tasked with characterizing the performance of a new perception model on a Jetson AGX Orin. Before profiling the model itself, you need to understand the hardware's theoretical limits. The Orin's peak INT8 performance is 275 TOPS and its memory bandwidth is 204.8 GB/s.
question: What is the hardware's ridge point in Ops/Byte?
details:
  realistic_solution: The ridge point of a processor defines the boundary between being compute-bound and memory-bound. It's calculated by dividing the peak operational throughput (in Ops/second) by the peak memory bandwidth (in Bytes/second). For the Jetson AGX Orin, this is 275 TOPS divided by 204.8 GB/s. A model with an arithmetic intensity lower than this will be bottlenecked by memory; a model with a higher intensity will be bottlenecked by compute.
  common_mistake: |
    **The Pitfall:** Unit mismatch when calculating arithmetic intensity.
    **The Rationale:** Candidates fail to convert TOPS (10^12 Ops/s) and GB/s (10^9 Bytes/s) to a common base, or they invert the ratio (calculating Bytes/Op instead).
    **The Consequence:** This leads to an answer that is off by a factor of 1000 or conceptually backwards.
  napkin_math: |
    1. Ridge Point = Peak Ops / Peak Mem Bandwidth.
    2. Orin Peak Compute = 275 TOPS = 275e12 Ops/sec.
    3. Orin Peak Mem Bandwidth = 204.8 GB/s = 204.8e9 Bytes/sec.
    4. **Ridge Point = 275e12 / 204.8e9 = 1342.7 Ops/Byte.**
  options:
  - ~1.34 Ops/Byte
  - ~1343 Ops/Byte
  - ~0.74 Ops/Byte
  - ~10744 Ops/Byte
  correct_index: 1
