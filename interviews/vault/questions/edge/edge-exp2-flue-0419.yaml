title: Edge TPU CI/CD Pipeline Quantization Throughput
scenario: You are building a CI/CD pipeline for a fleet of devices equipped with Google Coral Edge TPUs.
  As part of the automated build process, every new model candidate must be quantized to INT8 to be compatible
  with the Edge TPU. If a target model requires 200 GOPS per inference, calculate the theoretical maximum
  frame rate (FPS) you can expect on the Coral Edge TPU during the automated performance smoke test.
details:
  realistic_solution: The correct approach is to identify the hardware's peak performance capability (4
    TOPS) and convert it to the same unit as the model's requirement (GOPS). Then, divide the peak performance
    by the per-inference requirement to find the theoretical maximum inferences per second.
  common_mistake: Candidates often fail to recall that 1 TOPS = 1,000 GOPS, or they confuse TOPS with
    teraflops (TFLOPS), forgetting that the Edge TPU specifically accelerates INT8 operations, not floating
    point.
  napkin_math: '1. Edge TPU peak performance = 4 TOPS INT8.

    2. Convert TOPS to GOPS: 4 TOPS * 1,000 = 4,000 GOPS.

    3. Model requirement = 200 GOPS / inference.

    4. Max theoretical FPS = Total GOPS / GOPS per inference = 4,000 / 200 = 20 inferences per second
    (20 FPS).'
