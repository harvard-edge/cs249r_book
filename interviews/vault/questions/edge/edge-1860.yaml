title: Optimizing Activation Memory on NVIDIA Jetson Orin for Large Models
scenario: You are deploying a large language model (LLM) on an NVIDIA Jetson Orin. The model's forward pass activations alone exceed the available memory, making direct deployment impossible.
question: How does gradient checkpointing reduce activation memory on Jetson Orin, and what latency and power tradeoffs does recomputation introduce?
details:
  realistic_solution: A realistic solution would involve strategically selecting layers for checkpointing to balance memory reduction with recomputation cost. For the Jetson Orin, this means carefully considering the increased compute cycles and their impact on inference latency and power consumption. The candidate should discuss how to profile the model to identify optimal checkpointing points and potentially explore mixed-precision training or activation quantization to further reduce memory footprint, thereby maximizing the effective model size deployable within the 60W power budget.
  common_mistake: |
    **The Pitfall:** Focusing solely on the memory savings of checkpointing.
    **The Rationale:** Candidates adequately discuss memory reduction but fail to quantify the computational overhead it introduces, especially on a power-constrained edge device.
    **The Consequence:** Deploying a model that technically fits in memory but misses real-time latency deadlines or exceeds the thermal/power budget due to excessive recomputation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer activation memory: 2 GB.
       - Recomputation cost per layer: 500ms.
    2. **Calculations:**
       - Checkpointing 5 layers saves: 5 * 2 GB = 10 GB.
       - Recomputation latency penalty: 5 * 500ms = 2.5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Saves 10 GB at the cost of 2.5s latency per token.**
       - **Compute-Bound**
