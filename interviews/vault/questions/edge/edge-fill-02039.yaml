title: Federated Learning Gradient Aggregation on Jetson Orin
scenario: 10 Jetson Orin devices (32GB LPDDR5 each) run federated learning on medical imaging data. Each
  device holds a local model (100M params, 400MB FP32). The edge uplink is 10Mbps. Design a gradient synchronization
  strategy to complete one federated round in under 5 minutes.
question: "How would you synchronize 100M-parameter gradients from 10 Jetson Orins over 10Mbps uplinks within a 5-minute federated round?"
details:
  realistic_solution: 'Full gradient upload per device: 400MB / 1.25MB/s (10Mbps) = 320s per device. 10
    devices sequential = 3200s. Far over 5-min limit. Strategies: (1) Top-k gradient sparsification at
    1% → 4MB/device → 3.2s/device → feasible. (2) INT8 quantization of gradients: 400MB × 0.25 = 100MB
    → 80s/device → 800s total (still over). (3) Combine: INT8 + 1% sparsification → 1MB/device → 0.8s
    → 8s for all 10 parallel uploads! Jetons can compute top-k on 32GB LPDDR5 easily. Error feedback accumulates
    locally on each Jetson.'
  common_mistake: Transmitting full FP32 gradients over the WAN link without compression; 400MB × 10 devices
    over 10Mbps takes 400MB/1.25MB/s=320s just for one device.
  napkin_math: '10Mbps=1.25MB/s. Full FP32: 400MB/1.25=320s/device. Top-1% sparse+INT8: 100M×0.01×1B=1MB/device.
    Upload: 1/1.25=0.8s. 10 parallel devices (10 separate uplinks): 0.8s total! Round-trip: upload(0.8s)+server
    aggregation(2s)+download(0.8s)=3.6s << 5min. Even with 10:1 uplink congestion: 36s total.'
