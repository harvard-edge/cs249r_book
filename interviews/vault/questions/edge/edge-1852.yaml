title: Edge AI Compute Cost and Performance Estimation for Google Coral TPU Deployment
scenario: A fleet of 1000 smart cameras continuously runs an object detection model on Google Coral Edge TPUs (4 TOPS INT8, 2W). The optimized INT8 model requires 2 Billion INT8 operations per inference. Electricity costs $0.15 per kWh.
question: What are the maximum theoretical inferences per second (FPS) per device, and what is the annual electricity cost for the 1000-device fleet?
details:
  realistic_solution: 'The realistic approach involves a multi-step process: 1. Ensure
    the model is robustly quantized to INT8 using either Post-Training Quantization
    (PTQ) or Quantization-Aware Training (QAT) specifically for the Coral TPU''s requirements.
    2. Develop a comprehensive benchmark suite that runs the model on the actual Coral
    Edge TPU, measuring end-to-end latency and FPS, including all pre-processing and
    post-processing steps. 3. Monitor the actual power consumption during real-world
    inference scenarios to refine cost estimates. 4. Account for the ''duty cycle''
    of the device in a production environment (i.e., devices might not be inferring
    100% of the time) when calculating overall fleet costs.'
  common_mistake: |
    **The Pitfall:** Overlooking the INT8 constraint or relying solely on theoretical TOPS without considering operations per inference.
    **The Rationale:** Candidates fail to convert TOPS to specific model operations or calculate energy over time accurately.
    **The Consequence:** Incorrect capacity planning or failing to deploy because the model isn't quantized correctly.
  napkin_math: |
    1. **Max FPS**: 4 TOPS = 4,000 GOPS. 4,000 GOPS / 2 GOPS/inference = **2,000 FPS maximum**.
    2. **Device Power**: 2W = 0.002 kW.
    3. **Annual Energy per Device**: 0.002 kW * 24 h/day * 365 days/yr = 17.52 kWh/yr.
    4. **Annual Cost per Device**: 17.52 kWh * $0.15/kWh = $2.628/yr.
    5. **Fleet Annual Cost**: $2.628 * 1,000 devices = **$2,628 per year**.
