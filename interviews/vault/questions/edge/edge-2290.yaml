title: Hailo-8 Intersection Utilization
scenario: A smart intersection traffic camera uses a Hailo-8. Frames arrive randomly
  at an average of 30 per second, and inference takes 20ms per frame.
question: Calculate the utilization of the Hailo-8 chip using basic queueing theory.
visual:
  kind: svg
  path: edge-2290.svg
  alt: Gauge chart or bar showing utilization reaching 60%.
  caption: Accelerator Utilization
details:
  realistic_solution: The service rate is 1/0.02s = 50 frames per second. Utilization
    (rho) is the arrival rate (30) divided by the service rate (50). The utilization
    is 60%.
  common_mistake: Dividing arrival rate by inference time directly without matching
    units (e.g., 30 / 20 = 1.5).
  napkin_math: 30 / (1 / 0.02) = 0.60 or 60%
