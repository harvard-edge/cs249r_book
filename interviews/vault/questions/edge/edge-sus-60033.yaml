title: Federated learning gradient compression with autograd hooks on Jetson Orin
scenario: You are implementing PowerSGD gradient compression for federated learning across 100 Jetson
  Orin devices with 1Mbps uplink bandwidth. Each device has a 30M parameter model producing 120MB FP32
  gradients per step. Uploading 120MB on a 1Mbps link takes 960 seconds — orders of magnitude too slow.
details:
  realistic_solution: 'Use gradient hooks registered with module.register_backward_hook() to intercept
    gradients layer-by-layer as they are produced during backward. Apply rank-1 PowerSGD compression (UV
    decomposition) immediately before accumulation into .grad. Maintain an error feedback buffer per layer.
    With rank-1 compression: 30M params → (n_layers × (in_dim + out_dim) × rank) ≈ 1000 layers × 256 values
    = 1MB transmitted. 120× compression.'
  common_mistake: Applying gradient compression after the full backward pass has run and gradients are
    materialized. This saves communication bandwidth but doesn't reduce the memory cost of holding 120MB
    gradients on the device during compression. Also not considering error feedback — compressed gradients
    accumulate approximation errors that must be corrected.
  napkin_math: '30M params FP32 = 120MB. PowerSGD rank-1 for a 256×1024 weight matrix: transmit (256+1024)×4
    bytes = 5.1KB vs 1MB original = 196× compression. Average across all layers: ~100× compression. Compressed
    gradient size: 120MB/100 = 1.2MB. Upload time at 1Mbps: 1.2MB × 8 bits = 9.6Mb / 1Mbps = 9.6 seconds.
    Achievable for federated round of 5 minutes.'
