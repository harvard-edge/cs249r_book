title: The INT8 Memory Footprint
scenario: You have a 25 million parameter computer vision model trained in FP32. To meet the performance requirements for deployment on a Jetson AGX Orin, you need to convert it to INT8.
question: For 25M parameters, how much memory do the weights require in FP32 versus INT8, and how much is saved?
details:
  realistic_solution: "An FP32 parameter requires 4 bytes of storage. An INT8 parameter requires 1 byte. Therefore, converting the weights from FP32 to INT8 results in a 4x reduction in the memory footprint for the model weights."
  common_mistake: |
    **The Pitfall:** Confusing precision bit-widths with memory reduction ratios.
    **The Rationale:** Engineers often assume a 2x savings (confusing with FP16) or 8x savings (confusing bits with bytes).
    **The Consequence:** Incorrectly sizing edge VRAM requirements, leading to OOM errors or wasted hardware spend.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 25 million parameters
       - FP32 vs INT8 precision
    2. **Calculations:**
       - FP32 size: 25M * 4 bytes = 100 MB
       - INT8 size: 25M * 1 byte = 25 MB
       - Reduction = 100 MB / 25 MB = 4x
    3. **Conclusion & Interpretation:**
       **Result: 4x reduction (Memory-Bound)**
  options:
  - 50 MB (FP32) and 25 MB (INT8), a 2x reduction.
  - 200 MB (FP32) and 25 MB (INT8), an 8x reduction.
  - 100 MB (FP32) and 25 MB (INT8), a 4x reduction.
  - 100 MB (FP32) and 12.5 MB (INT8), an 8x reduction.
  correct_index: 2
