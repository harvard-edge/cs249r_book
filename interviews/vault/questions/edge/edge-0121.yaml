title: The INT8 Memory Footprint
scenario: You have a 25 million parameter computer vision model trained in FP32. To meet the performance
  requirements for deployment on a Jetson AGX Orin, you need to convert it to INT8. Explain the difference
  in the memory required for the model's weights before and after quantization, and calculate the total
  memory savings.
details:
  realistic_solution: An FP32 parameter requires 4 bytes of storage. An INT8 parameter requires 1 byte.
    Therefore, converting the weights from FP32 to INT8 results in a 4x reduction in the memory footprint
    for the model weights.
  common_mistake: Engineers often confuse the memory reduction ratios. They might incorrectly assume a
    2x saving (confusing it with FP16 conversion) or an 8x saving (confusing the bit-width difference
    with the byte-multiple difference). The correct ratio for FP32 (4 bytes) to INT8 (1 byte) is exactly
    4x.
  napkin_math: 1. **FP32 Size:** 25M params * 4 bytes/param = 100 MB
  options:
  - 50 MB (FP32) and 25 MB (INT8), a 2x reduction.
  - 200 MB (FP32) and 25 MB (INT8), an 8x reduction.
  - 100 MB (FP32) and 25 MB (INT8), a 4x reduction.
  - 100 MB (FP32) and 12.5 MB (INT8), an 8x reduction.
  correct_index: 2
