title: Hailo-8 Local Memory Specification
scenario: You are deploying a multi-model RAG pipeline on an edge gateway equipped with a Hailo-8 dataflow accelerator, which delivers 26 TOPS INT8 at 2.5W. The pipeline requires passing intermediate embeddings between a lightweight embedding model and a small generative model.
question: When designing the memory buffer for these intermediate states, how much local DRAM does the Hailo-8 provide to store these chained inference outputs?
details:
  realistic_solution: The candidate should correctly state that the Hailo-8 has absolutely no local DRAM. It is a pure dataflow accelerator that relies on its internal architecture and streams all necessary data, including intermediate states between chained inference calls, directly from the host system's memory.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator has dedicated onboard memory (e.g., 4GB-8GB LPDDR4).
    **The Rationale:** Edge GPUs (like Jetson) have dedicated memory, so candidates mistakenly generalize this to all edge accelerators.
    **The Consequence:** Designing a pipeline that fails because it doesn't account for the latency and bandwidth cost of host-memory streaming.
  napkin_math: |
    - **Local DRAM:** Available = 0 GB. 100% of intermediate data traverses the host connection.
    - **Data Transfer:** Passing a 512KB context state requires transferring 512KB out and 512KB back in (1MB total).
    - **Latency Cost:** Over an edge PCIe connection at 2 GB/s, this 1MB round-trip adds roughly 1MB / 2000MB/s = **0.5 milliseconds** of latency to the pipeline.
