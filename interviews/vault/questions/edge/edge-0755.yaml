title: The Resource Tug-of-War
scenario: An edge device runs two independent ML models on a single NPU: a critical safety monitor (high priority, low latency) and a background analytics model (lower priority, best-effort).
question: How do you ensure the safety model always meets its deadlines without significantly starving the analytics model when both contend for the NPU?
details:
  realistic_solution: "Managing shared resources like an NPU requires careful scheduling and resource partitioning. Implement time-slicing with quotas or hardware partitioning to ensure both progress while meeting real-time guarantees."
  common_mistake: |
    **The Pitfall:** Relying solely on simple priority scheduling without quotas or partitioning.
    **The Rationale:** Candidates assume that "giving priority" is sufficient for real-time systems.
    **The Consequence:** This can lead to the background analytics model being completely starved and never running during sustained high-load periods.
  napkin_math: |
    * **Safety Model Requirement:** 10ms of NPU time every 100ms (10% utilization) with a 20ms deadline.
    * **Resource Allocation:** Ensure the scheduler guarantees 10ms within the 20ms window.
    * **Analytics Model Availability:** The remaining 90ms of the 100ms window (90% utilization) is available for analytics.
    * **Throughput Example:** On a 100 TOPS NPU, **allocate 10 TOPS guaranteed** to the safety model and 90 TOPS for analytics.
