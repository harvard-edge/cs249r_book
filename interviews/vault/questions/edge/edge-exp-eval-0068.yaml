title: Dataflow Tradeoffs on Qualcomm Cloud AI 100
scenario: You are deploying a large vision transformer (ViT-L) on a Qualcomm Cloud AI 100 edge accelerator
  (400 TOPS INT8, 32GB LPDDR4x, 75W TDP) for an on-premise defect detection system. The model has massive
  fully connected layers in the MLP blocks. You must decide whether to configure the compiler for a weight-stationary
  or output-stationary dataflow for these specific layers to maximize utilization while staying within
  the strict 75W power budget and avoiding memory bandwidth bottlenecks. Evaluate the tradeoffs and justify
  your architectural choice.
details:
  realistic_solution: For the MLP expansion layers, an output-stationary (or row-stationary) dataflow
    is generally superior. While weights are large, the intermediate activations (outputs of the first
    linear layer in the MLP) are often 4x larger than the input sequence dimension. Pinning the outputs
    in the local accumulator SRAM minimizes the expensive movement of partial sums back and forth to main
    memory, which is crucial for staying within the 75W power envelope. Weight-stationary is better suited
    for earlier layers where activations are smaller relative to weights.
  common_mistake: Candidates often blindly choose weight-stationary because 'weights are large in ViT',
    ignoring the massive intermediate activation sizes (outputs) in the MLP expansion layers. They also
    frequently fail to account for the energy cost of moving partial sums versus weights when evaluating
    the 75W power constraint.
  napkin_math: Let's analyze an MLP expansion layer. Assume batch size 1, sequence length 1024, hidden
    dim 1024, expansion factor 4 (output dim 4096). Weights = 1024 * 4096 = 4MB (at INT8). Activations
    (Inputs) = 1024 * 1024 = 1MB. Outputs (Partial Sums) = 1024 * 4096 = 4MB. In weight-stationary, we
    load 4MB weights once, but might stream 4MB partial sums multiple times if they don't fit in accumulators.
    In output-stationary, we pin the 4MB outputs and stream the 4MB weights and 1MB inputs. Moving data
    to/from 32GB LPDDR4x costs ~20-50 pJ/bit, whereas on-chip SRAM is ~1 pJ/bit. Minimizing LPDDR4x traffic
    for the largest tensor (outputs) directly reduces power, helping stay within the 75W TDP while aiming
    for the 400 TOPS peak.
