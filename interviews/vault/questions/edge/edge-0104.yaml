title: The Sealed Oven Trap
scenario: Your outdoor perception system works perfectly in the lab but shuts down after 10 minutes of
  operation in the field during a summer day. You added a fan inside the case, but it didn't help. Based
  on the thermal diagram, what is the physical flaw in your cooling strategy?
details:
  realistic_solution: 'You have a **Thermal Discontinuity**. The trapped air gap between the SoC and the
    enclosure wall acts as an insulator. The fix is a **Direct Thermal Path**: use a copper heat pipe
    or a thick thermal block to connect the SoC heatsink directly to the aluminum enclosure wall. The
    enclosure becomes the heatsink. Combined with a white solar shield to reduce solar load, the junction
    temperature can be kept below the throttle threshold.'
  common_mistake: '"Add a bigger fan." The enclosure is sealed (IP67) — there''s no airflow path, so a
    fan just stirs hot air.'
  napkin_math: At 25W with a 5°C/W air-gap resistance, $\Delta T = 125^\circ\text{C}$. With a direct path
    (1°C/W), $\Delta T = 25^\circ\text{C}$. That 100-degree difference is the gap between a running system
    and a melted one.
