title: Designing a Memory-Constrained Training Loop for On-Device Fine-Tuning on Jetson Orin
scenario: A robotics team wants to run on-device continual learning on a Jetson Orin (32 GB LPDDR5, 275
  TOPS). They are fine-tuning a 3B parameter vision-language model (ViLT variant) with LoRA adapters using
  only fp16 mixed precision. The base model (frozen) uses 6 GB; LoRA adapters add 120 MB of trainable
  parameters. You must design a training loop that fits within 16 GB total memory (shared CPU+GPU budget)
  while achieving at least 5 training steps per minute for real-time adaptation.
details:
  realistic_solution: 'Apply gradient checkpointing to all frozen base model layers (no weight update
    needed, only activation passing). Only the LoRA adapter layers require stored activations for the
    weight gradient. This reduces stored activations from 3B-model-full-forward to only the LoRA insertion
    points (typically 2 activations per attention layer × num_layers). For a 24-layer model with LoRA
    at Q and V: 24 × 2 × (B×S×H) tensors stored = 24 × 2 × 1 × 512 × 2048 × 2 B = 96 MB. Add base model
    checkpoint boundary activations: 24 boundaries × 1 × 512 × 2048 × 2 B = 48 MB. Total activation memory
    ≈ 150 MB, well within budget.'
  common_mistake: Freezing the base model but still storing full activation gradients through all layers
    during the LoRA backward pass. Because LoRA inserts adapters at attention layers and gradients must
    flow back through frozen layers to reach them, activation memory for all intermediate layers must
    still be preserved unless gradient checkpointing is applied to the frozen prefix.
  napkin_math: 'Budget: 16 GB total. Base model: 6 GB. LoRA weights + optimizer (AdamW fp32): 120 MB ×
    4 = 480 MB. Activation memory with full checkpointing of frozen layers: 150 MB. OS + runtime overhead:
    ~2 GB. Total: 6 + 0.48 + 0.15 + 2 = 8.63 GB << 16 GB. Throughput: Orin at 275 TOPS, LoRA backward
    ~2× TOPS demand of frozen inference at batch=1, S=512: ~50 ms/step → 12 steps/min > 5 requirement.'
