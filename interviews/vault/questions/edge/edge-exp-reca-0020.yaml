title: Jetson Orin Zero-Copy Memory Architecture Identification
scenario: You are deploying a high-throughput video analytics pipeline on an NVIDIA Jetson Orin edge device.
  The system captures 4K video frames, preprocesses them on the CPU, and then runs inference on the Ampere
  GPU and DLA accelerator. The hardware features 32 GB of LPDDR5 memory and operates within a strict 60W
  TDP. To minimize latency and power consumption, you want to eliminate unnecessary host-to-device memory
  copies. What architectural feature of the Jetson Orin makes zero-copy data movement possible, and what
  memory allocation technique is required to leverage it?
question: "What architectural feature of the Jetson Orin makes zero-copy data movement possible, and what memory allocation technique is required to leverage it?"
details:
  realistic_solution: The correct answer is that the NVIDIA Jetson Orin features a Unified Memory Architecture
    (UMA) where the CPU, Ampere GPU, and DLA share the exact same physical 32 GB LPDDR5 memory subsystem.
    To leverage this for zero-copy data movement, developers must use pinned (page-locked) memory allocated
    via APIs like cudaHostAlloc with the cudaHostAllocMapped flag. This allows the GPU to directly access
    the physical memory buffer populated by the CPU via the memory controller, completely eliminating
    the DMA copy overhead.
  common_mistake: Candidates often assume that the edge device has discrete CPU and GPU memory banks connected
    via PCIe, similar to a desktop workstation GPU. As a result, they mistakenly propose using standard
    cudaMemcpy operations, failing to recognize the physically shared memory space.
  napkin_math: A single 4K RGB video frame requires 3840 x 2160 x 3 bytes = 24.88 MB. At 60 FPS, the pipeline
    generates 24.88 MB/frame * 60 FPS = 1.49 GB/s of data. A traditional cudaMemcpy would copy this data,
    consuming 1.49 GB/s of read bandwidth and 1.49 GB/s of write bandwidth (total ~2.98 GB/s overhead).
    By utilizing the Orin's unified 32 GB LPDDR5 memory for zero-copy access, this 2.98 GB/s bandwidth
    tax is eliminated. This savings reduces power draw, helping to stay under the 60W TDP constraint while
    ensuring memory bandwidth is reserved for feeding the 275 TOPS INT8 compute engines.
