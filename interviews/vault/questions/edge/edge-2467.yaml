title: Dynamic Range Quantization for Memory Bandwidth
scenario: A pre-trained FP32 depth-estimation model is too large for the Jetson Orin's memory bandwidth.
question: Apply dynamic range quantization to the model and explain which operations still run in FP32.
details:
  realistic_solution: Convert all weights to INT8 offline to cut memory bandwidth requirements by 4x. At runtime, activations remain in FP32. During matrix multiplication, activations are dynamically quantized to INT8, multiplied, and then immediately dequantized back to FP32 for sensitive non-linear operations like Softmax.
  common_mistake: |
    **The Pitfall:** Attempting to statically quantize non-linear activations without calibration.
    **The Rationale:** Assuming linear scaling applies uniformly across all layers, which breaks down for sensitive operations.
    **The Consequence:** Destroying model accuracy by introducing severe quantization noise.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 weights: 4 bytes per parameter.
       - INT8 weights: 1 byte per parameter.
    2. **Calculations:**
       - Bandwidth reduction factor = 4 bytes / 1 byte = 4.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Dynamic range quantization cuts weight memory bandwidth requirements by 4x.**
