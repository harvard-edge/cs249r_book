title: Dynamic Range Quantization for Memory Bandwidth
scenario: A pre-trained FP32 depth-estimation model is too large for the Jetson Orin's
  memory bandwidth.
question: Apply dynamic range quantization to the model and explain which operations
  still run in FP32.
details:
  realistic_solution: Convert all weights to INT8 offline to cut memory bandwidth
    requirements by 4x. At runtime, activations remain in FP32. During matrix multiplication,
    activations are dynamically quantized to INT8, multiplied, and then immediately
    dequantized back to FP32 for sensitive non-linear operations like Softmax.
  common_mistake: Attempting to statically quantize non-linear activations without
    calibration, destroying model accuracy.
  napkin_math: 'Weight memory: FP32(4B) -> INT8(1B)'
