title: PCIe Video Streaming Bottleneck
scenario: A 4K surveillance node uses an A100 PCIe accelerator. A CPU dataloader pushes ten concurrent uncompressed 4K, 60 FPS video streams over a PCIe Gen4 x16 link.
question: Analyze whether the PCIe bidirectional bandwidth becomes a bottleneck for streaming these uncompressed frames to the A100.
details:
  realistic_solution: 'An uncompressed 4K 8-bit RGB frame is roughly 24.88 MB (3840x2160x3 bytes). At 60 frames per second, a single stream demands ~1.49 GB/s. Ten concurrent streams demand 14.9 GB/s. The physical PCIe Gen4 x16 bus provides a theoretical limit of 31.5 GB/s (unidirectional). Because 14.9 GB/s is well under the 31.5 GB/s limit, the PCIe bandwidth is not the bottleneck. Nsight Systems (nsys) profiling would empirically confirm the PCIe headroom.'
  common_mistake: |
    **The Pitfall:** Calculating bits instead of bytes, or failing to verify the total against the PCIe Gen4 x16 threshold.
    **The Rationale:** Candidates incorrectly mix up bit/byte conversions or forget the actual bandwidth limit of the specified PCIe link.
    **The Consequence:** An incorrect bottleneck analysis, leading to misguided optimizations like unnecessary compression or hardware upgrades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Size: 3840 * 2160 * 3 bytes (8-bit RGB)
    - Stream Count: 10 concurrent 60 FPS streams
    - Hardware Link: PCIe Gen4 x16 (31.5 GB/s limit)

    **Calculations:**
    - Frame size = 24,883,200 bytes (~24.88 MB)
    - Single stream bandwidth = 24.88 MB * 60 FPS = 1.49 GB/s
    - Total Bandwidth = 1.49 GB/s * 10 streams = 14.9 GB/s

    **Conclusion & Interpretation:**
    - **Result: Not Bottlenecked.** 14.9 GB/s < 31.5 GB/s, leaving ample PCIe headroom.
