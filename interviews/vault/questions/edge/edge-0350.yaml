title: The Edge Power Budget
scenario: You are designing a federated learning system for a commercial vehicle fleet. To preserve privacy,
  all training happens on the vehicle's edge processor. For the system to be economically viable, the
  total cost of ownership (TCO) is critical, and a major factor is the power draw's impact on the vehicle's
  battery. State the typical power consumption of a specialized, energy-efficient edge AI accelerator
  like a Hailo-8, which would be suitable for running these training updates.
details:
  realistic_solution: The Hailo-8 accelerator consumes about 2.5W. This low power draw is critical for
    TCO in a large fleet, as it minimizes the impact on the vehicle's battery and overall energy consumption.
    Choosing a component with the right power profile is the first step in any viable edge TCO analysis.
  common_mistake: Engineers often confuse the power draw of a full automotive-grade compute module (like
    a Jetson AGX Orin at 15-60W) with that of a small, special-purpose accelerator. They might also mistakenly
    recall a mobile SoC power draw (~5W) or a tinyML MCU's power (~10-50mW). This leads to TCO calculations
    that are off by an order of magnitude.
  napkin_math: At 2.5W, a device running for 2 hours a day uses `2.5W * 2h = 5 Wh` per day. A device incorrectly
    estimated at 30W (like a full system) would use `30W * 2h = 60 Wh` per day. Over a fleet of 10,000
    vehicles for a year, this 12x error becomes a difference of `(60 - 5) * 10,000 * 365 = 200.75 MWh`
    of energy per year, a massive and unacceptable TCO deviation.
  options:
  - 30W
  - 700W
  - 10mW
  - 2.5W
  correct_index: 3
