title: Trace-based optimization of computational graph for Jetson Orin deployment
scenario: You want to deploy a YOLO-v8 nano model on Jetson Orin for real-time object detection at 30fps.
  The PyTorch eager model runs at 45ms per frame (22fps). You need to optimize the computational graph
  for deployment without gradient computation overhead.
question: "How would you optimize the 45 ms PyTorch YOLOv8n model for 30 fps inference on Jetson Orin without gradient overhead?"
details:
  realistic_solution: 'Convert via torch.jit.trace(model.eval(), example_input) — eliminates gradient
    tracking (30% of inference overhead). Export to ONNX and convert with trtexec --fp16 to generate a
    TensorRT engine for Orin''s Ampere GPU. Enable layer fusion and constant folding in TensorRT. Use
    trtexec --workspace=2048 to constrain memory. Expected throughput: 45ms → 15ms (3× speedup from TensorRT
    + FP16 fusion).'
  common_mistake: Deploying the model in training mode with requires_grad=True and without model.eval(),
    causing BatchNorm to track running statistics and Dropout to remain active. Also not fusing the model
    graph, leaving opportunities for constant folding and operator fusion on the table.
  napkin_math: 'YOLO-v8n: 3.2 GFLOPS FP32 per image. Orin GPU at 275 TOPS FP16: 3.2G / (275T/2) = 3.2G
    / 137.5T = 0.023ms compute-bound. Actual latency 45ms = 95% overhead (memory bandwidth, kernel launches,
    Python). TensorRT reduces overhead: 45ms × 0.33 ≈ 15ms. Orin can handle 30fps = 33ms budget comfortably.'
