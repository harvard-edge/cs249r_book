title: Batching on Google Coral Edge TPU
scenario: We are deploying an INT8 object detection model on a Google Coral Edge TPU for a factory inspection line with 4 cameras running at 30 FPS. Alternative A uses Static Batching (fixed size 4). Alternative B uses Dynamic Batching (max 4, 5ms timeout). The model takes 8ms for a batch of 4 on the TPU, and 7ms for a batch of 1 due to PCIe transfer overheads and limited operator support.
question: Should you use static batching or dynamic batching for 4 Coral TPU cameras at 30 FPS to minimize p99 latency, and why?
details:
  realistic_solution: Alternative A (Static Batching) is superior. Since the Edge TPU requires statically sized tensors for compiled INT8 execution, dynamic batching forces host-side zero-padding to size 4 regardless. The minimal 1ms difference between batch 1 and 4 execution highlights that PCIe transfer overheads dominate compute. Waiting for exactly 4 frames maximizes utilization while easily meeting the latency budget.
  common_mistake: |
    **The Pitfall:** Recommending dynamic batching to minimize wait times for early-arriving frames.
    **The Rationale:** Treating the Edge TPU like a standard GPU and failing to realize the compiler requires fixed input tensor shapes, forcing padding anyway.
    **The Consequence:** Wasting CPU cycles on padding, saturating PCIe bandwidth, and missing throughput targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 cameras at 30 FPS = 120 FPS total (1 frame per 8.3ms).
       - Static Batch 4 time: 8ms. Dynamic Batch 1 time (due to timeout): 7ms.
    2. **Calculations:**
       - Static Batch 4 capacity = (1000ms / 8ms) * 4 = 500 FPS.
       - Static Latency = ~33.3ms (wait for 4 frames) + 8ms (compute) = 41.3ms.
       - Dynamic Batch 1 capacity = (1000ms / 7ms) * 1 = 142 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Throughput-Bound. Static batching comfortably handles 120 FPS with 41.3ms latency, whereas dynamic batching wastes PCIe bandwidth.**
