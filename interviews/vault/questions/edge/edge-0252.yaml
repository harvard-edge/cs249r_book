title: 'The Edge Roofline Ridge Point'
scenario: 'Your team is evaluating a Jetson AGX Orin for a real-time perception model in an autonomous vehicle. According to the spec sheet, the Orin delivers 275 TOPS of INT8 performance and has a memory bandwidth of 204.8 GB/s.'
question: 'What is the Jetson AGX Orin''s ridge point in Ops/Byte given 275 TOPS of INT8 performance and 204.8 GB/s memory bandwidth?'
details:
  realistic_solution: 'The ridge point is the threshold of Arithmetic Intensity (AI) that separates memory-bound from compute-bound workloads. It''s calculated by dividing peak compute by peak memory bandwidth. For the Jetson AGX Orin, this is approximately 1,343 Ops/Byte.'
  common_mistake: |
    **The Pitfall:** Ignoring the units (Tera vs. Giga) and simply dividing the numbers.
    **The Rationale:** Leading to an answer that is off by a factor of 1000.
    **The Consequence:** Confusing the roofline's ridge point (Ops/Byte) with power efficiency (TOPS/W).
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 275 TOPS = 275 $\times$ 10^12 Operations/second.
    - Memory Bandwidth: 204.8 GB/s = 204.8 $\times$ 10^9 Bytes/second.

    **Calculations:**
    - Ridge Point = (275 $\times$ 10^12 Ops/s) / (204.8 $\times$ 10^9 Bytes/s).
    - Ridge Point = 275,000 / 204.8.

    **Conclusion & Interpretation:**
    - **Result: ~1,343 Ops/Byte (Compute/Memory-Bound)**. This is the threshold of arithmetic intensity that separates memory-bound from compute-bound workloads.
  options:
  - '~1.3 Ops/Byte'
  - '~18.3 Ops/Byte'
  - '~1343 Ops/Byte'
  - '~0.74 Bytes/Op'
