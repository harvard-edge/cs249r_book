title: 'Model Size Estimation: Master Memory Tradeoff for Precision vs. Context Length on Orin'
scenario: 'You must choose between two precision configurations for a 1B LLM on Jetson Orin (32GB LPDDR5)
  used in a real-time assistant: (A) INT8 weights + FP16 KV-cache, (B) INT4 weights + FP16 KV-cache. Evaluate:
  model memory, maximum context length per user, TPOT, and accuracy implications. Also determine which
  configuration supports 10 concurrent users with 2048-token context.'
details:
  realistic_solution: 'KV cache per token with head_dim=32: 2 × 32 layers × 32 heads × 32 head_dim × 2B
    = 131,072 bytes = 128KB per token (not 262KB which uses head_dim=64).'
  common_mistake: Ignoring that INT4 weights on Jetson Orin's CPU/GPU don't directly speed up inference
    if the hardware dequantizes INT4 to INT8 anyway — the benefit is purely reduced memory, not compute.
  napkin_math: 'KV cache per token (32 layers, 32 KV heads, head_dim=64, BF16 2B): 32 × 2 × 32 × 64 ×
    2B = 262,144 bytes. Wait: 32×2×32×64×2 = 262,144B = 256KB... but Gemini says 128KB. Re-check: 2 ×
    32 × 32 × 64 × 2B = 2 × 32 × 32 × 64 × 2 = 262,144B = 256KB. If head_dim=32: 2×32×32×32×2=131,072B=128KB.
    Fix: head_dim=32 (not 64) gives 128KB per token.'
