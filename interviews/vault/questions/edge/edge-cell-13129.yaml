title: 'Edge TCO Realization: Scale-Up vs Scale-Out for Edge Fleet'
scenario: 'A manufacturing plant needs 500 TOPS INT8 inference capacity. Option A: 2 Jetson Orin (275
  TOPS each = 550 TOPS, $499 each, 60W each). Option B: 20 Hailo-8 (26 TOPS each = 520 TOPS, $200 each,
  2.5W each) with 4 Raspberry Pi 5 hosts. Concretely size both options, calculate 3-year TCO, and analyze
  failure modes.'
details:
  realistic_solution: 'Option A (2 Jetsons): HW: 2*$499=$998. Power: 2*60W*26280hr*$0.10/1000=$315.4.
    Annual maintenance: 2*0.03*$499=$29.9/yr, 3yr=$89.8. Total: $998+$315.4+$89.8=$1,403. SPOF: 1 Jetson
    fails → 50% capacity loss. MTTR: 2-3 days for replacement. Option B (20 Hailo+4 Pi5): HW: 20*$200+4*$80=$4,320.
    Power: 20*2.5*26280*0.1/1000+4*5*26280*0.1/1000=$131.4+$52.56=$183.96. Maintenance: 0.03*$4320*3=$388.8.
    Total: $4,320+$183.96+$388.8=$4,893. Higher hardware cost ($4893 vs $1403) but: 1 Hailo fails → 5%
    capacity loss, MTTR hours (hot swap). Option A is 3.5x cheaper but higher risk.'
  common_mistake: Comparing only hardware acquisition cost without accounting for the management complexity
    and single-point-of-failure risk differences between 2-node vs 20-node deployments.
  napkin_math: 'Option A: $998+$315.4+$89.8=$1,403.2 3yr TCO. Option B: $4320+$183.96+$388.8=$4,892.76
    3yr TCO. Ratio: 4893/1403=3.49x. MTTR: A=2days (Jetson ship) vs B=1hr (Hailo hot swap). Availability:
    A: 2 failures/3yr (3% rate) * 2days = 4 days/yr downtime = 98.9% availability. B: 0.6 failures/3yr
    (3%*20=0.6) * 1hr = 0.6hr/yr downtime = 99.999% availability. SLA: if uptime SLA requires 99.9%: A
    fails (98.9%), B passes (99.999%). Penalty for 99.9% SLA violation: $10K/day. A: 4 days/yr * $10K
    * 3yr = $120K penalty. Option B total including penalties: A=$1403+$120K=$121K vs B=$4893. Option
    B still much cheaper when SLA penalties included!'
