title: Diagnosing High Latency in Jetson Orin Unified Memory
scenario: You are deploying a high-resolution video analytics pipeline on an NVIDIA
  Jetson Orin edge device with 32 GB LPDDR5 shared memory, an Ampere GPU, and a DLA
  accelerator. Profiling shows that despite the GPU efficiently utilizing its 275
  TOPS INT8 compute capacity, end-to-end latency is missing the 30 FPS target (33.3ms
  budget). The execution timeline reveals a massive gap between frame capture and
  GPU execution, accompanied by high CPU utilization during data transfers. What is
  the root cause of this bottleneck on this specific SoC architecture?
question: What is the root cause of this bottleneck on this specific SoC architecture?
details:
  realistic_solution: The root cause is the use of standard pageable CPU memory that
    requires explicit memory copies, incurring significant CPU overhead and serialization
    delays. Because the Jetson Orin features a unified memory architecture, the correct
    approach is to utilize zero-copy memory (pinned memory via cudaHostAlloc) or Unified
    Memory. This allows the Ampere GPU to read the image data directly from the 32
    GB LPDDR5 via DMA, completely bypassing the CPU and eliminating the staging overhead.
  common_mistake: Candidates often assume that standard PCIe transfer bottlenecks
    do not exist on Jetson devices, so they immediately blame the DLA or GPU compute
    performance. They fail to realize that standard malloc() combined with explicit
    cudaMemcpy() still forces the CPU to perform redundant memory staging, completely
    defeating the advantage of the unified 32 GB LPDDR5 architecture.
  napkin_math: For a 4K RGB camera feed (3840 x 2160 x 3 bytes = 24.8 MB per frame),
    a standard CPU-driven memory copy to staging buffers might consume ~4-5 ms. Out
    of a 33.3 ms budget for 30 FPS, ~15% of the frame time is wasted just moving data
    across the exact same physical 32 GB LPDDR5 memory module. By switching to zero-copy
    memory, this 4-5 ms overhead drops to near zero, saving precious time and reserving
    the 60W TDP power budget for the 275 TOPS compute engine.
