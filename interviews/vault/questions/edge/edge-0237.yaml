title: The Federated Fleet's Billion-Dollar Upload Bill
scenario: An automotive company is evaluating the economics of retraining its perception models across
  a fleet of 10,000 vehicles. Strategy A involves uploading the raw 1TB sensor dataset from each vehicle
  for centralized cloud training. Strategy B uses Federated Learning, training on-device and only uploading
  a 100MB model update from each vehicle. From a Total Cost of Ownership (TCO) perspective, what is the
  single largest cost that Federated Learning directly addresses?
details:
  realistic_solution: The correct answer is Data Transmission Cost. The primary economic advantage of
    Federated Learning in a large-scale automotive fleet is the drastic reduction in data volume that
    needs to be transmitted from the vehicle to the cloud. Uploading Petabytes of raw sensor data is prohibitively
    expensive due to cellular data costs and cloud ingress fees, whereas uploading small, aggregated model
    updates is vastly cheaper. This cost differential is the dominant factor in the TCO calculation for
    this use case.
  common_mistake: A common mistake is to focus on the on-device compute cost. Engineers might assume that
    performing training on thousands of less powerful vehicle processors is the main expense to be avoided.
    While edge compute isn't free, the cost of transmitting petabytes of raw sensor data over cellular
    networks is typically orders of magnitude higher and is the primary economic bottleneck that Federated
    Learning is designed to solve.
  napkin_math: 'Let''s compare the total data upload size for a 10,000 vehicle fleet. Strategy A: 10,000
    cars * 1 TB = 10 Petabytes. Strategy B (Federated Learning): assuming a 100 MB model update per car,
    10,000 * 100 MB = 1 Terabyte. Federated Learning saves 9,999 Terabytes of expensive cellular data
    transmission.'
  options:
  - On-device Compute Power
  - Cloud Storage Cost
  - Data Transmission Cost (Cellular/Ingress)
  - Privacy Compliance Overhead
  correct_index: 2
