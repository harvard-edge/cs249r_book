title: Edge Anomaly Detection and the Data Wall on Jetson Orin
scenario: An industrial facility uses NVIDIA Jetson Orin devices (32 GB LPDDR5, 275
  TOPS INT8, 60W) for real-time anomaly detection on high-resolution sensor streams
  (e.g., 1080p video at 30 FPS) at the edge. They fine-tune models on-device using
  locally collected data. Over time, model performance degrades, and resource utilization
  becomes unsustainable due to continuous data ingestion and temporary storage for
  re-training, quickly saturating the Orin's 32 GB LPDDR5. The team suspects they
  are facing a 'data wall problem' and inefficient Information-Compute Ratio (ICR).
  Analyze why these issues occur on such a constrained edge platform and how they
  impact model longevity and operational cost given the Orin's 60W power budget.
question: Why do the data wall and poor ICR arise on the Jetson Orin, and what data
  selection strategy would you use to fix them?
details:
  realistic_solution: A realistic solution involves implementing an intelligent data
    selection strategy focused on the Information-Compute Ratio (ICR). This could
    combine coreset selection techniques (e.g., k-center or diversity-based sampling)
    to pick the most informative data points for fine-tuning, alongside curriculum
    learning principles to introduce complex samples progressively. Data pruning of
    redundant or low-value data immediately after initial processing would be crucial.
    For synthetic data generation, focus on synthesizing hard negatives or under-represented
    anomaly types, carefully monitoring for model collapse risks. The goal is to optimize
    the data stream to utilize the 275 TOPS INT8 compute efficiently, ensuring only
    high-value data contributes to on-device model adaptation without exceeding the
    32 GB LPDDR5 and 60W power limits.
  common_mistake: A common mistake is to attempt storing all incoming raw data for
    future fine-tuning or re-training, assuming that more data is always better. This
    quickly exhausts the limited 32 GB LPDDR5 memory and local storage on the Jetson
    Orin, leading to performance bottlenecks, dropped frames, and increased I/O, which
    drives up power consumption beyond the 60W budget. It also doesn't address the
    fundamental issue of selecting *relevant* data for effective on-device learning.
  napkin_math: Consider a 1080p video stream (1920x1080 pixels) at 30 FPS, 3 bytes/pixel
    (RGB). Raw data rate is ~180 MB/s (1920 * 1080 * 3 * 30 bytes/s). If uncompressed
    data is temporarily stored for even 5 minutes, it requires 5 * 60 * 180 MB = 54
    GB. This immediately exceeds the 32 GB LPDDR5 memory and available local storage
    of the Jetson Orin, highlighting the necessity for immediate data pruning or intelligent
    selection. Even if compressed to H.264 at 5 Mbps, 5 minutes would be (5 Mbits/s
    * 300 s) / 8 bits/byte = 187.5 MB. While manageable for storage, processing and
    re-encoding for training still consumes significant compute and power.
