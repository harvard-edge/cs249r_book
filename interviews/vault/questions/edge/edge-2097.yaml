title: Edge Anomaly Detection and the Data Wall on Jetson Orin
scenario: An industrial facility uses NVIDIA Jetson Orin devices for real-time anomaly detection on high-resolution sensor streams (e.g., 1080p video at 30 FPS) at the edge. They fine-tune models on-device using locally collected data. Over time, model performance degrades, and resource utilization becomes unsustainable due to continuous data ingestion and temporary storage for re-training, quickly saturating the Orin's 32 GB memory. The team suspects they are facing a 'data wall problem' and inefficient Information-Compute Ratio (ICR).
question: Why do the data wall and poor ICR arise on the Jetson Orin, and what data selection strategy would you use to fix them?
details:
  realistic_solution: A realistic solution involves implementing an intelligent data selection strategy focused on the Information-Compute Ratio (ICR). This could combine coreset selection techniques (e.g., k-center or diversity-based sampling) to pick the most informative data points for fine-tuning, alongside curriculum learning principles to introduce complex samples progressively. Data pruning of redundant or low-value data immediately after initial processing would be crucial. For synthetic data generation, focus on synthesizing hard negatives or under-represented anomaly types, carefully monitoring for model collapse risks. The goal is to optimize the data stream to utilize the compute efficiently, ensuring only high-value data contributes to on-device model adaptation without exceeding the memory and power limits.
  common_mistake: |
    **The Pitfall:** Attempting to store all incoming raw data for future fine-tuning or re-training.
    **The Rationale:** Engineers often assume that "more data is always better," bringing cloud-scale big data mindsets to edge devices.
    **The Consequence:** This quickly exhausts memory and storage, leads to dropped frames, increases I/O power consumption, and fails to select relevant data for effective learning.
  napkin_math: |
    1. Raw data rate (1080p, 30 FPS): 1920 * 1080 * 3 bytes * 30 = ~180 MB/s.
    2. Uncompressed storage for 5 minutes: 300 s * 180 MB/s = 54 GB (Exceeds 32 GB RAM).
    3. Compressed data rate (H.264 at 5 Mbps): 5 Mbits/s / 8 = 0.625 MB/s.
    4. Compressed storage for 5 minutes: 300 s * 0.625 MB/s = 187.5 MB.
    5. Conclusion: Even compressed, processing and re-encoding continuously consumes significant compute and power, requiring **immediate data pruning**.
