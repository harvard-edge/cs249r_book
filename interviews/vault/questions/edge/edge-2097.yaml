title: Edge Anomaly Detection and the Data Wall on Jetson Orin
scenario: An industrial facility uses edge devices for real-time anomaly detection on high-resolution sensor streams (e.g., 1080p video at 30 FPS). They fine-tune models on-device using locally collected data. Over time, model performance degrades, and resource utilization becomes unsustainable due to continuous data ingestion and temporary storage for re-training, quickly saturating the device's 32 GB memory. The team suspects they are facing a 'data wall problem' and inefficient Information-Compute Ratio (ICR).
question: Why do the data wall and poor ICR arise, and what data selection strategy would you use to fix them?
details:
  realistic_solution: 'Emulate cloud-scale Information-Compute Ratio strategies strictly tailored for the edge: utilize Top-K Sparsification and Uncertainty Sampling to extract high-entropy subsets directly from the stream. Uncompressed video creates a catastrophic I/O memory spike; dynamic coreset selection and immediate ephemeral data pruning restrict local training strictly to out-of-distribution frames to prevent catastrophic OOMs.'
  common_mistake: |
    **The Pitfall:** Attempting to store all incoming raw data for future fine-tuning or re-training.
    **The Rationale:** Engineers often assume that "more data is always better," bringing cloud-scale big data mindsets to edge devices.
    **The Consequence:** This quickly exhausts memory and storage, leads to dropped frames, increases I/O power consumption, and fails to select relevant data for effective learning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 1080p @ 30 FPS (RGB)
       - RAM: 32 GB
       - H.264 encoding: 5 Mbps
    2. **Calculations:**
       - Uncompressed rate: 1920 * 1080 * 3 bytes * 30 FPS = ~186.6 MB/s
       - Uncompressed 5-min storage: 300 s * 186.6 MB/s ≈ 55.98 GB
       - Compressed rate: 5 Mbps / 8 = 0.625 MB/s
       - Compressed 5-min storage: 300 s * 0.625 MB/s = 187.5 MB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Storage.** Retaining uncompressed data triggers immediate OOMs (>55 GB in 5 mins). Aggressive coreset selection and immediate data pruning are mandatory.
