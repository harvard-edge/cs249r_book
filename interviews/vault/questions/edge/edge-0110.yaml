title: The Bus Priority Trap
scenario: On your SoC, the NPU inference latency fluctuates wildly between 10ms and 45ms, even though
  no other ML models are running. You notice the jitter increases when more cameras are active. Based
  on the SoC architecture diagram, what physical component is causing the NPU to stall?
details:
  realistic_solution: The bottleneck is the **Shared LPDDR5 Memory Bus**. In an SoC, the ISP and NPU share
    the same physical memory controller. ISP writes (from cameras) are typically higher priority to prevent
    frame drops. The NPU's memory fetches for weights and activations get queued behind the ISP's burst
    writes, causing massive latency jitter. The fix is **Temporal Staggering** (sequentializing camera
    triggers) or reducing input precision/resolution to lower the bandwidth footprint.
  common_mistake: '"The NPU is context switching between 4 camera streams." While batching helps, the
    primary issue is resource contention underneath the accelerators.'
  napkin_math: 4x 1080p streams at 60 FPS = 497 million pixels/sec. At 16-bit YUV, that's nearly 1 GB/s
    of continuous, high-priority write traffic saturating the shared bus arbitration logic.
