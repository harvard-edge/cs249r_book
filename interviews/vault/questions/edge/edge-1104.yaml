title: 'Edge Queueing Theory Diagnosis: Jetson Orin Pipeline Latency Spike'
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) autonomous drone shows intermittent 500ms latency spikes on its obstacle detection pipeline (normal P50: 15ms, SLO: 50ms). Average GPU utilization is 35%. The spikes correlate with IMU data logging every 500ms.'
question: 'What root cause explains the 500 ms obstacle-detection spikes despite 35% GPU utilization, and how much latency can the fix remove?'
details:
  realistic_solution: 'Memory bus contention caused by DMA burst writes to eMMC. The OS flushes the IMU data to flash in 32MB bursts. During the eMMC write, the shared LPDDR5 bus stalls the GPU memory requests. Fix: use asynchronous DMA with pinned memory or a separate DMA controller to eliminate the 300ms stall.'
  common_mistake: 'Blaming the GPU because it is running the inference model, leading engineers to waste time optimizing the inference model or TensorRT execution contexts instead of fixing the I/O bottleneck.'
  napkin_math: |
    **Assumptions & Constraints:**
    - IMU logging: 500ms * 1kHz * 24 bytes = 12KB data.
    - SD card write: OS flushes 32MB blocks. eMMC bandwidth = 100MB/s.
    - GPU inference time: 14ms per frame.

    **Calculations:**
    - Burst time: 32MB / 100MB/s = 320ms.
    - Missed frames queued behind DMA: 320ms / 14ms ≈ 22 frames.

    **Conclusion & Interpretation:**
    - **Result: 320ms Stall (I/O-Bound)**. Fixing the DMA contention by logging asynchronously entirely eliminates the 320ms memory bus stall.
