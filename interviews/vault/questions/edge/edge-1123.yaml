title: 'Edge Queueing Theory Specification: P99 SLO for Robotic Arm Control'
scenario: 'Specify a real-time inference system for a robotic arm: control loop at 100Hz (10ms budget per cycle), vision model (object localization, 2 GOPS INT8) must complete in <5ms P99. Design the queueing architecture using Jetson Orin (275 TOPS INT8) or Hailo-8 (26 TOPS INT8). Ensure the system meets hard real-time constraints and specify the scheduling policy.'
question: Should the robotic arm use Jetson Orin or Hailo-8 for the 100Hz vision task, and what scheduling policy guarantees the 5ms deadline?
details:
  realistic_solution: 'For hard real-time (100Hz control): must guarantee WCET, not P99. Queueing theory gives probabilistic bounds, insufficient for robot safety. Correct approach: use Rate Monotonic Scheduling (RMS) on Jetson Orin. Vision task: 2 GOPS / 275 TOPS = 7.3μs WCET (compute). Memory: 4MB weights / 102.4GB/s = 39μs. Real WCET ≈ 100μs (with OS jitter, DMA, cache effects). Period = 10ms. Utilization = 100μs/10ms = 1%. Schedulable. Use CUDA with NVDLA on Jetson for deterministic latency. Specify: dedicated NVDLA core, pinned memory, pre-allocated buffers, no dynamic allocation during runtime.'
  common_mistake: Using probabilistic SLOs (P99) for hard real-time control systems where missing even one deadline can cause physical damage — should use worst-case execution time (WCET) analysis, not queueing theory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Control loop budget: 100Hz (10ms period).
    - Vision model: 2 GOPS INT8, 4MB weights.
    - Hardware: Jetson Orin (275 TOPS, 102.4GB/s).

    **Calculations:**
    - Compute WCET = 2 GOPS / 275 TOPS = 7.3 μs.
    - Memory WCET = 4MB / 102.4 GB/s = 39 μs.
    - OS Jitter = ~100 μs.
    - Total WCET ≈ 150 μs (conservative 200 μs).
    - Utilization = 200 μs / 10ms = 2%.

    **Conclusion & Interpretation:**
    - **Result: 200 μs WCET (Latency-Bound)**. Rate Monotonic Scheduling easily accommodates the 2% utilization, guaranteeing the strict 5ms hard real-time deadline.
