title: 'Model Size Estimation: Realize Minimum Hardware Spec for Multi-Model Hailo Deployment'
scenario: 'Size the minimum host system memory requirement for running 3 models on a Hailo-8 (26 TOPS,
  2.5W) accelerator connected via PCIe to a host CPU. Models: pedestrian detection (8MB HEF), vehicle
  classification (12MB HEF), traffic sign recognition (6MB HEF). The host CPU pre-processes and post-processes;
  Hailo-8 has 32MB on-chip SRAM for weights and activations.'
question: "How much host RAM is needed, do the three HEF models fit in Hailo-8 SRAM, and what is the model-switching time?"
details:
  realistic_solution: 'Hailo-8 on-chip: 32MB SRAM → fits each model (8,12,6 < 32MB) one at a time. Models
    loaded to Hailo via PCIe one at a time. Host system RAM: (1) each HEF file in RAM: 8+12+6=26MB. (2)
    Input frame buffer: 3×640×640×3=3.7MB. (3) Post-processing working memory: 3×10MB=30MB. (4) OS + PCIe
    driver: 512MB. Total host RAM: 512+26+3.7+30=571.7MB. Minimum: 1GB RAM host. Model switching: load
    12MB HEF via PCIe (5GB/s): 12MB/5GB/s=2.4ms switching time.'
  common_mistake: Assuming Hailo-8's on-chip 32MB SRAM can hold all 3 models simultaneously; the SRAM
    holds the current model's weights and activations for the running inference, not all models.
  napkin_math: 'HEF files: 26MB. Input frames: 3×1.2MB=3.7MB. Post-processing: 30MB. OS/drivers: 512MB.
    Total: 572MB. Min host RAM: 1GB. Hailo-8 SRAM: 32MB > 12MB (largest model) ✓. Model switching via
    PCIe: 12MB/5GB/s=2.4ms. At 30fps (33ms/frame): 2.4ms switching = 7.3% overhead if switching every
    frame. Better: dedicate Hailo to 1 model per deployment.'
