title: Recovering INT8 Activation Clipping
scenario: An object detection model was quantized to INT8 for a Hailo-8 (26 TOPS).
  The mAP plummeted by 15%, particularly on low-contrast objects.
question: Design a mixed-precision diagnostic strategy to restore mAP without falling
  below the 20 TOPS throughput requirement.
details:
  realistic_solution: The mAP drop on low-contrast objects implies sensitive gradients
    are destroyed by severe activation clipping. I would compute the layer-wise Signal-to-Quantization-Noise
    Ratio (SQNR) and isolate outlier layers. By leaving the initial feature extraction
    and final detection heads in FP16, and keeping the dense intermediate layers in
    INT8, the network retains sensitivity while maintaining high MAC throughput.
  common_mistake: Switching the entire model back to FP16, which would immediately
    violate the 20 TOPS throughput requirement on an accelerator optimized for INT8.
  napkin_math: INT8 throughput > 20 TOPS.
