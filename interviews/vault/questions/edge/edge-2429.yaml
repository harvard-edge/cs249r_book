title: Recovering INT8 Activation Clipping
scenario: An object detection model was quantized to INT8 for a Hailo-8. The mAP plummeted by 15%, particularly on low-contrast objects.
question: Design a mixed-precision diagnostic strategy to restore mAP without falling below the 20 TOPS throughput requirement.
details:
  realistic_solution: The mAP drop on low-contrast objects implies sensitive gradients are destroyed by severe activation clipping. I would compute the layer-wise Signal-to-Quantization-Noise Ratio (SQNR) and isolate outlier layers. By leaving the initial feature extraction and final detection heads in FP16, and keeping the dense intermediate layers in INT8, the network retains sensitivity while maintaining high MAC throughput.
  common_mistake: |
    **The Pitfall:** Switching the entire model back to FP16.
    **The Rationale:** Candidates take the easiest path to restore accuracy without calculating the performance cost of reverting fully to floating point.
    **The Consequence:** Immediately violates the 20 TOPS throughput requirement on an accelerator explicitly optimized for INT8.
  napkin_math: |
    1. Assumptions & Constraints:
       - Baseline throughput: 26 TOPS (INT8)
       - Target minimum throughput: 20 TOPS
    2. Calculations:
       - Restoring sensitive layers (initial/final) to FP16 reduces throughput slightly but preserves dense MAC execution for the bulk of the model.
    3. Conclusion & Interpretation:
       - **Result: Precision-Bound. Isolating initial/final layers to FP16 while keeping dense intermediate layers in INT8 guarantees precision recovery while staying >20 TOPS throughput.**
