title: The Perception Pipeline Fusion Fallacy
scenario: 'Your autonomous vehicle perception team is working to hit a strict 33ms
  per-frame deadline on a power-budgeted Jetson AGX Orin platform (60W). Currently,
  the pipeline runs two separate INT8-quantized models sequentially: a 5 TFLOP object
  detector and an 8 TFLOP segmentation model, taking a combined 47ms. A teammate proposes
  fusing these into a single, multi-headed model. The fused model has a shared backbone,
  reducing the total compute to 11 TFLOPs. They argue this will save ~15% of FLOPs
  and should easily get you under the 33ms deadline.'
question: Under what conditions could this optimization paradoxically increase end-to-end
  latency and cause you to miss the deadline even more severely?
details:
  realistic_solution: The proposal is extremely risky because it fundamentally changes
    the problem's Arithmetic Intensity (AI). While the sequential models are small
    enough to be compute-bound, the fused model's large, combined activation memory
    footprint can push it over the edge into being memory-bound.
  common_mistake: '**The Pitfall:** Focusing exclusively on FLOP reduction.

    **The Rationale:** Engineers assume that a reduction in total operations automatically
    translates to lower latency, arguing ''11 TFLOPs is faster than 13 TFLOPs''.

    **The Consequence:** This completely ignores the memory subsystem, which is often
    the real bottleneck. Memory stalling leads to massive latency regressions despite
    lower raw compute operations.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Sequential models: 13 TFLOPs\
    \ (approx 26 TOPS INT8).\n   - Fused model FLOPs reduced to 11 TFLOPs.\n   - Jetson\
    \ AGX Orin memory bandwidth = 204.8 GB/s.\n   - Fusion creates a 300MB intermediate\
    \ tensor requiring simultaneous read/write.\n2. **Calculations:**\n   - Intermediate\
    \ tensor traffic = 300MB read + 300MB write = 600MB.\n   - Transfer time = 600MB\
    \ / 204.8 GB/s = 2.93ms.\n   - Arithmetic Intensity drops down to 400 Ops/Byte.\n\
    3. **Conclusion & Interpretation:**\n   - **Result: Memory-Bound**. The fused\
    \ model creates massive intermediate activation traffic, dropping the arithmetic\
    \ intensity below the ridge point and increasing end-to-end latency despite lower\
    \ FLOPs.\n"
