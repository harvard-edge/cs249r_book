title: The Perception Pipeline Fusion Fallacy
scenario: Your autonomous vehicle perception team is working to hit a strict 33ms per-frame deadline on a power-budgeted Jetson AGX Orin platform (60W). Currently, the pipeline runs two separate INT8-quantized models sequentially: a 5 TFLOP object detector and an 8 TFLOP segmentation model, taking a combined 47ms. A teammate proposes fusing these into a single, multi-headed model. The fused model has a shared backbone, reducing the total compute to 11 TFLOPs. They argue this will save ~15% of FLOPs and should easily get you under the 33ms deadline.
question: Under what conditions could this optimization paradoxically increase end-to-end latency and cause you to miss the deadline even more severely?
details:
  realistic_solution: The proposal is extremely risky because it fundamentally changes the problem's Arithmetic Intensity (AI). While the sequential models are small enough to be compute-bound, the fused model's large, combined activation memory footprint can push it over the edge into being memory-bound.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on FLOP reduction.
    **The Rationale:** Engineers assume that a reduction in total operations automatically translates to lower latency, arguing '11 TFLOPs is faster than 13 TFLOPs'.
    **The Consequence:** This completely ignores the memory subsystem, which is often the real bottleneck. Memory stalling leads to massive latency regressions despite lower raw compute operations.
  napkin_math: |
    1. **Compute Conversion**: Assuming 13 TFLOPs translates to ~26 TOPS (INT8 due to 2x MAC quantization density).
    2. **Orin Bandwidth**: Memory bandwidth = 204.8 GB/s.
    3. **Fusion Penalty**: Fusing creates a massive 300MB intermediate tensor that must be read/written simultaneously (600MB traffic).
    4. **Result**: Time = 600MB / 204.8 GB/s = **2.9ms** just for this bottleneck, shifting AI down to 400 Ops/Byte and causing severe memory stalling that breaks the deadline.
