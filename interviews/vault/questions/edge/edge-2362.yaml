title: KV Cache Pre-allocation Memory Waste
scenario: A 7B parameter LLM running locally on a Jetson AGX Orin with 32GB RAM uses
  standard static KV cache allocation, frequently crashing with out-of-memory errors
  for concurrent queries.
question: Explain why pre-allocating the maximum possible sequence length for every
  request leads to severe memory exhaustion.
visual:
  kind: svg
  path: edge-2362.svg
  alt: Bar chart comparing high memory allocation for Static Max against low usage
    for dynamic paging.
  caption: 'KV Cache Allocation Efficiency: Static vs Paged.'
details:
  realistic_solution: Static KV cache allocation reserves memory assuming every prompt
    will reach the maximum model context length. Since real-world requests have highly
    variable and often short lengths, the vast majority of this reserved memory is
    left empty. This massive internal fragmentation artificially starves the system
    of usable RAM, preventing concurrent request processing.
  common_mistake: Assuming the OOM is due to model weights being too large rather
    than recognizing the dynamic scaling nature of KV cache tensors.
  napkin_math: Max seq = 4096. Actual seq = 128. Waste = (4096 - 128) / 4096 = 96.8%
    memory wasted.
