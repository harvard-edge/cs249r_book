title: KV Cache Pre-allocation Memory Waste
scenario: 'A Llama-2-7B model running locally on a Jetson AGX Orin with 32GB unified memory uses standard static KV cache allocation. Model architecture: 32 layers, 32 KV heads, head_dim=128, FP16, max context 4096 tokens. Weights occupy ~13.5 GB, leaving ~18 GB for KV cache and activations. The system frequently OOMs at 8+ concurrent queries.'
question: What is the maximum batch size before OOM under static max-length allocation versus dynamic paged allocation?
visual:
  kind: svg
  path: edge-2362.svg
  alt: Bar chart comparing high memory allocation for Static Max against low usage for dynamic paging.
  caption: 'KV Cache Allocation Efficiency: Static vs Paged.'
details:
  realistic_solution: 'With 18 GB available for KV after weights, static max-length allows ~9 concurrent sessions. But if actual length averages 256 tokens, 96% of that 2 GB sits empty per session. Dynamic PagedAttention lets each session use only its actual length. Paged allocation supports ~144 concurrent short sessions before OOM.'
  common_mistake: Blaming the OOM on model weight footprint and missing that KV cache grows linearly with both sessions and per-session max-length allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 18 GB available for KV cache
    - KV per token = 2 * 32 * 32 * 128 * 2 bytes = 512 KB
    - Max context = 4096 tokens, Average = 256 tokens

    **Calculations:**
    - Static allocation per session = 512 KB * 4096 = 2 GB
    - Static sessions = 18 GB / 2 GB = 9 sessions
    - Paged allocation per session = 512 KB * 256 = 0.125 GB
    - Paged sessions = 18 GB / 0.125 GB = 144 sessions

    **Conclusion & Interpretation:**
    - **Result: 144 Sessions (Memory-Capacity-Bound)**. PagedAttention eliminates internal fragmentation, yielding a 16x concurrency improvement.
