title: KV Cache Pre-allocation Memory Waste
scenario: 'A Llama-2-7B model running locally on a Jetson AGX Orin with 32GB unified
  memory uses standard static KV cache allocation. Model architecture: 32 layers,
  32 KV heads, head_dim=128, FP16, max context 4096 tokens. Weights occupy ~13.5 GB,
  leaving ~18 GB for KV cache and activations. The system frequently OOMs at 8+ concurrent
  queries.'
question: Explain why static KV pre-allocation OOMs on this Orin configuration, and
  compute the exact maximum batch size before OOM (a) under static max-length allocation
  and (b) under dynamic paged allocation, given the unified-memory budget.
visual:
  kind: svg
  path: edge-2362.svg
  alt: Bar chart comparing high memory allocation for Static Max against low usage
    for dynamic paging.
  caption: 'KV Cache Allocation Efficiency: Static vs Paged.'
details:
  realistic_solution: 'KV per token: 2 * 32 * 32 * 128 * 2B = 512 KB. Per-session
    max-context allocation: 512 KB * 4096 = 2 GB per session. With 18 GB available
    for KV after weights, static max-length allows ~9 concurrent sessions. But if
    actual length averages 256 tokens (real-world chat), 96% of that 2 GB sits empty
    per session. Dynamic paged allocation (16-token blocks) lets each session use
    only its actual length: 9 sessions * 0.125 GB = 1.1 GB used, freeing ~17 GB. Paged
    allocation supports ~144 concurrent short sessions before OOM, a 16x improvement.'
  common_mistake: Blaming the OOM on model weight footprint and missing that KV cache
    grows linearly with both sessions and per-session length.
  napkin_math: 'Static: 18 GB / 2 GB = 9 sessions. Paged at 256-token avg: 18 GB /
    0.125 GB = 144 sessions. 16x improvement.'
