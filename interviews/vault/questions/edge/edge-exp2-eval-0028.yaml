title: Evaluating Mixed-Precision Inference on Qualcomm AI 100
scenario: 'You are deploying an 8-billion parameter LLM for on-premise inference on a Qualcomm Cloud AI
  100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). You are evaluating two deployment strategies to
  minimize latency for single-batch generation: Alternative A uses a uniform FP16 precision for both weights
  and activations. Alternative B uses a mixed-precision approach with INT8 weights and FP16 activations.
  Which approach is better suited for this specific hardware, and what bottlenecks dictate this decision?'
question: "Which approach is better suited for this specific hardware, and what bottlenecks dictate this decision?"
details:
  realistic_solution: Alternative B (mixed-precision with INT8 weights and FP16 activations) is significantly
    better. On platforms like the AI 100 using LPDDR4x, memory bandwidth is the primary bottleneck for
    text generation, not the 400 TOPS compute engine. By quantizing weights to INT8, you cut the memory
    read footprint in half, directly halving the memory-bound latency. The activations can remain in FP16
    to preserve model accuracy and avoid dynamic quantization overhead, while easily fitting the KV cache
    within the remaining 32 GB capacity.
  common_mistake: Candidates often assume that because the accelerator has a massive 400 TOPS INT8 compute
    capacity, the primary goal should be to map all operations to INT8 math to reduce compute time. They
    fail to recognize that autoregressive generation at batch size 1 is fundamentally memory-bandwidth
    bound, not compute-bound.
  napkin_math: 'An 8B parameter model requires ~16 Giga-Operations (GOPs) per token forward pass. Compute
    time at 400 TOPS INT8 is negligible: 16 GOPs / 400 TOPS = 0.04 ms. However, loading weights dominates
    latency. Assuming a typical LPDDR4x bandwidth of ~100 GB/s: Alternative A (FP16 weights) requires
    reading 16 GB of data, taking 16 GB / 100 GB/s = 160 ms per token. Alternative B (INT8 weights) requires
    reading 8 GB of data, taking 8 GB / 100 GB/s = 80 ms per token. Additionally, INT8 weights reduce
    the memory footprint from 16 GB to 8 GB, leaving a comfortable 24 GB of the 32 GB total LPDDR4x available
    for the FP16 KV cache.'
