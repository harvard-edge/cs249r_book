title: The Pipeline Overlap
scenario: Your edge perception system runs three stages sequentially: camera preprocessing (8ms), neural network inference (20ms), and post-processing/NMS (5ms) — totaling 33ms for a single frame. You need to hit 30 FPS.
question: Without changing any model or buying new hardware, how do you cut the per-frame latency?
details:
  realistic_solution: Pipeline the stages across frames. While the neural network processes frame N, the camera preprocessor ingests frame N+1, and post-processing finalizes frame N-1. In a 3-stage pipeline, the throughput is limited by the slowest stage (20ms), not the sum (33ms). This gives you 1 frame every 20ms = 50 FPS. The individual frame latency remains 33ms, but the throughput meets the deadline.
  common_mistake: |
    **The Pitfall:** Attempting to optimize the neural network to run faster.
    **The Rationale:** Candidates instinctively try to optimize the model itself rather than rethinking the system architecture.
    **The Consequence:** Wasted effort on model compression when a simple software pipelining architecture solves the throughput requirement.
  napkin_math: |
    - Sequential execution: 8 + 20 + 5 = 33ms/frame = 30.3 FPS (No margin).
    - Pipelined bottleneck: max(8, 20, 5) = 20ms/frame.
    - Pipelined throughput: 1000ms / 20ms = **50 FPS**.
    - Throughput margin: 50 / 30 = **67% headroom**.
