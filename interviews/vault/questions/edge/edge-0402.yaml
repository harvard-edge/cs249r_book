title: The TOPS Illusion
scenario: Your team is evaluating edge accelerators for a robotics perception stack. The Hailo-8 datasheet
  says 26 TOPS. The Jetson Orin datasheet says 275 TOPS. Your product manager says 'just buy the Orin
  — it's 10x faster.' What critical distinction is the PM missing?
question: "What critical distinction is the PM missing?"
details:
  realistic_solution: The PM is comparing raw TOPS but ignoring TOPS per Watt — the metric that determines
    what you can actually *sustain* inside a thermal envelope. The Hailo-8 delivers 26 TOPS at 2.5W =
    **10.4 TOPS/W**. The Jetson Orin delivers 275 TOPS at 60W = **4.6 TOPS/W**. If your robot's power
    budget is 10W for the AI module, the Hailo-8 can sustain ~100% of its peak, while the Orin must be
    power-capped to ~46 TOPS — less than 2x the Hailo, not 10x. At the edge, the correct comparison is
    always TOPS/W × available power budget.
  common_mistake: '"TOPS is TOPS — more is faster." This treats peak throughput as the only metric, ignoring
    the constraint that actually matters at the edge.'
  napkin_math: 'Hailo-8: 26 TOPS / 2.5W = 10.4 TOPS/W. Orin: 275 TOPS / 60W = 4.6 TOPS/W. At a 10W budget:
    Hailo delivers ~26 TOPS, Orin delivers ~46 TOPS. The "10x advantage" shrinks to 1.8x.'
