validation_issues:
- The Napkin Math states 'A 4K token KV-cache (d_model=1024, 16 layers, INT8) is 4096 * 1024 * 16 * 2
  * 1 byte = 134 MB' which implies 2 bytes for K and V combined (1 byte each), but for INT8, each would
  be 1 byte, so it should be 4096 * 1024 * 16 * 2 * 1 byte. This is correct as stated but the '(d_model=1024,
  16 layers, INT8)' is specific to a model not fully described in the scenario. The '2' factor for K/V
  should be explicit if 1 byte/value is assumed.
- The calculation 'Streaming 134 MB from host memory over PCIe Gen3x4 (~3.9 GB/s) takes 134 / 3900 = 34.3
  ms per token' uses 3.9 GB/s for PCIe, which is a plausible practical bandwidth but should be stated
  as an assumption rather than a given fact.
- The sentence 'utilizing less than 0.3% of the compute capacity. By bounding the context window to 512
  tokens and using IN' cuts off.
