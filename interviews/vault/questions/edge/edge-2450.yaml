title: Orin Roofline Analysis
scenario: A linear layer in a transformer processes a token with vector size 4096 to an output vector of 4096 using the Jetson AGX Orin (275 TOPS, 204.8 GB/s memory bandwidth).
question: Evaluate the arithmetic intensity of this layer for a batch size of 1 and determine if it hits the compute bound or the memory bound.
details:
  realistic_solution: The weight matrix is 4096 x 4096 in INT8 = 16.7 MB. The operations are roughly 2 * 4096 * 4096 = 33.5 Mega-Operations. Arithmetic intensity = 33.5 MOPs / 16.7 MB = ~2 OPs/byte. The hardware's ridge point is 275 TOPS / 204.8 GB/s = 1342 OPs/byte. Because 2 << 1342, evaluating the roofline shows this layer is massively memory bound. Most of the 275 TOPS will sit idle waiting for weights.
  common_mistake: |
    **The Pitfall:** Calculating total FLOPs and dividing by TOPS to predict latency.
    **The Rationale:** Candidates completely ignore the memory wall at batch size 1 and assume the processor can achieve its peak TOPS throughput.
    **The Consequence:** Predicted latency is off by orders of magnitude because the 275 TOPS compute engine spends almost all of its time sitting idle waiting for weights from memory.
  napkin_math: |
    1. Calculate weight matrix size (INT8): 4096 * 4096 * 1 byte = 16.7 MB.
    2. Calculate operations per token (batch 1): 2 * 4096 * 4096 = 33.5 Mega-Operations (MOPs).
    3. Calculate Arithmetic Intensity (AI): 33.5 MOPs / 16.7 MB = ~2 OPs/byte.
    4. Calculate Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1342 OPs/byte.
    5. Compare: AI (2) << Ridge Point (1342).
    **With an arithmetic intensity of 2 OPs/byte compared to the Orin's 1342 OPs/byte ridge point, this layer is massively memory-bound at batch size 1.**
