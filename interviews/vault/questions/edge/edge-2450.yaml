title: Orin Roofline Analysis
scenario: A linear layer in a transformer processes a token with vector size 4096
  to an output vector of 4096 using the Jetson AGX Orin (275 TOPS, 204.8 GB/s memory
  bandwidth).
question: Evaluate the arithmetic intensity of this layer for a batch size of 1 and
  determine if it hits the compute bound or the memory bound.
details:
  realistic_solution: The weight matrix is 4096 x 4096 in INT8 = 16.7 MB. The operations
    are roughly 2 * 4096 * 4096 = 33.5 Mega-Operations. Arithmetic intensity = 33.5
    MOPs / 16.7 MB = ~2 OPs/byte. The hardware's ridge point is 275 TOPS / 204.8 GB/s
    = 1342 OPs/byte. Because 2 << 1342, evaluating the roofline shows this layer is
    massively memory bound. Most of the 275 TOPS will sit idle waiting for weights.
  common_mistake: Calculating the total FLOPs and dividing by TOPS, concluding it
    takes fractions of a millisecond, completely ignoring the memory wall at batch=1.
  napkin_math: 275000 / 204.8 = 1342 hardware intensity.
