title: Optimizing Cold Start with Memory-Mapped Inference on Coral TPU
scenario: An object detection model is deployed on a fleet of devices equipped with the Google Coral Edge TPU via USB. Multiple concurrent processes attempt to sequentially load the 20MB INT8 model weights into memory before offloading to the TPU, causing significant cold start latency bottlenecks.
question: How would memory-mapped loading reduce cold-start latency when multiple processes load the same 20MB Coral Edge TPU model?
details:
  realistic_solution: Implement memory-mapped (mmap) weight loading to share a single read-only copy of the 20MB INT8 model weights across all processes in host RAM. This avoids memory duplication and eliminates the file I/O bottleneck.
  common_mistake: |
    **The Pitfall:** Using standard file I/O or copying weights per process.
    **The Rationale:** Candidates often suggest loading the weights into memory once per process or caching the model on the TPU, forgetting that the host CPU still needs to manage memory.
    **The Consequence:** Redundant memory duplication wastes RAM and creates massive I/O bottlenecks that inflate cold-start latency.
  napkin_math: |
    1. **Assumptions & Constraints:** 5 concurrent processes. 20MB INT8 weights. Standard I/O page-in time $\approx$ 50ms per load.
    2. **Calculations:** Without mmap: 5 * 20MB = 100MB RAM. I/O latency = 5 * 50ms = 250ms. With mmap: 1 shared copy = 20MB RAM. I/O latency = 50ms.
    3. **Conclusion & Interpretation:** **Memory-mapped loading saves 80MB of RAM and eliminates 200ms of I/O-Bound latency.**
