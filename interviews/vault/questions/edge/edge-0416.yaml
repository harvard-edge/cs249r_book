title: The Robot's Split Brain
scenario: 'You are the lead systems engineer for an autonomous warehouse robot. The robot uses two co-located
  Jetson AGX Orin modules in the same chassis: Module A runs a stereo vision model, and Module B runs
  path planning. Module A generates a 256 MB feature map that must be transferred to Module B for every
  frame. To maintain real-time performance, the total perception-to-action latency must be under 33ms.
  You diagnose the system and find the cross-module transfer is the primary bottleneck. Your team proposes
  several interconnects to link the two modules. Which of the following solutions will solve the latency
  problem, and why?'
question: "Which of the following solutions will solve the latency problem, and why?"
details:
  realistic_solution: The only feasible option is connecting the two AGX Orin modules via a high-speed
    PCIe switch. The Jetson AGX Orin platform supports PCIe Gen 4, which provides sufficient bandwidth
    to transfer the 256 MB feature map within the tight real-time budget. Standard Ethernet is far too
    slow, and while RDMA reduces CPU overhead, it cannot fix a fundamental bandwidth limitation. NVLink
    is a datacenter technology and is not available on the Jetson AGX Orin.
  common_mistake: Engineers often misapply datacenter interconnect knowledge to edge platforms, assuming
    technologies like NVLink or InfiniBand are options. A second common mistake is focusing purely on
    protocol latency (e.g., benefits of RDMA) while ignoring the much larger bottleneck of raw network
    bandwidth, especially when dealing with large, high-frequency data transfers like video feature maps.
  napkin_math: 'Requirement: Transfer 256 MB within a fraction of the 33ms budget. Let''s target < 20ms for the transfer. PCIe Gen 4 x8 provides ~16 GB/s (16,000 MB/s). Transfer time = 256 MB / 16,000 MB/s = 0.016 seconds = 16 ms. This meets the < 20ms target. 10GbE provides ~1.25 GB/s (1,250 MB/s). Transfer time = 256 / 1,250 = 205 ms, which completely blows the 33 ms budget.'
  options:
  - Use a 10GbE connection with RDMA to minimize latency.
  - Bridge the two modules with an NVLink connector.
  - Connect the modules via a PCIe Gen 4 switch.
  - Use a standard 10GbE connection between the modules.
  correct_index: 2
