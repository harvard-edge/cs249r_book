title: The Robot's Split Brain
scenario: Two Jetson AGX Orin modules in a robot chassis must share a 256 MB feature map every frame. The total perception-to-action latency must stay under 33ms.
question: Which interconnect solution will solve the latency problem for the 256 MB transfer, and why?
details:
  realistic_solution: Connect the two AGX Orin modules via a high-speed PCIe Gen 4 switch. Jetson AGX Orin supports PCIe Gen 4, providing sufficient raw bandwidth (~16 GB/s) to transfer the massive 256 MB tensor within the tight budget. Standard 10GbE is too slow, and RDMA over Ethernet cannot overcome the physical line-rate limit. NVLink is exclusively a datacenter/workstation technology and is physically incompatible with Orin edge modules.
  common_mistake: |
    **The Pitfall:** Selecting NVLink or RDMA over 10GbE.
    **The Rationale:** Misapplying datacenter hardware knowledge (NVLink) to edge form factors, or believing RDMA reduces protocol overhead enough to overcome physical bandwidth limits.
    **The Consequence:** Specifying unbuildable hardware configurations or failing latency deadlines by over a hundred milliseconds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 256 MB per frame. Deadline: 33 ms.
       - PCIe Gen 4 x8 Bandwidth: ~16 GB/s (16,000 MB/s).
       - 10GbE Bandwidth: ~1.25 GB/s (1,250 MB/s).
    2. **Calculations:**
       - PCIe Gen 4 Transfer: 256 MB / 16,000 MB/s = 16 ms.
       - 10GbE Transfer: 256 MB / 1,250 MB/s = 205 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound. 10GbE takes 205ms (failing the 33ms budget), while PCIe Gen 4 takes 16ms.**
  options:
  - Use a 10GbE connection with RDMA to minimize latency.
  - Bridge the two modules with an NVLink connector.
  - Connect the modules via a PCIe Gen 4 switch.
  - Use a standard 10GbE connection between the modules.
