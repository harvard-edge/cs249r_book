title: Hailo-8 Host Streaming Bandwidth and Throughput
scenario: You are designing a real-time edge ingestion pipeline for a smart factory using a single Hailo-8
  dataflow accelerator. The Hailo-8 provides 26 TOPS INT8 performance at 2.5W but has no local DRAM, meaning
  input data must continuously stream from host memory. Your INT8 inspection model requires 65 GOPS per
  frame, and each preprocessed input tensor is 5 Megabytes. Calculate the theoretical maximum frame rate
  the accelerator can support and the minimum sustained host memory bandwidth required to prevent stalling.
question: "For a 65 GOPS/frame Hailo-8 model with 5 MB inputs, what max FPS and sustained host bandwidth are needed to avoid stalls?"
details:
  realistic_solution: First, determine the maximum frames per second by dividing the total compute capacity
    by the per-frame compute requirement. Then, multiply this maximum FPS by the size of the input tensor
    to find the required host-to-accelerator streaming bandwidth. In a real deployment, you would also
    verify your host memory subsystem can support this DMA transfer rate.
  common_mistake: Candidates often confuse TOPS (Tera) with GOPS (Giga) causing a 1000x arithmetic error,
    or they forget that 'no local DRAM' means the host must be capable of sustaining the calculated full
    raw tensor bandwidth continuously over its interface.
  napkin_math: Compute Capacity = 26 TOPS = 26,000 GOPS. Theoretical Max FPS = 26,000 GOPS / 65 GOPS/frame
    = 400 FPS. Required Streaming Bandwidth = 400 frames/sec * 5 MB/frame = 2,000 MB/s (2 GB/s). Power
    efficiency = 26 TOPS / 2.5W = 10.4 TOPS/W.
