title: 'Coral Edge TPU Disease Detection: Active Learning for Rare Disease Data Curation'
scenario: Your team is developing an agricultural drone equipped with a camera to detect early signs of a rare plant disease. The drone uses a custom object detection model running on a Google Coral Edge TPU, which provides 4 TOPS of INT8 performance and operates at 2W, strictly limited to INT8 inference. The current model struggles with the rare disease due to extreme class imbalance in your initial dataset. To significantly improve performance for this rare disease, you propose an active learning strategy for dataset curation.
question: How would you design and quantify an active learning loop to improve rare plant disease detection on a Coral Edge TPU under INT8 and annotation-budget constraints?
details:
  realistic_solution: Implement an active learning strategy combining uncertainty sampling (e.g., based on model entropy or confidence margin for the rare class) with diversity sampling (e.g., using k-means clustering or core-set selection on feature embeddings) to prioritize informative and representative rare disease examples. Establish a multi-stage annotation workflow with robust inter-annotator agreement checks, especially for ambiguous rare disease cases. Regularly monitor model performance on a diverse validation set, specifically tracking INT8 quantization compatibility and fine-tuning annotation guidelines based on model feedback and quantization results to mitigate bias.
  common_mistake: |
    **The Pitfall:** Proposing simple random sampling or only uncertainty-based sampling without considering diversity.
    **The Rationale:** Candidates neglect the INT8 constraint during dataset design or assume models will quantize efficiently without specific data curation strategies.
    **The Consequence:** This leads to redundant annotations and wasted budget, producing models that still fail to quantize efficiently.
  napkin_math: |
    - Initial dataset: 10,000 images, 100 positive.
    - Target: 5x increase = 500 new positive examples.
    - Annotation cost: 30 seconds and $0.50 per ambiguous image.
    - Iteration yield: 1,000 ambiguous images identify 500 new positives.
    - Total estimated annotation cost: 1,000 images * $0.50 = **$500**.
    - Total time: 1,000 images * 30 seconds = 30,000 seconds = **~8.3 hours**.
