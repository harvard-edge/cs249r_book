title: Dataflow Accelerator CNN Architecture Evaluation
scenario: You are evaluating two CNN architectures for real-time video analytics on a Hailo-8 dataflow
  accelerator (26 TOPS INT8, 2.5W). Architecture A uses MobileNetV2-style inverted residuals with depthwise
  separable convolutions to minimize FLOPs. Architecture B uses standard grouped convolutions, resulting
  in 40% more theoretical FLOPs but different memory access patterns. Since the Hailo-8 has no local DRAM
  and relies on streaming from host memory, which architecture do you choose and how do you evaluate their
  actual on-device performance?
details:
  realistic_solution: Architecture B is superior for this specific target. The Hailo-8 is a dataflow accelerator
    that must stream weights and activations from host memory. Depthwise convolutions are heavily memory-bound
    due to low data reuse. By switching to grouped or standard convolutions, the arithmetic intensity
    increases, allowing the 26 TOPS compute engine to achieve much higher utilization, ultimately resulting
    in lower latency despite the higher FLOP count.
  common_mistake: Candidates often assume that lower theoretical FLOPs (Architecture A) automatically
    guarantees lower latency and lower power. They fail to recognize that depthwise convolutions have
    extremely low arithmetic intensity, which exposes the host memory bandwidth bottleneck on accelerators
    without local DRAM.
  napkin_math: 'Hailo-8 peak: 26 TOPS. Assume host PCIe bandwidth of 4 GB/s. For a 3x3 depthwise layer
    (256 channels, 56x56): Compute is ~14.4 MOPS. Memory transfer (input+output+weights) is ~1.6 MB. Arithmetic
    intensity = 14.4 MOPS / 1.6 MB = 9 ops/byte. Memory-bound throughput limit = 4 GB/s * 9 ops/byte =
    36 GOPS (only 0.14% of 26 TOPS). For a comparable grouped convolution with higher channel mixing,
    intensity might reach 500 ops/byte, yielding a throughput limit of 2 TOPS (55x faster execution) despite
    higher total operations.'
