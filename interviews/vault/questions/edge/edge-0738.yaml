title: The Automotive OTA Update
scenario: You are an ML Systems Engineer on the autonomous vehicle team. A critical bug requires you to
  roll out a new perception model to the entire fleet. The full update package, including the model, dependencies,
  and container image, is 2 GB. For a single vehicle connected to a stable cellular network with an average
  download speed of 40 Mbps, explain how long the download portion of the update will take.
details:
  realistic_solution: The correct way to solve this is to first make the units consistent (convert the
    file size from gigabytes to megabits) and then divide by the network speed.
  common_mistake: The most common mistake is confusing bits with Bytes. Network speeds are almost always
    advertised in megabits per second (Mbps), while file sizes are measured in megabytes (MB) or gigabytes
    (GB). Engineers often forget to multiply the file size in Bytes by 8 to get the size in bits, leading
    to an answer that is 8x too fast.
  napkin_math: 'File = 2GB = 2*1024MB = 2048MB. Convert to megabits: 2048*8 = 16,384 Mb. Speed = 40 Mbps.
    Time = 16384/40 = 409.6 seconds = ~6.8 minutes. So at 40Mbps sustained, the 2GB OTA download takes
    approximately 6 minutes 50 seconds per vehicle.'
  options:
  - ~51 seconds
  - ~16 seconds
  - ~6.8 minutes
  - ~2.7 minutes
  correct_index: 2
