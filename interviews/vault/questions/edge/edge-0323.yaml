title: The Thermal Budget Trap
scenario: You are part of the hardware team for an autonomous vehicle company. Your compute module, which
  is located in the trunk, has a strict power budget of 30W to avoid overheating. You are evaluating a
  new accelerator, the NVIDIA Jetson AGX Orin, which advertises a peak performance of 275 TOPS (INT8).
  However, its datasheet lists its Thermal Design Power (TDP) as 60W. Identify the primary reason this
  chip might be unsuitable for your system.
question: "Why might a 60W Jetson AGX Orin be unsuitable for a trunk compute module with a strict 30W power budget?"
details:
  realistic_solution: The chip's 60W TDP is double the system's 30W power budget. On an edge platform,
    the power budget is a hard constraint dictated by the ability to dissipate heat. A chip demanding
    60W in a 30W system will quickly overheat and thermally throttle, drastically reducing its performance
    and making it unreliable. The peak 275 TOPS is only achievable if the 60W power demand can be met
    and the resulting heat dissipated, which is not possible in this scenario.
  common_mistake: Engineers, especially those with a cloud background, often underestimate thermal constraints
    on the edge. They might assume the 60W TDP is a peak value that is rarely hit and that the chip can
    simply be underclocked. In a thermally constrained environment like a car trunk, the power budget
    is a hard physical limit, and exceeding it leads to severe performance throttling, making the peak
    TOPS number meaningless.
  napkin_math: 'This is a direct constraint check, not a complex calculation:'
  options:
  - The 275 TOPS performance is too low for a perception model.
  - Its memory bandwidth is likely insufficient.
  - Its 60W power requirement exceeds the system's 30W budget.
  - A GPU is the wrong type of processor for this task.
  correct_index: 2
