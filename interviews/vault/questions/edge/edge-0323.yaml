title: The Thermal Budget Trap
scenario: You are part of the hardware team for an autonomous vehicle company. Your compute module, which is located in the trunk, has a strict power budget of 30W to avoid overheating. You are evaluating a new accelerator, the NVIDIA Jetson AGX Orin, which advertises a peak performance of 275 TOPS (INT8). However, its datasheet lists its Thermal Design Power (TDP) as 60W.
question: Why might a 60W Jetson AGX Orin be unsuitable for a trunk compute module with a strict 30W power budget?
details:
  realistic_solution: The chip's 60W TDP is double the system's 30W power budget. On an edge platform, the power budget is a hard constraint dictated by the ability to dissipate heat. A chip demanding 60W in a 30W system will quickly overheat and thermally throttle, drastically reducing its performance and making it unreliable. The peak 275 TOPS is only achievable if the 60W power demand can be met and the resulting heat dissipated, which is not possible in this scenario.
  common_mistake: |
    **The Pitfall:** Underestimating thermal constraints on the edge and assuming the 60W TDP is just a rare peak value.
    **The Rationale:** Engineers with a cloud background are used to server racks with massive cooling infrastructure.
    **The Consequence:** A 60W chip in a 30W thermal enclosure will quickly overheat, severely throttle its performance, and fail to reach its advertised TOPS.
  napkin_math: |
    * Thermal Design Power (TDP) of Orin = 60W.
    * System cooling budget = 30W.
    * **60W > 30W. The chip will overheat and throttle.**
  options:
  - The 275 TOPS performance is too low for a perception model.
  - Its memory bandwidth is likely insufficient.
  - Its 60W power requirement exceeds the system's 30W budget.
  - A GPU is the wrong type of processor for this task.
  correct_index: 2
