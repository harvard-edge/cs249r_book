title: Mmap RAM Tradeoffs for Edge TPU
scenario: You are analyzing a multi-process video pipeline on an embedded host connected to a Google Coral
  Edge TPU (4 TOPS INT8, 2W, USB form factor). Due to limited operator support, the object detection model
  is strictly quantized to INT8 and is 20MB in size. The system runs 5 independent processes that all
  load this exact same model file to perform inference. When using standard file read operations, the
  host RAM usage increases by 100MB. When switched to a memory-mapped (mmap) loading strategy, the host
  memory increase drops to just 20MB. Explain why this specific memory behavior happens on the host, and
  how the INT8 weights still reach the Edge TPU over the USB interface.
question: "Why does mmap reduce host RAM from 100MB to 20MB for five Coral Edge TPU processes, and how do the INT8 weights reach the TPU?"
details:
  realistic_solution: Standard file reads force the OS to allocate an isolated 20MB physical memory buffer
    for each of the 5 processes. Memory-mapping (mmap) allows the OS to load the 20MB file into a single
    physical memory region in the page cache, which is shared across the virtual memory spaces of all
    5 processes. The Edge TPU delegate in each process simply passes a pointer to this shared host memory,
    allowing the driver to copy the INT8 weights over the USB connection to the TPU, drastically saving
    host RAM while preserving the 4 TOPS INT8 acceleration.
  common_mistake: Candidates often incorrectly assume that the Edge TPU accesses the memory-mapped file
    directly via zero-copy. They forget that the USB form factor requires the host to manually transfer
    the memory-mapped INT8 weights over the USB bus to the device's local memory.
  napkin_math: 'Standard host RAM usage = 5 processes * 20MB INT8 model = 100MB. Mmap host RAM usage =
    1 shared physical instance = 20MB. Host RAM savings = 100MB - 20MB = 80MB. Power context: Maintaining
    a smaller host memory footprint reduces page thrashing, keeping overall system power low to complement
    the Edge TPU''s 2W power envelope.'
