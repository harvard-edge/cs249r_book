title: The Tamper-Proof Model Fortress
scenario: Your company develops highly sensitive ML models for critical infrastructure (e.g., energy grid
  optimization). These models are deployed on edge devices in remote, potentially unsecured locations.
  A malicious actor could gain physical access to a device. Design a strategy to ensure the integrity
  and authenticity of the deployed ML models, preventing unauthorized modification, replacement, or exfiltration,
  from manufacturing to runtime operation.
question: "How would you secure the ML model from manufacturing to runtime so attackers with physical access cannot modify, replace, or exfiltrate it?"
details:
  realistic_solution: "Implement a comprehensive secure boot and remote attestation strategy, leveraging\
    \ hardware security features:\n  1.  **Hardware Root of Trust (HRoT):** Utilize a Trusted Platform\
    \ Module (TPM), Secure Enclave, or Hardware Security Module (HSM) present on the edge device. This\
    \ provides an unchangeable anchor for trust.\n  2.  **Secure Boot:**\n      *   **Measured Boot:**\
    \ Each stage of the boot process (firmware, bootloader, kernel, OS, application, ML runtime, *and\
    \ the ML model itself*) is cryptographically hashed.\n      *   **Signed Components:** Each stage\
    \ verifies the digital signature of the next stage using public keys stored in the HRoT. If a signature\
    \ mismatch occurs, the boot process halts.\n      *   **Model Signing:** The ML model binary (e.g.,\
    \ ONNX, TensorRT engine) is signed by a trusted authority (your build system) during deployment. The\
    \ device verifies this signature using a pre-installed public key before loading the model.\n  3.\
    \  **Encrypted Storage:** Store the ML model (and sensitive data) encrypted at rest using keys derived\
    \ from the HRoT or a Hardware Unique Key (HUK). This protects confidentiality even if the storage\
    \ medium is exfiltrated.\n  4.  **Remote Attestation:**\n      *   **Challenge-Response:** Periodically,\
    \ a cloud service (or local trusted entity) sends a challenge to the edge device.\n      *   **TPM\
    \ Quote:** The device's TPM generates a \"quote\" of its Platform Configuration Registers (PCRs),\
    \ which contain the hashes of all loaded components (from secure boot). This quote is signed by the\
    \ TPM's attestation key.\n      *   **Verification:** The cloud service verifies the TPM's signature\
    \ on the quote and compares the PCR values against expected \"golden\" values. Any deviation indicates\
    \ tampering.\n  5.  **Runtime Integrity:** Use memory protection units (MPU/MMU) to isolate the ML\
    \ inference engine and model memory, preventing other processes from modifying them. Consider Trusted\
    \ Execution Environments (TEEs) like ARM TrustZone for critical inference paths.\n  6.  **Secure Update:**\
    \ OTA updates for models and firmware must also be signed and verified by the HRoT before application."
  common_mistake: '"Encrypt the model and store it on the device." Encryption protects confidentiality,
    but not integrity. An attacker can replace an encrypted model with another encrypted (but malicious)
    model.'
  napkin_math: 'If an ML model is 100MB, computing its SHA256 hash (32 bytes) during secure boot at a hardware hashing speed of 100MB/s adds just 1 second of overhead to the boot process. Encrypting the 100MB model with AES-256-GCM at 500MB/s takes 0.2s. This combined 1.2s overhead is a negligible price to pay for cryptographic guarantees against physical tampering and extraction.'
