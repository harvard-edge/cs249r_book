title: VRAM Budgeting for a Quantized Vision Transformer on Hailo-8
scenario: You are deploying an INT8-quantized compact vision transformer model for
  real-time anomaly detection on a Hailo-8 dataflow accelerator. The Hailo-8 provides
  26 TOPS (INT8) with a thermal design power of 2.5W, and is severely memory-constrained
  with approximately 8 MB of high-speed on-chip SRAM. The model has 5 million parameters.
  Each inference processes a batch size of 1. The model includes a small multi-head
  attention block for sequential feature processing, necessitating a KV-cache for
  a context window of 16 feature vectors, with each feature vector having a hidden
  dimension of 256. Analyze the memory budget required for the model's weights, peak
  activations, and the KV-cache, identifying potential bottlenecks and proposing a
  strategy to ensure the model fits within the Hailo-8's memory constraint.
question: Can this 5M-parameter INT8 vision transformer fit in Hailo-8's 8 MB SRAM,
  and how would you budget and optimize weights, activations, and KV-cache?
details:
  realistic_solution: "A realistic solution involves a multi-pronged approach: \n\
    1.  **Model Architecture & Quantization:** Aggressively prune, distill, and quantize\
    \ the model to INT8, verifying accuracy trade-offs. Design the transformer block\
    \ for minimal heads/layers and smaller hidden dimensions. \n2.  **Activation Management:**\
    \ Employ techniques like activation re-computation or in-place operations to reduce\
    \ peak memory usage. Analyze the dataflow graph to identify and optimize layers\
    \ that produce large intermediate tensors. \n3.  **KV-Cache Optimization:** Implement\
    \ a fixed-size, circular buffer for the KV-cache. Consider further quantizing\
    \ the KV-cache to INT4 if the Hailo-8's architecture permits and accuracy holds.\
    \ Explore advanced attention mechanisms like Multi-Query Attention to share K/V\
    \ projections across heads, significantly reducing KV-cache size. \n4.  **Tooling\
    \ & Profiling:** Utilize Hailo's SDK tools for detailed memory profiling and visualization\
    \ to pinpoint exact memory consumption at various stages of inference. \n5.  **Iterative\
    \ Napkin Math:** Continuously update napkin math estimates during model development,\
    \ cross-referencing with profiling data to maintain a tight memory budget."
  common_mistake: A common mistake is focusing solely on the static model weights
    and underestimating the dynamic memory demands of intermediate activations and
    the KV-cache. For tightly constrained edge devices like the Hailo-8, peak activation
    memory can often exceed weight memory, especially with larger intermediate feature
    maps or deeper networks. Neglecting the KV-cache growth, even for small context
    windows, can also quickly exhaust precious SRAM.
  napkin_math: "Let's perform a napkin math estimate for the 8 MB Hailo-8 SRAM:\n\
    -   **Model Weights:** 5 million parameters * 1 byte/parameter (INT8) = 5,000,000\
    \ bytes = ~4.77 MB.\n-   **KV-Cache (approximate):** For 2 attention layers, 4\
    \ heads, a context of 16, and 256-dim feature vectors, assuming INT8 for K and\
    \ V:\n    -   `2 (layers) * 4 (heads) * 16 (seq_len) * 256 (head_dim) * 1 (byte/INT8)\
    \ * 2 (for K & V)` = `65,536 bytes = ~0.06 MB`.\n-   **Peak Activations (estimated):**\
    \ Highly dependent on model design. For a compact vision transformer, a significant\
    \ intermediate feature map might be, for example, 32x32x512 channels. If two such\
    \ tensors coexist at peak for INT8:\n    -   `2 * (32 * 32 * 512 * 1 byte/pixel)\
    \ = 1,048,576 bytes = ~1 MB`.\n-   **Total Estimated Memory:** `4.77 MB (weights)\
    \ + 0.06 MB (KV-cache) + 1.00 MB (activations)` = `5.83 MB`.\n\nThis leaves approximately\
    \ `8 MB - 5.83 MB = 2.17 MB` for the Hailo-8 runtime, operating system, and any\
    \ other buffers, which is a very tight margin and requires rigorous optimization\
    \ and validation."
