title: VRAM Budgeting for a Quantized Vision Transformer on Hailo-8
scenario: You are deploying an INT8-quantized compact vision transformer model for real-time anomaly detection on a dataflow accelerator. The model has 5 million parameters. Each inference processes a batch size of 1. The model includes a small multi-head attention block for sequential feature processing, necessitating a KV-cache for a context window of 16 feature vectors, with each feature vector having a hidden dimension of 256.
question: Can this 5M-parameter INT8 vision transformer fit in the 8 MB SRAM, and how would you budget and optimize weights, activations, and KV-cache?
details:
  realistic_solution: "A realistic solution involves a multi-pronged approach: 1. Aggressively prune, distill, and quantize the model to INT8, verifying accuracy trade-offs. 2. Employ techniques like activation re-computation or in-place operations to reduce peak memory usage. 3. Implement a fixed-size, circular buffer for the KV-cache. Explore advanced attention mechanisms like Multi-Query Attention to share K/V projections across heads, significantly reducing KV-cache size. 4. Utilize SDK tools for detailed memory profiling and visualization to pinpoint exact memory consumption at various stages of inference."
  common_mistake: |
    **The Pitfall:** Focusing solely on static model weights.
    **The Rationale:** Candidates often underestimate the dynamic memory demands of intermediate activations and the KV-cache.
    **The Consequence:** For tightly constrained edge devices, peak activation memory can quickly exceed the tiny SRAM pool, leading to deployment failure despite the weights theoretically fitting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8 MB SRAM limit.
       - Model parameters: 5 million (INT8).
       - KV-Cache: 2 layers, 4 heads, 16 seq_len, 256 dim (INT8).
       - Peak Activations: Two active 32x32x512 tensors (INT8).
    2. **Calculations:**
       - Model Weights (INT8): 5,000,000 * 1 byte = ~4.77 MiB.
       - KV-Cache: 2 * 4 * 16 * 256 * 1 byte * 2 = 65,536 bytes = ~0.06 MiB.
       - Peak Activations: 2 * 32 * 32 * 512 * 1 byte = 1,048,576 bytes = 1.00 MiB.
       - Total Memory: 4.77 + 0.06 + 1.00 = 5.83 MiB.
       - Remaining SRAM: 8.00 - 5.83 = 2.17 MiB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound (SRAM)**. The model fits entirely within the 8 MB SRAM limit, leaving ~2.17 MiB for runtime buffers.
