title: VRAM Budgeting for a Quantized Vision Transformer on Hailo-8
scenario: You are deploying an INT8-quantized compact vision transformer model for real-time anomaly detection on a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS (INT8) with a thermal design power of 2.5W, and is severely memory-constrained with approximately 8 MB of high-speed on-chip SRAM. The model has 5 million parameters. Each inference processes a batch size of 1. The model includes a small multi-head attention block for sequential feature processing, necessitating a KV-cache for a context window of 16 feature vectors, with each feature vector having a hidden dimension of 256.
question: Can this 5M-parameter INT8 vision transformer fit in Hailo-8's 8 MB SRAM, and how would you budget and optimize weights, activations, and KV-cache?
details:
  realistic_solution: "A realistic solution involves a multi-pronged approach: \n1.  **Model Architecture & Quantization:** Aggressively prune, distill, and quantize the model to INT8, verifying accuracy trade-offs. Design the transformer block for minimal heads/layers and smaller hidden dimensions. \n2.  **Activation Management:** Employ techniques like activation re-computation or in-place operations to reduce peak memory usage. Analyze the dataflow graph to identify and optimize layers that produce large intermediate tensors. \n3.  **KV-Cache Optimization:** Implement a fixed-size, circular buffer for the KV-cache. Consider further quantizing the KV-cache to INT4 if the Hailo-8's architecture permits and accuracy holds. Explore advanced attention mechanisms like Multi-Query Attention to share K/V projections across heads, significantly reducing KV-cache size. \n4.  **Tooling & Profiling:** Utilize Hailo's SDK tools for detailed memory profiling and visualization to pinpoint exact memory consumption at various stages of inference. \n5.  **Iterative Napkin Math:** Continuously update napkin math estimates during model development, cross-referencing with profiling data to maintain a tight memory budget."
  common_mistake: |
    **The Pitfall:** Focusing solely on static model weights.
    **The Rationale:** Candidates often underestimate the dynamic memory demands of intermediate activations and the KV-cache.
    **The Consequence:** For tightly constrained edge devices like the Hailo-8, peak activation memory can quickly exceed the tiny SRAM pool, leading to deployment failure despite the weights theoretically "fitting".
  napkin_math: |
    1. **Model Weights (INT8):** 5,000,000 parameters * 1 byte/param = `~4.77 MB`.
    2. **KV-Cache:** 2 layers, 4 heads, 16 seq_len, 256 head_dim (INT8 for K and V).
       `2 * 4 * 16 * 256 * 1 byte * 2 = 65,536 bytes = 0.06 MB`.
    3. **Peak Activations:** Two active 32x32x512 tensors.
       `2 * 32 * 32 * 512 * 1 byte = 1,048,576 bytes = 1.00 MB`.
    4. **Total Estimated Memory:** `4.77 MB + 0.06 MB + 1.00 MB = 5.83 MB`.
    5. **Remaining SRAM:** `8.00 MB - 5.83 MB = 2.17 MB`.
    **The model theoretically fits within the 8 MB limit, leaving ~2.17 MB for the runtime and system buffers.**
