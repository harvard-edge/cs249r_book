title: PCIe Switch Oversubscription
scenario: An edge box connects 4 accelerator chips to a host via a PCIe Gen3 switch (upstream x4, downstream x2 per chip). All 4 chips simultaneously DMA a 10 MB activation back to the host.
question: 'Analyze the bandwidth bottleneck and synchronization delay of this concurrent DMA.'
details:
  realistic_solution: 'The switch has 8 lanes downstream but only 4 lanes upstream (~3.93 GB/s). This is a 2:1 oversubscription. The 4 concurrent 10 MB transfers (40 MB total) must serialize over the x4 upstream link. The synchronization delay is 40 MB / 3.93 GB/s = 10.17ms.'
  common_mistake: |
    **The Pitfall:** Assuming each accelerator gets its full x2 dedicated bandwidth to the host without contention.
    **The Rationale:** Candidates fail to trace the full network topology and miss the 2:1 oversubscription at the upstream PCIe Gen3 x4 switch.
    **The Consequence:** Synchronization delays are vastly underestimated, causing unexpected latency misses in tightly coupled multi-chip pipelines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Links: PCIe Gen3 x4 upstream (~3.93 GB/s), x2 downstream per chip.
    - Payload: 10 MB per chip from 4 chips.

    **Calculations:**
    - Total payload = 4 * 10 MB = 40 MB.
    - Upstream bottleneck = 3.93 GB/s (3930 MB/s).
    - Synchronization delay = 40 MB / 3930 MB/s = 10.17 ms.

    **Conclusion & Interpretation:**
    - **Result: 10.17 ms Synchronization Delay (PCIe Upstream-Bound)**. Ignoring the 2:1 switch oversubscription hides latency stalls.
