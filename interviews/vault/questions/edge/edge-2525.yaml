title: PCIe Switch Oversubscription
scenario: An edge box connects 4 Hailo-8 chips to a host via a PCIe Gen3 switch (upstream
  x4, downstream x2 per chip). All 4 chips simultaneously DMA a 10 MB activation back
  to the host.
question: Analyze the bandwidth bottleneck and synchronization delay of this concurrent
  DMA.
details:
  realistic_solution: The switch has 8 lanes downstream but only 4 lanes upstream
    (~3.9 GB/s). This is a 2:1 oversubscription. The 4 concurrent 10 MB transfers
    (40 MB total) must serialize over the x4 upstream link. The synchronization delay
    is 40 MB / 3.9 GB/s = 10.2ms.
  common_mistake: Assuming each accelerator gets its full x2 dedicated bandwidth to
    the host, missing the PCIe switch upstream oversubscription bottleneck.
  napkin_math: Total payload = 4 * 10MB = 40MB. Upstream limit = x4 Gen3 =~ 3930 MB/s.
    40 / 3930 = 10.17 ms.
