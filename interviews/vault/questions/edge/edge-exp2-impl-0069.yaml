title: Edge TPU Randomized Smoothing Throughput Calculation
scenario: A smart security camera uses a Google Coral Edge TPU (4 TOPS INT8, 2W) for real-time person
  detection. To defend against physical adversarial patches, you plan to implement randomized smoothing.
  This defense requires generating and processing N=10 noisy versions of each INT8 input frame to establish
  a majority-vote robustness guarantee. If the quantized object detection model requires 50 GOPS per inference,
  calculate the maximum effective frame rate (FPS) and the system's efficiency in FPS per Watt under maximum
  load.
details:
  realistic_solution: To find the effective FPS, first calculate the total raw inferences per second the
    Edge TPU can perform by dividing the total compute by the model cost. Then, divide by the number of
    inferences required per smoothed frame (N=10). Finally, divide the effective FPS by the system's power
    consumption (2W) to get the FPS/Watt efficiency metric.
  common_mistake: Candidates often forget to account for the N=10 multiplier on the workload per frame
    when calculating the effective frame rate. They might also confuse TOPS (10^12 operations) and GOPS
    (10^9 operations), or fail to divide the total throughput by the 2W power consumption.
  napkin_math: '1. Edge TPU compute = 4 TOPS = 4,000 GOPS.

    2. Raw inferences/sec = 4,000 GOPS / 50 GOPS/inference = 80 inferences/second.

    3. Effective frame rate (N=10 inferences/frame) = 80 / 10 = 8 FPS.

    4. Power Efficiency = 8 FPS / 2W = 4 FPS/Watt.'
