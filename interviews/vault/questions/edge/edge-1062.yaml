title: 'Kernel Fusion: Realize Fusion Impact for EfficientDet on Jetson Orin'
scenario: Realize the kernel fusion impact for EfficientDet-D0 (3.9M params, 2.5B FLOPs) running at INT8 on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). The model has 236 nodes in the ONNX graph. After TensorRT conversion with fusion, the graph reduces to 42 nodes.
question: For EfficientDet-D0 on Jetson Orin, how much latency is saved when TensorRT fuses the ONNX graph from 236 nodes to 42 nodes, and why?
details:
  realistic_solution: 'There are two sources of improvement: (1) Reduced kernel launch overhead (236 to 42 launches), and (2) Memory bandwidth savings from keeping intermediate tensors in GPU registers rather than spilling them to VRAM between fused ops.'
  common_mistake: |
    **The Pitfall:** Attributing all latency improvement purely to reduced kernel launches.
    **The Rationale:** Engineers often forget that intermediate activation reads/writes cost immense time on the memory bus.
    **The Consequence:** Misjudging the magnitude of fusion gains on memory-bound edge devices.
  napkin_math: |
    - **Launch Overhead:** 5 µs per CUDA kernel. 236 kernels = 1.18 ms. Fused to 42 kernels = 0.21 ms (0.97 ms saved).
    - **Memory Bandwidth Savings:** 194 intermediate tensors eliminated. Average activation ≈ 200 KB. 194 × 200 KB = 38.8 MB eliminated.
    - **Bandwidth Time Saved:** 38.8 MB / 68 GB/s (effective memory bandwidth) = 0.57 ms saved.
    - **Total Latency Improvement:** 0.97 ms (launch) + 0.57 ms (memory) = 1.54 ms saved per frame.
    - **Final Result:** **Latency drops from 10.64 ms to 9.31 ms. Throughput increases from 94 FPS to 107 FPS, improving power efficiency from 1.56 FPS/W to 1.78 FPS/W.**
