title: Kernel Fusion Impact for EfficientDet on Jetson Orin
scenario: EfficientDet-D0 runs at INT8 on Jetson Orin. TensorRT fusion reduces the ONNX graph from 236 to 42 nodes.
question: For EfficientDet-D0 on Jetson Orin, how much latency is saved when TensorRT fuses the ONNX graph from 236 nodes to 42 nodes, and why?
details:
  realistic_solution: 'There are two sources of improvement: (1) Reduced kernel launch overhead (236 to 42 launches), and (2) Memory bandwidth savings from keeping intermediate tensors in GPU registers rather than spilling them to VRAM between fused ops.'
  common_mistake: |
    **The Pitfall:** Attributing all latency improvement purely to reduced kernel launches.
    **The Rationale:** Engineers often forget that intermediate activation reads/writes cost immense time on the memory bus.
    **The Consequence:** Misjudging the magnitude of fusion gains on memory-bound edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin, 68 GB/s effective bandwidth.
    - Kernel launch overhead = 5 µs.
    - 194 intermediate tensors (~200 KB each) eliminated.

    **Calculations:**
    - Launch savings = (236 - 42) * 5 µs = 0.97 ms.
    - Memory savings = 194 * 200 KB = 38.8 MB.
    - Bandwidth time saved = 38.8 MB / 68 GB/s = 0.57 ms.
    - Total = 0.97 + 0.57 = 1.54 ms.

    **Conclusion & Interpretation:**
    - **Result: 1.54 ms latency saved per frame (Memory-Bandwidth-Bound (Alleviated))**. Operator fusion dramatically reduces memory bus traffic, far outweighing simple kernel launch overhead.
