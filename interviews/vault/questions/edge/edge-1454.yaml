title: Analyzing Thermal Throttling on Google Coral Edge TPU
scenario: 'We are deploying an INT8 object detection model on a Google Coral Edge TPU inside an enclosed outdoor camera housing. At an ambient temperature of 25°C, it runs consistently at 30 FPS. Outdoors on a hot day at 40°C, the system starts at 30 FPS but after 15 minutes drops sharply and stabilizes at 15 FPS.'
question: Why does the Coral Edge TPU drop from 30 FPS to 15 FPS after 15 minutes at 40°C, and what thermal tradeoff is occurring?
details:
  realistic_solution: 'The drop is caused by dynamic thermal throttling. The 2W of power drawn generates trapped heat in the enclosed housing. Upon reaching its thermal threshold, the firmware lowers the clock frequency to reduce power consumption and heat generation, establishing a new equilibrium at the cost of halving inference speed.'
  common_mistake: |
    **The Pitfall:** Assuming software bottlenecks instead of thermal limits.
    **The Rationale:** Candidates often assume performance drops are due to memory leaks or OS scheduling.
    **The Consequence:** Failing to recognize that even a low 2W power draw generates trapped heat in a sealed enclosure, leading to ineffective debugging.
  napkin_math: |
    1. **Assumptions & Constraints:** TPU consumes 2W for 4 TOPS at 30 FPS. Heat forces throttling to 15 FPS.
    2. **Calculations:** Compute per frame = 4 TOPS / 30 FPS = 0.133 TOPS/frame. Throttled required compute = 15 FPS * 0.133 = 2 TOPS. Power scales roughly linearly with TOPS = 1W.
    3. **Conclusion & Interpretation:** **Throughput drops by 50% to halve heat dissipation, safely balancing the thermal load. Result: Thermal-Bound.**
