title: Google Coral Edge TPU Activation Data Type Requirement
scenario: >-
  You are deploying a vision model to a remote sensor array powered by a Google Coral Edge TPU via a USB interface. The model was trained using FP32 activations and weights.
question: What data format must all activations and weights use before compiling the FP32-trained model for the 2W Coral Edge TPU?
details:
  realistic_solution: 'The correct answer is INT8 (8-bit integer). The Google Coral Edge TPU strictly requires both weights and activations to be fully quantized to INT8 for its matrix multiply units to function, as it lacks floating-point hardware.'
  common_mistake: |
    **The Pitfall:** Confusing INT8 quantization with FP16 or BF16.
    **The Rationale:** Candidates assume that all modern edge devices universally support 16-bit floating-point operations.
    **The Consequence:** They attempt to deploy floating-point activations, which fail compilation because the specific hardware lacks floating-point support to maintain its extreme 2W power envelope.
  napkin_math: |
    1. Performance: 4 TOPS.
    2. Power Limit: 2 Watts.
    3. **Result:** Compute Density = `4 TOPS / 2 Watts = 2 TOPS/Watt` (INT8 compute density).
