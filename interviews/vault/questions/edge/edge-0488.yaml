title: The Utilization Paradox
scenario: 'You are a Staff ML Engineer on an automotive perception team, tasked with selecting a model for a 30 FPS (33.3ms deadline) pedestrian detection system. The system runs on a Jetson AGX Orin, which provides 275 INT8 TOPS. The rest of the perception pipeline already consumes 20ms of the latency budget, leaving you 13.3ms for the model. You have two candidate models: Model A (CNN) with 300 G-MACs (0.6 TOps) achieving 15% utilization, and Model B (ViT) with 750 G-MACs (1.5 TOps) achieving 50% utilization.'
question: "Which candidate model meets the 13.3ms latency budget once Orin utilization is accounted for, the CNN or the ViT?"
details:
  realistic_solution: The correct approach is to calculate the *effective* TOPS for each model based on its profiled hardware utilization. The ViT, despite having 2.5x the theoretical G-MACs, is the only viable option. Its architecture, built on dense matrix multiplies, is a much better fit for the Orin's Tensor Cores, leading to dramatically higher utilization and lower wall-clock latency. The CNN, bottlenecked by memory access patterns in its depthwise layers, fails to meet the real-time deadline.
  common_mistake: Blindly choosing the model with the lowest theoretical G-MACs. Engineers often assume that fewer operations automatically means lower latency. They forget that peak TOPS are an advertising number, not a guarantee. Real-world performance is dictated by how efficiently a model's architecture can use the hardware. A model with low arithmetic intensity (like many mobile-first CNNs) can become memory-bound, leaving the powerful compute units starved and idle.
  napkin_math: 'Latency budget: 33.3ms - 20ms = 13.3ms. Orin provides 275 INT8 TOPS. Model B (ViT) achieves 50% utilization (137.5 TOPS effective). Execution: 1.5 TOps / 137.5 TOPS = ~11ms (viable). Model A (CNN) achieves 15% utilization (41.25 TOPS effective). Execution: 0.6 TOps / 41.25 TOPS = ~14.5ms (fails budget).'
  options:
  - Model B (ViT) is the only choice. Its higher hardware utilization results in a latency of ~11ms, which is within the 13.3ms budget, while the CNN is too slow at ~14.5ms.
  - Model A (CNN) is the clear choice. With only 300 G-MACs, it is 2.5x smaller and will be significantly faster than the 750 G-MAC ViT, easily meeting the deadline.
  - Neither model is viable. The CNN will take ~14.5ms and the ViT will take over 30ms. Both fail the 13.3ms budget.
  - Both models are viable. The CNN takes ~2.2ms and the ViT takes ~6.5ms, both well within the total 33.3ms budget.
