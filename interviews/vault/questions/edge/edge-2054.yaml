title: Mitigating Model Extraction on Edge AI with Qualcomm Cloud AI 100
scenario: You are deploying a critical real-time image classification model for anomaly detection on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) at the edge. An adversary is attempting to perform model extraction by sending carefully crafted queries and analyzing the responses. This is a latency-sensitive application where each inference must complete within 5ms.
question: How would you design a defense strategy that minimizes performance impact while effectively mitigating the extraction risk?
details:
  realistic_solution: Implement a multi-layered defense combining query throttling, output obfuscation (e.g., adding calibrated noise or quantizing outputs to lower precision for suspicious queries), and on-device adversarial pattern detection. Leverage the AI 100's INT8 capabilities for the detection module to keep overhead minimal. Additionally, consider subtle model watermarking during training to identify extracted models, and implement rate limiting based on IP addresses and request patterns to prevent rapid-fire querying typical of extraction attempts.
  common_mistake: |
    **The Pitfall:** Implementing overly complex defenses or post-hoc analysis.
    **The Rationale:** Candidates apply heavy, state-of-the-art cryptographic algorithms or models without checking power and thermal envelopes.
    **The Consequence:** Missing the strict 5ms latency budget, making the real-time anomaly detection system unusable.
  napkin_math: |
    - **Performance Tradeoff:** If a defense mechanism adds 10% computational overhead per inference, operations increase by a factor of 1.1.
    - **Throughput Reduction:** The maximum achievable inference rate decreases by a factor of 1 / 1.1 $\approx$ 0.909.
    - **Impact:** This results in an approximate **9.1% reduction** in max inference throughput.
