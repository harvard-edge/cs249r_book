title: Mitigating Model Extraction on Edge AI with Qualcomm Cloud AI 100
scenario: You are deploying a critical real-time image classification model for anomaly
  detection on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) at the
  edge. An adversary is attempting to perform model extraction by sending carefully
  crafted queries and analyzing the responses. This is a latency-sensitive application
  where each inference must complete within 5ms. How would you design a defense strategy
  that minimizes performance impact while effectively mitigating the extraction risk,
  considering the hardware constraints?
question: How would you design a defense strategy that minimizes performance impact
  while effectively mitigating the extraction risk, considering the hardware constraints?
details:
  realistic_solution: Implement a multi-layered defense combining query throttling,
    output obfuscation (e.g., adding calibrated noise or quantizing outputs to lower
    precision for suspicious queries), and on-device adversarial pattern detection.
    Leverage the AI 100's INT8 capabilities for the detection module to keep overhead
    minimal. Additionally, consider subtle model watermarking during training to identify
    extracted models, and implement rate limiting based on IP addresses and request
    patterns to prevent rapid-fire querying typical of extraction attempts.
  common_mistake: Ignoring the computational overhead of defensive mechanisms, leading
    to missed latency budgets or requiring excessive memory, which is critical on
    edge devices. Another common mistake is implementing overly complex defenses that
    cannot run efficiently within the given power and thermal envelopes of edge hardware.
  napkin_math: "The Qualcomm Cloud AI 100 delivers 400 TOPS (INT8). If a proposed defense mechanism adds 10% computational overhead per inference to a model, the operations per inference increase by a factor of 1.1. Consequently, the maximum achievable inference rate decreases by a factor of 1 / 1.1 \u2248 0.909. This represents an approximate 9.1% reduction in the maximum inference throughput, demonstrating a direct and quantifiable performance tradeoff for the added security."
