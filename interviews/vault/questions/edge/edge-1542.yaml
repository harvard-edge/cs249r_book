title: 'Edge TPU Operator Delegation Tradeoffs'
scenario: 'Your team is deploying a custom object detection model to a smart camera powered by a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, USB form factor). During TFLite INT8 quantization and compilation, you discover that an intermediate HardSwish activation and the final custom Non-Max Suppression (NMS) block are unsupported by the Edge TPU. Alternative A is to rewrite the model to use Edge TPU-supported operators (e.g., ReLU6) and compute NMS on the host CPU. Alternative B is to use TFLite''s CPU fallback, letting the compiler partition the graph so unsupported intermediate activations execute on the low-power host ARM CPU.'
question: 'Which alternative do you choose to stay within your power and latency budgets?'
details:
  realistic_solution: 'Alternative A is the necessary approach for this hardware. The Edge TPU has limited operator support but massive INT8 throughput (4 TOPS) at low power (2W). Graph partitioning (Alternative B) forces intermediate tensors off the TPU and wakes the host CPU, breaking the pipeline and consuming massive I/O power. By replacing HardSwish with ReLU6, the entire backbone runs continuously on the TPU. Processing NMS on the host is acceptable because it is at the very end of the graph.'
  common_mistake: 'Choosing Alternative B because TFLite handles CPU fallback automatically. This incurs catastrophic latency and power penalties caused by repeatedly transferring intermediate activation tensors back and forth across the USB bus.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Backbone compute: 1 GOPS. Edge TPU: 4 TOPS (4,000 GOPS).
    - USB transfer time for 2MB intermediate tensor: ~1.0 ms each way.

    **Calculations:**
    - Ideal TPU compute time: 1 GOPS / 4000 GOPS = 0.25 ms.
    - Alternative B (CPU Fallback): Mid-graph transfer adds 1.0 ms to CPU + 1.0 ms to TPU = 2.0 ms I/O overhead.
    - Alternative A (TPU only): Total backbone 0.25 ms + final NMS transfer 1.0 ms = 1.25 ms total latency.

    **Conclusion & Interpretation:**
    - **Result: 1.25 ms vs 2.25+ ms (I/O-Bound)**. Rewriting the activation avoids catastrophic CPU context switches across the USB bus.
