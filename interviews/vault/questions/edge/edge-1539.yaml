title: Zero-Copy Memory Mapping for Multi-Stream Inference
scenario: You are deploying a multi-camera pipeline on an embedded device with 32 GB unified LPDDR5. Four independent inference processes share the exact same 8 GB FP16 model. The OS and intermediate activations require 10 GB of memory to function. You must choose between (A) each process independently allocating the 8 GB weights, or (B) a single zero-copy memory-mapped (mmap) weight file.
question: Which memory design should you use for four processes sharing the same 8 GB model on the 32 GB embedded device, and why?
details:
  realistic_solution: "Deploy a single memory-mapped (mmap) zero-copy weight file. Unified SoC architectures utilize physically shared LPDDR5 RAM. Having four isolated processes map the same file directly leverages the OS page cache, requiring only 18 GB total RAM. Independent memory allocations would foolishly duplicate the 8 GB footprint four times (42 GB total), triggering an immediate Out-Of-Memory (OOM) fatal panic against the 32 GB limit."
  common_mistake: |
    **The Pitfall:** Choosing independent GPU memory allocation for shared models.
    **The Rationale:** Candidates carry over discrete PCIe GPU assumptions, forgetting that SoCs share unified physical memory.
    **The Consequence:** Massive memory duplication leading to an inevitable Out-Of-Memory (OOM) crash.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory capacity: 32 GB unified LPDDR5.
       - Model size: 8 GB.
       - System/OS footprint: 10 GB.
       - Processes: 4.
    2. **Calculations:**
       - Independent alloc (Alt A) = (4 * 8 GB) + 10 GB = 42 GB.
       - Shared mmap (Alt B) = (1 * 8 GB) + 10 GB = 18 GB.
       - Headroom (Alt B) = 32 GB - 18 GB = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Zero-Copy required (14 GB headroom).** Independent allocation causes a massive OOM (42 GB needed vs 32 GB available).
