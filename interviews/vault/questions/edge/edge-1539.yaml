title: Zero-Copy Memory Mapping for Multi-Stream Inference
scenario: You are deploying a multi-camera pipeline on an NVIDIA Jetson Orin (32 GB unified LPDDR5). Four independent inference processes share the exact same 8 GB FP16 model. The OS and intermediate activations require 10 GB of memory to function. You must choose between (A) each process independently allocating the 8 GB weights, or (B) a single zero-copy memory-mapped (mmap) weight file.
question: Which memory design should you use for four processes sharing the same 8 GB model on the 32 GB Jetson Orin, and why?
details:
  realistic_solution: Alternative B is the correct design. Because the Jetson Orin shares its 32 GB LPDDR5 memory physically between the CPU and GPU, using mmap allows multiple processes to map the same read-only weight file into their virtual address spaces while sharing the same underlying physical memory pages in the OS page cache.
  common_mistake: |
    **The Pitfall:** Choosing independent GPU memory allocation for shared models.
    **The Rationale:** Candidates carry over discrete PCIe GPU assumptions, forgetting that SoCs like Jetson share unified physical memory.
    **The Consequence:** Massive memory duplication leading to an inevitable Out-Of-Memory (OOM) crash.
  napkin_math: |
    - Jetson Orin unified memory: 32 GB.
    - Independent allocation (Alt A): 4 * 8 GB = 32 GB + 10 GB OS = 42 GB (**OOM**).
    - Shared memory map (Alt B): 1 * 8 GB = 8 GB + 10 GB OS = 18 GB.
    - Headroom remaining: 32 - 18 = **14 GB**.
