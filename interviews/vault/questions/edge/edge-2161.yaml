title: Depthwise Convolutions on Jetson Orin
scenario: Your team is optimizing a vision model for a Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). They replace standard 3x3 convolutions with depthwise separable convolutions, reducing theoretical operations by a factor of roughly 8. However, profiling shows inference latency only improves by a factor of 2, and GPU utilization drops significantly.
question: Why did replacing 3×3 convolutions with depthwise separable convolutions cut FLOPs 8× but improve Orin latency only 2×?
details:
  realistic_solution: The correct reasoning identifies that depthwise convolutions have a dramatically lower arithmetic intensity (operations per byte of memory accessed) compared to standard convolutions. Standard convolutions reuse the same input activations across multiple output channels, keeping the compute units fed. Depthwise convolutions only apply one filter per input channel, forcing the hardware to read and write feature maps from memory with very little intermediate compute. On a Jetson Orin with massive compute capacity (275 TOPS), the depthwise layers instantly become memory-bandwidth bound, leaving the compute units starving and limiting the expected latency reduction.
  common_mistake: |
    **The Pitfall:** Assuming execution time scales perfectly linearly with theoretical FLOP count reduction.
    **The Rationale:** Engineers focus purely on computational complexity, forgetting that data movement limits modern accelerator performance.
    **The Consequence:** Overestimating latency improvements and being surprised when heavily optimized models become severely memory-bound.
  napkin_math: |
    *   **Standard Conv OPs:** 56 * 56 * 128 * 128 * 3 * 3 * 2 = ~924M OPs.
    *   **Depthwise OPs:** 56 * 56 * 128 * 3 * 3 * 2 = ~7.2M OPs.
    *   **Memory I/O (Depthwise):** Read (56 * 56 * 128 bytes = 401KB) + Write (401KB) = 802KB.
    *   **Arithmetic Intensity:** 7.2M OPs / 802KB = **~9 OPs/byte**.
    *   **Result:** With 275 TOPS available, an arithmetic intensity of 9 OPs/byte guarantees the hardware is starving for data, explaining the poor speedup.
