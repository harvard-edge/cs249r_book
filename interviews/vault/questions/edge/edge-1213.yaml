title: Analyzing Memory-Bound INT8 Throughput on Jetson Orin
scenario: 'You are deploying a quantized vision transformer on an NVIDIA Jetson Orin. The model has an arithmetic intensity of 400 OPs/byte. During profiling, the system compute throughput flatlines at 82 TOPS and cannot reach the 275 TOPS limit despite maximizing the 60W profile.'
question: Why does throughput flatline around 82 TOPS instead of reaching the Jetson Orin's 275 TOPS INT8 peak?
details:
  realistic_solution: 'The failure to reach 275 TOPS is caused by a memory bandwidth bottleneck. According to the Roofline model, maximum achievable performance is constrained by either peak compute or memory bandwidth times arithmetic intensity. LPDDR5 cannot deliver data fast enough, leaving ALUs idle.'
  common_mistake: |
    **The Pitfall:** Incorrectly blaming thermal throttling.
    **The Rationale:** Candidates look at the 60W TDP and 82 TOPS plateau and assume the system is throttling.
    **The Consequence:** They pursue thermal mitigation strategies rather than addressing the actual memory bottleneck via model architecture changes.
  napkin_math: |
    1. **Assumptions & Constraints:** Peak Compute = 275 TOPS, Memory Bandwidth = 204.8 GB/s. Arithmetic Intensity = 400 OPs/byte.
    2. **Calculations:** Attainable Performance = min(275 TOPS, 204.8 GB/s * 400 OPs/byte) = 81,920 GigaOPs/sec = 81.92 TOPS.
    3. **Conclusion & Interpretation:** **The system is strictly limited to 81.92 TOPS by memory bandwidth. Result: Memory-Bandwidth-Bound.**
