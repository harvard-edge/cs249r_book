title: Calculating Communication Hiding Feasibility on PCIe Edge
scenario: A smart camera using a Hailo-8 accelerator streams feature embeddings to a host processor over a PCIe Gen3 x2 link. The accelerator computes 16 MB of feature maps in 5 ms.
question: Calculate the minimum network transfer time per feature map and determine if the communication can be perfectly hidden behind the computation.
details:
  realistic_solution: A PCIe Gen3 x2 link provides approximately 2 GB/s (1.97 GB/s effective) of bandwidth. Transferring 16 MB of activations takes 8 ms. Because the DMA transfer duration (8 ms) exceeds the NPU execution time (5 ms), the system is strictly limited by interconnect bandwidth. Communication-computation overlap (e.g., using double-buffered asynchronous CUDA/Hailo streams) can hide the 5 ms compute, but the pipeline will still stall waiting on the 8 ms PCIe transfer.
  common_mistake: |
    **The Pitfall:** Failing to properly align units (MB to GB/s) or fundamentally misunderstanding asynchronous pipelining.
    **The Rationale:** Candidates incorrectly assume that invoking asynchronous streams magically eliminates all transfer latency, forgetting that the max duration strictly bounds the pipeline throughput.
    **The Consequence:** The engineered pipeline stalls on the PCIe bus, missing real-time throughput expectations due to silent I/O starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Feature map size: 16 MB.
       - NPU Compute time: 5 ms.
       - PCIe Gen3 x2 effective bandwidth: ~2 GB/s.
    2. **Calculations:**
       - Bandwidth in MB/s = 2000 MB/s.
       - DMA Transfer time = 16 MB / 2000 MB/s = 0.008 s = 8 ms.
       - Pipeline bottleneck = max(Compute, Transfer) = max(5 ms, 8 ms) = 8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 8 ms > 5 ms. The pipeline is I/O-bound (PCIe bandwidth). Communication cannot be perfectly hidden, capping theoretical throughput.**
