title: Calculating Communication Hiding Feasibility on PCIe Edge
scenario: A smart camera using a Hailo-8 accelerator streams feature embeddings to
  a host processor over a PCIe Gen3 x2 link (approx 2 GB/s practical). The accelerator
  computes feature maps of 16 MB in 5 ms.
question: Calculate the minimum network transfer time per feature map and determine
  if the communication can be perfectly hidden behind the computation.
details:
  realistic_solution: Transferring 16 MB over a 2 GB/s link takes 16 MB / 2000 MB/s
    = 0.008 seconds, or 8 ms. Since the transfer time (8 ms) is longer than the compute
    time (5 ms), communication cannot be perfectly hidden and the PCIe bus will bottleneck
    the pipeline.
  common_mistake: Failing to convert between MB and GB/s properly, or assuming overlap
    automatically hides the longer duration.
  napkin_math: 16 MB / 2000 MB/s = 8 ms > 5 ms
