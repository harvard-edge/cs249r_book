title: Active Learning for Edge Model Adaptation on NVIDIA Jetson Orin
scenario: An anomaly detection model is deployed on an edge computer in a remote industrial environment. The model occasionally encounters novel anomalies that it struggles to classify, leading to performance degradation. Due to extremely limited satellite uplink bandwidth and stringent data privacy regulations, streaming raw data back to a central cloud for continuous re-labeling is not feasible.
question: What edge-friendly model update strategy would you use when raw data cannot be streamed for relabeling over the limited satellite uplink?
details:
  realistic_solution: Deploy a local Active Learning agent leveraging uncertainty sampling (e.g., softmax entropy). The edge node buffers candidate samples, locally evaluates their information density, and only transmits the top 5% of highest-entropy frames over the satellite link. This dramatically reduces telemetry costs while maximizing the Information-Compute Ratio (ICR) for cloud-based retraining.
  common_mistake: |
    **The Pitfall:** Attempting to implement a traditional cloud-centric continuous retraining pipeline.
    **The Rationale:** Candidates often default to standard cloud ML practices, assuming they can stream large volumes of raw data for re-labeling.
    **The Consequence:** This approach is impractical for the remote device due to its power and bandwidth constraints, leading to significant delays and excessive operational costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base inference rate: 5,000 inferences/hr
       - Naive re-labeling: 20% of inferences (anomalous)
       - Active learning: 5% of inferences (high uncertainty)
    2. **Calculations:**
       - Naive bandwidth demand: 5,000 * 0.20 = 1,000 samples/hr
       - Active learning bandwidth demand: 5,000 * 0.05 = 250 samples/hr
       - Bandwidth savings: 1,000 - 250 = 750 samples/hr
       - Daily savings: 750 * 24 = 18,000 samples/day
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Mitigation.** Active learning cuts uplink volume by 75%, making continuous adaptation viable over the satellite link.
