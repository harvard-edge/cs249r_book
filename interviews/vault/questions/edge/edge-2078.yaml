title: Active Learning for Edge Model Adaptation on NVIDIA Jetson Orin
scenario: An anomaly detection model is deployed on an NVIDIA Jetson Orin in a remote industrial environment. The model occasionally encounters novel anomalies that it struggles to classify, leading to performance degradation. Due to extremely limited satellite uplink bandwidth and stringent data privacy regulations, streaming raw data back to a central cloud for continuous re-labeling is not feasible.
question: What edge-friendly model update strategy would you use when raw data cannot be streamed for relabeling over the limited satellite uplink?
details:
  realistic_solution: Given the constraints, the most appropriate strategy is to implement an active learning loop on the Jetson Orin. Active learning is an iterative process where the model itself identifies the most 'informative' unlabeled data points (e.g., using uncertainty sampling based on inference confidence). Only these high-value samples are then flagged for minimal, on-device human review or sent selectively via the limited uplink for expert annotation. This significantly reduces the volume of data requiring human labeling and bandwidth, enabling efficient model adaptation while leveraging the Jetson Orin's memory for local data buffering and processing of the candidate samples.
  common_mistake: |
    **The Pitfall:** Attempting to implement a traditional cloud-centric continuous retraining pipeline.
    **The Rationale:** Candidates often default to standard cloud ML practices, assuming they can stream large volumes of raw data for re-labeling.
    **The Consequence:** This approach is impractical for the Jetson Orin due to its power and bandwidth constraints, leading to significant delays and excessive operational costs.
  napkin_math: |
    1. Base inference rate: 5,000 inferences/hr.
    2. Without active learning (20% anomalous): 1,000 samples/hr sent for review.
    3. With active learning (5% highly uncertain): 250 samples/hr flagged.
    4. Hourly savings: 1,000 - 250 = 750 samples/hr.
    5. Daily savings: 750 * 24 = **18,000 samples/day**.
