title: Active Learning for Edge Model Adaptation on NVIDIA Jetson Orin
scenario: An anomaly detection model is deployed on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W) in a remote industrial environment. The model occasionally encounters
  novel anomalies that it struggles to classify, leading to performance degradation.
  Due to extremely limited satellite uplink bandwidth and stringent data privacy regulations,
  streaming raw data back to a central cloud for continuous re-labeling is not feasible.
  You need a strategy to efficiently update the model using data acquired locally
  on the edge device.
question: What edge-friendly model update strategy would you use when raw data cannot
  be streamed for relabeling over the limited satellite uplink?
details:
  realistic_solution: Given the constraints, the most appropriate strategy is to implement
    an active learning loop on the Jetson Orin. Active learning is an iterative process
    where the model itself identifies the most 'informative' unlabeled data points
    (e.g., using uncertainty sampling based on inference confidence on the 275 TOPS
    INT8 NPU). Only these high-value samples are then flagged for minimal, on-device
    human review or sent selectively via the limited uplink for expert annotation.
    This significantly reduces the volume of data requiring human labeling and bandwidth,
    enabling efficient model adaptation while leveraging the Jetson Orin's 32 GB LPDDR5
    for local data buffering and processing of the candidate samples.
  common_mistake: A common mistake is attempting to implement a traditional cloud-centric
    continuous retraining pipeline, which involves streaming large volumes of raw
    data for re-labeling. This approach is impractical for the Jetson Orin due to
    its limited 60W power budget impacting sustained bandwidth, the specified low
    bandwidth constraints, and the high latency of satellite communication, leading
    to significant delays and excessive operational costs.
  napkin_math: If the Jetson Orin processes 5,000 inferences per hour, and without
    active learning, 20% of anomalous events (1,000/hr) are sent for review. With
    an efficient active learning strategy, only 5% of all inferences (250/hr) are
    flagged as highly uncertain for review. This reduces the daily data volume requiring
    labeling by (1000 - 250) * 24 = 18,000 samples/day, significantly conserving uplink
    bandwidth and annotation resources.
