title: On-Device Shadow Evaluation Trade-offs
scenario: A wearable AR glass system implements on-device learning to adapt its gaze-tracking CNN (5MB,
  150M MACs) to individual users. To prevent regression on general saccades, you must evaluate the adapted
  variant via 'shadow mode' alongside the frozen baseline on the neural DSP (8MB SRAM). A single inference
  takes 15ms and consumes 100mW. The system requires at least 50 FPS and strict thermal limits. Evaluate
  the architectural trade-offs of continuous dual-model evaluation.
details:
  realistic_solution: Use interleaved shadow evaluation (e.g., run the baseline on every 10th frame) and
    deploy memory-efficient adapters (like LoRA) instead of a full model copy. This fits the 8MB SRAM
    (5MB base + small adapter + activations) and meets FPS constraints.
  common_mistake: Suggesting running both models sequentially on every frame, which doubles latency and
    power draw, immediately violating the 50 FPS requirement and the AR thermal envelope.
  napkin_math: 'Dual execution per frame: 15ms * 2 = 30ms (33 FPS, violates 50 FPS req). Power: 200mW
    continuous. Interleaved (1/10 ratio): Avg latency = (9*15ms + 1*30ms)/10 = 16.5ms (approx 60 FPS).
    Avg power = 110mW. Memory: 5MB base + 0.2MB adapter + 2MB activations = 7.2MB < 8MB SRAM.'
