title: Hailo-8 Multi-Camera Ingestion Bandwidth
scenario: You are deploying a real-time multi-camera tracking system on a single Hailo-8 accelerator (26 TOPS INT8, 2.5W). The system continuously ingests video streams from six 1080p (1920x1080) RGB cameras running at 30 FPS. Because the Hailo-8 is a dataflow architecture with no local DRAM, all input data must be streamed directly from host memory in real-time.
question: What continuous host-to-Hailo-8 bandwidth is required to stream six uncompressed 1080p RGB cameras at 30 FPS?
details:
  realistic_solution: Since the Hailo-8 relies on streaming from the host, the host system must guarantee sufficient uncompressed throughput over its PCIe interface without interruption. The engineer must calculate the exact byte throughput and ensure it leaves headroom on the system bus for host-side operations, while leveraging the chip's high 10.4 TOPS/W efficiency.
  common_mistake: |
    **The Pitfall:** Forgetting color channels or assuming the accelerator has large local buffers.
    **The Rationale:** Candidates often calculate bandwidth for a grayscale image (1 byte/pixel) instead of RGB (3 bytes/pixel), or they ignore the fundamental 'no local DRAM' constraint of the Hailo-8 architecture.
    **The Consequence:** Severely underestimating the required PCIe/host bandwidth, leading to a system design that drops frames or stalls the accelerator due to data starvation.
  napkin_math: |
    * Single frame size: 1920 * 1080 pixels * 3 bytes (RGB) = 6,220,800 bytes (**~6.22 MB/frame**).
    * Total frame rate: 6 cameras * 30 FPS = 180 FPS.
    * Total required bandwidth: 180 FPS * 6.22 MB/frame = 1,119.6 MB/s.
    * The host must sustain a continuous stream of **~1.12 GB/s**.
