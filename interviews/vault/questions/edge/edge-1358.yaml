title: Hailo-8 Multi-Camera Ingestion Bandwidth
scenario: You are deploying a real-time multi-camera tracking system on a single Hailo-8
  accelerator (26 TOPS INT8, 2.5W). The system continuously ingests video streams
  from six 1080p (1920x1080) RGB cameras running at 30 FPS. Because the Hailo-8 is
  a dataflow architecture with no local DRAM, all input data must be streamed directly
  from host memory in real-time. Calculate the continuous host-to-accelerator memory
  bandwidth required to stream these uncompressed frames.
question: What continuous host-to-Hailo-8 bandwidth is required to stream six uncompressed
  1080p RGB cameras at 30 FPS?
details:
  realistic_solution: Since the Hailo-8 relies on streaming from the host, the host
    system must guarantee sufficient uncompressed throughput over its PCIe interface
    without interruption. The engineer must calculate the exact byte throughput and
    ensure it leaves headroom on the system bus for host-side operations, while leveraging
    the chip's high 10.4 TOPS/W efficiency.
  common_mistake: Candidates often forget to multiply by the number of color channels
    (3 for RGB) or mistakenly assume the accelerator can buffer large batches of frames
    locally, ignoring the 'no local DRAM' constraint of the Hailo-8 architecture.
  napkin_math: 'Frame size: 1920 pixels * 1080 pixels * 3 bytes (RGB) = 6,220,800
    bytes (~6.22 MB/frame). Total frames per second: 6 cameras * 30 FPS = 180 FPS.
    Total required bandwidth: 180 FPS * 6.22 MB/frame = 1,119.6 MB/s (approx 1.12
    GB/s). The host must sustain a 1.12 GB/s continuous stream.'
