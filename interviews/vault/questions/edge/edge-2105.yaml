title: 'Federated Learning on Hailo-8 Edge Devices: Power-Efficient Convergence with Non-IID Data'
scenario: Imagine you are designing a federated learning system for a network of battery-powered edge devices, each equipped with a Hailo-8 AI accelerator (26 TOPS INT8, 2.5W power consumption). Your goal is to train a privacy-preserving image classification model using federated averaging. The data distribution across devices is highly non-IID, and communication bandwidth is limited.
question: How do model architecture, local epochs, and aggregation frequency trade off convergence, communication, and energy on Hailo-8 federated learning?
details:
  realistic_solution: 'A realistic solution involves employing a multi-faceted approach: 1. Design inherently small models and apply sparsification. 2. Implement adaptive communication strategies, where devices only send updates when a significant change occurs. 3. Address non-IID data locally using data augmentation or synthesis. 4. Dynamically select devices for participation based on battery and data availability.'
  common_mistake: |
    **The Pitfall:** Ignoring cumulative training and communication energy costs.
    **The Rationale:** Developers assume the Hailo-8's low inference power translates directly to low training overhead, and neglect the impact of non-IID data, running excessive local epochs that drain the battery.
    **The Consequence:** The devices rapidly exhaust their power budgets and drop off the network before convergence is achieved.
  napkin_math: |
    1. **Energy Cost:** 1 epoch = 50 J. 1 update transmission = 20 J.
    2. **Total Round Cost:** (10 epochs * 50 J/epoch) + 20 J/update = 520 Joules per device.
    3. **Time to Execute:** 520 J / 2.5 W power budget = 208 seconds.
    **Result: A single round consumes 520 Joules and ties up the device for over 3 minutes, showing how sensitive the system is to epoch counts.**
