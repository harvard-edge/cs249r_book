title: CI/CD Performance Gating for Qualcomm Cloud AI 100
scenario: You are setting up an automated hardware-in-the-loop CI/CD pipeline to validate models before
  deploying them to a Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x, 75W). The pipeline runs a performance
  test on every commit to ensure training-serving consistency. A new INT8-quantized object detection model
  requires 500 GOPS per inference. Assuming the pipeline test script achieves exactly 75% utilization
  of the accelerator's theoretical peak INT8 compute, calculate the inferences per second (IPS) threshold
  that the CI/CD pipeline should use to gate the deployment.
details:
  realistic_solution: The CI/CD pipeline needs a realistic target to prevent performance regressions.
    By taking the theoretical peak compute of the Qualcomm Cloud AI 100, applying the expected utilization,
    and dividing by the model's compute requirement, we can establish a strict baseline metric for the
    deployment gate. We multiply 400 TOPS by 1000 to get 400,000 GOPS, apply the 75% utilization, and
    divide by the 500 GOPS/inference cost.
  common_mistake: Candidates often forget to convert TOPS to GOPS correctly, or they ignore the 75% utilization
    factor and calculate the theoretical maximum instead of the pipeline's expected threshold. Some might
    also try to unnecessarily factor in the 75W power limit when compute is the defining metric for this
    gate.
  napkin_math: 1. Peak Compute = 400 TOPS = 400,000 GOPS. 2. Effective Pipeline Compute = 400,000 GOPS
    * 0.75 utilization = 300,000 GOPS. 3. Target IPS Gate = 300,000 GOPS / 500 GOPS per inference = 600
    inferences per second.
