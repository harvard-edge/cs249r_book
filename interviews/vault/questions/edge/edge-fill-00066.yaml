title: Optimizing Edge ML Inference on Google Coral Edge TPU
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV2-SSD) to a fleet
  of smart cameras, each powered by a Google Coral Edge TPU. The Coral Edge TPU provides 4 TOPS (INT8),
  consumes 2W, and exclusively supports INT8 quantization. Initial testing reveals that the current model
  inference latency often exceeds the required 50ms per frame, leading to dropped frames and degraded
  user experience. The current power consumption is also close to the 2W limit, leaving little headroom
  for additional processing. You suspect a bottleneck related to data movement and compute efficiency
  given the Edge TPU's specific characteristics. Diagnose the likely bottlenecks and propose quantifiable
  solutions to meet the performance and power constraints.
details:
  realistic_solution: 1. **Quantization-aware Training (QAT):** Retrain the model with QAT to maximize
    INT8 performance and accuracy on the Edge TPU, ensuring all operations are compatible with its INT8
    instruction set. 2. **Model Architecture Optimization:** Explore highly efficient object detection
    architectures specifically designed for edge, such as EfficientDet-Lite or MobileNetV3-SSD, which
    are known to perform well after INT8 quantization. 3. **Input Pipeline Optimization:** Profile and
    optimize the pre-processing pipeline (e.g., image decoding, resizing, normalization) on the host CPU,
    ensuring minimal latency and efficient data transfer to the TPU to avoid CPU-bound bottlenecks. 4.
    **Batching Strategy:** Experiment with optimal batch sizes for inference on the Edge TPU to fully
    saturate its compute units, balancing throughput with per-frame latency requirements. 5. **Operator
    Compatibility Review:** Ensure all model operations are fully supported and optimized by the Edge
    TPU runtime; replace or refactor unsupported operations if necessary to avoid fallback to host CPU.
  common_mistake: Proposing solutions that rely on FP16/FP32 precision, using larger, less efficient models
    without considering INT8 quantization specifics, or suggesting software optimizations (like kernel
    development) without understanding the fixed nature of the Edge TPU's custom ASIC architecture.
  napkin_math: 'To meet 50ms latency, we need 20 frames per second (FPS). If the current model consumes
    1.8W (near the 2W limit) and takes 100ms, we need to reduce inference time by 50% and potentially
    power by at least 15% (to stay under ~1.7W and leave headroom). If the model requires ~1 TOPS of INT8
    operations, and the TPU provides 4 TOPS, theoretically it can process multiple frames. The bottleneck
    is likely *not* raw TOPS but efficiency of op mapping, data movement, or host CPU pre/post-processing.
    Quantifying: if QAT improves throughput by 30% and reduces effective power by 10%, a 100ms inference
    might drop to ~77ms, and power from 1.8W to 1.62W, still requiring further optimization. Selecting
    a model that is 2x more efficient could halve inference time and power directly.'
