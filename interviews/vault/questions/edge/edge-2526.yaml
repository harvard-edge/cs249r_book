title: 1GbE Star Topology Collision Domain
scenario: 5 Jetson Orin Nanos share an unmanaged 1GbE switch in a star topology. 4 edge nodes simultaneously push a 25 MB model update to the 1 central hub node.
question: Calculate the total transfer time, accounting for the collision domain bottleneck.
details:
  realistic_solution: The bottleneck is the single 1GbE (125 MB/s) receiving link of the central hub node. The 4 senders generate 100 MB of aggregate traffic that must serialize into this single port. Time = 100 MB / 125 MB/s = 800ms.
  common_mistake: |
    **The Pitfall:** Calculating time as 25 MB / 125 MB/s = 200ms, assuming concurrent full-speed transfers.
    **The Rationale:** Overlooking that while the switch fabric has high aggregate bandwidth, a single receiving port is limited by physical link speed.
    **The Consequence:** Severe underestimation of network transfer times in distributed edge systems, leading to missed real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 nodes sending 25 MB each to a single hub.
       - Hub has a single 1GbE port (125 MB/s).
    2. **Calculations:**
       - Aggregate Data: 4 * 25 MB = 100 MB.
       - Serialization: 100 MB / 125 MB/s = 0.8 seconds (800ms).
    3. **Conclusion & Interpretation:**
       - **Result: Total transfer time is 800ms. (Network-Bandwidth-Bound)**
