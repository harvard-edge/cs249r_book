title: 1GbE Star Topology Collision Domain
scenario: 5 Jetson Orin Nanos share an unmanaged 1GbE switch in a star topology. 4
  edge nodes simultaneously push a 25 MB model update to the 1 central hub node.
question: Calculate the total transfer time, accounting for the collision domain bottleneck.
details:
  realistic_solution: The bottleneck is the single 1GbE (125 MB/s) receiving link
    of the central hub node. The 4 senders generate 100 MB of aggregate traffic that
    must serialize into this single port. Time = 100 MB / 125 MB/s = 800ms.
  common_mistake: Calculating time as 25 MB / 125 MB/s = 200ms, falsely assuming the
    switch fabric magically increases the physical receiving speed of the hub's network
    interface.
  napkin_math: Aggregate Data = 4 * 25 MB = 100 MB. Link Speed = 1 Gbps = 125 MB/s.
    100 / 125 = 0.8 seconds.
