title: 1GbE Star Topology Collision Domain
scenario: 5 Jetson Orin Nanos share an unmanaged 1GbE switch in a star topology. 4 edge nodes simultaneously push a 25 MB model update to the 1 central hub node.
question: Calculate the total transfer time, accounting for the collision domain bottleneck.
details:
  realistic_solution: The bottleneck is the single 1GbE (125 MB/s) receiving link of the central hub node. The 4 senders generate 100 MB of aggregate traffic that must serialize into this single port. Time = 100 MB / 125 MB/s = 800ms.
  common_mistake: |
    **The Pitfall:** Calculating time as 25 MB / 125 MB/s = 200ms, assuming concurrent full-speed transfers.
    **The Rationale:** It is easy to overlook that while the switch fabric has high aggregate bandwidth, a single receiving port is still limited by its physical link speed.
    **The Consequence:** Severe underestimation of network transfer times in distributed edge systems, leading to missed real-time deadlines or orchestration timeouts.
  napkin_math: |
    1. **Aggregate Data:** 4 nodes * 25 MB/node = 100 MB total data destined for the hub.
    2. **Hub Link Speed:** The single 1GbE port on the hub node has a maximum theoretical bandwidth of 1 Gbps = 125 MB/s.
    3. **Serialization:** All 100 MB must serialize through this single 125 MB/s bottleneck.
    4. **Result:** Total transfer time = 100 MB / 125 MB/s = **0.8 seconds (800ms)**.
