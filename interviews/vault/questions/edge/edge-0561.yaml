title: The Stereo Depth vs Monocular Trade-off
scenario: Your autonomous forklift uses stereo cameras (2× 1080p at 30 FPS) for depth estimation. The
  stereo matching algorithm runs on the TI TDA4VM's hardware stereo accelerator and produces dense depth
  maps at 5ms per frame. A colleague proposes replacing stereo with a single camera plus a monocular depth
  estimation neural network (MiDaS-small, 2 GFLOPs), arguing it halves the camera cost and cable complexity.
  Walk me through the bandwidth, compute, and accuracy trade-offs.
details:
  realistic_solution: 'The trade-off has three axes: Stereo bandwidth: 248.8 MB/s. Monocular: 124.4 MB/s
    (50% savings). Stereo compute: 5ms (free accelerator). Monocular compute: 8ms (competes with perception
    DSP budget of 20ms). Stereo depth error at 1'
  common_mistake: '"Monocular depth is always worse because it''s estimated, not measured." This oversimplifies
    — monocular depth has real advantages in some edge scenarios, and stereo has hidden costs beyond the
    second camera.'
  napkin_math: 'Stereo bandwidth: 248.8 MB/s. Monocular: 124.4 MB/s (50% savings). Stereo compute: 5ms
    (free accelerator). Monocular compute: 8ms (competes with perception DSP budget of 20ms). Stereo depth
    error at 10m: ±0.2m. Monocular depth error at 10m: ±2.5m (12.5× worse). For a forklift stopping distance
    of 1.5m at 2 m/s: stereo error (0.2m) is safe, monocular error (2.5m) exceeds stopping distance →
    unsafe.'
