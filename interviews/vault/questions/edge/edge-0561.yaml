title: The Stereo Depth vs Monocular Trade-off
scenario: Your autonomous forklift uses stereo cameras (2x 1080p at 30 FPS) for depth estimation. The stereo matching algorithm runs on the TI TDA4VM's hardware stereo accelerator and produces dense depth maps at 5ms per frame. A colleague proposes replacing stereo with a single camera plus a monocular depth estimation neural network (MiDaS-small, 2 GFLOPs), arguing it halves the camera cost and cable complexity.
question: "What are the bandwidth, compute, and accuracy trade-offs of replacing stereo with MiDaS-small monocular depth on the TDA4VM forklift?"
details:
  realistic_solution: 'The trade-off has three axes: Bandwidth is halved, compute increases significantly (stealing from the general perception budget rather than using a free hardware accelerator), and depth error increases massively at distance, crossing the safety threshold for stopping.'
  common_mistake: |
    **The Pitfall:** Rejecting monocular depth purely because "it's estimated, not measured."
    **The Rationale:** Candidates often rely on platitudes rather than quantifying the exact performance and safety envelope differences for the specific hardware.
    **The Consequence:** The candidate fails to mathematically prove that the safety stopping distance is violated, missing the true engineering constraint.
  napkin_math: |
    1. Stereo bandwidth: 248.8 MB/s. Monocular: 124.4 MB/s (50% savings).
    2. Stereo compute: 5ms (free accelerator). Monocular compute: 8ms (competes with perception DSP budget of 20ms).
    3. Stereo depth error at 10m: ±0.2m. Monocular depth error at 10m: ±2.5m (12.5x worse).
    4. **For a forklift stopping distance of 1.5m at 2 m/s: stereo error (0.2m) is safe, but monocular error (2.5m) exceeds stopping distance and is therefore unsafe.**
