title: K3s GPU Scheduling for Jetson Orin Fleet Management
scenario: You're managing a fleet of 50 Jetson Orin devices running computer vision inference at factory sites. Devices have intermittent connectivity (reconnect every 15-30 minutes). You're using K3s (lightweight Kubernetes) for orchestration. Pod scheduling fails during connectivity gaps.
question: How would you keep K3s inference pods running on 50 intermittently connected Jetson Orins when scheduling fails during outages?
details:
  realistic_solution: Use K3s with local-path storage and node-level autonomy. Enable --node-status-update-frequency=5m to reduce API chatter. Use DaemonSets (not Deployments) for inference pods - DaemonSets are scheduled locally and continue running without API server contact. Implement local health checks via systemd watchdog. Use NVIDIA device plugin for K3s with helm chart tailored for Jetson.
  common_mistake: |
    **The Pitfall:** Using standard Kubernetes deployment controllers.
    **The Rationale:** Candidates assume standard cloud Kubernetes patterns apply seamlessly to intermittent edge environments.
    **The Consequence:** Pods enter a Pending state during network outages, halting inference entirely.
  napkin_math: |
    - Node-not-ready timeout: 5 minutes.
    - Eviction rate: 50 devices * 1 eviction/8 hours = 6.25 evictions/hour.
    - Model reload overhead: 14GB model / 204GB/s = 0.069s GPU load + 2-3s container startup.
    - DaemonSets avoid eviction entirely during disconnects.
    **DaemonSets improve availability from ~95% to ~99.9% by preventing evictions.**
