title: Decoupled IPC Serving on Jetson Orin
scenario: A self-checkout kiosk using a Jetson AGX Orin runs object detection (barcode/item
  scanning).
question: Design a multi-process serving architecture with TensorRT that allows the
  GUI to remain responsive at 60 FPS while inference runs at 10 FPS.
details:
  realistic_solution: Decouple the camera ingest/GUI process from the inference process
    using asynchronous IPC (like shared memory or a ZeroMQ socket). The inference
    runs on the GPU via TensorRT in a separate thread, pulling the latest frame from
    the shared buffer without blocking the UI rendering loop.
  common_mistake: Coupling the UI rendering loop and inference call in the same thread,
    causing the screen to freeze during execution.
  napkin_math: 1000 / 60 = 16ms UI vs 100ms Inference
