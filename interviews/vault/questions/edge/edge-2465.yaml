title: Decoupled IPC Serving on Jetson Orin
scenario: A self-checkout kiosk using a Jetson AGX Orin runs object detection (barcode/item scanning).
question: Design a multi-process serving architecture with TensorRT that allows the GUI to remain responsive at 60 FPS while inference runs at 10 FPS.
details:
  realistic_solution: Decouple the camera ingest/GUI process from the inference process using asynchronous IPC (like shared memory or a ZeroMQ socket). The inference runs on the GPU via TensorRT in a separate thread, pulling the latest frame from the shared buffer without blocking the UI rendering loop.
  common_mistake: |
    **The Pitfall:** Coupling the UI rendering loop and inference call in the same thread.
    **The Rationale:** Junior developers often write monolithic scripts where the next camera frame isn't drawn until `model.predict()` returns.
    **The Consequence:** The screen freezes for 100ms during every inference execution, leading to a choppy and unusable 10 FPS UI.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - UI Target Rate: 60 FPS.
       - Inference Rate: 10 FPS.
    2. **Calculations:**
       - UI Loop Delay Target: 1000ms / 60 FPS = 16.6ms.
       - Inference Delay Target: 1000ms / 10 FPS = 100ms.
    3. **Conclusion & Interpretation:**
       - **Result: IPC Decoupling Needed**. Since 100ms > 16.6ms, executing inference identically blocks the render thread, destroying UX fluidity without IPC layers.
