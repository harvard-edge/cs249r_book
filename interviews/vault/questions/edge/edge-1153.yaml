title: 'Edge TCO Diagnosis: Hailo-8 Deployment Failure Root Cause'
scenario: 'A company deployed 500 Hailo-8 units ($200 each) for retail analytics. After 1 year, the model accuracy dropped below threshold and 10% of units needed replacement. Engineering spent 800 hours recalibrating models. Engineer rate: $100/hour. Expected: unit runs 3 years without intervention.'
question: 'What hidden costs explain the Hailo-8 fleet overrun, and what is the true 1-year TCO versus the expected TCO?'
details:
  realistic_solution: 'Expected TCO: 500 * $200 = $100K hardware. Power: 500*7.5W*8760hr*$0.10=$3,285. Maintenance budget (3%): $3K/yr. Total expected: $106.3K/yr. Actual 1-year TCO: HW=$100K + Replacements (10%*500*$200)=$10K + Engineering (800hrs*$100)=$80K + Power=$3,285 + expected maint=$3K = $196,285. Hidden cost multiplier: $196K/$106K = 1.85x. Root cause: INT8 quantization is sensitive to lighting changes and camera model drift. Fix: implement continual calibration pipeline (automated, $5K one-time) + better INT8-aware training. Expected 2nd year: $106K + $5K calibration + $10K reduced eng (automated) = $121K.'
  common_mistake: |
    **The Pitfall:** Building the TCO model assuming zero ongoing engineering labor for model maintenance and hardware calibration in edge deployments.
    **The Rationale:** Candidates often focus purely on hardware BoM and power, assuming software maintenance is a sunk cost or zero.
    **The Consequence:** This is rarely realistic for production systems and leads to severe underestimation of operational costs.
  napkin_math: |
    - **Year 1 actual:** $100K HW + $10K replacements + $80K engineering + $3.3K power + $3K maint = **$196.3K**.
    - **Year 1 expected:** $100K + $3.3K + $3K = **$106.3K**.
    - **Hidden cost:** $90K (85% from unexpected engineering).
    - **Per-unit actual:** $196.3K / 500 = **$392.6** vs expected $212.6.
