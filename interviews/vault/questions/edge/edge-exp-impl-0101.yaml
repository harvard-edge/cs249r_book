title: Jetson Orin GPU vs DLA Efficiency
scenario: We are partitioning an INT8 inference workload on an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP,
  275 TOPS total). We can deploy the model on either the Ampere GPU or the fixed-function DLA (Deep Learning
  Accelerator) ASIC. Suppose the DLA provides 105 TOPS and consumes 15W of the power budget, while the
  GPU provides the remaining 170 TOPS and consumes the remaining 45W. Our vision model requires 250 GOPS
  per frame. Calculate the theoretical maximum frame rate (FPS) and the energy cost (Joules per frame)
  for both a DLA-only and a GPU-only deployment.
question: "What are the theoretical maximum FPS and Joules per frame for DLA-only versus GPU-only deployment of the 250 GOPS/frame model?"
details:
  realistic_solution: The candidate should convert the TOPS for each accelerator into GOPS, then divide
    by the model's 250 GOPS requirement to find the maximum FPS. To find the energy efficiency, they must
    divide the power consumption (Joules/sec) of each accelerator by its respective FPS (frames/sec).
    This quantifies the efficiency trade-off between the highly programmable GPU and the highly efficient
    DLA.
  common_mistake: Candidates often forget to convert TOPS (Tera Operations) to GOPS (Giga Operations)
    by multiplying by 1000. Additionally, they frequently calculate Joules per second instead of Joules
    per frame by mistakenly multiplying power by FPS rather than dividing power by FPS.
  napkin_math: 'DLA calculation: 105 TOPS = 105,000 GOPS. DLA FPS = 105,000 / 250 = 420 FPS. DLA Energy
    = 15W / 420 FPS = 0.0357 Joules/frame (~36 mJ). GPU calculation: 170 TOPS = 170,000 GOPS. GPU FPS
    = 170,000 / 250 = 680 FPS. GPU Energy = 45W / 680 FPS = 0.0661 Joules/frame (~66 mJ). The DLA uses
    nearly half the energy per frame compared to the GPU.'
