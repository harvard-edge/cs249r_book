title: Edge TPU Quantization and Bottleneck Analysis
scenario: You are deploying an 8 million parameter computer vision model on a Google Coral Edge TPU. The original FP32 model is rejected by the Edge TPU compiler. After quantizing to INT8, it runs, but profiling reveals the system is heavily bottlenecked by the USB connection rather than the 4 TOPS compute.
question: Why does the Coral reject the 8M-parameter FP32 model, and what are the FP32 and INT8 memory footprints that make USB I/O dominate?
details:
  realistic_solution: The Coral Edge TPU's ALUs are physically designed exclusively for 8-bit integer arithmetic; it has no silicon for floating-point math, meaning unsupported FP32 operators must fall back to the host CPU. Quantizing to INT8 reduces the parameter precision from 32 bits to 8 bits, cutting the memory footprint by exactly 4x. However, because the TPU is so fast, the time taken to stream input frames and retrieve outputs over the limited USB bandwidth vastly outweighs the actual INT8 execution time.
  common_mistake: |
    **The Pitfall:** Assuming hardware accelerators natively emulate FP32.
    **The Rationale:** Candidates forget the Coral Edge TPU has no silicon for floating-point math and focus purely on the 4 TOPS compute spec instead of USB data transfer constraints.
    **The Consequence:** Inaccurately predicting latency because they ignore the 200ms penalty of streaming the model over USB.
  napkin_math: |
    - **FP32 Model Size:** 8,000,000 parameters * 4 bytes/parameter = 32 MB.
    - **INT8 Model Size:** 8,000,000 parameters * 1 byte/parameter = 8 MB.
    - **Transfer time:** USB 2.0 (40 MB/s real-world) transferring 8 MB takes 8 MB / 40 MB/s = 0.2 seconds (200 ms).
    - **Compute time:** 4 TOPS for an INT8 model takes < 1 ms.
    - **Final result:** **The 200ms transfer completely eclipses the <1ms compute time, proving it is I/O bound.**
