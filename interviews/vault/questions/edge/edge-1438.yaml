title: Edge TPU Quantization and Bottleneck Analysis
scenario: You are deploying an 8 million parameter computer vision model on an Edge TPU. The original FP32 model is rejected by the compiler. After quantizing to INT8, it runs, but profiling reveals the system is heavily bottlenecked by the USB connection rather than the compute units.
question: Why does the Coral reject the 8M-parameter FP32 model, and what are the FP32 and INT8 memory footprints that make USB I/O dominate?
details:
  realistic_solution: The Edge TPU's ALUs are physically designed exclusively for 8-bit integer arithmetic; it lacks silicon for floating-point math, forcing unsupported FP32 operators to fall back to the host CPU. Quantizing to INT8 drops parameter precision from 32 bits to 8 bits, cutting the footprint by exactly 4x. However, because the TPU executes inference so rapidly, streaming input frames and retrieving outputs over limited USB bandwidth fundamentally eclipses execution time.
  common_mistake: |
    **The Pitfall:** Assuming hardware accelerators natively emulate FP32.
    **The Rationale:** Candidates forget the Coral Edge TPU has no silicon for floating-point math and focus purely on the compute spec instead of USB data transfer constraints.
    **The Consequence:** Inaccurately predicting latency because they ignore the 200ms penalty of streaming the model over USB.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Model: 8M parameters, FP32
       - Quantized Model: INT8
       - USB 2.0 Bandwidth: ~40 MB/s
       - Edge TPU Compute: 4 TOPS
    2. **Calculations:**
       - FP32 size: 8,000,000 * 4 bytes = 32 MB
       - INT8 size: 8,000,000 * 1 byte = 8 MB
       - Transfer latency (INT8): 8 MB / 40 MB/s = 200 ms
       - Compute latency (INT8): ~1 ms
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Bottleneck.** The 200 ms USB transfer completely eclipses the <1 ms inference time.
