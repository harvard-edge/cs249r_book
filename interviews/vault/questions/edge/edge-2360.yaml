title: Orin NVMe Interconnect Standard
scenario: An edge video analytics pipeline on an AGX Orin requires writing highly compressed feature streams directly to non-volatile local storage.
question: Identify the primary high-speed interconnect topology standard used by the Jetson AGX Orin to attach local NVMe storage.
visual:
  kind: svg
  path: edge-2360.svg
  alt: Block diagram showing the Orin SoC connected to NVMe via PCIe Gen4.
  caption: PCIe Gen4 x4 NVMe Interconnect Topology.
details:
  realistic_solution: The standard high-speed interconnect used to attach NVMe storage to a Jetson AGX Orin is PCIe (specifically, Gen4). A typical configuration uses a PCIe Gen4 x4 lane configuration to provide bi-directional storage throughput up to ~8 GB/s.
  common_mistake: |
    **The Pitfall:** Confusing the interface protocol with legacy storage types.
    **The Rationale:** Candidates say SATA or USB instead of recognizing the underlying root complex.
    **The Consequence:** They fail to design systems capable of sustaining high-throughput, low-latency storage I/O.
  napkin_math: |
    - **PCIe Gen4 Bandwidth:** ~2 GB/s per lane.
    - **Topology Capacity:** x4 lanes = **~8 GB/s** bi-directional throughput.
