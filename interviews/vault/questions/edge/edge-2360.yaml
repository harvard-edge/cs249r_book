title: Orin NVMe Interconnect Standard
scenario: An edge video analytics pipeline on an AGX Orin requires writing highly
  compressed feature streams directly to non-volatile local storage.
question: Identify the primary high-speed interconnect topology standard used by the
  Jetson AGX Orin to attach local NVMe storage.
visual:
  kind: svg
  path: edge-2360.svg
  alt: Block diagram showing the Orin SoC connected to NVMe via PCIe Gen4.
  caption: PCIe Gen4 x4 NVMe Interconnect Topology.
details:
  realistic_solution: The standard high-speed interconnect used to attach NVMe storage
    to a Jetson AGX Orin is PCIe (specifically, Gen4). A typical configuration uses
    a PCIe Gen4 x4 lane configuration to provide bi-directional storage throughput
    up to ~8 GB/s.
  common_mistake: Saying SATA or USB instead of identifying the internal PCIe root
    complex that enables high-speed NVMe communication.
  napkin_math: PCIe Gen4 is ~2 GB/s per lane. x4 lanes = ~8 GB/s.
