title: Hailo-8 Stream Routing and PCIe Bottleneck Analysis
scenario: You are deploying a multi-camera traffic analysis system using an edge IPC equipped with 4 Hailo-8
  accelerators (26 TOPS INT8, 2.5W each). Incoming video frames from 16 cameras are routed to the accelerators
  using a simple round-robin load balancer. The system is dropping frames at peak load, and profiling
  shows the accelerators are often stalled waiting for data despite having no local DRAM and streaming
  directly from host memory via PCIe. Analyze the routing bottleneck and quantify the performance improvement
  of an optimized load balancing strategy.
question: "Why does round-robin routing stall the 16-camera Hailo-8 system, and how much would stream-affinity routing improve throughput?"
details:
  realistic_solution: The round-robin approach scatters streams across all accelerators, forcing each
    Hailo-8 to constantly switch contexts and flush its internal dataflow pipeline since it has no local
    DRAM to cache intermediate states. The fix is to implement stream-affinity routing (e.g., sticky routing),
    where specific camera streams are statically pinned to a dedicated Hailo-8. This maximizes the dataflow
    architecture's efficiency by streaming contiguous frames from the same source, reducing PCIe thrashing
    and pipeline reconfigurations.
  common_mistake: Candidates often suggest adding memory to the accelerators or using consistent hashing
    without realizing the Hailo-8 relies entirely on host memory streaming. They might also propose complex
    software routing that adds CPU overhead rather than optimizing the PCIe DMA transfers.
  napkin_math: Assuming 1080p frames at 30 FPS (approx 6MB/frame uncompressed). Total bandwidth = 16 cameras
    * 30 FPS * 6MB = 2.88 GB/s. With round-robin, each of the 4 Hailo-8 chips receives a new frame from
    a different camera every cycle, requiring a pipeline reconfiguration overhead of 2ms per switch. At
    120 frames/sec per chip, overhead = 120 * 2ms = 240ms/sec (24% stall time). By pinning 4 cameras to
    each Hailo-8 (stream affinity), context switches drop to zero for continuous streams, reclaiming 24%
    of the 26 TOPS compute capacity per chip.
