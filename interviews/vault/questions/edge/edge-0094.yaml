title: The Optimization Ladder
scenario: Your YOLOv8-S runs at 15 FPS on an edge device. You need 30 FPS. Your team immediately starts designing a custom smaller architecture.
question: Why is designing a custom architecture the wrong first step?
details:
  realistic_solution: 'Designing a custom architecture is wrong because you haven''t exhausted the optimization ladder — a prioritized sequence from cheapest to most expensive. Step 1: Export to TensorRT with FP16 (~1.8x speedup, 2 hours of work) = 27 FPS. Step 2: INT8 quantization with calibration (~1.7x additional, 4 hours) = 46 FPS. You''ve already exceeded 30 FPS with 2 days of engineering. A custom architecture requires months of design, training, and validation. The ladder: (1) compiler optimization, (2) precision reduction, (3) operator fusion, (4) pruning/distillation, (5) architecture change. Always exhaust cheaper rungs first.'
  common_mistake: |
    **The Pitfall:** Immediately defaulting to training a smaller custom architecture.
    **The Rationale:** Candidates fail to realize that architecture changes are the most expensive optimization.
    **The Consequence:** Wasting months of engineering time when cheaper compiler or quantization optimizations could solve the problem in days.
  napkin_math: |
    - Baseline (PyTorch FP32): 15 FPS.
    - Step 1 (TensorRT FP16, ~1.8x speedup): $15 * 1.8 = 27$ FPS.
    - Step 2 (INT8, ~1.7x additional): $27 * 1.7 = 46$ FPS.
    - Result: **46 FPS** (1.5x over target) achieved in 2 days vs months for custom architecture.
