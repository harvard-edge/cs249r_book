title: Edge ML Model Rollout on NVIDIA Jetson Orin
scenario: Your team is responsible for deploying and updating an object detection model on a fleet of edge devices in a manufacturing plant. These devices process real-time video streams, and model updates need to be rolled out with minimal disruption and the ability to quickly revert to a previous version if issues arise.
question: How would you ensure observability, seamless transitions between models, and robust rollback mechanisms for both model artifacts and configurations?
details:
  realistic_solution: |
    Architect a multi-stage, Progressive Delivery pipeline using OCI-compliant containers to guarantee environmental immutability. Implement an Over-The-Air (OTA) daemon that supports binary delta updates (e.g., via OSTree or xdelta) to drastically reduce bandwidth consumption. Utilize shadow deployments: load both the active and candidate models into memory simultaneously, routing duplicated video frames to the candidate model to capture telemetry (latency, accuracy) without impacting the critical path. Safeguard the fleet with an automated rollback mechanism tied to a local health watchdog.
  common_mistake: |
    **The Pitfall:** Overlooking heterogeneous network conditions and total power budget during A/B testing.
    **The Rationale:** Assuming cloud-native A/B testing paradigms apply perfectly to edge devices without considering the TDP limits when running dual models in shadow mode.
    **The Consequence:** Failed deployments, device instability, thermal throttling, and excessively long update cycles across the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Artifact Size: 500 MB.
    - Update Bandwidth: 5 Mbps.
    - Delta Update Savings: 80% reduction.

    **Calculations:**
    - Full Update Time: 500 MB / (5 Mbps / 8) = 800 seconds (~13.3 mins).
    - Delta Update Payload: 500 MB * 0.20 = 100 MB.
    - Delta Update Time: 100 MB / 0.625 MB/s = 160 seconds (~2.6 mins).

    **Conclusion & Interpretation:**
    - **Result: Delta updates save 10.6 minutes of downtime per device (Network Bandwidth-Bound)**. OTA transfer.
