title: Dataflow Bottleneck in High-Res Drone NPU
scenario: You are programming an autonomous drone's custom ASIC to run a 4K object detection CNN at 60 FPS. The ASIC has 4MB of on-chip SRAM. The compiler defaults to a Weight-Stationary dataflow. In early layers, the ASIC achieves only 12 FPS, and power monitoring shows the DRAM interface drawing maximum power.
question: Why does the Weight-Stationary dataflow make the 4K CNN hit only 12 FPS and max out DRAM power, and what dataflow should early layers use?
details:
  realistic_solution: Weight-Stationary (WS) dataflows pin tiny weights but force massive, repeating DRAM reads of high-res activations. This thrashes the bandwidth bus. Enforcing Output-Stationary (OS) mapping tiles activations and mitigates external memory loads.
  common_mistake: |
    **The Pitfall:** Downsampling the input image to resolve memory bottlenecks.
    **The Rationale:** Candidates opt to reduce input resolution rather than understanding and changing the underlying hardware dataflow mapping (e.g., from WS to Output-Stationary).
    **The Consequence:** Sacrificing detection accuracy for small objects instead of properly optimizing the memory access pattern for massive early feature maps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Early Layer Input: 3840x2160x3 (INT8) = 24.8 MB
       - On-chip SRAM: 4 MB
       - Dataflow: Weight-Stationary
    2. **Calculations:**
       - 24.8 MB > 4 MB SRAM capacity
       - Single read bandwidth: 24.8 MB * 60 FPS = 1.48 GB/s
       - Channel-thrashing multiplier (~10 reads): 14.8 GB/s just for layer 1
    3. **Conclusion & Interpretation:**
       - **Result: Memory Wall Thrashing.** Severe DRAM saturation causes power spikes and halts FPS.
