title: Dataflow Bottleneck in High-Res Drone NPU
scenario: You are programming an autonomous drone's custom ASIC to run a 4K (3840x2160) object detection CNN at 60 FPS. The ASIC has 4MB of on-chip SRAM and a peak DRAM bandwidth of 25.6 GB/s. The compiler defaults to a Weight-Stationary (WS) dataflow. In early layers, the ASIC achieves only 12 FPS, and power monitoring shows the DRAM interface drawing maximum power.
question: Why does the Weight-Stationary dataflow make the 4K CNN hit only 12 FPS and max out DRAM power, and what dataflow should early layers use?
details:
  realistic_solution: The Weight-Stationary (WS) dataflow keeps weights pinned in the Processing Element (PE) registers while streaming activations from DRAM through the array. For a 4K image, the input activations of the early layers are massive, while the weight matrices (e.g., 3x3x3 x 32 = 864 bytes) are tiny. The 4MB SRAM cannot hold the entire 4K feature map, forcing the ASIC to constantly spill and reload activations from DRAM for every output channel computation. The solution is to reconfigure the compiler to use an Output-Stationary (OS) or Row-Stationary (RS) dataflow for the early layers. By tiling the massive input activations and keeping the intermediate output sums stationary in the PEs, you drastically reduce DRAM read/writes for the heavy feature maps. WS should only be used in later layers where channels are deep and spatial resolution is small.
  common_mistake: |
    **The Pitfall:** Downsampling the input image to resolve memory bottlenecks.
    **The Rationale:** Candidates opt to reduce input resolution rather than understanding and changing the underlying hardware dataflow mapping (e.g., from WS to Output-Stationary).
    **The Consequence:** Sacrificing detection accuracy for small objects instead of properly optimizing the memory access pattern for massive early feature maps.
  napkin_math: |
    - **Early layer input size:** 3840 x 2160 x 3 channels * 1 byte (INT8) = 24.8 MB.
    - **Capacity:** 24.8 MB > 4 MB SRAM.
    - **WS streaming overhead:** The 24.8 MB map must be read multiple times to compute all output channels.
    - **Bandwidth check:** 24.8 MB * 60 FPS = 1.48 GB/s for just a single full read. If read 10 times due to capacity misses, it hits **14.8 GB/s** just for layer 1, saturating the 25.6 GB/s bus quickly.
