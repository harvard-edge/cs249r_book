title: Identifying Jetson Orin Accelerator Routing
scenario: You are setting up local inference traffic management on an NVIDIA Jetson Orin to handle multiple camera streams. The device features an Ampere GPU and a DLA accelerator, offering a combined 275 TOPS INT8 performance within a 60W TDP.
question: What specific NVIDIA software configuration feature allows you to explicitly route incoming inference requests to either the GPU or the DLA for load balancing?
details:
  realistic_solution: The correct factual answer is using Instance Groups in Triton Inference Server or DeviceType/DLACore settings in TensorRT. By defining instance groups, developers can natively implement weighted round-robin routing between the Jetson Orin's Ampere GPU and DLA. This allows the inference server to distribute requests directly to the appropriate hardware queue.
  common_mistake: |
    **The Pitfall:** Suggesting the use of external network load balancers like HAProxy or NGINX for intra-device hardware routing.
    **The Rationale:** Engineers default to network-level load balancing tools they know from cloud microservices when asked to distribute requests.
    **The Consequence:** External proxies introduce severe networking overhead and lack direct visibility into the hardware queues of the GPU and DLA, resulting in extremely poor hardware utilization and high latency.
  napkin_math: |
    1. **Hardware Balance:** The Ampere GPU provides ~170 TOPS, and the DLA provides ~105 TOPS.
    2. **Optimal Ratio:** The weighted round-robin ratio should reflect compute power: 170:105 (approx 1.62:1).
    3. **Traffic Distribution:** For a load of 524 requests/sec, the server routes 324 to the GPU and 200 to the DLA.
    4. **Result:** Using native `InstanceGroup` configurations in Triton automatically maintains this **1.62:1 utilization ratio** internally without external proxies.
