title: Identifying Jetson Orin Accelerator Routing
scenario: You are setting up local inference traffic management on an NVIDIA Jetson Orin to handle multiple camera streams. The device features an Ampere GPU and a DLA accelerator.
question: What specific NVIDIA software configuration feature allows you to explicitly route incoming inference requests to either the GPU or the DLA for load balancing?
details:
  realistic_solution: Use Instance Groups in Triton Inference Server or DeviceType/DLACore settings in TensorRT. Defining instance groups lets developers natively implement weighted round-robin routing between the Jetson Orin's Ampere GPU and DLA, distributing requests directly to the hardware queues.
  common_mistake: |
    **The Pitfall:** Suggesting the use of external network load balancers like HAProxy or NGINX for intra-device hardware routing.
    **The Rationale:** Engineers default to network-level load balancing tools they know from cloud microservices.
    **The Consequence:** External proxies introduce severe networking overhead and lack direct visibility into the hardware queues, resulting in high latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin: 170 TOPS (GPU) and 105 TOPS (DLA).
       - Load: 524 requests/sec.
    2. **Calculations:**
       - Optimal Ratio: 170 / 105 = 1.62:1 (GPU to DLA).
       - Traffic Distribution: 524 requests * (170/275) = 324 to GPU.
       - Traffic Distribution: 524 requests * (105/275) = 200 to DLA.
    3. **Conclusion & Interpretation:**
       - **Result: Native InstanceGroup configurations automatically maintain a 1.62:1 ratio without proxy overhead. (Load-Balancing-Bound)**
