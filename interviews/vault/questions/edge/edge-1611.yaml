title: Calculate Inference Energy on Google Coral Edge TPU
scenario: A quantized INT8 vision model is deployed on a Google Coral Edge TPU (4 TOPS peak compute, 2W power). The model requires 500 million INT8 operations per inference. Assume 100% utilization of compute units.
question: What is the theoretical energy per inference in millijoules (mJ) and the maximum theoretical frames per second (FPS)?
details:
  realistic_solution: Calculate the time taken for one inference using the peak TOPS, and then multiply that duration by the power draw to find the total energy. This gives a theoretical lower bound for energy per operation.
  common_mistake: |
    **The Pitfall:** Mishandling unit conversions between operations, Watts, Joules, and millijoules.
    **The Rationale:** Candidates accurately determine the inference time but fail to correctly multiply by power to derive energy in the correct order of magnitude.
    **The Consequence:** Stating the energy consumption is thousands of times higher or lower than reality, rendering battery-life planning useless.
  napkin_math: |
    * **Time per Inference:** 500 * 10^6 ops / 4 * 10^12 ops/sec = 1.25 * 10^-4 seconds (0.125ms).
    * **Max FPS:** 1 / (1.25 * 10^-4 s) = **8,000 FPS**.
    * **Energy Calculation:** Power * Time = 2W * 1.25 * 10^-4 s = 2.5 * 10^-4 Joules.
    * **Conversion to mJ:** 2.5 * 10^-4 J = **0.25 mJ**.
