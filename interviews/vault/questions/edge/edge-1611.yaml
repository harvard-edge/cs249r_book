title: Calculate Inference Energy on Google Coral Edge TPU
scenario: You are deploying a quantized INT8 vision model on a Google Coral Edge TPU,
  which consumes 2W of power and delivers 4 TOPS of peak compute. Your model requires
  500 million INT8 operations per inference. Assuming 100% utilization of the TPU's
  compute units during inference and ignoring memory transfer overhead for this calculation,
  quantify the theoretical energy consumed per inference in millijoules (mJ) and the
  maximum theoretical frames per second (FPS).
question: For a 500M-op INT8 model on a 4 TOPS, 2W Coral Edge TPU, what are the theoretical
  energy per inference in mJ and max FPS?
details:
  realistic_solution: The correct approach involves calculating the time taken for
    one inference using the peak TOPS, and then multiplying that duration by the power
    draw to find the total energy. This gives a theoretical lower bound for energy
    per operation.
  common_mistake: Candidates often fail to correctly align the units (TOPS to operations,
    Watts to Joules/second) or forget to convert the final energy result into the
    requested millijoules.
  napkin_math: '1. Time per inference = (500 * 10^6 ops) / (4 * 10^12 ops/sec) = 1.25
    * 10^-4 seconds (0.125 ms). 2. Energy per inference = Power * Time = 2 Watts (J/s)
    * 1.25 * 10^-4 s = 2.5 * 10^-4 Joules. 3. Convert to mJ: 2.5 * 10^-4 J = 0.25
    mJ. 4. Max FPS = 1 / (1.25 * 10^-4 s) = 8000 FPS.'
