title: The Hidden Cost of On-Device Training
scenario: An automotive company is deploying a new perception model to a fleet of 1 million vehicles. They are considering two training strategies: (A) a centralized approach, uploading sensor data to the cloud, and (B) a federated learning approach, training on the vehicles and only uploading model gradients.
question: From a Total Cost of Ownership (TCO) perspective, what is the most significant new operational cost introduced by choosing the federated learning approach at this scale?
details:
  realistic_solution: The aggregate energy consumption for on-device training. While each car's training cycle uses a small amount of energy (drawing from the battery, which costs money to charge), multiplying this by a million vehicles creates a substantial, ongoing operational expense that can easily outweigh the savings from reduced data uploads.
  common_mistake: |
    **The Pitfall:** Underestimating fleet-wide power consumption.
    **The Rationale:** Engineers often focus heavily on cloud data transfer savings and view the per-device electricity cost as negligible.
    **The Consequence:** Completely missing a massive aggregate operational expense that ruins the TCO model.
  napkin_math: |
    1. **Daily Device Energy:** 30W extra load * 1 hour/day = 30 Wh per vehicle.
    2. **Fleet Daily Energy:** 30 Wh * 1,000,000 vehicles = 30 MWh/day.
    3. **Annual Fleet Energy:** 30 MWh * 365 = 10,950 MWh.
    4. **Cost:** 10,950 MWh * $150/MWh = $1,642,500/year.
    **Result: Federated learning introduces an aggregate energy cost of ~$1.6M per year.**
  options:
  - Increased server costs for model aggregation.
  - The one-time purchase price (CapEx) of the edge processors.
  - The aggregate fleet-wide energy consumption for on-device computation.
  - The network cost of transmitting model updates.
  correct_index: 2
