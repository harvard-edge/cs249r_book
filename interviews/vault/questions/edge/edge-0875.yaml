title: Constant Folding Binary Bloat
scenario: Deploying a model to an MCU with 2MB Flash and 512KB SRAM. Base weights are 1.2MB. You enable a constant folding compiler pass to precompute a static 'Embedding -> Dense' block. The resulting compiled binary jumps to 3.2MB, failing the Flash allocation.
question: "Why did constant folding the static Embedding -> Dense block expand the MCU binary from 1.2MB to 3.2MB?"
details:
  realistic_solution: Constant folding evaluates the subgraph during compilation and materializes the output tensor directly into the graph as a static constant. The intermediate expanded tensor from the Dense layer is significantly larger than the original compressed embedding weights and input indices combined, replacing a small weight matrix with a massive precomputed activation matrix.
  common_mistake: Assuming constant folding always reduces model size by eliminating runtime operations and intermediate variables.
  napkin_math: 'Cortex-M4 limits: 2MB Flash. Base weights = 1.2MB. Embedding (1000x64) = 64KB. Input = 256 indices. Folded dense output = 256 * 2048 * 4 bytes = 2,097,152 bytes (2.0 MB). With folding, we store the 2.0 MB constant instead of computing it. Total Flash = 1.2MB + 2.0MB = 3.2MB, exceeding Flash.'
