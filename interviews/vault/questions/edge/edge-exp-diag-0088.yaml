title: Latency Spikes During Edge Drift Detection
scenario: An autonomous monitoring system runs a vision model on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). To monitor for environmental data drift, a background
  process runs every 10 minutes to compute KL divergence and PSI on FP32 feature embeddings. During this
  background process, the primary INT8 object detection model experiences a sudden 40% latency spike and
  drops frames. Identify the root cause of this performance degradation based on the Orin's specific hardware
  architecture.
details:
  realistic_solution: The root cause is memory bandwidth contention and thermal throttling. The Jetson
    Orin shares its LPDDR5 bandwidth between the Ampere GPU, DLA, and CPU. While the primary inference
    efficiently uses the DLA/GPU (leveraging the 275 TOPS INT8), computing KL divergence and PSI on unquantized
    FP32 embeddings is highly memory-bound. This intense CPU workload spikes power consumption near the
    60W TDP limit, triggering dynamic frequency scaling (DVFS) that downclocks the Ampere GPU/DLA to save
    power, starving the primary inference of both memory bandwidth and clock speed.
  common_mistake: Candidates often assume the Ampere GPU is running out of compute capacity (TOPS) or
    that the 32 GB of memory is simply filling up. They fail to identify that the Orin uses a shared memory
    architecture, and that mixing INT8 inference with heavily memory-bound FP32 statistical calculations
    creates a bandwidth or power bottleneck.
  napkin_math: The primary INT8 inference at 30 FPS might consume a steady ~5-10 GB/s of memory bandwidth.
    However, computing drift on a sliding window of 250,000 FP32 embeddings (250,000 * 1024 dimensions
    * 4 bytes = 1.02 GB) requires sweeping that 1 GB of data multiple times for histogram binning. If
    the CPU processes this in 0.5 seconds, it demands an additional >6 GB/s of burst bandwidth while maxing
    out CPU utilization. This sudden, sustained load pushes the system towards its 60W TDP maximum. To
    prevent shutting down, the system throttles the Ampere GPU and DLA clocks by ~30-40% to maintain the
    60W envelope, directly causing the observed 40% inference latency spike.
