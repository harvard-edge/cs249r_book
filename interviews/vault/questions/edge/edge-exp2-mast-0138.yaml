validation_issues:
- The calculation for 'maximum latency per frame is 1 / 30 = 33.3 ms' is correct, but then 'Theoretically,
  at full utilization, the accelerator can perform (4 * 10^12) * 0.0333 = 133 giga-operations (GOPS) per
  frame' has a slight numerical inaccuracy. (4 * 10^12) * 0.0333 = 133,200,000,000 operations, which is
  133.2 GOPS, not 133 GOPS.
- The final efficiency calculation 'At 2W, the efficiency' is incomplete and cuts off, it should state
  the FPS/Watt.
