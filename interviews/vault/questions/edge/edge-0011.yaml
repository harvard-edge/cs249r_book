title: The Calibration Drift
scenario: Your agricultural edge AI system uses a multispectral camera (visible + near-infrared) on a Raspberry Pi 4 to detect crop disease. The model achieves 92% accuracy in lab testing. After 6 months of outdoor deployment, accuracy drops to 74%. You retrain with new field data — accuracy recovers to 89% but drops again within 3 months. The model architecture hasn't changed.
question: What is the recurring source of degradation, and how do you build a system that self-corrects?
details:
  realistic_solution: 'The recurring degradation is sensor calibration drift, not concept drift. Multispectral cameras have filters and sensors that degrade with UV exposure, temperature cycling, and dust accumulation. Over 6 months outdoors: (1) the NIR filter''s transmission curve shifts by 5-10 nm due to UV-induced aging of the optical coating, (2) dust on the lens attenuates signal non-uniformly (more at edges), (3) the CMOS sensor''s dark current increases with cumulative heat exposure, shifting the baseline. The model was trained on calibrated sensor data; it now sees systematically different spectral signatures for the same crops. Retraining temporarily compensates (the model learns the new sensor characteristics), but the drift continues. The fix is a runtime calibration pipeline: (a) include a calibration target (known spectral reference card) in the camera''s field of view, captured once daily, (b) compute a per-pixel, per-band correction matrix by comparing the reference card''s measured values to its known values, (c) apply the correction matrix to every frame before inference. This decouples model accuracy from sensor drift. Cost: one $15 reference card per camera + ~5ms of CPU preprocessing per frame.'
  common_mistake: |
    **The Pitfall:** Blaming concept drift or suggesting more diverse training data.
    **The Rationale:** Candidates fail to account for physical hardware degradation, such as sensor calibration drift due to UV exposure and thermal cycling.
    **The Consequence:** The team wastes resources constantly retraining the model on drifting data without addressing the root physical cause.
  napkin_math: |
    - **NIR filter drift:** 5 nm shift over 6 months.
    - **Reflectance difference:** Healthy vs diseased leaf delta is ~15%. A 5 nm shift causes ~3% systematic error.
    - **Impact:** 3% error is 20% of the signal — enough to flip classifications.
    - **Calibration overhead:** 4x4 transform per band * 5 bands = 80 ops/pixel * 2M pixels = 160M ops.
    - **Latency:** ~5ms on Cortex-A72 with NEON.
