title: Thermal Design for Fanless Jetson Orin in IP67 Enclosure
scenario: A Jetson Orin NX (15W TGP in MAXN mode) must operate in an IP67-sealed enclosure for outdoor
  robotics at 40°C ambient. The aluminum enclosure has a thermal resistance of 8°C/W from chip to case,
  3°C/W from case to ambient. Calculate maximum sustainable TGP and whether thermal throttling occurs.
question: "At 40°C ambient with 11°C/W total thermal resistance, what TGP can the sealed Orin NX sustain and will 15W throttle?"
details:
  realistic_solution: 'Total thermal resistance: θ_jc + θ_ca = 8 + 3 = 11°C/W. Max junction temp for Jetson
    Orin: 95°C. Max allowable ΔT = 95 - 40 = 55°C. Max power: 55°C / 11°C/W = 5W sustainable. Jetson Orin
    NX at 15W: ΔT = 15W × 11°C/W = 165°C rise → junction = 40+165 = 205°C — far above limit. Required
    power mode: 5W. Jetson Orin 5W mode: 2 active CPU cores at 1.5GHz, GPU at reduced clock. Inference
    capacity: ~25% of MAXN (275 TOPS → ~70 TOPS INT8). Solution: heatsink fins extending outside enclosure
    (even in IP67) or liquid-cooled thermal interface to external radiator.'
  common_mistake: Using chip-to-ambient thermal resistance for the full path; the total thermal resistance
    includes junction-to-case and case-to-ambient in series.
  napkin_math: 'θ_total = 8+3 = 11°C/W. Max power = (95-40)/11 = 5W. At 15W: T_junction = 40 + 15×11 =
    205°C — impossible. Must operate at 5W mode or improve thermal path. Phase change thermal pad + external
    fin: θ_ca → 1°C/W → max 15W at θ_total = 9°C/W → 55/9 = 6.1W still low.'
