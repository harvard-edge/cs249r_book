validation_issues:
- The memory estimate for '13B LLM @ 4-bit = 6.5GB' is correct, but the calculation
  '2B Vision @ 8-bit = 2GB' is inaccurate. 2B parameters at 8-bit (1 byte/param) should
  be 2GB, not '2B Vision @ 8-bit = 2GB'. It should be '2B Vision @ 8-bit (1 byte/param)
  = 2GB'.
- 'The ''Forward pass peak activations buffer: ~3GB'' is an approximation and should
  ideally have a brief justification or be stated as an estimate based on typical
  models.'
