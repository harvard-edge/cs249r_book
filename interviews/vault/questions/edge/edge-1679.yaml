title: Unified Memory Multimodal Perceptor
scenario: You are tasked with deploying a continuous robotics perception pipeline
  on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The pipeline requires
  running a 13B parameter reasoning LLM alongside a 2B parameter vision encoder, maintaining
  a temporal history of 4000 tokens. Design a unified memory management architecture
  that dynamically partitions the 32GB shared memory across the Ampere GPU, DLA, and
  CPU to guarantee zero out-of-memory errors during worst-case peak activation spikes.
question: How would you partition Jetson Orin's 32 GB unified memory for a 13B LLM,
  2B vision encoder, and 4000-token history without OOMs?
details:
  realistic_solution: A robust L6+ architecture leverages the unified LPDDR5 by utilizing
    zero-copy memory access and offloads the vision encoder to the DLA to isolate
    its memory traffic and free up the Ampere GPU. The 13B LLM is quantized to 4-bit
    and the vision model to INT8 to radically shrink static weights. Dynamic KV-cache
    is managed via PagedAttention with a strict pre-allocated upper bound, ensuring
    fragmentation is eliminated and activation spikes safely fit within the remaining
    budget.
  common_mistake: Candidates often forget that Jetson Orin uses a unified memory architecture
    and allocate independent CPU/GPU pools, resulting in unnecessary memory copying
    overhead. They also frequently overlook the baseline OS/ROS memory footprint or
    underestimate the massive KV-cache size required for a 4k context window.
  napkin_math: 'Total unified memory: 32GB. Reserve for OS/ROS: 6GB. Available: 26GB.
    Model weights: 13B LLM @ 4-bit = 6.5GB, 2B Vision @ 8-bit = 2GB (Total weights:
    8.5GB). Remaining for inference: 17.5GB. KV Cache for 13B (FP16, 40 layers, 40
    heads, 128 dim): 2(K,V) × 2 bytes × 40 × 40 × 128 = 819,200 bytes (0.8 MB) per
    token. For 4000 tokens: 0.8 MB × 4000 = 3.2 GB. Forward pass peak activations
    buffer: ~3GB. Total committed: 6 (OS) + 8.5 (Weights) + 3.2 (KV) + 3 (Acts) =
    20.7 GB. Margin: 11.3 GB, safely avoiding swapping or OOM crashes.'
