title: Unified Memory Multimodal Perceptor
scenario: You are tasked with deploying a continuous robotics perception pipeline on an NVIDIA Jetson Orin. The pipeline requires running a 13B parameter reasoning LLM alongside a 2B parameter vision encoder, maintaining a temporal history of 4000 tokens.
question: How would you partition Jetson Orin's 32 GB unified memory for a 13B LLM, 2B vision encoder, and 4000-token history without OOMs?
details:
  realistic_solution: 'A robust L6+ architecture leverages the unified LPDDR5 by utilizing zero-copy memory access and offloads the vision encoder to the DLA to isolate its memory traffic and free up the Ampere GPU. The 13B LLM is quantized to 4-bit and the vision model to INT8 to radically shrink static weights. Dynamic KV-cache is managed via PagedAttention with a strict pre-allocated upper bound, ensuring fragmentation is eliminated and activation spikes safely fit within the remaining budget.'
  common_mistake: |
    **The Pitfall:** Overlooking unified architecture mechanics or massively underestimating KV overhead.
    **The Rationale:** Candidates treat the Jetson's memory like discrete PC CPU/GPU setups, proposing redundant copying, or they fail to realize how large a 4k KV cache gets for a 13B model.
    **The Consequence:** The architecture wastes precious memory copying data back and forth, eventually causing the system to crash due to peak activation spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Unified Memory: 32.0 GB.
       - OS/ROS Reservation: 6.0 GB.
       - Peak Activations Buffer: ~3.0 GB.
       - 13B LLM @ 4-bit (0.5 byte/param).
       - 2B Vision @ 8-bit (1 byte/param).
       - KV Cache: 4000 tokens, 40 layers, 40 heads, 128 dim, FP16.
    2. **Calculations:**
       - Model Weights: 6.5 GB (LLM) + 2.0 GB (Vision) = 8.5 GB.
       - KV Cache per token: 2 (K,V) * 2 bytes * 40 layers * 40 heads * 128 dim = 819,200 bytes = 0.8 MB.
       - Total KV Cache: 0.8 MB * 4000 tokens = 3.2 GB.
       - Total Committed: 6.0 (OS) + 8.5 (Weights) + 3.2 (KV) + 3.0 (Acts) = 20.7 GB.
       - Margin: 32.0 GB - 20.7 GB = 11.3 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Capacity-Bound.** The unified allocation safely leaves 11.3 GB of headroom, guaranteeing zero OOMs.
