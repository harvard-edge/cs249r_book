title: Edge Sensor Data Ingestion Pipeline Architecture on Jetson Orin
scenario: You are designing the data ingestion pipeline for an autonomous mobile robot running on an NVIDIA Jetson Orin. The system must capture high-resolution stereo camera feeds and LIDAR point clouds continuously to local NVMe storage before offloading to the cloud at base stations. The Orin has 32 GB LPDDR5 and a 60W TDP budget. Raw sensor ingress rate is 1.5 GB/s.
question: What storage format and compression strategy would you use on Jetson Orin to handle 1.5 GB/s sensor ingress without starving inference?
details:
  realistic_solution: The optimal design uses a lightweight, sequential row-based format like TFRecord or a custom binary log for initial ingestion, paired with a fast, low-CPU compression algorithm like LZ4 or Snappy. This minimizes memory buffering and CPU utilization, preserving the LPDDR5 bandwidth for the Ampere GPU and DLA. The heavy lifting of converting to columnar formats like Parquet for long-term analytics should be deferred to the cloud after the raw data is offloaded at the base station.
  common_mistake: |
    **The Pitfall:** Proposing heavy columnar formats like Parquet with high-ratio compression (e.g., GZIP or ZSTD).
    **The Rationale:** Candidates want to save NVMe disk space and assume standard cloud data engineering practices apply to the edge.
    **The Consequence:** The memory overhead of buffering large row groups for Parquet conversion consumes 25-50% of the 32GB RAM, starving the GPU and DLA of bandwidth needed for real-time inference.
  napkin_math: |
    1. Raw ingress: 1.5 GB/s.
    2. With LZ4 compression (very high throughput >2 GB/s per core), write speed drops to ~750 MB/s. Buffering 1s of data requires 1.5 GB RAM.
    3. Parquet requires large row groups (e.g., 128MB+ compressed), meaning buffering 5-10 seconds of raw data.
    4. **Parquet buffering would consume 7.5-15 GB of RAM. This thrashes the shared LPDDR5, leaving insufficient bandwidth for 275 TOPS inference workloads.**
