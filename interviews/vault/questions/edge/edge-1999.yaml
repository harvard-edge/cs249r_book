title: Edge AI Load Balancing & Routing for NVIDIA Jetson Orin Deployments
scenario: You are tasked with designing a robust inference serving system for an autonomous drone fleet, where each drone is equipped with an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W power budget). The drones perform real-time object detection and tracking using various deep learning models. Incoming sensor data streams require highly available and low-latency inference.
question: How would you design load balancing, request routing, model versioning, dynamic scaling, and fault tolerance for the Jetson Orin drone fleet?
details:
  realistic_solution: Implement a dynamic, hierarchical load balancer that monitors individual Orin resource utilization (CPU, memory, power) and queues. Use a consistent hashing scheme for stateful tasks (e.g., tracking a specific object ID) to ensure requests go to the same Orin. Implement a lightweight distributed control plane to exchange health metrics. Pre-cache frequently used models and leverage INT8 quantization to stay within the 60W limit.
  common_mistake: |
    **The Pitfall:** Applying traditional data center load balancing (like naive round-robin) directly to the edge.
    **The Rationale:** Candidates default to standard web-service architectures without considering stringent edge constraints like intermittent connectivity and thermal/power ceilings.
    **The Consequence:** Drones frequently throttle due to exceeding the 60W limit, or they incur massive latency penalties waiting for cloud-level routing decisions.
  napkin_math: |
    1. **Orin Throughput:** At 275 TOPS INT8, a 500 GOPS model theoretically yields 550 inferences/second. Realistically, OS overhead brings this to ~100 FPS.
    2. **Latency Budget:** If the end-to-end target is 100ms, and network transmission takes 30ms, the Orin processing + queueing must be < 70ms.
    3. **Power Budget:** If Model A uses 20W and Model B uses 30W, running both concurrently leaves only 10W for the OS and radio out of the 60W total.
    4. **Network Bandwidth:** A 30 FPS 1MB video stream requires 30MB/s per drone. **Pushing a 500MB OTA model update requires careful off-peak scheduling to avoid saturating this critical link.**
