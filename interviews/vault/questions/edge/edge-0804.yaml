title: The Model Theft from Edge Device
scenario: Your company spent $2M training a proprietary detection model. It's deployed on 5,000 edge devices running Jetson Orin. A competitor buys one of your devices on the secondary market.
question: How do they extract your model, and what can you do to prevent it?
details:
  realistic_solution: 'Attack vectors escalate: (1) Unencrypted disk: $500 + 10 min. (2) Encrypted, no HSM: $5K JTAG + 1 week. (3) API distillation: 100K queries = $50K total. (4) Full defense stack (secure boot + TEE + HSM + rate-limited API + watermarking): >$500K to extract. Goal: make extraction cost exceed the $2M training cost. Key insight: the model must be decrypted in GPU memory for inference — encryption-at-rest alone is insufficient.'
  common_mistake: |
    **The Pitfall:** Believing simple disk encryption solves the problem.
    **The Rationale:** Engineers forget that an encrypted model must be decrypted into GPU memory at runtime to actually execute.
    **The Consequence:** Competitors easily extract the runtime model weights straight from memory after gaining physical root access to the device.
  napkin_math: |
    1. **Training Cost:** Baseline to protect is $2M.
    2. **Disk Extraction:** $500 device + 10 minutes.
    3. **JTAG Attack (Encrypted disk, no HSM):** $5,000 equipment + 1 week.
    4. **API Distillation:** 100,000 queries x $0.01 = $1,000 + 1 month training = ~$50,000.
    5. **Defended Stack:** Physical extraction defeating secure boot + TEE + HSM requires **>$500,000** and specialized expertise, bringing the theft cost closer to the $2M training cost.
  options:
  - The solution is to reduce model complexity until it fits within the hardware constraints, accepting the accuracy trade-off as unavoidable.
  - 'Attack vectors escalate: (1) Unencrypted disk: 500 + 10 min. (2) Encrypted, no HSM: 5K JTAG + 1 week. (3) API distillation: 100K queries = $50K total. To prevent it, use a full defense stack (secure boot + TEE + HSM + rate-limited API).'
  - The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.
  - Encrypt the model file on disk.
  correct_index: 1
