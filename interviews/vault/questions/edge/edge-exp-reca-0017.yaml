title: Qualcomm Cloud AI 100 Specifications
scenario: You are sizing an on-premise inference cluster using the Qualcomm Cloud AI 100 accelerator for
  high-throughput edge workloads. To estimate the raw compute capacity, model capacity, and initial power
  budget for a single server node, you must state the baseline INT8 throughput, memory capacity, and power
  consumption of a single card.
details:
  realistic_solution: The candidate should correctly recall that the Qualcomm Cloud AI 100 provides 400
    TOPS INT8 compute, 32 GB of LPDDR4x memory, and operates at a 75W TDP. Recalling these exact specifications
    is essential for accurately estimating edge deployment costs.
  common_mistake: Candidates often confuse these specifications with data center GPUs like the NVIDIA
    T4 or A10, guessing significantly lower TOPS (e.g., 130 TOPS), different memory types (e.g., GDDR6),
    or higher power draws.
  napkin_math: Compute efficiency = 400 TOPS / 75 W = 5.33 TOPS/Watt. Daily energy consumption per card
    = 75 W * 24 hours / 1000 = 1.8 kWh/day.
