title: 'Dual-Tier Edge Checkpoint Formulation'
scenario: 'An autonomous Jetson AGX Orin rover collects mapping data. It must safely back up state while balancing strict local NVMe wear-leveling limits and very low cloud satellite uplink bandwidth.'
question: 'Formulate a dual-tier checkpointing mechanism that satisfies both local storage wear limits and narrow remote bandwidth constraints.'
visual:
  kind: svg
  path: edge-2361.svg
  alt: 'Graph showing small frequent local checkpoints and one large rare cloud checkpoint.'
  caption: 'Dual-Tier Checkpointing Profile.'
details:
  realistic_solution: 'Implement a high-frequency, low-volume ''delta'' checkpoint locally to the NVMe, saving only the state changed since the last step to strictly minimize write amplification and SSD wear. Concurrently, schedule a sparse, low-frequency ''full'' checkpoint that compresses the entire state and slowly uploads it to the cloud via a background thread.'
  common_mistake: |
    **The Pitfall:** Attempting to write full checkpoints locally or uploading high-frequency deltas to the cloud.
    **The Rationale:** Candidates fail to balance the competing physical constraints, either prematurely wearing out the local SSD with large writes or choking the narrow satellite uplink with frequent transmissions.
    **The Consequence:** The device suffers premature hardware failure or fails to successfully sync state to the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strict local NVMe wear-leveling limits.
    - Very low cloud satellite uplink bandwidth.

    **Calculations:**
    - High-frequency delta locally: ~10MB/min limits SSD wear amplification.
    - Sparse full checkpoint remotely: ~5GB/hour easily fits within a trickle upload background thread.

    **Conclusion & Interpretation:**
    - **Result: Dual-Tier Optimization (IO-Bound)**. A dual-tier approach satisfies both the local endurance limits and remote bandwidth constraints.
