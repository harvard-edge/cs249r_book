title: Dual-Tier Edge Checkpoint Formulation
scenario: An autonomous Jetson AGX Orin rover collects mapping data. It must safely
  back up state while balancing strict local NVMe wear-leveling limits and very low
  cloud satellite uplink bandwidth.
question: Formulate a dual-tier checkpointing mechanism that satisfies both local
  storage wear limits and narrow remote bandwidth constraints.
visual:
  kind: svg
  path: edge-2361.svg
  alt: Graph showing small frequent local checkpoints and one large rare cloud checkpoint.
  caption: Dual-Tier Checkpointing Profile.
details:
  realistic_solution: Implement a high-frequency, low-volume 'delta' checkpoint locally
    to the NVMe, saving only the state changed since the last step to strictly minimize
    write amplification and SSD wear. Concurrently, schedule a sparse, low-frequency
    'full' checkpoint that compresses the entire state and slowly uploads it to the
    cloud via a background thread.
  common_mistake: Trying to write full checkpoints locally (wearing out the SSD) or
    uploading high-frequency deltas to the cloud (choking the bandwidth).
  napkin_math: 'Delta size: 10MB/min. Full size: 5GB/hour. Total SSD writes minimized.'
