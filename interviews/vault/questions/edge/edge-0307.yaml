title: The INT8 Energy Dividend (edge-0307)
scenario: 'You are optimizing a perception model on a new automotive-grade accelerator. The model is currently running in FP16, but to meet your power budget, you are considering quantizing the convolutional layers to INT8.'
question: "Focusing only on the compute energy, what is the approximate energy saving for a single multiply-accumulate (MAC) operation when moving from FP16 to INT8?"
details:
  realistic_solution: 'The energy savings for a compute operation are approximately 5.3x. According to the physical invariants of digital logic, an FP32 operation costs ~3.4x the energy of an FP16 operation, and ~18x the energy of an INT8 operation. Therefore, the relative energy cost of an FP16 operation compared to an INT8 one is 18 / 3.4 \u2248 5.3x.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width reduction.
    **The Rationale:** Engineers often assume moving from 16 bits to 8 bits naturally halves the energy (2x savings), ignoring that floating-point math inherently requires complex mantissa/exponent logic.
    **The Consequence:** Significantly underestimating the power savings of integer quantization on edge hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 operation costs ~3.4x the energy of an FP16 operation.
       - FP32 costs ~18x the energy of an INT8 operation.
    2. **Calculations:**
       - Relative cost of FP16 vs INT8 = 18 / 3.4 = 5.29x.
    3. **Conclusion & Interpretation:**
       - **Result: ~5.3x energy savings per MAC (Power-Bound)**
  options:
  - ~2x
  - ~18x
  - ~5.3x
  - ~3.4x
