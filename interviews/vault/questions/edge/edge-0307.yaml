title: The INT8 Energy Dividend (edge-0307)
scenario: You're optimizing a perception model on a new automotive-grade accelerator. The model is currently
  running in FP16, but to meet your power budget, you're considering quantizing the convolutional layers
  to INT8. Focusing only on the compute energy, what is the approximate energy saving for a single multiply-accumulate
  (MAC) operation when moving from FP16 to INT8?
details:
  realistic_solution: The energy savings for a compute operation are approximately 5x. According to the
    physical invariants, an FP32 operation costs ~3.4x the energy of an FP16 operation, and ~18x the energy
    of an INT8 operation. Therefore, the relative energy cost of an FP16 operation compared to an INT8
    one is 18 / 3.4 ≈ 5.3×.
  common_mistake: Engineers often assume the energy savings are linear with the bit-width reduction (e.g.,
    16 bits -> 8 bits = 2x savings). They forget that the energy cost of floating-point operations (which
    require handling a mantissa and exponent) is inherently higher than simpler fixed-point integer math.
    The savings are non-linear.
  napkin_math: 'Let''s normalize the energy cost of an INT8 MAC to 1 energy unit. From the hardware constants,
    we know:'
  options:
  - ~2×
  - ~18×
  - ~5×
  - ~1.5×
  correct_index: 2
