title: Jetson Orin LLM Inference VRAM Budgeting Components
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) for inference on an
  NVIDIA Jetson Orin, which features 32 GB LPDDR5, 275 TOPS INT8, and a 60W power envelope. The LLM's
  weights and activations are stored in bfloat16 format, and you plan to run inference with a batch size
  of 1. To effectively manage the 32 GB LPDDR5 budget, what are the critical additional memory components
  that you must account for beyond just the model weights, and what are the fundamental formulas or rules
  of thumb you would recall to quickly estimate the memory footprint of each?
details:
  realistic_solution: 'A realistic solution involves a systematic breakdown of all VRAM-consuming elements:
    (1) Model Weights, (2) Activations, and (3) KV-Cache (Key-Value cache). Each component''s size must
    be estimated based on its respective properties (e.g., number of parameters, batch size, sequence
    length, number of layers, hidden size, and data type). While empirical validation with profiling tools
    is crucial post-deployment, initial budgeting relies on these estimations.'
  common_mistake: A common mistake is only budgeting for the model weights, overlooking the significant
    VRAM consumption by activations during the forward pass and the KV-cache, which grows with sequence
    length in transformer models. Forgetting to factor in the data type (e.g., bfloat16 vs. float32) for
    each component is also a frequent oversight.
  napkin_math: 'For a bfloat16 7B parameter LLM on Jetson Orin (32 GB LPDDR5):

    1.  **Model Weights**: `Number of Parameters * Data Type Size` (e.g., 7 Billion parameters * 2 bytes/parameter
    for bfloat16 = 14 GB).

    2.  **Activations**: This varies significantly but is roughly proportional to `Batch Size * Sequence
    Length * Model Hidden Size * Data Type Size` per layer for peak activations. For batch size 1 inference,
    it can still consume several GBs (e.g., 1-4 GB depending on model and sequence length) at peak.

    3.  **KV-Cache**: For a transformer, it''s approximately `Batch Size * Max Sequence Length * Number
    of Layers * 2 (for Key and Value) * Number of Heads * Head Dimension * Data Type Size`. For a typical
    7B LLM (e.g., Llama-2-7B with 32 layers, 32 heads, head_dim 128) and a max sequence length of 2048,
    this could be estimated as `2048 tokens * 32 layers * 2 * 32 heads * 128 head_dim * 2 bytes/param
    = 1,073,741,824 bytes ≈ 1 GB`. These additional components are critical for managing the 32 GB LPDDR5.'
