title: 'Edge Queueing Theory Design: Hailo-8 vs Jetson Orin Queueing Analysis'
scenario: Design an edge inference system for a smart city pedestrian counter with λ=50 detections/s. Compare Hailo-8 (26 TOPS INT8, 2.5W) vs Jetson Orin (275 TOPS INT8, 60W) using M/D/1 queuing. The detection model requires 5 GOPS per inference.
question: For λ=50 detections/s and a 5 GOPS model, what are throughput, utilization, queue wait, and power efficiency on Hailo-8 versus Jetson Orin?
details:
  realistic_solution: Utilize M/D/1 queuing fundamentals to analyze service rate metrics. Since the target framerate is relatively low against execution capability, both accelerators easily meet SLA latency constraints, making the deeply power-efficient edge hardware the overwhelming strategic choice.
  common_mistake: |
    **The Pitfall:** Comparing TOPS without normalizing for model complexity and workload arrival rate.
    **The Rationale:** Candidates often select the highest TOPS chip (Orin) without analyzing if the queueing delay on the smaller chip (Hailo) already easily satisfies the latency SLA.
    **The Consequence:** Massively over-provisioning hardware, resulting in a 10x higher deployment cost and 24x higher energy waste.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate (λ): 50 frames/s.
       - Model Complexity: 5 GOPS per frame.
       - Hailo-8: 26 TOPS (26,000 GOPS), 2.5W.
       - Jetson Orin: 275 TOPS (275,000 GOPS), 60W.
       - Queuing Model: M/D/1 (Deterministic service time).
    2. **Calculations:**
       - Hailo-8 Service Rate (μ) = 26,000 / 5 = 5,200 inferences/s.
       - Hailo-8 Utilization (ρ) = 50 / 5,200 ≈ 0.0096 (< 1%).
       - Hailo-8 Wait Time (W) ≈ 1/μ (since queue wait is negligible at ρ < 0.01) = 1/5200 ≈ 0.19 ms.
       - Hailo-8 Power Cost = 2.5W / 50 FPS = 0.05 Watts per FPS.
       - Orin Service Rate (μ) = 275,000 / 5 = 55,000 inferences/s.
       - Orin Wait Time (W) ≈ 1/55000 ≈ 0.018 ms.
       - Orin Power Cost = 60W / 50 FPS = 1.2 Watts per FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 0.19 ms at 0.05 W/FPS (Compute-Sufficient)** - The Hailo-8 easily meets the queueing SLA and is 24x more power-efficient.
