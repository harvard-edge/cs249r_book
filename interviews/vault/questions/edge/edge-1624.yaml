title: CI/CD Performance Gating for Qualcomm Cloud AI 100
scenario: You are setting up an automated hardware-in-the-loop CI/CD pipeline to validate models before deploying them to a Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x, 75W). The pipeline runs a performance test on every commit to ensure training-serving consistency. A new INT8-quantized object detection model requires 500 GOPS per inference.
question: What IPS threshold should the CI/CD gate use for the 500 GOPS/inference INT8 model at 75% Cloud AI 100 utilization?
details:
  realistic_solution: 'Establish a strict baseline metric for the deployment gate by multiplying theoretical peak compute by expected utilization. Profiling with nsys or similar would ensure the INT8 model meets the target.'
  common_mistake: |
    **The Pitfall:** Ignoring the expected utilization factor.
    **The Rationale:** Candidates calculate the theoretical peak compute but forget to apply the 75% utilization factor required for the pipeline.
    **The Consequence:** The CI/CD pipeline uses an unrealistically high threshold, causing all deployments to fail the gate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute is 400 TOPS (400,000 GOPS).
    - Target utilization is 75%.
    - Model requirement is 500 GOPS/inference.

    **Calculations:**
    - Effective Pipeline Compute is 400,000 GOPS * 0.75 utilization = 300,000 GOPS.
    - Target IPS Gate is 300,000 GOPS / 500 GOPS/inference = 600 Inferences Per Second (IPS).

    **Conclusion & Interpretation:**
    - **Result: 600 IPS (Compute-Bound)**. The CI/CD pipeline should use 600 IPS as the realistic target to prevent performance regressions.
