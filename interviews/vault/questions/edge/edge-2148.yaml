title: 'Model Quantization Selection for Coral Edge TPU with Accuracy Constraint'
scenario: 'An edge TPU deploys a person re-identification model (ResNet-50 backbone, 97MB FP32). The model must run at >20fps with <5% rank-1 accuracy loss vs FP32 baseline (82% rank-1).'
question: 'Which INT8 strategy meets >20fps and <5% rank-1 loss, and why should mixed FP16 precision be avoided on this TPU?'
details:
  realistic_solution: 'Full INT8 Quantization-Aware Training (QAT) limits accuracy degradation to ~1% while allowing the entire model to run natively on the TPU. Mixed FP16 precision forces unsupported layers to fall back to the host CPU, creating a massive synchronization bottleneck that destroys throughput.'
  common_mistake: |
    **The Pitfall:** Recommending FP16 mixed precision for the Edge TPU.
    **The Rationale:** Candidates incorrectly assume modern edge accelerators uniformly support FP16 alongside INT8 natively.
    **The Consequence:** FP16 layers fall back to the host CPU, creating a massive synchronization bottleneck that drops throughput far below the 20fps limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU: 4 TOPS INT8 native. Host CPU: ~5 GFLOPS.
    - Model: ResNet-50 (4.1 GFLOP, 97MB FP32 -> 24.25MB INT8).

    **Calculations:**
    - TPU Throughput (INT8): 4000 GOPS / 4.1 GOPS = 975 fps.
    - PTQ INT8 Accuracy: ~2.5% loss -> 79.5% rank-1 (meets <5% threshold).
    - QAT INT8 Accuracy: ~1% loss -> 81% rank-1 (meets <5% threshold).
    - Mixed FP16 CPU fallback: 5% of FLOPs (~200M) on 5 GFLOPS CPU = 40ms = 25fps max (excluding host-device synchronization latency).

    **Conclusion & Interpretation:**
    - **Result: INT8 QAT (Synchronization-Bound)**. INT8 with QAT meets all constraints; Mixed FP16 destroys throughput due to severe CPU fallback.
