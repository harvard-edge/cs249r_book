title: The Cost of Data Gravity in Automotive Fleets
scenario: You're working on the perception team for a large fleet of autonomous vehicles that generates terabytes of raw sensor data daily.
question: What is the primary operational cost that using Federated Learning is designed to mitigate compared to a traditional, fully centralized approach where all data is uploaded to the cloud?
details:
  realistic_solution: The primary cost Federated Learning mitigates is data transmission (network backhaul). Uploading terabytes of raw sensor data from thousands of vehicles to the cloud is astronomically expensive and often logistically infeasible due to cellular bandwidth limitations. FL addresses the data gravity problem by keeping raw data on the edge device and transmitting small, highly-compressed gradient updates.
  common_mistake: |
    **The Pitfall:** Overestimating cloud compute costs while ignoring data movement.
    **The Rationale:** Engineers often focus on the cloud compute cost for training. While significant, the dominant and often prohibitive cost in a large-scale edge fleet is the continuous, high-volume data backhaul.
    **The Consequence:** They underestimate the physical and economic barriers of moving massive datasets over cellular networks, leading to a blocked project.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Centralized data: 10 GB/car/day.
       - Fleet size: 10,000 cars.
       - Network cost: $1/GB.
       - FL weight update: 50 MB/car/day.
    2. **Calculations:**
       - Centralized volume: 10,000 * 10 GB = 100,000 GB/day.
       - Centralized cost: 100,000 GB * $1 = $100,000/day.
       - FL volume: 10,000 * 50 MB = 500,000 MB = 500 GB/day.
       - FL cost: 500 GB * $1 = $500/day.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (Bandwidth Costs)**. FL reduces network transmission costs by 200x, saving $99,500 daily and making the architecture economically viable.
  options:
  - Cloud compute (GPU) costs for model training.
  - On-device compute energy consumed during local training.
  - Network data transmission (backhaul) costs.
  - Cloud storage costs for the raw sensor data.
