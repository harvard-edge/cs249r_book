classification_review: Flash is right that D5 (Real-time Systems) is a poor fit. The question is squarely
  about the economics of data transmission vs federated learning, which maps to D4 (Cost Optimization)
  or E1 (Privacy/Security). The RC-8 (requirements-to-architecture) also seems high for what is essentially
  an L1 concept question -- RC-2 (Conceptual Understanding) would be more appropriate.
