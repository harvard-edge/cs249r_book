title: The Cost of Data Gravity in Automotive Fleets
scenario: You're working on the perception team for a large fleet of autonomous vehicles that generates
  terabytes of raw sensor data daily. When comparing training strategies, what is the primary operational
  cost that using Federated Learning is designed to mitigate compared to a traditional, fully centralized
  approach where all data is uploaded to the cloud?
details:
  realistic_solution: The primary cost Federated Learning mitigates is data transmission (network backhaul).
    Uploading terabytes of raw sensor data from thousands of vehicles to the cloud is astronomically expensive
    and often logistically infeasible due to network bandwidth limitations. FL avoids this by keeping
    the raw data on the edge device and only transmitting small, compressed model updates, fundamentally
    addressing the data gravity problem.
  common_mistake: Engineers often focus on the cloud compute cost for training. While significant, the
    dominant and often prohibitive cost in a large-scale edge fleet (like cars) is the continuous, high-volume
    data backhaul. They underestimate the physics and economics of moving massive datasets over cellular
    networks.
  napkin_math: 'Centralized: 10,000 cars * 10 GB/car/day = 100,000 GB/day. At $1/GB, cost = $100,000/day
    or $36.5M/year! Federated Learning (FL) transmits only model weight updates. Assume a 50MB update
    per day per car: 10,000 * 50MB = 500 GB/day. Cost = 500 * $1 = $500/day. FL reduces network transmission
    costs by 100,000 / 500 = 200x, saving $99,500 daily while preserving privacy.'
  options:
  - Cloud compute (GPU) costs for model training.
  - On-device compute energy consumed during local training.
  - Network data transmission (backhaul) costs.
  - Cloud storage costs for the raw sensor data.
  correct_index: 2
