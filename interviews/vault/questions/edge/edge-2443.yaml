title: Edge Quantization Throughput Bound
scenario: A Hailo-8 accelerator provides 26 TOPS for INT8 operations. An autonomous
  delivery bot team wants to port an FP16 vision transformer to run natively on it.
question: Calculate the maximum theoretical inference frames per second for a 20 GOPs
  (Giga-Operations) vision model mapped perfectly to this hardware in INT8.
details:
  realistic_solution: 'The hardware provides 26 Tera-Operations Per Second (TOPS)
    in INT8. The model requires 20 Giga-Operations (0.02 TOPS) per frame. The maximum
    theoretical throughput is simply the hardware capacity divided by the per-frame
    cost: 26,000 GOPs / 20 GOPs = 1,300 frames per second. (Note: Hailo-8 fundamentally
    requires INT8 quantization, FP16 would not run natively on its matrix engines).'
  common_mistake: Candidates might try to divide by FP16 bandwidth or apply a TOPS
    penalty, missing that porting to Hailo implies pure INT8 execution.
  napkin_math: 26000 / 20 = 1300 FPS.
