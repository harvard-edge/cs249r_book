title: Edge Quantization Throughput Bound
scenario: 'A Hailo-8 accelerator provides 26 TOPS for INT8 operations. An autonomous delivery bot team wants to port an FP16 vision transformer to run natively on it.'
question: Calculate the maximum theoretical inference frames per second for a 20 GOPs (Giga-Operations) vision model mapped perfectly to this hardware in INT8.
details:
  realistic_solution: 'The hardware provides 26 Tera-Operations Per Second (TOPS) in INT8. The model requires 20 Giga-Operations (0.02 TOPS) per frame. The maximum theoretical throughput is simply the hardware capacity divided by the per-frame cost: 26,000 GOPs / 20 GOPs = 1,300 frames per second. (Note: Hailo-8 fundamentally requires INT8 quantization, FP16 would not run natively on its matrix engines).'
  common_mistake: |
    **The Pitfall:** Applying a TOPS penalty or trying to divide by FP16 bandwidth.
    **The Rationale:** Candidates forget that porting a model to an architecture like Hailo-8 implicitly requires full INT8 quantization to run natively.
    **The Consequence:** Arriving at drastically lowered theoretical bounds by calculating for unsupported FP16 execution.
  napkin_math: |
    * Hardware provides 26 TOPS in INT8.
    * Model requires 20 Giga-Operations (0.02 TOPS) per frame.
    * Max theoretical throughput = 26,000 GOPs / 20 GOPs = **1300 FPS**.
