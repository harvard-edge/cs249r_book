title: OOM During Gradient Accumulation
scenario: You are implementing on-device fine-tuning on an NVIDIA Jetson Orin. The system OS and drivers consume 6 GB. Your model weights occupy 10 GB in FP16. A full-batch forward/backward pass requires 16 GB for activations. To reduce memory spikes, you implement gradient accumulation over 4 micro-batches, successfully reducing activation memory to 4 GB per micro-batch. You use an SGD optimizer with momentum, storing states in FP16.
question: Why does the Jetson Orin fine-tuning job still hit OOM at the end of the final micro-batch despite 4-way gradient accumulation?
details:
  realistic_solution: 'Gradient accumulation reduces the memory needed for intermediate activations, but it requires allocating a full-sized buffer for the accumulated gradients. Additionally, the SGD optimizer requires a persistent momentum buffer. At the end of the final backward pass, the unified memory must simultaneously hold the OS, weights, momentum, accumulated gradients, and the last micro-batch''s activations, exceeding the hardware''s physical limits.'
  common_mistake: |
    **The Pitfall:** Assuming gradient accumulation scales down all memory requirements.
    **The Rationale:** Candidates often focus only on reducing activation size, forgetting that accumulated gradients and persistent optimizer states scale with the model size.
    **The Consequence:** They deploy a configuration that still massively exceeds the hardware's physical limits, leading to out-of-memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Unified Memory: 32 GB LPDDR5.
    - OS/Background = 6 GB, Model Weights (FP16) = 10 GB.
    - SGD Momentum State (FP16): 10 GB.
    - Accumulated Gradients (FP16): 10 GB.
    - Activations (final micro-batch): 4 GB.

    **Calculations:**
    - Peak Memory Footprint = 6 + 10 + 10 + 10 + 4 = 40 GB.
    - Deficit = 40 GB - 32 GB = 8 GB deficit.

    **Conclusion & Interpretation:**
    - **Result: 8 GB Deficit (OOM) (Memory-Bound)**. The optimizer state and gradient buffers negate the activation savings, overflowing the total memory budget.
