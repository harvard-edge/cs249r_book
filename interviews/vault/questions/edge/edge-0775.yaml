title: The Bandwidth-Constrained Model Update
scenario: Your fleet of 5,000 wildlife monitoring cameras runs on solar-powered cellular (Quectel RM500Q
  modem, 50 KB/s average throughput, 500 MB/month data cap). The current model is a MobileNetV2-SSD (6.2
  MB INT8) on a Coral Edge TPU. You need to deploy an updated model that's 8.1 MB. A full model push would
  consume 40.5 GB of fleet bandwidth. How do you ship the update without blowing the data budget?
question: "How do you ship the update without blowing the data budget?"
details:
  realistic_solution: Use **binary delta updates** (bsdiff/courgette). Since the updated model shares
    most weights with the current model (same architecture, fine-tuned on new data), the binary diff between
    the old and new TFLite flatbuffer is dramatically smaller than the full file.
  common_mistake: '"Compress the model with gzip — 8.1 MB compresses to ~5 MB, problem solved." Compression
    helps, but 5 MB × 5,000 = 25 GB still consumes 5% of the fleet''s monthly budget for a single update,
    and you need room for telemetry uploads.'
  napkin_math: 'Full push: 8.1 MB × 5,000 = 40.5 GB. Delta push: 0.49 MB × 5,000 = 2.45 GB. Monthly data
    cap per device: 500 MB. Model update consumes: 0.49 MB / 500 MB = **0.1%** of monthly budget (vs 1.6%
    for full push). At 50 KB/s: delta download takes 10 seconds per device vs 162 seconds for full model.
    Solar power budget for cellular: ~2 Wh/day. Cellular modem at 3W: delta transfer uses 0.008 Wh vs
    0.14 Wh for full — leaving more energy for inference.'
