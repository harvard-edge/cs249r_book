title: 'Edge Systolic Array Realization: INT8 Quantization Impact on Hailo-8 Throughput'
scenario: 'Concretely calculate the throughput difference for ResNet-18 (FP32: 1.8 GFLOPS, FP16: 1.8 GFLOPS,
  INT8: 1.8 GOPS) on Hailo-8 (26 TOPS INT8 only, 6GB/s, 2.5W). Hailo-8 does not support FP32/FP16 inference.
  Calculate FPS, memory footprint reduction, and latency for INT8 vs the theoretical FP16 case if Hailo-8
  supported it.'
details:
  realistic_solution: 'ResNet-18: FP32 = 11.7M params = 46.8MB. FP16 = 23.4MB. INT8 = 11.7MB. Hailo-8
    INT8: 1.8 GOPS / 26 TOPS = 0.069ms compute. BW: 11.7MB weights + ~15MB activations = 26.7MB. Time
    = 26.7MB/6GB/s = 4.45ms. FPS = 225. If FP16 hypothetical: 1.8 GFLOPS / 13 TFLOPS (half of 26 TOPS)
    = 0.138ms compute. BW: 23.4+30 = 53.4MB / 6GB/s = 8.9ms. FPS = 112. INT8 is 2x faster and 50% less
    memory due to bandwidth savings. INT8 quantization: ±0.5% accuracy loss for ResNet-18 (usually).'
  common_mistake: Confusing GFLOPS (floating point) with GOPS (integer operations), and not accounting
    for the fact that INT8 cuts model size in half vs FP16 and quarters vs FP32, improving memory bandwidth
    utilization.
  napkin_math: 'INT8: params=11.7M*1B=11.7MB. Acts=15MB. Total=26.7MB. BW time=26.7/6000=4.45ms. FPS=225.
    Power=2.5W. Energy=2.5/225=11.1mJ/inf. FP16 (hypothetical): 23.4+30=53.4MB. BW=53.4/6000=8.9ms. FPS=112.
    Energy=2.5/112=22.3mJ/inf. INT8 wins: 2.01x FPS, 2.01x energy efficiency, 2x memory footprint. On
    Coral TPU (INT8 only, 4 TOPS, 4GB/s BW): 26.7MB/4GB/s=6.68ms. FPS=150. Hailo-8 wins by 1.5x FPS at
    25% more power. Hailo more cost-effective.'
