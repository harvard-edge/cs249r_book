title: Cross-Architecture Distillation for Google Coral Edge TPU
scenario: A heavy Vision Transformer (ViT) must be deployed for real-time defect detection on a Google Coral Edge TPU (4 TOPS INT8, 2W), which lacks support for several ViT operators.
question: How would you distill the ViT into an Edge TPU-compatible INT8 CNN that runs fully on the TPU without accuracy loss?
details:
  realistic_solution: Design an efficient CNN student (e.g., MobileNetV2) utilizing exclusively Edge TPU-supported operators like depthwise separable convolutions. Use the FP32 ViT as a teacher for both logit matching and intermediate feature distillation. Crucially, integrate Quantization-Aware Training (QAT) concurrently with distillation, injecting simulated quantization noise during the backward pass to ensure the student learns robust INT8 representations prior to compiler mapping.
  common_mistake: |
    **The Pitfall:** Applying Post-Training Quantization (PTQ) sequentially after standard distillation.
    **The Rationale:** Treating architectural distillation and precision quantization as isolated phases rather than co-dependent hardware constraints.
    **The Consequence:** Severe accuracy degradation and unexpected CPU fallbacks when the compiler encounters unsupported asymmetric quantization ranges.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 50 FPS (20ms deadline). Edge TPU: 4 TOPS (4,000 GOPS).
    - Teacher ViT: 250 GOPS (Uncompilable).

    **Calculations:**
    - TPU Capacity at 50 FPS: 4,000 GOPS / 50 = 80 GOPS budget per frame.
    - Student CNN Target: 1.5 GOPS per frame.
    - Total Student Throughput: 1.5 GOPS * 50 FPS = 75 GOPS/sec.

    **Conclusion & Interpretation:**
    - **Result: 75 GOPS/sec (Compute-Bound)**. The student consumes 75 GOPS/sec (<2% of 4 TOPS), guaranteeing it executes within the strict 2W thermal envelope.
