title: Diagnosing Thermal Throttling on NVIDIA Jetson Orin
scenario: You are deploying a continuous object detection pipeline on an NVIDIA Jetson Orin for an outdoor
  autonomous robot. The hardware features an Ampere GPU + DLA accelerator capable of 275 TOPS INT8, 32
  GB LPDDR5, and operates with a 60W TDP. During midday field tests, the inference latency suddenly spikes
  from 15ms to 45ms after about 10 minutes of operation, despite the workload remaining completely static.
  The system logs show a change in the active DVFS P-state. What is the root cause of this sudden performance
  drop, and how do you diagnose it?
question: "What is the root cause of this sudden performance drop, and how do you diagnose it?"
details:
  realistic_solution: The root cause is thermal throttling; the system cannot dissipate the heat generated
    by running near its 60W TDP in a warm environment, causing the DVFS controller to step down the P-state
    (lowering voltage and frequency) to prevent hardware damage. To diagnose this, one should use tools
    like `tegrastats` to monitor the SoC temperature, active power draw, and current operating frequencies
    of the Ampere GPU and DLA. The fix involves either improving the active cooling solution or using
    `nvpmodel` to set a stricter power cap (e.g., 40W) to achieve a consistent, predictable latency profile.
  common_mistake: Candidates often jump to software-level issues like memory leaks in the 32 GB LPDDR5,
    inefficient memory bandwidth utilization, or background processes consuming CPU cycles. They frequently
    fail to connect the 60W TDP, the outdoor environment, and the hardware's built-in dynamic voltage
    and frequency scaling (DVFS) thermal protection mechanisms.
  napkin_math: Assume the Orin operates at its peak 60W TDP (e.g., ~40W GPU, ~20W CPU/Memory) to achieve
    the 15ms latency (using a fraction of its 275 TOPS INT8 capacity). If the robot's passive cooling
    can only dissipate 45W of heat continuously, the thermal buffer fills up over 10 minutes. Upon hitting
    the critical temperature threshold (e.g., 95°C), the DVFS mechanism scales the clock frequencies down
    to reduce power consumption from 60W to <= 45W. Because dynamic power scales with Frequency * Voltage^2,
    a significant drop in frequency (and voltage) is applied. If the GPU frequency is slashed to 1/3 of
    its maximum to enforce this thermal envelope, the compute-bound inference time will inversely scale
    by a factor of 3, jumping precisely from 15ms to 45ms.
