title: Edge New 0006
scenario: Deploying a 14B LLM on a 16GB T4. In FP16, it takes 28GB (OOM). Quantizing to INT8 takes 14GB.
  Quantizing to INT4 takes 7GB. Analyze the tradeoff between memory bandwidth, KV cache availability,
  and generation speed for INT8 vs INT4.
question: "Should the 14B LLM use INT8 or INT4 on the 16GB T4, considering memory bandwidth, KV cache, and generation speed?"
details:
  realistic_solution: Using INT8 barely fits the model, leaving only 2GB for the KV cache and context
    window, severely restricting concurrent users or sequence lengths. INT4 frees up 9GB for KV cache,
    enabling massive batching or document-level context. Since decoding is purely memory-bandwidth bound,
    INT4 also doubles the token generation speed because half as many bytes are fetched per token, at
    the acceptable cost of slightly elevated perplexity.
  common_mistake: Focusing only on the perplexity degradation of INT4 without realizing it is the only
    way to achieve usable context lengths and interactive speeds on a 16GB GPU.
  napkin_math: 'INT8 weight fetch: 14GB / 320GB/s = 43.7ms/token (22 tok/s). KV Cache space = 2GB. INT4
    weight fetch: 7GB / 320GB/s = 21.8ms/token (45 tok/s). KV Cache space = 9GB. INT4 is twice as fast
    and supports 4.5x larger context.'
