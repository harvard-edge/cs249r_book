title: Edge New 0006
scenario: Deploying a 14B LLM on a 16GB T4. In FP16, it requires 28GB (OOM). Quantizing to INT8 takes 14GB, while INT4 takes 7GB.
question: Should the 14B LLM use INT8 or INT4 on the 16GB T4, considering memory bandwidth, KV cache, and generation speed?
details:
  realistic_solution: INT4 is strictly superior here. INT8 consumes 14GB, leaving a scant 2GB for the KV cache, severely restricting sequence length and concurrency. INT4 reduces the weight footprint to 7GB, freeing 9GB for KV cache. Furthermore, since auto-regressive decoding is memory-bandwidth bound, reading 7GB of weights per token instead of 14GB doubles the token generation speed, trading a minor perplexity hit for massive latency and context length improvements.
  common_mistake: |
    **The Pitfall:** Choosing INT8 to avoid the perplexity degradation of INT4.
    **The Rationale:** Focusing purely on academic model accuracy metrics while ignoring physical KV cache constraints and generation latency.
    **The Consequence:** Deploying a model that runs out of memory on moderately long prompts and generates tokens too slowly for interactive use.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NVIDIA T4 (16GB RAM, ~320 GB/s bandwidth).
       - Model: 14B parameters. INT8 = 14GB, INT4 = 7GB.
    2. **Calculations:**
       - INT8 Fetch: 14 GB / 320 GB/s = 43.75 ms/token (22 tok/s). KV Cache = 16 - 14 = 2 GB.
       - INT4 Fetch: 7 GB / 320 GB/s = 21.87 ms/token (45 tok/s). KV Cache = 16 - 7 = 9 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound. INT4 doubles generation speed to 45 tok/s and expands KV capacity by 4.5x.**
