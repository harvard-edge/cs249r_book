title: The Autonomous Freeway Thermal Throttling Crisis
scenario: You are the Lead ML Systems Architect for a self-driving truck company. The Gen-1 prototype meets its 30 FPS perception deadline using a down-clocked datacenter GPU, but it consumes 200W and requires a liquid cooling system. For the Gen-2 production vehicle, the system must fit in a passive, air-cooled enclosure with a strict Thermal Design Power (TDP) budget of 60W.
question: How would you evaluate and select Gen-2 edge hardware that meets 30 FPS within the 60W passive-cooling budget?
details:
  realistic_solution: The correct approach is to analyze the workloads against the hardware capabilities, not just look at peak datasheet numbers. The architect must recognize this is a system co-design problem.
  common_mistake: |
    **The Pitfall:** Selecting hardware based purely on peak TOPS.
    **The Rationale:** Architects ignore the memory subsystem and the Arithmetic Intensity of the workload.
    **The Consequence:** They buy edge hardware where the compute units sit idle waiting for memory, resulting in terrible performance-per-watt that fails to meet real-time deadlines.
  napkin_math: |
    1. **Datacenter GPU Ridge Point**: 312 TFLOPS / 2000 GB/s = 156 Ops/Byte.
    2. **Jetson Orin Ridge Point**: 275 INT8 TOPS / 204.8 GB/s = 1342 Ops/Byte.
    3. **Workload Analysis**: If the Gen-1 model has an Arithmetic Intensity (AI) of 300, it is compute-bound on the datacenter GPU (300 > 156).
    4. **Edge Bottleneck**: On Orin, the same model is heavily memory-bound (300 < 1342).
    5. **Throughput Crash**: Actual TOPS on Orin drops to 300 Ops/Byte * 204.8 GB/s = **~61 TOPS**. The hardware choice must account for this AI mismatch, not just peak TOPS.
