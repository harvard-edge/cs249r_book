title: 'Qualcomm Cloud AI 100: INT8 Matrix Multiply Energy Analysis'
scenario: You are tasked with analyzing the energy efficiency of a critical 1024x1024 INT8 matrix multiplication
  (C = A * B) on the Qualcomm Cloud AI 100. This device boasts 400 TOPS INT8 performance and 32 GB LPDDR4x
  memory, with a 75W power budget. Based on Horowitz energy table principles and typical energy characteristics
  for modern hardware, assume an INT8 multiply-accumulate (MAC) operation consumes approximately 0.05
  pJ, and a 32-bit LPDDR4x memory access (read or write) consumes about 150 pJ. Estimate the total energy
  consumed by compute operations versus memory accesses (loading matrices A and B, storing matrix C).
  Which component dominates the energy budget, and by how much?
details:
  realistic_solution: The candidate should calculate the total number of INT8 MAC operations for the matrix
    multiplication and multiply by the per-MAC energy. Separately, calculate the total bytes transferred
    for loading A, B, and storing C, convert this to 32-bit memory accesses, and multiply by the per-access
    energy. They should then compare these two total energy figures to determine dominance and quantify
    the difference. For practical optimization, techniques like data tiling/blocking to maximize cache
    hit rates and reduce off-chip memory traffic are critical.
  common_mistake: Candidates often underestimate the energy cost of data movement (memory access) relative
    to computation, especially for seemingly compute-intensive operations. They might also apply generic
    energy numbers without considering device-specific memory hierarchies or bus widths.
  napkin_math: '1. Compute Energy: (1024 * 1024 * 1024 MACs) * 0.05 pJ/MAC = 5.37 * 10^7 pJ (approx 0.054
    mJ).

    2. Memory Energy: (3 * 1024 * 1024 bytes) / (4 bytes/32-bit access) = 786,432 accesses. Memory Energy
    = 786,432 accesses * 150 pJ/access = 1.18 * 10^8 pJ (approx 0.118 mJ).

    In this scenario, memory access energy dominates compute energy by approximately 2.2x.'
