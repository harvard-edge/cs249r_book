title: Calculate Theoretical Minimum Compute Latency
scenario: We are deploying a heavy convolutional neural network for real-time video analytics on a Qualcomm Cloud AI 100 on-premise inference accelerator. The trace tools indicate that our primary bottleneck is entirely compute-bound during the dense 1x1 convolutions. A single inference pass requires exactly 800 Giga Operations (GOPS) in INT8 precision.
question: Assuming 100% compute utilization, what is the theoretical minimum compute latency per frame for an 800 GOPS INT8 inference on a 400 TOPS Cloud AI 100?
details:
  realistic_solution: For a strictly compute-bound workload, the theoretical minimum latency is the total operations required divided by the peak compute throughput of the hardware. The Qualcomm Cloud AI 100 provides 400 TOPS for INT8 workloads. By converting the peak throughput to match the unit of the required operations (or vice versa), we can find the absolute lowest possible latency.
  common_mistake: |
    **The Pitfall:** Mismanaging unit conversions or incorporating irrelevant constraints.
    **The Rationale:** Candidates often fail to correctly convert between Tera Operations (TOPS) and Giga Operations (GOPS), or they attempt to factor in memory bandwidth (LPDDR4x) or power (75W).
    **The Consequence:** Calculations are off by orders of magnitude, or the core compute-bound premise of the prompt is ignored.
  napkin_math: |
    1. **Peak Compute**: 400 TOPS = 400,000 GOPS.
    2. **Operations Required**: 800 GOPS per inference.
    3. **Latency Calculation**: (800 GOPS) / (400,000 GOPS/sec) = 0.002 seconds.
    4. **Result**: 0.002 seconds * 1000 = **2.0 ms per frame**.
