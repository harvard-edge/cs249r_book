title: Thermal Throttling and Effective Throughput on Jetson Orin
scenario: 'A Jetson Orin (60W TDP) deployed in a sealed industrial enclosure runs at ambient temperature 45°C. After 20 minutes, inference throughput drops 40%. The cooling solution was designed for 25°C ambient.'
question: 'Why does Jetson Orin throughput drop 40% at 45°C in a sealed enclosure, and how would you fix it without changing the enclosure?'
details:
  realistic_solution: 'Jetson Orin starts throttling CPU/GPU clocks at junction temperature ~95°C. At 45°C ambient with sealed enclosure (thermal resistance ~3°C/W), max dissipation before throttling: ΔT = 95-45=50°C, R=3°C/W → max power = 50/3=17W. But Orin draws 60W → T_junction = 45 + 60×3 = 225°C, far above throttle point. Actual throttled power ≈17W → 17/60=28% of nominal. Fix without enclosure change: add thermal interface material upgrade, copper heat spreader, or drop to 15W power mode (reduce MAXN profile to 15W).'
  common_mistake: |
    **The Pitfall:** Assuming the drop is a software bug or memory bottleneck.
    **The Rationale:** Candidates fail to recognize thermal throttling as the root cause in sealed enclosures when ambient temperatures rise.
    **The Consequence:** Wasting time debugging software while the hardware physically prevents optimal performance due to heat.
  napkin_math: |
    **Assumptions & Constraints:**
    - Junction Temp Formula: T_j = T_ambient + (Power * R_thermal).
    - At 25°C (designed): T_j = 25 + (60W * ~0.5°C/W) = 55°C (safe).
    - At 45°C sealed (R ≈ 3°C/W): T_j = 45 + (60W * 3°C/W) = 225°C (exceeds 95°C throttle point).

    **Calculations:**
    - Max power before throttle: P_max = (95°C - 45°C) / 3°C/W = 17W.
    - Throttled power ratio: 17W / 60W = ~28%.

    **Conclusion & Interpretation:**
    - **Result: Expected throughput drop is ~72%, so an observed 40% drop indicates the thermal mass is still buffering some heat (Power-Bound)**.
