title: Thermal Throttling and Effective Throughput on Jetson Orin
scenario: A Jetson Orin (60W TDP) deployed in a sealed industrial enclosure runs at
  ambient temperature 45°C. After 20 minutes, inference throughput drops 40%. The
  cooling solution was designed for 25°C ambient. Diagnose the thermal throttling
  mechanism and propose a fix without changing the enclosure.
question: Why does Jetson Orin throughput drop 40% at 45°C in a sealed enclosure,
  and how would you fix it without changing the enclosure?
details:
  realistic_solution: 'Jetson Orin starts throttling CPU/GPU clocks at junction temperature
    ~95°C. At 45°C ambient with sealed enclosure (thermal resistance ~3°C/W), max
    dissipation before throttling: ΔT = 95-45=50°C, R=3°C/W → max power = 50/3=17W.
    But Orin draws 60W → T_junction = 45 + 60×3 = 225°C, far above throttle point.
    Actual throttled power ≈17W → 17/60=28% of nominal. Fix without enclosure change:
    add thermal interface material upgrade, copper heat spreader, or drop to 15W power
    mode (reduce MAXN profile to 15W).'
  common_mistake: Assuming the drop is a software bug or memory bottleneck; not recognizing
    thermal throttling as the root cause in sealed enclosures.
  napkin_math: 'T_junction = T_ambient + P × R_thermal. At 25°C: T_j = 25+60×0.5=55°C
    (fine). At 45°C in sealed box (R≈3°C/W): T_j=45+60×3=225°C >> 95°C throttle. Throttle
    to P_max=(95-45)/3=17W. Throughput scales ≈17/60=28%, drop=72% → observed 40%
    drop means some thermal mass buffering.'
