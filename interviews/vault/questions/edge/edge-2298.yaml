title: PCIe Collective Communication Efficiency
scenario: Three Hailo-8 chips are cascaded on a PCIe Gen3 switch on an edge server.
  They must aggregate their output logits for a unified ensemble prediction.
question: Evaluate why Gather-Compute-Broadcast by the host CPU is more efficient
  here than a device-to-device Ring AllReduce.
visual:
  kind: svg
  path: edge-2298.svg
  alt: Diagram showing a PCIe switch routing traffic from three devices to a central
    host CPU.
  caption: PCIe Star Topology
details:
  realistic_solution: PCIe switches efficiently route traffic to/from the host Root
    Complex. Direct device-to-device (P2P) transfers often lack hardware support across
    multiple PCIe bridge endpoints, falling back to bouncing through host RAM anyway.
    A Gather to CPU, CPU addition, and Broadcast back matches the inherent star topology
    of the PCIe Root Complex, avoiding P2P routing penalties.
  common_mistake: Assuming Ring AllReduce is universally optimal, ignoring the physical
    star topology of a standard PCIe tree.
  napkin_math: Star hops = 2 vs Ring P2P fallback hops >= 2
