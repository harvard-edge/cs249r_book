title: Realistic Orin Throughput
scenario: A Jetson AGX Orin is tasked with running a ResNet-50 variant that requires 8 GOPS per image.
question: Apply hardware efficiency factors to estimate the realistic maximum frame rate the device can achieve, assuming a 30% hardware utilization rate.
details:
  realistic_solution: Convert 275 TOPS INT8 to usable operations. With 30% utilization, the effective throughput drops. Divide the effective TOPS by the operations required per image to find the realistic frame rate.
  common_mistake: |
    **The Pitfall:** Using theoretical peak TOPS directly for throughput estimates.
    **The Rationale:** Candidates fail to apply a realistic utilization factor, ignoring memory bandwidth limits, kernel overhead, and imperfect operator mapping.
    **The Consequence:** Overestimating throughput by ~3x, leading to system designs that catastrophically fail to meet frame rate requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Theoretical Peak: 275 TOPS = 275,000 GOPS.
       - Realistic Utilization: 30%.
       - Compute per Image: 8 GOPS.
    2. **Calculations:**
       - Effective Throughput: 275,000 GOPS * 0.30 = 82,500 GOPS.
       - Realistic Frame Rate: 82,500 GOPS / 8 GOPS = 10,312 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Utilization-Adjusted Throughput.** Applying a 30% hardware efficiency factor prevents a 3x overestimation of realistic processing capacity.
