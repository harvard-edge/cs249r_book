title: Realistic Orin Throughput
scenario: A Jetson AGX Orin is tasked with running a ResNet-50 variant that requires
  8 GFLOPs per image. The Orin can theoretically deliver 275 TOPS (INT8).
question: Apply hardware efficiency factors to estimate the realistic maximum frame
  rate the device can achieve, assuming a 30% hardware utilization rate.
details:
  realistic_solution: Convert 275 TOPS INT8 to usable operations. With 30% utilization,
    the effective throughput drops. Divide the effective TOPS by the operations required
    per image to find the realistic frame rate.
  common_mistake: Using the theoretical peak TOPS without applying the realistic utilization
    factor, overestimating throughput by 3x.
  napkin_math: 275 TOPS * 0.30 = 82.5 usable TOPS. 82.5 TOPS / 8 GOPs = 10,312 FPS.
