title: Evaluating A/B Rollout Strategies for Edge AI Models on Google Coral TPU
scenario: Your team has developed a new, more accurate image classification model (Model B) for a smart camera product. The current model (Model A) is deployed on a fleet of 10,000 edge devices, each equipped with a Google Coral Edge TPU.
question: How would you compare canary and shadow rollout strategies for Model B on 10,000 Coral Edge TPU cameras, including KPIs, constraints, and rollback?
details:
  realistic_solution: Implement an edge-native monitoring solution that leverages the Coral TPU's capabilities for local inference and pre-aggregates metrics locally before batch uploading to the cloud, reducing bandwidth and power consumption. Design the rollout mechanism to be robust to network disconnections, allowing for local evaluation and automated rollback based on pre-defined edge-side heuristics if issues are detected, before requiring central orchestration. Ensure both Model A and Model B are rigorously tested for INT8 compatibility and performance on the Coral TPU before deployment to avoid hardware-specific regressions.
  common_mistake: |
    **The Pitfall:** Ignoring the unique constraints of edge devices (limited compute, power, network intermittency).
    **The Rationale:** Attempting to lift-and-shift traditional cloud-centric rollout strategies (real-time A/B analytics, instantaneous rollbacks) to the edge.
    **The Consequence:** Incomplete data collection, delayed issue detection, and failed rollbacks when edge nodes disconnect.
  napkin_math: |
    *   **Inference Throughput:** TPU does 1 inference in 8ms -> 1000ms / 8ms = 125 inferences/sec.
    *   **Shadow Deployment Impact:** Running Model A and Model B concurrently on one TPU halves throughput or doubles latency if the TPU is near capacity.
    *   **Telemetry Volume:** 50KB/hour * 10,000 devices * 24 hours = **12 GB/day** of fleet data, requiring efficient local aggregation before upload.
