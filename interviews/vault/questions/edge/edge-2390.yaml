title: Edge High-Speed Video Bottleneck
scenario: A 4K-resolution high-speed camera feeds 60 FPS video to an edge device
  running a Hailo-8 accelerator. The camera produces variable-bitrate H.265 (5-25
  Mbps depending on scene complexity), and the edge device must decode + preprocess
  + run inference within a 16 ms frame budget.
question: Identify the binding memory-bandwidth bottleneck for 4K@60 FPS preprocessing
  in this pipeline, and explain how variable bitrate makes the worst-case (25 Mbps)
  scene the system's design point - not the average.
details:
  realistic_solution: The host CPU often bottlenecks heavily on software video decoding
    and color space conversion (e.g., YUV to RGB). To prevent starving the accelerator,
    hardware video decoders (VPU/Media Engines) must be explicitly leveraged in the
    pipeline.
  common_mistake: Assuming the 26 TOPS neural accelerator directly decodes the compressed
    H.264/H.265 video stream.
  napkin_math: Decoding 60 FPS at 4K resolution starves low-power CPUs.
