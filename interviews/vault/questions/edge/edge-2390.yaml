title: Edge High-Speed Video Bottleneck
scenario: A 4K (3840x2160) high-speed camera feeds 60 FPS H.265 video to an edge device pairing an NXP i.MX 8M Plus host (32-bit LPDDR4 with ~10 GB/s bandwidth) with a Hailo-8 accelerator. The H.265 bitrate varies from 5 Mbps to 25 Mbps. Each decoded frame must be color-converted (YUV420 to RGB888), letterboxed, and DMA-pushed within the 16.6 ms frame budget.
question: Identify the binding memory-bandwidth bottleneck on the preprocessing path at 4K @ 60 FPS, and explain why decoded raw-frame DRAM traffic dominates.
details:
  realistic_solution: The compressed H.265 stream (25 Mbps peak = ~3 MB/s) is trivially small; the binding constraint is the raw decoded frame traffic in DRAM. Each 4K frame is 24.9 MB (RGB888). At 60 FPS that is 1.49 GB/s one-way. The full path touches each frame at least 3x (VPU decode, color-convert read+write, DMA), so total LPDDR4 traffic is roughly 4.5 GB/s on a ~10 GB/s peak part.
  common_mistake: |
    **The Pitfall:** Sizing bottlenecks from encoded bitrates.
    **The Rationale:** Candidates assume the 25 Mbps network stream is the primary data movement concern and miss that the uncompressed raw-frame DRAM traffic is vastly larger.
    **The Consequence:** Under-provisioning LPDDR memory bandwidth and failing to achieve real-time throughput.
  napkin_math: |
    1. **Raw Frame Size:** 3840 * 2160 * 3 = 24.88 MB RGB.
    2. **Raw Throughput:** 24.88 MB * 60 FPS = 1.49 GB/s one-way.
    3. **Total DRAM Traffic:** Touched ~3x = 1.49 GB/s * 3 ≈ 4.5 GB/s.
    4. **Encoded Bitrate Comparison:** 25 Mbps = ~3 MB/s.
    **Result: Raw DRAM traffic is 1,500x larger than the H.265 stream.**
