title: Edge High-Speed Video Bottleneck
scenario: A 4K high-speed camera feeds 60 FPS H.265 video to an edge device pairing an NXP i.MX 8M Plus host with a Hailo-8 accelerator. The H.265 bitrate varies from 5 Mbps to 25 Mbps. Each decoded frame must be color-converted, letterboxed, and DMA-pushed within the 16.6 ms frame budget.
question: Identify the binding memory-bandwidth bottleneck on the preprocessing path at 4K @ 60 FPS, and explain why decoded raw-frame DRAM traffic dominates.
details:
  realistic_solution: Validate DRAM throughput limits against heavily pipelined, uncompressed image passes. Compressed streams present nominal load, but decoding forces huge memory bandwidth overheads across multiple operations.
  common_mistake: |
    **The Pitfall:** Sizing bottlenecks from encoded bitrates.
    **The Rationale:** Candidates assume the 25 Mbps network stream is the primary data movement concern and miss that the uncompressed raw-frame DRAM traffic is vastly larger.
    **The Consequence:** Under-provisioning LPDDR memory bandwidth and failing to achieve real-time throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 4K (3840 x 2160).
       - Framerate: 60 FPS (16.6 ms budget).
       - Data Format: RGB888 (3 bytes per pixel).
       - Stream Network Bitrate: 25 Mbps max (~3.125 MB/s).
       - Pipeline: VPU decode -> Color Convert -> DMA push (approx 3 memory touches per frame).
    2. **Calculations:**
       - Raw Frame Size = 3840 * 2160 * 3 Bytes = 24,883,200 Bytes ≈ 24.88 MB.
       - Raw Throughput (1 touch) = 24.88 MB * 60 FPS = 1.49 GB/s.
       - Total LPDDR4 DRAM Traffic = 1.49 GB/s * 3 touches ≈ 4.48 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: ~4.5 GB/s (Memory-Bandwidth-Bound)** - The uncompressed DRAM traffic is three orders of magnitude larger than the encoded network stream.
