title: Edge High-Speed Video Bottleneck
scenario: A 4K (3840x2160) high-speed camera feeds 60 FPS H.265 video to an edge
  device pairing an i.MX 8M Plus host with a Hailo-8 accelerator. The H.265
  bitrate varies from 5 Mbps (static scene) to 25 Mbps (high motion). Each
  decoded frame must be color-converted (YUV420 to RGB888), letterboxed, and
  passed to the Hailo-8 within the 16.6 ms frame budget. Decoded raw frame size
  is 3840 * 2160 * 3 = 24.9 MB.
question: Identify the binding memory-bandwidth bottleneck on the preprocessing
  path (decode -> color convert -> resize -> DMA to Hailo-8) at 4K@60 FPS, and
  explain why the 25 Mbps high-motion scene - not the 5 Mbps average - sets the
  design point. Quantify the raw-frame DRAM traffic and contrast it against the
  H.265 bitrate.
details:
  realistic_solution: 'The compressed H.265 stream (25 Mbps peak = ~3 MB/s) is
    trivially small; the binding constraint is the raw decoded frame traffic in
    DRAM. Each 4K frame is 24.9 MB (RGB888) or 12.4 MB (YUV420). At 60 FPS that
    is 1.49 GB/s for RGB or 745 MB/s for YUV - per-direction. The full
    preprocessing path touches each frame at least 3x (VPU decode write, CPU/GPU
    color-convert + resize read+write, DMA to Hailo-8 read), so total LPDDR4
    traffic is roughly 4-5 GB/s on a part with ~10 GB/s peak. The variable-
    bitrate stream does not change DRAM traffic - decoded frame size is fixed
    by resolution - but the 25 Mbps high-motion scene stresses the VPU compute
    and produces P-frame patterns that cause cache thrash. Hardware VPU + 2D
    blit blocks are mandatory; software decode on the i.MX 8M Plus A53 cores
    can sustain only ~15 FPS at 4K, missing budget.'
  common_mistake: 'Sizing the bottleneck from the H.265 bitrate (25 Mbps) and
    missing that decoded raw-frame DRAM traffic is roughly 500x larger; or
    assuming the Hailo-8 itself can decode H.265 (it cannot - it is a neural
    accelerator only).'
  napkin_math: 'Frame = 3840*2160*3 = 24.9 MB RGB; 24.9 * 60 = 1.49 GB/s
    one-way. Pipeline touches frame ~3x = ~4.5 GB/s. H.265 stream = 25 Mbps =
    3 MB/s (negligible). Software decode budget on A53 ~15 FPS << 60 FPS.'
