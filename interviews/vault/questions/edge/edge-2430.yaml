title: D/G/1 Jetson Buffer Limits
scenario: A Jetson AGX Orin receives camera frames deterministically at 30 FPS. The
  inference service time is uniformly distributed between 20ms and 45ms.
question: Evaluate the system's queue dynamics to determine if an infinite buffer
  is necessary or if a finite drop-policy is required.
details:
  realistic_solution: 'Inter-arrival = 33.3 ms (deterministic). Mean service = 32.5
    ms; rho = 32.5 / 33.3 = 0.976 < 1, so the queue length remains BOUNDED in the
    long run - it does NOT diverge or cause memory exhaustion. However, transient
    bursts of consecutive 45 ms (worst-case) frames will inflate momentary queue length
    and produce extreme tail latency (P99 may hit several hundred ms). A finite drop-oldest
    policy is needed not to prevent memory exhaustion (rho<1 avoids that), but to
    bound real-time tail latency: dropping old frames keeps P99 latency bounded while
    accepting small data loss during bursts.'
  common_mistake: Concluding that rho close to 1 causes the queue to grow unboundedly
    and OOM; in fact for rho < 1 the queue is finite in expectation and the policy
    is needed to bound transient real-time latency, not memory.
  napkin_math: 'rho = 32.5/33.3 = 0.976 < 1 (queue is bounded). Burst worst-case:
    consecutive 45 ms frames can stack 5+ frames before drainage. P99 latency cap
    needs drop policy.'
