title: D/G/1 Jetson Buffer Limits
scenario: A Jetson AGX Orin receives camera frames deterministically at 30 FPS. The
  inference service time is uniformly distributed between 20ms and 45ms.
question: Evaluate the system's queue dynamics to determine if an infinite buffer
  is necessary or if a finite drop-policy is required.
details:
  realistic_solution: Frames arrive every 33.3ms (deterministic). The mean service
    time is 32.5ms. Since utilization is very high (97.5%) and variance exists in
    the service time, a queue will build up during bursts of complex frames. A finite
    queue with a drop-oldest policy is strictly required to prevent memory exhaustion
    and bounded latency.
  common_mistake: Assuming that because the mean service time (32.5ms) is less than
    inter-arrival time (33.3ms), the queue length will safely remain near zero.
  napkin_math: 33.3ms > (20+45)/2 = 32.5ms.
