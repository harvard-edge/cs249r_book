title: 'D/G/1 Jetson Buffer Limits'
scenario: 'A Jetson AGX Orin receives camera frames deterministically at 30 FPS. The inference service time is uniformly distributed between 20ms and 45ms.'
question: 'Evaluate the system''s queue dynamics to determine if an infinite buffer is necessary or if a finite drop-policy is required.'
details:
  realistic_solution: 'Inter-arrival = 33.3 ms (deterministic). Mean service = 32.5 ms; rho = 32.5 / 33.3 = 0.976 < 1, so the queue length remains BOUNDED in the long run - it does NOT diverge or cause memory exhaustion. However, transient bursts of consecutive 45 ms (worst-case) frames will inflate momentary queue length and produce extreme tail latency (P99 may hit several hundred ms). A finite drop-oldest policy is needed not to prevent memory exhaustion (rho<1 avoids that), but to bound real-time tail latency: dropping old frames keeps P99 latency bounded while accepting small data loss during bursts.'
  common_mistake: |
    **The Pitfall:** Concluding that rho close to 1 causes the queue to grow unboundedly and crash the system via OOM.
    **The Rationale:** Candidates misunderstand queueing theory, believing that high utilization always leads to infinite memory growth.
    **The Consequence:** They falsely assume the system will crash, missing the true issue: transient bursts cause massive tail latency spikes that violate real-time deadlines, even if memory remains bounded.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inter-arrival time = 33.3 ms.
    - Mean service time = 32.5 ms.
    - Worst-case service time = 45 ms.

    **Calculations:**
    - System utilization ($\rho$) = 32.5 / 33.3 = 0.976.
    - Since $\rho < 1$, the queue length is theoretically bounded.
    - A burst of 45 ms frames will stack frames in the queue (45 ms > 33.3 ms).

    **Conclusion & Interpretation:**
    - **Result: $\rho=0.976$ (Queue-Bound)**. A drop policy is required not to prevent OOM, but to cap the P99 latency caused by transient worst-case bursts.
