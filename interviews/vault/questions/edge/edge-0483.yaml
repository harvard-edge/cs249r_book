title: The LiDAR Perception Bottleneck
scenario: You are an ML systems engineer on an autonomous driving team, tasked with deploying a new LiDAR segmentation model on a Jetson AGX Orin. The model is missing its 33ms real-time deadline, currently running at 45ms per frame. Profiling reveals that a single forward pass executes 5 Trillion INT8 operations and moves 10 GB of data (weights, activations, and intermediate features) to/from the device's LPDDR5 memory.
question: Using Orin's 275 TOPS and 204.8 GB/s specs, is the 5 trillion-op, 10 GB LiDAR model compute-bound or memory-bound?
details:
  realistic_solution: Utilize the Roofline Performance Model to calculate the Arithmetic Intensity (AI) and establish whether the bottleneck lies in the execution pipeline or memory controllers.
  common_mistake: |
    **The Pitfall:** Diagnosing bottlenecks based on symptoms rather than arithmetic intensity.
    **The Rationale:** Seeing high GPU usage might lead engineers to assume the model is compute-bound, or seeing slow speeds might cause them to blame the data pipeline (CPU starvation), completely missing the math-to-memory ratio.
    **The Consequence:** Wasting time on compute-focused optimizations (like pruning) for a strictly memory-bound model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Peak Compute: 275 TOPS (275e12 Ops/s).
       - Hardware Memory Bandwidth: 204.8 GB/s (204.8e9 Bytes/s).
       - Model Compute: 5 Trillion Ops (5e12 Ops).
       - Model Data Movement: 10 GB (10e9 Bytes).
    2. **Calculations:**
       - Hardware Ridge Point = 275e12 / 204.8e9 = 1342.7 Ops/Byte.
       - Model Arithmetic Intensity (AI) = 5e12 Ops / 10e9 Bytes = 500 Ops/Byte.
       - Comparison: 500 Ops/Byte (Model AI) < 1342.7 Ops/Byte (Hardware Ridge).
    3. **Conclusion & Interpretation:**
       - **Result: 500 Ops/Byte (Memory-Bound)**
  options:
  - The model is Compute-Bound. The 275 TOPS peak is theoretical, and 5 T-Ops per frame is too much work to finish in 33ms.
  - The system is Power-Limited. The 45ms latency suggests the GPU is being thermally throttled and cannot reach its peak performance.
  - The model is Memory-Bound. Its arithmetic intensity (500 Ops/Byte) is far below the Orin's roofline ridge point (~1342 Ops/Byte).
  - The data pipeline is CPU-bound. The GPU is waiting for the CPU to preprocess the LiDAR points before the forward pass can even begin.
  correct_index: 2
