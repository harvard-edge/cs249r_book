title: 'Edge Deployment: Model Sizing for NVIDIA Jetson Orin'
scenario: Your team is developing an autonomous robotics platform that requires real-time semantic segmentation on video streams. You have a well-performing PyTorch model trained in FP32, but preliminary tests indicate it exceeds the memory and computational limits of the edge device, leading to slow inference and OOM errors.
question: What steps would you take to estimate the model's memory footprint and computational load, and propose strategies to ensure successful deployment?
details:
  realistic_solution: 'A realistic solution would involve: 1. Quantization: Converting the model from FP32 to INT8 (or FP16 if INT8 is insufficient/problematic) using techniques like Post-Training Quantization (PTQ) or Quantization Aware Training (QAT). 2. Architectural Search/Pruning: Exploring lighter-weight architectures (e.g., MobileNetV3, EfficientNet, specialized edge models) or applying pruning techniques to reduce redundant parameters. 3. Profiling: Using NVIDIA''s tools (e.g., Nsight Systems, TRT profiler) directly on the hardware to accurately measure memory usage (weights, activations, I/O buffers) and inference latency for different model versions and batch sizes. 4. TensorRT Optimization: Converting the PyTorch model to ONNX, then to TensorRT engine for maximum optimization. 5. Napkin Math First Pass: Estimate memory (weights + activations) and operations to quickly filter infeasible options before extensive experimentation.'
  common_mistake: |
    **The Pitfall:** Only calculating weight memory and ignoring intermediate activation memory.
    **The Rationale:** Candidates rely on static parameter counts and forget that high-resolution activations dominate memory during inference.
    **The Consequence:** Severe underestimation of memory footprint, leading to OOM errors in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory budget: < 32 GB. Compute budget: 275 TOPS. Real-time target: 30 FPS (33ms/frame).
    2. **Calculations:**
       - Weight memory = parameters * bytes/param (e.g., 1 byte for INT8).
       - Activation memory = batch * height * width * channels * bytes/element.
       - Inference time = Total MACs / (TOPS * 10^12).
    3. **Conclusion & Interpretation:**
       - **Result: Activation-Bound.** Memory estimates must include peak activation buffers. INT8 quantization and TensorRT execution are required to fit within latency and memory limits.
