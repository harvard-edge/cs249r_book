title: 'Hardware-Aware NAS Latency Bound on Qualcomm Cloud AI 100'
scenario: 'You are designing a hardware-aware Neural Architecture Search (NAS) pipeline for a fleet of edge accelerators. During the search phase, your NAS controller needs to rapidly estimate the latency of candidate architectures to prune the search space.'
question: 'What minimum compute-bound latency should the NAS controller estimate for an 800 GOPs INT8 model on a 400 TOPS accelerator?'
details:
  realistic_solution: 'The candidate should identify that the peak throughput is 400 TOPS, which equals 400,000 GOPs (Giga-Operations per second). By dividing the total operations required by the candidate model by the peak throughput, they can estimate the absolute minimum theoretical latency. This provides a fast, quantifiable lower bound for the NAS controller to immediately reject models that violate strict latency constraints. Verify peak throughput via nsys profiling.'
  common_mistake: |
    **The Pitfall:** Miscalculating unit conversions between Giga and Tera.
    **The Rationale:** Candidates confuse 10^9 (Giga) and 10^{12} (Tera).
    **The Consequence:** Order-of-magnitude errors in the latency estimate, leading to flawed NAS pruning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute required: 800 GOPs = 800 * 10^9 operations.
    - Peak throughput: 400 TOPS = 400,000 GOPs = 400 * 10^12 operations/second.

    **Calculations:**
    - Minimum Latency = 800 / 400,000 seconds = 0.002 seconds = 2 milliseconds.

    **Conclusion & Interpretation:**
    - **Result: 2 milliseconds (Compute-Bound)**. This absolute theoretical minimum latency acts as a tight bound.
