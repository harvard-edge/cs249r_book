title: INT4 Weight-Only Quantization for LLM on Hailo-8
scenario: A team wants to deploy a 3B parameter LLM on Hailo-8 (26 TOPS INT8, 2.5W, 4GB on-chip memory). At FP16, the model is 6GB and doesn't fit. They propose INT4 weight-only quantization with INT8 activations (W4A8).
question: What is the W4A8 memory footprint for the 3B LLM on Hailo-8, and how does INT4 dequantization affect throughput?
details:
  realistic_solution: 'W4A8 model size: 3B params × 0.5 bytes = 1.5GB weights (fits Hailo-8). Activations at INT8 add ~200MB. Total ≈ 1.7GB (fits). However, Hailo-8 INT8 units require dequantizing INT4->INT8 weights on-the-fly, costing ~10-20% throughput overhead. Effective throughput: 26 TOPS × 0.85 = 22 TOPS. Per-token decode: 3B × 2 FLOPs/param / 22 TOPS = 0.27ms per token ≈ 3700 tok/s — exceeds memory bandwidth limit of 4GB/2.5W scenario.'
  common_mistake: |
    **The Pitfall:** Assuming W4A8 runs at INT4 hardware throughput without penalty.
    **The Rationale:** Engineers assume the accelerator natively computes INT4, overlooking that Hailo-8 possesses INT8 ALUs.
    **The Consequence:** Drastically overestimating hardware throughput by ignoring the on-the-fly W4-to-INT8 dequantization overhead.
  napkin_math: |
    - **Footprint:** 3B × 0.5B/param = 1.5GB weights (fits 4GB).
    - **Dequantization Penalty:** ~15% overhead yields 22 effective TOPS (from 26 TOPS).
    - **Compute Latency:** 6B FLOPs / 22 TOPS = 0.27ms per token decode (3700 tok/s).
    - **Final Result:** **While it fits the memory footprint, the extreme 3700 tok/s compute rate will be severely choked by the hardware's memory bandwidth limits.**
