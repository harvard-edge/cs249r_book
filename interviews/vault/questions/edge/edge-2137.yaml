title: INT4 Weight-Only Quantization for LLM on Hailo-8
scenario: A team wants to deploy a 3B parameter LLM on a 4GB Hailo-8. They propose INT4 weight-only quantization with INT8 activations (W4A8).
question: What is the W4A8 memory footprint for the 3B LLM on Hailo-8, and how does INT4 dequantization affect throughput?
details:
  realistic_solution: W4A8 footprint is 1.5GB (fits easily). However, Hailo-8 INT8 ALUs require on-the-fly INT4->INT8 dequantization, costing ~15% throughput. Despite fitting in memory, the high theoretical token generation rate will severely bottleneck on the physical memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming W4A8 runs at INT4 hardware throughput without penalty.
    **The Rationale:** Engineers assume the accelerator natively computes INT4, overlooking that the target hardware possesses strictly INT8 ALUs.
    **The Consequence:** Drastically overestimating hardware throughput by ignoring the on-the-fly W4-to-INT8 dequantization overhead.
  napkin_math: |
    1. **Assumptions & Constraints:** 3B LLM. Hailo-8 = 4GB RAM, 26 TOPS INT8. 15% dequantization overhead. 1 token = 6B FLOPs.
    2. **Calculations:** W4A8 weights = 3B * 0.5B = 1.5GB. Effective compute = 26 TOPS * 0.85 = 22.1 TOPS. Compute latency = 6G / 22.1T = 0.27ms/tok (3700 tok/s).
    3. **Conclusion & Interpretation:** **Result: 3700 tok/s compute rate.** While it fits footprint, the interconnect bandwidth cannot physically feed weights at 3700 tok/s. **System Status: Memory-Bandwidth-Bound.**
