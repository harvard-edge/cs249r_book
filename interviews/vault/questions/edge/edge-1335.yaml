title: Evaluating Thermal Strategies for Jetson Orin Deployment
scenario: You are designing the compute module for an autonomous industrial robot operating in an unconditioned warehouse with ambient temperatures up to 45°C. The system uses a 60W TDP edge SoC capable of 275 TOPS. You must choose between an active cooling fan (5W) or a passive heatsink paired with an aggressive burst-and-idle software scheduler to support a continuous 150 TOPS workload.
question: For a continuous 150 TOPS workload at 45°C ambient, would you use active cooling or passive burst-and-idle scheduling, and why?
details:
  realistic_solution: The passive heatsink with burst-and-idle scheduling is structurally more reliable for harsh edge environments, provided the thermal budget closes. By heavily parallelizing the workload across both the Ampere GPU and DLA accelerators, the Orin can complete the workload rapidly and drop into a low-power state. The key evaluation is determining the average power dissipation during the duty cycle; if the average wattage exceeds what the passive heatsink can dissipate at 45°C ambient without hitting the SoC junction limit (typically ~90°C), active cooling with severe dust filtration becomes the only viable, though higher-maintenance, alternative.
  common_mistake: |
    **The Pitfall:** Reflexively choosing active cooling to guarantee performance.
    **The Rationale:** Candidates ignore the high mechanical failure rate of fans in dusty industrial settings and fail to calculate the actual average thermal dissipation of a burst-and-idle approach.
    **The Consequence:** Deploying an unreliable system that fails prematurely when the cooling fan clogs with debris.
  napkin_math: |
    1. The workload requires 150 TOPS out of the 275 TOPS total capacity.
    2. Assuming linear power scaling, active processing draws ≈ (150 / 275) * 60W = 32.7W.
    3. In a 1-second window, the system computes for 0.55 seconds at 32.7W and idles for 0.45 seconds at 15W.
    4. Average power = (32.7W * 0.55) + (15W * 0.45) = 17.98W + 6.75W = **24.73W**.
    5. The passive heatsink must continuously reject ~25W of heat at 45°C ambient to avoid throttling.
