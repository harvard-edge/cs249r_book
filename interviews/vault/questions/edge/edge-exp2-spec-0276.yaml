title: Hailo-8 Multi-Camera Stream Load Balancing
scenario: You are designing an edge inference appliance that processes 8 independent 1080p camera streams
  using a pool of 4 Hailo-8 dataflow accelerators. The Hailo-8 provides 26 TOPS INT8 at 2.5W, but lacks
  local DRAM, meaning all activations and weights must stream continuously from host memory over PCIe.
  Design a load balancing and request routing system that distributes the video frames across the 4 accelerators
  while minimizing host memory bandwidth contention and ensuring no single Hailo-8 starves for data.
question: "How would you route 8 camera streams across 4 Hailo-8 accelerators while minimizing host memory contention and avoiding accelerator starvation?"
details:
  realistic_solution: The optimal approach is to pin specific camera streams to dedicated Hailo-8 chips
    (e.g., 2 cameras per chip) rather than dynamically routing individual frames across all chips. This
    localized routing ensures that the host memory access patterns remain predictable and cache-friendly
    for the streaming DMA transfers. Additionally, implementing backpressure at the ingestion queue prevents
    the host from buffering too many frames if an accelerator falls behind.
  common_mistake: Candidates often suggest standard round-robin or consistent hashing at the frame level
    without considering the PCIe bus limitations. They might overlook that since the Hailo-8 streams directly
    from host memory, uncoordinated dispatching can cause memory controller saturation or PCIe bottlenecks,
    leading to severe underutilization of the 26 TOPS capacity.
  napkin_math: 'Assuming a model requiring 10 GOPS per frame, a single Hailo-8 at 26 TOPS (26,000 GOPS)
    can theoretically process 2,600 FPS. For 8 cameras at 30 FPS, total throughput needed is 240 FPS (2,400
    GOPS), which is easily handled by 4 chips (104 TOPS total). The real bottleneck is host bandwidth:
    1080p RGB frames are ~6MB each. At 240 FPS, the system ingests 1.44 GB/s. Distributing 2 streams per
    chip results in 360 MB/s sustained DMA streaming per Hailo-8 over PCIe, which fits well within PCIe
    Gen3 limits without saturation.'
