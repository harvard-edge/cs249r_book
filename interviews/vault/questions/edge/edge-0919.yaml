title: Operator Fusion for Arithmetic Intensity
scenario: An edge TPU runs a custom Transformer encoder for anomaly detection. SLA requires 500 inferences/sec
  (QPS). The NPU has 2 TOPS compute and 4 GB/s memory bandwidth. The model requires 4 GOPS per inference.
  Currently, the system maxes out at 200 QPS. Profiling shows unfused MatMul, LayerNorm, and GELU operations
  are causing 20MB of intermediate activation read/writes to DRAM per inference. Design an optimization
  to meet the SLA.
details:
  realistic_solution: The low QPS is a classic symptom of a memory-bound workload on the Roofline model.
    Un-fused operations force the accelerator to write intermediate activations back to DRAM and read
    them again for the next layer, destroying Arithmetic Intensity. At 20MB per inference, the memory
    bandwidth limits the system to 200 QPS. By fusing the MatMul, LayerNorm, and GELU into a single kernel,
    the intermediate results stay in the NPU's SRAM (scratchpad). This drastically reduces DRAM traffic,
    shifting the workload to the right on the Roofline plot towards the compute-bound regime. Reducing
    traffic to 5MB per inference allows the system to hit the compute ceiling of 500 QPS.
  common_mistake: Attempting to prune the MatMul weights to reduce the 4 GOPS, assuming the model is too
    large for the 2 TOPS NPU.
  napkin_math: 'Current memory time = 20MB / 4 GB/s = 5ms (max 200 QPS).

    Compute time = 4 GOPS / 2 TOPS = 2ms (max 500 QPS).

    Ridge point = 2 TOPS / 4 GB/s = 500 OPS/Byte.

    Current AI = 4 GOPS / 20MB = 200 OPS/Byte (Memory Bound).

    To hit 500 QPS, we need memory time <= 2ms, meaning max traffic = 2ms * 4 GB/s = 8MB. Fusing operators
    removes the 15MB of intermediate read/writes, reducing traffic to 5MB. New memory time = 1.25ms. Workload
    becomes compute-bound at 2ms (500 QPS).'
