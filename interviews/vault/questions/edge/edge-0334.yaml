title: The Perception Model's Memory Diet (edge-0334)
scenario: You're optimizing a CNN-based perception model for an autonomous vehicle's main perception unit. The model has 30 million parameters and its weights are currently stored in FP16 precision.
question: For 30 million FP16 parameters, what are the FP16 and INT8 weight footprints and total memory saved after quantization?
details:
  realistic_solution: The solution is a direct comparison of the memory footprint for the weights in each precision. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. For a 30 million parameter model, the calculation is straightforward. This 2x reduction in weight memory is a critical and common optimization on memory-constrained edge devices like those found in automotive systems.
  common_mistake: |
    **The Pitfall:** Assuming the original baseline is FP32 (4 bytes/param) instead of FP16.
    **The Rationale:** Candidates default to standard deep learning precision without checking the edge baseline.
    **The Consequence:** Overestimating the memory savings by a factor of 2.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 30,000,000.
       - FP16 precision size: 2 bytes/param.
       - INT8 precision size: 1 byte/param.
    2. **Calculations:**
       - FP16 weight memory: 30,000,000 * 2 bytes = 60 MB.
       - INT8 weight memory: 30,000,000 * 1 byte = 30 MB.
       - Memory saved: 60 MB - 30 MB = 30 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 30 MB reduction in weight footprint.**
       - **Memory-Capacity-Bound**
  options:
  - The reduction is 90 MB.
  - The reduction is 60 MB.
  - The reduction is 30 MB.
  - The reduction is 15 MB.
