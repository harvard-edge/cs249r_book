title: The Invisible Inventory
scenario: You are the ML Systems Engineer for a fleet of smart retail cameras that use an object detection
  model to track inventory. The system runs on NVIDIA Jetson AGX Orin devices. Suddenly, the system-wide
  inventory count for one specific high-value product, 'Glo-Cola,' flatlines, even though store staff
  confirm the shelves are fully stocked. All other products are detected correctly. You inspect the device
  dashboards and see that GPU utilization is consistently high and inference latency is normal. Diagnosing
  the issue, what is the most likely cause of this sudden, targeted failure?
question: "Diagnosing the issue, what is the most likely cause of this sudden, targeted failure?"
details:
  realistic_solution: The most likely cause is a physical adversarial attack. An attacker has designed
    a sticker (an 'adversarial patch') and placed it on the Glo-Cola bottles in the store. This patch
    is a carefully crafted pattern of noise that is innocuous to the human eye but specifically designed
    to fool the object detection model, causing it to ignore the product. The GPU runs normally because
    it's still processing frames; the input data from the camera sensor itself has been manipulated in
    the physical world.
  common_mistake: Blaming standard operational issues like model drift or data pipeline errors. Drift
    is a gradual process, not a sudden cliff-edge failure for a single category. Similarly, a data issue
    during training would require a model update to have an effect, whereas this failure was instantaneous
    across the deployed fleet.
  napkin_math: An adversarial patch attack surface is surprisingly small. Assume the camera input is 640x640
    pixels.
  options:
  - The model has drifted due to a change in store lighting, and the 'Glo-Cola' bottle was the first to
    be affected.
  - A recent OTA model update was corrupted, causing it to fail on this specific object class.
  - A physical adversarial patch has been placed on the 'Glo-Cola' bottles, making them invisible to the
    model.
  - The camera sensors across the fleet have simultaneously developed a hardware fault that prevents them
    from seeing the specific red color of the 'Glo-Cola' logo.
  correct_index: 2
