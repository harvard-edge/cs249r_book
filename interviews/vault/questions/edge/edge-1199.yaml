title: 'Edge Transformer Fluency: Memory-Bandwidth-Bound Decode Calculation'
scenario: In an interview, you are asked to quickly estimate maximum decode throughput for a 3B INT4 model on Jetson Orin NX. Model weights are 3B params * 0.5B/param (INT4) = 1.5GB.
question: What is the KV cache size at context=256 for 32 layers, 32 heads, head_dim=128, and FP16, and why isn't it 1.07GB?
details:
  realistic_solution: 'KV at context=256 with 32 layers, 32 heads, head_dim=128, fp16: 32\times2\times32\times128\times256\times2B = 134MB \approx 128MB (not 1.07GB which uses context=2048 or larger).'
  common_mistake: |
    **The Pitfall:** Forgetting that INT4 halves the weight bytes loaded compared to INT8.
    **The Rationale:** Candidates are accustomed to INT8 or FP16 math and often miscalculate the parameter footprint by failing to divide by the bits per byte correctly.
    **The Consequence:** They overestimate the memory bandwidth required by 2x, leading to flawed throughput estimations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context Length: 256 tokens.
    - Architecture: 32 layers, 32 heads, 128 head_dim.
    - Datatype: FP16 (2 bytes).

    **Calculations:**
    - KV Cache Formula: Layers * 2 (K+V) * Heads * Head_Dim * Context * Bytes/FP16.
    - Values: 32 * 2 * 32 * 128 * 256 * 2 bytes.
    - Sequence: 64 * 32 = 2048; 2048 * 128 = 262,144; 262,144 * 256 = 67,108,864; 67,108,864 * 2 = 134,217,728 bytes.

    **Conclusion & Interpretation:**
    - **Result: 134 MB (Memory-Bound)**. Calculating the exact context scaling isolates the memory footprint accurately, proving that 1.07 GB only applies to 2048+ token contexts.
