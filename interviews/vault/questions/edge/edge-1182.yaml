title: 'Edge Transformer Cost Mastery: Full Edge LLM Deployment Analysis'
scenario: 'Design a complete edge LLM deployment for a factory floor assistant using Jetson Orin. Model: Phi-3-Mini-4K (3.8B params, INT4). Requirements: <2s for 200 token response, 10 simultaneous users, 24/7 operation.'
question: Can one Jetson Orin handle Phi-3-Mini-4K INT4 for 10 simultaneous users with <2s 200-token responses, and what is its annual cost?
details:
  realistic_solution: 'While the model and KV cache fit within the 32GB RAM, the decode phase fails the latency requirement. Decode throughput is bottlenecked by loading both weights AND the massive 10-user KV cache from memory for every single generated token. The memory bandwidth cannot sustain the <2s SLA. Annual power cost is trivial (~$52).'
  common_mistake: |
    **The Pitfall:** Calculating decode latency based only on model weights, ignoring the KV cache memory bandwidth.
    **The Rationale:** Candidates treat KV cache as static storage rather than dynamic memory that must be read per step.
    **The Consequence:** Deploying a system that fits in memory but catastrophically fails latency SLAs under concurrent load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Jetson Orin 32GB (102.4 GB/s bandwidth, 60W)
       - Model: 3.8B INT4 ~ 1.9GB weights
       - SLA: 200 tokens in <2s (10ms/token max)
    2. **Calculations:**
       - KV Cache (4K context, 10 users): ~1.5GB/user = 15GB total.
       - Memory footprint: 1.9GB + 15GB = 16.9GB (Fits in 32GB).
       - Decode memory per step: 1.9GB weights + 15GB KV = 16.9GB transfer.
       - Time per decode step: 16.9 GB / 102.4 GB/s = 165 ms/token.
       - 200 tokens * 165 ms = 33 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Fails Latency SLA.** 33 seconds vastly exceeds the 2s requirement due to KV cache bandwidth saturation.
