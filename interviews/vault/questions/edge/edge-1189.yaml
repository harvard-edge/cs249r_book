title: Achieve Mastery in Edge Queueing System Design Under Intermittent Connectivity
scenario: You are the principal engineer for an autonomous agricultural drone fleet running inference on Hailo-8 NPUs. Drones disconnect from base station for 20-minute windows, buffering inference requests locally. Arrival rate is 4 req/s (Poisson). Service time is 50ms/req on the Hailo-8. During disconnection, requests queue locally with a 512MB buffer. Upon reconnection, results batch-upload via a 10MB/s uplink.
question: How would you model buffering, overflow, and reconnection bursts for Hailo-8 drones disconnected for 20 minutes at 4 req/s?
details:
  realistic_solution: 'During connection: \lambda=4 req/s, \mu=20 req/s, \rho=0.2. M/M/1 queue is stable. During disconnection (1200s): requests processed locally. 4*1200=4800 arrivals, perfectly handled since \rho < 1. Results upload: 4800 results at 10MB/s. If 100KB/result, 480MB fits in 512MB buffer and uploads in 48s.'
  common_mistake: |
    **The Pitfall:** Modeling the system strictly as an M/M/1 queue and assuming it will fail during disconnection.
    **The Rationale:** Engineers assume being disconnected means requests pile up boundlessly, ignoring local inference service rate.
    **The Consequence:** Over-engineering the buffer or rejecting requests unnecessarily, missing that local inference easily keeps up.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - \lambda = 4 req/s, \mu = 1/0.050 = 20 req/s.
       - 20-minute (1200s) disconnection, 512MB buffer, 10MB/s uplink, 100KB/result.
    2. **Calculations:**
       - Utilization \rho = 4/20 = 0.2 < 1 (Stable).
       - Disconnection Volume: 4 * 1200 = 4,800 requests.
       - Result Storage: 4,800 * 100KB = 480MB (Fits in 512MB).
       - Reconnection Upload: 480MB / 10MB/s = 48 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 512MB buffer is sufficient; burst clears in 48 seconds. (Network-Uplink-Bound)**
