title: Achieve Mastery in Edge Queueing System Design Under Intermittent Connectivity
scenario: You are the principal engineer for an autonomous agricultural drone fleet running inference on Hailo-8 NPUs (26 TOPS). Drones disconnect from base station for 20-minute windows, buffering inference requests locally. Arrival rate is 4 req/s (Poisson). Service time is 50ms/req on the Hailo-8. During disconnection, requests queue locally with a 512MB buffer. Upon reconnection, results batch-upload via a 10MB/s uplink.
question: How would you model buffering, overflow, and reconnection bursts for Hailo-8 drones disconnected for 20 minutes at 4 req/s?
details:
  realistic_solution: 'During connection: λ=4 req/s, μ=20 req/s (1/50ms), ρ=4/20=0.2. M/M/1 mean queue = ρ/(1-ρ)=0.25 requests. No issue. During disconnection (20 min=1200s): λ=4, μ=20, ρ=0.2 < 1 → queue still stable. Buffer: peak queue length at P99 = μt during burst. Requests in 20min: 4×1200=4800 arrivals; processed: 20×1200=24,000 → all processed, no buildup. Reconnection burst: 4800 results upload at 10MB/s uplink... 4800 × 100KB/result = 480MB upload. Time: 480MB/10MB/s=48s. Buffer sizing: 512MB > 480MB ✓. If results are 200KB: 960MB > 512MB → must compress or reduce image quality to 50KB/result.'
  common_mistake: |
    **The Pitfall:** Modeling the system strictly as an M/M/1 queue and assuming it will fail during disconnection.
    **The Rationale:** Engineers often assume that being disconnected means requests simply pile up boundlessly, ignoring the local service rate of the edge NPU.
    **The Consequence:** Over-engineering the buffer or rejecting requests unnecessarily, failing to realize the local inference engine effortlessly keeps up with the arrival rate.
  napkin_math: |
    1. **Queue Stability:** Arrival rate $\lambda$ = 4 req/s. Service rate $\mu$ = 1 / 0.050s = 20 req/s. Utilization $\rho$ = 4/20 = 0.2. Since $\rho < 1$, the queue is stable and does not grow during disconnection.
    2. **Disconnection Volume:** Over 20 minutes (1200s), there are 4 * 1200 = 4,800 requests processed.
    3. **Result Storage:** Assuming 100KB per result, 4,800 results * 100KB = 480MB. This fits within the 512MB buffer.
    4. **Reconnection Upload:** Uploading 480MB at 10MB/s uplink takes **48 seconds**. 
    5. **Result:** The 512MB buffer is **sufficient**, and the burst clears in under a minute.
