title: Hailo-8 Memory Architecture and Power Efficiency
scenario: You are deploying a multi-camera object detection system using a Hailo-8 accelerator. During
  the architectural review, the team is deciding whether to preload the model weights onto the accelerator's
  local DRAM or stream them from the host's memory map. What is the fundamental memory architecture of
  the Hailo-8, and what is its rated INT8 performance and power consumption?
question: "What is the fundamental memory architecture of the Hailo-8, and what is its rated INT8 performance and power consumption?"
details:
  realistic_solution: The Hailo-8 is a dataflow accelerator that does not have local DRAM; it streams
    weights and data directly from host memory. It operates at 26 TOPS for INT8 precision with a typical
    power consumption of 2.5W. Recognizing this architecture is critical, as memory-mapped inference strategies
    must focus on host-side memory management and PCIe bandwidth rather than on-device memory limitations.
  common_mistake: Candidates often assume all edge AI accelerators have dedicated on-board DRAM (like
    edge GPUs or TPUs) for storing weights and activations. They might incorrectly suggest optimizing
    the Hailo-8's local memory footprint rather than optimizing the PCIe bandwidth from the host.
  napkin_math: 'Based on the specifications, the power efficiency of the Hailo-8 is calculated as: 26
    TOPS / 2.5W = 10.4 TOPS/Watt. Since it streams directly from host memory without local DRAM, the host
    must sustain the required dataflow bandwidth to utilize the 26 TOPS capacity.'
