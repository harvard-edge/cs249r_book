title: ONNX Runtime Mobile vs TensorRT on Jetson Orin for Edge Inference
scenario: You deploy a YOLOv8-small model on Jetson Orin (275 TOPS INT8, 32GB unified memory, 60W TDP). You compare ONNX Runtime with the TensorRT EP against standalone TensorRT. ONNX RT adds 12% latency overhead.
question: Is the portability of ONNX Runtime worth the 12% latency overhead over standalone TensorRT, and how can it be mitigated?
details:
  realistic_solution: 'The 12% overhead comes from: (1) ONNX RT''s graph partitioning overhead (~3%). (2) Memory copy between ORT''s internal buffers and TensorRT engine inputs/outputs (~5%). (3) Suboptimal TensorRT builder settings when invoked via EP vs direct API (~4%). Mitigation: use ORT''s TensorRT EP with trt_max_workspace_size tuned for Orin''s memory, enable trt_fp16_enable, and pre-build the TensorRT engine cache. This reduces overhead to 4-6%. The portability benefit: same ONNX model runs on Orin (TRT EP), x86 cloud (CUDA EP), and Qualcomm (QNN EP) without code changes.'
  common_mistake: |
    **The Pitfall:** Dismissing the 12% overhead as unacceptable without considering the engineering benefits.
    **The Rationale:** Engineers chasing peak theoretical performance reject higher-level abstractions like ONNX Runtime out of hand.
    **The Consequence:** They end up re-engineering the deployment pipeline for every new model and target platform, vastly increasing development costs for negligible real-world gains.
  napkin_math: |
    1. **YOLOv8-small Complexity**: ~11.2M params, ~28.6 GFLOPS.
    2. **Orin Compute Floor**: At 275 TOPS INT8, theoretical compute floor = 28.6G / 275T = 0.1ms.
    3. **Realistic Latencies**: Including memory access, standalone TensorRT takes ~4.0ms, and ORT+TRT EP takes ~4.5ms.
    4. **Conclusion**: Both options are well under the 30fps real-time target (33ms budget), so the 0.5ms difference is negligible compared to the engineering benefits of **cross-platform portability**.
