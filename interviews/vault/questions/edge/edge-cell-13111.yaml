title: 'Edge TCO Diagnosis: Connectivity Cost Surprise in IoT Fleet'
scenario: 'A company budgeted $500K for a 2,000-unit Jetson Orin ($499 each) smart city deployment. At
  month 3, they''ve spent $200K more than projected. The extra cost is from 4G data overages (budget:
  $5/unit/month, actual: $25/unit/month). Diagnose the root cause (inference results vs raw data transmission)
  and calculate the annual overage cost and fix.'
details:
  realistic_solution: 'Data overage: $25-$5=$20/unit/month extra. 2000 units: $40K/month extra = $480K/year
    overage. Budget: $10K/month. Actual: $50K/month = 5x budget. Root cause: camera feeds being streamed
    to cloud dashboard in addition to inference results. 1080p H.264 stream: 2-5 Mbps. 4G at 25GB/month
    plan: 25GB*8/30days/24hr = 55.6 kbps average. 2Mbps camera >> 55.6 kbps allowance → overages. Fix:
    transmit only inference results (JSON, ~1KB/frame). 30fps * 1KB * 3600 * 24 = 2.6GB/day vs camera:
    2Mbps*86400/8=21.6GB/day. Fix reduces data 8x. New cost: $25/8=$3.12/unit/month < $5 budget. Saves
    $440K/year.'
  common_mistake: Designing an 'edge' system that still transmits raw camera streams to the cloud for
    visualization/logging, negating the bandwidth savings that justified using edge inference hardware.
  napkin_math: 'Overage: $20/unit/month * 2000 * 12 = $480K/year. Camera stream: 2Mbps * 3600*24*30/8
    / 1e9 = 2Mbps * 2592000s/8 / 1e9 = 648GB/month per unit. At $25/25GB: 648/25 * $25 = $648/unit/month
    (massive overage!). But actual $25/unit means ~25GB used. So not streaming full video. Problem: periodic
    30-second clips triggered by detections: 30fps*30s*2Mbps/8=45MB/clip. If 20 events/day: 20*45MB=900MB/day=27GB/month.
    Explains $25. Fix: thumbnail only (50KB) + inference result: 20*0.050MB=1MB/day=30MB/month = $0.03
    vs $25. Saves $24.97/unit/month * 2000 * 12 = $599K/year.'
