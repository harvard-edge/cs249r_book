title: Edge New 0021
scenario: A vision pipeline on an Orin SoC involves CPU preprocessing and GPU inference. You must choose between explicitly copying the 10MB frames from CPU pinned memory to GPU memory versus using unified memory (zero-copy) for a 30 FPS target.
question: For 10MB frames at 30 FPS on Orin, should the pipeline use explicit CPU-to-GPU copies or unified zero-copy memory?
details:
  realistic_solution: With unified memory on Jetson Orin, CPU and GPU physically share the same DRAM. Using zero-copy memory avoids the explicit DMA allocation and data duplication. However, if the GPU reads the same memory locations repeatedly (e.g., iterative convolutions), unified memory without hardware caching can degrade compute bandwidth. For a sequential CNN pass, zero-copy drastically reduces latency and memory footprint, making it ideal.
  common_mistake: |
    **The Pitfall:** Assuming Jetson SoCs require explicit PCIe host-to-device memory transfers.
    **The Rationale:** Candidates blindly apply discrete GPU (dGPU) programming paradigms to edge System-on-Chips, failing to understand physical memory unification.
    **The Consequence:** Introducing unnecessary explicit memory copies that waste massive amounts of RAM and burn through the tight real-time latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size: 10 MB.
    - Target throughput: 30 FPS (33.3 ms budget).
    - Orin DRAM bandwidth: ~200 GB/s.
    - OS/Driver DMA setup overhead: ~0.5 ms.

    **Calculations:**
    - Explicit copy raw transfer: 10 MB / 200 GB/s = 0.05 ms.
    - Total explicit latency: 0.05 ms + 0.5 ms overhead = 0.55 ms.
    - Reclaimed budget: (0.55 ms / 33.3 ms) * 100 = 1.65%.

    **Conclusion & Interpretation:**
    - **Result: Zero-Copy Reclaims 1.65% Deadline (Latency-Bound)**. Utilizing unified zero-copy memory completely avoids the 0.55ms DMA penalty and halves the physical memory footprint per frame.
