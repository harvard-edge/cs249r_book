title: The Voice Assistant's First Word
scenario: You are designing the voice assistant for a new self-driving car's infotainment system. The
  model runs on an edge processor like a Jetson AGX Orin inside the vehicle. To ensure the driver perceives
  the system as highly responsive and 'instant', which of the following metrics is the most critical to
  minimize for the initial user experience?
details:
  realistic_solution: The most critical metric is **Time To First Token (TTFT)**. TTFT measures the latency
    from the moment the user's query is sent to the model until the very first token of the response is
    generated. This initial delay is what a user directly perceives as 'lag' or 'responsiveness.' While
    TPOT (Time Per Output Token) is important for the fluency of the streaming response, a low TTFT is
    essential to make the system feel instantaneous.
  common_mistake: Engineers often over-index on throughput (like tokens/second or TPOT) because it's a
    primary goal in offline batch processing. However, in an interactive real-time system, the user's
    perception of speed is almost entirely dictated by the initial delay before they see the first output.
    A system can have fantastic throughput but feel laggy if the Time To First Token (TTFT) is high.
  napkin_math: 'Consider two systems: | **System A (High TTFT):** TTFT = 1500ms, TPOT = 20ms/token. The
    user waits 1.5 seconds in silence. | **System B (Low TTFT):** TTFT = 300ms, TPOT = 50ms/token. The
    user hears a response start in 0.3 seconds.'
  options:
  - Time Per Output Token (TPOT)
  - Time To First Token (TTFT)
  - End-to-End Generation Time
  - Achieved Batch Throughput (requests/sec)
