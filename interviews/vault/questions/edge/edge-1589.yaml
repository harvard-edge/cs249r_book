title: Edge TPU CI/CD Pipeline Quantization Throughput
scenario: You are building a CI/CD pipeline for a fleet of devices equipped with an edge accelerator. As part of the automated build process, every new model candidate must be quantized to INT8. If a target model requires 200 GOPS per inference, calculate the theoretical maximum frame rate (FPS) you can expect during the automated performance smoke test.
question: What theoretical FPS should the CI/CD smoke test show for an INT8 model requiring 200 GOPS per inference on a 4 TOPS accelerator?
details:
  realistic_solution: 'The correct approach is to identify the hardware''s peak performance capability (4 TOPS) and convert it to the same unit as the model''s requirement (GOPS). Then, divide the peak performance by the per-inference requirement to find the theoretical maximum inferences per second.'
  common_mistake: |
    **The Pitfall:** Failing to convert GOPS to TOPS, or confusing TOPS with TFLOPS.
    **The Rationale:** Misunderstanding units of measure or forgetting that the accelerator specifically accelerates INT8 operations, not floating point.
    **The Consequence:** Incorrectly estimating the hardware capacity, leading to broken CI/CD test assertions or deploying models that are fundamentally incompatible with the edge hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak hardware performance: 4 TOPS (INT8).
       - Model computational requirement: 200 GOPS/inference.
    2. **Calculations:**
       - Convert TOPS to GOPS: 4 TOPS * 1,000 = 4,000 GOPS.
       - Max theoretical throughput: 4,000 GOPS / 200 GOPS/inference = 20 inferences per second.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Limit**. The CI/CD pipeline should assert a theoretical maximum of 20 FPS; anything significantly lower in testing indicates a severe memory bandwidth bottleneck or compiler inefficiency.
