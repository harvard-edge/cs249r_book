title: Die-to-Die Power Gating at Edge
scenario: An always-on edge device uses a heterogeneous chiplet with separate ISP and ML inference dies.
question: What power-gating strategy keeps an ISP/ML chiplet edge device under idle power targets while meeting a <10 ms wake latency?
details:
  realistic_solution: 'Use tiered power states: (1) retention mode (1-2mW) — keep SRAM state, gate compute logic, wake in <1ms; (2) shallow sleep (0.1mW) — flush SRAM to embedded DRAM, gate die fully, 5-8ms wake including DRAM reload; (3) deep sleep (<0.01mW) — gate everything, 50ms+ wake. Keep ML die in retention mode during inter-burst gaps <1s, drop to shallow sleep for >1s gaps.'
  common_mistake: |
    **The Pitfall:** Power gating the entire ML die during short idle periods.
    **The Rationale:** Candidates optimize purely for lowest idle power without accounting for the hardware wake-up sequence.
    **The Consequence:** Paying a cold-start latency (~50-100ms) on each activation violates the <10ms latency requirement.
  napkin_math: |
    - **Active Power:** 8W.
    - **Retention Mode Power:** 2mW.
    - **Average Power (10% duty cycle):** 0.1 * 8W + 0.9 * 0.002W = 0.8W + 0.0018W ≈ **0.8W** (10x reduction).
    - **Latency Check:** Wake from retention takes **<1ms**, satisfying the 10ms SLA with a 9ms margin.
