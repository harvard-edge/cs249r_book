title: Zero-Copy Memory on Unified Edge Devices
scenario: A developer is optimizing a high-resolution semantic segmentation pipeline
  for a Jetson AGX Orin, utilizing its unified LPDDR5 memory (204.8 GB/s).
question: What is a 'zero-copy' memory buffer, and why does it drastically reduce
  latency on unified memory architectures?
details:
  realistic_solution: In a unified architecture, the CPU and GPU share the same physical
    LPDDR5 RAM. Creating a zero-copy buffer means memory is pinned and mutually accessible.
    The CPU decodes video directly into this RAM, and the GPU reads it for inference
    in place, entirely eliminating the latency and bandwidth cost of a `cudaMemcpy`
    operation over a PCIe bus.
  common_mistake: Assuming zero-copy memory operates strictly within the L1/L2 cache
    and bypasses DRAM altogether.
  napkin_math: 1 alloc = 0 memcpy
