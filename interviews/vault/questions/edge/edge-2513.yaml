title: CAN Bus Protocol Framing Penalty
scenario: 4 Cortex-M7 MCUs do parameter averaging over a 1 Mbps CAN bus. The payload
  is 200 bytes. A CAN frame carries 8 payload bytes with 6 bytes of header overhead.
question: Evaluate the effective data transfer time for 3 nodes sequentially sending
  to 1 central parameter server node.
details:
  realistic_solution: 200 bytes requires 25 CAN frames per node. Each frame is 14
    bytes (112 bits). Total bits per sender = 25 * 112 = 2800 bits. For 3 sending
    nodes, total bits serialized on the bus is 8400 bits. At 1 Mbps, this takes 8.4ms.
    Arbitration introduces serialization but no collisions.
  common_mistake: Calculating time purely by the raw payload size ((200 bytes * 3)
    / 1 Mbps), forgetting the massive ~43% header overhead inherent to CAN topologies.
  napkin_math: 200/8 = 25 frames. 25 * (8+6) bytes = 350 B = 2800 bits. 3 senders
    * 2800 bits / 1e6 bps = 8.4 ms.
