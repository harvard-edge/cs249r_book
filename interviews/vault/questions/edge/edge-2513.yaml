title: 'CAN Bus Protocol Framing Penalty'
scenario: '4 Cortex-M7 MCUs do parameter averaging over a 1 Mbps CAN bus. The payload is 200 bytes. A CAN frame carries 8 payload bytes with 6 bytes of header overhead.'
question: 'Evaluate the effective data transfer time for 3 nodes sequentially sending to 1 central parameter server node.'
details:
  realistic_solution: '200 bytes requires 25 CAN frames per node. Each frame is 14 bytes (112 bits). Total bits per sender = 25 * 112 = 2800 bits. For 3 sending nodes, total bits serialized on the bus is 8400 bits. At 1 Mbps, this takes 8.4ms. Arbitration introduces serialization but no collisions.'
  common_mistake: |
    **The Pitfall:** Calculating transfer time using only the raw payload size and ignoring header overhead.
    **The Rationale:** Engineers often forget the massive frame overhead inherent to low-level topologies like CAN bus.
    **The Consequence:** The calculated transfer time is vastly underestimated, leading to blown real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload per node: 200 bytes.
    - Number of senders: 3 nodes.
    - CAN frame capacity: 8 bytes payload, 6 bytes header.
    - Bus speed: 1 Mbps.

    **Calculations:**
    - Total frames per node: 200 bytes / 8 bytes/frame = 25 frames.
    - Total frame size: 8 bytes payload + 6 bytes header = 14 bytes = 112 bits.
    - Bits per sender: 25 frames * 112 bits = 2800 bits.
    - Total bits for 3 senders: 3 * 2800 = 8400 bits.
    - Transfer time: 8400 bits / 1,000,000 bps = 8.4 ms.

    **Conclusion & Interpretation:**
    - **Result: 8.4 ms (Network-Bound)**. Protocol header framing adds substantial overhead, severely penalizing actual payload transfer times on low-bandwidth buses.
