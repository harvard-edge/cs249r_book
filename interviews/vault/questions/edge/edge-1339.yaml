title: Compound Pipeline Throughput on Cloud AI 100
scenario: You are deploying a compound agentic pipeline on a single Qualcomm Cloud AI 100 on-premise inference accelerator. The pipeline sequentially chains a router model and an expert LLM. The router requires 2 Tera-operations per request, and the expert LLM requires 18 Tera-operations per request. Both models are quantized to INT8 and easily fit within the memory limit. Assuming the workload is fully compute-bound and achieves 100% utilization.
question: What are the maximum theoretical throughput and energy per request for the sequential router-plus-expert pipeline?
details:
  realistic_solution: For a sequential compound AI system, the total compute cost per request is the sum of the individual model costs. Because both models fit in the 32 GB memory and are compute-bound, the total TOPS required per request dictates the overall system throughput. You divide the hardware's maximum TOPS by the operations per request to get throughput, and then divide the total power by the throughput to find the energy per request.
  common_mistake: |
    **The Pitfall:** Forgetting to sum the compute operations of all models or multiplying power by compute.
    **The Rationale:** Candidates often treat chained models independently or misunderstand the relationship between power (Watts), time (seconds), and energy (Joules).
    **The Consequence:** Drastically incorrect throughput and energy estimates, leading to flawed infrastructure scaling and TCO models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Qualcomm Cloud AI 100 at 400 TOPS and 75 Watts.
       - Router model: 2 Tera-operations per request.
       - Expert LLM: 18 Tera-operations per request.
    2. **Calculations:**
       - Total compute per request: 2 Tera-ops + 18 Tera-ops = 20 Tera-ops.
       - Maximum theoretical throughput: 400 TOPS / 20 Tera-ops/request = 20 requests per second.
       - Energy per request: 75 Watts (Joules/sec) / 20 requests/sec = 3.75 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 20 FPS and 3.75 Joules/Request**. Maximum throughput is 20 requests per second, consuming 3.75 Joules per request.
