title: Edge New 0033
scenario: A wearable Cortex-M4 classifies 10KB of raw accelerometer data. It can transmit raw data via BLE (1MB/s) taking 10mW, or run a 2ms local inference taking 30mW, then transmit a 10-byte result.
question: For 10KB accelerometer windows, should the wearable transmit raw BLE data or run local inference and send a 10-byte result?
details:
  realistic_solution: Transmitting raw data places the computational burden on the paired smartphone but burns massive energy holding the BLE radio active. Local execution briefly spikes the MCU power (30mW for 2ms) but drastically shrinks the data payload to almost zero, turning off the radio immediately. The tradeoff undeniably favors edge processing (TinyML) to maximize the battery life of the wearable device.
  common_mistake: |
    **The Pitfall:** Assuming that local computation on an MCU always drains the battery faster than radio transmission.
    **The Rationale:** Engineers rely on outdated heuristics about "expensive" compute rather than calculating the exact energy cost of keeping the BLE radio active for prolonged payloads.
    **The Consequence:** The system architecture incorrectly favors cloud streaming, drastically reducing the wearable's battery life.
  napkin_math: |
    1. Calculate cost to transmit raw data: 10KB / 1MB/s = 10ms. Energy = 10ms * 10mW = 100 μJ.
    2. Calculate cost for local inference: 2ms * 30mW = 60 μJ.
    3. Calculate cost to transmit 10-byte result: ~0.01ms * 10mW = 0.1 μJ.
    4. Calculate total local processing cost: 60 μJ + 0.1 μJ = 60.1 μJ.
    **Edge inference uses 60.1 μJ compared to 100 μJ for raw transmission, saving roughly 40% of the energy.**
