title: Edge New 0033
scenario: A wearable Cortex-M4 classifies 10KB of raw accelerometer data. It can transmit raw data via
  BLE (1MB/s) taking 10mW, or run a 2ms local inference taking 30mW, then transmit a 10-byte result. Analyze
  the system energy tradeoff.
question: "For 10KB accelerometer windows, should the wearable transmit raw BLE data or run local inference and send a 10-byte result?"
details:
  realistic_solution: Transmitting raw data places the computational burden on the paired smartphone but
    burns massive energy holding the BLE radio active. Local execution briefly spikes the MCU power (30mW
    for 2ms) but drastically shrinks the data payload to almost zero, turning off the radio immediately.
    The tradeoff undeniably favors edge processing (TinyML) to maximize the battery life of the wearable
    device.
  common_mistake: Assuming computation on an MCU always uses more battery than radio transmission, a fallacy
    in modern TinyML paradigms.
  napkin_math: 'Transmit raw: 10KB / 1MB/s = 10ms. Energy = 10ms * 10mW = 100uJ. Local compute: 2ms *
    30mW = 60uJ + Transmit 10 bytes (~0.01ms * 10mW = 0.1uJ) = ~60.1uJ. Edge inference saves 40% energy.'
