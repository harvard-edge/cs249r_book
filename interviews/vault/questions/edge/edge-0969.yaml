title: Edge New 0033
scenario: A wearable Cortex-M4 classifies 10KB of raw accelerometer data. It can transmit raw data via BLE (1MB/s) taking 10mW, or run a 2ms local inference taking 30mW, then transmit a 10-byte result.
question: For 10KB accelerometer windows, should the wearable transmit raw BLE data or run local inference and send a 10-byte result?
details:
  realistic_solution: Executing local inference (TinyML) is fundamentally superior. The paradigm hinges on trading a high-power, long-duration I/O operation (keeping the BLE radio active) for a short, intense burst of localized compute. The energy required to process the data locally is significantly smaller than the energy expended streaming the raw uncompressed tensor over the air, drastically extending the wearable's battery life.
  common_mistake: |
    **The Pitfall:** Assuming that engaging the MCU for heavy computation always drains more battery than simple wireless transmission.
    **The Rationale:** Engineers rely on outdated heuristics about "expensive" processing rather than calculating the exact joule cost of radio transmission time.
    **The Consequence:** The architecture defaults to streaming telemetry to the cloud, burning massive energy holding the BLE radio active and cutting the battery life by >40%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BLE Transmission: 1 MB/s throughput, 10 mW power.
       - Local Inference: 2 ms duration, 30 mW power.
       - Data Payload: 10 KB raw, 10 bytes result.
    2. **Calculations:**
       - Raw Tx Time = 10 KB / 1000 KB/s = 0.01 s = 10 ms.
       - Raw Tx Energy = 10 ms * 10 mW = 100 μJ.
       - Local Inference Energy = 2 ms * 30 mW = 60 μJ.
       - Result Tx Time = 10 bytes / 1 MB/s = ~0.01 ms.
       - Result Tx Energy = 0.01 ms * 10 mW = 0.1 μJ.
       - Total Local Energy = 60 μJ + 0.1 μJ = 60.1 μJ.
    3. **Conclusion & Interpretation:**
       - **Result: Local inference uses 60.1 μJ vs 100 μJ for raw transmission. The system is Energy-Bound by wireless I/O; computing on the edge saves ~40% energy.**
