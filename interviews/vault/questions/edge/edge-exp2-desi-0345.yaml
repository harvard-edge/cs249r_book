title: On-Premise Video Analytics Accelerator Selection
scenario: You are designing an on-premise video analytics appliance for a retail chain that needs to process
  50 concurrent 1080p camera streams. Your team is evaluating between using multiple standard edge GPUs
  (e.g., T4s) or a single Qualcomm Cloud AI 100 accelerator. The appliance has a strict 150W power budget
  and must run a quantized INT8 object detection model requiring 5 TOPS per stream and 500 MB of memory
  per stream. Evaluate the architectural tradeoffs between these options and justify your selection based
  on the 75W, 400 TOPS, and 32GB LPDDR4x constraints of the Qualcomm chip.
question: "Would you use multiple T4-class GPUs or one Cloud AI 100 for 50 1080p streams under a 150W budget, and why?"
details:
  realistic_solution: The optimal design selects the Qualcomm Cloud AI 100 because it fits well within
    the strict power budget while providing sufficient compute and memory. The candidate should recognize
    that a single AI 100 draws 75W, leaving ample headroom in the 150W budget for the host CPU and networking,
    unlike multiple GPUs which would easily exceed it. Furthermore, the 32 GB of memory is more than enough
    for the concurrent streams, and the INT8 optimization aligns perfectly with the quantized model requirements.
  common_mistake: Candidates often focus purely on the theoretical peak TOPS and ignore the power constraints
    or memory bandwidth limitations. They might also mistakenly suggest deploying models in FP16 or FP32
    on an accelerator heavily optimized for INT8 workloads like the Cloud AI 100.
  napkin_math: 'Compute requirement: 50 streams * 5 TOPS/stream = 250 TOPS. Memory requirement: 50 streams
    * 500 MB/stream = 25,000 MB (~25 GB). Qualcomm Cloud AI 100 provides 400 TOPS (250 < 400) and 32 GB
    memory (25 GB < 32 GB) at 75W. A single card comfortably meets both compute and memory needs while
    staying well below the 150W appliance limit.'
