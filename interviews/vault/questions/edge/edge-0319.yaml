title: The Real-Time Batching Trap (edge-0319)
scenario: Your team is building the perception system for an autonomous vehicle. The system uses a camera running at 30 FPS, meaning you have a hard real-time deadline of 33ms to process each frame. Your object detection model takes exactly 20ms to process a single frame (batch size 1) on the hardware.
question: Does the first frame still meet the 33 ms deadline if you batch two 30 FPS camera frames and the batch takes 30 ms to process?
details:
  realistic_solution: This change will cause the system to fail its real-time deadline. The first frame arrives at t=0 but must be held in a buffer, waiting for the second frame. Only then can the batch of two be sent for processing, destroying the real-time latency guarantee.
  common_mistake: |
    **The Pitfall:** Focusing only on amortized throughput and ignoring queuing delay.
    **The Rationale:** Engineers calculate that a batch of 2 taking 30ms yields 15ms per frame, incorrectly concluding this is a speedup.
    **The Consequence:** They forget that the first frame must wait 33.3ms for the second frame to arrive, causing a fatal miss of the hard real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target framerate: 30 FPS (33.3ms arrival interval).
       - Batch size 2 processing time: 30ms.
    2. **Calculations:**
       - Frame 1 arrives at t=0ms.
       - Frame 2 arrives at t=33.3ms (Frame 1 must wait in queue).
       - Batch execution completes at t=33.3ms + 30ms = 63.3ms.
       - Latency for Frame 1 = 63.3ms.
    3. **Conclusion & Interpretation:**
       - **Batching introduces a 63.3ms latency, violating the 33.3ms real-time deadline. Result: Latency-Bound.**
  options:
  - 15ms, it meets the deadline. (Based on amortized throughput)
  - 30ms, it meets the deadline. (Based on processing time alone)
  - 63ms, it misses the deadline. (Correctly accounts for queuing delay)
  - 50ms, it misses the deadline. (Based on adding single and batch processing times)
  correct_index: 2
status: deleted