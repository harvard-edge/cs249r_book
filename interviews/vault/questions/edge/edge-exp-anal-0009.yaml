title: INT8 Quantization Impact on Edge Data Quality Gates
scenario: A factory deploys a data quality gate on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form
  factor) to detect anomalies in incoming sensor telemetry before cloud ingestion. The schema validation
  model requires 50 Mega-Operations (MOPs) per reading. The system validates 10,000 readings per second
  perfectly. However, after a sensor firmware update expands the raw data's dynamic range by 4x (while
  keeping the exact same feature schema and frequency), the quality gate suddenly starts missing 30% of
  critical anomalies, despite the system logs showing zero dropped frames and no queue buildup. Given
  the Coral's strict INT8 quantization requirement, analyze why the data validation accuracy degraded
  without any compute bottleneck, and calculate the system's current compute utilization.
question: "Why did the Coral quality gate start missing anomalies after the 4x sensor range increase, and what is its compute utilization?"
details:
  realistic_solution: The accuracy drop is caused by quantization resolution loss, not a system resource
    bottleneck. The Google Coral Edge TPU requires all inputs and operations to be quantized to INT8 (256
    discrete bins). When the sensor's dynamic range expanded by 4x, the quantization step size (scale
    factor) had to increase proportionally to fit the new range into the same 256 bins. This larger step
    size erased the subtle numerical deviations that the data quality model relied on to flag anomalies.
    The system is heavily underutilized, proving the issue is purely a data representation constraint.
  common_mistake: Candidates often assume the degradation is due to a compute bottleneck, thermal throttling
    at the 2W power limit, or an outdated model schema. They fail to analyze the mathematical impact of
    forcing a wider dynamic data range into a fixed 8-bit quantization space.
  napkin_math: '1. Compute required per second: 10,000 readings/sec * 50 MOPs/reading = 500 GOPs (0.5
    TOPS).

    2. Coral TPU Utilization: 0.5 TOPS / 4.0 TOPS total capacity = 12.5% utilization.

    3. Power efficiency: 12.5% utilization of the 2W TDP results in approximately 0.25W dynamic power
    for the validation gate.

    4. Quantization impact: INT8 has exactly 256 representation bins. If the original data range was 0-10V,
    the validation resolution was 10V / 255 = ~0.039V/bin. The new 4x range of 0-40V changes the resolution
    to 40V / 255 = ~0.157V/bin, completely masking data anomalies smaller than 0.157V.'
