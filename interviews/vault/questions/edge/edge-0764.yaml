title: The Inference Audit Trail Gap
scenario: Your medical imaging edge device runs a chest X-ray triage model in a rural clinic. During an FDA audit, the model produces a different confidence score for a reference image than validation records show. The model file hash matches exactly.
question: What went wrong to cause the deterministic model to produce non-deterministic outputs?
details:
  realistic_solution: '**Non-deterministic inference** in the GPU execution path. TensorRT and CUDA do not guarantee bitwise-reproducible results by default. Three sources of non-determinism:'
  common_mistake: |
    **The Pitfall:** Assuming the model file must have been modified or corrupted.
    **The Rationale:** Candidates trust GPU execution paths to be bitwise-reproducible by default, unaware of CUDA/TensorRT non-determinism.
    **The Consequence:** Extensive, wasted forensic investigations while failing strict FDA reproducibility compliance.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: Edge GPU with CUDA/TensorRT optimizations enabled.
       - Precision: FP16 execution path (non-deterministic).
    **Calculations:**
       - Non-deterministic FP16 variance introduces a max absolute difference of ~1e-3 to 1e-2 in logit space.
       - Sigmoid activation translation: Confidence shifts by 0.5% - 2.0%.
       - Decision boundary impact: A shift from 0.49 to 0.51 flips a binary clinical decision.
    **Conclusion & Interpretation:**
       - **Result: Non-Deterministic Execution**. A 2% variance caused by GPU execution non-determinism flips boundary clinical decisions, triggering the audit failure despite matching model hashes.
