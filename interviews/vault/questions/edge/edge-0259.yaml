title: 'The Federated Fleet Economics: Federated Learning'
scenario: 'Your company operates a test fleet of 1,000 autonomous vehicles, each equipped with a Jetson
  AGX Orin. Each vehicle generates about 500 GB of valuable sensor data per day. You''re comparing two
  training strategies:'
details:
  realistic_solution: The cost difference is enormous, making the federated approach dramatically cheaper
    from a data transfer perspective.
  common_mistake: Engineers often know federated learning (FL) is for privacy but drastically underestimate
    the economic incentive. They might compare the data sizes (500 GB vs 100 MB) without scaling it by
    the fleet size and cost per GB, thus failing to see that the cost difference is often measured in
    thousands of dollars *per day*.
  napkin_math: 'Centralized Upload: 1,000 vehicles * 500 GB/vehicle = 500,000 GB/day. Cost: 500,000 GB
    * $0.02/GB = $10,000/day ($3.65M/yr). Federated Learning (FL): Send a 100 MB (0.1 GB) weight update
    per car. 1,000 * 0.1 GB = 100 GB/day. Cost: 100 GB * $0.02/GB = $2/day. The bandwidth savings ratio
    is 500,000 / 100 = 5,000x, turning an unscalable $10k daily bill into just $2/day.'
  options:
  - The cost difference is negligible, around $10 for centralized, making the choice purely about privacy.
  - Centralized is much more expensive at ~$10,000/day, while the federated approach is almost free at
    ~$4/day.
  - Centralized is expensive at ~$10,000/day, but the federated approach is also costly at ~$2,000/day
    because model updates are large.
  - The data costs are minor; the real cost is the on-device compute for federated learning, making it
    more expensive overall.
  correct_index: 1
