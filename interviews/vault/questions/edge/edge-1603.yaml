title: Agent Orchestration Memory Footprint on Jetson Orin
scenario: You are deploying an autonomous robotic navigation agent on an NVIDIA Jetson
  Orin (32 GB LPDDR5). The pipeline requires a 7B LLM for decision making, a vision
  transformer (ViT) for object detection, and a Whisper model for voice commands.
  The 7B model is quantized to INT8, the ViT takes 2GB, and Whisper takes 1GB. Assuming
  the OS and base services consume 4GB of RAM, calculate the maximum possible context
  window size (in tokens) the 7B model can support if KV cache consumes 1MB per token.
question: Given 32 GB RAM, a 7B INT8 LLM, 2 GB ViT, 1 GB Whisper, 4 GB OS, and 1 MB/token
  KV cache, what max context window fits?
details:
  realistic_solution: First, calculate the memory required by the INT8 quantized 7B
    model. Then, subtract the OS, ViT, Whisper, and the LLM's static memory from the
    total 32GB LPDDR5 memory. The remaining memory is available for the KV cache,
    which can be divided by the memory per token to find the maximum context size.
  common_mistake: Candidates often forget to account for the memory footprint of the
    quantized 7B model itself, focusing only on the KV cache or auxiliary models,
    leading to an overestimation of the available memory for the context window.
  napkin_math: 'Total Memory = 32GB. INT8 7B Model Memory = 7 billion parameters *
    1 byte/parameter = 7GB. Total static memory used = 4GB (OS) + 2GB (ViT) + 1GB
    (Whisper) + 7GB (LLM) = 14GB. Available memory for KV cache = 32GB - 14GB = 18GB.
    Max context size = 18GB / (1MB/token) = 18,432 tokens.'
