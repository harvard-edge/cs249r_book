title: The Frame Budget
scenario: Your autonomous vehicle's perception stack must run at 30 FPS on a Jetson Orin. You have a detection
  model (18ms), a tracking module (5ms), and a planning module (8ms). Your colleague says 'that's 31ms
  total — we're fine, it's under 33ms.' Why is your colleague dangerously wrong?
question: "Why is your colleague dangerously wrong?"
details:
  realistic_solution: 'Your colleague is reasoning about *average* execution time, but real-time systems
    must guarantee **Worst-Case Execution Time (WCET)**. In a safety-critical pipeline, you must account
    for: (1) WCET of each stage, not average — detection might spike to 25ms on dense scenes, (2) memory
    contention from concurrent sensor DMA transfers, (3) OS scheduling jitter (even on Linux RT patches,
    expect 1–2ms), and (4) thermal throttling that can increase latencies by 30–50%. A real-time budget
    must include margins. The industry standard is to design for ≤70% of the frame budget in average case,
    leaving 30% headroom for WCET spikes. That means your pipeline must average ≤23ms, not 31ms.'
  common_mistake: '"31ms < 33ms, so we meet the deadline." This treats the frame budget as if average-case
    execution is all that matters.'
  napkin_math: 'Frame budget at 30 FPS = 33.3ms. WCET margin = 30% → usable budget = 23.3ms. Average pipeline
    = 31ms → **over budget by 33%**. Under thermal throttling (+40%): pipeline = 43ms → drops to ~23 FPS,
    violating the hard real-time contract.'
