title: The Frame Budget
scenario: Your autonomous vehicle's perception stack must run at 30 FPS on a Jetson Orin. You have a detection model (18ms), a tracking module (5ms), and a planning module (8ms). Your colleague says "that's 31ms total — we're fine, it's under 33ms."
question: Why is your colleague dangerously wrong regarding the 30 FPS frame budget?
details:
  realistic_solution: 'Your colleague is reasoning about *average* execution time, but real-time systems must guarantee **Worst-Case Execution Time (WCET)**. In a safety-critical pipeline, you must account for: (1) WCET of each stage, not average — detection might spike to 25ms on dense scenes, (2) memory contention from concurrent sensor DMA transfers, (3) OS scheduling jitter (even on Linux RT patches, expect 1–2ms), and (4) thermal throttling that can increase latencies by 30–50%. A real-time budget must include margins. The industry standard is to design for ≤70% of the frame budget in average case, leaving 30% headroom for WCET spikes. That means your pipeline must average ≤23ms, not 31ms.'
  common_mistake: |
    **The Pitfall:** Treating the frame budget as an average-case target.
    **The Rationale:** Believing that 31ms < 33ms mathematically guarantees the deadline is met without accounting for system jitter, memory contention, or thermal throttling.
    **The Consequence:** Frequent missed deadlines leading to dropped frames and severe safety risks in the autonomous vehicle.
  napkin_math: |
    * **Frame Budget**: 1000 ms / 30 FPS = 33.3 ms.
    * **WCET Margin**: Industry standard is 30% headroom for Worst-Case Execution Time.
    * **Usable Average Budget**: 33.3 ms * 0.70 = 23.3 ms.
    * **Current Average Pipeline**: 18 + 5 + 8 = 31 ms.
    * **Conclusion**: The pipeline is over budget by 33% (31 ms vs 23.3 ms). Under thermal throttling (+40%), latency spikes to **~43 ms**, violating the hard real-time contract.
