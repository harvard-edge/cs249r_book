title: Hailo-8 Pruning Strategy for Efficient Edge Deployment
scenario: You've been tasked with deploying an LLM onto an edge device powered by a dataflow accelerator. After initial quantization, the model still exceeds latency and power targets, so your team proposes applying pruning.
question: Why do pruning sparsity patterns matter on a dataflow architecture, and how would you trade accuracy, speedup, and power for structured vs unstructured pruning?
details:
  realistic_solution: A realistic solution involves a multi-stage approach. Initially, apply fine-grained (unstructured) pruning to identify and remove truly redundant weights. Then, analyze the resulting sparsity patterns and retrain the model to convert them into structured patterns (e.g., block sparsity, channel sparsity) that align with the dataflow's MAC array processing capabilities. The architecture is designed to efficiently skip zero operations in structured blocks, so identifying optimal block sizes for sparsity is crucial. This iterative process requires profiling on actual hardware to find the 'sweet spot' where accuracy is maintained and significant speedups are achieved.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning without considering the accelerator's native hardware support.
    **The Rationale:** Candidates assume that any reduction in non-zero weights automatically translates to faster inference, ignoring the dataflow architecture's reliance on regular, structured blocks to actually skip cycles.
    **The Consequence:** Achieving minimal latency speedup and suffering from memory bandwidth bottlenecks, while simultaneously degrading model accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Baseline model runs at 5 TOPS (INT8) using 1.5W power.
       * Comparing 50% unstructured vs. 50% structured block sparsity.
    2. **Calculations:**
       * 50% unstructured sparsity: Irregular access means the engine can only physically skip ~10% of operations. Effective compute reduction is marginal.
       * 50% structured block sparsity (e.g., 4x1 blocks): Dataflow engine exploits 90% of zeros, dropping required execution to ~2.5 TOPS.
    3. **Conclusion & Interpretation:**
       * **Structured block sparsity doubles throughput while reducing power from 1.5W to ~1.0W, whereas unstructured sparsity wastes cycles. Result: Compute Efficiency-Bound.**
