title: Evaluating On-Device Adaptation Strategies for Mobile Keyboards
scenario: You are designing the on-device learning strategy for a smart keyboard on a mobile device (8GB RAM, but background processes are strictly limited to 256MB RAM and 10 minutes of execution per night). The goal is to adapt a 100M parameter language model to the user's specific vocabulary without sending data to the cloud.
question: For the 100M-parameter keyboard model under a 256MB, 10-minute nightly budget, should you use full fine-tuning, LoRA, or a local n-gram cache?
details:
  realistic_solution: Full fine-tuning will OOM the 256MB limit. A local dynamic cache (RAG-lite) requires no backprop and uses <50MB RAM, making it the most robust for pure vocabulary additions. If deep semantic adaptation is required, LoRA with a quantized base model (INT8) and a strictly limited batch size keeps total memory under 150MB.
  common_mistake: |
    **The Pitfall:** Proposing full fine-tuning or LoRA without calculating optimizer state or activation memory.
    **The Rationale:** Candidates often focus purely on the parameter count (100M) and assume it easily fits in modern mobile RAM (8GB), ignoring the strict background limits.
    **The Consequence:** The background process immediately breaches the 256MB OS limit and is aggressively killed by the operating system, failing to update the model.
  napkin_math: |
    1. **Full Fine-Tuning:** 100M params INT8 = 100MB. Adam optimizer (FP32 states) = 100M * 4 bytes * 3 (1 grad + 2 moments) = 1.2GB. This crashes the 256MB limit.
    2. **LoRA (Rank 8):** ~100K trainable parameters. Optimizer states = 100K * 4 bytes * 3 = 1.2MB.
    3. **LoRA Activations:** (seq=64, batch=16, 12 layers, 256 hidden, FP16) = 16 * 64 * 12 * 256 * 2 bytes = ~6.3MB.
    4. **Result:** Total LoRA memory = 100MB (base weights) + 1.2MB (states) + 6.3MB (activations) = **~107.5MB**, comfortably fitting the 256MB budget.
