title: Evaluating On-Device Adaptation Strategies for Mobile Keyboards
scenario: You are designing the on-device learning strategy for a smart keyboard on a mobile device (background processes are strictly limited to 256MB RAM and 10 minutes of execution per night). The goal is to adapt a 100M parameter language model to the user's specific vocabulary without sending data to the cloud.
question: For the 100M-parameter keyboard model under a 256MB, 10-minute nightly budget, should you use full fine-tuning, LoRA, or a local n-gram cache?
details:
  realistic_solution: Full fine-tuning will OOM the 256MB limit. A local dynamic cache (RAG-lite) requires no backprop and uses <50MB RAM, making it robust for pure vocabulary additions. If deep semantic adaptation is required, LoRA with a quantized base model (INT8) and a strictly limited batch size keeps total memory under 150MB.
  common_mistake: |
    **The Pitfall:** Proposing full fine-tuning or LoRA without calculating optimizer state or activation memory.
    **The Rationale:** Candidates often focus purely on the parameter count, ignoring the strict background OS RAM limits.
    **The Consequence:** The background process immediately breaches the 256MB OS limit and is aggressively killed by the operating system, failing to update the model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100M params INT8 base model.
       - LoRA (Rank 8): ~100K trainable parameters.
    2. **Calculations:**
       - Full Fine-Tuning: 100MB (weights) + 1.2GB (Adam optimizer states) = 1.3GB (OOM).
       - LoRA states: 100K * 4 bytes * 3 = 1.2MB.
       - LoRA Activations (seq=64, batch=16, 12 layers, 256 hidden, FP16): 16 * 64 * 12 * 256 * 2 bytes = 6.29MB.
       - Total LoRA memory: 100MB + 1.2MB + 6.3MB = 107.5MB.
    3. **Conclusion & Interpretation:**
       - **Result: Total LoRA memory fits comfortably within the 256MB budget. (Memory-Capacity-Bound)**
