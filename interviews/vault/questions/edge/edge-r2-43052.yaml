title: Tensor Arena Planning for Jetson Orin Multi-Model Serving
scenario: 'Your Jetson Orin (32 GB LPDDR5, 60W) serves 5 TensorRT models concurrently for autonomous driving:
  perception (2.1 GB GPU memory), tracking (800 MB), prediction (1.2 GB), planning (600 MB), and control
  (200 MB). Total: 4.9 GB. But GPU memory is shared with the system (Linux + display = 4 GB), leaving
  28 GB for models. Memory fragmentation after 24 hours of operation causes allocation failures even though
  total free memory is sufficient. How do you plan memory allocation to prevent fragmentation?'
question: "How do you plan memory allocation to prevent fragmentation?"
details:
  realistic_solution: 'Apply the tensor arena pattern from TinyML at edge scale: pre-allocate a contiguous
    memory pool at startup and sub-allocate within it. Strategy: (1) Allocate one contiguous GPU memory
    block of 6 GB at process start (leaves 22 GB for growth). (2) Use a custom allocator (arena/bump allocator)
    that sub-allocates to each model from this block. Models receive fixed offsets: perception at offset
    0, tracking at 2.1 GB, prediction at 2.9 GB, planning at 4.1 GB, control at 4.7 GB. (3) No dynamic
    allocation after initialization — TensorRT''s IExecutionContext uses pre-allocated device memory for
    activations. (4) For variable-size inputs (different image resolutions), allocate for the maximum
    expected size at startup. Waste some memory but eliminate fragmentation. TensorRT supports this via
    createExecutionContextWithoutDeviceMemory() + manual memory binding.'
  common_mistake: Using cudaMalloc for each model's workspace independently. Dynamic allocation over 24
    hours creates memory holes — small freed blocks between larger allocations that can't satisfy new
    requests.
  napkin_math: 'Dynamic allocation over 24 hrs: typical fragmentation = 15-25% of allocated memory becomes
    unusable. 4.9 GB × 20% = 980 MB wasted, plus intermittent OOM from fragmentation. Arena allocation:
    0% fragmentation, 6 GB fixed (1.1 GB overhead for alignment and max-size padding). Over 24 hours:
    zero allocation failures, deterministic latency (no malloc lock contention). Implementation: ~50 lines
    of arena allocator code. ROI: prevents system restarts that take 45 seconds (models must reload) —
    critical for autonomous driving.'
