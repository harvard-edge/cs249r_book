title: Robotic Control Loop RTO
scenario: A Jetson AGX Orin running a critical robotics control loop writes state
  logs to an NVMe drive to recover from software crashes.
question: Define Recovery Time Objective (RTO) in the context of the robotic system
  rebooting and reloading its state.
visual:
  kind: svg
  path: edge-2293.svg
  alt: Timeline showing crash, reboot delay, and state restore delay making up the
    RTO.
  caption: Recovery Time Objective (RTO) Timeline
details:
  realistic_solution: The candidate should define RTO as the maximum acceptable time
    the system can be down before functionality is restored. In this context, it includes
    OS boot time plus state reload time from NVMe.
  common_mistake: Confusing RTO (Recovery Time Objective) with RPO (Recovery Point
    Objective, which involves data loss).
  napkin_math: RTO = Reboot (5s) + Load (2s) = 7s limit
