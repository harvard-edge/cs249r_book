title: The Myth of Peak TOPS
scenario: You are selecting an accelerator for a new autonomous drone's perception system. The marketing
  material for the Jetson AGX Orin module highlights its '275 TOPS' of INT8 performance. However, your
  thermal enclosure can only dissipate 15W. What is a realistic sustained TOPS number you should use for
  your initial performance estimates?
question: "What is a realistic sustained TOPS number you should use for your initial performance estimates?"
details:
  realistic_solution: The key is to think in terms of efficiency (TOPS per Watt) and the power budget,
    not peak theoretical performance. The Jetson AGX Orin provides up to 275 TOPS at its maximum 60W power
    setting, giving it an efficiency of roughly 4.6 TOPS/W. When constrained to a 15W thermal design power
    (TDP), the realistic sustained performance is the efficiency multiplied by the available power, which
    is around 69 TOPS.
  common_mistake: Engineers often use the 'peak performance' number from a spec sheet directly in their
    calculations. This is a fallacy because peak TOPS are typically only achievable for fractions of a
    second and at maximum power draw (e.g., 60W+), which is not sustainable in a thermally-constrained
    edge device. The true performance is gated by the power budget.
  napkin_math: 1. **Calculate Efficiency:** Jetson AGX Orin Efficiency = Peak Performance / Max Power
    = 275 TOPS / 60W ≈ 4.6 TOPS/W.
  options:
  - 275 TOPS
  - 15 TOPS
  - 69 TOPS
  - 4.6 TOPS
  correct_index: 2
