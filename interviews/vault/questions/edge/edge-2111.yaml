title: Fairness-Aware Model Deployment on Edge AI Accelerator
scenario: You are tasked with deploying a critical credit scoring model onto a fleet of Qualcomm Cloud AI 100 accelerators, each with 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power budget. The model's predictions must adhere to strict fairness requirements, specifically demonstrating demographic parity and equalized odds across multiple protected attributes (age, gender, ethnicity) and their intersections.
question: How would you design on-device inference and lightweight fairness monitoring for demographic parity and equalized odds on Cloud AI 100?
details:
  realistic_solution: 'A realistic solution would involve a two-pronged approach: optimizing the base model for efficiency while pre-calculating and storing minimal, critical statistical summaries on the Qualcomm Cloud AI 100 during inference. A lightweight fairness monitoring module, tightly integrated with the inference pipeline, would periodically aggregate these summaries to estimate demographic parity and equalized odds for pre-defined subgroups. For intersectional fairness, instead of storing every possible combination, a stratified sampling or approximation method could be used, or a subset of high-risk intersections could be prioritized for direct monitoring. Batch processing on the AI 100''s INT8 capabilities would be leveraged for throughput, and a separate, less frequent off-device process (e.g., a central server) would handle deeper, more comprehensive subgroup analysis and model retraining if significant fairness drifts are detected, minimizing the on-device computational burden.'
  common_mistake: |
    **The Pitfall:** Proposing complex post-hoc bias mitigation techniques or storing massive raw datasets directly on the device.
    **The Rationale:** Candidates apply cloud-based fairness monitoring paradigms without accounting for the constrained edge memory and power footprint.
    **The Consequence:** Exhausting the 32GB memory limit or crippling inference throughput with heavy fairness computations.
  napkin_math: |
    - **Memory Cost:** 1 byte (pred) + 1 byte (label) + 5 bytes (attributes) = 7 bytes/inf. For 1M inferences = **7 MB**.
    - **Compute Cost:** TPR/FPR calculation requires a pass over 1M records. Assuming 100 INT8 ops/metric/record across 25 groups.
    - **Total Compute:** 2 metrics $\times$ 25 groups $\times$ 1,000,000 records $\times$ 100 ops = 5 $\times$ 10^9 INT8 ops (5 GOPs).
    - **Latency Check:** At 400 TOPS (400,000 GOPs), this calculation takes 5 / 400,000 = **0.0000125 seconds**. It is entirely memory-bound.
