title: Fairness-Aware Model Deployment on Edge AI Accelerator
scenario: You are tasked with deploying a critical credit scoring model onto a fleet
  of Qualcomm Cloud AI 100 accelerators, each with 32 GB LPDDR4x memory, 400 TOPS
  INT8 performance, and a 75W power budget. The model's predictions must adhere to
  strict fairness requirements, specifically demonstrating demographic parity and
  equalized odds across multiple protected attributes (age, gender, ethnicity) and
  their intersections. Design a system for on-device inference that not only meets
  throughput targets but also continuously monitors and reports fairness metrics without
  exceeding the given hardware constraints.
question: How would you design on-device inference and lightweight fairness monitoring
  for demographic parity and equalized odds on Cloud AI 100?
details:
  realistic_solution: 'A realistic solution would involve a two-pronged approach:
    optimizing the base model for efficiency while pre-calculating and storing minimal,
    critical statistical summaries on the Qualcomm Cloud AI 100 during inference.
    A lightweight fairness monitoring module, tightly integrated with the inference
    pipeline, would periodically aggregate these summaries to estimate demographic
    parity and equalized odds for pre-defined subgroups. For intersectional fairness,
    instead of storing every possible combination, a stratified sampling or approximation
    method could be used, or a subset of high-risk intersections could be prioritized
    for direct monitoring. Batch processing on the AI 100''s INT8 capabilities would
    be leveraged for throughput, and a separate, less frequent off-device process
    (e.g., a central server) would handle deeper, more comprehensive subgroup analysis
    and model retraining if significant fairness drifts are detected, minimizing the
    on-device computational burden.'
  common_mistake: Candidates often propose post-hoc bias mitigation techniques without
    considering their computational overhead for real-time edge deployment or fail
    to address intersectional fairness, focusing only on individual protected attributes.
    Another common mistake is assuming infinite memory or compute for storing and
    processing fairness statistics directly on the constrained edge device, leading
    to impractical solutions.
  napkin_math: "Given 32 GB LPDDR4x, storing predictions for N inferences: 1 byte (pred) + 1 byte (label) + 5 bytes (attributes) = 7 bytes/inf. For 1M inferences = 7 MB. Computing equalized odds (TPR and FPR parity) and demographic parity for 5 attributes and 20 intersections (25 groups): calculating TPR/FPR requires a pass over 1M records. Assuming 100 INT8 ops per metric per record: 2 metrics * 25 groups * 1,000,000 records * 100 ops = 5,000,000,000 INT8 ops (5 GOPs). At 400 TOPS (400,000 GOPs), this takes 5 / 400,000 = 0.0000125 seconds. Thus, metric calculation is bounded by memory access, not compute."
