title: Hardware-Aware NAS for Edge TPU Deployment
scenario: Your team is developing a real-time object detection application for an
  embedded system. The target hardware is a Google Coral Edge TPU, which offers 4
  TOPS (INT8) performance, operates within a 2W power envelope, and strictly supports
  INT8-only computation. You need to deploy a model that achieves high accuracy and
  real-time inference (e.g., 30 FPS) while strictly adhering to these hardware constraints.
  How would you leverage hardware-aware Neural Architecture Search (NAS) to design
  a suitable model architecture? Specifically, discuss how you would define the search
  space, incorporate hardware constraints (SRAM/FLOPs/latency) into the search objective,
  and consider approaches inspired by ultra-efficient designs like MCUNet.
question: How would you use hardware-aware NAS to design a 30 FPS object detector
  for the INT8-only Coral Edge TPU under its 4 TOPS and 2W limits?
details:
  realistic_solution: 'A realistic solution involves developing a hardware-aware NAS
    pipeline. This would include:

    1.  **Defining a constrained search space:** Prioritizing operations and architectural
    patterns known to be efficient on the Coral Edge TPU (e.g., depthwise separable
    convolutions, light-weight backbones, avoiding operations not natively supported
    or efficient in INT8).

    2.  **Developing a hardware cost model:** This could be a latency predictor (e.g.,
    a regression model trained on actual measurements from the Coral), a lookup table,
    or direct on-device profiling for candidate architectures. Memory (SRAM) usage
    would also be estimated or measured.

    3.  **Multi-objective optimization:** The NAS objective function would balance
    accuracy, predicted latency, and estimated power/SRAM consumption. Techniques
    like NSGA-II or evolutionary algorithms can be used to find Pareto-optimal solutions.

    4.  **MCUNet-style principles:** Incorporating micro-architecture search or operator-level
    optimizations inspired by MCUNet to create extremely memory-efficient and fast
    models, particularly focusing on optimal memory access patterns and minimizing
    intermediate tensor sizes specific to the Coral''s memory hierarchy.'
  common_mistake: A common mistake is to ignore the INT8-only constraint or to rely
    solely on theoretical FLOPs/MACs count from a software perspective without accurately
    profiling actual latency and memory usage on the specific Google Coral Edge TPU
    hardware. This often leads to models that are theoretically efficient but perform
    poorly or exceed resource limits in practice.
  napkin_math: 'For a real-time object detection model targeting 30 frames per second
    (FPS) on the Google Coral Edge TPU, the maximum allowable inference latency per
    frame is approximately 33.3 ms (1000 ms / 30 FPS). Given the Coral''s peak performance
    of 4 TOPS (INT8), the theoretical maximum number of INT8 operations that can be
    performed within this 33.3 ms budget is approximately: (4 * 10^12 operations/second)
    * (0.0333 seconds/frame) ≈ 1.33 * 10^11 INT8 operations per frame. This provides
    a high-level upper bound for the computational complexity of the model.'
