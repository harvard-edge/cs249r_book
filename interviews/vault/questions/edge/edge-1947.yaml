title: 'Hardware-Aware NAS for Edge TPU Deployment'
scenario: 'Your team is developing a real-time object detection application for an embedded system. The target hardware is a Google Coral Edge TPU, which offers 4 TOPS (INT8) performance, operates within a 2W power envelope, and strictly supports INT8-only computation.'
question: 'How would you use hardware-aware NAS to design a 30 FPS object detector for the INT8-only Coral Edge TPU under its limits?'
details:
  realistic_solution: 'A realistic solution involves developing a hardware-aware NAS pipeline. This would include: 1. **Defining a constrained search space:** Prioritizing operations efficient on Coral (depthwise separable, avoiding non-INT8 ops). 2. **Developing a hardware cost model:** Latency predictor trained on actual Coral measurements. 3. **Multi-objective optimization:** NSGA-II balancing accuracy, predicted latency, and power. 4. **MCUNet-style principles:** Incorporating micro-architecture search to create memory-efficient models.'
  common_mistake: |
    **The Pitfall:** Relying solely on theoretical FLOPs/MACs from a software perspective.
    **The Rationale:** Standard NAS uses abstract complexity metrics instead of accurately profiling actual latency and memory usage on the specific target hardware.
    **The Consequence:** Producing models that are theoretically efficient but perform poorly or exceed resource limits in practice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target frame rate: 30 FPS.
    - Latency constraint: 33.3 ms/frame.
    - Compute limit: Coral Peak = 4 TOPS (INT8) = 4 $\times$ 10^12 ops/second.

    **Calculations:**
    - Operation upper bound: (4 $\times$ 10^12) $\times$ 0.0333s.

    **Conclusion & Interpretation:**
    - **Result: ~1.33 $\times$ 10^11 INT8 ops/frame (Compute-Bound)**. The NAS search space must strictly constrain architectures below this per-frame operation budget.
