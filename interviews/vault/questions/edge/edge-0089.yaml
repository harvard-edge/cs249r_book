title: 'The Energy-Aware Reconnaissance Drone'
scenario: 'You''re leading the ML systems team for a long-endurance reconnaissance drone. The drone must maintain critical visual perception capabilities for a 6-hour mission. However, its power budget is highly dynamic: motor bursts for high-speed maneuvers or strong winds can temporarily draw significant power, leaving only a fraction (e.g., 20-30% of peak) for the ML payload.'
question: 'How would you design adaptive inference for a 6-hour drone mission when ML power drops to 20-30% during maneuvers?'
details:
  realistic_solution: "This requires a sophisticated, holistic power-aware adaptive system.\n  1.  Multi-Model\
    \ Pipeline / Model Zoo: Develop or train multiple versions of the perception model, each optimized\
    \ for different power-performance-accuracy trade-offs (e.g., a lightweight, low-accuracy model; a\
    \ medium model; a high-accuracy, high-power model). This can also include models at different resolutions\
    \ or with different numbers of input frames.\n  2.  Heterogeneous Compute Utilization: Leverage all\
    \ available compute units (CPU, GPU, NPU, DSP) strategically. For low-power states, offload tasks\
    \ to the most energy-efficient core (often a low-power CPU core or specialized DSP). For bursts, utilize\
    \ the high-performance GPU/NPU.\n  3.  Predictive Power Management & Workload Scheduler:\n      *\
    \   System Power Monitoring: Continuously monitor total system power consumption and available power\
    \ for ML.\n      *   Mission Planner Integration: Integrate with the drone's flight controller and\
    \ mission planner to anticipate future power demands (e.g., upcoming high-power maneuvers).\n    \
    \  *   Adaptive Workload Controller: Based on predicted available power, current perception needs\
    \ (e.g., target distance, criticality), and thermal state, dynamically switch between models, adjust\
    \ inference frequency, or change input resolution. The goal is to maximize the \"utility\" (accuracy\
    \ * duration) given the power budget.\n      *   Energy-Aware Scheduling: Instead of just latency,\
    \ schedule tasks based on their energy cost and criticality.\n  4.  Dynamic Resolution/Frame Rate\
    \ Scaling: Reduce input image resolution or inference frame rate when power is scarce, and increase\
    \ it when power is abundant. This is often less disruptive than model switching.\n  5.  Hierarchical\
    \ Perception: Implement a tiered perception system. A very lightweight \"always-on\" model for coarse\
    \ detection (low power). If something interesting is detected or power allows, activate a higher-fidelity\
    \ model for detailed analysis.\n  6.  Edge-Cloud Hybrid (if connectivity allows): For non-critical,\
    \ heavy computations, offload to cloud/ground station when network conditions and power permit."
  common_mistake: |
    **The Pitfall:** Pre-selecting a single low-power model or relying purely on GPU hardware throttling.
    **The Rationale:** Candidates opt for the simplest static solution, failing to leverage available power when conditions are calm.
    **The Consequence:** Sacrifices massive amounts of perception accuracy unnecessarily, or fails the mission completely when abrupt power constraints force a hard shutdown.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 1000 Wh.
    - Baseline ML model power draw: 15W.
    - Motors draw 200W for 20% of the time.

    **Calculations:**
    - A 6-hour mission requires managing the ML average power budget to roughly 166 Wh (1/6th of total battery).
    - Adaptive inference must dynamically scale down during power bursts.

    **Conclusion & Interpretation:**
    - **Result: <5W Low-Power Mode (Power-Bound)**. The perception system must dynamically scale between 15W and <5W to preserve the 166 Wh budget without completely shutting down.
