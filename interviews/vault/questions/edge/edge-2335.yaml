title: Edge Factory Queue Stability
scenario: A Jetson Orin processes factory images arriving at exactly 15 FPS. The Orin
  evaluates one image in 50ms.
question: Calculate the NPU utilization and verify if the inference queue remains
  stable.
details:
  realistic_solution: The processing capability is 1 frame / 0.050 seconds = 20 FPS.
    The arrival rate is 15 FPS. Utilization is 15 / 20 = 75%. Because utilization
    is strictly less than 100%, the queue remains stable.
  common_mistake: Inverting the rates or confusing FPS with latency.
  napkin_math: 15 / 20 = 0.75
