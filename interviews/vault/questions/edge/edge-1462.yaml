title: On-Premise RAG Pipeline Design for Cloud AI 100
scenario: You are designing an on-premise RAG system for a financial firm using a single Qualcomm Cloud AI 100 accelerator. The pipeline chains an embedding model, a cross-encoder ranker, and an 8B parameter LLM to answer queries securely. You must architect the deployment strategy given the platform's 32 GB LPDDR4x memory, 400 TOPS INT8 compute, and 75W power envelope.
question: For the Cloud AI 100 RAG pipeline, would you co-locate the embedding, ranker, and 8B LLM or swap them sequentially to meet 1s TTFT?
details:
  realistic_solution: The optimal design statically loads all three models into the 32 GB LPDDR4x memory by quantizing the 8B LLM to INT8 (or W4A8) and the embedding/ranking models to INT8. This leverages the accelerator's 400 TOPS INT8 compute capabilities and completely avoids PCIe transfer latency during the critical path. To maximize throughput within the 75W power budget, the architecture should pipeline the execution, allowing the embedding models to process incoming queries while the LLM generates output for previous ones.
  common_mistake: |
    **The Pitfall:** Dynamically swapping models into memory for each pipeline stage.
    **The Rationale:** Developers try to optimize for maximum free memory to support a massive KV cache, without calculating the time penalty of swapping weights over PCIe.
    **The Consequence:** Severe PCIe transfer latency during the critical path, violating the strict 1-second TTFT requirement.
  napkin_math: |
    * **Model Weights**: 8B LLM (INT8) = 8 GB. Embedding + Ranker (INT8) = 1 GB. Total = 9 GB.
    * **Memory Remaining**: 32 GB - 9 GB = 23 GB for KV cache and OS.
    * **KV Cache**: 2K tokens in FP16 = ~1 GB per request. Batch size 16 easily fits.
    * **Memory Bandwidth limit**: 8 GB model generates ~17 tokens/sec per user at batch 1 (136 GB/s / 8 GB).
    * **Conclusion**: Co-location easily fits within the 32 GB RAM and meets the **1s TTFT goal**.
