title: Edge TPU Fleet CI/CD Architecture
scenario: 'You are tasked with designing the MLOps pipeline for deploying continuous model updates to a fleet of remote cameras powered by Google Coral Edge TPUs via USB. The edge devices have strict constraints: a 2W power budget, 4 TOPS of INT8 compute, and limited operator support.'
question: How would you build the CI/CD pipeline to quantize, compile, validate, and safely OTA-deploy Coral Edge TPU model updates?
details:
  realistic_solution: 'The pipeline MUST execute the Edge TPU Compiler step to map operations to the hardware. CI must include a Hardware-in-the-Loop (HITL) runner containing actual Coral PCIe/USB devices to validate 100% operator mapping and measure real-world power draw. Use canary OTA deployments monitoring thermal telemetry.'
  common_mistake: |
    **The Pitfall:** Designing standard cloud-native CI/CD pipelines that deploy containerized FP32 models.
    **The Rationale:** Candidates rely on conventional CI/CD experience and miss the mandatory INT8 compilation and strict operator limitations of the TPU.
    **The Consequence:** Deployed models fall back to the host CPU in production, destroying inference latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute required per frame: 100 GOPS
       - Edge TPU compute: 4 TOPS (4000 GOPS)
       - Power budget: 2W (2 Joules/second)
    2. **Calculations:**
       - Theoretical max framerate: 4000 GOPS / 100 GOPS/frame = 40 FPS
       - Energy cost per inference: 2W / 40 FPS = 0.05 Joules per frame
    3. **Conclusion & Interpretation:**
       - **Result: 0.05 Joules/frame.** The HITL testing must verify the model stays within this tight energy envelope.
