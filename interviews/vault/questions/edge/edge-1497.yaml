title: Edge TPU Fleet CI/CD Architecture
scenario: You are tasked with designing the MLOps pipeline for deploying continuous model updates to a fleet of remote cameras powered by Google Coral Edge TPUs via USB. The edge devices have strict constraints: a 2W power budget, 4 TOPS of INT8 compute, and limited operator support requiring full INT8 quantization.
question: How would you build the CI/CD pipeline to quantize, compile, validate, and safely OTA-deploy Coral Edge TPU model updates?
details:
  realistic_solution: The pipeline should trigger Quantization-Aware Training (QAT) or Post-Training Quantization (PTQ) to produce an INT8 TFLite model, followed immediately by the Edge TPU Compiler step. CI must include a hardware-in-the-loop runner containing actual Coral PCIe/USB devices to validate that 100% of operators mapped successfully to the TPU and to measure real-world power draw. The CD system should use a shadow deployment or canary rollout strategy, monitoring device telemetry (thermal/power) before completing the OTA update.
  common_mistake: |
    **The Pitfall:** Designing standard cloud-native CI/CD pipelines that deploy containerized FP32 models.
    **The Rationale:** Candidates rely on conventional CI/CD experience and miss the mandatory Edge TPU compiler step and INT8 requirements.
    **The Consequence:** Deployed models fail to run on the Edge TPU, or hit unsupported operator errors in production.
  napkin_math: |
    * Compute required per frame: 100 GOPS
    * Edge TPU compute: 4 TOPS = 4000 GOPS
    * Theoretical max framerate: 4000 GOPS / 100 GOPS/frame = 40 FPS
    * Power budget: 2W (2 Joules/second)
    * **Energy cost per inference: 2W / 40 FPS = 0.05 Joules per frame.**
