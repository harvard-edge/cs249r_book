title: The Cellular Diet
scenario: You need to deploy a 250MB model update to a fleet of 100,000 smart cameras in rural areas.
  Each camera has a cellular plan limited to an average of 500KB/day of free data for system updates.
  Exceeding this incurs significant costs. How do you efficiently manage this deployment without massive
  overages?
details:
  realistic_solution: Implement **delta updates** (binary diffing) to minimize the payload size. The device
    requests only the byte-level differences from its current model version to the target version. Distribute
    the update over several days or weeks by sending small chunks (e.g., 50KB/day) and reassembling them
    on the device. Prioritize critical security or bugfix updates, and use opportunistic transfers when
    devices connect to Wi-Fi or have higher bandwidth allowances. Consider implementing peer-to-peer sharing
    if devices are in close proximity and network topology allows, further reducing cloud egress bandwidth.
  common_mistake: '"Just push the full update whenever a device connects." This ignores bandwidth caps
    and scheduling, leading to massive overage charges or an impossibly long deployment time.'
  napkin_math: A 250MB (250,000KB) full update at 500KB/day would take 500 days per device. A delta update
    might be 5-10% of the full size, say 25MB (25,000KB). This reduces deployment time to 50 days (25,000KB
    / 500KB/day). For 100,000 devices, a 25MB delta update means 2.5TB of data transferred in total, which
    is manageable over 50 days.
