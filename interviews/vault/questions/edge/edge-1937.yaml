title: 'Edge AI Deployment: Optimizing CNN for Qualcomm Cloud AI 100'
scenario: You are tasked with deploying a real-time object detection model, initially a standard ResNet-50, onto the Qualcomm Cloud AI 100. The current ResNet-50 model exceeds the memory footprint and latency targets for a 10ms end-to-end inference budget, while maintaining 90% mAP.
question: How would you redesign ResNet-50 using MobileNet/EfficientNet-style blocks to hit 10ms, 90% mAP, and the 75W budget?
details:
  realistic_solution: Transition to an architecture utilizing depthwise separable convolutions (e.g., EfficientNet or MobileNetV3) to drastically cut FLOPs and memory bandwidth. Implement Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT) to map operations to INT8, maximizing the accelerator's matrix math units. Profile the execution with hardware-aware compilers to pin weights in SRAM and avoid LPDDR4x thrashing.
  common_mistake: |
    **The Pitfall:** Simply quantizing a large model without architectural changes, or focusing solely on FLOP reduction without considering memory access patterns.
    **The Rationale:** Assuming INT8 quantization is a magic bullet, while ignoring that memory bandwidth often bottlenecks edge accelerators.
    **The Consequence:** The model still misses the latency target due to memory thrashing, leading to poor hardware utilization despite lower precision.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 10 ms per inference (100 FPS).
       - AI 100 limit: 400 TOPS, 75 W TDP.
    2. **Calculations:**
       - Throughput Requirement: 1 inference / 10 ms = 100 inferences/s.
       - Compute Budget: 400 TOPS / 100 FPS = 4 Tera-operations (4 T-Ops) per inference.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Feasibility.** The 4 T-Ops budget easily accommodates an optimized INT8 EfficientNet variant, provided memory I/O is minimized via depthwise convolutions.
