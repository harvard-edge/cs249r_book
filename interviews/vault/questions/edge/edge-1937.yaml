title: 'Edge AI Deployment: Optimizing CNN for Qualcomm Cloud AI 100'
scenario: You are tasked with deploying a real-time object detection model, initially a standard ResNet-50, onto the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The current ResNet-50 model exceeds the memory footprint and latency targets for a 10ms end-to-end inference budget, while maintaining 90% mAP.
question: How would you redesign ResNet-50 using MobileNet/EfficientNet-style blocks to hit 10ms, 90% mAP, and the AI 100's 75W budget?
details:
  realistic_solution: Transitioning to an EfficientNet-B0/B1 or MobileNetV3-Large architecture, which inherently utilize depthwise separable convolutions and inverted bottleneck structures. This reduces FLOPs and parameter count significantly. Employing post-training quantization aware training (PTQ-AT) or quantization-aware training (QAT) to fine-tune the model for INT8 precision, fully utilizing the 400 TOPS INT8. Profiling the model on the AI 100 to identify critical bottlenecks in memory access or specific layers.
  common_mistake: |
    **The Pitfall:** Simply quantizing a large model without architectural changes, or focusing solely on FLOP reduction without considering memory access patterns.
    **The Rationale:** Assuming INT8 quantization is a magic bullet that solves all latency issues, or ignoring the reality that memory bandwidth often bottlenecks edge accelerators.
    **The Consequence:** The model still misses the latency target due to memory thrashing, despite lower precision, leading to poor hardware utilization.
  napkin_math: |
    *   **TOPS Utilization:** With 400 TOPS INT8 and a 10ms budget, the model's effective operations must not exceed 4 Tera-operations (4 T-Ops) per inference (400 TOPS / 100 inferences/s).
    *   **Memory Footprint:** Weights and intermediate activations must fit within the 32GB LPDDR4x to minimize external DDR access.
    *   **Power Efficiency:** Depthwise separable convolutions drastically reduce memory bandwidth needs, directly lowering power consumption within the **75W budget**.
