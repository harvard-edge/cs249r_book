title: Optimizing ViT Operator Fallback on Cloud AI 100
scenario: Your team is deploying a Vision Transformer for high-throughput factory inspection on a Qualcomm Cloud AI 100 accelerator. Converting the PyTorch model to ONNX and compiling it results in CPU fallback for custom attention operators, severely impacting throughput.
question: Would you rewrite the ViT to use Cloud AI 100 supported operators or write custom kernels for unsupported attention ops, and why?
details:
  realistic_solution: 'The optimal solution is to rewrite the PyTorch model to replace custom operators with mathematically equivalent standard operations natively supported by the AI 100 compiler (e.g., using FlashAttention-2 equivalents). This avoids costly host-accelerator context switches, keeping the execution pipeline saturated on the device.'
  common_mistake: |
    **The Pitfall:** Immediately writing custom kernels for the unsupported operators.
    **The Rationale:** Candidates focus on operator optimization without profiling the catastrophic PCIe transfer cost of CPU fallback.
    **The Consequence:** The accelerator is starved while waiting for data transfers, bottlenecking the 400 TOPS engine.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud AI 100: 400 TOPS (400,000 GOPS)
       - Model compute: 250 GOPS/frame
       - PCIe Gen4 x8 effective bandwidth: ~12 GB/s
       - Fallback transfer: 16MB tensor (round trip = 32MB)
    2. **Calculations:**
       - Max theoretical throughput: 400,000 / 250 = 1,600 FPS (0.625 ms/frame)
       - Fallback transfer time: 32 MB / 12,000 MB/s = 2.66 ms/frame
       - Bottlenecked throughput: 1 / 0.00266s ~ 375 FPS
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound due to Fallback.** CPU fallback limits throughput to <375 FPS, wasting over 75% of the accelerator's compute capacity.
