title: 'The Drone''s Dilemma: Compute vs. Bandwidth'
scenario: You are the ML Systems Engineer for an autonomous drone company using an NVIDIA Jetson AGX Orin (205 GB/s memory bandwidth) for its perception system. You have a strict 33ms (30 FPS) latency budget for inference to ensure stable flight control. You are asked to evaluate two new INT8-quantized models.
question: Why does the INT8 EdgeViT miss the 33ms deadline despite its G-Op count seeming feasible on the Orin?
details:
  realistic_solution: The most likely cause is that the `EdgeViT` model is **memory-bandwidth bound**. Its performance isn't limited by the Jetson's compute power, but by the 205 GB/s speed limit for fetching data from DRAM.
  common_mistake: |
    **The Pitfall:** Fixating on FLOPs (or G-Ops) as the primary measure of performance.
    **The Rationale:** Engineers often assume the model is compute-bound, or that thermal throttling is to blame when throughput drops.
    **The Consequence:** They miss the fundamental performance inversion: the model is memory-bandwidth bound, so throwing more TOPS at it won't reduce latency.
  napkin_math: |
    1. **Hardware Ridge Point**: Jetson Orin = 275 TOPS / 205 GB/s = ~1341 Ops/Byte.
    2. **EdgeViT Workload**: Assume EdgeViT performs 3 TeraOps and moves 6 GB of memory per frame.
    3. **Arithmetic Intensity (AI)**: AI = 3e12 Ops / 6e9 Bytes = **500 Ops/Byte**.
    4. **Conclusion**: Since 500 Ops/Byte < 1341 Ops/Byte, EdgeViT is heavily **memory-bandwidth bound**. The MAC units sit idle waiting for self-attention matrices to load from DRAM.
  options:
  - The EdgeViT's G-Op count is misleading; its self-attention operations are inherently more complex and take more clock cycles per OP on the Jetson's architecture.
  - The EdgeViT is likely causing the Jetson to exceed its thermal design power (TDP), forcing the chip to throttle its clock speed and increase latency.
  - The EdgeViT has a lower Arithmetic Intensity (AI) due to its memory access patterns, making it memory-bandwidth bound on the Jetson's 205 GB/s DRAM interface.
  - The CUDA kernels for Transformer operations are not as mature as CNN kernels, leading to significant software overhead from things like kernel launch latency.
  correct_index: 2
