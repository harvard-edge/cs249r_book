title: USB Latency Overhead in Edge TPU Batching
scenario: You are deploying a quantized INT8 object detection model on a Google Coral
  USB Accelerator (Edge TPU) attached to a Raspberry Pi. The model itself takes 2ms
  to execute a single frame on the Edge TPU, and the system needs to process frames
  from 4 independent cameras. Transferring a single 300x300 RGB INT8 frame (270KB)
  over the USB 2.0 connection takes approximately 10ms. Calculate the total latency
  per frame if you process them sequentially (batch size 1) versus batching all 4
  frames together (batch size 4), assuming the Edge TPU execution time scales linearly
  with batch size.
question: What is the total latency per frame if the 4 cameras are processed sequentially
  versus as one batch over USB 2.0?
details:
  realistic_solution: On USB-attached Edge TPUs, I/O transfer time frequently dominates
    compute time. When batching, you must transfer the entire batch over the USB bus
    before the TPU can start processing. While the TPU compute time scales (4 frames
    * 2ms = 8ms), the data transfer for 4 frames takes 40ms. Thus, batching increases
    the latency for the first camera's frame significantly compared to sequential
    processing, making it a poor choice for latency-sensitive applications on this
    specific form factor.
  common_mistake: Candidates often ignore the I/O bottleneck of the USB interface
    and only focus on the Edge TPU's 4 TOPS compute capability. They might assume
    that batching always improves latency or fail to account for the sequential nature
    of USB transfers when calculating the total time for a batched inference.
  napkin_math: 'Sequential (Batch 1): Total Latency = Transfer Time + Compute Time
    = 10ms + 2ms = 12ms per frame. Batched (Batch 4): Total Transfer Time = 4 * 10ms
    = 40ms. Total Compute Time = 4 * 2ms = 8ms. Total Batch Latency = 40ms + 8ms =
    48ms. Average Latency per frame = 48ms / 4 = 12ms. However, the end-to-end latency
    for the *first* frame in the batch increases from 12ms to 48ms.'
