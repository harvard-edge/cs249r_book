title: USB Latency Overhead in Edge TPU Batching
scenario: You are deploying a quantized INT8 object detection model on a Google Coral USB Accelerator (Edge TPU) attached to a Raspberry Pi. The model itself takes 2ms to execute a single frame on the Edge TPU, and the system needs to process frames from 4 independent cameras. Transferring a single 300x300 RGB INT8 frame (270KB) over the USB 2.0 connection takes approximately 10ms.
question: What is the total latency per frame if the 4 cameras are processed sequentially (batch size 1) versus batched together over USB 2.0?
details:
  realistic_solution: 'On USB-attached Edge TPUs, I/O transfer time over the host bus dominates the theoretical TOPS compute. When batching (B=4), the host must marshal and transfer the entire batch payload over the half-duplex USB 2.0 bus before the TPU kernel can launch. While the TPU compute scales effectively (4 * 2ms = 8ms), the sequential host-to-device DMA takes 40ms. Thus, batching drastically increases the latency for the first camera''s frame from 12ms to 48ms, ruining hard real-time responsiveness.'
  common_mistake: |
    **The Pitfall:** Ignoring the I/O bottleneck of the USB interface.
    **The Rationale:** Candidates focus solely on the Edge TPU's 4 TOPS compute capability, assuming that batching always improves latency and ignoring the sequential nature of USB transfers.
    **The Consequence:** Designing a batched pipeline that actually increases end-to-end latency for individual frames, ruining real-time responsiveness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model execution: 2ms per frame.
       - USB 2.0 transfer: 10ms per 270KB frame.
       - 4 independent camera streams.
    2. **Calculations:**
       - Sequential (Batch=1): Transfer (10ms) + Compute (2ms) = 12ms latency per frame.
       - Batched (Batch=4): Total Transfer (4 * 10ms = 40ms) + Total Compute (4 * 2ms = 8ms) = 48ms latency for the batch.
    3. **Conclusion & Interpretation:**
       - **Result: Batching increases first-frame latency by 4x (12ms vs 48ms).** The half-duplex USB 2.0 bus is a severe I/O bottleneck, making batching hostile to latency-sensitive edge pipelines.
