title: USB Latency Overhead in Edge TPU Batching
scenario: You are deploying a quantized INT8 object detection model on a Google Coral USB Accelerator (Edge TPU) attached to a Raspberry Pi. The model itself takes 2ms to execute a single frame on the Edge TPU, and the system needs to process frames from 4 independent cameras. Transferring a single 300x300 RGB INT8 frame (270KB) over the USB 2.0 connection takes approximately 10ms.
question: What is the total latency per frame if the 4 cameras are processed sequentially (batch size 1) versus batched together over USB 2.0?
details:
  realistic_solution: On USB-attached Edge TPUs, I/O transfer time frequently dominates compute time. When batching, you must transfer the entire batch over the USB bus before the TPU can start processing. While the TPU compute time scales (4 frames * 2ms = 8ms), the data transfer for 4 frames takes 40ms. Thus, batching increases the latency for the first camera's frame significantly compared to sequential processing, making it a poor choice for latency-sensitive applications on this specific form factor.
  common_mistake: |
    **The Pitfall:** Ignoring the I/O bottleneck of the USB interface.
    **The Rationale:** Candidates focus solely on the Edge TPU's 4 TOPS compute capability, assuming that batching always improves latency and ignoring the sequential nature of USB transfers.
    **The Consequence:** Designing a batched pipeline that actually increases end-to-end latency for individual frames, ruining real-time responsiveness.
  napkin_math: |
    * **Sequential (Batch 1):** Transfer = 10ms. Compute = 2ms. Total = **12ms** per frame.
    * **Batched (Batch 4):**
      * Transfer 4 frames sequentially over USB: 4 * 10ms = 40ms.
      * Compute 4 frames: 4 * 2ms = 8ms.
      * Total Batch Latency = 40ms + 8ms = **48ms**.
    * While the *average* latency is still 12ms (48ms/4), the end-to-end latency for the *first* frame in the batch heavily degrades from 12ms to **48ms**.
