title: 'Optimizing Edge Vision Models: Structured Pruning for Coral TPU'
scenario: 'Your team is deploying a real-time object detection model (e.g., MobileNetV3-SSD) on a fleet of smart cameras, each equipped with a Google Coral Edge TPU. The Coral Edge TPU provides 4 TOPS of INT8 compute with a typical power budget of ~2W. The current model, while performing adequately on server-grade GPUs, exceeds the Coral''s latency and memory constraints for critical detection tasks (e.g., detecting anomalies in manufacturing, requiring <50ms inference time). You''ve identified that the model''s size and computational footprint are the primary bottlenecks.'
question: 'How would you leverage pruning and sparsity techniques, specifically considering the Coral Edge TPU''s architecture and INT8-only support, to achieve the <50ms target without significant accuracy loss?'
details:
  realistic_solution: 'Implement structured pruning techniques (e.g., filter pruning, channel pruning, block pruning) that remove entire groups of weights, channels, or blocks, resulting in smaller, denser layers rather than randomly sparse ones. This allows the pruned model to still leverage the Coral''s efficient dense INT8 tensor operations. Focus on pruning early layers more aggressively as they contribute more to computational cost. Implement an iterative pruning and fine-tuning schedule, starting with higher sparsity targets and gradually increasing them while monitoring accuracy. Utilize quantization-aware training in conjunction with pruning to ensure the pruned model performs well post-INT8 quantization.'
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning on fixed-function accelerators.
    **The Rationale:** Engineers often default to unstructured pruning methods that zero out individual weights, assuming all hardware can skip zero-computations efficiently.
    **The Consequence:** This often leads to sparse weights that cannot be efficiently mapped to the TPU's dense matrix multiplication units, resulting in minimal or even negative speedups despite reduced FLOPs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FLOPs: \u2248 C_in * C_out * K * K * H_out * W_out.
    - Structured Pruning Effect: If structured channel pruning reduces C_out by 50%, new FLOPs \u2248 0.5 * Original FLOPs.

    **Calculations:**
    - Compute Idealization: If the model requires 0.2 Giga-ops, and Coral provides 4,000 GOPS/s, ideal compute time is 0.2 / 4,000 = 0.05ms.
    - Target: Real latency (100ms) is dominated by memory and I/O. Halving the FLOPs to 0.1 Giga-ops proportionally reduces the compute-bound portion.

    **Conclusion & Interpretation:**
    - **Result: 0.1 Giga-ops (Memory-Bandwidth Bound)**. Optimizing memory access and operator fusion becomes equally vital to hit the <50ms target.
