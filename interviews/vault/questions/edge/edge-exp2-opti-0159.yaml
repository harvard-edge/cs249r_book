title: Edge TPU INT8 Calibration Coreset Optimization
scenario: You are deploying a visual wake-word model on a Google Coral Edge TPU (4 TOPS, 2W). Because
  the Coral compiler strictly requires INT8 operations due to limited operator support, you must perform
  Post-Training Quantization (PTQ) using a 1,000-sample calibration dataset chosen from a pool of 1 million
  images. Using a random data selection strategy for calibration causes a severe 15% accuracy drop, as
  rare anomalous images produce massive activation spikes that skew the INT8 scaling factors. How do you
  systematically optimize the calibration data selection to diagnose and fix this quantization bottleneck?
question: "How do you systematically optimize the calibration data selection to diagnose and fix this quantization bottleneck?"
details:
  realistic_solution: The optimal approach is to use coreset selection techniques, such as density-based
    clustering or activation entropy filtering, to prune outliers and select a highly representative calibration
    subset. By filtering out anomalous images with extreme activations prior to compilation, we restrict
    the calibration dynamic range to the true distribution. This prevents the INT8 scale factor from being
    stretched by outliers, thereby preserving high precision and smaller step sizes for the vast majority
    of normal inferences.
  common_mistake: Candidates often suggest changing the model architecture, switching to Quantization-Aware
    Training (QAT), or blindly increasing the calibration dataset size. They fail to analyze how specific
    data subsets directly control the INT8 dynamic range and ignore that adding more random data simply
    increases the probability of capturing a destructive outlier.
  napkin_math: Assume the true useful activation range is [-8.0, 8.0], but unpruned anomalous data introduces
    outliers up to [-128.0, 128.0]. With Random Selection, the dynamic range is 256.0. INT8 provides 256
    quantization bins, yielding a step size of 256.0 / 256 = 1.0. The critical [-8.0, 8.0] range (size
    16.0) is severely quantized into just 16 bins. With Coreset Selection (Outliers Pruned), the dynamic
    range is restricted to the true 16.0, yielding a step size of 16.0 / 256 = 0.0625. By optimizing the
    data selection, effective INT8 resolution in the critical region increases by 16x, fully restoring
    model accuracy for the 4 TOPS Edge TPU.
