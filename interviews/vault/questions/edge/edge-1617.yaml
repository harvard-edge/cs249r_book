title: 'Distillation Projection Footprint on AI 100'
scenario: 'You are implementing feature-based knowledge distillation to compress a transformer for deployment on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). To match the student''s intermediate representations to the teacher''s, you add a linear projection layer. The student''s hidden dimension is 1024, and the teacher''s is 4096. Assuming the projection layer is fully quantized to INT8 for inference on the AI 100.'
question: 'What are the exact INT8 memory footprint of the 1024-to-4096 projection layer in bytes (including bias), and what fraction of the 32 GB memory does it consume?'
details:
  realistic_solution: 'Determine the total number of parameters in the linear projection layer by multiplying the weight matrix dimensions and adding the bias vector. Since the target is the Qualcomm Cloud AI 100 operating efficiently in INT8, multiply the total parameter count by 1 byte per parameter.'
  common_mistake: |
    **The Pitfall:** Miscalculating quantized size or omitting biases.
    **The Rationale:** Candidates often multiply parameter counts by 4 bytes (assuming FP32) instead of 1 byte (INT8), or they completely forget to include the bias vector of size 4096.
    **The Consequence:** Memory footprint estimates are inaccurate, which is fatal for precise resource allocation on constrained edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Projection layer: 1024 to 4096.
    - 1 byte per parameter for INT8.
    - Total memory: 32 GB.

    **Calculations:**
    - Weights: 1024 x 4096 = 4,194,304 parameters.
    - Biases: 4096 parameters.
    - Total parameters: 4,198,400.
    - INT8 footprint: 4,198,400 bytes.
    - Fraction: 4,198,400 / (32 * 1024^3) = 4,198,400 / 34,359,738,368 = 0.000122.

    **Conclusion & Interpretation:**
    - **Result: 0.0122% of total memory (Memory-Capacity Mitigated)**. The layer easily fits into the available resources.
