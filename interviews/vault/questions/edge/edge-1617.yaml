title: Distillation Projection Footprint on AI 100
scenario: You are implementing feature-based knowledge distillation to compress a
  transformer for deployment on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8,
  75W). To match the student's intermediate representations to the teacher's, you
  add a linear projection layer. The student's hidden dimension is 1024, and the teacher's
  is 4096. Assuming the projection layer is fully quantized to INT8 for inference
  on the AI 100, calculate the exact memory footprint of this projection layer's weights
  and biases in bytes, and determine what fraction of the total 32 GB memory it consumes.
question: What are the INT8 memory footprint of the 1024-to-4096 projection layer,
  including bias, and its fraction of 32 GB?
details:
  realistic_solution: Determine the total number of parameters in the linear projection
    layer by multiplying the weight matrix dimensions and adding the bias vector.
    Since the target is the Qualcomm Cloud AI 100 operating efficiently in INT8, multiply
    the total parameter count by 1 byte per parameter.
  common_mistake: Candidates often calculate the parameter count but multiply by 4
    bytes (assuming FP32) instead of 1 byte (INT8), or they completely forget to include
    the bias vector of size 4096.
  napkin_math: 'Weights: 1024 × 4096 = 4,194,304 parameters. Biases: 4096 parameters.
    Total = 4,198,400 parameters. At INT8 (1 byte/param), the memory footprint is
    4,198,400 bytes. Fraction of 32 GB memory capacity = 4,198,400 / (32 × 1024^3)
    = 4,198,400 / 34,359,738,368 ≈ 0.000122 (0.0122% of total memory).'
