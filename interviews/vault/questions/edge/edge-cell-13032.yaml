title: 'Edge Queueing Theory Design: Multi-Model Pipeline on Jetson Orin'
scenario: 'Design a multi-stage inference pipeline on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) for
  an autonomous vehicle: Stage 1 = object detection (YOLOv8m, 8ms), Stage 2 = depth estimation (8ms),
  Stage 3 = planning (2ms). Input: camera at 30 FPS. Model the pipeline as a tandem queue (G/D/1 at each
  stage) and find the end-to-end P99 latency and whether the pipeline meets a 100ms SLO.'
question: "Using the correct M/D/1 formula, what is the queue wait for the 8 ms detection stage at 30 FPS?"
details:
  realistic_solution: 'M/D/1 Wq = ρ/(2μ(1-ρ)), not ρ²/(2μ(1-ρ)). With ρ=0.24, μ=125: Wq = 0.24/(2×125×0.76)
    = 1.27ms.'
  common_mistake: Adding mean latencies to get total without accounting for queue buildup at each stage,
    and ignoring that tandem queues can have different utilizations per stage.
  napkin_math: 'Two-stage pipeline: Stage 1 M/D/1 queue. λ₁=30 req/s, μ₁=125/s, ρ₁=30/125=0.24. M/D/1
    Wq = ρ/(2μ(1-ρ)) = 0.24/(2×125×0.76) = 0.24/190 = 0.00127s ≈ 1.27ms (not 0.30ms which uses ρ²: 0.0576/(2×125×0.76)
    = 0.0576/190 = 0.000303s = 0.30ms — that is the ρ² error).'
