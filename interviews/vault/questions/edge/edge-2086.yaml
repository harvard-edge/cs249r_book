title: Real-time Sensor Data Ingestion on NVIDIA Jetson Orin
scenario: You are designing an autonomous agricultural robot powered by an NVIDIA Jetson Orin. It needs to ingest data from 8 high-resolution (1080p, 30fps, 24-bit RGB) cameras and 16 LiDAR sensors (generating 100,000 points/sec, 32 bytes per point). Each camera stream needs to be pre-processed with a small CNN for object detection, and LiDAR data needs real-time segmentation.
question: What raw sensor bandwidth is required, can the Orin's 68 GB/s effective LPDDR5 handle it, and how would you provision resources for these tasks?
details:
  realistic_solution: 'Implement a zero-copy buffer strategy (e.g., using NVIDIA''s GPUDirect RDMA or careful use of shared memory/CUDA streams). Utilize hardware accelerators on the Jetson Orin (e.g., DLA for INT8 operations, GPU for general processing) judiciously. Prioritize data streams using a real-time OS or scheduling. Implement efficient batching strategies for ML inference where possible without compromising latency. Consider sensor data compression if the raw bandwidth is insufficient and latency permits decompression. Monitor power consumption and thermal limits.'
  common_mistake: |
    **The Pitfall:** Neglecting aggregate data rates and memory bandwidth limitations.
    **The Rationale:** Candidates fail to calculate the true raw ingestion bandwidth before applying ML models, overlooking the power envelope and system overhead.
    **The Consequence:** Designing systems that suffer dropped frames, increased latency, or severe thermal throttling due to hardware limit saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 cameras (1080p, 30fps, 24-bit RGB).
    - 16 LiDARs (100,000 points/sec, 32 bytes/point).
    - Orin effective memory bandwidth: 68 GB/s.

    **Calculations:**
    - Camera Resolution: 1920 x 1080 pixels x 3 bytes/pixel = 6.22 MB/frame.
    - Total Camera Data Rate: 8 x 6.22 MB/frame x 30 fps = 1,492.8 MB/s ≈ 1.49 GB/s.
    - Total LiDAR Data Rate: 16 x 100,000 points/sec x 32 bytes/point = 51.2 MB/s ≈ 0.05 GB/s.
    - Total Raw Data Ingestion Bandwidth: 1.49 GB/s + 0.05 GB/s = 1.54 GB/s.
    - Memory Bandwidth for Initial Processing (read + write): 1.54 GB/s x 2 = 3.08 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Sufficient Memory Bandwidth (Memory-Bound).** 3.08 GB/s is well within the Jetson Orin's effective 68 GB/s LPDDR5 bandwidth, leaving ample headroom.
