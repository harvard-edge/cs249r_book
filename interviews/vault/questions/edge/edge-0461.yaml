title: The ADAS Pipeline Stall
scenario: You are designing the perception stack for an Autonomous Emergency Braking (AEB) system. Two cameras (front and side) feed frames to the accelerators, which run a YOLO-based object detection model in parallel. The model outputs are then transferred to the host CPU, which runs a sensor fusion and tracking algorithm. The system has a hard real-time deadline of 33ms per frame (30 FPS) to engage the brakes.
question: Should the Hailo inference and CPU fusion stages run serially or as a pipeline to meet the 33ms AEB frame deadline?
details:
  realistic_solution: Apply pipeline parallelism. The CPU can work on fusing the results of frame N while the Hailo accelerators simultaneously process frame N+1. The system's throughput is determined by the slowest stage in the pipeline (the inference), avoiding the serial latency bottleneck.
  common_mistake: |
    **The Pitfall:** Trying to optimize the slowest component in isolation or applying tensor parallelism.
    **The Rationale:** Engineers misdiagnose bottlenecks by focusing on the sum of stages rather than the pipeline stage time, or they apply cloud-native parallelism concepts to resource-constrained edge devices.
    **The Consequence:** Wasting effort on highly complex model splitting that introduces massive communication overhead without solving the serial latency bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard real-time deadline: 33ms (30 FPS).
       - Inference latency: 20ms.
       - Fusion latency: 15ms.
    2. **Calculations:**
       - Serial Execution Time = 20ms + 15ms = 35ms (misses 33ms target).
       - Pipelined Throughput Bottleneck = max(20ms, 15ms) = 20ms per frame.
       - Effective Pipelined FPS = 1000 / 20ms = 50 FPS.
    3. **Conclusion & Interpretation:**
       - **Pipeline parallelism reduces per-frame bottleneck to 20ms, achieving 50 FPS. Result: Latency-Bound Mitigation.**
