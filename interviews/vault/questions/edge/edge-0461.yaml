title: The ADAS Pipeline Stall
scenario: You are designing the perception stack for an Autonomous Emergency Braking (AEB) system. The system uses a carrier board with two Hailo-8 AI accelerators and a host CPU. Two cameras (front and side) feed frames to the accelerators, which run a YOLO-based object detection model in parallel. The model outputs are then transferred to the host CPU, which runs a sensor fusion and tracking algorithm. The system has a hard real-time deadline of 33ms per frame (30 FPS) to engage the brakes.
question: Should the Hailo inference and CPU fusion stages run serially or as a pipeline to meet the 33ms AEB frame deadline?
details:
  realistic_solution: The correct solution is to apply pipeline parallelism. The current serial execution results in a total latency of 20ms + 15ms = 35ms, which misses the 33ms deadline. By pipelining the process, the CPU can work on fusing the results of frame `N` while the Hailo accelerators are simultaneously processing frame `N+1`. The system's throughput is then determined by the slowest stage in the pipeline (the 'pipeline stage time'), not the sum of all stages. In this case, the slowest stage is the 20ms inference. This allows the system to achieve a frame rate of 1/20ms = 50 FPS, easily meeting the 30 FPS requirement. This demonstrates an understanding of real-time system design and choosing the right parallelism strategy for the domain.
  common_mistake: |
    **The Pitfall:** Trying to optimize the slowest component in isolation or applying tensor parallelism.
    **The Rationale:** Engineers misdiagnose bottlenecks by focusing on the sum of stages rather than the pipeline stage time, or they apply cloud-native parallelism concepts to resource-constrained edge devices.
    **The Consequence:** Wasting effort on highly complex model splitting that introduces massive communication overhead without solving the serial latency bottleneck.
  napkin_math: |
    1. Serial Execution: Time_total = T_inference (20ms) + T_fusion (15ms) = 35ms (misses 33ms target).
    2. Pipeline Parallelism: Frame N inference (20ms) overlaps with Frame N-1 fusion (15ms).
    3. Throughput bottleneck is the longest stage: max(20ms, 15ms) = 20ms per frame.
    4. Effective FPS = 1000 / 20 = **50 FPS**, easily beating the 30 FPS requirement.
