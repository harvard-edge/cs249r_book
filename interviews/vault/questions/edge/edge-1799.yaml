title: Dual-Model Security Pipeline on Google Coral Edge TPU
scenario: Design a compound AI system for a smart security camera that runs a two-stage pipeline: an object detection model to find faces, followed by a feature extraction model to generate embeddings for a local vector search. The entire pipeline must be deployed on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor).
question: How would you orchestrate the detector, embedding model, INT8 quantization, and host-device routing to meet 15 FPS?
details:
  realistic_solution: The correct approach involves fully quantizing both models to INT8 using post-training integerization to ensure 100% of operations run on the Edge TPU. The host CPU must orchestrate the pipeline by retrieving the detection bounding boxes, cropping the original frame, and batching the cropped faces before sending them back over USB for the embedding pass, pipelining these operations across concurrent frames to hide transfer latency.
  common_mistake: |
    **The Pitfall:** Ignoring USB data transfer overhead between the chained models and neglecting the strict INT8 quantization requirement.
    **The Rationale:** Candidates incorrectly assume the TPU can route intermediate tensors directly between models without host CPU intervention, and they assume FP16 or FP32 fallback is viable.
    **The Consequence:** The system incurs massive CPU fallback penalties and unexpected USB transfer latencies, failing to meet the 15 FPS constraint.
  napkin_math: |
    - Target latency for 15 FPS: 1000ms / 15 = 66.6ms per frame.
    - TPU Compute (INT8): MobileNet SSD takes 12ms, MobileFaceNet takes 4ms per face.
    - For 3 faces: Total TPU inference = 12ms + (3 * 4ms) = 24ms.
    - Full frame USB transfer: 300x300x3 bytes = 270 KB.
    - Cropped faces USB transfer: 3 * 112x112x3 bytes = 112.9 KB.
    - Total USB payload: 382.9 KB. At USB 3.0 speeds (~400 MB/s), this takes ~1-2ms.
    **Conclusion: Total latency is ~26ms, leaving ~40ms for host-side NMS and routing, safely passing the 66.6ms budget.**
