title: Transformer Attention Cost on Coral Edge TPU
scenario: You are deploying a quantized vision transformer to a Google Coral Edge TPU for real-time object tracking. The device provides 4 TOPS at INT8 precision and operates within a strict 2W power envelope. You need to evaluate a self-attention layer processing a sequence length of 256 tokens with a hidden dimension of 512.
question: For N=256 and d=512 on a 4 TOPS Coral Edge TPU, how many INT8 ops does QK^T require and what is the minimum latency?
details:
  realistic_solution: 'The candidate should recall the specific formula for the QK^T matrix multiplication complexity: 2 * N^2 * d operations. By plugging in the sequence length and hidden dimension, they can calculate the total INT8 operations required. Finally, dividing this workload by the peak throughput of the Edge TPU (4 TOPS) yields the minimum theoretical execution time.'
  common_mistake: |
    **The Pitfall:** Forgetting that one Multiply-Accumulate (MAC) is two operations.
    **The Rationale:** Hardware TOPS counts individual operations, so MAC counts must be doubled when calculating latency limits.
    **The Consequence:** Halving the true latency and falsely approving architectures that will miss real-time deadlines.
  napkin_math: |
    1. **MAC Count:** For Q (N x d) times K^T (d x N), MACs = N^2 * d.
    2. **Total Operations:** 2 * MACs = 2 * N^2 * d.
    3. **Calculation:** 2 * (256)^2 * 512 = 2 * 65,536 * 512 = 67,108,864 INT8 operations (~67.1 Mega-ops).
    4. **Hardware Throughput:** 4 TOPS = 4 * 10^12 Ops/sec.
    5. **Minimum Latency:** 67.1e6 / 4e12 = 1.677e-5 seconds = **~16.8 µs**.
