title: Adversarial Robustness Design for Edge AI on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a critical image classification model (e.g.,
  for industrial inspection) onto a Qualcomm Cloud AI 100 accelerator, which offers
  400 TOPS INT8 performance, 32 GB LPDDR4x memory, and operates within a 75W power
  envelope. The client emphasizes that the system must be highly reliable and secure
  against adversarial attacks, including prompt injection (if applicable to the model
  type, otherwise focus on image perturbations), model extraction attempts, and side-channel
  vulnerabilities. Design a strategy to ensure the deployed model's adversarial robustness
  and security while respecting the hardware constraints for edge deployment.
question: How would you secure and harden an INT8 image classifier on Qualcomm Cloud
  AI 100 against adversarial inputs, extraction, and side channels within edge constraints?
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach:
    1) **Hardware-aware adversarial training:** Utilize lightweight adversarial training
    methods specifically optimized for INT8 quantization and the Qualcomm Cloud AI
    100''s architecture. 2) **Input sanitization:** Implement efficient pre-processing
    techniques (e.g., basic image denoising, specific filtering) that can be run on
    the device with minimal latency, potentially leveraging dedicated hardware acceleration.
    3) **Model hardening:** Employ techniques like defensive distillation or network
    pruning combined with robustness regularizers during training. 4) **Runtime monitoring:**
    Integrate lightweight anomaly detection at inference time to flag suspicious inputs
    that deviate significantly from the training distribution. 5) **Security Best
    Practices:** Implement secure boot, trusted execution environments (if supported
    by the platform), and anti-tampering measures to mitigate model extraction and
    side-channel attacks specific to the edge device''s physical access and limited
    resources.'
  common_mistake: A common mistake is to propose defense mechanisms that are computationally
    too expensive or memory-intensive for the edge device. For example, suggesting
    state-of-the-art adversarial training techniques without considering their significant
    training time and potential inference overhead on a 400 TOPS INT8 chip, or ignoring
    the 32 GB LPDDR4x memory limit for complex ensembles or input transformations.
    Another mistake is to focus solely on perturbation defenses without addressing
    broader security concerns like model extraction or side-channel attacks relevant
    to the edge deployment.
  napkin_math: 'Consider the compute limit: 400 TOPS means the hardware can execute 400 trillion INT8 operations per second. If you need to process 100 images per second, each image has a 10 ms latency budget, allowing for a maximum of 4 trillion operations (4 TOP) per image. If your core model requires 2 TOP (Tera-Operations) per inference, it consumes 200 TOPS of compute bandwidth at 100 fps. If a proposed defense adds 0.5 TOP per image, the total is 2.5 TOP per image (250 TOPS at 100 fps), which easily fits within the 400 TOPS compute limit. However, any defense adding more than 2 TOP per image will exceed the hardware''s 400 TOPS capacity at 100 fps. Also, how much of the 32 GB LPDDR4x memory is consumed by the model, its intermediate activations, and any security modules, ensuring it doesn''t exceed available resources?'
