title: 'Adversarial Robustness Design for Edge AI on Qualcomm Cloud AI 100'
scenario: 'You are tasked with deploying a critical image classification model (e.g., for industrial inspection) onto a Qualcomm Cloud AI 100 accelerator, which offers 400 TOPS INT8 performance, 32 GB LPDDR4x memory, and operates within a 75W power envelope. The client emphasizes that the system must be highly reliable and secure against adversarial attacks, including prompt injection (if applicable to the model type, otherwise focus on image perturbations), model extraction attempts, and side-channel vulnerabilities.'
question: 'How would you secure and harden an INT8 image classifier on Qualcomm Cloud AI 100 against adversarial inputs, extraction, and side channels within edge constraints?'
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: 1) **Hardware-aware adversarial training:** Utilize lightweight adversarial training methods specifically optimized for INT8 quantization and the Qualcomm Cloud AI 100''s architecture. 2) **Input sanitization:** Implement efficient pre-processing techniques (e.g., basic image denoising, specific filtering) that can be run on the device with minimal latency, potentially leveraging dedicated hardware acceleration. 3) **Model hardening:** Employ techniques like defensive distillation or network pruning combined with robustness regularizers during training. 4) **Runtime monitoring:** Integrate lightweight anomaly detection at inference time to flag suspicious inputs that deviate significantly from the training distribution. 5) **Security Best Practices:** Implement secure boot, trusted execution environments (if supported by the platform), and anti-tampering measures to mitigate model extraction and side-channel attacks specific to the edge device''s physical access and limited resources.'
  common_mistake: |
    **The Pitfall:** Proposing defense mechanisms that are computationally too expensive for the edge device.
    **The Rationale:** Candidates suggest state-of-the-art adversarial training or input sanitization without tracking the 400 TOPS limit.
    **The Consequence:** The added security overhead pushes the system beyond its real-time processing constraints, causing dropped frames.
  napkin_math: |
    - Compute limit: 400 TOPS.
    - Target frame rate: 100 FPS (10 ms latency budget).
    - Compute budget per image: 400 TOPS / 100 FPS = **4 TOP per image**.
    - Base model cost: e.g., 2 TOP per image.
    - Available budget for defenses: 4 TOP - 2 TOP = **2 TOP per image**.
    - If a defense adds > 2 TOP, the hardware capacity is exceeded.
