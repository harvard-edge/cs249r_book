title: 'Latency Decomposition: Compare TFLite vs. TensorRT Inference Latency on Jetson Orin'
scenario: 'A MobileNetV3-Large model (5.4M params, 224×224 input) is deployed on Jetson Orin (275 TOPS
  INT8, 60W) using two runtimes: TFLite with GPU delegate vs. TensorRT with FP16. Estimate and compare
  end-to-end inference latency including runtime overhead, memory transfer, and kernel launch costs.'
details:
  realistic_solution: 'MobileNetV3-Large: ~219M MACs = 0.44 GOPs. TensorRT FP16 on Orin GPU (theoretical
    40 TFLOPS FP16 on Orin GPU): 0.44G / 40T ≈ 0.01ms compute, but realistic with fused kernels: ~2ms.
    TFLite GPU delegate: per-op dispatch overhead adds ~1ms setup, total ~4-6ms. TensorRT wins 2-3× on
    latency.'
  common_mistake: Assuming TFLite GPU delegate achieves full GPU utilization; in practice, kernel fragmentation
    and op-by-op dispatch add significant overhead vs. TensorRT's fused kernels.
  napkin_math: 'MobileNetV3-Large MACs: 219M → 0.44 GOPs. Orin GPU FP16 peak: ~40 TFLOPS. Compute time:
    0.44/40000 ≈ 0.011ms. Realistic TensorRT with memory ops: 2ms. TFLite: 4-6ms due to 150+ kernel launches
    × 0.02ms overhead = 3ms overhead. TensorRT = 2ms, TFLite = 5ms → 2.5× difference.'
