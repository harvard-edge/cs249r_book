title: 'The Edge Roofline Dilemma: CNN vs. ViT'
scenario: You're an ML systems engineer on a self-driving car team, and your perception module runs on a Jetson AGX Orin (275 TOPS INT8, 204.8 GB/s). Your current depthwise-separable CNN meets the hard real-time 30 FPS (33ms) deadline with a latency of 24ms. The product team wants to replace it with a new Vision Transformer (ViT) that shows 5% higher accuracy on rare, occluded pedestrian cases, but has 1.8x more operations.
question: "How would you decide whether the ViT can replace the optimized CNN while still meeting the 33ms deadline on Orin?"
details:
  realistic_solution: "The correct approach is to use the Roofline model to determine if each model is compute-bound or memory-bound. A model can have only 1.8x the FLOPs but be significantly slower if its architecture crosses the hardware's 'Ridge Point' and becomes memory-bound. This is a common trap when migrating from convolution-heavy (high arithmetic intensity) to attention-heavy (low arithmetic intensity) architectures on edge devices."
  common_mistake: "Engineers often fall into the 'FLOPs fallacy', assuming that if a model has '1.8x' the operations, it will simply be '1.8x' slower. This ignores the Roofline model and the critical role of memory bandwidth."
  napkin_math: "1. Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1343 Ops/Byte. 2. CNN Arithmetic Intensity: 1500 GOps / 5 GB = 300 Ops/Byte. Effective throughput = 300 * 204.8 = 61.4 TOPS. CNN Latency = 1500 GOps / 61.4 TOPS = 24.4ms (meets 33ms deadline). 3. ViT Arithmetic Intensity: ViT has 1.8x more Ops (2700 GOps) but requires 15 GB memory access due to self-attention. AI = 2700 GOps / 15 GB = 180 Ops/Byte (severely memory-bound). Effective throughput = 180 * 204.8 GB/s = 36.8 TOPS. ViT Latency = 2700 GOps / 36.8 TOPS = 73ms. The ViT violates the 33ms deadline."
  options:
  - "The ViT is compute-bound. Its latency will be ~27ms (7.5 T-Ops / 275 TOPS), so it is a feasible replacement."
  - "The ViT has ~1.8x more Ops, so it will be ~1.8x slower. Its latency will be 24ms * 1.8 = ~43ms, missing the deadline."
  - "The ViT is memory-bound. Its latency will be ~73ms, violating the 33ms deadline."
  - "Both models are compute-bound, but the ViT has more Ops. Its latency will be ~27ms which is too close to the deadline, so it is not feasible."
  correct_index: 2
