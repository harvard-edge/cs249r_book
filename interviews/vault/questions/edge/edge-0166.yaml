title: 'The Energy Cost of Precision: Quantization Fundamentals'
scenario: You are optimizing a model for a battery-powered drone. To reduce power consumption, you are considering quantizing a key convolution layer from FP16 to INT8.
question: What is the approximate arithmetic energy saving when switching one MAC from FP16 to INT8?
details:
  realistic_solution: An FP16 arithmetic operation consumes approximately 5x more energy than an INT8 operation. This is a fundamental physical relationship based on the energy required to switch transistors for floating-point versus integer calculations at these bit widths. On a device where every milliwatt matters for flight time, this 5x reduction in compute energy is a critical optimization.
  common_mistake: |
    **The Pitfall:** Confusing the memory savings (2x) with the energy savings.
    **The Rationale:** Because reducing bit width from 16 to 8 halves the data size, candidates assume power scales linearly with data size.
    **The Consequence:** The massive non-linear energy reduction from switching to simpler integer digital logic is heavily underestimated.
  napkin_math: |
    1. An FP32 operation costs ~18x the energy of an INT8 op.
    2. An FP32 operation costs ~3.4x the energy of an FP16 op.
    3. The relative cost of FP16 to INT8 is the ratio: 18 / 3.4 ≈ 5.3x.
    4. **For a quick estimate, a 5x energy saving for compute is the reliable rule of thumb.**
  options:
  - Roughly 2x, because you are halving the bit width from 16 to 8.
  - Roughly 18x, the standard energy ratio for integer vs. float.
  - Roughly 5x.
  - Roughly 1.5x; the savings are minor.
  correct_index: 2
