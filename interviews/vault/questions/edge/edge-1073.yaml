title: 'MLOps Lifecycle: End-to-End MLOps for Autonomous Vehicle Edge Fleet'
scenario: 'An autonomous vehicle fleet with 10,000 edge units runs a perception stack (5 models, 200MB combined TensorRT). The system requires daily model updates from cloud training, shadow mode validation before promotion, per-vehicle rollback, and fleet-wide monitoring.'
question: How would you design the MLOps lifecycle for 10,000 edge units, and quantify daily update bandwidth, per-vehicle storage, and monitoring volume?
details:
  realistic_solution: 'Utilize delta updates and staged deployments. Store the current model and the previous rollback state on-device. Deploy updates in progressive rings: 1%, 10%, 100% over several days. Monitor the 1% canary group for 24 hours before expansion. For fleet telemetry, centralize a time-series DB but enforce a tight bandwidth budget per vehicle by heavily sampling shadow-mode detections rather than streaming all frames.'
  common_mistake: |
    **The Pitfall:** Designing a monolithic update system that pushes all 5 full models to 10,000 vehicles simultaneously.
    **The Rationale:** Assuming cloud-like infinite bandwidth and zero-cost data transfer for edge cellular fleets.
    **The Consequence:** Generating a 2TB daily transfer spike, incurring excessive cellular costs, and risking widespread fleet failure without staged rollback capability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 units.
    - Model size: 200 MB total. Daily delta update: 20% (40 MB).
    - Staged rollout: 1% on Day 1.
    - Cellular cost: $0.09/GB.
    - Shadow mode sampling: 1% of detections.

    **Calculations:**
    - Full update monolithic cost: 200 MB * 10,000 = 2,000,000 MB (2 TB) = 2,000 GB * $0.09 = $180/day.
    - Staged delta Day 1 cost: 100 units * 40 MB = 4,000 MB (4 GB) * $0.09 = $0.36/day.
    - Shadow telemetry: 1 hr * 100 FPS * 1 KB * 0.01 sample rate = 3.6 MB/unit.
    - Fleet shadow volume: 10,000 * 3.6 MB = 36 GB/day.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound Telemetry**. Staged delta updates drastically reduce Day 1 financial and operational risk, while targeted 1% sampling is strictly mandatory to prevent shadow mode telemetry from saturating the network.
