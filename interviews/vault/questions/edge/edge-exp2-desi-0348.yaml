title: Hailo-8 Multi-Stream Dataflow Batching Architecture
scenario: You are designing an autonomous retail checkout system that processes 4 concurrent camera streams
  at 30 FPS using a single Hailo-8 dataflow accelerator. The Hailo-8 delivers 26 TOPS INT8 at 2.5W, but
  critically lacks local DRAM, meaning all activations and weights must stream directly from host memory
  over PCIe. Design a scheduling policy and batching strategy to ensure no stream exceeds a 15ms end-to-end
  latency budget while maintaining the required 120 FPS combined throughput.
question: "What scheduling and batching policy would you use on one Hailo-8 to keep four 30 FPS streams under a 15 ms latency budget?"
details:
  realistic_solution: The optimal design leverages the Hailo-8's dataflow architecture by using a continuous
    streaming policy with a static batch size of 1. Instead of batching frames, the system should implement
    a highly optimized host-side DMA pipeline that interleaves individual frames from the 4 cameras sequentially.
    By keeping the PCIe bus utilization steady and avoiding large burst transfers, the continuous execution
    engine remains fed, minimizing tail latency and completely avoiding the overhead of dynamic batch
    construction.
  common_mistake: Candidates often suggest traditional dynamic batching with a timeout, aggregating frames
    across cameras into a single large batch to maximize throughput like they would on a GPU. They fail
    to account for the Hailo-8's lack of local DRAM; large batch sizes force massive concurrent DMA transfers
    from host memory, saturating the PCIe bus and causing severe latency spikes that violate the strict
    15ms latency budget.
  napkin_math: 'Total throughput requirement: 4 cameras * 30 FPS = 120 frames per second. At batch size
    1, a 1080p frame (approx 6.2MB) takes ~1.6ms to transfer over a typical edge PCIe Gen3x4 bus (3.9
    GB/s). For a 50 GOPS detection model on the 26 TOPS Hailo-8, compute time is ~2ms per frame. Total
    single-frame latency = 1.6ms (transfer) + 2.0ms (compute) = 3.6ms. If we batched all 4 frames together
    (batch size 4), the first camera''s frame would wait 6.4ms for transfer and 8.0ms for compute, resulting
    in a 14.4ms latency—dangerously close to the 15ms budget and susceptible to jitter.'
