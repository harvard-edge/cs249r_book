title: 'Hailo-8 Multi-Camera Stream Load Balancing'
scenario: 'You are designing an edge inference appliance that processes 8 independent 1080p camera streams using a pool of 4 Hailo-8 dataflow accelerators. The Hailo-8 provides 26 TOPS INT8 at 2.5W, but lacks local DRAM, meaning all activations and weights must stream continuously from host memory over PCIe.'
question: 'How would you route 8 camera streams across 4 Hailo-8 accelerators while minimizing host memory contention and avoiding accelerator starvation?'
details:
  realistic_solution: 'The optimal approach is to pin specific camera streams to dedicated Hailo-8 chips (e.g., 2 cameras per chip) rather than dynamically routing individual frames across all chips. This localized routing ensures that the host memory access patterns remain predictable and cache-friendly for the streaming DMA transfers. Additionally, implementing backpressure at the ingestion queue prevents the host from buffering too many frames.'
  common_mistake: 'Suggesting standard round-robin or consistent hashing at the frame level. Candidates often apply cloud load balancing techniques without considering the PCIe bus limitations and host memory streaming requirements of the Hailo-8.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model requirement: 10 GOPS per frame.
    - Hailo-8 compute: 26 TOPS (26,000 GOPS).
    - Cameras: 8 streams at 30 FPS (240 FPS total).
    - Frame size: 1080p RGB (~6MB).

    **Calculations:**
    - Single chip max FPS: 26,000 GOPS / 10 GOPS/frame = 2,600 FPS.
    - Total throughput needed: 240 FPS (2,400 GOPS), well within 4 chips (104 TOPS).
    - Total ingestion bandwidth: 240 FPS * 6MB = 1.44 GB/s.
    - DMA streaming per chip (2 streams): 60 FPS * 6MB = 360 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 360 MB/s per chip (PCIe-Bound)**. Pinning streams to specific chips prevents memory controller saturation and easily fits within PCIe Gen3 limits.
