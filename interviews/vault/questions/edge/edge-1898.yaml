title: Diagnosing Latency on Qualcomm Cloud AI 100 with Profiling
scenario: You are deploying a large language model (LLM) for real-time inference on
  an edge device powered by the Qualcomm Cloud AI 100. The device has 32 GB LPDDR4x
  memory, offers 400 TOPS INT8 performance, and operates within a 75W power envelope.
  Despite optimizing the model for INT8 quantization, you observe that the end-to-end
  inference latency is consistently higher than your target of 50 ms per request.
  You suspect there's a bottleneck preventing full utilization of the AI 100's capabilities.
  Describe your methodology for using profiling and trace tools to identify whether
  the bottleneck is compute, memory, or I/O bound, and how you would narrow down the
  specific component causing the latency.
question: How would you use profiling and trace tools on the Qualcomm Cloud AI 100
  to determine whether the 50 ms LLM latency miss is compute, memory, or I/O bound?
details:
  realistic_solution: '1.  **High-Level Tracing:** Start with system-level tracing
    (e.g., `strace`, `perf` or platform-specific Qualcomm SDK tools) to get a macroscopic
    view of where time is spent across the entire inference pipeline, including data
    ingestion, pre-processing, model execution, and post-processing. This helps identify
    major phases contributing to latency.

    2.  **Qualcomm Profiler Integration:** Leverage Qualcomm''s proprietary profiling
    tools and SDKs (e.g., Qualcomm Neural Processing SDK''s profiling features, if
    available) which provide fine-grained metrics specific to the AI 100''s NPUs,
    memory controllers, and interconnects. This can reveal NPU utilization, memory
    bandwidth consumption (LPDDR4x), and queue stalls.

    3.  **Compute Bottleneck Analysis:** If model execution is identified as the bottleneck,
    use NPU-specific profilers to analyze instruction mix, memory access patterns
    within kernels, and pipeline stalls. Check if the INT8 operations are indeed saturating
    the 400 TOPS, or if data movement is limiting compute.

    4.  **Memory/I/O Bottleneck Analysis:** If memory or I/O is suspect, analyze LPDDR4x
    bandwidth utilization, cache hit rates, and main memory access patterns. Trace
    data transfers between CPU, NPU, and external storage.

    5.  **Correlate Metrics:** Combine data from different profiling tools to build
    a comprehensive picture. For example, high NPU idle time coupled with high memory
    bandwidth usage might indicate a memory-bound workload or inefficient data transfer.'
  common_mistake: A common mistake is to immediately assume the bottleneck is computational
    (e.g., INT8 ops per second) without first systematically investigating other factors.
    Teams often jump to model architecture changes or further quantization without
    understanding memory access patterns, data loading overheads, pre/post-processing
    latencies, or even system-level scheduling conflicts. Another mistake is using
    generic profiling tools not optimized for the specific Qualcomm hardware, leading
    to incomplete or misleading insights.
  napkin_math: 'Given 400 TOPS (Tera Operations Per Second) INT8 performance, an INT8
    operation can be roughly considered a multiplication and an addition, thus 2 ops.
    So 400 TOPS INT8 is roughly equivalent to 200 Tera MACs (Multiply-Accumulates)
    per second, or 200 * 10^12 MACs/s. If your model requires, say, 20 * 10^9 INT8
    MACs per inference, the theoretical compute time is 20 * 10^9 / (200 * 10^12)
    = 0.0001 seconds (0.1 ms).


    If the actual latency is 150 ms, the NPU compute might be taking only a tiny fraction,
    while the remaining ~150 ms comes from memory transfers, pre/post-processing,
    and other overheads. If the LPDDR4x has a typical bandwidth of, for example, 50
    GB/s, and your model requires loading 10 GB of weights and activations per inference,
    then memory transfer alone would take 10 GB / 50 GB/s = 0.2 seconds (200 ms).
    This quick calculation would immediately suggest a memory bandwidth bottleneck.
    It highlights the importance of analyzing model size relative to available memory
    and bandwidth.'
