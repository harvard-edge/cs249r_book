title: Distilled INT8 Quantization Collapse
scenario: We trained a 1.5B parameter student model using logit matching from a massive teacher to deploy
  on an NVIDIA Jetson Orin. The student achieves excellent accuracy in FP16. To leverage the Orin's 275
  TOPS INT8 engine and Ampere GPU/DLA accelerators within the strict 60W TDP, we apply post-training INT8
  quantization. However, after INT8 quantization, the distilled model's accuracy unexpectedly collapses
  by 20%, whereas an identical architecture trained from scratch drops only 2% under the same quantization.
  What causes this severe degradation specific to the distilled model?
details:
  realistic_solution: The root cause is that matching teacher logits often forces the student to produce
    extreme outlier activations to mimic the teacher's unconstrained probability distributions. When these
    extreme outliers are mapped to a limited INT8 dynamic range, it causes severe clipping and catastrophic
    precision loss. To diagnose this, you must profile the activation histograms of the distilled model
    versus the scratch model. The proper fix is to employ Quantization-Aware Distillation (QAD), where
    simulated INT8 quantization is applied during the distillation process to force hardware-friendly
    representations.
  common_mistake: Candidates often incorrectly assume the distillation process failed to transfer the
    teacher's knowledge or blame the DLA hardware for lacking specific operator support. They fail to
    realize that the objective function of distillation fundamentally alters the student's internal numerical
    distributions.
  napkin_math: Assume the 1.5B parameter student model is deployed. In FP16, weights consume 3 GB of the
    32 GB LPDDR5 memory. If accuracy loss forces a fallback to FP16 on the Ampere GPU, loading weights
    at the Orin's theoretical ~204 GB/s memory bandwidth takes 14.7 ms per frame (3 GB / 204 GB/s). For
    a 60 FPS target (16.6 ms budget), this leaves just 1.9 ms for compute, risking latency misses and
    easily maxing out the 60W TDP limit. Successfully utilizing the 275 TOPS INT8 engine halves the weight
    payload to 1.5 GB (7.35 ms load time), ensuring ample headroom for compute and power.
