title: Optimizing Memory-Mapped Inference on Google Coral Edge TPU
scenario: You are deploying a new INT8 quantized TensorFlow Lite model for real-time object detection
  on a Google Coral Edge TPU (4 TOPS INT8, 2W). The model has a significant number of parameters (~50MB)
  and is memory-mapped for inference. During initial testing, you observe a 'cold start' latency of several
  hundreds of milliseconds, significantly impacting the user experience for the first few inferences.
  Subsequent inferences are fast. Your task is to diagnose the bottleneck and propose a solution to minimize
  this initial latency, specifically focusing on the memory-mapped weight loading and mmap strategies.
question: "How would you diagnose and reduce the several-hundred-ms cold start for a 50 MB memory-mapped Coral TFLite model?"
details:
  realistic_solution: A realistic solution involves proactive page prefetching. This can be achieved by
    using `mlock` or `madvise` with `MADV_WILLNEED` to advise the kernel to load the entire memory-mapped
    model into physical memory before the first inference. If `mlock` is not feasible due to privilege
    restrictions or memory constraints, a 'warm-up' pass through the model (e.g., performing a dummy inference
    on synthetic data) can also trigger page faults and load pages into cache, albeit less deterministically.
    For shared memory scenarios, ensuring the initial process properly prefetches or warms up the memory
    region before other processes attach can prevent redundant cold starts.
  common_mistake: A common mistake is assuming that memory-mapping alone guarantees zero-copy and instant
    access for the entire model. Developers often overlook the underlying operating system's page faulting
    mechanism, where pages are loaded into physical memory only upon first access, leading to 'cold start'
    latency. Additionally, not considering the typical access patterns or the impact of shared memory
    across processes can lead to suboptimal mmap strategies.
  napkin_math: Assume the model size is 50MB. If the page size is 4KB, that's 50MB / 4KB = 12,800 pages.
    If each page fault incurs an overhead of ~50-100 microseconds (due to disk I/O or simply OS overhead
    for mapping), the total cold start latency could be in the order of 12,800 pages * 50 µs/page = 640,000
    µs = 640 ms. This roughly matches the observed latency. By prefetching all pages, this overhead can
    be amortized during initialization or eliminated, leading to near-instant first inference response
    times.
