title: The Edge Roofline Bottleneck
scenario: An autonomous vehicle team deploys a new vision model on a Jetson AGX Orin. The model performs 50 Giga-operations (G-ops) and accesses 250 Megabytes (MB) of data from memory for each frame.
question: What fundamental hardware limit is this workload most likely hitting?
details:
  realistic_solution: The model is memory-bound. To determine the bottleneck, we look at the model's arithmetic intensity (AI) — the ratio of compute to memory access. The Jetson AGX Orin has a memory bandwidth of about 205 GB/s and a peak compute of 275 TOPS (INT8). Its 'ridge point'—the AI needed to balance compute and memory—is roughly 1,342 Ops/Byte. This model's AI is far below that, meaning the memory system cannot supply data fast enough to keep the compute units busy.
  common_mistake: |
    **The Pitfall:** Assuming the workload is compute-bound simply because 50 G-ops seems like a "heavy" load.
    **The Rationale:** Engineers fixate on the advertised peak TOPS and fail to assess the ratio of computation to data access.
    **The Consequence:** Time is wasted trying to optimize compute kernels when the actual limitation is memory throughput.
  napkin_math: |
    1. Calculate Model Arithmetic Intensity: 50 G-ops / 250 MB = 50e9 / 250e6 = 200 Ops/Byte.
    2. Identify Jetson AGX Orin metrics: 275 TOPS compute, 204.8 GB/s bandwidth.
    3. Calculate Hardware Ridge Point: 275e12 / 204.8e9 = 1342.7 Ops/Byte.
    4. Compare AI to Ridge Point: 200 (Model) << 1342 (Hardware).
    **Because the model's AI (200) is far less than the hardware's Ridge Point (1342), the compute units are starved for data, and the workload is memory-bandwidth bound.**
  options:
  - Compute-bound, because 50 G-ops is a heavy load for an edge device.
  - Memory-bound, because its ratio of computation to data access is too low to saturate the GPU cores.
  - Power-bound, because the device is likely thermal throttling under that load.
  - Compute-bound, because its arithmetic intensity is high, demanding more from the processor.
  correct_index: 1
