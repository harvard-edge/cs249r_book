title: The Pruning Paradox
scenario: 'You structured-pruned 40% of channels from your detection model. FLOPs dropped 40%. But when you benchmark on the Hailo-8, latency only dropped 10%. On the Jetson Orin, it dropped 35%.'
question: "Why does the same pruning give wildly different speedups on different hardware?"
details:
  realistic_solution: 'Edge accelerators have fundamentally different execution models. The **Jetson Orin (GPU)** executes layers as CUDA kernels with configurable thread blocks. Fewer channels = fewer threads = proportional speedup (with some overhead). The **Hailo-8 (dataflow)** maps the model onto a fixed spatial pipeline at compile time. Each layer is assigned physical compute units based on its original shape. When you prune a layer from 64 to 38 channels, the Hailo''s compiler must still allocate compute units in multiples of its native SIMD width (typically 8 or 16). A 38-channel layer executes as if it had 48 channels (rounded up to the next multiple of 16), wasting 21% of the allocated compute. Across many layers, these rounding penalties accumulate, eroding the theoretical 40% FLOP reduction to a 10% latency reduction. Fix: use **hardware-aware pruning** that constrains channel counts to multiples of the target hardware''s native width. Prune from 64 to 32 channels (50% reduction, but hardware-aligned) instead of 64 to 38 (41% reduction, but misaligned).'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo compiler isn't optimized for pruned models.
    **The Rationale:** The 10% latency drop vs 40% FLOP drop seems like a compiler inefficiency.
    **The Consequence:** Engineers waste time trying to tweak compiler flags instead of fixing the underlying architectural mismatch (SIMD width alignment).
  napkin_math: |
    * Consider 10 layers, each pruned from 64 to 38 channels.
    * Hailo SIMD width = 16. Effective channels allocated per layer: 48 (rounded up to nearest multiple of 16).
    * Effective FLOP reduction on Hailo: (64 - 48) / 64 = 25% (not 40%).
    * With hardware-aware pruning to 32 channels: effective reduction = 50%, and every allocated channel is utilized.
    * **Latency improvement scales properly when pruned channel counts are aligned to native SIMD widths.**
