title: The Pruning Paradox
scenario: You structured-pruned 40% of channels from your detection model. FLOPs dropped
  40%. But when you benchmark on the Hailo-8, latency only dropped 10%. On the Jetson
  Orin, it dropped 35%.
question: Why does the same pruning give wildly different speedups on different hardware?
details:
  realistic_solution: 'Edge accelerators have fundamentally different execution models.
    The Jetson Orin (GPU) executes layers as CUDA kernels; fewer channels = fewer
    threads = proportional speedup. The Hailo-8 (dataflow) maps the model onto a fixed
    spatial pipeline with native SIMD widths (e.g., 16). Pruning from 64 to 38 channels
    wastes 21% of the allocated compute because the Hailo compiler rounds up to 48.
    Fix: use hardware-aware pruning that constrains channel counts to multiples of
    the target hardware''s native SIMD width.'
  common_mistake: Assuming the Hailo compiler isn't optimized for pruned models, wasting
    time tweaking compiler flags instead of fixing the underlying architectural SIMD
    width mismatch.
  napkin_math: '**Assumptions & Constraints:**

    - Layer pruned from 64 to 38 channels.

    - Hailo SIMD width = 16.


    **Calculations:**

    - Effective channels allocated per layer: 48 (rounded up to nearest multiple of
    16).

    - Effective FLOP reduction on Hailo: (64 - 48) / 64 = 25% (not 40%).

    - Hardware-aware pruning to 32 channels yields 50% true reduction.


    **Conclusion & Interpretation:**

    - **Result: 25% Effective Reduction (Compute-Bound)**. Latency improvement scales
    properly only when pruned channel counts are aligned to native SIMD widths.

    '
