title: 'Fluency: compare Hailo-8 vs Jetson Orin for MobileNet inference efficiency'
scenario: You are selecting an inference accelerator for a smart camera running MobileNetV3-Large (0.22 GOPS). The Hailo-8 runs this model while drawing 2.5W of power.
question: What is the true energy efficiency of this inference, and why is it a mistake to report it as 0.088 TOPS/W?
details:
  realistic_solution: The true energy efficiency must be derived by matching the magnitude of the model's operations to the power draw. While hardware vendors advertise peak theoretical capacity in TOPS (Tera-Operations, 10^12), specific model architectures operate in GOPS (Giga-Operations, 10^9). Conflating the two implies the model is performing 1,000 times more work per watt than it actually is, completely destroying downstream thermal and battery lifecycle budgeting.
  common_mistake: |
    **The Pitfall:** Blindly swapping unit prefixes (Giga vs Tera) without applying the 1000x mathematical conversion factor.
    **The Rationale:** Candidates see "0.088" in their calculator and reflexively append the vendor marketing acronym (TOPS) instead of evaluating the base magnitudes.
    **The Consequence:** System architects dramatically underestimate thermal dissipation and battery requirements, leading to catastrophic overheating or early field failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Requirement: 0.22 GOPS (0.22 * 10^9 operations).
    - Power Draw: 2.5 Watts.

    **Calculations:**
    - Base efficiency in GOPS/W = 0.22 GOPS / 2.5W = 0.088 GOPS/W.
    - Correct conversion to TOPS/W = 0.088 / 1000 = 0.000088 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: 0.088 GOPS/W (Compute-Bound)**. Reporting 0.088 TOPS/W overstates the efficiency by an exact factor of 1,000.
