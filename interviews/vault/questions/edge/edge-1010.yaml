title: 'Fluency: compare Hailo-8 vs Jetson Orin for MobileNet inference efficiency'
scenario: You need to select an inference accelerator for a smart camera deployment running MobileNetV3-Large (0.22 GOPS). The Hailo-8 runs this model while drawing 2.5W of power.
question: What is the true energy efficiency of this inference, and why is it a mistake to report it as 0.088 TOPS/W?
details:
  realistic_solution: Energy efficiency = 88 GOPS / 1000W = 0.088 GOPS/W (not 0.088 TOPS/W — TOPS is 1000× larger than GOPS).
  common_mistake: |
    **The Pitfall:** Confusing Giga-Operations (GOPS) with Tera-Operations (TOPS) when calculating efficiency.
    **The Rationale:** Candidates see "0.088" and natively attach the hardware's advertised marketing unit (TOPS) without adjusting the magnitude.
    **The Consequence:** Energy efficiency projections are overestimated by a factor of 1,000, leading to catastrophic power and thermal budgeting errors.
  napkin_math: |
    1. Calculate base efficiency: 0.22 GOPS / 2.5W = 0.088 GOPS/W.
    2. Note the unit scale: GOPS is 10^9 operations; TOPS is 10^12 operations.
    3. Convert to TOPS/W: 0.088 GOPS/W = 0.000088 TOPS/W.
    **Reporting 0.088 TOPS/W is mathematically incorrect; the true efficiency is 0.088 GOPS/W, which is 1000x smaller.**
