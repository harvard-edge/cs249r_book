title: The Physical Adversarial Gauntlet
scenario: 'Your company''s autonomous delivery robots operate in urban environments. A new threat emerges:
  malicious actors are placing subtly modified physical objects (e.g., stickers on stop signs, projected
  patterns on roads, specific sound frequencies) to trick the robots'' perception systems, causing unsafe
  behaviors. How do you design the robot''s perception and decision-making system to be robust against
  such ''physical world'' adversarial attacks, and what detection and mitigation strategies would you
  implement?'
question: "How do you design the robot's perception and decision-making system to be robust against such 'physical world' adversarial attacks, and what detection and mitigation strategies would you implement?"
details:
  realistic_solution: "A multi-layered defense strategy is required:\n  1.  **Multi-Modal Redundancy &\
    \ Fusion:** Don't rely solely on one sensor type. An attack targeting a camera (e.g., sticker on a\
    \ sign) might not affect Lidar or Radar. Fuse information from diverse sensors (e.g., Lidar for geometry,\
    \ camera for semantics, radar for velocity) at early and late stages. A stop sign attack might fool\
    \ vision, but Lidar would still see the octagonal shape, and contextual mapping would expect a stop\
    \ sign at that location.\n  2.  **Anomaly Detection on Sensor Streams:** Implement real-time anomaly\
    \ detection models (e.g., autoencoders, statistical models) on individual sensor data streams and\
    \ their fused outputs. Look for patterns inconsistent with natural phenomena (e.g., sudden, high-frequency\
    \ noise bursts, unexpected texture changes, geometric inconsistencies).\n  3.  **Contextual Reasoning\
    \ & Semantic Prior:** Integrate high-level contextual information (e.g., HD maps, traffic rules, typical\
    \ object appearances). If a stop sign appears to be a yield sign visually, but the map indicates a\
    \ stop sign and there's cross-traffic, the system should flag an inconsistency.\n  4.  **Adversarial\
    \ Training & Domain Randomization:** While not a complete solution, training perception models with\
    \ physically plausible adversarial examples (e.g., rendered objects with adversarial textures, simulated\
    \ laser attacks) can improve robustness. Domain randomization helps generalize to unseen variations.\n\
    \  5.  **Multi-Model Ensembles/Diversity:** Use an ensemble of diverse perception models (e.g., different\
    \ architectures, training data, or even different ML paradigms) and leverage their disagreement as\
    \ an indicator of potential adversarial input.\n  6.  **Physical Security & Tamper Detection:** For\
    \ the robot itself, ensure sensors are physically protected and tamper-evident. For environmental\
    \ attacks, consider reporting mechanisms for suspicious physical alterations.\n  7.  **Behavioral\
    \ Monitoring:** Monitor the robot's planned actions and compare them to expected safe behavior. If\
    \ a perception system output leads to an unsafe or highly improbable action, trigger a safety fallback\
    \ (e.g., slow down, stop, request human review)."
  common_mistake: '"Just train with more adversarial examples." While data augmentation helps, physical
    attacks often exploit subtle sensor-level vulnerabilities or cross-modal discrepancies that simple
    data augmentation won''t cover. It also doesn''t address detection.'
  napkin_math: If a camera-based sign detector has 99.5% accuracy, but a physical adversarial attack can
    reduce its confidence to 50% on a critical sign. By fusing with Lidar shape detection (98% accuracy)
    and HD map context (99.9% probability of a stop sign at that location), the combined confidence can
    remain high. If the Lidar confirms the octagonal shape and the map confirms a stop sign, even if the
    camera is fooled, the system can still infer a stop sign with high confidence. A typical perception
    system might process 30 frames/sec. An anomaly detection module needs to run at this rate, adding
    ~5-10ms latency.
  options:
  - Edge-side health checks should focus on hardware metrics (CPU, memory); model-level metrics like confidence
    scores are too noisy to be useful.
  - Just train with more adversarial examples.. While data augmentation helps, physical attacks often
    exploit subtle sensor-level vulnerabilities or cross-modal discrepancies that simple data augmentation
    won't cover.
  - The bottleneck is PCIe transfer between CPU and GPU; using zero-copy memory will eliminate this overhead
    entirely.
  - "A multi-layered defense strategy is required:\n  1. Multi-Modal Redundancy & Fusion: Don't rely solely\
    \ on one sensor type. An attack targeting a camera (e.g., sticker on a sign) might not affect Lidar\
    \ or Radar."
