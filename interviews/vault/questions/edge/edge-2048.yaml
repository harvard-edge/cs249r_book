title: Hailo-8 Hardware Security Features for Edge Adversarial Robustness
scenario: You are evaluating the Hailo-8 (26 TOPS INT8, 2.5W) for an AI-powered surveillance system deployed at a remote, potentially insecure edge location. Adversarial attacks and model extraction via side-channels are critical concerns.
question: What built-in hardware security features should a Hailo-8-class edge AI accelerator use to resist physical attacks and model extraction?
details:
  realistic_solution: Realistic solutions for edge AI accelerators include hardware roots of trust, secure boot, trusted execution environments (TEEs), secure key storage (e.g., fuses or PUFs), and cryptographic acceleration engines. These features ensure the authenticity of the loaded model and firmware, protect sensitive data (like model weights and intermediate activations) during inference, and make physical extraction significantly more difficult.
  common_mistake: |
    **The Pitfall:** Relying purely on software updates or network firewalls for security.
    **The Rationale:** Candidates assume network-based defenses are sufficient, forgetting that physical access allows attackers to directly dump RAM or probe side-channels.
    **The Consequence:** The proprietary model weights are trivially extracted by an attacker with physical access to the device.
  napkin_math: |
    - A successful extraction of a proprietary 26 TOPS INT8 model compromises millions in R&D.
    - Hardware security (TEE, Secure Boot, Secure Fuses) adds a minimal 5-10% overhead to the chip area and BOM cost.
    **Conclusion: Hardware roots of trust are highly cost-effective given the severe financial risk of model extraction at the edge.**
