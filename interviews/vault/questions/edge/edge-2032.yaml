title: 'Diagnosing Performance Degradation on Jetson Orin: Edge Drift Analysis'
scenario: You deployed a critical object detection model on an NVIDIA Jetson Orin powering an autonomous vehicle. Field reports indicate a massive increase in missed detections under new environmental conditions. The hardware performs within spec, but accuracy has dropped significantly.
question: How would you determine whether the accuracy drop is due to data or concept drift and detect it under edge constraints?
details:
  realistic_solution: Implement continuous on-device data validation by computing the Population Stability Index (PSI) on quantized INT8 feature distributions. For concept drift, monitor prediction entropy or confidence calibration scores. Leveraging the edge device's compute to run lightweight statistical aggregation minimizes network overhead while enabling targeted payload capture for cloud-side retraining.
  common_mistake: |
    **The Pitfall:** Immediately suspecting model bugs or hardware failures without systematically analyzing the input data distribution.
    **The Rationale:** Software engineers often look for code logic errors or hardware faults before considering statistical data drift.
    **The Consequence:** Wasted resources investigating phantom bugs and ineffective retraining attempts that fail to address the underlying distribution shifts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - On-device drift detection using 10 features, 100 bins each.
       - Orin ARM cores available for metric aggregation.
    2. **Calculations:**
       - PSI Formula: Σ [(P_i - P0_i) * ln(P_i / P0_i)].
       - Memory Overhead: 10 features * 100 bins * 4 bytes/bin = 4 KB.
       - Compute Latency: <1 ms on the ARM CPU core.
    3. **Conclusion & Interpretation:**
       - **Result: Negligible Overhead.** The 4 KB RAM and sub-millisecond execution allow drift monitoring to run seamlessly without bottlenecking inference.
