title: 'Diagnosing Performance Degradation on Jetson Orin: Edge Drift Analysis'
scenario: You've deployed a critical object detection model on an NVIDIA Jetson Orin
  (32 GB LPDDR5, 275 TOPS INT8, 60W) powering an autonomous ground vehicle. The model,
  optimized for INT8 inference, has been performing reliably for months. Recently,
  field reports indicate a noticeable increase in missed detections and false positives,
  particularly under new environmental conditions (e.g., varying lighting, new obstacles).
  Despite the hardware performing within specified parameters (e.g., no thermal throttling
  impacting its 275 TOPS INT8 capacity), the model's accuracy has dropped significantly.
  Your task is to analyze why this system is behaving this way, specifically focusing
  on data and concept drift, and propose methods for detection given the edge constraints.
question: How would you determine whether the Jetson Orin accuracy drop is due to
  data or concept drift and detect it under edge constraints?
details:
  realistic_solution: 'A realistic solution involves implementing lightweight, continuous
    monitoring for data drift directly on the Jetson Orin, leveraging its available
    compute. This could include: 1. Periodically computing statistical metrics (e.g.,
    mean, variance, histograms) of key input features and comparing them to the training
    data distribution (e.g., using a Chi-squared test for categorical features or
    PSI for numerical features). 2. For concept drift, a simple approach could be
    monitoring model confidence scores or prediction entropy over time. 3. Given the
    Orin''s 32 GB LPDDR5 and 275 TOPS INT8, some drift detection logic can run on-device,
    triggering alerts and collecting sample data (if network allows) for further offline
    analysis or targeted re-training. This requires careful selection of drift detection
    metrics that are computationally inexpensive and memory-efficient.'
  common_mistake: A common mistake is to immediately suspect model bugs or hardware
    failures without first systematically analyzing the input data distribution. Overlooking
    the possibility of data drift or concept drift, or attempting to retrain the model
    without understanding the drift's nature, can lead to wasted resources and ineffective
    solutions on a resource-constrained edge device.
  napkin_math: 'If we consider a critical input feature with 100 bins for histogram
    comparison, calculating a Population Stability Index (PSI) for this feature involves
    comparing current distribution counts (P_i) with baseline distribution counts
    (P0_i) for each bin: PSI = Σ [(P_i - P0_i) * ln(P_i / P0_i)]. For a small number
    of key features (e.g., 5-10), this calculation is very light, likely <1ms per
    feature on a modern CPU core of the Jetson Orin, well within typical inference
    loop budgets. The memory footprint for storing baseline histograms would be negligible
    (e.g., 10 features * 100 bins * 4 bytes/bin = ~4KB), which is trivial for 32 GB
    LPDDR5.'
