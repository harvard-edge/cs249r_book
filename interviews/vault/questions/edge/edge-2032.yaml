title: 'Diagnosing Performance Degradation on Jetson Orin: Edge Drift Analysis'
scenario: You've deployed a critical object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) powering an autonomous ground vehicle. Recently, field reports indicate a noticeable increase in missed detections and false positives, particularly under new environmental conditions (e.g., varying lighting, new obstacles). Despite the hardware performing within specified parameters, the model's accuracy has dropped significantly.
question: How would you determine whether the Jetson Orin accuracy drop is due to data or concept drift and detect it under edge constraints?
details:
  realistic_solution: 'A realistic solution involves implementing lightweight, continuous monitoring for data drift directly on the Jetson Orin, leveraging its available compute. This could include: 1. Periodically computing statistical metrics (e.g., mean, variance, histograms) of key input features and comparing them to the training data distribution. 2. For concept drift, a simple approach could be monitoring model confidence scores or prediction entropy over time. 3. Given the Orin''s 32 GB LPDDR5 and 275 TOPS INT8, some drift detection logic can run on-device, triggering alerts and collecting sample data (if network allows) for further offline analysis or targeted re-training.'
  common_mistake: |
    **The Pitfall:** Immediately suspecting model bugs or hardware failures without systematically analyzing the input data distribution.
    **The Rationale:** Software engineers often look for code logic errors or hardware faults before considering data drift.
    **The Consequence:** Wasted resources investigating phantom bugs, or attempting to retrain the model without understanding the nature of the drift, leading to ineffective solutions.
  napkin_math: |
    *   **PSI Calculation:** PSI = Σ [(P_i - P0_i) * ln(P_i / P0_i)].
    *   **Compute overhead:** For 5-10 features with 100 bins, this calculation takes <1ms on an Orin ARM core.
    *   **Memory overhead:** 10 features * 100 bins * 4 bytes/bin = ~4KB.
    *   **Result:** The overhead is **~4KB RAM and <1ms latency**, completely negligible on the Jetson Orin's 32GB RAM and ARM CPU cores.
