title: Optimizing Real-time Object Detection Latency on Google Coral Edge TPU
scenario: You are tasked with deploying a quantized object detection model on a Google Coral Edge TPU. Your target end-to-end latency is 50ms. Initial isolated benchmarks show the model executing on the TPU in 30ms. However, integrated into the full system, the observed end-to-end latency consistently exceeds 80ms.
question: How would you profile the Coral Edge TPU pipeline and quantify why 30 ms TPU inference becomes over 80 ms end-to-end latency?
details:
  realistic_solution: 'Implement fine-grained instrumentation around host CPU preprocessing, data transfer (tf.lite.Interpreter.set_tensor), and NMS post-processing using tools like `perf` or `nsys profiling`. Analyze USB 3.0 bandwidth vs actual transfer times to isolate host-side Python or OS bottlenecks.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the TPU's peak TOPS.
    **The Rationale:** Candidates overlook critical system-level bottlenecks like USB bandwidth, host CPU color space conversion, and Python GIL overhead.
    **The Consequence:** Failing to diagnose why real-world latency severely misses the target despite fast on-chip execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU inference time: 30 ms
    - System observed latency: 80 ms
    - Input image: 640x480x3 INT8 (0.92 MB)

    **Calculations:**
    - Unaccounted host overhead: 80 ms - 30 ms = 50 ms
    - Practical USB 3.0 bandwidth: ~100 MB/s
    - Optimal transfer time: 0.92 MB / 100 MB/s = 9.2 ms

    **Conclusion & Interpretation:**
    - **Result: Host CPU / I-O Bottleneck (I/O-Bound)**. The 50 ms overhead drastically exceeds the 9.2 ms optimal transfer time, indicating severe host preprocessing or Python inefficiencies.
