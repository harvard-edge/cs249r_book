title: 'Edge Systolic Array Recall: Systolic Array Operation Principle'
scenario: A comparison is being made between a systolic array accelerator (Hailo-8, 26 TOPS INT8, 2.5W) and a conventional von Neumann processor (ARM Cortex-A78, 1.6 TOPS INT8 at 5W) for matrix multiplication tasks at the edge.
question: What is the key systolic-array principle, and why does the Hailo-8 deliver significantly better TOPS/W than the ARM Cortex-A78 for INT8 matmul?
details:
  realistic_solution: 'Systolic array principle: processing elements (PEs) arranged in a grid. Data flows rhythmically (systolically) from PE to PE. Each weight loaded once into a PE, reused for all input vectors passing through. No external memory access during computation. Energy: dominated by memory access in conventional CPU. Systolic minimizes DRAM reads.'
  common_mistake: |
    **The Pitfall:** Describing a systolic array as simply "many cores".
    **The Rationale:** Candidates often confuse general parallel processing with systolic data flow.
    **The Consequence:** They fail to explain the data reuse principle (each PE receives data from neighbors), which eliminates the redundant memory fetches that dominate energy in von Neumann architectures.
  napkin_math: |
    * **Hailo-8 Efficiency:** 26 TOPS / 2.5W = 10.4 TOPS/W.
    * **ARM Cortex-A78 Efficiency:** 1.6 TOPS / 5W = 0.32 TOPS/W.
    * **Efficiency Ratio:** 10.4 / 0.32 = **32.5x better TOPS/W** for the systolic array.
    * **Energy per MAC:** Systolic array uses ~0.5pJ per MAC, while CPU with DRAM uses ~200pJ, eliminating 99.75% of weight memory energy.
