title: Diagnosing FP16 Overflow on Jetson Orin
scenario: You have deployed a custom object detection model on an NVIDIA Jetson Orin edge device. To maximize throughput and stay within the 60W TDP limit, you compiled the model using TensorRT with FP16 precision to run on the Ampere GPU. While the model achieved 85% mAP during FP32 training, the FP16 deployment suffers a massive drop to 55% mAP, with bounding boxes frequently collapsing.
question: "Why does the FP16 TensorRT deployment drop from 85% to 55% mAP with collapsing bounding boxes?"
details:
  realistic_solution: The root cause is likely numerical overflow in the bounding box regression heads or intermediate normalization layers, as FP16 has a limited dynamic range (exponent range of 5 bits). The solution is to use TensorRT's layer-by-layer precision fallback capabilities, explicitly setting the regression heads and sensitive exponential operations to run in FP32, while keeping the heavy convolutional backbone in FP16.
  common_mistake: |
    **The Pitfall:** Assuming the accuracy drop is a general quantization issue and jumping straight to INT8 calibration or QAT.
    **The Rationale:** Candidates overlook specific numerical instabilities associated with FP16 representation of exponential coordinate regressions.
    **The Consequence:** Time is wasted on complex retraining loops while the actual mathematical overflow bug in the regression head remains unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Precision: FP16 (max value 65,504).
       - Coordinate transform: Bounding box outputs use exp(x).
    2. **Calculations:**
       - If network predicts x = 11.09, exp(11.09) = 65,512.
       - 65,512 > 65,504 (FP16 limit).
    3. **Conclusion & Interpretation:**
       - **Result: FP16 Overflow to Infinity** (Precision-Bound, causing box collapse).
