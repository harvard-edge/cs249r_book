title: Diagnosing FP16 Overflow on Jetson Orin
scenario: You have deployed a custom object detection model on an NVIDIA Jetson Orin edge device. To maximize throughput and stay within the 60W TDP limit, you compiled the model using TensorRT with FP16 precision to run on the Ampere GPU. While the model achieved 85% mAP during FP32 training, the FP16 deployment suffers a massive drop to 55% mAP, with bounding boxes frequently collapsing. The data pipeline and preprocessing on the 32 GB LPDDR5 memory are identical to the training setup.
question: Why does the FP16 TensorRT deployment drop from 85% to 55% mAP with collapsing bounding boxes?
details:
  realistic_solution: The root cause is likely numerical overflow in the bounding box regression heads or intermediate normalization layers, as FP16 has a limited dynamic range (exponent range of 5 bits). The solution is to use TensorRT's layer-by-layer precision fallback capabilities, explicitly setting the regression heads and sensitive exponential operations to run in FP32, while keeping the heavy convolutional backbone in FP16.
  common_mistake: |
    **The Pitfall:** Assuming the accuracy drop is a general quantization issue and jumping straight to INT8 calibration or QAT.
    **The Rationale:** Candidates overlook specific numerical instabilities associated with FP16 representation of coordinate regressions.
    **The Consequence:** Time is wasted on retraining while the actual overflow bug in the bounding box regression head remains unresolved.
  napkin_math: |
    * FP16 maximum representable value is 65,504.
    * Bounding box regression often outputs exp(x) to predict dimensions.
    * If an intermediate coordinate prediction x exceeds 11.09, exp(11.09) = 65,512.
    * **This overflows FP16, resulting in Inf and collapsed bounding boxes.**
    * Pinning final layers to FP32 costs <2% throughput but entirely resolves the overflow.
