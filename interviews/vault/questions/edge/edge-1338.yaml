title: Hailo-8 Dataflow Batching Latency
scenario: We are deploying a multi-camera pedestrian tracking system on a Hailo-8 dataflow accelerator at a smart intersection. The Hailo-8 provides 26 TOPS (INT8) at 2.5W, but lacks local DRAM, meaning all I/O streams directly from host memory over PCIe. The model requires 13 GOPS per inference.
question: If 4 synchronized cameras are statically batched on the Hailo-8, what is the theoretical minimum compute latency for the batch assuming 100% MAC utilization?
details:
  realistic_solution: Because the Hailo-8 relies on a dataflow architecture, neural network weights are pre-compiled and distributed across on-chip memory. Activations stream continuously from the host. Therefore, static batching does not save weight-loading memory bandwidth. The system should ideally process frames with a batch size of 1 as they arrive to minimize latency. If a batch of 4 is forced, the latency is simply the total operations divided by the total compute throughput.
  common_mistake: |
    **The Pitfall:** Assuming batching universally increases throughput.
    **The Rationale:** Candidates often assume batching will amortize memory bandwidth costs for weight loading, as it does on traditional GPUs, forgetting that spatial dataflow architectures pin weights to the compute fabric.
    **The Consequence:** Unnecessarily increasing latency (forcing a wait for batch accumulation) without achieving any of the expected throughput gains.
  napkin_math: |
    1. **Hailo-8 compute capacity:** 26 TOPS = 26,000 GOPS
    2. **Total compute required for batch:** 4 frames * 13 GOPS/frame = 52 GOPS
    3. **Theoretical minimum compute latency:** 52 GOPS / 26,000 GOPS/s
    4. **Calculation:** 52 / 26,000 = 0.002 seconds
    **Result: 2.0 milliseconds.**
