title: Edge Data Efficiency for Real-time Object Detection on Hailo-8
scenario: 'Your team is deploying a real-time object detection model on an autonomous drone platform equipped
  with the Hailo-8 AI processor (26 TOPS INT8, 2.5W dataflow accelerator). The drone captures high-resolution
  video streams (e.g., 30 FPS, 1080p RGB) in diverse environments. You''ve identified a ''data wall''
  problem: continuously feeding raw, voluminous sensor data to the model on the Hailo-8 for inference
  and potential on-device adaptation consumes excessive power and memory bandwidth, impacting battery
  life and real-time processing guarantees. Design a strategy leveraging data efficiency and selection
  techniques to maintain model performance and adapt to environmental shifts while staying within the
  Hailo-8''s constraints.'
details:
  realistic_solution: Implement a hybrid, adaptive data selection pipeline. For inference, employ dynamic
    region-of-interest (ROI) or temporal sampling combined with a lightweight uncertainty estimation module
    (e.g., Monte Carlo Dropout or ensemble averaging) running on the Hailo-8. This identifies and prioritizes
    frames/patches with high uncertainty or novel content, reducing the effective data rate. For on-device
    adaptation/fine-tuning, utilize an active learning-inspired coreset selection strategy. Periodically
    evaluate incoming data against a small, representative coreset stored on the Hailo-8's limited memory,
    adding new data points that significantly improve model coverage or reduce loss, while offloading
    less critical data for offline analysis. This approach directly manages the Information-Compute Ratio
    (ICR) by selectively processing the most informative data.
  common_mistake: A common mistake is applying generic, static data pruning (e.g., random sampling or
    threshold-based filtering) without considering the dynamic distribution shifts at the edge or the
    model's uncertainty. This often leads to discarding critical 'hard' examples, degrading performance
    on crucial edge cases, or introducing model collapse risks over time due to insufficient diversity
    in the retained data for adaptation.
  napkin_math: Consider a 1080p (1920x1080) RGB video stream at 30 FPS. Each frame is approximately 6MB
    (1920 * 1080 * 3 bytes). The raw data rate is 180 MB/s. If the Hailo-8's typical effective memory
    bandwidth for data transfer (not just compute) is bottlenecked at, say, 50 MB/s due to other system
    activities and interfaces, what minimum percentage of data reduction is required just to keep up with
    the sensor input stream, assuming no buffering? (1 - 50/180) * 100 = ~72.2% reduction. How does this
    impact the available compute if data movement itself consumes power?
