title: Edge TPU Model Rollout Strategy with A/B Testing
scenario: You are responsible for deploying and updating an INT8 model across a fleet of 10,000 smart cameras equipped with Coral Edge TPUs. A new model, v2, needs a canary rollout to 1% of the fleet for 48 hours. The cameras are offline often.
question: How would you implement a 48-hour 1% canary rollout of v2 across 10,000 intermittent Coral Edge TPU cameras with A/B comparison and rollback?
details:
  realistic_solution: 'A realistic solution would involve a hierarchical approach:

    1.  **Device-Side Agent**: Each Coral Edge TPU device runs a lightweight agent capable of downloading new model versions, switching between active models (v1 and v2), collecting predefined telemetry (e.g., inference latency, confidence scores, energy consumption using on-device sensors if available, and specific business metrics) locally, and caching data.

    2.  **Phased Rollout Orchestration**: A central fleet management system pushes new model configurations (e.g., ''deploy v2 to 1% of devices in region X for canary'') in batches. Devices check in periodically or on event triggers.

    3.  **A/B Telemetry**: The agent collects comparison metrics from both v1 (control) and v2 (canary) during the test period, perhaps running both models on the same input data or routing a percentage of traffic to v2 while v1 handles the rest. This telemetry is aggregated locally and sent in compressed batches when connectivity allows.

    4.  **Rollback Mechanism**: The agent maintains a safe fallback to `v1`. If critical health metrics or A/B comparison metrics from `v2` fall below thresholds, the central system triggers an automatic rollback command to the affected devices, or the device agent itself can initiate a local rollback if predefined local criteria are met (e.g., `v2` crashing repeatedly).

    5.  **Traffic Splitting**: On-device logic to route a percentage of inference requests to `v1` and `v2` (if both are loaded) or based on device IDs for sequential A/B testing.

    6.  **Energy Efficiency**: Ensure the agent and A/B testing framework are designed to be extremely power-efficient, potentially suspending telemetry collection or model execution during low-power states or when battery is critical.'
  common_mistake: |
    **The Pitfall:** Assuming continuous cloud connectivity for orchestration and concurrent execution on a single TPU.
    **The Rationale:** Candidates apply cloud A/B testing paradigms without accounting for intermittent edge networking and hardware resource limits.
    **The Consequence:** Rollout orchestration fails during network drops, and concurrent model execution halves effective TOPS, violating real-time constraints.
  napkin_math: |
    - Update Size: 100 devices (1%) * 5MB = 500MB total rollout transfer.
    - Telemetry Bandwidth: 100 devices * 1KB/hour * 48 hours = 4.8MB.
    - Latency Impact (Sequential A/B): Time-slicing execution maintains the full 4 TOPS per model rather than splitting resources concurrently.
    - Statistical Significance: Requires a calculated minimum number of events per device over 48 hours to detect a 0.5% shift in accuracy.
    **Telemetry transfer is minimal (4.8MB), but Sequential A/B is required to avoid latency penalties.**
