title: The LiDAR Point Cloud Memory Explosion
scenario: 'Your autonomous vehicle uses a 128-beam LiDAR spinning at 10 Hz. Each rotation
  produces ~240,000 points. Each point is stored as (x, y, z, intensity, ring_id,
  timestamp) = 24 bytes. Your perception pipeline must: (1) accumulate 5 sweeps for
  temporal context, (2) voxelize the point cloud, (3) run PointPillars inference,
  and (4) output 3D bounding boxes — all within 100ms on a Jetson AGX Orin (64 GB
  LPDDR5, 204.8 GB/s). During testing, the pipeline runs at 8 Hz instead of 10 Hz.'
question: Where is the bottleneck?
details:
  realistic_solution: 'The bottleneck is point cloud preprocessing, not model inference.
    Voxelizing 1.2M points (5 sweeps x 240K) involves random memory scatter operations
    — each point maps to a random voxel location. CPU-based voxelization achieves
    only ~5 GB/s effective bandwidth (random access pattern) vs 204.8 GB/s peak, taking
    ~33ms. PointPillars inference itself is only 15ms. Total with CPU voxelization:
    33ms + 15ms = 48ms (20 Hz). The fix: move voxelization to the GPU using CUDA kernels
    (hash-based scatter), which achieves ~20 GB/s effective random access. GPU voxelization
    takes 8ms, dropping total pipeline to 23ms (43 Hz capable, 4.3x headroom).'
  common_mistake: '"The model inference is too slow." PointPillars on an Orin GPU
    takes ~15ms. The 100ms budget has plenty of room for a 15ms model. The bottleneck
    is in the *data preparation*, not the model.'
  napkin_math: '**Assumptions & Constraints:**

    - Voxel grid: 432 x 496 x 32 points x 24 bytes = 164.5 MB.

    - Peak bandwidth is 204.8 GB/s.


    **Calculations:**

    - CPU voxelization (random scatter): 164.5 MB at ~5 GB/s = 33ms.

    - GPU voxelization: 164.5 MB at ~20 GB/s = 8ms.

    - Total pipeline (CPU): 33ms + 15ms (inference) = 48ms (20 Hz).

    - Total pipeline (GPU): 8ms + 15ms (inference) = 23ms.


    **Conclusion & Interpretation:**

    - **Result: 23ms (Compute-Bound)**. GPU voxelization provides a 4.3x headroom.

    '
  options:
  - The solution is to reduce model complexity until it fits within the hardware constraints,
    accepting the accuracy trade-off as unavoidable.
  - Profiling overhead is masking the true performance; disabling all instrumentation
    will reveal that the system is already meeting targets.
  - The bottleneck is point cloud preprocessing, not model inference. Voxelizing 1.2M
    points (5 sweeps x 240K) involves random memory scatter operations — each point
    maps to a random voxel location. CPU-based voxelization achieves only ~5 GB/s
    effective bandwidth (random access pattern) vs 204.8 GB/s peak, taking ~33ms.
  - The model inference is too slow.. PointPillars on an Orin GPU takes ~15ms.
  correct_index: 2
