title: Calculate Edge TPU Ingestion Throughput for Video Stream
scenario: You are deploying a real-time object detection pipeline on a Google Coral Edge TPU connected
  via USB. The pipeline ingests a 1080p video stream at 30 FPS. The Edge TPU operates at 4 TOPS (INT8)
  and has a 2W power envelope. Your preprocessing step resizes frames to 300x300, and the quantized MobileNet
  SSD model requires 1.2 GOPS per inference. Calculate the maximum theoretical frame rate the Edge TPU
  can process and determine if the USB 3.0 interface (5 Gbps theoretical, 3.2 Gbps practical) will be
  a bottleneck for the raw 1080p RGB input stream.
question: "What maximum theoretical FPS can the Edge TPU process, and will USB 3.0 bottleneck the raw 1080p RGB 30 FPS stream?"
details:
  realistic_solution: First, calculate the maximum frame rate by dividing the Edge TPU's compute capacity
    by the model's operations per frame. Second, calculate the bandwidth required for the raw 1080p 30
    FPS RGB stream to see if it exceeds the practical USB 3.0 bandwidth. If the compute supports a higher
    FPS than the camera provides, the system is not compute-bound. The USB bandwidth is sufficient for
    the 30 FPS stream.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with GOPS (Giga Operations
    Per Second) or fail to convert units correctly. They also might calculate the bandwidth of the resized
    frames instead of the raw 1080p RGB stream being ingested over the USB interface.
  napkin_math: 'Compute capacity = 4 TOPS = 4,000 GOPS. Model cost = 1.2 GOPS/frame. Max theoretical FPS
    = 4,000 GOPS / 1.2 GOPS/frame = 3333 FPS. Raw 1080p frame size = 1920 * 1080 * 3 bytes (RGB) = 6.22
    MB. Required bandwidth at 30 FPS = 6.22 MB * 30 = 186.6 MB/s. Convert to bits: 186.6 MB/s * 8 = 1.49
    Gbps. Practical USB 3.0 bandwidth is 3.2 Gbps. 1.49 Gbps < 3.2 Gbps, so USB is not a bottleneck.'
