title: Real-Time Anomaly Detection on Edge AI Device
scenario: A real-time anomaly detection system for critical machinery is deployed at the edge. It receives high-frequency data from 1,000 sensors at 100 Hz. The edge unit features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope. The system must process streams, run ML inference, alert within a 50ms end-to-end latency, and handle intermittent cloud connectivity.
question: How would you architect a 50ms edge anomaly detection pipeline for hundreds of 100 Hz sensors with intermittent cloud connectivity?
details:
  realistic_solution: "A robust solution involves: 1. Lightweight message queue for ingestion. 2. Stream processing framework for feature extraction. 3. INT8 quantized ML model to leverage the 400 TOPS. 4. Local persistent buffer (e.g., SQLite, RocksDB) to queue alerts during network outages. 5. Explicitly optimizing data transfer to maximize LPDDR4x bandwidth."
  common_mistake: |
    **The Pitfall:** Focusing solely on the ML model architecture and ignoring the end-to-end data pipeline.
    **The Rationale:** Candidates often over-index on model optimization while neglecting data ingestion, real-time feature extraction, memory bandwidth, and power constraints.
    **The Consequence:** The resulting system fails to meet the strict 50ms latency budget due to IO bottlenecks or drops critical alerts during network outages.
  napkin_math: |
    * **Ingestion Rate:** 1000 sensors * 100 samples/sec * 8 bytes/sample = 800 KB/s.
    * **Compute Load:** At 10 GOPs per inference, 100,000 inferences/sec = 1,000 TOPS (exceeds 400 TOPS capacity). **Batching or sliding windows are required**.
    * **Latency Budget (50ms):** ~15ms ingestion/features, ~20ms inference, ~15ms alert transmission.
    * **Memory:** 32 GB LPDDR4x is sufficient, but bandwidth must be optimized to sustain throughput within the 75W envelope.
