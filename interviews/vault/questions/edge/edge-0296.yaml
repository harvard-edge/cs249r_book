title: The Orin's Perception Dilemma
scenario: You're an engineer on an autonomous driving team, deploying a new perception model to a Jetson
  AGX Orin module, which has a strict thermal design power (TDP) of 30W. Your model's primary convolutional
  layer performs 20 Giga-Ops (GOPS) for every 13.1 MB of input data it processes. The AGX Orin provides
  275 TOPS (INT8) at its peak 60W power draw and has 204.8 GB/s of memory bandwidth. First, explain if
  this workload is compute-bound or memory-bound. Second, calculate the sustainable performance in TOPS
  you can expect given your 30W power budget.
details:
  realistic_solution: 'The solution requires two steps: calculating the model''s Arithmetic Intensity
    (AI) and comparing it to the hardware''s Ridge Point to determine the bottleneck, and then calculating
    the hardware''s sustainable TOPS based on its power efficiency.


    1. Ridge Point: 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.

    2. Model AI: 20 GOps / 13.1 MB = 20e9 / 13.1e6 ≈ 1,527 Ops/Byte.

    3. Since 1,527 > 1,343, this workload is compute-bound — the accelerator''s compute units are the
    bottleneck, not memory bandwidth.

    4. Sustainable TOPS at 30W: The Orin delivers 275 TOPS at 60W, so efficiency = 275/60 = 4.58 TOPS/W.
    At 30W TDP: 4.58 x 30 = 137.5 TOPS.'
  common_mistake: 'Engineers often misinterpret the Arithmetic Intensity vs. Ridge Point inequality, thinking
    a higher AI means the system is waiting on memory. The reverse is true: a high AI means there are
    many operations per byte, so the compute units are the bottleneck. Another common mistake is calculating
    TOPS/W efficiency using the target TDP instead of the peak power associated with the peak TOPS number,
    which is a property of the hardware.'
  napkin_math: '1. Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.

    2. Model AI: 20 GOps / 13.1 MB = 20e9 / 13.1e6 ≈ 1,527 Ops/Byte.

    3. Bottleneck: 1,527 > 1,343 → compute-bound.

    4. Power efficiency: 275 TOPS / 60W = 4.58 TOPS/W.

    5. Sustainable TOPS at 30W: 4.58 x 30 = ~137.5 TOPS.'
  options:
  - Memory-bound, ~138 TOPS
  - Compute-bound, 275 TOPS
  - Compute-bound, ~138 TOPS
  - Memory-bound, ~102 TOPS
