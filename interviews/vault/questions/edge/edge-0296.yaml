title: The Orin's Perception Dilemma
scenario: You're an engineer on an autonomous driving team, deploying a new perception model to a Jetson AGX Orin module, which has a strict thermal design power (TDP) of 30W. Your model's primary convolutional layer performs 20 Giga-Ops (GOPS) for every 13.1 MB of input data it processes. The AGX Orin provides 275 TOPS (INT8) at its peak 60W power draw and has 204.8 GB/s of memory bandwidth.
question: Is the 20 GOPS per 13.1 MB layer compute-bound or memory-bound, and what sustainable TOPS should you expect at 30W?
details:
  realistic_solution: This requires calculating the model's Arithmetic Intensity (AI) and comparing it to the hardware's Ridge Point. Since the AI (1527 Ops/Byte) > Ridge Point (1343 Ops/Byte), the workload is compute-bound. The sustainable TOPS at 30W is determined by halving the 60W peak output.
  common_mistake: |
    **The Pitfall:** Misinterpreting the Arithmetic Intensity vs. Ridge Point inequality.
    **The Rationale:** Engineers often think a higher AI means the system is waiting on memory. The reverse is true: a high AI means many operations per byte, so the compute units are the bottleneck.
    **The Consequence:** Wasting time trying to optimize memory transfer when the true bottleneck is pure math capacity.
  napkin_math: |
    1. **Hardware Ridge Point:** 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.
    2. **Model AI:** 20 GOps / 13.1 MB = 20e9 / 13.1e6 = ~1,527 Ops/Byte.
    3. **Bottleneck:** 1,527 > 1,343 → compute-bound.
    4. **Power Efficiency:** 275 TOPS / 60W = 4.58 TOPS/W.
    5. **Sustainable TOPS at 30W:** 4.58 x 30 = **~137.5 TOPS**.
  options:
  - Memory-bound, ~138 TOPS
  - Compute-bound, 275 TOPS
  - Compute-bound, ~138 TOPS
  - Memory-bound, ~102 TOPS
