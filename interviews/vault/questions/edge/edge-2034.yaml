title: Edge AI Drift Detection on Hailo-8
scenario: You are deploying a critical real-time object detection model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). The model detects defects in manufacturing quality on a production line. Due to expected environmental changes (e.g., lighting variations, subtle material changes over time), the input data distribution is expected to slowly shift.
question: How would you detect slow data drift on a Hailo-8 production-line detector while minimizing inference overhead and staying within the 2.5W power impact?
details:
  realistic_solution: "Implement a lightweight, online drift detection mechanism directly on the Hailo-8. This typically involves: \n1. **Feature Embedding Extraction:** Utilize the output of an intermediate layer (feature embeddings) from the object detection model, which is inherently lower-dimensional than the raw input images. \n2. **Reference Distribution:** Establish a baseline reference distribution of these feature embeddings from known good data during initial calibration or deployment. \n3. **Statistical Test:** Periodically (e.g., every 'N' inferences) compute a simple, low-overhead statistical distance metric. Examples suitable for edge include binned histogram comparisons (e.g., Earth Mover's Distance on histograms), L1 distance, or a quantized version of Population Stability Index (PSI) or Kullback-Leibler (KL) divergence applied to the feature embeddings. \n4. **Thresholding & Alerting:** Set an adaptive threshold for the chosen drift metric. If the current distribution significantly deviates from the reference, trigger a local alert (e.g., change an LED status, send a small, concise alert message via MQTT), indicating potential drift and the need for investigation or model update. \n5. **Resource Management:** Carefully select the frequency of checks ('N' inferences) and the complexity of the statistical method to ensure the drift detection process consumes minimal computational resources (e.g., less than 1% of the 26 TOPS) and stays well within the 2.5W power budget, preventing interference with the primary inference task."
  common_mistake: |
    **The Pitfall:** Transmitting all raw inference data to a centralized cloud for batch analysis or using computationally expensive tests on-device.
    **The Rationale:** Relying on standard cloud-centric MLOps practices without adapting to edge resource constraints.
    **The Consequence:** Excessive bandwidth usage, increased detection latency, violation of power constraints, or interference with the primary inference task.
  napkin_math: |
    * **Inference Rate**: 100 FPS (frames per second).
    * **Drift Check Frequency**: Every 500 inferences.
    * **Time Between Checks**: 500 frames / 100 FPS = **5 seconds**.
