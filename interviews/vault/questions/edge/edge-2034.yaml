title: Edge AI Drift Detection on Hailo-8
scenario: You are deploying a critical real-time object detection model on a dataflow accelerator (26 TOPS INT8, 2.5W). The model detects defects in manufacturing quality on a production line. Due to expected environmental changes (e.g., lighting variations, subtle material changes over time), the input data distribution is expected to slowly shift.
question: How would you detect slow data drift on a production-line detector while minimizing inference overhead and staying within the 2.5W power impact?
details:
  realistic_solution: 'Implement a lightweight, online drift detection mechanism directly on the accelerator. Extract the lower-dimensional feature embeddings from an intermediate layer of the running model. Establish a baseline reference distribution. Periodically (e.g., every 500 inferences) compute a simple, low-overhead statistical distance metric like L1 distance or quantized PSI on the embeddings. Set an adaptive threshold to trigger local lightweight alerts (e.g., MQTT) instead of continuous streaming.'
  common_mistake: |
    **The Pitfall:** Transmitting all raw inference data to a centralized cloud for batch analysis, or running expensive statistical tests per frame on-device.
    **The Rationale:** Relying strictly on standard cloud-centric MLOps practices without adapting to edge thermal and bandwidth constraints.
    **The Consequence:** Excessive cellular bandwidth usage, violation of the 2.5W power constraint, and interference with the hard real-time primary inference task.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference Rate: 100 FPS.
       - Drift Check Frequency: Every 500 inferences.
    2. **Calculations:**
       - Time Between Checks: 500 frames / 100 FPS = 5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Efficiency**. Using feature embeddings every 5 seconds reduces the drift monitoring compute footprint to a negligible fraction of the 2.5W power budget.
