title: Jetson AGX Orin Queueing Latency Spike
scenario: A Jetson AGX Orin is actively processing multiple incoming video streams.
  As the frame arrival rate nears the Orin's maximum throughput capacity, tail latency
  spikes dramatically.
question: Explain why average latency follows a hockey-stick curve as system utilization
  approaches 100%.
visual:
  kind: svg
  path: edge-2354.svg
  alt: A curve showing latency staying low until utilization hits about 80%, after
    which it spikes upward.
  caption: M/M/1 Queueing delay demonstrating the hockey stick effect.
details:
  realistic_solution: Based on Kingman's formula for M/M/1 queues, average wait time
    is proportional to ρ / (1 - ρ), where ρ is utilization. As utilization approaches
    1 (100%), the denominator approaches 0, causing the wait time to grow asymptotically.
    The lack of idle buffer time means any burstiness directly compounds into a backlog.
  common_mistake: Assuming latency scales linearly with load rather than exponentially
    near the system limits.
  napkin_math: At ρ=0.9, delay multiplier is 0.9/0.1 = 9x. At ρ=0.95, it is 0.95/0.05
    = 19x.
