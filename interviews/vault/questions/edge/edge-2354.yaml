title: Jetson AGX Orin Queueing Latency Spike
scenario: A Jetson AGX Orin runs a YOLOv5n object detector. The Orin's iGPU has a hard 2 GB activation memory budget, and the workload's per-frame service time has CV~0.3 due to scene-content-dependent NMS post-processing. As the frame arrival rate nears the Orin's maximum throughput, tail latency spikes.
question: Explain why latency on the Orin diverges from textbook M/M/1 predictions as utilization approaches 100%.
visual:
  kind: svg
  path: edge-2354.svg
  alt: A curve showing latency staying low until utilization hits about 80%, after which it spikes upward.
  caption: M/M/1 Queueing delay demonstrating the hockey stick effect.
details:
  realistic_solution: 'Based on Kingman''s formula for M/M/1 queues, average wait time is proportional to ρ / (1 - ρ), where ρ is utilization. As utilization approaches 1 (100%), the denominator approaches 0, causing wait time to grow asymptotically. However, the physical Orin hardware diverges from textbook theory because its rigid 2GB activation ceiling forces hard frame evictions at 80%+ load, and the CV~0.3 post-processing variance inflates the tail latency severely.'
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with load.
    **The Rationale:** Engineers mistakenly project average-case performance into high-load domains without applying Kingman's formula or physical memory constraints.
    **The Consequence:** Massive, unexpected frame drops and tail-latency explosions as the pipeline hits the hockey-stick curve.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Delay multiplier ∝ ρ / (1 - ρ).
       - Utilization (ρ) nearing 1.0.
       - Hard 2 GB memory bound limits buffer depth.
    2. **Calculations:**
       - At ρ=0.8, delay multiplier = 0.8 / 0.2 = 4x.
       - At ρ=0.9, delay multiplier = 0.9 / 0.1 = 9x.
       - At ρ=0.95, delay multiplier = 0.95 / 0.05 = 19x.
    3. **Conclusion & Interpretation:**
       - **Result: Exponential Tail Latency**. As utilization breaches 80%, the system enters an exponential latency spike, further exacerbated by the physical 2GB activation memory evicting frames before they clear the bloated queue.
