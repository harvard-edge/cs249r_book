title: 'Edge TCO Analyze: Total Cost of Jetson Orin Deployment at Scale'
scenario: 'Analyze the 5-year TCO for deploying 500 Jetson Orin units (32GB LPDDR5, 275 TOPS INT8, 60W,
  $499 each) in a smart factory. Include: hardware ($499), power at 60W continuous ($0.10/kWh), OTA update
  infrastructure ($10K/year), and maintenance (3% annual hardware replacement). Compare against a cloud-based
  alternative at $0.50/hr per unit-equivalent.'
question: "If duty-cycling cuts 500 Jetson Orin units from 60W to 30W for 5 years, what is the correct power-cost savings at $0.10/kWh?"
details:
  realistic_solution: 'Power savings: 500 × 30W × 43800hr × $0.10/kWh / 1000 = 15kW × 43800hr × $0.10
    = $65,700 ≈ $65.7K (not $657K).'
  common_mistake: Only counting hardware acquisition cost and forgetting 5 years of power, maintenance,
    and management overhead, which typically exceed initial hardware cost for IoT/edge deployments.
  napkin_math: 'Power savings from duty-cycling 500 edge devices: original 60W each, optimized 30W each,
    43800 hours (5 years). Savings = 500 × 30W × 43800hr × $0.10/kWh / 1000 = 500 × 30 × 43800 × 0.10
    / 1000 = 500 × 30 × 4380 / 1000 = 500 × 131.4 = $65,700 ≈ $65.7K... wait: $657K = 500 × 30 × 43800
    × 0.10 / 1000 = 657,000,000/1000 = no. Let me recalculate: 500 × 30W = 15,000W = 15kW. 15kW × 43800hr
    = 657,000 kWh. 657,000 kWh × $0.10/kWh = $65,700. Correct: $65,700 ≈ $65.7K (not $657K which is 10×
    too high — likely forgot the /1000 conversion from W to kW or multiplied incorrectly).'
