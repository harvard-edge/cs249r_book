title: Portable Model Optimization Pipeline for Multi-Edge Deployment
scenario: Your autonomous vehicle platform must deploy the same perception model on three distinct edge targets with different model formats, quantization schemes, and runtimes.
question: How would you design a portable deployment pipeline for the same perception model across Orin, Qualcomm SA8650P, and TI TDA4VM?
details:
  realistic_solution: Use ONNX as the pivot format. Train in PyTorch, export to ONNX, apply platform-agnostic optimizations with ONNX Optimizer, and branch into target-specific pipelines (TensorRT, QNN SDK, TIDL compiler) for quantized lowering.
  common_mistake: |
    **The Pitfall:** Maintaining completely separate deployment pipelines.
    **The Rationale:** Engineers treat each edge device in isolation, failing to design a centralized intermediate representation.
    **The Consequence:** Engineering costs triple, and model version drift occurs across targets, leading to inconsistent fleet behavior.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3 hardware targets.
       - Standalone pipeline requires 2 engineers per target for 6 months.
       - ONNX pivot requires 2 shared engineers + 1 per target for 4 months.
    2. **Calculations:**
       - Without shared pipeline: 3 targets * 2 engineers * 6 months = 36 engineer-months.
       - With ONNX pivot: 5 engineers * 4 months = 20 engineer-months.
    3. **Conclusion & Interpretation:**
       - **Result: Engineering-Cost Bound.** The ONNX pivot format enables a **44% reduction in engineering overhead**.
