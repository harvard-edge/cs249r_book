title: Edge TPU Activation Memory Constraint Evaluation
scenario: You are deploying a custom CNN for real-time defect detection on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget, USB/PCIe form factor). The model architecture has been chosen, but during deployment, you encounter memory allocation errors from the Edge TPU compiler due to peak activation sizes.
question: Given the Coral's strict requirement for INT8 quantization and limited on-chip SRAM (~8MB), how would you choose between downsampling, CPU/TPU splitting, and receptive-field changes when Edge TPU activations exceed SRAM?
details:
  realistic_solution: "The correct approach involves analyzing the peak activation memory at the bottleneck layer. Since the Edge TPU requires intermediate activations to fit on-chip to maintain its 4 TOPS performance at 2W, exceeding SRAM forces host-device memory swapping or compilation failure. The engineer must evaluate redesigning the network to strictly bound the maximum activation tensor size—such as aggressively downsampling early or using patching—rather than relying on CPU fallback."
  common_mistake: |
    **The Pitfall:** Suggesting gradient checkpointing or CPU fallback for activation memory limits.
    **The Rationale:** Candidates apply training heuristics to edge inference, ignoring the severe latency penalty of USB/PCIe host memory swapping.
    **The Consequence:** Complete loss of the 4 TOPS acceleration advantage, reducing inference to a crawl as data thrashes across the USB bus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge TPU SRAM: ~8MB
       - Original layer: 512x512, 64 channels, INT8
    2. **Calculations:**
       - Original Memory = 512 * 512 * 64 * 1 = 16.7 MB (> 8MB)
       - Downsampled early (256x256): 256 * 256 * 64 * 1 = 4.2 MB
    3. **Conclusion & Interpretation:**
       **Result: 4.2 MB fits in SRAM (Memory-Bound)**
