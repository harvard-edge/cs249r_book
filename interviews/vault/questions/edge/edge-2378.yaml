title: Asynchronous Double-Buffering for Edge Bounding Box Tracking
scenario: 'A smart camera uses a Hailo-8 accelerator to run an object detector cascaded with a heavy tracker running on the host ARM CPU, communicating over PCIe Gen3 x2.'
question: 'How would you apply a double-buffering scheme to overlap the host''s bounding box decoding with the accelerator''s INT8 convolutions?'
details:
  realistic_solution: 'Divide the video frame processing pipeline into two concurrent streams. While the Hailo-8 processes frame N via DMA, the CPU simultaneously decodes bounding boxes for frame N-1 and transfers the upcoming frame N+1 over the PCIe bus.'
  common_mistake: |
    **The Pitfall:** Failing to account for the latency of the PCIe bus transfer itself before the accelerator can begin the next frame's compute.
    **The Rationale:** Developers often assume data transfer is instantaneous or purely compute-bound.
    **The Consequence:** The pipeline remains sequential (Compute -> Transfer -> Decode), failing to achieve the desired throughput increase.
  napkin_math: |
    * Double-buffering requires storing two frames simultaneously in host DMA memory.
    * 1080p frame size: 1920 * 1080 * 3 bytes (RGB) = 6.22 MB.
    * **Buffer footprint = 2 * 6.22 MB = 12.44 MB allocated in host DMA.**
