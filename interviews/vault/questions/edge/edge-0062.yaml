title: The PoE Voltage Drop Surprise
scenario: You are deploying 100 Jetson Orin NX cameras (15W each) in a warehouse using Power-over-Ethernet (PoE+, 802.3at, 25.5W per port). The PoE switch is in a server room 80 meters from the farthest cameras. During commissioning, the 20 nearest cameras boot and run inference fine, but the 30 farthest cameras (60–80m cable runs) keep rebooting every 2–3 minutes. The PoE switch shows all ports delivering power.
question: What is causing the farthest Jetson Orin NX cameras to reboot despite the PoE switch delivering power?
details:
  realistic_solution: 'The problem is voltage drop over long cable runs. Cat6 Ethernet cable has a resistance of ~7.5 Ω per 100m per conductor pair. PoE+ uses 2 pairs, so the total loop resistance for an 80m run is: 2 × (80/100 × 7.5) = 12 Ω.'
  common_mistake: |
    **The Pitfall:** Blaming the total power budget of the PoE switch.
    **The Rationale:** Candidates assume that because 100 cameras * 15W = 1,500W, a switch with a smaller budget fails.
    **The Consequence:** Even with a massive 2000W switch, the distant cameras would still fail due to line loss.
  napkin_math: |
    - **Cable Resistance:** Cat6 is ~7.5 Ω per 100m per pair. PoE+ uses 2 pairs.
    - **Loop Resistance:** For an 80m run: 2 × (80/100 × 7.5) = **12 Ω loop resistance**.
    - **Peak Current:** Jetson loading 15W at 48V has a steady state of ~0.31A, but model load peaks at **~1.2A**.
    - **Voltage Drop:** V = IR = 1.2A × 12 Ω = **14.4V drop**.
    - **Available Voltage:** 48V (source) - 14.4V = **33.6V**.
    - **Conclusion:** 33.6V is below the 37V minimum for the device, causing it to reset.
