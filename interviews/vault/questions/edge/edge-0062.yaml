title: The PoE Voltage Drop Surprise
scenario: You're deploying 100 Jetson Orin NX cameras (15W each) in a warehouse using Power-over-Ethernet
  (PoE+, 802.3at, 25.5W per port). The PoE switch is in a server room 80 meters from the farthest cameras.
  During commissioning, the 20 nearest cameras boot and run inference fine, but the 30 farthest cameras
  (60–80m cable runs) keep rebooting every 2–3 minutes. The PoE switch shows all ports delivering power.
  What's wrong?
details:
  realistic_solution: 'The problem is voltage drop over long cable runs. Cat6 Ethernet cable has a resistance
    of ~7.5 Ω per 100m per conductor pair. PoE+ uses 2 pairs, so the total loop resistance for an 80m
    run is: 2 × (80/100 × 7.5) = 12 Ω.'
  common_mistake: '"The PoE switch doesn''t have enough total power budget." The switch has a 1,000W PoE
    budget, and 100 × 15W = 1,500W exceeds it — but that''s not why the far cameras reboot. Even with
    sufficient switch budget, the far cameras would still fail.'
  napkin_math: 'Cat6 resistance: 7.5 Ω/100m per pair. 80m run, 2 pairs: 12Ω loop. Steady-state current
    (15W at 48V): 0.31A. Voltage drop: 3.75V. Available: 44.25V (fine). Peak current (model load): 1.2A.
    Voltage drop: 14.4V. Available: 33.6V (below 37V minimum — device resets). With Cat6A (5.5 Ω/100m):
    peak drop = 1.2 × 2 × (80/100 × 5.5) = 10.56V. Available: 37.44V (marginal but passes). With PoE++
    (52V source): available = 52 - 14.4 = 37.6V (passes). Best solution: PoE++ switch ($500) — fixes all
    cameras with no per-device cost.'
