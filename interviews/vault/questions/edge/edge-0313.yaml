title: The Depthwise Separable Cost Advantage
scenario: For an edge vision model, you're considering replacing a standard 3x3 convolution
  with a 3x3 depthwise separable convolution. Both layers have the same number of
  input and output channels (e.g., 256). Approximately how much does this change reduce
  the number of floating-point operations (FLOPs)?
question: Approximately how much does this change reduce the number of floating-point
  operations (FLOPs)?
details:
  realistic_solution: 'A depthwise separable convolution reduces FLOPs by a factor
    approximately equal to the square of the kernel size ($K^2$). For a 3x3 kernel,
    this is a reduction of nearly 9×. The operation is split into two cheaper steps:
    a depthwise step that filters each input channel independently, and a pointwise
    (1x1 convolution) step that combines the channel outputs. The cost of the standard
    convolution is dominated by the multiplication of kernel size and output channels,
    which the separable version avoids.'
  common_mistake: Engineers often remember that depthwise separable convolutions are
    more efficient but mistake the source of the savings. Common errors include assuming
    the reduction is linear with the kernel size (e.g., 3x for a 3x3 kernel) instead
    of quadratic, or confusing the reduction factor with the number of channels.
  napkin_math: Standard 3x3 conv compute cost = K^2 * C_in * C_out = 3^2 * 256 * 256
    = 589,824 MACs per pixel. Separable cost = Depthwise + Pointwise = (K^2 * C_in)
    + (C_in * C_out) = (3^2 * 256) + (256 * 256) = 2,304 + 65,536 = 67,840 MACs per
    pixel. Reduction factor = 589,824 / 67,840 = 8.7x. The compute and parameter footprint
    drops by nearly 90%, critical for edge devices like the Orin.
  options:
  - About a 3× reduction
  - About a 9× reduction
  - About a 256× reduction
  - About a 2× reduction
  correct_index: 1
