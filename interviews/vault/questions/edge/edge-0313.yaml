title: 'The Depthwise Separable Cost Advantage'
scenario: 'For an edge vision model, you''re considering replacing a standard 3x3 convolution with a 3x3 depthwise separable convolution. Both layers have the same number of input and output channels (e.g., 256).'
question: 'Approximately how much does this change reduce the number of floating-point operations (FLOPs)?'
details:
  realistic_solution: 'A depthwise separable convolution reduces FLOPs by a factor approximately equal to the square of the kernel size ($K^2$). For a 3x3 kernel, this is a reduction of nearly 9×. The operation is split into two cheaper steps: a depthwise step that filters each input channel independently, and a pointwise (1x1 convolution) step that combines the channel outputs. The cost of the standard convolution is dominated by the multiplication of kernel size and output channels, which the separable version avoids.'
  common_mistake: |
    **The Pitfall:** Assuming depthwise separable convolutions reduce compute linearly with kernel size.
    **The Rationale:** Engineers remember the operation is more efficient but mistakenly think it''s a 3x reduction for a 3x3 kernel instead of quadratic.
    **The Consequence:** They underestimate the massive performance gains achievable on edge hardware like the Orin.
  napkin_math: |
    - Standard 3x3 conv MACs: K^2 * C_in * C_out = 3^2 * 256 * 256 = **589,824 MACs**.
    - Separable depthwise MACs: K^2 * C_in = 3^2 * 256 = 2,304.
    - Separable pointwise MACs: C_in * C_out = 256 * 256 = 65,536.
    - Total separable MACs: 2,304 + 65,536 = **67,840 MACs**.
    - Reduction factor: 589,824 / 67,840 = **~8.7x** (nearly 9x).
  options:
  - 'About a 3× reduction'
  - 'About a 9× reduction'
  - 'About a 256× reduction'
  - 'About a 2× reduction'
