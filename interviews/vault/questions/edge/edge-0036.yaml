title: The WCET Analysis
scenario: You're certifying a perception pipeline for an autonomous vehicle under ISO 26262 ASIL-B. Industry
  practice requires end-to-end inference latency under 50ms for safety-critical decisions, and your safety
  case must *guarantee* the pipeline completes within 100ms under all operating conditions (including
  the full sensor-to-actuator path). Your average-case inference latency is 45ms. How do you construct
  the worst-case execution time (WCET) argument?
question: "How do you construct the worst-case execution time (WCET) argument?"
details:
  realistic_solution: 'WCET analysis requires eliminating statistical reasoning and proving hard guarantees.
    Step 1: Pin to a dedicated CPU core (isolcpus), disable frequency scaling, lock to worst-case thermal
    (85C). Step 2: Measure over 100K frames to establish empirical worst case (65ms). Step 3: Apply a
    safety margin of 1.5x: 65 x 1.5 = 97.5ms < 100ms budget. Step 4: Add a hardware watchdog at 95ms that
    triggers a deterministic fallback (ultrasonic braking, <1ms). The key distinction: P99 = 80ms means
    1-in-100 frames can exceed 80ms (a miss every 3.3 seconds at 30 FPS). Safety certification demands
    guarantees, not statistics.'
  common_mistake: '"Our P99 latency is 80ms, which is under 100ms." P99 means 1 in 100 frames can exceed
    80ms — at 30 FPS, that''s a missed deadline every 3.3 seconds. Safety certification requires *guarantees*,
    not statistics.'
  napkin_math: 'Average: 45ms. P99: 80ms. Measured worst case (100K frames, 85°C): 65ms. WCET claim =
    65 × 1.5 = 97.5ms < 100ms budget ✓. Watchdog at 95ms gives 5ms for fallback activation. Fallback (ultrasonic
    braking): deterministic, <1ms response. Total system WCET: 100ms guaranteed.'
