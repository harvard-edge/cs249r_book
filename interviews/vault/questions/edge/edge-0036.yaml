title: The WCET Analysis
scenario: You're certifying a perception pipeline under ISO 26262 ASIL-B. Your safety case must *guarantee* the pipeline completes within 100ms under all operating conditions. Your average-case inference latency is 45ms.
question: How do you construct the worst-case execution time (WCET) argument?
details:
  realistic_solution: 'WCET analysis requires eliminating statistical reasoning and proving hard guarantees. Step 1: Pin to a dedicated CPU core (isolcpus), disable frequency scaling, lock to worst-case thermal (85C). Step 2: Measure over 100K frames to establish empirical worst case (65ms). Step 3: Apply a safety margin of 1.5x: 65 x 1.5 = 97.5ms < 100ms budget. Step 4: Add a hardware watchdog at 95ms that triggers a deterministic fallback (ultrasonic braking, <1ms). The key distinction: P99 = 80ms means 1-in-100 frames can exceed 80ms (a miss every 3.3 seconds at 30 FPS). Safety certification demands guarantees, not statistics.'
  common_mistake: |
    **The Pitfall:** Conflating statistical latency (e.g., P99) with worst-case guarantees.
    **The Rationale:** Engineers rely on cloud-centric SLA metrics (like P99) and assume a 99% success rate implies a safe maximum bound.
    **The Consequence:** A P99 of 80ms means 1 in 100 frames violates the deadline. At 30 FPS, a deadly deadline miss occurs every 3.3 seconds, failing safety certification.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average: 45ms. Measured worst-case (100K frames, max thermal): 65ms. Safety factor: 1.5x. Total budget: 100ms.
    2. **Calculations:**
       - WCET Claim = 65ms * 1.5 = 97.5ms.
       - Margin against budget = 100ms - 97.5ms = 2.5ms.
    3. **Conclusion & Interpretation:**
       - **Result: 97.5ms WCET.** By measuring the absolute empirical worst-case under boundary conditions and applying a safety factor, we mathematically guarantee compliance under the 100ms threshold.
