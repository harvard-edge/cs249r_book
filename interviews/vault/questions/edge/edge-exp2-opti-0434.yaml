title: Mitigating Federated Communication Bottlenecks on Jetson Orin
scenario: You are deploying a cross-silo federated learning system across a fleet of autonomous vehicles,
  each equipped with an NVIDIA Jetson Orin. The local training involves fine-tuning a 2-billion parameter
  perception model. During federated averaging, you observe that despite the Orin's 32 GB LPDDR5 memory
  and Ampere GPU + DLA accelerator, the system stalls. The communication overhead for sending full weight
  updates over a constrained LTE connection is severe, and the cellular radio's continuous operation pushes
  the system beyond its 60W TDP limit, causing thermal throttling. Diagnose the bottleneck and propose
  a quantified fix.
details:
  realistic_solution: The bottleneck is the massive payload of dense gradients being transmitted over
    a slow network, which keeps the radio active and draws excessive power. The fix involves applying
    INT8 quantization to the weight updates and aggressive top-k sparsification before transmission. Because
    the Orin handles INT8 efficiently, the overhead of quantizing the updates is minimal, and the drastically
    reduced payload cuts down transmission time, allowing the radio to idle and keeping the total system
    draw within the 60W TDP.
  common_mistake: Candidates often focus solely on optimizing the local on-device training compute (e.g.,
    using INT8 precision for the forward pass via the 275 TOPS DLA) while ignoring the communication payload.
    They might also suggest complex gradient compression schemes that require heavy compute, inadvertently
    increasing power consumption and exacerbating the 60W TDP constraint.
  napkin_math: A 2B parameter model uses 8 GB for full FP32 gradients (2e9 * 4 bytes). Sending this over
    a 50 Mbps (6.25 MB/s) uplink takes 1,280 seconds (over 21 minutes) per round, maxing out radio power.
    By quantizing gradients to INT8 (1 byte/param), the payload drops to 2 GB. Applying a 1% top-k sparsification
    mask further reduces this to 20 MB per round. Transmission time drops to 3.2 seconds (20 MB / 6.25
    MB/s), an ~400x reduction in communication time and radio power utilization.
