title: Factory Defect Detection Storage Pipeline
scenario: You are designing the storage and data feeding pipeline for an automated optical inspection system in a factory. The system uses an on-premise accelerator to run a defect detection model. The cameras generate 100 high-resolution uncompressed images (8MB each) per second.
question: How would you format, compress, store, and stream 100 8MB images per second so the accelerator is not starved?
details:
  realistic_solution: |
    The data should be stored in a sequential, row-based binary format like TFRecord or WebDataset. To balance storage capacity and host CPU load, use a fast, lightweight compression algorithm like LZ4. This minimizes decompression overhead on the host CPU, allowing data to be rapidly decoded and moved over PCIe to the AI 100's 32 GB LPDDR4x memory for high-throughput batch inference.
  common_mistake: |
    **The Pitfall:** Suggesting heavy compression formats (like JPEG) or columnar big-data formats (like Parquet).
    **The Rationale:** Optimizing solely for disk space savings without factoring in host CPU decompression costs.
    **The Consequence:** The host CPU throttles trying to decompress complex image formats, starving the 400 TOPS AI accelerator and missing inference deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera Rate: 100 images/sec at 8 MB each.
       - Storage Target: Minimize host CPU decompression load.
    2. **Calculations:**
       - Raw Data Rate: 100 * 8 MB = 800 MB/s (2.88 TB/hour).
       - LZ4 Compression Ratio: ~2x.
       - Compressed Storage Required: 400 MB/s (1.44 TB/hour).
    3. **Conclusion & Interpretation:**
       - **Result: 400 MB/s continuous disk I/O. Bottleneck: Storage I/O-Bound (Resolved via LZ4 compression).**
