title: Factory Defect Detection Storage Pipeline
scenario: You are designing the storage and data feeding pipeline for an automated optical inspection system in a factory. The system uses an on-premise accelerator (400 TOPS INT8) to run a defect detection model. The cameras generate 100 high-resolution uncompressed images (8MB each) per second.
question: How would you format, compress, store, and stream 100 8MB images per second so the accelerator is not starved?
details:
  realistic_solution: The data should be stored in a sequential, row-based binary format like TFRecord or WebDataset. To balance storage capacity and host CPU load, use a fast, lightweight compression algorithm like LZ4. This minimizes decompression overhead on the host CPU, allowing data to be rapidly decoded and moved over PCIe to the AI 100's 32 GB LPDDR4x memory for high-throughput batch inference.
  common_mistake: |
    **The Pitfall:** Suggesting heavy compression formats (like JPEG) or columnar big-data formats (like Parquet).
    **The Rationale:** Optimizing solely for disk space savings without factoring in host CPU decompression costs.
    **The Consequence:** The host CPU throttles trying to decompress complex image formats, starving the 400 TOPS AI accelerator and missing inference deadlines.
  napkin_math: |
    * **Incoming Data Rate**: 100 images/sec × 8 MB = 800 MB/s = 2.88 TB per hour.
    * **LZ4 Compression**: Yields ~2x ratio, reducing storage to 400 MB/s (1.44 TB/hour).
    * **CPU Decompression**: LZ4 operates at >3 GB/s per CPU core.
    * **Conclusion**: The host can easily sustain the **400 MB/s** sequential read and decompression rate, feeding the 400 TOPS engine without bottlenecks.
