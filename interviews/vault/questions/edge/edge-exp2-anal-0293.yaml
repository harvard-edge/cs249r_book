title: Analyzing Edge TPU Throughput Bottlenecks
scenario: We are deploying a vision model on a smart camera using a Google Coral Edge TPU connected via
  USB. The Edge TPU provides 4 TOPS of INT8 compute at a 2W power budget, but has strictly limited operator
  support and requires full INT8 quantization. Our quantized model requires 20 GOPS per frame. During
  benchmarking, the system only achieves 40 FPS, and we observe unexpectedly high CPU utilization on the
  host device. Explain why this performance bottleneck is occurring given the platform's constraints.
details:
  realistic_solution: The Edge TPU requires all operations to have supported INT8 kernels. If the model
    contains even a single unsupported operation (like a custom activation function or non-standard reshape),
    the Edge TPU compiler partitions the graph. The supported subgraphs run on the TPU, but execution
    must fall back to the host CPU for the unsupported operations. This forces intermediate tensors to
    be copied back and forth over the USB bus, and relies on the slower CPU to compute the unsupported
    layers, completely bottlenecking the system and capping the frame rate.
  common_mistake: Candidates often look purely at theoretical compute capacity and incorrectly assume
    USB bandwidth limits or thermal throttling are the primary issues. They frequently miss the architectural
    implication of the 'limited operator support' constraint causing host-device context switching.
  napkin_math: 'Theoretical max throughput: 4 TOPS (4,000 GOPS) / 20 GOPS/frame = 200 FPS (or 5 ms latency
    per frame). Actual observed throughput: 40 FPS, which equals a 25 ms latency per frame. The performance
    gap is 20 ms per frame. If an unsupported layer forces a 2MB intermediate tensor to be copied over
    a real-world USB 3.0 connection (~300 MB/s effective), the transfer alone costs ~6.6 ms each way (13.2
    ms total round trip). The remaining ~6.8 ms is easily consumed by the CPU executing the unsupported
    unoptimized fallback operation, perfectly explaining the 40 FPS limit despite the 4 TOPS peak capacity.'
