title: Realizing Activation Memory Reduction Through Quantization-Aware Fine-Tuning on Jetson Orin
scenario: You are fine-tuning a quantization-aware training (QAT) version of MobileNetV2 on Jetson Orin
  (32 GB LPDDR5). QAT inserts fake-quantization nodes that simulate int8 forward pass but maintain fp32
  activations for gradient computation. Your team expects QAT to reduce activation memory versus full
  fp32 training, but profiling shows QAT uses MORE memory than fp32 baseline. Explain why and propose
  a fix.
details:
  realistic_solution: 'QAT stores at each fake-quant insertion point: (1) fp32 input activation (for gradient),
    (2) quantized fp32 activation (for forward), (3) scale and zero-point tensors. For MobileNetV2 with
    fake-quant nodes after every Conv+ReLU6 (18 such nodes at typical insertion): 18 × 2 × B × feature_map_size
    × 4 B. At B=8, worst-case feature map 28×28×96: 18 × 2 × 8 × 28 × 28 × 96 × 4 B = 6.5 GB additional
    vs baseline. Fix: apply fake-quant only to output of each stage (6 insertion points instead of 18),
    or use per-layer QAT with gradient checkpointing to discard fp32 activations between backward stages.'
  common_mistake: Expecting QAT activation memory to match int8 inference activation memory. QAT explicitly
    requires fp32 activations for the backward pass gradient computation through the fake-quantization
    straight-through estimator (STE). Additionally, QAT stores both the fp32 activation AND the quantized
    activation at each fake-quant node, doubling the activation memory at those points.
  napkin_math: 'Full fp32 baseline MobileNetV2 activations at B=8: ~1.2 GB. QAT with per-layer fake-quant:
    18 nodes × 2 tensors × (max feature 56×56×32) × 8 batch × 4 B = 18 × 2 × 100,352 × 8 × 4 = 115.6 MB
    additional. Total QAT: 1.2 + 0.116 = 1.316 GB — 10% more than baseline fp32. Reducing to 6 stage-level
    fake-quant nodes: 6/18 × 0.116 = 0.039 GB additional → 1.239 GB total.'
