title: Real-time Multi-Camera Pipeline Architecture for Hailo-8 Dataflow Accelerator
scenario: You are designing a real-time smart city intersection monitoring system that ingests four 1080p camera streams at 30 FPS. The inference will run on a Hailo-8 edge AI processor, which operates as a pure dataflow accelerator with no local DRAM, relying entirely on streaming from the host processor's memory over PCIe.
question: Architect the streaming ingestion pipeline to handle frame capture, preprocessing, and continuous tensor streaming to the Hailo-8 without starving it.
details:
  realistic_solution: The optimal design bypasses user-space memory copies by using zero-copy mechanisms (like V4L2 with DMA-BUF or GStreamer pipelines) to ingest frames directly into pinned host memory. Preprocessing (resizing, format conversion) should ideally occur on the camera ISP or via hardware accelerators on the host SoC before the tensors are continuously streamed via PCIe to the Hailo-8's dataflow graph. The host CPU acts only to orchestrate DMA transfers rather than moving pixels.
  common_mistake: |
    **The Pitfall:** Proposing standard batching frameworks or message queues.
    **The Rationale:** Candidates propose Kafka or Redis, failing to recognize that dataflow accelerators require continuous, deterministic streaming from host memory.
    **The Consequence:** Introducing massive user-space memory copying overhead that saturates host memory bandwidth and starves the accelerator.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 cameras (1080p, 30 FPS).
       - Hailo-8 dataflow accelerator, no local DRAM.
       - INT8 input tensors: 640x640x3.
    2. **Calculations:**
       - Raw Ingestion: 4 * 1920 * 1080 * 3 bytes * 30 FPS = 746 MB/s.
       - PCIe Streaming Bandwidth Required: 4 * 640 * 640 * 3 bytes * 30 FPS = 147 MB/s.
       - Compute Required: 120 FPS * (assumed < 216 GOPS/frame) < 26 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Compute is abundant; host memory bandwidth (746 MB/s raw + 147 MB/s tensor) must be carefully managed via zero-copy DMA.
