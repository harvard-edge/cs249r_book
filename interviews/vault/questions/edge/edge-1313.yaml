title: Evaluating MobileNet vs ResNet on Hailo-8 Dataflow
scenario: Your team is deploying an object detection model onto a spatial dataflow architecture with no local DRAM, meaning all intermediate activations must be efficiently routed through on-chip memory or streamed to/from host memory. You are evaluating a standard MobileNetV2 (heavy depthwise convolutions) versus a custom ResNet-50 variant optimized for INT8.
question: Which architecture do you choose for this specific hardware, and how do the platform's memory characteristics drive your decision?
details:
  realistic_solution: "Opt for the standard ResNet-50 variant. Stream-based dataflow architectures lack large local SRAM for deep intermediate caching. Depthwise convolutions suffer from abysmally low Arithmetic Intensity (AI), forcing constant tensor spilling over PCIe. Standard convolutions maximize spatial data reuse in the compute grid, maintaining high arithmetic intensity and preventing the host memory bandwidth from becoming an I/O bottleneck."
  common_mistake: |
    **The Pitfall:** Assuming fewer FLOPs automatically translates to lower latency and power on dataflow hardware.
    **The Rationale:** Depthwise convolutions are efficient on generic CPUs/GPUs but have low arithmetic intensity, creating severe bottlenecks on stream-based architectures.
    **The Consequence:** The compute array starves for data, resulting in massive underutilization and missed real-time performance targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 26 TOPS, stream-based architecture.
       - Standard 3x3 conv (64 in/out): 73,728 OPs, 128 bytes stream.
       - Depthwise 3x3 conv: 18 OPs, 2 bytes stream.
    2. **Calculations:**
       - Standard AI = 73,728 / 128 = 576 OPs/byte.
       - Depthwise AI = 18 / 2 = 9 OPs/byte.
       - Bandwidth for 26 TOPS (Standard) = 26e12 / 576 ≈ 45.1 GB/s.
       - Bandwidth for 26 TOPS (Depthwise) = 26e12 / 9 ≈ 2.89 TB/s.
    3. **Conclusion & Interpretation:**
       - **Standard convolutions are viable; depthwise convolutions are severely bandwidth-bound.**
