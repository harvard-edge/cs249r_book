title: Evaluating MobileNet vs ResNet on Hailo-8 Dataflow
scenario: Your team is deploying an object detection model onto a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 uses a spatial dataflow architecture with no local DRAM, meaning all intermediate activations must be efficiently routed through on-chip memory or streamed to/from host memory. You are evaluating a standard MobileNetV2 (heavy depthwise convolutions) versus a custom ResNet-50 variant optimized for INT8.
question: Which architecture do you choose for this specific hardware, and how do the platform's memory characteristics drive your decision?
details:
  realistic_solution: For the Hailo-8, standard convolutions (like in ResNet) often perform better than depthwise convolutions because they have higher arithmetic intensity, allowing the compiler to fully utilize the compute array without stalling on memory bandwidth. Since Hailo-8 lacks local DRAM and relies on host memory streaming, minimizing data movement is more critical than raw FLOP reduction.
  common_mistake: |
    **The Pitfall:** Assuming fewer FLOPs automatically translates to lower latency and power on dataflow hardware.
    **The Rationale:** Depthwise convolutions are efficient on generic CPUs/GPUs but have low arithmetic intensity, creating severe bottlenecks on stream-based architectures.
    **The Consequence:** The compute array starves for data, resulting in massive underutilization and missed real-time performance targets.
  napkin_math: |
    - Standard 3x3 conv (64 in/out): 73,728 OPs per spatial location.
    - Standard stream bytes: 128 bytes (64 in + 64 out).
    - Standard arithmetic intensity: 73,728 / 128 = 576 OP/byte.
    - Bandwidth required for 26 TOPS: 26e12 / 576 ≈ **45.1 GB/s**.
    - Depthwise 3x3 conv: 18 OPs per location.
    - Depthwise stream bytes: 2 bytes (1 in + 1 out).
    - Depthwise arithmetic intensity: 18 / 2 = 9 OP/byte.
    - Bandwidth required for 26 TOPS: 26e12 / 9 ≈ **2.89 TB/s (Impossible)**.
