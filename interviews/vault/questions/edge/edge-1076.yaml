title: 'MLOps Lifecycle: Size Edge Model Registry Storage for 3 Versions Retention'
scenario: An edge MLOps team maintains a model registry for 500 Hailo-8 devices. Each model (INT8 detection engine) is 80MB. The registry keeps the last 5 versions. Devices have 4GB eMMC storage.
question: How would you size cloud storage, per-device eMMC impact, monthly bandwidth, and eMMC endurance for 500 devices with weekly 80MB updates?
details:
  realistic_solution: 'Cloud registry: 5 × 80MB = 400MB. $0.009/month. Per-device: 2 × 80MB (current + rollback) = 160MB on 4GB eMMC = 4%. Weekly update bandwidth: 500 × 80MB = 40GB/week × $0.09/GB = $3.60/week = $14.40/month. eMMC endurance: 80MB/week × 52 = 4.16GB/year writes. TBW limit for 4GB eMMC (MLC): ~100GB. Lifetime: 100/4.16 = 24 years. No concern.'
  common_mistake: |
    **The Pitfall:** Ignoring eMMC write endurance on edge devices.
    **The Rationale:** Cloud-native engineers assume storage is infinitely rewritable and fail to calculate the wear caused by frequent 80MB OTA updates on low-cost flash memory.
    **The Consequence:** Premature hardware failure of the edge fleet as eMMC modules burn through their Program/Erase (P/E) cycles, requiring expensive physical replacements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Fleet size: 500 devices.
       * Update size: 80 MB, weekly.
       * Device storage: 4 GB eMMC (MLC with ~100 GB TBW limit).
       * Retention: 2 versions on device (current + rollback).
    2. **Calculations:**
       * eMMC capacity impact: 2 * 80 MB = 160 MB (160 MB / 4 GB = 4%).
       * Bandwidth: 500 * 80 MB = 40 GB/week (160 GB/month).
       * eMMC writes: 80 MB/week * 52 weeks = 4.16 GB/year.
       * eMMC lifespan: 100 GB TBW limit / 4.16 GB/year = 24 years.
    3. **Conclusion & Interpretation:**
       **Result: 160 GB/month bandwidth, 24-year eMMC life**. The 80MB weekly updates consume negligible storage space and wear, making the pipeline highly sustainable.
