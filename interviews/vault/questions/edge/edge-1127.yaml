title: 'Edge Systolic Array Analyze: Weight-Stationary Dataflow for Edge Deployment'
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8) deploys ResNet-50 (25M params
  INT8, 4.1 GOPS) for batch=1 inference. Analyze why the inference is memory-bandwidth
  bound using Roofline, calculate the achievable throughput, and explain how a weight-stationary
  dataflow (loading weights once per batch) changes the analysis for batch=64.
question: Why is batch-1 ResNet-50 on Jetson Orin memory-bound, what throughput does
  Roofline predict, and how does batch=64 change it?
details:
  realistic_solution: 'Batch=1: weights = 25MB. Load once per inference: 25MB / 102.4GB/s
    = 244μs. Compute: 4.1G / 275T = 14.9μs. Memory bound (244μs >> 14.9μs). AI = 4.1G/25MB
    = 164 FLOPs/byte << Jetson ridge (275T/102.4G = 2686 FLOPs/byte). Batch=64 weight-stationary:
    weights loaded ONCE, 64 inputs processed. FLOPs: 4.1G*64=262G. Weight bytes: 25MB
    (loaded once). Activation bytes: 64*(150KB input + 4KB output) ≈ 9.8MB. AI = 262G/(25+9.8)MB
    = 262G/34.8MB = 7528 FLOPs/byte. Above Jetson ridge (2686), meaning it becomes compute bound.
    Throughput improves dramatically.'
  common_mistake: Not understanding that weight-stationary dataflow only helps when
    the batch size is large enough to amortize the one-time weight loading cost across
    many input samples.
  napkin_math: 'Batch=1: AI=164, memory bound. Time=244μs. Throughput=4100 img/s.
    Batch=64 WS: weights load once (244μs). Inputs/Outputs: 64*(150KB+4KB) = 9.8MB. Load time
    = 9.8MB / 102.4GB/s = 95μs. Memory time = 244 + 95 = 339μs. Compute time = 262G / 275T = 952μs.
    Since 952 > 339, it is compute bound! Time = 952μs for 64 images = 14.9μs/image. Throughput
    = 1/14.9μs = 67,000 img/s. From 4100 to 67,000 img/s: 16x improvement from batching + WS dataflow.'
