title: 'Edge Systolic Array Analyze: Weight-Stationary Dataflow for Edge Deployment'
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8) deploys ResNet-50 (25M params INT8, 4.1 GOPS) for batch=1 inference.
question: Why is batch=1 ResNet-50 on Jetson Orin memory-bound, what throughput does Roofline predict, and how does batch=64 change it?
details:
  realistic_solution: 'Batch=1 is heavily memory bound because weights (25MB) must be loaded for every 4.1G compute. AI = 164 FLOPs/byte << Jetson ridge (2686 FLOPs/byte). In Batch=64 with a weight-stationary dataflow, weights are loaded exactly once per 64 inputs. This dramatically shifts the arithmetic intensity, making the workload highly compute-bound and vastly improving throughput.'
  common_mistake: |
    **The Pitfall:** Not understanding that weight-stationary dataflow only helps when the batch size is > 1.
    **The Rationale:** Engineers assume "dataflow optimizations" automatically improve single-stream real-time latency.
    **The Consequence:** Expecting huge throughput gains for streaming inputs, only to realize the accelerator is still starved by weight-loading delays.
  napkin_math: |
    - **Batch=1 Baseline:** Weights = 25MB. AI = 4.1G / 25MB = 164 FLOPs/byte (memory bound). Load time = 25MB / 102.4GB/s = 244µs. Compute = 14.9µs. Throughput = 4,100 img/s.
    - **Batch=64 Weight-Stationary:** FLOPs = 4.1G * 64 = 262G. Weight bytes = 25MB (loaded once). Activation bytes = 64 * (150KB + 4KB) = 9.8MB.
    - **New AI:** 262G / (25MB + 9.8MB) = 7528 FLOPs/byte (above 2686 ridge, so compute bound).
    - **Compute Time:** 262G / 275T = 952µs. Memory time = 339µs.
    - **Final Result:** **Throughput spikes to 67,000 img/s (a 16× improvement) because batching + weight-stationary execution hides the memory bottleneck behind the math units.**
