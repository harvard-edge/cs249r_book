title: Weight-Stationary Dataflow for Edge Deployment
scenario: ResNet-50 (25MB INT8 weights, 4.1 GOPS) runs batch=1 inference on Jetson Orin.
question: Why is batch=1 ResNet-50 on Jetson Orin memory-bound, what throughput does Roofline predict, and how does batch=64 change it?
details:
  realistic_solution: Batch=1 is heavily memory bound because weights must be loaded for every 4.1G compute. In Batch=64 with a weight-stationary dataflow, weights are loaded exactly once per 64 inputs. This dramatically shifts the arithmetic intensity, making the workload highly compute-bound.
  common_mistake: |
    **The Pitfall:** Not understanding that weight-stationary dataflow only helps when the batch size is > 1.
    **The Rationale:** Engineers assume "dataflow optimizations" automatically improve single-stream real-time latency.
    **The Consequence:** Expecting huge throughput gains for streaming inputs, only to realize the accelerator is still starved by weight-loading delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin Ridge Point = 2686 FLOPs/byte.
    - ResNet-50 = 25MB weights, 4.1 GOPS.

    **Calculations:**
    - Batch=1 AI = 4.1G / 25MB = 164 FLOPs/byte (Memory Bound).
    - Batch=64 AI = (4.1G * 64) / (25MB weights + 9.8MB activations) = 7529 FLOPs/byte (Compute Bound).
    - Throughput scales from 4,100 img/s to 67,000 img/s.

    **Conclusion & Interpretation:**
    - **Result: 16x throughput improvement (Compute-Bound (with batching))**. Weight-stationary dataflow masks memory latency only when batch size > 1.
