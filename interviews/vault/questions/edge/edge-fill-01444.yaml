title: 'Jetson Orin: Real-time Multi-Stream Video Pipeline Bottleneck Analysis'
scenario: 'Your team is deploying an edge AI application on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS
  INT8, 60W) for real-time anomaly detection in a factory setting. The system must process 8 concurrent
  1080p video streams at 30 FPS each. The data pipeline involves: 1) capturing and decoding raw video
  frames, 2) pre-processing (e.g., resizing to 640x480, color space conversion, normalization), 3) feeding
  data to an INT8 object detection model, and 4) storing inference results (bounding box coordinates,
  class labels, and timestamps) to a local SSD. You observe that the pipeline is dropping frames, indicating
  a throughput bottleneck. Where would you investigate, and how would you apply the data pipeline equation
  to diagnose and optimize the system for sustained performance?'
details:
  realistic_solution: Systematic profiling of each pipeline stage (decoding, pre-processing, inference,
    storage) to pinpoint the actual bottleneck. Utilizing the Jetson's hardware video decoders (NVDEC),
    optimizing pre-processing with CUDA-accelerated OpenCV operations or TensorRT pre-processors, employing
    efficient memory management (e.g., shared memory, pinned memory for DMA), and asynchronous execution
    to overlap compute and I/O. Applying the data pipeline equation means identifying the stage with the
    highest latency (`max(latency_stage_i)`) and focusing optimization efforts there, ensuring that the
    aggregate data loading rate meets or exceeds the required `8 streams * 30 FPS * (bytes_per_frame)`.
  common_mistake: Focusing solely on GPU inference speed without considering the I/O, CPU-bound preprocessing,
    or memory bandwidth limitations between stages, especially with high-resolution, concurrent streams
    on an edge device like the Jetson Orin. Another common mistake is inefficient memory copies (e.g.,
    CPU-to-GPU) or not utilizing hardware decoders.
  napkin_math: Given 8 streams at 1080p30 (1920x1080x3 bytes/frame for RGB), the raw data ingestion rate
    is 8 * 30 * 1920 * 1080 * 3 bytes/sec ≈ 1.5 GB/s. If a single pre-processing step (like resizing or
    color conversion) takes 5ms on the CPU per frame, processing 240 frames/second would require 240 *
    5ms = 1200ms or 1.2 seconds of CPU time per real second, clearly indicating a CPU bottleneck if not
    efficiently parallelized or offloaded. This initial data handling could easily saturate available
    CPU cores or memory bandwidth, making it the primary bottleneck before the GPU's 275 TOPS INT8 can
    even be fully utilized for inference.
