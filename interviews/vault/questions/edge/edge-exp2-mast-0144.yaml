title: Architecting a Streaming Pipeline for Dataflow Roofline Optimization
scenario: You are designing a multi-camera perception system for an autonomous guided vehicle (AGV) using
  a host processor connected to a Hailo-8 accelerator via PCIe. The Hailo-8 provides 26 TOPS of INT8 compute
  at 2.5W but has no local DRAM, meaning all inputs, outputs, and any spilled intermediate tensors must
  stream directly from host memory. Your task is to design the host-accelerator memory streaming architecture
  and analyze the system's roofline to determine whether a 4-camera 1080p60 workload running a custom
  YOLOX variant will be compute-bound or memory-bound, and how you would restructure the model's layers
  to maximize utilization on this specific dataflow architecture.
question: "How would you design the Hailo-8 host streaming path, analyze the roofline, and restructure YOLOX for 4-camera 1080p60 inference?"
details:
  realistic_solution: The correct approach involves calculating the required PCIe bandwidth for streaming
    4x 1080p60 video feeds and contrasting it with the theoretical peak of 26 TOPS. Because it's a dataflow
    accelerator, the candidate should design the network to fit entirely within the Hailo-8's internal
    SRAM to avoid intermediate spills. If the model must be partitioned, they should architect the split
    at a bottleneck layer (e.g., after a spatial pooling operation) where the tensor size is minimal,
    thereby maintaining an operational intensity that keeps the system compute-bound rather than bottlenecked
    by the host-to-device PCIe bandwidth.
  common_mistake: Candidates often apply a standard GPU roofline model without accounting for the PCIe
    bottleneck or the dataflow nature of the Hailo-8. They typically assume high operational intensity
    based on total model FLOPs, forgetting that without local DRAM, intermediate activation spills back
    to the host memory will drastically lower the actual operational intensity and shift the workload
    into the memory-bound region.
  napkin_math: Four 1080p cameras at 60 FPS in RGB888 require 4 * 1920 * 1080 * 3 bytes * 60 FPS = 1.49
    GB/s of host-to-device streaming bandwidth. Assuming a PCIe Gen3 x4 connection provides ~3.9 GB/s
    practical bandwidth, the input streaming consumes ~38% of available bandwidth. To achieve the peak
    26 TOPS, the required operational intensity across the PCIe bus is 26e12 OPs / 3.9e9 Bytes/s = 6666
    OPs/Byte. If an intermediate tensor of size 10MB needs to be spilled and re-read per frame per camera
    (4 cameras * 60 FPS * 10MB * 2 (read+write) = 4.8 GB/s), the total bandwidth demand (1.49 GB/s + 4.8
    GB/s = 6.29 GB/s) would exceed the 3.9 GB/s PCIe limit, plunging the system into a severe memory-bound
    state despite the 26 TOPS available.
