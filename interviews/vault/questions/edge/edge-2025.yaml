title: Canary Rollout and Optimization for Edge ML on NVIDIA Jetson Orin
scenario: Your team has developed a new, more accurate object detection model. It needs to be deployed on a fleet of NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) devices operating in real-time, constrained environments. You decide to use a canary deployment strategy to roll out this new model version.
question: How would you implement a Jetson Orin canary rollout and monitor latency, throughput, power, and rollback triggers for regressions?
details:
  realistic_solution: Establish comprehensive edge telemetry pushed to a central monitor. Track inference latency (P50, P90, P99), hardware utilization (DLA, GPU, LPDDR5 pressure), and actual power/thermal states. If canary devices breach SLAs (e.g., P99 latency spikes or power hits 60W), an automated rollback reverts to the prior model.
  common_mistake: |
    **The Pitfall:** Treating edge device deployments similarly to cloud deployments, overlooking hardware-specific constraints.
    **The Rationale:** Engineers monitor standard accuracy and application logs, omitting fine-grained SoC thermal throttling or memory pressure stats.
    **The Consequence:** Severe edge-specific regressions, like thermal throttling induced by higher INT8 utilization, go undetected until widespread fleet impact.
  napkin_math: |
    - **Baseline Throughput:** Baseline model at 30 FPS (~33.3ms inference) using 50% of 275 TOPS (137.5 TOPS).
    - **New Model Latency:** New model requires 20% more operations (165 TOPS). Inference time increases to 33.3ms * 1.2 = 40ms.
    - **Throughput Impact:** 1000ms / 40ms = 25 FPS.
    - **Power Consumption:** 20% utilization increase pushes baseline 40W draw to 40W * (70/50) = 56W (nearing 60W limit).
    - **Final Result:** **The new model reduces throughput to 25 FPS and increases power to 56W. A rollback automatically triggers if P99 latency exceeds a defined threshold (e.g., 45ms) or temperatures throttle.**
