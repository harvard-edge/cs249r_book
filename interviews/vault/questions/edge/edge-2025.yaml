title: Canary Rollout and Optimization for Edge ML
scenario: A new model with 20% higher FLOPs is canary deployed on a Jetson Orin fleet.
question: How would you implement a Jetson Orin canary rollout and monitor latency, throughput, power, and rollback triggers for regressions?
details:
  realistic_solution: Establish comprehensive edge telemetry pushed to a central monitor. Track inference latency (P50, P90, P99), hardware utilization (DLA, GPU, LPDDR5 pressure), and actual power/thermal states. If canary devices breach SLAs, automated rollback reverts the model.
  common_mistake: |
    **The Pitfall:** Treating edge device deployments similarly to cloud deployments, overlooking hardware-specific constraints.
    **The Rationale:** Engineers monitor standard accuracy and application logs, omitting fine-grained SoC thermal throttling or memory pressure stats.
    **The Consequence:** Severe edge-specific regressions, like thermal throttling induced by higher INT8 utilization, go undetected until widespread fleet impact.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin limit = 60W.
    - Baseline = 137.5 TOPS, 33.3ms, 40W.
    - New model = +20% FLOPs.

    **Calculations:**
    - New Latency = 33.3 * 1.2 = 40ms.
    - New FPS = 1000 / 40 = 25 FPS.
    - Power scales by utilization: 40W * (165 TOPS / 137.5 TOPS) = 48W.

    **Conclusion & Interpretation:**
    - **Result: 25 FPS and 48W power draw (Compute-Bound)**. Real-time edge metrics must automatically trigger the canary rollback, not just standard cloud accuracy logs.
