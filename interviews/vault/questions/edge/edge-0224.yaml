title: The 30 FPS Deadline (edge-0224)
scenario: Your team is designing the perception system for an autonomous vehicle. The main camera feed
  runs at 30 frames per second (FPS) to ensure smooth tracking of pedestrians and other vehicles. To guarantee
  safety, this is a hard real-time system. What is the per-frame latency budget that the entire inference
  pipeline must meet?
question: "What is the per-frame latency budget that the entire inference pipeline must meet?"
details:
  realistic_solution: The latency budget is 33.3 milliseconds. This is a hard real-time deadline, meaning
    that if the system takes longer than this to process a single frame, it has failed. This could result
    in a safety-critical event, like failing to detect an obstacle in time.
  common_mistake: Engineers often confuse real-time edge deadlines with other latency targets. They might
    recall the ~100ms budget for cloud services (a soft deadline for user experience) or the 16ms budget
    for mobile UI (to prevent 'jank' at 60 FPS). The key is to derive the budget directly from the system's
    operational frame rate.
  napkin_math: The calculation is a direct conversion from frames per second to milliseconds per frame.
  options:
  - 100 ms (Cloud Latency Confusion)
  - 16 ms (Mobile Jank Confusion)
  - 33 ms
  - 1 ms (TinyML Interrupt Confusion)
  correct_index: 2
