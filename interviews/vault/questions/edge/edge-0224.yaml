title: The 30 FPS Deadline (edge-0224)
scenario: Your team is designing the perception system for an autonomous vehicle. The main camera feed runs at 30 frames per second (FPS) to ensure smooth tracking of pedestrians and other vehicles. To guarantee safety, this is a hard real-time system.
question: What is the per-frame latency budget that the entire inference pipeline must meet?
details:
  realistic_solution: |
    In a hard real-time system, the latency budget is strictly derived from the frame rate: 33.3 milliseconds. If the full end-to-end perception pipeline (capture, pre-processing, inference, NMS, control output) exceeds this 33.3ms threshold for a single frame, the system violates its temporal deadline, resulting in a dropped frame or stale actuation data, which is a critical safety failure.
  common_mistake: |
    **The Pitfall:** Confusing hard real-time edge deadlines with soft cloud or UI latency targets.
    **The Rationale:** Engineers recall generic latency numbers (like 100ms for web services or 16ms for 60FPS UI) instead of deriving the budget from the system's operational frame rate.
    **The Consequence:** Designing a system that either drastically over-engineers the compute hardware (aiming for 16ms) or fatally misses safety deadlines (aiming for 100ms).
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard real-time deadline.
    - Target Frame Rate: 30 FPS.

    **Calculations:**
    - 1 second = 1000 milliseconds.
    - Latency Budget per Frame = 1000 ms / 30 FPS = 33.33 ms.

    **Conclusion & Interpretation:**
    - **Result: 33.3 ms maximum latency (Latency-Bound)**. Strict Temporal Deadline.
  options:
  - 1000 ms (Calculates 1 second without dividing by frames)
  - 16.6 ms (Calculates for 60 FPS instead of 30)
  - 33.3 ms
  - 3.3 ms (Off by an order of magnitude)
  correct_index: 2
