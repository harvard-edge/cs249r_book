title: Roofline Optimization on Qualcomm Cloud AI 100
scenario: Your team is deploying a vision transformer for real-time defect detection on an on-premise
  edge appliance equipped with a Qualcomm Cloud AI 100 accelerator. The hardware features 400 TOPS of
  INT8 compute, a 75W power envelope, and 32 GB of LPDDR4x memory providing roughly 136 GB/s of bandwidth.
  The quantized model requires 150 GOPS per inference and has an arithmetic intensity of 200 OPS/byte.
  Using roofline analysis, evaluate the expected utilization of this accelerator and determine whether
  you should prioritize structural pruning or dynamic batching to improve throughput.
question: "Using roofline analysis on Cloud AI 100, is the 150 GOPS ViT memory-bound or compute-bound, and should you prune or batch?"
details:
  realistic_solution: The candidate should calculate the hardware ridge point and compare it to the model's
    arithmetic intensity to identify the bottleneck. Because the model is heavily memory-bound on this
    specific hardware, pruning compute will yield no throughput gains. The optimal strategy is dynamic
    batching, which increases weight reuse, raises the effective arithmetic intensity, and moves the workload
    closer to the compute-bound region of the roofline.
  common_mistake: Candidates often see the massive 400 TOPS figure and immediately assume the workload
    will be compute-bound, proposing pruning or quantization to INT4. They fail to calculate the hardware's
    ridge point, missing that edge accelerators frequently have a severe compute-to-bandwidth imbalance.
  napkin_math: Hardware Ridge Point = Peak Compute / Peak Bandwidth = 400,000 GOPS / 136 GB/s ≈ 2941 OPS/byte.
    Model Arithmetic Intensity = 200 OPS/byte. Since 200 << 2941, the workload is strictly memory-bound.
    Max Achievable Performance = Model AI * Bandwidth = 200 OPS/byte * 136 GB/s = 27,200 GOPS = 27.2 TOPS.
    Expected Utilization = 27.2 TOPS / 400 TOPS = 6.8%.
