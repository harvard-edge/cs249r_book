title: Microcontroller Memory Hierarchy Penalty
scenario: You are deploying an audio wakeword model on a Cortex-M4 (120 MHz) with
  256 KB of SRAM (1 cycle access) and 1 MB of Flash memory (3 cycles access). The
  model has 300 KB of INT8 weights and mandates 50 KB of SRAM for activations.
question: Evaluate the placement of weights to minimize inference latency, and calculate
  the absolute time penalty in milliseconds for the required Flash accesses per inference
  assuming each weight is read exactly once.
visual:
  kind: svg
  path: edge-0974.svg
  alt: Horizontal stacked bar chart showing the Cortex-M4 memory tiers. SRAM (256KB)
    is split into 50KB Activations and 206KB Weights. Flash (1MB) holds the remaining
    94KB of Weights.
  caption: Optimal memory tier allocation for 300KB weights and 50KB activations on
    Cortex-M4.
details:
  realistic_solution: SRAM must first dedicate 50 KB to activations, leaving 206 KB
    for weights. The remaining 94 KB of weights must be stored in Flash. Accessing
    94 KB from Flash instead of SRAM incurs a penalty of 2 extra cycles per byte (3
    cycles - 1 cycle). This equates to 94,000 * 2 = 188,000 extra clock cycles. At
    a clock speed of 120 MHz, the time penalty is 188,000 / 120,000,000 = 0.00156
    seconds, or approximately 1.57 ms per inference.
  common_mistake: Failing to reserve the 50 KB activation memory in SRAM first, which
    would incorrectly allow 256 KB of weights into fast memory and underestimate the
    Flash penalty.
  napkin_math: 256KB - 50KB = 206KB SRAM. Flash payload = 94KB. 94K * 2 cycles = 188K
    cycles. 188K / 120MHz = 1.56ms.
