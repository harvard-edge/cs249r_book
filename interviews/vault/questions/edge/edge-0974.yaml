title: Microcontroller Memory Hierarchy Penalty
scenario: You are deploying an audio wakeword model on a Cortex-M4 (120 MHz) with 256 KB of SRAM (1 cycle access) and 1 MB of Flash memory (3 cycles access). The model has 300 KB of INT8 weights and mandates 50 KB of SRAM for activations.
question: Evaluate the placement of weights to minimize inference latency, and calculate the absolute time penalty in milliseconds for the required Flash accesses per inference assuming each weight is read exactly once.
visual:
  kind: svg
  path: edge-0974.svg
  alt: Horizontal stacked bar chart showing the Cortex-M4 memory tiers. SRAM (256KB) is split into 50KB Activations and 206KB Weights. Flash (1MB) holds the remaining 94KB of Weights.
  caption: Optimal memory tier allocation for 300KB weights and 50KB activations on Cortex-M4.
details:
  realistic_solution: SRAM must first dedicate 50 KB to activations, leaving 206 KB for weights. The remaining 94 KB of weights must be stored in Flash. Accessing 94 KB from Flash instead of SRAM incurs a penalty of 2 extra cycles per byte (3 cycles - 1 cycle). This equates to 188,000 extra clock cycles. At a clock speed of 120 MHz, the time penalty is approximately 1.57 ms per inference.
  common_mistake: |
    **The Pitfall:** Failing to reserve the 50 KB activation memory in SRAM first.
    **The Rationale:** Engineers often load as many weights as possible into SRAM (256 KB) without leaving room for the dynamic memory arena needed during inference.
    **The Consequence:** The application will trigger an Out-Of-Memory (OOM) fault or crash during execution, or incorrectly underestimate the Flash read latency penalty.
  napkin_math: |
    - **SRAM Allocation:** 256 KB total - 50 KB activations = 206 KB available for weights.
    - **Flash Allocation:** 300 KB total weights - 206 KB in SRAM = 94 KB in Flash.
    - **Cycle Penalty:** Flash (3 cycles) - SRAM (1 cycle) = 2 extra cycles per byte.
    - **Total Extra Cycles:** 94,000 bytes * 2 cycles/byte = 188,000 cycles.
    - **Time Penalty:** 188,000 cycles / 120,000,000 Hz = 0.00156 seconds = **1.56 ms**.
