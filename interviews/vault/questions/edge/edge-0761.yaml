title: The Edge Fleet Dashboard Overload
scenario: You're building a monitoring dashboard for 20,000 edge AI cameras (mix of Jetson Orin NX, Hailo-8
  on RPi, and Ambarella CV25 devices). Your first prototype streams all inference metrics to Grafana via
  Prometheus. Within a week, your monitoring backend is consuming more cloud compute than the edge fleet
  itself. How do you redesign the monitoring architecture?
question: "How do you redesign the monitoring architecture?"
details:
  realistic_solution: The problem is a **cardinality explosion**. Each device emits ~50 metric series
    (latency histograms, confidence distributions, per-class counts, thermal readings, memory usage).
    20,000 devices × 50 series × 1 sample/15s = 66,667 samples/second into Prometheus. Prometheus is designed
    for ~100K active series, but with histogram buckets you're at ~500K series — it's drowning.
  common_mistake: '"Just increase the scrape interval from 15s to 60s." This reduces volume 4× but doesn''t
    solve the fundamental architecture problem — you''re still pulling per-inference metrics from 20,000
    devices.'
  napkin_math: '**Naive approach:** 20,000 devices x 50 metric series x 4 samples/min = 4,000,000 samples/min
    = **66,667 samples/sec.** With 10 histogram buckets per series: 20,000 x 50 x 10 = 10M active time
    series (Prometheus struggles above ~1M). Data volume: 4,000,000 samples/min x 60 min x 24 hr x 16
    bytes/sample = **92 GB/day.** Cloud storage: 92 GB x $0.023/GB = $2.12/day. Cloud compute for Prometheus:
    ~$2,000/month (beefy instance for 10M series). | **Edge-aggregated approach:** Each device computes
    local aggregates (p50, p99, mean, count) per 5-min window. Upload: 20,000 devices x 10 aggregate metrics
    x 12 uploads/hr x 24 hr x 100 bytes = **576 MB/day.** Active series: 20,000 x 10 = 200,000 (well within
    Prometheus limits). | **Reduction:** 92 GB -> 576 MB = **~160x reduction** in data volume. Cloud compute:
    ~$100/month (small instance handles 200K series easily). | **Cost savings:** From ~$2,000/month to
    ~$100/month in compute, plus ~$60/month -> ~$0.40/month in storage.'
  options:
  - Model accuracy drift can only be detected by periodically re-labeling production data; statistical
    tests on input distributions are unreliable.
  - Rollback capability is unnecessary if the model was validated in the cloud, since cloud accuracy guarantees
    transfer to edge devices.
  - The problem is a cardinality explosion. Each device emits ~50 metric series (latency histograms, confidence
    distributions, per-class counts, thermal readings, memory usage). 20,000 devices × 50 series × 1 sample/15s
    = 66,667 samples/second into Prometheus.
  - Just increase the scrape interval from 15s to 60s.. This reduces volume 4× but doesn't solve the fundamental
    architecture problem — you're still pulling per-inference metrics from 20,000 devices.
  correct_index: 2
