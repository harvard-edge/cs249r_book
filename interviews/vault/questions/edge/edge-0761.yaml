title: The Edge Fleet Dashboard Overload
scenario: A monitoring dashboard for 20,000 edge AI cameras streams 50 metric series per device to Prometheus, overwhelming the backend.
question: How do you redesign the monitoring architecture?
details:
  realistic_solution: The problem is a cardinality explosion. The solution is edge-level pre-aggregation. Each device should compute 5-minute window aggregates (p50, p99, mean) and only upload the summarized metrics.
  common_mistake: |
    **The Pitfall:** Increasing the scrape interval from 15s to 60s to reduce load.
    **The Rationale:** Engineers often treat symptoms (high data volume) rather than the root cause (cardinality explosion and pulling raw metrics instead of aggregated data).
    **The Consequence:** This only reduces volume slightly but doesn't solve the fundamental architectural flaw, which will still overwhelm Prometheus.
  napkin_math: |
    1. **Assumptions & Constraints:** 20,000 devices. 50 series per device. 15s interval (4/min).
    2. **Calculations:** Total samples/sec = (20,000 * 50 * 4) / 60 = 66,667 samples/sec. Daily size = 4M samples/min * 1440 * 16 bytes = 92 GB/day. Edge aggregation (5-min windows, 10 metrics) = 20,000 * 10 * 12/hr * 24hr * 100B = ~5.7 GB/day.
    3. **Conclusion & Interpretation:** **Result: 16x Network/Storage Reduction.** Edge pre-aggregation prevents catastrophic cardinality explosions in cloud monitoring backends. **System Status: Telemetry-Bound.**
