title: The Edge Roofline Test
scenario: You're evaluating a new computer vision model for an autonomous delivery robot equipped with a Jetson AGX Orin. You've analyzed the model and found it has an arithmetic intensity of 2,000 Ops/Byte when running with INT8 precision.
question: Given an arithmetic intensity of 2,000 Ops/Byte on the Jetson AGX Orin, is the model compute-bound or memory-bound, and why?
details:
  realistic_solution: The model is **compute-bound**. The first step is to calculate the 'ridge point' of the Jetson AGX Orin, which is the ratio of its peak compute to its peak memory bandwidth. A model is compute-bound if its own arithmetic intensity is greater than this ridge point. For the Orin, the ridge point is approximately 1,342 Ops/Byte. Since the model's intensity (2,000 Ops/Byte) is greater than the hardware's ridge point, the system's performance is limited by its raw compute power (TOPS), not by the speed at which it can feed the processors with data.
  common_mistake: |
    **The Pitfall:** Concluding the model is memory-bound because the Arithmetic Intensity is "high".
    **The Rationale:** Candidates correctly calculate that the AI > Ridge Point, but erroneously assume this means it "needs a lot of memory bandwidth," reversing the logic of the roofline model.
    **The Consequence:** Misdiagnosing the bottleneck and applying the wrong optimizations (e.g., trying to optimize memory access instead of pruning compute).
  napkin_math: |
    *   Jetson AGX Orin peak compute: 275 TOPS (275e12 Ops/s).
    *   Jetson AGX Orin peak memory bandwidth: 204.8 GB/s (204.8e9 Bytes/s).
    *   Ridge Point = 275e12 / 204.8e9 = ~1,342 Ops/Byte.
    *   Model AI = 2,000 Ops/Byte.
    *   **Since 2,000 > 1,342, the model's arithmetic intensity is higher than the hardware's ridge point, making it compute-bound.**
  options:
  - Memory-bound, because the model's arithmetic intensity (2000) is greater than the Orin's ridge point (~1342 Ops/Byte).
  - Memory-bound, because the peak memory bandwidth (204.8 GB/s) is numerically much smaller than the peak compute (275 TOPS).
  - Compute-bound, because the model's arithmetic intensity (2000) is greater than the Orin's ridge point (~1342 Ops/Byte).
  - It's impossible to tell without knowing the model's latency in milliseconds.
  correct_index: 2
