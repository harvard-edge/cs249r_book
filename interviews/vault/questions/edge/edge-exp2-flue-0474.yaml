title: Cloud AI 100 Latency Decomposition
scenario: You are deploying an on-premise vision-language inference service using a Qualcomm Cloud AI
  100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). An edge client sends an image and text prompt over
  a local network (5ms latency). The server preprocesses the input (10ms). The model's prefill phase requires
  2 INT8 TOPS of compute, and the accelerator achieves 50% utilization of its peak 400 TOPS INT8 compute.
  After prefill, the model generates 50 additional tokens with a Time Per Output Token (TPOT) of 15ms.
  Post-processing and network return take 5ms. Calculate the Time to First Token (TTFT) and the total
  end-to-end latency.
question: "What are the TTFT and total end-to-end latency for the Cloud AI 100 service with 2 TOP prefill, 50 tokens at 15 ms TPOT, and the given overheads?"
details:
  realistic_solution: A realistic latency breakdown includes every component in the critical path. TTFT
    encompasses the initial network transfer, CPU-bound preprocessing, and accelerator-bound prefill compute.
    Total latency then adds the autoregressive generation time and the final post-processing/network return
    trip.
  common_mistake: Candidates often calculate TTFT based solely on the model's compute time, forgetting
    to include the initial network and preprocessing overhead. They may also fail to adjust the peak 400
    TOPS INT8 compute capacity by the given 50% utilization factor.
  napkin_math: '1. Effective Compute: 400 TOPS * 50% = 200 TOPS.

    2. Prefill Compute Time: 2 TOPS / 200 TOPS/s = 0.01s = 10ms.

    3. TTFT = 5ms (network) + 10ms (preprocessing) + 10ms (prefill) = 25ms.

    4. Generation Time = 50 additional tokens * 15ms/token = 750ms.

    5. Total End-to-End Latency = 25ms (TTFT) + 750ms (generation) + 5ms (post-processing/return) = 780ms.'
