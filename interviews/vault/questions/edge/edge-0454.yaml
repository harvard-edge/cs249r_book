title: The Autonomous Vehicle Scaling Trap
scenario: You are an ML Systems Engineer on an autonomous driving team, tasked with optimizing a new sensor fusion pipeline. The pipeline processes LiDAR point clouds on GPU 1 and fuses the result with camera data on GPU 2. Profiling reveals that the end-to-end latency is 50ms, missing the hard real-time deadline of 33ms. The compute on each GPU takes only 10ms, but the transfer of the 256MB intermediate 'bird's-eye-view' tensor from GPU 1 to GPU 2 is taking a staggering 30ms. You discover the two GPUs are in separate chassis connected by a 100 Gbps InfiniBand link.
question: Why is the 256 MB GPU-to-GPU transfer over 100 Gbps InfiniBand taking 30ms, and what architecture should replace it?
details:
  realistic_solution: 'The primary bottleneck is the interconnect topology itself. Using InfiniBand, even with RDMA, introduces network-level latencies (microseconds for the round-trip, plus protocol overhead) that are orders of magnitude higher than an on-board interconnect. The solution is to change the system architecture: both GPUs must be co-located in a single compute chassis and connected directly via an NVLink bridge. This changes the communication from a slow inter-node network hop to a direct, ultra-fast intra-node memory transfer.'
  common_mistake: |
    **The Pitfall:** Assuming a high-speed network fabric is a suitable replacement for a high-bandwidth, ultra-low-latency on-board bus.
    **The Rationale:** Engineers suffer from 'bandwidth myopia', becoming impressed by large numbers like '100 Gbps' without considering protocol overhead and topology.
    **The Consequence:** Misdiagnosing a topology problem as a simple bandwidth problem, leaving the real-time latency bottleneck unresolved.
  napkin_math: |
    1. InfiniBand (100 Gbps = 12.5 GB/s): 256 MB / 12.5 GB/s = 20.48 ms (+ ~10ms protocol latency) = 30ms observed.
    2. PCIe Gen4 x16 (32 GB/s): 256 MB / 32 GB/s = 8 ms.
    3. NVLink 4.0 (900 GB/s): 256 MB / 900 GB/s = 0.28 ms.
    4. Conclusion: NVLink is >70x faster for this payload. Both GPUs must be **co-located with NVLink**.
  options:
  - The InfiniBand link is saturated. We must upgrade to a 400 Gbps NDR link to increase bandwidth.
  - The bottleneck is software overhead in the RDMA drivers. We need to write a custom kernel module to reduce latency.
  - The use of an inter-node fabric (InfiniBand) for this tightly-coupled task is the bottleneck. The GPUs must be co-located in a single chassis with an NVLink bridge.
  - The PCIe bus on the host machine is saturated by other peripherals. We need to rearrange the PCIe cards.
  correct_index: 2
