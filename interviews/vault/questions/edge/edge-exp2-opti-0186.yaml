title: Optimizing KV Cache for Long-Context on Orin
scenario: We are deploying a 7B parameter Transformer model on an NVIDIA Jetson Orin (32 GB LPDDR5, 60W
  TDP, Ampere GPU) for a local long-document summarization task. As the context length approaches 8,192
  tokens during autoregressive generation, the time to first token is acceptable, but the decoding latency
  per token spikes severely and we observe heavy memory bandwidth utilization. Diagnose the architectural
  bottleneck causing this degradation and quantify the optimization impact of using Grouped-Query Attention
  (GQA) and INT8 KV-cache quantization.
question: "Why does decoding latency spike near 8,192 tokens on Jetson Orin, and how would GQA plus INT8 KV-cache quantization help?"
details:
  realistic_solution: The bottleneck is the memory traffic required to load the KV cache for every single
    token generated. The optimal fix is to reduce the size of the KV cache. By applying INT8 quantization
    to the KV cache and changing the architecture to use Grouped-Query Attention (GQA), we drastically
    reduce the memory footprint and the required bandwidth per decoding step, allowing the Orin to maintain
    high token generation rates.
  common_mistake: Candidates often assume the 275 TOPS INT8 compute capacity is the bottleneck and suggest
    weight pruning or migrating layers to the DLA accelerator. They fail to realize that autoregressive
    decoding is memory-bandwidth bound, and the growing KV cache is overwhelming the LPDDR5 bandwidth.
  napkin_math: 'For a 7B model (32 layers, d_model=4096) with FP16 KV cache: Size per token = 2 (K & V)
    * 2 bytes * 32 layers * 4096 = 524 KB. Total KV cache at 8k context = 8192 * 524 KB = 4.3 GB. Loading
    4.3 GB per generated token exhausts the Jetson Orin''s memory bandwidth. Applying INT8 KV quantization
    reduces precision to 1 byte, cutting cache to 2.15 GB. Implementing GQA with a 4:1 ratio (8 KV heads
    instead of 32) reduces the cache by another factor of 4. Final optimized KV cache = 2.15 GB / 4 =
    537 MB, reducing memory traffic by 8x.'
