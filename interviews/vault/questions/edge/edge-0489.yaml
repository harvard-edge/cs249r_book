title: 'The Sensor Fusion Bottleneck: Interconnect Topology'
scenario: You are designing the compute system for sensor fusion under a hard real-time budget of 15ms. Your prototype, using two GPUs, misses this budget due to a required peer-to-peer (P2P) exchange of a 32MB feature map between the two GPUs.
question: Which design should you choose for the 32 MB GPU P2P exchange under the 15ms budget, PCIe or NVLink?
details:
  realistic_solution: The primary bottleneck is the communication architecture in Design A. A P2P transfer over PCIe is fundamentally slower than a direct interconnect. While PCIe Gen5 has high theoretical bandwidth, it's a shared bus protocol that often involves the CPU root complex, adding significant latency. NVLink is a dedicated, point-to-point interconnect between GPUs, designed for exactly this kind of low-latency, high-bandwidth data exchange. The calculation shows the PCIe transfer takes a full millisecond, a huge portion of a 15ms real-time budget, whereas the NVLink transfer is trivial in comparison.
  common_mistake: |
    **The Pitfall:** Underestimating the latency impact of traversing a shared PCIe bus for P2P GPU communication.
    **The Rationale:** Engineers assume high theoretical PCIe bandwidth negates latency overhead, ignoring the CPU root complex bottlenecks.
    **The Consequence:** The communication step consumes the entire real-time budget, causing massive pipeline delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 32 MB. Deadline: 15ms. PCIe Gen4 x16 latency vs NVLink dedicated interconnect latency.
    2. **Calculations:**
       - PCIe Transfer Time: ~1.0 ms (due to root complex routing).
       - NVLink Transfer Time: ~36 µs (microseconds).
    3. **Conclusion & Interpretation:**
       - **Result: NVLink Required.** The PCIe transfer consumes nearly 7% of the entire 15ms budget just on I/O. NVLink reduces this bottleneck by orders of magnitude.
  options:
  - Design A is the bottleneck. The PCIe transfer takes ~1ms, which is orders of magnitude slower than the ~36µs on the NVLink-like interconnect.
  - Design B is the bottleneck. A custom board with a direct interconnect like NVLink has higher latency than using InfiniBand with RDMA.
  - Both designs are fine; the bottleneck is the LPDDR5 memory bandwidth on the GPUs, which cannot stage the 32MB of data quickly enough for either interconnect.
  - The communication time is negligible in both designs. The 15ms budget is being missed because the fusion algorithm is compute-bound, not I/O-bound.
