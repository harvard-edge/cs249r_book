title: Tail Latency from Thermal Throttling on Jetson Orin
scenario: A computer vision pipeline on Jetson AGX Orin (64GB LPDDR5, 275 TOPS INT8, 60W)
  processes 30 FPS camera feeds. In a 25°C lab, P99 frame latency is 28ms. In a 40°C
  deployment environment, P99 spikes to 95ms intermittently. The pipeline includes
  YOLOv8n inference at INT8.
question: What is causing the Jetson Orin P99 latency to jump from 28ms to 95ms at
  40°C, and how would you mitigate it?
details:
  realistic_solution: 'Monitor tegrastats to correlate throttle events with latency
    spikes. At 40°C ambient, the 60W power draw pushes the junction temperature to its 
    ~95°C limit, triggering thermal throttling. While compute (TOPS) is throttled, the true
    cause of the latency spike is memory bandwidth throttling (EMC frequency drop), which
    starves the pipeline. Mitigate by reducing the sustained power budget from 60W to 30W
    (e.g., switching from MAXN to 30W mode) to stay below thermal limits at 40°C ambient,
    ensuring consistent latency. Alternatively, implement active cooling or frame-dropping.'
  common_mistake: 'Assuming the latency spike is a software bug and spending time profiling
    CUDA kernels, or assuming the compute (TOPS) throttling is the bottleneck. YOLOv8n requires
    minimal compute, so memory bandwidth throttling is the actual bottleneck.'
  napkin_math: 'Jetson Orin thermal limits trigger at ~95°C junction temp. At 40°C
    ambient with 60W TDP: assuming 0.9°C/W passive thermal resistance, junction = 40 + 60*0.9
    = 94°C (throttling threshold). Throttling reduces TOPS by ~50%, from 275 to ~137 TOPS.
    YOLOv8n at INT8 needs ~8.7 GOPS; even at 137 TOPS, there is massive compute headroom.
    However, memory bandwidth (EMC) is also halved, causing memory-bound operations
    (like image preprocessing and OS overhead) to stretch the P99 latency from 28ms to 95ms.'
