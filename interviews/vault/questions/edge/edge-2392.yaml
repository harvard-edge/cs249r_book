title: Hailo-8 PIR Duty Cycling
scenario: A smart doorbell with a Hailo-8 accelerator is powered entirely by a solar-charged
  battery.
question: Evaluate the energy efficiency of using a small PIR (passive infrared) motion
  sensor to trigger the Hailo-8 versus keeping the Hailo-8 continuously active at
  1 FPS.
details:
  realistic_solution: The PIR sensor consumes milliwatts. Duty-cycling by keeping
    the accelerator powered off until motion is detected drastically reduces average
    power. In contrast, continuous 1 FPS inference still incurs the Hailo-8's high
    static leakage and baseline power costs continuously.
  common_mistake: Assuming that running an accelerator at extremely low FPS scales
    its power draw linearly down to zero.
  napkin_math: 2.5 W active vs ~0 W idle when off.
