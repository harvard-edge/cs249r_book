title: Hailo-8 PIR Duty Cycling
scenario: A smart doorbell with a Hailo-8 accelerator is powered entirely by a solar-charged battery.
question: Evaluate the energy efficiency of using a small PIR motion sensor to trigger the Hailo-8 versus keeping the Hailo-8 continuously active at 1 FPS.
details:
  realistic_solution: The PIR sensor consumes milliwatts. Duty-cycling by keeping the accelerator powered off until motion is detected drastically reduces average power. In contrast, continuous 1 FPS inference still incurs the Hailo-8's high static leakage and baseline power costs continuously.
  common_mistake: |
    **The Pitfall:** Assuming that running an accelerator at extremely low FPS linearly scales its power draw down to zero.
    **The Rationale:** Candidates map software utilization to hardware power consumption without accounting for static leakage.
    **The Consequence:** Designing a continuously running system that drains the battery due to high baseline power costs.
  napkin_math: |
    - **Continuous Inference:** Hailo-8 active at 1 FPS = 2.5 W constant draw.
    - **Duty-Cycled (PIR):** PIR sensor draws ~milliwatts. Hailo-8 powered off = **~0 W idle**.
