title: Real-time Data Drift Monitoring on Qualcomm Cloud AI 100
scenario: A critical real-time ML application is deployed on a Qualcomm Cloud AI 100, which provides 400
  TOPS INT8 performance and 32 GB LPDDR4x memory. This application processes a high-volume data stream
  where subtle shifts in input feature distributions could lead to significant performance degradation.
  Design a system to continuously monitor for data drift in the input features, specifically considering
  the hardware constraints and capabilities of the Qualcomm Cloud AI 100, without significantly impacting
  inference latency.
question: "How would you monitor input data drift on Qualcomm Cloud AI 100 without significantly impacting real-time inference latency?"
details:
  realistic_solution: A realistic solution involves using a two-tiered approach. First, perform feature
    engineering or dimensionality reduction (e.g., PCA, autoencoders) on a sampled subset of the input
    data stream to create a lower-dimensional representation. Second, apply lightweight, real-time statistical
    tests, such as Population Stability Index (PSI) or Kullback-Leibler (KL) divergence, on these reduced
    features. The sampling and drift detection logic should be carefully optimized, potentially running
    on dedicated less-intensive cores or leveraging the LPDDR4x for efficient buffer management, ensuring
    the main inference workload on the 400 TOPS INT8 remains unaffected. Alerts are triggered if drift
    exceeds a predefined threshold.
  common_mistake: A common mistake is to employ computationally expensive statistical tests (like full
    distribution comparisons) on the entire, high-dimensional input data stream directly on the inference
    accelerator. This can hog the 400 TOPS INT8 compute, consume excessive 32 GB LPDDR4x memory, or introduce
    unacceptable latency, ultimately starving the primary ML model inference task.
  napkin_math: If the Qualcomm Cloud AI 100 is processing 10,000 inferences per second, and you decide
    to sample 0.5% of the input data for drift detection, how many data points per minute would your drift
    detection module analyze? (10,000 inferences/sec * 0.005 sampling rate * 60 sec/min = 3,000 data points
    per minute for drift analysis).
