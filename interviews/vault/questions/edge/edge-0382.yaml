title: The Federated ROI Calculation
scenario: 'You are a Staff Engineer at an automotive company planning to continuously improve a driver-assist
  perception model across a fleet of 10,000 vehicles. You are comparing two strategies:'
question: "Given centralized costs of 10 GB/car/month at $0.05/GB plus $20/TB storage versus $200k federated CapEx, what is the break-even time?"
details:
  realistic_solution: The correct approach is to calculate the monthly recurring cost (OpEx) for the centralized
    strategy and the total upfront cost (CapEx) for the federated strategy, then find the break-even point.
  common_mistake: The most common mistake is to focus only on the obvious data transfer costs and massively
    underestimate the operational expense of manual data processing (privacy scrubbing, annotation). Another
    frequent error is to ignore one of the capital expenses for the federated approach, like the per-unit
    hardware BOM cost, focusing only on the infrastructure NRE.
  napkin_math: 'Centralized OpEx: 10,000 cars * 10 GB/month = 100,000 GB/month. Data cost: 100,000 * $0.05
    = $5,000/month. Server storage: 100 TB * $20/TB = $2,000/month. Total Centralized = $7,000/month.
    Federated CapEx: $150,000 engineering + $50,000 edge hardware = $200,000. Break-even = $200,000 /
    $7,000/month = ~28.5 months.'
  options:
  - ~140 months
  - ~2.4 months
  - ~3.4 months
  - The centralized approach is always cheaper
  correct_index: 2
