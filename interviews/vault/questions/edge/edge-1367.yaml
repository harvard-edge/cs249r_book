title: Randomized Smoothing on Edge TPU
scenario: You are deploying an intrusion detection camera using a Google Coral Edge TPU (4 TOPS INT8 compute, 2W power consumption). To defend against physical adversarial evasion attacks (like adversarial patches), you implement a randomized smoothing defense. This requires running N Monte Carlo inference passes of a quantized INT8 model, which takes 2 GOPS per pass, with Gaussian noise added to the input. Assume 100% TPU utilization and negligible CPU noise injection overhead.
question: At exactly 20 FPS, what maximum randomized smoothing pass count N can the Coral run, and what energy is consumed per smoothed frame?
details:
  realistic_solution: To find the maximum passes N, first determine the total GOPS available per frame by dividing the TPU's continuous throughput by the target FPS. Then, divide the per-frame GOPS budget by the per-pass compute cost. For energy, divide the continuous power draw (2 Joules/second) by the frame rate to get the energy per frame.
  common_mistake: |
    **The Pitfall:** Failing to correctly convert TOPS to GOPS, or miscalculating the per-frame energy.
    **The Rationale:** Candidates forget that 1 TOPS = 1000 GOPS, or they multiply power (Joules/sec) by the number of operations instead of dividing by the frame rate.
    **The Consequence:** The max passes and energy estimations are off by orders of magnitude, leading to completely unviable defense deployments.
  napkin_math: |
    - Coral TPU Compute Capacity = 4 TOPS = 4000 GOPS.
    - Compute budget per frame at 20 FPS = 4000 GOPS / 20 FPS = 200 GOPS/frame.
    - Maximum passes (N) = 200 GOPS / 2 GOPS/pass = 100 passes per frame.
    - Energy per frame = Power (2W = 2 Joules/sec) / 20 FPS = 0.1 Joules (100 mJ).
    **Conclusion: The system can run 100 randomized smoothing passes per frame, consuming 100 mJ per frame.**
