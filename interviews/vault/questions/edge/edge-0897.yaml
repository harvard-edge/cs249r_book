title: Camera Incast on Factory Floor
scenario: A factory floor edge deployment has 100 high-resolution QA cameras connected via 1GbE to a single 10GbE edge server. Every 100ms, all cameras simultaneously send a 200KB compressed image tensor for central inference.
question: What causes 100 cameras sending 200KB tensors every 100ms to produce P99 latency over 200ms, and how would you fix it?
details:
  realistic_solution: The system is experiencing TCP Incast. 100 cameras sending 200KB simultaneously creates a synchronized 20MB micro-burst. A standard edge switch has shared packet buffers (often 2MB-4MB). The synchronized burst overwhelms the switch egress buffer toward the 10GbE server port. The switch drops packets, forcing TCP retransmission timeouts (RTO), which default to 200ms in many Linux distributions. The fix is to introduce application-layer jitter (randomized offsets) to camera transmissions, or tune the TCP RTO minimum down to 1-5ms.
  common_mistake: |
    **The Pitfall:** Blaming the edge server's CPU or PCIe bus for ingestion bottlenecks.
    **The Rationale:** Focusing on the destination compute capabilities rather than analyzing the network switch's egress buffering during micro-bursts.
    **The Consequence:** Upgrading server hardware while the network switch continues to drop packets, leaving the P99 latency unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100 cameras, 200KB each. Synchronized transmission every 100ms.
       - Edge switch buffer: ~4MB.
    2. **Calculations:**
       - Burst size: 100 * 200 KB = 20,000 KB = 20 MB.
       - Buffer Overflow: 20 MB burst > 4 MB buffer = ~16 MB dropped.
       - Ideal 10GbE Transmit Time: 20 MB / 1.25 GB/s = 16 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Buffer-Bound. Latency jumps from 16ms to 200ms+ due to TCP RTO triggered by buffer overflow.**
