title: Camera Incast on Factory Floor
scenario: A factory floor edge deployment has 100 high-resolution QA cameras connected via 1GbE to a single
  10GbE edge server. Every 100ms, all cameras simultaneously send a 200KB compressed image tensor for
  central inference. The average latency is expected to be <5ms, but P99 latency frequently spikes >200ms,
  causing pipeline stalls.
question: "What causes 100 cameras sending 200KB tensors every 100ms to produce P99 latency over 200ms, and how would you fix it?"
details:
  realistic_solution: Identify TCP Incast. 100 cameras sending 200KB simultaneously creates a synchronized
    micro-burst. A standard edge switch has shared packet buffers (often 2MB-4MB). The synchronized burst
    overwhelms the switch egress buffer toward the 10GbE server port. The switch drops packets, forcing
    TCP retransmission timeouts (RTO), which default to 200ms in many Linux distributions. The fix is
    to introduce jitter (randomized offsets) to camera transmissions, increase switch buffers, or tune
    the TCP RTO minimum down to 1-5ms.
  common_mistake: Blaming the edge server's CPU or PCIe bus for not ingesting data fast enough.
  napkin_math: Burst size = 100 * 200KB = 20,000KB = 20MB. Typical edge switch buffer = 4MB. 20MB > 4MB.
    Egress port drops ~16MB of packets. Time to transmit 20MB at 10Gbps (~1.25GB/s) should be 20MB / 1.25GB/s
    = 16ms. Latency jumps from 16ms to 200ms+ due to TCP RTO.
