title: On-Device Active Learning Data Selection
scenario: You are designing an active learning data curation system for a fleet of autonomous inspection
  robots powered by the NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8). The primary perception model
  runs on the Ampere GPU, consuming 20 GB of memory and strictly operating within a 60W TDP. You need
  to implement an on-device data selection strategy using uncertainty sampling to curate hard examples
  from a 30 FPS 1080p camera stream. Evaluate how to size the data curation pipeline and memory buffer
  to fit within the remaining resources, utilize the DLA accelerator, and respect a limited 5 Mbps cellular
  uplink.
question: "How would you size and place the uncertainty-sampling pipeline on Jetson Orin so it fits memory, uses the DLA, and respects the 5 Mbps uplink?"
details:
  realistic_solution: The optimal approach offloads a lightweight, INT8 quantized uncertainty estimator
    (e.g., a small student model) to the DLA accelerator, preserving GPU resources and adhering to the
    60W TDP. Uninformative frames are discarded immediately in memory, while high-entropy frames are compressed
    (JPEG/H.265) and queued in a local buffer sized to the remaining RAM before being transmitted over
    the 5 Mbps uplink.
  common_mistake: Candidates often propose running complex ensemble-based uncertainty estimation (like
    MC Dropout) on the main GPU, which violates the power and resource constraints. They also frequently
    fail to calculate the memory required for raw frame buffering and ignore the severe bottleneck of
    the cellular uplink.
  napkin_math: 1080p RGB frame = 1920x1080x3 bytes ≈ 6.2 MB. At 30 FPS, raw throughput is 186 MB/s. Out
    of 32 GB LPDDR5, 20 GB is used by the main model and ~2 GB by the OS, leaving 10 GB for the curation
    buffer. 10 GB stores only ~53 seconds of raw video, necessitating immediate compression. Compressing
    selected hard examples to 1 MB JPEGs allows storing 10,000 frames in memory. A 5 Mbps uplink (0.625
    MB/s) takes 1.6 seconds to upload one 1 MB image, yielding a maximum continuous curation rate of ~37
    high-value frames per minute.
