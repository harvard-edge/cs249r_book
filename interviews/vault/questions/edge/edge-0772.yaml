title: The Hardware Lifecycle Cliff
scenario: Your company deployed 50,000 edge AI devices in 2022 using NVIDIA Jetson TX2 modules (Pascal GPU, 256 CUDA cores, 8 GB LPDDR4). It's now 2026. NVIDIA has announced end-of-life for the TX2: no more JetPack updates after 2027, no TensorRT updates after 2026. Your latest models require TensorRT 10 features (FP8 quantization, transformer engine) that will never be backported to Pascal. You can't replace 50,000 devices overnight.
question: How would you design a 3-year transition strategy for 50,000 Jetson TX2 devices reaching end of life?
details:
  realistic_solution: 'The transition requires a **tiered fleet strategy** with three concurrent tracks: **Track 1 — Extend (2026-2027):** Freeze the TX2 model architecture at the last compatible TensorRT version. Optimize within constraints: INT8 quantization (supported on Pascal), pruning, knowledge distillation from newer models. Maintain a dedicated CI/CD pipeline for TX2 that builds against JetPack 4.6 (last supported). Budget: ~$0 hardware, $400k/year engineering. **Track 2 — Hybrid offload (2026-2028):** For devices with network connectivity, implement a split-inference architecture: run the backbone on the TX2 locally, send intermediate features (compressed, ~50 KB) to a cloud endpoint running the latest model''s head on modern GPUs. This gives TX2 devices access to new model capabilities without hardware replacement. Latency increases by ~50ms (network round-trip). Budget: ~$55k/year cloud compute for 15k devices at low duty cycle. **Track 3 — Rolling replacement (2026-2028):** Replace devices in priority order: highest-value locations first, lowest-value last. Target: Jetson Orin Nano (10× performance, same power envelope, $199 module). At 15,000 devices/year over 2 years (30,000 total): $199 × 15,000 = $2.985M/year hardware + $750k/year installation. Total replacement cost: ~$7.47M. Total 3-year transition cost across all tracks: ~$8.8M. The key insight: not all 50,000 devices need the latest model. Segment the fleet by capability requirement and match the transition track to each segment.'
  common_mistake: |
    **The Pitfall:** Proposing to "just keep running the old models on old hardware" or "replace everything immediately."
    **The Rationale:** The first leads to a growing capability gap; the second is financially impossible.
    **The Consequence:** A strategy that either fails to meet business capability requirements or results in a rejected, cost-prohibitive budget.
  napkin_math: |
    * TX2 fleet sunk investment: 50,000 devices × $399 = $20M.
    * Full replacement with Orin Nano: 50,000 × $199 = $9.95M hardware + $50/device installation = **$12.45M total**.
    * Optimal mix transition plan:
      * Replace 30,000 high-priority devices (15k/year for 2 years).
      * Hybrid offload 15,000 medium-priority devices.
      * Freeze 5,000 low-priority devices.
    * Transition cost breakdown:
      * Replacement hardware + install: $7.47M.
      * Hybrid cloud compute: $164k.
      * Engineering maintenance: $1.2M.
    * Total 3-year transition cost: **$8.83M** (vs $12.45M for immediate full replacement).
