title: Designing Kernel Fusion for ViTs on Jetson Orin
scenario: You are tasked with designing the inference deployment specification for
  a Vision Transformer (ViT) on an NVIDIA Jetson Orin. The system must process real-time
  high-resolution video streams, but early profiling shows severe latency bottlenecks
  due to kernel launch overhead and memory-bound operations like LayerNorm and GELU.
  Given the platform's Ampere GPU, DLA accelerator, 32 GB LPDDR5 memory, and a strict
  60W TDP budget, specify a kernel fusion strategy to optimize the execution graph.
question: What kernel fusion strategy would you use for a ViT on Jetson Orin to reduce
  LayerNorm, GELU, and launch overhead within 60W?
details:
  realistic_solution: A robust specification analyzes the graph to separate compute-bound
    operations (mapped to the DLA for INT8 dense math or Tensor Cores on the Ampere
    GPU) from memory-bound operations. The design should utilize TensorRT to vertically
    fuse sequences of point-wise and reduction operations (e.g., fusing GELU directly
    into the epilogue of a preceding Linear layer, or combining LayerNorm with a subsequent
    projection's prologue) into custom CUDA kernels. This minimizes intermediate DRAM
    roundtrips and reduces GPU power consumption, ensuring the system safely operates
    within the 60W TDP.
  common_mistake: Candidates often propose fusing all sequential operators into massive
    monolithic kernels without analyzing the Ampere GPU's register pressure or shared
    memory limits. They also frequently ignore the DLA accelerator entirely or mistakenly
    attempt to map complex custom fused kernels to the DLA, which lacks support for
    arbitrary control flow.
  napkin_math: The NVIDIA Jetson Orin features 32 GB LPDDR5 memory (delivering ~204
    GB/s bandwidth). Consider a transformer block with 6 sequential memory-bound element-wise/reduction
    ops acting on a 5MB FP16 activation tensor. Without fusion, executing these as
    separate kernels requires 6 reads and 6 writes (12 * 5MB = 60MB). Fusing them
    into a single Ampere GPU kernel reduces this to 1 read and 1 write (2 * 5MB =
    10MB). At 204 GB/s, latency drops from ~294 microseconds to ~49 microseconds per
    block. Over a 12-block model running at 30 FPS, this saves ~8.8ms per frame, significantly
    reducing memory power draw towards the 60W TDP limit while freeing up resources
    for the 275 TOPS INT8 DLA to handle parallel inference tasks.
