title: PCIe Arbitration Jitter Buffer
scenario: '3 Hailo-8 M.2 modules run a pipeline via a PCIe Gen3 switch. PCI switch arbitration adds up to 50µs of unpredictable jitter per stage transfer. Each compute stage takes 1.5ms.'
question: Evaluate the minimum asynchronous queue depth required between stages to mathematically hide this jitter.
details:
  realistic_solution: 'Maximum compute variance is 50µs / 1500µs. To prevent pipeline bubbles from arbitration stalls, the queue must buffer enough time to absorb the variance. A depth of ceil(jitter / compute_time) + 1 is needed. Since 50µs is vastly smaller than 1.5ms, a minimal queue depth of 2 (double buffering) perfectly hides the sync jitter.'
  common_mistake: |
    **The Pitfall:** Over-provisioning the queue depth arbitrarily.
    **The Rationale:** Candidates often guess queue sizes (e.g., 10 or 100) without calculating the mathematical ratio of interconnect jitter to stage compute time.
    **The Consequence:** Wasting precious edge SRAM on unnecessary buffers while still risking pipeline bubbles if the math isn't verified.
  napkin_math: |
    * Jitter = 50 µs.
    * Compute time = 1500 µs (1.5ms).
    * Required Depth = ceil(Jitter / Compute Time) + 1.
    * Depth = ceil(50 / 1500) + 1 = 1.033 -> **2 buffers minimum** to mask jitter.
