title: PCIe Arbitration Jitter Buffer
scenario: 3 Hailo-8 M.2 modules run a pipeline via a PCIe Gen3 switch. PCI switch
  arbitration adds up to 50µs of unpredictable jitter per stage transfer. Each compute
  stage takes 1.5ms.
question: Evaluate the minimum asynchronous queue depth required between stages to
  mathematically hide this jitter.
details:
  realistic_solution: Maximum compute variance is 50µs / 1500µs. To prevent pipeline
    bubbles from arbitration stalls, the queue must buffer enough time to absorb the
    variance. A depth of ceil(jitter / compute_time) + 1 is needed. Since 50µs is
    vastly smaller than 1.5ms, a minimal queue depth of 2 (double buffering) perfectly
    hides the sync jitter.
  common_mistake: Over-provisioning queue depth arbitrarily without calculating the
    ratio of interconnect jitter to stage compute time, wasting precious SRAM.
  napkin_math: Depth = ceil(50 us / 1500 us) + 1 = 1.03 => 2 buffers minimum to mask
    jitter.
