title: Hailo-8 Dataflow Optimization and Memory-Bound Operator Fusion
scenario: You are designing an object detection pipeline for a battery-powered drone using a Hailo-8 accelerator. The model contains a sequence of memory-bound operations following the main convolutions. Since the Hailo-8 is a dataflow accelerator with no local DRAM and relies strictly on streaming from host memory, the host-to-device PCIe bandwidth is a major bottleneck.
question: How would you design the fusion strategy for these memory-bound operations to minimize latency and host memory access on the Hailo-8?
details:
  realistic_solution: The optimal design maps the sequence of memory-bound operations into a single continuous dataflow graph on the Hailo-8's spatial fabric. By configuring routing resources to stream the output of convolutions directly into subsequent units (activations, scaling) without returning to host memory, we bypass the PCIe bottleneck. This requires graph-level compiler fusion to ensure operations occupy adjacent compute units on the chip, forming a single streaming pipeline.
  common_mistake: |
    **The Pitfall:** Proposing standard GPU-style kernel fusion or caching intermediate tensors in local memory.
    **The Rationale:** Candidates apply CUDA thread block optimizations to a spatial dataflow architecture that lacks local DRAM.
    **The Consequence:** The proposed solution cannot be physically implemented on the Hailo-8, and streaming intermediate activations back and forth crushes the real-time frame rate.
  napkin_math: |
    1. Intermediate activation tensor: 4MB (INT8).
    2. Host memory read/write via PCIe Gen3 x4 (~3.9 GB/s): (4MB * 2) / 3.9 GB/s = ~2 ms per layer.
    3. Fusing 3 consecutive memory-bound ops saves 3 * 2ms = 6 ms per inference.
    4. Conclusion: Saving 6 ms is massive for a **33 ms/frame** (30 FPS) real-time target.
