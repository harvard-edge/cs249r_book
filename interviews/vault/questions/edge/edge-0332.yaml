title: The Edge Accelerator's Ridge Point
scenario: You're an ML systems engineer evaluating the NVIDIA Jetson AGX Orin for your company's autonomous delivery robots. You need to create a roofline model for this chip to calculate its 'Ridge Point' in INT8 precision.
question: Using the official specs—275 TOPS (Trillion INT8 Operations per Second) and 204.8 GB/s of memory bandwidth—what is the Ridge Point of the Jetson AGX Orin in Ops/Byte?
details:
  realistic_solution: The Ridge Point is the critical value of Arithmetic Intensity where a system's performance ceiling shifts from being limited by memory bandwidth to being limited by its computational capacity. It is calculated by dividing the peak compute throughput by the peak memory bandwidth.
  common_mistake: |
    **The Pitfall:** Mixing up the units for compute (Trillion Ops/s) and memory (GigaBytes/s).
    **The Rationale:** Candidates fail to convert Tera/Trillion (10^12) and Giga (10^9) to a common base, or confuse the calculation with power efficiency (TOPS/W).
    **The Consequence:** The calculated ridge point is off by a factor of 1,000, leading to completely incorrect performance bottleneck predictions.
  napkin_math: |
    * Peak Compute = 275 TOPS = 275 * 10^12 Ops/s.
    * Memory Bandwidth = 204.8 GB/s = 204.8 * 10^9 Bytes/s.
    * Ridge Point = Compute / Bandwidth = (275 * 10^12) / (204.8 * 10^9).
    * Ridge Point = 275,000 / 204.8 = **~1,342 Ops/Byte.**
  options:
  - ~4.6 Ops/Byte
  - ~1.3 Ops/Byte
  - ~1,342 Ops/Byte
  - ~0.74 Ops/Byte
  correct_index: 2
