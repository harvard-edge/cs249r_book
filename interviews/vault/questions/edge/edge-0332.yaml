title: The Edge Accelerator's Ridge Point
scenario: You're an ML systems engineer evaluating a new edge accelerator, the NVIDIA Jetson AGX Orin,
  for your company's autonomous delivery robots. To create a roofline model for this chip, you must first
  calculate its 'Ridge Point' in INT8 precision. Using the official specs—275 TOPS (Trillion INT8 Operations
  per Second) and 204.8 GB/s of memory bandwidth—what is the Ridge Point of the Jetson AGX Orin in Ops/Byte?
details:
  realistic_solution: The Ridge Point is the critical value of Arithmetic Intensity where a system's performance
    ceiling shifts from being limited by memory bandwidth to being limited by its computational capacity.
    It is calculated by dividing the peak compute throughput by the peak memory bandwidth. For the Orin,
    this means dividing its INT8 TOPS by its LPDDR5 GB/s. An application with an Arithmetic Intensity
    below this value is memory-bound, while an application with an AI above it is compute-bound.
  common_mistake: The most common mistake is mixing up the units for compute (Trillion Ops/s) and memory
    (GigaBytes/s), leading to an answer that is off by a factor of 1,000. Another frequent error is confusing
    the Ridge Point calculation with power efficiency (TOPS/W), which is a different, though related,
    metric.
  napkin_math: Peak Compute = 275 TOPS = 275,000,000,000,000 Ops/s
  options:
  - ~4.6 Ops/Byte
  - ~1.3 Ops/Byte
  - ~1,342 Ops/Byte
  - ~0.74 Ops/Byte
