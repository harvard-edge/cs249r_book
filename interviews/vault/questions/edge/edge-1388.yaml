title: LLaMA 7B INT8 Memory Footprint on Jetson Orin
scenario: You are tasked with deploying a 7 billion parameter language model locally on an autonomous drone powered by an NVIDIA Jetson Orin. The system operates under a strict 60W TDP, featuring 32 GB of unified LPDDR5 memory and an Ampere GPU with a DLA accelerator. To leverage the 275 TOPS INT8 compute capability, you will run the model quantized to INT8 precision.
question: What memory footprint do the 7B INT8 weights require, and how much of the Jetson Orin's 32 GB unified memory remains?
details:
  realistic_solution: The candidate should identify that INT8 precision requires exactly 1 byte per parameter. By multiplying the 7 billion parameter count by the 1-byte size, they obtain the static weight memory footprint. They must then subtract this value from the Orin's total 32 GB unified memory to find the remaining capacity, explicitly acknowledging that this remainder must accommodate the operating system, intermediate activations, and other running processes.
  common_mistake: |
    **The Pitfall:** Calculating using FP32 or FP16 despite INT8 being specified, or assuming the 32 GB is entirely dedicated VRAM.
    **The Rationale:** Candidates forget that INT8 requires exactly 1 byte per parameter, and they overlook that the Orin's memory is unified across the CPU, GPU, and OS.
    **The Consequence:** The memory footprint is grossly overestimated, or the candidate deploys a system that instantly crashes due to OS memory starvation.
  napkin_math: |
    - Parameters: 7,000,000,000 (7B).
    - Precision: INT8 = 1 byte per parameter.
    - Model Weight Memory: 7 * 10^9 * 1 byte = 7 GB.
    - Jetson Orin Total Memory: 32 GB unified LPDDR5.
    **Conclusion: The weights take 7 GB, leaving 25 GB available for the OS, KV cache, and other flight control stacks.**
