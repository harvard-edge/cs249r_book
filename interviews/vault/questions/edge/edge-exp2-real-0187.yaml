title: Canary Rollout of INT8 Model on Coral Edge TPU
scenario: You are deploying a new object detection model to a fleet of 5,000 smart cameras powered by
  Google Coral Edge TPUs. The new model offers better accuracy but requires full INT8 quantization, and
  some operators had to be rewritten to be supported by the Edge TPU compiler. You need to design a progressive
  canary rollout strategy that minimizes risk while verifying the new model's latency (target < 50ms)
  and accuracy in the field. How do you structure the rollout, and what specific telemetry do you monitor
  to decide whether to advance or rollback the deployment?
question: "How do you structure the rollout, and what specific telemetry do you monitor to decide whether to advance or rollback the deployment?"
details:
  realistic_solution: Implement a device-level canary rollout (e.g., 1%, 5%, 25%, 100%) based on device
    cohorts. During the canary, actively monitor Edge TPU utilization and inference latency telemetry
    to ensure no operations are falling back to the host CPU due to quantization or operator compatibility
    issues. If latency exceeds the 50ms budget, automatically halt the rollout and initiate a rollback.
  common_mistake: Candidates often suggest cloud-centric A/B testing like traffic splitting per request,
    which doesn't work for edge devices running local inference. They also frequently forget to account
    for the Edge TPU's strict INT8 requirement, where unsupported operators fall back to the host CPU
    and ruin latency during a canary phase.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS at 2W. For a target latency of 50ms (0.05s) per
    frame, the maximum operations per frame is 4 TOPS * 0.05s = 200 GOPS. If the new INT8 model requires
    150 GOPS, it theoretically takes 37.5ms on the TPU. However, if just 1% of operations (1.5 GOPS) are
    unsupported and fall back to a 10 GOPS host CPU, the CPU portion takes 1.5 / 10 = 150ms. Total latency
    becomes 37.5ms + 150ms = 187.5ms, immediately violating the 50ms budget and triggering a rollback.
