title: Data Pruning for Edge TPU Deployment
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV2-SSD) to a Google
  Coral Edge TPU (4 TOPS INT8, 2W, INT8 only) for an industrial inspection task. The model was initially
  trained on a very large dataset (10M images) but exhibits diminishing returns due to data redundancy.
  You suspect significant portions of the training data are either uninformative or highly correlated.
  To improve iteration speed and reduce training costs, you propose implementing a data pruning strategy
  like coreset selection or a similar data efficiency technique. How would you quantify the potential
  benefits of such a strategy, specifically targeting the limitations of the Edge TPU?
details:
  realistic_solution: Implement a coreset selection algorithm (e.g., based on k-centers, diversity, or
    importance sampling) to reduce the training dataset size by 50-70% while maintaining or slightly improving
    model accuracy for the specific task. The solution would involve defining a metric for data importance
    (e.g., gradients, uncertainty, influence functions) and iteratively selecting a subset of the data.
    This would significantly reduce the computational burden of retraining, allowing faster experimentation
    with hyperparameter tuning or architectural changes, and ultimately leading to a more robust model
    that performs optimally within the Google Coral Edge TPU's constraints (e.g., achieving target latency/throughput
    with INT8 operations).
  common_mistake: A common mistake is to focus solely on model compression (e.g., quantization, pruning
    model weights) without considering the efficiency gains possible from optimizing the training data
    itself. Another mistake is to apply naive data reduction without a clear metric for retaining critical
    information, potentially leading to 'model collapse' or degraded performance, especially on edge devices
    with limited inference capabilities.
  napkin_math: If an initial model takes 24 hours to train on 10M images, and a successful data pruning
    reduces the dataset to 3M images (70% reduction) while maintaining accuracy, the training time could
    theoretically be reduced by a factor of 10M/3M ≈ 3.33. This means a 24-hour training run could now
    take approximately 24 / 3.33 ≈ 7.2 hours. If each training run costs $X, this represents a cost saving
    of $X - $(X/3.33). Furthermore, if the Edge TPU can process 4 TOPS INT8, reducing model complexity
    or improving data quality means a more efficient model can leverage these operations more effectively
    for lower latency or higher frame rates per Watt.
