title: Analyzing Memory Bottlenecks in Unfused Operations on Orin
scenario: You are deploying a vision model on an NVIDIA Jetson Orin with 32 GB LPDDR5, 275 TOPS INT8 compute, and a 60W TDP. The model executes a sequence of layer normalization, element-wise addition, and GELU activation as separate CUDA kernels on the Ampere GPU. Profiling shows that despite the massive 275 TOPS INT8 compute capacity, GPU utilization is under 15% and latency is high.
question: Why do separate LayerNorm, add, and GELU CUDA kernels underutilize the Jetson Orin GPU, and how does fusion fix it?
details:
  realistic_solution: The operations (LayerNorm, Addition, GELU) have extremely low arithmetic intensity. Executing them separately on the Orin requires writing intermediate results back to the 32 GB LPDDR5 memory after each kernel, plus incurring three separate CUDA kernel launch overheads. Fusing these operators into a single kernel keeps intermediate activations in the Ampere GPU's fast on-chip registers, drastically reducing memory round-trips and completely eliminating the extra launch overheads.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute intensity or the 60W power limit throttling the GPU.
    **The Rationale:** Candidates look at standard metrics instead of analyzing kernel launch overhead and low arithmetic intensity.
    **The Consequence:** Wasting time optimizing arithmetic instructions when the system is bounded by memory round-trips and CUDA scheduling delays.
  napkin_math: |
    - **Compute Time:** For 10M ops at 275 TOPS INT8: 10e6 / 275e12 = **~36.3 ns**.
    - **Unfused Overheads:** 3 kernels $\times$ 5$\mu$s launch overhead = 15$\mu$s. Memory: 3 reads + 3 writes = 60MB traffic.
    - **Fused Overheads:** 1 kernel $\times$ 5$\mu$s launch overhead = 5$\mu$s. Memory: 1 read + 1 write = 20MB traffic.
    - **Result:** Fusion eliminates **10$\mu$s** in launch overhead and reduces LPDDR5 bandwidth utilization by **3x**.
