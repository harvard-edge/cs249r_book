title: Analyzing Memory Bottlenecks in Unfused Operations on Orin
scenario: You are deploying a vision model on an NVIDIA Jetson Orin with 32 GB LPDDR5,
  275 TOPS INT8 compute, and a 60W TDP. The model executes a sequence of layer normalization,
  element-wise addition, and GELU activation as separate CUDA kernels on the Ampere
  GPU. Profiling shows that despite the massive 275 TOPS INT8 compute capacity, GPU
  utilization is under 15% and latency is high. Explain why this specific execution
  pattern causes a bottleneck on this hardware and how operator fusion alters the
  execution profile.
question: Why do separate LayerNorm, add, and GELU CUDA kernels underutilize the Jetson
  Orin GPU, and how does fusion fix it?
details:
  realistic_solution: The operations (LayerNorm, Addition, GELU) have extremely low
    arithmetic intensity. Executing them separately on the Orin requires writing intermediate
    results back to the 32 GB LPDDR5 memory after each kernel, plus incurring three
    separate CUDA kernel launch overheads. Fusing these operators into a single kernel
    keeps intermediate activations in the Ampere GPU's fast on-chip registers, drastically
    reducing memory round-trips and completely eliminating the extra launch overheads.
  common_mistake: Candidates often assume the bottleneck is related to the compute
    intensity, the 60W power limit throttling the GPU, or that the INT8 precision
    limits are causing issues. They might incorrectly suggest optimizing the arithmetic
    instructions rather than identifying memory bandwidth and kernel launch overhead
    limits.
  napkin_math: 'For a 10MB activation tensor: At 275 TOPS INT8, compute time for 10M
    ops: 10e6 / 275e12 = ~36.3 ns. Unfused overhead: 3 kernels × 5us launch overhead
    = 15us. Unfused memory traffic: 3 reads + 3 writes = 60MB moved to/from 32 GB
    LPDDR5. Fused overhead: 1 kernel × 5us launch overhead = 5us. Fused memory traffic:
    1 read + 1 write = 20MB moved. Fusion saves 10us in launch overhead alone and
    reduces LPDDR5 memory bandwidth utilization by 3x, allowing the system to overcome
    the memory-bound limitation.'
