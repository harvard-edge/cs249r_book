title: Quantization Roofline Shift
scenario: Optimizing a dense neural network on an edge DSP. DSP specs: FP32 peak is 64 GFLOPS, INT8 peak is 64 GOPS. Memory bandwidth is 12.8 GB/s for both data types. The FP32 model requires 100 MOPS per inference and loads 50MB of weights/activations. You quantize the model to INT8 (data footprint becomes 12.5MB, operations remain 100 MOPS).
question: "What are the FP32 and INT8 inference times, and how does quantization shift the bottleneck?"
details:
  realistic_solution: Quantization affects both the Y-axis (peak compute) and X-axis (Arithmetic Intensity) of the Roofline model. In FP32, the workload has a very low Arithmetic Intensity and is heavily memory-bound, resulting in high latency due to the 50MB data transfer. Quantizing to INT8 reduces the data transfer by 4x. Because the operation count stays the same, the Arithmetic Intensity increases by 4x. This shift pushes the workload past the ridge point on the Roofline plot, changing it from a memory-bound workload to a compute-bound workload, drastically reducing inference time.
  common_mistake: |
    **The Pitfall:** Assuming quantization only improves performance if the peak compute TOPS increases.
    **The Rationale:** Since both FP32 and INT8 peak at 64 GOPS/GFLOPS, candidates assume there is no compute throughput gain.
    **The Consequence:** They miss that the 4x reduction in memory footprint fundamentally changes the workload's bottleneck from memory to compute.
  napkin_math: |
    1. Ridge Point (both FP32/INT8) = 64 GOPS / 12.8 GB/s = 5 OPS/Byte.
    2. FP32 Model AI = 100 MOPS / 50 MB = 2 OPS/Byte (Memory Bound).
    3. FP32 Mem Time = 50 MB / 12.8 GB/s = 3.9 ms.
    4. INT8 Model AI = 100 MOPS / 12.5 MB = 8 OPS/Byte (Compute Bound).
    5. INT8 Compute Time = 100 MOPS / 64 GOPS = 1.56 ms.
    6. **Inference time drops from 3.9ms to 1.56ms, and the bottleneck shifts from memory to compute.**
  options:
  - Quantization reduces the memory footprint, shifting the workload from memory-bound to compute-bound, dropping inference time to 1.56ms.
  - Quantization shifts the workload from compute-bound to memory-bound, dropping inference time to 1.56ms.
  - The bottleneck remains memory-bandwidth, but the 4x reduction in data transfer drops inference time to 0.98ms.
  - The inference time will not improve because the total MOPS and peak GOPS remain unchanged.
