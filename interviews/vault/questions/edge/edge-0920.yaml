title: Quantization Roofline Shift
scenario: 'Optimizing a dense neural network on an edge DSP. DSP specs: FP32 peak is 64 GFLOPS, INT8 peak
  is 64 GOPS. Memory bandwidth is 12.8 GB/s for both data types. The FP32 model requires 100 MOPS per
  inference and loads 50MB of weights/activations. You quantize the model to INT8 (data footprint becomes
  12.5MB, operations remain 100 MOPS). Calculate the inference time before and after quantization, and
  identify how the bottleneck shifts.'
question: "What are the FP32 and INT8 inference times, and how does quantization shift the bottleneck?"
details:
  realistic_solution: Quantization affects both the Y-axis (peak compute) and X-axis (Arithmetic Intensity)
    of the Roofline model. In FP32, the workload has a very low Arithmetic Intensity and is heavily memory-bound,
    resulting in high latency due to the 50MB data transfer. Quantizing to INT8 reduces the data transfer
    by 4x. Because the operation count stays the same, the Arithmetic Intensity increases by 4x. This
    shift pushes the workload past the ridge point on the Roofline plot, changing it from a memory-bound
    workload to a compute-bound workload, drastically reducing inference time.
  common_mistake: Assuming that since peak compute (64 GOPS) and total operations (100 MOPS) remain the
    same, quantization will not improve inference time if the device was compute-bound.
  napkin_math: "Ridge Point (both FP32/INT8) = 64 GOPS / 12.8 GB/s = 5 OPS/B.\nFP32 Model AI = 100 MOPS\
    \ / 50 MB = 2 OPS/B (Memory Bound). \nFP32 Mem Time = 50MB / 12.8 GB/s = 3.9ms.\nINT8 Model AI = 100\
    \ MOPS / 12.5 MB = 8 OPS/B (Compute Bound). \nINT8 Compute Time = 100 MOPS / 64 GOPS = 1.56ms.\nInference\
    \ time drops from 3.9ms to 1.56ms, and the bottleneck shifts from memory bandwidth to compute."
  options:
  - Switching to a lower precision format (e.g., INT4) will double the effective compute throughput and
    solve the utilization gap.
  - Assuming that since peak compute (64 GOPS) and total operations (100 MOPS) remain the same, quantization
    will not improve inference time if the device was compute-bound.
  - Automatic restart on failure is dangerous for safety-critical systems; manual intervention should
    always be required.
  - Quantization affects both the Y-axis (peak compute) and X-axis (Arithmetic Intensity) of the Roofline
    model. In FP32, the workload has a very low Arithmetic Intensity and is heavily memory-bound, resulting
    in high latency due to the 50MB data transfer. Quantizing to INT8 reduces the data transfer by 4x.
