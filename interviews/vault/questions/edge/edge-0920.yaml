title: Quantization Roofline Shift
scenario: You are optimizing a dense neural network on an edge DSP. The FP32 model requires 100 MOPS per inference and loads 50MB of weights/activations. You quantize the model to INT8, reducing the data footprint to 12.5MB while operations remain 100 MOPS.
question: What are the FP32 and INT8 inference times, and how does quantization shift the bottleneck?
details:
  realistic_solution: Quantization fundamentally shifts the workload across the hardware's Roofline model. In FP32, the heavily memory-bound workload suffers high latency due to the 50MB payload. PTQ/QAT to INT8 compresses the memory footprint by 4x, drastically increasing the Arithmetic Intensity. This pushes the workload past the ridge point, transitioning it from a memory-bound state to a compute-bound state and saturating the DSP's INT8 MAC units.
  common_mistake: |
    **The Pitfall:** Assuming quantization only improves performance if the peak compute TOPS increases.
    **The Rationale:** Since both FP32 and INT8 peak at 64 GOPS/GFLOPS, candidates assume there is no compute throughput gain.
    **The Consequence:** They miss that the 4x reduction in memory footprint fundamentally changes the workload's bottleneck from memory to compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DSP Compute Peak: 64 GFLOPS (FP32) / 64 GOPS (INT8).
       - Memory Bandwidth: 12.8 GB/s.
       - Workload: 100 MOPS.
    2. **Calculations:**
       - Hardware Ridge Point = 64 GOPS / 12.8 GB/s = 5 OPS/Byte.
       - FP32 Arithmetic Intensity = 100 MOPS / 50 MB = 2 OPS/Byte.
       - FP32 Latency = 50 MB / 12.8 GB/s = 3.9 ms.
       - INT8 Arithmetic Intensity = 100 MOPS / 12.5 MB = 8 OPS/Byte.
       - INT8 Latency = 100 MOPS / 64 GOPS = 1.56 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Transition from Memory-Bound (3.9ms) to Compute-Bound (1.56ms).**
  options:
  - Quantization reduces the memory footprint, shifting the workload from memory-bound to compute-bound, dropping inference time to 1.56ms.
  - Quantization shifts the workload from compute-bound to memory-bound, dropping inference time to 1.56ms.
  - The bottleneck remains memory-bandwidth, but the 4x reduction in data transfer drops inference time to 0.98ms.
  - The inference time will not improve because the total MOPS and peak GOPS remain unchanged.
