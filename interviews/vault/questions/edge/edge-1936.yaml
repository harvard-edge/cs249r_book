title: Edge AI Model Selection
scenario: Comparing MobileNetV2 vs EfficientNetB0 for a Jetson Orin deployment where LPDDR5 bandwidth limits efficiency.
question: Which model, MobileNetV2 or EfficientNetB0, would you deploy on the Jetson Orin, and why?
details:
  realistic_solution: Compare MobileNetV2's inverted residuals, which reduce memory traffic and improve cache utilization, against EfficientNet's compound scaling. MobileNetV2 offers better latency and power efficiency due to its emphasis on reducing memory operations, aligning perfectly with LPDDR5 limits.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs or parameter counts to choose the model.
    **The Rationale:** Engineers treat FLOPs as a direct proxy for latency without considering memory access patterns.
    **The Consequence:** Selecting a model that frequently stalls the memory bus, failing to utilize INT8 capabilities and exceeding thermal budgets.
  napkin_math: |
    1. **Assumptions & Constraints:** Jetson Orin LPDDR5 bandwidth = 204 GB/s.
    2. **Calculations:** A 10 MB model running at 100 FPS requires ~1 GB/s just for weight reads. Activations dominate memory traffic.
    3. **Conclusion & Interpretation:** **Result: Inverted residuals minimize footprint.** FLOPs are misleading; memory traffic defines edge power and latency. **System Status: Memory-Bandwidth-Bound.**
