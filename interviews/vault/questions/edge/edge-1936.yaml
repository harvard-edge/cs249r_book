title: 'Edge AI Model Selection: MobileNetV2 vs. EfficientNetB0 on NVIDIA Jetson Orin'
scenario: Your team is tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for a critical edge application where power efficiency and low latency are paramount. You have two pre-trained models, both achieving comparable detection accuracy on the target dataset: one based on MobileNetV2 and another on EfficientNetB0.
question: Which model, MobileNetV2 or EfficientNetB0, would you deploy on the Jetson Orin, and why?
details:
  realistic_solution: Compare MobileNetV2's inverted residuals, which reduce memory traffic and improve cache utilization, against EfficientNet's compound scaling. MobileNetV2 offers better latency and power efficiency due to its emphasis on reducing memory operations, which aligns perfectly with LPDDR5 bandwidth limits on the Jetson Orin under the 60W power budget.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs or parameter counts to choose the model.
    **The Rationale:** Engineers treat FLOPs as a direct proxy for latency without considering memory access patterns.
    **The Consequence:** Selecting a model that frequently stalls the memory bus, failing to utilize the Orin's INT8 capabilities and exceeding thermal budgets.
  napkin_math: |
    - **FLOPs to Inference Rate:** Jetson Orin provides 275 TOPS INT8 = 275,000 GOPS.
    - **Peak Throughput:** For a ~0.5 GOPS INT8 model, peak theoretical rate = 275,000 / 0.5 = 550,000 inferences/sec (ignoring memory bottlenecks).
    - **Memory Bandwidth Impact:** LPDDR5 bandwidth is ~204 GB/s. A 10 MB model running at 100 FPS requires ~1 GB/s just for parameter reads.
    - **Final Result:** **MobileNetV2's inverted residuals drastically reduce activation memory footprint, minimizing LPDDR5 bandwidth pressure and aligning better with the 60W constraints compared to EfficientNetB0.**
