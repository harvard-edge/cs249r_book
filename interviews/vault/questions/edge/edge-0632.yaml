title: The Autonomous Vehicle Power-Performance Paradox
scenario: You are the Lead ML Systems Architect at a new EV company designing a Level 3 autonomous driving system. Your team is finalizing the central compute module, which has a strict, passively-cooled thermal design power (TDP) of 30W.
question: Would you choose a monolithic GPU or a heterogeneous 30W compute module, and how does power duty cycle drive the decision?
details:
  realistic_solution: The correct approach is to advocate for a modified version of **Proposal B (Heterogeneous)**, or a hybrid. The core insight is that a single, monolithic GPU is deeply inefficient for a mixed workload under a strict power budget.
  common_mistake: |
    **The Pitfall:** Fixating purely on the peak TOPS of the most powerful chip and assuming "more is always better."
    **The Rationale:** Engineers often evaluate chips strictly by their spec sheet maximums, treating power and arithmetic intensity as secondary concerns.
    **The Consequence:** A monolithic GPU will waste massive amounts of its 30W budget idling or waiting on memory, leaving insufficient power for continuous perception tasks and violating the TDP.
  napkin_math: |
    1. **Monolithic GPU:** Draws ~25W, leaving 5W for everything else. Idle power is ~8W. 
    2. **Heterogeneous System:** DLA core draws ~5W for continuous 24/7 perception. GPU draws ~15W only during burst planning.
    3. **Idle Waste:** If the GPU idles 70% of the time, the monolithic chip wastes 0.7 * 25W = 17.5W continuously.
    4. **Result:** The heterogeneous system saves **~60% energy** over the vehicle's duty cycle while strictly respecting the 30W passive cooling limit.
