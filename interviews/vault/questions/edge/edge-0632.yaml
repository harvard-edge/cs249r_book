title: The Autonomous Vehicle Power-Performance Paradox
scenario: You are the Lead ML Systems Architect at a new EV company designing a Level 3 autonomous driving system. Your team is finalizing the central compute module, which has a strict, passively-cooled thermal design power (TDP) of 30W.
question: Would you choose a monolithic GPU or a heterogeneous 30W compute module, and how does power duty cycle drive the decision?
details:
  realistic_solution: Advocate for a heterogeneous compute module. A single, monolithic GPU is deeply inefficient for a mixed workload under a strict power budget due to idle power waste. A heterogeneous system delegates continuous perception to a low-power DLA and wakes the GPU only for burst planning.
  common_mistake: |
    **The Pitfall:** Fixating purely on the peak TOPS of the most powerful chip and assuming "more is always better."
    **The Rationale:** Engineers evaluate chips strictly by their spec sheet maximums, treating power and arithmetic intensity as secondary concerns.
    **The Consequence:** A monolithic GPU will waste massive amounts of its 30W budget idling or waiting on memory, leaving insufficient power for continuous perception tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30W TDP limit.
       - Monolithic GPU: 25W peak, 8W idle.
       - Heterogeneous: DLA (5W continuous), GPU (15W burst).
    2. **Calculations:**
       - Idle Waste (Monolithic): Idling 70% of the time means 0.7 * 25W = 17.5W continuously wasted.
       - Heterogeneous usage: DLA uses 5W continuously; GPU burst uses 15W only 30% of the time.
    3. **Conclusion & Interpretation:**
       - **Result: Heterogeneous design saves ~60% energy over the duty cycle, strictly respecting the 30W limit. (Power-Bound)**
