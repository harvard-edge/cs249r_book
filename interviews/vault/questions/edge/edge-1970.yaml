title: Optimizing Memory-Bound Operations on Hailo-8 via Kernel Fusion
scenario: You are deploying a deep learning model to a dataflow accelerator. Your current model has a critical path involving several sequential memory-bound operations (e.g., element-wise additions followed by ReLU activations and normalization layers). These operations, when executed as separate kernels, incur significant overhead due to repeated memory access and kernel launch latency, limiting throughput and energy efficiency.
question: How would kernel and operator fusion reduce latency and energy for sequential memory-bound INT8 ops on a dataflow accelerator?
details:
  realistic_solution: 'Identify sequences of memory-bound operations that can be fused into a highly optimized dataflow graph. Instead of writing intermediate results to external DRAM after each operation, the fused kernel keeps data in on-chip buffers (SRAM/registers) and streams it directly from one sub-operation to the next. This minimizes off-chip memory bandwidth requirements and reduces kernel launch overheads, significantly improving TOPS/W efficiency.'
  common_mistake: |
    **The Pitfall:** Treating each layer as a distinct, isolated computation that must write to global memory before the next begins.
    **The Rationale:** Applying standard Von Neumann CPU/GPU execution mental models to specialized spatial dataflow accelerators.
    **The Consequence:** Unnecessary global memory accesses and kernel launch overheads, destroying energy efficiency and limiting throughput on memory-bound workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence of N memory-bound ops (e.g., N=3).
       - Memory traffic per op: M = 1 KB read, 1 KB write.
       - Kernel launch overhead: L = 100 cycles.
    2. **Calculations:**
       - Separate execution traffic: 3 ops * (1 KB read + 1 KB write) = 6 KB traffic.
       - Separate overhead: 3 * 100 cycles = 300 cycles.
       - Fused execution traffic: 1 KB read (initial input) + 1 KB write (final output) = 2 KB traffic.
       - Fused overhead: 100 cycles.
       - Bandwidth savings: (6 KB - 2 KB) / 6 KB = 66.7% reduction.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization**. Fusing N memory-bound kernels reduces off-chip memory bandwidth requirements by roughly (N-1)/N, keeping intermediate data on-chip and drastically improving latency.
