title: The Edge VRAM Budget
scenario: >-
  You're a systems engineer on an automotive team deploying a 1.2 billion parameter vision transformer to an edge device. For the initial benchmark, the model will run in FP16 precision.
question: How much VRAM is required to store the FP16 weights of a 1.2B-parameter vision transformer, ignoring activations and OS overhead?
details:
  realistic_solution: The VRAM required is determined by the number of parameters and the size of each parameter. In FP16 precision, each parameter requires 2 bytes of storage. Therefore, a 1.2 billion parameter model will consume 2.4 GB of VRAM. This is a crucial first step in capacity planning for any edge device.
  common_mistake: |
    **The Pitfall:** Using the wrong byte multiplier for FP16.
    **The Rationale:** Engineers often apply INT8 (1 byte) or FP32 (4 bytes) rules of thumb, or confuse inference requirements with training states (e.g., Adam optimizers).
    **The Consequence:** Incorrectly estimating VRAM, leading to poor hardware selection or unexpected Out-Of-Memory (OOM) errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 1.2 billion (1.2 * 10^9).
       - Precision: FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Weight memory: 1.2 billion parameters * 2 bytes/parameter.
       - Total size = 2.4 billion bytes = 2.4 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The bare weights alone consume 2.4 GB of VRAM, acting as the absolute floor for edge device selection.
  options:
  - 1.2 GB
  - 2.4 GB
  - 4.8 GB
  - 19.2 GB
  correct_index: 1
