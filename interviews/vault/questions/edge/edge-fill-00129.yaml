title: 'Edge AI Costing: Large-Scale Vision Deployment on Hailo-8'
scenario: 'Your team is tasked with deploying a real-time object detection model on 10,000 Hailo-8 edge
  devices for a smart city surveillance project. The chosen model requires approximately 100 GOPS (INT8
  operations) per inference and needs to run continuously at 10 frames per second (FPS) for 24/7 operation
  over a 5-year lifespan. Each Hailo-8 accelerator offers 26 TOPS (INT8) compute capability with a typical
  power consumption of 2.5W during active inference.


  Your task is to estimate:

  1. The maximum theoretical inference throughput (FPS) achievable by a single Hailo-8 device for this
  specific model.

  2. The total annual energy consumption across all 10,000 devices.

  3. The total energy cost over the 5-year project lifespan, assuming an average electricity cost of $0.15
  per kWh.

  4. Identify potential hidden costs or considerations often overlooked in such large-scale edge deployments.'
details:
  realistic_solution: A robust solution requires benchmarking the specific model on the Hailo-8 to determine
    actual sustained GOPS/Watt in realistic operating conditions. It involves considering the full system
    power budget (including CPU, memory, peripherals, network interfaces), accounting for power supply
    unit efficiencies, and factoring in the total cost of ownership beyond just compute – including network
    infrastructure, maintenance, physical housing, and cooling. For edge devices, the distinction between
    active inference power and average power consumption over time (considering varying workloads or idle
    periods) is crucial, even if the scenario specifies 'active inference' power. Additionally, security
    updates, logging, and data backhaul can significantly impact long-term costs.
  common_mistake: Candidates often confuse theoretical peak TOPS with sustained real-world performance,
    underestimate quiescent power consumption (idle states, non-accelerator components), neglect power
    conversion inefficiencies, or fail to account for environmental factors (e.g., cooling in dense deployments)
    and software overhead. They might also miss the impact of data movement, network costs for model updates/telemetry,
    or maintenance expenses for a large fleet.
  napkin_math: "**1. Theoretical Max Inference Throughput (FPS) per Hailo-8 device:**\n   Hailo-8 capacity\
    \ = 26 TOPS = 26,000 GOPS (INT8)\n   Model requirement = 100 GOPS (INT8) per inference\n   Max FPS\
    \ = 26,000 GOPS / 100 GOPS/inference = 260 FPS\n   (This indicates a single Hailo-8 is theoretically\
    \ capable of handling the 10 FPS requirement with significant headroom.)\n\n**2. Total Annual Energy\
    \ Consumption across all 10,000 devices:**\n   Power per device (active) = 2.5 W\n   Operating hours\
    \ per year = 24 hours/day * 365 days/year = 8760 hours/year\n   Energy per device per year = 2.5 W\
    \ * 8760 h = 21900 Wh = 21.9 kWh\n   Total annual energy for 10,000 devices = 10,000 devices * 21.9\
    \ kWh/device = 219,000 kWh\n\n**3. Total Energy Cost over the 5-year project lifespan:**\n   Total\
    \ energy over 5 years = 219,000 kWh/year * 5 years = 1,095,000 kWh\n   Total energy cost = 1,095,000\
    \ kWh * $0.15/kWh = $164,250"
