title: Image Validation Gate Throughput Calculation
scenario: You are deploying a defect detection model on an NVIDIA Jetson Orin device
  on a manufacturing line. To ensure data quality, you implement a pre-processing
  validation check on incoming 10-megapixel grayscale images to detect corrupted frames
  before inference. The validation algorithm requires 200 INT8 operations per pixel.
  Given the Jetson Orin's 275 TOPS INT8 capacity, if you allocate exactly 0.2% of
  the total INT8 compute budget to this data quality check to reserve the rest for
  the Ampere GPU and DLA running the primary models, calculate the maximum frames
  per second (FPS) the system can validate.
question: With 0.2% of Jetson Orin's 275 TOPS allocated, what maximum FPS can validate
  10-megapixel frames at 200 INT8 ops per pixel?
details:
  realistic_solution: The candidate should calculate the operations required per frame,
    determine the total allowed operations per second based on the percentage of the
    Jetson Orin's TOPS, and divide the allowed operations by the operations per frame
    to find the max FPS.
  common_mistake: Candidates often miscalculate the unit conversions between TOPS
    (Tera Operations Per Second) and GOPS (Giga Operations Per Second), or fail to
    correctly apply the percentage budget to the total compute capacity.
  napkin_math: 1. Operations per frame = 10,000,000 pixels * 200 ops/pixel = 2,000,000,000
    ops = 2 GOPS. 2. Allowed compute budget = 0.2% of 275 TOPS = 0.002 * 275,000 GOPS
    = 550 GOPS. 3. Max validation FPS = 550 GOPS / 2 GOPS = 275 FPS.
