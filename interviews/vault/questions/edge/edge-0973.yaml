title: 'Accelerator Bottleneck Analysis'
scenario: 'A smart camera uses a Hailo-8 accelerator to run an object detection model requiring 12 GOPs per frame. The memory subsystem sustains 5 GB/s of bandwidth, and each inference pass requires streaming exactly 20 MB of intermediate feature maps and weights on/off-chip.'
question: 'Is the inference frame rate compute-bound or memory-bound, and what is the expected maximum theoretical FPS?'
details:
  realistic_solution: 'The compute latency per frame is 12 GOPs / 26 TOPS = 0.46 ms. The memory transfer latency per frame is 20 MB / 5 GB/s = 4.0 ms. Because the memory latency (4.0 ms) is nearly 10 times higher than the compute latency (0.46 ms), the system is severely memory-bound. Assuming perfect overlap, the maximum frame rate is constrained by the slower operation: 1 second / 4.0 ms = 250 FPS.'
  common_mistake: |
    **The Pitfall:** Basing the FPS solely on the accelerator's peak TOPS while ignoring the severe I/O bottleneck.
    **The Rationale:** Candidates often focus purely on compute capabilities without evaluating the memory bandwidth required to stream feature maps and weights.
    **The Consequence:** Leads to an artificially high and completely unachievable performance estimate like 2,100+ FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model requires 12 GOPs per frame.
    - Hailo-8 compute: 26 TOPS.
    - Intermediate feature maps and weights: 20 MB per frame.
    - Memory subsystem bandwidth: 5 GB/s.

    **Calculations:**
    - Compute latency per frame: 12 GOPs / 26 TOPS = 0.46 ms.
    - Memory transfer latency per frame: 20 MB / 5 GB/s = 4.0 ms.
    - Maximum theoretical frame rate = 1 second / 4.0 ms = 250 FPS.

    **Conclusion & Interpretation:**
    - **Result: 250 FPS (Memory-Bound)**. Since memory latency (4.0 ms) is nearly 10x higher than compute latency (0.46 ms), the system is severely memory-bound.
