title: Accelerator Bottleneck Analysis
scenario: A smart camera uses a Hailo-8 accelerator (26 TOPS INT8) to run an object
  detection model requiring 12 GOPs per frame. The memory subsystem sustains 5 GB/s
  of bandwidth, and each inference pass requires streaming exactly 20 MB of intermediate
  feature maps and weights on/off-chip.
question: Analyze whether the inference frame rate is compute-bound or memory-bound,
  and calculate the expected maximum theoretical frames per second (FPS).
details:
  realistic_solution: 'The compute latency per frame is 12 GOPs / 26 TOPS = 0.46 ms.
    The memory transfer latency per frame is 20 MB / 5 GB/s = 4.0 ms. Because the
    memory latency (4.0 ms) is nearly 10 times higher than the compute latency (0.46
    ms), the system is severely memory-bound. Assuming perfect overlap, the maximum
    frame rate is constrained by the slower operation: 1 second / 4.0 ms = 250 FPS.'
  common_mistake: Basing the FPS solely on the accelerator's peak TOPS while ignoring
    the severe I/O bottleneck, leading to an artificially high estimate like 2,100+
    FPS.
  napkin_math: Compute = 12G / 26T = 0.46ms. Memory = 20MB / 5GB/s = 4ms. Max FPS
    = 1000 / 4 = 250.
