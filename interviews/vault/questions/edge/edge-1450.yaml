title: 'Watchdog Resets Under Thermal Throttling'
scenario: 'A perception system for industrial automation is deployed on a Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x, 75W). To meet ISO 26262 functional safety requirements, a concurrent Built-In Self-Test (BIST) routine runs alongside the inference workload and must pet an external watchdog timer every 50ms. During peak thermal load testing, the system experiences intermittent watchdog resets, even though the primary INT8 inference consistently meets its strict 20ms latency deadline.'
question: 'Why does the BIST watchdog reset occur under peak thermal load even though INT8 inference still meets its 20ms deadline?'
details:
  realistic_solution: 'Under peak thermal load, the accelerator throttles its clock frequency to stay within the 75W power envelope, reducing the overall TOPS available. Because the realtime inference task has higher priority, it consumes all available throttled compute to meet its 20ms deadline. Consequently, the lower-priority background BIST routine is starved of compute cycles and fails to complete its routine within the 50ms window, causing the watchdog timer to trigger a system reset.'
  common_mistake: 'Candidates often assume the inference workload itself is failing or missing its deadline due to thermal throttling. They may miss the interaction between task prioritization, thermal frequency scaling, and the starvation of secondary safety tasks.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak hardware: 400 TOPS. Throttled hardware: 300 TOPS.
    - Inference workload: 6 TeraOps. BIST workload: 1 TeraOp.
    - Camera frame: 20ms. Watchdog deadline: 50ms.

    **Calculations:**
    - Peak scenario: Inference (6/400 = 15ms) + BIST (1/400 = 2.5ms) = 17.5ms total. Both complete well within 20ms.
    - Throttled scenario: Inference (6/300 = 20ms). Inference consumes 100% of the 20ms window.
    - BIST receives 0 TOPS during the throttled state.

    **Conclusion & Interpretation:**
    - **Result: 0 TOPS for BIST (Compute-Bound)**. High-priority workloads starving safety checks under thermal throttling breaks compliance.
