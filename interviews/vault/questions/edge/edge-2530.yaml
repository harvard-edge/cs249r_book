title: Mic Array I2C vs SPI Daisy Chain
scenario: 4 Cortex-M4 microphones sample audio at 32 KB/s each. They can be wired
  via a 400 kHz I2C daisy chain or a 10 MHz SPI star topology to a central MCU.
question: Evaluate the viability of these two network topologies for real-time aggregation.
details:
  realistic_solution: Total payload bandwidth is 4 * 32 KB/s * 8 bits/byte = 1.024
    Mbps. The 400 kHz I2C bus tops out at 0.4 Mbps and mathematically cannot support
    the throughput, causing permanent pipeline stalls. The 10 MHz SPI star topology
    easily supports 1.024 Mbps with minimal bus utilization.
  common_mistake: Choosing I2C to save wiring pins without mathematically verifying
    if the aggregated bandwidth exceeds the physical interconnect limit.
  napkin_math: Required BW = 4 * 32,000 * 8 = 1,024,000 bps = 1.024 Mbps. 1.024 Mbps
    > 0.4 Mbps I2C limit.
