title: Mic Array I2C vs SPI Daisy Chain
scenario: 4 Cortex-M4 microphones sample audio at 32 KB/s each. They can be wired via a 400 kHz I2C daisy chain or a 10 MHz SPI star topology to a central MCU.
question: Evaluate the viability of these two network topologies for real-time aggregation.
details:
  realistic_solution: The 400 kHz I2C bus tops out at 0.4 Mbps and mathematically cannot support the throughput required for 4 microphones, causing permanent pipeline stalls. The 10 MHz SPI star topology easily supports the bandwidth with minimal bus utilization.
  common_mistake: |
    **The Pitfall:** Choosing I2C solely to save wiring pins.
    **The Rationale:** Engineers often select simpler protocols for convenience, assuming bandwidth won't be an issue for "just audio."
    **The Consequence:** Failing to verify aggregated bandwidth against the physical interconnect limit causes irrecoverable audio data loss.
  napkin_math: |
    - **Payload Bandwidth:** 4 mics × 32 KB/s × 8 bits/byte = 1,024,000 bps (1.024 Mbps).
    - **I2C Capability:** 400 kHz = 0.4 Mbps.
    - **Final Result:** **1.024 Mbps > 0.4 Mbps I2C limit, proving the I2C topology physically impossible to implement.**
