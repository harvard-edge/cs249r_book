title: Mic Array I2C vs SPI Daisy Chain
scenario: 4 Cortex-M4 microphones (32 KB/s each) are wired via 400 kHz I2C or 10 MHz SPI.
question: Evaluate the viability of these two network topologies for real-time aggregation.
details:
  realistic_solution: The 400 kHz I2C bus tops out at 0.4 Mbps and mathematically cannot support the throughput required for 4 microphones, causing permanent pipeline stalls. The 10 MHz SPI star topology easily supports the bandwidth.
  common_mistake: |
    **The Pitfall:** Choosing I2C solely to save wiring pins.
    **The Rationale:** Engineers often select simpler protocols for convenience, assuming bandwidth won't be an issue for "just audio."
    **The Consequence:** Failing to verify aggregated bandwidth against the physical interconnect limit causes irrecoverable audio data loss.
  napkin_math: |
    1. **Assumptions & Constraints:** 4 mics * 32 KB/s. I2C max = 400 kHz.
    2. **Calculations:** Required = 4 * 32 * 8 = 1,024 kbps (1.024 Mbps). I2C = 0.4 Mbps.
    3. **Conclusion & Interpretation:** **Result: 1.024 Mbps > 0.4 Mbps.** The I2C protocol physically cannot carry the required data rate. **System Status: Interconnect-Bandwidth-Bound.**
