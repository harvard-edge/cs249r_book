title: 'Dynamic Batching Latency Spikes on Jetson Orin'
scenario: 'You are deploying a high-speed defect detection model on an edge device processing a 120 FPS camera feed. When switching from a static batch size of 1 to a dynamic batching policy with a maximum batch size of 4 and a timeout of 30ms, you observe that overall throughput improves, but the 99th percentile end-to-end latency spikes from 15ms to 50ms.'
question: 'Why does dynamic batching to batch size 4 with a 30 ms timeout raise p99 latency from 15 ms to 50 ms on the 120 FPS pipeline?'
details:
  realistic_solution: 'The latency increase is primarily driven by the queueing delay required to form the batch, not just the compute time. At 120 FPS, frames arrive sequentially. The first frame must sit in memory waiting for subsequent frames to arrive before the batch can be dispatched. While the accelerator processes the batch of 4 much faster than 4 sequential single batches, the wait time for the earliest frame dominates its total end-to-end latency. Use nsys profiling to trace batch formation delays.'
  common_mistake: |
    **The Pitfall:** Attributing the latency spike solely to hardware bottlenecks.
    **The Rationale:** Candidates often ignore the temporal nature of edge data ingestion and buffer accumulation time.
    **The Consequence:** Failing to account for the queueing delay required to form the batch when inputs arrive sequentially.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame arrival interval: 1000ms / 120 FPS = 8.33ms per frame.
    - Compute time for batch=4: ~20ms.
    - Memory Transfer Overhead: 5ms.

    **Calculations:**
    - Queueing delay for the first frame to wait for a batch of 4: 3 * 8.33ms = 25ms.
    - Total latency for the first frame: Queueing Delay (25ms) + Compute Time (20ms) + Overhead (5ms) = 50ms.

    **Conclusion & Interpretation:**
    - **Result: 50ms (Latency-Bound)**. The queueing delay dominates the latency for the first frame in a batch.
