title: The Timestamp Drift
scenario: Your autonomous vehicle fuses camera images (30 FPS) with LiDAR point clouds (10 Hz). In testing, 3D bounding boxes are accurate. In deployment at highway speed, the boxes consistently lag behind the actual vehicle positions by about 1-2 meters. The detection model hasn't changed.
question: What is causing the spatial error?
details:
  realistic_solution: Sensor timestamp misalignment. The camera and LiDAR have independent clocks and different capture latencies. The camera exposes a frame in ~5ms, while the LiDAR completes a sweep in 100ms. Naively pairing the latest frame from each sensor yields up to 100ms of temporal misalignment. At highway speed, this causes severe spatial offsets. The fix is hardware-triggered synchronization (PTP/PPS).
  common_mistake: |
    **The Pitfall:** Assuming the model needs retraining on highway-speed data.
    **The Rationale:** Engineers jump to ML solutions for system-level data pipeline issues.
    **The Consequence:** Wasting weeks gathering and labeling data for a problem rooted in sensor timing, which will not fix the issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Velocity: Highway speed = 30 m/s (108 km/h).
       - LiDAR sweep time: 100ms (10 Hz).
    2. **Calculations:**
       - Max Misalignment = 100ms.
       - Max Error = 30 m/s * 0.1s = 3.0 meters.
       - Average Misalignment = 50ms.
       - Average Error = 30 m/s * 0.05s = 1.5 meters.
    3. **Conclusion & Interpretation:**
       - **Result: Temporal-Bound**. A 50ms average timestamp drift physically produces a 1.5 meter spatial offset at highway speeds, directly matching the observed field error.
