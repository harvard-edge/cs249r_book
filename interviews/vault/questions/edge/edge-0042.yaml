title: The Timestamp Drift
scenario: Your autonomous vehicle fuses camera images (30 FPS, MIPI CSI) with LiDAR point clouds (10 Hz, PCIe). In testing, 3D bounding boxes are accurate. In deployment at highway speed, the boxes consistently lag behind the actual vehicle positions by about 1-2 meters. The detection model hasn't changed.
question: What is causing the spatial error?
details:
  realistic_solution: Sensor timestamp misalignment. The camera and LiDAR have independent clocks and different capture latencies. The camera exposes a frame in ~5ms (rolling shutter), while the LiDAR completes a 360° sweep in 100ms. If you naively pair "the latest frame from each sensor," you can have 50-100ms of temporal misalignment. At highway speed (30 m/s), a 50ms timestamp drift produces a 1.5 meter spatial offset. The fix is hardware-triggered synchronization or software compensation using IMU data.
  common_mistake: |
    **The Pitfall:** Assuming the model needs retraining on highway-speed data.
    **The Rationale:** Engineers jump to ML solutions for system-level data pipeline issues.
    **The Consequence:** Wasting weeks gathering and labeling data for a problem rooted in sensor timing, which will not fix the issue.
  napkin_math: |
    1. **Velocity:** Highway speed = 30 m/s (108 km/h).
    2. **Max Misalignment:** LiDAR completes a sweep in 100ms. Worst-case temporal misalignment = 100ms.
    3. **Max Error:** 30 m/s * 0.1s = **3.0 meters**.
    4. **Average Error:** Average misalignment (~50ms) = 30 m/s * 0.05s = **1.5 meters**.
    5. **Impact:** At 60 km/h (16.7 m/s), average error is 0.83m—still enough to misclassify a lane position.
