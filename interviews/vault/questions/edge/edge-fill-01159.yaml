title: Edge LLM OTA Update System Design for Qualcomm AI 100
scenario: Your team is deploying a new large language model (LLM) inference service to a fleet of 100,000
  edge devices powered by the Qualcomm Cloud AI 100. Each device features 32 GB LPDDR4x memory, delivers
  400 TOPS INT8 performance, and operates within a 75W power budget. The LLM requires a 10 GB firmware
  image, which includes the model weights and associated runtime. Design a robust and efficient OTA update
  system for this fleet. Your design must ensure a maximum update downtime (device offline) of 5 minutes
  per device and guarantee immediate rollback capability in case of update failure. Detail the architectural
  choices, including A/B partition schemes, and discuss how you would mitigate risks related to flash
  programming constraints, network bandwidth limitations, and power consumption during the update process.
question: "How would you design OTA updates for 100,000 Cloud AI 100 edge devices with 10GB firmware, <5min downtime, and immediate rollback?"
details:
  realistic_solution: Implement a hierarchical update strategy with a delta update mechanism (e.g., binary
    diffing) to minimize transmitted data, only sending changes to the 10GB firmware image. Utilize an
    A/B partition scheme on non-volatile storage to allow updates to be applied to the inactive partition
    while the device remains operational, ensuring near-instantaneous switchover and rollback capabilities.
    Design for staged rollouts to monitor stability across a subset of the fleet before a full deployment.
    Implement robust integrity checks (e.g., cryptographic signatures) for all firmware components. Optimize
    flash programming operations to be non-blocking and power-aware, leveraging the Qualcomm Cloud AI
    100's capabilities to manage update processes efficiently within the 75W envelope.
  common_mistake: Overlooking the cumulative network bandwidth requirements for a fleet of 100,000 devices,
    assuming a full 10GB image transfer for every update. Another common pitfall is underestimating the
    impact of flash wear/endurance from frequent updates and not designing for partial or delta updates,
    leading to reduced device lifespan or exceeding the downtime budget due to prolonged flash writes.
  napkin_math: Given a 10GB firmware image and an assumed average effective edge network bandwidth of
    10 Mbps, a full firmware download would take approximately (10 GB * 8 bits/byte) / (10 * 10^6 bits/second)
    = 8,000 seconds (~2.2 hours) per device. This significantly exceeds the 5-minute downtime budget.
    For a 1GB delta update and a flash write speed of 50 MB/s (common for eMMC/UFS), writing to the inactive
    partition takes 1 GB / 50 MB/s = 20 seconds. The remaining ~4.5 minutes of the downtime budget must
    account for partition switch, reboot, and post-update verification, making the overall design feasible
    with delta updates and A/B partitioning. Total fleet bandwidth for 100,000 devices at 1GB delta each,
    without optimization, would be 100 TB.
