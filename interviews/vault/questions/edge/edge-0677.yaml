title: 'The Brownout Weight Corruption: Memory Hierarchy Design'
scenario: Your Intel Movidius-based industrial inspection system is deployed in a rural factory with unstable
  power. After a brief brownout (voltage sag to 85V AC for 200ms), the system continues running but starts
  classifying every part as 'defective' — a 100% false positive rate. A full power cycle fixes it. The
  model file on eMMC is intact (checksum matches). What happened to the model in RAM?
question: "What happened to the model in RAM?"
details:
  realistic_solution: The Movidius VPU loads model weights from eMMC into LPDDR4 DRAM at boot. During
    the 200ms brownout, the AC input drops to 85V. The power supply unit (PSU) has bulk capacitors that
    maintain the 5V rail for ~100ms, but the voltage droops to 4.6V before the AC recovers. The 1.1V LPDDR4
    supply (derived from the 5V rail via a buck converter) droops to ~1.0V. LPDDR4 requires a minimum
    of 1.06V for reliable operation (JEDEC spec). At 1.0V, DRAM cells with the weakest retention (those
    storing '1' with the least charge) flip to '0'. This corrupts a small fraction of bits — perhaps 0.001%
    of the 50 MB model weights, or ~500 bytes.
  common_mistake: '"The brownout corrupted the model file on disk." But the checksum is fine — the on-disk
    model is intact. The corruption is in volatile memory.'
  napkin_math: 'Brownout: 85V AC for 200ms. PSU holdup: ~100ms at full load. LPDDR4 voltage droop: 1.1V
    → 1.0V (below 1.06V JEDEC minimum). Bit flip rate at 1.0V: ~0.001% of cells. Model size: 50 MB = 400M
    bits. Corrupted bits: ~4000. Supercapacitor holdup: 10F × 5V² / 2 / 5W = 25s. Cost: $5. Model reload
    time: 250ms. Weight CRC32 check: 0.25ms per 1 MB block. Full model verification: 50 × 0.25ms = 12.5ms.'
