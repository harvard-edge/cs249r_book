title: Camera Stream Sizing for Cloud AI 100
scenario: Your on-premise edge appliance processes multiple camera streams using a
  vision pipeline on a Qualcomm Cloud AI 100. The accelerator has a hard TDP of 75W,
  provides 400 TOPS of INT8 compute, and uses 32 GB of LPDDR4x memory. Your INT8 object
  detection model requires 2.5 TOPS per frame. Evaluate the maximum number of 30 FPS
  streams this accelerator can support without exceeding a strict 60W power cap dictated
  by the edge chassis thermal constraints.
question: How many 30 FPS streams can the Cloud AI 100 support for a 2.5 TOPS-per-frame
  model under the 60W chassis power cap?
details:
  realistic_solution: An L5 engineer will first calculate the compute requirement
    per stream, then model the power consumption by separating the accelerator's TDP
    into static and dynamic power. They will use the dynamic power efficiency to determine
    the maximum TOPS achievable within the reduced 60W budget before calculating the
    supported stream count.
  common_mistake: Candidates typically divide 400 TOPS by the per-stream TOPS requirement
    without accounting for the reduced 60W power cap or the non-linear relationship
    between utilization and power, often ignoring static power draw entirely.
  napkin_math: 1 stream at 30 FPS requires 2.5 TOPS * 30 = 75 TOPS. The Cloud AI 100
    offers 400 TOPS at 75W. Assuming 15W static power, the dynamic power budget is
    60W for 400 TOPS (0.15 W/TOPS). The chassis limits total power to 60W, leaving
    60W - 15W = 45W for dynamic power. Max sustainable compute is 45W / 0.15 W/TOPS
    = 300 TOPS. Maximum streams = floor(300 TOPS / 75 TOPS/stream) = 4 streams. Relying
    purely on the 400 TOPS spec would have incorrectly suggested 5 streams (375 TOPS),
    which would draw 15W + (375 * 0.15) = 71.25W and violate the chassis thermal limit.
