title: Shadow Mode on Tight Edge Memory
scenario: A new vision model is being deployed to a fleet of Jetson Nanos (2GB RAM). The host OS and camera buffer consume 0.5GB. The current production model requires 1.2GB of RAM. The team wants to run a new 1.2GB model in shadow mode to compare inference results on live data, but running both simultaneously causes an Out-Of-Memory (OOM) crash.
question: How would you compare the new 1.2GB vision model against the production model on the 2GB Jetson Nanos without causing an OOM crash?
details:
  realistic_solution: Implement time-multiplexed shadow testing or a fleet-wide fractional deployment.
    Since simultaneous execution exceeds physical memory, the system must trade temporal resolution for
    safe testing. The edge inference engine is reconfigured to load Model A, process frames for 5 seconds,
    flush it, load Model B, and process frames for 5 seconds. Alternatively, if dropping frames is unacceptable,
    abandon single-device shadow mode and use fleet-level A/B testing, where 50% of devices run Model
    A and 50% run Model B, comparing aggregate metrics in the cloud. Time-multiplexing trades latency/throughput
    for exact input parity; A/B testing trades exact input parity for continuous throughput.
  common_mistake: |
    **The Pitfall:** Using a swapfile on the SD card to fit both models into memory.
    **The Rationale:** Swapping is a standard OS-level fix for low memory, but developers ignore the massive latency penalty.
    **The Consequence:** Severe system performance degradation, missing real-time deadlines (e.g., 30fps) by orders of magnitude due to slow SD card reads.
  napkin_math: |
    1. **Memory required**: 0.5GB (OS) + 1.2GB (Model A) + 1.2GB (Model B) = 2.9GB.
    2. **Physical RAM**: 2.0GB. Deficit = 0.9GB.
    3. **Swap latency**: SD card reads at ~20MB/s. Swapping 0.9GB takes ~45 seconds per swap.
    4. **Multiplexing latency**: Swapping models sequentially from eMMC (~200MB/s) takes ~6 seconds of downtime per swap.
    5. **Conclusion**: Concurrent execution is impossible. The system must use **time-multiplexed shadow testing** or fleet-wide **A/B fractional deployment**.
