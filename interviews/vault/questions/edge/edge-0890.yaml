title: Shadow Mode on Tight Edge Memory
scenario: A new vision model is being deployed to a fleet of 2GB RAM edge devices. The host OS and camera buffer consume 0.5GB. The current production model requires 1.2GB of RAM. The team wants to run a new 1.2GB model in shadow mode to compare inference results on live data, but running both simultaneously causes an Out-Of-Memory (OOM) crash.
question: How would you compare the new 1.2GB vision model against the production model on the 2GB Jetson Nanos without causing an OOM crash?
details:
  realistic_solution: |
    Implement time-multiplexed shadow testing or a fleet-wide fractional deployment. Since simultaneous execution exceeds physical memory, the system must trade temporal resolution for safe testing. The edge inference engine is reconfigured to load Model A, process frames for 5 seconds, flush it, load Model B, and process frames for 5 seconds. Alternatively, use fleet-level A/B testing.
  common_mistake: |
    **The Pitfall:** Using a swapfile on the SD card to fit both models into memory.
    **The Rationale:** Swapping is a standard OS-level fix for low memory, but developers ignore the massive latency penalty.
    **The Consequence:** Severe system performance degradation, missing real-time deadlines (e.g., 30fps) by orders of magnitude due to slow SD card reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physical RAM: 2.0GB.
    - OS/Buffer requirement: 0.5GB.
    - Model A and Model B: 1.2GB each.
    - SD card swap speed: ~20MB/s.

    **Calculations:**
    - Total requested memory: 0.5GB + 1.2GB + 1.2GB = 2.9GB.
    - Memory Deficit: 2.9GB - 2.0GB = 0.9GB.
    - Swapping latency (SD card): 0.9GB / 20MB/s = 45 seconds per swap.

    **Conclusion & Interpretation:**
    - **Result: 0.9GB OOM deficit (Memory-Bound)**. Simultaneous execution is impossible; the system must implement time-multiplexed shadow testing or fractional A/B deployment.
