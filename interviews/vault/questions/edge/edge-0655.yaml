title: The Unexpected Cache Miss Storm
scenario: You're writing a pre-processing routine for an image classification model on an embedded Linux device. A simple loop that iterates over a 10MB image buffer, applying a pixel-wise transformation, is running much slower than expected, even on a high-frequency ARM core rated for 2.0 GHz.
question: What is a common hardware-level reason for such a slowdown in data-intensive loops, even on fast CPUs?
details:
  realistic_solution: The most common reason for this slowdown is **cache misses**. A 10MB image buffer is significantly larger than typical L1 (e.g., 32KB-128KB) and often L2 (e.g., 256KB-1MB) caches on edge ARM processors. When the CPU tries to access data that is not in its L1 or L2 cache, it incurs a cache miss. This forces the CPU to fetch data from the slower main memory (DRAM), which can take hundreds of CPU cycles. If the access pattern is not perfectly sequential or if other processes evict data from the cache, the problem is exacerbated, leading to a "cache miss storm." The CPU spends a disproportionate amount of time waiting for data rather than computing.
  common_mistake: |
    **The Pitfall:** Blaming the complexity of the pixel transformation or OS overhead.
    **The Rationale:** Software engineers often overlook the hardware-level cost of memory accesses and cache hierarchies.
    **The Consequence:** Wasting time profiling the arithmetic operations when the bottleneck is memory fetch latency.
  napkin_math: |
    - **L1 cache hit:** ~1-4 CPU cycles.
    - **L2 cache hit:** ~10-20 CPU cycles.
    - **DRAM access (cache miss):** ~100-300 CPU cycles.
    - **Impact:** A cache miss storm forces the CPU to spend **90%+ of its time stalled** waiting for memory.
