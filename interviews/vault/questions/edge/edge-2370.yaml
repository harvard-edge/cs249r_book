title: Edge Multi-Camera Sizing
scenario: A perception system on a Jetson AGX Orin processes 4 concurrent 1080p video
  streams at 30fps. The object detection model requires 50 GOPs per frame in INT8.
question: Formulate the total continuous TOPS requirement and specify whether the
  15W, 30W, or 60W power mode is required, assuming 30% sustained NPU utilization.
details:
  realistic_solution: The theoretical requirement is 4 streams * 30 fps * 50 GOPs
    = 6,000 GOPs or 6 TOPS. To sustain this at 30% hardware utilization, the NPU must
    be capable of 20 peak TOPS. The lowest 15W mode on the Orin provides well over
    this capacity and is sufficient.
  common_mistake: Confusing GOPs (Operations) with MACs (Multiply-Accumulates) or
    forgetting to divide the theoretical TOPS by the realistic utilization factor.
  napkin_math: (4 * 30 * 50) / 0.30 = 20 TOPS required.
