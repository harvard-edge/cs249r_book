title: The Watchdog Timer
scenario: Your edge device runs inference in a loop. Occasionally, the TensorRT engine hangs — the CUDA kernel never returns. The device appears healthy (network up, OS responsive) but produces no detections.
question: How do you detect and recover from a silent TensorRT engine hang when the OS remains responsive?
details:
  realistic_solution: Implement a hardware watchdog timer — a dedicated hardware peripheral that must be "kicked" at regular intervals. If the kick doesn't arrive within the timeout period, the watchdog triggers a hard reset.
  common_mistake: |
    **The Pitfall:** Relying on standard health checks like "process alive" or "port open".
    **The Rationale:** Engineers assume a dead process is the only failure mode, ignoring silent hangs blocked inside a CUDA call.
    **The Consequence:** The device stays online but useless indefinitely, requiring expensive manual intervention to power cycle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet of 10,000 devices. 0.1% daily hang rate.
       - Normal inference: 30ms.
       - Hardware watchdog timeout: 200ms.
    2. **Calculations:**
       - Devices hanging per day = 10,000 * 0.001 = 10 devices.
       - Without watchdog: 10 devices require manual reboot (hours of downtime).
       - With watchdog: Reboot triggered at 200ms + OS load time (~30s).
    3. **Conclusion & Interpretation:**
       - **Watchdog guarantees auto-recovery in <35s, preventing permanent fleet degradation. Result: Reliability-Bound Mitigation.**
  options:
  - Implement a hardware watchdog timer — a dedicated hardware peripheral that must be "kicked" at regular intervals. If the kick doesn't arrive within the timeout period, the watchdog triggers a hard reset.
  - Converting the model to a different framework's format (e.g., ONNX to TFLite) will automatically optimize it for the target hardware.
  - Check if the process is running.. The process *is* running — it's blocked inside a CUDA call.
  - The primary issue is insufficient hardware capability; upgrading to next-generation hardware will resolve the performance gap without software changes.
