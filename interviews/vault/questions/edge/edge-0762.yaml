title: The Edge-Cloud Sync Conflict
scenario: Your retail analytics system has 500 NVIDIA Jetson Nano devices in stores, each running a person-counting model. The cloud trains an improved model weekly using aggregated data. But stores have unreliable WiFi — some devices haven't synced in 3 weeks.
question: "How do you handle the sync, and what happens to the stale devices' inference results in the meantime?"
details:
  realistic_solution: 'This is a distributed consistency problem with two dimensions: model versioning and data reconciliation. Inference results must be tagged with the model version that generated them. When the device reconnects, the cloud accepts the old tagged data and applies a version-aware calibration/correction factor before aggregating it with data from newer models.'
  common_mistake: |
    **The Pitfall:** Pushing the latest model version when the device reconnects without handling historical data tags.
    **The Rationale:** This seems obvious but ignores data consistency and the analytics pipeline's need to know which model version generated which metric count.
    **The Consequence:** Stale devices overwrite or blend historical counts without version tags, leading to skewed aggregations and silently broken retail analytics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sync gap: 3 weeks (21 days).
       - Model size: 8 MB.
       - Payload: 1 count/minute, 20 bytes/count.
       - Connection: 5 Mbps WiFi (0.625 MB/s).
    2. **Calculations:**
       - Stale data size = 21 days * 24 hrs * 60 min * 20 bytes = ~604 KB (0.6 MB).
       - Total payload to sync = 8 MB (model down) + 0.6 MB (data up) = 8.6 MB.
       - Sync time = 8.6 MB / 0.625 MB/s = 13.76 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 13.8 seconds sync time** (Network-Bandwidth Bound).
