title: The Edge-Cloud Sync Conflict
scenario: Your retail analytics system has 500 NVIDIA Jetson Nano devices in stores, each running a person-counting model. The cloud trains an improved model weekly using aggregated data. But stores have unreliable WiFi — some devices haven't synced in 3 weeks. When they finally connect, the cloud has iterated through 3 model versions.
question: How do you handle the sync, and what happens to the stale devices' inference results in the meantime?
details:
  realistic_solution: 'This is a **distributed consistency problem** with two dimensions: model versioning and data reconciliation. Inference results must be tagged with the model version that generated them. When the device reconnects, the cloud accepts the old tagged data and applies a version-aware calibration/correction factor before aggregating it with data from newer models.'
  common_mistake: |
    **The Pitfall:** Pushing the latest model version when the device reconnects without handling historical data.
    **The Rationale:** This seems obvious but ignores data consistency and the analytics pipeline's need to know which model version generated which count.
    **The Consequence:** Stale devices overwrite or blend historical counts without version tags, leading to skewed aggregations and silently broken analytics.
  napkin_math: |
    * Average sync gap: 5 days (80% connect daily, 15% weekly, 5% monthly).
    * Stale devices at any time: ~25 on v(n-1), ~10 on v(n-2), ~3 on v(n-3).
    * Model engine per SKU: Nano engine = 8 MB.
    * Sync bandwidth per device: 8 MB model + 3 weeks * 24 hours * 60 min * 1 count/min * 20 bytes = 8 MB + 0.6 MB = 8.6 MB.
    * At 5 Mbps WiFi (0.625 MB/s): **14 seconds to sync.**
