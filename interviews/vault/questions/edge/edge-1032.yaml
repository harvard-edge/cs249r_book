title: 'Dataset Curation: Evaluate Centralized vs Federated Data Curation for Edge Fleet'
scenario: You manage 5,000 edge devices deployed in warehouses across 50 sites. You are comparing (A) centralized data collection: upload all images for cloud curation, vs (B) federated: on-device filtering with only gradient updates uploaded.
question: How do centralized upload, federated updates, and a hybrid approach compare for the 5,000-device warehouse data pipeline in terms of data quality, bandwidth, privacy, and model improvement rate?
details:
  realistic_solution: 'Key tradeoff: centralized gets full data quality control but costs bandwidth and raises privacy concerns. Federated reduces bandwidth 100× but gradients from small local datasets (100 images/device) are noisy. Hybrid: on-device pre-filtering + upload curated subset is often optimal.'
  common_mistake: |
    **The Pitfall:** Choosing federated learning purely for privacy without calculating bandwidth costs.
    **The Rationale:** Assuming gradient updates are always smaller than raw data, ignoring the size of modern LLM gradients vs small local datasets.
    **The Consequence:** Implementing a system that costs 4.5x more in bandwidth ($22k vs $5k) while suffering from gradient noise due to tiny per-device batch sizes.
  napkin_math: |
    * **Centralized Data Upload**: 5,000 devices × 100 images/day × 310 KB = 155 GB/day. Cost: 155 GB × $0.09/GB = $13.95/day = $5,093/year.
    * **Federated (No Compression)**: 5,000 devices × 14 GB/update = 70 TB/day (Prohibitive).
    * **Federated (100x Compression)**: 5,000 devices × 140 MB/update = 700 GB/day. Cost: 700 GB × $0.09/GB = $63/day = $22,995/year.
    * **Hybrid (Upload 20% filtered images)**: 5,000 devices × 20 images/day × 310 KB = 31 GB/day. Cost: 31 GB × $0.09/GB = $2.79/day = **$1,019/year**.
