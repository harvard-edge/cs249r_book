title: Define Fail-Operational vs Fail-Safe on Cloud AI 100
scenario: You are designing the reliability architecture for a critical video analytics pipeline running on a Qualcomm Cloud AI 100 on-premise inference accelerator. When the system experiences thermal throttling or sudden power constraints, it must activate a degradation ladder.
question: What is the exact difference between fail-safe and fail-operational states in this Cloud AI 100 edge deployment?
details:
  realistic_solution: 'The correct recall definition is that ''fail-safe'' stops the system without causing external harm (e.g., shutting down the pipeline and triggering an alert to save the power budget), while ''fail-operational'' continues core functions at a degraded level (e.g., QoS shedding or switching to a smaller INT8 fallback model). For an on-premise security accelerator, fail-operational is the required state to maintain continuous monitoring.'
  common_mistake: |
    **The Pitfall:** Confusing 'fail-safe' with 'fail-operational' by assuming 'fail-safe' implies running at a lower capacity.
    **The Rationale:** Candidates rely on colloquial definitions rather than strict system reliability engineering definitions, failing to recognize that 'safe' often means a harmless shutdown.
    **The Consequence:** Designing a degradation ladder that completely drops critical monitoring instead of shedding Quality-of-Service (QoS), leading to unacceptable blindness in a security context.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline load: 15 camera streams at 20 TOPS each = 300 TOPS.
    - Cloud AI 100 Compute: 400 TOPS INT8 (75W).
    - Power constraint: 40W limit forces proportional compute drop.
    - Fallback model: 10 TOPS.

    **Calculations:**
    - Degraded Compute Limit: (40W / 75W) * 400 TOPS = ~213 TOPS.
    - Fallback Compute Required: 15 streams * 10 TOPS = 150 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 150 TOPS < 213 TOPS (Compute-Bound Mitigated)**. Switching to the 10 TOPS fallback model enables a fail-operational state under the 40W constraint.
