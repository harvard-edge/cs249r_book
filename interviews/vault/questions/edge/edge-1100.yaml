title: 'Edge Queueing Theory Analyze: Tail Latency on Battery-Constrained Jetson'
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) is deployed on a drone with dynamic power throttling. At 60W: μ=200 inf/s. At 25W throttled: μ=80 inf/s. Arrival rate λ=70 inf/s.'
question: What are the M/M/1 utilization and P99 latency at 60W and 25W, and what happens if throttling drops service below arrivals?
details:
  realistic_solution: 'At 60W: ρ=70/200=0.35. Wq=0.35/(200*0.65)=2.7ms. W=2.7+5=7.7ms. P99=4.6*7.7=35ms. At 25W: ρ=70/80=0.875. Wq=0.875/(80*0.125)=87.5ms. W=87.5+12.5=100ms. P99=4.6*100=460ms. Factor of 13x P99 degradation from power throttle. If throttling drops to 20W: μ=60 < λ=70, queue is unstable (ρ>1), latency → ∞. Must implement load shedding at <20W.'
  common_mistake: |
    **The Pitfall:** Ignoring the stability boundary crossing.
    **The Rationale:** Candidates calculate simple latencies but fail to recognize that ρ crosses the stability boundary (ρ>1) during severe throttling.
    **The Consequence:** They miss that the queue becomes unstable, causing latency to grow without bound instead of just degrading gracefully.
  napkin_math: |
    *   **60W State:** ρ=0.35, Wq=2.7ms, P99=35ms.
    *   **25W State:** ρ=0.875, Wq=87.5ms, P99=460ms (13x degradation).
    *   **15W State:** μ=50 req/s < λ=70 → ρ=1.4 > 1, making the queue unstable.
    *   **Rate Limiting Fix:** Accept only 45 req/s at 15W (ρ=0.9). Wq=180ms, W=200ms, P99=920ms.
    *   **Result:** **Must accept a latency SLO violation rather than a stability violation.**
