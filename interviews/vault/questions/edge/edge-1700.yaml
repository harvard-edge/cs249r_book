title: Feature Distillation I/O Bottleneck
scenario: You distilled a high-resolution vision model for a Hailo-8 edge accelerator
  (26 TOPS INT8, 2.5W). Because the Hailo-8 has no local DRAM and streams dataflow
  from host memory, you observe a severe drop in compute utilization. Your student
  model, designed to support feature distillation, maintains a large early-stage feature
  map yielding a 16MB intermediate activation that must stream to host memory over
  a 4 GB/s bus and then be read back. You need to diagnose this bottleneck and quantify
  the impact of an architectural distillation fix.
question: What is the bottleneck from the 16MB intermediate activation on Hailo-8,
  and what distillation architecture change would remove it?
details:
  realistic_solution: Diagnose that the system is I/O bound due to streaming the massive
    activation to the host. The fix is to redesign the student model with an aggressive
    early spatial downsample (e.g., a larger initial stride) and shift the training
    strategy from intermediate feature matching to pure logit-based distillation.
  common_mistake: Candidates often focus solely on pruning weights to reduce the parameter
    count for the 26 TOPS INT8 compute, missing that the accelerator is stalled by
    activation I/O, not compute. They fail to recognize that matching the teacher's
    large intermediate features created a memory bandwidth bottleneck.
  napkin_math: Original I/O per frame is 16MB write + 16MB read = 32MB. At 4000 MB/s
    bandwidth, max throughput is 4000 / 32 = 125 FPS, leaving the 26 TOPS compute
    largely idle. By introducing an early 2x spatial downsample and halving the channels,
    the activation size drops by 8x to 2MB (4MB total I/O). The new bandwidth ceiling
    becomes 4000 / 4 = 1000 FPS, delivering an 8x throughput increase.
