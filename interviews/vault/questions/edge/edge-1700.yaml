title: Feature Distillation I/O Bottleneck
scenario: You distilled a high-resolution vision model for a Hailo-8 edge accelerator (26 TOPS INT8, 2.5W). The Hailo-8 has no local DRAM and streams dataflow from host memory over a 4 GB/s bus. Your student model maintains a large early-stage feature map yielding a 16MB intermediate activation that must stream to host memory and then be read back, causing a severe drop in compute utilization.
question: What is the bottleneck caused by the 16MB intermediate activation on Hailo-8, and what distillation architecture change would remove it?
details:
  realistic_solution: Diagnose that the system is I/O bound due to streaming the massive activation to the host. The fix is to redesign the student model with an aggressive early spatial downsample (e.g., a larger initial stride) and shift the training strategy from intermediate feature matching to pure logit-based distillation.
  common_mistake: |
    **The Pitfall:** Focusing purely on compute optimization (pruning weights) rather than memory I/O.
    **The Rationale:** Candidates often focus solely on pruning weights to reduce the parameter count for the 26 TOPS INT8 compute, missing that the accelerator is stalled by activation I/O, not compute.
    **The Consequence:** They fail to recognize that matching the teacher's large intermediate features created a memory bandwidth bottleneck, and proposed solutions will not improve performance.
  napkin_math: |
    * **Original I/O per frame:** 16MB write + 16MB read = 32MB
    * **Original Max Throughput:** 4000 MB/s / 32 MB/frame = 125 FPS (leaving 26 TOPS largely idle)
    * **Proposed Fix:** Introduce an early 2x spatial downsample and halve the channels
    * **New Activation Size:** 16MB / (2 * 2 * 2) = 2MB
    * **New I/O per frame:** 2MB write + 2MB read = 4MB
    * **New Max Throughput:** 4000 MB/s / 4 MB/frame = **1000 FPS** (an 8x throughput increase)
