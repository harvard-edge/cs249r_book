title: Robot Switch Bottleneck
scenario: A robot relies on a Jetson AGX Orin. It connects 2 LiDARs via Gigabit Ethernet
  to a 2.5 Gbps Ethernet switch.
question: Map the data flow topology and calculate if a 2.5 Gbps switch bottleneck
  will drop LiDAR data if each LiDAR outputs 1.2 Gbps.
visual:
  kind: svg
  path: edge-2338.svg
  alt: Two LiDAR nodes connecting to a central Switch, which connects to the Jetson
  caption: Sensor Network Topology
details:
  realistic_solution: 2 LiDARs * 1.2 Gbps = 2.4 Gbps. The 2.5 Gbps switch can nominally
    handle it, but TCP/IP/Ethernet overheads mean effective throughput drops. 2.4
    Gbps on a 2.5 Gbps link will experience severe queueing and packet loss.
  common_mistake: Comparing raw bitrates (2.4 vs 2.5) and falsely concluding the network
    is safe without considering protocol overhead.
  napkin_math: 2.4 Gbps > 0.9 * 2.5 Gbps max usable.
