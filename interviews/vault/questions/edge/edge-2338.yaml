title: Robot Switch Bottleneck
scenario: A robot relies on a Jetson AGX Orin. It connects 2 LiDARs via Gigabit Ethernet to a 2.5 Gbps Ethernet switch. Each LiDAR outputs 1.2 Gbps.
question: Map the data flow topology and calculate if a 2.5 Gbps switch bottleneck will drop LiDAR data.
visual:
  kind: svg
  path: edge-2338.svg
  alt: Two LiDAR nodes connecting to a central Switch, which connects to the Jetson
  caption: Sensor Network Topology
details:
  realistic_solution: 2 LiDARs * 1.2 Gbps = 2.4 Gbps. The 2.5 Gbps switch can nominally handle it, but TCP/IP/Ethernet overheads mean effective throughput drops. 2.4 Gbps on a 2.5 Gbps link will experience severe queueing and packet loss.
  common_mistake: |
    **The Pitfall:** Comparing raw bitrates directly (2.4 Gbps vs 2.5 Gbps) and concluding the network is safe.
    **The Rationale:** Candidates often forget that network links have protocol overhead (TCP/IP/Ethernet) and cannot sustain 100% of their theoretical physical bandwidth.
    **The Consequence:** Failing to account for protocol overhead leads to severe queueing and packet loss in the real deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** 2 LiDARs outputting 1.2 Gbps each. Switch capacity is 2.5 Gbps. TCP/IP/Ethernet protocol overhead is $\approx$ 10%.
    2. **Calculations:** Total LiDAR traffic = 2 * 1.2 = 2.4 Gbps. Effective switch bandwidth = 2.5 * 0.9 = 2.25 Gbps.
    3. **Conclusion & Interpretation:** **Traffic (2.4 Gbps) exceeds effective bandwidth (2.25 Gbps). Network-Bound bottlenecks will cause packet drops.**
