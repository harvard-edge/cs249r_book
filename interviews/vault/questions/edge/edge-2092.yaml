title: Optimizing Sensor Data Storage on NVIDIA Jetson Orin for Edge ML
scenario: You are deploying an ML system on an NVIDIA Jetson AGX Orin that continuously collects high-frequency sensor data. This data, consisting of 10 float32 features and a timestamp per record, must be stored locally on a 64 GB eMMC before being periodically uploaded. The primary use cases are real-time inference and batch analytics.
question: Which storage format and compression would you choose on Jetson Orin, and how many days of 10-feature float32 sensor records fit in 64 GB?
details:
  realistic_solution: 'Select a columnar format like Parquet. It excels for analytics (selective column reads) and compresses highly uniform sensor data efficiently. Pair it with a fast codec like Snappy or LZ4 to balance compression ratio with decompression speed on the Orin CPU, ensuring I/O doesn''t starve the inference pipeline.'
  common_mistake: |
    **The Pitfall:** Selecting row-oriented formats (like TFRecord) for mixed workloads.
    **The Rationale:** Engineers default to ML-native formats without realizing row-based storage ruins I/O efficiency when analytics queries only need 2 out of 10 columns.
    **The Consequence:** Wasted CPU cycles on decompression and massive I/O bottlenecks that stall real-time execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Record: 10 float32 (40 bytes) + 1 timestamp (8 bytes) = 48 bytes/record.
       - Ingestion rate: 1000 records/sec.
       - Storage: 64 GB (64 * 1024^3 bytes).
       - Compression: ~5x ratio using Parquet.
    2. **Calculations:**
       - Compressed record size = 48 bytes / 5 = 9.6 bytes.
       - Total records storable = (64 * 1024^3) / 9.6 = ~7.15 * 10^9 records.
       - Daily ingestion = 1000 * 3600 * 24 = 86,400,000 records/day.
       - Days of storage = (7.15 * 10^9) / 86,400,000 = ~82.8 days.
    3. **Conclusion & Interpretation:**
       - **Result: ~83 Days (Parquet/LZ4)**. The high compression ratio of columnar storage enables the edge device to hold nearly 3 months of history while remaining highly performant for batch queries.
