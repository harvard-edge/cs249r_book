title: 'Optimize Data Movement for Edge TPU Inference'
scenario: You are deploying a real-time object detection model on a Google Coral Edge TPU. The model takes a 512x512x3 (INT8) input tensor and outputs bounding boxes. Due to the Edge TPU's architecture, all model inputs and outputs must reside in host memory and be explicitly transferred to and from the device via a PCIe interface. You observe significant latency during inference, and profiling reveals that data transfer between the host CPU and the Edge TPU accounts for 30% of the total inference time.
question: How would you optimize host-to-Edge TPU data movement for the 512x512x3 INT8 detector when transfers consume 30% of latency?
details:
  realistic_solution: |
    The most realistic solution involves utilizing pinned (or page-locked) memory on the host. By allocating input and output buffers in pinned memory, the OS guarantees that these pages will not be swapped out, enabling more efficient and often asynchronous DMA transfers directly between the host and the Edge TPU. Furthermore, overlapping computation and communication by preparing the next inference's input while the current one is processing can significantly hide data transfer latency.
  common_mistake: |
    **The Pitfall:** Allocating input/output buffers in standard CPU-managed memory.
    **The Rationale:** Treating the Edge TPU like a fully integrated CPU+GPU system and ignoring explicit DMA transfer phases.
    **The Consequence:** Additional memory copies and cache misses occur, blocking the CPU and preventing asynchronous transfers, thus inflating latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input size: 512 x 512 x 3 bytes INT8 = 786,432 bytes (~0.78 MB).
    - PCIe transfer rate: ~1 GB/s.
    - Current Inference Time: 0.78 ms is 30% of latency, total is ~2.6 ms.

    **Calculations:**
    - PCIe transfer time: 0.78 MB / 1 GB/s = 0.78 ms.
    - Compute time: 2.6 ms - 0.78 ms = 1.82 ms.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound (PCIe DMA)**. Overlapping computation and communication can hide the 0.78 ms transfer time, reducing latency to ~1.82 ms.
