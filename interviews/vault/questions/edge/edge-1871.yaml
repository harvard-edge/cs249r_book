title: Optimize Data Movement for Edge TPU Inference
scenario: You are deploying a real-time object detection model on a Google Coral Edge
  TPU. The model takes a 512x512x3 (INT8) input tensor and outputs bounding boxes.
  The Edge TPU has a peak performance of 4 TOPS (INT8) and a thermal design power
  (TDP) of 2W. Due to the Edge TPU's architecture, all model inputs and outputs must
  reside in host memory and be explicitly transferred to and from the device via a
  PCIe interface. You observe significant latency during inference, and profiling
  reveals that data transfer between the host CPU and the Edge TPU accounts for 30%
  of the total inference time. Your goal is to optimize this data movement.
question: How would you optimize host-to-Edge TPU data movement for the 512x512x3
  INT8 detector when transfers consume 30% of latency?
details:
  realistic_solution: The most realistic solution involves utilizing pinned (or page-locked)
    memory on the host. By allocating input and output buffers in pinned memory, the
    operating system guarantees that these pages will not be swapped out, enabling
    more efficient and often asynchronous DMA transfers directly between the host
    and the Edge TPU without intermediate copies through the CPU's memory hierarchy.
    Furthermore, overlapping computation and communication by preparing the next inference's
    input while the current one is processing on the TPU can significantly hide data
    transfer latency.
  common_mistake: A common mistake is treating the Edge TPU as a fully integrated
    CPU+GPU system, not accounting for the explicit and potentially blocking data
    transfer phases. Developers might allocate input/output buffers in standard CPU-managed
    memory, leading to additional copies and cache misses, and fail to utilize features
    like pinned memory or asynchronous DMA transfers.
  napkin_math: Consider a 512x512x3 (INT8) input tensor and a similar sized output,
    totaling approximately 1.5 MB of data (2 * 512 * 512 * 3 bytes). With an effective
    PCIe bandwidth of 1 GB/s, the theoretical minimum transfer time for both input
    and output is roughly 1.5 MB / 1 GB/s = 0.0015 seconds or 1.5 ms. If this 1.5
    ms currently represents 30% of your total inference latency, your overall inference
    time is about 5 ms. How much could you improve latency by effectively overlapping
    this 1.5 ms data transfer?
