title: Thermal-Aware Inference Scheduler
scenario: Your autonomous vehicle's Jetson AGX Orin runs 5 perception models totaling 40W GPU power. The
  vehicle operates in Phoenix, Arizona (50°C ambient). After 20 minutes of continuous driving, the SoC
  hits its 97°C thermal throttle point and GPU clocks drop from 1.3 GHz to 0.9 GHz, increasing inference
  latency by 44%. Your safety system requires <33ms latency at all times. Design a thermal-aware scheduler
  that prevents throttling while maintaining safety-critical model deadlines.
details:
  realistic_solution: Build a closed-loop thermal controller that dynamically adjusts the inference workload
    based on thermal trajectory prediction.
  common_mistake: '"Just add a bigger heatsink or improve the cooling system." In an automotive environment,
    the cooling system is already optimized for the thermal envelope. The heatsink, heat pipes, and fan
    are sized for the TDP. The problem is that sustained 40W exceeds the thermal design — the cooling
    system was designed for 30W sustained with 40W bursts. You must manage the workload, not just the
    cooling.'
  napkin_math: 'Thermal trajectory: starting at 80°C, rising at 0.5°C/min under 40W sustained. Time to
    throttle (97°C): 34 minutes. With Level 2 management (33W): temperature rise rate drops to 0.2°C/min.
    Time to 97°C: 85 minutes — sufficient for most driving sessions. With Level 3 (30W): temperature stabilizes
    at ~90°C (thermal equilibrium where dissipation = generation). Power savings per level: L1 = 2W (5%),
    L2 = 7W (18%), L3 = 10W (25%), L4 = 20W (50%). Latency impact: L1 = 0% on Tier 1. L2 = 0% on Tier
    1, Tier 2 at 15 FPS instead of 30. L3 = 0% on Tier 1, Tier 2 latency +50% (DLA slower). L4 = 0% on
    Tier 1, Tier 2/3 disabled.'
