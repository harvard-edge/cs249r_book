title: 'Edge TCO Mastery: Full Lifecycle Cost Model for Industrial Edge AI'
scenario: 'Build a comprehensive 5-year TCO model for an industrial predictive maintenance system: 200 Jetson Orin units ($499, 60W) deployed in a steel mill. Include: hardware amortization, power, connectivity (industrial Ethernet, $2K/site setup + $500/yr), model retraining ($50K/year), maintenance contracts (5%), and opportunity cost of downtime prevention ($500K/year value). Calculate ROI and payback period.'
question: What is the 5-year TCO, ROI, and payback period for the 200-unit predictive maintenance deployment?
details:
  realistic_solution: 'Costs (5-year): Hardware = 200 * $499 = $99,800. Power = 200 * 60W * 43,800h * $0.10 / 1000 = $52,560. Connectivity = $2,000 + (5 * $500) = $4,500. Retraining = 5 * $50K = $250,000. Maintenance = 5% of HW/yr = 5 * ($99,800 * 0.05) = $24,950. Total 5-yr TCO = $99,800 + $52,560 + $4,500 + $250,000 + $24,950 = $431,810. Value (5-year): $500K * 5 = $2,500,000. ROI = ($2.5M - $431.8K) / $431.8K = 478%. Payback period: Year 1 costs = $99.8K (HW) + $10.51K (Power) + $2.5K (Conn) + $50K (Retraining) + $4.99K (Maint) = $167.8K. Year 1 value = $500K. Break-even occurs in about 4 months.'
  common_mistake: 'Building a cost-only model without including the value delivered (downtime prevention), making it impossible to calculate ROI. TCO must be paired with ROI analysis for business cases.'
  napkin_math: '5-yr TCO = $99.8K (HW) + $52.56K (Power) + $4.5K (Conn) + $250K (Retraining) + $24.95K (Maint) = $431,810. 5-yr Value = $2.5M. ROI = ($2,500,000 - $431,810) / $431,810 = 4.79 (479%). Payback: Year 1 cost = $167.8K. Break-even = $167.8K / $500K = 0.335 years = 4 months.'
