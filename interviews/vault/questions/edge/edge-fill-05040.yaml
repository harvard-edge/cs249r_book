title: Knowledge Distillation for Compressing ViT to MobileNet on Hailo-8
scenario: A ViT-B/16 teacher model (86M params, 17 GFLOPS, 81% top-1 on ImageNet) is used to distill a
  MobileNetV3-small student (2.5M params, 0.06 GFLOPS) for Hailo-8 deployment (26 TOPS INT8, 2.5W). The
  student baseline accuracy is 67%. With feature-based distillation (intermediate features + logits),
  estimate achievable accuracy.
question: "With feature-based distillation from ViT-B/16 to MobileNetV3-small on Hailo-8, what top-1 accuracy is realistically achievable?"
details:
  realistic_solution: 'Baseline student: 67% top-1. Logit-only distillation (soft targets, temperature
    T=4): typically adds 1.5-2.5% over hard-label training → ~69%. Feature-based distillation (matching
    intermediate representations): additional 1-2% → ~71%. Task-specific training (shorter sequences,
    data augmentation tuned for smaller model): another 0.5-1%. Realistic achievable: 70-72% top-1. At
    Hailo-8: MobileNetV3-small at INT8 runs in ~0.06 GFLOPS/26 TOPS = 2.3μs per image → >400K FPS — far
    faster than needed. Hailo-8 inference at 30fps: 0.06G/30=2M FLOPs budget — model fits easily. Focus:
    accuracy, not throughput.'
  common_mistake: Expecting distillation to fully close the accuracy gap between teacher (81%) and student
    (67%); the capacity gap between 86M and 2.5M parameters limits how much knowledge can be transferred.
  napkin_math: 'ViT teacher: 81% top-1. Student baseline: 67%. Distillation gains: +2% logit KD + 1.5%
    feature KD + 1% tuning = ~71.5%. Gap remaining: 81-71.5 = 9.5% irreducible capacity gap. Hailo-8 utilization:
    0.06 GFLOPS / 26 TOPS = 0.23% at 1 FPS — compute not the bottleneck.'
