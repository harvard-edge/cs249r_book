title: Design Speculative Decoding for Edge LLM on Jetson Orin
scenario: You are designing a speculative decoding system for a 7B target model on Jetson Orin NX. The target model takes 54.7ms/token (memory-bandwidth-bound decode). You have a 1B draft model that takes 8ms/token. Design the optimal speculation window k and estimate the speedup, given an acceptance rate α=0.80.
question: What speculation window k should you choose for the 7B target and 1B draft on Orin NX at α=0.80, and what speedup results?
details:
  realistic_solution: 'Speedup = E[accepted tokens] / time_per_cycle. E[accepted] with window k: (1-α^(k+1))/(1-α). Time per cycle: k × t_draft + t_target = k × 8ms + 54.7ms. Speedup = E[k,0.8] / (k×8+54.7) × 54.7 (normalized to single-token baseline). k=1: E=1.8/1, cycle=62.7ms, speedup=1.8×54.7/62.7=1.57×. k=2: E=2.44, cycle=70.7ms, speedup=2.44×54.7/70.7=1.89×. k=3: E=2.95, cycle=78.7ms, speedup=2.95×54.7/78.7=2.05×. k=4: E=3.36, cycle=86.7ms, speedup=3.36×54.7/86.7=2.12×. k=5: E=3.69, cycle=94.7ms, speedup=3.69×54.7/94.7=2.13×. Optimal k=5 (plateau). Speedup: 2.13×, decode from 7.0s to 3.3s.'
  common_mistake: |
    **The Pitfall:** Setting the speculation window `k` too large.
    **The Rationale:** Candidates often assume that generating more draft tokens is always better if the draft model is fast.
    **The Consequence:** For memory-bandwidth-bound systems, the target model verification cost grows linearly with `k`, leading to diminishing returns and eventually slowing down the system.
  napkin_math: |
    1. Expected accepted tokens E[k, α=0.8] = (1 - 0.8^(k+1)) / (1 - 0.8) = (1 - 0.8^(k+1)) / 0.2.
    2. For k=5: E[5, 0.8] = (1 - 0.8^6) / 0.2 = (1 - 0.262) / 0.2 = 3.69 tokens.
    3. Time per cycle: k * t_draft + t_target = 5 * 8ms + 54.7ms = 94.7ms.
    4. Speedup (normalized): E[k] * t_target / Time_per_cycle = 3.69 * 54.7ms / 94.7ms = 2.13x.
    5. Conclusion: Optimal k is around 4-6, yielding a **2.13x speedup**.
