title: Orin SSD Wear versus Recovery Time
scenario: A Jetson AGX Orin deployed on an inspection drone periodically loses power
  due to unstable batteries. It writes a 2GB model state checkpoint to an onboard
  NVMe SSD with a 500 Terabytes Written (TBW) endurance limit.
question: Analyze the trade-off between checkpointing every 1 minute versus every
  10 minutes regarding SSD wear-out time and worst-case recovery compute.
details:
  realistic_solution: 'Writing 2GB every minute generates 120GB/hour or 2.88TB/day.
    A 500 TBW SSD would fail in 500 / 2.88 = ~173 days. Checkpointing every 10 minutes
    reduces wear to 0.288TB/day, extending SSD life to ~1,736 days (nearly 5 years).
    The trade-off is the worst-case recovery time: losing up to 10 minutes of flight
    telemetry mapping instead of 1 minute.'
  common_mistake: Only analyzing the recovery time and completely ignoring the physical
    flash wear-out limitations typical of edge devices.
  napkin_math: 500000 / (2 * 60 * 24) = 173.6 days.
