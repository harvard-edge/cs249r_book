title: Hailo-8 Dataflow Streaming Bandwidth and Throughput Calculation
scenario: You are migrating an object detection model from a conventional edge GPU to a Hailo-8 dataflow
  accelerator to drastically reduce power consumption. The Hailo-8 provides 26 TOPS INT8 compute at just
  2.5W, but lacks local DRAM and must stream data directly from host memory. Your quantized INT8 model
  requires 13 GOPS per frame and processes a 1 MB input tensor. Calculate the theoretical maximum frames
  per second (FPS) achievable and the minimum host memory read bandwidth required to sustain this peak
  throughput.
question: "What theoretical maximum FPS and minimum host-memory read bandwidth are needed for the 13 GOPS/frame, 1 MB input model on Hailo-8?"
details:
  realistic_solution: First, determine the theoretical maximum frame rate by dividing the accelerator's
    peak compute capacity by the per-frame compute requirement. Because the Hailo-8 relies on a dataflow
    architecture without its own local DRAM, the host system must continuously stream the input tensors
    to keep the compute units fed. The minimum required host memory bandwidth is found by multiplying
    the maximum FPS by the input tensor size. This highlights the importance of balancing host I/O capabilities
    with edge compute acceleration.
  common_mistake: Candidates often forget to convert TOPS (Tera Operations) to GOPS (Giga Operations)
    correctly when calculating the frame rate. Additionally, they frequently overlook the architectural
    difference of having no local DRAM, failing to compute the host streaming bandwidth required to feed
    the dataflow accelerator.
  napkin_math: '1. Peak Compute = 26 TOPS = 26,000 GOPS.

    2. Maximum Throughput = 26,000 GOPS / 13 GOPS/frame = 2,000 FPS.

    3. Required Host Streaming Bandwidth = 2,000 FPS * 1 MB/frame = 2,000 MB/s (or 2.0 GB/s).

    4. Power Efficiency = 2,000 FPS / 2.5W = 800 FPS/Watt.'
