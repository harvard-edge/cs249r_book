title: Edge Drift Window Budget
scenario: An edge model monitors vibration sensors at 100 events/s per site across
  40 sites. A drift test needs 50,000 events per site for a stable histogram. Size
  the detection window per site and decide whether a 5-minute alert target is feasible.
question: Can a 100 events/s edge site collect 50,000 events for drift detection within
  a 5-minute alert target?
details:
  realistic_solution: Each site collects 100 x 300 = 30,000 events in 5 minutes, below
    the 50,000 needed. The required window is 50,000 / 100 = 500 seconds, or 8.3 minutes.
    A 5-minute alert target needs fewer bins, pooled sites, or a less sample-hungry
    detector.
  common_mistake: Using fleet-wide event volume and assuming it gives enough data
    for each individual site.
  napkin_math: 5-minute per-site events = 100 x 300 = 30,000. Required time = 50,000
    / 100 = 500 s = 8.3 min.
