title: The Hard Real-Time Challenge
scenario: You're designing the ML perception pipeline for a surgical robot that requires a hard real-time latency guarantee of 5ms from sensor input to actuator command.
question: How would you architect the software stack on an edge SoC to ensure this deterministic performance, especially when running complex ML models?
details:
  realistic_solution: "Achieving hard real-time guarantees for a surgical robot requires\
    \ a highly specialized software architecture.\n  1.  **Real-Time Operating System\
    \ (RTOS):** Use a true RTOS (e.g., QNX, FreeRTOS, VxWorks, or a Linux variant\
    \ with a PREEMPT_RT patch) that provides:\n      *   **Preemptive Scheduling:**\
    \ Higher-priority tasks immediately preempt lower-priority tasks.\n      *   **Priority\
    \ Inheritance/Ceiling:** Mechanisms to prevent priority inversion, where a high-priority\
    \ task gets blocked by a lower-priority task holding a shared resource.\n    \
    \  *   **Deterministic Latency:** Guaranteed upper bounds on interrupt latency\
    \ and context switching.\n  2.  **Dedicated Hardware:**\n      *   **CPU Core\
    \ Isolation:** Dedicate specific CPU cores to critical real-time tasks, isolating\
    \ them from non-real-time OS processes and background services.\n      *   **Memory\
    \ Locking:** Lock critical code and data into physical memory to prevent paging/swapping,\
    \ which introduces non-deterministic delays.\n      *   **Hardware Accelerators:**\
    \ Leverage dedicated ML accelerators (NPU, DSP) with Direct Memory Access (DMA)\
    \ to offload computation and minimize CPU involvement in data movement.\n  3.\n    \  **Software Design Principles:**\n      *   **Worst-Case Execution Time (WCET)\
    \ Analysis:** Rigorously determine the maximum execution time for every critical\
    \ path component (sensor reading, pre-processing, ML inference, post-processing,\
    \ control command generation). Design with sufficient headroom.\n      *   **Avoid\
    \ Dynamic Memory Allocation:** Heap allocations can introduce non-deterministic\
    \ delays. Pre-allocate all memory or use memory pools.\n      *   **Minimize Context\
    \ Switches:** Reduce the number of task switches to lower overhead.\n      * \
    \  **Fixed-Rate Processing:** Ensure all critical tasks run at a fixed, predictable\
    \ rate.\n      *   **Interrupt Handling:** Keep Interrupt Service Routines (ISRs)\
    \ as short as possible, deferring complex processing to dedicated high-priority\
    \ tasks.\n  4.  **Sensor & Actuator Interface:**\n      *   **Hardware Timestamps:**\
    \ Use hardware-level timestamps for all sensor inputs to ensure precise synchronization.\n\
    \      *   **Direct Register Access/DMA:** For critical I/O, bypass generic drivers\
    \ where possible for more direct hardware control.\n  5.  **Model Optimization:**\
    \ While not solely sufficient, extreme optimization of the ML model for the target\
    \ hardware (quantization, pruning, efficient operators) is still crucial to fit\
    \ within the WCET budgets."
  common_mistake: |
    **The Pitfall:** Suggesting to just use a powerful Linux system and highly optimize the ML model.
    **The Rationale:** Candidates confuse low average latency with guaranteed deterministic maximum latency.
    **The Consequence:** Standard Linux kernels cannot provide hard real-time guarantees, meaning the system will inevitably experience a latency spike that misses the 5ms deadline, potentially injuring a patient.
  napkin_math: |
    * Deadline = 5 ms.
    * Component WCET budgets:
      * Sensor reading: 0.5 ms
      * Pre-processing: 1.0 ms
      * ML inference: 2.0 ms
      * Post-processing: 0.5 ms
      * Actuator command: 0.5 ms
    * Total budgeted time = 4.5 ms.
    * Remaining margin = 0.5 ms for OS overhead and jitter.
    * **By rigorously bounding the WCET of every component to 4.5 ms, the system guarantees a response within the strict 5 ms deadline.**
