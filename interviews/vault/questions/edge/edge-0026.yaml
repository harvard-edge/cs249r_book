title: The Hard Real-Time Challenge
scenario: You are designing the ML perception pipeline for a surgical robot that requires
  a hard real-time latency guarantee of 5ms from sensor input to actuator command.
question: How would you architect the software stack on an edge SoC to ensure deterministic
  performance, especially when running complex ML models?
details:
  realistic_solution: Achieving hard real-time guarantees for a surgical robot requires
    a highly specialized software architecture. 1. **Real-Time Operating System (RTOS):**
    Use a true RTOS (e.g., QNX, FreeRTOS, VxWorks, or a Linux variant with a PREEMPT_RT
    patch) that provides Preemptive Scheduling, Priority Inheritance/Ceiling, and
    Deterministic Latency. 2. **Dedicated Hardware:** CPU Core Isolation, Memory Locking,
    Hardware Accelerators. 3. **Software Design Principles:** Worst-Case Execution
    Time (WCET) Analysis, Avoid Dynamic Memory Allocation, Minimize Context Switches,
    Fixed-Rate Processing, Interrupt Handling. 4. **Sensor & Actuator Interface:**
    Hardware Timestamps, Direct Register Access/DMA. 5. **Model Optimization:** Extreme
    optimization of the ML model for the target hardware is crucial to fit within
    the WCET budgets.
  common_mistake: '**The Pitfall:** Suggesting to just use a powerful Linux system
    and highly optimize the ML model.

    **The Rationale:** Candidates confuse low average latency with guaranteed deterministic
    maximum latency.

    **The Consequence:** Standard Linux kernels cannot provide hard real-time guarantees,
    meaning the system will inevitably experience a latency spike that misses the
    5ms deadline, potentially injuring a patient.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Deadline = 5 ms.

    - Component WCET budgets: Sensor reading (0.5 ms), Pre-processing (1.0 ms), ML
    inference (2.0 ms), Post-processing (0.5 ms), Actuator command (0.5 ms).


    **Calculations:**

    - Total budgeted time = 0.5 + 1.0 + 2.0 + 0.5 + 0.5 = 4.5 ms.

    - Remaining margin = 5.0 - 4.5 = 0.5 ms for OS overhead and jitter.


    **Conclusion & Interpretation:**

    - **Result: 4.5 ms (Compute-Bound)**. By rigorously bounding the WCET of every
    component to 4.5 ms, the system guarantees a response within the strict 5 ms deadline.

    '
