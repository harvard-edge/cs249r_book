title: The Hard Real-Time Challenge
scenario: You're designing the ML perception pipeline for a surgical robot that requires a hard real-time
  latency guarantee of 5ms from sensor input to actuator command. How would you architect the software
  stack on an edge SoC to ensure this deterministic performance, especially when running complex ML models?
question: "How would you architect the software stack on an edge SoC to ensure this deterministic performance, especially when running complex ML models?"
details:
  realistic_solution: "Achieving hard real-time guarantees for a surgical robot requires a highly specialized\
    \ software architecture.\n  1.  **Real-Time Operating System (RTOS):** Use a true RTOS (e.g., QNX,\
    \ FreeRTOS, VxWorks, or a Linux variant with a PREEMPT_RT patch) that provides:\n      *   **Preemptive\
    \ Scheduling:** Higher-priority tasks immediately preempt lower-priority tasks.\n      *   **Priority\
    \ Inheritance/Ceiling:** Mechanisms to prevent priority inversion, where a high-priority task gets\
    \ blocked by a lower-priority task holding a shared resource.\n      *   **Deterministic Latency:**\
    \ Guaranteed upper bounds on interrupt latency and context switching.\n  2.  **Dedicated Hardware:**\n\
    \      *   **CPU Core Isolation:** Dedicate specific CPU cores to critical real-time tasks, isolating\
    \ them from non-real-time OS processes and background services.\n      *   **Memory Locking:** Lock\
    \ critical code and data into physical memory to prevent paging/swapping, which introduces non-deterministic\
    \ delays.\n      *   **Hardware Accelerators:** Leverage dedicated ML accelerators (NPU, DSP) with\
    \ Direct Memory Access (DMA) to offload computation and minimize CPU involvement in data movement.\n\
    \  3.  **Software Design Principles:**\n      *   **Worst-Case Execution Time (WCET) Analysis:** Rigorously\
    \ determine the maximum execution time for every critical path component (sensor reading, pre-processing,\
    \ ML inference, post-processing, control command generation). Design with sufficient headroom.\n \
    \     *   **Avoid Dynamic Memory Allocation:** Heap allocations can introduce non-deterministic delays.\
    \ Pre-allocate all memory or use memory pools.\n      *   **Minimize Context Switches:** Reduce the\
    \ number of task switches to lower overhead.\n      *   **Fixed-Rate Processing:** Ensure all critical\
    \ tasks run at a fixed, predictable rate.\n      *   **Interrupt Handling:** Keep Interrupt Service\
    \ Routines (ISRs) as short as possible, deferring complex processing to dedicated high-priority tasks.\n\
    \  4.  **Sensor & Actuator Interface:**\n      *   **Hardware Timestamps:** Use hardware-level timestamps\
    \ for all sensor inputs to ensure precise synchronization.\n      *   **Direct Register Access/DMA:**\
    \ For critical I/O, bypass generic drivers where possible for more direct hardware control.\n  5.\
    \  **Model Optimization:** While not solely sufficient, extreme optimization of the ML model for the\
    \ target hardware (quantization, pruning, efficient operators) is still crucial to fit within the\
    \ WCET budgets."
  common_mistake: '"Just use a powerful Linux system and optimize the ML model a lot." While optimization
    helps, standard Linux kernels are not hard real-time and cannot provide deterministic guarantees.'
  napkin_math: For a 5ms deadline, if sensor reading takes 0.5ms, pre-processing 1ms, ML inference 2ms,
    post-processing 0.5ms, and actuator command 0.5ms, the total is 4.5ms. This leaves 0.5ms for OS overhead,
    jitter, and unexpected delays. Each component's WCET must be guaranteed. A 100MHz CPU could execute
    500,000 instructions in 5ms, highlighting the need for highly efficient code.
