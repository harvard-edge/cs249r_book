title: 'Edge Queueing Theory Realization: Jetson Orin Memory vs Compute Bottleneck'
scenario: Concretely determine whether a Jetson Orin (275 TOPS INT8, 102.4GB/s LPDDR5) serving EfficientNet-B4 (INT8, 1.2 GOPS, 18M params) at batch=1 is compute-bound or memory-bandwidth-bound at λ=100 req/s. Derive the service time from both perspectives and use it to compute M/D/1 metrics.
question: Is the Jetson Orin serving EfficientNet-B4 at batch=1 compute-bound or memory-bandwidth-bound, what is the service time, and what are the resulting M/D/1 queueing metrics at 100 req/s?
details:
  realistic_solution: At batch=1, the system is entirely memory-bandwidth-bound. The memory transfer time for the 18MB weights dictates the service time, as it is much larger than the compute time. With a service time derived from memory bandwidth, the utilization at 100 req/s is very low, demonstrating that edge inference at batch=1 is almost always bottlenecked by memory, not compute TOPS.
  common_mistake: Using peak TOPS without checking if memory bandwidth is the binding constraint — for small batch sizes, inference is almost always memory bandwidth bound.
  napkin_math: 'Compute time: 1.2 GOPS / 275,000 GOPS = ~0.0044 ms. Memory time: 18 MB / 102,400 MB/s = ~0.176 ms. Service time S = 0.176 ms (memory bound). Utilization ρ = λ \times S = 100 \times 0.000176 = 0.0176 (1.76%). M/D/1 queue time is roughly equal to service time due to near-zero queueing delay at ~1.76% utilization.'
