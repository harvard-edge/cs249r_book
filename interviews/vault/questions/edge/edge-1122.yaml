title: 'Edge Queueing Theory Realization: Jetson Orin Memory vs Compute Bottleneck'
scenario: You are serving EfficientNet-B4 (INT8, 1.2 GOPS, 18M params) on a Jetson Orin at batch=1 and 100 req/s.
question: Concretely determine whether a Jetson Orin serving EfficientNet-B4 at batch=1 is compute-bound or memory-bandwidth-bound at 100 req/s, and what are the resulting M/D/1 metrics?
details:
  realistic_solution: At batch=1, the system is entirely memory-bandwidth-bound. The memory transfer time for the 18MB weights dictates the service time, as it is much larger than the compute time. With a service time derived from memory bandwidth, the utilization at 100 req/s is very low, demonstrating that edge inference at batch=1 is almost always bottlenecked by memory, not compute TOPS.
  common_mistake: |
    **The Pitfall:** Using peak TOPS to determine service time at batch size 1.
    **The Rationale:** Candidates fail to realize that inference for small batch sizes is almost universally bound by memory bandwidth, not compute.
    **The Consequence:** Overestimating system throughput by orders of magnitude and misdiagnosing latency bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: EfficientNet-B4 (18MB INT8 weights, 1.2 GOPS).
       - Hardware: Jetson Orin (275 TOPS, 102.4 GB/s bandwidth).
       - Load: 100 requests/second at batch size 1.
    2. **Calculations:**
       - Compute time: 1.2 GOPS / 275,000 GOPS = 0.00436 ms.
       - Memory transfer time (INT8): 18 MB / 102,400 MB/s = 0.1757 ms.
       - Service time (S): Max(Compute, Memory) ≈ 0.176 ms.
       - Utilization (\rho): 100 req/s * 0.000176 s/req = 0.0176 (1.76%).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. The system is heavily memory-bound with a service time dictated by weight transfer (0.176 ms), leading to extreme underutilization (1.76%) of the compute hardware.
