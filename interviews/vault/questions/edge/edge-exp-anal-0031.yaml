title: Edge Compute vs Thermal Throttling on Orin
scenario: A team deploys an INT8 model requiring 550 GOPS per inference on an NVIDIA Jetson Orin (32 GB
  LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). They configure their serving infrastructure
  to handle concurrent requests targeting 400 FPS. They calculate that 400 FPS * 0.55 TOPS = 220 TOPS,
  which sits safely under the 275 TOPS theoretical limit. However, under this load, the system experiences
  severe thermal throttling and throughput drops significantly below the target. Explain why this discrepancy
  occurs despite the workload mathematically fitting within the advertised compute limits.
details:
  realistic_solution: The system throttles because the power required to sustain 220 TOPS on the GPU exceeds
    the available power budget once baseline system components (CPU, memory, peripherals) draw their required
    wattage. To stabilize the system, the team must lower the target throughput, quantize/prune the model
    further, or explicitly compile subgraphs to the DLA to distribute the thermal load and improve performance-per-watt.
  common_mistake: Candidates often assume that theoretical maximum TOPS can be fully allocated to the
    model workload indefinitely, failing to account for the fact that the 60W TDP is a strict system-wide
    budget shared across the Ampere GPU, CPU, DLA, and the 32 GB LPDDR5 memory.
  napkin_math: '1. Peak system efficiency: 275 TOPS / 60W = ~4.58 TOPS/Watt. 2. Target compute for workload:
    400 inferences/sec * 0.55 TOPS/inference = 220 TOPS. 3. Estimated power for target compute: 220 TOPS
    / 4.58 TOPS/Watt = ~48W. 4. System overhead: With 32 GB LPDDR5, CPU, and IO drawing a conservative
    20W, the total power demand hits 48W (Compute) + 20W (System) = 68W. 5. Conclusion: 68W > 60W TDP
    constraint, triggering immediate thermal throttling. Sustainable compute is roughly (60W - 20W) *
    4.58 = 183.2 TOPS, capping max throughput at ~333 FPS.'
