title: Drift Detection Latency Budget on Google Coral
scenario: You are deploying a vision model on a Google Coral Edge TPU (4 TOPS INT8, 2W) for a smart doorbell.
  To detect training-serving skew, you want to compute the Population Stability Index (PSI) on the quantized
  INT8 activation distributions of a key intermediate layer across 10 bins. The Coral TPU processes the
  main inference in 15ms. If your total latency budget is 20ms per frame, calculate the remaining budget
  and determine if computing PSI on the host CPU for 1000 historical reference samples and 1 current sample
  is feasible within that budget.
details:
  realistic_solution: 'The correct approach is to acknowledge the TPU''s limited operator support and
    offload the PSI calculation to the host CPU. We extract the INT8 activations from the Coral, create
    a histogram (10 bins), and calculate PSI: sum((Actual % - Expected %) * ln(Actual % / Expected %)).
    Since the expected distribution (1000 samples) can be pre-computed, the runtime cost is just updating
    the current histogram and computing the 10-bin PSI on the CPU.'
  common_mistake: Candidates often forget that statistical drift detection methods like PSI or KL Divergence
    typically run on the host CPU, not the Coral TPU itself, because the TPU is optimized for specific
    INT8 matrix multiplications and lacks support for complex logarithmic operations required by PSI.
  napkin_math: "Total Budget: 20ms. Inference Time: 15ms. Remaining Budget for Drift Detection: 20ms -\
    \ 15ms = 5ms. \nOperations for PSI: The expected distribution (10 bins) is pre-computed. For the current\
    \ frame, we bin 1 activation (O(1) if using thresholding) and update the actual distribution. Then,\
    \ compute PSI over 10 bins: 10 subtractions, 10 divisions, 10 logarithms, 10 multiplications, and\
    \ 9 additions. Total ~50 FLOPs. A modern mobile CPU (even low-end) can do billions of FLOPs per second\
    \ (e.g., 1 GFLOPS = 1M FLOPs/ms). 50 FLOPs will take << 1ms. Therefore, 5ms is more than enough budget."
