title: 'Edge TCO Implement: Fleet Power Cost Optimization'
scenario: 'Implement the power cost calculation for a 1000-unit Hailo-8 (2.5W) edge
  fleet with Raspberry Pi 5 hosts (5W). Calculate: total annual power cost at $0.10/kWh,
  savings from implementing power management (50% duty cycle during off-hours), and
  NPV of power savings over 5 years at 5% discount rate.'
question: For a 1000-unit Hailo-8+Pi5 fleet, what are annual power cost, duty-cycling
  savings, and 5-year NPV at a 5% discount rate?
details:
  realistic_solution: 'Total power: 1000 * (2.5+5) = 7500W = 7.5kW. Annual cost (24/7):
    7500W * 8760hr * $0.10/1000 = $6,570/yr. With 50% duty cycle (12hr/day active):
    7500W * 4380hr * $0.10/1000 + 1000*0.5W*(idle) * 4380hr * $0.10/1000 = $3285 +
    $219 = $3504/yr. Annual savings: $6570-$3504 = $3066/yr. NPV of savings over 5yr
    at 5% discount: PV = 3066*(1-(1.05)^-5)/0.05 = 3066*4.329 = $13,273. Power management
    implementation cost: ~$5K (firmware development). ROI: ($13,273-$5000)/$5000 =
    165%. Payback: $5000/$3066 = 1.63 years.'
  common_mistake: Not applying NPV (Net Present Value) to multi-year cost savings,
    which overstates the value of future savings relative to present costs.
  napkin_math: '24/7 annual: 7500W*8760hr/1000*$0.10=$6,570. Duty cycle: active=7500W*4380hr/1000*$0.10=$3285.
    Idle (0.5W/unit): 500W*4380hr/1000*$0.10=$219. Total with duty=$3,504. Savings=$3,066/yr.
    NPV 5yr at 5%: $3066*(1-1.05^-5)/0.05=3066*4.329=$13,273. Net NPV: $13,273-$5,000=$8,273.
    But consider: Pi 5 in sleep mode: 1W not 0.5W. Revised idle: 1000W*4380hr*$0.10/1000=$438.
    Total with duty=$3,723. Savings=$2,847/yr. NPV=$12,326-$5K=$7,326. Still strongly
    positive ROI.'
