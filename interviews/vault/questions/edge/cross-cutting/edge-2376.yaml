title: DETR Attention Tiling Edge
scenario: A Transformer-based object detector (DETR) processes 4K video on a Jetson AGX Orin. The self-attention feature maps are massive.
question: Analyze the LPDDR5 memory traffic for the self-attention maps and create a tiling strategy to prevent spilling out of the Orin's L2 cache.
details:
  realistic_solution: 'Attention complexity is O(N^2). For 4096 tokens, the NxN attention matrix requires 32MB in FP16, which heavily spills out of the Orin''s ~6MB L2 cache to LPDDR5, causing a massive bandwidth bottleneck. The solution is to implement FlashAttention or block-wise chunking: computing the softmax denominator locally in SRAM tile-by-tile (e.g., blocks of 256x256) without ever materializing the full 32MB matrix.'
  common_mistake: |
    **The Pitfall:** Using standard `matmul` -> `softmax` -> `matmul` pipelines.
    **The Rationale:** Candidates rely on default PyTorch implementations that materialize the full O(N^2) tensor in main memory.
    **The Consequence:** Heavy spilling to slow LPDDR5 memory causes massive bandwidth bottlenecks and latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input is 4096 tokens (from 4K video patches).
    - Data format is FP16 (2 bytes per element).
    - Orin's L2 Cache Limit is ~6 MB.

    **Calculations:**
    - Attention Matrix Size is 4096 * 4096 * 2 bytes = 33,554,432 bytes.
    - Matrix size in MB is ~33.5 MB.

    **Conclusion & Interpretation:**
    - **Result: 33.5 MB (Memory-Bound)**. 33.5 MB vastly exceeds 6 MB, necessitating FlashAttention or block-wise chunking to compute directly in SRAM.
