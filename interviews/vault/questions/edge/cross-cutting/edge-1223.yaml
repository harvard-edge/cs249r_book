title: INT8 Quantization Bias on Cloud AI 100
scenario: You are deploying a fraud detection model on an on-premise Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To utilize the peak 400 TOPS INT8 compute, you apply uniform post-training quantization using global min/max activation values. Post-deployment, the False Positive Rate for a minority subgroup (Group B) increases by 12%, violating equalized odds, while the majority group (Group A) sees no degradation.
question: Why does global uniform INT8 quantization on the Cloud AI 100 raise Group B's false positive rate while Group A is unaffected?
details:
  realistic_solution: 'Uniform INT8 quantization maps the FP32 range into 256 discrete bins based on the global distribution, which is dominated by Group A. Group B''s critical features likely occupy a narrow, long-tail region of the activation range, resulting in those features being compressed into very few INT8 bins. This precision loss destroys Group B''s predictive signal. The tradeoff is throughput vs. fairness: using KL-divergence calibration or keeping sensitive layers in FP16 would improve subgroup fairness but reduce the effective TOPS and increase power consumption.'
  common_mistake: |
    **The Pitfall:** Blaming original training data imbalance while ignoring the INT8 quantization process.
    **The Rationale:** Candidates assume model fairness relies solely on data.
    **The Consequence:** They attempt to retrain the model with more data instead of fixing how uniform quantization compresses long-tail features.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global FP32 activation range is [0.0, 10.0].
    - Uniform affine INT8 quantization into 256 representable codes.
    - For a [0, 10] range, there are 255 intervals between endpoint codes.
    - Group A features span [1.0, 9.0].
    - Group B features are in a narrow tail [0.0, 0.5].

    **Calculations:**
    - Uniform Step Size is 10.0 / 255 = 0.039 activation units per code step.
    - Group A coverage is 8.0 / 0.039 = ~205 code intervals.
    - Group B coverage is 0.5 / 0.039 = ~13 code intervals, about 5% of the code range.
    - Relative coverage: 205 / 13 = ~16x more code intervals for Group A's feature span.

    **Conclusion & Interpretation:**
    - **Result: ~13 of 256 codes for Group B's tail (Precision-Bound)**. The narrow subgroup feature range is represented coarsely, which can erase predictive signal and plausibly increase Group B's false positive rate.
