title: Impact Assessment for Autonomous Medical Triage on Edge
scenario: A hospital system is deploying an ML triage assistant on edge devices in emergency waiting rooms. The model classifies patient urgency (1-5 scale) based on vital signs and symptom text. An AI impact assessment must be conducted prior to deployment.
question: What components and quantitative thresholds must the AI impact assessment include before deploying the hospital triage assistant?
details:
  realistic_solution: Required impact assessment components include failure mode analysis with clinical consequences, quantitative safety thresholds (e.g. sensitivity for true urgency-5 cases ≥ 99.5%), subgroup performance audits evaluated by demographics, and a defined feature drift detection threshold that safely triggers a human-override mode.
  common_mistake: |
    **The Pitfall:** Treating the impact assessment as a qualitative documentation exercise.
    **The Rationale:** Candidates list potential harms without specifying measurement methods or concrete statistical acceptance thresholds.
    **The Consequence:** No actionable safety guarantee is provided, exposing the hospital to catastrophic liability and patient harm.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 99.5% sensitivity for true urgency-5 cases with ±0.5pp margin at 95% CI.
    - Hospital ED volume: 50K visits annually, 5% urgency-5 rate (2,500 cases/year).

    **Calculations:**
    - Required Sample Size: n = (1.96)^2 * 0.995 * 0.005 / (0.005)^2 = 764 true urgency-5 cases minimum.
    - Base Collection Time: 764 / 2500 = ~0.3 years (~4 months).
    - Subgroup Audit (6 demographic cells): 764 * 6 = 4,584 urgency-5 cases.
    - Audit Collection Time: 4,584 / 2500 = ~1.8 years.

    **Conclusion & Interpretation:**
    - **Result: ~1.8 years (Data-Bound)**. Proving intersectional fairness requires massive sample sizes, necessitating nearly 2 years of prospective validation data gathering prior to deployment.
