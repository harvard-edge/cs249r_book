title: Pipeline Overlap on NPU and CPU
scenario: A real-time video processing pipeline runs on a Snapdragon 8 Gen 3. Pre-processing takes 5ms on CPU, NPU inference takes 15ms, and post-processing takes 8ms on CPU. The camera captures at 60 FPS.
question: Create a double-buffering specification orchestrating CPU and NPU tasks to overlap computation, proving the pipeline can sustain 60 FPS.
details:
  realistic_solution: 'At 60 FPS, the frame budget is 16.6ms. Sequential execution takes 5 + 15 + 8 = 28ms, failing the deadline. By pipelining, the system creates three stages. While the NPU processes Frame N (15ms), the CPU concurrently handles post-processing for Frame N-1 (8ms) and pre-processing for Frame N+1 (5ms). The total CPU time per cycle is 13ms. The bottleneck stage is the NPU at 15ms, which is strictly less than the 16.6ms budget. Throughput is 1/15ms = 66.6 FPS.'
  common_mistake: |
    **The Pitfall:** Synchronous execution loop design.
    **The Rationale:** Developers often rely on straightforward blocking calls, waiting for each frame to complete entirely before moving to the next.
    **The Consequence:** The CPU and NPU wait for each other per frame, resulting in 28ms total latency and dropping the overall frame rate to ~35 FPS, failing the 60 FPS requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU Pre-processing = 5ms.
       - NPU Inference = 15ms.
       - CPU Post-processing = 8ms.
       - Camera capture rate = 60 FPS (16.6ms budget per frame).
    2. **Calculations:**
       - Sequential latency = 5ms + 15ms + 8ms = 28ms (> 16.6ms SLA).
       - Pipelined CPU time per cycle = 5ms (Frame N+1) + 8ms (Frame N-1) = 13ms.
       - Pipelined NPU time per cycle = 15ms (Frame N).
       - Pipeline bottleneck = max(13ms, 15ms) = 15ms.
    3. **Conclusion & Interpretation:**
       - **Result: Pipelining Succeeds**. Pipelining drops the cycle time from 28ms to the 15ms NPU bottleneck, comfortably meeting the 16.6ms budget and sustaining 60 FPS.
