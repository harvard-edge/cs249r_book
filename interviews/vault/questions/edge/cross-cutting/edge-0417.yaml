title: The Federated TCO Fallacy
scenario: You are the Staff ML Systems Engineer for a company deploying a new 'unfamiliar face' detector to a fleet of 1 million edge cameras. Two strategies are considered. Strategy A (Centralized) uses a cheap ($5) SoC and streams 10 MB/day per camera. Strategy B (Federated Learning) uses an $8 SoC and sends 50 KB/day. Cellular data costs $10/GB.
question: Which strategy has the lower TCO for 1 million cameras at $10/GB data cost, centralized streaming or federated learning, and why?
details:
  realistic_solution: The Federated Learning approach has an overwhelmingly superior Total Cost of Ownership (TCO). The $3M extra hardware cost is paid back in just 30 days by the massive savings in data transmission costs. The centralized approach would cost ~$100,000 per day in data fees, totaling ~$36.5M annually. The federated approach's data costs are negligible in comparison (~$182,500/year). This demonstrates that for large fleets, optimizing for network traffic is often the most critical economic lever.
  common_mistake: Focusing solely on the initial Capital Expenditure (CapEx) is a classic TCO fallacy. At scale, Operational Expenditure (OpEx) like data transmission, power, and maintenance often dominates the total cost. A small per-unit cost increase can be easily justified if it enables massive OpEx savings across the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 1,000,000 cameras. Data cost: $10/GB.
    - Centralized: 10 MB/day. Federated: 50 KB/day.
    - SoC ΔCost: $8 - $5 = $3.

    **Calculations:**
    - CapEx penalty: 1,000,000 * $3 = $3,000,000.
    - Centralized data OpEx: 10,000 GB/day * $10 * 365 = $36,500,000/year.
    - Federated data OpEx: 50 GB/day * $10 * 365 = $182,500/year.

    **Conclusion & Interpretation:**
    - **Result: 30 days (Network-Bound)**. The $3M CapEx penalty is recouped in just one month due to massive daily OpEx savings on data transfer.
  options:
  - 'The centralized approach is cheaper because it saves the company $3 million in upfront hardware costs.'
  - 'The federated approach is far cheaper, breaking even on the extra hardware cost in just 30 days due to enormous data transfer savings.'
  - 'The federated approach is cheaper, but the breakeven point is over 2 years, making it a risky investment.'
  - 'Neither is viable, as the on-device compute power cost for the federated fleet would exceed any potential data savings.'
