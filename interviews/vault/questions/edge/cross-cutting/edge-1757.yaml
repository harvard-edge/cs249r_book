title: Privacy Guardrail Pipeline on Dataflow Edge
scenario: You are deploying a smart-city pedestrian tracking system on a Hailo-8 edge node. To satisfy strict privacy governance guardrails, a PII redaction model must blur faces in real-time before the tracking model processes the feed. Both models operate sequentially on 1080p RGB video at 30 FPS.
question: How do you design this dual-model pipeline and size the required host-accelerator memory bandwidth given the hardware constraints?
details:
  realistic_solution: 'The optimal approach evaluates the dataflow architecture and fuses the PII redaction guardrail and tracking models into a single compiled dataflow graph. By chaining them on-chip, the high-bandwidth intermediate activations remain within the Hailo-8''s internal SRAM fabric, enforcing the privacy guardrail seamlessly while strictly minimizing expensive host memory access.'
  common_mistake: |
    **The Pitfall:** Treating models as independent steps managed by the host CPU.
    **The Rationale:** Candidates fail to recognize that host-streaming large intermediate activations without local DRAM creates a massive PCIe bottleneck.
    **The Consequence:** The host CPU instantly saturates the bus transferring video back and forth, starving the 26 TOPS accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p RGB frame: 1920 x 1080 x 3 bytes = 6.22 MB.
    - Frame rate: 30 FPS.
    - Hailo-8 has no local DRAM, relies on host memory.

    **Calculations:**
    - Raw Input Stream: 6.22 MB x 30 = 186.6 MB/s.
    - Host-managed independent pipeline: Raw to Hailo (186.6 MB/s) + Redacted to Host (186.6 MB/s) + Redacted back to Hailo (186.6 MB/s) = 559.8 MB/s.
    - Fused dataflow pipeline: Raw to Hailo (186.6 MB/s) + Tracker output to Host (<1 MB/s) ≈ 187 MB/s.
    - Bandwidth Savings: 559.8 MB/s - 187 MB/s = 372.8 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Optimized Host Bandwidth (Memory-Bound).** Fusing the models on-chip saves ~373 MB/s of host streaming bandwidth, avoiding a severe PCIe bottleneck.
