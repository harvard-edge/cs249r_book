title: The Secure Fleet TCO Dilemma
scenario: You are the ML Systems Engineer for a fleet of 10,000 autonomous vehicles. The fleet uses Federated Learning (FL) to continuously improve a model. The security team wants to deploy 'System B', which adds a cryptographic hash commitment to each model update, preventing model poisoning.
question: Is adding cryptographic hash commitments to FL updates economically justified for the 10,000-vehicle fleet?
details:
  realistic_solution: Execute a probabilistic Total Cost of Ownership (TCO) analysis. Quantify the absolute annual energy cost of the cryptographic compute overhead across the entire fleet, and rigorously compare it against the expected monetary value of a security breach (Loss Magnitude × Breach Probability). If the fixed cost of prevention is lower than the probabilistic cost of the exploit, the feature is mandated.
  common_mistake: |
    **The Pitfall:** Rejecting security features purely based on the absolute compute overhead without risk-weighting the financial alternatives.
    **The Rationale:** Performance engineers are trained to relentlessly cull any code that burns cycles or energy, dismissing security as an "unproductive" drain on edge limits.
    **The Consequence:** Exposing the entire enterprise to multi-million dollar liabilities to save a mathematically trivial amount in fleet electricity costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 vehicles
    - Hash energy cost: 2 Watts for 1 hour/day = 2 Wh/day/vehicle
    - Electricity cost: $0.15/kWh
    - Risk vector: $1M data breach

    **Calculations:**
    - Fleet daily energy = 2 Wh * 10,000 = 20 kWh
    - Fleet annual energy = 20 kWh * 365 = 7,300 kWh
    - Security feature annual cost = 7,300 kWh * $0.15 = $1,095/year
    - Expected Loss Threshold = $1,095 / $1,000,000 = 0.11% probability

    **Conclusion & Interpretation:**
    - **Result: $1,095 (Financial-Bound)**. The guaranteed cost is easily justified to prevent a $1M poisoning attack.
  options:
    - 'No, the annual operational cost is over $1,369,000, which far exceeds the risk-adjusted loss.'
    - 'No, the potential $1,000,000 loss is a ''black swan'' event; the certain $13,690 annual energy cost should be avoided.'
    - 'Yes, the ~$1,100 annual energy cost is significantly lower than the expected loss from a potential model poisoning attack.'
    - 'Yes, but only because the $1,095 cost is less than the $7,300 hardware replacement cost.'
