title: The Edge AI Cost Model That Fooled the CFO
scenario: 'Your team presents an edge AI cost model to the CFO: 5,000 Edge TPUs at
  $150 each = $750K, amortized over 3 years = $250K/year. Eighteen months in, the
  actual annual spend is $1.8M — 7x over budget. The hardware cost was accurate.'
question: Where did the money go?
details:
  realistic_solution: Hardware is only ~14% of edge AI TCO. The missing 86% ($1.55M/year)
    comes from connectivity ($750K), software updates and OTA management ($400K),
    power and installation ($275K), monitoring and MLOps tooling ($100K), and field
    service ($25K). The correct model multiplies hardware cost by 6-8x for true TCO.
  common_mistake: '**The Pitfall:** Assuming the hardware must have had a high failure
    rate.

    **The Rationale:** Failing to recognize that hardware is a small fraction of Total
    Cost of Ownership (TCO) in edge AI deployments.

    **The Consequence:** Severe budget overruns because operational and connectivity
    costs are ignored.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hardware-only model: $250K/year.

    - Actual TCO: $1.8M/year.


    **Calculations:**

    - Hardware % of TCO = $250K / $1.8M = 13.8% (~14%).

    - TCO Multiplier = $1.8M / $250K = 7.2x.


    **Conclusion & Interpretation:**

    - **Result: 7.2x multiplier (OpEx-Bound)**. The rule of thumb is to multiply edge
    hardware cost by 6-8x to determine the true TCO.

    '
