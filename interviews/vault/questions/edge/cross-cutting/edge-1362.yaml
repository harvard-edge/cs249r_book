title: Edge Guardrail Memory and Latency Sizing
scenario: You are deploying an autonomous robot powered by an NVIDIA Jetson AGX Orin with 32 GB of memory. To adhere to Responsible AI governance, all generated action plans pass through a local safety classifier before execution. The primary model and OS consume 24 GB of memory, and the safety classifier must reserve 2 GB of the remaining memory for activations and KV cache during a 100-token pass.
question: What is the maximum INT8 safety model parameter count in the remaining memory, and its theoretical latency for a 100-token sequence at 20% TOPS?
details:
  realistic_solution: Start with the 8 GB remaining after the OS and primary model, then reserve 2 GB for activations and KV cache, leaving 6 GB for INT8 weights. At 1 byte per parameter, the safety model can have at most about 6B parameters. Its 100-token compute cost is 6B parameters x 2 ops/parameter/token x 100 tokens = 1.2e12 ops; at 20% of 275 TOPS, the effective rate is 55e12 ops/s, so the compute-bound latency is about 21.8 ms.
  common_mistake: |
    **The Pitfall:** Forgetting to account for KV cache/activation memory or miscalculating MACs.
    **The Rationale:** Candidates assume all remaining RAM goes to weights and forget that a single Multiply-Accumulate (MAC) equals 2 Operations.
    **The Consequence:** Sizing a model that immediately OOMs upon receiving an input sequence, or underestimating latency by 50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GB total memory; 24 GB active footprint.
    - Reserve 2 GB for safety-model activations and KV cache.
    - 275 TOPS INT8 peak compute; 20% utilization.
    - 100 tokens; 1 MAC = 2 OPs.

    **Calculations:**
    - Remaining Memory = 32 GB - 24 GB = 8 GB.
    - Weight Memory Budget = 8 GB - 2 GB runtime reserve = 6 GB.
    - Max Parameters = 6 GB / 1 Byte = 6 Billion parameters.
    - Compute Required = 6B params * 2 OPs/param/token * 100 tokens = 1.2e12 ops.
    - Effective Compute = 275 TOPS * 0.20 = 55e12 ops/sec.
    - Latency = 1.2e12 ops / 55e12 ops/sec = 0.0218 sec = 21.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 6B parameters, 21.8 ms latency (Compute-Bound)**. The max model size is bounded by both INT8 weights and runtime memory reserve; the latency estimate is purely compute-bound at the stated 20% utilization.
