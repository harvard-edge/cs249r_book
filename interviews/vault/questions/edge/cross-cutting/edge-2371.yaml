title: M/M/1 Robotics Processing
scenario: >-
  A Jetson AGX Orin processes LiDAR frames following an M/M/1 queue. Frames arrive at 20 fps, and processing takes 30ms per frame on average.
question: Analyze the average wait time in the queue, and determine if the total system latency meets a 100ms end-to-end deadline.
details:
  realistic_solution: The service rate (mu) is 1 / 0.03 = 33.3 fps. The utilization (rho) is 20 / 33.3 = 0.6. The average wait time in the queue is (rho * service_time) / (1 - rho) = (0.6 * 30ms) / 0.4 = 45ms. Total latency is wait time (45ms) + service time (30ms) = 75ms, which safely meets the 100ms deadline.
  common_mistake: |
    **The Pitfall:** Ignoring stochastic queueing delay.
    **The Rationale:** Candidates only consider the fixed 30ms processing time and ignore the wait time caused by Poisson arrivals in a shared buffer.
    **The Consequence:** Underestimating total latency, potentially leading to missed deadlines and catastrophic failures in highly utilized stochastic systems.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (lambda): 20 fps.
    - Service time: 30ms (Service rate mu = 1 / 0.03s = 33.3 fps).
    - System: M/M/1 Queue. Deadline: 100ms.

    **Calculations:**
    - Utilization (rho): lambda / mu = 20 / 33.3 = 0.6.
    - Average wait time in queue: (rho * service_time) / (1 - rho) = (0.6 * 30ms) / 0.4 = 45ms.
    - Total latency: Wait time (45ms) + Service time (30ms) = 75ms.

    **Conclusion & Interpretation:**
    - **Result: 75ms (Latency-Bound).** Total latency is 75ms, which safely meets the 100ms deadline despite Poisson arrival jitter.
