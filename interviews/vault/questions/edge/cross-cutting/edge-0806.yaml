title: The Tamper-Proof Model Fortress
scenario: Your company develops highly sensitive ML models for critical infrastructure deployed on edge devices in remote locations. A malicious actor could gain physical access to a device.
question: How would you secure the ML model from manufacturing to runtime so attackers with physical access cannot modify, replace, or exfiltrate it?
details:
  realistic_solution: Implement a comprehensive secure boot and remote attestation strategy leveraging a Hardware Root of Trust (HRoT) like a TPM or Secure Enclave. Ensure measured boot hashes all stages including the ML model binary. Store the model encrypted at rest using keys derived from the HRoT. Validate integrity via Challenge-Response remote attestation and use TrustZone/TEE for runtime execution isolation.
  common_mistake: |
    **The Pitfall:** Believing simple disk encryption solves the problem.
    **The Rationale:** Candidates confuse confidentiality with integrity, assuming an encrypted model cannot be maliciously replaced.
    **The Consequence:** Attackers swap the encrypted model with their own encrypted malicious model, completely hijacking the edge inference pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100 MB ML model.
       - Hardware hashing speed: 100 MB/s.
       - AES-256-GCM decryption speed: 500 MB/s.
       - Signature verification, measured boot, key release, model loading, TEE setup, and remote attestation round trips are platform-dependent and not specified.
    2. **Calculations:**
       - Illustrative model hash time = 100 MB / 100 MB/s = 1.0 second.
       - Illustrative model decryption time = 100 MB / 500 MB/s = 0.2 seconds.
       - Lower-bound local cryptographic work for these two operations ≈ 1.2 seconds, before platform-specific boot, loading, attestation, and TEE overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Illustrative Lower Bound, Not Total Boot Cost**. Hashing and decrypting a 100 MB model may be modest on capable hardware, but the end-to-end security cost depends on the root of trust, key provisioning, signature checks, measured boot chain, protected runtime, and attestation policy. The design improves tamper resistance; it does not provide an "ironclad" guarantee against every physical attack.
