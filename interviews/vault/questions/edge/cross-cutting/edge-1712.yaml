title: Optimizing Privacy Guardrails on Edge TPU
scenario: A privacy guardrail model on a Coral Edge TPU (4 TOPS INT8, 2W) experienced a latency spike to 80ms after a fairness-aware custom activation was added.
question: What is causing the Coral privacy model's 80ms latency spike, and how would you refactor it to be fully TPU-compatible?
details:
  realistic_solution: The Edge TPU compiler lacks support for the custom activation function, forcing a graph partition. The TPU executes the supported subgraphs, copies intermediate tensors over USB to the host CPU for the custom activation, and then copies data back. Refactor the model to replace the custom activation with an INT8-supported equivalent or approximate it with supported layers, then recalibrate or retrain to recover fairness metrics while eliminating host-memory round-trips.
  common_mistake: |
    **The Pitfall:** Abandoning the 2W constraint by switching to heavier hardware.
    **The Rationale:** Believing the 80ms latency is due to a lack of raw compute power rather than intermediate I/O synchronization overhead.
    **The Consequence:** Breaking the thermal and power budget of the embedded device instead of fixing the compiler fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device: Coral Edge TPU (4 TOPS). Power: 2W.
    - Model: ~600 Mega-operations. Partitioned latency: 80ms.

    **Calculations:**
    - Theoretical TPU Compute: 600,000,000 / 4,000,000,000,000 = 0.15 ms.
    - Observed partitioned latency is 80 ms, far above the sub-millisecond ideal compute estimate.
    - The excess time comes from graph partitioning: USB synchronization, host CPU execution of the custom activation, and loss of a single TPU schedule.

    **Conclusion & Interpretation:**
    - **Result: host fallback dominates the 80 ms spike (Partition/I/O Bound)**. The exact post-refactor latency must be measured after compilation, but only the TPU-supported portion benefits from the 4 TOPS throughput until the custom activation is removed.
