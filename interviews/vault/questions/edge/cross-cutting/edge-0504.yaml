title: The Federated Fleet TCO Dilemma
scenario: An automotive company evaluates centralized vs federated learning to improve voice assistant accuracy for a rare dialect across 10,000 vehicles. Centralized collection would upload 5 GB of raw audio per vehicle for the pilot. Federated learning would run 10 rounds, each uploading a 50 MB model update per vehicle. Cellular data costs $25/GB.
question: Which pilot is cheaper on direct data cost, centralized user collection or Federated Learning, and how should you calculate it?
details:
  realistic_solution: |
    Federated Learning (FL) is cheaper on direct data cost. The calculation must compare both sides: centralized uploads raw audio from every vehicle, while FL uploads compressed model updates over multiple rounds. Even after summing all 10 FL rounds, the FL payload is much smaller than the centralized raw-audio collection.
  common_mistake: |
    **The Pitfall:** Calculating the cost of transmitting raw user voice data.
    **The Rationale:** Forgetting that FL transmits small, aggregated model updates and incorrectly calculating costs based on a single round rather than iterative convergence.
    **The Consequence:** Overestimating TCO by orders of magnitude and potentially abandoning privacy-preserving architectures due to flawed financial modeling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 vehicles. Data cost: $25/GB.
    - Centralized raw audio: 5 GB/vehicle for the pilot.
    - FL update: 50 MB = 0.05 GB per vehicle per round.
    - FL rounds: 10.

    **Calculations:**
    - Centralized data: 10,000 vehicles * 5 GB = 50,000 GB.
    - Centralized cost: 50,000 GB * $25/GB = $1,250,000.
    - FL data: 10,000 vehicles * 0.05 GB/update * 10 rounds = 5,000 GB.
    - FL cost: 5,000 GB * $25/GB = $125,000.

    **Conclusion & Interpretation:**
    - **Result: FL is cheaper at $125,000 vs $1,250,000 centralized.** The full 10-round FL pilot costs one-tenth as much in direct data transfer because model updates are smaller than raw audio uploads.
  options:
    - $25,000. The federated approach is significantly cheaper as the cost is dominated by a single model broadcast.
    - $25,000. The federated approach is more expensive because transmitting raw voice data from 10,000 cars is costly.
    - $125,000. The federated approach is cheaper than the $1,250,000 centralized raw-audio collection.
    - The costs are comparable, so the choice depends on implementation complexity rather than TCO.
  correct_index: 2
