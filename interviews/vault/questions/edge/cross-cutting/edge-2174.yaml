title: 'Heterogeneous Compute Dispatch on Jetson Orin: GPU vs DLA vs CPU'
scenario: 'Jetson Orin AGX has three compute targets: Ampere GPU (2048 CUDA cores), 2x NVDLA engines (Deep Learning Accelerator), and 12-core ARM CPU. A multi-model autonomous driving pipeline must schedule perception (CNN), planning (transformer), and mapping (classical SLAM) across all three.'
question: How would you dispatch perception, planning, and SLAM across Orin's GPU, DLAs, and ARM CPU within the 60W budget?
details:
  realistic_solution: 'Dispatch strategy: (1) Perception CNN (YOLOv8) -> DLA: convolutions are well-supported on DLA, and DLA achieves 118 TOPS INT8 at only ~5W. (2) Planning transformer -> GPU: attention and large matmuls need GPU''s flexibility and Tensor Cores. (3) SLAM -> CPU: point cloud processing and graph algorithms run best on ARM cores. This leaves GPU free for the transformer at 20W, DLA handles CNN at 5W, CPU does SLAM at 10W. Total: 35W, well under 60W MAXN budget. Key: use TensorRT''s setDeviceType() per layer to split a single model across GPU and DLA.'
  common_mistake: |
    **The Pitfall:** Running everything on the GPU because it is the most powerful.
    **The Rationale:** Candidates rely on desktop GPU intuition, ignoring that edge SoCs have specialized accelerators that provide vastly superior performance-per-watt for specific workloads.
    **The Consequence:** Sapping the entire 60W power budget on the GPU alone, causing severe thermal throttling and leaving insufficient resources for concurrent ML operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total power budget: 60W.
    - CNN on GPU: 40W. Transformer on GPU: 40W.
    - CNN on DLA: 5W. Transformer on GPU: 20W (freed up resources). SLAM on CPU: 10W.

    **Calculations:**
    - GPU-only Total Power: 40W (CNN) + 40W (Transformer) = 80W (fails constraint).
    - Heterogeneous Split Total Power: 5W (DLA) + 20W (GPU) + 10W (CPU) = 35W.

    **Conclusion & Interpretation:**
    - **Result: 35W < 60W (Power-Bound Mitigated)**. Properly delegating workloads to heterogeneous execution units provides 25W of thermal headroom while avoiding the 80W GPU-only overload.
