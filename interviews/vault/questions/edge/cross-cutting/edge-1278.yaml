title: Architecting On-Premise Guardrails for PII Redaction
scenario: An on-premise guardrail system processes sensitive medical transcripts using an LLM before transmission to the cloud. It is deployed on a single edge accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The pipeline must include PII redaction, toxic content filtering, and prompt injection detection.
question: How would you architect a fail-safe pipeline fitting PII, toxicity, and injection checks alongside the main generative model within the 32 GB memory constraint?
details:
  realistic_solution: |
    Design a cascading pipeline: a deterministic regex fast-pass for obvious PII, followed by a lightweight INT8 quantized NER model for complex PII, and a specialized 1B parameter classifier for toxicity and injection attacks. Only sanitized inputs are passed to the main generative model. All models must be co-located on the same card to minimize PCIe transfer latency.
  common_mistake: |
    **The Pitfall:** Relying on monolithic large models or cloud APIs for safety checks.
    **The Rationale:** Candidates often default to cloud-based solutions, forgetting the strict on-premise privacy requirement, or they specify models too large for the hardware.
    **The Consequence:** Defeating the purpose of on-premise deployment or causing Out-Of-Memory (OOM) failures by exceeding the 32 GB footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Main LLM (8B params, INT8): 8 GB.
    - Guardrail Models: NER Model (INT8) ~0.5 GB, Safety Classifier (1B, INT8) ~1 GB.
    - Total Memory: 32 GB LPDDR4x.

    **Calculations:**
    - Total model weights: 8 GB + 0.5 GB + 1 GB = 9.5 GB.
    - Remaining memory: 32 GB - 9.5 GB = 22.5 GB available for KV cache and context.
    - Compute check: 1B safety classifier uses ~2 GOPS/token. Out of 400 TOPS, compute overhead is negligible.

    **Conclusion & Interpretation:**
    - **Result: 9.5 GB model footprint (Memory-Bound)**. Co-locating all INT8 models fits easily, leaving 22.5 GB for context, avoiding PCIe transfer latency.
