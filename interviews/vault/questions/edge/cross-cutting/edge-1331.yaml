title: Evaluating Guardrail Deployment on NVIDIA Jetson Orin Edge Devices
scenario: 'We are deploying a vision-language model (VLM) for autonomous industrial inspection on an NVIDIA Jetson Orin edge device. To ensure safety, we must deploy a moderation guardrail model alongside the primary VLM. Alternatives: (A) A small dense transformer running on the Ampere GPU alongside the VLM, or (B) an INT8 quantized CNN-based guardrail targeting the Deep Learning Accelerator (DLA).'
question: Which guardrail architecture is better suited for this deployment, considering strict latency constraints and the Orin's 60W TDP limit?
details:
  realistic_solution: Alternative B is better suited. Mapping the INT8 CNN guardrail to the DLA keeps the safety check off the GPU queue used by the primary VLM, so its latency is less exposed to GPU kernel contention and scheduling jitter. It also keeps the combined power draw inside the 60W device budget. Alternative A may have higher model capacity, but sharing the Ampere GPU with the VLM risks both missed guardrail deadlines and thermal throttling.
  common_mistake: |
    **The Pitfall:** Endorsing the theoretically highest accuracy mechanism (Alternative A) devoid of system-level power analysis.
    **The Rationale:** ML candidates isolate precision metrics without forecasting extreme resource contention across shared execution units.
    **The Consequence:** Heavy GPU oversubscription immediately crashes through the thermal budget, plunging the entire node into a destructive throttling spiral.
  napkin_math: |
    **Assumptions & Constraints:**
    - System TDP Boundary: 60W limit.
    - VLM load: 40W on Ampere GPU.
    - Transformer Guardrail (A): 25W GPU load.
    - INT8 DLA Guardrail (B): 10W DLA load.
    - Guardrail latency target: 20ms.
    - GPU queueing delay under VLM load: up to 25ms for Alternative A.
    - Standalone guardrail execution: 12ms on GPU for A, 14ms on DLA for B.

    **Calculations:**
    - Total TDP for Alt A: 40W + 25W = 65W.
    - Total TDP for Alt B: 40W + 10W = 50W.
    - Alt A guardrail latency under contention: 25ms queueing + 12ms execution = 37ms.
    - Alt B guardrail latency on isolated DLA: 14ms.

    **Conclusion & Interpretation:**
    - **Result: 50W and 14ms for B vs 65W and 37ms for A (DLA Thermal and Latency Safety)**. The DLA mapping stays within the 60W boundary and gives the guardrail a more deterministic latency path.
