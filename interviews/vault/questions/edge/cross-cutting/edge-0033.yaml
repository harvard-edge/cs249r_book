title: Edge-Cloud Hybrid Inference Break-Even
scenario: 'Your company deploys 1,000 smart cameras for retail analytics. Each camera runs a person re-identification model. Option A: run ReID on-device using a Hailo-8 accelerator ($80/device, 26 TOPS, 2.5W). Option B: stream compressed embeddings to the cloud and run ReID on a shared GPU cluster. Cloud GPU cost: $0.50/GPU-hour (A10G), each GPU handles 200 cameras. Network cost: $0.09/GB egress. Each camera sends 100 KB of embeddings per second.'
question: Calculate the break-even point — when does on-device become cheaper than cloud?
details:
  realistic_solution: Use one consistent 3-year TCO model. On-device costs $80K hardware plus 3 * ($2.6K/year power + $50K/year engineering) = $237.8K over 3 years. Cloud needs 5 A10G GPUs, so compute is 5 * $0.50/hour * 8760 = $21.9K/year. At 100 KB/s per camera, egress is about 3,154 TB/year, costing $283.8K/year, so cloud OpEx is $305.7K/year and 3-year cloud TCO is about $917.1K. To break even with the $237.8K edge TCO, annual cloud spend must be $79.3K/year; after $21.9K/year of compute, only $57.4K/year remains for egress. That corresponds to about 637 TB/year total, or 20.2 KB/s per camera. At 100 KB/s per camera, on-device is cheaper because egress dominates.
  common_mistake: |
    **The Pitfall:** Assuming cloud is cheaper because of low GPU utilization.
    **The Rationale:** Candidates ignore egress fees, assuming cloud compute is the primary cost driver for high-frequency streaming workloads.
    **The Consequence:** The company hemorrhages cash on network bandwidth, paying 4x more over 3 years compared to an edge deployment.
  napkin_math: |
    **Assumptions & Constraints:**
       - 1,000 cameras, 100 KB/s per camera
       - Hailo-8 On-device: $80/device CapEx = $80K fleet hardware, $2.6K/yr power, $50K/yr eng
       - Cloud A10G: $0.50/GPU-hr (200 cameras/GPU), $0.09/GB egress
    **Calculations:**
       - Network streaming = 1,000 * 100 KB/s = 100 MB/s = 3,154 TB/year
       - Cloud Egress Cost = 3,154,000 GB * $0.09 = $283.8K/yr
       - Cloud Compute Cost = 5 GPUs * $0.50/hr * 8760 hr/yr = $21.9K/yr
       - Total Cloud OpEx = $21.9K + $283.8K = $305.7K/yr
       - Cloud 3-year TCO = 3 * $305.7K = $917.1K
       - Edge 3-year TCO = $80K + 3 * ($2.6K + $50K) = $237.8K
       - Edge annualized cost = $237.8K / 3 = $79.3K/yr
       - Break-even Egress Budget = $79.3K - $21.9K = $57.4K/yr = 637 TB/year
       - Break-even streaming rate = 637 TB / (1,000 * 31.5M sec) = 20.2 KB/s
    **Conclusion & Interpretation:**
       - **Result: Cost-Bound. At 100 KB/s, cloud costs about $917K over 3 years versus $238K on-device, so egress makes cloud roughly 3.9x higher.**
