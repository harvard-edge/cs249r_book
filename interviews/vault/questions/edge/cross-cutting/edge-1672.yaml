title: 'On-Premise Guardrail Architecture for High-Throughput Edge Inference'
scenario: 'Your enterprise customer requires deploying a 14B parameter LLM for sensitive document summarization entirely on-premise using a cluster of Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W). Due to strict compliance requirements, the system must include real-time PII redaction and toxicity filtering guardrails that operate alongside the main model without violating a strict 150ms end-to-end latency SLA.'
question: 'How would you co-locate a 14B summarization LLM with PII and toxicity guardrails under a 150ms on-prem latency SLA?'
details:
  realistic_solution: 'Design a pipeline where the 14B main model is quantized to INT4/INT8 to fit within a single 32GB card, leaving room for smaller, specialized INT8 guardrail models (e.g., a 1B parameter PII detector and a 500M toxicity classifier). Pipeline the execution so guardrails run asynchronously on partial output chunks rather than waiting for full sequence generation. Establish an organizational framework where guardrail triggers are asynchronously logged to a secure local audit database for continuous impact assessment and compliance reporting.'
  common_mistake: |
    **The Pitfall:** Suggesting API-based cloud guardrails or running large guardrail models sequentially.
    **The Rationale:** Candidates ignore the strict on-premise compliance requirement, or they fail to calculate the latency blow-out of running multiple inference passes sequentially on limited hardware.
    **The Consequence:** The system violates enterprise compliance policies or completely misses the 150ms real-time latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14B model in INT4 footprint = 14 * 0.5 bytes = exactly 7 GB.
    - 1.5B guardrails in INT8 footprint = 1.5 * 1 byte = exactly 1.5 GB.
    - Device memory: 32 GB LPDDR4x.
    - SLA: 150ms.

    **Calculations:**
    - Total static footprint = 7 GB + 1.5 GB = 8.5 GB.
    - Total footprint with 2 GB KV cache = 10.5 GB (Easily fits in 32 GB).
    - Main model generation at 40 tokens/sec = 25ms per token. 4 tokens = 100ms.
    - 1.5B guardrail forward pass at 400 TOPS (memory bound) takes ~10ms.

    **Conclusion & Interpretation:**
    - **Result: 110ms Total Latency (Compute-Bound)**. Running the INT8 guardrails concurrently every 4 tokens easily stays within the strict 150ms latency SLA.
