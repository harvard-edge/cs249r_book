title: On-Premise Guardrail Architecture for High-Throughput Edge Inference
scenario: Your enterprise customer requires deploying a 14B parameter LLM for sensitive document summarization entirely on-premise using a cluster of Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W). Due to strict compliance requirements, the system must include real-time PII redaction and toxicity filtering guardrails that operate alongside the main model without violating a strict 150ms end-to-end latency SLA.
question: How would you co-locate a 14B summarization LLM with PII and toxicity guardrails under a 150ms on-prem latency SLA?
details:
  realistic_solution: Use a local router with model residency pinned on the Cloud AI 100 cluster. Keep the 14B summarizer quantized to W4A8 on one accelerator instance and run compact INT8 PII/toxicity classifiers on a separate stream or second card so guardrails do not evict the main model. Apply an input PII pass before summarization, then hold each generated chunk in a small output buffer until the guardrail pass returns; only redacted, approved text is released to the client. Use fixed chunk sizes, admission control, and per-stage deadlines so overloaded requests queue or degrade to a shorter summary instead of emitting unchecked output.
  common_mistake: |
    **The Pitfall:** Suggesting API-based cloud guardrails or running large guardrail models sequentially.
    **The Rationale:** Candidates ignore the strict on-premise compliance requirement, or they fail to calculate the latency blow-out of running multiple inference passes sequentially on limited hardware.
    **The Consequence:** The system violates enterprise compliance policies or completely misses the 150ms real-time latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14B summarizer stored W4A8: about 8 GB including scales.
    - PII and toxicity guardrails total 1.5B INT8 parameters: 1.5 GB plus 0.5 GB workspace.
    - Reserve 4 GB for KV cache, activations, and runtime buffers on the main model card.
    - SLA: 150ms for a bounded short summary chunk.

    **Calculations:**
    - Main card footprint: 8 GB weights + 4 GB KV/workspace = 12 GB, leaving about 20 GB headroom.
    - Guardrail card or partition footprint: 1.5 GB weights + 0.5 GB workspace = 2 GB.
    - Budget a 96ms main-model generation chunk, 18ms guardrail pass, and 12ms redaction/router overhead.
    - If guardrails run in parallel on held chunks, exposed latency is max(96ms, 18ms) + 12ms = 108ms.
    - If forced sequentially on one stream, the same budget is 96ms + 18ms + 12ms = 126ms, still below 150ms but with less queueing margin.

    **Conclusion & Interpretation:**
    - **Result: 108-126ms gated latency (Scheduling-Bound)**. Co-locating works only if model residency is preserved and generated chunks are blocked until PII/toxicity redaction completes.
