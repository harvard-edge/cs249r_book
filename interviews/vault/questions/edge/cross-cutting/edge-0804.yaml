title: The Model Theft from Edge Device
scenario: Your company spent $2M training a proprietary detection model. It's deployed on 5,000 edge devices. A competitor buys one of your devices on the secondary market.
question: How do they extract your model, and what can you do to prevent it?
details:
  realistic_solution: 'A full defense stack (secure boot + TEE + HSM + rate-limited API) is required. The key insight: the model must be decrypted in GPU memory for inference, so encryption-at-rest alone is completely insufficient to stop memory dump attacks.'
  common_mistake: |
    **The Pitfall:** Believing simple disk encryption solves the problem.
    **The Rationale:** Engineers forget that an encrypted model must be decrypted into GPU memory at runtime to actually execute.
    **The Consequence:** Competitors easily extract the runtime model weights straight from memory after gaining physical root access to the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline IP Value: $2,000,000.

    **Calculations:**
    - Unencrypted disk extraction: $500 device + 10 min.
    - Encrypted disk (no HSM, JTAG attack): $5,000 equipment + 1 week.
    - API Distillation (100k queries): $1,000 + $50k training cost.
    - Full Defended Stack (TEE + Secure Boot): >$500,000 physical attack cost.

    **Conclusion & Interpretation:**
    - **Result: >$500,000 cost (Security-Bound)**. A full stack defense increases the extraction cost beyond a trivial margin, forcing the attacker's cost closer to the $2M training cost.
  options:
  - The solution is to reduce model complexity until it fits within the hardware constraints, accepting the accuracy trade-off as unavoidable.
  - 'Attack vectors escalate: (1) Unencrypted disk: 500 + 10 min. (2) Encrypted, no HSM: 5K JTAG + 1 week. (3) API distillation: 100K queries = $50K total. To prevent it, use a full defense stack (secure boot + TEE + HSM + rate-limited API).'
  - The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.
  - Encrypt the model file on disk.
  correct_index: 1
