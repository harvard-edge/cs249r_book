title: CUDA-to-Vulkan Compute Porting for Cross-Vendor Edge GPUs
scenario: Your edge inference engine must run on both NVIDIA Jetson and Intel Arc discrete GPUs. Vulkan Compute is the only shared GPU API.
question: Should you port the custom CUDA inference kernels to Vulkan Compute for Jetson and Intel Arc, or use a higher-level abstraction?
details:
  realistic_solution: 'For inference, Vulkan Compute is viable but constrained. Use Vulkan''s cooperative matrix extension for GPU-accelerated matmuls. Custom ops must be rewritten as GLSL compute shaders compiled to SPIR-V. Shared memory becomes workgroup-shared storage. Expect 15-25% overhead vs native CUDA on Jetson due to explicit synchronization. Alternative: use ONNX Runtime with CUDA EP (Jetson) or OpenVINO EP (Intel Arc) for a higher-level abstraction.'
  common_mistake: |
    **The Pitfall:** Treating Vulkan Compute as equivalent to CUDA in expressiveness.
    **The Rationale:** Ignoring that Vulkan compute shaders use SPIR-V and lack direct equivalents for CUDA shared memory bank conflict management, warp-level intrinsics, or dynamic parallelism.
    **The Consequence:** Grossly underestimating the engineering effort required to rewrite and optimize low-level compute kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - Custom CUDA kernel porting to Vulkan: ~4-8 weeks per complex kernel.
    - Engine has 10 custom kernels.
    - ONNX RT with EP switching: 2-4 weeks total.

    **Calculations:**
    - Porting cost = 10 * 4 to 8 = 40-80 weeks.
    - ONNX cost = 2-4 weeks.

    **Conclusion & Interpretation:**
    - **Result: 10-20x cheaper (Engineering-Bound)**. The abstraction-layer approach is 10-20x cheaper in engineering time.
