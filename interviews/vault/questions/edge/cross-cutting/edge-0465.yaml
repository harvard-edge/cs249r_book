title: The Fleet-Learning Cost Dilemma
scenario: Your goal is to improve a perception model's recall for rare 'near-miss' events across a 100,000 vehicle fleet. About 10,000 vehicles experience relevant events monthly. Centralized uploading requires 10,000 vehicles to upload 5 clips/month each (~300 MB per clip) with cloud ingress at $0.02/GB and labeling at $5/clip. Federated requires 1,000 vehicles/week to upload a 50 MB model update over cellular ($10/GB) with FL servers costing $50,000/yr.
question: Which proposal is cheaper for improving rare near-miss recall across 100,000 vehicles, centralized clip collection or federated learning?
details:
  realistic_solution: Federated learning is cheaper under the scenario's cost assumptions. Centralized collection has low cloud ingress cost, but it creates 600,000 clips per year that must be labeled at $5 each. Federated learning pays much higher cellular bandwidth and a fixed server cost, but it uploads compact model updates instead of raw clips and avoids the annual labeling bill.
  common_mistake: |
    **The Pitfall:** Comparing only the bandwidth rates and ignoring the rest of the workflow cost.
    **The Rationale:** Engineers see $0.02/GB cloud ingress versus $10/GB cellular uploads and conclude centralized collection must be cheaper without pricing the human labeling pipeline.
    **The Consequence:** The team chooses raw clip collection and inherits a multi-million-dollar annual annotation bill that dominates the bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized: 10,000 vehicles * 5 clips/month * 12 months = 600,000 clips/year.
    - Clip size: 300 MB = 0.3 GB, so centralized upload volume = 600,000 * 0.3 GB = 180,000 GB/year.
    - Centralized costs: $0.02/GB cloud ingress + $5/clip labeling.
    - Federated: 1,000 vehicles/week * 52 weeks = 52,000 updates/year.
    - Update size: 50 MB = 0.05 GB, so FL upload volume = 52,000 * 0.05 GB = 2,600 GB/year.
    - Federated costs: $10/GB cellular + $50,000/year servers.

    **Calculations:**
    - Centralized Cost = (180,000 GB * $0.02) + (600,000 * $5) = $3,600 + $3,000,000 = $3,003,600.
    - Federated Cost = (2,600 GB * $10) + $50,000 = $26,000 + $50,000 = $76,000.

    **Conclusion & Interpretation:**
    - **Result: $76k vs $3.004M.** Federated Learning is about 39.5x cheaper under these assumptions because it avoids the centralized labeling workload.
  options:
    - Centralized, because the cloud ingress cost of $0.02/GB guarantees a cost fraction 500x cheaper than the cellular reimbursement.
    - Federated Learning, because its $76,000 annual update cost is far below the centralized upload-plus-labeling cost of about $3,003,600.
    - Centralized, because avoiding the $50,000 annual baseline OPEX for FL servers ensures centralized maintains higher margins.
    - Federated Learning, but the fiscal benefits remain trivial due to the offset between labeling costs and the steep $260k data transfer tax.
