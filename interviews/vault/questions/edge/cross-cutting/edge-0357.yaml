title: The Federated Learning Transmission Trade-off
scenario: An automotive company wants to continuously improve its perception models using data from its fleet of 100,000 vehicles. For privacy and bandwidth reasons, they are using Federated Learning.
question: In this setup, what is primarily transmitted from the vehicle back to the central server to update the global model?
details:
  realistic_solution: 'The correct answer is that only the model updates (e.g., gradients or updated weights) are transmitted back to the central server. The raw sensor data, which is large and privacy-sensitive, never leaves the vehicle. The server then aggregates these updates from many vehicles to improve the global model.'
  common_mistake: |
    **The Pitfall:** Confusing federated learning with centralized training.
    **The Rationale:** Engineers assume raw data must always be collected to retrain models effectively.
    **The Consequence:** Proposing the upload of raw sensor data, which is impossibly costly in bandwidth and violates core privacy requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vehicle camera: 30 FPS, 100 KB per frame.
    - Trip duration: 10 minutes.
    - Model update size: 15 MB.

    **Calculations:**
    - Raw Data per trip: 10 mins * 60 s/min * 30 FPS * 100 KB = 1,800,000 KB = 1.8 GB.
    - Model Update Bandwidth Ratio: 1.8 GB / 15 MB = 120x.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound.** Transmitting raw data is 120x more bandwidth-intensive than sending a 15 MB model update, validating Federated Learning for privacy and network constraints.
  options:
  - Raw sensor data (e.g., images, LiDAR point clouds).
  - Anonymized user driving statistics and routes.
  - Model updates (e.g., gradients or weights).
  - Real-time inference latency and power consumption metrics.
  correct_index: 2
