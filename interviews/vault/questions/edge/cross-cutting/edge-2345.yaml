title: 'Camera PCIe Fanout Topology'
scenario: 'A robot uses four Hailo-8 chips aggregating eight 4K@30fps uncompressed RGB camera streams.'
question: 'What is the total stream bandwidth and what topology maps cameras to accelerators to prevent bus contention?'
visual:
  kind: svg
  path: edge-2345.svg
  alt: 'Hierarchical diagram routing 8 cameras into a central PCIe switch, dividing to 4 Hailo-8 chips.'
  caption: 'PCIe fanout topology for high-bandwidth camera streams.'
details:
  realistic_solution: 'A 4K@30fps uncompressed 8-bit stream is 3840*2160*3*30 = ~746 MB/s. Eight streams total ~6 GB/s. A PCIe Gen3 x8 bus (approx 8 GB/s) via a PCIe switch can comfortably fan out two streams to each Hailo-8 chip without bottlenecking.'
  common_mistake: 'Underestimating uncompressed 4K video bandwidth and proposing USB 3.0 or Gigabit Ethernet.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 streams of 4K@30fps uncompressed RGB.
    - 8-bit depth per color channel.

    **Calculations:**
    - Single stream bandwidth: 3840 * 2160 * 3 * 30 * 8 / 1e9 = 0.746 GB/s.
    - Total bandwidth: 8 * 0.746 GB/s = 5.97 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~6 GB/s (Bus-Bandwidth Bound)**. PCIe Gen3 x8 bus via a switch handles this comfortably.
