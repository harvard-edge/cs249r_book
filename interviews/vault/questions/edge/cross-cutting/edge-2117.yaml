title: 'Responsible AI Evaluation on Edge TPU: Quantized Model Comparison'
scenario: You are tasked with deploying a critical AI model for a sensitive application onto a fleet of Google Coral Edge TPUs (4 TOPS INT8, 2W, INT8 only). Your team has developed two distinct quantized INT8 model architectures, Model A and Model B, both meeting initial accuracy targets. Before deployment, the head of Responsible AI and Governance requires a comprehensive evaluation focusing on the ethical implications, potential biases, and transparency of each model within the resource constraints of the Edge TPU.
question: How would you compare Model A and Model B with model cards, explainability, failure modes, metrics, and guardrails on Coral Edge TPU?
details:
  realistic_solution: |
    Compare Model A and Model B with the same INT8 deployment evidence, not just aggregate accuracy. Each model card should report training coverage, representative calibration data, subgroup metrics, quantization loss versus FP32, latency and thermal margins on Coral Edge TPU, explainability examples, known failure modes, and required guardrails. If Model A and Model B have comparable fairness, calibration, and explainability metrics, prefer Model A because it uses less of the 4 TOPS budget and leaves more latency and thermal headroom. If Model B materially reduces high-impact failures or subgroup error despite higher compute, choose Model B only with explicit guardrails such as confidence thresholds, fallback review, drift monitoring, and field rollback criteria. The recommendation is therefore conditional: select the model with better responsible-AI evidence, using Model A's lower utilization as the tie-breaker.
  common_mistake: |
    **The Pitfall:** Treating accuracy parity as fairness parity post-quantization.
    **The Rationale:** Engineers often assume that if INT8 quantization maintains overall accuracy, the ethical and fairness implications remain unchanged from the FP32 baseline.
    **The Consequence:** This leads to incomplete model cards that don't reflect edge-specific behavioral nuances or power-induced failure modes, risking biased edge deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral Edge TPU: 4 TOPS (4000 GOPS) INT8 accelerator, about 2W device power.
    - Target SLA: 10 FPS.
    - Model A: 200 GOPS/inference. Model B: 300 GOPS/inference.
    - Both models already meet the initial accuracy target; selection should depend on fairness, latency margin, and field robustness.

    **Calculations:**
    - Model A demand at 10 FPS = 200 * 10 = 2000 GOPS/s = 2 TOPS, about 50% of peak.
    - Model B demand at 10 FPS = 300 * 10 = 3000 GOPS/s = 3 TOPS, about 75% of peak.
    - Both fit the raw compute budget; Model A leaves 2 TOPS of headroom versus 1 TOPS for Model B.

    **Conclusion & Interpretation:**
    - **Result: both models are feasible; Model A has more headroom (Evaluation-Bound).** Recommend Model A only if fairness and explainability metrics are comparable, because the numerical case supports lower utilization and latency risk, not an automatic ethical win.
