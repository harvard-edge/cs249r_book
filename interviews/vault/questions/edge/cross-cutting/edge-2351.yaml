title: PagedAttention Fragmentation
scenario: An edge SoC serves concurrent LLM requests using PagedAttention to manage its dynamic KV cache.
question: Evaluate the reduction in internal memory fragmentation if the KV page size is reduced from 256 tokens to 16 tokens.
visual:
  kind: svg
  path: edge-2351.svg
  alt: Bar chart contrasting the maximum wasted tokens between 256-token pages and 16-token pages.
  caption: Maximum internal fragmentation waste per sequence.
details:
  realistic_solution: Internal fragmentation strictly targets the trailing allocated page of a sequence. A 256-token page can waste up to 255 tokens if the sequence terminates immediately after a boundary. Reducing the block size to 16 tokens strictly caps the worst-case fragmentation to 15 tokens per request, preserving VRAM and allowing higher concurrent batch processing.
  common_mistake: |
    **The Pitfall:** Confusing internal fragmentation with external fragmentation.
    **The Rationale:** Candidates don't realize that internal fragmentation strictly occurs within the allocated blocks (wasted space at the end of a page).
    **The Consequence:** Failing to grasp why smaller page sizes directly increase effective concurrency capacity in PagedAttention systems.
  napkin_math: |
    **Assumptions & Constraints:**
       - Original page size: 256 tokens
       - Reduced page size: 16 tokens
       - Metric: Internal fragmentation waste at sequence end
    **Calculations:**
       - Max waste (256-token page): 256 - 1 = 255 tokens
       - Max waste (16-token page): 16 - 1 = 15 tokens
       - Reduction: 255 - 15 = 240 tokens per sequence
    **Conclusion & Interpretation:**
       - **Result: Memory Efficiency.** Smaller block sizes slash max internal fragmentation from 255 to 15 tokens, vastly increasing batch concurrency limits.
