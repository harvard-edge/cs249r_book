title: Pipeline Bubble in Edge RoCEv2
scenario: Four Jetson AGX Orin nodes connected via a 10 GbE switch (RoCE v2) execute an 8B INT8 vision model using pipeline parallelism (4 stages). Stage compute is 50ms per micro-batch, and activation transfer over the network is 5ms.
question: 'Calculate the pipeline bubble fraction and total end-to-end latency for a global batch size of 16 versus 64, given a micro-batch size of 4.'
details:
  realistic_solution: 'For a global batch of 16 (m=4 micro-batches) and p=4 stages, total time is (m + p - 1) * (compute + comms) = 7 * 55ms = 385ms, with a bubble fraction of (p-1)/(m+p-1) = 3/7 (42.8%). For a global batch of 64 (m=16), total time is (16 + 3) * 55ms = 1045ms, with a bubble fraction of 3/19 (15.7%). Increasing the global batch size significantly reduces the pipeline idle fraction but proportionally increases end-to-end latency.'
  common_mistake: |
    **The Pitfall:** Treating network transfer as perfectly overlapped without accounting for the pipeline flush/fill steps.
    **The Rationale:** Candidates ignore that network latency strictly adds to the critical execution path during the initial fill and final flush of the pipeline.
    **The Consequence:** Real-world end-to-end latency severely misses calculated targets, causing real-time streaming failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stages (p) = 4. Micro-batch time = 50ms compute + 5ms network = 55ms.
    - micro-batch size = 4.
    - Global batch 16: m = 4 micro-batches.
    - Global batch 64: m = 16 micro-batches.

    **Calculations:**
    - Time (m=4): (4 + 4 - 1) * 55ms = 7 * 55ms = 385ms. Bubble = (4-1)/(7) = 42.8%.
    - Time (m=16): (16 + 4 - 1) * 55ms = 19 * 55ms = 1045ms. Bubble = (4-1)/(19) = 15.7%.

    **Conclusion & Interpretation:**
    - **Result: 1045ms latency at 15.7% bubble (Pipeline-Latency Tradeoff)**. Larger batches improve efficiency but sacrifice end-to-end latency.
