title: The Federated Fleet Tax
scenario: A personalized lane-keeping feature uses Federated Learning across 50,000 test vehicles. Each vehicle performs a daily local training pass and uploads a 20 MB compressed model update over a cellular network costing $2.50 per GB. Management wants to diagnose the economic feasibility of a full rollout to 1 million vehicles, with an annual data transmission budget of $10 million.
question: What is the projected annual data transmission cost for 1 million vehicles, and is the full rollout economically feasible?
details:
  realistic_solution: |
    The correct approach is to calculate the total annual data volume for the full fleet and multiply it by the cost per GB. A full rollout to 1 million vehicles generates ~19,531 GB of data per day, or over 7.1 million GB per year. At $2.50/GB, the total annual cost is approximately $17.8 million. The diagnosis is that the feature is economically infeasible. The next engineering step would be to investigate cost-reduction strategies like Top-K Sparsification or more aggressive gradient compression.
  common_mistake: |
    **The Pitfall:** Underestimating operational expenditure from data transmission at scale.
    **The Rationale:** Engineers often focus on the privacy benefits or on-device compute costs of FL, ignoring the cellular data costs.
    **The Consequence:** Miscalculating total data volume or failing to scale costs from pilot to production, leading to a severely flawed economic projection and blown budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 1,000,000 vehicles.
    - Update size: 20 MB/day per vehicle.
    - Cellular data cost: $2.50 per GB.
    - Annual budget: $10 million.

    **Calculations:**
    - Data per vehicle per year: 20 MB/day * 365 days = 7,300 MB.
    - Conversion to GB: 7,300 MB / 1024 MB/GB ≈ 7.13 GB/vehicle/year.
    - Full fleet data: 1,000,000 vehicles * 7.13 GB = 7,130,000 GB/year.
    - Total annual cost: 7,130,000 GB * $2.50/GB ≈ $17.8 million/year.

    **Conclusion & Interpretation:**
    - **Result: ~$17.8 million/year (Operational Expenditure)**. The cost exceeds the $10M budget by 78%, making the current design economically infeasible.
  options:
  - '~$891k per year. The cost for the 50,000-vehicle pilot is well under budget, so the rollout is approved.'
  - 'The primary cost is the on-device power consumption from daily training, not data transfer. The feature is feasible if battery drain is acceptable.'
  - '~$17.8M per year. The feature is not economically viable without significant cost optimization.'
  - '~$48,828 per year. The feature is extremely cheap because federated learning minimizes data transfer compared to sending raw sensor logs.'
