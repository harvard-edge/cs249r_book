title: The Data Cost of Privacy
scenario: An automotive company is developing a driver-attention model using a fleet of 10,000 test vehicles. For a traditional centralized training approach, their plan requires uploading 1 GB of camera data per vehicle, per day.
question: 'What is the total daily data upload volume that the cloud ingest system must be designed to handle?'
details:
  realistic_solution: 'The correct answer is approximately 10 Terabytes (TB) per day. This is a foundational calculation for scoping the data infrastructure, networking costs, and overall Total Cost of Ownership (TCO) of a large-scale ML project. Provisioning for 100 GB or 1 TB would lead to immediate system failure and budget overruns.'
  common_mistake: |
    **The Pitfall:** Underestimating the sheer data scale generated by a large fleet of edge devices.
    **The Rationale:** Engineers often mentally anchor on the data volume of a single device instead of the fleet's aggregate, or confuse federated model weight volumes with centralized raw data volumes.
    **The Consequence:** Provisioning a 1 TB or 100 GB ingest pipeline that immediately bottlenecks, causing catastrophic data loss and budget overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 test vehicles.
    - 1 GB camera data per vehicle per day.

    **Calculations:**
    - Total Data = 10,000 vehicles * 1 GB/vehicle = 10,000 GB.
    - 10,000 GB = 10 TB.

    **Conclusion & Interpretation:**
    - **Result: 10 TB (Ingest-Bound)**. Provisioning smaller pipelines will lead to immediate system failure.
  options:
  - ~100 GB
  - ~1 TB
  - ~10 TB
  - ~100 TB
  correct_index: 2
