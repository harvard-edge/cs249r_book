title: Power-Aware Runtime Selection on Jetson Orin Power Profiles
scenario: 'Jetson Orin AGX has multiple power profiles: MAXN (all cores active), 50W, 30W, and 15W. Your inference service must adapt its model backend when the power profile changes.'
question: How should the Orin inference service adapt its model and TensorRT backend as nvpmodel switches from 60W to 15W?
details:
  realistic_solution: 'Pre-build and validate TensorRT engines for the power profiles you support instead of assuming one engine and one batching policy works everywhere. At 60W, use the full model if it meets latency and power targets, with FP16 or INT8 selected from measured accuracy/performance tradeoffs. At 15W, switch to a lower-compute engine: smaller model variant, INT8 where accuracy allows, batch=1 for real-time streams, fewer concurrent CUDA streams, and DLA offload only for supported subgraphs that actually benchmark well. The service should watch nvpmodel/power state changes, drain in-flight requests, swap to the matching engine and scheduler profile, then verify latency and accuracy health signals.'
  common_mistake: |
    **The Pitfall:** Only scaling the model size without adjusting the runtime hardware configuration.
    **The Rationale:** Developers assume that a smaller model will automatically run efficiently on a lower power profile without explicit configuration changes.
    **The Consequence:** Suboptimal performance and potential failure to meet the 15W power constraints, because the old batch, stream, and engine choices assume a higher sustained compute and memory-bandwidth envelope.
  napkin_math: |
    **Assumptions & Constraints:**
    - The 15W profile provides substantially less sustained compute and memory bandwidth than the 60W profile.
    - TensorRT tactic selection, workspace size, DLA placement, batch size, and stream count can differ by power profile.
    - Real-time service objective: preserve latency by reducing per-request work when the power profile drops.

    **Calculations:**
    - If profiling shows the 15W profile sustains about one-third of the 60W throughput for this workload, the service must cut effective work per frame by roughly 3x.
    - Practical levers: smaller model, INT8 engine, batch=1, fewer streams, and DLA offload where supported.
    - Each profile needs its own benchmarked latency and accuracy gate before rollout.

    **Conclusion & Interpretation:**
    - **Result: switch both the TensorRT engine and scheduler policy when moving from 60W to 15W.** The exact reduction is measured per workload; the correct adaptation is profile-specific engines plus lower-compute execution at 15W.
