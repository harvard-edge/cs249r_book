title: Power-Aware Runtime Selection on Jetson Orin Power Profiles
scenario: 'Jetson Orin AGX has multiple power profiles: MAXN (all cores active), 50W, 30W, and 15W. Your inference service must adapt its model backend when the power profile changes.'
question: How should the Orin inference service adapt its model and TensorRT backend as nvpmodel switches from 60W to 15W?
details:
  realistic_solution: |
    Pre-build TensorRT engines for each power profile since optimal layer fusion, kernel auto-tuning, and workspace allocation differ at each clock frequency. At 60W: deploy the full model with FP16, batch=8, and multiple CUDA streams to saturate the SMs. At 30W: maintain the model but reduce batch=4 and use 1 CUDA stream to accommodate reduced memory bandwidth. At 15W: switch to a smaller model variant with INT8 Post-Training Quantization (PTQ), batch=1, and offload suitable subgraphs to the DLA (Deep Learning Accelerator), which offers higher TOPS/Watt than the GPU at low voltage. Use `nvpmodel` change events to trigger engine swaps and pre-warm each engine at boot to eliminate JIT overhead and cold-start latency.
  common_mistake: |
    **The Pitfall:** Only scaling the model size without adjusting the runtime hardware configuration.
    **The Rationale:** Developers assume that a smaller model will automatically run efficiently on a lower power profile without explicit configuration changes.
    **The Consequence:** Suboptimal performance and potential failure to meet the 15W power constraints, as thread/stream configurations optimized for 1.3GHz GPU frequencies are used at 624MHz.
  napkin_math: |
    **Assumptions & Constraints:**
    - 60W Profile: ~275 TOPS INT8 GPU + 118 TOPS DLA.
    - 15W Profile: ~45 TOPS INT8 GPU + 40 TOPS DLA.
    - Latency Budget: 33ms.

    **Calculations:**
    - Compute Reduction: (275 + 118) / (45 + 40) = 393 / 85 ≈ 4.6x total (or 6x GPU-only reduction).
    - Model Scaling: At 60W, YOLOv8-L (52 GFLOPS) fits the 33ms budget. At 15W, capacity drops, requiring scale-down to YOLOv8-N (4.3 GFLOPS).

    **Conclusion & Interpretation:**
    - **Result: 4.6x compute reduction at 15W (Power-Bound)**. Requires joint model and hardware reconfiguration.
