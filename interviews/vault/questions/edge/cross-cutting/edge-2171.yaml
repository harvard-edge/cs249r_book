title: Power-Aware Runtime Selection on Jetson Orin Power Profiles
scenario: 'Jetson Orin AGX has multiple power profiles: MAXN (all cores active), 50W, 30W, and 15W. Your
  inference service must adapt its model backend when the power profile changes.'
question: How should the Orin inference service adapt its model and TensorRT backend as nvpmodel switches
  from 60W to 15W?
details:
  realistic_solution: 'Pre-build TensorRT engines for each power profile. At 60W: deploy the full model
    with FP16, batch=8, utilizing both the Ampere GPU and DLA up to the 275 TOPS limit. At 30W: reduce
    batch=4 and use fewer streams to accommodate reduced memory bandwidth. At 15W: switch to a smaller
    model variant with INT8 Post-Training Quantization (PTQ), batch=1, and aggressively offload subgraphs
    to the DLA, which offers higher TOPS/Watt than the GPU at low voltage.'
  common_mistake: '**The Pitfall:** Only scaling the model size without adjusting the runtime hardware
    configuration.

    **The Rationale:** Developers assume that a smaller model will automatically run efficiently on a
    lower power profile without explicit configuration changes.

    **The Consequence:** Suboptimal performance and potential failure to meet the 15W power constraints,
    as thread/stream configurations optimized for 1.3GHz GPU frequencies are used at 624MHz.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 60W Profile Total TOPS: ~275 TOPS INT8 (GPU + DLA).

    - 15W Profile Total TOPS: ~85 TOPS INT8 (GPU + DLA).

    - Latency Budget: 33ms.


    **Calculations:**

    - Compute Reduction: 275 / 85 = ~3.2x total compute reduction.

    - Model Scaling: At 60W, YOLOv8-L fits the 33ms budget. At 15W, capacity drops significantly, requiring
    a scale-down to YOLOv8-N.


    **Conclusion & Interpretation:**

    - **Result: ~3.2x compute reduction at 15W (Power-Bound)**. Requires joint model down-scaling and
    hardware reconfiguration to meet latency budgets under strict power limits.

    '
