title: The Federated Fleet's Billion-Dollar Upload Bill
scenario: An automotive company is evaluating the economics of retraining its perception models across a fleet of 10,000 vehicles. Strategy A involves uploading the raw 1TB sensor dataset from each vehicle for centralized cloud training. Strategy B uses Federated Learning, training on-device and only uploading a 100MB model update from each vehicle.
question: From a Total Cost of Ownership (TCO) perspective, what is the single largest cost that Federated Learning directly addresses?
details:
  realistic_solution: The correct answer is Data Transmission Cost. The primary economic advantage of Federated Learning in a large-scale automotive fleet is the drastic reduction in data volume that needs to be transmitted from the vehicle to the cloud. Uploading Petabytes of raw sensor data is prohibitively expensive due to cellular data costs and cloud ingress fees, whereas uploading small, aggregated model updates is vastly cheaper. This cost differential is the dominant factor in the TCO calculation for this use case.
  common_mistake: |
    **The Pitfall:** Assuming on-device compute power is the primary economic expense avoided by Federated Learning.
    **The Rationale:** Engineers focus on the compute required to train models locally, forgetting the massive recurring fees associated with cellular data transfer and cloud ingress.
    **The Consequence:** Failing to accurately project fleet-scale TCO, potentially leading the business to pursue an economically catastrophic centralized ingestion strategy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 vehicles.
    - Strategy A (Centralized): 1 TB upload per vehicle.
    - Strategy B (Federated): 100 MB upload per vehicle.

    **Calculations:**
    - Strategy A total data: 10,000 * 1 TB = 10 Petabytes.
    - Strategy B total data: 10,000 * 100 MB = 1 Terabyte.
    - Data volume difference: 10 PB vs 1 TB.

    **Conclusion & Interpretation:**
    - **Result: 10,000x reduction in transmitted data (Bandwidth-Cost Bound Mitigated)**. Federated Learning saves 9,999 Terabytes of prohibitively expensive cellular data transmission, which dominates the TCO calculation.
  options:
  - 'On-device Compute Power'
  - 'Cloud Storage Cost'
  - 'Data Transmission Cost (Cellular/Ingress)'
  - 'Privacy Compliance Overhead'
