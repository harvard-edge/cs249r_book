title: The Automotive Privacy-TCO Tug-of-War
scenario: You are a Staff ML Systems Engineer at an automotive company with a fleet of 100,000 vehicles. Your goal is to improve a driver drowsiness detection model by training on real user data, but privacy regulations forbid uploading raw video to the cloud.
question: Which drowsiness-training strategy is superior when risk-adjusted TCO and the raw-video upload restriction are considered, centralized anonymized uploads or Federated Learning?
details:
  realistic_solution: |
    Federated Learning is the superior strategy because the centralized raw-video upload path is disallowed by the stated privacy constraint, even if the video is later anonymized. The direct operating costs are also small enough to compare explicitly: centralized raw-video uploads would cost about $24k/year in transfer before cloud storage/processing, while FL update traffic is about $4.8k/year in transfer plus server orchestration. FL keeps raw video on the vehicles and turns privacy compliance into an architectural property rather than an after-the-fact anonymization claim.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on immediate, quantifiable data transfer costs.
    **The Rationale:** Engineers calculate direct infrastructure costs correctly but fail to factor in the unquantified catastrophic financial risk of a privacy breach.
    **The Consequence:** Selecting a centralized architecture that saves marginal operational costs but exposes the company to massive regulatory fines and reputational destruction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100k vehicles.
       - Centralized raw-video upload option: 200 MB/month per vehicle, $0.10/GB transfer.
       - Federated option: 8 rounds/month, 1000 participating vehicles per round, 5 MB update per vehicle, $10/GB cellular transfer, $25k/month FL orchestration.
    2. **Calculations:**
       - Centralized raw-video volume = 100,000 * 200 MB = 20,000,000 MB/month = 20,000 GB/month.
       - Centralized transfer cost = 20,000 GB * $0.10/GB = $2,000/month = $24,000/year, before storage/processing. This path is not compliant because it uploads raw video.
       - FL update volume = 8 * 1000 * 5 MB = 40,000 MB/month = 40 GB/month.
       - FL transfer cost = 40 GB * $10/GB = $400/month = $4,800/year.
       - FL total operating cost = $400/month transfer + $25,000/month orchestration = $25,400/month = $304,800/year.
    3. **Conclusion & Interpretation:**
       - **Result: FL is the compliant choice.** Centralized raw-video training is disallowed by the scenario, so its lower direct transfer cost does not make it viable. FL costs about $304.8k/year under these assumptions and avoids creating a centralized raw-video repository.
