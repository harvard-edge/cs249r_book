title: The Automotive Privacy-TCO Tug-of-War
scenario: You are a Staff ML Systems Engineer at an automotive company with a fleet of 100,000 vehicles. Your goal is to improve a driver drowsiness detection model by training on real user data, but privacy regulations forbid uploading raw video to the cloud.
question: Which drowsiness-training strategy is superior when risk-adjusted TCO is considered, centralized anonymized uploads or Federated Learning?
details:
  realistic_solution: Federated Learning is the superior long-term strategy. While the napkin math shows its direct data transfer costs are roughly 2x higher than the centralized approach in the first year, this cost is a predictable operational expense. The centralized approach, even with anonymization, creates a massive repository of sensitive user data. The financial risk of a single data breach would far exceed the operational cost difference. FL's 'privacy by design' architecture is a robust and defensible posture, making it the correct choice for risk-adjusted TCO.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on immediate, quantifiable data transfer costs.
    **The Rationale:** Engineers calculate direct infrastructure costs correctly but fail to factor in the unquantified catastrophic financial risk of a privacy breach.
    **The Consequence:** Selecting a centralized architecture that saves marginal operational costs but exposes the company to massive regulatory fines and reputational destruction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100k vehicles. Centralized: 200 MB/month per vehicle, $0.10/GB. Federated: 8 rounds/month, 1000 vehicles, 5 MB update, $10/GB.
    2. **Calculations:**
       - Centralized upload: 20 TB/month. Costs: $2k cellular + $11k cloud = $156k/year.
       - Federated Learning: 40 GB/month. Costs: $400 cellular + $25k FL server = $304k/year.
    3. **Conclusion & Interpretation:**
       - **Result: FL Costs $148k More.** While FL has a higher upfront TCO, this premium acts as cheap insurance against GDPR fines (often >$20M) associated with centralized biometric data stores.
