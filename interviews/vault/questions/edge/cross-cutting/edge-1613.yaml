title: On-Device Fairness Audit Calculation for Hailo-8
scenario: You are deploying a smart intersection pedestrian model on a Hailo-8 accelerator. To comply with city regulations, the system streams 260,000 stored daily frames from host memory to perform an on-device fairness audit. Group A has 2,000 positive detections out of 10,000 total samples. Group B has 75,000 positive detections out of 250,000 total samples. The INT8 model requires 50 GOPS per frame.
question: What are the exact absolute Demographic Parity Difference and theoretical minimum audit processing time on Hailo-8?
details:
  realistic_solution: Use absolute Demographic Parity Difference, defined here as the absolute gap between group selection rates. Group A's selection rate is 2,000 / 10,000 = 0.20, and Group B's is 75,000 / 250,000 = 0.30, so absolute DPD = |0.20 - 0.30| = 0.10. The audit compute is 260,000 frames * 50 GOPS/frame = 13,000,000 GOPS. At 26 TOPS = 26,000 GOPS/s, the theoretical minimum processing time is 500 seconds.
  common_mistake: |
    **The Pitfall:** Confusing Demographic Parity with Equal Opportunity, and failing TOPS to GOPS conversion.
    **The Rationale:** Candidates often use true positive rates instead of raw selection rates, and forget that 1 TOPS = 1,000 GOPS.
    **The Consequence:** This results in incorrect fairness metrics and incorrect audit processing time estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Group A: 2,000 positive / 10,000 total.
    - Group B: 75,000 positive / 250,000 total.
    - Model: 50 GOPS/frame.
    - Hailo-8 capacity: 26 TOPS (26,000 GOPS).

    **Calculations:**
    - Selection Rate A = 2,000 / 10,000 = 0.20.
    - Selection Rate B = 75,000 / 250,000 = 0.30.
    - DPD = |0.20 - 0.30| = 0.10.
    - Total compute = 260,000 * 50 GOPS = 13,000,000 GOPS.
    - Time = 13,000,000 GOPS / 26,000 GOPS/s = 500 seconds.

    **Conclusion & Interpretation:**
    - **Result: 500s (Compute-Bound Audit).** Time = 500 seconds. DPD = 0.10.
