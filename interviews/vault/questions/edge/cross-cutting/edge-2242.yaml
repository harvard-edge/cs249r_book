title: DP Noise Calibration for Sensor Fusion on Edge
scenario: A smart home hub aggregates temperature, occupancy, and audio features from 5 sensors before running a local anomaly detection model. A privacy engineer adds Laplace noise to each sensor reading independently before the fusion layer (local DP per feature). After deployment, the model's false negative rate jumps from 2% to 18%.
question: Why did per-feature LDP noise raise false negatives from 2% to 18%, and how would you fix the sensor fusion pipeline?
details:
  realistic_solution: 'Applying independent ε-LDP noise before fusion consumes privacy budget across features and injects noise before the model can use cross-sensor correlations, so weak anomalies are masked and false negatives rise. Fix: aggregate locally first, then apply a calibrated central-DP mechanism to the 1-dimensional anomaly score or alert output. This uses the privacy budget more efficiently and typically preserves substantially more signal, but it still requires validation against the target false-negative rate.'
  common_mistake: |
    **The Pitfall:** Assuming adding noise to inputs (Local DP) is equivalent to adding noise to outputs (Central DP).
    **The Rationale:** Candidates miss that privacy budget composes across features and that pre-fusion noise disrupts the correlations the anomaly model depends on.
    **The Consequence:** Independent feature noise masks weak joint signals and can drastically increase false negatives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total privacy budget: ε=5
    - Input LDP (5 features): ε=1 per feature, sensitivity Δ=1

    **Calculations:**
    - Feature Laplace scale (b): 1/1 = 1.0. Variance per feature = 2.
    - Total LDP noise variance: 5 * 2 = 10.
    - Output Central DP (1-dim score): ε=5, sensitivity Δ=1.
    - Output Laplace scale (b): 1/5 = 0.2.
    - Total Central DP noise variance: 2 * (0.2)^2 = 0.08.

    **Conclusion & Interpretation:**
    - **Result: 125x Lower Noise Variance Proxy (Accuracy-Bound)**. Output DP reduces the simple variance proxy from 10 to 0.08, typically preserving substantially more fused signal, but final false-negative performance must be validated empirically.
