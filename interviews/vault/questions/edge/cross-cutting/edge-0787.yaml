title: The Privacy-Preserving Drift Correction
scenario: An edge AI model monitoring patients for fall detection drifts by 8%. HIPAA regulations forbid uploading raw patient images to the cloud for retraining.
question: How do you fix the model without ever seeing the raw data?
details:
  realistic_solution: Use a privacy-preserving adaptation pipeline rather than collecting raw patient images. Each site or device fine-tunes locally on recent labeled or weakly labeled examples, then sends only clipped, compressed model updates through secure aggregation so the server sees an aggregate update rather than any single patient's data. Differential privacy can be added if the privacy budget and accuracy trade-off are acceptable, and on-device fine-tuning may be used for small local shifts. This reduces exposure of PHI, but it does not by itself guarantee HIPAA compliance; the system still needs access controls, audit logs, BAAs, retention limits, clinical validation, and a review of whether updates could be identifying.
  common_mistake: |
    **The Pitfall:** Proposing visual anonymization (e.g., blurring faces) before upload.
    **The Rationale:** Misunderstanding the depth of modern reconstruction models and the stringent legal definitions of PHI (Protected Health Information) under HIPAA.
    **The Consequence:** Severe legal liability and regulatory fines due to exfiltration of reconstructible medical data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 50 devices.
    - Training plan: 10 federated rounds.
    - Local update before compression: 1,000 MB per device per round.
    - Top-K sparsification target: retain 5% of update values.

    **Calculations:**
    - Compressed upload per device per round = 1,000 MB * 0.05 = 50 MB.
    - Total upload per device over 10 rounds = 50 MB * 10 = 500 MB.
    - Total fleet upload before secure aggregation = 500 MB/device * 50 devices = 25,000 MB ≈ 25 GB.

    **Conclusion & Interpretation:**
    - **Result: ~500 MB per Device, ~25 GB Fleet Upload (Privacy-Bound)**. The bandwidth is plausible for scheduled retraining, but the privacy claim comes from secure aggregation, update clipping, optional DP with a tracked privacy budget, and governance controls. The math does not justify a fixed accuracy loss or a legal compliance guarantee.
