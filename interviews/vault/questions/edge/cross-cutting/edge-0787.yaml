title: The Privacy-Preserving Drift Correction
scenario: An edge AI model monitoring patients for fall detection drifts by 8%. HIPAA regulations forbid uploading raw patient images to the cloud for retraining.
question: How do you fix the model without ever seeing the raw data?
details:
  realistic_solution: Use a privacy-preserving adaptation pipeline rather than collecting raw patient images. Each site or device fine-tunes locally on recent labeled or weakly labeled examples, then sends only clipped, compressed model updates through secure aggregation so the server sees an aggregate update rather than any single patient's data. Differential privacy can be added if the privacy budget and accuracy trade-off are acceptable, and on-device fine-tuning may be used for small local shifts. This reduces exposure of PHI, but it does not by itself guarantee HIPAA compliance; the system still needs access controls, audit logs, BAAs, retention limits, clinical validation, and a review of whether updates could be identifying.
  common_mistake: |
    **The Pitfall:** Collecting raw patient clips in a central retraining bucket after applying superficial privacy filters.
    **The Rationale:** Teams often treat the drift problem as a conventional data-collection problem and miss that raw or reconstructible patient data is exactly what the constraint forbids.
    **The Consequence:** The model update may improve accuracy, but it violates the privacy requirement and creates avoidable PHI exposure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 50 devices.
    - Training plan: 10 federated rounds.
    - Each device clips its update before secure aggregation.
    - Compressed local model update: 50 MB per device per round.
    - Optional DP noise is calibrated after clipping and tracked in a privacy budget.

    **Calculations:**
    - Total upload per device over 10 rounds = 50 MB * 10 = 500 MB.
    - Total fleet upload entering secure aggregation = 500 MB/device * 50 devices = 25,000 MB ≈ 25 GB.
    - The server receives only aggregate updates for each round; it does not receive raw images or individual unclipped updates.

    **Conclusion & Interpretation:**
    - **Result: ~500 MB per Device, ~25 GB Fleet Upload (Privacy-Bound)**. The bandwidth is plausible for scheduled federated fine-tuning, but the privacy claim comes from local training, clipping, secure aggregation, optional DP with a tracked privacy budget, and governance controls. Compression alone does not create privacy or HIPAA compliance.
