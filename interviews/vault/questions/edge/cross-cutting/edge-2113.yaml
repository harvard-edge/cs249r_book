title: Fairness Evaluation on Hailo-8 Edge Deployment
scenario: You are tasked with deploying a real-time facial recognition model on a fleet of edge devices equipped with the Hailo-8 AI accelerator (26 TOPS INT8, ~2.5W typical power consumption, dataflow architecture). The model has shown high accuracy in general benchmarks, but concerns have been raised about its fairness across different demographic groups.
question: How would you design a comprehensive fairness evaluation and mitigation strategy tailored to the computational constraints of the Hailo-8?
details:
  realistic_solution: Build a constrained fairness workflow instead of assuming the accelerator makes evaluation free. On-device, maintain sampled per-group counters, confidence histograms, and failure exemplars without retaining unnecessary PII. Offline, evaluate FPR, FNR, calibration, and demographic-parity gaps on labeled subgroup datasets, then compare INT8 Hailo-8 outputs against a reference model to isolate quantization effects. Mitigate with threshold adjustment by operating condition where legally appropriate, calibration, data rebalancing, reweighting, hard-example collection, and periodic revalidation before deploying a new compiled model.
  common_mistake: |
    **The Pitfall:** Relying solely on overall accuracy metrics or heavy FP32 evaluation pipelines.
    **The Rationale:** Candidates neglect granular subgroup analysis and propose resource-intensive fairness evaluations that exceed edge constraints and require floating-point precision not natively supported for optimal performance.
    **The Consequence:** Deploying a model that is heavily biased against specific demographics, and failing to execute evaluations efficiently on-device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Subgroups (N): 10 demographic groups.
    - Metrics (M): 2 (FPR, FNR).
    - Samples per group for an audit batch: 1000 labeled examples.
    - On-device telemetry per inference: 32 bytes of counters/scores when sampled.
    - Assume measured sustained audit throughput is 200 FPS after camera I/O, batching, and host overhead.

    **Calculations:**
    - Labeled audit examples = 10 groups * 1000 samples = 10,000 inferences.
    - Time at measured 200 FPS = 10,000 / 200 = 50 seconds, before annotation and upload time.
    - Telemetry volume = 10,000 * 32 bytes = 320 KB.
    - Energy for accelerator-only inference at 2.5W for 50 seconds = 125 J, excluding host CPU, camera, and storage.

    **Conclusion & Interpretation:**
    - **Result: Feasible Sampling, Not Free Validation**. Hailo-8 can support sampled on-device measurement, but comprehensive fairness evaluation still depends on labeled subgroup data, host overhead, and offline mitigation analysis.
