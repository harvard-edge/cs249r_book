title: 'The Driver Monitoring TCO Dilemma'
scenario: 'You are a Staff ML Systems Engineer at an automotive company evaluating the cost of updating a driver drowsiness detection model deployed across a fleet of 100,000 vehicles. The product team wants to ship a major model update each quarter (8 updates over 2 years). You are comparing two strategies over a 2-year period. Centralized requires 200 GB of data per vehicle per quarter, with cloud training costing $400,000. Federated requires a $100 per-vehicle one-time hardware BOM increase, and 8 updates with 100 communication rounds of 100 MB per round, with server costs of $500,000. Cellular data costs $0.10/GB.'
question: 'Which update strategy has the lower 2-year TCO for quarterly updates across 100,000 vehicles, centralized or federated learning?'
details:
  realistic_solution: 'The correct answer is that Federated Learning has a massive initial hardware cost, but the continuous cellular data transfer required for a Centralized approach makes it far more expensive over the 2-year lifetime. The analysis requires calculating the Total Cost of Ownership (TCO) for both strategies.'
  common_mistake: |
    **The Pitfall:** Focusing only on the large one-time hardware CapEx for Federated Learning.
    **The Rationale:** Engineers often reject $10M upfront costs without fully calculating the massive, recurring operational expense (OpEx) of cellular data transfer.
    **The Consequence:** Choosing the centralized approach and incurring millions of dollars in unnecessary data transfer costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 100,000 vehicles. Updates: 8 over 2 years.
    - Cellular data cost: $0.10/GB.
    - Centralized: 200 GB/vehicle/update, $400K cloud training.
    - Federated: $100/vehicle one-time hardware BOM, 100 rounds * 100 MB/round per update, $500K server cost.

    **Calculations:**
    - Centralized data transfer: 100,000 * 200 GB * 8 = 160,000,000 GB.
    - Centralized transfer cost: 160,000,000 GB * $0.10/GB = $16,000,000.
    - Total Centralized TCO: $16,000,000 + $400,000 = $16.4M.
    - Federated hardware BOM: 100,000 * $100 = $10,000,000.
    - Federated data transfer: 100,000 * 100 MB * 100 rounds * 8 updates = 8,000,000 GB.
    - Federated transfer cost: 8,000,000 GB * $0.10/GB = $800,000.
    - Total Federated TCO: $10,000,000 + $800,000 + $500,000 = $11.3M.

    **Conclusion & Interpretation:**
    - **Result: Federated is $5.1M cheaper (Network-Bound TCO)**. Despite the massive upfront CapEx, federated learning avoids the recurring OpEx of cellular data transfer.
  options:
  - 'Centralized, because the $10M one-time hardware cost for the fleet is prohibitively expensive.'
  - 'Centralized, because the $50,000 cloud training cost is much cheaper than the $100 per-unit BOM increase.'
  - 'Federated, because the $10M one-time hardware cost is significantly less than the $16.4M total cost of data uploads and training over 2 years.'
  - 'Federated, because performing on-device training consumes less total energy than cloud training.'
