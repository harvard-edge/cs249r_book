title: The Rainy Day mAP Cliff
scenario: Your TI TDA4VM-based ADAS system runs a pedestrian detector at 20 FPS, and the fleet uses federated learning to improve on-device perception from field data. Lab testing shows 92% mAP. Field data from a rainy Tuesday shows mAP dropped to 61% — a 31-point cliff, not a gradual decline. The camera isn't obstructed and the model runs at full speed. Rain intensity was moderate (5 mm/hr).
question: Why can moderate rain create an mAP cliff, and how should the FL pipeline treat that field signal?
details:
  realistic_solution: The cliff occurs because moderate rain creates a domain shift that pushes many borderline pedestrian detections below the model's effective threshold at the same time. Rain streaks, wet-road reflections, low contrast, and overcast lighting suppress target features across the whole frame. Camera auto-exposure may contribute by shortening exposure to avoid bright streak saturation, but it is one part of the pipeline shift rather than the sole cause. Because confidence thresholds and NMS decisions are discrete, a synchronized drop in many low-margin detections appears as a catastrophic mAP cliff instead of a smooth slope. The FL system should treat the rainy data as a distinct distribution slice for diagnosis, weighting, and validation rather than blindly averaging it into a global update.
  common_mistake: |
    **The Pitfall:** "Rain blurs the image, so accuracy drops proportionally."
    **The Rationale:** This predicts a gradual decline, not a cliff.
    **The Consequence:** Failing to diagnose the actual cause of the sudden drop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Auto-exposure jump: 1/500s to 1/1000s = 1 stop darkening.
    - Detection threshold: 0.3.

    **Calculations:**
    - Pedestrian feature activation: dry = 0.45, wet = 0.38, rain-darkened = 0.21.
    - Dry: 0.45 > 0.3 (detected).
    - Rain: 0.21 < 0.3 (missed).
    - Rain affects many frames consistently through lower contrast, streaks/reflections, and global ISP exposure changes.
    - A large cluster of low-margin pedestrian instances can cross the threshold at the same time because the degradation is synchronized across the scene.
    - In federated learning, this client update should be tagged as a rain/domain-shift slice so aggregation and evaluation can check whether it improves rainy conditions without regressing dry scenes.

    **Conclusion & Interpretation:**
    - **Result: Threshold-Bound Accuracy Cliff**. The example explains why mAP can drop abruptly: many borderline instances move from just above threshold to below threshold together. The exact 61% field mAP is an observed outcome, not derived from this single activation example, and the FL response is targeted domain-shift handling rather than blind aggregation.
