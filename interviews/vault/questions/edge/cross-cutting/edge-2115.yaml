title: Investigating False Positives in Industrial Edge Anomaly Detection After Factory Deployment
scenario: Your team has deployed a critical anomaly detection model for industrial safety on a fleet of edge devices. Recently, you've received reports from a new factory site that the model is consistently generating false positives for a specific type of machinery, which was not observed in initial testing.
question: How would you investigate the false positives at the new factory using data drift analysis, model cards, and impact assessments?
details:
  realistic_solution: |
    Investigate the false positives as a site-specific responsible-AI and data-drift problem. First, compare the new factory's input distributions, missingness, operating modes, machine types, maintenance state, and ambient conditions against the training and validation distributions. Then check the model card for documented machinery coverage, sensor assumptions, exclusion zones, known false-positive modes, and validation gaps for this factory's equipment. Use labeled samples from the new site to compute false-positive rate by machine type, shift, sensor range, and operating condition, then run an impact assessment that estimates safety, downtime, escalation burden, and who is affected by unnecessary shutdowns. Only after that should the team choose mitigation: threshold changes with approval, site-specific calibration, sensor-quality fixes, retraining with representative examples, or a temporary human review gate.
  common_mistake: |
    **The Pitfall:** Jumping straight to model retraining or hyperparameter tuning.
    **The Rationale:** Engineers default to ML-centric solutions without checking whether the new factory violates the model card's data, machinery, or operating-environment assumptions.
    **The Consequence:** The root cause remains unsolved because the team treats a deployment-context and impact-assessment problem as a generic modeling problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline validation false-positive rate for this machinery type: 2%.
    - New factory sample: 1,000 labeled normal operating windows from the reported machinery.
    - Release investigation threshold: trigger mitigation if site false-positive rate is more than 2x baseline or if impact assessment finds high operational risk.

    **Calculations:**
    - Expected false positives at baseline = 1,000 * 2% = 20 windows.
    - Observed example: 90 false positives in 1,000 windows = 9%.
    - Drift ratio = 9% / 2% = 4.5x baseline.
    - Segment the 90 false positives by machine type, operating mode, shift, and sensor-quality flags to identify the deployment condition driving the increase.

    **Conclusion & Interpretation:**
    - **Result: 4.5x baseline false positives (Drift-and-Impact Bound)**. The investigation should center on distribution shift, documented model-card limitations, and operational impact before selecting retraining, calibration, or human-review guardrails.
