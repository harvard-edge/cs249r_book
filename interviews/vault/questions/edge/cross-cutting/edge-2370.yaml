title: Edge Multi-Camera Sizing
scenario: A perception system on a Jetson AGX Orin processes 4 concurrent 1080p video streams at 30 fps. Two distinct INT8 models run heterogeneously - object detection at 50 GOPs/frame on streams 1-2, and a depth estimator at 80 GOPs/frame on streams 3-4. Each model also incurs 60 MB/frame of activation memory traffic.
question: Formulate the system's TOPS requirement AND the LPDDR5 memory-bandwidth requirement, then specify whether the system is compute-bound or bandwidth-bound. Identify the minimum Orin power mode (15W, 30W, or 60W) that satisfies both.
details:
  realistic_solution: 'Compute: 2*30*50 + 2*30*80 = 7800 GOPs/s = 7.8 TOPS theoretical. At 30% utilization, need 26 peak TOPS. Bandwidth: 4 streams * 30 fps * 60 MB = 7.2 GB/s of activations alone, plus model weight streaming - bandwidth budget requires 25-40 GB/s realized BW. 15W mode on Orin throttles LPDDR5 from 204.8 to ~67 GB/s; with the 60% utilization tax of real workloads (~40 GB/s effective), 15W is JUST enough on bandwidth but tight. 15W also caps NPU TOPS to ~20 TOPS, short of the 26 needed - so 30W is required. Answer: 30W mode minimum, gated by COMPUTE not bandwidth.'
  common_mistake: |
    **The Pitfall:** Computing TOPS limits but ignoring memory bandwidth throttling in low-power states.
    **The Rationale:** Candidates evaluate the compute constraint in isolation and miss that the 15W mode severely throttles LPDDR5 bandwidth to ~67 GB/s.
    **The Consequence:** The system experiences massive memory stalls and drops frames despite having the theoretical compute capacity.
  napkin_math: |
    1. Assumptions & Constraints:
       - 4 streams at 30 FPS
       - Streams 1-2: Detection at 50 GOPs/frame
       - Streams 3-4: Depth at 80 GOPs/frame
       - Activation memory traffic: 60 MB/frame
       - Orin 15W mode limits NPU to 20 TOPS and LPDDR5 to ~67 GB/s
    2. Calculations:
       - Total Compute = (2 * 30 * 50) + (2 * 30 * 80) = 7,800 GOPS = 7.8 TOPS
       - Required peak TOPS (at 30% util) = 7.8 TOPS / 0.30 = 26 TOPS
       - Activation Bandwidth = 4 streams * 30 FPS * 60 MB = 7.2 GB/s
       - Total Bandwidth (incl. weights) = ~37 GB/s
    3. Conclusion & Interpretation:
       - **Result: Compute-Bound. 15W mode provides sufficient bandwidth (67 GB/s) but falls short on compute (20 TOPS vs 26 TOPS required), mandating 30W mode.**
