title: INT8 Quantization Bias on Coral Edge TPU
scenario: 'You deploy a pedestrian safety model to a smart intersection camera. During FP32 validation, the model demonstrated perfect demographic parity and equalized odds. However, after deployment, you observe a severe drop in recall specifically for pedestrians using mobility aids.'
question: What hardware-specific compilation requirement of this platform is the most likely root cause of this newly introduced disparity, and how do you verify it?
details:
  realistic_solution: The root cause is biased calibration data during INT8 Post-Training Quantization (PTQ). Because the Coral Edge TPU requires strict INT8 weights and activations, the quantization process uses a small calibration set to determine activation ranges. If this set lacks minority examples (like mobility aids), the resulting scaling factors clip or compress the specific feature activations needed for those groups. The fix is to use a strictly balanced calibration dataset or switch to Quantization-Aware Training (QAT).
  common_mistake: |
    **The Pitfall:** Jumping to conclusions about data drift.
    **The Rationale:** Candidates propose retraining from scratch, failing to link the symptom to the mandatory INT8 quantization step.
    **The Consequence:** Deploying a biased model because the calibration dataset during quantization lacked minority examples.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 activation range is [0, 15.0].
    - INT8 maps this to 256 discrete bins.
    - Minority feature activations exist strictly within the [0.2, 0.8] range.

    **Calculations:**
    - INT8 step size = 15.0 / 255 $\approx$ 0.0588.
    - Minority range span = 0.8 - 0.2 = 0.6.
    - Bins assigned to minority features = 0.6 / 0.0588 $\approx$ 10 bins.

    **Conclusion & Interpretation:**
    - **Result: Minority features are compressed into just 10 integer buckets (Precision-Bound)**. Precision-Bound failure causes 96% resolution loss and bias.
