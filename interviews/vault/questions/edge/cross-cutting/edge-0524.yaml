title: The Fleet Update Bandwidth Bill
scenario: You are the lead ML Systems Engineer for a fleet of 10,000 autonomous vehicles. Each vehicle generates about 10 GB of valuable sensor data daily for potential retraining. The current model is a 50M parameter vision model using FP32 weights. Your CFO is alarmed by the cellular data bill, which is priced at $2/GB, and has asked you to solve for the most cost-effective daily update strategy. You must demonstrate the cost difference between a centralized approach and a federated learning approach.
question: Which strategy is superior and by how much?
details:
  realistic_solution: Federated Learning is the correct solution because it drastically reduces the required upload bandwidth. Instead of sending terabytes of raw data daily, the fleet only sends megabytes of model updates, directly addressing the OpEx concern.
  common_mistake: |
    **The Pitfall:** Ignoring the operational costs (OpEx) of running a system at scale.
    **The Rationale:** Engineers focus only on model accuracy or miscalculate data sizes, underestimating the cost-benefit of Federated Learning.
    **The Consequence:** Proposing a centralized architecture that incurs massive, unsustainable cellular data bills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 vehicles.
    - Centralized upload: 10 GB/day.
    - Federated model: 50M FP32 params (0.2 GB/update).
    - Data cost: $2/GB.

    **Calculations:**
    - Centralized cost = 10,000 * 10 GB * $2 = $200,000/day.
    - Federated cost = 10,000 * 0.2 GB * $2 = $4,000/day.
    - Savings = $200,000 - $4,000 = $196,000/day.

    **Conclusion & Interpretation:**
    - **Result: $196,000/day savings (Bandwidth-OpEx Bound Mitigation)**. Federated learning saves $196,000/day in OpEx.
  options:
  - Centralized training is cheaper. The cost of adding powerful compute to 10,000 vehicles for on-device training far outweighs any data savings.
  - Federated Learning is more expensive because a 50M parameter FP32 model is 200 GB, which is much larger than the 10 GB of sensor data.
  - Federated Learning is the superior choice, reducing daily data costs from $200,000 to $4,000 by avoiding raw data uploads.
  - Both strategies have similar data costs, as the intermediate tensors computed during on-device training are roughly the same size as the raw data.
  correct_index: 2
