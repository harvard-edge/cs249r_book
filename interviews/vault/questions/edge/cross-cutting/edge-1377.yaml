title: Hailo-8 Fairness Evaluation Energy & Disparity
scenario: You are deploying a pedestrian detection model on a smart city camera powered by a Hailo-8 dataflow accelerator. To evaluate Equal Opportunity across two demographic subgroups before deployment, you stream a validation dataset of 13,000 frames. The model requires 130 GOPS per inference. Subgroup A has 900 True Positives and 100 False Negatives, while Subgroup B has 700 True Positives and 300 False Negatives.
question: What are the Equal Opportunity TPR disparity, theoretical FPS, and total accelerator energy for the 13,000-frame validation run?
details:
  realistic_solution: 'Equal Opportunity focuses strictly on the True Positive Rate (TPR) difference between subgroups. For hardware performance, divide peak TOPS by per-frame GOPS to get FPS, use that to find total processing time, and multiply by the 2.5W TDP to find energy in Joules.'
  common_mistake: |
    **The Pitfall:** Confusing TPR with overall accuracy for fairness, or flubbing hardware conversions.
    **The Rationale:** Candidates rely on standard "accuracy" instead of recalling the strict definition of Equal Opportunity.
    **The Consequence:** They miscalculate the algorithmic bias metrics, and simultaneously fail to accurately estimate physical energy consumption in Joules.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload Constraints: 13,000 validation frames
       - Matrix Constraints: 26 TOPS throughput, 130 GOPS model, 2.5W draw
       - Fairness Output: Subgroup A (900 TP, 100 FN), Subgroup B (700 TP, 300 FN)
    2. **Calculations:**
       - TPR Subgroup A: 900 / 1000 = 0.90
       - TPR Subgroup B: 700 / 1000 = 0.70
       - Disparity Spread: 0.90 - 0.70 = 0.20
       - Execution Footprint: (13000 / 200 FPS) * 2.5W = 162.5 Joules
    3. **Conclusion & Interpretation:**
       - **Result: Fairness-Bound.** Despite executing the full 13,000 frame validation entirely under 163 Joules, the deployment exhibits a catastrophic 0.20 True Positive Rate disparity between sub-populations.
