title: 'Federated Learning on Hailo-8 Edge Devices: Power-Efficient Convergence with Non-IID Data'
scenario: Imagine you are designing a federated learning system for a network of battery-powered edge devices, each equipped with a Hailo-8 AI accelerator. Your goal is to train a privacy-preserving image classification model using federated averaging. The data distribution across devices is highly non-IID, and communication bandwidth is limited.
question: How do model architecture, local epochs, and aggregation frequency trade off convergence, communication, and energy on Hailo-8 federated learning?
details:
  realistic_solution: Treat this as a three-way tradeoff. A larger architecture may improve accuracy but increases local compute, activation memory, update size, and battery drain; choose the smallest model or adapter that converges on the target task. More local epochs reduce communication rounds, but on non-IID data they increase client drift and local training energy. Less frequent aggregation lowers bandwidth use, but can slow convergence or destabilize FedAvg when clients see different classes. A practical Hailo-8 deployment would use compressed updates, bounded local epochs, FedProx or personalization for drift, and aggregation cadence chosen from measured energy-per-round and validation convergence.
  common_mistake: |
    **The Pitfall:** Ignoring cumulative training and communication energy costs.
    **The Rationale:** Developers assume the Hailo-8's low inference power translates directly to low training overhead, and neglect the impact of non-IID data, running excessive local epochs that drain the battery.
    **The Consequence:** The devices rapidly exhaust their power budgets and drop off the network before convergence is achieved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy Cost: 50 J per epoch, 20 J per update transmission.
    - Local execution: 10 epochs per round.
    - Average local training/device power for this estimate: 2.5 W.

    **Calculations:**
    - Per-round energy at 10 local epochs = (10 epochs * 50 J/epoch) + 20 J/uplink update = 520 J per device.
    - If aggregation happens every 5 epochs instead, two updates are needed for 10 epochs: (10 * 50 J) + (2 * 20 J) = 540 J, but with less client drift.
    - Estimated wall-clock time at 2.5 W average power = 520 J / 2.5 W = 208 seconds.

    **Conclusion & Interpretation:**
    - **Result: 520 J Per Device Per Round**. The tradeoff is energy and convergence, not just power: fewer aggregations save about 20 J per skipped update but can require more rounds if non-IID drift hurts FedAvg.
