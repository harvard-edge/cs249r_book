title: The Federated ROI Calculation
scenario: 'You are a Staff Engineer at an automotive company planning to continuously improve a driver-assist perception model across a fleet of 10,000 vehicles. You are comparing two strategies: a centralized approach (10 GB/car/month at $0.05/GB transfer, plus $20/TB for server storage) and a federated approach ($200,000 upfront CapEx).'
question: Given centralized costs of 10 GB/car/month at $0.05/GB plus $20/TB storage versus $200k federated CapEx, what is the break-even time?
details:
  realistic_solution: The correct approach is to calculate the monthly recurring cost (OpEx) for the centralized strategy and the total upfront cost (CapEx) for the federated strategy, then find the break-even point.
  common_mistake: |
    **The Pitfall:** Focusing only on data transfer costs or ignoring hardware BOM costs.
    **The Rationale:** Candidates massively underestimate the operational expense of manual data processing and server storage.
    **The Consequence:** Incorrectly calculating the ROI, leading to a poor strategic choice for fleet-scale ML architecture.
  napkin_math: |
    1. Assumptions & Constraints:
       - Fleet size: 10,000 cars
       - Centralized data cost: 10 GB/car/month at $0.05/GB
       - Centralized storage cost: 100 TB * $20/TB = $2,000/month
       - Federated CapEx: $200,000
    2. Calculations:
       - Centralized data cost = 10,000 * 10 GB * $0.05 = $5,000/month
       - Total Centralized OpEx = $5,000 + $2,000 = $7,000/month
       - Break-even time = $200,000 / $7,000/month = 28.57 months
    3. Conclusion & Interpretation:
       - **Result: Cost-Bound. Break-even time is ~28.5 months.**
  options:
  - "140 months (Assuming $10/TB storage)"
  - "2.4 months (Assuming $5,000 OpEx)"
  - "28.5 months"
  - "The centralized approach is always cheaper"
