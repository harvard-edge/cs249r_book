title: 'Responsible AI Optimization on Edge: Bias Mitigation for Real-time Object Detection on NVIDIA
  Jetson Orin'
scenario: You are deploying a critical real-time object detection model for pedestrian safety on an NVIDIA
  Jetson Orin device (32 GB LPDDR5, 60W) in an urban environment. The model needs to process video streams
  at 30 FPS. During initial testing, you observe intermittent latency spikes that cause frame drops, specifically
  when processing scenes with diverse pedestrian demographics. This raises concerns about both system
  performance and potential demographic bias in detection rates.
question: How would you diagnose the P99 latency spikes and propose a quantifiable fix that also addresses
  demographic bias at 30 FPS?
details:
  realistic_solution: Profile to pinpoint the source of latency spikes, analyze performance metrics across
    demographics to confirm bias, and target optimizations like dynamic batching or memory access improvements.
    A quantifiable fix targets reducing worst-case latency to 20ms and improving recall for the underperforming
    group to 0.735, balancing real-time requirements with fairness metrics.
  common_mistake: '**The Pitfall:** Focusing solely on generic model optimization techniques like quantization
    while neglecting to diagnose the root cause of spikes.

    **The Rationale:** Applying generic optimizations does not address the underlying source of latency
    spikes, and techniques like quantization can disproportionately affect underrepresented groups, exacerbating
    demographic biases in the model.

    **The Consequence:** The system continues to experience intermittent latency spikes and frame drops,
    while simultaneously introducing biased detection rates that compromise pedestrian safety.'
  napkin_math: '**Assumptions & Constraints:**

    - 30 FPS requirement (~33ms budget)

    - Operation spikes from 10ms to 50ms

    - Optimized target latency: 20ms

    - Recall discrepancy: 0.70 vs 0.85

    - Target optimized recall for minority group: 0.735


    **Calculations:**

    - Worst-case latency optimization = (50ms - 20ms) / 50ms = 60% reduction

    - Bias improvement = (0.735 - 0.70) / 0.70 = +5% recall


    **Conclusion & Interpretation:**

    - **Result: 60% Latency Reduction (Compute-Bound)**. Resolving worst-case spikes to 20ms secures the
    real-time budget while simultaneously improving demographic performance parity by 5%.'
