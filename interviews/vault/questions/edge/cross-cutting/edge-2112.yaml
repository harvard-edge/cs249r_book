title: Fairness Evaluation on Edge Devices with NVIDIA Jetson Orin
scenario: You are deploying an object detection model for autonomous vehicles on an NVIDIA Jetson Orin. Regulators require strict fairness metrics (e.g., demographic parity) across different demographic groups and environmental conditions.
question: How would you evaluate and monitor demographic parity for pedestrian detection on the Jetson Orin within compute and power limits?
details:
  realistic_solution: Implement a lightweight streaming estimate of demographic parity on the Orin. For each evaluated frame, use consented labels, regulator-approved annotations, or an auditable on-device proxy for group membership, then update counters for detections and total opportunities per group rather than storing raw video. Estimate parity as the pedestrian detection rate per group and compare gaps against a policy threshold; compute precision/recall metrics separately when ground truth is available. Periodically upload aggregated counters, confidence histograms, and sampled anonymized metadata for offline audit without exposing PII.
  common_mistake: |
    **The Pitfall:** Attempting to store and stream raw video frames to the cloud for offline fairness evaluation.
    **The Rationale:** Candidates apply cloud-native MLOps practices, failing to realize that edge devices operate under severe network bandwidth constraints and privacy compliance laws.
    **The Consequence:** The cellular data budget is instantly exhausted, and transmitting raw video containing pedestrians creates a massive PII compliance violation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 100 FPS.
    - Monitored cohorts: 4 demographic groups.
    - Demographic parity counters per group: detections and total opportunities.
    - Metadata per event: ~100 bytes if sampled for audit.

    **Calculations:**
    - Metadata storage (10 min window) = 10 min * 60 s * 100 FPS = 60,000 frames.
    - Full metadata footprint = 60,000 frames * ~100 bytes/metadata = 6,000,000 bytes (~6 MB).
    - Streaming parity state = 4 groups * 2 counters * 8 bytes = 64 bytes.
    - Counter update rate = 100 FPS * 2 counter increments = 200 updates/sec.
    - Cycle cost = 200 updates * ~100 cycles/update = 20,000 CPU cycles/sec.

    **Conclusion & Interpretation:**
    - **Result: Tiny Counter State, Optional 6 MB Logs**. Demographic parity monitoring is light on CPU when done as streaming counters; the real constraints are label/proxy validity, privacy, and bandwidth for any detailed sampled metadata.
