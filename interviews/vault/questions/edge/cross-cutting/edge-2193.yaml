title: Differential Privacy for Federated Edge Learning
scenario: You're deploying federated learning across 1,000 Jetson Orin edge devices for a visual inspection model. Each device has 500 private images. The central server aggregates gradients with DP noise.
question: What clipping norm and noise multiplier do you choose to achieve (ε=5, δ=1e-5) over 100 aggregation rounds, given that each round samples 100 devices?
details:
  realistic_solution: 'Federated DP works at the device level: each device computes a model update (gradient sum over local data), clips it to norm C, and the server adds Gaussian noise calibrated to C. With subsampling: each round samples q = 100/1000 = 0.1 of devices. Using the moments accountant (RDP): for 100 rounds with subsampling rate 0.1, to achieve ε=5, δ=1e-5, the required noise multiplier is σ ≈ 2.3 (noise scale = σ × C). Clipping norm C: too small clips informative updates, too large dilutes the noise''s privacy effect. Empirically, C should be set at the median of unclipped update norms. For a ResNet-18 (11M params): typical update norms are 10-50. Set C = 20. Noise per coordinate: σ × C / num_sampled_devices = 2.3 × 20 / 100 = 0.46 per parameter. This is manageable for a model with 11M parameters — the noise averages out over dimensions.'
  common_mistake: |
    **The Pitfall:** Applying DP-SGD noise at the gradient level on each device instead of at the device update level.
    **The Rationale:** Candidates confuse local sample-level differential privacy with federated device-level differential privacy.
    **The Consequence:** Miscalibrating noise, resulting in models that either provide no privacy guarantees or are completely destroyed by excessive noise.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Devices: 1000. Rounds: 100. Sampled per round: 100 (q = 0.1).
       - Target privacy: ε = 5, δ = 1e-5.
       - ResNet-18 (11M params) median update norm C = 20.
    2. **Calculations:**
       - RDP to DP conversion at α=10: ε = RDP(α) + ln(1/δ)/(α-1) -> 5 = RDP(10) + 1.28 -> RDP ≈ 3.72.
       - Total RDP = 100 * (2 * α * q²) / σ² = 100 * (20 * 0.01) / σ² = 20 / σ².
       - Setting 20 / σ² = 3.72 gives σ² ≈ 5.37 -> σ ≈ 2.3.
       - Noise per coordinate = σ * C / num_sampled_devices = 2.3 * 20 / 100 = 0.46.
    3. **Conclusion & Interpretation:**
       - **Result: σ ≈ 2.3, C = 20, adding 0.46 noise per parameter.** This configuration meets the privacy budget without introducing overwhelmingly destructive variance.
