title: Device-Level DP Noise Calibration for Edge Federated Learning
scenario: You're deploying federated learning across 1,000 Jetson Orin edge devices for a visual inspection model. Each device has 500 private images. The central server aggregates gradients with DP noise.
question: How would you choose clipping norm and noise multiplier for device-level DP over 100 rounds with 100 of 1000 devices sampled?
details:
  realistic_solution: |
    Federated DP works at the device level: each sampled device computes one model update, clips that update to norm C, and the server adds Gaussian noise calibrated to C before aggregation. The clipping norm is not determined by ε, δ, or the number of parameters; choose it from a private or non-sensitive calibration run, commonly near the median or 75th percentile of unclipped device update norms, then validate utility. The noise multiplier must come from a DP accountant for sampled Gaussian mechanisms using q = 100/1000 = 0.1, 100 rounds, and target δ = 1e-5; start with the accountant's σ that gives ε near 5, then increase σ or reduce rounds/sample rate if the accounting result is too high. State noise as standard deviation σ * C on the clipped aggregate/update, not as per-coordinate noise divided by the number of devices.
  common_mistake: |
    **The Pitfall:** Applying DP-SGD noise at the gradient level on each device instead of at the device update level.
    **The Rationale:** Candidates confuse local sample-level differential privacy with federated device-level differential privacy.
    **The Consequence:** Miscalibrating noise, resulting in models that either provide no privacy guarantees or are completely destroyed by excessive noise.
  napkin_math: |
    **Assumptions & Constraints:**
       - Devices: 1000. Rounds: 100. Sampled per round: 100, so q = 0.1.
       - Target privacy: ε = 5, δ = 1e-5.
       - Device-level Gaussian mechanism clips each device update to norm C and adds noise with standard deviation σ * C.
    **Calculations:**
       - Sampling rate q = 100 / 1000 = 0.1.
       - C affects utility and noise scale, but does not by itself set ε; doubling C doubles the added noise standard deviation when σ is fixed.
       - σ must be found by running an RDP, PLD, or moments accountant for the sampled Gaussian mechanism across 100 rounds and checking that the resulting ε is at or below 5 for δ = 1e-5.
       - If the accountant reports ε > 5, increase σ, lower q, or reduce the number of aggregation rounds.
    **Conclusion & Interpretation:**
       - **Result: choose C from observed device update norms and choose σ from a real DP accountant.** The prompt does not uniquely determine a numeric C, and privacy noise is calibrated at the clipped device-update level.
