title: The Federated Fleet Economics
scenario: A fleet of 10,000 autonomous vehicles generates 100 GB of sensor data per car daily.
question: From a systems perspective, what is the single most significant advantage of using Federated Learning in this scenario compared to centralized training?
details:
  realistic_solution: Federated Learning drastically reduces network data transfer requirements and costs. Instead of uploading petabytes of raw, high-bandwidth sensor data over expensive cellular connections, the system transmits highly compressed model weight updates (typically megabytes). This inherently bypasses the physical cellular bandwidth limitations while securing user privacy.
  common_mistake: |
    **The Pitfall:** Believing FL's primary benefit is higher model accuracy or lower inference latency.
    **The Rationale:** Confusing the operational architecture of training (FL) with the optimization phase of inference.
    **The Consequence:** Misidentifying the core economic and physical bottleneck (cellular data exfiltration) that FL solves for massive edge fleets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 cars. Data: 100 GB/day per car. Connection: 10 Mbps.
    - FL Update size: 100 MB.

    **Calculations:**
    - Centralized Upload Time: 100 GB * 8000 Mb/GB / 10 Mbps = 80,000 seconds (22.2 hours/day).
    - FL Upload Time: 100 MB * 8 Mb/MB / 10 Mbps = 80 seconds.

    **Conclusion & Interpretation:**
    - **Result: 80 seconds vs 22.2 hours (Network-Bound)**. Centralized uploads are physically infeasible (22 hours), whereas FL takes under 2 minutes.
  options:
  - It improves model accuracy faster than centralized training.
  - It lowers on-vehicle inference latency for the end-user.
  - It dramatically reduces network data transfer costs and privacy risks.
  - It reduces the total computational (FLOPs) cost of training.
  correct_index: 2
