title: On-Device DP Inference for Medical Wearables
scenario: A cardiac monitoring wearable runs a 500K-parameter arrhythmia classifier locally. Regulations require that the device not leak raw ECG signals to the cloud. A privacy engineer proposes adding Gaussian noise to the model's output logits before transmitting alert decisions.
question: How does adding LDP noise to logits compare with keeping the 500K-parameter ECG classifier entirely on-device?
details:
  realistic_solution: Keeping inference entirely on-device is stronger for privacy because neither raw ECG nor logits leave the wearable, and a 500K-parameter INT8 classifier is only about 500KB. Adding local-DP noise to transmitted logits or alert decisions reduces the information sent to the cloud, but it also directly degrades the clinical signal. If a binary alert must be transmitted, randomized response with ε=1 would report the true alert only about 73% of the time, far below a 99.5% sensitivity target. Use on-device inference for the clinical decision, and transmit only minimal, consented telemetry when needed.
  common_mistake: |
    **The Pitfall:** Confusing output perturbation (adding noise to logits) with input perturbation or DP-SGD.
    **The Rationale:** The high sensitivity of the argmax function means you need enormous noise to achieve ε < 10.
    **The Consequence:** Output perturbation on a classifier with only 2 outputs (normal/abnormal) provides very weak privacy and destroys clinical accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 500K INT8 parameters (500KB).
    - Binary alert transmission example: ε=1 randomized response, clinical sensitivity target 99.5%.

    **Calculations:**
    - P(correct output) for ε=1: e^1 / (e^1 + 1) = 0.731.
    - Effective sensitivity: 0.731 * 0.995 = 72.8%.

    **Conclusion & Interpretation:**
    - **Result: 72.8% Sensitivity (Accuracy-Bound)**. For transmitted binary alerts, LDP noise can miss the clinical target; keeping inference on-device avoids transmitting sensitive ECG-derived outputs and preserves utility.
