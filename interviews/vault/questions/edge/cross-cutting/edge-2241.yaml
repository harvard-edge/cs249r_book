title: On-Device DP Inference for Medical Wearables
scenario: A cardiac monitoring wearable runs a 500K-parameter arrhythmia classifier locally. Regulations require that the device not leak raw ECG signals to the cloud. A privacy engineer proposes adding Gaussian noise to the model's output logits before transmitting alert decisions.
question: How does adding LDP noise to logits compare with keeping the 500K-parameter ECG classifier entirely on-device?
details:
  realistic_solution: Keeping inference entirely on-device is stronger for privacy because neither raw ECG nor logits leave the wearable, and a 500K-parameter INT8 classifier is only about 500KB. Adding local-DP noise to transmitted logits reduces information sent to the cloud, but the logits are still ECG-derived outputs and the noise directly degrades the clinical decision boundary. If a binary alert must be transmitted, randomized response with ε=1 would report the true alert only about 73% of the time, which is not comparable to preserving a calibrated 99.5% clinical sensitivity classifier on-device. Use on-device inference for the clinical decision, and transmit only minimal, consented telemetry when needed.
  common_mistake: |
    **The Pitfall:** Confusing output perturbation (adding noise to logits) with input perturbation or DP-SGD.
    **The Rationale:** The high sensitivity of the argmax function means you need enormous noise to achieve ε < 10.
    **The Consequence:** Output perturbation on a classifier with only 2 outputs (normal/abnormal) provides very weak privacy and destroys clinical accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 500K INT8 parameters (500KB).
    - Binary alert transmission example: ε=1 randomized response.
    - Clinical sensitivity target: 99.5% for the unperturbed on-device decision.

    **Calculations:**
    - P(correct output) for ε=1: e^1 / (e^1 + 1) = 0.731.
    - This 73.1% is the probability that the reported randomized-response bit equals the true bit; it is not a clinical sensitivity and should not be multiplied by 99.5%.
    - On-device inference transmits neither raw ECG nor logits, so it avoids output perturbation while preserving the model's calibrated clinical operating point.

    **Conclusion & Interpretation:**
    - **Result: on-device inference is the better privacy-utility choice.** LDP on logits or alert outputs provides limited output privacy and can degrade utility; keeping the decision local avoids transmitting sensitive ECG-derived outputs and preserves accuracy.
