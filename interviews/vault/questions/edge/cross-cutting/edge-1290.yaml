title: 'Diagnosing Guardrail Context-Switching'
scenario: 'To comply with organizational impact assessment frameworks, an auxiliary safety guardrail model is deployed alongside the main perception model on a Hailo-8 accelerator. During production testing, the system exhibits severe stuttering, with inference latency sporadically spiking by 40-50ms and power consumption exceeding the 2.5W limit. The Hailo-8 provides 26 TOPS of INT8 compute and acts as a dataflow accelerator that streams directly from host memory, possessing no local DRAM.'
question: 'What is the hardware-level root cause of this system degradation?'
details:
  realistic_solution: 'The root cause is dataflow context switching. Because the Hailo-8 lacks local DRAM, the weights for executing models must fit entirely in the on-chip SRAM to maintain its dataflow pipeline. Adding the guardrail model likely exceeded the spatial capacity of the chip, forcing the host CPU to constantly stream new model configurations and weights back and forth over the PCIe bus. This dynamic swapping drains and refills the pipeline, causing massive latency spikes and excessive power draw.'
  common_mistake: |
    **The Pitfall:** Assuming the 26 TOPS INT8 compute limit is being exceeded.
    **The Rationale:** Candidates focus entirely on thermal throttling instead of memory topology.
    **The Consequence:** Missing the architectural implication that a dataflow accelerator without local DRAM must rely on host streaming for model swapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe bandwidth: 2.0 GB/s.
    - Model sizes: Primary = 25MB, Guardrail = 15MB.
    - Frame rate: 30 FPS.

    **Calculations:**
    - Swap latency: 40MB / 2000 MB/s = 20ms per swap.
    - Swapping twice per frame adds 40ms of latency.
    - Continuous PCIe bandwidth: 40MB $\times$ 2 swaps $\times$ 30 FPS = 2.4 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 2.4 GB/s (Memory Bandwidth-Bound)**. Dynamic swapping on a dataflow accelerator without local DRAM creates massive PCIe bandwidth starvation and latency spikes.
