title: Jetson Orin Nano TFLite GPU Delegate vs ONNX Runtime CUDA EP
scenario: You need to run a MobileNetV3-small model on a Jetson Orin Nano. Both the TFLite GPU delegate and ONNX Runtime with the CUDA execution provider are available for benchmarking.
question: Which runtime yields better throughput per watt?
details:
  realistic_solution: For this Jetson Orin Nano scenario, start with ONNX Runtime using the CUDA execution provider as the throughput-per-watt baseline, then keep TFLite GPU delegate only if measurement shows better latency at the same power mode. ONNX Runtime CUDA EP maps naturally to NVIDIA CUDA/cuDNN kernels on Jetson, while the TFLite GPU delegate is primarily a mobile GPU path and is not an OpenCL advantage on this platform. For MobileNetV3-small, the winning runtime is usually determined by operator coverage, fusion, memory layout, and host overhead rather than raw TOPS. Report the runtime with the higher measured inferences/sec/W under the same nvpmodel, clocks, batch, and preprocessing path.
  common_mistake: |
    **The Pitfall:** Assuming the TFLite GPU delegate has a portable OpenCL advantage on Jetson.
    **The Rationale:** Candidates overlook that Jetson deployments are primarily optimized around NVIDIA's CUDA, cuDNN, TensorRT, and DLA software stack.
    **The Consequence:** Selecting a runtime based on the wrong acceleration model rather than measured inferences per joule on the target power profile.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin Nano INT8 peak: up to ~40 TOPS at the selected high-performance power mode.
    - MobileNetV3-small compute: ~56M MACs = ~112M operations.
    - Measured latency example: ONNX Runtime CUDA EP at 3.0ms and TFLite GPU delegate at 3.4ms under the same 15W mode.

    **Calculations:**
    - Theoretical compute floor: 112e6 / 40e12 = 2.8e-6s = 0.0028ms, so measured latency is dominated by memory traffic, fusion, and launch overhead.
    - ONNX Runtime throughput: 1000ms / 3.0ms = 333 inf/s.
    - ONNX Runtime throughput per watt: 333 / 15W = 22.2 inf/J.
    - TFLite throughput: 1000ms / 3.4ms = 294 inf/s.
    - TFLite throughput per watt: 294 / 15W = 19.6 inf/J.

    **Conclusion & Interpretation:**
    - **Result: choose ONNX Runtime CUDA EP in this measured case (22.2 vs 19.6 inf/J).** The compute floor only shows that raw TOPS is not limiting; the runtime recommendation must come from equal-power benchmarking.
