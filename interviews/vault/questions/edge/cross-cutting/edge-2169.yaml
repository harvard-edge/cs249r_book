title: TFLite vs ONNX Runtime Micro for Resource-Constrained Edge Devices
scenario: You need to run a MobileNetV3-small model on a Jetson Orin Nano. Both TFLite GPU delegate and ONNX Runtime with CUDA EP are available. TFLite uses OpenCL, ONNX RT uses CUDA.
question: Which runtime yields better throughput per watt?
details:
  realistic_solution: "For MobileNetV3 (which is dominated by depthwise separable convolutions), TFLite GPU delegate often wins on edge devices because: (1) It fuses more aggressively for depthwise conv patterns. (2) OpenCL kernels are lightweight with lower launch overhead than CUDA for small ops. (3) TFLite's memory planning is optimized for low-memory devices. Benchmarks typically show TFLite GPU: ~2.5ms, ONNX RT CUDA EP: ~3.1ms on Orin Nano. However, for transformer models, ONNX RT CUDA EP is 30-40% faster due to better cuBLAS matmul dispatch. Choose based on your model architecture."
  common_mistake: |
    **The Pitfall:** Assuming CUDA is always faster than OpenCL on NVIDIA hardware.
    **The Rationale:** Candidates overlook that TFLite's GPU delegate is heavily optimized for mobile/edge inference and fuses depthwise convolutions more aggressively than general CUDA deployments.
    **The Consequence:** Selecting a runtime that results in lower throughput per watt and sub-optimal latency for standard CNN architectures on resource-constrained devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin Nano Limits: 40 TOPS at 15W
    - MobileNetV3-small Compute: ~56M MACs = 112M OPs

    **Calculations:**
    - Theoretical Compute Floor: 112e6 / 40e12 = 0.0028ms
    - Actual Latency: ~2.5ms, meaning ~0.1% compute utilization (Memory-Bound)
    - Throughput: 1000ms / 2.5ms = 400 inferences/sec
    - Throughput/watt: 400 inf/sec / 15W = 26.7 inf/J

    **Conclusion & Interpretation:**
    - **Result: 26.7 inferences/Joule (Memory-Bound).** The model is heavily memory-bound, making kernel fusion and memory layout dominant over raw SM compute.
