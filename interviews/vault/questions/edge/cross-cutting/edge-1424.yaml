title: Analyzing Federated Averaging Bottlenecks on Jetson Orin
scenario: You are deploying a cross-silo federated learning system across several edge nodes powered by NVIDIA Jetson Orin devices. Each node trains a local model using its Ampere GPU and sends an 800 MB weight-delta update to a central server every 10 epochs. You observe the system's overall convergence time is bottlenecked during synchronization over a 100 Mbps uplink, while local training completes quickly.
question: Why does synchronization, not local training, bottleneck the Jetson Orin federated system with 800 MB updates, and how would you reduce it?
details:
  realistic_solution: The bottleneck occurs because the Jetson Orin can finish local epochs faster than it can send large model updates over the uplink. An 800 MB weight-delta payload over 100 Mbps takes about 64 seconds, so communication dominates the training round even when local compute is efficient. The system should reduce synchronization frequency and payload size with more local epochs, delta sparsification, top-k update selection, error-feedback compression, or lower-precision update encoding before aggregation.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck or power spike is due to thermal throttling during the heavy GPU compute phase.
    **The Rationale:** Engineers associate deep learning bottlenecks with raw FLOPS and GPU capacity, overlooking the network constraints.
    **The Consequence:** Optimization efforts are misdirected at the local training loop, ignoring the massive communication payload stalling the distributed system.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 epochs take ~20s locally.
    - Update payload: 800 MB.
    - Edge uplink: 100 Mbps (12.5 MB/s).

    **Calculations:**
    - Communication Delay: 800 MB / 12.5 MB/s = 64 seconds.
    - Ratio: Communication (64s) is >3x longer than compute (20s).
    - A 4x compressed or sparsified update would reduce the transfer to 200 MB, cutting synchronization to about 16 seconds on the same link.

    **Conclusion & Interpretation:**
    - **Result: >3x longer communication delay (Network-Bandwidth-Bound)**. Reducing update size or synchronizing less often directly attacks the bottleneck; the issue is network transfer time, not LPDDR5 power.
