title: On-Device Demographic Parity Energy Budget
scenario: 'You are deploying a privacy-preserving credit scoring model on an NVIDIA Jetson Orin. To comply with regulations, Demographic Parity evaluation runs entirely on-device using local data loaded into RAM. You have 200,000 historical records: Group A has 120,000 records with 30,000 approvals, and Group B has 80,000 records with 10,000 approvals.'
question: Calculate the Demographic Parity difference and total energy consumed (in Watt-hours) if evaluating 1,000 records/sec at 60W TDP.
details:
  realistic_solution: |
    Calculate the base Demographic Parity difference by determining the positive prediction rate across both groups independently of true labels (Group A: 25%, Group B: 12.5%, Difference: 12.5%). To assess the power budget, divide the total dataset size by the processing throughput to yield the temporal duration (200s), then multiply by the TDP (60W) to obtain the total energy consumed in Watt-hours (3.33 Wh), verifying the edge battery capacity.
  common_mistake: |
    **The Pitfall:** Confusing Demographic Parity with Equalized Odds or failing unit conversions.
    **The Rationale:** Candidates often condition on true labels (Equalized Odds) instead of raw approval rates, and forget to convert Watt-seconds (Joules) to Watt-hours.
    **The Consequence:** This leads to incorrect fairness metric calculations and severely underestimated energy budgets for edge evaluation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Group A: 30,000 approvals / 120,000 total.
    - Group B: 10,000 approvals / 80,000 total.
    - Processing throughput: 1,000 records/sec.
    - Power draw: 60W TDP.

    **Calculations:**
    - Demographic Parity Group A: 30,000 / 120,000 = 25%.
    - Demographic Parity Group B: 10,000 / 80,000 = 12.5%.
    - Parity Difference: |25% - 12.5%| = 12.5%.
    - Execution Time: 200,000 / 1,000 = 200 seconds.
    - Energy consumed: 60W * (200 s / 3600 s/hr) = 3.33 Watt-hours.

    **Conclusion & Interpretation:**
    - **Result: 12.5% Parity Difference and 3.33 Wh energy cost (Energy Bound)**. Evaluating fairness locally is highly energy-efficient and avoids privacy risks associated with cloud offloading.
