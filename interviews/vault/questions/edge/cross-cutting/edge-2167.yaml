title: SM80 Kernel Occupancy Limits on SM87 Jetson Ampere GPUs
scenario: Your custom CUDA kernel was tuned and compiled for an A100-class sm_80 cloud GPU, then deployed on an Ampere-based Jetson edge GPU with sm_87 support. The kernel runs, but profiling shows about 25% lower throughput than expected.
question: Why does the sm_80 CUDA kernel achieve 25% lower throughput than expected on the sm_87 edge GPU despite both being Ampere architectures?
details:
  realistic_solution: |
    The likely issue is not that "Ampere" is portable at peak performance across devices; it is that the launch configuration was tuned for the sm_80 residency limits. GA100-class sm_80 devices can support up to 2048 resident threads per SM, while Jetson-class sm_87 devices have a lower resident-thread limit such as 1536 threads per SM. With 512-thread blocks, that means 4 resident blocks per SM on sm_80 but only 3 on sm_87. The 3/4 residency ratio can reduce occupancy and memory-latency hiding enough to explain an observed throughput drop, but the exact slowdown still depends on registers, shared memory, memory stalls, and instruction mix. Retune block size and resource usage for sm_87 and build a device-specific kernel variant.
  common_mistake: |
    **The Pitfall:** Assuming all GPUs within the same architectural generation have identical Streaming Multiprocessor (SM) limits.
    **The Rationale:** Blaming memory bandwidth limits or JIT compilation overhead for the performance gap.
    **The Consequence:** Wasting time tuning memory access patterns when the kernel configuration itself is hitting a hard, die-specific occupancy wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100-class sm_80 limit used for tuning: 2048 resident threads/SM.
    - Jetson-class sm_87 limit: 1536 resident threads/SM.
    - Kernel block size: 512 threads.
    - Other occupancy limiters such as registers and shared memory are assumed not to dominate this example.

    **Calculations:**
    - sm_80 residency: 2048 / 512 = 4 blocks per SM.
    - sm_87 residency: 1536 / 512 = 3 blocks per SM.
    - Resident-block ratio: 3 / 4 = 75%.
    - Potential residency reduction: 1 - 0.75 = 25%.

    **Conclusion & Interpretation:**
    - **Result: 25% Lower Residency, Not a Universal Throughput Law**. The sm_87 device can run the kernel, but the sm_80-tuned launch shape may leave fewer resident warps and less latency hiding, so the kernel should be tuned again for sm_87.
