title: 'The Federated Fine-Tuning Payback Period'
scenario: 'You are an ML Systems Engineer for a fleet of 10,000 autonomous delivery robots. The fleet''s perception model is failing on a new type of reflective traffic sign. The two options are Federated Learning (FL) directly on the robots or collecting, scrubbing, and manually labeling images in the cloud.'
question: 'Is Federated Learning economically feasible for the 10,000-robot reflective-sign problem compared with cloud collection and manual labeling?'
details:
  realistic_solution: 'Calculate the operational cost (OpEx) for both options. The napkin math reveals that using the fleet''s distributed edge compute for Federated Learning is trivial compared to the immense cost of specialized human labor for manual annotation. On-device training leverages existing capital expenditure (CapEx) as a low-cost data generation and model improvement engine, making it economically dominant.'
  common_mistake: |
    **The Pitfall:** Assuming manual labeling is a quick and cheap fix while overestimating the cost of on-device compute.
    **The Rationale:** Engineers visualize FL as complex and power-hungry, while underestimating the massive human-hours required for production-scale annotation.
    **The Consequence:** They reject a highly cost-effective automated pipeline in favor of an expensive, unscalable manual labor process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 robots.
    - Manual annotation: 10 images/day at $0.10/img.
    - FL Compute: ~30W active for 1 hr/day. Power cost: $0.20/kWh.
    - FL Network: 50MB/day per robot at $0.01/GB.

    **Calculations:**
    - Manual cost: 10,000 * 10 * $0.10 = $10,000/day.
    - FL Power: 10,000 * 30W * 1h = 300,000 Wh = 300 kWh.
    - FL Power cost: 300 kWh * $0.20/kWh = $60/day.
    - FL Network cost: (10,000 * 50MB / 1000) * $0.01 = $5/day.
    - Total FL OpEx = $60 + $5 = $65/day.

    **Conclusion & Interpretation:**
    - **Result: $65/day (OpEx-Bound)**. FL OpEx ($65/day) is >150x cheaper than manual annotation ($10,000/day).
  options:
  - 'Manual labeling is cheaper. Running training on 1,000 devices for 3 months will incur massive energy and hardware degradation costs.'
  - 'Manual labeling is cheaper. A team of 5 annotators can label the required images in a few weeks.'
  - 'Federated Learning is drastically cheaper. The total energy cost is less than $100, whereas the manual labeling cost is $10,000 daily.'
  - 'Neither is viable. The security risk of a model poisoning attack during Federated Learning is too high for a safety-critical system.'
  correct_index: 2
