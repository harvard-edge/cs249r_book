title: The Federated vs. Centralized Upload Tax
scenario: 'Your team is deploying a fleet of 1,000 smart cameras to retail stores for person detection. You''re comparing two strategies for model updates: a centralized approach where each camera uploads 1,000 training images (100 KB each, compressed) daily to the cloud, versus a federated learning approach where each camera trains locally and only uploads the updated model weights once per day. The model is a 4 million parameter MobileNetV3 variant.'
question: For 1,000 cameras, how do daily upload volumes compare between centralized image uploads and federated MobileNetV3 weight updates?
details:
  realistic_solution: |
    Centralized uploads send about 100 GB/day for the 1,000-camera fleet: 1,000 cameras * 1,000 images * 100 KB. Federated learning sends one 4M-parameter FP16 model update per camera, about 8 MB/device/day, or 8 GB/day across the fleet. Federated upload volume is therefore about 12.5x lower, while shifting work to on-device training.
  common_mistake: |
    **The Pitfall:** Engineers often miscalculate the model size.
    **The Rationale:** They typically use 4 bytes for FP32 instead of 2 bytes for FP16, doubling the federated cost. They also calculate per-device data cost but forget to multiply by the 1,000 devices in the fleet.
    **The Consequence:** Drastically underestimating the total operational expenditure (OpEx).
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized: 1,000 devices, 1,000 images/device/day, 100 KB/image.
    - Federated: 4M parameters, FP16 (2 bytes), 1,000 devices.
    - Network cost: $0.09/GB.

    **Calculations:**
    - Centralized Data = 1,000 * 1,000 * 100 KB = 100 GB/day.
    - Federated update per device = 4,000,000 params * 2 bytes = 8,000,000 bytes ~= 8 MB/day.
    - Federated Data = 1,000 devices * 8 MB/device/day = 8 GB/day.
    - Bandwidth Savings = 100 GB - 8 GB = 92 GB/day (92% reduction).
    - Federated Cost = 8 GB/day * 30 days * $0.09 = $21.60/month.
    - Centralized Cost = 100 GB/day * 30 days * $0.09 = $270/month.

    **Conclusion & Interpretation:**
    - **Result: 92% reduction (Network-Bound)**. Federated learning reduces upload bandwidth by 12.5x, saving massive network costs at the expense of marginal on-device compute.
  options:
    - 'Centralized: ~100 MB, Federated: ~8 MB. Centralized is more expensive but only by about 12.5x.'
    - 'Centralized: ~100 GB, Federated: ~16 GB. Centralized is ~6.25x more expensive.'
    - 'Centralized: ~100 GB, Federated: ~8 GB. Centralized is ~12.5x more expensive.'
    - 'Centralized: ~100 GB, Federated: ~4 GB. Centralized is ~25x more expensive.'
