title: Privacy-Preserving Edge ML with Federated Learning and Differential Privacy
scenario: Your smart home devices collect audio and video data to detect activity. This data contains highly sensitive PII. You need to leverage this data for model improvement and debugging, but strict privacy regulations (GDPR, CCPA) prohibit sending raw PII to the cloud.
question: How do you design an end-to-end system that respects privacy while enabling ML development?
details:
  realistic_solution: |
    Keep raw audio/video on the device and run consent-aware capture, redaction, feature extraction, and labeling locally. Train through federated learning with secure aggregation so the service receives only aggregate updates, and apply a documented DP budget to updates and analytics before they leave the device. For debugging, upload privacy-safe telemetry such as clipped counters, embedding drift summaries, crash traces with PII fields stripped, and a small set of synthetic or user-consented examples; never use raw PII as the default debugging path. Gate every workflow with device identity, access controls, audit logs, retention limits, deletion support, and dataset/model lineage so GDPR/CCPA requests and internal reviews can trace what was used. Model improvement then comes from FL rounds, DP aggregate metrics, targeted on-device experiments, and privacy-reviewed exception paths.
  common_mistake: |
    **The Pitfall:** Proposing to upload raw data and anonymize it in the cloud.
    **The Rationale:** Engineers accustomed to cloud data lakes rely on central servers for data sanitization.
    **The Consequence:** Raw PII leaves the device, directly violating privacy-by-design principles and strict regulations like GDPR.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw data: 100,000 1-second audio clips (16kHz mono, ~32KB/clip)
    - Total raw PII payload: ~3.2GB

    **Calculations:**
    - Privacy-safe telemetry example: on-device processing emits 100 bytes of clipped counters or feature summaries per clip.
    - Processed telemetry size: 100,000 * 100 bytes = 10MB.
    - Data reduction ratio: 3.2GB / 10MB = 320x.
    - FL model updates and aggregate debugging metrics still need DP clipping/noise, secure aggregation, access controls, retention limits, and audit logs because small payloads can still leak sensitive information.

    **Conclusion & Interpretation:**
    - **Result: 320x less default upload, plus governed training/debugging.** Local processing reduces raw PII movement, while FL, secure aggregation, DP budgets, retention controls, and auditability make model improvement and debugging privacy-preserving instead of merely bandwidth-efficient.
