title: The Federated Fleet Cost Equation
scenario: 'Updating perception models on 10,000 vehicles. Options: (1) upload 100 GB/day of raw data to cloud, or (2) use Federated Learning to train on-device and upload gradients.'
question: From a Total Cost of Ownership (TCO) perspective, what is the single biggest economic advantage of the Federated Learning approach in this scenario?
details:
  realistic_solution: The primary economic advantage is the massive reduction in data transmission costs. Egress data costs from thousands of devices over cellular networks often dominate the entire TCO calculation.
  common_mistake: |
    **The Pitfall:** Focusing purely on cloud compute storage costs and ignoring cellular transmission fees.
    **The Rationale:** Engineers underestimate the massive, recurring cost of transferring data over commercial cellular networks.
    **The Consequence:** Building an architecture that bankrupts the product via monthly cellular egress fees.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet = 10,000 vehicles.
    - Central raw data = 100 GB/day.
    - Federated data = 100 MB/day.
    - Egress cost = $0.05/GB.

    **Calculations:**
    - Centralized = 10,000 * 100 GB * $0.05 = $50,000/day ($18M/yr).
    - Federated = 10,000 * 0.1 GB * $0.05 = $50/day ($18k/yr).

    **Conclusion & Interpretation:**
    - **Result: 1000x cost reduction (Network-Egress-Bound)**. Federated learning fundamentally alters unit economics by avoiding recurring cellular fees.
  options:
  - Lower on-device compute requirements.
  - Reduced cloud storage costs for raw data.
  - Drastically reduced cellular egress fees.
  - Faster model convergence during training.
