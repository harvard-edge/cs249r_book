title: On-Premise Intersectional Fairness Specification for Diagnostic Models
scenario: You must define the system specifications for continuously evaluating the intersectional fairness of a medical imaging model deployed on-premise in regional clinics. Due to strict patient privacy laws, all demographic parity and equalized odds evaluations must be performed locally on the edge device without transmitting raw data back to a central server.
question: How would you specify the architectural requirements to track and compute these fairness metrics across various demographic subgroups while co-locating with the primary diagnostic workload?
details:
  realistic_solution: A strong specification designs a local, streaming evaluation service that maintains running confusion matrices for each predefined intersectional subgroup on the edge CPU or a trusted local service. It should use bounded-memory counters, sliding windows, subgroup schemas, audit logs, and backpressure so metric updates never block the primary diagnostic inference path. Privacy is preserved by keeping raw images and patient records on-premise while exporting only approved aggregate metrics, and coexistence is verified with latency and resource budgets rather than by using the inference accelerator for bookkeeping.
  common_mistake: |
    **The Pitfall:** Suggesting aggregation of raw patient data to the cloud.
    **The Rationale:** Candidates default to standard cloud batch processing pipelines for fairness analysis.
    **The Consequence:** Completely ignoring on-premise privacy constraints or specifying memory-heavy jobs that exceed hardware limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Subgroup variables: 5 ages, 2 genders, 5 races, 4 risk levels.
    - Counters size: 4 metrics, 4 bytes each.
    - Sliding window index: 50,000 patients, 2 bytes each.

    **Calculations:**
    - Calculate subgroup count: 5 * 2 * 5 * 4 = 200 subgroups.
    - Memory for counters: 200 subgroups * 4 metrics * 4 bytes = 3,200 bytes.
    - Memory for sliding window index: 50,000 * 2 bytes = 100 KB.
    - Total counter and index footprint: 100 KB + 3.2 KB = 103.2 KB.

    **Conclusion & Interpretation:**
    - **Result: < 110 KB for core fairness counters and window index**. The metric service can be bounded in memory and run locally without requiring accelerator INT8 execution.
