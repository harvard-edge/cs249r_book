title: The Autonomous Vehicle Compliance Log
scenario: 'Your autonomous delivery robot must comply with NHTSA and EU AI Act regulations. Regulators require a complete audit trail: every inference decision, the sensor inputs that triggered it, and the model version — retained for 5 years. The robot processes 6 cameras at 30 FPS each.'
question: How do you log everything without impacting real-time inference or filling the onboard 512 GB NVMe in a day?
details:
  realistic_solution: |
    Implement a tiered logging architecture driven by a circular buffer on the local NVMe drive. Tier 1 (always on): lightweight metadata and bounding boxes. Tier 2 (safety events): keyframes. Tier 3 (critical incidents): full 10-second video clips. This reduces the logging burden from an impossible 15.5 TB/day to a manageable volume, enabling asynchronous offloading to cost-effective cold storage (e.g., S3 Glacier) without saturating the disk I/O thread or starving the inference pipeline.
  common_mistake: |
    **The Pitfall:** Attempting to log every raw frame to disk.
    **The Rationale:** Candidates assume that "complete audit trail" means raw, uncompressed 30 FPS video for all cameras.
    **The Consequence:** 6 cameras × 30 FPS × 1 MB/frame = 180 MB/s = 15.5 TB/day. The 512 GB NVMe fills in 47 minutes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 6 cameras at 30 FPS.
    - Frame size: ~1 MB/frame.
    - Fleet size: 500 robots.

    **Calculations:**
    - Untiered logging rate: 6 cameras * 30 FPS * 1 MB = 180 MB/s = 15.5 TB/day.
    - 5-year untiered storage per robot: 15.5 TB * 365 * 5 = 28.3 PB.
    - Tiered logging storage (estimated): ~200 TB/robot over 5 years.
    - S3 Glacier cost: 200,000 GB * $0.004/GB/mo = $800/month per robot.
    - Fleet cost: $800 * 500 = $400,000/month ($4.8M/year).

    **Conclusion & Interpretation:**
    - **Result: 15.5 TB/day raw vs manageable Tiered approach (Storage I/O Bound)**. Storing raw uncompressed footage is physically impossible on-device and financially ruinous. Tiered logging is mandatory.
