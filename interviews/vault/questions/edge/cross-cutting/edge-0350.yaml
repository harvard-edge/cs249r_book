title: 'The Edge Power Budget'
scenario: 'You are designing a federated learning system for a commercial vehicle fleet. To preserve privacy, all training happens on the vehicle''s edge processor. For the system to be economically viable, the total cost of ownership (TCO) is critical, and a major factor is the power draw''s impact on the vehicle''s battery.'
question: 'What typical power draw should you assume for a Hailo-8 edge AI accelerator in the fleet TCO analysis?'
details:
  realistic_solution: 'The Hailo-8 accelerator consumes about 2.5W. This low power draw is critical for TCO in a large fleet, as it minimizes the impact on the vehicle''s battery and overall energy consumption. Choosing a component with the right power profile is the first step in any viable edge TCO analysis.'
  common_mistake: |
    **The Pitfall:** Assuming mobile SoC or full compute module power draws.
    **The Rationale:** Engineers often confuse the power draw of a full automotive-grade compute module (like a Jetson AGX Orin at 15-60W) with that of a small, special-purpose accelerator. They might also mistakenly recall a mobile SoC power draw (~5W) or a tinyML MCU's power (~10-50mW).
    **The Consequence:** This leads to TCO calculations that are off by an order of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Correct Estimate: At 2.5W, a device running for 2 hours a day uses 2.5W * 2h = 5 Wh per day.
    - Incorrect Estimate: A device incorrectly estimated at 30W uses 30W * 2h = 60 Wh per day.

    **Calculations:**
    - Fleet Impact: Over a fleet of 10,000 vehicles for a year, this 12x error becomes a difference of (60 - 5) * 10,000 * 365 = 200,750,000 Wh.

    **Conclusion & Interpretation:**
    - **Result: 200.75 MWh (Power-Bound)**. Excess energy per year causes a massive TCO deviation.
  options:
  - '30W'
  - '700W'
  - '10mW'
  - '2.5W'
  correct_index: 3
