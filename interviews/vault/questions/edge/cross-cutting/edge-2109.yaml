title: 'On-Device Fairness Evaluation with Hailo-8'
scenario: 'You are deploying an object detection model on edge devices (26 TOPS INT8, 2.5W). Pre-deployment testing showed disparate false negative rates for underrepresented groups. You must monitor equalized odds on-device without exceeding an additional 10% compute budget or 0.2W power increase.'
question: 'How would you design this monitoring mechanism, and what formula tracks the FNR difference between groups?'
details:
  realistic_solution: 'Design a highly optimized, INT8 arithmetic counter system that runs on the accelerator''s remaining resources. Aggregate false negative and actual positive counts per group over a rolling window, calculating the simplified FNR difference periodically to track bias in real-time.'
  common_mistake: |
    **The Pitfall:** Proposing complex, resource-intensive cloud fairness metrics or floating-point post-processing.
    **The Rationale:** Candidates default to cloud-based fairness evaluation methods, ignoring strict computational edge constraints.
    **The Consequence:** The proposed solution exceeds the 10% compute budget and 0.2W power limits, making it unviable for deployment and violating privacy by transmitting raw data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary model budget: Assumed 20 TOPS. Monitoring limit: 10% (2.0 TOPS) and 0.2W.

    **Calculations:**
    - FNR_diff = (FN_A / P_A) - (FN_B / P_B).
    - Updating counts over a 100-inference window requires purely basic INT8 increments and divisions.
    - Operations per second is in the hundreds, which is << 2.0 TOPS (2 trillion ops/sec).

    **Conclusion & Interpretation:**
    - **Result: << 2.0 TOPS (Compute-Bound)**. The FNR difference calculation requires negligible compute, easily fitting within the 2.0 TOPS and 0.2W budgets using INT8 counters.
