title: Hailo-8 Hardware Specs for Model Cards
scenario: We are deploying a safety-critical monitoring model on a Hailo-8 accelerator, requiring strict adherence to our responsible AI governance framework.
question: What is the peak compute throughput, required precision, and power consumption of the Hailo-8?
details:
  realistic_solution: The Hailo-8 achieves 26 TOPS specifically using INT8 precision at a power consumption of 2.5W. As a dataflow accelerator with no local DRAM, it streams directly from host memory, dictating how safety models must be integrated and limiting fp16 capabilities.
  common_mistake: |
    **The Pitfall:** Assuming support for FP16/FP32 or local DRAM presence.
    **The Rationale:** Conflating edge NPU dataflow architectures with standard embedded GPUs that support mixed precision for fairness metrics.
    **The Consequence:** Designing guardrail models that cannot be compiled or deployed within the tight 2.5W power envelope.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device: Hailo-8 NPU.
    - Model requirement: 52 GOPS fairness-checking model.

    **Calculations:**
    - Peak Performance = 26 TOPS INT8.
    - Power Efficiency = 26 TOPS / 2.5W = 10.4 TOPS/W.
    - Theoretical minimum latency: 52 GOPS / 26 TOPS = 2 ms.

    **Conclusion & Interpretation:**
    - **Result: 2ms latency (Compute-Bound)**. The architecture provides 26 TOPS INT8 at 2.5W, enabling 2ms latency for standard fairness checks.
