title: Edge TPU Precision Requirements for Bias Evaluation
scenario: We are deploying a demographic-aware access control model on a Google Coral Edge TPU, which operates within a 2W power budget. To validate intersectional fairness and demographic parity before deployment, we must evaluate the exact model representation that will run on the device.
question: What is the mandatory numerical precision required for the Google Coral Edge TPU, and what is its peak performance per watt?
details:
  realistic_solution: The Google Coral Edge TPU requires INT8 quantized models. With the provided 4 TOPS peak performance and 2W power budget, its peak efficiency is 4 TOPS / 2W = 2 TOPS/W.
  common_mistake: |
    **The Pitfall:** Incorrectly recalling the precision as FP16 or FP32.
    **The Rationale:** Candidates assume edge devices support native floating-point operations.
    **The Consequence:** Missing that fairness evaluation metrics must be calculated post-quantization due to INT8 constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak performance = 4 TOPS.
    - Power consumption = 2W.

    **Calculations:**
    - Efficiency = 4 TOPS / 2W = 2 TOPS/Watt.

    **Conclusion & Interpretation:**
    - **Result: 2 TOPS/Watt (Compute-Bound)**. INT8 precision is mandatory to achieve these efficiency metrics.
