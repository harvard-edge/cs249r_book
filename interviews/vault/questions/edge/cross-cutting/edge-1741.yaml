title: Smart Doorbell INT8 Fairness Evaluation
scenario: Your team is deploying a real-time face detection model for a smart doorbell using a passively cooled edge accelerator. The device operates on a tight 2W power budget and requires fully INT8 quantized models. Before launch, you must design a framework to evaluate intersectional fairness.
question: How would you evaluate intersectional fairness for the INT8 face detector under the 2W deployment constraints?
details:
  realistic_solution: |
    Evaluate the deployed INT8 face detector directly on the passively cooled 2W accelerator, not just the FP32 cloud model. Build a representative dataset with enough samples for each intersectional subgroup, then report detection recall, false positive rate, false negative rate, precision, and calibration by subgroup. Sweep confidence and NMS thresholds on hardware to find operating points that meet the 2W latency and power envelope while bounding subgroup gaps, then set explicit pass/fail criteria such as minimum subgroup recall and maximum disparity from the aggregate metric. Use PTQ calibration data that covers all subgroups, but treat calibration as support for the evaluation rather than the fairness framework itself.
  common_mistake: |
    **The Pitfall:** Evaluating fairness solely on the FP32 model in the cloud.
    **The Rationale:** Candidates incorrectly assume the accuracy drop from INT8 quantization will be uniformly distributed across all demographic groups.
    **The Consequence:** Shipping an INT8 model where activation clipping disproportionately degrades accuracy for specific intersectional subgroups, causing real-world bias.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: ~0.3 GOPS per frame.
    - Throughput: ~10ms per frame (100 FPS) accounting for USB I/O.
    - Fairness Dataset: 50,000 images across 10 subgroups.
    - Hardware Limit: 2W power envelope.

    **Calculations:**
    - Validation Time: 50,000 images / 100 FPS = 500 seconds (~8.3 minutes).
    - Power Consumed: 2W * 500s = 1,000 Joules (0.00027 kWh).

    **Conclusion & Interpretation:**
    - **Result: 500s, 1000 Joules for one pass (Validation-Bound)**. A single hardware-in-the-loop pass is feasible at about 8.3 minutes, but release fairness validation still needs subgroup metrics, threshold sweeps, and repeated runs where appropriate.
