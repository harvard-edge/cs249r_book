title: 'The Federated Fleet Economics: Federated Learning'
scenario: 'Your company operates a test fleet of 1,000 autonomous vehicles, each equipped with a Jetson AGX Orin. Each vehicle generates about 500 GB of valuable sensor data per day. You are comparing two training strategies: centralized uploading versus federated learning.'
question: At $0.02/GB, what are the daily data transfer costs for uploading all 500 GB per car versus sending 100 MB FL updates?
details:
  realistic_solution: Implement a Federated Learning schema to entirely decentralize gradient extraction. Instead of transmitting raw bandwidth-heavy sensor payloads, the edge device transmits merely a lightweight, distilled gradient snapshot to the central aggregator, yielding colossal economic leverage.
  common_mistake: |
    **The Pitfall:** Grossly underestimating the compounded economic incentive of distributed machine learning.
    **The Rationale:** Engineers routinely position FL purely as a regulatory privacy mechanism, failing to model its structural impact on network ingress bills.
    **The Consequence:** Enterprise architectures needlessly incur millions of dollars in bandwidth OPEX for data hoarding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 1,000 vehicles.
    - Centralized upload: 500 GB/day per car.
    - FL upload: 0.1 GB/day (100 MB) per car.
    - Data Cost: $0.02 / GB.

    **Calculations:**
    - Centralized Volume = 1,000 * 500 GB = 500,000 GB/day.
    - Centralized Cost = 500,000 * 0.02 = $10,000/day.
    - FL Volume = 1,000 * 0.1 GB = 100 GB/day.
    - FL Cost = 100 * 0.02 = $2/day.

    **Conclusion & Interpretation:**
    - **Result: $2/day vs $10,000/day (Cost Compression)**. Converting a punishing $10k daily burn into a negligible $2 bill mandates FL.
  options:
  - The cost difference is negligible, around $10 for centralized, making the choice purely about privacy.
  - Centralized is much more expensive at ~$10,000/day, while the federated approach is almost free at ~$2/day.
  - Centralized is expensive at ~$10,000/day, but the federated approach is also costly at ~$2,000/day because model updates are large.
  - The data costs are minor; the real cost is the on-device compute for federated learning, making it more expensive overall.
  correct_index: 1
