title: 'The ''Open-Case'' Vulnerability'
scenario: 'An attacker has physical access to one of your company''s smart security cameras. They want to bypass your perception model by injecting a pre-recorded video loop directly into the image processing pipeline, making it seem like an area is always empty.'
question: 'Which physical interface on the device''s circuit board represents the most direct and highest-bandwidth point of attack for this data injection?'
details:
  realistic_solution: 'The MIPI CSI-2 (Camera Serial Interface 2) bus is the most vulnerable point. It is the standard high-speed interface connecting the image sensor to the System-on-Chip (SoC). This raw sensor data is typically unencrypted and unauthenticated, making it a prime target for a physical ''man-in-the-middle'' attack using a signal injector to feed the SoC a malicious video stream.'
  common_mistake: |
    **The Pitfall:** Focusing only on network-level security and ignoring the physical data capture pipeline.
    **The Rationale:** Engineers assume standard cloud security practices (encryption, TLS) protect the entire system.
    **The Consequence:** They leave the raw sensor data unencrypted on the PCB, allowing attackers with physical access to easily spoof the model's inputs via man-in-the-middle attacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor resolution: 2688 × 1520 pixels.
    - Format: 12-bit RAW = 1.5 bytes/pixel.
    - Frame rate: 30 FPS.

    **Calculations:**
    - Bandwidth: 2688 × 1520 × 1.5 × 30 = ~184 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 184 MB/s (Security-Bound)**. This 184 MB/s unencrypted stream over the physical MIPI CSI-2 traces is a prime target for a data injection attack.
  options:
  - 'The I2C bus used for sensor configuration.'
  - 'The encrypted LPDDR5 DRAM where the model is stored.'
  - 'The MIPI CSI-2 camera interface.'
  - 'The UART serial console used for debugging.'
  correct_index: 2
