title: 'Responsible AI on Edge: Real-time Governance for Autonomous Drones'
scenario: A safety-critical autonomous drone system performs object detection on a Jetson AGX Orin-class module (32 GB LPDDR5, up to about 200 TOPS INT8, 60W). The system must continuously monitor for bias, enforce guardrails, and run impact assessments without exceeding the hardware budget.
question: How would you architect the responsible AI pipeline to balance real-time guardrails with comprehensive impact assessments under the 60W constraint?
details:
  realistic_solution: |
    A pragmatic solution involves a multi-tiered approach. Critical, lightweight guardrails (e.g., input validation, out-of-distribution detection, basic safety rule enforcement) are implemented directly on the Jetson Orin, leveraging its INT8 capabilities and specific accelerators, providing immediate alerts. Model performance monitoring and drift detection focus on key, quantifiable metrics with low computational overhead. More extensive impact assessments, detailed bias analysis, and comprehensive model card updates are offloaded to a ground station or cloud backend during communication windows or maintenance, utilizing an asynchronous data pipeline. The red-teaming feedback loop would primarily involve logging anomalous events and human-in-the-loop review of edge cases that trigger on-device alerts.
  common_mistake: |
    **The Pitfall:** Proposing a computationally massive on-device RAI framework.
    **The Rationale:** Candidates treat responsible AI as a cloud-scale problem and specify metrics that cannot be computed locally.
    **The Consequence:** Sacrificing the primary mission's performance (dropped frames) or exceeding the 60W envelope, leading to systemic failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Platform budget: AGX Orin-class module with 32 GB LPDDR5 and a 60W sustained power envelope.
    - Primary perception model is a small detector; its average INT8 workload is far below peak TOPS, but camera ingest, preprocessing, DNN inference, and control must keep deterministic latency.
    - Reserve most GPU/DLA cycles for perception and control; RAI checks should be lightweight and bounded.
    - If OS, app, model, and runtime reserve roughly 8-12 GB, about 20-24 GB remains for buffers, logs, and short rolling windows, not for full impact assessment.

    **Calculations:**
    - On-device guardrail budget: keep checks to a small fraction of sustained power, e.g., a few watts and sub-10ms per frame.
    - Heavy bias analysis over large slices requires storing and aggregating labeled outcomes, which is better handled asynchronously off-device.

    **Conclusion & Interpretation:**
    - **Result: lightweight on-device guardrails plus asynchronous assessment (Power-Bound).** The edge device should enforce immediate safety checks locally and offload comprehensive impact assessments to a ground station or cloud when connectivity allows.
