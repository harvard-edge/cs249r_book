title: 'The Compromised Robot'
scenario: 'Your company deploys a fleet of 1,000 delivery robots, each using a Jetson AGX Orin for its vision-based navigation system. A competitor gets physical access to one of the robots. Their goal is to tamper with the onboard model weights stored in flash memory, making the robot fail to recognize stop signs.'
question: 'As the ML systems engineer, what is the most fundamental and effective first line of defense you should explain to your team to prevent the robot from ever running this maliciously modified model?'
details:
  realistic_solution: 'The correct first step is to enable Secure Boot on the Jetson AGX Orin. Secure Boot creates a hardware root of trust. It uses cryptographic signatures to ensure that every piece of software, from the bootloader to the operating system and finally to the ML model itself, is authentic and untampered. If an attacker modifies even a single bit of the model file on the flash storage, the signature verification will fail during the boot process, and the compromised code will be blocked from executing. This prevents the robot from ever running the dangerous, tampered model.'
  common_mistake: |
    **The Pitfall:** Relying purely on software updates or network firewalls for security.
    **The Rationale:** Candidates assume network-based defenses are sufficient, forgetting that physical access allows attackers to directly dump RAM or probe side-channels.
    **The Consequence:** The proprietary model weights are trivially extracted by an attacker with physical access to the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Financial risk: Extraction of proprietary 26 TOPS INT8 model compromises millions in R&D.
    - Defense mechanism: Hardware security (TEE, Secure Boot, Secure Fuses).

    **Calculations:**
    - Hardware security overhead = 5-10% addition to chip area and BOM cost.

    **Conclusion & Interpretation:**
    - **Result: 5-10% BOM Overhead (Security-Bound)**. Hardware roots of trust are highly cost-effective given the severe financial risk of model extraction at the edge.
  options:
    - 'Encrypt the model file stored on the robot''s flash memory.'
    - 'Retrain the vision model using adversarial training to make it robust to sticker attacks.'
    - 'Enable Secure Boot to create a hardware-rooted chain of trust.'
    - 'Configure a firewall on the robot to block all incoming network traffic.'
