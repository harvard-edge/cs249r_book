title: The Compromised Robot
scenario: Your company deploys a fleet of 1,000 delivery robots, each using a Jetson AGX Orin for its vision-based navigation system. A competitor gets physical access to one of the robots. Their goal is to tamper with the onboard model weights stored in flash memory, making the robot fail to recognize stop signs.
question: Which first-line defense should make the robot verify signed model artifacts before loading tampered weights?
details:
  realistic_solution: The correct first line of defense is a hardware-rooted chain of trust that extends beyond boot into model loading. Secure Boot authenticates the boot firmware, bootloader, kernel, and trusted runtime, but it does not automatically prove that an application-level model file in flash is untampered. The ML loader or update agent must verify a signed model artifact, ideally with keys protected by secure storage or fuses, before loading the weights. If the model signature fails, the robot must refuse to run that model.
  common_mistake: |
    **The Pitfall:** Assuming Secure Boot alone protects every file stored in flash.
    **The Rationale:** Secure Boot verifies the boot chain, while model weights are often loaded later by application code.
    **The Consequence:** An attacker with physical access can replace an unsigned model artifact even though the device still boots trusted firmware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Threat: attacker modifies model weights stored in flash.
    - Boot-chain control: Secure Boot verifies firmware, bootloader, kernel, and trusted runtime.
    - Model-file control: signed model artifact plus verified loader checks the weights before use.

    **Calculations:**
    - If only Secure Boot is enabled: trusted boot chain = yes; modified model file can still be loaded later = possible.
    - If Secure Boot plus signed model verification is enabled: trusted boot chain = yes; modified model file fails signature check = blocked.

    **Conclusion & Interpretation:**
    - **Result: Secure Boot is necessary but not sufficient.** The defense must extend the chain of trust to the model artifact through signed weights, verified loading, and a secure update path.
  options:
    - Encrypt the model file stored on the robot's flash memory.
    - Retrain the vision model using adversarial training to make it robust to sticker attacks.
    - Enable Secure Boot and require signed model verification in the trusted loader.
    - Configure a firewall on the robot to block all incoming network traffic.
