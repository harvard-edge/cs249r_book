title: Designing Cross-Device Federated Learning on Google Coral Edge TPUs
scenario: Imagine you are designing a cross-device federated learning system for a large network of IoT devices, each equipped with a host CPU and a Google Coral Edge TPU. The Edge TPU performs INT8 on-device inference for a privacy-sensitive application, while any local training update must run on the host CPU without centralizing raw data.
question: How would you design federated averaging for Coral Edge TPU devices with CPU-side updates, communication limits, and non-IID data?
details:
  realistic_solution: Design the system around the Coral Edge TPU as an INT8 inference accelerator, not a backpropagation engine. Use the TPU for local inference or frozen feature extraction, while the host CPU trains only a small adapter/head or computes limited local updates. Use QAT offline so the global inference model remains Edge TPU compatible. For communication, prefer small adapter updates, periodic full-model syncs, delta compression, quantization with error feedback, secure aggregation, and client sampling. For non-IID data, use FedProx, personalization heads, balanced client selection, and server-side validation before promoting a new INT8 model compiled for the TPU.
  common_mistake: |
    **The Pitfall:** Underestimating the severe constraints of the Edge TPU and typical IoT networks.
    **The Rationale:** Candidates propose float32 precision for model updates or assume continuous high-speed communication.
    **The Consequence:** The system fails due to unmanageable uplink traffic, or the Edge TPU fails to perform local backpropagation without heavy CPU fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100,000 devices.
    - Global INT8 inference model: 2M parameters (2 MB).
    - Trainable adapter/head on host CPU: 100K parameters.
    - Adapter update precision after compression: 8 bits/parameter plus small metadata.

    **Calculations:**
    - Full-model downlink broadcast per round = 2 MB * 100,000 = 200 GB fleet-wide.
    - Full-model uplink if every client returned 2 MB = 200 GB per round.
    - Adapter uplink = 100,000 parameters * 1 byte = 100 KB/client.
    - Adapter uplink fleet-wide = 100 KB * 100,000 = 10 GB per round before client sampling.
    - With 10% client sampling, adapter uplink = 1 GB per round.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound With CPU-Side Training**. Edge TPU acceleration does not make local backprop realistic; limiting trainable parameters and sampled compressed uploads cuts uplink from 200 GB to about 1 GB per round.
