title: Designing Cross-Device Federated Learning on Google Coral Edge TPUs
scenario: Imagine you are designing a cross-device federated learning system for a large network of IoT devices, each equipped with a Google Coral Edge TPU. These devices are performing on-device inference for a privacy-sensitive application. Your goal is to train a global model using federated averaging without centralizing raw data.
question: How would you design federated averaging on INT8-only Coral Edge TPUs to handle communication limits and non-IID client data?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Model Quantization-Aware Training (QAT):** Design the global model from the outset to be compatible with INT8 operations, using QAT techniques to ensure accuracy post-quantization. 2. **Communication Efficiency:** Implement aggressive sparsification (e.g., Top-K gradient selection) and compression techniques (e.g., Huffman coding, differential updates) for model updates. Employ asynchronous federated averaging to handle device dropout and varying network conditions. 3. **Non-IID Data Handling:** Incorporate personalization techniques such as adding small, locally fine-tuned head models, or use regularization methods like FedProx to mitigate client drift. Implement intelligent client selection strategies. 4. **Hardware Optimization:** Leverage TensorFlow Lite for Microcontrollers (TFLu) and the Coral Edge TPU compiler to maximize performance for INT8 operations. Optimize local training loops to minimize memory footprint and computational cycles to respect the power budget, potentially scheduling training during device charging cycles.'
  common_mistake: |
    **The Pitfall:** Underestimating the severe constraints of the Edge TPU and typical IoT networks.
    **The Rationale:** Candidates propose float32 precision for model updates or assume continuous high-speed communication.
    **The Consequence:** The system fails due to unmanageable uplink traffic, or the Edge TPU fails to perform local backpropagation without heavy CPU fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100,000 devices.
    - Model Size: 2M INT8 parameters (2 MB).
    - Sparsification target: 99.5%.
    - Compute capability: 4 TOPS.

    **Calculations:**
    - Uncompressed Update Traffic: 2 MB * 100,000 = 200 GB uplink traffic per round.
    - Sparsified Update Size: 2 MB * (1 - 0.995) = 10 KB.
    - Sparsified Traffic: 10 KB * 100,000 = 1 GB per round.
    - Compute Constraint: Backprop for 32 samples requires ~192M ops, taking ~0.048ms at 4 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound and Power-Bound.** While compute is trivially fast, moving 2MB models repeatedly across constrained buses causes severe power draw, and uncompressed gradients overwhelm the network. Aggressive gradient sparsification and charge-aware scheduling are mandatory.
