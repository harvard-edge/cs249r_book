title: Edge Intermittent Power Checkpointing
scenario: Solar-powered wildlife cameras using Jetson AGX Orin train a federated learning model. Power drops randomly average 5 times per hour. Checkpointing a 500MB model state over a 10MB/s flash storage takes 50 seconds.
question: What is the optimal checkpoint interval (in seconds) that balances checkpoint overhead against recompute time to maximize useful training progress?
visual:
  kind: svg
  path: edge-0982.svg
  alt: A graph showing checkpoint overhead decreasing and failure recompute time increasing as the checkpoint interval grows, with a minimum cost at 268 seconds.
  caption: Optimal checkpoint interval trade-off.
details:
  realistic_solution: |
    The time to write a checkpoint is C = 50s. Checkpointing every T seconds wastes a C/T fraction of time. A failure occurs with rate λ = 5/3600 = 1/720 Hz, losing an average of T/2 seconds of work per failure. The total wasted time fraction is C/T + λ*T/2. Setting the derivative to zero yields T = sqrt(2C/λ). Here, T = sqrt(2 * 50 * 720) = sqrt(72000) ≈ 268 seconds. So checkpointing roughly every 4.5 minutes minimizes wasted time.
  common_mistake: |
    **The Pitfall:** Evaluating solely based on MTBF without factoring in the high I/O time overhead.
    **The Rationale:** Engineers assume frequent checkpoints are always safer in unstable environments.
    **The Consequence:** Overly aggressive checkpointing starves the training loop, leading to negative forward progress because the system is constantly writing to flash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint cost (C): 50s.
    - Failure rate (λ): 5 times / 3600 seconds = 1/720 Hz.

    **Calculations:**
    - Optimal Interval Formula (T): T = sqrt(2 * C / λ).
    - Calculation: T = sqrt(2 * 50 * 720) = sqrt(72,000).

    **Conclusion & Interpretation:**
    - **Result: ~268 seconds (I/O-Bound)**. The optimal interval is roughly 4.5 minutes.
