title: The Data Privacy Firewall
scenario: You are designing the data strategy for a fleet of 10,000 autonomous vehicles. The fleet generates terabytes of sensor data daily, including sensitive camera and GPS information. Instead of uploading all this raw data to the cloud for model training, your team proposes using Federated Learning.
question: From a systems perspective, what is the primary and most fundamental reason to choose Federated Learning in this scenario?
details:
  realistic_solution: The primary reason is that Federated Learning keeps sensitive raw data on the user's device (the vehicle). This is a massive win for both user privacy and network bandwidth. Instead of transferring terabytes of potentially identifying sensor data, the system only sends small, aggregated model updates back to the central server. This design is often the only feasible way to learn from a large, privacy-sensitive, and distributed dataset.
  common_mistake: |
    **The Pitfall:** Believing Federated Learning's main benefit is superior model accuracy or reduced computational load.
    **The Rationale:** Candidates fail to realize that FL often involves an accuracy trade-off and increases on-device compute because it requires training.
    **The Consequence:** The system architecture is justified for the wrong reasons, leading to unexpected edge compute bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data volume: 1 TB per vehicle.
    - Uplink speed: 1.25 MB/s.
    - Fleet size: 10,000 vehicles.
    
    **Calculations:**
    - Uploading 1 TB over 1.25 MB/s: 1,000,000 MB / 1.25 MB/s = 800,000 seconds = 9.25 days per vehicle.
    - For 10,000 vehicles, generating 10 Petabytes daily, central upload is impossible.
    
    **Conclusion & Interpretation:**
    - **Result: 9.25 days (Network-Bound)**. Moving compute to the edge reduces data transfer by 99.9%, making fleet operations viable.
  options:
  - It significantly reduces the amount of computation needed on the vehicle's processor.
  - It achieves higher final model accuracy compared to centralized training.
  - It keeps sensitive user data on the device, enhancing privacy and radically reducing network costs.
  - It allows the vehicle to operate completely offline without any need for a central server.
  correct_index: 2
