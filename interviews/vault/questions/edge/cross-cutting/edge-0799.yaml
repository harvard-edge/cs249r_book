title: The Supply Chain Attack
scenario: Your edge device runs a detection model. Your security team asks how they can guarantee the model running on the device hasn't been backdoored with a trojan trigger pattern.
question: How could an attacker inject a backdoored model through the supply chain, and how do model-specific integrity checks differ from generic binary attestation?
details:
  realistic_solution: The security team is worried about an ML supply chain attack. An attacker could compromise the CI/CD pipeline, the model registry, or the quantization script to replace the legitimate model with a backdoored version. A trojaned model behaves perfectly on normal data but misclassifies when a specific trigger is present.
  common_mistake: |
    **The Pitfall:** Relying solely on checking the model file hash at deployment time.
    **The Rationale:** It verifies the file was delivered correctly from the registry, but assumes the registry or CI/CD pipeline hasn't been compromised.
    **The Consequence:** It doesn't verify what actually runs and fails to catch a backdoor injected before the hash was generated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Generic binary attestation verifies measured boot state, firmware, runtime binaries, and the signed model artifact hash.
    - Model-specific integrity checks add model provenance, signed training and conversion metadata, deterministic smoke tests, weight/hash checks after conversion, and targeted trigger/backdoor audits.

    **Calculations:**
    - A matching model hash proves the deployed artifact matches the signed artifact; it does not prove the signed artifact was trained honestly.
    - A deterministic inference test can catch gross conversion or replacement errors; it cannot prove absence of a trojan trigger because it samples only a tiny subset of the input space.
    - Backdoor assurance requires supply-chain controls plus ML-specific testing, such as trigger scans, activation analysis, data lineage review, and independent evaluation on suspicious patterns.

    **Conclusion & Interpretation:**
    - **Result: Integrity Evidence, Not Mathematical Proof (Security-Bound)**. Generic attestation answers "is this the signed binary/model artifact?" while model-specific checks ask "is the signed model itself trustworthy for ML behavior?" A single forward pass or MSE comparison cannot guarantee absence of backdoors.
