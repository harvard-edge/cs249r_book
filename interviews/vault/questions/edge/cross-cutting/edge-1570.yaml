title: On-Device Demographic Parity for Pedestrian Intention
scenario: You are deploying a pedestrian intention prediction model on an autonomous delivery robot powered by an edge SoC. The system monitors its own fairness by running an attribute classifier alongside the main model. Over a 1-hour window, adults appear in 80,000 frames and children in 28,000 frames. The model predicts "intent to cross" for adults in 16,000 frames and for children in 7,000 frames.
question: What is the Demographic Parity Difference between adults and children, and what is the TOPS overhead of a 0.5% fairness classifier?
details:
  realistic_solution: |
    Demographic Parity Difference evaluates the absolute difference in positive prediction rates (selection rates) between protected groups, strictly independent of the ground-truth labels. The attribute classifier runs inference on every frame to log these rates. To calculate the TOPS overhead, multiply the dedicated allocation percentage directly against the SoC's peak theoretical throughput. Deploying this fairness monitor continuously is critical for safety-critical edge applications where model drift can occur autonomously.
  common_mistake: |
    **The Pitfall:** Mixing up Demographic Parity with Equalized Odds.
    **The Rationale:** Attempting to incorporate ground-truth labels into the calculation, which Demographic Parity does not require.
    **The Consequence:** Implementing overly complex fairness monitoring that requires costly true-label data streams at the edge, violating power and bandwidth constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge SoC: 275 TOPS INT8.
    - Fairness Overhead Target: 0.5% of total compute.

    **Calculations:**
    - Adult Selection Rate: 16,000 positive / 80,000 total = 20%.
    - Child Selection Rate: 7,000 positive / 28,000 total = 25%.
    - Demographic Parity Difference: |20% - 25%| = 5%.
    - Compute Overhead: 0.005 * 275 TOPS = 1.375 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 5% parity difference, 1.375 TOPS overhead (Compute Overhead-Bound)**. Fairness Monitoring.
