title: Skewed Edge A/B Testing
scenario: You are deploying a new RL-based energy-saving model to 100,000 smart HVAC controllers. You want to run an A/B test to measure energy savings. However, household energy usage varies wildly based on climate (e.g., Arizona vs. Alaska) and insulation. A standard randomized 50/50 split yields massive variance, hiding the model's actual impact.
question: How would you design the HVAC A/B test to measure energy savings despite huge climate and insulation variance across homes?
details:
  realistic_solution: Use Switchback (Crossover) Testing or Stratified Sampling based on edge-computed embeddings. In a switchback design, each individual edge device alternates between Model A (Control) and Model B (Treatment) in randomized blocks (e.g., daily or weekly). The device acts as its own control, completely isolating the environmental variance (climate, house size) from the model performance. Alternatively, edge devices can locally compute a 'climate/usage embedding' and send it to the cloud, allowing the MLOps platform to pair similar homes into matched A/B cohorts. This trades off temporal correlation risks (e.g., weather changing day-to-day) for a massive reduction in cross-sectional variance.
  common_mistake: |
    **The Pitfall:** Running the test longer or randomly assigning more users to smooth out the variance.
    **The Rationale:** Candidates default to standard large-scale web A/B testing tactics, ignoring that physical edge environments possess fixed baseline differences that overwhelm the signal.
    **The Consequence:** The A/B test takes months to run and costs drastically more, all while potentially still failing to isolate the true impact of the model.
  napkin_math: |
    **Assumptions & Constraints:**
       - Between-home variance (\sigma_between) = $50/month.
       - Within-home day-to-day variance (\sigma_within) = $5/month.
       - Target model impact (\delta) = $5/month.
    **Calculations:**
       - Standard A/B sample size (N): 2 * (1.96+0.84)^2 * 50^2 / 5^2 ≈ 1,568 homes per group.
       - Switchback design sample size (N): 2 * (1.96+0.84)^2 * 5^2 / 5^2 ≈ 16 homes per group.
    **Conclusion & Interpretation:**
       - **Result: ~100x Reduction in Sample Size**. Switchback testing isolates environmental variance, requiring drastically fewer devices to achieve the same statistical power.
  options:
  - Run a standard A/B test but increase the sample size to all 100,000 homes to statistically overpower the variance.
  - Use a simple pre/post test on the entire fleet without a control group, assuming historical data is a perfect baseline.
  - Running the test longer or randomly assigning more users to smooth out the variance.
  - Use Switchback (Crossover) Testing or Stratified Sampling based on edge-computed embeddings. In a switchback design, each individual edge device alternates between Model A (Control) and Model B (Treatment) in randomized blocks (e.g., daily or weekly).
