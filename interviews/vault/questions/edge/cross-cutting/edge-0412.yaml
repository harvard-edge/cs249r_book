title: The Invisible Inventory
scenario: You are the ML Systems Engineer for a fleet of smart retail cameras using object detection to track inventory. Suddenly, the system-wide inventory count for one specific high-value product, 'Glo-Cola,' flatlines, even though store staff confirm shelves are fully stocked. All other products are detected correctly. Device dashboards show normal latency and high GPU utilization.
question: What is the most likely cause of this sudden, targeted failure?
details:
  realistic_solution: The most likely cause is a physical adversarial attack. An attacker has designed an 'adversarial patch' and placed it on the bottles. This patch contains noise specifically designed to fool the object detection model, causing it to ignore the product. The GPU runs normally because it's still processing frames; the input data itself has been physically manipulated.
  common_mistake: |
    **The Pitfall:** Blaming standard operational issues like model drift or data pipeline errors.
    **The Rationale:** Engineers assume software faults first. However, drift is a gradual process, not a sudden cliff-edge failure for a single category.
    **The Consequence:** Investigating software and training pipelines fruitlessly while a physical attack successfully continues in the real world.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera Input: 640x640 pixels.
    - Attack Target: Bounding box size vs patch size.

    **Calculations:**
    - A patch occupying <5% of a bounding box is mathematically sufficient to hijack the network's attention via adversarial gradient optimization.

    **Conclusion & Interpretation:**
    - **Result: <5% patch size (Data-Bound)**. The system correctly processes data, but a physical patch successfully bypasses the localized activation threshold for that specific class.
  options:
  - The model has drifted due to a change in store lighting, and the 'Glo-Cola' bottle was the first to be affected.
  - A recent OTA model update was corrupted, causing it to fail on this specific object class.
  - A physical adversarial patch has been placed on the 'Glo-Cola' bottles, making them invisible to the model.
  - The camera sensors across the fleet have simultaneously developed a hardware fault that prevents them from seeing the specific red color of the 'Glo-Cola' logo.
  correct_index: 2
