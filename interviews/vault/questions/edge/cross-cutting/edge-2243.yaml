title: Fairness Degradation from Quantization on Edge
scenario: 'A face verification model (FP32) passes your fairness audit: FPR gap between skin tone groups is 1.8%, within the 2% SLA. After PTQ to INT8 for edge deployment, the FPR gap widens to 6.2%. Overall accuracy drops only 0.4%.'
question: Why did INT8 PTQ widen the skin-tone FPR gap from 1.8% to 6.2%, and how would you fix the calibration process?
details:
  realistic_solution: Post-Training Quantization uses a calibration dataset to set clipping boundaries. If the calibration dataset represents a skewed demographic distribution, the resulting quantization scheme will clip and destroy subtle activation ranges utilized by underrepresented groups. The architectural fix requires rigorous stratified sampling across the PTQ calibration dataset to balance activation range capture and strictly preserve demographic parity.
  common_mistake: |
    **The Pitfall:** Assuming overall accuracy is a sufficient proxy for fairness during quantization calibration.
    **The Rationale:** Engineers often use standard PTQ calibration which minimizes average quantization error across the entire calibration set.
    **The Consequence:** If minority subgroups are underrepresented, their specific feature activations are clipped, disproportionately degrading fairness metrics while overall accuracy barely moves.
  napkin_math: |
    **Assumptions & Constraints:**
       - Standard calibration: 128 images
       - Biased dataset: 90% light skin (115 light, 13 dark)
       - Proposed calibration: 600 stratified images (100 per Fitzpatrick scale)
    **Calculations:**
       - Dark skin samples in standard calib: 13 / 128 ≈ 10%
       - Saturation rate: ~15% of dark-skin specific activations clipped
       - CPU calibration latency overhead: 600 images / 128 images ≈ 4.7x longer
    **Conclusion & Interpretation:**
       - **Result: Precision-Bound Fairness Degradation.** Biased calibration clips activations specific to minority subgroups. Stratified PTQ calibration restores fairness with minimal CPU time cost (<30s).
