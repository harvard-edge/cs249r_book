title: ONNX Runtime TensorRT EP vs Standalone TensorRT on Jetson Orin
scenario: You deploy a YOLOv8-small model on Jetson Orin. You compare ONNX Runtime with the TensorRT EP against standalone TensorRT. ONNX RT adds 12% latency overhead.
question: Is the portability of ONNX Runtime worth the 12% latency overhead over standalone TensorRT, and how can it be mitigated?
details:
  realistic_solution: 'A 12% overhead can be acceptable if the product needs one ONNX artifact and shared serving code across targets, but it should be measured against the latency budget. The overhead usually comes from a mix of graph partitioning, engine build/cache behavior, data layout or buffer handoff costs, and TensorRT EP settings that differ from a hand-tuned TensorRT path. Mitigation: pre-build and cache the TensorRT engine, tune the TensorRT EP workspace and precision flags for Orin, avoid unsupported ops that force partition boundaries, and profile copies around inputs and outputs. If the model still meets its real-time target, portability may be worth the small latency cost; if the budget is tight, use standalone TensorRT for the hot path.'
  common_mistake: |
    **The Pitfall:** Dismissing the 12% overhead as unacceptable without considering the engineering benefits.
    **The Rationale:** Engineers chasing peak theoretical performance reject higher-level abstractions like ONNX Runtime out of hand.
    **The Consequence:** They end up re-engineering the deployment pipeline for every new model and target platform, vastly increasing development costs for negligible real-world gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standalone TensorRT latency: ~4.0ms.
    - ONNX Runtime with TensorRT EP overhead: 12%.
    - 30 FPS frame budget: 33.3ms.

    **Calculations:**
    - ORT+TRT EP latency = 4.0ms * 1.12 = 4.48ms.
    - Added latency = 4.48ms - 4.0ms = 0.48ms.
    - Frame-budget share: 4.48ms / 33.3ms = 13.5%.
    - Remaining 30 FPS budget after ORT path: 33.3ms - 4.48ms = 28.8ms.

    **Conclusion & Interpretation:**
    - **Result: 0.48ms Added Latency**. If the 33.3ms frame budget is the constraint, both runtimes fit comfortably; choose ONNX Runtime for portability unless profiling shows the 12% overhead breaks a tighter production budget.
