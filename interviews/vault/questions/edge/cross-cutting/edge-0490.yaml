title: The Fleet Update Dilemma
scenario: 'You are a Staff ML Systems Engineer at an automotive company with a fleet
  of 100,000 connected vehicles. An A/B test reveals your current pedestrian detection
  model underperforms on e-scooters. You must solve this by choosing between two update
  strategies: Strategy A (Centralized) uploading 3.65 PB/year of raw sensor data at
  $20/GB, or Strategy B (Federated Learning) licensing a platform for $5.0M/year which
  reduces data transfer to 35 TB/year.'
question: Which update strategy has a lower annual TCO for fixing e-scooter detection
  across 100,000 vehicles?
details:
  realistic_solution: The correct approach is to calculate the annual TCO for both
    options. Strategy B (Federated Learning) is overwhelmingly more economical. The
    massive reduction in daily data transfer costs creates savings that dwarf the
    upfront platform license fee. This also provides the unquantified, but significant,
    benefit of improved user privacy by not exfiltrating raw sensor data.
  common_mistake: '**The Pitfall:** Focusing exclusively on the massive $5M upfront
    software license fee.

    **The Rationale:** Engineers often balk at large, visible software licenses and
    ignore the "invisible" but dominant operational costs of data transfer at scale.

    **The Consequence:** Choosing the centralized strategy, which results in a catastrophic
    $73M data transfer bill.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   * Strategy A: 3.65 PB/yr, $20/GB,\
    \ $800k compute.\n   * Strategy B: 35 TB/yr, $20/GB, $5.0M license.\n2. **Calculations:**\n\
    \   * Strategy A TCO = (3,650,000 GB * $20/GB) + $800,000 = $73,800,000.\n   *\
    \ Strategy B TCO = (35,000 GB * $20/GB) + $5,000,000 = $5,700,000.\n   * Cost\
    \ difference = $73.8M - $5.7M = $68.1M.\n3. **Conclusion & Interpretation:**\n\
    \   * **Strategy B is $68.1M cheaper annually due to avoiding massive data transfer\
    \ costs. Result: Network Transfer-Bound.**\n"
  options:
  - Strategy A, because the $5M platform fee for Strategy B is far greater than the
    $800k annual training cost for Strategy A.
  - Strategy A, because uploading raw data allows for more powerful, unbiased centralized
    models, which justifies the higher but manageable data cost.
  - Strategy B, because the annual data transfer cost is dramatically lower, making
    the total cost (~$5.7M) significantly less than Strategy A (~$73.8M).
  - The costs are roughly equivalent; the high license fee of Strategy B cancels out
    the data savings, so the decision should be based on privacy alone.
  correct_index: 2
