title: Hailo-8 Batching vs Latency
scenario: A Hailo-8 chip monitors powerlines. Frames arrive at 1 fps. Processing 1 frame takes 10ms.
question: Analyze whether buffering 10 frames into a single batch is more energy-efficient than processing
  each frame individually as it arrives.
details:
  realistic_solution: While the accelerator energy remains identical (processing 10 frames takes the same
    total compute time), batching allows the host CPU and SoC to enter deep sleep states for 9.9 seconds.
    Processing individually requires waking the host CPU every second, which incurs a massive wake-up
    energy penalty (e.g., 1.0J per wake) that dominates the total power draw.
  common_mistake: '**The Pitfall:** Analyzing only the NPU power consumption.

    **The Rationale:** Engineers isolate the accelerator''s efficiency and ignore the host CPU''s baseline
    power and wake-up costs.

    **The Consequence:** A deployment that drains the system battery drastically faster than anticipated.'
  napkin_math: '**Assumptions & Constraints:**

    - Hailo-8: 100mW standby, 2.5W active.

    - Frame arrival: 1 FPS.

    - Processing time: 10ms per frame.

    - Host wake-up penalty: 1.0J per wake.


    **Calculations:**

    - Individual (1 frame/s): 10ms @ 2.5W + 990ms @ 0.1W + 1.0J wake = 0.025J + 0.099J + 1.0J = 1.124J
    per second. Over 10s = 11.24J.

    - Batched (10 frames): 100ms @ 2.5W + 9.9s @ 0.1W + 1.0J wake (once) = 0.25J + 0.99J + 1.0J = 2.24J.


    **Conclusion & Interpretation:**

    - **Result: 2.24J vs 11.24J (System-Level Energy Optimization)**. Host wake-up overhead is the true
    bottleneck, making batched execution roughly 5x more energy-efficient.'
