title: 'The Radar-Camera Fusion Latency'
scenario: 'Your ADAS (Advanced Driver Assistance System) on an Ambarella CV5 fuses 77 GHz radar (range, velocity) with a front camera (classification, lane detection). The radar provides detections every 50ms (20 Hz) with 0.5ms processing. The camera pipeline takes 25ms (ISP + neural network). Your fusion algorithm adds 5ms. Your colleague calculates total latency as max(0.5, 25) + 5 = 30ms. But the actual sensor-to-decision latency is 55ms.'
question: 'Where is the extra 25ms hiding, and when does the fusion latency overhead negate the benefit of having radar?'
details:
  realistic_solution: 'The extra 25ms hides in three places: (1) sensor asynchrony — camera and radar have different clocks, so the fusion node waits up to one camera frame period (33ms worst case, ~17ms average) for temporally aligned data; (2) data transfer latency — the 25MB camera frame takes ~2-5ms to move through the ISP pipeline and DMA to the SoC; (3) synchronization buffering — the fusion algorithm holds frames until matching radar/camera timestamps arrive. For safety-critical decisions, use a separate radar-only path; for rich scene understanding, accept the 55ms fused path.'
  common_mistake: '"Latency = max(sensor latencies) + fusion time." This assumes sensors are synchronized and that "latency" means only processing time.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Radar chirp: 5ms. Processing: 0.5ms. Decision system: 2ms.
    - Fused path average latency: 55ms.
    - Vehicle speed: 120 km/h (33.3 m/s).

    **Calculations:**
    - Radar-only latency: 5ms + 0.5ms + 2ms = 7.5ms.
    - Radar-only reaction distance: 33.3 m/s * 0.0075s = 0.25m.
    - Fused reaction distance: 33.3 m/s * 0.055s = 1.83m.
    - Difference: 1.83m - 0.25m = 1.58m.

    **Conclusion & Interpretation:**
    - **Result: 1.58m braking delta (Latency-Bound)**. The fusion overhead translates to a physical reaction gap, mandating dual-path perception.
