title: Optimizing Vision Model Latency with Structured Pruning
scenario: A YOLO model on Jetson Orin hits 20 FPS (memory-bound). 70% unstructured pruning failed to improve latency. Target is 30 FPS.
question: Why did 70% unstructured pruning fail on Jetson Orin, and what structured pruning pattern would you use to reach 30 FPS?
details:
  realistic_solution: Unstructured sparsity fails because dense matrix multiplication units cannot efficiently skip individual zero weights, resulting in poor memory access patterns. Structured (channel) pruning directly relieves the memory bandwidth bottleneck by reducing contiguous activation maps.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning indiscriminately to reduce FLOPs on dense accelerators.
    **The Rationale:** Engineers assume theoretical FLOP reductions automatically equal faster execution, ignoring systolic array constraints.
    **The Consequence:** Unstructured pruning leaves irregular memory patterns, yielding zero latency improvement on dense INT8 Tensor Cores.
  napkin_math: |
    1. **Assumptions & Constraints:** Baseline = 20 FPS, strictly memory bottlenecked. Structured channel pruning removes 30% of active channels.
    2. **Calculations:** 30% channel pruning directly cuts ~30% of contiguous memory reads. Theoretical FPS = 20 / (1 - 0.30) = 28.5 FPS.
    3. **Conclusion & Interpretation:** **Result: 28.5 FPS achieved.** Unstructured sparsity fails on dense systolic arrays; structured channel pruning directly relieves the memory bus. **System Status: Memory-Bandwidth-Bound (Alleviated).**
