title: Optimizing Vision Model Latency on NVIDIA Jetson Orin with Structured Pruning
scenario: Your team is deploying a large object detection model (e.g., YOLOv7) on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). The current model achieves 20 FPS but the system requires a minimum of 30 FPS. Analysis shows the primary bottleneck is memory bandwidth. Unstructured pruning was previously applied, achieving 70% sparsity, but didn't yield the expected speedup.
question: Why did 70% unstructured pruning fail on Jetson Orin, and what structured pruning pattern would you use to reach 30–40 FPS?
details:
  realistic_solution: Structured pruning (like channel or block pruning) aligns with the hardware. For Jetson Orin, unstructured sparsity fails because dense matrix multiplication units cannot efficiently skip individual zero weights, resulting in poor memory access patterns. Channel pruning reduces activation maps and contiguous memory access, directly relieving the memory bandwidth bottleneck.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning indiscriminately to reduce FLOPs on dense accelerators.
    **The Rationale:** Engineers assume theoretical FLOP reductions automatically equal faster execution, ignoring systolic array constraints.
    **The Consequence:** Unstructured pruning leaves irregular memory patterns, yielding zero latency improvement on dense INT8 Tensor Cores.
  napkin_math: |
    - **Baseline:** Model hits 20 FPS heavily bottlenecked by memory bandwidth.
    - **Structured Pruning Target:** Channel pruning removing 30% of active channels directly eliminates ~30% of memory accesses and MACs.
    - **Theoretical FPS Gain:** Assuming the bottleneck was strictly memory, a 30% traffic reduction theoretically yields (1 / (1 - 0.30)) * 20 FPS = 28.5 FPS.
    - **Final Result:** **By relieving the memory bus and allowing better Tensor Core utilization, the system climbs towards 30-35 FPS, successfully meeting the real-time threshold.**
