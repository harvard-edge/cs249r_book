title: Compute Allocation Plans for Heterogeneous Models
scenario: A custom robotics platform uses a Jetson AGX Orin. You need to deploy a 50 GOPs FP16 vision model and a 100 GOPs INT8 planning model at 30 fps.
question: "Create a compute resource allocation plan and determine the system's expected utilization."
details:
  realistic_solution: The Orin's FP16 tensor core peak is roughly half its INT8 peak (137 TFLOPS vs 275 TOPS). The vision model requires 50 GOPs * 30 fps = 1.5 TFLOPS FP16. The planning model requires 100 GOPs * 30 fps = 3.0 TOPS INT8. Utilization is (1.5 / 137) + (3.0 / 275) = ~2.2%.
  common_mistake: |
    **The Pitfall:** Blending the FP16 and INT8 GOPs into a single sum and dividing by the INT8 peak TOPS.
    **The Rationale:** Candidates ignore differing hardware execution rates for different precisions and treat all operations as mathematically identical.
    **The Consequence:** Produces an artificially low utilization percentage, masking potential bottlenecks in specific precision compute cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin: 275 TOPS (INT8), 137 TFLOPS (FP16).
       - Vision model: 50 GOPs FP16, 30 FPS.
       - Planning model: 100 GOPs INT8, 30 FPS.
    2. **Calculations:**
       - Vision compute requirement = 50 GOPs * 30 FPS = 1.5 TFLOPS.
       - Planning compute requirement = 100 GOPs * 30 FPS = 3.0 TOPS.
       - FP16 utilization = 1.5 / 137 = 1.09%.
       - INT8 utilization = 3.0 / 275 = 1.09%.
       - Total expected utilization = 1.09% + 1.09% = 2.18%.
    3. **Conclusion & Interpretation:**
       - **Result: ~2.2% Total Utilization** (Compute-Overprovisioned).
