title: IoT Edge TPU Sleep State Optimization
scenario: An industrial IoT sensor runs an anomaly model every 200ms. Inference takes 10ms on an edge TPU (2.5W active). In "clock-gated" mode, it uses 0.5W and wakes in 1ms (drawing 1.0W during wake). In "power-gated" mode, it uses 0.05W but takes 40ms to wake (drawing 1.5W during wake).
question: Which sleep state, clock-gated or power-gated, minimizes average energy per 200ms anomaly-detection cycle?
details:
  realistic_solution: Calculate the energy consumed over a single 200ms duty cycle for both sleep states. Break the cycle into active time, wake time, and sleep time. Power gating has a much lower static draw but incurs a significant energy penalty during its long wake-up sequence. The optimal state depends entirely on whether the idle duration is longer than the break-even time of the deep sleep penalty. In this case, the duty cycle is long enough that power gating saves more energy.
  common_mistake: |
    **The Pitfall:** Choosing power-gated mode solely based on the static sleep power.
    **The Rationale:** Candidates see 0.05W is much lower than 0.5W and ignore the massive energy penalty of the 40ms wake-up phase.
    **The Consequence:** They miscalculate total cycle energy and select suboptimal power states for certain duty cycles.
  napkin_math: |
    - **Duty Cycle:** 200ms (Active: 10ms).
    - **Clock-gated Energy:**
      - Active: 10ms * 2.5W = 25 mJ
      - Wake: 1ms * 1.0W = 1 mJ
      - Sleep: 189ms * 0.5W = 94.5 mJ
      - Total: 25 + 1 + 94.5 = **120.5 mJ**
    - **Power-gated Energy:**
      - Active: 10ms * 2.5W = 25 mJ
      - Wake: 40ms * 1.5W = 60 mJ
      - Sleep: 150ms * 0.05W = 7.5 mJ
      - Total: 25 + 60 + 7.5 = **92.5 mJ**
    - **Conclusion:** Power-gated saves **28 mJ** per cycle.
