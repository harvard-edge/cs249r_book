title: Hailo-8 Thermal Design for Edge Deployment
scenario: You are designing an edge ML system for industrial inspection, deploying a Hailo-8 accelerator (26 TOPS INT8, 2.5W typical power) into a sealed, fanless enclosure. The system must sustain 20 TOPS INT8 performance continuously for 8 hours in an ambient temperature ranging from 25°C to 45°C.
question: How would you ensure the Hailo-8 doesn't thermal throttle under the worst-case ambient conditions?
details:
  realistic_solution: Implement a passive cooling solution with a custom-designed heatsink directly coupled to the Hailo-8, integrated into the enclosure's metal casing to act as a large radiant surface. Utilize thermal interface materials (TIMs) with high conductivity. Perform comprehensive thermal simulations and validate with real-world stress tests across the specified ambient temperature range, monitoring core temperatures and performance metrics to characterize the actual sustained TOPS. Consider intelligent workload scheduling or dynamic frequency scaling as a last resort to prevent throttling.
  common_mistake: |
    **The Pitfall:** Sizing the thermal solution based purely on the typical 2.5W power draw instead of the peak thermal design power under sustained heavy load.
    **The Rationale:** Spec sheets heavily market "typical" power, masking the reality of continuous, heavy 8-hour inferencing loads.
    **The Consequence:** The device reaches its junction temperature limit in the 45°C ambient environment, severely throttling TOPS to prevent damage and failing to meet the real-time frame rate.
  napkin_math: |
    1. **Power Dissipation:** Assume 3W dissipation under sustained heavy load (up from 2.5W typical).
    2. **Thermal Budget:** Max junction temperature (85°C) minus max ambient temperature (45°C) gives a $\Delta T$ of 40°C.
    3. **Required Resistance:** Thermal resistance required is $R_{th} = \Delta T / Power = 40\text{\degree C} / 3W$.
    4. **Result:** The heatsink-to-ambient path must achieve a thermal resistance of **13.3 °C/W** or lower to prevent throttling.
