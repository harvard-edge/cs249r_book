title: Hailo-8 Thermal Design for Edge Deployment
scenario: You are designing an edge ML system for industrial inspection, deploying a Hailo-8 accelerator into a sealed, fanless enclosure. The system must sustain 20 TOPS INT8 performance continuously for 8 hours in an ambient temperature ranging from 25°C to 45°C.
question: How would you ensure the Hailo-8 doesn't thermal throttle under the worst-case ambient conditions?
details:
  realistic_solution: Implement a passive cooling solution with a custom-designed heatsink directly coupled to the Hailo-8, integrated into the enclosure's metal casing to act as a large radiant surface. Utilize thermal interface materials (TIMs) with high conductivity. Perform comprehensive thermal simulations and validate with real-world stress tests across the specified ambient temperature range.
  common_mistake: |
    **The Pitfall:** Sizing the thermal solution based purely on the typical 2.5W power draw instead of the peak thermal design power under sustained heavy load.
    **The Rationale:** Spec sheets heavily market "typical" power, masking the reality of continuous, heavy 8-hour inferencing loads.
    **The Consequence:** The device reaches its junction temperature limit in the 45°C ambient environment, severely throttling TOPS to prevent damage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max ambient temperature: 45°C.
       - Max junction temperature: 85°C.
       - Sustained heavy load dissipation: 3W (up from 2.5W typical).
    2. **Calculations:**
       - Thermal Budget: \Delta T = 85°C - 45°C = 40°C.
       - Required Resistance: R_{th} = \Delta T / Power = 40°C / 3W = 13.3 °C/W.
    3. **Conclusion & Interpretation:**
       - **Result: The heatsink-to-ambient path must achieve a thermal resistance of 13.3 °C/W or lower. (Thermal-Bound)**
