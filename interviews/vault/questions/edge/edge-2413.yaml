title: Specifying Hardware Accelerated CV Pipelines on Edge
scenario: A multi-camera perception system on an AGX Orin reads four 1080p 30FPS streams.
  The developer applies a CPU-based OpenCV resize to each frame before passing it
  to the GPU, causing CPU pegging.
question: Specify a hardware-accelerated pipeline path to eliminate the CPU bottleneck
  for this workload.
details:
  realistic_solution: The developer should use the Jetson's hardware NVDEC for decoding
    and the VIC (Video Image Compositor) or CUDA for resizing directly in GPU memory.
    Avoiding CPU-based resizing eliminates the heavy host-to-device memory copies,
    dramatically reducing CPU load.
  common_mistake: Suggesting multi-threading the CPU OpenCV code rather than moving
    the data path entirely to hardware accelerators.
  napkin_math: 4 * 1920 * 1080 * 3 * 30 = 746 MB/s copied unnecessarily
