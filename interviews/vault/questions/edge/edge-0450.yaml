title: The Federated Fleet ROI Dilemma
scenario: 'You are an ML Systems Engineer at an automotive company launching a new ''Enhanced Lane Assist''
  feature powered by a 100MB model. The current fleet has 1,000,000 vehicles. You are tasked with diagnosing
  the most cost-effective and secure model update strategy for the first year. Your team has proposed
  two options:

  - **Centralized:** Upload 100 MB of raw sensor data per vehicle per quarter. Cloud training costs $8,000/year and engineering is $150,000/year.

  - **Federated:** Vehicles download the model and upload a 10 MB gradient update 4 times a year. The aggregation server costs $18,000/year and FL engineering is $300,000/year.

  Data transfer costs $0.09/GB.'
question: "Which first-year model update strategy is more cost-effective and secure for the 1M-vehicle fleet, centralized training or federated learning?"
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for both
    options and then weigh the quantitative result against the qualitative factors of privacy and risk.
    While Centralized Training appears cheaper, the Federated Learning approach is strategically superior
    for a production automotive system.
  common_mistake: Engineers often focus purely on the most obvious cost metric, like data transfer, and
    conclude the cheaper option is always better. They may completely ignore the dominant fixed costs
    (like a 24/7 server) or fail to price in the significant, non-negotiable value of user privacy and
    the risk of transmitting raw PII (Personally Identifiable Information).
  napkin_math: '1. **Calculate Centralized Annual Cost:** Raw data upload: 100 MB/quarter.
    Data transfer: 100 MB raw data upload * 1,000,000 vehicles * 4 = 400,000 GB/year. At $0.09/GB: $36,000 transfer.
    Cloud training: $8,000. Engineering: $150,000/year. Total centralized: ~$194,000/year.
    2. **Calculate Federated Learning Year 1 Cost:** Data transfer (100 MB download + 10 MB upload = 110 MB/round):
    110 MB * 1,000,000 vehicles * 4 rounds = 440,000 GB/year. At $0.09/GB: $39,600 transfer. Aggregation server: $18,000. FL engineering (Year 1):
    $300,000. Total FL Year 1: ~$357,600. Centralized is cheaper in Year 1 but FL becomes cost-competitive
    after Year 1 while eliminating raw-data privacy risk.'
  options:
  - Centralized Training, because its annual TCO of ~$194,000 is significantly lower than the Federated Learning strategy.
  - Federated Learning, because its annual data transfer cost of $39,600 is far lower than the Centralized approach.
  - Federated Learning; although its Year 1 TCO is higher (~$357,600 vs ~$194,000), it's the superior choice because it avoids transmitting sensitive raw user data, reducing privacy and regulatory risk.
  - Centralized Training, as the 400TB of raw data can be easily anonymized before upload, which removes the privacy concern and makes the cheaper option viable.
  correct_index: 2
