title: The Federated Fleet ROI Dilemma
scenario: 'An automotive company is launching an Enhanced Lane Assist feature for a 1,000,000 vehicle fleet. They are evaluating two model update strategies. Option A (Centralized): Upload 100 MB of raw sensor data per vehicle quarterly. Cloud training is $8K/yr, engineering is $150K/yr. Option B (Federated): Download a model and upload a 10 MB gradient 4 times a year. Aggregation server is $18K/yr, FL engineering is $300K/yr. Data transfer costs $0.09/GB.'
question: Which first-year model update strategy is more cost-effective and secure for the 1M-vehicle fleet?
details:
  realistic_solution: Calculate the Total Cost of Ownership (TCO) for both options and then weigh the quantitative result against the qualitative factors of privacy and risk. While Centralized Training appears cheaper, the Federated Learning approach is strategically superior for a production automotive system.
  common_mistake: |
    **The Pitfall:** Focusing purely on compute or transfer costs while ignoring fixed engineering costs and privacy risks.
    **The Rationale:** Engineers gravitate towards the easiest math (data transfer) but fail to price in the massive qualitative risk of transferring raw PII.
    **The Consequence:** Choosing Centralized Training exposes the company to catastrophic privacy breaches and regulatory fines despite being cheaper in Year 1.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 1,000,000 vehicles.
       - Updates per year: 4.
       - Centralized: 100 MB upload/update, $158K fixed costs.
       - Federated: 100 MB download + 10 MB upload/update, $318K fixed costs.
       - Transfer Cost: $0.09/GB.
    2. **Calculations:**
       - Centralized Data/Yr: 100 MB * 4 * 1M = 400,000 GB.
       - Centralized Transfer Cost: 400,000 GB * $0.09/GB = $36,000.
       - Centralized Total (Yr 1): $36,000 + $158,000 = $194,000.
       - Federated Data/Yr: 110 MB * 4 * 1M = 440,000 GB.
       - Federated Transfer Cost: 440,000 GB * $0.09/GB = $39,600.
       - Federated Total (Yr 1): $39,600 + $318,000 = $357,600.
    3. **Conclusion & Interpretation:**
       - **Result: Centralized is $194,000/yr vs Federated at $357,600/yr (Privacy-Bound).** Federated is required due to regulatory risk despite higher TCO.
  options:
  - Centralized Training, because its annual TCO of ~$194,000 is significantly lower than the Federated Learning strategy.
  - Federated Learning, because its annual data transfer cost of $39,600 is far lower than the Centralized approach.
  - Federated Learning; although its Year 1 TCO is higher (~$357,600 vs ~$194,000), it's the superior choice because it avoids transmitting sensitive raw user data, reducing privacy and regulatory risk.
  - Centralized Training, as the 400TB of raw data can be easily anonymized before upload, which removes the privacy concern and makes the cheaper option viable.
  correct_index: 2
