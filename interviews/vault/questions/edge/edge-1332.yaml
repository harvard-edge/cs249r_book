title: Format Selection for Host-Streamed Hailo-8 Inference
scenario: You are designing an offline bulk inference pipeline on an industrial PC using a DRAM-less dataflow accelerator. You must choose a local NVMe storage format for 10TB of historical sensor logs. Option A is compressed Parquet (Zstd). Option B is uncompressed flat binary records.
question: Should the offline inference logs be stored as Zstd Parquet or uncompressed flat binary records to maximize accelerator utilization?
details:
  realistic_solution: The correct approach is Option B (uncompressed flat binary records) or a very lightweight row-based compression like LZ4. Since the Hailo-8 streams directly from host memory, the host CPU must rapidly read, optionally decode, and feed the data. Uncompressed flat binaries can be memory-mapped (mmap) directly into host RAM in the exact tensor layout expected by the accelerator, completely bypassing CPU decoding overhead. This ensures the PCIe stream remains saturated and the accelerator achieves peak utilization.
  common_mistake: |
    **The Pitfall:** Blindly selecting compressed columnar formats (Parquet) to minimize disk I/O.
    **The Rationale:** Candidates rely on standard Big Data engineering practices, failing to account for the CPU decoding bottleneck on an edge processor.
    **The Consequence:** The host CPU throttles while decompressing Zstd, starving the accelerator of input tensors and leaving >60% of its compute capacity idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator demand: 1GB/s (1000 FPS @ 1MB). NVMe Read: 2GB/s. Edge CPU Zstd decompression speed: ~300-400 MB/s.
    2. **Calculations:**
       - Option B (Raw Binary): Memory mapped directly at NVMe speed (2 GB/s) > 1 GB/s required.
       - Option A (Parquet Zstd): CPU bottlenecked at 400 MB/s < 1 GB/s required.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound with Parquet.** Uncompressed binary allows zero-copy mmap, fully saturating the accelerator's 1GB/s demand. Zstd limits throughput to 40% utilization.
