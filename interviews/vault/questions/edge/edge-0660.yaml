title: The DMA Contention Blind Spot
scenario: Your edge AI system runs on a Raspberry Pi CM4 (BCM2711, 4× Cortex-A72, LPDDR4 at 3.2 GB/s shared
  bandwidth). You attach a Coral USB TPU for inference and a USB3 camera for input. In isolation, the
  camera captures at 30 FPS and the TPU infers in 8ms. When both run simultaneously, camera frames drop
  to 18 FPS and TPU inference spikes to 10ms. Neither device is individually saturating the bus. What
  is happening?
details:
  realistic_solution: 'The bottleneck isn''t USB bandwidth — it''s **DMA controller contention on the
    shared LPDDR4 bus**. Both the USB3 host controller (VL805 on Pi CM4) and the CPU use DMA to access
    main memory. The camera''s DMA writes 6 MB frames into a ring buffer in DRAM. The CPU''s DMA reads
    those frames, preprocesses them, and writes the result to a USB3 output buffer for the TPU. The TPU''s
    DMA reads input tensors and writes output tensors. All four DMA streams compete for the same 3.2 GB/s
    LPDDR4 bus. The BCM2711''s memory controller uses round-robin arbitration with no QoS priority. When
    the camera DMA fires a burst write (6 MB at 3.2 GB/s = 1.9ms bus hold), it blocks the TPU''s DMA read
    for that entire burst, adding up to 1.9ms of stall to inference. The fix: (1) reduce camera resolution
    to 720p (2.7 MB frames → 0.8ms bursts), (2) use the Pi''s VideoCore GPU for preprocessing (separate
    DMA path), (3) pin TPU transfers to a dedicated USB controller if available.'
  common_mistake: '"The USB bus is saturated." USB3 has 5 Gbps bandwidth — a 1080p frame at 6 MB and TPU
    transfers of ~1 MB per inference together use only ~200 MB/s, well under the 625 MB/s USB3 limit.'
  napkin_math: 'LPDDR4 bus: 3.2 GB/s shared. Camera DMA: 30 FPS × 6 MB = 180 MB/s (5.6% of bus). CPU preprocessing
    DMA: ~180 MB/s read + 60 MB/s write = 240 MB/s (7.5%). TPU DMA: 1 MB in + 0.1 MB out per inference
    × 60 inferences/sec = 66 MB/s (2%). Total: 486 MB/s (15% of bus). Bandwidth isn''t the issue — **latency
    is**. Each 6 MB camera burst holds the bus for 1.9ms. During that burst, the TPU stalls. With 30 bursts/sec,
    the TPU sees ~57ms of stalls per second → 10ms inference includes ~2ms of DMA stalls (8ms compute
    + 2ms stall). Reducing to 720p: 0.8ms bursts → <1ms stalls/inference → ~8.5ms total.'
