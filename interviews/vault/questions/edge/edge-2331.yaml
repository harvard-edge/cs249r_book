title: PTQ Accuracy Degradation
scenario: An object detector deployed on a Jetson Orin exhibits severe accuracy loss after simple Post-Training Quantization (PTQ) to INT8.
question: Evaluate the mathematical cause of this accuracy collapse and propose a method to diagnose it.
details:
  realistic_solution: The accuracy drop is typically caused by large activation outliers skewing the quantization scale, squashing the precision of the majority of values. Evaluate the tensor distributions (e.g., via histograms); if outliers exist, use per-channel quantization or switch to Quantization-Aware Training (QAT).
  common_mistake: |
    **The Pitfall:** Assuming weight ranges are the issue rather than dynamic activation outliers.
    **The Rationale:** Candidates often focus on weights because they are static and easier to analyze, ignoring that activation distributions during inference can have large, unpredictable outliers.
    **The Consequence:** The proposed solution (e.g., fine-tuning weights) fails to address the squashed precision of activations, leaving the model with severe accuracy degradation.
  napkin_math: |
    * Quantization scale formula for symmetric INT8:
    * **Scale = max(abs) / 127**
