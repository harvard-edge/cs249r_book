title: The Energy Cost of Precision
scenario: You're optimizing a computer vision model for a battery-powered drone. To meet the power budget,
  you are considering quantizing the model from FP16 to INT8. From a hardware physics perspective, roughly
  how much more energy does a single FP16 multiply-accumulate (MAC) operation consume compared to a single
  INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes approximately 5x more energy than an INT8 operation.
    This is a fundamental hardware invariant. The energy cost of a computation is directly related to
    the number of transistors switching, which does not scale linearly with the bit width of the operands.
    This significant energy saving is a primary motivator for quantization on power-constrained edge devices.
  common_mistake: Engineers often incorrectly assume that energy consumption scales linearly with bit
    width, leading them to guess the ratio is 2x (since 16 bits / 8 bits = 2). They fail to account for
    the non-linear relationship between bit width and the switching energy in the digital logic of the
    arithmetic units.
  napkin_math: 'Using standard hardware physics invariants: An FP32 operation costs ~18x the energy of
    an INT8 operation, and FP32 is ~3.4x the energy of an FP16 operation. Thus, the ratio of FP16 to INT8
    energy is 18 / 3.4 = 5.3x. A single FP16 multiply-accumulate consumes roughly 5 times more energy
    than an INT8 MAC. Quantizing to INT8 yields an ~81% reduction in pure compute energy.'
  options:
  - About 2x more energy
  - About 18x more energy
  - About 5x more energy
  - The energy difference is negligible
  correct_index: 2
