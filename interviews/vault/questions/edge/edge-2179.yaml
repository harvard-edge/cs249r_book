title: Incomplete Edge SLA Diagnosis
scenario: An edge speech assistant misses a 150 ms latency SLO. The team reports model inference takes 70 ms, but does not provide audio windowing delay, feature extraction time, queueing, network hop, wake-word delay, or P99 distribution.
question: What missing latency components are needed before diagnosing a 150 ms edge speech SLA miss?
details:
  realistic_solution: Model inference is only one component. You need capture/windowing delay, feature extraction, queueing, scheduling, network/local hop, postprocessing, and P50/P95/P99 breakdowns. With only 70 ms inference, the known headroom is 80 ms, but any two hidden components could consume it.
  common_mistake: |
    **The Pitfall:** Optimizing the model immediately without decomposing the remaining latency budget.
    **The Rationale:** Candidates focus solely on the 70ms inference metric because it is the most visible number.
    **The Consequence:** Effort is wasted on model compression while hidden pipeline components push the system past the 150ms SLA.
  napkin_math: |
    - SLA threshold: 150 ms.
    - Known model inference: 70 ms.
    - SLA headroom: 150 - 70 = 80 ms.
    - Example hidden costs: 40 ms (audio window) + 30 ms (queue) + 20 ms (feature extraction) = 90 ms.
    - Total realistic latency: 70 + 90 = 160 ms (**Fails 150ms SLA**).
