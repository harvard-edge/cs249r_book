title: Optimizing LLM Deployment on Hailo-8 with Custom Operator Challenges
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on a fleet
  of Hailo-8 edge devices. The pre-trained model is in PyTorch, but Hailo-8 requires an optimized ONNX
  representation or its native compiler format for best performance. The Hailo-8 boasts 26 TOPS (Tera
  Operations Per Second) for INT8 operations and consumes 2.5W. During conversion, you encounter several
  custom PyTorch operators that are not directly supported by the Hailo-8 ONNX runtime or its compiler.
  Furthermore, the model's complexity pushes the limits of the Hailo-8's compute capacity and power budget
  for the required inference latency.
question: "How would you handle unsupported PyTorch operators and fit the LLM within the Hailo-8 latency, compute, and 2.5W power constraints?"
details:
  realistic_solution: Identify unsupported operators and implement custom delegation strategies. This
    involves either replacing custom operations with equivalent, Hailo-8-supported operations, quantizing
    specific layers to INT8 where possible, or creating custom delegates for the Hailo-8 runtime that
    offload unsupported operations to a host CPU (if available and within latency budget). Utilize Hailo-8's
    SDK and profiling tools to analyze operator coverage and performance bottlenecks, iteratively refining
    the model conversion and deployment pipeline while ensuring accuracy. This often requires deep understanding
    of both the model architecture and the target hardware capabilities.
  common_mistake: Attempting to directly convert the PyTorch model without understanding Hailo-8's specific
    operator set and limitations, or blindly relying on default conversion tools. This often leads to
    runtime errors, significant performance degradation due to CPU fallbacks, or incorrect numerical results
    if unsupported operators are naively replaced without proper validation.
  napkin_math: Given Hailo-8's 26 TOPS (INT8), if an LLM requires 100 GOPs (Giga Operations) per inference,
    the theoretical maximum inferences per second would be 26,000 GOPs/s / 100 GOPs/inference = 260 inferences/s.
    If the target latency is 100ms (0.1s), the model's computational requirement should not exceed 2,600
    GOPs (26 TOPS * 0.1s). The power budget of 2.5W for the accelerator means each 100ms inference consumes
    0.25 Joules (2.5W * 0.1s). This helps in assessing if the model fits within the thermal and power
    envelope, considering ambient temperature and device form factor.
