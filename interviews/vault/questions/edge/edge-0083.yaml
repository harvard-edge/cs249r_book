title: 'The Thermal Paste Time Bomb: Power Budgeting'
scenario: 'Your fleet of 2,000 Jetson Orin NX devices has been deployed in traffic cabinets for 2 years. You notice a gradual, fleet-wide trend: average inference latency has increased 18% over the last 6 months. The increase is correlated with device age — older devices are slower. The model, firmware, and TensorRT engine are identical across the fleet. Ambient cabinet temperature hasn''t changed.'
question: 'What''s causing the age-correlated slowdown?'
details:
  realistic_solution: 'The thermal interface material (TIM) between the Orin SoC and the heatsink is degrading. Repeated thermal cycling causes pump-out, increasing thermal resistance. DVFS scales down the clock frequency to prevent hardware damage, resulting in the latency penalty.'
  common_mistake: 'Blaming eMMC degradation for slower model loading, which wastes time replacing storage instead of fixing hardware thermals.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original thermal resistance: 0.5°C/W. Orin NX TDP: 25W.
    - Ambient temp: 55°C. Max junction temp: 97°C.
    - Degraded thermal resistance: 2.0°C/W.

    **Calculations:**
    - Original junction temp: 55 + (25 * 0.5) = 67.5°C.
    - Degraded unthrottled temp: 55 + (25 * 2.0) = 105°C (exceeds throttle threshold).
    - DVFS throttles power down by 18% to ~20.5W.
    - New junction temp: 55 + (20.5 * 2.0) = 96°C.

    **Conclusion & Interpretation:**
    - **Result: 18% Throttling (Thermal-Bound)**. Thermal paste pump-out causes hardware throttling, directly responsible for the 18% latency increase.
