title: 'The Thermal Paste Time Bomb: Power Budgeting'
scenario: 'Your fleet of 2,000 Jetson Orin NX devices has been deployed in traffic cabinets for 2 years.
  You notice a gradual, fleet-wide trend: average inference latency has increased 18% over the last 6
  months. The increase is correlated with device age — older devices are slower. The model, firmware,
  and TensorRT engine are identical across the fleet. Ambient cabinet temperature hasn''t changed. What''s
  causing the age-correlated slowdown?'
details:
  realistic_solution: The **thermal interface material (TIM)** between the Orin SoC and the heatsink is
    degrading. Consumer-grade thermal paste (silicone-based) undergoes "pump-out" — repeated thermal cycling
    (hot during inference, cool during idle) causes the paste to migrate away from the die center, creating
    air gaps. Thermal resistance increases from the original 0.5°C/W to 1.5–2.0°C/W after 2 years of 24/7
    thermal cycling.
  common_mistake: '"The eMMC is degrading, causing slower model loading." Model loading happens once at
    boot. Inference latency is a runtime metric — the model is already in GPU memory.'
  napkin_math: 'Original thermal resistance: 0.5°C/W. Orin NX TDP: 25W. Junction temp at 55°C ambient:
    55 + (25 × 0.5) = 67.5°C. Headroom: 97 - 67.5 = 29.5°C. After 2 years: TIM resistance = 2.0°C/W. Unthrottled
    junction: 55 + (25 × 2.0) = 105°C — exceeds the 97°C throttle threshold. DVFS reduces clock by 18%
    (power drops to ~20.5W): junction = 55 + (20.5 × 2.0) = 96°C, just below the 97°C limit. TIM replacement
    for 500 devices: 500 × $32 = $16,000. Revenue impact of 18% slower inference (missed detections at
    traffic intersections): if 5% of frames miss deadline → potential liability. Phase-change TIM from
    day one: $2 × 2,000 = $4,000 — prevents the entire problem.'
