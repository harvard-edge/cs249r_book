title: 'The Thermal Paste Time Bomb: Power Budgeting'
scenario: 'Your fleet of 2,000 Jetson Orin NX devices has been deployed in traffic cabinets for 2 years. You notice a gradual, fleet-wide trend: average inference latency has increased 18% over the last 6 months. The increase is correlated with device age — older devices are slower. The model, firmware, and TensorRT engine are identical across the fleet. Ambient cabinet temperature hasn''t changed.'
question: "What's causing the age-correlated slowdown?"
details:
  realistic_solution: 'The **thermal interface material (TIM)** between the Orin SoC and the heatsink is degrading. Consumer-grade thermal paste (silicone-based) undergoes "pump-out" — repeated thermal cycling (hot during inference, cool during idle) causes the paste to migrate away from the die center, creating air gaps. Thermal resistance increases from the original 0.5°C/W to 1.5–2.0°C/W after 2 years of 24/7 thermal cycling.'
  common_mistake: |
    **The Pitfall:** Blaming eMMC degradation for slower model loading.
    **The Rationale:** Flash storage wears out over time, which is a common failure mode.
    **The Consequence:** Model loading happens once at boot; inference latency is a runtime metric. The engineer wastes time replacing storage instead of fixing thermals.
  napkin_math: |
    * Original thermal resistance: 0.5°C/W. Orin NX TDP: 25W.
    * Junction temp at 55°C ambient: 55 + (25 × 0.5) = 67.5°C.
    * After 2 years, TIM degrades: resistance = 2.0°C/W.
    * Unthrottled junction temp: 55 + (25 × 2.0) = 105°C (exceeds the 97°C throttle threshold).
    * DVFS reduces clock by 18%, dropping power to ~20.5W: new junction = 55 + (20.5 × 2.0) = 96°C.
    * **Thermal paste pump-out causes hardware throttling, directly responsible for the 18% latency increase.**
