title: Diagnosing Power Anomalies from Adversarial Energy Attacks
scenario: A vision model deployed on a Qualcomm Cloud AI 100 on-premise inference
  accelerator is experiencing unexplained latency spikes. Monitoring shows the accelerator
  is continuously hitting its 75W TDP limit and thermal throttling, despite the input
  video feed maintaining a constant resolution and frame rate. The candidate must
  diagnose why the workload is suddenly maximizing the INT8 compute capacity and power
  draw without a change in input volume.
question: What caused the Cloud AI 100 to hit its 75W TDP and throttle despite unchanged
  input resolution and frame rate?
details:
  realistic_solution: The root cause is an adversarial energy attack (sponge attack)
    where inputs are explicitly crafted to maximize activation density, defeating
    hardware sparsity optimizations. To mitigate this, the system should monitor activation
    sparsity metrics and set per-inference time budgets to drop anomalous requests
    before they saturate the INT8 compute engines.
  common_mistake: Candidates often misdiagnose this as a hardware cooling failure,
    a memory leak, or an OS-level scheduling issue. They typically fail to connect
    the deterministic, input-driven power spikes to an adversarial 'sponge attack'
    designed to maximize hardware utilization.
  napkin_math: 'Normal inference has 50% sparsity: a 4 TOP model takes 2 effective
    TOPs per frame. Running at 200 TOPS, latency is 2 / 200 = 10ms, drawing ~35W.
    The attack forces 0% sparsity, requiring the full 4 TOPs per frame and heavy state
    writes to the 32 GB LPDDR4x memory. This saturates the 400 TOPS INT8 capacity,
    hitting the 75W TDP. Thermal throttling then downclocks the chip to 100 TOPS,
    increasing latency to 4 / 100 = 40ms.'
