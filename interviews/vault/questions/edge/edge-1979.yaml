title: Optimizing Large Language Model Deployment on Qualcomm Cloud AI 100 via Ahead-of-Time Graph Compilation
scenario: You must deploy a large language model on a Qualcomm Cloud AI 100 accelerator. The system requires sub-10ms end-to-end latency and 500 inferences per second (batch=1).
question: How would you design an AOT compilation strategy on the Cloud AI 100 to meet sub-10ms latency and 500 batch-1 inferences per second?
details:
  realistic_solution: 'A realistic solution involves using a specialized framework compiler to perform ahead-of-time compilation. This includes aggressive operator lowering to INT8, extensive constant folding, custom kernel optimization, and strategic memory layout to maximize utilization of the LPDDR4x bandwidth.'
  common_mistake: |
    **The Pitfall:** Deploying a model directly via standard framework compilers without aggressive hardware-specific optimizations.
    **The Rationale:** Candidates rely on generic Just-In-Time (JIT) compilation and fail to leverage operator lowering, constant folding, and INT8 quantization required for edge NPUs.
    **The Consequence:** The unoptimized model completely fails to meet latency targets due to FP32 overhead and memory bandwidth saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Qualcomm Cloud AI 100 memory bandwidth: ~32 GB/s.
       - Target throughput: 500 inferences/sec (batch=1).
    2. **Calculations:**
       - Allowed data movement per inference: 32 GB/s / 500 inferences/sec = 64 MB/inference.
    3. **Conclusion & Interpretation:**
       - **Result: 64 MB maximum data movement budget per inference (Memory Bandwidth-Bound).** Aggressive INT8 quantization and constant folding are mandatory.
