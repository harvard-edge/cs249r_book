title: 'Edge TCO Analyze: Total Cost of Jetson Orin Deployment at Scale'
scenario: 'A smart factory requires computing equivalent to 500 Jetson Orin units. The hardware costs $499 per unit, consumes 60W continuous power ($0.10/kWh), and requires OTA update infrastructure ($10K/year) plus maintenance (3% annual hardware replacement). A cloud-based alternative costs $0.50/hr per unit-equivalent.'
question: What is the 5-year TCO of 500 Jetson Orin units compared to a cloud-based alternative at $0.50/hr?
details:
  realistic_solution: 'Edge TCO (5-year): Hardware = 500 * $499 = $249,500. Power = 500 * 60W * 43,800h * $0.10 / 1000 = $131,400. OTA = $10K * 5 = $50,000. Maintenance = 3% * $249,500 * 5 = $37,425. Total Edge TCO = $249.5K + $131.4K + $50K + $37.4K = $468,325. Cloud TCO (5-year): 500 units * $0.50/hr * 43,800h = $10,950,000. Edge is >20x cheaper over 5 years. The heavy utilization (24/7 continuous) strongly favors edge CapEx over cloud OpEx.'
  common_mistake: |
    **The Pitfall:** Only counting hardware acquisition cost while ignoring operating expenses.
    **The Rationale:** Candidates often treat edge ML as a one-time Capex purchase, forgetting that 5 years of power, maintenance, and fleet management typically exceed the initial hardware cost.
    **The Consequence:** Presenting a heavily skewed TCO analysis that fails to account for the true cost of edge deployment.
  napkin_math: |
    * Edge HW = 500 * $499 = $249,500.
    * Power = 500 * 60W * 43,800 hours * ($0.10 / 1000) = $131,400.
    * OTA Infrastructure = $10,000 * 5 years = $50,000.
    * Maintenance = 3% * $249,500 * 5 years = $37,425.
    * Total Edge TCO = $249.5K + $131.4K + $50K + $37.4K = **$468,325**.
    * Cloud TCO = 500 units * $0.50/hr * 24 hours * 365 days * 5 years = **$10,950,000**.
    * Savings = **$10.48M** (Edge is >20x cheaper).
