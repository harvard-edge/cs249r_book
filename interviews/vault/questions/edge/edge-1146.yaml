title: 'Edge TCO Analyze: Total Cost of Deployment at Scale'
scenario: 'A smart factory requires computing equivalent to 500 edge AI units. The hardware costs $499 per unit, consumes 60W continuous power ($0.10/kWh), and requires OTA update infrastructure ($10K/year) plus maintenance (3% annual hardware replacement). A cloud-based alternative costs $0.50/hr per unit-equivalent.'
question: "What is the 5-year TCO of 500 edge AI units compared to a cloud-based alternative at $0.50/hr?"
details:
  realistic_solution: 'The heavy continuous utilization (24/7) strongly favors edge CapEx over cloud OpEx. The Edge TCO over 5 years totals approximately $468K, factoring in hardware, power, OTA, and maintenance. In contrast, the cloud alternative scales to over $10M. Edge deployment represents a >20x cost reduction for continuous workloads.'
  common_mistake: |
    **The Pitfall:** Only counting hardware acquisition cost while ignoring operating expenses.
    **The Rationale:** Candidates often treat edge ML as a one-time Capex purchase, forgetting that 5 years of power, maintenance, and fleet management typically exceed initial hardware cost.
    **The Consequence:** Presenting a heavily skewed TCO analysis that fails to account for the true cost of edge deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge HW: 500 units at $499 each.
       - Power: 60W at $0.10/kWh, 24/7 operation.
       - Cloud: $0.50/hr per unit.
    2. **Calculations:**
       - Edge HW = 500 * $499 = $249,500.
       - Power = 500 * 60W * 43,800 hours * ($0.10 / 1000) = $131,400.
       - OTA = $10,000 * 5 years = $50,000.
       - Maintenance = 3% * $249,500 * 5 years = $37,425.
       - Total Edge TCO = $249.5K + $131.4K + $50K + $37.4K = $468,325.
       - Cloud TCO = 500 * $0.50/hr * 24 hours * 365 days * 5 years = $10,950,000.
    3. **Conclusion & Interpretation:**
       - **Result: Edge is >20x cheaper (Cost-Bound)**
