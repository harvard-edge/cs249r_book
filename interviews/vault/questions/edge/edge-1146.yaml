title: 'Edge TCO Analyze: Total Cost of Jetson Orin Deployment at Scale'
scenario: 'Analyze the 5-year TCO for deploying 500 Jetson Orin units (32GB LPDDR5, 275 TOPS INT8, 60W, $499 each) in a smart factory. Include: hardware ($499), power at 60W continuous ($0.10/kWh), OTA update infrastructure ($10K/year), and maintenance (3% annual hardware replacement). Compare against a cloud-based alternative at $0.50/hr per unit-equivalent.'
question: What is the 5-year TCO of 500 Jetson Orin units compared to a cloud-based alternative at $0.50/hr?
details:
  realistic_solution: 'Edge TCO (5-year): Hardware = 500 * $499 = $249,500. Power = 500 * 60W * 43,800h * $0.10 / 1000 = $131,400. OTA = $10K * 5 = $50,000. Maintenance = 3% * $249,500 * 5 = $37,425. Total Edge TCO = $249.5K + $131.4K + $50K + $37.4K = $468,325. Cloud TCO (5-year): 500 units * $0.50/hr * 43,800h = $10,950,000. Edge is >20x cheaper over 5 years. The heavy utilization (24/7 continuous) strongly favors edge CapEx over cloud OpEx.'
  common_mistake: Only counting hardware acquisition cost and forgetting 5 years of power, maintenance, and management overhead, which typically exceed initial hardware cost for IoT/edge deployments.
  napkin_math: 'Edge HW = $249.5K. Power = 500 * 60 * 43800 * 0.1 / 1000 = $131.4K. OTA = $50K. Maint = 0.03 * 249.5K * 5 = $37.4K. Edge Total = $468.3K. Cloud = 500 * 0.5 * 24 * 365 * 5 = $10.95M. Savings = $10.48M.'
