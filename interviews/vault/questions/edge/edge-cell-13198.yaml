title: 'Edge Transformer Cost Specification: Design Edge Transformer SLO'
scenario: 'Specify the maximum transformer model size (in parameters) that can be deployed on Jetson Orin
  (32GB LPDDR5, 102.4GB/s, 275 TOPS INT8) to meet: decode latency SLO P99 < 500ms for 200 output tokens,
  concurrent users = 5, INT4 quantization, max context length = 2048 tokens.'
question: "What is the correct KV cache size and max INT4 model size after reserving KV for 5 users at context 128?"
details:
  realistic_solution: 'KV per user at context=128, 32 layers, 32 KV heads, head_dim=64, INT4: 32×2×32×64×128×0.5B
    = 8MB (not 33.6MB). 33.6MB uses head_dim=128 which is too large for this TinyBERT-class model.'
  common_mistake: Solving only for weight bandwidth and ignoring KV cache memory, which for 5 concurrent
    users at 2048 context can be substantial and may reduce the available weight bandwidth headroom.
  napkin_math: 'KV for 5 users at context=128, 32 layers, 32 KV heads, head_dim=64, INT4 (0.5B): KV per
    user = 32 layers × 2 × 32 heads × 64 head_dim × 128 context × 0.5B = 32×2×32×64×128×0.5 = 8,388,608
    bytes = 8MB per user (not 33.6MB — that uses head_dim=128 not 64). 5 users: 40MB KV. Weight budget:
    256MB - 40MB = 216MB → 216MB/0.5B/param = 432M params max.'
