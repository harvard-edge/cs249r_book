title: Hailo-8 Host-to-Device Streaming Latency Bottleneck
scenario: We are deploying a vision model on a Hailo-8 M.2 module connected via PCIe Gen3 x2. Profiling reveals that the inference latency is 6.5 ms per frame, but the accelerator compute utilization is only around 10%. The model requires 20 Giga-Operations (GOPs) per frame and transfers 12 MB of data across the PCIe bus per inference.
question: Why is Hailo-8 inference latency 6.5 ms with only about 10% compute utilization for a 20-GOPS, 12MB-per-frame model?
details:
  realistic_solution: 'The low utilization and high latency occur because the Hailo-8 compute engines are starving for data. Without local DRAM, the dataflow architecture relies entirely on the host interface. The bottleneck is purely I/O latency. The time it takes to stream 12 MB over the PCIe bus far exceeds the compute time, leaving the accelerator idle.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-related or thermal throttling.
    **The Rationale:** Candidates analyze the accelerator in isolation, forgetting the PCIe bus is the critical path for a dataflow architecture without DRAM.
    **The Consequence:** Wasted effort on INT8 quantization or operator fusion instead of optimizing I/O transfers or upgrading the PCIe interface.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PCIe Gen3 x2 bandwidth: 1.9 GB/s (1900 MB/s)
       - Model compute: 20 GOPs
       - Peak compute: 26 TOPS (26,000 GOPs/sec)
       - Data transfer: 12 MB/frame
    2. **Calculations:**
       - Compute time: 20 GOPs / 26,000 GOPs/sec = 0.77 ms
       - I/O time: 12 MB / 1900 MB/s = 6.31 ms
       - Total latency = max(Compute, I/O) = 6.31 ms
       - Utilization = 0.77 ms / 6.31 ms = 12.2%
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (PCIe Bottleneck).** Latency is dominated by the 6.31 ms PCIe transfer, throttling utilization to ~12%.
