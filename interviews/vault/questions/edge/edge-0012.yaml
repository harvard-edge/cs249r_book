title: The Jitter Bug
scenario: Your embedded ML system has a critical perception task that needs to run every 33ms. You observe that sometimes it completes in 30ms, and other times it takes 35ms.
question: Why is this variation (jitter) problematic for a real-time control system, and how would you measure and mitigate it?
details:
  realistic_solution: "Jitter introduces non-determinism, which can destabilize control loops (e.g., a robot arm overshooting due to delayed sensor feedback), cause data staleness in sensor fusion (e.g., IMU data arriving too late for camera frame alignment), or lead to missed deadlines for critical actions.\n**Measurement:** Use high-resolution timers (e.g., CPU cycle counters, hardware timers) to timestamp task start and end times, then analyze the distribution of execution durations and inter-arrival times. Tools like `ftrace` or dedicated RTOS trace analyzers can visualize this.\n**Mitigation:**\n1. **RTOS:** Use a Real-Time Operating System (RTOS) with priority-based preemptive scheduling to ensure high-priority tasks run predictably.\n2. **WCET Analysis:** Perform Worst-Case Execution Time (WCET) analysis to understand the maximum possible duration of your task and design the system with sufficient headroom.\n3. **Resource Contention:** Minimize contention for shared resources (CPU, memory, peripherals) by using mutexes, semaphores, or dedicated resources.\n4. **Interrupt Latency:** Optimize interrupt service routines (ISRs) to be short and efficient to reduce interrupt latency and preemption overhead.\n5. **Dedicated Cores:** On multi-core systems, dedicate specific cores to real-time tasks and isolate them from non-real-time OS processes."
  common_mistake: |
    **The Pitfall:** Dismissing jitter because "it's only a few milliseconds".
    **The Rationale:** Software engineers often think in average latencies rather than strict worst-case execution times.
    **The Consequence:** Overlooking non-deterministic behavior destabilizes tightly coupled control loops and sensor fusion, leading to physical system failures.
  napkin_math: |
    1. Control loop period: 33.3ms (30Hz).
    2. Jitter: +/- 5ms (Effective period: 28ms to 38ms).
    3. Robot speed: 1 m/s (1000 mm/s).
    4. Uncompensated position error: 5ms * 1000 mm/s = **5 mm error**.
