title: The TinyML Tensor Arena Squeeze
scenario: 'You''re deploying a keyword-spotting model to a Cortex-M7 microcontroller, which has only a few hundred kilobytes of SRAM. You''ve analyzed the two most memory-intensive, consecutive layers in your TFLite-Micro model: Layer 5 (Conv2D): Input = 20 KB, Output = 40 KB. Layer 6 (Activation/Pooling): Input = 40 KB (from Layer 5), Output = 10 KB.'
question: What is the minimum Tensor Arena size needed for these two consecutive TFLite-Micro layers?
details:
  realistic_solution: The Tensor Arena's size is determined by the peak memory usage at any single point during the model's execution, not the total size of all tensors. We must calculate the memory needed for each operation individually and then take the maximum since TFLite-Micro reuses memory effectively.
  common_mistake: |
    **The Pitfall:** Summing all tensor sizes or only allocating for the single largest tensor.
    **The Rationale:** Engineers ignore that TFLite-Micro reuses memory, meaning the input of Layer 5 is freed before the output of Layer 6 is allocated.
    **The Consequence:** The system overallocates the Tensor Arena (wasting precious SRAM) or underallocates it (causing an immediate crash during the largest operational memory spike).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TFLite-Micro reuses memory. Input and output tensors of a layer coexist.
       - Layer 5: Input = 20 KB, Output = 40 KB.
       - Layer 6: Input = 40 KB, Output = 10 KB.
    2. **Calculations:**
       - Layer 5 peak footprint = 20 KB + 40 KB = 60 KB.
       - Layer 6 peak footprint = 40 KB + 10 KB = 50 KB.
       - Required Tensor Arena = max(60 KB, 50 KB) = 60 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound**. The peak memory required at any single moment is 60 KB, defining the strict minimum Tensor Arena size.
  options:
  - 70 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
