title: The TinyML Tensor Arena Squeeze
scenario: 'You''re deploying a keyword-spotting model to a Cortex-M7 microcontroller, which has only a
  few hundred kilobytes of SRAM. You''ve analyzed the two most memory-intensive, consecutive layers in
  your TFLite-Micro model: Layer 5 (Conv2D): Input = 20 KB, Output = 40 KB. Layer 6 (Activation/Pooling):
  Input = 40 KB (from Layer 5), Output = 10 KB.'
question: "What is the minimum Tensor Arena size needed for these two consecutive TFLite-Micro layers?"
details:
  realistic_solution: The Tensor Arena's size is determined by the peak memory usage at any single point
    during the model's execution, not the total size of all tensors. We must calculate the memory needed
    for each operation individually and then take the maximum.
  common_mistake: 'Engineers often make two mistakes: 1) Summing all the tensor sizes (20+40+10=70KB),
    assuming they all need to be in memory at once. 2) Only allocating for the single largest tensor (40KB).
    Both are wrong. The key is that TensorFlow Lite for Microcontrollers reuses memory, so you only need
    to find the peak simultaneous memory usage required for any *single* operation.'
  napkin_math: '**Layer 5 (Conv2D):** Input 20 KB + Output 40 KB = 60 KB peak.

    **Layer 6 (Activation/Pooling):** Input 40 KB (from L5) + Output 10 KB = 50 KB peak.


    **Arena size = max(60, 50) = 60 KB.**


    Why not 70 KB? TFLite-Micro reuses memory — L5''s input (20 KB) is freed before L6''s output (10 KB)
    is allocated. They never coexist.

    Why not 40 KB? During L5, both input (20 KB) and output (40 KB) must be in memory simultaneously.


    Practical: add 10-15% for TFLite-Micro bookkeeping → ~69 KB recommended. On 256 KB SRAM Cortex-M7:
    69 KB arena leaves 187 KB for stack, firmware, and DMA buffers.'
  options:
  - 70 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
