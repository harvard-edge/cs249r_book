title: Symmetric INT8 Quantization Formula
scenario: An accelerator requires 8-bit symmetrically quantized activations to achieve its peak efficiency.
question: State the standard mathematical formula used to map an FP32 value to a symmetric INT8 representation.
details:
  realistic_solution: The formula for symmetric quantization is INT8_val = clamp(round(FP32_val / Scale), -127, 127). In symmetric quantization, the zero-point is implicitly 0, ensuring that FP32 0.0 maps exactly to INT8 0. The Scale factor is precomputed as max(|FP32_val|) / 127.
  common_mistake: |
    **The Pitfall:** Including a non-zero 'zero-point' offset.
    **The Rationale:** Candidates often memorize the general asymmetric quantization formula and apply it blindly.
    **The Consequence:** Using an asymmetric formula on hardware or pipelines expecting symmetric quantization leads to incorrect activation values and severe accuracy degradation.
  napkin_math: |
    **Assumptions & Constraints:**
       - Quantization target: Symmetric INT8
       - Standard 8-bit signed integer range
    **Calculations:**
       - Range calculation: 2^7 = 128
       - Maximum positive value: 128 - 1 = 127
       - Minimum negative value: -127 (symmetric around 0)
    **Conclusion & Interpretation:**
       - **Result: Precision-Bound Calculation.** The scale is bounded strictly by [-127, 127] to maintain a zero-point exactly at 0.
