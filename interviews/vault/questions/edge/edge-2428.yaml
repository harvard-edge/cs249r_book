title: Symmetric INT8 Quantization Formula
scenario: A Hailo-8 accelerator (26 TOPS INT8) requires 8-bit symmetrically quantized
  activations to achieve its peak efficiency.
question: State the standard mathematical formula used to map an FP32 value to a symmetric
  INT8 representation.
details:
  realistic_solution: The formula for symmetric quantization is INT8_val = clamp(round(FP32_val
    / Scale), -127, 127). In symmetric quantization, the zero-point is implicitly
    0, ensuring that FP32 0.0 maps exactly to INT8 0. The Scale factor is precomputed
    as max(|FP32_val|) / 127.
  common_mistake: Including a non-zero 'zero-point' offset, which belongs to asymmetric
    quantization schemes.
  napkin_math: 127 = 2^7 - 1
