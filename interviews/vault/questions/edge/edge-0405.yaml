validation_issues:
- The 'Napkin Math' section for Batch=8 states '5.1 TOPS attainable' which is inconsistent; with an Arithmetic
  Intensity (AI) of ~200 Ops/Byte and a ridge point of ~117 Ops/Byte, the workload should be compute-bound
  and thus achieve the peak 6 TOPS.
