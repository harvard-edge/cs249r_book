title: The Edge Batch Size Paradox
scenario: Your colleague trained a model on an A100 using batch size 256 and got great GPU utilization
  (85%). Now you're deploying on a Rockchip RK3588 (6 TOPS NPU) for a robotic arm that needs per-frame
  decisions in under 20ms. Your colleague suggests batching 8 frames to improve NPU utilization. Why is
  this a terrible idea for your use case, and what does the roofline model tell you about batch=1 on edge?
details:
  realistic_solution: The robotic arm needs to react to what it sees *now*. At 30 FPS, collecting 8 frames
    spans 267ms before inference even begins. Batching means the arm's control loop acts on data that
    is 267ms stale — at a 1 m/s arm speed, that's 26.7cm of uncompensated motion, enough to miss a grasp
    or collide with an obstacle. The sub-millisecond hardware latency difference is dwarfed by the massive
    temporal staleness introduced by waiting to build the batch.
  common_mistake: '"Larger batches are always better for hardware utilization, so batch=8 will be faster
    overall." This conflates throughput optimization with latency optimization.'
  napkin_math: 'RK3588 NPU: 6 TOPS, LPDDR4X at 51.2 GB/s, ridge point = 6T / 51.2G ≈ 117 Ops/Byte. MobileNetV3
    batch=1: 0.22 GFLOPs, ~4.4 MB memory traffic → AI = 50 Ops/Byte (below ridge → memory-bound). Attainable:
    51.2 GB/s × 50 = 2.56 TOPS → 43% utilization. Latency: 0.22G / 2.56T = 0.086ms. Batch=8: AI ≈ 200
    Ops/Byte → 5.1 TOPS attainable → 85% utilization. Latency: 1.76G / 5.1T = 0.345ms. Throughput: 8/0.345ms
    = 23,188 FPS vs 1/0.086ms = 11,627 FPS.'
