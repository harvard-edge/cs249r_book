title: VRAM Budgeting for LLM Inference on Qualcomm Cloud AI 100
scenario: 'You are a Machine Learning engineer tasked with deploying a large language model on a Qualcomm Cloud AI 100 accelerator, which features 32 GB LPDDR4x memory, 400 TOPS INT8, and 75W TDP. Your team is evaluating two transformer-based model architectures for a low-latency, real-time inference application, both requiring a batch size of 1 and a maximum sequence length of 2048 tokens.

  *   **Architecture A:** A 7 billion parameter model (7B), using FP16 precision for all weights and activations.

  *   **Architecture B:** A 3 billion parameter model (3B), with weights quantized to INT8 precision. It employs a KV-cache to optimize attention computations during inference, storing key and value states in FP16. Assume this model has 32 layers and a hidden dimension of 3072.'
question: Which architecture fits the Cloud AI 100's 32 GB VRAM for 2048-token inference, and how would AdamW fine-tuning change the budget?
details:
  realistic_solution: 'A systematic VRAM budgeting approach involves breaking down memory consumption by components: model weights, optimizer states (if applicable), activations, and KV-cache. For weights, multiply the number of parameters by the data type size (e.g., FP16 = 2 bytes, INT8 = 1 byte). For optimizer states (e.g., AdamW), multiply parameters by approximately 8 bytes/parameter (two FP32 states). Activations are more complex; estimate them based on peak tensor sizes during a forward pass. KV-cache memory can be calculated as `batch_size * sequence_length * num_layers * 2 (for K+V) * hidden_size * datatype_size`. Always account for overheads from the operating system, framework, and potentially other running processes. Leverage quantization, pruning, and architectural optimizations like KV-cache for efficient memory utilization on edge devices. For fine-tuning, consider techniques like LoRA/QLoRA or 8-bit optimizers.'
  common_mistake: |
    **The Pitfall:** Underestimating activation memory usage and neglecting the KV-cache footprint.
    **The Rationale:** Candidates often focus only on model weight size, forgetting that sequence lengths and generative state explode during runtime.
    **The Consequence:** Deploying a model that runs perfectly for batch 1 / token 1, but throws an Out-Of-Memory (OOM) error halfway through generation or during fine-tuning.
  napkin_math: |
    - **Arch A Inference:** Weights = 7B $\times$ 2 bytes = 14 GB. Activations = ~4 GB. Total = 18 GB.
    - **Arch B Inference:** Weights = 3B $\times$ 1 byte = 3 GB. KV-cache = 1 $\times$ 2048 $\times$ 32 $\times$ 2 $\times$ 3072 $\times$ 2 bytes = ~0.75 GB. Activations = ~2 GB. Total = 5.75 GB.
    - **Fine-tuning (AdamW):** Arch A = 7B $\times$ 8 = 56 GB (OOM). Arch B = 3B $\times$ 8 = 24 GB.
    - **Arch B Total Fine-tuning:** 5.75 GB + 24 GB = **29.75 GB** (barely fits the 32 GB limit).
