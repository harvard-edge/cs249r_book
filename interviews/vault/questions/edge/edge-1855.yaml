title: VRAM Budgeting for LLM Inference on Qualcomm Cloud AI 100
scenario: 'You are a Machine Learning engineer tasked with deploying a large language
  model on a Qualcomm Cloud AI 100 accelerator, which features 32 GB LPDDR4x memory,
  400 TOPS INT8, and 75W TDP. Your team is evaluating two transformer-based model
  architectures for a low-latency, real-time inference application, both requiring
  a batch size of 1 and a maximum sequence length of 2048 tokens.


  *   **Architecture A:** A 7 billion parameter model (7B), using FP16 precision for
  all weights and activations.

  *   **Architecture B:** A 3 billion parameter model (3B), with weights quantized
  to INT8 precision. It employs a KV-cache to optimize attention computations during
  inference, storing key and value states in FP16. Assume this model has 32 layers
  and a hidden dimension of 3072.


  Perform a detailed VRAM budget analysis for each architecture, accounting for model
  weights, activations during a single forward pass, and the KV-cache (where applicable).
  Based on your analysis, recommend which architecture is more suitable for deployment
  on the Qualcomm Cloud AI 100 given its 32 GB VRAM limit, and justify your choice.
  Discuss the potential implications if on-device fine-tuning with an AdamW optimizer
  (which typically uses 8 bytes/parameter) were a future requirement for either model.'
question: Which architecture fits the Cloud AI 100's 32 GB VRAM for 2048-token inference,
  and how would AdamW fine-tuning change the budget?
details:
  realistic_solution: 'A systematic VRAM budgeting approach involves breaking down
    memory consumption by components: model weights, optimizer states (if applicable),
    activations, and KV-cache. For weights, multiply the number of parameters by the
    data type size (e.g., FP16 = 2 bytes, INT8 = 1 byte). For optimizer states (e.g.,
    AdamW), multiply parameters by approximately 8 bytes/parameter (two FP32 states).
    Activations are more complex; estimate them based on peak tensor sizes during
    a forward pass. KV-cache memory can be calculated as `batch_size * sequence_length
    * num_layers * 2 (for K+V) * hidden_size * datatype_size`. Always account for
    overheads from the operating system, framework, and potentially other running
    processes. Leverage quantization, pruning, and architectural optimizations like
    KV-cache for efficient memory utilization on edge devices. For fine-tuning, consider
    techniques like LoRA/QLoRA or 8-bit optimizers.'
  common_mistake: Underestimating activation memory usage, especially with larger
    batch sizes or sequence lengths. Neglecting the significant memory footprint of
    the KV-cache for generative models. Overlooking the substantial VRAM required
    for optimizer states (e.g., AdamW often requires 8 bytes/parameter for its states)
    when considering on-device fine-tuning, leading to out-of-memory errors.
  napkin_math: "Architecture A (7B, FP16): Weights = 7B * 2 bytes = 14 GB. Activations (B=1, S=2048) = ~4 GB. Total Inference = 18 GB. Architecture B (3B, INT8 weights, FP16 KV): Weights = 3B * 1 byte = 3 GB. Activations = ~2 GB. KV-cache = 1 * 2048 * 32 * 2 * 3072 * 2 bytes = ~0.75 GB. Total Inference = 5.75 GB. Fine-tuning implications: AdamW uses 8 bytes/param. Arch A AdamW = 7B * 8 = 56 GB (OOM). Arch B AdamW = 3B * 8 = 24 GB. Total Arch B Fine-tuning = 5.75 GB + 24 GB = 29.75 GB (barely fits 32 GB limit)."
