title: The INT8 Energy Dividend (edge-0355)
scenario: Your team is optimizing a perception model for an autonomous vehicle's main compute unit. To reduce power consumption and thermal load, you're considering quantizing a key convolutional layer from full-precision FP32 to INT8. You must identify the approximate energy reduction for a single multiply-accumulate (MAC) operation when switching from FP32 to INT8.
question: What approximate energy reduction per MAC should you expect when quantizing this convolution from FP32 to INT8?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation. Therefore, switching from FP32 to INT8 for compute provides an ~18x energy saving for the MAC operations themselves. This is a fundamental physical invariant based on the energy required to switch transistors for complex floating-point arithmetic versus simpler integer math.
  common_mistake: |
    **The Pitfall:** Conflating memory savings with computational energy savings (assuming a 4x reduction).
    **The Rationale:** Engineers focus on the 4:1 byte ratio of FP32 to INT8, missing that digital logic switching for FP vs INT is a completely different physical scaling factor.
    **The Consequence:** Wildly underestimating the thermal and power benefits of true hardware integer quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Switching precision from FP32 to INT8.
    2. **Calculations:**
       - Physical logic gate scaling yields a ~18x discrepancy in switching energy between FP32 and INT8 arithmetic.
    3. **Conclusion & Interpretation:**
       - **Result: FP32 requires ~18x more energy than INT8 per operation.**
  options:
  - ~4×
  - ~3.5×
  - ~18×
  - ~100×
  correct_index: 2
