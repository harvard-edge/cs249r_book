title: The Model Pruning Speedup Myth
scenario: Your team pruned a YOLOv8-M model to 90% sparsity — 90% of the weights are zero. The intern calculated: 'only 10% of weights remain, so inference should be 10x faster on our Jetson Orin NX.' After deploying the sparse model with TensorRT, inference time is unchanged — 22ms, same as the dense model.
question: Why did 90% sparsity give no speedup on the Jetson Orin NX, and what kind of pruning would actually help?
details:
  realistic_solution: The intern performed unstructured pruning — zeroing out individual weights scattered randomly throughout each tensor. The weight tensors still have the same shape (e.g., a 256x256x3x3 convolution is still stored as a 256x256x3x3 tensor, just with 90% zeros). GPU and DLA hardware execute dense matrix multiplications on fixed-size tiles (e.g., 16x16 on Orin's Tensor Cores). A tile with 90% zeros still takes the same number of clock cycles as a tile with 0% zeros — the hardware performs the multiply-accumulate regardless of whether the operand is zero.
  common_mistake: |
    **The Pitfall:** Assuming that any reduction in non-zero weights automatically translates to faster inference.
    **The Rationale:** Candidates often blame the runtime or missing sparse inference engine, not realizing that hardware executes dense matrix multiplications on fixed-size tiles regardless of zero values.
    **The Consequence:** Spending significant time implementing and training unstructured sparse models that yield absolutely no performance benefit in deployment.
  napkin_math: |
    1. Evaluate unstructured 90% sparse model: Tensor shape is unchanged, memory traffic is unchanged, compute is unchanged. Speedup = 0x.
    2. Evaluate structured 50% channel pruning: Tensor dimensions halved, FLOPs reduced ~4x (quadratic in channels), memory reduced ~2x. Real speedup = 2-3x.
    3. Evaluate NVIDIA 2:4 sparsity (50%): Tensor Core throughput doubles, accounting for non-TC layers. Real speedup = ~1.8x.
    **The 90% unstructured model wastes 90% of its memory bandwidth loading zeros, providing a 0x speedup.**
