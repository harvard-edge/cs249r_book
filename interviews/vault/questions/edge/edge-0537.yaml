title: 'The DVFS Latency Jitter: Real-Time Deadlines'
scenario: Your Google Coral Dev Board runs a gesture recognition model for a kiosk application. Average
  inference latency is 8ms, but you observe periodic spikes to 25ms every 10-15 seconds, causing visible
  UI stutter. The spikes don't correlate with input complexity — simple and complex gestures both spike.
  CPU temperature is a stable 65°C, well below the 85°C throttle point. What's causing the periodic latency
  variance?
question: "What's causing the periodic latency variance?"
details:
  realistic_solution: 'The Coral Dev Board''s NXP i.MX 8M SoC uses Linux''s `schedutil` CPU frequency
    governor by default. This governor dynamically adjusts CPU frequency based on utilization. The gesture
    recognition pipeline has a bursty workload pattern: 8ms of intense computation (preprocessing + TPU
    dispatch + postprocessing) followed by ~25ms of idle time (waiting for the next frame at 30 FPS).
    The governor sees low average utilization (~25%) and downclocks the CPU from 1.5 GHz to 800 MHz to
    save power. When the next frame arrives, the CPU needs 2-3ms to ramp back up to 1.5 GHz (PLL relock
    time + voltage regulator settling). During this ramp, preprocessing runs at 800 MHz — taking 8ms ×
    (1500/800) = 15ms instead of 8ms. The total inference becomes 15ms + 10ms (TPU, unaffected) = 25ms.'
  common_mistake: '"The model has variable compute cost depending on input" or "Background processes are
    stealing CPU." Neither explains the strict periodicity.'
  napkin_math: 'CPU at 1.5 GHz: preprocessing = 8ms. CPU at 800 MHz: preprocessing = 8 × (1500/800) =
    15ms. Frequency ramp time: 2-3ms (PLL relock). Spike latency: 15 + 10 (TPU) = 25ms vs normal 8 + 10
    = 18ms. Spike frequency: every 10-15s. Power at 1.5 GHz idle: 1.2W. Power at 800 MHz idle: 0.9W. Delta:
    0.3W. Annual energy cost of pinning: 0.3W × 8760h = 2.6 kWh ≈ $0.30/year.'
