title: On-Device Coreset Capacity Calculation
scenario: We are deploying a few-shot anomaly detection system on a Qualcomm Cloud AI 100 on-premise inference
  accelerator. The device has 32 GB of LPDDR4x memory, operates at 75W, and delivers 400 TOPS INT8. The
  INT8 quantized base model and system overhead consume a combined 20 GB of memory. To recognize new defect
  types without full retraining, we maintain a pruned coreset of synthetic reference embeddings directly
  in memory. If each embedding is a 4096-dimensional FP16 vector, calculate the maximum number of coreset
  samples we can hold in the remaining memory.
question: "How many 4096-dimensional FP16 coreset embeddings fit in the remaining 12 GB of Cloud AI 100 memory?"
details:
  realistic_solution: The correct approach involves calculating the available memory on the device and
    dividing it by the memory footprint of a single synthetic reference embedding. This determines the
    upper bound for the coreset size that can be maintained for real-time inference without causing Out-Of-Memory
    (OOM) errors.
  common_mistake: Candidates often miscalculate the byte size of FP16 vectors, forgetting that FP16 requires
    2 bytes per dimension, or they fail to correctly convert between Gigabytes and Kilobytes when dividing
    the remaining memory.
  napkin_math: '1. Remaining Memory: 32 GB (total LPDDR4x) - 20 GB (model + OS) = 12 GB.

    2. Convert to KB: 12 GB = 12 * 1024 * 1024 KB = 12,582,912 KB.

    3. Embedding Size: 4096 dimensions * 2 bytes/dimension (FP16) = 8,192 bytes = 8 KB.

    4. Max Coreset Samples: 12,582,912 KB / 8 KB = 1,572,864 samples.'
