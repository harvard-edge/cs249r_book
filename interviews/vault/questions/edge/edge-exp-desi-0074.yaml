title: Architecting On-Premise Guardrails for PII Redaction
scenario: You are tasked with designing an on-premise guardrail system that processes sensitive medical
  transcripts using an LLM before they are transmitted to a centralized analytics cloud. The system is
  deployed on a single Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) per hospital wing. Architect
  a fail-safe pipeline that includes PII redaction, toxic content filtering, and prompt injection detection
  while ensuring the entire ensemble fits within the accelerator's memory and compute constraints.
question: "How would you build an on-premise medical transcript guardrail pipeline on Cloud AI 100 that fits PII, toxicity, and injection checks in 32 GB?"
details:
  realistic_solution: 'Design a cascading pipeline: a deterministic regex fast-pass for obvious PII, followed
    by a lightweight INT8 quantized NER model for complex PII, and a specialized 1B parameter classifier
    for toxicity and injection attacks. Only sanitized inputs are passed to the main generative model.
    All models must be co-located on the same card to minimize PCIe transfer latency.'
  common_mistake: Candidates often propose relying entirely on cloud APIs for safety checks, defeating
    the purpose of on-premise privacy, or they design monolithic large models that cannot fit alongside
    the required safety classifiers in the strict 32 GB memory footprint.
  napkin_math: Main LLM (8B params, INT8) = 8 GB memory. NER Model (INT8) = 0.5 GB. Safety Classifier
    (1B, INT8) = 1 GB. Total model weights = 9.5 GB. Out of 32 GB available on the Qualcomm Cloud AI 100,
    this leaves 22.5 GB for KV cache and execution context. Given 400 TOPS INT8, the lightweight 1B classifier
    requires ~2 Tera-operations per token, easily accommodated within the remaining compute envelope with
    minimal latency overhead.
