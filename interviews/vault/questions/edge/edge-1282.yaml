title: Architecting Thermal Management for Unconditioned Edge Deployments
scenario: You are tasked with architecting the deployment strategy for a cluster of edge inference accelerators in a ruggedized, unconditioned telco edge environment. The ambient temperature fluctuates wildly, and the cooling system has a maximum heat dissipation limit.
question: How would you manage scheduling and thermal headroom to meet burst-latency SLAs without throttling in a hot telco edge enclosure?
details:
  realistic_solution: A robust architecture involves implementing a proactive, application-aware thermal management controller. This controller profiles the thermal capacitance of the system and employs dynamic voltage and frequency scaling (DVFS) alongside workload scheduling. It queues latency-tolerant batch jobs to maintain a steady thermal baseline and reserves thermal headroom to allow the Qualcomm Cloud AI 100 to operate at its full 400 TOPS capacity during brief, high-priority inference bursts without exceeding the thermal limits of the enclosure.
  common_mistake: |
    **The Pitfall:** Proposing simplistic static underclocking.
    **The Rationale:** Candidates rely entirely on built-in hardware throttling mechanisms.
    **The Consequence:** Unpredictable latency spikes during high-priority burst traffic when the hardware throttles.
  napkin_math: |
    - Efficiency: 400 TOPS / 75W = 5.33 TOPS/W.
    - Sustained cap (50W limit): 50W * 5.33 TOPS/W = 266 TOPS.
    - 5-second burst (75W): Accumulates 25W * 5s = **125 Joules** of excess heat.
    - **Conclusion:** System must operate below 50W prior to burst to absorb 125J safely.
