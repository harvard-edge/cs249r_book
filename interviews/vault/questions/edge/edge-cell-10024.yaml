title: Realizing Tiled Activation Processing for CNNs on Hailo-8 SRAM Constraints
scenario: You are compiling ResNet-34 for Hailo-8 (26 TOPS, 2.5W, ~6 MB on-chip SRAM). The Hailo Dataflow
  Compiler (DFC) reports that the 7×7 conv stem layer at resolution 112×112×64 produces a 3.1 MB activation
  tensor that exceeds the available SRAM after accounting for weight storage. Explain how the Hailo architecture
  handles this case and what trade-off this creates for latency.
question: "How does Hailo-8 handle the ResNet-34 7×7 stem activation that exceeds SRAM, and what latency tradeoff results?"
details:
  realistic_solution: 'Hailo-8 DFC automatically tiles large activations spatially. For the 112×112×64
    activation (3.1 MB): tile to 56×56×64 = 0.78 MB tiles, requiring 4 tiles total. Each tile is processed
    independently through subsequent layers (depth-first per tile). This means the 112×112 spatial map
    is processed in 4 passes, adding inter-tile communication overhead. Latency impact: 4× the single-tile
    processing time for that layer, typically adding 2-5 ms for the stem layer. However, downstream layers
    at smaller spatial resolutions may fit entirely in SRAM without tiling. Net result: Hailo-8 successfully
    runs ResNet-34 with a latency penalty of ~5-10% for large-resolution early layers.'
  common_mistake: 'Assuming that a 3.1 MB activation exceeding SRAM causes a compilation failure or requires
    reducing model resolution. Hailo-8 uses spatial tiling: the accelerator processes the activation in
    spatial tiles that fit in SRAM, streaming results through the chip. This is handled automatically
    by DFC but the user should understand the latency trade-off.'
  napkin_math: 'Activation: 112×112×64×1 B (int8) = 802816 B = 0.77 MB per half-spatial tile (56×112).
    4 tiles of 56×56×64 = 0.19 MB each — but also need double-buffering: 2 × 0.19 MB = 0.39 MB. Weight
    tile for 7×7 conv, 64 output channels: 3×7×7×64×1 B = 9408 B ≈ 9 KB. SRAM usage: weights 9 KB + 2
    activation tiles 0.39 MB ≈ 0.4 MB << 6 MB. Tiling does not fully explain the SRAM pressure — DFC must
    be accounting for multiple pipeline stages simultaneously.'
