title: The Sequential Serializer
scenario: Your vision pipeline runs three models sequentially, taking 45ms total and missing your 30 FPS
  target. You notice that during the classification phase, the GPU is only at 30% utilization. Based on
  the utilization diagram, how would you 'collapse' this timeline to fit the 33ms budget?
details:
  realistic_solution: You have **Under-utilized Kernel Concurrency**. Small models like classification
    don't saturate the GPU's compute units (SMs). The fix is to use **CUDA Streams** or **MPS** to overlap
    the execution of smaller kernels with larger ones (e.g., running classification concurrently with
    segmentation). By overlapping these tasks, the total timeline can be compressed from 45ms to ~33ms.
  common_mistake: '"Run all models sequentially — the GPU can only do one thing at a time." Modern GPUs
    support concurrent kernel execution via CUDA streams.'
  napkin_math: If Classification (5ms) uses 30% of the GPU and Segmentation (12ms) uses 60%, running them
    concurrently takes only 12ms instead of 17ms, saving 5ms of idle pipeline time.
