title: The Sequential Serializer
scenario: Your vision pipeline runs two models sequentially, taking 45ms total and missing your 30 FPS target. You notice that during the classification phase, the GPU is only at 30% utilization.
question: "Based on the utilization diagram, how would you 'collapse' this timeline to fit the 33ms budget?"
details:
  realistic_solution: You have under-utilized kernel concurrency. Small models like classification do not saturate the GPU's compute units (SMs). The fix is to use CUDA Streams or MPS (Multi-Process Service) to overlap the execution of smaller kernels with larger ones (e.g., running classification concurrently with segmentation). By overlapping these tasks, the total timeline can be compressed from 45ms to 30ms, easily meeting the 33ms budget.
  common_mistake: |
    **The Pitfall:** Assuming the GPU can only execute one model at a time sequentially.
    **The Rationale:** Candidates treat the GPU as a single monolithic core rather than a massively parallel array of SMs that can handle independent streams simultaneously.
    **The Consequence:** The system misses real-time deadlines while leaving 70% of the hardware compute capacity completely idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Classification: 15ms, 30% SM utilization.
       - Segmentation: 30ms, 60% SM utilization.
       - Total sequential time: 45ms. Target budget: 33ms (30 FPS).
    2. **Calculations:**
       - Concurrent execution utilization = 30% + 60% = 90% SM utilization (fits on GPU).
       - Overlapped execution time = max(15ms, 30ms) = 30ms.
    3. **Conclusion & Interpretation:**
       - **Result: 30ms total latency** (Compute-Bound, fits 33ms budget).
