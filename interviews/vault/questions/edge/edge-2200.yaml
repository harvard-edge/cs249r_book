title: Edge Activation Peak Budget
scenario: An edge segmentation model has 60 MB weights and three candidate layers
  with activation peaks of 90 MB, 140 MB, and 110 MB. The gateway accelerator has
  256 MB local SRAM, but the runtime reserves 40 MB. Determine whether the model fits
  without spilling activations.
question: Does a 60 MB model with 140 MB peak activations fit in 256 MB SRAM after
  a 40 MB runtime reserve?
details:
  realistic_solution: Available SRAM after runtime reserve is 216 MB. The peak model
    plus activation footprint is 60 + 140 = 200 MB, so it fits with 16 MB headroom.
    That headroom is small, so allocator fragmentation or extra buffers could still
    cause spills.
  common_mistake: Summing all activation peaks instead of using peak coexistence,
    or ignoring runtime reserve.
  napkin_math: Available = 256 - 40 = 216 MB. Peak footprint = 60 + 140 = 200 MB.
    Headroom = 16 MB.
