title: The Activation Bandwidth Bottleneck
scenario: You are optimizing a LiDAR perception model for an autonomous vehicle's ECU, which uses a Jetson AGX Orin. The model is failing its 33ms end-to-end latency budget. Profiling reveals a major bottleneck is memory access for a specific layer's activation tensor, which has dimensions of 256x256x512. To improve performance, you quantize the model's activations from FP16 to INT8.
question: How does INT8 activation quantization improve latency, and what are the 256x256x512 tensor footprints in FP16 and INT8?
details:
  realistic_solution: |
    Quantizing activations from FP16 (2 bytes/value) to INT8 (1 byte/value) halves the size of the tensor that needs to be moved between the compute units and DRAM. This directly halves the memory bandwidth required for that operation, reducing I/O wait times and freeing up the memory bus for other concurrent operations. This reduction in data movement is the primary source of the latency improvement for memory-bound layers.
  common_mistake: |
    **The Pitfall:** Focusing only on the reduction in total RAM usage.
    **The Rationale:** RAM capacity is easier to conceptualize than memory bus saturation.
    **The Consequence:** Missing the fact that memory bandwidth, not capacity, is the critical scarce resource for real-time latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor elements: 256 x 256 x 512 = 33,554,432 elements.
       - FP16: 2 bytes/value.
       - INT8: 1 byte/value.
       - Memory Bandwidth: 204.8 GB/s.
    2. **Calculations:**
       - FP16 footprint: 33,554,432 * 2 bytes = 67,108,864 bytes (64 MiB).
       - INT8 footprint: 33,554,432 * 1 byte = 33,554,432 bytes (32 MiB).
       - Bandwidth saved: 64 MiB - 32 MiB = 32 MiB per access.
       - Transfer time saved: 32 MiB / 204.8 GB/s = ~0.15 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Bandwidth)**. Quantizing to INT8 halves the memory bandwidth requirement, cutting read time by ~0.15 ms per layer access.
  options:
  - It reduces the activation size from 64 MB to 8 MB, saving 56 MB of memory transfers.
  - It makes the model's weights 2x smaller on flash, which speeds up initial model loading time.
  - It halves the activation size from 64 MB to 32 MB, reducing the memory bandwidth required to read/write it.
  - It saves 32 MB of DRAM, which prevents the OS from having to swap memory pages to disk.
  correct_index: 2
