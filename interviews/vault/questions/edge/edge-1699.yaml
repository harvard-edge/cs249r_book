title: Operator Fusion Bottlenecks on Cloud AI 100
scenario: 'You are deploying a quantized vision transformer on a Qualcomm Cloud AI 100 accelerator for on-premise inference. During profiling, you observe that despite the theoretical peak of 400 TOPS for INT8 at 75W, the system is only achieving 60 TOPS. The compilation graph shows multiple unfused pointwise operations (activations, element-wise adds) following dense matrix multiplications.'
question: 'How do you analyze this compiler bottleneck and quantify the impact of operator lowering and fusion?'
details:
  realistic_solution: 'The compilation pipeline is failing to fuse pointwise operations, leading to memory-bandwidth starvation. The solution is to write custom lowering rules or use the platform''s native compiler passes to fuse MatMul + Add + Activation into a single kernel. This keeps intermediate activations in the accelerator''s local SRAM, maximizing utilization of the INT8 compute cores and drastically reducing power-hungry reads/writes to off-chip memory.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is strictly compute-bound.
    **The Rationale:** Candidates see low TOPS and suggest generic quantization without analyzing the graph compiler's lowering phase.
    **The Consequence:** They fail to recognize that unfused pointwise operations cause excessive trips to the LPDDR4x memory, stalling the compute engines.
  napkin_math: |
    * Intermediate tensor size = 16MB (INT8).
    * Unfused traffic: MatMul writes 16MB; Add reads 16MB, writes 16MB; Activation reads 16MB, writes 16MB. Total = 80MB per block.
    * Fused traffic: All computed in SRAM; only final 16MB result is written to memory.
    * Savings: Reduces memory I/O by 80% (64MB saved per block).
    * **Conclusion: For a model with 24 blocks, fusion saves ~1.5GB of memory traffic per inference, instantly unlocking the memory bottleneck.**
