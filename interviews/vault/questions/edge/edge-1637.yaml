title: Host Round-Trip Latency in Edge TPU Operator Fusion
scenario: You are optimizing a vision pipeline for a Google Coral Edge TPU (USB form factor), which provides 4 TOPS of INT8 compute at just 2W. Due to limited operator support, an unsupported intermediate activation forces a 4MB feature map to fall back to the host CPU, transferring over the USB connection (effective bandwidth of 400 MB/s). If you rewrite and fuse this activation with the surrounding layers into a single supported INT8 block that stays completely on the TPU, calculate the exact USB communication time saved per inference.
question: How much USB communication time per inference is saved by fusing the 4 MB fallback activation so it stays on the Edge TPU?
details:
  realistic_solution: The massive performance penalty in this scenario is the data transfer, not the compute. By quantizing properly to INT8 and fusing the operators to remain entirely on the Edge TPU, we completely avoid the host fallback. The latency saved is simply the time it takes to send the 4MB tensor from the TPU to the host CPU and back over the USB connection.
  common_mistake: |
    **The Pitfall:** Calculating the compute time saved using the 4 TOPS INT8 specification instead of the I/O transfer time.
    **The Rationale:** Candidates focus on the TPU's compute power and forget that a host fallback involves a full round-trip data transfer over a slow interface.
    **The Consequence:** They drastically underestimate the latency saved, missing the fact that the USB transfer time is the dominant cost, not the compute time.
  napkin_math: |
    * Intermediate tensor size = 4 MB.
    * Unfused round-trip data transfer = 4 MB (TPU to Host) + 4 MB (Host to TPU) = 8 MB total transfer.
    * Effective USB bandwidth = 400 MB/s.
    * Transfer time saved = 8 MB / 400 MB/s = 0.02 seconds = 20 ms.
    * **Fusing the operator saves 20 ms of USB communication time per inference.**
