title: The Activation Memory Diet
scenario: An 80x80x256 activation tensor is heavily memory-bound. You must compare FP16 vs INT8 footprints.
question: What are the FP16 and INT8 memory footprints for an 80x80x256 activation map, and what memory reduction does INT8 provide?
details:
  realistic_solution: Dropping from 16-bit to 8-bit precision halves the memory payload, scaling bus latency linearly. This directly relieves memory-bound layers on constrained edge buses.
  common_mistake: |
    **The Pitfall:** Confusing bit-width with byte-size (e.g., assuming FP16 takes 4 bytes).
    **The Rationale:** Engineers mix up FP32 with FP16 or fail to accurately track bytes versus bits.
    **The Consequence:** Providing drastically incorrect memory calculations, leading to poor hardware provisioning decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size = 80x80x256.
    - LPDDR5 bandwidth = 204.8 GB/s.

    **Calculations:**
    - Elements = 80 * 80 * 256 = 1,638,400.
    - FP16 = 1.638M * 2 bytes = 3.27 MB (3.12 MiB).
    - INT8 = 1.638M * 1 byte = 1.63 MB (1.56 MiB).

    **Conclusion & Interpretation:**
    - **Result: Exactly 2.0x memory reduction (Memory-Bandwidth-Bound (Alleviated))**. Halving the precision immediately halves the interconnect payload latency.
  options:
  - ~6.5 MiB (FP16) and ~1.6 MiB (INT8), a 4x reduction
  - ~1.6 MiB (FP16) and ~0.8 MiB (INT8), a 2x reduction
  - ~3.1 MiB (FP16) and ~1.6 MiB (INT8), a 2x reduction
  - ~3.1 MiB (FP16) and ~0.4 MiB (INT8), an 8x reduction
