title: 'The Activation Memory Diet: Quantization Fundamentals'
scenario: You're optimizing a perception model for an autonomous vehicle's edge computer. A key convolutional layer produces a feature map with dimensions 80x80x256 (Height x Width x Channels). To reduce memory bandwidth, a major bottleneck, you are tasked with comparing the standard FP16 representation to a quantized INT8 representation for this activation tensor.
question: What are the FP16 and INT8 memory footprints for an 80x80x256 activation map, and what memory reduction does INT8 provide?
details:
  realistic_solution: 'FP16: 80 x 80 x 256 x 2 bytes = 3.13 MB. INT8: 80 x 80 x 256 x 1 byte = 1.56 MB (plus negligible metadata). This is exactly a 2x reduction. On an Orin''s 204.8 GB/s LPDDR5 bus, reading this tensor takes 15.3 us in FP16 vs 7.6 us in INT8, translating directly to latency improvements for memory-bound layers.'
  common_mistake: |
    **The Pitfall:** Confusing bit-width with byte-size (e.g., assuming FP16 takes 4 bytes).
    **The Rationale:** Engineers mix up FP32 with FP16 or fail to accurately track bytes versus bits.
    **The Consequence:** Providing drastically incorrect memory calculations, leading to poor hardware provisioning decisions.
  napkin_math: |
    - **Elements:** 80 × 80 × 256 = 1,638,400 elements.
    - **FP16 Memory:** 1,638,400 × 2 bytes = 3,276,800 bytes (3.13 MB).
    - **INT8 Memory:** 1,638,400 × 1 byte = 1,638,400 bytes (1.56 MB).
    - **Memory Reduction:** 3.13 MB / 1.56 MB = 2.0× reduction (1.56 MB saved per map).
    - **Bandwidth Impact:** At 204.8 GB/s LPDDR5 bandwidth, FP16 takes 15.3 µs to read, INT8 takes 7.6 µs.
    - **Final Result:** **INT8 provides exactly a 2.0× reduction in activation memory footprint and bus latency compared to FP16.**
  options:
  - ~6.5 MB (FP16) and ~1.6 MB (INT8), a 4x reduction
  - ~1.6 MB (FP16) and ~0.8 MB (INT8), a 2x reduction
  - ~3.3 MB (FP16) and ~1.6 MB (INT8), a 2x reduction
  - ~3.3 MB (FP16) and ~0.4 MB (INT8), an 8x reduction
