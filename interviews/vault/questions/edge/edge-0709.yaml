title: 'Thermal Throttling on Edge'
scenario: 'You deploy an object detection model to an edge camera. It runs at 30 FPS for the first minute, but then drops to 12 FPS permanently.'
question: 'What physical constraint is most likely causing this sudden and permanent drop in performance?'
details:
  realistic_solution: 'Thermal Throttling. Edge devices often lack active cooling (fans). Running intensive matrix math heats up the silicon quickly. To prevent physical damage, the OS automatically drops the clock frequency of the processor, drastically reducing FPS.'
  common_mistake: |
    **The Pitfall:** Blaming a memory leak or a garbage collection pause.
    **The Rationale:** Software engineers default to software explanations for performance degradation, ignoring the thermal realities of passively cooled edge devices.
    **The Consequence:** Wasting time debugging code or profiling memory when the true limit is the physical thermal dissipation of the enclosure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge SoC TDP is 25W.
    - Passively cooled enclosure dissipates ~15W.
    - Junction temp hits 100°C throttle point after ~60s.

    **Calculations:**
    - Clock drops from 1.1 GHz to ~450 MHz (41% of peak).
    - Sustained throughput: 30 FPS * 0.41 = ~12.3 FPS.

    **Conclusion & Interpretation:**
    - **Result: ~12.3 FPS (Thermal-Bound)**. The device physically overheats and protects its silicon via aggressive clock downclocking.
  options:
  - 'The model''s weights have drifted due to prolonged inference.'
  - 'The OS garbage collector is pausing the inference thread.'
  - 'The device overheated, causing the OS to drop the clock frequency (thermal throttling).'
  - 'The L1 cache has become permanently fragmented.'
