title: Thermal Throttling on Edge
scenario: You deploy an object detection model to an edge camera. It runs at 30 FPS for the first minute,
  but then drops to 12 FPS permanently. What physical constraint is most likely causing this?
question: "What physical constraint is most likely causing this?"
details:
  realistic_solution: Thermal Throttling. Edge devices often lack active cooling (fans). Running intensive
    matrix math heats up the silicon quickly. To prevent physical damage, the OS automatically drops the
    clock frequency of the processor, drastically reducing FPS.
  common_mistake: Blaming a memory leak or a garbage collection pause.
  napkin_math: '- Orin NX TDP: 25W. Passively cooled enclosure dissipates ~15W. After ~60s, junction temp
    hits 100°C throttle point. | - Clock drops from 1.1 GHz to ~450 MHz (41% of peak). Throughput: 30
    FPS × 0.41 = ~12.3 FPS. | - => Sustained performance = thermal dissipation / power-per-frame, not
    peak silicon speed.'
  options:
  - The model's weights have drifted due to prolonged inference.
  - The OS garbage collector is pausing the inference thread.
  - The device overheated, causing the OS to drop the clock frequency (thermal throttling).
  - The L1 cache has become permanently fragmented.
  correct_index: 2
