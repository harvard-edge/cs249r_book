title: OTA Update Time for Edge Fleet
scenario: You manage a fleet of 500 edge AI cameras deployed across a city. Each device has a 4G LTE connection averaging 5 Mbps download and 32 GB eMMC storage with A/B partitioning. You need to push a model update consisting of a new TensorRT engine file (45 MB) plus a firmware delta update (12 MB).
question: What is the total fleet update time for the 57 MB update across 500 LTE cameras, and what is the bottleneck?
details:
  realistic_solution: 'The bottleneck is not the download or flash — it''s the staged rollout monitoring windows. Per-device: 91s download (57MB at 5 Mbps) + 3.8s flash + 17s verify/reboot + 3.3s health check = 115s. But fleet rollout uses staged waves: canary (25 devices, 2 min) + 1h monitoring + wave 2 (125 devices, 2 min) + 2h monitoring + wave 3 (350 devices, 2 min) = 3h 6min total. The actual data transfer (115s per device, parallelized) is trivial. The dominant cost is the mandatory observation windows between waves to detect regressions before wider deployment. CDN cost is negligible at $2.42 per fleet update.'
  common_mistake: |
    **The Pitfall:** Assuming network download speed across the fleet in parallel dictates the total update time.
    **The Rationale:** Developers accustomed to fast cloud networks simply calculate `Total File Size / Bandwidth` and assume the update finishes in minutes.
    **The Consequence:** Planners wildly underestimate fleet maintenance windows, ignoring the mandatory staging and observation periods required to ensure a bad update doesn't simultaneously brick 500 remote cameras.
  napkin_math: |
    1. **Device Level:** Download takes 91s (57 MB at 5 Mbps). Flash takes 3.8s. Verify + reboot takes 17s. Total per-device execution is ~115 seconds.
    2. **Staged Rollout Plan:** Canary (25 devices, 2 min) + 1h observation + wave 2 (125 devices, 2 min) + 2h observation + wave 3 (350 devices, 2 min).
    3. **Result:** While the actual data transfer takes less than 2 minutes, the dominant bottleneck is the mandatory observation windows, making the true fleet update time **3 hours and 6 minutes**.
