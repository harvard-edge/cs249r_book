title: Diagnose Dataflow Mismatch Between Hailo-8 and Attention Pattern
scenario: A vision transformer (ViT-S/16) on an AI processor achieves 95 FPS for image classification but drops to 12 FPS when attention is implemented as an explicit QK^T matrix multiply. The attention mechanism consumes 79% of inference time despite being only 23% of total FLOPs. A junior engineer estimates attention should take 25ms based on FLOPs.
question: What is the correct theoretical latency for 4.9M MACs on a 13 TOPS DLA, and why is the 25ms estimate completely wrong?
details:
  realistic_solution: 'The 4.9M MACs correspond to roughly 0.75μs latency on a 13 TOPS DLA. A 25ms estimate wildly misinterprets NPU utilization. The underlying bottleneck is a spatial dataflow mismatch: edge DLAs aggressively optimize for weight-stationary 2D convolutions via systolic arrays, not the output-stationary dynamic memory patterns generated by un-fused QK^T matrix multiplication. This mismatch causes severe memory starvation.'
  common_mistake: |
    **The Pitfall:** Assuming the FLOPs-to-latency ratio is constant across all operation types.
    **The Rationale:** Engineers fail to realize that dataflow engines are heavily optimized for spatial weight-stationary convolutions, not dynamic output-stationary patterns.
    **The Consequence:** Severe underutilization of the NPU and massive latency spikes when executing transformer architectures on legacy CNN hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attention MACs: 4.9 million = 9.8 million INT8 ops.
    - Compute capacity (DLA): 13 TOPS (13 * 10^12 ops/sec).

    **Calculations:**
    - Theoretical latency: 9.8e6 / 13e12 = 0.75 μs.
    - A 25ms latency implies operating at 0.39 GOPS.

    **Conclusion & Interpretation:**
    - **Result: 0.75 μs theoretical latency (Compute-Starved)**. Dataflow mismatch causes severe NPU starvation.
