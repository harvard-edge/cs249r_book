title: Diagnose Dataflow Mismatch Between Hailo-8 and Attention Pattern
scenario: A vision transformer (ViT-S/16) on Hailo-8 achieves 95 FPS for image classification but drops to 12 FPS when attention is implemented as an explicit QK^T matrix multiply. The attention mechanism consumes 79% of inference time despite being only 23% of total FLOPs. A junior engineer estimates attention should take 25ms based on FLOPs.
question: What is the correct theoretical latency for 4.9M MACs on a 13 TOPS DLA, and why is the 25ms estimate completely wrong?
details:
  realistic_solution: '4.9M MACs on a 13 TOPS DLA takes 0.75μs (not 25ms). The 25ms estimate implies GOPS-level hardware, not TOPS. The real issue is the dataflow architecture: Hailo-8 is optimized for weight-stationary convolution patterns, whereas dynamic attention demands an output-stationary QK^T matrix multiply. This mismatch completely breaks the NPU utilization.'
  common_mistake: |
    **The Pitfall:** Assuming the FLOPs-to-latency ratio is constant across all operation types.
    **The Rationale:** Engineers fail to realize that dataflow engines are heavily optimized for spatial weight-stationary convolutions, not dynamic output-stationary patterns.
    **The Consequence:** Severe underutilization of the NPU and massive latency spikes when executing transformer architectures on legacy CNN hardware.
  napkin_math: |
    - Attention MACs: 4.9 million = 9.8 million INT8 ops.
    - Compute capacity (DLA): 13 TOPS (13 * 10^12 ops/sec).
    - Theoretical latency: 9.8 * 10^6 / (13 * 10^12) = 7.5 * 10^-7 seconds = **0.75 μs**.
    - Reality check: A 25ms latency implies the hardware is operating at a mere 0.39 GOPS, indicating massive starvation, not compute saturation.
