title: Row vs Columnar Storage Latency and Throughput Tradeoffs
scenario: An on-premise inference pipeline processes 100-feature sensor data records. After migrating the local storage format from uncompressed CSV to Snappy-compressed Parquet, the team observes that end-to-end latency increased by 15% for streaming requests (batch size 1), but overall throughput increased by 300% for large batched requests (batch size 4096) that only require 10 specific features.
question: Why does compressed Parquet hurt batch-1 latency but boost batch-4096 throughput, and what is the memory read reduction per batch?
details:
  realistic_solution: The latency increase for streaming requests happens because Parquet's columnar nature requires seeking across different column chunks and decompressing blocks just to assemble a single row, creating CPU and memory access overhead that outweighs the I/O savings. Conversely, for large batches needing only 10 features, Parquet allows projection pushdown. The system only reads the specific column chunks needed from disk into RAM, drastically reducing memory bandwidth utilization and preventing the accelerator from becoming I/O bound.
  common_mistake: |
    **The Pitfall:** Assuming compressed columnar formats are universally faster.
    **The Rationale:** Candidates fail to account for the CPU decompression overhead and row-reconstruction cost for single records.
    **The Consequence:** Using Parquet for streaming workloads increases latency and hurts real-time performance.
  napkin_math: |
    - Feature size: 4-byte float. 100 features = 400 bytes/record.
    - Batch of 4096 in CSV (row-based): 4096 * 400 bytes = 1,638,400 bytes.
    - Batch of 4096 in Parquet (10 features read): 4096 * (10 * 4 bytes) = 163,840 bytes.
    - Memory read reduction: 1,638,400 - 163,840 = **1,474,560 bytes** (90% reduction).
