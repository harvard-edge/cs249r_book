title: Chiplet Thermal Envelope for Edge AI SoC
scenario: An edge AI appliance uses a chiplet SoC with 2 compute dies and 1 HBM2E stack, rated at 60W TDP. Sustained inference load causes the core temperature to reach 95°C, triggering thermal throttling to 70% frequency. The target ambient temperature is 55°C.
question: What thermal solution would keep the 60W chiplet SoC from throttling at 55°C ambient?
details:
  realistic_solution: |
    The junction temperature equation is T_junction = T_ambient + Power * R_total. For a chiplet package, the effective spreading resistance across the multi-die package is high. Replacing the polymer TIM with a phase-change indium TIM and adding a copper vapor chamber spreader will drastically reduce the thermal resistance from the die to the heatsink, lowering the junction temperature without relying solely on ambient airflow.
  common_mistake: |
    **The Pitfall:** Increasing fan speed as the primary thermal fix.
    **The Rationale:** Candidates assume ambient airflow is the limiting factor, forgetting that in multi-die packages, the interface stack (die-interposer-package-TIM) accounts for 50-60% of the total thermal resistance.
    **The Consequence:** Adding louder, more power-hungry fans without significantly reducing the junction temperature.
  napkin_math: |
    * **Target Reduction:** 95°C -> 85°C (-10°C).
    * **Required Resistance Reduction:** 10°C / 60W = 0.167°C/W.
    * **TIM Swap:** Replace polymer TIM (0.1°C/W) with indium TIM (0.03°C/W) -> saves 0.07°C/W * 60W = 4.2°C.
    * **Spreader Addition:** Add vapor chamber spreader -> reduces spreading resistance from 0.15 to 0.05°C/W -> saves 0.10°C/W * 60W = 6.0°C.
    * **Result:** Combined reduction of **10.2°C**, achieving the target temperature without throttling.
