title: Chiplet Thermal Envelope for Edge AI SoC
scenario: An edge AI appliance uses a chiplet SoC with 2 compute dies and 1 HBM2E
  stack, rated at 60W TDP. Sustained inference load causes core temperature to reach
  95°C, triggering thermal throttling to 70% frequency. The target ambient is 55°C.
  Design a thermal solution.
question: What thermal solution would keep the 60W chiplet SoC from throttling at
  55°C ambient?
details:
  realistic_solution: 'Thermal resistance path: junction → interposer → package lid
    → TIM → heatsink. For a chiplet package: R_interposer = 0.05°C/W (silicon interposer),
    R_TIM1 = 0.1°C/W (indium TIM under lid), R_heatsink = 0.3°C/W at current airflow.
    At 60W: T_junction = T_ambient + 60W * (0.05 + 0.1 + 0.3) = 55 + 27 = 82°C — should
    be fine. But with thermal spreading resistance across multi-die package, effective
    R can be 1.5x: 55 + 60*0.6*1.5 = 55 + 54 = 109°C explains measured 95°C (load
    might be 52W not 60W). Fixes: switch to phase-change TIM (0.05°C/W vs 0.1°C/W),
    add copper vapor chamber spreader, reduce steady-state power with dynamic voltage-frequency
    scaling during sustained load.'
  common_mistake: Increasing fan speed as the primary thermal fix. Additional airflow
    helps the heatsink but does not address the thermal resistance between the chiplet
    dies and the heatsink — specifically the die-interposer-package-TIM interface
    stack, which often accounts for 50-60% of the total thermal resistance in multi-die
    packages.
  napkin_math: 'Target: 95°C → 85°C (-10°C). Needed reduction: 10°C at 60W = 0.167°C/W
    less resistance. Replacing polymer TIM (0.1°C/W) with indium TIM (0.03°C/W): saves
    0.07°C/W * 60W = 4.2°C. Adding vapor chamber spreader: reduces spreading resistance
    from 0.15 to 0.05°C/W → saves 6°C. Combined: -10.2°C → target achieved.'
