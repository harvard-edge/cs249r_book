title: Progressive Rollout Strategy for Edge ML on Qualcomm Cloud AI 100
scenario: You are responsible for deploying a critical, newly optimized machine learning model for a real-time edge inference application. Your goal is to introduce this new model into production using a progressive rollout strategy, ensuring minimal disruption and the ability to thoroughly evaluate its performance in the field against the existing model.
question: How would you roll out the new model progressively with traffic splitting, monitoring, and rollback, given edge fleet constraints?
details:
  realistic_solution: 'A realistic solution involves a canary deployment approach. Start by deploying the new model to a small, isolated subset (e.g., 5-10%) of the edge devices. Implement comprehensive telemetry for key metrics such as memory utilization, INT8 TOPS utilization, and actual power consumption on both the canary and baseline groups. Crucially, establish automated thresholds for these metrics that trigger an immediate rollback to the previous stable model if breached. If successful, gradually expand the rollout to larger segments (e.g., 25%, 50%, 100%).'
  common_mistake: |
    **The Pitfall:** Deploying the new model to a large percentage of edge devices simultaneously without real-world validation.
    **The Rationale:** Applying cloud networking intuition to edge fleets, assuming infinite bandwidth and zero-cost rollbacks.
    **The Consequence:** Widespread service degradation, excessive power consumption, and field remediation delays across distributed hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 50,000 devices.
       - Canary rollout: 5%.
       - Unexpected power spike: +10W per device.
    2. **Calculations:**
       - Canary size: 50,000 * 0.05 = 2,500 devices.
       - Additional power draw: 2,500 devices * 10W = 25,000 W = 25 kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Risk**. The canary group alone introduces an extra 25 kW load, validating the mandatory need for staged rollouts to measure fleet-level thermal and power impacts before a full deployment.
