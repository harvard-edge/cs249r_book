title: Distillation vs Pruning on Cloud AI 100
scenario: 'You are deploying a large language model for an on-premise enterprise application using a Qualcomm
  Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The original FP16 model is 70B parameters
  (140GB), which far exceeds the 32GB memory limit. You must choose between two compression strategies
  to deploy on this hardware: 1) 80% unstructured pruning followed by INT8 quantization, or 2) Knowledge
  distillation to train a dense 15B parameter student model, followed by INT8 quantization. Evaluate these
  alternatives and determine which is better suited for this specific hardware architecture.'
details:
  realistic_solution: Knowledge distillation to a dense 15B student model is the superior choice. The
    Qualcomm Cloud AI 100 is designed to deliver massive dense INT8 compute (400 TOPS). A dense 15B model
    executing in INT8 leverages highly optimized, contiguous matrix multiplication operations, whereas
    unstructured sparse models suffer from poor cache locality and irregular memory access patterns. The
    dense student fits perfectly in memory, maximizes the compute engines, and leaves ample room for the
    KV cache.
  common_mistake: Candidates often choose unstructured pruning because it preserves the original architecture's
    theoretical capacity. They fail to recognize that unstructured sparsity provides minimal latency improvements
    on dense matrix accelerators like the Cloud AI 100 without highly specialized sparse kernels, ultimately
    resulting in memory bandwidth bottlenecks rather than compute efficiency.
  napkin_math: A dense 15B parameter student model quantized to INT8 requires exactly 15 GB of memory
    (15B parameters * 1 byte/parameter). This fits comfortably within the 32 GB LPDDR4x capacity, leaving
    17 GB for activations, OS, and KV cache. Generating 1 token requires roughly 30 Giga-operations (2
    * 15B). With 400 TOPS (400,000 GOPS) peak INT8 compute, the compute time per token is negligible (~0.075
    ms), meaning inference will be purely bounded by the LPDDR4x memory bandwidth. In contrast, an 80%
    unstructured pruned 70B model in INT8 requires 14 GB for weights (70B * 0.2 * 1 byte) plus significant
    memory overhead for sparsity indices, causing irregular memory fetches that will severely degrade
    effective bandwidth utilization and underutilize the 75W power budget.
