title: Orin Memory Hierarchy Bandwidth Comparison
scenario: A Jetson AGX Orin is deploying an LLM, heavily relying on its unified LPDDR5
  memory subsystem to fetch weights.
question: State the theoretical maximum memory bandwidth of the AGX Orin's LPDDR5
  and compare its order of magnitude to standard L1 cache bandwidth.
visual:
  kind: svg
  path: edge-2355.svg
  alt: Bar chart comparing L1 Cache, L2 Cache, and LPDDR5 bandwidths.
  caption: AGX Orin typical memory tier bandwidth comparison.
details:
  realistic_solution: The Jetson AGX Orin provides approximately 204.8 GB/s of bandwidth
    from its LPDDR5 memory. In contrast, on-chip L1 cache bandwidths typically reach
    multi-TB/s. This strict bandwidth hierarchy dictates that data must be heavily
    reused from SRAM/L1 to avoid being bottlenecked by the LPDDR5.
  common_mistake: Confusing the 204.8 GB/s unified memory bandwidth with higher-end
    discrete GPU HBM bandwidths (TB/s).
  napkin_math: L1 (TB/s) > LPDDR5 (200 GB/s) -> L1 is ~10x faster.
