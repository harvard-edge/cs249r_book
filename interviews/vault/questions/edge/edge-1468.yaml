title: Architecting Real-time Translation on Hailo-8
scenario: Your team is deploying a real-time speech-to-text translation system on an edge device equipped with a dataflow accelerator. The accelerator provides 26 TOPS INT8 at just 2.5W but has no local DRAM, meaning all weights and activations must stream from host memory.
question: Which speech-to-text architecture would you choose for this device, and how would you handle decoding under its streaming constraints?
details:
  realistic_solution: A strong candidate will propose an Encoder-only architecture (e.g., CTC or non-autoregressive) to allow continuous, single-pass streaming execution, maximizing the dataflow architecture. If an auto-regressive decoder is strictly required, they will execute the heavy encoder on the accelerator to leverage the 26 TOPS, while offloading the lightweight decoder to the host CPU to avoid streaming the entire decoder's weights across the bus for every single generated token.
  common_mistake: |
    **The Pitfall:** Defaulting to an Encoder-Decoder model like Whisper.
    **The Rationale:** Candidates ignore the severe memory bandwidth penalty of auto-regressive decoding when weights must be streamed from the host for every token.
    **The Consequence:** Unusable performance, as dataflow accelerators excel at deterministic pipeline execution rather than dynamic, iterative generation loops over heavily constrained buses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 26 TOPS, streaming weights from host memory at 2 GB/s.
       - Decoder parameters: 100M INT8 parameters (100MB).
    2. **Calculations:**
       - Autoregressive Penalty: Generating 20 tokens requires streaming weights 20 times.
       - Memory transfer: 100MB * 20 = 2GB.
       - I/O Time: 2GB / 2 GB/s = 1.0 second just for weight transfer.
       - Encoder Compute Time: 10 GOPS / 26000 GOPS = ~0.38ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. The decoder's autoregressive I/O bandwidth requirement completely eclipses the compute capability. An Encoder-only model streams its weights exactly once, solving the bottleneck.
