title: Architecting Real-time Translation on Hailo-8
scenario: Your team is deploying a real-time speech-to-text translation system on an edge device equipped with a Hailo-8 accelerator. The Hailo-8 provides 26 TOPS INT8 at just 2.5W but has no local DRAM, meaning all weights and activations must stream from host memory.
question: Which speech-to-text architecture would you choose for Hailo-8, and how would you handle decoding under its streaming constraints?
details:
  realistic_solution: A strong L5 candidate will propose an Encoder-only architecture (e.g., CTC or non-autoregressive) to allow continuous, single-pass streaming execution, maximizing the dataflow architecture. If an auto-regressive decoder is strictly required, they will propose executing the heavy encoder on the Hailo-8 to leverage the 26 TOPS, while offloading the lightweight decoder to the host CPU to avoid streaming the entire decoder's weights across the bus for every single generated token.
  common_mistake: |
    **The Pitfall:** Defaulting to an Encoder-Decoder model like Whisper.
    **The Rationale:** Candidates ignore the severe memory bandwidth penalty of auto-regressive decoding when weights must be streamed from the host for every token.
    **The Consequence:** Unusable performance, as dataflow accelerators like Hailo-8 excel at deterministic pipeline execution rather than dynamic, iterative generation loops.
  napkin_math: |
    1. **Decoder Transfer Cost:** Assume a 100M parameter auto-regressive decoder in INT8 (100MB).
    2. **Autoregressive Penalty:** Generating 20 tokens requires streaming weights 20 times. Total memory transfer = 100MB * 20 = 2GB.
    3. **I/O Bottleneck:** Even with a fast 2GB/s host connection, this takes 1 second just for weight transfer.
    4. **Encoder Efficiency:** An Encoder-only model streams its weights exactly once.
    5. **Compute Comparison:** With 26 TOPS available, the compute time for a 10 GOP encoder pass is 10 / 26000 = **~0.38ms**, proving the decoder's I/O bandwidth is the absolute bottleneck.
