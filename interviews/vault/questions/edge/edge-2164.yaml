title: Watchdog Timeout on Edge Safety Coprocessor
scenario: An edge safety system uses a Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for object detection, sending bounding boxes to an ASIL-D certified Cortex-M7 (480 MHz, 512 KB SRAM, FPU, ~300 MFLOPS) over a 10 MB/s SPI bus. The Cortex-M7 runs a deterministic loop with a 30 ms hardware watchdog timer. Each detected object is encoded as a 16-byte payload. During a cluttered scene, the Orin outputs 25,000 objects, causing the Cortex-M7 to repeatedly reset.
question: Why does the Cortex-M7 safety coprocessor reset when the Orin sends 25,000 object detections over 10 MB/s SPI?
details:
  realistic_solution: The failure is caused by the synchronous I/O transmission time over the SPI bus exceeding the watchdog timeout. A blocking SPI transfer of this payload takes 40 ms, which starves the main control loop from 'petting' the 30 ms watchdog. The system must use DMA to handle the SPI transfer asynchronously.
  common_mistake: |
    **The Pitfall:** Assuming the 512 KB SRAM has overflowed.
    **The Rationale:** Failing to calculate the actual payload size vs memory, and ignoring the I/O transmission delay over SPI.
    **The Consequence:** Misdiagnosing a synchronous blocking I/O issue as a memory leak or compute bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload size: 16 bytes/object. 25,000 objects.
    - SRAM: 512 KB.
    - SPI speed: 10 MB/s. Watchdog timeout: 30 ms.

    **Calculations:**
    - Total payload = 25,000 * 16 = 400,000 bytes.
    - Memory check = 400,000 bytes < 524,288 bytes (512 KB), fits.
    - Transfer time = 400,000 bytes / 10,000,000 bytes/s = 0.04 seconds = 40 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 ms (I/O-Bound)**. The transfer time of 40 ms exceeds the 30 ms watchdog timeout, resulting in a system reset.
