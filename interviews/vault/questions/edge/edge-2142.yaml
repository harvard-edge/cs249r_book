title: TensorRT INT8 Calibration and Latency Optimization on Jetson Orin
scenario: 'You convert a YOLO v8-l model (43M params, 165 GFLOPs/img) from FP32 to
  INT8 using TensorRT on Jetson Orin. FP32 latency: 45ms. INT8 latency: 18ms. But
  the model loses 2.1% mAP without proper calibration. Describe the calibration process
  and estimate the latency-accuracy trade-off at INT8 with entropy calibration.'
question: How should you calibrate YOLOv8-l for INT8 on Orin, and what latency-accuracy
  trade-off should entropy calibration achieve?
details:
  realistic_solution: 'Min-max calibration: range set by absolute min/max — sensitive
    to activation outliers, causing accuracy degradation. Entropy calibration: find
    scale that minimizes KL divergence between FP32 and INT8 activation distributions
    using 500-1000 representative images. Expected accuracy recovery: 2.1% loss →
    ~0.8% with entropy calibration. TensorRT INT8 with entropy: 18ms latency (unchanged
    by calibration method). The 2.5× speedup (45ms→18ms) from INT8 is real: Jetson
    Orin INT8 Tensor Cores at 275 TOPS vs FP32 at ~3.67 TFLOPS on CUDA cores. With calibration
    dataset: run 500 images through FP32 model, collect activation histograms, TensorRT
    minimizes KL divergence per tensor to find optimal INT8 scales.'
  common_mistake: Using naive min-max calibration which is sensitive to outliers;
    entropy calibration (KL divergence minimization) or percentile calibration typically
    recovers 50-70% of the accuracy loss.
  napkin_math: 'FP32: 45ms (~3.67 TFLOPS effective). INT8: 18ms (2.5× speedup from 275
    TOPS INT8 peak). Entropy calibration: 0.5-1% residual accuracy loss vs 2.1% min-max.
    Run 500 calibration images × ~45ms = 22.5 seconds calibration time — one-time
    cost.'
