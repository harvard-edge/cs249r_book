title: The Edge Quantization Footprint
scenario: You're optimizing a LiDAR perception model for an autonomous vehicle's main compute unit, which is based on a Jetson AGX Orin. The model has 50 million parameters and is currently stored in FP16 precision. To reduce its memory footprint, you plan to quantize the weights to INT8.
question: What is the on-disk size reduction when quantizing the 50M-parameter FP16 LiDAR model to INT8?
details:
  realistic_solution: The memory footprint is determined by the number of parameters multiplied by the size of the data type used to store each parameter. Moving from FP16 to INT8 halves the memory requirement for the model weights.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes, or miscalculating the size reduction by stating the final size instead of the difference.
    **The Rationale:** Candidates often perform the basic math but misinterpret what the question is asking (difference vs final size).
    **The Consequence:** They answer 50MB (the final size) instead of the 50MB reduction, or miss by a factor of 8 by forgetting unit conversions.
  napkin_math: |
    * Original FP16 size = 50M params × 2 bytes/param = 100 MB.
    * Quantized INT8 size = 50M params × 1 byte/param = 50 MB.
    * Memory Reduction = 100 MB - 50 MB = 50 MB.
    * **Quantizing to INT8 halves the model size, resulting in a 50 MB reduction.**
  options:
  - The size is reduced by 100 MB.
  - The size is reduced by 400 MB.
  - The size is reduced by 50 MB.
  - There is no change in memory size, only compute speed.
  correct_index: 2
