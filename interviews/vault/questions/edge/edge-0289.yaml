title: The Edge Quantization Footprint
scenario: You're optimizing a LiDAR perception model for an autonomous vehicle's main compute unit, which
  is based on a Jetson AGX Orin. The model has 50 million parameters and is currently stored in FP16 precision.
  To reduce its memory footprint, you plan to quantize the weights to INT8. Explain and calculate the
  expected reduction in the model's on-disk memory size.
details:
  realistic_solution: The memory footprint is determined by the number of parameters multiplied by the
    size of the data type used to store each parameter. Moving from FP16 to INT8 halves the memory requirement
    for the model weights.
  common_mistake: Engineers often confuse bits and bytes, or miscalculate the size reduction. A common
    error is to state the original or final size instead of the *difference*, or to be off by a factor
    of 8 by forgetting to convert from bits to bytes.
  napkin_math: "1. Calculate original FP16 size:\n   - 50M params × 2 bytes/param (FP16) = 100,000,000\
    \ bytes = 100 MB\n2. Calculate INT8 size:\n   - 50M params × 1 byte/param (INT8) = 50,000,000 bytes\
    \ = 50 MB\n3. Memory Reduction:\n   - Absolute savings: 100 MB − 50 MB = 50 MB\n   - Relative reduction:\
    \ 50 MB / 100 MB = 50% reduction\n   - Compression ratio: 2×\n\nMoving from FP16 (2 bytes per parameter)\
    \ to INT8 (1 byte per parameter) halves the model's on-disk memory footprint from 100 MB to 50 MB.\
    \ This 50 MB saving is significant on an edge device like the Jetson AGX Orin, where DRAM is shared\
    \ between the CPU, GPU, and DLA, and every megabyte counts toward meeting the system's memory budget."
  options:
  - The size is reduced by 100 MB.
  - The size is reduced by 400 MB.
  - The size is reduced by 50 MB.
  - There is no change in memory size, only compute speed.
  correct_index: 2
