title: 'The Depthwise Separable Dividend: Real-Time Deadlines'
scenario: You're optimizing a CNN for a car's forward-facing camera, running on an automotive-grade processor
  like a Jetson AGX Orin. To meet the 33ms hard real-time deadline for pedestrian detection, you consider
  replacing a standard 3x3 convolutional layer with a 3x3 depthwise separable convolution. What is the
  primary benefit of this change, and what is the approximate reduction in computational cost (FLOPs)
  you should expect?
details:
  realistic_solution: The primary advantage is a significant reduction in computational cost (FLOPs).
    A standard 3x3 convolution has a computational cost proportional to `K^2 * C_in * C_out`. A 3x3 depthwise
    separable convolution splits this into a depthwise part (`K^2 * C_in`) and a pointwise part (`C_in
    * C_out`). For a 3x3 kernel (K=3), the reduction factor approaches 9x as the number of channels grows.
  common_mistake: Engineers often recall that depthwise separable convolutions are 'efficient' but can't
    quantify the savings or misattribute the benefit. A common error is to confuse the computational savings
    with memory savings from quantization, or to underestimate the reduction, thinking it's a minor factor
    like 2x.
  napkin_math: 'Let''s analyze the ratio of FLOPs:'
  options:
  - A ~2x reduction in FLOPs, by reducing the number of parameters.
  - A ~9x reduction in FLOPs, by factorizing the convolution into depthwise and pointwise steps.
  - A ~16x reduction in FLOPs, because it enables FP16 precision.
  - No change in FLOPs, but it reduces memory access by ~9x.
  correct_index: 1
