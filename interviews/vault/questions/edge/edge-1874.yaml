title: 'Edge Inference Data Movement: Coral vs. CPU/GPU'
scenario: A company is developing a real-time object detection system for an industrial edge application. They are evaluating two embedded system architectures for deploying an INT8 quantized model. Architecture A is an ARM Cortex-A based SoC with an integrated GPU. Architecture B is a system utilizing a USB/PCIe attached Edge TPU paired with a host ARM CPU. The application continuously processes 1080p video streams at 30fps.
question: How do the integrated-GPU SoC and attached Edge TPU differ in DMA, zero-copy, and host-device data movement for high-resolution video inference?
details:
  realistic_solution: A strong answer will detail how Architecture A might leverage shared virtual memory or dedicated GPU DMA engines, often within a unified memory architecture, to minimize copies. For Architecture B, it's crucial to discuss the explicit DMA operations managed by the host CPU, the need for pinned memory to optimize USB/PCIe transfers to the Coral, and strategic buffering. Candidates should emphasize the importance of asynchronous transfers and double buffering to hide latency, and the trade-offs between zero-copy (which might require specific hardware/driver support) and optimized copy operations. Power considerations related to data movement (e.g., number of transactions, active time of I/O controllers) should also be addressed.
  common_mistake: |
    **The Pitfall:** Assuming the attached TPU operates autonomously without host CPU intervention.
    **The Rationale:** Focusing solely on the accelerator's compute TOPS while ignoring the data orchestration responsibilities of the host.
    **The Consequence:** Severe latency bottlenecks as the host CPU chokes on continuous memory copies and I/O scheduling, starving the accelerator of data.
  napkin_math: |
    * **Data Rate**: 1080p at 30 fps, 3 bytes/pixel = 1920 × 1080 × 3 × 30 = 178 MB/s.
    * **Architecture A (Integrated)**: Can utilize shared Unified Memory, achieving effectively **0 MB/s** overhead via zero-copy pointers.
    * **Architecture B (Attached)**: Requires explicit host-to-device transfers. Over USB 3.0 (~400 MB/s effective), this consumes ~45% of the bus bandwidth.
    * **Conclusion**: Architecture B introduces substantial I/O latency and requires explicit double-buffering to hide transfer costs.
