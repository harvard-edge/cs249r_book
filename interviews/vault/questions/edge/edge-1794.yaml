title: Shadow Deployment Design on Qualcomm Cloud AI 100
scenario: You are deploying an upgraded defect detection model to a manufacturing floor equipped with a single Qualcomm Cloud AI 100 on-premise inference accelerator. The current model is stable, but the new version promises higher recall, and must be validated on live 60 FPS video streams without disrupting the primary pipeline.
question: How would you shadow the new model on live 60 FPS streams while preserving primary latency and fitting within 32 GB and 400 TOPS?
details:
  realistic_solution: Design a shadow deployment where the primary model processes the 60 FPS stream synchronously, while frames are asynchronously duplicated to a lower-priority queue for the canary model. The Qualcomm Cloud AI 100 execution engine must be configured to prioritize the primary model to guarantee latency, while the canary model processes frames opportunistically to evaluate accuracy without impacting the 75W power envelope or the main pipeline.
  common_mistake: |
    **The Pitfall:** Proposing cloud-based API traffic splitting.
    **The Rationale:** Candidates use web-dev deployment patterns (like 5% canary routing) which don't apply to a single on-premise accelerator ingesting a continuous physical camera stream.
    **The Consequence:** The design is impossible to implement physically, and candidates fail to verify if running two models simultaneously fits within edge memory constraints.
  napkin_math: |
    *   Assume the current INT8 model requires 2 GB memory and 12 TOPS to maintain 60 FPS.
    *   Assume the new model requires 2.5 GB and 15 TOPS.
    *   Shadow deployment running both concurrently consumes: 2 GB + 2.5 GB = 4.5 GB of the 32 GB LPDDR4x memory.
    *   Compute consumed: 12 TOPS + 15 TOPS = 27 TOPS of the 400 TOPS INT8 capacity.
    *   **This easily fits within the hardware limits, leaving 27.5 GB and 373 TOPS for frame buffering and OS overhead.**
