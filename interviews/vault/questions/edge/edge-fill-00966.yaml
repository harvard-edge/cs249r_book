title: Optimizing Multi-branch Vision Model Inference on Google Coral Edge TPU
scenario: You are tasked with deploying a real-time object detection model, which has a multi-branch architecture
  (similar to a slimmed-down Inception or MobileNet variant with custom heads), onto a Google Coral Edge
  TPU. The Coral features 4 TOPS INT8 performance and operates within a 2W power budget, processing exclusively
  in INT8. Your initial profiling shows that the model is bottlenecked by latency, and peak memory usage
  is close to the device's limits. Describe how you would approach optimizing the execution order of operators,
  exploring opportunities for memory reuse, identifying and scheduling parallel operator execution paths,
  and applying layer fusion techniques to minimize inference latency and energy consumption while maintaining
  model accuracy.
question: "How would you optimize operator execution order on the Coral Edge TPU for the multi-branch INT8 detector to reduce latency, memory, and energy?"
details:
  realistic_solution: 'A strong solution would involve analyzing the model''s computation graph to identify
    critical paths and opportunities. This includes: (1) **Memory Reuse**: Using a greedy or topological
    sort-based scheduler to reorder operations such that large intermediate tensors are deallocated as
    soon as their consumers are processed. (2) **Parallel Execution**: Identifying independent subgraphs
    or branches that can run concurrently on available TPU cores, managing synchronization points. (3)
    **Layer Fusion**: Grouping element-wise operations, convolutions, and activations (e.g., Conv-BN-ReLU)
    into single fused kernels to reduce memory access latency and kernel launch overhead. The solution
    should also consider the INT8-only constraint, ensuring quantization-aware training or post-training
    quantization is already handled, but scheduling focuses on the quantized graph.'
  common_mistake: Candidates might focus solely on model quantization or pruning without addressing the
    underlying execution graph optimization. Another common mistake is overlooking data dependencies and
    trying to parallelize operations that are inherently sequential, or failing to consider the overheads
    introduced by memory transfers between non-fused operations.
  napkin_math: Given the 4 TOPS INT8, a typical scenario might involve estimating the total INT8 operations
    (MACs) for a critical path. If a path requires, say, 10 billion INT8 operations (10 GOPS), the theoretical
    execution time would be 10 * 10^9 / (4 * 10^12) = 0.0025 seconds (2.5 ms), which is well within the
    real-time 33ms budget per frame. Optimizations like fusion could reduce memory bandwidth (e.g., 200MB/s
    vs. 1GB/s effective bandwidth with fusion) and thus reduce actual execution time further. Parallelization
    could theoretically reduce latency by a factor equal to the number of parallelizable branches, assuming
    balanced load. The candidate might discuss how to estimate the memory footprint of intermediate tensors
    and how memory reuse could halve peak memory for certain graph structures. For example, if two large
    tensors, each 50MB, are produced sequentially and can be reused, peak memory is 50MB instead of 100MB
    plus model weights.
