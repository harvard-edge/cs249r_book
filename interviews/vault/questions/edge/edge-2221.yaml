title: 'Memory-efficient inference graph for multi-model pipeline on Jetson Orin'
scenario: 'You are running three models in a pipeline on Jetson Orin: a detection model (200MB), a classification model (50MB), and a pose estimation model (150MB). The pipeline currently peaks at 28GB RAM including OS overhead, leaving only 4GB headroom. Models are loaded sequentially from disk, taking 800ms total startup time.'
question: 'How would you reduce RAM and startup overhead for the three-model Orin pipeline while keeping inference correct?'
details:
  realistic_solution: 'Use torch.no_grad() for all inference to eliminate gradient tracking. Load models with map_location=''cpu'' and use .to(''cuda'') only when that model is active in the pipeline (Orin''s unified memory makes this zero-copy). Alternatively, use torch2trt or TensorRT for all three models — TensorRT engines occupy ~30% the memory of PyTorch equivalents by eliminating Python overhead and fusing layers.'
  common_mistake: |
    **The Pitfall:** Keeping all three models in GPU memory with fully instantiated PyTorch computational graphs.
    **The Rationale:** Candidates don't realize that `model.eval()` in PyTorch still retains full module structures and weight tensors, or they miss the zero-copy advantage of unified memory.
    **The Consequence:** Leads to high baseline memory usage, increasing the risk of OOM errors on edge devices with limited shared memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Models in PyTorch: 200MB + 50MB + 150MB = 400MB weights.
    - PyTorch autograd/Python overhead = ~400MB.
    - Total PyTorch model RAM = 800MB.
    - TensorRT conversion reduces size to ~30%.

    **Calculations:**
    - TensorRT size: 400MB * 0.3 = 120MB.
    - PyTorch all-loaded memory = 3GB (OS) + 800MB = 3.8GB.
    - TensorRT loaded sequentially memory = 3GB (OS) + 120MB peak = 3.12GB.
    - Total savings from TensorRT = 3.8GB - 3.12GB = 680MB.

    **Conclusion & Interpretation:**
    - **Result: 680MB Savings (Memory-Bound)**. Converting to TensorRT and sequential loading eliminates autograd overhead and radically reduces peak memory usage.
