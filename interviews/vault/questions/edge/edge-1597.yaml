title: Cloud AI 100 Latency Decomposition
scenario: You are deploying an on-premise vision-language inference service using a Qualcomm Cloud AI 100 accelerator. An edge client sends an image and text prompt over a local network (5ms latency). The server preprocesses the input (10ms). The model's prefill phase requires 2 INT8 TOPS of compute, and the accelerator achieves 50% utilization of its peak 400 TOPS INT8 compute. After prefill, the model generates 50 additional tokens with a Time Per Output Token (TPOT) of 15ms. Post-processing and network return take 5ms.
question: What are the TTFT and total end-to-end latency for the Cloud AI 100 service with 2 TOP prefill, 50 tokens at 15 ms TPOT, and the given overheads?
details:
  realistic_solution: 'Decompose the critical path comprehensively. TTFT encompasses initial network transfer, CPU preprocessing, and accelerator prefill compute. Total latency adds the autoregressive generation loop and final network return trip.'
  common_mistake: |
    **The Pitfall:** Calculating TTFT based solely on NPU compute.
    **The Rationale:** Candidates fixate on the model execution phase and omit I/O, networking, and CPU pre/post-processing.
    **The Consequence:** Overpromising SLA metrics to clients by ignoring the non-compute physical realities of edge-to-server networks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network in: 5ms. Preprocessing: 10ms. Post/Network out: 5ms.
       - Accelerator: 400 TOPS, 50% utilization = 200 effective TOPS.
       - Prefill Workload: 2 TOPS.
       - Generation: 50 tokens at 15ms TPOT.
    2. **Calculations:**
       - Prefill Compute Time = 2 TOPS / 200 TOPS/s = 0.01 s = 10ms.
       - TTFT = 5ms (Net) + 10ms (Pre) + 10ms (Prefill) = 25ms.
       - Generation Time = 50 tokens * 15ms/token = 750ms.
       - Total End-to-End Latency = 25ms (TTFT) + 750ms + 5ms (Post/Net) = 780ms.
    3. **Conclusion & Interpretation:**
       - **Result: 25ms TTFT, 780ms End-to-End**. The generation phase heavily dominates the end-to-end latency, but network and CPU steps constitute 60% of the TTFT.
