title: 'MLOps Lifecycle: Size Storage and Bandwidth for Edge Model Registry'
scenario: A model registry serves 2000 Jetson Orin edge devices. Models are TensorRT engines averaging 150MB each. The update cadence is biweekly. The cloud registry must retain the last 3 versions for rollback, while each device retains 2 versions. Devices connect over 4G LTE with an average 10Mbps download speed.
question: How would you size the registry storage, per-device storage, update bandwidth, and LTE transfer time for 2000 Jetson Orins with 150MB models?
details:
  realistic_solution: 'Cloud registry: 3 versions × 150MB = 450MB. Per-device storage: 2 × 150MB = 300MB (on 32GB Jetson Orin = 0.9% used). Bandwidth per update cycle: 2000 devices × 150MB = 300GB. LTE transfer time per device: 150MB / 10Mbps = 120s = 2 minutes.'
  common_mistake: |
    **The Pitfall:** Sizing cloud storage for 2000 devices x 150MB x 3 versions = 900GB.
    **The Rationale:** Candidates confuse the centralized cloud registry (which only stores 1 copy of the 3 versions) with the distributed on-device payload.
    **The Consequence:** Gross overestimation of cloud storage costs and poor understanding of the deployment topology.
  napkin_math: |
    1. Cloud registry: 3 x 150MB = 450MB (≈ $0.01/month).
    2. Per-device storage: 2 x 150MB = 300MB.
    3. CDN Bandwidth per update: 2000 devices x 150MB = 300GB. At $0.09/GB = $27 per cycle.
    4. LTE transfer time: 150MB * 8 bits/byte = 1200 Megabits.
    5. **1200 Mb / 10Mbps = 120s (2 minutes). An off-hours biweekly update costs just $54/month in CDN egress.**
