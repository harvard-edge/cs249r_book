title: 'MLOps Lifecycle: Size Storage and Bandwidth for Edge Model Registry'
scenario: 'Size the storage and bandwidth requirements for a model registry serving
  2000 Jetson Orin edge devices. Models: TensorRT engines averaging 150MB each. Update
  cadence: biweekly. Registry must retain last 3 versions for rollback. Devices connect
  over 4G LTE with average 10Mbps download.'
question: How would you size the registry storage, per-device storage, update bandwidth,
  and LTE transfer time for 2000 Jetson Orins with 150MB models?
details:
  realistic_solution: 'Cloud registry: 3 versions × 150MB = 450MB. Trivial cost. Per-device
    storage: 2 × 150MB = 300MB (on 32GB Jetson Orin = 0.9% used). Bandwidth per update
    cycle: 2000 devices × 150MB = 300GB. Staged rollout (10%/day over 10 days): 200
    devices/day × 150MB = 30GB/day. At $0.09/GB CDN: $2.70/day × 10 days = $27 per
    update cycle. LTE transfer time per device: 150MB / 10Mbps = 120s = 2 minutes
    (acceptable during off-hours).'
  common_mistake: Sizing storage for 2000 × 150MB × 3 versions = 900GB without recognizing
    that the cloud registry stores only 3 versions (450MB), and per-device storage
    is 2 versions (current + rollback = 300MB each).
  napkin_math: 'Cloud registry: 3×150MB = 450MB ≈ $0.01/month. Per-device: 300MB ×
    2000 = 600GB total on-device (each device has 300MB). CDN per update: 300GB ×
    $0.09 = $27. Staged: 10 days × $2.70/day = $27 total. LTE time: 150MB × 8 bits
    / 10Mbps = 120s. Off-hours (2am): devices update in background. Biweekly = $54/month
    CDN. Trivial.'
