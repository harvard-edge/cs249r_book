title: Throughput vs. Latency
scenario: You are designing a smart security camera that must run an object detection model at 30 FPS. The model requires 2 Trillion Operations (TOPs) to process a single frame. You are considering using a Hailo-8 accelerator, which has a peak performance of 26 TOPS.
question: Can a 26 TOPS Hailo-8 run a 2 TOPs-per-frame model at 30 FPS, and what maximum FPS can it achieve?
details:
  realistic_solution: 'Calculate the maximum theoretical frame rate by dividing the hardware''s total operations per second by the model''s operations per frame. The hardware provides 26 TOPS, and the model costs 2 TOPs/frame. The max theoretical rate is 13 FPS, which fails to meet the 30 FPS requirement.'
  common_mistake: |
    **The Pitfall:** Assuming "big peak number" means "fast enough."
    **The Rationale:** Engineers glance at 26 TOPS vs 2 TOPS and intuitively assume the hardware has plenty of headroom without doing the unit rate calculation.
    **The Consequence:** They procure hardware that physically bottlenecks at half the required framerate before memory or I/O limits are even considered.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Processing Goal: 30 FPS
       - Hardware Compute Cap: 26 TOPS
       - Model Workload: 2 TOPS per frame
    2. **Calculations:**
       - Maximum Unbound Framerate: 26 TOPS / 2 TOPS/frame = 13 FPS
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** With maximum mathematical throughput capped firmly at 13 FPS, the requested 30 FPS processing pipeline immediately and physically fails without further architectural intervention.
  options:
  - Yes, 26 TOPS is much greater than the 2 TOPS required.
  - No, it can only achieve about 7.7 FPS.
  - No, it can only achieve 13 FPS.
  - Yes, it can run at 520 FPS.
  correct_index: 2
