title: Throughput vs. Latency
scenario: You are designing a smart security camera that must run an object detection model at 30 FPS.
  The model requires 2 Trillion Operations (TOPs) to process a single frame. You are considering using
  a Hailo-8 accelerator, which has a peak performance of 26 TOPS. Compare the accelerator's throughput
  to the model's requirement and determine if it can meet the 30 FPS deadline.
details:
  realistic_solution: The core task is to calculate the maximum theoretical frame rate the hardware can
    support for this specific model. The Hailo-8 provides 26 Trillion Operations per second. The model
    consumes 2 Trillion Operations per frame (inference). By dividing the hardware's capacity by the model's
    cost, we find the achievable frame rate. In this case, it's 13 FPS, which fails to meet the 30 FPS
    requirement.
  common_mistake: Engineers often look at the peak TOPS number (26) and assume it's 'big enough' without
    doing the rate calculation. Another mistake is inverting the division, calculating `Model TOPs / Accelerator
    TOPs`, which yields a meaningless ratio.
  napkin_math: Hailo-8 peak compute = 26 TOPS. Model requirement = 2 TOPs/frame. Max theoretical FPS =
    26 TOPS / 2 TOPs/frame = 13 FPS. Since 13 FPS < 30 FPS requirement, the device lacks the peak compute
    to meet the deadline. Even with 100% utilization, 13 FPS is the absolute ceiling, so the Hailo-8 will
    bottleneck on compute before memory or other factors are even considered.
  options:
  - Yes, 26 TOPS is much greater than the 2 TOPS required.
  - No, it can only achieve about 7.7 FPS.
  - No, it can only achieve 13 FPS.
  - Yes, it can run at 520 FPS.
  correct_index: 2
