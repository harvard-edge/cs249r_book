title: GMSL Camera PCIe Bottleneck on Orin
scenario: A Jetson AGX Orin is connected to a capture card via PCIe Gen4 x4. Four
  GMSL cameras stream uncompressed 4K video (3840x2160, 8-bit RGB, 30fps) simultaneously.
question: Analyze the total required bandwidth and determine if the PCIe Gen4 x4 link
  will bottleneck the streams.
visual:
  kind: svg
  path: edge-2299.svg
  alt: Topology showing 4 cameras feeding into a capture card routed over a PCIe x4
    bus to the Orin SoC.
  caption: Camera to PCIe Topology
details:
  realistic_solution: One 4K frame is 3840 * 2160 * 3 bytes (RGB) = ~24.88 MB. At
    30fps, one camera requires 24.88 * 30 = ~746 MB/s. Four cameras require 4 * 746
    = 2984 MB/s (approx 3.0 GB/s). A PCIe Gen4 x4 link provides roughly 8 GB/s theoretical
    (typically ~6.4 GB/s effective). The 3.0 GB/s load is well within the effective
    bandwidth, so there is no bottleneck.
  common_mistake: Calculating bandwidth in bits instead of bytes, or forgetting the
    3x multiplier for RGB channels.
  napkin_math: 3840 * 2160 * 3 * 30 * 4 ≈ 2.98 GB/s
