title: Evaluate effective uptime comparing different edge checkpointing intervals
scenario: A fleet of autonomous drones uses Jetson AGX Orin modules. Due to harsh
  conditions, transient power faults happen exactly every 10 minutes. A local state
  checkpoint of 2GB is written to a slow flash drive at 50 MB/s.
question: Evaluate whether a 1-minute checkpoint interval provides a higher effective
  application throughput compared to a 5-minute interval.
details:
  realistic_solution: Writing 2GB at 50 MB/s takes 40 seconds. A 1-minute interval
    yields 20s of compute per 60s (33% efficiency), saving minimal rework. A 5-minute
    interval means 40s writing and 260s compute per 300s (86% efficiency). Despite
    losing up to 5 minutes of work during the 10-minute crash, the 5-minute interval
    yields far more overall useful compute time than constantly writing to disk.
  common_mistake: Assuming more frequent checkpoints always increase system throughput
    without factoring in the massive I/O time overhead.
  napkin_math: 40s IO / 60s total = 66% overhead vs 40s IO / 300s total = 13% overhead
