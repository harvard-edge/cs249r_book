title: Power Island Gating Across Chiplet Dies for Edge Battery Life
scenario: An edge AI device with a two-die chiplet (CPU die + NPU die) needs to achieve
  72-hour battery life. The NPU die draws 3W during inference and 50mW standby. The
  die-to-die link consumes 200mW when active and 20mW in standby. The
  device runs inference for a total of 8 hours over the 72-hour period. Current battery is 10Wh. Design a power gating
  strategy.
question: What power-gating strategy should you use, and can a 10Wh battery support
  72 hours with 8 hours of total NPU inference?
details:
  realistic_solution: 'Power states: (1) Active inference: NPU on, die-to-die link
    active \u2014 3W NPU + 0.2W link PHY = 3.2W; (2) Ready standby: NPU clock-gated, die-to-die
    link in low-power state \u2014 50mW NPU + 20mW link = 70mW; (3) Deep sleep: NPU fully
    power-gated, die-to-die link off, context saved to DRAM \u2014 2mW NPU leakage + 0mW
    link = 2mW. Wake-up from deep sleep: ~10ms. Power budget over 72h with 8h active
    and 64h deep sleep: 8h * 3.2W + 64h * 0.002W = 25.6 + 0.128 = 25.7 Wh. Exceeds 10Wh battery.
    Solution: reduce active duty cycle or use larger battery.'
  common_mistake: Keeping the die-to-die link alive during NPU standby. The die-to-die
    PHY (SerDes or LVDS) can consume 100-500mW continuously for link maintenance.
    For a device that's idle 67% of the time, always-on die-to-die link can dominate
    standby power budget.
  napkin_math: 'Target: 10Wh / 72h = 139mW average budget. Inference: 8h at 3.2W =
    25.6Wh \u2192 25.6 / 72 = 355mW average from inference alone \u2014 2.5x over budget. Must
    either: reduce inference power to 1.25W (aggressive NPU power optimization), or
    reduce total inference hours to ~3h, or increase battery to 26Wh. Most practical: 3.2W
    active + aggressive sleep = 25.6Wh + 64h*2mW = 25.7Wh \u2192 need 26Wh battery.'
