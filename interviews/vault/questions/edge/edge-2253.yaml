title: Power Island Gating Across Chiplet Dies for Edge Battery Life
scenario: An edge AI device with a two-die chiplet (CPU die + NPU die) needs to achieve 72-hour battery life. The NPU die draws 3W during inference and 50mW standby. The die-to-die link consumes 200mW when active and 20mW in standby. The device runs inference for a total of 8 hours over the 72-hour period. Current battery is 10Wh.
question: What power-gating strategy should you use, and can a 10Wh battery support 72 hours with 8 hours of total NPU inference?
details:
  realistic_solution: 'Power states: (1) Active inference: NPU on, die-to-die link active — 3W NPU + 0.2W link PHY = 3.2W; (2) Ready standby: NPU clock-gated, die-to-die link in low-power state — 50mW NPU + 20mW link = 70mW; (3) Deep sleep: NPU fully power-gated, die-to-die link off, context saved to DRAM — 2mW NPU leakage + 0mW link = 2mW. Wake-up from deep sleep: ~10ms. Power budget over 72h with 8h active and 64h deep sleep: 8h * 3.2W + 64h * 0.002W = 25.6 + 0.128 = 25.7 Wh. Exceeds 10Wh battery. Solution: reduce active duty cycle or use larger battery.'
  common_mistake: |
    **The Pitfall:** Keeping the die-to-die link alive during NPU standby.
    **The Rationale:** Candidates focus on gating the NPU cores but forget the high-speed interconnect PHY.
    **The Consequence:** The always-on die-to-die link consumes hundreds of milliwatts, draining the small 10Wh battery far faster than expected during the 64 hours of idle time.
  napkin_math: |
    1. Power states:
       - Active (8h): 3W NPU + 0.2W link = 3.2W.
       - Deep sleep (64h): 2mW NPU leakage + 0mW link = 0.002W.
    2. Total energy: (8h × 3.2W) + (64h × 0.002W) = 25.6Wh + 0.128Wh = 25.728 Wh.
    3. **Target battery is 10Wh. The 25.7Wh demand drastically exceeds capacity. The system must reduce total inference hours to ~3h or increase the battery to 26Wh.**
