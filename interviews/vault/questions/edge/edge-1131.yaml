title: 'Edge Systolic Array Evaluation: Hailo-8 vs Coral TPU Dataflow Efficiency'
scenario: Compare Hailo-8 vs Coral Edge TPU for deploying EfficientNet-Lite0 (INT8, 407M FLOPs, 4.7M params).
question: Which chip achieves better Model FLOPs Utilization (MFU) deploying EfficientNet-Lite0 at batch size 1, and why?
details:
  realistic_solution: 'Both chips are severely memory-bound at batch size 1. Coral Actual FPS ~850. Hailo Actual FPS ~1280. Coral MFU = 850/9826 = 8.7%. Hailo MFU = 1280/63882 = 2%. Coral has higher MFU because its lower peak theoretical compute makes it appear more utilized, even though Hailo-8 delivers more raw throughput.'
  common_mistake: |
    **The Pitfall:** Calculating TOPS utilization purely as FLOPs/TOPS and assuming higher peak compute directly translates to better utilization.
    **The Rationale:** It is mathematically straightforward, but completely ignores memory bandwidth limits at low batch sizes.
    **The Consequence:** Engineers falsely conclude high-TOPS hardware is efficiently utilized, missing that both are operating far below peak capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EfficientNet-Lite0: 407M FLOPs, 4.7MB weights.
       - Coral: 4 TOPS, 4GB/s bandwidth.
       - Hailo-8: 26 TOPS, 6GB/s bandwidth.
    2. **Calculations:**
       - Coral Compute Time: 407M / 4 TOPS = 0.10ms. Memory Time: 4.7MB / 4GB/s = 1.18ms (Mem bound, FPS=850).
       - Hailo Compute Time: 407M / 26 TOPS = 0.016ms. Memory Time: 4.7MB / 6GB/s = 0.78ms (Mem bound, FPS=1280).
       - Coral MFU: 850 / (4000/0.407) = 8.7%.
       - Hailo MFU: 1280 / (26000/0.407) = 2.0%.
    3. **Conclusion & Interpretation:**
       - **Result: Coral achieves higher MFU due to its lower peak compute limit. (Memory-Bandwidth-Bound)**
