title: 'Edge Systolic Array Evaluation: Hailo-8 vs Coral TPU Dataflow Efficiency'
scenario: Compare Hailo-8 (26 TOPS INT8, 2.5W) vs Coral Edge TPU (4 TOPS INT8, 2W) for deploying EfficientNet-Lite0 (INT8, 407M FLOPs, 4.7M params).
question: Which chip achieves better Model FLOPs Utilization (MFU) deploying EfficientNet-Lite0 at batch size 1, and why?
details:
  realistic_solution: 'EfficientNet-Lite0: 407M FLOPs (not OPS — but assume GOPS ≈ GFLOPS for INT8). Batch=1. Coral: μ = 4000/0.407 = 9826 FPS. Hailo-8: μ = 26000/0.407 = 63,882 FPS. At batch=1, this is the theoretical compute-bound limit. Actual (memory bound): Coral BW ≈ 4GB/s (LPDDR4). Weight: 4.7MB. Time_mem = 4.7MB/4GB/s = 1.18ms. FPS = 850. Hailo-8 BW ≈ 6GB/s: Time_mem = 4.7MB/6GB/s = 0.78ms. FPS = 1280. Coral MFU = actual/theoretical = 850/9826 = 8.7%. Hailo MFU = 1280/63882 = 2%. Coral has higher MFU! Both memory bound, Coral''s lower peak makes it appear more utilized.'
  common_mistake: |
    **The Pitfall:** Calculating TOPS utilization purely as FLOPs/TOPS and assuming higher peak compute directly translates to better utilization.
    **The Rationale:** It is mathematically straightforward to divide model FLOPs by hardware TOPS, but this completely ignores memory bandwidth at low batch sizes.
    **The Consequence:** Engineers falsely conclude that high-TOPS hardware is being efficiently utilized, missing that both chips are severely memory-bound and operating far below peak capacity.
  napkin_math: |
    1. **Coral Compute vs Memory:** Compute time = 407M / 4 TOPS = 0.10ms. Memory time = 4.7MB / 4GB/s = 1.18ms. (Memory bound, FPS = 850).
    2. **Hailo-8 Compute vs Memory:** Compute time = 407M / 26 TOPS = 0.016ms. Memory time = 4.7MB / 6GB/s = 0.78ms. (Memory bound, FPS = 1280).
    3. **Coral MFU:** Actual FPS (850) / Theoretical Compute-Bound FPS (9826) = ~8.7%.
    4. **Hailo MFU:** Actual FPS (1280) / Theoretical Compute-Bound FPS (63882) = ~2.0%.
    5. **Result:** The **Coral TPU** achieves higher MFU because its lower peak theoretical compute makes it appear more "utilized," even though the Hailo-8 delivers more raw throughput.
