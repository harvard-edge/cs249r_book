title: The Graceful Degradation Under Sensor Failure
scenario: Your autonomous delivery robot has 3 sensors: a stereo camera pair, a 2D LiDAR, and an ultrasonic array. During a delivery, mud splashes onto the left stereo camera lens. Your perception stack loses stereo depth estimation. The robot is 500 meters from its destination on a busy sidewalk.
question: What happens next to ensure safe and graceful degradation?
details:
  realistic_solution: 'Enter degraded perception mode via a sensor health matrix. With left stereo camera occluded: switch to monocular depth (accuracy drops from +/-5% to +/-30% at 5m), reduce speed from 1.5 to 0.5 m/s (stopping distance: 0.17m), increase ultrasonic safety envelope to 1.5m as a hard boundary. Time to destination: 16.7 min vs 5.6 min at full speed — acceptable for delivery. Never stop on a busy sidewalk (creates its own hazard). Log degradation for fleet maintenance.'
  common_mistake: |
    **The Pitfall:** Failing catastrophically or stopping completely.
    **The Rationale:** Candidates often state "Stop immediately and wait for human intervention," ignoring that stopping on a busy sidewalk creates its own safety hazard (tripping, blocking wheelchair access).
    **The Consequence:** A brittle system that requires constant human intervention for minor, recoverable sensor failures.
  napkin_math: |
    * **Full perception:** Stereo depth ±5% at 5m, speed = 1.5 m/s, stopping distance = 0.5m. Time to destination = 500m / 1.5 = 5.6 minutes.
    * **Degraded perception:** Monocular depth ±30% at 5m (uncertainty: 3.5m - 6.5m).
    * **Degraded Action:** Reduce speed to 0.5 m/s (stopping distance = 0.17m).
    * **Safety Envelope:** Ultrasonic provides a hard 1.5m safety boundary, easily covering the 0.17m stopping distance.
    * **Degraded Time to destination:** 500m / 0.5 m/s = 1000s = **16.7 minutes** (acceptable for delivery).
