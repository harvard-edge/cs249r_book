title: 'Edge Queueing Theory Implement: Service Rate from Latency Spec'
scenario: 'Implement the M/D/1 service rate calculation for an edge device that must maintain P99 latency < 50ms for a face recognition pipeline with lambda=100 req/s.'
question: 'If the face-recognition pipeline runs at mu=200/s and rho=0.5, what M/D/1 Wq and total latency verify the P99 < 50ms target?'
details:
  realistic_solution: 'M/D/1 Wq = rho/(2*mu(1-rho)) = 0.5/(2*200*0.5) = 0.0025s. W = Wq + 1/mu = 0.0025 + 0.005 = 0.0075s = 7.5ms. Confirm deterministic service rates with nsys profiling.'
  common_mistake: |
    **The Pitfall:** Using the M/M/1 (exponential) formula instead of M/D/1 (deterministic).
    **The Rationale:** Candidates blindly apply the most common queueing formula without verifying assumptions.
    **The Consequence:** Wq is overestimated by 2x, leading to overly conservative hardware requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - lambda = 100 req/s.
    - mu = 200/s.
    - rho = 0.5.

    **Calculations:**
    - M/D/1 W_q = rho / (2 * mu * (1 - rho)) = 0.5 / (2 * 200 * 0.5) = 0.0025s = 2.5ms.
    - Sojourn time W = W_q + 1 / mu = 2.5ms + 5ms = 7.5ms.

    **Conclusion & Interpretation:**
    - **Result: 7.5ms (Latency-Bound)**. Average latency easily maintains the P99 < 50ms target.
