title: 'Edge Queueing Theory Implement: Service Rate from Latency Spec'
scenario: Implement the M/D/1 service rate calculation for a Jetson Orin (32GB LPDDR5, 275 TOPS INT8) that must maintain P99 latency < 50ms for a face recognition pipeline with \u03bb=100 req/s. Solve for the required \u03bc (inferences/second) that satisfies the P99 constraint, and then verify if Jetson Orin can achieve this with MobileNetV2-FaceNet (0.6 GOPS INT8).
question: If the face-recognition pipeline runs at \u03bc=200/s and \u03c1=0.5, what M/D/1 Wq and total latency verify the P99<50ms target?
details:
  realistic_solution: M/D/1 Wq = \u03c1/(2\u03bc(1-\u03c1)) = 0.5/(2\u00d7200\u00d70.5) = 0.0025s. W = Wq + 1/\u03bc = 0.0025 + 0.005 = 0.0075s = 7.5ms.
  common_mistake: Using M/M/1 (exponential) formula instead of M/D/1 (deterministic) for compute-bound inference workloads, which gives twice the Wq and thus an overly conservative \u03bc requirement.
  napkin_math: 'M/D/1 queue: \u03bb=100 req/s, \u03bc=200/s, \u03c1=0.5. Wq = \u03c1 / (2\u03bc(1-\u03c1)) = 0.5 / (2 * 200 * 0.5) = 0.0025s = 2.5ms. Sojourn time W = Wq + 1/\u03bc = 2.5ms + 5ms = 7.5ms. Since average latency is 7.5ms, P99 will easily stay under the 50ms constraint.'
