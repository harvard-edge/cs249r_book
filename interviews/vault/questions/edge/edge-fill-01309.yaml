title: Graceful Degradation for Real-time Object Detection on Edge AI (Hailo-8)
scenario: An autonomous delivery drone is equipped with a Hailo-8 AI processor (26 TOPS INT8, 2.5W) for
  real-time object detection and tracking to navigate urban environments and identify delivery points.
  The primary model is a high-accuracy, resource-intensive object detector. Due to unexpected environmental
  conditions (e.g., strong headwind increasing motor power consumption) or sensor degradation, the system
  might face reduced available power or computational resources for the AI accelerator. Describe a graceful
  degradation strategy that leverages degradation ladders, model fallbacks, and quality-of-service shedding
  to ensure the drone remains operational and safe. Explain *why* specific choices are made given the
  Hailo-8's capabilities and constraints, differentiating between fail-safe and fail-operational states.
details:
  realistic_solution: Implement a multi-stage degradation ladder triggered by real-time monitoring of
    power consumption, Hailo-8 utilization, and sensor health. For instance, if overall system power exceeds
    80% capacity due to high motor load, transition from a 26 TOPS high-accuracy model (e.g., YOLOv7)
    to a smaller, more efficient 15 TOPS model (e.g., MobileNet-SSD) on the Hailo-8, thereby reducing
    AI power draw from 2.5W to ~1.5W. If conditions worsen, reduce frame rate from 30 FPS to 10 FPS, or
    shed non-critical telemetry to further conserve resources. Fail-operational modes maintain core object
    detection with reduced fidelity, while a fail-safe state involves a controlled landing or return-to-base
    upon critical subsystem failure, completely disengaging non-essential AI tasks.
  common_mistake: Failing to define clear, hierarchical degradation triggers and corresponding fallback
    models/strategies. A common mistake is also not quantifying the power/performance implications of
    each degradation step on the Hailo-8, potentially leading to situations where the 'degraded' state
    still overdraws power or provides insufficient functional safety.
  napkin_math: 'If a primary object detection model requires 20 TOPS and ~2W on the Hailo-8 to run at
    30 FPS, and the overall drone power budget has a 5W contingency, but current motor load consumes 3W
    of that contingency: the system has only 2W left. A degraded model that runs at 10 TOPS and ~1W, potentially
    at a reduced frame rate of 15 FPS, would fit within the remaining budget and keep the drone operational,
    sacrificing some accuracy or latency for system stability.'
