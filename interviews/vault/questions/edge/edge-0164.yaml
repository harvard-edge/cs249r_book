title: The Edge LLM's Memory Budget
scenario: You're deploying a 2B parameter transformer model onto a Jetson AGX Orin for a real-time conversational agent. The model uses 24 layers, 32 attention heads, and a head dimension of 64.
question: If the device needs to support a context window of 4096 tokens in FP16 precision, how much of the Jetson's VRAM will be consumed solely by the KV-cache?
details:
  realistic_solution: 'The KV-cache stores a Key and a Value vector for each token, for each head, in each layer. For this scenario, it is 2 (K/V) * 24 layers * 4096 tokens * 32 heads * 64 head_dim * 2 bytes (FP16), which comes out to approximately 805 MB.'
  common_mistake: Forgetting that the KV-cache stores both a Key and a Value tensor for every token in the context, leading to a 2x underestimate.
  napkin_math: |
    **Assumptions & Constraints:**
    - 24 layers, 32 attention heads, 64 head_dim
    - 4096 tokens context window
    - FP16 precision (2 bytes per parameter)

    **Calculations:**
    - Memory per token per layer = 2 (K, V) * 32 heads * 64 dim * 2 bytes = 8,192 bytes
    - Total KV Cache = 8,192 bytes * 4096 tokens * 24 layers = 805,306,368 bytes

    **Conclusion & Interpretation:**
    - **Result: 805 MB (Memory-Capacity-Bound)**. The KV-cache will consume approximately 805 MB of the Jetson's unified memory.
  options:
  - '~402 MB'
  - '~4 GB'
  - '~805 MB'
  - '~1.6 GB'
  correct_index: 2
