title: The Silent Accuracy Drift
scenario: Your edge detection system has been deployed for 6 months. There's no ground truth labeling
  pipeline — you can't afford human annotators for 10,000 cameras. Customer complaints about missed detections
  have increased 40% over the last month. How do you detect and diagnose accuracy drift without ground
  truth labels?
details:
  realistic_solution: 'Use distributional proxy metrics that detect drift without ground truth. Track:
    (1) confidence score distribution shift (PSI > 0.1 triggers investigation), (2) detection count per
    frame over time (sudden drops indicate missed detections), (3) bounding box size/position distributions,
    and (4) feature embedding drift (cosine distance from calibration embeddings). Your current data:
    confidence mean dropped from 0.72 to 0.61 with PSI = 0.19 — above the 0.1 investigation threshold.
    This likely indicates environmental change (new lighting, seasonal foliage, camera lens degradation).
    Spot-check 100 frames from flagged cameras to diagnose the root cause before retraining.'
  common_mistake: '"You can''t measure accuracy without ground truth." You can''t measure *absolute* accuracy,
    but you can detect *drift* using proxy signals.'
  napkin_math: 'PSI threshold for "investigate": >0.1. PSI threshold for "alarm": >0.25. Confidence distribution
    baseline: mean=0.72, std=0.15. Current: mean=0.61, std=0.18. PSI = 0.19 → "investigate" triggered.
    Spot-check cost: 100 frames × 30s/frame = 50 min/camera/month. For 100 sampled cameras: 83 hours/month
    of annotation = ~0.5 FTE.'
