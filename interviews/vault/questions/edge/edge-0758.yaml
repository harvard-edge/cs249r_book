title: The Silent Accuracy Drift
scenario: Your edge detection system has been deployed for 6 months. There's no ground truth labeling pipeline — you can't afford human annotators for 10,000 cameras. Customer complaints about missed detections have increased 40% over the last month.
question: How do you detect and diagnose accuracy drift without ground truth labels?
details:
  realistic_solution: 'Use distributional proxy metrics that detect drift without ground truth. Track confidence score distribution shifts (PSI > 0.1 triggers investigation), detection count per frame, and feature embedding cosine distance from calibration. Spot-check 100 frames from flagged cameras to diagnose root causes like environmental changes before retraining.'
  common_mistake: Believing you cannot measure accuracy without absolute ground truth, completely ignoring the power of distributional proxy signals and statistical drift metrics.
  napkin_math: |
    **Assumptions & Constraints:**
    - No ground truth labels available
    - 10,000 deployed cameras

    **Calculations:**
    - PSI threshold for investigation > 0.1
    - Current PSI = 0.19 (Mean confidence dropped from 0.72 to 0.61)
    - Spot-check cost = 100 frames * 30s/frame = 50 min/camera/month

    **Conclusion & Interpretation:**
    - **Result: PSI 0.19 (Drift-Detected)**. The distributional shift in predictions reliably isolates drifting cameras for targeted human-in-the-loop review.
