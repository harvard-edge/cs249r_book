title: Power-Aware Runtime Selection on Jetson Orin Power Profiles
scenario: Jetson Orin AGX has multiple power profiles: MAXN (60W, all cores active), 50W, 30W, and 15W. Your inference service must adapt its model backend when the power profile changes (e.g., battery mode switches from 60W to 15W).
question: How should the Orin inference service adapt its model and TensorRT backend as nvpmodel switches from 60W to 15W?
details:
  realistic_solution: 'Pre-build TensorRT engines for each power profile since optimal layer fusion and workspace allocation differ at each performance point. At 60W: use the full model with FP16, batch=8, 2 CUDA streams. At 30W: same model but batch=4, 1 CUDA stream (reduced memory bandwidth). At 15W: switch to a smaller model variant with INT8, batch=1, and enable DLA for suitable layers (DLA is more power-efficient than GPU at low power). Use nvpmodel change events to trigger engine swaps. Pre-warm each engine at boot to avoid cold-start latency.'
  common_mistake: |
    **The Pitfall:** Only scaling the model size without adjusting the runtime hardware configuration.
    **The Rationale:** Developers assume that a smaller model will automatically run efficiently on a lower power profile without explicit configuration changes.
    **The Consequence:** Suboptimal performance and potential failure to meet the 15W power constraints, as thread/stream configurations optimized for 1.3GHz GPU frequencies are used at 624MHz.
  napkin_math: |
    * **60W Profile Performance**: ~275 TOPS INT8 GPU + 118 TOPS DLA.
    * **15W Profile Performance**: ~45 TOPS INT8 GPU + 40 TOPS DLA.
    * **Compute Reduction**: (275 + 118) / (45 + 40) = 393 / 85 ≈ 4.6x (or 6x GPU-only reduction).
    * **Model Scaling Example**: At a 33ms latency budget, 60W can run YOLOv8-L (52 GFLOPS). At 15W, you must scale down to YOLOv8-N (4.3 GFLOPS) to meet the same deadline.
    * **Conclusion**: **Requires scaling both the model size and hardware utilization strategy.**
