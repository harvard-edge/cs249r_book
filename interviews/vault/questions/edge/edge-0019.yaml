title: The First-Frame Latency
scenario: Your smart doorbell camera triggers on motion and runs person detection. The ML model takes
  30ms. But users complain that the system misses the first 500ms of action — by the time the first detection
  fires, the person is already at the door. The model is fast enough. Where is the 470ms going?
question: "Where is the 470ms going?"
details:
  realistic_solution: 'The 470ms delay is the ISP (Image Signal Processor) convergence time. When the camera wakes from low-power sleep mode, the ISP must initialize the sensor, run Auto-Exposure (AE) to adjust to the lighting, and run Auto-White Balance (AWB). Until these algorithms converge, the frames are completely blown out or pitch black, making them useless for the ML model. The solution is to use a circular buffer with a low-power always-on sensor, or cache the last known good ISP settings to accelerate convergence.'
  common_mistake: '"The model needs to be faster." At 30ms, the model is not the bottleneck. The delay
    is upstream.'
  napkin_math: 'Full cold start: 50ms (sensor init) + 250ms (AE convergence) + 170ms (AWB convergence) = 470ms ISP delay. 470ms + 30ms (inference) = 500ms total. With pre-configured ISP: 50ms + 33ms (1 frame AE) + 33ms (1 frame AWB) + 30ms = 146ms. With warm standby: 0ms (sensor) + 33ms (AE fine-tune) + 30ms (inference) = 63ms. With circular buffer: first detection available from buffered frame in 30ms, full-res detection in 146ms.'
