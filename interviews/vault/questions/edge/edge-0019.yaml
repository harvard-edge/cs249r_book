title: The First-Frame Latency
scenario: Your smart doorbell camera triggers on motion and runs person detection. The ML model takes 30ms. But users complain that the system misses the first 500ms of action — by the time the first detection fires, the person is already at the door. The model is fast enough.
question: Where is the 470ms going?
details:
  realistic_solution: 'The 470ms delay is the ISP (Image Signal Processor) convergence time. When the camera wakes from low-power sleep mode, the ISP must initialize the sensor, run Auto-Exposure (AE) to adjust to the lighting, and run Auto-White Balance (AWB). Until these algorithms converge, the frames are completely blown out or pitch black, making them useless for the ML model. The solution is to use a circular buffer with a low-power always-on sensor, or cache the last known good ISP settings to accelerate convergence.'
  common_mistake: |
    **The Pitfall:** Blaming the ML model and trying to make inference faster.
    **The Rationale:** ML engineers often have a narrow view of the pipeline, focusing only on the neural network execution time.
    **The Consequence:** Wasting time quantizing or pruning a model that takes 30ms, completely ignoring the 470ms hardware bottleneck upstream.
  napkin_math: |
    *   **Full cold start latency:** 50ms (sensor init) + 250ms (Auto-Exposure) + 170ms (Auto-White Balance) = 470ms ISP delay.
    *   **Total system latency:** 470ms + 30ms (inference) = 500ms total.
    *   **With warm standby:** 0ms (sensor) + 33ms (AE fine-tune) + 30ms (inference) = 63ms.
    *   **With circular buffer:** First detection is available from the buffered frame in **30ms**.
