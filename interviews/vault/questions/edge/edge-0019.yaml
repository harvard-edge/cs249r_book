title: 'The First-Frame Latency'
scenario: 'A smart doorbell camera triggers on motion and runs person detection. The ML model takes 30ms. However, users complain that the system misses the first 500ms of action — by the time the first detection fires, the person is already at the door. The model is fast enough.'
question: 'Where is the 470ms going?'
details:
  realistic_solution: |
    The 470ms delay is the ISP (Image Signal Processor) convergence time. When the camera wakes from low-power sleep mode, the ISP must initialize the sensor, run Auto-Exposure (AE) to adjust to the lighting, and run Auto-White Balance (AWB). Until these algorithms converge, the frames are completely blown out or pitch black, making them useless for the ML model. The solution is to use a circular buffer with a low-power always-on sensor, or cache the last known good ISP settings to accelerate convergence.
  common_mistake: |
    **The Pitfall:** Blaming the ML model and trying to make inference faster.
    **The Rationale:** ML engineers often have a narrow view of the pipeline, focusing only on the neural network execution time.
    **The Consequence:** Wasting time quantizing or pruning a model that takes 30ms, completely ignoring the 470ms hardware bottleneck upstream.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full cold start latency includes sensor init, AE, and AWB.
    - Inference latency: 30 ms.

    **Calculations:**
    - Full cold start: 50 ms + 250 ms + 170 ms = 470 ms ISP delay.
    - Total system latency: 470 ms + 30 ms = 500 ms.
    - Warm standby: 0 ms + 33 ms + 30 ms = 63 ms.
    - Circular buffer: First detection available in 30 ms.

    **Conclusion & Interpretation:**
    - **Result: 470 ms hardware delay (I/O-Bound).** The bottleneck is upstream camera initialization, not the ML model.
