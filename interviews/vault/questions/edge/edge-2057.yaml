title: Model Extraction Attack on Qualcomm Cloud AI 100
scenario: Your team is deploying a critical, proprietary image classification model on a fleet of edge devices, each powered by a Qualcomm Cloud AI 100 (Pro PCIe, 32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). The model's intellectual property is highly sensitive. An adversary gains physical access to an edge device but cannot directly extract the model weights from secure storage due to hardware root of trust and secure boot mechanisms. They manage to observe the power consumption patterns of the AI 100 while feeding carefully crafted input images to the deployed model.
question: How would you mitigate power-side-channel model extraction on the Cloud AI 100 despite secure boot and physical access?
details:
  realistic_solution: Implement power-side-channel countermeasures at the software and hardware level. Software-wise, consider obfuscating inference patterns (e.g., dummy operations, random delays, batching unrelated inferences) to decorrelate power signatures from specific model operations. Hardware-wise, explore dynamic voltage and frequency scaling (DVFS) randomization or dedicated hardware security modules that can introduce noise or normalize power consumption during sensitive computations. Furthermore, model quantization and compression (INT8, as used by AI 100) can make extraction harder by reducing precision, but also potentially create more distinct power signatures if not properly handled.
  common_mistake: |
    **The Pitfall:** Assuming hardware security features completely eliminate all forms of intellectual property theft.
    **The Rationale:** Candidates trust secure boot and encrypted storage implicitly, overlooking dynamic side-channel vulnerabilities like power or electromagnetic analysis.
    **The Consequence:** Proprietary model architectures and weights are successfully reverse-engineered by adversaries who monitor the device's physical emanations during inference.
  napkin_math: |
    1. Calculate total operations per inference: Let's assume 10^9 operations.
    2. Estimate energy per INT8 operation: ~0.1 pJ (0.1 * 10^-12 J).
    3. Calculate total energy for compute: 10^9 * 0.1 * 10^-12 J = 10^-4 J = 0.1 mJ.
    4. Calculate average power over 10ms: 0.1 mJ / 0.01 s = 0.01 W.
    5. Compare to 75W TDP: The 0.01W fluctuation from compute is small, but memory access patterns (SRAM vs LPDDR4x) create larger, identifiable spikes.
    **An adversary with high-resolution equipment can isolate micro-watt fluctuations tied to specific layer types, requiring software/hardware obfuscation to mask the signature.**
