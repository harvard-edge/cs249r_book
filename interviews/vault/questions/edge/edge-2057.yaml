title: Model Extraction Attack on Qualcomm Cloud AI 100
scenario: Your team is deploying a critical, proprietary image classification model
  (e.g., for industrial defect detection) on a fleet of edge devices, each powered
  by a Qualcomm Cloud AI 100 (Pro PCIe, 32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). The
  model's intellectual property is highly sensitive. An adversary gains physical access
  to an edge device but cannot directly extract the model weights from secure storage
  due to hardware root of trust and secure boot mechanisms. However, they manage to
  observe the power consumption patterns of the AI 100 while feeding carefully crafted
  input images to the deployed model. Describe how they might attempt to reconstruct
  the model architecture or key parameters, and what unique challenges or opportunities
  the Qualcomm Cloud AI 100's architecture presents for such an attack, considering
  its specialized AI cores and on-die SRAM.
question: How would you mitigate power-side-channel model extraction on the Cloud
  AI 100 despite secure boot and physical access?
details:
  realistic_solution: Implement power-side-channel countermeasures at the software
    and hardware level. Software-wise, consider obfuscating inference patterns (e.g.,
    dummy operations, random delays, batching unrelated inferences) to decorrelate
    power signatures from specific model operations. Hardware-wise, explore dynamic
    voltage and frequency scaling (DVFS) randomization or dedicated hardware security
    modules that can introduce noise or normalize power consumption during sensitive
    computations. Furthermore, model quantization and compression (INT8, as used by
    AI 100) can make extraction harder by reducing precision, but also potentially
    create more distinct power signatures if not properly handled.
  common_mistake: Assuming hardware security features (like secure boot/hardware root
    of trust) completely eliminate all forms of intellectual property theft, overlooking
    side-channel vulnerabilities like power analysis, especially in edge deployments
    with physical access.
  napkin_math: Given the 75W TDP and the potential for fine-grained power monitoring,
    an adversary could achieve high temporal resolution in power traces. If a single
    INT8 operation on an AI core consumes, say, 0.1 pJ, and an inference involves
    10^9 operations, the total energy is 0.1 mJ (10^9 × 0.1×10^-12 J = 10^-4 J = 0.1
    mJ). If this takes 10ms, the average power is 0.01W (0.1mJ / 10ms = 0.01W). However,
    the *fluctuations* around this average, tied to specific core activities, are
    key. Estimate how many distinct operations (e.g., convolution layers, activation
    functions) can be differentiated if the power measurement resolution is 1mW and
    the duration of each operation is in microseconds, considering the 144MB on-die
    SRAM access patterns versus LPDDR4x access patterns.
