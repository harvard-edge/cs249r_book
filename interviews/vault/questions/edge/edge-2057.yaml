title: Model Extraction Attack on Qualcomm Cloud AI 100
scenario: An adversary gains physical access to an edge device running a proprietary model on a Qualcomm Cloud AI 100. They cannot extract weights due to secure boot, but they monitor the power consumption patterns while feeding crafted input images.
question: How would you mitigate power-side-channel model extraction on the Cloud AI 100 despite secure boot and physical access?
details:
  realistic_solution: Implement aggressive power side-channel mitigation using Differential Power Analysis (DPA) countermeasures. At the software level, inject randomized dummy operations, shuffle layer execution orders where commutative, and employ constant-time cryptographic-style programming paradigms to decorrelate power consumption from specific activation patterns. At the hardware level, leverage Dynamic Voltage and Frequency Scaling (DVFS) injection or dedicated hardware noise generators to drown out the micro-watt fluctuations caused by distinct memory access patterns (SRAM vs LPDDR4x) and INT8 MAC activations.
  common_mistake: |
    **The Pitfall:** Assuming static hardware encryption and secure boot are sufficient defenses against active physical adversaries.
    **The Rationale:** Security engineers rely on data-at-rest and data-in-transit protections, fundamentally misunderstanding that data-in-use creates physical emanations (power/EM) correlated to network architecture.
    **The Consequence:** Proprietary model IP (architecture and weights) is successfully cloned via Simple Power Analysis (SPA), bypassing all encryption layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: ~10^9 operations per inference.
    - Energy per INT8 operation: ~0.1 pJ.
    - Adversary visibility: Capable of resolving micro-watt fluctuations.

    **Calculations:**
    - Compute energy per inference = 10^9 Ops * (0.1 * 10^-12 J/Op) = 10^-4 Joules (0.1 mJ).
    - Average compute power over a 10ms window = 0.1 mJ / 0.01 s = 0.01 Watts.

    **Conclusion & Interpretation:**
    - **Result: 0.01W Fluctuation (Vulnerable-to-Side-Channels)**. While small, this fluctuation is highly observable, requiring active noise injection to mask memory and compute signatures.
