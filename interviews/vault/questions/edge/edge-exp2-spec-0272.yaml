title: Inference Compute Specification for Cloud AI 100
scenario: You are tasked with specifying the compute execution strategy for a high-throughput computer
  vision pipeline deploying on an on-premise Qualcomm Cloud AI 100. The system must process multiple camera
  streams efficiently. Given the hardware's 400 TOPS INT8 peak compute, 32 GB of LPDDR4x memory, and strict
  75W TDP limit, analyze the system requirements to specify the optimal execution model. How do you balance
  batch size and operational intensity to maximize the INT8 compute utilization without hitting the LPDDR4x
  memory bandwidth wall?
question: "How do you balance batch size and operational intensity to maximize the INT8 compute utilization without hitting the LPDDR4x memory bandwidth wall?"
details:
  realistic_solution: The specification must dictate a batched execution model to increase operational
    intensity (compute operations per byte accessed). By analyzing the compute-to-memory ratio, the candidate
    should specify a batch size large enough to ensure model weights, once loaded into the local SRAM
    from the 32 GB LPDDR4x, are reused across multiple inputs. Using INT8 maximizes both the 400 TOPS
    compute units and effectively halves the memory bandwidth pressure compared to FP16.
  common_mistake: Candidates often assume the theoretical 400 TOPS is easily reachable and specify a batch
    size of 1 to minimize latency. They fail to analyze the operational intensity and ignore that LPDDR4x
    memory bandwidth will heavily bottleneck the execution if weights are loaded for every single input.
  napkin_math: 'Assuming typical LPDDR4x bandwidth of ~136 GB/s and a 400 TOPS INT8 peak capacity. For
    a model requiring 10 GOPs per frame and having 2 GB of INT8 weights: At batch size 1, reading 2 GB
    of weights takes 14.7ms (136 GB/s), capping throughput at 68 FPS (680 GOPs/s, or 0.17% compute utilization).
    To reach 50% compute utilization (200 TOPS, or 20,000 FPS), the specification must require a batch
    size of at least 20,000 / 68 ≈ 294 to amortize the 2 GB weight read over enough frames to prevent
    memory starvation.'
