title: The Distillation Performance Trap
scenario: Your team is optimizing a perception model for an autonomous vehicle's forward-facing camera. The system runs on a Jetson AGX Orin and has a hard real-time deadline of 33ms per frame (30 FPS). The current ResNet-based detection model is heavily optimized with TensorRT and runs in 22ms, meeting the deadline.
question: Why could a lower-FLOP custom replacement for ResNet's Conv-BN-ReLU blocks run slower than the 22ms TensorRT baseline?
details:
  realistic_solution: The optimization strategy failed because it traded a compute-bound problem for a memory-bound one by breaking operator fusion. The original ResNet, composed of standard `Conv-BN-ReLU` blocks, was aggressively fused by the TensorRT compiler into a small number of large, efficient GPU kernels. In a fused kernel, the intermediate data (e.g., the output of the Conv, which is the input to the BN) stays in fast on-chip L2 cache or registers.
  common_mistake: |
    **The Pitfall:** Focusing only on arithmetic and assuming fewer FLOPs always means faster inference.
    **The Rationale:** Missing the systemic hardware interaction where breaking operator fusion forces intermediate data to spill from cache back to main memory.
    **The Consequence:** Deploying a "lighter" model that actually increases latency by 3x due to severe memory-bound thrashing.
  napkin_math: |
    - Fused Conv-BN-ReLU: Reads input+weights (12MB), writes output (10MB). Total traffic = 22MB.
    - Time (Fused) = 22MB / 204.8 GB/s = 0.1ms.
    - Unfused custom op: Conv writes 10MB. BN reads 10MB, writes 10MB. ReLU reads 10MB, writes 10MB.
    - Total traffic (Unfused) = 62MB.
    - **Result: Time (Unfused) = 62MB / 204.8 GB/s = 0.3ms. Latency increases 3x.**
