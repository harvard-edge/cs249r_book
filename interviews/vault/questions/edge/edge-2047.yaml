title: 'Designing an ISO 26262 ASIL-B Perception System on Hailo-8'
scenario: 'You are tasked with designing a perception system for an autonomous driving feature (e.g., parking assist) that requires an ASIL-B functional safety level according to ISO 26262. The system utilizes a deep learning model running on a Hailo-8 AI processor, which provides 26 TOPS (INT8) within a 2.5W power envelope. The primary challenge is to ensure deterministic execution, implement necessary self-test routines, and integrate watchdog timers to meet the ASIL-B requirements, while also adhering to a 100ms end-to-end latency budget for perception.'
question: 'How would you architect an ASIL-B Hailo-8 perception pipeline with deterministic latency, watchdogs, self-tests, and fault responses within 100 ms?'
details:
  realistic_solution: 'Implement a multi-layered safety strategy leveraging Hailo-8''s deterministic dataflow architecture. Integrate specialized software watchdog timers that monitor host CPU and inference pipeline health. Employ periodic self-test routines and diverse redundancy for critical outputs. Use strict scheduling to minimize latency variance. Thorough FMEA and fault injection testing are required.'
  common_mistake: 'Ignoring the non-deterministic aspects of typical deep learning inference engines and assuming standard software watchdog implementations are sufficient for safety certification.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 compute: 26 TOPS (26,000 GOPS) INT8.
    - End-to-end latency budget: 100ms.
    - Target deterministic utilization window: 30ms max for model compute.

    **Calculations:**
    - 50 GOPS model ideal compute time: (50 / 26,000) * 1000 ms ≈ 1.9 ms.
    - 30ms deterministic window allows models up to: 26,000 GOPS * (30 / 1000) = 780 GOPS.
    - The 50 GOPS model leaves ~28ms of compute headroom purely for safety checks.

    **Conclusion & Interpretation:**
    - **Result: 1.9ms Compute Time (Compute-Bound)**. A 50 GOPS model easily fits within the deterministic window, leaving ample headroom for ASIL-B self-tests and watchdogs.
