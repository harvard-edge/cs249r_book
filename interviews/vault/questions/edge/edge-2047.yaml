title: Designing an ISO 26262 ASIL-B Perception System on Hailo-8
scenario: You are tasked with designing a perception system for an autonomous driving
  feature (e.g., parking assist) that requires an ASIL-B functional safety level according
  to ISO 26262. The system utilizes a deep learning model running on a Hailo-8 AI
  processor, which provides 26 TOPS (INT8) within a 2.5W power envelope. The primary
  challenge is to ensure deterministic execution, implement necessary self-test routines,
  and integrate watchdog timers to meet the ASIL-B requirements, while also adhering
  to a 100ms end-to-end latency budget for perception. Describe your architectural
  approach, including how you would manage inference latency predictability, error
  detection, and response mechanisms on this specific hardware, considering its dataflow
  architecture.
question: How would you architect an ASIL-B Hailo-8 perception pipeline with deterministic
  latency, watchdogs, self-tests, and fault responses within 100 ms?
details:
  realistic_solution: Implement a multi-layered safety strategy. At the hardware level,
    leverage Hailo-8's deterministic dataflow architecture by designing the inference
    graph carefully and exploring vendor-provided safety features or diagnostics.
    Integrate specialized software watchdog timers that monitor not just the host
    CPU, but also the health and progress of the inference pipeline stages on the
    Hailo-8. Employ periodic self-test routines (e.g., memory integrity checks, partial
    inference tests with known good inputs, or 'golden path' inference checks) during
    idle cycles or at predefined intervals. Design the perception pipeline with diverse
    redundancy or safety checks for critical outputs. Use strict scheduling and resource
    allocation on the host and accelerator to minimize latency variance. The ASIL-B
    target necessitates robust fault injection testing and thorough FMEA (Failure
    Mode and Effects Analysis) specific to the Hailo-8's operation and integration.
  common_mistake: Ignoring the non-deterministic aspects of typical deep learning
    inference engines and assuming standard software watchdog implementations are
    sufficient, without considering hardware-level dataflow characteristics or dedicated
    safety mechanisms specific to an accelerator like Hailo-8.
  napkin_math: Given the Hailo-8's 26 TOPS (INT8) and a 100ms end-to-end latency budget,
    if a perception model requires 50 GOPS, the Hailo-8 could theoretically process
    it in approximately (50 GOPS / 26,000 GOPS) * 1000 ms ≈ 1.9 ms. This suggests
    ample raw computational headroom. However, for deterministic latency in an ASIL-B
    system, utilization will be kept much lower, perhaps targeting 20-30% of peak
    throughput to ensure consistent execution times and reserve cycles for self-tests,
    watchdog checks, and other safety mechanisms. If the inference itself must deterministically
    complete in 30ms (leaving 70ms for data transfer, pre/post-processing, host CPU
    safety logic, and OS overhead), the model's actual computational demand on the
    Hailo-8 would need to be around (26,000 GOPS * (30ms / 1000ms)) = 780 GOPS, which
    is easily achievable within the 26 TOPS. The key is consistent performance, not
    just peak.
