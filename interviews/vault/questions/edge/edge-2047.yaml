title: Designing an ISO 26262 ASIL-B Perception System on Hailo-8
scenario: 'You are tasked with designing a perception system for an autonomous driving feature (e.g., parking assist) that requires an ASIL-B functional safety level according to ISO 26262. The system utilizes a deep learning model running on a Hailo-8 AI processor, which provides 26 TOPS (INT8) within a 2.5W power envelope. The primary challenge is to ensure deterministic execution, implement necessary self-test routines, and integrate watchdog timers to meet the ASIL-B requirements, while also adhering to a 100ms end-to-end latency budget for perception.'
question: 'How would you architect an ASIL-B Hailo-8 perception pipeline with deterministic latency, watchdogs, self-tests, and fault responses within 100 ms?'
details:
  realistic_solution: 'Implement a multi-layered safety strategy. At the hardware level, leverage Hailo-8''s deterministic dataflow architecture by designing the inference graph carefully and exploring vendor-provided safety features or diagnostics. Integrate specialized software watchdog timers that monitor not just the host CPU, but also the health and progress of the inference pipeline stages on the Hailo-8. Employ periodic self-test routines (e.g., memory integrity checks, partial inference tests with known good inputs, or ''golden path'' inference checks) during idle cycles or at predefined intervals. Design the perception pipeline with diverse redundancy or safety checks for critical outputs. Use strict scheduling and resource allocation on the host and accelerator to minimize latency variance. The ASIL-B target necessitates robust fault injection testing and thorough FMEA (Failure Mode and Effects Analysis) specific to the Hailo-8''s operation and integration.'
  common_mistake: |
    **The Pitfall:** Ignoring the non-deterministic aspects of typical deep learning inference engines.
    **The Rationale:** Candidates often assume standard software watchdog implementations are sufficient for safety certification.
    **The Consequence:** The system fails ASIL-B requirements because it lacks hardware-level dataflow consideration and dedicated safety mechanisms specific to an accelerator like the Hailo-8.
  napkin_math: |
    * Given the Hailo-8's 26 TOPS (INT8) and a 100ms end-to-end latency budget, if a perception model requires 50 GOPS, the Hailo-8 could theoretically process it in approximately (50 GOPS / 26,000 GOPS) * 1000 ms ≈ 1.9 ms.
    * For deterministic latency in an ASIL-B system, utilization is kept much lower, targeting 20-30% of peak throughput to ensure consistent execution times and reserve cycles for safety checks.
    * If the inference itself must deterministically complete in 30ms (leaving 70ms for data transfer, pre/post-processing, and safety logic), the model's actual computational demand could be up to 26,000 GOPS * (30ms / 1000ms) = 780 GOPS.
    * **A 50 GOPS model easily fits within the deterministic window, leaving ample headroom for ASIL-B self-tests and watchdogs.**
