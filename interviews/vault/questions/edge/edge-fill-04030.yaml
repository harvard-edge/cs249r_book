title: Congestion Avoidance in Multi-Sensor Edge Inference Pipelines
scenario: You run a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) at an autonomous vehicle edge node.
  The Orin receives sensor streams from 6 cameras (each 30 fps, 4 MB/frame compressed) and 1 LiDAR (10
  fps, 50 MB/scan) over a PCIe-attached Ethernet NIC (10 GbE). During peak load, sensor data arrives at
  6×30×4 + 10×50 = 1,220 MB/s but the NIC is only 1.25 GB/s. You observe dropped LiDAR frames causing
  inference degradation. Design a congestion-aware ingestion strategy.
question: "How would you design congestion-aware sensor ingestion to prevent LiDAR drops on the 10 GbE Jetson Orin node?"
details:
  realistic_solution: 'Implement strict-priority queuing at the NIC driver level: LiDAR traffic gets priority
    class 7 (highest), camera streams share priority class 4. Configure interrupt coalescing for cameras
    (batch 5 frames before DMA) to reduce PCIe contention. Apply intra-pipeline backpressure: if the Orin
    inference queue depth exceeds 3 frames, drop the lowest-priority camera frames first using a weighted
    drop policy.'
  common_mistake: Treating all sensor streams with equal priority. Camera frames can tolerate 1-2 frame
    drops without significant model quality loss, while missing a LiDAR scan causes 100ms gaps in 3D perception
    that are safety-critical. Round-robin scheduling starves LiDAR when all 6 cameras burst simultaneously.
  napkin_math: 'Peak ingress: 6×120 MB/s (cameras) + 500 MB/s (LiDAR) = 1,220 MB/s. NIC capacity: 10 GbE
    = 1,250 MB/s. Headroom: 30 MB/s (2.4%). Any burst causes drops. LiDAR frame: 50 MB. Drop cost: 1 missed
    scan / 10 Hz = 100ms perception gap. Camera frame: 4 MB. Drop cost: 1/30s = 33ms gap, tolerable for
    camera-only fallback. Priority scheduling ensures LiDAR 500 MB/s is guaranteed; remaining 750 MB/s
    serves cameras, dropping ~40% of camera bandwidth during peak.'
