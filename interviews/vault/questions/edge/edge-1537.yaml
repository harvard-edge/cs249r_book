title: Distillation vs Pruning on Cloud AI 100
scenario: You are deploying a large language model for an on-premise enterprise application using a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The original FP16 model is 70B parameters (140GB), which far exceeds the 32GB memory limit.
question: 'Which compression strategy is better: 80% unstructured pruning + INT8, or Knowledge distillation to a dense 15B parameter student + INT8, and why?'
details:
  realistic_solution: Knowledge distillation to a dense 15B student model is the superior choice. The Qualcomm Cloud AI 100 is designed to deliver massive dense INT8 compute (400 TOPS). A dense 15B model executing in INT8 leverages highly optimized, contiguous matrix multiplication operations, whereas unstructured sparse models suffer from poor cache locality and irregular memory access patterns. The dense student fits perfectly in memory, maximizes the compute engines, and leaves ample room for the KV cache.
  common_mistake: |
    **The Pitfall:** Choosing unstructured pruning because it preserves the original architecture's theoretical capacity.
    **The Rationale:** Unstructured sparsity looks great on paper for reducing parameter count without losing representational power.
    **The Consequence:** Unstructured sparse models suffer from poor cache locality and irregular memory access patterns. On dense matrix accelerators, this results in memory bandwidth bottlenecks rather than compute efficiency, leading to suboptimal performance.
  napkin_math: |
    *   **Dense 15B student (INT8):** 15B parameters * 1 byte/param = 15 GB memory. Fits comfortably in 32 GB, leaving 17 GB for KV cache/OS.
    *   **Compute time per token (15B dense):** ~30 GOPS. With 400 TOPS, compute time is ~0.075 ms (purely memory bandwidth bounded).
    *   **Pruned 70B model (80% sparse, INT8):** 70B * 0.2 * 1 byte = 14 GB for weights.
    *   **Overhead:** Significant memory overhead for sparsity indices.
    *   **Conclusion:** The **15B dense model** provides much better effective bandwidth utilization than the irregular memory fetches of the pruned model.
