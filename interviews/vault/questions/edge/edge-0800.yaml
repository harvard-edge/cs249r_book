title: The Unverifiable Edge Inference
scenario: Your company develops smart cameras for retail analytics. These cameras perform on-device ML
  inference (e.g., people counting, dwell time) and only send aggregated, anonymized data to the cloud.
  However, clients are concerned about the integrity and auditability of these local inferences, especially
  if disputes arise. How do you design the system to ensure data provenance and tamper-proof audit trails
  for on-device ML inferences, even with limited storage and intermittent cloud connectivity?
question: "How do you design the system to ensure data provenance and tamper-proof audit trails for on-device ML inferences, even with limited storage and intermittent cloud connectivity?"
details:
  realistic_solution: "Implement cryptographic and system-level mechanisms for data provenance and tamper-proof\
    \ logging:\n  1.  **Cryptographic Hashing for Inference Logs:** For each ML inference (e.g., a count,\
    \ a detection event), generate a log entry containing the inference result, timestamp, model version,\
    \ and relevant metadata. Crucially, compute a cryptographic hash (e.g., SHA256) of this log entry.\n\
    \  2.  **Chaining Hashes (Blockchain-like):** To prevent tampering with historical logs, each new\
    \ log entry's hash should include the hash of the *previous* log entry. This creates an immutable\
    \ chain: any alteration of a past entry would invalidate all subsequent hashes, making tampering detectable.\n\
    \  3.  **Digital Signatures:** Periodically (e.g., hourly, daily) sign a batch of these chained hashes\
    \ with the device's unique private key. This signature proves the logs originated from that specific\
    \ device and haven't been altered since signing. The public key is known to the cloud.\n  4.  **Secure\
    \ Storage (Local):** Store these chained and signed logs in a secure, write-once, read-many (WORM)\
    \ partition or encrypted storage on the edge device. Use a robust file system that can handle power\
    \ loss.\n  5.  **Intermittent Cloud Synchronization:** When connectivity is available, securely upload\
    \ these signed log batches to the cloud. The cloud service verifies the digital signature and the\
    \ hash chain. If a discrepancy is found, it flags potential tampering.\n  6.  **Minimal Raw Data Snapshots\
    \ (Optional & Privacy-Controlled):** For debugging or dispute resolution, if strictly necessary and\
    \ with user consent, the device could be configured to store *very short* snippets of raw input data\
    \ (e.g., a few frames before/after an event) associated with specific flagged inferences. These must\
    \ be heavily anonymized, encrypted, and automatically purged after a short period. Access should be\
    \ highly restricted.\n  7.  **Attestation & Secure Boot:** Ensure the device boots securely and runs\
    \ authenticated firmware/software. This prevents an attacker from loading a modified OS that bypasses\
    \ logging mechanisms."
  common_mistake: '"Just send raw data to the cloud if there''s a dispute." This violates privacy policies
    and the core design principle of edge processing to minimize data transfer and ensure privacy.'
  napkin_math: A SHA256 hash is 32 bytes. If an inference log entry is 100 bytes and there are 10 inferences/second,
    that's 1KB/sec of log data. Hashing and signing adds minimal overhead (microseconds). If logs are
    batched hourly, a 3.6MB log file would be signed once. Over a month, this is ~2.6GB of secure logs.
