title: 'Model Size Estimation: Diagnose GPU Memory OOM on Jetson Orin for Batch Inference'
scenario: 'A Jetson Orin deployment OOMs (CUDA error: out of memory) when increasing batch size from 4
  to 8 for a YOLOv8-l model (43.7M params FP16, 165 GFLOPs). At batch=4 it uses 3.2GB. Diagnose what causes
  the jump and compute the maximum feasible batch size.'
question: "What is causing the OOM when moving from batch 4 to 8, and what maximum batch size should fit on the Jetson Orin?"
details:
  realistic_solution: 'Weights: 87.4MB (FP16). At batch=4: activations = (3.2GB - 0.087GB)/4 = 778MB per
    4-batch? No: 3.2GB total for batch=4 includes all activations for batch=4 simultaneously. Per-item
    activation: ~780MB/4=195MB. At batch=8: 8×195MB=1.56GB activations + 87.4MB weights = 1.65GB? But
    measured 3.2GB at batch=4 suggests peak activation for batch=4 is ~3.1GB — not per-item. YOLOv8 feature
    pyramid stores multi-scale features simultaneously. Max batch: 32GB LPDDR5, available for inference
    ~25GB. 3.1/4 per batch × max_batch = 25 → max_batch ≈ 32. OOM at batch=8 means peak activation is
    superlinear — check for skip connection buffer accumulation.'
  common_mistake: Assuming memory scales linearly with batch size; activation memory scales linearly,
    but intermediate feature maps in YOLOv8 (with skip connections and feature pyramid) can create non-linear
    memory spikes.
  napkin_math: 'Jetson Orin shared LPDDR5 (GPU+CPU). OS+CPU: 6GB. GPU available: 26GB. Batch=4: 3.2GB.
    Memory per batch item: 3.2GB/4=0.8GB. Batch=8: 6.4GB. Should fit in 26GB. OOM at batch=8 suggests
    fragmentation or other GPU memory users (camera ISP, encoder). Fix: use nvidia-smi dmon to check other
    consumers. Or: explicit memory limit --gpu-memory-fraction=0.7 → 26×0.7=18.2GB max → batch=22 max.'
