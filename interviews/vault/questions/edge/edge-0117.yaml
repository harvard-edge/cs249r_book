title: Pruning for Parallelism
scenario: 'You are tasked with optimizing a convolutional neural network on a NVIDIA Jetson AGX Orin, which has hardware-accelerated Tensor Cores. Your goal is to use pruning to reduce the model''s latency.'
question: 'To achieve a real-world speedup with the TensorRT runtime, which fundamental type of pruning should you recall as the most effective starting point?'
details:
  realistic_solution: 'Structured pruning is the correct approach. This method removes entire channels or filters, preserving the dense, regular, and contiguous blocks of data essential for high-throughput computation on parallel hardware like GPU Tensor Cores.'
  common_mistake: |
    **The Pitfall:** Choosing unstructured pruning.
    **The Rationale:** Engineers assume any reduction in parameters directly translates to a latency decrease.
    **The Consequence:** Unstructured pruning creates sparse matrices with scattered memory accesses, breaking contiguous memory reads and preventing TensorRT from accelerating the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin Ridge Point is ~1,342 Ops/Byte.

    **Calculations:**
    - Unstructured pruning reduces total ops but adds scattered memory reads, reducing Ops/Byte well below 1,342.

    **Conclusion & Interpretation:**
    - **Result: Sub-1,342 Ops/Byte (Memory-Bandwidth-Bound)**. Unstructured pruning destroys spatial locality, dropping operations per byte below the ridge point and making the model heavily memory-bound.
