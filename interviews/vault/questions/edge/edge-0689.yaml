title: The Night Scene Calibration Failure
scenario: You INT8-quantized your pedestrian detection model using PTQ. Daytime accuracy drops 2% — acceptable.
  But your test suite reveals nighttime recall drops 15%. The safety team blocks deployment. Your calibration
  dataset had 1000 images. What went wrong?
details:
  realistic_solution: 'Your 1000 calibration images were predominantly daytime scenes (reflecting the
    training distribution). PTQ set the quantization ranges based on daytime activation statistics — bright,
    high-contrast features with large activation magnitudes. Nighttime pedestrians produce activations
    in the low-magnitude tail of the distribution. With per-tensor quantization, the step size is set
    by the max activation value (dominated by daytime). Nighttime activations, being 10-50× smaller, get
    crushed into just a few quantization bins, destroying the signal. Fixes: (1) curate a calibration
    dataset that represents the full operating domain — 50% day, 30% night, 20% twilight/rain, (2) switch
    from per-tensor to per-channel quantization, which sets independent ranges per output channel and
    is more robust to distribution variation, (3) use percentile calibration (99.99th percentile instead
    of min/max) to clip outliers and give more precision to the common range.'
  common_mistake: '"INT8 is too aggressive for night scenes — use FP16 at night." This doubles your compute
    cost and doesn''t explain the root cause.'
  napkin_math: 'Per-tensor INT8 range set by daytime max activation = 10.0. Step size = 10.0 / 127 = 0.079.
    Nighttime pedestrian activations in range [0.01, 0.05]: only (0.05 - 0.01) / 0.079 = **0.5 bins**
    — the entire signal collapses to a single quantized value. Per-channel quantization: if the relevant
    channel''s max = 0.1, step size = 0.1/127 = 0.0008 → nighttime range spans 50 bins. Signal preserved.'
