title: The Night Scene Calibration Failure
scenario: You INT8-quantized your pedestrian detection model using PTQ. Daytime accuracy
  drops 2% — acceptable. But your test suite reveals nighttime recall drops 15%. The
  safety team blocks deployment. Your calibration dataset had 1000 images.
question: What went wrong with the INT8 PTQ calibration?
details:
  realistic_solution: 'Your 1000 calibration images were predominantly daytime scenes
    (reflecting the training distribution). PTQ set the quantization ranges based
    on daytime activation statistics — bright, high-contrast features with large activation
    magnitudes. Nighttime pedestrians produce activations in the low-magnitude tail
    of the distribution. With per-tensor quantization, the step size is set by the
    max activation value (dominated by daytime). Nighttime activations, being 10-50×
    smaller, get crushed into just a few quantization bins, destroying the signal.
    Fixes: (1) curate a calibration dataset that represents the full operating domain,
    (2) switch from per-tensor to per-channel quantization, (3) use percentile calibration.'
  common_mistake: '**The Pitfall:** Assuming INT8 is fundamentally too aggressive
    for night scenes and reverting to FP16.

    **The Rationale:** Candidates fail to understand how per-tensor PTQ calibration
    ranges are dominated by high-magnitude daytime activations.

    **The Consequence:** Reverting to FP16 doubles the compute cost and memory bandwidth
    without addressing the actual calibration flaw.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Per-tensor INT8 range set by daytime max = 10.0.

    - Nighttime pedestrian activations: [0.01, 0.05].


    **Calculations:**

    - Step size = 10.0 / 127 = 0.079.

    - Available bins for nighttime: (0.05 - 0.01) / 0.079 = 0.5 bins (signal collapses).

    - Per-channel quantization: Channel max = 0.1, Step size = 0.1 / 127 = 0.0008.


    **Conclusion & Interpretation:**

    - **Result: 0.5 bins (Quantization-Bound)**. Per-channel quantization provides
    ~50 bins for nighttime activations, fully preserving the signal.

    '
