title: Memory for Multi-Camera Tracking
scenario: 'Your edge device (Jetson Orin NX, 16 GB LPDDR5) processes 4 camera streams
  simultaneously for a warehouse tracking system. Each camera delivers 1080p (1920×1080)
  at 30 FPS in NV12 format. The pipeline for each stream: decode → resize to 640×640
  → run YOLOv8n → track (DeepSORT with ReID embeddings). Estimate the total memory
  footprint and determine if 16 GB is sufficient.'
question: What is the total memory footprint for the 4-camera YOLOv8n plus DeepSORT
  pipeline, and is 16 GB sufficient?
details:
  realistic_solution: 'Build a complete memory budget. Per-stream: decode buffers
    (2x 3.1 MB NV12 = 6.2 MB), resize buffer (1.2 MB), YOLOv8n weights (6.3 MB, shared),
    inference activations (~50 MB), DeepSORT tracker state (128-dim embeddings x 200
    tracks = ~0.1 MB). Total per-stream unique: ~57.5 MB. Four streams: 4 x 57.5 +
    6.3 (shared weights) = 236.3 MB. Add CUDA context (~300 MB), TensorRT engine cache
    (~200 MB), OS overhead (~1 GB). Grand total: ~1.7 GB. At 3 GB / 16 GB = 19% memory
    utilization, the system is safe. The real limit is GPU compute: 120 inferences/sec
    at 3ms each = 36% GPU utilization.'
  common_mistake: '"4 cameras × 1080p × 30 FPS — just multiply frame size by 4. It''s
    a few hundred MB." This counts only the raw frames and ignores the pipeline buffers,
    model weights, tracking state, and GPU memory fragmentation that dominate real
    memory usage.'
  napkin_math: 'Memory capacity: 3.0 GB / 16 GB = 19%. Safe. Memory bandwidth: 4 cameras
    × 30 FPS × (3.1 MB decode + 4.9 MB resize + ~20 MB inference activations) = 4
    × 30 × 28 = 3360 MB/s = 3.36 GB/s. Orin NX bandwidth: 102.4 GB/s. Bandwidth utilization:
    ~3.3%. Also safe. The system could handle 12+ cameras before hitting either limit.
    Practical limit: GPU compute (4 × YOLOv8n at 30 FPS = 120 inferences/sec × ~3ms
    each = 360ms/s of GPU time — 36% GPU utilization).'
