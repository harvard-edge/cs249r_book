title: Memory for Multi-Camera Tracking
scenario: Your edge device (Jetson Orin NX, 16 GB LPDDR5) processes 4 camera streams simultaneously for a warehouse tracking system. Each camera delivers 1080p (1920x1080) at 30 FPS in NV12 format. The pipeline for each stream: decode -> resize to 640x640 -> run YOLOv8n -> track (DeepSORT with ReID embeddings).
question: What is the total memory footprint for the 4-camera pipeline, and is 16 GB sufficient?
details:
  realistic_solution: Build a complete memory budget. Per-stream unique buffers sum to ~57.5 MB. Four streams plus shared weights take 236.3 MB. Add CUDA context (~300 MB), TensorRT engine cache (~200 MB), OS overhead (~1 GB). Grand total is ~1.7 GB, perfectly safe for a 16 GB system.
  common_mistake: |
    **The Pitfall:** Simply multiplying the raw frame size by the number of cameras.
    **The Rationale:** Candidates fail to account for the pipeline buffers, shared model weights, OS overhead, and framework context memory.
    **The Consequence:** Inaccurately estimating memory usage, sometimes missing the dominant memory consumers like the OS and CUDA context.
  napkin_math: |
    - **Per-stream buffers:** Decode buffers (2x 3.1 MB NV12 = 6.2 MB), resize buffer (1.2 MB), inference activations (~50 MB), tracker state (~0.1 MB). Total unique = ~57.5 MB.
    - **Four streams:** 4 * 57.5 MB + 6.3 MB (shared weights) = 236.3 MB.
    - **Overhead:** Add CUDA context (~300 MB), TensorRT engine cache (~200 MB), OS overhead (~1 GB).
    - **Total footprint:** ~1.7 GB.
    - **Bandwidth check:** 4 streams * 30 FPS * 54.3 MB = 6.52 GB/s, well within the 102.4 GB/s limit.
    - **Final result:** **At 1.7 GB / 16 GB = 11% utilization, memory capacity is extremely safe.**
