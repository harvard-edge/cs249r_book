title: Extreme Quantization of Vision Transformer on Hailo-8
scenario: You are a lead ML engineer tasked with deploying a large vision transformer model, initially
  trained in FP32, onto an edge device constrained by a strict power budget and low latency requirements.
  Your target hardware is the Hailo-8, which boasts 26 TOPS (Tera Operations Per Second) for INT8 computations
  with a typical power consumption of 2.5W. To meet the stringent memory footprint and real-time inference
  demands, you propose leveraging sub-4-bit quantization, specifically targeting 2-bit weights. Detail
  your strategy for quantizing this model, including the choice of quantization methods (e.g., GPTQ, AWQ,
  or binary/ternary networks), how you would address potential accuracy degradation, and how you would
  specifically map and optimize these sub-4-bit operations to efficiently utilize the Hailo-8's INT8 compute
  capabilities. Discuss the trade-offs and potential performance gains.
details:
  realistic_solution: 1. Establish an INT8 quantized baseline using standard Post-Training Quantization
    (PTQ) for comparison. 2. Employ advanced PTQ techniques like GPTQ or AWQ for weight-only sub-4-bit
    (e.g., 2-bit or 3-bit) quantization, as these methods are designed to minimize per-layer quantization
    error. 3. Carefully evaluate activation quantization; a mixed-precision approach (e.g., INT8 activations
    with 2-bit weights) may be necessary to preserve accuracy. 4. For Hailo-8's INT8 engine, sub-4-bit
    weights will be packed into 8-bit words (e.g., four 2-bit weights per INT8). The optimization lies
    in efficient packing/unpacking and leveraging the reduced memory bandwidth due to smaller model size.
    5. If accuracy is still insufficient, consider minimal Quantization-Aware Training (QAT) with a small,
    representative dataset, or explore architectural modifications specific to binary/ternary networks
    if extreme accuracy recovery is critical. 6. Thoroughly profile the quantized model on Hailo-8 to
    ensure latency, throughput, and power targets are met.
  common_mistake: A common mistake is to naively apply uniform sub-4-bit quantization without considering
    model-specific activation distributions or advanced calibration techniques, leading to significant
    and often unrecoverable accuracy degradation (e.g., >10% top-1 accuracy loss). Another mistake is
    to assume direct native hardware support for arbitrary sub-INT8 bitwidths, rather than understanding
    how these are packed and executed on an INT8-native accelerator like Hailo-8.
  napkin_math: 'For a vision transformer with ~100M parameters:

    - FP32 model size: 100M * 4 bytes = 400 MB.

    - INT8 model size: 100M * 1 byte = 100 MB.

    - 2-bit weight-only model size: 100M * 0.25 bytes = 25 MB. This represents a 16x reduction from FP32,
    significantly improving memory bandwidth efficiency and cache hit rates on the Hailo-8.

    - Hailo-8 provides 26 TOPS INT8. While 2-bit operations aren''t native, packing four 2-bit weights
    into one INT8 word means the memory fetches for weights are 4x more efficient than INT8 for the same
    number of logical operations. The compute unit performs INT8 operations, so effective 2-bit throughput
    gains come primarily from memory bandwidth reduction and potentially higher frequency utilization
    due to less data movement, rather than a direct multiplication of TOPS.'
