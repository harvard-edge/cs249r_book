title: The Perception of Speed on Edge Devices
scenario: You are optimizing a local voice assistant on a smart display. User feedback indicates the device
  'feels slow' when asked a question. The system uses a small language model to generate answers. Which
  of the following metrics is the most crucial to minimize to address the user's perception of slowness?
question: "Which of the following metrics is the most crucial to minimize to address the user's perception of slowness?"
details:
  realistic_solution: Time to First Token (TTFT) is the most critical metric for perceived responsiveness.
    TTFT measures the 'thinking time' from the end of the user's prompt to the generation of the first
    output token. A low TTFT makes the system feel instantaneous, even if the subsequent tokens are generated
    more slowly. A high TTFT creates a noticeable, frustrating delay for the user.
  common_mistake: Focusing only on the raw generation speed (e.g., tokens per second) rather than the
    initial delay. A system can generate text very quickly (high TPOT), but if there's a long pause after
    the user finishes speaking (high TTFT), the interaction feels laggy and unresponsive.
  napkin_math: 'System A: TTFT = 250ms, TPOT = 100ms/token. System B: TTFT = 1,200ms, TPOT = 50ms/token.
    The user perceives System A as much faster because it starts responding in 0.25 seconds. The 1.2-second
    pause before System B responds makes it feel broken, even though its subsequent tokens generate twice
    as fast.'
  options:
  - Time to First Token (TTFT)
  - Time per Output Token (TPOT)
  - Peak Memory Usage
  - Model FLOPS
