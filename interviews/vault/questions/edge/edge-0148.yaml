title: The Perception of Speed on Edge Devices
scenario: You are optimizing a local voice assistant on a smart display. User feedback indicates the device 'feels slow' when asked a question. The system uses a small language model to generate answers.
question: Which of the following metrics is the most crucial to minimize to address the user's perception of slowness?
details:
  realistic_solution: Time to First Token (TTFT) is the most critical metric for perceived responsiveness. TTFT measures the 'thinking time' from the end of the user's prompt to the generation of the first output token. A low TTFT makes the system feel instantaneous, even if the subsequent tokens are generated more slowly. A high TTFT creates a noticeable, frustrating delay for the user.
  common_mistake: |
    **The Pitfall:** Focusing only on raw generation speed (tokens per second).
    **The Rationale:** Candidates optimize Time per Output Token (TPOT) instead of the initial 'thinking time'.
    **The Consequence:** A high Time to First Token (TTFT) creates a noticeable delay, making the interaction feel broken even if the final generation is fast.
  napkin_math: |
    * System A: TTFT = 250ms, TPOT = 100ms/token.
    * System B: TTFT = 1,200ms, TPOT = 50ms/token.
    * **System A feels instantaneous (0.25s response), while System B's 1.2s pause makes it feel laggy, despite generating text twice as fast.**
  options:
  - Time to First Token (TTFT)
  - Time per Output Token (TPOT)
  - Peak Memory Usage
  - Model FLOPS
