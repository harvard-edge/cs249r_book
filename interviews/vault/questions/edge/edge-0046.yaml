title: The Post-Repair Calibration Disaster
scenario: An autonomous cart's cracked left camera lens is replaced with the identical model number. Afterward, depth estimation error jumps from 3cm to 40cm on the left side.
question: What did the technician miss during the physical lens replacement?
details:
  realistic_solution: Stereo depth estimation requires precise mathematical knowledge of each camera's intrinsic parameters (focal length, principal point) and extrinsic parameters (relative 3D pose). Even identical lens models have manufacturing variances. The technician failed to run a software factory calibration routine (e.g., OpenCV checkerboard) to recalculate and flash the new intrinsic parameters to the device's configuration file.
  common_mistake: |
    **The Pitfall:** Assuming identical hardware SKUs guarantee identical optical properties.
    **The Rationale:** Treating precision ML optical sensors like standard IT hardware where components are strictly plug-and-play.
    **The Consequence:** Severe degradation of spatial perception models, leading to autonomous collisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Focal length tolerance: ±5% (e.g., ±0.18mm on a 3.6mm lens).
       - Target object distance: 2 meters (200 cm).
    2. **Calculations:**
       - Depth Error from Focal Mismatch: 5% * 200 cm = ±10 cm.
       - Distortion Error (edges): Adds up to ±30 cm.
       - Total Combined Error: 10 cm + 30 cm = ±40 cm.
    3. **Conclusion & Interpretation:**
       - **Result: Calibration-Bound. A mere 5% physical variance translates to 40cm algorithmic depth error, breaking the safety envelope.**
