title: The Tracker Addition Budget
scenario: Your perception stack runs YOLOv8-S detection at 20ms per frame on a Jetson Orin NX, leaving
  13ms of headroom in your 33ms budget. Your team wants to add a Transformer-based tracker (ByteTrack
  with a ReID model, ~15 GFLOPs). The ReID model alone takes 12ms. Your colleague says '20 + 12 = 32ms
  — we fit with 1ms to spare.' Why is this estimate dangerously wrong?
details:
  realistic_solution: 'The 20ms + 12ms = 32ms estimate ignores: (1) **GPU memory contention** — both models
    compete for the same LPDDR5 bandwidth. When running concurrently, memory bandwidth is split, increasing
    compute latency by 15% (+4.8ms). (2) **CUDA context switching** — swapping between two TensorRT engines
    incurs ~1-2ms of overhead per switch. (3) **NMS and post-processing** — detection NMS takes ~3ms on
    dense scenes (not included in the 20ms). (4) **Data transfer** — copying detection crops to the ReID
    model''s input tensor takes ~0.5ms. Realistic total: 20ms (detect) + 12ms (ReID) + 4.8ms (contention)
    + 3ms (NMS) + 0.5ms (copy) + 2ms (context switch) = **42.3ms** → 23 FPS, missing the 30 FPS deadline.
    Fix: use a lightweight tracker (DeepSORT with a MobileNet ReID: 2 GFLOPs, ~3ms) or run the ReID model
    at half rate (every other frame, using motion prediction to interpolate).'
  common_mistake: '"The math works: 32ms < 33ms." This assumes zero overhead and perfect sequential execution.'
  napkin_math: 'Optimistic: 20 + 12 = 32ms. Realistic: 20 (detect) + 12 (ReID) + 4.8 (15% memory contention
    penalty) + 3 (NMS) + 0.5 (copy) + 2 (context switch) = 42.3ms → 23 FPS, missing the 33ms budget. With
    lightweight ReID (3ms): 20 + 3 + 0.5 + 3 + 1 = 27.5ms → 36 FPS ✓. Half-rate heavy ReID: alternating
    20ms and 42.3ms frames → average 31.15ms → 32 FPS ✓.'
