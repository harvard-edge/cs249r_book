title: Multi-Camera Streaming Edge Sizing
scenario: You are deploying a multi-camera real-time quality inspection system in a manufacturing facility using an on-premise edge server equipped with a single 400 TOPS INT8 accelerator. The system ingests uncompressed 1080p video streams at 60 FPS from 20 independent cameras to minimize compression latency.
question: "Can the system handle 20 uncompressed 1080p60 camera streams for a 15 GOPS/frame feature extractor, and where is the bottleneck?"
details:
  realistic_solution: The correct approach is to first quantify the continuous data ingestion bandwidth to ensure the edge server's I/O and the accelerator's memory controller can sustain the stream without dropping frames. After verifying bandwidth, calculate compute utilization to realize that the accelerator is computationally underutilized, leaving room for downstream models.
  common_mistake: |
    **The Pitfall:** Hyper-focusing on compute capacity while ignoring memory bandwidth for continuous ingestion.
    **The Rationale:** Candidates assume accelerator compute (400 TOPS) is the only constraint, failing to verify if the PCIe or LPDDR controllers can sustain 7.4 GB/s of raw uncompressed video.
    **The Consequence:** The system drops frames because it cannot physically ingest the raw streams fast enough, regardless of immense unused compute power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Streams: 20 cameras at 60 FPS.
       - Frame size: 1080p uncompressed = 1920 * 1080 * 3 bytes = 6.22 MB.
       - Accelerator: 400 TOPS INT8 limit.
       - Compute: 15 GOPS/frame.
    2. **Calculations:**
       - Total Bandwidth = 6.22 MB/frame * 60 FPS * 20 cameras = 7,464 MB/s = ~7.46 GB/s.
       - Total Compute = 15 GOPS * 60 FPS * 20 cameras = 18,000 GOPS = 18 TOPS.
       - Compute Utilization = 18 TOPS / 400 TOPS = 4.5%.
    3. **Conclusion & Interpretation:**
       - **Result: 7.46 GB/s Ingest at 4.5% Compute Utilization** (PCIe/Memory Bandwidth-Bound).
