title: Optimizing Object Detection Latency on Google Coral Edge TPU
scenario: A development team is deploying an object detection model (quantized to INT8, optimized for TensorFlow Lite) to a Google Coral Edge TPU USB Accelerator (4 TOPS INT8, ~2W power consumption). The end-to-end latency observed for processing a single camera frame is 150ms.
question: How would you break down the 150 ms Coral Edge TPU frame latency to find whether capture, preprocessing, USB transfer, inference, or postprocessing dominates?
details:
  realistic_solution: 'To realistically decompose latency, one would instrument the code at various stages: 1) Measure sensor acquisition time. 2) Timestamp before and after image preprocessing on the host CPU. 3) Measure the data transfer time from host to Edge TPU (if not negligible for USB). 4) Measure the actual model inference time on the Edge TPU using the Coral API''s profiling tools. 5) Timestamp before and after postprocessing on the host CPU. 6) Timestamp network transmission if results are sent off-device. For TTFT/TPOT, this would apply if the model produced sequential outputs, which is less common for object detection but critical for generative models. The Edge TPU primarily offers single-pass inference. By logging these timestamps, a clear breakdown of the 150ms can be achieved.'
  common_mistake: |
    **The Pitfall:** Solely focusing on the model inference time on the Edge TPU.
    **The Rationale:** Candidates neglect significant latency contributors like slow CPU-bound preprocessing, USB data transfer bottlenecks, or complex postprocessing logic.
    **The Consequence:** Optimizing the wrong part of the pipeline (the already-fast TPU) while ignoring the actual host-side bottlenecks.
  napkin_math: |
    - **Inference time:** At ~400 FPS, inference time is roughly 1/400 s = 2.5 ms.
    - **Overhead:** Total latency is 150ms. 150ms - 2.5ms = **147.5ms overhead**.
    - **Conclusion:** 147.5ms is spent entirely outside of the core TPU inference, suggesting massive bottlenecks in preprocessing, postprocessing, or data transfer.
