title: The Sensor Fusion Traffic Jam
scenario: 'You are an ML Systems Engineer on an autonomous vehicle team. Your vehicle uses a dual-GPU
  edge computer for sensor fusion. GPU-A runs a LiDAR perception model, while GPU-B runs a camera perception
  model. For fusion, GPU-A must send a 1.5 GB feature map to GPU-B every frame. The system is connected
  via a PCIe Gen 4.0 x16 bus (max theoretical bandwidth: 32 GB/s).'
details:
  realistic_solution: The primary bottleneck is the physical bandwidth limit of the PCIe Gen 4.0 bus.
    While its theoretical bandwidth is 32 GB/s, transferring a 1.5 GB payload will take a significant
    portion of the 33ms latency budget, leaving no time for actual computation.
  common_mistake: Engineers often underestimate the sheer data volume of intermediate feature maps in
    real-time systems. They may blame software overhead or other system components before calculating
    the raw data transfer time, failing to see that they are hitting fundamental hardware limits of the
    bus protocol.
  napkin_math: 1.  **Calculate required transfer time:**
  options:
  - The CPU is starving the GPU during sensor data ingestion, which should be optimized first.
  - The PCIe bus is the bottleneck; the transfer time of ~47ms exceeds the 33ms frame budget.
  - The issue is high PCIe protocol overhead; using RDMA would reduce latency below the 33ms budget.
  - NVLink is designed for training, not inference. The problem must be an inefficient CUDA kernel on
    GPU-A.
  correct_index: 1
