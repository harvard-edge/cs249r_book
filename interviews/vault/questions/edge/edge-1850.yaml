title: 'Edge Model Evaluation: Performance and Cost on NVIDIA Jetson Orin'
scenario: 'Your team is tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin for an industrial inspection application. The critical requirement is an inference latency under 50ms per frame. The system must operate 24/7. Model Alpha achieves 92% mAP and requires 12 Tera INT8 Operations (TIOps) per inference. Model Beta achieves 88% mAP and requires 4 Tera INT8 Operations (TIOps) per inference.'
question: 'What FPS and annual electricity cost do Models Alpha and Beta achieve on Jetson Orin, and which would you recommend?'
details:
  realistic_solution: 'A realistic solution requires a multi-faceted approach: Benchmarking with representative data, profiling using nsys profiling to identify bottlenecks, and using TensorRT for graph fusion. Total Cost of Ownership (TCO) analysis must expand beyond electricity to include hardware cost and maintenance, explicitly quantifying the business value of the 4% mAP difference against potential savings.'
  common_mistake: |
    **The Pitfall:** Overlooking the non-linear relationship between theoretical TOPS and real-world inference throughput.
    **The Rationale:** It's easy to just divide peak TOPS by the model's operation count without considering memory bandwidth or thermal throttling.
    **The Consequence:** The theoretical FPS is overestimated, potentially resulting in a deployed system that fails to meet the 50ms latency target in the real world.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin INT8 capacity: 275 TOPS.
       - Alpha: 12 TIOps/inf, 92% mAP.
       - Beta: 4 TIOps/inf, 88% mAP.
       - Continuous power: 50W.
    2. **Calculations:**
       - Alpha FPS: 275 TOPS / 12 TIOps = 22.9 FPS.
       - Alpha Latency: 1 / 22.9 = 43.6 ms.
       - Beta FPS: 275 TOPS / 4 TIOps = 68.75 FPS.
       - Beta Latency: 1 / 68.75 = 14.5 ms.
       - Annual Energy Cost: 0.050 kW * 8760 hours * $0.15/kWh = $65.70.
    3. **Conclusion & Interpretation:**
       - **Result: Both Models Cost Equal Power**. Because both models meet the latency constraint (<50ms) and continuous operation uses the same TDP profile, Alpha provides 4% higher mAP for identical power costs.
