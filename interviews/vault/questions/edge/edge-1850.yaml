title: 'Edge Model Evaluation: Performance and Cost on NVIDIA Jetson Orin'
scenario: 'Your team is tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin (64 GB LPDDR5, 275 TOPS INT8, 60W TDP) for an industrial inspection application. The critical requirement is an inference latency under 50ms per frame. The system must operate 24/7. Model Alpha achieves 92% mAP and requires 12 Tera INT8 Operations (TIOps) per inference. Model Beta achieves 88% mAP and requires 4 Tera INT8 Operations (TIOps) per inference.'
question: 'What FPS and annual electricity cost do Models Alpha and Beta achieve on Jetson Orin, and which would you recommend?'
details:
  realistic_solution: 'A realistic solution requires a multi-faceted approach:\n\n1.  **Benchmarking**: Performing actual inference benchmarks on the Jetson Orin with representative data and batch sizes to validate theoretical TIOps-to-FPS conversions.\n\n2.  **Profiling**: Using NVIDIA tools (e.g., Nsight Systems, jtop) to profile model execution, identify bottlenecks (CPU, GPU, memory I/O), and assess actual power consumption under load.\n\n3.  **Optimization**: Leveraging TensorRT for further model optimization (graph fusion, kernel auto-tuning) on the Jetson.\n\n4.  **Total Cost of Ownership (TCO)**: Expanding cost analysis beyond electricity to include initial hardware cost, potential cooling infrastructure, and maintenance, amortized over the expected lifespan of the device. Crucially, explicitly quantifying the business value of the 4% mAP difference against the potential cost savings/performance headroom.'
  common_mistake: |
    **The Pitfall:** Overlooking the non-linear relationship between theoretical TOPS and real-world inference throughput.
    **The Rationale:** It's easy to just divide peak TOPS by the model's operation count without considering memory bandwidth or thermal throttling.
    **The Consequence:** The theoretical FPS is overestimated, potentially resulting in a deployed system that fails to meet the 50ms latency target in the real world.
  napkin_math: |
    * Jetson Orin INT8 Capacity: 275 TOPS (Tera INT8 Ops/sec).
    * Model Alpha (12 TIOps/inf): 275 / 12 ≈ 22.9 FPS. Latency: 1 / 22.9 ≈ 43.6 ms (Meets <50ms requirement).
    * Model Beta (4 TIOps/inf): 275 / 4 = 68.75 FPS. Latency: 1 / 68.75 ≈ 14.5 ms.
    * Annual Electricity Cost: Continuous operation at 50W (0.050 kW).
    * Hours per year: 24 * 365 = 8760 hours.
    * Energy used: 0.050 kW * 8760 = 438 kWh. Cost at $0.15/kWh = 438 * 0.15 = $65.70.
    * **Both models cost the same $65.70 in power, but Alpha meets the deadline while providing 4% higher mAP.**
