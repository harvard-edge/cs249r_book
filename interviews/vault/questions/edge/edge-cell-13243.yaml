title: Diagnose Dataflow Mismatch Between Hailo-8 and Attention Pattern
scenario: A vision transformer (ViT-S/16) on Hailo-8 achieves 95 FPS for image classification but only
  12 FPS when attention is implemented as explicit QK^T matrix multiply. The Hailo-8 has 13 TOPS and is
  optimized for convolution-heavy workloads. Standard attention requires a dynamic N×N matrix where N=196
  patches. Profiling shows attention consumes 79% of inference time despite being only 23% of FLOPs. Diagnose
  the architectural mismatch.
details:
  realistic_solution: '4.9M MACs at 13 TOPS DLA: 9.8M/13T = 0.75μs (not 25ms — 25ms implies GOPS not TOPS
    hardware).'
  common_mistake: Assuming the FLOPs-to-latency ratio is constant across operation types; Hailo-8's dataflow
    engine is optimized for weight-stationary conv patterns, not dynamic attention's output-stationary
    QK^T.
  napkin_math: 'Jetson Orin: 275 TOPS INT8. 4.9M MACs = 9.8M INT8 ops. At 13 TOPS (DLA only, not full
    275 TOPS): 9.8M / 13T = 7.5×10^-7 s = 0.75μs (not 25ms — 25ms would require 0.39 GOPS, 33,000× slower
    than DLA). Full Orin: 9.8M/275T = 0.036μs.'
