title: Analyzing Fusion Memory Spills on Qualcomm Cloud AI 100
scenario: You are deploying an INT8 vision model to a Qualcomm Cloud AI 100 on-premise inference accelerator. The AOT compiler aggressively fuses operators to maximize compute capacity. Before fusion, a sequence of three identical blocks each required 100 GOPS of compute and 15 MB of intermediate activation memory, easily fitting in the accelerator's 50 MB on-die SRAM. After fusion, the compiler combines them into a single kernel requiring 300 GOPS, but the combined intermediate working set grows to 65 MB, forcing a spill to the LPDDR4x memory (which has an effective bandwidth of 100 GB/s).
question: Why does fusing the three 100-GOPS blocks into one 300-GOPS kernel make inference slower on the Cloud AI 100?
details:
  realistic_solution: The candidate should calculate the execution time for both scenarios to prove the fused version is slower. The unfused kernels are purely compute-bound because their memory footprint stays within the fast SRAM. The fused kernel becomes memory-bound because spilling the excess working set to the LPDDR4x introduces a memory transfer delay that adds directly to the execution latency, overpowering the benefits of fusion.
  common_mistake: |
    **The Pitfall:** Assuming operator fusion always improves performance.
    **The Rationale:** Candidates believe fusion universally reduces kernel launch overhead and memory accesses, forgetting about SRAM capacity limits.
    **The Consequence:** The fused working set spills to slower LPDDR4x memory, introducing a severe bandwidth bottleneck that outweighs the benefits of fusion.
  napkin_math: |
    1. Unfused compute time per kernel = 100 GOPS / 400 TOPS = 0.25 ms.
    2. Total unfused compute for 3 blocks = 0.75 ms. All 15 MB fits in SRAM, so memory latency is hidden.
    3. Fused compute time = 300 GOPS / 400 TOPS = 0.75 ms.
    4. The 65 MB working set exceeds the 50 MB SRAM by 15 MB.
    5. Assuming the 15 MB excess is written to and read from the LPDDR4x (30 MB total transfer).
    6. LPDDR4x transfer time = 30 MB / 100 GB/s = 0.3 ms.
    7. Total fused time = 0.75 ms (compute) + 0.3 ms (memory spill) = **1.05 ms** (a 40% latency increase).
