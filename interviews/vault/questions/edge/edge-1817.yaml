title: Dataflow NAS Constraints for Hailo-8 Accelerator
scenario: We are deploying a multi-camera object detection system for an industrial inspection pipeline using a host processor connected via PCIe to a Hailo-8 accelerator. The Hailo-8 operates as a dataflow accelerator with no local DRAM, meaning it streams all weights and activations directly from host memory. You must analyze the interactions between the host memory bandwidth and the dataflow execution model to define the boundaries of the architecture search space.
question: How should the NAS cost model and search space account for Hailo-8's no-DRAM dataflow architecture and host-memory bandwidth limits?
details:
  realistic_solution: The NAS specification must define a hardware-aware cost model that heavily penalizes memory bandwidth utilization over pure computational FLOPs. Because the Hailo-8 relies on streaming from host memory, the search space should restrict complex branching, favor early spatial downsampling to reduce activation sizes, and prioritize sequence-heavy blocks that can be compiled into a continuous on-chip dataflow without host round-trips.
  common_mistake: |
    **The Pitfall:** Constraining the NAS solely by FLOPs or parameter count.
    **The Rationale:** Applying standard CPU/GPU NAS metrics to a zero-DRAM dataflow architecture.
    **The Consequence:** Discovering models that look computationally efficient but stall completely due to host memory bandwidth bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 Compute: 26 TOPS (13 Tera-MACs/s).
       - Host connection: PCIe Gen3 x4 (~3.9 GB/s throughput).
    2. **Calculations:**
       - Required Arithmetic Intensity = 13,000,000 M-MACs/s / 3,900 MB/s = 3,333 MACs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Blocks with AI < 3333 MACs/byte will stall the pipeline; Bandwidth-Bound.**
