title: The Edge Model A/B Testing
scenario: Your cloud ML team A/B tests model updates by routing 5% of traffic to the new model and comparing
  metrics in real-time. They suggest the same approach for your fleet of 2,000 industrial inspection robots
  running on Hailo-8 (26 TOPS, 2.5W). You push back. Why doesn't cloud-style A/B testing work on edge,
  and what's the alternative?
question: "Why doesn't cloud-style A/B testing work on edge, and what's the alternative?"
details:
  realistic_solution: 'Cloud A/B testing fails on edge because you cannot route traffic between models
    — each device runs exactly one model. Deploying the new model to 5% of devices (100 robots) means
    those 100 robots see 100% new-model behavior, creating high variance and risk. Instead, use shadow
    mode: deploy both models to every device, run the candidate model on every frame without acting on
    its outputs, and log prediction divergences. Upload metrics nightly (86.4 MB/device, 23 min per upload
    at 0.5 Mbps). Compare candidate vs. production predictions across all 2,000 devices with zero production
    risk. Promote the candidate only after fleet-wide statistical significance is established.'
  common_mistake: '"Just deploy the new model to 5% of devices — that''s the same as routing 5% of traffic."
    This conflates traffic routing (cloud) with device-level deployment (edge), ignoring the fundamental
    asymmetry.'
  napkin_math: 'Shadow mode memory: 2 models × 12 MB (Hailo binary) = 24 MB on 1 GB device memory — tight
    but feasible. Shadow inference: production model 8ms + candidate model 8ms = 16ms per frame. At 30
    FPS with 33ms budget: 33 - 8 (production) = 25ms available for shadow → fits. Log storage: 100 bytes/frame
    × 30 FPS × 3600s × 8h = **86.4 MB/day** per device. Nightly upload: 86.4 MB / 0.5 Mbps = 23 min. Fleet-wide
    A/B data: 2000 devices × 86.4 MB = **168.8 GB/day** — manageable with staged uploads.'
