title: The Edge Model A/B Testing
scenario: Your cloud ML team A/B tests model updates by routing 5% of traffic to the new model and comparing metrics in real-time. They suggest the same approach for your fleet of 2,000 industrial inspection robots running on Hailo-8 (26 TOPS, 2.5W). You push back.
question: Why doesn't cloud-style A/B testing work on edge, and what's the alternative?
details:
  realistic_solution: 'Cloud A/B testing fails on edge because you cannot route traffic between models — each device runs exactly one model. Deploying the new model to 5% of devices (100 robots) means those 100 robots see 100% new-model behavior, creating high variance and risk. Instead, use shadow mode: deploy both models to every device, run the candidate model on every frame without acting on its outputs, and log prediction divergences. Upload metrics nightly (86.4 MB/device, 23 min per upload at 0.5 Mbps). Compare candidate vs. production predictions across all 2,000 devices with zero production risk. Promote the candidate only after fleet-wide statistical significance is established.'
  common_mistake: |
    **The Pitfall:** "Just deploy the new model to 5% of devices — that's the same as routing 5% of traffic."
    **The Rationale:** Candidates conflate cloud-based traffic routing with edge device-level deployment, ignoring that a single robot processes 100% of its own physical environment.
    **The Consequence:** Deploying the candidate model to 5% of devices puts 100 physical robots at 100% risk of failure, which is unacceptable for physical systems.
  napkin_math: |
    *   Shadow mode memory: 2 models * 12 MB = 24 MB on 1 GB device memory.
    *   Shadow inference latency: production (8ms) + candidate (8ms) = 16ms per frame (fits within 33ms budget at 30 FPS).
    *   Log storage: 100 bytes/frame * 30 FPS * 3600s * 8h = 86.4 MB/day per device.
    *   Nightly upload: 86.4 MB / 0.5 Mbps = ~23 minutes.
    *   Fleet-wide A/B data: 2,000 devices * 86.4 MB = **172.8 GB/day (manageable with staged uploads).**
