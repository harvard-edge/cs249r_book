title: The Drone Vision Architecture Debate
scenario: 'You are designing a vision system for a delivery drone that uses a Hailo-8 edge accelerator
  (26 TOPS, ~2.5 TB/s on-chip SRAM bandwidth). The goal is real-time object detection with a hard 33ms
  deadline. Two architectures are proposed: a lightweight Vision Transformer (ViT) and a MobileNetV2-style
  CNN. The ViT is newer and has higher accuracy on ImageNet. Using the principles of hardware-software
  co-design, diagnose which architecture is a better fit for this specific accelerator.'
details:
  realistic_solution: The MobileNetV2-style CNN is the better choice. The Hailo-8 is a streaming dataflow
    accelerator, designed to efficiently process data flowing through a static compute graph. CNNs, particularly
    those using depthwise and pointwise convolutions, map perfectly to this paradigm. Their operations
    exhibit high spatial locality and data reuse, allowing the hardware to keep data on-chip in SRAM and
    maximize compute utilization. A ViT's self-attention mechanism, in contrast, has a global data-dependent
    access pattern (N^2 complexity on tokens) that breaks the spatial locality and is less friendly to
    a streaming dataflow architecture, leading to lower hardware utilization despite its theoretical compute
    needs.
  common_mistake: Assuming the model with the highest accuracy on a benchmark (ImageNet) is always the
    best choice. This ignores the critical factor of the underlying hardware's architecture. Another mistake
    is believing a sufficiently advanced compiler can optimize any model to fit any hardware, ignoring
    fundamental dataflow mismatches.
  napkin_math: The key is to consider the Arithmetic Intensity (AI) and dataflow, not just TOPS. The Hailo-8's
    extremely high SRAM bandwidth (~2.5 TB/s) relative to its compute (26 TOPS) means it has a high ridge
    point and is hungry for high-AI operations to avoid being memory-bound.
  options:
  - The ViT is better because its global self-attention is more powerful than local convolutions.
  - The CNN is better because its operations have high spatial locality, matching the dataflow architecture
    of the accelerator.
  - It doesn't matter which model is chosen; the accelerator's compiler will optimize the dataflow for
    maximum performance.
  - The ViT is better because it requires fewer parameters than the CNN.
  correct_index: 1
