title: The Drone Vision Architecture Debate
scenario: You are designing a vision system for a delivery drone that uses a Hailo-8 edge accelerator (26 TOPS, ~2.5 TB/s on-chip SRAM bandwidth). The goal is real-time object detection with a hard 33ms deadline. Two architectures are proposed: a lightweight Vision Transformer (ViT) and a MobileNetV2-style CNN. The ViT is newer and has higher accuracy on ImageNet.
question: Which architecture is the better fit for the Hailo-8, the lightweight ViT or the MobileNetV2-style CNN, and why?
details:
  realistic_solution: The MobileNetV2-style CNN is the better choice. The Hailo-8 is a streaming dataflow accelerator, designed to efficiently process data flowing through a static compute graph. CNNs, particularly those using depthwise and pointwise convolutions, map perfectly to this paradigm. Their operations exhibit high spatial locality and data reuse, allowing the hardware to keep data on-chip in SRAM and maximize compute utilization. A ViT's self-attention mechanism, in contrast, has a global data-dependent access pattern (N^2 complexity on tokens) that breaks the spatial locality and is less friendly to a streaming dataflow architecture, leading to lower hardware utilization despite its theoretical compute needs.
  common_mistake: |
    **The Pitfall:** Assuming the model with the highest ImageNet accuracy is always the best choice.
    **The Rationale:** Candidates ignore the critical factor of the underlying hardware's architecture, believing a sufficiently advanced compiler can magically optimize any model (like a ViT) to fit any hardware.
    **The Consequence:** Deploying an architecture that constantly thrashes memory, failing to meet the hard 33ms real-time deadline despite the high TOPS rating of the chip.
  napkin_math: |
    * Hailo-8 Ridge Point: Requires high Arithmetic Intensity (AI) due to its massive 2.5 TB/s SRAM bandwidth relative to 26 TOPS compute.
    * **CNN (MobileNetV2):** Features depthwise/pointwise convolutions with high spatial locality and data reuse (High AI). Matches the streaming dataflow paradigm perfectly.
    * **ViT (Transformer):** Self-attention has an O(N^2) global data-dependent access pattern (Low AI).
    * The ViT breaks spatial locality, making it memory-bound on the Hailo-8, whereas the CNN achieves high utilization and is the better fit.
  options:
  - The ViT is better because its global self-attention is more powerful than local convolutions.
  - The CNN is better because its operations have high spatial locality, matching the dataflow architecture of the accelerator.
  - It doesn't matter which model is chosen; the accelerator's compiler will optimize the dataflow for maximum performance.
  - The ViT is better because it requires fewer parameters than the CNN.
  correct_index: 1
