title: 'The Perception Model''s Memory Diet: Quantization Fundamentals'
scenario: You're an engineer on an autonomous vehicle team. Your primary perception model is a CNN with 15 million parameters, currently deployed using FP16 precision. To free up on-chip memory for a new sensor fusion model, your team is proposing to quantize the perception model's weights to INT8.
question: What are the FP16 and INT8 weight memory footprints for a 15M-parameter CNN, and how much memory does quantization save?
details:
  realistic_solution: 'The memory footprint of model weights is determined by the number of parameters and the data type used to store each parameter. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte per parameter. Therefore, quantizing from FP16 to INT8 perfectly halves the memory required for the model''s weights.'
  common_mistake: |
    **The Pitfall:** Confusing bytes and bits, or treating FP16 as a 4-byte format.
    **The Rationale:** Misremembering fundamental precision storage sizes, or assuming FP16 takes the same space as standard FP32.
    **The Consequence:** Overestimating or underestimating the memory footprint by 2x or 8x, leading to failed memory allocation or over-provisioning edge hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 15,000,000 parameters.
       - FP16 size: 2 bytes per parameter.
       - INT8 size: 1 byte per parameter.
    2. **Calculations:**
       - FP16 Footprint: 15,000,000 * 2 bytes = 30,000,000 bytes (30 MB).
       - INT8 Footprint: 15,000,000 * 1 byte = 15,000,000 bytes (15 MB).
       - Memory Saved: 30 MB - 15 MB = 15 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Savings**. Quantization directly yields a 50% reduction (15 MB) in weight storage footprint, freeing up space for additional workloads.
  options:
  - '60 MB in FP16, 30 MB in INT8. (Misconception: Assumes FP16 is 4 bytes)'
  - '120 Mb in FP16, 60 Mb in INT8. (Misconception: Confuses bytes and bits)'
  - '30 MB in FP16, 15 MB in INT8.'
  - '30 MB in FP16, 7.5 MB in INT8. (Misconception: Assumes 4x savings from FP32)'
  correct_index: 2
