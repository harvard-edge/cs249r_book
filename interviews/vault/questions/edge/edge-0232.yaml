title: 'The Perception Model''s Memory Diet: Quantization Fundamentals'
scenario: You're an engineer on an autonomous vehicle team. Your primary perception model is a CNN with
  15 million parameters, currently deployed using FP16 precision. To free up on-chip memory for a new
  sensor fusion model, your team is proposing to quantize the perception model's weights to INT8. Explain
  the memory footprint for the model's weights in both FP16 and INT8, and calculate the potential savings.
details:
  realistic_solution: The memory footprint of model weights is determined by the number of parameters
    and the data type used to store each parameter. FP16 (half-precision floating-point) uses 2 bytes
    per parameter, while INT8 (8-bit integer) uses 1 byte per parameter. Therefore, quantizing from FP16
    to INT8 halves the memory required for the model's weights, providing a 50% reduction.
  common_mistake: A common mistake is to confuse bytes and bits, leading to an 8x error in magnitude.
    Another is to incorrectly recall the size of FP16, sometimes treating it as 4 bytes like FP32, which
    doubles the expected memory footprint. This leads to an overestimation of the resources required.
  napkin_math: '1. **FP16 weight memory:** 15M params x 2 bytes = 30 MB.

    2. **INT8 weight memory:** 15M params x 1 byte = 15 MB.

    3. **Memory saved:** 30 MB - 15 MB = 15 MB (50% reduction).'
  options:
  - '60 MB in FP16, 30 MB in INT8. (Misconception: Assumes FP16 is 4 bytes)'
  - '120 Mb (megabits) in FP16, 60 Mb in INT8. (Misconception: Confuses bytes and bits)'
  - 30 MB in FP16, 15 MB in INT8.
  - '30 MB in FP16, 7.5 MB in INT8. (Misconception: Assumes 4x savings from FP32)'
  correct_index: 2
