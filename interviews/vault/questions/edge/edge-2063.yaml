title: Diagnosing Edge AI Performance Bottlenecks on Qualcomm AI 100
scenario: Your team has deployed a real-time anomaly detection model critical for industrial safety on a fleet of edge devices. Over the past few weeks, your production health dashboards are showing an intermittent increase in p99 inference latency, occasionally triggering alerts, and leading to missed anomaly detections.
question: How would you diagnose intermittent p99 latency on edge devices, quantify MTBF impact, and estimate improvement from an optimization?
details:
  realistic_solution: 'The solution involves a multi-layered approach. First, enhance telemetry to capture fine-grained metrics and differentiate between transient network issues and persistent hardware bottlenecks (like thermal throttling). Second, leverage hardware profilers to pinpoint the exact bottleneck. Finally, quantify the impact by calculating the cumulative delay reduction and the resulting increase in MTBF.'
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate latency metrics and ignoring hardware-specific edge bottlenecks.
    **The Rationale:** Candidates accustomed to cloud environments often overlook edge constraints like thermal throttling, memory bandwidth contention, or straggler events.
    **The Consequence:** Misdiagnosing the root cause, leading to ineffective software-level fixes that do not address the physical hardware limitations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base inference rate: 10 FPS.
       - Old p99 delay: 25ms per frame (50ms -> 75ms).
       - Optimized delay: 5ms per frame.
       - Previous MTBF: 1 failure per 1,000 inferences.
       - Power savings from optimization: 7W.
    2. **Calculations:**
       - Old cumulative delay: 10 FPS * 25ms = 250ms per second.
       - New cumulative delay: 10 FPS * 5ms = 50ms per second.
       - New MTBF limit: If delay margin dropped 5x, MTBF increases by roughly 5x (to 1 failure per 5,000 inferences).
       - Power savings: 7W * 24h = 168 Wh/day (0.168 kWh/day).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Reliability**. By optimizing the p99 latency tail, the system massively increases its MTBF while reclaiming power margin.
