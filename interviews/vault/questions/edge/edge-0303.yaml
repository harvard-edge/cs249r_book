title: The Federated vs. Centralized Data Deluge
scenario: You are designing the data strategy for a fleet of 10,000 autonomous vehicles to retrain a perception
  model. Your team is debating two approaches.
details:
  realistic_solution: The federated approach is 100 times more data-efficient. The centralized approach
    requires uploading a massive 500 Terabytes per day, while the federated learning approach only requires
    5 Terabytes. This 100x difference in data volume has profound implications for network infrastructure
    costs, data privacy exposure, and the economic feasibility of frequent model updates across the fleet.
  common_mistake: Engineers often underestimate the sheer volume of raw data generated at the edge, especially
    when scaled across a large fleet. A common mistake is to only compare the per-vehicle numbers (50
    GB vs 500 MB) and miss the multiplicative effect of the fleet size. Another is simple unit confusion
    between MB, GB, and TB, leading to an incorrect grasp of the true scale difference.
  napkin_math: 'The calculation involves multiplying the per-vehicle data size by the number of vehicles
    in the fleet and then comparing the two totals.


    Assuming: Centralized uploads 50 GB raw sensor data per vehicle/day; Federated uploads a 500 MB model
    update per vehicle/day.

    1. Centralized Data Volume: 10,000 vehicles × 50 GB/vehicle = 500,000 GB = 500 TB/day

    2. Federated Data Volume: 10,000 vehicles × 0.5 GB/vehicle = 5,000 GB = 5 TB/day

    3. Ratio: 500 TB / 5 TB = 100× more data in the centralized approach


    At a cellular cost of 0.10/GB:

    - Centralized: 500,000 GB × 0.10 = 50,000/day → 18.25M/year

    - Federated: 5,000 GB × 0.10 = 500/day → 182,500/year


    The federated approach saves ~18M per year in data transmission costs alone, before accounting for
    the reduced privacy risk and lower network infrastructure requirements.'
  options:
  - The approaches are roughly comparable, with a difference of only about 49.5 GB.
  - The centralized approach uploads about 1,000x more data.
  - The centralized approach uploads 100x more data (500 TB vs 5 TB).
  - The centralized approach uploads about 10x more data (50 TB vs 5 TB).
