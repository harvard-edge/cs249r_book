title: The Federated vs. Centralized Data Deluge
scenario: You are designing the data strategy for a fleet of 10,000 autonomous vehicles to retrain a perception model. Your team is debating between a centralized approach (uploading 50 GB of raw sensor data per vehicle daily) versus a federated learning approach (uploading a 500 MB model update per vehicle daily).
question: "For 10,000 vehicles, how do daily transfer volumes compare between 50 GB centralized uploads and 500 MB FL updates per vehicle?"
details:
  realistic_solution: The federated approach is 100 times more data-efficient. The centralized approach requires uploading a massive 500 Terabytes per day, while the federated learning approach only requires 5 Terabytes. This 100x difference in data volume has profound implications for network infrastructure costs, data privacy exposure, and the economic feasibility of frequent model updates across the fleet.
  common_mistake: |
    **The Pitfall:** Missing the multiplicative effect of the fleet size.
    **The Rationale:** Engineers often compare only the per-vehicle numbers (50 GB vs 500 MB) or confuse MB/GB/TB scale differences.
    **The Consequence:** Grossly underestimating the total network infrastructure costs and data privacy exposure required for centralized training.
  napkin_math: |
    *   **Centralized Volume:** 10,000 vehicles × 50 GB = 500,000 GB = 500 TB/day.
    *   **Federated Volume:** 10,000 vehicles × 0.5 GB = 5,000 GB = 5 TB/day.
    *   **Ratio:** 500 TB / 5 TB = 100x more data in the centralized approach.
    *   **Cost Check:** At $0.10/GB, centralized is $50,000/day vs federated $500/day.
    *   **Result:** The federated approach saves **~$18M per year** in data transmission costs.
  options:
  - The approaches are roughly comparable, with a difference of only about 49.5 GB.
  - The centralized approach uploads about 1,000x more data.
  - The centralized approach uploads 100x more data (500 TB vs 5 TB).
  - The centralized approach uploads about 10x more data (50 TB vs 5 TB).
