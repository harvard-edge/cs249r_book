title: Edge Data Quality and Anomaly Detection on Coral TPU
scenario: A fleet of IoT devices equipped with Google Coral Edge TPUs (4 TOPS INT8, 2W, INT8 only) are
  deployed to monitor industrial machinery. Each device streams high-frequency sensor data (e.g., vibration,
  temperature, pressure) and utilizes an on-device ML model for real-time fault detection. Before this
  sensor data is fed into the fault detection model, it is critical to implement a lightweight data quality
  and anomaly detection pipeline directly on the Coral Edge TPU. Design this pipeline to perform essential
  schema validation, detect outliers (e.g., corrupted readings, sensor failures, out-of-range values),
  and identify significant shifts in data distribution, all while operating within the device's stringent
  power budget (2W) and without introducing significant latency that would hinder the primary fault detection
  task. The solution must leverage the INT8-only processing capability of the Coral TPU.
question: "How would you design a lightweight INT8 data quality and anomaly pipeline on Coral Edge TPUs without exceeding 2W or harming fault detection latency?"
details:
  realistic_solution: A realistic solution involves a tiered approach. First, implement highly optimized,
    integer-arithmetic-friendly rule-based checks for schema validation (e.g., data type, completeness)
    and basic outlier detection (e.g., fixed min/max thresholds, rate-of-change limits). For more sophisticated
    anomaly detection, consider extremely lightweight, pre-quantized (to INT8) models such as a small
    autoencoder or a simple Isolation Forest variant, or statistical methods that can be effectively computed
    using integer operations (e.g., CUSUM, EWMA, or moving averages with fixed-point arithmetic). The
    data quality pipeline should be designed as an efficient pre-processing stage. It could output a 'quality
    score' or 'anomaly flag' alongside the processed sensor data, which the primary fault detection model
    can then incorporate or use to trigger alerts. For any model component, ensure it is trained with
    INT8 quantization in mind to minimize accuracy loss, or that the algorithm naturally lends itself
    to integer computation.
  common_mistake: A common mistake is proposing complex floating-point statistical methods or large deep
    learning models for anomaly detection without considering the Coral TPU's INT8-only nature and limited
    compute (4 TOPS INT8) and power (2W). Candidates often overlook the need for quantization-aware design
    or the computational overhead of converting data types repeatedly. Another pitfall is designing a
    pipeline that consumes too much processing time, thereby increasing inference latency for the primary
    fault detection model, or exceeding the power budget.
  napkin_math: Given a Coral Edge TPU with 4 TOPS (INT8 operations) and a 2W power budget. If sensor data
    arrives at 200 Hz, and each data point requires 10 simple quality checks (e.g., comparisons, additions,
    shifts for scaling), that's 200 samples/sec * 10 ops/sample = 2,000 ops/sec, which is negligible against
    4 TOPS. If a small INT8 quantized autoencoder for anomaly detection has 50,000 parameters and requires
    2 MAC operations per parameter for inference, this translates to 100,000 MACs per inference. At 200
    Hz, this is 200 * 100,000 = 20 million MACs/sec (0.02 TOPS). This is well within the 4 TOPS budget,
    leaving ample capacity for the primary fault detection model. The key is to ensure the chosen anomaly
    detection algorithm is extremely efficient and its INT8 quantized version retains sufficient accuracy
    for the task, all while staying within the 2W power envelope.
