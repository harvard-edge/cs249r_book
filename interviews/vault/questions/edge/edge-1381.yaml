title: Sizing the Distilled INT8 Student Model
scenario: After successfully distilling a 70B parameter teacher model, you are sizing the resulting INT8 student model for deployment on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) for on-premise inference. The student model requires 2 operations (1 MAC) per parameter per token generated.
question: What is the largest INT8 student model that can sustain 10,000 tokens/s at 50% of 400 TOPS, and how much memory remains for KV cache?
details:
  realistic_solution: The correct approach is to calculate the available operations per second at the target utilization, divide by the token generation rate to find operations per token, and derive the parameter count. Finally, calculate the INT8 memory footprint and subtract it from the total available hardware memory.
  common_mistake: |
    **The Pitfall:** Confusing TOPS (Tera Operations) with MACs or assuming FP16 memory footprints.
    **The Rationale:** Candidates forget to divide TOPS by 2 (since 1 MAC = 2 operations) or calculate memory using 2 bytes per weight despite the INT8 specification.
    **The Consequence:** Sizing calculations are off by a factor of 2x or 4x, leading to models that either drastically underutilize the hardware or immediately OOM upon deployment.
  napkin_math: |
    1. Calculate target compute capacity: 50% of 400 TOPS INT8 = 200 TOPS (200e12 Ops/sec).
    2. Calculate operations available per token: 200e12 Ops/sec / 10,000 tokens/sec = 20e9 Ops/token.
    3. Calculate maximum parameter count: 20e9 Ops / 2 Ops/parameter = 10e9 parameters (10 Billion).
    4. Calculate weight memory footprint: 10B INT8 parameters = 10 GB.
    5. Calculate remaining memory: 32 GB (Total) - 10 GB (Weights) = 22 GB.
    **The maximum student model size is 10 Billion parameters, leaving 22 GB remaining for KV cache and activations.**
