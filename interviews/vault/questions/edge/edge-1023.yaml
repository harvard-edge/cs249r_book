title: Implementing Model Routing Between Coral TPU and Jetson Orin Based on Input Complexity
scenario: A natural language interface on a Jetson Orin + Coral Edge TPU system handles both simple commands and complex queries. The Coral TPU runs a 4-class intent classifier at 0.5ms. The Orin runs a 1B LLM at 30 tok/s.
question: How would you design a gatekeeper routing layer for simple commands versus complex LLM queries to maintain low latency?
details:
  realistic_solution: 'Three-tier routing: (1) Coral TPU intent classifier (0.5ms): if confidence > 0.92 AND class is {simple_command, status_query}, route to rule-based handler (1ms total). (2) If confidence 0.7-0.92, route to a lightweight 125M model on Orin (8ms) for secondary classification. (3) If complex or low confidence, route to 1B LLM. Calibrate thresholds using 500-query labeled validation set. Target: 60% rule-based, 15% 125M, 25% 1B LLM. Average latency: 0.6*1.5ms + 0.15*8ms + 0.25*200ms = 0.9+1.2+50 = 52.1ms.'
  common_mistake: |
    **The Pitfall:** Using a fixed confidence threshold (e.g., 0.9) for routing without calibrating it against actual query distribution or output length.
    **The Rationale:** It's intuitive to assume high confidence equals a simple task, but an uncalibrated threshold can easily misclassify borderline tasks.
    **The Consequence:** An uncalibrated system will either over-route to the expensive 1B LLM (wasting power and spiking latency) or under-route complex queries to a simple rules engine (providing terrible user experiences).
  napkin_math: |
    1. **Simple Path Latency:** Coral classifier (0.5ms) + Rule-based handler (1ms) = 1.5ms.
    2. **LLM Path Latency:** 1B LLM at 30 tok/s generating 100 tokens = 3.3 seconds.
    3. **Recalibration (INT4 LLM):** If optimized to 60 tok/s, 100 tokens = 1.67 seconds.
    4. **Mixed Average Latency:** Assuming 60% simple, 15% medium (8ms model), and 25% LLM: (0.6 * 1.5) + (0.15 * 8) + (0.25 * 1670) = 0.9 + 1.2 + 417.5 = ~419.6ms average.
    5. **Result:** To achieve a real-time feel, the LLM output must be capped at 30 tokens to enforce a **~0.5s P95 latency**.
