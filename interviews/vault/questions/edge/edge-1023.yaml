title: Implementing Model Routing Between Coral TPU and Jetson Orin Based on Input
  Complexity
scenario: A natural language interface on a Jetson Orin + Coral Edge TPU system handles
  both simple commands ('turn on light') and complex queries ('explain why the motor
  is vibrating and suggest maintenance steps'). The Coral TPU runs a 4-class intent
  classifier at 0.5ms. The Orin runs a 1B LLM at 30 tok/s. Implement a routing layer
  that sends simple commands to a rule-based handler (1ms) and complex queries to
  the LLM, with the classifier as gatekeeper.
question: How would you design the Coral TPU gatekeeper routing layer for simple commands
  versus complex LLM queries?
details:
  realistic_solution: 'Three-tier routing: (1) Coral TPU intent classifier (0.5ms):
    if confidence > 0.92 AND class is {simple_command, status_query}, route to rule-based
    handler (1ms total). (2) If confidence 0.7-0.92, route to a lightweight 125M model
    on Orin (8ms) for secondary classification. (3) If complex or low confidence,
    route to 1B LLM. Calibrate thresholds using 500-query labeled validation set.
    Target: 60% rule-based, 15% 125M, 25% 1B LLM. Average latency: 0.6*1.5ms + 0.15*8ms
    + 0.25*200ms = 0.9+1.2+50 = 52.1ms.'
  common_mistake: Using a fixed confidence threshold (e.g., 0.9) for routing without
    calibrating it against the actual distribution of query complexity. A poorly calibrated
    threshold either over-routes to the LLM (wasting power) or under-routes (giving
    poor answers to complex queries).
  napkin_math: 'Coral classifier: 0.5ms. Rule-based handler: 1ms. Total simple path:
    1.5ms. 125M Orin model: 8ms. 1B LLM (100 tokens out): 100/30 tok/s = 3.3s... wait,
    30 tok/s means 100 tokens = 3.3s. That exceeds acceptable latency. Recalibrate:
    1B INT4 at 60 tok/s → 100 tokens = 1.67s. Mixed average: 0.6*1.5 + 0.15*8 + 0.25*1670
    = 0.9+1.2+417.5 = 419.6ms avg. P95 dominated by LLM path at 1.67s. For real-time
    feel: cap LLM output at 30 tokens = 0.5s.'
