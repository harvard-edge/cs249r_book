title: Knowledge Distillation vs Pruning on Qualcomm Cloud AI 100
scenario: Your team is deploying a transformer-based query router (originally 7B parameters) to a Qualcomm Cloud AI 100 on-premise inference accelerator. The hardware features 32 GB LPDDR4x memory, delivers 400 TOPS at INT8, and operates at 75W. To meet a strict 10ms latency SLA per token, you must compress the model. You are evaluating two options: using structured pruning to reduce the 7B model by 80%, or distilling the 7B teacher into a newly designed, dense 1.4B parameter student model.
question: Should you compress the 7B router with 80% structured pruning or distill it into a dense 1.4B student for Cloud AI 100?
details:
  realistic_solution: Knowledge distillation into a dense 1.4B student model is the superior architectural choice. The Qualcomm Cloud AI 100's 400 INT8 TOPS are heavily optimized for dense matrix multiplications. A dense 1.4B model guarantees high hardware utilization, predictable memory access patterns, and zero control-flow divergence.
  common_mistake: |
    **The Pitfall:** Selecting 80% structured pruning over knowledge distillation.
    **The Rationale:** Candidates assume pruning is simpler and ignore how aggressive structured pruning damages model capacity and drops hardware utilization below optimal levels.
    **The Consequence:** Deploying an underperforming model that fails to utilize the dense INT8 systolic arrays effectively, resulting in worse accuracy and latency.
  napkin_math: |
    *   **Model Size:** A dense 1.4B parameter student model quantized to INT8 requires 1.4 GB of memory, easily fitting the 32 GB LPDDR4x capacity.
    *   **Compute Requirements:** Generating one token requires roughly 2.8 Giga-Operations (1.4B parameters × 2 OPs/parameter).
    *   **Hardware Execution:** Assuming a conservative 50% utilization of the 400 TOPS engine (200,000 Giga-Operations/second).
    *   **Latency:** 2.8 GOps / 200,000 GOps/sec = 0.000014 seconds = **0.014 ms**.
    *   **Result:** The dense model easily meets the 10ms SLA, whereas irregular pruning would drastically lower hardware utilization.
