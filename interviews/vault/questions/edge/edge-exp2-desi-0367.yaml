title: Edge TPU Multi-Model Memory Hierarchy Design
scenario: 'You are architecting an edge inference pipeline for a retail security system using a Google
  Coral Edge TPU (4 TOPS INT8, 2W, USB 3.0 interface). The application requires running a cascade of models:
  a lightweight motion detector, a person detector, and a complex facial recognition model. Given the
  Edge TPU''s limited on-chip SRAM (~8MB) and the host device''s 2GB LPDDR4 memory, design the memory
  hierarchy and deployment strategy. Evaluate the tradeoffs between keeping models resident in SRAM versus
  swapping parameters over the USB interface.'
question: "Which models would you keep resident in Coral Edge TPU SRAM, and when would you swap over USB for the motion/person/face cascade?"
details:
  realistic_solution: The optimal architecture pins the high-frequency motion and person detectors permanently
    in the 8MB Edge TPU SRAM to ensure zero-latency inference and low power. The larger facial recognition
    model, quantized to INT8, is stored in host LPDDR4 and paged in over USB only when a person is detected.
    This design prioritizes the SRAM for high-frequency tasks while utilizing host memory for lower-frequency,
    larger models.
  common_mistake: Candidates often assume they can seamlessly stream model weights from the host DRAM
    to the Edge TPU per frame without realizing the USB interface will severely bottleneck the 4 TOPS
    compute engine. They may also overlook that all models must be fully quantized to INT8, which critically
    impacts their memory footprint and SRAM residency potential.
  napkin_math: 'Edge TPU compute: 4 TOPS. USB 3.0 effective bandwidth: ~500 MB/s. If the quantized INT8
    facial recognition model is 20MB, transferring it over USB takes 20 MB / 500 MB/s = 40 ms. Once loaded,
    executing 100 GOPS takes 100e9 / 4e12 = 25 ms. Because transfer time (40 ms) exceeds compute time
    (25 ms), continuous model swapping is a severe bottleneck, mandating SRAM residency for high-framerate
    models.'
