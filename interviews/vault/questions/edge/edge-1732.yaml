title: Data Pruning for Hailo-8 Streaming Limits
scenario: You are deploying a custom object detection model on a Hailo-8 edge accelerator. To fit within host memory bandwidth limits and the power budget, your team proposes using synthetic data generation and coreset selection to train a highly compact model.
question: How should Hailo-8 streaming constraints shape the data pruning strategy, and what is the max parameter count at 4 GB/s and 30 FPS?
details:
  realistic_solution: Architect a hardware-software co-design strategy. Because the accelerator relies on host memory streaming, synthetic data and coreset selection must maximize edge-case diversity while pruning redundant backgrounds. This enables a parameter-efficient architecture, forcing the model to learn complex representations with minimal weights to maintain host-to-accelerator streaming within bandwidth limits.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical dataset size reduction without considering deployment hardware.
    **The Rationale:** Candidates optimize the data strategy for standard GPU training, ignoring the reliance on streaming from host memory.
    **The Consequence:** Training a model that achieves high accuracy offline but fails to run in real-time due to massive PCIe bandwidth starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 GB/s host-to-accelerator bandwidth.
       - Target framerate: 30 FPS.
       - INT8 quantization (1 byte/param) and 60 MB peak activations.
    2. **Calculations:**
       - Bandwidth per frame = 4000 MB / 30 = 133.3 MB.
       - Available for weights = 133.3 MB - 60 MB = 73.3 MB.
       - Max parameter count = 73.3 MB / 1 byte = 73.3 million.
    3. **Conclusion & Interpretation:**
       - **The maximum allowable model size is 73.3 million parameters. Result: Memory-Bandwidth Bound.**
