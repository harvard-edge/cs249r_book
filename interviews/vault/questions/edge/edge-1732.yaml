title: Data Pruning for Hailo-8 Streaming Limits
scenario: You are deploying a custom object detection model on a Hailo-8 edge accelerator (no local DRAM). To fit within host memory bandwidth limits and the power budget, your team proposes using synthetic data generation and coreset selection to train a highly compact model.
question: How should Hailo-8 streaming constraints shape the data pruning strategy, and what is the max parameter count at 4 GB/s and 30 FPS?
details:
  realistic_solution: An L5 candidate will evaluate the hardware-software co-design constraints. Because the Hailo-8 lacks local DRAM, the synthetic data and coreset selection must aggressively target edge-case diversity while pruning redundant backgrounds to allow training of a heavily bottlenecked, parameter-efficient architecture. They will design a curriculum that forces the model to learn complex representations with minimal weights, ensuring the host-to-accelerator streaming stays under the bandwidth limit.
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical dataset size reduction without considering deployment hardware.
    **The Rationale:** Candidates optimize the data strategy for standard GPU training, ignoring that the Hailo-8 relies entirely on streaming from host memory.
    **The Consequence:** Training a model that achieves high accuracy offline but fails to run in real-time due to massive PCIe bandwidth starvation.
  napkin_math: |
    1. At 30 FPS, a 4 GB/s host-to-accelerator bandwidth limit allows 4000 MB / 30 = 133 MB per frame for weights and activations.
    2. Assuming INT8 quantization (1 byte per value) and peak activation maps of 60 MB.
    3. Remaining bandwidth for weights = 133 MB - 60 MB = 73 MB.
    4. Maximum allowable parameter count = **73 million parameters**.
