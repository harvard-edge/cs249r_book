title: The Polyglot Fleet
scenario: Your company operates a fleet of 20,000 edge AI gateways, comprising three generations of hardware. Each generation has different compute capabilities, memory, and supported ML accelerators/runtimes.
question: How do you efficiently build, test, and deploy ML models across this heterogeneous fleet?
details:
  realistic_solution: "Construct an automated CI/CD pipeline leveraging edge hardware telemetry. Trying to deploy a ubiquitous FP32/FP16 artifact across heterogeneous NPUs guarantees runtime failures and latency spikes. The pipeline must ingest the base ONNX graph, cross-compile targeted runtime artifacts (e.g., TensorRT, TFLite), and use fleet registry tagging to distribute hardware-specific models, preventing massive operational drift across the 20,000 nodes."
  common_mistake: |
    **The Pitfall:** Building one universal model and hoping it runs everywhere.
    **The Rationale:** Teams port cloud deployment strategies directly to edge, ignoring diverse NPU instruction sets and memory limits.
    **The Consequence:** Suboptimal performance, severe latency spikes, or complete failure on specific hardware targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 20,000 gateways.
       - Hardware variations: 3 generations.
       - Quantization formats: 2 (e.g., FP16, INT8).
    2. **Calculations:**
       - Unique deployment artifacts = 3 generations * 2 formats = 6 artifacts.
    3. **Conclusion & Interpretation:**
       - **Automated CI/CD is mandatory.** Manually matching 6 artifacts across 20,000 heterogeneous devices guarantees catastrophic deployment errors.
