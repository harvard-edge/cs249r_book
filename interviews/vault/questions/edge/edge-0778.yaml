title: The Polyglot Fleet
scenario: Your company operates a fleet of 20,000 edge AI gateways, comprising three generations of hardware. Each generation has different compute capabilities, memory, and supported ML accelerators/runtimes.
question: How do you efficiently build, test, and deploy ML models across this heterogeneous fleet?
details:
  realistic_solution: Implement a robust, automated CI/CD pipeline that embraces heterogeneity. Devices should report their hardware specifications to tag devices in the fleet management system. The CI/CD system should generate and optimize multiple model variants from a single source model (e.g., ONNX to TensorRT or TFLite). Store variants in a centralized registry, and use targeted deployment logic to push the correct variant to each device profile.
  common_mistake: |
    **The Pitfall:** Building one universal model and hoping it runs everywhere.
    **The Rationale:** Teams port cloud deployment strategies directly to edge, ignoring diverse NPU instruction sets and memory limits.
    **The Consequence:** Suboptimal performance, severe latency spikes, or complete failure on specific hardware targets.
  napkin_math: |
    - Hardware targets: 3 device generations.
    - Quantization targets: 2 formats (e.g., FP16, INT8).
    - Unique artifacts: 3 * 2 = 6 unique model artifacts.
    - Deployment scale: Managing 6 artifacts manually across **20,000 devices is infeasible without automation**.
