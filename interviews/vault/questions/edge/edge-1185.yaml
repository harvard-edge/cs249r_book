title: 'Edge Transformer Cost Optimization: Knowledge Distillation for Edge Deployment'
scenario: A company uses BERT-large (340M params, INT8, 340MB) for NER on a Jetson Orin GPU (60W). The model barely fits and achieves 3 inferences/second. You are considering knowledge distillation to TinyBERT (14.5M params, INT8, 14.5MB). TinyBERT retains 98% of BERT-large F1 on NER. A 14-day distillation run on 16 H100s costs roughly $13,440.
question: What throughput, memory, accuracy, and annual savings would distilling BERT-large to TinyBERT deliver across 50 Jetson Orins?
details:
  realistic_solution: 'Current BERT-large: 340MB, 3 inf/s per Jetson. Memory-bound: 340MB/102.4GB/s=3.32ms/inf. Wait: 1/0.00332=301 inf/s theoretical. Observed 3/s suggests heavy preprocessing or seq=512. At seq=512: 340MB loaded + activation 512*768*2*340M/340M≈heavy. Likely bottleneck is different. Assume 3 inf/s measured. TinyBERT: 14.5MB. Time: 14.5MB/102.4GB/s=0.142ms. At seq=512 proportionally: 0.142ms. 1/0.00014=7143 inf/s — 2381x faster than measured 3/s! Measured 3/s on BERT-large suggests preprocessing bottleneck. Post-distillation: still preprocessing-limited. But memory headroom: 340MB→14.5MB = 23x reduction. Can run multiple instances. Annual savings: if 3→9 inf/s: can reduce fleet from 50 to 17 Jetsons: savings=33*$52.6=$1,736/yr power+33*$499=$16,467 hardware. Total: $18.2K. Distillation cost: 14 days * 16 H100 * 24 hr * $2.50 = $13,440. Payback: ~9 months.'
  common_mistake: |
    **The Pitfall:** Ignoring the upfront cloud compute cost of distillation.
    **The Rationale:** Candidates compare only the edge inference savings and accuracy metrics.
    **The Consequence:** The ROI calculation is incomplete, failing to account for the $10,000+ cloud GPU cost required to train the distilled model.
  napkin_math: |
    1. Memory reduction: 340MB → 14.5MB (23.4x smaller).
    2. Assuming preprocessing bottleneck limits speedup to ~3x (3 → 9 inf/s).
    3. Fleet reduction: 50 Jetsons down to 17 (saves 33 units).
    4. Hardware saved: 33 × $499 = $16,467. Power saved: 33 × $52.6 = $1,736/yr.
    5. Distillation cost: 14 days × 16 H100s × $2.50/hr × 24h = $13,440.
    6. **Payback period = $13,440 / ($16,467 + $1,736) = 0.74 years (8.8 months). Strong ROI.**
