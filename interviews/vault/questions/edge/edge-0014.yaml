title: The Rolling Shutter Distortion
scenario: You mount an edge AI camera on a drone to read barcodes on fast-moving trains. The model achieves
  99% accuracy on stationary barcodes. In flight, the accuracy drops to 15%. The images aren't blurry,
  but the barcodes look diagonally slanted, like a parallelogram. What hardware choice ruined the model?
question: "What hardware choice ruined the model?"
