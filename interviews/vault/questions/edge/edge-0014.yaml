title: The Rolling Shutter Distortion
scenario: You mount an edge AI camera on a drone to read barcodes on fast-moving trains. The model achieves 99% accuracy on stationary barcodes. In flight, the accuracy drops to 15%. The images aren't blurry, but the barcodes look diagonally slanted, like a parallelogram.
question: What hardware choice ruined the model?
details:
  realistic_solution: The distortion stems from using a Rolling Shutter CMOS sensor. Because the sensor exposes and reads out rows sequentially (taking ~16ms top to bottom), a high-speed object shifts its physical position significantly between the first and last row readout, shearing the image. Replacing the hardware with a Global Shutter sensor—which exposes all pixels simultaneously—eliminates this geometric skew.
  common_mistake: |
    **The Pitfall:** Diagnosing the artifact as motion blur and suggesting a faster shutter speed.
    **The Rationale:** Candidates default to blur as the primary issue with fast-moving objects.
    **The Consequence:** Motion blur makes things fuzzy; diagonal slanting is a specific physical artifact caused by the sensor readout mechanism, which shutter speed won't fix.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame readout time: 16 ms (top to bottom).
       - Train speed: 30 m/s.
    2. **Calculations:**
       - Distance moved during 16 ms readout: 30 m/s * 0.016 s = 0.48 meters.
    3. **Conclusion & Interpretation:**
       - **Result: 0.48 meter spatial sheer.** The slanted parallelogram artifact is caused by sequential line scanning over time, distorting fast-moving geometry.
