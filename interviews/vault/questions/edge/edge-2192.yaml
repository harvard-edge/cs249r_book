title: Sparse Format for Edge Model Weights
scenario: Your pruned MobileNetV3 model has 70% sparsity (70% of weights are zero). The model occupies 15 MB in dense format.
question: Should you store the weights in a sparse format (CSR or bitmap+values), and how does this affect inference latency vs memory savings?
details:
  realistic_solution: 'Dense format: 15 MB of weights, all stored including zeros. Sparse CSR: store only non-zero values (30% of 15 MB = 4.5 MB) plus row pointers and column indices. CSR overhead: 4.5M non-zero values * 4 bytes (col index) = 18 MB. Total CSR size ~ 22.5 MB — LARGER than dense because index overhead exceeds zero storage savings at 70% sparsity. Bitmap format: 1 bit per weight for zero/non-zero mask (15M bits / 8 = 1.875 MB) + 4.5 MB values = 6.375 MB. Saves 57.5% memory. But inference: GPU sparse kernels (cuSPARSE) typically achieve only 30-50% of dense Tensor Core throughput because of irregular memory access patterns. On Jetson Orin with its Ampere GPU: dense GEMM at 60 TOPS INT8 vs sparse at ~25 TOPS. The ~8.6 MB memory saving is modest vs 32 GB LPDDR5. Keep dense unless memory is critical.'
  common_mistake: |
    **The Pitfall:** Assuming sparse storage always wins because you store fewer values.
    **The Rationale:** Candidates ignore the CSR index overhead and loss of memory coalescing on parallel hardware.
    **The Consequence:** Increased memory footprint and slower inference due to poor Tensor Core utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense weights: 15 MB
    - Sparsity: 70% (30% non-zero)
    - Jetson Orin compute: 60 TOPS (dense), ~25 TOPS (sparse)

    **Calculations:**
    - Non-zero values: 15 MB * 0.3 = 4.5 MB
    - CSR indices (4 bytes/val): 4.5M * 4 = 18 MB
    - Total CSR size: 4.5 MB + 18 MB = 22.5 MB
    - Bitmap mask: 15M bits / 8 = 1.875 MB
    - Total Bitmap size: 4.5 MB + 1.875 MB = 6.375 MB

    **Conclusion & Interpretation:**
    - **Result: Keep Dense (Memory-Bound)**. Unstructured 70% sparsity in CSR is larger than dense (22.5 MB vs 15 MB) and sparse kernels reduce throughput.
