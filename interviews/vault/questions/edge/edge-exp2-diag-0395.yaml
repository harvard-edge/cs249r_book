title: Diagnosing OOM Errors in Edge Encoder-Decoder
scenario: Your team is migrating a 10B parameter multilingual speech-to-text encoder-decoder model to
  a Qualcomm Cloud AI 100 accelerator for on-premise transcription. The model runs perfectly during the
  initial encoding phase, but consistently throws out-of-memory (OOM) errors during the long-form decoding
  phase, despite the accelerator having 32 GB of LPDDR4x memory. You observe that the power draw remains
  well within the 75W limit, but memory utilization spikes right before the crash. What is the root cause
  of this failure?
details:
  realistic_solution: The root cause is the uncontrolled growth of the Key-Value (KV) cache during the
    autoregressive decoding phase. In an encoder-decoder architecture, the cross-attention mechanism requires
    the decoder to attend to the entire encoder output sequence, and self-attention requires caching previous
    decoder tokens. For long-form audio transcription, these sequences grow very large, exceeding the
    remaining memory after the model weights and basic activations are loaded.
  common_mistake: Candidates often blame the static parameter size of the 10B model or assume INT8 quantization
    wasn't applied correctly, ignoring the dynamic memory requirements of the decoding phase. They might
    also incorrectly attribute the issue to compute limits rather than memory capacity.
  napkin_math: A 10B parameter model in INT8 requires ~10 GB for static weights. On the Qualcomm Cloud
    AI 100 with 32 GB LPDDR4x, this leaves ~22 GB for activations and KV cache. If the model has 32 layers,
    a hidden dimension of 4096, and uses FP16 for the cache (2 bytes/element), the KV cache per token
    is 2 (keys+values) * 32 (layers) * 4096 (dim) * 2 bytes = ~524 KB per token. Transcribing a long meeting
    with an encoder sequence of 10,000 tokens and decoder sequence of 5,000 tokens requires caching both
    self and cross attention. The cache easily exceeds 15 GB for a single stream. A batch size of 2 would
    require 30 GB just for the cache, instantly exceeding the remaining 22 GB budget.
