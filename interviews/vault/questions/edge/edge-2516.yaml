title: Multi-Agent BLE vs Wi-Fi Consensus
scenario: 5 wearables must reach consensus on a 1 KB vector every 2 seconds. BLE Mesh has a 200ms multi-hop latency. Wi-Fi Direct has 20ms transfer latency but requires 1.5s to establish a group owner connection from sleep.
question: Design a topology and protocol choice that safely satisfies the 2-second real-time consensus deadline.
details:
  realistic_solution: |
    Design a BLE Mesh flooding topology. Although Wi-Fi Direct has higher raw bandwidth, the 1.5s connection setup time consumes 75% of the deadline, creating a massive synchronization bubble that risks failure. BLE's 200ms latency easily fits the 2s window while maintaining micro-watt sleep power.
  common_mistake: |
    **The Pitfall:** Blindly choosing Wi-Fi Direct for its lower transfer latency.
    **The Rationale:** Failing to realize that the connection establishment overhead (1.5s) dominates the synchronization budget.
    **The Consequence:** The system consistently misses the 2-second real-time consensus deadline.
  napkin_math: |
    - Wi-Fi Latency: 1500ms setup + 20ms transfer = 1520ms.
    - BLE Latency: 0ms setup + 200ms hop = 200ms.
    - Comparison: 200ms < 2000ms (deadline).
    - **Result: BLE meets the deadline safely, while Wi-Fi barely leaves margin for error.**
