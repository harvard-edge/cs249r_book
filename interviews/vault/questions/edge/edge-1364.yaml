title: Shadow Deployment Sizing on Hailo-8
scenario: You are implementing a shadow deployment on an edge gateway equipped with a single Hailo-8 accelerator. The baseline model (Model A) guarantees 30 FPS on a live video stream, utilizing exactly 14 TOPS. The new candidate model (Model B) is more complex and requires 0.6 TOPS per frame.
question: At 14 TOPS reserved for Model A, what maximum shadow FPS can Model B run at without exceeding 26 TOPS, and what is the estimated total power consumption?
details:
  realistic_solution: 'In edge shadow deployments, compute is strictly constrained, so the shadow model frequently processes a subsampled stream. We determine the remaining compute capacity on the Hailo-8 after Model A''s requirements are satisfied, then calculate the maximum sustainable frame rate for Model B. Power is estimated proportionally to overall TOPS utilization.'
  common_mistake: |
    **The Pitfall:** Assuming the shadow model must process every single frame (30 FPS).
    **The Rationale:** Candidates fail to account for the baseline model's reserved TOPS before calculating the shadow model's throughput.
    **The Consequence:** This leads to exceeding hardware compute limits and an invalid deployment strategy.
  napkin_math: |
    - **Remaining Compute:** 26 TOPS (Total) - 14 TOPS (Model A) = 12 TOPS available for Model B.
    - **Model B Max FPS:** 12 TOPS / 0.6 TOPS/frame = 20 FPS.
    - **Total Compute Utilized:** 14 TOPS (A) + 12 TOPS (B) = 26 TOPS.
    - **Estimated Power:** (26 TOPS used / 26 TOPS total) * 2.5W = **2.5 Watts**.
