title: Shadow Deployment Sizing on Hailo-8
scenario: You are implementing a shadow deployment on an edge gateway equipped with a single Hailo-8 accelerator. The baseline model (Model A) guarantees 30 FPS on a live video stream, utilizing exactly 14 TOPS. The new candidate model (Model B) is more complex and requires 0.6 TOPS per frame.
question: At 14 TOPS reserved for Model A, what maximum shadow FPS can Model B run at without exceeding 26 TOPS, and what is the estimated total power consumption?
details:
  realistic_solution: 'Determine the remaining compute capacity on the Hailo-8 after Model A''s requirements are satisfied, then calculate the maximum sustainable frame rate for Model B. Power is estimated proportionally to overall TOPS utilization.'
  common_mistake: Assuming the shadow model must process every single frame (30 FPS) without accounting for the baseline model's reserved TOPS, leading to exceeded limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 capacity = 26 TOPS, 2.5W
    - Model A reserved = 14 TOPS
    - Model B cost = 0.6 TOPS/frame

    **Calculations:**
    - Remaining Compute = 26 - 14 = 12 TOPS
    - Model B Max FPS = 12 TOPS / 0.6 TOPS = 20 FPS
    - Estimated Power = (26 TOPS / 26 TOPS) * 2.5W = 2.5 W

    **Conclusion & Interpretation:**
    - **Result: 20 FPS, 2.5 Watts (Compute-Bound)**. The shadow model must be run at a reduced frame rate to fit alongside the production model in a single accelerator.
