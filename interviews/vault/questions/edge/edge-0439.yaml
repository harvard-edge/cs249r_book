title: The Sensor Fusion Stall
scenario: You are a Senior ML Systems Engineer on an autonomous vehicle team, debugging a critical latency
  issue. The perception system uses two GPUs to process a 4K camera feed for a stereo depth-prediction
  model. The end-to-end 'photon-to-control' latency is missing its 33ms hard real-time budget. Profiling
  reveals that transferring the 33MB camera frame from GPU A (which receives it from the host) to GPU
  B for fusion takes a shocking 34ms. The initial transfer from host RAM to GPU A's memory is fast, at
  only 1.7ms. Given this data, diagnose the most likely architectural bottleneck.
question: "What architectural bottleneck explains a 34ms GPU-to-GPU transfer for a 33 MB frame when host-to-GPU takes only 1.7ms?"
details:
  realistic_solution: The massive 34ms transfer time for only 33MB of data points to a cripplingly low
    effective bandwidth of under 1 GB/s. This is characteristic of two GPUs communicating over a standard
    PCIe bus without a direct peer-to-peer path. The transfer is likely being arbitrated by the CPU's
    PCIe root complex, incurring massive latency overhead for each transaction. This architecture is wrong
    for the task. The correct solution is to use a direct, low-latency interconnect like NVLink (or a
    similar proprietary bridge) which provides a dedicated, high-bandwidth path between GPUs, bypassing
    the CPU and PCIe switch entirely.
  common_mistake: Engineers often focus only on peak theoretical bandwidth of a bus (e.g., 'PCIe 4.0 is
    32 GB/s, that can't be it') and forget that protocol overhead and topology dominate real-world performance,
    especially for peer-to-peer transfers. Blaming software (CUDA) or the CPU misses that the hardware
    architecture itself is fundamentally unsuited for low-latency GPU-GPU communication.
  napkin_math: "1. **Calculate Observed Bandwidth:** The system is moving 33 MB in 34 ms. `Bandwidth = Data / Time` -> `33 MB / 0.034 s` \u2248 970 MB/s. 2. **Compare to PCIe:** Typical PCIe 3.0 x16 provides ~15.7 GB/s. 970 MB/s is <1 GB/s, severely underperforming peak PCIe bandwidth. This indicates massive overhead from routing peer-to-peer traffic through the CPU root complex rather than a direct connection. 3. **NVLink Solution:** NVLink provides 50-600 GB/s with minimal protocol overhead, resolving the bottleneck."
  options:
  - The InfiniBand connection between the GPUs is saturated.
  - The CPU is overloaded and cannot schedule the DMA transfer efficiently.
  - The GPUs are connected over the PCIe bus, which has high overhead for peer-to-peer transfers.
  - An inefficient CUDA `memcpy` call is causing software-level stalls; it should be replaced with a custom
    kernel.
  correct_index: 2
