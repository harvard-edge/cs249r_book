title: Handling Host Memory Pressure for Hailo-8 Streams
scenario: You are designing a multi-camera smart city application running on an edge appliance equipped with a Hailo-8 accelerator. The Hailo-8 operates as a dataflow accelerator without local DRAM, continuously streaming activations and weights directly from the host's 4GB memory. During peak traffic hours, OS-level memory fragmentation and background daemon spikes cause severe host memory pressure, threatening the DMA buffers required by the accelerator.
question: How would you manage host memory for Hailo-8 DMA under fragmentation and daemon spikes in a 4 GB smart-city appliance?
details:
  realistic_solution: The architecture must implement a pre-allocated, physically contiguous memory pool (e.g., via a dedicated Contiguous Memory Allocator or CMA region) reserved exclusively for Hailo-8 DMA operations at boot time. To handle dynamic application-level pressure, the system should feature a QoS-aware pipeline that drops low-priority camera frames early in the host CPU pipeline, ensuring the core dataflow streaming engine never starves or triggers an OS-level eviction.
  common_mistake: |
    **The Pitfall:** Relying on standard Linux OOM killer priorities or adding swap space.
    **The Rationale:** Candidates treat the Hailo-8 like a typical GPU with VRAM and forget it requires pinned host memory for DMA.
    **The Consequence:** Host memory fragmentation leads to severe streaming latency or catastrophic DMA failures.
  napkin_math: |
    * Host memory capacity: 4096MB
    * OS + daemons reserve: 1536MB
    * 1080p RGB frame size: 1920 * 1080 * 3 bytes = 6.22MB
    * Buffer for 4 cameras (depth 5): 4 * 5 * 6.22MB = 124.4MB
    * Weights and intermediate features: ~250MB
    * Total pinned memory needed: ~374.4MB
    * **Allocating a 512MB CMA region at boot guarantees contiguous DMA memory, avoiding 4KB page compaction stalls.**
