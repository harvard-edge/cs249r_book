title: Handling Host Memory Pressure for Hailo-8 Streams
scenario: You are designing a multi-camera smart city application running on an edge appliance equipped with a Hailo-8 accelerator. The Hailo-8 operates as a dataflow accelerator without local DRAM, streaming directly from the host's 4GB memory. During peak traffic hours, OS-level memory fragmentation causes severe host memory pressure.
question: How would you manage host memory for Hailo-8 DMA under fragmentation and daemon spikes in a 4 GB smart-city appliance?
details:
  realistic_solution: 'Implement a pre-allocated, physically contiguous memory pool (e.g., via a dedicated Contiguous Memory Allocator or CMA region) reserved exclusively for Hailo-8 DMA operations at boot time. This isolates the accelerator from dynamic OS-level fragmentation.'
  common_mistake: |
    **The Pitfall:** Relying on standard Linux OOM killer priorities or adding swap space.
    **The Rationale:** Candidates treat the Hailo-8 like a typical GPU with VRAM, forgetting it requires pinned physical memory for DMA streaming.
    **The Consequence:** Host memory fragmentation leads to severe streaming latency or catastrophic DMA failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Host memory: 4096MB total (OS reserves 1536MB).
       - Frame size (1080p): 1920 * 1080 * 3 bytes = ~6.22MB.
    2. **Calculations:**
       - Buffer for 4 cameras (depth 5): 4 * 5 * 6.22MB = ~124MB.
       - Weights and features footprint: ~250MB.
       - Total pinned memory needed: 124MB + 250MB = ~374MB.
    3. **Conclusion & Interpretation:**
       - **Result: 512MB CMA Region.** Reserving a contiguous 512MB memory block at boot prevents 4KB page compaction stalls under heavy load.
