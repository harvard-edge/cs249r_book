title: Optimize KV Cache Quantization for Jetson Orin Memory Budget
scenario: 'A 7B model on Jetson Orin NX (8GB LPDDR5) uses 3.5GB for INT4 weights, leaving 4.5GB for KV
  cache. At FP16 KV precision, the cache supports 32L × 8KV_heads × 128D × 2B × max_tokens = 65,536 bytes/token.
  Maximum context: 4.5GB / 65,536B = 68,665 tokens ≈ 68K. The team wants to support 5 concurrent requests
  at 16K context each: requires 5 × 16K × 65,536B = 5.2GB > 4.5GB budget. Optimize KV cache quantization
  to fit 5 concurrent × 16K context.'
details:
  realistic_solution: 'FP16 KV per request: 16K × 65,536B = 1.048GB. 5 requests: 5.24GB > 4.5GB budget
    by 0.74GB. Need 0.74/5.24 = 14% reduction minimum. Options: (A) INT8 KV (2× compression): 5×0.524GB=2.62GB
    ✓ — saves 2.62GB, leaves 1.88GB slack for larger context. (B) K-INT8/V-INT4 (1.5× V compression, 1×
    K): 5×(0.524×0.5 + 0.524×1) = 5×0.786 = 3.93GB ✓. (C) INT4 KV (4× compression): 5×0.262GB=1.31GB.
    Accuracy order: FP16 > INT8 > K-INT8/V-INT4 > INT4. Recommendation: INT8 KV for maximum quality within
    budget, with 1.88GB remaining buffer for context growth.'
  common_mistake: Quantizing both K and V to INT4 uniformly; research shows K quantization is more sensitive
    than V quantization for maintaining attention quality, so asymmetric K-INT8/V-INT4 is often the best
    Pareto point.
  napkin_math: 'FP16 KV/token: 2×32L×8H×128D×2B=131,072B=128KB... recalculate: 2(KV)×32(L)×8(KVH)×128(D)×2B=131,072B/token.
    16K tokens: 16K×128KB=2GB per request. 5 requests: 10GB >> 4.5GB. INT8: 5×1GB=5GB still over. INT4:
    5×0.5GB=2.5GB ✓. Must use INT4 KV or reduce to 3 concurrent requests at INT8.'
