title: DP Noise Calibration for Sensor Fusion on Edge
scenario: A smart home hub aggregates temperature, occupancy, and audio activity features from 5 sensors
  before running a local anomaly detection model. A privacy engineer adds Laplace noise to each sensor
  reading independently before the fusion layer (local DP per feature). After deployment, the model's
  false negative rate on anomalies jumps from 2% to 18%. Diagnose the failure and propose a fix.
question: "Why did per-feature LDP noise raise false negatives from 2% to 18%, and how would you fix the sensor fusion pipeline?"
details:
  realistic_solution: 'The mistake is feature-level LDP without accounting for composition. Each feature
    gets ε-LDP noise, but with 5 features the composed privacy budget is ε_total = 5ε (basic composition)
    or ε_total ≈ √(10ε²·ln(1/δ)) (advanced composition). The noise destroys the multivariate signal. Fix:
    (1) apply noise at the fusion layer output instead of individual features — calibrate sensitivity
    to the L2 norm of the fused representation (1 mechanism, not 5), or (2) use the Gaussian mechanism
    with L2 sensitivity on the full feature vector: add noise N(0, Δ₂²·σ²·I₅) once after fusion. Single
    mechanism preserves ε-DP with much less noise per feature dimension.'
  common_mistake: 'Applying independent LDP noise to each of 5 correlated features multiplies the noise
    effect: the fused feature vector has noise from all 5 dimensions simultaneously. The sensitivity of
    the fused representation is 5× higher than any single feature, but the noise was calibrated for individual
    features — causing catastrophic signal destruction.'
  napkin_math: 'Per-feature Laplace noise for ε=1: scale b = Δf/ε = 1/1 = 1.0 (assuming normalized features).
    Laplace(0, b=1) has std = √2 × b = √2 ≈ 1.41 per feature. 95% CI: ±(-ln(0.025)) × b = ±3.69 (not ±2).
    SNR per feature: signal std ≈ 0.3, noise std = 1.41 → SNR = 0.045. Gaussian mechanism on full 5-dim
    vector: Δ₂ = √5·Δ₁ ≈ 2.24. Noise per dim = σ. At σ=0.5, noise std = 0.5 per dim vs 1.41 for LDP —
    2.8× improvement in SNR.'
