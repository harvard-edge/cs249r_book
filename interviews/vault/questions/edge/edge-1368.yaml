title: 'Stream Bandwidth for Depthwise Convs on Hailo-8'
scenario: 'You are deploying an EfficientNet edge model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). Unlike typical edge GPUs, Hailo-8 has no local DRAM and streams data directly from host memory. For a specific layer, you have an INT8 input feature map of 100x100x64. You apply a 3x3 depthwise convolution followed by a 1x1 pointwise convolution expanding to 128 channels. The accelerator hits 10 TOPS of actual utilization on this layer.'
question: 'What host memory streaming bandwidth is required to feed the 100x100x64 depthwise-plus-pointwise layer at 10 TOPS utilization?'
details:
  realistic_solution: 'Calculate the total bytes needed from the host (activations + weights) and total operations to find the minimum execution time at the given TOPS rate. The extremely low arithmetic intensity of depthwise convolutions causes a severe bottleneck on standard PCIe bandwidth.'
  common_mistake: 'Forgetting that Hailo-8 lacks local DRAM and miscalculating total Operations from MACs, leading to drastic underestimation of PCIe bandwidth.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 100x100x64 INT8. DW conv: 3x3. PW conv: 1x1 to 128 channels.
    - Target compute utilization: 10 TOPS (10^13 ops/sec).

    **Calculations:**
    - Input Bytes: (100*100*64) [acts] + (3*3*64) [DW weights] + (64*128) [PW weights] = 648,768 bytes.
    - Total MACs: (100*100*64*9) [DW] + (100*100*128*64) [PW] = 87.68M MACs.
    - Total Operations: 87.68M * 2 = 175.36M Ops.
    - Execution Time at 10 TOPS: 175.36M / 10^13 = 17.536 microseconds.
    - Required Bandwidth: 648,768 bytes / 17.536 us = 36.99 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 36.99 GB/s (I/O-Bound)**. Feeding this layer at 10 TOPS requires ~37 GB/s of sustained host bandwidth, which will entirely bottleneck standard PCIe Gen3/Gen4.
