title: Roofline Analysis for MobileNetV2 on Qualcomm Cloud AI 100
scenario: >-
  A development team is deploying a MobileNetV2 model on the Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x memory, 85 GB/s peak memory bandwidth, 75W TDP). Initial performance metrics show that accelerator utilization is lower than expected, and inference latency is high.
question: How would you use roofline analysis to diagnose if MobileNetV2 is compute-bound or memory-bound on the Qualcomm Cloud AI 100?
details:
  realistic_solution: 'Calculate the arithmetic intensity (AI) of MobileNetV2 (ratio of operations to data movement). Plot this on a roofline chart against the AI 100''s ridge point (Peak Compute / Peak Memory Bandwidth). If the model''s AI falls to the left of the ridge, it''s memory-bound. Because MobileNetV2 uses depthwise separable convolutions, it has notoriously low AI, meaning optimizations must target memory bandwidth (data reuse, pruning) rather than kernel compute speed.'
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TOPS without calculating arithmetic intensity.
    **The Rationale:** Candidates see 400 TOPS and assume the chip is just under-utilized due to bad software scheduling.
    **The Consequence:** They misdiagnose the bottleneck and spend weeks optimizing CUDA/compute kernels when the model is physically starved for data by the 85 GB/s memory limit.
  napkin_math: |
    Let's evaluate a 1x1 convolution with 256 input channels, 512 output channels, on a 14x14 feature map (INT8).

    1. **Operations:** `2 * (1 * 1 * 256) * 512 * (14 * 14) = 2 * 256 * 512 * 196 = 51,380,224` ops.
    2. **Memory Access:**
       - Weights: `1 * 1 * 256 * 512 = 131,072` bytes
       - Input: `256 * 14 * 14 = 50,176` bytes
       - Output: `512 * 14 * 14 = 100,352` bytes
       - Total: `131,072 + 50,176 + 100,352 = 281,600` bytes
    3. **Arithmetic Intensity (AI):** `51,380,224 / 281,600 ≈ 182.5` ops/byte.
    4. **Ridge Point:** `400 TOPS / 85 GB/s ≈ 4705` ops/byte.
    5. **Result:** Since `182.5 << 4705`, the layer is **severely memory-bound**.
