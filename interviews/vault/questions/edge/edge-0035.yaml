title: The Preemption Priority Inversion
scenario: Your edge robot runs on a Real-Time Operating System (RTOS). You have a High-Priority ML Thread (inference), a Medium-Priority UI Thread (screen updates), and a Low-Priority I/O Thread (writing logs to SD card). The ML Thread occasionally stalls for hundreds of milliseconds. You discover the ML Thread is waiting for a Mutex held by the Low-Priority I/O Thread.
question: Why didn't the High-Priority ML Thread just preempt the Low-Priority thread?
details:
  realistic_solution: 'This is a classic **Priority Inversion**. Without Priority Inheritance in the RTOS scheduler, the 10ms deadline is catastrophically blocked by 500ms of unrelated UI rendering via the shared Mutex.'
  common_mistake: |
    **The Pitfall:** Blaming the RTOS scheduler.
    **The Rationale:** Candidates assume the scheduler is broken because a high-priority thread is blocked.
    **The Consequence:** They fail to recognize the architectural flaw of shared locks causing priority inversion.
  napkin_math: |
    **Assumptions & Constraints:**
    - High Priority Deadline is 10ms.
    - Low Priority Mutex Hold Time is 1ms.
    - Medium Priority Execution is 500ms.

    **Calculations:**
    - High waits for Low (holding mutex).
    - Low is preempted by Medium.
    - Total Wait Time is 1ms + 500ms = 501ms.

    **Conclusion & Interpretation:**
    - **Result: 501ms (Latency-Bound)**. 501ms wait drastically exceeds the 10ms deadline (Priority Inversion).
