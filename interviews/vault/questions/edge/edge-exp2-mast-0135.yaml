validation_issues:
- The KV cache calculation 'A single token (e.g., 4096 hidden size, 2 for K/V) takes ~8 KB' is a generic
  statement and not derived from the 8B or 14B model parameters, making it hard to verify its applicability.
- The '8 KB' KV cache size needs to be explicitly justified or linked to the models in question (e.g.,
  for which model's hidden size and number of layers is this true?).
- The compute calculation 'an 8B model requires ~16 TOPS/token' is a significant approximation and should
  be explicitly noted as such, or its derivation explained.
