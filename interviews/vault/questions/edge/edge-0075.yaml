title: Thermal Headroom in a Sealed Enclosure
scenario: Your edge AI device runs a 10W SoC (Jetson Orin Nano) inside an IP67-sealed polycarbonate enclosure
  on a factory floor. The enclosure thermal resistance is 4.5°C/W (junction-to-ambient). Ambient temperature
  ranges from 15°C (winter) to 45°C (summer, near furnaces). The SoC throttles at Tj = 97°C and shuts
  down at 105°C. Calculate the thermal headroom in summer and winter, and design a thermal-aware inference
  policy.
details:
  realistic_solution: 'In summer at 45C ambient: Tj = 45 + (10W x 4.5 C/W) = 90C. Throttle headroom =
    97 - 90 = 7C, allowing only 11.6W burst before throttling. In winter at 15C: Tj = 60C, headroom =
    37C, allowing 18.2W burst — 57% more compute capacity. Design a thermal-aware inference policy: read
    the SoC junction temperature sensor, and dynamically adjust model complexity (e.g., switch from YOLOv8-M
    to YOLOv8-N when Tj > 90C) or reduce frame rate. In summer, the system has virtually no burst headroom,
    so any model loading spike or multi-model burst risks immediate throttling.'
  common_mistake: '"Tj = 45 + 10 × 4.5 = 90°C. That''s under 97°C, so we''re fine." This ignores that
    10W is the average power — transient spikes during model loading or multi-model bursts can hit 15W,
    and the polycarbonate enclosure has poor thermal conductivity compared to aluminum, making the thermal
    time constant long (heat builds up over hours).'
  napkin_math: 'Summer headroom: 97 − 90 = 7°C → max burst power = 7 / 4.5 + 10 = 11.6W (only 1.6W above
    steady state). Winter headroom: 97 − 60 = 37°C → max burst power = 37 / 4.5 + 10 = 18.2W. Seasonal
    power budget swing: 11.6W to 18.2W — a 57% difference. If you design for summer worst-case, you leave
    6.6W of winter compute capacity unused. A thermal-aware scheduler that increases inference resolution
    or enables additional models in winter can reclaim this capacity.'
