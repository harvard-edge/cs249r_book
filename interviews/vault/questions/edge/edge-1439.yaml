title: Power Throttling Stragglers on Cloud AI 100
scenario: You are monitoring telemetry for an on-premise deployment using Qualcomm Cloud AI 100 accelerators (75W TDP). Your production dashboard shows that while average inference latency is stable, P99 tail latency periodically spikes by 25%. System logs show memory utilization and bandwidth are well below limits. However, the accelerator consistently hits its 75W power limit just before the latency spikes occur.
question: Why do P99 latency stragglers appear when the Cloud AI 100 hits 75W, and what latency increase results from a 20% compute throttle?
details:
  realistic_solution: The latency spikes are caused by dynamic voltage and frequency scaling (DVFS) triggered when the accelerator hits its 75W TDP limit. Under sustained heavy load, the hardware throttles its clock speed to stay within power constraints, reducing effective compute throughput. Requests processed during this throttled period take longer to complete, directly resulting in P99 stragglers. Observability dashboards must alert on power throttling events, not just average utilization.
  common_mistake: |
    **The Pitfall:** Attributing tail latency spikes to garbage collection or context switching.
    **The Rationale:** Candidates fail to analyze power metrics and recognize the correlation between TDP limits and dynamic voltage/frequency scaling (DVFS).
    **The Consequence:** Missed diagnosis, leading to fruitless software profiling while the hardware continues to thermal throttle.
  napkin_math: |
    * Ideal peak processing time (example 100 TOPS load): 100 TOPS / 400 TOPS = 0.25 seconds
    * Throttled compute (20% reduction): 400 TOPS * 0.80 = 320 TOPS
    * Throttled processing time: 100 TOPS / 320 TOPS = 0.3125 seconds
    * **Latency increase: 0.3125s - 0.25s = 0.0625s, exactly accounting for the observed 25% P99 spike.**
