title: Depthwise Separable Conv vs Standard Conv Roofline on Jetson Orin DLA
scenario: Jetson Orin DLA runs at ~15 TOPS INT8. Compare standard 3×3 Conv (64→64 channels, 112×112 input)
  vs depthwise separable Conv (same dimensions) on the DLA. Calculate FLOPs, parameters, and where each
  sits on the roofline.
question: "On Orin DLA, how do 3×3 standard and depthwise separable 64→64 convs compare in FLOPs, parameters, and roofline position?"
details:
  realistic_solution: 'Standard Conv: FLOPs = 2×64×64×3×3×112×112 = 916M. Params = 64×64×3×3 = 36,864.
    DW-Sep Conv: DW FLOPs = 2×64×3×3×112×112 = 14.3M. PW FLOPs = 2×64×64×112×112 = 102.8M. Total = 117.1M
    — 7.8× fewer FLOPs. Standard Conv AI: 916M FLOPs / (36.9K weights + large activations)×2B. Activation:
    64×112×112×2B = 1.6MB in + 1.6MB out. Weights: 73.7KB. AI = 916M/(3.3MB) = 278 FLOPs/byte. DW-Sep
    AI: 117M/(73.7KB + 3.2MB) = 35.7 FLOPs/byte. DLA ridge ≈ 15T/100G = 150 FLOPs/byte. Standard Conv:
    AI (278) > ridge (150) → compute-bound. DW-Sep: AI (35.7) << ridge → memory-bound. DW-Sep throughput
    ceiling: 100 GB/s × 35.7 = 3.57 TOPS effective.'
  common_mistake: Comparing FLOPs without considering that depthwise convolution has much lower arithmetic
    intensity due to its smaller weight matrices, potentially moving it further into the memory-bound
    regime.
  napkin_math: 'DLA HBM BW: ~100 GB/s. Ridge: 15 TOPS/100 GB/s = 150 FLOPs/B. Standard Conv AI: 278 FLOPs/B
    → compute-bound, ceiling = 15 TOPS. DW-Sep AI: 35.7 FLOPs/B → memory-bound, ceiling = 3.57 TOPS. Standard
    Conv is 4.2× more DLA-efficient per FLOP.'
