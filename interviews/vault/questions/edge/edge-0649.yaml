title: The Autonomous Perception Horizon
scenario: 'You are the new lead architect for the perception team at a major autonomous vehicle company.
  Our current fleet runs on a Jetson AGX Orin with a 60W thermal design power (TDP) and uses a mature,
  highly-optimized CNN-based model for object detection. This system reliably hits its 33ms end-to-end
  latency budget. However, to advance our autonomous capabilities, we must improve detection of small,
  distant objects and performance in dense, cluttered scenes. Your team has two competing proposals for
  the next-generation model: Proposal A is a deeper Hybrid CNN requiring 500 GOPs and 1 GB of memory traffic
  per frame. Proposal B is a high-resolution Vision Transformer (ViT) requiring 300 GOPs but 8 GB of memory
  traffic per frame due to large self-attention maps. Which proposal is viable within the 33ms latency
  budget?'
details:
  realistic_solution: The correct approach is to immediately analyze both proposed architectures through
    the lens of the Roofline Model, specifically by estimating their Arithmetic Intensity (AI) relative
    to the Jetson AGX Orin's hardware capabilities. The path chosen must respect the physics of the device.
  common_mistake: Immediately choosing the Vision Transformer 'because it's state-of-the-art' without
    considering the physics of the hardware. A junior answer is qualitative; a senior answer is quantitative.
    Another mistake is to propose a lengthy empirical bake-off without a guiding hypothesis, wasting months
    of engineering time. The goal is to predict the outcome with high confidence using math.
  napkin_math: 'Goal: Prove the Hybrid CNN is viable and the ViT is not, based on the Orin''s 33ms latency
    budget. Orin memory bandwidth is 204.8 GB/s. Max data transfer strictly bound by physics in 33ms =
    204.8 GB/s * 0.033s = 6.75 GB. The ViT requires 8 GB of memory traffic per frame, meaning it will
    take at least 8 / 204.8 = 39ms strictly bound by memory physics, failing the 33ms budget regardless
    of compute optimizations. The Hybrid CNN requires 1 GB (takes ~5ms memory time) and 500 GOPs (takes
    ~1.8ms at 275 TOPS), easily fitting the 33ms budget.'
