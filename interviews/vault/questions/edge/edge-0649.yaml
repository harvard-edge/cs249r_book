title: The Autonomous Perception Horizon
scenario: 'You are the new lead architect for the perception team at a major autonomous vehicle company. Our current fleet runs on a Jetson AGX Orin with a 60W thermal design power (TDP) and uses a mature, highly-optimized CNN-based model for object detection. This system reliably hits its 33ms end-to-end latency budget. However, to advance our autonomous capabilities, we must improve detection of small, distant objects and performance in dense, cluttered scenes. Your team has two competing proposals for the next-generation model: Proposal A is a deeper Hybrid CNN requiring 500 GOPs and 1 GB of memory traffic per frame. Proposal B is a high-resolution Vision Transformer (ViT) requiring 300 GOPs but 8 GB of memory traffic per frame due to large self-attention maps.'
question: Which proposal is viable within the 33ms latency budget?
details:
  realistic_solution: The correct approach is to immediately analyze both proposed architectures through the lens of the Roofline Model, specifically by estimating their Arithmetic Intensity (AI) relative to the Jetson AGX Orin's hardware capabilities. The path chosen must respect the physics of the device.
  common_mistake: |
    **The Pitfall:** Choosing the Vision Transformer purely based on state-of-the-art status or lower MAC count, without analyzing memory bandwidth.
    **The Rationale:** Candidates evaluate models solely on qualitative trends or compute FLOPs, completely ignoring the Arithmetic Intensity limits of the hardware.
    **The Consequence:** The deployed model is catastrophically memory-bound and misses the safety-critical real-time latency deadline.
  napkin_math: |
    - AGX Orin memory bandwidth is 204.8 GB/s. Latency budget is 33ms (0.033s).
    - Max theoretical data transfer in 33ms = 204.8 GB/s * 0.033s = 6.75 GB.
    - Proposal B (ViT) requires 8 GB per frame. 8 GB / 204.8 GB/s = 39ms strictly for memory transfer.
    - Proposal A (CNN) requires 1 GB per frame. 1 GB / 204.8 GB/s = 4.88ms for memory transfer. 500 GOPs takes ~1.8ms at 275 TOPS.
    **Conclusion: The ViT violates the laws of physics for this hardware within the 33ms budget. Only the CNN is viable.**
