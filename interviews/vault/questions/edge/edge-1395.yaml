title: Zero-Copy Micro-Batching on Hailo-8 Architecture
scenario: You are designing the inference pipeline for a multi-camera traffic intersection
  monitor using a single Hailo-8 accelerator (26 TOPS INT8, 2.5W). The system runs
  a continuous vehicle detector on 8 independent 30 FPS streams and dynamically runs
  a heavy license plate reader only when a vehicle crosses a virtual line. Because
  Hailo-8 is a dataflow accelerator with no local DRAM that streams weights and activations
  directly from host memory, design a batching and scheduling architecture that minimizes
  host PCIe contention and guarantees strict 33ms latency for the detector.
question: How would you batch and schedule detector and license-plate-reader work
  on one Hailo-8 to minimize PCIe contention and meet the 33 ms detector SLA?
details:
  realistic_solution: The optimal approach is continuous streaming micro-batching
    using zero-copy host memory buffers. The core detector should remain resident
    on the Hailo-8's spatial fabric to avoid weight reloading. The license plate reader
    should only be scheduled in dynamically sized micro-batches during idle dataflow
    cycles, utilizing a host-side preemptive scheduler that explicitly models PCIe
    bandwidth to balance activation streaming and weight swapping.
  common_mistake: Candidates often propose standard time-window dynamic batching (like
    Triton on GPUs) to maximize throughput, ignoring the Hailo-8's lack of local DRAM.
    They fail to realize that large batch sizes or frequent model context switching
    will saturate the PCIe bus by constantly re-streaming weights from host memory,
    causing severe latency spikes.
  napkin_math: 8 cameras at 30 FPS require a 33.3ms per-frame SLA. Detector compute
    at 15 GOPS * 240 frames/sec = 3.6 TOPS, easily fitting within the 26 TOPS INT8
    capacity. However, 1080p INT8 inputs equal ~2MB/frame. Streaming a dynamic batch
    of 8 frames takes 16MB. Over a typical PCIe Gen3 x2 link (~2 GB/s), transferring
    this batch takes 8ms. If the license plate reader requires a 25MB weight swap
    from host memory, that swap takes an additional 12.5ms. 8ms (input transfer) +
    12.5ms (weight transfer) + 2ms (compute) = 22.5ms, which safely fits under the
    33.3ms latency budget. Increasing the batch size further would cause the streaming
    IO time to breach the latency constraint.
