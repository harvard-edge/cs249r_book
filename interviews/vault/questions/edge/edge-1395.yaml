title: Zero-Copy Micro-Batching on Hailo-8 Architecture
scenario: You are designing the inference pipeline for a multi-camera traffic intersection monitor using a single Hailo-8 accelerator. The system runs a continuous vehicle detector on 8 independent 30 FPS streams and dynamically runs a heavy license plate reader only when a vehicle crosses a virtual line.
question: Because Hailo-8 is a dataflow accelerator with no local DRAM, how would you batch and schedule the detector and license plate reader to minimize PCIe contention and meet the 33ms detector SLA?
details:
  realistic_solution: 'The optimal approach is continuous streaming micro-batching using zero-copy host memory buffers. The core detector should remain resident on the Hailo-8''s spatial fabric to avoid weight reloading. The license plate reader should only be scheduled in dynamically sized micro-batches during idle dataflow cycles, utilizing a host-side preemptive scheduler that explicitly models PCIe bandwidth to balance activation streaming and weight swapping.'
  common_mistake: |
    **The Pitfall:** Using standard time-window dynamic batching (like Triton on GPUs).
    **The Rationale:** Candidates assume standard throughput maximation works equally well on dataflow accelerators.
    **The Consequence:** Large batch sizes or frequent model context switches saturate the PCIe bus re-streaming weights from host memory, blowing past the 33ms latency SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: 33.3ms per frame (30 FPS).
       - Streams: 8 frames of 1080p INT8 (16MB total).
       - PCIe Gen3 x2 Bandwidth: ~2 GB/s.
       - LPR Weight Swap: 25MB.
       - Detector Compute Time: ~2ms.
    2. **Calculations:**
       - Input Transfer Time: 16 MB / 2000 MB/s = 8ms.
       - Weight Swap Transfer Time: 25 MB / 2000 MB/s = 12.5ms.
       - Total Pipeline Latency: 8ms (Input) + 12.5ms (Weights) + 2ms (Compute) = 22.5ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** The 22.5ms total latency safely fits under the 33.3ms budget. Increasing micro-batch sizes further would increase transfer times and breach the real-time SLA.
