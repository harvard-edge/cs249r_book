title: The Model Versioning Fleet Problem
scenario: 'You manage a fleet of 10,000 edge devices deployed across 200 retail stores for shelf monitoring.
  The fleet has 5 different hardware SKUs: (A) Jetson Orin Nano, (B) Hailo-8L on RPi5, (C) Google Coral
  on RPi4, (D) Intel NCS2 on x86 mini-PC, (E) Qualcomm RB3 Gen 2. You currently have 3 model versions
  in production (v2.1, v2.2, v2.3) because you can''t update all devices simultaneously — OTA rollouts
  take 2 weeks per wave. How many distinct model binaries do you need to maintain, and what''s the real
  operational cost?'
question: "How many distinct model binaries do you need to maintain, and what's the real operational cost?"
details:
  realistic_solution: 'The real binary count is ~30 (5 SKUs x 3 versions x 2 toolchain variants), not
    15. Each SKU uses a different compiler (TensorRT, Hailo Dataflow, Edge TPU Compiler, OpenVINO, SNPE)
    with debug/release variants. CI cost is modest ($360/year) but engineer time dominates: 1 engineer
    at 40% = $72K/year on cross-platform work. Standardizing from 5 to 2 SKUs saves ~$45K/year — enough
    to justify higher per-unit hardware cost.'
  common_mistake: '"5 hardware SKUs × 3 model versions = 15 binaries." This dramatically underestimates
    the combinatorial explosion because it ignores the compilation and optimization differences within
    each SKU.'
  napkin_math: 'Binary matrix: 5 SKUs × 3 versions × 2 toolchain variants (avg) = 30 binaries. CI cost:
    30 compilations × 20 min avg = 10 hours of compute per release. At $3/hr (GPU instances): $30/release
    × 12 releases/year = $360/year. Testing: 30 × 1hr × $3/hr = $90/release × 12 = $1,080/year. Engineering
    time (the real cost): 1 engineer × 40% × $180K salary = $72K/year spent on cross-platform compatibility.
    Reducing from 5 to 2 SKUs: engineering time drops to 15% = $27K/year. Annual savings: $45K — enough
    to absorb the slightly higher per-unit hardware cost of standardizing on a more capable (but more
    expensive) platform.'
