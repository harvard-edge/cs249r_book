title: PCIe Coral Edge TPU Cluster Routing
scenario: You are designing a local gateway for a smart factory that aggregates traffic
  from 10 high-speed cameras. The gateway is equipped with an array of 4 Google Coral
  Edge TPUs (PCIe form factor, 2W each). Each incoming frame must be processed by
  an INT8-quantized anomaly detection model. The cameras collectively generate 200
  requests per second. Architect a request routing and load balancing layer on the
  gateway to distribute these inference requests across the 4 Coral Edge TPUs, accounting
  for PCIe bandwidth constraints and the strict INT8 operational requirements.
question: How would you route 200 FPS from 10 cameras across 4 PCIe Coral Edge TPUs
  while minimizing copies and respecting INT8-only execution?
details:
  realistic_solution: The optimal design implements a lightweight, host-level dispatcher
    using a thread pool. Since the TPUs are connected via PCIe, the routing must minimize
    host-to-device memory copies. A consistent hashing ring based on the camera stream
    ID ensures that frames from the same camera are routed to the same Edge TPU. This
    maximizes cache utilization and allows for temporal optimizations in the video
    stream, while a weighted round-robin fallback handles any data skew if one camera
    spikes in frame rate.
  common_mistake: Candidates often suggest deploying complex network load balancers
    (like HAProxy or NGINX) which are too heavyweight for intra-device PCIe routing.
    They also frequently miss that models must be fully quantized to INT8 to run on
    the Coral, and may propose dynamic routing that incurs high host-to-device memory
    transfer overheads instead of batching or pinning streams.
  napkin_math: 'Total incoming traffic: 200 FPS. Target hardware: 4 x Google Coral
    Edge TPUs (4 TOPS INT8 each). Total cluster compute: 16 TOPS. If the INT8 anomaly
    model requires 50 GOPS per frame, a single TPU can theoretically process 4000
    GOPS / 50 GOPS = 80 FPS. Total cluster capacity is 4 * 80 = 320 FPS. The cluster
    can comfortably handle the 200 FPS load, drawing a maximum of 8W (4 * 2W) for
    inference compute.'
