title: The V2X Mesh Partition
scenario: You are architecting a V2X (vehicle-to-everything) system for an intersection with 20 vehicles,
  each with a Jetson Orin running object detection. Vehicles share detections over 5.9 GHz DSRC (dedicated
  short-range communication) at 6 Mbps effective per channel, with 7 available channels. Each detection
  message is 2 KB. During peak, each vehicle generates 30 detections/second. Design a channel allocation
  scheme that prevents message loss, and calculate whether the available bandwidth is sufficient.
details:
  realistic_solution: 'Total message rate: 20 vehicles × 30 det/s = 600 messages/s. Each message: 2 KB.
    Total data rate: 600 × 2 KB = 1,200 KB/s = 1.17 MB/s = 9.4 Mbps. With 7 channels at 6 Mbps each =
    42 Mbps raw capacity. At 50% efficiency under contention: 21 Mbps effective. 9.4 Mbps < 21 Mbps —
    sufficient with margin. Allocation: divide 20 vehicles into 4 groups of 5 across 4 data channels.
    Per-channel load: 5 × 30 × 2 KB/s = 300 KB/s = 2.4 Mbps < 3 Mbps effective per channel. Reserve 2
    channels for safety-critical priority messages and 1 for control/coordination. Use TDMA slots within
    each channel to eliminate contention.'
  common_mistake: Treating the wireless medium as a wired switch — assuming all channels can carry full
    load simultaneously without contention. In shared-medium wireless, all nodes on one channel contend
    for access, reducing effective throughput to ~40-60% under load.
  napkin_math: 'Messages: 20 × 30 = 600/s. Data: 600 × 2 KB = 1,200 KB/s = 9.4 Mbps. Raw capacity: 7 ×
    6 Mbps = 42 Mbps. Contention-adjusted (50%): 21 Mbps. Load ratio: 9.4 / 21 = 44.76% — safe. Per-group
    (5 vehicles/channel): 5 × 30 × 2 = 300 KB/s = 2.4 Mbps per channel. Headroom per channel: 3.0 - 2.4
    = 0.6 Mbps (20% margin).'
