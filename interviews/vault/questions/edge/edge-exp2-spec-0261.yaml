title: Adversarial Patch Defense Spec on Jetson Orin
scenario: You are designing the specification for a computer vision pipeline on an autonomous drone powered
  by an NVIDIA Jetson Orin. The system must process 4K video at 30 FPS to detect navigation hazards, but
  recent intelligence indicates adversaries may deploy physical adversarial patches to blind the drone.
  The main perception model already consumes 180 TOPS of the available 275 TOPS INT8 budget. Design a
  specification for a robust defense mechanism that mitigates adversarial patches while analyzing how
  your proposed defense interacts with the main model across the Ampere GPU, DLA accelerator, and the
  32 GB LPDDR5 memory within the 60W TDP limit.
details:
  realistic_solution: A strong specification maps a lightweight defense, such as an input-denoising autoencoder
    or feature squeezer, explicitly to the DLA accelerator, reserving the Ampere GPU for the main perception
    model. By pipelining the input so the DLA sanitizes the frames before GPU inference, the design avoids
    compute contention, manages the 32 GB LPDDR5 bandwidth effectively, and strictly respects power limits.
  common_mistake: Candidates often propose running complex defenses like randomized smoothing or large
    ensembles directly on the GPU alongside the main model. They fail to analyze hardware interactions,
    leading to resource contention, memory bottlenecks, and thermal throttling that exceeds the 60W TDP.
  napkin_math: Total compute budget is 275 TOPS INT8. The main model uses 180 TOPS, leaving 95 TOPS. A
    4K stream (3840x2160x3 bytes) at 30 FPS requires ~746 MB/s of memory bandwidth, which easily fits
    in the LPDDR5 limits. If the DLA-based denoising model requires 1.5 Tera-operations (TOP) per frame,
    running at 30 FPS consumes 45 TOPS. Total system compute is 180 + 45 = 225 TOPS, safely under the
    275 TOPS ceiling and 60W TDP limit.
