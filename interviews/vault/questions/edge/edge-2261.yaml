title: Edge Fine-Tuning Data Starvation
scenario: 'An edge gateway fine-tunes a defect detector nightly from locally captured images. The GPU should consume 1,200 images/s, but the local preprocessing pipeline decodes and augments only 650 images/s. Storage reads are 2 GB/s and images average 500 KB compressed.'
question: 'Why is nightly edge fine-tuning GPU-starved when storage reads 2 GB/s but preprocessing provides only 650 images/s?'
details:
  realistic_solution: 'Storage can supply about 4,000 images/s, so storage is not the bottleneck. The CPU preprocessing pipeline supplies only 650 images/s, well below the 1,200 images/s GPU demand. The binding wall is transformation/preprocessing, not disk bandwidth.'
  common_mistake: |
    **The Pitfall:** Checking only storage bandwidth and assuming the data path is fine.
    **The Rationale:** Candidates see 2 GB/s and assume that if the disk is fast, data loading is not the bottleneck.
    **The Consequence:** They fail to measure decode and augmentation throughput, completely missing the CPU preprocessing bottleneck.
  napkin_math: |
    * Storage capacity = 2 GB/s / 0.5 MB = 4,000 images/s.
    * Preprocessing supply = 650 images/s.
    * GPU demand = 1,200 images/s.
    * **Conclusion: Preprocessing (650 images/s) is far below the 1,200 images/s demand, making it the primary bottleneck.**
