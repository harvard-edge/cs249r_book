title: Edge New 0010
scenario: A 500KB model must fit on a Cortex-M4 microcontroller. You can apply 50% unstructured pruning (keep FP32) or 8-bit quantization (INT8).
question: Should the 500KB Cortex-M4 model use 50% unstructured pruning or INT8 quantization to fit 256KB SRAM, and why?
details:
  realistic_solution: Unstructured pruning zeros out weights but requires storing indices (CSR format), meaning a 50% prune might not even reduce the size to 256KB. Furthermore, Cortex-M4 lacks hardware for sparse matrix multiplications, leading to branching overhead that actually increases latency. INT8 quantization guarantees a 4x size reduction (to 125KB) with dense matrix math that executes predictably fast. INT8 is the definitive choice.
  common_mistake: |
    **The Pitfall:** Blindly applying unstructured pruning from cloud literature to microcontrollers.
    **The Rationale:** Candidates ignore the index storage overhead of sparse formats and the lack of sparse ALU support on the M4.
    **The Consequence:** The model still fails to fit in memory and suffers a massive latency penalty due to branching overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size (FP32): 500KB.
       - Hardware: Cortex-M4 with 256KB SRAM.
    2. **Calculations:**
       - Pruned 50% (FP32): 250KB weights + ~50KB CSR indices = 300KB (Exceeds 256KB).
       - INT8 Quantization: 500KB / 4 = 125KB.
       - Remaining SRAM (INT8): 256KB - 125KB = 131KB.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 is Mandatory**. Unstructured pruning still OOMs at 300KB, whereas INT8 fits cleanly in SRAM with 131KB to spare for activations and RTOS.
