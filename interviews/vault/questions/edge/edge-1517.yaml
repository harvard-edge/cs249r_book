title: Dataflow Starvation and Watchdog Triggers
scenario: We are deploying an ADAS perception model on a Hailo-8 accelerator (26 TOPS
  INT8, 2.5W). Because the Hailo-8 uses a dataflow architecture with no local DRAM,
  it streams weights and activations directly from host memory. During system validation,
  the safety watchdog timer occasionally trips, indicating a missed real-time execution
  deadline. This failure only occurs when the host CPU initiates a large DMA transfer
  to write diagnostic log files to the NVMe storage. Identify the architectural root
  cause of this non-deterministic behavior.
question: What architectural issue makes Hailo-8 inference miss deadlines when the
  host writes diagnostic logs to NVMe?
details:
  realistic_solution: The root cause is host memory bandwidth contention. Since the
    Hailo-8 lacks local DRAM, it relies on a continuous, deterministic stream of data
    from the host to keep its dataflow pipeline fed. The large NVMe DMA transfer saturates
    the shared memory controller or PCIe bus, starving the Hailo-8. This stalls the
    accelerator, pushing inference latency beyond the strict deadline monitored by
    the safety watchdog.
  common_mistake: Candidates often assume the Hailo-8 is thermally throttling due
    to its 2.5W power envelope or that the host CPU is computationally overloaded
    and failing to schedule the task. They frequently miss the impact of the shared
    host memory bus on a DRAM-less accelerator.
  napkin_math: Assume the model requires streaming 120 MB of data per frame to utilize
    the 26 TOPS compute engine. To meet a 33.3ms (30 FPS) safety deadline, the Hailo-8
    needs 120 MB / 33.3 ms = 3.6 GB/s of guaranteed bandwidth. If the system has 6
    GB/s of total bandwidth and the NVMe transfer consumes 3 GB/s, only 3 GB/s remains
    for the Hailo-8. At 3 GB/s, streaming 120 MB takes 40ms. Because 40ms exceeds
    the 33.3ms execution deadline, the deterministic bounds are broken and the watchdog
    triggers.
