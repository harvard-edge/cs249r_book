title: The Fusion Overhead Fallacy
scenario: 'You are optimizing a small CNN on a Jetson AGX Orin for a real-time object detection pipeline. A profiler reveals a critical sequence of three operations: a 3x3 depth-wise convolution, a ReLU activation, and a batch normalization layer. Each operation is dispatched as a separate CUDA kernel. The execution times are 15µs for the convolution, 2µs for the ReLU, and 3µs for the batch norm.'
question: If you fuse these three operations into a single kernel, what is the approximate latency speedup assuming a 5µs kernel launch overhead?
details:
  realistic_solution: 'Kernel fusion eliminates redundant kernel launch overheads and intermediate memory round-trips to VRAM. The core compute time remains unchanged, but reducing three dispatches to one saves two instances of launch overhead.'
  common_mistake: |
    **The Pitfall:** Assuming fusion reduces the core computational time of the operations themselves.
    **The Rationale:** Candidates fail to understand that fusion primarily eliminates kernel launch overheads and intermediate memory round-trips, not the arithmetic workload.
    **The Consequence:** Incorrectly estimating the performance impact of operator fusion and potentially misprioritizing optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Core compute time: 15µs (Conv) + 2µs (ReLU) + 3µs (BN) = 20µs
    - Launch overhead: 5µs per kernel

    **Calculations:**
    - Before fusion: 20µs core compute + (3 * 5µs launch overhead) = 35µs total
    - After fusion: 20µs core compute + (1 * 5µs launch overhead) = 25µs total
    - Speedup: 35µs / 25µs = 1.40x

    **Conclusion & Interpretation:**
    - **Result: 1.40x speedup.** 40% faster execution.
  options:
  - '~14.3% speedup'
  - '~28.6% speedup'
  - '~50.0% speedup'
  - '10µs'
