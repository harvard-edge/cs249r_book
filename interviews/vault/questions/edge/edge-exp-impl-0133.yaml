title: Unstructured Sparsity Bandwidth on Hailo-8
scenario: You are deploying a vision model to a Hailo-8 edge accelerator (26 TOPS INT8, 2.5W). Since the
  Hailo-8 has no local DRAM and streams weights and activations directly from host memory, I/O bandwidth
  is a critical constraint. A dense fully-connected layer in your network contains 4,000,000 INT8 weights
  and must be executed at 60 frames per second. To reduce the weight streaming bandwidth, a colleague
  suggests applying 50% unstructured sparsity, encoding the sparse weights in a Compressed Sparse Row
  (CSR) format using 16-bit column indices. Calculate the required weight memory bandwidth in MB/s for
  both the dense format and the proposed sparse format to prove whether this optimization is mathematically
  sound.
question: "What weight bandwidth at 60 FPS is required for the dense 4M INT8 layer versus 50% CSR sparsity with 16-bit indices, and does CSR help?"
details:
  realistic_solution: The candidate should calculate the baseline dense bandwidth and then compute the
    sparse bandwidth by combining the size of the non-zero INT8 values with their corresponding 16-bit
    indices. They should prove that unstructured sparsity actually increases bandwidth in this scenario
    and correctly suggest that structured pruning (e.g., removing entire channels) is necessary to reduce
    streaming overhead on a dataflow architecture like the Hailo-8.
  common_mistake: Candidates often assume that 50% sparsity automatically halves the memory bandwidth.
    They frequently forget to account for the metadata overhead of sparse encoding formats (like CSR indices),
    which heavily penalizes low-precision data types like INT8.
  napkin_math: 'Dense memory bandwidth: 4,000,000 weights * 1 byte (INT8) * 60 FPS = 240,000,000 bytes/sec
    = 240 MB/s. Sparse footprint per frame: 2,000,000 non-zero weights * 1 byte (values) + 2,000,000 indices
    * 2 bytes (INT16 column indices) = 2 MB + 4 MB = 6 MB total payload (ignoring minor row pointer overhead).
    Sparse memory bandwidth: 6 MB * 60 FPS = 360 MB/s. The unstructured sparsity approach actually increases
    required bandwidth by 120 MB/s.'
