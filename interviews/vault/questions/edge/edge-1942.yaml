title: Hardware-aware NAS Deployment on NVIDIA Jetson Orin for Real-time Object Detection
scenario: 'You are tasked with deploying a real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). Your team has developed a neural architecture search (NAS) pipeline that explores MobileNet-like architectures. The current best model from a general-purpose NAS, while highly accurate, exhibits unacceptable tail latencies and frequently exceeds the power budget.'
question: 'Why might the general-purpose NAS model miss Jetson Orin latency and power targets, and how should hardware-aware NAS fix this?'
details:
  realistic_solution: 'Implement a hardware-aware NAS approach where the search space is explicitly constrained or penalized by hardware-specific metrics like actual latency measurements on the Jetson Orin, estimated SRAM/DRAM usage, and power consumption during the search or evaluation phase. This might involve using a latency predictor, energy models, or techniques inspired by MCUNet to co-optimize the model architecture and its mapping to the specific memory hierarchy and compute units of the Jetson Orin. The goal is to find Pareto-optimal architectures that balance accuracy, latency, and power within the Jetson Orin''s constraints, moving beyond simple FLOPs/MACs-based proxies and directly optimizing for real-world hardware performance.'
  common_mistake: |
    **The Pitfall:** Solely optimizing for FLOPs or MACs during the NAS process.
    **The Rationale:** FLOPs are a hardware-agnostic proxy for complexity, making general-purpose NAS easier to run.
    **The Consequence:** The NAS selects models with fragmented memory access patterns that thrash the LPDDR5 bandwidth, creating models that are theoretically efficient but practically slow and power-hungry on the edge.
  napkin_math: |
    * Jetson Orin LPDDR5 memory bandwidth: ~68 GB/s.
    * Assume a 10 GOPs model has fragmented memory access, requiring 200 MB of data movement to/from LPDDR5 per inference.
    * At 30 FPS, total memory movement is 200 MB * 30 = 6 GB/s.
    * If the model requires 2 GB of data movement per frame due to massive un-fused activations, memory transfer time is 2 GB / 68 GB/s ≈ 29.4 ms per frame.
    * **This completely consumes the ~33ms real-time budget just on memory transfers, ignoring compute time.**
