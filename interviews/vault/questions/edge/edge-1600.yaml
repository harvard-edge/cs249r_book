title: Hailo-8 Activation Spilling Bandwidth Calculation
scenario: You are deploying a high-resolution vision model on a Hailo-8 accelerator. A bottleneck layer produces an activation map of dimensions [Batch=1, Height=512, Width=512, Channels=64] that must be offloaded and then read back for the next stage.
question: For a 512x512x64 INT8 activation spilled and restored at 30 FPS on Hailo-8, what sustained host memory bandwidth is required?
details:
  realistic_solution: Calculate the total byte size of the INT8 activation map. Multiply this size by two to account for the full round trip (spilling to host memory and restoring back to the accelerator) since the Hailo-8 has no local DRAM. Multiply by the target frame rate for sustained bandwidth.
  common_mistake: |
    **The Pitfall:** Forgetting the 2x multiplier for the round trip or assuming FP32 precision.
    **The Rationale:** Candidates fail to realize that a spill-and-restore requires both writing to and reading from host memory, or they forget the Hailo-8 explicitly operates in INT8.
    **The Consequence:** Underestimating the required PCIe bandwidth by a factor of 2, leading to mis-sized hardware interfaces.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Format: INT8 (1 byte per element)
       - Rate: 30 FPS
    2. **Calculations:**
       - Activation Size = 512 * 512 * 64 = 16,777,216 bytes (~16 MB)
       - Round-trip = 16 MB * 2 = 32 MB per frame
       - Bandwidth Requirement = 32 MB/frame * 30 FPS = 960 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: 960 MB/s sustained bandwidth.**
