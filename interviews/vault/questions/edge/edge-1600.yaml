title: Hailo-8 Activation Spilling Bandwidth Calculation
scenario: You are deploying a high-resolution vision model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, any intermediate activation that exceeds the on-chip SRAM capacity must be temporarily spilled to the host memory over PCIe. A bottleneck layer produces an activation map of dimensions [Batch=1, Height=512, Width=512, Channels=64] that must be offloaded and then read back for the next stage.
question: For a 512x512x64 INT8 activation spilled and restored at 30 FPS on Hailo-8, what sustained host memory bandwidth is required?
details:
  realistic_solution: The candidate should calculate the total byte size of the activation map using the INT8 data type. They must then multiply this size by two to account for the full round trip (spilling to host memory and restoring back to the accelerator) since there is no local DRAM buffer. Finally, they multiply by the target frame rate to find the total sustained bandwidth.
  common_mistake: |
    **The Pitfall:** Forgetting the 2x multiplier for the round trip or assuming FP32 precision.
    **The Rationale:** Candidates fail to realize that a spill-and-restore requires both writing to and reading from host memory, or they forget the Hailo-8 explicitly operates in INT8.
    **The Consequence:** Underestimating the required PCIe bandwidth by a factor of 2 (or overestimating by 2x if using FP32), leading to mis-sized hardware interfaces.
  napkin_math: |
    - **Activation Size:** 512 * 512 * 64 = 16,777,216 elements.
    - **Data Type:** INT8 (1 byte per element) = 16 MB per map.
    - **Round-trip (spill + restore):** 16 MB * 2 = 32 MB per frame.
    - **Bandwidth Requirement:** 32 MB/frame * 30 FPS = **960 MB/s**.
