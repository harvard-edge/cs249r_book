title: Diagnosing INT8 Quantization Failures from Biased Calibration
scenario: 'You deployed an object detection model to an NVIDIA Jetson Orin for 24/7 autonomous monitoring. To utilize the Ampere GPU and DLA accelerator''s combined 275 TOPS INT8 performance and stay under the 60W TDP, you quantized the FP32 model to INT8. During daytime operations, the model matches the FP32 accuracy, but at night, predictions become completely erratic despite the FP32 model performing perfectly on nighttime validation data.'
question: What calibration dataset curation failure caused the Jetson Orin INT8 model to fail at night while FP32 still works?
details:
  realistic_solution: 'The root cause is a biased calibration dataset used during the post-training quantization process. If the curated calibration dataset only contained daytime images, the activation scaling factors are strictly optimized for daylight pixel distributions. Nighttime images with different luminance profiles cause severe activation clipping in the INT8 layers, destroying accuracy. The fix is to re-curate a representative calibration set spanning all operational lighting conditions.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing as general domain shift or sensor noise.
    **The Rationale:** Candidates ignore the crucial clue that the unquantized FP32 model still works perfectly at night.
    **The Consequence:** They waste time retraining the FP32 model on nighttime data instead of simply fixing the flawed INT8 calibration dataset.
  napkin_math: |
    *   **Daytime Activations:** Span [-5.0, 5.0], scale factor = 5.0/127 = 0.039.
    *   **Nighttime Activations:** Shift to [0.0, 12.0].
    *   **Clipping Severity:** The daytime INT8 config clips all values above 5.0, losing 58% of the nighttime activation range (7.0 / 12.0).
    *   **Calibration Footprint:** 1000 1080p RGB images = ~6.2 GB RAM.
    *   **Result:** **The Jetson's 32GB easily handles a large, diverse calibration set to fix the 58% range loss.**
