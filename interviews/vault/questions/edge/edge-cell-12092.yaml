title: 'Model Size Estimation: Compare Memory Footprint: Full Model vs. Quantized on Jetson Orin'
scenario: 'Compare the LPDDR5 memory footprint (32GB, 204 GB/s) on Jetson Orin for a YOLOv8-l model (43.7M
  params) in three precisions: FP32, FP16, and INT8 TensorRT. Include weights, input tensor (640×640×3
  at FP32 input), and output tensor (84×8400 bounding boxes). Evaluate which fits within the 32GB and
  which enables maximum concurrent model instances.'
question: "How much LPDDR5 memory does YOLOv8-l use on Jetson Orin in FP32, FP16, and INT8 TensorRT, and how many concurrent instances fit?"
details:
  realistic_solution: 'Weights: FP32: 43.7M×4B=174.8MB. FP16: 87.4MB. INT8: 43.7MB. TensorRT: ×1.3. Input:
    640×640×3×4B=4.7MB (kept FP32 for camera pipeline). Output: 84×8400×4B=2.8MB. Activation peak (FP32):
    ~200MB. Total FP32: 174.8+200+4.7+2.8=382MB. FP16: 87.4+100+4.7+2.8=194.9MB. INT8 TRT: 56.8+50+4.7+2.8=114.3MB.
    All fit in 32GB. Max concurrent instances: 32GB/114MB = 280 INT8 instances (but compute bottleneck
    applies first).'
  common_mistake: Reporting only weight memory without output/input tensor sizes; for YOLOv8, the output
    tensor alone is 84×8400×4B = 2.8MB — negligible but should be mentioned for completeness.
  napkin_math: 'INT8 TRT YOLOv8-l: 43.7MB×1.3=56.8MB + activations 50MB + I/O 7.5MB = 114.3MB. 32GB/114.3MB=280
    model instances in memory. At 30fps per instance and Orin throughput: more realistic limit is compute
    (275 TOPS). YOLOv8-l: 165 GFLOPs. 1 instance at 30fps: 165G×30=4.95 TOPS. Orin: 275 TOPS → 55 concurrent
    instances at 30fps. Memory budget: 55×114MB=6.3GB << 32GB. Compute-bottlenecked.'
