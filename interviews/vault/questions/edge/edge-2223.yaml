title: Power-aware training schedule using autograd profiling on Jetson Orin
scenario: You are running adaptive fine-tuning on Jetson Orin constrained to a 25W
  power budget (half of Orin's 60W TDP) to avoid thermal throttling during extended
  outdoor deployment. Standard training at full power runs at 8ms/step but triggers
  thermal throttling after 10 minutes, slowing to 25ms/step.
question: How would you keep adaptive fine-tuning on Orin within a 25 W budget without
  hitting the 25 ms thermal-throttled regime?
details:
  realistic_solution: 'Profile power using tegrastats or nvidia-smi during separate
    forward and backward passes. Backward is typically 2× as power-intensive as forward.
    Implement a ''duty cycle'' approach: train for 30 seconds, idle for 10 seconds
    to let temperature recover. Use nvpmodel to set a 25W power mode on Orin. With
    power-capped at 25W: compute throughput reduces to ~40% but thermal envelope is
    maintained indefinitely. Alternatively, use mixed-precision (FP16) to reduce power
    by ~30% with negligible accuracy loss.'
  common_mistake: Assuming that reducing batch size proportionally reduces power consumption.
    Smaller batches reduce GPU utilization but may increase per-sample power due to
    higher memory access patterns relative to compute. Not instrumenting actual power
    draw during backward pass vs forward pass.
  napkin_math: 'Orin at 60W full training: 8ms/step. After throttling at 25ms/step:
    effective throughput = 1000ms / 25ms = 40 steps/second. At 25W mode: ~25ms/step
    constant. 30s train + 10s idle cycle: effective step rate = 30/(30+10) × 1000/25
    = 30 steps/second. Better than throttling (40 steps/second) but thermally sustainable.
    3600 steps/hour vs 2400 steps/hour without thermal management.'
