title: Power-aware training schedule using autograd profiling on Jetson Orin
scenario: You are running adaptive fine-tuning on Jetson Orin constrained to a 25W power budget (half of Orin's 60W TDP) to avoid thermal throttling during extended outdoor deployment. Standard training at full power runs at 8ms/step but triggers thermal throttling after 10 minutes, slowing to 25ms/step.
question: How would you keep adaptive fine-tuning on Orin within a 25 W budget without hitting the 25 ms thermal-throttled regime?
details:
  realistic_solution: "Profile power using tegrastats or nvidia-smi during separate forward and backward passes. Backward is typically 2x as power-intensive as forward. Implement a 'duty cycle' approach: train for 30 seconds, idle for 10 seconds to let temperature recover. Use nvpmodel to set a 25W power mode on Orin. With power-capped at 25W: compute throughput reduces to ~40% but thermal envelope is maintained indefinitely. Alternatively, use mixed-precision (FP16) to reduce power by ~30% with negligible accuracy loss."
  common_mistake: |
    **The Pitfall:** Assuming that reducing batch size proportionally reduces power consumption.
    **The Rationale:** Candidates don't instrument actual power draw, ignoring that smaller batches reduce utilization but may increase per-sample power due to memory access patterns.
    **The Consequence:** The device still triggers thermal throttling, plummeting training throughput unpredictably.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 25W limit on Orin (60W TDP max)
       - Full 60W power runs at 8ms/step, throttles to 25ms/step (40 steps/sec)
       - 25W mode yields constant 25ms/step
    2. **Calculations:**
       - 30s train + 10s idle duty cycle in 25W mode
       - Effective step rate = (30 / 40s) * (1000ms / 25ms) = 30 steps/sec
       - Hourly throughput = 30 steps/sec * 3600s = 108,000 steps/hr
    3. **Conclusion & Interpretation:**
       **Result: 30 steps/sec (Thermal-Bound)**
