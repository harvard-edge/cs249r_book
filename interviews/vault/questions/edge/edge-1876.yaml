title: Optimizing Data Movement for Edge AI on Jetson Orin
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson AGX Orin with 32 GB LPDDR5. The model processes a 1080p video stream at 30 FPS. Profiling reveals that 30% of the 50ms frame time is spent on transferring video frames via standard malloc and cudaMemcpy.
question: How would you diagnose and optimize the 15ms Jetson Orin data-movement bottleneck using pinned memory, async copies, or zero-copy mapping?
details:
  realistic_solution: First, use NVIDIA Nsight Systems to precisely pinpoint the `cudaMemcpy` calls and their duration, identifying if they are synchronous or asynchronous and whether they are blocking. Then, implement pinned (page-locked) host memory for the input video frames and output buffers using `cudaHostAlloc`. This ensures the memory is not paged out by the OS and is directly accessible by the DMA engine. Utilize CUDA streams for asynchronous `cudaMemcpyAsync` operations, overlapping data transfers with kernel execution. For the Orin's iGPU architecture, zero-copy memory (allocated with `cudaHostAlloc` with `cudaHostAllocMapped` flag) allows the GPU to directly access the host's pinned memory, eliminating explicit `cudaMemcpy` calls, though careful synchronization is crucial. The most impactful solution likely involves a combination of pinned memory, asynchronous transfers, and minimizing total data transferred by processing on-device where possible.
  common_mistake: |
    **The Pitfall:** Assuming standard `cudaMemcpy` is required on unified memory architectures like Jetson.
    **The Rationale:** Candidates apply discrete GPU memory paradigms to SoC platforms with shared LPDDR5.
    **The Consequence:** Wasting massive memory bandwidth and CPU cycles on redundant data copies.
  napkin_math: |
    - Current frame time: 50ms.
    - Current transfer overhead: 50ms * 0.30 = 15ms.
    - Target reduction using zero-copy/pinned memory: ~60% reduction (9ms savings).
    - Optimized frame time: 50ms - 9ms = 41ms.
    - Optimized FPS: 1000ms / 41ms = 24.4 FPS.
    **Eliminating explicit copies increases throughput by 22%, pushing performance closer to 30 FPS.**
