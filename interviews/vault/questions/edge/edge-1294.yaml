title: Adversarial Power Spikes on Cloud AI 100
scenario: You have deployed an INT8 vision model on an on-premise Qualcomm Cloud AI
  100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). Normally, the system processes
  1000 FPS and consumes around 35W due to hardware-level sparsity optimizations that
  skip zero-value activations. Recently, you observe sudden, sustained power spikes
  up to 70W and subsequent thermal throttling for specific batches of user inputs,
  even though the input dimensions and request rates are identical. Diagnose the root
  cause of this hardware symptom and explain the security implications.
question: What is causing the 70W power spikes and thermal throttling on identical
  inputs, and what are the security implications?
details:
  realistic_solution: The root cause is an energy-latency adversarial attack (e.g.,
    a sponge example). The attacker injects imperceptible noise to intentionally eliminate
    activation sparsity. By turning zero-valued activations into small non-zero values,
    the hardware can no longer skip MAC operations or compress memory transfers. This
    forces the Cloud AI 100 to execute the dense graph, drastically increasing dynamic
    power consumption and memory bandwidth utilization on the LPDDR4x, leading to
    a localized denial-of-service via thermal throttling.
  common_mistake: Candidates often misdiagnose this as a memory leak, batching misconfiguration,
    or standard heavy workload without recognizing the security implication (a 'sponge'
    or power-DoS adversarial attack). They might also fail to connect the hardware's
    sparsity acceleration features to the sudden increase in power consumption.
  napkin_math: Assume the model requires 100 INT8 GOPS per frame. At 1000 FPS, this
    is 100 TOPS. With typical 50% activation sparsity, the AI 100 only executes 50
    TOPS. If the power profile is 15W static + 0.4W per active TOPS, normal power
    is 15W + (50 * 0.4W) = 35W. An adversarial attack that reduces sparsity to 0%
    forces the full 100 TOPS. Compute power jumps to 40W. Additionally, zero-compression
    failure on the 32 GB LPDDR4x doubles memory traffic, adding ~15W of memory power.
    Total power jumps to 15W (static) + 40W (compute) + 15W (memory) = 70W, pushing
    the card near its 75W TDP and causing thermal throttling.
