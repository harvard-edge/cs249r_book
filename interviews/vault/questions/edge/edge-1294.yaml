title: 'Adversarial Power Spikes on Cloud AI 100'
scenario: 'You have deployed an INT8 vision model on an on-premise Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). Normally, the system processes 1000 FPS and consumes around 35W due to hardware-level sparsity optimizations that skip zero-value activations. Recently, you observe sudden, sustained power spikes up to 70W and subsequent thermal throttling for specific batches of user inputs, even though the input dimensions and request rates are identical.'
question: 'What is causing the 70W power spikes and thermal throttling on identical inputs, and what are the security implications?'
details:
  realistic_solution: 'The root cause is an energy-latency adversarial attack (e.g., a sponge example). The attacker injects imperceptible noise to intentionally eliminate activation sparsity. By turning zero-valued activations into small non-zero values, the hardware can no longer skip MAC operations or compress memory transfers. This forces the Cloud AI 100 to execute the dense graph, drastically increasing dynamic power consumption and memory bandwidth utilization on the LPDDR4x, leading to a localized denial-of-service via thermal throttling.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing sudden power spikes as a memory leak, batching issue, or generic heavy workload.
    **The Rationale:** Engineers fail to connect hardware sparsity acceleration features with adversarial robustness.
    **The Consequence:** The true security vulnerability (a power-DoS sponge attack) is ignored, leaving the edge device susceptible to thermal throttling.
  napkin_math: |
    - Normal operation (50% sparsity): 50 active TOPS.
    - Normal compute power: 15W static + (50 * 0.4W) = 35W.
    - Adversarial operation (0% sparsity): 100 active TOPS.
    - Adversarial compute power: 15W static + (100 * 0.4W) = 55W.
    - Adversarial memory power (no zero-compression): adds ~15W.
    - Total adversarial power: 55W + 15W = **70W** (near 75W TDP limits, causing throttling).
