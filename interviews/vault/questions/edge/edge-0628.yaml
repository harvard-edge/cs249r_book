title: The ADAS Look-Ahead Dilemma
scenario: You are the lead ML Systems Architect for a new ADAS platform. The current system, running on a Jetson AGX Orin, handles standard perception and consumes ~70% of the device's compute and power budget. A new 'look-ahead' feature, requiring a 3-billion parameter Vision-Language Model (VLM) to interpret complex urban scenes, has been mandated. The VLM must generate a 5-token textual analysis within the existing 33ms hard real-time perception loop budget.
question: How would you architect a full-stack system to make a 3B VLM generate 5 tokens within a 33ms perception loop on an Orin already 70% utilized?
details:
  realistic_solution: Generative autoregressive decoding is bound by memory bandwidth, not compute. The Orin's available 61.4 GB/s bandwidth restricts loading a 3B model within the strict 33ms loop. Applying 4-bit quantization helps but is insufficient. The architecture must decouple the VLM from the critical perception loop via asynchronous evaluation, or implement Speculative Decoding with a tiny draft model (<500M parameters) to verify multiple tokens per single DRAM model read.
  common_mistake: |
    **The Pitfall:** Providing a purely model-centric answer (e.g., just quantize and prune).
    **The Rationale:** Candidates forget that generative inference on edge devices is fundamentally memory-bandwidth bound, not just compute-bound.
    **The Consequence:** Even a quantized model will fail to meet the 33ms deadline because the latency to load weights from DRAM per generated token exceeds the budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin total bandwidth: 204.8 GB/s.
       - Available bandwidth: 30% (61.4 GB/s).
       - Time budget per token: 33 ms / 5 tokens = 6.6 ms.
    2. **Calculations:**
       - Max weight loaded per token: 6.6 ms * 61.4 GB/s = 405 MB.
       - Max model size at 4-bit (0.5 bytes/param): 405 MB / 0.5 bytes = ~810M parameters.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth Exhaustion.** A 3B parameter model physically cannot be streamed from DRAM within the 33ms limit, mandating extreme architectural changes like speculative decoding or offloading.
