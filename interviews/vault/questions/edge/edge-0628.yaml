title: The ADAS Look-Ahead Dilemma
scenario: You are the lead ML Systems Architect for a new ADAS platform. The current system, running on a Jetson AGX Orin, handles standard perception (object detection, lane keeping) and consumes ~70% of the device's compute and power budget. A new 'look-ahead' feature, which requires a 3-billion parameter Vision-Language Model (VLM) to interpret complex urban scenes, has been mandated. The VLM must generate a 5-token textual analysis of the scene within the existing 33ms hard real-time perception loop budget. The VLM is too large and slow for naive deployment.
question: How would you architect a full-stack system to make a 3B VLM generate 5 tokens within a 33ms perception loop on an Orin already 70% utilized?
details:
  realistic_solution: The core problem is that generative inference on edge devices is almost always limited by memory bandwidth, not compute. The latency to load the model's weights from DRAM for every single generated token exceeds the entire time budget. Therefore, the architecture must focus on amortizing this I/O cost.
  common_mistake: |
    **The Pitfall:** Providing a purely model-centric answer (e.g., just quantize and prune).
    **The Rationale:** Candidates forget that generative inference on edge devices is fundamentally memory-bandwidth bound, not just compute-bound.
    **The Consequence:** Even a quantized model will fail to meet the 33ms deadline because the latency to load weights from DRAM per generated token exceeds the budget.
  napkin_math: |
    1. Orin total bandwidth: 204.8 GB/s. 70% is used, leaving 30% (61.4 GB/s) for the LLM.
    2. Generating 5 tokens in 33ms means 151 tokens/sec. Time per token is 33ms / 5 = 6.6ms.
    3. In auto-regressive generation, weights are loaded per token. Max weight size we can load in 6.6ms at 61.4 GB/s is 6.6ms * 61.4 GB/s = 405 MB.
    4. **Even quantized to 4-bit (0.5B/param), the max model size supported is ~800M parameters, proving a 3B model requires a radically different I/O architecture.**
