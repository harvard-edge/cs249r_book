title: The ADAS Look-Ahead Dilemma
scenario: You are the lead ML Systems Architect for a new ADAS platform. The current system, running on
  a Jetson AGX Orin, handles standard perception (object detection, lane keeping) and consumes ~70% of
  the device's compute and power budget. A new 'look-ahead' feature, which requires a 3-billion parameter
  Vision-Language Model (VLM) to interpret complex urban scenes, has been mandated. The VLM must generate
  a 5-token textual analysis of the scene within the existing 33ms hard real-time perception loop budget.
  The VLM is too large and slow for naive deployment. Propose a full-stack system architecture, from the
  model itself to the inference runtime, that makes this feature feasible. Justify your first three architectural
  decisions with quantitative reasoning.
question: "How would you make a 3B VLM generate 5 tokens within the 33ms perception loop on an Orin already 70% utilized?"
details:
  realistic_solution: The core problem is that generative inference on edge devices is almost always limited
    by memory bandwidth, not compute. The latency to load the model's weights from DRAM for every single
    generated token exceeds the entire time budget. Therefore, the architecture must focus on amortizing
    this I/O cost.
  common_mistake: A purely model-centric answer, e.g., 'I would quantize the model to INT8 and prune it.'
    While correct, this is insufficient. This L4-level answer ignores that even a smaller model will be
    fundamentally memory-bound on this hardware, and fails to propose the necessary system-level architectural
    changes to overcome the I/O bottleneck, which is the dominant factor for generative models on edge
    devices.
  napkin_math: 'Orin total bandwidth: 204.8 GB/s. 70% is used, leaving 30% (61.4 GB/s) for the LLM. Generating
    5 tokens in 33ms means 151 tokens/sec. Time per token is 33ms / 5 = 6.6ms. In auto-regressive generation,
    weights are loaded per token. Max weight size we can load in 6.6ms at 61.4 GB/s is 6.6ms * 61.4 GB/s
    = 405 MB. Even quantized to 4-bit (0.5B/param), the max model size is ~800M parameters, not a 7B LLM.'
