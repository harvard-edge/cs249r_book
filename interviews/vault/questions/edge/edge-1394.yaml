title: 'Calculate thermal throttling impact on Orin throughput'
scenario: 'You are deploying a continuous computer vision pipeline on an NVIDIA Jetson Orin (60W TDP, 275 TOPS INT8) enclosed in a sealed outdoor housing without active cooling. At optimal temperatures and full 60W power, the model runs at 150 FPS utilizing both the Ampere GPU and DLA accelerator. During peak summer heat, the system triggers a thermal throttling profile that caps the maximum power draw to 25W to prevent hardware damage.'
question: 'What maximum FPS should you expect when the Jetson Orin is throttled from 60W to 25W assuming linear scaling?'
details:
  realistic_solution: 'The correct approach applies the ratio of the throttled power limit to the original maximum power limit to estimate the new performance. On devices like the Jetson Orin, power management firmware dynamically underclocks the SoC (GPU/DLA) to stay within the new 25W cap, resulting in an approximately linear drop in inference throughput for sustained workloads.'
  common_mistake: |
    **The Pitfall:** Attempting to calculate compute utilization based on TOPS or memory bandwidth instead of the power cap.
    **The Rationale:** Candidates are trained to find the architectural bottleneck (compute vs. memory bound) but forget that thermal throttling acts as an artificial ceiling.
    **The Consequence:** Overestimating performance during thermal events by ignoring the dynamically underclocked firmware limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin original power (TDP) = 60W.
    - Throttled power cap = 25W.
    - Original throughput = 150 FPS.

    **Calculations:**
    - Power ratio: Throttled Power (25W) / Original Power (60W) = 0.416.
    - Expected throttled throughput: 150 FPS $\times$ 0.416.

    **Conclusion & Interpretation:**
    - **Result: 62.5 FPS (Thermal/Power-Bound)**. Thermal throttling limits force underclocked firmware, leading to an approximately linear drop in sustained frame rate.
