title: Coral Edge TPU Fleet Sizing and Load Balancing for Real-time Inference
scenario: 'You are designing a distributed inference system using Google Coral Edge TPUs. Each TPU offers 4 TOPS (INT8) and consumes 2W of power. Your deployed INT8 quantized model requires 0.5 TOPs of computation per inference. The system needs to sustain an average throughput of 800 inferences per second. To account for various factors like latency, network overhead, and burst capacity, you decide that each TPU should operate at no more than 70% of its theoretical maximum inference capacity.'
question: How many inferences per second can one Coral Edge TPU handle, how many TPUs are needed at 70% utilization for 800 IPS, and what total power is required?
details:
  realistic_solution: 'A robust solution involves calculating the effective inference capacity per TPU by factoring in a realistic utilization target (e.g., 70%). Then, determine the total number of TPUs needed based on the desired aggregate throughput. Implement a dynamic load balancing strategy (e.g., weighted round-robin or consistent hashing) that incorporates real-time TPU health, current load, and the utilization ceiling. Continuously monitor fleet performance and adjust scaling or routing algorithms as needed to maintain optimal throughput and power efficiency while also considering the overall power budget.'
  common_mistake: |
    **The Pitfall:** Overlooking practical utilization limits and solely relying on raw TOPS figures.
    **The Rationale:** Candidates often assume accelerators can run at 100% of theoretical peak performance continuously, ignoring software overhead, network latency, and system-level inefficiencies.
    **The Consequence:** Underprovisioning the fleet, leading to performance degradation and missed latency SLAs during peak loads.
  napkin_math: |
    * Theoretical Inferences/second per TPU: 4 TOPS / 0.5 TOPs/inference = 8 inferences/second.
    * Effective Inferences/second per TPU (at 70% utilization): 8 * 0.70 = 5.6 inferences/second.
    * Minimum TPUs required: 800 inferences/second / 5.6 inferences/second/TPU = 142.86.
    * Round up to the nearest whole number to ensure capacity: **143 Coral Edge TPUs**.
    * Total Power Consumption of the fleet: 143 TPUs * 2W/TPU = **286W**.
