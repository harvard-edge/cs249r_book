title: Diagnosing Latency Spikes with Batching on Qualcomm Cloud AI 100
scenario: You are deploying a real-time object detection model on an edge inference accelerator. The system processes a continuous stream of camera frames. Initially, a static batch size of 4 was implemented to optimize for average throughput. Production monitoring now shows sporadic, critical latency spikes exceeding 100ms for individual frames, even though average throughput remains acceptable.
question: Why is the static batch size of 4 causing tail latency spikes, and how would dynamic or continuous batching reduce them?
details:
  realistic_solution: Static batching causes severe queuing delays (head-of-line blocking) when the arrival rate drops, forcing requests to wait until a full batch of 4 accumulates. The solution is dynamic batching with a strict time window (e.g., 5ms timeout) combined with continuous batching frameworks (like vLLM) if applicable. This optimizes utilization during high load while aggressively capping tail latency during sparse periods.
  common_mistake: |
    **The Pitfall:** Relying solely on static batching for edge inference.
    **The Rationale:** Candidates do not consider the variability of input arrival rates or the potential for queuing delays in real-time streams.
    **The Consequence:** This leads to requests waiting for a full batch to form, causing significant tail latency when demand fluctuates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Static batch size: 4.
       - Dynamic batch timeout: 5 ms.
       - Base inference latency: 10 ms (batch of 4), 3 ms (batch of 1).
    2. **Calculations:**
       - Static queuing delay (sparse): 1 request waits for 3 missing requests (e.g., 15 ms).
       - Total static latency: 15 ms (queue) + 10 ms (inference) = 25 ms.
       - Dynamic latency: 5 ms (timeout queue) + 3 ms (inference) = 8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 25 ms tail latency drops to 8 ms.** Static batching creates severe tail latency during sparse periods; dynamic batching bounding logic strictly enforces latency SLAs.
