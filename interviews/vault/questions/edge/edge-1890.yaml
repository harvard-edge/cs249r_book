title: Diagnosing Latency Spikes with Batching on Qualcomm Cloud AI 100
scenario: You are deploying a real-time object detection model on an edge inference accelerator. The system processes a continuous stream of camera frames. Initially, a static batch size of 4 was implemented to optimize for average throughput. Production monitoring now shows sporadic, critical latency spikes exceeding 100ms for individual frames, even though average throughput remains acceptable.
question: Why is the static batch size of 4 causing tail latency spikes, and how would dynamic or continuous batching reduce them?
details:
  realistic_solution: Implement a dynamic batching strategy with a tunable timeout mechanism and a maximum batch size. For instance, accumulate requests for a maximum of 5ms or until a batch size of 8 is reached, whichever occurs first. This approach optimizes for throughput under high load while ensuring low latency for individual requests during sparse periods. Additionally, explore continuous batching if the model and framework support it, to maximize device utilization and minimize idle time on the Qualcomm Cloud AI 100, coupled with intelligent scheduling policies that prioritize latency-sensitive requests.
  common_mistake: |
    **The Pitfall:** Relying solely on static batching for edge inference.
    **The Rationale:** Candidates do not consider the variability of input arrival rates or the potential for queuing delays in real-time streams.
    **The Consequence:** This leads to requests waiting for a full batch to form, causing significant tail latency when demand fluctuates.
  napkin_math: |
    1. Assume a static batch size of 4 and an average request arrival rate that fills a batch every 20ms.
    2. If a single request arrives and no others follow for 15ms, it incurs at least 15ms of queuing delay.
    3. If inference for a batch of 4 takes 10ms, total latency for the first request is 15ms (queue) + 10ms (inference) = 25ms.
    4. With a dynamic batching timeout of 5ms, the request waits at most 5ms. Processed as a batch of 1 (taking say 3ms), total latency is 5ms + 3ms = 8ms.
    5. **Dynamic batching with a timeout significantly reduces the tail latency from 25ms to 8ms in sparse periods.**
