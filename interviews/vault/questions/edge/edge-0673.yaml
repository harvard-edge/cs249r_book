title: The Zero-Copy Illusion
scenario: You are optimizing an Edge TPU pipeline on a Coral Dev Board. You use a 'zero-copy' memory pointer to pass a tensor from the CPU directly to the NPU's input buffer. However, the system profiler shows a massive latency spike right before inference begins.
question: If the pointer was passed directly, why is there still a latency spike?
details:
  realistic_solution: You hit a cache flush/invalidate penalty. When the NPU (via DMA) reads from physical RAM using a zero-copy pointer, it bypasses the CPU cache. If the CPU recently wrote the image data but hasn't flushed its L1/L2 cache, the NPU reads stale data. The OS must execute a costly cache flush instruction before inference to sync dirty cache lines to DDR.
  common_mistake: |
    **The Pitfall:** Confusing software-level "zero-copy" (avoiding memcpy() in user-space) with hardware-level cache coherency.
    **The Rationale:** Engineers assume "zero-copy" means zero overhead, forgetting the physics of L1/L2 caches and DMA controllers.
    **The Consequence:** Unexplained, massive CPU stalling right before inference blocks the real-time pipeline.
  napkin_math: |
    - **Cache Flush Cost:** Flushing 10MB of image data from CPU L2 cache to main DDR memory over a mobile bus takes 2-3 milliseconds.
    - **Final Result:** **If the total inference budget is 10ms, the invisible OS cache flush operation consumes 20-30% of the entire real-time budget before the NPU even activates.**
