title: The Zero-Copy Illusion
scenario: A Coral Edge TPU pipeline uses a 'zero-copy' pointer from CPU to NPU. Profiling shows a massive latency spike right before inference.
question: If the pointer was passed directly, why is there still a latency spike?
details:
  realistic_solution: You hit a hardware cache flush/invalidate penalty. When the NPU (via DMA) reads physical RAM using a zero-copy pointer, it bypasses the CPU L1/L2 cache. The OS must execute a costly cache flush instruction to sync dirty cache lines to DDR before inference.
  common_mistake: |
    **The Pitfall:** Confusing software-level "zero-copy" (avoiding memcpy() in user-space) with hardware-level cache coherency.
    **The Rationale:** Engineers assume "zero-copy" means zero overhead, forgetting the physics of L1/L2 caches and DMA controllers.
    **The Consequence:** Unexplained, massive CPU stalling right before inference blocks the real-time pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10MB image data.
    - Real-time budget = 10ms.

    **Calculations:**
    - OS cache flush for 10MB from CPU L2 to main DDR memory over a mobile bus takes 2-3 milliseconds.

    **Conclusion & Interpretation:**
    - **Result: 20-30% of latency budget consumed (Cache-Coherency-Bound)**. Invisible OS cache flush operations destroy real-time guarantees before the NPU even activates.
