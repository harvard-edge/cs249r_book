title: Memory-efficient inference graph for multi-model pipeline on Jetson Orin
scenario: 'You are running three models in a pipeline on Jetson Orin (32GB unified memory, 60W): a detection
  model (200MB), a classification model (50MB), and a pose estimation model (150MB). The pipeline currently
  peaks at 28GB RAM including OS overhead, leaving only 4GB headroom. Models are loaded sequentially from
  disk, taking 800ms total startup time.'
question: "How would you reduce RAM and startup overhead for the three-model Orin pipeline while keeping inference correct?"
details:
  realistic_solution: Use torch.no_grad() for all inference to eliminate gradient tracking. Load models
    with map_location='cpu' and use .to('cuda') only when that model is active in the pipeline (Orin's
    unified memory makes this zero-copy). Alternatively, use torch2trt or TensorRT for all three models
    — TensorRT engines occupy ~30% the memory of PyTorch equivalents by eliminating Python overhead and
    fusing layers.
  common_mistake: Keeping all three models in GPU memory simultaneously with their computational graphs
    fully instantiated. Even in inference mode (model.eval()), PyTorch retains the full module structure
    and weight tensors. Not realizing that unified memory on Orin allows CPU-GPU memory sharing without
    explicit transfers.
  napkin_math: 'Models in PyTorch: 200+50+150=400MB weights + ~400MB Python/autograd overhead = ~800MB.
    In TensorRT: 400MB × 0.3 = 120MB. OS baseline: ~3GB. Pipeline memory: PyTorch all-loaded = 3GB + 800MB
    = 3.8GB. TensorRT sequentially: 3GB + 120MB peak = 3.12GB. Savings from TensorRT: 680MB, well within
    32GB Orin unified memory.'
