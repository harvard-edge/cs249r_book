title: Data Quality Gates for High-Throughput On-Premise Inference
scenario: An on-premise pipeline runs 8 defect detection streams on a 32GB Cloud AI 100. Frequent sensor degradation causes silent corruption.
question: How would you architect on-premise data validation and lineage tracking on Cloud AI 100 without starving the defect detectors?
details:
  realistic_solution: A strong design uses a tiered validation approach. Tier 1 executes lightweight CPU heuristics. Tier 2 reserves a small fraction of the accelerator's resources to run a highly quantized, INT8 tiny embedding model to flag out-of-distribution inputs.
  common_mistake: |
    **The Pitfall:** Proposing heavy, complex deep-learning anomaly models (like massive Autoencoders) on the same accelerator.
    **The Rationale:** Engineers apply generalized cloud validation models without evaluating intense memory tradeoffs on the physical edge silicon.
    **The Consequence:** The validation model consumes the remaining VRAM, preventing the primary defect model from running concurrent streams.
  napkin_math: |
    1. **Assumptions & Constraints:** Peak capacity = 32 GB RAM, 400 TOPS. Primary stream = 4 GB, 20 TOPS. Validation = 100 MB, 1 TOPS per stream.
    2. **Calculations:** 8 streams maxes RAM (32 GB) using 160 TOPS. Reducing to 7 streams uses 28 GB RAM. 7 streams validation = 700 MB, 7 TOPS. Total = 28.7 GB, 147 TOPS.
    3. **Conclusion & Interpretation:** **Result: Tiny embedding fits within 28.7 GB.** Heavy autoencoders would OOM the accelerator, while highly quantized INT8 gates protect data integrity. **System Status: VRAM-Capacity-Bound.**
