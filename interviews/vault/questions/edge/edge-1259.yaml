title: Data Quality Gates for High-Throughput On-Premise Inference
scenario: You are designing the data pipeline for an on-premise defect detection system in a manufacturing plant, utilizing a fleet of Qualcomm Cloud AI 100 accelerators (32 GB LPDDR4x, 400 TOPS INT8, 75W). The system ingests thousands of high-resolution images per second from factory cameras, but sensor degradation and lighting shifts frequently cause silent data corruption.
question: How would you architect on-premise data validation and lineage tracking on Cloud AI 100 without starving the defect detectors?
details:
  realistic_solution: A strong design uses a tiered validation approach. Tier 1 executes lightweight, deterministic heuristics on the host CPU. Tier 2 reserves a small fraction of the accelerator's resources to run a highly quantized, INT8 tiny embedding model to flag out-of-distribution inputs. Lineage metadata is asynchronously logged to a local time-series database.
  common_mistake: |
    **The Pitfall:** Proposing heavy, complex deep-learning anomaly models (like massive Autoencoders) on the same accelerator.
    **The Rationale:** Engineers apply generalized cloud validation models without evaluating the intense memory tradeoffs on the physical edge silicon.
    **The Consequence:** The validation model consumes the remaining VRAM, preventing the primary defect model from running concurrent streams.
  napkin_math: |
    - **Baseline:** Primary model uses 4 GB memory and 20 TOPS per stream. 8 concurrent streams = 32 GB (100% memory bound) using 160 TOPS (40%).
    - **Tradeoff:** Reduce to 7 primary streams (28 GB, 140 TOPS) to free 4 GB VRAM.
    - **Validation Cost:** An INT8 quantized data validation model needs 100 MB and 1 TOPS per stream. For 7 streams, it requires 700 MB and 7 TOPS.
    - **Final Result:** **The validation model easily fits within the newly freed 4 GB and remaining 260 TOPS, ensuring rigorous data quality while remaining within the 75W limit.**
