title: 'Edge TCO Specification: Specify Fleet Management Cost for 1000-Node Edge Network'
scenario: 'Specify the fleet management infrastructure cost for 1000 Jetson Orin units deployed across
  50 cities. Include: MDM platform ($5/device/month), OTA update bandwidth (model: 50MB, monthly updates,
  LTE at $0.01/MB), on-site technician support ($150/hr, 2hr/site/year = 50 sites * 20 units/site), and
  monitoring platform ($2K/month). Calculate annual fleet management cost and cost-per-device.'
details:
  realistic_solution: 'MDM platform: 1000 * $5 * 12 = $60K/yr. OTA bandwidth: 1000 units * 50MB/update
    * 12 updates * $0.01 = $6K/yr. On-site support: 50 sites * 2hr * $150 = $15K/yr. Monitoring: $2K*12=$24K/yr.
    Total fleet management: $60K+$6K+$15K+$24K=$105K/yr. Hardware TCO: 1000*60W*8760*$0.10/1000=$52.56K/yr
    power + $499K/3yr amort=$166.3K. Hardware annual: $218.9K. Fleet management adds: $105K/$218.9K =
    48% overhead. Total: $323.9K/yr for 1000 units = $323.90/unit/year. Cost-per-device: $26.99/unit/month
    ($10.77 hardware + $8.75 management + $2K monitoring/device/month=2K/1000=$2/unit/month).'
  common_mistake: Underestimating fleet management costs for distributed edge deployments — management
    overhead often adds 50-100% to the hardware cost and is frequently excluded from initial TCO projections.
  napkin_math: 'MDM: $60K/yr. OTA: 1000*50MB*12*$0.01=$6K/yr. On-site: 50*2*$150=$15K/yr. Monitoring:
    $24K/yr. Total mgmt: $105K/yr. Mgmt/unit/yr: $105. Power/unit/yr: $52.56. Amort/unit/yr: $166.33.
    Total/unit/yr: $323.89. Monthly: $27/unit/month. Management cost fraction: $105/$323.89=32.4%. Key
    insight: fleet management is the hidden cost in edge deployments. Scale matters: at 10,000 units,
    MDM is still $5/device (fixed per unit), but on-site support spreads: 500 sites * same 2hr = $150K
    — proportional. MDM+OTA per unit stays constant. Support cost/unit drops slightly at scale (more units
    per site).'
