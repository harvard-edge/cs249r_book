title: SRAM Capacity and Activation Tiling
scenario: You are deploying an INT8 quantized image segmentation model on an edge NPU equipped with a strictly limited 1.5MB of on-chip SRAM and slow external DRAM. The input to the bottleneck layer is a feature map of 256x256x32 (HxWxC). The layer is a standard 3x3 convolution outputting 64 channels (stride 1, SAME padding).
question: How much SRAM is needed for the 256x256x32 input, 256x256x64 output, and 3x3 weights, and is tiling required?
details:
  realistic_solution: Calculate the exact size of the tensors in bytes. The input is 2MB, output is 4MB, and weights are ~18KB. Since the total (~6MB) vastly exceeds the 1.5MB SRAM, the computation must be partitioned using spatial tiling (e.g., computing the output in 64x64 patches) to keep the active working set within the on-chip memory limits.
  common_mistake: |
    **The Pitfall:** Focusing primarily on the size of the model weights while ignoring activation sizes.
    **The Rationale:** Developers often compress weights using techniques like pruning but forget that high-resolution intermediate feature maps dominate edge NPU SRAM usage.
    **The Consequence:** The model compiles but runs 10-100x slower than expected due to constant swapping and thrashing between SRAM and slow external DRAM.
  napkin_math: |
    * **Input Tensor**: 256 × 256 × 32 × 1 byte = 2,097,152 bytes (2 MB).
    * **Output Tensor**: 256 × 256 × 64 × 1 byte = 4,194,304 bytes (4 MB).
    * **Weights**: 3 × 3 × 32 × 64 × 1 byte = 18,432 bytes (~18 KB).
    * **Total Working Set**: 2 MB + 4 MB + 18 KB = 6.02 MB.
    * **Conclusion**: 6.02 MB is far greater than the 1.5 MB SRAM limit. **Tiling is mandatory.**
