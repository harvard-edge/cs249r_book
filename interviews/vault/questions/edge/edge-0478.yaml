title: The Secure Fleet TCO Dilemma
scenario: You are the ML Systems Engineer for a fleet of 10,000 autonomous vehicles. The fleet uses Federated
  Learning (FL) to continuously improve a road-hazard detection model. The current system ('System A')
  uses standard FedAvg. The security team wants to deploy 'System B', which adds a cryptographic hash
  commitment to each model update, preventing model poisoning from a compromised vehicle. Your task is
  to diagnose the economic viability of this feature.
question: "Is adding cryptographic hash commitments to FL updates economically justified for the 10,000-vehicle fleet?"
details:
  realistic_solution: The correct approach is to calculate the total annual cost of the extra energy for
    System B and compare it to the risk-adjusted annual cost of a breach with System A.
  common_mistake: Engineers often focus purely on direct, tangible costs like computational overhead or
    energy use, and reject features that add to them. They may intuitively see '5 extra minutes of compute'
    as inefficient without quantifying the monetary value of the risk it mitigates. The key is to compare
    the certain cost of the security feature against the *expected* (probabilistic) cost of a security
    breach.
  napkin_math: 'System B extra energy per vehicle: 2 Watts * 1 hour/day = 2 Wh/day. Across 10,000 vehicles
    for 365 days = 2 * 10,000 * 365 = 7.3 Megawatt-hours/year. At $0.15/kWh, added energy cost = 7,300
    kWh * $0.15 = $1,095/year. If the probability of a $1M data breach under System A is >0.11% per year,
    System B is economically justified.'
  options:
  - No, the annual operational cost is over $130,000, which far exceeds the risk-adjusted loss.
  - No, the potential $1,000,000 loss is a 'black swan' event; the immediate and certain $1,369 annual
    energy cost should be avoided to preserve resources.
  - Yes, the ~$1,400 annual energy cost is significantly lower than the $5,000 expected annual loss from
    a potential model poisoning attack.
  - Yes, but only because the $1,000,000 loss is so high. If the potential loss were less than $275,000,
    the energy cost would not be worth it.
  correct_index: 2
