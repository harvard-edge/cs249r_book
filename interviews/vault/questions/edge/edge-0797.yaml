title: The ISO 26262 Neural Network Problem
scenario: Your autonomous vehicle uses a neural network for pedestrian detection. The safety team says
  you need ISO 26262 ASIL-D certification for this function (the highest automotive safety integrity level).
  But ISO 26262 was written for deterministic software — it requires 100% code coverage, formal verification,
  and traceable requirements. Neural networks are stochastic, opaque, and their 'requirements' are learned
  from data. How do you certify a neural network under ISO 26262?
details:
  realistic_solution: 'You don''t certify the neural network itself to ASIL-D. You certify the **system
    architecture** to ASIL-D, with the neural network as an ASIL-QM (no safety rating) component wrapped
    in safety mechanisms:'
  common_mistake: '"Apply formal verification to the neural network." Formal verification of a 25-million-parameter
    network is computationally intractable — the state space is too large.'
  napkin_math: 'ASIL-D target: <10⁻⁸ failures/hour. At 30 FPS: 108,000 frames/hour. Allowed undetected
    pedestrians: <1 per 10⁸ hours. To validate this statistically at 95% confidence (assuming Poisson
    distribution), you need ~3 × 10⁸ hours without a failure. At 30 FPS, that is 3.24 × 10¹³ frames, equivalent
    to 34,246 years of continuous real driving. This is why simulation is mandatory — you can run 10,000×
    real-time in parallel.'
