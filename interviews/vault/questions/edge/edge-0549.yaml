title: The Edge Training Scaling Collapse
scenario: You are the lead ML Systems Engineer for an autonomous vehicle company. Your team is fine-tuning
  a large, 2-billion-parameter sensor fusion model directly inside the vehicle's trunk compute unit. This
  unit contains four Jetson AGX Orin modules connected via a PCIe Gen 4 switch.
question: "Why does data-parallel fine-tuning of the 2B-parameter model fail to scale across four Orins connected by PCIe Gen4?"
details:
  realistic_solution: The root cause is the communication bottleneck created by the `AllReduce` step in
    data parallelism operating over a relatively slow PCIe interconnect. While the compute is parallelized,
    the gradients from all models must be synchronized at every step. This collective communication saturates
    the bus.
  common_mistake: Engineers from a cloud background often apply datacenter intuition, assuming the interconnect
    is 'fast enough' and that data parallelism always scales. They might suggest simply increasing the
    global batch size, which would only worsen the communication bottleneck, or blame the CPU, which isn't
    the primary bottleneck when a collective communication algorithm like `AllReduce` is saturating the
    PCIe bus.
  napkin_math: 2B params = 4GB (FP16). AllReduce needs 2 * 4GB = 8GB transferred per node per step. PCIe
    Gen4 x8 switch = 16 GB/s per link. Transfer time = 8GB / 16 GB/s = 500ms. If compute pass takes 200ms
    on a 275 TOPS Orin, communication dominates (500ms > 200ms). The nodes spend 71% of time waiting on
    PCIe.
