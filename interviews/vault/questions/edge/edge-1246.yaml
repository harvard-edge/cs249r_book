title: Asymmetric vs Symmetric Quantization Overhead
scenario: A team deploys a vision model on the Qualcomm Cloud AI 100 on-premise inference accelerator. They initially use symmetric INT8 quantization and achieve high utilization. However, due to poor accuracy, they switch to asymmetric INT8 quantization. The accuracy recovers, but the team observes a significant slowdown in the dense layers despite the model size remaining identical.
question: Why does switching from symmetric to asymmetric INT8 quantization slow dense layers on the Cloud AI 100?
details:
  realistic_solution: 'Asymmetric INT8 requires complex dynamic cross-terms (`W * Z_x`, `Z_w * X`) absent in symmetric encoding. Without hardware zero-point compensation circuits, ALUs spin doing activation offset sums rather than primary matmuls.'
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to memory bandwidth from loading zero-points.
    **The Rationale:** Candidates fail to realize that asymmetric quantization introduces mathematical cross-terms `Z_w * sum(X)` that require additional runtime additions across the input activations.
    **The Consequence:** Misdiagnosing the compute-bound slowdown as memory-bound, leading to useless attempts to optimize data layout.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Fixed pool of MAC units
    - Operation: Dot product

    **Calculations:**
    - Symmetric: N MACs for N inputs
    - Asymmetric: N MACs + N dynamic zero-point activation sums

    **Conclusion & Interpretation:**
    - **Result: Throughput Halved.** ALU cycles are cannibalized by offset summation overheads.
