title: Asymmetric vs Symmetric Quantization Overhead
scenario: A team deploys a vision model on the Qualcomm Cloud AI 100 on-premise inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). They initially use symmetric INT8 quantization (zero-point = 0) and achieve high utilization of the 400 TOPS. However, due to poor accuracy, they switch to asymmetric INT8 quantization. The accuracy recovers, but the team observes a significant slowdown in the dense layers despite the model size remaining identical.
question: Why does switching from symmetric to asymmetric INT8 quantization slow dense layers on the Cloud AI 100?
details:
  realistic_solution: 'Symmetric quantization requires computing only the core dot product (W * X). Asymmetric quantization introduces cross-terms: (W - Z_w)(X - Z_x) = W*X - W*Z_x - Z_w*X + Z_w*Z_x. While W*Z_x and Z_w*Z_x can be precomputed offline, Z_w*X requires summing the dynamic input activations at runtime. Unless the hardware has dedicated zero-point compensation logic, calculating this sum diverts arithmetic units away from the main matrix multiplication, reducing the effective TOPS.'
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to memory bandwidth from loading zero-points.
    **The Rationale:** Candidates fail to realize that asymmetric quantization introduces mathematical cross-terms `Z_w * sum(X)` that require additional runtime additions across the input activations.
    **The Consequence:** Misdiagnosing the compute-bound slowdown as memory-bound, leading to useless attempts to optimize data layout.
  napkin_math: |
    - **Symmetric:** For a vector dot product with N=1024 elements, symmetric uses exactly 1024 INT8 MACs.
    - **Asymmetric:** Requires the 1024 MACs plus 1024 runtime additions to sum the activations for the `Z_w * sum(X)` term.
    - **Impact:** If the accelerator's 400 TOPS are fully saturated by MAC operations, injecting extra runtime additions **effectively halves throughput** (drops to ~200 TOPS) for those layers.
