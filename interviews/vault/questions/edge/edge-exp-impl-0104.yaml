title: Stream Bandwidth for Depthwise Convs on Hailo-8
scenario: You are deploying an EfficientNet edge model on a Hailo-8 dataflow accelerator (26 TOPS INT8,
  2.5W). Unlike typical edge GPUs, Hailo-8 has no local DRAM and streams data directly from host memory.
  For a specific layer, you have an INT8 input feature map of 100x100x64. You apply a 3x3 depthwise convolution
  followed by a 1x1 pointwise convolution expanding to 128 channels. Assuming the accelerator hits 10
  TOPS (10^13 operations per second) of actual utilization on this layer, calculate the exact host memory
  streaming bandwidth (in GB/s) required to feed the input activations and weights without starving the
  compute.
question: "What host memory streaming bandwidth is required to feed the 100x100x64 depthwise-plus-pointwise layer at 10 TOPS utilization?"
details:
  realistic_solution: To solve this, calculate the total bytes needed from the host (activations + weights).
    Then calculate total operations to find the minimum execution time at the given TOPS rate. Dividing
    total bytes by execution time gives the bandwidth. The result (~37 GB/s) proves that depthwise separable
    convolutions have extremely low arithmetic intensity and will severely bottleneck on standard PCIe
    bandwidth before ever reaching the compute limit.
  common_mistake: Candidates often calculate FLOPs but forget that Hailo-8's lack of local DRAM means
    all input activations and weights must be streamed in real-time. They also frequently mistake MACs
    for total operations (1 MAC = 2 Ops), miscalculating the processing time and drastically underestimating
    the required bandwidth.
  napkin_math: "1. Input Bytes: (100*100*64) [acts] + (3*3*64) [DW weights] + (64*128) [PW weights] =\
    \ 640,000 + 576 + 8,192 = 648,768 bytes. \n2. Total MACs: (100*100*64*9) [DW] + (100*100*128*64) [PW]\
    \ = 5.76M + 81.92M = 87.68M MACs. \n3. Total Operations: 87.68M * 2 = 175.36M Ops. \n4. Execution\
    \ Time at 10 TOPS: 175.36M / 10^13 = 17.536 microseconds. \n5. Required Bandwidth: 648,768 bytes /\
    \ 17.536 us = 36.99 GB/s."
