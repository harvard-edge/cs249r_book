title: The Slow Sensor Stall
scenario: You have a 30 FPS camera and a 10 Hz LiDAR. After fusing the sensors, your autonomous vehicle's detection rate drops to 10 FPS, causing jerky braking.
question: Based on the synchronization diagram, why is your high-speed camera being throttled?
details:
  realistic_solution: |
    You have a Synchronous Fusion Barrier. Naively waiting for both sensors forces the entire pipeline to the rate of the slowest component, discarding 67% of visual information. The fix is Asynchronous Fusion: run camera detections at 30 FPS and LiDAR at 10 Hz independently, then project the 2D detections into 3D using the most recent LiDAR depth map + temporal interpolation.
  common_mistake: |
    **The Pitfall:** Suggesting "buy a 30 Hz LiDAR."
    **The Rationale:** Throwing hardware at the problem instead of fixing the fusion logic.
    **The Consequence:** Wasting hardware budget without solving the fundamental synchronous bottleneck in the software architecture.
  napkin_math: |
    - **Speed:** 60 mph = 27 m/s.
    - **10 Hz LiDAR:** Travels 2.7 meters between detections.
    - **30 Hz Camera:** Travels 0.9 meters between frames.
    - **Impact:** Synchronously throttling the camera to 10 Hz adds 1.8 meters of blind travel between updates, a life-or-death difference.
