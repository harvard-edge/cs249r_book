title: Coral Edge TPU mmap Initialization Over USB
scenario: A team deploys an INT8 quantized model (24MB) to a Google Coral Edge TPU (USB form factor, 4 TOPS INT8, 2W). To save host memory, 4 separate worker processes use memory-mapping (mmap) to load the same TFLite model file, expecting the host OS to share a single 24MB memory block and achieve instant zero-copy initialization. Instead, the team observes increased host memory allocation and a cold-start initialization latency of exactly 400ms for each process.
question: Why does host mmap fail to give zero-copy Coral initialization, and why is each 24MB model cold start exactly 400ms?
details:
  realistic_solution: While mmap successfully shares the model file in the host CPU's virtual memory, the Edge TPU runtime must still allocate DMA-capable memory and copy the INT8 weights to transfer them over the USB interface to the Coral device. Because each process initializes a unique Edge TPU delegate context, it forces an independent transmission of the 24MB model payload across the USB bus, neutralizing the cold-start benefits of host-side mmap.
  common_mistake: |
    **The Pitfall:** Assuming host-side OS memory mapping (mmap) automatically translates to zero-copy execution on peripheral accelerators.
    **The Rationale:** Engineers blur the lines between CPU memory management and external PCIe/USB device domains.
    **The Consequence:** Unexpected initialization delays because each process forces an independent transmission of weights across the bus.
  napkin_math: |
    *   **Model Size:** 24 MB.
    *   **USB 2.0 Bandwidth:** 480 Mbps / 8 = 60 MB/s.
    *   **Transfer Time:** 24 MB / 60 MB/s = 0.4 seconds.
    *   **Result:** The exact **400ms latency spike** is the physical bottleneck of transferring the weights over the USB bus.
