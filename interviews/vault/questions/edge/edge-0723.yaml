title: The OTA Download Fallacy
scenario: You are an engineer on an autonomous vehicle team responsible for Over-the-Air (OTA) updates.
  You need to calculate the time required to download a new 8 GB perception model update to a vehicle
  over its 1 Gbps cellular connection. Ignoring protocol overhead, calculate the approximate download
  time.
question: "How long does an 8 GB update take to download over a 1 Gbps cellular connection, ignoring protocol overhead?"
details:
  realistic_solution: The correct way to solve this is to first make the units consistent. You must convert
    the network speed from Gigabits per second (Gbps) to Gigabytes per second (GB/s) by dividing by 8.
    Then, you can divide the total package size by the network speed in the correct units.
  common_mistake: The most common mistake is to confuse Gigabits (Gb) with Gigabytes (GB). Engineers often
    incorrectly divide the 8 GB package size by the 1 Gbps network speed and arrive at an answer of 8
    seconds. This is wrong by a factor of 8, because network speeds are measured in bits while storage
    is measured in Bytes.
  napkin_math: "1. **Convert Units**: Network speed is in bits, file size is in Bytes. Convert speed to\
    \ Bytes.\n   - 1 Gbps ÷ 8 bits/byte = 0.125 GB/s (= 125 MB/s)\n2. **Calculate Download Time:**\n \
    \  - 8 GB ÷ 0.125 GB/s = **64 seconds**\n3. **Common wrong answer:** 8 GB ÷ 1 Gbps = 8 seconds (wrong\
    \ — confuses bits and bytes)\n4. **Key takeaway:** The correct answer is 64 seconds, which is 8× longer\
    \ than the naive calculation. In practice, with protocol overhead, congestion, and signal variability,\
    \ the real download time would be even longer."
  options:
  - 8 seconds
  - 4 seconds
  - 64 seconds
  - 32 seconds
  correct_index: 2
