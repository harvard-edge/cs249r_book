title: Optimizing a Multi-Modal RAG Pipeline for Edge Deployment on Hailo-8
scenario: 'You are tasked with deploying a real-time multi-modal RAG (Retrieval Augmented Generation)
  system on an edge device for an industrial inspection application. The system needs to process live
  video feeds (for object detection and anomaly recognition) and audio inputs (for keyword spotting and
  command recognition), retrieve relevant information from a local knowledge base, and generate concise
  natural language explanations or actions. The target hardware is a Hailo-8 AI processor, which provides
  26 TOPS (Tera Operations Per Second) INT8 performance with a power budget of 2.5W.


  The multi-model pipeline involves:

  1.  **Video Stream Processing**: A lightweight CNN for object detection (INT8 quantized) and a transformer-based
  model for anomaly detection.

  2.  **Audio Stream Processing**: A small ASR model for keyword spotting (INT8 quantized).

  3.  **RAG Component**: A vector database for retrieval, followed by a compact encoder and a small decoder-only
  LLM for generation.


  Your primary challenges are end-to-end latency (target < 200ms), managing memory, ensuring efficient
  routing between models based on input conditions, and staying within the Hailo-8''s power budget. Design
  a high-level architecture and outline your deployment strategy.'
details:
  realistic_solution: 'The solution would involve:

    1.  **Model Optimization**: Aggressively quantize all models to INT8 (already specified for CNN/ASR,
    ensure for LLM components). Explore knowledge distillation or pruning for the transformer and LLM
    components to fit within Hailo-8''s memory and computation capabilities.

    2.  **Pipeline Orchestration**: Use a state-machine or agent-based orchestrator running on the host
    CPU (e.g., ARM core on an embedded system paired with Hailo-8) to manage routing. For example, if
    no keywords are detected in audio, skip the audio RAG path.

    3.  **Hailo-8 Specifics**: Map computationally intensive parts of each model (e.g., convolutional
    layers, transformer blocks) to Hailo-8''s dataflow architecture. Leverage Hailo-8''s compiler and
    SDK for optimal partitioning and scheduling. Ensure efficient data buffers (e.g., shared memory) to
    minimize copies between models running on the Hailo-8 and the host.

    4.  **Asynchronous Processing**: Implement asynchronous processing where possible (e.g., pre-processing
    next video frame while current frame is on Hailo-8).

    5.  **Dynamic Batching**: If feasible, use dynamic batching for parts of the pipeline to maximize
    Hailo-8 utilization, but be wary of latency implications.

    6.  **Power Management**: Monitor power consumption and, if possible, dynamically adjust model complexity
    or frame rates in low-power modes.'
  common_mistake: A common mistake is treating each model independently without considering the cumulative
    latency and resource consumption across the entire pipeline. Overlooking aggressive quantization or
    model pruning for non-critical path models, or failing to optimize data transfer between pipeline
    stages (e.g., host CPU to Hailo-8, or between different execution cores on Hailo-8) can lead to significant
    performance bottlenecks and exceed the power budget.
  napkin_math: 'Given Hailo-8''s 26 TOPS INT8, a typical inference operation might require, say, 1-5 TOPS
    for a single model pass depending on complexity. If the pipeline has 3-4 sequential critical path
    models, cumulative operations could easily reach 10-20 TOPS. To meet a 200ms latency target, each
    stage needs to complete within tens of milliseconds.


    For example, if a model requires 5 TOPS, and Hailo-8 can do 26 TOPS, theoretically it takes 5/26 =
    ~0.19 seconds or 190ms for *just* that model if it utilized the entire chip. This implies that either
    models are very small, or multiple models run concurrently, or the 26 TOPS is shared effectively.


    Consider a frame rate of 30 FPS, each frame needs to be processed within ~33ms.

    If an object detection model takes 10ms, an anomaly detection model takes 15ms, RAG encoding takes
    5ms, and generation takes 50ms, the *sequential* critical path would be 10+15+5+50 = 80ms, which is
    within the 200ms target. However, this assumes perfect utilization and minimal overhead.


    Power budget of 2.5W. If the Hailo-8 is running at peak, it consumes most of this. The host CPU and
    other peripherals also consume power, so the Hailo-8 must operate very efficiently within its allocation.
    Its efficiency is roughly 26 TOPS / 2.5W = ~10.4 TOPS/W, emphasizing the need for INT8 and dataflow
    architectures. If the system runs multiple models, the sum of their ''active'' power consumption must
    be within 2.5W + other component power.'
