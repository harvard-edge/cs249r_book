title: Diagnosing Intermittent Latency Spikes on Google Coral Edge TPU
scenario: You have deployed an INT8 quantized object detection model on a fleet of Google Coral Edge TPU
  devices connected via USB. The devices are rated for 4 TOPS at 2W and are processing video streams at
  30 FPS in a factory environment. Your telemetry dashboards show that certain units intermittently experience
  10x spikes in inference latency (from 15ms to 150ms) during the afternoon shifts, leading to dropped
  frames. How do you diagnose the root cause of these performance anomalies?
details:
  realistic_solution: The root cause is likely thermal throttling caused by high ambient temperatures
    combined with continuous inference. The Coral Edge TPU is passively cooled in the USB form factor,
    and sustained high utilization near its 2W limit can cause it to hit its thermal limit, triggering
    frequency scaling to prevent hardware damage. I would diagnose this by exporting the device's thermal
    zones to our telemetry backend and correlating temperature spikes with the latency spikes on the dashboard.
  common_mistake: Candidates often immediately assume memory leaks, network jitter, or software-level
    issues without considering the physical constraints of the edge device. They might also suggest deploying
    heavy distributed tracing tools that exceed the device capabilities rather than checking hardware
    telemetry.
  napkin_math: The Edge TPU operates at 2W to deliver 4 TOPS. At 30 FPS, an expected inference time of
    15ms implies the model uses roughly (15ms / 1000ms) * 4 TOPS = 0.06 Tera-operations per frame, or
    1.8 TOPS per second (45% utilization). This sustained power draw generates significant heat. When
    thermal throttling engages to reduce the 2W power dissipation, clock speeds can drop by up to 90%.
    A 10x reduction in frequency directly scales the 15ms inference time to 150ms.
