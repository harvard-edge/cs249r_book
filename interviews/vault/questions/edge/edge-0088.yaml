title: The Perpetual Sensor
scenario: Design an edge ML system for a wildlife monitoring camera that needs to operate autonomously
  for 5 years on a small battery pack. It runs a lightweight object detection model only when motion is
  detected. Detail the system architecture and power management strategies to achieve this extreme longevity.
details:
  realistic_solution: "Achieving 5-year battery life requires a system designed from the ground up for\
    \ ultra-low power, where the \"sleep\" state dominates the power budget.\n  **System Architecture:**\n\
    \  1.  **Ultra-Low Power Microcontroller (ULP MCU):** The core control unit should be an MCU with\
    \ deep sleep modes consuming microamps (µA) or even nanoamps (nA).\n  2.  **Low-Power Wake-Up Sensor:**\
    \ A very low-power sensor (e.g., Passive Infrared (PIR) sensor, a low-power camera with on-chip motion\
    \ detection, or a radar module) acts as the primary trigger. This sensor must consume µW power.\n\
    \  3.  **Dedicated ML Accelerator:** A highly efficient ML accelerator (NPU/DSP) that can inference\
    \ the object detection model quickly and then power down completely. It should support fast wake-up.\n\
    \  4.  **Low-Power Camera Module:** A camera with a low-power standby mode and fast wake-up.\n  5.\
    \  **Minimal Peripherals:** Only include essential components. All peripherals (e.g., Wi-Fi, cellular,\
    \ GPS) must be power-gated and only powered on when absolutely necessary.\n  6.  **Non-Volatile Memory:**\
    \ Use NOR flash for code and non-volatile RAM (NVRAM) for critical data to minimize power-on boot\
    \ time and retain state during deep sleep.\n  7.  **Energy Harvesting (Optional but Recommended):**\
    \ Small solar panel with a supercapacitor/small battery for charging to extend life indefinitely in\
    \ suitable environments."
  common_mistake: '"Just use a very low-power ML chip and a big battery." This ignores the dominant power
    draw of idle states and peripheral components over such a long duration.'
  napkin_math: A typical AA battery has ~2500 mAh. For 5 years (43,800 hours), an average current draw
    of $2500 \text{ mAh} / 43800 \text{ h} \approx 0.057 \text{ mA}$ (57 µA) is needed.
