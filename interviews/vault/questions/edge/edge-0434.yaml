title: The AV Perception Latency Puzzle
scenario: You are an ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new LiDAR perception model to a Jetson AGX Orin. The real-time requirement is 30 FPS (a 33ms deadline). Your model runs, but only achieves 20 FPS. Profiling shows the model performs 500 G-Ops (INT8) and moves 10 GB of data (weights, activations, inputs) per inference. `tegrastats` shows the Orin is only drawing 30W of power, well below its 60W configurable maximum.
question: "Using the GPU roofline model, what primary bottleneck prevents the 500 G-Ops, 10 GB LiDAR model from reaching 30 FPS on the Orin?"
details:
  realistic_solution: "The core issue is that the model is memory-bound. Its Arithmetic Intensity (the ratio of compute to memory access) is too low to saturate the Orin's powerful compute units. The Tensor Cores finish their work quickly and then sit idle, waiting for data to arrive from memory. This is why the performance is low and the power draw isn't reaching its peak \u2014 the compute units aren't being fully utilized."
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling or pure compute complexity without calculating arithmetic intensity.
    **The Rationale:** Engineers guess bottlenecks based on power draw or FLOPs, ignoring the roofline model and the reality of the memory wall.
    **The Consequence:** Wasting time trying to prune or quantize a model that is already fundamentally starved for memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 500 G-Ops, 10 GB per inference
       - Target: 30 FPS (33ms deadline)
       - Orin peak: 275 TOPS, 204.8 GB/s bandwidth
    2. **Calculations:**
       - Arithmetic Intensity (AI) = 500 GOps / 10 GB = 50 Ops/Byte
       - Orin Ridge Point = 275 TOPS / 204.8 GB/s = ~1343 Ops/Byte
       - Max effective throughput = 204.8 GB/s * 50 Ops/Byte = 10.24 TOPS
       - Inference Latency = 500 GOps / 10.24 TOPS = 48.8 ms (~20 FPS)
    3. **Conclusion & Interpretation:**
       **Result: 48.8 ms per inference (Memory-Bound)**
  options:
  - "The system is thermal throttling. The 30W power draw indicates it can't access its full 60W performance budget."
  - "The model is too computationally complex (500 G-Ops) for the Jetson AGX Orin to execute within the 33ms time budget."
  - "The model is memory-bound; its low arithmetic intensity (50 Ops/Byte) is below the Orin's ridge point (~1343 Ops/Byte), so performance is limited by memory bandwidth."
  - "The bottleneck is high software overhead from launching too many small CUDA kernels, which adds significant latency."
