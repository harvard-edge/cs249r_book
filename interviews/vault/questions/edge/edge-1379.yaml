title: Calculate Fallback Model Size for Coral TPU
scenario: 'You are designing a fail-operational pedestrian detection system on a Google Coral Edge TPU. The primary model uses 80 GOps per frame at 30 FPS. During a severe thermal event, the system must trigger a graceful degradation ladder, capping the Coral''s power limit to 1W and reducing its theoretical compute capacity to 2 TOPS.'
question: Assuming 50% hardware utilization of peak compute, what is the maximum GOps per frame a fallback INT8 model can use to maintain 20 FPS under the 1W, 2 TOPS thermal cap?
details:
  realistic_solution: 'Calculate the effective operations per second available under the degraded thermal envelope (factoring in realistic NPU utilization), then divide by the target fail-operational frame rate. The deployment must seamlessly context-switch to this tightly bounded INT8 fallback model to prevent complete loss of service while cooling the accelerator.'
  common_mistake: |
    **The Pitfall:** Calculating the per-frame budget based on the theoretical 2 TOPS peak without utilization.
    **The Rationale:** Candidates forget that real-world INT8 models rarely achieve 100% utilization on edge NPUs.
    **The Consequence:** Proposing a 100 GOps fallback model that will dramatically fail to meet the 20 FPS target in a degraded state.
  napkin_math: |
    **Assumptions & Constraints:**
    - Degraded Peak Compute: 2 TOPS (2,000 GOps/s).
    - Hardware Utilization: 50%.
    - Target Fallback Frame Rate: 20 FPS.

    **Calculations:**
    - Effective Compute: 2,000 GOps/s * 0.50 = 1,000 GOps/s.
    - Max Fallback Complexity: 1,000 GOps/s / 20 FPS = 50 GOps/frame.

    **Conclusion & Interpretation:**
    - **Result: 50 GOps/frame (Compute-Bound)**. The fallback model is strictly capped at 50 GOps per frame to meet latency under thermal constraints.
