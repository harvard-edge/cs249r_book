title: Calculate Fallback Model Size for Coral TPU
scenario: You are designing a fail-operational pedestrian detection system on a Google Coral Edge TPU (4 TOPS INT8, 2W). The primary model uses 80 GOps per frame at 30 FPS. During a severe thermal event, the system must trigger a graceful degradation ladder, capping the Coral's power limit to 1W and reducing its theoretical compute capacity to 2 TOPS.
question: "Assuming 50% hardware utilization of peak compute, what is the maximum GOps per frame a fallback INT8 model can use to maintain 20 FPS under the 1W, 2 TOPS thermal cap?"
details:
  realistic_solution: The correct approach calculates the actual effective operations per second available under the thermally degraded power state, and then divides that budget by the required degraded frame rate. The system must seamlessly switch to a simpler INT8-quantized fallback model that guarantees execution within this newly constrained compute envelope, shedding quality-of-service without failing completely.
  common_mistake: |
    **The Pitfall:** Calculating the per-frame budget based on the theoretical 2 TOPS peak without utilization.
    **The Rationale:** Candidates forget that real-world INT8 models rarely achieve 100% utilization on edge NPUs.
    **The Consequence:** Proposing a 100 GOps fallback model that will dramatically fail to meet the 20 FPS target in a degraded state.
  napkin_math: |
    *   **Degraded Compute:** 2 TOPS = 2000 GOps/second.
    *   **Effective Compute:** 2000 GOps/second * 0.50 utilization = 1000 GOps/second.
    *   **Target Frame Rate:** 20 FPS fail-operational rate.
    *   **Result:** Max fallback model cost = 1000 GOps/second / 20 FPS = **50 GOps per frame**.
