title: 'Edge Systolic Array Implement: Depthwise Convolution Throughput Calculation'
scenario: >-
  You are analyzing a depthwise separable convolution block (DW 3x3 + PW 1x1) for MobileNetV3 at the 28x28 spatial stage (80 input channels, 480 PW output channels, INT8) on a Hailo-8 accelerator (26 TOPS INT8, 6GB/s internal bandwidth).
question: For the MobileNetV3 28x28 DW+PW block on Hailo-8, what are the memory accesses, latency, throughput, and bottleneck?
details:
  realistic_solution: 'Analyze the depthwise and pointwise convolutions separately. The DW conv has very low operations but moves moderate data. The PW conv has high operations and moves more data. Both are memory-bound on the 6GB/s internal bus, but the PW convolution takes ~3.8x longer, making it the bottleneck of the block.'
  common_mistake: |
    **The Pitfall:** Treating the DW+PW block as a single monolithic operation.
    **The Rationale:** Candidates calculate total FLOPs and total memory for the whole block and average the arithmetic intensity.
    **The Consequence:** They miss that the Pointwise and Depthwise convolutions have drastically different arithmetic intensities and memory access patterns, obscuring the true performance bottleneck.
  napkin_math: |
    1. **DW Conv:**
       - FLOPs: `2 * 80 * (28 * 28) * 9 = 1.13M`.
       - Bandwidth: Input (80 * 784 = 62.7 KB) + Weights (80 * 9 = 720 B) + Output (80 * 784 = 62.7 KB) = 126 KB.
       - Time: `126 KB / 6 GB/s = 0.021 ms`.
    2. **PW Conv:**
       - FLOPs: `2 * 480 * 80 * (28 * 28) = 60.2M`.
       - Bandwidth: Input (62.7 KB) + Weights (80 * 480 = 38.4 KB) + Output (480 * 784 = 376.3 KB) = 477.4 KB.
       - Time: `477.4 KB / 6 GB/s = 0.0795 ms`.
    3. **Result:** The **PW convolution is the bottleneck** (taking 3.8x longer than the DW). Total time is ~0.1 ms.
