title: 'Edge Systolic Array Implement: Depthwise Convolution Throughput Calculation'
scenario: Calculate the throughput and latency for a depthwise separable convolution
  block (DW 3x3 + PW 1x1) for MobileNetV3 at the 28x28 stage (80 DW channels, 480
  PW output channels, INT8) on Hailo-8 (26 TOPS INT8, 6GB/s internal BW). Show the
  memory access calculation and whether DW or PW is the bottleneck.
question: For the MobileNetV3 28x28 DW+PW block on Hailo-8, what are the memory accesses,
  latency, throughput, and bottleneck?
details:
  realistic_solution: 'DW conv: 80ch, 3x3, 28x28. FLOPs=2*80*28^2*9=1.13M. BW: in=80*28^2=62.7KB,
    weights=80*9=720B, out=62.7KB. Total=126KB. AI=1.13M/126KB=8.96 FLOPs/byte. Memory
    bound (ridge=4333). Time=126KB/6GB/s=0.021ms. PW conv: (80→480), 28x28. FLOPs=2*480*28^2*80=68M.
    BW: in=62.7KB, weights=80*480=38.4KB, out=480*28^2=376KB. Total=477KB. AI=68M/477KB=142
    FLOPs/byte. Memory bound but better. Time=477KB/6GB/s=0.0795ms. Bottleneck: PW
    (3.8x more time than DW). Total: 0.1ms per DSConv block.'
  common_mistake: Not separating the analysis of depthwise vs pointwise convolutions,
    which have very different arithmetic intensities and bottlenecks even within the
    same block.
  napkin_math: 'DW: FLOPs=2*80*784*9=1.13M. BW=2*62.7KB+720B=126KB. AI=9. Time=126/6e6=0.021ms.
    PW: FLOPs=2*480*784*80=60.3M. Wait: 480 out, 80 in, 28*28 spatial. FLOPs=2*28^2*80*480=60.3M.
    BW=62.7K+80*480+480*784*1=62.7K+38.4K+376.3K=477.4KB. AI=60.3M/477.4K=126. Time=477.4K/6G=0.0796ms.
    Ratio PW/DW=3.8x. PW is bottleneck. Optimization: fuse DW+PW into single kernel,
    keep intermediate 80ch activations on-chip. Hailo-8 dataflow does this natively
    → eliminates 62.7KB DW output write and PW input read = saves 125KB = 0.021ms.'
