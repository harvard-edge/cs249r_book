title: The 5-Year Edge Device Lifecycle
scenario: You're designing an edge AI system for industrial quality inspection. The customer requires a 5-year operational lifetime with <1 hour of unplanned downtime per year (99.99% availability). The system runs 24/7 in a factory with ambient temperatures of 30-45°C.
question: What are the failure modes you must design for, and how do you achieve the availability target?
details:
  realistic_solution: 'For 99.99% availability, implement a hot-spare architecture with a 5s failover watchdog. Address environmental wear: monitor industrial-grade SSD SMART data for thermal degradation, use ECC memory to prevent bit-flips, and implement active cooling. Software reliability requires automated fallback on model drift and hardware watchdogs for OS crashes.'
  common_mistake: |
    **The Pitfall:** Relying solely on "enterprise-grade" hardware without architectural redundancy.
    **The Rationale:** Engineers assume high MTBF hardware equates to high system availability, ignoring inevitable software faults, thermal degradation, and slow manual reboot times.
    **The Consequence:** A single OS crash or SSD failure causes hours of downtime, blowing the 1-hour annual budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Availability target: 99.99% over 5 years (43,800 hours).
    - Allowed downtime: 4.38 hours (263 minutes) total over 5 years.
    - Cold reboot/manual fix time: ~30 minutes.
    - Hot spare failover time: 5 seconds (0.083 minutes).

    **Calculations:**
    - Failures tolerated (no spare): 263 min / 30 min ~ 8.7 failures in 5 years.
    - Failures tolerated (hot spare): 263 min / 0.083 min ~ 3,168 failures in 5 years.

    **Conclusion & Interpretation:**
    - **Result: Hot Spare is Mandatory (Reliability-Bound)**. A 5s failover allows the system to absorb over 3,000 faults, guaranteeing the 99.99% SLA even under extreme industrial conditions.
