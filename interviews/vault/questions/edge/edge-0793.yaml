title: The 5-Year Edge Device Lifecycle
scenario: You're designing an edge AI system for industrial quality inspection. The customer requires
  a 5-year operational lifetime with <1 hour of unplanned downtime per year (99.99% availability). The
  system runs 24/7 in a factory with ambient temperatures of 30-45°C. What are the failure modes you must
  design for, and how do you achieve the availability target?
details:
  realistic_solution: 'For 99.99% over 5 years (4.38h total allowed downtime): hot-spare with 5s failover.
    Key failure modes: (1) SSD wear at 30-45C — industrial-grade, monitor SMART; (2) RAM bit-flips — ECC
    memory; (3) thermal throttling — active cooling with redundant fans; (4) model drift — automated accuracy
    monitoring with version fallback; (5) OS/software crashes — watchdog timer with 5s reboot. With hot
    spare each failure costs 5s not 30 min, tolerating 3,168 failures over 5 years.'
  common_mistake: '"Use enterprise-grade hardware and it''ll be fine." Enterprise hardware helps, but
    software failures dominate in ML systems.'
  napkin_math: '5 years = 43,800 hours. 99.99% availability = 4.38 hours allowed downtime. Unplanned budget:
    52.6 min/year × 5 years = 263 minutes total. With hot spare (5s failover): each failure costs 5s instead
    of 30 min. Can tolerate 263 min / 0.083 min = 3,168 failures over 5 years = 1.7 failures/day. Extremely
    robust.'
