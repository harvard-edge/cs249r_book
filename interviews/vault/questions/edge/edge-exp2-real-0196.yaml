title: Optimizing 4K Image Pipelines for Cloud AI 100
scenario: You are architecting the data pipeline for an on-premise manufacturing defect detection system
  using a server equipped with multiple Qualcomm Cloud AI 100 accelerators. The system ingests uncompressed
  4K video feeds (3840x2160, RGB) from factory floor cameras at a combined rate of 120 FPS. Given the
  Qualcomm Cloud AI 100's specifications (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP), evaluate the end-to-end
  data loading pipeline. Determine how to partition the data preprocessing (decoding, resizing, normalization)
  between the host system and the accelerator to maximize throughput without starving the 400 TOPS compute
  engines.
question: "How would you partition decoding, resizing, and normalization between the host and Cloud AI 100 to keep 4K 120 FPS inference from starving?"
details:
  realistic_solution: An L5 engineer will evaluate the data transfer costs and propose moving resizing
    and normalization to the host or a dedicated ISP before sending data over PCIe to the accelerator.
    To keep the AI 100 utilized, the pipeline must implement asynchronous DMA transfers and double-buffering
    in the 32 GB LPDDR4x memory. They will justify their design by balancing host CPU load, PCIe bandwidth,
    and the accelerator's memory bandwidth, ensuring the INT8 compute units remain saturated.
  common_mistake: Candidates often focus solely on the 400 TOPS compute capacity and design a pipeline
    that starves the accelerator due to PCIe bandwidth or host CPU bottlenecks. They frequently fail to
    account for the memory bandwidth costs of handling uncompressed 4K frames in the LPDDR4x memory within
    a strict 75W power envelope.
  napkin_math: One uncompressed 4K frame is 3840 * 2160 * 3 bytes = 24.88 MB. At 120 FPS, total raw ingest
    is 120 * 24.88 MB/s = ~2.98 GB/s. If a single AI 100 processes 30 FPS, it needs 30 * 24.88 MB/s =
    746 MB/s host-to-device bandwidth. Storing a 100-frame ping-pong buffer takes 2.48 GB, well within
    the 32 GB LPDDR4x capacity. However, to fully utilize 400 TOPS, if a model takes 200 GOPS per frame,
    the theoretical max compute throughput is 400,000 / 200 = 2000 FPS. Feeding 2000 uncompressed 4K frames/sec
    would require 2000 * 24.88 MB = 49.76 GB/s of constant memory bandwidth, proving that the pipeline
    must resize inputs (e.g., to 640x640) prior to inference to prevent memory bandwidth from bottlenecking
    the system.
