title: AR Glasses Thermal Management via DVFS
scenario: An AR headset runs a hand-tracking CNN at 60 FPS (16.6ms budget). At max frequency (1.0 GHz, 1.0V), inference takes 10ms. Dynamic power is 1.5W and static power is 0.5W. The headset has a strict thermal design power (TDP) limit of 1.2W.
question: Should the headset use race-to-sleep or DVFS at 0.6 GHz and 0.6V to meet the 1.2W TDP?
details:
  realistic_solution: Use the CMOS power equation (P_dyn ∝ V^2 * f) to analyze DVFS. Race-to-sleep averages the high active power with the low sleep power, but due to the V^2 factor, lowering frequency and voltage yields cubic power savings for the dynamic portion. DVFS stretches the execution to fill the deadline but drastically reduces dynamic power. In heavily thermally constrained edge environments, DVFS keeps the device well under the thermal limit without dropping frames, whereas race-to-sleep violates the TDP.
  common_mistake: |
    **The Pitfall:** Believing race-to-sleep is always optimal for energy efficiency.
    **The Rationale:** Candidates maximize time spent in the low-power static state without realizing dynamic power scales quadratically with voltage.
    **The Consequence:** The device draws 1.4W on average, violating the strict 1.2W TDP and causing the AR headset to overheat.
  napkin_math: |
    1. Assumptions & Constraints:
       - Frame budget (60 FPS): 16.6 ms
       - Max frequency (1.0 GHz, 1.0V): 10ms active time, 1.5W dynamic, 0.5W static
       - DVFS (0.6 GHz, 0.6V): 16.6ms active time
       - TDP limit: 1.2W
    2. Calculations:
       - Race-to-Sleep Avg Power = ((10 ms * 2.0W) + (6.6 ms * 0.5W)) / 16.6 ms = 1.4W
       - DVFS Dynamic Power = 1.5W * (0.6)^2 * (0.6) = 0.324W
       - DVFS Total Power = 0.324W + 0.5W = 0.824W
    3. Conclusion & Interpretation:
       - **Result: Thermal-Bound. Race-to-sleep exceeds the 1.2W TDP (1.4W), whereas DVFS lowers total power to 0.824W, safely meeting the constraint.**
