title: AR Glasses Thermal Management via DVFS
scenario: An AR headset runs a hand-tracking CNN at 60 FPS (16.6ms budget). At max frequency (1.0 GHz,
  1.0V), inference takes 10ms. Dynamic power is 1.5W and static power is 0.5W. The headset has a strict
  thermal design power (TDP) limit of 1.2W. You must evaluate Race-to-Sleep (run at max clock, then sleep)
  vs DVFS (downclock to 0.6 GHz, 0.6V) to meet the TDP constraint.
details:
  realistic_solution: Use the CMOS power equation (P_dyn ∝ V^2 * f) to analyze DVFS. Race-to-sleep averages
    the high active power with the low sleep power, but due to the V^2 factor, lowering frequency and
    voltage yields cubic power savings for the dynamic portion. DVFS stretches the execution to fill the
    deadline but drastically reduces dynamic power. In heavily thermally constrained edge environments,
    DVFS keeps the device well under the thermal limit without dropping frames, whereas race-to-sleep
    violates the TDP.
  common_mistake: Believing race-to-sleep is always optimal because it maximizes the time spent in the
    low-power static state.
  napkin_math: 'Race-to-Sleep: 10ms active (1.5W dyn + 0.5W static = 2.0W) + 6.6ms sleep (0.5W). Avg Power
    = ((10 * 2.0) + (6.6 * 0.5)) / 16.6 = 23.3 / 16.6 = 1.4W (Exceeds 1.2W TDP). DVFS: Freq drops to 0.6x,
    so time is 10/0.6 = 16.6ms. Voltage drops to 0.6x. P_dyn = 1.5W * (0.6)^2 * (0.6) = 0.324W. Total
    Power = 0.324W + 0.5W = 0.824W (Safely under 1.2W TDP).'
