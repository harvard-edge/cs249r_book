title: Encoder-Decoder Latency Disparity on Jetson Orin
scenario: We are deploying a real-time 1B parameter encoder-decoder translation model on an NVIDIA Jetson
  Orin (32 GB LPDDR5 with ~200 GB/s bandwidth, 275 TOPS INT8, 60W TDP, Ampere GPU). During profiling,
  the encoder processes 50-token input sequences in 10ms, efficiently utilizing the Ampere GPU. However,
  the decoder takes 250ms to generate 50 output tokens, during which the 275 TOPS compute capacity is
  less than 10% utilized. Explain why this massive latency and utilization disparity occurs between the
  encoder and decoder architectures, despite running on the exact same hardware.
details:
  realistic_solution: The latency disparity occurs because of the fundamental architectural difference
    between parallel encoding and autoregressive decoding. The encoder processes the entire input sequence
    simultaneously, loading the model weights from the LPDDR5 memory into the GPU just once and fully
    leveraging the 275 TOPS compute. The decoder, however, generates tokens sequentially; for each new
    token, it must reload the entire model weights from memory, leaving the compute units starved and
    idle while waiting for memory bandwidth.
  common_mistake: Candidates often incorrectly attribute the slowdown to the decoder having more complex
    operations or needing more raw compute power (TOPS). They fail to identify the shift from compute-bound
    parallel execution in the encoder to memory-bandwidth-bound sequential execution in the autoregressive
    decoder.
  napkin_math: 'Model size: 1B parameters quantized to INT8 = 1 GB of weights. Encoder phase: Loads 1
    GB weights once for all 50 tokens (1 GB / 200 GB/s = 5ms memory transfer time). Decoder phase: Must
    load the 1 GB weights for EACH of the 50 tokens sequentially. Memory transfer time per token: 1 GB
    / 200 GB/s = 5ms. Total decoder memory time for 50 tokens: 50 tokens * 5ms = 250ms. The 250ms latency
    is entirely bottlenecked by memory bandwidth, perfectly explaining the low compute utilization.'
