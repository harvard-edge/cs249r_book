title: 'Hailo-8 Deployment: Model Memory Footprint & Throughput'
scenario: 'You are tasked with deploying a convolutional neural network (CNN) for object detection on
  an edge device utilizing the Hailo-8 AI processor. The Hailo-8 offers 26 TOPS (Tera Operations Per Second)
  for INT8 inference and has a typical power consumption of 2.5W. The model you''re considering has a
  total of 15 million parameters. Each parameter needs to be stored in INT8 format (1 byte per parameter).


  1. Calculate the minimum memory (in MB) required to store the model''s parameters.

  2. Assuming this model requires 20 GOPS (Giga Operations Per Second) for a single inference, estimate
  the theoretical maximum inference throughput (in inferences per second) you can achieve on the Hailo-8,
  considering its INT8 TOPS performance.

  3. Discuss the implications of this memory footprint and throughput for real-time object detection on
  a device with limited RAM and power.'
question: "How much INT8 parameter memory does the 15M-parameter model need, what is its theoretical Hailo-8 throughput at 20 GOPS, and what do these imply?"
details:
  realistic_solution: "1. **Parameter Memory Calculation:**\n   15,000,000 parameters * 1 byte/parameter\
    \ = 15,000,000 bytes.\n   15,000,000 bytes / (1024 * 1024) bytes/MB ≈ 14.3 MB.\n\n2. **Theoretical\
    \ Throughput Calculation:**\n   Hailo-8 provides 26 TOPS (INT8) = 26,000 GOPS.\n   Model requires\
    \ 20 GOPS per inference.\n   Theoretical Max Throughput = 26,000 GOPS / 20 GOPS/inference = 1300 inferences/second.\n\
    \nFor a truly realistic solution, one would need to:\n- Utilize profiling tools provided by the Hailo\
    \ SDK to measure actual memory consumption, including peak activation memory.\n- Account for practical\
    \ efficiency losses due to data movement, CPU overhead, and the specific workload distribution on\
    \ the dataflow architecture.\n- Optimize the model (e.g., pruning, efficient architectures) if the\
    \ initial estimates do not meet real-time requirements or fit within hardware constraints."
  common_mistake: A common mistake is to only consider the model parameters for memory footprint, neglecting
    intermediate activations, input/output buffers, and the overhead of the runtime environment and operating
    system. Another pitfall is to directly divide Hailo-8's peak TOPS by the model's GOPS without considering
    actual dataflow, memory bandwidth limitations, and potential pipeline stalls on the accelerator, leading
    to an overestimation of real-world throughput.
  napkin_math: '1. **Model Parameter Memory (INT8):** 15 million parameters * 1 byte/parameter ≈ 15 MB.

    2. **Theoretical Throughput:** Hailo-8 (26 TOPS) / Model (20 GOPS/inference) = 26,000 / 20 = 1300
    inferences/second.'
