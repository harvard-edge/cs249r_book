title: The Rainy Day mAP Cliff
scenario: Your TI TDA4VM-based ADAS system runs a pedestrian detector at 20 FPS. Lab testing shows 92%
  mAP. Field data from a rainy Tuesday shows mAP dropped to 61% — a 31-point cliff, not a gradual decline.
  The camera isn't obstructed and the model runs at full speed. Rain intensity was moderate (5 mm/hr).
  Why does moderate rain cause such a catastrophic accuracy drop, and why is it a cliff rather than a
  slope?
details:
  realistic_solution: The cliff occurs because of how rain interacts with the camera's auto-exposure and
    the model's activation thresholds. Moderate rain creates thousands of bright streaks in the image.
    The camera's auto-exposure algorithm (running on the TDA4's ISP) sees the bright streaks and reduces
    exposure time to avoid saturation. This darkens the entire image by 1-2 stops. Pedestrians — already
    low-contrast objects in overcast conditions — drop below the model's effective detection threshold.
  common_mistake: '"Rain blurs the image, so accuracy drops proportionally." This predicts a gradual decline,
    not a cliff. The cliff behavior has a specific cause.'
  napkin_math: 'Auto-exposure jump: 1/500s → 1/1000s = 2× darkening = 1 stop. Pedestrian feature activation
    (backbone layer 3): dry = 0.45, wet = 0.38, rain-darkened = 0.21. Detection threshold: 0.3. Dry: 0.45
    > 0.3 ✓ (detected). Rain: 0.21 < 0.3 ✗ (missed). Percentage of pedestrian instances crossing threshold
    simultaneously: ~85% (all at similar contrast). mAP impact: 92% - (85% × 37%) = ~61%. Histogram equalization
    cost: 0.3ms per frame (1.5% of 20ms budget). HDR fusion: 0ms additional (ISP hardware).'
