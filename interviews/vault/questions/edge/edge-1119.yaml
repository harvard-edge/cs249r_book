title: 'Edge Queueing Theory Optimization: Memory-Aware Scheduling on Jetson Orin'
scenario: 'A Jetson Orin (32GB LPDDR5, 102.4GB/s memory bandwidth) running multi-model inference shows P99=300ms despite GPU compute at 40% utilization. Profiling shows 70% of time is spent on weight loading (memory-bound decode).'
question: 'For the memory-bound decode queue at λ=8/s and μ=9.7/s, what is the correct queue wait and why does caching matter?'
details:
  realistic_solution: 'M/M/1 Wq at ρ=0.825, μ=9.7: Wq ≈ 485ms (not 48.7ms — there''s a 10× decimal error in the original).'
  common_mistake: |
    **The Pitfall:** Treating memory bandwidth as a fixed background cost.
    **The Rationale:** Candidates focus entirely on GPU compute scheduling.
    **The Consequence:** They fail to model memory as a shared resource with its own utilization and queuing delay.
  napkin_math: |
    * System parameters: Arrival rate (λ) = 8 requests/s, Service rate (μ) = 9.7 requests/s.
    * Utilization (ρ) = λ / μ = 8 / 9.7 = 0.825 (82.5%).
    * M/M/1 Queue Wait Time (Wq) = ρ / (μ × (1 - ρ))
    * Wq = 0.825 / (9.7 × 0.175) = 0.825 / 1.6975 = 0.486 seconds.
    * **Wait Time ≈ 486ms (not 48.7ms as originally miscalculated by a 10× decimal error).**
