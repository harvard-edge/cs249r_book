title: 'Edge Queueing Theory Optimization: Memory-Aware Scheduling on Jetson Orin'
scenario: 'An edge SoC running multi-model inference shows P99=300ms despite GPU compute at 40% utilization. Profiling shows 70% of time is spent on weight loading (memory-bound decode).'
question: 'For the memory-bound decode queue at \u03bb=8/s and \u03bc=9.7/s, what is the correct queue wait and why does caching matter?'
details:
  realistic_solution: 'Calculate standard M/M/1 queuing delay for the memory-bound process. The high queuing delay proves that memory bandwidth, not compute TOPS, is the true shared resource bottleneck, necessitating KV caching or weight pinning.'
  common_mistake: |
    **The Pitfall:** Treating memory bandwidth as a fixed background cost.
    **The Rationale:** Candidates focus entirely on GPU compute scheduling and FLOPs.
    **The Consequence:** They fail to model memory as a shared resource with its own utilization curve and queuing delay.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (\u03bb) = 8 requests/s.
    - Service rate (\u03bc) = 9.7 requests/s.

    **Calculations:**
    - Utilization (\u03c1) = \u03bb / \u03bc = 8 / 9.7 = 0.8247 (82.5%).
    - M/M/1 Queue Wait Time (Wq) = \u03c1 / (\u03bc * (1 - \u03c1))
    - Wq = 0.8247 / (9.7 * 0.1753) = 0.8247 / 1.700 = 0.485 seconds.

    **Conclusion & Interpretation:**
    - **Result: 485 ms (Queueing-Bound)**. Wait Time \u2248 485ms, proving the memory bus queue dominates the latency budget.
