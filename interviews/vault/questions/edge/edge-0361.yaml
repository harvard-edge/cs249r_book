title: 'The Depthwise Separable Free Lunch: Real-Time Deadlines'
scenario: Your team is optimizing a real-time object detection model for an NVIDIA Jetson AGX Orin. To
  meet the 33ms deadline, an engineer suggests replacing a standard 3x3 convolution with a 3x3 depthwise
  separable convolution. For a typical layer with many channels (e.g., 256), what is the approximate reduction
  in computational cost (FLOPs) you should recall is possible?
details:
  realistic_solution: For a 3x3 kernel, the computational savings are approximately 8-9x compared to a
    standard convolution. The reduction factor approaches the square of the kernel size (K² = 3² = 9)
    as the number of output channels grows large. This is a foundational optimization for edge AI.
  common_mistake: A common mistake is to only consider the first step (the depthwise pass) and assume
    the savings scale with the number of channels, leading to a massive overestimation of the reduction
    (e.g., 256x). Another error is to simply guess a small, generic improvement (like 2x) without recalling
    the underlying calculation. The key is to remember it's a two-stage operation (depthwise then pointwise)
    and the savings are dominated by the kernel size.
  napkin_math: 'Standard 3x3 conv MACs: K^2 * C_in * C_out = 9 * 256 * 256 = 589,824. Depthwise separable
    MACs: (K^2 * C_in) + (C_in * C_out) = (9 * 256) + (256 * 256) = 2,304 + 65,536 = 67,840. Reduction
    factor: 589,824 / 67,840 = ~8.69x. The compute savings approach K^2 (9x) for large channel counts,
    easily meeting the 33ms deadline.'
  options:
  - About 2-3×
  - About 8-9×
  - About 256× (scales with channel count)
  - It's the same, it only saves memory
  correct_index: 1
