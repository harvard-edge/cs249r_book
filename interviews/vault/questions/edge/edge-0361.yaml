title: 'The Depthwise Separable Free Lunch: Real-Time Deadlines'
scenario: Your team is optimizing a real-time object detection model for an edge device. To meet the 33ms deadline, an engineer suggests replacing a standard 3x3 convolution with a 3x3 depthwise separable convolution.
question: For a typical layer with many channels (e.g., 256), what is the approximate reduction in computational cost (FLOPs)?
details:
  realistic_solution: For a 3x3 kernel, the computational savings are approximately 8-9x compared to a standard convolution. The reduction factor approaches the square of the kernel size (K² = 3² = 9) as the number of output channels grows large. This is a foundational optimization for edge AI.
  common_mistake: |
    **The Pitfall:** Assuming the savings scale linearly with the number of channels (e.g., 256x).
    **The Rationale:** Only considering the depthwise pass and ignoring the 1x1 pointwise pass that merges the channels back together.
    **The Consequence:** Drastically overestimating hardware performance and failing to accurately budget for real-time inference latency.
  napkin_math: |
    * **Standard 3x3 Conv MACs**: K² × C_in × C_out = 9 × 256 × 256 = 589,824.
    * **Depthwise Separable MACs**: (K² × C_in) + (C_in × C_out) = (9 × 256) + (256 × 256) = 2,304 + 65,536 = 67,840.
    * **Reduction Factor**: 589,824 / 67,840 = **~8.69x**.
  options:
  - About 2-3×
  - About 8-9×
  - About 256× (scales with channel count)
  - It's the same, it only saves memory
  correct_index: 1
