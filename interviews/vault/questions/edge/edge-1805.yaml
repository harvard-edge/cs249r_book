title: Energy-Aware Inference Architecture on Jetson Orin
scenario: You are tasked with designing the inference pipeline for a real-time multi-camera
  perception system targeting the NVIDIA Jetson Orin (60W TDP). The platform features
  an Ampere GPU and DLA accelerators delivering 275 TOPS INT8, backed by 64 GB of
  LPDDR5 memory. Your goal is to specify an architecture that minimizes total energy
  per operation, specifically balancing the energy cost of off-chip memory accesses
  against dense compute operations. How would you design the data flow and operator
  selection to stay well within the power budget while maintaining high utilization
  of the compute units?
question: How would you design the data flow and operator selection to stay well within
  the power budget while maintaining high utilization of the compute units?
details:
  realistic_solution: The correct approach involves a compute-bound design that aggressively
    fuses operators to keep intermediate activations in on-chip SRAM, minimizing LPDDR5
    traffic. The specification should mandate INT8 quantization to efficiently utilize
    the 275 TOPS on the Jetson AGX Orin 64GB (60W TDP) and offload standard convolutions
    to the DLA to save GPU power. Furthermore, the design should explicitly tile feature
    maps and select operators that maximize the compute-to-memory-access ratio, exploiting
    the fact that compute is cheap but data movement is the dominant energy drain.
  common_mistake: Candidates typically focus solely on maximizing TOPS utilization
    or minimizing latency without considering the severe energy cost of memory transfers.
    They might propose memory-bound models that frequently read and write intermediate
    activations to the 64 GB LPDDR5, ignoring that off-chip memory access costs orders
    of magnitude more energy than an INT8 MAC operation.
  napkin_math: Assume an INT8 MAC costs ~0.1 pJ, while off-chip LPDDR5 access costs
    ~100 pJ/byte. Running at full compute capacity (275 TOPS = 137.5 TMACs/s) consumes
    roughly 137.5e12 * 0.1 pJ = 13.75W just for compute operations. If a naive, unfused
    model layer writes and reads a 10MB activation tensor for 10 cameras at 30 FPS
    (300 inferences/sec), the memory access energy is 20MB * 100 pJ/byte * 300 = 600
    mJ/s or 0.6W for a single layer's data movement. Across a deep network with 50+
    layers, unfused memory traffic can easily consume tens of watts, proving that
    operator fusion and maximizing SRAM usage are mandatory to stay under the 60W TDP.
