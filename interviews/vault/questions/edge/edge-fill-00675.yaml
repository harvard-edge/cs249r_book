title: 'Edge AI Deployment: Optimizing CNN for Qualcomm Cloud AI 100'
scenario: You are tasked with deploying a real-time object detection model, initially a standard ResNet-50,
  onto the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). The current ResNet-50 model exceeds
  the memory footprint and latency targets for a 10ms end-to-end inference budget, while maintaining 90%
  mAP. Analyze how you would redesign the model architecture to leverage depthwise separable convolutions,
  inverted residuals, and MobileNet/EfficientNet principles to meet these constraints, specifically targeting
  the INT8 precision capabilities and the 75W power budget of the AI 100. Discuss the FLOP-accuracy tradeoffs
  you would consider and how you'd quantify the expected performance on the target hardware.
details:
  realistic_solution: Transitioning to an EfficientNet-B0/B1 or MobileNetV3-Large architecture, which
    inherently utilize depthwise separable convolutions and inverted bottleneck structures. This reduces
    FLOPs and parameter count significantly. Employing post-training quantization aware training (PTQ-AT)
    or quantization-aware training (QAT) to fine-tune the model for INT8 precision, fully utilizing the
    400 TOPS INT8. Profiling the model on the AI 100 to identify critical bottlenecks in memory access
    or specific layers. Iteratively balancing accuracy (mAP > 90%) with reduced model size, latency, and
    power consumption (within 75W) by adjusting network width/depth multipliers (MobileNet) or compound
    scaling (EfficientNet).
  common_mistake: Simply quantizing a large model without architectural changes, leading to poor latency
    or memory utilization despite INT8 support. Another common mistake is focusing solely on FLOP reduction
    without considering memory access patterns, hardware specifics, and their impact on actual throughput
    and power consumption.
  napkin_math: '**TOPS Utilization:** Given 400 TOPS INT8 and a 10ms inference budget, the model''s effective
    operations must not exceed ~4 * 10^12 INT8 operations per inference (400 * 10^12 ops/s / 100 inferences/s).
    **Memory Footprint:** Ensure the model weights and intermediate activations fit efficiently within
    the 32GB LPDDR4x, prioritizing on-chip memory use and minimizing external DDR access due to power
    and latency overheads. **Power Efficiency:** FLOPs per Watt is a key metric. Depthwise separable convolutions
    dramatically reduce computational cost and memory bandwidth requirements compared to standard convolutions,
    directly contributing to lower power consumption within the 75W budget while maintaining accuracy.
    **Quantization Impact:** INT8 quantization typically offers a 4x reduction in model size and memory
    bandwidth, enabling significantly higher throughput on accelerators like the AI 100, but careful calibration
    is crucial to preserve the required mAP.'
