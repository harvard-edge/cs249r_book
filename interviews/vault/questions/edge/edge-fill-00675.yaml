validation_issues:
- The Napkin Math for 'TOPS Utilization' states '4 * 10^12 INT8 operations per inference' for a 10ms budget,
  which is a confusing way to express the calculation; it should be 400 TOPS * 0.01s = 4 GOPS, not 4 *
  10^12 operations.
