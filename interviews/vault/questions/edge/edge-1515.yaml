title: 'Edge TPU Operator Fallback Diagnosis'
scenario: 'You are deploying a vision model to a Google Coral Edge TPU connected via USB. The hardware is rated for a highly efficient 4 TOPS of INT8 performance at just a 2W power envelope, so you expect inference to take under 5ms. Instead, you observe that inference latency is over 150ms and the host CPU usage suddenly spikes to 100% during prediction.'
question: 'What is the hardware-level root cause of this symptom, and how do you confirm it?'
details:
  realistic_solution: 'The root cause is an operator fallback to the host CPU due to limited operator support. Because the Coral Edge TPU strictly requires INT8 quantization and supports a limited subset of operations, an unsupported layer forces the compiler to partition the graph. This forces the TPU to pause execution, copy intermediate tensors across the USB bus to the host CPU, and then copy results back. Confirm by checking the compiler log for operation mapped to CPU.'
  common_mistake: 'Candidates often incorrectly diagnose this as a thermal throttling issue due to the 2W power envelope or assume the input image transfer over the USB bus is bottlenecking the system. They fail to analyze how the compiler handles operations that cannot be mapped to the accelerator.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge TPU: 4 TOPS (INT8). Model: 10 GOPS.
    - USB 2.0 bus: effective 35 MB/s.
    - Intermediate tensor size: 2 MB.

    **Calculations:**
    - Theoretical execution time: (10 * 10^9) / (4 * 10^12) = 2.5 ms.
    - USB transfer for fallback (round trip): (2 MB + 2 MB) / 35 MB/s = 114 ms.
    - Total Latency: 114 ms + CPU processing time = >150 ms.

    **Conclusion & Interpretation:**
    - **Result: 114 ms USB overhead (PCIe-Bandwidth-Bound)**. Operator fallbacks create catastrophic I/O bottlenecks that negate hardware acceleration.
