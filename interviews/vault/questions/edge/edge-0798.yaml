title: The Remote Fleet Update Dilemma
scenario: You are responsible for deploying and maintaining ML models on a fleet of thousands of safety-critical edge devices operating in remote locations with intermittent connectivity. These devices must operate for years without human intervention.
question: How would you design a secure OTA update system for remote safety-critical edge devices that prevents bricking and supports rollback after dropped connections?
details:
  realistic_solution: Implement a multi-stage, atomic, and verified OTA update system. Use A/B Partitioning where the device boots from the active slot (A) and installs updates to the inactive slot (B). Ensure Secure Boot & Authenticated Updates with cryptographically signed packages. Use Delta Updates (binary diffs) to minimize bandwidth. Execute Staged Rollouts starting with a canary group, and establish Health Monitoring & Rollback Triggers to automatically revert to the previous known-good version if critical errors occur.
  common_mistake: |
    **The Pitfall:** Simply pushing the new model via standard network transfer and replacing the active file.
    **The Rationale:** Engineers accustomed to containerized cloud deployments rely on orchestration engines to handle failures, assuming networking is reliable.
    **The Consequence:** Partial updates or network failures mid-transfer lead to corrupted model files, permanently bricking the remote safety-critical device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100MB model update over a 100kbps intermittent connection.
       - 10,000 devices in the fleet.
    2. **Calculations:**
       - Full Transfer: 100MB * 8000kb/MB / 100kbps = 8000 seconds (2.2 hours).
       - Delta Transfer: 10MB diff takes ~800 seconds (13 minutes).
       - Staged Rollout: 1% canary = 100 devices.
    3. **Conclusion & Interpretation:**
       - **Result: Using delta diffs cuts transfer time 10x, and canary testing saves 9,900 devices from potential failure. (Network-Bandwidth-Bound)**
