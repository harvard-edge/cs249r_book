title: Graceful Degradation on Jetson Orin for Autonomous Vehicles
scenario: A perception system on an NVIDIA Jetson Orin uses a high-fidelity semantic segmentation model (primary) and a simpler object detection model (fallback). During peak inference load or sensor degradation, the primary model occasionally misses its real-time latency target of 50ms.
question: How would you design graceful degradation for a Jetson Orin perception system that misses its 50 ms deadline under load or sensor degradation?
details:
  realistic_solution: 'Implement a degradation ladder with QoS shedding. Stage 1: Dynamic adjustment of primary model parameters (e.g., lower input resolution) when latency approaches 40ms. Stage 2: Gracefully switch to the simpler, pre-loaded object detection fallback model if latency exceeds 50ms. A guardian process monitors system health and enforces the fallback. Ensure both models fit within the unified LPDDR5 memory during transitions.'
  common_mistake: |
    **The Pitfall:** Implementing a hard switch-over to a fallback model only after complete failure.
    **The Rationale:** Waiting for the primary model to consistently miss deadlines without a pre-loaded fallback.
    **The Consequence:** Abrupt performance drops, safety hazards, and OOM crashes during model transitions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin Memory: 32 GB LPDDR5.
       - Primary model: 20 GB LPDDR5, target 50ms.
       - Fallback model: 5 GB LPDDR5, 50 TOPS compute overhead.
    2. **Calculations:**
       - Transition memory peak = 20 GB + 5 GB = 25 GB.
       - 25 GB < 32 GB total memory.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Safe. Both models can concurrently reside in memory during transition without triggering OOM.**
