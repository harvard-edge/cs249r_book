title: Edge Inference Load Balancing for Qualcomm Cloud AI 100 Fleet
scenario: Your team is deploying a new ML inference service on a fleet of edge devices, each equipped with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). This service handles diverse, real-time requests for various large language models (LLMs) and computer vision (CV) models. Design a comprehensive request routing and load balancing strategy for this fleet. Your solution must optimize for high throughput, minimize inference latency, and ensure efficient utilization of each accelerator's capabilities while respecting the strict power budget and memory constraints of the edge environment. Describe how you would manage inference traffic, handle potential device failures, and dynamically adjust routing based on device load and model characteristics.
question: How would you design request routing and load balancing for a Qualcomm Cloud AI 100 edge fleet serving diverse real-time LLM and CV workloads?
details:
  realistic_solution: Implement a hierarchical load balancing architecture. At the entry point, a global load balancer (e.g., DNS-based or L7 proxy) directs traffic to regional edge clusters. Within each edge cluster, a local intelligent load balancer (e.g., using Envoy or a custom service mesh sidecar) utilizes real-time telemetry from each Qualcomm Cloud AI 100. This telemetry includes current device utilization, temperature, available LPDDR4x memory, and power consumption. Routing decisions would leverage a combination of weighted round-robin (weights derived from dynamic telemetry and model-specific resource requirements) and consistent hashing for stateful or session-based inferences. A central control plane would push dynamic routing policies and model placement strategies to the edge load balancers.
  common_mistake: Failing to account for the heterogeneous nature of ML workloads and device state (e.g., thermal throttling, memory pressure) at the edge, leading to unbalanced loads or performance degradation despite high theoretical TOPS. Another common mistake is static load balancing that doesn't adapt to dynamic inference patterns or device health.
  napkin_math: 'Given 400 TOPS (INT8), if an average CV model inference requires 50 GOPs, max throughput is 400,000 / 50 = 8000 inferences/sec per device. With a 1 Gbps (125 MB/s) edge uplink and 50 KB per request/response, max network QPS is 125 MB/s / 50 KB = 2500 QPS. The network bottlenecks before the accelerator. Power budget: 75W TDP per AI 100. In a 300W edge enclosure, you can safely deploy floor(300W / 75W) = 4 accelerators, but you must account for host system power (e.g., 50W), realistically limiting it to 3 accelerators to avoid thermal throttling under heavy load.'
