title: Edge Inference Load Balancing for Qualcomm Cloud AI 100 Fleet
scenario: Your team is deploying a new ML inference service on a fleet of edge devices, each equipped with a Qualcomm Cloud AI 100 accelerator. This service handles diverse, real-time requests for various large language models (LLMs) and computer vision (CV) models. You need to design a comprehensive request routing and load balancing strategy for this fleet, assuming a 1 Gbps edge uplink and 50 KB per request/response.
question: How would you design request routing and load balancing for a Qualcomm Cloud AI 100 edge fleet serving diverse real-time LLM and CV workloads?
details:
  realistic_solution: Implement a hierarchical load balancing architecture. At the entry point, a global load balancer (e.g., DNS-based or L7 proxy) directs traffic to regional edge clusters. Within each edge cluster, a local intelligent load balancer (e.g., using Envoy or a custom service mesh sidecar) utilizes real-time telemetry from each Qualcomm Cloud AI 100. This telemetry includes current device utilization, temperature, available LPDDR4x memory, and power consumption. Routing decisions would leverage a combination of weighted round-robin (weights derived from dynamic telemetry and model-specific resource requirements) and consistent hashing for stateful or session-based inferences. A central control plane would push dynamic routing policies and model placement strategies to the edge load balancers.
  common_mistake: |
    **The Pitfall:** Using static load balancing and ignoring device state.
    **The Rationale:** Candidates fail to account for the heterogeneous nature of ML workloads and device state (e.g., thermal throttling, memory pressure) at the edge.
    **The Consequence:** Unbalanced loads, thermal throttling, or performance degradation despite high theoretical TOPS, leading to missed deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud AI 100: 400 TOPS (400,000 GOPS), 75W TDP.
       - Workload: 50 GOPS/request.
       - Network Uplink: 1 Gbps (125 MB/s), 50 KB/request.
       - Power Budget: 300W edge enclosure. Host system power ≈ 50W.
    2. **Calculations:**
       - Max Throughput per Device: 400,000 GOPS / 50 GOPS/request = 8,000 inferences/sec.
       - Network Bottleneck: 125 MB/s / 50 KB/request = 2,500 QPS max.
       - Accelerator Power Budget: 300W - 50W (host) = 250W.
       - Max Accelerators: 250W / 75W = 3 accelerators.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Fleet.** Despite massive compute capacity, the system is bottlenecked by the 1 Gbps uplink (2,500 QPS) and thermal limits (max 3 accelerators).
