title: Jetson Orin Fleet Compute Cost
scenario: We are deploying a fleet of 1,000 smart city traffic monitoring devices, each utilizing an NVIDIA Jetson Orin edge compute platform. The Jetson Orin features 64 GB LPDDR5 memory, 275 TOPS INT8 peak performance, and a 60W TDP.
question: Can one Jetson Orin support two 150 TOPS video streams, and what is the daily electricity cost for 1,000 devices at 60W and $0.15/kWh?
details:
  realistic_solution: The candidate should immediately identify that the required 300 TOPS (2 streams * 150 TOPS) exceeds the Jetson Orin's peak 275 TOPS capacity, requiring a system redesign such as dropping the frame rate. For the cost estimation, since the device will be operating at maximum capacity to handle the heavy workload, using the full 60W TDP provides an accurate worst-case power projection for the fleet.
  common_mistake: |
    **The Pitfall:** Failing to recognize hard compute ceilings.
    **The Rationale:** Candidates blindly calculate the power cost without evaluating if the mathematical requirement (300 TOPS) exceeds the hardware's physical limit (275 TOPS).
    **The Consequence:** Designing a financial budget for an architecture that is fundamentally impossible to deploy.
  napkin_math: |
    1. **Compute Requirement:** 2 streams * 150 TOPS = 300 TOPS.
    2. **Hardware Check:** 300 TOPS > 275 TOPS limit (Requires redesign/frame drop).
    3. **Power Draw:** Full load draws max 60W.
    4. **Fleet Power:** 1,000 devices * 60W = 60 kW.
    5. **Daily Energy:** 60 kW * 24 hours = 1,440 kWh per day.
    6. **Daily Cost:** 1,440 kWh * $0.15/kWh = $216.
    **Result: It cannot support the streams natively, and the daily power cost is $216.**
