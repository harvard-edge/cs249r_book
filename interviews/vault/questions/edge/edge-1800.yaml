title: Jetson Orin Fleet Compute Cost
scenario: We are deploying a fleet of 1,000 smart city traffic monitoring devices, each utilizing an NVIDIA Jetson Orin edge compute platform. The Jetson Orin features 64 GB LPDDR5 memory, 275 TOPS INT8 peak performance, and a 60W TDP.
question: Can one Jetson Orin support two 150 TOPS video streams, and what is the daily electricity cost for 1,000 devices at 60W and $0.15/kWh?
details:
  realistic_solution: Compare continuous TOPS capacity mapped across multiple inference requests against the hard physical ceiling of the hardware. Evaluate OpEx load at full capacity to forecast total fleet energy strain.
  common_mistake: |
    **The Pitfall:** Failing to recognize hard compute ceilings.
    **The Rationale:** Candidates blindly calculate the power cost without evaluating if the mathematical requirement (300 TOPS) exceeds the hardware's physical limit (275 TOPS).
    **The Consequence:** Designing a financial budget for an architecture that is fundamentally impossible to deploy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 1,000 devices.
       - Workload: 2 streams at 150 TOPS each.
       - Hardware Capability: 275 TOPS max.
       - Hardware TDP: 60 Watts.
       - Energy Cost: $0.15 / kWh.
    2. **Calculations:**
       - Total Compute Required = 2 * 150 TOPS = 300 TOPS.
       - Viability Check = 300 TOPS > 275 TOPS (System fails or drops frames).
       - Fleet Power Draw (assuming full load to service demand) = 1000 devices * 60W = 60,000 W = 60 kW.
       - Daily Energy Consumption = 60 kW * 24 hours = 1,440 kWh.
       - Daily Electricity Cost = 1,440 kWh * $0.15/kWh = $216.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Failure & $216/day (Compute-Bound)** - The workload natively exceeds the hardware capabilities, while drawing maximum physical power.
