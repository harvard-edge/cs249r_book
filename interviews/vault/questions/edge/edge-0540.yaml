title: The Vibration-Induced Quantization Noise Floor
scenario: Your weld inspection system on an industrial robot arm uses an Ambarella CV5 (20 TOPS INT8)
  with a high-resolution camera. The INT8 model achieves 96% defect detection on the test bench. On the
  actual robot, accuracy drops to 78%. The robot arm vibrates at 120 Hz during welding. You stabilize
  the camera with a mechanical damper, reducing visible blur — but accuracy only recovers to 83%. Why
  doesn't eliminating the blur fully restore accuracy?
details:
  realistic_solution: The vibration is coupling into the camera's **analog signal chain**, not just the
    optical path. The image sensor's analog-to-digital converter (ADC) is sensitive to power supply noise.
    The robot arm's 120 Hz vibration is transmitted through the mounting bracket to the camera housing,
    where it modulates the power supply voltage through microphonic effects in the ceramic capacitors
    on the camera's PCB. This introduces a 120 Hz ripple in the ADC's reference voltage, adding ±2 LSB
    (least significant bit) of noise to every pixel value.
  common_mistake: '"The damper isn''t good enough — there''s still residual blur." The damper reduced
    vibration amplitude from ±0.5mm to ±0.05mm. At the camera''s working distance (300mm) and resolution
    (4K), ±0.05mm corresponds to <0.3 pixels of motion — well below the perceptible blur threshold.'
  napkin_math: 'Input noise: ±2 LSB out of 255 = ±0.78% of dynamic range. After first conv layer (3×3
    kernel, 32 filters): noise amplification ≈ √(9 × 32) × 0.78% = 13.2% of activation range. INT8 quantization
    step: 1/256 = 0.39%. When noise (13.2%) >> quantization step (0.39%), the quantized activations are
    dominated by noise, not signal. With frame averaging (4 frames): noise drops to 13.2% / 2 = 6.6% —
    still above quantization step but now the signal (hairline crack = ~8% activation difference) is detectable.
    With FP16 early layers: quantization step = 1/65536 = 0.0015% — noise is irrelevant at this precision.'
  options:
  - The damper isn't good enough — there's still residual blur.. The damper reduced vibration amplitude
    from ±0.5mm to ±0.05mm.
  - The vibration is coupling into the camera's analog signal chain, not just the optical path. The image
    sensor's analog-to-digital converter (ADC) is sensitive to power supply noise.
  - Profiling overhead is masking the true performance; disabling all instrumentation will reveal that
    the system is already meeting targets.
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally
    cannot meet the latency and accuracy requirements.
  correct_index: 1
