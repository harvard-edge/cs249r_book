title: ViT vs CNN Ensemble Memory Tradeoffs on Jetson Orin
scenario: Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin with 32 GB LPDDR5 unified memory, 275 TOPS INT8, 60W TDP, and an Ampere GPU + DLA accelerator. Two architectures meet the accuracy requirements: a Vision Transformer (ViT-L) with 300M parameters running in FP16, and an ensemble of three EfficientNet-B7 models (66M parameters each) running in INT8.
question: Which architecture is better suited for the Jetson Orin: the FP16 ViT-L or the INT8 EfficientNet-B7 ensemble, and why?
details:
  realistic_solution: The ensemble of EfficientNet-B7 models in INT8 is the superior choice. It significantly reduces memory bandwidth pressure on the shared 32 GB LPDDR5 memory and allows the workload to be offloaded to the Orin's DLA accelerator. This frees up the Ampere GPU for other computer vision pipeline tasks and operates much more efficiently within the 60W TDP constraint by utilizing the dedicated INT8 compute.
  common_mistake: |
    **The Pitfall:** Overlooking activation footprints and hardware-specific data types.
    **The Rationale:** Candidates often only calculate static weight sizes without factoring in intermediate activation memory or that DLA hardware struggles with FP16 transformer attention.
    **The Consequence:** Selecting the ViT-L, which exhausts shared memory bandwidth and underutilizes the INT8 DLA engines.
  napkin_math: |
    1. **ViT-L (FP16):** 300M params * 2 bytes/param = 600 MB weight footprint + ~1.5 GB for activations = ~2.1 GB peak memory.
    2. **CNN Ensemble (INT8):** 3 models * 66M params = 198M params * 1 byte/param = 198 MB weight footprint + ~300 MB activations = ~500 MB peak memory.
    **Result: The INT8 CNN ensemble uses >4x less memory footprint and is directly compatible with the DLA.**
