title: ViT vs CNN Ensemble Memory Tradeoffs on Jetson Orin
scenario: 'Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin. Two architectures meet the accuracy requirements: a Vision Transformer (ViT-L) with 300M parameters running in FP16, and an ensemble of three EfficientNet-B7 models (66M parameters each) running in INT8.'
question: 'Which architecture is better suited for the Jetson Orin: the FP16 ViT-L or the INT8 EfficientNet-B7 ensemble, and why?'
details:
  realistic_solution: Utilize the INT8 CNN array. This leverages the specialized DLA (Deep Learning Accelerator) natively optimized for INT8 sparse/dense structures, heavily minimizing the bandwidth load across the unified LPDDR5 controller by dropping entirely out of floating-point overhead.
  common_mistake: |
    **The Pitfall:** Overlooking activation footprints and hardware-specific data types.
    **The Rationale:** Candidates often only calculate static weight sizes without factoring in intermediate activation memory or that DLA hardware struggles with FP16 transformer attention.
    **The Consequence:** Selecting the ViT-L, which exhausts shared memory bandwidth and underutilizes the INT8 DLA engines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Hardware: Jetson Orin (DLA support for INT8 CNNs, struggling with FP16 Attention).
       - Model 1: ViT-L (300M parameters, FP16).
       - Model 2: Ensemble of 3x EfficientNet-B7 (66M parameters each, INT8).
    2. **Calculations:**
       - ViT-L Weight Footprint = 300,000,000 params * 2 bytes (FP16) = 600 MB.
       - ViT-L Total Memory (including dense FP16 activations) ≈ ~2.1 GB peak.
       - CNN Ensemble Weight Footprint = (3 * 66,000,000) params * 1 byte (INT8) = 198 MB.
       - CNN Ensemble Total Memory (including INT8 activations) ≈ ~500 MB peak.
    3. **Conclusion & Interpretation:**
       - **Result: ~500 MB (Memory-Capacity-Bound)** - The INT8 CNN ensemble uses >4x less memory and maps perfectly to the dedicated DLA accelerator.
