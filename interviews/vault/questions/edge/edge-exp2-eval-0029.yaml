title: Edge TPU Operator Delegation Tradeoffs
scenario: Your team is deploying a custom object detection model to a smart camera powered by a Google
  Coral Edge TPU (4 TOPS INT8, 2W power budget, USB form factor). During TFLite INT8 quantization and
  compilation, you discover that an intermediate HardSwish activation and the final custom Non-Max Suppression
  (NMS) block are unsupported by the Edge TPU. Alternative A is to rewrite the model to use Edge TPU-supported
  operators (e.g., ReLU6) and compute NMS on the host CPU. Alternative B is to use TFLite's CPU fallback,
  letting the compiler partition the graph so unsupported intermediate activations execute on the low-power
  host ARM CPU. Which alternative do you choose to stay within your power and latency budgets?
question: "Which alternative do you choose to stay within your power and latency budgets?"
details:
  realistic_solution: Alternative A is the necessary approach for this hardware. The Edge TPU has limited
    operator support but massive INT8 throughput (4 TOPS) at low power (2W). Graph partitioning (Alternative
    B) forces intermediate tensors off the TPU and wakes the host CPU, breaking the pipeline and consuming
    massive I/O power. By replacing HardSwish with ReLU6, the entire backbone runs continuously on the
    TPU. Processing NMS on the host is acceptable because it is at the very end of the graph, requiring
    only a single, final data transfer off the TPU.
  common_mistake: Candidates often choose Alternative B because TFLite handles CPU fallback automatically
    and it avoids retraining the model. They fail to evaluate the catastrophic latency and power penalties
    caused by repeatedly transferring intermediate activation tensors back and forth across the USB bus.
  napkin_math: Assume the backbone requires 1 GOPS. On the 4 TOPS Edge TPU, ideal compute time is 1 GOPS
    / 4000 GOPS = 0.25 ms. Assume a 2MB intermediate tensor transfer over the USB connection takes ~1.0
    ms. Under Alternative B, a single unsupported activation in the middle of the network forces data
    to the CPU (1.0 ms) and back to the TPU (1.0 ms), adding 2.0 ms of I/O overhead—an 800% latency penalty
    over the compute itself. Alternative A computes the whole backbone on the TPU (0.25 ms) with only
    one final transfer to the CPU for NMS (1.0 ms), totaling 1.25 ms latency while avoiding multiple CPU
    context switches that would break the 2W budget.
