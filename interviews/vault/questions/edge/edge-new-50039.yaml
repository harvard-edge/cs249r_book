title: OTA Model Update Portability for Heterogeneous Edge Fleets
scenario: 'Your edge fleet has 5000 devices: 60% Jetson Orin, 25% Qualcomm RB5, 15% Raspberry Pi 5 (CPU-only).
  You need to push a model update OTA (over-the-air) that works across all three platforms. The update
  includes a new object detection model and updated post-processing logic.'
question: "How would you package and validate an OTA model and post-processing update for the 5000-device Orin, RB5, and Pi 5 fleet?"
details:
  realistic_solution: 'Ship the ONNX model as the canonical format in the OTA package. Each device runs
    on-device model compilation at update time: Orin devices compile ONNX to TensorRT engine (1-3 minutes
    for a typical detection model). Qualcomm devices compile to QNN context binary via QAIRT (30-60 seconds).
    Pi 5 devices use ONNX Runtime CPU EP (no compilation needed). Post-processing logic ships as a portable
    WASM module (or Python script). Include a model validation step: run a golden-input test case and
    compare output against a reference to verify compilation correctness before switching the active model.'
  common_mistake: Shipping platform-specific model binaries (TensorRT engine, QNN context binary, TFLite
    flatbuffer) as a single OTA package. TensorRT engines are not portable even across different Jetson
    models with different GPU configurations.
  napkin_math: 'OTA package: 15MB ONNX model + 200KB post-processing code + 50KB golden test. Total: ~15.3MB
    per device. 5000 devices x 15.3MB = 76.5GB bandwidth. At $0.05/GB CDN cost: $3.83 per model update.
    On-device compilation cost: Orin 3min at 60W = 0.003kWh x $0.12 = $0.0004 per device.'
