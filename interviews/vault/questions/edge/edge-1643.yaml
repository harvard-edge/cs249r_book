title: Heterogeneous CNN Design for Jetson Orin
scenario: Your team is building a high-speed robotics perception system deploying
  on an NVIDIA Jetson Orin (60W TDP, 32 GB LPDDR5). You need to process 4 high-resolution
  4K camera streams at 60 FPS for real-time obstacle avoidance. The Orin features
  both an Ampere GPU and specialized Deep Learning Accelerators (DLA). Design a novel,
  efficient CNN architecture that explicitly co-designs the neural network blocks
  (e.g., inverted residuals, depthwise convolutions) to optimally map across the heterogeneous
  GPU and DLA compute units to maximize the 275 TOPS INT8 throughput without exceeding
  the power budget.
question: What CNN architecture would you design to map 4K 60 FPS perception across
  Orin's GPU and DLA while maximizing INT8 throughput within 60W?
details:
  realistic_solution: A senior engineer designs a bifurcated architecture tailored
    to the hardware. They use standard 3x3 dense convolutions and ReLU
    activations for early, high-resolution feature extraction to run efficiently on
    the DLA. They route the lower-resolution, complex semantic heads (using custom
    ops or attention) to the flexible Ampere GPU. They also ensure channel counts
    are multiples of 32 to maximize Tensor Core utilization.
  common_mistake: Candidates often design a uniform architecture like a standard EfficientNet
    or MobileNetV3 and attempt to run it entirely on the GPU, ignoring the DLA. They
    also frequently rely on operations like Swish or Squeeze-and-Excitation which
    have poor utilization on the fixed-function DLA, leading to pipeline stalls.
  napkin_math: 'Compute requirement: 4 cameras * 60 FPS = 240 frames/sec. If the custom
    CNN requires 50 GOPS/frame, total compute is 240 * 50 GOPS = 12,000 GOPS = 12 TOPS, easily fitting
    within the 275 TOPS INT8 budget. Memory bandwidth is the real bottleneck. Reading
    4K images (3840x2160x3 bytes = ~25 MB) at 240 FPS consumes 6 GB/s for input ingestion
    alone. To stay within the LPDDR5 bandwidth limits, the architecture must
    fuse consecutive convolution layers in local DLA SRAM, reducing DRAM roundtrips
    by at least 3x.'
