title: The Edge LLM Memory Wall
scenario: You're deploying a 3B parameter small language model (Phi-3-mini) on a Jetson
  Orin NX with 8 GB DRAM. The model weights in INT4 are 1.5 GB. Your colleague says
  'plenty of room — we have 6.5 GB free.' The first few conversation turns work fine,
  but at turn 15 the system crashes with an OOM error. What's consuming the memory?
question: What's consuming the memory?
details:
  realistic_solution: 'The KV-cache. During autoregressive generation, the model stores
    the key and value tensors for every token generated so far, across every layer.
    For Phi-3-mini (32 layers, 32 heads, head_dim=96): KV-cache per token = 2 (K+V)
    × 32 layers × 32 heads × 96 dim × 2 bytes (FP16) = 393 KB per token. At turn 15
    of a conversation with ~2000 tokens of context: 2000 × 393 KB = **786 MB**. Add
    the model weights (1.5 GB), OS and sensor overhead (~3.5 GB on the 8 GB Orin NX),
    and you''re at 5.8 GB — dangerously close to the 8 GB limit. By turn 20 (~3000
    tokens): KV-cache = 1.15 GB, total = 6.2 GB. A spike in OS memory usage (camera
    ISP burst) pushes you over the edge.'
  common_mistake: '"The model is leaking memory" or "Activations are too large." The
    weights are static and activations are small for a single-token decode step. The
    growing cost is something else.'
  napkin_math: 'Phi-3-mini KV-cache: 393 KB/token. At 2048 tokens: 786 MB. At 4096
    tokens: 1.57 GB. With INT4 KV quantization: 196 MB at 2048 tokens. Memory budget
    on 8 GB Orin NX: 8 GB - 3.5 GB (OS) - 1.5 GB (weights) = 3 GB for KV-cache. Max
    tokens without quantization: 3 GB / 393 KB = ~7,800 tokens. With INT4 KV: ~31,000
    tokens. KV quantization is mandatory for edge LLMs.'
  options:
  - The model is leaking memory. or "Activations are too large." The weights are static
    and activations are small for a single-token decode step.
  - 'The KV-cache. During autoregressive generation, the model stores the key and
    value tensors for every token generated so far, across every layer. For Phi-3-mini
    (32 layers, 32 heads, head_dim=96): KV-cache per token = 2 (K+V) × 32 layers ×
    32 heads × 96 dim × 2 bytes (FP16) = 393 KB per token.'
  - If the inference process is still running (visible in ps/top), the system is healthy
    and no recovery action is needed.
  - Increasing the number of inference threads will proportionally increase throughput,
    since modern accelerators scale linearly with thread count.
  correct_index: 1
