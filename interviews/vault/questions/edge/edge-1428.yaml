title: Kernel Fusion on Heterogeneous SoCs
scenario: You are optimizing an INT8 vision pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8 total, 60W TDP, Ampere GPU + DLA accelerator) with an assumed memory bandwidth of 200 GB/s. The original pipeline executes a heavy convolution on the DLA (achieving 100 effective TOPS) followed by a custom memory-bound activation on the Ampere GPU. An engineer fused these operators to eliminate 20 MB of intermediate LPDDR5 read/write traffic. However, because the DLA lacks support for the custom fused operation, the new kernel falls back entirely to the Ampere GPU, where it only achieves 40 effective TOPS. The convolution requires 100 giga-operations (GOPs).
question: Why does fusing the DLA convolution with the custom GPU activation degrade latency even though it removes 20MB of LPDDR5 traffic?
details:
  realistic_solution: The candidate must analyze the tradeoff between compute time and memory transfer time using the provided specifications. They should explain that the severe compute throughput penalty of moving the 100 GOP convolution from the DLA to the Ampere GPU far exceeds the latency saved from avoiding the 20 MB memory transfer.
  common_mistake: |
    **The Pitfall:** Rigidly assuming that operator fusion always yields performance gains.
    **The Rationale:** Candidates are taught to fuse kernels to reduce memory bandwidth and launch overhead, but fail to analyze the impact on heterogeneous architectures.
    **The Consequence:** Fusing an operator forces a compute-heavy task off a highly efficient, specialized accelerator (DLA) onto a slower general-purpose one, degrading overall latency.
  napkin_math: |
    1. Unfused latency (DLA conv + GPU activation): 
       - DLA compute: 100 GOPs / 100 TOPS = 1.0 ms.
       - Memory I/O: 20 MB / 200 GB/s = 0.1 ms.
       - Total = 1.1 ms.
    2. Fused latency (GPU only):
       - GPU compute: 100 GOPs / 40 TOPS = 2.5 ms.
       - Memory I/O: Eliminated.
       - Total = 2.5 ms.
    3. **Fusing the operators actually caused a 1.4 ms degradation (2.5 ms - 1.1 ms).**
