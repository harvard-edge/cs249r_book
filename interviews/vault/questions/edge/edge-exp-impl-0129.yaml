title: Alerting on Host-to-Device Streaming Starvation
scenario: We are deploying a fleet of industrial inspection cameras equipped with Hailo-8 accelerators
  (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, it relies entirely
  on streaming input tensors from host memory over PCIe. The system processes uncompressed 1080p RGB frames
  (1920x1080x3 bytes) at a target rate of 60 FPS. During a stress test, telemetry indicates the host can
  only sustain 300 MB/s of PCIe bandwidth to the accelerator due to memory controller contention. Calculate
  the expected frame drop rate (in FPS) that our monitoring system should alert on under these conditions.
question: "At only 300 MB/s PCIe bandwidth, what frame drop rate should monitoring expect for uncompressed 1080p RGB input at a 60 FPS target?"
details:
  realistic_solution: The correct approach is to calculate the raw memory bandwidth required to feed the
    dataflow accelerator and compare it to the available PCIe bandwidth. Since the Hailo-8 streams continuously
    from host memory without its own DRAM, any host memory contention directly bottlenecks inference throughput.
    The monitoring system should calculate the expected bottleneck and be configured to alert when host-to-device
    PCIe bandwidth drops below the 373.2 MB/s threshold required for 60 FPS.
  common_mistake: Candidates often forget that the Hailo-8 lacks local DRAM and must stream the full uncompressed
    input tensor from the host, mistakenly calculating bandwidth based on compressed video bitrates. They
    might also miscalculate the raw frame size by forgetting to multiply by the 3 color channels.
  napkin_math: '1. Frame size: 1920 * 1080 * 3 bytes = 6,220,800 bytes (~6.22 MB). 2. Required bandwidth:
    6.22 MB/frame * 60 FPS = 373.2 MB/s. 3. Achievable throughput: 300 MB/s / 6.22 MB/frame = 48.2 FPS.
    4. Frame drop rate: 60 FPS (target) - 48.2 FPS (actual) = 11.8 FPS.'
