title: Deterministic Latency with TensorRT on Orin
scenario: Your PyTorch model on Jetson Orin has P50 = 15ms but P99 = 45ms due to dynamic shapes and Python
  overhead. You convert to TensorRT with fixed input shapes. Calculate the expected P99 improvement given
  that TensorRT eliminates Python overhead (~5ms), dynamic memory allocation (~8ms spikes), and kernel
  launch overhead (~3ms variance).
details:
  realistic_solution: 'PyTorch sources of variance: Python GIL contention (~5ms), dynamic memory allocation
    for variable shapes (~8ms spikes), CUDA kernel launch overhead with many small kernels (~3ms variance),
    and operator fusion opportunities missed (~4ms). TensorRT eliminates all four: (1) No Python in the
    inference path — pure C++ runtime. (2) Pre-allocated workspace — no cudaMalloc during inference. (3)
    Kernel fusion reduces launches from ~200 to ~30. (4) Layer fusion (Conv+BN+ReLU into single kernel).
    Expected TensorRT: P50 = 8ms (kernel fusion saves 7ms), P99 = 10ms (variance sources eliminated).
    P99/P50 ratio drops from 3.0 to 1.25. On Orin at 275 TOPS INT8: throughput doubles.'
  common_mistake: Expecting TensorRT to only improve average latency. The bigger win is in tail latency
    — TensorRT's pre-compiled execution plan eliminates the sources of variance (dynamic allocation, JIT
    decisions, Python GIL contention), compressing the latency distribution.
  napkin_math: 'PyTorch: P50=15ms, P99=45ms. Variance sources: Python=5ms, malloc=8ms, launch=3ms, fusion=4ms.
    TensorRT removes: 5+8+3+4 = 20ms from worst case. P99: 45-20 = 25ms theoretical, but fusion also improves
    base → P50=8ms, P99=10ms. P99/P50: 3.0 → 1.25. Throughput: 1000/8 = 125 fps vs 1000/15 = 67 fps.'
