title: 'Impact of Dynamic Batching Delay on Latency and Throughput'
scenario: 'An edge device using Triton Inference Server on a Jetson AGX Orin dynamically batches incoming requests for a ResNet-50 model. The maximum batch size is set to 8.'
question: 'Explain how increasing the dynamic batching delay window impacts both the tail latency and overall GPU throughput.'
details:
  realistic_solution: 'The delay window pauses execution to allow more incoming requests to arrive, forming a larger batch. Increasing it improves GPU throughput by amortizing kernel launch overheads across more inputs, but directly adds to the tail latency of the earliest requests in the batch because they wait longer before processing begins.'
  common_mistake: |
    **The Pitfall:** Assuming increasing the delay window universally improves latency.
    **The Rationale:** Candidates think larger batches always mean faster processing per request.
    **The Consequence:** They fail to account for the direct increase in tail latency for the earliest requests waiting in the queue.
  napkin_math: |
    - Batch 1 kernel overhead: 1x.
    - Batch 8 kernel overhead: ~1x.
    - Per-inference overhead reduction: **~8x** compared to batch 1.
