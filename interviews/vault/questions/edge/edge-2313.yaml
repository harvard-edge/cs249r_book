title: Design micro-batching strategy to minimize edge pipeline parallelism bubbles
scenario: An edge appliance connects two Hailo-8 chips over a PCIe Gen2 x1 link (500
  MB/s). A model is split using pipeline parallelism, requiring a 10MB intermediate
  activation transfer between chips.
question: Design a micro-batching strategy to minimize pipeline bubbles, and calculate
  the transfer time for the first micro-batch if the activation is split into 5 chunks.
details:
  realistic_solution: Pipeline parallelism introduces a bubble while the second chip
    waits for the first activation transfer. By splitting the 10MB batch into 5 micro-batches
    of 2MB each, the first transfer takes 2MB / 500 MB/s = 4ms. The second chip can
    begin computing after only 4ms instead of waiting 20ms for the entire batch.
  common_mistake: Failing to divide the total activation size by the number of chunks,
    yielding incorrect startup timings.
  napkin_math: (10MB / 5 chunks) / 500 MB/s = 4ms per micro-batch
