title: Design micro-batching strategy to minimize edge pipeline parallelism bubbles
scenario: An edge appliance connects two Hailo-8 chips over a PCIe Gen2 x1 link. A model is split using pipeline parallelism, requiring a 10MB intermediate activation transfer between chips.
question: Design a micro-batching strategy to minimize pipeline bubbles, and calculate the transfer time for the first micro-batch if the activation is split into 5 chunks.
details:
  realistic_solution: Pipeline parallelism introduces a bubble while the second chip waits for the first activation transfer. By splitting the 10MB batch into 5 micro-batches of 2MB each, the first transfer takes 2MB / 500 MB/s = 4ms. The second chip can begin computing after only 4ms instead of waiting 20ms for the entire batch.
  common_mistake: |
    **The Pitfall:** Failing to divide the total activation size by the number of chunks.
    **The Rationale:** Candidates calculate the transfer time for the entire 10MB batch, ignoring the parallelization benefits of micro-batching.
    **The Consequence:** Incorrectly estimating a massive startup bubble, leading to flawed pipeline parallel scheduling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PCIe Link: 500 MB/s
       - 10MB activation split into 5 chunks
    2. **Calculations:**
       - Chunk size = 10MB / 5 chunks = 2MB per micro-batch
       - Transfer time = 2MB / 500 MB/s = 4ms
    3. **Conclusion & Interpretation:**
       - **Result: 4ms pipeline bubble.**
