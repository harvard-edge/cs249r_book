title: Diagnosing OOMs in Sparse Federated Learning
scenario: Top-k sparse gradient updates (k=1%) reduced a 50M parameter smartwatch model's BLE payload from 200MB to 4MB, but caused a 400% spike in Out-Of-Memory (OOM) crashes.
question: Why did reducing the network payload cause the edge devices to run out of memory?
details:
  realistic_solution: The OOM crash originates from the Error Feedback (EF) tensor state. To mathematically guarantee convergence when dropping 99% of gradients, the un-transmitted gradients cannot be discarded; they must be accumulated locally. This necessitates allocating a persistent, dense FP32 tensor identical in size to the original model, breaching the stringent smartwatch RAM capacity.
  common_mistake: |
    **The Pitfall:** Blaming the transient memory overhead of the argsort algorithm.
    **The Rationale:** Focusing on the active computation step while ignoring the persistent state required by advanced sparse optimization algorithms.
    **The Consequence:** Misdiagnosing the OOM root cause and rewriting sorting functions while the device continues to crash from the 200MB tensor allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M parameters.
    - Dense payload (FP32): 50M * 4 bytes = 200 MB.
    - Top-1% Payload: 0.5M * 4 bytes (vals) + 0.5M * 4 bytes (idx) = 4 MB.

    **Calculations:**
    - Error Feedback Memory Constraint: 50M parameters * 4 bytes = +200 MB.

    **Conclusion & Interpretation:**
    - **Result: +200 MB allocation (Memory-Capacity Bound)**. Saving 196MB of network bandwidth required a permanent 200MB local RAM allocation, causing the OOM.
