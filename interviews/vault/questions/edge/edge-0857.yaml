title: Diagnosing OOMs in Sparse Federated Learning
scenario: You are optimizing a federated learning pipeline for a 50M parameter predictive text model on smartwatches over Bluetooth Low Energy (BLE). The original dense update payload was 200MB (FP32), taking too long over BLE. You implement Top-k sparse gradient updates with k=1% and local error feedback to maintain convergence, successfully reducing the payload to 4MB (values + indices). The communication bottleneck is solved, but telemetry shows a 400% spike in Out-Of-Memory (OOM) application crashes on the watches precisely during the optimizer step.
question: Why did reducing the network payload cause the edge devices to run out of memory?
details:
  realistic_solution: The OOM is caused by the Error Feedback (EF) tensor. To maintain mathematical convergence when dropping 99% of the gradients, the unsent gradients cannot simply be discarded; they must be accumulated locally. This requires allocating an additional persistent, dense FP32 tensor of the exact same size as the model, completely blowing past the smartwatch's tight memory budget.
  common_mistake: |
    **The Pitfall:** Blaming the transient memory overhead of the sorting algorithm (e.g., argsort).
    **The Rationale:** Candidates incorrectly focus on the transient algorithm to find Top-k elements instead of recognizing the massive persistent state requirement introduced by sparse FL algorithms.
    **The Consequence:** Misdiagnosing the OOM root cause and failing to account for the necessary local accumulation tensor.
  napkin_math: |
    - **Model size:** 50M params.
    - **Dense payload:** 50M * 4 bytes = 200MB.
    - **Top-1% payload:** 0.5M * 4 bytes (vals) + 0.5M * 4 bytes (indices) = 4MB.
    - **Error Feedback memory constraint:** 50M * 4 bytes = **+200MB**.
    - **Result:** By saving 196MB of network bandwidth, the architecture introduced **200MB of continuous local RAM allocation**.
