title: Coral TPU Edge Drift Detection Architecture
scenario: You are designing a visual inspection system for a manufacturing line using the Google Coral
  Edge TPU (4 TOPS INT8, 2W). The models must be quantized to INT8 to run on the TPU. You need to architect
  a robust data drift detection system to identify when the camera feed distribution shifts due to lighting
  changes or sensor degradation, without exceeding the tight 2W power budget or relying on unsupported
  operators.
question: "How would you detect lighting or sensor drift on a Coral Edge TPU system without exceeding the 2W budget or unsupported operators?"
details:
  realistic_solution: The optimal design involves a hybrid approach. The Coral Edge TPU extracts low-dimensional
    INT8 embeddings or simply outputs softmax probabilities during normal inference. These lightweight
    features are periodically batched and sent to a central server or local edge gateway where more complex
    statistical tests (like PSI or KL divergence) are calculated on full precision hardware. Alternatively,
    if fully offline, implement a lightweight INT8-quantizable autoencoder or binary classifier (drift
    vs non-drift) trained specifically for the TPU.
  common_mistake: Candidates often propose running complex statistical drift detection models (like KS
    tests or calculating KL divergence on high-dimensional embeddings) directly on the edge device, ignoring
    the Coral TPU's limited operator support and INT8 quantization constraints. They may also forget that
    computing drift metrics heavily taxes the host CPU, violating power constraints.
  napkin_math: 'Assume the camera runs at 30 FPS. Each frame produces a 128-dim INT8 embedding vector
    (128 bytes). Data generated: 30 * 128 bytes = 3.84 KB/s. In an hour: 3.84 KB/s * 3600 s = ~13.8 MB/hr.
    Sending this 13.8 MB payload over a low-power connection to a gateway for drift analysis is highly
    efficient and leaves the Coral TPU strictly for its 4 TOPS INT8 inference workload within the 2W budget.'
