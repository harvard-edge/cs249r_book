title: Compute Efficiency and Power Limits on Jetson Orin
scenario: You are evaluating the inference pipeline of a computer vision model deployed on an NVIDIA Jetson
  Orin (32 GB LPDDR5, Ampere GPU + DLA accelerator, 60W TDP, 275 TOPS INT8 peak). The model requires exactly
  50 GOPS per frame. In production, the system processes exactly 1000 frames per second while drawing
  the maximum 60W continuous power. Based on the peak compute specs, you expected a much higher throughput.
  Explain why the system hits its 60W power limit well before reaching its compute limit, and calculate
  the realized compute utilization and the energy cost per inference.
details:
  realistic_solution: The theoretical maximum throughput of 5500 FPS is unreachable because the 275 TOPS
    INT8 rating assumes perfect data locality and 100% concurrent utilization of both the DLA and Ampere
    GPU. In a real deployment, fetching activations and weights from the 32 GB LPDDR5 memory draws substantial
    power. The system hits its 60W thermal and power limit primarily due to the energy cost of memory
    bandwidth and data movement, which forces the compute cores to throttle. The true cost of edge deployment
    must account for total system power rather than isolated compute capabilities.
  common_mistake: Candidates often assume that peak TOPS can be fully translated into throughput by simply
    dividing TOPS by GOPS, ignoring system-level power constraints. They fail to recognize that the 60W
    TDP must power the entire SoC, including the 32 GB LPDDR5 memory, and that data movement heavily dominates
    the power budget before peak compute can ever be reached.
  napkin_math: '1. Theoretical Maximum FPS: 275 TOPS = 275,000 GOPS. 275,000 GOPS / 50 GOPS per frame
    = 5,500 theoretical FPS.

    2. Realized Compute Utilization: At 1,000 FPS, the system sustains 1,000 * 50 = 50,000 GOPS (50 TOPS).
    50 TOPS / 275 TOPS = 18.18% compute utilization.

    3. Energy Cost Per Inference: 60 Watts (Joules/sec) / 1,000 frames/sec = 0.06 Joules per frame (or
    60 mJ/frame).'
