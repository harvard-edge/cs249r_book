title: Data Pruning for Hailo-8 Streaming Limits
scenario: You are deploying a custom object detection model on a Hailo-8 edge accelerator (26 TOPS INT8,
  2.5W, no local DRAM). To fit within host memory bandwidth limits and the strict 2.5W power budget, your
  team proposes using synthetic data generation and coreset selection to train a highly compact model.
  Evaluate how the streaming characteristics of the Hailo-8 dictate your data pruning strategy, and calculate
  the maximum allowable parameter count if the host PCIe connection limits streaming bandwidth to 4 GB/s
  at 30 FPS.
details:
  realistic_solution: An L5 candidate will evaluate the hardware-software co-design constraints. Because
    the Hailo-8 lacks local DRAM, the synthetic data and coreset selection must aggressively target edge-case
    diversity while pruning redundant backgrounds to allow training of a heavily bottlenecked, parameter-efficient
    architecture. They will design a curriculum that forces the model to learn complex representations
    with minimal weights, ensuring the host-to-accelerator streaming stays under the bandwidth limit.
  common_mistake: Candidates often focus solely on theoretical dataset size reduction without considering
    the deployment hardware. They might propose a data strategy that optimizes for standard GPU training,
    ignoring that the Hailo-8 relies entirely on streaming from host memory, making the final model's
    memory footprint the critical bottleneck.
  napkin_math: At 30 FPS, a 4 GB/s host-to-accelerator bandwidth limit allows 4000 MB / 30 = 133 MB per
    frame for weights and activations. Assuming INT8 quantization (1 byte per value) and peak activation
    maps of 60 MB, we have 133 - 60 = 73 MB available for weights. The data selection strategy must therefore
    yield a dataset rich enough to train a model strictly under 73 million parameters while fully utilizing
    the 26 TOPS compute budget at 2.5W.
