title: The Sensor Calibration Drift
scenario: Your autonomous vehicle's camera-LiDAR fusion system was calibrated in the factory. After 6
  months of operation (vibration, temperature cycles, minor impacts), the extrinsic calibration between
  the camera and LiDAR has drifted by 0.3°. Your 3D bounding boxes are now offset by ~5 cm at 10m range
  and ~52 cm at 100m range — well outside the safety envelope for long-range detection. The safety team
  wants recalibration every month, which requires taking the vehicle offline for 2 hours. Design an online
  calibration system that maintains accuracy without downtime.
details:
  realistic_solution: 'Design a **continuous online calibration** system that runs in the background during
    normal operation:'
  common_mistake: '"Run a calibration routine at startup." Startup calibration helps but doesn''t catch
    drift that occurs during operation (thermal expansion, vibration settling).'
  napkin_math: '0.3° rotation drift: offset = range × tan(0.3°). At 10m: 10 × 0.00524 = 0.052m (~5 cm).
    At 50m: 50 × 0.00524 = 0.26m. At 100m: 100 × 0.00524 = 0.52m. The small angular error becomes safety-critical
    at highway detection ranges. Online calibration accuracy: ±0.05° (reduces offset to 100m × tan(0.05°)
    = 0.087m < 0.1m at 100m). Compute cost: 50ms CPU every 33 seconds = 0.15% CPU utilization. Downtime
    saved: 2 hours/month × 12 months × $200/hour (vehicle opportunity cost) = $4,800/year per vehicle.'
