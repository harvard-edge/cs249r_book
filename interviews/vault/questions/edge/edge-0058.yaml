title: The Sensor Calibration Drift
scenario: Your autonomous vehicle's camera-LiDAR fusion system was calibrated in the
  factory. After 6 months of operation (vibration, temperature cycles, minor impacts),
  the extrinsic calibration between the camera and LiDAR has drifted by 0.3°. Your
  3D bounding boxes are now offset by ~5 cm at 10m range and ~52 cm at 100m range
  — well outside the safety envelope for long-range detection. The safety team wants
  recalibration every month, which requires taking the vehicle offline for 2 hours.
question: How would you design an online camera-LiDAR calibration system that maintains
  accuracy without monthly 2-hour downtime?
details:
  realistic_solution: Design a continuous online calibration system that runs in the
    background during normal operation, extracting natural targets (like lane lines
    or traffic signs) to continuously adjust the extrinsic matrix.
  common_mistake: '**The Pitfall:** Running a heavy calibration routine only at vehicle
    startup.

    **The Rationale:** Candidates assume that drift only happens over months, so one
    fix per day is sufficient.

    **The Consequence:** Startup calibration cannot capture thermal expansion or vibration
    settling that occurs during extended operation, leaving the system vulnerable
    mid-drive.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 0.3° rotation drift.

    - Offset formula: range * tan(0.3°).


    **Calculations:**

    - At 10m: 10 * 0.00524 = 0.052m (~5 cm). At 100m: 100 * 0.00524 = 0.52m (Safety
    critical).

    - Continuous online calibration accuracy achieves ±0.05°, reducing offset at 100m
    to 0.087m (< 0.1m threshold).


    **Conclusion & Interpretation:**

    - **Result: 0.15% CPU utilization (Compute-Bound)**. Compute cost is minimal while
    saving $4,800/year per vehicle in downtime opportunity costs.

    '
