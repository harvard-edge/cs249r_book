title: The Federated Fleet Cost Fallacy
scenario: 'An automaker is deciding how to retrain a perception model for its fleet of 10,000 autonomous vehicles. Their two options for a daily update are a centralized approach (uploading 50 GB raw data per car) and a Federated Learning approach (uploading a 50 MB FL update per car).'
question: 'For 10,000 vehicles, what is the daily bandwidth cost of uploading 50 GB raw data per car versus a 50 MB FL update at $0.02/GB?'
details:
  realistic_solution: 'Calculate the aggregate data volume for the entire fleet for each strategy and multiply by the unit bandwidth cost. Federated Learning pushes compute to the edge, replacing massive data backhaul with tiny gradient synchronizations.'
  common_mistake: |
    **The Pitfall:** Miscalculating units or failing to multiply by fleet size.
    **The Rationale:** Engineers often underestimate sheer scale, confusing MB with GB or only calculating the cost for a single vehicle.
    **The Consequence:** This leads to a massive underestimation of the operational expenses (OpEx) of a centralized approach.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 10,000 cars.
       - Centralized data: 50 GB/day per car.
       - Federated data: 50 MB (0.05 GB)/day per car.
       - Network cost: $0.02/GB.
    2. **Calculations:**
       - Centralized volume: 10,000 * 50 GB = 500,000 GB/day.
       - Centralized cost: 500,000 GB * $0.02/GB = $10,000/day.
       - Federated volume: 10,000 * 0.05 GB = 500 GB/day.
       - Federated cost: 500 GB * $0.02/GB = $10/day.
    3. **Conclusion & Interpretation:**
       - **FL reduces bandwidth needs by 1000x ($10,000 vs $10).** (Result: OpEx-Bound)
  options:
  - '$100,000 (Centralized) vs. $100 (Federated). A 1000x difference.'
  - '$10,000 (Centralized) vs. $10 (Federated). A 1000x difference.'
  - '$1,000,000 (Centralized) vs. $1,000 (Federated). A 1000x difference.'
  - '$10,000 (Centralized) vs. $1,000 (Federated). A 10x difference.'
  correct_index: 1
