title: The Federated Fleet Cost Fallacy
scenario: 'An automaker is deciding how to retrain a perception model for its fleet of 10,000 autonomous
  vehicles. Their two options for a daily update are a centralized approach (uploading 50 GB raw data per car) and a Federated Learning approach (uploading a 50 MB FL update per car).'
question: "For 10,000 vehicles, what is the daily bandwidth cost of uploading 50 GB raw data per car versus a 50 MB FL update at $0.02/GB?"
details:
  realistic_solution: The correct approach is to calculate the total data volume for the entire fleet
    for each strategy and then multiply by the cost per GB.
  common_mistake: Engineers often underestimate the sheer scale of data costs when moving from a single
    device to a fleet. They may miscalculate due to unit confusion (mixing up MB and GB) or only calculate
    the cost for a single vehicle, failing to multiply by the fleet size. This leads to a massive underestimation
    of the operational expenses (OpEx) of a centralized approach.
  napkin_math: 'Centralized: Cars upload 50 GB of raw data/day. 10,000 * 50 GB = 500,000 GB/day. At $0.02/GB,
    Cost = $10,000/day. Federated Learning: Cars upload a 50 MB gradient update. 10,000 * 0.05 GB = 500
    GB/day. At $0.02/GB, Cost = $10/day. FL reduces bandwidth needs by 1000x, changing a prohibitive $3.65
    million annual data bill into a highly manageable $3,650.'
  options:
  - $100,000 (Centralized) vs. $100 (Federated). A 1000x difference.
  - $10,000 (Centralized) vs. $10 (Federated). A 1000x difference.
  - $1,000,000 (Centralized) vs. $1,000 (Federated). A 1000x difference.
  - $10,000 (Centralized) vs. $1,000 (Federated). A 10x difference.
  correct_index: 1
