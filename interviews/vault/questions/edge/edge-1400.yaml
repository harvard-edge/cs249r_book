title: Thermal Sizing for Fanless Hailo-8 Edge Camera
scenario: 'You are designing a fanless industrial smart camera using a host SoC and a Hailo-8 accelerator for defect detection. The Hailo-8 provides 26 TOPS at 2.5W, but as a dataflow accelerator with no local DRAM, it continuously streams from the host''s LPDDR4. The sealed enclosure has a maximum passive dissipation limit of 8W at a 50°C ambient environment. The host SoC consumes 4W baseline, and memory streaming adds 0.5W per GB/s.'
question: Is the 13 TOPS, 4 GB/s Hailo-8 vision pipeline thermally feasible in the 8W fanless enclosure, and what changes are needed?
details:
  realistic_solution: 'The candidate should calculate the total system power by summing the host baseline, scaled Hailo-8 power, and memory bandwidth power. Upon realizing the total power dangerously approaches the enclosure''s limits, they should propose practical mitigations: heavily quantizing or pruning the model to reduce bandwidth, employing temporal duty-cycling (burst then sleep), or mechanically bonding the Hailo-8 to the external metal chassis to increase the dissipation envelope.'
  common_mistake: |
    **The Pitfall:** Only considering the Hailo-8 module's TDP and ignoring host streaming overhead.
    **The Rationale:** Candidates often focus solely on the accelerator's spec sheet when calculating power budgets.
    **The Consequence:** Designing a system that consistently overheats and thermally throttles in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Host Baseline: 4.0W.
    - Hailo-8 Power: (13 TOPS / 26 TOPS) * 2.5W TDP = 1.25W.
    - Memory Streaming Power: 4 GB/s * 0.5W/GB/s = 2.0W.

    **Calculations:**
    - Total System Power: 4.0W + 1.25W + 2.0W = 7.25W.

    **Conclusion & Interpretation:**
    - **Result: 7.25W (Thermal-Bound)**. With an 8W dissipation limit, the thermal margin is only 0.75W (<10%), making sustained 50°C operation risky.
