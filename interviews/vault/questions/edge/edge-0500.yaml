title: The Fleet Learning TCO Dilemma
scenario: 'You are the ML Systems Lead for a fleet of 100,000 vehicles. You need to improve a driver drowsiness model by learning from real-world driving data. Management is concerned about both privacy and cost. You are asked to diagnose the Total Cost of Ownership (TCO) for the first year of two proposals: Proposal A is a Centralized A/B Test Pipeline that uploads video clips for cloud training. Proposal B is a Federated Learning system that trains locally and uploads model updates.'
question: What is the first-year TCO of the centralized A/B pipeline versus Federated Learning, and when does FL become cheaper?
details:
  realistic_solution: 'The dominant factor in Year 1 TCO is the upfront engineering investment. A Federated Learning system requires building secure aggregation, differential privacy, and fault-tolerant client code. In Year 1, FL costs ~$936K vs ~$552K for centralized. However, FL''s costs are front-loaded: Year 2+ drops to ~$86K/yr because there is no recurring labeling cost. The centralized approach carries $300K+/yr in ongoing labeling and data costs. FL breaks even around month 27 and is the clear winner for any multi-year deployment.'
  common_mistake: |
    **The Pitfall:** Focusing solely on data transmission costs and ignoring engineering CapEx.
    **The Rationale:** Engineers assume that sending model updates from 100,000 cars must be the highest cost, failing to account for the massive one-time engineering investment required to build a secure FL system from scratch.
    **The Consequence:** Incorrectly rejecting FL because of Year 1 costs, missing out on massive long-term operational savings from eliminating data labeling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Proposal A (Centralized): Cloud compute, data labeling, cellular costs, base CapEx.
       - Proposal B (Federated): High engineering CapEx, cellular, security audit.
    2. **Calculations:**
       - Prop A Year 1: Cellular ($6K) + Compute ($96K) + Labeling ($300K) + CapEx ($150K) = $552,000.
       - Prop B Year 1: CapEx ($750K) + Infra ($60K) + Cellular ($26K) + Audit ($100K) = $936,000.
       - Prop A Year 2+: ~$400K/yr (recurring labeling/infra).
       - Prop B Year 2+: ~$86K/yr.
    3. **Conclusion & Interpretation:**
       - **Result: FL is Cheaper Long-Term**. FL is more expensive in Year 1 due to heavy engineering CapEx, but its Year 2+ cost is drastically lower, breaking even around month 27.
  options:
  - The A/B Telemetry approach is more expensive because daily data uploads from 10,000 cars create a higher server load and data ingress cost than weekly uploads from the FL fleet.
  - The Federated Learning approach is more expensive, primarily because the total data volume from sending 5MB model updates across 100,000 cars significantly exceeds the telemetry data volume.
  - The Federated Learning approach has a much higher TCO in Year 1, driven predominantly by the large, one-time engineering investment required to build the secure aggregation infrastructure.
  - The on-device compute for federated training on each car's ECU consumes significant power, making the fleet-wide energy cost the largest component of TCO for the FL approach.
