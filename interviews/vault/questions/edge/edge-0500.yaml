title: The Fleet Learning TCO Dilemma
scenario: 'You are the ML Systems Lead for a fleet of 100,000 vehicles. You need to improve a driver drowsiness model by learning from real-world driving data. Management is concerned about both privacy and cost. You are asked to diagnose the Total Cost of Ownership (TCO) for the first year of two proposals: Proposal A is a Centralized A/B Test Pipeline that uploads video clips for cloud training. Proposal B is a Federated Learning system that trains locally and uploads model updates.'
question: "What is the first-year TCO of the centralized A/B pipeline versus Federated Learning, and when does FL become cheaper?"
details:
  realistic_solution: 'The correct analysis shows that the dominant factor in Year 1 TCO is the upfront engineering investment. A Federated Learning system requires building secure aggregation, differential privacy, device selection, and fault-tolerant client code — roughly 5 engineer-months more than a standard telemetry pipeline. In Year 1, FL costs ~$936K vs ~$552K for centralized. However, FL''s costs are front-loaded: Year 2+ drops to ~$86K/yr because there is no recurring labeling cost. The centralized approach carries $300K+/yr in ongoing labeling and data costs. FL breaks even around month 27 and is the clear winner for any multi-year deployment.'
  common_mistake: Engineers often focus solely on the data transmission costs per device, assuming that sending large model updates must be the highest cost. They fail to account for the massive, one-time capital expenditure in engineering hours required to build a secure, robust, and scalable Federated Learning system from scratch, which is far more complex than a standard telemetry pipeline.
  napkin_math: '**Proposal A: Centralized A/B Test Pipeline** | Data collection: 10,000 vehicles x 500 MB video/month = 5 TB/month. Cellular upload at $0.10/GB: 5,000 GB x $0.10 = $500/month. Cloud compute (training + storage): $8,000/month. Data labeling: 10,000 vehicles x 10 clips x $3/clip = $300,000 (one-time). Engineering (3 engineers x 2 months): $150,000. **Year 1 total:** ($500 x 12) + ($8,000 x 12) + $300,000 + $150,000 = **$552,000.** | **Proposal B: Federated Learning** | FL platform engineering (5 engineers x 6 months): $750,000. FL server infra: $5,000/month x 12 = $60,000. Model updates: 100,000 vehicles x 50 MB x 52 weeks = 260,000 GB. Cellular at $0.10/GB: $26,000. Security audit + privacy review: $100,000. **Year 1 total:** $750,000 + $60,000 + $26,000 + $100,000 = **$936,000.** | **Verdict:** FL is 70% more expensive in Year 1 due to engineering CapEx. However, Year 2+ FL cost drops to ~$86,000/yr (no engineering), while centralized stays at ~$400K+/yr with ongoing labeling. FL breaks even in ~27 months.'
  options:
  - The A/B Telemetry approach is more expensive because daily data uploads from 10,000 cars create a higher server load and data ingress cost than weekly uploads from the FL fleet.
  - The Federated Learning approach is more expensive, primarily because the total data volume from sending 5MB model updates across 100,000 cars significantly exceeds the telemetry data volume.
  - The Federated Learning approach has a much higher TCO in Year 1, driven predominantly by the large, one-time engineering investment required to build the secure aggregation infrastructure.
  - The on-device compute for federated training on each car's ECU consumes significant power, making the fleet-wide energy cost the largest component of TCO for the FL approach.
