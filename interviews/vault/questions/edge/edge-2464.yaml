title: Queue Length for Deterministic Edge Cameras
scenario: An Orin-based security camera processes frames. Frames arrive deterministically
  at 30 FPS (33ms interval). Processing takes 30ms exactly.
question: Evaluate whether a processing queue is necessary for this system under steady-state
  conditions.
details:
  realistic_solution: With strictly deterministic arrivals (33ms) and deterministic
    service time (30ms), utilization is ~90% and there is zero variance. By M/D/1
    or D/D/1 theory, the queue length will not grow. No deep buffer is needed; a 1-frame
    swap buffer suffices.
  common_mistake: Applying probabilistic queuing theory (M/M/1) to a completely deterministic
    hardware system.
  napkin_math: 30 / 33.3 = 0.9 utilization
