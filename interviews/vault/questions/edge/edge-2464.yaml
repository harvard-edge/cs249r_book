title: Queue Length for Deterministic Edge Cameras
scenario: An edge security camera processes frames. Frames arrive deterministically at 30 FPS (33.3ms interval). Processing takes 30ms exactly.
question: Evaluate whether a processing queue is necessary for this system under steady-state conditions.
details:
  realistic_solution: 'With strictly deterministic arrivals (33ms) and deterministic service time (30ms), utilization is ~90% and there is zero variance. By M/D/1 or D/D/1 theory, the queue length will not grow. No deep buffer is needed; a simple 1-frame swap buffer is perfectly sufficient.'
  common_mistake: |
    **The Pitfall:** Applying probabilistic queueing theory (e.g., M/M/1) to a completely deterministic hardware system.
    **The Rationale:** Defaulting to cloud-centric M/M/1 queueing formulas which assume exponential variance in arrival and service times.
    **The Consequence:** Over-engineering the system by allocating deep memory buffers that are physically unnecessary for rigid deterministic workloads, wasting precious SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate: 30 FPS = 33.3 ms strictly deterministic interval.
       - Service Time: 30 ms strictly deterministic.
       - Variance: 0.
    2. **Calculations:**
       - Utilization: 30 ms / 33.3 ms = 0.90 (90%).
       - Queue Growth under D/D/1: Zero.
    3. **Conclusion & Interpretation:**
       - **Result: Deterministic Queue Limit**. With zero variance, the queue mathematically cannot grow, rendering any buffer deeper than 1 frame superfluous.
