title: Queue Length for Deterministic Edge Cameras
scenario: An Orin-based security camera processes frames. Frames arrive deterministically at 30 FPS (33.3ms interval). Processing takes 30ms exactly.
question: Evaluate whether a processing queue is necessary for this system under steady-state conditions.
details:
  realistic_solution: With strictly deterministic arrivals (33ms) and deterministic service time (30ms), utilization is ~90% and there is zero variance. By M/D/1 or D/D/1 theory, the queue length will not grow. No deep buffer is needed; a 1-frame swap buffer suffices.
  common_mistake: |
    **The Pitfall:** Applying probabilistic queuing theory (e.g., M/M/1) to a completely deterministic hardware system.
    **The Rationale:** Engineers default to M/M/1 queueing formulas which assume exponential arrival and service times.
    **The Consequence:** Over-engineering the system by allocating deep buffers that are unnecessary for deterministic workloads.
  napkin_math: |
    * **Arrival Rate**: 30 FPS = 1 frame every 33.3 ms.
    * **Service Time**: 30 ms per frame.
    * **Utilization**: 30 / 33.3 = 0.90 (90%).
    * **Variance**: 0 variance in arrival and service.
    * **Queue Growth**: Under M/D/1 or D/D/1 theory with 0 variance, the queue length will not grow.
    * **Buffer Requirement**: **1-frame swap buffer**
