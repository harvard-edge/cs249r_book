title: 'Real-time Anomaly Detection on Jetson Orin: Multi-model RAG Pipeline Optimization'
scenario: Your team is tasked with deploying a real-time anomaly detection system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W power budget) for industrial machinery. The system uses a Compound AI architecture: a small Vision Transformer for feature extraction, and a local Large Language Model (LLM) RAG system. The goal is sub-100ms end-to-end latency. You need to evaluate two architectures: Architecture A (Monolithic, in-memory tensor transfers) and Architecture B (Microservices, gRPC over shared memory).
question: Which architecture, monolithic or microservices, is better for sub-100 ms on Jetson Orin, and what are the latency, memory, and power trade-offs?
details:
  realistic_solution: The realistic solution involves a detailed profiling approach. For Architecture A, optimize data transfer by ensuring zero-copy operations and efficient tensor formats. For Architecture B, focus on minimizing gRPC serialization overhead, potentially using custom proto definitions or shared memory mechanisms like NVIDIA's CUDA IPC for direct tensor access between processes where applicable. Utilizing TensorRT for both models to maximize INT8 performance and reduce memory footprint is crucial. A hybrid approach where the smaller pre-processing model might be folded into the LLM inference graph using techniques like model fusion could also be explored if models are compatible. Ultimately, rigorous measurement of each pipeline stage's latency (inference, data transfer, orchestration) under realistic loads on the Orin is essential, along with power consumption monitoring, to make an informed decision.
  common_mistake: |
    **The Pitfall:** Focusing solely on model inference times and ignoring IPC overhead.
    **The Rationale:** Candidates often calculate raw FLOPS/TOPS and assume the system will meet latency, failing to account for data serialization/deserialization, memory copies, and context switching in microservice architectures.
    **The Consequence:** Deploying a microservices architecture that constantly misses the 100ms deadline due to the hidden costs of gRPC and orchestration on an embedded device.
  napkin_math: |
    * **Memory:** LLM (INT8) ~7GB + ViT ~0.5GB = 7.5GB (Easily fits in 32GB LPDDR5)
    * **Architecture A (Monolithic) Latency:** ViT (10ms) + In-memory Transfer (5ms) + LLM (50ms) + Orchestration (2ms) = **~67ms**
    * **Architecture B (Microservices) Latency:** ViT (10ms) + gRPC Transfer (15ms) + LLM (50ms) + Orchestration (10ms) = **~85ms**
    * **Conclusion:** Both can potentially meet sub-100ms, but **Architecture A (Monolithic)** is safer and more power-efficient due to eliminating IPC/serialization overhead.
