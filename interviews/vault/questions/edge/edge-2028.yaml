title: 'Real-time Anomaly Detection on Jetson Orin: Multi-model RAG Pipeline Optimization'
scenario: 'Your team is tasked with deploying a real-time anomaly detection system for industrial machinery. The system uses a Compound AI architecture: a small Vision Transformer for feature extraction, and a local Large Language Model (LLM) RAG system. The goal is sub-100ms end-to-end latency. You need to evaluate two architectures: Architecture A (Monolithic, in-memory tensor transfers) and Architecture B (Microservices, gRPC over shared memory).'
question: Which architecture, monolithic or microservices, is better for sub-100 ms on Jetson Orin, and what are the latency, memory, and power trade-offs?
details:
  realistic_solution: The optimal solution involves a detailed nsys profiling approach. For Architecture A, optimize data transfer by ensuring zero-copy operations and efficient tensor formats. For Architecture B, focus on minimizing gRPC serialization overhead using custom proto definitions or CUDA IPC for direct tensor access. Utilizing INT8 PTQ for both models maximizes performance. A monolithic approach safely avoids serialization latency limits.
  common_mistake: |
    **The Pitfall:** Focusing solely on model inference times and ignoring IPC overhead.
    **The Rationale:** Candidates calculate raw FLOPS/TOPS and assume the system will meet latency, failing to account for serialization, memory copies, and context switching.
    **The Consequence:** Deploying a microservices architecture that constantly misses the 100ms deadline due to the hidden orchestration costs on an embedded device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 32 GB memory limit, target latency <100ms.
       - Architecture A Latency: ViT (10ms), Transfer (5ms), LLM (50ms), Orchestration (2ms).
       - Architecture B Latency: ViT (10ms), gRPC (15ms), LLM (50ms), Orchestration (10ms).
    2. **Calculations:**
       - LLM (INT8) ~7GB + ViT ~0.5GB = 7.5GB total footprint (fits 32GB safely).
       - Architecture A: 10 + 5 + 50 + 2 = 67ms total latency.
       - Architecture B: 10 + 15 + 50 + 10 = 85ms total latency.
    3. **Conclusion & Interpretation:**
       - **Result: Architecture A is Optimal**. Both can potentially meet sub-100ms, but Architecture A (Monolithic) provides a larger safety margin and is more power-efficient by eliminating IPC overhead.
