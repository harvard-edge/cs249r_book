title: Graceful Degradation on Jetson Orin for Autonomous Vehicles
scenario: A perception system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous
  vehicle uses a high-fidelity semantic segmentation model (primary) and a simpler object detection model
  (fallback). During peak inference load or sensor degradation, the primary model occasionally misses
  its real-time latency target of 50ms. As an ML engineer, design a graceful degradation strategy that
  leverages degradation ladders and QoS shedding. Explain how to transition between models and ensure
  fail-safe operation given the hardware constraints.
question: "How would you design graceful degradation for a Jetson Orin perception system that misses its 50 ms deadline under load or sensor degradation?"
details:
  realistic_solution: 'Implement a degradation ladder with multiple stages. Stage 1: Dynamic adjustment
    of primary model parameters (e.g., reduce input resolution, lower confidence thresholds, or use a
    smaller backbone if available) when latency approaches 40ms. Stage 2: If Stage 1 is insufficient or
    latency exceeds 50ms for two consecutive frames, gracefully switch to the simpler, pre-loaded object
    detection fallback model. This could involve QoS shedding by reducing the inference frequency of non-critical
    perception tasks. Ensure a fail-safe state by having a ''guardian'' process on the Orin monitor overall
    system health and enforce the fallback, even if the primary ML pipeline becomes unresponsive, possibly
    by triggering a hard reset or activating a minimal operational mode. This requires careful memory
    management to ensure both models (or their components) fit within the 32GB LPDDR5 during transitions.'
  common_mistake: A common mistake is implementing a hard switch-over to a fallback model only after the
    primary model has completely failed or consistently missed deadlines, leading to abrupt performance
    drops or safety hazards. Another is neglecting the resource overhead (memory, compute) of maintaining
    both models or the transition logic on the constrained Jetson Orin.
  napkin_math: If the primary model uses 20GB LPDDR5 and the fallback uses 5GB LPDDR5, during a transition,
    both might momentarily reside in memory requiring ~25GB, which is feasible on the 32GB Jetson Orin.
    If the primary model processes 10 FPS (100ms/frame) and the target is 50ms/frame, a degradation strategy
    might aim to reduce its processing time by tuning parameters to achieve 50ms. If the fallback model
    runs at 20 FPS (50ms/frame) and consumes 50 TOPS, it leaves ~225 TOPS available for other critical
    tasks, ensuring the 60W power budget is respected while maintaining essential functionality.
