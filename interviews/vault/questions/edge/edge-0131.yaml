title: The Edge Robot's Memory Tax
scenario: You're deploying a new object detection model to an autonomous delivery robot equipped with a Jetson AGX Orin with 32 GB of LPDDR5 DRAM. The robot's OS and safety-critical navigation stack reserve 6 GB of DRAM at all times. The new model has 5 billion parameters and will run in FP16. Its peak activation memory is 4 GB.
question: "After the 6 GB system reservation, will the 5B-parameter FP16 model plus 4 GB of activations fit in DRAM?"
details:
  realistic_solution: 'First, calculate the available memory for the application. Then, calculate the model''s total memory requirement (weights + activations). Finally, compare the two to see if it fits.'
  common_mistake: |
    **The Pitfall:** Comparing the model size against the total advertised system DRAM (32 GB).
    **The Rationale:** Engineers often forget that the advertised DRAM of a device is not fully available to their application due to the OS and safety-critical reservations.
    **The Consequence:** This leads to unexpected out-of-memory errors at runtime when the system processes hit their memory ceilings.
  napkin_math: |
    1. Total DRAM: 32 GB.
    2. System Reserved: 6 GB. Available DRAM = 32 GB - 6 GB = 26 GB.
    3. Model Weights: 5 Billion params * 2 bytes/param (FP16) = 10 GB.
    4. Total Model Memory = 10 GB (Weights) + 4 GB (Activations) = 14 GB.
    5. **14 GB is less than the 26 GB available, so it will fit comfortably.**
  options:
  - No, the model's 5B parameters require 20 GB in FP16, which is too large for the 26 GB available after activations.
  - No, it won't fit because the 14 GB model requirement exceeds the total system DRAM.
  - Yes, it requires 14 GB (10 GB for FP16 weights + 4 GB for activations), which is less than the 26 GB of available DRAM.
  - Yes, it fits because the model's 10 GB of weights is less than the total 32 GB of DRAM.
  correct_index: 2
