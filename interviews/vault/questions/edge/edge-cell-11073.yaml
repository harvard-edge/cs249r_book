title: 'Fault Tolerance: Specification — Define Reliability SLA for Safety-Critical Edge Vision'
scenario: Write the reliability specification for a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) deployed
  as the primary safety sensor in a collaborative robot cell. The system must meet IEC 62061 SIL-2 requirements.
  Define quantitative reliability metrics, checkpoint requirements, failure detection, and manual override
  specifications.
question: "What reliability specification would you write for the Jetson Orin safety sensor to meet IEC 62061 SIL-2, including metrics, checkpoints, detection, and override?"
details:
  realistic_solution: 'SIL-2 requires PFH (Probability of Failure per Hour) < 1×10⁻⁷/hour. This is a safety
    integrity requirement, not just uptime. Fail-safe: on any uncertainty, default to safe state (stop
    robot). Checkpoints: preserve safety-critical calibration parameters.'
  common_mistake: Confusing availability (uptime) with functional safety (safe failure modes); not specifying
    fail-safe behavior.
  napkin_math: 'SIL-2 PFH target: < 1×10⁻⁷/hour. Jetson Orin hardware PFH: HW MTBF = 50K hours → PFH_hw
    = 1/50,000 = 2×10⁻⁵/hr — exceeds SIL-2 requirement by 200×! Solution: require redundant pair of Jetson
    Orins with voting. PFH_redundant = PFH_hw² × (repair_rate) = (2×10⁻⁵)² × (1/8hr repair) = 5×10⁻¹¹/hr
    — meets SIL-2. Software PFH: tested, certified firmware required. Detection: < 100ms fault detection
    (6 frames at 60fps). Checkpoint SLA: safety calibration (camera extrinsics, LiDAR-camera calibration)
    stored in write-protected flash, backed up on redundant device. RPO: 0 (calibration never changes,
    no checkpoint needed; only online learning LoRA needs checkpoint with 1-hour RPO). Manual override:
    hardware E-stop that bypasses ML system entirely.'
