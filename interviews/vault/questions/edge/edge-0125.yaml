title: The Structured Sparsity Speedup
scenario: You're optimizing a dense ResNet-50 computer vision model for a self-driving car's perception system. Your team applies 2:4 structured pruning, which removes 50% of the weights in the convolutional and linear layers in a hardware-friendly pattern. The model is entirely compute-bound.
question: What theoretical speedup should 2:4 structured pruning deliver for this compute-bound model in TensorRT?
details:
  realistic_solution: 'With 2:4 structured pruning, 50% of the weights are zeroed out in a regular pattern that Sparse Tensor Cores can recognize. Since the scenario states the model is compute-bound, TensorRT can leverage these cores to effectively skip the computations involving these zeroed weights. This halves the required MACs and leads directly to a 2x speedup.'
  common_mistake: |
    **The Pitfall:** Confusing unstructured and structured sparsity.
    **The Rationale:** Engineers often assume unstructured sparsity offers inference speedups, but irregular compute patterns don't map well to standard hardware.
    **The Consequence:** Failure to leverage specialized hardware like Sparse Tensor Cores, missing out on potential 2x speedups.
  napkin_math: |
    - **Operation Reduction:** 2:4 structured pruning zeros out 2 out of every 4 weights in a continuous block, eliminating 50% of the MAC operations.
    - **Hardware Acceleration:** Sparse Tensor Cores skip zero-values at the hardware level.
    - **Theoretical Speedup:** Halving the compute time directly doubles the throughput, yielding a **2x theoretical speedup**.
  options:
  - No speedup, it only saves memory.
  - 1.5x speedup, due to framework overheads.
  - 2x speedup.
  - 4x speedup.
  correct_index: 2
