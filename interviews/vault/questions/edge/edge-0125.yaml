title: The Structured Sparsity Speedup
scenario: You're optimizing a dense ResNet-50 computer vision model for a self-driving car's perception
  system, running on a Jetson AGX Orin. Your team applies 2:4 structured pruning, which removes 50% of
  the weights in the convolutional and linear layers in a hardware-friendly pattern. Assuming the model
  is entirely compute-bound, explain the theoretical performance speedup you'd expect from this optimization
  when using NVIDIA's TensorRT.
details:
  realistic_solution: With 2:4 structured pruning, 50% of the weights are zeroed out in a regular pattern
    that Sparse Tensor Cores can recognize. Since the scenario states the model is compute-bound, TensorRT
    can leverage these cores to effectively skip the computations involving these zeroed weights. This
    halves the number of required multiply-accumulate operations (FLOPs) for the pruned layers. Halving
    the computational work directly leads to a theoretical 2× speedup.
  common_mistake: Engineers often confuse unstructured and structured sparsity. Unstructured sparsity
    (randomly removing individual weights) offers high compression but rarely any inference speedup on
    standard GPU hardware because the compute patterns are irregular and don't map to efficient hardware
    execution. Structured sparsity, like the 2:4 pattern, creates fine-grained patterns that specialized
    hardware, like the Sparse Tensor Cores in NVIDIA's Ampere architecture (which the Jetson AGX Orin
    uses), can accelerate.
  napkin_math: 2:4 structured pruning zeros out 2 out of every 4 weights in a continuous block. Jetson
    AGX Orin features Sparse Tensor Cores that skip these zero-values at the hardware level. For a strictly
    compute-bound dense layer, eliminating 50% of the MAC (Multiply-Accumulate) operations effectively
    halves the compute time, doubling the theoretical throughput.
  options:
  - No speedup, it only saves memory.
  - 1.5× speedup, due to framework overheads.
  - 2× speedup.
  - 4× speedup.
  correct_index: 2
