title: 'Receptive Field vs Model Size Trade-off for Edge Deployment'
scenario: 'An edge device with 2MB model budget needs to classify 128x128 images. Option A: 8 layers of 3x3 convs (RF=17, 1.8M params). Option B: 4 layers of 7x7 convs (RF=25, 3.2M params, exceeds budget). Option C: 5 layers of 3x3 convs + 2 dilated convs (dilation=2, RF=19, 1.5M params).'
question: 'Which achieves the best RF within budget?'
details:
  realistic_solution: 'Option A: RF=17 covers 13% of the 128px input. Within budget (1.8M params ≈ 1.8M * 2B = 3.6MB in FP16, but with INT8 quantization = 1.8MB). Marginal RF coverage for full-image classification. Option B: RF=25 (19.5% coverage) is better but 3.2M params = 3.2MB in INT8, exceeding 2MB budget. Eliminated. Option C: Dilated convolutions expand RF without adding parameters or reducing spatial resolution. Dilation=2 on a 3x3 kernel gives effective 5x5 RF per layer without 5x5 parameter cost. RF=19 with only 1.5M params = 1.5MB in INT8. Well within budget with better RF than Option A. Option C is the clear winner: it achieves a larger RF than Option A with ~17% fewer parameters by using dilated convolutions. The key insight is that dilated convolutions are ''free RF expansion'' — same parameter cost as regular convolutions but with multiplicatively larger receptive fields.'
  common_mistake: |
    **The Pitfall:** Using larger kernels to increase receptive field (RF) instead of dilated convolutions.
    **The Rationale:** Candidates often overlook dilated convolutions as a parameter-free way to expand RF.
    **The Consequence:** The model exceeds the strict parameter/memory budget required for edge deployment.
  napkin_math: |
    - Option A: RF=17, params=1.8M -> **1.8MB INT8**.
    - Option B: RF=25, params=3.2M -> **3.2MB INT8** (Over 2MB budget).
    - Option C: RF=19, params=1.5M -> **1.5MB INT8**.
    - Conclusion: **Option C wins** by providing better RF than A while remaining under budget.
