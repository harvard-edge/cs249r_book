title: Encoder-Decoder Sizing on Qualcomm AI 100
scenario: 'You are deploying an on-premise translation service on a cluster of Qualcomm Cloud AI 100 accelerators. The system needs to maximize throughput while adhering to strict power and memory limits. You must decide whether to deploy a 7B parameter decoder-only model or a 3B parameter encoder-decoder model.'
question: 'Which translation model would you deploy on Cloud AI 100, the 7B decoder-only or 3B encoder-decoder, and how would you batch it?'
details:
  realistic_solution: 'A 3B parameter encoder-decoder model is the optimal choice for maximizing throughput. The encoder processes the entire source sequence in a single, compute-dense forward pass that efficiently saturates the INT8 engine. The smaller model size and optimized cross-attention mechanism leave significantly more memory available for larger batch sizes, which amortizes memory bandwidth costs during decoding and maximizes performance per watt.'
  common_mistake: |
    **The Pitfall:** Assuming decoder-only models are universally superior.
    **The Rationale:** The dominance of decoder-only LLMs (like GPT/Llama) biases candidates towards selecting them for all generative tasks.
    **The Consequence:** The decoder-only model suffers from KV-cache memory bandwidth bottlenecks during generation, leaving the compute engine severely underutilized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Qualcomm Cloud AI 100.
       - Memory Limit: 32 GB.
       - 7B Decoder-only (INT8): 7 GB weights.
       - 3B Encoder-Decoder (INT8): 3 GB weights.
       - KV cache per token: 256 KB.
       - Sequence length: 1024 tokens.
    2. **Calculations:**
       - 7B KV cache per request: 1024 tokens * 256 KB = 256 MB.
       - 7B Available memory: 32 GB - 7 GB = 25 GB.
       - 7B Max batch size: 25 GB / 256 MB ≈ 97.
       - 3B Available memory: 32 GB - 3 GB = 29 GB.
       - 3B Max batch size: 29 GB / (smaller auto-regressive cache) > 400.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Saturation**. The 3B encoder-decoder fully saturates the INT8 compute under the power limit due to its ability to support much larger batch sizes.
