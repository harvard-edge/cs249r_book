title: Encoder-Decoder Sizing on Qualcomm AI 100
scenario: 'You are deploying an on-premise translation service on a cluster of Qualcomm Cloud AI 100 accelerators. The system needs to maximize throughput while adhering to the 75W power envelope and 32 GB LPDDR4x memory limit per card. You must decide whether to deploy a 7B parameter decoder-only model or a 3B parameter encoder-decoder model.'
question: 'Which translation model would you deploy on Cloud AI 100, the 7B decoder-only or 3B encoder-decoder, and how would you batch it?'
details:
  realistic_solution: 'A 3B parameter encoder-decoder model is the optimal choice for maximizing throughput on this hardware. The encoder processes the entire source sequence in a single, compute-dense forward pass that efficiently saturates the 400 TOPS INT8 engine. The smaller model size and more efficient cross-attention mechanism leave significantly more of the 32 GB memory available for larger batch sizes, which amortizes memory bandwidth costs during decoding and maximizes performance per watt.'
  common_mistake: |
    **The Pitfall:** Assuming decoder-only models are universally superior.
    **The Rationale:** The dominance of decoder-only LLMs (like GPT/Llama) biases candidates towards selecting them for all generative tasks.
    **The Consequence:** The decoder-only model suffers from KV-cache memory bandwidth bottlenecks during generation, leaving the 400 TOPS compute engine severely underutilized.
  napkin_math: |
    * 7B Decoder-only (INT8): Weights take 7 GB. Remaining memory is 25 GB.
    * KV cache per token (32 layers, 4096 dim) = 2 * 32 * 4096 * 1 byte = 256 KB.
    * For 1024 tokens, KV cache is 256 MB per request.
    * Max batch size for 7B is limited to ~97 (25 GB / 256 MB), starving the compute engine.
    * 3B Encoder-Decoder (INT8): Weights take 3 GB. Remaining memory is 29 GB.
    * Smaller auto-regressive cache permits batch sizes of 400+.
    * **The 3B encoder-decoder fully saturates the 400 TOPS INT8 compute under the 75W limit.**
