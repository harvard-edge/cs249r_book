title: 'The INT8 Memory Diet: Quantization Fundamentals'
scenario: You're an engineer on an autonomous vehicle team, tasked with deploying a new perception model with 200 million parameters onto the car's compute unit. The model weights are currently stored in FP16 format. To reduce the memory footprint and improve cache efficiency, you plan to quantize the model to INT8.
question: What is the final INT8 weight-memory footprint for a 200 million-parameter model quantized from FP16?
details:
  realistic_solution: The solution requires knowing the byte size for each numerical precision. FP16 (half-precision floating-point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte, per parameter. Therefore, quantizing from FP16 to INT8 halves the model's memory footprint.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes, or misremembering the size of each data type.
    **The Rationale:** Engineers might divide the parameter count by 8 (assuming 1 bit per parameter instead of 1 byte), or calculate the savings from an incorrect baseline like FP32 (4 bytes).
    **The Consequence:** Incorrect memory footprint estimation, leading to flawed hardware provisioning or out-of-memory errors on edge devices.
  napkin_math: |
    *   **Parameters:** 200,000,000
    *   **INT8 memory per parameter:** 1 byte
    *   **Calculation:** 200,000,000 parameters * 1 byte/parameter = 200,000,000 bytes
    *   **Final size:** **200 MB**.
  options:
  - 400 MB
  - 25 MB
  - 200 MB
  - 100 MB
  correct_index: 2
