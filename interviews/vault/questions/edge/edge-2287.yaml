title: Jetson Shared Memory
scenario: A team is evaluating the Jetson AGX Orin unified memory architecture, which features 204.8 GB/s shared LPDDR5.
question: What is the bandwidth difference and physical separation between the CPU and GPU when accessing the shared memory?
visual:
  kind: svg
  path: edge-2287.svg
  alt: Bar chart comparing zero PCIe overhead to the shared memory bandwidth.
  caption: Unified Memory Architecture Bandwidth
details:
  realistic_solution: The candidate should explain that unlike discrete GPUs with
    dedicated VRAM over PCIe, the Jetson uses a unified memory architecture where
    CPU and GPU share the same physical LPDDR5 RAM, eliminating PCIe transfer overhead.
  common_mistake: |
    **The Pitfall:** Assuming a PCIe bottleneck or separate VRAM pool exists.
    **The Rationale:** Engineers accustomed to desktop architectures assume data must be copied over a slow bus.
    **The Consequence:** Wasting engineering effort writing complex data copy and synchronization code that is unnecessary on a unified architecture.
  napkin_math: |
    1. **Total Memory Bandwidth**: 204.8 GB/s LPDDR5.
    2. **PCIe Overhead**: CPU and GPU share the same physical RAM.
    3. **Result**: **0 MB/s PCIe transfer needed**, eliminating host-to-device copy latency.
