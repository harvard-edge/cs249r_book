title: Jetson Shared Memory
scenario: Understanding the shared memory architecture of the Jetson AGX Orin between
  its CPU and GPU cores.
question: Describe the bandwidth difference and physical separation between the CPU
  and GPU when accessing the shared 204.8 GB/s LPDDR5 system memory.
visual:
  kind: svg
  path: edge-2287.svg
  alt: Bar chart comparing zero PCIe overhead to the shared memory bandwidth.
  caption: Unified Memory Architecture Bandwidth
details:
  realistic_solution: The candidate should explain that unlike discrete GPUs with
    dedicated VRAM over PCIe, the Jetson uses a unified memory architecture where
    CPU and GPU share the same physical LPDDR5 RAM, eliminating PCIe transfer overhead.
  common_mistake: Assuming there is a PCIe bottleneck or separate VRAM pool like on
    desktop architectures.
  napkin_math: 204.8 GB/s is shared fully = 0 MB/s PCIe transfer needed
