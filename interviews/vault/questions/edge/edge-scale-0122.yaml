title: Edge Encoder Decoder Serving Spec
scenario: You are deploying an encoder-decoder speech model on an edge gateway. The product team gives only average utterance length, but the SLA is based on time to first partial transcript and final transcript. Specify what latency metrics and model parameters are needed.
question: What latency metrics are needed to specify encoder-decoder speech serving on an edge gateway?
details:
  realistic_solution: The spec needs encoder time, decoder time per token, streaming chunk size, beam width, expected and P95 output length, time to first partial transcript, final transcript latency, and memory footprint. Encoder cost affects startup latency; decoder cost and beam width dominate long outputs.
  common_mistake: Using average utterance length alone and missing first-partial latency or long-tail decode cost.
  napkin_math: If encoder time is 40 ms and decoder is 8 ms/token, a 20-token transcript costs 200 ms before audio chunking and postprocessing.
