title: Diagnosing Power Throttling in Memory-Bound Inference
scenario: You are deploying a transformer-based model on an on-premise Qualcomm Cloud AI 100 inference
  accelerator, which features 400 TOPS of INT8 compute, 32 GB of LPDDR4x memory, and a strict 75W power
  envelope. During profiling, you observe that despite the INT8 compute units operating at less than 15%
  utilization, the accelerator is hitting its 75W thermal design power (TDP) limit and throttling aggressively.
  The candidate must use hardware fundamentals regarding energy per operation to identify the root cause
  of the power saturation.
details:
  realistic_solution: The root cause is a memory-bound workload with low arithmetic intensity, meaning
    the accelerator is burning its power budget on LPDDR4x memory transactions rather than actual compute.
    The solution is to profile the memory bandwidth utilization and implement memory-aware optimizations
    such as operator fusion (to keep intermediate activations on-chip) or increasing the batch size to
    improve weight reuse, thereby drastically reducing off-chip memory access energy.
  common_mistake: Candidates often misdiagnose the issue as a compute-bound problem, assuming that the
    sheer volume of matrix multiplications is drawing the power, and suggest further quantization or pruning.
    They fail to recall the Horowitz energy principles, completely missing that off-chip LPDDR4x memory
    accesses consume orders of magnitude more energy than the INT8 ALU operations.
  napkin_math: Based on Horowitz's energy tables, a single INT8 MAC operation costs roughly 0.2 pJ. In
    contrast, fetching 1 byte (8 bits) from off-chip LPDDR4x memory costs approximately 20 pJ/bit, totaling
    160 pJ per byte. This means a memory fetch is ~800x more energy-intensive than the compute itself.
    If the model operates at an arithmetic intensity of just 2 OPs/byte, achieving even 50 TOPS would
    require 25 TB/s of memory traffic, which is impossible. At a realistic 150 GB/s memory bandwidth utilization,
    the LPDDR4x access alone consumes 150 GB/s * 8 bits/byte * 20 pJ/bit = 24W. Combining this with static
    power and control logic easily saturates the 75W limit, causing the Qualcomm Cloud AI 100 to throttle
    despite low compute utilization.
