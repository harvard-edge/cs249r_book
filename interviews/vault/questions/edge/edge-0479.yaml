title: The Autonomous Driving Perception Bottleneck
scenario: 'You are an ML Systems Engineer at an AV company, trying to optimize a new YOLO-like perception model on a Jetson AGX Orin. The Orin provides 275 TOPS (INT8) and has a memory bandwidth of 204.8 GB/s. Profiling reveals that a specific depthwise separable convolution layer is a major performance bottleneck, preventing the pipeline from meeting its 33ms deadline.'
question: Using roofline analysis, is the depthwise separable convolution layer on Orin compute-bound or memory-bound?
details:
  realistic_solution: 'Calculate the layer''s Arithmetic Intensity (AI) and compare it to the hardware''s capabilities. The AI determines how many operations are performed per byte of data moved from memory. This reveals the layer is severely memory-bandwidth bound.'
  common_mistake: |
    **The Pitfall:** Instinctively blaming the raw number of operations ('the model is too big').
    **The Rationale:** Engineers focus on pruning or quantizing without checking if the workload is actually compute-bound.
    **The Consequence:** Reducing operations in a memory-bound layer yields exactly zero speedup, wasting engineering time.
  napkin_math: |
    *   **Layer Profile:** 500 MFLOPs (0.5 GOPS). Memory traffic = 50 MB.
    *   **Arithmetic Intensity (AI):** 500M / 50M = 10 Ops/Byte.
    *   **Orin Ridge Point:** 275 TOPS / 204.8 GB/s = 1,342 Ops/Byte.
    *   **Diagnosis:** AI (10) << Ridge (1,342), layer is deeply memory-bound. Attainable throughput = 204.8 GB/s x 10 Ops/Byte = 2.048 TOPS (0.7% of peak).
    *   **Result:** **The compute units are idle ~99% of the time; fusion is required, not pruning.**
  options:
  - The layer is compute-bound because 500 Million OPs is too much computation for a single layer on an edge device.
  - The layer is memory-bound because its arithmetic intensity (10 Ops/Byte) is far below the hardware's ridge point (~1,342 Ops/Byte).
  - The layer is thermally limited; the AGX Orin is likely throttling and unable to deliver its peak 275 TOPS.
  - The layer is compute-bound because its low arithmetic intensity means it isn't doing enough work per byte to be efficient.
  correct_index: 1
