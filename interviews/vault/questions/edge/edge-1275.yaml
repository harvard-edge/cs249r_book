title: Architecting Multi-Model Inference on Qualcomm Cloud AI 100
scenario: Your team needs to deploy a real-time conversational AI pipeline consisting of an ASR model, an LLM, and a TTS model on an on-premise edge server equipped with a single Qualcomm Cloud AI 100 accelerator. The hardware provides exactly 32 GB of LPDDR4x memory, 400 TOPS of INT8 compute, and operates under a strict 75W power envelope.
question: How would you quantize and place the ASR, LLM, and TTS models on one Cloud AI 100 so they fit in 32 GB and stay within 75W?
details:
  realistic_solution: A strong L5 candidate will evaluate the tradeoffs and design an architecture that mandates INT8 (W8A8) quantization for the LLM to capitalize on the 400 TOPS INT8 compute and halve the memory footprint. They will structure the memory layout to pin the heavy LLM weights in the 32 GB LPDDR4x memory while leaving a dedicated, hard-capped memory pool for the ASR/TTS models and dynamic KV cache, ensuring deterministic performance and power stability under the 75W limit.
  common_mistake: |
    **The Pitfall:** Proposing to serve models at FP16 or isolating quantization strategies independently.
    **The Rationale:** Candidates focus on raw parameter counts and forget that KV caches and simultaneous model executions add significant overhead.
    **The Consequence:** The architecture exceeds the hard 32 GB memory limit or fails to leverage the accelerator's peak 400 TOPS INT8 capability, causing OOMs and massive latency.
  napkin_math: |
    1. **FP16 Footprint:** A 14B parameter LLM at FP16 takes `14B * 2 bytes = 28 GB`. With a 2 GB ASR and a 1 GB TTS model, total weight memory is 31 GB. This leaves only 1 GB for the KV cache and activations (risking OOM).
    2. **INT8 Footprint:** Designing for INT8 drops the LLM footprint to `14 GB`.
    3. **Total INT8 Memory:** `14 GB (LLM) + 2 GB (ASR) + 1 GB (TTS) = 17 GB`.
    4. **Remaining Memory:** `32 GB - 17 GB = 15 GB` safely available for high-throughput batching and KV caching.
    **INT8 quantization ensures the system comfortably fits within 32 GB while unlocking the peak 400 TOPS.**
