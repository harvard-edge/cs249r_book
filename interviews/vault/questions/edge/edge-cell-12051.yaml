title: 'Model Format Conversion: Diagnose TensorRT Conversion Failure for Custom Attention Ops'
scenario: 'A team is converting a Vision Transformer (ViT-Base, 86M params) from PyTorch to TensorRT INT8
  for Jetson Orin. The conversion fails with ''Unsupported node type: ScaledDotProductAttention''. Diagnose
  the root cause, propose fixes, and quantify the expected latency improvement after successful conversion.'
question: "What causes the TensorRT INT8 conversion failure on ScaledDotProductAttention for ViT-Base, how would you fix it, and what speedup should result?"
details:
  realistic_solution: 'Root cause: PyTorch 2.0 fused SDPA op is not yet supported in TensorRT 8.x ONNX
    parser. Fix: (1) export with torch.backends.cuda.enable_flash_sdp(False) to unfuse, or (2) use opset
    17 with attention decomposed. After fix: ViT-Base 86M, FLOPs for 224×224: 17.6 GFLOPs. TensorRT INT8
    on Orin: 17.6G/110 TOPS = 160ms? No: 17.6G/110T = 0.16ms compute. Realistic: ~5ms. vs. PyTorch FP32:
    20ms. 4× speedup.'
  common_mistake: Trying to write a custom TensorRT plugin for attention before attempting the simpler
    fix of decomposing scaled dot-product attention into supported primitives (matmul + softmax + matmul).
  napkin_math: 'ViT-Base FLOPs: 17.6 GFLOPs. Jetson Orin INT8 TensorRT (effective ~110 TOPS): 17.6G/110T
    = 0.16ms theoretical. Measured with memory overhead: ~5ms. PyTorch FP32 (GPU): ~20ms. INT8 TensorRT:
    4× faster. Accuracy: ViT-B INT8 PTQ on ImageNet: typically <0.3% top-1 drop with 1000 calibration
    images.'
