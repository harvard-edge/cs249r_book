title: Edge New 0031
scenario: Serving an LLM on a 16GB T4. Static pre-allocation of max sequence length wastes 40% of memory to fragmentation.
question: "Analyze the tradeoff of implementing PageAttention to manage the KV cache dynamically. Should the 16GB T4 implement PageAttention for dynamic KV-cache management, and what tradeoff does it create?"
details:
  realistic_solution: "Static allocation reserves contiguous VRAM for maximum potential context sizes, causing massive internal fragmentation as most sequences terminate early. PageAttention allocates memory in small, non-contiguous blocks (pages), virtually eliminating internal fragmentation. The tradeoff adds minor pointer-chasing overhead to the memory access patterns, but reclaims up to 40% of the VRAM wasted by fragmentation. If average sequence length is 2048 \u00d7 (1 \u2212 0.40) = 1228.8 tokens after reclamation, the effective concurrency rises from 4 to approximately 6.6 concurrent users, a 66% improvement. Real-world gains depend on actual sequence length distribution."
  common_mistake: |
    **The Pitfall:** Ignoring VRAM fragmentation and relying on contiguous memory allocation.
    **The Rationale:** Engineers assume batch size is strictly limited by the maximum possible sequence length, not realizing pre-allocated memory sits idle.
    **The Consequence:** Severe underutilization of expensive edge hardware and unnecessarily low concurrency limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16GB T4 GPU; 8192 MB available for KV cache
       - Static max sequence length: 2048 (1MB per sequence)
       - Fragmentation waste: 40%
    2. **Calculations:**
       - Static capacity = 8192 MB / (2048 * 1MB) = 4 concurrent users
       - Reclaimed effective avg length = 2048 * (1 - 0.40) = 1228.8
       - PageAttention capacity = 8192 MB / (1228.8 * 1MB) = 6.66 users
    3. **Conclusion & Interpretation:**
       **Result: 66% concurrency increase (Memory-Bound)**
