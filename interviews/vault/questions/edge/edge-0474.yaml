title: The TCO of Privacy on Wheels
scenario: You are the lead ML Systems Engineer at an automotive company. To improve a driver drowsiness model, you must choose a privacy-preserving strategy for a new fleet of 500,000 vehicles, analyzing the Total Cost of Ownership (TCO) over 3 years. The system must comply with strict privacy regulations, forcing a choice between a centralized approach with anonymization or a federated approach.
question: Which privacy-preserving strategy should you choose for 500,000 vehicles after comparing 3-year TCO and breach risk?
details:
  realistic_solution: 'Calculate the total 3-year cost for both options. The federated approach has a simple, one-time hardware cost. The centralized approach has recurring monthly operational costs for cellular data that must be multiplied over the 36-month lifetime. While pure TCO favors centralized ($540K vs $1.1M over 3 years), a single regulatory breach fine ($20M+) makes FL the safer choice on a risk-adjusted basis.'
  common_mistake: |
    **The Pitfall:** Miscalculating TCO by focusing only on upfront hardware CapEx.
    **The Rationale:** Engineers often view the federated option's upfront cost as a non-starter, while ignoring the massive, ongoing operational costs of centralized data transmission.
    **The Consequence:** This leads to recommending the centralized approach because it seems cheaper immediately, while severely underestimating long-term network costs and catastrophic regulatory risk.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Scale: 500,000 vehicles over 36 months
       - Centralized Setup: 200 MB/mo at $0.10/GB, $5k/mo infra
       - FL Setup: $2 per edge unit, $3k/mo infra
    2. **Calculations:**
       - Centralized Data Cost: 100,000 GB * $0.10 = $10,000/mo
       - Centralized TCO (3yr): 36 * ($10,000 + $5,000) = $540,000
       - FL Edge CapEx: 500,000 * $2 = $1,000,000
       - FL TCO (3yr): $1,000,000 + (36 * $3,000) = $1,108,000
    3. **Conclusion & Interpretation:**
       - **Result: Risk-Bound.** While raw TCO definitively favors centralized architecture ($540k vs $1.1M), massive regulatory breach fines (e.g., $20M+ GDPR) invert the calculus, rendering Federated Learning fundamentally safer.
