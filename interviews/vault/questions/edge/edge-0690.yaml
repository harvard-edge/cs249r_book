title: The INT8 Calibration Drift
scenario: Your team deployed an INT8-quantized pedestrian detection model on a TI TDA4VM in an autonomous
  shuttle. Calibration was performed in July using 2000 images from a sunlit suburban route. Come December,
  field reports show an 8% mAP drop — pedestrians in heavy coats and low-angle winter sun are being missed.
  The FP32 model shows no accuracy change on the same winter scenes. What went wrong with the quantization,
  and how do you fix it without retraining?
details:
  realistic_solution: 'Post-training quantization computes per-tensor or per-channel scale factors from
    the calibration dataset''s activation distributions. Summer calibration images have bright, high-contrast
    scenes — pedestrians in T-shirts against sunlit backgrounds produce large, well-separated activations.
    Winter scenes are fundamentally different: low-contrast (gray coats against gray sky), compressed
    dynamic range (overcast lighting), and different spatial frequency distributions (bulky clothing changes
    silhouette shapes). The summer-calibrated quantization ranges are too wide for winter activations,
    wasting precision on magnitude ranges that winter data never uses.'
  common_mistake: '"INT8 doesn''t have enough precision for winter scenes — switch to FP16." This doubles
    compute cost and misdiagnoses the root cause. The model itself is fine in FP32; the quantization parameters
    are the problem.'
  napkin_math: 'Summer calibration: max activation = 12.0, step = 12.0/127 = 0.094. Winter pedestrian
    activations in [0.5, 2.0]: 16 bins. Per-channel recalibration: channel max = 3.0, step = 3.0/127 =
    0.024 → 63 bins (4× improvement). Seasonal engine swap: 4 engines × 45 MB = 180 MB storage on eMMC
    (trivial). OTA recalibration: 500 images × 1 MB = 500 MB upload + 5 min TensorRT rebuild on-device.'
