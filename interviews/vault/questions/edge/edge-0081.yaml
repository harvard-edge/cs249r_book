title: The Throttled Vision System
scenario: Your autonomous drone uses an edge AI SoC for real-time object detection. During short bursts
  of activity (e.g., 30 seconds of intense processing), the system achieves 60 FPS. However, in continuous
  operation for several minutes, performance drops to 20-25 FPS. The profiler shows NPU utilization dropping
  from 95% to 40%. What's the most likely culprit, and how would you diagnose it?
details:
  realistic_solution: The most likely culprit is **thermal throttling**. Edge SoCs have a Thermal Design
    Power (TDP) and a maximum safe operating temperature. When the NPU runs at peak utilization, it generates
    significant heat. If the cooling solution (heatsink, fan, enclosure design) cannot dissipate this
    heat quickly enough, the SoC's temperature rises. Once it hits a pre-defined thermal threshold, the
    system automatically reduces the clock frequency and/or voltage of the NPU (and potentially other
    components) to prevent damage, leading to a drastic drop in performance and NPU utilization.
  common_mistake: '"There must be a software bug or memory leak causing performance degradation over time."
    While possible, the sudden and significant drop in NPU utilization after a specific duration points
    elsewhere.'
  napkin_math: An edge NPU might consume 15W at peak 60 FPS performance. If the drone's enclosure has
    a thermal resistance of $10 \, ^\circ\text{C/W}$ and ambient is $25 \, ^\circ\text{C}$, the junction
    temperature rapidly approaches $T_{junction} = 25 + (15 \times 10) = 175 \, ^\circ\text{C}$. To prevent
    melting, the SoC thermal throttles at $95 \, ^\circ\text{C}$. The maximum sustainable power dissipation
    is $P_{max} = (95 - 25) / 10 = 7\text{W}$. Forcing the NPU to drop from 15W to 7W requires significantly
    lowering both voltage and clock speed, resulting in the observed >60% performance drop (from 60 FPS
    to 20 FPS).
