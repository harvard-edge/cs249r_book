title: The Throttled Vision System
scenario: An autonomous drone runs real-time object detection on an edge AI SoC. During short 30-second bursts, it achieves 60 FPS. After several minutes of continuous operation, performance drops to 20 FPS, and NPU utilization drops from 95% to 40%.
question: What is the most likely cause of the sudden drop in NPU utilization and FPS during continuous operation?
details:
  realistic_solution: The most likely culprit is **thermal throttling**. Edge SoCs have a Thermal Design
    Power (TDP) and a maximum safe operating temperature. When the NPU runs at peak utilization, it generates
    significant heat. If the cooling solution (heatsink, fan, enclosure design) cannot dissipate this
    heat quickly enough, the SoC's temperature rises. Once it hits a pre-defined thermal threshold, the
    system automatically reduces the clock frequency and/or voltage of the NPU (and potentially other
    components) to prevent damage, leading to a drastic drop in performance and NPU utilization.
  common_mistake: |
    **The Pitfall:** Assuming a software bug or memory leak is degrading performance.
    **The Rationale:** Engineers trust the profiler blindly; if utilization drops, they assume the software is starved for data or leaking resources.
    **The Consequence:** Wasting time debugging application code when the hardware is actively protecting itself from physical destruction.
  napkin_math: |
    1. **Peak Power**: NPU consumes 15W at 60 FPS.
    2. **Thermal Resistance**: Assume drone enclosure is 10 °C/W; ambient is 25°C.
    3. **Junction Temp at Peak**: 25 + (15 * 10) = 175°C (Destructive).
    4. **Thermal Throttling Target**: SoC throttles at 95°C.
    5. **Max Sustainable Power**: (95 - 25) / 10 = 7W.
    6. **Conclusion**: Throttling from 15W to 7W forces drastic clock speed reductions, perfectly explaining the **>60% performance drop** to 20 FPS.
