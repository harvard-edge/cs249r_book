title: The CAN Bus Telemetry Flood
scenario: Your autonomous forklift runs pallet detection and publishes results over the vehicle's CAN bus at 20 Hz. The forklift has 15 other ECUs sharing the same 500 Kbps CAN bus. After adding ML telemetry (detection count, confidence, latency, model version) to the CAN traffic, the safety system starts missing emergency stop messages.
question: What went wrong, and how do you fix it without removing the telemetry?
details:
  realistic_solution: |
    The ML telemetry payload is saturating the physical bandwidth of the CAN bus. Because CAN employs priority-based arbitration via message IDs, high bus utilization causes low-priority messages to be persistently delayed or dropped. Even if safety messages hold higher priority, the sheer volume of high-frequency ML data creates arbitration contention and queue overflows at the CAN controller level. The architectural fix is to decouple high-bandwidth ML telemetry from the deterministic control plane by routing it over Automotive Ethernet or a dedicated CAN-FD network.
  common_mistake: |
    **The Pitfall:** Increasing the CAN bus baud rate (e.g., to 1 Mbps) to handle the extra traffic.
    **The Rationale:** Treating it as a simple bandwidth problem without understanding automotive engineering constraints.
    **The Consequence:** Triggering a massive 6-month re-certification effort for every single ECU on the vehicle to qualify them for the new baud rate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CAN Bus Bandwidth: 500 Kbps (~3,846 standard frames/sec).
       - Original Load: 2,500 frames/sec (65% utilization).
       - Max Safe Utilization: 70%.
    2. **Calculations:**
       - Added ML Telemetry Load: 240 frames/sec.
       - Total Load: 2,500 + 240 = 2,740 frames/sec.
       - New Bus Utilization: 2,740 / 3,846 = 71.2%.
    3. **Conclusion & Interpretation:**
       - **Result: Bus utilization exceeds the 70% safety threshold. Bottleneck: Network Bandwidth-Bound (CAN Bus Saturation).**
