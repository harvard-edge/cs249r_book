title: The Perception Model's Performance Ceiling
scenario: You are an ML systems engineer on an autonomous driving team, responsible for deploying a new perception model onto a Jetson AGX Orin. The system has a strict thermal design power (TDP) limit of 40W. The model must process a 30 FPS stream (33.3ms deadline per frame), but you are only achieving 20 FPS (50ms per frame).
question: What is the primary bottleneck keeping the Orin at 20 FPS under the 40W TDP, and how would you optimize it?
details:
  realistic_solution: The model is severely memory-bandwidth bound. The key is to calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The low AI means the GPU's compute cores spend most of their time idle, waiting for data to arrive from DRAM. This massive data movement is also energy-intensive, which is why the system is hitting its 40W power limit despite low compute utilization. The most effective optimizations will be those that reduce DRAM traffic, such as operator fusion (e.g., fusing Conv-BN-ReLU), quantization (e.g., from FP16 to INT8), or architectural changes that improve data reuse.
  common_mistake: |
    **The Pitfall:** Assuming the model is compute-bound by default.
    **The Rationale:** Engineers default to thinking the model is 'too big' or 'too slow' in terms of computation (FLOPs) and suggest pruning layers or using a smaller backbone.
    **The Consequence:** Pruning reduces FLOPs but often doesn't address the underlying ratio of compute to memory access, sometimes worsening Arithmetic Intensity and yielding no speedup.
  napkin_math: |
    1. **Hardware Ridge Point**: 275 TOPS / 204.8 GB/s = 1342 Ops/Byte.
    2. **Model AI**: If the model does 2 Trillion Ops and moves 4 GB of data, Arithmetic Intensity = 2e12 / 4e9 = 500 Ops/Byte.
    3. **Evaluation**: Since 500 < 1342, the workload sits to the left of the ridge point.
    4. **Result**: The model is **memory-bandwidth bound**. Compute cores starve, wasting power on memory fetches.
  options:
  - The model is compute-bound. It has too many operations (2 T-Ops) for the GPU, so we must prune layers or simplify the architecture.
  - The Jetson's power management is faulty. It is thermal throttling prematurely, as it should handle 40W without such a large performance drop.
  - The model is memory-bandwidth bound. Its low arithmetic intensity means performance is limited by data movement, not compute.
  - The bottleneck is the PCIe bus transferring data from the host CPU to the GPU before inference can begin.
  correct_index: 2
