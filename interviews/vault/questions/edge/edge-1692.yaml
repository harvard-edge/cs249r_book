title: Optimizing Edge Active Learning Curation
scenario: 'You are managing an active learning data selection pipeline for smart cameras powered by Hailo-8 accelerators (26 TOPS INT8, 2.5W). Since the Hailo-8 lacks local DRAM and streams directly from host memory, the host system has strict memory bandwidth and storage limits. The current curation strategy buffers raw 1080p frames on the host whenever the model outputs a low-confidence prediction, resulting in 5 saved frames per second on average. This naive approach overwhelms the host memory bandwidth and exhausts edge storage before the daily upload window.'
question: 'How would you reduce Hailo-8 active learning storage and host bandwidth by selecting only semantically novel frames?'
details:
  realistic_solution: 'Instead of relying on basic confidence scores and blindly copying frames, leverage the Hailo-8 to extract lightweight INT8 feature embeddings from the early layers. Compare these embeddings against a tiny core-set in host memory using a distance metric, only triggering a full 1080p frame copy and storage write when the data is semantically novel and valuable for annotation.'
  common_mistake: |
    **The Pitfall:** Suggesting standard image compression on the host CPU or expanding edge storage.
    **The Rationale:** Engineers default to traditional data compression instead of semantic data filtering.
    **The Consequence:** The host CPU becomes heavily burdened, and expanding storage increases hardware costs without solving the bandwidth bottleneck.
  napkin_math: |
    * Current bandwidth: 5 frames/sec * (1920 * 1080 * 3 bytes) = 31.1 MB/s (~112 GB/hour).
    * Optimization: Extract a 512-byte INT8 embedding per frame using the Hailo-8 (negligible compute at 26 TOPS).
    * Filter for novelty to reduce save rate to 0.1 fps (1 frame every 10 seconds).
    * Optimized bandwidth: 0.1 fps * 6.22 MB = 622 KB/s (~2.2 GB/hour).
    * **Semantic filtering drops storage and bandwidth requirements by 98% while yielding a more diverse dataset.**
