title: On-Device Distribution Drift Detection for Edge TPU
scenario: You are leading the deployment of a visual inspection system across thousands of remote manufacturing
  sites using the Google Coral Edge TPU (4 TOPS INT8, 2W power limit, USB/PCIe). Due to seasonal lighting
  changes and sensor aging, the input data distribution drifts over time, silently degrading model performance.
  Network bandwidth is severely constrained, making it impossible to stream raw images back to the cloud
  for traditional drift analysis. Design a novel, on-device architecture to detect statistical data drift
  locally while adhering to the Coral's strict INT8 quantization requirements and limited operator support,
  ensuring the primary inference pipeline is not disrupted.
question: "How would you detect statistical data drift on-device using the Coral Edge TPU without streaming raw images or disrupting INT8 inference?"
details:
  realistic_solution: The optimal architecture leverages the intermediate INT8 activation maps (embeddings)
    from the primary inspection model, which are already computed by the Edge TPU. By maintaining running,
    binned histograms of these low-precision embeddings in the host's memory, we can track the activation
    distribution over time. A lightweight process on the host CPU periodically computes the Population
    Stability Index (PSI) using these histograms against a baseline reference. If the PSI exceeds a threshold,
    the system flags the drift and transmits only the anomalous embeddings or a heavily compressed sample
    of the triggering frames back to the cloud.
  common_mistake: Candidates often suggest computing continuous statistical metrics like exact KL divergence
    directly on the raw input stream or propose running a secondary anomaly detection model. They fail
    to realize that the Coral Edge TPU only supports INT8 quantized operations, and unsupported floating-point
    math for complex drift metrics will fall back to the host CPU, causing massive latency spikes and
    thermal throttling within the 2W power budget.
  napkin_math: Assume the primary model runs at 30 FPS and we extract a 256-dimensional INT8 embedding
    per frame. The embedding data rate is 256 bytes * 30 FPS = 7.68 KB/s. To track drift, we maintain
    a 16-bin histogram for each of the 256 dimensions, requiring just 256 * 16 * 4 bytes (32-bit int counters)
    = 16.38 KB of memory per time window. The Coral Edge TPU provides 4 TOPS, meaning the INT8 embedding
    generation is handled effortlessly within the primary inference pass. Calculating PSI on 16.38 KB
    of histogram data locally on the host CPU once per minute requires less than 1 million operations,
    consuming a negligible fraction of the 2W budget, whereas streaming raw 1080p video would demand 5+
    Mbps of bandwidth and dedicated encoding hardware.
