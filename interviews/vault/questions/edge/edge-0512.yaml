title: 'The Fleet vs. The Cloud: A TCO Showdown'
scenario: You are an ML Systems Engineer at an automotive company designing the update strategy for the perception model in a fleet of 100,000 vehicles.
question: Which daily update strategy has lower operational cost for the 100,000-vehicle fleet, centralized upload or Federated Learning?
details:
  realistic_solution: Strategy B (Federated Learning) is overwhelmingly more economical. The cost is dominated by cellular data transfer, and FL's ability to perform on-device summarization (training) drastically reduces the volume of data sent over the expensive network. It effectively trades expensive network I/O for 'free' on-device compute on already-deployed hardware.
  common_mistake: |
    **The Pitfall:** Underestimating the OpEx of cellular data transfer at fleet scale.
    **The Rationale:** Engineers focus on cloud compute costs or one-time hardware CapEx, ignoring the massive recurring data bill for centralized uploads.
    **The Consequence:** Designing a data collection architecture that is economically unviable at scale.
  napkin_math: |
    - **Strategy A (Centralized):** 100,000 cars * 1 GB/day * $0.01/GB = $1,000/day.
    - **Strategy B (FL):** Train on Orin. Transmit 50 MB (0.05 GB) weights. 100,000 cars * 0.05 GB/day * $0.01/GB = $50/day.
    - **Savings:** $1,000 - $50 = **$950/day**, making on-device FL massively cheaper.
  options:
  - Strategy A is cheaper because the cloud compute cost for federated learning will grow unpredictably with more users.
  - Strategy B is cheaper, but the main savings come from the lower cloud compute cost.
  - Strategy B is cheaper primarily due to the ~50x reduction in cellular data transfer costs.
  - The costs are roughly equivalent; the privacy benefits of Strategy B are the only real differentiator.
