title: 'The Fleet vs. The Cloud: A TCO Showdown'
scenario: 'You are an ML Systems Engineer at an automotive company designing the update strategy for the
  perception model in a fleet of 100,000 vehicles. After a pilot, you are asked to diagnose the Total
  Cost of Ownership (TCO) of two approaches based on daily operational costs:'
details:
  realistic_solution: Strategy B (Federated Learning) is overwhelmingly more economical. The cost is dominated
    by cellular data transfer, and FL's ability to perform on-device summarization (training) drastically
    reduces the volume of data sent over the expensive network. It effectively trades expensive network
    I/O for 'free' on-device compute on already-deployed hardware.
  common_mistake: Engineers often underestimate the operational expense (OpEx) of cellular data transfer
    at fleet scale. They might focus only on cloud compute costs (which are significant but not the dominant
    factor) or the one-time hardware cost (CapEx), ignoring the recurring data bill that can cripple a
    project's economics.
  napkin_math: 'Strategy A (Centralized): Transmit 1 GB/day/car. 100k cars * 1GB * $0.01/GB = $1,000/day.
    Strategy B (FL): Train on Orin (275 TOPS). Transmit 50 MB (0.05 GB) of weight updates/day. 100k cars
    * 0.05GB * $0.01/GB = $50/day. Savings = $950/day or ~$346,000/year, making on-device FL massively
    cheaper.'
  options:
  - Strategy A is cheaper because the cloud compute cost for federated learning will grow unpredictably
    with more users.
  - Strategy B is cheaper, but the main savings come from the lower cloud compute cost.
  - Strategy B is cheaper primarily due to the ~50x reduction in cellular data transfer costs.
  - The costs are roughly equivalent; the privacy benefits of Strategy B are the only real differentiator.
  correct_index: 2
