title: Bottleneck Analysis on Qualcomm Cloud AI 100
scenario: We are deploying a multi-camera video analytics pipeline on a Qualcomm Cloud AI 100 (400 TOPS
  INT8, 32 GB LPDDR4x, 75W). Profiling the application shows an overall latency of 45ms per frame, missing
  our 30ms target. Engineer A proposes utilizing a custom operator to fuse memory-bound layers to improve
  LPDDR4x cache hits. Engineer B proposes keeping the standard operators but batching inputs to 8 to maximize
  the 400 TOPS INT8 utilization, even though it increases peak memory usage. Evaluate both approaches,
  analyze the bottlenecks using the hardware specs, and determine which strategy is better for hitting
  the latency SLA.
details:
  realistic_solution: Engineer A's approach is better for a strict latency SLA. On the Qualcomm Cloud
    AI 100, the 400 TOPS INT8 compute capacity is massive and rarely the bottleneck for single-batch inference;
    memory bandwidth to the 32 GB LPDDR4x is the actual constraint. Fusing operators reduces round-trips
    to main memory, directly lowering latency. Batching (Engineer B) improves throughput but worsens individual
    frame latency.
  common_mistake: Candidates often choose Engineer B's approach to maximize the 400 TOPS compute, ignoring
    that batching inherently increases latency per frame and might cause LPDDR4x thrashing. They fail
    to evaluate how memory bandwidth restricts performance and that fusing operations is generally better
    for strict latency bounds.
  napkin_math: For a model with 100 billion INT8 operations (100 GOPS), compute time at peak 400 TOPS
    is 100 / 400,000 = 0.25ms. However, transferring 200MB of intermediate activations to and from the
    32 GB LPDDR4x at a typical 100 GB/s bandwidth takes 200MB / 100GB/s = 2.0ms. Memory I/O dominates
    compute by 8x. Fusing operators to eliminate 50% of memory round-trips saves 1.0ms per layer block,
    directly reducing end-to-end latency without exceeding the 75W power envelope.
