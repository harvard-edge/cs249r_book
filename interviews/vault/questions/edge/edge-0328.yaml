title: The Autonomous Driving FPS Budget
scenario: Your team is designing the perception system for an autonomous vehicle. The main camera runs
  at 30 FPS, which sets a hard real-time deadline for the entire processing pipeline to avoid frame drops
  and ensure safety. Your image signal processing (ISP) and sensor fusion post-processing consume a combined
  10ms of this budget. To maintain the 30 FPS rate, what is the absolute maximum inference latency your
  ML model can have?
question: "To maintain the 30 FPS rate, what is the absolute maximum inference latency your ML model can have?"
details:
  realistic_solution: To maintain 30 FPS, the system must complete all processing for a single frame within
    33.3 milliseconds. Since 10ms is already consumed by other pipeline stages, the remaining budget must
    be allocated to the model's inference time. Therefore, the model's latency cannot exceed 23.3ms.
  common_mistake: The most common mistake is to ignore the latency cost of other components in the pipeline
    and assume the ML model can consume the entire 33ms frame budget. In real-time systems, the model
    is just one part of an end-to-end pipeline, and all other latencies (camera read, pre-processing,
    post-processing, OS scheduling) must be subtracted from the total budget.
  napkin_math: Total Frame Budget = 1000 ms / 30 FPS = 33.3 ms
  options:
  - 33.3 ms
  - 10 ms
  - 23.3 ms
  - 43.3 ms
  correct_index: 2
