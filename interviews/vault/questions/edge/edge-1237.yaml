title: TensorRT DLA Fallback Overhead on Jetson Orin
scenario: You are deploying a transformer-based vision model on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere GPU + DLA accelerator, 60W TDP). You compile the ONNX model to a TensorRT INT8 engine to leverage the 275 TOPS performance, delegating the dense layers to the DLA while unsupported operators like LayerNorm fall back to the Ampere GPU.
question: Why does TensorRT INT8 partial DLA delegation increase Jetson Orin latency from 20ms to 25ms versus all-FP16 GPU execution?
details:
  realistic_solution: 'The performance drop is driven by the operator coverage gap in the DLA, which forces format conversion and synchronization between the DLA and the Ampere GPU. When TensorRT encounters the unsupported LayerNorm, it must halt the DLA pipeline, reformat the intermediate tensor from the DLA''s proprietary blocked memory layout to a standard layout, and transfer execution context to the GPU. Fusing or substituting unsupported operators is necessary to achieve a single complete DLA subgraph.'
  common_mistake: Assuming that mapping any sub-graph to a dedicated INT8 accelerator will strictly reduce latency because of high theoretical TOPS, failing to account for catastrophic synchronization penalties and memory reformatting costs during fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - 24 layers, 2 fallbacks per layer (48 total context switches)
    - 0.5 MB activation tensor size (Batch 1, Seq 512, Hidden 1024)
    - ~200 GB/s memory bandwidth
    - ~0.1 ms sync penalty per crossing

    **Calculations:**
    - Data moved = 48 crossings * 0.5 MB * 2 (read/write) = 48 MB
    - Raw transfer time = 48 MB / 200,000 MB/s = 0.24 ms
    - Sync overhead = 48 crossings * 0.1 ms = 4.8 ms
    - Total overhead = 4.8 ms + 0.24 ms = 5.04 ms

    **Conclusion & Interpretation:**
    - **Result: ~5 ms overhead (Synchronization-Bound)**. The context switching and layout conversion penalties completely outweigh the compute benefits of DLA delegation.
