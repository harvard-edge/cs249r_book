title: Edge Data Efficiency for Real-time Object Detection on Hailo-8
scenario: Your team is deploying a real-time object detection model on an autonomous drone platform equipped with the Hailo-8 AI processor (26 TOPS INT8, 2.5W dataflow accelerator). The drone captures high-resolution video streams (e.g., 30 FPS, 1080p RGB) in diverse environments. You've identified a 'data wall' problem: continuously feeding raw, voluminous sensor data to the model on the Hailo-8 for inference and potential on-device adaptation consumes excessive power and memory bandwidth, impacting battery life and real-time processing guarantees.
question: How would you use data selection to reduce 1080p 30 FPS drone input while preserving adaptation on the 2.5W Hailo-8?
details:
  realistic_solution: Implement a hybrid, adaptive data selection pipeline. For inference, employ dynamic region-of-interest (ROI) or temporal sampling combined with a lightweight uncertainty estimation module (e.g., Monte Carlo Dropout or ensemble averaging) running on the Hailo-8. This identifies and prioritizes frames/patches with high uncertainty or novel content, reducing the effective data rate. For on-device adaptation/fine-tuning, utilize an active learning-inspired coreset selection strategy. Periodically evaluate incoming data against a small, representative coreset stored on the Hailo-8's limited memory, adding new data points that significantly improve model coverage or reduce loss, while offloading less critical data for offline analysis. This approach directly manages the Information-Compute Ratio (ICR) by selectively processing the most informative data.
  common_mistake: |
    **The Pitfall:** Applying generic, static data pruning (e.g., random sampling or threshold-based filtering).
    **The Rationale:** Candidates often do not consider the dynamic distribution shifts at the edge or the model's uncertainty, assuming random sampling is sufficient to reduce volume.
    **The Consequence:** This leads to discarding critical 'hard' examples, degrading performance on crucial edge cases, or introducing model collapse risks over time due to insufficient diversity in the retained data for adaptation.
  napkin_math: |
    1. Calculate the size of a single 1080p RGB frame: 1920 * 1080 * 3 bytes = 6,220,800 bytes (~6.22 MB).
    2. Calculate the raw data rate at 30 FPS: 6.22 MB * 30 = 186.6 MB/s.
    3. Assume the effective memory bandwidth for data transfer is bottlenecked at 50 MB/s.
    4. Calculate the required data reduction: (1 - 50 / 186.6) * 100 = 73.2%.
    **A minimum of 73.2% data reduction is required just to keep up with the sensor input stream without buffering.**
