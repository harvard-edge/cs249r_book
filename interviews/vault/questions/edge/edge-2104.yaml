title: Edge Data Efficiency for Real-time Object Detection on Hailo-8
scenario: Your team is deploying a real-time object detection model on an autonomous drone platform equipped with a Hailo-8 AI processor. The drone captures 1080p RGB video at 30 FPS. Continuously feeding raw, voluminous sensor data to the model on the edge device consumes excessive power and memory bandwidth, severely impacting battery life.
question: How would you use data selection to reduce 1080p 30 FPS drone input while preserving on-device adaptation capabilities?
details:
  realistic_solution: Implement a cascaded, uncertainty-aware active learning pipeline. First, run a lightweight, INT8-quantized heuristic gate or temporal motion tracker on the host CPU to decimate redundant frames. For the remaining frames passed to the Hailo-8, compute an epistemic uncertainty proxy (e.g., bounding box variance from a lightweight ensemble or confidence entropy). Only frames exhibiting high uncertainty or significant distribution shift are retained in a local coreset buffer for periodic on-device fine-tuning, dramatically reducing the Information-Compute Ratio (ICR) and mitigating catastrophic forgetting.
  common_mistake: |
    **The Pitfall:** Applying generic, static data pruning (e.g., random sampling or threshold-based filtering).
    **The Rationale:** Candidates often do not consider the dynamic distribution shifts at the edge or the model's uncertainty, assuming random sampling is sufficient to reduce volume.
    **The Consequence:** This leads to discarding critical 'hard' examples, degrading performance on crucial edge cases, or introducing model collapse risks over time due to insufficient diversity in the retained data for adaptation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Drone camera: 1080p RGB (1920 x 1080 x 3 bytes) at 30 FPS.
       - Effective memory bandwidth for sustained inference data transfer: Assumed bottlenecked at 50 MB/s.
    2. **Calculations:**
       - Raw frame size = 1920 * 1080 * 3 = 6,220,800 bytes (~6.22 MB).
       - Raw data rate = 6.22 MB/frame * 30 FPS = 186.6 MB/s.
       - Required reduction factor = (186.6 - 50) / 186.6 = 73.2%.
    3. **Conclusion & Interpretation:**
       - **Result: A minimum of 73.2% of raw frames must be dropped or bypassed. The system is Memory-Bandwidth-Bound, mandating aggressive early-stage data decimation.**
