title: The DLA vs GPU Partition
scenario: 'The Jetson Orin has both a GPU and two DLA (Deep Learning Accelerator) engines. Your colleague
  runs the entire YOLOv8-S model on the GPU and gets 35 FPS. You suggest splitting the model: backbone
  on the DLA, detection head on the GPU. Your colleague says ''that''s more complex for no benefit — the
  GPU is faster.'' Is your colleague right?'
question: "Is your colleague right?"
details:
  realistic_solution: 'Your colleague is right that the GPU alone is faster for a *single model*. But
    the DLA and GPU can execute concurrently — they are independent compute engines, though they share
    the same LPDDR5 memory bus and MMU. If you run the backbone on the DLA (15ms) while the GPU runs a
    tracking model (8ms), both execute in parallel. The detection head then runs on the GPU (5ms) after
    the DLA finishes. The caveat: because DLA and GPU share memory bandwidth, running both simultaneously
    increases individual latencies by 10-20% due to DRAM contention. Adjusted: DLA backbone ~17ms (parallel
    with GPU tracker ~9ms) + GPU head 5ms = 22ms. Still much better than sequential GPU: 28 + 8 = 36ms.
    The DLA/GPU split gives ~1.6× higher pipeline throughput by exploiting hardware parallelism, even
    accounting for bandwidth contention. The benefit is largest when at least one workload is compute-bound
    rather than memory-bound.'
  common_mistake: '"The GPU is always faster because it has more TOPS." This ignores that the DLA and
    GPU can run in parallel.'
  napkin_math: 'GPU-only pipeline: detection 28ms + tracking 8ms = 36ms → 27 FPS. DLA+GPU pipeline (with
    ~15% bandwidth contention): DLA backbone 17ms (parallel with GPU tracker 9ms) + GPU head 5ms = 22ms
    → 45 FPS. Speedup: 1.6×. Power: DLA at 5W + GPU at 15W = 20W vs GPU-only at 15W for 36ms. Energy per
    frame: DLA+GPU = 20W × 22ms = 0.44J. GPU-only = 15W × 36ms = 0.54J. The split is 19% more energy-efficient.'
