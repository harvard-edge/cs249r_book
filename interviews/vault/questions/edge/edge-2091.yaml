title: Optimizing Data Storage for On-Device Inference on Qualcomm Cloud AI 100
scenario: You are designing the data ingestion and inference pipeline for a highly sensitive on-device ML application running on the Qualcomm Cloud AI 100. This device features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power budget. The application processes continuous streams of sensor data, performing real-time inference on a large, pre-trained model. Due to strict latency requirements and limited persistent storage on the edge device, you need to efficiently store and access intermediate inference results, model checkpoints, and potentially raw sensor data for re-processing.
question: What storage format strategy would you use for sensor data, intermediate results, and checkpoints on Cloud AI 100 to balance compression, speed, and LPDDR4x use?
details:
  realistic_solution: A realistic solution involves a hybrid approach, leveraging columnar storage formats like Parquet or optimized binary formats for intermediate structured data. For multi-dimensional sensor data, TFRecord could be highly efficient due to direct compatibility with TF ops. Compression favors fast decompression algorithms (Snappy, LZ4) over maximum compression ratio to balance I/O reduction with CPU overhead. The system should read data in columnar batches directly into the LPDDR4x memory, optimized for INT8 ops, avoiding unnecessary data copies and maximizing the 400 TOPS throughput.
  common_mistake: |
    **The Pitfall:** Defaulting to general-purpose storage formats (CSV, JSON) or overly complex serialized formats.
    **The Rationale:** Candidates fail to consider the specific access patterns, memory constraints, and computational limits of the edge architecture.
    **The Consequence:** Massive parsing overhead, inefficient memory utilization (loading entire files into 32GB LPDDR4x), and increased I/O that blows the power budget.
  napkin_math: |
    1. **Data Volume:** Sensor stream at 100 MB/s. 1 hour of raw data = 360 GB. Exceeds 32GB LPDDR4x.
    2. **Compression Gain:** Columnar binary with Snappy compression (5:1 ratio) reduces this to 72 GB. Decompression is ~5ms per 10MB batch, preserving latency.
    3. **Intermediate Output:** 1000 features/record, 4 bytes/feature, 100 records/sec = 400 KB/sec.
    4. **Storage Need:** Over 1 hour, this is 1.44 GB. Storing this natively in TFRecord prevents the CPU from doing heavy text-parsing, keeping the system under 75W.
