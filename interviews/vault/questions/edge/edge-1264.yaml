title: Architecting an Energy-Efficient Pipeline on Hailo-8
scenario: You are designing an always-on vision pipeline for a battery-powered drone using a dataflow accelerator. It delivers 26 TOPS at INT8 precision while consuming only 2.5W, but lacks local DRAM and must stream weights and activations directly from the host processor's memory. Given the steep energy penalty of off-chip memory access compared to on-chip compute, evaluate the architectural tradeoffs and design a system-level pipeline that minimizes total energy per inference while maintaining target accuracy.
question: How would you design the vision pipeline to minimize total energy per inference despite costly host DRAM streaming?
details:
  realistic_solution: 'The optimal design treats the accelerator as a pure dataflow engine, selecting a model architecture where all layers, weights, and intermediate feature maps fit entirely within the distributed on-chip SRAM. The architecture should employ layer fusion, aggressively quantize to INT8, and ensure the host is only involved in streaming the initial input frame and receiving the final low-bandwidth outputs (e.g., bounding boxes).'
  common_mistake: |
    **The Pitfall:** Focusing solely on the 2.5W power figure of the accelerator and ignoring the system-level energy cost of streaming data from the host's DRAM.
    **The Rationale:** Optimizing for chip-level metrics rather than system-level constraints, ignoring the fundamental physics of data movement.
    **The Consequence:** Proposing large standard models that require constant swapping of intermediate activations over the PCIe interface, causing memory access energy to dominate the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak efficiency: 26 TOPS / 2.5W = 10.4 TOPS/W.
    - INT8 MAC energy: ~0.2 pJ.
    - Off-chip DRAM access (32-bit): ~640 pJ (3200x more expensive).
    - Spilled activations: 10MB per inference.

    **Calculations:**
    - Off-chip accesses: 10,000,000 bytes / 4 bytes = 2,500,000 accesses.
    - Transfer energy: 2,500,000 * 640 pJ * 2 (read+write) = 3.2 mJ per inference.
    - Host interface power overhead at 30 FPS: 3.2 mJ * 30 FPS = 96 mW (~0.1W).

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound Data Movement**. The off-chip traffic alone consumes a massive portion of the energy budget relative to compute, proving that keeping activations entirely within on-chip SRAM is mandatory.
