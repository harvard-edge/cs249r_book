title: Calculate Edge TPU Ingestion Throughput for Video Stream
scenario: You are deploying a real-time object detection pipeline on a Google Coral Edge TPU connected via USB. The pipeline ingests a 1080p video stream at 30 FPS. The Edge TPU operates at 4 TOPS (INT8) and has a 2W power envelope. Your preprocessing step resizes frames to 300x300, and the quantized MobileNet SSD model requires 1.2 GOPS per inference.
question: What maximum theoretical FPS can the Edge TPU process, and will USB 3.0 bottleneck the raw 1080p RGB 30 FPS stream?
details:
  realistic_solution: First, calculate the maximum frame rate by dividing the Edge TPU's compute capacity by the model's operations per frame. Second, calculate the bandwidth required for the raw 1080p 30 FPS RGB stream to see if it exceeds the practical USB 3.0 bandwidth. If the compute supports a higher FPS than the camera provides, the system is not compute-bound. The USB bandwidth is sufficient for the 30 FPS stream.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with GOPS or calculating the bandwidth of the resized frames instead of the raw ingest stream.
    **The Rationale:** Candidates fail to convert Tera Operations to Giga Operations correctly, or they forget that the raw 1080p stream must traverse the USB bus before being resized.
    **The Consequence:** The maximum FPS is miscalculated by orders of magnitude, or the USB bottleneck analysis is fundamentally flawed.
  napkin_math: |
    - Compute capacity = 4 TOPS = 4,000 GOPS.
    - Model cost = 1.2 GOPS/frame.
    - Max theoretical FPS = 4,000 GOPS / 1.2 GOPS/frame = 3333 FPS.
    - Raw 1080p frame size = 1920 * 1080 * 3 bytes (RGB) = 6.22 MB.
    - Required bandwidth at 30 FPS = 6.22 MB * 30 = 186.6 MB/s.
    - Convert to bits: 186.6 MB/s * 8 = 1.49 Gbps.
    **Conclusion: Since 1.49 Gbps is less than the practical USB 3.0 limit of 3.2 Gbps, USB 3.0 is not a bottleneck.**
