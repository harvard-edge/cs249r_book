title: Hailo-8 PCIe Gen 3 Limit
scenario: Utilizing a Hailo-8 chip for real-time video analytics attached to a host
  CPU via a standard PCIe Gen 3 x4 lane.
question: Recall the maximum theoretical bandwidth of the PCIe Gen 3 x4 interface
  connecting the edge host to the accelerator.
visual:
  kind: svg
  path: edge-2292.svg
  alt: Bar chart comparing 1 lane vs 4 lanes of PCIe Gen 3 bandwidth.
  caption: PCIe Gen 3 Bandwidth
details:
  realistic_solution: The candidate should recall that PCIe Gen 3 provides roughly
    985 MB/s per lane. For 4 lanes, this equates to approximately 3.94 GB/s theoretical
    maximum bandwidth in each direction.
  common_mistake: Confusing Gen 3 with Gen 4 (which doubles the bandwidth) or assuming
    it is bits instead of bytes.
  napkin_math: 4 * 0.985 = 3.94 GB/s
