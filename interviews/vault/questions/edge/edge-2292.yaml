title: Hailo-8 PCIe Gen 3 Limit
scenario: A Hailo-8 chip is utilized for real-time video analytics and is attached to a host CPU via a standard PCIe Gen 3 x4 lane.
question: What is the maximum theoretical bandwidth of the PCIe Gen 3 x4 interface connecting the edge host to the accelerator?
visual:
  kind: svg
  path: edge-2292.svg
  alt: Bar chart comparing 1 lane vs 4 lanes of PCIe Gen 3 bandwidth.
  caption: PCIe Gen 3 Bandwidth
details:
  realistic_solution: PCIe Gen 3 provides roughly 0.985 GB/s per lane. For 4 lanes, this equates to approximately 3.94 GB/s theoretical maximum bandwidth in each direction.
  common_mistake: |
    **The Pitfall:** Confusing PCIe Gen 3 bandwidth with Gen 4 or misstating the units.
    **The Rationale:** Candidates often double the bandwidth by confusing Gen 3 with Gen 4, or they assume the specification is in gigabits instead of gigabytes.
    **The Consequence:** Incorrect bandwidth assumptions lead to fundamentally flawed data transfer time and latency estimations.
  napkin_math: |
    1. **Assumptions & Constraints:** Standard PCIe Gen 3 provides $\approx$ 0.985 GB/s per lane. The interface is x4.
    2. **Calculations:** Total theoretical bandwidth = 4 lanes * 0.985 GB/s = 3.94 GB/s.
    3. **Conclusion & Interpretation:** **Maximum bandwidth is 3.94 GB/s. This dictates the I/O-Bound limits for host-to-device transfers.**
