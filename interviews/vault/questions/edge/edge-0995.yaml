title: Analyzing Activation Memory Footprint for MobileNetV3 on Jetson Orin
scenario: You are deploying MobileNetV3-Large for real-time image classification on a Jetson Orin (32 GB LPDDR5 shared CPU/GPU memory, 275 TOPS). At inference time with batch size 1 and input resolution 224×224, you need to analyze the peak activation memory during the forward pass to understand whether there is headroom for concurrent CV pipeline tasks using the same LPDDR5 pool.
question: What peak activation memory should you expect for MobileNetV3-Large on Orin at batch 1 and 224×224 input?
details:
  realistic_solution: 'The peak activation tensor occurs at the first expansion layer: input 224×224×16, expanded to 224×224×16 (expansion factor 1, then filters increase). Worst case at a layer with 112×112 spatial resolution and 96 channels: tensor = 112×112×96×4 B = 4.6 MB. With TensorRT, intermediate buffers are reused via memory planning, so peak is bounded by the two largest non-overlapping tensors ≈ 9 MB. Total inference footprint including activations + weights ≈ 20 MB, leaving the vast majority of 32 GB for other pipeline tasks.'
  common_mistake: |
    **The Pitfall:** Assuming activation memory scales linearly with model parameter count.
    **The Rationale:** Engineers often look at the small weight footprint of MobileNets (~10MB) and assume runtime memory is similarly minuscule.
    **The Consequence:** They fail to account for large intermediate feature maps in early depthwise-separable layers, leading to VRAM under-budgeting if batch sizes or resolutions are increased.
  napkin_math: |
    1. **Weights**: MobileNetV3 is ~5.4M params = 21.6 MB (fp32) or 10.8 MB (fp16).
    2. **Peak Activation**: 112 × 112 × 96 × 4 Bytes = 4.8 MB (often bounded to ~9MB with TensorRT buffers).
    3. **Engine Workspace**: TensorRT typical default workspace = 256 MB.
    4. **Result**: Total GPU memory for inference ≈ 300 MB. Remaining for concurrent tasks = 32 GB - 300 MB = **~31.7 GB**.
