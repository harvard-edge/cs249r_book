title: Debugging gradient flow through quantization-aware training on Jetson Orin
scenario: 'You are implementing quantization-aware training (QAT) for an EfficientNet-B0 model targeting INT8 deployment on Jetson Orin. After inserting fake quantization nodes (FakeQuant), the model''s validation accuracy during QAT plateaus at 10% below the FP32 baseline. You suspect gradient flow through fake quant is incorrect.'
question: 'How should FakeQuant be implemented so gradients flow during QAT for the INT8 target?'
details:
  realistic_solution: 'Implement FakeQuant using STE: forward computes round(x / scale) × scale (true quantization simulation), backward returns the gradient unchanged (identity, as if round were the identity function). In PyTorch: use torch.fake_quantize_per_tensor_affine() which implements STE internally. Verify gradient flow with hooks: register_hook on each layer''s output to confirm non-zero gradients flow back through FakeQuant nodes.'
  common_mistake: |
    **The Pitfall:** Using a standard step function (round-to-nearest) as-is in fake quantization.
    **The Rationale:** Candidates implement the forward pass correctly but forget that step functions have zero gradients almost everywhere.
    **The Consequence:** Without a Straight-Through Estimator (STE), gradients are zero and the model cannot learn to place weights in quantization-friendly positions.
  napkin_math: |
    * EfficientNet-B0 has 5.3M params and ~80 conv layers.
    * QAT with correct STE expects an INT8 accuracy drop of ~0.5-1%.
    * The observed drop of 10% indicates zero/wrong gradients.
    * FakeQuant requirement: Each conv layer needs weight + activation FakeQuant = ~160 FakeQuant nodes.
    * **Conclusion: Implementing STE ensures gradients bypass the rounding operation, restoring accuracy.**
