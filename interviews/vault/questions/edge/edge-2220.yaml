title: Debugging gradient flow through quantization-aware training on Jetson Orin
scenario: 'You are implementing quantization-aware training (QAT) for an EfficientNet-B0 model targeting INT8 deployment. After inserting fake quantization nodes, the model''s validation accuracy during QAT plateaus at 10% below the FP32 baseline.'
question: 'How should FakeQuant be implemented so gradients flow during QAT for the INT8 target?'
details:
  realistic_solution: 'Implement FakeQuant using a Straight-Through Estimator (STE): the forward pass computes true quantization simulation (round), but the backward pass returns the gradient unchanged (identity). Verify gradient flow using `register_hook` on each layer''s output to confirm non-zero gradients bypass the non-differentiable rounding nodes.'
  common_mistake: |
    **The Pitfall:** Using a standard step function (round-to-nearest) as-is in fake quantization.
    **The Rationale:** Candidates implement the forward pass correctly but forget that step functions have zero gradients almost everywhere.
    **The Consequence:** Without a Straight-Through Estimator (STE), gradients drop to zero and the model cannot learn quantization-friendly weight placements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EfficientNet-B0 params: 5.3M across ~80 conv layers.
       - Expected QAT INT8 accuracy drop: ~0.5-1%.
       - Observed drop: 10%.
    2. **Calculations:**
       - FakeQuant requirement: Each conv layer needs weight + activation FakeQuant = ~160 FakeQuant nodes.
       - The 10% accuracy drop confirms catastrophic gradient death at these 160 nodes.
    3. **Conclusion & Interpretation:**
       - **Implementing STE ensures gradients bypass the rounding operation, fully restoring accuracy.** (Result: Gradient-Bound)
