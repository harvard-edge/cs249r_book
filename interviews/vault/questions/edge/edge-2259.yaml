title: LoRA Rank Compression via SVD for Memory-Constrained Inference
scenario: An edge device with 4GB RAM is running a 3B parameter INT4 model (1.5GB) with a LoRA r=64 adapter (190MB). The combined footprint causes allocation failures at runtime.
question: Why is the 3B INT4 model with an r=64 LoRA adapter failing on 4GB RAM, and how would you fix it without degrading accuracy?
details:
  realistic_solution: 'LoRA adapter memory analysis: r=64 for a 3B model is extreme — most tasks need r at most 16. The adapter was likely trained with high rank for quality but can be compressed post-training via SVD truncation. SVD compression: delta_W = B*A = U*S*V^T. Truncate to top-k singular values where k retains 95% of total variance. For r=64, often top 16 singular values capture >95% of variance. Compress to effective rank 16. New adapter size: 190MB * (16/64) = 47.5MB. Alternatively: merge the adapter into the base weights at deployment (offline), zero runtime adapter memory at cost of losing adapter hot-swap.'
  common_mistake: |
    **The Pitfall:** Immediately reducing the base model precision to INT2 to free RAM.
    **The Rationale:** Engineers assume the massive base model is the only dial they can turn to reduce memory.
    **The Consequence:** INT2 quantization causes severe accuracy degradation on 3B models, ruining model quality when compressing the LoRA adapter via SVD was a lossless alternative.
  napkin_math: |
    1. **LoRA r=64 Memory**: Stated adapter size is 190MB.
    2. **SVD Compression**: Compressing rank from 64 to 16: 190MB * (16/64) = **47.5 MB**.
    3. **System Memory Stack**: INT4 Weights (1500MB) + OS (500MB) + Activations (58MB) + Runtime (200MB) = 2258MB.
    4. **Adapter Fit**: With the uncompressed 190MB adapter + spikes, it exceeds available contiguous memory limits. With the 47.5MB adapter, total runtime memory is ~2305MB, fitting comfortably.
