title: LoRA Rank Compression via SVD for Memory-Constrained Inference
scenario: An edge device with 4GB RAM is running a 3B parameter INT4 model (1.5GB)
  with a LoRA r=64 adapter (190MB). The combined footprint causes allocation failures
  at runtime. Diagnose and fix without degrading accuracy.
question: Why is the 3B INT4 model with an r=64 LoRA adapter failing on 4GB RAM, and
  how would you fix it without degrading accuracy?
details:
  realistic_solution: 'LoRA adapter memory analysis: r=64 for a 3B model is extreme
    — most tasks need r at most 16. The adapter was likely trained with high rank
    for quality but can be compressed post-training via SVD truncation. SVD compression:
    delta_W = B*A = U*S*V^T. Truncate to top-k singular values where k retains 95%
    of total variance. For r=64, often top 16 singular values capture >95% of variance.
    Compress to effective rank 16. New adapter size: 190MB * (16/64) = 47.5MB. Memory
    freed: 142.5MB. OS + runtime for ARM Linux: ~800MB. Total after compression: 1500
    + 47.5 + 800 = 2347MB, fits in 4GB with 1.65GB headroom. Alternatively: merge
    the adapter into the base weights at deployment (offline), zero runtime adapter
    memory at cost of losing adapter hot-swap.'
  common_mistake: Immediately reducing the base model precision further (e.g., to
    INT2) to free RAM. INT2 quantization causes significant accuracy degradation on
    3B models and is rarely worth the 25% memory savings. The LoRA adapter itself
    is the better target for compression.
  napkin_math: 'LoRA r=64 on 3B model (d=2048, 28 layers, Q+V): 4 matrices * 28 *
    2 * 64 * 2048 * 2B = 56 MB. Stated 190MB implies all linear layers are adapted.
    SVD top-16: 190 * 16/64 = 47.5MB. OS: ~500MB. Inference activations (batch=1,
    seq=512): 512 * 2048 * 28 * 2B = 58MB. Runtime overhead: 200MB. Total: 1500 +
    47.5 + 500 + 58 + 200 = 2305MB. Fits with 1.7GB headroom.'
