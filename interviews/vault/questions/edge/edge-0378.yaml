title: 'The Orin''s Ridge Point: Roofline Analysis'
scenario: You're evaluating an NVIDIA Jetson AGX Orin for a real-time object detection model in an autonomous
  vehicle. The spec sheet lists a peak INT8 performance of 275 TOPS and a memory bandwidth of 204.8 GB/s.
  To understand its fundamental limitations, calculate the device's 'ridge point'. What does this value
  represent?
question: "What is the Jetson AGX Orin's ridge point from 275 TOPS and 204.8 GB/s, and what does that value represent?"
details:
  realistic_solution: The ridge point is the minimum arithmetic intensity (Ops/Byte) a model needs to
    be compute-bound rather than memory-bound. It's the point on the roofline graph where the performance
    ceiling transitions from being limited by memory bandwidth to being limited by peak computational
    throughput. For the Jetson AGX Orin, an arithmetic intensity above ~1,342 Ops/Byte means the workload
    is compute-bound.
  common_mistake: A common mistake is to ignore the units, especially the difference between Tera- (10^12)
    and Giga- (10^9), or to confuse Gigabytes (GB) with Gigabits (Gb). This leads to an answer that is
    off by a factor of 8 or 1000. Another error is inverting the formula, calculating Bytes/Op instead
    of Ops/Byte, which fundamentally misunderstands what arithmetic intensity represents.
  napkin_math: Ridge Point = Peak Performance / Memory Bandwidth
  options:
  - ~168 Ops/Byte
  - ~1.3 Ops/Byte
  - ~1,342 Ops/Byte
  - ~0.74 Bytes/Op
  correct_index: 2
