title: The A/B Partitioning Storage Tax
scenario: You are designing an edge device with a 1 MB application firmware image (model + code). To ensure
  safe and reliable over-the-air (OTA) updates with rollback capabilities, you're using an A/B partitioning
  scheme. Identify the approximate minimum flash storage required for the device, accounting for the two
  application partitions and a typical 100 KB overhead for the bootloader and operating system.
details:
  realistic_solution: The correct approach is to sum the storage for the operating system/bootloader overhead
    and two full application partitions. One partition (A) runs the active firmware, while the other (B)
    is used to download the new firmware. Once validated, the bootloader switches to boot from partition
    B. Partition A is kept as a fallback until the next update cycle. Therefore, the minimum required
    storage is the OS overhead plus twice the application image size.
  common_mistake: Engineers often forget that A/B partitioning for OTA updates requires provisioning space
    for *two* complete copies of the application image. They calculate storage based on just one copy,
    failing to account for the inactive partition that holds the old version for rollback or receives
    the new version during an update.
  napkin_math: Total Flash = (OS + Bootloader) + (App Image Size × 2)
  options:
  - ~1.1 MB
  - ~2.1 MB
  - ~2.0 MB
  - Slightly more than 1 MB, for a delta update
  correct_index: 1
