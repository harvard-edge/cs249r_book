title: Optimizing INT8 Matrix Multiplication on NVIDIA Jetson Orin
scenario: You are optimizing a critical INT8 matrix multiplication (GEMM) layer within a deep learning
  inference pipeline running on an NVIDIA Jetson Orin. This device features 32 GB LPDDR5 memory and delivers
  up to 275 TOPS (INT8) at a 60W power budget. Your profiling indicates this GEMM operation is significantly
  underperforming, not fully utilizing the available hardware capabilities.
question: "How would you optimize the underperforming INT8 GEMM on Jetson Orin for Tensor Core utilization, coalescing, and occupancy?"
details:
  realistic_solution: To maximize Tensor Core utilization, ensure input/output tensors are aligned to
    Tensor Core-friendly dimensions and data types (INT8). Employ cuBLASLt or specialized CUDA kernels
    leveraging WGMMA/MMA instructions. For memory coalescing, design kernel memory access patterns so
    that threads within a warp access contiguous global memory locations, often achieved through proper
    indexing and data tiling into shared memory. To improve occupancy, carefully tune thread block sizes
    and grid dimensions, considering register and shared memory usage to allow sufficient warps per Streaming
    Multiprocessor (SM) to hide memory access latencies. Iterative profiling and analysis using tools
    like Nsight are crucial for fine-tuning these parameters.
  common_mistake: Neglecting data alignment requirements for Tensor Cores, failing to optimize for memory
    coalescing, or using suboptimal kernel launch configurations (thread block/grid dimensions, shared
    memory usage) that lead to low GPU occupancy and thus hide memory latency inefficiently.
  napkin_math: The NVIDIA Jetson Orin offers a theoretical peak INT8 compute throughput of 275 TOPS and
    a memory bandwidth of approximately 204.8 GB/s (assuming 32GB LPDDR5 at 6400 MT/s with a 256-bit interface).
    If an INT8 GEMM operation requires, for example, 3 bytes of data transfer from/to global memory per
    effective INT8 operation (two inputs, one output, ignoring intermediate accumulation), then the maximum
    achievable performance, if purely memory-bound, would be (204.8 GB/s) / (3 Bytes/INT8-Op) ≈ 68.26
    Giga-INT8-Ops/s. This value is significantly lower than 275 TOPS, highlighting that without aggressive
    data reuse strategies (like tiling with shared memory) to increase operational intensity, the GEMM
    operation can easily become memory-bandwidth bound rather than compute-bound.
