validation_issues:
- 'The Napkin Math for arithmetic intensity calculation: ''To saturate 400 TOPS (200 Tera-MACs/second)''
  implies that 400 TOPS = 200 Tera-MACs/second, which needs clarification as TOPS (Tera Operations Per
  Second) and Tera-MACs/second are often used interchangeably or have a 2x relationship depending on the
  definition of an ''operation''. The relationship should be explicitly stated if a conversion factor
  is being used.'
- The KV-cache token count 'If a single token's KV-cache requires 256 KB, the 17 GB remaining memory supports
  a maximum of ~66,400 tokens in flight' is a generic number not explicitly tied to a model or hidden
  dimension within the problem, making it hard to verify.
