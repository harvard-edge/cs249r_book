title: Qualcomm Cloud AI 100 Specifications
scenario: You are sizing an on-premise inference cluster using the Qualcomm Cloud AI 100 accelerator for high-throughput edge workloads.
question: What are the baseline INT8 throughput, memory capacity, and power consumption of a single Qualcomm Cloud AI 100 card?
details:
  realistic_solution: 'The candidate should correctly recall that the Qualcomm Cloud AI 100 provides 400 TOPS INT8 compute, 32 GB of LPDDR4x memory, and operates at a 75W TDP. Recalling these exact specifications is essential for accurately estimating edge deployment costs.'
  common_mistake: |
    **The Pitfall:** Confusing the AI 100 specs with generic data center GPUs like the T4 or A10.
    **The Rationale:** Candidates haven't studied edge-specific hardware and guess based on more familiar NVIDIA products.
    **The Consequence:** They drastically underestimate TOPS or miscalculate memory bandwidth and power budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Qualcomm Cloud AI 100.
       - Compute capability: 400 TOPS INT8.
       - Power Envelope: 75W TDP.
    2. **Calculations:**
       - Compute Efficiency: 400 TOPS / 75 W = 5.33 TOPS/Watt.
       - Daily Energy Consumption: 75 W * 24 hours / 1000 = 1.8 kWh/day.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The AI 100 delivers massive INT8 compute at a highly efficient 5.3 TOPS/W, essential for sizing edge clusters properly.
