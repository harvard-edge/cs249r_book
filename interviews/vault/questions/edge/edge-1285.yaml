title: Diagnosing Power Throttling in Low-Compute Edge Models
scenario: You are deploying a custom transformer for on-premise inference on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, the system frequently hits its 75W power limit and throttles. However, profiling reveals that the INT8 compute utilization is hovering around only 15%, while memory bandwidth is nearly saturated.
question: Why does the Cloud AI 100 hit its 75W power limit with only 15% INT8 compute utilization but nearly saturated memory bandwidth?
details:
  realistic_solution: The root cause is the massive energy disparity between compute and off-chip memory access. Fetching data from the 32 GB LPDDR4x memory costs orders of magnitude more energy than performing an INT8 operation on-chip. Because the model has low arithmetic intensity, the power budget is being consumed by continuous memory transfers rather than actual matrix multiplications. The solution involves increasing arithmetic intensity via operator fusion or better utilizing on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Assuming compute is the primary driver of power consumption.
    **The Rationale:** Candidates suggest reducing precision or pruning to reduce FLOPs, missing that off-chip memory operations dominate the energy budget.
    **The Consequence:** Proposing computationally focused optimizations that do little to reduce the actual power draw, failing to resolve the throttling.
  napkin_math: |
    - 8-bit MAC operation cost = ~0.2 pJ.
    - 1 byte LPDDR4x fetch cost = ~150 pJ.
    - Compute at 15% (60 TOPS = 30 TMACs/s): 30e12 MACs/s * 0.2 pJ/MAC = 6W.
    - Memory at 136 GB/s: 136e9 bytes/s * 150 pJ/byte = 20.4W.
    - **Result: Compute (6W) + Memory (20.4W) + Board overhead = 75W limit. Memory operations are consuming more than 3x the energy of compute.**
