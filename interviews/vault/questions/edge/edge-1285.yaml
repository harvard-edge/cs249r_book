title: Diagnosing Power Throttling in Low-Compute Edge Models
scenario: You are deploying a custom transformer for on-premise inference on a Qualcomm
  Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, the system
  frequently hits its 75W power limit and throttles. However, profiling reveals that
  the INT8 compute utilization is hovering around only 15%, while memory bandwidth
  is nearly saturated. Explain why the accelerator is hitting its power limit despite
  the low compute utilization.
question: Why does the Cloud AI 100 hit its 75W power limit with only 15% INT8 compute
  utilization but nearly saturated memory bandwidth?
details:
  realistic_solution: The root cause is the massive energy disparity between compute
    and off-chip memory access. Fetching data from the 32 GB LPDDR4x memory costs
    orders of magnitude more energy than performing an INT8 operation on-chip. Because
    the model has low arithmetic intensity, the power budget is being consumed by
    continuous memory transfers rather than actual matrix multiplications. The solution
    involves increasing arithmetic intensity via operator fusion or better utilizing
    on-chip SRAM.
  common_mistake: Candidates often assume compute is the primary driver of power consumption
    and might suggest reducing the precision of MAC operations or pruning the model
    to reduce FLOPs, missing that off-chip memory operations dominate the energy budget
    here.
  napkin_math: Based on standard Horowitz energy estimates, an 8-bit MAC operation
    costs ~0.2 pJ, while fetching 1 byte from LPDDR4x costs ~150 pJ. At 15% utilization
    of the 400 TOPS capacity (60 TOPS = 30 TMACs), compute consumes roughly 30e12
    MACs/s * 0.2 pJ/MAC = 6W. If memory bandwidth is saturated at ~136 GB/s, memory
    accesses consume 136e9 bytes/s * 150 pJ/byte = 20.4W. Combined with the board's
    static power, PCIe interface, and control logic, this easily pushes the total
    system power to the 75W limit despite the low TOPS utilization.
