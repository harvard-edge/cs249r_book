title: Calculate Theoretical Minimum Compute Latency
scenario: We are deploying a heavy convolutional neural network for real-time video analytics on a Qualcomm
  Cloud AI 100 on-premise inference accelerator. The trace tools indicate that our primary bottleneck
  is entirely compute-bound during the dense 1x1 convolutions. A single inference pass requires exactly
  800 Giga Operations (GOPS) in INT8 precision. Assuming we can achieve a highly optimistic 100% compute
  utilization, calculate the theoretical minimum compute latency per frame in milliseconds.
details:
  realistic_solution: For a strictly compute-bound workload, the theoretical minimum latency is the total
    operations required divided by the peak compute throughput of the hardware. The Qualcomm Cloud AI
    100 provides 400 TOPS for INT8 workloads. By converting the peak throughput to match the unit of the
    required operations (or vice versa), we can find the absolute lowest possible latency.
  common_mistake: Candidates often fail to correctly convert between Tera Operations (TOPS) and Giga Operations
    (GOPS), leading to calculations that are off by orders of magnitude. They may also attempt to factor
    in memory bandwidth (LPDDR4x) or power (75W) despite the prompt explicitly stating the workload is
    purely compute-bound.
  napkin_math: 'Peak Compute = 400 TOPS = 400,000 GOPS.

    Operations per inference = 800 GOPS.

    Theoretical Minimum Latency = (800 GOPS) / (400,000 GOPS/sec) = 0.002 seconds.

    Convert to milliseconds: 0.002 seconds * 1000 = 2.0 ms per frame.'
