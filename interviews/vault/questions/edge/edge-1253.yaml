title: KV-Cache Budgeting on Cloud AI 100
scenario: You are deploying a 13-billion parameter LLM quantized to INT8 on an inference accelerator. The accelerator has a strict 32 GB memory limit. The model architecture consists of 40 layers and a hidden dimension of 5120. During load testing with a batch size of 32 and a sequence length of 2048 tokens, the system encounters an Out-of-Memory (OOM) error. The INT8 weights only consume 13 GB. Assume the KV-cache is also stored in INT8 format.
question: Why does the batch-32, 2048-token INT8 13B LLM workload exceed the 32 GB memory limit?
details:
  realistic_solution: LLM footprints encapsulate weight arrays plus massively exploding runtime states dictated by sequence batching. Without Grouped-Query Attention (GQA), the traditional Multi-Head Attention strictly mandates massive KV memory block structures that linearly outpace weight memory. Reducing maximum batch thresholds or employing specialized KV cache paging are required operational mitigations.
  common_mistake: |
    **The Pitfall:** Assuming memory usage is dominated almost entirely by model weights.
    **The Rationale:** Candidates neglect the severe linear scaling of the KV-cache with batch size and sequence length.
    **The Consequence:** Failing to dimension the system correctly, resulting in runtime OOM errors that crash the deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13B INT8 LLM
       - Layers: 40, Hidden dim: 5120
       - Batch size: 32, Sequence length: 2048
       - LPDDR4x Memory Limit: 32 GB
    2. **Calculations:**
       - KV Cache per token (INT8): 2 (K,V) * 40 * 5120 * 1 byte = 409,600 bytes
       - Total KV Cache: 409,600 bytes * 2048 tokens * 32 seqs ≈ 26.84 GB
       - Total Memory required: 13 GB (Weights) + 26.84 GB (KV) = 39.84 GB
       - Deficit: 39.84 GB - 32 GB = 7.84 GB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Limit.** The linear scaling of KV cache with batch size results in a 7.84 GB memory deficit. Grouped-Query Attention (GQA) is required.
