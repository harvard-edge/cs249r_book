title: KV-Cache Budgeting on Cloud AI 100
scenario: You are deploying a 13-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 inference accelerator. The accelerator has a strict 32 GB memory limit. The model architecture consists of 40 layers and a hidden dimension of 5120. During load testing with a batch size of 32 and a sequence length of 2048 tokens, the system encounters an Out-of-Memory (OOM) error. The INT8 weights only consume 13 GB. Assume the KV-cache is also stored in INT8 format.
question: Why does the batch-32, 2048-token INT8 13B LLM workload exceed the 32 GB Cloud AI 100 memory limit?
details:
  realistic_solution: The OOM occurs because the KV-cache footprint for a batch size of 32 at a 2048 context length requires roughly 26.8 GB, which added to the 13 GB weight footprint vastly exceeds the device limits. To deploy successfully on the 32 GB LPDDR4x memory budget, the engineer must constrain the KV-cache by reducing the maximum batch size to 16, capping the sequence length, or migrating to a model architecture that uses Grouped-Query Attention (GQA) to drastically shrink the KV-cache size.
  common_mistake: |
    **The Pitfall:** Assuming memory usage is dominated almost entirely by model weights.
    **The Rationale:** Candidates neglect the severe linear scaling of the KV-cache with batch size and sequence length.
    **The Consequence:** Failing to dimension the system correctly, resulting in runtime OOM errors that crash the deployment.
  napkin_math: |
    1. Model Weights: 13 billion parameters * 1 byte (INT8) = 13 GB.
    2. KV-Cache per token (INT8): 2 (K & V) * 40 (layers) * 5120 (hidden dim) * 1 byte = 409,600 bytes.
    3. Total KV-Cache (Batch 32, Seq 2048): 409,600 * 2048 * 32 = ~26.84 GB.
    4. Total Memory Required: 13 GB (weights) + 26.84 GB (KV) = 39.84 GB.
    5. Deficit: 39.84 GB - 32 GB = **7.84 GB over budget**.
