title: Edge TPU Operator Fallback Diagnosis
scenario: You are deploying a vision model to a Google Coral Edge TPU connected via USB. The hardware
  is rated for a highly efficient 4 TOPS of INT8 performance at just a 2W power envelope, so you expect
  inference to take under 5ms. Instead, you observe that inference latency is over 150ms and the host
  CPU usage suddenly spikes to 100% during prediction. What is the hardware-level root cause of this symptom,
  and how do you confirm it?
details:
  realistic_solution: The root cause is an operator fallback to the host CPU due to limited operator support.
    Because the Coral Edge TPU strictly requires INT8 quantization and supports a limited subset of operations,
    an unsupported layer (e.g., a custom activation or an improperly quantized op) forces the compiler
    to partition the graph. This forces the TPU to pause execution, copy intermediate tensors across the
    USB/PCIe bus to the host CPU for processing, and then copy the results back, bottlenecking the entire
    pipeline. This is confirmed by checking the Edge TPU compiler log for 'operation mapped to CPU'.
  common_mistake: Candidates often incorrectly diagnose this as a thermal throttling issue due to the
    2W power envelope or assume the input image transfer over the USB bus is bottlenecking the system.
    They fail to analyze how the compiler handles operations that cannot be mapped to the accelerator.
  napkin_math: A 10 GOPS model on a 4 TOPS Edge TPU should theoretically execute in (10 * 10^9) / (4 *
    10^12) = 2.5ms. If the graph partitions, an intermediate 2MB tensor might be sent over a USB 2.0 bus
    (effective 35 MB/s). Transferring 2MB to the host and 2MB back to the TPU takes (4 MB / 35 MB/s) =
    114ms purely in communication overhead. Combined with the slow host CPU execution time, this perfectly
    explains the 150ms+ latency and 100% CPU utilization symptom.
