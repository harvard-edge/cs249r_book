title: Optimizing Intersectional Fairness Evaluation
scenario: You are deploying a biometric authentication system on an on-premise server powered by a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). You need to continuously evaluate intersectional fairness (equalized odds) across 40 overlapping demographic subgroups on a rolling validation set of 1 million samples. Currently, the evaluation pipeline feeds each subgroup's data sequentially into the accelerator, which causes severe utilization drops and delays.
question: How do you analyze this bottleneck and optimize the pipeline to ensure fairness metrics are calculated efficiently without exceeding the power budget or memory limits?
details:
  realistic_solution: Decouple the neural network inference from the subgroup metric aggregation. Pass the 1 million unique validation samples through the Qualcomm Cloud AI 100 in a single, highly-batched continuous stream using INT8 precision to maximize hardware utilization. Export the output logits to the host, and then apply a sparse matrix multiplication with a binary subgroup membership matrix to compute demographic parity and equalized odds simultaneously.
  common_mistake: |
    **The Pitfall:** Over-relying on data loaders or attempting simultaneous memory loads.
    **The Rationale:** Candidates propose creating separate dataloaders for each of the 40 subgroups or loading all masks simultaneously to the device.
    **The Consequence:** This causes severe host-to-device memory transfer bottlenecks or risks an OOM kill by exceeding the 32 GB capacity.
  napkin_math: |
    1. **Throughput:** Standard vision model = 8 GOPS. AI 100 limit = 400 TOPS. Max throughput = `400,000 / 8 = 50,000 imgs/sec`.
    2. **Sequential Overhead:** Evaluating 40 subgroups redundantly means processing `40 * 1M` samples (worst case) or heavy dataloader reloading.
    3. **Optimized Inference:** Processing 1M unique samples once takes `1,000,000 / 50,000 = 20 seconds`.
    4. **Memory Footprint:** Logits for 1M samples * 2 classes * 4 bytes (FP32) = 8 MB.
    5. **Memory Constraint Check:** 8 MB easily fits in the 32 GB LPDDR4x alongside the model weights.
    **Decoupling inference from aggregation drops execution time to 20 seconds using only 8 MB of memory for the stored logits.**
