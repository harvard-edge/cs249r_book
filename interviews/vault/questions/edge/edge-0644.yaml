title: The Autonomous 'Cloud-to-Edge' VLM Deployment
scenario: You are the Lead ML Systems Engineer for the autonomous driving unit at a major automaker. Your company has just trained a groundbreaking 100B-parameter, multi-modal Vision-Language Model (VLM) in the cloud. This 'Driver-VLM' achieves state-of-the-art hazard prediction by processing sensor streams and generating descriptive text of potential dangers. However, you need to deploy this VLM on the vehicle's embedded compute platform, which has only 16 GB of shared memory and a strict 50ms latency budget.
question: What is the optimal strategy to deploy this 100B-parameter VLM onto a 16 GB edge platform with a 50ms latency budget?
details:
  realistic_solution: A successful plan requires a multi-stage strategy that treats the problem as one of progressive model reduction and targeted optimization, where each stage enables the next.
  common_mistake: |
    **The Pitfall:** Proposing a linear, naive application of tools like unstructured pruning or TensorRT on the 100B model.
    **The Rationale:** Candidates assume compilers or pruning can solve a 10,000x model size gap, and they focus only on single-pass latency, failing to budget for sequential token generation.
    **The Consequence:** The deployment is computationally infeasible, and the autoregressive token generation blows past the 50ms latency budget.
  napkin_math: |
    *   100B parameters in FP16 requires ~200 GB memory, which exceeds the 16 GB platform by >12x.
    *   Assume aggressive distillation and pruning yields a 500M parameter student model.
    *   INT8 quantization of 500M params = 500 MB weights.
    *   Hazard description requires generating 8 tokens.
    *   **To meet 50ms budget, each autoregressive token generation step must take <= 6ms (including visual encoding), requiring a massive reduction from 100B to ~500M parameters.**
