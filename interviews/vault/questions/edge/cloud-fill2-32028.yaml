title: KV-Cache-Aware Load Balancing at the Edge
scenario: You run a distributed inference service across 4 edge nodes (each with one GPU), serving a conversational
  AI. Users report that multi-turn conversations are much slower than single-turn queries. Your load balancer
  uses round-robin. Diagnose the problem and propose a solution.
details:
  realistic_solution: 'When round-robin sends turn 2 of a conversation to a different node than turn 1,
    the new node has no KV cache for the prior context. It must reprocess all previous tokens (prefix
    recomputation) before generating the response, adding latency proportional to the conversation history
    length. For a conversation with 2000 tokens of history, this adds ~1-2 seconds of unnecessary prefill.
    Solution: session-affinity routing (sticky sessions). Hash the conversation_id to a specific node
    and route all turns of that conversation to the same node, preserving the KV cache. Implementation:
    (1) hash(conversation_id) → node_id, (2) if node is overloaded, migrate the conversation (send serialized
    KV cache to new node, ~50 MB for 2K context on 7B model, takes ~10ms over 10GbE), (3) set KV cache
    TTL to expire idle conversations and free GPU memory. This is exactly what prefix caching in vLLM
    solves at the framework level.'
  common_mistake: Thinking the model needs to be reloaded per turn. The model weights are already loaded
    on each node. The issue is the KV cache — multi-turn conversations have accumulated KV cache from
    prior turns, and round-robin sends turn N to a different node than turn N-1, requiring full recomputation
    of the KV cache.
  napkin_math: '2000-token history recompute: 2000 tokens × 1ms/token prefill = 2s added latency per turn.
    With session affinity: 0s recompute. KV cache per conversation (7B model, 2K context): 32 layers ×
    2 × 4096 × 2K × 2 bytes = ~1 GB. 4 concurrent conversations per node = 4 GB KV cache.'
