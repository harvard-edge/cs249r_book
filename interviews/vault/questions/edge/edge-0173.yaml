title: The Edge Compute Ceiling
scenario: A team is considering an OTA update to deploy a new object detection model to a fleet of autonomous
  retail cameras running on Jetson AGX Orin devices. Before analyzing the model architecture in detail,
  they need to know the fundamental compute limit of the hardware. What is the advertised peak INT8 compute
  performance of a single Jetson AGX Orin?
details:
  realistic_solution: The Jetson AGX Orin provides a peak performance of 275 TOPS for INT8 operations.
    This number represents the theoretical maximum throughput and is the first and most important check
    for model deployment feasibility on the edge. If a model's required operations per second exceed this,
    it cannot be deployed without significant modification.
  common_mistake: Engineers often confuse the compute capabilities of different hardware classes. They
    might recall the spec for a smaller edge accelerator like a Hailo-8 (~26 TOPS) or misremember the
    spec for a datacenter GPU (~1000 TOPS), leading to an order-of-magnitude error in their feasibility
    analysis. Another common mistake is not differentiating between different Orin modules (e.g., AGX
    vs. Nano).
  napkin_math: This is a direct recall question based on hardware specifications. For a system with a
    33ms latency budget (i.e., ~30 FPS), the per-frame compute budget is `275 TOPS / 30 FPS ≈ 9.17 TOPs`.
    Any model requiring more than ~9 trillion operations per frame will not meet the real-time deadline.
  options:
  - 26 TOPS
  - 989 TOPS
  - 275 TOPS
  - 100 TOPS
  correct_index: 2
