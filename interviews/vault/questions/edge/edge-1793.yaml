title: Google Coral Edge TPU Supported Data Type
scenario: Your team is building a production health dashboard for a fleet of smart cameras accelerated by Google Coral Edge TPUs. To reduce deployment failures and improve MTBF, your alerting system must proactively flag models that are compiled with unsupported operators.
question: What specific data type must all model weights and activations be quantized to for successful execution on the Edge TPU?
details:
  realistic_solution: Implement a pre-deployment telemetry gate that explicitly validates 100% of the model graph is restricted to the INT8 datatype. Any floating-point operator will trigger a hard block in the CI pipeline, preventing silent fallback execution on the edge host CPU.
  common_mistake: |
    **The Pitfall:** Assuming modern edge accelerators universally support mixed-precision like FP16 or BF16.
    **The Rationale:** Candidates conflate the feature sets of high-end automotive GPUs with the deeply constrained, hyper-efficient systolic arrays of low-power edge ASICs.
    **The Consequence:** Deploying un-quantized or partially-quantized models that crash or crawl upon reaching production edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge TPU Capability: 4 TOPS
       - Power Envelope: 2W
    2. **Calculations:**
       - Hardware Efficiency = 4 TOPS / 2W = 2 TOPS/Watt natively in INT8.
       - Floating point execution drops efficiency effectively to 0 TOPS/Watt on the accelerator.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound. The silicon architecture strictly mandates INT8; anything else causes complete compilation failure.**
