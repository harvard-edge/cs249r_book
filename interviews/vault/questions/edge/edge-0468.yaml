title: The Transformer's Traffic Jam
scenario: You are an ML Systems Engineer on the perception team for an autonomous vehicle. Your team is trying to upgrade the primary pedestrian detection model on a Jetson AGX Orin, which has a hard 33ms (30 FPS) deadline. You are comparing two models: a CNN and a MicroViT with similar theoretical FLOPs.
question: Why is MicroViT slower than the CNN on Jetson Orin despite having similar or fewer computations?
details:
  realistic_solution: The MicroViT is severely memory-bandwidth bound. Vision Transformers induce non-local and irregular memory access patterns to construct attention maps, resulting in low arithmetic intensity. The CNN has regular, localized memory access patterns, leading to better utilization of the GPU's compute units.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on FLOPs or MACs as the primary measure of model latency.
    **The Rationale:** Engineers assume fewer mathematical operations automatically means faster execution, ignoring the "memory wall."
    **The Consequence:** Deploying ViT models that fail to meet real-time deadlines because they starve the compute units while waiting for memory transfers.
  napkin_math: |
    - **Hardware Ridge Point:** Jetson AGX Orin Ridge Point: 275 TOPS INT8 / 204.8 GB/s = 1,343 Ops/Byte.
    - **CNN Arithmetic Intensity:** e.g., 2 GOps, 8 MB memory access → AI = 250 Ops/Byte.
    - **ViT Arithmetic Intensity:** e.g., 2 GOps, 20 MB (irregular attention map access) → AI = 100 Ops/Byte.
    - **Final Result:** **Both are memory-bound, but the ViT is 2.5× more memory-bound (AI of 100 vs 250), leading to drastically lower FPS despite similar compute requirements.**
