title: The Transformer's Traffic Jam
scenario: You are upgrading a pedestrian detection model on a Jetson AGX Orin with a hard 33ms deadline. You are comparing a CNN and a MicroViT with identical theoretical FLOPs.
question: Why is MicroViT slower than the CNN on Jetson Orin despite having similar computations?
details:
  realistic_solution: The MicroViT is severely memory-bandwidth bound. Vision Transformers induce non-local and irregular memory access patterns (FlashAttention-2 limits notwithstanding), resulting in low arithmetic intensity. CNNs have regular, localized memory patterns utilizing L2 caches effectively.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on FLOPs or MACs as the primary measure of model latency.
    **The Rationale:** Engineers assume fewer mathematical operations automatically means faster execution, ignoring the "memory wall."
    **The Consequence:** Deploying ViT models that fail to meet real-time deadlines because they starve compute units while waiting for DDR transfers.
  napkin_math: |
    1. **Assumptions & Constraints:** Jetson Ridge Point = 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte. Both models require 2 GOps. CNN accesses 8 MB; ViT accesses 20 MB.
    2. **Calculations:** CNN AI = 2G / 8M = 250 Ops/Byte. ViT AI = 2G / 20M = 100 Ops/Byte.
    3. **Conclusion & Interpretation:** **Result: ViT has an AI of 100 Ops/Byte.** The ViT is 2.5x more memory-bound, leading to drastically lower FPS. **System Status: Memory-Bandwidth-Bound.**
