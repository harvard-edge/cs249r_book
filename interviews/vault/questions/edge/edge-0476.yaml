title: 'The Perception Deadline Miss'
scenario: 'You are an ML Systems Engineer on a self-driving car''s perception team. Your system must process camera frames and detect obstacles in under 33ms to meet the real-time deadline. Your current efficient MobileNetV2 CNN detector runs in 25ms. The modeling team trained a new Vision Transformer (ViT) detector with a similar parameter count (~5M). However, when deployed, it takes 100ms to process a single frame, causing catastrophic deadline misses.'
question: 'Why does the 5M-parameter ViT take 100ms when the 5M-parameter MobileNetV2 detector takes 25ms, despite nearly identical parameter counts?'
details:
  realistic_solution: 'The root cause is the difference in computational complexity between the two architectures. A CNN''s FLOPs scale roughly linearly with the number of input pixels or patches, whereas a standard ViT''s self-attention mechanism scales quadratically ($O(N^2)$) with the number of patches. This quadratic scaling leads to a massive increase in the total FLOPs required for inference. On a compute-limited edge device, this 4x increase in computation results in the observed 4x increase in latency. The correct path forward is to use Neural Architecture Search (NAS) to find an efficient CNN or hybrid architecture explicitly optimized for the hardware constraints and the 33ms latency budget.'
  common_mistake: |
    **The Pitfall:** Mistakenly believing that parameter count is the primary driver of inference latency.
    **The Rationale:** Candidates equate model size directly with computational cost, ignoring the underlying operations.
    **The Consequence:** They fail to realize that a standard ViT's dense matrix multiplications in its self-attention mechanism are far more computationally expensive than a MobileNet's depthwise separable convolutions, leading to unexpected latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN compute scales linearly: $O(N)$ with spatial resolution $N$.
    - Standard ViT self-attention compute scales quadratically: $O(N^2)$.

    **Calculations:**
    - If image resolution doubles ($4\times$ pixels):
      - CNN compute increases $4\times$.
      - ViT attention compute increases $16\times$.
    - An attention layer taking 5ms at low resolution will jump to 80ms at higher resolutions.

    **Conclusion & Interpretation:**
    - **Result: 100 ms (Compute-Bound)**. The $O(N^2)$ scaling causes the ViT to massively exceed the 33ms budget despite having the same parameter count.
  options:
  - 'The ViT has poor cache locality and is overwhelming the memory bandwidth. We should reduce the model''s embedding dimension.'
  - 'The 5M parameters in the ViT are stored in FP32, while the CNN''s were INT8, leading to a 4x larger memory footprint that is causing swapping to flash storage.'
  - 'The ViT''s $O(N^2)$ compute scaling in its attention layers creates a massive FLOPs burden compared to the CNN''s linear scaling, making it compute-bound. We should use NAS to find an efficient architecture.'
  - 'This is a training-serving skew issue. According to Chinchilla scaling laws, the ViT was undertrained, and we need to increase the training dataset size by 20x.'
