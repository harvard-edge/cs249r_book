title: 'Fault Tolerance: Mastery — Recovery Time Analysis for Edge Learning System'
scenario: 'Your Jetson Orin-based quality inspection system experienced 3 failures last month: (1) storage corruption requiring cloud restore, (2) model performance degradation requiring rollback, (3) power supply failure requiring hardware swap. Analyze each recovery path, actual recovery times, and design improvements to meet a 5-minute RTO for all failure modes.'
question: How would you analyze the three Orin failure recovery paths and improve each to meet a 5-minute RTO?
details:
  realistic_solution: Each failure type needs its own recovery path optimized for RTO. 5-minute RTO requires automation for all paths.
  common_mistake: |
    **The Pitfall:** Accepting long recovery times as an unavoidable reality of edge hardware.
    **The Rationale:** Candidates fail to formally analyze root causes and design targeted, automated recovery paths for each specific failure mode.
    **The Consequence:** Edge deployments suffer extended downtime, completely missing the strict 5-minute RTO.
  napkin_math: |
    1. Assumptions & Constraints:
       - RTO: 5 minutes (300 seconds)
       - Model size: 200 MB
       - LTE bandwidth: 100 Mbps (12.5 MB/s)
       - Local NVMe read speed: 4 GB/s
       - LAN download speed: 1 Gbps (125 MB/s)
    2. Calculations:
       - Failure 1 (Cloud restore): 200 MB / 12.5 MB/s = 16s. Total = 16s + 120s boot = 136s
       - Failure 2 (Rollback): 200 MB / 4000 MB/s = 0.05s. Total = 0.05s + 30s reinit = 30.05s
       - Failure 3 (Hot spare via LAN): 200 MB / 125 MB/s = 1.6s. Total = 1.6s + 180s physical swap = 181.6s
    3. Conclusion & Interpretation:
       - **Result: RTO-Bound. By utilizing pre-cached models and LAN-based hot spares, all three failure modes strictly meet the 5-minute RTO.**
