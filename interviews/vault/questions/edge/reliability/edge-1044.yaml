title: 'Fault Tolerance: Fluency — MTBF Calculation for Jetson Orin Fleet'
scenario: You manage 1,000 Jetson Orin (32GB LPDDR5, 60W) devices deployed in outdoor industrial environments. Individual MTBF is 40,000 hours.
question: For 1,000 outdoor Orin devices with 40,000-hour MTBF, what monthly failure rate and spare inventory are needed for 98% availability?
details:
  realistic_solution: |
    Fleet failure rate = 1000 / MTBF_single. Using a 30-day month, expected failures per month = fleet_rate x 720 hours. Availability depends on how many devices are awaiting replacement during the repair cycle: expected unavailable devices = fleet_rate x repair time. For a 5-day repair cycle, stock at least the 98th-percentile repair-cycle demand and replenish spares monthly.
  common_mistake: |
    **The Pitfall:** Confusing the MTBF of a single device with the MTBF of the entire fleet.
    **The Rationale:** Candidates erroneously assume a 40,000-hour MTBF means the fleet will run for years before a single failure occurs.
    **The Consequence:** Failing to provision spare inventory or maintenance workflows, leading to severe downtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 1,000 Jetson Orin devices.
    - Individual MTBF: 40,000 hours.
    - Repair cycle: 5 days (120 hours).
    - Availability target: at least 98%, meaning no more than 20 of 1,000 devices unavailable on average.
    - Use a Poisson approximation for failures during the 5-day repair cycle.

    **Calculations:**
    - Fleet failure rate: 1,000 / 40,000 hours = 0.025 failures/hour.
    - Monthly failures using 30 days/month: 0.025 failures/hour * 720 hours/month = 18 failures/month.
    - Expected devices awaiting repair: 0.025 failures/hour * 120 hours = 3 devices.
    - Availability with average repair backlog: 1 - 3/1000 = 99.7%, which exceeds the 98% target.
    - Repair-cycle demand distribution: Poisson(lambda=3). P(X <= 6) is about 96.6%, while P(X <= 7) is about 98.8%, so 7 spares covers at least a 98% repair-cycle service level.
    - Spare inventory: keep at least 7 ready spares on site and plan for about 18 replacements/month through replenishment.

    **Conclusion & Interpretation:**
    - **Result: 18 expected failures/month and 7 on-site spares for a 5-day repair cycle (Reliability-Bound).** The average backlog is 3 devices, giving about 99.7% average availability, while 7 spares targets at least a 98% service level for repair-cycle demand.
