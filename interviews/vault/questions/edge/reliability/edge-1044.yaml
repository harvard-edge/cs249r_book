title: 'Fault Tolerance: Fluency — MTBF Calculation for Jetson Orin Fleet'
scenario: You manage 1,000 Jetson Orin (32GB LPDDR5, 60W) devices deployed in outdoor industrial environments. Individual MTBF is 40,000 hours.
question: For 1,000 outdoor Orin devices with 40,000-hour MTBF, what monthly failure rate and spare inventory are needed for 98% availability?
details:
  realistic_solution: |
    Fleet failure rate = 1000 / MTBF_single. Expected failures per month = fleet_rate x 720 hours. Availability depends on how many devices are awaiting replacement during the repair cycle: expected unavailable devices = fleet_rate x repair time. For a 5-day repair cycle, stock at least the 98th-percentile repair-cycle demand and replenish spares monthly.
  common_mistake: |
    **The Pitfall:** Confusing the MTBF of a single device with the MTBF of the entire fleet.
    **The Rationale:** Candidates erroneously assume a 40,000-hour MTBF means the fleet will run for years before a single failure occurs.
    **The Consequence:** Failing to provision spare inventory or maintenance workflows, leading to severe downtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 1,000 Jetson Orin devices.
    - Individual MTBF: 40,000 hours.
    - Repair cycle: 5 days (120 hours).
    - Availability target: at least 98%, meaning no more than 20 of 1,000 devices unavailable on average.
    - Use a Poisson approximation for failures during the 5-day repair cycle.

    **Calculations:**
    - Fleet failure rate: 1,000 / 40,000 hours = 0.025 failures/hour = 18 failures/month.
    - Expected devices awaiting repair: 0.025 failures/hour * 120 hours = 3 devices.
    - Availability with average repair backlog: 1 - 3/1000 = 99.7%, which exceeds the 98% target.
    - 98th-percentile failures in a 5-day repair window for Poisson(lambda=3) is about 7 failures.
    - Spare inventory: keep at least 7 ready spares on site and plan for ~18 replacements/month through replenishment.

    **Conclusion & Interpretation:**
    - **Result: 18 expected failures/month and ~7 on-site spares for a 5-day repair cycle (Reliability-Bound).** The 98% availability target is satisfied by keeping the repair backlog well below 20 devices, with monthly replenishment sized to expected failures.
