title: 'Recall KL Divergence for Edge Drift'
scenario: 'You are deploying a quality inspection model on an NVIDIA Jetson Orin located on a factory floor. The device operates under a strict 60W TDP limit, utilizing its Ampere GPU and DLA accelerator for high-throughput inference. To monitor for data drift without adding significant overhead, you need to calculate a statistical distance between the incoming image brightness distribution and the training distribution.'
question: 'What is the mathematical definition of Kullback-Leibler (KL) divergence, and is it a symmetric metric?'
details:
  realistic_solution: 'KL divergence is a measure of how one probability distribution differs from a reference distribution, defined as the sum of P(x) * log(P(x)/Q(x)) over all events x. It is fundamentally asymmetric. On edge devices, computing KL divergence on low-dimensional summary statistics like 1D histograms ensures drift monitoring consumes negligible compute.'
  common_mistake: |
    **The Pitfall:** Assuming KL divergence is a true, symmetric distance metric.
    **The Rationale:** Candidates confuse KL divergence with symmetric metrics like Jensen-Shannon Divergence or Population Stability Index (PSI).
    **The Consequence:** Implementing symmetric checks (KL(P||Q) == KL(Q||P)) in drift detection logic that fail or produce misleading alert thresholds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Formula: KL(P||Q) = Σ P(x) * log(P(x)/Q(x)).
    - Symmetry: No, it is fundamentally asymmetric.
    - Drift monitoring load (256-bin histogram): 60 FPS * 256 bins * 4 bytes = 61.4 KB/s.
    - Jetson Orin bandwidth: 204.8 GB/s.

    **Calculations:**
    - Telemetry impact: 61.4 KB/s / 204.8 GB/s = 0.00003%.

    **Conclusion & Interpretation:**
    - **Result: 0.00003% Bandwidth Impact (Compute-Bound)**. The telemetry uses an imperceptible fraction of memory bandwidth, preserving the 60W budget for inference.
