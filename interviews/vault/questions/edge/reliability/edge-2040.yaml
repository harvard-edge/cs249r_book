title: Diagnosing Graceful Degradation on Jetson Orin for Edge ML
scenario: 'An autonomous delivery robot operating on an NVIDIA Jetson Orin at the edge is running a critical perception model. Under increasing environmental clutter and fluctuating network connectivity, the robot''s object detection accuracy starts to drop intermittently, and its path planning becomes erratic. The Jetson Orin''s CPU utilization remains around 70%, GPU utilization fluctuates between 60-90%, and memory usage is consistently at 85% with occasional spikes to 95%.'
question: How would you diagnose the root cause of the performance degradation and the failure of graceful fallback mechanisms?
details:
  realistic_solution: 'Implement comprehensive system profiling using tools like tegrastats and Nsight Systems to track memory bandwidth, swap activity, and I/O wait times. The high memory usage and intermittent erratic behavior indicate swap thrashing. When the system attempts to load the fallback model, it forces memory pages to the slow eMMC, completely stalling the perception pipeline. Instead of a graceful degradation, the I/O block creates a hard failure.'
  common_mistake: |
    **The Pitfall:** Overlooking I/O blocking during fallback model activation.
    **The Rationale:** Engineers focus solely on CPU/GPU thermal limits, assuming that loading a fallback model simply "works" without validating the disk latency impact of swapping memories.
    **The Consequence:** The fallback mechanism itself stalls the perception pipeline, destroying graceful degradation entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Swap Requirement: Activating fallback swaps 1 GB of inactive memory to storage.
    - eMMC Write Speed: ~100 MB/s.

    **Calculations:**
    - Latency Cost: 1000 MB / 100 MB/s = 10 seconds.

    **Conclusion & Interpretation:**
    - **Result: 10 seconds (I/O-Bound Stall)**. A 10-second block completely stalls real-time perception, causing erratic path planning.
