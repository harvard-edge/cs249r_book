title: Designing an ISO 26262 ASIL-B Perception System on Hailo-8
scenario: You are tasked with designing a perception system for an autonomous driving feature (e.g., parking assist) that requires an ASIL-B functional safety level according to ISO 26262. The system utilizes a deep learning model running on a Hailo-8 AI processor, which provides 26 TOPS (INT8) within a 2.5W power envelope. The primary challenge is to ensure deterministic execution, implement necessary self-test routines, and integrate watchdog timers to meet the ASIL-B requirements, while also adhering to a 100ms end-to-end latency budget for perception.
question: How would you architect an ASIL-B Hailo-8 perception pipeline with deterministic latency, watchdogs, self-tests, and fault responses within 100 ms?
details:
  realistic_solution: |
    Use a time-partitioned ASIL-B pipeline with a fixed 100ms major cycle. Pin capture, preprocessing, Hailo inference, postprocessing, plausibility checks, and actuation handoff to deterministic RTOS tasks with bounded queues and no unbounded retries in the critical path. Add three watchdog layers: a system watchdog for the host process, an inference watchdog that expects a Hailo job heartbeat or completion inside its allocated slot, and an application watchdog that checks output freshness before the 100ms deadline. Run boot-time self-tests before enabling the feature, lightweight memory/model checksum checks at model load, and staggered background BIST or known-answer tests in reserved slack so they do not steal inference time. Use diverse redundancy for safety decisions, such as a simpler geometric/rule-based monitor or second lightweight model for plausibility, and define fault responses that complete inside the budget: discard stale outputs, hold the previous safe state only if allowed, degrade to a non-ML fallback, alert the vehicle controller, or disable the parking-assist feature. Validate the design with WCET measurements, fault injection, watchdog trip tests, and FMEA traceability.
  common_mistake: |
    **The Pitfall:** Ignoring the non-deterministic aspects of typical deep learning inference engines.
    **The Rationale:** Assuming standard software watchdog implementations are sufficient for safety certification.
    **The Consequence:** The system fails to meet robust ASIL-B safety requirements due to inadequate fault detection.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 compute: 26 TOPS (26,000 GOPS) INT8.
    - End-to-end latency budget: 100ms.
    - Example model cost: 50 GOPS.
    - Budget must include preprocessing, host/device transfer, inference, postprocessing, watchdog checks, self-tests, and scheduling jitter.

    **Calculations:**
    - 50 GOPS model ideal compute lower bound: (50 / 26,000) * 1000 ms = 1.9ms.
    - Example deterministic allocation: 60ms inference pipeline + 15ms preprocessing/postprocessing + 10ms transfers + 5ms watchdog/self-test + 10ms jitter margin = 100ms.
    - The 1.9ms number is useful only as a best-case accelerator floor; measured worst-case execution time must fit the allocated inference slot.

    **Conclusion & Interpretation:**
    - **Result: 1.9ms ideal compute floor, not guaranteed safety-check headroom.** ASIL-B feasibility depends on measured worst-case latency for the full pipeline and reserved time for transfers, watchdogs, self-tests, and fault responses.
