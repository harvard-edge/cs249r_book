title: 'Incomplete Edge Checkpoint Policy'
scenario: 'A roadside perception gateway must recover after power loss in under 30 seconds. The team states the model is 800 MB and a local SSD is available.'
question: 'What information is missing to design checkpoint recovery under 30 seconds, and what bound follows from an 800 MB model image?'
details:
  realistic_solution: |
    The missing variables include OS boot time, NVMe/SSD read throughput, calibration state size, and rollback verification policies. The 800 MB model dictates a hard I/O lower bound. Achieving the 30-second SLA requires an optimized bootloader (e.g., U-Boot), an asynchronous model loading pipeline using memory-mapped I/O (mmap), and deferred integrity checks.
  common_mistake: |
    **The Pitfall:** Equating model size with full recovery time and ignoring boot, validation, calibration, and write-endurance constraints.
    **The Rationale:** Focusing only on the largest payload (the model) while ignoring the surrounding system orchestration and hardware bottlenecks.
    **The Consequence:** Designing a system that consistently fails to meet its 30-second recovery SLA in production environments.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: < 30 seconds recovery time.
    - Model size: 800 MB.
    - SSD speeds: 100 MB/s (Slow) vs 400 MB/s (Fast).

    **Calculations:**
    - Fast SSD Load: 800 MB / 400 MB/s = 2 seconds.
    - Slow SSD Load: 800 MB / 100 MB/s = 8 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2-8 Seconds Disk Read Time (I/O-Bound).** The remaining time budget must accommodate OS boot and hardware initialization, which are the true bottlenecks.
