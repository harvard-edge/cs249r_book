title: 'Fault Tolerance: Realize Fault Detection Latency for Real-Time Edge Inference'
scenario: An edge platform running real-time conveyor belt inspection at 60 fps requires fault detection. Detection faults must be identified within 500ms (30 frames).
question: How would you implement fault detection on the 60 fps system to catch inference failures within 500ms with alerting?
details:
  realistic_solution: |
    Measure inference start/end timestamps in the frame-processing process and record each frame as OK, timeout, or error. Keep a fixed 30-frame ring buffer of per-frame latency and status, but trigger the on-device alert synchronously as soon as any hard failure occurs or when a consecutive-miss rule shows the model can no longer meet the 500ms deadline. For example, classify a frame as failed if inference exceeds the 16.7ms frame budget or returns invalid output, classify the fault as timeout/crash/bad-output, and raise the local PLC/alarm line immediately from the watchdog path rather than waiting for cloud metrics.
  common_mistake: |
    **The Pitfall:** Utilizing external cloud-based metric aggregators for latency monitoring.
    **The Rationale:** Candidates default to standard backend DevOps stacks (like Prometheus/Grafana) which operate on 10s-30s scraping intervals.
    **The Consequence:** Critical manufacturing defects persist undetected for orders of magnitude longer than the 500ms deadline, causing massive physical downstream damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target frame rate: 60 fps (16.7ms baseline)
    - Alert deadline: 500ms (30 frames)

    **Calculations:**
    - Frame period = 1 / 60 s = 16.7ms.
    - Deadline in frames = 500ms / 16.7ms = 30 frames.
    - Ring buffer storage for latency + status = 30 * 16 bytes = 480 bytes, negligible on-device.
    - If each frame is checked immediately after inference, a single timeout/error is detected in <= 1 frame period, about 16.7ms.
    - If the policy requires N consecutive failed/late frames before alerting, worst-case detection time is N * 16.7ms. Keeping N <= 30 guarantees detection within 500ms; a 25-frame rule alerts within 25 * 16.7ms = 417ms.

    **Conclusion & Interpretation:**
    - **Result: 30-frame maximum detection window (Latency-Bound)**. The 30-entry buffer is for context, not for delayed batch analysis. The alert path must evaluate each frame synchronously, and any consecutive-miss threshold must be at most 30 frames to meet the 500ms requirement.
