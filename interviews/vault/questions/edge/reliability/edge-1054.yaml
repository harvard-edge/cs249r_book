title: Fault Tolerance Specification for Safety-Critical Edge Vision
scenario: You are tasked with deploying a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) as the primary safety sensor in a collaborative robot cell. The system must meet IEC 62061 SIL-2 requirements.
question: What reliability specification would you write to meet SIL-2, including metrics, checkpoints, detection, and manual override?
details:
  realistic_solution: |
    Specify SIL-2 as a functional-safety target, not an uptime target. The safety function should define a dangerous-failure PFH budget in the SIL-2 range, a fail-safe default of robot stop on loss of confidence, and independent diagnostics for stale frames, missed deadlines, invalid detections, camera faults, model-process crashes, and calibration drift. Checkpoint only safety-critical state needed for deterministic recovery, such as approved model version, calibration, safety-zone configuration, and last-known-good health state; do not checkpoint transient perception outputs as trusted state. Require watchdog-supervised restart, periodic proof tests, diagnostic coverage evidence, safe-state transition timing, audit logs, and a hardwired manual override/E-stop that bypasses the ML stack.
  common_mistake: |
    **The Pitfall:** Confusing system availability with functional safety.
    **The Rationale:** Engineers often equate uptime (e.g., "five nines") with reliability, forgetting that functional safety (SIL) dictates the acceptable rate of dangerous, undetected failures.
    **The Consequence:** The system may lack a proper fail-safe mechanism, exposing operators to physical harm during a silent perception failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - SIL-2 is a dangerous-failure safety integrity requirement. General device MTBF is not sufficient evidence for SIL compliance.
    - IEC 62061 SIL-2 PFHd is typically in the 1e-7/hour to <1e-6/hour dangerous-failure range; the exact allocation depends on the system safety function.
    - Example single-unit hardware MTBF: 50,000 hours, so all-cause failure rate = 1 / 50,000 = 2e-5 failures/hour.
    - Use 1e-7/hour below as an illustrative sub-budget for this sensor channel, not as a direct standalone IEC 62061 requirement.

    **Calculations:**
    - A raw 2e-5/hour all-cause failure rate is above the illustrative 1e-7/hour dangerous-failure sub-budget by 2e-5 / 1e-7 = 200x.
    - Therefore a single Jetson MTBF number cannot prove SIL-2.
    - The specification must instead require architecture evidence: independent safety channel or monitored safe output, diagnostic coverage for dangerous perception failures, bounded fault reaction time, proof-test interval, common-cause analysis, and manual override.

    **Conclusion & Interpretation:**
    - **Result: Safety-Case-Bound**. The publishable answer is a SIL-oriented specification and evidence plan; it should not claim SIL-2 from an unjustified redundant-MTBF formula.
