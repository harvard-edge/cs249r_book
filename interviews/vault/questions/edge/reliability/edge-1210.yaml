title: Adversarial Vulnerability from Edge Quantization
scenario: You deploy a multi-camera security system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). To handle 6 concurrent video streams at 30 FPS, where each frame requires 1.5 TOPS of inference compute, you must quantize your adversarially-trained model to INT8. After deployment, you observe that the INT8 model is highly vulnerable to physical adversarial patches (e.g., printed patterns on clothing), whereas the original unquantized model was immune.
question: Why did INT8 quantization make the Jetson Orin model vulnerable to physical adversarial patches, and why was higher precision infeasible?
details:
  realistic_solution: INT8 quantization changes the numeric behavior of the adversarially trained model. Robustness can depend on small logit margins, low-amplitude features, and activation patterns learned during adversarial training. Post-training INT8 calibration rounds weights and activations to coarse steps, and outlier clipping can remove rare but important activation responses. Physical patch features that the FP model suppressed can therefore survive or move activations across a decision boundary after quantization. Higher precision was infeasible for this throughput target because the six 30 FPS streams already consume nearly all of the stated INT8 compute budget before accounting for real utilization and memory overhead.
  common_mistake: |
    **The Pitfall:** Vaguely stating that "INT8 loses information."
    **The Rationale:** Candidates fail to connect quantization to the robustness mechanism: rounded weights/activations, clipped outliers, shifted logits, and lost sensitivity to small perturbation cues.
    **The Consequence:** They miss why the physical patch becomes effective after deployment and focus only on generic precision loss or TOPS numbers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Interpret the scenario's 1.5 TOPS/frame as 1.5 trillion operations per frame.
    - Compute per stream: 30 FPS * 1.5 TOP/frame = 45 TOPS.
    - Jetson Orin INT8 limit: 275 TOPS.

    **Calculations:**
    - Total compute for 6 streams: 6 * 45 TOPS = 270 TOPS.
    - Ideal INT8 utilization: (270 / 275) * 100 = 98.2%.
    - Practical systems need headroom for memory traffic, preprocessing, scheduling, and less-than-peak accelerator utilization.

    **Conclusion & Interpretation:**
    - **Result: ~98% of peak INT8 before overhead (Compute-Bound)**. The workload leaves no realistic margin for a higher-precision deployment path unless frame rate, resolution, model cost, or stream count is reduced.
