title: Diagnosing Intermittent Latency Spikes on Google Coral Edge TPU
scenario: You have deployed an INT8 quantized object detection model on a fleet of passive edge accelerators connected via USB. They process video streams at 30 FPS in a factory environment. Your telemetry dashboards show that certain units intermittently experience 10x spikes in inference latency during the afternoon shifts, leading to dropped frames.
question: How do you diagnose the root cause of these performance anomalies?
details:
  realistic_solution: The root cause is likely thermal throttling caused by high ambient temperatures combined with continuous inference. The device is passively cooled, and sustained high utilization near its power limit can cause it to hit its thermal threshold, triggering dynamic voltage and frequency scaling (DVFS). Diagnose this by exporting the device's thermal zones to our telemetry backend and correlating temperature spikes with the latency anomalies.
  common_mistake: |
    **The Pitfall:** Ignoring physical and environmental constraints.
    **The Rationale:** Candidates often assume memory leaks, network jitter, or software bugs without considering that passively cooled edge devices throttle under high ambient temperatures.
    **The Consequence:** Deploying heavy distributed tracing tools that exceed device capabilities rather than simply checking hardware thermal telemetry.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 TOPS at 2W, passive USB cooling.
    - Workload: 15ms latency per frame at 30 FPS.
    - Approximate model cost inferred from observed latency at nominal clocks: 4 TOPS * 0.015 s = 0.06 TOP = 60 GOP per frame.

    **Calculations:**
    - Sustained compute demand: 60 GOP/frame * 30 frames/s = 1,800 GOPS = 1.8 TOPS.
    - Nominal utilization: 1.8 TOPS / 4 TOPS = 45%.
    - If thermal telemetry shows frequency dropping to roughly 10% of nominal, effective throughput becomes 0.4 TOPS.
    - Same 60 GOP frame at throttled throughput: 60 GOP / 0.4 TOPS = 0.15 s = 150 ms.

    **Conclusion & Interpretation:**
    - **Result: 150ms spikes are plausible if DVFS reduces clocks to ~10% of nominal (Thermal-Bound)**. The math does not prove throttling by itself; it shows why temperature and frequency telemetry should be correlated with the afternoon latency spikes.
