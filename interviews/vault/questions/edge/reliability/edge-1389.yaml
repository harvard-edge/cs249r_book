title: Alerting on Host-to-Device Streaming Starvation
scenario: We are deploying a fleet of industrial inspection cameras equipped with Hailo-8 accelerators (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, it relies entirely on streaming input tensors from host memory over PCIe. The system processes uncompressed 1080p RGB frames (1920x1080x3 bytes) at a target rate of 60 FPS. During a stress test, telemetry indicates the host can only sustain 300 MB/s of PCIe bandwidth to the accelerator due to memory controller contention.
question: At only 300 MB/s PCIe bandwidth, what frame drop rate should monitoring expect for uncompressed 1080p RGB input at a 60 FPS target?
details:
  realistic_solution: 'The correct approach is to calculate the raw memory bandwidth required to feed the dataflow accelerator and compare it to the available PCIe bandwidth. Since the Hailo-8 streams continuously from host memory without its own DRAM, any host memory contention directly bottlenecks inference throughput. The monitoring system should calculate the expected bottleneck and be configured to alert when host-to-device PCIe bandwidth drops below the 373.2 MB/s threshold required for 60 FPS.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth based on compressed video bitrates.
    **The Rationale:** Candidates forget the Hailo-8 lacks local DRAM to decode video and must receive fully uncompressed RGB tensors.
    **The Consequence:** They drastically underestimate required PCIe bandwidth and misconfigure alerting thresholds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size is 1920x1080x3 bytes.
    - Target frame rate is 60 FPS.
    - Achievable PCIe throughput is 300 MB/s.

    **Calculations:**
    - Frame Size is 1920 * 1080 * 3 bytes = 6,220,800 bytes = ~6.22 MB.
    - Required Bandwidth is 6.22 MB/frame * 60 FPS = 373.2 MB/s.
    - Achievable FPS is 300 MB/s / 6.22 MB/frame = 48.2 FPS.
    - Frame Drop Rate is 60 FPS - 48.2 FPS = 11.8 FPS drops.

    **Conclusion & Interpretation:**
    - **Result: 373.2 MB/s (Memory-Bandwidth-Bound)**. Host memory contention bottlenecks inference throughput, leading to ~12 dropped frames per second.
