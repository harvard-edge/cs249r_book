title: Edge Robustness Latency Budget
scenario: An edge camera pipeline has a 50 ms frame deadline. Baseline inference takes 34 ms. A lightweight adversarial input filter adds 6 ms CPU time, and a stronger detector adds 22 ms. Size which defense can run inline.
question: Which adversarial defense fits a 50 ms edge deadline when baseline inference takes 34 ms?
details:
  realistic_solution: The lightweight filter gives 34 + 6 = 40 ms and fits with 10 ms headroom. The stronger detector gives 34 + 22 = 56 ms and misses the deadline. Run the lightweight filter inline and reserve the stronger detector for sampled offline review or high-risk triggers.
  common_mistake: |
    **The Pitfall:** Choosing the strongest adversarial defense without checking the strict real-time latency budget.
    **The Rationale:** Candidates prioritize absolute security over operational availability, applying cloud-native security paradigms to edge robotics.
    **The Consequence:** The edge pipeline misses the 50 ms deadline, causing catastrophic system failures in real-time control loops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame deadline: 50 ms.
       - Baseline inference: 34 ms.
       - Lightweight filter: +6 ms.
       - Strong detector: +22 ms.
    2. **Calculations:**
       - Lightweight total latency = 34 ms + 6 ms = 40 ms.
       - Strong detector total latency = 34 ms + 22 ms = 56 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 40 ms vs 56 ms.** The strong detector violates the 50 ms deadline. The system must use the lightweight filter to avoid becoming **Latency-Bound**.
