title: 'Diagnosing Power Anomalies from Adversarial Energy Attacks'
scenario: 'A vision model deployed on a Qualcomm Cloud AI 100 on-premise inference accelerator is experiencing unexplained latency spikes. Monitoring shows the accelerator is continuously hitting its 75W TDP limit and thermal throttling, despite the input video feed maintaining a constant resolution and frame rate.'
question: 'What caused the Cloud AI 100 to hit its 75W TDP and throttle despite unchanged input resolution and frame rate?'
details:
  realistic_solution: 'The root cause is an adversarial energy attack (sponge attack) where inputs are explicitly crafted to maximize activation density, defeating hardware sparsity optimizations. To mitigate this, monitor activation sparsity metrics and set per-inference time budgets to drop anomalous requests.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a hardware cooling failure, memory leak, or OS scheduling issue.
    **The Rationale:** Candidates fail to connect the deterministic, input-driven power spikes to an adversarial attack designed to maximize hardware utilization.
    **The Consequence:** Implementing ineffective mitigations like better cooling while the system remains vulnerable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal inference (50% sparsity): 4 TOP model takes 2 effective TOPs per frame.
    - AI 100 TDP limit: 75W.

    **Calculations:**
    - Normal latency (200 TOPS): 2 / 200 = 10ms, drawing ~35W.
    - Attack scenario (0% sparsity): Forces full 4 TOPs and heavy memory writes.
    - Attack latency (throttled to 100 TOPS): 4 / 100.

    **Conclusion & Interpretation:**
    - **Result: 40ms (Compute/Power-Bound)**. Adversarial sponge attacks defeat hardware sparsity optimizations, maxing out the TDP and causing thermal throttling.
