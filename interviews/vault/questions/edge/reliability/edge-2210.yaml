title: Edge Drift Window Budget
scenario: An edge model monitors vibration sensors at 100 events/s per site across 40 sites. A drift test needs 50,000 events per site for a stable histogram.
question: Can a 100 events/s edge site collect 50,000 events for drift detection within a 5-minute alert target?
details:
  realistic_solution: Each site collects 100 x 300 = 30,000 events in 5 minutes, below the 50,000 needed. The required window is 50,000 / 100 = 500 seconds, or 8.3 minutes. A 5-minute alert target needs fewer bins, pooled sites, or a less sample-hungry detector.
  common_mistake: |
    **The Pitfall:** Using aggregated fleet-wide event volume to justify per-site statistical significance.
    **The Rationale:** Candidates incorrectly pool data across distinct sites (40 sites * 100 events/s), assuming global volume satisfies local drift requirements.
    **The Consequence:** Deploying drift detection windows that lack statistical significance at the individual edge node level, causing false positives.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Site rate: 100 events/s. Required events for stability: 50,000. Target SLA: 5 minutes (300 seconds).
    2. **Calculations:**
       - Events per 5-minute window = 100 events/s * 300 s = 30,000 events.
       - Time required for 50,000 events = 50,000 / 100 events/s = 500 seconds (8.3 minutes).
    3. **Conclusion & Interpretation:**
       - **Result: Alert Target Missed.** A 5-minute window only captures 30,000 events. The SLA cannot be met unless the statistical requirements (bin count) are lowered.
