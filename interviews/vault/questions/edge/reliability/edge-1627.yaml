title: Hailo-8 Host Memory Bandwidth Alerting
scenario: You are configuring a production health dashboard for a fleet of DRAM-less edge dataflow accelerators. Your application processes 60 FPS of 1080p RGB video (1920x1080x3 bytes), and the host system allocates a maximum of 500 MB/s of PCIe bandwidth to the accelerator.
question: What continuous PCIe bandwidth is needed for 60 FPS 1080p RGB input streaming, and what baseline utilization is that of the 500 MB/s limit?
details:
  realistic_solution: A robust observability strategy for Hailo-8 must explicitly monitor host PCIe bandwidth and DMA transfer queues as leading indicators of system health. The alert should be configured slightly above the baseline streaming requirement to catch anomalous memory contention with other host processes before the 500 MB/s hard limit is hit, which would result in starved compute.
  common_mistake: |
    **The Pitfall:** Failing to monitor host memory bandwidth as a critical health metric.
    **The Rationale:** Candidates focus solely on accelerator TOPS, forgetting that DRAM-less architectures are entirely dependent on host memory streaming.
    **The Consequence:** Silent frame drops and degraded inference due to host-side memory contention that goes undetected by the monitoring dashboard.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 1920x1080x3 bytes/frame. Rate: 60 FPS. PCIe limit: 500 MB/s.
    2. **Calculations:**
       - Frame size = 1920 * 1080 * 3 = 6,220,800 bytes (~6.22 MB).
       - Continuous Bandwidth = 6.22 MB/frame * 60 FPS = 373.2 MB/s.
       - Baseline Utilization = 373.2 MB/s / 500.0 MB/s = 74.6%.
    3. **Conclusion & Interpretation:**
       - **Result: 74.6% Baseline Utilization.** The system strictly requires 373.2 MB/s just for input tensors. High-watermark alerts should be placed at ~80% to catch bus contention.
