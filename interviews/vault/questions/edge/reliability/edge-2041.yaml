title: Graceful Degradation for Edge Defect Detection on Hailo-8
scenario: You are designing a defect detection system for a high-speed manufacturing line using a Hailo-8 accelerator. Model A provides 99% accuracy requiring 20 TOPS, while a fallback Model B offers 95% accuracy at 10 TOPS. The system processes 100 FPS normally, but must maintain operations under strict thermal limits or power surges where total system power is capped at a strict 3W.
question: How would you design degradation ladders, model fallbacks, fail-safe behavior, and QoS shedding for the Hailo-8 defect detector under a 3W budget?
details:
  realistic_solution: 'Implement a deterministic, multi-tiered graceful degradation ladder governed by a hardware watchdog and telemetry agent monitoring thermal states and instantaneous power draw. Level 0 (Normal): Model A at 100 FPS. Level 1 (Compute/Thermal Stress): Hot-swap to Model B (10 TOPS) reducing NPU utilization. Level 2 (Severe Power Constraints): Maintain Model B but enforce QoS shedding (temporal decimation to 50 FPS) to aggressively lower active duty cycles and reduce host CPU/I/O power overhead. Level 3 (Fail-Safe): Disengage the NPU, fallback to heuristic filters on the host CPU, and signal the PLC for line deceleration.'
  common_mistake: |
    **The Pitfall:** Designing a binary 'on/off' system or neglecting the strict 3W system-level power constraint.
    **The Rationale:** Overlooking the nuances of a graceful degradation ladder, latency overheads during model switching, and host-side power draw.
    **The Consequence:** The system abruptly fails or triggers thermal shutdowns because the fallback still breaches the 0.5W host CPU budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - System power budget: 3W.
    - Hailo-8 active NPU budget at 100 FPS with Model A: 2.0W.
    - Host CPU/memory/I/O at 100 FPS: 0.8W.
    - Host CPU/memory/I/O at 50 FPS: 0.4W.
    - NPU power scales roughly with active TOPS for this estimate.
    - Model A: 20 TOPS (77% utilization). Model B: 10 TOPS (38% utilization).

    **Calculations:**
    - Model A at 100 FPS: 2.0W NPU + 0.8W host = 2.8W, inside 3W but with little surge margin.
    - Model B at 100 FPS: 2.0W * (10 / 20) + 0.8W host = 1.8W.
    - Model B at 50 FPS: 1.0W * 0.5 duty + 0.4W host = 0.9W.

    **Conclusion & Interpretation:**
    - **Result: Model B at 100 FPS fits the 3W cap in this model; 50 FPS shedding is the severe-stress tier.** The ladder should switch to Model B first, then shed FPS when telemetry shows thermal rise, power surges, or host/I/O overhead approaching the cap.
