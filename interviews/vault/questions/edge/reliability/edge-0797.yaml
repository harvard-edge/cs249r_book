title: The ISO 26262 Neural Network Problem
scenario: Your autonomous vehicle uses a neural network for pedestrian detection. The safety team demands ISO 26262 ASIL-D certification for this function. However, ISO 26262 was written for deterministic software, requiring 100% code coverage and formal verification.
question: How do you certify a neural network under ISO 26262?
details:
  realistic_solution: Certification is built around the vehicle item and safety case, not the neural-network weights in isolation. Start with the item definition and HARA, derive ASIL-D safety goals and technical safety requirements, then allocate requirements across the ML perception function, deterministic monitors, fallback behavior, ODD limits, diagnostics, and driver or system response. The ML component needs evidence such as data coverage, scenario testing, robustness analysis, toolchain traceability, post-conversion validation, runtime confidence or plausibility monitors, and controlled update processes. ASIL decomposition may be used only when the architecture justifies independence and sufficient safety mechanisms; it is not valid to label the network ASIL-QM by default.
  common_mistake: |
    **The Pitfall:** Attempting to apply formal verification to the neural network weights.
    **The Rationale:** Candidates treat the neural network as standard software code that can be unit-tested to 100% coverage.
    **The Consequence:** The safety certification process stalls because verifying a multi-million parameter state space is mathematically intractable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Illustrative dangerous-failure target: < 10^-8 failures/hour.
    - Inference rate: 30 FPS (108,000 frames/hour).
    - Zero-failure demonstration testing: for a Poisson process, 95% confidence requires about 3/lambda failure-free exposure hours.

    **Calculations:**
    - Required failure-free exposure = 3 / 10^-8 = 3 * 10^8 operating hours.
    - Frames observed during that exposure = 3 * 10^8 hours * 108,000 frames/hour = 3.24 * 10^13 frames.
    - Equivalent single-vehicle continuous driving = 3 * 10^8 / (24 * 365) ≈ 34,247 years.

    **Conclusion & Interpretation:**
    - **Result: Direct Statistical Certification is Intractable (Verification-Bound)**. Demonstrating the neural network alone meets an extreme dangerous-failure rate by road testing would require hundreds of millions of failure-free operating hours. Certification must rely on the surrounding safety case, deterministic safety mechanisms, ODD limits, monitoring, and evidence about the full system rather than formal proof of the weights alone.
