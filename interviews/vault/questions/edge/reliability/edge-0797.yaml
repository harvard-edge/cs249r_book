title: The ISO 26262 Neural Network Problem
scenario: Your autonomous vehicle uses a neural network for pedestrian detection. The safety team demands ISO 26262 ASIL-D certification for this function. However, ISO 26262 was written for deterministic software, requiring 100% code coverage and formal verification.
question: How do you certify a neural network under ISO 26262?
details:
  realistic_solution: 'Architect a dual-system safety mechanism. Neural network parameter state spaces are mathematically intractable for traditional ISO 26262 ASIL-D formal software verification. The compliant engineering path implements the neural network as an ASIL-QM (quality managed) component, heavily wrapped by a deterministic, conventionally verifiable ASIL-D safety mechanism (e.g., a redundant hard-coded radar fallback or strict operational design domain constraints).'
  common_mistake: |
    **The Pitfall:** Attempting to apply formal verification to the neural network weights.
    **The Rationale:** Candidates treat the neural network as standard software code that can be unit-tested to 100% coverage.
    **The Consequence:** The safety certification process stalls because verifying a multi-million parameter state space is mathematically intractable.
  napkin_math: |
    **Assumptions & Constraints:**
    - ASIL-D target: < 10^-8 failures/hour.
    - Inference rate: 30 FPS (108,000 frames/hour).
    - Validation: Requires 95% confidence (~3 * 10^8 hours without failure).

    **Calculations:**
    - Frames required = (3 * 10^8) * 108,000 = 3.24 * 10^13 frames.
    - Equivalent real-world driving = 3.24e13 / (30 * 3600 * 24 * 365) ≈ 34,246 years.

    **Conclusion & Interpretation:**
    - **Result: Direct NN certification is mathematically intractable (Verification-Bound)**. Certification must happen at the architectural level (safety wrappers), not the weights.
