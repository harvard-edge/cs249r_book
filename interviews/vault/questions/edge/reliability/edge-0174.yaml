title: The Watchdog Timer's Deadline
scenario: You are designing the fault tolerance system for a vision-based obstacle avoidance model on an autonomous drone. The system runs on a Jetson AGX Orin. To prevent the entire system from hanging due to a frozen inference process, you implement a hardware watchdog timer with a 500ms timeout. If the application fails to 'pet' the watchdog within this window, the hardware will force a hard reboot. Your system requires 150ms to perform a clean shutdown.
question: What does the 500ms watchdog do, and what maximum inference latency remains after reserving 150ms for clean shutdown?
details:
  realistic_solution: The watchdog timer acts as a hardware 'dead man's switch' for system reliability. To calculate the maximum allowed inference latency, subtract the time required for a safe shutdown from the total watchdog timeout. This ensures there is time to gracefully shut down if inference hangs.
  common_mistake: |
    **The Pitfall:** Assuming the entire 500ms watchdog timeout is the latency budget for inference.
    **The Rationale:** Engineers forget that the watchdog is a hard deadline for the entire application loop, which must include the time needed to safely shut down.
    **The Consequence:** Exceeding the real budget means the system doesn't have time to perform a clean shutdown before the watchdog forces an abrupt and dangerous hard reboot.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware watchdog timeout: 500ms.
    - Time required for clean shutdown: 150ms.

    **Calculations:**
    - The watchdog timer defines the absolute maximum loop time.
    - Max inference latency = Total Window - Shutdown Time.
    - Max inference latency = 500ms - 150ms = 350ms.

    **Conclusion & Interpretation:**
    - **Result: 350ms (Latency-Bound)**. The maximum permissible inference latency is 350ms.
  options:
  - 500ms. The entire watchdog window is the latency budget.
  - 650ms. The shutdown time is added to the watchdog timeout.
  - 350ms. The safe shutdown time must be subtracted from the total budget.
  - 150ms. The inference budget is equal to the safe shutdown time.
  correct_index: 2
