title: 'Zero-Connectivity Autonomous Rollback'
scenario: 'You deploy a new obstacle avoidance model to deep-sea Autonomous Underwater Vehicles (AUVs). Missions last 4 hours. The only communication is an acoustic modem at 100 bps. If the new model hallucinates obstacles, the AUV halts and aborts the mission. Remote debugging or rollback during the mission is impossible due to the bandwidth.'
question: 'How do you design the reliability layer?'
details:
  realistic_solution: 'Design an autonomous on-device watchdog and dual-bank model storage. The edge device stores both Model V1 (known-good) and Model V2 (new) in flash memory. A deterministic supervisory control loop monitors the ML system''s outputs. If the watchdog detects anomalous ML behavior—defined by domain-specific heuristics, such as >5 erratic stops within 10 minutes or consecutive bounding box outputs with extremely low confidence—it triggers a local incident response. The system automatically shifts the model pointer back to V1 and restarts the inference service. This trades storage space (holding two models) for absolute fault tolerance in disconnected environments.'
  common_mistake: |
    **The Pitfall:** Attempting to push a rollback command or binary patch via the acoustic modem.
    **The Rationale:** Cloud-native engineers default to remote OTA updates for resolving production model failures.
    **The Consequence:** The mission fails because remote rollback is mathematically impossible given the bandwidth constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Acoustic modem bandwidth: 100 bps (12.5 B/s).
    - Model size: 50 MB (50,000,000 Bytes).
    - Mission duration: 4 hours.

    **Calculations:**
    - Transmission time: 50,000,000 B / 12.5 B/s = 4,000,000 seconds.
    - 4,000,000 seconds = ~46 days.

    **Conclusion & Interpretation:**
    - **Result: ~46 days (Network-Bound)**. Remote rollback is impossible within the 4-hour mission window, making local fault-tolerant checkpointing strictly required.
