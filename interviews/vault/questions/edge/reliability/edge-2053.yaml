title: 'Edge AI Reliability: Adversarial Robustness on Google Coral TPU'
scenario: A real-time anomaly detection system for industrial machinery is deployed on a Google Coral Edge TPU (4 TOPS INT8, 2W). The environment is hostile, with attackers introducing subtle sensor perturbations to evade detection.
question: How would you design the anomaly detector to maintain adversarial robustness within the strict INT8, 4 TOPS, and 2W hardware constraints?
details:
  realistic_solution: |
    Design the deployed detector around operations the Coral Edge TPU can actually run: a compact INT8 model compiled for the Edge TPU, bounded input normalization, range checks, missing-sensor checks, and simple statistical drift tests on the host before inference. If adversarial hardening is used, train and evaluate it offline, then deploy only the quantized graph that still meets the 4 TOPS and 2W envelope. Avoid relying on internal activation monitoring unless the deployed runtime exposes those signals; use output confidence, reconstruction error, input statistics, and temporal consistency checks instead. The fail-safe path should raise an alert, slow or stop the monitored process, or fall back to a conservative rule-based detector rather than adding heavy ensembles on-device. Secure OTA updates should refresh the model and thresholds after validation.
  common_mistake: |
    **The Pitfall:** Proposing complex adversarial training on-device or heavy input transformations.
    **The Rationale:** Candidates apply standard cloud-security techniques without considering edge restrictions.
    **The Consequence:** Exceeding the 2W power budget, missing real-time deadlines, or crashing because the Coral only supports INT8 operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Coral Edge TPU peak: 4 TOPS INT8 at about 2W.
    - Target example: 30 FPS, so each frame has about 33.3 ms.
    - Sustained deployed performance should leave headroom for host checks, I/O, and thermal variation.

    **Calculations:**
    - Theoretical INT8 budget per frame: 4 TOPS / 30 FPS = 0.133 TOP, or about 133 GOP.
    - A 100 GOP model would use roughly 100 / 133 = 75% of the peak compute budget before I/O and host overhead.
    - A 5 ms host-side validation step uses 5 / 33.3 = 15% of the frame latency budget.
    - A 3-model ensemble would require about 300 GOP per frame, which exceeds the 133 GOP/frame compute budget and likely the 2W real-time envelope.

    **Conclusion & Interpretation:**
    - **Result: lightweight checks plus one compact INT8 model are feasible; heavy ensembles are not (Compute/Power-Bound)**. The design must leave latency and power headroom, not just fit a nominal TOPS number.
