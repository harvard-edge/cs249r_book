title: Adversarial Patch Defense Spec on Jetson Orin
scenario: You are designing the specification for a computer vision pipeline on an autonomous drone powered by an NVIDIA Jetson Orin. The system must process 4K video at 30 FPS to detect navigation hazards, but recent intelligence indicates adversaries may deploy physical adversarial patches to blind the drone. The main perception model already consumes 180 TOPS of the available 275 TOPS INT8 budget.
question: How would you design an adversarial-patch defense for 4K 30 FPS on Jetson Orin while sharing the GPU, DLA, memory, and 275 TOPS budget?
details:
  realistic_solution: A strong specification treats the defense as part of the 33.3 ms per-frame pipeline rather than as a standalone TOPS add-on. Use a lightweight patch detector, feature-squeezing pass, or small denoiser only if it has a measured DLA/GPU latency budget, bounded activation memory, and a scheduler reservation that does not starve the main perception model. The design should pipeline capture, defense, and perception with explicit memory-bandwidth limits, fall back to alerting or lower-cost checks under load, and verify that the combined GPU, DLA, memory, and thermal budget sustains 4K 30 FPS.
  common_mistake: |
    **The Pitfall:** Proposing running complex defenses like randomized smoothing or large ensembles directly on the GPU alongside the main model.
    **The Rationale:** They fail to analyze GPU, DLA, memory, and scheduler interactions across the full pipeline.
    **The Consequence:** Resource contention, memory bottlenecks, and thermal throttling that breaks the 4K 30 FPS requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin compute budget: 275 TOPS INT8. TDP: 60W.
    - Video: 4K 30 FPS.
    - Per-frame deadline: 1 / 30 FPS = 33.3 ms.
    - The main model already consumes a large share of accelerator capacity.

    **Calculations:**
    - Budget each stage: capture/ISP + defense + main perception + postprocess must be less than 33.3 ms including queueing.
    - Account for shared memory traffic from 4K frames, defense activations, and main-model activations; avoid designs that require extra full-frame copies.
    - Reserve DLA or GPU time for the defense only after profiling confirms the main model, memory bandwidth, and thermals still meet the frame deadline.

    **Conclusion & Interpretation:**
    - **Result: conditionally scheduled low-latency defense**. DLA offload is useful only if measured latency, memory traffic, and accelerator availability leave enough margin for sustained 4K 30 FPS.
