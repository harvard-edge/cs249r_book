title: 'Adversarial Patch Defense Spec on Jetson Orin'
scenario: 'You are designing the specification for a computer vision pipeline on an autonomous drone powered by an NVIDIA Jetson Orin. The system must process 4K video at 30 FPS to detect navigation hazards, but recent intelligence indicates adversaries may deploy physical adversarial patches to blind the drone. The main perception model already consumes 180 TOPS of the available 275 TOPS INT8 budget.'
question: 'How would you design an adversarial-patch defense for 4K 30 FPS on Jetson Orin while sharing the GPU, DLA, memory, and 275 TOPS budget?'
details:
  realistic_solution: 'A strong specification maps a lightweight defense, such as an input-denoising autoencoder or feature squeezer, explicitly to the DLA accelerator, reserving the Ampere GPU for the main perception model. By pipelining the input so the DLA sanitizes the frames before GPU inference, the design avoids compute contention.'
  common_mistake: 'Candidates often propose running complex defenses like randomized smoothing or large ensembles directly on the GPU alongside the main model. They fail to analyze hardware interactions, leading to resource contention, memory bottlenecks, and thermal throttling.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin compute budget: 275 TOPS INT8. TDP: 60W.
    - Main model compute: 180 TOPS.
    - Video: 4K 30 FPS.
    - Defense compute: 1.5 TOPS/frame.

    **Calculations:**
    - Required defense compute: 1.5 TOPS * 30 FPS = 45 TOPS.
    - Total system compute: 180 TOPS + 45 TOPS = 225 TOPS.
    - System margin: 275 TOPS - 225 TOPS = 50 TOPS headroom.

    **Conclusion & Interpretation:**
    - **Result: 225 TOPS (Compute-Bound)**. Offloading the adversarial defense to the DLA guarantees execution without TDP throttling.
