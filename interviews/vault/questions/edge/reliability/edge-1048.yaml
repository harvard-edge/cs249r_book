title: Fault-Tolerant Architecture for 1,000 Online-Learning Orin Vision Systems
scenario: You are designing a safety-critical vision system across 1,000 Jetson Orin devices in an automotive stamping plant. The plant-level service must operate at 99.95% uptime, with failover under 90 seconds and no more than 10 minutes of online-learning state loss. Devices run online learning to adapt to new part geometries.
question: What complete fault-tolerance architecture would you design for 1,000 online-learning Orin vision systems to achieve 99.95% uptime?
details:
  realistic_solution: |
    Use a layered architecture with separate hardware and software recovery paths. For software faults, keep signed A/B base-model partitions, canary OTA rollout, watchdog restart, and automatic rollback to the last known-good base plus verified LoRA checkpoint. For online-learning state, checkpoint LoRA adapters locally every 10 minutes, upload each checkpoint to cloud storage, and reconcile by timestamp, base-model version, and checksum before a restored device resumes learning. For hardware faults, run line-level redundancy with hot spare Orins already loaded with the current base model and recent LoRA state; the watchdog or supervisor fails traffic over to the spare in under 90 seconds, then service replaces the failed unit. Monitoring separates latency/power faults from model-quality drift, and recovery resumes inference first in safe read-only mode before online updates are re-enabled.
  common_mistake: |
    **The Pitfall:** Treating online learning state and base model as one monolithic checkpoint.
    **The Rationale:** Candidates default to standard cloud checkpointing strategies, overlooking the massive bandwidth cost of uploading full models from 1,000 edge devices.
    **The Consequence:** Saturating the factory network and skyrocketing cloud transfer costs, while failing to design recovery paths for hardware versus software failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 1,000 devices; MTBF: 50,000 hours.
    - Uptime goal: 99.95%.
    - Online LoRA checkpoint: 2MB (6 times/hour).

    **Calculations:**
    - Hardware failures: 1,000 * 8760h / 50,000h = 175 failures/year.
    - Downtime (4h replacement): 175 * 4h = 700 hours/year.
    - Plant-level uptime without hot failover: 1 - (700 / 8,760) = 92.0%, so manual replacement alone misses 99.95%.
    - 99.95% yearly downtime budget: 0.0005 * 8760h = 4.38 hours/year.
    - Allowed failover downtime per expected hardware failure: 4.38h / 175 = 0.025h = 1.5 minutes.
    - Cloud checkpoint volume at 6 uploads/hour: 1,000 * 2MB * 6 * 24 = 288 GB/day.
    - At $0.09/GB transfer pricing: 288 GB/day * 365 * $0.09 ≈ $9,461/year.

    **Conclusion & Interpretation:**
    - **Result: Hot-spare failover must complete in <=1.5 minutes per expected failure to meet 99.95% plant-level uptime.** Manual 4-hour replacement is insufficient; A/B rollback, watchdogs, state reconciliation, and frequent LoRA checkpoint syncs are all required for end-to-end fault tolerance.
