title: Fail-Safe Industrial Anomaly Detection on Edge TPU
scenario: You are tasked with specifying the software architecture for an industrial robotic arm's anomaly detection system, mandated to meet strict functional safety requirements. The inference target is a Google Coral Edge TPU connected through a supported host interface.
question: How would you design deterministic Coral Edge TPU inference with watchdogs and safety guarantees despite limited operator support?
details:
  realistic_solution: |
    Validate the model at build time for full INT8 Edge TPU compilation with supported operators only, and reject any CPU fallback path. At runtime, run inference under a deterministic deadline monitor with host-process, interface, and TPU health checks plus periodic known-good self-test inference. Missed deadlines, health-check failures, or model-output sanity failures must transition the robotic arm to a safety-certified fallback state such as safe stop or reduced-speed degraded mode, with watchdog ownership outside the inference worker.
  common_mistake: |
    **The Pitfall:** Allowing partial graph compilation with CPU fallback for unsupported operators.
    **The Rationale:** Candidates assume the Edge TPU is inherently deterministic and that falling back to the CPU is an acceptable compromise.
    **The Consequence:** The CPU fallback introduces non-deterministic latency spikes and context-switching overhead that violate real-time safety constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Anomaly detection model requires 20 GOPS per frame.
    - Theoretical compute on Coral Edge TPU: 4 TOPS = 4,000 GOPS/s.
    - Safety deadline for inference result: 15 ms.

    **Calculations:**
    - Ideal compute time = 20 GOP / 4,000 GOP/s = 0.005 s = 5 ms.
    - Remaining budget for host scheduling, transfer, and postprocessing = 15 ms - 5 ms = 10 ms.
    - Watchdog timeout must be set from measured worst-case latency, not from peak TOPS alone.

    **Conclusion & Interpretation:**
    - **Result: 5 ms ideal compute with 10 ms unproven margin.** Peak compute suggests feasibility, but the safety guarantee comes from measured worst-case timing, deterministic timeout handling, and a certified safe fallback state.
