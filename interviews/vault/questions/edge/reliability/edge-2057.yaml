title: Model Extraction Attack on Qualcomm Cloud AI 100
scenario: An adversary gains physical access to an edge device running a proprietary model on a Qualcomm Cloud AI 100. They cannot extract weights due to secure boot, but they monitor the power consumption patterns while feeding crafted input images.
question: How would you mitigate power-side-channel model extraction on the Cloud AI 100 despite secure boot and physical access?
details:
  realistic_solution: |
    Treat secure boot as necessary but insufficient because the attacker can still observe data-in-use behavior. Practical mitigations are to reduce the measurement surface and limit the information returned: disable debug and telemetry interfaces, pot or shield power rails where feasible, use tamper detection for opened devices, restrict query rates and crafted-input access, batch or schedule inference so individual inputs are harder to align with power traces, and add bounded input randomization or preprocessing that does not break accuracy. Also isolate the model process and keys, encrypt model storage, and monitor for extraction-style query patterns. These measures reduce leakage and raise attack cost, but they do not make a physically accessible accelerator immune to side-channel analysis.
  common_mistake: |
    **The Pitfall:** Assuming static hardware encryption and secure boot are sufficient defenses against active physical adversaries.
    **The Rationale:** Security engineers rely on data-at-rest and data-in-transit protections, fundamentally misunderstanding that data-in-use creates physical emanations (power/EM) correlated to network architecture.
    **The Consequence:** Proprietary model IP (architecture and weights) is successfully cloned via Simple Power Analysis (SPA), bypassing all encryption layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: ~10^9 operations per inference.
    - Energy per INT8 operation: ~0.1 pJ.
    - Adversary visibility: Capable of resolving micro-watt fluctuations.

    **Calculations:**
    - Compute energy per inference = 10^9 Ops * (0.1 * 10^-12 J/Op) = 10^-4 Joules (0.1 mJ).
    - Average compute power over a 10ms window = 0.1 mJ / 0.01 s = 0.01 Watts.

    **Conclusion & Interpretation:**
    - **Result: 0.01W average compute component (Side-Channel Risk)**. The exact leakage depends on measurement setup and workload correlation, so mitigation should reduce physical access, alignment, query volume, and exposed debug or power-measurement surfaces rather than relying on software-only masking.
