title: Adversarial Input Purification on Qualcomm Cloud AI 100
scenario: >-
  You are deploying a computer vision system for physical defect detection in an automated factory using a Qualcomm Cloud AI 100 accelerator. You discover vulnerabilities to physical adversarial attacks and propose adding an input purification neural network (e.g., a denoising autoencoder) ahead of the primary detector.
question: Is an INT8 input purification network feasible on the Cloud AI 100, and what compute and memory overhead would it add?
details:
  realistic_solution: 'Deploy a lightweight, INT8-quantized convolutional purifier fused with the primary vision model. The AI 100 natively accelerates INT8 workloads, making the compute overhead negligible. Fusing the graphs keeps intermediate activations on-chip (SRAM), avoiding memory bottlenecks and maintaining high throughput well under the power limit.'
  common_mistake: |
    **The Pitfall:** Relying on FP32/FP16 adversarial training or un-fused graphs.
    **The Rationale:** Candidates import standard PyTorch adversarial defense techniques directly to the edge.
    **The Consequence:** They ignore the accelerator's explicit INT8 optimization. Failing to fuse the graphs causes intermediate activations to be written to and read from slow off-chip DRAM, creating a massive memory bandwidth stall.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M parameter Purifier at INT8 (~10 MB footprint).
    - Accelerator limit: 32 GB LPDDR4x, 400 TOPS INT8, 75W.
    - 1080p frame size: 6.2 MB; DRAM bandwidth: 68 GB/s.

    **Calculations:**
    - Compute Time: 20 GOPS / 400,000 GOPS = 0.05 ms.
    - Unfused Memory Penalty: (6.2 MB * 2) / 68,000 MB/s ≈ 0.18 ms.

    **Conclusion & Interpretation:**
    - **Result: < 0.1 ms (Compute-Bound).** Graph fusion keeps defense overhead strictly compute-bound (< 0.1 ms) by eliminating the off-chip LPDDR4x transfer, making the INT8 purifier highly feasible.
