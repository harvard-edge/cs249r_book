title: 'Edge Drift Detection Architecture on Coral TPU'
scenario: 'You are designing a visual inspection system for remote pipelines using a fleet of Google Coral Edge TPUs. The devices operate under severe bandwidth constraints (100 KB/s max uplink), making it impossible to send all raw video frames back to the cloud. You need to architect a reliable system to detect data drift (e.g., sensor degradation, extreme weather changes) directly at the edge to trigger model retraining. The Coral provides 4 TOPS at 2W but only supports INT8 operations with a limited set of operators.'
question: 'How would you detect data drift on Coral Edge TPUs under a 100 KB/s uplink and INT8-only operator constraints?'
details:
  realistic_solution: 'A robust edge architecture involves computing lightweight, low-dimensional summary statistics or histograms of INT8 activation percentiles from an intermediate layer of the quantized model. The Edge TPU handles the primary inference, and the host CPU aggregates these quantized activation histograms over a time window. Instead of computing complex drift metrics locally, the system transmits only these compressed histograms to the cloud once an hour. The cloud infrastructure then computes PSI or KL divergence against the baseline distribution to trigger alerts.'
  common_mistake: 'Candidates often suggest running complex statistical tests (like multi-dimensional KS tests or continuous KL divergence on high-dimensional embeddings) directly on the edge device. They fail to account for the Coral''s lack of native floating-point support, the overhead of dequantizing activations, or the power constraints of running secondary drift detection models continuously alongside the main inference workload.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame rate: 30 FPS.
    - Uplink limit: 100 KB/s.
    - Extracted feature vector: 128-dimensional INT8 vector per frame.
    - Histogram bins: 10 bins per dimension (int32 counter, 4 bytes).

    **Calculations:**
    - Raw feature generation rate: 30 FPS * 128 bytes = 3.84 KB/s.
    - Summary histogram size: 128 dimensions * 10 bins * 4 bytes = 5.12 KB.
    - Hourly data transmission: 5.12 KB per hour (vs 3.84 KB/s * 3600s = 13.8 MB).

    **Conclusion & Interpretation:**
    - **Result: 5.12 KB hourly transmission (Network-Bound)**. Computing summary histograms of quantized activations locally easily complies with the extreme 100 KB/s uplink constraint.
