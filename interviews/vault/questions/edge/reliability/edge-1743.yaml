title: Dual-Model QoS Shedding on a 32 GB Edge Accelerator
scenario: You are deploying a local generative AI assistant on an on-premise server equipped with a single 32 GB edge inference accelerator. During sporadic high-traffic events, the request rate overwhelms the compute capacity, causing unacceptable tail latencies.
question: How would you design a graceful degradation ladder on a 32 GB accelerator to preserve premium quality while serving free-tier fallback traffic?
details:
  realistic_solution: Implement a degradation ladder around priority tiers, admission control, and token-budget enforcement. Pinning both INT8 model weights may consume about 21 GB before allocator overhead, runtime workspaces, KV cache growth, and fragmentation, so the policy must reserve headroom instead of treating all remaining memory as usable concurrency. Premium traffic keeps primary 13B access until token or latency thresholds are hit; lower tiers are admitted to the 8B fallback, preempted, shortened, or rejected before the accelerator reaches OOM. Avoid dynamic PCIe model swapping during bursts because it creates severe tail-latency spikes.
  common_mistake: |
    **The Pitfall:** Ignoring the simultaneous memory footprint of loading two distinct models.
    **The Rationale:** Candidates propose dynamically swapping models or offloading to the cloud, overlooking PCIe transfer latency and strict privacy constraints.
    **The Consequence:** The device experiences massive latency spikes or Out-Of-Memory (OOM) crashes during traffic bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware memory: 32 GB.
    - Primary model (13B INT8): 13 GB.
    - Fallback model (8B INT8): 8 GB.
    - Runtime, allocator, fragmentation, and activation reserve: about 4 GB.
    - Average KV cache/token: 1 MB.

    **Calculations:**
    - Static weight footprint = 13 + 8 = 21 GB.
    - Usable KV budget after reserve = 32 GB - 21 GB - 4 GB = about 7 GB.
    - Active KV token budget = 7 GB / 1 MB/token = about 7,000 active tokens under this sizing model.
    - Admission control should spend that token budget by tier: premium 13B first, free-tier 8B fallback next, then truncation, queue rejection, or preemption when the budget or latency SLO is crossed.

    **Conclusion & Interpretation:**
    - **Result: policy-driven degradation (Memory/QoS Bound)**. The robust answer is not a fixed request count; it is a tiered admission and fallback policy with explicit runtime headroom and active-token limits.
