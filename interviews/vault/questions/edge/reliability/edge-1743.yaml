title: Dual-Model QoS Shedding on a 32 GB Edge Accelerator
scenario: You are deploying a local generative AI assistant on an on-premise server equipped with a single 32 GB edge inference accelerator. During sporadic high-traffic events, the request rate overwhelms the compute capacity, causing unacceptable tail latencies.
question: How would you design a graceful degradation ladder on a 32 GB accelerator to preserve premium quality while serving free-tier fallback traffic?
details:
  realistic_solution: Implement a static weight-pinning strategy where both the 13B and 8B model weights reside simultaneously in the 32 GB LPDDR4x allocation (21 GB total). Dynamic PCIe offloading introduces catastrophic tail latency during sudden bursts. With roughly 11 GB remaining for KV caching and activations, enforce deterministic shedding from a token-budget limit rather than an unqualified request-count limit. Premium traffic receives primary model access, while free-tier requests immediately fall back to the 8B model to prevent OOM.
  common_mistake: |
    **The Pitfall:** Ignoring the simultaneous memory footprint of loading two distinct models.
    **The Rationale:** Candidates propose dynamically swapping models or offloading to the cloud, overlooking PCIe transfer latency and strict privacy constraints.
    **The Consequence:** The device experiences massive latency spikes or Out-Of-Memory (OOM) crashes during traffic bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware memory: 32 GB.
    - Primary model (13B INT8): 13 GB.
    - Fallback model (8B INT8): 8 GB.
    - Average KV cache/token: 1 MB.

    **Calculations:**
    - Static weight footprint = 13 + 8 = 21 GB.
    - Remaining memory for KV/activations = 32 GB - 21 GB = 11 GB.
    - Active KV token capacity = 11 GB / 1 MB/token = about 11,000 active tokens before reserving runtime headroom.
    - If a policy reserves 1,000 active tokens per request, the upper bound is about 11 requests; shorter or longer sequences change that count.

    **Conclusion & Interpretation:**
    - **Result: about 11,000 active KV tokens (Memory-Bound)**. Memory constraints dictate static co-location over dynamic swapping, with request concurrency derived from the per-request token budget.
