title: Identifying Power Side-Channel Attacks on Edge Accelerators
scenario: You are deploying a sensitive proprietary model on a Qualcomm Cloud AI 100 on-premise inference accelerator. Since the hardware is located on-premise, physical security is a concern.
question: What is a power side-channel attack, and what physical property of the Cloud AI 100 would an attacker monitor?
details:
  realistic_solution: A power side-channel attack is a physical security threat where an adversary measures the power consumption of the hardware during execution to infer internal state, model weights, or cryptographic keys. For the Qualcomm Cloud AI 100, an attacker would physically monitor the fluctuations in the 75W power supply to correlate power spikes with specific INT8 operations.
  common_mistake: |
    **The Pitfall:** Confusing side-channel attacks with adversarial input perturbations (FGSM).
    **The Rationale:** Candidates assume side-channels only apply to low-power microcontrollers, not 75W PCIe accelerators.
    **The Consequence:** Leaving physical edge deployments completely vulnerable to proprietary model weight extraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - A power side-channel does not require a published numeric threshold.
    - The observable signal is time-varying supply current or power draw during inference.

    **Calculations:**
    - Compare measured power traces against operation timing, model layers, or known input patterns.
    - Repeated traces can reveal correlations between power fluctuations and internal computation.

    **Conclusion & Interpretation:**
    - **Result: Power-trace monitoring is the relevant physical signal**. The key concern is leakage through supply-current or power fluctuations, not a TOPS-derived energy threshold.
