title: Accelerator Model State Reload Time
scenario: A Hailo-8 processes traffic cameras. A watchdog triggers a hardware reset upon soft-error, requiring a full state reload of a 20MB INT8 model from an SPI flash at 10 MB/s.
question: Calculate the hard downtime in seconds if the reset sequence takes 500ms before memory copying begins.
details:
  realistic_solution: Calculate the pure IO transfer latency from the SPI flash to the accelerator's execution memory, then aggregate it with the hardware initialization latency. This total sum dictates the hard operational downtime visible to the upstream system.
  common_mistake: |
    **The Pitfall:** Ignoring the hardware initialization overhead.
    **The Rationale:** Candidates isolate their thinking to network or memory bandwidth math, forgetting device boot and handshake sequences.
    **The Consequence:** Under-reporting actual system downtime to upstream safety controllers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model state size: 20 MB
    - SPI flash throughput: 10 MB/s
    - Hardware reset overhead: 500 ms

    **Calculations:**
    - Data transfer time = 20 MB / 10 MB/s = 2.0 seconds
    - Total downtime = 2.0 seconds + 0.5 seconds = 2.5 seconds

    **Conclusion & Interpretation:**
    - **Result: 2.5 seconds (I/O-Bound)**. The system experiences a 2.5 second hard downtime.
