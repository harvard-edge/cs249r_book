title: Detecting and Mitigating Data Drift on Jetson Orin for Edge Reliability
scenario: You are responsible for an object detection model deployed on an NVIDIA Jetson Orin in a critical industrial setting. Recently, you've observed a subtle but consistent drop in detection accuracy, not attributable to software bugs or hardware failures. Preliminary investigations suggest the incoming data distribution has shifted.
question: How would you diagnose and quantify data drift on Jetson Orin, mitigate it within resource limits, and measure restored reliability?
details:
  realistic_solution: |
    Diagnose drift with an on-device monitor that logs compact feature histograms, embedding centroids, confidence distributions, and scene metadata, then compares them to a clean baseline using PSI, Jensen-Shannon divergence, and calibration/error slices. Quantify impact by sampling flagged frames for labeling and measuring mAP, false-negative rate, expected calibration error, and alarm precision/recall on the drift slice. Mitigate within Orin limits by keeping inference INT8 and doing only bounded updates: threshold recalibration or a small last-layer/head update from a replay buffer during low-load windows, with heavier retraining synchronized offline. Reliability is restored only when held-out labeled drift samples return to the baseline confidence interval for mAP/FNR/calibration while the monitor stays within CPU, memory, and power headroom.
  common_mistake: |
    **The Pitfall:** Retraining the entire model on the edge device without incremental learning strategies.
    **The Rationale:** Developers accustomed to cloud environments attempt full fine-tuning upon detecting drift.
    **The Consequence:** This vastly exceeds the 60W power budget and available LPDDR5 memory, causing thermal shutdowns and OOM errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Overhead: Drift detection on 5 features takes 0.5ms per batch.
    - Inference Rate: 1000 Hz, with one drift batch evaluated per inference.
    - Reliability metric: compare pre- and post-mitigation mAP, false-negative rate, calibration error, and drift-alarm precision/recall on labeled review samples.

    **Calculations:**
    - Total Compute Time: 0.5ms * 1000 = 500ms per second.
    - CPU utilization for the drift process: 500ms / 1000ms = 50% of one CPU core.
    - Reliability restoration is measured by post-mitigation metrics returning to the baseline confidence interval, not by CPU utilization alone.

    **Conclusion & Interpretation:**
    - **Result: 50% of one CPU core for drift detection under the stated batching assumption.** The mitigation is acceptable only if CPU headroom remains and held-out drift slices show recovered mAP, false-negative rate, calibration, and alarm quality.
