title: Real-time Data Drift Detection on Google Coral Edge TPU
scenario: 'A smart factory deploys a real-time visual inspection system on Google Coral Edge TPUs. Each TPU runs a trained INT8 quantized classification model to identify defective components on an assembly line. The factory observes a recent increase in false negatives, suspecting data drift due to gradual changes in ambient lighting or camera sensor degradation.'
question: 'How would you detect lighting or camera-sensor data drift on Coral Edge TPUs using integer-friendly statistics without uploading raw data?'
details:
  realistic_solution: 'To detect data drift, select a critical, low-dimensional model output. Discretize the range of this feature into a predefined number of bins. On the Edge TPU, maintain counts of inferences falling into each bin for both a current window and a baseline reference window. Compare these binned distributions using integer arithmetic via a metric like Total Variation Distance (sum of absolute differences of proportions) since log operations are prohibitive.'
  common_mistake: |
    **The Pitfall:** Attempting to perform complex floating-point statistical calculations directly on the INT8-only Edge TPU.
    **The Rationale:** Standard drift detection libraries rely heavily on continuous floating-point operations like KL divergence.
    **The Consequence:** The Edge TPU cannot execute these operations natively, forcing a fallback to the slow ARM CPU, leading to massive latency spikes and potentially crashing the real-time pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Discretize model output into k bins.
    - P_c_i is proportion in bin i for current data, P_b_i for baseline.

    **Calculations:**
    - Integer Scaling: P_c_i = (C_i * 1000) / N_c.
    - TVD Formula: Sum(|P_c_i - P_b_i|) / 2.

    **Conclusion & Interpretation:**
    - **Result: Drift detected (Compute-Bound)**. Fast integer arithmetic allows execution entirely on the TPU.
