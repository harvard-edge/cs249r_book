title: Thermal Throttling Degradation on Jetson Orin
scenario: An autonomous mobile robot powered by an NVIDIA Jetson Orin is operating in an industrial setting. Due to high ambient temperatures and sustained 60W TDP utilization, the SoC triggers thermal throttling, reducing the available Ampere GPU clock speed by 40%. The perception pipeline normally runs a heavy 3D LiDAR+Camera fusion model on the GPU and a lightweight pedestrian tracking model on the DLA accelerator.
question: What degradation ladder would you use after a 40% GPU clock throttle to keep the perception pipeline at a safe 20 FPS?
details:
  realistic_solution: Implement a deterministic fail-operational degradation ladder tied to measured frame latency. First reduce fusion cost by lowering LiDAR point density and camera resolution while preserving the DLA pedestrian tracker. If latency still exceeds the 50ms budget, switch from full 3D LiDAR+camera fusion to a lighter camera-dominant model with sparse LiDAR range checks. If the GPU remains thermally constrained, fall back to an INT8 2D camera-only detector plus DLA pedestrian tracking, and finally to DLA tracking-only with conservative speed limits. Each rung trades perception richness for a bounded 20 FPS safety pipeline.
  common_mistake: |
    **The Pitfall:** Suggesting naive frame dropping or migrating the 3D fusion model to the DLA.
    **The Rationale:** Candidates prioritize code simplicity over fail-operational safety or ignore that the DLA lacks support for complex custom layers.
    **The Consequence:** Ruins the tracking model's temporal consistency or causes a hard crash when unsupported operations fail on the DLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 20 FPS (50ms budget).
    - Normal measured latency: 3D fusion on GPU = 42ms; DLA tracking runs in parallel and does not extend the critical path.
    - Throttled state: 40% GPU clock reduction, approximated as 1 / 0.6 = 1.67x GPU latency.
    - Degradation rungs: downsampled fusion = 28ms normal GPU latency; camera-dominant sparse LiDAR = 22ms; camera-only = 16ms.

    **Calculations:**
    - Full fusion under throttle: 42ms * 1.67 = 70ms, which misses the 50ms budget.
    - Downsampled fusion under throttle: 28ms * 1.67 = 47ms, which fits if accuracy remains acceptable.
    - Camera-dominant sparse LiDAR under throttle: 22ms * 1.67 = 37ms.
    - Camera-only under throttle: 16ms * 1.67 = 27ms, leaving margin for pre/post-processing.

    **Conclusion & Interpretation:**
    - **Result: latency-bounded degradation ladder**. The full fusion model misses 20 FPS after throttling, while the first viable rung that measures below 50ms should be selected; deeper rungs preserve safety margin as thermal pressure worsens.
