title: Thermal Throttling Degradation on Jetson Orin
scenario: An autonomous mobile robot powered by an NVIDIA Jetson Orin is operating in an industrial setting. Due to high ambient temperatures and sustained 60W TDP utilization, the SoC triggers thermal throttling, reducing the available Ampere GPU clock speed by 40%. The perception pipeline normally runs a heavy 3D LiDAR+Camera fusion model on the GPU and a lightweight pedestrian tracking model on the DLA accelerator.
question: What degradation ladder would you use after a 40% GPU clock throttle to keep the perception pipeline at a safe 20 FPS?
details:
  realistic_solution: Implement a deterministic fail-operational fallback strategy via Quality-of-Service (QoS) shedding. Drop the LiDAR point-cloud processing and fail over to an INT8 2D camera-only object detection model on the GPU, while maintaining pedestrian tracking on the DLA. This gracefully degrades depth precision while guaranteeing the hard real-time 20 FPS deadline.
  common_mistake: |
    **The Pitfall:** Suggesting naive frame dropping or migrating the 3D fusion model to the DLA.
    **The Rationale:** Candidates prioritize code simplicity over fail-operational safety or ignore that the DLA lacks support for complex custom layers.
    **The Consequence:** Ruins the tracking model's temporal consistency or causes a hard crash when unsupported operations fail on the DLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 20 FPS (50ms budget).
    - Normal workload: 3D fusion (120 TOPS GPU), Tracking (20 TOPS DLA). Total 140 TOPS.
    - Throttled state: 40% GPU clock reduction.

    **Calculations:**
    - Throttling causes latency to exceed 50ms at 120 TOPS GPU load.
    - Fallback workload: 2D Camera-only (35 TOPS GPU).
    - Total fallback compute = 35 TOPS (GPU) + 20 TOPS (DLA) = 55 TOPS.
    - Compute reduction = (140 - 55) / 140 = 60.7%.

    **Conclusion & Interpretation:**
    - **Result: 60% compute reduction (Thermal-Bound Mitigation)**. Shedding the 3D fusion model drops compute load by 60%, maintaining 20 FPS during thermal throttling.
