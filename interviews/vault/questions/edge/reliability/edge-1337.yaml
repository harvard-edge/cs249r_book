title: Adversarial Defense Overhead on Hailo-8
scenario: 'You are deploying an intrusion detection model on a Hailo-8 accelerator. To defend against physical adversarial patches, you implement an input perturbation defense: the host CPU generates 3 randomly cropped and smoothed versions of each incoming 1080p RGB frame (1920x1080), which are then streamed to the Hailo-8 for ensemble voting. The base model requires 30 GOPS per inference, and the Hailo-8 achieves 20% effective utilization for this workload. The host CPU takes 4ms total to generate the 3 perturbed frames.'
question: What are the total end-to-end latency and accelerator streaming-window host memory read bandwidth for one frame with 3 perturbed 1080p inputs on the Hailo-8?
details:
  realistic_solution: Since the Hailo-8 relies on host memory streaming for the perturbed inputs, the host must store and transmit all 3 frames during the accelerator execution window. Calculate effective accelerator throughput, use it to find the 3-pass inference time, and add the 4ms CPU preprocessing time for total end-to-end latency. The host read bandwidth requested here is the streaming-window bandwidth, so divide the 3-frame data volume by accelerator inference time rather than by total latency.
  common_mistake: |
    **The Pitfall:** Forgetting to multiply the inference compute by 3 for the ensemble or failing to apply the 20% utilization factor.
    **The Rationale:** Candidates overlook the architectural constraint that lacking local DRAM means the Hailo-8 must stream all 3 full perturbed frames directly from host memory.
    **The Consequence:** Miscalculating the bandwidth requirement, leading to a system design that completely saturates the host memory bus.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hailo-8 peak: 26 TOPS INT8
       - Effective utilization: 20%
       - Compute per inference: 30 GOPS
       - Frame size: 1920x1080x3 (RGB) = ~6.22 MB
       - Perturbed frames: 3
       - CPU preprocessing: 4 ms
    **Calculations:**
       - Effective throughput = 26 TOPS * 0.20 = 5.2 TOPS (5200 GOPS)
       - Total compute needed = 3 frames * 30 GOPS = 90 GOPS
       - Accelerator latency = 90 GOPS / 5200 GOPS = 17.3 ms
       - End-to-end latency = 4 ms + 17.3 ms = 21.3 ms
       - Total data streamed = 3 frames * 6.22 MB = 18.66 MB
       - Host read bandwidth during accelerator streaming window = 18.66 MB / 0.0173 s = ~1078 MB/s (1.08 GB/s)
    **Conclusion & Interpretation:**
       - **Result: 21.3 ms total latency and 1.08 GB/s sustained host read bandwidth during the 17.3 ms accelerator streaming window.**
