title: Edge AI Observability for Autonomous Perception on Jetson Orin
scenario: 'You are leading the MLOps team responsible for deploying and maintaining a critical, real-time object detection model on a fleet of autonomous vehicles. Each vehicle is equipped with an NVIDIA Jetson Orin which processes sensor data and runs the model at the edge. You need to ensure extreme reliability and immediate detection of issues.'
question: 'How would you design monitoring and observability for Jetson Orin autonomous vehicles, covering telemetry, alerts, MTBF/MTTR, stragglers, and dashboards?'
details:
  realistic_solution: 'A robust solution involves a hybrid monitoring architecture. Deploy a lightweight, resource-optimized monitoring agent locally to capture: (1) Model Metrics (latency p99, throughput, distribution shifts), (2) Hardware Metrics (temperature, power envelope, memory), and (3) System Metrics. Locally cache telemetry and transmit via batched MQTT. Implement immediate local alerts for critical on-device failures and cloud-based alerts for fleet anomalies.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on standard cloud-centric monitoring agents (like raw Prometheus scraping) without localized edge buffering.
    **The Rationale:** Teams port standard DevOps practices from cloud servers directly to the edge, assuming continuous bandwidth and abundant RAM.
    **The Consequence:** Intermittent network drops cause massive telemetry data loss, and bulky monitoring agents consume excessive LPDDR5 memory and power, interfering with the autonomous driving pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 metrics/sec at 200 bytes each.
    - 4-hour network dropout survival requirement.
    - 50% data compression.

    **Calculations:**
    - Raw Telemetry: 100 * 200 = 20 KB/sec per device.
    - Local Buffering (4 hours): 20 KB/sec * 14,400 seconds = 288 MB.
    - Compressed Buffer: 288 MB * 0.50 = 144 MB.

    **Conclusion & Interpretation:**
    - **Result: 144 MB strict storage buffer (Storage-Capacity-Bound)**. Guarantees complete observability during extended dropouts.
