title: Metrics and Alert Thresholds for Cellular Edge Fleet Monitoring
scenario: You're the ML platform architect for a fleet of 50,000 edge devices across 200 cities. Each device has intermittent cellular connectivity, capable of uploading at most 1 MB per day.
question: What metrics do you collect, how do you aggregate them, and what are your alerting thresholds?
details:
  realistic_solution: 'Build hierarchical edge-cloud monitoring with explicit metrics and thresholds. On-device, upload hourly aggregates only: inference count, mean/p50/p95 latency, error and reboot counts, queue depth, dropped frames, mean confidence, detection-count histograms, model/firmware version, battery/thermal state, and cellular signal quality. Device alerts fire locally on hard failures such as no inference for 10 minutes, p95 latency above the SLA for 3 windows, error rate above 5%, or confidence more than 3 standard deviations below that device baseline. City collectors aggregate p50/p95/p99 and version cohorts; page when more than 1% of devices in a city are unhealthy for 15 minutes or a city-level metric shifts by more than 3 sigma. The global dashboard tracks fleet trends and rollout cohorts, while raw inference payloads never stream to the cloud.'
  common_mistake: |
    **The Pitfall:** Attempting to stream raw inference results or telemetry traces to the cloud.
    **The Rationale:** Architects default to cloud-native monitoring patterns without calculating the bandwidth impact of a massive physical fleet.
    **The Consequence:** Overwhelming the cellular connection, resulting in thousands of dollars in overage fees and dropped critical alerts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 50,000 devices.
    - Upload limit: 1 MB/day per device.

    **Calculations:**
    - Cloud ingestion at the upload cap: 50,000 devices * 1 MB/day = 50,000 MB/day ≈ 50 GB/day.
    - Three-year retained storage at that rate: 50 GB/day * 365 days/year * 3 years = 54,750 GB ≈ 54.75 TB.
    - Steady-state storage bill after the retention window fills: 54,750 GB * $0.023/GB-month ≈ $1,259/month.
    - Cellular Costs: 1 MB/day * 30 days * $0.01/MB * 50,000 = $15,000/month.
    - Total steady-state monthly cost at the upload cap ≈ $16,259/month.
    - If each device sends a 300-byte hourly aggregate, daily upload is 300 B * 24 * 50,000 ≈ 360 MB/day, cutting bandwidth by about 139x versus the 50 GB/day cap.

    **Conclusion & Interpretation:**
    - **Result: Hierarchical Aggregation Required (Bandwidth-Bound)**. At the 1 MB/day cap, steady-state storage plus cellular cost is about $16.3K/month. Compact hourly aggregates preserve actionable metrics and thresholds while keeping the actual payload far below the cap.
