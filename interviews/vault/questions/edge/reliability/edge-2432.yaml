title: Supercapacitor Graceful Shutdown
scenario: An industrial robot with an edge accelerator loses AC power and relies on a supercapacitor for 5 seconds of backup runtime.
question: During the 5-second shutdown window, which subsystems must checkpoint and in what canonical order?
details:
  realistic_solution: The 5-second window provides just enough energy to execute a graceful shutdown sequence. The software must flush in-flight telemetry, write local inference state to non-volatile flash, and safely close file handles. This ensures the filesystem does not corrupt and the robot resumes cleanly upon power restoration.
  common_mistake: |
    **The Pitfall:** Prioritizing ongoing inference over system stability.
    **The Rationale:** Candidates often suggest the 5 seconds should be used to finish the current inference task and alert a central server.
    **The Consequence:** This ignores local state corruption risks, potentially bricking the device's filesystem upon sudden power loss.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Backup Power Window: 5 seconds strictly
       - Critical State Payload: <10MB
    2. **Calculations:**
       - Required Write Speed: 10MB / 5 seconds = 2 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: I/O Storage-Bound.** The software stack must prioritize gracefully flushing the <10MB state to non-volatile flash within the 5-second window to guarantee filesystem integrity.
