title: Adversarial Robustness Design for INT8 Edge Image Classification
scenario: You are tasked with deploying a critical image classification model onto an edge AI accelerator. The client emphasizes that the system must be highly reliable and secure against adversarial attacks, model extraction attempts, and side-channel vulnerabilities.
question: How would you secure and harden an INT8 image classifier against adversarial inputs, extraction, and side channels within edge constraints?
details:
  realistic_solution: Use edge-feasible defenses that map directly to the threats. Add deterministic input validation and bounded preprocessing for malformed or out-of-distribution images, and use adversarial training or calibration that is compatible with the deployed INT8 graph and latency budget. Limit model-extraction risk with rate limiting, query auditing, confidence/score throttling where appropriate, secure boot, encrypted model storage, and process or TEE isolation; note that TEEs protect model handling but do not stop extraction from unlimited black-box queries. Reduce side-channel leakage with disabled debug interfaces, isolation from untrusted co-tenants, constant-control-flow kernels where practical, fixed-size batches and buffers, and cache or memory-access hardening supported by the target runtime.
  common_mistake: |
    **The Pitfall:** Proposing defense mechanisms that are computationally too expensive for the edge device.
    **The Rationale:** Candidates suggest state-of-the-art adversarial training without tracking the compute limit.
    **The Consequence:** The added security overhead pushes the system beyond its real-time processing constraints, causing dropped frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute limit: 400 TOPS.
    - Target frame rate: 100 FPS (10 ms latency budget).
    - Base model cost: 2 TOP per image.

    **Calculations:**
    - Compute budget per image: 400 TOPS / 100 FPS = 4 TOP per image.
    - Available budget for defenses: 4 TOP - 2 TOP = 2 TOP per image.

    **Conclusion & Interpretation:**
    - **Result: 2 TOP per image (Compute-Bound)**. The hardware capacity is exceeded if a defense adds > 2 TOP per image.
