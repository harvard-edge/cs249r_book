title: On-Device Distribution Drift Detection for Edge TPU
scenario: 'You are leading the deployment of a visual inspection system across thousands of remote manufacturing sites using the Google Coral Edge TPU. Due to seasonal lighting changes and sensor aging, the input data distribution drifts over time. Network bandwidth is severely constrained, making it impossible to stream raw images back to the cloud.'
question: 'How would you detect statistical data drift on-device using the Coral Edge TPU without streaming raw images or disrupting INT8 inference?'
details:
  realistic_solution: 'Leverage intermediate INT8 activation maps (embeddings) from the primary inspection model. Maintain running, binned histograms of these low-precision embeddings in the host''s memory. A lightweight process computes the Population Stability Index (PSI) using these histograms against a baseline. If PSI exceeds a threshold, transmit only the anomalous embeddings or heavily compressed samples.'
  common_mistake: |
    **The Pitfall:** Suggesting the calculation of continuous statistical metrics directly on the raw input stream using a secondary model.
    **The Rationale:** Data scientists default to exact, continuous metrics standard in cloud environments where floating-point math is abundant.
    **The Consequence:** Unsupported floating-point math causes fallback to the host CPU, immediately violating power budgets, causing thermal throttling, and stalling inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256-dimensional INT8 embedding at 30 FPS.
    - 16-bin histograms using 32-bit integers.

    **Calculations:**
    - Local Storage: 256 dims * 16 bins * 4 bytes = 16,384 bytes = 16.38 KB of RAM per time window.
    - Compute Load: Calculating PSI from 16 KB of integers on host CPU takes <1 million operations.

    **Conclusion & Interpretation:**
    - **Result: 16.38 KB RAM required (Compute-Bound)**. Drift detection operates entirely within the power envelope.
