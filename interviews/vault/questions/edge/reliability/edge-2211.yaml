title: Edge Drift Alert Spec
scenario: A predictive-maintenance model runs at 40 factories. Some factories have different machine types and duty cycles.
question: What should an edge drift alert specify to distinguish true drift from normal factory-specific patterns?
details:
  realistic_solution: 'The alert specification must define site baselines, machine-type cohorts, and minimum sample windows. It should compare each site strictly to its own historical baseline and to identical peer cohorts, utilizing metrics like PSI or KL divergence, rather than blindly comparing local stats to a monolithic global distribution.'
  common_mistake: |
    **The Pitfall:** Utilizing a single global baseline for the entire fleet.
    **The Rationale:** Engineers assume ML models degrade uniformly, failing to account for regional operational variance and different duty cycles.
    **The Consequence:** Alert storms from perfectly healthy factories that just happen to run night shifts, rendering the drift system untrustable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40 factories, varying machine types.
       - Factory A runs 70% night shifts, Factory B runs 10%.
    2. **Calculations:**
       - Global mean shift = 40%.
       - Factory A divergence from global = +30% (False Anomaly).
       - Factory B divergence from global = -30% (False Anomaly).
    3. **Conclusion & Interpretation:**
       - **Result: Fleet Segmentation Required**. A global baseline guarantees massive false positives. Drift metrics must be strictly localized to site-specific cohorts.
