title: Coral TPU Edge Drift Detection Architecture
scenario: You are designing a visual inspection system for a manufacturing line using an edge TPU constrained to a 2W power budget. The models must be quantized to INT8 to run on the TPU.
question: 'How would you detect lighting or sensor drift on the system without exceeding the 2W budget or relying on unsupported operators?'
details:
  realistic_solution: 'The optimal design involves a hybrid approach. The TPU extracts low-dimensional INT8 embeddings or outputs softmax probabilities during normal inference. These lightweight features are periodically batched and sent to a central server or local edge gateway where more complex statistical tests (like PSI or KL divergence) are calculated on full precision hardware. Alternatively, implement a lightweight INT8-quantizable binary classifier (drift vs non-drift) trained specifically for the TPU.'
  common_mistake: |
    **The Pitfall:** Proposing complex statistical drift detection models directly on the edge device.
    **The Rationale:** Candidates ignore the TPU's limited operator support and INT8 quantization constraints, forgetting that computing drift metrics taxes the host CPU.
    **The Consequence:** The system violates the strict 2W power constraints or fails to compile for the TPU due to unsupported FP32 operators.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU limit: 2W power budget, INT8 only.
    - Camera: 30 FPS.
    - Embedding size: 128-dim INT8 vector (128 bytes).

    **Calculations:**
    - Data generated per second = 30 FPS * 128 bytes = 3.84 KB/s.
    - Data per hour = 3.84 KB/s * 3600 seconds = ~13.8 MB/hour.

    **Conclusion & Interpretation:**
    - **Result: 13.8 MB/hr Payload (Power-Bound)**. Lightweight embeddings allow drift detection to be easily offloaded.
