title: The EMC Compliance Nightmare
scenario: Your Jetson Orin NX-based traffic monitoring system passes all functional tests but fails EMC (electromagnetic compatibility) compliance testing — specifically radiated emissions at 125 MHz and 375 MHz exceed FCC Class B limits by 8 dB. The emissions only appear when the neural network is running inference. When the system is idle, it passes.
question: What is the neural network doing that generates RF emissions, and how do you fix it without changing the model?
details:
  realistic_solution: The inference workload is not emitting RF by itself; it is creating bursty, periodic current draw and memory traffic that can modulate existing board clocks and power rails. A 125 MHz peak could plausibly be a harmonic of a 25 MHz reference, while the 375 MHz peak could be a higher harmonic excited by the same layout or power-delivery path. First try firmware/clock mitigations such as enabling Spread Spectrum Clocking (SSC) where the platform supports it, reducing synchronous burstiness, or changing memory/clock settings. If measurements still fail, use board-level EMI fixes such as decoupling, shielding, return-path cleanup, or ferrites on the measured noisy supply path; a ferrite bead is not a universal fix for a radiated clock harmonic.
  common_mistake: |
    **The Pitfall:** Assuming physical phenomena are solely hardware defects.
    **The Rationale:** ML engineers usually treat hardware as a black box abstraction and blame "defective GPUs" or suggest wrapping the device in an expensive metal cage.
    **The Consequence:** They miss the software-hardware interaction (bursty inference traffic exciting board-level EMI paths) and jump either to expensive shielding or to a single component change without confirming the emission path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compliance Target: FCC Class B limit (43.5 dBμV/m at 125 MHz)
       - Measured Fault Level: 51.5 dBμV/m
    2. **Calculations:**
       - Excess over limit = 51.5 dBμV/m - 43.5 dBμV/m = 8 dB.
       - SSC can spread a narrowband clock peak over a wider frequency range, reducing the measured quasi-peak amplitude, but the exact dB reduction must be verified in the chamber.
       - If SSC reduces the peak by at least 8 dB, the system reaches the limit; good design practice still needs margin, so board-level mitigation may also be required.
    3. **Conclusion & Interpretation:**
       - **Result: EMI Coupling Under Inference Load.** The workload's bursty memory and power behavior is exciting an existing clock/power emission path. SSC is a plausible no-BOM mitigation for narrowband peaks, but compliance requires measurement; ferrites or shielding are follow-up hardware fixes only after identifying the noisy path.
