title: The EMC Compliance Nightmare
scenario: Your Jetson Orin NX-based traffic monitoring system passes all functional tests but fails EMC (electromagnetic compatibility) compliance testing — specifically radiated emissions at 125 MHz and 375 MHz exceed FCC Class B limits by 8 dB. The emissions only appear when the neural network is running inference. When the system is idle, it passes.
question: What is the neural network doing that generates RF emissions, and how do you fix it without changing the model?
details:
  realistic_solution: 'The 125 MHz emission is the 5th harmonic of the Orin''s 25 MHz reference clock, amplified by the neural network''s memory access pattern. During inference, the GPU reads weights and activations from LPDDR5 in large, periodic bursts creating a lower-frequency envelope. Fix it by enabling Spread Spectrum Clocking (SSC) in the OS bootloader to smear the peak RF energy, or add a $0.55 ferrite bead to the power delivery trace.'
  common_mistake: |
    **The Pitfall:** Assuming physical phenomena are solely hardware defects.
    **The Rationale:** ML engineers usually treat hardware as a black box abstraction and blame "defective GPUs" or suggest wrapping the device in an expensive metal cage.
    **The Consequence:** They miss the software-hardware interaction (burst memory access creating an RF envelope) and propose a $50 BOM cost increase when a free firmware flag (SSC) or a $0.50 bead would solve it.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compliance Target: FCC Class B limit (43.5 dBμV/m at 125 MHz)
       - Measured Fault Level: 51.5 dBμV/m
    2. **Calculations:**
       - SSC Clock Adjustment: ±0.5% Smearing = ~8 dB attenuation
       - Adjusted Compliance: 51.5 dBμV/m - 8 dB = 43.5 dBμV/m
       - Hardware Margin Buffer: Ferrite bead adds -6 dB headroom
    3. **Conclusion & Interpretation:**
       - **Result: Electromagnetic-Bound.** Software inference operations organically trigger localized hardware resonance. Utilizing OS-level spread spectrum clocking attenuates the spike by exactly 8 dB, recovering full FCC compliance without hardware modification.
