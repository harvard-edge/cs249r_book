title: Quantifying Adversarial Defense Overhead on Edge AI for Real-time Systems
scenario: You are deploying a critical object detection model (ResNet-50) on an NVIDIA Jetson Orin with its 32 GB LPDDR5, 275 TOPS INT8 performance, operating within a 60W power budget, for real-time traffic monitoring. You've identified that the system is vulnerable to adversarial patch attacks that cause significant misclassifications. To mitigate this, you propose integrating an adversarial defense mechanism, specifically a certified robustness technique (e.g., randomized smoothing or an input purification method) into the inference pipeline. The baseline model without defense processes at 35 FPS.
question: What is the maximum extra latency an adversarial defense can add while maintaining a minimum real-time processing rate of 25 FPS, and what edge trade-offs follow?
details:
  realistic_solution: |
    The baseline latency is 1000 / 35 = 28.57 ms per frame, while 25 FPS allows 40 ms per frame, so the defense can add at most 11.43 ms per frame. On the Jetson Orin, that leaves a narrow latency and power margin: prefer INT8-optimized, lightweight defenses that run in the existing pipeline, and reject heavier certified methods if they reduce throughput below 25 FPS. The trade-off is improved robustness versus less real-time headroom, higher power use, and possible accuracy loss from quantized or approximate defenses.
  common_mistake: |
    **The Pitfall:** Proposing computationally expensive defense strategies ported from cloud environments.
    **The Rationale:** Doing so without considering edge hardware constraints.
    **The Consequence:** Causing the pipeline to miss real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline framerate: 35 FPS.
    - Target real-time framerate: 25 FPS.

    **Calculations:**
    - Baseline Inference Latency: 1000 ms / 35 FPS = 28.57 ms.
    - Required Total Inference Latency: 1000 ms / 25 FPS = 40 ms.
    - Maximum Allowable Defense Latency: 40 ms - 28.57 ms = 11.43 ms.

    **Conclusion & Interpretation:**
    - **Result: 11.43 ms (Compute-Bound)**. The adversarial defense mechanism must introduce no more than 11.43 ms of overhead per frame.
