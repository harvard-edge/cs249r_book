title: Hailo-8 Traffic Camera Drift Detection Specification
scenario: A smart city traffic camera uses a Hailo-8 accelerator to run an object detection model, streaming data directly from the host SoC's memory since it lacks local DRAM. The city experiences significant seasonal weather changes (snow, heavy rain) that degrade model accuracy.
question: How would you detect seasonal data drift at the edge on Hailo-8 without adding host memory bandwidth pressure or disrupting inference?
details:
  realistic_solution: 'The optimal specification leverages the Hailo-8''s dataflow architecture by extracting low-dimensional intermediate INT8 feature maps or embeddings from the existing inference pipeline. These tiny representations are sampled periodically (e.g., 1 FPS) and sent to the host CPU, which maintains a reference distribution and computes a lightweight Population Stability Index (PSI) to detect drift with minimal memory and compute overhead.'
  common_mistake: |
    **The Pitfall:** Computing complex statistical metrics on raw high-resolution images.
    **The Rationale:** Candidates default to standard cloud drift detection techniques (like KL divergence on raw pixels) ignoring edge constraints.
    **The Consequence:** The host CPU becomes heavily bottlenecked on memory bandwidth, disrupting the accelerator and exceeding the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw Ingest: 1080p RGB (1920x1080x3 = 6.2 MB) at 30 FPS.
    - Feature vector size: 512-byte INT8.
    - Drift sampling rate: 1 FPS.

    **Calculations:**
    - Raw Ingest Bandwidth: 6.2 MB * 30 = 186 MB/s.
    - Drift Sampling Bandwidth: 512 bytes * 1 = 512 B/s.
    - Bandwidth Overhead: 512 B/s / 186,000,000 B/s = ~0.00027%.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound.** Using low-dimensional feature vectors safely preserves memory bandwidth for inference while enabling continuous edge drift detection with negligible overhead.
