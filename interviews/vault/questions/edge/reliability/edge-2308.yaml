title: Evaluate effective uptime comparing different edge checkpointing intervals
scenario: A fleet of autonomous drones uses Jetson AGX Orin modules. Due to harsh conditions, transient power faults happen exactly every 10 minutes. A local state checkpoint of 2GB is written to a slow flash drive at 50 MB/s.
question: Evaluate whether a 1-minute checkpoint interval provides a higher effective application throughput compared to a 5-minute interval?
details:
  realistic_solution: Writing 2GB at 50 MB/s takes 40 seconds. A 1-minute interval yields 20s of compute per 60s, or 33.3% throughput efficiency, while limiting replay after a fault to at most 1 minute. A 5-minute interval yields 260s of compute per 300s, or 86.7% efficiency, but risks replaying up to 5 minutes after each 10-minute fault. For effective application throughput, the 5-minute interval still wins because the 1-minute policy spends most wall time writing checkpoints.
  common_mistake: |
    **The Pitfall:** Assuming more frequent checkpoints always increase system throughput.
    **The Rationale:** Candidates fail to factor in the massive I/O time overhead required for checkpointing.
    **The Consequence:** The system spends a disproportionate amount of time writing to disk, drastically reducing effective application throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 2GB.
    - Write speed: 50 MB/s.
    - Interval options: 1-minute vs 5-minute.

    **Calculations:**
    - Write time = 2000 MB / 50 MB/s = 40s.
    - 1-minute interval overhead = 40s / 60s = 66.7%; useful compute = 20s / 60s = 33.3%.
    - 5-minute interval overhead = 40s / 300s = 13.3%; useful compute = 260s / 300s = 86.7%.
    - Fault recovery tradeoff: 1-minute checkpoints bound replay to <=1 minute, while 5-minute checkpoints bound replay to <=5 minutes after each 10-minute fault.

    **Conclusion & Interpretation:**
    - **Result: 5-minute interval wins (I/O-Bound).** The 1-minute interval spends 66.7% of wall time writing checkpoints, leaving only 33.3% for application work, while the 5-minute interval spends 13.3% writing and leaves 86.7% for useful compute. The shorter interval improves recovery window, not steady effective throughput.
