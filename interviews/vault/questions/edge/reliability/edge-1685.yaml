title: 'Optimizing Adversarial Purification on Jetson Orin'
scenario: 'An autonomous security pipeline runs on an edge GPU. To defend against physical adversarial patches, an FP16 denoising autoencoder purifies frames before passing them to the main object detector. Currently, both models execute sequentially on the GPU, causing memory bandwidth contention and reducing throughput to 15 FPS instead of the required 30 FPS, while maxing out the thermal limit.'
question: 'How would you diagnose the hardware bottleneck and quantify the performance gain of a deployment optimization?'
details:
  realistic_solution: 'The bottleneck is GPU contention and memory bandwidth saturation from sequential FP16 execution. The solution is to quantize the main object detector to INT8 and offload it to the DLA, which is heavily optimized for dense INT8 operations. This allows the GPU to exclusively run the FP16 adversarial purification model, enabling a pipelined architecture where both compute blocks run concurrently, drastically reducing latency and power draw. Confirm DLA offloading using nsys profiling.'
  common_mistake: |
    **The Pitfall:** Suggesting pruning or knowledge distillation to shrink the models.
    **The Rationale:** Candidates default to model compression without analyzing the heterogeneous hardware architecture.
    **The Consequence:** They fail to utilize the available Deep Learning Accelerator (DLA) to resolve contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current latency: Purification (25ms) + Detector (41ms) = 66ms (15 FPS).
    - Target latency for 30 FPS: < 33.3ms.

    **Calculations:**
    - Optimization: Quantize detector to INT8 and offload to DLA (3x speedup -> ~14ms).
    - Pipeline throughput dictated by slowest stage: max(25ms, 14ms) = 25ms.
    - New throughput: 1000ms / 25ms = 40 FPS.

    **Conclusion & Interpretation:**
    - **Result: 40 FPS (Compute-Bound)**. Pipelining drastically reduces latency and exceeds the target.
