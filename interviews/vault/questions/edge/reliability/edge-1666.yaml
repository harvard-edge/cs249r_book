title: 'Autonomous Fleet Telemetry on Jetson Orin'
scenario: 'You are designing the observability architecture for a fleet of agricultural robots, each powered by an NVIDIA Jetson Orin. The system must process multiple high-resolution camera streams using the Ampere GPU and DLA accelerator, operating strictly within a 60W TDP. Because the robots experience intermittent connectivity for up to 12 hours, you need to design a telemetry system that tracks hardware health, thermal throttling, and model stragglers without exhausting the 32 GB LPDDR5 memory shared with the perception stack.'
question: 'How would you design telemetry for Jetson Orin robots that can buffer 12 hours offline without starving the perception stack or memory?'
details:
  realistic_solution: 'Design a lightweight, edge-native telemetry agent that performs aggressive local aggregation and downsampling to minimize overhead. High-frequency metrics like power draw and DLA utilization should be written to a fixed-size ring buffer, while only low-resolution summaries (e.g., 1-minute min/max/p99) and critical anomaly events are persisted for eventual cloud transmission. This approach strictly bounds the observability memory footprint and ensures telemetry processing never competes with the perception models for the 275 TOPS INT8 compute budget.'
  common_mistake: 'Candidates often propose deploying standard cloud-native sidecars like Prometheus and fluent-bit, ignoring their memory footprint and the massive volume of data generated during network partitions. They also frequently fail to account for the shared memory architecture, where excessive telemetry buffering can cause the OS to evict critical perception models from the limited RAM.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Metrics collected: 500 metrics at 10Hz (8 bytes per metric).
    - Offline buffering duration: 12 hours (43,200 seconds).

    **Calculations:**
    - Raw data rate: 500 * 10 * 8 bytes = 40,000 bytes/s (40 KB/s).
    - Raw telemetry storage over 12 hours: 40 KB/s * 43,200 s = 1,728,000 KB = ~1.72 GB.
    - Downsampling compression factor (to 1-minute intervals): 600x.
    - Downsampled telemetry storage: 1.72 GB / 600 = ~2.8 MB.

    **Conclusion & Interpretation:**
    - **Result: 2.8 MB storage requirement (Memory-Bound)**. Local downsampling prevents the telemetry agent from causing out-of-memory errors on the shared 32 GB LPDDR5.
