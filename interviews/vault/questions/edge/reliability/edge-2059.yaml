title: 'Hailo-8 Edge Deployment: Diagnosing Performance Degradation through Telemetry'
scenario: Imagine you've deployed a fleet of edge devices, each equipped with a Hailo-8 accelerator (26 TOPS INT8, 2.5W typical power consumption) running a critical object detection model. These devices are deployed in remote locations, processing video streams. Recently, your central monitoring dashboard shows an increasing trend in inference latency for a subset of these devices, while others perform normally. The Hailo-8's reported power consumption for the affected devices remains within normal limits, and the raw device utilization metrics (e.g., NPU core usage) appear high but not saturated. Your team suspects a subtle, intermittent issue.
question: As a reliability engineer, specify what additional telemetry you would collect and how you would correlate it to pinpoint why only some Hailo-8 devices show rising latency?
details:
  realistic_solution: |
    Enrich telemetry beyond aggregate NPU utilization and power. Collect per-device pre-inference timestamps, input buffer fill rate, frame acquisition time, preprocessing latency, host CPU load, queue depth, frame-drop rate, Hailo execution time, device memory counters where available, thermal readings, post-processing time, and network egress latency. Correlate these as per-device latency histograms over time. If affected devices show rising pre-inference latency, deeper input queues, or higher CPU load while Hailo execution time and power stay normal, the issue is localized to the host or input pipeline rather than the accelerator.
  common_mistake: |
    **The Pitfall:** Solely focusing on aggregate device health metrics or assuming a hardware failure.
    **The Rationale:** Candidates neglect context-specific telemetry (queue depth, pre-processing latency) and blame the NPU instead of the host-to-device pipeline.
    **The Consequence:** Wasted engineering cycles debugging the accelerator while the actual host CPU bottlenecks remain unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS target (33.3ms per frame budget)
    - 10 MB/frame input data
    - Observed latency spikes to 100ms, Hailo-8 NPU inference takes 30ms

    **Calculations:**
    - Pre-processing time = 100ms - 30ms = 70ms
    - Required input bandwidth = 30 FPS * 10 MB = 300 MB/s
    - Host processing throughput = 10 MB / 0.07s = ~142 MB/s

    **Conclusion & Interpretation:**
    - **Result: 142 MB/s < 300 MB/s (Host/Pipeline-Bound)**. The observed 70ms outside the NPU is too slow for 30 FPS input handling, so the likely bottleneck is preprocessing, buffering, or host I/O rather than Hailo compute.
