title: Edge Drift Detection Overhead
scenario: You are running a computer vision pipeline on an on-premise Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W) at a remote manufacturing facility. To detect data drift locally without transmitting raw frames to the cloud, you must compute the KL divergence of the image brightness histogram (256 bins) over a sliding window of 10,000 frames.
question: What is the memory footprint in bytes and operation count required per check to calculate the KL divergence of two 256-bin FP32 histograms?
details:
  realistic_solution: 'The correct approach is to maintain simple frequency counts for the 256 bins on the host CPU. Once 10,000 frames are processed, convert counts to probabilities and compute sum(P(i) * log(P(i)/Q(i))). The memory footprint is tiny, and the compute is negligible, making it a perfect, lightweight drift monitor for the 75W edge power constraint.'
  common_mistake: Overestimating the cost of statistical drift detection, incorrectly assuming it requires complex parallel reductions on the accelerator or must be computed in INT8 to match the accelerator's peak TOPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 bins, FP32 (4 bytes/float)
    - Reference Q and Current P distributions

    **Calculations:**
    - Memory = 256 bins * 4 bytes = 1,024 bytes per distribution
    - Total Memory = 1 KB (P) + 1 KB (Q) = 2 KB
    - Operations = 256 bins * 4 ops (div, log, mult, add) = 1,024 FLOPs

    **Conclusion & Interpretation:**
    - **Result: 2 KB and 1,024 FLOPs (Compute-Bound)**. This is a microscopic fraction of the 32GB/400 TOPS budget and easily runs on the host CPU with zero accelerator impact.
