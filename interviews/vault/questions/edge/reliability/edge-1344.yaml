title: Drift Detection Latency Budget on Google Coral
scenario: You are deploying a vision model on a Google Coral Edge TPU for a smart doorbell. To detect training-serving skew, you want to compute the Population Stability Index (PSI) on the quantized INT8 activation distributions of a key intermediate layer across 10 bins. The Coral TPU processes the main inference in 15ms.
question: With 15 ms inference in a 20 ms frame budget, is 10-bin PSI on the host CPU feasible and how much latency budget remains?
details:
  realistic_solution: 'Acknowledge the TPU''s limited operator support and offload the PSI calculation to the host CPU. Extract INT8 activations, update a 10-bin histogram, and calculate PSI against a pre-computed baseline. CPU latency for this statistical check is trivial and easily fits the budget.'
  common_mistake: |
    **The Pitfall:** Assuming drift analytics must run on the NPU to be fast.
    **The Rationale:** Candidates incorrectly treat the Edge TPU as a general-purpose processor, forgetting it fundamentally lacks support for complex logarithmic operations.
    **The Consequence:** Wasting engineering cycles attempting to compile unsupported operations to the TPU, leading to complete pipeline failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Frame Budget: 20 ms.
       - Inference Time: 15 ms.
       - PSI calculation: 10 bins, requiring ~50 FLOPs (subtractions, divisions, logarithms, multiplications).
       - CPU capacity: >1 GFLOPS (>1M FLOPs/ms).
    2. **Calculations:**
       - Remaining Budget = 20 ms - 15 ms = 5 ms.
       - PSI CPU Execution Time = 50 FLOPs / 1,000,000 FLOPs/ms = 0.00005 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute Feasible**. The 5ms remaining budget is orders of magnitude larger than the microsecond required to compute 10-bin PSI on the host CPU.
