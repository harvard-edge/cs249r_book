title: Debugging SecAgg Stragglers and Metric Bias
scenario: A fleet of 5 million mobile devices runs an on-device NLP model. You deploy a Federated Analytics pipeline using Secure Aggregation to collect quantized performance metrics (15KB per device). You configure the SecAgg coordinator with a 15-second round timeout and a minimum client survival threshold of 60%. Over a week, you observe that 85% of the rounds fail completely. In the few rounds that succeed, the aggregated average inference latency is 12ms, despite lab profiling showing a fleet-wide average of 35ms.
question: Why are 85% of SecAgg rounds failing, and why do successful rounds report 12ms latency instead of the 35ms fleet average?
details:
  realistic_solution: The 15-second timeout systematically excludes low-end devices (stragglers) which require ~25 seconds to compute and transmit their metrics. Since low-end devices make up roughly half the fleet, survival rates rarely hit the 60% threshold, causing rounds to fail. Successful rounds are heavily biased toward flagship devices, artificially deflating the aggregated latency to 12ms. The solution is to dynamically scale the timeout based on device tier or implement asynchronous aggregation.
  common_mistake: |
    **The Pitfall:** Suspecting data corruption, incorrect quantization scales, or uniform network outages.
    **The Rationale:** Candidates fail to connect the strict timeout configuration with the statistical reality of device heterogeneity (flagship vs. low-end devices).
    **The Consequence:** Chasing non-existent bugs in the metric payload instead of fixing the timeout or aggregation strategy, leaving the pipeline broken.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet composition: ~50% flagships (12ms latency), ~50% low-end devices (58ms latency).
    - SecAgg Timeout: 15 seconds. Survival Threshold: 60%.
    - Flagship upload time: ~4s. Low-end upload time: ~25s.

    **Calculations:**
    - Upload timing: flagships finish in about 4s < 15s, while low-end devices need about 25s > 15s.
    - Timeout effect: the 15s cutoff deterministically excludes most low-end devices from the surviving SecAgg cohort.
    - Round survival: if only the roughly 50% flagship half survives, 50% survival < 60% threshold, so most rounds abort.
    - Metric bias: the true fleet latency average is (12ms + 58ms) / 2 = 35ms, but successful cohorts are dominated by flagships, so the reported aggregate is close to 12ms.

    **Conclusion & Interpretation:**
    - **Result: 12ms biased average (Timeout-Bound)**. The strict 15s timeout systematically excludes stragglers, causing round failures and deterministic metric deflation in the rounds that survive.
