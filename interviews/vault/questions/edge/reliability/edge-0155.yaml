title: The Edge Watchdog
scenario: You are deploying a vision model on a Jetson AGX Orin for a factory assembly line. The system has a hard real-time constraint, requiring it to process each frame within a 33ms budget to keep up with the conveyor belt. To handle potential software freezes, you must configure a hardware watchdog timer to automatically reboot the device.
question: What is the most appropriate timeout to set for this watchdog?
details:
  realistic_solution: The correct approach is to set the watchdog timeout to be a small multiple (typically 3-5x) of the task's deadline. For a 33ms processing budget, a timeout of ~100ms is a reasonable choice. This provides enough of a buffer to prevent resets from minor, transient delays while ensuring the system recovers from a genuine freeze in a timely manner, preventing prolonged downtime on the factory floor.
  common_mistake: Engineers accustomed to cloud services often select overly long timeouts (e.g., several seconds), failing to appreciate the immediate response needed in a hard real-time edge environment. Conversely, setting the timeout too close to the 33ms deadline can cause spurious reboots due to normal performance jitter, leading to system instability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard real-time constraint: 33ms processing budget.
    - Standard industry rule of thumb for watchdog: 3x to 5x the deadline.

    **Calculations:**
    - Minimum timeout: 33ms * 3 = 99ms.

    **Conclusion & Interpretation:**
    - **Result: ~100ms (Real-Time Reliability)**. A ~100ms watchdog timeout prevents false triggers from minor jitter while ensuring rapid recovery.
  options:
  - '~100 μs (microseconds)'
  - '~33 ms'
  - '~100 ms'
  - '~5 s (seconds)'
