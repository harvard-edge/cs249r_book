title: Designing Supercapacitor Emergency State Flushes for Edge
scenario: Hailo-8 powered traffic cameras process video at the edge. The local state must survive sudden power loss. The edge node has an NVMe drive and a small 1F supercapacitor (operating 5V to 3V).
question: Design an emergency checkpointing mechanism utilizing the supercapacitor, calculating if it holds enough energy to flush 50 MB of state to an NVMe drive writing at 500 MB/s.
details:
  realistic_solution: 'The NVMe write takes 0.1 seconds. The usable energy in the supercapacitor is 0.5 * C * (V1^2 - V2^2) = 0.5 * 1 * (25 - 9) = 8 Joules. Assuming the edge system draws 15W, it uses 1.5 Joules in 0.1s. The supercapacitor easily provides enough energy to flush the 50 MB state.'
  common_mistake: |
    **The Pitfall:** Using incorrect energy formulas for capacitors.
    **The Rationale:** Engineers might misapply standard battery formulas or use E = C*V instead of 0.5*C*V^2.
    **The Consequence:** They drastically miscalculate the available emergency power, leading to incomplete state flushes and data corruption upon power loss.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - State size = 50 MB. NVMe write speed = 500 MB/s.
       - Supercapacitor = 1F, operating from 5V down to 3V.
       - Edge system power draw = 15W.
    2. **Calculations:**
       - Time to Flush = 50 MB / 500 MB/s = 0.1 seconds.
       - Energy Required = 15W * 0.1s = 1.5 Joules.
       - Usable Energy Stored = 0.5 * C * (V1^2 - V2^2) = 0.5 * 1F * (5V^2 - 3V^2) = 0.5 * (25 - 9) = 8 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Sufficient**. With 8J available and only 1.5J required, the supercapacitor comfortably holds enough energy to flush the state to NVMe.
