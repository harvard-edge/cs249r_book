title: Dual-Tier Edge Checkpoint Formulation
scenario: An autonomous Jetson AGX Orin rover collects mapping data. It must safely back up state while keeping local checkpoint writes under 1 GB/hour for NVMe endurance and keeping cloud uploads under a 2 MB/s satellite uplink.
question: Formulate a dual-tier checkpointing mechanism that satisfies both local storage wear limits and narrow remote bandwidth constraints?
visual:
  kind: svg
  path: edge-2361.svg
  alt: Graph showing small frequent local checkpoints and one large rare cloud checkpoint.
  caption: Dual-Tier Checkpointing Profile.
details:
  realistic_solution: Implement a high-frequency, low-volume delta checkpoint locally to the NVMe, saving only changed state and capping the write rate below the 1 GB/hour endurance budget. Concurrently, schedule a sparse compressed full checkpoint for remote durability and upload it through a rate-limited background worker below the 2 MB/s satellite budget. The local tier optimizes fast recovery from short power faults; the remote tier protects against device loss without saturating the uplink.
  common_mistake: |
    **The Pitfall:** Attempting to write full checkpoints locally or uploading high-frequency deltas to the cloud.
    **The Rationale:** Candidates fail to balance the competing physical constraints, either prematurely wearing out the local SSD with large writes or choking the narrow satellite uplink with frequent transmissions.
    **The Consequence:** The device suffers premature hardware failure or fails to successfully sync state to the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local NVMe write budget: 1 GB/hour.
    - Satellite uplink budget: 2 MB/s.
    - Local delta checkpoint rate: 10 MB/min.
    - Remote compressed full checkpoint rate: 5 GB/hour.

    **Calculations:**
    - Local delta writes: 10 MB/min * 60 min/hour = 600 MB/hour.
    - Local headroom: 1 GB/hour - 600 MB/hour = about 424 MB/hour using binary GiB, or about 400 MB/hour using decimal GB.
    - Remote upload requirement: 5 GB/hour / 3600s = 1.39 MB/s.
    - Remote headroom: 2 MB/s - 1.39 MB/s = 0.61 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Dual-Tier Checkpoint Fits Both Budgets (IO-Bound)**. The local delta tier stays below the NVMe endurance budget, and the sparse remote full-checkpoint stream fits within the satellite uplink limit.
