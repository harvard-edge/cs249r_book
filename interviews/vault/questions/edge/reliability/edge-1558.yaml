title: Adversarial Purification on Hailo-8
scenario: You are deploying a traffic sign recognition system on a Hailo-8 dataflow accelerator. To defend against physical adversarial patch attacks, you decide to prepend a small adversarial purification CNN to the main detection model. The main detector requires 40 GOPS per frame, and the purification CNN requires 12 GOPS per frame. Assume 100% compute utilization and sufficient host memory streaming bandwidth.
question: What maximum FPS and energy per frame result from running the 40 GOPS detector plus 12 GOPS purifier on the 2.5W Hailo-8?
details:
  realistic_solution: Sum the operations required for both the main model and the purification network to get 52 GOPS per frame. Divide the 26,000 GOPS/s Hailo-8 capacity by 52 GOPS/frame to get 500 FPS. At 2.5 J/s, energy per frame is 2.5 J/s divided by 500 frame/s, or 0.005 J/frame = 5 mJ/frame.
  common_mistake: |
    **The Pitfall:** Calculating FPS for the two models separately or mismanaging units (e.g., TOPS to GOPS, Watts to Joules).
    **The Rationale:** Treating models independently ignores pipeline dependencies and bottlenecks.
    **The Consequence:** Flawed system sizing and inaccurate performance estimations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 capacity: 26 TOPS (26,000 GOPS), 2.5W
    - Detector: 40 GOPS
    - Purifier: 12 GOPS

    **Calculations:**
    - Total Compute = 40 + 12 = 52 GOPS/frame
    - Max FPS = 26,000 / 52 = 500 FPS
    - Energy/Frame = 2.5 J/s / 500 frames/s = 0.005 J/frame = 5 mJ/frame

    **Conclusion & Interpretation:**
    - **Result: 500 FPS, 5 mJ/frame (Compute-Bound)**. Hardware utilization is perfectly scaled to calculate exact maximum throughput and energy efficiency.
