title: Drift Detection Bottleneck on Dataflow Edge
scenario: A pedestrian detection model runs on a Hailo-8 dataflow accelerator attached to a smart city camera. The compiled model is mapped onto the accelerator's dataflow fabric with limited on-chip buffering, while host interaction occurs over PCIe. To detect data drift, the team enabled continuous Population Stability Index (PSI) monitoring on an intermediate feature map layer. However, enabling this causes the per-frame inference latency to spike from 10ms to 45ms, even though the host CPU utilization remains low.
question: Why does extracting an intermediate feature map metric cause such a severe latency degradation on a dataflow architecture?
details:
  realistic_solution: Extracting an intermediate feature map forces the Hailo-8 to break its efficient, fused dataflow execution and expose a large activation tensor to the host over PCIe. The cost is not CPU compute; it is pipeline draining, synchronization, DMA setup, and off-chip transfer of data that would normally remain inside the compiled accelerator schedule. Drift detection should use low-dimensional final outputs or a purpose-built small telemetry head rather than continuously reading a large internal feature map.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is caused by insufficient compute capacity on the accelerator or a CPU bottleneck.
    **The Rationale:** Engineers often evaluate edge accelerators purely on their TOPS rating, ignoring the critical memory hierarchy.
    **The Consequence:** Teams waste time optimizing model weights or CPU code, completely missing that the dataflow pipeline has been fundamentally broken by a massive off-chip memory transfer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline 10 ms latency (100 FPS).
    - Feature map: 128x128x64 INT8.
    - Observed latency with PSI readback: 45 ms.

    **Calculations:**
    - Data Transfer: 128 * 128 * 64 = 1,048,576 bytes = 1.0 MiB per frame.
    - Observed extra latency: 45 ms - 10 ms = 35 ms per frame.
    - Implied effective readback path: 1.0 MiB / 35 ms = ~30 MiB/s after synchronization, DMA setup, and pipeline-drain overhead.
    - At the original 100 FPS target, this would also require about 100 MiB/s of sustained internal activation export, which is not part of the normal fused inference path.

    **Conclusion & Interpretation:**
    - **Result: 35 ms extra latency per frame (Dataflow Synchronization Bound)**. The 1 MiB tensor is large enough to expose pipeline synchronization and readback overhead even though CPU utilization stays low.
