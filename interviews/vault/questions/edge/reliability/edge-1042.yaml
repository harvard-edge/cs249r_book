title: 'Fault Tolerance: Evaluate Warm vs Cold Recovery for Edge Device Failures'
scenario: '500 Jetson Orin devices (32GB LPDDR5, 275 TOPS INT8, 60W) run online learning. After a failure, you must compare (A) cold recovery: restore from last cloud checkpoint (latency: download + initialization), vs (B) warm recovery: restore from local NVMe snapshot (latency: local read). The device has a 4GB/s NVMe and a 100Mbps LTE link.'
question: For the failed Orin device, how do cold cloud recovery and warm NVMe snapshot recovery compare in latency and state freshness?
details:
  realistic_solution: 'Warm recovery from NVMe is always faster and contains more recent state (minutes old vs hours old for cloud checkpoint). Use local NVMe as primary recovery, cloud as disaster recovery only.'
  common_mistake: |
    **The Pitfall:** Defaulting to cloud recovery for edge fleets.
    **The Rationale:** Engineers accustomed to cloud microservices assume centralized storage is always the primary source of truth and state recovery.
    **The Consequence:** They fail to quantify the LTE bandwidth bottleneck, resulting in unacceptably slow device reboots and loss of highly recent, hyper-localized learning state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - State size = 200MB model + 6MB optimizer = 206MB.
       - NVMe read speed = 4 GB/s.
       - LTE download speed = 100 Mbps = 12.5 MB/s.
       - Initialization time = 5 seconds.
    2. **Calculations:**
       - Warm Recovery (NVMe): (206 MB / 4000 MB/s) = 0.0515s. Total = 0.0515s + 5s = 5.05s.
       - Cold Recovery (LTE): (206 MB / 12.5 MB/s) = 16.48s. Total = 16.48s + 5s = 21.48s.
       - Speedup = 21.48s / 5.05s = ~4.25x.
    3. **Conclusion & Interpretation:**
       - **Result: Warm Recovery is ~4.3x Faster**. Using local NVMe minimizes the severe LTE bandwidth bottleneck, resulting in significantly faster reboot times and much fresher local state.
