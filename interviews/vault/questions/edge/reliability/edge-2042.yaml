title: 'Graceful Degradation for Edge Object Detection on Google Coral TPU'
scenario: 'You are developing a real-time object detection system for critical industrial equipment monitoring, deployed on devices equipped with the Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only). The primary model is a high-accuracy, relatively high-latency INT8 model. The system requires a comprehensive graceful degradation strategy to ensure continuous operation and reliability under varying conditions, such as network fluctuations, power instability, or sudden spikes in inference load. Your strategy should explicitly address degradation ladders, potential model fallbacks (e.g., to lower-fidelity models or CPU), fail-safe vs. fail-operational considerations, and quality-of-service (QoS) shedding mechanisms, all while respecting the Coral TPU''s specifications.'
question: 'How would you design graceful degradation for a Coral Edge TPU industrial detector under stress while respecting INT8-only 2W limits?'
details:
  realistic_solution: 'A robust solution involves a multi-tiered degradation ladder: 1. **Primary Mode:** Full-fidelity INT8 object detection model running on Coral TPU. 2. **Tier 1 (QoS Shedding):** If inference latency exceeds a threshold or CPU load increases, reduce the inference frame rate (e.g., from 30 FPS to 10 FPS) or switch to a coarser-grained object detection model (e.g., only detect critical anomalies) — both still INT8 on TPU. 3. **Tier 2 (Model Fallback):** If the Coral TPU becomes unresponsive or overloaded, fallback to an extremely lightweight, pre-quantized INT8 model (e.g., a pruned MobileNetV2) running on the main CPU. 4. **Fail-safe vs. Fail-operational:** The system must remain fail-operational for basic monitoring and fail-safe for critical events.'
  common_mistake: |
    **The Pitfall:** Proposing fallback solutions that require floating-point operations or complex CPU models.
    **The Rationale:** Candidates rely on standard software degradation patterns without respecting the rigid INT8-only hardware constraints of the Edge TPU.
    **The Consequence:** Causing thermal throttling, battery drain, or outright crashes when the TPU fails to compile or execute the fallback model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute bounds: 4 TOPS INT8 (4,000 GOPS).
    - Model requires 500 GOPs/inference.

    **Calculations:**
    - Theoretical max throughput: 4,000 GOPS / 500 GOPs = 8 inferences per second (IPS).
    - Latency constraint: If typical latency is 50ms (0.05s), max sequential throughput is 1 / 0.05 = 20 IPS.

    **Conclusion & Interpretation:**
    - **Result: 8 IPS (Compute-Bound)**. The true latency for a 500 GOPs workload at 4 TOPS is 125ms, capping throughput well below the latency constraint.
