title: Edge ID Persistence
scenario: A retail server with dual Jetson AGX Orins performs customer tracking. Power blips occasionally cause sudden reboots.
question: Evaluate a strategy to maintain continuous tracking IDs across reboots without writing high-frequency video data to the SD card?
details:
  realistic_solution: |
    Writing raw frames to the SD card causes rapid flash wear out. Instead, persist compact identity state: stable track IDs, bounding boxes, Re-ID embeddings, timestamps, and camera context in a durable external broker, database, or robust NVMe-backed store. On reboot, a reconciliation layer loads the last state and matches fresh detections against embeddings and timestamps to restore likely ID mappings; embeddings help re-identification but do not guarantee continuity by themselves.
  common_mistake: |
    **The Pitfall:** Recommending writing full intermediate tensor states or raw video to the SD card.
    **The Rationale:** Candidates suggest this to rapidly persist state across power blips without evaluating the hardware limitations of flash storage.
    **The Consequence:** This continuous high-frequency writing burns out the SD card storage within weeks, destroying the edge device.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 people tracked.
    - 256 floats per Re-ID embedding.
    - 4 bytes per float.
    - Persist one current identity record per active person, not every raw frame.

    **Calculations:**
    - One embedding = 256 * 4 bytes = 1,024 bytes = 1 KiB.
    - Embeddings for 50 people = 50 * 1 KiB = 50 KiB of current embedding state.
    - Track IDs, boxes, timestamps, and camera IDs add small metadata overhead relative to embeddings.
    - Raw 4K RGB frame comparison: 3840 * 2160 * 3 bytes ≈ 23.7 MiB per frame.

    **Conclusion & Interpretation:**
    - **Result: ~50 KiB plus small metadata for current identity state (I/O-Wear-Aware).** Persisting compact state is orders of magnitude smaller than raw video, but stable ID recovery still requires a durable state store and reconciliation logic after reboot.
