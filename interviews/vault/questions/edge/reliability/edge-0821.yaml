title: 'Mitigating Byzantine Poisoning in Federated Learning'
scenario: 'You are managing a federated learning system aggregating updates from 1,000 edge devices per round. Normal updates have an L2 norm of roughly 2.0. You detect a Byzantine attack where 50 compromised devices send malicious updates with an L2 norm of 200.0.'
question: 'What is the FedAvg global gradient norm under attack, and what clipping threshold C limits attackers to 10% of the honest magnitude?'
details:
  realistic_solution: 'Implement robust L2 norm clipping on all incoming device updates prior to aggregation. By statically defining a clipping threshold C, malicious updates are forcefully scaled down, restricting their total influence on the global model without penalizing the honest updates.'
  common_mistake: |
    **The Pitfall:** Assuming Byzantine Fault Tolerance requires complex multi-round consensus protocols like PBFT.
    **The Rationale:** Candidates default to heavy distributed systems theory instead of ML-specific mathematical defenses.
    **The Consequence:** They overlook computationally cheap robust aggregation techniques like L2 norm clipping or coordinate-wise medians.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 total devices: 950 honest (norm 2.0), 50 attackers (norm 200.0).
    - Goal: Limit attacker total norm to 10% of honest total norm.

    **Calculations:**
    - Total norm of honest updates: 950 * 2.0 = 1900.
    - Max allowable attacker total norm: 1900 * 0.10 = 190.
    - Required clipping threshold C per attacker: 50 * C = 190.
    - C = 190 / 50 = 3.8.

    **Conclusion & Interpretation:**
    - **Result: 3.8 (Security-Bound)**. Clipping threshold C = 3.8 successfully restricts attackers without clipping honest updates (2.0 < 3.8).
