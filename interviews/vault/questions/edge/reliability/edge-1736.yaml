title: Resource-Constrained Drift Detection on Jetson Orin
scenario: You are deploying an autonomous navigation model on an NVIDIA Jetson Orin edge device. The system must operate continuously within a strict 60W TDP while processing high-resolution camera feeds. To ensure reliability, you need to implement real-time data drift detection (using metrics like KL divergence or PSI) to flag when the input distribution diverges from training data without interrupting the main inference workload on the Ampere GPU or DLA.
question: How would you implement real-time data drift detection on Jetson Orin without disrupting the main GPU or DLA inference within 60W?
details:
  realistic_solution: 'The optimal approach is to calculate drift metrics on low-dimensional, task-specific intermediate features or metadata (e.g., lighting histograms) and sample the data rather than evaluating every frame. This computation should be offloaded to the CPU cores or run entirely on the DLA if the primary model is strictly GPU-bound, utilizing an INT8 quantized proxy model to efficiently estimate distribution shifts while staying within the 32 GB memory and 60W constraints.'
  common_mistake: |
    **The Pitfall:** Running continuous statistical tests on high-dimensional raw images.
    **The Rationale:** Candidates prioritize evaluating every frame fully on the main GPU for maximum theoretical accuracy.
    **The Consequence:** This starves the primary inference task of compute and pushes the system well beyond its thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin compute limit is 275 TOPS, power limit is 60W.
    - Main model uses 200 TOPS / 40W.
    - Drift detection runs an INT8 proxy model at 0.5 TOPS/frame.

    **Calculations:**
    - Compute Headroom is 275 - 200 = 75 TOPS.
    - Power Headroom is 60 - 40 = 20W.
    - Proxy model at 10 FPS consumes 0.5 * 10 = 5 TOPS.
    - 1-hour rolling window of 256-dimensional float32 embeddings at 10 FPS = 10 * 3600 * 256 * 4 bytes = 36.8 MB.

    **Conclusion & Interpretation:**
    - **Result: 5 TOPS, 36.8 MB (Compute-Bound)**. The INT8 proxy model easily fits in the 75 TOPS and 32 GB LPDDR5 margin without memory bottlenecking.
