title: Orin SSD Wear versus Recovery Time
scenario: A Jetson AGX Orin deployed on an inspection drone periodically loses power due to unstable batteries. It writes a 2GB model state checkpoint to an onboard NVMe SSD with a 500 Terabytes Written (TBW) endurance limit.
question: Analyze the trade-off between checkpointing every 1 minute versus every 10 minutes regarding SSD wear-out time and worst-case recovery compute?
details:
  realistic_solution: 'Using decimal units, writing 2GB every minute generates 120GB/hour or 2.88TB/day. A 500 TBW SSD would reach its write limit in 500 / 2.88 = ~173 days. Checkpointing every 10 minutes reduces wear to 0.288TB/day, extending SSD life to ~1,736 days. The trade-off is recovery compute: after a failure, 10-minute checkpoints can require recomputing up to 10 minutes of state, 10x the 1-minute worst case.'
  common_mistake: |
    **The Pitfall:** Ignoring physical flash wear limitations.
    **The Rationale:** Engineers analyze software recovery time independently of hardware limits.
    **The Consequence:** The device physically bricks itself from flash wear-out in under 6 months.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint is 2GB.
    - SSD limit is 500 TBW.
    - 1-min vs 10-min intervals.
    - Use decimal storage units: 1GB = 10^9 bytes and 1TB = 1000GB.
    - Worst-case recovery compute is proportional to work since the last checkpoint.

    **Calculations:**
    - 1-min interval: 2GB/min * 60 * 24 = 2.88 TB/day. SSD Life = 500 / 2.88 = 173.6 days.
    - 10-min interval: 0.288 TB/day. SSD Life = 500 / 0.288 = 1,736 days.
    - Worst-case recovery compute window: 1 minute vs 10 minutes, so the 10-minute policy can require up to 10x more recomputation after failure.

    **Conclusion & Interpretation:**
    - **Result: 173.6 days at 1-minute intervals and 1,736 days at 10-minute intervals (I/O-Wear-Bound)**. 10-minute checkpointing cuts SSD writes by 10x, but increases worst-case recomputation by 10x.
