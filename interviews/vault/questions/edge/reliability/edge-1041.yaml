title: 'Fault Tolerance: Design Checkpoint Strategy for Jetson Orin Continuous Inference'
scenario: You are deploying an object detection model on 500 Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) devices in autonomous warehouse robots. Each device runs 24/7.
question: How would you design fault tolerance for model state and continuity across power loss, storage corruption, and model degradation?
details:
  realistic_solution: |
    Design continuity around separate failure modes: (1) Power loss: write model state and LoRA/adaptation checkpoints to a temp file on NVMe, fsync, verify checksum, then atomically rename and update a small manifest; keep the last known-good checkpoint. (2) Storage corruption: use A/B base-model partitions on persistent storage with signed manifests and checksum validation at boot. (3) Recovery workflow: on restart, load the newest verified base partition and checkpoint; if validation fails, roll back to the previous checkpoint and resume inference in read-only safe mode before re-enabling online updates. (4) Model degradation: monitor per-class precision/recall proxies, confidence drift, and operator interventions; rollback is gated by a validation canary, not by one confidence threshold alone.
  common_mistake: |
    **The Pitfall:** Failing to distinguish between inference fault tolerance and learning fault tolerance. A sudden power loss corrupts the model state during a write operation, permanently bricking the robot's perception pipeline.
    **The Rationale:** Failing to differentiate fault modes leads to applying incorrect mitigation.
    **The Consequence:** A sudden power loss corrupts the model state during a write operation, permanently bricking the robot's perception pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 7M params * 1B (int8) = 7MB.
    - Two base-model partitions require 14MB on persistent flash/NVMe, not LPDDR5 RAM.
    - Online state/checkpoint delta: 2MB.
    - NVMe write speed: 500 MB/s.
    - Durability overhead for temp write, fsync, manifest update, and checksum is budgeted at 10x raw write time.

    **Calculations:**
    - Raw checkpoint write time: 2MB / 500 MB/s = 4ms.
    - Conservative durable commit window: 4ms * 10 = 40ms.
    - A/B base image footprint: 2 * 7MB = 14MB persistent storage, plus signed manifests/checksums.
    - Keeping two online checkpoints: 2 * 2MB = 4MB persistent storage.
    - Fleet update attempts/year at weekly cadence: 500 devices * 52 = 26,000 attempts requiring verified commit/rollback behavior.

    **Conclusion & Interpretation:**
    - **Result: ~18MB persistent recovery footprint and ~40ms conservative checkpoint commit window (Storage-Continuity-Bound).** The design should assume crashes can happen during any commit and rely on atomic manifests, checksums, and last-known-good rollback rather than claiming zero corruption probability.
