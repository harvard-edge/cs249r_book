title: Architecting ISO-26262 Compliant Vision on Coral Edge TPU
scenario: You are designing an ASIL-B certified pedestrian detection system for an industrial autonomous
  forklift using a Google Coral Edge TPU (PCIe). The system must guarantee a maximum reaction latency
  of 50ms and cannot fail silently. Given the Coral's 4 TOPS INT8 limit, 2W power envelope, and lack of
  built-in hardware lockstep capabilities, design a system architecture that provides deterministic execution,
  continuous self-testing, and handles potential TPU hangs or bit-flips without violating the safety goals.
question: "How would you make Coral Edge TPU pedestrian detection deterministic and fail-safe within a 50ms ASIL-B reaction latency?"
details:
  realistic_solution: 'The optimal architecture uses a primary INT8 quantized MobileNetV3 model on the
    Edge TPU. To achieve ASIL-B without hardware lockstep, we implement software-based temporal redundancy:
    processing the same frame twice or processing offset frames and comparing bounding boxes on the host
    CPU. A dedicated hardware watchdog timer monitors a heartbeat signal generated only when the host
    successfully receives and validates the TPU''s output over PCIe. For self-testing, we interleave a
    deterministic, pre-computed ''golden'' input tensor into the TPU queue every 10 frames and verify
    the exact output matches the expected signature.'
  common_mistake: Candidates often propose running a secondary model on the host CPU for redundancy, which
    violates the 50ms latency constraint and exceeds power/cost budgets. They also frequently overlook
    the Coral's limited INT8 operator support when designing the continuous self-test (e.g., proposing
    unsupported custom operators for anomaly detection) or fail to implement a hardware watchdog that
    monitors the PCIe bus heartbeat.
  napkin_math: Assuming the MobileNetV3-SSD requires 1.5 GOPS per frame. At 4 TOPS (4000 GOPS), the theoretical
    max throughput is ~2666 FPS, but PCIe overhead and host processing realistically cap it at ~100 FPS
    (10ms per inference). To meet the 50ms latency constraint while allowing for temporal redundancy (processing
    2 frames), we use 2 * 10ms = 20ms for inference + 5ms host comparison = 25ms total processing time.
    This leaves a 25ms buffer for the watchdog timeout. Power consumption remains well within the 2W limit,
    and running a golden frame test every 10 frames adds a negligible 1ms overhead per cycle (10% throughput
    reduction).
