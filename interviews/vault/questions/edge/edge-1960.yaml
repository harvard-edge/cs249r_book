title: Pruning MobileNetV2 for Google Coral Edge TPU Deployment
scenario: You are tasked with deploying a pre-trained MobileNetV2 object detection model onto a Google Coral Edge TPU, which has specs of 4 TOPS INT8 and 2W power consumption, and supports INT8 operations only. The initial model is too large and slow for the real-time requirements and power budget.
question: How would you prune MobileNetV2 for the INT8-only Coral Edge TPU, and which sparsity type best improves speed and power with minimal accuracy loss?
details:
  realistic_solution: The most realistic solution involves structured pruning, such as filter or channel pruning. This reduces the number of parameters and computations in a way that creates smaller, denser layers, which are highly efficient for the Coral's INT8 matrix multiplication units. The approach should be quantization-aware pruning, ensuring that the pruning process is compatible with the INT8-only nature of the Coral. Post-training quantization or quantization-aware training would typically follow or be integrated with pruning.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning without considering the target hardware's architecture.
    **The Rationale:** Unstructured pruning achieves high theoretical sparsity, which looks impressive in papers.
    **The Consequence:** Sparse structures don't map well to dense matrix multiplication units (like the Coral TPU), resulting in irregular memory access, massive overhead, and often zero real-world speedup.
  napkin_math: |
    *   **Coral Efficiency:** 4 TOPS / 2W = 2 TOPS/W.
    *   **Unpruned Baseline:** 100 GOPS model takes 25ms (100 / 4000) and 0.05 Joules per inference.
    *   **Structured Pruning (50%):** Model drops to 50 GOPS.
    *   **New Performance:** Inference takes 12.5ms, consuming 0.025 Joules.
    *   **Result:** A direct **2x speedup and 2x power saving**, compounded by reduced memory footprint and better cache utilization.
