title: Queuing Backpressure on Jetson Orin Edge Inference
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) runs a video analytics pipeline processing 30fps camera frames. Each inference takes 40ms mean. At 30fps (33ms inter-arrival), the device shows growing queue depth and eventual frame drops.
question: Why does the 30 FPS Jetson Orin pipeline queue grow with 40ms inference, and what fixes would make it stable?
details:
  realistic_solution: 'λ=30/s (33ms inter-arrival), μ=25/s (40ms service). ρ=λ/μ=1.2>1 → queue is unstable, grows without bound. Solutions: (1) reduce model to achieve <30ms inference, (2) drop every 4th frame (process 22fps), (3) use frame skipping with temporal interpolation, (4) batch 2 frames if latency allows. On Jetson Orin, INT8 quantization can halve inference from 40ms to 18ms.'
  common_mistake: |
    **The Pitfall:** Assuming that a small difference between input frame rate and inference time can be successfully absorbed by increasing the memory buffer size.
    **The Rationale:** Engineers assume short-term buffering handles all latency spikes, failing to recognize when the underlying math represents a fundamental system instability.
    **The Consequence:** The queue inevitably saturates regardless of buffer size, leading to unpredictable, massive latency delays and eventual out-of-memory crashes as frames are processed slower than they arrive.
  napkin_math: |
    1. **Arrival Rate ($\lambda$):** 30 frames/sec (33ms inter-arrival time).
    2. **Service Rate ($\mu$):** 1 / 0.040s = 25 frames/sec.
    3. **Utilization ($\rho$):** $\lambda / \mu$ = 30 / 25 = 1.2.
    4. **Result:** Because $\rho > 1$, the queue is mathematically **unstable** and grows by 5 frames per second. The pipeline must be quantized to INT8 to pull inference latency safely below 33ms.
