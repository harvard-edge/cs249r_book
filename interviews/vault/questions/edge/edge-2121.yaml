title: Queuing Backpressure on Jetson Orin Edge Inference
scenario: 'A Jetson Orin runs a video analytics pipeline processing 30fps camera frames. Each inference takes 40ms mean. At 30fps (33ms inter-arrival), the device shows growing queue depth and eventual frame drops.'
question: 'Why does the 30 FPS Jetson Orin pipeline queue grow with 40ms inference, and what fixes would make it stable?'
details:
  realistic_solution: '\lambda=30/s (33ms inter-arrival), \mu=25/s (40ms service). \rho=\lambda/\mu=1.2 > 1 \rightarrow queue is unstable, grows without bound. Solutions: (1) INT8 quantization to halve inference to 18ms, (2) drop frames to process 22fps, (3) batching if latency allows.'
  common_mistake: |
    **The Pitfall:** Assuming a small difference between input rate and inference time can be absorbed by increasing memory buffer size.
    **The Rationale:** Engineers assume short-term buffering handles all latency spikes, failing to recognize fundamental system instability.
    **The Consequence:** The queue inevitably saturates regardless of buffer size, leading to unpredictable latency delays and out-of-memory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\lambda): 30 frames/sec (33ms).
    - Service Rate (\mu): 1 / 0.040s = 25 frames/sec.

    **Calculations:**
    - Utilization (\rho): \lambda / \mu = 30 / 25 = 1.2.
    - Queue Growth: 30 - 25 = 5 frames buffered per second.

    **Conclusion & Interpretation:**
    - **Result: Mathematically unstable queue (Compute-Bound)**. With \rho > 1, the pipeline must be quantized to drop latency below 33ms.
