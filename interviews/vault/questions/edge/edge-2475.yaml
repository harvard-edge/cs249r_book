title: Analyzing Memory Bus Contention Between Subsystems
scenario: A Jetson AGX Orin captures frames via MIPI CSI DMA while the GPU processes previous frames.
question: Analyze the impact of a unified memory bottleneck if the DMA controller and the GPU compete for LPDDR5 simultaneously.
details:
  realistic_solution: The Orin has ~204 GB/s of LPDDR5 bandwidth. If GPU inference saturates this fetching weights, the MIPI DMA writes will stall or drop packets. Overlap fails because both subsystems share the same physical memory bus.
  common_mistake: |
    **The Pitfall:** Treating compute and communication as entirely independent hardware paths.
    **The Rationale:** Engineers assume multi-core concurrency extends infinitely without considering physical bus topologies.
    **The Consequence:** Ignoring shared main memory bus contention leads to dropped camera frames and stuttering perception loops.
  napkin_math: |
    1. **Assumptions & Constraints:** Jetson Orin LPDDR5 peak bandwidth = ~204 GB/s.
    2. **Calculations:** GPU_bandwidth_demand + DMA_bandwidth_demand > 204 GB/s.
    3. **Conclusion & Interpretation:** **Result: Bus saturation stall.** Overlapping compute and DMA fails if both saturate the shared memory bus. **System Status: Memory-Bandwidth-Bound.**
