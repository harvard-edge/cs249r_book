title: Analyzing Memory Bus Contention Between Subsystems
scenario: A multi-camera Jetson AGX Orin system captures frames via MIPI CSI DMA while
  the GPU concurrently processes previous frames.
question: Analyze the impact of a unified memory bottleneck if the DMA controller
  and the GPU compete for LPDDR5 simultaneously.
details:
  realistic_solution: The Orin has ~204 GB/s of LPDDR5 bandwidth. If GPU inference
    saturates this fetching weights, the MIPI DMA writes will stall or drop packets.
    Overlap fails because both subsystems share the same physical memory bus, breaking
    the hardware independence assumption.
  common_mistake: Treating compute and communication as entirely independent hardware
    paths and ignoring the shared main memory bus contention.
  napkin_math: GPU_bw + DMA_bw > 204 GB/s -> Stall
