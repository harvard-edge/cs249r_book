title: Hailo-8 Dataflow Topology Memory Bottleneck
scenario: A hardware-aware NAS process yielded two INT8 object detection models targeted for a Hailo-8
  edge device (26 TOPS INT8, 2.5W, dataflow architecture with no local DRAM). Model X requires 15 GOPs
  per inference and features heavy branching with long skip connections. Model Y requires 20 GOPs per
  inference but uses a strictly sequential topology. Despite Model X having 25% fewer compute requirements,
  it runs at 150 FPS while Model Y achieves 600 FPS on the Hailo-8. Explain why the lower-compute model
  performs significantly worse on this specific accelerator.
details:
  realistic_solution: Because the Hailo-8 is a dataflow accelerator lacking local DRAM, it relies on mapping
    the entire neural network graph directly onto its distributed internal compute units and SRAM. A sequential
    model like Model Y can be pipelined efficiently, processing data on-chip without intermediate off-chip
    memory access. Model X's heavy branching and long skip connections likely exhaust the internal SRAM
    capacity for holding intermediate tensors. This forces the device to spill and stream intermediate
    activations to and from the host memory over the system bus, causing severe bandwidth bottlenecks
    that stall the 26 TOPS compute engines.
  common_mistake: Candidates often assume that fewer FLOPs/GOPs always translates directly to lower latency.
    They may try to explain the discrepancy by citing standard CPU/GPU cache misses, failing to account
    for the Hailo-8's unique dataflow architecture and lack of local DRAM, which makes it highly sensitive
    to network topology.
  napkin_math: 'Compute bounds: Model Y limit = 26,000 GOPs / 20 GOPs = 1,300 max FPS. Model X limit =
    26,000 GOPs / 15 GOPs = 1,733 max FPS. Memory bound for Model X: If spilling a 4MB intermediate feature
    map to host memory over a 4 GB/s PCIe bus, the round-trip transfer (8MB total) takes 8MB / 4000 MB/s
    = 2.0 ms per inference. This memory bottleneck imposes a strict ceiling of 1 / 0.002s = 500 FPS, completely
    negating the FLOP advantage before accounting for any overhead or synchronization latency, dropping
    actual throughput to 150 FPS.'
