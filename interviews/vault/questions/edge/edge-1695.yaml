title: Optimizing Encoder-Decoder Latency on Jetson Orin
scenario: You are deploying a real-time speech translation system on an NVIDIA Jetson Orin. The system uses a 1B parameter encoder-decoder Transformer. During profiling, you notice that while the encoder processes input quickly on the Ampere GPU, the autoregressive decoder generation is severely bottlenecking the pipeline, failing to meet the real-time latency constraint of 200ms for a 30-token sequence.
question: How do you analyze the compute and memory bottlenecks for the decoder, and what optimizations would you apply to resolve this bottleneck?
details:
  realistic_solution: Apply W8A8 INT8 quantization. The encoder evaluates completely compute-bound, but the autoregressive generation sequence acts inherently memory-bound at batch size 1. Squeezing the decoder footprint via INT8 effectively halves memory bandwidth saturation, easily securing the 200ms target.
  common_mistake: |
    **The Pitfall:** Treating autoregressive generation as a compute-bound problem.
    **The Rationale:** Candidates often focus solely on the 275 TOPS compute limit and miss that the token-by-token decoder is heavily memory-bandwidth bound at batch size 1.
    **The Consequence:** Recommending larger batch sizes (violating real-time constraints) or misguided compute optimization instead of memory footprint reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Constraint: ≤200 ms latency for a 30-token sequence.
       - Hardware Memory Bandwidth: ~200 GB/s.
       - Model: 1B Parameter Decoder.
       - Execution: Batch Size 1 (Autoregressive).
    2. **Calculations:**
       - FP16 Decoder Memory Size = 1B params * 2 bytes = 2 GB.
       - FP16 Memory Load per token = 2 GB / 200 GB/s = 10 ms.
       - FP16 Sequence Time = 30 tokens * 10 ms/token = 300 ms (Misses 200 ms target).
       - INT8 Decoder Memory Size = 1B params * 1 byte = 1 GB.
       - INT8 Memory Load per token = 1 GB / 200 GB/s = 5 ms.
       - INT8 Sequence Time = 30 tokens * 5 ms/token = 150 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 150 ms (Memory-Bandwidth-Bound)** - W8A8 INT8 quantization halves memory pressure, enabling the system to meet real-time constraints.
