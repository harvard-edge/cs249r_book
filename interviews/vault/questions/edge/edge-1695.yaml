title: Optimizing Encoder-Decoder Latency on Jetson Orin
scenario: You are deploying a real-time speech translation system on an NVIDIA Jetson
  Orin at the edge. The system uses a 1B parameter encoder-decoder Transformer. During
  profiling, you notice that while the encoder processes the input audio quickly using
  the Ampere GPU, the autoregressive decoder generation is severely bottlenecking
  the pipeline, failing to meet the real-time latency constraint of 200ms. How do
  you analyze the compute and memory bottlenecks for the encoder versus the decoder
  on this 32 GB LPDDR5, 60W TDP platform, and what optimizations would you apply to
  resolve this bottleneck?
question: How do you analyze the compute and memory bottlenecks for the encoder versus
  the decoder on this 32 GB LPDDR5, 60W TDP platform, and what optimizations would
  you apply to resolve this bottleneck?
details:
  realistic_solution: The encoder is compute-bound (parallel) while the decoder is
    memory-bandwidth bound (sequential). To fix the decoder bottleneck, apply W8A8
    INT8 quantization to halve the memory bandwidth requirements per token, utilizing
    the INT8 tensor cores on the Ampere GPU, while optionally offloading the encoder
    to the DLA accelerator to save power and improve thermal overhead.
  common_mistake: Candidates often focus solely on the 275 TOPS compute limit without
    realizing that the autoregressive decoder is heavily memory-bandwidth bound at
    batch size 1, not compute bound. They might suggest switching to a larger batch
    size, which violates real-time edge latency constraints.
  napkin_math: Assuming the Jetson Orin's 32 GB LPDDR5 provides roughly 200 GB/s of
    memory bandwidth. A 1B parameter decoder in FP16 takes 2GB of memory. Generating
    1 token requires loading all 2GB of weights. Time per token = 2GB / 200 GB/s =
    10ms. Generating 30 tokens takes 300ms, missing the 200ms budget. By applying
    INT8 quantization (supported by the 275 TOPS INT8 accelerators), weights drop
    to 1GB. Time per token becomes 1GB / 200 GB/s = 5ms. Generating 30 tokens now
    takes 150ms, successfully meeting the 200ms latency target.
