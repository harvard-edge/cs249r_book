title: Optimizing Encoder-Decoder Latency on Jetson Orin
scenario: You are deploying a real-time speech translation system on an NVIDIA Jetson Orin (32 GB LPDDR5, ~200 GB/s bandwidth, 60W TDP). The system uses a 1B parameter encoder-decoder Transformer. During profiling, you notice that while the encoder processes input quickly on the Ampere GPU, the autoregressive decoder generation is severely bottlenecking the pipeline, failing to meet the real-time latency constraint of 200ms for a 30-token sequence.
question: How do you analyze the compute and memory bottlenecks for the decoder, and what optimizations would you apply to resolve this bottleneck?
details:
  realistic_solution: The encoder is compute-bound (parallel) while the decoder is memory-bandwidth bound (sequential). To fix the decoder bottleneck, apply W8A8 INT8 quantization to halve the memory bandwidth requirements per token, utilizing the INT8 tensor cores on the Ampere GPU.
  common_mistake: |
    **The Pitfall:** Treating autoregressive generation as a compute-bound problem.
    **The Rationale:** Candidates often focus solely on the 275 TOPS compute limit and miss that the token-by-token decoder is heavily memory-bandwidth bound at batch size 1.
    **The Consequence:** Recommending larger batch sizes (violating real-time constraints) or misguided compute optimization instead of memory footprint reduction.
  napkin_math: |
    1. **FP16 Memory:** 1B parameter decoder in FP16 = 2 GB.
    2. **FP16 Time per Token:** 2 GB / 200 GB/s = 10 ms.
    3. **FP16 Sequence Time:** 30 tokens * 10 ms = 300 ms (Misses 200 ms budget).
    4. **INT8 Memory:** 1B parameter decoder quantized to INT8 = 1 GB.
    5. **INT8 Time per Token:** 1 GB / 200 GB/s = 5 ms.
    6. **INT8 Sequence Time:** 30 tokens * 5 ms = 150 ms.
    **Result: INT8 quantization halves memory bandwidth pressure, successfully meeting the 200ms latency target.**
