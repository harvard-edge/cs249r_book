title: Analyze Dynamic Batching for Accelerator Saturation
scenario: A Hailo-8 edge node handles 4 independent RTSP video streams. Running synchronous
  inference per stream in Python only utilizes 20% of the chip's 26 TOPS.
question: Analyze how integrating a model serving framework that implements dynamic
  batching fundamentally alters the host-device utilization pattern.
details:
  realistic_solution: Synchronous, single-frame Python inference incurs massive host-to-device
    PCIe latency overhead per frame, starving the Hailo-8 compute units. A server
    like Triton introduces a dynamic batching queue. It stalls execution for a tiny
    window (e.g., 5ms) to group frames from the 4 distinct streams into a single batch
    of 4. This amortizes the PCIe dispatch cost and saturates the INT8 MAC arrays
    efficiently.
  common_mistake: Assuming multithreading the Python loops without dynamic batching
    will help, when it actually just increases PCIe contention for single-frame inferences.
  napkin_math: Batch size 1 = 4 dispatches. Batch size 4 = 1 dispatch. 75% less overhead.
