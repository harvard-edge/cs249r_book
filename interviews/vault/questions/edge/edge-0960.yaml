title: Edge New 0023
scenario: A 512KB lookup table for a DSP algorithm doesn't fit in the Cortex-M4's 256KB SRAM. You cache the most active 128KB in SRAM and read the rest from Flash.
question: With an 80% SRAM cache hit rate, what latency tradeoff comes from caching 128KB of a 512KB Cortex-M4 lookup table?
details:
  realistic_solution: Flash memory requires significant CPU wait states, whereas SRAM is zero-wait-state. By implementing a software caching mechanism, the system exploits spatial and temporal locality. The tradeoff involves the memory overhead to maintain cache tags and the CPU cycles to calculate hits/misses. Since 80% of accesses resolve in 1 cycle, the aggregate latency drops massively compared to running the entire table from Flash.
  common_mistake: |
    **The Pitfall:** Neglecting the software overhead cycles required to check the cache tags in C code.
    **The Rationale:** Candidates assume software caching performs identically to hardware caching, forgetting the ALU cycles required to compute hits and misses on an MCU.
    **The Consequence:** The estimated latency is overly optimistic, potentially causing the DSP algorithm to miss hard real-time deadlines.
  napkin_math: |
    - 100% Flash execution = 10 cycles average.
    - Cached (80% hit) execution: (0.8 * 1 SRAM cycle) + (0.2 * 10 Flash cycles) = 0.8 + 2.0 = 2.8 cycles.
    - Software cache tag overhead = ~2 cycles per access.
    - Total average latency = 2.8 + 2 = 4.8 cycles.
    **Conclusion: The software cache roughly doubles execution speed from 10 cycles down to 4.8 cycles.**
