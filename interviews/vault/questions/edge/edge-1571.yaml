title: Jetson Orin INT8 Compute and Energy Budgeting
scenario: You are deploying a real-time perception system on an NVIDIA Jetson Orin
  edge device featuring an Ampere GPU + DLA accelerator and 32 GB LPDDR5 memory. The
  platform is rated for 275 TOPS INT8 compute performance and operates at a 60W TDP.
  If your application must process incoming sensor data at exactly 50 frames per second
  (FPS), calculate the theoretical maximum number of INT8 operations your model can
  perform per frame. Additionally, calculate the energy consumption per frame assuming
  the system draws its maximum TDP.
question: At 50 FPS, what is the per-frame INT8 operation budget and energy per frame
  for a 275 TOPS, 60W Jetson Orin?
details:
  realistic_solution: The correct approach is to divide the total throughput (TOPS)
    by the target frame rate to establish a strict operational budget per frame, which
    guides model pruning and quantization decisions. Similarly, dividing the continuous
    power draw (Joules per second) by the frame rate yields the per-frame energy cost,
    a vital metric for edge thermal management and battery sizing.
  common_mistake: Candidates often fail to properly convert power (Watts) to energy
    (Joules) for a per-frame analysis, or they miscalculate the scale of Tera-Operations.
    They may also incorrectly assume the Ampere GPU alone delivers the full 275 TOPS
    without acknowledging the DLA's role in the SoC's total compute capacity.
  napkin_math: '1. Compute Budget: 275 TOPS INT8 = 275 trillion operations per second.

    2. Ops per Frame: 275 TOPS / 50 FPS = 5.5 Tera-operations (5.5 x 10^12 ops) per
    frame.

    3. Power to Energy: 60W TDP = 60 Joules consumed per second.

    4. Energy per Frame: 60 Joules / 50 FPS = 1.2 Joules per frame.'
