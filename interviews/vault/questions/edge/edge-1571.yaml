title: Jetson Orin INT8 Compute and Energy Budgeting
scenario: You are deploying a real-time perception system on an NVIDIA Jetson Orin edge device.
question: At 50 FPS, what is the per-frame INT8 operation budget and energy per frame for a 275 TOPS, 60W Jetson Orin?
details:
  realistic_solution: The correct approach is to divide the total throughput (TOPS) by the target frame rate to establish a strict operational budget per frame, which guides model pruning and quantization decisions. Similarly, dividing the continuous power draw (Joules per second) by the frame rate yields the per-frame energy cost, a vital metric for edge thermal management and battery sizing.
  common_mistake: |
    **The Pitfall:** Failing to convert power (Watts) to energy (Joules) for a per-frame analysis.
    **The Rationale:** Candidates often mix up power (rate of energy use) and energy (total amount), or miscalculate the scale of Tera-Operations.
    **The Consequence:** They provide fundamentally flawed thermal and computational budgets, leading to incorrect model sizing and battery failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Capacity: 275 TOPS INT8.
       - Power Draw: 60W TDP.
       - Target Framerate: 50 FPS.
    2. **Calculations:**
       - Ops per Frame = 275 TOPS / 50 FPS = 5.5 Tera-operations (5.5 x 10^12 ops) per frame.
       - Power to Energy = 60W TDP = 60 Joules consumed per second.
       - Energy per Frame = 60 Joules / 50 FPS = 1.2 Joules per frame.
    3. **Conclusion & Interpretation:**
       - **Result: 5.5 TOPS per frame, 1.2 Joules per frame**. This defines the maximum theoretical compute and thermal budget bounds for the perception system.
