title: RAG Concurrency and Power on Cloud AI 100
scenario: You are deploying a local RAG pipeline on an on-premise server powered by a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The compound system routes requests between a local embedding model that takes 2 GB of INT8 memory and a generative LLM that requires 14 GB of INT8 memory. Each active RAG session requires exactly 1.5 GB of KV cache and intermediate state.
question: How many concurrent RAG sessions can the 32 GB Cloud AI 100 support, and what is the power budget per session at 75W?
details:
  realistic_solution: To determine maximum concurrency, first subtract the static memory footprint of all models in the multi-model pipeline from the total accelerator memory. Then, divide the remaining memory by the per-session dynamic memory requirement (KV cache) and take the floor. Finally, divide the total accelerator TDP by the maximum concurrent sessions to find the power per session.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the static memory footprint of both models before calculating dynamic session capacity.
    **The Rationale:** Engineers focus heavily on the large LLM memory footprint and the per-session KV cache, sometimes overlooking the smaller embedding model in a multi-model pipeline.
    **The Consequence:** The system is overprovisioned for concurrent requests, resulting in catastrophic Out-of-Memory (OOM) crashes in production when peak load is reached.
  napkin_math: |
    1. **Static Memory:** 2 GB (embedding model) + 14 GB (LLM) = 16 GB total static footprint.
    2. **Available Memory:** 32 GB total - 16 GB static = 16 GB available for dynamic state.
    3. **Concurrency Limit:** 16 GB / 1.5 GB per session = 10.66. We must take the floor.
    4. **Result:** The hardware supports a strict maximum of **10 concurrent sessions**, yielding a power budget of 75W / 10 = **7.5W per session**.
