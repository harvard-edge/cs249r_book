title: 'Edge Queueing Theory Optimization: Hailo-8 Throughput via Request Coalescing'
scenario: 'A Hailo-8 (26 TOPS INT8, 2.5W) processes security camera frames at \lambda=25
  req/s with \rho=0.9 (near capacity). P99=910ms (SLO: 200ms). You cannot add hardware.
  Propose request coalescing (merge 2 adjacent frames into a batch) to reduce effective
  \lambda while preserving detection accuracy via temporal averaging. Quantify the P99 improvement.'
question: If adjacent frames are coalesced in pairs, what are the new utilization
  and P99 latency, and does the Hailo-8 meet the 200ms SLO?
details:
  realistic_solution: 'Coalescing pairs: new \lambda = 25/2 = 12.5 requests/s.
    Current service time: \mu = 25/0.9 = 27.78/s \rightarrow 36ms. 
    Batched service \approx 36 * 1.5 = 54ms. New \mu = 1/0.054 = 18.52/s. 
    New \rho = 12.5/18.52 = 0.675. 
    M/D/1 Wq = \rho / (2\mu(1-\rho)) = 0.675 / (2 * 18.52 * 0.325) = 56ms. 
    W = 56 + 54 = 110ms. P99 \approx 4.6 * W = 506ms. 
    Improvement: 910 \rightarrow 506ms. 
    It significantly improves latency but DOES NOT meet the 200ms SLO without further batching or model optimization.'
  common_mistake: Assuming coalescing reduces throughput by 2x — it actually reduces
    arrival rate to \mu by half while service time increases sublinearly (not 2x) due
    to batch efficiency, improving net utilization. Using an incorrect queueing formula like M/M/1.
  napkin_math: 'Baseline: \lambda=25, \rho=0.9 \rightarrow \mu=27.78, S=36ms. 
    M/D/1 Wq = 0.9 / (2 * 27.78 * 0.1) = 162ms. W = 198ms. P99 \approx 4.6 * W = 910ms.
    Coalesced: \lambda=12.5, S=54ms, \mu=18.52, \rho=0.675. 
    Wq = 0.675 / (2 * 18.52 * 0.325) = 56ms. W = 110ms. P99 \approx 506ms.
    P99 improves by 1.8x, but misses 200ms SLO.'
