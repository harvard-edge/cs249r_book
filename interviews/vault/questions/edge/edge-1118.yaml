title: 'Edge Queueing Theory Optimization: Hailo-8 Throughput via Request Coalescing'
scenario: A Hailo-8 processes security camera frames at λ=25 req/s with ρ=0.9 (near capacity). P99=910ms (SLO: 200ms). You cannot add hardware.
question: If adjacent frames are coalesced in pairs, what are the new utilization and P99 latency, and does it meet the 200ms SLO?
details:
  realistic_solution: 'Coalescing pairs: new λ = 25/2 = 12.5 requests/s. Current service time: μ = 25/0.9 = 27.78/s → 36ms. Batched service ≈ 36 * 1.5 = 54ms. New μ = 1/0.054 = 18.52/s. New ρ = 12.5/18.52 = 0.675. M/D/1 Wq = ρ / (2μ(1-ρ)) = 0.675 / (2 * 18.52 * 0.325) = 56ms. W = 56 + 54 = 110ms. P99 ≈ 4.6 * W = 506ms. Improvement: 910 → 506ms. It significantly improves latency but DOES NOT meet the 200ms SLO without further batching or model optimization.'
  common_mistake: |
    **The Pitfall:** Assuming coalescing reduces throughput by 2x or using an incorrect queueing formula like M/M/1.
    **The Rationale:** Candidates misunderstand that batching reduces the arrival rate by half while service time increases sublinearly, improving net utilization.
    **The Consequence:** Overestimates the latency improvements or incorrectly concludes that coalescing will single-handedly meet the strict 200ms SLO.
  napkin_math: |
    1. Baseline: λ=25, ρ=0.9 → μ=27.78, Service Time (S)=36ms. Wq = 0.9 / (2 * 27.78 * 0.1) = 162ms. W = 198ms. P99 ≈ 4.6 * W = 910ms.
    2. Coalesced pairs: new λ = 25/2 = 12.5 requests/s.
    3. Batched service ≈ 36ms * 1.5 = 54ms. New μ = 1/0.054 = 18.52/s.
    4. New ρ = 12.5/18.52 = 0.675.
    5. M/D/1 Wq = ρ / (2 * μ * (1-ρ)) = 0.675 / (2 * 18.52 * 0.325) = 56ms.
    6. Total time W = 56ms + 54ms = 110ms.
    7. New P99 ≈ 4.6 * W = **506ms** (Improves by 1.8x, but misses the 200ms SLO).
