title: Fairness Evaluation on Edge Devices with NVIDIA Jetson Orin
scenario: You are deploying an object detection model for autonomous vehicles on an NVIDIA Jetson Orin. Regulators require strict fairness metrics (e.g., demographic parity) across different demographic groups and environmental conditions.
question: How would you evaluate and monitor demographic parity for pedestrian detection on the Jetson Orin within compute and power limits?
details:
  realistic_solution: Implement a lightweight, streaming telemetry pipeline on the Orin. Store heavily quantized metadata (bounding boxes, class, and demographic group proxy ID) generated by a secondary lightweight classifier or heuristic. Calculate streaming demographic parity utilizing efficient incrementing counters (True Positive, False Positive, etc.) directly on the host CPU. Because storing frames violates privacy and exhausts bandwidth, only the aggregated parity tensors (a few kilobytes) are synchronized periodically via MQTT back to the central fleet orchestrator.
  common_mistake: |
    **The Pitfall:** Attempting to store and stream raw video frames to the cloud for offline fairness evaluation.
    **The Rationale:** Candidates apply cloud-native MLOps practices, failing to realize that edge devices operate under severe network bandwidth constraints and privacy compliance laws.
    **The Consequence:** The cellular data budget is instantly exhausted, and transmitting raw video containing pedestrians creates a massive PII compliance violation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target framerate: 100 FPS.
       - Monitored cohorts: 4 demographic groups.
       - Counters per group: 4 (TP/FP/TN/FN).
    2. **Calculations:**
       - Metadata storage (10 min window) = 10 min * 60 s * 100 FPS = 60,000 frames.
       - Memory footprint = 60,000 frames * ~100 bytes/metadata = 6 MB.
       - CPU Compute = 100 FPS * (4 groups * 4 counters) = 1,600 updates/sec.
       - Cycle cost = 1,600 updates * ~100 cycles/update = 160,000 CPU cycles/sec.
    3. **Conclusion & Interpretation:**
       - **Result: 6 MB memory, 160K CPU cycles/sec. The fairness tracking is completely trivial; the system remains highly Compute-Bound on the NPU.**
