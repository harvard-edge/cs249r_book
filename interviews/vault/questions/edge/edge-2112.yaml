title: Fairness Evaluation on Edge Devices with NVIDIA Jetson Orin
scenario: You are deploying an object detection model for autonomous vehicles on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W). The model identifies pedestrians and cyclists. Regulators require strict fairness metrics, specifically demographic parity, across different demographic groups (e.g., age, skin tone) and environmental conditions (e.g., day/night, rain/clear).
question: How would you evaluate and monitor demographic parity for pedestrian detection on the Jetson Orin within compute and power limits?
details:
  realistic_solution: 'A realistic solution involves establishing a continuous integration/continuous deployment (CI/CD) pipeline that includes lightweight, representative fairness evaluations. On the Jetson Orin, this would mean performing periodic, on-device sampling of predictions on a diverse, labelled dataset or using synthetic data that covers various demographic and environmental subgroups. Implement a streaming fairness metric calculation that incrementally updates demographic parity scores without storing large amounts of raw data. Leverage the Orin''s INT8 capabilities for inference and ensure that any fairness-aware post-processing steps are highly optimized. Anomaly detection on fairness metrics can trigger alerts for re-training or calibration. Furthermore, consider a two-stage approach: a comprehensive offline evaluation for initial model validation, followed by a lighter, targeted set of fairness checks (e.g., monitoring false negative rates for underrepresented groups) directly on the edge device during operation.'
  common_mistake: |
    **The Pitfall:** Only evaluating fairness metrics offline during development.
    **The Rationale:** Candidates assume that fairness performance will translate directly to the edge without considering biases introduced by INT8 quantization or specific sensor hardware variations.
    **The Consequence:** Real-world deployments violate regulatory fairness constraints because quantization disproportionately degrades performance on underrepresented groups without triggering system alarms.
  napkin_math: |
    1. Define constraints: Target 100 FPS. Need to track 4 demographic groups.
    2. Calculate fairness metadata storage: 10 mins * 60 secs * 100 FPS = 60,000 frames. 60,000 * 100 bytes = 6MB, which is trivial.
    3. Calculate computational cost per frame: Incrementing 4 groups * 4 counters (TP/FP/TN/FN) = 16 updates per frame.
    4. Calculate cycle cost: If an update is 100 CPU cycles, 100 FPS * 16 updates * 100 cycles = 160,000 cycles/sec.
    5. Compare to Orin CPU capability: 160,000 cycles/sec << 2.2 * 10^9 cycles/sec.
    **Tracking fairness metrics on-device consumes a trivial 6MB of memory and 160,000 CPU cycles/sec, well within the limits of the Jetson Orin.**
