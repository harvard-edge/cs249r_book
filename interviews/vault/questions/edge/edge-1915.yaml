title: 'Hailo-8 Edge Power Budgeting for Perception'
scenario: 'A self-driving car manufacturer is integrating a new perception stack onto an edge AI accelerator. The system budget for the entire perception module (including Hailo-8, memory, and associated control logic) is 5W. The perception model requires 10 TOPS for its INT8 inference operations at a target frame rate of 30 FPS.'
question: 'How would you optimize Hailo-8 power so a 10 TOPS perception model sustains 30 FPS within the 5W module budget?'
details:
  realistic_solution: 'A realistic solution would involve a multi-faceted approach: Deep Power Profiling using nsys profiling to accurately measure the Hailo-8''s power consumption. Leverage the Hailo-8''s Dynamic Voltage and Frequency Scaling (DVFS) capabilities and P-states to find the lowest possible voltage/frequency combination that still meets the 30 FPS performance target. Coordinate power states with other components, potentially implementing power gating for unused components, and focus on reducing the Energy-per-Inference (EPI).'
  common_mistake: |
    **The Pitfall:** Focusing solely on peak power consumption or assuming linear power scaling.
    **The Rationale:** Candidates often use naive linear proportionality (e.g., 10 TOPS is ~40% of 26 TOPS, so it must use 40% power).
    **The Consequence:** They ignore dynamic power management (DVFS P-states) and static leakage power, leading to grossly inaccurate power budgets and failed thermal designs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Overall module power budget: 5W.
    - Hailo-8 power allocation: ~2W.
    - Target frame rate: 30 FPS.

    **Calculations:**
    - Target Energy Per Inference (EPI): 2W / 30 inf/sec ≈ 0.067 Joules/inference.

    **Conclusion & Interpretation:**
    - **Result: Power-Constrained Optimization (Power-Bound)**. DVFS P-states must be scaled down to hit the 0.067 J/inference target while strictly sustaining the 30 FPS requirement.
