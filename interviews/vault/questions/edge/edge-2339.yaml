title: Gigabit Ethernet DDP
scenario: 4 edge gateways (each a Jetson AGX Orin) participate in federated learning
  for a regional vision model. Local-network connectivity uses a 1 GbE switch. Each
  round, the gateways exchange a 25 MB weight delta through a federated averaging
  step (functionally an AllReduce of 25 MB).
question: Optimize the topology for AllReduce, comparing parameter server vs ring
  AllReduce latency.
visual:
  kind: svg
  path: edge-2339.svg
  alt: 'Two subgraphs: one showing a Ring topology, one showing a Star topology'
  caption: 'Topology Comparison: Ring vs Star'
details:
  realistic_solution: '1GbE = 125 MB/s. Parameter server (star) bottleneck: 3 * 25MB
    = 75MB. Latency = 75/125 = 0.6s. Ring bottleneck: 2*(3/4)*25 = 37.5MB. Latency
    = 37.5/125 = 0.3s. Ring is 2x faster.'
  common_mistake: Calculating Ring AllReduce volume as simply N * payload instead
    of the lower-bound 2(N-1)/N * payload.
  napkin_math: Ring (0.3s) < Star (0.6s).
