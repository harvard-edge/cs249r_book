title: The Coast-to-Coast Latency Tax
scenario: In a fleet of autonomous vehicles distributed across the United States, we're considering different data strategies. Before evaluating complex methods like federated learning, let's establish a baseline physical constraint.
question: What is the approximate round-trip time (RTT) for network communication from a vehicle on one coast to a data center on the other?
details:
  realistic_solution: The minimum round-trip time across the US is approximately 40 milliseconds. This is dictated by the speed of light in fiber optic cable over thousands of kilometers. This significant latency is a primary physical and economic driver for adopting edge-native ML strategies like federated learning, as it makes the centralized processing of high-bandwidth sensor data from a distributed fleet infeasible.
  common_mistake: |
    **The Pitfall:** Underestimating cross-country latency by confusing it with local network latency.
    **The Rationale:** Engineers accustomed to single-datacenter environments often guess single-digit milliseconds, forgetting the physical constraints of wide-area networks.
    **The Consequence:** Designing systems that depend on centralized processing of real-time edge data, which ultimately fail due to inescapable speed-of-light delays.
  napkin_math: |
    *   **Speed of light in fiber:** ~200 km/ms.
    *   **US width:** ~4,000 km.
    *   **One-way trip:** 4,000 km / 200 km/ms = 20 ms.
    *   **Round-trip time (RTT):** 20 ms * 2 = **40 ms**.
  options:
  - ~100 microseconds
  - ~5 milliseconds
  - ~40 milliseconds
  - ~500 milliseconds
  correct_index: 2
