title: The Coast-to-Coast Latency Tax
scenario: In a fleet of autonomous vehicles distributed across the United States, we're considering different data strategies. Before evaluating complex methods like federated learning, let's establish a baseline physical constraint.
question: What is the approximate round-trip time (RTT) for network communication from a vehicle on one coast to a data center on the other?
details:
  realistic_solution: The theoretical minimum round-trip time across the US is approximately 40 milliseconds, dictated strictly by the speed of light in fiber optic cables. This inescapable physical latency mandates edge-native ML strategies (like federated learning or on-device inference) to avoid violating real-time vehicle control deadlines.
  common_mistake: |
    **The Pitfall:** Underestimating cross-country latency by confusing it with local network latency.
    **The Rationale:** Engineers accustomed to single-datacenter environments often guess single-digit milliseconds, forgetting wide-area network physical constraints.
    **The Consequence:** Designing systems that depend on centralized processing of real-time edge data, which ultimately fail due to speed-of-light delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - US Coast-to-Coast distance: ~4,000 km.
       - Speed of light in fiber optic cable: ~200 km/ms.
    2. **Calculations:**
       - One-way transmission: 4,000 km / 200 km/ms = 20 ms.
       - Round-Trip Time (RTT): 20 ms * 2 = 40 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Physical Limit.** The 40 ms RTT is a hard physical floor, making centralized real-time control impossible and validating the need for edge compute.
  options:
  - ~20 milliseconds
  - ~40 milliseconds
  - ~100 microseconds
  - ~5 milliseconds
