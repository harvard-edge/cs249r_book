title: The Coast-to-Coast Latency Tax
scenario: In a fleet of autonomous vehicles distributed across the United States, we're considering different
  data strategies. Before evaluating complex methods like federated learning, let's establish a baseline
  physical constraint. What is the approximate round-trip time (RTT) for network communication from a
  vehicle on one coast to a data center on the other?
details:
  realistic_solution: The minimum round-trip time across the US is approximately 40 milliseconds. This
    is dictated by the speed of light in fiber optic cable over thousands of kilometers. This significant
    latency is a primary physical and economic driver for adopting edge-native ML strategies like federated
    learning, as it makes the centralized processing of high-bandwidth sensor data from a distributed
    fleet infeasible.
  common_mistake: Engineers who primarily work within a single datacenter often underestimate cross-country
    latency. They might confuse it with local network latency (microseconds to single-digit milliseconds)
    and guess a value that is orders of magnitude too low, failing to account for the hard physical limit
    imposed by the speed of light.
  napkin_math: The speed of light in fiber is roughly 200 km/ms. The continental US is about 4,000 km
    wide.
  options:
  - ~100 microseconds
  - ~5 milliseconds
  - ~40 milliseconds
  - ~500 milliseconds
