title: Realize Systolic Array Output-Stationary Tiling on Hailo-8
scenario: You must implement a matrix multiply on Hailo-8 using output-stationary dataflow where partial sums accumulate in-place. The operation is W [512x256] x X [256x128] = Y [512x128]. Hailo-8 has 13 TOPS and 2MB on-chip SRAM. With 1MB reserved for weights and activations, you have 1MB for partial sums.
question: What output-stationary tiling strategy fits W[512x256] x X[256x128] on Hailo-8, and what is total SRAM traffic?
details:
  realistic_solution: Output tile Y_tile must fit in 1MB SRAM. Since M=512, N=128, the entire output Y is 512x128 = 65,536 elements. In FP32 accumulation, this is 65,536 * 4B = 256KB. Because 256KB < 1MB, the full output fits in SRAM simultaneously. For the K dimension, stream X [256x128] in chunks that fit with weights. The entire operation requires only 1x1 = 1 tile. Single-tile output-stationary avoids any re-reads of Y.
  common_mistake: |
    **The Pitfall:** Arbitrarily picking smaller tile sizes to maximize compute unit utilization.
    **The Rationale:** Candidates mathematically slice the matrix without checking if the full output simply fits in SRAM.
    **The Consequence:** Unnecessary loop overhead and data movement logic, reducing execution efficiency.
  napkin_math: |
    1. **Output Memory:** 512 x 128 elements x 4B (FP32) = 256KB.
    2. **Input Memory:** X: 256 x 128 x 1B (INT8) = 32KB.
    3. **Weight Memory:** W: 512 x 256 x 1B (INT8) = 128KB.
    4. **Total On-Chip Check:** 256KB + 32KB + 128KB = **416KB**. Fits easily in 2MB SRAM; no tiling needed.
    5. **Performance:** FLOPs = 2 x 512 x 256 x 128 = 33.5M. Time at 13 TOPS = 33.5M / 13T = **2.58µs**.
