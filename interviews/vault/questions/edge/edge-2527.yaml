title: RP2040 Dual-Core SRAM Contention
scenario: On an RP2040 (133 MHz), Core 0 writes audio to shared SRAM while Core 1 reads it for ML inference. Concurrent access to the single-ported SRAM causes a 1-cycle contention stall.
question: Analyze the synchronization overhead per 1000 audio samples if accesses align perfectly.
details:
  realistic_solution: If perfectly aligned, every read by Core 1 collides with a write from Core 0, stalling Core 1 for 1 cycle per sample. Over 1000 samples, this yields 1000 cycles of contention delay. At 133 MHz (7.5ns per cycle), the synchronization penalty is 7.5µs.
  common_mistake: |
    **The Pitfall:** Ignoring micro-architectural contention and assuming dual-core shared memory access has zero cycle-level synchronization penalties.
    **The Rationale:** Developers abstract away hardware details, treating shared memory as an ideal, non-blocking resource.
    **The Consequence:** Unaccounted delays in tight real-time loops, leading to missed deadlines or dropped audio samples.
  napkin_math: |
    *   **Stall cycles:** 1 cycle per sample * 1000 samples = 1000 cycles.
    *   **Clock speed:** 133 MHz = 133,000,000 cycles/second.
    *   **Time per cycle:** 1 / 133,000,000 seconds ≈ 7.5ns.
    *   **Total contention delay:** 1000 cycles * 7.5ns = 7500ns = **7.5 µs**.
