title: RP2040 Dual-Core SRAM Contention
scenario: On an RP2040 (133 MHz), Core 0 writes audio to shared SRAM while Core 1
  reads it for ML inference. Concurrent access to the single-ported SRAM causes a
  1-cycle contention stall.
question: Analyze the synchronization overhead per 1000 audio samples if accesses
  align perfectly.
details:
  realistic_solution: If perfectly aligned, every read by Core 1 collides with a write
    from Core 0, stalling Core 1 for 1 cycle per sample. Over 1000 samples, this yields
    1000 cycles of contention delay. At 133 MHz (7.5ns per cycle), the synchronization
    penalty is 7.5µs.
  common_mistake: Ignoring micro-architectural contention and assuming dual-core shared
    memory access has zero cycle-level synchronization penalties.
  napkin_math: 1000 stall cycles * (1 / 133,000,000) seconds = 0.0000075s = 7.5 us.
