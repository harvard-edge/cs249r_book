title: The Automotive I/O Bottleneck
scenario: 'In a typical autonomous vehicle perception system, a high-resolution camera streams data to
  the main ECU, often a device like the NVIDIA Jetson AGX Orin. Which component typically offers higher
  data bandwidth: the AGX Orin''s LPDDR5 memory system or the MIPI CSI-2 camera interface that feeds it?'
details:
  realistic_solution: The LPDDR5 memory system has vastly higher bandwidth. The Jetson AGX Orin's memory
    bandwidth is approximately 205 GB/s, whereas a standard 4-lane MIPI CSI-2 camera interface provides
    only about 2.5 GB/s. This massive difference (over 80x) is intentional, ensuring that the central
    processor is not bottlenecked by a single sensor and has ample bandwidth for data processing, fusion
    from other sensors (like LiDAR or radar), and running the neural network inference itself.
  common_mistake: Engineers often assume the sensor interface and the processor's memory are performance-matched
    (a 1:1 ratio), or they incorrectly believe the input sensor is the highest bandwidth component. This
    overlooks the fundamental design of SoCs, where memory bandwidth must be significantly higher than
    I/O bandwidth to service multiple peripherals and complex compute kernels simultaneously.
  napkin_math: The Jetson AGX Orin's LPDDR5 memory subsystem provides a peak bandwidth of 204.8 GB/s.
    A standard 4-lane MIPI CSI-2 camera interface provides a maximum of ~2.5 GB/s. The ratio is 204.8
    / 2.5 = 81.9x. The massive LPDDR5 bandwidth ensures the SoC can rapidly read/write model weights and
    activations without being bottlenecked by sensor ingress rates.
  options:
  - They are roughly equal, as they are designed to be balanced.
  - The LPDDR5 memory system, by about 80x.
  - The MIPI CSI-2 camera interface, by about 10x.
  - The LPDDR5 memory system, but only by a small amount (~2-3x).
