title: Quantifying Sustained Performance Degradation due to Thermal Throttling on Qualcomm Cloud AI 100
scenario: Your data center is deploying Qualcomm Cloud AI 100 accelerators, each with 32 GB LPDDR4x, 400
  TOPS INT8 peak performance, and a 75W Thermal Design Power (TDP). During continuous inference workloads
  in a high ambient temperature environment, you observe significant thermal throttling. This throttling
  restricts the average power consumption of a single card to 60W over a sustained 1-minute period, even
  though the card is capable of drawing 75W in burst scenarios. Assuming a linear relationship between
  power consumption and INT8 TOPS for this simplified analysis, calculate the effective sustained INT8
  TOPS and the percentage reduction from peak performance due to this throttling. Additionally, formulate
  a general expression for effective sustained TOPS (TOPS_effective) based on the observed sustained power
  (P_sustained), peak power (P_peak), and peak TOPS (TOPS_peak).
details:
  realistic_solution: A realistic approach involves using manufacturer-provided power-performance curves
    or empirical measurements to understand the actual relationship, which is rarely perfectly linear.
    For a given sustained power draw (60W), one would look up the corresponding sustained TOPS. To mitigate,
    cooling strategies might need to be re-evaluated (e.g., enhanced airflow, liquid cooling) or workload
    scheduling adjusted to prevent prolonged throttling. The derived formula would then be validated against
    real-world performance data.
  common_mistake: Overlooking the non-linear relationship between power consumption and performance in
    real-world scenarios, or failing to differentiate between peak (burst) and sustained power/performance
    metrics. Another common mistake is not considering the full system view, such as cooling capacity
    and ambient temperature's impact on thermal limits beyond just a single chip's TDP.
  napkin_math: 'Given Peak Power (P_peak) = 75W, Peak TOPS (TOPS_peak) = 400 INT8 TOPS, and Sustained
    Power (P_sustained) = 60W.

    1. Effective Sustained TOPS: TOPS_effective = (P_sustained / P_peak) * TOPS_peak = (60W / 75W) * 400
    TOPS = 0.8 * 400 TOPS = 320 INT8 TOPS.

    2. Percentage Reduction: ((TOPS_peak - TOPS_effective) / TOPS_peak) * 100% = ((400 - 320) / 400) *
    100% = (80 / 400) * 100% = 0.2 * 100% = 20% reduction.

    3. General Formula: TOPS_effective = (P_sustained / P_peak) * TOPS_peak'
