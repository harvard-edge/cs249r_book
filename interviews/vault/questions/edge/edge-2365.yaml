title: Orin Power Mode Threshold
scenario: 'A Jetson AGX Orin takes 150 ms to run inference in its 15W mode, and 50 ms in its 60W mode.'
question: 'What is the energy consumed per inference in each mode, and which is more energy-efficient?'
visual:
  kind: svg
  path: edge-2365.svg
  alt: Timeline showing wide 15W block vs narrow 60W block of energy.
  caption: 'Power integration: 15W vs 60W mode.'
details:
  realistic_solution: 'Energy is Power * Time. In 15W mode: 15W * 0.150s = 2.25 Joules. In 60W mode: 60W * 0.050s = 3.0 Joules. The 15W mode is more energy-efficient per inference.'
  common_mistake: |
    **The Pitfall:** Assuming the faster mode is more energy-efficient due to "race-to-sleep."
    **The Rationale:** Candidates blindly apply the race-to-sleep heuristic without checking the actual power-time integration math.
    **The Consequence:** They select the 60W mode, wasting battery life on an inefficient power curve.
  napkin_math: |
    * Energy Formula: Energy (Joules) = Power (Watts) × Time (Seconds).
    * 15W mode: 15W × 0.150s = 2.25 Joules.
    * 60W mode: 60W × 0.050s = 3.0 Joules.
    * **Conclusion: The 15W mode (2.25J) is definitively more energy-efficient per inference.**
