details:
  realistic_solution: 'Energy is Power * Time. In 15W mode: 15W * 0.150s = 2.25 Joules.
    In 60W mode: 60W * 0.050s = 3.0 Joules. The 15W mode is more energy-efficient
    per inference.'
  common_mistake: Assuming the faster mode (60W) saves energy blindly due to 'race-to-sleep',
    without checking the math.
  napkin_math: 15*0.15 = 2.25J vs 60*0.05 = 3.0J. 15W is better.
