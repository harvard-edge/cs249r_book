title: Orin Power Mode Threshold
scenario: 'An edge SoC takes 150 ms to run inference in its 15W mode, and 50 ms in its 60W mode.'
question: 'What is the energy consumed per inference in each mode, and which is more energy-efficient?'
details:
  realistic_solution: 'Calculate total energy as Power * Time (Joules). While race-to-sleep relies on burst execution to quickly power down, the physical power curve of the hardware dictates true efficiency. The 15W mode consumes fewer Joules per inference despite taking longer.'
  common_mistake: |
    **The Pitfall:** Assuming the faster mode is more energy-efficient due to "race-to-sleep."
    **The Rationale:** Candidates blindly apply the race-to-sleep heuristic without performing the actual power-time integration math.
    **The Consequence:** They select the 60W mode, wasting battery life on an inefficient and thermally aggressive power curve.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 15W mode duration: 150 ms (0.150s).
       - 60W mode duration: 50 ms (0.050s).
    2. **Calculations:**
       - Energy Formula: Energy (Joules) = Power (Watts) * Time (Seconds).
       - 15W mode energy: 15W * 0.150s = 2.25 Joules.
       - 60W mode energy: 60W * 0.050s = 3.0 Joules.
    3. **Conclusion & Interpretation:**
       - **The 15W mode (2.25J) is definitively more energy-efficient per inference.** (Result: Energy-Bound)
status: published