title: The Over-Budget Driver Intention Model
scenario: You are the Lead ML Systems Engineer at an automotive supplier. Your team has developed a powerful 500M parameter Transformer model for a new 'Driver Intention' feature, which predicts if a driver is about to turn or change lanes based on in-cabin video. The cloud-trained model achieves 99.5% accuracy. However, deploying it on the vehicle's edge NPU results in a latency of 500ms per frame, which is completely unacceptable for real-time safety (target is 33ms). You must propose a multi-stage optimization pipeline across the model, algorithm, and hardware levels to achieve the 15x speedup required without dropping accuracy below 98%.
question: What multi-stage model, algorithm, and hardware optimization pipeline would you use to get a 15x speedup without dropping below 98% accuracy?
details:
  realistic_solution: A multi-stage approach is required, as the performance gap is too large for any single technique. The plan must attack the model, the algorithm, and the kernel execution.
  common_mistake: |
    **The Pitfall:** Proposing a single technique in isolation (e.g., just 8-bit quantization) or focusing only on model compression.
    **The Rationale:** Engineers underestimate the compound strategies required to achieve a massive 15x speedup.
    **The Consequence:** Failing to reach the 33ms target because the algorithmic and kernel-level bottlenecks were ignored.
  napkin_math: |
    - 500M parameter Transformer in INT8 = 0.5 GB.
    - Memory bandwidth on Orin is 204.8 GB/s.
    - Reading weights per token takes 0.5 GB / 204.8 GB/s = 2.44 ms.
    - Compute for 1 token: 500M * 2 ops = 1 GOP. At 275 TOPS, compute time is 1G / 275T = 0.003 ms (Heavily memory bound).
    - Apply KV-caching and process a batch of 10 sequence steps at once.
    - **Result: Amortizes the 2.44ms weight load across 10 tokens, resulting in ~0.244ms per token.**
