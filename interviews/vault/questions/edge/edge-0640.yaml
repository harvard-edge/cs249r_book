title: The Over-Budget Driver Intention Model
scenario: You are the Lead ML Systems Engineer at an automotive supplier. Your team has developed a powerful
  500M parameter Transformer model for a new 'Driver Intention' feature, which predicts if a driver is
  about to turn or change lanes based on in-cabin video. The cloud-trained model achieves 99.5% accuracy.
  However, deploying it on the vehicle's edge NPU results in a latency of 500ms per frame, which is completely
  unacceptable for real-time safety (target is 33ms). Propose a multi-stage optimization pipeline across
  the model, algorithm, and hardware levels to achieve the 15x speedup required without dropping accuracy
  below 98%.
details:
  realistic_solution: A multi-stage approach is required, as the performance gap is too large for any
    single technique. The plan must attack the model, the algorithm, and the kernel execution.
  common_mistake: Engineers often propose a single technique in isolation, like 'we'll just use 8-bit
    quantization.' They fail to recognize that no single optimization can bridge this massive performance
    gap. Another common mistake is to only focus on model compression (pruning/distillation) without considering
    the algorithmic and kernel-level changes required to fundamentally reduce latency, like altering the
    decoding strategy itself.
  napkin_math: '500M parameter Transformer in INT8 = 0.5GB. Memory bandwidth on Orin is 204.8 GB/s. Reading
    weights per token takes 0.5GB / 204.8GB/s = 2.44ms. Compute for 1 token: 500M * 2 ops = 1 GOP. At
    275 TOPS, compute time is 1G / 275T = 0.003ms. Heavily memory bound! To speed this up, we apply KV-caching
    and process a batch of 10 sequence steps at once, amortizing the 2.44ms weight load across 10 tokens.'
