title: Edge TPU Activation and Weight Budgeting
scenario: You are deploying a real-time object detection model for a battery-powered security camera using
  the Google Coral Edge TPU in a USB form factor. The platform provides 4 TOPS for INT8 operations and
  operates on a strict 2W power budget, meaning all compute must happen on-chip to avoid catastrophic
  power and latency penalties from USB data transfers. You need to evaluate the memory budget for a custom
  CNN to ensure weights, activations, and intermediate tensors can be compiled into a single Edge TPU
  subgraph without falling back to the host CPU.
details:
  realistic_solution: An L5 candidate will evaluate both parameter size and peak activation memory, specifically
    identifying the early high-resolution layers as the primary memory bottleneck. They will mandate strictly
    supported INT8 operators to match the hardware's 4 TOPS INT8 engine and prevent the compiler from
    splitting the graph. By enforcing aggressive early spatial downsampling and calculating exact byte
    requirements for feature maps, they guarantee the execution graph remains entirely on the Edge TPU,
    respecting the 2W power envelope.
  common_mistake: Candidates often only calculate the memory required for the model's weights and ignore
    the peak memory needed for intermediate activations. They also frequently suggest using unsupported
    operators, which forces graph partitioning and constant memory swapping over the slow USB interface.
  napkin_math: 'For a 256x256x3 RGB input, a standard first 3x3 convolution with 32 filters requires:
    Weights = 3 * 3 * 3 * 32 = 864 INT8 parameters (864 bytes). If stride 1 is used, output activations
    = 256 * 256 * 32 = 2,097,152 bytes (~2.1 MB) in INT8. Since the TPU must hold the input, weights,
    and output feature map simultaneously, this single layer consumes >2.3 MB. To fit within strict on-chip
    SRAM limits and avoid spilling over the USB interface, applying a stride of 2 drops the output activation
    memory to 128 * 128 * 32 = ~0.5 MB, saving 1.6 MB of critical memory budget.'
