title: Detecting and Mitigating Data Drift on Jetson Orin for Edge Reliability
scenario: You are responsible for an object detection model deployed on an NVIDIA Jetson Orin (32 GB LPDDR5,
  275 TOPS INT8, 60W power budget) in a critical industrial setting. Recently, you've observed a subtle
  but consistent drop in detection accuracy, not attributable to software bugs or hardware failures. Preliminary
  investigations suggest the incoming data distribution has shifted. Describe your approach to formally
  diagnose this data drift, including specific statistical detection methods suitable for the edge environment.
  How would you quantify the impact of this drift, propose an optimized mitigation strategy given the
  Orin's resource constraints, and measure the effectiveness of your fix to restore reliability?
question: "How would you diagnose and quantify data drift on Jetson Orin, mitigate it within resource limits, and measure restored reliability?"
details:
  realistic_solution: Implement a lightweight data drift detection mechanism on the Jetson Orin itself,
    using statistical methods like Population Stability Index (PSI) or A/B divergence (e.g., Jensen-Shannon
    divergence) on key input features. This would involve a separate, low-overhead process to continuously
    monitor incoming data against a baseline profile, perhaps utilizing a dedicated CPU core. Upon detecting
    significant drift, trigger an alert and implement an adaptive learning strategy, such as fine-tuning
    only the last few layers of the model, or using an ensemble of models, selectively updated with new
    data, ensuring the process fits within the 60W power envelope and leverages the 275 TOPS INT8 capabilities
    efficiently for inference, while dedicating minimal LPDDR5 bandwidth for detection and update.
  common_mistake: Relying solely on accuracy metrics for drift detection without understanding the underlying
    data distribution shifts, or attempting to retrain the entire model on the edge device without proper
    resource management or incremental learning strategies, which could exceed the 60W power budget and
    available 32GB LPDDR5.
  napkin_math: If current inference for the object detection model utilizes 200 TOPS of the Jetson Orin's
    275 TOPS INT8 capacity, and drift detection on 5 key input features adds 0.5ms of computation per
    inference batch, this consumes approximately 0.5ms × 1000 Hz = 500ms of compute per second, equivalent
    to 50% compute utilization of a single core (not a TOPS figure). Relative to the 275 TOPS INT8 accelerator,
    this 0.5ms overhead is negligible (<0.02% of total TOPS capacity). This ensures the solution remains
    within the 60W thermal design power and 32 GB LPDDR5 memory limits by keeping the detection footprint
    minimal (e.g., ~1-2% of overall compute/power).
