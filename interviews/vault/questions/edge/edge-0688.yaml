title: The Coral Edge TPU Quantization Constraint
scenario: You're deploying a custom object detection model on a Google Coral Edge TPU (USB Accelerator,
  4 TOPS INT8). The model has 52 layers. After full INT8 quantization and compilation with the Edge TPU
  Compiler, the compiler report shows that only 48 of 52 layers are mapped to the TPU — 4 layers fall
  back to the CPU. One of those CPU-fallback layers is a critical attention layer that loses 15% mAP when
  quantized to INT8. What are your options?
details:
  realistic_solution: 'You have four options with different trade-offs. (1) Quantization-Aware Training
    (QAT): retrain the attention layer with fake quantization nodes, recovering most of the 15% mAP loss.
    Cost: days of training, best accuracy. (2) Split the model: run 48 layers on TPU (8ms) + 4 layers
    on CPU (7ms with transfer) = 15ms total (67 FPS). Acceptable if latency budget allows it. (3) Replace
    the attention layer with a TPU-compatible alternative (e.g., squeeze-excitation). Cost: architecture
    change + retraining. (4) Use two Coral TPUs, routing the fallback layers to the second. The Coral
    has no FP16 mode — it is pure INT8 — so mixed precision is not an option.'
  common_mistake: '"Use mixed precision — run that layer in FP16 on the TPU." The Coral Edge TPU has no
    FP16 support whatsoever. It is a pure INT8 accelerator with a fixed dataflow architecture. There is
    no mixed-precision mode, no FP16 fallback, no INT16 option. The hardware literally cannot execute
    non-INT8 operations.'
  napkin_math: 'Coral Edge TPU: 4 TOPS INT8, ~2W. Full model on TPU: 48 layers, 8ms. CPU fallback: 4 layers,
    5ms + 2ms transfer = 7ms. Total: 15ms (67 FPS). Fully on TPU (after QAT + arch fix): 52 layers, 9ms
    (111 FPS). Speedup: 1.67×. Power: TPU-only = 2W. TPU + CPU fallback = 2W + 1.5W (CPU active) = 3.5W.
    Two-TPU: 4W + 1.5W = 5.5W. For a battery-powered device (10 Wh): runtime at 3.5W = 2.86h, at 2W =
    5h. The 75% battery life improvement from eliminating CPU fallback justifies the QAT engineering effort.'
