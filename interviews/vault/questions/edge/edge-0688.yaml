title: The Coral Edge TPU Quantization Constraint
scenario: You're deploying a custom object detection model on a Google Coral Edge TPU. The model has 52 layers. After full INT8 quantization and compilation with the Edge TPU Compiler, the compiler report shows that only 48 of 52 layers are mapped to the TPU — 4 layers fall back to the CPU. One of those CPU-fallback layers is a critical attention layer that loses 15% mAP when quantized to INT8.
question: What are your options to handle the 4 fallback layers, and which provides the best tradeoff between accuracy and battery life?
details:
  realistic_solution: 'You have four options with different trade-offs. (1) Quantization-Aware Training (QAT): retrain the attention layer with fake quantization nodes, recovering most of the 15% mAP loss. Cost: days of training, best accuracy. (2) Split the model: run 48 layers on TPU (8ms) + 4 layers on CPU (7ms with transfer) = 15ms total (67 FPS). Acceptable if latency budget allows it. (3) Replace the attention layer with a TPU-compatible alternative (e.g., squeeze-excitation). Cost: architecture change + retraining. (4) Use two Coral TPUs, routing the fallback layers to the second. The Coral has no FP16 mode — it is pure INT8 — so mixed precision is not an option.'
  common_mistake: |
    **The Pitfall:** Suggesting mixed precision by running the attention layer in FP16 on the TPU.
    **The Rationale:** Candidates familiar with Nvidia GPUs assume all modern edge accelerators support FP16 fallback.
    **The Consequence:** Proposing an impossible architecture, as the Coral Edge TPU hardware physically cannot execute non-INT8 operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU-only inference: 48 layers (8ms, 2W).
    - CPU fallback: 4 layers (5ms + 2ms transfer = 7ms, 1.5W CPU).
    - Fully on TPU (after QAT): 52 layers (9ms, 2W).
    - Battery: 10 Wh.

    **Calculations:**
    - TPU + CPU Fallback latency = 8ms + 7ms = 15ms (67 FPS).
    - TPU + CPU Fallback power = 2W + 1.5W = 3.5W.
    - Runtime at 3.5W = 10 Wh / 3.5W = 2.86 hours.
    - QAT TPU-only latency = 9ms (111 FPS).
    - Runtime at 2W = 10 Wh / 2W = 5 hours.

    **Conclusion & Interpretation:**
    - **Result: 75% longer battery life (Power-Bound Mitigated)**. Fixing the quantization via QAT eliminates the CPU active power draw, vastly improving both FPS and battery runtime.
