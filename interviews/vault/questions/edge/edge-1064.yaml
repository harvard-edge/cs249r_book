title: 'Kernel Fusion: Specification — Define Fusion Requirements for Safety-Critical
  Edge Vision'
scenario: Write the kernel fusion specification for a pedestrian detection model on
  Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) deployed in an autonomous forklift.
  The system must achieve >= 60 fps with <= 50W power consumption. Define fusion correctness
  requirements, performance benchmarks, and safety validation for the fused kernels.
question: What kernel fusion specification would you require for the forklift pedestrian
  detector to meet 60 fps under 50W with safety validation?
details:
  realistic_solution: 'Safety-critical fusion: every fused kernel must pass equivalence
    testing vs reference (unfused) implementation on a test suite of >= 10K calibration
    images. Max allowed output difference: < 0.5% bounding box IoU deviation. Power
    profile must be validated under worst-case thermal conditions.'
  common_mistake: Not specifying that fused kernels in safety-critical systems must
    be validated equivalently to their unfused counterparts; not requiring end-to-end
    numerical verification.
  napkin_math: 'Target: 60 fps = 16.7ms per frame. Model: YOLOv8-m (25M params, 79B
    FLOPs). Theoretical: 79B INT8 / 275 TOPS = 0.287ms compute. Memory: 25MB weights
    + ~75MB activations = 100MB. At 68 GB/s: 1.47ms. Current without fusion: 100ms
    (profiled). After TensorRT INT8 fusion (220 ops -> 35 fused): latency drops to ~8ms.
    Target 16.7ms achievable. Power: 275 TOPS at 60W peak. At 60 fps (16.7ms budget): duty cycle = 8ms / 16.7ms
    = 48%. Avg power = 60W * 0.48 = 28.8W < 50W limit. Validation: 10K test images
    * unfused output vs fused output. Accept if: all bboxes with IoU > 0.9 (unfused)
    also have IoU > 0.9 (fused). Max false negative rate increase vs unfused: < 0.1%.
    Regression test: run after every model or code change. CI: automated Jetson Orin
    test bench, daily regression.'
