title: 'Kernel Fusion: Specification — Define Fusion Requirements for Safety-Critical Edge Vision'
scenario: You are writing the kernel fusion specification for a pedestrian detection model on Jetson Orin deployed in an autonomous forklift. The system must achieve >= 60 fps with <= 50W power consumption.
question: What kernel fusion specification would you require for the forklift pedestrian detector to meet 60 fps under 50W with safety validation?
details:
  realistic_solution: 'Safety-critical fusion: every fused kernel must pass equivalence testing vs reference (unfused) implementation on a test suite of >= 10K calibration images. Max allowed output difference: < 0.5% bounding box IoU deviation. Power profile must be validated under worst-case thermal conditions.'
  common_mistake: |
    **The Pitfall:** Not specifying equivalence testing for fused kernels in safety-critical systems.
    **The Rationale:** Candidates assume standard compiler optimizations are mathematically perfectly identical, ignoring floating-point/quantization deviations caused by fusion.
    **The Consequence:** The fused model introduces subtle, unpredictable bounding box regressions that compromise the autonomous forklift's safety.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 60 fps (16.7ms per frame budget).
       - Compute: YOLOv8-m (79B FLOPs). Theoretical INT8 time = 79B / 275 TOPS = 0.287ms.
       - Latency after TensorRT INT8 fusion: drops from 100ms to ~8ms.
    2. **Calculations:**
       - Duty cycle at 60 fps = 8ms / 16.7ms = 48%.
       - Average power = 60W (Orin TDP limit assumed active) * 0.48 = 28.8W.
       - Safety Validation: Evaluate 10K test images (unfused vs fused).
    3. **Conclusion & Interpretation:**
       - **Result: 28.8W Average Power**. Fusion easily meets the 50W budget, but equivalence testing is mandatory to ensure bounding box IoU deviations remain < 0.5%.
