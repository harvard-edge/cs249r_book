title: The Quadratic Cliff
scenario: 'You''re an engineer on an automotive perception team, designing a model for a forward-facing
  camera on a Jetson AGX Orin. For a key layer in your network, you need to process a 64x64 feature map
  with 128 channels. Your team is debating two options:'
details:
  realistic_solution: The self-attention layer is vastly more expensive (over 7x in this case) due to
    its quadratic scaling with the sequence length (which, in this case, is the number of pixels). Convolutions,
    by contrast, have a fixed receptive field and scale linearly.
  common_mistake: 'The most common mistake is to assume that since both layers process the same amount
    of data, their computational cost will be similar. This ignores the fundamental difference in scaling
    laws: convolutions scale linearly with the number of pixels (N), while self-attention scales quadratically
    (N^2). Engineers often forget how quickly the N^2 term dominates, even for modest feature map sizes
    found on edge devices.'
  napkin_math: 'Sequence length N = 64 * 64 = 4096. Conv 3x3 MACs = N * K^2 * C^2 = 4096 * 9 * 128^2 =
    ~604M MACs. Self-attention MACs include QK^T and Attention*V: 2 * N^2 * C = 2 * (4096)^2 * 128 = ~4.29B
    MACs, plus QKV projections (3 * N * C^2 = 201M). Total Attn ~4.49B MACs. 4.49B / 0.604B = ~7.4x more
    compute for self-attention.'
  options:
  - They are roughly equivalent in cost, as they both process the same number of input pixels and have
    the same channel depth.
  - The convolution is more expensive because its 3x3 kernel must scan across the entire feature map.
  - The self-attention layer is over 7x more expensive due to its quadratic complexity with respect to
    the number of pixels.
  - The self-attention layer is slightly cheaper because it has fewer parameters than the convolution's
    pointwise step.
  correct_index: 2
