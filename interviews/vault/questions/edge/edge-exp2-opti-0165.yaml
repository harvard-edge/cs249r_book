title: Optimizing Intersectional Fairness Evaluation
scenario: You are deploying a biometric authentication system on an on-premise server powered by a Qualcomm
  Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). You need to continuously evaluate intersectional fairness
  (equalized odds) across 40 overlapping demographic subgroups on a rolling validation set of 1 million
  samples. Currently, the evaluation pipeline feeds each subgroup's data sequentially into the accelerator,
  which causes severe utilization drops and delays. How do you analyze this bottleneck and optimize the
  pipeline to ensure fairness metrics are calculated efficiently without exceeding the power budget or
  memory limits?
question: "How do you analyze this bottleneck and optimize the pipeline to ensure fairness metrics are calculated efficiently without exceeding the power budget or memory limits?"
details:
  realistic_solution: Decouple the neural network inference from the subgroup metric aggregation. Pass
    the 1 million unique validation samples through the Qualcomm Cloud AI 100 in a single, highly-batched
    continuous stream using INT8 precision to maximize hardware utilization. Export the output logits
    to the host, and then apply a sparse matrix multiplication with a binary subgroup membership matrix
    to compute demographic parity and equalized odds simultaneously.
  common_mistake: Candidates often propose creating separate dataloaders for each of the 40 subgroups
    and running inference sequentially, which causes severe host-to-device memory transfer bottlenecks.
    Others suggest loading the full dataset and all subgroup masks into the accelerator simultaneously,
    which risks exceeding the 32 GB LPDDR4x capacity.
  napkin_math: A standard vision model requires ~8 GOPS per inference. At 400 TOPS INT8, the theoretical
    throughput is 50,000 imgs/sec. Evaluating 40 subgroups with overlapping data sequentially requires
    processing ~1.5M samples, taking ~30 seconds of compute but suffering from massive dataloader overhead.
    By running a single batched pass of 1M unique samples, inference takes exactly 20 seconds. Extracting
    logits (1M samples * 2 classes * 4 bytes) uses only 8 MB of the 32 GB LPDDR4x memory, easily fitting
    alongside the INT8 weights and leaving the 75W accelerator fully saturated without redundant computations.
