title: Google Coral Edge TPU Activation Data Type Requirement
scenario: You are deploying a vision model to a remote sensor array powered by a Google Coral Edge TPU
  via a USB interface. The model was trained using FP32 activations and weights. Before compilation for
  the Edge TPU, which operates under a strict 2W power budget, what specific data format must all activations
  and weights be converted to in order for the hardware to execute the operations?
question: "What INT8-compatible data format must all activations and weights use before compiling the FP32-trained model for the 2W Coral Edge TPU?"
details:
  realistic_solution: The correct answer is INT8 (8-bit integer). The Google Coral Edge TPU strictly requires
    both weights and activations to be fully quantized to INT8 for its matrix multiply units to function,
    as it lacks floating-point hardware to maintain its 4 TOPS INT8 performance within a 2W power envelope.
  common_mistake: Candidates often confuse INT8 quantization with FP16 or BF16, assuming that edge devices
    universally support 16-bit floating-point operations, or they forget that activations must be quantized
    alongside weights.
  napkin_math: Efficiency = 4 TOPS / 2 Watts = 2 TOPS/Watt INT8 compute density.
