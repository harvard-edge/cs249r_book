title: 'Kernel Fusion: Recall — Why is Kernel Fusion Critical for Jetson Orin?'
scenario: You are comparing operator optimization strategies between a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) and an NVIDIA H100 (3.35 TB/s HBM3).
question: Why does kernel fusion matter significantly more on a Jetson Orin than on an H100, and what is the effective memory bandwidth of the Orin's LPDDR5?
details:
  realistic_solution: 'Jetson Orin LPDDR5: 68 GB/s bandwidth. Ridge point: 275 TOPS (INT8) / 68 GB/s = 4044 OPS/byte = 4044 INT8 operations per byte. Any operation with arithmetic intensity < 4044 is memory-bound. This is a much higher bar than H100''s ridge point (295 FLOPS/byte), meaning far more operations are memory-bound on Jetson → fusion helps more.'
  common_mistake: |
    **The Pitfall:** Assuming H100 needs fusion more because it has larger models.
    **The Rationale:** Candidates focus on absolute model size rather than calculating the hardware's specific bandwidth-to-compute ratio (ridge point).
    **The Consequence:** Over-optimizing compute instructions on the edge device while ignoring the devastating memory bandwidth bottlenecks.
  napkin_math: |
    *   Jetson Orin bandwidth: 68 GB/s. Compute: 275 TOPS INT8.
    *   Jetson Ridge point: 275e12 OPS / 68e9 Bytes/s = 4,044 OPS/byte.
    *   H100 bandwidth: 3.35 TB/s (3350 GB/s). Compute: 989 TFLOPS BF16.
    *   H100 Ridge point: 989e12 FLOPS / 3350e9 Bytes/s = 295 FLOPS/byte.
    *   Operations with Arithmetic Intensity (AI) between 295 and 4,044 (e.g., matrix multiply with batch=1, hidden=512, AI=1024) are compute-bound on H100, but memory-bound on Jetson.
    *   **Kernel fusion is critical on Jetson because a much wider range of operations falls into the memory-bound regime due to its extremely high compute-to-bandwidth ratio.**
