title: The Fusion Overhead Tax
scenario: You are optimizing a perception model on an edge device with a memory bandwidth
  of 204.8 GB/s. Your profiler shows that a sequence of three common operations (a
  3x3 depthwise convolution, followed by batch normalization, and a ReLU activation)
  is memory-bound. The input and output for this sequence is a 1 MB feature map.
question: What DRAM traffic do the unfused and fused 1 MB Conv-BatchNorm-ReLU sequence
  require, and what reduction does fusion achieve?
details:
  realistic_solution: The primary benefit of operator fusion is minimizing data movement
    between the GPU's compute cores and its main memory (DRAM). Each time a separate
    kernel is launched, it must read data from DRAM and write its result back. By
    fusing operations, we keep the intermediate data in fast on-chip SRAM/registers,
    only reading the initial input and writing the final output once.
  common_mistake: '**The Pitfall:** Underestimating memory traffic by only counting
    data reads.

    **The Rationale:** Engineers forget that each unfused operation must also write
    its result back to DRAM.

    **The Consequence:** Calculating a false memory reduction and misunderstanding
    the true value of operator fusion.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 3 sequential operations (Conv, BN, ReLU).

    - 1 MB input, 1 MB output per operation.


    **Calculations:**

    - Unfused traffic = 3 ops * (1 MB read + 1 MB write) = 6 MB.

    - Fused traffic = 1 kernel * (1 MB read + 1 MB write) = 2 MB.

    - Reduction = 6 MB - 2 MB = 4 MB.


    **Conclusion & Interpretation:**

    - **Result: Fusion reduces memory traffic by 4 MB (Memory-Bandwidth Bound)**.
    Alleviates Memory-Bandwidth Bound limitations.

    '
  options:
  - 2 MB
  - 4 MB
  - 5 MB
  - 0 MB, because fusion optimizes compute, not memory.
  correct_index: 1
