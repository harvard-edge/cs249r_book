title: The Factory Floor EMI Ghost
scenario: Your defect detection system uses edge modules on RPi CM4 boards along a steel stamping line. Every 12 seconds, when the 500-ton hydraulic press fires, 15-20% of devices report corrupted inference outputs. The model and firmware are identical across all devices, but only devices within 3 meters of the press are affected.
question: What is the root cause, and how do you fix it without moving the devices?
details:
  realistic_solution: The hydraulic press generates a massive electromagnetic pulse when its solenoid valves switch. This EMI couples into the unshielded ribbon cable, corrupting data on the PCIe bus during inference. The dataflow pipeline is mid-computation when the pulse hits. Nsys profiling would confirm PCIe re-transmissions. Shielding the cables resolves the issue.
  common_mistake: |
    **The Pitfall:** Blaming physical vibration for corrupting inference outputs.
    **The Rationale:** Candidates associate the heavy hydraulic press with shaking, assuming it causes camera motion blur.
    **The Consequence:** Teams waste time fixing physical mounts instead of addressing the actual data corruption on the PCIe bus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EMI pulse duration: ~50ms.
       - PCIe Gen 2 x1 transfer rate: 5 GT/s.
       - 8b/10b encoding effective rate: 5 GT/s * (8/10) = 4 Gbps = 500 MB/s.
    2. **Calculations:**
       - Data transferred during pulse: 500 MB/s * 0.05s = 25 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 25 MB of data is corrupted, easily ruining an entire inference pass.**
