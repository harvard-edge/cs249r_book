title: 'The Factory Floor EMI Ghost'
scenario: 'Your defect detection system uses 200 Hailo-8 modules on RPi CM4 boards along a steel stamping line. Every 12 seconds, when the 500-ton hydraulic press fires, 15–20% of devices report corrupted inference outputs — bounding boxes appear at random coordinates with nonsensical confidence values. Between press cycles, inference is perfect. The model and firmware are identical across all devices, but only devices within 3 meters of the press are affected.'
question: 'What''s the root cause, and how do you fix it without moving the devices?'
details:
  realistic_solution: 'The hydraulic press generates a massive electromagnetic pulse when its solenoid valves switch 500A of current. This EMI couples into the unshielded ribbon cable between the RPi CM4 and the Hailo-8 M.2 module, corrupting data on the PCIe bus during inference. The Hailo-8''s dataflow pipeline is mid-computation when the pulse hits — corrupted intermediate activations produce garbage outputs.'
  common_mistake: |
    **The Pitfall:** Blaming physical vibration for corrupting inference outputs.
    **The Rationale:** Candidates associate the heavy hydraulic press with shaking, assuming it causes camera motion blur.
    **The Consequence:** Teams waste time fixing physical mounts instead of addressing the actual data corruption on the PCIe bus.
  napkin_math: |
    - EMI pulse duration: ~50ms.
    - PCIe Gen 2 x1 transfer rate: 5 GT/s.
    - With 8b/10b encoding, effective rate: 500 MB/s.
    - Data transferred during pulse: 500 MB/s * 0.05s = **25 MB**.
    - This is easily enough data to corrupt an entire inference pass.
