title: The Factory Floor EMI Ghost
scenario: Your defect detection system uses 200 Hailo-8 modules on RPi CM4 boards along a steel stamping
  line. Every 12 seconds, when the 500-ton hydraulic press fires, 15–20% of devices report corrupted inference
  outputs — bounding boxes appear at random coordinates with nonsensical confidence values. Between press
  cycles, inference is perfect. The model and firmware are identical across all devices, but only devices
  within 3 meters of the press are affected. What's the root cause, and how do you fix it without moving
  the devices?
details:
  realistic_solution: The hydraulic press generates a massive electromagnetic pulse when its solenoid
    valves switch 500A of current. This EMI couples into the unshielded ribbon cable between the RPi CM4
    and the Hailo-8 M.2 module, corrupting data on the PCIe bus during inference. The Hailo-8's dataflow
    pipeline is mid-computation when the pulse hits — corrupted intermediate activations produce garbage
    outputs.
  common_mistake: '"The vibration from the press is shaking the camera, causing motion blur." Vibration
    would degrade accuracy gradually, not produce random bounding boxes with impossible coordinates. This
    is a data corruption pattern, not an image quality pattern.'
  napkin_math: 'EMI pulse duration: ~50ms. PCIe Gen 2 data rate: 5 GT/s. Data transferred during pulse:
    5 × 10⁹ × 0.05s / 8 = 31.25 MB — easily enough to corrupt an entire inference pass. Shielding cost:
    (8 cable + 15 enclosure) × 200 devices = 4,600. Downtime cost of 40 corrupted devices × 1 hour diagnosis
    × 200/hr = $8,000 per incident. EMI events: ~5,000/day (press fires every 12s for 16-hour shifts).
    Without fix: ~750 corrupted inferences/day across affected devices. With CRC check + timing avoidance:
    0 corrupted outputs reach the decision pipeline.'
