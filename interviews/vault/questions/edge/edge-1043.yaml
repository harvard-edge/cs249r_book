title: 'Fault Tolerance: Evaluate Redundancy Strategies for Mission-Critical Edge
  Inference'
scenario: 'You are deploying vision-based quality inspection on Jetson Orin (32GB
  LPDDR5, 275 TOPS INT8, 60W) for a semiconductor fab. The line must achieve 99.99%
  uptime (< 52 minutes downtime/year). Compare: (A) single Jetson Orin with hot standby,
  (B) dual Jetson Orin active-active with voting, (C) Jetson Orin + cloud failover.
  Evaluate cost, latency, and uptime.'
question: Which redundancy option should the semiconductor fab choose to meet 99.99%
  uptime, and how do cost, latency, and uptime compare?
details:
  realistic_solution: 'MTBF_single_Orin ≈ 50,000 hours. A single node has an annual downtime of (8760 / 50K) * 8h repair = 1.4 hours, missing the 99.99% (52 min) budget. (A) Hot standby: Failover takes 10 seconds. It meets the overall uptime budget but causes 10-second interruptions, dropping critical frames. (B) Active-active: MTBF_system = MTBF²/(2 × repair_time) — extremely high, with zero failover time. (C) Cloud failover: Unacceptable 50ms+ latency for real-time inspection.'
  common_mistake: 'Choosing cloud failover without accounting for WAN latency making real-time inspection impossible; or incorrectly calculating the redundant system MTBF.'
  napkin_math: 'Single node downtime: (8760/50K) × 8h = 1.4h (84 mins) > 52 min budget. (A) Hot standby: MTBF_system = 50,000² / (2 × 8h) = 156M hours. Annual dual-failure downtime is ~0. Failover downtime: (8760/50K) × 10s = 1.75s/year. However, each 10s failover drops 300 frames. (B) Active-active: MTBF_system = 156M hours. Zero failover time, zero dropped frames. Cost: 2× Jetson Orin ($4K). (C) Cloud: Round-trip WAN = 50ms. Inspection at 30 fps = 33ms/frame. 50ms latency → misses frames → unacceptable. Winner: (B) active-active.'
