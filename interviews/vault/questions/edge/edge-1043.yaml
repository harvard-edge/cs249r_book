title: 'Fault Tolerance: Evaluate Redundancy Strategies for Mission-Critical Edge
  Inference'
scenario: A semiconductor fab requires 99.99% uptime (< 52 minutes downtime/year) for a vision inspection system running on Jetson Orin. The MTBF for a single Orin is ~50,000 hours, and repair takes 8 hours. The choices are: (A) hot standby (10s failover), (B) active-active with voting, or (C) cloud failover.
question: Which redundancy architecture meets the 99.99% uptime requirement for real-time inspection, and how do they compare?
details:
  realistic_solution: 'MTBF_single_Orin ≈ 50,000 hours. A single node has an annual downtime of (8760 / 50K) * 8h repair = 1.4 hours, missing the 99.99% (52 min) budget. (A) Hot standby: Failover takes 10 seconds. It meets the overall uptime budget but causes 10-second interruptions, dropping critical frames. (B) Active-active: MTBF_system = MTBF²/(2 × repair_time) — extremely high, with zero failover time. (C) Cloud failover: Unacceptable 50ms+ latency for real-time inspection.'
  common_mistake: |
    **The Pitfall:** Choosing cloud failover without accounting for WAN latency.
    **The Rationale:** Cloud is the standard enterprise failover, so engineers apply it to edge real-time systems.
    **The Consequence:** A 50ms WAN round-trip destroys the real-time latency budget (33ms at 30fps), causing frames to be dropped and the inspection line to halt.
  napkin_math: |
    1. **Single Node**: (8760 / 50,000) * 8h = 1.4h downtime/yr. (Fails 52 min budget).
    2. **Hot Standby (A)**: MTBF = 50k^2 / (2 * 8h) = 156M hours. Uptime passes, but 10s failovers drop 300 frames.
    3. **Active-Active (B)**: Zero failover time. Zero dropped frames. Meets budget perfectly.
    4. **Cloud Failover (C)**: 50ms latency > 33ms frame budget. Real-time impossible.
    5. **Conclusion**: **Option B (Active-Active)** is the only viable choice for zero-downtime, hard real-time requirements.
