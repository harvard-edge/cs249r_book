title: Hailo-8 Edge Latency Bottleneck for Object Detection
scenario: You're deploying a real-time object detection model on an embedded system powered by a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The system must achieve a minimum of 30 FPS, but end-to-end latency is sporadically exceeding the target.
question: How would you identify whether compute, memory, or I/O is causing dropped frames on the Hailo-8 at 30 FPS, and what first mitigations would you try?
details:
  realistic_solution: A realistic solution involves starting with end-to-end profiling. Utilize Hailo-8's built-in profiling capabilities (if available, e.g., using `hailort` SDK tools for layer-wise latencies and utilization) alongside system-level profilers (e.g., `perf`, `strace`, `valgrind` for memory, or custom timing points in your code). Look for where time is spent outside the accelerator, identify I/O stalls, and analyze memory access patterns. If compute-bound, consider quantization-aware training, model pruning, or architectural changes. If I/O bound, optimize data pipelines, use zero-copy techniques, or parallelize data loading. If memory bound, optimize buffer usage and data structures. For napkin math, a simple approach is to measure each major stage (capture, pre-process, infer, post-process, display) and determine which stage consumes the largest fraction of the per-frame budget (1000ms / 30 FPS ≈ 33.3ms per frame).
  common_mistake: |
    **The Pitfall:** Immediately assuming the model is too computationally heavy and attempting to prune or shrink it.
    **The Rationale:** Candidates default to ML-centric solutions rather than system-level profiling.
    **The Consequence:** Wasted optimization efforts that degrade accuracy without actually fixing the data-ingress bottleneck.
  napkin_math: |
    - Target frame time: 1000ms / 30 FPS = 33.3ms.
    - Observed frame time: 50ms (16.7ms overhead).
    - Theoretical inference time: 20 GOPS model / 26,000 GOPS/s = ~0.77ms.
    - Remaining overhead: 50ms - 0.77ms = 49.23ms.
    **The massive 49ms gap between theoretical compute and observed latency guarantees an I/O or memory stall.**
