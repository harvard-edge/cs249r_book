title: The Depthwise Separable Dividend (edge-0356)
scenario: You are optimizing a CNN-based perception model for an autonomous vehicle's edge compute module. A key layer is a standard 3x3 convolution with 256 input channels and 512 output channels. To meet the latency budget, you are considering replacing this layer with a 3x3 depthwise separable convolution.
question: How does a 3x3 depthwise separable convolution change the layer, and what parameter reduction factor do you get for 256 input to 512 output channels?
details:
  realistic_solution: Decompose the standard spatial and channel processing into an isolated spatial depthwise operation (one filter per input channel) strictly followed by a 1x1 pointwise convolution to combine the channels. This factorization radically compresses the parameter surface area and vastly improves Arithmetic Intensity, solving compute bounds on edge SoCs.
  common_mistake: |
    **The Pitfall:** Calculating parameter reduction while completely ignoring the 1x1 pointwise step.
    **The Rationale:** Engineers correctly grasp the spatial separation but forget that cross-channel mixing via the 1x1 convolution actually dominates the final parameter footprint.
    **The Consequence:** Formulating massively over-optimistic performance projections that fail disastrously during actual hardware deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Spatial Kernel: 3x3
       - Input Channels: 256
       - Output Channels: 512
    2. **Calculations:**
       - Standard Conv Parameters: 3 * 3 * 256 * 512 = 1,179,648
       - Depthwise Step = 3 * 3 * 256 = 2,304
       - Pointwise Step = 1 * 1 * 256 * 512 = 131,072
       - Total Separable Parameters = 2,304 + 131,072 = 133,376
       - Reduction Ratio = 1,179,648 / 133,376 = 8.84x
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound. The architecture yields an ~9x reduction in total parameter count.**
  options:
  - ~2x reduction. This comes from the ratio of output to input channels (512/256).
  - ~512x reduction. The depthwise step is tiny, so you save by the number of output filters.
  - ~9x reduction. The parameter savings come from factorizing the standard convolution into a spatial depthwise step and a cross-channel pointwise step.
  - ~3x reduction. The reduction is proportional to the kernel dimension.
  correct_index: 2
