title: The Bottleneck Identity
scenario: An edge GPU, the Jetson AGX Orin, is executing a computer vision pipeline. One of the key operations is an element-wise activation function (like ReLU) applied to a large feature map. This operation reads every value in the feature map from memory, performs a single floating-point comparison, and writes the result back.
question: Is this element-wise operation typically compute-bound or memory-bound?
details:
  realistic_solution: The operation is memory-bound. The arithmetic intensity—the ratio of computations (Ops) to memory accesses (Bytes)—is very low. For an element-wise operation, the ratio is roughly 1 Op / Byte. The processor can perform calculations far faster than the memory system can supply the data, so the execution speed is limited by memory bandwidth, not computational throughput.
  common_mistake: |
    **The Pitfall:** Assuming all neural network operations are compute-bound because deep learning is generally considered "computationally expensive".
    **The Rationale:** Candidates fail to break down the specific arithmetic intensity of individual layer types like element-wise activations.
    **The Consequence:** Optimization efforts are misdirected at vector math instructions rather than attempting to fuse the activation layer to prevent the costly memory round-trip entirely.
  napkin_math: |
    1. Identify Jetson AGX Orin Ridge Point: ~1342 Ops/Byte.
    2. Calculate operation footprint: Read 1 byte (or 2 for FP16), do 1 operation (compare), write 1 byte.
    3. Calculate Arithmetic Intensity (AI): 1 Op / 2 Bytes (read+write) = 0.5 Ops/Byte.
    4. Compare AI to Ridge Point: 0.5 Ops/Byte << 1342 Ops/Byte.
    **Because 0.5 Ops/Byte is far below the 1342 Ops/Byte hardware limit, this element-wise operation is heavily memory-bound.**
  options:
  - Neither, it's bound by the PCIe bus.
  - Compute-bound
  - Memory-bound
  - It is always compute-bound on a GPU.
  correct_index: 2
