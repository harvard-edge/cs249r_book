title: The Bottleneck Identity
scenario: An edge GPU, the Jetson AGX Orin, is executing a computer vision pipeline. One of the key operations
  is an element-wise activation function (like ReLU) applied to a large feature map. This operation reads
  every value in the feature map from memory, performs a single floating-point comparison, and writes
  the result back. Is this operation typically compute-bound or memory-bound?
question: "Is this operation typically compute-bound or memory-bound?"
details:
  realistic_solution: The operation is memory-bound. The arithmetic intensity—the ratio of computations
    (Ops) to memory accesses (Bytes)—is very low. For an element-wise operation, the ratio is roughly
    1 Op / Byte. The processor can perform calculations far faster than the memory system can supply the
    data, so the execution speed is limited by memory bandwidth, not computational throughput.
  common_mistake: A common misconception is that all neural network operations are compute-bound because
    'deep learning is computationally expensive'. However, many common operations, especially element-wise
    ones, perform very few calculations for each byte of data they touch, meaning the processor spends
    most of its time waiting for data from memory.
  napkin_math: The Jetson AGX Orin has a roofline 'ridge point' around 1,342 Ops/Byte. An element-wise
    ReLU requires reading 1 byte (or 2 for FP16), doing 1 op (compare), and writing back. Arithmetic intensity
    is ~0.25 to 0.5 Ops/Byte. Since 0.5 << 1342, this operation is heavily memory-bound, not compute-bound.
  options:
  - Neither, it's bound by the PCIe bus.
  - Compute-bound
  - Memory-bound
  - It is always compute-bound on a GPU.
  correct_index: 2
