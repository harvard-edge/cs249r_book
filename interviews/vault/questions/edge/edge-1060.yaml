title: 'Kernel Fusion: Optimize Inference Kernel for Depthwise Separable Convolution'
scenario: Your MobileNetV3 deployment on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) spends 35% of inference time in DWConv operations. Profiling shows DWConv arithmetic intensity = 2 OPS/byte, well below the ridge point of 4 OPS/byte.
question: With DWConv taking 35% of time at 2 OPS/byte versus a 4 OPS/byte ridge point, what is the bottleneck and how would you optimize it?
details:
  realistic_solution: |
    DWConv is memory-bound by design (1 filter per channel, no weight reuse across channels). Fix: (1) Increase batch size to improve arithmetic intensity. (2) Fuse with adjacent ops. (3) Accept that DWConv efficiency is fundamentally limited and use different architecture if power-critical.
  common_mistake: |
    **The Pitfall:** Trying to optimize DWConv compute operations.
    **The Rationale:** Not recognizing that DWConv has inherently low arithmetic intensity due to a lack of weight reuse across channels.
    **The Consequence:** Wasting time on compute optimizations when the operation is fundamentally memory-bound, yielding zero performance improvement.
  napkin_math: |
    - **DWConv Compute:** 3x3 kernel, Input HxWxC. FLOPs = 9 * H * W * C.
    - **DWConv Bytes:** 9C (weights) + H*W*C (input) + H*W*C (output) = 9C + 2HWC.
    - **Arithmetic Intensity (AI):** 9HWC / (9C + 2HWC) ≈ 4.5 for large spatial dims.
    - **Profiled Issue:** Profiled AI = 2. This suggests small spatial dimensions where weight loading (9C) dominates.
    - **Example (3x3 feature map, C=96):** FLOPs = 7776. Bytes = 2592. AI = 3.0.
    - **Optimization:** Increasing batch size to 4 amortizes weight loads. AI improves closer to the 4 OPS/byte ridge point, halving execution time.
