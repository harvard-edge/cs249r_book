title: Pruning Tradeoffs for Dataflow Edge Accelerators
scenario: You are deploying a 4-camera surround-view object detection system on a single Hailo-8 accelerator. The system must process 120 total frames per second (30 FPS per camera). The Hailo-8 provides 26 TOPS INT8 compute within a 2.5W envelope, but has no local DRAM, relying on continuous data streaming from host memory. To fit within the PCIe bandwidth and thermal limits, you must aggressively prune the base model.
question: For the 4-camera Hailo-8 detector, would you use unstructured pruning or structured channel pruning to fit PCIe and 2.5W limits?
details:
  realistic_solution: Exclusively use structured pruning (such as channel or filter pruning). Structured pruning physically reduces the tensor dimensions, shrinking the computational footprint and proportionally reducing the raw bytes that must be streamed from host memory. This aligns perfectly with the dataflow spatial array, lowering host-to-device bandwidth contention.
  common_mistake: |
    **The Pitfall:** Assuming unstructured pruning yields proportional latency/bandwidth improvements.
    **The Rationale:** Candidates forget that dataflow accelerators lack specialized sparse-index decoding hardware.
    **The Consequence:** Unstructured sparse tensors are padded, streamed, and computed as dense matrices, providing exactly zero performance or memory bandwidth benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base compute: 24 TOPS at 120 FPS.
    - Base bandwidth: 1.8 GB/s.
    - Dataflow accelerators treat unstructured sparsity as dense.

    **Calculations:**
    - 80% unstructured sparsity: Bandwidth = 1.8 GB/s, Compute = 24 TOPS.
    - 50% structured channel pruning: Compute drops 4x to 6 TOPS.
    - Memory footprint scales down 2x.
    - Bandwidth drops to 900 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 900 MB/s (Memory-Bandwidth Bound)**. Structured pruning halves the streaming bandwidth to 900 MB/s, fitting constraints.
