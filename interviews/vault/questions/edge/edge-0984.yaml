title: Edge LLM KV Cache Eviction
scenario: A local LLM running on an Apple A17 Pro Neural Engine allocates 2GB for its KV cache. A background task creates long summarization prefixes, while active user chat creates brief prompts. The cache frequently hits the 2GB limit.
question: Apply a token eviction strategy to manage the KV cache capacity, ensuring the chat interface remains responsive without incurring massive prefill stalls.
visual:
  kind: svg
  path: edge-0984.svg
  alt: A bar chart illustrating a KV cache where the initial system prompt and recent context are retained, while middle tokens are marked as evicted.
  caption: Sink-aware KV Cache Eviction Layout.
details:
  realistic_solution: 'Applying standard LRU or FIFO eviction would drop the oldest tokens (the system prompt and initial attention sinks), destroying model generation quality and forcing full prefill recomputations. The correct approach is to apply a Heavy-Hitter or Sink-aware eviction policy (like StreamingLLM), which permanently pins the first few initial tokens (attention sinks) and evicts middle tokens from the summarization prefix, retaining the most recent chat context. This maintains responsiveness and generation stability.'
  common_mistake: |
    **The Pitfall:** Recommending a blind OS-level LRU eviction strategy.
    **The Rationale:** Candidates intuitively apply traditional software caching concepts directly to LLM context buffers.
    **The Consequence:** The system prompt and attention sinks are evicted, completely ruining the model's attention distribution and leading to immediate conversational collapse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache Capacity: 2 GB (2,147,483,648 bytes).
       - Precision: FP16 (2 bytes per parameter).
       - Model Architecture: 32 layers, 32 heads, 128 dimension per head.
    2. **Calculations:**
       - Token Size: 2 (K & V) * 2 bytes * 32 layers * 32 heads * 128 dim = 524,288 bytes per token.
       - Max Tokens: 2,147,483,648 / 524,288 = 4,096 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Capacity-Bound.** The system can store exactly 4,096 tokens in the 2GB KV cache, necessitating a Sink-aware eviction policy.
