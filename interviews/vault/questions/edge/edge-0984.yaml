title: Edge LLM KV Cache Eviction
scenario: A local LLM running on an Apple A17 Pro Neural Engine allocates 2GB for
  its KV cache. A background task creates long summarization prefixes, while active
  user chat creates brief prompts. The cache frequently hits the 2GB limit.
question: Apply a token eviction strategy to manage the KV cache capacity, ensuring
  the chat interface remains responsive without incurring massive prefill stalls.
visual:
  kind: svg
  path: edge-0984.svg
  alt: A bar chart illustrating a KV cache where the initial system prompt and recent
    context are retained, while middle tokens are marked as evicted.
  caption: Sink-aware KV Cache Eviction Layout.
details:
  realistic_solution: Applying standard LRU or FIFO eviction would drop the oldest
    tokens (the system prompt and initial attention sinks), destroying model generation
    quality and forcing full prefill recomputations. The correct approach is to apply
    a Heavy-Hitter or Sink-aware eviction policy (like StreamingLLM), which permanently
    pins the first few initial tokens (attention sinks) and evicts middle tokens from
    the summarization prefix, retaining the most recent chat context. This maintains
    responsiveness and generation stability.
  common_mistake: Recommending OS-level LRU eviction, which blindly evicts the system
    prompt and ruins the attention distribution.
  napkin_math: 2GB (2048 MB) / (2 (K,V) * 2 bytes * 32 layers * 32 heads * 128 dim) = 2,147,483,648 / 524,288 = 4096 tokens.
