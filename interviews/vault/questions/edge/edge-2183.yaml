title: Priority Preemption for Real-Time Edge Inference
scenario: "Your Jetson Orin runs two models concurrently: a safety-critical pedestrian detector (must complete in 15ms) and a comfort feature (lane marking detection, 50ms budget). Both share the GPU. Under load, the pedestrian detector's P99 spikes to 35ms because it waits for the lane model's CUDA kernels."
question: How would you prevent the lane model from pushing the pedestrian detector past 15ms while staying within the 60W envelope?
details:
  realistic_solution: NVIDIA GPUs utilize cooperative, rather than fully preemptive, scheduling; long-running kernels block high-priority work. To resolve this, offload the non-critical lane model completely to the Jetson Orin's Deep Learning Accelerator (DLA). The DLA provides physically separate silicon compute paths, ensuring zero interference with the safety-critical pedestrian detector on the Ampere GPU and guaranteeing the 15ms latency SLA.
  common_mistake: |
    **The Pitfall:** Assuming standard CUDA supports true preemptive scheduling for individual kernels.
    **The Rationale:** Candidates assume GPUs context switch as freely as CPUs do with threads.
    **The Consequence:** NVIDIA GPUs use cooperative preemption; a long-running kernel will block high-priority work for milliseconds until it reaches a preemption point.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pedestrian deadline: 15 ms.
       - Shared GPU total latency: 35 ms.
       - Available accelerators: GPU, DLA (Deep Learning Accelerator).
       - Power limit: 60W.
    2. **Calculations:**
       - DLA Offload (lane model): 25 ms execution time on DLA.
       - GPU execution (pedestrian): 12 ms P99.
       - Power draw: 35W (GPU) + 10W (DLA) = 45W.
    3. **Conclusion & Interpretation:**
       - **Result: 12 ms P99 at 45W.** Offloading the non-critical model to the distinct DLA silicon path perfectly resolves GPU contention while remaining safely within the thermal envelope.
