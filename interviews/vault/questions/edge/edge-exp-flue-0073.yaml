title: Hailo-8 Dataflow Batching Latency
scenario: We are deploying a multi-camera pedestrian tracking system on a Hailo-8 dataflow accelerator
  at a smart intersection. The Hailo-8 provides 26 TOPS (INT8) at 2.5W, but lacks local DRAM, meaning
  all I/O streams directly from host memory over PCIe. The model requires 13 GOPS per inference. If we
  synchronize 4 cameras and send a static batch of 4 frames to the accelerator, calculate the theoretical
  minimum compute latency for the batch assuming 100% MAC utilization.
question: "If 4 synchronized cameras are statically batched on the Hailo-8, what is the theoretical minimum compute latency?"
details:
  realistic_solution: Because the Hailo-8 relies on a dataflow architecture, neural network weights are
    pre-compiled and distributed across on-chip memory. Activations stream continuously from the host.
    Therefore, static batching does not save weight-loading memory bandwidth. The system should ideally
    process frames with a batch size of 1 as they arrive to minimize latency. If a batch of 4 is forced,
    the latency is simply the total operations divided by the total compute throughput.
  common_mistake: Candidates often assume batching will dramatically increase throughput by amortizing
    memory bandwidth costs for weight loading, exactly as it does on traditional GPUs. They fail to realize
    that on a spatial dataflow architecture without local DRAM, weights are pinned to the compute fabric,
    making batch size > 1 strictly a latency penalty without the usual throughput gains.
  napkin_math: '1. Hailo-8 compute capacity = 26 TOPS = 26,000 GOPS.

    2. Total compute required for the batch = 4 frames * 13 GOPS/frame = 52 GOPS.

    3. Theoretical minimum compute latency = Total GOPS / Compute Capacity = 52 GOPS / 26,000 GOPS/s.

    4. 52 / 26,000 = 0.002 seconds = 2.0 milliseconds.'
