title: The Clock Drift Time-Series Corruption
scenario: Your predictive maintenance system uses 300 Hailo-8L modules on RPi CM4 boards to monitor industrial
  motors. Each device samples vibration data at 4 kHz and runs a 1D-CNN anomaly detection model on 1-second
  windows (4,000 samples). After 6 months, devices that were never rebooted show a gradual increase in
  false alarms — 2% per month. Devices that reboot weekly show no drift. The model and firmware are identical.
  What's different about the long-running devices?
details:
  realistic_solution: 'The RPi CM4''s system clock is drifting. The Broadcom BCM2711 uses a crystal oscillator
    rated at ±20 ppm (parts per million). Over 6 months of continuous operation without NTP synchronization
    (the devices are on an isolated industrial network with no internet): 20 ppm × 180 days × 86,400 s/day
    = **311 seconds of drift** — over 5 minutes.'
  common_mistake: '"Memory leak — the long-running devices are running out of RAM." Memory usage is stable
    at 450 MB / 1 GB. The RPi CM4 doesn''t have a memory leak.'
  napkin_math: 'Clock drift: 20 ppm = 1.728 seconds/day. After 180 days: 311 seconds. Motor frequency:
    30 Hz. Phase drift per day: 30 Hz × 1.728s = 51.84 full rotations — the phase within a window shifts
    by 0.84 × 360° = 302° per day. After ~1.2 days, the phase has rotated through all 360°. The false
    alarm rate increases as the model encounters phase angles it wasn''t trained on. The 2%/month increase
    matches the gradual exposure to unfamiliar phase alignments. GPS module cost: $15. PTP switch cost:
    $200 for the network. ADC-based windowing: $0 (software fix). The software fix is the clear winner.'
