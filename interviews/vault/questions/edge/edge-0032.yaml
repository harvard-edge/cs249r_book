title: The Clock Drift Time-Series Corruption
scenario: Your predictive maintenance system uses 300 Hailo-8L modules on RPi CM4 boards to monitor industrial motors. Each device samples vibration data at 4 kHz and runs a 1D-CNN anomaly detection model on 1-second windows (4,000 samples). After 6 months, devices that were never rebooted show a gradual increase in false alarms — 2% per month. Devices that reboot weekly show no drift. The model and firmware are identical.
question: What is different about the long-running devices that causes a gradual increase in false alarms?
details:
  realistic_solution: The RPi CM4's system clock is drifting. The Broadcom BCM2711 uses a crystal oscillator rated at ±20 ppm. Over 6 months of continuous operation without NTP synchronization, the phase within a window shifts dramatically, exposing the model to phase angles it wasn't trained on.
  common_mistake: |
    **The Pitfall:** Blaming the issue on a memory leak.
    **The Rationale:** Engineers default to standard software aging issues (memory leaks) when seeing long-running performance degradation.
    **The Consequence:** Chasing phantom memory bugs instead of addressing the fundamental clock drift issue via NTP synchronization or a software phase-alignment fix.
  napkin_math: |
    - **Crystal oscillator drift:** Rated at ±20 ppm (parts per million).
    - **Total drift over 6 months:** 20 ppm * 180 days * 86,400 s/day = 311 seconds of drift (>5 minutes).
    - **Phase drift per day:** Motor frequency is 30 Hz. 30 Hz * 1.728s/day = 51.84 full rotations. The phase shifts by 0.84 * 360° = 302° per day.
    - **Final result:** **The unsynchronized clock drift shifts the phase alignment within the 1-second window, exposing the model to unfamiliar data distributions.**
