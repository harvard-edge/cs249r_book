title: Rolling Checkpoints for Drone Tracking
scenario: 'A Jetson AGX Orin deployed in a drone experiences intermittent 1-second power drops. Re-initializing the object tracking state from scratch takes 5 seconds, causing missed frames.'
question: 'Explain how writing a compact rolling checkpoint to NVMe limits the Recovery Time Objective (RTO).'
visual:
  kind: svg
  path: edge-2297.svg
  alt: Timeline comparing a long fresh initialization vs a short checkpoint recovery.
  caption: RTO Reduction via Checkpoint
details:
  realistic_solution: 'By periodically flushing the tracker''s state (a few KBs) to NVMe storage, the system avoids recalculating state from raw pixels. After a power drop, the Orin reloads the state instantly, bounding the RTO to the OS boot time plus a negligible read.'
  common_mistake: |
    **The Pitfall:** Confusing RTO with RPO.
    **The Rationale:** Candidates mistakenly try to fix the lost 1-second frames (RPO) instead of the 5-second recovery latency (RTO).
    **The Consequence:** Proposing solutions that try to recover lost data rather than fixing the initialization delay.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline RTO is OS boot + 5 seconds state initialization.
    - Checkpoint size is a few KB.
    - NVMe read speed is extremely high.

    **Calculations:**
    - NVMe read time for a few KB is ~0ms.

    **Conclusion & Interpretation:**
    - **Result: ~0ms read time (I/O-Bound)**. Rolling checkpoints bound the new RTO strictly to OS boot time.
