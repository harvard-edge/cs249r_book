title: Rolling Checkpoints for Drone Tracking
scenario: A Jetson AGX Orin deployed in a drone experiences intermittent 1-second
  power drops. Re-initializing the object tracking state from scratch takes 5 seconds,
  causing missed frames.
question: Explain how writing a compact rolling checkpoint to NVMe limits the Recovery
  Time Objective (RTO).
visual:
  kind: svg
  path: edge-2297.svg
  alt: Timeline comparing a long fresh initialization vs a short checkpoint recovery.
  caption: RTO Reduction via Checkpoint
details:
  realistic_solution: By periodically flushing the tracker's bounding box coordinates
    and Kalman filter matrices (a few KBs) to non-volatile NVMe storage, the system
    avoids recalculating state from raw pixels. After a power drop, the Orin reloads
    the tiny state instantly upon boot, bounding the RTO strictly to the OS boot time
    plus a negligible NVMe read.
  common_mistake: Confusing RTO (Recovery Time Objective) with RPO (Recovery Point
    Objective), mistakenly trying to fix the lost 1-second frames instead of fixing
    the 5-second recovery latency.
  napkin_math: New RTO = Boot time + NVMe read time
