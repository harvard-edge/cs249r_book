title: Randomized Smoothing on Edge TPU
scenario: You are deploying an intrusion detection camera using a Google Coral Edge TPU (4 TOPS INT8 compute,
  2W power consumption). To defend against physical adversarial evasion attacks (like adversarial patches),
  you implement a randomized smoothing defense. This requires running N Monte Carlo inference passes of
  a quantized INT8 model, which takes 2 GOPS per pass, with Gaussian noise added to the input. Assuming
  100% TPU utilization and that the CPU noise injection overhead is negligible, calculate the maximum
  number of smoothing passes (N) you can perform per frame to maintain exactly 20 FPS. Additionally, calculate
  the total energy consumed per smoothed frame.
question: "At exactly 20 FPS, what maximum randomized smoothing pass count N can the Coral run, and what energy is consumed per smoothed frame?"
details:
  realistic_solution: To find the maximum passes N, first determine the total GOPS available per frame
    by dividing the TPU's continuous throughput by the target FPS. Then, divide the per-frame GOPS budget
    by the per-pass compute cost. For energy, divide the continuous power draw (2 Joules/second) by the
    frame rate to get the energy per frame.
  common_mistake: Candidates often fail to correctly convert TOPS to GOPS (1 TOPS = 1000 GOPS), or they
    forget that the 2W power consumption is a continuous rate (Joules per second) and miscalculate the
    per-frame energy by multiplying power by total operations instead of dividing by FPS.
  napkin_math: '1. Coral TPU Compute Capacity: 4 TOPS = 4000 GOPS.

    2. Compute budget per frame at 20 FPS: 4000 GOPS / 20 FPS = 200 GOPS/frame.

    3. Maximum passes (N): 200 GOPS / 2 GOPS/pass = 100 passes per frame.

    4. Energy per frame: Power (2W = 2 Joules/sec) / 20 FPS = 0.1 Joules (100 mJ) per smoothed frame.'
