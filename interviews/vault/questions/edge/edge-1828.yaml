title: Hybrid Compute Partitioning for Coral Edge TPU
scenario: You are designing an edge vision system for a smart camera with a strict 5W total power budget. The pipeline requires a heavy object detection CNN (100 GOPS per frame) running at 30 FPS, followed by a custom multi-object tracker utilizing dynamic control flow. You must design a system that leverages a Google Coral Edge TPU (4 TOPS INT8, 2W, USB/PCIe form factor) alongside a low-power host CPU.
question: How would you partition the CNN detector and dynamic tracker between the Coral Edge TPU and host CPU under a 5W budget?
details:
  realistic_solution: The optimal design fully quantizes the CNN backbone and detection heads to INT8, compiling them into a single subgraph executed entirely on the 2W Google Coral Edge TPU. The raw bounding box proposals (a small tensor) are then transferred once over the USB/PCIe bus to the host CPU. The CPU handles the branch-heavy custom tracker, cleanly separating it from the INT8-constrained TPU accelerator.
  common_mistake: |
    **The Pitfall:** Forcing the entire pipeline onto the Edge TPU.
    **The Rationale:** Candidates believe maximizing accelerator usage is always optimal.
    **The Consequence:** Unsupported tracker ops cause the compiler to partition the model, creating frequent, latency-killing ping-pong memory transfers between the TPU and CPU.
  napkin_math: |
    1. **Compute Demand:** CNN requires 100 GOPS/frame * 30 FPS = 3000 GOPS = 3 TOPS.
    2. **Accelerator Capacity:** Coral Edge TPU provides 4 TOPS at 2W, handling this heavy dense compute at 75% utilization.
    3. **Fragmented Penalty:** If an unsupported operator split the model causing 5 intermediate 2MB tensor transfers per frame over USB, bandwidth would be 2MB * 5 * 30 = 300 MB/s.
    4. **Partitioned Benefit:** Transferring just the final 10KB proposal tensor once takes 10KB * 1 * 30 FPS = **300 KB/s**, completely eliminating the I/O bottleneck.
