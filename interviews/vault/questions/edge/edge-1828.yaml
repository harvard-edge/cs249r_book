title: Hybrid Compute Partitioning for Coral Edge TPU
scenario: You are designing an edge vision system for a smart camera with a strict 5W total power budget. The pipeline requires a heavy object detection CNN (100 GOPS per frame) running at 30 FPS, followed by a custom multi-object tracker utilizing dynamic control flow. You must design a system that leverages a Google Coral Edge TPU alongside a low-power host CPU.
question: How would you partition the CNN detector and dynamic tracker between the Coral Edge TPU and host CPU under a 5W budget?
details:
  realistic_solution: Compile the CNN backbone and detection heads as a single quantized INT8 subgraph executed entirely on the Edge TPU. The host CPU must handle the branch-heavy dynamic multi-object tracker. This cleanly partitions the pipeline, ensuring only the raw bounding box proposals (a tiny tensor) cross the PCIe/USB bus, avoiding catastrophic memory ping-ponging.
  common_mistake: |
    **The Pitfall:** Forcing the entire pipeline onto the Edge TPU.
    **The Rationale:** Candidates believe maximizing accelerator usage is always optimal.
    **The Consequence:** Unsupported tracker ops cause the compiler to partition the model, creating frequent, latency-killing ping-pong memory transfers between the TPU and CPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Demand: 100 GOPS/frame * 30 FPS = 3000 GOPS.
       - Coral Edge TPU throughput: 4 TOPS (4000 GOPS).
       - Transfer penalties: 2 MB intermediate tensor over USB.
    2. **Calculations:**
       - Compute utilization: 3000 GOPS / 4000 GOPS = 75%.
       - Fragmented penalty (5 splits): 2 MB * 5 splits * 30 FPS = 300 MB/s.
       - Partitioned benefit (final proposals only): 10 KB * 1 * 30 FPS = 300 KB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 300 KB/s vs 300 MB/s bus traffic.** An optimized single-subgraph partition avoids PCIe/USB bus saturation and ensures real-time performance within the thermal envelope.
