math_issues:
- 21 GB is incorrectly calculated as 21,474,836,480 bytes (which is exactly 20 GiB). The correct value
  for 21 GiB is 22,548,578,304 bytes, which would lead to a maximum context length of 43,008 tokens (or
  40,054 tokens using 21*10^9 bytes).
