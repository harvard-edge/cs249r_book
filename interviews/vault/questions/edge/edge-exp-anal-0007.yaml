title: Calibration Data Pruning for Edge TPU Quantization
scenario: You are training an object detection model to deploy on a Google Coral Edge TPU (4 TOPS INT8,
  2W). The model achieves 95% mAP in FP32, but after post-training quantization to INT8 using your full
  1M-image training dataset for calibration, the accuracy drops to 60%. A colleague suggests randomly
  sampling 10,000 images for calibration instead. When you do this, accuracy recovers to 85%. Explain
  WHY using a smaller, randomly selected dataset for calibration improved the INT8 quantized model's accuracy
  on the Edge TPU, and what specific data characteristics cause the full dataset to fail during calibration.
question: "Why did using 10,000 random calibration images improve Coral Edge TPU INT8 accuracy versus the full 1M-image dataset?"
details:
  realistic_solution: The full dataset contains extreme outliers (rare anomalies or noisy data) that push
    the min/max activation values far apart. Because the Google Coral Edge TPU requires strict INT8 quantization
    (which only has 256 distinct bins), a wide activation range forces the quantization step size to be
    large, destroying the precision needed for typical activations. Randomly sampling a smaller subset
    acts as implicit data pruning, statistically excluding rare outliers, narrowing the calibration range,
    and providing finer INT8 resolution for the features that matter most.
  common_mistake: Candidates often assume that more data is always better for calibration, failing to
    realize that outliers in a massive dataset can artificially stretch the INT8 quantization range, compressing
    the representational capacity of the vast majority of normal activations.
  napkin_math: INT8 provides 256 representable bins. If the full 1M dataset has an outlier activation
    of 127.5, the step size is 127.5 / 255 = 0.5 per bin. If the pruned 10K dataset excludes outliers
    and has a max activation of 12.75, the step size becomes 12.75 / 255 = 0.05 per bin. This 10x finer
    resolution preserves the subtle feature details required to maintain accuracy on the Coral Edge TPU.
