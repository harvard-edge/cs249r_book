title: The Solar-Powered Edge Budget
scenario: You're designing an edge AI wildlife monitoring station powered by a 20W solar panel and a 100Wh
  battery. The station runs a bird species classifier on a Google Coral (4 TOPS, 2W) with a camera. The
  system must operate 24/7 in a remote forest with 5 hours of usable sunlight per day. Design the power
  budget and determine the maximum inference rate you can sustain.
details:
  realistic_solution: 'Start from the energy budget. Solar input: 20W × 5h × 0.8 (panel efficiency loss
    from angle, clouds, dirt) = 80Wh/day. System consumers: (1) Coral TPU active: 2W, (2) camera module:
    0.5W, (3) Raspberry Pi: 0.1W deep sleep / 5W active, (4) cellular modem (burst uploads): 0.5Wh/day,
    (5) watchdog: 0.5W constant. Active power (camera + Pi + Coral + watchdog): 0.5 + 5 + 2 + 0.5 = 8.0W.
    Idle power (Pi sleep + watchdog): 0.1 + 0.5 = 0.6W. Maximum active hours: solve 8.0 \times t_{active}
    + 0.6 \times (24 - t_{active}) + 0.5 = 80. 7.4 \times t_{active} + 14.9 = 80. t_{active} = 8.8 hours/day.
    At 10 inferences/second during active hours: 8.8h × 3600s × 10 = 316,800 inferences/day. Reserve 20%
    battery for cloudy days: effective active time = 7.04h → 253,440 inferences/day.'
  common_mistake: '"20W panel × 5 hours = 100Wh, which exactly matches the battery — we can run continuously."
    This ignores system overhead, solar conversion losses, and seasonal variation.'
  napkin_math: 'Energy budget:

    Solar: 20W × 5h × 0.8 = 80 Wh/day.


    Power consumers:

    - Coral TPU: 2W active.

    - Camera: 0.5W active.

    - RPi host: 0.1W sleep, 5W active.

    - Cellular modem: 0.5 Wh/day.

    - Watchdog: 0.5W constant.


    Idle power (camera off, RPi sleep, watchdog on):

    RPi deep sleep 0.1W + watchdog 0.5W = 0.6W.


    Active power (camera on, RPi active, Coral on, watchdog on):

    0.5 + 5 + 2 + 0.5 = 8.0W.


    Energy equation:

    8.0 × t_active + 0.6 × (24 − t_active) + 0.5 (modem) = 80 Wh.

    7.4 × t_active + 14.4 + 0.5 = 80.

    7.4 × t_active = 65.1.

    t_active = 8.8 hours/day.


    At 10 inferences/s: 8.8 × 3600 × 10 = 316,800 inferences/day.


    With 20% battery reserve: t_active = 8.8 × 0.8 = 7.04 hours.

    Effective: 7.04 × 3600 × 10 = ~253,440 inferences/day.'
