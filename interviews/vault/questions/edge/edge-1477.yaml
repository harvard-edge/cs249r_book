title: 'Architecting an Object Detection Pipeline on Jetson Orin'
scenario: 'You are tasked with designing an end-to-end real-time autonomous drone vision system deployed on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The system captures 4K video at 60 FPS, runs an object detection model, and sends control signals based on the detections. The strict end-to-end latency budget from frame capture to control signal emission is 30ms.'
question: 'How would you allocate the 30 ms latency budget for 4K60 drone vision on Jetson Orin across preprocessing, inference, postprocessing, and control?'
details:
  realistic_solution: 'A robust design pipelines the workload to hide latency and explicitly bounds each component. Preprocessing (ISP, resizing) should be handled by dedicated hardware blocks (VIC/ISP) taking ~5ms. The main object detection backbone should be quantized to INT8 and offloaded to the DLA to save power and free the Ampere GPU, taking ~10ms for inference. The Ampere GPU can be used for complex postprocessing like NMS, taking ~5ms. The remaining 10ms is budgeted for network/control signaling and buffer transfers. This ensures the 30ms budget is met while optimally utilizing the heterogeneous SoC.'
  common_mistake: |
    **The Pitfall:** Focusing solely on neural network inference time and ignoring the surrounding system pipeline.
    **The Rationale:** Candidates assume inference is the only significant latency and fail to distribute tasks across heterogeneous SoC components.
    **The Consequence:** They overload the Ampere GPU, causing thermal throttling or exceeding the 60W TDP, while completely ignoring the ISP and DLA capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total latency budget = 30 ms (Frame interval at 60 FPS is 16.67 ms).
    - Camera capture & ISP (Hardware) = 5.0 ms.
    - INT8 Inference on DLA (50 GOPS at 30% utilization of 275 TOPS = 0.6 ms compute, budget 10 ms for kernel/overhead) = 10.0 ms.
    - GPU Post-processing (NMS) = 5.0 ms.
    - Control logic & Network Tx = 5.0 ms.

    **Calculations:**
    - Memory copy to DLA/GPU (24 MB 4K frame / 32 GB/s) = 0.75 ms.
    - Total = 5.0 + 0.75 + 10.0 + 5.0 + 5.0 = 25.75 ms.

    **Conclusion & Interpretation:**
    - **Result: 25.75 ms (Compute-Bound)**. Pipelining the workload across the ISP, DLA, and GPU guarantees execution within the 30 ms budget.
