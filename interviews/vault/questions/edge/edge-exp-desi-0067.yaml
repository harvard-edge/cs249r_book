title: Architecting Multi-Tenant Memory-Mapped Inference for Edge
scenario: You are designing an on-premise defect detection system using a Qualcomm Cloud AI 100 accelerator,
  which features 32 GB LPDDR4x memory, 400 TOPS INT8 compute, and a 75W power envelope. The service must
  multiplex between a dozen specialized visual inspection models without incurring cold-start latency
  when switching assembly lines. Architect a shared memory-mapped weight loading strategy that allows
  multiple concurrent inference processes to switch models seamlessly while strictly adhering to the 32
  GB memory limit.
question: "How would you memory-map and share a dozen model weights on Cloud AI 100 so processes can switch lines without cold starts within 32 GB?"
details:
  realistic_solution: A robust design involves a centralized model-server process that memory-maps all
    model weights using `MAP_SHARED` and pins active layers into RAM with `mlock`. Worker processes attach
    to this shared memory region, completely avoiding redundant weight copies and serialization overhead.
    To optimize the 75W power envelope, the system should strictly use INT8 quantized weights to minimize
    memory bandwidth utilization and maximize the accelerator's 400 TOPS INT8 throughput.
  common_mistake: Candidates typically propose naive dynamic weight loading or standard disk-backed OS
    paging, which introduces severe latency spikes and unpredictable cold starts. They often fail to leverage
    shared memory across processes, leading to redundant copies of weights consuming the limited 32 GB
    LPDDR4x RAM.
  napkin_math: Assume 12 models originally requiring 6 GB each in FP16 (72 GB total, exceeding the 32
    GB limit). By quantizing to INT8, each model size halves to 3 GB. The total footprint becomes 12 *
    3 GB = 36 GB. We can mmap all 36 GB, pin the 8 most frequently used models in RAM using mlock (8 *
    3 GB = 24 GB), and leave 8 GB for the OS, input buffers, and intermediate activations.
