title: The Emergency OTA Rollout
scenario: You are an ML systems engineer for an autonomous vehicle company. A critical bug has been discovered
  in the perception model that requires an immediate Over-the-Air (OTA) update for the entire fleet. The
  compressed update package for the new model is 512 MB.
details:
  realistic_solution: The correct approach is to harmonize the units before performing the division. Since
    there are 8 bits in a byte, we must convert the file size from MegaBytes to Megabits to match the
    bandwidth unit.
  common_mistake: The most common mistake is confusing Megabits (Mb) with MegaBytes (MB). Network bandwidth
    is almost always specified in bits per second (e.g., Mbps), while file sizes are given in bytes (e.g.,
    MB). Forgetting to convert units leads to an 8x error in the final calculation, drastically underestimating
    the required time.
  napkin_math: '1. **File Size:** 512 MB | 2. **Bandwidth:** 100 Mbps | 3. **Unit Conversion:** The units
    don''t match (Bytes vs. bits). Convert size to bits: | `512 MB * 8 bits/byte = 4096 Mb` | 4. **Calculate
    Time:** | `Time = Total Data / Rate` | `Time = 4096 Mb / 100 Mbps = 40.96 seconds` | 5. **Sanity Check:**
    The answer is approximately 40 seconds.'
  options:
  - 5.1 seconds
  - 41.0 seconds
  - 328 seconds
  - 0.6 seconds
  correct_index: 1
