title: INT8 Quantization Bias on Coral Edge TPU
scenario: You deploy a pedestrian safety model to a smart intersection camera powered
  by a Google Coral Edge TPU (4 TOPS INT8, 2W). During FP32 validation, the model
  demonstrated perfect demographic parity and equalized odds across all subgroups.
  However, after deployment, you observe a severe drop in recall specifically for
  pedestrians using mobility aids. What hardware-specific compilation requirement
  of this platform is the most likely root cause of this newly introduced disparity,
  and how do you verify it?
question: What hardware-specific compilation requirement of this platform is the most
  likely root cause of this newly introduced disparity, and how do you verify it?
details:
  realistic_solution: The root cause is biased calibration data during INT8 Post-Training
    Quantization (PTQ). Because the Coral Edge TPU requires strict INT8 weights and
    activations, the quantization process uses a small calibration set to determine
    activation ranges. If this set lacks minority examples (like mobility aids), the
    resulting scaling factors clip or compress the specific feature activations needed
    for those groups. The fix is to use a strictly balanced calibration dataset or
    switch to Quantization-Aware Training (QAT).
  common_mistake: Candidates often jump to data drift, suggesting that the real-world
    lighting or camera angles differ from the training set, or they propose retraining
    the model from scratch. They fail to link the symptom to the mandatory INT8 quantization
    step required by the Coral Edge TPU's limited operator support.
  napkin_math: Assume an FP32 activation range for a critical layer is [0, 15.0].
    When mapped to INT8, the step size is 15.0 / 255 = 0.0588. If the subtle visual
    features differentiating a wheelchair only span an activation range of [0.2, 0.8],
    they are compressed into just (0.8 - 0.2) / 0.0588 ≈ 10 discrete integer buckets.
    This 96% loss of representational resolution in the minority feature space destroys
    accuracy for that subgroup on the 4 TOPS accelerator.
