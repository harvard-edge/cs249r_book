title: Diagnosing MobileNetV3 CPU Fallback
scenario: Your team deployed a MobileNetV3-Large model to a Google Coral Edge TPU for real-time video analytics. The Edge TPU provides 4 TOPS at 2W in INT8 via a USB form factor. During profiling, you observe that the inference latency is ~35ms per frame, which is significantly slower than the expected sub-5ms latency, and the host CPU utilization spikes to 80% during inference. The model was fully quantized to INT8.
question: What architectural features of this specific CNN design are causing this severe performance bottleneck on the Coral accelerator?
details:
  realistic_solution: The root cause is the Edge TPU's limited operator support. MobileNetV3 introduces Hardswish activations and Squeeze-and-Excitation (SE) blocks, which are often not fully supported by the Edge TPU compiler in INT8. This forces the compiler to partition the graph, offloading the unsupported operations to the host CPU. The frequent context switching and data transfer across the USB/PCIe bus dominate the latency.
  common_mistake: |
    **The Pitfall:** Blaming INT8 quantization accuracy loss or general USB bandwidth limits for poor performance.
    **The Rationale:** Candidates assume that any "mobile-friendly" architecture will automatically run efficiently on all edge accelerators, without checking specific operator support.
    **The Consequence:** Wasting time tuning USB drivers instead of modifying the model architecture to eliminate unsupported operators.
  napkin_math: |
    - **Ideal TPU Compute Time:** 0.5 GOPS / 4 TOPS = 0.125 ms.
    - **Graph Partitioning Cost:** Unsupported Hardswish/SE layers partition the graph into e.g., 10 CPU subgraphs, incurring 20 memory transfers over USB.
    - **Communication Overhead:** 20 transfers × 1.5 ms = 30 ms.
    - **Final Result:** **0.125 ms (TPU) + 5 ms (CPU compute) + 30 ms (bus transfer) = 35.125 ms total latency, negating the accelerator's benefits.**
