title: Weighted Round-Robin Routing for Heterogeneous Edge Accelerators
scenario: You are deploying a heterogeneous on-premise edge inference gateway. The cluster contains 3
  Qualcomm Cloud AI 100 accelerators (each with 32 GB LPDDR4x, 400 TOPS INT8, 75W) and 2 legacy accelerators
  providing 150 TOPS INT8 each. You need to implement a weighted round-robin request router to distribute
  traffic proportionally based on compute capacity. Calculate the normalized minimal integer weights for
  the load balancer and the total request capacity if each inference takes 0.5 TOPS.
details:
  realistic_solution: The load balancer must distribute traffic strictly according to the INT8 compute
    capacity of each accelerator to avoid saturating the legacy cards. By assigning weights proportional
    to the TOPS provided by each device, the Qualcomm Cloud AI 100 cards handle the majority of the routing
    traffic. This maximizes the efficiency of their 75W power footprint while keeping overall latency
    stable.
  common_mistake: Candidates often assign weights based purely on memory rather than compute capacity,
    or they fail to reduce the weights to their simplest integer form. Additionally, they might miscalculate
    the total request capacity by failing to account for the multiple accelerators.
  napkin_math: 'Qualcomm Cloud AI 100 TOPS = 400, Legacy TOPS = 150. Weight ratio = 400 / 150 = 8/3. Minimal
    integer weights: 8 for each Qualcomm card, 3 for each Legacy card. Total TOPS = (3 * 400) + (2 * 150)
    = 1200 + 300 = 1500 TOPS. Total request capacity = 1500 TOPS / 0.5 TOPS per request = 3000 requests
    per second.'
