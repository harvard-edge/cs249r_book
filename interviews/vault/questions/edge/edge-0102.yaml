title: The Model Cloning Waste
scenario: You are deploying a 4-camera monitoring system on a Jetson Orin. Each camera uses the same YOLOv8-S
  model. Based on the VRAM allocation diagram, why is your system using 16% more memory than it needs
  to?
question: "Based on the VRAM allocation diagram, why is your system using 16% more memory than it needs to?"
details:
  realistic_solution: You have **Redundant Weight Loading**. Since model weights are read-only, a single
    22 MB copy can serve all 4 cameras. Load the weights once and run 4 inference passes with different
    input tensors. More importantly, **batch the 4 camera inputs** into a single call (batch size 4) to
    improve GPU occupancy and amortize kernel launch overhead.
  common_mistake: '"4 cameras need 4 model instances." The cameras need 4 inference passes, but NOT 4
    copies of the weights.'
  napkin_math: Loading the YOLOv8-S model 4 times for 4 cameras duplicates the static network weights.
    YOLOv8-S has ~11M parameters, taking 22 MB in FP16. Four instances use 88 MB of VRAM. Instead, load
    the model once (22 MB) and process the 4 camera streams as a single batched tensor (Batch=4). This
    saves 66 MB of VRAM. More importantly, batching maximizes utilization of the Jetson Orin's 275 TOPS
    hardware.
