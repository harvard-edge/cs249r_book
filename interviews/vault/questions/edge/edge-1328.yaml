title: Mixed-Precision Strategy for On-Premise LLM
scenario: 'You are deploying a 20B parameter autoregressive LLM on a single Qualcomm
  Cloud AI 100 for an on-premise log analysis accelerator. The hardware features 32
  GB of LPDDR4x memory, peak 400 TOPS of INT8 compute, and operates within a strict
  75W power envelope. You must evaluate two precision recipes for the deployment:
  Option A uses strict W8A8 (INT8 weights and activations) across the entire model
  to maximize compute throughput, while Option B uses W8A16 (INT8 weights, FP16 activations)
  to preserve accuracy, particularly in sensitive attention layers. Analyze the precision-accuracy
  tradeoffs and determine the optimal system-level decision.'
question: Should the 20B LLM use W8A8 or W8A16 on a single Cloud AI 100, and how do
  memory bandwidth and accuracy drive the choice?
details:
  realistic_solution: The optimal solution is Option B (W8A16) for the decoding phase,
    potentially paired with W8A8 only during the prefill phase. For a 20B model, FP16
    weights would consume 40 GB, immediately exceeding the 32 GB capacity. Using INT8
    weights reduces the footprint to 20 GB, leaving 12 GB for the KV cache and runtime
    overhead. Because autoregressive decoding loads the entire 20 GB weight matrix
    for every generated token, the system will be severely bottlenecked by the LPDDR4x
    memory bandwidth, leaving the 400 TOPS INT8 compute engines massively underutilized.
    Therefore, forcing W8A8 sacrifices accuracy for a compute speedup that cannot
    be realized during generation.
  common_mistake: Candidates often focus solely on the 400 TOPS INT8 compute advantage,
    assuming Option A (W8A8) is strictly better for end-to-end latency. They fail
    to identify that LLM generation is fundamentally memory-bandwidth bound, meaning
    the loss in accuracy from INT8 activations does not yield proportional performance
    gains during the decoding phase.
  napkin_math: 'Memory Capacity: 20B params at FP16 = 40 GB (OOM on 32 GB hardware).
    20B at INT8 = 20 GB (Fits, 12 GB remaining). Compute vs Memory: Generating 1 token
    requires ~40 Giga-operations. At 400 TOPS INT8, compute time is 40e9 / 400e12
    = 0.1 ms. However, memory I/O requires reading 20 GB per token. Assuming typical
    LPDDR4x bandwidth of ~136 GB/s, memory time is 20 GB / 136 GB/s ≈ 147 ms. Because
    147 ms (memory) >> 0.1 ms (compute), the pipeline is heavily memory-bound, making
    INT8 activations (W8A8) unnecessary for latency improvements during decoding.'
