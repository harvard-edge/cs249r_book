title: Mixed-Precision Strategy for On-Premise LLM
scenario: You are deploying a 20B parameter autoregressive LLM on an edge accelerator with 32 GB of memory, 400 TOPS of INT8 compute, and a 75W power envelope. Option A uses strict W8A8. Option B uses W8A16.
question: Should the 20B LLM use W8A8 or W8A16, and how do memory bandwidth and accuracy drive the choice?
details:
  realistic_solution: The optimal solution is Option B (W8A16) for the decoding phase, potentially paired with W8A8 only during the prefill phase. For a 20B model, FP16 weights would consume 40 GB, immediately exceeding the 32 GB capacity. Using INT8 weights reduces the footprint to 20 GB, leaving 12 GB for the KV cache and runtime overhead. Because autoregressive decoding loads the entire 20 GB weight matrix for every generated token, the system will be severely bottlenecked by the memory bandwidth, leaving the 400 TOPS INT8 compute engines massively underutilized. Therefore, forcing W8A8 sacrifices accuracy for a compute speedup that cannot be realized during generation.
  common_mistake: |
    **The Pitfall:** Assuming W8A8 is strictly better for end-to-end latency.
    **The Rationale:** Candidates focus solely on the INT8 compute advantage and ignore the decoding phase's bottleneck.
    **The Consequence:** Sacrificing accuracy for a compute speedup that cannot be realized because generation is memory-bound.
  napkin_math: |
    - Memory Capacity: 20B params at INT8 = 20 GB (Fits in 32 GB).
    - Compute time for 1 token: 40 GOPS / 400 TOPS = 0.1 ms.
    - Memory time for 1 token: 20 GB / 136 GB/s $\approx$ 147 ms.
    - **Conclusion:** 147 ms (memory) $\gg$ 0.1 ms (compute); decoding is heavily memory-bound.
