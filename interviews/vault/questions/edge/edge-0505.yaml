title: 'The Autonomous Driving Perception Bottleneck: Roofline Analysis'
scenario: You are an ML systems engineer on an autonomous vehicle team, tasked with deploying a new YOLO-based
  object detection model on a production NVIDIA Jetson AGX Orin. The profiler reports that for a single
  inference, the model executes 500 billion INT8 operations (500 G-Ops) and moves a total of 1 GB of data
  (weights, activations, and intermediate tensors) from LPDDR5 memory.
question: "Is the 500 G-Ops, 1 GB YOLO workload compute-bound or memory-bound on Jetson AGX Orin, and what should you optimize?"
details:
  realistic_solution: The workload is fundamentally memory-bound. Calculating the Arithmetic Intensity
    (AI) shows that the model performs 500 operations for every byte it moves. This is significantly below
    the Jetson AGX Orin's ridge point of ~1,342 Ops/Byte. This means the GPU's powerful compute cores
    are spending most of their time idle, waiting for data to arrive from the 204.8 GB/s LPDDR5 memory.
    The junior engineer is wrong; the bottleneck isn't the raw number of operations, but the inefficient
    use of them relative to the data movement required. To improve performance, the team must focus on
    techniques that reduce memory movement, such as operator fusion in TensorRT, re-ordering layers for
    better cache locality, or choosing a model architecture with a higher intrinsic AI.
  common_mistake: Engineers often focus exclusively on the advertised peak TOPS of a device. They assume
    that if a model's total operations are 'low enough', it should run fast. This ignores the critical
    role of memory bandwidth in feeding the compute units. A low Arithmetic Intensity workload will always
    be slow, no matter how many TOPS the processor has, because the compute units are starved for data.
  napkin_math: 1. **Calculate Arithmetic Intensity (AI):** The ratio of compute to memory access.
  options:
  - The model is compute-bound; 500 G-Ops is too many operations for the GPU to execute within the 33ms
    latency budget.
  - The performance is limited by the AGX Orin's 60W power limit, which is causing the chip to thermal
    throttle.
  - The model is memory-bound because its Arithmetic Intensity of 500 Ops/Byte is significantly below
    the hardware's ridge point (~1,342 Ops/Byte).
  - The bottleneck is LPDDR5 latency, not bandwidth. Each memory access takes too long, stalling the pipeline.
  correct_index: 2
