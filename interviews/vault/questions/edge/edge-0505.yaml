title: 'The Autonomous Driving Perception Bottleneck: Roofline Analysis'
scenario: You are an ML systems engineer on an autonomous vehicle team, tasked with deploying a new YOLO-based object detection model on an edge perception unit. The profiler reports that for a single inference, the model executes 500 billion INT8 operations (500 G-Ops) and moves a total of 1 GB of data from LPDDR5 memory.
question: Is the 500 G-Ops, 1 GB YOLO workload compute-bound or memory-bound on Jetson AGX Orin, and what should you optimize?
details:
  realistic_solution: The workload is fundamentally memory-bound. Calculating the Arithmetic Intensity (AI) shows that the model performs 500 operations for every byte it moves. To improve performance, focus on techniques that reduce memory movement, such as operator fusion in TensorRT or choosing a model architecture with a higher intrinsic AI.
  common_mistake: |
    **The Pitfall:** Equating high total operations with being compute-bound.
    **The Rationale:** Engineers focus exclusively on the peak TOPS and assume a low operations count guarantees high speed, ignoring the memory bandwidth required to feed the compute units.
    **The Consequence:** Optimization efforts are wasted on model pruning instead of critical memory-movement reductions, resulting in persistently high latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Jetson AGX Orin (204.8 GB/s LPDDR5 bandwidth, ~275 TOPS).
       - Workload: 500 G-Ops compute, 1 GB data movement.
    2. **Calculations:**
       - Arithmetic Intensity (AI) = 500 G-Ops / 1 GB = 500 Ops/Byte.
       - Hardware Ridge Point = Peak Compute / Peak Bandwidth = 275 TOPS / 204.8 GB/s = ~1,342 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Since the AI (500 Ops/Byte) is below the ridge point (~1,342 Ops/Byte), the compute units are starved for data.
  options:
  - The model is compute-bound; 500 G-Ops is too many operations for the GPU to execute within the latency budget.
  - The performance is limited by the power limit, which is causing the chip to thermal throttle.
  - The model is memory-bound because its Arithmetic Intensity of 500 Ops/Byte is significantly below the hardware's ridge point (~1,342 Ops/Byte).
  - The bottleneck is LPDDR5 latency, not bandwidth. Each memory access takes too long, stalling the pipeline.
  correct_index: 2
