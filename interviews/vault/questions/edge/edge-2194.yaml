title: Privacy Budget for Continuous Edge Learning
scenario: Your edge fleet of 5,000 Jetson Orin devices runs continuous federated learning — one aggregation round every hour, 24/7. Each round samples 500 devices. The target is (ε=10, δ=1e-5) over one year (8,760 rounds).
question: Using the moments accountant, what noise multiplier σ is needed, and at what point does the model stop improving because the noise overwhelms the gradient signal?
details:
  realistic_solution: 'The moments accountant with subsampled Gaussian mechanism gives much tighter bounds. Subsampling rate q = 500/5000 = 0.1. For T = 8,760 rounds, ε = 10, δ = 1e-5: using the RDP accountant, the required noise multiplier σ ≈ 4.5. This means noise std = σ x C = 4.5 x C for clipping norm C. Signal-to-noise analysis: average gradient magnitude per parameter after aggregating 500 devices ≈ 0.1. Noise per parameter: σ x C / 500 = 4.5 x 1.0 / 500 = 0.009. SNR = 0.1 / 0.009 = 11.1 — adequate for learning. However, as the model converges, gradients shrink (e.g., to 0.01 after 3,000 rounds). SNR drops to 1.1 — near the noise floor. The model effectively stops learning around round 3,000-4,000. Solution: decrease learning rate and increase batch size (sample more devices per round) as training progresses.'
  common_mistake: |
    **The Pitfall:** Using basic composition theorems instead of the moments accountant.
    **The Rationale:** Candidates apply basic composition, which gives an impossibly tight per-round privacy budget for 8,760 rounds.
    **The Consequence:** Adding astronomical amounts of noise that completely destroys the model's ability to learn.
  napkin_math: |
    **Assumptions & Constraints:**
    - Subsampling rate (q): 500 / 5000 = 0.1.
    - Target: ε = 10, δ = 1e-5 over 8,760 rounds.
    - RDP accountant required noise (σ) ≈ 4.5.
    - Clipping norm C = 1.0.

    **Calculations:**
    - Noise per parameter: (σ x C) / batch size = (4.5 x 1.0) / 500 = 0.009.
    - Initial Signal (Avg Gradient Magnitude): ≈ 0.1.
    - Initial SNR: 0.1 / 0.009 = 11.1.
    - Converged Signal (e.g., at round 3000): ≈ 0.01.
    - Converged SNR: 0.01 / 0.009 = 1.1.

    **Conclusion & Interpretation:**
    - **Result: Noise-Dominated Convergence (Data-Bound).** As the model converges and gradients shrink, the SNR drops near the noise floor, halting learning around round 3,000-4,000.
