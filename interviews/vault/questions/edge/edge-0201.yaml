title: 'The Sensor Fusion Deadline'
scenario: 'An autonomous vehicle''s sensor fusion engine has a hard real-time deadline of 33 milliseconds to process a frame of LiDAR data. Your main perception model takes 28 milliseconds for a full inference pass.'
question: 'What is the maximum acceptable system latency before the system violates its deadline and risks a critical failure?'
details:
  realistic_solution: 'The total time budget is the deadline. The time available for system overhead (e.g., Time to First Token) is the deadline minus the model''s execution time. Any system latency greater than this value will cause the system to miss its 30 FPS target, resulting in a safety-critical failure.'
  common_mistake: |
    **The Pitfall:** Focusing only on model inference time and ignoring full system pipeline overhead.
    **The Rationale:** Candidates assume that if the ML model runs fast enough, the real-time deadline is automatically met.
    **The Consequence:** Crucial steps like I/O, pre-processing, and OS scheduling cause the system to miss the 30 FPS target, risking a safety-critical failure.
  napkin_math: |
    - Hard real-time deadline: **33 ms**.
    - Model inference time: **28 ms**.
    - Maximum acceptable system latency (overhead): 33 ms - 28 ms = **5 ms**.
  options:
  - '33 ms'
  - '28 ms'
  - '5 ms'
  - '61 ms'
  correct_index: 2
