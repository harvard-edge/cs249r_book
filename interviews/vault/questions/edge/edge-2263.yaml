title: Edge Training Checkpoint Frequency
scenario: An edge gateway adapts a model for 3 hours overnight. A checkpoint is 600
  MB and takes 90 seconds to write to local SSD. The operations team proposes checkpointing
  every 10 minutes to minimize lost progress. Evaluate the checkpoint tax before deciding
  whether the policy is reasonable.
question: Is checkpointing every 10 minutes reasonable if each 600 MB checkpoint takes
  90 seconds to write?
details:
  realistic_solution: Every 10 minutes, checkpointing costs 90/600 = 15% of wall time,
    which is high. During a 3-hour run, this writes about 18 checkpoints and spends
    27 minutes on checkpoint I/O. Unless failures are extremely frequent or the RPO
    is very strict, a longer interval such as 30-45 minutes is likely more efficient.
  common_mistake: Maximizing fault tolerance by checkpointing so often that checkpoint
    I/O dominates useful training.
  napkin_math: 10 minutes = 600 s. Checkpoint tax = 90/600 = 15%. A 3-hour run writes
    18 checkpoints, costing 18 x 90 s = 1,620 s = 27 minutes.
