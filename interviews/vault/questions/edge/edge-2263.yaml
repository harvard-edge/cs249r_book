title: Edge Training Checkpoint Frequency
scenario: An edge gateway adapts a model for 3 hours overnight. A checkpoint is 600 MB and takes 90 seconds to write to local SSD. The operations team proposes checkpointing every 10 minutes to minimize lost progress.
question: Evaluate the checkpoint tax and determine if checkpointing every 10 minutes is reasonable.
details:
  realistic_solution: Every 10 minutes, checkpointing costs 90/600 = 15% of wall time, which is a massive throughput penalty. During a 3-hour run, this writes about 18 checkpoints and spends 27 minutes strictly on checkpoint I/O blocking. Unless RPO dictates extreme fault tolerance, an interval of 30-45 minutes provides a vastly superior Information-Compute Ratio.
  common_mistake: |
    **The Pitfall:** Maximizing fault tolerance without measuring the I/O cost.
    **The Rationale:** Operations teams push for high-frequency checkpointing to minimize Recovery Point Objective (RPO) without calculating the "checkpoint tax" on throughput.
    **The Consequence:** Checkpoint I/O dominates the timeline, reducing useful training time by 15% and wearing out the local SSD prematurely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 600 MB
       - Write time: 90 seconds
       - Proposed interval: 10 minutes (600 seconds)
       - Total run time: 3 hours
    2. **Calculations:**
       - Checkpoint tax: 90 s / 600 s = 15%
       - Checkpoints per run: 3 hours / 10 minutes = 18 checkpoints
       - Total write time: 18 * 90 s = 1,620 s (27 minutes)
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Checkpointing.** A 15% checkpoint tax is excessive, heavily degrading the effective training time.
