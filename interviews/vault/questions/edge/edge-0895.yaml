title: Bandwidth-Aware Edge Debugging
scenario: You oversee 5,000 enterprise security cameras. After deploying Model V3, incident reports indicate a 10x spike in false positives for 'intruder detection'. You need raw images to debug the issue, but 1080p frames are 2MB, and the upload bandwidth per site is capped at 500 KB/s. Saturating this link disrupts standard security feeds.
question: How would you collect enough raw frames to debug the 10x intruder false-positive spike without saturating 500 KB/s site uplinks?
details:
  realistic_solution: Implement a local ring buffer combined with metadata-driven triggered uploads. The edge device continuously saves the last N frames to a local disk ring buffer. When an inference occurs, the device uploads only a lightweight metadata JSON (1KB) containing the bounding boxes, confidence scores, and activation entropies. The cloud MLOps platform analyzes these metadata streams. If a specific prediction is deemed highly suspicious (e.g., a massive drop in confidence compared to historical data, or a request from a debugging engineer), the cloud sends a targeted fetch command to the edge. The edge then retrieves the specific 2MB frame from the ring buffer and uploads it during off-peak hours or via a rate-limited background thread.
  common_mistake: Streaming all frames that triggered an 'intruder' detection directly to the cloud, congesting the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size: 2MB. Metadata size: 1KB.
    - Site uplink: 500 KB/s.
    - 100 cameras triggering simultaneously.

    **Calculations:**
    - Raw upload = 100 * 2MB = 200MB. Time = 200MB / 500 KB/s = 400 seconds.
    - Metadata upload = 100 * 1KB = 100KB. Time = 100KB / 500 KB/s = 0.2 seconds.
    - Targeted raw fetch (5 frames) = 5 * 2MB = 10MB. Time = 10MB / 500 KB/s = 20 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.2 seconds (Network-Bound)**. The metadata-driven approach prevents network congestion by reserving bulk frame transfers only for targeted debug requests.
