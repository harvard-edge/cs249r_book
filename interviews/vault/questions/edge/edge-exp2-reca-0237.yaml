title: Hailo-8 Host-Side Data Stream Validation
scenario: You are deploying an anomaly detection pipeline on a Hailo-8 dataflow accelerator operating
  at a strict 2.5W power budget. The Hailo-8 is capable of 26 TOPS for INT8 operations but features a
  unique architecture with absolutely no local DRAM. Consequently, the device relies on continuous data
  streaming directly from the host system's memory. In this architecture, where must data quality checks
  and schema validation occur, and what happens if corrupted data is streamed to the device?
details:
  realistic_solution: Because the Hailo-8 lacks local DRAM and operates via a continuous dataflow architecture,
    all schema validation and data quality checks must be performed on the host CPU before the data stream
    is initiated. If invalid data is sent, the accelerator will blindly process it, leading to garbage
    outputs or pipeline stalls, wasting power and host memory bandwidth.
  common_mistake: Candidates often assume the accelerator has internal memory buffers where data can be
    staged and validated before inference. They mistakenly propose running lightweight validation checks
    on the edge accelerator itself to save host CPU cycles.
  napkin_math: If the Hailo-8 processes 26 TOPS at 2.5W, its efficiency is 26 / 2.5 = 10.4 TOPS/W. Streaming
    unvalidated, corrupt data that requires 1 TOPS to process wastes roughly 0.096 Joules (1 TOPS / 10.4
    TOPS/W) per inference, which heavily degrades system efficiency given the strict 2.5W power envelope.
