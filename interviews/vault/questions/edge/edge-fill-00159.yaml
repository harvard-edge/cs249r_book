title: VRAM Budgeting for LLM Inference on Qualcomm Cloud AI 100
scenario: 'You are a Machine Learning engineer tasked with deploying a large language model on a Qualcomm
  Cloud AI 100 accelerator, which features 32 GB LPDDR4x memory, 400 TOPS INT8, and 75W TDP. Your team
  is evaluating two transformer-based model architectures for a low-latency, real-time inference application,
  both requiring a batch size of 1 and a maximum sequence length of 2048 tokens.


  *   **Architecture A:** A 7 billion parameter model (7B), using FP16 precision for all weights and activations.

  *   **Architecture B:** A 3 billion parameter model (3B), with weights quantized to INT8 precision.
  It employs a KV-cache to optimize attention computations during inference, storing key and value states
  in FP16. Assume this model has 32 layers and a hidden dimension of 3072.


  Perform a detailed VRAM budget analysis for each architecture, accounting for model weights, activations
  during a single forward pass, and the KV-cache (where applicable). Based on your analysis, recommend
  which architecture is more suitable for deployment on the Qualcomm Cloud AI 100 given its 32 GB VRAM
  limit, and justify your choice. Discuss the potential implications if on-device fine-tuning with an
  AdamW optimizer (which typically uses 8 bytes/parameter) were a future requirement for either model.'
details:
  realistic_solution: 'A systematic VRAM budgeting approach involves breaking down memory consumption
    by components: model weights, optimizer states (if applicable), activations, and KV-cache. For weights,
    multiply the number of parameters by the data type size (e.g., FP16 = 2 bytes, INT8 = 1 byte). For
    optimizer states (e.g., AdamW), multiply parameters by approximately 8 bytes/parameter (two FP32 states).
    Activations are more complex; estimate them based on peak tensor sizes during a forward pass. KV-cache
    memory can be calculated as `batch_size * sequence_length * num_layers * 2 (for K+V) * hidden_size
    * datatype_size`. Always account for overheads from the operating system, framework, and potentially
    other running processes. Leverage quantization, pruning, and architectural optimizations like KV-cache
    for efficient memory utilization on edge devices. For fine-tuning, consider techniques like LoRA/QLoRA
    or 8-bit optimizers.'
  common_mistake: Underestimating activation memory usage, especially with larger batch sizes or sequence
    lengths. Neglecting the significant memory footprint of the KV-cache for generative models. Overlooking
    the substantial VRAM required for optimizer states (e.g., AdamW often requires 8 bytes/parameter for
    its states) when considering on-device fine-tuning, leading to out-of-memory errors.
  napkin_math: 'Let''s assume a peak activation memory roughly proportional to model size and sequence
    length for inference:


    **Architecture A (7B, FP16 for weights & activations):**

    *   **Weights:** 7,000,000,000 parameters * 2 bytes/parameter (FP16) = 14 GB

    *   **Activations (approx. for B=1, S=2048):** ~4 GB (estimation for a 7B model peak)

    *   **Total for Inference (A):** 14 GB + 4 GB = 18 GB


    **Architecture B (3B, INT8 for weights, FP16 for activations & KV-cache, 32 layers, hidden 3072):**

    *   **Weights:** 3,000,000,000 parameters * 1 byte/parameter (INT8) = 3 GB

    *   **Activations (approx. for B=1, S=2048):** ~2 GB (estimation for a 3B model peak)

    *   **KV-cache:** 1 (batch) * 2048 (seq_len) * 32 (layers) * 2 (K+V) * 3072 (hidden_dim) * 2 bytes/value
    (FP16) = 805,306,368 bytes ≈ 0.75 GB

    *   **Total for Inference (B):** 3 GB + 2 GB + 0.75 GB = 5.75 GB


    **Conclusion for Inference:** Both architectures fit within the 32 GB VRAM. Architecture B (5.75 GB)
    provides significantly more headroom compared to Architecture A (18 GB), allowing for potential larger
    batch sizes, longer sequence lengths, or deployment of multiple models.


    **Implications for On-Device Fine-tuning (AdamW, 8 bytes/parameter):**

    *   **Architecture A (7B + AdamW):** 7,000,000,000 parameters * 8 bytes/parameter = 56 GB. This *alone*
    exceeds the 32 GB VRAM, making standard AdamW fine-tuning impossible without advanced techniques.

    *   **Architecture B (3B + AdamW):** 3,000,000,000 parameters * 8 bytes/parameter = 24 GB. Adding
    this to the inference footprint (5.75 GB) gives ~29.75 GB. This *barely* fits, leaving almost no room
    for gradients or other training-specific memory overheads. Fine-tuning would likely require memory-efficient
    optimizers, gradient accumulation, or parameter-efficient fine-tuning (PEFT) methods like LoRA.'
