title: The Thermal Throttling Trap
scenario: 'You are designing the compute module for a delivery drone, which has a sealed, passively-cooled
  enclosure with a strict thermal design power (TDP) of 15 W. You''re evaluating two edge accelerators:'
question: "How should you determine which accelerator will perform better under the 15 W TDP limit?"
details:
  realistic_solution: The performance of a chip in a thermally constrained environment is limited not
    by its theoretical peak, but by the power it can dissipate. The maximum sustained performance is the
    product of the thermal budget and the chip's power efficiency.
  common_mistake: Engineers often fixate on the advertised 'peak TOPS' figure. They select the chip with
    the highest number on the datasheet, completely ignoring the fact that in a thermally-constrained
    system, the chip will never be able to reach that peak. The true performance is dictated by the power
    budget.
  napkin_math: The key is to calculate the maximum performance each chip can sustain within the 15W power
    budget.
  options:
  - Chip A is better, delivering a sustained 60 TOPS, while Chip B only reaches 50 TOPS.
  - Chip B is better because its power efficiency (10 TOPS/W) is 2.5x higher than Chip A's (4 TOPS/W).
  - Chip A is better because its peak performance (200 TOPS) is 4x higher than Chip B's (50 TOPS).
  - They perform equally, as both will be limited to 15 TOPS by the 15W thermal budget.
