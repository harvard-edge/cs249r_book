title: 'Edge TCO Diagnosis: Why Edge Deployment Is Losing Money'
scenario: 'A startup deployed 100 Jetson Orin units ($499 each) for smart parking, running 24/7 at 60W. Monthly revenue: $2/unit. At month 6, they project losses and cannot understand why. Power at $0.10/kWh. Include 4G connectivity at $8/unit/month.'
question: 'Why is the 100-unit smart parking deployment losing money, and what monthly revenue per unit is needed to break even?'
details:
  realistic_solution: 'Monthly revenue: 100 * $2 = $200. Monthly costs: Power: 100 * 60W * 720hr * $0.10/kWh = $432. Connectivity: 100 * $8 = $800. Hardware amort (36mo): 100 * $499 / 36 = $1,386. Total monthly cost: $432+$800+$1386 = $2,618. Monthly loss: $200 - $2618 = -$2,418. Break-even revenue needed: $2,618 → $26.18/unit/month. Current revenue $2/unit = 7.6% of break-even. The business is fundamentally broken at $2/unit. Either revenue must 13x or costs must cut 13x. LoRa instead of 4G: saves $750/month. At $10/unit revenue (without optimizations): still losing $1618/month. Need $26+/unit revenue or combined optimizations.'
  common_mistake: |
    **The Pitfall:** Building an IoT business case based entirely on hardware amortization.
    **The Rationale:** Startups ignore that ongoing operational costs (power, connectivity) often exceed monthly revenue in low-margin deployments.
    **The Consequence:** The deployment fundamentally loses money every month, resulting in a broken business model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100 Jetson Orin units.
    - Target power per unit: 60W.
    - Unit connectivity cost: $8/month.
    - Hardware amortization period: 36 months ($499/unit).

    **Calculations:**
    - Monthly Revenue: 100 * $2 = $200.
    - Power Cost: 100 * 60W * 720hr * $0.10/kWh = $432.
    - Hardware Amortization: 100 * $499 / 36 = $1,386.
    - Total Monthly Cost: $432 (power) + $800 (connectivity) + $1386 (hardware) = $2,618.
    - Break-even Revenue Needed: $2,618 / 100 = $26.18/unit/month.

    **Conclusion & Interpretation:**
    - **Result: -$2,418 Monthly Loss (Cost-Bound)**. Ongoing operational costs fundamentally break the business model, emphasizing that pure hardware amortization ignores total cost of ownership.
