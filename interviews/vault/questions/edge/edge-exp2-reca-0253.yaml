title: Sparsity Support on Google Coral Edge TPU
scenario: Your team is deploying an object detection model to a Google Coral Edge TPU, which features
  4 TOPS INT8 compute at 2W in a USB/PCIe form factor. To improve framerate, a junior engineer proposes
  applying 75% unstructured weight pruning before quantizing the model to INT8. You need to recall how
  the Edge TPU's hardware executes sparse operations to determine if this will actually reduce inference
  latency.
question: "Does 75% unstructured weight pruning reduce inference latency on the Edge TPU, and what pruning approach would actually help?"
details:
  realistic_solution: The Google Coral Edge TPU relies on a dense systolic array optimized strictly for
    dense INT8 tensor operations and lacks hardware support for unstructured sparsity. To achieve actual
    latency reductions, you must use structured pruning (e.g., removing entire channels or filters), as
    it physically shrinks the dense tensor dimensions that are compiled and dispatched to the TPU.
  common_mistake: Candidates often assume that all modern AI accelerators have sparse matrix multiplication
    support and will automatically skip zero-weight multiply-accumulate (MAC) operations to save cycles.
    They falsely conclude that unstructured pruning yields proportional latency improvements.
  napkin_math: 'Edge TPU peak throughput = 4 TOPS (4e12 Ops/sec) at 2W (yielding 2 TOPS/W efficiency).
    For a convolution layer requiring 10M MACs (20M Ops):

    1) Dense latency = 20e6 Ops / 4e12 Ops/sec = 5 microseconds.

    2) 75% unstructured sparsity: The systolic array still executes the full dense matrix (20M Ops), so
    latency remains 5 microseconds.

    3) 75% structured sparsity: Tensor dimensions shrink, reducing computed MACs to 2.5M (5M Ops). Latency
    = 5e6 Ops / 4e12 Ops/sec = 1.25 microseconds.'
