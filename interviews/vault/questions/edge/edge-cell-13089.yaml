title: 'Edge Systolic Array Specification: Design Tile Size for Edge DLA'
scenario: Specify the tile size for processing a 3x3 convolution (128 channels in, 256 channels out, 28x28
  feature map, INT8) on Jetson Orin DLA (2 cores, 5.5 TOPS INT8 each, 3MB SRAM per core). Ensure tiles
  fit in SRAM, minimize memory re-reads, and achieve maximum DLA utilization. Verify the tiling with exact
  byte counts.
question: "What tile size should you use for the 128-to-256 3x3 conv on Orin DLA, and do the exact SRAM byte counts fit in 3MB per core?"
details:
  realistic_solution: 'SRAM budget: 3MB per DLA core. Tensors: weights=128*256*9=294,912 bytes=288KB.
    Input tile: (128, H_tile+2, W_tile+2) INT8. Output tile: (256, H_tile, W_tile). For 14x14 output tile:
    input=(128,16,16)=32.8KB. Output=(256,14,14)=50.2KB. Weight=288KB. Total=371KB < 3MB. Can increase
    tile: 28x14 output (half-height). Input=(128,30,30)=115KB. Output=(256,28,14)=100KB. Weight=288KB.
    Total=503KB < 3MB. Full 28x28: input=(128,30,30)=115KB. Output=(256,28,28)=200KB. Weight=288KB. Total=603KB
    < 3MB. Fits! No tiling needed. Process full feature map in one pass per core. Core split: one core
    does Cout=0..127, other does 128..255. Each: 144KB weights, 200KB input, 100KB output = 444KB < 3MB.'
  common_mistake: Choosing tile sizes that don't account for the filter support region overlap (halos)
    required for valid convolution output, leading to incorrect results at tile boundaries.
  napkin_math: 'Full feature map: weight=128*256*9=294KB, input=128*30*30=115KB (with 2-pad), output=256*28*28=200KB.
    Total=609KB < 3MB. No tiling needed! FLOPs: 2*256*28^2*128*9=1.03G per layer. Per DLA core (Cout halved):
    517M FLOPs. Time: 517M/5.5T=0.094ms. Both cores: 0.094ms (parallel). BW: 609KB/200GB/s=3.05μs (tiny).
    Compute bound (AI = 1030M/609KB=1690 FLOPs/byte >> ridge 55). DLA utilization: compute_time/total_time
    = 0.094ms / actual measured. At 65% efficiency: actual ≈ 0.144ms.'
