title: The Data Ferry
scenario: Your fleet of agricultural IoT sensors collects environmental data and inference results (e.g.,
  crop health scores). These devices operate in fields with highly intermittent and unreliable cellular
  connectivity. You need to ensure all critical data eventually reaches the cloud for analytics, without
  losing data or exhausting limited on-device storage (e.g., 2GB total).
question: "How do you ensure critical data eventually reaches the cloud without loss or exhausting the 2 GB of on-device storage?"
details:
  realistic_solution: "Implement a robust local data buffering and transmission strategy:\n  1.  **Persistent\
    \ Queue:** Utilize a durable, persistent queue on the device (e.g., using SQLite, an append-only file\
    \ log, or a specialized embedded database) to store all outgoing data points. This ensures data survives\
    \ reboots and power cycles.\n  2.  **Prioritization:** Implement a data prioritization scheme. Critical\
    \ alerts (e.g., equipment failure) should be sent first, followed by inference results, and then less\
    \ urgent telemetry. This ensures the most important data gets through when connectivity is limited.\n\
    \  3.  **Exponential Backoff with Jitter:** When a transmission fails, implement an exponential backoff\
    \ strategy, progressively increasing the delay between retry attempts. Add jitter (random delay) to\
    \ prevent all devices from retrying simultaneously, which could overwhelm a recovering network.\n\
    \  4.  **Data Aggregation and Compression:** Before storing or attempting to send, aggregate multiple\
    \ data points into larger batches and apply compression (e.g., GZIP, LZ4) to reduce payload size.\
    \ This maximizes the amount of information sent per connection opportunity.\n  5.  **Time-to-Live\
    \ (TTL) / Eviction Policy:** For less critical data, implement a TTL or an eviction policy (e.g.,\
    \ oldest data first, or lowest priority data first) to prevent storage exhaustion. This ensures that\
    \ even if connectivity is lost for extended periods, the most recent and critical data is preserved."
  common_mistake: '"Retry sending data immediately if it fails." This can waste battery and bandwidth
    in a persistently bad network environment, or lead to rapid storage exhaustion if failures are frequent.'
  napkin_math: If each data point is 1KB and you generate 1,000 points/hour, that's 1MB/hour. 2GB of storage
    allows for 2,000 hours (approximately 83 days) of raw data. Aggregating 100 points into a 1KB summary
    (a 100x reduction) extends storage capacity to 200,000 hours (over 22 years), making local buffering
    highly feasible.
  options:
  - Profiling overhead is masking the true performance; disabling all instrumentation will reveal that
    the system is already meeting targets.
  - "Implement a robust local data buffering and transmission strategy:\n  1. Persistent Queue: Utilize\
    \ a durable, persistent queue on the device (e.g., using SQLite, an append-only file log, or a specialized\
    \ embedded database) to store all outgoing data points. This ensures data survives reboots and power\
    \ cycles."
  - Retry sending data immediately if it fails.. This can waste battery and bandwidth in a persistently
    bad network environment, or lead to rapid storage exhaustion if failures are frequent.
  - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will
    achieve near-theoretical-peak performance.
