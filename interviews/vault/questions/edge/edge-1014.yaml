title: Optimize MobileNetV2 latency on Jetson Orin via layer pruning and depthwise
  op scheduling
scenario: MobileNetV2 inference on Jetson Orin achieves 120 FPS with TensorRT FP16,
  but profiling shows 35% of time spent in depthwise convolution layers despite them
  being only 5% of FLOPs. Optimize the depthwise execution specifically for Jetson
  Orin's Ampere architecture.
question: How would you optimize MobileNetV2 depthwise convolutions on Jetson Orin's
  Ampere GPU?
details:
  realistic_solution: 'Jetson Orin Ampere: depthwise conv runs on CUDA cores (not
    tensor cores). Optimization: (1) use TRT layer-specific tactics: trt.TacticSource.EDGE_MASK_CONVOLUTIONS;
    (2) ensure channel counts are multiples of 32 for warp efficiency (MobileNetV2
    standard channels: 16, 24, 32, 64, 96, 160, 320 — most are fine); (3) use TRT''s
    graph optimization to fuse depthwise + BN + ReLU6 into single kernel; (4) try
    replacing 3×3 depthwise with 5×5 at reduced depth (MobileNetV3 insight) — sometimes
    faster on Jetson due to better CUDA core occupancy. Profile with nsys to confirm
    improvement.'
  common_mistake: Switching depthwise layers to FP32 hoping for better Ampere tensor
    core utilization — this makes no sense as tensor cores only accelerate FP16/BF16/INT8
    dense matmul, not depthwise operations.
  napkin_math: 'MobileNetV2: total 0.3 GFLOPs. Depthwise ops: 5% = 15M FLOPs. Running
    at 35% of total time: if total = 8.3ms (120 FPS), depthwise = 2.9ms. Depthwise
    FLOPs/time: 15M/2.9ms = 5.2 GFLOPS. Jetson Orin Ampere CUDA core FP16: ~100 TFLOPS
    (rough estimate for CUDA-core-only path). Occupancy: 5.2G/100T = 0.0052% utilization
    — near zero! The 2.9ms is entirely kernel launch and scheduling overhead for 17
    depthwise layers × 170μs/launch. Fix: fuse all depthwise+BN+ReLU6 per block: 17
    launches → 17 fused kernels at ~50μs each = 0.85ms → 4× speedup on depthwise portion.'
