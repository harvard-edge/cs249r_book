title: The Swap File Latency Cliff
scenario: You deploy a 4GB model to a Jetson Nano that has exactly 4GB of physical RAM. You enable a 4GB
  Linux Swap File on the SD card to prevent OOM crashes. The model loads successfully. However, when the
  inference runs, the latency is completely erratic—sometimes it takes 50ms, sometimes it takes 4,000ms.
  The CPU and GPU are barely being utilized during the 4,000ms spikes. Why?
details:
  realistic_solution: 'The erratic latency is caused by Linux swap thrashing. The 4GB model plus the OS,
    CUDA runtime, and kernel buffers exceed 4GB of physical RAM. Linux silently evicts pages to the SD
    card swap file. During inference, when a layer''s weights have been swapped out, the GPU stalls while
    the CPU fetches the page from the SD card at 25 MB/s — 1000x slower than RAM''s 25 GB/s. A single
    swapped 4MB weight tensor takes 160ms to reload instead of 0.16ms. The fix: reduce the model to fit
    in RAM (INT8 quantization halves it to 2GB), disable swap entirely (`swapoff`), or upgrade to 8GB
    hardware. Never rely on swap for inference workloads.'
  common_mistake: '"The SD card is slow to load the model." The model is already loaded. The problem is
    what the OS does *during* inference.'
  napkin_math: GPU Memory Bandwidth = 25 GB/s. SD Card Bandwidth = 0.025 GB/s. Swapping reduces your memory
    throughput by a factor of 1,000x. If a layer takes 4ms to read from RAM, it takes 4,000ms to read
    from an SD card.
