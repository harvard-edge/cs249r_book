title: Diagnosing DLA Memory Bottlenecks on Jetson Orin
scenario: You are deploying a high-resolution vision model (4K input) on an NVIDIA Jetson Orin using the
  DLA accelerator. During profiling, you notice the application is hitting the 60W TDP limit and thermal
  throttling. The DLA INT8 compute utilization is extremely low (barely 40 TOPS out of the theoretical
  275 TOPS), while the 32 GB LPDDR5 memory bandwidth is completely saturated. What is the likely architectural
  root cause of this severe memory bottleneck?
question: "What is the likely architectural root cause of this severe memory bottleneck?"
details:
  realistic_solution: The root cause is a mismatch between the DLA's dataflow mapping and the layer characteristics.
    In early layers of a 4K vision model, activation maps are massive while weight tensors are relatively
    small. If the compiler defaults to a weight-stationary dataflow, the tiny weights are kept in the
    DLA's local SRAM while the huge activations are repeatedly fetched from the LPDDR5 memory. This causes
    massive off-chip memory traffic, starving the systolic array of data and spiking power consumption.
    The solution is to override the compiler's tiling configuration to use an output-stationary or row-stationary
    dataflow for these early layers, maximizing activation reuse in SRAM.
  common_mistake: Candidates often suggest generic solutions like reducing the input resolution, pruning
    the model, or decreasing batch size. They fail to identify that the root cause lies in the interaction
    between the layer dimensions and the systolic array's dataflow mapping.
  napkin_math: Consider an early 3x3 Conv layer with 64 channels on a 3840x2160 image. The activation
    size is 3840 * 2160 * 64 bytes = ~530 MB, while weights are 3 * 3 * 64 * 64 = ~36 KB. If the DLA has
    a few MBs of local SRAM and uses a purely weight-stationary dataflow without proper spatial tiling,
    it must repeatedly stream the 530 MB activations from the LPDDR5. With an effective LPDDR5 bandwidth
    of 200 GB/s and a poorly tiled arithmetic intensity of 100 MACs/byte, the maximum achievable compute
    is 200 GB/s * 100 MACs/byte = 20 Tera-MACs/s (40 TOPS INT8). This explains why performance is bottlenecked
    far below the Orin's 275 TOPS peak.
