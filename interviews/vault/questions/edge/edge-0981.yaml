title: Asymmetric INT8 Quantization Error
scenario: A team deploying an object detection model to an edge accelerator observes significant bounding box regression errors. They are using post-training symmetric per-tensor quantization for all activations. The model heavily utilizes ReLU6 layers.
question: Analyze the root cause of the regression errors and propose a targeted quantization strategy to restore accuracy without exceeding INT8 constraints?
details:
  realistic_solution: Symmetric quantization maps zero to exactly zero and scales symmetrically around it, which wastes exactly half the INT8 representation range for strictly positive activations like ReLU6. This excessive clipping and quantization noise degrades regression accuracy. The solution is to use nsys profiling to analyze activation distributions and apply asymmetric quantization for ReLU6 layers, doubling the resolution for positive values.
  common_mistake: |
    **The Pitfall:** Assuming symmetric quantization is universally optimal.
    **The Rationale:** Engineers prefer symmetric quantization to avoid the math overhead of zero-points, ignoring the distribution of activation values.
    **The Consequence:** Half of the available INT8 range is entirely wasted for strictly positive activations like ReLU6, destroying regression accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 available intervals: 256.
       - Range required for strictly positive ReLU6: [0, max].
    2. **Calculations:**
       - Symmetric quantization wastes all negative intervals: 128 intervals wasted.
    3. **Conclusion & Interpretation:**
       - **Result: Asymmetric quantization doubles the effective resolution and restores accuracy.**
