title: Guardrail Memory Footprint on Cloud AI 100
scenario: >-
  Your enterprise requires strict guardrails for an on-premise healthcare application deployed on a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To satisfy accountability, you must run an input toxicity classifier (1B parameters) and an output PII redactor (2B parameters) alongside the primary generative model (24B parameters). All models are quantized to INT8.
question: What total INT8 weight memory do the guardrails and 24B model require, and how much of the 32 GB remains for KV cache and activations?
details:
  realistic_solution: |
    Since all models are quantized to INT8, each parameter requires exactly 1 byte of memory. You sum the parameters of the guardrail models and the primary model to find the total weight footprint, then subtract this from the accelerator's total memory capacity.
  common_mistake: |
    **The Pitfall:** Incorrect precision conversion or ignoring guardrail parameters.
    **The Rationale:** Candidates often incorrectly assume INT8 requires 2 bytes, or forget to sum the parameters of all three models.
    **The Consequence:** An inaccurate memory footprint calculation leading to over-provisioning hardware or unexpected OOM errors.
  napkin_math: |
    - **Precision conversion:** INT8 = 1 byte per parameter.
    - **Total parameters:** 1B + 2B + 24B = 27 Billion parameters.
    - **Total weight memory footprint:** `27B * 1 byte = 27 GB`.
    - **Total memory capacity:** 32 GB.
    - **Result:** **Remaining memory for KV cache/activations = `32 GB - 27 GB = 5 GB`.**
