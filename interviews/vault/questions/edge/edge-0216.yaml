title: 'The Cost of Privacy'
scenario: 'An automotive company is training a perception model for a new driver-assist feature. They are considering two approaches: centralized training, where they upload all raw video from the cars to the cloud, versus federated learning, where they train on the car and only upload model updates.'
question: 'From a pure TCO (Total Cost of Ownership) perspective on an edge fleet, what is the primary economic reason a company might choose Federated Learning?'
details:
  realistic_solution: 'The primary economic driver is the massive reduction in data transmission costs. Raw video data is orders of magnitude larger than the model gradients or weights that are sent to the central server in a federated learning setup. By avoiding the need to upload a constant stream of high-bandwidth video from every vehicle in the fleet, the company saves enormous amounts on cellular data plans and cloud ingress fees.'
  common_mistake: 'Engineers often focus on the cloud compute costs for aggregation or the on-device compute cost, drastically underestimating the operational expense of transmitting petabytes of raw video data over cellular networks.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 vehicles.
    - Centralized raw video data: 1 TB per vehicle.
    - Federated Learning model updates: 100 MB per vehicle.

    **Calculations:**
    - Centralized total data: 10,000 * 1 TB = 10 Petabytes.
    - Federated total data: 10,000 * 100 MB = 1 Terabyte.
    - Data transmission reduction: 10,000 TB / 1 TB = 10,000x factor.

    **Conclusion & Interpretation:**
    - **Result: 10,000x Reduction (Network-Bound)**. Federated learning dramatically reduces network bandwidth costs, optimizing fleet TCO.
  options:
  - 'It saves power on the edge device by requiring less on-device computation.'
  - 'It reduces cloud compute costs by pre-aggregating gradients on the edge.'
  - 'It dramatically reduces network bandwidth costs by avoiding raw video uploads.'
  - 'It lowers the direct cost of compliance with privacy regulations.'
