title: Orin Zero-Copy Cropping
scenario: A Jetson AGX Orin streams data from 1080p cameras. The application crops the center 800x600 region of each frame and sends it to inference. Naive zero-copy fails because the cropped region's row stride (1920 bytes) does not match the GPU's expected NCHW layout (800 bytes per row), and arbitrary x-offset cropping breaks 256-byte memory alignment required for HBM-style burst access.
question: How do you handle the stride mismatch and alignment constraints to pass the cropped region to the GPU via zero-copy without falling back to CPU memcpy?
details:
  realistic_solution: 'Use the Jetson''s hardware blocks to decode and crop the video streams directly into pinned, zero-copy unified memory. This allows the GPU to access the cropped tensors via the LPDDR5 memory controller without the CPU explicitly copying data.'
  common_mistake: |
    **The Pitfall:** Cropping via standard OpenCV CPU functions before inference.
    **The Rationale:** Candidates treat image cropping as a generic CPU task.
    **The Consequence:** The system manually copies data to GPU memory, breaking the latency and power benefits of zero-copy Unified Virtual Memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Zero-Copy Transfer is available.
    - Hardware Video Image Compositor (VIC) is used to decode/crop directly into pinned Unified Virtual Memory.

    **Calculations:**
    - Time to copy (T_copy) using CPU memcpy adds significant latency.
    - Time to copy (T_copy) using VIC is 0 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0 seconds (Memory-Bound)**. Zero-copy Unified Virtual Memory avoids latency and power penalties of CPU memory copies.
