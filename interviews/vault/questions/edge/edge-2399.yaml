title: Orin Zero-Copy Cropping
scenario: A Jetson AGX Orin streams data from 1080p cameras. The application crops
  the center 800x600 region of each frame and sends to inference. Naive zero-copy
  fails because the cropped region's row stride (1920 bytes) does not match the GPU's
  expected NCHW layout (800 bytes per row), and arbitrary x-offset cropping breaks
  256-byte memory alignment required for HBM-style burst access.
question: Describe how to handle the stride mismatch and alignment constraints when
  passing the cropped region to the GPU as zero-copy. Identify the specific approach
  (stride-aware kernel, repacking via VIC hardware, or aligned-offset padding) that
  preserves zero-copy without falling back to CPU memcpy.
details:
  realistic_solution: Use the Jetson's hardware blocks to decode and crop the video
    streams directly into pinned, zero-copy unified memory. This allows the GPU to
    access the cropped tensors via the LPDDR5 memory controller without the CPU explicitly
    copying data.
  common_mistake: Doing the cropping using standard OpenCV CPU functions before manually
    moving the data to GPU memory.
  napkin_math: T_copy → 0s with UVM
