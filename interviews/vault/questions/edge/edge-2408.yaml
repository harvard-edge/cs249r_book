title: Drone Edge Compute Energy Penalty
scenario: A drone running an edge compute module hovers with the module at a 15W idle mode. It spikes to 60W for exactly 2 seconds to run a 3D mapping update, then returns to 15W.
question: Calculate the total extra energy in Joules consumed by executing the mapping operation compared to just remaining in the 15W idle state.
details:
  realistic_solution: The active power penalty relative to the baseline is 60W - 15W = 45W. Because the mapping takes 2 seconds, the extra energy is 45 Watts * 2 seconds = 90 Joules.
  common_mistake: |
    **The Pitfall:** Multiplying the total power by the time.
    **The Rationale:** Candidates calculate the absolute energy consumed during the period (60W * 2s = 120J) rather than isolating the delta relative to the hovering baseline.
    **The Consequence:** Overestimating the energy cost of the specific compute operation by including the baseline power.
  napkin_math: |
    - **Identify active power penalty:** 60W (active) - 15W (idle) = 45W.
    - **Calculate extra energy:** 45 Watts * 2 seconds = 90 Joules.
    - **Final result:** **90 Joules.**
