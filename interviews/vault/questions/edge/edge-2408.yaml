title: Drone Edge Compute Energy Penalty
scenario: A drone running a Jetson AGX Orin hovers with the Orin at a 15W idle mode.
  It spikes to 60W for exactly 2 seconds to run a 3D mapping update, then returns
  to 15W.
question: Calculate the total extra energy in Joules consumed by executing the mapping
  operation compared to just remaining in the 15W idle state.
details:
  realistic_solution: The active power penalty relative to the baseline is 60W - 15W
    = 45W. Because the mapping takes 2 seconds, the extra energy is 45 Watts * 2 seconds
    = 90 Joules.
  common_mistake: Multiplying the total power (60W * 2) instead of isolating the delta
    relative to the hovering baseline.
  napkin_math: (60 - 15) * 2 = 90 Joules
