title: 'Edge TCO Evaluation: Batch vs Real-Time Inference Cost Model'
scenario: 'A medical imaging clinic can run MRI inference (ResNet-50, 9 GOPS, 512x512 input) in real-time mode (Jetson Orin, 60W, $499) or overnight batch mode (Hailo-8+Pi5, 7.5W, $280). 50 scans/day, each taking 100ms inference. Real-time: instant results. Batch: 8-hour delay.'
question: What is the 5-year TCO premium for real-time Jetson Orin inference versus overnight Hailo-8+Pi5 batch inference?
details:
  realistic_solution: Compute hardware plus five-year power cost. Real-time devices run 24/7 but spend 99% of their time idle. A Jetson Orin in 60W mode idles at around 15W. Jetson costs $499 in CapEx and 15W x 43,800h x $0.10/kWh / 1000 = $65.70 in power, totaling $564.70. The Hailo-8+Pi5 idles around 3W. It costs $280 in CapEx and 3W x 43,800h x $0.10/kWh / 1000 = $13.14 in power, totaling $293.14. The real-time option costs about $271.56 more over five years, buying instant results instead of an 8-hour batch delay.
  common_mistake: |
    **The Pitfall:** Treating real-time vs batch solely as a latency question.
    **The Rationale:** Candidates ignore the fact that devices run 24/7 and spend 99% of their time idle.
    **The Consequence:** They fail to model the 5-year idle power consumption, vastly underestimating the actual TCO difference between the two solutions.
  napkin_math: |
    1. **Time Horizon:** 5 years = `5 * 365 * 24 = 43,800 hours`.
    2. **Utilization:** 50 scans/day takes seconds; average power is effectively the idle power.
    3. **Jetson Orin (Real-time):**
       - Idle Power: 15W.
       - Power Cost: `15W * 43,800h / 1000 * $0.10/kWh = $65.70`.
       - Total TCO: `$499 (CapEx) + $65.70 = $564.70`.
    4. **Hailo-8+Pi5 (Batch):**
       - Idle Power: 3W.
       - Power Cost: `3W * 43,800h / 1000 * $0.10/kWh = $13.14`.
       - Total TCO: `$280 (CapEx) + $13.14 = $293.14`.
    5. **Premium:** `$564.70 - $293.14 = $271.56`.
    **The 5-year TCO premium for real-time inference is $271.56.**
