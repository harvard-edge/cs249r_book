title: 'Edge TCO Evaluation: Batch vs Real-Time Inference Cost Model'
scenario: 'A medical imaging clinic can run MRI inference (ResNet-50, 9 GOPS, 512x512
  input) in real-time mode (Jetson Orin, 60W, $499) or overnight batch mode (Hailo-8+Pi5,
  7.5W, $280). 50 scans/day, each taking 100ms inference. Real-time: instant results.
  Batch: 8-hour delay. Calculate 5-year TCO for each mode and the cost premium for
  real-time results.'
question: What is the 5-year TCO premium for real-time Jetson Orin inference versus
  overnight Hailo-8+Pi5 batch inference?
details:
  realistic_solution: Compute hardware plus five-year power cost. Real-time devices run
    24/7 but spend 99% of their time idle. A Jetson Orin in 60W mode idles at around 15W.
    Jetson costs $499 in CapEx and 15W × 43,800h × $0.10/kWh / 1000 = $65.70 in power,
    totaling $564.70. The Hailo-8+Pi5 idles around 3W. It costs $280 in CapEx and 3W ×
    43,800h × $0.10/kWh / 1000 = $13.14 in power, totaling $293.14. The real-time option
    costs about $271.56 more over five years, buying instant results instead of an 8-hour batch delay.
  common_mistake: Treating real-time vs batch as only a latency question rather than
    a cost question — batch processing can use the same hardware at lower average
    utilization and potentially different power states.
  napkin_math: 5 years = 43,800 h. 50 scans/day takes just seconds; average power is
    effectively idle power. Jetson idle = 15W. 15 × 43,800 × 0.10 / 1000 = $65.70.
    Jetson TCO = $499 + $65.70 = $564.70. Hailo+Pi5 idle = 3W. 3 × 43,800 × 0.10 / 1000 = $13.14.
    Hailo TCO = $280 + $13.14 = $293.14. Premium = $564.70 - $293.14 = $271.56.
