title: The Edge Roofline Riddle
scenario: Your autonomous vehicle team is optimizing a new perception model on a Jetson AGX Orin. Before kernel-level optimizations, you must identify the primary bottleneck.
question: For a typical CNN, is the workload likely to be compute-bound or memory-bound on this hardware?
details:
  realistic_solution: The workload is overwhelmingly likely to be memory-bound. The Jetson AGX Orin exhibits an extremely high Ridge Point (~1,342 Ops/Byte), reflecting a massive surplus of compute capability relative to its memory bandwidth. Standard CNN architectures possess a low arithmetic intensity (typically 100-300 Ops/Byte). Consequently, the GPU SMs sit idle waiting for memory transactions to complete, making optimization efforts like kernel math tuning completely ineffective compared to layer fusion or quantization.
  common_mistake: |
    **The Pitfall:** Fixating purely on the peak TOPS metric advertised by the vendor to assume all workloads are compute-bound.
    **The Rationale:** Engineers ignore the physical constraints of DRAM bus widths, failing to execute a basic roofline analysis to calculate the hardware's ridge point.
    **The Consequence:** Engineering hours are wasted optimizing CUDA kernels that are already executing faster than the memory controller can feed them.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin INT8 Compute: 275 TOPS (275e12 Ops/sec).
       - Orin Memory Bandwidth: 204.8 GB/s (204.8e9 Bytes/sec).
       - Typical CNN Arithmetic Intensity: ~200-500 Ops/Byte.
    2. **Calculations:**
       - Hardware Ridge Point = 275e12 / 204.8e9 = ~1342.7 Ops/Byte.
       - Compare: 200 to 500 Ops/Byte (Model AI) is far less than 1342.7 Ops/Byte (Hardware Ridge).
    3. **Conclusion & Interpretation:**
       - **Result: AI < Ridge Point. The system is profoundly Memory-Bound; the computation units starve for data.**
  options:
  - Compute-bound, because the GPU has 275 TOPS and CNNs are computationally intensive.
  - Power-bound, because TOPS/W is the most critical metric for an autonomous vehicle.
  - Memory-bound, because the model's arithmetic intensity is lower than the hardware's ridge point.
  - Neither, a well-optimized model should be balanced perfectly on the ridge point.
