title: The Edge Roofline Riddle
scenario: Your autonomous vehicle team is trying to optimize a new perception model on a Jetson AGX Orin. Before diving into kernel-level optimizations, you first need to identify the primary performance bottleneck.
question: For a typical CNN, is the workload likely to be compute-bound or memory-bound on this hardware?
details:
  realistic_solution: The workload is overwhelmingly likely to be **memory-bound**. The Jetson AGX Orin has an extremely high Ridge Point (~1,342 Ops/Byte), meaning it offers a massive amount of compute for every byte of data it can fetch from memory. Most standard CNN architectures have a much lower arithmetic intensity (typically 10-100 Ops/Byte). Because the model's arithmetic intensity is far below the hardware's ridge point, the system spends most of its time waiting for data from DRAM, not performing calculations. The GPU cores are starved.
  common_mistake: |
    **The Pitfall:** Fixating on the peak TOPS number advertised for an edge GPU and assuming workloads are compute-bound.
    **The Rationale:** Engineers forget that if a model doesn't perform enough computation for every byte fetched, the system waits for memory regardless of processor speed.
    **The Consequence:** Optimization efforts are misdirected toward kernel math speedups instead of crucial memory traffic reductions (like layer fusion).
  napkin_math: |
    1. Calculate Peak Compute: 275 TOPS (INT8) = 275e12 Ops/sec.
    2. Identify Peak Memory Bandwidth: 204.8 GB/s = 204.8e9 Bytes/sec.
    3. Calculate Hardware Ridge Point: 275e12 / 204.8e9 = ~1342.7 Ops/Byte.
    4. Estimate typical CNN Arithmetic Intensity: ~200-500 Ops/Byte.
    **Since the CNN's arithmetic intensity (200-500) is far less than the hardware's Ridge Point (1342), the compute units starve for data, making it severely memory-bound.**
  options:
  - Compute-bound, because the GPU has 275 TOPS and CNNs are computationally intensive.
  - Power-bound, because TOPS/W is the most critical metric for an autonomous vehicle.
  - Memory-bound, because the model's arithmetic intensity is lower than the hardware's ridge point.
  - Neither, a well-optimized model should be balanced perfectly on the ridge point.
