title: Analyzing I/O Latency Bottlenecks on Hailo-8
scenario: A smart camera pipeline processes 1920x1080 RGB frames using a custom object detector on a Hailo-8
  accelerator (26 TOPS INT8, 2.5W). The model requires 26 GOPS per frame, meaning the theoretical compute
  time is exactly 1ms. However, the system profiler shows a consistent end-to-end latency of roughly 7ms
  per frame. Given that the Hailo-8 is a dataflow accelerator with no local DRAM and streams inputs directly
  from host memory over a 1 GB/s PCIe link, analyze the system behavior to explain why this latency bottleneck
  occurs.
details:
  realistic_solution: The discrepancy is caused by the physical I/O bottleneck of streaming the raw high-resolution
    image from the host memory to the accelerator. Because the Hailo-8 has no local DRAM to pre-load the
    frame, the data transfer over the 1 GB/s link occurs synchronously with the pipeline, dominating the
    extremely fast 1ms compute time and making the system entirely I/O bound.
  common_mistake: Candidates often assume the 7ms latency is caused by poor compute utilization, kernel
    launch overheads, or internal SRAM cache misses on the accelerator. They fail to account for the specific
    architectural constraint of the Hailo-8 lacking local DRAM, completely ignoring the host-to-device
    streaming I/O cost.
  napkin_math: 'Input payload size: 1920 pixels * 1080 pixels * 3 channels (RGB) = 6,220,800 bytes (~6.2
    MB). Transfer time over 1 GB/s link: 6.2 MB / 1000 MB/s = 6.2ms. Total latency = 6.2ms (I/O transfer)
    + 1.0ms (INT8 compute at 26 TOPS) = 7.2ms, which aligns perfectly with the profiled 7ms latency.'
