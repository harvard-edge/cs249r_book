title: Calculating Maximum Framerate from Accelerator TOPS Capacity
scenario: A smart retail system uses a Hailo-8 accelerator (26 TOPS) to process frames
  using a ResNet-50 variant requiring 8 GOPS per frame.
question: Explain how to calculate the theoretical maximum framerate the Hailo-8 can
  achieve, detailing the relationship between TOPS and GOPS.
details:
  realistic_solution: The Hailo-8 provides 26 TOPS (Tera-Operations Per Second), which
    equates to 26,000 GOPS. Dividing the total compute capacity of 26,000 GOPS by
    the 8 GOPS required per frame yields a theoretical maximum throughput of 3,250
    frames per second.
  common_mistake: Confusing TOPS (operations) with MACs (multiply-accumulate) or missing
    the Tera to Giga conversion multiplier.
  napkin_math: 26000 GOPS / 8 GOPS = 3250 FPS
