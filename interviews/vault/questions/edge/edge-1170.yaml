title: 'Edge TCO Optimization: Right-Size Hailo-8 Fleet for Variable Load'
scenario: 'A retail chain deployed 500 Hailo-8 units (2.5W, $200 + RPi5 at 5W = $280,
  7.5W total) for foot traffic counting. During 8hr/day business hours: 30 FPS. Off-hours:
  idle. Propose a cost-optimal power management and fleet sizing strategy. Current
  annual power: 500*7.5W*8760hr*$0.10/1000=$3285. Target: reduce by 60%.'
question: What power-management plan will cut the 500-store Hailo-8 fleet’s annual
  power cost by 60%, and what savings and payback result?
details:
  realistic_solution: 'Target reduction: 60% of $3285 = save $1971/yr. Current: 7.5W
    * 8760hr = 65.7 kWh/unit/yr. Target: 40% of 65.7 = 26.3 kWh/unit/yr. Required:
    26.3 kWh / 8760hr = 3W average. Strategy: sleep mode during off-hours (16hr/day).
    Active: 7.5W * 8hr = 60 Wh/day. Sleep (Hailo off, Pi suspend): 0.5W * 16hr = 8
    Wh/day. Total: 68 Wh/day = 24.8 kWh/yr. Power cost: 500 * 24.8 * $0.10 = $1240/yr
    vs $3285. Savings: $2045/yr = 62.3% > 60% target. Wake time (from Pi suspend):
    5 seconds. Pre-wake 5 min before open: trivial to implement with cron.'
  common_mistake: 'Reducing power by simply turning units off and back on (boot time
    for Pi5: 30-40 seconds) which causes SLO violations during opening rush, vs using
    proper sleep/wake strategies.'
  napkin_math: 'Active: 7.5W*8hr=60Wh/day. Sleep (Pi suspend + Hailo off): 0.5W*16hr=8Wh/day.
    Total: 68Wh/day=24.82kWh/yr. Current: 7.5*8760/1000=65.7kWh/yr. Savings: (65.7-24.82)/65.7=62.3%.
    Annual cost: 500*24.82*$0.10=$1241 vs $3285. Savings: $2044/yr. Implementation:
    cron job for wake, systemd suspend for sleep. Engineering: 8hr = $800. Payback:
    $800/$2044/yr=4.7 months. 5yr NPV at 5%: $2044*4.329=$8,848-$800=$8,048. Excellent
    ROI for trivial implementation.'
