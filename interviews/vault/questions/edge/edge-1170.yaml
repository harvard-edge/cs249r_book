title: 'Edge TCO Optimization: Right-Size Hailo-8 Fleet for Variable Load'
scenario: A retail chain deployed 500 Hailo-8 units (2.5W, $200 + RPi5 at 5W = $280, 7.5W total) for foot traffic counting. During 8hr/day business hours: 30 FPS. Off-hours: idle. Current annual power: 500*7.5W*8760hr*$0.10/1000=$3285. Target: reduce by 60%.
question: What power-management plan will cut the 500-store Hailo-8 fleet's annual power cost by 60%, and what savings and payback result?
details:
  realistic_solution: 'Strategy: sleep mode during off-hours (16hr/day). Active: 7.5W * 8hr = 60 Wh/day. Sleep (Hailo off, Pi suspend): 0.5W * 16hr = 8 Wh/day. Wake time (from Pi suspend) is 5 seconds. Pre-wake 5 min before open can be implemented trivially with a cron job.'
  common_mistake: |
    **The Pitfall:** Completely powering off devices during idle hours instead of using suspend states.
    **The Rationale:** Engineers hunt for 0W idle consumption without considering the cold-start latency of complex embedded Linux boards.
    **The Consequence:** Causing SLO violations during the morning rush due to 40-second boot times.
  napkin_math: |
    - **Current Load:** 7.5W * 8760hr = 65.7 kWh/yr per unit. Total cost = 500 * 65.7 * $0.10 = $3,285.
    - **New Strategy:** Active (7.5W * 8hr = 60 Wh) + Sleep (0.5W * 16hr = 8 Wh) = 68 Wh/day = 24.8 kWh/yr.
    - **Savings:** New cost = 500 * 24.8 * $0.10 = $1,241. Savings = $3,285 - $1,241 = $2,044/yr (62.3% reduction, exceeding 60% target).
    - **Final Result:** **Assuming $800 implementation cost, the $2,044/yr savings yield a 4.7 month payback period and excellent ROI.**
