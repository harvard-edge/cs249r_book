title: The Autonomous Robot's Power Budget
scenario: 'You are an ML Systems Engineer for an autonomous delivery robot startup. You must deploy a
  3D object detection model onto a Jetson AGX Orin, which is operating in a thermally-constrained 15W
  power mode (yielding ~68 TOPS and ~102.4 GB/s bandwidth). Your team has profiled two candidate models at the target 30 FPS:

  - **Model A:** Requires 80 T-Ops, but has a high Arithmetic Intensity (1500 OPS/Byte).
  - **Model B:** Requires 60 T-Ops, but has a low Arithmetic Intensity (100 OPS/Byte).'
question: "How should you compare the two 3D detection models for performance per watt on the 15W Jetson AGX Orin?"
details:
  realistic_solution: The correct approach is to calculate the Arithmetic Intensity (AI) for each model
    and compare it to the Jetson AGX Orin's hardware ridge point. The model whose AI is higher and consistently
    above the ridge point across power states will be compute-bound, efficiently using the GPU's cores
    and maximizing performance per watt. Lowering the power ceiling limits compute more drastically than
    memory bandwidth, shifting the ridge point.
  common_mistake: Engineers often mistakenly assume that the model with fewer total operations (T-Ops)
    is automatically more power-efficient. This ignores the energy cost of data movement. A model that
    is constantly waiting on memory (memory-bound) wastes significant energy by keeping compute units
    idle but powered on.
  napkin_math: 'In full 60W mode, Orin gives 275 TOPS and 204.8 GB/s memory bandwidth (Ridge Point = 1342 OPS/Byte).
    In 15W mode, compute drops to ~68 TOPS, while memory bandwidth drops to ~102.4 GB/s (Ridge Point = 664 OPS/Byte).
    A model with an Arithmetic Intensity of 1500 OPS/Byte is compute-bound at 60W (1500 > 1342) and
    stays compute-bound at 15W (1500 > 664). Models with low AI (e.g., 100 OPS/Byte) are severely memory-bound
    and waste the limited power budget waiting on data transfers.'
  options:
  - Model B is more efficient because it requires 25% fewer T-Ops, directly reducing power consumption.
  - Model A is more efficient because its higher arithmetic intensity makes it compute-bound, maximizing
    the utilization of the Orin's GPU cores.
  - Model B is more efficient because it is memory-bound, and the Orin's fast LPDDR5 memory (204.8 GB/s)
    is designed to handle such workloads.
  - Both models are unsuitable. A 15W power budget is too low for either 80 or 60 T-Ops, and the device
    will throttle.
  correct_index: 1
