title: The Autonomous Robot's Power Budget
scenario: You are an ML Systems Engineer for an autonomous delivery robot startup. You must deploy a 3D object detection model onto a Jetson AGX Orin, which is operating in a thermally-constrained 15W power mode (yielding ~68 TOPS and ~102.4 GB/s bandwidth). Your team has profiled two candidate models at the target 30 FPS. Model A requires 80 T-Ops but has a high Arithmetic Intensity (1500 OPS/Byte). Model B requires 60 T-Ops but has a low Arithmetic Intensity (100 OPS/Byte).
question: How should you compare the two 3D detection models for performance per watt on the 15W Jetson AGX Orin?
details:
  realistic_solution: 'Calculate the Arithmetic Intensity (AI) for each model and compare it to the Jetson AGX Orin''s hardware ridge point. The model whose AI is higher and consistently above the ridge point across power states will be compute-bound, efficiently using the GPU''s cores and maximizing performance per watt.'
  common_mistake: |
    **The Pitfall:** Assuming the model with fewer total operations (Model B) is automatically more power-efficient.
    **The Rationale:** Engineers often ignore the energy cost of data movement, equating low FLOPs directly with low power.
    **The Consequence:** Deploying a memory-bound model that wastes significant energy idling compute units while waiting for data transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin 15W mode: 68 TOPS, 102.4 GB/s.
       - Model A AI = 1500 OPS/Byte.
       - Model B AI = 100 OPS/Byte.
    2. **Calculations:**
       - Hardware Ridge Point = 68,000,000,000,000 Ops / 102,400,000,000 Bytes = 664 OPS/Byte.
       - Model A AI (1500) > 664.
       - Model B AI (100) < 664.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Model Wins**. Model A is compute-bound and highly power-efficient. Model B is memory-bound, idling compute units and wasting the restricted 15W budget on LPDDR5 transfers.
