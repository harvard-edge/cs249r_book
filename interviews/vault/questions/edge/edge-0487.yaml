validation_issues:
- The Napkin Math assumes a 'slightly' dropped memory bandwidth in 15W mode but provides the same 204.8
  GB/s as the 60W mode, which is contradictory and may not be factually accurate for a reduced power state.
- The example AI for a compute-bound model (500 Ops/Byte) does not clearly show how it 'stays compute-bound
  at 15W' (where Ridge Point is 332 Ops/Byte) as 500 > 332, implying it would become memory-bound.
