title: The Autonomous Robot's Power Budget
scenario: 'You are an ML Systems Engineer for an autonomous delivery robot startup. You must deploy a
  3D object detection model onto a Jetson AGX Orin, which is operating in a thermally-constrained 15W
  power mode. Your team has profiled two candidate models at the target 30 FPS:'
details:
  realistic_solution: The correct approach is to calculate the Arithmetic Intensity (AI) for each model
    and compare it to the Jetson AGX Orin's hardware ridge point. The model whose AI is higher and closer
    to (or above) the ridge point will be more compute-bound, and thus more efficiently use the GPU's
    powerful cores, maximizing performance per watt.
  common_mistake: Engineers often mistakenly assume that the model with fewer total operations (TOPS)
    is automatically more power-efficient. This ignores the energy cost of data movement. A model that
    is constantly waiting on memory (memory-bound) wastes significant energy by keeping compute units
    idle but powered on. The most efficient model is the one whose computational demands are best matched
    to the hardware's capabilities (its arithmetic intensity).
  napkin_math: In full 60W mode, Orin gives 275 TOPS. In 15W mode, compute roughly drops to 68 TOPS, while
    memory bandwidth (204.8 GB/s) drops slightly. Ridge Point = 68 TOPS / 204.8 GB/s = 332 OPS/Byte. A
    model with an Arithmetic Intensity of 500 OPS/Byte is compute-bound at 60W (Ridge Point=1342) and
    stays compute-bound at 15W. Lowering the power ceiling limits compute, masking memory-bound bottlenecks.
  options:
  - Model B is more efficient because it requires 25% fewer TOPS, directly reducing power consumption.
  - Model A is more efficient because its higher arithmetic intensity makes it compute-bound, maximizing
    the utilization of the Orin's GPU cores.
  - Model B is more efficient because it is memory-bound, and the Orin's fast LPDDR5 memory (204.8 GB/s)
    is designed to handle such workloads.
  - Both models are unsuitable. A 15W power budget is too low for either 80 or 60 TOPS, and the device
    will throttle.
  correct_index: 1
