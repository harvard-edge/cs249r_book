title: Edge Activation Memory Telemetry Spec
scenario: A fielded edge model sometimes spills tensors to DRAM and misses real-time deadlines.
question: What activation-memory telemetry is needed to diagnose whether activation peaks or fragmentation cause the misses?
details:
  realistic_solution: Implement direct allocator-hook logging. Provide fragmentation histograms alongside contiguous gap reports. True OOM differs structurally from memory-arena scattering. 
  common_mistake: |
    **The Pitfall:** Looking only at total free memory.
    **The Rationale:** Candidates ignore the physical reality of the tensor arena allocator, assuming that 50MB of total free memory means a 30MB tensor can be allocated.
    **The Consequence:** Failing to diagnose memory fragmentation where free memory exists but no contiguous block is large enough.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 80MB total free memory
       - 30MB largest contiguous block
    2. **Calculations:**
       - Allocating a 50MB tensor blocks (50MB > 30MB).
    3. **Conclusion & Interpretation:**
       - **Result: Catastrophic Spill due to Fragmentation.**
