title: Edge Activation Memory Telemetry Spec
scenario: A fielded edge model sometimes spills tensors to DRAM and misses real-time
  deadlines. Specify the memory telemetry needed to diagnose whether activation peaks
  or fragmentation cause the misses.
question: What activation-memory telemetry is needed to diagnose edge tensor spills
  and deadline misses?
details:
  realistic_solution: The report should include peak live activation bytes, tensor
    arena allocation plan, per-layer temporary buffers, fragmentation/free-block histogram,
    spill count, spill destination, and per-layer latency. It should distinguish true
    capacity overflow from allocator fragmentation.
  common_mistake: Looking only at total free memory and missing that no contiguous
    block is large enough for a peak tensor.
  napkin_math: If 80 MB is free but the largest contiguous block is 30 MB, a 50 MB
    activation still spills.
