title: Graceful Degradation for Edge Object Detection on Google Coral TPU
scenario: You are developing a real-time object detection system for critical industrial equipment monitoring, deployed on devices equipped with the Google Coral Edge TPU (4 TOPS INT8, 2W, INT8 only). The primary model is a high-accuracy, relatively high-latency INT8 model. Design a comprehensive graceful degradation strategy for this system to ensure continuous operation and reliability under varying conditions, such as network fluctuations, power instability, or sudden spikes in inference load. Your strategy should explicitly address degradation ladders, potential model fallbacks (e.g., to lower-fidelity models or CPU), fail-safe vs. fail-operational considerations, and quality-of-service (QoS) shedding mechanisms, all while respecting the Coral TPU's specifications.
question: How would you design graceful degradation for a Coral Edge TPU industrial detector under stress while respecting INT8-only 2W limits?
details:
  realistic_solution: "A robust solution would involve a multi-tiered degradation ladder: \n1.  **Primary Mode:** Full-fidelity INT8 object detection model running on Coral TPU. \n2.  **Tier 1 (QoS Shedding):** If inference latency exceeds a threshold or CPU load increases, reduce the inference frame rate (e.g., from 30 FPS to 10 FPS) or switch to a coarser-grained object detection model (e.g., only detect critical anomalies, not all objects) — both still INT8 on TPU. \n3.  **Tier 2 (Model Fallback):** If the Coral TPU becomes unresponsive or critically overloaded, fallback to an extremely lightweight, pre-quantized INT8 model (e.g., a highly pruned MobileNetV2 for basic presence detection) running on the main CPU. This acts as a fail-safe, ensuring critical alerts are still processed even if detection quality is severely reduced. \n4.  **Fail-safe vs. Fail-operational:** The system must remain fail-operational for basic monitoring (e.g., reporting 'nothing detected' if no critical objects are seen, rather than crashing) and fail-safe for critical events (e.g., prioritizing anomaly detection alerts even with reduced confidence). Mechanisms would include continuous monitoring of TPU health, inference latency, and system resources, with intelligent decision-making logic to trigger appropriate degradation steps. Power consumption would be managed by optimizing model sizes and inference frequencies across all tiers."
  common_mistake: |
    **The Pitfall:** Proposing fallback solutions that require floating-point operations or complex CPU models.
    **The Rationale:** Candidates rely on standard software degradation patterns without respecting the rigid INT8-only hardware constraints of the Edge TPU.
    **The Consequence:** Causing thermal throttling, battery drain, or outright crashes when the TPU fails to compile or execute the fallback model.
  napkin_math: |
    - **Compute Bounds:** 4 TOPS INT8 (4,000 GOPS) and a model requiring 500 GOPs/inference.
    - **Theoretical Max:** 4,000 GOPS / 500 GOPs = 8 inferences per second (IPS).
    - **Latency Constraint:** If typical latency is 50ms (0.05s), max sequential throughput is 1 / 0.05 = 20 IPS.
    - **Conclusion:** The system is **compute-bound**; true latency for a 500 GOPs workload at 4 TOPS is 125ms, capping throughput at 8 IPS.
