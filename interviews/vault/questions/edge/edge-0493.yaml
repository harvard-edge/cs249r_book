title: The Autonomous Driving Scaling Pitfall
scenario: You are a Staff ML Systems Engineer at an autonomous vehicle company, working on a critical
  sensor fusion model. The model runs on a 4x H100 GPU server in the lab, processing simulated data from
  cameras and LiDAR. The pipeline requires a large, periodic all-to-all data exchange between the GPUs.
  You observe that performance scales well from 1 to 2 GPUs, but you see almost zero improvement when
  scaling from 2 to 4 GPUs. `nvidia-smi topo -m` shows that GPUs {0,1} and {2,3} are paired with NVLink
  bridges (`NVL`), but cross-pair communication (e.g., GPU 0 to GPU 2) only shows `PIX` (PCIe). Given
  this topology, diagnose the most likely performance bottleneck.
question: "What is the most likely bottleneck preventing the 4-GPU all-to-all sensor fusion pipeline from scaling beyond two GPUs?"
details:
  realistic_solution: The bottleneck is the PCIe bus. The `nvidia-smi topo -m` output reveals a topology
    where GPUs are only connected via NVLink in pairs. The all-to-all exchange required by the sensor
    fusion model forces half of the traffic between pairs (e.g., GPU 0 -> GPU 2) to traverse the much
    slower PCIe bus instead of the high-speed NVLink bridge. This PCIe communication saturates its available
    bandwidth, stalling the GPUs and preventing any further performance scaling. The scaling from 1 to
    2 GPUs worked because they were an NVLink-connected pair, but adding the second pair created the cross-bus
    dependency.
  common_mistake: Engineers often blame a generic cause like 'Amdahl's Law' or a network bottleneck (InfiniBand)
    without investigating the specific intra-node hardware topology. They fail to recognize that not all
    GPU-to-GPU communication within a server is equal; a poor topology can force high-bandwidth traffic
    over a much slower bus like PCIe, creating a hard scaling wall.
  napkin_math: Let's assume each GPU must exchange a 1 GB feature map with the other 3 GPUs within a 33ms
    frame budget (30 FPS).
  options:
  - The model has a large sequential component that prevents parallelization beyond 2 GPUs (Amdahl's Law).
  - The InfiniBand network connection between servers is saturated by the data exchange.
  - Communication between non-NVLinked GPUs is forced over the much slower PCIe bus, which becomes the
    bottleneck.
  - The server's CPU is unable to stage data for 4 GPUs simultaneously, leading to input starvation.
  correct_index: 2
