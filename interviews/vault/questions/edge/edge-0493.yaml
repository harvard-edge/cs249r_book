title: The Autonomous Driving Scaling Pitfall
scenario: You are working on a critical sensor fusion model running on a 4x H100 GPU server. `nvidia-smi topo -m` shows that GPUs {0,1} and {2,3} are paired with NVLink bridges (`NVL`), but cross-pair communication only shows `PIX` (PCIe).
question: What is the most likely bottleneck preventing the 4-GPU all-to-all sensor fusion pipeline from scaling beyond two GPUs?
details:
  realistic_solution: The bottleneck is the PCIe bus. The `nvidia-smi topo -m` output reveals a topology where GPUs are only connected via NVLink in pairs. The all-to-all exchange required by the sensor fusion model forces half of the traffic between pairs (e.g., GPU 0 -> GPU 2) to traverse the much slower PCIe bus instead of the high-speed NVLink bridge. This PCIe communication saturates its available bandwidth, stalling the GPUs and preventing any further performance scaling. The scaling from 1 to 2 GPUs worked because they were an NVLink-connected pair, but adding the second pair created the cross-bus dependency.
  common_mistake: |
    **The Pitfall:** Blaming a generic cause like "Amdahl's Law" or network bottlenecks.
    **The Rationale:** Candidates fail to recognize that not all GPU-to-GPU communication within a server is equal.
    **The Consequence:** Missing the specific intra-node hardware topology constraint causing the stall.
  napkin_math: |
    1. **Assumptions & Constraints:** 1 GB feature map exchange per GPU. PCIe Gen4 x16 provides ~32 GB/s. NVLink provides ~600 GB/s.
    2. **Calculations:** PCIe transfer time = 2 GB (send/receive) / 32 GB/s = 62.5 ms. NVLink transfer time = 2 GB / 600 GB/s = 3.3 ms.
    3. **Conclusion & Interpretation:** **PCIe cross-pair transfer takes 62.5ms, violating a standard 33ms frame budget. I/O-Bound bottleneck on the PCIe bus.**
