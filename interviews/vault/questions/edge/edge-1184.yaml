title: 'Edge Transformer Cost Optimization: Optimize Edge Transformer via Pruning'
scenario: A BERT-base (110M params, INT8, 110MB) on Jetson Orin DLA (11 TOPS INT8) achieves 8ms latency per inference. Propose structured pruning to 55M params (50% reduction). You are deploying on 100 Jetson Orins handling 50 inferences/second per device.
question: Is a $30K project to prune BERT-base from 110M to 55M parameters on 100 Jetson Orins justified, and what gains result?
details:
  realistic_solution: 'DLA ridge: 55 FLOPs/byte. BERT-base INT8 AI: ~80 FLOPs/byte (compute bound). After 50% pruning: 55M params, 55MB model. FLOPs: ~50% = half. AI unchanged (~80 FLOPs/byte). Still compute bound. Time: 8ms * 0.5 = 4ms. Throughput per DLA: 1/0.004=250/s. Improvement: 50% latency reduction, 100% throughput improvement. Memory savings: 110→55MB. Energy: 2x more efficient. Engineering cost $30K: 100 Jetsons running 50 inf/s. Annual inference: 100*50*8760*3600=1.577B inferences. Time savings: 4ms/inference. Energy per inference: DLA at 5W*4ms=0.02J saved (vs 0.04J). Annual energy: 100*5W*8760*$0.10/1000=$4,380/yr. Current. Savings: 50%=$2,190/yr. Hardware savings: none (same Jetsons). Engineering payback: $30K/$2,190/yr=13.7 years — not justified on energy alone. Justified only if higher throughput enables removing some Jetson units.'
  common_mistake: |
    **The Pitfall:** Assuming 50% parameter reduction yields 50% latency reduction in all cases.
    **The Rationale:** Candidates forget that for memory-bound workloads, latency scales with bandwidth reduction, but for compute-bound workloads, it may be less due to kernel launch overhead or maintaining the same Arithmetic Intensity.
    **The Consequence:** Over-promising performance gains that do not materialize, or failing to calculate the true financial payback period of the engineering effort.
  napkin_math: |
    * **Current Throughput:** 1 / 0.008s = 125 inf/s per device
    * **Current Fleet Capacity:** 100 Jetsons * 125 = 12,500 inf/s (Demand is only 5,000 inf/s; heavily over-provisioned)
    * **Pruned Latency:** 4ms (Assuming linear scaling for compute-bound)
    * **Pruned Throughput:** 1 / 0.004s = 250 inf/s per device
    * **Energy Savings:** $2,190/yr
    * **Payback on Energy Alone:** $30K / $2,190/yr = 13.7 years (Not justified)
    * **Fleet Reduction Strategy:** Pruned capacity (250 inf/s) means 20 Jetsons can handle the 5000 inf/s demand. Let's say we use 40 Jetsons for redundancy.
    * **Freed Hardware:** 60 Jetsons * $499 = $29,940
    * **Power Savings (60 off):** 60 * $52.6/yr = $3,156/yr
    * **New Payback:** $30K / ($29,940 + $3,156) = **~0.91 years (Justified)**
