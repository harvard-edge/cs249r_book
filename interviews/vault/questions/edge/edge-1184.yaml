title: 'Edge Transformer Cost Optimization: Optimize Edge Transformer via Pruning'
scenario: A BERT-base model (110M params, INT8, 110MB) on Jetson Orin DLA achieves 8ms latency per inference. Propose structured pruning to 55M params (50% reduction). You are deploying on 100 Jetson Orins handling 50 inferences/second per device.
question: Is a $30K project to prune BERT-base from 110M to 55M parameters on 100 Jetson Orins justified, and what gains result?
details:
  realistic_solution: 'DLA ridge: 55 FLOPs/byte. BERT-base INT8 AI: ~80 FLOPs/byte (compute bound). After 50% pruning: 55M params, 55MB model. FLOPs: ~50% = half. AI unchanged (~80 FLOPs/byte). Still compute bound. Time: 8ms * 0.5 = 4ms. Throughput per DLA: 1/0.004=250/s. Improvement: 50% latency reduction, 100% throughput improvement. Memory savings: 110→55MB. Energy: 2x more efficient. Engineering cost $30K: 100 Jetsons running 50 inf/s. Annual inference: 100*50*8760*3600=1.577B inferences. Time savings: 4ms/inference. Energy per inference: DLA at 5W*4ms=0.02J saved (vs 0.04J). Annual energy: 100*5W*8760*$0.10/1000=$4,380/yr. Current. Savings: 50%=$2,190/yr. Hardware savings: none (same Jetsons). Engineering payback: $30K/$2,190/yr=13.7 years — not justified on energy alone. Justified only if higher throughput enables removing some Jetson units.'
  common_mistake: |
    **The Pitfall:** Assuming 50% parameter reduction yields 50% latency reduction universally.
    **The Rationale:** Candidates forget that for compute-bound workloads, latency reduction may be limited by kernel launch overhead or Arithmetic Intensity.
    **The Consequence:** Over-promising performance gains or failing to calculate the true financial payback period of the engineering effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 100 Jetsons handling 50 inferences/sec each. Total Demand = 5,000 inf/s.
    - Current Throughput: 125 inf/s per device.
    - Pruning Cost: $30K engineering effort.

    **Calculations:**
    - Pruned Throughput: 250 inf/s per device (4ms latency vs 8ms).
    - Energy Savings: 50% power cut yields $2,190/yr.
    - Payback on Energy Alone: $30K / $2,190/yr = 13.7 years.
    - Fleet Reduction Strategy: 20 Jetsons can handle 5,000 inf/s. Keep 40 for redundancy.
    - Freed Hardware (60 units): 60 x $499 = $29,940.
    - Power Savings (60 off): 60 x $52.6/yr = $3,156/yr.
    - New Payback: $30K / ($29,940 + $3,156) = 0.91 years.

    **Conclusion & Interpretation:**
    - **Result: Cost-Effective via Fleet Reduction (Throughput-Bound).** Pruning is justified not by per-device energy savings, but by increasing throughput enough to retire 60% of the hardware fleet.
