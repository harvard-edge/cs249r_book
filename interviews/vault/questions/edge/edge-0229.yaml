title: The Drone's Data Dilemma
scenario: You're designing the perception system for an autonomous delivery drone. Your primary obstacle avoidance model performs 1 Trillion INT8 operations and reads 2 GB of data from memory for each inference.
question: What is the model's arithmetic intensity, and what does it measure?
details:
  realistic_solution: Arithmetic Intensity (AI) measures the ratio of compute operations to data movement, expressed in Ops/Byte. It explicitly quantifies computational density per byte of memory bandwidth. For this model, 1 Trillion operations divided by 2 GB yields 500 Ops/Byte, highlighting whether the architecture will saturate memory bandwidth before compute capacity.
  common_mistake: |
    **The Pitfall:** Assuming a model with a trillion operations must be compute-bound.
    **The Rationale:** Engineers look at the massive 1 Trillion operation count and assume compute is the bottleneck, ignoring the 2 GB of required data movement.
    **The Consequence:** Misdiagnosing the bottleneck and applying the wrong optimizations (e.g., pruning compute instead of improving memory access patterns).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operations: 1 Trillion INT8 Ops
       - Memory access: 2 GB
       - Hardware ridge point: ~1,342 Ops/Byte
    2. **Calculations:**
       - Arithmetic Intensity (AI): 1,000,000,000,000 Ops / 2,000,000,000 Bytes = 500 Ops/Byte
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** An AI of 500 is lower than the hardware ridge point of 1,342 Ops/Byte.
  options:
  - Compute-bound. The model requires 1 TOPS, and the Orin only has 275 TOPS, so it's clearly limited by compute.
  - Memory-bound. Its AI of 500 Ops/Byte is less than the Orin's ridge point (~1,342 Ops/Byte), so performance is limited by memory bandwidth.
  - Compute-bound. Its AI of 500 Ops/Byte is less than the Orin's ridge point, meaning the processor can't keep up with the required operations.
  - Neither. With over 200 GB/s of bandwidth, the device can supply the 2 GB of data almost instantly, so there is no bottleneck.
  correct_index: 1
