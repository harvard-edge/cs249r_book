title: The Drone's Data Dilemma
scenario: You're designing the perception system for an autonomous delivery drone powered by a Jetson
  AGX Orin. Your primary obstacle avoidance model performs 1 Trillion INT8 operations and reads 2 GB of
  data from LPDDR5 memory for each inference.
question: "What is the model's arithmetic intensity from 1 Trillion INT8 operations and 2 GB of LPDDR5 reads, and what does it measure?"
details:
  realistic_solution: Arithmetic Intensity (AI) is the ratio of compute operations to data movement, measured
    in Ops/Byte. It quantifies how much computation is performed per byte of data fetched from memory.
  common_mistake: The most common mistake is assuming that a model with a high operation count (e.g.,
    trillions of Ops) must be compute-bound. This ignores the data movement required. Performance is a
    function of both compute and memory bandwidth; a model can be bottlenecked by data even if it performs
    immense computation.
  napkin_math: '1. Calculate Model''s Arithmetic Intensity (AI): AI is the ratio of operations to memory
    access. AI = 1 Trillion Operations / 2 Gigabytes. AI = 1,000,000,000,000 / 2,000,000,000 = 500 Ops/Byte.
    If the Jetson''s roofline ridge point is higher than 500 Ops/Byte, this model is fundamentally memory-bound.'
  options:
  - Compute-bound. The model requires 1 TOPS, and the Orin only has 275 TOPS, so it's clearly limited
    by compute.
  - Memory-bound. Its AI of 500 Ops/Byte is less than the Orin's ridge point (~1,342 Ops/Byte), so performance
    is limited by memory bandwidth.
  - Compute-bound. Its AI of 500 Ops/Byte is less than the Orin's ridge point, meaning the processor can't
    keep up with the required operations.
  - Neither. With over 200 GB/s of bandwidth, the device can supply the 2 GB of data almost instantly,
    so there is no bottleneck.
  correct_index: 1
