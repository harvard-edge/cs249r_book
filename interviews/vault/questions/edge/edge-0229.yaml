classification_review: Flash is right on both counts. (1) The mode should be napkin-math, not concept-recall
  -- the question asks to calculate arithmetic intensity and determine whether the model is compute or
  memory bound. (2) The realistic_solution defines AI but never states the answer (1T ops / 2GB = 500
  Ops/Byte). The classification needs fixing and the solution should include the computed value.
