title: Hailo-8 Host Memory Streaming Bottleneck
scenario: We are deploying a high-resolution object detection model on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). The Hailo-8 relies entirely on the host's memory for streaming data, as it has no local DRAM. The model requires 50 Giga-Operations (GOPs) per frame and we are targeting 60 FPS. Because of the high resolution, 130 MB of intermediate feature maps must be spilled to and read back from the host's LPDDR4 memory (which has a dedicated 4.0 GB/s bandwidth allocated to the accelerator) for each frame. During testing, the system only achieves 15 FPS and power draw is low.
question: Why does the Hailo-8 reach only about 15 FPS for the 50 GOP high-resolution model despite needing only 3 TOPS at 60 FPS?
details:
  realistic_solution: The system is heavily memory-bandwidth bound rather than compute-bound. Because the Hailo-8 lacks local DRAM, all intermediate feature map traffic is constrained by the 4.0 GB/s host connection, which starves the compute units, caps the frame rate at ~15 FPS, and results in low power draw.
  common_mistake: |
    **The Pitfall:** Assuming massive TOPS equates directly to high FPS, ignoring dataflow architectural constraints.
    **The Rationale:** Engineers focus on compute capacity (26 TOPS) and ignore that spilling massive intermediate activations to host memory breaks the on-chip dataflow paradigm.
    **The Consequence:** Purchasing compute that can never be utilized because it is perpetually starved by a slow PCIe/host-memory bus.
  napkin_math: |
    - **Compute Required:** 50 GOPs/frame * 60 FPS = 3 TOPS (well within 26 TOPS limit).
    - **Memory Transfer:** 130 MB write + 130 MB read = 260 MB/frame spilled to host.
    - **Required Bandwidth:** 260 MB/frame * 60 FPS = 15.6 GB/s.
    - **Available Host Bandwidth:** 4.0 GB/s.
    - **Final Result:** **Maximum achievable FPS = 4.0 GB/s / 260 MB/frame = 15.38 FPS.**
