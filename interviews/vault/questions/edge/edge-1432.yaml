title: Hailo-8 Host Memory Streaming Bottleneck
scenario: A Hailo-8 dataflow accelerator processes a high-res 50 GOP model. 260 MB of feature maps spill to host memory per frame over a 4.0 GB/s bus. Target is 60 FPS, but it only hits 15 FPS.
question: Why does the Hailo-8 reach only about 15 FPS for the 50 GOP model despite needing only 3 TOPS at 60 FPS?
details:
  realistic_solution: The system is heavily memory-bandwidth bound rather than compute-bound. Because the Hailo-8 lacks local DRAM, all intermediate feature map traffic is constrained by the 4.0 GB/s host connection, which starves the compute units.
  common_mistake: |
    **The Pitfall:** Assuming massive TOPS equates directly to high FPS, ignoring dataflow architectural constraints.
    **The Rationale:** Engineers focus on compute capacity (26 TOPS) and ignore that spilling massive intermediate activations to host memory breaks the on-chip dataflow paradigm.
    **The Consequence:** Purchasing compute that can never be utilized because it is perpetually starved by a slow PCIe/host-memory bus.
  napkin_math: |
    1. **Assumptions & Constraints:** 50 GOPs/frame, 130 MB write + 130 MB read per frame = 260 MB/frame spilled. Host bandwidth = 4.0 GB/s.
    2. **Calculations:** Required bandwidth for 60 FPS = 260 MB/frame * 60 FPS = 15.6 GB/s. Actual max FPS = 4.0 GB/s / 260 MB/frame = 15.38 FPS.
    3. **Conclusion & Interpretation:** **Result: 15.38 FPS maximum.** The PCIe/host memory bus strictly chokes the accelerator, leaving compute units idle. **System Status: Interconnect-Bandwidth-Bound.**
