title: The Data Bottleneck
scenario: You've highly optimized and quantized a neural network to fit entirely within the 4MB on-chip
  SRAM of an edge microcontroller with a powerful DSP. However, despite the model fitting perfectly and
  the DSP running at a high clock frequency, its inference latency is still much higher than your theoretical
  calculations based purely on FLOPs. What's a likely bottleneck, and how would you diagnose it?
question: "What's a likely bottleneck, and how would you diagnose it?"
details:
  realistic_solution: The likely bottleneck is **memory bandwidth**, specifically the **internal memory
    bandwidth** of the SRAM or the bandwidth between the DSP and the SRAM. Even if data resides in fast
    on-chip memory, the rate at which the DSP can *access* that data might be insufficient for the computational
    throughput it can achieve. Convolutional layers, for instance, involve frequent reads of weights and
    activations, and if the memory interface cannot feed the DSP's ALUs fast enough, the DSP will stall,
    waiting for data. This is a common characteristic of compute-bound tasks becoming memory-bound due
    to inefficient data movement.
  common_mistake: '"The DSP isn''t fast enough" or "The model is still too large." While these can be
    issues, fitting the model in SRAM suggests a different problem.'
  napkin_math: A DSP running at 500MHz might have 4 MAC units, achieving 2 GMAC/s. If each MAC operation
    requires 2 bytes (INT8 weight + INT8 activation) and writes 1 byte (INT32 accumulator), this is 5
    bytes/MAC. For 2 GMAC/s, it needs 10 GB/s of memory bandwidth. A 4MB SRAM might have an internal bus
    running at 200MHz with a 64-bit width, yielding 1.6 GB/s. This stark mismatch indicates a memory bottleneck.
