title: Impact Assessment for Autonomous Medical Triage on Edge
scenario: A hospital system is deploying an ML triage assistant on Jetson Orin devices in emergency waiting rooms. The model classifies patient urgency (1-5 scale) based on vital signs and symptom text. An AI impact assessment must be conducted prior to deployment.
question: What components and quantitative thresholds must the AI impact assessment include before deploying the hospital triage assistant?
details:
  realistic_solution: 'Required impact assessment components: (1) Failure mode analysis: enumerate failure modes (misclassification by urgency level) and their clinical consequences. (2) Quantitative safety thresholds: sensitivity for true urgency-5 cases ≥ 99.5% (missed critical patient), specificity ≥ 85%. Evaluated on prospective hold-out from deployment hospital. (3) Subgroup performance audit: evaluate by age, sex, language, ethnicity. Maximum performance gap: ≤3pp sensitivity across demographic groups for urgency 4-5. (4) Distribution shift plan: define the feature drift detection threshold that triggers human-override mode. (5) Human oversight requirements: model serves as decision support, not autonomous decision-maker.'
  common_mistake: |
    **The Pitfall:** Treating the impact assessment as a qualitative documentation exercise.
    **The Rationale:** Candidates list potential harms without specifying measurement methods or concrete acceptance thresholds.
    **The Consequence:** No actionable safety guarantee is provided, exposing the hospital to catastrophic liability and patient harm.
  napkin_math: |
    1. **Sample Size for Sensitivity:** To prove 99.5% sensitivity with ±0.5pp margin at 95% CI: `n = (1.96)^2 * 0.995 * 0.005 / (0.005)^2 = 764` true urgency-5 cases minimum.
    2. **Collection Time:** Annual ED volume of 50K visits, 5% urgency-5 rate = 2,500 cases/year. 764 cases = **~4 months** of prospective data required.
    3. **Subgroup Audit:** 764 x 6 demographic cells minimum = 4,584 urgency-5 cases required to prove intersectional fairness, requiring nearly **2 years** of validation data.
