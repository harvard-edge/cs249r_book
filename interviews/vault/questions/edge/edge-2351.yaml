title: PagedAttention Fragmentation
scenario: A Jetson AGX Orin serves concurrent LLM requests using PagedAttention for its KV cache.
question: Evaluate the reduction in internal memory fragmentation if the KV page size is reduced from 256 tokens to 16 tokens.
visual:
  kind: svg
  path: edge-2351.svg
  alt: Bar chart contrasting the maximum wasted tokens between 256-token pages and 16-token pages.
  caption: Maximum internal fragmentation waste per sequence.
details:
  realistic_solution: Internal fragmentation occurs in the last allocated page. For a 256-token page, up to 255 tokens' worth of memory can be wasted if a sequence ends right after a page boundary. Reducing the block size to 16 tokens caps the maximum wasted memory per request to 15 tokens, significantly increasing effective concurrency capacity.
  common_mistake: |
    **The Pitfall:** Confusing internal fragmentation with external fragmentation.
    **The Rationale:** Candidates don't realize that internal fragmentation strictly occurs within the allocated blocks (wasted space at the end of a page).
    **The Consequence:** Failing to grasp why smaller page sizes directly increase effective concurrency capacity in PagedAttention systems.
  napkin_math: |
    - **Max waste (256-token page):** 255 tokens' worth of memory if a sequence ends right after a page boundary.
    - **Max waste (16-token page):** 15 tokens' worth of memory.
    - **Reduction:** 255 - 15 = 240 tokens saved per sequence.
    - **Final result:** **Reduces maximum internal fragmentation waste from 255 tokens to 15 tokens per sequence.**
