title: PagedAttention Fragmentation
scenario: A Jetson AGX Orin serves concurrent LLM requests using PagedAttention for
  its KV cache.
question: Evaluate the reduction in internal memory fragmentation if the KV page size
  is reduced from 256 tokens to 16 tokens.
visual:
  kind: svg
  path: edge-2351.svg
  alt: Bar chart contrasting the maximum wasted tokens between 256-token pages and
    16-token pages.
  caption: Maximum internal fragmentation waste per sequence.
details:
  realistic_solution: Internal fragmentation occurs in the last allocated page. For
    a 256-token page, up to 255 tokens' worth of memory can be wasted if a sequence
    ends right after a page boundary. Reducing the block size to 16 tokens caps the
    maximum wasted memory per request to 15 tokens, significantly increasing effective
    concurrency capacity.
  common_mistake: Confusing internal fragmentation (waste within a block) with external
    fragmentation (contiguous memory layout limits).
  napkin_math: 255 tokens wasted vs 15 tokens wasted
