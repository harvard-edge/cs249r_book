title: Multi-Camera Streaming Edge Sizing
scenario: You are deploying a multi-camera real-time quality inspection system in a manufacturing facility
  using an on-premise edge server equipped with a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x,
  400 TOPS INT8, 75W). The system ingests uncompressed 1080p video streams at 60 FPS from 20 independent
  cameras to minimize compression latency. Evaluate the system's ability to handle this stream and calculate
  the required memory bandwidth and compute utilization for a feature extraction pipeline requiring 15
  GOPS per frame.
question: "Can one Cloud AI 100 handle 20 uncompressed 1080p60 camera streams for a 15 GOPS/frame feature extractor, and where is the bottleneck?"
details:
  realistic_solution: The correct approach is to first quantify the continuous data ingestion bandwidth
    to ensure the edge server's I/O and the accelerator's memory controller can sustain the stream without
    dropping frames. After verifying bandwidth, the candidate should calculate compute utilization, realizing
    that the AI 100 is significantly underutilized computationally, and suggest optimizing the ingestion
    pipeline to minimize power draw within the 75W envelope.
  common_mistake: Candidates often hyper-focus on the 400 TOPS compute capacity while ignoring the continuous
    memory bandwidth required for uncompressed streaming data. They may also incorrectly assume that the
    32 GB memory capacity is the primary constraint rather than data transfer rates over the PCIe bus
    or LPDDR4x bandwidth.
  napkin_math: '1 frame = 1920 * 1080 * 3 bytes = 6.22 MB. Bandwidth for 20 cameras at 60 FPS: 6.22 MB/frame
    * 60 * 20 = 7.46 GB/s (easily fits within PCIe Gen4 x8/x16 and LPDDR4x limits). Compute required:
    15 GOPS/frame * 60 FPS * 20 cameras = 18,000 GOPS = 18 TOPS. 18 TOPS is merely 4.5% of the 400 TOPS
    INT8 capacity provided by the Qualcomm Cloud AI 100, leaving massive headroom for downstream models.'
