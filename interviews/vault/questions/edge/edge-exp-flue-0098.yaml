title: Google Coral INT8 Throughput and Energy Calculation
scenario: You are deploying a vision CNN on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor).
  The model requires 200 million INT8 MAC operations per inference and all operators are fully quantized
  to INT8 to avoid host CPU fallback. Assuming 100% systolic array utilization, calculate the theoretical
  maximum inferences per second (IPS) and the energy consumed per inference in millijoules.
details:
  realistic_solution: First, convert the advertised TOPS to MACs per second, recognizing that 4 TOPS INT8
    translates to 2 Tera-MACs/sec. Divide this compute capacity by the model's per-inference MAC requirement
    to find the maximum IPS. Finally, divide the steady-state power consumption (2 Joules/sec) by the
    IPS to determine the energy cost per inference.
  common_mistake: Candidates frequently forget that 1 MAC equals 2 operations, incorrectly using the 4
    TOPS figure directly as 4 Tera-MACs. They also often struggle to link power (Watts) with throughput
    to calculate energy per inference.
  napkin_math: '1. Compute capacity: 4 TOPS = 4e12 Ops/sec = 2e12 MACs/sec.

    2. Model cost: 200 million MACs = 2e8 MACs/inference.

    3. Theoretical IPS: (2e12 MACs/sec) / (2e8 MACs/inference) = 10,000 inferences/sec.

    4. Energy per inference: 2W = 2 Joules/sec. (2 J/sec) / 10,000 inf/sec = 0.0002 Joules = 0.2 millijoules/inference.'
