title: Jetson Orin OOM During Batch Fine-Tuning
scenario: A robotics team is deploying a continuous learning pipeline on an NVIDIA Jetson Orin (32 GB
  LPDDR5, 60W TDP, Ampere GPU + DLA accelerator). The model parameters consume 14 GB, the optimizer states
  consume 8 GB, and OS overhead is 2 GB. When using gradient accumulation with a micro-batch size of 1
  for 16 steps, training runs smoothly. However, when they switch to a standard batch size of 16 to leverage
  the 275 TOPS INT8 compute, the system triggers the Linux OOM killer during the first forward pass. Analyze
  why the system runs out of memory in the second scenario despite the unified memory architecture, assuming
  each sample's activations require 750 MB.
details:
  realistic_solution: In standard training with a batch size of 16, the system must keep all intermediate
    activations in memory until the backward pass computes the gradients. With gradient accumulation,
    activations are only stored for 1 sample at a time. The OOM happens because the unified LPDDR5 memory
    is exhausted by the activations of 16 samples stored simultaneously, leading to OS-level eviction.
  common_mistake: Candidates often only account for weights, optimizer states, and gradients, completely
    missing the memory spike caused by saving intermediate activations for backpropagation.
  napkin_math: 'Orin Total Memory = 32 GB. Fixed Memory = 14 GB (Weights) + 8 GB (Optimizer) + 2 GB (OS)
    = 24 GB. Available = 8 GB. Scenario 1 (Micro-batch 1): Peak memory = 24 GB + 0.75 GB (Activations)
    = 24.75 GB (Fits). Scenario 2 (Batch 16): Peak memory = 24 GB + (0.75 GB * 16) = 24 GB + 12 GB = 36
    GB. 36 GB > 32 GB, triggering OOM killer.'
