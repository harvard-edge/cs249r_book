title: 'Model Size Estimation: Realize Minimum Hardware Spec for Multi-Model Hailo Deployment'
scenario: You are sizing the minimum host system memory for running 3 models sequentially on a Hailo-8 accelerator. Models include pedestrian detection (8MB HEF), vehicle classification (12MB HEF), and traffic sign recognition (6MB HEF). The host CPU handles I/O, and the Hailo-8 has 32MB on-chip SRAM.
question: How much host RAM is needed, do the three HEF models fit in Hailo-8 SRAM, and what is the model-switching time via PCIe?
details:
  realistic_solution: 'Hailo-8 on-chip: 32MB SRAM → fits each model one at a time. Models loaded to Hailo via PCIe one at a time. Host system RAM must hold all models and buffers. Total host RAM: 571.7MB. Minimum: 1GB RAM host. Model switching: load 12MB HEF via PCIe (5GB/s) takes 2.4ms switching time.'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo-8's on-chip SRAM can hold all three models simultaneously.
    **The Rationale:** Candidates treat SRAM like a hard drive, forgetting it only holds the current model's weights/activations for the active inference.
    **The Consequence:** The system crashes due to insufficient host RAM to stage the models for rapid PCIe swapping.
  napkin_math: |
    - Models size (HEF): 8 + 12 + 6 = 26MB.
    - Input buffers: 3 * (640x640x3) = 3.7MB.
    - Post-processing: 3 * 10MB = 30MB.
    - OS/Drivers: 512MB.
    - Total host RAM: 512 + 26 + 3.7 + 30 = 571.7MB. (Requires **1GB Host RAM**).
    - Hailo-8 limit check: 32MB > 12MB (Largest model fits on-chip).
    - PCIe switch latency: 12MB / 5GB/s = **2.4ms overhead per switch**.
