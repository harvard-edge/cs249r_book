title: Dynamic Batching Latency Spikes on Jetson Orin
scenario: You are deploying a high-speed defect detection model on an NVIDIA Jetson Orin edge device processing
  a 120 FPS camera feed. The platform features 32 GB LPDDR5 memory, a 60W TDP, and an Ampere GPU + DLA
  accelerator capable of 275 TOPS INT8. When switching from a static batch size of 1 to a dynamic batching
  policy with a maximum batch size of 4 and a timeout of 30ms, you observe that overall throughput improves,
  but the 99th percentile end-to-end latency spikes from 15ms to 50ms. Explain the components of this
  latency increase.
question: "Why does dynamic batching to batch size 4 with a 30 ms timeout raise p99 latency from 15 ms to 50 ms on the 120 FPS Jetson Orin pipeline?"
details:
  realistic_solution: The latency increase is primarily driven by the queueing delay required to form
    the batch, not just the compute time. At 120 FPS, frames arrive sequentially. The first frame must
    sit in memory waiting for subsequent frames to arrive before the batch can be dispatched to the Ampere
    GPU or DLA. While the Jetson Orin's 275 TOPS INT8 capacity processes the batch of 4 much faster than
    4 sequential single batches, the wait time for the earliest frame dominates its total end-to-end latency.
  common_mistake: Candidates often attribute the latency spike solely to memory bandwidth bottlenecks
    on the 32 GB LPDDR5 or increased compute time on the GPU, ignoring the temporal nature of edge data
    ingestion. They fail to account for the buffer accumulation time required to form the batch when inputs
    arrive sequentially.
  napkin_math: Frame arrival interval = 1000ms / 120 FPS = 8.33ms per frame. Queueing delay for the first
    frame to wait for a batch of 4 = 3 * 8.33ms = 25ms. If single-batch compute latency is 15ms, batch=4
    compute time might be 20ms due to the Orin's parallel efficiency. Total latency for the first frame
    = Queueing Delay (25ms) + Compute Time (20ms) + Memory Transfer Overhead (5ms) = 50ms.
