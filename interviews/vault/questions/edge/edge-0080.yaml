title: The High-Altitude Edge AI Failure
scenario: Your TI TDA4VM-based drone inspection system works flawlessly at your sea-level test facility in Houston. You deploy it for power line inspection in the Colorado Rockies at 3,500 meters (11,500 feet) elevation. The system overheats and throttles within 8 minutes of flight, despite air temperature being 10°C cooler than Houston. At sea level in Houston (35°C, humid), the system runs indefinitely.
question: How is a cooler high-altitude environment causing worse thermal performance?
details:
  realistic_solution: 'Air density at 3,500m is only ~70% of sea-level density. This directly reduces convective cooling efficiency by ~24%, causing the thermal resistance to jump from 1.5 to 1.97 °C/W. Additionally, the drone''s motors must spin faster in the thin air to maintain lift, increasing total thermal load to the adjacent board. This combination pushes the junction temperature over 95°C.'
  common_mistake: |
    **The Pitfall:** Overlooking atmospheric physics in thermal design.
    **The Rationale:** Engineers assume lower ambient temperature (e.g., 25°C vs 35°C) automatically means better cooling, ignoring air density.
    **The Consequence:** They might attribute failure to simple workload anomalies ("The drone is working harder") or UV intensity, failing to upgrade the cooling solution for thin air environments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Altitude = 3,500m. Air density = 70% of sea-level.
       - Sea-level base power = 20W, Thermal Resistance (R) = 1.5°C/W.
       - Convective cooling drops 24% at altitude.
       - Motor heat increases power load to 36W. Threshold = 95°C.
    2. **Calculations:**
       - Sea-level Junction = 35°C + (20W * 1.5°C/W) = 65°C.
       - Altitude R = 1.5 / (1 - 0.24) = 1.97°C/W.
       - Altitude Junction = 25°C + (36W * 1.97°C/W) = 25°C + 70.92°C = ~96°C.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Failure**. The combination of reduced air density (raising thermal resistance) and increased motor load pushes the junction temperature to 96°C, causing catastrophic failure despite cooler ambient air.
