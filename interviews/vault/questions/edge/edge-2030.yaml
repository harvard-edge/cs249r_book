title: Optimizing Chained Inference on Google Coral Edge TPU for Real-time Anomaly Detection
scenario: 'You are deploying a security camera system that uses a compound AI system on an edge TPU for real-time anomaly detection. The system comprises two chained INT8 models: an object detection model (Model A) identifies objects of interest, and a pose estimation model (Model B) analyzes human behavior based on Model A''s output. The requirement is to process video streams at 30 FPS, necessitating an end-to-end latency budget of approximately 33ms per frame. Initial profiling reveals the total latency is consistently around 60ms per frame when both models are active, with individual inferences running efficiently (Model A: 10ms, Model B: 15ms).'
question: What bottlenecks beyond raw TPU inference explain the 60 ms frame latency, and how would you optimize them to meet the 33 ms target?
details:
  realistic_solution: 'The likely bottleneck is the data pipeline between Model A and Model B, specifically data transfer and CPU-bound pre-processing. A realistic solution involves: 1) Profiling data serialization and memory copies. 2) Utilizing Zero-Copy mechanisms if outputs can directly inform inputs. 3) Optimizing pre-processing (cropping, resizing) via OpenCV SIMD instructions or hardware offload.'
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing individual model inference times or reducing model size.
    **The Rationale:** Candidates neglect the significant overhead introduced by data transfer between chained models and CPU-bound pre/post-processing steps.
    **The Consequence:** Model optimizations yield negligible end-to-end improvements because the CPU and memory bus remain the actual bottlenecks.
  napkin_math: |
    * Target latency = 1000ms / 30 FPS ≈ 33.3ms.
    * Current total latency = 60ms.
    * Inference time (Model A + B) = 10ms + 15ms = 25ms.
    * Current overhead (pre/post-processing, data transfer) = 60ms - 25ms = 35ms.
    * Required overhead reduction = 35ms - (33.3ms - 25ms) = 26.7ms.
    * If zero-copy transfer saves 15ms, and optimized OpenCV cropping saves 10ms, total savings = 25ms.
    * **New total latency = 60ms - 25ms = 35ms. Further aggressive quantization or parallelization is needed to hit 33.3ms.**
