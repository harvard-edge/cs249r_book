title: The TensorRT Engine Portability Trap
scenario: You compiled a TensorRT INT8 engine on your development Jetson AGX Orin (64 GB, Ampere GPU).
  You copy the engine file to a production Jetson Orin NX (8 GB, same Ampere architecture). Inference
  crashes immediately. The GPU architecture is the same. What went wrong?
question: "What went wrong?"
details:
  realistic_solution: 'TensorRT engines are not portable between different GPU configurations, even within
    the same architecture family. The engine encodes hardware-specific optimizations at compile time:
    (1) CUDA core count — the AGX Orin has 2048 CUDA cores; the Orin NX has 1024. Kernel launch configurations
    (thread blocks, grid dimensions) are baked into the engine for the specific core count. (2) Memory
    bandwidth — the AGX has 204.8 GB/s; the NX has 102.4 GB/s. TensorRT''s auto-tuner selects different
    kernel implementations based on the compute-to-bandwidth ratio. (3) DLA availability — if the engine
    was compiled with DLA layers on the AGX (which has 2 DLAs), but the NX has different DLA capabilities,
    those layers fail. (4) TensorRT version — even minor version differences can break engine compatibility.
    The fix: compile engines on the target hardware, or use ONNX as the portable format and compile on
    each device at first boot (caching the result).'
  common_mistake: '"The model is too large for 8 GB." The model is only 12 MB — memory isn''t the issue.'
  napkin_math: 'ONNX model: 12 MB (portable). TensorRT compilation on Orin NX: ~45 seconds at first boot.
    Cached engine: loads in <1 second on subsequent boots. Fleet of 1000 devices: each compiles its own
    engine once. Total fleet compilation time: 45s × 1000 = 12.5 hours if sequential, but each device
    compiles independently at boot.'
