title: The TensorRT Engine Portability Trap
scenario: You compiled a TensorRT INT8 engine on your development Jetson AGX Orin. You copy the engine file to a production Jetson Orin NX. Inference crashes immediately despite both sharing the Ampere architecture.
question: "What went wrong with the TensorRT engine migration?"
details:
  realistic_solution: 'TensorRT engines are not portable between different GPU configurations, even within the same architecture family. The engine encodes hardware-specific optimizations at compile time: (1) CUDA core count — the AGX Orin has 2048 CUDA cores; the Orin NX has 1024. Kernel launch configurations (thread blocks, grid dimensions) are baked into the engine for the specific core count. (2) Memory bandwidth — the AGX has 204.8 GB/s; the NX has 102.4 GB/s. TensorRT''s auto-tuner selects different kernel implementations based on the compute-to-bandwidth ratio. (3) DLA availability — if the engine was compiled with DLA layers on the AGX (which has 2 DLAs), but the NX has different DLA capabilities, those layers fail. (4) TensorRT version — even minor version differences can break engine compatibility. The fix: compile engines on the target hardware, or use ONNX as the portable format and compile on each device at first boot (caching the result).'
  common_mistake: |
    **The Pitfall:** Assuming the failure is due to the model being too large for the 8 GB Orin NX memory.
    **The Rationale:** Candidates see the memory size difference (64 GB vs 8 GB) and incorrectly assume an Out-Of-Memory (OOM) error.
    **The Consequence:** They miss the fundamental lack of portability of TensorRT engines across different hardware configurations, even within the same architecture family.
  napkin_math: |
    *   **Model Size:** ONNX model is 12 MB (portable).
    *   **Compilation Time:** TensorRT compilation on Orin NX takes ~45 seconds at first boot.
    *   **Cache Load:** Cached engine loads in <1 second on subsequent boots.
    *   **Fleet Scaling:** For a fleet of 1000 devices, each compiles its own engine once.
    *   **Result:** While sequential compilation would take 12.5 hours, **each device compiles independently and concurrently at boot in 45 seconds**.
