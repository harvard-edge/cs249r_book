title: Encoder-Decoder Selection for NLU on Google Coral Edge TPU
scenario: Your team is tasked with deploying a real-time Natural Language Understanding
  (NLU) model on embedded devices, specifically utilizing the Google Coral Edge TPU.
  The Coral Edge TPU has a processing capability of 4 TOPS (Trillions Operations Per
  Second) for INT8 operations, with a strict power budget of 2W, and *only* supports
  INT8 quantization. The NLU task involves classifying short text snippets (e.g.,
  voice commands, sensor readings). Evaluate the architectural tradeoffs between encoder-only,
  decoder-only, and full encoder-decoder models in terms of performance, latency,
  and power consumption, considering the specific constraints of the Google Coral
  Edge TPU.
question: Which architecture—encoder-only, decoder-only, or encoder-decoder—fits Coral
  Edge TPU NLU best under 4 TOPS INT8 and 2W, and why?
details:
  realistic_solution: For this constrained edge environment and NLU task, an encoder-only
    architecture (e.g., highly compressed BERT variants like MobileBERT, TinyBERT,
    or custom-designed shallow encoders) is generally the most realistic solution.
    These models are optimized for understanding and representation, which aligns
    well with classification tasks. They tend to have fewer parameters and computational
    requirements than decoder-only or full encoder-decoder models, making them more
    amenable to aggressive INT8 quantization and fitting within the 4 TOPS/2W budget.
    Solutions should emphasize pre-training knowledge distillation into smaller architectures,
    followed by task-specific fine-tuning and rigorous performance profiling on the
    target hardware.
  common_mistake: A common mistake is attempting to directly deploy larger, general-purpose
    transformer architectures (especially decoder-only or full encoder-decoder models)
    without aggressive architectural pruning or specific quantization awareness. This
    often leads to models exceeding the 4 TOPS INT8 processing capability or the 2W
    power budget, resulting in unacceptable latency or device instability. Overlooking
    the 'INT8 only' constraint and trying to deploy models requiring FP16/FP32 calculations
    is another critical error.
  napkin_math: 'Given the Coral Edge TPU''s 4 TOPS INT8 capacity, let''s estimate
    for an NLU model. If a small encoder-only model requires 0.5 TOPS for a single
    inference, it could theoretically achieve an inference rate of 4 TOPS / 0.5 TOPS/inference
    = 8 inferences per second (125ms latency per inference). For a model that requires,
    say, 2 TOPS, the rate drops to 2 inferences per second (500ms latency). Now consider
    power: if an inference takes 500ms (0.5s) and the device consumes 2W during that
    operation, each inference would consume 1 Joule (0.5s * 2W). If the application
    demands 4 inferences per second, the average power consumption would exceed 2W
    (as 4 inferences * 1 Joule/inference = 4 Joules total in one second, requiring
    4W average power), violating the device''s thermal and power limits. This highlights
    the need for extremely efficient models where total INT8 operations are significantly
    less than 4 TOPS to allow for acceptable latency and remain within the power envelope.'
