title: Encoder-Decoder Selection for NLU on Google Coral Edge TPU
scenario: Your team is tasked with deploying a real-time Natural Language Understanding (NLU) model on embedded devices, specifically utilizing the Google Coral Edge TPU. The Coral Edge TPU has a processing capability of 4 TOPS for INT8 operations, with a strict power budget of 2W, and *only* supports INT8 quantization. The NLU task involves classifying short text snippets.
question: Which architecture (encoder-only, decoder-only, or encoder-decoder) fits Coral Edge TPU NLU best under 4 TOPS INT8 and 2W, and why?
details:
  realistic_solution: For this constrained edge environment and NLU task, an encoder-only architecture (e.g., highly compressed BERT variants like MobileBERT, TinyBERT, or custom-designed shallow encoders) is generally the most realistic solution. These models are optimized for understanding and representation, which aligns well with classification tasks. They tend to have fewer parameters and computational requirements than decoder-only or full encoder-decoder models, making them more amenable to aggressive INT8 quantization and fitting within the 4 TOPS/2W budget. Solutions should emphasize pre-training knowledge distillation into smaller architectures, followed by task-specific fine-tuning and rigorous performance profiling on the target hardware.
  common_mistake: |
    **The Pitfall:** Attempting to deploy decoder-only or full encoder-decoder models without aggressive pruning.
    **The Rationale:** Candidates ignore the strict INT8 requirement or fail to realize that auto-regressive generation is far too heavy for a 4 TOPS/2W edge device.
    **The Consequence:** The model exceeds the thermal and power limits, causing device instability or completely failing to compile for the Coral TPU.
  napkin_math: |
    1. Coral Edge TPU capacity = 4 TOPS INT8.
    2. If a small encoder-only model requires 0.5 TOPS per inference, max rate = 4 TOPS / 0.5 TOPS = 8 inferences/sec (125ms latency).
    3. Power limit = 2W. If an inference takes 500ms (2 TOPS model) and the device consumes 2W, each inference uses 1 Joule (0.5s * 2W).
    4. For 4 inferences/sec, average power = 4 inferences * 1 Joule/inference = 4W, which violates the 2W limit.
    5. To maintain <2W, the model must be heavily optimized (e.g., **encoder-only < 0.5 TOPS**) to keep active duty cycles extremely low.
