title: Encoder-Decoder Selection for NLU on Google Coral Edge TPU
scenario: Your team is tasked with deploying a real-time Natural Language Understanding (NLU) model on embedded devices, specifically utilizing the Google Coral Edge TPU. The NLU task involves classifying short text snippets.
question: Which architecture (encoder-only, decoder-only, or encoder-decoder) fits Coral Edge TPU NLU best under 4 TOPS INT8 and 2W, and why?
details:
  realistic_solution: An encoder-only architecture (e.g., highly compressed MobileBERT) is the optimal topological choice. Encoder-only models excel at bidirectional context representation required for classification. They possess drastically fewer parameters than auto-regressive decoders, making them highly amenable to aggressive INT8 Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT). This strict adherence to INT8 enables operation within the 4 TOPS and 2W thermal envelope.
  common_mistake: |
    **The Pitfall:** Attempting to deploy decoder-only or full encoder-decoder models without aggressive pruning.
    **The Rationale:** Candidates ignore the strict INT8 requirement or fail to realize that auto-regressive generation is computationally infeasible for a 4 TOPS/2W edge device.
    **The Consequence:** The model exceeds the thermal and power limits, causing device instability or completely failing to compile for the Coral TPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coral Edge TPU: 4 TOPS INT8, 2W power limit.
       - Target task: Classification (NLU).
    2. **Calculations:**
       - Max inference rate at 0.5 TOPS/inference = 4 TOPS / 0.5 TOPS = 8 inferences/sec.
       - Average power = Joules / sec. 8 inferences/sec * (0.125s * 2W) = 2W average power.
       - A decoder-only model requiring 2 TOPS takes 500ms, severely limiting duty cycle.
    3. **Conclusion & Interpretation:**
       - **The architecture must be an encoder-only model under 0.5 TOPS to maintain the 2W power budget. Result: Power-Bound.**
