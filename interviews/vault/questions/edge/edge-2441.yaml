title: Diagnosing Attention Collapse in INT8 ViTs
scenario: Deploying a Vision Transformer on an edge device using pure INT8 quantization causes top-1 accuracy to crash from 82% to 15%.
question: Analyze the specific mathematical operation in the transformer architecture that fails under uniform INT8 and propose an architectural precision override.
details:
  realistic_solution: 'The collapse occurs entirely in the Softmax operation of the attention mechanism. Softmax outputs a highly skewed distribution where a few values approach 1.0 and most are near 0.0. Uniform INT8 quantization squashes these crucial small probabilities to exactly zero, destroying spatial correlation. The solution is hybrid quantization: computing the Softmax and QxK matrix multiply in FP16, while keeping linear projections in INT8.'
  common_mistake: |
    **The Pitfall:** Blaming the activation function (like GELU) broadly.
    **The Rationale:** Candidates guess generic non-linearities without understanding the specific numerical distributions in Transformers.
    **The Consequence:** Implementing unnecessary fixes while failing to address the Softmax distribution squashing.
  napkin_math: |
    1. **Assumptions & Constraints:** Uniform INT8 quantization has 255 discrete bins. Softmax output range is strictly [0.0, 1.0].
    2. **Calculations:** Step size for [0.0, 1.0] over 255 bins = 1.0 / 255 $\approx$ 0.0039.
    3. **Conclusion & Interpretation:** **Softmax probabilities < 0.0039 quantize to exactly zero. Precision-Bound failure destroys spatial correlation.**
