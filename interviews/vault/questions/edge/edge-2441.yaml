title: Diagnosing Attention Collapse in INT8 ViTs
scenario: Deploying a Vision Transformer on a Jetson AGX Orin using pure INT8 quantization
  causes top-1 accuracy to crash from 82% to 15%.
question: Analyze the specific mathematical operation in the transformer architecture
  that fails under uniform INT8 and propose an architectural precision override.
details:
  realistic_solution: 'The collapse occurs entirely in the Softmax operation of the
    attention mechanism. Softmax outputs a highly skewed distribution where a few
    values approach 1.0 and most are near 0.0. Uniform INT8 quantization squashes
    these crucial small probabilities to exactly zero, destroying spatial correlation.
    The solution is hybrid quantization: computing the Softmax and QxK matrix multiply
    in FP16, while keeping linear projections in INT8.'
  common_mistake: Blaming the activation function (like GELU) broadly, rather than
    precisely identifying Softmax distribution squashing as the root cause in Transformers.
  napkin_math: Softmax values < 1/255 (0.0039) quantize to 0, zeroing out attention
    mass.
