title: Edge New 0008
scenario: An Orin module runs a ResNet-style network. Applying 2:4 sparsity with INT8 quantization on
  supported Tensor Cores doubles peak throughput compared to dense INT8. Analyze the execution tradeoff
  given a memory bandwidth of 200GB/s.
details:
  realistic_solution: 2:4 sparsity logically drops half the weights, doubling the effective compute throughput
    on Ampere architecture Tensor Cores and halving the required memory fetches for weights. The tradeoff
    is a potential drop in accuracy requiring retraining. However, if the workload is heavily memory-bound,
    cutting weight size by 50% provides a linear speedup. If compute-bound, doubling the TOPS ensures
    the same linear speedup. It is a win-win structurally.
  common_mistake: Assuming 2:4 sparsity only benefits memory size without understanding that modern Tensor
    Cores natively skip the zero-computations, doubling TOPS.
  napkin_math: 'Dense INT8: 10MB weights, 100 GOPs. Mem time: 10MB/200GBs = 0.05ms. Compute: 100/275 =
    0.36ms. Sparse INT8: 5MB weights, 50 GOPs (effective). Mem: 0.025ms. Compute: 50/275 = 0.18ms. Total
    time halves from 0.36ms to 0.18ms.'
