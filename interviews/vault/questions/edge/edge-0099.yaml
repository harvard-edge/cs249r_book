title: The Deterministic Inference Mirage
scenario: 'Your medical device runs a diagnostic neural network on an NXP i.MX 8M Plus (Cortex-A53 + Ethos-U65 NPU, 2 TOPS INT8). FDA 510(k) submission requires you to prove that inference time is deterministic — the same input must always produce the same execution time. You run 100,000 inferences with the identical input tensor. The histogram shows a bimodal distribution: 95% of runs at 4.1ms, 5% at 6.8ms.'
question: What is causing the 2.7ms timing variation on identical inputs?
details:
  realistic_solution: |
    The bimodal distribution reveals system-level interference, not NPU non-determinism. The 5% slow cases correlate with DRAM refresh cycles (LPDDR4 requires periodic full refreshes) and Linux kernel timer interrupts preempting the NPU driver's DMA completion handler. The fix requires running the NPU in standalone mode with dedicated SRAM to eliminate DRAM dependency, and utilizing a tickless kernel (CONFIG_NO_HZ_FULL).
  common_mistake: Assuming the NPU hardware is inherently non-deterministic or blaming the model architecture, rather than diagnosing OS scheduling jitter and memory subsystem refresh collisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR4 refresh every 64ms (full bank ~400 µs)
    - Kernel tick interrupt every 4ms (~100-500 µs jitter)
    - ~5,000 DRAM accesses per inference

    **Calculations:**
    - DRAM full bank refresh blocks access for ~400 µs
    - Kernel interrupt preemption delays DMA handler by ~1-2 ms
    - Total system interference = ~2.7 ms latency spike

    **Conclusion & Interpretation:**
    - **Result: 2.7 ms Variation (Memory-Bandwidth-Bound)**. Migrating weights/activations to dedicated SRAM and using a tickless kernel guarantees deterministic latency by eliminating DRAM and OS jitter.
