title: The Sensor's Front Door Problem
scenario: Your team is developing an autonomous quality inspection drone using a Jetson AGX Orin. It connects
  to six high-resolution cameras that stream uncompressed video data simultaneously. The software team
  reports that they are consistently seeing corrupted or dropped frames *before* the data even reaches
  their processing pipeline in main memory. Given the typical hardware specs for an edge system, identify
  the most likely component causing this data loss.
details:
  realistic_solution: The most likely bottleneck is the camera sensor interconnect, typically a MIPI CSI-2
    bus. The aggregate bandwidth of all six cameras is likely exceeding the bandwidth of the physical
    lanes connecting the camera sensors to the main system-on-a-chip (SoC). The data is being dropped
    before it can even be written to the much faster LPDDR5 main memory.
  common_mistake: Engineers often focus on main memory (DRAM) bandwidth or compute (TOPS) as the primary
    system bottlenecks. They forget that for data to be processed, it must first travel from the sensor
    to the SoC over a dedicated physical interconnect, which often has a much lower bandwidth than the
    main memory system.
  napkin_math: 'Assume each camera runs 1080p @ 60FPS RGB: 1920 * 1080 * 3 bytes * 60 = 373 MB/s per camera.
    For 6 cameras: 6 * 373 = 2.24 GB/s. A typical 4-lane MIPI CSI-2 interface maxes out at ~2.5 GB/s.
    If the cameras run at higher specs (e.g., 4K @ 30FPS = 746 MB/s each * 6 = 4.47 GB/s), they physically
    exceed the CSI-2 bus limit, dropping frames.'
  options:
  - The LPDDR5 main memory bandwidth is too low to handle six streams.
  - The Jetson's GPU is not powerful enough to process the incoming frames.
  - The MIPI CSI-2 camera interconnect bandwidth is saturated.
  - The NVMe SSD is too slow to store the incoming video frames.
  correct_index: 2
