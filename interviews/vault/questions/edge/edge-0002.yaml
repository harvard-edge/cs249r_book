title: The Sensor's Front Door Problem
scenario: Your team is developing an autonomous quality inspection drone using a Jetson AGX Orin. It connects to six high-resolution cameras that stream uncompressed video data simultaneously. The software team reports that they are consistently seeing corrupted or dropped frames before the data even reaches their processing pipeline in main memory.
question: What is the most likely component causing the dropped or corrupted frames before they reach main memory?
details:
  realistic_solution: The most likely bottleneck is the camera sensor interconnect, typically a MIPI CSI-2 bus. The aggregate bandwidth of all six cameras is likely exceeding the bandwidth of the physical lanes connecting the camera sensors to the main system-on-a-chip (SoC). The data is being dropped before it can even be written to the much faster LPDDR5 main memory.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on main memory (DRAM) or GPU TOPS as the bottleneck.
    **The Rationale:** Engineers assume compute or main memory bandwidth are the only limits on an edge device.
    **The Consequence:** They overlook the physical interconnect limits (like MIPI CSI-2), leading to architectural designs that can never physically ingest the required sensor data.
  napkin_math: |
    1. Assume each camera runs 1080p @ 60FPS RGB: 1920 × 1080 × 3 bytes × 60 = 373 MB/s per camera.
    2. For 6 cameras: 6 × 373 = 2.24 GB/s.
    3. A typical 4-lane MIPI CSI-2 interface maxes out at ~2.5 GB/s.
    4. **If cameras run at higher specs (e.g., 4K @ 30FPS = 746 MB/s each × 6 = 4.47 GB/s), they physically exceed the CSI-2 bus limit, dropping frames before reaching memory.**
  options:
  - The LPDDR5 main memory bandwidth is too low to handle six streams.
  - The Jetson's GPU is not powerful enough to process the incoming frames.
  - The MIPI CSI-2 camera interconnect bandwidth is saturated.
  - The NVMe SSD is too slow to store the incoming video frames.
  correct_index: 2
