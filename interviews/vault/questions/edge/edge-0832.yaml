title: Designing Privacy-Preserving Fleet-Wide Analytics
scenario: You are deploying a new on-device vision model to 5 million smart doorbells. You need to monitor
  the global False Positive Rate (FPR) for a new 'package detected' class. Strict privacy policies prohibit
  uploading raw images or individual inference logs. Your task is to evaluate a federated analytics approach
  to estimate the global FPR distribution while ensuring Local Differential Privacy (LDP) and strictly
  limiting daily uplink bandwidth to under 5KB per device.
question: "How would you estimate the global package-detection FPR under LDP while keeping each doorbell under 5KB/day of uplink?"
details:
  realistic_solution: Implement a Secure Aggregation protocol combined with Local Differential Privacy.
    Devices compute a local daily FPR, apply Randomized Response to their quantized metrics, and use a
    lightweight SecAgg protocol to mask updates. The server only sees the aggregated, noisy global sum.
  common_mistake: Proposing complex Secure Multi-Party Computation (SMPC) protocols which drastically
    exceed the 5KB/day bandwidth limit, or relying on Centralized Differential Privacy which requires
    trusting the aggregation server with raw metrics.
  napkin_math: Local FPR quantized to 8 bins (1 byte). SecAgg masking overhead (e.g., using pairwise DH
    keys with 50 neighbors) requires ~50 * 32 bytes = 1.6KB. Total payload per device per day is ~1.6KB,
    safely under the 5KB budget. Global noise variance scales as O(1/sqrt(N)), yielding highly accurate
    global FPR estimates across 5M devices despite individual noise.
