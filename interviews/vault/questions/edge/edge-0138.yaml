title: Crossing the Ridge Point
scenario: An engineer profiles a model on a Jetson AGX Orin and finds its Arithmetic Intensity is 2,000
  Ops/Byte. The Orin's hardware ridge point is approximately 1,342 Ops/Byte. Based on these numbers, identify
  the primary performance bottleneck for this model.
details:
  realistic_solution: The roofline model defines the relationship between Arithmetic Intensity, memory
    bandwidth, and peak compute. The 'ridge point' is the AI where the system transitions from being memory-bound
    to compute-bound. Since the model's AI (2,000 Ops/Byte) is greater than the hardware's ridge point
    (1,342 Ops/Byte), the model's performance is limited by the speed of the compute units, not the memory
    system.
  common_mistake: 'A common misconception is thinking that a high Arithmetic Intensity (AI) means the
    model is memory-bound because it''s ''doing a lot of math''. The correct interpretation is the opposite:
    a high AI means the model performs many operations for each byte of data it fetches. If this AI is
    higher than the hardware''s ridge point, the system has enough memory bandwidth to feed the compute
    units, making the compute units themselves the bottleneck.'
  napkin_math: If Model AI > Hardware Ridge Point → Compute-Bound
  options:
  - The model is Memory-Bound.
  - The model is Compute-Bound.
  - The model is Network-Bound.
  - The model is Power-Bound.
  correct_index: 1
