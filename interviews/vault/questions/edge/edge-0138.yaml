title: Crossing the Ridge Point
scenario: An engineer profiles a model on a Jetson AGX Orin and finds its Arithmetic Intensity is 2,000 Ops/Byte. The Orin's hardware ridge point is approximately 1,342 Ops/Byte.
question: Is this model compute-bound or memory-bound on the Orin given 2,000 Ops/Byte versus a 1,342 Ops/Byte ridge point?
details:
  realistic_solution: The roofline model defines the relationship between Arithmetic Intensity, memory bandwidth, and peak compute. The 'ridge point' is the AI where the system transitions from being memory-bound to compute-bound. Since the model's AI (2,000 Ops/Byte) is greater than the hardware's ridge point (1,342 Ops/Byte), the model's performance is strictly limited by the speed of the compute units, not the memory system.
  common_mistake: |
    **The Pitfall:** Inverting the definition of arithmetic intensity.
    **The Rationale:** Candidates incorrectly assume a high AI means the model is memory-bound "because it's doing a lot of math" or confuse Ops/Byte with Bytes/Op.
    **The Consequence:** Misidentifying the system bottleneck and applying memory optimizations to a compute-bound model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Ridge Point: 1,342 Ops/Byte.
       - Model AI: 2,000 Ops/Byte.
    2. **Calculations:**
       - Condition: If Model AI > Hardware Ridge Point -> Compute-Bound.
       - Compare: 2,000 Ops/Byte > 1,342 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The model sits to the right of the ridge point on the roofline plot.
  options:
  - The model is Memory-Bound.
  - The model is Compute-Bound.
  - The model is I/O-Bound.
  - The model is Thermal-Bound.
  correct_index: 1
