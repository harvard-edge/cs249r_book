title: The Dark Silicon Enigma
scenario: You are designing an edge AI camera with an advanced SoC that has an 8-core CPU, a 4-core GPU,
  and a 4-core NPU. You write a brilliant pipeline that utilizes 100% of all three processors simultaneously
  to process video at 120 FPS. When you deploy it, the board immediately crashes and reboots. The power
  supply is perfectly adequate. What SoC physical limit did you violate?
question: "What SoC physical limit did you violate?"
details:
  realistic_solution: You hit the 'Dark Silicon' limit. Modern SoCs are designed with significantly more
    physical cores than their thermal or power delivery networks can support simultaneously. It is mathematically
    impossible to run the CPU, GPU, and NPU at 100% utilization without melting the silicon or causing
    localized voltage droop (brownouts) that trigger an immediate hardware reset. The architecture relies
    on the fact that while the NPU is working, the CPU and GPU are mostly idle (dark).
  common_mistake: '"Believing that because a chip *has* transistors for CPUs, GPUs, and NPUs, it is physically
    designed to power them all up at the same time."'
  napkin_math: The total Thermal Design Power (TDP) of the SoC might be `15 Watts`. The peak power of
    the 8-core CPU is `10W`. The GPU is `8W`. The NPU is `5W`. Total theoretical draw is `23W`. If your
    software forces 100% utilization across all domains, you demand 23W from a 15W silicon package. The
    localized heat density spikes, the silicon resistance changes, voltage drops, and the internal watchdog
    timer hard-resets the board to prevent a fire.
