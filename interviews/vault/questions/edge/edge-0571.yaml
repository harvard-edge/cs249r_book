title: The Dark Silicon Enigma
scenario: You are designing an edge AI camera with an advanced SoC that has an 8-core CPU, a 4-core GPU, and a 4-core NPU. You write a brilliant pipeline that utilizes 100% of all three processors simultaneously to process video at 120 FPS. When you deploy it, the board immediately crashes and reboots. The power supply is perfectly adequate.
question: "What SoC physical limit did you violate?"
details:
  realistic_solution: "You hit the 'Dark Silicon' limit. Modern SoCs are designed with significantly more physical cores than their thermal or power delivery networks can support simultaneously. It is mathematically impossible to run the CPU, GPU, and NPU at 100% utilization without melting the silicon or causing localized voltage droop (brownouts) that trigger an immediate hardware reset. The architecture relies on the fact that while the NPU is working, the CPU and GPU are mostly idle (dark)."
  common_mistake: |
    **The Pitfall:** Believing all silicon cores can be powered up to 100% simultaneously.
    **The Rationale:** Candidates assume transistor presence guarantees power delivery, ignoring 'Dark Silicon' limits where TDP is much lower than the sum of peak component powers.
    **The Consequence:** Localized voltage droop (brownouts) triggering immediate hardware watchdogs or thermal shutdown.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SoC TDP: 15W
       - 8-core CPU: 10W peak
       - 4-core GPU: 8W peak
       - 4-core NPU: 5W peak
    2. **Calculations:**
       - Total theoretical draw = 10W + 8W + 5W = 23W
       - Deficit = 23W - 15W = 8W over TDP
    3. **Conclusion & Interpretation:**
       **Result: 23W > 15W (Power-Bound/Dark Silicon)**
