title: Hailo-8 4-Bit Streaming Bandwidth
scenario: We are deploying a specialized 1.5 Billion parameter transformer model on a Hailo-8 accelerator. The Hailo-8 provides 26 TOPS INT8 compute at 2.5W but lacks local DRAM, meaning all weights must be streamed continuously from host memory. To minimize the host-to-accelerator PCIe bottleneck, we apply 4-bit AWQ extreme quantization to the weights, which are unpacked to INT8 on the fly.
question: What sustained host-to-Hailo bandwidth is required to stream a 1.5B-parameter 4-bit AWQ model once per token at 20 tokens/s?
details:
  realistic_solution: The correct approach recognizes that 4-bit quantization reduces the memory footprint to 0.5 bytes per parameter. The candidate should calculate the compressed model size and then multiply by the target throughput (20 tokens/sec) to find the total required host-to-chip bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the weights still take 1 byte each because the target hardware uses INT8.
    **The Rationale:** Candidates miss that the 4-bit AWQ compression is applied precisely for transport and unpacked on the fly.
    **The Consequence:** Over-provisioning the required PCIe link by 100%, incorrectly concluding the system cannot meet the 20 tokens/s requirement.
  napkin_math: |
    1. **Total Parameters:** 1.5 Billion.
    2. **Compression Ratio:** 4 bits = 0.5 bytes per parameter.
    3. **Model Payload:** 1.5B * 0.5 bytes = 0.75 GB per pass.
    4. **Bandwidth Required:** 0.75 GB/token * 20 tokens/sec = **15 GB/s** sustained bandwidth.
