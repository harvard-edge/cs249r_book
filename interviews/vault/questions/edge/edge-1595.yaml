title: Hailo-8 4-Bit Streaming Bandwidth
scenario: We are deploying a specialized 1.5 Billion parameter transformer model on a dataflow accelerator. The accelerator provides 26 TOPS INT8 compute at 2.5W but lacks local DRAM, meaning all weights must be streamed continuously from host memory. To minimize the PCIe bottleneck, we apply 4-bit AWQ extreme quantization to the weights, which are unpacked to INT8 on the fly.
question: What sustained host-to-accelerator bandwidth is required to stream a 1.5B-parameter 4-bit AWQ model once per token at 20 tokens/s?
details:
  realistic_solution: 4-bit quantization reduces the memory footprint to 0.5 bytes per parameter. The candidate calculates the compressed model size and multiplies by the target throughput (20 tokens/sec) to find the total required host-to-chip bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the weights still take 1 byte each because the target hardware uses INT8.
    **The Rationale:** Candidates miss that the 4-bit AWQ compression is applied precisely for transport and unpacked on the fly.
    **The Consequence:** Over-provisioning the required PCIe link by 100%, incorrectly concluding the system cannot meet the 20 tokens/s requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 1.5 Billion.
       - Compression: 4-bit AWQ.
       - Target: 20 tokens/s.
    2. **Calculations:**
       - Compression Ratio: 4 bits = 0.5 bytes per parameter.
       - Model Payload: 1.5B * 0.5 bytes = 0.75 GB per pass.
       - Bandwidth Required: 0.75 GB/token * 20 tokens/sec = 15 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound**. Sustained bandwidth of 15 GB/s is required across the PCIe bus to support the 20 tokens/s generation rate.
