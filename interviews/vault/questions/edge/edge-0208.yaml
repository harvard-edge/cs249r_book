title: The Sustained TOPS Reality Check
scenario: You are designing the perception system for an autonomous vehicle. The compute module has a
  strict thermal budget of 15W for the primary AI accelerator. You are evaluating the NVIDIA Jetson AGX
  Orin. The datasheet headlines a peak performance of 275 INT8 TOPS, but the 'Edge / Vision' section of
  your playbook gives an efficiency example of 4.6 TOPS/W for that class of chip. Calculate the realistic,
  sustained TOPS you can budget for in your system architecture.
question: "At 15W and 4.6 TOPS/W, what realistic sustained INT8 TOPS should you budget for instead of the 275 TOPS peak?"
details:
  realistic_solution: The key metric for a thermally constrained system is not peak TOPS, but TOPS-per-Watt
    (TOPS/W), which measures compute efficiency. The sustained performance is the product of this efficiency
    and the available power budget. The Jetson AGX Orin's peak 275 TOPS is only achievable at its max
    power draw (60W+), not within the 15W budget. Using the provided efficiency number gives a realistic
    expectation.
  common_mistake: Engineers often fixate on the headline 'peak TOPS' from marketing materials. This number
    is typically measured under ideal, unconstrained conditions. In any real-world edge system, performance
    is dictated not by the peak number but by the power and thermal budget. Failing to account for this
    leads to systems that throttle and cannot meet their real-time deadlines.
  napkin_math: The datasheet lists a peak of 275 TOPS, but that requires the full 60W power mode. If the
    chip has a stated efficiency of, say, 4.6 TOPS/W, then under a strict 15W thermal constraint, the
    sustained performance is 15W * 4.6 TOPS/W = 69 TOPS. Designing for the peak 275 TOPS would severely
    overheat the system.
  options:
  - 275 TOPS
  - 4.6 TOPS
  - 69 TOPS
  - 26 TOPS
  correct_index: 2
