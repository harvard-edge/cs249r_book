title: The Sustained TOPS Reality Check
scenario: You are designing the perception system for an autonomous vehicle. The compute module has a strict thermal budget of 15W for the primary AI accelerator. You are evaluating the NVIDIA Jetson AGX Orin. The datasheet headlines a peak performance of 275 INT8 TOPS, but the 'Edge / Vision' section of your playbook gives an efficiency example of 4.6 TOPS/W for that class of chip.
question: "At 15W and 4.6 TOPS/W, what realistic sustained INT8 TOPS should you budget for instead of the 275 TOPS peak?"
details:
  realistic_solution: "The key metric for a thermally constrained system is not peak TOPS, but TOPS-per-Watt (TOPS/W), which measures compute efficiency. The sustained performance is the product of this efficiency and the available power budget. The Jetson AGX Orin's peak 275 TOPS is only achievable at its max power draw (60W+), not within the 15W budget. Using the provided efficiency number gives a realistic expectation."
  common_mistake: |
    **The Pitfall:** Fixating on the headline 'peak TOPS' from marketing materials.
    **The Rationale:** Engineers often equate peak TOPS with available performance, ignoring that peak numbers are measured under ideal, thermally unconstrained conditions.
    **The Consequence:** Designing systems that aggressively thermal throttle and fail to meet real-time latency deadlines in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Strict 15W thermal constraint
       - Efficiency: 4.6 TOPS/W
    2. **Calculations:**
       - Sustained performance = 15W * 4.6 TOPS/W = 69 TOPS
    3. **Conclusion & Interpretation:**
       **Result: 69 TOPS (Thermal-Bound)**
  options:
  - 275 TOPS
  - 4.6 TOPS
  - 69 TOPS
  - 26 TOPS
  correct_index: 2
