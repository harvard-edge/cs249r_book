title: Assess queuing stability and utilization for Hailo-8 defect inspection
scenario: A smart factory uses a Hailo-8 accelerator to inspect parts arriving via
  a conveyor belt at a Poisson rate of 20 parts/second. The Hailo-8 processes one
  image in exactly 40ms.
question: Assess the stability of this queuing system and calculate the expected utilization
  factor of the accelerator.
details:
  realistic_solution: The arrival rate (lambda) is 20 parts/sec. The deterministic
    service rate (mu) is 1 / 0.040s = 25 parts/sec. The utilization factor (rho) is
    lambda / mu = 20 / 25 = 0.8 (80%). Since rho < 1, the system is strictly stable,
    though queue lengths will briefly fluctuate due to stochastic arrivals.
  common_mistake: Confusing deterministic service times with exponential formulas,
    or miscalculating rho > 1 and falsely claiming instability.
  napkin_math: 20 arrivals/sec * 0.040s service = 0.8 utilization
