title: The OTA Bandwidth Budget
scenario: You are an ML Systems Engineer for an autonomous vehicle company rolling out an updated perception model. The complete OTA update package, containerized for reliable deployment, is 400 MB. Your fleet of vehicles has a stable cellular connection that provides 80 Mbps (megabits per second) of download bandwidth.
question: 'How do you calculate the minimum time to download a 400 MB OTA package over an 80 Mbps cellular connection?'
details:
  realistic_solution: 'The correct way to solve this is to first make the units consistent. We must convert the package size from Megabytes (MB) to Megabits (Mb) to match the bandwidth unit.'
  common_mistake: |
    **The Pitfall:** Confusing megabits (Mb) and megabytes (MB) when calculating transfer times.
    **The Rationale:** Candidates simply divide 400 by 80 without recognizing the bits-to-bytes conversion factor.
    **The Consequence:** The calculated deployment time is 8x too fast, ruining fleet update schedules and maintenance window planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Package size: 400 MB.
    - Bandwidth: 80 Mbps.

    **Calculations:**
    - Package size in Megabits = 400 MB * 8 bits/byte = 3200 Mb.
    - Minimum download time = 3200 Mb / 80 Mbps = 40 seconds.

    **Conclusion & Interpretation:**
    - **Result: 40 seconds (Network-Bound)**. Failing to convert bytes to bits leads to drastically incorrect deployment timelines.
  options:
  - 5 seconds
  - 50 seconds
  - 40 seconds
  - 3200 seconds
  correct_index: 2
