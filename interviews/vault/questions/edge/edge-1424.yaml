title: Analyzing Federated Averaging Bottlenecks on Jetson Orin
scenario: You are deploying a cross-silo federated learning system across several edge nodes powered by NVIDIA Jetson Orin devices. Each node trains a local 8GB model using its Ampere GPU and sends updates to a central server every 10 epochs. You observe the system's overall convergence time is severely bottlenecked, and power consumption frequently spikes near the 60W TDP limit during the synchronization phase.
question: Why does synchronization, not local training, bottleneck the Jetson Orin federated system with 8GB updates, and how would you reduce it?
details:
  realistic_solution: The bottleneck occurs because the Jetson Orin's massive compute finishes local epochs rapidly, making the 8GB model transmission the dominant delay. The system should increase local epochs before synchronization or implement gradient compression (e.g., INT8 quantization), trading local compute to reduce the massive communication payload.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck or power spike is due to thermal throttling during the heavy GPU compute phase.
    **The Rationale:** Engineers associate deep learning bottlenecks with raw FLOPS and GPU capacity, overlooking the network constraints.
    **The Consequence:** Optimization efforts are misdirected at the local training loop, ignoring the massive communication payload stalling the distributed system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 epochs take ~20s locally.
       - Model payload: 8GB (8192 MB).
       - Edge connection: 1 Gbps (125 MB/s).
    2. **Calculations:**
       - Communication Delay: 8192 MB / 125 MB/s = ~65.5 seconds.
       - Ratio: Communication (65.5s) is >3x longer than compute (20s).
    3. **Conclusion & Interpretation:**
       - **Result: Maxing the network and LPDDR5 bandwidth for 65 seconds spikes power; gradient compression is required. (Network-Bandwidth-Bound)**
