title: Analyzing Federated Averaging Bottlenecks on Jetson Orin
scenario: You are deploying a cross-silo federated learning system across several edge nodes powered by NVIDIA Jetson Orin devices. Each node trains a local 8GB model using its Ampere GPU and sends updates to a central server every 10 epochs. You observe that while local training is extremely fast utilizing the 275 TOPS INT8 compute, the system's overall convergence time is severely bottlenecked, and power consumption frequently spikes near the 60W TDP limit during the synchronization phase.
question: Why does synchronization, not local training, bottleneck the Jetson Orin federated system with 8GB updates, and how would you reduce it?
details:
  realistic_solution: The bottleneck happens because the Jetson Orin's high compute capability (275 TOPS) finishes local epochs rapidly, making the communication overhead of transmitting an 8GB model the dominant factor. To resolve this, the system should increase the number of local epochs before synchronization or implement gradient compression (e.g., quantization to INT8), trading abundant local compute to reduce the massive communication payload.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck or power spike is due to thermal throttling during the heavy GPU compute phase.
    **The Rationale:** Engineers naturally associate deep learning training bottlenecks with raw FLOPS and GPU capacity, overlooking the network constraints.
    **The Consequence:** Optimization efforts are misdirected at the local training loop (which is already fast), ignoring the massive communication payload stalling the entire distributed system.
  napkin_math: |
    1. **Local Compute:** 10 epochs take ~20s utilizing the 275 TOPS compute.
    2. **Communication Delay:** Transmitting an 8GB (8192 MB) model over a 1 Gbps (125 MB/s) edge connection takes 8192 / 125 = ~65.5 seconds.
    3. **Ratio:** Communication overhead (65.5s) is >3x longer than the local compute time (20s).
    4. **Result:** Maxing out the network interface and LPDDR5 bandwidth for 65 seconds causes the power spike. The fix requires **gradient compression (e.g., INT8 quantization)** to shrink the payload.
