title: The Safety Watchdog Timer
scenario: Your industrial robot arm uses a TI TDA4VM to run a safety zone monitoring model. A hardware watchdog timer is configured to reset the entire system if the inference pipeline doesn't send a heartbeat within 100ms. Your average inference time is 35ms, so your colleague says we have 65ms of margin — the watchdog will never fire. During a factory demo, the watchdog fires and the robot arm freezes mid-motion.
question: What caused the safety watchdog timer to fire despite the 35ms average inference time?
details:
  realistic_solution: 'The watchdog fired because the worst-case execution time exceeded 100ms, even though the average is 35ms. Sources of worst-case latency on the TDA4VM can include OS preemption, cache misses, or data-dependent algorithmic spikes like an unusually high number of detections passed to NMS.'
  common_mistake: |
    **The Pitfall:** Relying on average-case latency for hard real-time systems.
    **The Rationale:** Engineers accustomed to web services use P50 or P99 metrics and assume "margin" covers the rest.
    **The Consequence:** Average-case analysis is meaningless for safety-critical hardware; failure to analyze and bound worst-case execution time (WCET) leads to sudden system resets and robotic freezing.
  napkin_math: |
    1. **Average Case**: 35ms + 0.5ms (NMS) + 0ms (warm cache) = 35.5ms.
    2. **Worst Case Components**: 43.75ms (compute spike) + 25ms (OS preemption) + 5ms (cache miss) + 8ms (dense NMS) = 81.75ms.
    3. **Safety Margin Analysis**: With a standard 1.3× safety margin, 81.75ms × 1.3 = 106ms.
    4. **Result**: 106ms > 100ms watchdog → **RESET**. A strict cap on NMS detections is required to bound WCET.
