title: The Safety Watchdog Timer
scenario: Your industrial robot arm uses a TI TDA4VM to run a safety zone monitoring model. A hardware
  watchdog timer is configured to reset the entire system if the inference pipeline doesn't send a heartbeat
  within 100ms. Your average inference time is 35ms, so your colleague says 'we have 65ms of margin —
  the watchdog will never fire.' During a factory demo, the watchdog fires and the robot arm freezes mid-motion.
  What happened?
details:
  realistic_solution: 'The watchdog fired because the worst-case execution time exceeded 100ms, even though
    the average is 35ms. Sources of worst-case latency on the TDA4VM:'
  common_mistake: '"The average is 35ms with 65ms margin, so we''re safe." Average-case analysis is meaningless
    for safety-critical systems — you must analyze worst-case execution time (WCET).'
  napkin_math: 'Average case: 35ms + 0.5ms (NMS) + 0ms (warm cache) = 35.5ms. Worst case: 43.75ms + 25ms
    + 5ms + 8ms = 81.75ms. With 1.3× margin: 106ms > 100ms watchdog → RESET. With NMS cap (20 detections):
    worst case = 43.75 + 2 + 5 + 8 = 58.75ms × 1.3 = 76ms < 100ms ✓.'
