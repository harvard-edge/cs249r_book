title: Optimizing Mixed-Precision Inference on Hailo-8
scenario: You are deploying a large language model (LLM) for real-time inference on an edge device. Your current model was trained in FP32 and achieves satisfactory accuracy, but its latency and power consumption are too high. You decide to explore mixed-precision quantization to INT8.
question: How would you adapt the FP32 LLM for mixed-precision inference on an INT8-optimized edge accelerator while evaluating accuracy, latency, and power tradeoffs?
details:
  realistic_solution: Employ Quantization-Aware Training (QAT) to maintain accuracy, utilizing layer-wise sensitivity analysis to identify the minimal subset of critical layers requiring higher precision. Since the edge hardware is strictly optimized for INT8 (with heavily penalized FP16/FP32 emulation), the pipeline must aggressively minimize graph breaks. Standard mixed-precision heuristics used on cloud GPUs are invalid here; maintaining 99% INT8 execution is required to prevent catastrophic emulation latency stalls.
  common_mistake: |
    **The Pitfall:** Blindly applying cloud-centric mixed-precision ratios (e.g., leaving 20-30% of layers in FP16/32).
    **The Rationale:** Candidates assume that edge accelerators natively handle FP32 gracefully, ignoring the massive emulation penalties on integer-only dataflow engines.
    **The Consequence:** A resulting model that is actually slower than the baseline due to constant tensor recasting and slow software-emulated floating-point math.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Model: 100 GOPS in FP32
       - Accelerator: Native INT8, FP32 emulated at 4x latency penalty
       - Target deployment: 90% INT8, 10% FP32
    2. **Calculations:**
       - 90 GOPS mapped to INT8 compute: ~6.9 ms
       - 10 GOPS mapped to emulated FP32: 10 * 4 = 40 GOPS equivalent = ~3.1 ms
       - Total execution = 6.9 ms + 3.1 ms = 10 ms
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound by Emulation. Just 10% FP32 operations consume over 30% of total inference time.**
