title: Dataflow Tradeoffs on Qualcomm Cloud AI 100
scenario: 'You are deploying a large vision transformer (ViT-L) on a Qualcomm Cloud AI 100 edge accelerator (400 TOPS INT8, 32GB LPDDR4x, 75W TDP) for an on-premise defect detection system. The model has massive fully connected layers in the MLP blocks. You must configure the compiler''s dataflow for these specific layers to maximize utilization within the 75W budget.'
question: 'For the ViT-L MLP layers, would you use a weight-stationary or output-stationary dataflow, and why?'
details:
  realistic_solution: 'For the MLP expansion layers, an output-stationary (or row-stationary) dataflow is generally superior. While weights are large, the intermediate activations (outputs of the first linear layer in the MLP) are often 4x larger than the input sequence dimension. Pinning the outputs in the local accumulator SRAM minimizes the expensive movement of partial sums back and forth to main memory, which is crucial for staying within the 75W power envelope. Weight-stationary is better suited for earlier layers where activations are smaller relative to weights.'
  common_mistake: |
    **The Pitfall:** Blindly choosing weight-stationary dataflow because "weights are large in ViT".
    **The Rationale:** Candidates remember that transformers have massive weights, ignoring the massive intermediate activation sizes in the MLP expansion layers.
    **The Consequence:** They create a system that constantly moves massive partial sums to and from main memory, immediately saturating the 75W power limit.
  napkin_math: |
    * MLP Expansion Layer setup: Batch 1, Sequence 1024, Hidden Dim 1024, Expansion 4 (Output 4096).
    * Weights = 1024 × 4096 = 4MB (INT8).
    * Activations (Inputs) = 1024 × 1024 = 1MB.
    * Outputs (Partial Sums) = 1024 × 4096 = 4MB.
    * Weight-Stationary: Streams 4MB partial sums multiple times if they don't fit in accumulators.
    * Output-Stationary: Pins 4MB outputs in SRAM, streaming 4MB weights and 1MB inputs once.
    * **Conclusion: Output-stationary minimizes LPDDR4x traffic (~20-50 pJ/bit vs SRAM ~1 pJ/bit), dramatically reducing power consumption.**
