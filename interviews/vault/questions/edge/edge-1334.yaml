title: Dataflow Tradeoffs on Qualcomm Cloud AI 100
scenario: You are deploying a large vision transformer (ViT-L) on a Qualcomm Cloud AI 100 edge accelerator for an on-premise defect detection system. The model has massive fully connected layers in the MLP blocks. You must configure the compiler's dataflow for these specific layers to maximize utilization within the 75W budget.
question: For the ViT-L MLP layers, would you use a weight-stationary or output-stationary dataflow, and why?
details:
  realistic_solution: For the MLP expansion layers, an output-stationary (or row-stationary) dataflow is generally superior. Intermediate activations are often 4x larger than the input sequence dimension. Pinning the outputs in the local accumulator SRAM minimizes the expensive movement of partial sums back and forth to main memory, crucial for staying within the power envelope.
  common_mistake: |
    **The Pitfall:** Blindly choosing weight-stationary dataflow because "weights are large in ViT".
    **The Rationale:** Candidates remember that transformers have massive weights, ignoring the massive intermediate activation sizes in the MLP expansion layers.
    **The Consequence:** They create a system that constantly moves massive partial sums to and from main memory, immediately saturating the power limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ViT-L MLP layer: Seq 1024, Dim 1024, Expansion 4 (Output 4096).
       - INT8 quantization (1 byte/param).
    2. **Calculations:**
       - Weights = 1024 * 4096 = 4 MB.
       - Inputs = 1024 * 1024 = 1 MB.
       - Outputs (Partial Sums) = 1024 * 4096 = 4 MB.
       - Output-Stationary pins 4MB outputs in SRAM, streaming inputs/weights once.
    3. **Conclusion & Interpretation:**
       - **Output-stationary minimizes expensive LPDDR4x partial sum traffic, dramatically reducing power. Result: Power-Bound Mitigation.**
