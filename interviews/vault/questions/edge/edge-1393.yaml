title: Unstructured Sparsity Bandwidth on Hailo-8
scenario: You are deploying a vision model to a dataflow edge accelerator that streams weights and activations directly from host memory via PCIe. A dense fully-connected layer in your network contains 4,000,000 INT8 weights and must be executed at 60 FPS. To reduce the weight streaming bandwidth, a colleague suggests applying 50% unstructured sparsity, encoding the sparse weights in a Compressed Sparse Row (CSR) format using 16-bit column indices.
question: What weight bandwidth at 60 FPS is required for the dense 4M INT8 layer versus 50% CSR sparsity with 16-bit indices, and does CSR help?
details:
  realistic_solution: The candidate should calculate the baseline dense bandwidth and then compute the sparse bandwidth by combining the size of the non-zero INT8 values with their corresponding 16-bit indices. They should prove that unstructured sparsity actually increases bandwidth in this scenario and correctly suggest that structured pruning (e.g., removing entire channels) is necessary to reduce streaming overhead on a dataflow architecture.
  common_mistake: |
    **The Pitfall:** Assuming that 50% sparsity automatically halves the memory bandwidth.
    **The Rationale:** Candidates frequently forget to account for the metadata overhead of sparse encoding formats (like CSR indices), which heavily penalizes low-precision data types like INT8.
    **The Consequence:** Implementing an "optimization" that actually increases memory bandwidth and worsens system performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Dense weights: 4,000,000 INT8 parameters (1 byte each) at 60 FPS.
       * Sparse format: 50% sparsity using CSR with INT16 (2 byte) indices.
    2. **Calculations:**
       * Dense memory bandwidth: 4,000,000 bytes * 60 FPS = 240,000,000 bytes/sec = 240 MB/s.
       * Sparse footprint per frame: 2,000,000 non-zero weights * 1 byte (values) + 2,000,000 indices * 2 bytes (INT16 column indices) = 2 MB + 4 MB = 6 MB total payload.
       * Sparse memory bandwidth: 6 MB * 60 FPS = 360 MB/s.
    3. **Conclusion & Interpretation:**
       * **The unstructured sparsity approach actually increases required bandwidth by 120 MB/s (from 240 MB/s to 360 MB/s). Result: Memory Bandwidth-Bound.**
