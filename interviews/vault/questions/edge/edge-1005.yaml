title: Realizing Activation Memory Reduction Through Quantization-Aware Fine-Tuning on Jetson Orin
scenario: You are fine-tuning a quantization-aware training (QAT) version of MobileNetV2 on an edge device. QAT inserts fake-quantization nodes that simulate int8 forward passes but maintain fp32 activations for gradient computation. Your team expects QAT to reduce activation memory versus full fp32 training, but profiling shows QAT uses significantly more memory than the baseline.
question: Why does QAT for MobileNetV2 use more activation memory than fp32 training on the edge device, and how can you fix it?
details:
  realistic_solution: QAT fundamentally requires storing both the raw FP32 activation (for the backward pass straight-through estimator) and the quantized activation at every fake-quant insertion point. To mitigate this memory explosion, utilize gradient checkpointing or reduce the granularity of insertion points (e.g., placing fake-quant nodes only at macro-stage boundaries rather than after every convolution block).
  common_mistake: |
    **The Pitfall:** Expecting QAT training memory footprint to equal the INT8 inference memory footprint.
    **The Rationale:** Candidates conflate the memory benefits of the final compiled artifact with the heavy intermediate tensor requirements of the training process.
    **The Consequence:** OOM (Out Of Memory) crashes during edge fine-tuning due to severely underestimated activation lifetimes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MobileNetV2 at Batch Size 8
       - Fake-quant nodes: 18
       - Max feature map: 56x56x32
    2. **Calculations:**
       - Additional QAT memory = 18 nodes * 2 tensors * (56 * 56 * 32) * 8 batch * 4 bytes/FP32
       - 18 * 2 * 100,352 * 8 * 4 = 115.6 MB extra memory
       - Total memory = 1.2 GB (baseline) + 115.6 MB = 1.316 GB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound. The pervasive fake-quant nodes bloat activation memory by ~10% over the FP32 baseline.**
