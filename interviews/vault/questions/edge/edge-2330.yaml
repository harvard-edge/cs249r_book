title: PCIe Bottleneck on Edge Accelerator
scenario: >-
  A Hailo-8 accelerator connects to a host via a PCIe Gen3 x2 link (approx 2 GB/s). The NPU sits idle 40% of the time despite asynchronous software pipelining.
question: Explain why computation-communication overlap fails to keep the NPU fully utilized in this setup.
details:
  realistic_solution: 'The system is strictly communication-bound. The time to transfer the input image over the 2 GB/s PCIe link takes significantly longer than the time the NPU takes to process it, meaning overlap can''t hide latency that exceeds compute time.'
  common_mistake: |
    **The Pitfall:** Blaming the software pipelining implementation.
    **The Rationale:** Candidates assume that if pipelining is active, hardware must be fully utilized unless there's a concurrency bug.
    **The Consequence:** They miss the fundamental hardware throughput mismatch; software tricks cannot bypass a hard physical I/O bottleneck.
  napkin_math: |
    1. **Host Link Limit:** The PCIe Gen3 x2 link enforces a strict `2 GB/s` transfer ceiling.
    2. **Result:** Because `Transfer Time > Compute Time`, the NPU will mathematically always sit idle waiting for data, completely bottlenecked by I/O bandwidth.
