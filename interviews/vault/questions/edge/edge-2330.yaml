title: PCIe Bottleneck on Edge Accelerator
scenario: A Hailo-8 accelerator connects to a host via a PCIe Gen3 x2 link (approx
  2 GB/s). The NPU sits idle 40% of the time despite asynchronous software pipelining.
question: Explain why computation-communication overlap fails to keep the NPU fully
  utilized in this setup.
details:
  realistic_solution: The system is strictly communication-bound. The time to transfer
    the input image over the 2 GB/s PCIe link takes significantly longer than the
    time the NPU takes to process it, meaning overlap can't hide latency that exceeds
    compute time.
  common_mistake: Assuming an issue with thread concurrency rather than the fundamental
    hardware throughput mismatch.
  napkin_math: 2 GB/s link limit
