title: Adversarial Vulnerability from Edge Quantization
scenario: You deploy a multi-camera security system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). To handle 6 concurrent video streams at 30 FPS, where each frame requires 1.5 TOPS of inference compute, you must quantize your adversarially-trained model to INT8. After deployment, you observe that the INT8 model is highly vulnerable to physical adversarial patches (e.g., printed patterns on clothing), whereas the original unquantized model was immune.
question: Why did INT8 quantization make the Jetson Orin model vulnerable to physical adversarial patches, and why was higher precision infeasible?
details:
  realistic_solution: Adversarial training creates highly non-linear decision boundaries to separate clean and perturbed inputs. INT8 quantization introduces rounding noise and requires clipping activation outliers, effectively flattening these defensive boundaries and allowing adversarial features to propagate. The compute constraint forces this tradeoff, as the system requires near-maximum utilization of the Orin's INT8 accelerators to meet the latency and throughput requirements.
  common_mistake: |
    **The Pitfall:** Vaguely stating that 'INT8 loses information'.
    **The Rationale:** Candidates fail to explain that adversarial robustness specifically relies on precise, fine-grained decision boundaries and activation outliers.
    **The Consequence:** They miss the core mechanism of how INT8 clipping and quantization noise destroy defensive boundaries, and often forget to prove computationally why higher precision is impossible.
  napkin_math: |
    - **Compute per stream:** 30 FPS * 1.5 TOPS/frame = 45 TOPS.
    - **Total compute for 6 streams:** 6 * 45 TOPS = 270 TOPS.
    - **Jetson Orin INT8 limit:** 275 TOPS.
    - **Compute utilization:** (270 / 275) * 100 = **98.2%**.
    - **Conclusion:** Since FP16 throughput on the Ampere GPU is at most half of the INT8 TOPS, running higher precision for a 270 TOPS equivalent workload is mathematically impossible on this 60W edge device.
