title: AOT Optimization Bottlenecks on Qualcomm AI 100 for LLM Inference
scenario: You are deploying a large language model (LLM) for real-time inference on a Qualcomm Cloud AI 100 accelerator. The model is quantized to INT8 and compiled with aggressive AOT optimizations (operator fusion, constant folding). The hardware offers 400 TOPS (INT8), 32 GB LPDDR4x memory, and a 75W TDP. Despite these optimizations, you observe lower-than-expected inference throughput and significantly higher latency for certain operators compared to your initial benchmarks on a desktop GPU.
question: Why might the INT8 AOT-compiled LLM underperform on Qualcomm Cloud AI 100, and how would you optimize the graph for its memory hierarchy and ISA?
details:
  realistic_solution: "A realistic solution requires a deep dive into the specifics of the Qualcomm Cloud AI 100's architecture and the compiler toolchain. Use vendor profiling tools to identify bottlenecks at the kernel and memory access levels. Optimize data layouts, implement explicit tensor tiling, and leverage on-chip scratchpad memory to reduce LPDDR4x latency."
  common_mistake: |
    **The Pitfall:** Assuming general-purpose GPU compiler optimizations apply perfectly to edge accelerators.
    **The Rationale:** Candidates overlook nuances of LPDDR4x bandwidth versus GDDR and assume generic operator lowering will efficiently map to specialized INT8 TPUs.
    **The Consequence:** Suboptimal kernel selection and excessive data transfers between memory levels, severely degrading throughput.
  napkin_math: |
    *   **Compute Bound Estimate:** For an operation requiring `N` INT8 ops at 400 TOPS (400 × 10^12 ops/s), min time is `N / (400 × 10^12)`. Higher observed times mean poor compute utilization.
    *   **Memory Bound Estimate:** For transferring `M` bytes via LPDDR4x (e.g., 60 GB/s effective), min time is `M / (60 × 10^9)`.
    *   **Conclusion:** If the observed latency exceeds the memory bound estimate, the operation suffers from non-coalesced accesses or cache misses, **meaning it is fundamentally memory-bound rather than compute-bound.**
