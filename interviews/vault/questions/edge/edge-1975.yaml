title: AOT Optimization Bottlenecks on Qualcomm AI 100 for LLM Inference
scenario: You are deploying a large language model (LLM) for real-time inference on a Qualcomm Cloud AI 100 accelerator. The model is quantized to INT8 and compiled with aggressive AOT optimizations. Despite these optimizations, you observe lower-than-expected inference throughput and significantly higher latency for certain operators compared to your initial benchmarks on a desktop GPU.
question: Why might the INT8 AOT-compiled LLM underperform on Cloud AI 100, and how would you optimize the graph for its memory hierarchy and ISA?
details:
  realistic_solution: "A realistic solution requires a deep dive into the specifics of the Qualcomm Cloud AI 100's architecture and the compiler toolchain. Use vendor profiling tools to identify bottlenecks at the kernel and memory access levels. Optimize data layouts, implement explicit tensor tiling, and leverage on-chip scratchpad memory to reduce LPDDR4x latency."
  common_mistake: |
    **The Pitfall:** Assuming general-purpose GPU compiler optimizations apply perfectly to edge accelerators.
    **The Rationale:** Candidates overlook nuances of LPDDR4x bandwidth versus GDDR and assume generic operator lowering will efficiently map to specialized INT8 TPUs.
    **The Consequence:** Suboptimal kernel selection and excessive data transfers between memory levels, severely degrading throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Cloud AI 100 compute: 400 TOPS (INT8).
       * Memory bandwidth: ~60 GB/s (LPDDR4x).
       * Target operation requires N INT8 ops and M bytes transferred.
    2. **Calculations:**
       * Compute Bound Estimate: N / (400 * 10^12) seconds.
       * Memory Bound Estimate: M / (60 * 10^9) seconds.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound vs Compute-Bound**. If observed latency vastly exceeds the compute bound but aligns with the memory bound, the bottleneck is LPDDR4x bandwidth, demanding explicit tensor tiling and scratchpad usage.
