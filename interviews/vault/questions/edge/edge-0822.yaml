title: Memory Bounds of EWC Mitigations
scenario: You are personalizing a 2M parameter wake-word model on a smart speaker DSP with 16MB of SRAM. To prevent catastrophic forgetting when fine-tuning on the user's specific accent, you plan to apply Elastic Weight Consolidation (EWC) with all variables stored in FP16 precision. Assume the base model weights, gradients, and optimizer states already consume 12MB.
question: "How much memory do the EWC terms add, does the 2M-parameter FP16 model fit in 16 MB SRAM, and what should you use instead?"
details:
  realistic_solution: "Calculate the EWC memory overhead and recognize it causes an Out-Of-Memory (OOM) error. Instead, freeze the base model and inject a parameter-efficient adapter (like LoRA), which inherently prevents forgetting of the base weights while using negligible memory."
  common_mistake: |
    **The Pitfall:** Assuming EWC only introduces a computational penalty to the loss function.
    **The Rationale:** Candidates forget that EWC requires persistent copies of previous states (weights and Fisher diagonal) which scale linearly with parameter count.
    **The Consequence:** Out-Of-Memory (OOM) exceptions when deployed to SRAM-constrained edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2M parameters, FP16 (2 bytes/param)
       - SRAM: 16MB
       - Base model, gradients, states = 12MB
    2. **Calculations:**
       - EWC needs previous weights (θ_old) and Fisher info (F)
       - θ_old = 2M * 2B = 4MB
       - F = 2M * 2B = 4MB
       - EWC Overhead = 4MB + 4MB = 8MB
       - Total Memory = 12MB + 8MB = 20MB
    3. **Conclusion & Interpretation:**
       **Result: 20MB > 16MB (Memory-Bound/OOM)**
