title: Memory Bounds of EWC Mitigations
scenario: You are personalizing a 2M parameter wake-word model on a smart speaker DSP with 16MB of SRAM.
  To prevent catastrophic forgetting when fine-tuning on the user's specific accent, you plan to apply
  Elastic Weight Consolidation (EWC) with all variables stored in FP16 precision. Assume the base model
  weights, gradients, and optimizer states already consume 12MB. Calculate the memory overhead of the
  EWC regularization terms.
details:
  realistic_solution: Calculate the EWC memory overhead and recognize it causes an Out-Of-Memory (OOM)
    error. Instead, freeze the base model and inject a parameter-efficient adapter (like LoRA), which
    inherently prevents forgetting of the base weights while using negligible memory.
  common_mistake: Candidates often assume EWC only introduces a computational penalty to the loss function,
    forgetting that it requires storing persistent copies of previous states that scale with parameter
    count.
  napkin_math: EWC requires storing the previous weights (θ_old) and the Fisher Information Matrix diagonal
    (F). Overhead = (2M params * 2 bytes/FP16 for θ_old) + (2M params * 2 bytes/FP16 for F) = 4MB + 4MB
    = 8MB. Total memory = 12MB (base) + 8MB (EWC) = 20MB. 20MB > 16MB SRAM capacity (OOM).
