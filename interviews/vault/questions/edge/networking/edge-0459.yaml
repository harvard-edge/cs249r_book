title: The Autonomous Vehicle Interconnect Dilemma
scenario: You are an ML Systems Engineer designing a sensor fusion system for an autonomous car. The system uses two edge SoCs connected inside a single chassis. SoC A produces a 128 MB intermediate feature map which must be transferred to SoC B for planning within a 33ms end-to-end latency budget.
question: Should you transfer the 128 MB feature map between the two SoCs over PCIe Gen4 x16 or 100 Gbps Ethernet with RDMA, and why?
details:
  realistic_solution: 'The correct choice is PCIe. PCIe provides direct, low-latency memory access between the SoCs with minimal CPU intervention via DMA. This is crucial for a predictable, hard real-time system. Ethernet with RDMA introduces unnecessary protocol overhead, higher power consumption from the external NIC, and more latency jitter. For two chips in the same chassis, treat them as a single logical system via PCIe.'
  common_mistake: |
    **The Pitfall:** Choosing Ethernet over PCIe based on generic datacenter networking principles.
    **The Rationale:** Fixating on peak bandwidth numbers and misapplying cloud scaling solutions (like RoCE) to tightly-coupled embedded systems.
    **The Consequence:** Introducing unnecessary protocol overhead, higher power consumption, and latency jitter into a hard real-time safety critical system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 128 MB feature map.
    - PCIe Gen4 x16: 32 GB/s, ~50 us protocol latency.
    - 100 Gbps Ethernet: 12.5 GB/s, ~100 us protocol latency.

    **Calculations:**
    - PCIe Transfer Time: 128 MB / 32,000 MB/s = 4.0 ms.
    - Total PCIe Latency: 4.0 ms + 0.05 ms = 4.05 ms.
    - Ethernet Transfer Time: 128 MB / 12,500 MB/s = 10.24 ms.
    - Total Ethernet Latency: 10.24 ms + 0.1 ms = 10.34 ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Interconnect**. PCIe is 2.5x lower latency, proving it is strictly superior for hard real-time tightly-coupled embedded systems.
  options:
  - 'Choose 100 Gbps Ethernet because RDMA provides a zero-copy transfer that is more efficient than the standard PCIe driver stack.'
  - 'Choose 100 Gbps Ethernet because it is the standard for low-latency GPU communication in high-performance clusters.'
  - 'Choose PCIe. Its raw bandwidth is higher and its architecture as a direct memory bus results in lower CPU overhead and less latency jitter.'
  - 'Neither is sufficient. The true bottleneck is the MIPI camera interface, which cannot supply data fast enough.'
