title: Multi-TPU Routing for High-Frequency Industrial Inspection
scenario: You are designing the inference architecture for an industrial gateway receiving 8 concurrent 60 FPS video streams. The system is equipped with an array of 4 Google Coral Edge TPUs via a PCIe switch running an INT8-quantized defect detection model.
question: How would you route 8 concurrent 60 FPS streams across four Coral Edge TPUs, and is the load sustainable without admission control?
details:
  realistic_solution: |
    Implement a device-aware routing strategy with static affinity: assign two camera streams to each Edge TPU and keep a small per-device FIFO so models and tensor arenas stay resident. Route each camera to its assigned TPU by default, monitor queue depth and deadline misses per TPU, and allow spillover only for short bursts because cross-device spillover increases PCIe switch traffic and can reload tensor arenas. This policy minimizes latency and PCIe contention, but the capacity math shows the offered 480 FPS load exceeds the four-TPU service rate, so admission control or added capacity is still required.
  common_mistake: |
    **The Pitfall:** Using standard cloud load balancing techniques like simple round-robin.
    **The Rationale:** Candidates ignore the stateful nature of Edge TPUs and the severe penalty of PCIe host-to-device transfers.
    **The Consequence:** Constant model reloading and cache thrashing on the 8MB SRAM, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 8 streams * 60 FPS = 480 FPS total.
    - Hardware: 4 TPUs.
    - Model speed: 10ms per inference (max 100 FPS per TPU).

    **Calculations:**
    - Total capacity: 4 TPUs * 100 FPS/TPU = 400 FPS.
    - Required capacity: 480 FPS.
    - Deficit: 480 - 400 = 80 FPS.

    **Conclusion & Interpretation:**
    - **Result: static two-stream affinity plus overload control (Routing-Then-Capacity Bound)**. The routing policy minimizes PCIe churn, but each TPU receives 2 * 60 = 120 FPS and can serve only 100 FPS. Queue monitoring must trigger frame dropping, admission control, or added TPU capacity before latency grows without bound.
