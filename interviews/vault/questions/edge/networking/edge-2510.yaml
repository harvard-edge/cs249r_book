title: ESP-NOW Tree AllReduce
scenario: A cluster of 3 ESP32s synchronizes a 10 KB state vector via a tree topology (1 root, 2 leaves) using the ESP-NOW protocol (1 Mbps).
question: Analyze the synchronization latency, assuming sequential hops due to the shared wireless medium.
details:
  realistic_solution: 'In a wireless tree, Reduce requires leaves to send to the root sequentially (2 hops). Broadcast requires the root to multicast down (1 hop). Total transmissions = 3. Payload is 10 KB = 80 Kb. Time = 3 * (80 Kb / 1000 Kbps) = 240ms. The MAC layer enforces this strict serialization.'
  common_mistake: |
    **The Pitfall:** Assuming leaf nodes can transmit to the root concurrently.
    **The Rationale:** Engineers used to wired or full-duplex networking forget that wireless is a shared half-duplex medium.
    **The Consequence:** Ignoring multi-transmitter MAC layer collisions results in massive packet loss and latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tree topology: 1 Root, 2 Leaves.
       - Payload = 10 KB = 80 kilobits (Kb).
       - Half-duplex ESP-NOW speed = 1 Mbps (1000 Kbps).
    2. **Calculations:**
       - Hop Time = 80 Kb / 1000 Kbps = 80 ms per hop.
       - Sequential Transmissions = Leaf 1 to Root + Leaf 2 to Root + Root Broadcast = 3 hops.
       - Total Latency = 3 * 80 ms = 240 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 240ms Latency**. Ignoring the half-duplex MAC layer collisions leads engineers to falsely assume parallel leaf transmissions. True synchronization takes 3 serialized 80ms hops.
