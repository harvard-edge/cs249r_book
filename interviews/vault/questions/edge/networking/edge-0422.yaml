title: The Drone's 25ms Mystery
scenario: You are an ML Systems Engineer diagnosing a real-time perception pipeline on an autonomous drone. The system uses two co-processors (Module A and Module B, both Jetson AGX Orins) on the same carrier board, connected by a PCIe Gen4 bus. Module A performs sensor fusion and generates a 67 MB feature map, which it sends to Module B for object detection.
question: 'Why is the 67 MB PCIe Gen4 transfer between Orins too slow, and how do you fix it?'
details:
  realistic_solution: 'The root cause is the lack of a true peer-to-peer (P2P) transfer. The data transfer is being mediated by the host CPU, causing a ''CPU bounce'': Module A''s VRAM -> Host System RAM -> Module B''s VRAM. Each leg of this journey (VRAM to RAM, RAM to VRAM) incurs significant driver and OS scheduling overhead. The solution is to ensure the system''s driver, BIOS, and IOMMU are correctly configured to allow Remote Direct Memory Access (RDMA, also called P2P DMA). This enables Module A to write directly into Module B''s memory without any CPU intervention, eliminating the software overhead and bringing the transfer time down to what the physics of the bus allows.'
  common_mistake: |
    **The Pitfall:** Calculating theoretical bandwidth but forgetting host CPU software overhead.
    **The Rationale:** Engineers assume Time = Data / Bandwidth, ignoring that without true P2P DMA, the data bounces through host RAM.
    **The Consequence:** Unexplained 5-10x latency spikes on the PCIe bus that blow past strict real-time budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 67 MB; PCIe Gen4 x8 theoretical bandwidth: 15.75 GB/s
    - CPU bounce: VRAM -> RAM -> VRAM

    **Calculations:**
    - Direct P2P time = 67 MB / 15,750 MB/s = 4.25 ms
    - CPU bounce traversal = 2 * 67 MB = 134 MB
    - Latency = at least 8.5 ms + OS scheduling overhead

    **Conclusion & Interpretation:**
    - **Result: 8.5ms+ latency without RDMA (Bandwidth-Bound)**. Host CPU mediation doubles transfer latency.
  options:
  - 'The 67 MB payload is too large for the PCIe Gen4 bus, which is saturated. The system requires an interconnect with higher bandwidth like NVLink.'
  - 'The LPDDR5 memory on the receiving module (Module B) is the bottleneck; its bandwidth is insufficient to ingest the 67 MB payload from the PCIe bus at speed.'
  - 'The transfer is defaulting to a CPU-mediated path instead of using direct peer-to-peer DMA (RDMA), introducing significant OS and driver overhead.'
  - 'The system is using a TCP/IP stack over the PCIe bus for communication, and the network protocol overhead is the source of the high latency.'
  correct_index: 2
