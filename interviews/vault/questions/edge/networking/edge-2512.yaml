title: '5G NR TDD Asymmetry Overhead'
scenario: '8 vehicles use 5G NR TDD (70% downlink, 30% uplink ratio on a 1 Gbps symmetric channel) to broadcast and reduce a 20 MB gradient payload.'
question: 'Evaluate the total time for a Parameter Server broadcast-and-reduce cycle, factoring in the TDD asymmetry.'
details:
  realistic_solution: 'Effective uplink is 300 Mbps (37.5 MB/s); downlink is 700 Mbps (87.5 MB/s). Assuming orthogonal frequency allocation, the 8-client Reduce phase bottlenecks on the aggregate uplink: 20 MB / 37.5 MB/s = 533ms. Broadcast phase uses downlink: 20 MB / 87.5 MB/s = 228ms. Total cycle time is 761ms.'
  common_mistake: |
    **The Pitfall:** Using the peak 1 Gbps symmetric bandwidth for both upload and download calculations.
    **The Rationale:** Engineers overlook the explicit Time Division Duplex (TDD) asymmetry typical in 5G cellular networks.
    **The Consequence:** The calculated broadcast-and-reduce cycle time is severely underestimated, hiding a critical uplink bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5G NR TDD channel: 1 Gbps (125 MB/s).
    - TDD ratio: 70% downlink, 30% uplink.
    - Payload size: 20 MB gradient.

    **Calculations:**
    - Effective downlink: 125 MB/s * 0.70 = 87.5 MB/s.
    - Effective uplink: 125 MB/s * 0.30 = 37.5 MB/s.
    - Broadcast phase (downlink): 20 MB / 87.5 MB/s = 228 ms.
    - Reduce phase (uplink): 20 MB / 37.5 MB/s = 533 ms.
    - Total broadcast-and-reduce cycle: 228 ms + 533 ms = 761 ms.

    **Conclusion & Interpretation:**
    - **Result: 761 ms (Network-Bound)**. Asymmetric 5G TDD heavily penalizes upload-heavy operations, shifting the primary bottleneck of parameter serving to the uplink.
