title: Edge Split-Compute Framing
scenario: Two Jetson AGX Orins are connected via a dedicated 10 Gbps Ethernet link, cooperating to run a split-compute vision transformer. Activation sizes are not uniform - 70% of frames produce 5 MB activations, 30% produce 12 MB activations due to dynamic-token-pruning that depends on scene content. TCP/IP framing adds ~6% overhead per transfer.
question: Compute the expected sustainable FPS given the variable activation sizes and TCP/IP overhead, and quantify how much the worst-case (12 MB) frames degrade P99 frame time relative to the average.
