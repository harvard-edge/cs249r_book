title: Edge Vision Fan-In Bottleneck
scenario: A smart factory routes 8 MIPI sensors streaming 1080p 30FPS raw RGB through per-sensor MIPI-to-Ethernet bridges to a single Jetson AGX Orin central node over standard Gigabit Ethernet. Streams are encapsulated in RTP over UDP/IP/Ethernet, giving roughly 5% framing/protocol overhead end-to-end.
question: Determine whether the 1 GbE link can handle the raw fan-in once RTP/UDP/IP framing overhead is included, and quantify how many sensors could be supported if you compress with H.264 at a 100:1 ratio.
visual:
  kind: svg
  path: edge-2274.svg
  alt: A fanout diagram showing 8 camera nodes pointing into a single Jetson central node.
  caption: Camera to Edge Fan-In Topology
details:
  realistic_solution: 'Per-sensor raw payload = 186 MB/s. With 5% overhead, eight sensors push ~1.56 GB/s versus a 1 GbE budget of ~119 MB/s. Raw is ~13x over budget. With 100:1 H.264 compression, each sensor drops to ~1.95 MB/s on the wire, so 8 sensors fit easily.'
  common_mistake: |
    **The Pitfall:** Confusing Gigabit (Gbps) with Gigabyte (GB/s) and ignoring protocol overhead.
    **The Rationale:** Candidates divide 1 Gbps by 10 instead of 8, or forget RTP headers take up capacity.
    **The Consequence:** Massively oversubscribed edge network causing 100% packet loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 sensors, 1080p 30FPS raw RGB
    - Overhead: 5%; Link: 1 GbE (~125 MB/s theoretical)

    **Calculations:**
    - Raw payload/sensor = 1920 * 1080 * 3 * 30 = 186.6 MB/s
    - Total with overhead = 8 * 186.6 * 1.05 = 1567 MB/s
    - GbE effective capacity = 125 * 0.95 = 118.75 MB/s
    - Ratio = 1567 / 118.75 = 13.2x over budget
    - H.264 (100:1) = 8 * 1.95 MB/s = 15.6 MB/s

    **Conclusion & Interpretation:**
    - **Result: 13.2x over budget without compression (Network-Bound)**. Raw data overwhelms link, H.264 is required.
