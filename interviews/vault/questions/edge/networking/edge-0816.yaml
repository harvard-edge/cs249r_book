title: The Edge Inference Offload Decision
scenario: An edge camera with a Jetson Orin runs a detection model locally in 15ms. Alternatively, it can offload inference to a nearby edge server over a 1 Gbps wired link — the server runs the same model in 3ms. Each input frame is 500 KB and the response is 1 KB.
question: What are the local versus offloaded end-to-end latencies, and below what bandwidth does offloading become slower than 15 ms local inference?
details:
  realistic_solution: 'Network link transfer latency heavily bottlenecks remote edge clouds. Measure bit propagation explicitly. Break-even occurs entirely due to raw throughput boundaries intersecting local compute delays.'
  common_mistake: |
    **The Pitfall:** Ignoring the data transfer time and focusing only on the server's raw inference speedup.
    **The Rationale:** Candidates forget that the 500 KB frame must be transmitted over the network, which can dominate the latency equation at lower bandwidths.
    **The Consequence:** Designing an offload architecture that is actually slower end-to-end than local edge inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local Latency: 15ms
    - Remote HW: 3ms
    - Link: 1 Gbps (125 MB/s), 0.5ms RTT
    - Payload: 500 KB

    **Calculations:**
    - Offload Latency (1 Gbps) = 500 KB / 125 MB/s = 4ms transfer
    - Total Offload = 4ms (transfer) + 0.5ms (RTT) + 3ms (inference) = 7.5ms
    - Break-even transfer = 15ms - 3ms - 0.5ms = 11.5ms
    - Min bandwidth = 500 KB / 11.5ms = ~43.48 KB/ms = ~348 Mbps

    **Conclusion & Interpretation:**
    - **Result: Offload wins at 1Gbps.** Local wins below 348 Mbps.
