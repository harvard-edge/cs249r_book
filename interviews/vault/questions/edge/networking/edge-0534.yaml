title: The CAN Bus Bandwidth Crunch
scenario: Your Ambarella CV5-based ADAS system runs 4 perception models and sends results over CAN bus
  to the vehicle ECU. Each model outputs bounding boxes, lane lines, and free-space polygons at 30 Hz.
  The vehicle's CAN bus is standard CAN 2.0B running at 500 kbps, shared with 15 other ECUs (engine, brakes,
  steering, etc.). Your ML telemetry is causing CAN bus errors and the engine ECU is missing messages.
question: How much effective bandwidth does CAN 2.0B provide, and what share is your 30 Hz ML telemetry
  consuming?
details:
  realistic_solution: CAN 2.0B frames carry a maximum of 8 bytes of payload with 47 bits of overhead.
    Effective data rate at 500 kbps is ~36 KB/s maximum throughput (58% efficiency). The ML telemetry
    demands 17.76 KB/s, consuming roughly 49% of the available bandwidth, causing the observed frame drops.
  common_mistake: '**The Pitfall:** Assuming the CAN bus has plenty of bandwidth just because individual
    ML messages are small, while ignoring CAN framing overhead and real-time priority implications.

    **The Rationale:** CAN 2.0B has a high framing overhead and uses arbitration based on message IDs;
    flooding the shared 500 kbps bus with low-priority, high-frequency ML telemetry prevents lower-ID,
    critical messages from transmitting.

    **The Consequence:** The shared CAN bus becomes saturated, causing dropped messages, ML telemetry
    errors, and critical engine ECU message failures.'
  napkin_math: '**Assumptions & Constraints:**

    - CAN 2.0B at 500 kbps, 8-byte payload per 111-bit frame

    - ML telemetry: 592 bytes at 30 Hz


    **Calculations:**

    - Effective bandwidth = (8 bytes / 111 bits) * 500,000 bps = 36,036 bytes/s (~36 KB/s)

    - Telemetry bandwidth = 592 bytes * 30 Hz = 17,760 bytes/s (~17.76 KB/s)

    - Share = 17.76 / 36.04 = 49.3%


    **Conclusion & Interpretation:**

    - **Result: 36 KB/s effective, 49% consumed (Bandwidth-Bound)**. High utilization by ML telemetry
    causes collisions and critical message drops for other vehicle ECUs.

    '
