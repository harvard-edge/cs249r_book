title: Multi-Agent BLE vs Wi-Fi Consensus
scenario: 5 wearables must reach consensus on a 1 KB vector every 2 seconds.
question: Design a topology and protocol choice that safely satisfies the 2-second real-time consensus deadline given BLE Mesh vs Wi-Fi Direct.
details:
  realistic_solution: BLE Mesh utilizing a flooding topology is optimal. While Wi-Fi Direct offers superior raw bandwidth and transfer latency (20ms), its 1.5s group owner negotiation from sleep consumes 75% of the 2-second deadline, creating a synchronization bubble with high failure risk. BLE Mesh avoids setup overhead (200ms multi-hop) and comfortably meets the deadline.
  common_mistake: |
    **The Pitfall:** Selecting Wi-Fi Direct due to its 20ms transfer latency.
    **The Rationale:** Optimizing for raw bandwidth and transfer time while ignoring connection establishment overhead from sleep states.
    **The Consequence:** The system consistently misses the 2-second real-time consensus deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 1 KB vector. Deadline: 2000ms.
    - BLE Mesh: 200ms per hop.
    - Wi-Fi Direct: 1500ms setup + 20ms transfer.

    **Calculations:**
    - Wi-Fi Total Latency: 1500ms + 20ms = 1520ms. Margin: 480ms.
    - BLE Total Latency: 200ms. Margin: 1800ms.

    **Conclusion & Interpretation:**
    - **Result: BLE provides safe margins (Latency-Bound by Connection Setup)**. Wi-Fi risks synchronization failure.
