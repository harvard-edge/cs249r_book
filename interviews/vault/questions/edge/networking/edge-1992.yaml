title: Edge Inference Traffic Management on NVIDIA Jetson Orin
scenario: You are deploying a fleet of NVIDIA Jetson Orin devices (32 GB LPDDR5, 275 TOPS INT8, 60W power budget) at the edge to perform real-time object detection and classification for an autonomous vehicle fleet. Each Jetson Orin can run multiple inference models, but some models are more computationally intensive than others. Due to varying network conditions and the dynamic nature of incoming sensor data, the inference load on individual devices can fluctuate significantly. Design a request routing and traffic management system for this edge deployment. Explain why your chosen approach handles variable inference loads and network latency effectively, considering the Jetson Orin's specific hardware constraints and power budget.
question: How would you design request routing for a Jetson Orin edge fleet to handle variable model loads, network latency, and the 60W power budget?
details:
  realistic_solution: Use a latency-aware edge router with per-model queues, local failover, and admission control rather than plain weighted hashing. Each Jetson reports measured service time by model, queue depth, power draw, thermals, EMC/GPU clocks, and link RTT. The router estimates each candidate's finish time as network RTT plus queued service demand for that model, rejects or degrades non-safety-critical requests when the latency budget cannot be met, and avoids nodes near the 60W thermal throttle point. Safety-critical requests stay in the vehicle's local zone first; if the local Orin is hot or saturated, fail over to a nearby healthy node with a bounded RTT, otherwise run a smaller fallback model locally. Weighted consistent hashing can still provide stable placement for cache affinity, but routing weights must be driven by per-model latency and thermal telemetry.
  common_mistake: |
    **The Pitfall:** Implementing simple round-robin load balancing without considering heterogeneous model workloads.
    **The Rationale:** Candidates treat edge devices identically to cloud instances, ignoring device-specific thermal throttling and varying INT8 TOPS availability.
    **The Consequence:** Uneven utilization causing severe latency spikes on overburdened devices while others remain idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin: 275 TOPS INT8 peak, 60W limit.
       - Measured simple-model service time: 50ms.
       - Measured complex-model service time: 200ms.
       - Fleet size: 10 devices.
       - Latency budget: 150ms for safety-critical simple-model requests.
       - Conservative scheduler model: route by estimated finish time, not average fleet utilization.
    2. **Calculations:**
       - Simple model max throughput per device = 1000ms / 50ms = 20 inferences/second.
       - Complex model max throughput per device = 1000ms / 200ms = 5 inferences/second.
       - Candidate A has one complex job queued: estimated finish time for a new simple request = RTT 10ms + 200ms queued + 50ms service = 260ms, above the 150ms budget.
       - Candidate B is warm but has no queued accelerator work: estimated finish time = RTT 35ms + 50ms service = 85ms, within budget.
       - If all candidates exceed the budget or report thermal throttling, route to the local fallback model or shed non-critical work.
    3. **Conclusion & Interpretation:**
       - **Result: route by deadline-aware finish time, not raw TOPS.** The policy selects Candidate B despite higher RTT because per-model queued service time and thermal state dominate the safety-critical latency budget.
