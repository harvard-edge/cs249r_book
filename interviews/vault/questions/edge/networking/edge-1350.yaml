title: Load Balancing Requests Across Google Coral TPUs
scenario: An industrial edge gateway is equipped with 4 Google Coral Edge TPUs via PCIe. An application load balancer must distribute incoming image inspection requests. Each request requires an INT8 quantized model taking 50 GOPS to execute. The system receives a sustained load of 200 requests per second.
question: At 200 requests/sec with 50 GOPS/request, how much compute is required, can one Coral TPU handle it, and how should traffic be routed across 4 TPUs?
details:
  realistic_solution: 'The load balancer should use a round-robin or least-outstanding-requests routing strategy at the application level to distribute the 200 requests/sec evenly across all 4 TPUs. This ensures no single TPU bottlenecks at its 4 TOPS limit and spreads the thermal dissipation evenly, keeping power draw per chip well below the 2W maximum.'
  common_mistake: |
    **The Pitfall:** Miscalculating compute requirements or ignoring hardware constraints.
    **The Rationale:** Candidates often miscalculate the conversion from GOPS to TOPS, or fail to account for the Coral's strict 4 TOPS limit per chip.
    **The Consequence:** Proposing a routing strategy that overloads a single TPU, leading to thermal throttling or complete system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 Google Coral Edge TPUs (4 TOPS each).
    - 200 requests/sec, 50 GOPS/request.

    **Calculations:**
    - Total compute required: 200 requests/sec x 50 GOPS = 10,000 GOPS = 10 TOPS.
    - Capacity check: 10 TOPS > 4 TOPS (1 Coral TPU cannot handle the load).
    - Minimum TPUs needed: ceil(10 / 4) = 3 TPUs.
    - Distributing evenly across 4 TPUs: 200 requests / 4 = 50 requests/sec per TPU.
    - Compute per TPU: 50 x 50 GOPS = 2,500 GOPS = 2.5 TOPS.
    - Utilization per TPU: 2.5 TOPS / 4.0 TOPS = 62.5%.

    **Conclusion & Interpretation:**
    - **Result: Load Balanced (Compute-Bound).** Distributing 50 requests/sec per TPU yields 62.5% utilization, preventing thermal throttling and meeting the 10 TOPS demand.
