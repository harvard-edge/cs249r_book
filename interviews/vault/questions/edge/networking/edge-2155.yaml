title: 'Edge Gateway Load Spillover'
scenario: 'A store has three edge gateways, each handling 120 inferences/s. One gateway fails during peak traffic of 300 inferences/s.'
question: 'Can two remaining edge gateways serve 300 inferences/s while staying below 80% utilization if each can handle 120 inferences/s?'
details:
  realistic_solution: 'Two gateways provide 240 inferences/s capacity. The 80% safe capacity is 192 inferences/s, well below 300. Even raw capacity is insufficient, so the site needs cloud fallback, request shedding, or a lower-cost model.'
  common_mistake: 'Checking only that there are multiple gateways and assuming failover is safe.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 Gateways at 120 inf/s each. 1 failure.
    - Peak load: 300 inf/s.
    - Safe utilization limit: 80%.

    **Calculations:**
    - Remaining raw capacity: 2 * 120 inf/s = 240 inf/s.
    - Safe operating capacity: 240 * 0.80 = 192 inf/s.

    **Conclusion & Interpretation:**
    - **Result: 192 inf/s Safe Capacity (Network-Bound)**. The surviving nodes cannot absorb the 300 inf/s spike, requiring immediate shedding.
