title: Edge Swarm Feature Map Aggregation over 5G
scenario: A fleet of 10 Jetson AGX Orin drones capture 1080p 30fps video, processing frames into 1x256x512 INT8 feature maps locally. They must stream these feature maps continuously to a centralized A100 server for anomaly detection over a shared 100 Mbps wireless uplink.
question: What is the exact compression ratio required to sustain real-time processing and prevent uplink saturation?
visual:
  kind: svg
  path: edge-0975.svg
  alt: A fanout diagram showing multiple drones funneling data into a single constrained wireless network node, which then connects to an aggregation server.
  caption: Swarm Uplink Architecture
details:
  realistic_solution: 'Each drone generates significant feature map data that combined vastly exceeds the 100 Mbps shared uplink. To resolve this, an engineer should propose spatial pooling, temporal subsampling (e.g., transmitting at ~9 fps), or applying further quantization. At 314 Mbps total, a compression ratio of at least 3.14x is required to fit under the 100 Mbps bandwidth cap.'
  common_mistake: Focusing purely on the Orin's local compute capacity or LPDDR5 bandwidth while completely missing the shared network uplink bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 drones, 30 FPS
    - Feature map size: 1x256x512 INT8 (131,072 bytes)
    - Shared uplink: 100 Mbps

    **Calculations:**
    - Bandwidth per drone = 30 FPS * 131,072 bytes * 8 bits/byte = 31.4 Mbps
    - Total bandwidth = 10 * 31.4 = 314.5 Mbps
    - Required ratio = 314.5 Mbps / 100 Mbps = 3.145

    **Conclusion & Interpretation:**
    - **Result: 3.14x Ratio (Network-Bandwidth-Bound)**. Significant spatial pooling or temporal subsampling is needed to fit the feature stream within the 100 Mbps link.
