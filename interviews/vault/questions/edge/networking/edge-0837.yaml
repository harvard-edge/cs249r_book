title: Maximum Gradient Bit-Width for 32M-Parameter Upload at 2 Mbps
scenario: Deploying a federated learning system for a predictive keyboard using a 32-million parameter language model. The average cellular uplink bandwidth is 2 Mbps. The gradient upload phase must not exceed 40 seconds per round, with a 2 MB overhead per upload for protocol headers.
question: What maximum gradient quantization bit-width lets the 32M-parameter model upload within 40 seconds at 2 Mbps with 2MB overhead?
details:
  realistic_solution: The maximum upload budget is 2 Mbps * 40 seconds = 80 megabits = 10 MB. After subtracting the fixed 2 MB protocol overhead, only 8 MB = 64 megabits remain for gradients. With one gradient value per model parameter, 64 megabits / 32 million parameters = 2 bits per parameter. That is the maximum bit-width under the stated decimal MB/Mb assumptions, and it is extremely aggressive for gradient quality.
  common_mistake: |
    **The Pitfall:** Failing to convert between megabits (Mb) and megabytes (MB) correctly, or neglecting protocol overhead.
    **The Rationale:** Candidates rush calculations, mixing up bits and bytes, or forget to subtract the constant 2 MB overhead.
    **The Consequence:** This leads to an incorrect bit-width, drastically overestimating or underestimating the allowable quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 32M parameters.
    - One gradient value is uploaded per parameter.
    - Uplink: 2 Mbps. Target Time: 40s.
    - Fixed overhead: 2 MB, using decimal MB for consistency with Mbps.

    **Calculations:**
    - Max Payload = 40s * 2 Mbps = 80 Megabits (Mb).
    - Convert to bytes: 80 Mb / 8 bits/byte = 10 MB.
    - Gradient Budget = 10 MB - 2 MB overhead = 8 MB.
    - Convert budget to bits: 8 MB * 8 bits/byte = 64 Mbits.
    - Required Bit-Width = 64 Mbits / 32M params = 2 bits/param.

    **Conclusion & Interpretation:**
    - **Result: 2 bits/param (Egress-Bound)**. The maximum allowable gradient quantization bit-width is 2 bits per parameter under these assumptions, which is likely too aggressive without error feedback or other compression controls.
