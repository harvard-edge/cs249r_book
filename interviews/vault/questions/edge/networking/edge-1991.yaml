title: Load Balancing for Dynamic Qualcomm Cloud AI 100 Inference Workloads
scenario: A critical ML inference service is being deployed on a cluster of Qualcomm Cloud AI 100 accelerators. The service experiences frequent scaling events. The engineering team needs a request routing strategy that minimizes the impact of these events on ongoing inference tasks.
question: Which load balancing algorithm best minimizes re-partitioning and cache invalidation during scaling events, and how does it work?
details:
  realistic_solution: 'Implement Consistent Hashing logic. Standard load balancers annihilate ML clusters during up-scales because entire cached model contexts have to migrate VRAM over the PCIe plane. Consistent hashing restricts movement strictly to the localized sector boundary.'
  common_mistake: |
    **The Pitfall:** Implementing modulo hashing or basic round-robin load balancing.
    **The Rationale:** Candidates forget the stateful nature of ML inference, where large models must be loaded into local accelerator memory (LPDDR4x).
    **The Consequence:** Massive latency spikes during scaling events because the majority of cached models are unnecessarily invalidated and re-transferred.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 10 to 11 instances
    - 16 GB model payload per instance
    - Total Pool: 160 GB

    **Calculations:**
    - Modulo: 10/11 keys remapped -> 0.909 * 160 GB = 145.4 GB reload cascade
    - Consistent Hash: 1/11 keys remapped -> 0.0909 * 160 GB = 14.5 GB reload

    **Conclusion & Interpretation:**
    - **Result: Consistent Hashing Mitigates Massive VRAM Thrash.**
