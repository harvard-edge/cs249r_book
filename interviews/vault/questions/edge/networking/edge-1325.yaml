title: Evaluating Request Routing on Qualcomm Cloud AI 100
scenario: You are designing the request routing layer for an on-premise inference cluster consisting of 8 Qualcomm Cloud AI 100 accelerators (each providing 400 TOPS INT8 at 75W, with 32 GB LPDDR4x memory) serving a combination of real-time latency-sensitive NLP tasks and batch computer vision processing.
question: Should the 8-card Cloud AI 100 cluster use model-ID consistent hashing or queue-depth weighted round-robin for request routing?
details:
  realistic_solution: Consistent hashing based on model ID is the better approach for this on-premise accelerator environment. By pinning specific models to specific Qualcomm Cloud AI 100 cards, you ensure that the 32 GB memory is effectively utilized without thrashing, allowing the accelerator to maintain high throughput (approaching the theoretical 400 TOPS) for the resident models. If a single accelerator becomes a hotspot, the consistent hashing ring can be updated with virtual nodes to distribute the load among the 8 cards while preserving model locality.
  common_mistake: Candidates often default to a simple queue-depth based weighted round-robin to maximize the 400 TOPS utilization, ignoring the high cost of model context switching. They fail to account for the fact that continuously loading and unloading large models into the 32 GB LPDDR4x memory will cause severe memory bandwidth bottlenecks and spike tail latency for real-time requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100 memory: 32 GB LPDDR4x.
    - NLP model size: 4 GB (up to 8 resident per card).
    - Context switch latency via PCIe: ~100ms.
    
    **Calculations:**
    - A dynamic routing switch forces a model load taking 100ms.
    - Consistent hashing guarantees the requested model is already in the 32 GB memory.
    
    **Conclusion & Interpretation:**
    - **Result: 100ms Penalty (Memory-Bound)**. Round-robin destroys real-time latency budgets (<50ms) by forcing constant PCIe transfers, whereas consistent hashing preserves memory locality.
