title: 'Edge ML Inference: Optimizing Load Balancing with Hailo-8 Accelerators'
scenario: A cluster of 50 Hailo-8 accelerators (26 TOPS INT8, 2.5W each) processes 500 inference requests per second (sampled from 100 cameras). Each inference consumes a fixed 2 TOPS-equivalent of work per second at the target model and frame rate. Temporary traffic spikes up to 1000 requests/second exceed physical capacity and must be handled gracefully.
question: Which routing and load-balancing strategies would you compare for the 50-Hailo-8 cluster, and how would you handle spikes to 1000 RPS?
details:
  realistic_solution: 'Compare round-robin as a baseline, consistent hashing for camera or tracker affinity, least-loaded routing using queue depth and thermal headroom, and weighted routing that accounts for per-device health. The recommended policy is hybrid: keep stateful streams sticky with consistent hashing, rebalance hot shards with least-loaded or weighted routing, and enforce admission control. Because the 1000 RPS spike exceeds hard capacity, no balancer can make all requests succeed; the system must shed, downsample, skip frames, or run lower-priority models selectively.'
  common_mistake: |
    **The Pitfall:** Applying traditional cloud load balancing without considering strict edge power and compute limits.
    **The Rationale:** Candidates assume infinite elasticity and uniform traffic distribution, ignoring that each chip has a hard 26 TOPS and 2.5W limit.
    **The Consequence:** During traffic spikes, edge nodes saturate and thermally throttle, leading to system-wide failure rather than graceful degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 devices at 26 TOPS each.
    - Baseline is 500 req/s.
    - Spike is 1,000 req/s.
    - Each request consumes a fixed 2 TOPS-equivalent of work per second at the target model and frame rate.

    **Calculations:**
    - Total Capacity = 50 * 26 = 1,300 TOPS.
    - Baseline Load = 500 * 2 = 1,000 TOPS (77% util).
    - Spike Load = 1,000 * 2 = 2,000 TOPS.
    - Deficit = 2,000 - 1,300 = 700 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Spike requires 2,000 TOPS-equivalent against a 1,300 TOPS limit.** Routing should compare sticky, round-robin, and least-loaded policies, but the overload still requires admission control or shedding.
