title: The Fleet OTA Bandwidth Budget
scenario: Your company operates 10,000 edge AI cameras on cellular LTE connections. A critical model update is 80 MB. You design a delta-update strategy where the diff between model versions is 12 MB.
question: What are the full-update cost and time, the delta-update savings, and the total cost impact if 3% of devices have corrupted base models and require full updates?
details:
  realistic_solution: A full update sends 10,000 * 80 MB = 800,000 MB, costing $16,000 at $0.02/MB. At 5 Mbps, each full update takes 80 MB / 0.625 MB/s = 128 seconds per device; fleet wall-clock time depends on how many devices download concurrently. A pure 12 MB delta sends 120,000 MB and costs $2,400, saving $13,600 or 85% versus full update. With 3% fallback, 300 devices download 80 MB and 9,700 download 12 MB, for 140,400 MB and $2,808 total. That is $13,192 saved, or about 82.45% versus updating everyone with the full model.
  common_mistake: |
    **The Pitfall:** Calculating only the "happy path" delta update cost.
    **The Rationale:** Candidates assume 100% of the fleet will successfully apply the delta, ignoring edge environment entropy.
    **The Consequence:** Severe budget under-provisioning and throttled network pipelines when the inevitable percentage of devices fallback to massive full-image downloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 devices
    - Network constraint: 5 Mbps downlink, $0.02/MB
    - Full update: 80 MB; Delta: 12 MB
    - Fallback rate: 3% (300 devices)

    **Calculations:**
    - Full fleet update: 10,000 * 80 MB = 800 GB -> $16,000
    - Full update time: 80 MB / (0.625 MB/s) = 128 seconds/device; fleet wall-clock time requires a concurrency assumption.
    - Pure Delta update: 10,000 * 12 MB = 120 GB -> $2,400
    - Pure delta savings: $16,000 - $2,400 = $13,600 = 85% savings vs full update.
    - 3% Fallback reality: (300 * 80 MB) + (9,700 * 12 MB) = 24,000 MB + 116,400 MB = 140.4 GB -> $2,808
    - Blended fallback savings: $16,000 - $2,808 = $13,192 = 82.45% savings vs full update.

    **Conclusion & Interpretation:**
    - **Result: $2,808 Blended OTA Cost**. Delta-only deployment saves 85%; with 3% full-update fallback, savings are about 82.45%. Per-device transfer time is 19.2 seconds for delta devices and 128 seconds for fallback devices at 5 Mbps.
