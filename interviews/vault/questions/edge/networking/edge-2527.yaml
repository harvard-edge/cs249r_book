title: 'RP2040 Dual-Core SRAM Contention'
scenario: 'On an RP2040, Core 0 writes audio to shared SRAM while Core 1 reads it for ML inference. Concurrent access to the single-ported SRAM causes a 1-cycle contention stall.'
question: 'What is the synchronization overhead per 1000 audio samples if accesses align perfectly?'
details:
  realistic_solution: |
    A 1-cycle stall per perfectly aligned read/write collision across 1000 samples results in 1000 cycles of contention. To mitigate this micro-architectural bottleneck, implement a ping-pong buffer or interleaved memory banking to physically separate the read and write domains, guaranteeing zero-wait-state memory access.
  common_mistake: |
    **The Pitfall:** Ignoring micro-architectural contention and assuming dual-core shared memory access has zero cycle-level synchronization penalties.
    **The Rationale:** Developers abstract away hardware details, treating shared memory as an ideal, non-blocking resource.
    **The Consequence:** Unaccounted delays in tight real-time loops, leading to missed deadlines or dropped audio samples in edge ML pipelines.
  napkin_math: |
    **Assumptions & Constraints:**
    - RP2040 clock speed: 133 MHz.
    - 1-cycle stall per sample collision.
    - 1000 audio samples processed.

    **Calculations:**
    - Cycle Time: 1 / 133,000,000 s ≈ 7.5 ns.
    - Total Stalls: 1000 samples * 1 cycle/sample = 1000 cycles.
    - Total Delay: 1000 cycles * 7.5 ns = 7500 ns = 7.5 µs.

    **Conclusion & Interpretation:**
    - **Result: 7.5 µs Synchronization Penalty (Latency-Bound).** The exact micro-architectural overhead is deterministic and easily eliminated via double-buffering.
