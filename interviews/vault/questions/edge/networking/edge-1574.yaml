title: Load Balancing Inference Across Multiple Coral TPUs
scenario: You are designing a local edge gateway equipped with 4 Google Coral Edge TPUs via PCIe to handle video stream inference. Each TPU operates at 2W and provides 4 TOPS for INT8 quantized models. Your system uses a round-robin load balancer to route 12,000 object detection requests per second.
question: 'With 12,000 requests/s across 4 Coral TPUs, what compute load per TPU is required and can the cluster sustain it?'
details:
  realistic_solution: Since the 4 Coral TPUs have identical hardware specifications, a simple round-robin load balancing strategy is sufficient to distribute traffic evenly. All models must be pre-quantized to INT8 due to the Edge TPU's limited operator support, and routing should keep models pinned to specific TPUs if multiple model types are served to avoid PCIe memory transfer bottlenecks.
  common_mistake: |
    **The Pitfall:** Forgetting to align units (GOPS vs TOPS) or failing to divide total load by the number of accelerators.
    **The Rationale:** Candidates rush the arithmetic and mistake Giga (10^9) for Tera (10^12), or overlook that models must strictly be INT8 quantized for Coral TPUs.
    **The Consequence:** Grossly miscalculated capacity requirements, leading to either massive over-provisioning or immediate hardware saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Request rate: 12,000 req/sec.
    - Compute per request: 0.8 GOPS.
    - 4 Coral TPUs (4 TOPS each).

    **Calculations:**
    - Total compute required = 12,000 req/sec * 0.8 GOPS = 9,600 GOPS = 9.6 TOPS.
    - Compute per TPU = 9.6 TOPS / 4 TPUs = 2.4 TOPS.
    - 2.4 TOPS < 4 TOPS limit.

    **Conclusion & Interpretation:**
    - **Result: 2.4 TOPS per TPU (Compute-Bound)**. The cluster can successfully sustain the inference load.
