title: Heterogeneous Routing on NVIDIA Jetson Orin
scenario: You are designing an edge inference appliance using a single NVIDIA Jetson Orin to process 24 concurrent HD video streams for defect detection. The Orin features a heterogeneous compute architecture containing both an Ampere GPU and multiple Deep Learning Accelerators (DLAs).
question: How would you route 24 HD video streams across Jetson Orin's GPU and DLAs to maximize throughput while staying within 60W?
details:
  realistic_solution: Implement a dynamic heterogeneous router using weighted queueing or work-stealing, routing complex, dynamic-batch models to the Ampere GPU and steady-state, supported models to the DLAs. Because the Jetson Orin has unified 32 GB LPDDR5 memory, the router must pass memory pointers (zero-copy) rather than duplicating frames. To stay within the 60W TDP, the load balancer should batch aggressively on the GPU while keeping the DLAs continuously fed with single-stream pipelines, avoiding idle power spikes.
  common_mistake: |
    **The Pitfall:** Proposing a naive round-robin router and suggesting unnecessary memory copies.
    **The Rationale:** Candidates forget that DLAs have different latency/support profiles than the GPU, and forget that Orin memory is unified.
    **The Consequence:** Round-robin causes idle power spikes on the DLA, and copying data wastes the 60W power budget and memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total load: 24 streams * 30 FPS = 720 FPS.
       - Orin Compute: ~275 TOPS total (170 TOPS GPU, 105 TOPS DLAs).
       - Memory: 32 GB LPDDR5 (Unified).
    2. **Calculations:**
       - Compute budget per frame = 275,000 GOPS / 720 FPS = ~381 GOPS/frame.
       - Optimal static routing = ~60% frames to GPU (170/275) and ~40% to DLAs (105/275).
       - Memory bandwidth for buffering = 720 FPS * 1920 * 1080 * 3 bytes = 4.47 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 4.47 GB/s and ~381 GOPS/frame.** Safely inside 32GB LPDDR5 limits and 60W TDP using zero-copy. This is **Compute-Bound**.
