title: Assigning Jetson Orin Model Instances to GPU and DLA
scenario: You are setting up local inference traffic management on an NVIDIA Jetson Orin to handle multiple camera streams. The device features an Ampere GPU and a DLA accelerator.
question: Which NVIDIA configuration lets you place inference model instances on either the Jetson Orin GPU or DLA?
details:
  realistic_solution: Use Triton Inference Server instance groups to configure model instances on specific devices, and use TensorRT DeviceType/DLACore settings when building or running engines for DLA. These features place model execution on the Jetson Orin's Ampere GPU or DLA; they are device-placement controls, not an external weighted request router.
  common_mistake: |
    **The Pitfall:** Suggesting the use of external network load balancers like HAProxy or NGINX for intra-device hardware routing.
    **The Rationale:** Engineers default to network-level load balancing tools they know from cloud microservices.
    **The Consequence:** External proxies introduce severe networking overhead and lack direct visibility into the hardware queues, resulting in high latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin exposes an Ampere GPU and DLA cores.
    - Triton instance groups can create separate model instances assigned to available devices.

    **Calculations:**
    - Define one model instance for the GPU path and another engine or instance for the DLA path where the model is DLA-compatible.
    - Use client-side policy, Triton model configuration, or model endpoints to steer work to the intended instance.

    **Conclusion & Interpretation:**
    - **Result: Instance groups and TensorRT device settings provide accelerator placement**. They help use GPU and DLA resources without implying automatic weighted round-robin routing.
