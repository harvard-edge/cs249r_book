title: Evaluating Sparse Gradient Updates on Edge
scenario: You are designing a federated learning system for a mobile keyboard application training a 10M parameter NLP model (40MB in FP32). Clients are often on constrained networks with 1 Mbps uplink capabilities. Sending the full dense gradient update per round takes too long and causes high drop-out rates due to latency and battery drain.
question: How would you use Top-k sparse gradients to reduce the 40MB dense FL upload over a 1 Mbps link without hurting convergence?
details:
  realistic_solution: 'Implement a 1% Top-k sparsity strategy coupled with local error feedback (accumulating the unsent gradients locally). This dramatically reduces the per-round uplink payload while mitigating the convergence penalty. Naive 32-bit index transmission doubles the sparse payload size, so indices should be compressed (e.g., using run-length encoding) to maximize bandwidth efficiency.'
  common_mistake: |
    **The Pitfall:** Ignoring the payload overhead of transmitting sparse indices.
    **The Rationale:** Candidates assume that 1% sparsity translates exactly to 1% of the payload size.
    **The Consequence:** They underestimate the bandwidth requirements by at least 2x, failing to accurately model network transmission times for the FL system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 10M params (40MB FP32).
    - Uplink: 1 Mbps (125 KB/s).
    - Sparsity: Top-k 1%.

    **Calculations:**
    - Full Update Transfer Time: 40MB / 0.125 MB/s = 320s.
    - Top-k Values Payload: 100k * 4B = 400KB.
    - Index Overhead (32-bit): 100k * 4B = 400KB.
    - Total Sparse Payload = 400KB + 400KB = 800KB.
    - Transfer Time: 800KB / 125 KB/s = 6.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: 6.4s per round (Bandwidth-Bound)**. Incorporating the index overhead accurately sizes the 50x network speedup while maintaining convergence.
