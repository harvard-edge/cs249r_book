title: PCIe Switch Oversubscription
scenario: An edge box connects 4 accelerator chips to a host via a PCIe Gen3 switch (upstream x4, downstream x2 per chip). All 4 chips simultaneously DMA a 10 MB activation back to the host.
question: Analyze the bandwidth bottleneck and synchronization delay of this concurrent DMA?
details:
  realistic_solution: The switch has 8 lanes downstream but only 4 lanes upstream. Using the raw PCIe Gen3 x4 line-rate approximation of ~3.93 GB/s gives a 2:1 oversubscription. The 4 concurrent 10 MB transfers (40 MB total) must serialize over the x4 upstream link, so the ideal lower-bound synchronization delay is 40 MB / 3930 MB/s = 10.17ms before protocol overhead and payload-efficiency losses.
  common_mistake: |
    **The Pitfall:** Assuming each accelerator gets its full x2 dedicated bandwidth to the host without contention.
    **The Rationale:** Candidates fail to trace the full network topology and miss the 2:1 oversubscription at the upstream PCIe Gen3 x4 switch.
    **The Consequence:** Synchronization delays are vastly underestimated, causing unexpected latency misses in tightly coupled multi-chip pipelines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Links: PCIe Gen3 x4 upstream, x2 downstream per chip.
    - Use ~3.93 GB/s as an optimistic raw x4 line-rate approximation; effective payload bandwidth is lower after protocol overhead.
    - Payload: 10 MB per chip from 4 chips.

    **Calculations:**
    - Total payload = 4 * 10 MB = 40 MB.
    - Aggregate downstream capacity is roughly x8, while upstream capacity is x4, so the switch is oversubscribed 2:1 toward the host.
    - Each downstream x2 chip link carries only one 10 MB DMA and is not the shared bottleneck; all 40 MB must cross the shared upstream x4 link.
    - Upstream bottleneck assumption = 3.93 GB/s = 3930 MB/s.
    - Ideal synchronization delay lower bound = 40 MB / 3930 MB/s = 0.01017 s = 10.17 ms.

    **Conclusion & Interpretation:**
    - **Result: at least 10.17 ms synchronization delay (PCIe Upstream-Bound).** Real hardware will be slower once PCIe payload efficiency, switch overhead, and arbitration are included.
