title: The Sensor Fusion Traffic Jam
scenario: 'Your are an ML Systems Engineer on an autonomous vehicle team. Your vehicle uses a dual-GPU edge computer for sensor fusion. GPU-A runs a LiDAR perception model, while GPU-B runs a camera perception model. For fusion, GPU-A must send a 1.5 GB feature map to GPU-B every frame. The system is connected via a PCIe Gen 4.0 x16 bus (max theoretical bandwidth: 32 GB/s).'
question: 'Can a 1.5 GB feature-map transfer over PCIe Gen4 x16 fit within a 33ms fusion budget, and what is the bottleneck?'
details:
  realistic_solution: |
    The primary bottleneck is the physical bandwidth limit of the PCIe Gen 4.0 bus. While its theoretical bandwidth is 32 GB/s, transferring a 1.5 GB payload will take a significant portion of the 33ms latency budget, leaving no time for actual computation.
  common_mistake: |
    **The Pitfall:** Underestimating the sheer data volume of intermediate feature maps.
    **The Rationale:** Engineers often blame software overhead before calculating raw data transfer times across physical bus protocols.
    **The Consequence:** The system hits fundamental hardware limits and completely exhausts the latency budget before computation even begins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Transfer size: 1.5 GB.
    - PCIe Gen 4.0 x16 Bandwidth: 32 GB/s.
    - Latency budget: 33.3 ms (30 FPS).

    **Calculations:**
    - Transfer time = 1.5 GB / 32 GB/s = 0.046875 seconds = 46.875 ms.
    - 46.875 ms > 33.3 ms budget.

    **Conclusion & Interpretation:**
    - **Result: 46.875 ms transfer time (PCIe Bandwidth-Bound)**. Massive intermediate feature maps cannot physically traverse the bus in time.
  options:
  - The CPU is starving the GPU during sensor data ingestion.
  - The PCIe bus is the bottleneck.
  - The issue is high PCIe protocol overhead.
  - NVLink is designed for training, not inference.
  correct_index: 1
