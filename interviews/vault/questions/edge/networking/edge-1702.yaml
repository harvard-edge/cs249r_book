title: Stream Routing and PCIe Bottleneck Analysis
scenario: You are deploying a multi-camera traffic analysis system using an edge IPC equipped with 4 dataflow accelerators. Incoming video frames from 16 cameras are routed to the accelerators using a simple round-robin load balancer. The system is dropping frames at peak load, and profiling shows the accelerators are often stalled waiting for data despite having no local DRAM and streaming directly from host memory via PCIe.
question: Why does round-robin routing stall the 16-camera system, and how much would stream-affinity routing improve throughput?
details:
  realistic_solution: Implement stream-affinity routing to pin each camera stream to a stable accelerator, such as four cameras per accelerator. Round-robin sends every accelerator a constantly changing camera identity, forcing per-stream pipeline state, buffer layout, and PCIe access pattern changes. Sticky routing eliminates most reconfiguration stalls, so the reclaimed stall fraction becomes usable frame-processing capacity.
  common_mistake: |
    **The Pitfall:** Suggesting adding memory or using complex software routing.
    **The Rationale:** Candidates fail to realize that round-robin scatters streams, forcing constant context switches on dataflow architectures.
    **The Consequence:** High PCIe thrashing and pipeline overhead, leaving accelerators idle and dropping frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 cameras, 1080p @ 30 FPS (6 MB/frame).
    - 4 accelerators (26 TOPS each).
    - Reconfiguration overhead when an accelerator switches camera streams: 2 ms.
    - Round-robin causes one camera-stream switch per processed frame on each accelerator; stream-affinity causes switches only at startup or failure.

    **Calculations:**
    - Total FPS: 16 * 30 = 480 FPS.
    - Frames per accelerator: 480 / 4 = 120 FPS.
    - Round-robin switch overhead per accelerator: 120 switches/sec * 2 ms = 240 ms/sec stall.
    - Useful processing time under round-robin: 1000 - 240 = 760 ms/sec.
    - Capacity reclaimed by stream-affinity: 240 / 760 = 31.6% more useful processing time versus the stalled baseline.
    - Equivalent gross capacity increase: 240 / 1000 = 24 percentage points of each accelerator-second.

    **Conclusion & Interpretation:**
    - **Result: ~32% throughput headroom versus the stalled baseline**. Stream-affinity avoids about 240ms of per-accelerator stall each second, reclaiming 24 percentage points of accelerator time for frame processing.
