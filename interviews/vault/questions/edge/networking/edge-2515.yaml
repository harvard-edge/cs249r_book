title: LoRa Mesh Gossip Protocol
scenario: 10 micro-satellites orchestrate a 50 KB federated update using LoRa. The mesh network suffers a 500ms propagation delay per hop and 10% packet drop rate.
question: Create a collective topology that minimizes synchronous barrier stalls under this high-latency, lossy environment?
details:
  realistic_solution: Implement an Epidemic (Gossip) broadcast topology instead of a Ring. A Ring AllReduce requires O(N) sequential successful hops; with a 10% drop rate, most full-ring rounds fail and must wait for timeout and retry behavior. Gossip randomly pairs nodes to exchange differences asynchronously, using more bandwidth but avoiding a single global sync barrier.
  common_mistake: |
    **The Pitfall:** Specifying a standard Ring or Tree topology.
    **The Rationale:** Candidates often apply datacenter collective communication strategies (like Ring AllReduce) without considering the extreme packet drop rates of LoRa.
    **The Consequence:** Mathematically forces a catastrophic global synchronization failure every time a single LoRa packet drops.
  napkin_math: |
    **Assumptions & Constraints:**
       - Topology: 10 micro-satellites.
       - Network: LoRa with 500ms propagation delay per hop and 10% packet drop rate.
    **Calculations:**
       - Ring success probability per cycle: (0.9)^10 ≈ 34.8%.
       - One successful full-ring traversal latency: 10 hops * 500ms = 5s before adding serialization, timeout, or retry delays.
       - Failure probability per full-ring cycle: 1 - 34.8% = 65.2%, so timeout/retry stalls are likely but not quantified without a retry policy.
    **Conclusion & Interpretation:**
       - **Result: Asynchronous Protocol Required**. Gossip (epidemic) broadcast reduces dependence on one ordered O(N) successful path; the 5s figure is the one-way ring traversal baseline, not a complete retransmission model.
