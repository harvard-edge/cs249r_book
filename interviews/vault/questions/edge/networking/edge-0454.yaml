title: The Autonomous Vehicle Scaling Trap
scenario: You are an ML Systems Engineer on an autonomous driving team, tasked with optimizing a new sensor fusion pipeline. The pipeline processes LiDAR point clouds on GPU 1 and fuses the result with camera data on GPU 2. Profiling reveals that the end-to-end latency is 50ms, missing the hard real-time deadline of 33ms. The compute on each GPU takes only 10ms, but the transfer of the 256MB intermediate 'bird's-eye-view' tensor from GPU 1 to GPU 2 is taking a staggering 30ms. You discover the two GPUs are in separate chassis connected by a 100 Gbps InfiniBand link.
question: Why is the 256 MB GPU-to-GPU transfer over 100 Gbps InfiniBand taking 30ms, and what architecture should replace it?
details:
  realistic_solution: The primary bottleneck is the interconnect topology itself. A 100 Gbps InfiniBand link provides only 12.5 GB/s at line rate, so moving a 256 MB tensor already costs about 20.5ms before serialization, fabric hops, endpoint staging, synchronization, and software overhead. A measured 30ms is therefore plausible for an inter-node transfer. The replacement architecture is to co-locate both GPUs in one compute node and use a suitable high-bandwidth intra-node interconnect, such as NVLink or NVSwitch when the platform supports it, so the tensor transfer becomes an on-node GPU-to-GPU memory movement instead of a network hop.
  common_mistake: |
    **The Pitfall:** Assuming a high-speed network fabric is a suitable replacement for a high-bandwidth, ultra-low-latency on-board bus.
    **The Rationale:** Engineers suffer from 'bandwidth myopia', becoming impressed by large numbers like '100 Gbps' without considering protocol overhead and topology.
    **The Consequence:** Misdiagnosing a topology problem as a simple bandwidth problem, leaving the real-time latency bottleneck unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 256 MB intermediate tensor.
       - InfiniBand: 100 Gbps = 12.5 GB/s theoretical line rate.
       - Measured end-to-end transfer includes fabric hops, endpoint staging/synchronization, and software overhead.
       - Intra-node GPU interconnect, if supported: hundreds of GB/s.
    2. **Calculations:**
       - InfiniBand Transfer Time = 256 MB / 12.5 GB/s = 20.48 ms.
       - Measured overhead beyond line-rate copy = 30 ms - 20.48 ms = 9.52 ms.
       - Total IB Latency ≈ 20.48 ms payload time + 9.52 ms measured overhead = 30 ms.
       - NVLink 4.0 Transfer Time = 256 MB / 900 GB/s = 0.28 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 30ms vs sub-millisecond on a supported intra-node GPU fabric.** Using InfiniBand creates an **Interconnect-Bound** bottleneck. Co-locating the GPUs and using NVLink/NVSwitch-class connectivity removes the inter-node network hop.
  options:
    - The InfiniBand link is saturated. We must upgrade to a 400 Gbps NDR link to increase bandwidth.
    - The bottleneck is software overhead in the RDMA drivers. We need to write a custom kernel module to reduce latency.
    - The use of an inter-node fabric (InfiniBand) for this tightly-coupled task is the bottleneck. The GPUs must be co-located in a single node with a supported high-bandwidth intra-node interconnect such as NVLink or NVSwitch.
    - The PCIe bus on the host machine is saturated by other peripherals. We need to rearrange the PCIe cards.
  correct_index: 2
