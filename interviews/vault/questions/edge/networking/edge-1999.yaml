title: Edge AI Load Balancing & Routing for NVIDIA Jetson Orin Deployments
scenario: You are tasked with designing a robust inference serving system for an autonomous drone fleet, where each drone is equipped with an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W power budget). The drones perform real-time object detection and tracking using various deep learning models. Incoming sensor data streams require highly available and low-latency inference.
question: How would you route and shed drone inference requests on Jetson Orin while preserving tracker affinity, version safety, and 100ms latency?
details:
  realistic_solution: Implement a local-first, deadline-aware router. Keep tracker state on the same drone with consistent hashing or object-ID affinity, but override affinity when queue depth, power draw, or thermal headroom predicts a missed 100ms deadline. Route only to neighbors running the same approved model version or a compatible shadow/canary version, and prefer local inference when the network budget would consume too much latency. Use admission control, frame decimation, or lower-priority model skipping before queues grow; scale by enabling standby models on nearby drones only when power and radio budgets allow. Health checks should remove failed or throttling drones and roll traffic back to the last known-good model version.
  common_mistake: |
    **The Pitfall:** Applying traditional data center load balancing (like naive round-robin) directly to the edge.
    **The Rationale:** Candidates default to standard web-service architectures without considering stringent edge constraints like intermittent connectivity and thermal/power ceilings.
    **The Consequence:** Drones frequently throttle due to exceeding the 60W limit, or they incur massive latency penalties waiting for cloud-level routing decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Measured Orin detector runtime after INT8 optimization: 35ms per frame at batch 1.
    - Latency Budget: 100ms end-to-end target, network transmission takes 30ms.
    - Power Budget: 60W.
    - Input stream: 30 FPS at 1MB per compressed frame.

    **Calculations:**
    - Non-network latency budget = 100ms - 30ms = 70ms.
    - Queueing and routing budget after inference = 70ms - 35ms = 35ms.
    - If Model A uses 20W and Model B uses 30W, running both concurrently leaves only 10W for the OS and radio out of the 60W total.
    - A 30 FPS 1MB video stream requires 30MB/s per drone.

    **Conclusion & Interpretation:**
    - **Result: 35ms Queueing Budget (Latency-Bound).** Routing must prefer local or nearby inference, preserve tracker affinity and model-version compatibility, and shed or downsample work before queues exceed the remaining latency and power headroom.
