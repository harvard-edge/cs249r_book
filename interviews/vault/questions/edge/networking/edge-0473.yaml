title: The Autonomous Truck's Fusion Bottleneck
scenario: 'You are the lead systems engineer for an autonomous trucking company. The vehicle''s compute platform consists of two separate SoCs in the same chassis: SoC 1 processes camera data, and SoC 2 handles LiDAR/RADAR and planning. To perform sensor fusion, SoC 1 must transfer a 512 MB feature map to SoC 2 every frame. The total perception-to-plan latency budget is a hard-real-time 33ms. Your team measures the transfer alone and finds it''s the primary bottleneck.'
question: Which interconnect—10Gbps Ethernet, PCIe Gen4 x8, or NVLink 4.0—is feasible for the 512 MB transfer within the 33ms budget?
details:
  realistic_solution: Of the listed bandwidth choices, only an NVLink-class intra-node connection leaves enough margin for a hard 33ms perception-to-plan budget. Ethernet is far too slow. PCIe Gen4 x8 is nominally under 33ms for the copy alone, but at about 32.5ms it leaves essentially no time for compute, synchronization, or safety margin. NVLink 4.0 is not a generic automotive SoC-to-SoC cable; selecting it implies redesigning the compute platform around NVLink-capable components in the same node or board-level integration.
  common_mistake: |
    **The Pitfall:** Choosing a familiar standard like 10Gbps Ethernet or PCIe Gen4 x8.
    **The Rationale:** Engineers assume standard datacenter networking is "fast enough" without mathematically verifying it against a hard real-time 33ms budget.
    **The Consequence:** The system immediately violates its safety loop. Even PCIe Gen4 x8 leaves virtually no margin for actual computation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature Map = 512 MB.
    - Latency budget = 33ms.
    - 10Gbps Ethernet bandwidth = 1.25 GB/s.
    - PCIe Gen4 x8 bandwidth = 15.75 GB/s.
    - NVLink 4.0 bandwidth = ~600 GB/s.

    **Calculations:**
    - Transfer over 10Gbps Ethernet (1.25 GB/s): 512 MB / 1250 MB/s = 409 ms (Far too slow).
    - Transfer over PCIe Gen4 x8 (15.75 GB/s): 512 MB / 15,750 MB/s = 32.5 ms (Eats the entire 33ms budget).
    - Transfer over NVLink 4.0 (~600 GB/s): 512 MB / 600,000 MB/s = ~0.85 ms.

    **Conclusion & Interpretation:**
    - **Result: NVLink-class integration is feasible at ~0.85 ms.** 10Gbps Ethernet is infeasible, and PCIe Gen4 x8 consumes nearly the entire deadline for transfer alone.
  options:
    - Use 10 Gbps Automotive Ethernet. It is an industry standard and the simplest to implement.
    - Use PCIe Gen4 x8. The transfer time of ~32.5ms fits under 33ms for the copy alone.
    - Redesign around NVLink 4.0-capable same-node integration. The ~0.85ms transfer time leaves real-time headroom.
    - Use InfiniBand with RDMA. It is optimized for low-latency datacenter communication and would be the fastest option.
  correct_index: 2
