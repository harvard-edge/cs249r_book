title: Optimizing Edge Inference Routing on Qualcomm Cloud AI 100
scenario: Your company deploys a critical real-time object detection model on a fleet of Qualcomm Cloud AI 100 devices at the edge. You're observing intermittent latency spikes and uneven utilization across the fleet, leading to dropped frames and degraded user experience. The current load balancing uses a simple round-robin approach.
question: How would you replace round-robin routing for the Cloud AI 100 fleet to reduce latency spikes and uneven utilization in real-time object detection?
details:
  realistic_solution: Implement a dynamic, context-aware routing mechanism using consistent hashing combined with a health-aware, weighted round-robin approach. Route based on live hardware telemetry such as current inference queue depth and device temperature, ensuring requests bypass thermal-throttled nodes.
  common_mistake: |
    **The Pitfall:** Applying generic load balancing without accounting for specific hardware states like thermal throttling.
    **The Rationale:** Round-robin is standard and easy to implement, distributing network requests evenly under the assumption that all nodes have identical, static processing power.
    **The Consequence:** Requests are blindly routed to an edge device that is currently thermal throttling, causing severe latency spikes while cool devices sit idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each healthy node serves 40 requests/sec.
    - A thermally throttled node serves 20 requests/sec.
    - Round-robin sends 30 requests/sec to every node.
    - Approximate each node as an M/M/1 queue where utilization rho = arrival rate / service rate.

    **Calculations:**
    - Healthy round-robin utilization = 30 / 40 = 0.75, which still has queueing headroom.
    - Throttled round-robin utilization = 30 / 20 = 1.50, so the queue is unstable and latency grows until requests are dropped or rerouted.
    - Health-aware routing caps the throttled node at 15 requests/sec: rho = 15 / 20 = 0.75.
    - The 15 requests/sec moved away from the throttled node must be spread only across nodes with spare service capacity.

    **Conclusion & Interpretation:**
    - **Result: Avoid Unstable Queues (Latency-Bound).** Dynamic routing reduces latency spikes by keeping arrival rate below measured service rate on throttled nodes.
