title: The V2X Mesh Partition
scenario: 'You are architecting a V2X (vehicle-to-everything) system for an intersection with 20 vehicles, each with a Jetson Orin running object detection. Vehicles share detections over 5.9 GHz DSRC at 6 Mbps effective per channel, with 7 available channels. Each detection message is 2 KB. During peak, each vehicle generates 30 detections/second.'
question: 'How would you allocate the 7 DSRC channels for 20 vehicles sending 2 KB detections at 30/s, and is the bandwidth sufficient?'
details:
  realistic_solution: 'Total message rate: 20 vehicles * 30 det/s = 600 messages/s. Each message: 2 KB. Total data rate: 600 * 2 KB = 1,200 KB/s = 9.6 Mbps. With 7 channels at 6 Mbps each = 42 Mbps raw capacity. At 50% efficiency under contention: 21 Mbps effective. 9.6 Mbps < 21 Mbps — sufficient with margin. Allocation: divide 20 vehicles into 4 groups of 5 across 4 data channels. Per-channel load: 5 * 30 * 2 KB/s = 300 KB/s = 2.4 Mbps < 3 Mbps effective per channel. Reserve 2 channels for safety-critical priority messages and 1 for control/coordination. Use TDMA slots within each channel to eliminate contention.'
  common_mistake: |
    **The Pitfall:** Treating the wireless medium as a wired switch.
    **The Rationale:** Candidates assume all channels can carry full load simultaneously without contention.
    **The Consequence:** In shared-medium wireless, all nodes on one channel contend for access, causing collisions and dropping effective throughput to ~40-60% under load, resulting in dropped critical messages.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 vehicles, 30 det/s, 2 KB/message.
    - 7 channels at 6 Mbps raw, 50% contention efficiency (3 Mbps effective).

    **Calculations:**
    - Data rate = 20 * 30 * 2 KB/s = 1,200 KB/s = 9.6 Mbps.
    - Raw capacity = 7 * 6 Mbps = 42 Mbps. Contention capacity = 21 Mbps.
    - Per-group (5 vehicles): 5 * 30 * 2 = 300 KB/s = 2.4 Mbps per channel.

    **Conclusion & Interpretation:**
    - **Result: 21 Mbps effective capacity (Network-Bandwidth-Bound)**. Effective bandwidth of 21 Mbps easily accommodates the 9.6 Mbps load.
