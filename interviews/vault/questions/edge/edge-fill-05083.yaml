title: Knowledge Distillation from Transformer to CNN for Hailo-8
scenario: ViT-S teacher (22M params, 4.6 GFLOP, INT8=22MB) achieves 79% on COCO person detection. A ResNet-18
  student (11M params, 1.8 GFLOP, INT8=11MB) for Hailo-8 achieves 71% without distillation. With feature-level
  distillation matching ViT-S intermediate representations, estimate accuracy gain and the technical challenges.
question: "What accuracy gain can feature distillation from ViT-S to ResNet-18 deliver on Hailo-8, and what representation issues arise?"
details:
  realistic_solution: 'Technical challenge: ViT uses patch tokens (196 patches for 224×224) while ResNet-18
    uses spatial feature maps (7×7=49 positions at last conv). Direct feature matching requires projection
    layers. Solution: use intermediate feature map distillation at matching spatial resolutions (e.g.,
    ViT block 8 → ResNet stage 3, both at 14×14). Add L2 projection head on student. Expected accuracy
    gain: feature distillation for detection: 2-4% mAP. Total expected: 71% + 3% = 74%. Remaining gap
    to teacher (79%): 5% irreducible (capacity and architecture gap). At Hailo-8 (26 TOPS INT8): ResNet-18
    INT8 = 1.8G FLOPs. Throughput: 26T/1.8G ≈ 14,444 fps at batch=1 (utilization: 30fps/14,444fps ≈ 0.2%).
    More than sufficient for any edge deployment.'
  common_mistake: Directly matching ViT attention maps in the student CNN; CNNs don't have attention maps,
    so feature distillation must project to a common representation space.
  napkin_math: 'Student baseline: 71%. Distillation gain: +2-4%. Expected: 73-75%. Teacher gap: 4-6% irreducible.
    Hailo-8 utilization: 1.8G FLOPs / 26 TOPS = 0.0069% at 1 FPS. At 30fps: 1.8G×30 / 26T = 0.208% — massively
    under-utilized. Model size is the constraint, not compute.'
