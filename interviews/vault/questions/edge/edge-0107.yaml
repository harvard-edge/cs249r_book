title: The Memory Copy Choke
scenario: You are processing 4K video on an ARM-based edge device. You notice that the CPU utilization is at 100%, and the NPU is mostly idle, even though the model is highly optimized.
question: Based on the data path diagram, what is the 'silent' task consuming all your CPU cycles?
details:
  realistic_solution: The bottleneck is the CPU memcpy between memory spaces. A 4K frame is ~24 MB. Standard Linux drivers often force multiple copies between kernel-space, application-space, and NPU-space. At 30 FPS, the CPU is forced to move ~1.4 GB/s across RAM boundaries, saturating the bus. The fix is a Zero-Copy DMA Pipeline (e.g., using `dmabuf`), allowing the NPU to read directly from the camera buffer.
  common_mistake: |
    **The Pitfall:** Assuming the NPU must be struggling with 4K resolution.
    **The Rationale:** Engineers assume large resolution directly overloads the accelerator compute units.
    **The Consequence:** Attempting to prune or quantize the model further, which yields zero improvement because the NPU is already starving for CPU data transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Size: 4K (3840x2160), RGB.
    - Pipeline: 30 FPS.

    **Calculations:**
    - Single Frame: 3840 * 2160 * 3 = 24.8 MB.
    - Single Transfer Rate: 30 FPS * 24.8 MB = 744 MB/s.
    - Double Copy Penalty (Kernel->User->NPU): 744 MB/s * 2 = ~1.49 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.49 GB/s (Memory-Bound)**. Shuttling 1.49 GB/s consumes 100% of the low-power ARM CPU's bandwidth, entirely starving the NPU.
