title: The Edge Efficiency Metric
scenario: For an edge AI accelerator, power efficiency is a critical metric. Identify the approximate
  power efficiency in TOPS-per-Watt for a Hailo-8 accelerator running at its nominal power envelope.
details:
  realistic_solution: The Hailo-8 is rated for 26 TOPS (INT8) at a typical power consumption of 2.5W.
    Its efficiency is therefore approximately 10.4 TOPS/W. This is a measure of how many Tera-Operations
    it can perform for each Watt of power consumed.
  common_mistake: Engineers often focus only on peak TOPS, ignoring the power cost to achieve it. On the
    edge, performance-per-watt is almost always a more important metric than raw performance. Another
    mistake is misremembering the order of magnitude; efficiency can vary dramatically between architectures.
  napkin_math: Efficiency = Peak Performance / Power Consumption
  options:
  - ~1 TOPS/W
  - ~4.5 TOPS/W
  - ~10 TOPS/W
  - ~26 TOPS/W
  correct_index: 2
