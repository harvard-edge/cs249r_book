title: The Shared DRAM Budget
scenario: You are designing the software for an autonomous delivery robot using a Jetson AGX Orin with
  32 GB of LPDDR5 DRAM. The robot uses four 4K (3840x2160) cameras for 360-degree vision. The camera drivers
  use DMA to write sensor data directly into DRAM, and to prevent tearing, this pipeline is triple-buffered.
  The Linux OS, drivers, and safety monitoring processes reserve a fixed 4 GB of DRAM at boot.
question: "How much DRAM remains for the ML model after the OS reservation and triple-buffered 4K camera DMA buffers?"
details:
  realistic_solution: The key is to systematically subtract all non-model memory consumers from the total
    DRAM. First, calculate the memory consumed by the camera DMA buffers. Then, subtract the fixed OS
    reservation. The remainder is the budget for the ML model.
  common_mistake: Engineers accustomed to cloud environments often assume the advertised RAM (32 GB) is
    entirely available for their application. They forget that on an SoC, DRAM is a shared resource. The
    most common error is to ignore the memory footprint of high-resolution camera streams being written
    into DRAM by the DMA engine, or to forget the OS and other system processes have their own significant,
    non-negotiable memory reservation.
  napkin_math: 1 frame = 3840 x 2160 x 3 bytes (RGB) = 24.88 MB. 4 cameras = 99.53 MB per capture step.
    Triple-buffering (front, back, DMA) = 99.53 MB * 3 = 298.6 MB. Total DRAM = 32 GB. Subtract OS reservation
    (4 GB) and DMA buffers (0.3 GB). The maximum safe budget for model weights, KV-cache, and intermediate
    activations is roughly 27.7 GB.
  options:
  - ~31.8 GB
  - ~27.9 GB
  - ~27.8 GB
  - 28.0 GB
  correct_index: 2
