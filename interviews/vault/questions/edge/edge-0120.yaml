title: The Shared DRAM Budget
scenario: You are designing the software for an autonomous delivery robot using a Jetson AGX Orin with 32 GB of LPDDR5 DRAM. The robot uses four 4K (3840x2160) cameras for 360-degree vision. The camera drivers use DMA to write sensor data directly into DRAM, and to prevent tearing, this pipeline is triple-buffered. The Linux OS, drivers, and safety monitoring processes reserve a fixed 4 GB of DRAM at boot.
question: How much DRAM remains for the ML model after the OS reservation and triple-buffered 4K camera DMA buffers?
details:
  realistic_solution: The key is to systematically subtract all non-model memory consumers from the total DRAM. First, calculate the memory consumed by the camera DMA buffers. Then, subtract the fixed OS reservation. The remainder is the budget for the ML model.
  common_mistake: |
    **The Pitfall:** Assuming the advertised RAM is entirely available for the application.
    **The Rationale:** Cloud-accustomed engineers forget that on an SoC, DRAM is a shared resource and ignore the DMA buffers of high-resolution cameras or OS reservations.
    **The Consequence:** Designing models that trigger Out-Of-Memory (OOM) errors upon deployment because they exceed the actual ~27.7 GB budget.
  napkin_math: |
    - **Calculate single frame size:** 3840 x 2160 x 3 bytes (RGB) = 24.88 MB.
    - **Calculate 4-camera capture:** 24.88 MB * 4 = 99.53 MB per capture step.
    - **Triple-buffering overhead:** 99.53 MB * 3 = 298.6 MB (~0.3 GB).
    - **Subtract OS and buffers from total:** 32 GB - 4 GB (OS) - 0.3 GB (DMA) = **27.7 GB.**
  options:
  - ~31.8 GB
  - ~27.9 GB
  - ~27.7 GB
  - 28.0 GB
  correct_index: 2
