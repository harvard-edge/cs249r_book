title: The Shared DRAM Budget
scenario: >-
  You are designing the software for an autonomous delivery robot using a Jetson AGX Orin. The robot uses four 4K (3840x2160) cameras for 360-degree vision. The camera drivers use DMA to write sensor data directly into DRAM, and to prevent tearing, this pipeline is triple-buffered. The Linux OS, drivers, and safety monitoring processes reserve a fixed 4 GB of DRAM at boot.
question: How much DRAM remains for the ML model after the OS reservation and triple-buffered 4K camera DMA buffers?
details:
  realistic_solution: The key is to systematically subtract all non-model memory consumers from the total DRAM. First, calculate the memory consumed by the camera DMA buffers. Then, subtract the fixed OS reservation. The remainder is the budget for the ML model.
  common_mistake: |
    **The Pitfall:** Assuming the advertised RAM is entirely available for the application.
    **The Rationale:** Cloud-accustomed engineers forget that on an SoC, DRAM is a shared unified resource and ignore the DMA buffers of high-resolution cameras.
    **The Consequence:** Designing models that trigger Out-Of-Memory (OOM) errors upon deployment because they exceed the actual ~27.7 GB budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 32 GB LPDDR5 shared unified memory.
       - Camera: 4 streams, 4K resolution (3840x2160x3 bytes), triple-buffered.
       - OS Reservation: 4 GB.
    2. **Calculations:**
       - Single frame size: 3840 x 2160 x 3 = 24.88 MB.
       - 4-camera footprint: 24.88 MB * 4 = 99.53 MB.
       - Triple-buffering footprint: 99.53 MB * 3 ≈ 298.6 MB (~0.3 GB).
       - Total remaining: 32 GB - 4 GB - 0.3 GB = 27.7 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The system must deduct the massive raw frame DMA buffers and fixed OS footprint, leaving exactly ~27.7 GB for the ML model payload.
  options:
  - ~31.7 GB
  - ~27.9 GB
  - ~27.7 GB
  - 28.0 GB
  correct_index: 2
