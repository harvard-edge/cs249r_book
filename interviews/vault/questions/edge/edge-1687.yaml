title: Optimizing CNNs for Qualcomm Cloud AI 100 Bottlenecks
scenario: You are deploying a legacy CNN object detector on a Qualcomm Cloud AI 100
  accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W) for on-premise inference. Profiling
  reveals the model achieves only 10% compute utilization (40 TOPS) because standard
  3x3 convolutions with 512 channels are starving the compute units. How do you redesign
  the architecture to alleviate this memory bandwidth bottleneck, and how do you quantify
  the reduction in memory traffic?
question: How do you redesign the architecture to alleviate this memory bandwidth
  bottleneck, and how do you quantify the reduction in memory traffic?
details:
  realistic_solution: The bottleneck is memory bandwidth due to low arithmetic intensity.
    The solution is to refactor standard convolutions into depthwise separable convolutions
    or inverted residual blocks (e.g., MobileNet). This decouples spatial filtering
    from channel mixing, drastically reducing the parameter count and memory read
    traffic per layer, allowing the accelerator's on-chip memory to cache weights
    and unblocking the INT8 compute units.
  common_mistake: Candidates often suggest further quantization or unstructured pruning,
    ignoring that the architecture itself has low arithmetic intensity. They fail
    to recognize that large standard convolutions on an architecture with LPDDR4x
    memory will intrinsically bottleneck a massive 400 TOPS compute engine.
  napkin_math: 'For a standard 3x3 conv with C=512 input/output channels: parameters
    = 3*3*512*512 = ~2.36M INT8 weights (2.36 MB). A depthwise separable equivalent
    requires (3*3*512) + (1*1*512*512) = 4,608 + 262,144 = ~266 KB of weights. This
    provides an ~8.9x reduction in memory fetches. With the LPDDR4x memory bottlenecking
    the 400 TOPS compute, reducing the weight read traffic by nearly 9x proportionally
    increases the arithmetic intensity (FLOPs/byte), allowing the 75W accelerator
    to effectively utilize its high INT8 capacity.'
