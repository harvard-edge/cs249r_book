title: Optimizing CNNs for Qualcomm Cloud AI 100 Bottlenecks
scenario: You are deploying a legacy CNN object detector on a Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W) for on-premise inference. Profiling reveals the model achieves only 10% compute utilization (40 TOPS) because standard 3x3 convolutions with 512 channels are starving the compute units.
question: How do you redesign the architecture to alleviate this memory bandwidth bottleneck, and how do you quantify the reduction in memory traffic?
details:
  realistic_solution: The bottleneck is memory bandwidth due to low arithmetic intensity. The solution is to refactor standard convolutions into depthwise separable convolutions or inverted residual blocks (e.g., MobileNet). This decouples spatial filtering from channel mixing, drastically reducing the parameter count and memory read traffic per layer, allowing the accelerator's on-chip memory to cache weights and unblocking the INT8 compute units.
  common_mistake: |
    **The Pitfall:** Applying generic compression techniques instead of architectural refactoring.
    **The Rationale:** Candidates often suggest further quantization or unstructured pruning, ignoring that the architecture itself has intrinsically low arithmetic intensity.
    **The Consequence:** They fail to unblock the memory bottleneck on LPDDR4x, leaving the massive 400 TOPS compute engine severely underutilized.
  napkin_math: |
    1. **Standard 3x3 Conv**: Parameters for C=512 input/output channels = 3 × 3 × 512 × 512 = ~2.36M INT8 weights (2.36 MB).
    2. **Depthwise Separable**: Requires (3 × 3 × 512) + (1 × 1 × 512 × 512) = 4,608 + 262,144 = 266,752 weights (~266 KB).
    3. **Traffic Reduction**: 2.36 MB / 266 KB ≈ **8.9x reduction** in memory read traffic.
    4. **Result**: This directly scales arithmetic intensity, allowing the INT8 hardware to reach high utilization.
