title: Optimizing Peak Activation Memory via Layer Fusion on Jetson Orin TensorRT
scenario: 'A TensorRT-optimized ResNet-50 on Jetson Orin uses 1.8 GB peak activation memory at batch size 32. An unfused PyTorch baseline uses 4.2 GB. Your team wants to further reduce TensorRT activation memory to under 1 GB to allow concurrent pipeline stages.'
question: What remaining TensorRT ResNet-50 activation buffers cause the 1.8GB peak at batch 32, and how can you reduce it below 1GB?
details:
  realistic_solution: 'Use INT8 precision for residual tensors (saves 50%) and enable `STRICT_TYPES` to enforce INT8 throughout residual paths. This drops the total from 1.8 GB to ~1.4 GB. Further reduce the batch size to 22, yielding ~0.96 GB, which successfully meets the <1 GB target.'
  common_mistake: |
    **The Pitfall:** Assuming TensorRT automatically minimizes all memory footprints.
    **The Rationale:** Candidates believe TensorRT's default optimization (OPT=3) finds all opportunities without explicit typing.
    **The Consequence:** They fail to manually enforce STRICT_TYPES for residual paths, missing the memory target constraint.
  napkin_math: |
    1. **Assumptions & Constraints:** FP16 residuals use 800 MB, activations use 1000 MB (Total 1.8 GB at batch 32). Target is <1 GB.
    2. **Calculations:** INT8 residuals = 400 MB. New total at batch 32 = 1000 MB + 400 MB = 1400 MB. Scale to batch 22: 1400 MB * (22/32) = 962.5 MB.
    3. **Conclusion & Interpretation:** **Peak activation memory is reduced to 0.96 GB, successfully falling below the 1 GB target. Result: Memory-Capacity-Bound.**
