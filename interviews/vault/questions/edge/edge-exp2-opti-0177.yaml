title: Optimizing Telemetry Overhead on Qualcomm Cloud AI 100
scenario: You are deploying a multi-camera video analytics pipeline on an on-premise edge server equipped
  with a Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W TDP). To populate a production
  health dashboard and detect stragglers, the pipeline logs cycle-level hardware utilization and per-layer
  inference latencies to the host CPU over PCIe for every single frame. However, this verbose telemetry
  has created a severe bottleneck, reducing the system's effective throughput by 70% and causing the card
  to run near its 75W thermal limit due to constant I/O polling. How would you analyze this observability
  overhead and design an optimized telemetry strategy without losing visibility into stragglers?
question: "How would you analyze this observability overhead and design an optimized telemetry strategy without losing visibility into stragglers?"
details:
  realistic_solution: The optimal approach is to perform on-device telemetry aggregation and employ an
    anomaly-based sampling strategy. By maintaining a small circular buffer in the Qualcomm Cloud AI 100's
    32 GB LPDDR4x memory, the accelerator can compute moving averages and only flush detailed telemetry
    data to the host when a straggler threshold (e.g., latency > P99) is breached, sending only aggregated
    summaries otherwise. This drastically reduces PCIe I/O overhead and frees up the accelerator to utilize
    its 400 TOPS for actual model inference.
  common_mistake: Candidates often suggest disabling telemetry entirely or trying to upgrade the host
    PCIe bus, failing to realize that production observability is a strict requirement for reliability.
    Another common error is moving all log formatting to the host CPU without realizing the I/O transfer
    itself is the primary bottleneck.
  napkin_math: Assume the raw per-layer telemetry generates 2 MB of data per frame. At a target of 1,000
    FPS, this requires 2 GB/s of constant PCIe bandwidth and CPU polling overhead, starving the compute
    pipeline. By switching to on-device aggregation (computing min/max/avg every 1,000 frames) and only
    logging 100 KB of aggregated stats plus a 2 MB trace for a single straggler per second, the telemetry
    data rate drops from 2,000 MB/s to 2.1 MB/s. This 99.8% reduction in I/O overhead restores inference
    throughput and allows the AI 100 to operate efficiently within its 75W power budget.
