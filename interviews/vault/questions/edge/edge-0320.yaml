title: The Federated Learning Bandwidth Diet
scenario: An automotive company uses Federated Learning to improve its driver monitoring model. Instead of uploading a raw 250 MB sensor log from the vehicle, it only sends the model's gradients back to the central server. The model has 5 million parameters.
question: What is the approximate size of the FP32 gradient update for a 5 million-parameter model?
details:
  realistic_solution: 'A dense gradient update has one value for each model parameter. Using standard 32-bit floating point precision (FP32), each parameter''s gradient requires 4 bytes of memory. Therefore, the total size is 20 million bytes or 20 MB.'
  common_mistake: |
    **The Pitfall:** Confusing 32-bit floats (4 bytes) with 16-bit floats (2 bytes), or failing to realize a dense gradient has exactly the same memory footprint as the parameters.
    **The Rationale:** Misremembering fundamental data types or the structural definition of backpropagation gradients.
    **The Consequence:** Over/underestimating network bandwidth limits, leading to failed federated synchronization rounds on edge networks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 5,000,000 parameters.
       - Precision: FP32 (4 bytes per parameter).
    2. **Calculations:**
       - Gradient elements: 5,000,000.
       - Size: 5,000,000 * 4 bytes = 20,000,000 bytes.
       - Conversion: 20,000,000 bytes = 20 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Optimization**. A 20 MB gradient payload is over 10x smaller than raw data upload, establishing the primary bandwidth advantage of Federated Learning.
  options:
  - '250 MB'
  - '10 MB'
  - '20 MB'
  - '5 MB'
  correct_index: 2
