title: The Federated Learning Bandwidth Diet
scenario: An automotive company uses Federated Learning to improve its driver monitoring model. Instead
  of uploading a raw 250 MB sensor log from the vehicle, it only sends the model's gradients back to the
  central server. The model has 5 million parameters. State the approximate size of this gradient update,
  assuming standard 32-bit precision.
question: "What is the approximate size of the FP32 gradient update for a 5 million-parameter model?"
details:
  realistic_solution: 'A dense gradient update has one value for each model parameter. Using standard
    32-bit floating point precision (FP32), each parameter''s gradient requires 4 bytes of memory. Therefore,
    the total size is 5 million parameters × 4 bytes/parameter, which equals 20 million bytes or 20 MB.
    This is the primary data-transfer benefit of FL: sending a 20 MB update is over 10x more efficient
    than sending the 250 MB raw data log, which protects user privacy and saves significantly on network
    costs.'
  common_mistake: Forgetting the byte-size of numerical formats is common. An engineer might confuse 32-bit
    floats (4 bytes) with 16-bit floats (2 bytes), leading to a 2x error. Another mistake is not realizing
    that a dense gradient update has the same number of elements as the model has parameters, and thus
    the same memory footprint.
  napkin_math: 1. **Parameters:** 5,000,000 | 2. **Recall Precision:** FP32 requires 4 bytes per value.
    | 3. **Calculation:** 5,000,000 parameters × 4 bytes/param = 20,000,000 bytes. | 4. **Conversion:**
    20,000,000 bytes is equal to **20 MB**.
  options:
  - 250 MB
  - 10 MB
  - 20 MB
  - 5 MB
  correct_index: 2
