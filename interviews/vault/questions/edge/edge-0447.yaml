title: The Self-Driving Stall
scenario: You are optimizing a perception model on a Jetson AGX Orin to hit a 50 FPS (20ms) deadline. Profiling shows your model currently takes 24.4ms per inference.
question: Using the roofline model, is the 24.4ms Orin perception model compute-bound or memory-bound, and how should you optimize it?
details:
  realistic_solution: The model is **memory-bound**. Its performance is limited by the memory bandwidth of the Jetson Orin, not its peak compute capability. To solve this, the team must focus on reducing the amount of data moved from DRAM or increasing the amount of work done per byte via operator fusion or aggressive quantization.
  common_mistake: |
    **The Pitfall:** Incorrectly diagnosing the model as compute-bound because the profiler shows low TOPS utilization.
    **The Rationale:** Engineers assume low utilization means the model isn't demanding enough, when in reality the chip is starving for data from slow system memory.
    **The Consequence:** Optimizations focus on pruning parameters, which fails to fix the underlying data movement bottleneck.
  napkin_math: |
    - Device ridge point: 275 TOPS / 204.8 GB/s ≈ 1,343 Ops/Byte.
    - Check Arithmetic Intensity (AI): AI = GOps / GB_accessed.
    - Diagnosis: If AI < 1,343, the model is memory-bound.
    - Conclusion: The throughput ceiling is dictated by **AI × memory bandwidth**, not peak compute.
  options:
  - The model is compute-bound. To improve performance, we must prune the model to reduce its 4 Trillion Ops.
  - The Jetson platform is inadequate. We must switch to a platform with higher memory bandwidth to meet the 20ms deadline.
  - The model is memory-bound. We must use operator fusion or more aggressive quantization to improve its arithmetic intensity.
  - The bottleneck is power; the Orin is likely being thermally throttled. We should improve the cooling solution.
  correct_index: 2
