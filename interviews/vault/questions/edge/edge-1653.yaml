title: On-Device Intersectional Fairness Auditing at the Edge
scenario: You are deploying a vision-based driver monitoring system on an NVIDIA Jetson Orin. The model must meet strict demographic parity and equalized odds constraints across 16 intersectional subgroups (age, gender, skin tone, eyewear) before alerting. Raw face data cannot leave the device due to privacy laws.
question: How would you design a continuous, on-device fairness audit for 16 subgroups without exceeding the Jetson Orin's 60W TDP or disrupting the primary 30 FPS inference pipeline?
details:
  realistic_solution: A robust solution involves deploying a heavily quantized (INT8) auxiliary attribute classifier specifically compiled for the Deep Learning Accelerator (DLA), completely isolating it from the main Ampere GPU workload. This lightweight model periodically samples frames (e.g., 1 FPS instead of 30 FPS) to estimate subgroup distributions and error rates. The aggregated, anonymized confusion matrices per subgroup are then periodically synced to the cloud to monitor equalized odds drift.
  common_mistake: |
    **The Pitfall:** Running heavy attribute classifiers for every frame on the main GPU.
    **The Rationale:** Candidates fail to separate the auditing pipeline's cadence from the main inference pipeline, lacking knowledge of the Orin's heterogeneous compute (DLA vs GPU).
    **The Consequence:** The audit steals critical compute from the primary task and immediately blows past the 60W thermal envelope.
  napkin_math: |
    1. **Compute Allocation:** Assume the main model uses 200 TOPS on the GPU (out of 275 TOPS total).
    2. **Audit Pipeline:** We allocate a small INT8 MobileNetV3 for attribute classification to the DLA, requiring ~0.5 GOPS per frame.
    3. **Audit Cost:** Running at 1 FPS, it uses <0.001 TOPS, easily fitting in the remaining 75 TOPS budget.
    4. **Memory Footprint:** Storing running confusion matrices for 16 subgroups requires trivial memory (16 * 4 INT32 values = **256 bytes**), leaving ample RAM for the primary pipeline.
