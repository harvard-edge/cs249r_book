title: Evaluating MobileNet vs ResNet on Hailo-8 Dataflow
scenario: 'Your team is deploying an object detection model onto a Hailo-8 accelerator (26 TOPS INT8,
  2.5W). The Hailo-8 uses a spatial dataflow architecture with no local DRAM, meaning all intermediate
  activations must be efficiently routed through on-chip memory or streamed to/from host memory. You are
  evaluating two backbones: a standard MobileNetV2 with inverted residuals (heavy depthwise convolutions)
  and a custom ResNet-50 variant optimized for INT8. Which architecture do you choose for this specific
  hardware, and how do the platform''s memory characteristics drive your decision?'
question: "Which architecture do you choose for this specific hardware, and how do the platform's memory characteristics drive your decision?"
details:
  realistic_solution: For the Hailo-8, standard convolutions (like in ResNet) often perform better than
    depthwise convolutions because they have higher arithmetic intensity, allowing the compiler to fully
    utilize the 26 TOPS compute array without stalling on memory bandwidth. Since Hailo-8 lacks local
    DRAM and relies on host memory streaming, minimizing data movement is more critical than raw FLOP
    reduction. A network optimized for compute density, utilizing standard 3x3s or unified block structures,
    is preferable to depthwise-heavy architectures.
  common_mistake: Candidates often assume that fewer FLOPs automatically translates to lower latency and
    power. They instinctively choose MobileNetV2 without realizing that depthwise separable convolutions
    have extremely low arithmetic intensity, which severely bottlenecks dataflow accelerators like Hailo-8
    that rely on high compute-to-memory ratios.
  napkin_math: 'Assuming weights are pinned on-chip: A standard 3x3 conv with 64 in/out channels performs
    73,728 OPs per spatial location, streaming 128 bytes of INT8 activations (64 in, 64 out). Arithmetic
    intensity = 73,728 / 128 ≈ 576 OP/byte. To sustain 26 TOPS, required activation bandwidth = 26e12
    / 576 ≈ 45.1 GB/s. A depthwise 3x3 conv performs 18 OPs per location, streaming 2 bytes (1 in, 1 out).
    Arithmetic intensity = 18 / 2 = 9 OP/byte. To sustain 26 TOPS with depthwise layers, required bandwidth
    = 26e12 / 9 ≈ 2.88 TB/s. This 2.88 TB/s requirement is impossible for host streaming, leaving the
    2.5W compute array severely underutilized.'
