title: The Throttled Robot
scenario: A delivery robot's compute module, a Jetson AGX Orin, can operate in various power states (P-states) to manage its thermal envelope. The module is rated for a peak of 275 TOPS at its higher power limits (e.g., 60W). To conserve battery, you configure the system to operate in a 15W power-limited mode.
question: What is the approximate sustained INT8 TOPS you can expect to achieve in this mode?
details:
  realistic_solution: 'The performance scales roughly linearly with the power budget. First, calculate the device''s power efficiency from its peak performance and power draw: ~275 TOPS / 60W ≈ 4.6 TOPS/W. Then, multiply this efficiency by the new power budget to find the sustained performance: 4.6 TOPS/W × 15W ≈ 69 TOPS. Therefore, you can expect about 70 TOPS of sustained performance.'
  common_mistake: |
    **The Pitfall:** Recalling only the peak performance number (275 TOPS) and ignoring the direct impact of the power budget.
    **The Rationale:** Candidates forget that on thermally constrained edge devices, performance scales linearly with the allocated power budget via DVFS.
    **The Consequence:** Designing a system architecture assuming far more compute capability than the battery constraint actually permits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Performance: 275 TOPS INT8.
       - Peak Power Limit: 60W.
       - Target Power Limit: 15W.
    2. **Calculations:**
       - Power Efficiency = 275 TOPS / 60W ≈ 4.58 TOPS/W.
       - Sustained Performance = 4.58 TOPS/W * 15W = 68.7 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: ~69 TOPS.** The system will sustain roughly 69 TOPS, dictated entirely by the **Power-Bound** thermal constraints.
  options:
  - 275 TOPS
  - ~140 TOPS
  - ~70 TOPS
  - 15 TOPS
  correct_index: 2
