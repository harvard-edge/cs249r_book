title: The Throttled Robot
scenario: A delivery robot's compute module, a Jetson AGX Orin, can operate in various power states (P-states)
  to manage its thermal envelope. The module is rated for a peak of 275 TOPS at its higher power limits
  (e.g., 60W). To conserve battery, you configure the system to operate in a 15W power-limited mode. What
  is the approximate sustained INT8 TOPS you can expect to achieve in this mode?
details:
  realistic_solution: 'The performance scales roughly linearly with the power budget. First, calculate
    the device''s power efficiency from its peak performance and power draw: ~275 TOPS / 60W ≈ 4.6 TOPS/W.
    Then, multiply this efficiency by the new power budget to find the sustained performance: 4.6 TOPS/W
    × 15W ≈ 69 TOPS. Therefore, you can expect about 70 TOPS of sustained performance.'
  common_mistake: A common mistake is to recall only the peak performance number (275 TOPS) without considering
    the direct impact of the power budget. Engineers forget that on thermally constrained edge devices,
    performance is not a fixed value but scales directly with the power allocated via mechanisms like
    DVFS (Dynamic Voltage and Frequency Scaling). The system's actual throughput is dictated by its power
    efficiency (TOPS/W) multiplied by the current power budget.
  napkin_math: Efficiency = Peak Performance / Max Power = 275 TOPS / 60W ≈ 4.6 TOPS/W
  options:
  - 275 TOPS
  - ~140 TOPS
  - ~70 TOPS
  - 15 TOPS
  correct_index: 2
