title: 'Edge Queueing Theory Specification: Design Smart Meter Edge Queue'
scenario: 'Specify the queueing architecture for a smart electricity meter using Hailo-8 that runs anomaly detection on 10,000 samples/second signal stream. Model: 0.5 GOPS INT8, processes 100-sample windows. λ=100 windows/s (sliding window every 10ms). Specify buffer size, scheduling policy, and latency SLO. Power budget: 3W total.'
question: "What buffer size, scheduling policy, latency SLO, and power budget should the Hailo-8 smart-meter anomaly detector use?"
details:
  realistic_solution: Hailo-8 is vastly overprovisioned. The service rate μ is 52,000 windows/s, and the arrival rate λ is 100 windows/s, yielding a utilization ρ of 0.00192 (essentially zero queue). The wait time is ~19.2µs per window. A 1-window buffer (200 bytes) with a FIFO scheduling policy and a 10ms deadline easily meets the 3W budget constraints.
  common_mistake: |
    **The Pitfall:** Treating continuous streaming data as independent requests without accounting for sliding window overlap.
    **The Rationale:** Candidates apply standard web-server queuing theory without recognizing the temporal dependencies and extreme over-provisioning of a 26 TOPS accelerator for a 0.5 GOPS task.
    **The Consequence:** Over-engineering a complex priority queue or massively over-sizing the memory buffer for a trivial workload.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 0.5 GOPS.
       - Hailo-8: 26 TOPS (26,000 GOPS), 2.5W. Host MCU: 0.5W.
       - Arrival rate (λ): 100 windows/s. Window size: 100 samples (200 bytes).
    2. **Calculations:**
       - Service rate (μ) = 26,000 GOPS / 0.5 GOPS/window = 52,000 windows/s.
       - Utilization (ρ) = 100 / 52,000 = ~0.0019 (0.19%).
       - Processing time (W) = 1 / 52,000 = 19.2 µs.
       - Total power = 2.5W + 0.5W = 3.0W.
    3. **Conclusion & Interpretation:**
       - **Result: 19.2 µs latency, 3.0W power** (Compute-Overprovisioned, perfectly feasible).
