title: Edge New 0012
scenario: 'A vibration sensor feeds a Cortex-M4 at 1kHz. The anomaly detection model takes 4ms to run.'
question: At a 1kHz sensor rate with 4ms inference, should the Cortex-M4 drop samples for immediate inference or batch 10 samples?
details:
  realistic_solution: 'By buffering 10 samples (10ms wait) and utilizing the CMSIS-DSP library for vectorized execution (taking 5ms), the MCU can process 100% of the data stream continuously. The tradeoff is a 10ms baseline latency, which is acceptable for vibration monitoring.'
  common_mistake: |
    **The Pitfall:** Processing single samples immediately.
    **The Rationale:** Candidates attempt to minimize latency by executing inferences the instant a sensor interrupts.
    **The Consequence:** This leads to massive data loss on high-frequency streams because the inference time exceeds the sampling period.
  napkin_math: |
    1. **Assumptions & Constraints:** 1kHz sensor rate (1ms period). Model takes 4ms. Vectorized batch of 10 takes 5ms.
    2. **Calculations:** Single sample data loss = 4ms / 1ms = 75% dropped. Batch latency = 10ms wait + 5ms exec = 15ms. Batch throughput = 10 samples / 5ms = 2 kHz capacity.
    3. **Conclusion & Interpretation:** **Throughput easily handles the 1kHz stream with no data loss. Result: Compute-Bound.**
