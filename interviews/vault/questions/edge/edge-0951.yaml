title: Edge New 0012
scenario: A vibration sensor feeds a Cortex-M4 at 1kHz (1ms period). The anomaly detection model takes
  4ms to run. Analyze the tradeoff between dropping 75% of the samples to run immediately versus batching
  10 samples into a 5ms vectorized run.
question: "At a 1kHz sensor rate with 4ms inference, should the Cortex-M4 drop samples for immediate inference or batch 10 samples?"
details:
  realistic_solution: Running single samples drops data because execution (4ms) exceeds the sampling period
    (1ms), resulting in severe aliasing and missed high-frequency anomalies. By buffering 10 samples (10ms
    wait) and utilizing the CMSIS-DSP library for vectorized execution (taking 5ms), the MCU can process
    100% of the data stream continuously. The tradeoff is a 10ms baseline latency, which is entirely acceptable
    for mechanical vibration monitoring.
  common_mistake: Attempting to execute inferences the instant a sensor interrupts, leading to stack overflows
    or massive data loss on high-frequency streams.
  napkin_math: 'Single sample approach: 4ms execution / 1ms arrival = 4 samples arrive during 1 run (75%
    loss). Batch approach: Collect 10 (10ms). Execute 10 (5ms). 10ms + 5ms = 15ms total latency, but throughput
    is 10 samples / 10ms, handling 1kHz perfectly.'
