title: Edge New 0012
scenario: >-
  A vibration sensor feeds a Cortex-M4 at 1kHz (1ms period). The anomaly detection model takes 4ms to run.
question: At a 1kHz sensor rate with 4ms inference, should the Cortex-M4 drop samples for immediate inference or batch 10 samples?
details:
  realistic_solution: |
    By buffering 10 samples (10ms wait) and utilizing the CMSIS-DSP library for vectorized execution (taking 5ms), the MCU can process 100% of the data stream continuously. The tradeoff is a 10ms baseline latency, which is acceptable for vibration monitoring.
  common_mistake: |
    **The Pitfall:** Processing single samples immediately.
    **The Rationale:** Candidates attempt to minimize latency by executing inferences the instant a sensor interrupts.
    **The Consequence:** This leads to massive data loss on high-frequency streams because the inference time exceeds the sampling period.
  napkin_math: |
    - **Single sample approach:** `4ms execution / 1ms arrival = 75% data loss`.
    - **Batch approach:** Collect 10 samples (`10ms wait`). Execute 10 samples vectorized (`5ms execution`).
    - **Total latency:** `10ms + 5ms = 15ms`.
    - **Result:** **Throughput is 10 samples per 10ms (1kHz), handling the stream perfectly with no data loss.**
