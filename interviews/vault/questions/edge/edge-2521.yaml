title: Tensor Parallel KV Sync on Edge
scenario: A model is split via Tensor Parallelism across 2 edge GPUs connected by a PCIe Gen4 x16 bridge (32 GB/s). Synchronizing KV projection outputs requires transferring 4 MB per layer across 80 layers.
question: Evaluate the communication latency overhead per generated token for the Tensor Parallel split.
details:
  realistic_solution: For each of the 80 layers, the 4 MB transfer takes 4 MB / 32 GB/s = 0.125ms. Across all layers, this totals 80 * 0.125ms = 10ms per token. At 20 tokens/second, this sync bubble consumes a massive 200ms out of every second purely in PCIe blocking overhead.
  common_mistake: |
    **The Pitfall:** Dividing the total model weight size by the PCIe bandwidth.
    **The Rationale:** Failing to understand that Tensor Parallelism requires synchronizing activations (the micro-batch bubble) at every single layer boundary during decoding.
    **The Consequence:** Drastically underestimating the per-token latency overhead caused by the PCIe interconnect.
  napkin_math: |
    * **Transfer Size per Layer**: 4 MB.
    * **PCIe Bandwidth**: 32 GB/s = 32,000 MB/s.
    * **Transfer Time per Layer**: 4 MB / 32,000 MB/s = 0.125 ms.
    * **Total Layers**: 80.
    * **Total Sync Bubble per Token**: 0.125 ms * 80 = **10 ms**.
