title: Tensor Parallel KV Sync on Edge
scenario: A model is split via Tensor Parallelism across 2 edge GPUs connected by
  a PCIe Gen4 x16 bridge (32 GB/s). Synchronizing KV projection outputs requires transferring
  4 MB per layer across 80 layers.
question: Evaluate the communication latency overhead per generated token.
details:
  realistic_solution: For each of the 80 layers, the 4 MB transfer takes 4 MB / 32
    GB/s = 0.125ms. Across all layers, this totals 80 * 0.125ms = 10ms per token.
    At 20 tokens/second, this sync bubble consumes a massive 200ms out of every second
    purely in PCIe blocking overhead.
  common_mistake: Dividing the total model weight size by PCIe bandwidth rather than
    evaluating the micro-batch synchronization bubble that occurs at every layer boundary
    during decoding.
  napkin_math: (4 MB / 32000 MB/s) = 0.125 ms. 0.125 ms * 80 layers = 10 ms sync bubble
    per token.
