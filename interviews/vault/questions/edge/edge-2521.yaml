title: Tensor Parallel KV Sync on Edge
scenario: A model is split via Tensor Parallelism across 2 edge GPUs connected by a PCIe Gen4 x16 bridge.
question: Evaluate the communication latency overhead per generated token for the Tensor Parallel split.
details:
  realistic_solution: |
    For each of the 80 layers, the 4 MB transfer takes 0.125ms (4 MB / 32 GB/s). Across all layers, this totals 10ms per token. At 20 tokens/second, this synchronization bubble consumes 200ms out of every second purely in PCIe blocking overhead, creating a severe communication bottleneck during the autoregressive decode phase.
  common_mistake: |
    **The Pitfall:** Dividing the total model weight size by the PCIe bandwidth.
    **The Rationale:** Failing to understand that Tensor Parallelism requires synchronizing activations (the micro-batch bubble) at every single layer boundary during decoding.
    **The Consequence:** Drastically underestimating the per-token latency overhead caused by the PCIe interconnect.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transfer Size per Layer: 4 MB.
       - PCIe Gen4 x16 Bandwidth: 32 GB/s (32,000 MB/s).
       - Total Layers: 80.
    2. **Calculations:**
       - Transfer Time per Layer: 4 MB / 32,000 MB/s = 0.125 ms.
       - Total Sync Bubble: 0.125 ms * 80 = 10 ms per token.
    3. **Conclusion & Interpretation:**
       - **Result: 10 ms per token latency overhead. Bottleneck: PCIe Interconnect (Communication-Bound).**
