title: Diagnosing CPU Fallback on Edge TPU
scenario: You are deploying a custom vision model to a Google Coral Edge TPU via USB. The Edge TPU operates within a 2W budget and expects an 8ms latency. During testing, inference latency spikes to 120ms per frame, and the host device's CPU utilization is pegged at 100%.
question: What architectural issue causes 120ms latency and 100% host CPU utilization on the Coral Edge TPU?
details:
  realistic_solution: The root cause is execution fallback to the host CPU due to unsupported operators or incomplete INT8 quantization. Any unquantized layer forces the compiler to partition the graph, resulting in expensive context switching and intermediate tensor transfers between the TPU and host CPU, spiking latency and CPU load.
  common_mistake: |
    **The Pitfall:** Treating the Edge TPU as a general-purpose accelerator capable of executing arbitrary FP32 layers.
    **The Rationale:** Candidates assume unquantized layers will simply run slower on the NPU, rather than forcing an expensive fallback to the host CPU.
    **The Consequence:** The compiler fragments the graph, leading to massive PCIe/USB transfer overheads and 100% host CPU utilization.
  napkin_math: |
    - Target 8ms latency budget (125 FPS).
    - Edge TPU compute: 4 TOPS = 32 GOPS per frame budget.
    - CPU Fallback: 1 GOPS of unsupported ops runs on a 10 GOPS host CPU.
    - CPU execution time: 1 GOPS / 10 GOPS/sec = 100ms.
    - Host-to-TPU transfer overhead: ~20ms.
    - Total latency: 100ms + 20ms = **120ms latency**.
