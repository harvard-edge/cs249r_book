title: Diagnosing CPU Fallback on Edge TPU
scenario: You are deploying a custom vision model to a remote sensor powered by a
  Google Coral Edge TPU via USB form factor. The Edge TPU is rated for 4 TOPS at INT8
  precision and operates within a 2W power budget. During testing, you notice inference
  latency has spiked to 120ms per frame instead of the anticipated 8ms, and the host
  device's CPU utilization is pegged at 100%. Diagnose the architectural issue causing
  this symptom.
question: What architectural issue causes 120ms latency and 100% host CPU utilization
  on the Coral Edge TPU?
details:
  realistic_solution: The root cause is execution fallback to the host CPU due to
    unsupported operators or incomplete INT8 quantization. Because the Edge TPU has
    limited operator support and strictly requires INT8, any unquantized layer forces
    the compiler to partition the graph. This results in expensive context switching
    and intermediate tensor transfers between the TPU and host CPU, spiking latency
    and CPU load.
  common_mistake: Candidates often incorrectly treat the Edge TPU as a general-purpose
    GPU, assuming it can natively execute arbitrary FP32 layers or handle complex
    thread block scheduling. They may incorrectly blame USB bandwidth limits or 2W
    thermal throttling without analyzing the execution pipeline.
  napkin_math: For an expected 8ms latency (125 FPS), the Edge TPU provides 4 TOPS
    / 125 = 32 GOPS per frame. A typical USB 3.0 link (5 Gbps) transfers a 300x300x3
    byte INT8 input (270 KB) in ~0.5ms. However, if an unsupported operator forces
    just 1 GOPS of compute to fall back to a 10 GOPS host CPU, that segment alone
    takes 1 GOPS / 10 GOPS = 100ms. Adding the USB round-trip transfer time for the
    intermediate feature maps easily accounts for the 120ms total latency.
