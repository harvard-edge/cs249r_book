title: Orin Mesh Bisection Bandwidth
scenario: 'Four Jetson AGX Orin modules are directly wired to each other in a fully connected mesh topology. Every individual direct link between any two nodes is 1 Gbps.'
question: 'What is the bisection bandwidth of this 4-node fully connected mesh network?'
visual:
  kind: svg
  path: edge-2285.svg
  alt: A complete graph of four nodes where every node is connected to every other node forming a cross inside a box.
  caption: 4-Node Fully Connected Mesh
details:
  realistic_solution: 'Bisection bandwidth is the minimum bandwidth across a cut that splits the network into two equal halves (2 nodes per side). In a 4-node full mesh, the two nodes on side A both connect directly to the two nodes on side B, resulting in 2 * 2 = 4 links crossing the partition. The bisection bandwidth is 4 * 1 Gbps = 4 Gbps.'
  common_mistake: |
    **The Pitfall:** Only counting the perimeter links (like a ring network).
    **The Rationale:** Candidates visualize a square and cut it in half, hitting only two links.
    **The Consequence:** They calculate a bisection bandwidth of 2 Gbps, underestimating the actual network capacity by half.
  napkin_math: |
    * A full mesh of 4 nodes means every node connects to every other node.
    * Splitting the network into two equal halves (2 nodes per side).
    * The 2 nodes on side A both connect directly to the 2 nodes on side B.
    * Number of links crossing the partition: 2 * 2 = 4 links.
    * **Bisection bandwidth: 4 links * 1 Gbps = 4 Gbps.**
