title: Vision Transformer Memory Spillage
scenario: An L4 autonomous driving module uses a Jetson AGX Orin. It receives 10 GB/s of uncompressed sensor data. The local unified memory has a 204.8 GB/s bandwidth limit.
question: Evaluate why memory bandwidth bottlenecks a 50-GFLOP Vision Transformer despite the 204.8 GB/s limit, and propose a memory-fusion strategy.
details:
  realistic_solution: 'Memory bandwidth is saturated by intermediate activation reads/writes between un-fused transformer layers, not the raw input. The attention mechanism causes quadratic activation memory traffic. Solution: Implement kernel fusion (e.g., FlashAttention) to keep the attention matrix strictly in local SRAM.'
  common_mistake: |
    **The Pitfall:** Assuming the uncompressed 10 GB/s sensor data stream is the primary memory bottleneck.
    **The Rationale:** Candidates look at the large input pipe and ignore the quadratic read/write amplification of un-fused intermediate activations.
    **The Consequence:** Optimizations focus on input compression rather than implementing flash attention or kernel fusion.
  napkin_math: |
    - Intermediate activations per layer: 20MB read + 20MB write = 40MB traffic.
    - 50 Transformer layers: 50 * 40MB = 2GB traffic per frame.
    - At 60 FPS: 2GB * 60 = 120 GB/s internal traffic.
    - This consumes over 50% of the **204.8 GB/s budget** strictly on intermediate self-attention state.
