title: Vision Transformer Memory Spillage
scenario: An L4 autonomous driving module uses a Jetson AGX Orin. It receives 10 GB/s
  of uncompressed sensor data. The local unified memory has 204.8 GB/s bandwidth.
question: Evaluate why memory bandwidth bottlenecks a 50-GFLOP Vision Transformer
  despite the 204.8 GB/s limit, and propose a memory-fusion strategy.
details:
  realistic_solution: 'Memory bandwidth is saturated by intermediate activation reads/writes
    between un-fused transformer layers, not the raw input. The attention mechanism
    causes quadratic activation memory traffic. Solution: Implement kernel fusion
    (e.g., FlashAttention) to keep the attention matrix strictly in local SRAM.'
  common_mistake: Assuming the 10 GB/s sensor data stream is the culprit, ignoring
    the massive read/write amplification of intermediate activations.
  napkin_math: 50 layers * read/write 20MB activations = 2GB traffic per frame. At
    60 FPS, this is 120 GB/s of internal traffic.
