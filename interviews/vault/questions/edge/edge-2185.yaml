title: Memory Controller Contention on Edge SoCs
scenario: Your Jetson Orin runs inference with P50 = 10ms but P99 = 40ms. The Orin has unified LPDDR5 memory shared between CPU, GPU, and DLA. Profiling shows that CPU data preprocessing (image decode + resize) runs concurrently with GPU inference, causing memory controller contention.
question: How much LPDDR5 bandwidth contention is causing the 40 ms P99 spikes, and how would you restructure preprocessing to reduce them?
details:
  realistic_solution: 'Orin''s LPDDR5 provides 204.8 GB/s total bandwidth across 256-bit channels. GPU inference needs ~160 GB/s for model weight streaming. CPU image decode needs ~53 GB/s. Total demand: 213 GB/s — exceeding practical limits. Memory controller arbitration adds 30% overhead when multiple clients compete. Actual effective bandwidth drops to ~143 GB/s shared. The GPU only gets ~107 GB/s (67% of needed), stretching inference time. The contention causes massive OS scheduler and memory jitter, driving P99 to 40ms. Fix: pipeline CPU and GPU temporally — decode frame N on CPU while GPU runs inference on frame N-1. This serializes memory access patterns: CPU burst then GPU burst, eliminating contention. P99 drops to 13ms. Alternative: use VIC (Video Image Compositor) hardware for decode, freeing CPU entirely.'
  common_mistake: |
    **The Pitfall:** Treating CPU and GPU memory accesses as independent.
    **The Rationale:** Candidates forget that on unified memory SoCs like Orin, all compute units share the same memory controllers.
    **The Consequence:** Concurrent access from CPU and GPU halves effective bandwidth, leading to massive jitter and missed P99 latency targets.
  napkin_math: |
    1. Orin LPDDR5 peak bandwidth: 204.8 GB/s.
    2. GPU requires 160 GB/s for 10ms inference. CPU decode requires 53 GB/s. Total demand: 213 GB/s.
    3. Contention overhead reduces effective bandwidth by ~30% to ~143 GB/s.
    4. GPU fair share: (160/213) * 143 GB/s = 107 GB/s.
    5. GPU inference time: 1.6 GB / 107 GB/s = 15ms. Remaining 25ms is OS jitter.
    6. Sequential pipelining separates access, restoring 204.8 GB/s and dropping P99 to **~13ms**.
