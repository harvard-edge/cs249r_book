title: Memory Controller Contention on Edge SoCs
scenario: Your Jetson Orin runs inference with P50 = 10ms but P99 = 40ms. The Orin
  has unified LPDDR5 memory shared between CPU, GPU, and DLA. Profiling shows that
  CPU data preprocessing (image decode + resize) runs concurrently with GPU inference,
  causing memory controller contention. Quantify the bandwidth contention and propose
  a solution.
question: How much LPDDR5 bandwidth contention is causing the 40 ms P99 spikes, and
  how would you restructure preprocessing to reduce them?
details:
  realistic_solution: 'Orin''s LPDDR5 provides 204.8 GB/s total bandwidth across 256-bit
    channels. GPU inference needs ~160 GB/s for model weight streaming. CPU image decode
    needs ~53 GB/s. Total demand: 213 GB/s — exceeding practical limits. Memory controller
    arbitration adds 30% overhead when multiple clients compete. Actual effective bandwidth
    drops to ~143 GB/s shared. The GPU only gets ~107 GB/s (67% of needed), stretching inference
    time. The contention causes massive OS scheduler and memory jitter, driving P99 to 40ms. 
    Fix: pipeline CPU and GPU temporally — decode frame N on CPU while GPU runs inference on 
    frame N-1. This serializes memory access patterns: CPU burst then GPU burst, eliminating 
    contention. P99 drops to 13ms. Alternative: use VIC (Video Image Compositor) hardware for 
    decode, freeing CPU entirely.'
  common_mistake: Treating CPU and GPU memory accesses as independent. On unified
    memory SoCs like Orin, all compute units share the same memory controllers. Concurrent
    access from CPU and GPU can halve the effective bandwidth available to each.
  napkin_math: 'Orin LPDDR5 peak: 204.8 GB/s. GPU requires 160 GB/s for 10ms inference 
    (1.6 GB transferred). CPU decode requires 53 GB/s. Total concurrent demand = 213 GB/s. 
    Due to memory controller thrashing, effective shared bandwidth drops by ~30% to ~143 GB/s. 
    GPU fair share = (160/213) * 143 = 107 GB/s. GPU inference time = 1.6 GB / 107 GB/s = 15ms 
    average. The remaining 25ms of the 40ms P99 is OS/scheduler jitter from the high CPU load. 
    Sequential pipelining separates access: CPU decode (5ms) -> GPU inference (10ms) with full 
    204.8 GB/s bandwidth. Inference P99 drops to ~13ms.'
