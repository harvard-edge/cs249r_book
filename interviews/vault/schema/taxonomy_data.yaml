  area: compute
  description: Using the roofline model to diagnose compute-bound vs memory-bound
    workloads and predict accelerator utilization.
  tracks:
  - cloud
  - edge
  - mobile
  - tinyml
  edges:
  - target: profiling-bottleneck-analysis
    edge_type: related
    note: Roofline informs profiling diagnosis
  - target: energy-per-operation
    edge_type: related
    note: Energy roofline extends the compute roofline
- id: gpu-compute-architecture
