    and memory coalescing.'
  tracks:
  - cloud
  - edge
  - mobile
  edges:
  - target: roofline-analysis
    edge_type: prerequisite
  - target: kernel-fusion
    edge_type: related
    note: GPU architecture determines what fusions are profitable
  - target: systolic-dataflow
    edge_type: related
    note: Both are accelerator execution models
