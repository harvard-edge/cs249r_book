name: StaffML Topic Taxonomy
version: 1.0.0
description: Curated knowledge graph of ML systems topics for Staff-level technical
  interview preparation. 77 topics across 13 competency areas with prerequisite, hierarchical,
  and lateral relationships.
last_updated: '2026-03-30'
topics:
- id: roofline-analysis
