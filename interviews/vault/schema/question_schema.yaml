id: https://staffml.mlsysbook.ai/schema/question
name: staffml_question
title: StaffML Question Schema
description: |
  LinkML schema for the StaffML per-question YAML format. Sole schema source
  of truth — Pydantic models, SQL DDL, and TypeScript types are codegen'd from
  this. See ARCHITECTURE.md §3.3 and schema/EVOLUTION.md.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  staffml: https://staffml.mlsysbook.ai/schema/
default_prefix: staffml
default_range: string

imports:
  - linkml:types

enums:

  Track:
    description: Deployment environment the question targets.
    permissible_values:
      cloud: {}
      edge: {}
      mobile: {}
      tinyml: {}
      global: {}

  Level:
    description: Competency level (L1 recall → L6 synthesis).
    permissible_values:
      l1: {}
      l2: {}
      l3: {}
      l4: {}
      l5: {}
      l6: {}

  Zone:
    description: Ikigai-style cognitive zone.
    permissible_values:
      recall: {}
      fluency: {}
      implement: {}
      specification: {}
      analyze: {}
      diagnosis: {}
      design: {}
      evaluation: {}

  Status:
    description: Publication state.
    permissible_values:
      draft: {}
      published: {}
      deprecated: {}

  Provenance:
    description: Authorship provenance (closed enum — see REVIEWS.md H-5).
    permissible_values:
      human: {}
      llm-draft: {}
      llm-then-human-edited: {}
      imported: {}

classes:

  ChainRef:
    description: Structured chain reference. Replaces v1's "<id>@<pos>" compact form.
    attributes:
      id:
        range: string
        required: true
        description: Chain identifier; must exist in chains.yaml.
      position:
        range: integer
        required: true
        minimum_value: 1
        description: 1-indexed position within the chain.

  GenerationMeta:
    description: LLM-generation metadata. Required iff provenance != human.
    attributes:
      model:
        range: string
        description: Must exist in schema/models.yaml registry.
      prompt_hash:
        range: string
        description: SHA-256 hex referencing vault/generation-log/<date>/<hash>.txt.
      prompt_cost_usd:
        range: float
        minimum_value: 0.0
      human_reviewed_at:
        range: datetime
        description: Required before exemplar-pool eligibility (REVIEWS.md C-6).

  DeepDive:
    description: Optional external reference.
    attributes:
      title:
        range: string
      url:
        range: uri
        pattern: "^https://.*"
        description: Scheme must be https (REVIEWS.md H-6).

  Details:
    description: Rich-text body of the question.
    attributes:
      common_mistake:
        range: string
        description: Restricted-Markdown + KaTeX.
      realistic_solution:
        range: string
        required: true
        description: Restricted-Markdown + KaTeX. Canonical answer.
      napkin_math:
        range: string
      deep_dive:
        range: DeepDive

  Question:
    description: A single StaffML interview question.
    attributes:
      schema_version:
        range: integer
        required: true
        equals_expression: "1"
      id:
        range: string
        identifier: true
        required: true
        description: Immutable, URL-safe. See §3.3 for format rules.
      title:
        range: string
        required: true
        description: Plaintext, ≤120 chars.
      topic:
        range: string
        required: true
        description: Must exist in taxonomy.yaml.
      chain:
        range: ChainRef
      status:
        range: Status
        required: true
      created_at:
        range: datetime
      last_modified:
        range: datetime
      provenance:
        range: Provenance
        required: true
      generation_meta:
        range: GenerationMeta
      authors:
        range: string
        multivalued: true
      scenario:
        range: string
        required: true
        description: Plaintext only. No HTML, no javascript: URLs.
      details:
        range: Details
        required: true
      tags:
        range: string
        multivalued: true
