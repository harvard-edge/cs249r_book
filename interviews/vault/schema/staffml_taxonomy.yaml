# ──────────────────────────────────────────────────────────────
# StaffML Topic Taxonomy — LinkML Schema
# ──────────────────────────────────────────────────────────────
# Single source of truth. Generates:
#   - Pydantic models:    gen-pydantic staffml_taxonomy.yaml
#   - JSON Schema:        gen-json-schema staffml_taxonomy.yaml
#   - TypeScript:         gen-typescript staffml_taxonomy.yaml
#   - ER Diagram:         gen-erdiagram staffml_taxonomy.yaml
#   - Documentation:      gen-doc staffml_taxonomy.yaml
# ──────────────────────────────────────────────────────────────

id: https://staffml.dev/taxonomy
name: staffml_taxonomy
title: StaffML Interview Topic Taxonomy
description: >-
  A curated knowledge graph of ~77 ML systems topics for technical
  interview preparation. Models prerequisite chains, hierarchical
  drill-down (broader/narrower), lateral connections (related), and
  an ikigai-inspired competency model (Recall × Analyze × Design ×
  Implement) for classifying how each question tests a topic.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  skos: http://www.w3.org/2004/02/skos/core#
  staffml: https://staffml.dev/taxonomy/

default_prefix: staffml
default_range: string

imports:
  - linkml:types

# ── Enums ────────────────────────────────────────────────────

enums:

  CompetencyArea:
    description: >-
      The 13 canonical competency areas tested in ML systems interviews.
    permissible_values:
      compute:
        description: Reasoning about compute-bound vs memory-bound workloads
      memory:
        description: Accounting for where every byte lives and moves
      latency:
        description: Decomposing end-to-end latency and identifying bottlenecks
      precision:
        description: Numerical formats, quantization, and system-level effects
      power:
        description: Energy as a first-class design constraint
      architecture:
        description: Mapping model architecture choices to resource consumption
      optimization:
        description: Making models smaller/faster without destroying accuracy
      parallelism:
        description: Distributing computation across multiple devices
      networking:
        description: Communication fabrics and collective operations
      deployment:
        description: Getting models into production and keeping them running
      reliability:
        description: Detecting silent failures and designing for graceful degradation
      data:
        description: Data pipelines, quality, storage, and feature engineering
      cross-cutting:
        description: Privacy, fairness, cost modeling, and governance

  EdgeType:
    description: >-
      Relationship types between topics. Uses SKOS vocabulary where
      applicable, plus a custom prerequisite type for learning order.
    permissible_values:
      prerequisite:
        description: Source must be understood before target
        meaning: staffml:prerequisite
      broader:
        description: Source is a more general concept than target (zoom out)
        meaning: skos:broader
      narrower:
        description: Source is a more specific concept than target (drill in)
        meaning: skos:narrower
      related:
        description: Concepts are thematically connected (lateral)
        meaning: skos:related

  TrackApplicability:
    description: Deployment tracks where a topic is relevant.
    permissible_values:
      cloud:
        description: Data center / multi-GPU systems
      edge:
        description: Edge devices (Jetson, Hailo, Coral)
      mobile:
        description: Phones and tablets (NPU, CoreML, TFLite)
      tinyml:
        description: Microcontrollers (Cortex-M, ESP32)

  # ── Ikigai Competency Model ──────────────────────────────

  Skill:
    description: >-
      The four fundamental skills in ML systems competency, inspired
      by the ikigai model. Every question exercises one or more of
      these skills; the combination determines the question's zone.
    permissible_values:
      recall:
        description: >-
          Facts, definitions, and specifications. "What is the HBM
          bandwidth of an H100?" Knowledge that can be looked up.
      analyze:
        description: >-
          Tradeoff reasoning, root cause analysis, and diagnosis.
          "Why is this workload memory-bound?" Requires understanding
          cause and effect in systems.
      design:
        description: >-
          Architecture decisions and requirements-to-system mapping.
          "Design a serving stack for P99 < 100ms." Requires synthesis
          of constraints into a coherent system.
      implement:
        description: >-
          Napkin math, optimization, and concrete system building.
          "Calculate the VRAM for a 70B model in FP16." Requires
          translating concepts into numbers or code.

  QuestionZone:
    description: >-
      The 11 zones of the ikigai competency model. Four pure zones
      (single skill), six intersection zones (two skills combined),
      and one mastery zone (all four skills). Each zone describes
      HOW a question tests a topic, independent of WHAT topic it
      tests or HOW HARD it is.

      The model is visualized as a four-circle Venn diagram where
      each intersection represents a compound cognitive skill that
      emerges from combining two fundamental skills.
    permissible_values:

      # ── Pure zones (single skill) ──

      recall:
        description: >-
          Pure recall. "What is X?" "Name the three types of Y."
          Tests whether the candidate knows facts and definitions.
        meaning: staffml:zone-recall
      analyze:
        description: >-
          Pure analysis. "Why does X happen?" "What causes Y?"
          Tests whether the candidate can reason about system behavior.
        meaning: staffml:zone-analyze
      design:
        description: >-
          Pure design. "Architect a system for X." Tests whether the
          candidate can make high-level architecture decisions.
        meaning: staffml:zone-design
      implement:
        description: >-
          Pure implementation. "Calculate X." "Write the equation for Y."
          Tests whether the candidate can do the math or build concretely.
        meaning: staffml:zone-implement

      # ── Intersection zones (two skills combined) ──

      diagnosis:
        description: >-
          Recall + Analyze. "Your H100 hits 40% MFU — diagnose it."
          The candidate must recall hardware specs AND reason about
          why the system is underperforming. The classic debugging skill.
        meaning: staffml:zone-diagnosis
      specification:
        description: >-
          Recall + Design. "Given a 30W power budget, design the
          inference pipeline." The candidate must recall constraints
          AND synthesize them into a system design.
        meaning: staffml:zone-specification
      fluency:
        description: >-
          Recall + Implement. "How much VRAM for a 70B model in FP16?
          Show the math." The candidate must recall the formula AND
          execute the calculation from memory. Napkin math at speed.
        meaning: staffml:zone-fluency
      evaluation:
        description: >-
          Analyze + Design. "MoE vs dense for your latency budget —
          which and why?" The candidate must reason about tradeoffs
          AND make an architecture decision. No calculations needed,
          but deep systems reasoning required.
        meaning: staffml:zone-evaluation
      realization:
        description: >-
          Design + Implement. "You chose pipeline parallelism. Size
          the micro-batches and estimate bubble overhead." The candidate
          must turn architecture decisions into concrete numbers.
        meaning: staffml:zone-realization
      optimization:
        description: >-
          Analyze + Implement. "Inference is memory-bound at 30% MFU.
          Walk through the optimization ladder and estimate speedup at
          each step." The candidate must diagnose the bottleneck AND
          calculate the fix. The performance engineering zone.
        meaning: staffml:zone-optimization

      # ── Center (all four skills) ──

      mastery:
        description: >-
          All four skills. "Design a training cluster for a 70B model.
          Budget compute, memory, network, and cost. Justify every
          choice." Staff/Principal level synthesis that requires
          recalling specs, analyzing tradeoffs, designing the system,
          AND calculating the numbers. The full interview question.
        meaning: staffml:zone-mastery

  Level:
    description: >-
      Difficulty level, mapping to industry experience and cognitive
      depth. L1-L2 are foundational, L3-L4 are mid-level, L5-L6+
      are senior/staff.
    permissible_values:
      L1:
        description: "Recall & Define — foundational (new grad)"
      L2:
        description: "Understand & Explain — foundational (new grad)"
      L3:
        description: "Apply — task-level (junior, 0-2 years)"
      L4:
        description: "Analyze — component-level (mid, 2-4 years)"
      L5:
        description: "Evaluate — system-level (senior, 5-8 years)"
      L6+:
        description: "Synthesize & Derive — architecture-level (staff/principal, 8+)"

# ── Classes ──────────────────────────────────────────────────

classes:

  TopicEdge:
    description: A typed, directed relationship between two topics.
    attributes:
      target:
        description: The target topic ID this edge points to.
        range: Topic
        required: true
      edge_type:
        description: The semantic type of this relationship.
        range: EdgeType
        required: true
      note:
        description: Optional annotation explaining this specific edge.

  Topic:
    description: >-
      A curated ML systems topic. Each topic groups 20-100 interview
      questions under a single, stable concept that will endure 5-10 years.
    class_uri: skos:Concept
    attributes:
      id:
        identifier: true
        description: Kebab-case unique identifier.
        range: uriorcurie
        pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      name:
        description: Human-readable topic name.
        slot_uri: skos:prefLabel
        required: true
      area:
        description: Which competency area this topic belongs to.
        range: CompetencyArea
        required: true
      description:
        description: One-sentence explanation of what this topic covers.
        slot_uri: skos:definition
        required: true
      tracks:
        description: Which deployment tracks this topic applies to.
        range: TrackApplicability
        multivalued: true
      edges:
        description: Outgoing relationships to other topics.
        range: TopicEdge
        multivalued: true
        inlined_as_list: true

  Question:
    description: >-
      An interview question classified by topic (WHAT), zone (HOW),
      track (WHERE), and level (HOW HARD). This is the minimal
      classification schema — the full question content lives in
      corpus.json and references these axes.
    attributes:
      id:
        identifier: true
        description: Unique question identifier (e.g., cloud-0042).
        range: uriorcurie
      topic:
        description: >-
          Which curated topic this question tests. Must reference
          a valid Topic ID from the taxonomy.
        range: Topic
        required: true
      zone:
        description: >-
          Which ikigai zone this question occupies — determines HOW
          the topic is tested (pure recall vs diagnosis vs mastery).
        range: QuestionZone
        required: true
      track:
        description: Which deployment track this question targets.
        range: TrackApplicability
        required: true
      level:
        description: Difficulty level (L1 through L6+).
        range: Level
        required: true
      skills:
        description: >-
          The underlying skills this question exercises. Derived from
          the zone — e.g., diagnosis = [recall, analyze]. Stored
          explicitly for filtering and coverage analysis.
        range: Skill
        multivalued: true

  Taxonomy:
    tree_root: true
    description: The complete StaffML topic taxonomy.
    class_uri: skos:ConceptScheme
    attributes:
      name:
        description: Taxonomy name.
        slot_uri: skos:prefLabel
        required: true
      version:
        description: Semantic version string.
        required: true
      description:
        description: What this taxonomy is for.
        slot_uri: skos:definition
      last_updated:
        description: ISO date of last modification.
        range: date
      topics:
        description: All topics in the taxonomy.
        range: Topic
        multivalued: true
        inlined_as_list: true
