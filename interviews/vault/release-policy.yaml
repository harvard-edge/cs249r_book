# Release policy — sole source for "what counts as published".
#
# Consumers (paper exporter, site, D1 migration) never re-implement this logic;
# they import vault_cli.policy.filter. CI's import-graph check enforces this
# — re-implementation by any consumer is a hard fail. (REVIEWS.md H-21.)
#
# policy_version is stamped into release_metadata.policy_version and into the
# __policy__ Merkle leaf (ARCHITECTURE.md §3.5).

policy_version: 1

include:
  status:
    - published
  require_validated: false

exclude_topics: []          # topics to drop entirely (escape hatch; normally empty)
exclude_ids: []             # individual IDs to drop (escape hatch)

notes: |
  policy_version 1 (2026-04-15): release set = status=published.

  The v1 bug (paper said 9,199; site said 8,053) stemmed from two consumers
  combining "status=published" AND "validated=true" in mismatched ways. The
  convergent resolution is: validation is an IMPLICIT precondition of the
  maintainer action that sets status=published. No separate "validated" flag
  is tracked in the per-question schema. CI + review gates the status transition.

  If an escape hatch for per-question exclusion is ever needed, use
  exclude_ids above; policy evolution happens via policy_version bumps
  recorded in release_metadata and bound into the __policy__ Merkle leaf
  (ARCHITECTURE.md §3.5).
