id: cloud-0436
title: The Distillation Cost-Benefit Analysis
topic: kernel-fusion
status: published
provenance: human
scenario: Your team plans to distill a 175B parameter teacher model to a 7B student model to reduce serving costs. The process involves training on 140B tokens, using the teacher to generate soft labels.
question: Assuming H100s cost $2/hour and achieve 40% MFU, calculate the cost of this distillation run and determine the primary cost driver.
details:
  realistic_solution: "Calculate exact bounds for the `6PD` student trajectory and the `2PD` teacher generation. Recognizing the teacher consumes >85% of compute cycles, instantly decouple the processes. Execute a one-time teacher inference pipeline, permanently caching the raw soft-logits to S3 for all subsequent downstream student runs."
  common_mistake: |
    **The Pitfall:** Estimating costs using solely the `6PD` metric for the 7B student network.
    **The Rationale:** Myopically treating distillation strictly as a 'small model training' task without accounting for the colossal 175B forward-pass tax.
    **The Consequence:** Bankrupting the cloud compute budget halfway through the project run.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data: 140B Tokens.
       - Student: 7B params.
       - Teacher: 175B params.
       - H100 MFU: 40% (395.6 TFLOPS).
    2. **Calculations:**
       - Student FLOPs = 6 * 7e9 * 140e9 = 5,880 EFLOPS.
       - Teacher FLOPs = 2 * 175e9 * 140e9 = 49,000 EFLOPS.
       - Total Runtime = 54,880e18 / (395.6e12 * 3600) = 38,540 hrs.
       - Cost = 38,540 * $2 = $77,080.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. Generating labels requires 89% of the 54,880 ExaFLOPs budget; pre-computing and caching the $68K teacher payload is critically required.
