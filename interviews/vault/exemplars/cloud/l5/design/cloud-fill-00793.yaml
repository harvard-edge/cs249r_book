title: 'TPU v5e Optimization: Encoder-Decoder Tradeoffs for Mixed Workloads'
topic: encoder-decoder-tradeoffs
status: published
provenance: human
scenario: Your company is developing a new AI-powered content generation and analysis platform. You currently use a large encoder-decoder transformer model for both text generation (summarization, translation) and text classification (sentiment, topic extraction). The current inference costs are prohibitive, and you've been tasked with optimizing for deployment on Google TPU v5e.
question: Which architecture (encoder-only, decoder-only, or a specialized encoder-decoder) would you recommend for optimizing performance and cost, and why?
details:
  realistic_solution: 'A strong solution would propose a hybrid or split approach: utilizing an encoder-only model (e.g., BERT-like) for classification and analysis tasks to leverage higher batch sizes and lower latency, and a smaller, highly optimized decoder-only model (e.g., Llama-variant or custom architecture) for generation. The solution should emphasize optimizing model quantization to fit within HBM, exploiting matrix multiplication units, and maximizing throughput with careful batching strategies.'
  common_mistake: |
    **The Pitfall:** Failing to differentiate the distinct inference resource requirements of generation vs. classification tasks.
    **The Rationale:** Relying on a 'one-size-fits-all' large model out of convenience rather than tailoring the architecture to the deployment hardware.
    **The Consequence:** Suboptimal batching, high latency for generation, and massive underutilization of the compute during classification.
  napkin_math: |
    - A 7B parameter model in BF16 is ~14 GB.
    - This fits into a 16 GB HBM but leaves only 2 GB for activations and KV cache.
    - Memory bandwidth is 1.6 TB/s.
    - Loading weights takes 14 GB / 1.6 TB/s ≈ 8.75 ms.
    - **This 8.75 ms memory-load overhead directly adds to the per-token generation latency, making massive decoder models difficult to serve efficiently on limited memory.**
