id: cloud-2299
title: TPU MXU Padding and Memory Stalls
topic: neural-architecture-search
status: published
provenance: human
scenario: You migrated a two-tower retrieval model to a TPU v4 Pod. The model uses a custom dense architecture with an input dimension of 1000, hidden dimension of 500, and a serving batch size of 150. Throughput is capped at 12,000 QPS. Hardware profiling reveals severe memory stall times and an abysmal Matrix Multiply Unit (MXU) utilization of 14%, despite theoretical arithmetic intensity suggesting it should be compute-bound.
question: What is the root cause of this poor MXU utilization, and how do you fix it?
details:
  realistic_solution: 'The root cause is a severe hardware-compiler-algorithm mismatch. TPU uses a 128x128 Systolic Array (MXU). The XLA compiler maps matrix multiplications to this hardware by padding dimensions to be multiples of 128 (or 8/128 depending on the specific axis and tiling). A batch size of 150 is padded to 256. An input dimension of 1000 is padded to 1024. A hidden dimension of 500 is padded to 512. The hardware is executing a 256x1024x512 matrix multiplication, loading padded zeros from High Bandwidth Memory (HBM). This destroys arithmetic intensity and wastes MXU cycles. The co-design fix involves three steps: 1) Algorithm: Change the model dimensions to 1024 and 512. 2) Serving: Force the batch size to exactly 256. 3) Compiler: Ensure XLA avoids dynamic shape recompilations. This perfectly aligns with the MXU tiles, eliminating padding overhead and restoring compute-bound performance.'
  common_mistake: |
    **The Pitfall:** Assuming the model is naturally memory-bandwidth bound and attempting operator fusion.
    **The Rationale:** Trusting the theoretical arithmetic intensity without understanding how the compiler pads dimensions for systolic arrays.
    **The Consequence:** Wasted effort on quantization while the hardware continues to process and move massive amounts of zero-padded data.
  napkin_math: |
    - Actual compute needed: 150 × 1000 × 500 = 75M MACs.
    - Padded compute executed: 256 × 1024 × 512 = 134,217,728 MACs (~134M MACs).
    - Wasted compute = (134.2M - 75M) / 134.2M = 44.1%.
    - **By aligning dimensions (batch 256, dims 1024/512), MXU utilization jumps from 14% to >60%, and throughput increases from 12k QPS to >35k QPS.**
