schema_version: 1
id: cloud-cell-10102
title: Analyze inverted residual bottleneck memory access patterns on A100
topic: cnn-efficient-design
status: published
provenance: human
scenario: You are analyzing MobileNetV2's inverted residual block (expand→depthwise→project, expansion ratio t=6) running on A100. The block takes 112×112×32 feature maps. A performance engineer claims the expand layer is the bottleneck.
question: Analyze the memory traffic and compute intensity for each sub-layer to validate or refute this claim.
details:
  realistic_solution: 'Expand (1×1): input 32ch → 192ch at 112×112. FLOPs = 2·32·192·112² = 154M. Output tensor = 192·112·112·2B = 4.8MB. Depthwise (3×3): 192ch, 112×112. FLOPs = 2·192·9·112² = 43M (memory-bound). Project (1×1): 192→32. FLOPs = 2·192·32·112² = 154M. The expand layer produces the largest intermediate activation; at t=6 the expand ratio balloons memory, not compute. Depthwise is most bandwidth-bound. Expand is compute-dominant but its large output strains L2.'
  common_mistake: |
    **The Pitfall:** Assuming the depthwise conv is always the bottleneck because it has the most spatial work.
    **The Rationale:** Ignoring that the 1×1 expand conv generates large intermediate tensors that stress L2/HBM bandwidth.
    **The Consequence:** Misdiagnosing the bottleneck and applying the wrong optimization strategy.
  napkin_math: |
    - A100 arithmetic intensity roofline: peak 312 TFLOPS / 2 TB/s = 156 FLOP/byte.
    - Depthwise: 43M FLOPs, reads ~4.8MB → 8.9 FLOP/byte — severely memory-bound.
    - Expand: 154M FLOPs, reads 32×112×112×2B = 0.8MB → 192.5 FLOP/byte — compute-bound.
    - Project: 154M FLOPs, reads 4.8MB → 32.1 FLOP/byte — memory-bound.
    - **The performance engineer is partially wrong: depthwise and project are bandwidth-limited, while expand is compute-bound.**
