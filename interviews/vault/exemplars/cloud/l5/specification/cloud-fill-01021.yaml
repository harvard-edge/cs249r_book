schema_version: 1
id: cloud-fill-01021
title: Designing Efficient Tensor Parallelism for Large Language Models on Google TPU v5e
topic: model-tensor-parallelism
status: published
provenance: human
scenario: You are tasked with deploying a 100-billion parameter Large Language Model (LLM) for inference on Google Cloud, specifically utilizing a cluster of Google TPU v5e devices. The model's weights alone consume significantly more memory than a single TPU's HBM.
question: How would you partition the model's layers across devices and overlap communication with computation to minimize inference latency and maximize throughput?
details:
  realistic_solution: 'A realistic solution would involve a combination of tensor and possibly pipeline parallelism, carefully orchestrated to exploit the TPU v5e architecture:

    1.  **Tensor Partitioning (Intra-layer)**: For large linear layers, apply column parallelism for the first linear layer in a block and row parallelism for the subsequent linear layer. This ensures that the output of the first partitioned layer can be immediately used by the second partitioned layer on the same device without an `all-gather` operation between the two linear layers within a block.

    2.  **Layer Partitioning (Inter-layer)**: If pure tensor parallelism isn''t sufficient for the model weights, partition entire transformer blocks or groups of layers across TPUs.

    3.  **Communication-Computation Overlap**: Utilize non-blocking collective operations (e.g., `jax.lax.all_reduce_p`, `all_gather`). Communication for the next layer''s inputs should be initiated while the current layer is performing its computation.

    4.  **TPU-Specific Optimizations**: Leverage the high-bandwidth inter-chip interconnect (ICI) on TPUs for efficient collective operations.'
  common_mistake: |
    **The Pitfall:** Proposing naive partitioning without considering the actual data movement costs between TPU cores.
    **The Rationale:** Overlooking the significant impact of inter-device communication latency and bandwidth, especially for small batch sizes typical in inference.
    **The Consequence:** Asymmetric communication patterns, severe communication bubbles, and severely underutilized TPUs.
  napkin_math: |
    - Model Weight Memory: A 100-billion parameter model (BF16) requires $100 \times 10^9 \times 2 \text{ bytes} = 200 \text{ GB}$.
    - Minimum TPUs for Weights: With 16 GB HBM per TPU, $\text{ceil}(200 \text{ GB} / 16 \text{ GB}) = 13 \text{ TPUs}$.
    - Activation tensor size: batch=1, seq=2048, hidden=8192 (BF16) = $1 \times 2048 \times 8192 \times 2 \text{ bytes} \approx 33.5 \text{ MB}$.
    - If ICI bandwidth is ~200 GB/s, transfer latency per step is $33.5 \text{ MB} / 200 \text{ GB/s} = 0.16 \text{ ms}$.
    - **Accumulating these 0.16 ms transfers across many layers necessitates strict communication-computation overlap.**
