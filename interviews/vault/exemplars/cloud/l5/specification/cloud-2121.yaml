schema_version: 1
id: cloud-2121
title: Designing Mixed-Precision Backpropagation
topic: compute-cost-estimation
status: published
provenance: human
scenario: You are designing a mixed-precision training pipeline for a 70B LLM. The forward pass runs in
  FP16 on Tensor Cores. Explain why the loss must be computed in FP32, why a loss scaler is needed, and
  what happens to the master weights during the optimizer step. Trace the precision of each tensor through
  the complete forward-backward-update cycle.
details:
  realistic_solution: 'Precision trace: (1) Forward: inputs and weights cast to FP16. Matrix multiplies
    execute on Tensor Cores at 2x throughput. Activations saved in FP16. (2) Loss computation: output
    cast to FP32. Loss computed in FP32 to avoid overflow (softmax cross-entropy can produce values >65,504,
    FP16 max). (3) Loss scaling: loss multiplied by scale factor (e.g., 2^16 = 65536) in FP32 before backward.
    This shifts small gradients above FP16''s minimum representable value (~6e-8). (4) Backward: gradients
    computed in FP16 (2x throughput). The scale factor ensures gradients that would be 1e-10 (below FP16
    min) become 1e-10 * 65536 = 6.5e-6 (representable in FP16). (5) Optimizer step: gradients unscaled
    (divided by 65536) and cast to FP32. Adam updates master weights in FP32 (critical: weight updates
    are often 1e-7 scale, which rounds to zero in FP16). (6) Master FP32 weights cast back to FP16 for
    next forward pass. Memory: FP16 weights (140 GB) + FP32 master (280 GB) + FP32 optimizer states (560
    GB) = 980 GB.'
  common_mistake: Thinking mixed precision just means 'use FP16 everywhere.' The critical insight is that
    different stages require different precisions, and the loss scaler prevents gradient underflow in
    the backward pass.
  napkin_math: 'FP16 max: 65,504. FP16 min subnormal: 5.96e-8. Without loss scaling, any gradient <5.96e-8
    rounds to zero. With scale=65536: minimum representable gradient becomes 5.96e-8 / 65536 = 9.1e-13.
    Master weights in FP32 needed because weight update ~lr*grad ~1e-4 * 1e-3 = 1e-7, which is below FP16
    precision for weights ~1.0.'
