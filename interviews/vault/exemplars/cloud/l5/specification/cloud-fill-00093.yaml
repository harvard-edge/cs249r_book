id: cloud-fill-00093
title: Optimizing Large Language Model Inference on Google TPU v5e with Systolic Arrays
topic: systolic-dataflow
status: published
provenance: human
scenario: Your team is tasked with deploying a large Transformer-based language model (e.g., 20 billion parameters, BF16 precision for weights and activations) for real-time inference on a Google TPU v5e. The model's primary bottleneck is the matrix multiplication operations in the self-attention and feed-forward layers.
question: How would you design the dataflow and tiling strategy to maximize throughput while minimizing HBM access?
details:
  realistic_solution: 'A realistic solution would involve analyzing the dimensions of the matrix multiplications, the model''s memory footprint, and the TPU''s HBM capacity. For a large language model, weight-stationary dataflow is often preferred due to the reusability of weights across multiple activations, especially for batch inference or sequence processing where the same weights are applied to different input elements. The solution should detail a tiling strategy:

    1.  **Spatial Tiling:** Partitioning the large matrices into smaller blocks that fit within the systolic array''s dimensions and on-chip memory.

    2.  **Temporal Tiling:** Iteratively processing these blocks, ensuring data (activations, partial sums) are reused in on-chip buffers as much as possible before going back to HBM.

    3.  **Data Placement:** Strategically placing weights and activations in HBM and on-chip caches to minimize external memory transfers.'
  common_mistake: |
    **The Pitfall:** Designing a naive partitioning scheme that doesn't respect the data reuse patterns required by systolic arrays.
    **The Rationale:** Failing to understand the difference between weight-stationary and output-stationary dataflows.
    **The Consequence:** Excessive data thrashing between on-chip caches and HBM, choking the bandwidth and leaving the systolic arrays idle.
  napkin_math: |
    - 20B parameters (BF16 = 2 bytes/param) = 40 GB.
    - This exceeds the 16 GB HBM of a single TPU v5e, requiring distributed inference.
    - Operational Intensity check: 197 TFLOPS BF16 ≈ 98.5 trillion MACs/s.
    - If each MAC requires fetching 4 bytes from HBM: $(197 \times 10^{12} / 2) \times 4 \text{ bytes} \approx 394 \text{ TB/s}$.
    - **This 394 TB/s requirement vastly exceeds the 1.6 TB/s HBM bandwidth, strictly necessitating stationary dataflows to reuse data on-chip.**
