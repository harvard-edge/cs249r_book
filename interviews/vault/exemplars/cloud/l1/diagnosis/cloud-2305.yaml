id: cloud-2305
title: The Automated Fraud Label Loop
topic: data-quality-validation
status: published
provenance: human
scenario: Your fraud detection API processes 50,000 QPS. Over the last 3 weeks, precision has degraded
  from 95% to 70%. Your automated drift detection dashboards, which run KS tests on all 200 input features,
  are completely green. You trigger a full pipeline retrain on the most recent 3 weeks of data, but the
  newly deployed model performs even worse (65% precision).
details:
  realistic_solution: The root cause is upstream label pollution creating a negative feedback loop. Because
    the feature distributions (X) haven't shifted, the drift must be in the target variable (Y) or the
    P(Y|X) relationship caused by corrupted ground truth. Three weeks ago, an upstream operations team
    implemented an automated, rule-based chargeback system that automatically tags certain transactions
    as 'fraud' based on a static heuristic to save human reviewer time. These heuristic labels are now
    flowing directly into your training data pipeline as ground truth. The ML model is no longer learning
    actual fraud; it is learning to perfectly mimic the simplistic, lower-precision rule-based system.
    To resolve this, you must audit the data lineage of the labels, separate human-reviewed labels from
    auto-labels, and either filter out the auto-labels during training or use sample weighting to heavily
    penalize them.
  common_mistake: Assuming concept drift has occurred in a non-linear way that KS tests missed, and attempting
    to fix it by moving to a more complex model architecture.
  napkin_math: At 50,000 QPS, with a 1% true fraud rate, there are 500 fraud cases/sec. If the new rule-based
    system auto-labels 300 of these cases per second (and introduces 150 false positives), 60% of your
    positive training labels are now heuristic-based. The model's upper bound precision will aggressively
    regress toward the heuristic's precision (300/450 = 66.6%), matching the observed drop to 65-70%.
