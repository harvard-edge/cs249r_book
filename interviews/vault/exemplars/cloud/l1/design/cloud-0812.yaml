id: cloud-0812
title: The Carbon-Aware Scheduler
topic: sustainability-carbon-accounting
status: published
provenance: human
scenario: Your company pledges net-zero AI training by 2027. You operate GPU clusters in three regions: Virginia (avg 380 gCO₂/kWh, coal-heavy grid), Oregon (avg 80 gCO₂/kWh, hydro-heavy), and Iceland (avg 28 gCO₂/kWh, geothermal). A 70B model training run requires 1,000 A100-hours regardless of location. Your CFO says 'just buy carbon offsets — it's cheaper than moving workloads.'
question: How would you design a carbon-aware training scheduler, and how do the numbers prove the CFO right or wrong?
details:
  realistic_solution: 'A carbon-aware scheduler must optimize across three dimensions: (1) **spatial shifting** — route jobs to the lowest-carbon region with available capacity, (2) **temporal shifting** — delay non-urgent jobs to times when the grid is cleanest (midday solar peaks, windy nights), (3) **workload shaping** — run compute-intensive phases (forward/backward pass) during clean periods and I/O-intensive phases (checkpointing, data loading) during dirty periods. The scheduler ingests real-time grid carbon intensity from APIs (WattTime, ElectricityMaps), maintains a job priority queue, and makes placement decisions every 15 minutes. For the 70B training run: use Oregon as primary (80 gCO₂/kWh), with temporal shifting to avoid the 6-9 PM peak (when gas peakers fire up, pushing intensity to 200 gCO₂/kWh). Cross-region data transfer for training is expensive (100TB dataset over 10 Gbps = 22 hours), so the scheduler must factor in the carbon cost of data movement.'
  common_mistake: |
    **The Pitfall:** Proposing to run everything in Iceland simply because it has the lowest average carbon intensity.
    **The Rationale:** Ignoring the reality that carbon intensity varies by time of day, that data gravity makes cross-region training expensive, and that Iceland has limited GPU capacity.
    **The Consequence:** Unrealistic architectures that fail to account for data transfer costs and dynamic grid conditions.
  napkin_math: |
    - 1,000 A100-hours × 400W (A100 SXM4 TDP) = 400 kWh.
    - Virginia emissions: 400 × 380 gCO₂ = 152 kgCO₂.
    - Oregon emissions: 400 × 80 gCO₂ = 32 kgCO₂.
    - Iceland emissions: 400 × 28 gCO₂ = 11.2 kgCO₂.
    - Carbon offset cost: ~$75/tonne → Virginia offset = 0.152t × $75 = $11.40.
    - Compute premium in Oregon over Virginia: ~$0.30/GPU-hr × 1,000 = $300.
    - **The CFO is right that offsets ($11.40) are cheaper than relocation ($300), but regulatory trends toward Scope 2 market-based accounting will invalidate offsets, making spatial/temporal shifting mandatory.**
