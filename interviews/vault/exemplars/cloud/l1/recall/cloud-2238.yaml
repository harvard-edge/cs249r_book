id: cloud-2238
title: The Storage Disaggregation Dilemma
topic: vram-budgeting
status: published
provenance: human
scenario: You are advising a hyperscaler on their next-generation AI training cluster architecture. The current design uses 'converged' nodes where each GPU server has local NVMe SSDs for data caching and checkpoint staging. The infrastructure team proposes 'disaggregated storage': removing local SSDs entirely and replacing them with a high-bandwidth network-attached NVMe-oF (NVMe over Fabric) storage pool. The training platform team pushes back, arguing this will destroy checkpoint performance and introduce a new single point of failure.
question: Under what conditions is disaggregated storage the right choice, and when does converged storage win?
details:
  realistic_solution: 'The tradeoff hinges on two ratios: (1) the network bandwidth per node relative to local NVMe bandwidth, and (2) the I/O latency sensitivity of the workload. Converged wins when: (a) Checkpoint writes are in the critical path. Local NVMe is 10-60× faster than NVMe-oF. (b) The training data pipeline requires low-jitter random reads. (c) The cluster runs a single large training job — storage is not stranded. Disaggregated wins when: (a) The cluster is multi-tenant with heterogeneous workloads. (b) Drive replacement and capacity scaling are operationally expensive. (c) The network fabric is overprovisioned (400-800 Gbps per node with RDMA). The hybrid approach most hyperscalers adopt: small local NVMe for checkpoint staging, plus a disaggregated pool for capacity-tier storage.'
  common_mistake: |
    **The Pitfall:** Taking an absolute position—either "disaggregation is always better" or "local is always faster."
    **The Rationale:** Ignoring that the optimal choice depends strictly on the workload's sensitivity to I/O latency and the network fabric's capability.
    **The Consequence:** Millions of dollars wasted on stranded local SSDs, or catastrophic training slowdowns due to network I/O bottlenecks.
  napkin_math: |
    - Converged: 4× 3.84 TB NVMe per node = 15.36 TB, 25 GB/s read, ~50us latency.
    - Per-node checkpoint write: 1.6 GB at 6 GB/s = 266.6 ms.
    - Disaggregated: NVMe-oF over 200 Gbps RDMA gives effective 2.5 GB/s per GPU equivalent, ~300us latency.
    - Per-node checkpoint write: 1.6 GB at 2.5 GB/s = 640 ms (2.4× slower).
    - At scale (12,500 nodes), converged capacity = 192 PB. Average utilization = 15% (28.8 PB used).
    - **Wasted capacity: 163.2 PB × $50/TB ≈ $8.16M stranded, justifying a $2.4M disaggregated pool IF the 2.4× latency hit is acceptable.**
