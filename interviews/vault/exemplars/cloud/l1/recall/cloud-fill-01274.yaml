id: cloud-fill-01274
title: Real-time Recommendation System Drift on AMD MI300X
topic: distribution-drift-detection
status: published
provenance: human
scenario: Your team operates a high-throughput, real-time recommendation engine on an accelerator cluster, serving millions of inference requests per second and processing petabytes of user interaction data daily. Recently, system-level metrics (e.g., click-through rates, conversion rates) have shown a significant decline, accompanied by an increase in prediction variance and latency, despite no deployment changes.
question: How would you diagnose and mitigate potential data drift, concept drift, and training-serving skew issues affecting the model's reliability at this massive scale?
details:
  realistic_solution: 'A comprehensive solution involves several steps:

    1.  **Granular Monitoring Pipeline**: Implement a robust monitoring pipeline that continuously captures and stores samples of input features, model predictions, and true labels.

    2.  **Statistical Drift Detection**: Apply statistical tests like Population Stability Index (PSI) or Kullback-Leibler (KL) divergence on feature distributions.

    3.  **Concept Drift Detection**: Monitor the relationship between predictions and actual outcomes over time. Techniques like Page-Hinkley test or ADWIN can be applied.

    4.  **Training-Serving Skew Detection**: Regularly compare the distribution of input features used during training against those observed during serving.

    5.  **Automated Alerting & Rollback**: Set up alerts for significant drift detection and implement automated rollbacks or champion-challenger triggering.

    6.  **Hardware-aware Optimization**: Ensure that monitoring data collection doesn''t saturate memory bandwidth or significantly impact compute. Leverage the large HBM to store historical feature distributions for real-time comparisons.'
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate business metrics (like average click-through rate) instead of granular feature monitoring.
    **The Rationale:** Assuming that if business metrics look okay, the underlying data distributions are stable.
    **The Consequence:** Failing to distinguish between data drift and concept drift, leading to inappropriate mitigation strategies and prolonged degradation.
  napkin_math: |
    - Sampling 1% of inference requests at 100K samples/sec.
    - Features + prediction + label = 1 KB per sample.
    - Data rate: 100K × 1 KB = 100 MB/s.
    - Daily storage: 100 MB/s × 3600 s/hr × 24 hr/day = 8.64 TB/day.
    - **Storing this for a week requires ~60.5 TB, necessitating efficient off-accelerator stream processing to avoid memory bandwidth saturation.**
