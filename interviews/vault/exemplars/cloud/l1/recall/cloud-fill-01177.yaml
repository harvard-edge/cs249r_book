schema_version: 1
id: cloud-fill-01177
title: Optimizing MoE Training on Kubernetes with Google TPU v5e
topic: container-orchestration
status: published
provenance: human
scenario: 'Your team is deploying a large-scale, memory-intensive Mixture-of-Experts (MoE) model for natural
  language processing on a Kubernetes cluster. This cluster is equipped with Google TPU v5e devices, each
  featuring 16 GB High Bandwidth Memory (HBM), 197 TFLOPS BF16 computational power, and 1.6 TB/s memory
  bandwidth. The training job is configured to distribute the model across multiple TPU hosts, but you''re
  encountering significant challenges: intermittent TPU underutilization and sporadic HBM capacity issues
  on individual v5e devices, even when total cluster memory seems sufficient. Outline your strategy to
  diagnose these performance bottlenecks and optimize the Kubernetes deployment. Your solution should
  leverage Kubernetes features such as node affinity, appropriate device plugin configurations (or their
  TPU equivalents), and advanced job scheduling policies to ensure high TPU utilization and efficient
  memory management for this demanding, distributed ML workload.'
details:
  realistic_solution: '1.  **Verify TPU Device Plugin**: Ensure the Google Cloud TPU device plugin for
    Kubernetes is correctly installed and exposes TPU resources (e.g., `google.com/tpu`) as schedulable
    units. This enables Kubernetes to understand TPU topology and capabilities. 2.  **Resource Allocation**:
    Precisely define `resource.limits` for TPU v5e devices in pod specifications. Monitor host CPU/RAM
    as TPU pods can also be bottlenecked by insufficient host resources for data preprocessing. 3.  **Node
    Affinity & Topology**: Utilize `nodeSelector` or `nodeAffinity` to target pods to nodes with TPU v5e
    devices. For distributed jobs, employ `podAntiAffinity` to spread out TPU pods across different physical
    hosts if they share host CPU/memory resources, or `podAffinity` to co-locate interdependent pods to
    minimize network latency for inter-TPU communication. For larger slices, consider topology-aware scheduling
    to place TPU hosts in the same network quadrant. 4.  **Memory Optimization (HBM)**: Profile the MoE
    model''s memory footprint on a single TPU v5e using tools like `tf.profiler` or JAX/PyTorch equivalents
    to understand parameter, activation, and optimizer state HBM usage. Adjust batch sizes, consider techniques
    like gradient checkpointing or recomputation to trade compute for memory, and ensure efficient data
    loading that streams directly to HBM without intermediate host memory copies where possible. Use BF16
    effectively. 5.  **Distributed Strategy**: For MoE, ensure the chosen distributed training framework
    (e.g., JAX/Flax, PyTorch/XLA) correctly leverages TPU-specific communication primitives (e.g., `all_reduce`,
    `all_gather`) and handles expert sharding efficiently. 6.  **Job Scheduling for ML**: If standard
    Kubernetes scheduling is insufficient for multi-pod distributed training (e.g., requiring gang scheduling),
    explore custom schedulers or open-source solutions like Volcano that provide advanced features for
    batch workloads, ensuring all required TPU workers start simultaneously.'
  common_mistake: Candidates often overlook the specific memory hierarchy of TPUs (host vs. accelerator
    HBM) and assume a flat memory model. Common pitfalls include incorrect resource requests/limits in
    Kubernetes, neglecting proper TPU device plugin installation and configuration, failing to consider
    data locality for distributed training, and not utilizing node affinity/anti-affinity for optimal
    pod placement on TPU-equipped nodes. Treating TPUs identically to GPUs without accounting for their
    synchronous execution model or specific communication patterns (e.g., via PJRT) can also lead to misdiagnosis.
  napkin_math: '1.  **HBM Capacity Check**: A single TPU v5e has 16 GB HBM. A typical large MoE model
    might have billions of parameters. If a 100B parameter model uses BF16, it''s ~200 GB. This immediately
    implies significant sharding or offloading is necessary. If only 16GB is available, how many parameters
    can be held? 16 * 1024^3 bytes / 2 bytes/param ≈ 8.5 billion parameters. Activations often take more
    memory than parameters. 2.  **Memory Bandwidth**: 1.6 TB/s (or ~1600 GB/s) memory bandwidth. If an
    optimizer needs to frequently update large states, this bandwidth is crucial. If a forward/backward
    pass involves 100GB of activation data movement, it would theoretically take 100/1600 = 0.0625 seconds,
    which is extremely fast. If data loading is a bottleneck, the issue is likely upstream (e.g., network,
    host I/O, CPU pre-processing) rather than HBM transfer speed itself. 3.  **TPU Utilization**: With
    197 TFLOPS BF16, even small stalls (e.g., due to data starvation or inter-device communication latency)
    can lead to significant underutilization. If a typical training step takes 1 second, and data loading
    takes 0.5 seconds, then utilization is effectively 50% for that step. The challenge is balancing compute
    with I/O and communication efficiency.'
