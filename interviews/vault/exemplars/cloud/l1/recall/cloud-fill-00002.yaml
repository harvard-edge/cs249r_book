id: cloud-fill-00002
title: Optimizing Large Language Model Inference on AMD MI300X with Roofline Analysis
topic: roofline-analysis
status: published
provenance: human
scenario: Your team is deploying a large language model (LLM) for real-time inference on an accelerator. The model has 70 billion parameters, uses FP16 precision, and requires approximately 140 GB of model weights. During initial profiling, you observe that the compute units are frequently underutilized, despite a theoretical 1,307 TFLOPS FP16 capability. The memory bandwidth is 5.3 TB/s.
question: Using the roofline model, how would you diagnose the bottleneck and propose strategies to improve utilization?
details:
  realistic_solution: "1.  **Operational Intensity (OI) Estimation**: For LLM inference, the OI (FLOPs/byte) is often lower than anticipated due to the large working set of weights and activations relative to the operations performed. \n2.  **Diagnosis with Roofline**: Given the large model size fitting entirely within HBM, the underutilized compute units strongly suggest the workload is *memory-bound*. The observed performance is likely constrained by the 5.3 TB/s memory bandwidth rather than the compute capacity. \n3.  **Strategies for Improvement**: Migrate to INT8 or INT4 inference (if accuracy permits) to drastically reduce memory traffic; leverage sparse compute if applicable; ensure critical kernels are highly optimized with kernel fusion; and increase inference batch size to amortize memory access overhead."
  common_mistake: |
    **The Pitfall:** Overlooking the actual operational intensity of LLM workloads and focusing solely on theoretical TFLOPS.
    **The Rationale:** Developers often assume high theoretical compute capabilities translate directly to high throughput without considering memory access patterns and data movement bottlenecks.
    **The Consequence:** Wasted optimization efforts on compute tuning when the model is fundamentally starved for data from memory.
  napkin_math: |
    - FP16 Model Size: 70B parameters × 2 bytes = 140 GB.
    - Peak Bandwidth: 5.3 TB/s (5300 GB/s).
    - Peak Compute: 1,307 TFLOPS.
    - If OI is 1 FLOP/byte (typical for memory-bound LLM ops): Max Perf = 1 FLOP/byte × 5300 GB/s = 5.3 TFLOPS.
    - Required OI to be compute bound: 1307 TFLOPS / 5.3 TB/s ≈ 246.6 FLOPs/byte.
    - **Achieving ~247 FLOPs/byte is practically impossible for standard LLM inference, directly explaining why the hardware operates in the memory-bound region of the roofline.**
