id: cloud-fill-00367
title: Optimizing Real-time LLM Inference Latency and Throughput on NVIDIA A100 with Adaptive Batching
topic: batching-strategies
status: published
provenance: human
scenario: Your team is deploying a critical large language model (LLM) for real-time conversational AI. The primary goal is to achieve sub-50ms p99 latency for single-turn responses while maximizing overall system throughput. You've observed that simple static batching leads to suboptimal GPU utilization for sparse request patterns and increased tail latencies during peak load.
question: How would you design an inference serving system that dynamically adapts its batching strategy to meet these stringent latency and throughput requirements?
details:
  realistic_solution: 'A robust solution would involve implementing an adaptive or continuous batching strategy tailored for the accelerator. This could include:

    1.  **Dynamic Batching with Time-Based Scheduling:** Employ a request queue with a maximum waiting time (e.g., `max_wait_ms`). Requests are processed either when the batch size reaches a maximum (`max_batch_size`) or when `max_wait_ms` expires, whichever occurs first.

    2.  **Continuous Batching for LLMs:** This allows concurrent execution of multiple, partially completed requests on the GPU by efficiently managing attention key-value caches and only swapping in new tokens for requests that are ready for the next inference step.

    3.  **Load-Adaptive Control:** Implement a feedback loop that monitors real-time metrics such as GPU utilization, queue lengths, and actual p99 latencies. Dynamically adjust parameters like `max_wait_ms` and `max_batch_size` based on these observations.

    4.  **Hardware-Aware Optimizations:** Leverage Tensor Cores and high memory bandwidth by ensuring data movement is minimized and computations are effectively mapped to the architecture.'
  common_mistake: |
    **The Pitfall:** Applying a fixed, large static batch size under the assumption it will always maximize throughput.
    **The Rationale:** Focusing solely on peak GPU utilization without considering the queueing delay imposed on individual requests.
    **The Consequence:** Severe tail latency issues (missing the 50ms SLA) when the request arrival rate is highly variable.
  napkin_math: |
    - Let LLM inference take T_token = 50μs per token per batch item, with an overhead T_overhead = 5ms.
    - For static batch B=32, latency = 32 × 0.05ms + 5ms = 6.6ms (excluding queueing).
    - If requests arrive one-by-one, they accumulate until B is full, adding massive queueing delay.
    - To maintain a p99 latency target L_target (e.g., 50ms), strategy must ensure: max_wait_ms + (B_avg × T_token) + T_overhead <= L_target.
    - **If max_wait_ms is 20ms, then (B_avg × 0.05ms) + 5ms <= 30ms, meaning B_avg must be <= 500 to meet the SLA.**
