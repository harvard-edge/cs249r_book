title: Optimizing LLM Deployment via Knowledge Distillation on AMD MI300X
topic: knowledge-distillation
status: published
provenance: human
scenario: Your team is deploying a distilled large language model on an AMD MI300X accelerator. The goal is to distill a 70B parameter teacher LLM into a 7B parameter student model, aiming for low inference latency and high throughput while preserving accuracy.
question: How can different knowledge distillation techniques leverage the MI300X hardware to optimize performance?
details:
  realistic_solution: 'Implement a mixed-precision feature distillation pipeline, utilizing FP16 sparse operations for both the teacher and student forward passes where applicable, directly leveraging the MI300X''s compute capabilities. For feature transfer, optimize the data path to maximize HBM3 bandwidth, potentially using asynchronous transfers and compression techniques for intermediate activations. Strategically choose feature layers that provide high knowledge transfer efficiency without prohibitive memory access patterns. Consider attention-based distillation, ensuring the attention matrices can benefit from sparse computations.'
  common_mistake: |
    **The Pitfall:** Defaulting to dense FP32 operations and transferring intermediate activations through host memory.
    **The Rationale:** Treating knowledge distillation as a generic training loop without exploiting the massive 192GB HBM3 or sparse compute capabilities.
    **The Consequence:** Suboptimal throughput and severe I/O bottlenecking, squandering the performance potential of the target accelerator.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B teacher (FP16) = ~140 GB. 7B student (FP16) = ~14 GB.
       - AMD MI300X HBM3: 192 GB capacity, 5.3 TB/s bandwidth.
    2. **Calculations:**
       - Total model memory = 154 GB (fits entirely in HBM3, avoiding PCIe transfers).
       - 100 GB of intermediate activations moved internally: 100 GB / 5300 GB/s ≈ 18.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Models fit natively in HBM3. Leveraging hardware-level sparse FP16 operations yields a ~2x raw computational speedup for distillation.
