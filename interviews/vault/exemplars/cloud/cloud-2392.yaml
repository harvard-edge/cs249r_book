schema_version: 1
id: cloud-2392
title: Decoupling Storage in High-Frequency Deployments
topic: model-size-estimation
status: published
provenance: human
scenario: Your MLOps team supports 100 data scientists deploying 40 model updates daily. Currently, every deployment bakes the PyTorch runtime, CUDA libraries, and the 5GB model weights into a monolithic 15GB Docker image. CI/CD pipelines take 60 minutes to push to the registry, and Kubernetes cluster scale-outs take 15 minutes to pull the image.
question: How can you re-architect the deployment pipeline to eliminate this severe network and storage bottleneck?
details:
  realistic_solution: 'Decouple the infrastructure environment from the model artifacts. Architecture: 1) Create standard base images (e.g., `pytorch-inference:v2`) containing CUDA and dependencies (10GB). Pre-pull (DaemonSet) or cache these base images on all K8s GPU nodes. 2) Store model weights (5GB) directly in a Model Registry backed by object storage (S3/GCS). 3) Modify the deployment pipeline to only update a lightweight YAML manifest pointing to the new S3 URI. 4) Use an init-container in the pod to download the weights from S3 at pod startup, or stream them via a CSI driver.'
  common_mistake: |
    **The Pitfall:** Relying solely on Docker layer caching in the CI/CD pipeline.
    **The Rationale:** Misunderstanding where the actual bottleneck lies—caching speeds up the build step but does nothing for the massive network transfer to K8s nodes.
    **The Consequence:** CI/CD builds faster, but K8s deployments and auto-scaling events remain painfully slow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40 deployments × 15 GB = 600 GB transferred daily.
       - Node network speed: 1 Gbps (0.125 GB/s).
       - Object storage (S3) speed to node: 5 Gbps (0.625 GB/s).
    2. **Calculations:**
       - Monolithic pull time: 15 GB / 0.125 GB/s = 120 seconds per node.
       - Decoupled state: Base image (10GB) is pre-cached (0s).
       - Weights downloaded from S3: 5 GB / 0.625 GB/s = 8 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-I/O-Bound.** Decoupling the weights cuts the scale-out deployment time from 15 minutes to under 10 seconds.
