id: cloud-2399
title: Datacenter Liquid Cooling TCO
topic: thermal-management
status: published
provenance: human
scenario: You are building a new 20MW AI datacenter. Standard air cooling achieves a PUE of 1.35 and costs $10M in cooling infrastructure CapEx. Direct-to-Chip (D2C) liquid cooling achieves a PUE of 1.10 but costs $30M in cooling CapEx. Power costs $0.12/kWh. The facility has a hard 20MW total power feed from the utility. An HGX node draws 10kW.
question: How does the choice between air and liquid cooling affect Total Cost of Ownership and compute capacity over a 3-year lifespan?
details:
  realistic_solution: In a power-constrained datacenter, PUE is not just an efficiency metric; it dictates your compute ceiling. The total facility power is fixed at 20MW. With air cooling (PUE 1.35), only ~14.8MW is available for IT compute. With liquid cooling (PUE 1.10), ~18.1MW is available. This unlocks 3.3MW of additional compute power, allowing you to deploy 330 more HGX nodes. While the liquid cooling CapEx is $20M higher, the energy cost to the facility is identical (you are drawing the full 20MW in both cases). The true tradeoff is whether the revenue generated by 330 additional HGX nodes over 3 years justifies the extra $20M upfront CapEx. Given typical LLM revenue, 330 nodes will pay off the $20M difference rapidly, making liquid cooling superior.
  common_mistake: |
    **The Pitfall:** Calculating ROI solely based on the energy cost savings from a lower PUE.
    **The Rationale:** Treating cooling as a pure operational expense instead of a gating factor on physical datacenter capacity.
    **The Consequence:** Selecting air cooling to save $20M CapEx, completely missing out on the massive revenue potential of the locked 3.3MW compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Power = IT Power * PUE.
    - HGX node draw: 10kW.

    **Calculations:**
    - Air IT Power = 20MW / 1.35 = 14.814 MW. Nodes = 14,814 kW / 10 kW = 1,481 nodes.
    - Liquid IT Power = 20MW / 1.10 = 18.181 MW. Nodes = 18,181 kW / 10 kW = 1,818 nodes.
    - Capacity Difference = 1818 - 1481 = 337 additional nodes.
    - Energy cost is fixed: 20,000 kW * 8760 hrs * $0.12 = $21.02M/year for both.

    **Conclusion & Interpretation:**
    - **Result: 337 nodes (Power-Bound)**. The CapEx delta is $20M, but the value of 337 extra nodes far exceeds this cost.
