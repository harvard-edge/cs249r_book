title: Optimizing Large Transformer Inference on NVIDIA H100
topic: gpu-compute-architecture
status: published
provenance: human
scenario: You are tasked with optimizing the inference latency for a large transformer model on a single NVIDIA H100 GPU. The model predominantly uses FP16 precision for its matrix multiplications. Your objective is to achieve near-peak performance.
question: What is your strategy for structuring CUDA kernels to maximize GPU occupancy, ensure efficient memory coalescing, and utilize Tensor Cores effectively?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Tensor Core-Aware Kernel Design:** Implement custom CUDA kernels or utilize highly optimized libraries (e.g., cuBLAS, cuDNN, or `cuda::wgmma`) specifically designed to leverage Tensor Cores with FP16 precision. 2. **Optimal Data Layout and Tiling:** Pre-process or transform input tensors to ensure data is contiguous and aligned for coalesced global memory access within warps. Implement aggressive data tiling strategies using shared memory. 3. **Thread Block and Grid Configuration:** Carefully select thread block sizes (e.g., multiples of 32 for warp alignment) and grid dimensions to maximize GPU occupancy. 4. **Memory Coalescing and Caching:** Design memory access patterns within kernels to ensure threads in a warp access contiguous memory locations. 5. **Profiling and Iteration:** Systematically profile kernel performance using tools like NVIDIA Nsight Compute to refine implementations.'
  common_mistake: |
    **The Pitfall:** Ignoring specific Tensor Core alignment requirements and assuming generic CUDA configurations will hit peak TFLOPS.
    **The Rationale:** Believing the hardware automatically optimizes all FP16 math without explicit warp, thread block tuning, or data alignment.
    **The Consequence:** Uncoalesced memory accesses and low GPU occupancy yield memory-bound performance that vastly underperforms the hardware's theoretical limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVIDIA H100 FP16 Peak Compute: 989 TFLOPS.
       - HBM3 Bandwidth: 3.35 TB/s.
       - Matrix size: 4096×4096.
    2. **Calculations:**
       - Compute for 4096³ FMA: 2 × 4096³ ≈ 137 GigaFLOPs.
       - Compute time = 137e9 / 989e12 ≈ 0.138 ms.
       - Data transfer (3 matrices) = 3 × 4096² × 2 bytes ≈ 100 MB.
       - Transfer time = 100 MB / 3.35 TB/s ≈ 0.03 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Theoretically).** While math dominates (0.138 ms > 0.03 ms), poor shared-memory tiling will instantly flip the kernel to be memory-bound.
