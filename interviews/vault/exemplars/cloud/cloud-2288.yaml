title: The Fairness Monitoring Compute Budget
topic: fairness-evaluation
status: published
provenance: human
scenario: Your content recommendation system serves 100M daily active users. Compliance requires computing equalized odds metrics every hour by joining prediction logs with outcome labels.
question: Estimate the hourly data volume, the storage for a rolling 30-day audit window, and the compute cost of this fairness monitoring pipeline.
details:
  realistic_solution: "Provision a high-throughput streaming cluster (Apache Flink or Spark Structured Streaming) to natively absorb massive temporal window joins. Route and compress the resultant 30-day analytical states directly to Amazon S3 for durable cold storage."
  common_mistake: |
    **The Pitfall:** Deploying single-node python scripts or monolithic cron jobs for 100M DAU telemetry.
    **The Rationale:** Treating enterprise data-engineering tasks as simple ML visualization dashboards.
    **The Consequence:** Immediate OOM collapses and extreme metric delays rendering compliance reporting impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - DAU: 100M (2B total recs/day).
    - Log Payload: 200 bytes.
    - Audit Window: 30 days.

    **Calculations:**
    - Hourly Velocity = 2B / 24 = 83.3M ops/hr.
    - Data Ingest = 83.3M * 200 B = 16.6 GB/hr.
    - 30-Day Storage = 16.6 GB * 24 * 30 = 11,952 GB (~12 TB).

    **Conclusion & Interpretation:**
    - **Result: ~12 TB (Storage-Bound)**. Producing 16.6 GB hourly for window joins dictates deploying specialized scalable computing frames outside of generic application bounds.
