title: Analyzing Mixed-Precision Performance on Google TPU v5e
topic: mixed-precision-training
status: published
provenance: human
scenario: You are tasked with optimizing a large language model for both training and inference on a Google TPU v5e pod. The model is currently using full FP32 precision.
question: What are the potential benefits and challenges of migrating to a mixed-precision strategy using BF16, and how does it influence your design choices?
details:
  realistic_solution: 'A realistic solution involves a systematic approach: 1. **Profiling:** Profile the FP32 model on TPU v5e to identify memory and compute bottlenecks. 2. **BF16 Conversion:** Convert model weights and activations to BF16, while keeping critical operations (e.g., softmax, normalization layers) in FP32 or using specific BF16-compatible implementations. 3. **Loss Scaling:** Implement dynamic or static loss scaling to mitigate gradient underflow during training, especially for small gradients. 4. **Optimizer Choice:** Use optimizers designed for mixed precision (e.g., Adam with a mixed-precision-aware implementation) or adjust learning rates. 5. **Evaluation:** Continuously monitor training stability and periodically evaluate the model''s accuracy against the FP32 baseline. 6. **Inference Optimization:** For inference, ensure the BF16 model fits within the HBM, and leverage the high BF16 throughput.'
  common_mistake: |
    **The Pitfall:** Naively casting all tensors to BF16 without implementing loss scaling or mixed-precision optimizers.
    **The Rationale:** Assuming lower precision works "out of the box" and instantly doubles performance without affecting numerical stability.
    **The Consequence:** Gradient underflow during backward passes causes training divergence and catastrophic loss of model quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30 GB FP32 model.
       - TPU v5e HBM per chip: 16 GB.
    2. **Calculations:**
       - FP32: 30 GB (Exceeds single chip HBM, forcing tensor parallelism or host offload).
       - BF16: 15 GB (Fits entirely within a single chip's HBM).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound.** Migrating to BF16 halves the footprint, allowing single-chip execution and doubling raw FLOPs for compute-bound GEMMs.
