id: cloud-2372
title: PFC Deadlock Recovery Latency Tradeoff
topic: fault-tolerance-checkpointing
status: published
provenance: human
scenario: Your RoCEv2 network experiences cyclic buffer dependencies resulting in PFC deadlocks during intensive All-to-All communication. The switches support a deadlock recovery mechanism that drops packets after a timeout, allowing the network to unfreeze. You must configure the PFC deadlock timeout interval. The options are 100 microseconds or 50 milliseconds.
question: What are the tradeoffs of these two timeout configurations on workload performance and network stability?
details:
  realistic_solution: "Priority Flow Control (PFC) pauses traffic to prevent buffer overflow, but complex routing can create a cycle of paused switches. Deadlock recovery breaks the cycle by intentionally dropping packets. \n\nIf the timeout is set to 100 microseconds: The network recovers from true deadlocks almost instantly. However, during normal heavy microbursts, a port might legitimately be paused for 200us. A 100us timeout will falsely identify this as a deadlock and drop packets, forcing expensive timeout-and-retransmit cycles. \n\nIf the timeout is set to 50 milliseconds: False positives are completely eliminated. However, if a *true* deadlock occurs, the involved switches freeze for 50ms. In high-performance ML, a 50ms pause on 400 Gbps links wastes immense bandwidth and stalls the entire synchronized training step."
  common_mistake: |
    **The Pitfall:** Setting the timeout as low as possible (100us) to unfreeze the network quickly.
    **The Rationale:** Ignoring the fact that legitimate congestion can pause ports longer than the deadlock threshold.
    **The Consequence:** Premature packet drops during normal congestion, leading to a storm of retransmissions that destroys throughput.
  napkin_math: |
    - At 400 Gbps (50 GB/s), a 50ms freeze wastes 50 GB/s × 0.05s = 2.5 GB of transfer opportunity per link.
    - If a typical All-to-All step normally takes 10ms.
    - **A single 50ms deadlock timeout pause slows the current iteration down by 500%.**
