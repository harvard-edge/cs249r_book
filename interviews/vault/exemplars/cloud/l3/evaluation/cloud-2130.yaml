id: cloud-2130
title: The Batch vs Real-Time Feature Tradeoff
topic: feature-store-management
status: published
provenance: human
scenario: You are building a fraud detection system. The feature 'transaction_count_last_1_hour' is critical
  for catching velocity attacks. Your current architecture computes all features via a nightly batch pipeline
  that writes to a feature store. Why is this architecture fundamentally inadequate for this feature,
  and what is the minimum viable real-time path?
details:
  realistic_solution: 'A nightly batch pipeline produces features that are 0-24 hours stale. For a 1-hour
    window feature, the batch value is always wrong — it reflects yesterday''s transactions, not the last
    hour''s. The minimum viable real-time path: (1) Publish transaction events to a stream (Kafka/Kinesis),
    (2) A stream processor (Flink/Spark Streaming) maintains a sliding 1-hour window counter per user,
    (3) On each transaction, the processor updates the count and writes to a low-latency online store
    (Redis/DynamoDB), (4) At inference time, the model reads the up-to-date count. This changes feature
    freshness from hours to seconds.'
  common_mistake: Thinking you can just run the batch pipeline more frequently (e.g., every 5 minutes).
    Even 5-minute staleness means a fraudster can execute dozens of transactions before the feature updates.
  napkin_math: 'Batch staleness: 0-24h average = 12h stale. Stream processing latency: event → Kafka →
    Flink → Redis ≈ 200-500ms. For a fraudster doing 50 transactions in 10 minutes, the batch pipeline
    detects 0 of 50 (stale features); the streaming pipeline detects by transaction ~3 (sub-second updates).'
