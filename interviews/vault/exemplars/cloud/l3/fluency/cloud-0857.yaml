id: cloud-0857
title: Sizing RoCEv2 Buffers for Adaptive Routing
topic: load-balancing
status: published
provenance: human
scenario: You are optimizing an 800 Gbps RoCEv2 network fabric for a 4,096-GPU cluster. During heavy All-to-All
  MoE traffic, static 5-tuple ECMP routing causes hash collisions and microburst drops, degrading effective
  bisection bandwidth to 60%. You enable per-packet Adaptive Routing (AR) based on switch egress queue
  depths to perfectly load-balance the fabric. However, AR causes packets to take different paths, arriving
  out-of-order. The receiving ConnectX-7 NIC uses a dedicated 16MB buffer to reorder packets before delivering
  them to GPU memory. Calculate the maximum permissible latency difference (path skew) between the fastest
  and slowest network paths before this 16MB reassembly buffer overflows at peak line rate.
details:
  realistic_solution: To prevent the out-of-order buffer from overflowing, the time difference between
    the fastest and slowest paths must not exceed the time it takes to fill the buffer at line rate. First,
    convert 800 Gbps to 100 GB/s. Then, divide the 16MB buffer capacity by the 100 GB/s incoming rate.
    This gives a maximum path latency skew of 160 microseconds. The network topology and switch queue
    depth bounds must be tuned so that transit time variance never exceeds 160µs, otherwise packets are
    dropped, triggering PFC pauses and halting the sender.
  common_mistake: Candidates often mix up bits and Bytes (dividing 16MB by 800Gbps directly) or mistakenly
    use the average cluster RTT instead of the latency delta (path skew) to size the out-of-order reassembly
    buffer.
  napkin_math: 'Line Rate = 800 Gbps / 8 = 100 GB/s = 100 MB/ms.

    Max Path Skew = Buffer Size / Line Rate

    Max Path Skew = 16 MB / 100 MB/ms = 0.16 ms = 160 μs.

    If Path A (empty queues) takes 5μs and Path B (congested queues) takes 170μs, the skew is 165μs. The
    16MB buffer will overflow and drop packets before the delayed packet from Path B arrives.'
