id: cloud-0104
title: The Real-Time Ad Bidding SLA
topic: tail-latency
status: published
provenance: human
scenario: You are designing a cloud service for real-time ad bidding which must respond to 99.9% of requests
  within a 50ms SLA. Your inference model, running on a dedicated H100, has an average processing time
  of 30ms. However, due to feature variability, you observe that 5% of requests are 'complex' and take
  80ms to process. Using queueing theory, determine if the current system can meet this strict SLA.
details:
  realistic_solution: No, the system cannot meet the SLA. While the average time is acceptable, the P95
    latency of 80ms guarantees failure. Any request that takes 80ms will immediately miss its own 50ms
    deadline. More importantly, it occupies the server for an extra 30ms, forcing the next request to
    wait in a queue. This initial wait time is then added to the next request's processing time, likely
    causing it to miss its deadline as well. This creates a cascade of failures. Since 5% of requests
    trigger this failure mode, it's impossible to achieve a 99.9% success rate.
  common_mistake: Looking only at the average processing time (30ms) and concluding that since it's well
    under the SLA deadline (50ms), the system is healthy. This completely ignores the cascading failure
    effect of tail latency in any system with queues and strict deadlines.
  napkin_math: 1. **Deadline:** 50ms. | 2. **Slow Request:** An 80ms request arrives. It misses the deadline
    by 30ms. | 3. **Queue Forms:** While the server is busy, other requests arrive. Let's say a 'fast'
    30ms request arrives just after the slow one started. It must wait 80ms for the server to become free.
    | 4. **Cascading Failure:** The total time for the 'fast' request becomes `80ms (wait) + 30ms (process)
    = 110ms`. It also misses the 50ms deadline catastrophically. | 5. **Conclusion:** The system has a
    5% chance of entering a state that causes multiple, consecutive deadline misses. This far exceeds
    the 0.1% failure rate allowed by the SLA.
