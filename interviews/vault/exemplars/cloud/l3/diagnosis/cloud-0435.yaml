id: cloud-0435
title: The Illusion of Sparsity
topic: pruning-sparsity
status: published
provenance: human
scenario: You are an ML Systems Engineer at a large cloud provider. A team has applied a new unstructured
  pruning algorithm to a 100B parameter LLM, achieving 50% sparsity. They expected this to roughly double
  inference throughput on H100 GPUs. However, in production, they observe less than a 5% throughput improvement.
  They've checked the model size, and it's indeed half the original on disk. `nvidia-smi` shows 100% GPU
  utilization during requests. Why is the speedup so negligible?
details:
  realistic_solution: The root cause is the use of unstructured pruning. H100 GPUs achieve their performance
    through Tensor Cores, which are specialized hardware units designed to perform matrix-matrix multiplications
    on small, dense blocks of data (e.g., 16x16). Unstructured pruning creates a fine-grained, random
    pattern of zeros in the weight matrices. The GPU cannot use its Tensor Cores on these sparse matrices.
    It falls back to general-purpose CUDA cores, which are much less efficient, or it loads the data as
    if it were dense and uses masking, nullifying the potential compute savings. The memory access patterns
    also become irregular, leading to cache inefficiency. The solution is to use structured pruning, where
    entire blocks, channels, or attention heads are removed, resulting in smaller *dense* matrices that
    can be efficiently processed by Tensor Cores.
  common_mistake: Believing that '50% fewer parameters' automatically translates to a 2x speedup. This
    ignores the critical difference between theoretical FLOPs and actual hardware execution, especially
    how modern accelerators are optimized for dense, not sparse, computation.
  napkin_math: Let's analyze the hardware behavior. An H100's performance comes from its Tensor Cores,
    offering 989 TFLOPS on dense FP16 matrices. A 50% unstructured sparse matrix cannot be fed into these
    cores. The operation might fall back to simulation on CUDA cores, which provides a tiny fraction of
    the peak FLOPs. Even if a special kernel could skip zero-multiplications, the core problem is memory
    access. The indices of the non-zero weights must be read from HBM (~300 ns latency), and the weight
    values themselves must be read. This random-access pattern is extremely inefficient compared to streaming
    a dense matrix block into SRAM. The GPU spends all its time waiting for data from HBM rather than
    computing, hence it is memory-access bound despite showing 100% utilization (the cores are active,
    but stalled waiting for data). The theoretical 2x FLOP reduction is completely overshadowed by the
    massive penalty from losing structured, dense computation.
