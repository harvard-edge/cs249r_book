id: cloud-cell-10314
title: 'Recall: Rack Power Budget Limits for H100 Dense Deployments'
topic: datacenter-efficiency
status: published
provenance: human
scenario: An ML platform engineer proposes filling a standard 42U server rack with H100 SXM5 servers (DGX H100, 10.2 kW per 8-GPU node) to maximize GPU density. The datacenter's standard rack power budget is 15 kW. The engineer argues they can fit 2 DGX nodes per rack.
question: Evaluate whether this is feasible and explain what datacenter constraints apply.
details:
  realistic_solution: 'Two DGX H100 nodes: 2 × 10.2 kW = 20.4 kW — exceeds the 15 kW rack budget. Even one DGX H100 at 10.2 kW + networking (300 W) + server chassis overhead (500 W) = 11 kW, leaving only 4 kW headroom. High-density H100 deployments require 30–40 kW per rack power circuits (3-phase 60A or higher), specialized in-rack liquid cooling manifolds or rear-door heat exchangers, and floor load ratings >1,000 kg. Hyperscalers deploy H100 in custom-built pods with 30–50 kW/rack capacity, not standard 15 kW datacenter allocations.'
  common_mistake: |
    **The Pitfall:** Looking only at steady-state TDP and ignoring peak power draw and auxiliary system overhead.
    **The Rationale:** Forgetting to account for PDU overhead, cooling capacity per rack, and breaker sizing for high-density architectures.
    **The Consequence:** Tripping datacenter breakers and causing severe outages due to extreme power oversubscription.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard rack limit: 15 kW.
       - DGX H100 system TDP: 10.2 kW (8 GPUs × 700W + CPUs/Networking).
    2. **Calculations:**
       - 2 DGX H100 nodes = 2 × 10.2 kW = 20.4 kW.
       - Overhead: 20.4 kW > 15 kW rack limit.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** 20.4 kW vastly exceeds the 15 kW limit. Hyperscale deployments require custom 30-50 kW power circuits and direct-to-chip liquid cooling.
