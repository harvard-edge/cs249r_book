id: cloud-0730
title: The InfiniBand vs RoCE Decision
topic: compound-ai-systems
status: published
provenance: human
scenario: Your company is building a new 512-GPU training cluster. The vendor offers two options: InfiniBand NDR (400 Gbps per port, credit-based flow control, ~1 μs latency) for $2.8M, or RoCE v2 over standard Ethernet (400 GbE, PFC-based, ~2 μs latency) for $1.2M. Both claim 'lossless RDMA.' Your workload is fine-tuning 70B models with FSDP across all 512 GPUs.
question: Which network option do you choose, and under what conditions does the cheaper option break down?
details:
  realistic_solution: For 512 GPUs doing FSDP (which uses AllGather + ReduceScatter every forward/backward pass), the critical metric is tail latency, not median latency. InfiniBand's credit-based flow control provides true lossless behavior — the sender never transmits more than the receiver can buffer. RoCE relies on PFC, which works well within a single rack but degrades across multi-hop topologies. At 512 GPUs spanning 32+ racks, PFC storms become likely during AllReduce incast. Choose RoCE if your cluster fits in 2-3 racks with a single-tier switch; choose InfiniBand for anything larger or latency-sensitive.
  common_mistake: |
    **The Pitfall:** Assuming RoCE v2 is strictly equivalent to InfiniBand because both are marketed as "lossless RDMA."
    **The Rationale:** Candidates focus on the identical bandwidth capabilities (400 Gbps) without understanding the scaling limitations of PFC compared to credit-based flow control.
    **The Consequence:** Deploying a cheaper network that collapses under the heavy incast traffic of large-scale synchronous training, causing compounding tail latency.
  napkin_math: |
    - FSDP AllGather for a 70B model requires each GPU to hold a 70B / 512 ≈ 137M parameter shard.
    - In FP16, this is 137M × 2 bytes ≈ 274 MB per GPU.
    - AllGather collects all shards: 274 MB × 512 = 140 GB total data moved per layer group.
    - At 400 Gbps (50 GB/s) per link, ring AllGather takes 140 GB / 50 GB/s = 2.8s at line rate.
    - A 1% PFC-induced pause adds 28 ms.
    - **If tail latency spikes 5× (e.g., 10 μs vs 2 μs per hop) due to PFC storms, stalls accumulate to ~140 ms per step, compounding into weeks of wasted training time.**
