id: cloud-fill-01542
title: 'Real-time Anomaly Detection with AMD MI300X: Streaming Data Pipeline Analysis'
topic: streaming-ingestion
status: published
provenance: human
scenario: You are designing a real-time anomaly detection system for a fleet of autonomous vehicles. Each
  vehicle generates telemetry data at a rate of 10GB/s. Across thousands of vehicles, this generates petabytes
  per day. This data stream needs to be ingested, preprocessed, and fed into a deep learning anomaly detection
  model for real-time inference. Your target latency from sensor observation to anomaly alert is under
  50ms. The inference workload will run on AMD MI300X accelerators, each equipped with 192 GB HBM3, offering
  5.3 TB/s memory bandwidth and 1,307 TFLOPS FP16 sparse performance. Describe the key architectural components,
  focusing on how the MI300X's specifications influence your design choices for the stream processing
  and real-time feature computation pipeline. Analyze potential bottlenecks and explain why certain parts
  of the pipeline would either benefit greatly or be limited by these specific hardware characteristics,
  especially the memory bandwidth and FP16 performance.
details:
  realistic_solution: A robust solution would involve a highly scalable distributed stream processing
    framework (e.g., Apache Flink, Kafka Streams) for initial ingestion, filtering, and aggregation on
    CPU-based nodes. This would be coupled with efficient data transfer mechanisms (e.g., RDMA-enabled
    network cards, CXL/PCIe Gen5 connections, GPUDirect Storage) to move preprocessed data to the MI300X
    quickly. The deep learning model itself would be optimized for FP16 precision and designed with sparsity
    in mind where appropriate, leveraging kernel fusion and memory-aware optimizations to maximize MI300X
    utilization. Load balancing and failover across a cluster of MI300X instances would ensure high availability
    and scalability, along with meticulous profiling to identify and resolve bottlenecks across the entire
    pipeline.
  common_mistake: A common mistake is to under-prioritize the data ingestion and preprocessing layers,
    leading to bottlenecks before data even reaches the MI300X. Miscalculating the effective FP16 sparse
    TFLOPS utilization based on actual model sparsity and data patterns, or overlooking the implications
    of HBM3 bandwidth for both input data transfer and model parameter access, are also frequent pitfalls.
    Additionally, failing to consider the network and PCIe/CXL bandwidth between the ingestion layer and
    the accelerators can negate the benefits of high HBM3 bandwidth.
  napkin_math: '1. **HBM3 Bandwidth Utilization:** If your real-time feature computation and model inference
    requires 500 GB/s of data to be moved into/out of HBM3 per MI300X, what percentage of the MI300X''s
    5.3 TB/s (5300 GB/s) HBM3 bandwidth is utilized? (500/5300 ≈ 9.4%). How does this utilization impact
    the overall latency budget?

    2. **FP16 Sparse Throughput:** If the anomaly detection model performs 100 TFLOPS of effective FP16
    sparse operations per second, what percentage of the MI300X''s 1,307 TFLOPS FP16 sparse capability
    is used? (100/1300 ≈ 7.7%). How many inferences per second could a single MI300X theoretically handle
    for this workload given this utilization?

    3. **Latency Breakdown:** With a 50ms end-to-end latency budget, if the MI300X inference takes 10ms
    and data transfer to the MI300X takes 5ms, how much time remains for data ingestion, CPU-side preprocessing,
    and alert propagation? Provide a rough breakdown of typical latency allocations for each stage.'
