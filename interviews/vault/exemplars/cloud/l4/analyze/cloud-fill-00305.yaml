id: cloud-fill-00305
title: 'TPU v5e Memory Management: Diagnosing OOMs in Large Model Training'
topic: memory-pressure-management
status: published
provenance: human
scenario: You are training a large language model on a Google TPU v5e pod. Your model's BF16 checkpoint size is 40GB, and activations for a global batch size of 2048 consume 10GB on each TPU core. You've implemented an optimizer that offloads its states to host memory, yet you frequently encounter Out-Of-Memory (OOM) errors during training.
question: Why are OOMs occurring despite host memory offloading, and how can you mitigate them?
details:
  realistic_solution: Implement gradient accumulation with a reduced per-step batch size (e.g., 512) to significantly lower the peak activation memory footprint on HBM. Utilize activation checkpointing/re-materialization strategies to trade re-computation for memory savings. Employ TPU-specific memory profiling tools (like `tf.profiler`) to precisely identify memory hotspots, temporary allocations, and potential fragmentation. Investigate model architecture for opportunities to reduce activation size or re-shard model parameters more aggressively.
  common_mistake: |
    **The Pitfall:** Overlooking the combined peak memory requirements of activations, weights, and intermediate gradient buffers.
    **The Rationale:** Relying solely on host offloading while forgetting that the forward/backward passes still require significant device memory for activations.
    **The Consequence:** Unexpected OOM crashes during gradient computation because the immediate working set exceeds the device's HBM capacity.
  napkin_math: |
    - 40GB BF16 model sharded across 4 cores = 10GB weights per core.
    - Activations consume 10GB per core.
    - Without accumulation, peak memory per core = 10GB (weights) + 10GB (activations) = 20GB.
    - 20GB exceeds the 16GB HBM capacity, causing an OOM.
    - Gradient accumulation with 4 steps reduces per-step batch size to 512.
    - New activation memory = 10GB / 4 = 2.5GB.
    - **New peak memory = 10GB + 2.5GB = 12.5GB, safely fitting within the 16GB limit.**
