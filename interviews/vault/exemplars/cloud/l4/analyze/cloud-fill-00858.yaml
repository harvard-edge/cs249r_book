title: Optimizing LLM Deployment via Knowledge Distillation on AMD MI300X
topic: knowledge-distillation
status: published
provenance: human
scenario: Your team is deploying a distilled large language model (LLM) on an AMD MI300X accelerator. The goal is to distill a 70B parameter teacher LLM into a 7B parameter student model, aiming for low inference latency and high throughput while preserving accuracy.
question: How can different knowledge distillation techniques (e.g., logit matching, feature distillation) leverage the MI300X hardware to optimize performance?
details:
  realistic_solution: Implement a mixed-precision feature distillation pipeline, utilizing FP16 sparse operations for both the teacher and student forward passes where applicable, directly leveraging the MI300X's compute capabilities. For feature transfer, optimize the data path to maximize HBM3 bandwidth, potentially using asynchronous transfers and compression techniques for intermediate activations. Strategically choose feature layers that provide high knowledge transfer efficiency without prohibitive memory access patterns. Consider attention-based distillation, ensuring the attention matrices can benefit from sparse computations.
  common_mistake: |
    **The Pitfall:** Defaulting to dense FP32 operations and transferring intermediate activations through host memory.
    **The Rationale:** Treating knowledge distillation as a generic training loop without exploiting the target hardware's massive memory bandwidth or sparse compute capabilities.
    **The Consequence:** Suboptimal throughput and latency, squandering the performance potential of the target accelerator.
  napkin_math: |
    - A 70B teacher (FP16) requires ~140 GB; a 7B student (FP16) requires ~14 GB. Total = 154 GB.
    - Both models and their intermediate activations easily fit within the 192 GB HBM3, eliminating slow host-device transfers.
    - Feature distillation transferring 100 GB of intermediate activations uses internal bandwidth.
    - At 5.3 TB/s HBM3 bandwidth, a 100 GB transfer takes just 100 GB / 5300 GB/s ≈ 18.8 ms.
    - **Leveraging sparse FP16 capability yields a ~2x raw computational speedup for sparse operations, accelerating the distillation loop.**
