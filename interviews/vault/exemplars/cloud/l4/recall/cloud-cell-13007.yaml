schema_version: 1
id: cloud-cell-13007
title: 'Pipeline Parallelism Realization: Activation Memory with Gradient Checkpointing'
topic: pipeline-parallelism
status: published
provenance: human
scenario: A 40-stage pipeline (one transformer layer per H100 stage) trains a 40B model. Without gradient
  checkpointing, each stage stores all intermediate activations for its single layer. With checkpointing,
  only the layer input is stored. For sequence length 4096 and batch size 8, calculate activation memory
  savings per stage and whether the 80GB H100 can accommodate without checkpointing.
details:
  realistic_solution: 'Single transformer layer activations without checkpointing: attention (Q,K,V,attn
    weights,output) + FFN (up,gate,down intermediates) ≈ 12 * hidden * seq * batch * 2 bytes. Hidden =
    8192 (40B model), seq=4096, batch=8. Activation size = 12 * 8192 * 4096 * 8 * 2 = 6.4GB per stage.
    With checkpointing: store only input = 8192 * 4096 * 8 * 2 = 537MB. Savings: 6.4GB vs 537MB = 12x
    reduction. Without checkpointing: 40B/40 * 2 = 2GB weights + 6.4GB activations = 8.4GB — fits easily.
    With gradient and optimizer: much larger.'
  common_mistake: Assuming gradient checkpointing has no compute cost — it requires one extra forward
    pass per stage, increasing compute by ~33%.
  napkin_math: 'Without checkpointing, activation memory per stage: 12 * 8192 * 4096 * 8 * 2 bytes = 12
    * 537MB = 6.44GB. With checkpointing: 1 * 537MB = 537MB. Weights per stage (1B params): 2GB. Gradients:
    2GB. Optimizer (BF16 Adam): 6GB. Total without checkpointing: 2+2+6+6.44 = 16.4GB — fits in 80GB.
    Extra forward pass cost: +33% compute per stage.'
