schema_version: 1
id: cloud-fill-01216
title: Diagnosing Latency Spikes and OOM During Canary Rollout on NVIDIA H100
topic: ab-rollout-strategies
status: published
provenance: human
scenario: Your team is conducting a canary rollout of a new deep learning model for real-time video analytics to an inference service deployed on a Kubernetes cluster. You've configured the traffic split to route 5% of production requests to the canary deployment. Shortly after initiating the canary, monitoring reveals a 300ms increase in p99 inference latency. Simultaneously, GPU utilization on the canary nodes shows unusual fluctuations, dropping below 20%, yet application logs intermittently report `CUDA_OUT_OF_MEMORY` errors.
question: How would you systematically diagnose and stabilize these contradictory symptoms of low utilization and OOM?
details:
  realistic_solution: '1. **Immediate Action:** Pause the canary rollout by routing 100% of traffic back to the stable version. This stops the bleeding. 2. **Data Collection:** Gather granular GPU metrics (memory allocated, memory usage, compute utilization, memory bandwidth) for both canary and baseline instances. Collect all logs from the canary pods, specifically looking for the full stack traces of `CUDA_OUT_OF_MEMORY` errors. Analyze the characteristics of requests routed to the canary. 3. **Hypothesis Generation & Validation:** *   **Hypothesis 1: Transient OOM due to peak allocation:** The new model might have an intermediate tensor or operation that briefly exceeds HBM capacity, even if overall utilization is low. *   **Validation:** Use GPU profiling tools to identify peak memory allocations. *   **Hypothesis 2: Memory Fragmentation or Leak:** Repeated allocations and deallocations could lead to memory fragmentation, causing OOM even if total free memory exists. *   **Validation:** Monitor memory allocated vs. memory free over time during sustained load. *   **Hypothesis 3: Incorrect Batching Strategy:** The new model might not handle the configured batch size efficiently. *   **Validation:** Test the new model with varying batch sizes in isolation. 4. **Mitigation/Resolution:** Once the root cause is identified, implement a targeted fix: e.g., optimize model memory footprint, adjust batch size, or improve memory management.'
  common_mistake: |
    **The Pitfall:** Panicking and immediately scaling down without collecting data, or misattributing OOM to a general "model size" issue.
    **The Rationale:** Contradictory metrics (low utilization with OOM) often confuse engineers who assume OOMs only happen at 100% compute utilization.
    **The Consequence:** Prolonged outages or recurring deployment failures because the specific memory fragmentation or transient allocation issue is never identified.
  napkin_math: |
    **Assumptions & Constraints:**
    - New model introduces an activation tensor: (Batch_Size, 4096, 4096, 32) in FP16.
    - 50 GB available for activations (assuming 80GB total - 30GB weights/overhead).

    **Calculations:**
    - Tensor size for B=1: 1 × 4096 × 4096 × 32 × 2 bytes = 1 GB.
    - Tensor size for B=16: 16 × 1 GB = 16 GB.

    **Conclusion & Interpretation:**
    - **Result: B=50 max (Memory-Peak-Bound)**. The maximum theoretical batch size bounded purely by this single transient tensor is B=50. Transient spikes cause OOM despite low average utilization.
