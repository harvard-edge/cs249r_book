id: cloud-2305
title: The Automated Fraud Label Loop
topic: data-quality-validation
status: published
provenance: human
scenario: Your fraud detection API processes 50,000 QPS. Over the last 3 weeks, precision has degraded from 95% to 70%. Your automated drift detection dashboards, which run KS tests on all 200 input features, are completely green. You trigger a full pipeline retrain on the most recent 3 weeks of data, but the newly deployed model performs even worse (65% precision).
question: Why did the model degrade despite no feature drift, and why did retraining make it worse?
details:
  realistic_solution: The root cause is upstream label pollution creating a negative feedback loop. Because the feature distributions (X) haven't shifted, the drift must be in the target variable (Y) or the P(Y|X) relationship caused by corrupted ground truth. Three weeks ago, an upstream operations team implemented an automated, rule-based chargeback system that automatically tags certain transactions as 'fraud' based on a static heuristic to save human reviewer time. These heuristic labels are now flowing directly into your training data pipeline as ground truth. The ML model is no longer learning actual fraud; it is learning to perfectly mimic the simplistic, lower-precision rule-based system. To resolve this, you must audit the data lineage of the labels, separate human-reviewed labels from auto-labels, and either filter out the auto-labels during training or use sample weighting.
  common_mistake: |
    **The Pitfall:** Assuming concept drift has occurred in a complex, non-linear way that KS tests missed.
    **The Rationale:** Trusting the data pipeline's labels implicitly and blaming the model architecture for performance drops.
    **The Consequence:** Wasting time redesigning the model architecture while the automated label pollution continues to poison the ground truth.
  napkin_math: |
    - At 50,000 QPS, with a 1% true fraud rate, there are 500 fraud cases/sec.
    - Auto-label system tags 300 true cases and introduces 150 false positives.
    - 60% of positive training labels are now heuristic-based.
    - **The model's upper bound precision aggressively regresses toward the heuristic's precision (300/450 = 66.6%), perfectly matching the observed drop to ~65%.**
