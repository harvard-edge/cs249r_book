title: The Mysterious Multi-Node Slowdown
topic: rdma-transport
status: published
provenance: human
scenario: You are training a large model using data parallelism across two separate server nodes connected with a 400 Gbps InfiniBand NDR switch. Profiling reveals that the gradient synchronization step between the nodes is the primary bottleneck.
question: What is the most likely cause for this severe inter-node communication slowdown?
details:
  realistic_solution: "RDMA capability over the InfiniBand fabric has failed. NCCL degrades to standard IPoIB, dragging all massive tensor streams across the host Linux kernel stack and CPU. Restore direct RDMA bindings to re-enable unbuffered zero-copy transfers between remote GPUs."
  common_mistake: |
    **The Pitfall:** Debugging switch optics, NVLink geometries, or blaming the physical fiber capacity.
    **The Rationale:** Assuming physical layer constraints rather than a catastrophic software protocol fallback.
    **The Consequence:** Hundreds of wasted engineering hours while the CPU silently drowns in TCP overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network: 400 Gbps (50 GB/s) InfiniBand NDR.
       - Sync Size: 100 GB payload.
    2. **Calculations:**
       - Native RDMA Speed = 100 GB / 50 GB/s = 2.0 s.
       - IPoIB CPU Limit = ~10 GB/s -> 10.0 s.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Collapsing from RDMA to IPoIB generates a colossal 5x latency penalty, absolutely crushing cross-node gradient throughput.
