id: cloud-0785
title: The Unresponsive Replica
topic: monitoring-observability
status: published
provenance: human
scenario: Your auto-scaling group for an inference service is occasionally failing to replace unhealthy instances. The infrastructure is fine, but the service becomes unresponsive even though the instance itself is still running.
question: What is likely going wrong with your health check strategy and how would you fix it?
details:
  realistic_solution: "Deploy deep Application-Level L7 Readiness Probes (`/ready`) that validate model hydration and VRAM status. Establish isolated Liveness Probes (`/livez`) to detect process-level deadlocks. Enforce strict connection draining rules to eliminate request blackholes during instance termination."
  common_mistake: |
    **The Pitfall:** Relying exclusively on shallow L4 TCP ping checks to assess complex ML serving containers.
    **The Rationale:** Carrying over simple monolithic web-server logic into memory-heavy, state-dependent GPU architectures.
    **The Consequence:** The ASG ignores paralyzed inference states and continuously forwards production traffic into dead zones.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ASG Check: 10s polling, 3x threshold.
       - H100 Model Load: 80s (Disk to VRAM).
    2. **Calculations:**
       - False-Live Window = 3 * 10s = 30s.
       - Instance Boot & Hydration = 40s + 80s = 120s.
       - Total Outage = 30s + 120s = 150s.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Shallow monitoring generates a 150-second blind spot of hard 502 errors before physical serving capacity restores.
