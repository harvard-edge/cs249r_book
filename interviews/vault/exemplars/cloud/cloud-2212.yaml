title: The Rail-Optimized Placement Problem
topic: scheduling-resource-management
status: published
provenance: human
scenario: You are scheduling a 32-GPU data-parallel training job on a cluster. The scheduler places GPUs asymmetrically across 6 different nodes, causing the training job's AllReduce to take 3x longer than expected.
question: Why did the placement cause this bottleneck, and what scheduling constraint would fix it?
details:
  realistic_solution: "Deploy rigid rail-optimized scheduling patterns. Command the orchestrator to grant exactly 4 complete 8-GPU nodes. Eliminating asymmetric placements prevents intra-node NVLink broadcasts from needlessly leaking across heavily restricted InfiniBand boundaries."
  common_mistake: |
    **The Pitfall:** Trying to 'fix' the InfiniBand latency or attributing failures to general fabric congestion.
    **The Rationale:** Processing ML cluster schedules exactly like distributed web microservices, ignoring hard physical topologies.
    **The Consequence:** Ring-AllReduce stragglers totally capsize the global batch-step, bleeding millions of dollars in idle GPU time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Job Size: 32 GPUs.
    - Topology: 8-GPU nodes (900 GB/s NVLink, 50 GB/s IB).
    - Payload: 14 GB.

    **Calculations:**
    - Perfect Match (4 nodes) = Intra-link (14 / 900 = ~16 ms) + Inter-link (14 / 50 * 1.5 = ~420 ms) = ~436 ms.
    - Shattered Match (6 nodes) = Bleeding NVLink data into 50 GB/s queues = ~1300 ms.

    **Conclusion & Interpretation:**
    - **Result: ~1300 ms (Network-Bound)**. The non-rail-aligned deployment forces an astronomical 3x latency increase, demonstrating that placement destroys theoretical bandwidth.
