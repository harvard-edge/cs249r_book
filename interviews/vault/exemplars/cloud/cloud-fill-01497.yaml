id: cloud-fill-01497
title: Optimizing Dataset Curation for Bias Mitigation on Google TPU v5e
topic: dataset-curation
status: published
provenance: human
scenario: Your team is curating a multi-terabyte image dataset for a medical imaging classification model to be trained on TPU v5e instances. To mitigate demographic biases, an active learning pipeline is proposed where the model's uncertainty scores guide the selection of new samples for annotation.
question: How might the specific hardware characteristics of the TPU v5e influence your data selection strategy and annotation workflow design to efficiently utilize resources?
details:
  realistic_solution: 'A realistic solution involves designing a multi-stage data curation and loading pipeline that is ''TPU-aware''. For data selection in active learning, prioritize samples that are not only high-uncertainty but also diverse and representative across demographic groups to actively combat bias, potentially leveraging techniques like data augmentation or re-sampling that can be efficiently processed on TPU. For annotation workflows, ensure labels are high-quality and consistent. For data loading, implement efficient data sharding and preprocessing (e.g., TFRecords with optimized data types) to ensure the high memory bandwidth is utilized. Data should be pre-fetched and cached where possible, and batch sizes should be carefully tuned to fit within the HBM per chip.'
  common_mistake: |
    **The Pitfall:** Designing data loading pipelines without considering the accelerator's specific ingest rate constraints.
    **The Rationale:** Focusing entirely on the active learning algorithm while ignoring how fast data actually needs to feed into the hardware.
    **The Consequence:** Severe I/O bottlenecks that leave the TPU starving for data, drastically increasing training times and compute costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU v5e HBM bandwidth: 1.6 TB/s. Image sample size: 1 MB.
       - TPU HBM capacity: 16 GB.
    2. **Calculations:**
       - Max ingest rate = 1.6 TB/s / 1 MB = 1.6 million samples per second.
       - Batch limit = 16 GB / 1 MB = ~16,000 images per batch.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Ingest-Bound.** The active learning data pipeline must be heavily optimized (TFRecords, pre-fetching) to sustain a 1.6M sample/sec capability.
