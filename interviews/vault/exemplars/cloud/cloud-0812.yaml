id: cloud-0812
title: The Carbon-Aware Scheduler
topic: sustainability-carbon-accounting
status: published
provenance: human
scenario: Your company pledges net-zero AI training by 2027. You operate GPU clusters in Virginia (380 gCO2/kWh), Oregon (80 gCO2/kWh), and Iceland (28 gCO2/kWh). A 70B model training run requires 1,000 A100-hours regardless of location. Your CFO says 'just buy carbon offsets — it's cheaper than moving workloads.'
question: How would you design a carbon-aware training scheduler, and how do the numbers prove the CFO right or wrong?
details:
  realistic_solution: 'A carbon-aware scheduler must optimize across three dimensions: (1) **spatial shifting** — route jobs to the lowest-carbon region with available capacity, (2) **temporal shifting** — delay non-urgent jobs to times when the grid is cleanest (midday solar peaks, windy nights), (3) **workload shaping** — run compute-intensive phases (forward/backward pass) during clean periods and I/O-intensive phases (checkpointing, data loading) during dirty periods. The scheduler ingests real-time grid carbon intensity from APIs (WattTime, ElectricityMaps), maintains a job priority queue, and makes placement decisions every 15 minutes. For the 70B training run: use Oregon as primary (80 gCO2/kWh), with temporal shifting to avoid the 6-9 PM peak (when gas peakers fire up, pushing intensity to 200 gCO2/kWh). Cross-region data transfer for training is expensive (100TB dataset over 10 Gbps = 22 hours), so the scheduler must factor in the carbon cost of data movement.'
  common_mistake: |
    **The Pitfall:** Proposing to run everything in Iceland simply because it has the lowest average carbon intensity.
    **The Rationale:** Ignoring that carbon intensity varies temporally, that data gravity makes cross-region movement expensive, and that Iceland has limited capacity.
    **The Consequence:** Unrealistic architectures that fail to account for massive data transfer costs and dynamic grid conditions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,000 A100-hours × 400W (A100 SXM4 TDP) = 400 kWh compute.
       - Virginia emissions: 380 gCO2/kWh. Oregon: 80 gCO2/kWh.
       - Carbon offset cost: ~$75/tonne. Region price premium: $0.30/GPU-hr.
    2. **Calculations:**
       - Virginia footprint: 400 kWh × 380 g = 152 kg CO2.
       - Virginia offset cost: 0.152 tonnes × $75 = $11.40.
       - Relocation premium to Oregon: 1000 hrs × $0.30 = $300.
    3. **Conclusion & Interpretation:**
       - **Result: Economics-Bound.** The CFO is technically right ($11.40 offset < $300 relocation). However, regulatory shifts towards Scope 2 market-based accounting demand genuine temporal/spatial carbon shedding.
