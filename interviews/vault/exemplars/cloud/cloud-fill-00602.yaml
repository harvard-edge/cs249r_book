id: cloud-fill-00602
title: Energy-Aware MoE Inference on AMD MI300X
topic: energy-per-operation
status: published
provenance: human
scenario: You are tasked with deploying a large, sparse Mixture-of-Experts (MoE) model for real-time inference on an AMD MI300X GPU. The model has 192 GB of parameters. Your objective is to maximize inference throughput while staying within a critical power envelope.
question: How would you design the inference pipeline to balance memory access versus compute, applying energy-aware operator selection?
details:
  realistic_solution: 'A realistic solution would involve a detailed analysis of the MoE model''s operations, mapping them to the MI300X''s architecture with an emphasis on energy. This includes: 1. **Profiling and Characterization**: Identifying memory-bound versus compute-bound kernels within the MoE layers. 2. **Applying Horowitz Energy Table Principles**: Recognizing that off-chip memory access (HBM3) is orders of magnitude more energy-intensive than on-chip compute. The design should prioritize data reuse, minimize redundant HBM3 transfers, and maximize cache utilization. 3. **Energy-Aware Operator Selection**: Leveraging specialized sparse operators provided by the MI300X when appropriate, as these are typically optimized for energy efficiency for sparse workloads. 4. **Batching and Pipelining**: Strategically batching inference requests to amortize memory access costs and using asynchronous operations or pipelining to hide memory latency. 5. **Data Movement Optimization**: Implementing techniques like gradient accumulation or activation recomputation if training, or optimizing data packing for inference.'
  common_mistake: |
    **The Pitfall:** Exclusively optimizing for FLOPs without considering the massive energy penalty of HBM accesses.
    **The Rationale:** Treating energy optimization strictly as a compute problem rather than a data movement problem.
    **The Consequence:** Exceeding the thermal and power envelopes, leading to hardware throttling and degraded real-time throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy per FP16 FMA (on-chip): ~1.5 pJ.
       - Energy per byte transferred from HBM3: ~15 pJ.
       - 100 TFLOPs compute requires 100 TB of HBM3 transfers.
    2. **Calculations:**
       - Compute energy: 100e12 × 1.5 pJ = 150 Joules.
       - Memory energy: 100e12 × 15 pJ = 1500 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** Memory movement consumes 10× more energy than computation. Optimizing off-chip data transfers is the true path to power efficiency.
