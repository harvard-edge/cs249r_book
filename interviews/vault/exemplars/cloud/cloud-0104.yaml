title: The Real-Time Ad Bidding SLA
topic: tail-latency
status: published
provenance: human
scenario: You are designing a cloud service for real-time ad bidding which must respond to 99.9% of requests within a 50ms SLA. Your inference model averages 30ms, but 5% of requests are complex and take 80ms.
question: Using queueing theory, determine if the current system can meet this strict SLA.
details:
  realistic_solution: "The deployment explicitly fails the SLA constraint. Eradicate Head-of-Line (HoL) blocking by implementing strict `max_latency` aborts at the load balancer. Enforce aggressive query-shedding strategies that fast-path default heuristics the instant an 80ms tail-request breaches threshold."
  common_mistake: |
    **The Pitfall:** Relying on the 30ms arithmetic mean to satisfy a high-percentile latency SLA.
    **The Rationale:** A severe lack of queueing theory knowledge, failing to account for how solitary 80ms tasks block execution pipelines.
    **The Consequence:** Unmitigated cascading timeouts that guarantee complete 99.9% contractual failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Requirement: 50 ms SLA (P99.9).
       - Nominal: 30 ms (95%).
       - Spike: 80 ms (5%).
    2. **Calculations:**
       - Spiked request inherently violates the 50ms bound by 30ms.
       - A nominal request entering the queue behind the spike incurs: 80 ms wait + 30 ms compute = 110 ms latency.
    3. **Conclusion & Interpretation:**
       - **Result: Queue-Bound**. The 5% heavy-tail requests definitively choke the pipeline, rendering the 99.9% SLA mathematically unachievable without shedding.
