id: cloud-0012
title: The True Cost of Batching on TTFT
topic: model-serving-infrastructure
status: published
provenance: human
scenario: 'You''re designing an LLM serving system on a single H100 GPU. The product manager insists on
  a ''real-time'' user experience, which they''ve defined with a strict Service Level Objective (SLO):
  Time-To-First-Token (TTFT) must be under 250ms. Your system improves GPU utilization by queueing incoming
  requests and forming batches. A new batch is processed every 100ms. Given that the prompt processing
  (prefill) for a single request takes about 15ms on this hardware, explain the maximum number of requests
  you can group into a single batch without violating the TTFT SLO.'
details:
  realistic_solution: 'The total latency experienced by a user is the sum of the time spent waiting for
    a batch to be formed (queue time) and the time it takes to process the batch. In the worst-case scenario,
    a request arrives just after a batch has been dispatched, meaning it must wait the full 100ms for
    the next batching window. This leaves `250ms (SLO) - 100ms (Max Queue Time) = 150ms` for the actual
    batch processing. To find the max batch size, we divide the remaining time by the per-request processing
    time: `150ms / 15ms/request = 10 requests`.'
  common_mistake: Engineers often calculate the max batch size by only considering the processing time
    (`250ms / 15ms ≈ 16 requests`). They forget to account for the maximum time a request might have to
    wait in the queue *before* processing begins, which is a critical component of the end-to-end latency.
  napkin_math: 1. **Identify the Total Latency Budget:** SLO for TTFT = 250ms.
