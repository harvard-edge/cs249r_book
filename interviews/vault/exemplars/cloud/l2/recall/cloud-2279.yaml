id: cloud-2279
title: N:M Sparsity and Tensor Core Alignment
topic: extreme-quantization
status: published
provenance: human
scenario: NVIDIA's Ampere and Hopper GPUs support 2:4 structured sparsity natively in their Tensor Cores.
  A colleague proposes using 1:4 sparsity instead, arguing that removing 75% of weights (vs 50%) should
  yield even greater speedup. Why does 1:4 sparsity NOT get hardware acceleration on these GPUs, and what
  is the fundamental constraint that makes 2:4 the specific ratio supported?
details:
  realistic_solution: 'The Tensor Core''s sparse math unit is hardwired to process exactly 2 non-zero
    values out of every group of 4 elements. This is a fixed datapath design: the hardware reads 4 values,
    uses a 2-bit index to select which 2 are non-zero, and feeds those 2 values into the multiply-accumulate
    pipeline. Changing the ratio to 1:4 would require a different selection circuit and different storage
    format. The 2:4 pattern was chosen because it provides a clean 2x theoretical speedup (half the multiplications)
    while maintaining enough representational capacity that accuracy loss is manageable for most architectures.
    The compressed format stores the 2 non-zero values plus a small metadata index per group, halving
    the memory bandwidth for weight loading.'
  common_mistake: Assuming that any sparsity ratio can be accelerated, and that higher sparsity always
    means more speedup. The hardware supports exactly one sparsity pattern.
  napkin_math: 'Dense 4 elements: 4 multiplies, 4 values stored. 2:4 sparse: 2 multiplies + 2-bit index,
    2 values + metadata stored. Memory reduction: ~50%. Compute reduction: exactly 2x on the supported
    datapath. 1:4 would save 75% compute but requires custom hardware that doesn''t exist in current Tensor
    Cores.'
