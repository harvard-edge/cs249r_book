id: cloud-0041
title: The Batching Tipping Point
topic: roofline-analysis
status: published
provenance: human
scenario: An engineering team is optimizing a BERT-Large (340M parameters) model for FP16 inference on
  an H100 GPU. For a single input sequence, the forward pass requires approximately 25 GFLOPs and reads
  750 MB of data (weights, KV cache, activations). The H100 has a peak FP16 performance of 989 TFLOPS
  and 3.35 TB/s of HBM3 memory bandwidth. First, calculate the Arithmetic Intensity (AI) for a single
  inference (batch size 1). Then, explain what happens to the workload's character (memory-bound vs. compute-bound)
  as the team increases the batch size.
details:
  realistic_solution: The workload shifts from being memory-bound to compute-bound. At batch size 1, the
    Arithmetic Intensity is low, bottlenecked by the time it takes to read data from HBM. By increasing
    the batch size, the total FLOPs increase linearly, but the total memory read does not. The large weight
    matrix is read once, and only the per-input activation data scales with the batch. This reuse of weights
    drastically increases the ratio of compute to memory access (the AI), pushing the workload over the
    GPU's ridge point and into the compute-bound regime. By becoming compute-bound, the GPU can utilize
    its Tensor Cores more effectively, leading to higher achieved TOPS and better overall energy efficiency
    (TOPS/W).
  common_mistake: Engineers often mistakenly assume that all memory access scales linearly with batch
    size. They forget that the model's weights (which form a large part of the memory footprint) are read
    only once per kernel launch, regardless of the batch size. This leads to the incorrect conclusion
    that Arithmetic Intensity remains constant and that the workload cannot become compute-bound through
    batching.
  napkin_math: H100 Ridge Point = Peak Compute / Memory Bandwidth = 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
    Workload Arithmetic Intensity (AI) = 25 GFLOPs / 750 MB = 33.3 FLOPs/byte. Since 33.3 < 295, the batch
    size 1 workload is severely memory-bandwidth bound. To become compute-bound, we must increase the
    batch size by roughly 9x (295 / 33).
