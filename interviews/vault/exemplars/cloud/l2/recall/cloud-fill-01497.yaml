id: cloud-fill-01497
title: Optimizing Dataset Curation for Bias Mitigation on Google TPU v5e
topic: dataset-curation
status: published
provenance: human
scenario: Your team is curating a large-scale image dataset for a medical imaging classification model to be trained on Google Cloud with TPU v5e instances. The dataset is expected to be several terabytes in size, and initial analysis suggests potential demographic biases in the raw data. To mitigate this, an active learning pipeline is proposed where the model's uncertainty scores guide the selection of new samples for annotation.
question: How might the specific hardware characteristics of the TPU v5e influence your data selection strategy and annotation workflow design to efficiently utilize resources?
details:
  realistic_solution: A realistic solution involves designing a multi-stage data curation and loading pipeline that is 'TPU-aware'. For data selection in active learning, prioritize samples that are not only high-uncertainty but also diverse and representative across demographic groups to actively combat bias, potentially leveraging techniques like data augmentation or re-sampling that can be efficiently processed on TPU. For annotation workflows, ensure labels are high-quality and consistent. For data loading, implement efficient data sharding and preprocessing (e.g., TFRecords with optimized data types) to ensure the high memory bandwidth is utilized. Data should be pre-fetched and cached where possible, and batch sizes should be carefully tuned to fit within the HBM per chip.
  common_mistake: |
    **The Pitfall:** Designing data loading pipelines without considering the accelerator's specific hardware constraints.
    **The Rationale:** Focusing entirely on the active learning algorithm while ignoring how data actually feeds into the hardware.
    **The Consequence:** I/O bottlenecks that leave the TPU starving for data, drastically increasing training times and costs.
  napkin_math: |
    - Bandwidth: 1.6 TB/s = $1.6 \times 10^{12}$ bytes/s.
    - Assuming each sample is 1MB ($10^6$ bytes).
    - Max ingest rate: $1.6 \times 10^{12} / 10^6 = 1.6 \times 10^6$ samples per second.
    - The 16 GB HBM ($16 \times 10^9$ bytes) per chip means a batch of 1MB images can contain ~16,000 images.
    - **The data pipeline must be heavily optimized to feed this $1.6 \times 10^6$ sample/sec capability, meaning standard image loading will be a massive bottleneck.**
