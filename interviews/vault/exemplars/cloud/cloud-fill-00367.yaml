id: cloud-fill-00367
title: Optimizing Real-time LLM Inference Latency and Throughput on NVIDIA A100 with Adaptive Batching
topic: batching-strategies
status: published
provenance: human
scenario: Your team is deploying a critical large language model for real-time conversational AI. The primary goal is to achieve sub-50ms p99 latency for single-turn responses while maximizing throughput. You've observed that simple static batching leads to suboptimal GPU utilization and increased tail latencies during peak load.
question: How would you design an inference serving system that dynamically adapts its batching strategy to meet these stringent latency and throughput requirements?
details:
  realistic_solution: 'A robust solution would involve implementing an adaptive or continuous batching strategy tailored for the accelerator. This could include: 1. **Dynamic Batching with Time-Based Scheduling:** Employ a request queue with a maximum waiting time (e.g., `max_wait_ms`). Requests are processed either when the batch size reaches a maximum (`max_batch_size`) or when `max_wait_ms` expires, whichever occurs first. 2. **Continuous Batching for LLMs:** This allows concurrent execution of multiple, partially completed requests on the GPU by efficiently managing attention key-value caches and only swapping in new tokens for requests that are ready for the next inference step. 3. **Load-Adaptive Control:** Implement a feedback loop that monitors real-time metrics such as GPU utilization, queue lengths, and actual p99 latencies. Dynamically adjust parameters like `max_wait_ms` and `max_batch_size` based on these observations. 4. **Hardware-Aware Optimizations:** Leverage Tensor Cores and high memory bandwidth by ensuring data movement is minimized and computations are effectively mapped to the architecture.'
  common_mistake: |
    **The Pitfall:** Applying a fixed, large static batch size under the assumption it will always maximize throughput.
    **The Rationale:** Focusing solely on peak GPU utilization without considering the queueing delay imposed on individual requests.
    **The Consequence:** Severe tail latency issues (missing the 50ms SLA) when the request arrival rate is highly variable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency SLA: 50 ms. Overhead = 5 ms.
    - Generation time = 50 μs per token per batch item.

    **Calculations:**
    - Static batch B=32: compute latency = 32 * 0.05 ms + 5 ms = 6.6 ms (excluding queueing).
    - Target criteria: max_wait_ms + (B_avg * 0.05 ms) + 5 ms <= 50 ms.
    - If max_wait_ms = 20 ms, then B_avg * 0.05 ms <= 25 ms.

    **Conclusion & Interpretation:**
    - **Result: B_avg <= 500 (Queue-Latency-Bound)**. To guarantee the 50 ms P99 SLA under a 20 ms max-wait queue policy, the dynamic batch size B_avg must never exceed 500.
