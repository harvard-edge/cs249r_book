schema_version: 1
id: cloud-sus-62002
title: TTFT vs TPOT SLO Tension
topic: disaggregated-serving
status: published
provenance: human
scenario: Your disaggregated serving cluster has separate TTFT and TPOT SLOs: TTFT < 500 ms, TPOT < 50 ms per token. During a load spike the prefill queue grows. An engineer proposes migrating two decode GPUs to the prefill pool to reduce TTFT.
question: What does this migration fix, what does it break, and what metric should dictate the pool ratio?
details:
  realistic_solution: 'Moving GPUs from decode to prefill reduces prefill queue depth and TTFT, but each decode GPU now serves more concurrent in-flight sequences. TPOT degrades because decode is already memory-bandwidth-bound: adding sequences increases HBM reads per step proportionally. The right signal is the ratio of prefill throughput (tokens/s processed) to decode throughput (tokens/s generated). If prefill throughput >> decode throughput, the bottleneck is decode and migrating to prefill worsens TPOT. Track P99 of both SLOs independently and model the system as two coupled M/D/c queues — find the pool split where both P99s are met with maximum total throughput.'
  common_mistake: |
    **The Pitfall:** Treating TTFT and TPOT as independent systems and migrating capacity to prefill to clear the queue.
    **The Rationale:** Reacting to a TTFT alarm by throwing hardware at prefill without realizing it increases concurrent load on the decode pool.
    **The Consequence:** Lengthening decode queues, causing severe TPOT degradation for all in-flight requests and missing overall SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Prefill pool: processes 200k tokens/s.
       - Decode pool: generates 80k tokens/s (current bottleneck).
    2. **Calculations:**
       - Move 1 GPU from decode to prefill: lose ~10k tok/s decode capacity, gain ~25k tok/s prefill capacity.
       - Result: More sequences pushed into an even more constrained decode pool.
    3. **Conclusion & Interpretation:**
       - **Result: Decode-Bound.** The correct direction is to move prefill GPUs to decode until the prefill-to-decode throughput ratio equalizes.
