id: cloud-fill-01177
title: Optimizing MoE Training on Kubernetes with Google TPU v5e
topic: container-orchestration
status: published
provenance: human
scenario: "Your team is deploying a large-scale, memory-intensive Mixture-of-Experts (MoE) model for natural language processing on a Kubernetes cluster equipped with Google TPU v5e devices. The training job is configured to distribute the model across multiple TPU hosts, but you're encountering significant challenges: intermittent TPU underutilization and sporadic HBM capacity issues on individual devices, even when total cluster memory seems sufficient."
question: How do you diagnose these performance bottlenecks and optimize the Kubernetes deployment using node affinity and memory management strategies?
details:
  realistic_solution: '1.  **Verify Device Plugin**: Ensure the device plugin for Kubernetes is correctly installed and exposes resources as schedulable units. 2.  **Resource Allocation**: Precisely define resource limits in pod specifications, monitoring host CPU/RAM as well. 3.  **Node Affinity & Topology**: Utilize nodeSelector or nodeAffinity to target pods correctly. For distributed jobs, employ podAntiAffinity to spread out pods across physical hosts or podAffinity to minimize network latency. Consider topology-aware scheduling. 4.  **Memory Optimization**: Profile the MoE model''s memory footprint to understand parameter, activation, and optimizer usage. Adjust batch sizes, use gradient checkpointing, and stream data directly to HBM. 5.  **Distributed Strategy**: Ensure the framework correctly leverages specific communication primitives and expert sharding. 6.  **Job Scheduling**: Explore custom schedulers (e.g., Volcano) for gang scheduling to ensure all workers start simultaneously.'
  common_mistake: |
    **The Pitfall:** Treating accelerators identically to generic CPUs without accounting for synchronous execution models and specific communication patterns.
    **The Rationale:** Neglecting proper device plugin configuration, data locality, and topology-aware scheduling out of unfamiliarity with distributed ML requirements.
    **The Consequence:** Communication deadlocks, severe network latency penalties, and stranded resources that crash the training job.
  napkin_math: |
    - HBM Capacity: 16 GB per device.
    - 100B parameter model in BF16 (2 bytes/param) ≈ 200 GB total.
    - Single device can hold: $16 \times 1024^3 / 2 \approx 8.5$ billion parameters (leaving zero room for activations).
    - Memory Bandwidth: 1.6 TB/s. Moving 100 GB of activation data takes $100 / 1600 = 0.0625$ seconds.
    - **If data loading takes 0.5 seconds for a 1-second training step, utilization drops to 50%, highlighting that the bottleneck is upstream I/O, not HBM bandwidth.**
