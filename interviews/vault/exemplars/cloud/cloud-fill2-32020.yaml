title: mmap for Zero-Copy Model Loading
topic: memory-mapped-inference
status: published
provenance: human
scenario: You serve a 7B model on an H100 with 80 GB HBM. The model is stored on a local NVMe SSD capable of 7 GB/s sequential read.
question: Compare the cold-start times, memory implications, and benefits of traditional malloc loading versus mmap file loading.
details:
  realistic_solution: "Differentiate exact loading behaviors: `malloc` executes highly efficient sequential read payloads perfectly suited for monolithic single-processes, whereas `mmap` constructs zero-copy Copy-On-Write sharing optimal for multi-tenant serving, trading initial page-fault turbulence for immense RAM deduplication."
  common_mistake: |
    **The Pitfall:** Broadly assuming `mmap` produces superior speeds during cold-start initializations.
    **The Rationale:** Confusing virtual address allocation speeds with the physical latency of disk-to-HBM ingestion paths.
    **The Consequence:** Debilitating initialization lags caused by chaotic 4KB page faults overwhelming the disk controller.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Model: 14 GB (FP16).
       - Storage Speed: 7 GB/s sequential.
       - Bus: PCIe 5.0 (32 GB/s).
    2. **Calculations:**
       - Malloc Load Time = (14 / 7) + (14 / 32) = 2.0 s + 0.44 s = ~2.44 s.
       - RAM Demand (4 workers) = Malloc (56 GB) vs Mmap (14 GB).
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Malloc natively wins sequential cold-starts (2.4s), but mmap saves 42 GB of critical system RAM during replication.
