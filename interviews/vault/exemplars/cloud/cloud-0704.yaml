title: The Distributed Training Choke Point
topic: data-parallelism
status: published
provenance: human
scenario: You scale a 70B parameter model training job from a single 8xH100 server to two servers. You observe that per-GPU throughput drops by nearly 50%, with a massive spike in time spent on AllReduce communication.
question: Diagnose the primary performance bottleneck.
details:
  realistic_solution: "Identify the massive chasm between intra-node and inter-node speeds. Ring-AllReduce traverses the ultra-fast NVLink mesh seamlessly but forcefully stalls against the drastically slower InfiniBand PCIe boundary. Enforce hierarchical AllReduce strategies to confine massive scatter-gathers within the NVLink domain."
  common_mistake: |
    **The Pitfall:** Blaming NCCL software configurations or attempting to rewrite the model architecture.
    **The Rationale:** Neglecting the staggering speed-of-light delta between intra-server meshing and inter-server cabling.
    **The Consequence:** Cutting total multi-million dollar GPU cluster utilization in half while endlessly debugging drivers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B FP16 Model: 140 GB.
       - NVLink 4.0: 900 GB/s.
       - InfiniBand NDR: 50 GB/s.
    2. **Calculations:**
       - Payload = 2 * (7/8) * 140 GB = 245 GB.
       - Local NVLink Transfer = 245 / 900 = 0.27 s.
       - Remote IB Transfer = 245 / 50 = 4.9 s.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound**. Passing the 4.9s bottleneck across the inter-server boundary imposes an 18x latency hike, fundamentally freezing compute ops.
