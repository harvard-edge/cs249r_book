id: cloud-sus-62026
title: TB-Scale Embedding Table Sharding
topic: recommendation-systems-engineering
status: published
provenance: human
scenario: You have 50 embedding tables with sizes ranging from 1 GB to 2 TB (total 20 TB). You must shard them across 128 A100 GPUs, with 10 TB fitting in GPU HBM across the cluster. The remaining 10 TB must live in CPU DRAM.
question: Design the sharding strategy to minimize P99 lookup latency. What determines which tables go to GPU vs CPU?
details:
  realistic_solution: 'Partition tables by access frequency × embedding dimension (i.e., bandwidth demand per second). Hot tables — those accessed in every request or with high lookup frequency — belong on GPU HBM for low-latency access (A100 HBM: ~2 TB/s). Cold tables (accessed in <10% of requests) go to CPU DRAM (DDR5: ~50 GB/s aggregate across CPUs). For tables that exceed single-GPU capacity: row-wise sharding (each GPU holds a contiguous range of rows) minimizes cross-GPU communication for any single lookup. For small hot tables that fit in GPU HBM: replicate on all GPUs to eliminate all-to-all communication for those lookups. Final strategy: (1) Sort tables by QPS × row_size_bytes. (2) Place top tables on GPU until 80% of cluster HBM is used (10 TB × 0.8 = 8 TB). (3) Remaining on CPU DRAM with prefetch pipeline. (4) Replicate tables < 100 MB on all 128 GPUs if they appear in every request.'
  common_mistake: |
    **The Pitfall:** Sharding by table size alone — putting large tables on CPU and small tables on GPU.
    **The Rationale:** Assuming large capacity implies large tables belong there, ignoring bandwidth requirements.
    **The Consequence:** Hot tables on CPU bottleneck on PCIe/DRAM bandwidth, severely degrading P99 lookup latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 A100s = 10.24 TB HBM total.
       - Reserve 20% for activations/gradients: 8.2 TB usable for embeddings.
       - CPU DRAM capacity: Ample (e.g., 128 nodes × 512 GB = 65 TB).
    2. **Calculations:**
       - A100 HBM bandwidth: ~2 TB/s. CPU DDR5 bandwidth: ~50 GB/s.
       - GPU lookup latency: ~5 μs. CPU lookup latency: ~100 μs.
       - P99 < 10 ms serving requires CPU lookups to be pipelined and low-frequency.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Placement must be decided by QPS × row_size_bytes. Hot tables on GPU, cold on CPU.
