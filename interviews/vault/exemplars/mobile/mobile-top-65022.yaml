id: mobile-top-65022
title: Multi-Chiplet Thermal Throttle Recovery for Mobile Gaming
topic: chiplet-architecture
status: published
provenance: human
scenario: A mobile gaming application running AI-enhanced rendering on a Dimensity 9300-class chiplet experiences thermal throttling after 15 minutes of gameplay. NPU utilization drops from 85% to 40% while the CPU governor stays at max.
question: Describe the throttling cascade and how to redesign the thermal workload schedule.
details:
  realistic_solution: "Re-architect with Energy Aware Scheduling (EAS) mapping to Android's `IThermal HAL 2.0`. Force physical core parking on 2 of the 4 Cortex-X4s. Subtly drop base GPU shading resolution to yield thermal clearance for the NPU upscaler, preemptively capping loads based on skin thermistors."
  common_mistake: |
    **The Pitfall:** Managing the CPU and NPU as distinct, unrelated thermal vectors.
    **The Rationale:** Utilizing discrete PC cooling logic rather than acknowledging a highly constrained, monolithic mobile SoC TDP.
    **The Consequence:** Overdriven CPUs saturate the die package, initiating an aggressive, arbitrary thermal daemon throttle that ruins ML processing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dimensity TDP: 10 W.
       - Unthrottled Profile: CPU 5W, GPU 4W, NPU 2W.
    2. **Calculations:**
       - Total Load = 5W + 4W + 2W = 11 W (Exceeds by 1W).
       - System Reaction = NPU slashed from 2W to 1W (42% utilization).
       - New EAS Target = CPU 3.5W + GPU 4W + NPU 2W = 9.5 W.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound**. Cutting 1.5W from the CPU completely removes the package bottleneck, fully restoring the NPU to max throughput.
