title: 'Optimizing Object Detection on Google Tensor G3: Operator Scheduling for MobileNetV3-SSD vs. EfficientDet-Lite'
topic: operator-scheduling
status: published
provenance: human
scenario: An ML engineering team is deploying a real-time object detection model on a Google Tensor G3. They must choose between a MobileNetV3-SSD variant and an EfficientDet-Lite variant.
question: Describe how you would analyze and optimize the execution of these models through operator scheduling, and recommend which model is likely to achieve better throughput.
details:
  realistic_solution: "Mandate EfficientDet-Lite due to structural superiority. Leverage BiFPN's dense repeating topology to force aggressive custom kernel fusions (Conv-BN-ReLU). Exploit its 350MB footprint to heavily alias intermediate buffers, bypassing expensive LPDDR5X round-trips via strictly localized TPU pipelining."
  common_mistake: |
    **The Pitfall:** Determining model supremacy based entirely on theoretical GFLOPS overheads.
    **The Rationale:** Neglecting that physical memory transfer rates utterly dominate high-GFLOP mobile executions.
    **The Consequence:** Deploying Model A leading to devastating DDR bandwidth saturation and catastrophic FPS collapse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor G3: 7.5 TOPS.
       - MobileNetV3: 5 GFLOPS, 500 MB RAM.
       - EfficientDet: 3 GFLOPS, 350 MB RAM.
       - DDR5: 60 GB/s.
    2. **Calculations:**
       - Theoretical FPS (MBv3) = 7500 / 5 = 1500 FPS.
       - Transfer Cost (MBv3, 10 hops) = 5 GB / 60 GB/s = 83 ms -> 12 FPS Limit.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. The 83ms data-movement tax proves that theoretical compute throughput is entirely suppressed by physical DRAM limits, strongly favoring Model B.
