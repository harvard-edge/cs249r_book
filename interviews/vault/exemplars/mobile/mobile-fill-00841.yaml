title: Optimizing LLM Deployment on Snapdragon Hexagon NPU with Structured Pruning
topic: pruning-sparsity
status: published
provenance: human
scenario: You are tasked with deploying an LLM on a Snapdragon 8 Gen 3 Hexagon NPU. Initial experiments with unstructured magnitude pruning reduced model size by 80% but yielded minimal speedup on the NPU.
question: Describe how you would approach structured pruning to achieve significant inference speedups on the Hexagon NPU while minimizing accuracy loss.
details:
  realistic_solution: "Enforce strictly mapped N:M structured sparsity (e.g., 2:4 blocks) calibrated for Qualcomm's AI Engine Direct. Align sparse matrices to fit the 128/256-byte vector registers to guarantee instruction skips. Iterate pruning dynamically with Knowledge Distillation and benchmark purely via `snpe-net-run`."
  common_mistake: |
    **The Pitfall:** Depending on unaligned unstructured sparsity metrics to deliver physical acceleration.
    **The Rationale:** Unawareness that dense NPU arithmetic units cannot exploit scattered zero-values without immense branch divergence.
    **The Consequence:** Generating a heavily pruned model that operates at the identical latency as the unpruned baseline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - IO Dims: [1, 256, 512], Weight: [512, 1024].
       - NPU Peak: 45 TOPS INT8.
    2. **Calculations:**
       - Base MACs = 256 * 512 * 1024 = 134.2 M MACs.
       - 2:4 Structured Sparse MACs = 134.2M / 2 = 67.1 M MACs.
       - Dense Latency = 134.2M / 45T = ~0.003 ms.
       - Sparse Latency = 67.1M / 45T = ~0.0015 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. Structured sparsity physically collapses the MAC trajectory by 50%, enabling pure architectural acceleration.
