title: On-device Adversarial Attack Mitigation for Google Tensor G3 ML Model
topic: adversarial-robustness
status: published
provenance: human
scenario: You are designing a critical on-device image classification model for a Google Pixel phone equipped with the Tensor G3 chip. A new adversarial attack vector can consistently fool the model with imperceptible perturbations.
question: How would you design a robust defense strategy that mitigates this adversarial threat while maintaining real-time performance and minimizing energy consumption?
details:
  realistic_solution: "Embed Quantization-Aware Adversarial Training natively into the INT8 flow. Execute cheap, destructive transformations (JPEG compression/TV reduction) upstream on the CPU. Station a micro-anomaly detection (AED) agent on the TPU bounded strictly to fractional utilization limits."
  common_mistake: |
    **The Pitfall:** Mandating heavy PGD defense networks or continuous full-scale runtime verification.
    **The Rationale:** Porting unlimited-compute cloud defense logic directly to 7.5 TOPS mobile architectures.
    **The Consequence:** Smashing the TPU budget, inducing profound thermal spikes and completely depleting the device battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cadence: 30 FPS.
    - Primary Model: 100 GMACs/frame.
    - TPU Capacity: 3,750 GMACs/s (INT8).

    **Calculations:**
    - Primary Load = 30 * 100 = 3,000 GMACs/s.
    - Remaining Overhead = 750 GMACs/s.
    - Defense Budget Limit = 750 / 30 = 25 GMACs/frame.

    **Conclusion & Interpretation:**
    - **Result: 25 GMACs/frame (Compute-Bound)**. Adding defensive operations beyond 25 GMACs per frame inherently breaches the 3,750 GMACs limit, causing guaranteed hardware throttling.
