title: Graceful Degradation Architectures for TinyML on ESP32-S3
topic: graceful-degradation
status: published
provenance: human
scenario: You are tasked with deploying a real-time predictive maintenance system on an ESP32-S3 microcontroller. Your primary anomaly detection model is a complex LSTM-based autoencoder requiring 4.5 MB of PSRAM. The system must operate reliably under varying operational loads and maintain a minimum level of service even when resources are constrained.
question: Propose and compare two distinct architectural approaches for implementing graceful degradation in this TinyML application.
details:
  realistic_solution: "Implement a Multi-stage Degradation Ladder with QoS shedding, falling back to a highly quantized CNN. Alternatively, deploy a Fail-Operational architecture utilizing a pre-quantized MLP and a separate rule-based watchdog completely isolated in internal SRAM for hard fail-safes."
  common_mistake: |
    **The Pitfall:** Overlooking the vast access latency and capacity disparities between internal SRAM and external PSRAM.
    **The Rationale:** Treating edge memory as a flat unified pool rather than a rigid hierarchy.
    **The Consequence:** Fallback states trigger PSRAM thrashing, causing catastrophic real-time deadline misses during critical failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary LSTM: 4.5 MB PSRAM, 180 ms latency.
    - Target Fallback CNN: ~1 MB PSRAM, ~60 ms latency.
    - Fail-Safe Rule-based: <100 KB SRAM, <5 ms latency.

    **Calculations:**
    - Latency Drop (CNN Fallback) = 180 ms / 60 ms = 3x speedup.
    - Memory Saved (CNN Fallback) = 4.5 MB - 1.0 MB = 3.5 MB.

    **Conclusion & Interpretation:**
    - **Result: 3x speedup (Compute-Bound)**. Degrading to the CNN delivers a 3x speedup, ensuring the execution stays within critical timing envelopes under thermal load.
