title: The Energy-Neutral Wildlife Camera
topic: duty-cycling
status: published
provenance: human
scenario: You're designing a remote wildlife camera using a Cortex-M4 powered by a small solar panel that provides an average of 1 mW. The device has two states: active (consuming 50 mW) and deep sleep (consuming 10 uW). To remain energy-neutral, the average power consumption over its duty cycle must not exceed the panel's supply.
question: For a 60-second cycle period, calculate the maximum time the camera can be in the active state.
details:
  realistic_solution: "Calculate the energy budget using the duty cycle weighted sum: P_avg = (P_active * t_active + P_sleep * t_sleep) / T. Ensure P_avg <= P_solar. Account for battery buffering capacity (e.g., Li-Po storage limits) to handle nighttime and shade operations."
  common_mistake: |
    **The Pitfall:** Ignoring deep sleep power consumption in the duty cycle calculation.
    **The Rationale:** Assuming 10 uW is completely negligible, forgetting that over a massive idle duration, sleep power establishes the baseline drain.
    **The Consequence:** Long-term battery depletion leading to total remote device blackout.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle Time (T): 60 s
    - P_solar (avg): 1 mW
    - P_active: 50 mW
    - P_sleep: 0.01 mW (10 uW)

    **Calculations:**
    - 1 mW = (50 * t_active + 0.01 * (60 - t_active)) / 60
    - 60 = 50 * t_active + 0.6 - 0.01 * t_active
    - 59.4 = 49.99 * t_active
    - t_active = 1.188 s

    **Conclusion & Interpretation:**
    - **Result: 1.188 s (Power-Bound)**. The active duration is hard-capped at 1.188 seconds (~1.98% duty cycle) to guarantee energy neutrality.
