title: 'Real-Time Gesture Recognition on Nordic nRF5340: Meeting 30ms Latency Budgets'
topic: real-time-deadlines
status: published
provenance: human
scenario: You are developing a wearable device for continuous gesture recognition using a Nordic nRF5340 SoC. The system needs to infer a gesture every 30ms. Concurrently, BLE communication for data logging is active, triggered by an interrupt-driven pipeline every 10ms.
question: How would you design and optimize the ML inference pipeline to meet the strict 30ms end-to-end latency budget?
details:
  realistic_solution: "Execute rigorous on-target WCET analysis via hardware counters. Manage preemption by strictly elevating BLE interrupt priorities but tightly bounding handler duration. Schedule ML inference via Zephyr RTOS as a high-priority compute thread and leverage CMSIS-NN INT8 optimization to crush active cycle time."
  common_mistake: |
    **The Pitfall:** Designing to average-case inference latency while completely ignoring RTOS interrupt preemption.
    **The Rationale:** Applying isolated Linux process intuition to a bare-metal, interrupt-heavy embedded environment.
    **The Consequence:** Spiky inference jitter and dropped frames whenever the BLE stack claims the CPU during critical ML forward passes.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA Deadline: 30 ms.
    - CPU Clock: 128 MHz.
    - FP32 Model Cost: 5,000,000 cycles.
    - BLE Preemption Overhead: 5 ms per window.

    **Calculations:**
    - Effective Compute Window = 30 ms - 5 ms = 25 ms.
    - FP32 Baseline Latency = 5M / 128M = 39.06 ms (Fails).
    - INT8 Optimization (4x) = 39.06 ms / 4 = 9.76 ms.

    **Conclusion & Interpretation:**
    - **Result: 9.76 ms (Compute-Bound)**. The raw FP32 model wildly misses the 25ms preemptible window; INT8 quantization safely isolates the 9.76ms inference from BLE starvation.
