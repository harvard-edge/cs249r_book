id: tinyml-fill-00361
title: Latency Decomposition and Optimization for Real-time TinyML on ESP32-S3
topic: latency-decomposition
status: published
provenance: human
scenario: You are tasked with deploying a real-time keyword spotting model on an ESP32-S3, aiming for an end-to-end latency of under 100ms. The system flow involves audio acquisition, MFCC feature extraction, model inference, and sending a JSON payload via MQTT over Wi-Fi.
question: Describe how you would systematically decompose and analyze the end-to-end latency, identify potential bottlenecks at each stage, and propose concrete optimization strategies to meet the 100ms target.
details:
  realistic_solution: "Deploy `nsys profiling` or FreeRTOS tracing for strict latency isolation. Map MFCC buffers to fast internal SRAM and utilize DMA for I2S audio offload. Quantize to INT8 via TFLite Micro and compress MQTT payloads to satisfy the end-to-end timing budget."
  common_mistake: |
    **The Pitfall:** Optimizing only the ML inference matrix operations while entirely ignoring I/O and memory movement.
    **The Rationale:** Anchoring onto FLOPs metrics instead of accounting for physical memory bandwidth limits in embedded architectures.
    **The Consequence:** Failing real-time deadlines because sensor acquisition and network protocols silently dominate the critical path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: < 100 ms.
       - PSRAM Bandwidth: ~100 MB/s (Octal SPI).
       - Model Size: 2 MB.
    2. **Calculations:**
       - Memory Load Time = 2 MB / 100 MB/s = 20 ms.
       - Remaining Overhead Budget = 100 ms - 20 ms = 80 ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Loading the model alone exhausts 20% of the SLA. Execution must leverage strict SRAM pinning or streaming to guarantee the 100ms KWS threshold.
