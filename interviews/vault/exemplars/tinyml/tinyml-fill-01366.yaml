title: ASIL-C ML Safety on Cortex-M7 + Ethos-U55 for Automotive
topic: safety-certification
status: published
provenance: human
scenario: You are designing an embedded ML system for an ASIL-C certified automotive sensor fusion module. This module runs on a Cortex-M7 processor paired with an Ethos-U55 NPU, leveraging 512 KB SRAM for object detection.
question: Given the strict requirements of ISO 26262 ASIL-C, how would you architect the system to ensure functional safety for the ML inference pipeline?
details:
  realistic_solution: "Deploy deterministic heterogeneous redundancy. Lock dynamic allocations. Program hardware watchdogs matched to the FTTI limit. Run BIST at power-on and inject continuous golden-reference hashes at runtime to instantly flag NPU corruption, reverting to an MRC state upon verification failure."
  common_mistake: |
    **The Pitfall:** Allowing unbounded floating-point math or dynamic memory allocation (`malloc`) in the critical pipeline.
    **The Rationale:** Treating ASIL-C certified automotive environments like generic cloud deployments without static verification requirements.
    **The Consequence:** Unpredictable latency jitter and catastrophic memory fragmentation triggering a total brake-logic failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ethos-U55 Throughput: 122.88 GMAC/s.
       - Model Workload: 80 MMACs.
       - FTTI Limit: 50 ms.
       - Diagnostic Overhead: 5 ms.
    2. **Calculations:**
       - Inference Time = 80M / 122.88G = 0.65 ms.
       - Total Cycle Time = 0.65 ms + 5 ms = 5.65 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. The 5.65ms execution effortlessly clears the 50ms FTTI deadline, shifting the system constraint entirely to the strict 512KB SRAM footprint.
