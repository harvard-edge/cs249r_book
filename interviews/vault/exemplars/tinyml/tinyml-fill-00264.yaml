id: tinyml-fill-00264
title: Optimizing CNN Memory Footprint on ARM Cortex-M4 for TinyML
topic: tensor-arena-planning
status: published
provenance: human
scenario: You are tasked with deploying a convolutional neural network (CNN) model for image classification onto an ARM Cortex-M4 STM32F4 microcontroller. The model has a peak memory requirement of 200 KB for intermediate tensors during inference. Your team has decided to use a flat tensor arena for memory allocation to minimize dynamic memory overhead.
question: Describe how you would analyze the memory layout and operator scheduling to ensure the model fits within the available SRAM, considering the implications of placing certain data in flash versus SRAM.
details:
  realistic_solution: "Execute detailed profiling with TFLite Micro memory planner. Perform aggressive operator scheduling to minimize live tensor bounds. Statically allocate a flat memory arena in the SRAM, explicitly segregating RO weights to Flash."
  common_mistake: |
    **The Pitfall:** Ignoring peak intermediate tensor requirements during execution.
    **The Rationale:** Applying cloud-native dynamic memory heuristics to an embedded system with strict static allocation bounds.
    **The Consequence:** Hard OOM faults at runtime when activations exceed the static arena.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Limit: 256 KB.
    - System Overhead: 30 KB.
    - Peak Tensors: 200 KB.

    **Calculations:**
    - Arena Size = 256 KB - 30 KB = 226 KB.
    - Margin = 226 KB - 200 KB = 26 KB.

    **Conclusion & Interpretation:**
    - **Result: 26 KB margin (Memory-Bound)**. The system safely supports the 200 KB peak with a 26 KB margin, provided weights reside exclusively in Flash.
