title: Optimizing a TinyML Model for Nordic nRF5340 Constraints
topic: mcu-compute-constraints
status: published
provenance: human
scenario: You are tasked with deploying a real-time anomaly detection model on a Nordic nRF5340 microcontroller. The model must process sensor data at 100 Hz, with inference latency under 10ms.
question: Given these stringent compute limits, how would you approach optimizing the model and its deployment to meet the performance and memory requirements?
details:
  realistic_solution: "Perform Quantization-Aware Training (QAT) to lock the model to INT8. Leverage ARM CMSIS-NN directly to exploit Cortex-M33 DSP extensions for vectorized MACs. Enforce strict in-place execution planning to eliminate intermediate VRAM allocations."
  common_mistake: |
    **The Pitfall:** Deploying floating-point graphs or relying on native PTQ without mapping to hardware-specific integer kernels.
    **The Rationale:** Misunderstanding the severe cycle penalty of soft-float emulation on MCUs lacking physical FPUs.
    **The Consequence:** Orders-of-magnitude slower execution, immediately breaking the 10ms SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Frequency: 128 MHz (no FPU).
    - Inference Deadline: 10 ms (100 Hz).

    **Calculations:**
    - Cycle Budget = 128 MHz * 0.010 s = 1.28 million cycles.
    - FP Emulation Rate = ~30 cycles/MAC -> ~42k MACs max.
    - CMSIS-NN INT8 SIMD Rate = ~4 MACs/cycle -> ~5.12M MACs max.

    **Conclusion & Interpretation:**
    - **Result: 5.12M MACs (Compute-Bound)**. The strict 10ms window dictates a hard cap on MACs, absolutely mandating INT8 SIMD execution via CMSIS-NN to be viable.
