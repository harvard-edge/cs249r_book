schema_version: 1
id: tinyml-fill-01337
title: Graceful Degradation Architectures for TinyML on ESP32-S3
topic: graceful-degradation
status: published
provenance: human
scenario: "You are tasked with deploying a real-time predictive maintenance system on an ESP32-S3 microcontroller,\
  \ specifically for anomaly detection in sensor data from industrial machinery. The ESP32-S3 features\
  \ a 240 MHz dual-core processor, 512 KB of internal SRAM, and 8 MB of external PSRAM. Your primary anomaly\
  \ detection model is a complex LSTM-based autoencoder that requires approximately 4.5 MB of PSRAM for\
  \ its weights and intermediate activations, and utilizes both CPU cores significantly, resulting in\
  \ a typical inference latency of 180 ms. The system must operate reliably under varying operational\
  \ loads and maintain a minimum level of service even when resources are constrained (e.g., due to peak\
  \ processing, thermal throttling) or the primary model encounters issues. \n\nPropose and compare two\
  \ distinct architectural approaches for implementing graceful degradation in this TinyML application.\
  \ For each approach, describe:\n1. The specific mechanisms for detecting performance degradation or\
  \ failure.\n2. The fallback strategies employed (e.g., degradation ladders, model fallbacks, QoS shedding,\
  \ fail-safe modes).\n3. How each approach leverages (or is limited by) the ESP32-S3's hardware specifications\
  \ (CPU, internal SRAM, external PSRAM).\n4. Analyze their trade-offs in terms of reliability, resource\
  \ utilization (memory and CPU), power consumption, and implementation complexity, justifying which approach\
  \ is more suitable for a critical industrial application on the ESP32-S3."
details:
  realistic_solution: "A realistic solution would involve a well-defined multi-tiered degradation ladder\
    \ combined with proactive monitoring. \n\n**Approach 1: Multi-stage Degradation Ladder with QoS Shedding**\n\
    - **Detection:** Continuously monitor CPU load (e.g., average over 10s), inference latency, and available\
    \ PSRAM. Triggers could be: CPU load >85% for 5s, average inference latency >250ms, or PSRAM free\
    \ <1MB.\n- **Fallback:**\n    - **Level 0 (Primary):** Full LSTM autoencoder (4.5 MB PSRAM, 180 ms\
    \ latency).\n    - **Level 1 (High Load/Latency):** Switch to a smaller, quantized CNN or a simple\
    \ statistical model (e.g., Exponential Moving Average with adaptive threshold) that uses <1 MB PSRAM\
    \ (or fits entirely in SRAM for critical parts) and has <60 ms latency. Simultaneously, implement\
    \ QoS shedding by reducing sensor sampling rate by 50%.\n    - **Level 2 (Critical Load/Failure):**\
    \ Fallback to a highly optimized, rule-based anomaly detection (e.g., fixed thresholds on derivative\
    \ of sensor data) that resides entirely in SRAM (<100KB) and has <5 ms latency. Further reduce sampling\
    \ rate or disable non-critical features.\n- **Hardware Leverage:** Uses PSRAM for larger models, internal\
    \ SRAM for critical, ultra-fast fallbacks. Dual-core CPU allows dedicated monitoring thread on one\
    \ core, ML inference on the other.\n\n**Approach 2: Fail-Operational with Dedicated Fail-Safe and\
    \ Model Fallback**\n- **Detection:** A dedicated watchdog timer, regular self-diagnostics of the primary\
    \ model (e.g., output sanity checks), and monitoring for critical resource exhaustion (e.g., PSRAM\
    \ allocation failures).\n- **Fallback:**\n    - **Primary Model:** LSTM autoencoder. Runs in parallel\
    \ with a very lightweight, fail-safe heuristic.\n    - **Model Fallback (Primary Model Issue):** If\
    \ the primary model's output is consistently invalid or it crashes, switch to a pre-loaded, pre-quantized\
    \ small MLP model (~500KB PSRAM, ~40ms latency) as a secondary detection mechanism.\n    - **Fail-Safe\
    \ (System-Wide Failure):** A separate, highly robust and simple thresholding logic, compiled to internal\
    \ SRAM, that continuously monitors raw sensor data and can trigger a critical alert even if all ML\
    \ components fail. This acts as an independent fail-operational layer.\n- **Hardware Leverage:** Prioritizes\
    \ SRAM for the fail-safe, ensuring its operation. Utilizes PSRAM for primary and fallback ML models.\
    \ Dual-core for parallel execution of primary ML and fail-safe logic, enhancing operational safety.\n\
    \n**Comparison:** Approach 1 offers smoother performance degradation but is more complex to manage\
    \ state transitions and requires careful threshold tuning. Approach 2 prioritizes absolute safety\
    \ with a dedicated, isolated fail-safe, making it potentially more robust for truly critical applications,\
    \ though it might be less 'graceful' in intermediate degradation stages. For a critical industrial\
    \ application, Approach 2's emphasis on a guaranteed fail-safe is often preferred, with the small\
    \ MLP as a valuable intermediate fallback. This ensures the system never completely loses its ability\
    \ to detect critical anomalies, even at the cost of sophistication."
  common_mistake: Candidates often overlook the severe memory constraints of TinyML, particularly the
    distinction and optimal usage of internal SRAM vs. external PSRAM on the ESP32-S3. Common mistakes
    include proposing fallback models that are still too large for available memory or too computationally
    intensive for the CPU when under stress, failing to define clear, measurable triggers for degradation,
    or not accounting for the overhead of dynamic model swapping or state management across degradation
    levels. Another error is neglecting the importance of a robust, ultra-lightweight fail-safe mechanism
    that can operate even when all ML models fail.
  napkin_math: '**Primary Model (LSTM):** 4.5 MB PSRAM for weights/activations. Inference: 180 ms. CPU:
    High utilization on both cores.


    **Approach 1 - Level 1 Fallback (CNN/Statistical):**

    - **Memory:** If a MobileNetV2-like model is used, typically ~0.5-1 MB PSRAM. Reduces memory footprint
    by ~3.5-4 MB for model weights. If simple statistical, could be <100 KB SRAM.

    - **Latency:** ~30-60 ms. Reduces latency by ~3-6x.

    - **CPU:** ~20-40% utilization. Significant CPU cycle savings, allowing for more processing headroom
    or lower power.


    **Approach 1 - Level 2 Fallback (Rule-based):**

    - **Memory:** <100 KB internal SRAM. Negligible PSRAM usage.

    - **Latency:** <5 ms. Near real-time response.

    - **CPU:** <10% utilization. Minimal power consumption.


    **Approach 2 - Model Fallback (Small MLP):**

    - **Memory:** ~0.5 MB PSRAM.

    - **Latency:** ~40 ms.

    - **CPU:** ~30% utilization.


    **Approach 2 - Fail-Safe (Thresholding Logic):**

    - **Memory:** <50 KB internal SRAM (code + data).

    - **Latency:** <1 ms.

    - **CPU:** <5% utilization. Guarantees operation under extreme conditions.'
