title: Model Format Conversion End-to-End ONNX to Hailo-8 Conversion Pipeline Mastery
topic: model-format-conversion
status: published
provenance: human
scenario: You are converting a custom PyTorch detection model (30M params) to run on a Hailo-8 accelerator.
question: Walk through the full conversion pipeline, identifying failure points, quantifying the accuracy-performance tradeoff, and sizing the resulting HEF file.
details:
  realistic_solution: "Pin explicit static shapes and validate via `onnx.checker`. Mutate unsupported ops (e.g., custom GELU to SiLU). Feed 1000 domain-specific images into the Hailo Dataflow Compiler for INT8 PTQ mapping (expecting ~1% mAP deg). Finalize into a tightly compressed HEF payload (~20MB)."
  common_mistake: |
    **The Pitfall:** Pushing ONNX graphs with dynamic axes or unrolled control-flow directly into the compiler.
    **The Rationale:** Expecting the Hailo DFC to behave like a JIT-compiled CPU runtime instead of a statically placed spatial architecture.
    **The Consequence:** Irrecoverable parsing aborts during compilation, completely blocking ASIC deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator: Hailo-8 (26 TOPS).
    - Complexity: ~15 GFLOPs per frame.
    - INT8 Params: 30M (30 MB).

    **Calculations:**
    - Peak FPS Limit = 26 TOPS / 15 GFLOPs = ~1733 FPS.
    - Theoretical Framing = 1000 ms / 1733 = ~0.57 ms/frame.

    **Conclusion & Interpretation:**
    - **Result: ~0.57 ms/frame (Memory-Bound)**. While compute guarantees 1700+ FPS, real-world throughput is bottlenecked physically by the bandwidth required to flush the 30MB parameter array.
