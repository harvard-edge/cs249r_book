id: edge-cell-12050
title: 'Model Format Conversion: End-to-End ONNX to Hailo-8 Conversion Pipeline Mastery'
topic: model-format-conversion
status: published
provenance: human
scenario: 'You are converting a custom PyTorch detection model (30M params, mixed depthwise and standard
  convolutions) to run on Hailo-8 (26 TOPS INT8, 2.5W). Walk through the full conversion: PyTorch → ONNX
  → Hailo Dataflow Compiler (HEF format). Identify which layer types cause conversion failures, quantify
  the accuracy-performance tradeoff from INT8 quantization, and size the resulting HEF file.'
details:
  realistic_solution: 'ONNX export: fix dynamic shapes (set batch=1, H=640, W=640). Validate with onnx.checker.
    Unsupported on Hailo: custom GELU activation → replace with RELU6 or SiLU. INT8 PTQ: calibrate on
    1000 representative images. Accuracy drop: typically 0.5-2% mAP for detection models. HEF file size:
    30M params × 1 byte (INT8) = 30MB. Hailo compiler compresses: ~20MB HEF. Performance: 30M params ×
    1 byte / 2.5W chip → fits in Hailo-8L? Hailo-8 supports up to 200MB models. Inference at 26 TOPS:
    model FLOPs for 640×640 input ≈ 15 GFLOPs. 15G/26T = 0.58ms/frame = 1724 fps.'
  common_mistake: Not validating the ONNX graph before attempting Hailo conversion; dynamic shapes, unsupported
    ops (e.g., custom attention), and non-static control flow all cause compiler failures.
  napkin_math: 'Model: 30M INT8 params = 30MB weights. FLOPs (30M param detector with 640×640): typically
    5-10× params in MACs = 150-300M MACs? No: FLOPs scale with spatial size. A 30M param model doing 640×640
    detection: ~15 GFLOPs. Hailo-8 at 26 TOPS: 15G/26T = 577μs/frame = 1732 fps. Real throughput limited
    by memory: 30MB weights / effective BW. HEF: INT8 compressed ~18MB.'
