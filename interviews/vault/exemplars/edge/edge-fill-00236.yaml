id: edge-fill-00236
title: Optimizing Large Language Model Deployment on NVIDIA Jetson Orin with Activation Memory Constraints
topic: activation-memory
status: published
provenance: human
scenario: You are tasked with deploying a 10 billion parameter LLM on an NVIDIA Jetson Orin. Intermediate activations significantly exceed the available 32 GB LPDDR5 memory.
question: Design a strategy leveraging activation memory optimization techniques to achieve maximum throughput while respecting the 60W power budget and memory limit.
details:
  realistic_solution: "Apply INT8 PTQ across parameters and activations to fully map to Orin's 275 TOPS pipeline. Enforce selective activation checkpointing to recompute volatile forward-pass tensors dynamically. Employ FlashAttention-2 and TensorRT graph fusion to obliterate transient VRAM allocation overhead."
  common_mistake: |
    **The Pitfall:** Re-using standard training gradient checkpointing methodologies directly in the inference path.
    **The Rationale:** Misunderstanding that inference completely lacks the backward-pass state retention requirement.
    **The Consequence:** Crippling the Orin with unnecessary recomputation loops, blowing past latency SLAs and triggering 60W thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Params: 10B (FP16 takes 20 GB).
       - Memory Cap: 32 GB (12 GB remains for activations).
       - Raw Activation Need: ~3x params (30 GB in INT8).
    2. **Calculations:**
       - Activation Deficit = 30 GB - 12 GB = 18 GB.
       - Compression Factor = 30 GB / 12 GB = 2.5x reduction.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Facing a 2.5x storage deficit, the architecture mandates severe activation checkpointing, trading Orin's surplus INT8 TOPS for memory viability.
