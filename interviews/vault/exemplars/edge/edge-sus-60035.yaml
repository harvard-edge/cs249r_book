id: edge-sus-60035
title: Optimizing memory layout of saved tensors for backward on constrained Jetson Orin
topic: autograd-computational-graphs
status: published
provenance: human
scenario: You are training a custom depthwise separable convolution model on Jetson Orin. Profiling shows that 60% of backward pass time is spent on memory transfers between CPU and GPU for saved activation tensors.
question: How do you optimize the memory layout of saved tensors to prevent CPU offloading bottlenecks?
details:
  realistic_solution: "Disable implicit coherency swaps. Hard-pin tensor pools using `torch.cuda.memory.set_per_process_memory_fraction()` to enforce rigid bounds. Implement `torch.utils.checkpoint` to discard and recompute trivial activations (ReLUs, Norms). Audit anomalies via `torch.cuda.memory_snapshot()`."
  common_mistake: |
    **The Pitfall:** Leaning entirely on PyTorch's native automatic VRAM offloading without explicit memory confinement.
    **The Rationale:** Mistaking unified physical memory for a zero-cost coherent mapping space.
    **The Consequence:** PCIe-equivalent cache thrashing that consumes 60% of epoch time and paralyzes distributed training speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin Unified Bandwidth: ~200 GB/s.
    - Offload Size: 500 MB per swap.
    - Frequency: 50 swaps per backward.

    **Calculations:**
    - Swap Latency = 500 MB / 200 GB/s = 2.5 ms (one-way).
    - Total Waste = 5 ms (RTT) * 50 = 250 ms.
    - Recomputation Cost = ~50 ms.

    **Conclusion & Interpretation:**
    - **Result: 200 ms saved (I/O-Bound)**. Checkpointing obliterates the 250ms coherency transfer penalty, yielding a net 200ms acceleration per backward step.
