schema_version: 1
id: edge-new-50037
title: 'Model Format Conversion Fidelity: PyTorch to CoreML to ONNX Round-Trip'
topic: software-portability
status: published
provenance: human
scenario: You convert a PyTorch segmentation model to CoreML, then export the CoreML model to ONNX. The round-trip PyTorch to CoreML to ONNX produces different outputs than direct PyTorch to ONNX, with a max diff of 0.05 in FP32.
question: What is the cause of this discrepancy and how should the deployment workflow be corrected?
details:
  realistic_solution: "Halt cyclic conversions. Intermediate transformation layers inside `coremltools` inject lossy precision cascades and unsupported operator fallbacks. Define PyTorch as the strict single-source-of-truth and export terminal graphs (`torch.onnx.export` and `coremltools.convert`) orthogonally."
  common_mistake: |
    **The Pitfall:** Treating graph formats (CoreML/ONNX) as mathematically isomorphic representations.
    **The Rationale:** Misunderstanding that IR compilers silently mutate node semantics and precision structures during transpilation.
    **The Consequence:** Compounding arithmetic drift that quietly destroys the statistical accuracy of the deployed edge model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Precision Domain: FP32.
    - FP32 Machine Epsilon: ~1.19e-7.
    - Max Output Diff: 0.05.

    **Calculations:**
    - Drift Ratio = 0.05 / 1.19e-7 = 420,168x Epsilon.
    - Expected Normal Drift = < 1e-5 (~84x Epsilon).

    **Conclusion & Interpretation:**
    - **Result: 420,168x Epsilon (Software-Bound)**. A 420,000x epsilon drift explicitly confirms catastrophic graph corruption, proving the conversion pipeline is structurally invalid.
