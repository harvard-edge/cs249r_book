title: Hailo-8 Edge Power Budgeting for Perception
topic: power-budgeting
status: published
provenance: human
scenario: A self-driving car manufacturer is integrating a perception stack onto a Hailo-8 AI accelerator. The total system power budget is 5W, and the model requires 10 TOPS for 30 FPS.
question: Describe how you would optimize the power consumption of the Hailo-8 to fit within the 5W budget.
details:
  realistic_solution: "Profile dynamically via inline shunts. Implement strict DVFS P-state throttling to clamp clock speeds precisely to the 30 FPS boundary, minimizing V^2f overhead. Aggregate inputs to saturate MAC arrays and force deep sleep transitions in the interstitial frame periods."
  common_mistake: |
    **The Pitfall:** Utilizing linear power extrapolation (e.g., 10 TOPS = 1W) and ignoring CMOS static leakage.
    **The Rationale:** Stripping away the physics of silicon baseline power draw in favor of oversimplified arithmetic.
    **The Consequence:** Surpassing the 5W hardware limit, inducing thermal throttling or sudden board-level power failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS.
    - Full Budget: 5 W.
    - Hailo-8 Allocation: 2 W.

    **Calculations:**
    - Required Energy-per-Inference (EPI) = 2 W / 30 FPS = 0.067 Joules/frame.
    - Naive Linear Draw = (10/26 TOPS) * 2.5 W = ~0.96 W (Invalid).

    **Conclusion & Interpretation:**
    - **Result: 0.067 Joules/frame (Power-Bound)**. System architecture must guarantee a maximum EPI of 0.067 J to prevent the ASIC from exceeding its rigid 2W sub-budget.
