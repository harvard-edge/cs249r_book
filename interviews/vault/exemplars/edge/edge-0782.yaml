title: The Inconspicuous Sticker Attack
topic: federated-learning
status: published
provenance: human
scenario: Your company deploys ML-powered traffic cameras. Researchers demonstrate a physical adversarial attack using a sticker that causes misclassification.
question: How would you design your edge vision system to detect and mitigate such physical-world adversarial attacks?
details:
  realistic_solution: "Deploy Total Variation (TV) preprocessing to crush adversarial gradients. Fuse visual inferences with deterministic LiDAR/Radar bounding boxes. Execute heterogeneous architectural ensembles (e.g., YOLO + ViT) in parallel, exploiting the low transferability of physical patches across diverse topological manifolds."
  common_mistake: |
    **The Pitfall:** Using standard PGD digital adversarial training to defend physical domains.
    **The Rationale:** Blindly conflating pixel-level digital noise bounds with macroscopic physical-world photometric distortions.
    **The Consequence:** Pushing computationally massive defenses that entirely fail to detect or block the real-world sticker.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS Frame Budget: 33.3 ms.
    - YOLOv5s Inference (Orin): 15 ms.
    - Preprocessing Overhead: 2 ms.

    **Calculations:**
    - Dual Ensemble Execution = (2 * 15 ms) + 2 ms = 32 ms.
    - Dual Cost Increment = 15W * 8760 hr * $0.12/kWh = $15.77/year.

    **Conclusion & Interpretation:**
    - **Result: 32 ms (Compute-Bound)**. The 32ms dual-model ensemble operates at the absolute edge of the 33.3ms budget, but secures the system for practically negligible energy costs.
