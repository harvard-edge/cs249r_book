id: edge-0800
title: The Unverifiable Edge Inference
topic: data-pipeline-engineering
status: published
provenance: human
scenario: Your company develops smart cameras for retail analytics performing on-device ML inference. Clients are concerned about the integrity and auditability of these local inferences.
question: How do you design the system to ensure data provenance and tamper-proof audit trails for on-device ML inferences with limited storage and intermittent connectivity?
details:
  realistic_solution: "Compute SHA-256 hashes for every log entry and construct an immutable Merkle tree hash chain. Batch-sign roots using the device TPM/Secure Enclave. Commit to local WORM-compliant storage and transmit signed checkpoint batches to cloud verification servers when networks reconnect."
  common_mistake: |
    **The Pitfall:** Bypassing edge protocols to stream raw, unencrypted sensor data directly to the cloud.
    **The Rationale:** Valuing cloud-native debuggability over strict edge-device privacy requirements and terrestrial network physics.
    **The Consequence:** Unmitigated GDPR violations and immediate network saturation on constrained LTE/cellular uplinks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hash Size: 32 bytes (SHA-256).
    - Base Log Entry: 100 bytes.
    - Generation Rate: 10 inf/sec.

    **Calculations:**
    - Local Write Rate = 10 * 100 bytes = 1 KB/s.
    - Hourly Batch = 1 KB/s * 3600 = 3.6 MB.
    - 30-Day Retention = 3.6 MB * 24 * 30 = 2.59 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.59 GB (Storage-Bound)**. A 2.6 GB monthly retention requires proactive disk rotation but is trivial to buffer locally during severe network outages.
