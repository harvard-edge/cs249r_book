# vault.yaml — Configuration for the StaffML vault pipeline
# All thresholds, model names, and paths in one place.
# Used by: vault.py, scripts/generate.py, ../paper/analyze_corpus.py

# ── Paths ──────────────────────────────────────────────────────
paths:
  corpus: corpus.json
  chains: chains.json
  taxonomy: taxonomy.json
  numbers: NUMBERS.md
  chroma_dir: _chroma
  reviews_dir: _reviews
  paper_dir: ../paper
  staffml_export: ../staffml/src/data/corpus.json

# ── Models ─────────────────────────────────────────────────────
# Change these to switch LLM providers.
# OpenAI models used via OPENAI_API_KEY env var.
# Gemini models used via gemini CLI.
# Anthropic models used via ANTHROPIC_API_KEY env var.
models:
  extractor: gemini-3.1-pro-preview   # Taxonomy extraction
  generator: gemini-3.1-pro-preview  # Question generation
  solver: gemini-3.1-pro-preview     # Adversarial solver (verifies generated questions)
  reviewer: gemini-2.5-flash         # Math review (fast, cheap)
  reviewer_deep: claude-opus-4-6     # Deep review (slow, thorough)
  chain_curator: gemini-2.5-flash    # Chain curation + cross-chapter edges
  cross_chapter: gemini-2.5-flash    # Cross-chapter prerequisite reasoning

# ── Generation ─────────────────────────────────────────────────
generation:
  max_parallel: 4
  questions_per_cell: 1
  timeout_seconds: 180

# ── Validation ─────────────────────────────────────────────────
validation:
  dedup_threshold: 0.85
  fuzzy_threshold: 0.90
  min_scenario_chars: 30
  min_common_mistake_chars: 10
  min_realistic_solution_chars: 5

# ── Review ─────────────────────────────────────────────────────
review:
  chunk_size: 50
  max_parallel: 8
  auto_fix: false
  error_rate_threshold: 0.02         # Block release if > 2%
  arithmetic_tolerance:
    cloud: 0.25
    edge: 0.15
    mobile: 0.10
    tinyml: 0.05
    global: 0.20

# ── Chains ─────────────────────────────────────────────────────
chains:
  min_levels: 3
  backpopulate: true                 # Write chain_ids back to corpus

# ── Coverage ───────────────────────────────────────────────────
coverage:
  min_per_cell: 3
  balance_cv_target: 0.30

# ── Release ────────────────────────────────────────────────────
release:
  steps:
    - validate
    - dedup
    - chains
    - stats
    - figures
    - export
  require_zero_errors: true
