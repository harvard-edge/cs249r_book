<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Three-Tier Assessment Model</text>
  <text x="340" y="47" text-anchor="middle" font-size="10" fill="#555">From implementation correctness to engineering mastery</text>

  <!-- ===== TIER 1: CORRECTNESS (bottom/widest) ===== -->
  <path d="M100,380 L580,380 L520,280 L160,280 Z" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="340" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Correctness</text>
  <text x="340" y="335" text-anchor="middle" font-size="10" fill="#555">40% — "Can the student implement the logic?"</text>
  <text x="340" y="355" text-anchor="middle" font-size="8.5" fill="#555">Auto-graded TinyTorch tests + Lab reflection answers</text>
  <text x="340" y="370" text-anchor="middle" font-size="8" fill="#999">600+ test cases · pytest / nbgrader · pass/fail</text>

  <!-- ===== TIER 2: SYSTEMS THINKING (middle) ===== -->
  <path d="M160,275 L520,275 L470,180 L210,180 Z" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Systems Thinking</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#555">30% — "Does the student understand why?"</text>
  <text x="340" y="252" text-anchor="middle" font-size="8.5" fill="#555">Decision Logs: 200-word engineering justifications</text>
  <text x="340" y="267" text-anchor="middle" font-size="8" fill="#999">Iron Law mapping · Quantitative evidence · Tradeoff analysis</text>

  <!-- ===== TIER 3: MASTERY (top/narrowest) ===== -->
  <path d="M210,175 L470,175 L420,90 L260,90 Z" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="117" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Mastery</text>
  <text x="340" y="137" text-anchor="middle" font-size="10" fill="#555">30% — "Can the student design under constraints?"</text>
  <text x="340" y="157" text-anchor="middle" font-size="8.5" fill="#555">Design Challenges + AI Olympics Capstone</text>
  <text x="340" y="170" text-anchor="middle" font-size="8" fill="#999">Fixed budgets · Real SLAs · Open-ended optimization</text>

  <!-- Right side labels -->
  <g font-size="8.5" fill="#555">
    <!-- Tier 1 label -->
    <rect x="590" y="310" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="625" y="327" text-anchor="middle" font-size="9" font-weight="700" fill="#4338ca">40%</text>
    <text x="625" y="341" text-anchor="middle" font-size="7.5" fill="#555">Weekly</text>
    <text x="625" y="353" text-anchor="middle" font-size="7.5" fill="#555">auto-graded</text>

    <!-- Tier 2 label -->
    <rect x="590" y="208" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="625" y="225" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">30%</text>
    <text x="625" y="239" text-anchor="middle" font-size="7.5" fill="#555">Weekly</text>
    <text x="625" y="251" text-anchor="middle" font-size="7.5" fill="#555">TA-graded</text>

    <!-- Tier 3 label -->
    <rect x="590" y="110" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="625" y="127" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">30%</text>
    <text x="625" y="141" text-anchor="middle" font-size="7.5" fill="#555">Bi-weekly +</text>
    <text x="625" y="153" text-anchor="middle" font-size="7.5" fill="#555">capstone</text>
  </g>

  <!-- Left side: Bloom's -->
  <g font-size="8" fill="#999">
    <rect x="20" y="310" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="330" text-anchor="middle" font-size="7.5" font-weight="600" fill="#555">Bloom's</text>
    <text x="55" y="344" text-anchor="middle" font-size="7.5" fill="#999">Apply</text>
    <text x="55" y="356" text-anchor="middle" font-size="7.5" fill="#999">Understand</text>

    <rect x="20" y="208" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="228" text-anchor="middle" font-size="7.5" font-weight="600" fill="#555">Bloom's</text>
    <text x="55" y="242" text-anchor="middle" font-size="7.5" fill="#999">Analyze</text>
    <text x="55" y="254" text-anchor="middle" font-size="7.5" fill="#999">Evaluate</text>

    <rect x="20" y="110" width="70" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="130" text-anchor="middle" font-size="7.5" font-weight="600" fill="#555">Bloom's</text>
    <text x="55" y="144" text-anchor="middle" font-size="7.5" fill="#999">Create</text>
    <text x="55" y="156" text-anchor="middle" font-size="7.5" fill="#999">Synthesize</text>
  </g>

  <!-- Bottom note -->
  <text x="340" y="415" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each tier tests a deeper level of understanding. Correctness alone is insufficient — systems engineers must reason about why.</text>

  <!-- Arrow: cognitive demand -->
  <line x1="10" y1="380" x2="10" y2="90" stroke="#333" stroke-width="1.2"/>
  <path d="M10,90 L7,98 L13,98 Z" fill="#333"/>
  <text x="13" y="240" font-size="7" fill="#333" font-weight="600" transform="rotate(-90,13,240)">COGNITIVE DEMAND</text>
</svg>
