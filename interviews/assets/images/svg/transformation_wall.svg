<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0F172A" />
  
  <!-- CPU Host (The Bottleneck) -->
  <rect x="40" y="80" width="160" height="240" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="3" />
  <text x="50" y="110" font-family="monospace" font-size="16" fill="#EF4444" font-weight="bold">CPU HOST</text>
  <text x="50" y="135" font-family="monospace" font-size="12" fill="#94A3B8">32 Cores @ 3.5GHz</text>
  
  <!-- Busy Work in CPU -->
  <rect x="55" y="160" width="130" height="30" rx="4" fill="#EF4444" fill-opacity="0.3" />
  <text x="60" y="180" font-family="monospace" font-size="11" fill="#FFFFFF">JPEG DECODE (30ms)</text>
  <rect x="55" y="200" width="130" height="30" rx="4" fill="#EF4444" fill-opacity="0.3" />
  <text x="60" y="220" font-family="monospace" font-size="11" fill="#FFFFFF">AUGMENT (20ms)</text>
  
  <text x="50" y="280" font-family="monospace" font-size="12" fill="#EF4444" font-weight="bold">STATUS: 100% SATURATED</text>

  <!-- PCIe Bus (The Empty Pipe) -->
  <rect x="200" y="180" width="120" height="40" fill="#334155" />
  <text x="210" y="170" font-family="monospace" font-size="12" fill="#94A3B8">PCIe Gen5 (64GB/s)</text>
  <path d="M 210 200 L 310 200" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" />
  <text x="215" y="215" font-family="monospace" font-size="10" fill="#94A3B8">UTILIZATION: 2%</text>

  <!-- GPU Cluster -->
  <rect x="320" y="80" width="240" height="240" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
  <text x="330" y="110" font-family="monospace" font-size="16" fill="#94A3B8" font-weight="bold">8x H100 SXM5</text>
  
  <!-- H100 Chips -->
  <g transform="translate(340, 130)">
    <rect width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="20" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" /> <!-- Idle Light -->
    <rect x="50" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="70" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
    <rect x="100" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="120" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
    <rect x="150" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="170" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
  </g>
  <g transform="translate(340, 180)">
    <rect width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="20" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
    <rect x="50" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="70" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
    <rect x="100" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="120" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
    <rect x="150" width="40" height="40" rx="4" fill="#334155" stroke="#475569" />
    <circle cx="170" cy="20" r="5" fill="#EF4444" fill-opacity="0.5" />
  </g>

  <text x="330" y="280" font-family="monospace" font-size="14" fill="#EF4444" font-weight="bold">GPU STATUS: STARVING (0%)</text>
  <text x="330" y="300" font-family="monospace" font-size="11" fill="#94A3B8">Waiting for CPU Preprocessing...</text>

  <!-- Red Bottleneck Marker -->
  <line x1="200" y1="80" x2="200" y2="320" stroke="#EF4444" stroke-width="4" stroke-dasharray="10,5" />
  <text x="160" y="60" font-family="monospace" font-size="14" fill="#EF4444" font-weight="bold">THE TRANSFORMATION WALL</text>
</svg>
