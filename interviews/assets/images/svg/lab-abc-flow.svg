<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <!-- Gradient for scaffolding fade -->
    <linearGradient id="scaffold-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Lab A → B → C Structure</text>
  <text x="340" y="47" text-anchor="middle" font-size="10" fill="#555">Scaffolding fades as student autonomy increases</text>

  <!-- Scaffolding fade background -->
  <rect x="40" y="60" width="600" height="320" rx="8" fill="url(#scaffold-fade)"/>

  <!-- Scaffolding label -->
  <text x="55" y="390" font-size="8" fill="#6366f1" font-weight="600" transform="rotate(-90,55,390)">SCAFFOLDING LEVEL</text>
  <line x1="68" y1="76" x2="68" y2="365" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="75" y="82" font-size="7" fill="#6366f1">High</text>
  <text x="75" y="362" font-size="7" fill="#6366f1">Low</text>

  <!-- ===== PART A ===== -->
  <rect x="90" y="75" width="170" height="300" rx="10" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="100" y="85" width="150" height="35" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="175" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">Part A</text>
  <text x="175" y="114" text-anchor="middle" font-size="9" fill="#555">Calibration</text>

  <!-- Part A details -->
  <rect x="100" y="130" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="175" y="145" text-anchor="middle" font-size="8" fill="#333">🔒 Prediction Lock</text>

  <rect x="100" y="160" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="175" y="175" text-anchor="middle" font-size="8" fill="#333">1 variable at a time</text>

  <rect x="100" y="190" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="175" y="205" text-anchor="middle" font-size="8" fill="#333">Narrow parameter range</text>

  <rect x="100" y="220" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="175" y="235" text-anchor="middle" font-size="8" fill="#333">Guided questions</text>

  <text x="175" y="270" text-anchor="middle" font-size="8.5" font-weight="600" fill="#4338ca">Goal:</text>
  <text x="175" y="284" text-anchor="middle" font-size="8" fill="#555">"Isolate one</text>
  <text x="175" y="296" text-anchor="middle" font-size="8" fill="#555">Iron Law term"</text>

  <!-- Arrow A→B -->
  <line x1="265" y1="230" x2="285" y2="230" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PART B ===== -->
  <rect x="290" y="75" width="170" height="300" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="300" y="85" width="150" height="35" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Part B</text>
  <text x="375" y="114" text-anchor="middle" font-size="9" fill="#555">Integration</text>

  <!-- Part B details -->
  <rect x="300" y="130" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="145" text-anchor="middle" font-size="8" fill="#333">Multiple variables</text>

  <rect x="300" y="160" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="175" text-anchor="middle" font-size="8" fill="#333">Competing tradeoffs</text>

  <rect x="300" y="190" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="205" text-anchor="middle" font-size="8" fill="#333">Wider parameter range</text>

  <rect x="300" y="220" width="150" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="235" text-anchor="middle" font-size="8" fill="#333">Open-ended questions</text>

  <text x="375" y="270" text-anchor="middle" font-size="8.5" font-weight="600" fill="#92400e">Goal:</text>
  <text x="375" y="284" text-anchor="middle" font-size="8" fill="#555">"See how terms</text>
  <text x="375" y="296" text-anchor="middle" font-size="8" fill="#555">interact &amp; compete"</text>

  <!-- Arrow B→C -->
  <line x1="465" y1="230" x2="485" y2="230" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PART C ===== -->
  <rect x="490" y="75" width="150" height="300" rx="10" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="495" y="85" width="140" height="35" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="565" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Part C</text>
  <text x="565" y="114" text-anchor="middle" font-size="9" fill="#555">Design Challenge</text>

  <!-- Part C details -->
  <rect x="495" y="130" width="140" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="565" y="145" text-anchor="middle" font-size="8" fill="#333">Real constraints</text>

  <rect x="495" y="160" width="140" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="565" y="175" text-anchor="middle" font-size="8" fill="#333">Fixed budget/SLA</text>

  <rect x="495" y="190" width="140" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="565" y="205" text-anchor="middle" font-size="8" fill="#333">No scaffolding</text>

  <rect x="495" y="220" width="140" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="565" y="235" text-anchor="middle" font-size="8" fill="#333">📝 Decision Log</text>

  <text x="565" y="270" text-anchor="middle" font-size="8.5" font-weight="600" fill="#166534">Goal:</text>
  <text x="565" y="284" text-anchor="middle" font-size="8" fill="#555">"Engineer a solution</text>
  <text x="565" y="296" text-anchor="middle" font-size="8" fill="#555">under constraints"</text>

  <!-- Autonomy arrow along the bottom -->
  <line x1="90" y1="400" x2="620" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#333">STUDENT AUTONOMY</text>

  <!-- Bottom note -->
  <text x="340" y="445" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Every lab follows this structure. Students progress from guided discovery to independent engineering design.</text>
</svg>
