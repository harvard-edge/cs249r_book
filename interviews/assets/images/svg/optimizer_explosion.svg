<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0F172A" />
  
  <!-- GPU Node Container -->
  <rect x="50" y="50" width="500" height="300" rx="10" fill="#1E293B" stroke="#334155" stroke-width="2" />
  <text x="70" y="80" font-family="monospace" font-size="18" fill="#94A3B8" font-weight="bold">GPU Node (H100 - 80GB VRAM)</text>
  
  <!-- VRAM Bar (The Illusion) -->
  <text x="70" y="120" font-family="monospace" font-size="14" fill="#94A3B8">Reported Memory Usage:</text>
  <rect x="70" y="130" width="400" height="40" rx="5" fill="#334155" />
  <rect x="70" y="130" width="300" height="40" rx="5" fill="#10B981" /> <!-- 60/80 = 75% -->
  <text x="380" y="155" font-family="monospace" font-size="14" fill="#FFFFFF">60 GB / 80 GB</text>
  <text x="80" y="155" font-family="monospace" font-size="14" fill="#FFFFFF" font-weight="bold">Weights (FP16)</text>

  <!-- The Hidden Reality (The Explosion) -->
  <path d="M 70 200 L 530 200" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5" />
  <text x="70" y="225" font-family="monospace" font-size="14" fill="#EF4444" font-weight="bold">🚨 HIDDEN OPTIMIZER STATE (ADAM)</text>
  
  <!-- Adam Moments -->
  <rect x="70" y="240" width="150" height="80" rx="5" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" />
  <text x="80" y="265" font-family="monospace" font-size="12" fill="#EF4444">Moment 1</text>
  <text x="80" y="285" font-family="monospace" font-size="12" fill="#EF4444">(FP32)</text>
  <text x="80" y="305" font-family="monospace" font-size="12" fill="#EF4444">120 GB</text>

  <rect x="230" y="240" width="150" height="80" rx="5" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" />
  <text x="240" y="265" font-family="monospace" font-size="12" fill="#EF4444">Moment 2</text>
  <text x="240" y="285" font-family="monospace" font-size="12" fill="#EF4444">(FP32)</text>
  <text x="240" y="305" font-family="monospace" font-size="12" fill="#EF4444">120 GB</text>

  <rect x="390" y="240" width="140" height="80" rx="5" fill="#EF4444" fill-opacity="0.4" stroke="#EF4444" stroke-width="2" />
  <text x="400" y="265" font-family="monospace" font-size="12" fill="#FFFFFF" font-weight="bold">TOTAL</text>
  <text x="400" y="285" font-family="monospace" font-size="12" fill="#FFFFFF" font-weight="bold">360 GB</text>
  <text x="400" y="305" font-family="monospace" font-size="12" fill="#FFFFFF" font-weight="bold">OOM 🔥</text>
</svg>
