<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Semester at a Glance</text>

  <!-- ===== SEMESTER 1: FOUNDATIONS ===== -->
  <text x="340" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1">SEMESTER 1: AI SYSTEMS FOUNDATIONS</text>

  <!-- Week numbers -->
  <g font-size="7.5" fill="#999" text-anchor="middle">
    <text x="62" y="80">W1</text><text x="99" y="80">W2</text>
    <text x="136" y="80">W3</text><text x="173" y="80">W4</text>
    <text x="210" y="80">W5</text><text x="247" y="80">W6</text>
    <text x="284" y="80">W7</text><text x="321" y="80">W8</text>
    <text x="358" y="80">W9</text><text x="395" y="80">W10</text>
    <text x="432" y="80">W11</text><text x="469" y="80">W12</text>
    <text x="506" y="80">W13</text><text x="543" y="80">W14</text>
    <text x="580" y="80">W15</text><text x="617" y="80">W16</text>
  </g>

  <!-- Part blocks - Semester 1 -->
  <!-- Part I: Physics (indigo) -->
  <rect x="44" y="88" width="148" height="32" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="118" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#4338ca">PART I</text>
  <text x="118" y="113" text-anchor="middle" font-size="7.5" fill="#555">The Physics of AI</text>

  <!-- Part II: Build (green) -->
  <rect x="192" y="88" width="148" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="266" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#166534">PART II</text>
  <text x="266" y="113" text-anchor="middle" font-size="7.5" fill="#555">Building the Stack</text>

  <!-- Part III: Optimize (amber) -->
  <rect x="340" y="88" width="148" height="32" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="414" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">PART III</text>
  <text x="414" y="113" text-anchor="middle" font-size="7.5" fill="#555">Optimization Frontier</text>

  <!-- Part IV: Deploy (rose) -->
  <rect x="488" y="88" width="148" height="32" rx="6" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="562" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#9f1239">PART IV</text>
  <text x="562" y="113" text-anchor="middle" font-size="7.5" fill="#555">Production &amp; Capstone</text>

  <!-- TinyTorch bar -->
  <rect x="44" y="130" width="445" height="18" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="267" y="143" text-anchor="middle" font-size="7.5" font-weight="600" fill="#166534">TinyTorch Modules 01–08 (Tensor → Training)</text>
  <rect x="489" y="130" width="147" height="18" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="562" y="143" text-anchor="middle" font-size="7.5" fill="#999">Capstone Focus</text>

  <!-- Labs bar -->
  <rect x="44" y="154" width="593" height="18" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="167" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400e">Interactive Labs 00–15 (weekly)</text>

  <!-- Milestones -->
  <g font-size="7" fill="#6366f1" font-weight="600">
    <line x1="210" y1="175" x2="210" y2="190" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="210" y="198" text-anchor="middle">Perceptron</text>
    <line x1="321" y1="175" x2="321" y2="190" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="321" y="198" text-anchor="middle">Milestone Check</text>
    <line x1="617" y1="175" x2="617" y2="190" stroke="#f43f5e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="617" y="198" text-anchor="middle" fill="#f43f5e">AI Olympics</text>
  </g>

  <!-- ===== DIVIDER ===== -->
  <line x1="30" y1="225" x2="650" y2="225" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== SEMESTER 2: SCALE ===== -->
  <text x="340" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1">SEMESTER 2: AI ENGINEERING AT SCALE</text>

  <!-- Week numbers -->
  <g font-size="7.5" fill="#999" text-anchor="middle">
    <text x="62" y="270">W1</text><text x="99" y="270">W2</text>
    <text x="136" y="270">W3</text><text x="173" y="270">W4</text>
    <text x="210" y="270">W5</text><text x="247" y="270">W6</text>
    <text x="284" y="270">W7</text><text x="321" y="270">W8</text>
    <text x="358" y="270">W9</text><text x="395" y="270">W10</text>
    <text x="432" y="270">W11</text><text x="469" y="270">W12</text>
    <text x="506" y="270">W13</text><text x="543" y="270">W14</text>
    <text x="580" y="270">W15</text><text x="617" y="270">W16</text>
  </g>

  <!-- Part blocks - Semester 2 -->
  <!-- Part I: The Fleet (indigo) -->
  <rect x="44" y="278" width="148" height="32" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="118" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#4338ca">PART I</text>
  <text x="118" y="303" text-anchor="middle" font-size="7.5" fill="#555">The Fleet</text>

  <!-- Part II: Distributed (green) -->
  <rect x="192" y="278" width="148" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="266" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#166534">PART II</text>
  <text x="266" y="303" text-anchor="middle" font-size="7.5" fill="#555">Distributed Algorithms</text>

  <!-- Part III: Deployment (amber) -->
  <rect x="340" y="278" width="148" height="32" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="414" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">PART III</text>
  <text x="414" y="303" text-anchor="middle" font-size="7.5" fill="#555">Deployment at Scale</text>

  <!-- Part IV: Responsible (rose) -->
  <rect x="488" y="278" width="148" height="32" rx="6" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="562" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#9f1239">PART IV</text>
  <text x="562" y="303" text-anchor="middle" font-size="7.5" fill="#555">Responsible Fleet</text>

  <!-- Labs bar -->
  <rect x="44" y="320" width="593" height="18" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="333" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400e">Interactive Labs 01–16 (weekly)</text>

  <!-- Key milestones -->
  <g font-size="7" fill="#6366f1" font-weight="600">
    <line x1="210" y1="341" x2="210" y2="356" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="210" y="364" text-anchor="middle">3D Parallelism</text>
    <line x1="395" y1="341" x2="395" y2="356" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="395" y="364" text-anchor="middle">KV-Cache</text>
    <line x1="617" y1="341" x2="617" y2="356" stroke="#f43f5e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="617" y="364" text-anchor="middle" fill="#f43f5e">Fleet Synthesis</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <line x1="30" y1="390" x2="650" y2="390" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#333">LEGEND</text>
  <rect x="80" y="420" width="12" height="12" rx="2" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="98" y="431" font-size="8" fill="#555">Foundations</text>
  <rect x="180" y="420" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="198" y="431" font-size="8" fill="#555">Build / Distribute</text>
  <rect x="300" y="420" width="12" height="12" rx="2" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="318" y="431" font-size="8" fill="#555">Optimize / Deploy</text>
  <rect x="420" y="420" width="12" height="12" rx="2" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="438" y="431" font-size="8" fill="#555">Production / Governance</text>

  <!-- Bottom note -->
  <text x="340" y="450" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Each semester follows the same four-part arc: Foundations → Construction → Optimization → Production</text>
</svg>
