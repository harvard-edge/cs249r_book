<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Silicon Realism Loop</text>
  <text x="340" y="52" text-anchor="middle" font-size="10" fill="#555">Every major concept flows through all four pillars</text>

  <!-- Center circle -->
  <circle cx="340" cy="240" r="55" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="340" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Iron Law</text>
  <text x="340" y="248" text-anchor="middle" font-size="8.5" fill="#555">Unifying</text>
  <text x="340" y="260" text-anchor="middle" font-size="8.5" fill="#555">Framework</text>

  <!-- ===== READ (Top) ===== -->
  <rect x="270" y="75" width="140" height="65" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="340" y="100" text-anchor="middle" font-size="20">📖</text>
  <text x="340" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">READ</text>
  <text x="340" y="132" text-anchor="middle" font-size="8.5" fill="#555">Textbook: Theory &amp; Math</text>

  <!-- ===== BUILD (Right) ===== -->
  <rect x="475" y="195" width="140" height="65" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="545" y="220" text-anchor="middle" font-size="20">🔥</text>
  <text x="545" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">BUILD</text>
  <text x="545" y="252" text-anchor="middle" font-size="8.5" fill="#555">TinyTorch: Implementation</text>

  <!-- ===== EXPLORE (Bottom) ===== -->
  <rect x="270" y="320" width="140" height="65" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="345" text-anchor="middle" font-size="20">🔬</text>
  <text x="340" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">EXPLORE</text>
  <text x="340" y="377" text-anchor="middle" font-size="8.5" fill="#555">Labs: Simulation &amp; Discovery</text>

  <!-- ===== DEPLOY (Left) ===== -->
  <rect x="65" y="195" width="140" height="65" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="135" y="220" text-anchor="middle" font-size="20">🔧</text>
  <text x="135" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#9f1239">DEPLOY</text>
  <text x="135" y="252" text-anchor="middle" font-size="8.5" fill="#555">Hardware Kits: Reality</text>

  <!-- ===== Curved Arrows (clockwise) ===== -->
  <!-- READ → BUILD -->
  <path d="M410,110 Q480,120 480,195" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="455" y="142" text-anchor="middle" font-size="7.5" fill="#6366f1" font-weight="600">understand</text>

  <!-- BUILD → EXPLORE -->
  <path d="M480,260 Q480,330 410,345" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="462" y="310" text-anchor="middle" font-size="7.5" fill="#6366f1" font-weight="600">test</text>

  <!-- EXPLORE → DEPLOY -->
  <path d="M270,355 Q200,365 200,260" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="218" y="320" text-anchor="middle" font-size="7.5" fill="#6366f1" font-weight="600">validate</text>

  <!-- DEPLOY → READ (feedback loop) -->
  <path d="M200,195 Q200,120 270,107" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="218" y="147" text-anchor="middle" font-size="7.5" fill="#6366f1" font-weight="600">refine</text>

  <!-- Bottom note -->
  <text x="340" y="420" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Students cycle through all four pillars for each major concept (e.g., Quantization, Transformers, Distributed Training)</text>

  <!-- Example annotations -->
  <rect x="45" y="395" width="170" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="411" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Example: Quantization</text>
  <text x="130" y="424" text-anchor="middle" font-size="7.5" fill="#555">Read Ch.10 → Build INT8 → Lab 09 → Deploy on XIAO</text>

  <rect x="465" y="395" width="170" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="411" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Example: Attention</text>
  <text x="550" y="424" text-anchor="middle" font-size="7.5" fill="#555">Read Ch.6 → Build Module 12 → Lab 05 → Profile on Pi</text>
</svg>
