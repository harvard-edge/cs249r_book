# StaffML Analytics Worker
# Deploy: cd analytics-worker && wrangler deploy

name = "staffml-analytics"
main = "worker.js"
compatibility_date = "2024-01-01"

# Route on mlsysbook.ai domain (staffml.ai redirects to mlsysbook.ai)
routes = [
  { pattern = "mlsysbook.ai/api/staffml-analytics*", zone_name = "mlsysbook.ai" }
]

[[kv_namespaces]]
binding = "STAFFML_ANALYTICS"
id = "bf81298013404118beab61f55afe1d7d"
