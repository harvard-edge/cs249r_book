name = "staffml-interviewer"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare Workers AI binding (the default LLM provider) ───
# Always available on the Workers free plan. Provides the Llama 3.1 8B
# fallback if no other provider key is configured.
[ai]
binding = "AI"

# ─── KV namespace for rate limiting ───
# Stores per-IP and global request counters (both /ask and /waitlist).
# Created with:
#   wrangler kv:namespace create RATE_LIMIT_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a510cc7f791c40ffa28d19cf809c0e28"

# ─── KV namespace for the paid-tier waitlist ───
# Stores waitlist submissions from the /waitlist endpoint. Separate
# from RATE_LIMIT_KV so the (potentially large) record list never
# competes with the hot-path rate-limit counters. Optional — the
# worker boots fine without it, and /waitlist returns 503 until
# it's provisioned.
#
# Created with:
#   wrangler kv:namespace create WAITLIST_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "WAITLIST_KV"
id = "e42c3db4eaa2471f81f3f73745959349"

# ─── Optional: pin a different priority order via env var ───
# Comma-separated provider names. Defaults to "groq,openai,anthropic,gemini,openrouter,cf-workers-ai"
# [vars]
# PROVIDER_PRIORITY = "groq,cf-workers-ai"
# ALLOWED_ORIGINS = "https://staffml.ai,https://www.staffml.ai,https://mlsysbook.ai,http://localhost:3000"

# ─── Secrets (set via `wrangler secret put`, never committed) ───
# wrangler secret put GROQ_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put GEMINI_API_KEY
# wrangler secret put OPENROUTER_API_KEY

# ─── Observability ───
[observability]
enabled = true
