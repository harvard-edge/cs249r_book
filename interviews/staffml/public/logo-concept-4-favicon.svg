<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 4 Favicon: Neural Chip -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#000"/>
  <!-- Die outline -->
  <rect x="14" y="14" width="36" height="36" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <!-- Pins: left -->
  <line x1="14" y1="24" x2="8" y2="24" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="8" y2="32" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="40" x2="8" y2="40" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins: right -->
  <line x1="50" y1="24" x2="56" y2="24" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="40" x2="56" y2="40" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins: top -->
  <line x1="24" y1="14" x2="24" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="32" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="14" x2="40" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins: bottom -->
  <line x1="24" y1="50" x2="24" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="50" x2="40" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Central neural node with glow -->
  <circle cx="32" cy="32" r="6" fill="#3b82f6" opacity="0.3"/>
  <circle cx="32" cy="32" r="3" fill="#3b82f6"/>
</svg>
