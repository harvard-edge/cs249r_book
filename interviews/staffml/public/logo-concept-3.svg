<?xml version="1.0" encoding="UTF-8"?>
<!-- ===== Concept 3: Roofline ===== -->
<!-- The roofline model: a diagonal line (bandwidth-bound) meeting a horizontal line
     (compute-bound) at the ridge point. THE defining chart of ML systems performance
     engineering. Instantly recognizable to anyone who's done kernel optimization.
     Evokes: quantitative reasoning, performance analysis, the physics of AI. -->

<!-- === FAVICON VERSION (64x64) === -->
<!--
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#000"/>
  <path d="M10,50 L32,18 L54,18" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="32" cy="18" r="4" fill="#3b82f6"/>
  <circle cx="32" cy="18" r="2" fill="#000"/>
</svg>
-->

<!-- === NAV BAR VERSION (200x40) === -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40"
     font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <rect width="200" height="40" rx="4" fill="#000"/>

  <!-- ── Roofline mark ── -->
  <g>
    <!-- Bandwidth-bound slope -->
    <path d="M8,34 L22,10 L36,10" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Ridge point (the knee) -->
    <circle cx="22" cy="10" r="3" fill="#3b82f6"/>
    <circle cx="22" cy="10" r="1.5" fill="#000"/>
    <!-- Subtle grid lines for "chart" feel -->
    <line x1="8" y1="28" x2="36" y2="28" stroke="#fff" stroke-width="0.3" opacity="0.2"/>
    <line x1="8" y1="22" x2="36" y2="22" stroke="#fff" stroke-width="0.3" opacity="0.2"/>
    <line x1="8" y1="16" x2="36" y2="16" stroke="#fff" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Wordmark -->
  <text x="46" y="25.5" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">Staff</text>
  <text x="46" y="25.5" font-size="16" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5" dx="46">ML</text>
</svg>
