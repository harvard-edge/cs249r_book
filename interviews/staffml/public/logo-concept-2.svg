<!-- ===== Concept 2: Stack Layers ===== -->
<!-- Three stacked parallelogram layers — hardware at bottom (darkest), runtime middle,
     application top (brightest). Evokes: infrastructure depth, the ML systems stack,
     abstraction layers. Like a chip cross-section or cloud infra diagram. -->

