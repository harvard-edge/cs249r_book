<!-- === NAV BAR VERSION (200x40) === -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40"
     font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <rect width="200" height="40" rx="4" fill="#000"/>

  <!-- ── Stack icon ── -->
  <g transform="translate(6, 4)">
    <!-- Bottom layer (darkest) -->
    <path d="M3,28 L15,22 L30,28 L18,34 Z" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
    <!-- Middle layer -->
    <path d="M3,21 L15,15 L30,21 L18,27 Z" fill="#2554a0" stroke="#3b82f6" stroke-width="1.2"/>
    <!-- Top layer (brightest) -->
    <path d="M3,14 L15,8 L30,14 L18,20 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.2"/>
  </g>

  <!-- Wordmark -->
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">Staff</text>
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5" dx="46">ML</text>
</svg>
