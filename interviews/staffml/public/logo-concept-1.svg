<?xml version="1.0" encoding="UTF-8"?>
<!-- ===== Concept 1: Chevron Terminal ===== -->
<!-- The terminal prompt `>_` evolved into an angular mark. The chevron is bold blue,
     the underscore cursor blinks conceptually. Evokes: command-line mastery,
     precision, the engineer's native environment. -->

<!-- === FAVICON VERSION (64x64) === -->
<!--
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#000"/>
  <path d="M14,16 L34,32 L14,48" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="36" y="44" width="14" height="4" rx="1" fill="#fff" opacity="0.9"/>
</svg>
-->

<!-- === NAV BAR VERSION (200x40) === -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40"
     font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <!-- Background -->
  <rect width="200" height="40" rx="4" fill="#000"/>

  <!-- Chevron mark -->
  <path d="M8,10 L22,20 L8,30" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor underscore -->
  <rect x="25" y="27" width="8" height="2.5" rx="0.5" fill="#fff" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">Staff</text>
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5" dx="46">ML</text>
</svg>
