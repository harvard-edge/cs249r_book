<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 40"
     font-family="'JetBrains Mono', 'SF Mono', monospace">
  <defs>
    <filter id="glow58">
      <feGaussianBlur stdDeviation="2" result="blur"/>
