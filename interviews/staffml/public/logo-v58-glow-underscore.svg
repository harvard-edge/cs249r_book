  </defs>
  <rect width="230" height="40" rx="8" fill="#050510"/>
  <path d="M6,11 L18,20 L6,29" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <path d="M16,11 L28,20 L16,29" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="31" y="26" width="8" height="2.5" rx="1" fill="#3b82f6" filter="url(#glow58)"/>
  <text x="48" y="26" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0">Staff<tspan fill="#60a5fa">ML</tspan></text>
