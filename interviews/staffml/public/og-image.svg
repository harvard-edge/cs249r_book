<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="630" fill="#0a0a12"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 200)">
    <path d="M0,120 L50,20 L100,20" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="50" cy="20" r="7" fill="#3b82f6"/>
    <circle cx="50" cy="20" r="3" fill="#0a0a12"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="290" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">Staff</text>
  <text x="415" y="290" font-size="72" font-weight="700" fill="#3b82f6" letter-spacing="-1">ML</text>

  <!-- Tagline -->
  <text x="200" y="340" font-size="28" font-weight="400" fill="#8b8ca0">ML Systems Interview Prep</text>

  <!-- Stats -->
  <g transform="translate(200, 400)">
    <text font-size="42" font-weight="700" fill="#ffffff">4,800+</text>
    <text x="195" font-size="20" font-weight="400" fill="#8b8ca0" dy="0">physics-grounded questions</text>
  </g>

  <!-- Chips -->
  <g transform="translate(200, 470)">
    <rect width="80" height="30" rx="15" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="40" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">Cloud</text>

    <rect x="95" width="72" height="30" rx="15" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="131" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">Edge</text>

    <rect x="182" width="84" height="30" rx="15" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="224" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">Mobile</text>

    <rect x="281" width="85" height="30" rx="15" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="323" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">TinyML</text>
  </g>

  <!-- Bottom line -->
  <text x="200" y="560" font-size="16" font-weight="400" fill="#4a4b5c">Free &amp; open source · No accounts · 100% client-side</text>

  <!-- Decorative roofline curves on the right -->
  <g transform="translate(750, 120)" opacity="0.12">
    <path d="M0,350 L120,80 L350,80" stroke="#3b82f6" stroke-width="3" fill="none"/>
    <path d="M40,350 L160,120 L380,120" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <path d="M80,350 L200,160 L400,160" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Harvard attribution -->
  <text x="1120" y="590" text-anchor="end" font-size="14" font-weight="500" fill="#4a4b5c">Harvard University</text>
</svg>
