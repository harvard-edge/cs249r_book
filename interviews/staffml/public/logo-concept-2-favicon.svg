<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 2 Favicon: Stack Layers -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#000"/>
  <g transform="translate(12, 10)">
    <!-- Bottom layer (hardware - darkest) -->
    <path d="M4,38 L20,30 L40,38 L24,46 Z" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Middle layer (runtime) -->
    <path d="M4,28 L20,20 L40,28 L24,36 Z" fill="#2554a0" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Top layer (application - brightest) -->
    <path d="M4,18 L20,10 L40,18 L24,26 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
</svg>
