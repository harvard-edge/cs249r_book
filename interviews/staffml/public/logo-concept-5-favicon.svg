<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 5 Favicon: Hexagonal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#000"/>
  <!-- Outer hex -->
  <polygon points="32,8 54,20 54,44 32,56 10,44 10,20" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Middle hex (translucent) -->
  <polygon points="32,18 43,24.5 43,37.5 32,44 21,37.5 21,24.5" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner hex (solid core) -->
  <polygon points="32,26 37,29 37,35 32,38 27,35 27,29" fill="#3b82f6" stroke="none"/>
</svg>
