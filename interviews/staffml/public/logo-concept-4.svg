<!-- === NAV BAR VERSION (200x40) === -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40"
     font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <rect width="200" height="40" rx="4" fill="#000"/>

  <!-- ── Neural Chip mark ── -->
  <g transform="translate(4, 4)">
    <!-- Die outline -->
    <rect x="4" y="4" width="24" height="24" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- Pins: left -->
    <line x1="4" y1="10" x2="1" y2="10" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="16" x2="1" y2="16" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="22" x2="1" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pins: right -->
    <line x1="28" y1="10" x2="31" y2="10" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="16" x2="31" y2="16" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="22" x2="31" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pins: top -->
    <line x1="10" y1="4" x2="10" y2="1" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="4" x2="16" y2="1" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="4" x2="22" y2="1" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pins: bottom -->
    <line x1="10" y1="28" x2="10" y2="31" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="28" x2="16" y2="31" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="28" x2="22" y2="31" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Central neural node -->
    <circle cx="16" cy="16" r="4" fill="#3b82f6" opacity="0.25"/>
    <circle cx="16" cy="16" r="2" fill="#3b82f6"/>
  </g>

  <!-- Wordmark -->
  <text x="44" y="25.5" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">Staff</text>
  <text x="44" y="25.5" font-size="16" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5" dx="46">ML</text>
</svg>
