<?xml version="1.0" encoding="UTF-8"?>
<!-- ===== Concept 4: Neural Chip ===== -->
<!-- A chip die outline with a single neural node at center, connected by traces
     to edge pins. Merges silicon and neural network — the literal intersection
     of ML and systems. Evokes: hardware-software co-design, custom silicon,
     the physical substrate of intelligence. -->

