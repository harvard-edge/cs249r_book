<!-- ===== Concept 5: Hexagonal ===== -->
<!-- A single hexagon cell — the universal shape of chip die layouts, wafer maps,
     and tessellated compute grids. Inner hexagonal structure suggests depth.
     Evokes: silicon manufacturing, tiled architectures, systematic precision,
     the foundational geometry of computing hardware. -->

<!-- === FAVICON VERSION (64x64) === -->
