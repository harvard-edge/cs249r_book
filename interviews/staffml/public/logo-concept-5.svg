<!-- === NAV BAR VERSION (200x40) === -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40"
     font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <rect width="200" height="40" rx="4" fill="#000"/>

  <!-- ── Hexagonal mark ── -->
  <g transform="translate(4, 2)">
    <!-- Outer hex -->
    <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Middle hex (translucent) -->
    <polygon points="16,8 23,12 23,20 16,24 9,20 9,12" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1" stroke-linejoin="round"/>
    <!-- Inner hex (solid) -->
    <polygon points="16,13 19.5,15 19.5,19 16,21 12.5,19 12.5,15" fill="#3b82f6" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">Staff</text>
  <text x="42" y="25.5" font-size="16" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5" dx="46">ML</text>
</svg>
