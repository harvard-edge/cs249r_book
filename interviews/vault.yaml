# vault.yaml — Configuration for the StaffML vault pipeline
# All thresholds, model names, and paths in one place.
# Used by: vault.py, engine/generate.py, paper/analyze_corpus.py

# ── Paths ──────────────────────────────────────────────────────
paths:
  corpus: corpus.json
  chains: chains.json
  taxonomy: taxonomy_v2.json
  numbers: NUMBERS.md
  chroma_dir: _chroma
  reviews_dir: _reviews
  paper_dir: paper
  staffml_export: staffml/src/data/corpus.json

# ── Models ─────────────────────────────────────────────────────
# Change these to switch LLM providers. Supports gemini CLI and
# Anthropic API (via ANTHROPIC_API_KEY env var).
models:
  generator: gemini-2.5-pro          # Question generation
  reviewer: gemini-2.5-flash         # Math review (fast, cheap)
  reviewer_deep: claude-opus-4-6     # Deep review (slow, thorough)
  chain_curator: gemini-2.5-pro      # Chain curation

# ── Generation ─────────────────────────────────────────────────
generation:
  max_parallel: 8
  questions_per_cell: 1
  timeout_seconds: 180

# ── Validation ─────────────────────────────────────────────────
validation:
  dedup_threshold: 0.85
  fuzzy_threshold: 0.90
  min_scenario_chars: 30
  min_common_mistake_chars: 10
  min_realistic_solution_chars: 5

# ── Review ─────────────────────────────────────────────────────
review:
  chunk_size: 50
  max_parallel: 8
  auto_fix: false
  error_rate_threshold: 0.02         # Block release if > 2%
  arithmetic_tolerance:
    cloud: 0.25
    edge: 0.15
    mobile: 0.10
    tinyml: 0.05
    global: 0.20

# ── Chains ─────────────────────────────────────────────────────
chains:
  min_levels: 3
  backpopulate: true                 # Write chain_ids back to corpus

# ── Coverage ───────────────────────────────────────────────────
coverage:
  min_per_cell: 3
  balance_cv_target: 0.30

# ── Release ────────────────────────────────────────────────────
release:
  steps:
    - validate
    - dedup
    - chains
    - stats
    - figures
    - export
  require_zero_errors: true
