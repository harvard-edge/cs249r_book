# =============================================================================
# ML SYSTEMS INTERVIEW PLAYBOOK WEBSITE CONFIGURATION
# =============================================================================
# Standalone Quarto project for the Interview Playbook
# Part of the MLSysBook ecosystem: mlsysbook.ai/interviews/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "ML Systems Interview Playbook"
  description: "1,000+ systems design questions across Cloud, Edge, Mobile & TinyML tracks."
  site-url: https://mlsysbook.ai/interviews/
  favicon: assets/images/logo.png

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  search:
    keyboard-shortcut: ["/"]

  # Shared navbar from navbar-common.yml (via metadata-files).
  navbar:
    background: light
    logo: assets/images/logo.png
    search: true
    title: "Machine Learning Systems"
    left:
      - text: "Interview Playbook"
        menu:
          - icon: shield-check
            text: "Playbook Hub"
            href: ./index.qmd
          - text: "The Architect's Rubric"
            href: 00_The_Architects_Rubric.md
          - text: "Numbers Cheat Sheet"
            href: NUMBERS.md
          - text: "---"
          - text: "☁️ Cloud Track"
            href: cloud/README.md
          - text: "🤖 Edge Track"
            href: edge/README.md
          - text: "📱 Mobile Track"
            href: mobile/README.md
          - text: "🔬 TinyML Track"
            href: tinyml/README.md

  sidebar:
    - id: main
      style: "floating"
      background: light
      collapse-level: 2
      contents:
        - text: "Playbook Home"
          href: index.qmd
        - text: "The Architect's Rubric"
          href: 00_The_Architects_Rubric.md
        - text: "Numbers Cheat Sheet"
          href: NUMBERS.md
        - section: "☁️ Cloud Track"
          href: cloud/README.md
          contents:
            - cloud/01_single_machine.md
            - cloud/02_distributed_systems.md
            - cloud/03_serving_stack.md
            - cloud/04_production_ops.md
            - cloud/05_visual_debugging.md
        - section: "🤖 Edge Track"
          href: edge/README.md
          contents:
            - edge/01_hardware_platform.md
            - edge/02_realtime_pipeline.md
            - edge/03_deployed_system.md
            - edge/04_visual_debugging.md
        - section: "📱 Mobile Track"
          href: mobile/README.md
          contents:
            - mobile/01_device_hardware.md
            - mobile/02_app_experience.md
            - mobile/03_ship_and_update.md
            - mobile/04_visual_debugging.md
        - section: "🔬 TinyML Track"
          href: tinyml/README.md
          contents:
            - tinyml/01_microcontroller.md
            - tinyml/02_sensing_pipeline.md
            - tinyml/03_deployed_device.md
            - tinyml/04_visual_debugging.md

  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="https://mlsysbook.ai">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

metadata-files:
  - ../book/quarto/config/shared/html/navbar-common.yml

format:
  html:
    theme:
      light:
        - default
        - assets/styles/style.scss
      dark:
        - default
        - assets/styles/style.scss
        - assets/styles/dark-mode.scss
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    code-copy: true
    anchor-sections: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

execute:
  freeze: auto
