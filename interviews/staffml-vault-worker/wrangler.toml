name = "staffml-vault"
main = "src/index.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# D1 binding — paste the database_id after `wrangler d1 create staffml-vault`.
[[d1_databases]]
binding = "DB"
database_name = "staffml-vault"
database_id = "PLACEHOLDER-d1-id"
migrations_dir = "migrations"

[vars]
CACHE_TTL_MANIFEST = "3600"
CACHE_TTL_QUESTION = "3600"
CACHE_TTL_SEARCH = "300"
CACHE_TTL_TAXONOMY = "86400"
CORS_ALLOWLIST = "https://staffml.mlsysbook.ai,https://mlsysbook.ai,http://localhost:3000"
SCHEMA_FINGERPRINT = "PLACEHOLDER-deploy-time"
GRACE_WINDOW_SECONDS = "600"

[env.staging]
name = "staffml-vault-staging"
vars = { CORS_ALLOWLIST = "https://staging.staffml.mlsysbook.ai,http://localhost:3000" }

[env.staging.d1_databases]
binding = "DB"
database_name = "staffml-vault-staging"
database_id = "PLACEHOLDER-staging-d1-id"
