name = "staffml-vault"
main = "src/index.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# D1 binding — paste the database_id after `wrangler d1 create staffml-vault`.
[[d1_databases]]
binding = "DB"
database_name = "staffml-vault"
database_id = "254f630f-dd6a-400e-8d86-786e92be7a70"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "19f1f3d7e03c4c3cb8704d951f7a22e7"

[vars]
CACHE_TTL_MANIFEST = "3600"
CACHE_TTL_QUESTION = "3600"
CACHE_TTL_SEARCH = "300"
CACHE_TTL_TAXONOMY = "86400"
CORS_ALLOWLIST = "https://staffml.mlsysbook.ai,https://mlsysbook.ai,https://staffml-vault.mlsysbook.ai,http://localhost:3000"
SCHEMA_FINGERPRINT = "b97218dae6354b1ba0ed4a93242f0ca848554ed02ec86246dc8977ae918c5ad6"
GRACE_WINDOW_SECONDS = "600"

[env.staging]
name = "staffml-vault-staging"

[env.staging.vars]
CACHE_TTL_MANIFEST = "3600"
CACHE_TTL_QUESTION = "3600"
CACHE_TTL_SEARCH = "300"
CACHE_TTL_TAXONOMY = "86400"
CORS_ALLOWLIST = "https://staging.staffml.mlsysbook.ai,http://localhost:3000"
SCHEMA_FINGERPRINT = "b97218dae6354b1ba0ed4a93242f0ca848554ed02ec86246dc8977ae918c5ad6"
GRACE_WINDOW_SECONDS = "600"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "staffml-vault-staging"
database_id = "f14b8691-9e3c-432b-a413-ece5287a262d"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "19f1f3d7e03c4c3cb8704d951f7a22e7"
