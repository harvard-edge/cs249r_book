<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Defs: Arrow Markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Automatic Item Generation (AIG) Pipeline</text>

  <!-- ===== Phase Labels (left edge) ===== -->
  <rect x="4" y="48" width="12" height="78" rx="2" fill="#a31f34"/>
  <text x="10" y="98" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff" transform="rotate(-90,10,88)">PLAN</text>

  <rect x="4" y="158" width="12" height="78" rx="2" fill="#a31f34"/>
  <text x="10" y="208" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff" transform="rotate(-90,10,198)">GENERATE</text>

  <rect x="4" y="268" width="12" height="78" rx="2" fill="#a31f34"/>
  <text x="10" y="318" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff" transform="rotate(-90,10,308)">VALIDATE</text>

  <!-- ================================================================= -->
  <!-- Row 1 — PLAN (y=55..120)                                         -->
  <!-- Flow: Coverage Cube → Deficit Analyzer → Prompt Builder           -->
  <!-- ================================================================= -->

  <!-- ── 3D Coverage Cube ── -->
  <rect x="30" y="55" width="160" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="110" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#333">3D Coverage Cube</text>
  <text x="110" y="91" text-anchor="middle" font-size="8.5" fill="#555">track x level x competency</text>
  <rect x="52" y="100" width="116" height="14" rx="8" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="110" y="110" text-anchor="middle" font-size="7.5" font-weight="700" fill="#4a90c4">4 tracks x 6 levels x 12 areas</text>

  <!-- Arrow: Cube → Deficit Analyzer -->
  <line x1="190" y1="88" x2="228" y2="88" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Deficit Analyzer ── -->
  <rect x="238" y="55" width="160" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="318" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Deficit Analyzer</text>
  <text x="318" y="91" text-anchor="middle" font-size="8.5" fill="#555">finds empty/underfilled cells</text>
  <text x="318" y="105" text-anchor="middle" font-size="8" fill="#999">gap_analysis.py</text>

  <!-- Arrow: Deficit → Prompt Builder -->
  <line x1="398" y1="88" x2="438" y2="88" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Prompt Builder ── -->
  <rect x="448" y="55" width="200" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="548" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prompt Builder</text>
  <text x="548" y="91" text-anchor="middle" font-size="8.5" fill="#555">constructs targeted prompts</text>
  <text x="548" y="105" text-anchor="middle" font-size="8" fill="#999">Bloom's taxonomy + mlsysim constants</text>

  <!-- ================================================================= -->
  <!-- Row 2 — GENERATE (y=165..230)                                     -->
  <!-- Flow: Gemini Pro → Vault                                          -->
  <!-- Connected from Row 1 via Prompt Builder drop-down                 -->
  <!-- ================================================================= -->

  <!-- Arrow: Prompt Builder → Gemini Pro (down, left, down) -->
  <path d="M548,120 V142 H120 V165" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Gemini Pro ── -->
  <rect x="30" y="165" width="180" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="120" y="187" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Gemini Pro</text>
  <text x="120" y="201" text-anchor="middle" font-size="8.5" fill="#555">LLM generation engine</text>
  <rect x="58" y="210" width="124" height="14" rx="8" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="120" y="220" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">batch parallel, 6 workers</text>

  <!-- Arrow: Gemini Pro → Vault -->
  <line x1="210" y1="198" x2="288" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Vault ── -->
  <rect x="298" y="165" width="170" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="383" y="187" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Vault</text>
  <text x="383" y="201" text-anchor="middle" font-size="8.5" fill="#555">raw JSON output files</text>
  <text x="383" y="215" text-anchor="middle" font-size="8" fill="#999">_vault/*.json</text>

  <!-- ================================================================= -->
  <!-- Row 3 — VALIDATE (y=275..340)                                     -->
  <!-- Flow: Tag Validator → Quality Check → Corpus Builder              -->
  <!-- Connected from Row 2 via Vault drop-down                          -->
  <!-- ================================================================= -->

  <!-- Arrow: Vault → Tag Validator (down, left, down) -->
  <path d="M383,230 V258 H110 V275" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Tag Validator ── -->
  <rect x="30" y="275" width="160" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="110" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tag Validator</text>
  <text x="110" y="311" text-anchor="middle" font-size="8.5" fill="#555">normalize_tag()</text>
  <text x="110" y="325" text-anchor="middle" font-size="8" fill="#999">NORMALIZE_MAP</text>

  <!-- Arrow: Tag Validator → Quality Check -->
  <line x1="190" y1="308" x2="228" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Quality Check ── -->
  <rect x="238" y="275" width="170" height="65" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="323" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Quality Check</text>
  <text x="323" y="311" text-anchor="middle" font-size="8.5" fill="#555">dedup, napkin math depth</text>
  <rect x="269" y="320" width="108" height="14" rx="8" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="323" y="330" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">ChromaDB dedup</text>

  <!-- Arrow: Quality Check → Corpus Builder -->
  <line x1="408" y1="308" x2="448" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Corpus Builder ── -->
  <rect x="458" y="275" width="190" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="553" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Corpus Builder</text>
  <text x="553" y="311" text-anchor="middle" font-size="8.5" fill="#555">build_corpus.py -> corpus.json</text>
  <rect x="497" y="320" width="112" height="14" rx="8" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="553" y="330" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">3,192 questions</text>

  <!-- ===== Feedback Loop ===== -->
  <!-- Dashed arrow: Corpus Builder back up to 3D Coverage Cube (right margin) -->
  <path d="M553,275 V262 H662 V46 H110 V55"
        stroke="#4a90c4" stroke-width="1.2" fill="none"
        stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="670" y="162" text-anchor="middle" font-size="8" fill="#4a90c4" transform="rotate(-90,670,162)">feedback loop</text>

  <!-- ===== Horizontal Dividers (light dashed) ===== -->
  <line x1="22" y1="140" x2="658" y2="140" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="22" y1="252" x2="658" y2="252" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Bottom Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">AIG = Automatic Item Generation  ·  Bloom's taxonomy levels  ·  mlsysim physics constants</text>

</svg>
