<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="480" fill="#fff" rx="0"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6C2A4A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#375623"/>
    </marker>
  </defs>

  <!-- ===== Section Dividers ===== -->
  <line x1="195" y1="45" x2="195" y2="360" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="460" y1="45" x2="460" y2="360" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Section Headers ===== -->
  <text x="100" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#6C2A4A">RAW</text>
  <text x="328" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#6C2A4A">CLUSTERING</text>
  <text x="570" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#6C2A4A">CANONICAL</text>

  <!-- ===== Left Side: Raw Topics Cloud ===== -->
  <rect x="20" y="70" width="160" height="270" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="100" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#333">931 raw topic strings</text>

  <rect x="30" y="100" width="90" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="75" y="113" text-anchor="middle" font-size="7" fill="#555">GPU memory bandwidth</text>
  <rect x="70" y="125" width="100" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="120" y="138" text-anchor="middle" font-size="7" fill="#555">HBM bandwidth limits</text>
  <rect x="30" y="150" width="80" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="70" y="163" text-anchor="middle" font-size="7" fill="#555">KV cache sizing</text>
  <rect x="85" y="175" width="85" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="128" y="188" text-anchor="middle" font-size="7" fill="#555">attention memory</text>
  <rect x="30" y="200" width="95" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="78" y="213" text-anchor="middle" font-size="7" fill="#555">FLOP utilization rate</text>
  <rect x="75" y="225" width="95" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="123" y="238" text-anchor="middle" font-size="7" fill="#555">compute efficiency</text>
  <rect x="30" y="250" width="110" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="85" y="263" text-anchor="middle" font-size="7" fill="#555">activation checkpointing</text>
  <rect x="55" y="275" width="100" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="105" y="288" text-anchor="middle" font-size="7" fill="#555">memory optimization</text>
  <rect x="35" y="300" width="85" height="18" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.8"/>
  <text x="78" y="313" text-anchor="middle" font-size="7" fill="#555">batch scheduling</text>

  <text x="100" y="335" text-anchor="middle" font-size="14" fill="#999">...</text>

  <!-- ===== Middle: Clustering Pipeline ===== -->
  <line x1="180" y1="200" x2="210" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="210" y="110" width="140" height="50" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="280" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Sentence-BERT</text>
  <text x="280" y="150" text-anchor="middle" font-size="8" fill="#555">384-dim embeddings</text>

  <line x1="280" y1="160" x2="280" y2="185" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="210" y="185" width="140" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="280" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Agglomerative</text>
  <text x="280" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Clustering</text>

  <text x="280" y="255" text-anchor="middle" font-size="8" fill="#555" font-style="italic">silhouette score &gt; 0.5</text>

  <line x1="350" y1="210" x2="470" y2="210" stroke="#375623" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="410" y="200" text-anchor="middle" font-size="8" fill="#555">931 -> ~100</text>

  <!-- ===== Right Side: Canonical Hierarchy ===== -->
  <rect x="470" y="70" width="195" height="285" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="568" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#333">~100 canonical concepts</text>
  <text x="568" y="103" text-anchor="middle" font-size="8" fill="#999">(SKOS-lite)</text>

  <rect x="485" y="115" width="80" height="24" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.2"/>
  <text x="525" y="131" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Memory</text>
  <rect x="575" y="112" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="123" text-anchor="middle" font-size="7" fill="#555">kv-cache</text>
  <rect x="575" y="130" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="141" text-anchor="middle" font-size="7" fill="#555">memory-hierarchy</text>
  <rect x="575" y="148" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="159" text-anchor="middle" font-size="7" fill="#555">activation-memory</text>

  <rect x="485" y="175" width="80" height="24" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.2"/>
  <text x="525" y="191" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Compute</text>
  <rect x="575" y="172" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="183" text-anchor="middle" font-size="7" fill="#555">flop-utilization</text>
  <rect x="575" y="190" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="201" text-anchor="middle" font-size="7" fill="#555">roofline-model</text>
  <rect x="575" y="208" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="219" text-anchor="middle" font-size="7" fill="#555">parallelism</text>

  <rect x="485" y="235" width="80" height="24" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.2"/>
  <text x="525" y="251" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Serving</text>
  <rect x="575" y="232" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="243" text-anchor="middle" font-size="7" fill="#555">batching</text>
  <rect x="575" y="250" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="261" text-anchor="middle" font-size="7" fill="#555">latency-sla</text>
  <rect x="575" y="268" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="279" text-anchor="middle" font-size="7" fill="#555">load-balancing</text>

  <rect x="485" y="295" width="80" height="24" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.2"/>
  <text x="525" y="311" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Training</text>
  <rect x="575" y="292" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="303" text-anchor="middle" font-size="7" fill="#555">gradient-sync</text>
  <rect x="575" y="310" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="321" text-anchor="middle" font-size="7" fill="#555">checkpointing</text>
  <rect x="575" y="328" width="78" height="16" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="614" y="339" text-anchor="middle" font-size="7" fill="#555">mixed-precision</text>

  <!-- ===== SKOS Relationships ===== -->
  <rect x="60" y="375" width="560" height="55" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="340" y="393" text-anchor="middle" font-size="9" font-weight="700" fill="#333">SKOS-lite Relationships</text>

  <rect x="80" y="400" width="80" height="20" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="0.8"/>
  <text x="120" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#333">prefLabel</text>
  <line x1="160" y1="410" x2="190" y2="410" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <rect x="190" y="400" width="70" height="20" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="225" y="414" text-anchor="middle" font-size="8" fill="#555">altLabel</text>
  <text x="225" y="424" text-anchor="middle" font-size="7" fill="#999">(synonyms)</text>

  <rect x="290" y="400" width="70" height="20" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="0.8"/>
  <text x="325" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#333">broader</text>
  <line x1="360" y1="407" x2="400" y2="407" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <line x1="400" y1="413" x2="360" y2="413" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <rect x="400" y="400" width="70" height="20" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="0.8"/>
  <text x="435" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#333">narrower</text>
  <text x="380" y="424" text-anchor="middle" font-size="7" fill="#999">(hierarchy)</text>

  <rect x="500" y="400" width="100" height="20" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="0.8"/>
  <text x="550" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#333">related</text>
  <text x="550" y="424" text-anchor="middle" font-size="7" fill="#999">(associative)</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="340" y="465" text-anchor="middle" font-size="9" fill="#999" font-style="italic">931 raw topic strings collapsed to ~100 canonical concepts via embedding-based clustering</text>
</svg>
