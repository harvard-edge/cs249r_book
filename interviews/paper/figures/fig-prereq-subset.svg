<?xml version="1.0" encoding="UTF-8"?>
<!-- Prerequisite subgraph: thicker strokes + round caps for print clarity; cross-area label offset from the path -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 28 632 424" overflow="visible"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="8" y="28" width="632" height="424" fill="#fff" rx="0"/>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2a2a2a"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#5a1f3a"/>
    </marker>
  </defs>

  <!-- ===== Legend ===== -->
  <rect x="20" y="40" width="280" height="32" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="0"/>
  <rect x="30" y="50" width="10" height="10" fill="#E9EFF7" stroke="#2F5496" stroke-width="1" rx="0"/>
  <text x="44" y="59" font-size="8" fill="#555">Compute</text>
  <rect x="90" y="50" width="10" height="10" fill="#EBF1E4" stroke="#375623" stroke-width="1" rx="0"/>
  <text x="104" y="59" font-size="8" fill="#555">Parallelism</text>
  <rect x="160" y="50" width="10" height="10" fill="#FDF2EA" stroke="#843C0C" stroke-width="1" rx="0"/>
  <text x="174" y="59" font-size="8" fill="#555">Networking</text>
  <line x1="230" y1="55" x2="252" y2="55" stroke="#5a1f3a" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>
  <text x="260" y="59" font-size="8" fill="#555">Cross-area</text>

  <!-- ===== Compute Area (Blue) ===== -->
  <rect x="20" y="85" width="180" height="190" fill="#E9EFF7" fill-opacity="0.3" stroke="#2F5496" stroke-width="1" rx="0" stroke-dasharray="4,3"/>
  <text x="110" y="102" font-size="9" font-weight="700" fill="#2F5496" text-anchor="middle">Compute</text>

  <!-- Roofline Analysis (root) -->
  <rect x="35" y="112" width="150" height="40" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5" rx="0"/>
  <text x="110" y="130" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Roofline Analysis</text>
  <text x="110" y="143" font-size="7.5" fill="#555" text-anchor="middle">root · L1–L4</text>

  <!-- GPU Compute Arch -->
  <rect x="35" y="185" width="150" height="40" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5" rx="0"/>
  <text x="110" y="200" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">GPU Compute</text>
  <text x="110" y="213" font-size="7.5" fill="#555" text-anchor="middle">Architecture</text>

  <!-- Arrow: Roofline -> GPU Compute -->
  <line x1="110" y1="152" x2="110" y2="183" stroke="#2a2a2a" stroke-width="1.75" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- ===== Networking Area (Orange) ===== -->
  <rect x="20" y="295" width="180" height="65" fill="#FDF2EA" fill-opacity="0.3" stroke="#843C0C" stroke-width="1" rx="0" stroke-dasharray="4,3"/>
  <text x="110" y="311" font-size="9" font-weight="700" fill="#843C0C" text-anchor="middle">Networking</text>

  <!-- Collective Communication -->
  <rect x="35" y="318" width="150" height="33" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5" rx="0"/>
  <text x="110" y="333" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Collective Comm.</text>
  <text x="110" y="345" font-size="7.5" fill="#555" text-anchor="middle">AllReduce, Ring, Tree</text>

  <!-- Slightly more gap between left stack and green block than translate(-12) for clearer cross-column arrow -->
  <g transform="translate(-6,0)">
  <rect x="230" y="85" width="405" height="340" fill="#EBF1E4" fill-opacity="0.3" stroke="#375623" stroke-width="1.2" rx="0"/>
  <text x="432.5" y="102" font-size="11" font-weight="700" fill="#375623" text-anchor="middle">Parallelism (6 topics)</text>

  <rect x="340" y="112" width="160" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="420" y="131" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Parallelism</text>
  <text x="420" y="145" font-size="7.5" fill="#555" text-anchor="middle">root · L2–L5</text>

  <rect x="260" y="195" width="155" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="337" y="212" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Model / Tensor</text>
  <text x="337" y="226" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Parallelism</text>

  <rect x="445" y="195" width="155" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="522" y="212" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Pipeline</text>
  <text x="522" y="226" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Parallelism</text>

  <rect x="355" y="280" width="160" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="435" y="299" font-size="10" font-weight="700" fill="#333" text-anchor="middle">3D Parallelism</text>
  <text x="435" y="313" font-size="7.5" fill="#555" text-anchor="middle">requires all three · L5–L6+</text>

  <rect x="260" y="365" width="155" height="40" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="337" y="383" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Gradient Sync.</text>
  <text x="337" y="397" font-size="7.5" fill="#555" text-anchor="middle">requires Data Par. + Coll. Comm.</text>

  <rect x="475" y="365" width="155" height="40" fill="#EBF1E4" stroke="#375623" stroke-width="1.2" rx="0"/>
  <text x="552" y="383" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Scheduling &amp; Resource Mgmt</text>
  <text x="552" y="397" font-size="7.5" fill="#555" text-anchor="middle">root (no prereqs)</text>

  <!-- Arrows: round joins + consistent weight -->
  <line x1="390" y1="154" x2="350" y2="193" stroke="#2a2a2a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <line x1="460" y1="154" x2="510" y2="193" stroke="#2a2a2a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <!-- Data -> 3D: stay inside green frame with margin; corner radius via arc -->
  <path d="M 500,133
           L 612,133
           L 612,300
           L 517,300" stroke="#2a2a2a" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <line x1="370" y1="237" x2="415" y2="278" stroke="#2a2a2a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <line x1="500" y1="237" x2="455" y2="278" stroke="#2a2a2a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <!-- Data -> Gradient: vertical route with offset from left green border (x=230) for separation -->
  <path d="M 340,133
           L 238,133
           L 238,385
           L 254,385" stroke="#2a2a2a" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  </g>

  <!-- Cross-area: start from right edge of Collective; horizontal segment sits above coll. top for label clearance -->
  <!-- Gradient after translate -6: left edge 254, vertical feed ends ~254 -->
  <path d="M 185,334
           L 228,334
           L 228,384
           L 254,384" stroke="#5a1f3a" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>

  <!-- Label above the first segment (not on the stroke) -->
  <rect x="170" y="315" width="58" height="12" fill="#fff" fill-opacity="0.92" rx="2"/>
  <text x="199" y="324" font-size="7.5" fill="#5a1f3a" font-style="italic" text-anchor="middle">cross-area</text>
</svg>
