<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="18 48 648 362"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="18" y="48" width="648" height="362" fill="#fff" rx="0"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Central question box (Neutral/Data) ===== -->
  <rect x="265" y="180" width="150" height="70" rx="0" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Question</text>
  <text x="340" y="228" text-anchor="middle" font-size="9" fill="#555">Classified on four</text>
  <text x="340" y="240" text-anchor="middle" font-size="9" fill="#555">independent axes</text>

  <!-- ===== TOPIC (left, Blue/Compute) ===== -->
  <line x1="265" y1="215" x2="185" y2="215" stroke="#2F5496" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="25" y="155" width="155" height="120" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.2"/>
  <text x="102" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#2F5496">Topic</text>
  <text x="102" y="197" text-anchor="middle" font-size="10" fill="#555">WHAT concept?</text>
  <line x1="40" y1="206" x2="165" y2="206" stroke="#2F5496" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="102" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#333">87 curated topics</text>
  <text x="102" y="239" text-anchor="middle" font-size="9" fill="#888">13 competency areas</text>
  <text x="102" y="255" text-anchor="middle" font-size="9" fill="#2F5496">prerequisite graph</text>
  <text x="102" y="268" text-anchor="middle" font-size="9" fill="#2F5496">(57 edges, DAG)</text>

  <!-- ===== ZONE (right, Green/Validated) ===== -->
  <line x1="415" y1="215" x2="495" y2="215" stroke="#375623" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="500" y="155" width="155" height="120" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.2"/>
  <text x="577" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#375623">Zone</text>
  <text x="577" y="197" text-anchor="middle" font-size="10" fill="#555">HOW is it tested?</text>
  <line x1="515" y1="206" x2="640" y2="206" stroke="#375623" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="577" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#333">11 ikigai zones</text>
  <text x="577" y="239" text-anchor="middle" font-size="9" fill="#888">4 pure + 6 compound</text>
  <text x="577" y="255" text-anchor="middle" font-size="9" fill="#375623">recall · analyze</text>
  <text x="577" y="268" text-anchor="middle" font-size="9" fill="#375623">design · quantify</text>

  <!-- ===== TRACK (top, Orange/Process) ===== -->
  <line x1="340" y1="180" x2="340" y2="120" stroke="#843C0C" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="230" y="52" width="220" height="65" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.2"/>
  <text x="340" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#843C0C">Track</text>
  <text x="340" y="93" text-anchor="middle" font-size="10" fill="#555">WHERE does it deploy?</text>
  <text x="340" y="109" text-anchor="middle" font-size="9.5" fill="#843C0C">cloud · edge · mobile · tinyml · global</text>

  <!-- ===== LEVEL (bottom, Purple-red/Error) ===== -->
  <line x1="340" y1="250" x2="340" y2="320" stroke="#6C2A4A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="230" y="325" width="220" height="80" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="1.2"/>
  <text x="340" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#6C2A4A">Level</text>
  <text x="340" y="366" text-anchor="middle" font-size="10" fill="#555">HOW HARD is it?</text>
  <text x="340" y="384" text-anchor="middle" font-size="9.5" fill="#6C2A4A">L1 · L2 · L3 · L4 · L5 · L6+</text>
  <text x="340" y="398" text-anchor="middle" font-size="9" fill="#888">Bloom's taxonomy → industry ladder</text>

</svg>
