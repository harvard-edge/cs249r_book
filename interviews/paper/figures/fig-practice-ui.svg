<?xml version="1.0" encoding="UTF-8"?>
<!--
  Practice UI mockup for §11 Practical Applications.
  viewBox is widened from the default 680x460 to 760x420 because the figure
  has three independent column groups (filter sidebar, question card,
  chain progress rail) and a 680px canvas would force the question-card
  napkin-math line to wrap at unnatural break points. Style guide allows
  this widening when content genuinely needs more room. The internal
  title is omitted; the LaTeX caption supplies it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="760" height="420" fill="#fff" rx="4"/>

  <!-- =========================================================== -->
  <!-- ===== Filter sidebar (left column) ======================== -->
  <!-- =========================================================== -->
  <rect x="20" y="20" width="160" height="370" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" rx="5"/>
  <text x="100" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Filters</text>

  <!-- Track filter (4 chips, uniform 60×20, 2×2 grid) -->
  <text x="32" y="58" font-size="9" font-weight="700" fill="#555">TRACK</text>
  <rect x="32"  y="64" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="62"  y="78" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">cloud</text>
  <rect x="100" y="64" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="130" y="78" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">edge</text>
  <rect x="32"  y="88" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="62"  y="102" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">mobile</text>
  <rect x="100" y="88" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="130" y="102" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">tinyml</text>

  <!-- Level filter (6 chips, uniform 20×20, single row) -->
  <text x="32" y="128" font-size="9" font-weight="700" fill="#555">LEVEL</text>
  <rect x="32"  y="134" width="20" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="42"  y="148" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">L1</text>
  <rect x="54"  y="134" width="20" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="64"  y="148" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">L2</text>
  <rect x="76"  y="134" width="20" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="86"  y="148" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">L3</text>
  <rect x="98"  y="134" width="20" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="108" y="148" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">L4</text>
  <rect x="120" y="134" width="20" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="130" y="148" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">L5</text>
  <rect x="142" y="134" width="20" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="152" y="148" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">L6+</text>

  <!-- Zone filter (6 chips, uniform 60×20, 2×3 grid) -->
  <text x="32" y="178" font-size="9" font-weight="700" fill="#555">ZONE</text>
  <rect x="32"  y="184" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="62"  y="198" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">diagnosis</text>
  <rect x="100" y="184" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="130" y="198" text-anchor="middle" font-size="8" font-weight="400" fill="#888">specification</text>
  <rect x="32"  y="208" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="62"  y="222" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">fluency</text>
  <rect x="100" y="208" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="130" y="222" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">evaluation</text>
  <rect x="32"  y="232" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="62"  y="246" text-anchor="middle" font-size="8" font-weight="400" fill="#888">optimization</text>
  <rect x="100" y="232" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="130" y="246" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">mastery</text>

  <!-- View filter (2 chips, uniform 60×20) -->
  <text x="32" y="276" font-size="9" font-weight="700" fill="#555">VIEW</text>
  <rect x="32"  y="282" width="60" height="20" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="62"  y="296" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">all</text>
  <rect x="100" y="282" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="130" y="296" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">chains only</text>

  <!-- Match counter -->
  <text x="32" y="328" font-size="9" font-weight="700" fill="#555">MATCHES</text>
  <text x="32" y="350" font-size="20" font-weight="700" fill="#a31f34">847</text>
  <text x="68" y="350" font-size="9" fill="#555">questions</text>
  <text x="32" y="366" font-size="8.5" fill="#888">across 28 topics</text>
  <text x="32" y="380" font-size="8.5" fill="#888">in 41 depth chains</text>

  <!-- =========================================================== -->
  <!-- ===== Question card (centre column) ======================= -->
  <!-- =========================================================== -->
  <rect x="200" y="20" width="380" height="320" fill="#fff" stroke="#999" stroke-width="1.2" rx="4"/>

  <!-- Metadata title bar -->
  <rect x="200" y="20" width="380" height="28" fill="#f0f0f0" stroke="none"/>
  <line x1="200" y1="48" x2="580" y2="48" stroke="#bbb" stroke-width="0.8"/>
  <text x="208" y="39" font-size="9" font-family="Courier" font-weight="700" fill="#333">roofline-analysis</text>
  <text x="350" y="39" font-size="8.5" fill="#555">diagnosis</text>
  <text x="420" y="39" font-size="8.5" fill="#555">cloud</text>
  <text x="470" y="39" font-size="8.5" fill="#555">L4</text>

  <!-- Scenario -->
  <text x="208" y="68" font-size="9" font-weight="700" fill="#333">Scenario</text>
  <text x="208" y="84"  font-size="8.5" fill="#333">Your production LLM serving cluster reports an 8% MFU during the</text>
  <text x="208" y="98"  font-size="8.5" fill="#333">decode phase at batch size B &#x2248; 16. The H100s are rated at 495</text>
  <text x="208" y="112" font-size="8.5" fill="#333">TFLOPS TF32 dense. Your team assumes the GPUs are underclocked or</text>
  <text x="208" y="126" font-size="8.5" fill="#333">driver-limited. Diagnose the actual root cause.</text>

  <!-- Common mistake (collapsed initially — orange routing-color disclosure) -->
  <rect x="208" y="140" width="160" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0" rx="4"/>
  <text x="288" y="154" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">&#x25B8; common mistake</text>

  <!-- Napkin math (expanded — neutral container, the active reading state) -->
  <rect x="208" y="170" width="364" height="92" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" rx="4"/>
  <text x="216" y="186" font-size="9" font-weight="700" fill="#333">&#x25BE; napkin math</text>
  <text x="216" y="202" font-size="8.5" fill="#333">Each step reads weights (140 GB FP16) once, applies them to B tokens.</text>
  <text x="216" y="216" font-size="8.5" font-family="Courier" fill="#555">  AI = B&#xD7;140 GFLOPs / 140 GB = B FLOP/Byte; at B=16: AI = 16</text>
  <text x="216" y="230" font-size="8.5" fill="#333">H100 ridge point: 495 TFLOPS / 3.35 TB/s = 148 FLOPs/Byte (dense).</text>
  <text x="216" y="244" font-size="8.5" fill="#333">9&#xD7; below ridge &#x2192; HBM-bound. Ceiling = 3.35 TB/s &#xD7; 16 = 54 TFLOPS</text>
  <text x="216" y="256" font-size="8.5" fill="#333">&#x2248; 11% of peak; 8% MFU is &#x2248; 73% of that ceiling.</text>

  <!-- Answer reveal (gated, dashed border = optional/projected) -->
  <rect x="208" y="270" width="160" height="22" fill="#fff" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,2" rx="4"/>
  <text x="288" y="284" text-anchor="middle" font-size="8.5" font-weight="700" fill="#888">&#x25B8; reveal answer</text>

  <!-- Self-grade footer (3 chips, uniform 56×22) -->
  <text x="208" y="310" font-size="9" font-weight="700" fill="#555">SELF-GRADE</text>
  <rect x="208" y="316" width="56" height="22" fill="#fff" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="236" y="331" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">&#x2713; got it</text>
  <rect x="270" y="316" width="56" height="22" fill="#fff" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="298" y="331" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">&#x223C; partial</text>
  <rect x="332" y="316" width="56" height="22" fill="#fff" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="360" y="331" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">&#x2717; missed</text>

  <!-- =========================================================== -->
  <!-- ===== Chain progress rail (right column) ================== -->
  <!-- =========================================================== -->
  <rect x="600" y="20" width="140" height="370" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" rx="5"/>
  <text x="670" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Chain progress</text>
  <text x="670" y="52" text-anchor="middle" font-size="8.5" fill="#888">roofline-analysis</text>

  <!-- Chain steps (uniform 116×24 — three completed, one active, two pending) -->
  <rect x="612" y="68"  width="116" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="620" y="83"  font-size="8.5" font-weight="700" fill="#333">L1</text>
  <text x="640" y="83"  font-size="8.5" fill="#333">recall: ridge pt</text>
  <text x="722" y="83"  text-anchor="end" font-size="9" fill="#3d9e5a">&#x2713;</text>

  <rect x="612" y="98"  width="116" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="620" y="113" font-size="8.5" font-weight="700" fill="#333">L2</text>
  <text x="640" y="113" font-size="8.5" fill="#333">apply: AI calc</text>
  <text x="722" y="113" text-anchor="end" font-size="9" fill="#3d9e5a">&#x2713;</text>

  <rect x="612" y="128" width="116" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="620" y="143" font-size="8.5" font-weight="700" fill="#333">L3</text>
  <text x="640" y="143" font-size="8.5" fill="#333">fluency: KV size</text>
  <text x="722" y="143" text-anchor="end" font-size="9" fill="#3d9e5a">&#x2713;</text>

  <rect x="612" y="158" width="116" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="620" y="173" font-size="8.5" font-weight="700" fill="#333">L4</text>
  <text x="640" y="173" font-size="8.5" font-weight="700" fill="#333">diagnose: MFU</text>
  <text x="722" y="173" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">&#x25B8;</text>

  <rect x="612" y="188" width="116" height="24" fill="#fff" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,2" rx="4"/>
  <text x="620" y="203" font-size="8.5" font-weight="700" fill="#999">L5</text>
  <text x="640" y="203" font-size="8.5" fill="#888">specify: SLO</text>

  <rect x="612" y="218" width="116" height="24" fill="#fff" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,2" rx="4"/>
  <text x="620" y="233" font-size="8.5" font-weight="700" fill="#999">L6+</text>
  <text x="640" y="233" font-size="8.5" fill="#888">mastery: stall</text>

  <!-- Session stats -->
  <text x="612" y="268" font-size="9" font-weight="700" fill="#555">SESSION</text>
  <text x="612" y="286" font-size="8.5" fill="#333">12 questions</text>
  <text x="612" y="300" font-size="8.5" fill="#333">9 got &#x2022; 2 partial &#x2022; 1 missed</text>
  <text x="612" y="314" font-size="8.5" fill="#333">37 minutes elapsed</text>

  <!-- Action button (MIT red accent) -->
  <rect x="612" y="332" width="116" height="26" fill="#a31f34" stroke="none" rx="4"/>
  <text x="670" y="348" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">next chain step &#x2192;</text>

  <!-- ===== Bottom footnote (italic, centred, per style guide) ===== -->
  <text x="380" y="410" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Filter axes (left) drive the corpus slice; the active question card (centre) flows scenario&#x2192;mistake&#x2192;napkin math&#x2192;answer&#x2192;self-grade; the chain rail (right) auto-advances on success.</text>
</svg>
