  </g>
  <text x="400" y="56" font-size="8" font-family="JetBrains Mono, monospace" fill="#a0a1b0" dominant-baseline="central">roofline-analysis · chain</text>

  <text x="224" y="90" font-size="17" font-weight="700" fill="#1a1b25" letter-spacing="-0.02em">Decode MFU is 8% at batch 16</text>
  <text x="224" y="108" font-size="17" font-weight="700" fill="#1a1b25" letter-spacing="-0.02em">— where is the roofline?</text>

  <rect x="220" y="120" width="480" height="48" fill="rgba(37,99,235,0.06)" stroke="none" rx="0"/>
  <line x1="220" y1="120" x2="220" y2="168" stroke="#2563eb" stroke-width="3"/>
  <text x="232" y="135" font-size="8" font-weight="600" font-family="JetBrains Mono, monospace" fill="#2563eb" letter-spacing="0.14em">YOUR TASK</text>
  <text x="232" y="152" font-size="10" fill="#1a1b25" font-weight="500">Name the bound and show arithmetic intensity is below the ridge point.</text>

  <text x="224" y="192" font-size="11" fill="#4a4b5c">Your production LLM serving reports ~8% MFU during decode at B≈16.</text>
  <text x="224" y="208" font-size="11" fill="#4a4b5c">H100: 494 TFLOPS (dense TF32) · 3.35 TB/s HBM. Team suspects underclocking.</text>
  <text x="224" y="224" font-size="11" fill="#4a4b5c">You think memory bandwidth — prove it with napkin math before peeking.</text>

  <text x="224" y="250" font-size="8" font-weight="600" font-family="JetBrains Mono, monospace" fill="#7a7b8e" letter-spacing="0.12em">YOUR NAPKIN MATH</text>
  <rect x="224" y="256" width="468" height="100" fill="#f8f9fa" stroke="#d4d5db" stroke-width="1" rx="4"/>
  <text x="236" y="278" font-size="9" font-family="JetBrains Mono, Consolas, monospace" fill="#4a4b5c"># weights ~140 GiB @ FP16 → one full pass per step reads ~140 GiB</text>
  <text x="236" y="296" font-size="9" font-family="JetBrains Mono, Consolas, monospace" fill="#4a4b5c"># AI = B * FLOP/byte ~ 16 FLOP/B   |   H100 ridge ~ 148 FLOP/B</text>
  <text x="236" y="314" font-size="9" font-family="JetBrains Mono, Consolas, monospace" fill="#4a4b5c"># ⇒ memory-bound; ceiling set by 3.35 TB/s, not 494 TFLOPS…</text>
  <line x1="232" y1="330" x2="680" y2="330" stroke="#e2e3e8" stroke-width="1"/>
  <text x="236" y="346" font-size="8" font-family="JetBrains Mono, monospace" fill="#a0a1b0" font-style="italic">Type final line as  =&gt;  54e12  to check against model (⌘↵)</text>

  <rect x="224" y="364" width="468" height="32" fill="#1a1b25" rx="5"/>
  <text x="458" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Reveal Answer</text>
  <text x="676" y="384" text-anchor="end" font-size="8" fill="#a0a1b0" opacity="0.95" font-family="JetBrains Mono, monospace">⌘↵</text>

  <text x="224" y="414" text-anchor="start" font-size="8" font-family="JetBrains Mono, monospace" fill="#7a7b8e">Stuck? Ask Interviewer in the tools panel →</text>
