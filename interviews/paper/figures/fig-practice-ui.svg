  <text x="736" y="404" font-size="6.25" fill="#a0a1b0" font-family="JetBrains Mono, monospace" font-style="italic">budget?' or 'how many concurrent users?'</text>

  <text x="730" y="438" font-size="6.25" font-family="JetBrains Mono, monospace" fill="#7a7b8e">⌘↵ to send</text>
