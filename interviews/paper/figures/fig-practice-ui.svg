  <text x="942" y="439" text-anchor="middle" font-size="6.2" font-weight="700" fill="#ffffff">Ask</text>

  <text x="730" y="458" font-size="5.9" fill="#7a7b8e" font-family="JetBrains Mono, monospace">Journal mode — nothing leaves your browser. Use</text>
  <text x="730" y="468" font-size="5.9" fill="#7a7b8e" font-family="JetBrains Mono, monospace">Copy-as-prompt and paste into the LLM of your choice</text>
