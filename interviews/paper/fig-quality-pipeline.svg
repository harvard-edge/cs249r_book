<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Three-Lane Quality Assurance Pipeline</text>

  <!-- ===== Lane Dividers ===== -->
  <line x1="20" y1="155" x2="660" y2="155" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="20" y1="275" x2="660" y2="275" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Lane 1: SCHEMA ===== -->
  <text x="30" y="58" font-size="10" font-weight="700" fill="#a31f34">LANE 1: SCHEMA</text>

  <!-- corpus.json -->
  <rect x="40" y="70" width="100" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="90" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#333">corpus.json</text>
  <text x="90" y="105" text-anchor="middle" font-size="8" fill="#555">raw items</text>

  <!-- Arrow -->
  <line x1="140" y1="92" x2="180" y2="92" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pydantic Validator -->
  <rect x="180" y="70" width="140" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="250" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Pydantic Validator</text>
  <text x="250" y="105" text-anchor="middle" font-size="8" fill="#555">strict schema enforcement</text>

  <!-- Arrow -->
  <line x1="320" y1="92" x2="360" y2="92" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Results box -->
  <rect x="360" y="65" width="280" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="500" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Validated Fields</text>
  <text x="410" y="100" font-size="8" fill="#555">  field types</text>
  <text x="410" y="112" font-size="8" fill="#555">  string lengths</text>
  <text x="520" y="100" font-size="8" fill="#555">  taxonomy refs</text>
  <text x="520" y="112" font-size="8" fill="#555">  MCQ format</text>

  <!-- Check marks as accent pills -->
  <rect x="393" y="93" width="10" height="10" rx="2" fill="#3d9e5a"/>
  <text x="398" y="101" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">+</text>
  <rect x="393" y="105" width="10" height="10" rx="2" fill="#3d9e5a"/>
  <text x="398" y="113" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">+</text>
  <rect x="503" y="93" width="10" height="10" rx="2" fill="#3d9e5a"/>
  <text x="508" y="101" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">+</text>
  <rect x="503" y="105" width="10" height="10" rx="2" fill="#3d9e5a"/>
  <text x="508" y="113" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">+</text>

  <!-- ===== Lane 2: DEDUP ===== -->
  <text x="30" y="178" font-size="10" font-weight="700" fill="#a31f34">LANE 2: DEDUP</text>

  <!-- Stage 1: Exact -->
  <rect x="40" y="190" width="150" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="115" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Stage 1: Exact</text>
  <text x="115" y="226" text-anchor="middle" font-size="8.5" fill="#555">hash match</text>
  <text x="115" y="240" text-anchor="middle" font-size="7.5" fill="#999" font-style="italic">catches: copy-paste</text>

  <!-- Arrow -->
  <line x1="190" y1="220" x2="230" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Fuzzy -->
  <rect x="230" y="190" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="310" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Stage 2: Fuzzy</text>
  <!-- Threshold pill -->
  <rect x="275" y="217" width="70" height="14" rx="12" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="310" y="228" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">thresh &gt; 0.90</text>
  <text x="310" y="244" text-anchor="middle" font-size="7.5" fill="#999" font-style="italic">catches: rewordings</text>

  <!-- Arrow -->
  <line x1="390" y1="220" x2="430" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Semantic -->
  <rect x="430" y="190" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="510" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Stage 3: Semantic</text>
  <!-- Threshold pill -->
  <rect x="475" y="217" width="70" height="14" rx="12" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="510" y="228" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">thresh &gt; 0.85</text>
  <text x="510" y="244" text-anchor="middle" font-size="7.5" fill="#999" font-style="italic">catches: same-concept</text>

  <!-- ===== Lane 3: MATH REVIEW ===== -->
  <text x="30" y="298" font-size="10" font-weight="700" fill="#a31f34">LANE 3: MATH REVIEW</text>

  <!-- Round 1: Gemini Flash -->
  <rect x="40" y="310" width="130" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="105" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Round 1</text>
  <text x="105" y="348" text-anchor="middle" font-size="8.5" fill="#555">Gemini Flash</text>

  <!-- Arrow -->
  <line x1="170" y1="335" x2="205" y2="335" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Round 2: Claude Opus -->
  <rect x="205" y="310" width="130" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Round 2</text>
  <text x="270" y="348" text-anchor="middle" font-size="8.5" fill="#555">Claude Opus</text>

  <!-- Arrow -->
  <line x1="335" y1="335" x2="370" y2="335" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Discrepancy Analysis -->
  <rect x="370" y="310" width="130" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="435" y="330" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Discrepancy</text>
  <text x="435" y="345" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Analysis</text>

  <!-- Arrow -->
  <line x1="500" y1="335" x2="535" y2="335" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Confirmed Fixes -->
  <rect x="535" y="310" width="110" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="590" y="330" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Confirmed</text>
  <text x="590" y="345" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Fixes</text>

  <!-- Annotation pill -->
  <rect x="530" y="365" width="120" height="16" rx="12" fill="#fff" stroke="#a31f34" stroke-width="0.8"/>
  <text x="590" y="377" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">48 errors / 10 FP</text>

  <!-- ===== Convergence: Validated Corpus ===== -->
  <!-- Converging arrows -->
  <line x1="500" y1="120" x2="500" y2="395" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Arrows converging to final box -->
  <path d="M640,92 L655,92 L655,410 L560,410" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M590,250 L620,250 L620,410 L560,410" fill="none" stroke="#3d9e5a" stroke-width="1.2"/>
  <path d="M590,381 L590,398" fill="none" stroke="#3d9e5a" stroke-width="1.2"/>

  <!-- Validated Corpus -->
  <rect x="370" y="397" width="190" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="2.0"/>
  <text x="465" y="419" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Validated Corpus</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">All three lanes must pass before an item enters the production corpus</text>
</svg>
