<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="300" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Backward Design: The Derivation Chain</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" fill="#555">Corpus size is an output of principled constraints, not an input</text>

  <!-- ===== Step Numbers ===== -->
  <text x="68" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#999">1</text>
  <text x="198" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#999">2</text>
  <text x="328" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#999">3</text>
  <text x="458" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#999">4</text>
  <text x="598" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#999">5</text>

  <!-- ===== Step 1: Competency (Process/Input) ===== -->
  <rect x="23" y="90" width="90" height="100" rx="4" fill="#FFE5CC" stroke="#CC5500" stroke-width="1.5"/>
  <text x="68" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Staff ML</text>
  <text x="68" y="135" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Systems</text>
  <text x="68" y="148" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Competency</text>
  <line x1="30" y1="160" x2="106" y2="160" stroke="#CC5500" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="68" y="176" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">Mechanical</text>
  <text x="68" y="186" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">sympathy</text>

  <!-- ===== Arrow 1→2 ===== -->
  <line x1="113" y1="140" x2="148" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 2: Skills → Zones (Logic/Compute) ===== -->
  <rect x="153" y="90" width="90" height="100" rx="4" fill="#D1E6F3" stroke="#006395" stroke-width="1.5"/>
  <text x="198" y="127" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">4 Skills</text>
  <text x="198" y="142" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">→ 12 Zones</text>
  <line x1="160" y1="155" x2="236" y2="155" stroke="#006395" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="198" y="170" text-anchor="middle" font-size="7" fill="#555" font-style="italic">C(4,1)+C(4,2)+2</text>
  <text x="198" y="181" text-anchor="middle" font-size="7" fill="#555" font-style="italic">= 12</text>

  <!-- ===== Arrow 2→3 ===== -->
  <line x1="243" y1="140" x2="278" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 3: Topics (Logic/Compute) ===== -->
  <rect x="283" y="90" width="90" height="100" rx="4" fill="#D1E6F3" stroke="#006395" stroke-width="1.5"/>
  <text x="328" y="125" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">86 Topics</text>
  <text x="328" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">× 4 Tracks</text>
  <line x1="290" y1="153" x2="366" y2="153" stroke="#006395" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="328" y="168" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">344 possible</text>
  <text x="328" y="179" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">pairs</text>

  <!-- ===== Arrow 3→4 ===== -->
  <line x1="373" y1="140" x2="408" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 4: Physics Filter (Validation) ===== -->
  <rect x="413" y="90" width="90" height="100" rx="4" fill="#D4EFDF" stroke="#008F45" stroke-width="1.5"/>
  <text x="458" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">233</text>
  <text x="458" y="137" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Applicable</text>
  <text x="458" y="152" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Pairs</text>
  <line x1="420" y1="162" x2="496" y2="162" stroke="#008F45" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="458" y="178" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">83 excluded</text>
  <text x="458" y="188" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">by physics</text>

  <!-- ── Red "−83" annotation ── -->
  <rect x="438" y="198" width="40" height="16" rx="8" fill="#F5D2D5" stroke="#CB202D" stroke-width="0.8"/>
  <text x="458" y="209" text-anchor="middle" font-size="7.5" font-weight="700" fill="#CB202D">−83</text>

  <!-- ===== Arrow 4→5 ===== -->
  <line x1="503" y1="140" x2="543" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 5: Corpus (Validation) ===== -->
  <rect x="548" y="90" width="100" height="100" rx="4" fill="#D4EFDF" stroke="#008F45" stroke-width="1.5"/>
  <text x="598" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">~9,500</text>
  <text x="598" y="137" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Questions</text>
  <line x1="555" y1="152" x2="641" y2="152" stroke="#008F45" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="598" y="168" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">Derived,</text>
  <text x="598" y="179" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">not chosen</text>

  <!-- ===== Narrowing brace annotation ===== -->
  <text x="340" y="240" text-anchor="middle" font-size="8" fill="#999">344 → 233 → ~9,500 questions</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="282" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each step constrains the next. The question count falls out as a consequence.</text>
</svg>
