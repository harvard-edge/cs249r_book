<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 8 680 124"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="0" y="8" width="680" height="124" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Step labels ===== -->
  <text x="68" y="20" text-anchor="middle" font-size="6.5" font-weight="700" fill="#666">Step 1</text>
  <text x="198" y="20" text-anchor="middle" font-size="6.5" font-weight="700" fill="#666">Step 2</text>
  <text x="328" y="20" text-anchor="middle" font-size="6.5" font-weight="700" fill="#666">Step 3</text>
  <text x="458" y="20" text-anchor="middle" font-size="6.5" font-weight="700" fill="#666">Step 4</text>
  <text x="598" y="20" text-anchor="middle" font-size="6.5" font-weight="700" fill="#666">Step 5</text>

  <!-- ===== Step 1: Competency ===== -->
  <rect x="23" y="28" width="90" height="92" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="68" y="54" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Staff ML</text>
  <text x="68" y="67" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Systems</text>
  <text x="68" y="80" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Competency</text>
  <line x1="30" y1="90" x2="106" y2="90" stroke="#843C0C" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="68" y="104" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">Mechanical</text>
  <text x="68" y="114" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">sympathy</text>

  <line x1="113" y1="74" x2="148" y2="74" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 2: Skills → Zones ===== -->
  <rect x="153" y="28" width="90" height="92" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="198" y="56" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">4 Skills</text>
  <text x="198" y="71" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">→ 11 Zones</text>
  <line x1="160" y1="82" x2="236" y2="82" stroke="#2F5496" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="198" y="96" text-anchor="middle" font-size="6.8" fill="#555" font-style="italic">C(4,1)+C(4,2)+1</text>
  <text x="198" y="107" text-anchor="middle" font-size="6.8" fill="#555" font-style="italic">= 11</text>

  <line x1="243" y1="74" x2="278" y2="74" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 3: Topics × Tracks ===== -->
  <rect x="283" y="28" width="90" height="92" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="328" y="54" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">87 Topics</text>
  <text x="328" y="69" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">× 4 Tracks</text>
  <line x1="290" y1="80" x2="366" y2="80" stroke="#2F5496" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="328" y="94" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">348 possible</text>
  <text x="328" y="105" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">pairs</text>

  <line x1="373" y1="74" x2="408" y2="74" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 4: Physics filter ===== -->
  <rect x="413" y="28" width="90" height="92" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.5"/>
  <text x="458" y="52" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">233</text>
  <text x="458" y="67" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Applicable</text>
  <text x="458" y="82" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Pairs</text>
  <line x1="420" y1="92" x2="496" y2="92" stroke="#375623" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="458" y="106" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">83 excluded</text>
  <text x="458" y="116" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">by physics</text>

  <line x1="503" y1="74" x2="543" y2="74" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Step 5: Corpus ===== -->
  <rect x="548" y="28" width="100" height="92" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.5"/>
  <text x="598" y="56" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">9,199</text>
  <text x="598" y="71" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Questions</text>
  <line x1="555" y1="82" x2="641" y2="82" stroke="#375623" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="598" y="96" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">Derived,</text>
  <text x="598" y="107" text-anchor="middle" font-size="7.5" fill="#555" font-style="italic">not chosen</text>

</svg>
