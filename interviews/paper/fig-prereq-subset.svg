<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 34 656 378"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="14" y="34" width="656" height="378" fill="#fff" rx="0"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6C2A4A"/>
    </marker>
  </defs>

  <!-- ===== Legend ===== -->
  <rect x="20" y="40" width="280" height="32" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="0"/>
  <rect x="30" y="50" width="10" height="10" fill="#E9EFF7" stroke="#2F5496" stroke-width="1" rx="0"/>
  <text x="44" y="59" font-size="8" fill="#555">Compute</text>
  <rect x="90" y="50" width="10" height="10" fill="#EBF1E4" stroke="#375623" stroke-width="1" rx="0"/>
  <text x="104" y="59" font-size="8" fill="#555">Parallelism</text>
  <rect x="160" y="50" width="10" height="10" fill="#FDF2EA" stroke="#843C0C" stroke-width="1" rx="0"/>
  <text x="174" y="59" font-size="8" fill="#555">Networking</text>
  <line x1="230" y1="55" x2="252" y2="55" stroke="#6C2A4A" stroke-width="1.2" marker-end="url(#arrow-red)" stroke-dasharray="4,2"/>
  <text x="258" y="59" font-size="8" fill="#555">Cross-area</text>

  <!-- ===== Compute Area (Blue) ===== -->
  <rect x="20" y="85" width="180" height="190" fill="#E9EFF7" fill-opacity="0.3" stroke="#2F5496" stroke-width="0.8" rx="0" stroke-dasharray="4,3"/>
  <text x="110" y="102" font-size="9" font-weight="700" fill="#2F5496" text-anchor="middle">Compute</text>

  <!-- Roofline Analysis (root) -->
  <rect x="35" y="112" width="150" height="40" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5" rx="0"/>
  <text x="110" y="130" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Roofline Analysis</text>
  <text x="110" y="143" font-size="7.5" fill="#555" text-anchor="middle">root · L1–L4</text>

  <!-- GPU Compute Arch -->
  <rect x="35" y="185" width="150" height="40" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5" rx="0"/>
  <text x="110" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU Compute</text>
  <text x="110" y="213" font-size="7.5" fill="#555" text-anchor="middle">Architecture</text>

  <!-- Arrow: Roofline -> GPU Compute -->
  <line x1="110" y1="152" x2="110" y2="183" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Networking Area (Orange) ===== -->
  <rect x="20" y="295" width="180" height="65" fill="#FDF2EA" fill-opacity="0.3" stroke="#843C0C" stroke-width="0.8" rx="0" stroke-dasharray="4,3"/>
  <text x="110" y="311" font-size="9" font-weight="700" fill="#843C0C" text-anchor="middle">Networking</text>

  <!-- Collective Communication -->
  <rect x="35" y="318" width="150" height="33" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5" rx="0"/>
  <text x="110" y="333" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Collective Comm.</text>
  <text x="110" y="345" font-size="7.5" fill="#555" text-anchor="middle">AllReduce, Ring, Tree</text>

  <!-- ===== Parallelism Area (Green, main) ===== -->
  <rect x="230" y="85" width="430" height="340" fill="#EBF1E4" fill-opacity="0.3" stroke="#375623" stroke-width="1.2" rx="0"/>
  <text x="445" y="102" font-size="11" font-weight="700" fill="#375623" text-anchor="middle">Parallelism (6 topics)</text>

  <!-- Data Parallelism (root) -->
  <rect x="340" y="112" width="160" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="420" y="131" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Parallelism</text>
  <text x="420" y="145" font-size="7.5" fill="#555" text-anchor="middle">root · L2–L5</text>

  <!-- Model/Tensor Parallelism -->
  <rect x="260" y="195" width="155" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="337" y="212" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Model / Tensor</text>
  <text x="337" y="226" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Parallelism</text>

  <!-- Pipeline Parallelism -->
  <rect x="445" y="195" width="155" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="522" y="212" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Pipeline</text>
  <text x="522" y="226" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Parallelism</text>

  <!-- 3D Parallelism (convergence) -->
  <rect x="355" y="280" width="160" height="42" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="435" y="299" font-size="10" font-weight="700" fill="#333" text-anchor="middle">3D Parallelism</text>
  <text x="435" y="313" font-size="7.5" fill="#555" text-anchor="middle">requires all three · L5–L6+</text>

  <!-- Gradient Synchronization -->
  <rect x="260" y="365" width="155" height="40" fill="#EBF1E4" stroke="#375623" stroke-width="1.5" rx="0"/>
  <text x="337" y="383" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Gradient Sync.</text>
  <text x="337" y="397" font-size="7.5" fill="#555" text-anchor="middle">requires Data Par. + Coll. Comm.</text>

  <!-- Scheduling & Resource Mgmt (isolated root) -->
  <rect x="475" y="365" width="155" height="40" fill="#EBF1E4" stroke="#375623" stroke-width="1.2" rx="0"/>
  <text x="552" y="383" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Scheduling &amp; Resource Mgmt</text>
  <text x="552" y="397" font-size="7.5" fill="#555" text-anchor="middle">root (no prereqs)</text>

  <!-- ===== Arrows within Parallelism ===== -->

  <!-- Data Par -> Model/Tensor Par -->
  <line x1="390" y1="154" x2="350" y2="193" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Data Par -> Pipeline Par -->
  <line x1="460" y1="154" x2="510" y2="193" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Data Par -> 3D Par (direct, right side) -->
  <path d="M500,133 L620,133 L620,300 L517,300" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- Model/Tensor Par -> 3D Par -->
  <line x1="370" y1="237" x2="415" y2="278" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pipeline Par -> 3D Par -->
  <line x1="500" y1="237" x2="455" y2="278" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Data Par -> Gradient Sync -->
  <path d="M340,133 L245,133 L245,385 L258,385" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Cross-Area Arrow (dashed, red) ===== -->

  <!-- Collective Comm -> Gradient Sync -->
  <path d="M185,334 L220,334 L220,385 L258,385" stroke="#6C2A4A" stroke-width="1.2" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="4,2"/>

  <!-- Annotation: cross-area edge -->
  <text x="222" y="358" font-size="7.5" fill="#6C2A4A" font-style="italic">cross-area</text>

</svg>
