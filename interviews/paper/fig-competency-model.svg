<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="780" height="470" fill="#fff" rx="0"/>

  <!-- Four skill ellipses -->
  <ellipse cx="390" cy="150" rx="130" ry="110" fill="#B8CCE4" fill-opacity="0.28" stroke="#2F5496" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="320" cy="240" rx="130" ry="110" fill="#C5DFB4" fill-opacity="0.28" stroke="#375623" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="460" cy="240" rx="130" ry="110" fill="#F4CCAC" fill-opacity="0.28" stroke="#843C0C" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="390" cy="325" rx="130" ry="110" fill="#D9B2C6" fill-opacity="0.28" stroke="#6C2A4A" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Mastery center -->
  <ellipse cx="390" cy="240" rx="42" ry="18" fill="#5B5EA6" fill-opacity="0.5" stroke="#3B3E7A" stroke-width="1.2"/>
  <text x="390" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Mastery</text>
  <text x="390" y="249" text-anchor="middle" font-size="7" fill="#ddd">(all four)</text>

  <!-- Intersection dots -->
  <circle cx="305" cy="175" r="5" fill="#2F5496" fill-opacity="0.5"/>
  <circle cx="470" cy="175" r="5" fill="#843C0C" fill-opacity="0.5"/>
  <circle cx="390" cy="195" r="5" fill="#3B3E7A" fill-opacity="0.5"/>
  <circle cx="390" cy="285" r="5" fill="#3B3E7A" fill-opacity="0.5"/>
  <circle cx="305" cy="305" r="5" fill="#375623" fill-opacity="0.5"/>
  <circle cx="475" cy="305" r="5" fill="#6C2A4A" fill-opacity="0.5"/>

  <!-- Dashed leader lines to callout boxes -->
  <line x1="305" y1="175" x2="130" y2="110" stroke="#2F5496" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="470" y1="175" x2="650" y2="110" stroke="#843C0C" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="390" y1="195" x2="130" y2="195" stroke="#3B3E7A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="390" y1="285" x2="650" y2="290" stroke="#3B3E7A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="305" y1="305" x2="130" y2="350" stroke="#375623" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="475" y1="305" x2="650" y2="350" stroke="#6C2A4A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>

  <!-- Skill labels -->
  <text x="390" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#1F3864">Recall</text>
  <text x="390" y="96" text-anchor="middle" font-size="9" fill="#2F5496">Hardware specs &amp; definitions</text>
  <text x="228" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A14">Analyze</text>
  <text x="228" y="246" text-anchor="middle" font-size="9" fill="#375623">Bottleneck diagnosis</text>
  <text x="552" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#5A2D0A">Design</text>
  <text x="552" y="246" text-anchor="middle" font-size="9" fill="#843C0C">Architecture decisions</text>
  <text x="390" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1D35">Quantify</text>
  <text x="390" y="396" text-anchor="middle" font-size="9" fill="#6C2A4A">Napkin math &amp; estimation</text>

  <!-- ===== Left callout boxes (rx="0") ===== -->
  <!-- Diagnosis (Recall + Analyze) -->
  <rect x="30" y="92" width="100" height="42" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1"/>
  <text x="80" y="107" text-anchor="middle" font-size="10" font-weight="600" fill="#1F3864">Diagnosis</text>
  <text x="80" y="120" text-anchor="middle" font-size="7.5" fill="#2F5496">Recall + Analyze</text>
  <text x="80" y="130" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"40% MFU — why?"</text>

  <!-- Fluency (Recall + Quantify) -->
  <rect x="30" y="180" width="100" height="42" rx="0" fill="#EEEDF7" stroke="#3B3E7A" stroke-width="1"/>
  <text x="80" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#2A2D5C">Fluency</text>
  <text x="80" y="208" text-anchor="middle" font-size="7.5" fill="#3B3E7A">Recall + Quantify</text>
  <text x="80" y="218" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"70B VRAM?"</text>

  <!-- Optimization (Analyze + Quantify) -->
  <rect x="30" y="335" width="100" height="42" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1"/>
  <text x="80" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#1E3A14">Optimization</text>
  <text x="80" y="363" text-anchor="middle" font-size="7.5" fill="#375623">Analyze + Quantify</text>
  <text x="80" y="373" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"Fix memory wall"</text>

  <!-- ===== Right callout boxes (rx="0") ===== -->
  <!-- Specification (Recall + Design) -->
  <rect x="650" y="92" width="105" height="42" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1"/>
  <text x="702" y="107" text-anchor="middle" font-size="10" font-weight="600" fill="#5A2D0A">Specification</text>
  <text x="702" y="120" text-anchor="middle" font-size="7.5" fill="#843C0C">Recall + Design</text>
  <text x="702" y="130" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"P99 &lt; 100ms"</text>

  <!-- Evaluation (Analyze + Design) -->
  <rect x="650" y="275" width="105" height="42" rx="0" fill="#EEEDF7" stroke="#3B3E7A" stroke-width="1"/>
  <text x="702" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#2A2D5C">Evaluation</text>
  <text x="702" y="303" text-anchor="middle" font-size="7.5" fill="#3B3E7A">Analyze + Design</text>
  <text x="702" y="313" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"MoE vs dense?"</text>

  <!-- Realization (Design + Quantify) -->
  <rect x="650" y="335" width="105" height="42" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="1"/>
  <text x="702" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#4A1D35">Realization</text>
  <text x="702" y="363" text-anchor="middle" font-size="7.5" fill="#6C2A4A">Design + Quantify</text>
  <text x="702" y="373" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"Size micro-batches"</text>

  <!-- Footnote -->
  <text x="390" y="455" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each question occupies one zone, determined by which skills it exercises.</text>
</svg>
