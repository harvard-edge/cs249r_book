<?xml version="1.0" encoding="utf-8"?>
<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">

  <!-- Title -->
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="600" fill="#2C2C2A">ML systems competency model</text>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Four skills, deeply interconnected — inspired by ikigai</text>

  <!-- Four overlapping ellipses -->
  <ellipse cx="340" cy="280" rx="155" ry="145" fill="#85B7EB" fill-opacity="0.22" stroke="#185FA5" stroke-width="1.4" stroke-opacity="0.5"/>
  <ellipse cx="258" cy="388" rx="155" ry="145" fill="#97C459" fill-opacity="0.22" stroke="#3B6D11" stroke-width="1.4" stroke-opacity="0.5"/>
  <ellipse cx="422" cy="388" rx="155" ry="145" fill="#F0997B" fill-opacity="0.22" stroke="#993C1D" stroke-width="1.4" stroke-opacity="0.5"/>
  <ellipse cx="340" cy="492" rx="155" ry="145" fill="#ED93B1" fill-opacity="0.22" stroke="#993556" stroke-width="1.4" stroke-opacity="0.5"/>

  <!-- Center: Mastery -->
  <circle cx="340" cy="388" r="20" fill="#7F77DD" fill-opacity="0.6" stroke="#534AB7" stroke-width="1.5" transform="matrix(2.104954, 0, 0, 1, -376.585297, -0.725249)"/>

  <!-- Intersection dots -->
  <circle cx="238" cy="295" r="7" fill="#185FA5" fill-opacity="0.55"/>
  <circle cx="432" cy="295" r="7" fill="#993C1D" fill-opacity="0.55"/>
  <circle cx="340" cy="330" r="7" fill="#534AB7" fill-opacity="0.55"/>
  <circle cx="340" cy="442" r="7" fill="#534AB7" fill-opacity="0.55"/>
  <circle cx="235" cy="465" r="7" fill="#3B6D11" fill-opacity="0.55"/>
  <circle cx="445" cy="465" r="7" fill="#993556" fill-opacity="0.55"/>

  <!-- Dashed lines from dots to labels -->
  <line x1="238" y1="295" x2="22" y2="200" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <line x1="432" y1="295" x2="648" y2="200" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <line x1="340" y1="330" x2="62" y2="312" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <line x1="340" y1="442" x2="618" y2="468" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <line x1="235" y1="465" x2="52" y2="550" stroke="#3B6D11" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <line x1="445" y1="465" x2="628" y2="550" stroke="#993556" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.5"/>

  <!-- ===== Skill Labels (the four circles) ===== -->

  <!-- Recall (top) -->
  <text x="340" y="168" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" fill="#0C447C">Recall</text>
  <text x="340" y="189" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">Hardware specs<tspan x="340" dy="1em">&#x200B;</tspan>&amp; definitions</text>

  <!-- Analyze (left) -->
  <text x="165" y="373" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" fill="#27500A">Analyze</text>
  <text x="165" y="394" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">Bottleneck diagnosis<tspan x="165" dy="1em">&#x200B;</tspan>&amp; root cause</text>

  <!-- Design (right) -->
  <text x="515" y="373" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" fill="#712B13">Design</text>
  <text x="515" y="394" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">System architecture<tspan x="515" dy="1em">&#x200B;</tspan>&amp; trade-offs</text>

  <!-- Implement (bottom) -->
  <text x="340" y="565" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" fill="#72243E">Implement</text>
  <text x="340" y="586" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993556">Napkin math<tspan x="340" dy="1em">&#x200B;</tspan>&amp; concrete building</text>

  <!-- ===== Intersection Labels (the six boxes) ===== -->

  <!-- Diagnosis: Recall + Analyze -->
  <rect x="8" y="180" width="108" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="62" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#042C53">Diagnosis</text>
  <text x="62" y="210" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#185FA5">Recall + Analyze</text>
  <text x="62" y="224" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#4a6c8c" font-style="italic">"40% MFU — diagnose it"</text>

  <!-- Specification: Recall + Design -->
  <rect x="556" y="180" width="120" height="52" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="616" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#4A1B0C">Specification</text>
  <text x="616" y="210" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#993C1D">Recall + Design</text>
  <text x="616" y="224" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#8c5c4a" font-style="italic">"P99 &lt; 100ms — design it"</text>

  <!-- Fluency: Recall + Implement -->
  <rect x="8" y="295" width="108" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="62" y="309" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#26215C">Fluency</text>
  <text x="62" y="325" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#534AB7">Recall + Implement</text>
  <text x="62" y="339" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#6a5c8c" font-style="italic">"70B model VRAM?"</text>

  <!-- Evaluation: Analyze + Design -->
  <rect x="562" y="438" width="114" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="619" y="452" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#26215C">Evaluation</text>
  <text x="619" y="468" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#534AB7">Analyze + Design</text>
  <text x="619" y="482" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#6a5c8c" font-style="italic">"MoE vs dense — which?"</text>

  <!-- Optimization: Analyze + Implement -->
  <rect x="2" y="510" width="116" height="52" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="60" y="524" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#173404">Optimization</text>
  <text x="60" y="540" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#3B6D11">Analyze + Implement</text>
  <text x="60" y="554" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#4a6c3b" font-style="italic">"Fix the memory wall"</text>

  <!-- Realization: Design + Implement -->
  <rect x="570" y="510" width="108" height="52" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.8"/>
  <text x="624" y="524" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#4B1528">Realization</text>
  <text x="624" y="540" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#993556">Design + Implement</text>
  <text x="624" y="554" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#8c4a5c" font-style="italic">"Size the micro-batches"</text>

  <!-- Center: Mastery -->
  <text x="340" y="379" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#26215C">Mastery<tspan x="340" dy="1em">&#x200B;</tspan>(all four)</text>

  <!-- Footnote -->
  <text x="340" y="660" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="#999" font-style="italic">Each question tests one zone: a combination of skills that determines HOW the topic is assessed</text>

</svg>
