<?xml version="1.0" encoding="utf-8"?>
<svg width="100%" viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="460" fill="#fff"/>

  <!-- Four overlapping ellipses — formal muted palette -->
  <ellipse cx="310" cy="170" rx="130" ry="110" fill="#B8CCE4" fill-opacity="0.28" stroke="#2F5496" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="240" cy="260" rx="130" ry="110" fill="#C5DFB4" fill-opacity="0.28" stroke="#375623" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="380" cy="260" rx="130" ry="110" fill="#F4CCAC" fill-opacity="0.28" stroke="#843C0C" stroke-width="1.2" stroke-opacity="0.6"/>
  <ellipse cx="310" cy="345" rx="130" ry="110" fill="#D9B2C6" fill-opacity="0.28" stroke="#6C2A4A" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Center: Mastery -->
  <ellipse cx="310" cy="260" rx="42" ry="18" fill="#5B5EA6" fill-opacity="0.5" stroke="#3B3E7A" stroke-width="1.2"/>

  <!-- Intersection dots -->
  <circle cx="225" cy="195" r="5" fill="#2F5496" fill-opacity="0.5"/>
  <circle cx="390" cy="195" r="5" fill="#843C0C" fill-opacity="0.5"/>
  <circle cx="310" cy="215" r="5" fill="#3B3E7A" fill-opacity="0.5"/>
  <circle cx="310" cy="305" r="5" fill="#3B3E7A" fill-opacity="0.5"/>
  <circle cx="225" cy="325" r="5" fill="#375623" fill-opacity="0.5"/>
  <circle cx="395" cy="325" r="5" fill="#6C2A4A" fill-opacity="0.5"/>

  <!-- Dashed lines -->
  <line x1="225" y1="195" x2="42" y2="130" stroke="#2F5496" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="390" y1="195" x2="590" y2="130" stroke="#843C0C" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="310" y1="215" x2="55" y2="215" stroke="#3B3E7A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="310" y1="305" x2="575" y2="310" stroke="#3B3E7A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="225" y1="325" x2="42" y2="370" stroke="#375623" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <line x1="395" y1="325" x2="580" y2="370" stroke="#6C2A4A" stroke-width="0.7" stroke-dasharray="3 2" stroke-opacity="0.5"/>

  <!-- ===== Skill Labels ===== -->
  <text x="310" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#1F3864">Recall</text>
  <text x="310" y="116" text-anchor="middle" font-size="9" fill="#2F5496">Hardware specs &amp; definitions</text>

  <text x="148" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A14">Analyze</text>
  <text x="148" y="266" text-anchor="middle" font-size="9" fill="#375623">Bottleneck diagnosis</text>

  <text x="472" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#5A2D0A">Design</text>
  <text x="472" y="266" text-anchor="middle" font-size="9" fill="#843C0C">Architecture decisions</text>

  <text x="310" y="396" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1D35">Implement</text>
  <text x="310" y="412" text-anchor="middle" font-size="9" fill="#6C2A4A">Napkin math &amp; building</text>

  <!-- ===== Intersection Labels ===== -->

  <!-- Diagnosis -->
  <rect x="2" y="112" width="100" height="42" rx="4" fill="#E9EFF7" stroke="#2F5496" stroke-width="0.7"/>
  <text x="52" y="127" text-anchor="middle" font-size="10" font-weight="600" fill="#1F3864">Diagnosis</text>
  <text x="52" y="140" text-anchor="middle" font-size="7.5" fill="#2F5496">Recall + Analyze</text>
  <text x="52" y="150" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"40% MFU — why?"</text>

  <!-- Specification -->
  <rect x="555" y="112" width="110" height="42" rx="4" fill="#FDF2EA" stroke="#843C0C" stroke-width="0.7"/>
  <text x="610" y="127" text-anchor="middle" font-size="10" font-weight="600" fill="#5A2D0A">Specification</text>
  <text x="610" y="140" text-anchor="middle" font-size="7.5" fill="#843C0C">Recall + Design</text>
  <text x="610" y="150" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"P99 &lt; 100ms"</text>

  <!-- Fluency -->
  <rect x="2" y="200" width="100" height="42" rx="4" fill="#EEEDF7" stroke="#3B3E7A" stroke-width="0.7"/>
  <text x="52" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#2A2D5C">Fluency</text>
  <text x="52" y="228" text-anchor="middle" font-size="7.5" fill="#3B3E7A">Recall + Implement</text>
  <text x="52" y="238" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"70B VRAM?"</text>

  <!-- Evaluation -->
  <rect x="555" y="295" width="110" height="42" rx="4" fill="#EEEDF7" stroke="#3B3E7A" stroke-width="0.7"/>
  <text x="610" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#2A2D5C">Evaluation</text>
  <text x="610" y="323" text-anchor="middle" font-size="7.5" fill="#3B3E7A">Analyze + Design</text>
  <text x="610" y="333" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"MoE vs dense?"</text>

  <!-- Optimization -->
  <rect x="2" y="355" width="100" height="42" rx="4" fill="#EBF1E4" stroke="#375623" stroke-width="0.7"/>
  <text x="52" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1E3A14">Optimization</text>
  <text x="52" y="383" text-anchor="middle" font-size="7.5" fill="#375623">Analyze + Implement</text>
  <text x="52" y="393" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"Fix memory wall"</text>

  <!-- Realization -->
  <rect x="555" y="355" width="110" height="42" rx="4" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="0.7"/>
  <text x="610" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#4A1D35">Realization</text>
  <text x="610" y="383" text-anchor="middle" font-size="7.5" fill="#6C2A4A">Design + Implement</text>
  <text x="610" y="393" text-anchor="middle" font-size="6.5" fill="#666" font-style="italic">"Size micro-batches"</text>

  <!-- Center label -->
  <text x="310" y="257" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Mastery</text>
  <text x="310" y="269" text-anchor="middle" font-size="7" fill="#ddd">(all four)</text>

  <!-- Bottom footnote -->
  <text x="360" y="450" text-anchor="middle" font-size="7.5" fill="#999" font-style="italic">Each question occupies one zone, determined by which skills it exercises</text>
</svg>
