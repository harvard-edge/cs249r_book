<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="320" fill="#fff"/>

  <!-- Central question box -->
  <rect x="290" y="120" width="140" height="60" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Question</text>
  <text x="360" y="162" text-anchor="middle" font-size="7.5" fill="#666">Classified on four axes</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- TOPIC (left) -->
  <line x1="290" y1="150" x2="155" y2="150" stroke="#2F5496" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="18" y="108" width="135" height="84" rx="4" fill="#E9EFF7" stroke="#2F5496" stroke-width="1"/>
  <text x="85" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#2F5496">Topic</text>
  <text x="85" y="142" text-anchor="middle" font-size="8" fill="#555">WHAT concept?</text>
  <line x1="30" y1="150" x2="140" y2="150" stroke="#2F5496" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="85" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#333">79 curated topics</text>
  <text x="85" y="175" text-anchor="middle" font-size="7" fill="#888">13 competency areas</text>
  <text x="85" y="186" text-anchor="middle" font-size="7" fill="#2F5496">prerequisite graph</text>

  <!-- ZONE (right) -->
  <line x1="430" y1="150" x2="565" y2="150" stroke="#375623" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="567" y="108" width="135" height="84" rx="4" fill="#EBF1E4" stroke="#375623" stroke-width="1"/>
  <text x="635" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#375623">Zone</text>
  <text x="635" y="142" text-anchor="middle" font-size="8" fill="#555">HOW is it tested?</text>
  <line x1="579" y1="150" x2="689" y2="150" stroke="#375623" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="635" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#333">11 ikigai zones</text>
  <text x="635" y="175" text-anchor="middle" font-size="7" fill="#888">4 skills combined</text>
  <text x="635" y="186" text-anchor="middle" font-size="7" fill="#375623">recall · analyze · design · implement</text>

  <!-- TRACK (top) -->
  <line x1="360" y1="120" x2="360" y2="60" stroke="#843C0C" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="278" y="12" width="164" height="48" rx="4" fill="#FDF2EA" stroke="#843C0C" stroke-width="1"/>
  <text x="360" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#843C0C">Track</text>
  <text x="360" y="43" text-anchor="middle" font-size="8" fill="#555">WHERE is it deployed?</text>
  <text x="360" y="55" text-anchor="middle" font-size="7" fill="#843C0C">cloud · edge · mobile · tinyml · global</text>

  <!-- LEVEL (bottom) -->
  <line x1="360" y1="180" x2="360" y2="240" stroke="#6C2A4A" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="278" y="242" width="164" height="48" rx="4" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="1"/>
  <text x="360" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#6C2A4A">Level</text>
  <text x="360" y="273" text-anchor="middle" font-size="8" fill="#555">HOW HARD is it?</text>
  <text x="360" y="285" text-anchor="middle" font-size="7" fill="#6C2A4A">L1 · L2 · L3 · L4 · L5 · L6+</text>

  <!-- Bottom note -->
  <text x="360" y="310" text-anchor="middle" font-size="7" fill="#aaa" font-style="italic">Each axis varies independently: 79 × 11 × 5 × 6 coverage space</text>
</svg>
