<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="480" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Four-Axis Question Classification</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Every question is classified on four independent, orthogonal axes</text>

  <!-- Defs: arrows -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Central Question Node ===== -->
  <rect x="265" y="200" width="150" height="60" rx="6" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Question</text>
  <text x="340" y="240" text-anchor="middle" font-size="8" fill="#555">cloud-1670</text>
  <text x="340" y="252" text-anchor="middle" font-size="7" fill="#999">"Calculating Paged KV Cache Capacity"</text>

  <!-- ===== TOPIC axis (left) ===== -->
  <line x1="265" y1="230" x2="80" y2="230" stroke="#006395" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="10" y="170" width="140" height="120" rx="5" fill="#D1E6F3" stroke="#006395" stroke-width="1.2"/>
  <text x="80" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#006395">Topic</text>
  <text x="80" y="205" text-anchor="middle" font-size="8" fill="#555">WHAT concept?</text>
  <line x1="25" y1="215" x2="135" y2="215" stroke="#006395" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="80" y="230" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">kv-cache-management</text>
  <text x="80" y="245" text-anchor="middle" font-size="7" fill="#888">79 curated topics</text>
  <text x="80" y="258" text-anchor="middle" font-size="7" fill="#888">13 competency areas</text>
  <text x="80" y="271" text-anchor="middle" font-size="7" fill="#888">123 prerequisite edges</text>
  <text x="80" y="284" text-anchor="middle" font-size="7" fill="#006395" font-style="italic">LinkML + SKOS</text>

  <!-- ===== ZONE axis (right) ===== -->
  <line x1="415" y1="230" x2="600" y2="230" stroke="#008F45" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="170" width="140" height="120" rx="5" fill="#D4EFDF" stroke="#008F45" stroke-width="1.2"/>
  <text x="600" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#008F45">Zone</text>
  <text x="600" y="205" text-anchor="middle" font-size="8" fill="#555">HOW is it tested?</text>
  <line x1="545" y1="215" x2="655" y2="215" stroke="#008F45" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="600" y="230" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">fluency</text>
  <text x="600" y="245" text-anchor="middle" font-size="7" fill="#888">11 ikigai zones</text>
  <text x="600" y="258" text-anchor="middle" font-size="7" fill="#888">4 skills: R + A + D + I</text>
  <text x="600" y="271" text-anchor="middle" font-size="7" fill="#888">6 compound + 1 mastery</text>
  <text x="600" y="284" text-anchor="middle" font-size="7" fill="#008F45" font-style="italic">Recall + Implement</text>

  <!-- ===== TRACK axis (top) ===== -->
  <line x1="340" y1="200" x2="340" y2="110" stroke="#CC5500" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="65" width="180" height="85" rx="5" fill="#FFE5CC" stroke="#CC5500" stroke-width="1.2"/>
  <text x="340" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#CC5500">Track</text>
  <text x="340" y="96" text-anchor="middle" font-size="8" fill="#555">WHERE is it deployed?</text>
  <line x1="265" y1="105" x2="415" y2="105" stroke="#CC5500" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="340" y="120" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">cloud</text>
  <text x="340" y="135" text-anchor="middle" font-size="7" fill="#888">5 physics regimes</text>
  <text x="340" y="145" text-anchor="middle" font-size="7" fill="#CC5500" font-style="italic">cloud | edge | mobile | tinyml | global</text>

  <!-- ===== LEVEL axis (bottom) ===== -->
  <line x1="340" y1="260" x2="340" y2="350" stroke="#CB202D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="310" width="180" height="85" rx="5" fill="#F5D2D5" stroke="#CB202D" stroke-width="1.2"/>
  <text x="340" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#CB202D">Level</text>
  <text x="340" y="341" text-anchor="middle" font-size="8" fill="#555">HOW HARD is it?</text>
  <line x1="265" y1="350" x2="415" y2="350" stroke="#CB202D" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="340" y="365" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">L3 (Apply)</text>
  <text x="340" y="380" text-anchor="middle" font-size="7" fill="#888">6 levels: L1 - L6+</text>
  <text x="340" y="390" text-anchor="middle" font-size="7" fill="#CB202D" font-style="italic">Bloom's revised taxonomy</text>

  <!-- ===== Corner annotations: orthogonality ===== -->
  <text x="175" y="105" text-anchor="middle" font-size="7.5" fill="#999">Same topic,</text>
  <text x="175" y="116" text-anchor="middle" font-size="7.5" fill="#999">different track</text>

  <text x="505" y="105" text-anchor="middle" font-size="7.5" fill="#999">Same track,</text>
  <text x="505" y="116" text-anchor="middle" font-size="7.5" fill="#999">different zone</text>

  <text x="175" y="345" text-anchor="middle" font-size="7.5" fill="#999">Same zone,</text>
  <text x="175" y="356" text-anchor="middle" font-size="7.5" fill="#999">different level</text>

  <text x="505" y="345" text-anchor="middle" font-size="7.5" fill="#999">Same level,</text>
  <text x="505" y="356" text-anchor="middle" font-size="7.5" fill="#999">different topic</text>

  <!-- Footnote -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Orthogonality: each axis varies independently, producing 79 x 11 x 5 x 6 = 26,070 potential cells</text>
  <text x="340" y="460" text-anchor="middle" font-size="8" fill="#bbb">Not all cells are semantically valid; coverage targets apply to the meaningful subset</text>
</svg>
