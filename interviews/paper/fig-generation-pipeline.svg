<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 685 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="685" height="460" fill="#fff" rx="0"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6C2A4A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#375623"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->

  <!-- ===== Row Labels ===== -->
  <text x="30" y="80" font-size="10" font-weight="700" fill="#6C2A4A">PLAN</text>
  <text x="30" y="195" font-size="10" font-weight="700" fill="#6C2A4A">GENERATE</text>
  <text x="30" y="310" font-size="10" font-weight="700" fill="#6C2A4A">VALIDATE</text>

  <!-- ===== Row Dividers ===== -->
  <line x1="20" y1="140" x2="660" y2="140" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="20" y1="255" x2="660" y2="255" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Row 1: PLAN ===== -->
  <rect x="80" y="58" width="140" height="50" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="150" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">3D Coverage Cube</text>
  <text x="150" y="98" text-anchor="middle" font-size="8" fill="#555">4 tracks x 6 levels x 13 areas</text>

  <line x1="220" y1="83" x2="280" y2="83" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="280" y="58" width="130" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="345" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gap Analyzer</text>
  <text x="345" y="98" text-anchor="middle" font-size="8" fill="#555">ChromaDB embeddings</text>

  <line x1="410" y1="83" x2="470" y2="83" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="470" y="58" width="130" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="535" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Prompt Builder</text>
  <text x="535" y="98" text-anchor="middle" font-size="8" fill="#555">ECD templates</text>

  <!-- ===== Row 2: GENERATE ===== -->
  <rect x="140" y="170" width="180" height="50" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.5"/>
  <text x="230" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#333">LLM Engine</text>
  <text x="230" y="210" text-anchor="middle" font-size="8" fill="#555">Gemini Pro / Opus 4.6</text>

  <line x1="320" y1="195" x2="390" y2="195" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="365" y="180" text-anchor="middle" font-size="8" fill="#555" font-style="italic">ECD: claim -> evidence -> task</text>

  <rect x="390" y="170" width="160" height="50" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="470" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Raw Candidates</text>
  <text x="470" y="210" text-anchor="middle" font-size="8" fill="#555">JSON + metadata</text>

  <!-- ===== Row 3: VALIDATE ===== -->
  <rect x="70" y="280" width="110" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="125" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Schema Check</text>
  <text x="125" y="318" text-anchor="middle" font-size="8" fill="#555">Pydantic</text>

  <line x1="180" y1="305" x2="210" y2="305" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="210" y="280" width="130" height="50" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="1.5"/>
  <text x="275" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Dedup Pipeline</text>
  <text x="275" y="318" text-anchor="middle" font-size="8" fill="#555">exact -> fuzzy -> semantic</text>

  <line x1="340" y1="305" x2="370" y2="305" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="370" y="280" width="120" height="50" rx="0" fill="#F3E8ED" stroke="#6C2A4A" stroke-width="1.5"/>
  <text x="430" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Math Review</text>
  <text x="430" y="318" text-anchor="middle" font-size="8" fill="#555">multi-model consensus</text>

  <line x1="490" y1="305" x2="520" y2="305" stroke="#375623" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="520" y="280" width="110" height="50" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.5"/>
  <text x="575" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Corpus</text>
  <text x="575" y="318" text-anchor="middle" font-size="8" fill="#555">validated items</text>

  <text x="275" y="345" text-anchor="middle" font-size="7" fill="#999">3-stage: exact match / fuzzy &gt;0.90 / semantic &gt;0.85</text>

  <!-- ===== Feedback Loop ===== -->
  <path d="M630,305 L660,305 L660,40 L150,40 L150,58"
        fill="none" stroke="#6C2A4A" stroke-width="1.2" stroke-dasharray="4,2"
        marker-end="url(#arrow-red)"/>
  <text x="675" y="195" text-anchor="middle" font-size="8" fill="#6C2A4A" font-weight="400" transform="rotate(-90,675,195)">feedback loop</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Gierl &amp; Haladyna (2013) . Mislevy et al. (2003) . Evidence-Centered Design</text>
</svg>