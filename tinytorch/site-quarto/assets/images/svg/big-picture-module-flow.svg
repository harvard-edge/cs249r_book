<?xml version="1.0" encoding="UTF-8"?>
<!-- Canvas widened from 680x460 to 840x500 so three tiers (Foundation 7-stack, Architecture branching, Optimization fan-out) plus a centered Capstone sit without cramping. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="840" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="420" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">TinyTorch Module Flow</text>

  <!-- ===== Tier dividers (dashed) ===== -->
  <line x1="250" y1="50" x2="250" y2="400" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="590" y1="50" x2="590" y2="400" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Tier headers ===== -->
  <text x="140" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">FOUNDATION (01-08)</text>
  <text x="420" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ARCHITECTURE (09-13)</text>
  <text x="700" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">OPTIMIZATION (14-19)</text>

  <!-- ===== Foundation tier (blue: compute/processing) ===== -->
  <!-- Linear chain: Tensor -> Activations -> Layers -> Losses -> Autograd -> Optimizers -> Training -->
  <rect x="70" y="90" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tensor</text>

  <rect x="70" y="132" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Activations</text>

  <rect x="70" y="174" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Layers</text>

  <rect x="70" y="216" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Losses</text>

  <rect x="70" y="258" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Autograd</text>

  <rect x="70" y="300" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Optimizers</text>

  <rect x="70" y="342" width="140" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Training</text>

  <!-- Foundation internal arrows (neutral) -->
  <path d="M140,122 L140,132" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,164 L140,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,206 L140,216" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,248 L140,258" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,290 L140,300" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,332 L140,342" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Architecture tier (muted purple within book palette discipline) ===== -->
  <!-- DataLoader branches: -> CNNs (left), -> Tok -> Emb -> Att -> Trans (right chain) -->
  <rect x="360" y="90" width="120" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="420" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">DataLoader</text>

  <rect x="280" y="174" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="335" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">CNNs</text>

  <rect x="450" y="174" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tokenization</text>

  <rect x="450" y="216" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Embeddings</text>

  <rect x="450" y="258" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Attention</text>

  <rect x="450" y="300" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Transformers</text>

  <!-- Architecture internal arrows (neutral, orthogonal branch) -->
  <!-- DataLoader -> CNNs: down then left then down -->
  <path d="M420,122 L420,150 L335,150 L335,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- DataLoader -> Tok: down then right then down -->
  <path d="M420,122 L420,150 L505,150 L505,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- Tok -> Emb -> Att -> Trans -->
  <path d="M505,206 L505,216" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M505,248 L505,258" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M505,290 L505,300" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Optimization tier (orange: routing/scheduling) ===== -->
  <!-- Profiling fan-out to Q/C/M/Ac, all fan-in to Benchmark -->
  <rect x="620" y="90" width="160" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="700" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Profiling</text>

  <!-- 4 children in a row: widths 36, gap 6 -->
  <rect x="610" y="174" width="36" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="628" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Quant</text>

  <rect x="656" y="174" width="50" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="681" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Compress</text>

  <rect x="716" y="174" width="34" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="733" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Memo</text>

  <rect x="760" y="174" width="34" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="777" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Accel</text>

  <rect x="620" y="258" width="160" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="700" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Benchmarking</text>

  <!-- Profiling -> 4 children (fan-out via bus at y=145) -->
  <path d="M700,122 L700,145" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,145 L777,145" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,145 L628,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M681,145 L681,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M733,145 L733,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M777,145 L777,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- 4 children -> Benchmark (fan-in via bus at y=230) -->
  <path d="M628,206 L628,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M681,206 L681,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M733,206 L733,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M777,206 L777,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,230 L777,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M700,230 L700,258" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Cross-tier arrows (red: key cross-boundary flows) ===== -->
  <!-- Training -> DataLoader: right into Foundation/Arch gutter, up to sub-gutter below DataLoader, right, up into DataLoader's bottom edge -->
  <path d="M210,358 L240,358 L240,140 L420,140 L420,122" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- CNNs -> Profiling: up through CNN/Tok inter-box gutter at x=410, right along DataLoader-to-Tok sub-gutter at y=140, then up Arch/Opt gutter at x=600 -->
  <path d="M390,190 L410,190 L410,140 L600,140 L600,106 L620,106" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- Transformers -> Profiling: right into Arch/Opt gutter at x=600, up to Profiling entry -->
  <path d="M560,316 L600,316 L600,114 L620,114" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- ===== Capstone (gold neutral container) ===== -->
  <rect x="340" y="418" width="160" height="36" rx="4" fill="#fff3c4" stroke="#c8a02a" stroke-width="1.5"/>
  <text x="420" y="441" text-anchor="middle" font-size="11" font-weight="700" fill="#333">20: Capstone</text>

  <!-- Benchmark -> Capstone: down then left -->
  <path d="M700,290 L700,436 L500,436" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- ===== Footnote ===== -->
  <text x="420" y="485" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Red arrows mark cross-tier dependencies; each tier builds on the prior.</text>
</svg>
