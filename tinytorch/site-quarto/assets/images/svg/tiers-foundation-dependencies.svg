<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Foundation Module Dependencies</text>

  <!-- ===== Row 1: M01 Tensor + M02 Activations ===== -->
  <rect x="80" y="50" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#333">01. Tensor</text>
  <text x="180" y="80" text-anchor="middle" font-size="9" fill="#555">Multidimensional arrays</text>

  <rect x="400" y="50" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="500" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#333">02. Activations</text>
  <text x="500" y="80" text-anchor="middle" font-size="9" fill="#555">Non-linear functions</text>

  <!-- ===== Row 2: M03 Layers ===== -->
  <rect x="240" y="102" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#333">03. Layers</text>
  <text x="340" y="132" text-anchor="middle" font-size="9" fill="#555">Linear transformations</text>

  <!-- ===== Row 3: M04 Losses ===== -->
  <rect x="240" y="154" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#333">04. Losses</text>
  <text x="340" y="184" text-anchor="middle" font-size="9" fill="#555">Measure prediction quality</text>

  <!-- ===== Row 4: M05 DataLoader ===== -->
  <rect x="240" y="206" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#333">05. DataLoader</text>
  <text x="340" y="236" text-anchor="middle" font-size="9" fill="#555">Efficient data pipelines</text>

  <!-- ===== Row 5: M06 Autograd ===== -->
  <rect x="240" y="258" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#333">06. Autograd</text>
  <text x="340" y="288" text-anchor="middle" font-size="9" fill="#555">Automatic differentiation</text>

  <!-- ===== Row 6: M07 Optimizers ===== -->
  <rect x="240" y="310" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#333">07. Optimizers</text>
  <text x="340" y="340" text-anchor="middle" font-size="9" fill="#555">Gradient-based updates</text>

  <!-- ===== Row 7: M08 Training (capstone, bolder stroke) ===== -->
  <rect x="240" y="362" width="200" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="340" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#333">08. Training</text>
  <text x="340" y="392" text-anchor="middle" font-size="9" fill="#555">Complete learning loop</text>

  <!-- ===== Arrows ===== -->
  <!-- M01 -> M03 (converge) -->
  <path d="M 180 88 V 95 H 340 V 102" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M02 -> M03 (converge) -->
  <path d="M 500 88 V 95 H 340 V 102" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M03 -> M04 -->
  <path d="M 340 140 V 154" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M04 -> M05 -->
  <path d="M 340 192 V 206" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M05 -> M06 -->
  <path d="M 340 244 V 258" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M06 -> M07 -->
  <path d="M 340 296 V 310" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- M07 -> M08 -->
  <path d="M 340 348 V 362" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Forward pass components build into learning, which builds into the complete training loop.</text>
</svg>
