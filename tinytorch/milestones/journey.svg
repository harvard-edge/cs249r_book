<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="680" height="400" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== ROW 1: MS 01 -> MS 02 -> MS 03 ===== -->

  <!-- Module prereq labels -->
  <text x="100" y="22" text-anchor="middle" font-size="8" fill="#999">Modules 01&#x2013;03</text>
  <text x="300" y="22" text-anchor="middle" font-size="8" fill="#999">Modules 04&#x2013;06</text>
  <text x="500" y="22" text-anchor="middle" font-size="8" fill="#999">Modules 08&#x2013;09</text>

  <!-- MS 01 -->
  <rect x="30" y="30" width="140" height="66" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 01: Perceptron</text>
  <text x="100" y="66" text-anchor="middle" font-size="9" fill="#555">1958</text>
  <text x="100" y="82" text-anchor="middle" font-size="8.5" fill="#999">Forward pass</text>

  <!-- Arrow MS 01 -> MS 02 -->
  <line x1="170" y1="63" x2="225" y2="63" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- MS 02 -->
  <rect x="230" y="30" width="140" height="66" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="300" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 02: XOR Crisis</text>
  <text x="300" y="66" text-anchor="middle" font-size="9" fill="#555">1969</text>
  <text x="300" y="82" text-anchor="middle" font-size="8.5" fill="#999">AI Winter trigger</text>

  <!-- Arrow MS 02 -> MS 03 -->
  <line x1="370" y1="63" x2="425" y2="63" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- MS 03 -->
  <rect x="430" y="30" width="140" height="66" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="500" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 03: MLP Revival</text>
  <text x="500" y="66" text-anchor="middle" font-size="9" fill="#555">1986</text>
  <text x="500" y="82" text-anchor="middle" font-size="8.5" fill="#999">Backpropagation</text>

  <!-- ===== ROW 2: MS 04 (from MS 03) and MS 05 (separate branch) ===== -->

  <!-- Arrow down from MS 03 to MS 04 -->
  <line x1="500" y1="96" x2="500" y2="148" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="530" y="128" text-anchor="start" font-size="7.5" fill="#999">+ Module 09</text>

  <!-- MS 04 -->
  <rect x="430" y="152" width="140" height="66" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="500" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 04: CNN</text>
  <text x="500" y="188" text-anchor="middle" font-size="9" fill="#555">1998</text>
  <text x="500" y="204" text-anchor="middle" font-size="8.5" fill="#999">LeNet image recognition</text>

  <!-- MS 05 prereq label -->
  <text x="200" y="142" text-anchor="middle" font-size="8" fill="#999">Modules 11&#x2013;13</text>

  <!-- MS 05 -->
  <rect x="130" y="152" width="140" height="66" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 05: Transformer</text>
  <text x="200" y="188" text-anchor="middle" font-size="9" fill="#555">2017</text>
  <text x="200" y="204" text-anchor="middle" font-size="8.5" fill="#999">Attention mechanism</text>

  <!-- ===== ROW 3: MS 06 (from MS 05) ===== -->

  <!-- Arrow down from MS 05 to MS 06 -->
  <line x1="200" y1="218" x2="200" y2="270" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="230" y="250" text-anchor="start" font-size="7.5" fill="#999">+ Modules 14&#x2013;19</text>

  <!-- MS 06 -->
  <rect x="130" y="274" width="140" height="66" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="200" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MS 06: MLPerf</text>
  <text x="200" y="310" text-anchor="middle" font-size="9" fill="#555">2018</text>
  <text x="200" y="326" text-anchor="middle" font-size="8.5" fill="#999">Optimize and benchmark</text>

  <!-- ===== Timeline accent ===== -->
  <line x1="620" y1="30" x2="620" y2="340" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="56" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">1958</text>
  <text x="645" y="82" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">1969</text>
  <text x="645" y="170" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">1986</text>
  <text x="645" y="192" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">1998</text>
  <text x="645" y="214" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">2017</text>
  <text x="645" y="306" text-anchor="middle" font-size="7" fill="#ddd" font-weight="600">2018</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="380" text-anchor="middle" font-size="8" fill="#bbb">Each milestone uses YOUR code from the required modules</text>

</svg>
