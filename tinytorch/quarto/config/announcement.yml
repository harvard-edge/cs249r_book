# =============================================================================
# ANNOUNCEMENT BAR CONFIGURATION - TINYTORCH
# =============================================================================
# Unifying template (shared across all nine Quarto sites, 2026-04):
#   Line 1  — identity + primary CTA (what is THIS site)
#   Line 2  — the book
#   Line 3  — "Alongside the book:" sibling row (most-relevant verbs)
#   Line 4  — newsletter
#
# TinyTorch's role in the curriculum is the "build" lens, so line 3 omits
# TinyTorch itself and lists the sibling learner tools.
#
# History: this file was briefly reverted to a release-only notice by
# the v0.1.10 publish merge (commit 0009f55a9 on 2026-04-22) and again
# by the v0.1.11 publish on 2026-05-11 (this file). Release news belongs
# in a changelog, not in the always-visible nav bar — restored to the
# ecosystem template here. The tinytorch-publish-live workflow has been
# updated to append a transient `release_note` line above the ecosystem
# content instead of replacing the whole file, so future releases stop
# stomping this template.
# =============================================================================

website:
  announcement:
    icon: megaphone
    dismissable: true
    type: primary
    position: below-navbar
    content: |
      🔥 **TinyTorch** — build your own ML framework from scratch; the companion framework to the textbook.<br>
      📘 **The book:** [Vol I: Foundations](https://mlsysbook.ai/vol1/) · [Vol II: At Scale](https://mlsysbook.ai/vol2/) — open access, free forever.<br>
      🛠️ **Alongside the book:** [Hardware Kits](https://mlsysbook.ai/kits/) (deploy) · [MLSys·im](https://mlsysbook.ai/mlsysim/) (model) · [Labs](https://mlsysbook.ai/labs/) (explore) · [StaffML](https://mlsysbook.ai/staffml/) (practice)<br>
      📬 **Newsletter:** ML Systems insights & updates — [Subscribe →](https://mlsysbook.ai/newsletter/)
