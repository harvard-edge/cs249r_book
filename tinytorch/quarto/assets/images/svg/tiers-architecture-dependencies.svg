<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="750" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="375" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Architecture Tier: Module Dependencies</text>

  <!-- ===== Foundation (entry point) ===== -->
  <rect x="275" y="55" width="200" height="54" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="375" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Foundation</text>
  <text x="375" y="93" text-anchor="middle" font-size="9" fill="#555">Tensor, DataLoader,</text>
  <text x="375" y="104" text-anchor="middle" font-size="9" fill="#555">Autograd, Training</text>

  <!-- ===== Branch splitter arrows from Foundation ===== -->
  <!-- Left branch to M09 -->
  <path d="M375,109 V130 H170 V160" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Right branch to M10 -->
  <path d="M375,109 V130 H580 V160" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Vision track header ===== -->
  <text x="170" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Vision Track</text>
  <!-- ===== Language track header ===== -->
  <text x="580" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Language Track</text>

  <!-- ===== M09 Convolutions ===== -->
  <rect x="90" y="160" width="160" height="54" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="170" y="181" text-anchor="middle" font-size="11" font-weight="700" fill="#333">09. Convolutions</text>
  <text x="170" y="198" text-anchor="middle" font-size="9" fill="#555">Conv2d + Pooling</text>

  <!-- M09 -> VISION -->
  <path d="M170,214 V240" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== VISION outcome ===== -->
  <rect x="90" y="240" width="160" height="54" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="261" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Computer Vision</text>
  <text x="170" y="278" text-anchor="middle" font-size="9" fill="#555">CNNs unlock spatial intelligence</text>

  <!-- ===== M10 Tokenization ===== -->
  <rect x="500" y="160" width="160" height="54" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="580" y="181" text-anchor="middle" font-size="11" font-weight="700" fill="#333">10. Tokenization</text>
  <text x="580" y="198" text-anchor="middle" font-size="9" fill="#555">Text &#8594; integers</text>

  <!-- M10 -> M11 -->
  <path d="M580,214 V230" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== M11 Embeddings ===== -->
  <rect x="500" y="230" width="160" height="54" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="580" y="251" text-anchor="middle" font-size="11" font-weight="700" fill="#333">11. Embeddings</text>
  <text x="580" y="268" text-anchor="middle" font-size="9" fill="#555">Integers &#8594; vectors</text>

  <!-- M11 -> M12 -->
  <path d="M580,284 V300" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== M12 Attention ===== -->
  <rect x="500" y="300" width="160" height="54" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="580" y="321" text-anchor="middle" font-size="11" font-weight="700" fill="#333">12. Attention</text>
  <text x="580" y="338" text-anchor="middle" font-size="9" fill="#555">Context-aware representations</text>

  <!-- M12 -> M13 -->
  <path d="M580,354 V370" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== M13 Transformers ===== -->
  <rect x="500" y="370" width="160" height="54" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="580" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#333">13. Transformers</text>
  <text x="580" y="408" text-anchor="middle" font-size="9" fill="#555">Complete architecture</text>

  <!-- ===== LLM outcome (to the left of M13, on vision-column x but lower) ===== -->
  <rect x="280" y="370" width="190" height="54" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="375" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Language Models</text>
  <text x="375" y="408" text-anchor="middle" font-size="9" fill="#555">Transformers generate text</text>

  <!-- M13 -> LLM (leftward) -->
  <path d="M500,397 H470" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Footnote ===== -->
  <text x="375" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Vision and Language branches diverge from Foundation; both tracks apply shared infrastructure to domain-specific operations.</text>
</svg>
