<?xml version="1.0" encoding="UTF-8"?>
<!-- Canvas 840x500 with three tiers. Foundation (01-08, blue) stacks vertically; Architecture (09-13, purple) shows CNN branch + Language chain; Optimization (14-19, orange) fans out/in. Capstone (20) sits centered below. Cross-tier verticals route through inter-panel gutters at x=250 (F/A) and x=605 (A/O). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="840" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="420" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">TinyTorch Module Flow</text>

  <!-- ===== Tier dividers (dashed) ===== -->
  <line x1="250" y1="50" x2="250" y2="400" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="590" y1="50" x2="590" y2="400" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Tier headers ===== -->
  <text x="140" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">FOUNDATION (01-08)</text>
  <text x="420" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ARCHITECTURE (09-13)</text>
  <text x="700" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#333">OPTIMIZATION (14-19)</text>

  <!-- ===== Foundation tier (blue: compute/processing) ===== -->
  <!-- 8 modules, pitch 36, h=28, x=70 w=140. DataLoader is M05 per module numbering. -->
  <rect x="70" y="86" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#333">01 Tensor</text>

  <rect x="70" y="122" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#333">02 Activations</text>

  <rect x="70" y="158" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#333">03 Layers</text>

  <rect x="70" y="194" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#333">04 Losses</text>

  <rect x="70" y="230" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#333">05 DataLoader</text>

  <rect x="70" y="266" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="284" text-anchor="middle" font-size="11" font-weight="700" fill="#333">06 Autograd</text>

  <rect x="70" y="302" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#333">07 Optimizers</text>

  <rect x="70" y="338" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#333">08 Training</text>

  <!-- Foundation internal arrows (neutral, short connectors between adjacent modules) -->
  <path d="M140,114 L140,122" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,150 L140,158" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,186 L140,194" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,222 L140,230" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,258 L140,266" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,294 L140,302" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M140,330 L140,338" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Architecture tier (muted purple) ===== -->
  <!-- Vision branch (CNNs) on left, Language chain (Tok -> Emb -> Att -> Trans) on right. -->
  <rect x="280" y="90" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="335" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">09 CNNs</text>

  <rect x="450" y="90" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">10 Tokenization</text>

  <rect x="450" y="132" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#333">11 Embeddings</text>

  <rect x="450" y="174" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">12 Attention</text>

  <rect x="450" y="216" width="110" height="32" rx="4" fill="#e8dff0" stroke="#7a5b8e" stroke-width="1.5"/>
  <text x="505" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#333">13 Transformers</text>

  <!-- Language chain internal arrows -->
  <path d="M505,122 L505,132" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M505,164 L505,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M505,206 L505,216" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Optimization tier (orange: routing/scheduling) ===== -->
  <rect x="620" y="90" width="160" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="700" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#333">14 Profiling</text>

  <!-- 4 children: 15 Quant, 16 Compress, 17 Accel, 18 Memo -->
  <rect x="610" y="174" width="36" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="628" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">15 Q</text>

  <rect x="656" y="174" width="50" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="681" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">16 Cmp</text>

  <rect x="716" y="174" width="34" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="733" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">17 Ac</text>

  <rect x="760" y="174" width="34" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="777" y="194" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">18 Mm</text>

  <rect x="620" y="258" width="160" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="700" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#333">19 Benchmarking</text>

  <!-- Profiling -> 4 children (fan-out via bus at y=145) -->
  <path d="M700,122 L700,145" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,145 L777,145" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,145 L628,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M681,145 L681,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M733,145 L733,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M777,145 L777,174" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- 4 children -> Benchmarking (fan-in via bus at y=230) -->
  <path d="M628,206 L628,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M681,206 L681,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M733,206 L733,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M777,206 L777,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M628,230 L777,230" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M700,230 L700,258" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Cross-tier arrows (red: key cross-boundary flows) ===== -->
  <!-- F.DataLoader -> A.CNNs: exit DataLoader right, up F/A gutter (x=250), across top margin y=78, down into CNNs top -->
  <path d="M210,244 L250,244 L250,78 L335,78 L335,90" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- F.DataLoader -> A.Tokenization: branches off the y=78 bus to Tok top -->
  <path d="M250,78 L505,78 L505,90" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- A.CNNs -> O.Profiling: exit CNN right, up to y=68 (above header), across to A/O gutter x=605, down into Profiling left -->
  <path d="M390,106 L390,68 L605,68 L605,100 L620,100" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- A.Transformers -> O.Profiling: right into A/O gutter x=605, up to Profiling left edge -->
  <path d="M560,232 L605,232 L605,112 L620,112" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- ===== Capstone (gold neutral container) ===== -->
  <rect x="340" y="418" width="160" height="36" rx="4" fill="#fff3c4" stroke="#c8a02a" stroke-width="1.5"/>
  <text x="420" y="441" text-anchor="middle" font-size="11" font-weight="700" fill="#333">20 Capstone</text>

  <!-- O.Benchmarking -> Capstone: exit Benchmarking left, down A/O gutter x=605, across bottom gutter y=410, down into Capstone top -->
  <path d="M620,274 L605,274 L605,410 L420,410 L420,418" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- ===== Footnote ===== -->
  <text x="420" y="485" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Red arrows mark cross-tier dependencies; each tier builds on the prior.</text>
</svg>
