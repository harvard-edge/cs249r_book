<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="470" fill="#fff" rx="4"/>

  <!-- ===== Defs: arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Optimization Module Dependencies</text>
  <text x="340" y="48" text-anchor="middle" font-size="9.5" font-weight="400" fill="#555">Profiling fans out to four optimization modules, all converging at Benchmarking</text>

  <!-- ===== Entry: M14 Profiling ===== -->
  <rect x="270" y="75" width="140" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M14 Profiling</text>
  <text x="340" y="115" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Find bottlenecks</text>
  <text x="340" y="127" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Measure before optimizing</text>

  <!-- ===== Parallel row: M15, M16, M17, M18 ===== -->
  <!-- M15 Quantization -->
  <rect x="50" y="210" width="130" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="115" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M15 Quantization</text>
  <text x="115" y="250" text-anchor="middle" font-size="9" font-weight="400" fill="#555">INT8 compression</text>
  <text x="115" y="263" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">4-16x smaller</text>
  <text x="115" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">models</text>

  <!-- M16 Compression -->
  <rect x="200" y="210" width="130" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="265" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M16 Compression</text>
  <text x="265" y="250" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Structured pruning</text>
  <text x="265" y="263" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Remove redundant</text>
  <text x="265" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">parameters</text>

  <!-- M17 Acceleration -->
  <rect x="350" y="210" width="130" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="415" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M17 Acceleration</text>
  <text x="415" y="250" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Vectorization</text>
  <text x="415" y="263" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Kernel fusion</text>
  <text x="415" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">+ batching</text>

  <!-- M18 Memoization -->
  <rect x="500" y="210" width="130" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="565" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M18 Memoization</text>
  <text x="565" y="250" text-anchor="middle" font-size="9" font-weight="400" fill="#555">KV-cache</text>
  <text x="565" y="263" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Faster inference</text>
  <text x="565" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">at decode time</text>

  <!-- ===== Terminal: M19 Benchmarking (emphasized) ===== -->
  <rect x="250" y="345" width="180" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#333">M19 Benchmarking</text>
  <text x="340" y="385" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Systematic measurement</text>
  <text x="340" y="397" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">MLPerf-style evaluation</text>

  <!-- ===== Arrows: M14 fan-out to four modules ===== -->
  <!-- Profiling bottom center is (340, 135); route orthogonally to top-center of each box (y=210) -->
  <!-- Trunk: from (340,135) down to (340,170) -->
  <path d="M340,135 L340,170" stroke="#555" stroke-width="1.2" fill="none"/>
  <!-- Horizontal bus at y=170 from x=115 to x=565 -->
  <path d="M115,170 L565,170" stroke="#555" stroke-width="1.2" fill="none"/>
  <!-- Drop to M15 -->
  <path d="M115,170 L115,210" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- Drop to M16 -->
  <path d="M265,170 L265,210" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- Drop to M17 -->
  <path d="M415,170 L415,210" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <!-- Drop to M18 -->
  <path d="M565,170 L565,210" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Arrows: fan-in to M19 Benchmarking ===== -->
  <!-- Each module bottom-center (y=280) routes to horizontal bus at y=320, then trunk to M19 top-center (340,345) -->
  <!-- Risers from each module -->
  <path d="M115,280 L115,320" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M265,280 L265,320" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M415,280 L415,320" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M565,280 L565,320" stroke="#555" stroke-width="1.2" fill="none"/>
  <!-- Horizontal bus at y=320 -->
  <path d="M115,320 L565,320" stroke="#555" stroke-width="1.2" fill="none"/>
  <!-- Trunk down to M19 -->
  <path d="M340,320 L340,345" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Profile first, optimize the bottlenecks, then measure the gains.</text>
</svg>
