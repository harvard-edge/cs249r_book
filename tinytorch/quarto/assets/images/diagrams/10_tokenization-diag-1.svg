<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <g transform="translate(0,-50)">
<rect x="40" y="60" width="600" height="340" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="50" y="80" font-size="11" font-weight="700" fill="#1f2937">Your Tokenization System</text>
  <rect x="250" y="100" width="180" height="60" fill="#f4f5f7" stroke="#9ca3af" stroke-width="1" rx="2"/>
  <text x="340.0" y="127.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Base Tokenizer</text>
  <text x="340.0" y="142.0" text-anchor="middle" font-size="9" font-weight="400" fill="#6b7280">encode(), decode()</text>
  <rect x="100" y="220" width="160" height="60" fill="#f4f5f7" stroke="#9ca3af" stroke-width="1" rx="2"/>
  <text x="180.0" y="247.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">CharTokenizer</text>
  <text x="180.0" y="262.0" text-anchor="middle" font-size="9" font-weight="400" fill="#6b7280">character-level</text>
  <rect x="420" y="220" width="160" height="60" fill="#fff1e8" stroke="#ff8246" stroke-width="1" rx="2"/>
  <text x="500.0" y="247.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">BPETokenizer</text>
  <text x="500.0" y="262.0" text-anchor="middle" font-size="9" font-weight="400" fill="#6b7280">subword units</text>
  <rect x="250" y="320" width="180" height="60" fill="#f4f5f7" stroke="#9ca3af" stroke-width="1" rx="2"/>
  <text x="340.0" y="347.0" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Vocabulary Manager</text>
  <text x="340.0" y="362.0" text-anchor="middle" font-size="9" font-weight="400" fill="#6b7280">mappings &amp; special tokens</text>
  <path d="M250 130 H180 V220" stroke="#9ca3af" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 130 H500 V220" stroke="#9ca3af" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M180 280 V350 H250" stroke="#9ca3af" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 280 V350 H430" stroke="#9ca3af" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
