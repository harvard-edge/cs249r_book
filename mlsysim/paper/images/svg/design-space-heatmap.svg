  <text x="280" y="165" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34" transform="rotate(-40 280 165)">Regime Boundary</text>

  <!-- ===== Hardware markers ===== -->
  <!-- A100 marker -->
  <circle cx="220" cy="380" r="4" fill="#a31f34"/>
  <text x="220" y="424" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">A100</text>
  <text x="220" y="434" text-anchor="middle" font-size="7" fill="#555">2.0 TB/s</text>

  <!-- H100 marker -->
  <circle cx="300" cy="380" r="4" fill="#a31f34"/>
  <text x="300" y="424" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">H100</text>
  <text x="300" y="434" text-anchor="middle" font-size="7" fill="#555">3.35 TB/s</text>

  <!-- B200 marker -->
