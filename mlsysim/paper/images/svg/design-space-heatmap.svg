  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Design-Space Exploration: Bottleneck Regime Map</text>
  <text x="340" y="42" text-anchor="middle" font-size="9" fill="#555">Binding constraint as a function of HBM bandwidth and model size (FP16 training, B=256)</text>

  <!-- ===== Axes ===== -->
  <line x1="100" y1="60" x2="100" y2="380" stroke="#333" stroke-width="1.2"/>
  <line x1="100" y1="380" x2="600" y2="380" stroke="#333" stroke-width="1.2"/>

  <!-- Y axis label -->
  <text x="30" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90 30 220)">Model Size (Parameters)</text>

  <!-- X axis label -->
  <text x="350" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#333">HBM Bandwidth (TB/s)</text>

  <!-- Y axis ticks -->
  <text x="90" y="364" text-anchor="end" font-size="8" fill="#555">1B</text>
  <text x="90" y="314" text-anchor="end" font-size="8" fill="#555">7B</text>
  <text x="90" y="264" text-anchor="end" font-size="8" fill="#555">13B</text>
