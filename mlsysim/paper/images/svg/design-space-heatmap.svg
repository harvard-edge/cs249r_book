  <text x="537" y="422" font-size="8" fill="#333">Compute-bound</text>

  <!-- Footnote -->
  <text x="340" y="455" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each cell represents one MLSysim solve (sub-second). The entire 42-point grid executes in &lt;50 ms.</text>
</svg>
