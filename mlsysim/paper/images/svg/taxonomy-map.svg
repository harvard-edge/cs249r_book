<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The 22 ML Systems Walls: Six-Domain Taxonomy</text>

  <!-- ===== Domain Boxes (2×3 grid) ===== -->
  <!-- Row 1 -->
  <!-- Node Domain -->
  <rect x="20" y="44" width="208" height="170" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="124" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Node</text>
  <text x="124" y="74" text-anchor="middle" font-size="8" fill="#555">Single-Accelerator Resources</text>
  <line x1="30" y1="80" x2="218" y2="80" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <text x="30" y="95" font-size="8.5" fill="#333"><tspan font-weight="700">1</tspan>  Compute — Peak FLOP/s ceiling</text>
  <text x="30" y="109" font-size="8.5" fill="#333"><tspan font-weight="700">2</tspan>  Memory — HBM BW + capacity</text>
  <text x="30" y="123" font-size="8.5" fill="#333"><tspan font-weight="700">3</tspan>  Software — Achieved MFU</text>
  <text x="30" y="137" font-size="8.5" fill="#333"><tspan font-weight="700">4</tspan>  Serving — Prefill vs. decode</text>
  <text x="30" y="151" font-size="8.5" fill="#333"><tspan font-weight="700">5</tspan>  Batching — KV-cache fragmentation</text>
  <text x="30" y="165" font-size="8.5" fill="#333"><tspan font-weight="700">6</tspan>  Streaming — Injection BW</text>
  <text x="30" y="179" font-size="8.5" fill="#333"><tspan font-weight="700">7</tspan>  Tail Latency — P99 queueing</text>
  <!-- Solver count badge -->
  <rect x="170" y="194" width="50" height="16" rx="8" fill="#4a90c4"/>
  <text x="195" y="205" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">7 solvers</text>

  <!-- Data Domain -->
  <rect x="236" y="44" width="208" height="170" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Data</text>
  <text x="340" y="74" text-anchor="middle" font-size="8" fill="#555">Movement &amp; Pipelines</text>
  <line x1="246" y1="80" x2="434" y2="80" stroke="#3d9e5a" stroke-width="0.5" opacity="0.4"/>
  <text x="246" y="95" font-size="8.5" fill="#333"><tspan font-weight="700">8</tspan>  Ingestion — Storage I/O</text>
  <text x="246" y="109" font-size="8.5" fill="#333"><tspan font-weight="700">9</tspan>  Transformation — CPU preproc.</text>
  <text x="246" y="123" font-size="8.5" fill="#333"><tspan font-weight="700">10</tspan>  Locality — Network bisection BW</text>
  <!-- Solver count badge -->
  <rect x="386" y="194" width="50" height="16" rx="8" fill="#3d9e5a"/>
  <text x="411" y="205" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">3 solvers</text>

  <!-- Algorithm Domain -->
  <rect x="452" y="44" width="208" height="170" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="556" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Algorithm</text>
  <text x="556" y="74" text-anchor="middle" font-size="8" fill="#555">Scaling &amp; Compression</text>
  <line x1="462" y1="80" x2="650" y2="80" stroke="#c87b2a" stroke-width="0.5" opacity="0.4"/>
  <text x="462" y="95" font-size="8.5" fill="#333"><tspan font-weight="700">11</tspan>  Complexity — Scaling laws</text>
  <text x="462" y="109" font-size="8.5" fill="#333"><tspan font-weight="700">12</tspan>  Reasoning — Inference compute</text>
  <text x="462" y="123" font-size="8.5" fill="#333"><tspan font-weight="700">13</tspan>  Fidelity — Accuracy–efficiency</text>
  <!-- Solver count badge -->
  <rect x="602" y="194" width="50" height="16" rx="8" fill="#c87b2a"/>
  <text x="627" y="205" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">3 solvers</text>

  <!-- Row 2 -->
  <!-- Fleet Domain -->
  <rect x="20" y="228" width="208" height="170" rx="6" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="124" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fleet</text>
  <text x="124" y="258" text-anchor="middle" font-size="8" fill="#555">Multi-Node Coordination</text>
  <line x1="30" y1="264" x2="218" y2="264" stroke="#2d7a2d" stroke-width="0.5" opacity="0.4"/>
  <text x="30" y="279" font-size="8.5" fill="#333"><tspan font-weight="700">14</tspan>  Communication — AllReduce</text>
  <text x="30" y="293" font-size="8.5" fill="#333"><tspan font-weight="700">15</tspan>  Fragility — Cluster MTBF</text>
  <text x="30" y="307" font-size="8.5" fill="#333"><tspan font-weight="700">16</tspan>  Multi-tenant — Queue wait</text>
  <!-- Solver count badge -->
  <rect x="170" y="378" width="50" height="16" rx="8" fill="#2d7a2d"/>
  <text x="195" y="389" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">3 solvers</text>

  <!-- Operations Domain -->
  <rect x="236" y="228" width="208" height="170" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="340" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Operations</text>
  <text x="340" y="258" text-anchor="middle" font-size="8" fill="#555">Economics, Sustainability &amp; Safety</text>
  <line x1="246" y1="264" x2="434" y2="264" stroke="#c44" stroke-width="0.5" opacity="0.4"/>
  <text x="246" y="279" font-size="8.5" fill="#333"><tspan font-weight="700">17</tspan>  Capital — TCO</text>
  <text x="246" y="293" font-size="8.5" fill="#333"><tspan font-weight="700">18</tspan>  Sustainability — Carbon + water</text>
  <text x="246" y="307" font-size="8.5" fill="#333"><tspan font-weight="700">19</tspan>  Checkpoint — I/O burst penalty</text>
  <text x="246" y="321" font-size="8.5" fill="#333"><tspan font-weight="700">20</tspan>  Safety — DP-SGD overhead</text>
  <!-- Solver count badge -->
  <rect x="386" y="378" width="50" height="16" rx="8" fill="#c44"/>
  <text x="411" y="389" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">4 solvers</text>

  <!-- Analysis Domain -->
  <rect x="452" y="228" width="208" height="170" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="556" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Analysis</text>
  <text x="556" y="258" text-anchor="middle" font-size="8" fill="#555">Cross-Cutting Diagnostics</text>
  <line x1="462" y1="264" x2="650" y2="264" stroke="#bbb" stroke-width="0.5" opacity="0.4"/>
  <text x="462" y="279" font-size="8.5" fill="#333"><tspan font-weight="700">21</tspan>  Sensitivity — Binding constraint</text>
  <text x="462" y="293" font-size="8.5" fill="#333"><tspan font-weight="700">22</tspan>  Synthesis — Inverse spec</text>
  <!-- Dashed arrows from Analysis to other domains -->
  <line x1="462" y1="320" x2="228" y2="360" stroke="#999" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="462" y1="320" x2="340" y2="360" stroke="#999" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="500" y="340" font-size="7.5" font-style="italic" fill="#999">spans all domains</text>
  <!-- Solver count badge -->
  <rect x="602" y="378" width="50" height="16" rx="8" fill="#888"/>
  <text x="627" y="389" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">2 solvers</text>

  <!-- ===== Summary line ===== -->
  <rect x="200" y="416" width="280" height="24" rx="12" fill="#a31f34"/>
  <text x="340" y="432" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6 Domains · 22 Walls · 21 Solvers</text>

  <!-- Footnote -->
  <text x="340" y="455" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Walls 1–2 share the SingleNodeSolver, yielding 21 distinct solvers across 22 walls.</text>
</svg>
