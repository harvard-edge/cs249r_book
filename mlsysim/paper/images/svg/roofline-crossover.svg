<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Axes ===== -->
  <line x1="80" y1="30" x2="80" y2="380" stroke="#333" stroke-width="1.2"/>
  <line x1="80" y1="380" x2="640" y2="380" stroke="#333" stroke-width="1.2"/>

  <!-- Y axis label -->
  <text x="24" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#333" transform="rotate(-90 24 220)">Attainable TFLOP/s</text>
  <!-- X axis label -->
  <text x="360" y="412" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Arithmetic Intensity (FLOP/byte)</text>

  <!-- ===== Y axis ticks ===== -->
  <line x1="75" y1="360" x2="80" y2="360" stroke="#333" stroke-width="1"/>
  <text x="70" y="364" text-anchor="end" font-size="12" fill="#555">10</text>
  <line x1="75" y1="300" x2="80" y2="300" stroke="#333" stroke-width="1"/>
  <text x="70" y="304" text-anchor="end" font-size="12" fill="#555">50</text>
  <line x1="75" y1="240" x2="80" y2="240" stroke="#333" stroke-width="1"/>
  <text x="70" y="244" text-anchor="end" font-size="12" fill="#555">150</text>
  <line x1="75" y1="180" x2="80" y2="180" stroke="#333" stroke-width="1"/>
  <text x="70" y="184" text-anchor="end" font-size="12" fill="#555">400</text>
  <line x1="75" y1="120" x2="80" y2="120" stroke="#333" stroke-width="1"/>
  <text x="70" y="124" text-anchor="end" font-size="12" fill="#555">700</text>
  <line x1="75" y1="80" x2="80" y2="80" stroke="#333" stroke-width="1"/>
  <text x="70" y="84" text-anchor="end" font-size="12" fill="#555">990</text>

  <!-- ===== X axis ticks ===== -->
  <line x1="120" y1="380" x2="120" y2="385" stroke="#333" stroke-width="1"/>
  <text x="120" y="398" text-anchor="middle" font-size="12" fill="#555">1</text>
  <line x1="210" y1="380" x2="210" y2="385" stroke="#333" stroke-width="1"/>
  <text x="210" y="398" text-anchor="middle" font-size="12" fill="#555">8</text>
  <line x1="310" y1="380" x2="310" y2="385" stroke="#333" stroke-width="1"/>
  <text x="310" y="398" text-anchor="middle" font-size="12" fill="#555">34</text>
  <line x1="390" y1="380" x2="390" y2="385" stroke="#333" stroke-width="1"/>
  <text x="390" y="398" text-anchor="middle" font-size="12" fill="#555">62</text>
  <line x1="470" y1="380" x2="470" y2="385" stroke="#333" stroke-width="1"/>
  <text x="470" y="398" text-anchor="middle" font-size="12" fill="#555">137</text>
  <line x1="560" y1="380" x2="560" y2="385" stroke="#333" stroke-width="1"/>
  <text x="560" y="398" text-anchor="middle" font-size="12" fill="#555">274</text>

  <!-- ===== Peak compute ceiling (horizontal) ===== -->
  <line x1="390" y1="80" x2="640" y2="80" stroke="#5a7394" stroke-width="2"/>
  <text x="630" y="72" text-anchor="end" font-size="13" font-weight="700" fill="#5a7394">Peak = 990 TFLOP/s</text>

  <!-- ===== Memory bandwidth slope (diagonal) ===== -->
  <line x1="80" y1="380" x2="390" y2="80" stroke="#b5736e" stroke-width="2"/>
  <text x="200" y="190" text-anchor="start" font-size="13" font-weight="700" fill="#b5736e" transform="rotate(-47 200 190)">BW = 3.35 TB/s</text>

  <!-- ===== Ridge point ===== -->
  <circle cx="390" cy="80" r="6" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <line x1="390" y1="86" x2="390" y2="380" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="396" y="100" font-size="13" font-weight="700" fill="#a31f34">Ridge: 62 FLOP/byte</text>

  <!-- ===== Region labels ===== -->
  <rect x="125" y="308" width="130" height="24" rx="4" fill="#f5e6e4" stroke="#b5736e" stroke-width="1"/>
  <text x="190" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#b5736e">Memory-Bound</text>

  <rect x="445" y="55" width="135" height="24" rx="4" fill="#d6dfe8" stroke="#5a7394" stroke-width="1"/>
  <text x="512" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#5a7394">Compute-Bound</text>

  <!-- ===== Data points (batch sizes) ===== -->
  <!-- B=1 -->
  <circle cx="120" cy="354" r="7" fill="#f5e6e4" stroke="#b5736e" stroke-width="1.5"/>
  <text x="120" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#333">B=1</text>
  <text x="120" y="372" text-anchor="middle" font-size="11" fill="#555">MFU 0.02</text>

  <!-- B=8 -->
  <circle cx="210" cy="268" r="7" fill="#f5e6e4" stroke="#b5736e" stroke-width="1.5"/>
  <text x="210" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="#333">B=8</text>
  <text x="210" y="286" text-anchor="middle" font-size="11" fill="#555">MFU 0.14</text>

  <!-- B=32 -->
  <circle cx="310" cy="176" r="7" fill="#f5e6e4" stroke="#b5736e" stroke-width="1.5"/>
  <text x="310" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="#333">B=32</text>
  <text x="310" y="194" text-anchor="middle" font-size="11" fill="#555">MFU 0.42</text>

  <!-- B=128 -->
  <circle cx="470" cy="108" r="7" fill="#d6dfe8" stroke="#5a7394" stroke-width="1.5"/>
  <text x="470" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#333">B=128</text>
  <text x="470" y="126" text-anchor="middle" font-size="11" fill="#555">MFU 0.61</text>

  <!-- B=256 -->
  <circle cx="560" cy="104" r="7" fill="#d6dfe8" stroke="#5a7394" stroke-width="1.5"/>
  <text x="560" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#333">B=256</text>
  <text x="560" y="122" text-anchor="middle" font-size="11" fill="#555">MFU 0.63</text>

  <!-- ===== Crossover annotation ===== -->
  <text x="390" y="432" text-anchor="middle" font-size="14" font-weight="700" fill="#a31f34">↑ Crossover near B≈64</text>

  <!-- Footnote -->
  <text x="340" y="454" text-anchor="middle" font-size="12" font-style="italic" fill="#999">Increasing batch size moves the operating point rightward, transitioning from memory-bound to compute-bound.</text>
</svg>
