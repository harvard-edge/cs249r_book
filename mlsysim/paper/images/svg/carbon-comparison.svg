<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Geography as a Systems Variable: Iowa vs. Québec</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Identical 256-GPU cluster, 70B model, 30-day training run — only datacenter location differs</text>

  <!-- ===== CO₂ Emissions (left panel) ===== -->
  <text x="200" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#333">CO₂ Emissions (tonnes)</text>

  <!-- Y axis -->
  <line x1="80" y1="90" x2="80" y2="320" stroke="#333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="320" x2="320" y2="320" stroke="#333" stroke-width="1"/>

  <!-- Y ticks -->
  <text x="72" y="318" text-anchor="end" font-size="8" fill="#555">0</text>
  <text x="72" y="272" text-anchor="end" font-size="8" fill="#555">100</text>
  <text x="72" y="226" text-anchor="end" font-size="8" fill="#555">200</text>
  <text x="72" y="180" text-anchor="end" font-size="8" fill="#555">300</text>
  <text x="72" y="134" text-anchor="end" font-size="8" fill="#555">400</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="#eee" stroke-width="0.5"/>
  <line x1="80" y1="226" x2="320" y2="226" stroke="#eee" stroke-width="0.5"/>
  <line x1="80" y1="180" x2="320" y2="180" stroke="#eee" stroke-width="0.5"/>
  <line x1="80" y1="134" x2="320" y2="134" stroke="#eee" stroke-width="0.5"/>

  <!-- Iowa bar: 412 tonnes -->
  <rect x="110" y="130" width="70" height="190" rx="3" fill="#e8434a" opacity="0.85"/>
  <text x="145" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">412</text>
  <text x="145" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Iowa</text>
  <text x="145" y="352" text-anchor="middle" font-size="7.5" fill="#555">680 gCO₂/kWh</text>

  <!-- Québec bar: 10.3 tonnes -->
  <rect x="220" y="315" width="70" height="5" rx="3" fill="#3d9e5a" opacity="0.85"/>
  <text x="255" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">10.3</text>
  <text x="255" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Québec</text>
  <text x="255" y="352" text-anchor="middle" font-size="7.5" fill="#555">17 gCO₂/kWh</text>

  <!-- 40× annotation -->
  <line x1="150" y1="220" x2="250" y2="315" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="165" y="254" width="55" height="20" rx="10" fill="#a31f34"/>
  <text x="192" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">40×</text>

  <!-- ===== Water Usage (right panel) ===== -->
  <text x="500" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Water Usage (kilolitres)</text>

  <!-- Y axis -->
  <line x1="380" y1="90" x2="380" y2="320" stroke="#333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="380" y1="320" x2="620" y2="320" stroke="#333" stroke-width="1"/>

  <!-- Y ticks -->
  <text x="372" y="318" text-anchor="end" font-size="8" fill="#555">0</text>
  <text x="372" y="272" text-anchor="end" font-size="8" fill="#555">60</text>
  <text x="372" y="226" text-anchor="end" font-size="8" fill="#555">120</text>
  <text x="372" y="180" text-anchor="end" font-size="8" fill="#555">180</text>
  <text x="372" y="134" text-anchor="end" font-size="8" fill="#555">240</text>
  <line x1="380" y1="272" x2="620" y2="272" stroke="#eee" stroke-width="0.5"/>
  <line x1="380" y1="226" x2="620" y2="226" stroke="#eee" stroke-width="0.5"/>
  <line x1="380" y1="180" x2="620" y2="180" stroke="#eee" stroke-width="0.5"/>
  <line x1="380" y1="134" x2="620" y2="134" stroke="#eee" stroke-width="0.5"/>

  <!-- Iowa bar: 231 kL -->
  <rect x="410" y="133" width="70" height="187" rx="3" fill="#4a90c4" opacity="0.7"/>
  <text x="445" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">231</text>
  <text x="445" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Iowa</text>

  <!-- Québec bar: 5.8 kL -->
  <rect x="520" y="316" width="70" height="4" rx="3" fill="#4a90c4" opacity="0.4"/>
  <text x="555" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">5.8</text>
  <text x="555" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Québec</text>

  <!-- 40× annotation -->
  <line x1="450" y1="220" x2="550" y2="316" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="465" y="254" width="55" height="20" rx="10" fill="#a31f34"/>
  <text x="492" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">40×</text>

  <!-- ===== Key insight box ===== -->
  <rect x="50" y="370" width="580" height="44" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="340" y="388" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Wall 18 (Sustainability): Grid carbon intensity is a first-order systems design variable.</text>
  <text x="340" y="403" text-anchor="middle" font-size="9" fill="#555">Hardware, model, parallelism strategy, and MFU are identical. Only CI_region differs.</text>

  <!-- ===== Grid profiles ===== -->
  <rect x="80" y="425" width="12" height="12" fill="#e8434a" opacity="0.85" rx="2"/>
  <text x="97" y="435" font-size="8" fill="#333">Iowa (MidAmerican Energy) — coal + natural gas dominant</text>
  <rect x="380" y="425" width="12" height="12" fill="#3d9e5a" opacity="0.85" rx="2"/>
  <text x="397" y="435" font-size="8" fill="#333">Québec (Hydro-Québec) — 95% hydroelectric</text>

  <!-- Footnote -->
  <text x="340" y="455" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Data from MLSysim SustainabilitySolver using 2024 regional grid carbon intensity values.</text>
</svg>
