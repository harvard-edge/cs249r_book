<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="580" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== (a) Demand-Supply Separation ===== -->
  <text x="30" y="16" font-size="10" font-weight="700" fill="#333">(a) Demand-Supply Separation</text>

  <!-- Demand -->
  <rect x="30" y="24" width="295" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="177" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Demand (Workload)</text>
  <text x="177" y="57" text-anchor="middle" font-size="8" fill="#555">W = (P, D, S, L, H, A, B): parameters, tokens, layers, heads, batch</text>

  <!-- Supply -->
  <rect x="355" y="24" width="295" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="502" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Supply (Hardware)</text>
  <text x="502" y="57" text-anchor="middle" font-size="8" fill="#555">H = (F, BW, C, TDP): FLOP/s, bandwidth, capacity, power</text>

  <!-- Context -->
  <rect x="140" y="82" width="400" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="101" text-anchor="middle" font-size="8.5" fill="#333"><tspan font-weight="700">Context:</tspan>  Infrastructure (N, PUE, CI, $/kWh) + Systems (topology, parallelism)</text>

  <!-- Arrows down -->
  <line x1="177" y1="74" x2="177" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="502" y1="74" x2="502" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="112" x2="340" y2="128" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== (b) 22 Systems Walls across 6 Domains ===== -->
  <text x="30" y="126" font-size="10" font-weight="700" fill="#333">(b) 22 Systems Walls</text>
  <text x="248" y="126" font-size="8" fill="#999" font-style="italic">6 domains, each wall = physical/logical constraint with a grounded equation</text>

  <rect x="20" y="132" width="640" height="240" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Domain 1: Node (7 walls) -->
  <rect x="32" y="142" width="298" height="72" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="42" y="157" font-size="9" font-weight="700" fill="#333">Node</text>
  <text x="330" y="157" text-anchor="end" font-size="7" fill="#4a90c4" font-style="italic">single-accelerator ceilings</text>
  <text x="42" y="172" font-size="7.5" fill="#555">W1 Compute   W2 Memory   W3 Software   W4 Serving</text>
  <text x="42" y="184" font-size="7.5" fill="#555">W5 Batching  W6 Streaming  W7 Tail Latency</text>
  <rect x="280" y="191" width="44" height="14" rx="7" fill="#4a90c4"/>
  <text x="302" y="201" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">7 walls</text>

  <!-- Domain 2: Data (3 walls) -->
  <rect x="350" y="142" width="298" height="44" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="360" y="157" font-size="9" font-weight="700" fill="#333">Data</text>
  <text x="648" y="157" text-anchor="end" font-size="7" fill="#3d9e5a" font-style="italic">movement and pipelines</text>
  <text x="360" y="172" font-size="7.5" fill="#555">W8 Ingestion   W9 Transformation   W10 Locality</text>
  <rect x="598" y="167" width="44" height="14" rx="7" fill="#3d9e5a"/>
  <text x="620" y="177" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">3 walls</text>

  <!-- Domain 3: Algorithm (3 walls) -->
  <rect x="350" y="194" width="298" height="44" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="360" y="209" font-size="9" font-weight="700" fill="#333">Algorithm</text>
  <text x="648" y="209" text-anchor="end" font-size="7" fill="#c87b2a" font-style="italic">scaling and compression</text>
  <text x="360" y="224" font-size="7.5" fill="#555">W11 Complexity   W12 Reasoning   W13 Fidelity</text>
  <rect x="598" y="219" width="44" height="14" rx="7" fill="#c87b2a"/>
  <text x="620" y="229" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">3 walls</text>

  <!-- Domain 4: Fleet (3 walls) -->
  <rect x="32" y="222" width="298" height="44" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="42" y="237" font-size="9" font-weight="700" fill="#333">Fleet</text>
  <text x="330" y="237" text-anchor="end" font-size="7" fill="#c44" font-style="italic">multi-node coordination</text>
  <text x="42" y="252" font-size="7.5" fill="#555">W14 Communication   W15 Fragility   W16 Multi-tenant</text>
  <rect x="280" y="247" width="44" height="14" rx="7" fill="#c44"/>
  <text x="302" y="257" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">3 walls</text>

  <!-- Domain 5: Ops (4 walls) -->
  <rect x="32" y="274" width="298" height="44" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="42" y="289" font-size="9" font-weight="700" fill="#333">Ops</text>
  <text x="330" y="289" text-anchor="end" font-size="7" fill="#2d7a2d" font-style="italic">economics, sustainability, safety</text>
  <text x="42" y="304" font-size="7.5" fill="#555">W17 Capital   W18 Sustainability   W19 Checkpoint   W20 Safety</text>
  <rect x="280" y="299" width="44" height="14" rx="7" fill="#2d7a2d"/>
  <text x="302" y="309" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">4 walls</text>

  <!-- Domain 6: Analysis (2 walls) -->
  <rect x="350" y="246" width="298" height="72" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="360" y="261" font-size="9" font-weight="700" fill="#a31f34">Analysis</text>
  <text x="648" y="261" text-anchor="end" font-size="7" fill="#a31f34" font-style="italic">cross-cutting diagnostics</text>
  <text x="360" y="278" font-size="7.5" fill="#555">W21 Sensitivity: partial derivatives to find binding constraint</text>
  <text x="360" y="290" font-size="7.5" fill="#555">W22 Synthesis: inverse solve for hardware requirements</text>
  <rect x="598" y="297" width="44" height="14" rx="7" fill="#a31f34"/>
  <text x="620" y="307" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">2 walls</text>

  <!-- Dimensional note -->
  <text x="42" y="360" font-size="7" fill="#999" font-style="italic">Dimensional enforcement: every quantity carries SI units at runtime via pint</text>

  <!-- ===== (c) Solver Composition ===== -->
  <text x="30" y="388" font-size="10" font-weight="700" fill="#333">(c) Stateless Solver Composition</text>
  <text x="295" y="388" font-size="8" fill="#999" font-style="italic">each solver: pure f(config) to metrics, full evaluation &lt;0.3s</text>

  <rect x="20" y="394" width="640" height="68" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Solver chain -->
  <rect x="34" y="406" width="72" height="28" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="70" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">SingleNode</text>

  <line x1="106" y1="420" x2="118" y2="420" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="121" y="406" width="58" height="28" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="150" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Data</text>

  <line x1="179" y1="420" x2="191" y2="420" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="194" y="406" width="62" height="28" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="225" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Scaling</text>

  <line x1="256" y1="420" x2="268" y2="420" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="271" y="406" width="72" height="28" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="307" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Distributed</text>

  <line x1="343" y1="420" x2="355" y2="420" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="358" y="406" width="72" height="28" rx="3" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="394" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Economics</text>

  <line x1="430" y1="420" x2="442" y2="420" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="445" y="406" width="72" height="28" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="481" y="424" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Sustain.</text>

  <line x1="517" y1="420" x2="529" y2="420" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Binding wall output -->
  <rect x="532" y="402" width="118" height="36" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.8"/>
  <text x="591" y="418" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Binding Wall</text>
  <text x="591" y="430" text-anchor="middle" font-size="7" fill="#555">scorecard + synthesis</text>

  <!-- Three-level evaluation -->
  <text x="34" y="452" font-size="7.5" fill="#555">Three-level evaluation:</text>
  <rect x="145" y="442" width="62" height="16" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="176" y="453" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Feasibility</text>
  <text x="214" y="453" font-size="7" fill="#555">then</text>
  <rect x="232" y="442" width="50" height="16" rx="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="257" y="453" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Profile</text>
  <text x="289" y="453" font-size="7" fill="#555">then</text>
  <rect x="307" y="442" width="50" height="16" rx="8" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="332" y="453" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Fleet</text>

  <!-- ===== (d) Example Outputs ===== -->
  <text x="30" y="482" font-size="10" font-weight="700" fill="#333">(d) Example: LLaMA-3 70B on 1024x H100</text>

  <rect x="20" y="488" width="200" height="44" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="120" y="504" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Binding: Wall 2</text>
  <text x="120" y="518" text-anchor="middle" font-size="7.5" fill="#555">HBM BW = 3.35 TB/s ceiling</text>

  <rect x="240" y="488" width="200" height="44" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="504" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sensitivity</text>
  <text x="340" y="518" text-anchor="middle" font-size="7.5" fill="#555">dT/dBW = -0.42   dT/dFLOPS = -0.11</text>

  <rect x="460" y="488" width="200" height="44" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="504" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Synthesis</text>
  <text x="560" y="518" text-anchor="middle" font-size="7.5" fill="#555">50ms TTFT SLA: need 4.8 TB/s BW</text>

  <!-- Sustainability + Reliability row -->
  <rect x="20" y="540" width="310" height="26" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="175" y="557" text-anchor="middle" font-size="7.5" fill="#333"><tspan font-weight="700">Sustainability:</tspan> 128 tCO2 + 2.1M L water + $4.2M TCO (3y)</text>

  <rect x="350" y="540" width="310" height="26" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <text x="505" y="557" text-anchor="middle" font-size="7.5" fill="#333"><tspan font-weight="700">Reliability:</tspan> MTBF = 1.7h @ 1024 nodes, ckpt = 12 min</text>

  <!-- Footnote -->
  <text x="340" y="578" text-anchor="middle" font-size="8.5" font-style="italic" fill="#999">All outputs produced in &lt;0.3s on a laptop. No GPU required.</text>
</svg>
