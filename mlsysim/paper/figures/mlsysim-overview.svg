<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="620" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== (a) Demand–Supply Separation ===== -->
  <text x="30" y="16" font-size="10" font-weight="700" fill="#333">(a) Demand–Supply Separation</text>

  <!-- Demand -->
  <rect x="30" y="24" width="295" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="177" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Demand (Workload)</text>
  <text x="177" y="57" text-anchor="middle" font-size="8" fill="#555">W = (P, D, S, L, H, A, B) — parameters, tokens, layers, heads, batch</text>

  <!-- Supply -->
  <rect x="355" y="24" width="295" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="502" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Supply (Hardware)</text>
  <text x="502" y="57" text-anchor="middle" font-size="8" fill="#555">H = (F, BW, C, TDP) — FLOP/s, bandwidth, capacity, power</text>

  <!-- Context -->
  <rect x="140" y="82" width="400" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="101" text-anchor="middle" font-size="8.5" fill="#333"><tspan font-weight="700">Context:</tspan>  Infrastructure (N, PUE, CI, $/kWh) · Systems (topology, parallelism)</text>

  <!-- Arrows down -->
  <line x1="177" y1="74" x2="177" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="502" y1="74" x2="502" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="112" x2="340" y2="128" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== (b) 22 Systems Walls across 5 Domains ===== -->
  <text x="30" y="126" font-size="10" font-weight="700" fill="#333">(b) 22 Systems Walls</text>
  <text x="300" y="126" font-size="8" fill="#999" font-style="italic">each wall = physical/logical constraint with a grounded equation</text>

  <rect x="20" y="132" width="640" height="280" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Domain 1: Node (7 walls) -->
  <rect x="32" y="142" width="298" height="92" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="42" y="157" font-size="9" font-weight="700" fill="#333">Domain 1 — Node</text>
  <text x="330" y="157" text-anchor="end" font-size="7" fill="#4a90c4" font-style="italic">single-accelerator ceilings</text>
  <text x="42" y="172" font-size="7.5" fill="#555">W1  Compute          T = OPs / (Peak × η)</text>
  <text x="42" y="184" font-size="7.5" fill="#555">W2  Memory            T = |W| / BW_HBM</text>
  <text x="42" y="196" font-size="7.5" fill="#555">W3  Software          η (MFU adjustment)</text>
  <text x="42" y="208" font-size="7.5" fill="#555">W4  Serving            TTFT / ITL split</text>
  <text x="42" y="220" font-size="7.5" fill="#555">W5  Batching   W6  Streaming   W7  Tail Latency</text>

  <!-- Domain 2: Data (3 walls) -->
  <rect x="350" y="142" width="298" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="360" y="157" font-size="9" font-weight="700" fill="#333">Domain 2 — Data</text>
  <text x="648" y="157" text-anchor="end" font-size="7" fill="#3d9e5a" font-style="italic">movement and pipelines</text>
  <text x="360" y="172" font-size="7.5" fill="#555">W8   Ingestion          ρ = BW_d / BW_s</text>
  <text x="360" y="184" font-size="7.5" fill="#555">W9   Transformation   T = B·S / C_tput</text>
  <text x="360" y="196" font-size="7.5" fill="#555">W10  Locality            BW_eff / oversub.</text>

  <!-- Domain 3: Algorithm (3 walls) -->
  <rect x="350" y="210" width="298" height="56" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="360" y="225" font-size="9" font-weight="700" fill="#333">Domain 3 — Algorithm</text>
  <text x="648" y="225" text-anchor="end" font-size="7" fill="#c87b2a" font-style="italic">scaling and compression</text>
  <text x="360" y="240" font-size="7.5" fill="#555">W11  Complexity   C = 6PD; P* = √(C/120)</text>
  <text x="360" y="252" font-size="7.5" fill="#555">W12  Reasoning    T = K × T_step</text>
  <text x="360" y="264" font-size="7.5" fill="#555">W13  Fidelity       r = 32/b (quantization)</text>

  <!-- Domain 4: Fleet (7 walls) -->
  <rect x="32" y="244" width="298" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="42" y="259" font-size="9" font-weight="700" fill="#333">Domain 4 — Fleet</text>
  <text x="330" y="259" text-anchor="end" font-size="7" fill="#c44" font-style="italic">multi-node operations</text>
  <text x="42" y="274" font-size="7.5" fill="#555">W14 Comm.           T = 2(N−1)/N · M/β</text>
  <text x="42" y="286" font-size="7.5" fill="#555">W15 Fragility        MTBF_cl = MTBF_n / N</text>
  <text x="42" y="298" font-size="7.5" fill="#555">W16 Multi-tenant  W17 Capital  W18 Sustain.</text>
  <text x="42" y="310" font-size="7.5" fill="#555">W19 Checkpoint   W20 Safety (DP-SGD)</text>

  <!-- Domain 5: Analysis (2 walls) — spans full width -->
  <rect x="32" y="334" width="616" height="36" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="42" y="349" font-size="9" font-weight="700" fill="#a31f34">Domain 5 — Analysis</text>
  <text x="240" y="349" font-size="7.5" fill="#555">W21 Sensitivity: ∂T/∂xᵢ → binding constraint</text>
  <text x="480" y="349" font-size="7.5" fill="#555">W22 Synthesis: BW_req = |W| / T_target</text>
  <text x="648" y="349" text-anchor="end" font-size="7" fill="#a31f34" font-style="italic">cross-cutting</text>
  <text x="42" y="363" font-size="7" fill="#999" font-style="italic">Dimensional enforcement: every quantity carries SI units at runtime — FLOP/s ⊕ GB/s → TypeError</text>

  <!-- ===== (c) Solver Composition ===== -->
  <text x="30" y="394" font-size="10" font-weight="700" fill="#333">(c) Stateless Solver Composition</text>
  <text x="295" y="394" font-size="8" fill="#999" font-style="italic">each solver: pure f(config) → metrics — full evaluation &lt;0.3s</text>

  <rect x="20" y="400" width="640" height="68" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Solver chain -->
  <rect x="34" y="412" width="72" height="28" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="70" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">SingleNode</text>

  <line x1="106" y1="426" x2="118" y2="426" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="121" y="412" width="58" height="28" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="150" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Data</text>

  <line x1="179" y1="426" x2="191" y2="426" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="194" y="412" width="62" height="28" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="225" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Scaling</text>

  <line x1="256" y1="426" x2="268" y2="426" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="271" y="412" width="72" height="28" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="307" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Distributed</text>

  <line x1="343" y1="426" x2="355" y2="426" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="358" y="412" width="72" height="28" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="394" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Economics</text>

  <line x1="430" y1="426" x2="442" y2="426" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="445" y="412" width="72" height="28" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="481" y="430" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Sustain.</text>

  <line x1="517" y1="426" x2="529" y2="426" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Binding wall output -->
  <rect x="532" y="408" width="118" height="36" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.8"/>
  <text x="591" y="424" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Binding Wall</text>
  <text x="591" y="436" text-anchor="middle" font-size="7" fill="#555">scorecard + synthesis</text>

  <!-- Three-level evaluation -->
  <text x="34" y="458" font-size="7.5" fill="#555">Three-level evaluation:</text>
  <rect x="145" y="448" width="62" height="16" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="176" y="459" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Feasibility</text>
  <text x="214" y="459" font-size="7" fill="#555">→</text>
  <rect x="222" y="448" width="50" height="16" rx="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="247" y="459" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Profile</text>
  <text x="279" y="459" font-size="7" fill="#555">→</text>
  <rect x="287" y="448" width="50" height="16" rx="8" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="312" y="459" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Fleet</text>

  <!-- ===== (d) Example Outputs ===== -->
  <text x="30" y="488" font-size="10" font-weight="700" fill="#333">(d) Example Outputs (LLaMA-3 70B on 1024× H100)</text>

  <rect x="20" y="494" width="200" height="56" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="120" y="510" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Binding Constraint</text>
  <text x="120" y="524" text-anchor="middle" font-size="7.5" fill="#555">Wall 2: Memory</text>
  <text x="120" y="536" text-anchor="middle" font-size="7.5" fill="#555">HBM BW = 3.35 TB/s ceiling</text>

  <rect x="240" y="494" width="200" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="510" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sensitivity</text>
  <text x="340" y="524" text-anchor="middle" font-size="7.5" fill="#555">∂T/∂BW = −0.42 (steepest)</text>
  <text x="340" y="536" text-anchor="middle" font-size="7.5" fill="#555">∂T/∂FLOPS = −0.11</text>

  <rect x="460" y="494" width="200" height="56" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="510" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Hardware Synthesis</text>
  <text x="560" y="524" text-anchor="middle" font-size="7.5" fill="#555">SLA: 50ms TTFT →</text>
  <text x="560" y="536" text-anchor="middle" font-size="7.5" fill="#555">≥4.8 TB/s BW, ≥800 TFLOPS</text>

  <!-- ===== Sustainability + Cost row ===== -->
  <rect x="20" y="558" width="310" height="36" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="175" y="574" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sustainability</text>
  <text x="175" y="587" text-anchor="middle" font-size="7.5" fill="#555">128 tCO₂ · 2.1M L water · $4.2M TCO (3y)</text>

  <rect x="350" y="558" width="310" height="36" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <text x="505" y="574" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Reliability</text>
  <text x="505" y="587" text-anchor="middle" font-size="7.5" fill="#555">MTBF = 1.7h @ 1024 nodes · optimal ckpt interval = 12 min</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="612" text-anchor="middle" font-size="8.5" font-style="italic" fill="#999">All outputs produced in &lt;0.3s on a laptop — no GPU required.</text>
</svg>
