<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="480" fill="#fff" rx="4"/>

  <!-- ===== Domain Boxes (2×3 grid) ===== -->
  <!-- Row 1 -->
  <!-- Node Domain -->
  <rect x="20" y="44" width="208" height="185" rx="6" fill="#f0f4fa" stroke="#6b7b95" stroke-width="1.5"/>
  <text x="124" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Node</text>
  <text x="124" y="77" text-anchor="middle" font-size="9" fill="#555">Single-Accelerator Resources</text>
  <line x1="30" y1="86" x2="218" y2="86" stroke="#6b7b95" stroke-width="0.5" opacity="0.4"/>
  <text x="30" y="103" font-size="9.5" fill="#333"><tspan font-weight="700">1</tspan>  Compute — Peak FLOP/s ceiling</text>
  <text x="30" y="116" font-size="9.5" fill="#333"><tspan font-weight="700">2</tspan>  Memory — HBM BW + capacity</text>
  <text x="30" y="132" font-size="9.5" fill="#333"><tspan font-weight="700">3</tspan>  Software — Achieved MFU</text>
  <text x="30" y="148" font-size="9.5" fill="#333"><tspan font-weight="700">4</tspan>  Serving — Prefill vs. decode</text>
  <text x="30" y="164" font-size="9.5" fill="#333"><tspan font-weight="700">5</tspan>  Batching — KV-cache frag.</text>
  <text x="30" y="180" font-size="9.5" fill="#333"><tspan font-weight="700">6</tspan>  Streaming — Injection BW</text>
  <text x="30" y="196" font-size="9.5" fill="#333"><tspan font-weight="700">7</tspan>  Tail Latency — P99 queueing</text>
  <rect x="168" y="210" width="54" height="17" rx="8" fill="#6b7b95"/>
  <text x="195" y="222" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">7 models</text>

  <!-- Data Domain -->
  <rect x="236" y="44" width="208" height="185" rx="6" fill="#e8edf4" stroke="#5a7394" stroke-width="1.5"/>
  <text x="340" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Data</text>
  <text x="340" y="77" text-anchor="middle" font-size="9" fill="#555">Movement &amp; Pipelines</text>
  <line x1="246" y1="86" x2="434" y2="86" stroke="#5a7394" stroke-width="0.5" opacity="0.4"/>
  <text x="246" y="103" font-size="9.5" fill="#333"><tspan font-weight="700">8</tspan>  Ingestion — Storage I/O</text>
  <text x="246" y="116" font-size="9.5" fill="#333"><tspan font-weight="700">9</tspan>  Transformation — CPU preproc.</text>
  <text x="246" y="132" font-size="9.5" fill="#333"><tspan font-weight="700">10</tspan>  Locality — Network bisection BW</text>
  <rect x="384" y="210" width="54" height="17" rx="8" fill="#5a7394"/>
  <text x="411" y="222" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">3 models</text>

  <!-- Algorithm Domain -->
  <rect x="452" y="44" width="208" height="185" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.5"/>
  <text x="556" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Algorithm</text>
  <text x="556" y="77" text-anchor="middle" font-size="9" fill="#555">Scaling &amp; Compression</text>
  <line x1="462" y1="86" x2="650" y2="86" stroke="#999" stroke-width="0.5" opacity="0.4"/>
  <text x="462" y="103" font-size="9.5" fill="#333"><tspan font-weight="700">11</tspan>  Complexity — Scaling laws</text>
  <text x="462" y="116" font-size="9.5" fill="#333"><tspan font-weight="700">12</tspan>  Reasoning — Inference compute</text>
  <text x="462" y="132" font-size="9.5" fill="#333"><tspan font-weight="700">13</tspan>  Fidelity — Accuracy–efficiency</text>
  <rect x="600" y="210" width="54" height="17" rx="8" fill="#888"/>
  <text x="627" y="222" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">3 models</text>

  <!-- Row 2 -->
  <!-- Fleet Domain -->
  <rect x="20" y="244" width="208" height="185" rx="6" fill="#f2f2f2" stroke="#888" stroke-width="1.5"/>
  <text x="124" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Fleet</text>
  <text x="124" y="277" text-anchor="middle" font-size="9" fill="#555">Multi-Node Coordination</text>
  <line x1="30" y1="286" x2="218" y2="286" stroke="#888" stroke-width="0.5" opacity="0.4"/>
  <text x="30" y="303" font-size="9.5" fill="#333"><tspan font-weight="700">14</tspan>  Communication — AllReduce</text>
  <text x="30" y="316" font-size="9.5" fill="#333"><tspan font-weight="700">15</tspan>  Fragility — Cluster MTBF</text>
  <text x="30" y="332" font-size="9.5" fill="#333"><tspan font-weight="700">16</tspan>  Multi-tenant — Queue wait</text>
  <rect x="168" y="410" width="54" height="17" rx="8" fill="#888"/>
  <text x="195" y="422" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">3 models</text>

  <!-- Operations Domain -->
  <rect x="236" y="244" width="208" height="185" rx="6" fill="#f2f2f2" stroke="#888" stroke-width="1.5"/>
  <text x="340" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Operations</text>
  <text x="340" y="277" text-anchor="middle" font-size="9" fill="#555">Economics, Sustainability &amp; Safety</text>
  <line x1="246" y1="286" x2="434" y2="286" stroke="#888" stroke-width="0.5" opacity="0.4"/>
  <text x="246" y="303" font-size="9.5" fill="#333"><tspan font-weight="700">17</tspan>  Capital — TCO</text>
  <text x="246" y="316" font-size="9.5" fill="#333"><tspan font-weight="700">18</tspan>  Sustainability — Carbon + water</text>
  <text x="246" y="332" font-size="9.5" fill="#333"><tspan font-weight="700">19</tspan>  Checkpoint — I/O burst penalty</text>
  <text x="246" y="348" font-size="9.5" fill="#333"><tspan font-weight="700">20</tspan>  Safety — DP-SGD overhead</text>
  <rect x="384" y="410" width="54" height="17" rx="8" fill="#888"/>
  <text x="411" y="422" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">4 models</text>

  <!-- Analysis Domain -->
  <rect x="452" y="244" width="208" height="185" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="556" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Analysis</text>
  <text x="556" y="277" text-anchor="middle" font-size="9" fill="#555">Cross-Cutting Diagnostics</text>
  <line x1="462" y1="286" x2="650" y2="286" stroke="#bbb" stroke-width="0.5" opacity="0.4"/>
  <text x="462" y="303" font-size="9.5" fill="#333"><tspan font-weight="700">21</tspan>  Sensitivity — Binding constraint</text>
  <text x="462" y="316" font-size="9.5" fill="#333"><tspan font-weight="700">22</tspan>  Synthesis — Inverse spec</text>
  <!-- Dashed arrows from Analysis to other domains -->
  <line x1="462" y1="340" x2="228" y2="380" stroke="#999" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="462" y1="340" x2="340" y2="380" stroke="#999" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="500" y="358" font-size="8.5" font-style="italic" fill="#999">spans all domains</text>
  <rect x="600" y="410" width="54" height="17" rx="8" fill="#888"/>
  <text x="627" y="422" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">2 solvers</text>

  <!-- ===== Summary line ===== -->
  <rect x="195" y="442" width="290" height="26" rx="13" fill="#a31f34"/>
  <text x="340" y="460" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">6 Domains · 22 Walls · 22 Resolvers</text>

  <!-- Footnote -->
  <text x="340" y="477" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Walls 1–2 share the SingleNodeModel, yielding 22 distinct resolvers across 22 walls.</text>
</svg>
