<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="960" height="340" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- ===== Column Labels ===== -->
  <text x="110" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#999" letter-spacing="1.5">INPUTS</text>
  <text x="350" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#999" letter-spacing="1.5">IR</text>
  <text x="590" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#999" letter-spacing="1.5">LAYER E: 22 RESOLVERS</text>
  <text x="840" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#999" letter-spacing="1.5">OUTPUT</text>

  <!-- Dashed vertical separators -->
  <line x1="235" y1="10" x2="235" y2="310" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="460" y1="10" x2="460" y2="310" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="720" y1="10" x2="720" y2="310" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Layer A: Workload (Demand) ===== -->
  <rect x="15" y="38" width="195" height="62" rx="5" fill="#f0f4fa" stroke="#6b7b95" stroke-width="1.5"/>
  <text x="112" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer A: Workload</text>
  <text x="112" y="70" text-anchor="middle" font-size="8" fill="#555">Transformer 70B · FP16</text>
  <text x="112" y="83" text-anchor="middle" font-size="8" fill="#555">14 T FLOPs · 140 GB params</text>
  <!-- Demand badge -->
  <rect x="20" y="42" width="46" height="12" rx="2" fill="#6b7b95" opacity="0.15"/>
  <text x="43" y="51" text-anchor="middle" font-size="6.5" font-weight="700" fill="#6b7b95">DEMAND</text>

  <!-- ===== Layer B: Hardware (Supply) ===== -->
  <rect x="15" y="115" width="195" height="62" rx="5" fill="#e8edf4" stroke="#5a7394" stroke-width="1.5"/>
  <text x="112" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer B: Hardware</text>
  <text x="112" y="147" text-anchor="middle" font-size="8" fill="#555">H100 · 990 TFLOP/s (FP16)</text>
  <text x="112" y="160" text-anchor="middle" font-size="8" fill="#555">3.35 TB/s HBM · 80 GB</text>
  <!-- Supply badge -->
  <rect x="20" y="119" width="42" height="12" rx="2" fill="#5a7394" opacity="0.15"/>
  <text x="41" y="128" text-anchor="middle" font-size="6.5" font-weight="700" fill="#5a7394">SUPPLY</text>

  <!-- ===== Layer C: Infrastructure (Context) ===== -->
  <rect x="15" y="192" width="195" height="48" rx="5" fill="#f2f2f2" stroke="#999" stroke-width="1.5"/>
  <text x="112" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer C: Infrastructure</text>
  <text x="112" y="228" text-anchor="middle" font-size="8" fill="#555">Iowa · 680 g/kWh · PUE 1.1</text>
  <!-- Context badge -->
  <rect x="20" y="196" width="50" height="12" rx="2" fill="#999" opacity="0.15"/>
  <text x="45" y="205" text-anchor="middle" font-size="6.5" font-weight="700" fill="#888">CONTEXT</text>

  <!-- ===== Layer D: Topology (Context) ===== -->
  <rect x="15" y="255" width="195" height="48" rx="5" fill="#f2f2f2" stroke="#999" stroke-width="1.5"/>
  <text x="112" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer D: Topology</text>
  <text x="112" y="291" text-anchor="middle" font-size="8" fill="#555">128 nodes · fat-tree · NVLink</text>
  <!-- Context badge -->
  <rect x="20" y="259" width="50" height="12" rx="2" fill="#999" opacity="0.15"/>
  <text x="45" y="268" text-anchor="middle" font-size="6.5" font-weight="700" fill="#888">CONTEXT</text>

  <!-- ===== Computation Graph (IR) ===== -->
  <rect x="280" y="45" width="140" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="350" y="63" text-anchor="middle" font-size="9" font-weight="700" fill="#333">ComputationGraph</text>
  <text x="350" y="77" text-anchor="middle" font-size="7.5" fill="#555">flop, byte, intensity</text>
  <text x="350" y="89" text-anchor="middle" font-size="7.5" fill="#555">(hardware-agnostic IR)</text>

  <!-- lower() label on arrow A → IR -->
  <line x1="210" y1="68" x2="278" y2="68" stroke="#6b7b95" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="244" y="62" text-anchor="middle" font-size="7.5" font-weight="700" fill="#6b7b95">lower()</text>

  <!-- ===== Solver boxes ===== -->
  <!-- Solver 1: SingleNodeModel -->
  <rect x="480" y="38" width="220" height="45" rx="4" fill="#fff" stroke="#5a7394" stroke-width="1.5"/>
  <rect x="485" y="42" width="32" height="13" rx="2" fill="#a31f34"/>
  <text x="501" y="51.5" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">W 1-2</text>
  <text x="600" y="55" text-anchor="middle" font-size="9" font-weight="700" fill="#333">SingleNodeModel</text>
  <text x="590" y="73" text-anchor="middle" font-size="7.5" fill="#555">Compute Wall · Memory Wall</text>

  <!-- Solver 2: DistributedModel -->
  <rect x="480" y="98" width="220" height="45" rx="4" fill="#fff" stroke="#5a7394" stroke-width="1.5"/>
  <rect x="485" y="102" width="42" height="13" rx="2" fill="#a31f34"/>
  <text x="506" y="111.5" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">W 10-14</text>
  <text x="605" y="115" text-anchor="middle" font-size="9" font-weight="700" fill="#333">DistributedModel</text>
  <text x="590" y="133" text-anchor="middle" font-size="7.5" fill="#555">Comm · Parallelism · Scheduling</text>

  <!-- Solver 3: EconomicsModel -->
  <rect x="480" y="158" width="220" height="45" rx="4" fill="#fff" stroke="#b5736e" stroke-width="1.5"/>
  <rect x="485" y="162" width="32" height="13" rx="2" fill="#a31f34"/>
  <text x="501" y="171.5" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">W 17</text>
  <text x="600" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#333">EconomicsModel</text>
  <text x="590" y="193" text-anchor="middle" font-size="7.5" fill="#555">TCO · $/query · Amortization</text>

  <!-- Solver 4: SustainabilityModel -->
  <rect x="480" y="218" width="220" height="45" rx="4" fill="#fff" stroke="#b5736e" stroke-width="1.5"/>
  <rect x="485" y="222" width="32" height="13" rx="2" fill="#a31f34"/>
  <text x="501" y="231.5" text-anchor="middle" font-size="6.5" font-weight="700" fill="#fff">W 18</text>
  <text x="600" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#333">SustainabilityModel</text>
  <text x="590" y="253" text-anchor="middle" font-size="7.5" fill="#555">CO₂ · H₂O · PUE/WUE</text>

  <!-- Solver 5: +(N more) indicator -->
  <rect x="510" y="275" width="160" height="24" rx="12" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="590" y="291" text-anchor="middle" font-size="8" fill="#999">+ 17 more solvers…</text>

  <!-- ===== Arrows: IR → Solvers ===== -->
  <line x1="420" y1="68" x2="478" y2="60" stroke="#888" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="420" y1="72" x2="478" y2="120" stroke="#888" stroke-width="1.1" marker-end="url(#arrow)"/>

  <!-- Arrows: Hardware → Solvers -->
  <line x1="210" y1="140" x2="478" y2="65" stroke="#5a7394" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="210" y1="150" x2="478" y2="125" stroke="#5a7394" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Arrows: Context → Solvers -->
  <line x1="210" y1="216" x2="478" y2="240" stroke="#999" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="210" y1="280" x2="478" y2="125" stroke="#999" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="210" y1="285" x2="478" y2="180" stroke="#999" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ===== Output Scorecard ===== -->
  <rect x="740" y="38" width="200" height="264" rx="6" fill="#f0f4f0" stroke="#7a9e7a" stroke-width="1.5"/>
  <text x="840" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#333">SystemEvaluation</text>
  <line x1="750" y1="65" x2="930" y2="65" stroke="#7a9e7a" stroke-width="0.5" opacity="0.4"/>

  <!-- Scorecard content -->
  <text x="755" y="82" font-size="8.5" font-weight="700" fill="#333">Feasibility</text>
  <text x="755" y="95" font-size="8" fill="#555">✓ Model fits 2× H100 (160 GB)</text>

  <text x="755" y="115" font-size="8.5" font-weight="700" fill="#333">Performance</text>
  <text x="755" y="128" font-size="8" fill="#a31f34">Binding: memory-bandwidth (Wall 2)</text>
  <text x="755" y="141" font-size="8" fill="#555">MFU: 0.61</text>

  <text x="755" y="161" font-size="8.5" font-weight="700" fill="#333">Latency</text>
  <text x="755" y="174" font-size="8" fill="#555">TTFT: 12 ms · ITL: 22 ms/tok</text>

  <text x="755" y="194" font-size="8.5" font-weight="700" fill="#333">Economics</text>
  <text x="755" y="207" font-size="8" fill="#555">TCO: $1.2M/yr · $0.003/query</text>

  <text x="755" y="227" font-size="8.5" font-weight="700" fill="#333">Sustainability</text>
  <text x="755" y="240" font-size="8" fill="#555">CO₂: 412 t/yr</text>
  <text x="755" y="253" font-size="8" fill="#555">H₂O: 231 kL/yr</text>

  <text x="755" y="280" font-size="8.5" font-weight="700" fill="#333">Binding Wall</text>
  <rect x="755" y="285" width="78" height="12" rx="6" fill="#a31f34"/>
  <text x="794" y="294" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">MEMORY BW</text>

  <!-- ===== Arrows: Solvers → Scorecard ===== -->
  <line x1="700" y1="60" x2="738" y2="60" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="700" y1="120" x2="738" y2="120" stroke="#888" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="700" y1="180" x2="738" y2="180" stroke="#888" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="700" y1="240" x2="738" y2="240" stroke="#888" stroke-width="1.1" marker-end="url(#arrow)"/>

  <!-- ===== Bottom footnote ===== -->
  <text x="480" y="328" text-anchor="middle" font-size="8.5" font-style="italic" fill="#999">Each resolver is a pure function f(config) → metrics. Red arrow marks the binding constraint. Full analysis completes in &lt;0.3 s on a laptop.</text>
</svg>
