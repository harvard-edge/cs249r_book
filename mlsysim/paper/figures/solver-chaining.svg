<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7a9e7a"/>
    </marker>
  </defs>

  <!-- ===== Layer A: Workload (Demand) ===== -->
  <rect x="30" y="50" width="180" height="70" rx="5" fill="#f0f4fa" stroke="#6b7b95" stroke-width="1.5"/>
  <text x="120" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer A: Workload</text>
  <text x="120" y="84" text-anchor="middle" font-size="8" fill="#555">ModelSpec</text>
  <text x="120" y="96" text-anchor="middle" font-size="7.5" fill="#555">Transformer 7B · FP16</text>
  <text x="120" y="108" text-anchor="middle" font-size="7.5" fill="#555">14.0T FLOPs/step · 14 GB</text>

  <!-- ===== Layer B: Hardware (Supply) ===== -->
  <rect x="30" y="140" width="180" height="70" rx="5" fill="#e8edf4" stroke="#5a7394" stroke-width="1.5"/>
  <text x="120" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer B: Hardware</text>
  <text x="120" y="174" text-anchor="middle" font-size="8" fill="#555">AcceleratorSpec</text>
  <text x="120" y="186" text-anchor="middle" font-size="7.5" fill="#555">H100 · 990 TFLOP/s</text>
  <text x="120" y="198" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s HBM · 80 GB</text>

  <!-- ===== Layer C: Infrastructure ===== -->
  <rect x="30" y="230" width="180" height="60" rx="5" fill="#f2f2f2" stroke="#999" stroke-width="1.5"/>
  <text x="120" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Layer C: Infrastructure</text>
  <text x="120" y="264" text-anchor="middle" font-size="8" fill="#555">InfraSpec</text>
  <text x="120" y="278" text-anchor="middle" font-size="7.5" fill="#555">Iowa · CI=680 g/kWh · PUE=1.1</text>

  <!-- ===== Arrow from inputs to solver chain ===== -->
  <line x1="210" y1="85" x2="270" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="210" y1="175" x2="270" y2="175" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="210" y1="260" x2="270" y2="260" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Solver Chain (vertical pipeline) ===== -->
  <!-- Solver 1: SingleNodeModel -->
  <rect x="270" y="52" width="180" height="48" rx="4" fill="#f0f4fa" stroke="#5a7394" stroke-width="1.5"/>
  <rect x="275" y="55" width="40" height="14" rx="2" fill="#a31f34"/>
  <text x="295" y="65" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">W 1-2</text>
  <text x="370" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#333">SingleNodeModel</text>
  <text x="360" y="90" text-anchor="middle" font-size="7.5" fill="#555">→ Bottleneck: memory · MFU: 0.61</text>

  <!-- Arrow down -->
  <line x1="360" y1="100" x2="360" y2="118" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Solver 2: ServingModel -->
  <rect x="270" y="118" width="180" height="48" rx="4" fill="#f0f4fa" stroke="#5a7394" stroke-width="1.5"/>
  <rect x="275" y="121" width="28" height="14" rx="2" fill="#a31f34"/>
  <text x="289" y="131" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">W 4</text>
  <text x="370" y="136" text-anchor="middle" font-size="9" font-weight="700" fill="#333">ServingModel</text>
  <text x="360" y="156" text-anchor="middle" font-size="7.5" fill="#555">→ TTFT: 12ms · ITL: 22ms</text>

  <!-- Arrow down -->
  <line x1="360" y1="166" x2="360" y2="184" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Solver 3: EconomicsModel -->
  <rect x="270" y="184" width="180" height="48" rx="4" fill="#f5e6e4" stroke="#b5736e" stroke-width="1.5"/>
  <rect x="275" y="187" width="32" height="14" rx="2" fill="#a31f34"/>
  <text x="291" y="197" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">W 17</text>
  <text x="370" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#333">EconomicsModel</text>
  <text x="360" y="222" text-anchor="middle" font-size="7.5" fill="#555">→ TCO: $1.2M/yr · $0.003/query</text>

  <!-- Arrow down -->
  <line x1="360" y1="232" x2="360" y2="250" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Solver 4: SustainabilityModel -->
  <rect x="270" y="250" width="180" height="48" rx="4" fill="#f5e6e4" stroke="#b5736e" stroke-width="1.5"/>
  <rect x="275" y="253" width="32" height="14" rx="2" fill="#a31f34"/>
  <text x="291" y="263" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">W 18</text>
  <text x="370" y="268" text-anchor="middle" font-size="9" font-weight="700" fill="#333">SustainabilityModel</text>
  <text x="360" y="288" text-anchor="middle" font-size="7.5" fill="#555">→ CO₂: 412t · H₂O: 231 kL</text>

  <!-- ===== Arrow to scorecard ===== -->
  <line x1="450" y1="170" x2="500" y2="170" stroke="#7a9e7a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== System Scorecard (output) ===== -->
  <rect x="500" y="52" width="160" height="260" rx="6" fill="#f0f4f0" stroke="#7a9e7a" stroke-width="1.5"/>
  <text x="580" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#333">SystemEvaluation</text>
  <text x="580" y="86" text-anchor="middle" font-size="8" fill="#555">Scorecard</text>
  <line x1="510" y1="92" x2="650" y2="92" stroke="#7a9e7a" stroke-width="0.5" opacity="0.4"/>

  <text x="515" y="110" font-size="8.5" font-weight="700" fill="#333">Feasibility</text>
  <text x="515" y="124" font-size="8" fill="#555">✓ Model fits in 80 GB HBM</text>

  <text x="515" y="144" font-size="8.5" font-weight="700" fill="#333">Performance</text>
  <text x="515" y="158" font-size="8" fill="#555">Bottleneck: memory</text>
  <text x="515" y="170" font-size="8" fill="#555">MFU: 0.61</text>

  <text x="515" y="190" font-size="8.5" font-weight="700" fill="#333">Latency</text>
  <text x="515" y="204" font-size="8" fill="#555">TTFT: 12 ms</text>
  <text x="515" y="216" font-size="8" fill="#555">ITL: 22 ms/token</text>

  <text x="515" y="236" font-size="8.5" font-weight="700" fill="#333">Economics</text>
  <text x="515" y="250" font-size="8" fill="#555">TCO: $1.2M/yr</text>

  <text x="515" y="270" font-size="8.5" font-weight="700" fill="#333">Sustainability</text>
  <text x="515" y="284" font-size="8" fill="#555">CO₂: 412 tonnes/yr</text>
  <text x="515" y="296" font-size="8" fill="#555">H₂O: 231 kL/yr</text>

  <!-- ===== Key insight box ===== -->
  <rect x="30" y="330" width="630" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="345" y="350" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Key: Each resolver is a pure function — typed inputs in, dimensionally correct outputs out.</text>
  <text x="345" y="365" text-anchor="middle" font-size="9" fill="#555">Resolvers compose by chaining outputs → inputs. The type system enforces consistency at every boundary.</text>

  <!-- ===== Demand/Supply labels ===== -->
  <rect x="55" y="310" width="60" height="14" rx="3" fill="#f0f4fa" stroke="#6b7b95" stroke-width="1"/>
  <text x="85" y="320" text-anchor="middle" font-size="7.5" font-weight="700" fill="#6b7b95">Demand</text>
  <rect x="55" y="325" width="60" height="14" rx="3" fill="#e8edf4" stroke="#5a7394" stroke-width="1"/>
  <text x="85" y="335" text-anchor="middle" font-size="7.5" font-weight="700" fill="#5a7394">Supply</text>

  <!-- Footnote -->
  <text x="340" y="400" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Resolver chaining enables full-stack analysis: from silicon constraints through economics to environmental impact.</text>
</svg>
