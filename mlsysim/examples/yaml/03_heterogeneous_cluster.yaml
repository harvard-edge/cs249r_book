version: "1.0"
name: "Heterogeneous Lab Cluster"

workload:
  name: "Llama3_8B"
  batch_size: 1024
  seq_len: 4096

hardware:
  name: "H100"
  nodes: 16
  precision: "fp16"
  efficiency: 0.45

fleet:
  name: "Mixed Compute and Storage Fleet"
  fabric_bw_gbps: 400.0
  node_groups:
    - name: "Compute Tier"
      hardware_name: "H100"
      count: 16
      role: "compute"
      accelerators_per_node: 8
      intra_node_bw_gbps: 900.0
    - name: "Data Loading Tier"
      hardware_name: "GenericServer"
      count: 4
      role: "data_loading"
      accelerators_per_node: 0
      intra_node_bw_gbps: 100.0
    - name: "Storage Tier"
      hardware_name: "StorageServer"
      count: 2
      role: "storage"
      accelerators_per_node: 0
      intra_node_bw_gbps: 50.0

ops:
  region: "US_Avg"
  duration_days: 14.0
