<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Multi-Vendor Roofline: Not All Accelerators Are Equal</text>

  <!-- ===== Axes ===== -->
  <!-- Plot area: x=120..820, y=55..420 -->
  <!-- Y-axis -->
  <line x1="120" y1="55" x2="120" y2="420" stroke="#333" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="120" y1="420" x2="820" y2="420" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="28" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,28,240)">Attainable Performance (TFLOP/s)</text>

  <!-- X-axis label -->
  <text x="470" y="460" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Arithmetic Intensity (FLOP/byte)</text>

  <!-- ===== Y-axis ticks (log scale: 1, 10, 100, 1000, 2000) ===== -->
  <!-- y = 420 - (log10(val)/3.3)*365  (3.3 decades: 1 to 2000) -->
  <!-- 1 -> y=420 -->
  <line x1="115" y1="420" x2="120" y2="420" stroke="#333" stroke-width="1"/>
  <text x="110" y="424" font-size="10.5" fill="#555" text-anchor="end">1</text>
  <!-- 10 -> y=420-(1/3.3)*365 = 420-110.6 = 309 -->
  <line x1="115" y1="309" x2="120" y2="309" stroke="#333" stroke-width="1"/>
  <text x="110" y="313" font-size="10.5" fill="#555" text-anchor="end">10</text>
  <line x1="120" y1="309" x2="820" y2="309" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 100 -> y=420-(2/3.3)*365 = 420-221.2 = 199 -->
  <line x1="115" y1="199" x2="120" y2="199" stroke="#333" stroke-width="1"/>
  <text x="110" y="203" font-size="10.5" fill="#555" text-anchor="end">100</text>
  <line x1="120" y1="199" x2="820" y2="199" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 1000 -> y=420-(3/3.3)*365 = 420-331.8 = 88 -->
  <line x1="115" y1="88" x2="120" y2="88" stroke="#333" stroke-width="1"/>
  <text x="110" y="92" font-size="10.5" fill="#555" text-anchor="end">1000</text>
  <line x1="120" y1="88" x2="820" y2="88" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- ===== X-axis ticks (log scale: 0.1, 1, 10, 100, 1000) ===== -->
  <!-- x = 120 + ((log10(val)+1)/4)*700 -->
  <!-- 0.1 -> x=120 -->
  <line x1="120" y1="420" x2="120" y2="425" stroke="#333" stroke-width="1"/>
  <text x="120" y="438" font-size="10.5" fill="#555" text-anchor="middle">0.1</text>
  <!-- 1 -> x=295 -->
  <line x1="295" y1="420" x2="295" y2="425" stroke="#333" stroke-width="1"/>
  <text x="295" y="438" font-size="10.5" fill="#555" text-anchor="middle">1</text>
  <line x1="295" y1="55" x2="295" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 10 -> x=470 -->
  <line x1="470" y1="420" x2="470" y2="425" stroke="#333" stroke-width="1"/>
  <text x="470" y="438" font-size="10.5" fill="#555" text-anchor="middle">10</text>
  <line x1="470" y1="55" x2="470" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 100 -> x=645 -->
  <line x1="645" y1="420" x2="645" y2="425" stroke="#333" stroke-width="1"/>
  <text x="645" y="438" font-size="10.5" fill="#555" text-anchor="middle">100</text>
  <line x1="645" y1="55" x2="645" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 1000 -> x=820 -->
  <line x1="820" y1="420" x2="820" y2="425" stroke="#333" stroke-width="1"/>
  <text x="820" y="438" font-size="10.5" fill="#555" text-anchor="middle">1000</text>

  <!-- ===== Accelerator Rooflines ===== -->
  <!-- Each accelerator: BW slope from (120, y_at_0.1) to ridge point, then horizontal ceiling to x=820 -->
  <!-- Using: y = 420 - (log10(val)/3.3)*365 -->
  <!-- x = 120 + ((log10(val)+1)/4)*700 -->

  <!-- ── A100 (gray): 312 TFLOP/s, 2.04 TB/s, ridge AI=152.9 ── -->
  <!-- Peak 312: y = 420-(log10(312)/3.3)*365 = 420-(2.494/3.3)*365 = 420-276 = 144 -->
  <!-- Ridge AI=152.9: x = 120+((2.184+1)/4)*700 = 120+(3.184/4)*700 = 120+557 = 677 -->
  <!-- At AI=0.1: perf=0.204 TFLOP/s, y=420-(-0.690/3.3)*365=420+76=496 -> clamp to 420 -->
  <!-- At AI=1: perf=2.04, y=420-(0.310/3.3)*365=420-34=386 -->
  <!-- Slope from (120, 420) to (677, 144) -->
  <line x1="120" y1="420" x2="677" y2="144" stroke="#999" stroke-width="1.8" opacity="0.7"/>
  <line x1="677" y1="144" x2="820" y2="144" stroke="#999" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.7"/>
  <circle cx="677" cy="144" r="6" fill="#999" stroke="#fff" stroke-width="1.5"/>
  <text x="825" y="140" font-size="10" font-weight="700" fill="#999" text-anchor="start">A100</text>
  <text x="825" y="152" font-size="10" fill="#999" text-anchor="start">312 TFLOP/s</text>

  <!-- ── TPU v5p (orange): 459 TFLOP/s, 2.76 TB/s, ridge AI=166.3 ── -->
  <!-- Peak 459: y = 420-(log10(459)/3.3)*365 = 420-(2.662/3.3)*365 = 420-294 = 126 -->
  <!-- Ridge AI=166.3: x = 120+((2.221+1)/4)*700 = 120+(3.221/4)*700 = 120+564 = 684 -->
  <line x1="120" y1="420" x2="684" y2="126" stroke="#c87b2a" stroke-width="1.8" opacity="0.7"/>
  <line x1="684" y1="126" x2="820" y2="126" stroke="#c87b2a" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.7"/>
  <circle cx="684" cy="126" r="6" fill="#c87b2a" stroke="#fff" stroke-width="1.5"/>
  <text x="690" y="118" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="start">TPU v5p</text>

  <!-- ── H100 (blue): 989 TFLOP/s, 3.35 TB/s, ridge AI=295.2 ── -->
  <!-- Peak 989: y = 420-(log10(989)/3.3)*365 = 420-(2.995/3.3)*365 = 420-331 = 89 -->
  <!-- Ridge AI=295.2: x = 120+((2.470+1)/4)*700 = 120+(3.470/4)*700 = 120+607 = 727 -->
  <line x1="120" y1="420" x2="727" y2="89" stroke="#4a90c4" stroke-width="2.2" opacity="0.8"/>
  <line x1="727" y1="89" x2="820" y2="89" stroke="#4a90c4" stroke-width="2.2" stroke-dasharray="8,4" opacity="0.8"/>
  <circle cx="727" cy="89" r="6" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <text x="733" y="82" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="start">H100</text>

  <!-- ── MI300X (red): 1307 TFLOP/s, 5.3 TB/s, ridge AI=246.6 ── -->
  <!-- Peak 1307: y = 420-(log10(1307)/3.3)*365 = 420-(3.116/3.3)*365 = 420-345 = 75 -->
  <!-- Ridge AI=246.6: x = 120+((2.392+1)/4)*700 = 120+(3.392/4)*700 = 120+593 = 713 -->
  <line x1="120" y1="420" x2="713" y2="75" stroke="#c44" stroke-width="2.0" opacity="0.8"/>
  <line x1="713" y1="75" x2="820" y2="75" stroke="#c44" stroke-width="2.0" stroke-dasharray="8,4" opacity="0.8"/>
  <circle cx="713" cy="75" r="6" fill="#c44" stroke="#fff" stroke-width="1.5"/>
  <text x="719" y="68" font-size="10" font-weight="700" fill="#c44" text-anchor="start">MI300X</text>

  <!-- ── Gaudi 3 (green): 1835 TFLOP/s, 3.7 TB/s, ridge AI=496 ── -->
  <!-- Peak 1835: y = 420-(log10(1835)/3.3)*365 = 420-(3.264/3.3)*365 = 420-361 = 59 -->
  <!-- Ridge AI=496: x = 120+((2.696+1)/4)*700 = 120+(3.696/4)*700 = 120+647 = 767 -->
  <line x1="120" y1="420" x2="767" y2="59" stroke="#3d9e5a" stroke-width="2.0" opacity="0.8"/>
  <line x1="767" y1="59" x2="820" y2="59" stroke="#3d9e5a" stroke-width="2.0" stroke-dasharray="8,4" opacity="0.8"/>
  <circle cx="767" cy="59" r="6" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <text x="773" y="55" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="start">Gaudi 3</text>

  <!-- ===== Legend Box ===== -->
  <rect x="135" y="65" width="215" height="130" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- H100 -->
  <line x1="145" y1="82" x2="165" y2="82" stroke="#4a90c4" stroke-width="2.2"/>
  <circle cx="155" cy="82" r="4" fill="#4a90c4"/>
  <text x="172" y="86" font-size="10" fill="#333">H100 — 989 TFLOP/s, 3.35 TB/s</text>
  <!-- MI300X -->
  <line x1="145" y1="102" x2="165" y2="102" stroke="#c44" stroke-width="2.0"/>
  <circle cx="155" cy="102" r="4" fill="#c44"/>
  <text x="172" y="106" font-size="10" fill="#333">MI300X — 1307 TFLOP/s, 5.3 TB/s</text>
  <!-- Gaudi 3 -->
  <line x1="145" y1="122" x2="165" y2="122" stroke="#3d9e5a" stroke-width="2.0"/>
  <circle cx="155" cy="122" r="4" fill="#3d9e5a"/>
  <text x="172" y="126" font-size="10" fill="#333">Gaudi 3 — 1835 TFLOP/s, 3.7 TB/s</text>
  <!-- TPU v5p -->
  <line x1="145" y1="142" x2="165" y2="142" stroke="#c87b2a" stroke-width="1.8"/>
  <circle cx="155" cy="142" r="4" fill="#c87b2a"/>
  <text x="172" y="146" font-size="10" fill="#333">TPU v5p — 459 TFLOP/s, 2.76 TB/s</text>
  <!-- A100 -->
  <line x1="145" y1="162" x2="165" y2="162" stroke="#999" stroke-width="1.8"/>
  <circle cx="155" cy="162" r="4" fill="#999"/>
  <text x="172" y="166" font-size="10" fill="#333">A100 — 312 TFLOP/s, 2.04 TB/s</text>
  <!-- Legend label -->
  <text x="145" y="186" font-size="10" font-weight="700" fill="#555">Ridge point = Peak FLOPS / BW</text>

  <!-- ===== Key Insight Label ===== -->
  <rect x="245" y="372" width="340" height="26" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="415" y="389" font-size="10.5" font-weight="700" fill="#a31f34" text-anchor="middle">MI300X has highest bandwidth; Gaudi 3 has highest FLOPS</text>

  <!-- ===== Region Labels ===== -->
  <text x="380" y="320" font-size="11" font-weight="700" fill="#c44" text-anchor="middle" transform="rotate(-40,380,320)">Memory-Bound</text>
  <text x="790" y="200" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle" transform="rotate(-90,790,200)">Compute-Bound</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">FP16 peak performance. BW slope determines memory-bound performance; horizontal ceiling determines compute-bound.</text>
</svg>
