<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">3D Parallelism: How 16 GPUs Divide the Work</text>

  <!-- ===== 3D Grid Layout ===== -->
  <!-- 4×2×2 grid: TP=4 across (horizontal), PP=2 deep (vertical offset), DP=2 replicas (left/right) -->
  <!-- Left replica (DP=0): x_start=60, Right replica (DP=1): x_start=480 -->
  <!-- Each GPU box: 80×40, spacing: 10px h, 15px v -->
  <!-- PP stage offset: 20px right, 30px down (isometric-ish) -->

  <!-- ── DP Replica 0 (Left) ── -->
  <rect x="45" y="48" width="395" height="230" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="242" y="67" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">DP Replica 0</text>

  <!-- PP Stage 0 (front) -->
  <rect x="60" y="78" width="370" height="70" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <text x="245" y="94" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">PP Stage 0 (Layers 1–N/2)</text>
  <!-- TP group: 4 GPUs in a row -->
  <rect x="72" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="111" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>
  <rect x="158" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="197" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>
  <rect x="244" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="283" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>
  <rect x="330" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="369" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <!-- PP Stage 1 (back) -->
  <rect x="60" y="158" width="370" height="70" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <text x="245" y="174" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">PP Stage 1 (Layers N/2+1–N)</text>
  <!-- TP group: 4 GPUs in a row -->
  <rect x="72" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="111" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 4</text>
  <rect x="158" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="197" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 5</text>
  <rect x="244" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="283" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 6</text>
  <rect x="330" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="369" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 7</text>

  <!-- ── DP Replica 1 (Right) ── -->
  <rect x="465" y="48" width="395" height="230" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="662" y="67" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">DP Replica 1</text>

  <!-- PP Stage 0 -->
  <rect x="480" y="78" width="370" height="70" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <text x="665" y="94" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">PP Stage 0 (Layers 1–N/2)</text>
  <rect x="492" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="531" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 8</text>
  <rect x="578" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="617" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 9</text>
  <rect x="664" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="703" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 10</text>
  <rect x="750" y="102" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="789" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 11</text>

  <!-- PP Stage 1 -->
  <rect x="480" y="158" width="370" height="70" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <text x="665" y="174" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">PP Stage 1 (Layers N/2+1–N)</text>
  <rect x="492" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="531" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 12</text>
  <rect x="578" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="617" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 13</text>
  <rect x="664" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="703" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 14</text>
  <rect x="750" y="182" width="78" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="789" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 15</text>

  <!-- ===== Communication Arrows ===== -->
  <!-- TP arrows: horizontal within each row (NVLink) -->
  <line x1="150" y1="120" x2="158" y2="120" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="236" y1="120" x2="244" y2="120" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="322" y1="120" x2="330" y2="120" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- PP arrows: vertical between stages -->
  <line x1="111" y1="138" x2="111" y2="182" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="531" y1="138" x2="531" y2="182" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- DP arrows: horizontal between replicas -->
  <line x1="440" y1="120" x2="492" y2="120" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="6,3"/>
  <line x1="440" y1="200" x2="492" y2="200" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="6,3"/>

  <!-- ===== Dimension Labels (Bottom Section) ===== -->
  <rect x="30" y="295" width="270" height="90" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="165" y="315" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Tensor Parallelism (TP = 4)</text>
  <text x="165" y="332" font-size="10" fill="#333" text-anchor="middle">Splits each layer across 4 GPUs</text>
  <text x="165" y="347" font-size="10" fill="#555" text-anchor="middle">Communicates: Activations (AllReduce)</text>
  <text x="165" y="362" font-size="10" fill="#555" text-anchor="middle">Interconnect: NVLink (within node)</text>
  <text x="165" y="377" font-size="10" fill="#555" text-anchor="middle">Bandwidth: 900 GB/s bidirectional</text>

  <rect x="315" y="295" width="270" height="90" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="315" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Pipeline Parallelism (PP = 2)</text>
  <text x="450" y="332" font-size="10" fill="#333" text-anchor="middle">Splits model layers into 2 stages</text>
  <text x="450" y="347" font-size="10" fill="#555" text-anchor="middle">Communicates: Micro-batch activations</text>
  <text x="450" y="362" font-size="10" fill="#555" text-anchor="middle">Interconnect: NVLink or NVSwitch</text>
  <text x="450" y="377" font-size="10" fill="#555" text-anchor="middle">Challenge: Pipeline bubbles</text>

  <rect x="600" y="295" width="270" height="90" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="735" y="315" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Data Parallelism (DP = 2)</text>
  <text x="735" y="332" font-size="10" fill="#333" text-anchor="middle">Replicates model across 2 groups</text>
  <text x="735" y="347" font-size="10" fill="#555" text-anchor="middle">Communicates: Gradients (AllReduce)</text>
  <text x="735" y="362" font-size="10" fill="#555" text-anchor="middle">Interconnect: InfiniBand (cross-node)</text>
  <text x="735" y="377" font-size="10" fill="#555" text-anchor="middle">Bandwidth: 400 Gb/s per link</text>

  <!-- ===== Equation ===== -->
  <text x="450" y="415" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Total GPUs = TP × PP × DP = 4 × 2 × 2 = 16</text>

  <!-- ===== Key Design Principle ===== -->
  <rect x="175" y="430" width="550" height="28" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="449" font-size="10.5" font-weight="700" fill="#a31f34" text-anchor="middle">Design rule: TP within a node (high BW), DP across nodes (tolerates lower BW)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Megatron-LM style 3D parallelism. Each dimension maps to a different communication pattern and interconnect tier.</text>
</svg>
