<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">GPU Memory Hierarchy: Why Bandwidth Depends on WHERE Data Lives</text>

  <!-- ===== Pyramid (centered, trapezoids stacking up) ===== -->
  <!-- Pyramid center: x=340, total height: y=70 to y=400 -->
  <!-- Each level is a trapezoid. Width narrows toward top. -->

  <!-- ── Level 0: HBM (bottom, widest) ── -->
  <polygon points="100,400 580,400 520,310 160,310" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="345" font-size="12" font-weight="700" fill="#333" text-anchor="middle">HBM3 (High Bandwidth Memory)</text>
  <text x="340" y="363" font-size="11" fill="#555" text-anchor="middle">80 GB capacity  |  3.35 TB/s bandwidth</text>
  <text x="340" y="381" font-size="10" fill="#555" text-anchor="middle">~100 ns access latency</text>

  <!-- ── Level 1: L2 Cache ── -->
  <polygon points="160,300 520,300 470,220 210,220" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="252" font-size="12" font-weight="700" fill="#333" text-anchor="middle">L2 Cache</text>
  <text x="340" y="270" font-size="11" fill="#555" text-anchor="middle">50 MB  |  ~12 TB/s bandwidth</text>
  <text x="340" y="288" font-size="10" fill="#555" text-anchor="middle">~30 ns access latency</text>

  <!-- ── Level 2: Shared Memory / L1 ── -->
  <polygon points="210,210 470,210 430,135 250,135" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="164" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Shared Memory / L1</text>
  <text x="340" y="182" font-size="11" fill="#555" text-anchor="middle">256 KB/SM  |  ~33 TB/s aggregate</text>
  <text x="340" y="198" font-size="10" fill="#555" text-anchor="middle">~5 ns access latency</text>

  <!-- ── Level 3: Registers (top, narrowest) ── -->
  <polygon points="250,125 430,125 400,70 280,70" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="340" y="94" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">Registers</text>
  <text x="340" y="112" font-size="11" fill="#555" text-anchor="middle">256 KB/SM  |  ~200 TB/s</text>

  <!-- ===== Bandwidth Arrow (right side) ===== -->
  <line x1="610" y1="380" x2="610" y2="80" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="620" y="220" font-size="11" font-weight="700" fill="#a31f34" transform="rotate(-90,620,220)">Increasing Bandwidth</text>

  <!-- ===== Capacity Arrow (left side) ===== -->
  <line x1="70" y1="80" x2="70" y2="380" stroke="#4a90c4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="58" y="220" font-size="11" font-weight="700" fill="#4a90c4" transform="rotate(-90,58,220)">Increasing Capacity</text>

  <!-- ===== Annotations (right side) ===== -->
  <!-- HBM annotation -->
  <line x1="580" y1="355" x2="640" y2="355" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="645" y="340" width="230" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="760" y="354" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weights live here</text>
  <text x="760" y="368" font-size="10" fill="#555" text-anchor="middle">KV cache for long sequences</text>

  <!-- L2 annotation -->
  <line x1="520" y1="260" x2="640" y2="260" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="645" y="247" width="230" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="760" y="265" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Intermediate activations cached here</text>

  <!-- SRAM annotation -->
  <line x1="470" y1="172" x2="640" y2="172" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="645" y="155" width="230" height="35" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="760" y="170" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FlashAttention tiles here</text>
  <text x="760" y="183" font-size="10" fill="#555" text-anchor="middle">Fused kernels operate in SRAM</text>

  <!-- Register annotation -->
  <line x1="430" y1="97" x2="640" y2="97" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="645" y="84" width="230" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="102" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Tensor Core operands (MMA inputs)</text>

  <!-- ===== Key Insight ===== -->
  <rect x="140" y="420" width="400" height="28" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="340" y="438" font-size="10.5" font-weight="700" fill="#a31f34" text-anchor="middle">60x bandwidth gap between HBM and registers</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">H100 SXM specifications. Aggregate bandwidth across all SMs.</text>
</svg>
