<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <!-- Gradient for spectrum bar -->
    <linearGradient id="spectrum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="25%" stop-color="#cfe2f3"/>
      <stop offset="50%" stop-color="#fdebd0"/>
      <stop offset="75%" stop-color="#f9d6d5"/>
      <stop offset="100%" stop-color="#c44"/>
    </linearGradient>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Hardware Spectrum: 9 Orders of Magnitude</text>
  <text x="450" y="48" font-size="9" fill="#555" text-anchor="middle">From milliwatts to megawatts, kilobytes to terabytes</text>

  <!-- ===== Scale Labels ===== -->
  <text x="80" y="80" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Tiny</text>
  <text x="820" y="80" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Datacenter</text>

  <!-- ===== Main Spectrum Bar ===== -->
  <rect x="60" y="90" width="780" height="16" rx="8" fill="url(#spectrum-grad)" stroke="#bbb" stroke-width="0.8"/>

  <!-- Power scale labels -->
  <text x="60" y="125" font-size="8" fill="#999" text-anchor="start">15 mW</text>
  <text x="840" y="125" font-size="8" fill="#999" text-anchor="end">120 kW</text>

  <!-- ===== Device Cards ===== -->

  <!-- ── nRF52840 ── -->
  <line x1="100" y1="106" x2="100" y2="150" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="30" y="150" width="140" height="130" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="100" y="172" font-size="11" font-weight="700" fill="#333" text-anchor="middle">nRF52840</text>

  <!-- Badge -->
  <rect x="52" y="180" width="96" height="18" rx="9" fill="#a31f34"/>
  <text x="100" y="193" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Microcontroller</text>

  <text x="100" y="218" font-size="9" fill="#555" text-anchor="middle">15 mW</text>
  <text x="100" y="232" font-size="9" fill="#555" text-anchor="middle">256 KiB RAM</text>
  <text x="100" y="246" font-size="9" fill="#555" text-anchor="middle">64 MHz</text>
  <text x="100" y="266" font-size="8" fill="#999" text-anchor="middle">Keyword spotting</text>

  <!-- ── ESP32 ── -->
  <line x1="260" y1="106" x2="260" y2="150" stroke="#4a90c4" stroke-width="1.2"/>
  <rect x="190" y="150" width="140" height="130" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="260" y="172" font-size="11" font-weight="700" fill="#333" text-anchor="middle">ESP32-S3</text>

  <rect x="212" y="180" width="96" height="18" rx="9" fill="#a31f34"/>
  <text x="260" y="193" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Edge SoC</text>

  <text x="260" y="218" font-size="9" fill="#555" text-anchor="middle">0.4 W</text>
  <text x="260" y="232" font-size="9" fill="#555" text-anchor="middle">512 KiB RAM</text>
  <text x="260" y="246" font-size="9" fill="#555" text-anchor="middle">240 MHz</text>
  <text x="260" y="266" font-size="8" fill="#999" text-anchor="middle">Wake word, anomaly</text>

  <!-- ── Jetson Orin ── -->
  <line x1="450" y1="106" x2="450" y2="150" stroke="#c87b2a" stroke-width="1.2"/>
  <rect x="380" y="150" width="140" height="130" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="172" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Jetson Orin</text>

  <rect x="402" y="180" width="96" height="18" rx="9" fill="#a31f34"/>
  <text x="450" y="193" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Edge GPU</text>

  <text x="450" y="218" font-size="9" fill="#555" text-anchor="middle">25 W</text>
  <text x="450" y="232" font-size="9" fill="#555" text-anchor="middle">16 GB LPDDR5</text>
  <text x="450" y="246" font-size="9" fill="#555" text-anchor="middle">275 TOPS INT8</text>
  <text x="450" y="266" font-size="8" fill="#999" text-anchor="middle">Autonomous vehicles</text>

  <!-- ── H100 ── -->
  <line x1="640" y1="106" x2="640" y2="150" stroke="#c44" stroke-width="1.2"/>
  <rect x="570" y="150" width="140" height="130" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="640" y="172" font-size="11" font-weight="700" fill="#333" text-anchor="middle">H100 SXM</text>

  <rect x="592" y="180" width="96" height="18" rx="9" fill="#a31f34"/>
  <text x="640" y="193" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Datacenter GPU</text>

  <text x="640" y="218" font-size="9" fill="#555" text-anchor="middle">700 W</text>
  <text x="640" y="232" font-size="9" fill="#555" text-anchor="middle">80 GB HBM3</text>
  <text x="640" y="246" font-size="9" fill="#555" text-anchor="middle">990 TFLOP/s FP16</text>
  <text x="640" y="266" font-size="8" fill="#999" text-anchor="middle">LLM training</text>

  <!-- ── NVL72 ── -->
  <line x1="820" y1="106" x2="820" y2="150" stroke="#c44" stroke-width="1.2"/>
  <rect x="750" y="150" width="140" height="130" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="820" y="172" font-size="11" font-weight="700" fill="#333" text-anchor="middle">NVL72</text>

  <rect x="772" y="180" width="96" height="18" rx="9" fill="#a31f34"/>
  <text x="820" y="193" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Superchip Rack</text>

  <text x="820" y="218" font-size="9" fill="#555" text-anchor="middle">120 kW</text>
  <text x="820" y="232" font-size="9" fill="#555" text-anchor="middle">13.8 TB HBM3e</text>
  <text x="820" y="246" font-size="9" fill="#555" text-anchor="middle">1.4 EFLOP/s FP4</text>
  <text x="820" y="266" font-size="8" fill="#999" text-anchor="middle">Frontier models</text>

  <!-- ===== Comparative Annotations ===== -->
  <rect x="60" y="310" width="780" height="110" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <text x="450" y="335" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Key Comparisons Across the Spectrum</text>

  <!-- Power -->
  <text x="100" y="360" font-size="9" font-weight="700" fill="#555">Power:</text>
  <text x="160" y="360" font-size="9" fill="#555">15 mW to 120 kW</text>
  <rect x="310" y="349" width="60" height="18" rx="9" fill="#a31f34"/>
  <text x="340" y="362" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">8M x</text>

  <!-- Memory -->
  <text x="100" y="385" font-size="9" font-weight="700" fill="#555">Memory:</text>
  <text x="160" y="385" font-size="9" fill="#555">256 KiB to 13.8 TB</text>
  <rect x="310" y="374" width="60" height="18" rx="9" fill="#a31f34"/>
  <text x="340" y="387" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">57M x</text>

  <!-- Compute -->
  <text x="100" y="410" font-size="9" font-weight="700" fill="#555">Compute:</text>
  <text x="160" y="410" font-size="9" fill="#555">~1 MFLOP/s to 1.4 EFLOP/s</text>
  <rect x="360" y="399" width="60" height="18" rx="9" fill="#a31f34"/>
  <text x="390" y="412" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">10^12 x</text>

  <!-- Right side insight -->
  <text x="520" y="365" font-size="9.5" font-weight="700" fill="#333">Same algorithms, different constraints:</text>
  <text x="520" y="382" font-size="9" fill="#555">Tiny: latency + energy per inference</text>
  <text x="520" y="397" font-size="9" fill="#555">Edge: throughput + thermal envelope</text>
  <text x="520" y="412" font-size="9" fill="#555">Cloud: utilization + cost per token</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">ML systems span 9 orders of magnitude in compute. The physics changes; the principles do not.</text>
</svg>
