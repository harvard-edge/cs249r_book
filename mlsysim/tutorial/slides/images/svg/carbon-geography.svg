<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Carbon Intensity by Region: Geography Is Destiny</text>
  <text x="450" y="48" font-size="9" fill="#555" text-anchor="middle">Grid carbon intensity (gCO2eq/kWh) determines the carbon cost of ML training</text>

  <!-- ===== Chart Area ===== -->
  <!-- Plot area: x=140..760, y=80..400 -->
  <!-- Y-axis -->
  <line x1="140" y1="80" x2="140" y2="400" stroke="#333" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="140" y1="400" x2="760" y2="400" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="40" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,40,240)">gCO2eq / kWh</text>

  <!-- Y-axis ticks: 0, 200, 400, 600, 800, 1000 -->
  <!-- Scale: y = 400 - (val/1000)*320 -->
  <!-- 0 -> y=400 -->
  <line x1="135" y1="400" x2="140" y2="400" stroke="#333" stroke-width="1"/>
  <text x="128" y="404" font-size="9" fill="#555" text-anchor="end">0</text>
  <!-- 200 -> y=336 -->
  <line x1="135" y1="336" x2="760" y2="336" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="128" y="340" font-size="9" fill="#555" text-anchor="end">200</text>
  <!-- 400 -> y=272 -->
  <line x1="135" y1="272" x2="760" y2="272" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="128" y="276" font-size="9" fill="#555" text-anchor="end">400</text>
  <!-- 600 -> y=208 -->
  <line x1="135" y1="208" x2="760" y2="208" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="128" y="212" font-size="9" fill="#555" text-anchor="end">600</text>
  <!-- 800 -> y=144 -->
  <line x1="135" y1="144" x2="760" y2="144" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="128" y="148" font-size="9" fill="#555" text-anchor="end">800</text>
  <!-- 1000 -> y=80 -->
  <line x1="135" y1="80" x2="140" y2="80" stroke="#333" stroke-width="1"/>
  <text x="128" y="84" font-size="9" fill="#555" text-anchor="end">1000</text>

  <!-- ===== Bars ===== -->
  <!-- 4 bars, evenly spaced. Bar width=100, centers at x=240, 390, 540, 690 -->

  <!-- ── Norway: 10 gCO2/kWh ── -->
  <!-- Height: (10/1000)*320 = 3.2px -> min 6px for visibility -->
  <rect x="190" y="394" width="100" height="6" rx="2" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1"/>
  <text x="240" y="390" font-size="10" font-weight="700" fill="#2d7a2d" text-anchor="middle">10</text>
  <text x="240" y="418" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Norway</text>
  <text x="240" y="432" font-size="8.5" fill="#555" text-anchor="middle">Hydro</text>

  <!-- ── Quebec: 20 gCO2/kWh ── -->
  <!-- Height: (20/1000)*320 = 6.4px -->
  <rect x="340" y="394" width="100" height="6" rx="2" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1"/>
  <text x="390" y="390" font-size="10" font-weight="700" fill="#2d7a2d" text-anchor="middle">20</text>
  <text x="390" y="418" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Quebec</text>
  <text x="390" y="432" font-size="8.5" fill="#555" text-anchor="middle">Hydro</text>

  <!-- ── US Average: 429 gCO2/kWh ── -->
  <!-- Height: (429/1000)*320 = 137px, top = 400-137 = 263 -->
  <rect x="490" y="263" width="100" height="137" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="540" y="256" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">429</text>
  <text x="540" y="418" font-size="11" font-weight="700" fill="#333" text-anchor="middle">US Avg</text>
  <text x="540" y="432" font-size="8.5" fill="#555" text-anchor="middle">Mixed grid</text>

  <!-- ── Poland: 820 gCO2/kWh ── -->
  <!-- Height: (820/1000)*320 = 262px, top = 400-262 = 138 -->
  <rect x="640" y="138" width="100" height="262" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="690" y="131" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">820</text>
  <text x="690" y="418" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Poland</text>
  <text x="690" y="432" font-size="8.5" fill="#555" text-anchor="middle">Coal-heavy</text>

  <!-- ===== 41x Annotation ===== -->
  <!-- Arrow from Quebec to Poland with 41x label -->
  <line x1="390" y1="370" x2="390" y2="358" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="390" y1="358" x2="690" y2="358" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="690" y1="370" x2="690" y2="358" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2"/>

  <rect x="500" y="345" width="80" height="24" rx="12" fill="#a31f34"/>
  <text x="540" y="361" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">41x</text>

  <!-- ===== Insight Box ===== -->
  <rect x="140" y="450" width="620" height="30" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="470" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Same model, same hardware, same training time -- 41x difference in carbon emissions</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Data: IEA Electricity Map (2024). Carbon-aware scheduling can reduce emissions without changing code.</text>
</svg>
