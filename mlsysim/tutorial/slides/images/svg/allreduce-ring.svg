<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Ring AllReduce: Bandwidth-Optimal Collective</text>

  <!-- ===== Ring of 8 GPUs ===== -->
  <!-- Center at (300, 250), radius=140 -->
  <!-- 8 GPUs at 45-degree increments, starting from top (270 degrees) -->
  <!-- GPU positions (cx, cy): -->
  <!-- GPU0: 300+140*cos(270)=300, 250+140*sin(270)=110  -> top -->
  <!-- GPU1: 300+140*cos(315)=399, 250+140*sin(315)=151  -> top-right -->
  <!-- GPU2: 300+140*cos(0)=440, 250+140*sin(0)=250      -> right -->
  <!-- GPU3: 300+140*cos(45)=399, 250+140*sin(45)=349     -> bottom-right -->
  <!-- GPU4: 300+140*cos(90)=300, 250+140*sin(90)=390     -> bottom -->
  <!-- GPU5: 300+140*cos(135)=201, 250+140*sin(135)=349   -> bottom-left -->
  <!-- GPU6: 300+140*cos(180)=160, 250+140*sin(180)=250   -> left -->
  <!-- GPU7: 300+140*cos(225)=201, 250+140*sin(225)=151   -> top-left -->

  <!-- GPU nodes -->
  <rect x="275" y="92" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="300" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>

  <rect x="374" y="133" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="399" y="156" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>

  <rect x="415" y="232" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="440" y="255" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>

  <rect x="374" y="331" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="399" y="354" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <rect x="275" y="372" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="300" y="395" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 4</text>

  <rect x="176" y="331" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="201" y="354" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 5</text>

  <rect x="135" y="232" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="160" y="255" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 6</text>

  <rect x="176" y="133" width="50" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="201" y="156" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 7</text>

  <!-- ===== Ring arrows (clockwise) ===== -->
  <!-- GPU0 -> GPU1 -->
  <path d="M325,110 Q360,105 374,140" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU1 -> GPU2 -->
  <path d="M424,165 Q445,190 445,232" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU2 -> GPU3 -->
  <path d="M445,268 Q445,310 420,331" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU3 -> GPU4 -->
  <path d="M374,360 Q345,380 325,380" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU4 -> GPU5 -->
  <path d="M275,395 Q245,395 226,367" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU5 -> GPU6 -->
  <path d="M180,331 Q160,305 160,268" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU6 -> GPU7 -->
  <path d="M160,232 Q160,190 180,169" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- GPU7 -> GPU0 -->
  <path d="M226,140 Q250,118 275,112" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- ===== Message size annotation ===== -->
  <text x="300" y="240" font-size="10.5" fill="#555" text-anchor="middle">Each chunk:</text>
  <text x="300" y="254" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">M / N</text>
  <text x="300" y="268" font-size="10" fill="#555" text-anchor="middle">per step</text>

  <!-- ===== Right Panel: Phase Descriptions ===== -->
  <line x1="510" y1="50" x2="510" y2="440" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Phase 1: Reduce-Scatter -->
  <rect x="540" y="60" width="330" height="170" rx="5" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="705" y="85" font-size="12" font-weight="700" fill="#2d7a2d" text-anchor="middle">Phase 1: Reduce-Scatter</text>
  <text x="705" y="105" font-size="10.5" fill="#555" text-anchor="middle">N-1 steps: each GPU sends one chunk clockwise</text>

  <!-- Mini diagram showing chunks -->
  <text x="560" y="130" font-size="10" font-weight="700" fill="#333">Step 1:</text>
  <rect x="620" y="118" width="30" height="18" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="635" y="131" font-size="11" fill="#333" text-anchor="middle">c0</text>
  <text x="660" y="131" font-size="10.5" fill="#555">+</text>
  <rect x="670" y="118" width="30" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="685" y="131" font-size="11" fill="#333" text-anchor="middle">c0</text>
  <text x="710" y="131" font-size="10.5" fill="#555">=</text>
  <rect x="720" y="118" width="40" height="18" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="740" y="131" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">sum</text>

  <text x="560" y="158" font-size="10" font-weight="700" fill="#333">After N-1:</text>
  <text x="640" y="158" font-size="10" fill="#555">Each GPU holds 1 fully reduced chunk</text>

  <!-- Cost formula -->
  <rect x="570" y="180" width="260" height="28" rx="12" fill="#fff" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="700" y="199" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">Cost = (N-1) x (M/N) / BW</text>

  <!-- Phase 2: All-Gather -->
  <rect x="540" y="250" width="330" height="170" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="705" y="275" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Phase 2: All-Gather</text>
  <text x="705" y="295" font-size="10.5" fill="#555" text-anchor="middle">N-1 steps: broadcast reduced chunks around ring</text>

  <!-- Mini diagram -->
  <text x="560" y="320" font-size="10" font-weight="700" fill="#333">Step 1:</text>
  <rect x="620" y="308" width="40" height="18" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="640" y="321" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">sum</text>
  <text x="670" y="321" font-size="10.5" fill="#3d9e5a">--></text>
  <text x="700" y="321" font-size="10" fill="#555">neighbor</text>

  <text x="560" y="348" font-size="10" font-weight="700" fill="#333">After N-1:</text>
  <text x="640" y="348" font-size="10" fill="#555">All GPUs hold the complete reduced result</text>

  <!-- Cost formula -->
  <rect x="570" y="370" width="260" height="28" rx="12" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="700" y="389" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Cost = (N-1) x (M/N) / BW</text>

  <!-- ===== Total Cost ===== -->
  <rect x="560" y="435" width="300" height="30" rx="5" fill="#a31f34" stroke="none"/>
  <text x="710" y="455" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Total = 2(N-1)/N x M/BW</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Ring AllReduce achieves optimal bandwidth utilization: 2(N-1)/N approaches 2M/BW as N grows.</text>
</svg>
