<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Roofline Model: Performance Ceilings</text>

  <!-- ===== Axes ===== -->
  <!-- Plot area: x=120..820, y=60..420 -->
  <!-- Y-axis -->
  <line x1="120" y1="60" x2="120" y2="420" stroke="#333" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="120" y1="420" x2="820" y2="420" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="28" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,28,240)">Performance (TFLOP/s)</text>

  <!-- X-axis label -->
  <text x="470" y="460" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Arithmetic Intensity (FLOP/byte)</text>

  <!-- ===== Y-axis tick marks (log scale: 1, 10, 100, 1000) ===== -->
  <!-- Y range: 60 (top=1000) to 420 (bottom=1), 360px for 3 decades -->
  <!-- y = 420 - (log10(val)/3)*360 -->
  <!-- 1 TFLOP/s -> y=420 -->
  <line x1="115" y1="420" x2="120" y2="420" stroke="#333" stroke-width="1"/>
  <text x="110" y="424" font-size="10.5" fill="#555" text-anchor="end">1</text>
  <!-- 10 -> y=300 -->
  <line x1="115" y1="300" x2="120" y2="300" stroke="#333" stroke-width="1"/>
  <text x="110" y="304" font-size="10.5" fill="#555" text-anchor="end">10</text>
  <!-- Grid line -->
  <line x1="120" y1="300" x2="820" y2="300" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 100 -> y=180 -->
  <line x1="115" y1="180" x2="120" y2="180" stroke="#333" stroke-width="1"/>
  <text x="110" y="184" font-size="10.5" fill="#555" text-anchor="end">100</text>
  <line x1="120" y1="180" x2="820" y2="180" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 1000 -> y=60 -->
  <line x1="115" y1="60" x2="120" y2="60" stroke="#333" stroke-width="1"/>
  <text x="110" y="64" font-size="10.5" fill="#555" text-anchor="end">1000</text>
  <line x1="120" y1="60" x2="820" y2="60" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- ===== X-axis tick marks (log scale: 0.1, 1, 10, 100, 1000) ===== -->
  <!-- X range: 120 (left=0.1) to 820 (right=1000), 700px for 4 decades -->
  <!-- x = 120 + ((log10(val)+1)/4)*700 -->
  <!-- 0.1 -> x=120 -->
  <line x1="120" y1="420" x2="120" y2="425" stroke="#333" stroke-width="1"/>
  <text x="120" y="438" font-size="10.5" fill="#555" text-anchor="middle">0.1</text>
  <!-- 1 -> x=295 -->
  <line x1="295" y1="420" x2="295" y2="425" stroke="#333" stroke-width="1"/>
  <text x="295" y="438" font-size="10.5" fill="#555" text-anchor="middle">1</text>
  <line x1="295" y1="60" x2="295" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 10 -> x=470 -->
  <line x1="470" y1="420" x2="470" y2="425" stroke="#333" stroke-width="1"/>
  <text x="470" y="438" font-size="10.5" fill="#555" text-anchor="middle">10</text>
  <line x1="470" y1="60" x2="470" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 100 -> x=645 -->
  <line x1="645" y1="420" x2="645" y2="425" stroke="#333" stroke-width="1"/>
  <text x="645" y="438" font-size="10.5" fill="#555" text-anchor="middle">100</text>
  <line x1="645" y1="60" x2="645" y2="420" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 1000 -> x=820 -->
  <line x1="820" y1="420" x2="820" y2="425" stroke="#333" stroke-width="1"/>
  <text x="820" y="438" font-size="10.5" fill="#555" text-anchor="middle">1000</text>

  <!-- ===== Compute Ceiling (horizontal) ===== -->
  <!-- H100 peak ~990 TFLOP/s FP16 -> y ~ 60 (at 1000) = approx y=62 -->
  <line x1="120" y1="62" x2="820" y2="62" stroke="#4a90c4" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="825" y="58" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="start">Peak Compute</text>
  <text x="825" y="70" font-size="10" fill="#4a90c4" text-anchor="start">990 TFLOP/s (H100 FP16)</text>

  <!-- ===== Memory Bandwidth Ceiling (sloped line) ===== -->
  <!-- BW = 3.35 TB/s. Perf = AI * BW. Ridge point: AI = Peak/BW = 990/3.35 = ~295.5 FLOP/byte -->
  <!-- At AI=0.1: Perf = 0.1*3350 = 335 GFLOP/s = 0.335 TFLOP/s -> y = 420 - (log10(0.335)/3)*360 = 420 - (-0.475/3)*360 = 420+57 = 477 (clamp to 420) -->
  <!-- At AI=1: Perf = 3.35 TFLOP/s -> y = 420 - (0.525/3)*360 = 420 - 63 = 357 -->
  <!-- At AI=10: Perf = 33.5 -> y = 420 - (1.525/3)*360 = 420 - 183 = 237 -->
  <!-- At AI=100: Perf = 335 -> y = 420 - (2.525/3)*360 = 420 - 303 = 117 -->
  <!-- At AI=295: Perf = 990 -> y = 62 (ridge point). AI=295 -> x = 120 + ((log10(295)+1)/4)*700 = 120 + (3.47/4)*700 = 120 + 607 = 727 -->
  <!-- Draw from (120, 420) up to ridge point (727, 62) -->
  <line x1="120" y1="420" x2="727" y2="62" stroke="#c44" stroke-width="2.5"/>

  <!-- ===== Ridge Point ===== -->
  <circle cx="727" cy="62" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <!-- Dashed lines from ridge point -->
  <line x1="727" y1="62" x2="727" y2="420" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="62" x2="727" y2="62" stroke="#a31f34" stroke-width="0" stroke-dasharray="4,3"/>
  <text x="727" y="52" font-size="10.5" font-weight="700" fill="#a31f34" text-anchor="middle">Ridge Point</text>
  <text x="735" y="432" font-size="10" fill="#a31f34" text-anchor="middle">AI = 295</text>

  <!-- ===== Memory BW label on slope ===== -->
  <text x="310" y="290" font-size="11" font-weight="700" fill="#c44" text-anchor="middle" transform="rotate(-38,310,290)">Memory BW Ceiling (3.35 TB/s)</text>

  <!-- ===== Region Labels ===== -->
  <!-- Memory-bound region (left of ridge) -->
  <rect x="160" y="80" width="160" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="98" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Memory-Bound</text>

  <!-- Compute-bound region (right of ridge) -->
  <rect x="740" y="80" width="140" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="810" y="98" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Compute-Bound</text>

  <!-- ===== Workload Points ===== -->
  <!-- LLM Decode (batch=1): AI ~ 1 FLOP/byte -> x=295, Perf ~ 3.35 TFLOP/s -> y=357 -->
  <circle cx="295" cy="357" r="8" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="295" y="352" font-size="10.5" font-weight="400" fill="#333" text-anchor="middle" dy="-14">LLM Decode</text>
  <text x="295" y="352" font-size="10" fill="#555" text-anchor="middle" dy="-3">(batch=1)</text>

  <!-- CNN Training (batch=256): AI ~ 200 FLOP/byte -> x = 120 + ((log10(200)+1)/4)*700 = 120 + (3.301/4)*700 = 120 + 578 = 698, Perf ~ 670 TFLOP/s (hitting ceiling) -> y = 62 -->
  <circle cx="698" cy="62" r="8" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="660" y="100" font-size="10.5" font-weight="400" fill="#333" text-anchor="middle">CNN Training</text>
  <text x="660" y="112" font-size="10" fill="#555" text-anchor="middle">(batch=256)</text>
  <!-- Connecting line from label to point -->
  <line x1="660" y1="88" x2="690" y2="68" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">H100 SXM roofline. Operational intensity determines which ceiling bounds performance.</text>
</svg>
