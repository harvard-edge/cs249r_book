<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Pareto Front: The Throughput-Cost-Latency Trade-off</text>

  <!-- ===== Axes ===== -->
  <!-- Plot area: x=120..780, y=55..400 -->
  <!-- Y-axis -->
  <line x1="120" y1="55" x2="120" y2="400" stroke="#333" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="120" y1="400" x2="780" y2="400" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="32" y="228" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,32,228)">Cost ($/hour)</text>

  <!-- X-axis label -->
  <text x="450" y="445" font-size="11" font-weight="700" fill="#333" text-anchor="middle">P99 Latency (ms)</text>

  <!-- ===== Y-axis ticks ===== -->
  <!-- Linear scale: $0 to $40, y=400(0) to y=55(40) -->
  <!-- y = 400 - (val/40)*345 -->
  <!-- $0 -->
  <line x1="115" y1="400" x2="120" y2="400" stroke="#333" stroke-width="1"/>
  <text x="110" y="404" font-size="10.5" fill="#555" text-anchor="end">$0</text>
  <!-- $10 -->
  <line x1="115" y1="314" x2="120" y2="314" stroke="#333" stroke-width="1"/>
  <text x="110" y="318" font-size="10.5" fill="#555" text-anchor="end">$10</text>
  <line x1="120" y1="314" x2="780" y2="314" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- $20 -->
  <line x1="115" y1="228" x2="120" y2="228" stroke="#333" stroke-width="1"/>
  <text x="110" y="232" font-size="10.5" fill="#555" text-anchor="end">$20</text>
  <line x1="120" y1="228" x2="780" y2="228" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- $30 -->
  <line x1="115" y1="141" x2="120" y2="141" stroke="#333" stroke-width="1"/>
  <text x="110" y="145" font-size="10.5" fill="#555" text-anchor="end">$30</text>
  <line x1="120" y1="141" x2="780" y2="141" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- $40 -->
  <line x1="115" y1="55" x2="120" y2="55" stroke="#333" stroke-width="1"/>
  <text x="110" y="59" font-size="10.5" fill="#555" text-anchor="end">$40</text>

  <!-- ===== X-axis ticks ===== -->
  <!-- Linear scale: 0 to 500 ms, x=120(0) to x=780(500) -->
  <!-- x = 120 + (val/500)*660 -->
  <!-- 0 -->
  <text x="120" y="418" font-size="10.5" fill="#555" text-anchor="middle">0</text>
  <!-- 50 -->
  <line x1="186" y1="400" x2="186" y2="405" stroke="#333" stroke-width="1"/>
  <text x="186" y="418" font-size="10.5" fill="#555" text-anchor="middle">50</text>
  <!-- 100 -->
  <line x1="252" y1="400" x2="252" y2="405" stroke="#333" stroke-width="1"/>
  <text x="252" y="418" font-size="10.5" fill="#555" text-anchor="middle">100</text>
  <line x1="252" y1="55" x2="252" y2="400" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 200 -->
  <line x1="384" y1="400" x2="384" y2="405" stroke="#333" stroke-width="1"/>
  <text x="384" y="418" font-size="10.5" fill="#555" text-anchor="middle">200</text>
  <line x1="384" y1="55" x2="384" y2="400" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 300 -->
  <line x1="516" y1="400" x2="516" y2="405" stroke="#333" stroke-width="1"/>
  <text x="516" y="418" font-size="10.5" fill="#555" text-anchor="middle">300</text>
  <line x1="516" y1="55" x2="516" y2="400" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- 400 -->
  <line x1="648" y1="400" x2="648" y2="405" stroke="#333" stroke-width="1"/>
  <text x="648" y="418" font-size="10.5" fill="#555" text-anchor="middle">400</text>
  <!-- 500 -->
  <line x1="780" y1="400" x2="780" y2="405" stroke="#333" stroke-width="1"/>
  <text x="780" y="418" font-size="10.5" fill="#555" text-anchor="middle">500</text>

  <!-- ===== SLA Boundary (dashed vertical at 200ms) ===== -->
  <line x1="384" y1="55" x2="384" y2="400" stroke="#c44" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="390" y="70" font-size="11" font-weight="700" fill="#c44" text-anchor="start">SLA = 200 ms</text>

  <!-- ===== Infeasible Region Shading ===== -->
  <rect x="384" y="55" width="396" height="345" fill="#f9d6d5" opacity="0.15"/>
  <text x="588" y="95" font-size="12" font-weight="700" fill="#c44" text-anchor="middle" opacity="0.6">Infeasible</text>
  <text x="588" y="112" font-size="10" fill="#c44" text-anchor="middle" opacity="0.6">(SLA violation)</text>

  <!-- ===== Dominated Points (gray) ===== -->
  <!-- Config: various non-optimal setups -->
  <!-- Point coords: (latency_ms, cost_dollar) -->

  <!-- 1xA100 bs=1: latency=180, cost=$8 -> x=358, y=331 -->
  <circle cx="358" cy="331" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>

  <!-- 2xA100 bs=4: latency=120, cost=$16 -> x=279, y=262 -->
  <circle cx="279" cy="262" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>

  <!-- 4xA100 TP=2 bs=8: latency=150, cost=$28 -> x=318, y=159 -->
  <circle cx="318" cy="159" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="328" y="153" font-size="10" fill="#555" text-anchor="start">4xA100 TP=2 bs=8</text>

  <!-- 1xH100 bs=4: latency=100, cost=$16 -> x=252, y=262 -->
  <circle cx="252" cy="262" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>

  <!-- 2xH100 bs=1: latency=40, cost=$20 -> x=173, y=228 -->
  <circle cx="173" cy="228" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>

  <!-- 2xA100 bs=16: latency=250, cost=$10 -> x=450, y=314 (infeasible) -->
  <circle cx="450" cy="314" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5" opacity="0.5"/>
  <text x="460" y="310" font-size="10" fill="#999" text-anchor="start">2xA100 bs=16</text>

  <!-- 4xA100 bs=32: latency=350, cost=$18 -> x=582, y=245 (infeasible) -->
  <circle cx="582" cy="245" r="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== Pareto-Optimal Points (accent red) ===== -->
  <!-- Pareto front: lower-left boundary — can't improve cost without worsening latency -->

  <!-- P1: 1xH100 bs=1: latency=30, cost=$5 -> x=160, y=357 -->
  <circle cx="160" cy="357" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="167" y="375" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start">1xH100 bs=1</text>

  <!-- P2: 1xH100 bs=8: latency=65, cost=$5 -> x=206, y=357 -->
  <circle cx="206" cy="357" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="213" y="373" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start">1xH100 bs=8</text>

  <!-- P3: 2xH100 TP=2 bs=8: latency=45, cost=$10 -> x=179, y=314 -->
  <circle cx="179" cy="314" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="135" y="303" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start">2xH100 TP=2 bs=8</text>

  <!-- P4: 4xH100 TP=4 bs=16: latency=35, cost=$20 -> x=166, y=228 -->
  <circle cx="166" cy="228" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="130" y="218" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start">4xH100 TP=4 bs=16</text>

  <!-- P5: 8xH100 TP=8 bs=32: latency=25, cost=$35 -> x=153, y=98 -->
  <circle cx="153" cy="98" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="162" y="93" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start">8xH100 TP=8 bs=32</text>

  <!-- ===== Pareto Front Line ===== -->
  <polyline points="153,98 166,228 179,314 206,357 260,400"
            fill="none" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ===== Pareto Front Label ===== -->
  <rect x="200" y="130" width="140" height="26" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="270" y="148" font-size="10.5" font-weight="700" fill="#a31f34" text-anchor="middle">Pareto-Optimal Frontier</text>
  <!-- Connector to front -->
  <line x1="200" y1="148" x2="168" y2="180" stroke="#a31f34" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ===== Trade-off Annotation ===== -->
  <rect x="450" y="360" width="310" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="605" y="376" font-size="10" font-weight="700" fill="#333" text-anchor="middle">DSE explores this space automatically</text>
  <text x="605" y="390" font-size="10" fill="#555" text-anchor="middle">Simulator evaluates 100s of configs in minutes</text>

  <!-- ===== Legend ===== -->
  <rect x="640" y="132" width="145" height="60" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <circle cx="656" cy="150" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <text x="668" y="154" font-size="10" fill="#333">Pareto-optimal</text>
  <circle cx="656" cy="170" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="668" y="174" font-size="10" fill="#333">Dominated config</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="10.5" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Each point is one hardware + parallelism + batch size configuration. Pareto front identifies non-dominated trade-offs.</text>
</svg>
