<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Iron Law of ML Systems Performance</text>

  <!-- ===== Central Equation ===== -->
  <rect x="100" y="100" width="700" height="70" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>

  <!-- Equation text - decomposed for alignment -->
  <text x="450" y="128" font-size="14" font-weight="700" fill="#333" text-anchor="middle">
    <tspan fill="#a31f34">Time</tspan>
    <tspan fill="#555"> = </tspan>
    <tspan fill="#333">FLOPs</tspan>
    <tspan fill="#555"> / ( </tspan>
    <tspan fill="#4a90c4">N</tspan>
    <tspan fill="#555"> x </tspan>
    <tspan fill="#4a90c4">Peak</tspan>
    <tspan fill="#555"> x </tspan>
    <tspan fill="#4a90c4">MFU</tspan>
    <tspan fill="#555"> x </tspan>
    <tspan fill="#3d9e5a">eta</tspan>
    <tspan fill="#555"> x </tspan>
    <tspan fill="#c87b2a">Goodput</tspan>
    <tspan fill="#555"> )</tspan>
  </text>
  <text x="450" y="155" font-size="9" fill="#555" text-anchor="middle">Each term is a ceiling that bounds end-to-end throughput</text>

  <!-- ===== Five Arrows + Term Cards ===== -->

  <!-- ── Term 1: N (Node-level, blue) ── -->
  <line x1="210" y1="170" x2="210" y2="230" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="130" y="235" width="160" height="80" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="210" y="257" font-size="11" font-weight="700" fill="#333" text-anchor="middle">N = # Accelerators</text>
  <text x="210" y="273" font-size="9" fill="#555" text-anchor="middle">Parallelism Wall</text>
  <line x1="160" y1="282" x2="260" y2="282" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="210" y="296" font-size="8.5" fill="#555" text-anchor="middle">Amdahl's Law limits</text>
  <text x="210" y="308" font-size="8.5" fill="#555" text-anchor="middle">scaling with serial fraction</text>

  <!-- ── Term 2: Peak (Node-level, blue) ── -->
  <line x1="365" y1="170" x2="365" y2="230" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="285" y="235" width="160" height="80" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="365" y="257" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Peak FLOP/s</text>
  <text x="365" y="273" font-size="9" fill="#555" text-anchor="middle">Silicon Wall</text>
  <line x1="315" y1="282" x2="415" y2="282" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="365" y="296" font-size="8.5" fill="#555" text-anchor="middle">Chip physics, TDP,</text>
  <text x="365" y="308" font-size="8.5" fill="#555" text-anchor="middle">precision (FP16, INT8)</text>

  <!-- ── Term 3: MFU (Node-level, blue) ── -->
  <line x1="520" y1="170" x2="520" y2="230" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="440" y="235" width="160" height="80" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="520" y="257" font-size="11" font-weight="700" fill="#333" text-anchor="middle">MFU</text>
  <text x="520" y="273" font-size="9" fill="#555" text-anchor="middle">Utilization Wall</text>
  <line x1="470" y1="282" x2="570" y2="282" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="520" y="296" font-size="8.5" fill="#555" text-anchor="middle">Memory bandwidth,</text>
  <text x="520" y="308" font-size="8.5" fill="#555" text-anchor="middle">kernel efficiency, bubbles</text>

  <!-- ── Term 4: eta (Fleet-level, green) ── -->
  <line x1="620" y1="170" x2="650" y2="230" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="570" y="345" width="160" height="80" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="650" y="367" font-size="11" font-weight="700" fill="#333" text-anchor="middle">eta (Scaling Eff.)</text>
  <text x="650" y="383" font-size="9" fill="#555" text-anchor="middle">Communication Wall</text>
  <line x1="600" y1="392" x2="700" y2="392" stroke="#3d9e5a" stroke-width="0.5"/>
  <text x="650" y="406" font-size="8.5" fill="#555" text-anchor="middle">AllReduce overhead,</text>
  <text x="650" y="418" font-size="8.5" fill="#555" text-anchor="middle">network bisection BW</text>
  <!-- Connecting line from arrow end to card -->
  <line x1="650" y1="238" x2="650" y2="345" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ── Term 5: Goodput (Ops-level, orange) ── -->
  <line x1="720" y1="170" x2="760" y2="230" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <rect x="680" y="235" width="160" height="80" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="760" y="257" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Goodput</text>
  <text x="760" y="273" font-size="9" fill="#555" text-anchor="middle">Operational Wall</text>
  <line x1="710" y1="282" x2="810" y2="282" stroke="#c87b2a" stroke-width="0.5"/>
  <text x="760" y="296" font-size="8.5" fill="#555" text-anchor="middle">Preemptions, failures,</text>
  <text x="760" y="308" font-size="8.5" fill="#555" text-anchor="middle">stragglers, checkpointing</text>

  <!-- ===== Domain Legend ===== -->
  <rect x="130" y="380" width="12" height="12" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="148" y="391" font-size="9" fill="#333">Node-level (single machine)</text>

  <rect x="130" y="400" width="12" height="12" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="148" y="411" font-size="9" fill="#333">Fleet-level (multi-node)</text>

  <rect x="130" y="420" width="12" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="148" y="431" font-size="9" fill="#333">Operational (cluster management)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Every term is a multiplier less-than-or-equal-to 1. The product of all five determines actual throughput.</text>
</svg>
