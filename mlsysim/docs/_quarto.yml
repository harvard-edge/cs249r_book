# =============================================================================
# MLSYSIM WEBSITE CONFIGURATION
# =============================================================================
# Standalone Quarto project for ML systems simulation and modeling
# Part of the MLSysBook ecosystem: mlsysbook.ai/mlsysim/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "MLSYSIM"
  description: "First-principles analytical modeling for learning about ML systems — from edge to exascale."
  site-url: https://mlsysbook.ai/mlsysim/
  favicon: logo.svg

  open-graph:
    locale: en_US
    site-name: "Machine Learning Systems"
    title: "MLSYSIM — ML Systems Infrastructure & Modeling"
    description: "Predict ML system performance, cost, and carbon from first principles. Companion to the ML Systems textbook."
  twitter-card:
    title: "MLSYSIM — ML Systems Modeling"
    description: "Predict ML performance, cost, and carbon from first principles. Open source."
    card-style: summary

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  search:
    keyboard-shortcut: ["/"]

  # Navbar — ecosystem dropdown only; page nav lives in the sidebar
  navbar:
    background: light
    search: true
    pinned: true
    collapse: true
    collapse-below: "md"
    title: "Machine Learning Systems"
    left:
      - text: "MLSYSIM"
        menu:
          - icon: book-half
            text: "Full Textbook"
            href: ../book/
          - text: "---"
          - icon: journal
            text: "Volume I: Foundations"
            href: ../vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: ../vol2/
          - text: "---"
          - icon: fire
            text: "TinyTorch"
            href: ../tinytorch/
          - icon: cpu
            text: "Hardware Kits"
            href: ../kits/
          - icon: calculator
            text: "MLSYSIM"
            href: ./
          - text: "---"
          - icon: lightbulb
            text: "Labs (Coming 2026)"
            href: ../labs/
    right:
      - icon: star
        text: "Star"
        href: https://github.com/harvard-edge/cs249r_book#support-this-work
        target: _blank
      - icon: heart
        text: "Support"
        href: https://opencollective.com/mlsysbook
        target: _blank
      - icon: github
        text: "GitHub"
        menu:
          - icon: pencil
            text: "Edit this page"
            href: https://github.com/harvard-edge/cs249r_book
            target: _blank
          - icon: bug
            text: "Report an issue"
            href: https://github.com/harvard-edge/cs249r_book/issues/new
            target: _blank
          - icon: chat
            text: "Discussions"
            href: https://github.com/harvard-edge/cs249r_book/discussions
            target: _blank
          - icon: code
            text: "View source"
            href: https://github.com/harvard-edge/cs249r_book
            target: _blank

  sidebar:
    style: "floating"
    background: light
    search: true
    collapse-level: 1
    contents:
      - getting-started.qmd
      - solver-guide.qmd
      - "---"

      - section: "Tutorials"
        contents:
          - tutorials/hello_world.qmd
          - tutorials/llm_serving.qmd
          - tutorials/distributed.qmd
          - tutorials/sustainability.qmd

      - section: "Catalogs"
        href: zoo/index.qmd
        contents:
          - zoo/hardware.qmd
          - zoo/models.qmd
          - zoo/fleets.qmd
          - zoo/infra.qmd
      - "---"

      - math.qmd
      - glossary.qmd
      - accuracy.qmd
      - "---"

      - text: "Whitepaper"
        href: whitepaper.qmd
      - contributing.qmd
      - "---"

      - section: "API"
        href: api/index.qmd
        contents:
          - api/hardware.qmd
          - api/models.qmd
          - api/systems.qmd
          - api/infra.qmd
          - api/core.qmd
          - api/core.solver.qmd

  # Footer — ecosystem pattern (matches Kits)
  page-footer:
    left: |
      &copy; 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="../">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

format:
  html:
    theme:
      light:
        - default
        - styles/style.scss
      dark:
        - default
        - styles/style.scss
        - styles/dark-mode.scss
    respect-user-color-scheme: true
    css: styles/landing.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: false
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    highlight-style: github
    link-external-icon: false
    link-external-newwindow: false
    anchor-sections: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
          <meta name="theme-color" content="#0284C7">

quartodoc:
  package: mlsysim
  dir: api
  title: API Reference
  sections:
    - title: Core API
      desc: Primary objects and solvers.
      contents:
        - hardware
        - models
        - infra
        - systems
        - core
