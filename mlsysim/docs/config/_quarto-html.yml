# =============================================================================
# MLSYSIM WEBSITE CONFIGURATION
# =============================================================================
# ML Systems Infrastructure Modeling — analytical, not simulation
# Part of the MLSysBook ecosystem: mlsysbook.ai/mlsysim/
# =============================================================================

project:
  type: website
  output-dir: _build
  resources:
    - mlsysim-paper.pdf

website:
  title: "MLSys·im"
  description: "First-principles infrastructure modeling for ML systems — from edge to exascale."
  site-url: https://mlsysbook.ai/mlsysim/
  favicon: logo.svg

  open-graph:
    locale: en_US
    site-name: "Machine Learning Systems"
    title: "MLSys·im — ML Systems Infrastructure Modeling"
    description: "Predict ML system performance, cost, and carbon from first principles. Companion to the ML Systems textbook."
  twitter-card:
    title: "MLSys·im — ML Systems Infrastructure Modeling"
    description: "Predict ML performance, cost, and carbon from first principles. Open source."
    card-style: summary

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  search:
    keyboard-shortcut: ["/"]

  # Navbar — ecosystem dropdown only; page nav lives in the sidebar
  navbar:
    background: light
    search: true
    pinned: true
    collapse: true
    collapse-below: "md"
    title: "Machine Learning Systems"
    left:
      - text: "MLSYSIM"
        menu:
          - icon: book-half
            text: "Full Textbook"
            href: ../book/
          - text: "---"
          - icon: journal
            text: "Volume I: Foundations"
            href: ../vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: ../vol2/
          - text: "---"
          - icon: fire
            text: "TinyTorch"
            href: ../tinytorch/
          - icon: cpu
            text: "Hardware Kits"
            href: ../kits/
          - icon: calculator
            text: "MLSys·im"
            href: ./
          - text: "---"
          - icon: lightbulb
            text: "Labs (Coming 2026)"
            href: ../labs/
    right:
      - icon: star
        text: "Star"
        href: https://github.com/harvard-edge/cs249r_book#support-this-work
        target: _blank
      - icon: heart
        text: "Support"
        href: https://opencollective.com/mlsysbook
        target: _blank
      - icon: github
        text: "GitHub"
        menu:
          - icon: pencil
            text: "Edit this page"
            href: https://github.com/harvard-edge/cs249r_book
            target: _blank
          - icon: bug
            text: "Report an issue"
            href: https://github.com/harvard-edge/cs249r_book/issues/new
            target: _blank
          - icon: chat
            text: "Discussions"
            href: https://github.com/harvard-edge/cs249r_book/discussions
            target: _blank
          - icon: code
            text: "View source"
            href: https://github.com/harvard-edge/cs249r_book
            target: _blank

  sidebar:
    style: "floating"
    background: light
    search: true
    collapse-level: 2
    contents:
      - section: "Get Started"
        contents:
          - getting-started.qmd
          - solver-guide.qmd

      - section: "Tutorials"
        contents:
          - tutorials/hello_world.qmd
          - tutorials/sustainability.qmd
          - tutorials/llm_serving.qmd
          - tutorials/distributed.qmd

      - section: "The MLSys Zoo"
        href: zoo/index.qmd
        contents:
          - zoo/hardware.qmd
          - zoo/models.qmd
          - zoo/fleets.qmd
          - zoo/infra.qmd

      - section: "Reference"
        contents:
          - architecture.qmd
          - math.qmd
          - accuracy.qmd
          - glossary.qmd

      - section: "API Reference"
        href: api/index.qmd
        contents:
          - text: "Hardware"
            href: api/hardware.qmd
          - text: "Models"
            href: api/models.qmd
          - text: "Systems"
            href: api/systems.qmd
          - text: "Infrastructure"
            href: api/infra.qmd
          - text: "Core"
            href: api/core.qmd
          - text: "Solvers"
            href: api/core.solver.qmd

      - section: "Community"
        contents:
          - for-students.qmd
          - for-instructors.qmd
          - for-engineers.qmd
          - whitepaper.qmd
          - contributing.qmd

  # Footer — ecosystem pattern (matches Kits)
  page-footer:
    left: |
      &copy; 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="../">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl

format:
  html:
    theme:
      light:
        - default
        - styles/style.scss
      dark:
        - default
        - styles/style.scss
        - styles/dark-mode.scss
    respect-user-color-scheme: true
    css: styles/landing.css
    toc: true
    toc-depth: 4
    toc-title: "On this page"
    number-sections: false
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    highlight-style: github
    link-external-icon: false
    link-external-newwindow: false
    anchor-sections: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
          <meta name="theme-color" content="#0284C7">

quartodoc:
  package: mlsysim
  dir: api
  title: API Reference
  sections:
    - title: Core API
      desc: Primary objects and solvers.
      contents:
        - hardware
        - models
        - infra
        - systems
        - core
        - core.solver.SingleNodeSolver
        - core.solver.ServingSolver
        - core.solver.DistributedSolver
        - core.solver.DataSolver
        - core.solver.ScalingSolver
        - core.solver.OrchestrationSolver
        - core.solver.CompressionSolver
        - core.solver.ContinuousBatchingSolver
        - core.solver.WeightStreamingSolver
        - core.solver.TailLatencySolver
        - core.solver.SustainabilitySolver
        - core.solver.EconomicsSolver
        - core.solver.ReliabilitySolver
        - core.solver.CheckpointSolver
