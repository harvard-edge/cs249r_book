<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 28" width="180" height="28">
  <!-- Layer stack icon (representing the 5-layer systems stack) -->
  <rect x="1" y="5" width="18" height="3" rx="1.5" fill="#0284C7"/>
  <rect x="1" y="12" width="18" height="3" rx="1.5" fill="#0284C7" opacity="0.55"/>
  <rect x="1" y="19" width="18" height="3" rx="1.5" fill="#0284C7" opacity="0.25"/>

  <!-- MLSYSIM wordmark — shared S highlighted in accent -->
  <text x="26" y="22"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif"
    font-weight="800" font-size="20" letter-spacing="0.5">
    <tspan fill="#0F172A">MLSY</tspan><tspan fill="#0284C7">S</tspan><tspan fill="#0F172A">IM</tspan>
  </text>
</svg>
