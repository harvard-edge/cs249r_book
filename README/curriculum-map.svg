<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 512"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="840" height="512" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== TEXTBOOK (Harvard Crimson #A51C30) ===== -->
  <rect x="220" y="14" width="400" height="82" rx="5" fill="#f5e1e4" stroke="#A51C30" stroke-width="1.5"/>
  <text x="420" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Textbook</text>
  <text x="420" y="58" text-anchor="middle" font-size="10" fill="#555">Current edition live  |  Two-volume split coming Summer 2026</text>
  <text x="420" y="74" text-anchor="middle" font-size="8.5" fill="#999">Theory, mental models, quantitative reasoning</text>
  <text x="420" y="88" text-anchor="middle" font-size="8" font-weight="700" fill="#A51C30">(Read)</text>

  <!-- ===== Arrows: Textbook to four boxes ===== -->
  <line x1="310" y1="96" x2="130" y2="152" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="96" x2="330" y2="152" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="470" y1="96" x2="510" y2="152" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="96" x2="710" y2="152" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== FOUR HANDS-ON PATHS ===== -->

  <!-- Labs (Labs Blue #2563EB) -->
  <rect x="30" y="154" width="190" height="90" rx="5" fill="#dbeafe" stroke="#2563EB" stroke-width="1.5"/>
  <text x="125" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Labs</text>
  <text x="125" y="198" text-anchor="middle" font-size="9" fill="#555">Explore trade-offs</text>
  <text x="125" y="214" text-anchor="middle" font-size="8.5" fill="#999">Marimo notebooks</text>
  <text x="125" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#2563EB">(Reason)</text>

  <!-- TinyTorch (TinyTorch Amber #D4740C) -->
  <rect x="235" y="154" width="190" height="90" rx="5" fill="#fef0e0" stroke="#D4740C" stroke-width="1.5"/>
  <text x="330" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tiny&#x1F525;Torch</text>
  <text x="330" y="198" text-anchor="middle" font-size="9" fill="#555">Build from scratch</text>
  <text x="330" y="214" text-anchor="middle" font-size="8.5" fill="#999">20 modules</text>
  <text x="330" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#D4740C">(Build)</text>

  <!-- MLSys·im (Cyan #0284C7) -->
  <rect x="440" y="154" width="190" height="90" rx="5" fill="#e0f2fe" stroke="#0284C7" stroke-width="1.5"/>
  <text x="535" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#333">MLSys&#xB7;im</text>
  <text x="535" y="198" text-anchor="middle" font-size="9" fill="#555">Model systems</text>
  <text x="535" y="214" text-anchor="middle" font-size="8.5" fill="#999">Chip to fleet physics</text>
  <text x="535" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#0284C7">(Model)</text>

  <!-- Hardware Kits (Kits Teal #148F77) -->
  <rect x="645" y="154" width="190" height="90" rx="5" fill="#d5f0eb" stroke="#148F77" stroke-width="1.5"/>
  <text x="740" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Hardware Kits</text>
  <text x="740" y="198" text-anchor="middle" font-size="9" fill="#555">Deploy to real devices</text>
  <text x="740" y="214" text-anchor="middle" font-size="8.5" fill="#999">Arduino, Pi, Jetson</text>
  <text x="740" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#148F77">(Deploy)</text>

  <!-- ===== Arrows: four boxes converge to Interview ===== -->
  <line x1="125" y1="244" x2="340" y2="312" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="330" y1="244" x2="390" y2="312" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="535" y1="244" x2="450" y2="312" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="740" y1="244" x2="500" y2="312" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ===== STAFFML ===== -->
  <rect x="240" y="314" width="360" height="82" rx="5" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="420" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#333">StaffML: Interview Playbook  <tspan font-size="9" font-weight="400" fill="#999">(coming soon)</tspan></text>
  <text x="420" y="356" text-anchor="middle" font-size="9.5" fill="#555">Prove you can think like an AI systems engineer</text>
  <text x="420" y="372" text-anchor="middle" font-size="8.5" fill="#999">Systems design questions  ·  Cloud, Edge, Mobile, TinyML</text>
  <text x="420" y="388" text-anchor="middle" font-size="8" font-weight="700" fill="#666">(Prove)</text>

  <!-- ===== EDUCATOR BAR (Instructors Indigo #6366f1) ===== -->
  <rect x="30" y="422" width="805" height="44" rx="5" fill="#f0f0f7" stroke="#6366f1" stroke-width="1.2"/>
  <text x="420" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#333">For Educators:  Instructor Hub  |  Lecture Slides  |  Newsletter</text>
  <text x="420" y="456" text-anchor="middle" font-size="8" font-weight="700" fill="#6366f1">(Teach)</text>

  <!-- ===== LEARNING PATH TAGLINE ===== -->
  <text x="420" y="500" text-anchor="middle" font-size="12" font-weight="700">
    <tspan fill="#A51C30">Read</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#2563EB">Reason</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#D4740C">Build</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#0284C7">Model</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#148F77">Deploy</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#666">Prove</tspan>
    <tspan fill="#bbb"> &#x2192; </tspan>
    <tspan fill="#6366f1">Teach</tspan>
  </text>

</svg>
