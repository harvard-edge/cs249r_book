<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="840" height="520" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== TEXTBOOK ===== -->
  <rect x="220" y="32" width="400" height="82" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="58" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Textbook</text>
  <text x="420" y="76" text-anchor="middle" font-size="10" fill="#555">Current edition live  |  Two-volume split coming Summer 2026</text>
  <text x="420" y="92" text-anchor="middle" font-size="8.5" fill="#999">Theory, mental models, quantitative reasoning</text>
  <text x="420" y="106" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">(Read)</text>

  <!-- ===== Arrows: Textbook to four boxes ===== -->
  <line x1="310" y1="114" x2="130" y2="170" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="114" x2="330" y2="170" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="470" y1="114" x2="510" y2="170" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="114" x2="710" y2="170" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== FOUR HANDS-ON PATHS ===== -->

  <!-- Labs -->
  <rect x="30" y="172" width="190" height="90" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="125" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Labs</text>
  <text x="125" y="216" text-anchor="middle" font-size="9" fill="#555">Explore trade-offs</text>
  <text x="125" y="232" text-anchor="middle" font-size="8.5" fill="#999">Marimo notebooks</text>
  <text x="125" y="248" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">(Reason)</text>

  <!-- TinyTorch -->
  <rect x="235" y="172" width="190" height="90" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="330" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tiny&#x1F525;Torch</text>
  <text x="330" y="216" text-anchor="middle" font-size="9" fill="#555">Build from scratch</text>
  <text x="330" y="232" text-anchor="middle" font-size="8.5" fill="#999">20 modules</text>
  <text x="330" y="248" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">(Build)</text>

  <!-- Modeling -->
  <rect x="440" y="172" width="190" height="90" rx="5" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="535" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#333">MLSys&#xB7;im</text>
  <text x="535" y="216" text-anchor="middle" font-size="9" fill="#555">Model systems</text>
  <text x="535" y="232" text-anchor="middle" font-size="8.5" fill="#999">Chip to fleet physics</text>
  <text x="535" y="248" text-anchor="middle" font-size="8" font-weight="700" fill="#2d7a2d">(Reason)</text>

  <!-- Hardware Kits -->
  <rect x="645" y="172" width="190" height="90" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="740" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Hardware Kits</text>
  <text x="740" y="216" text-anchor="middle" font-size="9" fill="#555">Deploy to real devices</text>
  <text x="740" y="232" text-anchor="middle" font-size="8.5" fill="#999">Arduino, Pi, Jetson</text>
  <text x="740" y="248" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">(Deploy)</text>

  <!-- ===== Arrows: four boxes converge to Interview ===== -->
  <line x1="125" y1="262" x2="340" y2="330" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="330" y1="262" x2="390" y2="330" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="535" y1="262" x2="450" y2="330" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="740" y1="262" x2="500" y2="330" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ===== INTERVIEW PLAYBOOK ===== -->
  <rect x="240" y="332" width="360" height="82" rx="5" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="420" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Interview Playbook</text>
  <text x="420" y="374" text-anchor="middle" font-size="9.5" fill="#555">Prove you can think like an AI systems engineer</text>
  <text x="420" y="390" text-anchor="middle" font-size="8.5" fill="#999">40+ systems design questions  ·  Cloud, Edge, Mobile, TinyML</text>
  <text x="420" y="406" text-anchor="middle" font-size="8" font-weight="700" fill="#666">(Prove)</text>

  <!-- ===== EDUCATOR BAR ===== -->
  <rect x="30" y="440" width="780" height="34" rx="4" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="420" y="462" text-anchor="middle" font-size="9.5" fill="#888">For Educators:  Instructor Hub  |  Lecture Slides  |  Newsletter</text>

  <!-- ===== LEARNING PATH TAGLINE ===== -->
  <text x="420" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Read &#x2192; Build &#x2192; Reason &#x2192; Deploy &#x2192; Prove &#x2192; Teach</text>

</svg>
