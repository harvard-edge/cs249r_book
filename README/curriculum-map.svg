<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="840" height="460" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== TEXTBOOK ===== -->
  <rect x="220" y="32" width="400" height="72" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Textbook</text>
  <text x="420" y="78" text-anchor="middle" font-size="10" fill="#555">Volume I: Foundations  |  Volume II: At Scale</text>
  <text x="420" y="94" text-anchor="middle" font-size="8.5" fill="#999">Theory, mental models, quantitative reasoning</text>

  <!-- ===== Arrows: Textbook to four boxes ===== -->
  <line x1="310" y1="104" x2="130" y2="160" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="104" x2="330" y2="160" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="470" y1="104" x2="510" y2="160" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="104" x2="710" y2="160" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== FOUR HANDS-ON PATHS ===== -->

  <!-- Labs -->
  <rect x="30" y="162" width="190" height="80" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="125" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Labs</text>
  <text x="125" y="210" text-anchor="middle" font-size="9" fill="#555">Explore trade-offs</text>
  <text x="125" y="226" text-anchor="middle" font-size="8.5" fill="#999">Marimo notebooks</text>

  <!-- TinyTorch -->
  <rect x="235" y="162" width="190" height="80" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="330" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tiny&#x1F525;Torch</text>
  <text x="330" y="210" text-anchor="middle" font-size="9" fill="#555">Build from scratch</text>
  <text x="330" y="226" text-anchor="middle" font-size="8.5" fill="#999">20 modules</text>

  <!-- Modeling -->
  <rect x="440" y="162" width="190" height="80" rx="5" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="535" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#333">MLSys&#xB7;im</text>
  <text x="535" y="210" text-anchor="middle" font-size="9" fill="#555">Infrastructure modeling</text>
  <text x="535" y="226" text-anchor="middle" font-size="8.5" fill="#999">Chip to fleet physics</text>

  <!-- Hardware Kits -->
  <rect x="645" y="162" width="190" height="80" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="740" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Hardware Kits</text>
  <text x="740" y="210" text-anchor="middle" font-size="9" fill="#555">Deploy to real devices</text>
  <text x="740" y="226" text-anchor="middle" font-size="8.5" fill="#999">Arduino, Pi, Jetson</text>

  <!-- ===== Arrows: four boxes converge to Interview ===== -->
  <line x1="125" y1="242" x2="340" y2="310" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="330" y1="242" x2="390" y2="310" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="535" y1="242" x2="450" y2="310" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="740" y1="242" x2="500" y2="310" stroke="#ccc" stroke-width="1.0" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ===== INTERVIEW PLAYBOOK ===== -->
  <rect x="240" y="312" width="360" height="72" rx="5" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="420" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Interview Playbook</text>
  <text x="420" y="360" text-anchor="middle" font-size="9.5" fill="#555">40+ systems design questions</text>
  <text x="420" y="376" text-anchor="middle" font-size="8.5" fill="#999">Cloud, Edge, Mobile, TinyML</text>

  <!-- ===== EDUCATOR BAR ===== -->
  <rect x="30" y="414" width="780" height="34" rx="4" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="420" y="436" text-anchor="middle" font-size="9.5" fill="#888">For Educators:  Instructor Hub  |  Lecture Slides  |  Newsletter</text>

</svg>
