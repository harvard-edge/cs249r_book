<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500">
  <defs>
    <marker id="time-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#bbb"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#fff"/>

  <!-- Section A: Without Prefetching (Sequential) -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Without Prefetching (Sequential)</text>

  <!-- Row labels -->
  <text x="80" y="64" text-anchor="end" font-size="10" fill="#555" font-weight="600">Storage</text>
  <text x="80" y="104" text-anchor="end" font-size="10" fill="#555" font-weight="600">CPU</text>
  <text x="80" y="144" text-anchor="end" font-size="10" fill="#555" font-weight="600">GPU</text>

  <!-- Sequential timeline -->
  <!-- Batch 1 -->
  <rect x="90" y="50" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="130" y="64" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B1</text>

  <rect x="170" y="90" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="104" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B1</text>

  <rect x="230" y="130" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="144" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B1</text>

  <!-- Batch 2 -->
  <rect x="310" y="50" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="350" y="64" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B2</text>

  <rect x="390" y="90" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="420" y="104" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B2</text>

  <rect x="450" y="130" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="490" y="144" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B2</text>

  <!-- Idle indicators -->
  <rect x="90" y="90" width="80" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,4"/>
  
  <rect x="90" y="130" width="140" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="160" y="144" text-anchor="middle" font-size="8" fill="#c44" font-style="italic">GPU idle</text>
  
  <rect x="170" y="50" width="140" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="240" y="64" text-anchor="middle" font-size="8" fill="#c44" font-style="italic">idle</text>

  <!-- Time arrow for sequential -->
  <line x1="90" y1="170" x2="540" y2="170" stroke="#bbb" stroke-width="1.2" marker-end="url(#time-arr)"/>
  <text x="550" y="174" font-size="8" fill="#555">time</text>

  <!-- Total time bracket -->
  <line x1="90" y1="190" x2="530" y2="190" stroke="#c44" stroke-width="1.5"/>
  <line x1="90" y1="180" x2="90" y2="200" stroke="#c44" stroke-width="1.5"/>
  <line x1="530" y1="180" x2="530" y2="200" stroke="#c44" stroke-width="1.5"/>
  <text x="310" y="214" text-anchor="middle" font-size="8" fill="#c44" font-weight="600">Total: 2 batches = 6 sequential stages</text>

  <!-- Divider -->
  <line x1="30" y1="230" x2="650" y2="230" stroke="#bbb" stroke-width="1.5"/>

  <!-- Section B: With Prefetching (Async Pipeline) -->
  <text x="340" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#333">With Prefetching (Async Pipeline)</text>

  <!-- Row labels -->
  <text x="80" y="284" text-anchor="end" font-size="10" fill="#555" font-weight="600">Storage</text>
  <text x="80" y="324" text-anchor="end" font-size="10" fill="#555" font-weight="600">CPU</text>
  <text x="80" y="364" text-anchor="end" font-size="10" fill="#555" font-weight="600">GPU</text>

  <!-- Pipelined timeline -->
  <!-- Batch 1 -->
  <rect x="90" y="270" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="130" y="284" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B1</text>

  <rect x="170" y="310" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="324" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B1</text>

  <rect x="230" y="350" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="364" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B1</text>

  <!-- Batch 2 -->
  <rect x="170" y="270" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="210" y="284" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B2</text>

  <rect x="250" y="310" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="280" y="324" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B2</text>

  <rect x="310" y="350" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="350" y="364" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B2</text>

  <!-- Batch 3 -->
  <rect x="250" y="270" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="290" y="284" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B3</text>

  <rect x="330" y="310" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="360" y="324" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B3</text>

  <rect x="390" y="350" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="430" y="364" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B3</text>

  <!-- Batch 4 -->
  <rect x="330" y="270" width="80" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="370" y="284" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Read B4</text>

  <rect x="410" y="310" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="440" y="324" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Prep B4</text>

  <rect x="470" y="350" width="80" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="510" y="364" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Train B4</text>

  <!-- Prefetch annotation -->
  <rect x="430" y="260" width="120" height="40" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="490" y="276" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">Prefetch depth = 2</text>
  <text x="490" y="290" text-anchor="middle" font-size="8" fill="#555">2 batches in flight</text>

  <!-- Time arrow for pipelined -->
  <line x1="90" y1="390" x2="560" y2="390" stroke="#bbb" stroke-width="1.2" marker-end="url(#time-arr)"/>
  <text x="570" y="394" font-size="8" fill="#555">time</text>

  <!-- Total time bracket -->
  <line x1="90" y1="410" x2="550" y2="410" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="90" y1="400" x2="90" y2="420" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="550" y1="400" x2="550" y2="420" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="320" y="434" text-anchor="middle" font-size="8" fill="#2d7a2d" font-weight="600">4 batches in time of ~3 sequential; GPU never idles after ramp-up</text>

  <!-- Bottom callout -->
  <rect x="100" y="450" width="480" height="30" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="340" y="470" text-anchor="middle" font-size="10" fill="#a31f34" font-weight="600">Overlap hides storage latency: the GPU processes while the next batch loads</text>
</svg>