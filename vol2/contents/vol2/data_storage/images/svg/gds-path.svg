<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 510">
  <defs>
    <marker id="trad-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="gds-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="510" fill="#fff"/>

  <!-- Section A: Traditional Path -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">(a) Traditional Path: CPU Bounce Buffer</text>

  <!-- NVMe -->
  <rect x="50" y="60" width="120" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="110" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">NVMe SSD</text>
  <text x="110" y="95" text-anchor="middle" font-size="8" fill="#555">7 GB/s seq read</text>

  <!-- Arrow 1: NVMe -> CPU RAM -->
  <line x1="170" y1="85" x2="210" y2="85" stroke="#c44" stroke-width="1.5" marker-end="url(#trad-arr)"/>
  <text x="190" y="78" text-anchor="middle" font-size="7.5" fill="#c44" font-weight="600">PCIe</text>

  <!-- CPU RAM -->
  <rect x="210" y="50" width="120" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">CPU RAM</text>
  <text x="270" y="87" text-anchor="middle" font-size="8.5" fill="#555">(Bounce Buffer)</text>
  <text x="270" y="101" text-anchor="middle" font-size="8" fill="#c44" font-style="italic">Extra copy here</text>

  <!-- Arrow 2: CPU RAM -> CPU -->
  <line x1="330" y1="85" x2="370" y2="85" stroke="#c44" stroke-width="1.5" marker-end="url(#trad-arr)"/>
  <text x="350" y="78" text-anchor="middle" font-size="7.5" fill="#c44" font-weight="600">memcpy</text>

  <!-- CPU -->
  <rect x="370" y="60" width="100" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="420" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="#333">CPU</text>
  <text x="420" y="95" text-anchor="middle" font-size="8" fill="#555">kernel involved</text>

  <!-- Arrow 3: CPU -> GPU HBM -->
  <line x1="470" y1="85" x2="510" y2="85" stroke="#c44" stroke-width="1.5" marker-end="url(#trad-arr)"/>
  <text x="490" y="78" text-anchor="middle" font-size="7.5" fill="#c44" font-weight="600">PCIe</text>

  <!-- GPU HBM -->
  <rect x="510" y="60" width="120" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="570" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">GPU HBM</text>
  <text x="570" y="95" text-anchor="middle" font-size="8" fill="#555">Training data</text>

  <!-- Traditional path summary -->
  <rect x="50" y="140" width="580" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="340" y="155" text-anchor="middle" font-size="9" fill="#c44" font-weight="600">2 PCIe crossings + CPU memcpy overhead + kernel context switches</text>
  <text x="340" y="169" text-anchor="middle" font-size="8.5" fill="#555">Data touches CPU memory before reaching GPU</text>

  <!-- Divider -->
  <line x1="50" y1="200" x2="630" y2="200" stroke="#bbb" stroke-width="1.0"/>

  <!-- Section B: GDS Path -->
  <text x="340" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#333">(b) GPUDirect Storage: CPU Bypass</text>

  <!-- NVMe -->
  <rect x="50" y="260" width="120" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="110" y="281" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">NVMe SSD</text>
  <text x="110" y="295" text-anchor="middle" font-size="8" fill="#555">7 GB/s seq read</text>

  <!-- Direct arrow: NVMe -> GPU HBM -->
  <line x1="170" y1="285" x2="510" y2="285" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#gds-arr)"/>
  <text x="340" y="278" text-anchor="middle" font-size="9" fill="#3d9e5a" font-weight="700">PCIe Direct DMA (GPU-initiated)</text>

  <!-- GPU HBM -->
  <rect x="510" y="260" width="120" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="570" y="281" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">GPU HBM</text>
  <text x="570" y="295" text-anchor="middle" font-size="8" fill="#555">Training data</text>

  <!-- CPU shown as bypassed -->
  <rect x="370" y="320" width="100" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" stroke-dasharray="4,3"/>
  <text x="420" y="336" text-anchor="middle" font-size="9" fill="#bbb" font-weight="600">CPU</text>
  <text x="420" y="350" text-anchor="middle" font-size="7.5" fill="#bbb" font-style="italic">bypassed</text>

  <!-- GDS path summary -->
  <rect x="50" y="380" width="580" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="340" y="395" text-anchor="middle" font-size="9" fill="#3d9e5a" font-weight="600">1 PCIe crossing, no CPU involvement, no bounce buffer</text>
  <text x="340" y="409" text-anchor="middle" font-size="8.5" fill="#555">GPU DMA engine reads directly from NVMe controller</text>

  <!-- Performance comparison -->
  <rect x="50" y="440" width="580" height="40" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="340" y="455" text-anchor="middle" font-size="9.5" fill="#a31f34" font-weight="700">Performance gain with GDS</text>
  <text x="340" y="469" text-anchor="middle" font-size="9" fill="#555">~30% lower latency  |  ~2x higher effective bandwidth  |  Zero CPU overhead</text>
</svg>