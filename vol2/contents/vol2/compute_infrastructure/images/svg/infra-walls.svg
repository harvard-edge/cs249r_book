<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <defs>
    <marker id="road-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- Road / timeline base -->
  <rect x="20" y="240" width="640" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <line x1="20" y1="250" x2="640" y2="250" stroke="#bbb" stroke-width="0.8" stroke-dasharray="8,6"/>
  <line x1="640" y1="250" x2="655" y2="250" stroke="#999" stroke-width="1.2" marker-end="url(#road-arr)"/>
  <text x="340" y="280" text-anchor="middle" font-size="9" fill="#999" font-weight="600">SCALING JOURNEY</text>

  <!-- Wall 1: Power Wall -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="120" height="180" fill="#cfe2f3"/>
    <rect x="0" y="0" width="120" height="30" fill="#4a90c4"/>
    <rect x="0" y="10" width="120" height="20" fill="#4a90c4"/>
    <rect x="0" y="0" width="120" height="180" fill="none" stroke="#4a90c4" stroke-width="1.4"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Power Wall</text>
    <text x="60" y="52" text-anchor="middle" font-size="9" fill="#555" font-weight="600">Datacenter power</text>
    <text x="60" y="66" text-anchor="middle" font-size="9" fill="#555" font-weight="600">delivery limits</text>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#4a90c4" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">~40 MW facility</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">PUE 1.1 -- 1.5</text>
    <line x1="10" y1="130" x2="110" y2="130" stroke="#4a90c4" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="146" text-anchor="middle" font-size="8.5" fill="#555">Mitigation:</text>
    <text x="60" y="158" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">Liquid cooling,</text>
    <text x="60" y="170" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">48V DC distribution</text>
  </g>

  <!-- Wall 2: Memory Wall -->
  <g transform="translate(200, 40)">
    <rect x="0" y="0" width="120" height="180" fill="#d4edda"/>
    <rect x="0" y="0" width="120" height="30" fill="#3d9e5a"/>
    <rect x="0" y="10" width="120" height="20" fill="#3d9e5a"/>
    <rect x="0" y="0" width="120" height="180" fill="none" stroke="#3d9e5a" stroke-width="1.4"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Memory Wall</text>
    <text x="60" y="52" text-anchor="middle" font-size="9" fill="#555" font-weight="600">HBM bandwidth gap</text>
    <text x="60" y="66" text-anchor="middle" font-size="9" fill="#555" font-weight="600">vs. compute growth</text>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#3d9e5a" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">3.35 TB/s HBM3</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">vs. 2K TFLOPS</text>
    <line x1="10" y1="130" x2="110" y2="130" stroke="#3d9e5a" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="146" text-anchor="middle" font-size="8.5" fill="#555">Mitigation:</text>
    <text x="60" y="158" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">HBM stacking,</text>
    <text x="60" y="170" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">on-chip SRAM caching</text>
  </g>

  <!-- Wall 3: Communication Wall -->
  <g transform="translate(360, 40)">
    <rect x="0" y="0" width="120" height="180" fill="#fdebd0"/>
    <rect x="0" y="0" width="120" height="30" fill="#c87b2a"/>
    <rect x="0" y="10" width="120" height="20" fill="#c87b2a"/>
    <rect x="0" y="0" width="120" height="180" fill="none" stroke="#c87b2a" stroke-width="1.4"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Comm. Wall</text>
    <text x="60" y="52" text-anchor="middle" font-size="9" fill="#555" font-weight="600">Network bisection</text>
    <text x="60" y="66" text-anchor="middle" font-size="9" fill="#555" font-weight="600">bandwidth limit</text>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#c87b2a" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">400 Gb/s NDR IB</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">per port</text>
    <line x1="10" y1="130" x2="110" y2="130" stroke="#c87b2a" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="146" text-anchor="middle" font-size="8.5" fill="#555">Mitigation:</text>
    <text x="60" y="158" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">Fat-tree topology,</text>
    <text x="60" y="170" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">gradient compression</text>
  </g>

  <!-- Wall 4: Reliability Wall -->
  <g transform="translate(520, 40)">
    <rect x="0" y="0" width="120" height="180" fill="#f9d6d5"/>
    <rect x="0" y="0" width="120" height="30" fill="#c44"/>
    <rect x="0" y="10" width="120" height="20" fill="#c44"/>
    <rect x="0" y="0" width="120" height="180" fill="none" stroke="#c44" stroke-width="1.4"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Reliability Wall</text>
    <text x="60" y="52" text-anchor="middle" font-size="9" fill="#555" font-weight="600">MTBF decreases</text>
    <text x="60" y="66" text-anchor="middle" font-size="9" fill="#555" font-weight="600">with fleet scale</text>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#c44" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">MTBF ~ 4.4 hrs</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">at 25K GPUs</text>
    <line x1="10" y1="130" x2="110" y2="130" stroke="#c44" stroke-width="0.4" opacity="0.5"/>
    <text x="60" y="146" text-anchor="middle" font-size="8.5" fill="#555">Mitigation:</text>
    <text x="60" y="158" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">Async checkpointing,</text>
    <text x="60" y="170" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">automated recovery</text>
  </g>

  <!-- Bottom annotations -->
  <text x="100" y="310" text-anchor="middle" font-size="8.5" fill="#4a90c4" font-weight="600">Single Node</text>
  <text x="260" y="310" text-anchor="middle" font-size="8.5" fill="#3d9e5a" font-weight="600">8-GPU Node</text>
  <text x="420" y="310" text-anchor="middle" font-size="8.5" fill="#c87b2a" font-weight="600">Multi-Node Cluster</text>
  <text x="580" y="310" text-anchor="middle" font-size="8.5" fill="#c44" font-weight="600">10K+ GPU Fleet</text>

  <!-- Scale indicator at bottom -->
  <line x1="40" y1="340" x2="640" y2="340" stroke="#bbb" stroke-width="0.8"/>
  <rect x="37" y="337" width="6" height="6" fill="#999"/>
  <text x="40" y="360" text-anchor="middle" font-size="8" fill="#999">1 GPU</text>

  <rect x="197" y="337" width="6" height="6" fill="#999"/>
  <text x="200" y="360" text-anchor="middle" font-size="8" fill="#999">8 GPUs</text>

  <rect x="357" y="337" width="6" height="6" fill="#999"/>
  <text x="360" y="360" text-anchor="middle" font-size="8" fill="#999">1,000 GPUs</text>

  <rect x="517" y="337" width="6" height="6" fill="#999"/>
  <text x="520" y="360" text-anchor="middle" font-size="8" fill="#999">25,000 GPUs</text>

  <!-- Dominance note -->
  <rect x="170" y="390" width="340" height="30" fill="#fff" stroke="#a31f34" stroke-width="1.0"/>
  <text x="340" y="410" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="600">Each wall creates the dominant constraint at its scale level</text>
</svg>