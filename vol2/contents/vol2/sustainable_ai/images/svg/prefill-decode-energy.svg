<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Section divider at x=340 ===== -->
  <line x1="340" y1="10" x2="340" y2="450" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Prefill Phase ===== -->

  <!-- Panel header -->
  <rect x="20" y="18" width="300" height="36" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Prefill Phase</text>
  <text x="170" y="48" text-anchor="middle" font-size="9" fill="#4a90c4">Compute-Bound · High Arithmetic Intensity</text>

  <!-- GPU utilization bar background -->
  <rect x="40" y="75" width="260" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <!-- Active compute bar: ~90% -->
  <rect x="40" y="75" width="234" height="30" fill="#4a90c4"/>
  <!-- Labels -->
  <text x="170" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">~90% Active Compute</text>
  <text x="170" y="122" text-anchor="middle" font-size="9" fill="#555">GPU Utilization</text>

  <!-- Energy breakdown bars -->
  <text x="40" y="150" font-size="10" font-weight="700" fill="#333">Energy per Token (relative)</text>

  <!-- Useful compute energy -->
  <rect x="40" y="160" width="234" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="157" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Compute Energy (dominant)</text>

  <!-- Small idle/memory energy -->
  <rect x="40" y="188" width="26" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <line x1="66" y1="199" x2="76" y2="199" stroke="#bbb" stroke-width="0.8"/>
  <text x="80" y="203" font-size="9" fill="#555">Memory overhead</text>

  <!-- Arithmetic intensity annotation -->
  <rect x="40" y="228" width="260" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="170" y="246" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">High Arithmetic Intensity</text>
  <text x="170" y="260" text-anchor="middle" font-size="9" fill="#3d9e5a">Thousands of MACs per byte read</text>
  <text x="170" y="272" text-anchor="middle" font-size="9" fill="#3d9e5a">from HBM → near-peak pJ/FLOP</text>

  <!-- Energy/token annotation -->
  <rect x="68" y="296" width="204" height="38" fill="#4a90c4" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Energy/token: LOW</text>
  <text x="170" y="328" text-anchor="middle" font-size="9" fill="#cfe2f3">~1× baseline (efficient)</text>

  <!-- Use case example -->
  <rect x="40" y="350" width="260" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="170" y="368" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Example: Processing prompt tokens</text>
  <text x="170" y="382" text-anchor="middle" font-size="9" fill="#555">All 1,000 prompt tokens processed</text>
  <text x="170" y="394" text-anchor="middle" font-size="9" fill="#555">in one parallel batch pass</text>
  <text x="170" y="406" text-anchor="middle" font-size="9" fill="#3d9e5a">→ Compute units fully occupied</text>

  <!-- ===== RIGHT PANEL: Decode Phase ===== -->

  <!-- Panel header -->
  <rect x="360" y="18" width="300" height="36" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="510" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">Decode Phase</text>
  <text x="510" y="48" text-anchor="middle" font-size="9" fill="#c44">Bandwidth-Bound · Low Arithmetic Intensity</text>

  <!-- GPU utilization bar background -->
  <rect x="380" y="75" width="260" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <!-- Active compute bar: ~10% -->
  <rect x="380" y="75" width="26" height="30" fill="#4a90c4"/>
  <!-- Idle bar: ~90% -->
  <rect x="406" y="75" width="234" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <!-- Labels -->
  <text x="523" y="95" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">~90% Idle (waiting on HBM)</text>
  <text x="510" y="122" text-anchor="middle" font-size="9" fill="#555">GPU Utilization</text>

  <!-- Energy breakdown bars -->
  <text x="380" y="150" font-size="10" font-weight="700" fill="#333">Energy per Token (relative)</text>

  <!-- Wasted static power: large red bar -->
  <rect x="380" y="160" width="234" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="497" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Static Leakage &amp; Clock Power (wasted)</text>

  <!-- Small useful compute -->
  <rect x="380" y="188" width="26" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="406" y1="199" x2="416" y2="199" stroke="#bbb" stroke-width="0.8"/>
  <text x="420" y="203" font-size="9" fill="#555">Useful compute</text>

  <!-- Arithmetic intensity annotation -->
  <rect x="380" y="228" width="260" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="510" y="246" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Low Arithmetic Intensity</text>
  <text x="510" y="260" text-anchor="middle" font-size="9" fill="#c44">Entire model weights re-read from</text>
  <text x="510" y="272" text-anchor="middle" font-size="9" fill="#c44">HBM to generate ONE token</text>

  <!-- Energy/token annotation -->
  <rect x="408" y="296" width="204" height="38" fill="#a31f34" stroke="#c44" stroke-width="1.5"/>
  <text x="510" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Energy/token: HIGH</text>
  <text x="510" y="328" text-anchor="middle" font-size="9" fill="#f9d6d5">10–50× prefill (memory-bound)</text>

  <!-- Use case example -->
  <rect x="380" y="350" width="260" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="510" y="368" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Example: Generating output tokens</text>
  <text x="510" y="382" text-anchor="middle" font-size="9" fill="#555">1,000 tokens = 1,000 sequential steps</text>
  <text x="510" y="394" text-anchor="middle" font-size="9" fill="#555">each loading full weight matrix</text>
  <text x="510" y="406" text-anchor="middle" font-size="9" fill="#c44">→ Compute units mostly idle</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="352.0" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Autoregressive decode is memory-bound: generating 1,000 tokens serially consumes 10–50× the energy of processing the same tokens in a single prefill batch.</text>
</svg>