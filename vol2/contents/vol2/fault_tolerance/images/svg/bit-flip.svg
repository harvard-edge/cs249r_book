<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460">

  <!-- Background -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#fff"/>

  <!-- Section headers -->
  <text x="185" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Original Value: 74</text>
  <text x="525" y="36" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">Corrupted Value: 78</text>

  <!-- Left word: 01001010 -->
  <text x="55" y="72" font-size="10" fill="#999">bit:   7    6    5    4    3    2    1    0</text>
  <text x="395" y="72" font-size="10" fill="#999">bit:   7    6    5    4    3    2    1    0</text>

  <!-- Draw bit cells for left word -->
  <g>
    <!-- bit 7: 0 -->
    <rect x="55" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="70" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 6: 1 -->
    <rect x="93" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="108" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 5: 0 -->
    <rect x="131" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="146" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 4: 0 -->
    <rect x="169" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="184" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 3: 1 -->
    <rect x="207" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="222" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 2: 0 -->
    <rect x="245" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="260" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 1: 1 -->
    <rect x="283" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="298" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 0: 0 -->
    <rect x="321" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="336" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
  </g>

  <!-- Byte labels under left word -->
  <text x="70" y="148" text-anchor="middle" font-size="8.5" fill="#999">128</text>
  <text x="108" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">64</text>
  <text x="146" y="148" text-anchor="middle" font-size="8.5" fill="#999">32</text>
  <text x="184" y="148" text-anchor="middle" font-size="8.5" fill="#999">16</text>
  <text x="222" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">8</text>
  <text x="260" y="148" text-anchor="middle" font-size="8.5" fill="#999">4</text>
  <text x="298" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">2</text>
  <text x="336" y="148" text-anchor="middle" font-size="8.5" fill="#999">1</text>

  <!-- Calculation for 74 -->
  <text x="185" y="172" text-anchor="middle" font-size="10" fill="#555">= 64 + 8 + 2 = 74 (0x4A)</text>

  <!-- Right word cells: shifted by +30 to satisfy 40px gutter requirement -->
  <g>
    <!-- bit 7: 0 -->
    <rect x="395" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="410" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 6: 1 -->
    <rect x="433" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="448" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 5: 0 -->
    <rect x="471" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="486" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 4: 0 -->
    <rect x="509" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="524" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
    <!-- bit 3: 1 (same) -->
    <rect x="547" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="562" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 2: FLIPPED 0→1 (highlight RED) -->
    <rect x="585" y="78" width="30" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="2.5"/>
    <text x="600" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">1</text>
    <!-- bit 1: 1 -->
    <rect x="623" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="638" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">1</text>
    <!-- bit 0: 0 -->
    <rect x="661" y="82" width="30" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="676" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#333">0</text>
  </g>

  <!-- Byte labels under right word -->
  <text x="410" y="148" text-anchor="middle" font-size="8.5" fill="#999">128</text>
  <text x="448" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">64</text>
  <text x="486" y="148" text-anchor="middle" font-size="8.5" fill="#999">32</text>
  <text x="524" y="148" text-anchor="middle" font-size="8.5" fill="#999">16</text>
  <text x="562" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">8</text>
  <text x="600" y="148" text-anchor="middle" font-size="8.5" fill="#c44" font-weight="700">4 ← flipped</text>
  <text x="638" y="148" text-anchor="middle" font-size="8.5" fill="#333" font-weight="600">2</text>
  <text x="676" y="148" text-anchor="middle" font-size="8.5" fill="#999">1</text>

  <!-- Calculation for 78 -->
  <text x="525" y="172" text-anchor="middle" font-size="10" fill="#c44">= 64 + 8 + 4 + 2 = 78 (0x4E)</text>

  <!-- Flipped bit annotation arrow -->
  <line x1="600" y1="76" x2="600" y2="60" stroke="#c44" stroke-width="1.5"/>
  <text x="600" y="54" text-anchor="middle" font-size="9.5" fill="#c44" font-weight="700">0 → 1</text>
  <text x="600" y="48" text-anchor="middle" font-size="8.5" fill="#c44">bit 2 flipped</text>

  <!-- Divider between words -->
  <line x1="373" y1="70" x2="373" y2="185" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Arrow from original to corrupted -->
  <text x="373" y="106" text-anchor="middle" font-size="12" fill="#c44">→</text>
  <!-- cosmic ray label on arrow -->
  <text x="373" y="126" text-anchor="middle" font-size="7.5" fill="#c44" font-style="italic">SEU</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MEMORY CELL PHYSICAL DIAGRAM (below) -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="55" y="192" width="636" height="210" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="373" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Memory Cell: Physical Bit-Flip Mechanism</text>

  <!-- SRAM cell: two cross-coupled inverters -->
  <!-- Left inverter -->
  <rect x="120" y="230" width="80" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="160" y="240.5" text-anchor="middle" font-size="9" fill="#4a90c4">Inverter 1</text>
  <text x="160" y="255.5" text-anchor="middle" font-size="9" fill="#4a90c4">Q = 0</text>

  <!-- Right inverter -->
  <rect x="240" y="230" width="80" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="280" y="240.5" text-anchor="middle" font-size="9" fill="#4a90c4">Inverter 2</text>
  <text x="280" y="255.5" text-anchor="middle" font-size="9" fill="#4a90c4">Q̄ = 1</text>

  <!-- Cross-coupled lines -->
  <line x1="200" y1="248" x2="240" y2="248" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="200" y1="258" x2="240" y2="258" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="218" y="242.5" text-anchor="middle" font-size="8" fill="#4a90c4">→</text>
  <text x="218" y="257.5" text-anchor="middle" font-size="8" fill="#4a90c4">←</text>

  <!-- Cosmic ray strike - routed orthogonally to top box boundary to prevent text overlaps -->
  <line x1="160" y1="202" x2="160" y2="229" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)" opacity="0.85"/>
  <text x="152" y="208.5" text-anchor="end" font-size="9" fill="#c87b2a" font-weight="700">Cosmic ray /</text>
  <text x="152" y="223.5" text-anchor="end" font-size="9" fill="#c87b2a" font-weight="700">alpha particle</text>

  <!-- Charge deposition cloud (positioned internally to avoid upper label overlap) -->
  <ellipse cx="160" cy="270" rx="22" ry="9" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="264" text-anchor="middle" font-size="8" fill="#c87b2a">charge</text>
  <text x="160" y="278" text-anchor="middle" font-size="8" fill="#c87b2a">deposition</text>

  <!-- After flip annotation -->
  <rect x="120" y="295" width="80" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="160" y="313" text-anchor="middle" font-size="9" fill="#c44">Inverter 1</text>
  <text x="160" y="326" text-anchor="middle" font-size="9" fill="#c44">Q → 1 (flipped!)</text>

  <rect x="240" y="295" width="80" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="280" y="313" text-anchor="middle" font-size="9" fill="#c44">Inverter 2</text>
  <text x="280" y="326" text-anchor="middle" font-size="9" fill="#c44">Q̄ → 0 (flipped!)</text>

  <!-- "Before → After" label -->
  <text x="220" y="290" text-anchor="middle" font-size="8.5" fill="#999">SEU flips stored state:</text>
  <text x="220" y="288" text-anchor="middle" font-size="8" fill="#999"/>

  <!-- SEU annotation box -->
  <rect x="433" y="228" width="228" height="98" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="547" y="248" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Single Event Upset (SEU)</text>
  <text x="547" y="262.5" text-anchor="middle" font-size="9" fill="#555">A high-energy particle deposits</text>
  <text x="547" y="274.5" text-anchor="middle" font-size="9" fill="#555">charge in a transistor, disrupting</text>
  <text x="547" y="288" text-anchor="middle" font-size="9" fill="#555">its stable state and flipping the</text>
  <text x="547" y="303" text-anchor="middle" font-size="9" fill="#555">stored bit without physical damage.</text>
  <text x="547" y="316" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Rate: ~1 bit/GB/month at sea level</text>

  <!-- Bottom footnote -->
  <text x="373" y="423" text-anchor="middle" font-size="9" fill="#bbb" font-style="italic">ECC (Error-Correcting Code) memory detects single-bit flips and corrects them — essential for large-scale ML training</text>
  <text x="373" y="437" text-anchor="middle" font-size="9" fill="#bbb" font-style="italic">Without ECC: 1,024 × 80 GB cluster sees uncorrected corruption every ~21 seconds at sea level</text>

</svg>