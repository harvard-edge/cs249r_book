<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="580" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="360" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Observability: Three Pillars for Distributed ML Systems</text>

  <!-- ===== Pillar 1: Metrics (blue) ===== -->
  <rect x="20" y="40" width="200" height="310" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Metrics</text>
  <text x="120" y="90" text-anchor="middle" font-size="10" fill="#555">Numerical measurements over time</text>

  <line x1="40" y1="100" x2="200" y2="100" stroke="#4a90c4" stroke-width="0.6" opacity="0.5"/>

  <text x="40" y="120" font-size="10" font-weight="700" fill="#333">Infrastructure</text>
  <text x="40" y="140" font-size="10" fill="#555">• GPU / CPU utilization</text>
  <text x="40" y="160" font-size="10" fill="#555">• Memory allocation (HBM)</text>
  <text x="40" y="180" font-size="10" fill="#555">• Network bandwidth, latency</text>

  <text x="40" y="210" font-size="10" font-weight="700" fill="#333">Application</text>
  <text x="40" y="230" font-size="10" fill="#555">• p50 / p99 request latency</text>
  <text x="40" y="250" font-size="10" fill="#555">• Error rate by type</text>
  <text x="40" y="270" font-size="10" fill="#555">• Queue depth, cache hit rate</text>

  <text x="40" y="300" font-size="10" font-weight="700" fill="#333">ML-Specific</text>
  <text x="40" y="320" font-size="10" fill="#555">• Gradient norm per rank</text>
  <text x="40" y="340" font-size="10" fill="#555">• Loss curve, MFU</text>

  <!-- ===== Pillar 2: Logs (green) ===== -->
  <rect x="260" y="40" width="200" height="310" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Logs</text>
  <text x="360" y="90" text-anchor="middle" font-size="10" fill="#555">Discrete events with structured context</text>

  <line x1="280" y1="100" x2="440" y2="100" stroke="#3d9e5a" stroke-width="0.6" opacity="0.5"/>

  <text x="280" y="120" font-size="10" font-weight="700" fill="#333">Severity Levels</text>
  <text x="280" y="140" font-size="10" fill="#555">• DEBUG: diagnostic detail</text>
  <text x="280" y="160" font-size="10" fill="#555">• INFO: operational events</text>
  <text x="280" y="180" font-size="10" fill="#555">• WARN: potential problems</text>
  <text x="280" y="200" font-size="10" fill="#555">• ERROR: operation failures</text>
  <text x="280" y="220" font-size="10" fill="#555">• FATAL: system-wide failures</text>

  <text x="280" y="250" font-size="10" font-weight="700" fill="#333">Structured Format (JSON)</text>
  <rect x="280" y="260" width="160" height="90" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="280" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">{timestamp, level,</text>
  <text x="300" y="300" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve"> trace_id, span_id,</text>
  <text x="300" y="320" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve"> message, gpu_id,</text>
  <text x="300" y="340" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve"> requested_bytes}</text>

  <!-- ===== Pillar 3: Traces (orange) ===== -->
  <rect x="500" y="40" width="200" height="310" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="600" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">Traces</text>
  <text x="600" y="90" text-anchor="middle" font-size="10" fill="#555">Request journeys across components</text>

  <line x1="520" y1="100" x2="680" y2="100" stroke="#c87b2a" stroke-width="0.6" opacity="0.5"/>

  <text x="520" y="120" font-size="10" font-weight="700" fill="#333">Core Concepts</text>
  <text x="520" y="140" font-size="10" fill="#555">• Trace: end-to-end request</text>
  <text x="520" y="160" font-size="10" fill="#555">• Span: single service op</text>
  <text x="520" y="180" font-size="10" fill="#555">• Context: propagated IDs</text>

  <text x="520" y="210" font-size="10" font-weight="700" fill="#333">ML Inference Example</text>
  <rect x="520" y="220" width="160" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="540" y="240" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">api-gateway    5ms</text>
  <text x="540" y="260" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">  feature-svc  15ms</text>
  <text x="540" y="280" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">  inference    45ms</text>
  <text x="540" y="300" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">    preproc    3ms</text>
  <text x="540" y="320" font-size="10" fill="#555" font-family="Courier New, monospace" xml:space="preserve">    model      40ms</text>
  <text x="540" y="340" font-size="10" fill="#c87b2a" font-family="Courier New, monospace" font-weight="700" xml:space="preserve">Total:         68ms</text>

  <!-- ===== Arrows to central correlation engine ===== -->
  <path d="M120,350 L120,390" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M360,350 L360,390" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M600,350 L600,390" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ===== Central Correlation and Alerting Engine ===== -->
  <rect x="20" y="390" width="680" height="140" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="360" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Correlation Engine and Alerting</text>
  <text x="360" y="440" text-anchor="middle" font-size="10" fill="#555">Cross-signal analysis: link metric spike → log event → slow trace span</text>

  <!-- Sub-boxes inside correlation engine -->
  <rect x="60" y="460" width="160" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="140" y="480" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Threshold Alerts</text>
  <text x="140" y="500" text-anchor="middle" font-size="10" fill="#555">PagerDuty / OpsGenie</text>

  <rect x="280" y="460" width="160" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="360" y="480" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Anomaly Detection</text>
  <text x="360" y="500" text-anchor="middle" font-size="10" fill="#555">Loss spike, grad norm outlier</text>

  <rect x="500" y="460" width="160" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="580" y="480" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Root Cause</text>
  <text x="580" y="500" text-anchor="middle" font-size="10" fill="#555">Bottleneck isolation</text>

  <!-- ── Footnote ── -->
  <text x="360" y="560" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Metrics, Logs, and Traces each capture a different dimension; the correlation engine links them to isolate root causes in distributed ML failures</text>
</svg>