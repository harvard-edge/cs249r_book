<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="32" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Fairness Monitoring Pipeline</text>

  <!-- ===== Stage labels (top) ===== -->
  <text x="68" y="58" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Collect</text>
  <text x="214" y="58" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Measure</text>
  <text x="360" y="58" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Evaluate</text>
  <text x="490" y="58" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Respond</text>
  <text x="610" y="58" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Improve</text>

  <!-- ===== Box 1: Model Predictions ===== -->
  <rect x="20" y="68" width="96" height="90" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="68" y="88" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model</text>
  <text x="68" y="101" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Predictions</text>
  <line x1="30" y1="108" x2="106" y2="108" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="68" y="122" font-size="8.5" fill="#555" text-anchor="middle">Inference output</text>
  <text x="68" y="134" font-size="8.5" fill="#555" text-anchor="middle">per request</text>
  <text x="68" y="146" font-size="8.5" fill="#555" text-anchor="middle">with metadata</text>

  <!-- Arrow 1→2 -->
  <line x1="118" y1="113" x2="163" y2="113" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Box 2: Subgroup Metrics ===== -->
  <rect x="166" y="68" width="96" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="214" y="88" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Subgroup</text>
  <text x="214" y="101" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Metrics</text>
  <line x1="176" y1="108" x2="252" y2="108" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="214" y="122" font-size="8.5" fill="#555" text-anchor="middle">FPR / TPR</text>
  <text x="214" y="134" font-size="8.5" fill="#555" text-anchor="middle">per demographic</text>
  <text x="214" y="146" font-size="8.5" fill="#555" text-anchor="middle">group G</text>

  <!-- Arrow 2→3 -->
  <line x1="264" y1="113" x2="308" y2="113" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Box 3: Threshold Check (diamond shape) ===== -->
  <!-- Diamond centered at (360, 113) -->
  <polygon points="360,70 412,113 360,156 308,113" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="360" y="107" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Threshold</text>
  <text x="360" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Check</text>

  <!-- Labels on diamond branches -->
  <text x="372.0" y="172" font-size="8.5" fill="#c87b2a" text-anchor="middle" font-style="italic">gap &gt; ε ?</text>

  <!-- Arrow 3→4 (Alert, fail branch - right) -->
  <line x1="412" y1="113" x2="452" y2="113" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="432" y="105" font-size="8" fill="#a31f34" text-anchor="middle">YES</text>

  <!-- Arrow 3→OK (pass branch - down) -->
  <line x1="360" y1="156" x2="360" y2="196" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="376" y="180" font-size="8" fill="#3d9e5a" text-anchor="start">NO</text>

  <!-- ===== OK box (pass) ===== -->
  <rect x="308" y="198" width="104" height="44" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="215" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">OK</text>
  <text x="360" y="232" font-size="8.5" fill="#555" text-anchor="middle">Continue serving</text>

  <!-- ===== Box 4: Alert ===== -->
  <rect x="455" y="68" width="96" height="90" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <!-- Alert icon (exclamation triangle) -->
  <polygon points="503,80 518,108 488,108" fill="none" stroke="#a31f34" stroke-width="1.5"/>
  <text x="503" y="104" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">!</text>
  <text x="503" y="122" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Alert</text>
  <line x1="465" y1="129" x2="541" y2="129" stroke="#c44" stroke-width="0.8"/>
  <text x="503" y="143" font-size="8.5" fill="#555" text-anchor="middle">Fairness violation</text>
  <text x="503" y="153" font-size="8.5" fill="#555" text-anchor="middle">detected</text>

  <!-- Arrow 4→5 -->
  <line x1="553" y1="113" x2="573" y2="113" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Box 5: Retrain ===== -->
  <rect x="576" y="68" width="96" height="90" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="624" y="88" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Retrain</text>
  <text x="624" y="101" font-size="10" font-weight="700" fill="#333" text-anchor="middle">/ Recalibrate</text>
  <line x1="586" y1="108" x2="662" y2="108" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="624" y="122" font-size="8.5" fill="#555" text-anchor="middle">Bias-aware</text>
  <text x="624" y="134" font-size="8.5" fill="#555" text-anchor="middle">retraining or</text>
  <text x="624" y="146" font-size="8.5" fill="#555" text-anchor="middle">threshold shift</text>

  <!-- ===== Feedback loop: Retrain → Model Predictions ===== -->
  <path d="M 624,158 Q 624,270 68,270 Q 68,168 68,158" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="350" y="284" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Feedback loop: updated model re-enters pipeline</text>

  <!-- ===== Example metrics panel ===== -->
  <rect x="20" y="308" width="640" height="128" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="328" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Example Subgroup Metrics Tracked per Inference Window</text>
  <line x1="30" y1="334" x2="650" y2="334" stroke="#bbb" stroke-width="0.8"/>

  <!-- Metric examples in three columns -->
  <!-- Col 1: Accuracy / Error -->
  <text x="90" y="352" font-size="9.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Accuracy Parity</text>
  <text x="90" y="367" font-size="9" fill="#555" text-anchor="middle">|FPR_A − FPR_B| ≤ ε</text>
  <text x="90" y="381" font-size="9" fill="#555" text-anchor="middle">ε = 0.05 threshold</text>
  <text x="90" y="395" font-size="9" fill="#555" text-anchor="middle">Checked every 1k req.</text>

  <!-- Col 2: Calibration -->
  <text x="280" y="352" font-size="9.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Calibration Drift</text>
  <text x="280" y="367" font-size="9" fill="#555" text-anchor="middle">|P(Y=1|S=s,G=g) − s|</text>
  <text x="280" y="381" font-size="9" fill="#555" text-anchor="middle">ECE per group ≤ 0.02</text>
  <text x="280" y="395" font-size="9" fill="#555" text-anchor="middle">KS-test for distribution</text>

  <!-- Col 3: Demographic parity -->
  <text x="470" y="352" font-size="9.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Demographic Parity</text>
  <text x="470" y="367" font-size="9" fill="#555" text-anchor="middle">|P(Ŷ=1|G=a) − P(Ŷ=1|G=b)|</text>
  <text x="470" y="381" font-size="9" fill="#555" text-anchor="middle">Statistical parity diff.</text>
  <text x="470" y="395" font-size="9" fill="#555" text-anchor="middle">Rolling 24-hr window</text>

  <!-- Column dividers -->
  <line x1="185" y1="338" x2="185" y2="428" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="375" y1="338" x2="375" y2="428" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Overhead annotations ===== -->
  <rect x="20" y="410" width="635" height="24" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="340" y="426" font-size="9" fill="#a31f34" text-anchor="middle" font-weight="600">
    Monitoring overhead: +10–20 ms per inference · ~1.7 TB/day metadata at 1B daily inferences · 150 active metrics per 50-group deployment
  </text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="450" font-size="9" fill="#999" text-anchor="middle" font-style="italic">At every threshold crossing, the alert triggers retraining or recalibration; the updated model re-enters the pipeline.</text>
</svg>