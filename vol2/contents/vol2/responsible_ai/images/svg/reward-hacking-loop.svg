<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>
  <defs>

    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>

  </defs><rect x="10" y="10" width="660" height="440" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Goodhart's Law annotation banner at top -->
  <rect x="50" y="22" width="580" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#c87b2a">Goodhart's Law:</text>
  <text x="340" y="46" text-anchor="middle" font-size="11" fill="#c87b2a">"When a measure becomes a target, it ceases to be a good measure."</text>

  <!-- ── FOUR NODES arranged as a cycle ── -->

  <!-- Node 1 (top, green): True Goal -->
  <rect x="235" y="75" width="210" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="2.2"/>
  <text x="340" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">True Goal</text>
  <text x="340" y="116" text-anchor="middle" font-size="11" fill="#3d9e5a">Maximize user value</text>
  <text x="340" y="129" text-anchor="middle" font-size="10" fill="#3d9e5a">(long-term engagement &amp; trust)</text>

  <!-- Node 2 (right, blue): ML System -->
  <rect x="490" y="185" width="160" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2.2"/>
  <text x="570" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">ML System</text>
  <text x="570" y="224" text-anchor="middle" font-size="11" fill="#4a90c4">Optimizes proxy</text>
  <text x="570" y="237" text-anchor="middle" font-size="10" fill="#4a90c4">metric via gradient</text>

  <!-- Node 3 (bottom, orange): Proxy Metric -->
  <rect x="235" y="310" width="210" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="2.2"/>
  <text x="340" y="333" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Proxy Metric</text>
  <text x="340" y="350" text-anchor="middle" font-size="11" fill="#c87b2a">Maximize clicks</text>
  <text x="340" y="363" text-anchor="middle" font-size="10" fill="#c87b2a">(easy to measure, easy to hack)</text>

  <!-- Node 4 (left, red): Observed Behavior -->
  <rect x="32" y="185" width="178" height="75" fill="#f9d6d5" stroke="#c44" stroke-width="2.2"/>
  <text x="121" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Observed Behavior</text>
  <text x="121" y="224" text-anchor="middle" font-size="11" fill="#c44">Clickbait content</text>
  <text x="121" y="238" text-anchor="middle" font-size="11" fill="#c44">Outrage amplification</text>
  <text x="121" y="252" text-anchor="middle" font-size="11" fill="#c44">Filter bubbles</text>

  <!-- ── ARROWS forming a cycle ── -->

  <!-- True Goal → ML System (top → right): "intends to optimize" -->
  <path d="M 445 105 Q 530 105 490 190" stroke="#3d9e5a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="545" y="148" text-anchor="middle" font-size="10" fill="#3d9e5a">designer sets</text>
  <text x="545" y="160" text-anchor="middle" font-size="10" fill="#3d9e5a">objective</text>

  <!-- ML System → Proxy Metric (right → bottom): "measures" -->
  <path d="M 490 245 Q 480 310 445 330" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="500" y="293" text-anchor="middle" font-size="10" fill="#4a90c4">measured by</text>

  <!-- Proxy Metric → Observed Behavior (bottom → left): "produces" -->
  <path d="M 235 345 Q 160 345 160 260" stroke="#c87b2a" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="163" y="320" text-anchor="middle" font-size="10" fill="#c87b2a">drives</text>

  <!-- Observed Behavior → ML System (left → top, red loop): "corrupts training data" -->
  <path d="M 121 185 Q 121 100 235 100" stroke="#c44" stroke-width="2.2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="150" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#a31f34">Training data reflects</text>
  <text x="150" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#a31f34">hack; system reinforces it</text>

  <!-- Reinforcement loop label -->
  <rect x="242" y="190" width="196" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" opacity="0.9"/>
  <text x="340" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#a31f34">Reinforcement Loop</text>
  <text x="340" y="221" text-anchor="middle" font-size="10" fill="#c44">each cycle worsens misalignment</text>

  <!-- Bottom annotation -->
  <rect x="30" y="430" width="620" height="22" fill="#e8e8e8"/>
  <text x="340" y="445" text-anchor="middle" font-size="11" fill="#555">Reward hacking: the system achieves the proxy, not the intent — a misalignment between specification and goal</text>
</svg>