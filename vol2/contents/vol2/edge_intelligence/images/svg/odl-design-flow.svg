<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 640">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="840" height="640" fill="#fff"/>

  <!-- Start: Deploy Model -->
  <rect x="320" y="32" width="200" height="36" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="420" y="48" font-size="14" font-weight="700" fill="#4a90c4" text-anchor="middle">Deploy Model to Edge Device</text>
  <text x="420" y="62" font-size="10" fill="#4a90c4" text-anchor="middle">static model shipped to hardware</text>

  <!-- Arrow down -->
  <line x1="420" y1="68" x2="420" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision 1: Adaptation needed? -->
  <polygon points="420,90 540,130 420,170 300,130" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="420" y="126" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Adaptation needed</text>
  <text x="420" y="140" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">post-deploy?</text>

  <!-- No branch → Static deployment -->
  <line x1="540" y1="130" x2="600" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="570" y="125" font-size="10.5" fill="#999" text-anchor="middle" font-weight="600">No</text>
  <rect x="600" y="112" width="160" height="36" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="680" y="128" font-size="11" font-weight="700" fill="#555" text-anchor="middle">Static Deployment</text>
  <text x="680" y="142" font-size="9.5" fill="#999" text-anchor="middle">no learning needed</text>

  <!-- Done indicator for static -->
  <circle cx="680" cy="166" r="11" fill="#e8e8e8" stroke="#999" stroke-width="1.2"/>
  <text x="680" y="170" font-size="12" fill="#555" text-anchor="middle" font-weight="700">✓</text>

  <!-- Yes branch → down -->
  <line x1="420" y1="170" x2="420" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="436" y="194" font-size="10.5" fill="#333" font-weight="600">Yes</text>

  <!-- Decision 2: Memory < 1 MB? -->
  <polygon points="420,210 540,250 420,290 300,250" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="420" y="246" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Memory</text>
  <text x="420" y="260" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">&lt; 1 MB?</text>

  <!-- Yes branch → Bias-only -->
  <line x1="300" y1="250" x2="240" y2="250" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="270" y="245" font-size="10.5" fill="#c87b2a" text-anchor="middle" font-weight="600">Yes</text>
  <rect x="80" y="232" width="160" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="160" y="248" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Bias-only</text>
  <text x="160" y="262" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Fine-tuning</text>

  <!-- Annotation for bias-only -->
  <rect x="80" y="274" width="160" height="48" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="160" y="290" font-size="9.5" fill="#999" text-anchor="middle">Update bias terms only</text>
  <text x="160" y="304" font-size="9.5" fill="#999" text-anchor="middle">Backbone frozen — no</text>
  <text x="160" y="318" font-size="9.5" fill="#999" text-anchor="middle">activation storage needed</text>

  <!-- No branch → down -->
  <line x1="420" y1="290" x2="420" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="436" y="314" font-size="10.5" fill="#333" font-weight="600">No</text>

  <!-- Decision 3: Labeled data available? -->
  <polygon points="420,330 540,370 420,410 300,370" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="420" y="366" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Labeled data</text>
  <text x="420" y="380" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">available?</text>

  <!-- No branch → Self-supervised -->
  <line x1="300" y1="370" x2="240" y2="370" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="270" y="365" font-size="10.5" fill="#4a90c4" text-anchor="middle" font-weight="600">No</text>
  <rect x="80" y="352" width="160" height="36" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="160" y="368" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Self-supervised /</text>
  <text x="160" y="382" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Test-time Adapt.</text>

  <!-- Annotation for self-supervised -->
  <rect x="80" y="394" width="160" height="48" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="160" y="410" font-size="9.5" fill="#999" text-anchor="middle">Contrastive learning,</text>
  <text x="160" y="424" font-size="9.5" fill="#999" text-anchor="middle">entropy minimization,</text>
  <text x="160" y="438" font-size="9.5" fill="#999" text-anchor="middle">test-time batch norm</text>

  <!-- Yes branch → down -->
  <line x1="420" y1="410" x2="420" y2="450" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="436" y="434" font-size="10.5" fill="#333" font-weight="600">Yes</text>

  <!-- Decision 4: Privacy constraints? -->
  <polygon points="420,450 540,490 420,530 300,490" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="420" y="486" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Privacy</text>
  <text x="420" y="500" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">constraints?</text>

  <!-- Yes branch → Federated -->
  <line x1="300" y1="490" x2="240" y2="490" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="270" y="485" font-size="10.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">Yes</text>
  <rect x="80" y="472" width="160" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="160" y="488" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Federated</text>
  <text x="160" y="502" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Learning</text>

  <!-- Annotation for federated -->
  <rect x="80" y="514" width="160" height="48" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="160" y="530" font-size="9.5" fill="#999" text-anchor="middle">FedAvg across devices,</text>
  <text x="160" y="544" font-size="9.5" fill="#999" text-anchor="middle">diff. privacy optional,</text>
  <text x="160" y="558" font-size="9.5" fill="#999" text-anchor="middle">no raw data leaves</text>

  <!-- No branch → On-device fine-tuning -->
  <line x1="540" y1="490" x2="600" y2="490" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="570" y="485" font-size="10.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">No</text>
  <rect x="600" y="472" width="160" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="488" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">On-Device Fine-</text>
  <text x="680" y="502" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">tuning + Adapters</text>

  <!-- Annotation for on-device FT -->
  <rect x="600" y="514" width="160" height="48" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.8"/>
  <text x="680" y="530" font-size="9.5" fill="#999" text-anchor="middle">LoRA / adapter modules,</text>
  <text x="680" y="544" font-size="9.5" fill="#999" text-anchor="middle">local gradient updates,</text>
  <text x="680" y="558" font-size="9.5" fill="#999" text-anchor="middle">head + adapter trainable</text>

  <!-- Legend: diamond = decision, rect = action -->
  <rect x="320" y="580" width="200" height="28" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.8"/>
  <polygon points="334,594 346,602 334,610 322,602" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="354" y="598" font-size="10" fill="#999">Decision</text>
  <rect x="406" y="587" width="24" height="14" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="438" y="598" font-size="10" fill="#999">Action / Strategy</text>
</svg>