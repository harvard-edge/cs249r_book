<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640">
  <rect width="860" height="640" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="430" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">KV Cache Memory Fragmentation</text>

  <!-- ===== Vertical center divider ===== -->
  <line x1="430" y1="40" x2="430" y2="390" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Internal Fragmentation ===== -->
  <text x="245" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Internal Fragmentation</text>
  <text x="245" y="70" text-anchor="middle" font-size="8.5" fill="#555">Max sequence length pre-allocated per request</text>

  <!-- Memory layout label -->
  <text x="40" y="90" font-size="9" font-weight="700" fill="#555">GPU Memory (pre-allocated blocks)</text>

  <!-- Sequence A: allocated for max=8 blocks, used=3 -->
  <text x="40" y="126" font-size="8.5" fill="#333">Seq A</text>
  <!-- Used (blue) blocks -->
  <rect x="90" y="110" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="105" y="126" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="130" y="110" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="145" y="126" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T2</text>
  <rect x="170" y="110" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="185" y="126" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T3</text>
  <!-- Unused (neutral) blocks -->
  <rect x="210" y="110" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="225" y="126" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="250" y="110" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="265" y="126" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="290" y="110" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="305" y="126" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="330" y="110" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="345" y="126" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="370" y="110" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="385" y="126" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <!-- Waste brace annotation -->
  <line x1="210" y1="145" x2="400" y2="145" stroke="#c44" stroke-width="1"/>
  <line x1="210" y1="140" x2="210" y2="150" stroke="#c44" stroke-width="1"/>
  <line x1="400" y1="140" x2="400" y2="150" stroke="#c44" stroke-width="1"/>
  <text x="305" y="160" text-anchor="middle" font-size="8.5" fill="#c44">62.5% wasted</text>

  <!-- Sequence B: allocated for max=8, used=5 -->
  <text x="40" y="206" font-size="8.5" fill="#333">Seq B</text>
  <rect x="90" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="105" y="206" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="130" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="145" y="206" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T2</text>
  <rect x="170" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="185" y="206" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T3</text>
  <rect x="210" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="206" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T4</text>
  <rect x="250" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="265" y="206" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T5</text>
  <!-- Unused -->
  <rect x="290" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="305" y="206" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="330" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="345" y="206" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="370" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="385" y="206" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <!-- Waste brace -->
  <line x1="290" y1="225" x2="400" y2="225" stroke="#c44" stroke-width="1"/>
  <line x1="290" y1="220" x2="290" y2="230" stroke="#c44" stroke-width="1"/>
  <line x1="400" y1="220" x2="400" y2="230" stroke="#c44" stroke-width="1"/>
  <text x="345" y="240" text-anchor="middle" font-size="8.5" fill="#c44">37.5% wasted</text>

  <!-- Sequence C: allocated for max=8, used=1 -->
  <text x="40" y="286" font-size="8.5" fill="#333">Seq C</text>
  <rect x="90" y="270" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="105" y="286" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="130" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="145" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="170" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="185" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="210" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="225" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="250" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="265" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="290" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="305" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="330" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="345" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="370" y="270" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="385" y="286" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <line x1="130" y1="305" x2="400" y2="305" stroke="#c44" stroke-width="1"/>
  <line x1="130" y1="300" x2="130" y2="310" stroke="#c44" stroke-width="1"/>
  <line x1="400" y1="300" x2="400" y2="310" stroke="#c44" stroke-width="1"/>
  <text x="265" y="320" text-anchor="middle" font-size="8.5" fill="#c44">87.5% wasted</text>

  <!-- Left panel total waste label -->
  <rect x="90" y="340" width="310" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="245" y="356" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Total: up to 60–80% memory wasted</text>
  <text x="245" y="370" text-anchor="middle" font-size="8" fill="#c44">Severely limits concurrent batch size</text>


  <!-- ===== RIGHT PANEL: External Fragmentation ===== -->
  <text x="626" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">External Fragmentation</text>
  <text x="626" y="70" text-anchor="middle" font-size="8.5" fill="#555">Variable-length sequences leave unusable gaps</text>

  <!-- Memory layout label -->
  <text x="460" y="90" font-size="9" font-weight="700" fill="#555">Linear GPU Memory Address Space</text>

  <!-- Contiguous memory layout with gaps -->
  <!-- Block row 1: Seq X (used 3), Gap, Seq Y (used 5), Gap, can't fit Z -->
  <text x="460" y="110" font-size="8.5" fill="#333">After completions and new allocations:</text>

  <!-- Seq X: 3 used blocks -->
  <rect x="460" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="475" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>
  <rect x="500" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="515" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>
  <rect x="540" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="555" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>

  <!-- Gap between X and Y -->
  <rect x="580" y="120" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="595" y="136" text-anchor="middle" font-size="7.5" fill="#999">gap</text>
  <rect x="620" y="120" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="635" y="136" text-anchor="middle" font-size="7.5" fill="#999">gap</text>

  <!-- Seq Y: 3 used blocks and 1 partial -->
  <rect x="660" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="675" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="700" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="715" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="740" y="120" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="755" y="136" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="780" y="120" width="12" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Row 2: gap + can't fit new sequence -->
  <text x="460" y="180" font-size="8.5" fill="#333">New Seq Z needs 4 contiguous blocks:</text>
  <!-- Total free = 2 blocks, but non-contiguous -->
  <rect x="460" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="475" y="206" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <rect x="500" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="515" y="206" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <!-- Used blocks in middle -->
  <rect x="540" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="555" y="206" text-anchor="middle" font-size="7.5" fill="#333">Seq W</text>
  <rect x="580" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="595" y="206" text-anchor="middle" font-size="7.5" fill="#333">Seq W</text>
  <!-- Two more free blocks non-contiguous -->
  <rect x="620" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="635" y="206" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <rect x="660" y="190" width="30" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="675" y="206" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <!-- Used -->
  <rect x="700" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="715" y="206" text-anchor="middle" font-size="7.5" fill="#333">Seq V</text>
  <rect x="740" y="190" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="755" y="206" text-anchor="middle" font-size="7.5" fill="#333">Seq V</text>

  <!-- Rejection annotation -->
  <rect x="460" y="230" width="332" height="24" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="626" y="246" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">4 free blocks exist, but no contiguous region — Seq Z rejected</text>

  <!-- Right panel total waste label -->
  <rect x="460" y="340" width="332" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="626" y="356" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Admission denied despite available memory</text>
  <text x="626" y="370" text-anchor="middle" font-size="8" fill="#c44">Throughput collapses under realistic workloads</text>


  <!-- ===== Divider between problem and solution ===== -->
  <line x1="20" y1="410" x2="840" y2="410" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="430" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">PagedAttention Solution: Virtual → Physical Page Mapping</text>

  <!-- ===== PagedAttention Solution Row ===== -->
  <!-- Logical pages (virtual) -->
  <text x="170" y="450" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Logical (Virtual)</text>
  <rect x="75" y="470" width="40" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="486" text-anchor="middle" font-size="8" fill="#333">Page 0</text>
  <rect x="125" y="470" width="40" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="145" y="486" text-anchor="middle" font-size="8" fill="#333">Page 1</text>
  <rect x="175" y="470" width="40" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="195" y="486" text-anchor="middle" font-size="8" fill="#333">Page 2</text>
  <rect x="225" y="470" width="40" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="245" y="486" text-anchor="middle" font-size="8" fill="#333">Page 3</text>

  <!-- Block table box -->
  <rect x="325" y="450" width="80" height="64" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="365" y="478" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Block</text>
  <text x="365" y="492" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Table</text>

  <!-- Arrows from logical to block table -->
  <path d="M 265 482 L 325 482" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Physical blocks (non-contiguous in HBM) -->
  <text x="635" y="450" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Physical (HBM) — non-contiguous</text>

  <!-- Arrows from block table to physical blocks -->
  <path d="M 405 482 L 465 482" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 405 460 L 635 460 L 635 470" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 405 505 L 735 505 L 735 494" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 405 450 L 785 450 L 785 470" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Scattered physical blocks of different sequences -->
  <rect x="465" y="470" width="40" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="485" y="486" text-anchor="middle" font-size="7.5" fill="#333">Blk 7</text>

  <rect x="515" y="470" width="40" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="535" y="486" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="565" y="470" width="40" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="585" y="486" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="615" y="470" width="40" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="635" y="486" text-anchor="middle" font-size="7.5" fill="#333">Blk 2</text>

  <rect x="665" y="470" width="40" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="685" y="486" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="715" y="470" width="40" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="735" y="486" text-anchor="middle" font-size="7.5" fill="#333">Blk 14</text>

  <rect x="765" y="470" width="40" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="785" y="486" text-anchor="middle" font-size="7.5" fill="#333">Blk 31</text>

  <!-- PagedAttention benefit label -->
  <rect x="230" y="540" width="400" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="430" y="556" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">No fragmentation: any free block serves any sequence</text>
  <text x="430" y="570" text-anchor="middle" font-size="8" fill="#3d9e5a">2–4x throughput improvement on same hardware</text>

  <!-- ===== Legend ===== -->
  <rect x="100" y="600" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="609" font-size="8.5" fill="#333">Used KV blocks</text>

  <rect x="300" y="600" width="14" height="10" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="320" y="609" font-size="8.5" fill="#333">Unused / wasted blocks</text>

  <rect x="550" y="600" width="14" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="570" y="609" font-size="8.5" fill="#333">PagedAttention physical blocks (mapped)</text>

  <!-- ===== Footer ===== -->
  <text x="430" y="630" text-anchor="middle" font-size="9" fill="#999" font-style="italic">PagedAttention eliminates both internal and external fragmentation by decoupling logical sequence positions from physical memory locations.</text>
</svg>