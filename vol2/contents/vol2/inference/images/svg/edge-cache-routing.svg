<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Edge Caching: Cache Hit vs. Cache Miss Paths</text>

  <!-- ══════════════════════════════════════════════════════
       LEFT COLUMN: Architecture nodes (vertical)
       ══════════════════════════════════════════════════════ -->

  <!-- User / Client -->
  <rect x="20" y="60" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#333">User Request</text>
  <text x="80" y="92" text-anchor="middle" font-size="8.5" fill="#555">global client</text>

  <!-- Arrow down to Edge Cache -->
  <line x1="80" y1="100" x2="80" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Edge Cache / CDN -->
  <rect x="20" y="140" width="120" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="80" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Edge Cache</text>
  <text x="80" y="174" text-anchor="middle" font-size="8.5" fill="#555">CDN · PoP node</text>
  <text x="80" y="188" text-anchor="middle" font-size="8" fill="#4a90c4">nearest to user</text>

  <!-- Arrow down to Regional Proxy -->
  <line x1="80" y1="200" x2="80" y2="240" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="94" y="224" font-size="8" fill="#999">miss only</text>

  <!-- Regional Proxy -->
  <rect x="20" y="240" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Regional</text>
  <text x="80" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Proxy</text>

  <!-- Arrow down to Central Inference -->
  <line x1="80" y1="280" x2="80" y2="320" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="94" y="304" font-size="8" fill="#999">miss only</text>

  <!-- Central Inference -->
  <rect x="20" y="320" width="120" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="80" y="342" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Central</text>
  <text x="80" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Inference</text>
  <text x="80" y="370" text-anchor="middle" font-size="8" fill="#3d9e5a">GPU cluster</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT SIDE: two annotated paths
       ══════════════════════════════════════════════════════ -->

  <!-- ── PATH A: Cache Hit ── -->
  <rect x="180" y="140" width="220" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="290" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#2d7a2d">Cache Hit</text>
  <text x="290" y="176" text-anchor="middle" font-size="9" fill="#555">response returned from edge node</text>
  <text x="290" y="190" text-anchor="middle" font-size="9" fill="#555">no backend compute required</text>

  <!-- Hit path: Edge Cache → back to User, bypassing proxy+inference -->
  <path d="M 140,170 L 160,170 L 160,80 L 140,80" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- Latency badge -->
  <rect x="180" y="210" width="220" height="30" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="290" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">Latency: &lt; 10 ms</text>

  <!-- ── PATH B: Cache Miss ── -->
  <rect x="180" y="250" width="220" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="290" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Cache Miss</text>
  <text x="290" y="286" text-anchor="middle" font-size="9" fill="#555">request traverses full backend</text>
  <text x="290" y="300" text-anchor="middle" font-size="9" fill="#555">response populates edge cache</text>

  <!-- Horizontal connector from architecture column to miss box -->
  <path d="M 140,260 L 160,260 L 160,280 L 180,280" fill="none" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Latency badge -->
  <rect x="180" y="320" width="220" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="290" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Latency: full inference RTT</text>

  <!-- ── Cache hit rate table ── -->
  <rect x="440" y="140" width="220" height="210" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="550" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Cache Hit Rates</text>

  <line x1="460" y1="170" x2="640" y2="170" stroke="#e8e8e8" stroke-width="0.8"/>

  <text x="510" y="186" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Workload</text>
  <text x="610" y="186" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Hit Rate</text>

  <line x1="460" y1="196" x2="640" y2="196" stroke="#e8e8e8" stroke-width="0.6"/>

  <text x="510" y="214" text-anchor="middle" font-size="8.5" fill="#333">Autocomplete</text>
  <text x="610" y="214" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2d7a2d">60–80%</text>

  <text x="510" y="232" text-anchor="middle" font-size="8.5" fill="#333">FAQ chatbot</text>
  <text x="610" y="232" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">40–60%</text>

  <text x="510" y="250" text-anchor="middle" font-size="8.5" fill="#333">Code generation</text>
  <text x="610" y="250" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">20–40%</text>

  <text x="510" y="268" text-anchor="middle" font-size="8.5" fill="#333">Open-ended chat</text>
  <text x="610" y="268" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">5–15%</text>

  <line x1="460" y1="280" x2="640" y2="280" stroke="#e8e8e8" stroke-width="0.6"/>

  <text x="550" y="296" text-anchor="middle" font-size="8" fill="#555">Semantic caching can improve</text>
  <text x="550" y="310" text-anchor="middle" font-size="8" fill="#555">open-ended rates 2–3×</text>
  <text x="550" y="324" text-anchor="middle" font-size="8" fill="#999">(+1–5 ms lookup overhead)</text>
  <text x="550" y="338" text-anchor="middle" font-size="8" fill="#999">via embedding similarity</text>

  <!-- ── Cache population annotation ── -->
  <rect x="180" y="380" width="480" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="420" y="400" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Cache Population on Miss</text>
  <text x="420" y="416" text-anchor="middle" font-size="9" fill="#555">Central inference response propagates back through proxy → stored at edge for subsequent identical queries.</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="450" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Effective for repeated or templated queries; poor fit for open-ended generative workloads.</text>

</svg>