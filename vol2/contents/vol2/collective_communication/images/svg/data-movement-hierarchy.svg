<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500">
  <rect width="680" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Physics of Data Movement</text>
  <text x="340" y="38" text-anchor="middle" font-size="9" fill="#555">Energy cost per bit increases with distance; each tier constrains what optimizations are possible</text>

  <!-- ===== Chart area: horizontal bars ===== -->
  <!-- Left labels at x=10..160; bars from x=165 to x=640; right labels x=645 -->
  <!-- 4 rows, y positions: 90, 180, 270, 360 (center of each bar) -->
  <!-- Bar heights: 55px each -->

  <!-- ===== Row 1: SRAM (on-chip, tiny bar) ===== -->
  <!-- Log scale: 0.5 pJ/bit → bar width proportional to log10(0.5) / log10(1000) * 475 = ~71px -->
  <!-- Using approximate visual widths: SRAM=40, DRAM=110, NVLink=240, IB=440 -->

  <!-- Label left -->
  <text x="155" y="87" text-anchor="end" font-size="10" font-weight="700" fill="#333">SRAM</text>
  <text x="155" y="100" text-anchor="end" font-size="8.5" fill="#555">(on-chip cache)</text>
  <text x="155" y="113" text-anchor="end" font-size="8.5" fill="#999">~0–1 mm</text>

  <!-- Bar row 1: SRAM — tiny, green (local data, healthy) -->
  <rect x="165" y="72" width="42" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="186" y="97" text-anchor="middle" font-size="9" font-weight="700" fill="#2d7a2d">~0.5 pJ/bit</text>
  <text x="186" y="111" text-anchor="middle" font-size="9" fill="#2d7a2d">per access</text>

  <!-- X-axis position label -->
  <text x="207" y="143" text-anchor="middle" font-size="7.5" fill="#999">0.5 pJ</text>

  <!-- ===== Row 2: DRAM/HBM (medium bar, blue) ===== -->
  <text x="155" y="175" text-anchor="end" font-size="10" font-weight="700" fill="#333">DRAM / HBM</text>
  <text x="155" y="188" text-anchor="end" font-size="8.5" fill="#555">(GPU memory)</text>
  <text x="155" y="201" text-anchor="end" font-size="8.5" fill="#999">~1–10 mm</text>

  <!-- Bar row 2: DRAM — medium, compute blue -->
  <rect x="165" y="160" width="115" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="222.5" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">~20 pJ/bit</text>
  <text x="222.5" y="198" text-anchor="middle" font-size="9" fill="#555">HBM access</text>

  <text x="280" y="231" text-anchor="middle" font-size="7.5" fill="#999">20 pJ</text>

  <!-- ===== Row 3: NVLink (larger bar, orange) ===== -->
  <text x="155" y="263" text-anchor="end" font-size="10" font-weight="700" fill="#333">NVLink</text>
  <text x="155" y="276" text-anchor="end" font-size="8.5" fill="#555">(intra-node)</text>
  <text x="155" y="289" text-anchor="end" font-size="8.5" fill="#999">~0.5–1 m</text>

  <!-- Bar row 3: NVLink — larger, routing orange -->
  <rect x="165" y="248" width="245" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="287.5" y="272" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">~100 pJ/bit</text>
  <text x="287.5" y="286" text-anchor="middle" font-size="9" fill="#555">PCB / NVLink transfer</text>

  <text x="410" y="319" text-anchor="middle" font-size="7.5" fill="#999">100 pJ</text>

  <!-- ===== Row 4: InfiniBand (large bar, red) ===== -->
  <text x="155" y="355" text-anchor="end" font-size="10" font-weight="700" fill="#333">InfiniBand</text>
  <text x="155" y="368" text-anchor="end" font-size="8.5" fill="#555">(inter-node, optical)</text>
  <text x="155" y="381" text-anchor="end" font-size="8.5" fill="#999">~10–100 m</text>

  <!-- Bar row 4: InfiniBand — large, error red -->
  <rect x="165" y="340" width="445" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="387.5" y="364" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">~1,000 pJ/bit</text>
  <text x="387.5" y="378" text-anchor="middle" font-size="9" fill="#555">InfiniBand optical link transfer</text>

  <text x="610" y="411" text-anchor="middle" font-size="7.5" fill="#999">1,000 pJ</text>

  <!-- ===== Systems implication callout boxes ===== -->
  <!-- SRAM: fast enough for hidden -->
  <rect x="218" y="72" width="170" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="303" y="84" text-anchor="middle" font-size="7.5" fill="#555">Reuse maximized via tiling; kernel fusion</text>
  <text x="303" y="95" text-anchor="middle" font-size="7.5" fill="#555">eliminates round-trips to DRAM</text>

  <!-- DRAM: target for memory bandwidth -->
  <rect x="290" y="160" width="170" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="375" y="172" text-anchor="middle" font-size="7.5" fill="#555">Flash Attention reduces HBM reads by</text>
  <text x="375" y="183" text-anchor="middle" font-size="7.5" fill="#555">~10× via on-chip accumulation</text>

  <!-- NVLink: manageable with hierarchy -->
  <rect x="420" y="248" width="170" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="505" y="260" text-anchor="middle" font-size="7.5" fill="#555">NVLink at 900 GB/s ≈ 18× InfiniBand;</text>
  <text x="505" y="271" text-anchor="middle" font-size="7.5" fill="#555">hierarchical allreduce exploits this gap</text>

  <!-- IB: must compress / minimize -->
  <rect x="165" y="418" width="445" height="24" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <!-- annotation below IB bar instead -->
  <text x="387.5" y="434" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Target for compression: gradient quantization, sparsification, SHARP reduce traffic</text>

  <!-- ===== X axis line and label ===== -->
  <line x1="165" y1="455" x2="650" y2="455" stroke="#bbb" stroke-width="1.0"/>
  <text x="165" y="470" font-size="8.5" fill="#999">Energy Cost per Bit (pJ/bit) — log scale</text>
  <!-- Tick marks -->
  <line x1="207" y1="452" x2="207" y2="458" stroke="#bbb" stroke-width="1.0"/>
  <line x1="280" y1="452" x2="280" y2="458" stroke="#bbb" stroke-width="1.0"/>
  <line x1="410" y1="452" x2="410" y2="458" stroke="#bbb" stroke-width="1.0"/>
  <line x1="610" y1="452" x2="610" y2="458" stroke="#bbb" stroke-width="1.0"/>

  <!-- ===== Multiplier annotations (right side) ===== -->
  <!-- Relative cost ratios -->
  <text x="650" y="97" text-anchor="middle" font-size="9" font-weight="700" fill="#2d7a2d">1×</text>
  <text x="650" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">40×</text>
  <text x="650" y="272" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">200×</text>
  <text x="650" y="364" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">2,000×</text>
  <text x="650" y="111" text-anchor="middle" font-size="7.5" fill="#999">baseline</text>
  <text x="650" y="198" text-anchor="middle" font-size="7.5" fill="#999">vs SRAM</text>
  <text x="650" y="286" text-anchor="middle" font-size="7.5" fill="#999">vs SRAM</text>
  <text x="650" y="378" text-anchor="middle" font-size="7.5" fill="#999">vs SRAM</text>

  <!-- Footer -->
  <text x="340" y="488" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Approximate values (pJ/bit): SRAM ~0.5, HBM ~20, NVLink ~100, InfiniBand optical ~1,000. 2,000× range across memory hierarchy.</text>
</svg>