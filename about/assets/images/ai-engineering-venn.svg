<svg viewBox="0 -10 540 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .circle { fill-opacity: 0.15; stroke-width: 1.8; }
      .label { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 15px; }
      .sublabel { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; fill: #555; }
      .intersection { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10.5px; font-style: italic; fill: #999; }
      .center { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 12.5px; fill: #A51C30; }
    </style>
    <clipPath id="clipTheory">
      <circle cx="270" cy="148" r="118"/>
    </clipPath>
    <clipPath id="clipSystems">
      <circle cx="200" cy="278" r="118"/>
    </clipPath>
  </defs>

  <!-- Transparent background -->
  <rect width="540" height="420" fill="none"/>

  <!-- ML Theory Circle (top) -->
  <circle cx="270" cy="148" r="120" class="circle" fill="#4a90c4" stroke="#4a90c4"/>

  <!-- ML Systems Circle (bottom-left) -->
  <circle cx="200" cy="278" r="120" class="circle" fill="#A51C30" stroke="#A51C30"/>

  <!-- Applied ML Circle (bottom-right) -->
  <circle cx="340" cy="278" r="120" class="circle" fill="#3d9e5a" stroke="#3d9e5a"/>

  <!-- White center intersection -->
  <g clip-path="url(#clipTheory)">
    <g clip-path="url(#clipSystems)">
      <circle cx="340" cy="278" r="118" fill="white" fill-opacity="0.84"/>
    </g>
  </g>

  <!-- Main Labels -->
  <text x="270" y="8" text-anchor="middle" class="label" fill="#4a90c4">ML Theory</text>
  <text x="80" y="414" text-anchor="middle" class="label" fill="#A51C30">ML Systems</text>
  <text x="460" y="414" text-anchor="middle" class="label" fill="#3d9e5a">Applied ML</text>

  <!-- Theory content -->
  <text x="270" y="82" text-anchor="middle" class="sublabel">Methods</text>
  <text x="270" y="97" text-anchor="middle" class="sublabel">Foundations</text>
  <text x="270" y="112" text-anchor="middle" class="sublabel">Proofs</text>

  <!-- Systems content -->
  <text x="150" y="288" text-anchor="middle" class="sublabel">Infrastructure</text>
  <text x="150" y="303" text-anchor="middle" class="sublabel">Architecture</text>
  <text x="150" y="318" text-anchor="middle" class="sublabel">Silicon</text>

  <!-- Applied content -->
  <text x="390" y="288" text-anchor="middle" class="sublabel">Product</text>
  <text x="390" y="303" text-anchor="middle" class="sublabel">Data</text>
  <text x="390" y="318" text-anchor="middle" class="sublabel">Operations</text>

  <!-- Two-way intersections -->
  <text x="204" y="188" text-anchor="middle" class="intersection">ML Systems</text>
  <text x="204" y="201" text-anchor="middle" class="intersection">Researcher</text>

  <text x="336" y="188" text-anchor="middle" class="intersection">Data</text>
  <text x="336" y="201" text-anchor="middle" class="intersection">Scientist</text>

  <text x="270" y="320" text-anchor="middle" class="intersection">MLOps</text>
  <text x="270" y="333" text-anchor="middle" class="intersection">Engineer</text>

  <!-- Center - AI Engineering -->
  <text x="270" y="228" text-anchor="middle" class="center">AI</text>
  <text x="270" y="246" text-anchor="middle" class="center">Engineering</text>
</svg>
