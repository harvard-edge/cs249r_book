# =============================================================================
# SHARED NAVBAR CONFIGURATION
# =============================================================================
# Single source of truth for the navigation bar across all HTML builds
# (landing page, vol1, vol2). Included via metadata-files in each config.
#
# All hrefs use absolute mlsysbook.ai URLs so the navbar is identical everywhere.
# The rewrite-dev-urls.sh script converts these to relative paths for dev preview.
#
# To add a new subsite:
#   1. Add the navbar entry here
#   2. Add the path mapping in .github/scripts/rewrite-dev-urls.sh
#
# ── Design rationale ──
# Six dropdowns, each serving ONE audience with ONE intent:
#   Read    → everyone      → consume the textbook
#   Build   → students      → hands-on tools (ordered by increasing commitment)
#   Teach   → instructors   → adopt the course (orient → equip → plan)
#   Prepare → job seekers   → career readiness (explore → plan → test)
#   Connect → community     → newsletter, network, events, partners
#   About   → everyone      → learn about the project
# =============================================================================

website:
  navbar:
    background: light
    pinned: true
    collapse: true
    collapse-below: "xl"
    left:
      # ── Read: the books ──
      - text: "Read"
