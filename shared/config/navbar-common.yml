# =============================================================================
# SHARED NAVBAR CONFIGURATION
# =============================================================================
# Single source of truth for the navigation bar across all HTML builds
# (landing page, vol1, vol2). Included via metadata-files in each config.
#
# All hrefs use absolute mlsysbook.ai URLs so the navbar is identical everywhere.
# The rewrite-dev-urls.sh script converts these to relative paths for dev preview.
#
# To add a new subsite:
#   1. Add the navbar entry here
#   2. Add the path mapping in .github/scripts/rewrite-dev-urls.sh
# =============================================================================

website:
  navbar:
    background: light
    pinned: true
    collapse: true
    collapse-below: "xl"
    left:
      # ── Read: the books ──
      - text: "Read"
        menu:
          - icon: journal
            text: "Volume I: Foundations"
            href: https://mlsysbook.ai/vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: https://mlsysbook.ai/vol2/
          - text: "---"
          - icon: file-pdf
            text: "Volume I PDF"
            href: https://mlsysbook.ai/vol1/assets/downloads/Machine-Learning-Systems-Vol1.pdf
            target: _blank
          - icon: journal-text
            text: "Volume I EPUB"
            href: https://mlsysbook.ai/vol1/assets/downloads/Machine-Learning-Systems-Vol1.epub
            target: _blank
          - text: "---"
          - icon: file-pdf
            text: "Volume II PDF"
            href: https://mlsysbook.ai/vol2/assets/downloads/Machine-Learning-Systems-Vol2.pdf
