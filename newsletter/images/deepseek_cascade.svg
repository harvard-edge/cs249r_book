<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Arrow Markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#333">How One Hardware Constraint Reshaped an Entire Architecture</text>

  <!-- ===== The Constraint (top) ===== -->
  <rect x="190" y="38" width="300" height="48" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="340" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#333">H800: NVLink Bandwidth Cut 56%</text>
  <text x="340" y="72" text-anchor="middle" font-size="9" fill="#555">400 GB/s vs H100's 900 GB/s (US export controls)</text>

  <!-- ===== D-A-M axis labels (above the arrows) ===== -->
  <text x="170" y="104" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">MACHINE → ALGORITHM</text>
  <text x="340" y="100" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">MACHINE → DATA</text>
  <text x="510" y="104" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">ALGORITHM → DATA</text>

  <!-- ===== Arrows from constraint to three innovations ===== -->
  <!-- Left arrow -->
  <line x1="260" y1="86" x2="130" y2="120" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <!-- Center arrow -->
  <line x1="340" y1="86" x2="340" y2="120" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <!-- Right arrow -->
  <line x1="420" y1="86" x2="550" y2="120" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ===== Innovation 1: MoE (left) ===== -->
  <rect x="30" y="128" width="200" height="88" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Mixture-of-Experts</text>
  <text x="130" y="164" text-anchor="middle" font-size="9" fill="#555">671B total parameters</text>
  <text x="130" y="178" text-anchor="middle" font-size="9" fill="#555">37B active per token</text>
  <line x1="55" y1="187" x2="205" y2="187" stroke="#4a90c4" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="130" y="201" text-anchor="middle" font-size="8.5" fill="#555">Avoided costly tensor parallelism;</text>
  <text x="130" y="212" text-anchor="middle" font-size="8.5" fill="#555">less data movement per pass</text>

  <!-- ===== Innovation 2: FP8 (center) ===== -->
  <rect x="250" y="128" width="180" height="88" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#333">FP8 Training</text>
  <text x="340" y="164" text-anchor="middle" font-size="9" fill="#555">8-bit instead of BF16</text>
  <text x="340" y="178" text-anchor="middle" font-size="9" fill="#555">2× effective bandwidth</text>
  <line x1="275" y1="187" x2="405" y2="187" stroke="#4a90c4" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="340" y="201" text-anchor="middle" font-size="8.5" fill="#555">Halves memory footprint;</text>
  <text x="340" y="212" text-anchor="middle" font-size="8.5" fill="#555">required new data engineering</text>

  <!-- ===== Innovation 3: MLA (right) ===== -->
  <rect x="450" y="128" width="200" height="88" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="550" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Multi-head Latent Attention</text>
  <text x="550" y="164" text-anchor="middle" font-size="9" fill="#555">KV cache compressed &gt;98%</text>
  <text x="550" y="178" text-anchor="middle" font-size="9" fill="#555">576 vs 32,768 elements/token</text>
  <line x1="475" y1="187" x2="625" y2="187" stroke="#4a90c4" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="550" y="201" text-anchor="middle" font-size="8.5" fill="#555">Fewer bytes per token;</text>
  <text x="550" y="212" text-anchor="middle" font-size="8.5" fill="#555">faster, cheaper inference</text>

  <!-- ===== Arrows from innovations to training stats ===== -->
  <line x1="130" y1="224" x2="230" y2="262" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <line x1="340" y1="224" x2="340" y2="262" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <line x1="550" y1="224" x2="450" y2="262" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <!-- ===== Training Stats (middle result box) ===== -->
  <rect x="160" y="268" width="360" height="56" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#333">DeepSeek V3: 2,048 H800 GPUs · 2.79M GPU-hours · 14.8T tokens</text>
  <text x="340" y="304" text-anchor="middle" font-size="9" fill="#555">Matched GPT-4 on most benchmarks</text>
  <text x="340" y="318" text-anchor="middle" font-size="8" fill="#3d9e5a">Source: DeepSeek-V3 Technical Report, Table 1 (arXiv 2412.19437)</text>

  <!-- ===== Arrow to cost comparison ===== -->
  <line x1="340" y1="324" x2="340" y2="354" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Cost Comparison (bottom) ===== -->
  <!-- DeepSeek bar -->
  <rect x="100" y="360" width="86" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="143" y="379" text-anchor="middle" font-size="10" font-weight="700" fill="#333">$5.576M</text>
  <text x="143" y="393" text-anchor="middle" font-size="7.5" fill="#555">DeepSeek V3</text>

  <!-- GPT-4 bar (wider to show scale) -->
  <rect x="210" y="360" width="370" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="395" y="379" text-anchor="middle" font-size="10" font-weight="700" fill="#333">$100M+ (estimated)</text>
  <text x="395" y="393" text-anchor="middle" font-size="7.5" fill="#555">GPT-4 training cost</text>

  <!-- Scale label -->
  <text x="340" y="420" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">~18× cost difference</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="448" text-anchor="middle" font-size="9" font-style="italic" fill="#999">One hardware constraint cascaded into three innovations that redefined cost-efficiency.</text>
</svg>
