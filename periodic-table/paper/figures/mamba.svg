<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="800" height="160" fill="#fff" rx="0"/>

  <text x="20" y="30" font-size="14" font-weight="600" fill="#333">State Space Model Composition: Rc → Eb → [ Dd → Gt → Fb(Hs) ]ᴺ</text>

  <!-- Rc (Represent) -->
  <rect x="30" y="60" width="60" height="50" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="60" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#2F5496">Rc</text>
  <text x="60" y="100" text-anchor="middle" font-size="10" fill="#2F5496">Record</text>

  <text x="105" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">→</text>

  <!-- Eb (Represent) -->
  <rect x="135" y="60" width="60" height="50" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="165" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#2F5496">Eb</text>
  <text x="165" y="100" text-anchor="middle" font-size="10" fill="#2F5496">Embed</text>

  <text x="210" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">→</text>

  <!-- Group [ ]^N -->
  <rect x="240" y="45" width="410" height="80" rx="0" fill="#f9f9f9" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="660" y="115" font-family="monospace" font-size="24" font-weight="bold" fill="#333">N</text>
  <text x="560" y="40" font-size="10" font-weight="bold" fill="#666">Repeated Block</text>

  <!-- Dd (Compute) -->
  <rect x="255" y="60" width="60" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="285" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#843C0C">Dd</text>
  <text x="285" y="100" text-anchor="middle" font-size="10" fill="#843C0C">Dense</text>

  <text x="330" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">→</text>

  <!-- Gt (Compute) -->
  <rect x="360" y="60" width="60" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="390" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#843C0C">Gt</text>
  <text x="390" y="100" text-anchor="middle" font-size="10" fill="#843C0C">Gating</text>

  <text x="435" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">→</text>

  <!-- Fb (Communicate) -->
  <rect x="465" y="60" width="60" height="50" rx="0" fill="#EBF1E4" stroke="#375623" stroke-width="1.5"/>
  <text x="495" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#375623">Fb</text>
  <text x="495" y="100" text-anchor="middle" font-size="10" fill="#375623">Feedback</text>

  <text x="535" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">(</text>

  <!-- Hs (Represent) -->
  <rect x="555" y="65" width="50" height="40" rx="0" fill="#E9EFF7" stroke="#2F5496" stroke-width="1.5"/>
  <text x="580" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#2F5496">Hs</text>
  <text x="580" y="98" text-anchor="middle" font-size="9" fill="#2F5496">Hidden</text>

  <text x="615" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">)</text>

</svg>