<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="600" height="160" fill="#fff" rx="0"/>

  <text x="20" y="30" font-size="14" font-weight="600" fill="#333">FlashAttention Molecular Composition: At → (Ti ∥ Fs)</text>

  <!-- At (Compute) -->
  <rect x="50" y="60" width="70" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="85" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#843C0C">At</text>
  <text x="85" y="100" text-anchor="middle" font-size="10" fill="#843C0C">Attention</text>
  
  <text x="145" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">→</text>

  <!-- Group -->
  <rect x="190" y="45" width="220" height="80" rx="0" fill="#f9f9f9" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Ti (Compute) -->
  <rect x="210" y="60" width="70" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#843C0C">Ti</text>
  <text x="245" y="100" text-anchor="middle" font-size="10" fill="#843C0C">Tiling</text>

  <text x="295" y="90" font-family="monospace" font-size="24" font-weight="bold" fill="#333">∥</text>

  <!-- Fs (Compute) -->
  <rect x="320" y="60" width="70" height="50" rx="0" fill="#FDF2EA" stroke="#843C0C" stroke-width="1.5"/>
  <text x="355" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#843C0C">Fs</text>
  <text x="355" y="100" text-anchor="middle" font-size="10" fill="#843C0C">Fusion</text>

</svg>