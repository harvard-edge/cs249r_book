<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- ===== Background ===== -->
  <rect width="680" height="140" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== Textbook ===== -->
  <rect x="20" y="20" width="180" height="80" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="110" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Textbook</text>
  <text x="110" y="68" text-anchor="middle" font-size="9" fill="#555">Concepts and theory</text>
  <text x="110" y="90" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">READ</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="60" x2="240" y2="60" stroke="#ccc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Co-Labs ===== -->
  <rect x="250" y="20" width="180" height="80" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Co-Labs</text>
  <text x="340" y="68" text-anchor="middle" font-size="9" fill="#555">Predict and discover</text>
  <text x="340" y="90" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">EXPLORE</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="60" x2="470" y2="60" stroke="#ccc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== TinyTorch ===== -->
  <rect x="480" y="20" width="180" height="80" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="570" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tiny&#x1F525;Torch</text>
  <text x="570" y="68" text-anchor="middle" font-size="9" fill="#555">Build from scratch</text>
  <text x="570" y="90" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">BUILD</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="128" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Every lab runs in your browser via WebAssembly</text>

</svg>
