name: '🧮 MLSYSIM · 📑 Update PDFs'

# =============================================================================
# MLSYSIM — PDF-Only Update (No Site Rebuild)
# =============================================================================
#
# Rebuilds and deploys the MLSYSIM research paper PDF and tutorial slide PDFs
# directly to gh-pages without touching the website. Use when only the PDF
# content has changed.
#
# Flow:
#   1. BUILD_PDFS — Compile paper + slide PDFs (reusable workflow, from dev)
#   2. DEPLOY_PDFS — Copy PDFs into gh-pages/{DEV_MLSYSIM_PATH}/
#   3. SUMMARY     — Build status report
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/mlsysim/mlsysim-paper.pdf
#             mlsysbook.ai/mlsysim/tutorial_part1.pdf
#             mlsysbook.ai/mlsysim/tutorial_part2.pdf
# Secrets:    GITHUB_TOKEN
# Vars:       DEV_MLSYSIM_PATH
#
# Related:
#   - mlsysim-build-pdfs.yml   — Reusable PDF build (called here)
#   - mlsysim-publish-live.yml — Full site + PDF deploy
#
# =============================================================================

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdfs:
    name: '📄 Build PDFs'
    uses: ./.github/workflows/mlsysim-build-pdfs.yml
    with:
      ref: dev

  deploy-pdfs:
    name: '🚀 Deploy PDFs to gh-pages'
    runs-on: ubuntu-latest
    needs: [build-pdfs]
    if: needs.build-pdfs.result == 'success'

    steps:
      - name: 📥 Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: 📥 Download Paper PDF
        uses: actions/download-artifact@v8
        with:
          name: MLSYSIM-Paper
          path: ./artifacts/paper

      - name: 📥 Download Tutorial Slides
        uses: actions/download-artifact@v8
        with:
          name: MLSYSIM-Slides
          path: ./artifacts/slides

      - name: 📁 Update PDFs in gh-pages
        run: |
          cd gh-pages

          # Place PDFs where the docs site expects them
          DEST="${{ vars.DEV_MLSYSIM_PATH }}"
          mkdir -p "$DEST"

          if [ -f ../artifacts/paper/paper.pdf ]; then
            cp ../artifacts/paper/paper.pdf "$DEST/mlsysim-paper.pdf"
            echo "✅ Updated mlsysim-paper.pdf in $DEST/"
          else
            echo "❌ Paper PDF not found in artifacts"
            exit 1
          fi

          for part in tutorial_part1 tutorial_part2; do
            src="../artifacts/slides/${part}.pdf"
            if [ -f "$src" ]; then
              cp "$src" "$DEST/${part}.pdf"
              echo "✅ Updated ${part}.pdf in $DEST/"
            else
              echo "❌ ${part}.pdf not found in artifacts"
              exit 1
            fi
          done

          echo ""
          echo "📦 Updated files:"
          ls -la "$DEST/mlsysim-paper.pdf" "$DEST/tutorial_part1.pdf" "$DEST/tutorial_part2.pdf"

      - name: 🚀 Push to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "📄 Update MLSYSIM PDFs (paper + tutorial slides)" || echo "No changes to commit"
          git push origin gh-pages

  summary:
    name: '📊 Summary'
    runs-on: ubuntu-latest
    needs: [build-pdfs, deploy-pdfs]
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🧮 MLSYSIM PDF Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Build PDFs | ${{ needs.build-pdfs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy PDFs | ${{ needs.deploy-pdfs.result }} |" >> $GITHUB_STEP_SUMMARY
