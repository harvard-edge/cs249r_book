name: "🔥 Update Interview Leaderboard"

on:
  issues:
    types: [labeled, unlabeled, edited]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    if: github.repository == 'harvard-edge/cs249r_book'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Leaderboard Generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/workflows/contributors/generate_interview_leaderboard.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add interviews/README.md
          git commit -m "docs: update trending interview questions leaderboard" || echo "No changes to commit"
          git push
