name: '📊 Slides · 📄 Build PDFs'

# =============================================================================
# Lecture Slides — Build All Slide Deck PDFs
# =============================================================================
#
# Compiles all 35 Beamer slide decks to PDF using xelatex + inkscape.
# Uploads PDFs as workflow artifacts for download.
# Triggered on push to dev when slides/** changes, or manually.
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'slides/vol1/**/*.tex'
      - 'slides/vol1/**/*.svg'
      - 'slides/vol2/**/*.tex'
      - 'slides/vol2/**/*.svg'
      - 'slides/assets/**'
      - 'slides/Makefile'
      - '.github/workflows/slides-build-pdfs.yml'

permissions:
  contents: read

concurrency:
  group: slides-build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    name: '📄 Compile Slide Decks'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-latex-recommended \
            lmodern \
            fonts-liberation

      - name: 🔧 Install Inkscape
        run: |
          sudo apt-get install -y --no-install-recommends inkscape

      - name: 🔧 Install Fonts (Helvetica Neue + JetBrains Mono)
        run: |
          # JetBrains Mono
          wget -q https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
          unzip -q JetBrainsMono-2.304.zip -d /tmp/jbmono
          sudo mkdir -p /usr/share/fonts/truetype/jetbrains-mono
          sudo cp /tmp/jbmono/fonts/ttf/*.ttf /usr/share/fonts/truetype/jetbrains-mono/
          # Refresh font cache
          sudo fc-cache -f -v > /dev/null 2>&1

      - name: 🔧 Install Beamer Metropolis Theme
        run: |
          # Metropolis theme (base for our custom theme)
          tlmgr install beamertheme-metropolis pgfopts || true

      - name: 📄 Convert SVGs to PDFs
        working-directory: slides
        run: make svgs

      - name: 📄 Build Vol1 Slide Decks
        working-directory: slides
        run: |
          echo "Building Volume I slides..."
          for ch_dir in vol1/*_*/; do
            tex_file=$(ls $ch_dir/*.tex 2>/dev/null | head -1)
            [ -z "$tex_file" ] && continue
            tex_name=$(basename "$tex_file" .tex)
            echo "  Building $tex_name..."
            cd "$ch_dir"
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            cd - > /dev/null
            mkdir -p _build/vol1
            if [ -f "$ch_dir/$tex_name.pdf" ]; then
              cp "$ch_dir/$tex_name.pdf" "_build/vol1/$tex_name.pdf"
              echo "    ✓ $tex_name.pdf"
            else
              echo "    ✗ $tex_name (build failed)"
            fi
            # Clean artifacts
            rm -f $ch_dir/*.aux $ch_dir/*.nav $ch_dir/*.out $ch_dir/*.snm \
                  $ch_dir/*.toc $ch_dir/*.vrb $ch_dir/*.fls $ch_dir/*.log \
                  $ch_dir/$tex_name.pdf 2>/dev/null
          done

      - name: 📄 Build Vol2 Slide Decks
        working-directory: slides
        run: |
          echo "Building Volume II slides..."
          for ch_dir in vol2/*_*/; do
            tex_file=$(ls $ch_dir/*.tex 2>/dev/null | head -1)
            [ -z "$tex_file" ] && continue
            tex_name=$(basename "$tex_file" .tex)
            echo "  Building $tex_name..."
            cd "$ch_dir"
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            cd - > /dev/null
            mkdir -p _build/vol2
            if [ -f "$ch_dir/$tex_name.pdf" ]; then
              cp "$ch_dir/$tex_name.pdf" "_build/vol2/$tex_name.pdf"
              echo "    ✓ $tex_name.pdf"
            else
              echo "    ✗ $tex_name (build failed)"
            fi
            rm -f $ch_dir/*.aux $ch_dir/*.nav $ch_dir/*.out $ch_dir/*.snm \
                  $ch_dir/*.toc $ch_dir/*.vrb $ch_dir/*.fls $ch_dir/*.log \
                  $ch_dir/$tex_name.pdf 2>/dev/null
          done

      - name: 📊 Build Summary
        working-directory: slides
        run: |
          v1=$(ls _build/vol1/*.pdf 2>/dev/null | wc -l)
          v2=$(ls _build/vol2/*.pdf 2>/dev/null | wc -l)
          echo "## 📊 Slide PDF Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Volume | PDFs Built |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vol I | $v1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Vol II | $v2 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$((v1 + v2))** |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "✅ Built $v1 Vol1 + $v2 Vol2 = $((v1 + v2)) total PDFs"

      - name: 📦 Upload Vol1 PDFs
        uses: actions/upload-artifact@v4
        with:
          name: slides-vol1-pdfs
          path: slides/_build/vol1/*.pdf
          retention-days: 30

      - name: 📦 Upload Vol2 PDFs
        uses: actions/upload-artifact@v4
        with:
          name: slides-vol2-pdfs
          path: slides/_build/vol2/*.pdf
          retention-days: 30
