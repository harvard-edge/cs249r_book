name: '📊 Slides · 🔨 Build PDFs'

# =============================================================================
# Lecture Slides — Build All Slide Deck PDFs
# =============================================================================
#
# Compiles all 35 Beamer slide decks to PDF using xelatex + inkscape,
# converts to PPTX for presenter mode, and uploads as workflow artifacts.
#
# Flow:
#   1. INSTALL      — TeX Live + Inkscape + JetBrains Mono + Metropolis theme
#   2. CONVERT_SVGS — Makefile-driven SVG-to-PDF conversion
#   3. BUILD_VOL1   — Compile Vol I slide decks (xelatex, 2-pass)
#   4. BUILD_VOL2   — Compile Vol II slide decks (xelatex, 2-pass)
#   5. CONVERT_PPTX — PDF-to-PPTX conversion for presenter mode
#   6. UPLOAD       — Upload artifacts (slides-vol1, slides-vol2)
#
# Triggers:
#   - push: dev branch, slides/**/*.tex or slides/**/*.svg changes
#   - workflow_dispatch: manual
#
# Deploys to: N/A (artifacts only — slides-vol1, slides-vol2)
#
# Related:
#   - slides-publish-live.yml — Downloads these for GitHub Release
#   - slides-preview-dev.yml  — Portal only (no PDFs)
#   - slides-validate-dev.yml — Content validation
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'slides/vol1/**/*.tex'
      - 'slides/vol1/**/*.svg'
      - 'slides/vol2/**/*.tex'
      - 'slides/vol2/**/*.svg'
      - 'slides/assets/**'
      - 'slides/Makefile'
      - '.github/workflows/slides-build-pdfs.yml'

permissions:
  contents: read

concurrency:
  group: slides-build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    name: '📄 Compile Slide Decks'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-latex-recommended \
            lmodern \
            fonts-liberation

      - name: 🔧 Install Inkscape + Poppler
        run: |
          sudo apt-get install -y --no-install-recommends inkscape poppler-utils

      - name: 🔧 Install Fonts (Helvetica Neue + JetBrains Mono)
        run: |
          # JetBrains Mono
          wget -q https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
          unzip -q JetBrainsMono-2.304.zip -d /tmp/jbmono
          sudo mkdir -p /usr/share/fonts/truetype/jetbrains-mono
          sudo cp /tmp/jbmono/fonts/ttf/*.ttf /usr/share/fonts/truetype/jetbrains-mono/
          # Refresh font cache
          sudo fc-cache -f -v > /dev/null 2>&1

      - name: 🔧 Install Beamer Metropolis Theme
        run: |
          # Metropolis theme (base for our custom theme)
          tlmgr install beamertheme-metropolis pgfopts || true

      - name: 📄 Convert SVGs to PDFs
        working-directory: slides
        run: make svgs

      - name: 📄 Build Vol1 Slide Decks
        working-directory: slides
        run: |
          echo "Building Volume I slides..."
          for ch_dir in vol1/*_*/; do
            tex_file=$(ls $ch_dir/*.tex 2>/dev/null | head -1)
            [ -z "$tex_file" ] && continue
            tex_name=$(basename "$tex_file" .tex)
            echo "  Building $tex_name..."
            cd "$ch_dir"
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            cd - > /dev/null
            mkdir -p _build/vol1
            if [ -f "$ch_dir/$tex_name.pdf" ]; then
              cp "$ch_dir/$tex_name.pdf" "_build/vol1/$tex_name.pdf"
              echo "    ✓ $tex_name.pdf"
            else
              echo "    ✗ $tex_name (build failed)"
            fi
            # Clean artifacts
            rm -f $ch_dir/*.aux $ch_dir/*.nav $ch_dir/*.out $ch_dir/*.snm \
                  $ch_dir/*.toc $ch_dir/*.vrb $ch_dir/*.fls $ch_dir/*.log \
                  $ch_dir/$tex_name.pdf 2>/dev/null
          done

      - name: 📄 Build Vol2 Slide Decks
        working-directory: slides
        run: |
          echo "Building Volume II slides..."
          for ch_dir in vol2/*_*/; do
            tex_file=$(ls $ch_dir/*.tex 2>/dev/null | head -1)
            [ -z "$tex_file" ] && continue
            tex_name=$(basename "$tex_file" .tex)
            echo "  Building $tex_name..."
            cd "$ch_dir"
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
            cd - > /dev/null
            mkdir -p _build/vol2
            if [ -f "$ch_dir/$tex_name.pdf" ]; then
              cp "$ch_dir/$tex_name.pdf" "_build/vol2/$tex_name.pdf"
              echo "    ✓ $tex_name.pdf"
            else
              echo "    ✗ $tex_name (build failed)"
            fi
            rm -f $ch_dir/*.aux $ch_dir/*.nav $ch_dir/*.out $ch_dir/*.snm \
                  $ch_dir/*.toc $ch_dir/*.vrb $ch_dir/*.fls $ch_dir/*.log \
                  $ch_dir/$tex_name.pdf 2>/dev/null
          done

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📦 Install PPTX dependencies
        run: pip install python-pptx Pillow

      - name: 📊 Convert PDFs to PPTX
        working-directory: slides
        run: |
          echo "Converting PDFs to PowerPoint..."
          for vol in vol1 vol2; do
            if ls _build/$vol/*.pdf 1>/dev/null 2>&1; then
              python3 scripts/pdf2pptx.py _build/$vol/*.pdf --output-dir _build/$vol --dpi 300
            fi
          done

      - name: 📊 Build Summary
        working-directory: slides
        run: |
          v1_pdf=$(ls _build/vol1/*.pdf 2>/dev/null | wc -l)
          v2_pdf=$(ls _build/vol2/*.pdf 2>/dev/null | wc -l)
          v1_pptx=$(ls _build/vol1/*.pptx 2>/dev/null | wc -l)
          v2_pptx=$(ls _build/vol2/*.pptx 2>/dev/null | wc -l)
          echo "## 📊 Slide Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Volume | PDFs | PPTX |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vol I | $v1_pdf | $v1_pptx |" >> $GITHUB_STEP_SUMMARY
          echo "| Vol II | $v2_pdf | $v2_pptx |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$((v1_pdf + v2_pdf))** | **$((v1_pptx + v2_pptx))** |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "✅ Built $((v1_pdf + v2_pdf)) PDFs + $((v1_pptx + v2_pptx)) PPTX"

      - name: 📦 Upload Vol1 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: slides-vol1
          path: |
            slides/_build/vol1/*.pdf
            slides/_build/vol1/*.pptx
          retention-days: 30

      - name: 📦 Upload Vol2 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: slides-vol2
          path: |
            slides/_build/vol2/*.pdf
            slides/_build/vol2/*.pptx
          retention-days: 30
