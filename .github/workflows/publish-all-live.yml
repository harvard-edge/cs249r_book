name: '🌐 All · 🚀 Publish (Live)'

# =============================================================================
# 🚀 Publish All (Live) — Orchestrator that deploys ALL subsites sequentially
# =============================================================================
#
# Thin orchestrator that delegates each subsite deployment to its own
# *-publish-live.yml standalone workflow via `uses:`. No build logic lives
# here — the standalones own the build/deploy details so the orchestrator
# stays in lockstep with what runs when each standalone is dispatched
# directly.
#
# Flow (each step waits on the previous; toggle per-site via inputs):
#   1. BOOK        — book-publish-live.yml        (Quarto render + release)
#   2. KITS        — kits-publish-live.yml
#   3. TINYTORCH   — tinytorch-publish-live.yml
#   4. MLSYSIM     — mlsysim-publish-live.yml     (with quartodoc)
#   5. LABS        — labs-publish-live.yml
#   6. STAFFML     — staffml-publish-live.yml     (Next.js + D1 + worker)
#   7. SLIDES      — slides-publish-live.yml      (lecture-deck PDFs)
#   8. SITE        — site-publish-live.yml        (landing + about + community)
#   9. INSTRUCTORS — instructors-publish-live.yml
#
# Triggers:
#   - workflow_dispatch: Manual with per-site toggles + shared release knobs
#
# Concurrency:
#   No workflow-level lock here. Each standalone declares its own
#   `gh-pages-deploy` lock on its deploy job. A workflow-level lock here
#   would deadlock against the children (parent holds lock → child waits
#   on it → parent waits on child → forever).
#
# Defaults:
#   - deploy_book = false  (book release is heavier; opt in explicitly)
#   - site_only   = true   (most "publish all" runs are content refreshes)
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'Release description (used by all subsites)'
        required: false
        default: 'Content updates and improvements'
      site_only:
        description: 'Website-only deploy across subsites (no version bump, no tag)'
        type: boolean
        default: true
      release_type:
        description: 'Release type (only applied when site_only=false)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      deploy_book:
        description: 'Deploy Book (vol1+vol2)? Off by default — opt in.'
        type: boolean
        default: false
      deploy_kits:
        description: 'Deploy Kits?'
        type: boolean
        default: true
      deploy_tinytorch:
        description: 'Deploy TinyTorch?'
        type: boolean
        default: true
      deploy_mlsysim:
        description: 'Deploy MLSYSIM?'
        type: boolean
        default: true
      deploy_labs:
        description: 'Deploy Labs?'
        type: boolean
        default: true
      deploy_staffml:
        description: 'Deploy StaffML?'
        type: boolean
        default: true
      deploy_slides:
        description: 'Deploy Slides?'
        type: boolean
        default: true
      deploy_site:
        description: 'Deploy Site (landing + about + community + newsletter)?'
        type: boolean
        default: true
      deploy_instructors:
        description: 'Deploy Instructors?'
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

jobs:
  # ==========================================================================
  # Step 1: Book (vol1 + vol2). Off by default — opt in via deploy_book=true.
  # ==========================================================================
  deploy-book:
    name: '📚 Deploy Book'
    if: ${{ inputs.deploy_book }}
    uses: ./.github/workflows/book-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH
      ai_generated_notes: 'yes'
      testing_mode: 'no'
      deploy_target: all

  # ==========================================================================
  # Step 2: Kits
  # ==========================================================================
  deploy-kits:
    name: '📦 Deploy Kits'
    needs: [deploy-book]
    if: ${{ always() && inputs.deploy_kits && (needs.deploy-book.result == 'success' || needs.deploy-book.result == 'skipped') }}
    uses: ./.github/workflows/kits-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Step 3: TinyTorch
  # ==========================================================================
  deploy-tinytorch:
    name: '🔥 Deploy TinyTorch'
    needs: [deploy-kits]
    if: ${{ always() && inputs.deploy_tinytorch && (needs.deploy-kits.result == 'success' || needs.deploy-kits.result == 'skipped') }}
    uses: ./.github/workflows/tinytorch-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Step 4: MLSYSIM (with quartodoc)
  # ==========================================================================
  deploy-mlsysim:
    name: '🧮 Deploy MLSYSIM'
    needs: [deploy-tinytorch]
    if: ${{ always() && inputs.deploy_mlsysim && (needs.deploy-tinytorch.result == 'success' || needs.deploy-tinytorch.result == 'skipped') }}
    uses: ./.github/workflows/mlsysim-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Step 5: Labs
  # ==========================================================================
  deploy-labs:
    name: '🔬 Deploy Labs'
    needs: [deploy-mlsysim]
    if: ${{ always() && inputs.deploy_labs && (needs.deploy-mlsysim.result == 'success' || needs.deploy-mlsysim.result == 'skipped') }}
    uses: ./.github/workflows/labs-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Step 6: StaffML (Next.js + D1 ship + Cloudflare worker deploy)
  # ==========================================================================
  deploy-staffml:
    name: '🎯 Deploy StaffML'
    needs: [deploy-labs]
    if: ${{ always() && inputs.deploy_staffml && (needs.deploy-labs.result == 'success' || needs.deploy-labs.result == 'skipped') }}
    uses: ./.github/workflows/staffml-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Step 7: Slides
  # ==========================================================================
  deploy-slides:
    name: '📊 Deploy Slides'
    needs: [deploy-staffml]
    if: ${{ always() && inputs.deploy_slides && (needs.deploy-staffml.result == 'success' || needs.deploy-staffml.result == 'skipped') }}
    uses: ./.github/workflows/slides-publish-live.yml
    secrets: inherit

  # ==========================================================================
  # Step 8: Landing Site (landing + about + community + newsletter)
  # ==========================================================================
  deploy-site:
    name: '🌐 Deploy Landing Site'
    needs: [deploy-slides]
    if: ${{ always() && inputs.deploy_site && (needs.deploy-slides.result == 'success' || needs.deploy-slides.result == 'skipped') }}
    uses: ./.github/workflows/site-publish-live.yml
    secrets: inherit

  # ==========================================================================
  # Step 9: Instructors
  # ==========================================================================
  deploy-instructors:
    name: '🎓 Deploy Instructors'
    needs: [deploy-site]
    if: ${{ always() && inputs.deploy_instructors && (needs.deploy-site.result == 'success' || needs.deploy-site.result == 'skipped') }}
    uses: ./.github/workflows/instructors-publish-live.yml
    secrets: inherit
    with:
      description: ${{ inputs.description }}
      site_only: ${{ inputs.site_only }}
      release_type: ${{ inputs.release_type }}
      confirm: PUBLISH

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: '📋 Deployment Summary'
    needs: [deploy-book, deploy-kits, deploy-tinytorch, deploy-mlsysim, deploy-labs, deploy-staffml, deploy-slides, deploy-site, deploy-instructors]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Publish All Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Description**: ${{ inputs.description }}" >> $GITHUB_STEP_SUMMARY
          echo "**Site only**: ${{ inputs.site_only }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Book | ${{ needs.deploy-book.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Kits | ${{ needs.deploy-kits.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 TinyTorch | ${{ needs.deploy-tinytorch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧮 MLSYSIM | ${{ needs.deploy-mlsysim.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Labs | ${{ needs.deploy-labs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 StaffML | ${{ needs.deploy-staffml.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Slides | ${{ needs.deploy-slides.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Landing Site | ${{ needs.deploy-site.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎓 Instructors | ${{ needs.deploy-instructors.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Live URLs" >> $GITHUB_STEP_SUMMARY
          echo "- 📖 [Volume I](https://mlsysbook.ai/${{ vars.VOL1_DEPLOY_PATH }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📘 [Volume II](https://mlsysbook.ai/${{ vars.VOL2_DEPLOY_PATH }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 [Kits](https://mlsysbook.ai/kits/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔥 [TinyTorch](https://mlsysbook.ai/tinytorch/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🧮 [MLSYSIM](https://mlsysbook.ai/mlsysim/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔬 [Labs](https://mlsysbook.ai/labs/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 [StaffML](https://mlsysbook.ai/staffml/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Slides](https://mlsysbook.ai/slides/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏠 [Landing](https://mlsysbook.ai/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 [About](https://mlsysbook.ai/about/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 [Community](https://mlsysbook.ai/community/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📬 [Newsletter](https://mlsysbook.ai/newsletter/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🎓 [Instructors](https://mlsysbook.ai/instructors/)" >> $GITHUB_STEP_SUMMARY
