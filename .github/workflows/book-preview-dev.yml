name: '📚 Book · 👁️ Preview (Dev)'

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Optional: Specific commit SHA to deploy. Deploys the latest successful `dev` build if empty.'
        required: false
        type: string
  workflow_run:
    workflows: ["📚 Book · ✅ Validate (Dev)"]
    types:
      - completed

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: '📺 Deploy to GitHub Pages (Dev Preview)'
    if: (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Deploys dev branch to: https://harvard-edge.github.io/cs249r_book_dev/
    permissions:
      contents: write # Allow write access to repository
      pages: write
      actions: read # Allow reading of workflow runs

    steps:
      - name: ⬇️ Get workflow run ID
        id: run_info
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_SHA=$(echo "${{ github.event.inputs.commit_sha }}" | xargs)
          API_URL="repos/${{ github.repository }}/actions/workflows/book-validate-dev.yml/runs"

          if [[ -n "$COMMIT_SHA" ]]; then
            echo "🔎 Searching for successful 'Validate Dev' run for commit starting with: $COMMIT_SHA"
            JQ_QUERY=".workflow_runs[] | select((.head_sha | startswith(\"$COMMIT_SHA\")) and .status == \"completed\" and .conclusion == \"success\") | .id"
          else
            echo "🔎 No commit SHA provided. Searching for the latest successful 'Validate Dev' run on 'dev' branch."
            JQ_QUERY=".workflow_runs[] | select(.head_branch == \"dev\" and .status == \"completed\" and .conclusion == \"success\") | .id"
          fi

          latest_run_id=$(gh api "$API_URL" --jq "$JQ_QUERY" | head -n 1)

          if [ -z "$latest_run_id" ]; then
              if [[ -n "$COMMIT_SHA" ]]; then
                echo "::error::Could not find a successful 'Validate Dev' run for commit ${COMMIT_SHA}."
              else
                echo "::error::Could not find any successful 'Validate Dev' run on the 'dev' branch."
              fi
              exit 1
          fi

          echo "Found run ID: ${latest_run_id}"
          echo "run_id=${latest_run_id}" >> $GITHUB_OUTPUT

          latest_run_sha=$(gh api repos/${{ github.repository }}/actions/runs/${latest_run_id} --jq '.head_sha')
          echo "head_sha=${latest_run_sha}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol1 HTML Artifact
        uses: actions/download-artifact@v7
        with:
          name: dev-html-vol1-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./html-vol1-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol2 HTML Artifact
        uses: actions/download-artifact@v7
        with:
          name: dev-html-vol2-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./html-vol2-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol1 PDF Artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: dev-pdf-vol1-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./pdf-vol1-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol2 PDF Artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: dev-pdf-vol2-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./pdf-vol2-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol1 EPUB Artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: dev-epub-vol1-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./epub-vol1-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Download Vol2 EPUB Artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: dev-epub-vol2-linux
          run-id: ${{ steps.run_info.outputs.run_id }}
          path: ./epub-vol2-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build volume preview site
        run: |
          echo "📦 Preparing volume preview site..."
          mkdir -p ./preview-site/vol1 ./preview-site/vol2

          cp -r ./html-vol1-artifact/* ./preview-site/vol1/
          cp -r ./html-vol2-artifact/* ./preview-site/vol2/

          mkdir -p ./preview-site/vol1/assets/downloads ./preview-site/vol2/assets/downloads

          # Copy PDF/EPUB downloads (find by extension, rename to consistent volume-specific names)
          VOL1_PDF=$(find ./pdf-vol1-artifact -name "*.pdf" -type f 2>/dev/null | head -1)
          [ -n "$VOL1_PDF" ] && cp "$VOL1_PDF" "./preview-site/vol1/assets/downloads/Machine-Learning-Systems-Vol1.pdf"

          VOL1_EPUB=$(find ./epub-vol1-artifact -name "*.epub" -type f 2>/dev/null | head -1)
          [ -n "$VOL1_EPUB" ] && cp "$VOL1_EPUB" "./preview-site/vol1/assets/downloads/Machine-Learning-Systems-Vol1.epub"

          VOL2_PDF=$(find ./pdf-vol2-artifact -name "*.pdf" -type f 2>/dev/null | head -1)
          [ -n "$VOL2_PDF" ] && cp "$VOL2_PDF" "./preview-site/vol2/assets/downloads/Machine-Learning-Systems-Vol2.pdf"

          VOL2_EPUB=$(find ./epub-vol2-artifact -name "*.epub" -type f 2>/dev/null | head -1)
          [ -n "$VOL2_EPUB" ] && cp "$VOL2_EPUB" "./preview-site/vol2/assets/downloads/Machine-Learning-Systems-Vol2.epub"

      - name: 📝 Create .nojekyll file
        run: touch ./preview-site/.nojekyll

      - name: 📦 Inspect final site contents
        run: |
          echo "::group::Site Contents"
          ls -la ./preview-site
          echo "::endgroup::"

          echo "::group::Assets/Downloads Contents"
          if [ -d "./preview-site/assets/downloads" ]; then
            ls -la ./preview-site/assets/downloads
          else
            echo "No assets/downloads directory"
          fi
          echo "::endgroup::"

      - name: ⬇️ Checkout repository (for scripts and landing site)
        uses: actions/checkout@v6
        with:
          ref: dev
          path: ./repo-scripts
          sparse-checkout: |
            ${{ vars.BOOK_TOOLS }}/scripts/publish/modify_dev_announcement.py
            .github/dev-landing/book-index.html
            book/quarto/landing_site
            book/quarto/assets/styles
          sparse-checkout-cone-mode: false

      - name: 🔧 Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🏠 Build and prepare landing site
        run: |
          echo "🏗️ Rendering Quarto landing site..."
          cd ./repo-scripts/book/quarto
          quarto render landing_site/index.qmd
          echo "✅ Landing site rendered"
          ls -la _build/html-landing/

          echo "🔧 Rewriting URLs for dev site..."
          # The landing page hardcodes mlsysbook.ai URLs — rewrite for dev site structure.
          # The rendered index.html will be served from the ROOT of the dev site, so
          # relative paths use no ../ prefix (e.g. book/vol1/, tinytorch/).
          cd _build/html-landing
          for f in $(find . -name "*.html" -type f); do
            # Volume links: mlsysbook.ai/vol1/ -> book/vol1/
            sed -i 's|https://mlsysbook.ai/vol1/|book/vol1/|g' "$f"
            sed -i 's|https://mlsysbook.ai/vol2/|book/vol2/|g' "$f"
            # Other subsite links
            sed -i 's|https://mlsysbook.ai/tinytorch/|tinytorch/|g' "$f"
            sed -i 's|https://mlsysbook.ai/kits/|kits/|g' "$f"
            sed -i 's|https://mlsysbook.ai/labs/|labs/|g' "$f"
            # Navbar relative links (href="vol1/" etc. produced by Quarto from _quarto.yml)
            sed -i 's|href="vol1/"|href="book/vol1/"|g' "$f"
            sed -i 's|href="vol2/"|href="book/vol2/"|g' "$f"
            # Download links
            sed -i 's|https://mlsysbook.ai/vol1/assets/downloads/|book/vol1/assets/downloads/|g' "$f"
            sed -i 's|https://mlsysbook.ai/vol2/assets/downloads/|book/vol2/assets/downloads/|g' "$f"
            # Remaining mlsysbook.ai base URL (e.g. site-url, og tags) -> dev site root
            sed -i 's|https://mlsysbook.ai/|./|g' "$f"
          done
          echo "✅ URL rewriting complete"

      - name: 🔧 Modify announcement for dev preview
        run: |
          echo "🔧 Modifying announcement banner for development preview..."

          # Get commit info for display
          COMMIT_HASH="${{ steps.run_info.outputs.head_sha }}"
          COMMIT_SHORT="${COMMIT_HASH:0:8}"

          echo "📝 Adding dev preview banner with commit info: $COMMIT_SHORT"

          python3 ./repo-scripts/${{ vars.BOOK_TOOLS }}/scripts/publish/modify_dev_announcement.py \
            ./preview-site \
            --verbose \
            --commit-hash "$COMMIT_HASH" \
            --commit-short "$COMMIT_SHORT"

      - name: 🚀 Deploy to Dev Site via SSH
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "🔐 Starting ssh-agent..."
          eval "$(ssh-agent -s)"
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
          # Add github.com to known hosts to avoid prompt
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          echo "🔧 Configuring git..."
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "🔄 Cloning target repository (${{ vars.DEV_REPO }})..."
          git clone --depth=1 ${{ vars.DEV_REPO_URL }} target-repo

          echo "🔄 Entering target repository..."
          cd target-repo

          echo "🧹 Cleaning /${{ vars.DEV_BOOK_PATH }}/ subdirectory only (preserving /${{ vars.DEV_TINYTORCH_PATH }}/ and landing page)..."
          # Only remove book subdirectory, preserve other content
          rm -rf ${{ vars.DEV_BOOK_PATH }}
          mkdir -p ${{ vars.DEV_BOOK_PATH }}

          echo "🚚 Copying book content to /${{ vars.DEV_BOOK_PATH }}/ subdirectory..."
          cp -r "${{ github.workspace }}/preview-site/." ${{ vars.DEV_BOOK_PATH }}/

          echo "📄 Deploying Quarto landing site to root..."
          # Copy rendered landing site to root (preserves tinytorch/ and book/ if they exist)
          LANDING_DIR="${{ github.workspace }}/repo-scripts/book/quarto/_build/html-landing"
          if [ -d "$LANDING_DIR" ]; then
            cp -r "$LANDING_DIR"/. ./
            echo "✅ Quarto landing site deployed to root"
          else
            echo "⚠️ Landing site not found, falling back to book-index.html"
          fi
          # Copy book volume chooser page so /book/ doesn't 404
          cp "${{ github.workspace }}/repo-scripts/.github/dev-landing/book-index.html" ${{ vars.DEV_BOOK_PATH }}/index.html
          touch .nojekyll

          echo "🔍 Validating deployment content..."
          if [ ! -f "${{ vars.DEV_BOOK_PATH }}/vol1/index.html" ]; then
            echo "❌ CRITICAL: ${{ vars.DEV_BOOK_PATH }}/vol1/index.html is missing after copy. Aborting deployment."
            exit 1
          fi

          if [ ! -f "${{ vars.DEV_BOOK_PATH }}/vol2/index.html" ]; then
            echo "❌ CRITICAL: ${{ vars.DEV_BOOK_PATH }}/vol2/index.html is missing after copy. Aborting deployment."
            exit 1
          fi

          if [ ! -f "index.html" ]; then
            echo "❌ CRITICAL: Landing page index.html is missing. Aborting deployment."
            exit 1
          fi

          echo "📦 Repository structure:"
          ls -la
          echo ""
          echo "📦 /${{ vars.DEV_BOOK_PATH }}/ contents:"
          ls -la ${{ vars.DEV_BOOK_PATH }}/ | head -10

          echo "📦 Committing and pushing changes..."
          git add .
          git commit -m "🚀 Deploy book dev preview to /${{ vars.DEV_BOOK_PATH }}/ from ${{ steps.run_info.outputs.head_sha }}" --allow-empty || echo "🟡 Nothing to commit"
          git push origin main

          # DEV_REPO contains org/repo format, extract just repo name for GitHub Pages URL
          REPO_NAME="${{ vars.DEV_REPO }}"
          REPO_NAME="${REPO_NAME##*/}"
          echo "✅ Book deployed to: https://harvard-edge.github.io/${REPO_NAME}/${{ vars.DEV_BOOK_PATH }}/"
