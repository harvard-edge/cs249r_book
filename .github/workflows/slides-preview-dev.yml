name: '📊 Slides · 👀 Preview (Dev)'

# =============================================================================
# Lecture Slides — Deploy Preview to Cloudflare Pages (Dev)
# =============================================================================
#
# Builds the Quarto slides portal and deploys to the dev preview URL.
# PDF compilation is NOT done in CI (too heavy) — PDFs are built locally
# and referenced from the portal.
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'slides/**'
      - '.github/workflows/slides-*.yml'

permissions:
  contents: read
  deployments: write

concurrency:
  group: slides-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: '🚀 Build & Deploy Preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Slides Portal
        working-directory: slides
        run: quarto render

      - name: 🔍 Validate build
        run: |
          if [ ! -f "slides/_build/html/index.html" ]; then
            echo "❌ Build failed — no index.html"
            exit 1
          fi
          echo "✅ Build successful"
          echo "📊 Size: $(du -sh slides/_build/html | cut -f1)"

