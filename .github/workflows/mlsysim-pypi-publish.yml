name: '🧮 MLSYSIM · 📦 PyPI Publish'

# =============================================================================
# MLSYSIM — PyPI Release
# =============================================================================
#
# Builds and uploads the mlsysim Python package to PyPI when a tag matching
# `mlsysim-v*` is pushed. Uses Trusted Publishing (OIDC), so no PyPI API
# token is stored anywhere in the repo or in GitHub Secrets.
#
# Flow:
#   1. VERIFY       — tag format, version coherence across files, CHANGELOG
#                     entry, reachable from dev
#   2. TEST         — full pytest suite in parallel across Python 3.10–3.13
#   3. BUILD        — python -m build → wheel + sdist; twine check
#   4. PUBLISH      — upload to PyPI via pypa/gh-action-pypi-publish (OIDC)
#                     with PEP 740 attestations
#   5. VERIFY-PYPI  — post-publish smoke: pip install from real PyPI (with
#                     CDN propagation retry), import check, CLI smoke
#   6. RELEASE      — create GitHub Release with wheel + sdist attached
#   7. DOCS         — dispatch mlsysim-publish-live.yml to refresh docs site
#
# Triggers:
#   - push: tags matching 'mlsysim-v*'
#   - workflow_dispatch: manual trigger (for re-running docs or release-only)
#
# Publishes to: https://pypi.org/project/mlsysim/
# Secrets:      GITHUB_TOKEN (for GH Release + docs trigger)
#               No PyPI secret required (Trusted Publishing via OIDC)
# Environment:  pypi-mlsysim (for deployment tracking + protection rules)
#
# Related:
#   - mlsysim-validate-dev.yml — Test & docs validation (runs on PRs)
#   - mlsysim-publish-live.yml — Docs site publish (dispatched by this)
#
# Trusted Publishing setup (one-time, via pypi.org web UI):
#   https://pypi.org/manage/account/publishing/
#     Project:     mlsysim
#     Owner:       harvard-edge
#     Repository:  cs249r_book
#     Workflow:    mlsysim-pypi-publish.yml
#     Environment: pypi-mlsysim
#
# =============================================================================

on:
  push:
    tags:
      - 'mlsysim-v*'
  workflow_dispatch:
    inputs:
      skip_pypi:
        description: 'Skip the PyPI upload (useful for re-running docs + release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write    # needed to create the GitHub Release
  id-token: write    # needed for Trusted Publishing (OIDC)
  actions: write     # needed to dispatch mlsysim-publish-live.yml

concurrency:
  group: mlsysim-pypi-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish in flight

jobs:
  # ===========================================================================
  # Stage 1: Verify coherence before doing any irreversible work
  # ===========================================================================
  verify:
    name: '🔍 Verify Version Coherence'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history to verify tag reachability from dev

      - name: 🏷️  Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^mlsysim-v[0-9]+\.[0-9]+\.[0-9]+(.*)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected pattern 'mlsysim-vX.Y.Z'"
            exit 1
          fi
          VERSION="${TAG#mlsysim-v}"
          echo "tag=$TAG"       | tee -a "$GITHUB_OUTPUT"
          echo "version=$VERSION" | tee -a "$GITHUB_OUTPUT"

      - name: 🔢 Verify pyproject.toml version matches tag
        run: |
          PKG_VERSION=$(grep -E '^version = ' mlsysim/pyproject.toml | head -1 | cut -d'"' -f2)
          EXPECTED="${{ steps.extract.outputs.version }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::pyproject.toml version '$PKG_VERSION' does not match tag version '$EXPECTED'"
            exit 1
          fi
          echo "✅ pyproject.toml version ($PKG_VERSION) matches tag"

      - name: 🔢 Verify __init__.py version matches tag
        run: |
          PKG_VERSION=$(grep -E '^__version__ = ' mlsysim/mlsysim/__init__.py | head -1 | cut -d'"' -f2)
          EXPECTED="${{ steps.extract.outputs.version }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::mlsysim/__init__.py __version__ ('$PKG_VERSION') does not match tag ('$EXPECTED')"
            exit 1
          fi
          echo "✅ __init__.py version ($PKG_VERSION) matches tag"

      - name: 🔢 Verify CITATION.cff version matches tag
        run: |
          CFF_VERSION=$(grep -E '^version:' mlsysim/CITATION.cff | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          EXPECTED="${{ steps.extract.outputs.version }}"
          if [ "$CFF_VERSION" != "$EXPECTED" ]; then
            echo "::error::CITATION.cff version ('$CFF_VERSION') does not match tag ('$EXPECTED')"
            exit 1
          fi
          echo "✅ CITATION.cff version ($CFF_VERSION) matches tag"

      - name: 📝 Verify CHANGELOG has entry for this version
        run: |
          EXPECTED="${{ steps.extract.outputs.version }}"
          if ! grep -qE "^## v${EXPECTED}[[:space:]]" mlsysim/CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing an entry for v${EXPECTED}"
            echo "Expected a heading like: '## v${EXPECTED} (YYYY-MM-DD)'"
            exit 1
          fi
          echo "✅ CHANGELOG entry present for v${EXPECTED}"

      - name: 🌿 Verify tag is reachable from dev
        run: |
          # Published packages should come from code that has been merged to dev.
          # This prevents accidentally tagging a stale branch or feature branch.
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/dev" 2>/dev/null; then
            echo "::error::Tagged commit is not an ancestor of origin/dev."
            echo "Merge the release commit to dev before publishing MLSys·im."
            exit 1
          else
            echo "✅ Tagged commit is reachable from origin/dev"
          fi

  # ===========================================================================
  # Stage 2: Full test suite across every supported Python version
  # ===========================================================================
  # Runs pytest in parallel on every Python version listed in the package's
  # classifiers. Catches "works on my Python, breaks on theirs" bugs BEFORE
  # the wheel ships — metadata claims these versions are supported, so the
  # wheel must actually pass tests on each of them. `fail-fast: false` means
  # one failing version doesn't cancel the others, so we see all failures at
  # once instead of discovering them one-by-one.
  # ===========================================================================
  test:
    name: '🧪 Test Suite (py${{ matrix.python-version }})'
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install package with dev extras
        working-directory: mlsysim
        run: pip install ".[dev]"

      - name: 🧪 Run tests
        working-directory: mlsysim
        run: pytest tests/ -v --tb=short

  # ===========================================================================
  # Stage 3: Build wheel + sdist (reproducible, clean)
  # ===========================================================================
  build:
    name: '🔨 Build Distribution'
    needs: [verify, test]
    runs-on: ubuntu-latest
    outputs:
      wheel_name: ${{ steps.names.outputs.wheel }}
      sdist_name: ${{ steps.names.outputs.sdist }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install build tools
        run: pip install build twine

      - name: 🔨 Build wheel + sdist
        working-directory: mlsysim
        run: python -m build

      - name: 🔍 twine check
        working-directory: mlsysim
        run: twine check dist/*

      - name: 📛 Capture artifact names
        id: names
        working-directory: mlsysim
        run: |
          echo "wheel=$(ls dist/*.whl)" >> "$GITHUB_OUTPUT"
          echo "sdist=$(ls dist/*.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload distributions as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: mlsysim-dist-${{ needs.verify.outputs.version }}
          path: mlsysim/dist/
          if-no-files-found: error
          retention-days: 90

  # ===========================================================================
  # Stage 4: Publish to PyPI via Trusted Publishing (OIDC)
  # ===========================================================================
  # No API token is used. The pypa/gh-action-pypi-publish action requests an
  # OIDC token from GitHub, which PyPI then validates against the trusted
  # publisher configuration. If this step fails with an OIDC error, it means
  # Trusted Publishing has not been set up on pypi.org for this project/workflow.
  # ===========================================================================
  publish-pypi:
    name: '📦 Publish to PyPI'
    needs: [verify, test, build]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_pypi }}
    runs-on: ubuntu-latest
    environment:
      name: pypi-mlsysim
      url: https://pypi.org/project/mlsysim/${{ needs.verify.outputs.version }}/
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlsysim-dist-${{ needs.verify.outputs.version }}
          path: dist/

      - name: 📦 Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Default repository URL is https://upload.pypi.org/legacy/ — correct
          # for production PyPI. Trusted Publishing is configured per-project
          # at https://pypi.org/manage/account/publishing/.
          verbose: true
          # PEP 740 attestations: cryptographic provenance stating "this wheel
          # was built by this exact workflow run from this exact commit."
          # Lets downstream users verify that a release came from our CI,
          # not from a stolen token or a compromised maintainer laptop.
          # Generated by default with OIDC; we set it explicitly for clarity
          # and to document the intent.
          attestations: true

  # ===========================================================================
  # Stage 5: Verify the package is actually installable from PyPI
  # ===========================================================================
  # This is the post-publish smoke test. Everything before this stage tested
  # the LOCAL wheel (the one we just built). This stage tests the REMOTE
  # wheel — the one PyPI is actually serving to `pip install mlsysim`.
  # Catches the narrow-but-real class of failures that live between "upload
  # accepted" and "user install works": CDN propagation, metadata rendering,
  # platform tag issues. Retries with backoff because PyPI's fastly CDN can
  # take up to a few minutes to propagate a new version globally.
  # ===========================================================================
  verify-pypi:
    name: '🔬 Verify from PyPI'
    needs: [verify, publish-pypi]
    if: ${{ needs.publish-pypi.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🔬 pip install from PyPI (with propagation retry)
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          for attempt in 1 2 3 4; do
            echo "Attempt $attempt: pip install mlsysim==$VERSION from PyPI"
            if pip install --no-cache-dir "mlsysim==$VERSION"; then
              echo "✅ Installed on attempt $attempt"
              break
            fi
            if [ $attempt -eq 4 ]; then
              echo "::error::pip install failed after 4 attempts — PyPI propagation timeout or real issue"
              exit 1
            fi
            echo "Not available yet; sleeping 60s for CDN propagation"
            sleep 60
          done

      - name: 🔬 Import + metadata check
        run: |
          python - <<'EOF'
          import mlsysim
          import importlib.metadata as m
          got = mlsysim.__version__
          expected = "${{ needs.verify.outputs.version }}"
          assert got == expected, f"version mismatch: installed {got}, expected {expected}"
          md = m.metadata("mlsysim")
          assert md["License"] == "Apache-2.0", f"unexpected license: {md['License']}"
          print(f"✅ mlsysim=={got} imports cleanly with license {md['License']}")
          EOF

      - name: 🔬 CLI smoke test
        run: |
          mlsysim --help > /dev/null
          mlsysim eval Llama3_8B H100 --batch-size 32
          echo "✅ CLI smoke passed"

  # ===========================================================================
  # Stage 6: Create GitHub Release with artifacts attached
  # ===========================================================================
  github-release:
    name: '🏷️ GitHub Release'
    needs: [verify, build, publish-pypi]
    if: ${{ always() && needs.build.result == 'success' && (needs.publish-pypi.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_pypi)) }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (full history for tag resolution)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0       # needed for `git describe --tags` to find PREV_TAG

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlsysim-dist-${{ needs.verify.outputs.version }}
          path: dist/

      - name: 📝 Compose release notes
        id: notes
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          NOTES_FILE="mlsysim/RELEASE_NOTES_${VERSION}.md"
          OUT="$RUNNER_TEMP/release-body.md"

          if [ -f "$NOTES_FILE" ]; then
            # Hand-written release notes (for milestone releases). Use as-is —
            # the file is assumed to already be well-formed.
            echo "::notice::Using hand-written $NOTES_FILE"
            cp "$NOTES_FILE" "$OUT"
          else
            # Default path: extract the `## vX.Y.Z` section from CHANGELOG.md
            # and wrap with title, install, links, and the About footer.
            echo "::notice::Extracting v${VERSION} section from CHANGELOG.md"
            CHANGELOG="mlsysim/CHANGELOG.md"

            # Optional theme: everything after " — " on the heading line.
            THEME=$(awk -v ver="v${VERSION}" '
              $0 ~ "^## " ver " " {
                if (match($0, / — /)) print substr($0, RSTART + RLENGTH)
                exit
              }
            ' "$CHANGELOG")

            # Body: lines between the heading and the next `## v…` heading.
            BODY=$(awk -v ver="v${VERSION}" '
              $0 ~ "^## " ver " " {flag=1; next}
              flag && /^## v[0-9]/ {exit}
              flag {print}
            ' "$CHANGELOG")

            if [ -z "$BODY" ]; then
              echo "::error::CHANGELOG.md has no section for v${VERSION}"
              exit 1
            fi

            # Previous tag for the diff link (best-effort; empty on first release).
            PREV_TAG=$(git describe --tags --abbrev=0 --match='mlsysim-v*' --exclude="mlsysim-v${VERSION}" 2>/dev/null || echo '')

            {
              if [ -n "$THEME" ]; then
                echo "# MLSys·im ${VERSION} — ${THEME}"
              else
                echo "# MLSys·im ${VERSION}"
              fi
              echo "*First-principles infrastructure modeling for the [Machine Learning Systems](https://mlsysbook.ai) textbook.*"
              echo ""
              printf '%s\n' "$BODY"
              echo ""
              echo "---"
              echo ""
              echo "## Install"
              echo ""
              echo '    pip install --upgrade mlsysim=='"${VERSION}"
              echo ""
              echo "---"
              echo ""
              echo "## Links"
              echo ""
              echo "- [PyPI · mlsysim ${VERSION}](https://pypi.org/project/mlsysim/${VERSION}/)"
              echo "- [Documentation](https://mlsysbook.ai/mlsysim/)"
              echo "- [Full CHANGELOG](https://github.com/${{ github.repository }}/blob/dev/mlsysim/CHANGELOG.md)"
              if [ -n "$PREV_TAG" ]; then
                echo "- [Diff ${PREV_TAG} → mlsysim-v${VERSION}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...mlsysim-v${VERSION})"
              fi
              echo ""
              echo "---"
              echo ""
              echo "## About MLSys·im"
              echo ""
              echo "MLSys·im is the first-principles infrastructure modeling engine that"
              echo "produces every quantitative result in the [*Machine Learning Systems*](https://mlsysbook.ai)"
              echo "textbook — memory bandwidth calculations, roofline analyses, TCO projections,"
              echo "sustainability estimates, and every other number a reader encounters. Each"
              echo "figure and equation in the textbook is **computed, not hand-typed**; mlsysim"
              echo "is the computation."
              echo ""
              echo "The framework codifies **22 systems walls** — the physical and logical"
              echo "constraints that bound ML system performance — into composable solvers,"
              echo "with SI units enforced at runtime. Designed for three audiences: **students**"
              echo "building quantitative intuition, **instructors** running live classroom"
              echo "demonstrations, and **researchers** doing rapid what-if analysis."
            } > "$OUT"
          fi

          echo "body_file=$OUT" >> "$GITHUB_OUTPUT"
          echo "::group::composed release body (first 80 lines)"
          head -80 "$OUT"
          echo "::endgroup::"

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          name: 'MLSys·im ${{ needs.verify.outputs.version }}'
          body_path: ${{ steps.notes.outputs.body_file }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

  # ===========================================================================
  # Stage 7: Trigger docs redeploy so mlsysbook.ai/mlsysim reflects new version
  # ===========================================================================
  docs-redeploy:
    name: '📚 Trigger Docs Redeploy'
    needs: [verify, publish-pypi]
    if: ${{ always() && needs.verify.result == 'success' && (needs.publish-pypi.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_pypi)) }}
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Dispatch mlsysim-publish-live.yml on dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run mlsysim-publish-live.yml \
            --repo ${{ github.repository }} \
            --ref dev
          echo "✅ Dispatched docs redeploy on dev"
