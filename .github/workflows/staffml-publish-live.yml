name: '🎯 StaffML · 🚀 Publish (Live)'

# =============================================================================
# StaffML — Production Deploy
# =============================================================================
#
# Builds the StaffML Next.js app, runs vault validation and smoke tests,
# and deploys to production. Also deploys a redirect at /interviews/ for
# backward compatibility with the old URL.
#
# Flow:
#   1. SYNC_VAULT  — Sync vault data into StaffML src
#   2. BUILD       — npm ci + Next.js static export
#   3. VALIDATE    — Build output + vault integrity + smoke tests
#   4. DEPLOY      — Push to gh-pages/staffml/ + /interviews/ redirect
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/staffml/ (+ /interviews/ redirect)
# Secrets:    GITHUB_TOKEN
#
# Related:
#   - staffml-preview-dev.yml — Dev preview deploy
#   - staffml-auto-pr.yml    — Auto-PR from community question issues
#   - staffml-welcome.yml    — Welcome comment on contributor PRs
#
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What are you publishing? [Content updates and improvements]'
        required: false
        default: 'Content updates and improvements'
      site_only:
        description: 'Website-only deploy? (no version bump, no tag — reuses current release_id)'
        required: false
        type: boolean
        default: false
      release_type:
        description: 'Release type (ignored if site_only OR explicit_version is set) [patch]'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      explicit_version:
        description: 'Override: explicit X.Y.Z (skips bump math). Leave blank to auto-bump.'
        required: false
        default: ''
      confirm:
        description: 'Type "PUBLISH" to confirm (safety check) [required]'
        required: true
        default: ''

permissions:
  contents: write
  actions: read

# NB: gh-pages-deploy concurrency is declared on the build-and-deploy job
# only. The guard runs without holding the lock.

jobs:
  # Block publish unless BOTH validation workflows were last green on dev.
  # `staffml-validate-dev` covers the Next.js app + E2E smoke;
  # `staffml-validate-vault` covers corpus integrity + vault-cli + worker.
  # A YAML bug that broke chain integrity would surface in validate-vault
  # but not validate-dev, so publishing without gating on both could ship
  # a broken vault even when the site builds fine.
  # See .github/workflows/infra-publish-guard.yml for guard semantics.
  guard-dev:
    name: '🛡️ Validate-Dev Green Gate'
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: staffml-validate-dev.yml

  guard-vault:
    name: '🛡️ Validate-Vault Green Gate'
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: staffml-validate-vault.yml

  # Compute the new release_id from previous tag + release_type. The shared
  # workflow validates confirm == "PUBLISH" and refuses to re-tag an
  # existing release. This is what closes the "manifest drifted to
  # 0.1.2-dev while releases/0.1.0 said 0.1.0" gap that motivated the
  # whole single-source-of-truth refactor — every publish now passes a
  # real, deliberate release_id to `vault build` instead of the
  # constant-string `--release-id publish-live`.
  prepare:
    name: '🏷️ Prepare release'
    uses: ./.github/workflows/_release-prepare.yml
    with:
      project: staffml
      tier: A
      previous_tag_pattern: 'staffml-v*'
      release_type: ${{ inputs.release_type }}
      explicit_version: ${{ inputs.explicit_version }}
      description: ${{ inputs.description }}
      confirm: ${{ inputs.confirm }}
      site_only: ${{ inputs.site_only }}

  build-and-deploy:
    name: '🔧 Build & Deploy StaffML'
    needs: [guard-dev, guard-vault, prepare]
    if: inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interviews/staffml/package-lock.json

      - name: 📦 Install dependencies
        working-directory: interviews/staffml
        run: npm ci

      - name: 🐍 Setup Python (for vault-cli)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 🛠️ Install vault-cli
        run: pip install -e interviews/vault-cli/

      - name: 🔄 Regenerate corpus from YAMLs (vault build --legacy-json)
        # Ships interviews/staffml/src/data/corpus.json (full) +
        # corpus-summary.json (bundled by the site) straight from the
        # committed YAMLs. The site always deploys with current YAML state,
        # even if the committed JSON artifacts drifted on the last commit.
        # --release-id is the deliberately-bumped version from the prepare
        # job — the manifest emit_manifest() writes will carry it, and
        # everything downstream (footer pill, citation card, X-Vault-Release
        # header) inherits it from the manifest. Closes the long-running
        # "publish-live constant string overwrites releases/<id>" bug.
        run: vault build --vault-dir interviews/vault --release-id "${{ needs.prepare.outputs.new_release_id }}" --legacy-json

      - name: 🔍 Type check
        working-directory: interviews/staffml
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        working-directory: interviews/staffml
        run: npm test

      - name: 🔨 Build StaffML
        working-directory: interviews/staffml
        env:
          NEXT_PUBLIC_BASE_PATH: /staffml
          NEXT_PUBLIC_ANALYTICS_URL: https://mlsysbook.ai/api/staffml-analytics
          # Hosted Ask Interviewer endpoint. Custom route on the mlsysbook.ai
          # zone served by the staffml-interviewer Cloudflare Worker (see
          # interviews/staffml/worker/wrangler.toml). Same-origin with the
          # live site at mlsysbook.ai/staffml/ so no CORS preflight is
          # required on /ask calls from the AskInterviewer panel.
          NEXT_PUBLIC_INTERVIEWER_ENDPOINT: https://mlsysbook.ai/api/staffml-interviewer
          # Vault cutover (PRs #1433, #1434): site reads live data from the
          # Cloudflare Worker in production; bundled corpus.json is the
          # offline fallback. NEXT_PUBLIC_VAULT_FALLBACK is intentionally
          # unset so vault-fallback.ts defaults to 'vault-api'.
          NEXT_PUBLIC_VAULT_API: https://staffml-vault.mlsysbook-ai-account.workers.dev
          # NEXT_PUBLIC_VAULT_RELEASE is intentionally unset — the site reads
          # RELEASE_ID from src/lib/stats.ts (which derives from the manifest
          # emit_manifest() just wrote in the previous step). See vault-api.ts.
        run: npm run build

      - name: 📦 Emit canonical release-manifest.json into deploy dir
        # The site bundles vault-manifest.json into the JS at build time
        # (stats.ts imports it). A separate canonical-shape manifest at
        # out/release-manifest.json gives external consumers (other tools,
        # scrapers, monitoring) a uniform URL across all MLSysBook sites:
        # https://mlsysbook.ai/<project>/release-manifest.json. Same
        # releaseId + releaseHash as the bundled manifest — they come
        # from the same emit_manifest() call that just wrote
        # vault-manifest.json.
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("interviews/staffml/src/data/vault-manifest.json")
          dst = pathlib.Path("interviews/staffml/out/release-manifest.json")
          m = json.loads(src.read_text())
          canonical = {
              "releaseId":      m["releaseId"],
              "releaseHash":    m["releaseHash"],
              "schemaVersion":  m["schemaVersion"],
              "tier":           "A",
              "project":        "staffml",
              "buildDate":      m["buildDate"],
              "metadata": {
                  "questionCount":     m.get("questionCount"),
                  "chainCount":        m.get("chainCount"),
                  "conceptCount":      m.get("conceptCount"),
                  "areaCount":         m.get("areaCount"),
                  "policyVersion":     m.get("policyVersion"),
                  "taxonomyVersion":   m.get("taxonomyVersion"),
                  "trackDistribution": m.get("trackDistribution"),
                  "levelDistribution": m.get("levelDistribution"),
              },
          }
          dst.parent.mkdir(parents=True, exist_ok=True)
          dst.write_text(json.dumps(canonical, indent=2, sort_keys=True) + "\n")
          print(f"📦 Wrote {dst}: v{canonical['releaseId']} (hash {canonical['releaseHash'][:7]})")
          PY

      - name: 📁 Inject paper and figures into build
        run: |
          echo "📁 Injecting paper assets into built site..."
          mkdir -p interviews/staffml/out/downloads

          if [ -f interviews/paper/paper.pdf ]; then
            cp interviews/paper/paper.pdf interviews/staffml/out/downloads/StaffML-Paper.pdf
            echo "✅ Injected StaffML-Paper.pdf"
          else
            echo "⚠️ Paper PDF not found"
          fi

          echo ""
          echo "📦 Downloads folder contents:"
          ls -la interviews/staffml/out/downloads/ || echo "No downloads folder"

      - name: 🔍 Validate build
        run: |
          if [ ! -f "interviews/staffml/out/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi

          PAGE_COUNT=$(find interviews/staffml/out -name '*.html' | wc -l)
          echo "✅ StaffML built: $PAGE_COUNT pages"
          echo "📊 Build size: $(du -sh interviews/staffml/out | cut -f1)"

          if [ "$PAGE_COUNT" -lt 8 ]; then
            echo "⚠️ WARNING: Expected at least 8 pages, got $PAGE_COUNT"
          fi

          # Show vault release identity
          if [ -f "interviews/staffml/src/data/vault-manifest.json" ]; then
            RELEASE_ID=$(python3 -c "import json; print(json.load(open('interviews/staffml/src/data/vault-manifest.json'))['releaseId'])")
            QUESTIONS=$(python3 -c "import json; print(json.load(open('interviews/staffml/src/data/vault-manifest.json'))['questionCount'])")
            echo "📋 Vault v${RELEASE_ID} — ${QUESTIONS} questions"
          fi

      - name: 🔐 Validate vault integrity
        run: python3 interviews/staffml/scripts/validate-vault.py

      - name: 🧪 Smoke tests
        run: |
          python3 -c "
          import json, sys, os

          with open('interviews/staffml/src/data/corpus.json') as f:
              corpus = json.load(f)
          assert len(corpus) >= 4000, f'Corpus too small: {len(corpus)}'
          print(f'✅ Corpus: {len(corpus)} questions')

          required = ['id', 'title', 'level', 'track', 'scenario', 'competency_area', 'topic', 'zone', 'details']
          for q in corpus:
              for f in required:
                  assert q.get(f), f'{q.get(\"id\", \"???\")} missing {f}'
          print('✅ All questions have required fields')

          valid_levels = {'L1', 'L2', 'L3', 'L4', 'L5', 'L6', 'L6+'}
          for q in corpus:
              assert q['level'] in valid_levels, f'{q[\"id\"]} invalid level {q[\"level\"]}'
          print('✅ All levels valid')

          areas = set(q['competency_area'] for q in corpus)
          assert len(areas) == 13, f'Expected 13 competency areas, got {len(areas)}'
          print(f'✅ Competency areas: {len(areas)}')

          zones = set(q['zone'] for q in corpus)
          assert len(zones) == 11, f'Expected 11 zones, got {len(zones)}'
          print(f'✅ Zones: {len(zones)}')

          with open('interviews/staffml/src/data/taxonomy.json') as f:
              taxonomy = json.load(f)
          assert len(taxonomy.get('concepts', [])) >= 70
          print(f'✅ Taxonomy: {len(taxonomy[\"concepts\"])} topics')

          with open('interviews/staffml/src/data/vault-manifest.json') as f:
              manifest = json.load(f)
          assert manifest['questionCount'] == len(corpus)
          assert 'releaseId' in manifest, 'Manifest missing releaseId'
          assert 'releaseHash' in manifest and len(manifest['releaseHash']) >= 16, \
              'Manifest missing or truncated releaseHash'
          print(f'✅ Manifest: v{manifest[\"releaseId\"]} (hash {manifest[\"releaseHash\"][:7]})')

          print('🎯 All smoke tests passed')
          "

      - name: 📁 Prepare redirect from /interviews/ → /staffml/
        run: |
          mkdir -p interviews-redirect
          cat > interviews-redirect/index.html << 'REDIRECT_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>StaffML — Redirecting</title>
            <link rel="canonical" href="https://mlsysbook.ai/staffml/">
            <meta http-equiv="refresh" content="0; url=/staffml/">
          </head>
          <body>
            <p>Redirecting to <a href="/staffml/">StaffML</a>...</p>
            <script>window.location.replace("/staffml/");</script>
          </body>
          </html>
          REDIRECT_EOF

      - name: 🚀 Deploy StaffML to /staffml/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./interviews/staffml/out
          destination_dir: staffml
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🎯 Deploy StaffML live v${{ github.run_number }} - ${{ github.sha }}'

      - name: 🔀 Deploy /interviews/ redirect
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./interviews-redirect
          destination_dir: interviews
          publish_branch: gh-pages
          keep_files: false
          commit_message: '🔀 Update /interviews/ redirect to /staffml/'

      # ── Cloudflare (D1 data + Worker code) ─────────────────────────
      # After the static site ships to GH Pages, sync the Cloudflare side:
      # 1. Push the fresh vault.db data to D1 (vault contents match the
      #    site's bundled summary; users get identical answers whether they
      #    hit the bundle or the worker).
      # 2. Deploy the worker code if interviews/staffml-vault-worker/** changed
      #    (wrangler is idempotent — no-op if the upload is identical).
      #
      # Requires CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets.
      - name: 🚢 Ship vault data to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python3 interviews/vault-cli/scripts/ship_d1.py --skip-build

      - name: 📦 Install worker deps + deploy
        working-directory: interviews/staffml-vault-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler deploy

  # Tag the release and create a draft GitHub Release. Skipped on
  # site-only redeploys (which intentionally reuse the previous release_id
  # — re-tagging would violate citation integrity).
  create-tag:
    name: '🏷️ Create Tag & Release'
    needs: [build-and-deploy, prepare]
    if: needs.build-and-deploy.result == 'success' && inputs.site_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Create and push tag
        env:
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "🏷️ Creating tag: $NEW_TAG on $(git rev-parse --short HEAD)"
          git tag -a "$NEW_TAG" -m "StaffML $NEW_TAG: $DESCRIPTION"
          git push origin "$NEW_TAG"

      - name: 📦 Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          PREV_TAG: ${{ needs.prepare.outputs.previous_tag }}
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail

          # Auto-generated notes from GitHub (includes contributor list).
          if [ -n "$PREV_TAG" ]; then
            AUTO_NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$NEW_TAG" -f previous_tag_name="$PREV_TAG" \
              --jq '.body' || echo "")
          else
            AUTO_NOTES=""
          fi

          cat > /tmp/release-notes.md <<NOTES_EOF
          ## StaffML v${NEW_RELEASE_ID}

          ${DESCRIPTION}

          ${AUTO_NOTES}

          ---

          **Site**: https://mlsysbook.ai/staffml/
          **Manifest**: https://mlsysbook.ai/staffml/release-manifest.json
          NOTES_EOF

          gh release create "$NEW_TAG" \
            --title "StaffML v${NEW_RELEASE_ID} — ${DESCRIPTION}" \
            --notes-file /tmp/release-notes.md \
            --draft

          echo "✅ Draft release created — review at https://github.com/${{ github.repository }}/releases"
