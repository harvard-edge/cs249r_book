name: '🎯 StaffML · 👋 Welcome Contributor'

# =============================================================================
# StaffML — Welcome Comment on Contributor PRs
# =============================================================================
#
# Posts a welcome and thank-you comment when a new PR is opened that
# touches the interviews/ directory.
#
# Flow:
#   1. COMMENT — Post welcome message via GitHub API
#
# Triggers:
#   - pull_request_target: opened, interviews/** paths
#
# Deploys to: N/A (comment only)
# Secrets:    GITHUB_TOKEN
#
# Related:
#   - staffml-auto-pr.yml     — Auto-PR from community question issues
#   - staffml-preview-dev.yml — Dev preview deploy
#
# =============================================================================

on:
  pull_request_target:
    types: [opened]
    paths:
      - 'interviews/**'

permissions:
  pull-requests: write

jobs:
  welcome-contributor:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Comment
        uses: actions/github-script@v9
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const pr = context.payload.pull_request;
            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "🎉 **Thanks for contributing to StaffML!**",
                "",
                "We appreciate you sharing your knowledge. A maintainer will review the math and logic shortly.",
                "",
                "*P.S. If you haven't already, please drop a ⭐ on the repository!*"
              ].join("\n")
            });
