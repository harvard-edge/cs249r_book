name: '🧮 MLSYSIM · ✅ Validate (Dev)'

# Runs tests and builds docs site to validate changes before merge

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mlsysim/**'
  push:
    branches: [dev]
    paths:
      - 'mlsysim/**'

permissions:
  contents: read

concurrency:
  group: mlsysim-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: '🧪 Run Tests'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🐍 Install dependencies
        run: pip install -e ".[dev]"

      - name: 🧪 Run tests
        working-directory: ${{ vars.MLSYSIM_ROOT }}
        run: pytest tests/ -v --tb=short

  build-site:
    name: '🔨 Build Docs Site'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🐍 Install dependencies
        run: pip install -e ".[docs]"

      - name: 🔨 Build MLSYSIM Site
        working-directory: ${{ vars.MLSYSIM_DOCS }}
        run: quarto render

      - name: 🔍 Validate build output
        run: |
          if [ ! -f "${{ vars.MLSYSIM_DOCS }}/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing from build output."
            exit 1
          fi
          echo "✅ Site built successfully"
          echo "📊 Build size: $(du -sh ${{ vars.MLSYSIM_DOCS }}/_build | cut -f1)"
