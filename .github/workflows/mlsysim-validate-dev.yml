name: '🧮 MLSYSIM · ✅ Validate (Dev)'

# =============================================================================
# MLSYSIM — Test & Build Validation
# =============================================================================
#
# Runs the mlsysim test suite and builds the Quarto docs site to validate
# changes before merge.
#
# Flow:
#   1. TEST        — pytest on mlsysim/tests/
#   2. BUILD_SITE  — Quarto HTML render of docs site
#
# Triggers:
#   - push: dev branch, mlsysim/** paths
#   - pull_request: mlsysim/** paths
#   - workflow_dispatch: manual
#
# Deploys to: N/A (validate only)
# Vars:       MLSYSIM_DOCS
#
# Related:
#   - mlsysim-preview-dev.yml  — Dev preview deploy
#   - mlsysim-publish-live.yml — Production deploy
#   - mlsysim-build-pdfs.yml   — Reusable PDF build
#
# =============================================================================

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mlsysim/**'
  push:
    branches: [dev]
    paths:
      - 'mlsysim/**'

permissions:
  contents: read

concurrency:
  group: mlsysim-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: '🧪 Run Tests'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🐍 Install dependencies
        working-directory: mlsysim
        run: pip install ".[dev]"

      - name: 🧪 Run tests
        working-directory: mlsysim
        run: pytest tests/ -v --tb=short

  build-site:
    name: '🔨 Build Docs Site'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🐍 Install dependencies
        working-directory: mlsysim
        run: pip install ".[docs]"

      - name: 🔨 Build MLSYSIM Site
        working-directory: ${{ vars.MLSYSIM_DOCS }}
        run: quarto render

      - name: 🔍 Validate build output
        run: |
          if [ ! -f "${{ vars.MLSYSIM_DOCS }}/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing from build output."
            exit 1
          fi
          echo "✅ Site built successfully"
          echo "📊 Build size: $(du -sh ${{ vars.MLSYSIM_DOCS }}/_build | cut -f1)"
