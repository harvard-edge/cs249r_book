                echo "COMMITS:"
                cat git_log_summary.txt
                echo ""
                echo "STYLE REQUIREMENTS:"
                echo "- Academic, professional tone following established MLSysBook release pattern"
                echo "- Focus on USER VALUE: what readers, educators, and students gain"
                echo "- Educational impact: how this improves learning outcomes"
                echo "- Clear structure with appropriate emojis for readability"
                echo "- NO development metrics (commits, technical debt, internal processes)"
                echo "- Write like a scholarly publication announcement, not marketing material"
                echo ""
                echo "LANGUAGE GUIDELINES:"
                echo "EXCELLENT examples of user-focused language:"
                echo "тЬЕ 'Enhanced visualizations with improved clarity and understanding'"
                echo "тЬЕ 'Streamlined mathematical notation for better accessibility'"
                echo "тЬЕ 'Updated code examples reflecting latest ML frameworks'"
                echo "тЬЕ 'Improved accessibility features for diverse learners'"
                echo "тЬЕ 'Faster build process for reliable access'"
                echo ""
                echo "AVOID these generic/internal phrases:"
                echo "тЭМ 'Various improvements across chapters'"
                echo "тЭМ 'Enhanced development workflow'"
                echo "тЭМ 'Updated content structure'"
                echo "тЭМ 'Fixed issues and bugs'"
                echo "тЭМ 'Improved codebase quality'"
                echo "тЭМ ANY mention of specific chapter names or numbers"
                echo ""
                echo "REQUIRED STRUCTURE:"
                echo "# Release ${{ needs.validate-inputs.outputs.new_version }}: [Professional Title Based on Main Theme]"
                echo "IMPORTANT: Use the EXACT version number ${{ needs.validate-inputs.outputs.new_version }} in the title"
                echo ""
                echo "[Professional intro paragraph explaining this release's educational focus and value]"
                echo ""
                echo "## тЬи Major Features"
                echo ""
                echo "### ЁЯУЦ Content Improvements"
                echo "* [3-5 specific content enhancements that improve learning experience]"
                echo "* Focus on: visualizations, explanations, examples, mathematical clarity"
                echo ""
                echo "### ЁЯЫая╕П Technical Excellence"
                echo "* [3-5 infrastructure improvements that users actually notice]"
                echo "* Focus on: accessibility, performance, reliability, user experience"
                echo ""
                echo "### ЁЯОУ Educational Innovation"
                echo "* [2-3 improvements specifically for educators and learners]"
                echo "* Focus on: teaching features, learning aids, practical applications"
                echo ""
                echo "## ЁЯМЯ Key Achievements"
                echo "[Highlight the most impactful improvements for different user groups]"
                echo ""
                echo "## ЁЯФм Educational Impact"
                echo "[Explain how these changes improve learning outcomes and educational value]"
                echo ""
                echo "## ЁЯМР Access Your Enhanced Textbook"
                echo "- ЁЯУЦ **Online Version**: [mlsysbook.ai](https://mlsysbook.ai)"
                echo "- ЁЯУД **PDF Download**: Available from release assets"
                echo "- ЁЯУЪ **EPUB Version**: Available from release assets"
                echo "- ЁЯзк **Labs & Exercises**: Hands-on learning materials"
                echo ""
                echo "## ЁЯУЮ Community & Contributions"
                echo "This release incorporates feedback from educators, students, and practitioners. We welcome continued engagement through our [GitHub repository](https://github.com/harvard-edge/cs249r_book)."
                echo ""
                echo "---"
                echo "*Development Period*: [Timeframe based on release type]"
                echo "*Repository*: [harvard-edge/cs249r_book](https://github.com/harvard-edge/cs249r_book)"
                echo "*Focus*: [Main theme of this release]"
              } > ai_prompt.txt

              # Generate AI release notes
              if ollama run $MODEL < ai_prompt.txt > ai_release_notes.md 2>/dev/null; then
                echo "тЬЕ AI release notes generated successfully"

                # Use AI-generated notes directly (they include proper header)
                {
                  cat ai_release_notes.md
                  echo ""
                  echo "---"
                  echo ""
                  echo "## Full Change Log"
                  echo ""
                  cat git_changes.md
                } > "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
              else
                echo "тЪая╕П AI generation failed, using git log only"
                AI_GENERATION_FAILED=true
              fi
            fi

            # If AI generation failed, fall back to git log only
            if [ "$AI_GENERATION_FAILED" = "true" ]; then
              echo "ЁЯУЛ Falling back to git log only release notes"
              {
                echo "# Release ${{ needs.validate-inputs.outputs.new_version }}: ${{ inputs.description }}"
                echo ""
                echo "## Overview"
                echo "This ${{ inputs.release_type }} release includes the following changes:"
                echo ""
                cat git_changes.md
              } > "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
            fi
          else
            echo ""
            echo "ЁЯУЛ Git Log Only Mode - creating clean release notes from git history"

            # Create release notes from git log only
            {
              echo "# Release ${{ needs.validate-inputs.outputs.new_version }}: ${{ inputs.description }}"
              echo ""
              echo "## Overview"
              echo "This ${{ inputs.release_type }} release includes the following changes:"
              echo ""
              cat git_changes.md
            } > "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
          fi

          # Show final release notes
          if [ -f "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md" ]; then
            echo "тЬЕ Release notes generated successfully"
            echo "ЁЯУД Release notes file details:"
            ls -la "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
            echo "ЁЯУЭ Release notes content (first 50 lines):"
            head -50 "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
          else
            echo "тЭМ Failed to generate release notes - creating basic fallback"
            # Create a basic fallback release notes file
            {
              echo "# Release ${{ needs.validate-inputs.outputs.new_version }}: ${{ inputs.description }}"
              echo ""
              echo "## Release Information"
              echo "- **Version**: ${{ needs.validate-inputs.outputs.new_version }}"
              echo "- **Type**: ${{ inputs.release_type }} release"
              echo "- **Description**: ${{ inputs.description }}"
              echo ""
              echo "## Changes"
              echo "Please see the git commit history for detailed changes."
            } > "release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"
            echo "тЬЕ Basic release notes created as fallback"
          fi

      - name: ЁЯУд Upload Release Notes Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release_notes_${{ needs.validate-inputs.outputs.new_version }}.md

      - name: ЁЯУд Upload Git Log Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: git-changes
          path: |
            git_changes.md
            git_log_summary.txt
            ai_release_notes.md

  create-release:
    name: 'ЁЯУж Create GitHub Release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate-inputs, generate-release-notes, create-tag]
    if: inputs.confirm == 'PUBLISH' && inputs.testing_mode != 'yes' && inputs.skip_version != 'yes'

    steps:
      - name: ЁЯУе Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ЁЯУж Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: ./release-assets

      - name: ЁЯУЭ Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: ./

      - name: ЁЯУж Create GitHub Release with PDF
        run: |
          echo "ЁЯУж Creating GitHub Release ${{ needs.validate-inputs.outputs.new_version }}..."
          echo "ЁЯУЛ Release details:"
          echo "  - Tag: ${{ needs.validate-inputs.outputs.new_version }}"
          echo "  - Name: ${{ needs.validate-inputs.outputs.new_version }}: ${{ inputs.description }}"
          echo "  - Repository: ${{ github.repository }}"

          # Use the AI-generated release notes
          RELEASE_NOTES_FILE="release_notes_${{ needs.validate-inputs.outputs.new_version }}.md"

          if [ -f "$RELEASE_NOTES_FILE" ]; then
            echo "ЁЯУД Using AI-generated release notes:"
            cat "$RELEASE_NOTES_FILE"
          else
            echo "тЭМ Release notes file not found!"
            exit 1
          fi

          # Create the release as a DRAFT for manual editing
          echo "ЁЯЪА Creating GitHub release as DRAFT..."

          # Properly escape the release notes for JSON
          ESCAPED_BODY=$(cat "$RELEASE_NOTES_FILE" | jq -Rs .)

          # Create JSON payload using jq to ensure proper escaping
          JSON_PAYLOAD=$(jq -n \
            --arg tag "${{ needs.validate-inputs.outputs.new_version }}" \
            --arg name "${{ needs.validate-inputs.outputs.new_version }}: ${{ inputs.description }}" \
            --argjson body "$ESCAPED_BODY" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: true,
              prerelease: false
            }')

          RELEASE_RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$JSON_PAYLOAD")

          echo "ЁЯУК API Response:"
          echo "$RELEASE_RESPONSE" | jq '.'

          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          RELEASE_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.html_url')

          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "тЬЕ Draft release created successfully!"
            echo "ЁЯУК Release ID: $RELEASE_ID"
            echo "ЁЯФЧ Release URL: $RELEASE_URL"
            echo "ЁЯУЭ Next step: Edit release notes manually and publish"
            echo "release_id=$RELEASE_ID" >> $GITHUB_ENV
            echo "release_url=$RELEASE_URL" >> $GITHUB_ENV
          else
            echo "тЭМ Failed to create release!"
            echo "ЁЯУК Error details:"
            echo "$RELEASE_RESPONSE" | jq -r '.message // "Unknown error"'
            echo "$RELEASE_RESPONSE" | jq -r '.errors[]?.message // empty'
            exit 1
          fi

      - name: ЁЯУж Upload release assets (PDF + EPUB per volume)
        run: |
          echo "ЁЯУж Uploading release assets..."
          echo "ЁЯУЛ Available assets:"
          ls -la release-assets/

          UPLOAD_FAILURES=0

          for ASSET_FILE in release-assets/*; do
            [ -f "$ASSET_FILE" ] || continue
            [ -s "$ASSET_FILE" ] || { echo "тЪая╕П Skipping empty file: $ASSET_FILE"; continue; }

            ASSET_NAME=$(basename "$ASSET_FILE")
            ASSET_EXT="${ASSET_NAME##*.}"
            echo ""
            echo "ЁЯУд Uploading $ASSET_NAME ($(du -h "$ASSET_FILE" | cut -f1))..."

            # Set content type based on extension
            case "$ASSET_EXT" in
              pdf)  CONTENT_TYPE="application/pdf" ;;
              epub) CONTENT_TYPE="application/epub+zip" ;;
              *)    CONTENT_TYPE="application/octet-stream" ;;
            esac

            UPLOAD_RESPONSE=$(curl -s \
              -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: $CONTENT_TYPE" \
              --data-binary @"$ASSET_FILE" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ env.release_id }}/assets?name=$ASSET_NAME")

            UPLOAD_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.id')

            if [ "$UPLOAD_ID" != "null" ] && [ -n "$UPLOAD_ID" ]; then
              echo "тЬЕ $ASSET_NAME uploaded (Asset ID: $UPLOAD_ID)"
              echo "ЁЯФЧ https://github.com/${{ github.repository }}/releases/download/${{ needs.validate-inputs.outputs.new_version }}/$ASSET_NAME"
            else
              echo "тЪая╕П Failed to upload $ASSET_NAME"
              echo "$UPLOAD_RESPONSE" | jq -r '.message // "Unknown error"'
              UPLOAD_FAILURES=$((UPLOAD_FAILURES + 1))
            fi
          done

          if [ "$UPLOAD_FAILURES" -gt 0 ]; then
            echo ""
            echo "тЪая╕П $UPLOAD_FAILURES asset(s) failed to upload"
          else
            echo ""
            echo "тЬЕ All release assets uploaded successfully"
          fi

