  cleanup-on-failure:
    name: 'ЁЯз╣ Cleanup Failed Release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate-inputs]
    if: always() && inputs.confirm == 'PUBLISH' && (failure() || cancelled())

    steps:
      - name: ЁЯУе Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ЁЯз╣ Clean up failed release artifacts
        run: |
          echo "ЁЯз╣ Cleaning up artifacts from failed release..."

          # Get the version that was being released
          if [ -n "${{ needs.validate-inputs.outputs.new_version }}" ]; then
            VERSION_TAG="${{ needs.validate-inputs.outputs.new_version }}"
            echo "ЁЯОп Cleaning up version: $VERSION_TAG"
          else
            echo "тЪая╕П No version information available, skipping cleanup"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check and remove local tag
          if git tag -l "$VERSION_TAG" | grep -q "$VERSION_TAG"; then
            echo "ЁЯЧСя╕П Removing local tag: $VERSION_TAG"
            git tag -d "$VERSION_TAG"
          else
            echo "тД╣я╕П Local tag $VERSION_TAG does not exist"
          fi

          # Check and remove remote tag if it exists
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION_TAG$"; then
            echo "ЁЯЧСя╕П Removing remote tag: $VERSION_TAG"
            git push origin --delete "$VERSION_TAG" || echo "тЪая╕П Failed to delete remote tag (may not exist)"
          else
            echo "тД╣я╕П Remote tag $VERSION_TAG does not exist"
          fi

          # Check for any draft releases and delete them
          echo "ЁЯФН Checking for draft releases..."
          DRAFT_RELEASE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r ".[] | select(.tag_name == \"$VERSION_TAG\" and .draft == true) | .id")

          if [ "$DRAFT_RELEASE" != "null" ] && [ -n "$DRAFT_RELEASE" ]; then
            echo "ЁЯЧСя╕П Deleting draft release: $DRAFT_RELEASE"
            curl -s \
              -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$DRAFT_RELEASE"
            echo "тЬЕ Draft release deleted"
          else
            echo "тД╣я╕П No draft release found for $VERSION_TAG"
          fi

          echo "тЬЕ Cleanup completed! Repository is ready for retry."

      - name: ЁЯУК Cleanup Summary
        run: |
          echo "## ЁЯз╣ Failed Release Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate-inputs.outputs.new_version || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cleanup Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФН Original Inputs (for debugging):" >> $GITHUB_STEP_SUMMARY
          echo "- **Description:** ${{ inputs.description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type:** ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Commit:** ${{ inputs.dev_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Confirmation:** ${{ inputs.confirm }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Generated Notes:** ${{ inputs.ai_generated_notes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status Check Timeout:** ${{ inputs.commit_status_timeout }} attempts" >> $GITHUB_STEP_SUMMARY
          echo "- **Status Check Interval:** ${{ inputs.commit_status_interval }} seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Attempt:** ${{ github.run_attempt }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯЧСя╕П Cleaned Up:" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Local git tags removed" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Remote git tags removed (if they existed)" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Draft GitHub releases removed (if they existed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФД Ready for Retry:" >> $GITHUB_STEP_SUMMARY
          echo "You can now safely re-run the publish workflow with the same version number." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯРЫ Troubleshooting:" >> $GITHUB_STEP_SUMMARY
          echo "If you continue to have issues, check the workflow logs for the failed step." >> $GITHUB_STEP_SUMMARY

  cleanup-on-timeout:
    name: 'тП░ Cleanup Timed Out Release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate-inputs, trigger-production-build]
    if: always() && inputs.confirm == 'PUBLISH' && (needs.trigger-production-build.result == 'failure' || needs.trigger-production-build.result == 'timeout')

    steps:
      - name: ЁЯУе Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ЁЯз╣ Clean up timed out release artifacts
        run: |
          echo "тП░ Cleaning up artifacts from timed out release..."

          # Get the version that was being released
          if [ -n "${{ needs.validate-inputs.outputs.new_version }}" ]; then
            VERSION_TAG="${{ needs.validate-inputs.outputs.new_version }}"
            echo "ЁЯОп Cleaning up version: $VERSION_TAG"
          else
            echo "тЪая╕П No version information available, skipping cleanup"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check and remove local tag
          if git tag -l "$VERSION_TAG" | grep -q "$VERSION_TAG"; then
            echo "ЁЯЧСя╕П Removing local tag: $VERSION_TAG"
            git tag -d "$VERSION_TAG"
          else
            echo "тД╣я╕П Local tag $VERSION_TAG does not exist"
          fi

          # Check and remove remote tag if it exists
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION_TAG$"; then
            echo "ЁЯЧСя╕П Removing remote tag: $VERSION_TAG"
            git push origin --delete "$VERSION_TAG" || echo "тЪая╕П Failed to delete remote tag (may not exist)"
          else
            echo "тД╣я╕П Remote tag $VERSION_TAG does not exist"
          fi

          # Check for any draft releases and delete them
          echo "ЁЯФН Checking for draft releases..."
          DRAFT_RELEASE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r ".[] | select(.tag_name == \"$VERSION_TAG\" and .draft == true) | .id")

          if [ "$DRAFT_RELEASE" != "null" ] && [ -n "$DRAFT_RELEASE" ]; then
            echo "ЁЯЧСя╕П Deleting draft release: $DRAFT_RELEASE"
            curl -s \
              -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$DRAFT_RELEASE"
            echo "тЬЕ Draft release deleted"
          else
            echo "тД╣я╕П No draft release found for $VERSION_TAG"
          fi

          echo "тЬЕ Cleanup completed! Repository is ready for retry."

      - name: ЁЯФД Rollback Main Branch (if needed)
        run: |
          echo "ЁЯФД Checking if main branch rollback is needed..."

          # Only rollback if merge succeeded but later steps failed
          if [ "${{ needs.merge-to-main.result }}" = "success" ] && [ "${{ needs.create-tag.result }}" != "success" ]; then
            echo "тЪая╕П Merge succeeded but tag creation failed - considering rollback"
            echo "ЁЯФН Checking if main branch needs to be rolled back..."

            # Get the commit before the merge
            MERGE_COMMIT=$(git log --oneline -1 --grep="Release $VERSION_TAG" --format="%H" || echo "")

            if [ -n "$MERGE_COMMIT" ]; then
              PARENT_COMMIT=$(git log --format="%P" -n 1 "$MERGE_COMMIT" | cut -d' ' -f1)
              echo "ЁЯФН Found merge commit: $MERGE_COMMIT"
              echo "ЁЯФН Parent commit: $PARENT_COMMIT"

              echo "тЪая╕П To manually rollback main branch, run:"
              echo "   git checkout main"
              echo "   git reset --hard $PARENT_COMMIT"
              echo "   git push origin main --force-with-lease"
              echo ""
              echo "тЪая╕П AUTOMATED ROLLBACK DISABLED - Manual intervention required"
              echo "ЁЯЫбя╕П This prevents accidental data loss"
            else
              echo "тД╣я╕П No merge commit found - no rollback needed"
            fi
          else
            echo "тД╣я╕П No rollback needed - merge did not complete successfully"
          fi

      - name: ЁЯУК Cleanup Summary
        run: |
          echo "## ЁЯз╣ Failed Release Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate-inputs.outputs.new_version || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cleanup Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФН Original Inputs (for debugging):" >> $GITHUB_STEP_SUMMARY
          echo "- **Description:** ${{ inputs.description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type:** ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Commit:** ${{ inputs.dev_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Confirmation:** ${{ inputs.confirm }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Generated Notes:** ${{ inputs.ai_generated_notes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status Check Timeout:** ${{ inputs.commit_status_timeout }} attempts" >> $GITHUB_STEP_SUMMARY
          echo "- **Status Check Interval:** ${{ inputs.commit_status_interval }} seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Attempt:** ${{ github.run_attempt }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯЧСя╕П Cleaned Up:" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Local git tags removed" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Remote git tags removed (if they existed)" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Draft GitHub releases removed (if they existed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФД Ready for Retry:" >> $GITHUB_STEP_SUMMARY
          echo "You can now safely re-run the publish workflow with the same version number." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯРЫ Troubleshooting:" >> $GITHUB_STEP_SUMMARY
          echo "If you continue to have issues, check the workflow logs for the failed step." >> $GITHUB_STEP_SUMMARY

  testing-mode-summary:
    name: 'ЁЯзк Testing Mode Summary'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: inputs.confirm == 'PUBLISH' && inputs.testing_mode == 'yes'
    needs: [validate-inputs, call-production-build]

    steps:
      - name: ЁЯзк Testing Mode Complete
        run: |
          echo "## ЁЯзк Testing Mode Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** тЬЕ Testing workflow completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** Testing (no actual deployment)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯУЛ What was tested:" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Input validation" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Build workflow triggering" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Build completion detection" >> $GITHUB_STEP_SUMMARY
          echo "- тЬЕ Artifact availability" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯЪА To run actual deployment:" >> $GITHUB_STEP_SUMMARY
          echo "- Set **testing_mode** to **no**" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run with same parameters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФН Debug Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Description:** ${{ inputs.description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type:** ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Commit:** ${{ inputs.dev_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Concurrency Group:** publish-live-test-${{ github.run_number }}-${{ inputs.dev_commit }}" >> $GITHUB_STEP_SUMMARY

          echo "тЬЕ Testing mode completed successfully!"
          echo "ЁЯзк This run tested the workflow without actual deployment"
          echo "ЁЯФД Run ID: ${{ github.run_id }}"
          echo "ЁЯСд Triggered by: ${{ github.actor }}"
          echo "ЁЯМР Branch: ${{ github.ref_name }}"

  fail-validation:
    name: 'тЭМ Validation Failed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: inputs.confirm != 'PUBLISH'

    steps:
      - name: тЭМ Invalid confirmation
        run: |
          echo "## тЭМ Publication Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** Invalid confirmation" >> $GITHUB_STEP_SUMMARY
          echo "**Expected:** PUBLISH" >> $GITHUB_STEP_SUMMARY
          echo "**Received:** ${{ inputs.confirm }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ЁЯФН Debug Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Description:** ${{ inputs.description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type:** ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Commit:** ${{ inputs.dev_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Generated Notes:** ${{ inputs.ai_generated_notes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "тЭМ Publication cancelled - invalid confirmation"
          echo "ЁЯФТ You must type exactly 'PUBLISH' to confirm"
          echo "ЁЯУЭ You entered: '${{ inputs.confirm }}'"
          echo "ЁЯСд Triggered by: ${{ github.actor }}"
          echo "ЁЯМР Branch: ${{ github.ref_name }}"
          echo "ЁЯФД Run ID: ${{ github.run_id }}"
          exit 1
