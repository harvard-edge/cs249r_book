name: '🧠 Interviews · 🚀 Publish (Live) [DEPRECATED]'

# DEPRECATED: The Quarto interview playbook has been replaced by StaffML (Next.js).
# Use staffml-publish-live.yml instead.

on:
  # workflow_dispatch:  # Disabled — use staffml-publish-live.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: 'DEPRECATED — use staffml-publish-live.yml instead'
        required: true

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🔧 Build & Deploy Interviews'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Interview Playbook
        working-directory: interviews
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🔍 Validate build
        run: |
          if [ ! -f "interviews/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi

          PAGE_COUNT=$(find interviews/_build -name '*.html' | wc -l)
          echo "✅ Site built: $PAGE_COUNT pages"
          echo "📊 Build size: $(du -sh interviews/_build | cut -f1)"

          if [ "$PAGE_COUNT" -lt 8 ]; then
            echo "⚠️ WARNING: Expected at least 10 pages, got $PAGE_COUNT"
          fi

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./interviews/_build
          destination_dir: interviews
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🧠 Deploy Interviews live - ${{ github.sha }}'
