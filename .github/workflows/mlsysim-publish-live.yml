name: '🧮 MLSYSIM · 🚀 Publish (Live)'

# Builds and deploys MLSYSIM docs site to mlsysbook.ai/mlsysim/

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🧮 Build & Deploy MLSYSIM'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🐍 Install Python dependencies
        run: |
          pip install -e ./${{ vars.MLSYSIM_ROOT }}
          pip install quartodoc

      - name: 🔨 Build MLSYSIM Site
        working-directory: ${{ vars.MLSYSIM_DOCS }}
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.MLSYSIM_DOCS }}/_build
          destination_dir: ${{ vars.DEV_MLSYSIM_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🧮 Deploy MLSYSIM live - ${{ github.sha }}'
