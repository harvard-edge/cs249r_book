name: '🧮 MLSYSIM · 🚀 Publish (Live)'

# =============================================================================
# MLSYSIM — Production Deploy
# =============================================================================
#
# Builds the MLSYSIM simulation engine docs site (Quarto) with the research
# paper PDF and deploys to the live production site on GitHub Pages.
#
# Flow:
#   1. BUILD_PDF    — Compile research paper PDF (reusable workflow)
#   2. BUILD_SITE   — Quarto render + inject PDF into docs
#   3. DEPLOY       — Push to gh-pages branch
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/mlsysim/
# Secrets:    GITHUB_TOKEN
# Vars:       MLSYSIM_DOCS, DEV_MLSYSIM_PATH
#
# Related:
#   - mlsysim-preview-dev.yml  — Dev preview deploy
#   - mlsysim-validate-dev.yml — Test & build validation
#   - mlsysim-build-pdfs.yml   — Reusable PDF build
#
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What are you publishing? [Content updates and improvements]'
        required: false
        default: 'Content updates and improvements'
      site_only:
        description: 'Website-only deploy? (no version bump, no tag — reuses current release_id)'
        required: false
        type: boolean
        default: false
      release_type:
        description: 'Release type (ignored if site_only OR explicit_version is set) [patch]'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      explicit_version:
        description: 'Override: explicit X.Y.Z (skips bump math). Leave blank to auto-bump.'
        required: false
        default: ''
      confirm:
        description: 'Type "PUBLISH" to confirm (safety check) [required]'
        required: true
        default: ''

permissions:
  contents: write
  actions: read

# NB: gh-pages-deploy concurrency is declared on the build-and-deploy job
# only. The guard and PDF build run without holding the lock.

jobs:
  # Block publish unless the latest dev validate run for this site is green.
  # See .github/workflows/infra-publish-guard.yml for guard semantics.
  guard:
    name: '🛡️ Validate-Dev Green Gate'
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: mlsysim-validate-dev.yml

  # Compute new release_id from previous mlsysim-v* tag + release_type.
  # The PyPI publish flow (mlsysim-pypi-publish.yml, tag-triggered) and
  # the paper LaTeX build are intentionally NOT touched: PyPI's version
  # comes from pyproject.toml, the paper PDF is bundled as an opaque
  # artifact. The site manifest binds the SITE release_id to the
  # release_hash over python source + docs corpus, providing a single
  # citation anchor without forcing changes to either of the other
  # publication paths.
  prepare:
    name: '🏷️ Prepare release'
    uses: ./.github/workflows/_release-prepare.yml
    with:
      project: mlsysim
      tier: A
      previous_tag_pattern: 'mlsysim-v*'
      release_type: ${{ inputs.release_type }}
      explicit_version: ${{ inputs.explicit_version }}
      description: ${{ inputs.description }}
      confirm: ${{ inputs.confirm }}
      site_only: ${{ inputs.site_only }}

  # Build PDF first (reusable workflow)
  build-pdf:
    name: '📄 Build PDF'
    needs: [guard]
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/mlsysim-build-pdfs.yml

  build-and-deploy:
    name: '🧮 Build & Deploy MLSYSIM'
    runs-on: ubuntu-latest
    needs: [guard, prepare, build-pdf]
    if: inputs.confirm == 'PUBLISH'
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🐍 Install Python dependencies
        working-directory: mlsysim
        run: pip install ".[docs]"

      - name: 📥 Download Paper PDF
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: MLSYSIM-Paper
          path: ./pdf-artifacts/

      - name: 📥 Download Tutorial Slides
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: MLSYSIM-Slides
          path: ./slide-artifacts/

      - name: 📁 Inject PDFs into docs
        run: |
          if [ -f ./pdf-artifacts/paper.pdf ]; then
            cp ./pdf-artifacts/paper.pdf ${{ vars.MLSYSIM_DOCS }}/mlsysim-paper.pdf
            echo "✅ Injected mlsysim-paper.pdf"
          else
            echo "⚠️ Paper PDF not found in artifacts, continuing without it"
          fi

          for part in tutorial_part1 tutorial_part2; do
            src="./slide-artifacts/${part}.pdf"
            if [ -f "$src" ]; then
              cp "$src" "${{ vars.MLSYSIM_DOCS }}/${part}.pdf"
              echo "✅ Injected ${part}.pdf"
            else
              echo "⚠️ ${part}.pdf not found in artifacts, continuing without it"
            fi
          done

      - name: 🔨 Build MLSYSIM Site
        working-directory: ${{ vars.MLSYSIM_DOCS }}
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 📦 Emit release manifest
        # Hash inputs: docs corpus + python package source. The paper PDF
        # is intentionally NOT in the hash — it's bundled as an opaque
        # artifact, with its own LaTeX-driven build identity. The site
        # release_id is the citation anchor for the docs + simulator
        # version; the paper has a separate (compatible) version track.
        env:
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
        run: |
          set -euo pipefail
          RELEASE_HASH=$(python3 scripts/version/release.py compute-hash \
            --paths ${{ vars.MLSYSIM_DOCS }} mlsysim/python mlsysim/pyproject.toml \
            --exclude '_build' '__pycache__' '*.pyc' '.DS_Store' \
                      '.ipynb_checkpoints' '*.egg-info' '.quarto')

          echo "📦 Release: mlsysim v${NEW_RELEASE_ID} (hash ${RELEASE_HASH:0:12})"

          python3 scripts/version/release.py emit-manifest \
            --output ${{ vars.MLSYSIM_DOCS }}/_build/release-manifest.json \
            --project mlsysim \
            --tier A \
            --release-id "$NEW_RELEASE_ID" \
            --release-hash "$RELEASE_HASH"

          cat ${{ vars.MLSYSIM_DOCS }}/_build/release-manifest.json

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.MLSYSIM_DOCS }}/_build
          destination_dir: ${{ vars.DEV_MLSYSIM_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🧮 Deploy MLSYSIM ${{ needs.prepare.outputs.new_tag }} - ${{ github.sha }}'

  # Tag the release and create a draft GitHub Release. Skipped on
  # site-only redeploys.
  create-tag:
    name: '🏷️ Create Tag & Release'
    needs: [build-and-deploy, prepare]
    if: needs.build-and-deploy.result == 'success' && inputs.site_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Create and push tag
        env:
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "🏷️ Creating tag $NEW_TAG"
          git tag -a "$NEW_TAG" -m "MLSYSIM $NEW_TAG: $DESCRIPTION"
          git push origin "$NEW_TAG"

      - name: 📦 Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          PREV_TAG: ${{ needs.prepare.outputs.previous_tag }}
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          if [ -n "$PREV_TAG" ]; then
            AUTO_NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$NEW_TAG" -f previous_tag_name="$PREV_TAG" \
              --jq '.body' || echo "")
          else
            AUTO_NOTES=""
          fi

          cat > /tmp/release-notes.md <<NOTES_EOF
          ## MLSYSIM v${NEW_RELEASE_ID}

          ${DESCRIPTION}

          ${AUTO_NOTES}

          ---

          **Site**: https://mlsysbook.ai/mlsysim/
          **Manifest**: https://mlsysbook.ai/mlsysim/release-manifest.json
          NOTES_EOF

          gh release create "$NEW_TAG" \
            --title "MLSYSIM v${NEW_RELEASE_ID} — ${DESCRIPTION}" \
            --notes-file /tmp/release-notes.md \
            --draft

          echo "✅ Draft release created"
