name: '🎯 StaffML · 🔍 Content-Hash SLI'

# =============================================================================
# Hourly content_hash SLI — verifies the production Worker's stored
# content_hash for 20 random IDs matches what the latest release's vault.db
# has. Catches silent edge-level data corruption.
#
# Dean R8-H-1 fix: previously tried to recompute canonical content_hash from
# the Worker's JSON response in Python; that payload reconstruction omitted
# tags + chain + generation_meta (which the canonical hash includes), so
# every run false-positive'd on any question with tags or a chain. Now we
# compare the Worker's stored content_hash directly against the release
# vault.db's stored content_hash — both derive from the same compilation,
# so a mismatch means real corruption.
#
# Dean R8-M-2: urlopen now wrapped in try/except; 404s are classified as
# "id_missing_in_worker" (deprecated/deleted — expected during release
# rollover); 5xx as "edge_transport_error" tallied separately from content
# mismatches.
# =============================================================================

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'   # :17 past each hour

permissions:
  contents: read
  issues: write

jobs:
  sample-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      WORKER_URL: ${{ vars.VAULT_WORKER_URL }}
      SAMPLE_SIZE: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      # Gemini R9-H-3: vault.db is gitignored per §19.3/M-4 (commit manifest,
      # not binary). The SLI Python script below reads releases/<latest>/vault.db
      # to source the stored content_hash for each sampled question, so we
      # must rebuild it from YAML first. Deterministic; same YAML → same hashes.
      - name: Install vault-cli (needed for vault build)
        run: pip install -e interviews/vault-cli/
      - name: Build vault.db for latest release from YAML
        run: |
          vault build --vault-dir interviews/vault --output interviews/vault/vault.db
          latest=$(ls -1 interviews/vault/releases/ | grep -v '^latest$' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::no release directory under interviews/vault/releases/"
            exit 1
          fi
          mkdir -p "interviews/vault/releases/$latest"
          cp interviews/vault/vault.db "interviews/vault/releases/$latest/vault.db"
          echo "rebuilt vault.db for $latest"
      - name: Verify stored content_hash parity
        run: |
          python3 - <<'PY'
          import json
          import os
          import random
          import sqlite3
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          worker = os.environ["WORKER_URL"].rstrip("/")
          sample_size = int(os.environ.get("SAMPLE_SIZE", "20"))

          releases = sorted(Path("interviews/vault/releases").glob("[0-9]*"))
          if not releases:
              sys.exit("no releases under interviews/vault/releases/")
          latest = releases[-1]
          db_path = latest / "vault.db"
          if not db_path.exists():
              sys.exit(f"no vault.db at {db_path}")

          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row
          rows = conn.execute("SELECT id, content_hash FROM questions").fetchall()
          db_hashes = {r["id"]: r["content_hash"] for r in rows}
          ids = random.sample(list(db_hashes.keys()), min(sample_size, len(db_hashes)))

          mismatches = []
          missing_in_worker = []
          transport_errors = []

          for qid in ids:
              req = urllib.request.Request(
                  f"{worker}/questions/{qid}",
                  headers={"User-Agent": "content-hash-sli"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      row = json.load(r)
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      # Expected during release rollover — question soft-deleted
                      # or deprecated. Not a data-integrity failure.
                      missing_in_worker.append(qid)
                      continue
                  transport_errors.append((qid, exc.code))
                  continue
              except (urllib.error.URLError, TimeoutError) as exc:
                  transport_errors.append((qid, str(exc)))
                  continue
              worker_hash = row.get("content_hash")
              db_hash = db_hashes[qid]
              if worker_hash != db_hash:
                  mismatches.append({"id": qid, "worker": worker_hash, "db": db_hash})

          # Classification:
          #   mismatch: real content corruption — PAGE
          #   missing_in_worker: expected during release churn — log only
          #   transport_errors: edge/network issue — log + alert if persistent
          print(f"sampled={len(ids)} mismatches={len(mismatches)} "
                f"missing={len(missing_in_worker)} transport_errors={len(transport_errors)}")

          if mismatches:
              print("[FAIL] content_hash corruption detected:")
              for m in mismatches[:5]:
                  print(f"  {m['id']}: worker={m['worker'][:16]} db={m['db'][:16]}")
              sys.exit(1)
          if transport_errors:
              print("[WARN] transport errors; flagged but not failing:")
              for qid, err in transport_errors[:5]:
                  print(f"  {qid}: {err}")
          print(f"[OK] {len(ids) - len(missing_in_worker) - len(transport_errors)} "
                f"content_hash samples verified against latest release vault.db")
          PY

      - name: File issue on hash mismatch
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `content-hash SLI mismatch on ${new Date().toISOString()}`,
              body: `Hourly sampling detected a content_hash mismatch between the production Worker and the release vault.db. This is a data-plane SLI alert — corpus content may be corrupted at the edge. Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['vault-sli', 'bug', 'priority-high'],
            });
