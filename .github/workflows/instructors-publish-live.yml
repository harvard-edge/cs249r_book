name: '🎓 Instructors · 🚀 Publish (Live)'

# =============================================================================
# Instructors (The Blueprint) — Production Deploy
# =============================================================================
#
# Builds the instructor-facing Quarto site ("The Blueprint") and deploys
# to the live production site on GitHub Pages.
#
# Flow:
#   1. BUILD_SITE  — Quarto render
#   2. VALIDATE    — Check index.html exists + page count
#   3. DEPLOY      — Push to gh-pages/instructors/
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/instructors/
# Secrets:    GITHUB_TOKEN
#
# Related:
#   - instructors-preview-dev.yml  — Dev preview deploy
#   - instructors-validate-dev.yml — Content & build validation
#
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What are you publishing? [Content updates and improvements]'
        required: false
        default: 'Content updates and improvements'
      site_only:
        description: 'Website-only deploy? (no version bump, no tag)'
        required: false
        type: boolean
        default: false
      release_type:
        description: 'Release type [patch]'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      explicit_version:
        description: 'Override: explicit X.Y.Z. Leave blank to auto-bump.'
        required: false
        default: ''
      confirm:
        description: 'Type "PUBLISH" to confirm (safety check)'
        required: true
        default: ''

permissions:
  contents: write
  actions: read

# NB: gh-pages-deploy concurrency is declared on the build-and-deploy job
# only. The guard runs without holding the lock.

jobs:
  # Block publish unless the latest dev validate run for this site is green.
  # See .github/workflows/infra-publish-guard.yml for guard semantics.
  guard:
    name: '🛡️ Validate-Dev Green Gate'
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: instructors-validate-dev.yml

  prepare:
    name: '🏷️ Prepare release'
    uses: ./.github/workflows/_release-prepare.yml
    with:
      project: instructors
      tier: B
      previous_tag_pattern: 'instructors-v*'
      release_type: ${{ inputs.release_type }}
      explicit_version: ${{ inputs.explicit_version }}
      description: ${{ inputs.description }}
      confirm: ${{ inputs.confirm }}
      site_only: ${{ inputs.site_only }}

  build-and-deploy:
    name: '🔧 Build & Deploy Instructors'
    needs: [guard, prepare]
    if: inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Instructor Site
        working-directory: instructors
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🔍 Validate build
        run: |
          if [ ! -f "instructors/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi

          PAGE_COUNT=$(find instructors/_build -name '*.html' | wc -l)
          echo "✅ Site built: $PAGE_COUNT pages"
          echo "📊 Build size: $(du -sh instructors/_build | cut -f1)"

          if [ "$PAGE_COUNT" -lt 8 ]; then
            echo "⚠️ WARNING: Expected at least 10 pages, got $PAGE_COUNT"
          fi

      - name: 🐍 Setup Python (for release manifest)
        uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}

      - name: 📦 Emit release manifest
        env:
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
        run: |
          set -euo pipefail
          RELEASE_HASH=$(python3 scripts/version/release.py compute-hash \
            --paths instructors \
            --exclude '_build' '__pycache__' '*.pyc' '.DS_Store' \
                      '.ipynb_checkpoints' '.quarto')
          echo "📦 Release: instructors v${NEW_RELEASE_ID} (hash ${RELEASE_HASH:0:12})"
          python3 scripts/version/release.py emit-manifest \
            --output instructors/_build/release-manifest.json \
            --project instructors \
            --tier B \
            --release-id "$NEW_RELEASE_ID" \
            --release-hash "$RELEASE_HASH"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./instructors/_build
          destination_dir: instructors
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🎓 Deploy Instructors ${{ needs.prepare.outputs.new_tag }} - ${{ github.sha }}'

  create-tag:
    name: '🏷️ Create Tag & Release'
    needs: [build-and-deploy, prepare]
    if: needs.build-and-deploy.result == 'success' && inputs.site_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏷️ Create and push tag
        env:
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Instructors $NEW_TAG: $DESCRIPTION"
          git push origin "$NEW_TAG"
      - name: 📦 Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          gh release create "$NEW_TAG" \
            --title "Instructors v${NEW_RELEASE_ID} — ${DESCRIPTION}" \
            --notes "${DESCRIPTION}" \
            --draft
