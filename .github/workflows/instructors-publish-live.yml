name: '🎓 Instructors · 🚀 Publish (Live)'

# Builds and deploys The Blueprint instructor site to mlsysbook.ai/instructors/

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🔧 Build & Deploy Instructors'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Instructor Site
        working-directory: instructors
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🔍 Validate build
        run: |
          if [ ! -f "instructors/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi

          PAGE_COUNT=$(find instructors/_build -name '*.html' | wc -l)
          echo "✅ Site built: $PAGE_COUNT pages"
          echo "📊 Build size: $(du -sh instructors/_build | cut -f1)"

          if [ "$PAGE_COUNT" -lt 8 ]; then
            echo "⚠️ WARNING: Expected at least 10 pages, got $PAGE_COUNT"
          fi

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./instructors/_build
          destination_dir: instructors
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🎓 Deploy Instructors live - ${{ github.sha }}'
