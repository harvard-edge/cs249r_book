name: "💼 Auto-PR Interview Question"

on:
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-pr:
    if: "github.event.label.name == 'action: auto-pr'"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Flashcard
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/scripts/generate_interview_flashcard.py

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="add-interview-q-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME
          git add interviews/
          git commit -m "docs: add community interview question #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME
          
          gh pr create 
            --title "docs: Add Interview Question from @${{ github.event.issue.user.login }}" 
            --body "This PR automatically formats and adds the interview question submitted in #${{ github.event.issue.number }}. Maintainers can move the question from COMMUNITY.md to the appropriate round before merging." 
            --base dev 
            --head $BRANCH_NAME
