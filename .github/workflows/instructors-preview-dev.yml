name: '🎓 Instructors · 👁️ Preview (Dev)'

# =============================================================================
# Instructors (The Blueprint) — Dev Preview Deploy
# =============================================================================
#
# Builds the instructor-facing Quarto site ("The Blueprint") and deploys
# to the dev preview site via SSH.
#
# Flow:
#   1. BUILD_SITE   — Quarto render + rewrite URLs for dev base path
#   2. VALIDATE     — Check index.html exists
#   3. DEPLOY       — Push to dev preview repo via SSH
#
# Triggers:
#   - push: dev branch, instructors/** paths
#   - workflow_dispatch: manual
#
# Deploys to: harvard-edge.github.io/{DEV_REPO}/{DEV_INSTRUCTORS_PATH}/
# Secrets:    SSH_DEPLOY_KEY
# Vars:       INSTRUCTORS_ROOT, BOOK_TOOLS, DEV_REPO, DEV_REPO_URL, DEV_INSTRUCTORS_PATH
#
# Related:
#   - instructors-validate-dev.yml — Content & build validation
#   - instructors-publish-live.yml — Production deploy to mlsysbook.ai/instructors/
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'instructors/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: instructors-dev-deploy
  cancel-in-progress: true

jobs:
  # Run the full validate-dev workflow inline. Deploy depends on it so
  # Preview can never deploy on a SHA where validate failed (the bug
  # this gating closes is the screenshot pattern of "Preview ✅ but
  # Validate ❌ on the same SHA").
  validate:
    name: '✅ Validate (Dev)'
    uses: ./.github/workflows/instructors-validate-dev.yml

  build-and-deploy:
    name: '🎓 Build & Deploy Instructors (Dev)'
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Instructor Site
        working-directory: ${{ vars.INSTRUCTORS_ROOT }}
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🔗 Rewrite URLs for dev site
        run: bash .github/scripts/rewrite-dev-urls.sh instructors ${{ vars.INSTRUCTORS_ROOT }}/_build

      - name: 🔧 Modify announcement for dev preview
        run: |
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:8}"

          python3 ${{ vars.BOOK_TOOLS }}/scripts/publish/modify_dev_announcement.py \
            ${{ vars.INSTRUCTORS_ROOT }}/_build \
            --verbose \
            --commit-hash "${{ github.sha }}" \
            --commit-short "$COMMIT_SHORT"

      - name: 🔍 Validate build
        run: |
          if [ ! -f "${{ vars.INSTRUCTORS_ROOT }}/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi
          echo "✅ Site built: $(find ${{ vars.INSTRUCTORS_ROOT }}/_build -name '*.html' | wc -l) pages"

      - name: 🚀 Deploy to Dev Site via SSH
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "🔐 Starting ssh-agent..."
          eval "$(ssh-agent -s)"
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null

          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "🔄 Cloning dev preview repository (${{ vars.DEV_REPO }})..."
          git clone --depth=1 ${{ vars.DEV_REPO_URL }} target-repo

          cd target-repo

          echo "🧹 Cleaning ${{ vars.DEV_INSTRUCTORS_PATH }} directory..."
          rm -rf ${{ vars.DEV_INSTRUCTORS_PATH }}
          mkdir -p ${{ vars.DEV_INSTRUCTORS_PATH }}

          echo "🚚 Copying instructor site content..."
          cp -r "${{ github.workspace }}/${{ vars.INSTRUCTORS_ROOT }}/_build/." ${{ vars.DEV_INSTRUCTORS_PATH }}/

          if [ ! -f "${{ vars.DEV_INSTRUCTORS_PATH }}/index.html" ]; then
            echo "❌ CRITICAL: ${{ vars.DEV_INSTRUCTORS_PATH }}/index.html missing. Aborting."
            exit 1
          fi

          echo "📦 Contents of ${{ vars.DEV_INSTRUCTORS_PATH }}/:"
          ls -la ${{ vars.DEV_INSTRUCTORS_PATH }}/ | head -10

          git add .
          git commit -m "🎓 Deploy Instructors dev to /${{ vars.DEV_INSTRUCTORS_PATH }}/ from ${{ github.sha }}" --allow-empty || echo "🟡 Nothing to commit"

          for i in 1 2 3; do
            if git push origin main 2>/dev/null; then
              echo "✅ Push succeeded on attempt $i"
              break
            fi
            echo "⚠️ Push failed (attempt $i/3), pulling with rebase..."
            git pull --rebase origin main || true
          done

          echo "✅ Instructors deployed to: https://harvard-edge.github.io/${{ vars.DEV_REPO }}/${{ vars.DEV_INSTRUCTORS_PATH }}/"
