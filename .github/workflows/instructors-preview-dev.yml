name: '🎓 Instructors · 👁️ Preview (Dev)'

# =============================================================================
# Instructors (The Blueprint) — Dev Preview Deploy
# =============================================================================
#
# Builds the instructor-facing Quarto site ("The Blueprint") and deploys
# to the dev preview site via SSH.
#
# Flow:
#   1. BUILD_SITE   — Quarto render + rewrite URLs for dev base path
#   2. VALIDATE     — Check index.html exists
#   3. DEPLOY       — Push to dev preview repo via SSH
#
# Triggers:
#   - push: dev branch, instructors/** paths
#   - workflow_dispatch: manual
#
# Deploys to: harvard-edge.github.io/{DEV_REPO}/instructors/
# Secrets:    SSH_DEPLOY_KEY
# Vars:       DEV_REPO_URL
#
# Related:
#   - instructors-validate-dev.yml — Content & build validation
#   - instructors-publish-live.yml — Production deploy to mlsysbook.ai/instructors/
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'instructors/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: instructors-dev-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: '🎓 Build & Deploy Instructors (Dev)'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Instructor Site
        working-directory: instructors
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 🔗 Rewrite URLs for dev site
        run: bash .github/scripts/rewrite-dev-urls.sh instructors instructors/_build

      - name: 🔍 Validate build
        run: |
          if [ ! -f "instructors/_build/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi
          echo "✅ Site built: $(find instructors/_build -name '*.html' | wc -l) pages"

      - name: 🚀 Deploy to Dev Site via SSH
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "🔐 Starting ssh-agent..."
          eval "$(ssh-agent -s)"
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null

          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "🔄 Cloning dev preview repository..."
          git clone --depth=1 ${{ vars.DEV_REPO_URL }} target-repo
          cd target-repo

          echo "🧹 Cleaning instructors directory..."
          rm -rf instructors
          mkdir -p instructors

          echo "🚚 Copying instructor site content..."
          cp -r "${{ github.workspace }}/instructors/_build/." instructors/

          if [ ! -f "instructors/index.html" ]; then
            echo "❌ CRITICAL: instructors/index.html missing. Aborting."
            exit 1
          fi

          echo "📦 Committing and pushing..."
          git add .
          git commit -m "🎓 Deploy Instructors dev to /instructors/ from ${{ github.sha }}" --allow-empty || echo "🟡 Nothing to commit"

          # Retry push with rebase to handle concurrent deploys
          for i in 1 2 3; do
            if git push origin main 2>/dev/null; then
              echo "✅ Push succeeded on attempt $i"
              break
            fi
            echo "⚠️ Push failed (attempt $i/3), pulling with rebase..."
            git pull --rebase origin main || true
          done

          echo "✅ Instructor site deployed to dev preview"
