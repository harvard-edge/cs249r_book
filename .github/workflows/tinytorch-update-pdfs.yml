name: '🔥 TinyTorch · 📑 Update PDFs'

# =============================================================================
# TinyTorch — PDF-Only Update (No Site Rebuild)
# =============================================================================
#
# Rebuilds and deploys TinyTorch PDFs directly to gh-pages without touching
# the website, version numbers, or release tags. Use when only the paper
# or guide PDF content has changed.
#
# Flow:
#   1. BUILD_PAPER  — Compile research paper with LuaLaTeX
#   2. BUILD_GUIDE  — Compile course guide with XeLaTeX
#   3. DEPLOY_PDFS  — Copy PDFs into gh-pages/tinytorch/_static/downloads/
#   4. SUMMARY      — Build status report
#
# Triggers:
#   - workflow_dispatch: manual (select which PDFs to rebuild)
#
# Deploys to: mlsysbook.ai/tinytorch/_static/downloads/
# Secrets:    GITHUB_TOKEN
#
# Related:
#   - tinytorch-build-pdfs.yml   — Reusable PDF build (used by preview/publish)
#   - tinytorch-publish-live.yml — Full site + PDF deploy with versioning
#
# =============================================================================

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      update_paper:
        description: 'Update Research Paper PDF'
        type: boolean
        default: true
      update_guide:
        description: 'Update Course Guide PDF'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-paper:
    name: '📑 Build Research Paper'
    runs-on: ubuntu-latest
    if: inputs.update_paper
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: 📑 Compile Paper with LuaLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: tinytorch/paper
          latexmk_use_lualatex: true

      - name: 📤 Upload PDF Paper
        uses: actions/upload-artifact@v6
        with:
          name: TinyTorch-Paper
          path: tinytorch/paper/paper.pdf
          retention-days: 7

  build-guide:
    name: '📚 Build Lab Guide'
    runs-on: ubuntu-latest
    if: inputs.update_guide
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: 📝 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 📚 Setup TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: 🟢 Setup Node.js (for Mermaid)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 📦 Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: 📦 Install build dependencies (apt + TeX)
        # Same one-line deps install as tinytorch-build-pdfs.yml;
        # reads tinytorch/quarto/pdf/{apt,tex}-requirements.txt.
        working-directory: tinytorch/quarto
        run: make install-deps

      - name: 📚 Render Guide PDF (make pdf → Quarto + XeLaTeX)
        # Delegate to the Makefile so CI and local dev share one build
        # recipe: figures target pre-converts SVG diagrams to PDF via
        # rsvg-convert, then quarto render, then the Makefile's
        # self-heal handles Quarto's benign post-render cleanup error.
        #
        # Canonical output: pdf/_build/TinyTorch-Guide.pdf
        working-directory: tinytorch/quarto
        run: |
          set +e
          make pdf
          quarto_exit=$?
          set -e
          if [ ! -f pdf/_build/TinyTorch-Guide.pdf ]; then
            echo "::error::PDF missing — Quarto exit $quarto_exit and no pdf/_build/TinyTorch-Guide.pdf was produced"
            exit 1
          fi
          echo "PDF produced at pdf/_build/TinyTorch-Guide.pdf ($(du -h pdf/_build/TinyTorch-Guide.pdf | cut -f1))"
          if [ $quarto_exit -ne 0 ]; then
            echo "::notice::Quarto exit $quarto_exit (post-render cleanup) — PDF still produced successfully"
          fi

      - name: 📤 Upload PDF Guide
        uses: actions/upload-artifact@v6
        with:
          name: TinyTorch-Guide
          path: tinytorch/quarto/pdf/_build/TinyTorch-Guide.pdf
          retention-days: 7

  deploy-pdfs:
    name: '🚀 Deploy PDFs to gh-pages'
    runs-on: ubuntu-latest
    needs: [build-paper, build-guide]
    if: always() && (needs.build-paper.result == 'success' || needs.build-guide.result == 'success')
    steps:
      - name: 📥 Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: 📥 Download Paper PDF
        if: needs.build-paper.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: TinyTorch-Paper
          path: ./artifacts/paper

      - name: 📥 Download Guide PDF
        if: needs.build-guide.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: TinyTorch-Guide
          path: ./artifacts/guide

      - name: 📁 Update PDFs in gh-pages
        # The Quarto site serves static assets out of `assets/downloads/`
        # (legacy Sphinx used `_static/downloads/`). Writing to both
        # paths during the transition would confuse deploys — we
        # commit only to the canonical Quarto path.
        run: |
          cd gh-pages
          mkdir -p tinytorch/assets/downloads

          if [ -f ../artifacts/paper/paper.pdf ]; then
            cp ../artifacts/paper/paper.pdf tinytorch/assets/downloads/TinyTorch-Paper.pdf
            echo "✅ Updated TinyTorch-Paper.pdf"
          fi

          if [ -f ../artifacts/guide/TinyTorch-Guide.pdf ]; then
            cp ../artifacts/guide/TinyTorch-Guide.pdf tinytorch/assets/downloads/TinyTorch-Guide.pdf
            echo "✅ Updated TinyTorch-Guide.pdf"
          fi

          echo ""
          echo "📦 Downloads folder:"
          ls -la tinytorch/assets/downloads/

      - name: 🚀 Push to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add tinytorch/assets/downloads/
          git commit -m "📄 Update TinyTorch PDFs" || echo "No changes to commit"
          git push origin gh-pages

  summary:
    name: '📊 Summary'
    runs-on: ubuntu-latest
    needs: [build-paper, build-guide, deploy-pdfs]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 📄 TinyTorch PDF Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| PDF | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📑 Research Paper | ${{ needs.build-paper.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Course Guide | ${{ needs.build-guide.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy-pdfs.result }} |" >> $GITHUB_STEP_SUMMARY
