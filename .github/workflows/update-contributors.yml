name: '🔧 Infra · 👥 Update Contributors'

# =============================================================================
# 👥 Update Contributors — Regenerate contributor tables across all projects
# =============================================================================
#
# Fetches contributor data from GitHub API, regenerates sectioned tables in
# the main README and per-project READMEs, and commits changes automatically.
#
# Flow:
#   1. FETCH     — Update root .all-contributorsrc from GitHub API
#   2. GENERATE  — Build main README tables and per-project README tables
#   3. MERGE     — Generate contributors.json for the About page
#   4. COMMIT    — Stage and push changes (with rebase retry)
#
# Triggers:
#   - push (dev, main): When any .all-contributorsrc file changes
#   - workflow_dispatch: Manual trigger from Actions UI
#   - workflow_call: Called by other workflows
#
# Secrets:    GITHUB_TOKEN (automatic)
# Vars:       BOOK_QUARTO
#
# Related:
#   - all-contributors-add.yml — Adds contributors via issue comments
#
# =============================================================================

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [dev, main]
    # Trigger on the root config or any per-project config. The glob covers
    # every directory automatically — to add a new project just add an entry
    # to .github/workflows/contributors/projects.json (no edit needed here).
    paths:
      - '.all-contributorsrc'
      - '*/.all-contributorsrc'
      - '.github/workflows/contributors/projects.json'

permissions:
  contents: write

concurrency:
  group: update-contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-contributors:
    name: Update Contributors List
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/contributors/requirements.txt
          pip install requests>=2.31.0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update root contributors config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOK_QUARTO: ${{ vars.BOOK_QUARTO }}
        run: python ${{ github.workspace }}/.github/workflows/contributors/update_contributors.py

      - name: Generate sectioned main README
        run: python ${{ github.workspace }}/.github/workflows/contributors/generate_main_readme.py

      - name: Generate per-project README tables
        run: |
          # Generate tables for each project README from their configs
          python ${{ github.workspace }}/.github/workflows/contributors/generate_readme_tables.py --update 2>/dev/null || true

      - name: Generate About page contributors.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install gh CLI if not present
          which gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && sudo apt update && sudo apt install gh -y)
          python3 .github/workflows/contributors/merge_contributors.py

      - name: Check for changes
        id: update
        run: |
          # Build the file list dynamically from projects.json so adding a new
          # project (or renaming a directory) in the SSOT is a one-line change.
          mapfile -t FILES_TO_CHECK < <(python3 .github/workflows/contributors/projects.py update-files)

          if [ -f "${{ vars.BOOK_QUARTO }}/contents/frontmatter/acknowledgements/acknowledgements.qmd" ]; then
            FILES_TO_CHECK+=("${{ vars.BOOK_QUARTO }}/contents/frontmatter/acknowledgements/acknowledgements.qmd")
          fi

          if git status "${FILES_TO_CHECK[@]}" --porcelain 2>/dev/null | grep .; then
            echo "changes_made=true" >> $GITHUB_OUTPUT
          else
            echo "changes_made=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.update.outputs.changes_made == 'true'
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}

          # Stage every contributor-related file derived from projects.json.
          # Same source of truth as the change-detection step above; keeps the
          # two from drifting and makes a new project a one-line edit.
          mapfile -t TRACKED < <(python3 .github/workflows/contributors/projects.py update-files)
          git add -A "${TRACKED[@]}" 2>/dev/null || true

          if [ -f "${{ vars.BOOK_QUARTO }}/contents/frontmatter/acknowledgements/acknowledgements.qmd" ]; then
            git add "${{ vars.BOOK_QUARTO }}/contents/frontmatter/acknowledgements/acknowledgements.qmd" 2>/dev/null || true
          fi
          
          git commit -m "Update contributors list [skip ci]"
          
          # Retry push with rebase up to 3 times to handle concurrent pushes
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin "$BRANCH_NAME" 2>/dev/null; then
              echo "✅ Push succeeded on attempt $i"
              break
            fi
            echo "⚠️ Push failed (attempt $i/$MAX_RETRIES), rebasing..."
            if ! git pull --rebase origin "$BRANCH_NAME"; then
              echo "⚠️ Rebase conflict detected, aborting rebase and skipping push"
              git rebase --abort 2>/dev/null || true
              echo "ℹ️ Contributors update will be picked up on next run"
              exit 0
            fi
          done

      - name: Report Status
        run: |
          if [ "${{ steps.update.outputs.changes_made }}" = "true" ]; then
            echo "✅ Contributors list has been updated"
          else
            echo "ℹ️ No changes were needed for contributors list"
          fi
