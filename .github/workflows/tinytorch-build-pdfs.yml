name: '🔥 TinyTorch · 🔨 Build PDFs'

# =============================================================================
# TinyTorch — Build PDF Artifacts
# =============================================================================
#
# Builds the TinyTorch Lab Guide (Quarto → XeLaTeX) and the Research Paper
# (LuaLaTeX), then uploads both as workflow artifacts. PDFs are injected
# into the site during deployment (not committed to repo).
#
# The Guide PDF is produced by the Quarto book project at
# tinytorch/quarto/pdf/, which reuses the website's .qmd chapter
# sources (one directory up) and emits TinyTorch-Guide.pdf. The
# Research Paper build is independent (from tinytorch/paper/).
#
# Flow:
#   1. BUILD_GUIDE  — Quarto book render (XeLaTeX via TinyTeX)
#   2. BUILD_PAPER  — LuaLaTeX compile of research paper
#   3. SUMMARY      — Build status report
#
# Triggers:
#   - workflow_dispatch: manual
#   - workflow_call: called by preview and publish workflows
#
# Deploys to: N/A (artifacts only — TinyTorch-Guide, TinyTorch-Paper)
#
# Related:
#   - tinytorch-preview-dev.yml  — Downloads artifacts for dev deploy
#   - tinytorch-publish-live.yml — Downloads artifacts for live deploy
#   - tinytorch-update-pdfs.yml  — Rebuilds + deploys PDFs without site
#
# =============================================================================

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  # Can be called by publish workflows
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        type: string
        required: false
        default: ''
    outputs:
      guide_built:
        description: "Whether the guide PDF was built successfully"
        value: ${{ jobs.build-pdf-guide.result == 'success' }}
      paper_built:
        description: "Whether the paper PDF was built successfully"
        value: ${{ jobs.build-pdf-paper.result == 'success' }}

permissions:
  contents: read

jobs:
  build-pdf-guide:
    name: '📚 Build Lab Guide'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 📝 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 📚 Setup TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: 🟢 Setup Node.js (for Mermaid)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}

      - name: 📦 Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: 📦 Install build dependencies (apt + TeX)
        # Single-source deps: make install-deps reads
        # tinytorch/quarto/pdf/apt-requirements.txt and tex-requirements.txt
        # and installs everything. Same command works locally.
        working-directory: tinytorch/quarto
        run: make install-deps

      - name: 📚 Render Guide PDF (make pdf → Quarto + XeLaTeX)
        # Delegate to the Makefile so CI and local dev share one build
        # recipe. `make pdf` runs `figures` first (rsvg-convert SVG → PDF
        # for every diagram), then `quarto render pdf/`, then the
        # self-heal that moves the artifact to pdf/_build/ when Quarto's
        # post-render cleanup errors on chapter *_files directories
        # outside the project root.
        #
        # Canonical output: pdf/_build/TinyTorch-Guide.pdf
        working-directory: tinytorch/quarto
        # The Makefile itself handles the benign post-render cleanup error
        # (see pdf/_build/ self-heal logic). CI just needs to verify the
        # artifact exists and bail loudly if it doesn't.
        run: |
          make pdf
          test -f pdf/_build/TinyTorch-Guide.pdf || {
            echo "::error::pdf/_build/TinyTorch-Guide.pdf was not produced"
            exit 1
          }
          echo "PDF produced at pdf/_build/TinyTorch-Guide.pdf ($(du -h pdf/_build/TinyTorch-Guide.pdf | cut -f1))"

      - name: 📤 Upload PDF Guide
        uses: actions/upload-artifact@v7
        with:
          name: TinyTorch-Guide
          path: tinytorch/quarto/pdf/_build/TinyTorch-Guide.pdf
          retention-days: 90

  build-pdf-paper:
    name: '📑 Build Research Paper'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 📑 Compile Paper with LuaLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: tinytorch/paper
          latexmk_use_lualatex: true

      - name: 📤 Upload PDF Paper
        uses: actions/upload-artifact@v7
        with:
          name: TinyTorch-Paper
          path: tinytorch/paper/paper.pdf
          retention-days: 90

  summary:
    name: '📊 Build Summary'
    runs-on: ubuntu-latest
    needs: [build-pdf-guide, build-pdf-paper]
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 📚 TinyTorch PDF Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| PDF | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Lab Guide | ${{ needs.build-pdf-guide.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📑 Research Paper | ${{ needs.build-pdf-paper.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "PDFs are uploaded as artifacts and will be injected during site deployment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To deploy with these PDFs, run the appropriate publish workflow:" >> $GITHUB_STEP_SUMMARY
          echo "- **Live**: TinyTorch Publish (Live)" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev**: TinyTorch Preview (Dev)" >> $GITHUB_STEP_SUMMARY
