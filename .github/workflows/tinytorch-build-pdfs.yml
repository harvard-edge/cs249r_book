name: '🔥 TinyTorch · 🔨 Build PDFs'

# =============================================================================
# TinyTorch — Build PDF Artifacts
# =============================================================================
#
# Builds the TinyTorch Lab Guide (Quarto → XeLaTeX) and the Research Paper
# (LuaLaTeX), then uploads both as workflow artifacts. PDFs are injected
# into the site during deployment (not committed to repo).
#
# The Guide PDF is produced by the Quarto book project at
# tinytorch/quarto/pdf/, which reuses the website's .qmd chapter
# sources (one directory up) and emits TinyTorch-Guide.pdf. The legacy
# jupyter-book pipeline under tinytorch/site-legacy/ is retired and no
# longer consumed. The Research Paper build is independent (from
# tinytorch/paper/).
#
# Flow:
#   1. BUILD_GUIDE  — Quarto book render (XeLaTeX via TinyTeX)
#   2. BUILD_PAPER  — LuaLaTeX compile of research paper
#   3. SUMMARY      — Build status report
#
# Triggers:
#   - workflow_dispatch: manual
#   - workflow_call: called by preview and publish workflows
#
# Deploys to: N/A (artifacts only — TinyTorch-Guide, TinyTorch-Paper)
#
# Related:
#   - tinytorch-preview-dev.yml  — Downloads artifacts for dev deploy
#   - tinytorch-publish-live.yml — Downloads artifacts for live deploy
#   - tinytorch-update-pdfs.yml  — Rebuilds + deploys PDFs without site
#
# =============================================================================

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  # Can be called by publish workflows
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        type: string
        required: false
        default: ''
    outputs:
      guide_built:
        description: "Whether the guide PDF was built successfully"
        value: ${{ jobs.build-pdf-guide.result == 'success' }}
      paper_built:
        description: "Whether the paper PDF was built successfully"
        value: ${{ jobs.build-pdf-paper.result == 'success' }}

permissions:
  contents: read

jobs:
  build-pdf-guide:
    name: '📚 Build Lab Guide'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 📝 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 📚 Setup TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: 🟢 Setup Node.js (for Mermaid)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 📦 Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: 📚 Install LaTeX packages
        # Explicit tlmgr install so the book render does not depend on
        # Quarto's on-the-fly auto-install (which occasionally stalls
        # on cold CI runners). The list covers everything the preamble
        # and cover page actually need: TeX Gyre font family, custom
        # header/chapter/section formatting, TikZ + tcolorbox for the
        # cover and callouts, microtype, and adjustbox for the global
        # \includegraphics size cap.
        run: |
          tlmgr update --self
          tlmgr install \
            tex-gyre \
            fontspec \
            xetex \
            microtype \
            adjustbox \
            collectbox \
            titlesec \
            fancyhdr \
            tcolorbox \
            pgf \
            environ \
            trimspaces \
            newunicodechar \
            fontawesome5 \
            koma-script \
            booktabs \
            xcolor \
            hyperref \
            caption \
            etoolbox \
            svg \
            transparent

      - name: 📚 Render Guide PDF (Quarto + XeLaTeX)
        # Quarto's post-render cleanup fails (non-fatal) because this
        # book project reads chapters at ../ — outside its project
        # root — so Quarto refuses to remove their auxiliary _files/
        # directories. XeLaTeX still writes the PDF successfully; we
        # verify explicitly below and treat the cleanup error as benign.
        working-directory: tinytorch/quarto
        run: |
          set +e
          quarto render pdf/
          quarto_exit=$?
          set -e
          if [ ! -f pdf/TinyTorch-Guide.pdf ]; then
            echo "::error::PDF missing — Quarto exit $quarto_exit and no TinyTorch-Guide.pdf was produced"
            exit 1
          fi
          echo "PDF produced at pdf/TinyTorch-Guide.pdf ($(du -h pdf/TinyTorch-Guide.pdf | cut -f1))"
          if [ $quarto_exit -ne 0 ]; then
            echo "::notice::Quarto exit $quarto_exit (post-render cleanup) — PDF still produced successfully"
          fi

      - name: 📤 Upload PDF Guide
        uses: actions/upload-artifact@v6
        with:
          name: TinyTorch-Guide
          path: tinytorch/quarto/pdf/TinyTorch-Guide.pdf
          retention-days: 90

  build-pdf-paper:
    name: '📑 Build Research Paper'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 📑 Compile Paper with LuaLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: tinytorch/paper
          latexmk_use_lualatex: true

      - name: 📤 Upload PDF Paper
        uses: actions/upload-artifact@v6
        with:
          name: TinyTorch-Paper
          path: tinytorch/paper/paper.pdf
          retention-days: 90

  summary:
    name: '📊 Build Summary'
    runs-on: ubuntu-latest
    needs: [build-pdf-guide, build-pdf-paper]
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 📚 TinyTorch PDF Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| PDF | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Lab Guide | ${{ needs.build-pdf-guide.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📑 Research Paper | ${{ needs.build-pdf-paper.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "PDFs are uploaded as artifacts and will be injected during site deployment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To deploy with these PDFs, run the appropriate publish workflow:" >> $GITHUB_STEP_SUMMARY
          echo "- **Live**: TinyTorch Publish (Live)" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev**: TinyTorch Preview (Dev)" >> $GITHUB_STEP_SUMMARY
