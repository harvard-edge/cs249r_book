name: '📊 Slides · 🌐 Publish (Live)'

# =============================================================================
# Lecture Slides — Deploy to Production (mlsysbook.ai/slides/)
# =============================================================================
#
# Builds the Quarto slides portal and deploys to production.
# Triggered only on push to main branch.
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/slides-*.yml'

permissions:
  contents: read
  deployments: write

concurrency:
  group: slides-publish-live
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: '🌐 Build & Publish'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Slides Portal
        working-directory: slides
        run: quarto render

      - name: 🔍 Validate build
        run: |
          if [ ! -f "slides/_build/html/index.html" ]; then
            echo "❌ Build failed — no index.html"
            exit 1
          fi
          page_count=$(find slides/_build/html -name '*.html' | wc -l)
          echo "✅ Build successful: $page_count pages"

