name: '📊 Slides · 🌐 Publish (Live)'

# =============================================================================
# Lecture Slides — Build PDFs, Create Release, Deploy Portal
# =============================================================================
#
# On push to main:
#   1. Builds all 35 slide deck PDFs (xelatex + inkscape)
#   2. Creates a GitHub Release with all PDFs as downloadable assets
#   3. Builds and deploys the Quarto slides portal
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/slides-*.yml'

permissions:
  contents: write
  deployments: write

concurrency:
  group: slides-publish-live
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stage 1: Build all PDFs
  # ===========================================================================
  build-pdfs:
    name: '📄 Build PDFs'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Install TeX Live + Inkscape
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-fonts-recommended texlive-fonts-extra \
            texlive-latex-extra texlive-latex-recommended lmodern \
            fonts-liberation inkscape

      - name: 🔧 Install Fonts
        run: |
          wget -q https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
          unzip -q JetBrainsMono-2.304.zip -d /tmp/jbmono
          sudo mkdir -p /usr/share/fonts/truetype/jetbrains-mono
          sudo cp /tmp/jbmono/fonts/ttf/*.ttf /usr/share/fonts/truetype/jetbrains-mono/
          sudo fc-cache -f -v > /dev/null 2>&1

      - name: 📄 Build All Slides
        working-directory: slides
        run: |
          make svgs
          for vol in vol1 vol2; do
            mkdir -p _build/$vol
            for ch_dir in $vol/*_*/; do
              tex_file=$(ls $ch_dir/*.tex 2>/dev/null | head -1)
              [ -z "$tex_file" ] && continue
              tex_name=$(basename "$tex_file" .tex)
              cd "$ch_dir"
              xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
              xelatex -interaction=nonstopmode "$tex_name.tex" > /dev/null 2>&1 || true
              cd - > /dev/null
              [ -f "$ch_dir/$tex_name.pdf" ] && cp "$ch_dir/$tex_name.pdf" "_build/$vol/"
              rm -f $ch_dir/*.aux $ch_dir/*.nav $ch_dir/*.out $ch_dir/*.snm \
                    $ch_dir/*.toc $ch_dir/*.vrb $ch_dir/*.fls $ch_dir/*.log \
                    $ch_dir/$tex_name.pdf 2>/dev/null
            done
          done

      - name: 📦 Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-slide-pdfs
          path: slides/_build/

  # ===========================================================================
  # Stage 2: Create GitHub Release with PDFs
  # ===========================================================================
  create-release:
    name: '🏷️ Create Release'
    needs: build-pdfs
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: all-slide-pdfs
          path: pdfs/

      - name: 📦 Package PDFs
        run: |
          cd pdfs
          # Create zip archives for easy download
          zip -r ../MLSysBook-Slides-Vol1.zip vol1/*.pdf
          zip -r ../MLSysBook-Slides-Vol2.zip vol2/*.pdf
          zip -r ../MLSysBook-Slides-All.zip vol1/*.pdf vol2/*.pdf
          cd ..
          echo "📦 Archives created:"
          ls -lh MLSysBook-Slides-*.zip

      - name: 🏷️ Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slides-latest
          name: "Lecture Slides (Latest)"
          body: |
            ## ML Systems Lecture Slides

            Complete Beamer slide decks for both volumes of the ML Systems textbook.

            **Volume I** (17 decks): Introduction through Conclusion — single-machine ML systems
            **Volume II** (18 decks): Introduction through Conclusion — distributed ML at scale

            Each deck includes speaker notes, active learning exercises, and original SVG diagrams.

            ### Downloads
            - **MLSysBook-Slides-All.zip** — All 35 decks (both volumes)
            - **MLSysBook-Slides-Vol1.zip** — Volume I only (17 decks)
            - **MLSysBook-Slides-Vol2.zip** — Volume II only (18 decks)
            - Individual chapter PDFs are also attached below.

            ### Source
            LaTeX source and SVGs: [slides/](https://github.com/harvard-edge/cs249r_book/tree/main/slides)
          draft: false
          prerelease: false
          files: |
            MLSysBook-Slides-All.zip
            MLSysBook-Slides-Vol1.zip
            MLSysBook-Slides-Vol2.zip
            pdfs/vol1/*.pdf
            pdfs/vol2/*.pdf
          make_latest: true

  # ===========================================================================
  # Stage 3: Deploy Quarto portal
  # ===========================================================================
  deploy-portal:
    name: '🌐 Deploy Portal'
    needs: build-pdfs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Slides Portal
        working-directory: slides
        run: quarto render

      - name: 🔍 Validate build
        run: |
          if [ ! -f "slides/_build/html/index.html" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Portal built: $(find slides/_build/html -name '*.html' | wc -l) pages"

      # Placeholder: Replace with your deployment provider
