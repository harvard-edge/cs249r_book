name: '🔮 Labs · 🚀 Publish (Live)'

# Builds and deploys Labs site to mlsysbook.ai/labs/

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: '🔮 Build & Deploy Labs'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Build mlsysim wheel
        run: |
          pip install build
          cd mlsysim && python3 -m build --wheel

      - name: 🔮 Export labs as WASM HTML
        run: |
          pip install marimo
          mkdir -p labs/_wasm_build/wheels
          cp mlsysim/dist/mlsysim-*.whl labs/_wasm_build/wheels/

          for vol in vol1 vol2; do
            mkdir -p "labs/_wasm_build/${vol}"
            for lab in labs/${vol}/lab_*.py; do
              name=$(basename "$lab" .py)
              marimo export html-wasm "$lab" \
                -o "labs/_wasm_build/${vol}/${name}/index.html" \
                --mode run \
                2>&1 || echo "⚠️ Failed: ${vol}/${name}"
            done
          done

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Labs Site
        working-directory: ${{ vars.LABS_ROOT }}
        run: |
          quarto render
          touch _build/.nojekyll
          cp -r _wasm_build/vol1 _build/vol1 2>/dev/null || true
          cp -r _wasm_build/vol2 _build/vol2 2>/dev/null || true
          cp -r _wasm_build/wheels _build/wheels 2>/dev/null || true

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.LABS_ROOT }}/_build
          destination_dir: ${{ vars.DEV_LABS_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🔮 Deploy Labs live - ${{ github.sha }}'
