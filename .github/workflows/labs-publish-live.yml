name: '🔮 Labs · 🚀 Publish (Live)'

# =============================================================================
# Labs — Production Deploy
# =============================================================================
#
# Exports all Marimo notebooks to WASM HTML, builds the Quarto portal site,
# and deploys to the live production site on GitHub Pages.
#
# Flow:
#   1. BUILD_WHEEL  — Build mlsysim Python wheel for WASM
#   2. EXPORT_WASM  — Export all lab notebooks as WASM HTML
#   3. BUILD_SITE   — Quarto render + merge WASM exports into build
#   4. DEPLOY       — Push to gh-pages branch
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/labs/
# Secrets:    GITHUB_TOKEN
# Vars:       LABS_ROOT, DEV_LABS_PATH
#
# Related:
#   - labs-preview-dev.yml  — Dev preview deploy
#   - labs-validate-dev.yml — Content & build validation
#
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What are you publishing? [Content updates and improvements]'
        required: false
        default: 'Content updates and improvements'
      site_only:
        description: 'Website-only deploy? (no version bump, no tag)'
        required: false
        type: boolean
        default: false
      release_type:
        description: 'Release type [patch]'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      explicit_version:
        description: 'Override: explicit X.Y.Z. Leave blank to auto-bump.'
        required: false
        default: ''
      confirm:
        description: 'Type "PUBLISH" to confirm (safety check)'
        required: true
        default: ''

permissions:
  contents: write
  actions: read

# NB: gh-pages-deploy concurrency is declared on the build-and-deploy job
# only. The guard runs without holding the lock.

jobs:
  # Block publish unless the latest dev validate run for this site is green.
  # See .github/workflows/infra-publish-guard.yml for guard semantics.
  guard:
    name: '🛡️ Validate-Dev Green Gate'
    if: inputs.confirm == 'PUBLISH'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: labs-validate-dev.yml

  prepare:
    name: '🏷️ Prepare release'
    uses: ./.github/workflows/_release-prepare.yml
    with:
      project: labs
      tier: B
      previous_tag_pattern: 'labs-v*'
      release_type: ${{ inputs.release_type }}
      explicit_version: ${{ inputs.explicit_version }}
      description: ${{ inputs.description }}
      confirm: ${{ inputs.confirm }}
      site_only: ${{ inputs.site_only }}

  build-and-deploy:
    name: '🔮 Build & Deploy Labs'
    needs: [guard, prepare]
    if: inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}

      - name: 📦 Install dependencies
        run: |
          pip install build marimo
          pip install -r labs/requirements.txt
          pip install mlsysim/

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Labs Site
        env:
          LABS_ROOT: ${{ vars.LABS_ROOT || 'labs' }}
        run: bash labs/tools/build_site.sh

      - name: 📦 Emit release manifest
        env:
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
        run: |
          set -euo pipefail
          RELEASE_HASH=$(python3 scripts/version/release.py compute-hash \
            --paths ${{ vars.LABS_ROOT || 'labs' }} \
            --exclude '_build' '__pycache__' '*.pyc' '.DS_Store' \
                      '.ipynb_checkpoints' '.quarto')
          echo "📦 Release: labs v${NEW_RELEASE_ID} (hash ${RELEASE_HASH:0:12})"
          python3 scripts/version/release.py emit-manifest \
            --output ${{ vars.LABS_ROOT || 'labs' }}/_build/release-manifest.json \
            --project labs \
            --tier B \
            --release-id "$NEW_RELEASE_ID" \
            --release-hash "$RELEASE_HASH"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.LABS_ROOT }}/_build
          destination_dir: ${{ vars.DEV_LABS_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🔮 Deploy Labs ${{ needs.prepare.outputs.new_tag }} - ${{ github.sha }}'

  create-tag:
    name: '🏷️ Create Tag & Release'
    needs: [build-and-deploy, prepare]
    if: needs.build-and-deploy.result == 'success' && inputs.site_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏷️ Create and push tag
        env:
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Labs $NEW_TAG: $DESCRIPTION"
          git push origin "$NEW_TAG"
      - name: 📦 Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.prepare.outputs.new_tag }}
          NEW_RELEASE_ID: ${{ needs.prepare.outputs.new_release_id }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          gh release create "$NEW_TAG" \
            --title "Labs v${NEW_RELEASE_ID} — ${DESCRIPTION}" \
            --notes "${DESCRIPTION}" \
            --draft
