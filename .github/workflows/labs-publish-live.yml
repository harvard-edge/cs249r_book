name: '🔮 Labs · 🚀 Publish (Live)'

# =============================================================================
# Labs — Production Deploy
# =============================================================================
#
# Exports all Marimo notebooks to WASM HTML, builds the Quarto portal site,
# and deploys to the live production site on GitHub Pages.
#
# Flow:
#   1. BUILD_WHEEL  — Build mlsysim Python wheel for WASM
#   2. EXPORT_WASM  — Export all lab notebooks as WASM HTML
#   3. BUILD_SITE   — Quarto render + merge WASM exports into build
#   4. DEPLOY       — Push to gh-pages branch
#
# Triggers:
#   - workflow_dispatch: manual only
#
# Deploys to: mlsysbook.ai/labs/
# Secrets:    GITHUB_TOKEN
# Vars:       LABS_ROOT, DEV_LABS_PATH
#
# Related:
#   - labs-preview-dev.yml  — Dev preview deploy
#   - labs-validate-dev.yml — Content & build validation
#
# =============================================================================

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

# NB: gh-pages-deploy concurrency is declared on the build-and-deploy job
# only. The guard runs without holding the lock.

jobs:
  # Block publish unless the latest dev validate run for this site is green.
  # See .github/workflows/infra-publish-guard.yml for guard semantics.
  guard:
    name: '🛡️ Validate-Dev Green Gate'
    uses: ./.github/workflows/infra-publish-guard.yml
    with:
      validate_workflow: labs-validate-dev.yml

  build-and-deploy:
    name: '🔮 Build & Deploy Labs'
    needs: [guard]
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies & build mlsysim wheel
        run: |
          pip install build marimo
          pip install -r labs/requirements.txt
          pip install mlsysim/
          cd mlsysim && python3 -m build --wheel

      - name: 🔮 Export labs as WASM HTML
        run: |
          mkdir -p labs/_wasm_build/wheels
          cp mlsysim/dist/mlsysim-*.whl labs/_wasm_build/wheels/

          EXPECTED=0
          EXPORTED=0
          FAILED=""

          for vol in vol1 vol2; do
            mkdir -p "labs/_wasm_build/${vol}"
            for lab in labs/${vol}/lab_*.py; do
              name=$(basename "$lab" .py)
              EXPECTED=$((EXPECTED + 1))
              echo "  Exporting ${vol}/${name}..."
              if marimo export html-wasm "$lab" \
                -o "labs/_wasm_build/${vol}/${name}/index.html" \
                --mode run \
                --no-show-code; then
                EXPORTED=$((EXPORTED + 1))
              else
                echo "❌ FAILED to export ${vol}/${name}"
                FAILED="${FAILED} ${vol}/${name}"
              fi
            done
          done

          echo ""
          echo "📊 WASM Export Summary: ${EXPORTED}/${EXPECTED} notebooks exported"
          if [ -n "$FAILED" ]; then
            echo "❌ Failed exports:${FAILED}"
            exit 1
          fi

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Labs Site
        working-directory: ${{ vars.LABS_ROOT }}
        run: |
          quarto render
          touch _build/.nojekyll

          # Merge WASM exports AFTER Quarto render so they overwrite any fallback
          cp -r _wasm_build/vol1 _build/vol1
          cp -r _wasm_build/vol2 _build/vol2
          cp -r _wasm_build/wheels _build/wheels

          # Verify WASM notebooks are in place
          WASM_COUNT=$(find _build/vol1 _build/vol2 -name "index.html" | wc -l)
          echo "📊 WASM notebooks in final build: ${WASM_COUNT}"
          if [ "$WASM_COUNT" -lt 10 ]; then
            echo "❌ Too few WASM notebooks in build output (expected 33, got ${WASM_COUNT})"
            exit 1
          fi

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.LABS_ROOT }}/_build
          destination_dir: ${{ vars.DEV_LABS_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🔮 Deploy Labs live - ${{ github.sha }}'
