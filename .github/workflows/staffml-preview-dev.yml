name: '🎯 StaffML · 👁️ Preview (Dev)'

# =============================================================================
# StaffML — Dev Preview Deploy
# =============================================================================
#
# Builds the StaffML Next.js interview prep app and deploys to the dev
# preview site via SSH. Includes vault validation and smoke tests.
#
# Flow:
#   1. BUILD       — npm ci + Next.js static export
#   2. VALIDATE    — Build output + vault integrity + smoke tests
#   3. DEPLOY      — Push to dev preview repo via SSH
#
# Triggers:
#   - push: dev branch, interviews/staffml/** paths
#   - workflow_dispatch: manual
#
# Deploys to: harvard-edge.github.io/{DEV_REPO}/staffml/
# Secrets:    SSH_DEPLOY_KEY
# Vars:       DEV_REPO_URL
#
# Related:
#   - staffml-publish-live.yml — Production deploy to mlsysbook.ai/staffml/
#   - staffml-auto-pr.yml     — Auto-PR from community question issues
#   - staffml-welcome.yml     — Welcome comment on contributor PRs
#
# =============================================================================

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'interviews/staffml/**'
      # Also redeploy when YAMLs or chains change — the workflow
      # regenerates corpus.json + corpus-summary.json from YAMLs before
      # building, so the dev site always reflects current vault state.
      - 'interviews/vault/questions/**'
      - 'interviews/vault/chains.json'
      - 'interviews/vault/schema/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: staffml-dev-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: '🎯 Build & Deploy StaffML (Dev)'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interviews/staffml/package-lock.json

      - name: 📦 Install dependencies
        working-directory: interviews/staffml
        run: npm ci

      - name: 🐍 Setup Python (for vault-cli)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🛠️ Install vault-cli
        run: pip install -e interviews/vault-cli/

      - name: 🔄 Regenerate corpus from YAMLs (vault build --legacy-json)
        # Emits interviews/staffml/src/data/corpus.json (full) +
        # corpus-summary.json (site bundle) from the committed YAMLs.
        # Guarantees the built site reflects current vault state even if
        # the committed JSON artifacts drift from YAMLs.
        run: vault build --vault-dir interviews/vault --release-id preview-dev --legacy-json

      - name: 🔍 Type check
        working-directory: interviews/staffml
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        working-directory: interviews/staffml
        run: npm test

      - name: 🔨 Build StaffML
        working-directory: interviews/staffml
        env:
          NEXT_PUBLIC_BASE_PATH: /cs249r_book_dev/staffml
          NEXT_PUBLIC_ECOSYSTEM_BASE: https://harvard-edge.github.io/cs249r_book_dev
          NEXT_PUBLIC_ANALYTICS_URL: https://mlsysbook.ai/api/staffml-analytics
          # Preview builds share the production interviewer worker. This
          # means preview PRs can exercise the real hosted AskInterviewer
          # panel, and any rate-limit hits on preview count against the
          # same global budget as production. The CORS allowlist on the
          # worker already includes localhost plus the production origins.
          NEXT_PUBLIC_INTERVIEWER_ENDPOINT: https://mlsysbook.ai/api/staffml-interviewer
          # Preview shares the production worker (same D1 data).
          NEXT_PUBLIC_VAULT_API: https://staffml-vault.mlsysbook-ai-account.workers.dev
          NEXT_PUBLIC_VAULT_RELEASE: "1.0.2"
        run: npm run build

      - name: 📁 Inject paper and figures into build
        run: |
          echo "📁 Injecting paper assets into built site..."
          mkdir -p interviews/staffml/out/downloads

          if [ -f interviews/paper/paper.pdf ]; then
            cp interviews/paper/paper.pdf interviews/staffml/out/downloads/StaffML-Paper.pdf
            echo "✅ Injected StaffML-Paper.pdf"
          else
            echo "⚠️ Paper PDF not found"
          fi

          echo ""
          echo "📦 Downloads folder contents:"
          ls -la interviews/staffml/out/downloads/ || echo "No downloads folder"

      - name: 🔗 Rewrite URLs for dev site
        run: bash .github/scripts/rewrite-dev-urls.sh staffml interviews/staffml/out

      - name: 🔍 Validate build
        run: |
          if [ ! -f "interviews/staffml/out/index.html" ]; then
            echo "❌ CRITICAL: index.html missing. Aborting deployment."
            exit 1
          fi

          PAGE_COUNT=$(find interviews/staffml/out -name '*.html' | wc -l)
          echo "✅ StaffML built: $PAGE_COUNT pages"
          echo "📊 Build size: $(du -sh interviews/staffml/out | cut -f1)"

          # Verify critical pages exist
          MISSING=0
          for page in practice gauntlet progress about 404; do
            if [ ! -f "interviews/staffml/out/${page}.html" ]; then
              echo "❌ MISSING: ${page}.html"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING critical pages missing. Aborting."
            exit 1
          fi

          # Show vault version
          if [ -f "interviews/staffml/src/data/vault-manifest.json" ]; then
            echo "📋 Vault version: $(python3 -c "import json; print(json.load(open('interviews/staffml/src/data/vault-manifest.json'))['version'])")"
          fi

      - name: 🔐 Validate vault integrity
        run: python3 interviews/staffml/scripts/validate-vault.py

      - name: 🧪 Smoke tests
        run: |
          python3 -c "
          import json, sys

          # Test 1: Corpus integrity
          with open('interviews/staffml/src/data/corpus.json') as f:
              corpus = json.load(f)
          assert len(corpus) >= 4000, f'Corpus too small: {len(corpus)} questions'
          print(f'✅ Corpus: {len(corpus)} questions')

          # Test 2: Every question has required fields
          required = ['id', 'title', 'level', 'track', 'scenario', 'competency_area', 'topic', 'zone', 'details']
          missing = []
          for q in corpus:
              for field in required:
                  if not q.get(field):
                      missing.append(f'{q.get(\"id\", \"???\")} missing {field}')
          if missing:
              print(f'⚠️ {len(missing)} questions with missing fields')
              for m in missing[:5]:
                  print(f'   {m}')
              if len(missing) > 5:
                  print(f'   ... and {len(missing) - 5} more')
          else:
              print('✅ All questions have required fields')

          # Test 3: Every question has a valid level
          valid_levels = {'L1', 'L2', 'L3', 'L4', 'L5', 'L6', 'L6+'}
          bad_levels = [q['id'] for q in corpus if q.get('level') not in valid_levels]
          assert len(bad_levels) == 0, f'{len(bad_levels)} questions with invalid levels: {bad_levels[:3]}'
          print('✅ All levels valid (L1-L6+)')

          # Test 4: Taxonomy loads and has concepts
          with open('interviews/staffml/src/data/taxonomy.json') as f:
              taxonomy = json.load(f)
          concepts = taxonomy.get('concepts', [])
          assert len(concepts) >= 70, f'Taxonomy too small: {len(concepts)} topics'
          print(f'✅ Taxonomy: {len(concepts)} topics')

          # Test 5: Manifest exists and is valid
          with open('interviews/staffml/src/data/vault-manifest.json') as f:
              manifest = json.load(f)
          assert 'version' in manifest, 'Manifest missing version'
          assert manifest['questionCount'] == len(corpus), f'Manifest count mismatch: {manifest[\"questionCount\"]} vs {len(corpus)}'
          print(f'✅ Manifest: v{manifest[\"version\"]} ({manifest[\"questionCount\"]} Qs)')

          # Test 6: Build output has static assets
          import os
          js_files = [f for f in os.listdir('interviews/staffml/out/_next/static') if not f.startswith('.')]
          assert len(js_files) > 0, 'No static JS chunks found'
          print(f'✅ Static assets: {len(js_files)} chunks')

          print()
          print('🎯 All smoke tests passed')
          "

      - name: 🚀 Deploy to Dev Site via SSH
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "🔐 Starting ssh-agent..."
          eval "$(ssh-agent -s)"
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null

          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "🔄 Cloning dev preview repository..."
          git clone --depth=1 ${{ vars.DEV_REPO_URL }} target-repo
          cd target-repo

          echo "🧹 Cleaning staffml directory..."
          rm -rf staffml
          mkdir -p staffml

          echo "🚚 Copying StaffML build..."
          cp -r "${{ github.workspace }}/interviews/staffml/out/." staffml/

          if [ ! -f "staffml/index.html" ]; then
            echo "❌ CRITICAL: staffml/index.html missing. Aborting."
            exit 1
          fi

          echo "📦 Committing and pushing..."
          git add .
          git commit -m "🎯 Deploy StaffML dev to /staffml/ from ${{ github.sha }}" --allow-empty || echo "🟡 Nothing to commit"

          # Retry push with rebase to handle concurrent deploys
          for i in 1 2 3; do
            if git push origin main 2>/dev/null; then
              echo "✅ Push succeeded on attempt $i"
              break
            fi
            echo "⚠️ Push failed (attempt $i/3), pulling with rebase..."
            git pull --rebase origin main || true
          done

          echo "✅ StaffML deployed to dev preview"
