name: '📦 Kits · 🚀 Publish (Live)'

# Builds and deploys Hardware Kits site (with PDF) to mlsysbook.ai/kits/

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  # Build PDF first
  build-pdf:
    name: '📚 Build PDF'
    uses: ./.github/workflows/kits-build-pdfs.yml
    with:
      ref: ${{ github.ref }}

  build-and-deploy:
    name: '🔧 Build & Deploy Kits'
    runs-on: ubuntu-latest
    needs: [build-pdf]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Kits Site
        working-directory: ${{ vars.KITS_ROOT }}
        run: |
          quarto render
          touch _build/.nojekyll

      - name: 📥 Download PDF Artifact
        uses: actions/download-artifact@v7
        with:
          name: Kits-PDF
          path: ${{ vars.KITS_ROOT }}/_build/assets/downloads/

      - name: 📋 Verify PDF
        run: |
          echo "📋 PDF artifacts:"
          ls -la ${{ vars.KITS_ROOT }}/_build/assets/downloads/
          echo ""
          echo "📊 PDF file size:"
          du -h ${{ vars.KITS_ROOT }}/_build/assets/downloads/*.pdf

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ vars.KITS_ROOT }}/_build
          destination_dir: ${{ vars.DEV_KITS_PATH }}
          publish_branch: gh-pages
          keep_files: true
          commit_message: '🔧 Deploy Kits live (with PDF) - ${{ github.sha }}'
