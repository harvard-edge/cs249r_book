name: '🔮 Labs · 👁️ Preview (Dev)'

# Builds and deploys Labs site to dev preview

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'labs/**'
      - 'mlsysim/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: labs-dev-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: '🔮 Build & Deploy Labs (Dev)'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Build mlsysim wheel
        run: |
          pip install build
          cd mlsysim && python3 -m build --wheel
          echo "✅ Wheel built:"
          ls -la dist/*.whl

      - name: 🔮 Export labs as WASM HTML
        run: |
          pip install marimo
          mkdir -p labs/_wasm_build/wheels

          # Copy the mlsysim wheel to the output
          cp mlsysim/dist/mlsysim-*.whl labs/_wasm_build/wheels/

          # Export each lab as a self-contained WASM HTML app
          for vol in vol1 vol2; do
            mkdir -p "labs/_wasm_build/${vol}"
            for lab in labs/${vol}/lab_*.py; do
              name=$(basename "$lab" .py)
              echo "  Exporting ${vol}/${name}..."
              marimo export html-wasm "$lab" \
                -o "labs/_wasm_build/${vol}/${name}/index.html" \
                --mode run \
                2>&1 || echo "⚠️ Failed to export ${vol}/${name}, skipping"
            done
          done

          echo "✅ WASM export complete:"
          find labs/_wasm_build -name "index.html" | wc -l
          echo " notebooks exported"

      - name: 🔧 Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🔨 Build Labs Site
        working-directory: ${{ vars.LABS_ROOT }}
        run: |
          quarto render
          touch _build/.nojekyll

          # Merge WASM exports into the Quarto build output
          cp -r _wasm_build/vol1 _build/vol1 2>/dev/null || true
          cp -r _wasm_build/vol2 _build/vol2 2>/dev/null || true
          cp -r _wasm_build/wheels _build/wheels 2>/dev/null || true

          echo "✅ Final build contents:"
          ls -la _build/

      - name: 🔧 Modify announcement for dev preview
        run: |
          echo "🔧 Modifying announcement banner for development preview..."
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:8}"

          python3 ${{ vars.BOOK_TOOLS }}/scripts/publish/modify_dev_announcement.py \
            ${{ vars.LABS_ROOT }}/_build \
            --verbose \
            --commit-hash "${{ github.sha }}" \
            --commit-short "$COMMIT_SHORT"

      - name: 🚀 Deploy to Dev Site via SSH
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "🔐 Starting ssh-agent..."
          eval "$(ssh-agent -s)"
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null

          # Add github.com to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          echo "🔧 Configuring git..."
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "🔄 Cloning dev preview repository (${{ vars.DEV_REPO }})..."
          git clone --depth=1 ${{ vars.DEV_REPO_URL }} target-repo

          cd target-repo

          echo "🧹 Cleaning ${{ vars.DEV_LABS_PATH }} directory..."
          rm -rf ${{ vars.DEV_LABS_PATH }}
          mkdir -p ${{ vars.DEV_LABS_PATH }}

          echo "🚚 Copying Labs site content..."
          cp -r "${{ github.workspace }}/${{ vars.LABS_ROOT }}/_build/." ${{ vars.DEV_LABS_PATH }}/

          echo "🔍 Validating deployment content..."
          if [ ! -f "${{ vars.DEV_LABS_PATH }}/index.html" ]; then
            echo "❌ CRITICAL: ${{ vars.DEV_LABS_PATH }}/index.html is missing. Aborting deployment."
            exit 1
          fi

          echo "🔮 Contents of ${{ vars.DEV_LABS_PATH }}/:"
          ls -la ${{ vars.DEV_LABS_PATH }}/ | head -10

          echo "🔮 Committing and pushing changes..."
          git add .
          git commit -m "🔮 Deploy Labs dev to /${{ vars.DEV_LABS_PATH }}/ from ${{ github.sha }}" --allow-empty || echo "🟡 Nothing to commit"
          git push origin main

          echo "✅ Labs deployed to: https://harvard-edge.github.io/${{ vars.DEV_REPO }}/${{ vars.DEV_LABS_PATH }}/"
