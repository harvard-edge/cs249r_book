name: "💼 Acknowledge Interview Flashcards"

on:
  pull_request_target:
    types: [opened]
    paths:
      - 'interviews/*.md'

jobs:
  welcome-contributor:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Comment
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const pr = context.payload.pull_request;
            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "🎉 **Thanks for contributing to the AI Systems Interview Hub!**",
                "",
                "We appreciate you sharing your Silicon Realist knowledge. A maintainer will review the math and logic shortly.",
                "",
                "*P.S. If you haven't already, please drop a ⭐ on the repository!*"
              ].join("\n")
            });
