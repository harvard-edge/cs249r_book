name: "Site: Contribute a 404 Joke"
description: "Suggest a witty ML systems joke for the mlsysbook.ai 404 page"
title: "[404 joke] "
labels: ["site", "404-joke", "good-first-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sending a joke. The 404 page at [mlsysbook.ai/404.html](https://mlsysbook.ai/404.html) shows a random pick from a curated pool — if your joke clears the bar, it joins the pool.

        **House style** (so your joke fits):

        - Dry, technical humor. No emoji, no exclamation marks.
        - 1–2 short sentences. Aim for 12–25 words.
        - Must be ML-systems-specific (training, inference, distributed, hardware) — not generic CS, web, or networking humor.
        - The "page" / "URL" / "request" frame should be present.
        - The ML concept should *do the work* of the joke, not be window dressing.

        **Examples that hit:**

        > *L1 missed. L2 missed. L3 missed. DRAM missed. The page is in another castle.*

        > *Reviewer 2 rejected this URL for insufficient novelty.*

        > *We pruned this URL. Statistically, you didn't need it.*

        **Examples that don't:**

        > ❌ *DNS said go here. The server disagreed.* (generic networking)

        > ❌ *This page is a transformer that broke down.* (weak pun, ML term as window dressing)

  - type: textarea
    id: joke
    attributes:
      label: Your joke
      description: "One or two sentences. Plain text — we'll handle escaping."
      placeholder: "We pruned this URL. Statistically, you didn't need it."
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Which ML systems area does it touch?
      description: "Pick the closest fit — helps us keep the pool topically balanced."
      options:
        - Training (gradient descent, optimizer, scaling laws, loss curves)
        - Inference and serving (batching, KV cache, latency, prefill/decode)
        - Distributed training (FSDP, AllReduce, pipeline parallelism, NCCL)
        - Hardware and edge (GPU, TPU, TinyML, roofline, memory hierarchy)
        - Architecture (attention, transformers, MoE, embeddings)
        - Production reality (drift, rollouts, oncall, registries)
        - Other or multiple
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Optional context
      description: "What failure mode or concept is the joke about? Why do you think it lands?"
      placeholder: "References the cache hierarchy walk; the Mario punchline lands because the search pattern matches a real failure mode."
    validations:
      required: false

  - type: checkboxes
    id: rights
    attributes:
      label: Attribution
      options:
        - label: "I'm submitting this under the same license as the rest of the site (CC BY-NC-SA 4.0). I'm fine with my joke being added to the pool, edited for tone, or declined."
          required: true
