name: "💼 New Interview Question"
description: "Submit a new systems design question for the ML Systems Interview Playbook."
title: "[Track] Question Title"
labels: ["area: interview", "type: improvement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the ML Systems Interview Playbook! Please fill out the fields below.
        
        Once accepted, a maintainer will add the `action: auto-pr` label, which will automatically generate a Pull Request to add your question to the playbook.
  - type: dropdown
    id: track
    attributes:
      label: Track
      description: Which domain does this question belong to?
      options:
        - Cloud
        - Edge
        - Mobile
        - TinyML
        - Data/Ops
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      options:
        - "🟢 L3 - Junior (Recall & Define)"
        - "🔵 L4 - Mid (Apply & Identify)"
        - "🟡 L5 - Senior (Analyze & Predict)"
        - "🔴 L6+ - Staff (Synthesize & Derive)"
    validations:
      required: true
  - type: input
    id: topic
    attributes:
      label: Topic Tag
      description: "e.g., roofline, memory, latency, quantization"
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Question Title
      description: 'A short, catchy name for the scenario (e.g., "The Fragmentation Crisis")'
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: The Interviewer Prompt
      description: "The scenario or crisis presented to the candidate."
    validations:
      required: true
  - type: textarea
    id: mistake
    attributes:
      label: Common Mistake
      description: "What most people say wrong — creates the 'aha' moment."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Realistic Solution
      description: "The physics/logic behind the correct answer."
    validations:
      required: true
  - type: textarea
    id: math
    attributes:
      label: Napkin Math
      description: "Quick back-of-envelope calculation with real numbers. (Optional but highly recommended)"
  - type: input
    id: equation
    attributes:
      label: Key Equation
      description: "The formula to memorize. (Optional)"
  - type: input
    id: link
    attributes:
      label: Deep Dive Link
      description: "Link to the relevant textbook chapter (e.g., https://mlsysbook.ai/vol1/hw_acceleration.html)."