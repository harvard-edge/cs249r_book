name: "💼 New Interview Question"
about: "Add a high-impact AI systems design question to the flashcard hub."
title: "Interview Question: [Short Summary]"
labels: ["interview-prep", "flashcard"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🗳️ The Voting Arena
        Once you submit this question, the community will vote on it using the **👍 Reaction**.
        
        **The 10-Upvote Rule:** When a question reaches **10 upvotes**, a maintainer will officially promote it to the **AI Systems Interview Cheatsheet** and add you to the **Hall of Fame**.
        
        *💡 Tip: Share your question link on LinkedIn or X to hit 10 upvotes faster!*

        ### 🚀 Share & Get Votes
        [🐦 Click to Tweet your question](https://twitter.com/intent/tweet?text=I%20just%20submitted%20a%20new%20AI%20Systems%20Design%20challenge%20to%20the%20@mlsysbook%20Arena!%20Help%20me%20get%20to%20the%20Hall%20of%20Fame%20by%20voting%20on%20my%20issue%20here:%20)
        *(Remember to paste your issue link at the end of the tweet!)*
  - type: textarea
    id: question
    attributes:
      label: "The Question"
      description: "What is the specific question asked in the interview?"
      placeholder: "e.g., 'How does INT8 quantization affect memory bandwidth utilization?'"
    validations:
      required: true
  - type: textarea
    id: answer
    attributes:
      label: "The Silicon Realist Answer"
      description: "Explain the systems-level answer, contrasting it with the naive software-only answer."
    validations:
      required: true
  - type: textarea
    id: wall
    attributes:
      label: "Relevant Wall"
      description: "Which of the 22 Walls does this question relate to?"
      placeholder: "Wall 2: Memory, Wall 14: Communication, etc."
