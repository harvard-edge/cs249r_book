name: "StaffML: Report Question Issue"
description: "Report an incorrect answer, unclear question, or other issue with a StaffML question"
labels: ["staffml", "question-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve StaffML! Please provide as much detail as possible.

  - type: input
    id: question-id
    attributes:
      label: Question ID
      description: "The question identifier (e.g., cloud-0042)"
      placeholder: "cloud-0042"
    validations:
      required: true

  - type: input
    id: question-title
    attributes:
      label: Question Title
      placeholder: "The HBM vs L1 Latency Gap"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Issue Category
      options:
        - Answer is incorrect
        - Math doesn't check out
        - Question is unclear or ambiguous
        - Difficulty level seems wrong
        - Duplicate of another question
        - Other
    validations:
      required: true

  - type: textarea
    id: whats-wrong
    attributes:
      label: What's wrong?
      description: "Describe the issue you found"
      placeholder: "The model answer states X, but the correct answer should be Y because..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: "What the correct answer or behavior should be"
    validations:
      required: false

  - type: input
    id: level
    attributes:
      label: Question Level
      placeholder: "L3"
    validations:
      required: false

  - type: input
    id: track
    attributes:
      label: Track
      placeholder: "cloud"
    validations:
      required: false
