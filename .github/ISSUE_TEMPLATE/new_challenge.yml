name: "🏆 New AI Systems Challenge"
about: "Contribute a new 'LeetCode-style' design challenge to the Arena."
title: "Challenge: [Short Title]"
labels: ["challenge", "community-contributed"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🗳️ The Voting Arena
        Once you submit this challenge, the community will vote on it using the **👍 Reaction**.
        
        **The 10-Upvote Rule:** When a challenge reaches **10 upvotes**, a maintainer will officially promote it to the **AI Systems Arena** and add you to the **Hall of Fame**.
        
        ### 🚀 Share & Get Votes
        [🐦 Click to Tweet your challenge](https://twitter.com/intent/tweet?text=I%20just%20submitted%20a%20new%20AI%20Systems%20Design%20challenge%20to%20the%20@mlsysbook%20Arena!%20Help%20me%20get%20to%20the%20Hall%20of%20Fame%20by%20voting%20on%20my%20issue%20here:%20)
        *(Remember to paste your issue link at the end of the tweet!)*
  - type: textarea
    id: scenario
    attributes:
      label: "The Scenario"
      description: "Describe the architectural problem (e.g., 'Deploy a 70B model on 4 GPUs')."
      placeholder: "You are an architect at..."
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: "Constraints & SLAs"
      description: "Define the hardware limits, budget, or latency targets."
      placeholder: "- Latency < 50ms
- 2x A100 GPUs..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "The 'Silicon Realist' Solution"
      description: "What is the correct calculation or trade-off? (Refer to the 22 Walls if possible)."
    validations:
      required: true
