name: "StaffML: Contribute a Question"
description: "Submit a new ML systems interview question for the StaffML vault"
labels: ["staffml", "contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing to StaffML! All submissions are reviewed before being added to the vault.

        **Good questions are**: grounded in real hardware constraints, quantitative (napkin math), and test systems reasoning rather than trivia.

  - type: dropdown
    id: track
    attributes:
      label: Track
      description: "Which deployment context does this question target?"
      options:
        - cloud (GPU clusters, large-scale inference/training)
        - edge (on-device accelerators, real-time constraints)
        - mobile (phones, power/thermal budgets)
        - tinyml (microcontrollers, sub-milliwatt inference)
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Suggested Difficulty
      description: "Based on Bloom's Taxonomy cognitive depth"
      options:
        - L1 (Remember - recall facts and definitions)
        - L2 (Understand - explain concepts and tradeoffs)
        - L3 (Apply - use knowledge in new situations)
        - L4 (Analyze - break down systems, diagnose issues)
        - L5 (Evaluate - compare architectures, justify decisions)
        - L6+ (Create - design novel systems under constraints)
    validations:
      required: true

  - type: dropdown
    id: zone
    attributes:
      label: Zone
      description: "What cognitive skill does this question primarily exercise?"
      options:
        - recall (facts and definitions)
        - analyze (tradeoffs and reasoning)
        - design (architecture decisions)
        - implement (napkin math and building)
        - diagnosis (recall + analyze — identify failures)
        - specification (recall + design — constraints to architecture)
        - fluency (recall + implement — math from memory)
        - evaluation (analyze + design — compare architectures)
        - realization (design + implement — architecture to numbers)
        - optimization (analyze + implement — diagnose and fix bottlenecks)
        - mastery (all four skills — full synthesis)
    validations:
      required: true

  - type: input
    id: topic
    attributes:
      label: Topic
      description: "Pick from existing topics (e.g., roofline-analysis, kv-cache-management) or suggest a new one"
      placeholder: "roofline-analysis"
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Interview Scenario
      description: "The question as an interviewer would ask it"
      placeholder: "You're serving a 70B parameter model on 8x H100 GPUs. A product manager asks you to reduce P99 latency from 800ms to 200ms without increasing cost. Walk me through your approach."
    validations:
      required: true

  - type: textarea
    id: answer
    attributes:
      label: Expected Answer
      description: "The model answer with reasoning and real numbers"
      placeholder: "The key insight is..."
    validations:
      required: true

  - type: textarea
    id: common-mistake
    attributes:
      label: Common Mistake
      description: "What candidates typically get wrong"
      placeholder: "Most candidates jump to..."
    validations:
      required: true

  - type: textarea
    id: napkin-math
    attributes:
      label: Napkin Math (if applicable)
      description: "Step-by-step calculation with real hardware specs"
      placeholder: |
        H100 bandwidth: 3.35 TB/s
        Model size (FP16): 140 GB
        Load time: 140 / 3350 = 42 ms
        => 42 ms minimum latency
    validations:
      required: false
