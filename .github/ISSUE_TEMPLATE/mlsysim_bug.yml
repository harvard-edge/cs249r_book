name: "MLSysim Bug Report"
description: "Report a bug in the mlsysim analytical engine"
title: "[mlsysim] "
labels: ["mlsysim", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in mlsysim! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "A clear description of the bug."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: "Minimal Python code that reproduces the issue."
      placeholder: |
        ```python
        import mlsysim
        result = mlsysim.Engine.solve(...)
        # Expected: ...
        # Got: ...
        ```
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "mlsysim version"
      description: "Run `python -c \"import mlsysim; print(mlsysim.__version__)\"`"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category"
      options:
        - "Wrong numerical result"
        - "Crash / exception"
        - "Hardware spec error"
        - "API / usability issue"
        - "Documentation"
        - "Other"
    validations:
      required: true
