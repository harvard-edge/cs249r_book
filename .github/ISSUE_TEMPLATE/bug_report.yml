name: "Bug Report"
description: "Report a bug, typo, or error in the textbook or TinyTorch."
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - "Book — Volume I"
        - "Book — Volume II"
        - "TinyTorch"
        - "StaffML"
        - "Kits"
        - "Website"
        - "Other"
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: "Chapter, module, or file where the issue is (e.g., 'Vol1, Training chapter' or 'Module 06 Autograd')."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What is wrong? Be as specific as possible."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should happen instead?"
  - type: textarea
    id: environment
    attributes:
      label: Environment (TinyTorch bugs only)
      description: "Paste the output of: tito --version && python3 --version && echo $VIRTUAL_ENV"
