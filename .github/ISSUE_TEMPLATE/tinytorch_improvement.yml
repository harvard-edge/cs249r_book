name: "TinyTorch Improvement"
description: "Suggest an improvement to a TinyTorch module (bug fix, better explanation, new test, etc.)."
title: "[TinyTorch] "
labels: ["area: tinytorch", "type: improvement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is this about?
      options:
        - "01 Tensor"
        - "02 Activations"
        - "03 Layers"
        - "04 Losses"
        - "05 Dataloader"
        - "06 Autograd"
        - "07 Optimizers"
        - "08 Training"
        - "09 Convolutions"
        - "10 Tokenization"
        - "11 Embeddings"
        - "12 Attention"
        - "13 Transformers"
        - "14 Profiling"
        - "15 Quantization"
        - "16 Compression"
        - "17 Acceleration"
        - "18 Memoization"
        - "19 Benchmarking"
        - "20 Capstone"
        - "CLI (tito)"
        - "General / Cross-module"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type of Improvement
      options:
        - "Bug fix"
        - "Better explanation or documentation"
        - "New or improved test"
        - "Code quality (refactor, style, consistency)"
        - "New example or demonstration"
        - "Performance or systems analysis"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What would you like to improve and why? For bugs, include steps to reproduce."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: "If you have a specific approach in mind, describe it here."
