# Dependabot keeps dependencies and GitHub Actions versions up to date by
# opening PRs against `dev`. Reviewers should still vet each PR; Dependabot
# does not enforce policy beyond version bumps.
#
# Schedule: weekly Mondays — batches noise into one digestible review session.
# Open-PR cap: 5 per ecosystem — keeps the queue actionable, not overwhelming.
# Target branch: `dev` — production releases flow main <- dev, so deps land on
# dev like every other change and ride a normal release cadence.
#
# Reference: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # ---- GitHub Actions used by all workflows in .github/workflows/ ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  # ---- Root Python project (book tooling, scripts, audits) ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(book)"
    labels:
      - "dependencies"
      - "python"

  # ---- TinyTorch (installable educational ML framework) ----
  - package-ecosystem: "pip"
    directory: "/tinytorch"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(tinytorch)"
    labels:
      - "dependencies"
      - "python"
      - "tinytorch"

  # ---- MLSys-im (installable systems simulator) ----
  - package-ecosystem: "pip"
    directory: "/mlsysim"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(mlsysim)"
    labels:
      - "dependencies"
      - "python"
      - "mlsysim"

  # ---- MLPerf EDU (installable benchmark suite) ----
  - package-ecosystem: "pip"
    directory: "/mlperf-edu"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(mlperf-edu)"
    labels:
      - "dependencies"
      - "python"
      - "mlperf-edu"

  # ---- Vault CLI (StaffML question authoring) ----
  - package-ecosystem: "pip"
    directory: "/interviews/vault-cli"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(vault-cli)"
    labels:
      - "dependencies"
      - "python"
      - "staffml"

  # ---- Newsletter pipeline ----
  - package-ecosystem: "pip"
    directory: "/site/newsletter"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(newsletter)"
    labels:
      - "dependencies"
      - "python"

  # ---- StaffML public site (Next.js) ----
  - package-ecosystem: "npm"
    directory: "/interviews/staffml"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(staffml)"
    labels:
      - "dependencies"
      - "javascript"
      - "staffml"
    # Next.js + React get grouped because they always need to bump together.
    groups:
      next-react:
        patterns:
          - "next"
          - "next-*"
          - "react"
          - "react-*"
          - "@types/react*"

  # ---- StaffML Cloudflare Worker (public API) ----
  - package-ecosystem: "npm"
    directory: "/interviews/staffml/worker"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(staffml-worker)"
    labels:
      - "dependencies"
      - "javascript"
      - "staffml"

  # ---- StaffML Vault Worker ----
  - package-ecosystem: "npm"
    directory: "/interviews/staffml-vault-worker"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(vault-worker)"
    labels:
      - "dependencies"
      - "javascript"
      - "staffml"

  # ---- VSCode extensions (the sub-project workbenches) ----
  - package-ecosystem: "npm"
    directory: "/book/vscode-ext"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(book-ext)"
    labels:
      - "dependencies"
      - "javascript"
      - "vscode-ext"

  - package-ecosystem: "npm"
    directory: "/tinytorch/vscode-ext"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(tinytorch-ext)"
    labels:
      - "dependencies"
      - "javascript"
      - "vscode-ext"

  - package-ecosystem: "npm"
    directory: "/labs/vscode-ext"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(labs-ext)"
    labels:
      - "dependencies"
      - "javascript"
      - "vscode-ext"

  - package-ecosystem: "npm"
    directory: "/kits/vscode-ext"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(kits-ext)"
    labels:
      - "dependencies"
      - "javascript"
      - "vscode-ext"

  - package-ecosystem: "npm"
    directory: "/mlsysim/vscode-ext"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(mlsysim-ext)"
    labels:
      - "dependencies"
      - "javascript"
      - "vscode-ext"
