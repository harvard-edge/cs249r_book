# =============================================================================
# THE BLUEPRINT — COURSE IN A BOX
# =============================================================================
# Everything an instructor needs to teach AI Engineering.
# Part of the MLSysBook ecosystem: mlsysbook.ai/instructors/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "The Blueprint - Machine Learning Systems"
  description: "Course-in-a-box for teaching AI Engineering — syllabi, schedules, labs, and assessment."
  site-url: https://mlsysbook.ai/instructors/
  favicon: assets/images/logo.png

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  # Navbar — matches ecosystem pattern
  navbar:
    background: "#0a0a0f"
    logo: assets/images/logo.png
    search: true
    pinned: true
    collapse: true
    collapse-below: "lg"
    title: "Machine Learning Systems"
    left:
      - text: "Textbook"
        menu:
          - icon: house
            text: "Home"
            href: https://mlsysbook.ai/
          - text: "---"
          - icon: journal
            text: "Volume I: Foundations"
            href: https://mlsysbook.ai/vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: https://mlsysbook.ai/vol2/
          - text: "---"
          - icon: fire
            text: "TinyTorch"
            href: https://mlsysbook.ai/tinytorch/
          - icon: cpu
            text: "Hardware Kits"
            href: https://mlsysbook.ai/kits/
          - icon: calculator
            text: "MLSys·IM"
            href: https://mlsysbook.ai/mlsysim/
          - text: "---"
          - icon: lightbulb
            text: "Labs"
            href: https://mlsysbook.ai/labs/
          - icon: easel
            text: "Lecture Slides"
            href: https://mlsysbook.ai/slides/
      - text: "The Blueprint"
        menu:
          - icon: map
            text: "Blueprint Hub"
            href: ./index.qmd
          - text: "Getting Started"
            href: getting-started.qmd
          - text: "---"
          - text: "Foundations Syllabus"
            href: foundations-syllabus.qmd
          - text: "Scale Syllabus"
            href: scale-syllabus.qmd
          - text: "---"
          - text: "Pedagogy"
            href: pedagogy.qmd
          - text: "Assessment & Grading"
            href: assessment.qmd
          - text: "TA Guide"
            href: ta-guide.qmd
          - text: "---"
          - text: "Course Map"
            href: course-map.qmd
          - text: "Customization"
            href: customization.qmd
          - text: "FAQ"
            href: faq.qmd
    right:
      - icon: star
        text: "Star"
        href: https://github.com/harvard-edge/cs249r_book#support-this-work
        target: _blank
      - icon: heart
        text: "Support"
        href: https://opencollective.com/mlsysbook
        target: _blank
      - icon: github
        text: "GitHub"
        href: https://github.com/harvard-edge/cs249r_book
        target: _blank

  sidebar:
    style: "floating"
    background: light
    search: true
    collapse-level: 2
    contents:
      - section: "Start Here"
        contents:
          - text: "The Blueprint"
            href: index.qmd
          - getting-started.qmd
          - course-map.qmd
      - section: "Syllabi"
        contents:
          - foundations-syllabus.qmd
          - scale-syllabus.qmd
          - customization.qmd
      - section: "Teaching & Assessment"
        contents:
          - pedagogy.qmd
          - assessment.qmd
          - ta-guide.qmd
      - section: "Resources"
        contents:
          - faq.qmd
          - text: "TinyTorch Instructor Guide"
            href: https://mlsysbook.ai/tinytorch/INSTRUCTOR.html
          - text: "Labs Instructor Guide"
            href: https://mlsysbook.ai/labs/INSTRUCTOR_GUIDE.html

  # Footer — ecosystem pattern
  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="https://mlsysbook.ai">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: "#0a0a0f"
    border: true

format:
  html:
    theme:
      light:
        - default
        - assets/styles/style.scss
      dark:
        - default
        - assets/styles/style.scss
        - assets/styles/dark-mode.scss
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    code-copy: true
    anchor-sections: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

execute:
  freeze: auto
