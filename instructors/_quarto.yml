# =============================================================================
# THE BLUEPRINT — COURSE IN A BOX
# =============================================================================
# Everything an instructor needs to teach AI Engineering.
# Part of the MLSysBook ecosystem: mlsysbook.ai/instructors/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "The Blueprint - Machine Learning Systems"
  description: "Course-in-a-box for teaching AI Engineering — syllabi, schedules, labs, and assessment."
  site-url: https://mlsysbook.ai/instructors/
  favicon: assets/images/logo.png

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  # Navbar from _navbar-generated.yml (via metadata-files).
  # Regen: python3 .github/scripts/generate-navbar.py --all
  navbar:
    background: "#0a0a0f"
    logo: assets/images/logo.png
    search: true
    title: "Machine Learning Systems"

  sidebar:
    style: "floating"
    background: light
    search: true
    collapse-level: 2
    contents:
      - section: "Start Here"
        contents:
          - text: "The Blueprint"
            href: index.qmd
          - getting-started.qmd
          - course-map.qmd
      - section: "Syllabi"
        contents:
          - foundations-syllabus.qmd
          - scale-syllabus.qmd
          - customization.qmd
      - section: "Teaching & Assessment"
        contents:
          - pedagogy.qmd
          - assessment.qmd
          - ta-guide.qmd
      - section: "Resources"
        contents:
          - faq.qmd
          - text: "TinyTorch Instructor Guide"
            href: https://mlsysbook.ai/tinytorch/INSTRUCTOR.html
          - text: "Labs Instructor Guide"
            href: https://mlsysbook.ai/labs/INSTRUCTOR_GUIDE.html

  # Footer — ecosystem pattern
  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="https://mlsysbook.ai">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: "#0a0a0f"
    border: true

metadata-files:
  - _navbar-generated.yml

format:
  html:
    theme:
      light:
        - default
        - assets/styles/style.scss
      dark:
        - default
        - assets/styles/style.scss
        - assets/styles/dark-mode.scss
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    code-copy: true
    anchor-sections: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

execute:
  freeze: auto
