<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Silicon Realism Loop</text>
  <text x="340" y="50" text-anchor="middle" font-size="10" fill="#555">Every major concept flows through all four pillars</text>

  <!-- ===== Center: Unifying framework (circle is semantic — it is the hub) ===== -->
  <circle cx="340" cy="240" r="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Iron Law</text>
  <text x="340" y="250" text-anchor="middle" font-size="9" fill="#555">Unifying</text>
  <text x="340" y="260" text-anchor="middle" font-size="9" fill="#555">Framework</text>

  <!-- ===== READ (Top) — compute blue ===== -->
  <rect x="255" y="80" width="170" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="105" text-anchor="middle" font-size="20">📖</text>
  <text x="340" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#333">READ</text>
  <text x="340" y="140" text-anchor="middle" font-size="9" fill="#555">Textbook: Theory &amp; Math</text>

  <!-- ===== BUILD (Right) — data-flow green ===== -->
  <rect x="460" y="195" width="170" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="545" y="220" text-anchor="middle" font-size="20">🔥</text>
  <text x="545" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#333">BUILD</text>
  <text x="545" y="255" text-anchor="middle" font-size="9" fill="#555">TinyTorch: Implementation</text>

  <!-- ===== EXPLORE (Bottom) — routing/scheduling orange ===== -->
  <rect x="255" y="310" width="170" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="335" text-anchor="middle" font-size="20">🔬</text>
  <text x="340" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#333">EXPLORE</text>
  <text x="340" y="370" text-anchor="middle" font-size="9" fill="#555">Labs: Simulation &amp; Discovery</text>

  <!-- ===== DEPLOY (Left) — error/cost red ===== -->
  <rect x="50" y="195" width="170" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="135" y="220" text-anchor="middle" font-size="20">🔧</text>
  <text x="135" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#333">DEPLOY</text>
  <text x="135" y="255" text-anchor="middle" font-size="9" fill="#555">Hardware Kits: Reality</text>

  <!-- ===== Curved Arrows (clockwise loop) — neutral #555 marker -->
  <!-- Arrows snap to the new box edges (boxes widened from 140 to 170px,
       so READ/EXPLORE now span x=255-425 and BUILD/DEPLOY are at
       x=460-630 / x=50-220). Each arrow leaves one box from its
       outer-corner edge and lands on the adjacent box's perpendicular
       edge with the marker head exactly at the border. -->
  <!-- READ → BUILD: top-right corner arc -->
  <path d="M425,135 Q500,135 500,195" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="150" text-anchor="middle" font-size="9" fill="#555" font-weight="600">understand</text>

  <!-- BUILD → EXPLORE: bottom-right corner arc -->
  <path d="M500,265 Q500,345 425,345" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="320" text-anchor="middle" font-size="9" fill="#555" font-weight="600">test</text>

  <!-- EXPLORE → DEPLOY: bottom-left corner arc -->
  <path d="M255,345 Q180,345 180,265" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="320" text-anchor="middle" font-size="9" fill="#555" font-weight="600">validate</text>

  <!-- DEPLOY → READ: top-left corner arc (closes the loop) -->
  <path d="M180,195 Q180,135 255,135" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="150" text-anchor="middle" font-size="9" fill="#555" font-weight="600">refine</text>

  <!-- ===== Example annotation cards (rectangular, neutral container) ===== -->
  <rect x="40" y="395" width="180" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Example: Quantization</text>
  <text x="130" y="425" text-anchor="middle" font-size="8" fill="#555">Read Ch.10 → Build INT8 → Lab 09 → Deploy on XIAO</text>

  <rect x="460" y="395" width="180" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="550" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Example: Attention</text>
  <text x="550" y="425" text-anchor="middle" font-size="8" fill="#555">Read Ch.6 → Build Module 12 → Lab 05 → Profile on Pi</text>

  <!-- ===== Bottom footnote — italic, muted, at y=445 ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Students cycle through all four pillars for each major concept (e.g., Quantization, Transformers, Distributed Training)</text>
</svg>
