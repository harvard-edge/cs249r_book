# ML Systems Design Grammar -- rewrite rules.
#
# grammar.yml is the parts catalog: primitives, resources, controls, and metrics.
# This file is the playbook: behavior-preserving transformations that change
# the cost profile of a system when a constraint binds.

version: "0.1"
title: "ML Systems Rewrite Rules"
description: "Reusable transformation rules that turn a naive ML system into a feasible one under physical constraints."

constraints:
  - capacity
  - bandwidth
  - latency
  - utilization
  - fragmentation
  - energy
  - reliability
  - cost

rules:
  - key: tiling
    name: "Tiling"
    symbols: ["Ti"]
    relieves: ["capacity", "bandwidth"]
    preserves: ["mathematical semantics"]
    changes: "Partitions a large computation into blocks that fit in a faster memory tier."
    preconditions: ["block-structured access", "associative or locally composable computation"]
    tradeoffs: ["more scheduling complexity", "possible boundary handling overhead"]
    examples: ["FlashAttention", "blocked matrix multiplication", "cache-aware convolution"]

  - key: fusion
    name: "Fusion"
    symbols: ["Fs"]
    relieves: ["bandwidth", "latency"]
    preserves: ["mathematical semantics"]
    changes: "Combines adjacent operators so intermediates stay in registers, SRAM, or cache."
    preconditions: ["compatible operator sequence", "no required materialization boundary"]
    tradeoffs: ["larger kernels", "less modularity", "compiler or custom-kernel work"]
    examples: ["FlashAttention", "Conv-BN-ReLU fusion", "fused layernorm"]

  - key: sharding
    name: "Sharding"
    symbols: ["Sy", "Fc"]
    relieves: ["capacity"]
    preserves: ["global logical state"]
    changes: "Splits parameters, optimizer state, gradients, activations, or requests across devices."
    preconditions: ["multiple devices", "communication path", "partitionable state or work"]
    tradeoffs: ["communication overhead", "synchronization complexity", "failure surface grows"]
    examples: ["ZeRO", "FSDP", "tensor parallelism", "sequence parallelism"]

  - key: pipelining
    name: "Pipelining"
    symbols: ["Pl"]
    relieves: ["latency", "utilization", "capacity"]
    preserves: ["stage semantics"]
    changes: "Overlaps sequential stages across time or devices."
    preconditions: ["stageable computation", "sufficient microbatches or streaming inputs"]
    tradeoffs: ["startup and drain bubbles", "activation buffering", "load balancing"]
    examples: ["GPipe", "PipeDream", "input pipelines", "prefetch pipelines"]

  - key: batching
    name: "Batching"
    symbols: ["Bt"]
    relieves: ["utilization", "bandwidth"]
    preserves: ["per-example semantics"]
    changes: "Groups independent work so fixed costs and weight reads are amortized."
    preconditions: ["independent requests or examples", "batchable latency budget"]
    tradeoffs: ["queueing latency", "padding waste", "fairness concerns"]
    examples: ["continuous batching", "mini-batch training", "dynamic batching"]

  - key: caching
    name: "Caching"
    symbols: ["Cc"]
    relieves: ["latency", "bandwidth"]
    preserves: ["computed value"]
    changes: "Stores reusable state to avoid recomputation or repeated transfer."
    preconditions: ["temporal reuse", "state fits in useful memory tier", "valid invalidation policy"]
    tradeoffs: ["capacity pressure", "staleness risk", "fragmentation"]
    examples: ["KV cache", "feature cache", "compiled graph cache"]

  - key: prefetching
    name: "Prefetching"
    symbols: ["Pf"]
    relieves: ["latency", "bandwidth stalls"]
    preserves: ["data values"]
    changes: "Moves data before it is needed so transfer overlaps useful work."
    preconditions: ["predictable access pattern", "available overlap window", "spare bandwidth"]
    tradeoffs: ["wasted bandwidth on wrong predictions", "buffer capacity"]
    examples: ["ZeRO-3 parameter prefetch", "input pipeline prefetch", "paged KV prefetch"]

  - key: quantization
    name: "Quantization"
    symbols: ["Qz"]
    relieves: ["capacity", "bandwidth", "energy"]
    preserves: ["approximate function"]
    changes: "Reduces numerical precision to shrink state and increase effective bandwidth."
    preconditions: ["accuracy tolerance", "hardware support or efficient kernels"]
    tradeoffs: ["numerical error", "calibration or retraining", "operator coverage"]
    examples: ["INT8 inference", "FP8 training", "INT4 LLM serving", "QAT"]

  - key: sparsification
    name: "Sparsification"
    symbols: ["Sp"]
    relieves: ["compute", "capacity", "bandwidth"]
    preserves: ["approximate function"]
    changes: "Introduces zeros or structured omission so fewer values are stored or processed."
    preconditions: ["sparse-tolerant model", "hardware or kernels that exploit sparsity"]
    tradeoffs: ["index overhead", "accuracy loss", "load imbalance"]
    examples: ["structured pruning", "sparse attention", "activation sparsity"]

  - key: virtualization
    name: "Virtualization"
    symbols: ["Vr"]
    relieves: ["fragmentation", "capacity"]
    preserves: ["logical address space"]
    changes: "Decouples logical layout from physical placement."
    preconditions: ["variable-size state", "indirection is cheaper than wasted capacity"]
    tradeoffs: ["page-table overhead", "locality loss", "prefetch complexity"]
    examples: ["PagedAttention", "virtual memory", "memory paging for KV cache"]

  - key: scheduling
    name: "Scheduling"
    symbols: ["Sc", "Al", "Oc"]
    relieves: ["utilization", "latency", "reliability"]
    preserves: ["work semantics"]
    changes: "Chooses ordering, placement, admission, or retries for work."
    preconditions: ["multiple ready tasks or resources", "observable queue or resource state"]
    tradeoffs: ["policy complexity", "fairness", "tail behavior"]
    examples: ["continuous batching scheduler", "topology-aware collectives", "load balancing"]

  - key: routing
    name: "Routing"
    symbols: ["Ro", "Ld", "Rt"]
    relieves: ["utilization", "latency", "capacity"]
    preserves: ["task objective"]
    changes: "Dispatches data or requests to a subset of available compute paths."
    preconditions: ["multiple candidate paths", "routing signal", "capacity to absorb imbalance"]
    tradeoffs: ["load imbalance", "routing overhead", "quality variance"]
    examples: ["Mixture of Experts", "load balancers", "hardware routers"]

  - key: replication
    name: "Replication"
    symbols: ["As", "Oc", "Rs"]
    relieves: ["reliability", "latency"]
    preserves: ["service behavior"]
    changes: "Creates redundant copies of data, compute, or requests."
    preconditions: ["extra capacity", "consistency or reconciliation policy"]
    tradeoffs: ["higher cost", "consistency complexity", "write amplification"]
    examples: ["model replicas", "backup workers", "redundant all-reduce paths"]
