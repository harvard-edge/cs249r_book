assemblies:
  - section: "Core Architectures"
    hint: "Fundamental end-to-end model structures"
    items:
      - name: "Transformer"
        expression: "Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ"
      - name: "Encoder-Decoder Transformer"
        expression: "Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ_enc → [(At ∥ Mk) → At_cross → Nm → Sk → Dd]ᴺ_dec → Dd"
      - name: "Vision Transformer (ViT)"
        expression: "Tk_patch → Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ → Dd"
      - name: "Multimodal (Whisper)"
        expression: "Tk_audio → Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ"
      - name: "CNN"
        expression: "[Cv → Ac → Po]ᴺ → Dd"
      - name: "ResNet"
        expression: "Eb → [Cv → Nm → Sk]ᴺ → Po → Dd"
      - name: "LSTM"
        expression: "Sp → (Dd ∥ Dd) → Gt → Fb(Hs) → Ac"
      - name: "State Space Model (SSM)"
        expression: "Dd → Ac → Fb(Hs)"
      - name: "Mamba (Selective SSM)"
        expression: "Dd → Gt → Fb(Hs)"
      - name: "GNN (Graph Neural Network)"
        expression: "Tp → At → Po → Dd"
  - section: "Structural & Training Patterns"
    hint: "Reusable structures and paradigms"
    items:
      - name: "Linear Attention"
        expression: "At → Fc → Fb(Hs)"
      - name: "Mixture of Experts (MoE)"
        expression: "Ro ? (Dd ∥ … ∥ Dd) → Gt"
      - name: "Multi-Head Attention"
        expression: "Dd → (At ∥ Mk) ∥ … ∥ (At ∥ Mk) → Dd"
      - name: "Batch Normalization"
        expression: "Bt → Nm"
      - name: "Contrastive Learning (CLIP)"
        expression: "(Tk_img ∥ Tk_txt) → (Eb ∥ Eb) → Dd → Ob_contrastive → Gd → Pm"
      - name: "Masked Autoencoder (MAE)"
        expression: "Mk → Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ → Ob"
  - section: "Generative & Latent Models"
    items:
      - name: "Diffusion Model"
        expression: "[St → Nm → (Dd → Ac → Sk)]ᴺ → Ob"
      - name: "Diffusion Transformer (DiT)"
        expression: "Tk → Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ → St"
      - name: "VAE"
        expression: "Eb → Dd → (Pr ∥ St) → Dd → Ob"
      - name: "GAN"
        expression: "(Dd → Ac) ⇌ (Dd → Ac) → Ob"
      - name: "World Model (JEPA/Sora)"
        expression: "Eb → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ → Fb(Hs) → Ob"
      - name: "Sparse Autoencoder (SAE)"
        expression: "Hs → Dd → Ac → Sp → Dd → Ob"
  - section: "Efficiency & Optimization"
    items:
      - name: "Knowledge Distillation"
        expression: "Tp_teacher → Dv ← Tp_student → Gd"
      - name: "Systolic Array (TPU Core)"
        expression: "[Ma ↔ Ic]ᴺ"
      - name: "Flash Attention"
        expression: "At → (Ti ∥ Fs)"
      - name: "LoRA"
        expression: "Pm → Fc → Dd"
      - name: "Adam Optimizer"
        expression: "Gd → Os → Sc → Pm"
      - name: "Weight Averaging (SWA)"
        expression: "Gd → Wa → Pm"
      - name: "BitNet (1-bit LLM)"
        expression: "Qz → Dd → Ac"
      - name: "Quantization-Aware Training (QAT)"
        expression: "Qz → Gd → Pm"
      - name: "Speculative Decoding"
        expression: "St_draft → Rw → Bt"
      - name: "Neural Architecture Search (NAS)"
        expression: "Rw → Tp → Ob"
      - name: "Hyperparameter Optimization (HPO)"
        expression: "Rw → (Sc ∥ Rg) → Ob"
      - name: "DP-SGD (Differential Privacy)"
        expression: "(St ∥ Ct) → Gd → Pm"
  - section: "Alignment & Fine-Tuning"
    items:
      - name: "RLHF"
        expression: "St → Ob_reward → Gd → Pm"
      - name: "DPO"
        expression: "(St ∥ St) → Ob → Gd → Pm"
      - name: "PPO"
        expression: "St → (Ob ∥ Ct) → Gd → Pm"
      - name: "Chain-of-Thought (CoT)"
        expression: "St → Re(Hs) → Rw → Ob"
      - name: "RAFT"
        expression: "(Eb → Rw → Cc) → Gd → Pm"
      - name: "Prompt Tuning"
        expression: "Eb_prompt → [(At ∥ Mk) → Nm → Sk → Dd]ᴺ → Dd"
  - section: "Distributed & Scaling"
    items:
      - name: "Data Parallelism (DP)"
        expression: "Bt → Gd → Sy → Pm"
      - name: "FSDP (Fully Sharded DP)"
        expression: "Bt → Fc → Gd → Sy → Pm"
      - name: "Pipeline Parallelism (PP)"
        expression: "Pl → Sy → Al"
      - name: "Tensor Parallelism (TP)"
        expression: "Fc → Sy → Al"
      - name: "Federated Learning"
        expression: "Gd → Wa → Sy"
      - name: "Model Merging / Ensembling"
        expression: "(Pm ∥ Pm) → Wa"
  - section: "System & Production"
    items:
      - name: "RAG"
        expression: "Eb → Rw → Cc → (At ∥ Mk) → Dd"
      - name: "Inference Service"
        expression: "Rp → Ld → Ex → Cc"
      - name: "Feature Store"
        expression: "As → Cc → Rp"
      - name: "KV Cache"
        expression: "At → Cc"
      - name: "Gradient Checkpointing"
        expression: "Ad → Cp → Al"

